<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">VOPS 的 WOS 到 ROS 瓦片投影模型</title>
  <desc id="desc">普通 PostgreSQL 行表通过 populate 批量转换为 VOPS 投影表，投影表的一行保存多个列瓦片。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5}
      .row{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.3}
      .tile{fill:#dcfce7;stroke:#15803d;stroke-width:1.3}
      .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.3}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="42" y="36" class="txt">普通行表 WOS: 写入友好, 一行是一条业务记录</text>
  <rect x="40" y="62" width="330" height="290" rx="6" class="box"/>
  <text x="64" y="94" class="small">lineitem</text>
  <g>
    <rect x="64" y="118" width="282" height="36" rx="4" class="row"/>
    <text x="78" y="141" class="small">row 1: shipdate, quantity, price, discount...</text>
    <rect x="64" y="164" width="282" height="36" rx="4" class="row"/>
    <text x="78" y="187" class="small">row 2: shipdate, quantity, price, discount...</text>
    <rect x="64" y="210" width="282" height="36" rx="4" class="row"/>
    <text x="78" y="233" class="small">row 3: shipdate, quantity, price, discount...</text>
    <rect x="64" y="256" width="282" height="36" rx="4" class="row"/>
    <text x="78" y="279" class="small">...</text>
    <rect x="64" y="302" width="282" height="36" rx="4" class="row"/>
    <text x="78" y="325" class="small">row 64</text>
  </g>
  <path d="M380 202 C455 202 485 202 560 202" class="line"/>
  <rect x="410" y="142" width="120" height="80" rx="6" class="warn"/>
  <text x="436" y="174" class="txt">populate</text>
  <text x="426" y="199" class="small">批量打包</text>
  <text x="610" y="36" class="txt">VOPS 投影 ROS: 读取友好, 一行是一组列瓦片</text>
  <rect x="590" y="62" width="350" height="290" rx="6" class="box"/>
  <text x="614" y="94" class="small">vops_lineitem</text>
  <g>
    <rect x="614" y="118" width="140" height="58" rx="4" class="tile"/>
    <text x="632" y="143" class="small">vops_date</text>
    <text x="632" y="164" class="small">64 个 shipdate</text>
    <rect x="770" y="118" width="140" height="58" rx="4" class="tile"/>
    <text x="788" y="143" class="small">vops_float4</text>
    <text x="788" y="164" class="small">64 个 quantity</text>
    <rect x="614" y="194" width="140" height="58" rx="4" class="tile"/>
    <text x="632" y="219" class="small">vops_float4</text>
    <text x="632" y="240" class="small">64 个 price</text>
    <rect x="770" y="194" width="140" height="58" rx="4" class="tile"/>
    <text x="788" y="219" class="small">vops_float4</text>
    <text x="788" y="240" class="small">64 个 discount</text>
    <rect x="614" y="270" width="296" height="52" rx="4" class="tile"/>
    <text x="632" y="302" class="small">同一投影行还可以混合保留标量分组列</text>
  </g>
  <rect x="112" y="402" width="756" height="72" rx="6" class="warn"/>
  <text x="136" y="431" class="txt">关键转换</text>
  <text x="136" y="456" class="small">VOPS 不替换 PostgreSQL heap/page 格式, 而是用扩展类型把多行同列值装进一个普通表字段。</text>
</svg>
