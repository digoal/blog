<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">VOPS tile 的物理结构</title>
  <desc id="desc">一个 VOPS tile 由 null_mask、empty_mask 和最多 64 个 payload 元素组成，vops_bool 的 payload 也是 64 位位图。</desc>
  <defs>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5}
      .mask{fill:#fee2e2;stroke:#b91c1c;stroke-width:1.3}
      .empty{fill:#ffedd5;stroke:#c2410c;stroke-width:1.3}
      .payload{fill:#dcfce7;stroke:#15803d;stroke-width:1.3}
      .bit{fill:#e0f2fe;stroke:#0369a1;stroke-width:1}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .mono{font:13px monospace;fill:#0f172a}
    </style>
  </defs>
  <text x="42" y="38" class="txt">源码结构: vops_tile_hdr + payload[TILE_SIZE], TILE_SIZE = 64</text>
  <rect x="40" y="70" width="900" height="120" rx="6" class="box"/>
  <rect x="68" y="108" width="180" height="46" rx="4" class="mask"/>
  <text x="92" y="136" class="txt">null_mask</text>
  <rect x="270" y="108" width="180" height="46" rx="4" class="empty"/>
  <text x="292" y="136" class="txt">empty_mask</text>
  <rect x="472" y="108" width="420" height="46" rx="4" class="payload"/>
  <text x="498" y="136" class="txt">payload[64]: int4 / float4 / date / timestamp ...</text>
  <text x="68" y="216" class="small">null_mask 的第 j 位为 1: 第 j 个元素是 SQL NULL</text>
  <text x="68" y="242" class="small">empty_mask 的第 j 位为 1: 第 j 个位置未装入真实行, 常见于最后一个未满 tile 或标量分组切断</text>
  <text x="68" y="268" class="small">payload 的第 j 个槽: 保存第 j 条原始业务行在该列上的值</text>
  <rect x="66" y="318" width="848" height="120" rx="6" class="box"/>
  <text x="90" y="350" class="txt">一个 vops_float4 tile 的 64 个槽位</text>
  <g>
    <rect x="90" y="376" width="34" height="28" rx="3" class="bit"/><text x="99" y="395" class="mono">0</text>
    <rect x="130" y="376" width="34" height="28" rx="3" class="bit"/><text x="139" y="395" class="mono">1</text>
    <rect x="170" y="376" width="34" height="28" rx="3" class="bit"/><text x="179" y="395" class="mono">2</text>
    <rect x="210" y="376" width="34" height="28" rx="3" class="bit"/><text x="219" y="395" class="mono">3</text>
    <rect x="250" y="376" width="34" height="28" rx="3" class="bit"/><text x="259" y="395" class="mono">4</text>
    <rect x="290" y="376" width="34" height="28" rx="3" class="bit"/><text x="299" y="395" class="mono">5</text>
    <rect x="330" y="376" width="34" height="28" rx="3" class="bit"/><text x="339" y="395" class="mono">6</text>
    <rect x="370" y="376" width="34" height="28" rx="3" class="bit"/><text x="379" y="395" class="mono">7</text>
    <text x="422" y="395" class="mono">...</text>
    <rect x="520" y="376" width="42" height="28" rx="3" class="bit"/><text x="529" y="395" class="mono">63</text>
  </g>
  <rect x="610" y="356" width="268" height="64" rx="6" class="payload"/>
  <text x="636" y="384" class="small">64 不是 SQL 数组长度</text>
  <text x="636" y="406" class="small">而是扩展类型内部固定处理批量</text>
  <text x="68" y="486" class="small">空间直觉: vops_int4 / vops_float4 类型长度是 16 + 64*4 = 272 字节; vops_int8 / vops_float8 是 528 字节。</text>
</svg>
