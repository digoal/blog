<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">VOPS 查询中的 filter_mask 与向量聚合路径</title>
  <desc id="desc">VOPS 条件计算产生 vops_bool 位图，filter 函数把位图写入 filter_mask，后续聚合按位跳过不匹配元素。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .stage{fill:#eff6ff;stroke:#2563eb;stroke-width:1.5}
      .mask{fill:#fef3c7;stroke:#b45309;stroke-width:1.5}
      .agg{fill:#dcfce7;stroke:#15803d;stroke-width:1.5}
      .warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:1.5}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .mono{font:13px monospace;fill:#0f172a}
      .line{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="54" y="64" width="210" height="82" rx="6" class="stage"/>
  <text x="82" y="98" class="txt">SQL 条件</text>
  <text x="82" y="124" class="mono">l_quantity &lt; 24</text>
  <path d="M264 105 L340 105" class="line"/>
  <rect x="340" y="64" width="230" height="82" rx="6" class="stage"/>
  <text x="368" y="98" class="txt">比较运算符</text>
  <text x="368" y="124" class="small">一次处理 tile 的 64 个槽位</text>
  <path d="M570 105 L650 105" class="line"/>
  <rect x="650" y="64" width="250" height="82" rx="6" class="mask"/>
  <text x="680" y="98" class="txt">vops_bool 结果位图</text>
  <text x="680" y="124" class="mono">101101... 每位对应一行</text>
  <path d="M775 146 C775 196 720 216 640 236" class="line"/>
  <rect x="450" y="236" width="260" height="80" rx="6" class="mask"/>
  <text x="482" y="270" class="txt">filter(condition)</text>
  <text x="482" y="296" class="small">mask 非空时返回 true, 同时设置 filter_mask</text>
  <path d="M580 316 C580 368 490 380 380 398" class="line"/>
  <rect x="116" y="374" width="260" height="92" rx="6" class="agg"/>
  <text x="146" y="406" class="txt">sum / avg / min / max</text>
  <text x="146" y="432" class="small">循环 64 位, 只累加命中位</text>
  <path d="M710 276 C798 294 842 326 856 382" class="line"/>
  <rect x="730" y="382" width="180" height="84" rx="6" class="agg"/>
  <text x="760" y="414" class="txt">vops_unnest / FDW</text>
  <text x="760" y="440" class="small">只展开命中槽位</text>
  <rect x="92" y="500" width="816" height="42" rx="6" class="warn"/>
  <text x="116" y="526" class="small">注意: filter() 让 PostgreSQL 看见的是 tile 级 bool, 行级选择性藏在扩展内部; 这是优化器估算和通用 SQL 兼容性的边界。</text>
</svg>
