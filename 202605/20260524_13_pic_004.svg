<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">VOPS 投影、刷新和边界索引</title>
  <desc id="desc">VOPS create_projection 生成投影表和刷新函数，可用 first/last 为排序列建立 BRIN 边界索引以做粗过滤。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5}
      .src{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5}
      .proj{fill:#dcfce7;stroke:#15803d;stroke-width:1.5}
      .idx{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.5}
      .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.5}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .line{stroke:#0f766e;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="54" y="72" width="220" height="100" rx="6" class="src"/>
  <text x="86" y="110" class="txt">原始业务表</text>
  <text x="86" y="136" class="small">高频写入, 普通标量列</text>
  <path d="M274 122 C350 122 372 122 446 122" class="line"/>
  <rect x="446" y="72" width="210" height="100" rx="6" class="warn"/>
  <text x="476" y="110" class="txt">refresh / populate</text>
  <text x="476" y="136" class="small">按 predicate + sort 批处理</text>
  <path d="M656 122 C720 122 744 122 808 122" class="line"/>
  <rect x="808" y="72" width="130" height="100" rx="6" class="proj"/>
  <text x="826" y="110" class="txt">VOPS 投影</text>
  <text x="826" y="136" class="small">瓦片列 + 标量分组列</text>
  <rect x="104" y="244" width="210" height="92" rx="6" class="idx"/>
  <text x="132" y="276" class="txt">first(order_by)</text>
  <text x="132" y="302" class="small">每个 tile 的起始边界</text>
  <rect x="386" y="244" width="210" height="92" rx="6" class="idx"/>
  <text x="414" y="276" class="txt">last(order_by)</text>
  <text x="414" y="302" class="small">每个 tile 的结束边界</text>
  <rect x="668" y="244" width="210" height="92" rx="6" class="idx"/>
  <text x="696" y="276" class="txt">BRIN / 分组索引</text>
  <text x="696" y="302" class="small">粗定位候选页或分组</text>
  <path d="M872 172 C858 214 820 224 774 244" class="line"/>
  <path d="M872 172 C710 220 540 220 492 244" class="line"/>
  <path d="M872 172 C610 232 288 222 210 244" class="line"/>
  <rect x="88" y="410" width="806" height="86" rx="6" class="box"/>
  <text x="116" y="442" class="txt">查询改写边界</text>
  <text x="116" y="468" class="small">auto_substitute_projections 默认关闭; 投影可能滞后于源表, 只能在无 join 且目标表达式满足限制时自动替换。</text>
</svg>
