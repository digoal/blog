<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Hash 索引从逻辑 key 到物理桶链</title>
  <desc id="desc">展示等值谓词先计算 hash code，再映射到 bucket，bucket 由主桶页和 overflow 页组成，命中后仍需回表或重检。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5}
      .hot{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.6}
      .bucket{fill:#dcfce7;stroke:#15803d;stroke-width:1.6}
      .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.6}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="42" y="62" width="190" height="76" rx="5" class="hot"/>
  <text x="70" y="95" class="txt">where k = 'A42'</text>
  <text x="70" y="120" class="small">只适合等值谓词</text>
  <path d="M232 100 H318" class="line"/>
  <rect x="318" y="62" width="164" height="76" rx="5" class="box"/>
  <text x="352" y="94" class="txt">hash(k)</text>
  <text x="344" y="120" class="small">得到固定宽度 hash code</text>
  <path d="M482 100 H566" class="line"/>
  <rect x="566" y="62" width="178" height="76" rx="5" class="hot"/>
  <text x="600" y="94" class="txt">bucket = mask(hash)</text>
  <text x="602" y="120" class="small">目录或 mask 决定桶号</text>
  <path d="M655 138 V202" class="line"/>
  <rect x="96" y="230" width="780" height="210" rx="6" class="box"/>
  <text x="118" y="262" class="txt">Hash 索引文件</text>
  <rect x="126" y="294" width="128" height="92" rx="4" class="warn"/>
  <text x="158" y="326" class="txt">meta page</text>
  <text x="146" y="352" class="small">桶数 / mask / free map</text>
  <rect x="318" y="294" width="142" height="92" rx="4" class="bucket"/>
  <text x="348" y="326" class="txt">bucket 17</text>
  <text x="342" y="352" class="small">primary page</text>
  <path d="M460 340 H530" class="line"/>
  <rect x="530" y="294" width="142" height="92" rx="4" class="bucket"/>
  <text x="560" y="326" class="txt">overflow</text>
  <text x="555" y="352" class="small">同桶冲突链</text>
  <path d="M672 340 H742" class="line"/>
  <rect x="742" y="294" width="104" height="92" rx="4" class="bucket"/>
  <text x="765" y="326" class="txt">...</text>
  <text x="758" y="352" class="small">更多页</text>
  <path d="M655 202 C585 242 466 260 389 294" class="line"/>
  <rect x="318" y="420" width="170" height="56" rx="4" class="warn"/>
  <text x="342" y="452" class="txt">返回 TID / value</text>
  <path d="M389 386 V420" class="line"/>
  <rect x="546" y="420" width="210" height="56" rx="4" class="warn"/>
  <text x="568" y="452" class="txt">重检原始 key，处理碰撞</text>
  <path d="M488 448 H546" class="line"/>
</svg>
