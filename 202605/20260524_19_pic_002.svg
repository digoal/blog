<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL hash 索引的线性分裂</title>
  <desc id="desc">展示 PostgreSQL 通过 maxbucket、highmask、lowmask 增加一个新桶，并把旧桶中属于新桶的元组复制过去。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <style>
      .meta{fill:#fef3c7;stroke:#b45309;stroke-width:1.5}
      .old{fill:#fee2e2;stroke:#b91c1c;stroke-width:1.5}
      .new{fill:#dcfce7;stroke:#15803d;stroke-width:1.5}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.4}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .line{stroke:#0f766e;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="46" y="42" width="888" height="74" rx="5" class="meta"/>
  <text x="70" y="75" class="txt">meta page: hashm_maxbucket, hashm_highmask, hashm_lowmask, hashm_spares[]</text>
  <text x="70" y="100" class="small">插入后如果 ntuples &gt; fillfactor * bucket_count，尝试新增一个 bucket</text>
  <rect x="72" y="170" width="128" height="64" rx="4" class="box"/>
  <text x="102" y="207" class="txt">bucket 0</text>
  <rect x="226" y="170" width="128" height="64" rx="4" class="old"/>
  <text x="256" y="197" class="txt">old bucket</text>
  <text x="260" y="220" class="small">being split</text>
  <rect x="380" y="170" width="128" height="64" rx="4" class="box"/>
  <text x="410" y="207" class="txt">bucket 2</text>
  <rect x="534" y="170" width="128" height="64" rx="4" class="box"/>
  <text x="564" y="207" class="txt">bucket 3</text>
  <path d="M662 202 H744" class="line"/>
  <rect x="744" y="170" width="156" height="64" rx="4" class="new"/>
  <text x="778" y="197" class="txt">new bucket</text>
  <text x="768" y="220" class="small">being populated</text>
  <rect x="216" y="306" width="156" height="72" rx="4" class="old"/>
  <text x="238" y="335" class="txt">旧桶页链</text>
  <text x="236" y="360" class="small">hash code 已排序，可能有 overflow</text>
  <rect x="602" y="306" width="156" height="72" rx="4" class="new"/>
  <text x="624" y="335" class="txt">新桶页链</text>
  <text x="626" y="360" class="small">复制匹配新 mask 的元组</text>
  <path d="M372 342 H602" class="line"/>
  <text x="425" y="328" class="small">_hash_hashkey2bucket(hash, max, highmask, lowmask)</text>
  <rect x="250" y="430" width="480" height="62" rx="4" class="meta"/>
  <text x="278" y="458" class="txt">完成后：清 split/populated 标记，旧桶留下 split-cleanup 标记</text>
  <text x="278" y="482" class="small">后续 cleanup/vacuum 清理 moved-by-split 的旧副本；桶数不收缩</text>
  <path d="M680 378 V430" class="line"/>
</svg>
