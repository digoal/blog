<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">几类 hash 结构的扩容方式对比</title>
  <desc id="desc">对比 extendible hashing、linear hashing、Redis dict rehash 与 LevelDB bloom/cache hash 的结构差异。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4338ca"/>
    </marker>
    <style>
      .a{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5}
      .b{fill:#ecfdf5;stroke:#047857;stroke-width:1.5}
      .c{fill:#fef3c7;stroke:#b45309;stroke-width:1.5}
      .d{fill:#f5f3ff;stroke:#6d28d9;stroke-width:1.5}
      .txt{font:15px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .line{stroke:#4338ca;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="44" y="48" width="416" height="190" rx="6" class="a"/>
  <text x="70" y="82" class="txt">Extendible Hashing</text>
  <text x="70" y="110" class="small">目录 directory 保存 hash 前缀到 bucket 的映射</text>
  <text x="70" y="136" class="small">桶满时只分裂相关 bucket；必要时目录翻倍</text>
  <rect x="82" y="158" width="54" height="42" rx="3" fill="#fff"/>
  <rect x="152" y="158" width="54" height="42" rx="3" fill="#fff"/>
  <rect x="222" y="158" width="54" height="42" rx="3" fill="#fff"/>
  <path d="M109 200 C122 225 188 225 206 200" class="line"/>
  <text x="300" y="184" class="small">优点：定位稳定</text>
  <text x="300" y="208" class="small">代价：目录可变大</text>
  <rect x="520" y="48" width="416" height="190" rx="6" class="b"/>
  <text x="546" y="82" class="txt">Linear Hashing / PostgreSQL hash AM</text>
  <text x="546" y="110" class="small">没有全局目录，用 maxbucket + mask 计算桶</text>
  <text x="546" y="136" class="small">每次新增一个桶，按线性顺序选择旧桶分裂</text>
  <rect x="566" y="162" width="52" height="38" rx="3" fill="#fff"/>
  <rect x="626" y="162" width="52" height="38" rx="3" fill="#fff"/>
  <rect x="686" y="162" width="52" height="38" rx="3" fill="#fff"/>
  <path d="M738 181 H812" class="line"/>
  <rect x="812" y="162" width="52" height="38" rx="3" fill="#fff"/>
  <text x="546" y="218" class="small">优点：增长渐进；代价：桶链 overflow 与 cleanup</text>
  <rect x="44" y="300" width="416" height="190" rx="6" class="c"/>
  <text x="70" y="334" class="txt">Redis dict incremental rehash</text>
  <text x="70" y="362" class="small">同时保留 ht[0] 和 ht[1]，rehashidx 指向迁移进度</text>
  <text x="70" y="388" class="small">普通读写顺便搬迁少量 bucket，降低单次停顿</text>
  <rect x="82" y="414" width="120" height="42" rx="3" fill="#fff"/>
  <text x="105" y="441" class="small">ht[0]</text>
  <path d="M202 435 H286" class="line"/>
  <rect x="286" y="414" width="120" height="42" rx="3" fill="#fff"/>
  <text x="309" y="441" class="small">ht[1]</text>
  <rect x="520" y="300" width="416" height="190" rx="6" class="d"/>
  <text x="546" y="334" class="txt">LevelDB hash 用途</text>
  <text x="546" y="362" class="small">Bloom filter: 可能存在 / 一定不存在，减少无效读</text>
  <text x="546" y="388" class="small">Block cache: HandleTable 用 hash + 链表定位缓存块</text>
  <text x="546" y="414" class="small">不是主数据索引；主查找仍依赖 MemTable/SSTable 有序结构</text>
</svg>
