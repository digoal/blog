<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">持久内存 hash 的写放大约束</title>
  <desc id="desc">展示 PM hash 结构必须同时控制 bucket 写入、目录恢复、cache line flush、fence 和并发扩容。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c2d12"/>
    </marker>
    <style>
      .dram{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.5}
      .pm{fill:#ffedd5;stroke:#c2410c;stroke-width:1.5}
      .ok{fill:#dcfce7;stroke:#15803d;stroke-width:1.5}
      .txt{font:16px sans-serif;fill:#0f172a}
      .small{font:13px sans-serif;fill:#475569}
      .line{stroke:#7c2d12;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="56" y="62" width="220" height="92" rx="5" class="dram"/>
  <text x="88" y="96" class="txt">易失目录 / cache</text>
  <text x="84" y="122" class="small">快速读，重启后可重建</text>
  <rect x="378" y="62" width="230" height="92" rx="5" class="pm"/>
  <text x="410" y="96" class="txt">PM bucket / segment</text>
  <text x="410" y="122" class="small">数据持久，写入更贵</text>
  <rect x="704" y="62" width="220" height="92" rx="5" class="pm"/>
  <text x="735" y="96" class="txt">持久化恢复信息</text>
  <text x="725" y="122" class="small">避免全表扫描恢复</text>
  <path d="M276 108 H378" class="line"/>
  <path d="M608 108 H704" class="line"/>
  <rect x="74" y="238" width="188" height="88" rx="5" class="pm"/>
  <text x="104" y="272" class="txt">cache line flush</text>
  <text x="104" y="298" class="small">刷脏行到持久介质</text>
  <rect x="310" y="238" width="188" height="88" rx="5" class="pm"/>
  <text x="354" y="272" class="txt">fence</text>
  <text x="332" y="298" class="small">约束写入顺序</text>
  <rect x="546" y="238" width="188" height="88" rx="5" class="pm"/>
  <text x="578" y="272" class="txt">failure atomicity</text>
  <text x="578" y="298" class="small">8B 或 cache line 粒度</text>
  <rect x="782" y="238" width="144" height="88" rx="5" class="ok"/>
  <text x="812" y="272" class="txt">即时恢复</text>
  <text x="804" y="298" class="small">无需重放大日志</text>
  <path d="M262 282 H310" class="line"/>
  <path d="M498 282 H546" class="line"/>
  <path d="M734 282 H782" class="line"/>
  <rect x="104" y="404" width="780" height="62" rx="5" class="ok"/>
  <text x="130" y="432" class="txt">设计目标：把“扩容、分裂、目录更新”的持久写减少到可证明的小集合</text>
  <text x="130" y="456" class="small">Dash 关注真实 Optane DCPMM 上的扩展性、负载因子、即时恢复；WORT/WOART 说明 PM 索引要以失败原子写为第一约束。</text>
</svg>
