<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">AGE 从图逻辑模型到 PostgreSQL 物理对象的映射</title>
  <desc id="desc">展示一个 AGE graph 如何映射为 PostgreSQL schema、catalog 行、label 物理表、序列和索引。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
    .head{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5;rx:8}
    .cat{fill:#fff7ed;stroke:#c2410c;stroke-width:1.5;rx:8}
    .tbl{fill:#ecfdf5;stroke:#047857;stroke-width:1.5;rx:8}
    .idx{fill:#fefce8;stroke:#a16207;stroke-width:1.5;rx:8}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#334155}
    .line{stroke:#334155;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="24" y="24" width="932" height="512" class="box"/>
  <text x="490" y="58" text-anchor="middle" class="text">AGE 的核心选择：图对象不是独立存储引擎，而是 PostgreSQL schema + catalog + heap/index</text>

  <rect x="70" y="105" width="210" height="95" class="head"/>
  <text x="175" y="138" text-anchor="middle" class="text">逻辑图</text>
  <text x="175" y="166" text-anchor="middle" class="mono">graph_name</text>
  <text x="175" y="188" text-anchor="middle" class="small">顶点、边、属性、标签</text>

  <rect x="385" y="92" width="220" height="120" class="cat"/>
  <text x="495" y="124" text-anchor="middle" class="text">ag_catalog 元数据</text>
  <text x="405" y="153" class="mono">ag_graph(graphid,name,namespace)</text>
  <text x="405" y="179" class="mono">ag_label(name,graph,id,kind,</text>
  <text x="405" y="199" class="mono">         relation,seq_name)</text>

  <rect x="705" y="105" width="205" height="95" class="head"/>
  <text x="807" y="138" text-anchor="middle" class="text">图 namespace</text>
  <text x="807" y="166" text-anchor="middle" class="mono">CREATE SCHEMA</text>
  <text x="807" y="188" text-anchor="middle" class="small">每个 graph 一个 schema</text>

  <rect x="90" y="305" width="245" height="135" class="tbl"/>
  <text x="212" y="338" text-anchor="middle" class="text">顶点 label 表</text>
  <text x="112" y="370" class="mono">id graphid</text>
  <text x="112" y="394" class="mono">properties agtype</text>
  <text x="112" y="420" class="small">父表：_ag_label_vertex</text>

  <rect x="370" y="290" width="260" height="165" class="tbl"/>
  <text x="500" y="323" text-anchor="middle" class="text">边 label 表</text>
  <text x="394" y="355" class="mono">id graphid</text>
  <text x="394" y="379" class="mono">start_id graphid</text>
  <text x="394" y="403" class="mono">end_id graphid</text>
  <text x="394" y="427" class="mono">properties agtype</text>
  <text x="394" y="449" class="small">父表：_ag_label_edge</text>

  <rect x="685" y="300" width="235" height="145" class="idx"/>
  <text x="802" y="333" text-anchor="middle" class="text">自动生成对象</text>
  <text x="707" y="366" class="mono">label_id_seq</text>
  <text x="707" y="392" class="mono">B-tree(id)</text>
  <text x="707" y="418" class="mono">B-tree(start_id/end_id)</text>

  <path class="line" d="M280,152 C320,152 340,152 380,152"/>
  <path class="line" d="M605,152 C645,152 660,152 700,152"/>
  <path class="line" d="M495,212 C420,250 310,260 235,302"/>
  <path class="line" d="M520,212 C525,250 522,260 510,288"/>
  <path class="line" d="M630,372 C650,372 660,372 680,372"/>

  <text x="344" y="137" class="small">登记 graph</text>
  <text x="640" y="137" class="small">namespace OID</text>
  <text x="326" y="269" class="small">relation OID</text>
  <text x="642" y="356" class="small">索引/序列</text>
</svg>
