<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">graphid 的 64 位布局</title>
  <desc id="desc">展示 AGE graphid 由 16 位 label_id 和 48 位 entry_id 组成，并通过移位与掩码提取。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#1e293b}
    .lab{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5}
    .ent{fill:#dcfce7;stroke:#15803d;stroke-width:1.5}
    .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
    .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.5;rx:8}
    .line{stroke:#334155;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
  </style>
  <text x="490" y="46" text-anchor="middle" class="text">graphid = (label_id &lt;&lt; 48) | (entry_id &amp; 0x0000ffffffffffff)</text>

  <rect x="90" y="90" width="800" height="72" class="box"/>
  <rect x="90" y="90" width="200" height="72" class="lab"/>
  <rect x="290" y="90" width="600" height="72" class="ent"/>
  <text x="190" y="122" text-anchor="middle" class="text">label_id</text>
  <text x="190" y="148" text-anchor="middle" class="small">高 16 bit，1..65535</text>
  <text x="590" y="122" text-anchor="middle" class="text">entry_id</text>
  <text x="590" y="148" text-anchor="middle" class="small">低 48 bit，0..281474976710655</text>
  <text x="95" y="184" class="small">bit 63</text>
  <text x="280" y="184" class="small">bit 48</text>
  <text x="862" y="184" class="small">bit 0</text>

  <rect x="100" y="245" width="240" height="92" class="box"/>
  <text x="220" y="276" text-anchor="middle" class="text">提取 label</text>
  <text x="122" y="306" class="mono">label_id = gid &gt;&gt; 48</text>

  <rect x="370" y="245" width="250" height="92" class="box"/>
  <text x="495" y="276" text-anchor="middle" class="text">提取 entry</text>
  <text x="392" y="306" class="mono">entry_id = gid &amp; mask</text>

  <rect x="650" y="238" width="240" height="112" class="warn"/>
  <text x="770" y="270" text-anchor="middle" class="text">工程含义</text>
  <text x="672" y="300" class="small">同一 label 内 entry 递增</text>
  <text x="672" y="324" class="small">B-tree 排序先按 label 聚集</text>

  <path class="line" d="M190,162 C190,200 215,210 220,242"/>
  <path class="line" d="M590,162 C590,198 505,210 498,242"/>
  <path class="line" d="M802,162 C810,195 800,215 780,236"/>
</svg>
