<svg xmlns="http://www.w3.org/2000/svg" width="980" height="570" viewBox="0 0 980 570" role="img" aria-labelledby="title desc">
  <title id="title">AGE label 表和索引访问路径</title>
  <desc id="desc">展示顶点表和边表的列、默认索引，以及点查、邻接边扫描、属性包含查询的访问路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#1e293b}
    .heap{fill:#ecfdf5;stroke:#047857;stroke-width:1.5;rx:8}
    .idx{fill:#fefce8;stroke:#a16207;stroke-width:1.5;rx:8}
    .gin{fill:#fae8ff;stroke:#a21caf;stroke-width:1.5;rx:8}
    .flow{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
    .line{stroke:#334155;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
  </style>
  <text x="490" y="42" text-anchor="middle" class="text">默认索引解决实体身份和边端点定位；属性检索需要额外建 GIN/表达式索引</text>

  <rect x="70" y="90" width="270" height="145" class="heap"/>
  <text x="205" y="122" text-anchor="middle" class="text">顶点 label 表</text>
  <text x="94" y="154" class="mono">id graphid</text>
  <text x="94" y="180" class="mono">properties agtype</text>
  <text x="94" y="210" class="small">CREATE TABLE graph.Person (...)</text>

  <rect x="405" y="90" width="300" height="175" class="heap"/>
  <text x="555" y="122" text-anchor="middle" class="text">边 label 表</text>
  <text x="430" y="154" class="mono">id graphid</text>
  <text x="430" y="180" class="mono">start_id graphid</text>
  <text x="430" y="206" class="mono">end_id graphid</text>
  <text x="430" y="232" class="mono">properties agtype</text>

  <rect x="755" y="92" width="160" height="145" class="idx"/>
  <text x="835" y="122" text-anchor="middle" class="text">B-tree</text>
  <text x="775" y="154" class="mono">id UNIQUE</text>
  <text x="775" y="180" class="mono">start_id</text>
  <text x="775" y="206" class="mono">end_id</text>
  <text x="775" y="228" class="small">graphid_ops</text>

  <rect x="95" y="335" width="220" height="95" class="flow"/>
  <text x="205" y="367" text-anchor="middle" class="text">按 id 找实体</text>
  <text x="116" y="397" class="mono">WHERE id = $gid</text>

  <rect x="380" y="335" width="260" height="95" class="flow"/>
  <text x="510" y="367" text-anchor="middle" class="text">找出入边</text>
  <text x="402" y="397" class="mono">start_id = $gid OR end_id = $gid</text>

  <rect x="705" y="325" width="220" height="115" class="gin"/>
  <text x="815" y="357" text-anchor="middle" class="text">属性包含/存在</text>
  <text x="728" y="387" class="mono">properties @&gt; ...</text>
  <text x="728" y="413" class="small">可选：USING gin(properties)</text>

  <path class="line" d="M315,382 C370,382 675,255 760,198"/>
  <path class="line" d="M640,382 C705,366 745,250 805,210"/>
  <path class="line" d="M815,325 C820,280 826,255 832,240"/>
  <path class="line" d="M340,156 C365,156 380,156 402,156"/>
  <path class="line" d="M705,176 C725,176 735,176 752,176"/>
</svg>
