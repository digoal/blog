<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">agtype 二进制格式与 GIN token 提取</title>
  <desc id="desc">展示 agtype varlena 根容器、agtentry、键值数据区，以及 GIN 索引如何抽取键和值并要求 recheck。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#1e293b}
    .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
    .data{fill:#ecfdf5;stroke:#047857;stroke-width:1.5;rx:8}
    .gin{fill:#fae8ff;stroke:#a21caf;stroke-width:1.5;rx:8}
    .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.5;rx:8}
    .line{stroke:#334155;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
  </style>
  <text x="490" y="42" text-anchor="middle" class="text">agtype 像 jsonb 一样是 varlena 二进制容器；GIN 存的是抽取 token，不是完整对象结构</text>

  <rect x="60" y="95" width="360" height="270" class="box"/>
  <text x="240" y="128" text-anchor="middle" class="text">agtype Datum</text>
  <rect x="90" y="155" width="300" height="42" class="data"/>
  <text x="240" y="181" text-anchor="middle" class="mono">varlena header</text>
  <rect x="90" y="205" width="300" height="48" class="data"/>
  <text x="240" y="235" text-anchor="middle" class="mono">root container header</text>
  <rect x="90" y="260" width="300" height="48" class="data"/>
  <text x="240" y="290" text-anchor="middle" class="mono">agtentry[]: type + len/off</text>
  <rect x="90" y="315" width="300" height="32" class="data"/>
  <text x="240" y="337" text-anchor="middle" class="mono">keys first, values after keys</text>

  <rect x="505" y="100" width="190" height="120" class="gin"/>
  <text x="600" y="132" text-anchor="middle" class="text">gin_extract</text>
  <text x="528" y="164" class="mono">WAGT_KEY</text>
  <text x="528" y="188" class="mono">WAGT_VALUE</text>
  <text x="528" y="212" class="mono">WAGT_ELEM</text>

  <rect x="755" y="100" width="165" height="120" class="gin"/>
  <text x="838" y="132" text-anchor="middle" class="text">GIN posting</text>
  <text x="778" y="164" class="mono">text token</text>
  <text x="778" y="188" class="mono">TID list/tree</text>
  <text x="778" y="212" class="small">STORAGE text</text>

  <rect x="505" y="310" width="415" height="135" class="warn"/>
  <text x="712" y="342" text-anchor="middle" class="text">查询一致性检查</text>
  <text x="530" y="374" class="mono">@&gt; / &lt;@ / ? / ?| / ?&amp; / @&gt;&gt; / &lt;&lt;@</text>
  <text x="530" y="405" class="small">GIN 先证明“必要 token 存在或不存在”</text>
  <text x="530" y="429" class="small">源码中 consistent 对多数策略设置 recheck=true</text>

  <path class="line" d="M420,245 C455,220 470,180 500,166"/>
  <path class="line" d="M695,160 C715,160 735,160 750,160"/>
  <path class="line" d="M835,220 C825,255 780,285 725,307"/>
  <path class="line" d="M390,332 C460,360 470,382 500,385"/>
</svg>
