<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">AGE 存储与索引选型决策流</title>
  <desc id="desc">展示根据查询工作负载选择默认 graphid 索引、边端点索引、agtype GIN、表达式索引或关系化建模的流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#1e293b}
    .q{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5;rx:8}
    .a{fill:#ecfdf5;stroke:#047857;stroke-width:1.5;rx:8}
    .w{fill:#fff7ed;stroke:#c2410c;stroke-width:1.5;rx:8}
    .line{stroke:#334155;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
  </style>
  <text x="490" y="42" text-anchor="middle" class="text">不要“所有属性都建索引”；先按访问路径拆解 AGE workload</text>

  <rect x="365" y="80" width="250" height="72" class="q"/>
  <text x="490" y="111" text-anchor="middle" class="text">查询主要问什么？</text>
  <text x="490" y="137" text-anchor="middle" class="small">身份、邻接、属性、路径、分析</text>

  <rect x="60" y="225" width="205" height="95" class="a"/>
  <text x="162" y="257" text-anchor="middle" class="text">按实体 id</text>
  <text x="82" y="288" class="mono">id = graphid</text>
  <text x="82" y="310" class="small">用默认 B-tree</text>

  <rect x="300" y="225" width="205" height="95" class="a"/>
  <text x="402" y="257" text-anchor="middle" class="text">一跳邻接</text>
  <text x="322" y="288" class="mono">start_id/end_id</text>
  <text x="322" y="310" class="small">用默认 B-tree</text>

  <rect x="540" y="225" width="205" height="95" class="a"/>
  <text x="642" y="257" text-anchor="middle" class="text">属性包含/存在</text>
  <text x="562" y="288" class="mono">@&gt; ? ?| ?&amp;</text>
  <text x="562" y="310" class="small">评估 GIN + recheck</text>

  <rect x="780" y="225" width="155" height="95" class="w"/>
  <text x="858" y="257" text-anchor="middle" class="text">高频标量</text>
  <text x="800" y="288" class="mono">name/status</text>
  <text x="800" y="310" class="small">表达式/拆列</text>

  <rect x="170" y="405" width="250" height="95" class="w"/>
  <text x="295" y="437" text-anchor="middle" class="text">多跳/路径爆炸</text>
  <text x="192" y="468" class="small">先限制 label、方向和深度</text>
  <text x="192" y="490" class="small">再看是否需要图专用系统</text>

  <rect x="560" y="405" width="250" height="95" class="w"/>
  <text x="685" y="437" text-anchor="middle" class="text">强约束/强统计</text>
  <text x="582" y="468" class="small">把核心字段关系化</text>
  <text x="582" y="490" class="small">用 PostgreSQL 统计与约束</text>

  <path class="line" d="M450,152 C330,185 230,205 170,222"/>
  <path class="line" d="M475,152 C445,185 420,205 405,222"/>
  <path class="line" d="M520,152 C560,185 615,205 640,222"/>
  <path class="line" d="M575,152 C690,185 805,205 855,222"/>
  <path class="line" d="M405,320 C380,350 335,382 305,402"/>
  <path class="line" d="M645,320 C655,350 675,382 682,402"/>
</svg>
