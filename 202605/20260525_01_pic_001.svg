<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Avro 对象容器文件布局</title>
  <desc id="desc">展示 Avro Object Container File 的 header、metadata、sync marker 和数据块结构。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #18212f; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .note { font-size: 13px; fill: #44546a; }
    .box { stroke: #24364b; stroke-width: 2; rx: 8; }
    .header { fill: #d9ead3; }
    .meta { fill: #fff2cc; }
    .sync { fill: #d9e2f3; }
    .block { fill: #fce4d6; }
    .data { fill: #e2f0d9; }
    .arrow { stroke: #415a77; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#415a77"/>
    </marker>
  </defs>
  <text x="40" y="50" class="title">Avro Object Container File：自描述的行式二进制文件</text>
  <rect x="40" y="90" width="210" height="310" class="box header"/>
  <text x="70" y="125" class="label">Header</text>
  <rect x="70" y="155" width="150" height="48" class="box" fill="#f8fafc"/>
  <text x="91" y="185" class="small">magic: Obj + 1</text>
  <rect x="70" y="220" width="150" height="72" class="box meta"/>
  <text x="88" y="250" class="small">meta map</text>
  <text x="84" y="275" class="note">avro.schema / codec</text>
  <rect x="70" y="310" width="150" height="48" class="box sync"/>
  <text x="91" y="340" class="small">16B sync marker</text>
  <path d="M250 245 L310 245" class="arrow"/>
  <rect x="315" y="90" width="335" height="310" class="box block"/>
  <text x="345" y="125" class="label">Data Block 1</text>
  <rect x="350" y="155" width="105" height="48" class="box" fill="#f8fafc"/>
  <text x="378" y="185" class="small">count</text>
  <rect x="475" y="155" width="105" height="48" class="box" fill="#f8fafc"/>
  <text x="508" y="185" class="small">size</text>
  <rect x="350" y="225" width="230" height="70" class="box data"/>
  <text x="382" y="257" class="small">binary encoded records</text>
  <text x="384" y="280" class="note">可被 codec 压缩</text>
  <rect x="350" y="318" width="230" height="48" class="box sync"/>
  <text x="401" y="348" class="small">same sync marker</text>
  <path d="M650 245 L710 245" class="arrow"/>
  <rect x="715" y="90" width="335" height="310" class="box block"/>
  <text x="745" y="125" class="label">Data Block N</text>
  <rect x="750" y="155" width="105" height="48" class="box" fill="#f8fafc"/>
  <text x="778" y="185" class="small">count</text>
  <rect x="875" y="155" width="105" height="48" class="box" fill="#f8fafc"/>
  <text x="908" y="185" class="small">size</text>
  <rect x="750" y="225" width="230" height="70" class="box data"/>
  <text x="789" y="257" class="small">binary encoded records</text>
  <text x="787" y="280" class="note">按块提取、跳过、切分</text>
  <rect x="750" y="318" width="230" height="48" class="box sync"/>
  <text x="801" y="348" class="small">same sync marker</text>
  <text x="60" y="455" class="note">要点：schema 放在 header；记录按 schema 二进制编码；block 带 count/size；sync marker 用于切分和损坏检测。</text>
</svg>
