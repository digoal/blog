<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Avro 记录的二进制编码</title>
  <desc id="desc">展示 Avro record 按字段声明顺序串接编码，不写字段名和类型信息。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .note { font-size: 13px; fill: #4b5d73; }
    .box { stroke: #26384f; stroke-width: 2; rx: 8; }
    .schema { fill: #e2f0d9; }
    .value { fill: #d9e2f3; }
    .bytes { fill: #fff2cc; }
    .warn { fill: #fce4d6; }
    .arrow { stroke: #415a77; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#415a77"/>
    </marker>
  </defs>
  <text x="40" y="48" class="title">Avro binary：紧凑来自“不写字段名和类型”</text>
  <rect x="50" y="95" width="290" height="280" class="box schema"/>
  <text x="80" y="130" class="label">Writer schema</text>
  <text x="80" y="170" class="small">record event {</text>
  <text x="105" y="205" class="small">id: long</text>
  <text x="105" y="240" class="small">user: string</text>
  <text x="105" y="275" class="small">amount: double</text>
  <text x="80" y="310" class="small">}</text>
  <path d="M340 235 L420 235" class="arrow"/>
  <rect x="430" y="95" width="260" height="280" class="box value"/>
  <text x="460" y="130" class="label">Datum</text>
  <text x="460" y="180" class="small">{ id: 27,</text>
  <text x="460" y="218" class="small">  user: "foo",</text>
  <text x="460" y="256" class="small">  amount: 12.5 }</text>
  <text x="460" y="315" class="note">字段顺序由 schema 决定</text>
  <path d="M690 235 L770 235" class="arrow"/>
  <rect x="780" y="95" width="270" height="280" class="box bytes"/>
  <text x="810" y="130" class="label">Binary bytes</text>
  <rect x="810" y="160" width="70" height="48" class="box" fill="#f8fafc"/>
  <text x="834" y="190" class="small">36</text>
  <text x="812" y="225" class="note">long 27</text>
  <rect x="895" y="160" width="120" height="48" class="box" fill="#f8fafc"/>
  <text x="917" y="190" class="small">06 66 6f 6f</text>
  <text x="900" y="225" class="note">len + UTF-8</text>
  <rect x="810" y="255" width="205" height="48" class="box" fill="#f8fafc"/>
  <text x="844" y="285" class="small">double little-endian</text>
  <rect x="50" y="410" width="1000" height="58" class="box warn"/>
  <text x="80" y="445" class="small">读错 schema 就会读错字节边界；schema evolution 的本质是用 writer schema 先定位，再映射到 reader schema。</text>
</svg>
