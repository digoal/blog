<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Avro 写入与读取路径</title>
  <desc id="desc">展示 DataFileWriter 和 DataFileStream/DataFileReader 在写入、压缩、读取、解压和解码中的职责。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13.5px; }
    .note { font-size: 13px; fill: #4b5d73; }
    .box { stroke: #26384f; stroke-width: 2; rx: 8; }
    .write { fill: #d9ead3; }
    .read { fill: #d9e2f3; }
    .file { fill: #fff2cc; }
    .codec { fill: #fce4d6; }
    .arrow { stroke: #415a77; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#415a77"/>
    </marker>
  </defs>
  <text x="40" y="48" class="title">Java reference implementation：block 是读写路径的边界</text>
  <rect x="60" y="105" width="190" height="78" class="box write"/>
  <text x="82" y="137" class="label">DatumWriter.write</text>
  <text x="82" y="162" class="small">按 schema 写入 buffer</text>
  <path d="M250 144 L320 144" class="arrow"/>
  <rect x="325" y="105" width="200" height="78" class="box write"/>
  <text x="350" y="137" class="label">DataFileWriter</text>
  <text x="350" y="162" class="small">累计 blockCount 与 bytes</text>
  <path d="M425 183 L425 245" class="arrow"/>
  <rect x="325" y="250" width="200" height="78" class="box codec"/>
  <text x="363" y="282" class="label">Codec.compress</text>
  <text x="355" y="307" class="small">null / deflate / snappy...</text>
  <path d="M525 289 L600 289" class="arrow"/>
  <rect x="605" y="250" width="230" height="78" class="box file"/>
  <text x="635" y="282" class="label">writeBlockTo</text>
  <text x="635" y="307" class="small">count, size, data, sync</text>
  <path d="M720 328 L720 395" class="arrow"/>
  <rect x="605" y="400" width="230" height="78" class="box file"/>
  <text x="641" y="432" class="label">Object Container File</text>
  <text x="646" y="457" class="small">header + blocks</text>
  <path d="M605 439 L525 439" class="arrow"/>
  <rect x="325" y="400" width="200" height="78" class="box read"/>
  <text x="362" y="432" class="label">DataFileStream</text>
  <text x="354" y="457" class="small">读 count/size/sync</text>
  <path d="M325 439 L250 439" class="arrow"/>
  <rect x="60" y="400" width="190" height="78" class="box read"/>
  <text x="88" y="432" class="label">DatumReader.read</text>
  <text x="83" y="457" class="small">ResolvingDecoder 解码</text>
  <rect x="860" y="105" width="190" height="373" class="box" fill="#f8fafc"/>
  <text x="890" y="140" class="label">关键源码</text>
  <text x="885" y="180" class="small">DataFileWriter.java</text>
  <text x="885" y="215" class="small">DataFileStream.java</text>
  <text x="885" y="250" class="small">DataBlock.writeBlockTo</text>
  <text x="885" y="285" class="small">CodecFactory.java</text>
  <text x="885" y="320" class="small">BinaryEncoder.java</text>
  <text x="885" y="355" class="small">GenericDatumReader.java</text>
  <text x="885" y="390" class="small">ResolvingDecoder.java</text>
  <text x="60" y="525" class="note">要点：writer 先在内存中形成未压缩 block，达到 sync interval 或 flush/sync 时写出；reader 先读 block 边界，再按 codec 解压，最后按 schema 解码记录。</text>
</svg>
