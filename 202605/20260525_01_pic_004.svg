<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Avro schema resolution</title>
  <desc id="desc">展示 Avro 读取时 writer schema 到 reader schema 的字段匹配、默认值和忽略字段规则。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .note { font-size: 13px; fill: #4b5d73; }
    .box { stroke: #26384f; stroke-width: 2; rx: 8; }
    .writer { fill: #d9ead3; }
    .reader { fill: #d9e2f3; }
    .rule { fill: #fff2cc; }
    .error { fill: #fce4d6; }
    .arrow { stroke: #415a77; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7f8da3; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#415a77"/>
    </marker>
  </defs>
  <text x="40" y="48" class="title">Schema evolution：文件里保存 writer schema，应用给出 reader schema</text>
  <rect x="70" y="105" width="270" height="300" class="box writer"/>
  <text x="105" y="140" class="label">Writer schema</text>
  <rect x="105" y="175" width="190" height="44" class="box" fill="#f8fafc"/>
  <text x="132" y="203" class="small">id: int</text>
  <rect x="105" y="235" width="190" height="44" class="box" fill="#f8fafc"/>
  <text x="132" y="263" class="small">name: string</text>
  <rect x="105" y="295" width="190" height="44" class="box" fill="#f8fafc"/>
  <text x="132" y="323" class="small">debug: string</text>
  <rect x="760" y="105" width="270" height="300" class="box reader"/>
  <text x="795" y="140" class="label">Reader schema</text>
  <rect x="795" y="175" width="190" height="44" class="box" fill="#f8fafc"/>
  <text x="822" y="203" class="small">id: long</text>
  <rect x="795" y="235" width="190" height="44" class="box" fill="#f8fafc"/>
  <text x="822" y="263" class="small">name: string</text>
  <rect x="795" y="295" width="190" height="44" class="box" fill="#f8fafc"/>
  <text x="822" y="323" class="small">region: string = "cn"</text>
  <path d="M295 197 L795 197" class="arrow"/>
  <text x="500" y="186" class="note">int 可提升为 long</text>
  <path d="M295 257 L795 257" class="arrow"/>
  <text x="510" y="247" class="note">同名字段递归解析</text>
  <path d="M295 317 C470 365 600 365 795 317" class="dash"/>
  <text x="500" y="370" class="note">reader 没有 debug：忽略 writer 值</text>
  <path d="M795 317 C640 430 500 430 340 395" class="dash"/>
  <text x="420" y="450" class="note">writer 没有 region：使用 reader default</text>
  <rect x="400" y="105" width="300" height="86" class="box rule"/>
  <text x="430" y="138" class="label">ResolvingDecoder</text>
  <text x="430" y="164" class="small">缓存 writer/reader schema 解析计划</text>
  <rect x="400" y="220" width="300" height="86" class="box error"/>
  <text x="430" y="253" class="label">失败边界</text>
  <text x="430" y="279" class="small">缺字段且无 default、类型不匹配、union 无匹配分支</text>
  <text x="70" y="500" class="note">要点：Avro 的兼容性不是“字段顺序随便改”；record 字段按名称匹配，但实际字节流仍由 writer schema 定位。</text>
</svg>
