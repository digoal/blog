<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Avro 与相邻格式的选型位置</title>
  <desc id="desc">从写入流动性、分析查询、schema 约束和存储层级比较 Avro、JSON、Protobuf、Parquet、ORC 和 Iceberg。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13.5px; }
    .note { font-size: 13px; fill: #4b5d73; }
    .axis { stroke: #26384f; stroke-width: 2; marker-end: url(#arrow); }
    .grid { stroke: #c8d1dc; stroke-width: 1.2; }
    .bubble { stroke: #26384f; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#26384f"/>
    </marker>
  </defs>
  <text x="40" y="48" class="title">格式选择：Avro 更靠近“流式行事件 + schema 演进”</text>
  <line x1="120" y1="445" x2="1000" y2="445" class="axis"/>
  <line x1="120" y1="445" x2="120" y2="95" class="axis"/>
  <text x="430" y="495" class="small">面向分析扫描、列裁剪、压缩统计能力增强</text>
  <text x="32" y="285" class="small" transform="rotate(-90 32,285)">schema 约束和跨语言契约增强</text>
  <line x1="120" y1="270" x2="1000" y2="270" class="grid"/>
  <line x1="560" y1="95" x2="560" y2="445" class="grid"/>
  <circle cx="250" cy="380" r="58" class="bubble" fill="#fce4d6"/>
  <text x="220" y="375" class="label">JSON</text>
  <text x="203" y="398" class="small">人可读/弱契约</text>
  <circle cx="395" cy="230" r="66" class="bubble" fill="#d9ead3"/>
  <text x="370" y="225" class="label">Avro</text>
  <text x="330" y="248" class="small">行事件/OCF/schema 演进</text>
  <circle cx="505" cy="170" r="58" class="bubble" fill="#d9e2f3"/>
  <text x="465" y="166" class="label">Protobuf</text>
  <text x="464" y="190" class="small">RPC/消息契约</text>
  <circle cx="740" cy="215" r="65" class="bubble" fill="#fff2cc"/>
  <text x="705" y="210" class="label">Parquet</text>
  <text x="685" y="234" class="small">列式分析/湖仓文件</text>
  <circle cx="880" cy="180" r="58" class="bubble" fill="#e2f0d9"/>
  <text x="858" y="176" class="label">ORC</text>
  <text x="823" y="200" class="small">列式扫描/统计索引</text>
  <circle cx="850" cy="345" r="58" class="bubble" fill="#ede7f6"/>
  <text x="823" y="340" class="label">Iceberg</text>
  <text x="797" y="364" class="small">表格式/元数据层</text>
  <text x="140" y="125" class="note">高契约</text>
  <text x="910" y="430" class="note">分析友好</text>
  <text x="145" y="475" class="note">行事件/交换</text>
  <text x="65" y="430" class="note">弱契约</text>
</svg>
