<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">pandas DataFrame 到 BlockManager 的映射</title>
  <desc id="desc">展示 pandas DataFrame 的列、Index、BlockManager、Block 和底层数组之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">逻辑表不是物理行存：pandas 先按 dtype 组织 Block</text>

  <rect x="60" y="100" width="300" height="250" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="210" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">DataFrame 逻辑视图</text>
  <rect x="95" y="160" width="70" height="40" fill="#dbeafe" stroke="#2563eb"/>
  <rect x="165" y="160" width="70" height="40" fill="#dcfce7" stroke="#16a34a"/>
  <rect x="235" y="160" width="70" height="40" fill="#fef3c7" stroke="#d97706"/>
  <text x="130" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">id</text>
  <text x="200" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">price</text>
  <text x="270" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">name</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#334155">
    <text x="78" y="230">Index: 行标签 / 对齐语义</text>
    <text x="78" y="258">Columns: 列标签 / 顺序</text>
    <text x="78" y="286">dtype: 每列可能不同</text>
    <text x="78" y="314">操作: iloc / loc / groupby / join</text>
  </g>

  <rect x="430" y="100" width="190" height="250" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="525" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">BlockManager</text>
  <text x="525" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">blocks + axes</text>
  <rect x="465" y="195" width="120" height="42" rx="4" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="525" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">items axis</text>
  <rect x="465" y="255" width="120" height="42" rx="4" fill="#ecfccb" stroke="#65a30d"/>
  <text x="525" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">index axis</text>
  <text x="525" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">校验列数、行数和 Block 维度</text>

  <rect x="700" y="90" width="210" height="90" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="805" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">NumpyBlock</text>
  <text x="805" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">int64 columns</text>
  <text x="805" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">2D ndarray, 同 dtype 可合并</text>

  <rect x="700" y="215" width="210" height="90" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="805" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">NumpyBlock</text>
  <text x="805" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">float64 columns</text>
  <text x="805" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">按块执行向量化计算</text>

  <rect x="700" y="340" width="210" height="105" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="805" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">ExtensionBlock</text>
  <text x="805" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">String / Categorical / ArrowDtype</text>
  <text x="805" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">由 ExtensionArray 管理数据和空值</text>

  <line x1="360" y1="225" x2="430" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="215" x2="700" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="240" x2="700" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="270" x2="700" y2="392" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="410" width="520" height="74" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="340" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9a3412">关键代价：按列标签看像二维表，按物理内存看是若干同质数组块</text>
  <text x="340" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9a3412">列选择通常便宜；跨 dtype 行级访问、频繁插列、对象字符串会放大成本</text>
</svg>
