<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Apache Arrow 数组内存布局</title>
  <desc id="desc">展示 Arrow 数组由类型、长度、null count、validity bitmap、offsets buffer、values buffer 和 child arrays 组成。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="500" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Arrow 把一列拆成可共享的连续 Buffer</text>

  <rect x="70" y="95" width="260" height="330" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="200" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">Array metadata</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#334155">
    <text x="100" y="170">data type: int32 / utf8 / list...</text>
    <text x="100" y="205">length: 逻辑槽位数量</text>
    <text x="100" y="240">null count: 空值数量</text>
    <text x="100" y="275">offset: 零拷贝 slice 起点</text>
    <text x="100" y="310">children: 嵌套类型的子数组</text>
  </g>

  <rect x="430" y="100" width="430" height="58" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">Validity bitmap: 每行 1 bit 表示是否有效</text>

  <rect x="430" y="205" width="430" height="58" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="645" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">Offsets buffer: 变长字符串 / list 的起止位置</text>

  <rect x="430" y="310" width="430" height="58" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="645" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">Values buffer: 连续值区，适合 SIMD 和顺序扫描</text>

  <rect x="430" y="410" width="430" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="645" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">Child arrays: struct/list/map 等嵌套列继续递归</text>

  <line x1="330" y1="215" x2="430" y2="128" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="245" x2="430" y2="234" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="275" x2="430" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="305" x2="430" y2="438" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="645" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">null_count 为 0 时 bitmap 可省略，消费者必须能处理两种情况</text>
  <text x="645" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">utf8 = offsets + data；list = offsets + child array</text>
  <text x="645" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">数据与元数据分离，便于跨语言、进程间和 GPU 共享</text>
</svg>
