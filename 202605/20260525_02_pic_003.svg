<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">pandas Copy-on-Write 写入路径</title>
  <desc id="desc">展示 pandas 切片共享 Block 值，写入时通过引用跟踪决定是否复制。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Copy-on-Write：读路径共享，写路径复制</text>

  <rect x="80" y="105" width="200" height="90" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">df</text>
  <text x="180" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">BlockManager A</text>

  <rect x="80" y="300" width="200" height="90" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="180" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">view = df[cols]</text>
  <text x="180" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">BlockManager B</text>

  <rect x="390" y="180" width="220" height="120" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="500" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">Block values</text>
  <text x="500" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">共享底层数组</text>
  <text x="500" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">BlockValuesRefs 记录引用</text>

  <rect x="710" y="120" width="190" height="80" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="805" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">写入 df</text>
  <text x="805" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">若仍共享，先复制</text>

  <rect x="710" y="310" width="190" height="80" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="805" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">写入 view</text>
  <text x="805" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">只影响 view 语义</text>

  <line x1="280" y1="150" x2="390" y2="220" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="345" x2="390" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="220" x2="710" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="260" x2="710" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="490" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">工程含义：少量读切片可以省复制；第一次写共享数据会产生复制和内存峰值</text>
</svg>
