<svg xmlns="http://www.w3.org/2000/svg" width="980" height="610" viewBox="0 0 980 610" role="img" aria-labelledby="title desc">
  <title id="title">pandas、Polars、Dask、cuDF 的 DataFrame 存储对比</title>
  <desc id="desc">比较四类 DataFrame 系统的存储主体、执行粒度和主要代价。</desc>
  <rect x="20" y="20" width="940" height="570" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">同叫 DataFrame，物理边界完全不同</text>

  <g font-family="Arial, sans-serif">
    <rect x="65" y="105" width="190" height="390" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="160" y="138" text-anchor="middle" font-size="19" fill="#0f172a">pandas</text>
    <rect x="92" y="170" width="136" height="52" rx="4" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="160" y="201" text-anchor="middle" font-size="14">BlockManager</text>
    <rect x="92" y="250" width="136" height="52" rx="4" fill="#dbeafe" stroke="#2563eb"/>
    <text x="160" y="281" text-anchor="middle" font-size="14">NumpyBlock</text>
    <rect x="92" y="330" width="136" height="52" rx="4" fill="#fef3c7" stroke="#d97706"/>
    <text x="160" y="361" text-anchor="middle" font-size="14">ExtensionBlock</text>
    <text x="160" y="425" text-anchor="middle" font-size="13" fill="#475569">单机内存</text>
    <text x="160" y="450" text-anchor="middle" font-size="13" fill="#475569">eager 为主</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="290" y="105" width="190" height="390" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="385" y="138" text-anchor="middle" font-size="19" fill="#0f172a">Polars</text>
    <rect x="317" y="170" width="136" height="52" rx="4" fill="#dcfce7" stroke="#16a34a"/>
    <text x="385" y="201" text-anchor="middle" font-size="14">DataFrame</text>
    <rect x="317" y="250" width="136" height="52" rx="4" fill="#bbf7d0" stroke="#16a34a"/>
    <text x="385" y="281" text-anchor="middle" font-size="14">Series</text>
    <rect x="317" y="330" width="136" height="52" rx="4" fill="#dcfce7" stroke="#16a34a"/>
    <text x="385" y="361" text-anchor="middle" font-size="14">ChunkedArray</text>
    <text x="385" y="425" text-anchor="middle" font-size="13" fill="#475569">Arrow chunks</text>
    <text x="385" y="450" text-anchor="middle" font-size="13" fill="#475569">lazy + optimizer</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="515" y="105" width="190" height="390" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="610" y="138" text-anchor="middle" font-size="19" fill="#0f172a">Dask</text>
    <rect x="542" y="170" width="136" height="52" rx="4" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="610" y="201" text-anchor="middle" font-size="14">Expr graph</text>
    <rect x="542" y="250" width="136" height="52" rx="4" fill="#f3e8ff" stroke="#9333ea"/>
    <text x="610" y="281" text-anchor="middle" font-size="14">Partitions</text>
    <rect x="542" y="330" width="136" height="52" rx="4" fill="#faf5ff" stroke="#a855f7"/>
    <text x="610" y="361" text-anchor="middle" font-size="14">pandas DataFrame</text>
    <text x="610" y="425" text-anchor="middle" font-size="13" fill="#475569">分区边界 divisions</text>
    <text x="610" y="450" text-anchor="middle" font-size="13" fill="#475569">调度和 shuffle 成本</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="740" y="105" width="190" height="390" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="835" y="138" text-anchor="middle" font-size="19" fill="#0f172a">cuDF</text>
    <rect x="767" y="170" width="136" height="52" rx="4" fill="#cffafe" stroke="#0891b2"/>
    <text x="835" y="201" text-anchor="middle" font-size="14">table_view</text>
    <rect x="767" y="250" width="136" height="52" rx="4" fill="#a5f3fc" stroke="#0891b2"/>
    <text x="835" y="281" text-anchor="middle" font-size="14">column_view</text>
    <rect x="767" y="330" width="136" height="52" rx="4" fill="#cffafe" stroke="#0891b2"/>
    <text x="835" y="361" text-anchor="middle" font-size="14">device buffers</text>
    <text x="835" y="425" text-anchor="middle" font-size="13" fill="#475569">GPU Arrow-like layout</text>
    <text x="835" y="450" text-anchor="middle" font-size="13" fill="#475569">PCIe / GPU 内存边界</text>
  </g>

  <text x="490" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">选型要先问：瓶颈是单列扫描、跨列行操作、超内存分区、还是 GPU 并行算子？</text>
</svg>
