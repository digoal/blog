<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">Iceberg 元数据树</title>
  <desc id="desc">展示从 catalog 指针到 table metadata、snapshot、manifest list、manifest、data file 和 delete file 的引用关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .meta { fill: #e0f2fe; stroke: #0369a1; }
    .snap { fill: #ecfdf5; stroke: #047857; }
    .mani { fill: #fff7ed; stroke: #c2410c; }
    .file { fill: #f8fafc; stroke: #475569; }
    .del { fill: #fef2f2; stroke: #b91c1c; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .muted { stroke: #94a3b8; stroke-dasharray: 5 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="box meta" x="40" y="70" width="180" height="86"/>
  <text class="title" x="70" y="105">Catalog 指针</text>
  <text class="small" x="64" y="132">current metadata location</text>

  <rect class="box meta" x="310" y="45" width="250" height="138"/>
  <text class="title" x="350" y="82">metadata.json</text>
  <text class="label" x="335" y="112">schema / partition specs</text>
  <text class="label" x="335" y="138">sort orders / refs</text>
  <text class="label" x="335" y="164">snapshots / properties</text>

  <rect class="box snap" x="665" y="35" width="190" height="90"/>
  <text class="title" x="710" y="72">Snapshot A</text>
  <text class="small" x="695" y="100">旧版本，可 time travel</text>

  <rect class="box snap" x="665" y="160" width="190" height="104"/>
  <text class="title" x="710" y="197">Snapshot B</text>
  <text class="label" x="698" y="224">current-snapshot</text>
  <text class="small" x="700" y="246">manifest-list = snap-*.avro</text>

  <rect class="box mani" x="420" y="305" width="250" height="96"/>
  <text class="title" x="476" y="342">Manifest List</text>
  <text class="label" x="450" y="370">manifest 路径、分区统计</text>
  <text class="small" x="452" y="391">每个 snapshot 一份</text>

  <rect class="box mani" x="135" y="480" width="210" height="92"/>
  <text class="title" x="182" y="516">Data Manifest</text>
  <text class="small" x="158" y="544">data files + partition + metrics</text>

  <rect class="box mani del" x="440" y="480" width="210" height="92"/>
  <text class="title" x="480" y="516">Delete Manifest</text>
  <text class="small" x="465" y="544">position/equality/DV delete files</text>

  <rect class="box file" x="40" y="585" width="126" height="38"/>
  <text class="label" x="66" y="610">Parquet</text>
  <rect class="box file" x="185" y="585" width="126" height="38"/>
  <text class="label" x="222" y="610">ORC</text>
  <rect class="box file" x="330" y="585" width="126" height="38"/>
  <text class="label" x="363" y="610">Avro</text>

  <rect class="box del" x="500" y="585" width="145" height="38"/>
  <text class="label" x="524" y="610">Delete File</text>

  <path class="arrow" d="M220 113 L310 113"/>
  <path class="arrow" d="M560 92 C610 80 620 78 665 80"/>
  <path class="arrow" d="M560 142 C618 158 620 205 665 211"/>
  <path class="arrow muted" d="M760 125 L760 160"/>
  <path class="arrow" d="M760 264 C750 310 685 345 670 352"/>
  <path class="arrow" d="M500 401 C420 435 330 465 265 480"/>
  <path class="arrow" d="M560 401 C562 430 560 455 552 480"/>
  <path class="arrow" d="M242 572 L105 585"/>
  <path class="arrow" d="M242 572 L248 585"/>
  <path class="arrow" d="M242 572 L393 585"/>
  <path class="arrow" d="M545 572 L572 585"/>

  <text class="small" x="760" y="390">Manifest List 是规划入口，先用 manifest 级统计裁剪，再读 manifest 条目。</text>
</svg>
