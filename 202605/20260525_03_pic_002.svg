<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Iceberg 扫描规划和裁剪路径</title>
  <desc id="desc">展示 SQL 谓词如何投影为分区谓词，先裁剪 manifest，再裁剪 data file，并为数据文件关联 delete files。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .box { fill: #fff; stroke: #334155; stroke-width: 2; rx: 8; }
    .q { fill: #e0f2fe; stroke: #0284c7; }
    .m { fill: #fff7ed; stroke: #ea580c; }
    .d { fill: #ecfdf5; stroke: #059669; }
    .x { fill: #f1f5f9; stroke: #94a3b8; }
    .del { fill: #fef2f2; stroke: #dc2626; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .skip { stroke: #dc2626; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="box q" x="55" y="70" width="220" height="96"/>
  <text class="title" x="103" y="108">查询谓词</text>
  <text class="label" x="78" y="137">event_time between ...</text>
  <text class="small" x="86" y="158">用户不写隐藏分区列</text>

  <rect class="box q" x="350" y="70" width="260" height="96"/>
  <text class="title" x="400" y="108">Partition Projection</text>
  <text class="label" x="377" y="137">day(event_time) = 2026-05-25</text>
  <text class="small" x="394" y="158">按 spec id 分别推导</text>

  <rect class="box m" x="700" y="45" width="170" height="70"/>
  <text class="label" x="728" y="78">Manifest 1</text>
  <text class="small" x="723" y="99">partition range 命中</text>
  <rect class="box x" x="700" y="142" width="170" height="70"/>
  <text class="label" x="728" y="175">Manifest 2</text>
  <text class="small" x="724" y="196">被 manifest 统计跳过</text>
  <rect class="box m" x="700" y="239" width="170" height="70"/>
  <text class="label" x="728" y="272">Manifest 3</text>
  <text class="small" x="723" y="293">partition range 命中</text>

  <rect class="box d" x="205" y="390" width="170" height="70"/>
  <text class="label" x="245" y="423">Data File A</text>
  <text class="small" x="230" y="444">min/max 命中</text>
  <rect class="box x" x="465" y="390" width="170" height="70"/>
  <text class="label" x="505" y="423">Data File B</text>
  <text class="small" x="488" y="444">文件统计跳过</text>
  <rect class="box d" x="725" y="390" width="170" height="70"/>
  <text class="label" x="765" y="423">Data File C</text>
  <text class="small" x="750" y="444">生成 FileScanTask</text>

  <rect class="box del" x="345" y="525" width="420" height="58"/>
  <text class="label" x="385" y="558">DeleteFileIndex 按 sequence / partition / path 匹配 delete files</text>

  <path class="arrow" d="M275 118 L350 118"/>
  <path class="arrow" d="M610 118 C650 96 666 82 700 80"/>
  <path class="skip" d="M610 130 C650 155 668 175 700 177"/>
  <path class="arrow" d="M610 140 C655 220 668 270 700 274"/>

  <path class="arrow" d="M760 309 C690 350 370 365 292 390"/>
  <path class="skip" d="M785 309 C730 360 620 370 550 390"/>
  <path class="arrow" d="M810 309 C812 345 812 365 812 390"/>

  <path class="arrow" d="M290 460 C345 492 420 515 495 525"/>
  <path class="arrow" d="M810 460 C740 500 666 520 615 525"/>
  <text class="small" x="66" y="240">两级裁剪的关键：目录不再是事实来源，manifest/manifest entry 的统计才是扫描入口。</text>
</svg>
