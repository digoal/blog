<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Iceberg 行级删除文件</title>
  <desc id="desc">展示 position delete、equality delete 和 deletion vector 与 data file 的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .data { fill: #ecfdf5; stroke: #047857; }
    .pos { fill: #eff6ff; stroke: #2563eb; }
    .eq { fill: #fff7ed; stroke: #ea580c; }
    .dv { fill: #fef2f2; stroke: #dc2626; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="box data" x="435" y="55" width="240" height="250"/>
  <text class="title" x="482" y="92">Data File</text>
  <text class="label" x="470" y="125">file_path = f1.parquet</text>
  <text class="label" x="470" y="152">sequence = 10</text>
  <line x1="465" y1="178" x2="645" y2="178" stroke="#94a3b8"/>
  <text class="small" x="482" y="205">pos 0: id=1</text>
  <text class="small" x="482" y="232">pos 1: id=2</text>
  <text class="small" x="482" y="259">pos 2: id=3</text>
  <text class="small" x="482" y="286">pos 3: id=4</text>

  <rect class="box pos" x="70" y="375" width="250" height="116"/>
  <text class="title" x="110" y="412">Position Delete</text>
  <text class="label" x="95" y="442">f1.parquet, pos=2</text>
  <text class="small" x="95" y="468">精准，但依赖文件路径和行位置</text>

  <rect class="box eq" x="425" y="375" width="250" height="116"/>
  <text class="title" x="470" y="412">Equality Delete</text>
  <text class="label" x="455" y="442">id = 3</text>
  <text class="small" x="455" y="468">写入友好，读取时需要匹配列值</text>

  <rect class="box dv" x="780" y="375" width="250" height="116"/>
  <text class="title" x="830" y="412">Deletion Vector</text>
  <text class="label" x="810" y="442">referenced_data_file=f1</text>
  <text class="small" x="810" y="468">位图标记被删除行</text>

  <path class="arrow" d="M320 418 C390 370 430 320 470 305"/>
  <path class="arrow" d="M550 375 L550 305"/>
  <path class="arrow" d="M780 418 C700 365 650 320 625 305"/>

  <text class="small" x="82" y="555">读路径不是改写 data file，而是在 FileScanTask 中把匹配的 delete files 带给执行引擎合并过滤。</text>
</svg>
