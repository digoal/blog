<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Iceberg 提交和快照隔离</title>
  <desc id="desc">展示读者固定旧 metadata，写者生成新 manifest list 和 metadata，最后通过 catalog 指针原子交换提交。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .old { fill: #f1f5f9; stroke: #64748b; }
    .new { fill: #ecfdf5; stroke: #059669; }
    .writer { fill: #fff7ed; stroke: #ea580c; }
    .reader { fill: #e0f2fe; stroke: #0284c7; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .green { stroke: #059669; }
    .blue { stroke: #0284c7; }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="box old" x="80" y="70" width="210" height="82"/>
  <text class="title" x="127" y="105">Catalog</text>
  <text class="small" x="112" y="132">指向 v12.metadata.json</text>

  <rect class="box old" x="420" y="55" width="230" height="110"/>
  <text class="title" x="472" y="94">v12 metadata</text>
  <text class="label" x="452" y="124">current snapshot = S12</text>
  <text class="small" x="458" y="146">读者加载后固定此视图</text>

  <rect class="box reader" x="760" y="55" width="235" height="110"/>
  <text class="title" x="832" y="94">Reader</text>
  <text class="label" x="800" y="124">使用 S12 规划扫描</text>
  <text class="small" x="793" y="146">不被并发提交影响</text>

  <rect class="box writer" x="115" y="280" width="230" height="82"/>
  <text class="title" x="178" y="315">Writer</text>
  <text class="label" x="145" y="342">写 data/delete files</text>

  <rect class="box writer" x="430" y="255" width="230" height="130"/>
  <text class="title" x="468" y="292">新元数据文件</text>
  <text class="label" x="455" y="322">new manifests</text>
  <text class="label" x="455" y="348">new manifest list</text>
  <text class="label" x="455" y="374">v13.metadata.json</text>

  <rect class="box new" x="760" y="280" width="235" height="82"/>
  <text class="title" x="807" y="315">Atomic Swap</text>
  <text class="label" x="792" y="342">base v12 -> new v13</text>

  <rect class="box new" x="420" y="470" width="230" height="90"/>
  <text class="title" x="472" y="506">v13 metadata</text>
  <text class="label" x="452" y="534">current snapshot = S13</text>

  <path class="arrow" d="M290 111 L420 111"/>
  <path class="arrow blue" d="M650 111 L760 111"/>
  <path class="arrow green" d="M345 321 L430 321"/>
  <path class="arrow green" d="M660 321 L760 321"/>
  <path class="arrow green" d="M877 362 C805 472 710 515 650 515"/>
  <path class="arrow green" d="M535 470 C430 405 280 190 190 152"/>
  <path class="arrow dash" d="M878 165 C900 210 900 250 878 280"/>

  <text class="small" x="78" y="430">失败重试时只要 base 已变化，写者重新基于最新 metadata 应用变更；读者不会看到半提交状态。</text>
</svg>
