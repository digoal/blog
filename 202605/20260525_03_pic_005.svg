<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Iceberg 维护和代价边界</title>
  <desc id="desc">展示小文件、过多快照、manifest 失配、孤儿文件和 delete file 累积对应的维护动作。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .problem { fill: #fef2f2; stroke: #dc2626; }
    .action { fill: #ecfdf5; stroke: #059669; }
    .metric { fill: #eff6ff; stroke: #2563eb; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="box problem" x="50" y="70" width="210" height="80"/>
  <text class="label" x="82" y="105">小 data files 过多</text>
  <text class="small" x="82" y="130">open cost / manifest 膨胀</text>
  <rect class="box action" x="340" y="70" width="220" height="80"/>
  <text class="label" x="385" y="105">rewriteDataFiles</text>
  <text class="small" x="372" y="130">合并小文件，降低扫描碎片</text>

  <rect class="box problem" x="50" y="190" width="210" height="80"/>
  <text class="label" x="82" y="225">快照长期不清理</text>
  <text class="small" x="82" y="250">metadata / 数据引用累积</text>
  <rect class="box action" x="340" y="190" width="220" height="80"/>
  <text class="label" x="390" y="225">expireSnapshots</text>
  <text class="small" x="372" y="250">释放不再引用的旧文件</text>

  <rect class="box problem" x="50" y="310" width="210" height="80"/>
  <text class="label" x="82" y="345">manifest 与查询错位</text>
  <text class="small" x="82" y="370">裁剪效率下降</text>
  <rect class="box action" x="340" y="310" width="220" height="80"/>
  <text class="label" x="390" y="345">rewriteManifests</text>
  <text class="small" x="372" y="370">按读路径重组元数据索引</text>

  <rect class="box problem" x="50" y="430" width="210" height="80"/>
  <text class="label" x="82" y="465">失败任务残留文件</text>
  <text class="small" x="82" y="490">不被 metadata 引用</text>
  <rect class="box action" x="340" y="430" width="220" height="80"/>
  <text class="label" x="390" y="465">deleteOrphanFiles</text>
  <text class="small" x="372" y="490">保守 retention，避免误删</text>

  <rect class="box metric" x="705" y="145" width="310" height="300"/>
  <text class="title" x="770" y="185">观察指标</text>
  <text class="label" x="735" y="225">files metadata table: 文件大小</text>
  <text class="label" x="735" y="265">manifests table: manifest 数量与分布</text>
  <text class="label" x="735" y="305">snapshots/history: 快照链长度</text>
  <text class="label" x="735" y="345">entries: delete/data file 比例</text>
  <text class="label" x="735" y="385">引擎 profile: scanned vs skipped</text>

  <path class="arrow" d="M260 110 L340 110"/>
  <path class="arrow" d="M260 230 L340 230"/>
  <path class="arrow" d="M260 350 L340 350"/>
  <path class="arrow" d="M260 470 L340 470"/>
  <path class="arrow" d="M560 110 C640 130 670 160 705 185"/>
  <path class="arrow" d="M560 350 C625 340 660 320 705 300"/>
  <path class="arrow" d="M560 470 C640 430 665 395 705 370"/>
</svg>
