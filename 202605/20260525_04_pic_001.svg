<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>Delta Lake 表目录与存储结构</title>
  <desc>展示 Delta Lake 表根目录、_delta_log 事务日志目录、Parquet 数据文件、分区目录、checkpoint、last_checkpoint 与可选 deletion vector 文件之间的关系。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .log{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:8}
    .data{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:8}
    .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#0f172a}
    .arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="920" height="500" class="box"/>
  <text x="58" y="64" class="text">表根目录：/events</text>

  <rect x="70" y="96" width="370" height="320" class="log"/>
  <text x="92" y="130" class="text">_delta_log/</text>
  <text x="105" y="166" class="mono">00000000000000000000.json</text>
  <text x="105" y="198" class="mono">00000000000000000001.json</text>
  <text x="105" y="230" class="mono">00000000000000000002.json</text>
  <text x="105" y="275" class="mono">00000000000000000010.checkpoint.parquet</text>
  <text x="105" y="308" class="mono">_last_checkpoint</text>
  <text x="105" y="352" class="small">JSON commit：一行一个 action</text>
  <text x="105" y="378" class="small">Checkpoint：某版本完整状态，减少重放</text>

  <rect x="540" y="96" width="350" height="78" class="data"/>
  <text x="562" y="129" class="text">数据文件</text>
  <text x="562" y="157" class="mono">part-0000-...snappy.parquet</text>

  <rect x="540" y="206" width="350" height="104" class="data"/>
  <text x="562" y="239" class="text">Hive 风格分区目录（可选）</text>
  <text x="562" y="268" class="mono">date=2026-05-25/part-....parquet</text>
  <text x="562" y="294" class="small">分区值仍以 AddFile.partitionValues 为准</text>

  <rect x="540" y="344" width="350" height="72" class="warn"/>
  <text x="562" y="376" class="text">Deletion Vector（可选）</text>
  <text x="562" y="402" class="small">位图标记某文件中逻辑删除的行</text>

  <path d="M440 178 C475 160,500 143,540 135" class="arrow"/>
  <text x="450" y="150" class="small">add.path</text>
  <path d="M440 286 C485 268,505 258,540 258" class="arrow"/>
  <text x="452" y="257" class="small">add.partitionValues</text>
  <path d="M440 355 C485 374,505 380,540 380" class="arrow"/>
  <text x="452" y="392" class="small">add.deletionVector</text>

  <rect x="70" y="452" width="820" height="46" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="8"/>
  <text x="92" y="482" class="small">关键点：Delta 不靠列目录推断表状态；当前可见文件集合由事务日志动作重放得到。</text>
</svg>
