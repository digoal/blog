<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>Delta Lake 快照重放与 checkpoint 加速</title>
  <desc>展示读者从 _last_checkpoint 找到最近 checkpoint，再读取后续 JSON commit，并按 action reconciliation 规则得到当前 add 文件集合和 tombstone。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .cp{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:8}
    .json{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:8}
    .state{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:8}
    .dead{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#0f172a}
    .arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="48" y="48" class="text">构造 Snapshot v45：从最近完整 checkpoint 开始，不从 v0 全量重放</text>

  <rect x="60" y="92" width="230" height="80" class="box"/>
  <text x="82" y="124" class="mono">_last_checkpoint</text>
  <text x="82" y="150" class="small">指向 checkpoint v42</text>
  <path d="M290 132 L365 132" class="arrow"/>

  <rect x="380" y="92" width="230" height="80" class="cp"/>
  <text x="405" y="124" class="mono">42.checkpoint.parquet</text>
  <text x="405" y="150" class="small">已消解的完整表状态</text>
  <path d="M610 132 L690 132" class="arrow"/>

  <rect x="705" y="72" width="210" height="120" class="json"/>
  <text x="730" y="105" class="mono">43.json</text>
  <text x="730" y="132" class="mono">44.json</text>
  <text x="730" y="159" class="mono">45.json</text>
  <text x="730" y="182" class="small">后续增量动作</text>

  <path d="M810 192 C810 245,760 260,710 278" class="arrow"/>
  <rect x="80" y="265" width="830" height="210" class="box"/>
  <text x="110" y="303" class="text">Action reconciliation 规则</text>
  <rect x="120" y="330" width="170" height="52" class="state"/>
  <text x="142" y="362" class="small">最新 protocol 生效</text>
  <rect x="310" y="330" width="170" height="52" class="state"/>
  <text x="332" y="362" class="small">最新 metadata 生效</text>
  <rect x="500" y="330" width="170" height="52" class="state"/>
  <text x="522" y="362" class="small">按 path/DV 保留最新 add</text>
  <rect x="690" y="330" width="170" height="52" class="dead"/>
  <text x="712" y="362" class="small">remove 保留为 tombstone</text>
  <text x="120" y="424" class="small">查询路径只返回有效 AddFile；VACUUM 路径才需要未过期 tombstone。</text>
  <text x="120" y="450" class="small">Checkpoint 也存储 add/remove/protocol/metadata/txn 等 action，只是把过期或被覆盖动作清掉。</text>
</svg>
