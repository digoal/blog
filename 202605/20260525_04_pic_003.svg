<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>Delta Lake MVCC 与乐观提交路径</title>
  <desc>展示读者固定旧快照，写者先写新 Parquet 文件，再通过创建下一版本 JSON 日志提交；冲突时检查 winning commits 并重试。</desc>
  <style>
    .lane{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:8}
    .old{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:8}
    .new{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:8}
    .commit{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:8}
    .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#0f172a}
    .arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .line{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 6}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="42" y="48" class="text">同一张表的两个时间线：读者固定快照，写者原子发布新版本</text>

  <rect x="48" y="78" width="884" height="160" class="lane"/>
  <text x="70" y="112" class="text">读者 R</text>
  <rect x="170" y="105" width="170" height="72" class="old"/>
  <text x="194" y="136" class="mono">Snapshot v10</text>
  <text x="194" y="160" class="small">files = A,B,C</text>
  <path d="M340 142 L665 142" class="arrow"/>
  <rect x="680" y="105" width="180" height="72" class="old"/>
  <text x="705" y="136" class="small">继续读 A,B,C</text>
  <text x="705" y="160" class="small">不看未提交文件</text>

  <rect x="48" y="270" width="884" height="220" class="lane"/>
  <text x="70" y="305" class="text">写者 W</text>
  <rect x="170" y="302" width="160" height="66" class="old"/>
  <text x="192" y="331" class="mono">Read v10</text>
  <text x="192" y="354" class="small">记录读集合/谓词</text>
  <path d="M330 335 L445 335" class="arrow"/>
  <rect x="455" y="302" width="175" height="66" class="new"/>
  <text x="478" y="331" class="small">先写新数据文件</text>
  <text x="478" y="354" class="mono">D.parquet</text>
  <path d="M630 335 L740 335" class="arrow"/>
  <rect x="750" y="302" width="150" height="66" class="commit"/>
  <text x="772" y="331" class="mono">v11.json</text>
  <text x="772" y="354" class="small">add D, remove B</text>

  <line x1="825" y1="368" x2="825" y2="430" class="line"/>
  <rect x="630" y="425" width="270" height="46" class="bad"/>
  <text x="648" y="454" class="small">若 v11 已存在：读取冲突版本，校验语义后重试 v12</text>

  <rect x="170" y="420" width="350" height="50" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="8"/>
  <text x="190" y="451" class="small">成功提交前，孤儿数据文件不属于任何快照。</text>
</svg>
