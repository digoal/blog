<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>Delta Lake 文件级统计与 Data Skipping</title>
  <desc>展示 AddFile 统计信息中的 numRecords、minValues、maxValues、nullCount 如何配合查询谓词过滤文件，缺失统计时必须保守读取文件。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .keep{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:8}
    .skip{fill:#e2e8f0;stroke:#64748b;stroke-width:2;rx:8}
    .maybe{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .query{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#0f172a}
    .arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="50" y="48" class="text">Data Skipping：用事务日志里的文件统计先少读 Parquet 文件</text>

  <rect x="60" y="82" width="350" height="90" class="query"/>
  <text x="85" y="116" class="text">查询谓词</text>
  <text x="85" y="146" class="mono">WHERE user_id = 42</text>
  <path d="M410 128 L500 128" class="arrow"/>

  <rect x="510" y="82" width="390" height="90" class="box"/>
  <text x="535" y="116" class="text">读取 Snapshot 的 AddFile.stats</text>
  <text x="535" y="146" class="small">numRecords / minValues / maxValues / nullCount</text>

  <rect x="80" y="230" width="245" height="110" class="skip"/>
  <text x="105" y="262" class="mono">file A</text>
  <text x="105" y="290" class="small">min(user_id)=1</text>
  <text x="105" y="316" class="small">max(user_id)=20</text>

  <rect x="365" y="230" width="245" height="110" class="keep"/>
  <text x="390" y="262" class="mono">file B</text>
  <text x="390" y="290" class="small">min(user_id)=35</text>
  <text x="390" y="316" class="small">max(user_id)=60</text>

  <rect x="650" y="230" width="245" height="110" class="maybe"/>
  <text x="675" y="262" class="mono">file C</text>
  <text x="675" y="290" class="small">stats 缺失或不可信</text>
  <text x="675" y="316" class="small">必须保守读取</text>

  <path d="M203 340 L203 415" class="arrow"/>
  <path d="M488 340 L488 415" class="arrow"/>
  <path d="M773 340 L773 415" class="arrow"/>

  <rect x="110" y="420" width="185" height="58" class="skip"/>
  <text x="143" y="455" class="small">跳过，不读对象存储</text>
  <rect x="395" y="420" width="185" height="58" class="keep"/>
  <text x="424" y="455" class="small">读取并执行 Parquet 裁剪</text>
  <rect x="680" y="420" width="185" height="58" class="maybe"/>
  <text x="708" y="455" class="small">保留，避免漏读</text>
</svg>
