<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>Delta Lake OPTIMIZE 与 Z-Order 重排</title>
  <desc>展示小文件压缩和 Z-Order 多维聚簇如何把多个旧文件重写成范围更紧的新文件，并用 dataChange=false 标记纯布局变化。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .old{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:8}
    .shuffle{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:8}
    .new{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:8}
    .log{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;fill:#334155}
    .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#0f172a}
    .arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="48" y="48" class="text">OPTIMIZE：不改变逻辑结果，改变文件粒度与行分布</text>

  <rect x="60" y="95" width="210" height="295" class="box"/>
  <text x="88" y="130" class="text">旧文件</text>
  <rect x="95" y="160" width="140" height="44" class="old"/><text x="122" y="188" class="mono">f1 small</text>
  <rect x="95" y="220" width="140" height="44" class="old"/><text x="122" y="248" class="mono">f2 small</text>
  <rect x="95" y="280" width="140" height="44" class="old"/><text x="122" y="308" class="mono">f3 small</text>
  <text x="88" y="356" class="small">范围重叠，跳过效果弱</text>

  <path d="M270 245 L370 245" class="arrow"/>
  <rect x="385" y="145" width="230" height="190" class="shuffle"/>
  <text x="412" y="180" class="text">重写任务</text>
  <text x="412" y="214" class="small">bin-packing：合并小文件</text>
  <text x="412" y="246" class="small">Z-Order：range id + interleave bits</text>
  <text x="412" y="278" class="small">按空间填充曲线 range repartition</text>
  <text x="412" y="310" class="small">可选 sortWithinPartitions</text>
  <path d="M615 245 L715 245" class="arrow"/>

  <rect x="730" y="95" width="200" height="295" class="box"/>
  <text x="758" y="130" class="text">新文件</text>
  <rect x="765" y="170" width="130" height="54" class="new"/><text x="787" y="202" class="mono">g1 larger</text>
  <rect x="765" y="252" width="130" height="54" class="new"/><text x="787" y="284" class="mono">g2 larger</text>
  <text x="758" y="356" class="small">min/max 更紧，文件数更少</text>

  <rect x="210" y="430" width="560" height="70" class="log"/>
  <text x="238" y="462" class="small">同一 commit 写入：add(g1,g2,dataChange=false) + remove(f1,f2,f3,dataChange=false)</text>
  <text x="238" y="486" class="small">流式读者可识别这类纯布局变化，不把它当作业务数据新增/删除。</text>
</svg>
