<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">Apache Hudi 表目录、timeline 与 file group 的关系</title>
  <desc id="desc">展示 Hudi 表根目录下的数据分区、.hoodie 元数据目录、timeline，以及每个分区中的 file group 和 file slice。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .meta { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .data { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .slice { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .file { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 5; }
    .label { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="1020" height="584" class="box"/>
  <text x="60" y="66" class="label">表根目录 /table_base_path</text>

  <rect x="60" y="92" width="300" height="460" class="meta"/>
  <text x="84" y="126" class="label">.hoodie 元数据目录</text>
  <rect x="92" y="154" width="236" height="52" class="file"/>
  <text x="112" y="186" class="small">hoodie.properties</text>
  <rect x="92" y="226" width="236" height="92" class="file"/>
  <text x="112" y="258" class="small">timeline/</text>
  <text x="112" y="284" class="tiny">001.commit</text>
  <text x="112" y="306" class="tiny">002.deltacommit</text>
  <rect x="92" y="338" width="236" height="72" class="file"/>
  <text x="112" y="370" class="small">metadata/</text>
  <text x="112" y="394" class="tiny">内部 MOR 元数据表</text>
  <rect x="92" y="430" width="236" height="72" class="file"/>
  <text x="112" y="462" class="small">.aux / .temp / .schema</text>
  <text x="112" y="486" class="tiny">计划、临时文件、schema 历史</text>

  <rect x="420" y="92" width="560" height="460" class="data"/>
  <text x="448" y="126" class="label">数据分区目录</text>

  <rect x="456" y="154" width="474" height="170" class="file"/>
  <text x="480" y="188" class="small">dt=2026-05-25/</text>
  <rect x="490" y="214" width="390" height="80" class="slice"/>
  <text x="512" y="244" class="small">file group: fileId=A</text>
  <text x="512" y="270" class="tiny">slice@001: base Parquet + logs until next base instant</text>

  <rect x="456" y="350" width="474" height="160" class="file"/>
  <text x="480" y="384" class="small">dt=2026-05-26/</text>
  <rect x="490" y="410" width="390" height="70" class="slice"/>
  <text x="512" y="440" class="small">file group: fileId=B</text>
  <text x="512" y="466" class="tiny">多个 file slice 表示同一 file group 的多版本</text>

  <path d="M360 270 C390 270 390 240 420 240" class="arrow"/>
  <text x="360" y="230" class="tiny">timeline 决定哪些 slice 可见</text>
  <path d="M360 374 C390 374 390 374 420 374" class="arrow"/>
  <text x="360" y="414" class="tiny">metadata table 减少目录 listing</text>
</svg>
