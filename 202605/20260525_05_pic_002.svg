<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Copy-On-Write 与 Merge-On-Read 写入路径对比</title>
  <desc id="desc">对比 Hudi COW 表重写 base file 和 MOR 表追加 log file 后异步 compaction 的数据路径。</desc>
  <style>
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .cow { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .mor { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .step { fill: #ffffff; stroke: #64748b; stroke-width: 1.6; rx: 6; }
    .cost { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 6; }
    .label { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: bold; }
    .text { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="30" width="1060" height="560" class="panel"/>
  <text x="60" y="70" class="label">同一批 upsert/delete，COW 和 MOR 偿还代价的位置不同</text>

  <rect x="70" y="105" width="460" height="420" class="cow"/>
  <text x="95" y="142" class="label">COPY_ON_WRITE</text>
  <rect x="112" y="178" width="160" height="58" class="step"/>
  <text x="132" y="212" class="text">索引定位 file group</text>
  <path d="M272 207 L322 207" class="arrow"/>
  <rect x="322" y="178" width="160" height="58" class="step"/>
  <text x="342" y="204" class="text">读旧 base file</text>
  <text x="342" y="224" class="tiny">Parquet/ORC/HFile</text>
  <path d="M402 236 L402 284" class="arrow"/>
  <rect x="280" y="284" width="244" height="68" class="step"/>
  <text x="302" y="314" class="text">同步合并变更</text>
  <text x="302" y="336" class="tiny">写出新的 base file slice</text>
  <path d="M280 318 L230 318" class="arrow"/>
  <rect x="92" y="284" width="138" height="68" class="step"/>
  <text x="112" y="314" class="text">commit</text>
  <text x="112" y="336" class="tiny">发布可见性</text>
  <rect x="112" y="386" width="370" height="84" class="cost"/>
  <text x="134" y="418" class="text">代价位置：写入时重写文件</text>
  <text x="134" y="442" class="tiny">读路径简单，写放大取决于被更新的 file group 大小</text>

  <rect x="590" y="105" width="460" height="420" class="mor"/>
  <text x="615" y="142" class="label">MERGE_ON_READ</text>
  <rect x="632" y="178" width="160" height="58" class="step"/>
  <text x="652" y="212" class="text">索引定位 file group</text>
  <path d="M792 207 L842 207" class="arrow"/>
  <rect x="842" y="178" width="160" height="58" class="step"/>
  <text x="862" y="204" class="text">追加 log block</text>
  <text x="862" y="224" class="tiny">Avro/Parquet/HFile log</text>
  <path d="M922 236 L922 284" class="arrow"/>
  <rect x="800" y="284" width="220" height="68" class="step"/>
  <text x="822" y="314" class="text">deltacommit</text>
  <text x="822" y="336" class="tiny">变更先进入 timeline</text>
  <path d="M800 318 L750 318" class="arrow"/>
  <rect x="612" y="284" width="138" height="68" class="step"/>
  <text x="632" y="314" class="text">compaction</text>
  <text x="632" y="336" class="tiny">后台合并</text>
  <rect x="632" y="386" width="370" height="84" class="cost"/>
  <text x="654" y="418" class="text">代价位置：读时合并或后台 compaction</text>
  <text x="654" y="442" class="tiny">写延迟低，读放大受 log file 数量和合并策略影响</text>
</svg>
