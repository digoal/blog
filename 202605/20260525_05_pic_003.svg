<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Hudi timeline instant 状态机</title>
  <desc id="desc">展示 Hudi action 从 requested 到 inflight 再到 completed 的状态变化，以及常见 action 类型。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .state { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .done { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .action { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 6; }
    .label { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: bold; }
    .text { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="30" width="1040" height="500" class="box"/>
  <text x="60" y="70" class="label">timeline 是 Hudi 表状态的源头：只有 completed instant 对普通读者可见</text>

  <rect x="95" y="135" width="220" height="96" class="state"/>
  <text x="132" y="174" class="label">REQUESTED</text>
  <text x="122" y="204" class="tiny">计划已生成，动作尚未执行</text>
  <path d="M315 183 L430 183" class="arrow"/>
  <rect x="430" y="135" width="220" height="96" class="state"/>
  <text x="486" y="174" class="label">INFLIGHT</text>
  <text x="465" y="204" class="tiny">正在写数据或执行表服务</text>
  <path d="M650 183 L765 183" class="arrow"/>
  <rect x="765" y="135" width="220" height="96" class="done"/>
  <text x="812" y="174" class="label">COMPLETED</text>
  <text x="795" y="204" class="tiny">元数据发布，快照可见</text>

  <rect x="95" y="300" width="890" height="142" class="action"/>
  <text x="122" y="334" class="label">常见 action 类型</text>
  <text x="122" y="368" class="text">commit：COW 写入完成，发布新的 base file 版本</text>
  <text x="122" y="396" class="text">deltacommit：MOR 写入完成，通常发布 log file 中的增量变更</text>
  <text x="122" y="424" class="text">compaction / clustering / clean / rollback / restore / savepoint / indexing：表服务与恢复动作</text>
  <path d="M875 231 L875 300" class="arrow"/>
  <text x="742" y="278" class="tiny">查询按 completed timeline 构造 snapshot</text>
</svg>
