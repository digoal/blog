<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Hudi 读路径：从 timeline 到 file slice 再到记录合并</title>
  <desc id="desc">展示 Hudi snapshot、read optimized、incremental 查询如何从 timeline 和 file system view 选择文件，并在 MOR 中合并 base file 与 log file。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .stage { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .slice { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .merge { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .label { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: bold; }
    .text { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="30" width="1060" height="580" class="box"/>
  <text x="60" y="70" class="label">读路径先确定可见 instant，再确定每个 file group 的可见 slice</text>

  <rect x="75" y="125" width="220" height="92" class="stage"/>
  <text x="112" y="160" class="label">1. 查询类型</text>
  <text x="100" y="190" class="tiny">snapshot / read_optimized / incremental / time travel</text>
  <path d="M295 171 L392 171" class="arrow"/>
  <rect x="392" y="125" width="250" height="92" class="stage"/>
  <text x="430" y="160" class="label">2. active timeline</text>
  <text x="420" y="190" class="tiny">过滤 completed instant，确定目标快照边界</text>
  <path d="M642 171 L742 171" class="arrow"/>
  <rect x="742" y="125" width="285" height="92" class="stage"/>
  <text x="780" y="160" class="label">3. file system view</text>
  <text x="770" y="190" class="tiny">为每个 file group 选择最新可见 file slice</text>

  <path d="M885 217 L885 280" class="arrow"/>
  <rect x="95" y="280" width="410" height="145" class="slice"/>
  <text x="125" y="316" class="label">COW 或 MOR read optimized</text>
  <text x="125" y="352" class="text">读取 base file</text>
  <text x="125" y="382" class="tiny">没有 log merge；读延迟低，但 freshness 受 compaction 边界影响</text>

  <rect x="615" y="280" width="410" height="145" class="merge"/>
  <text x="645" y="316" class="label">MOR snapshot</text>
  <text x="645" y="352" class="text">读取 base file + log files</text>
  <text x="645" y="382" class="tiny">HoodieFileGroupReader / log scanner 合并更新、删除和插入</text>

  <path d="M300 425 L300 485" class="arrow"/>
  <path d="M820 425 L820 485" class="arrow"/>
  <rect x="250" y="485" width="620" height="70" class="stage"/>
  <text x="282" y="528" class="label">返回一致结果：每个 record key 在目标快照中只有一个最终值</text>
</svg>
