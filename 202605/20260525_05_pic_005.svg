<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Hudi metadata table 与多模索引</title>
  <desc id="desc">展示 Hudi 内部 metadata table 的 files、column_stats、bloom_filter、record_index 等分区如何服务读写路径。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .meta { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .idx { fill: #ffffff; stroke: #64748b; stroke-width: 1.6; rx: 6; }
    .read { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .write { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .label { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: bold; }
    .text { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="30" width="1060" height="590" class="box"/>
  <text x="60" y="70" class="label">metadata table 把“找文件”和“找记录位置”的成本从对象存储转移到内部索引</text>

  <rect x="370" y="115" width="380" height="390" class="meta"/>
  <text x="424" y="152" class="label">.hoodie/metadata</text>
  <text x="430" y="180" class="tiny">内部 Hudi MOR 表，写入时同步维护或异步构建</text>
  <rect x="415" y="210" width="290" height="50" class="idx"/>
  <text x="442" y="241" class="text">files：分区文件列表和活跃状态</text>
  <rect x="415" y="278" width="290" height="50" class="idx"/>
  <text x="442" y="309" class="text">column_stats：min/max/null/size</text>
  <rect x="415" y="346" width="290" height="50" class="idx"/>
  <text x="442" y="377" class="text">bloom_filter：记录键候选文件</text>
  <rect x="415" y="414" width="290" height="50" class="idx"/>
  <text x="442" y="445" class="text">record_index：record key -> location</text>

  <rect x="70" y="170" width="230" height="130" class="read"/>
  <text x="103" y="208" class="label">读查询规划</text>
  <text x="100" y="240" class="text">避免全表目录 listing</text>
  <text x="100" y="268" class="tiny">用 column/partition stats 做 data skipping</text>
  <path d="M300 235 L370 235" class="arrow"/>

  <rect x="70" y="360" width="230" height="130" class="write"/>
  <text x="103" y="398" class="label">写入 upsert/delete</text>
  <text x="100" y="430" class="text">把 record key 定位到 file group</text>
  <text x="100" y="458" class="tiny">减少扫描旧数据和 footer 的成本</text>
  <path d="M300 425 L370 425" class="arrow"/>

  <rect x="820" y="250" width="230" height="150" class="read"/>
  <text x="862" y="290" class="label">数据文件集合</text>
  <text x="850" y="322" class="text">base files + log files</text>
  <text x="850" y="350" class="tiny">只有被索引命中的文件进入后续扫描</text>
  <path d="M750 325 L820 325" class="arrow"/>
</svg>
