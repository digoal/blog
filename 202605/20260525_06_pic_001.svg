<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">PG large object 逻辑对象到物理系统表映射</title>
  <desc id="desc">展示业务表中的 OID 引用如何指向 pg_largeobject_metadata，再由 pg_largeobject 按 loid 和 pageno 存储分片数据。</desc>
  <style>
    .bg { fill: #f7fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .header { fill: #e2e8f0; stroke: #334155; stroke-width: 2; }
    .accent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .meta { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .data { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="620"/>

  <rect class="panel" x="50" y="70" width="260" height="220"/>
  <rect class="header" x="50" y="70" width="260" height="55"/>
  <text class="text" x="75" y="106">业务表 image</text>
  <text class="small" x="75" y="160">id: bigint</text>
  <text class="small" x="75" y="198">title: text</text>
  <text class="small" x="75" y="236">raster_oid: oid</text>
  <rect class="accent" x="210" y="215" width="70" height="35"/>
  <text class="small" x="226" y="240">4242</text>

  <rect class="panel" x="410" y="70" width="300" height="220"/>
  <rect class="header" x="410" y="70" width="300" height="55"/>
  <text class="text" x="435" y="106">pg_largeobject_metadata</text>
  <rect class="meta" x="440" y="145" width="240" height="44"/>
  <text class="small" x="462" y="174">oid = 4242</text>
  <text class="small" x="440" y="222">lomowner = role_oid</text>
  <text class="small" x="440" y="258">lomacl = SELECT/UPDATE</text>

  <rect class="panel" x="800" y="60" width="250" height="500"/>
  <rect class="header" x="800" y="60" width="250" height="55"/>
  <text class="text" x="825" y="96">pg_largeobject</text>
  <rect class="data" x="825" y="140" width="200" height="62"/>
  <text class="small" x="845" y="165">loid=4242</text>
  <text class="small" x="845" y="190">pageno=0</text>
  <rect class="data" x="825" y="230" width="200" height="62"/>
  <text class="small" x="845" y="255">loid=4242</text>
  <text class="small" x="845" y="280">pageno=1</text>
  <rect class="data" x="825" y="320" width="200" height="62"/>
  <text class="small" x="845" y="345">loid=4242</text>
  <text class="small" x="845" y="370">pageno=7</text>
  <rect class="data" x="825" y="440" width="200" height="62"/>
  <text class="small" x="845" y="465">loid=9001</text>
  <text class="small" x="845" y="490">pageno=0</text>

  <path class="arrow" d="M 280 232 C 340 232, 355 168, 440 168"/>
  <path class="arrow" d="M 680 168 C 745 168, 760 171, 825 171"/>
  <path class="dash" d="M 680 168 C 735 230, 760 260, 825 260"/>
  <path class="dash" d="M 680 168 C 735 300, 760 350, 825 350"/>

  <text class="small" x="65" y="350">业务行只保存 OID 引用，</text>
  <text class="small" x="65" y="380">不会自动跟踪引用计数。</text>
  <text class="small" x="405" y="350">metadata 负责存在性、所有者、ACL。</text>
  <text class="small" x="405" y="380">创建空 LO 时先有 metadata，数据页可为空。</text>
  <text class="small" x="775" y="585">数据页键：btree(loid, pageno)</text>
  <text class="tiny" x="805" y="525">pageno 可不连续；缺失区间读为 0</text>
</svg>
