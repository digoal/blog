<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">PG large object 读写路径与稀疏页</title>
  <desc id="desc">展示 inv_read 和 inv_write 如何依据 offset 计算 pageno，沿 pg_largeobject 索引顺序扫描、补零、更新旧页或插入新页。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .read { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .write { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .hole { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; rx: 6; }
    .page { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; rx: 4; }
    .text { font-family: Arial, sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="620"/>

  <rect class="box" x="50" y="60" width="260" height="150"/>
  <text class="text" x="75" y="105">LargeObjectDesc</text>
  <text class="small" x="75" y="145">id = 4242</text>
  <text class="small" x="75" y="178">offset = 5000</text>

  <rect class="box" x="390" y="60" width="280" height="150"/>
  <text class="text" x="420" y="105">页号计算</text>
  <text class="small" x="420" y="145">pageno = offset / LOBLKSIZE</text>
  <text class="small" x="420" y="178">pageoff = pageno * LOBLKSIZE</text>

  <rect class="box" x="750" y="60" width="300" height="150"/>
  <text class="text" x="780" y="105">有序系统表扫描</text>
  <text class="small" x="780" y="145">btree(loid, pageno)</text>
  <text class="small" x="780" y="178">从目标页向后顺序取页</text>

  <path class="arrow" d="M 310 135 L 390 135"/>
  <path class="arrow" d="M 670 135 L 750 135"/>

  <text class="text" x="50" y="285">逻辑对象字节空间</text>
  <rect class="page" x="50" y="315" width="150" height="80"/>
  <text class="small" x="83" y="360">page 0</text>
  <rect class="page" x="220" y="315" width="150" height="80"/>
  <text class="small" x="253" y="360">page 1</text>
  <rect class="hole" x="390" y="315" width="150" height="80"/>
  <text class="small" x="425" y="350">page 2</text>
  <text class="tiny" x="425" y="375">缺失</text>
  <rect class="hole" x="560" y="315" width="150" height="80"/>
  <text class="small" x="595" y="350">page 3</text>
  <text class="tiny" x="595" y="375">缺失</text>
  <rect class="page" x="730" y="315" width="150" height="80"/>
  <text class="small" x="763" y="360">page 4</text>
  <rect class="page" x="900" y="315" width="150" height="80"/>
  <text class="small" x="933" y="360">page 5</text>

  <rect class="read" x="110" y="455" width="320" height="90"/>
  <text class="text" x="135" y="490">读路径 inv_read</text>
  <text class="small" x="135" y="522">遇到缺页：向结果缓冲区补 0</text>

  <rect class="write" x="620" y="455" width="360" height="90"/>
  <text class="text" x="645" y="490">写路径 inv_write</text>
  <text class="small" x="645" y="522">旧页 update；新页 insert；页内洞补 0</text>

  <path class="arrow" d="M 465 395 C 430 425, 350 445, 310 455"/>
  <path class="arrow" d="M 635 395 C 680 425, 740 445, 780 455"/>
  <text class="tiny" x="420" y="430">稀疏区不占页；读取时表现为零字节</text>
</svg>
