<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">PG large object 事务、快照与权限</title>
  <desc id="desc">展示 large object descriptor 只在事务内有效，读模式使用打开时快照，写模式使用当前快照并需要 UPDATE 权限。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .txn { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 6; }
    .read { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .write { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .acl { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="620"/>

  <rect class="lane" x="60" y="70" width="980" height="120"/>
  <text class="text" x="85" y="115">事务边界</text>
  <rect class="txn" x="210" y="95" width="160" height="55"/>
  <text class="small" x="235" y="130">BEGIN</text>
  <rect class="txn" x="775" y="95" width="160" height="55"/>
  <text class="small" x="795" y="130">COMMIT/ABORT</text>
  <path class="arrow" d="M 370 123 L 775 123"/>
  <text class="tiny" x="460" y="155">LO FD 存在于 fscxt/cookies，事务结束清理</text>

  <rect class="lane" x="60" y="240" width="440" height="280"/>
  <text class="text" x="85" y="285">INV_READ</text>
  <rect class="read" x="100" y="320" width="340" height="70"/>
  <text class="small" x="130" y="350">lo_open(..., INV_READ)</text>
  <text class="tiny" x="130" y="375">检查 SELECT 权限</text>
  <rect class="read" x="100" y="425" width="340" height="70"/>
  <text class="small" x="130" y="455">保存打开时活动快照</text>
  <text class="tiny" x="130" y="480">后续读取按这个快照看数据</text>
  <path class="arrow" d="M 270 390 L 270 425"/>

  <rect class="lane" x="600" y="240" width="440" height="280"/>
  <text class="text" x="625" y="285">INV_WRITE</text>
  <rect class="write" x="640" y="320" width="340" height="70"/>
  <text class="small" x="670" y="350">lo_open(..., INV_WRITE)</text>
  <text class="tiny" x="670" y="375">检查 SELECT + UPDATE 权限</text>
  <rect class="write" x="640" y="425" width="340" height="70"/>
  <text class="small" x="670" y="455">读写使用当前可见性</text>
  <text class="tiny" x="670" y="480">写入后 CommandCounterIncrement</text>
  <path class="arrow" d="M 810 390 L 810 425"/>

  <rect class="acl" x="380" y="545" width="340" height="55"/>
  <text class="small" x="400" y="579">权限来自 pg_largeobject_metadata.lomacl</text>
  <path class="dash" d="M 270 520 C 325 555, 350 570, 380 570"/>
  <path class="dash" d="M 810 520 C 755 555, 745 570, 720 570"/>
</svg>
