<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">PG large object 生命周期与清理边界</title>
  <desc id="desc">展示创建、写入、引用、删除、孤儿对象和 vacuumlo/lo_manage 的清理关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
    .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="660"/>

  <rect class="step" x="65" y="70" width="215" height="105"/>
  <text class="text" x="95" y="110">lo_create</text>
  <text class="small" x="95" y="145">只建 metadata</text>

  <rect class="step" x="335" y="70" width="215" height="105"/>
  <text class="text" x="365" y="110">lo_open/write</text>
  <text class="small" x="365" y="145">写入数据页</text>

  <rect class="step" x="605" y="70" width="215" height="105"/>
  <text class="text" x="635" y="110">业务表保存 OID</text>
  <text class="small" x="635" y="145">应用层建立引用</text>

  <rect class="step" x="875" y="70" width="170" height="105"/>
  <text class="text" x="905" y="110">pg_dump</text>
  <text class="small" x="905" y="145">需包含 LO</text>

  <path class="arrow" d="M 280 122 L 335 122"/>
  <path class="arrow" d="M 550 122 L 605 122"/>
  <path class="arrow" d="M 820 122 L 875 122"/>

  <rect class="good" x="165" y="265" width="310" height="105"/>
  <text class="text" x="195" y="305">正常删除</text>
  <text class="small" x="195" y="340">应用调用 lo_unlink(oid)</text>

  <rect class="bad" x="625" y="265" width="330" height="105"/>
  <text class="text" x="655" y="305">孤儿 large object</text>
  <text class="small" x="655" y="340">业务行删了，LO 仍占空间</text>

  <path class="dash" d="M 710 175 C 640 220, 520 255, 475 295"/>
  <path class="dash" d="M 710 175 C 755 220, 785 245, 790 265"/>

  <rect class="warn" x="95" y="465" width="360" height="115"/>
  <text class="text" x="125" y="505">lo_manage trigger</text>
  <text class="small" x="125" y="540">UPDATE/DELETE 时自动 lo_unlink</text>
  <text class="tiny" x="125" y="565">前提：每个 LO 只有一个业务引用</text>

  <rect class="warn" x="625" y="465" width="360" height="115"/>
  <text class="text" x="655" y="505">vacuumlo</text>
  <text class="small" x="655" y="540">扫描 oid/lo 列，删除未引用 LO</text>
  <text class="tiny" x="655" y="565">对 DROP/TRUNCATE 后遗留对象兜底</text>

  <path class="arrow" d="M 320 370 L 275 465"/>
  <path class="arrow" d="M 790 370 L 805 465"/>
  <path class="dash" d="M 455 522 C 525 522, 555 522, 625 522"/>
</svg>
