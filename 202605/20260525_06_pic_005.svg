<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">bytea、large object 与外部对象存储选择</title>
  <desc id="desc">比较 TOAST bytea、PostgreSQL large object 和外部文件或对象存储在事务、随机读写、大小上限与运维成本上的差异。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .bytea { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .lo { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .obj { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="660"/>

  <rect class="box" x="360" y="40" width="380" height="80"/>
  <text class="text" x="405" y="87">二进制大值应该放哪里？</text>

  <rect class="box" x="120" y="175" width="300" height="95"/>
  <text class="small" x="145" y="215">是否需要 SQL 行内语义、</text>
  <text class="small" x="145" y="245">整体读写即可？</text>

  <rect class="box" x="680" y="175" width="300" height="95"/>
  <text class="small" x="705" y="215">是否需要超过 1GB、</text>
  <text class="small" x="705" y="245">流式或局部随机读写？</text>

  <rect class="bytea" x="90" y="365" width="300" height="140"/>
  <text class="text" x="120" y="405">bytea + TOAST</text>
  <text class="small" x="120" y="438">简单；跟随业务行</text>
  <text class="small" x="120" y="468">多数操作按整个值处理</text>

  <rect class="lo" x="405" y="365" width="300" height="140"/>
  <text class="text" x="435" y="405">large object</text>
  <text class="small" x="435" y="438">最高约 4TB</text>
  <text class="small" x="435" y="468">流式、seek、局部读写</text>

  <rect class="obj" x="720" y="365" width="300" height="140"/>
  <text class="text" x="750" y="405">文件/对象存储</text>
  <text class="small" x="750" y="438">超大媒体、CDN、低成本</text>
  <text class="small" x="750" y="468">一致性需应用设计</text>

  <path class="arrow" d="M 455 120 C 360 145, 310 155, 270 175"/>
  <path class="arrow" d="M 645 120 C 720 145, 790 155, 830 175"/>
  <path class="arrow" d="M 270 270 C 250 315, 240 340, 240 365"/>
  <path class="arrow" d="M 830 270 C 755 310, 665 340, 590 365"/>
  <path class="arrow" d="M 830 270 C 875 315, 885 340, 885 365"/>

  <text class="tiny" x="130" y="545">优先级：小对象/强行语义优先 bytea</text>
  <text class="tiny" x="430" y="545">需要事务内分片读写且能治理孤儿对象时用 LO</text>
  <text class="tiny" x="735" y="545">大媒体分发、跨服务共享和成本敏感常放外部</text>
</svg>
