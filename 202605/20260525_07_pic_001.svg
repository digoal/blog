<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img">
  <title>TOAST 从逻辑行到物理存储的映射</title>
  <desc>展示 PostgreSQL 主表行、TOAST 指针、TOAST 表、chunk 行和唯一索引之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .main { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .toast { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 8; }
    .ptr { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .idx { fill: #fef9c3; stroke: #a16207; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, sans-serif; font-size: 16px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 13px; fill: #334155; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="920" height="520" />
  <text class="title" x="40" y="42">一行太宽时，主表留下 18 字节左右的 on-disk TOAST 指针，真实值进入独立 TOAST 表</text>

  <rect class="main" x="50" y="95" width="300" height="190" />
  <text class="txt" x="70" y="128">业务表 public.doc</text>
  <rect class="box" x="75" y="155" width="250" height="48" />
  <text class="small" x="92" y="184">id = 1001, title = 'contract'</text>
  <rect class="ptr" x="75" y="215" width="250" height="48" />
  <text class="small" x="92" y="244">body = TOAST pointer</text>

  <rect class="ptr" x="415" y="80" width="260" height="160" />
  <text class="txt" x="438" y="112">varatt_external</text>
  <text class="small" x="438" y="142">va_rawsize: 原始逻辑长度</text>
  <text class="small" x="438" y="166">va_extinfo: 存储长度 + 压缩方法</text>
  <text class="small" x="438" y="190">va_valueid: chunk_id</text>
  <text class="small" x="438" y="214">va_toastrelid: TOAST 表 OID</text>

  <rect class="toast" x="420" y="300" width="430" height="165" />
  <text class="txt" x="445" y="332">pg_toast.pg_toast_&lt;主表 OID&gt;</text>
  <rect class="box" x="445" y="354" width="118" height="82" />
  <text class="small" x="462" y="386">chunk_id</text>
  <text class="small" x="462" y="412">OID</text>
  <rect class="box" x="565" y="354" width="118" height="82" />
  <text class="small" x="581" y="386">chunk_seq</text>
  <text class="small" x="581" y="412">0, 1, 2...</text>
  <rect class="box" x="685" y="354" width="140" height="82" />
  <text class="small" x="703" y="386">chunk_data</text>
  <text class="small" x="703" y="412">约 2 KB 分片</text>

  <rect class="idx" x="70" y="345" width="280" height="90" />
  <text class="txt" x="92" y="378">唯一 B-tree 索引</text>
  <text class="small" x="92" y="408">(chunk_id, chunk_seq)</text>

  <path class="arrow" d="M325 238 C355 220, 382 198, 414 178" />
  <path class="arrow" d="M548 240 C570 270, 590 287, 614 300" />
  <path class="arrow" d="M350 390 C374 390, 395 390, 420 390" />
</svg>
