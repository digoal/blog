<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" role="img">
  <title>TOAST 压缩与外置决策流程</title>
  <desc>展示 heap_toast_insert_or_update 在行过宽时按列存储策略逐步压缩和外置的顺序。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .node { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .yes { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .warn { fill: #ffedd5; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .end { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, sans-serif; font-size: 15px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 12.5px; fill: #334155; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="940" height="540" />
  <text class="title" x="42" y="42">TOAST 不是一上来就拆分：先按策略压缩，再把必要的大值移到 TOAST 表</text>

  <rect class="node" x="70" y="90" width="220" height="78" />
  <text class="txt" x="92" y="122">INSERT / UPDATE 形成新元组</text>
  <text class="small" x="92" y="148">计算 tuple 数据部分长度</text>

  <rect class="node" x="360" y="90" width="220" height="78" />
  <text class="txt" x="386" y="122">是否超过目标长度?</text>
  <text class="small" x="386" y="148">通常约 2 KB, 可调</text>

  <rect class="yes" x="650" y="90" width="220" height="78" />
  <text class="txt" x="682" y="122">不超过目标</text>
  <text class="small" x="682" y="148">直接存主表行</text>

  <rect class="warn" x="70" y="235" width="220" height="92" />
  <text class="txt" x="92" y="266">第 1 轮</text>
  <text class="small" x="92" y="292">EXTENDED 尝试内联压缩</text>
  <text class="small" x="92" y="314">很大的 EXTENDED/EXTERNAL 先外置</text>

  <rect class="warn" x="360" y="235" width="220" height="92" />
  <text class="txt" x="382" y="266">第 2 轮</text>
  <text class="small" x="382" y="292">仍超目标则外置</text>
  <text class="small" x="382" y="314">EXTENDED / EXTERNAL</text>

  <rect class="warn" x="650" y="235" width="220" height="92" />
  <text class="txt" x="672" y="266">第 3 轮</text>
  <text class="small" x="672" y="292">MAIN 尝试内联压缩</text>
  <text class="small" x="672" y="314">尊重尽量留主表的意图</text>

  <rect class="warn" x="210" y="390" width="240" height="92" />
  <text class="txt" x="236" y="421">第 4 轮</text>
  <text class="small" x="236" y="447">仍放不下时 MAIN 外置</text>
  <text class="small" x="236" y="469">这是最后手段</text>

  <rect class="end" x="520" y="390" width="260" height="92" />
  <text class="txt" x="548" y="421">重组主表元组</text>
  <text class="small" x="548" y="447">大字段变为 TOAST pointer</text>
  <text class="small" x="548" y="469">TOAST 表保存 chunk 行</text>

  <path class="arrow" d="M290 129 L360 129" />
  <path class="arrow" d="M580 129 L650 129" />
  <path class="arrow" d="M470 168 C420 205, 300 220, 190 235" />
  <path class="arrow" d="M290 281 L360 281" />
  <path class="arrow" d="M580 281 L650 281" />
  <path class="arrow" d="M760 327 C735 365, 520 377, 450 404" />
  <path class="arrow" d="M450 436 L520 436" />
</svg>
