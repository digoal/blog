<svg xmlns="http://www.w3.org/2000/svg" width="940" height="520" viewBox="0 0 940 520" role="img">
  <title>TOAST detoast 与切片读取路径</title>
  <desc>展示普通 detoast、未压缩外置值的切片读取、压缩值读取时需要先取足压缩前缀或完整值。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .fast { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .slow { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .mid { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, sans-serif; font-size: 15px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 12.5px; fill: #334155; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="940" height="520" />
  <text class="title" x="42" y="42">读大字段的代价取决于是否外置、是否压缩、是否只读切片</text>

  <rect class="box" x="60" y="105" width="230" height="82" />
  <text class="txt" x="85" y="136">执行器或函数拿到 Datum</text>
  <text class="small" x="85" y="162">可能是普通 varlena</text>

  <rect class="mid" x="360" y="105" width="230" height="82" />
  <text class="txt" x="390" y="136">判断 varlena 头部</text>
  <text class="small" x="390" y="162">short / compressed / external</text>

  <rect class="fast" x="660" y="80" width="220" height="70" />
  <text class="txt" x="690" y="111">普通或 short 值</text>
  <text class="small" x="690" y="136">直接使用或展开头部</text>

  <rect class="slow" x="660" y="180" width="220" height="80" />
  <text class="txt" x="690" y="212">内联压缩值</text>
  <text class="small" x="690" y="238">按 pglz / lz4 解压</text>

  <rect class="box" x="120" y="300" width="230" height="95" />
  <text class="txt" x="145" y="332">on-disk TOAST pointer</text>
  <text class="small" x="145" y="358">打开 va_toastrelid</text>
  <text class="small" x="145" y="380">按 va_valueid 取 chunk</text>

  <rect class="fast" x="420" y="300" width="220" height="95" />
  <text class="txt" x="448" y="332">未压缩外置值</text>
  <text class="small" x="448" y="358">substr 可只取相关 chunk</text>
  <text class="small" x="448" y="380">读放大较小</text>

  <rect class="slow" x="690" y="300" width="220" height="95" />
  <text class="txt" x="716" y="332">压缩外置值</text>
  <text class="small" x="716" y="358">先取足压缩数据</text>
  <text class="small" x="716" y="380">再解压到目标切片</text>

  <path class="arrow" d="M290 146 L360 146" />
  <path class="arrow" d="M590 136 C615 125, 635 118, 660 115" />
  <path class="arrow" d="M590 154 C620 175, 635 200, 660 220" />
  <path class="arrow" d="M475 187 C430 245, 355 285, 250 300" />
  <path class="arrow" d="M350 348 L420 348" />
  <path class="arrow" d="M640 348 L690 348" />
</svg>
