<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" role="img">
  <title>TOAST 值生命周期</title>
  <desc>展示 TOAST 值在插入、更新、删除、VACUUM 和表重写过程中的生命周期和空间回收边界。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .write { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .keep { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .maint { fill: #fef9c3; stroke: #a16207; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, sans-serif; font-size: 15px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 12.5px; fill: #334155; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="940" height="540" />
  <text class="title" x="42" y="42">TOAST 与主表同属数据库事务体系，但大值更新仍会产生独立 chunk 生命周期</text>

  <rect class="write" x="60" y="95" width="230" height="92" />
  <text class="txt" x="88" y="126">INSERT 大字段</text>
  <text class="small" x="88" y="152">生成 va_valueid</text>
  <text class="small" x="88" y="174">写入多个 chunk 行</text>

  <rect class="keep" x="360" y="95" width="230" height="92" />
  <text class="txt" x="386" y="126">UPDATE 未改大字段</text>
  <text class="small" x="386" y="152">通常复用旧 TOAST 指针</text>
  <text class="small" x="386" y="174">避免重写 chunk</text>

  <rect class="risk" x="650" y="95" width="230" height="92" />
  <text class="txt" x="675" y="126">UPDATE 改大字段</text>
  <text class="small" x="675" y="152">新值写新 chunk</text>
  <text class="small" x="675" y="174">旧值等待可见性回收</text>

  <rect class="risk" x="205" y="270" width="230" height="92" />
  <text class="txt" x="232" y="301">DELETE 主表行</text>
  <text class="small" x="232" y="327">heap_toast_delete 删除外置值</text>
  <text class="small" x="232" y="349">旧版本仍受 MVCC 约束</text>

  <rect class="maint" x="505" y="270" width="230" height="92" />
  <text class="txt" x="532" y="301">VACUUM / REWRITE</text>
  <text class="small" x="532" y="327">清理 dead chunk</text>
  <text class="small" x="532" y="349">必要时重写 TOAST 数据</text>

  <rect class="box" x="275" y="420" width="380" height="72" />
  <text class="txt" x="314" y="452">运维边界</text>
  <text class="small" x="314" y="476">TOAST 表有自己的膨胀、索引、VACUUM 和 OID 分配压力</text>

  <path class="arrow" d="M290 141 L360 141" />
  <path class="arrow" d="M590 141 L650 141" />
  <path class="arrow" d="M770 187 C710 230, 635 255, 610 270" />
  <path class="arrow" d="M360 187 C340 220, 323 245, 320 270" />
  <path class="arrow" d="M435 316 L505 316" />
  <path class="arrow" d="M620 362 C588 390, 548 410, 520 420" />
</svg>
