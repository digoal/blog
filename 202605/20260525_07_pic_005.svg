<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" role="img">
  <title>TOAST 运维风险与建模边界</title>
  <desc>展示业务建模、查询访问、压缩策略、OID 争用、VACUUM 和分区拆表之间的风险关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .core { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.8; rx: 10; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .risk { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; }
    .good { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; }
    .txt { font-family: Arial, sans-serif; font-size: 15px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 12.5px; fill: #334155; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="940" height="540" />
  <text class="title" x="42" y="42">TOAST 是透明机制，但不能替代数据建模和容量治理</text>

  <rect class="core" x="350" y="205" width="240" height="118" />
  <text class="txt" x="385" y="244">TOAST 表</text>
  <text class="small" x="385" y="270">chunk 行 + B-tree 索引</text>
  <text class="small" x="385" y="294">MVCC + WAL + VACUUM</text>

  <rect class="box" x="60" y="95" width="230" height="82" />
  <text class="txt" x="86" y="127">业务建模</text>
  <text class="small" x="86" y="153">大 JSON / 文本 / bytea 是否拆表</text>

  <rect class="risk" x="650" y="95" width="230" height="82" />
  <text class="txt" x="676" y="127">查询读放大</text>
  <text class="small" x="676" y="153">SELECT * 触发 detoast</text>

  <rect class="box" x="60" y="360" width="230" height="82" />
  <text class="txt" x="86" y="392">压缩策略</text>
  <text class="small" x="86" y="418">EXTENDED / EXTERNAL / MAIN</text>

  <rect class="risk" x="650" y="360" width="230" height="82" />
  <text class="txt" x="676" y="392">OID 争用</text>
  <text class="small" x="676" y="418">高 churn 大表可能分配变慢</text>

  <rect class="good" x="355" y="72" width="230" height="82" />
  <text class="txt" x="382" y="104">容量治理</text>
  <text class="small" x="382" y="130">分区、冷热拆分、归档</text>

  <rect class="good" x="355" y="390" width="230" height="82" />
  <text class="txt" x="382" y="422">可观测性</text>
  <text class="small" x="382" y="448">pg_total_relation_size / wait events</text>

  <path class="arrow" d="M290 146 C330 175, 350 205, 382 224" />
  <path class="arrow" d="M650 146 C615 178, 590 205, 558 224" />
  <path class="arrow" d="M290 400 C330 355, 350 330, 382 305" />
  <path class="arrow" d="M650 400 C615 356, 590 330, 558 305" />
  <path class="arrow" d="M470 154 L470 205" />
  <path class="arrow" d="M470 323 L470 390" />
</svg>
