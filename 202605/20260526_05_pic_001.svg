<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">位图索引的逻辑模型</title>
  <desc id="desc">展示一列离散取值如何转换为每个取值一条 bitmap 向量，并通过 AND OR 组合得到候选行集合。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; font-size: 18px; }
    .small { font-size: 15px; fill: #334155; }
    .head { font-weight: 700; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 6; }
    .blue { fill: #dbeafe; stroke: #2563eb; }
    .green { fill: #dcfce7; stroke: #16a34a; }
    .orange { fill: #ffedd5; stroke: #f97316; }
    .gray { fill: #e2e8f0; stroke: #64748b; }
    .bit1 { fill: #16a34a; }
    .bit0 { fill: #f1f5f9; stroke: #94a3b8; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="40" y="44" class="head" font-size="24">从“值 → 行号列表”变成“值 → 位向量”</text>
  <rect x="40" y="78" width="300" height="330" class="box"/>
  <text x="72" y="112" class="head">事实表片段</text>
  <text x="78" y="152" class="small">RID</text>
  <text x="165" y="152" class="small">region</text>
  <text x="255" y="152" class="small">status</text>
  <g class="small">
    <text x="83" y="190">1</text><text x="158" y="190">CN</text><text x="250" y="190">paid</text>
    <text x="83" y="228">2</text><text x="158" y="228">US</text><text x="250" y="228">trial</text>
    <text x="83" y="266">3</text><text x="158" y="266">CN</text><text x="250" y="266">trial</text>
    <text x="83" y="304">4</text><text x="158" y="304">EU</text><text x="250" y="304">paid</text>
    <text x="83" y="342">5</text><text x="158" y="342">CN</text><text x="250" y="342">paid</text>
    <text x="83" y="380">6</text><text x="158" y="380">US</text><text x="250" y="380">paid</text>
  </g>
  <line x1="65" y1="164" x2="315" y2="164" stroke="#94a3b8"/>
  <path d="M350 240 C390 240 390 240 430 240" class="arrow"/>
  <rect x="430" y="78" width="500" height="330" class="box"/>
  <text x="462" y="112" class="head">bitmap 向量</text>
  <text x="585" y="152" class="small">RID: 1  2  3  4  5  6</text>
  <text x="462" y="190" class="small">region=CN</text>
  <text x="462" y="240" class="small">status=paid</text>
  <text x="462" y="310" class="small">AND 后结果</text>
  <g transform="translate(585 170)">
    <rect x="0" y="0" width="34" height="34" class="bit1"/><text x="11" y="24" fill="#fff">1</text>
    <rect x="44" y="0" width="34" height="34" class="bit0"/><text x="55" y="24">0</text>
    <rect x="88" y="0" width="34" height="34" class="bit1"/><text x="99" y="24" fill="#fff">1</text>
    <rect x="132" y="0" width="34" height="34" class="bit0"/><text x="143" y="24">0</text>
    <rect x="176" y="0" width="34" height="34" class="bit1"/><text x="187" y="24" fill="#fff">1</text>
    <rect x="220" y="0" width="34" height="34" class="bit0"/><text x="231" y="24">0</text>
  </g>
  <g transform="translate(585 220)">
    <rect x="0" y="0" width="34" height="34" class="bit1"/><text x="11" y="24" fill="#fff">1</text>
    <rect x="44" y="0" width="34" height="34" class="bit0"/><text x="55" y="24">0</text>
    <rect x="88" y="0" width="34" height="34" class="bit0"/><text x="99" y="24">0</text>
    <rect x="132" y="0" width="34" height="34" class="bit1"/><text x="143" y="24" fill="#fff">1</text>
    <rect x="176" y="0" width="34" height="34" class="bit1"/><text x="187" y="24" fill="#fff">1</text>
    <rect x="220" y="0" width="34" height="34" class="bit1"/><text x="231" y="24" fill="#fff">1</text>
  </g>
  <line x1="585" y1="278" x2="845" y2="278" stroke="#334155" stroke-width="2"/>
  <g transform="translate(585 290)">
    <rect x="0" y="0" width="34" height="34" class="bit1"/><text x="11" y="24" fill="#fff">1</text>
    <rect x="44" y="0" width="34" height="34" class="bit0"/><text x="55" y="24">0</text>
    <rect x="88" y="0" width="34" height="34" class="bit0"/><text x="99" y="24">0</text>
    <rect x="132" y="0" width="34" height="34" class="bit0"/><text x="143" y="24">0</text>
    <rect x="176" y="0" width="34" height="34" class="bit1"/><text x="187" y="24" fill="#fff">1</text>
    <rect x="220" y="0" width="34" height="34" class="bit0"/><text x="231" y="24">0</text>
  </g>
  <rect x="560" y="440" width="320" height="48" class="green"/>
  <text x="584" y="470" class="small">只访问 RID 1、5 对应的数据页和元组</text>
</svg>
