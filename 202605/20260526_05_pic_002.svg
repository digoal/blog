<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Greenplum 持久 bitmap index 的页面组织</title>
  <desc id="desc">展示 metapage、LOV page、辅助 LOV heap 和 btree、bitmap page 链条之间的关系。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .head { font-weight: 700; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 6; }
    .meta { fill: #dbeafe; stroke: #2563eb; }
    .lov { fill: #fef3c7; stroke: #d97706; }
    .aux { fill: #e0f2fe; stroke: #0284c7; }
    .bitmap { fill: #dcfce7; stroke: #16a34a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="40" y="42" class="head" font-size="24">GPDB 的 on-disk bitmap index 不是一张裸 bitmap</text>
  <rect x="50" y="90" width="210" height="120" class="meta"/>
  <text x="82" y="122" class="head">Meta Page</text>
  <text x="75" y="154" class="small">magic / version</text>
  <text x="75" y="178" class="small">LOV heap OID</text>
  <text x="75" y="202" class="small">LOV btree OID</text>
  <rect x="370" y="70" width="250" height="155" class="lov"/>
  <text x="404" y="104" class="head">LOV Pages</text>
  <text x="398" y="138" class="small">每个 distinct key 一个 LOV item</text>
  <text x="398" y="164" class="small">head/tail bitmap page</text>
  <text x="398" y="190" class="small">last word / last setbit</text>
  <text x="398" y="216" class="small">第一页预留 NULL key</text>
  <rect x="370" y="310" width="250" height="128" class="aux"/>
  <text x="395" y="344" class="head">辅助 LOV heap + btree</text>
  <text x="398" y="378" class="small">key columns + LOV block</text>
  <text x="398" y="404" class="small">key columns + LOV offset</text>
  <text x="398" y="430" class="small">加速高基数 key 查找</text>
  <rect x="735" y="70" width="230" height="120" class="bitmap"/>
  <text x="770" y="104" class="head">Bitmap Page 1</text>
  <text x="760" y="138" class="small">header words</text>
  <text x="760" y="164" class="small">content words</text>
  <rect x="735" y="245" width="230" height="120" class="bitmap"/>
  <text x="770" y="279" class="head">Bitmap Page 2</text>
  <text x="760" y="313" class="small">同一 value 的后续向量</text>
  <text x="760" y="339" class="small">bm_bitmap_next 串联</text>
  <rect x="735" y="420" width="230" height="90" class="bitmap"/>
  <text x="770" y="454" class="head">Bitmap Page N</text>
  <text x="760" y="488" class="small">按 TID location 顺序扩展</text>
  <path d="M260 150 L370 145" class="arrow"/>
  <path d="M260 178 C310 250 330 350 370 374" class="dash"/>
  <path d="M620 146 L735 130" class="arrow"/>
  <path d="M850 190 L850 245" class="arrow"/>
  <path d="M850 365 L850 420" class="arrow"/>
  <path d="M620 374 C680 340 690 160 735 130" class="dash"/>
  <text x="62" y="270" class="small">查询路径：</text>
  <text x="62" y="300" class="small">key → LOV btree → LOV item → bitmap page 链</text>
  <text x="62" y="350" class="small">写入路径：</text>
  <text x="62" y="380" class="small">tuple TID → TID location → 更新对应 value 的向量</text>
</svg>
