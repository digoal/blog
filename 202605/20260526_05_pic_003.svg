<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">HRL 压缩字的结构</title>
  <desc id="desc">展示 header section 标记 content word 是 literal word 还是 fill word，并说明 fill word 如何表示连续 0 或 1。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .head { font-weight: 700; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 6; }
    .fill { fill: #fee2e2; stroke: #dc2626; }
    .lit { fill: #dcfce7; stroke: #16a34a; }
    .hdr { fill: #dbeafe; stroke: #2563eb; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="42" y="42" class="head" font-size="24">Hybrid Run-Length：header 控制 content 的解释方式</text>
  <rect x="60" y="88" width="860" height="80" class="box"/>
  <text x="85" y="120" class="head">未压缩位串示例</text>
  <text x="270" y="120" class="small">00000000 00000000 01000000 11111111 11111111 11111111</text>
  <text x="270" y="148" class="small">长 0 段、一个混合字、长 1 段</text>
  <path d="M490 170 L490 220" class="arrow"/>
  <rect x="90" y="230" width="220" height="92" class="hdr"/>
  <text x="120" y="264" class="head">Header words</text>
  <text x="120" y="294" class="small">1 0 1</text>
  <text x="120" y="318" class="small">1 = fill, 0 = literal</text>
  <rect x="380" y="230" width="480" height="92" class="box"/>
  <text x="410" y="264" class="head">Content words</text>
  <rect x="410" y="282" width="110" height="28" class="fill"/>
  <text x="426" y="302" class="small">0 | len=2</text>
  <rect x="540" y="282" width="110" height="28" class="lit"/>
  <text x="553" y="302" class="small">01000000</text>
  <rect x="670" y="282" width="110" height="28" class="fill"/>
  <text x="686" y="302" class="small">1 | len=3</text>
  <path d="M310 276 L380 276" class="arrow"/>
  <rect x="105" y="390" width="760" height="74" class="box"/>
  <text x="135" y="424" class="head">读取时不必整体解压</text>
  <text x="135" y="452" class="small">遇到 0-fill 可跳过；遇到 1-fill 可批量产生命中 TID；literal word 逐位展开。</text>
</svg>
