<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" role="img" aria-labelledby="title desc">
  <title id="title">Bitmap scan 的规划与执行路径</title>
  <desc id="desc">展示查询谓词经过 BitmapIndexScan、BitmapAnd Or、BitmapHeapScan 访问表数据的流程。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .head { font-weight: 700; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 6; }
    .plan { fill: #e0f2fe; stroke: #0284c7; }
    .exec { fill: #dcfce7; stroke: #16a34a; }
    .warn { fill: #ffedd5; stroke: #f97316; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="42" y="42" class="head" font-size="24">持久 bitmap index 负责产生命中集合，BitmapHeapScan 负责回表</text>
  <rect x="60" y="96" width="210" height="84" class="box"/>
  <text x="92" y="132" class="head">WHERE 谓词</text>
  <text x="84" y="160" class="small">region='CN' AND status='paid'</text>
  <path d="M270 138 L360 138" class="arrow"/>
  <rect x="360" y="70" width="230" height="136" class="plan"/>
  <text x="388" y="105" class="head">规划阶段</text>
  <text x="388" y="135" class="small">选择 BitmapIndexScan</text>
  <text x="388" y="160" class="small">组合 BitmapAnd / BitmapOr</text>
  <text x="388" y="185" class="small">保留 bitmapqualorig 用于 recheck</text>
  <path d="M590 138 L690 138" class="arrow"/>
  <rect x="690" y="70" width="260" height="136" class="exec"/>
  <text x="720" y="105" class="head">BitmapIndexScan</text>
  <text x="720" y="135" class="small">从索引 AM 取 StreamBitmap/TIDBitmap</text>
  <text x="720" y="160" class="small">多个条件先做 AND / OR</text>
  <text x="720" y="185" class="small">输出按 block 聚合的候选 TID</text>
  <path d="M820 206 L820 280" class="arrow"/>
  <rect x="690" y="280" width="260" height="128" class="exec"/>
  <text x="720" y="315" class="head">BitmapHeapScan</text>
  <text x="720" y="345" class="small">按数据页顺序访问表</text>
  <text x="720" y="370" class="small">减少随机 I/O</text>
  <text x="720" y="395" class="small">必要时按原谓词 recheck</text>
  <path d="M690 344 L585 344" class="arrow"/>
  <rect x="360" y="290" width="225" height="108" class="warn"/>
  <text x="388" y="325" class="head">注意边界</text>
  <text x="388" y="355" class="small">Bitmap Heap Scan 名字沿用</text>
  <text x="388" y="380" class="small">AO 表也显示该节点名</text>
  <path d="M820 408 L820 470" class="arrow"/>
  <rect x="690" y="470" width="260" height="58" class="box"/>
  <text x="720" y="505" class="head">返回符合条件的元组</text>
</svg>
