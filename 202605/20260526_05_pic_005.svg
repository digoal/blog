<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">bitmap 索引选型边界</title>
  <desc id="desc">用决策流说明 bitmap index、B-tree、分区和顺序扫描的选型边界。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .head { font-weight: 700; fill: #0f172a; }
    .q { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 6; }
    .yes { fill: #dcfce7; stroke: #16a34a; }
    .no { fill: #fee2e2; stroke: #dc2626; }
    .alt { fill: #e0f2fe; stroke: #0284c7; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="42" y="42" class="head" font-size="24">不要问“bitmap 快不快”，先问 workload 是否匹配</text>
  <rect x="360" y="80" width="260" height="74" class="q"/>
  <text x="398" y="112" class="head">主要是分析查询？</text>
  <text x="390" y="138" class="small">少更新、少并发 DML、批量装载</text>
  <path d="M490 154 L490 210" class="arrow"/>
  <rect x="360" y="210" width="260" height="74" class="q"/>
  <text x="390" y="242" class="head">列经常与其他列组合过滤？</text>
  <text x="390" y="268" class="small">AND / OR 可在 bitmap 层消减候选行</text>
  <path d="M490 284 L490 340" class="arrow"/>
  <rect x="360" y="340" width="260" height="74" class="q"/>
  <text x="390" y="372" class="head">基数在合理区间？</text>
  <text x="390" y="398" class="small">GPDB 文档建议约 100 到 100000</text>
  <path d="M490 414 L490 470" class="arrow"/>
  <rect x="360" y="470" width="260" height="58" class="yes"/>
  <text x="398" y="505" class="head">考虑 bitmap index，并实测</text>
  <path d="M360 117 L210 117 L210 470 L360 470" class="arrow"/>
  <rect x="50" y="82" width="160" height="70" class="no"/>
  <text x="78" y="112" class="head">频繁更新</text>
  <text x="78" y="138" class="small">倾向 B-tree 或少建索引</text>
  <path d="M620 247 L785 247 L785 470 L620 470" class="arrow"/>
  <rect x="785" y="210" width="155" height="74" class="alt"/>
  <text x="812" y="242" class="head">单点高选择性</text>
  <text x="812" y="268" class="small">优先 B-tree</text>
  <path d="M620 377 L790 377" class="arrow"/>
  <rect x="790" y="340" width="150" height="74" class="alt"/>
  <text x="812" y="372" class="head">极低或极高基数</text>
  <text x="812" y="398" class="small">分区/列存/顺扫也要比</text>
</svg>
