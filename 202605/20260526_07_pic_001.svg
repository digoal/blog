<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">B-tree 用高扇出降低随机 IO</title>
  <desc id="desc">展示从根页到内部页再到叶子页的查找路径，以及高扇出如何把一次查找控制在少量页面访问内。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .page { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .hot { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .leaf { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .muted { fill: #64748b; font-size: 18px; font-family: Arial, sans-serif; }
    .label { fill: #0f172a; font-size: 22px; font-family: Arial, sans-serif; font-weight: 700; }
    .small { fill: #334155; font-size: 16px; font-family: Arial, sans-serif; }
    .key { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 4; }
    .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .soft { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="44" y="54">一次范围或点查：把“很多行”变成“少量页跳转”</text>
  <text class="muted" x="44" y="86">节点越宽，树越矮；叶子保存可返回的行位置或行本身。</text>

  <rect class="page" x="368" y="116" width="224" height="66"/>
  <text class="label" x="414" y="157">Root page</text>
  <rect class="key" x="388" y="196" width="42" height="28"/><text class="small" x="398" y="216">10</text>
  <rect class="key" x="442" y="196" width="42" height="28"/><text class="small" x="452" y="216">20</text>
  <rect class="key" x="496" y="196" width="42" height="28"/><text class="small" x="506" y="216">40</text>
  <rect class="key" x="550" y="196" width="42" height="28"/><text class="small" x="560" y="216">70</text>

  <rect class="page" x="110" y="280" width="190" height="70"/>
  <rect class="hot" x="385" y="280" width="190" height="70"/>
  <rect class="page" x="660" y="280" width="190" height="70"/>
  <text class="small" x="140" y="320">internal page</text>
  <text class="small" x="412" y="320">internal page</text>
  <text class="small" x="690" y="320">internal page</text>
  <text class="small" x="418" y="342">30 &lt; key &lt;= 40</text>

  <rect class="leaf" x="120" y="432" width="156" height="58"/>
  <rect class="leaf" x="310" y="432" width="156" height="58"/>
  <rect class="leaf" x="500" y="432" width="156" height="58"/>
  <rect class="leaf" x="690" y="432" width="156" height="58"/>
  <text class="small" x="146" y="467">leaf keys</text>
  <text class="small" x="337" y="467">leaf keys</text>
  <text class="small" x="526" y="467">leaf keys + TID</text>
  <text class="small" x="716" y="467">leaf keys</text>

  <path class="arrow" d="M480 224 C480 246 480 256 480 280"/>
  <path class="arrow" d="M480 350 C510 382 542 398 578 432"/>
  <path class="soft" d="M205 350 C200 382 198 402 198 432"/>
  <path class="soft" d="M480 350 C410 392 386 404 388 432"/>
  <path class="soft" d="M755 350 C758 384 766 402 768 432"/>

  <rect x="44" y="506" width="872" height="1.5" fill="#cbd5e1"/>
  <text class="small" x="44" y="535">核心收益：O(log_f N) 次页访问。f 是页内 fanout，受页面大小、key 宽度、压缩和指针布局影响。</text>
</svg>
