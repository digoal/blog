<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">B-tree 页面布局</title>
  <desc id="desc">对比 PostgreSQL、InnoDB 和 SQLite 页面中 header、slot 或目录、cell/record、special area 的位置。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .head { fill: #dbeafe; stroke: #2563eb; stroke-width: 1; }
    .dir { fill: #fef3c7; stroke: #d97706; stroke-width: 1; }
    .data { fill: #dcfce7; stroke: #16a34a; stroke-width: 1; }
    .special { fill: #fee2e2; stroke: #dc2626; stroke-width: 1; }
    .label { fill: #0f172a; font-size: 22px; font-family: Arial, sans-serif; font-weight: 700; }
    .text { fill: #334155; font-size: 16px; font-family: Arial, sans-serif; }
    .small { fill: #475569; font-size: 14px; font-family: Arial, sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="42" y="52">页面内真正影响性能的是：有序入口、空闲空间、可移动记录</text>
  <text class="text" x="42" y="84">三套数据库都按“页”为单位维护树，但页内格式服务于不同目标。</text>

  <rect class="box" x="42" y="128" width="260" height="340"/>
  <text class="label" x="76" y="166">PostgreSQL nbtree</text>
  <rect class="head" x="72" y="196" width="200" height="42"/>
  <text class="small" x="92" y="222">PageHeaderData</text>
  <rect class="dir" x="72" y="244" width="200" height="42"/>
  <text class="small" x="100" y="270">ItemId array</text>
  <rect class="data" x="72" y="292" width="200" height="92"/>
  <text class="small" x="91" y="326">Index tuples</text>
  <text class="small" x="91" y="350">leaf: key + heap TID</text>
  <rect class="special" x="72" y="392" width="200" height="50"/>
  <text class="small" x="90" y="414">BTPageOpaqueData</text>
  <text class="small" x="91" y="434">prev / next / level / flags</text>

  <rect class="box" x="350" y="128" width="260" height="340"/>
  <text class="label" x="400" y="166">InnoDB</text>
  <rect class="head" x="380" y="196" width="200" height="42"/>
  <text class="small" x="410" y="222">FIL + page header</text>
  <rect class="data" x="380" y="244" width="200" height="94"/>
  <text class="small" x="406" y="280">records heap</text>
  <text class="small" x="400" y="304">infimum / supremum</text>
  <rect class="dir" x="380" y="346" width="200" height="48"/>
  <text class="small" x="407" y="376">page directory</text>
  <rect class="special" x="380" y="402" width="200" height="40"/>
  <text class="small" x="420" y="427">FIL trailer</text>

  <rect class="box" x="658" y="128" width="260" height="340"/>
  <text class="label" x="708" y="166">SQLite</text>
  <rect class="head" x="688" y="196" width="200" height="42"/>
  <text class="small" x="728" y="222">page header</text>
  <rect class="dir" x="688" y="244" width="200" height="42"/>
  <text class="small" x="716" y="270">cell pointer array</text>
  <rect x="688" y="292" width="200" height="46" fill="#f1f5f9" stroke="#94a3b8"/>
  <text class="small" x="733" y="320">free space</text>
  <rect class="data" x="688" y="344" width="200" height="98"/>
  <text class="small" x="727" y="376">cell content</text>
  <text class="small" x="712" y="400">payload + overflow ptr</text>

  <text class="text" x="42" y="518">读图方式：B-tree 不是抽象节点数组，而是“页内目录 + 可变长记录 + 空闲空间管理 + 兄弟/父子定位元数据”的组合。</text>
</svg>
