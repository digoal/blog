<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">B-tree 写入和维护路径</title>
  <desc id="desc">从插入到页满，再到 split、父页传播、删除标记、清理和回收的生命周期。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .hot { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .clean { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .label { fill: #0f172a; font-size: 22px; font-family: Arial, sans-serif; font-weight: 700; }
    .text { fill: #334155; font-size: 16px; font-family: Arial, sans-serif; }
    .small { fill: #475569; font-size: 14px; font-family: Arial, sans-serif; }
    .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="44" y="54">写入不是 O(log N) 这么简单：维护路径决定尾延迟</text>
  <text class="text" x="44" y="86">多数写入只改叶子；页满、删除堆积、长事务、随机主键会把成本推高。</text>

  <rect class="step" x="60" y="150" width="170" height="92"/>
  <text class="label" x="98" y="184">1 查找叶子</text>
  <text class="small" x="82" y="214">root -> internal -> leaf</text>
  <path class="arrow" d="M230 196 L300 196"/>

  <rect class="hot" x="300" y="150" width="170" height="92"/>
  <text class="label" x="334" y="184">2 插入记录</text>
  <text class="small" x="326" y="214">页内有空间：局部修改</text>
  <path class="arrow" d="M470 196 L540 196"/>

  <rect class="warn" x="540" y="150" width="170" height="92"/>
  <text class="label" x="584" y="184">3 页满</text>
  <text class="small" x="562" y="214">先尝试清理或重组</text>
  <path class="arrow" d="M710 196 L780 196"/>

  <rect class="warn" x="780" y="150" width="140" height="92"/>
  <text class="label" x="812" y="184">4 split</text>
  <text class="small" x="800" y="214">新页 + 父页 downlink</text>

  <rect class="step" x="164" y="326" width="190" height="100"/>
  <text class="label" x="208" y="360">删除/更新</text>
  <text class="small" x="186" y="392">逻辑删除、版本链或旧 TID</text>
  <path class="arrow" d="M354 376 L438 376"/>

  <rect class="clean" x="438" y="326" width="210" height="100"/>
  <text class="label" x="482" y="360">后台清理</text>
  <text class="small" x="462" y="392">VACUUM / purge / freelist</text>
  <path class="arrow" d="M648 376 L732 376"/>

  <rect class="clean" x="732" y="326" width="170" height="100"/>
  <text class="label" x="770" y="360">空间复用</text>
  <text class="small" x="756" y="392">延迟回收，避免破坏并发读</text>

  <path class="arrow" d="M850 242 C850 284 824 300 818 326"/>
  <text class="text" x="62" y="500">实践观察点：页分裂次数、索引膨胀、随机写放大、长事务阻塞清理、二级索引回表成本。</text>
</svg>
