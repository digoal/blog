<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL B-link tree 高并发查找</title>
  <desc id="desc">展示 high key 与 right link 如何让查找在并发 split 后向右修正位置。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .page { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .left { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .right { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .high { fill: #fee2e2; stroke: #dc2626; stroke-width: 1; rx: 4; }
    .key { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 4; }
    .label { fill: #0f172a; font-size: 22px; font-family: Arial, sans-serif; font-weight: 700; }
    .text { fill: #334155; font-size: 16px; font-family: Arial, sans-serif; }
    .small { fill: #475569; font-size: 14px; font-family: Arial, sans-serif; }
    .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .red { stroke: #dc2626; stroke-width: 2.5; fill: none; marker-end: url(#redarrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="44" y="54">PostgreSQL：high key + right link 让并发 split 可被发现</text>
  <text class="text" x="44" y="86">父页旧 downlink 可能指向 split 前的左页；查找到页后再用 high key 校验。</text>

  <rect class="page" x="330" y="122" width="300" height="72"/>
  <text class="small" x="364" y="153">parent pivot tuples</text>
  <rect class="key" x="380" y="164" width="62" height="22"/><text class="small" x="396" y="181">20</text>
  <rect class="key" x="466" y="164" width="62" height="22"/><text class="small" x="482" y="181">40</text>
  <rect class="key" x="552" y="164" width="62" height="22"/><text class="small" x="568" y="181">70</text>

  <rect class="left" x="150" y="302" width="260" height="100"/>
  <text class="label" x="202" y="334">leaf L</text>
  <rect class="key" x="178" y="352" width="48" height="26"/><text class="small" x="190" y="371">21</text>
  <rect class="key" x="236" y="352" width="48" height="26"/><text class="small" x="248" y="371">27</text>
  <rect class="high" x="298" y="352" width="80" height="26"/><text class="small" x="309" y="371">high=30</text>
  <text class="small" x="178" y="394">btpo_next = R</text>

  <rect class="right" x="550" y="302" width="260" height="100"/>
  <text class="label" x="604" y="334">leaf R</text>
  <rect class="key" x="578" y="352" width="48" height="26"/><text class="small" x="590" y="371">31</text>
  <rect class="key" x="636" y="352" width="48" height="26"/><text class="small" x="648" y="371">36</text>
  <rect class="high" x="696" y="352" width="80" height="26"/><text class="small" x="707" y="371">high=40</text>
  <text class="small" x="578" y="394">btpo_prev = L</text>

  <path class="arrow" d="M480 194 C430 238 346 262 282 302"/>
  <text class="text" x="120" y="258">父页仍可能把 key=36 引到 L</text>
  <path class="red" d="M382 376 C438 384 492 384 550 376"/>
  <text class="text" x="430" y="430">36 &gt; high key 30，沿 right link 到 R</text>

  <rect x="80" y="472" width="800" height="48" fill="#ffffff" stroke="#cbd5e1" rx="8"/>
  <text class="text" x="108" y="503">这就是 B-link tree 的工程价值：split 可以和查找并发，查找用页内边界自我修正。</text>
</svg>
