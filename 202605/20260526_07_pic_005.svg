<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">三种数据库 B-tree 实现对比</title>
  <desc id="desc">展示 PostgreSQL、InnoDB、SQLite 在叶子负载、MVCC、事务层和维护方式上的差异。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .col { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .h { fill: #dbeafe; stroke: #2563eb; stroke-width: 1; rx: 6; }
    .leaf { fill: #dcfce7; stroke: #16a34a; stroke-width: 1; rx: 6; }
    .txn { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 6; }
    .maint { fill: #fee2e2; stroke: #dc2626; stroke-width: 1; rx: 6; }
    .label { fill: #0f172a; font-size: 22px; font-family: Arial, sans-serif; font-weight: 700; }
    .text { fill: #334155; font-size: 16px; font-family: Arial, sans-serif; }
    .small { fill: #475569; font-size: 14px; font-family: Arial, sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="960" height="600"/>
  <text class="label" x="42" y="52">同样叫 B-tree，工程语义并不相同</text>
  <text class="text" x="42" y="84">判断索引代价时，要先问：叶子里到底放什么？MVCC 信息在哪里？谁负责清理？</text>

  <rect class="col" x="42" y="126" width="270" height="400"/>
  <rect class="h" x="68" y="154" width="218" height="48"/>
  <text class="label" x="102" y="185">PostgreSQL</text>
  <rect class="leaf" x="68" y="226" width="218" height="72"/>
  <text class="small" x="84" y="254">leaf tuple = key + heap TID</text>
  <text class="small" x="84" y="278">duplicate 可合并为 posting list</text>
  <rect class="txn" x="68" y="318" width="218" height="72"/>
  <text class="small" x="84" y="346">MVCC 在 heap tuple</text>
  <text class="small" x="84" y="370">index scan 需要回表判可见性</text>
  <rect class="maint" x="68" y="410" width="218" height="76"/>
  <text class="small" x="84" y="438">VACUUM / bottom-up deletion</text>
  <text class="small" x="84" y="462">high key + right link 处理 split</text>

  <rect class="col" x="345" y="126" width="270" height="400"/>
  <rect class="h" x="371" y="154" width="218" height="48"/>
  <text class="label" x="426" y="185">InnoDB</text>
  <rect class="leaf" x="371" y="226" width="218" height="72"/>
  <text class="small" x="387" y="254">clustered leaf = full row</text>
  <text class="small" x="387" y="278">secondary leaf = secondary key + PK</text>
  <rect class="txn" x="371" y="318" width="218" height="72"/>
  <text class="small" x="387" y="346">trx_id / roll ptr 支持 MVCC</text>
  <text class="small" x="387" y="370">二级索引可能回聚簇索引确认</text>
  <rect class="maint" x="371" y="410" width="218" height="76"/>
  <text class="small" x="387" y="438">delete-mark + purge</text>
  <text class="small" x="387" y="462">tree latch + page latch + mtr</text>

  <rect class="col" x="648" y="126" width="270" height="400"/>
  <rect class="h" x="674" y="154" width="218" height="48"/>
  <text class="label" x="730" y="185">SQLite</text>
  <rect class="leaf" x="674" y="226" width="218" height="72"/>
  <text class="small" x="690" y="254">table btree leaf = rowid + row</text>
  <text class="small" x="690" y="278">index btree leaf = key payload</text>
  <rect class="txn" x="674" y="318" width="218" height="72"/>
  <text class="small" x="690" y="346">Pager 负责锁、日志、WAL</text>
  <text class="small" x="690" y="370">Btree 层管理页和 cursor</text>
  <rect class="maint" x="674" y="410" width="218" height="76"/>
  <text class="small" x="690" y="438">balance_nonroot / deeper</text>
  <text class="small" x="690" y="462">freelist / overflow / autovacuum</text>

  <text class="text" x="42" y="568">工程结论：B-tree 是骨架，存储引擎的 MVCC、日志、锁、页格式决定了真实行为。</text>
</svg>
