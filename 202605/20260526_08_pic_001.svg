<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">GIN 索引的三层结构</title>
  <desc id="desc">展示 GIN metapage、entry tree、posting list、posting tree 和 pending list 的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; }
    .box { fill: #f7f8fa; stroke: #41506b; stroke-width: 1.4; rx: 6; }
    .meta { fill: #e8f1ff; stroke: #2d63ad; }
    .entry { fill: #eef8f2; stroke: #2f7d46; }
    .posting { fill: #fff7e6; stroke: #a86f00; }
    .pending { fill: #f9eaf0; stroke: #a03b61; }
    .arrow { stroke: #41506b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#41506b"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">GIN = key 的 B-tree + 每个 key 的 TID 集合</text>
  <rect x="40" y="72" width="170" height="96" class="box meta"/>
  <text x="66" y="106" class="label">metapage</text>
  <text x="62" y="132" class="small">root = block 1</text>
  <text x="62" y="152" class="small">pending head/tail</text>

  <rect x="280" y="64" width="420" height="220" class="box entry"/>
  <text x="430" y="96" class="label">entry tree</text>
  <text x="322" y="126" class="small">内部页: key + downlink</text>
  <rect x="345" y="146" width="110" height="42" class="box entry"/>
  <text x="370" y="172" class="tiny">key: error</text>
  <rect x="500" y="146" width="110" height="42" class="box entry"/>
  <text x="531" y="172" class="tiny">key: gin</text>
  <rect x="320" y="222" width="132" height="42" class="box entry"/>
  <text x="342" y="248" class="tiny">key: jsonb</text>
  <rect x="486" y="222" width="132" height="42" class="box entry"/>
  <text x="512" y="248" class="tiny">key: search</text>

  <rect x="304" y="346" width="210" height="92" class="box posting"/>
  <text x="340" y="376" class="label">posting list</text>
  <text x="326" y="402" class="small">小 TID 集合直接内联</text>
  <text x="326" y="424" class="tiny">(block, offset), compressed</text>

  <rect x="578" y="326" width="300" height="150" class="box posting"/>
  <text x="668" y="356" class="label">posting tree</text>
  <rect x="620" y="382" width="90" height="38" class="box posting"/>
  <text x="642" y="406" class="tiny">root</text>
  <rect x="602" y="440" width="90" height="30" class="box posting"/>
  <text x="623" y="460" class="tiny">leaf</text>
  <rect x="740" y="440" width="90" height="30" class="box posting"/>
  <text x="761" y="460" class="tiny">leaf</text>
  <text x="614" y="500" class="small">大 TID 集合拆成独立 B-tree</text>

  <rect x="760" y="72" width="170" height="210" class="box pending"/>
  <text x="797" y="106" class="label">pending list</text>
  <rect x="790" y="130" width="110" height="36" class="box pending"/>
  <text x="815" y="153" class="tiny">list page</text>
  <rect x="790" y="178" width="110" height="36" class="box pending"/>
  <text x="815" y="201" class="tiny">list page</text>
  <rect x="790" y="226" width="110" height="36" class="box pending"/>
  <text x="807" y="249" class="tiny">unsorted rows</text>

  <path d="M210 120 C244 116, 248 110, 280 110" class="arrow"/>
  <path d="M700 146 C726 142, 736 136, 760 132" class="arrow"/>
  <path d="M386 264 C392 294, 398 316, 406 346" class="arrow"/>
  <path d="M552 264 C594 292, 626 318, 662 382" class="arrow"/>
  <path d="M845 282 C822 330, 728 306, 618 264" class="arrow dash"/>
  <text x="716" y="316" class="small">cleanup 后批量合并</text>
</svg>
