<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">GIN 写入路径和 fastupdate</title>
  <desc id="desc">展示一行数据如何被 extractValue 拆成多个 key，并在 fastupdate 开启或关闭时进入不同写入路径。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 13px; }
    .box { fill: #f7f8fa; stroke: #41506b; stroke-width: 1.4; rx: 6; }
    .hot { fill: #fff1e6; stroke: #ba5c00; }
    .cool { fill: #eef8f2; stroke: #2f7d46; }
    .warn { fill: #fff8d7; stroke: #9a7900; }
    .arrow { stroke: #41506b; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#41506b"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">一行写入可能变成多次 key 插入</text>

  <rect x="54" y="88" width="180" height="86" class="box"/>
  <text x="92" y="122" class="label">heap tuple</text>
  <text x="78" y="148" class="small">tags = {pg, gin, json}</text>

  <rect x="302" y="82" width="210" height="98" class="box cool"/>
  <text x="342" y="116" class="label">extractValue</text>
  <text x="326" y="142" class="small">按 opclass 拆 key</text>
  <text x="326" y="162" class="small">key 数量决定写放大</text>

  <rect x="594" y="70" width="290" height="124" class="box hot"/>
  <text x="642" y="104" class="label">fastupdate = on</text>
  <text x="620" y="132" class="small">先写 pending list</text>
  <text x="620" y="152" class="small">前台写入快，但查询要额外扫 pending</text>
  <text x="620" y="172" class="small">超过阈值可能触发前台 cleanup</text>

  <rect x="594" y="256" width="290" height="104" class="box cool"/>
  <text x="638" y="292" class="label">fastupdate = off</text>
  <text x="620" y="320" class="small">每个 key 直接进 entry tree</text>
  <text x="620" y="340" class="small">写入更慢，读路径更稳定</text>

  <rect x="290" y="288" width="230" height="112" class="box warn"/>
  <text x="338" y="322" class="label">cleanup / VACUUM</text>
  <text x="318" y="350" class="small">pending entries 排序、聚合</text>
  <text x="318" y="370" class="small">同 key 的 TID 批量插入</text>

  <rect x="118" y="318" width="110" height="58" class="box cool"/>
  <text x="144" y="342" class="label">entry</text>
  <text x="136" y="362" class="small">key -> TIDs</text>

  <path d="M234 130 L302 130" class="arrow"/>
  <path d="M512 130 L594 130" class="arrow"/>
  <path d="M739 194 C738 222, 726 236, 702 256" class="arrow dash"/>
  <path d="M594 314 L520 340" class="arrow"/>
  <path d="M290 346 L228 346" class="arrow"/>
  <path d="M405 288 C430 238, 500 202, 594 172" class="arrow dash"/>
  <text x="380" y="236" class="small">批量合并降低重复搜索</text>
</svg>
