<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">GIN 查询路径</title>
  <desc id="desc">展示 extractQuery、entry 查找、posting list 或 posting tree 读取、pending list 扫描以及 TIDBitmap 回表复查的路径。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 13px; }
    .box { fill: #f7f8fa; stroke: #41506b; stroke-width: 1.4; rx: 6; }
    .query { fill: #e8f1ff; stroke: #2d63ad; }
    .tree { fill: #eef8f2; stroke: #2f7d46; }
    .bitmap { fill: #fff7e6; stroke: #a86f00; }
    .heap { fill: #f4edf8; stroke: #72499d; }
    .arrow { stroke: #41506b; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#41506b"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">GIN 只返回候选 TID，执行器用 Bitmap Heap Scan 回表</text>

  <rect x="54" y="90" width="200" height="88" class="box query"/>
  <text x="96" y="124" class="label">SQL predicate</text>
  <text x="78" y="150" class="small">jsonb @> / @@ / ?</text>

  <rect x="318" y="90" width="210" height="88" class="box query"/>
  <text x="362" y="124" class="label">extractQuery</text>
  <text x="346" y="150" class="small">拆出查询 key + searchMode</text>

  <rect x="594" y="72" width="270" height="116" class="box tree"/>
  <text x="666" y="106" class="label">main entry tree</text>
  <text x="620" y="134" class="small">精确 key: 定位一个 entry</text>
  <text x="620" y="154" class="small">partial match: 从下界向右扫</text>

  <rect x="594" y="246" width="270" height="88" class="box tree"/>
  <text x="648" y="280" class="label">pending list</text>
  <text x="620" y="306" class="small">fastupdate 开启时必须先扫</text>

  <rect x="332" y="258" width="176" height="72" class="box bitmap"/>
  <text x="364" y="286" class="label">posting 数据</text>
  <text x="356" y="310" class="small">list 或 tree 中的 TID</text>

  <rect x="288" y="400" width="252" height="82" class="box bitmap"/>
  <text x="356" y="432" class="label">TIDBitmap</text>
  <text x="318" y="458" class="small">多个 key 做 AND/OR/NOT 逻辑合并</text>

  <rect x="618" y="398" width="230" height="86" class="box heap"/>
  <text x="668" y="430" class="label">Bitmap Heap Scan</text>
  <text x="642" y="456" class="small">访问 heap，做 MVCC 与 recheck</text>

  <path d="M254 134 L318 134" class="arrow"/>
  <path d="M528 134 L594 134" class="arrow"/>
  <path d="M724 188 C700 226, 620 244, 508 278" class="arrow"/>
  <path d="M594 290 L508 294" class="arrow dash"/>
  <path d="M420 330 L414 400" class="arrow"/>
  <path d="M540 440 L618 440" class="arrow"/>
  <text x="614" y="226" class="small">同一行可能在多个 posting 中出现</text>
</svg>
