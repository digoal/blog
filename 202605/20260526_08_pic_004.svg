<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">GIN 使用边界</title>
  <desc id="desc">比较 GIN 与 B-tree、GiST、BRIN 的适用边界，并突出 key 数量、选择性、更新频率、pending list 的影响。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .axis { font-size: 14px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
    .small { font-size: 12px; }
    .panel { fill: #f7f8fa; stroke: #41506b; stroke-width: 1.4; rx: 6; }
    .good { fill: #eaf7ef; stroke: #2f7d46; }
    .warn { fill: #fff7e6; stroke: #a86f00; }
    .bad { fill: #f9eaf0; stroke: #a03b61; }
    .line { stroke: #41506b; stroke-width: 1.6; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#41506b"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">GIN 适合“行内多 key 查询”，不适合把所有条件都塞进去</text>

  <line x1="92" y1="438" x2="460" y2="438" class="line"/>
  <line x1="92" y1="438" x2="92" y2="110" class="line"/>
  <text x="214" y="470" class="axis">每行抽出的 key 数量增加</text>
  <text x="30" y="132" class="axis" transform="rotate(-90 30,132)">查询选择性提高</text>

  <rect x="124" y="266" width="142" height="86" class="panel warn"/>
  <text x="172" y="298" class="label">B-tree</text>
  <text x="144" y="324" class="small">标量等值/范围/排序</text>

  <rect x="260" y="154" width="160" height="112" class="panel good"/>
  <text x="325" y="188" class="label">GIN</text>
  <text x="286" y="214" class="small">数组包含</text>
  <text x="286" y="234" class="small">jsonb containment</text>
  <text x="286" y="254" class="small">全文检索 lexeme</text>

  <rect x="112" y="116" width="126" height="74" class="panel warn"/>
  <text x="157" y="146" class="label">GiST</text>
  <text x="132" y="170" class="small">空间/相似/签名</text>

  <rect x="312" y="330" width="120" height="72" class="panel warn"/>
  <text x="353" y="360" class="label">BRIN</text>
  <text x="332" y="384" class="small">物理相关的大表</text>

  <rect x="538" y="104" width="360" height="82" class="panel good"/>
  <text x="568" y="136" class="label">适合</text>
  <text x="568" y="162" class="small">读多写少，查询语义是“包含/成员/词项命中”，key 有复用且选择性足够。</text>

  <rect x="538" y="224" width="360" height="92" class="panel warn"/>
  <text x="568" y="256" class="label">需要监控</text>
  <text x="568" y="282" class="small">pending list、autovacuum、gin_pending_list_limit、索引膨胀、recheck 比例。</text>

  <rect x="538" y="354" width="360" height="92" class="panel bad"/>
  <text x="568" y="386" class="label">不适合</text>
  <text x="568" y="412" class="small">高频更新、低选择性热词、纯排序/范围、只查 JSON path 提取值、需要 index-only scan。</text>
</svg>
