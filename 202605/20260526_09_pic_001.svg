<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">GiST 树结构：内部节点保存子树谓词，叶子保存索引键和 TID</title>
  <desc id="desc">展示 GiST 根页、内部页、叶子页和 heap 行之间的映射。内部节点的 key 是覆盖子树的谓词，叶子节点的 key 指向 heap TID。</desc>
  <style>
    .page { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .root { fill: #dbeafe; }
    .internal { fill: #e0f2fe; }
    .leaf { fill: #dcfce7; }
    .heap { fill: #fef3c7; }
    .slot { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .cover { stroke: #0ea5e9; stroke-width: 2; stroke-dasharray: 7 5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="420" y="30" width="280" height="92" class="page root"/>
  <text x="560" y="60" text-anchor="middle" class="text">Root page</text>
  <rect x="445" y="75" width="105" height="32" class="slot"/>
  <rect x="570" y="75" width="105" height="32" class="slot"/>
  <text x="498" y="96" text-anchor="middle" class="small">P: bbox A</text>
  <text x="623" y="96" text-anchor="middle" class="small">P: bbox B</text>

  <rect x="140" y="190" width="300" height="115" class="page internal"/>
  <text x="290" y="220" text-anchor="middle" class="text">Internal page A</text>
  <rect x="165" y="240" width="110" height="36" class="slot"/>
  <rect x="300" y="240" width="110" height="36" class="slot"/>
  <text x="220" y="263" text-anchor="middle" class="small">P: A1</text>
  <text x="355" y="263" text-anchor="middle" class="small">P: A2</text>

  <rect x="680" y="190" width="300" height="115" class="page internal"/>
  <text x="830" y="220" text-anchor="middle" class="text">Internal page B</text>
  <rect x="705" y="240" width="110" height="36" class="slot"/>
  <rect x="840" y="240" width="110" height="36" class="slot"/>
  <text x="760" y="263" text-anchor="middle" class="small">P: B1</text>
  <text x="895" y="263" text-anchor="middle" class="small">P: B2</text>

  <rect x="40" y="380" width="235" height="112" class="page leaf"/>
  <text x="157" y="410" text-anchor="middle" class="text">Leaf A1</text>
  <rect x="62" y="430" width="88" height="34" class="slot"/>
  <rect x="165" y="430" width="88" height="34" class="slot"/>
  <text x="106" y="452" text-anchor="middle" class="small">key a</text>
  <text x="209" y="452" text-anchor="middle" class="small">key b</text>
  <text x="157" y="482" text-anchor="middle" class="tiny">leaf key + heap TID</text>

  <rect x="325" y="380" width="235" height="112" class="page leaf"/>
  <text x="442" y="410" text-anchor="middle" class="text">Leaf A2</text>
  <rect x="347" y="430" width="88" height="34" class="slot"/>
  <rect x="450" y="430" width="88" height="34" class="slot"/>
  <text x="391" y="452" text-anchor="middle" class="small">key c</text>
  <text x="494" y="452" text-anchor="middle" class="small">key d</text>
  <text x="442" y="482" text-anchor="middle" class="tiny">同一层谓词可重叠</text>

  <rect x="610" y="380" width="235" height="112" class="page leaf"/>
  <text x="727" y="410" text-anchor="middle" class="text">Leaf B1</text>
  <rect x="632" y="430" width="88" height="34" class="slot"/>
  <rect x="735" y="430" width="88" height="34" class="slot"/>
  <text x="676" y="452" text-anchor="middle" class="small">key e</text>
  <text x="779" y="452" text-anchor="middle" class="small">key f</text>
  <text x="727" y="482" text-anchor="middle" class="tiny">consistent 决定是否下探</text>

  <rect x="895" y="380" width="185" height="112" class="page leaf"/>
  <text x="987" y="410" text-anchor="middle" class="text">Leaf B2</text>
  <rect x="922" y="430" width="130" height="34" class="slot"/>
  <text x="987" y="452" text-anchor="middle" class="small">key g</text>
  <text x="987" y="482" text-anchor="middle" class="tiny">TID 指向 heap</text>

  <rect x="370" y="535" width="380" height="58" class="page heap"/>
  <text x="560" y="570" text-anchor="middle" class="text">Heap tuples: (block, offset) 行版本</text>

  <path d="M492 122 C420 145 355 165 290 190" class="arrow"/>
  <path d="M628 122 C700 145 765 165 830 190" class="arrow"/>
  <path d="M220 276 C200 320 176 348 157 380" class="arrow"/>
  <path d="M355 276 C390 320 420 348 442 380" class="arrow"/>
  <path d="M760 276 C740 320 730 348 727 380" class="arrow"/>
  <path d="M895 276 C940 320 965 348 987 380" class="arrow"/>
  <path d="M157 492 C250 525 360 535 460 535" class="arrow"/>
  <path d="M727 492 C680 520 650 530 625 535" class="arrow"/>

  <ellipse cx="520" cy="355" rx="455" ry="235" class="cover"/>
  <text x="560" y="337" text-anchor="middle" class="small">父节点谓词只承诺“可能包含”，不是排序边界</text>
</svg>
