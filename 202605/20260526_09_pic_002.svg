<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">GiST opclass 契约：正确性函数与效率函数</title>
  <desc id="desc">展示 GiST 核心代码调用 operator class 支持函数。consistent、union、same 影响正确性；penalty、picksplit、compress、distance 等影响效率与能力。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .core { fill: #dbeafe; }
    .correct { fill: #dcfce7; }
    .fast { fill: #fef3c7; }
    .optional { fill: #fce7f3; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="380" y="35" width="360" height="92" class="box core"/>
  <text x="560" y="68" text-anchor="middle" class="text">GiST core</text>
  <text x="560" y="98" text-anchor="middle" class="small">页面、WAL、锁、搜索、插入、VACUUM</text>

  <rect x="55" y="195" width="260" height="106" class="box correct"/>
  <text x="185" y="226" text-anchor="middle" class="text">consistent</text>
  <text x="185" y="254" text-anchor="middle" class="small">谓词是否可能成立</text>
  <text x="185" y="280" text-anchor="middle" class="tiny">返回 recheck 控制候选复查</text>

  <rect x="335" y="195" width="210" height="106" class="box correct"/>
  <text x="440" y="226" text-anchor="middle" class="text">union</text>
  <text x="440" y="254" text-anchor="middle" class="small">计算子树覆盖键</text>
  <text x="440" y="280" text-anchor="middle" class="tiny">维护父节点谓词</text>

  <rect x="565" y="195" width="210" height="106" class="box correct"/>
  <text x="670" y="226" text-anchor="middle" class="text">same</text>
  <text x="670" y="254" text-anchor="middle" class="small">判断键是否等价</text>
  <text x="670" y="280" text-anchor="middle" class="tiny">避免无意义替换</text>

  <rect x="795" y="195" width="260" height="106" class="box fast"/>
  <text x="925" y="226" text-anchor="middle" class="text">penalty</text>
  <text x="925" y="254" text-anchor="middle" class="small">插入时选择子树</text>
  <text x="925" y="280" text-anchor="middle" class="tiny">决定重叠、膨胀、局部性</text>

  <rect x="105" y="390" width="245" height="106" class="box fast"/>
  <text x="227" y="421" text-anchor="middle" class="text">picksplit</text>
  <text x="227" y="449" text-anchor="middle" class="small">页满后如何拆页</text>
  <text x="227" y="475" text-anchor="middle" class="tiny">决定树质量和空间利用率</text>

  <rect x="390" y="390" width="245" height="106" class="box optional"/>
  <text x="512" y="421" text-anchor="middle" class="text">compress / fetch</text>
  <text x="512" y="449" text-anchor="middle" class="small">索引物理表示</text>
  <text x="512" y="475" text-anchor="middle" class="tiny">有损压缩会影响 index-only scan</text>

  <rect x="675" y="390" width="245" height="106" class="box optional"/>
  <text x="797" y="421" text-anchor="middle" class="text">distance / sortsupport</text>
  <text x="797" y="449" text-anchor="middle" class="small">KNN 与快速构建</text>
  <text x="797" y="475" text-anchor="middle" class="tiny">支持 ORDER BY 距离和 sorted build</text>

  <path d="M500 127 C430 155 300 170 185 195" class="arrow"/>
  <path d="M535 127 C500 155 465 170 440 195" class="arrow"/>
  <path d="M590 127 C620 155 650 170 670 195" class="arrow"/>
  <path d="M650 127 C760 155 870 170 925 195" class="arrow"/>
  <path d="M185 301 C190 340 205 365 227 390" class="arrow dash"/>
  <path d="M440 301 C455 340 482 365 512 390" class="arrow dash"/>
  <path d="M925 301 C895 340 845 365 797 390" class="arrow dash"/>

  <text x="560" y="555" text-anchor="middle" class="small">GiST 的关键取舍：核心负责数据库工程，opclass 负责领域语义；正确性函数错了会漏查，效率函数差了会慢或膨胀。</text>
</svg>
