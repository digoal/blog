<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">GiST 搜索、KNN 与插入路径</title>
  <desc id="desc">展示普通搜索通过 consistent 剪枝，KNN 搜索用距离优先队列，插入通过 penalty 选路并用 union 扩大父键。</desc>
  <style>
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .node { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 7; }
    .leaf { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 7; }
    .queue { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 7; }
    .reject { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 7; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .red { stroke: #b91c1c; }
    .green { stroke: #15803d; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="35" y="35" width="500" height="565" class="panel"/>
  <text x="285" y="70" text-anchor="middle" class="text">搜索路径：consistent 剪枝</text>
  <rect x="225" y="105" width="120" height="54" class="node"/>
  <text x="285" y="138" text-anchor="middle" class="small">Root</text>
  <rect x="85" y="220" width="140" height="60" class="node"/>
  <text x="155" y="245" text-anchor="middle" class="small">子树 A</text>
  <text x="155" y="267" text-anchor="middle" class="tiny">consistent=true</text>
  <rect x="350" y="220" width="140" height="60" class="reject"/>
  <text x="420" y="245" text-anchor="middle" class="small">子树 B</text>
  <text x="420" y="267" text-anchor="middle" class="tiny">consistent=false</text>
  <rect x="80" y="355" width="150" height="70" class="leaf"/>
  <text x="155" y="383" text-anchor="middle" class="small">Leaf</text>
  <text x="155" y="407" text-anchor="middle" class="tiny">返回候选 TID</text>
  <rect x="285" y="355" width="200" height="70" class="queue"/>
  <text x="385" y="383" text-anchor="middle" class="small">Bitmap / Index Scan</text>
  <text x="385" y="407" text-anchor="middle" class="tiny">按 recheck 再验算行值</text>
  <path d="M260 159 C230 185 190 200 155 220" class="arrow green"/>
  <path d="M315 159 C350 185 390 200 420 220" class="arrow red"/>
  <path d="M155 280 C155 310 155 330 155 355" class="arrow green"/>
  <path d="M155 425 C205 455 285 445 325 425" class="arrow"/>
  <text x="285" y="520" text-anchor="middle" class="small">普通扫描：队列倾向深度优先，尽快吐出前几个 heap tuple。</text>
  <text x="285" y="548" text-anchor="middle" class="small">KNN 扫描：队列按 distance 的下界从小到大出队。</text>

  <rect x="585" y="35" width="500" height="565" class="panel"/>
  <text x="835" y="70" text-anchor="middle" class="text">插入路径：penalty 选路，union 维护覆盖</text>
  <rect x="775" y="105" width="120" height="54" class="node"/>
  <text x="835" y="138" text-anchor="middle" class="small">Root</text>
  <rect x="630" y="220" width="165" height="70" class="node"/>
  <text x="712" y="247" text-anchor="middle" class="small">子树 A</text>
  <text x="712" y="271" text-anchor="middle" class="tiny">penalty=12</text>
  <rect x="875" y="220" width="165" height="70" class="node"/>
  <text x="957" y="247" text-anchor="middle" class="small">子树 B</text>
  <text x="957" y="271" text-anchor="middle" class="tiny">penalty=3</text>
  <rect x="875" y="365" width="165" height="72" class="leaf"/>
  <text x="957" y="394" text-anchor="middle" class="small">目标 Leaf</text>
  <text x="957" y="418" text-anchor="middle" class="tiny">插入新 key</text>
  <rect x="625" y="365" width="180" height="72" class="queue"/>
  <text x="715" y="394" text-anchor="middle" class="small">如果页满</text>
  <text x="715" y="418" text-anchor="middle" class="tiny">picksplit + downlink</text>
  <path d="M812 159 C780 185 740 198 712 220" class="arrow"/>
  <path d="M865 159 C905 185 940 198 957 220" class="arrow green"/>
  <path d="M957 290 C957 320 957 340 957 365" class="arrow green"/>
  <path d="M875 404 C850 404 830 404 805 404" class="arrow"/>
  <path d="M715 365 C730 325 775 300 835 288" class="arrow"/>
  <text x="835" y="520" text-anchor="middle" class="small">父 key 不覆盖新 key 时，用 union 扩大覆盖范围。</text>
  <text x="835" y="548" text-anchor="middle" class="small">页分裂后，旧页和新页的 downlink 继续向上插入，最坏递归到 root。</text>
</svg>
