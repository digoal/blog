<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">GiST 并发分裂与 VACUUM 回收边界</title>
  <desc id="desc">展示页分裂先产生右兄弟，再插入父 downlink；搜索用 F_FOLLOW_RIGHT、rightlink 和 NSN 避免漏扫。VACUUM 只能尽力删除空叶子页。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .page { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 7; }
    .leaf { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 7; }
    .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 7; }
    .dead { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 7; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="35" y="35" width="1050" height="250" class="box"/>
  <text x="560" y="70" text-anchor="middle" class="text">并发页分裂：搜索只锁一页，也不能漏掉右兄弟</text>
  <rect x="100" y="120" width="185" height="72" class="leaf"/>
  <text x="192" y="148" text-anchor="middle" class="small">左页 L</text>
  <text x="192" y="172" text-anchor="middle" class="tiny">F_FOLLOW_RIGHT</text>
  <rect x="360" y="120" width="185" height="72" class="leaf"/>
  <text x="452" y="148" text-anchor="middle" class="small">新右页 R</text>
  <text x="452" y="172" text-anchor="middle" class="tiny">rightlink 可达</text>
  <rect x="690" y="110" width="250" height="92" class="page"/>
  <text x="815" y="142" text-anchor="middle" class="small">父页 P</text>
  <text x="815" y="168" text-anchor="middle" class="tiny">稍后插入 R 的 downlink</text>
  <path d="M285 156 C315 156 335 156 360 156" class="arrow"/>
  <path d="M545 156 C610 156 640 156 690 156" class="arrow dash"/>
  <text x="560" y="238" text-anchor="middle" class="small">如果搜索先看父页、后看子页，依靠 F_FOLLOW_RIGHT 或 child.NSN &gt; parent.LSN 判断是否追右链。</text>
  <text x="560" y="264" text-anchor="middle" class="small">插入遇到未完成分裂，会先补齐父 downlink；这让崩溃恢复后的树重新变得好走。</text>

  <rect x="35" y="335" width="1050" height="230" class="box"/>
  <text x="560" y="370" text-anchor="middle" class="text">VACUUM：先清理死 TID，再尽力删除空叶子页</text>
  <rect x="95" y="420" width="210" height="72" class="leaf"/>
  <text x="200" y="449" text-anchor="middle" class="small">扫描所有页</text>
  <text x="200" y="473" text-anchor="middle" class="tiny">识别 dead tuples / 空叶子</text>
  <rect x="395" y="420" width="210" height="72" class="warn"/>
  <text x="500" y="449" text-anchor="middle" class="small">找父 downlink</text>
  <text x="500" y="473" text-anchor="middle" class="tiny">并发 split 可能让查找失败</text>
  <rect x="695" y="420" width="210" height="72" class="dead"/>
  <text x="800" y="449" text-anchor="middle" class="small">标记 deleted</text>
  <text x="800" y="473" text-anchor="middle" class="tiny">等待旧扫描不可见后复用</text>
  <path d="M305 456 C335 456 365 456 395 456" class="arrow"/>
  <path d="M605 456 C635 456 665 456 695 456" class="arrow"/>
  <text x="560" y="535" text-anchor="middle" class="small">边界：当前只删除空叶子页；最后一个子页不能删；失败会留给下一次 VACUUM。</text>
</svg>
