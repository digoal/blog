<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">PostGIS GiST：边界框过滤、精确复查与复合索引</title>
  <desc id="desc">展示 PostGIS 把 geometry/geography 压缩成 2D 或 ND 边界框，GiST 先过滤候选，再执行精确空间函数；复合 GiST 可把空间和时间条件放进同一棵树。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .stage { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 7; }
    .gist { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 7; }
    .heap { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 7; }
    .reject { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 7; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .shape { fill: none; stroke: #0f766e; stroke-width: 3; }
    .bbox { fill: rgba(14,165,233,0.12); stroke: #0284c7; stroke-width: 2; stroke-dasharray: 7 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="35" y="35" width="1050" height="555" class="box"/>
  <text x="560" y="72" text-anchor="middle" class="text">PostGIS：GiST 存的是可剪枝的空间摘要，不是完整几何</text>

  <rect x="80" y="125" width="230" height="140" class="stage"/>
  <text x="195" y="158" text-anchor="middle" class="text">原始 geometry</text>
  <path d="M130 220 C150 145 250 145 265 225 C210 200 185 245 130 220" class="shape"/>
  <rect x="122" y="144" width="150" height="105" class="bbox"/>
  <text x="195" y="252" text-anchor="middle" class="tiny">compress: BOX2DF / GIDX</text>

  <rect x="430" y="115" width="260" height="160" class="gist"/>
  <text x="560" y="148" text-anchor="middle" class="text">GiST bbox 过滤</text>
  <text x="560" y="182" text-anchor="middle" class="small">&amp;&amp;：2D box overlap</text>
  <text x="560" y="208" text-anchor="middle" class="small">&amp;&amp;&amp;：n-D box overlap</text>
  <text x="560" y="234" text-anchor="middle" class="tiny">consistent 返回候选或剪枝</text>

  <rect x="795" y="125" width="230" height="140" class="heap"/>
  <text x="910" y="158" text-anchor="middle" class="text">精确空间计算</text>
  <text x="910" y="192" text-anchor="middle" class="small">ST_Intersects</text>
  <text x="910" y="218" text-anchor="middle" class="small">ST_DWithin / ST_Contains</text>
  <text x="910" y="244" text-anchor="middle" class="tiny">必要时回表复查</text>

  <path d="M310 195 C350 195 390 195 430 195" class="arrow"/>
  <path d="M690 195 C730 195 755 195 795 195" class="arrow"/>

  <rect x="115" y="365" width="230" height="95" class="stage"/>
  <text x="230" y="398" text-anchor="middle" class="text">空间条件</text>
  <text x="230" y="430" text-anchor="middle" class="small">geom &amp;&amp; envelope</text>
  <rect x="445" y="345" width="230" height="135" class="gist"/>
  <text x="560" y="378" text-anchor="middle" class="text">复合 GiST</text>
  <text x="560" y="410" text-anchor="middle" class="small">(geom, ts_range)</text>
  <text x="560" y="438" text-anchor="middle" class="tiny">第一列选择性最影响扫描范围</text>
  <rect x="775" y="365" width="230" height="95" class="stage"/>
  <text x="890" y="398" text-anchor="middle" class="text">时间条件</text>
  <text x="890" y="430" text-anchor="middle" class="small">valid_at &amp;&amp; query_range</text>
  <path d="M345 412 C385 412 405 412 445 412" class="arrow"/>
  <path d="M775 412 C735 412 715 412 675 412" class="arrow"/>

  <rect x="420" y="520" width="280" height="42" class="reject"/>
  <text x="560" y="547" text-anchor="middle" class="small">低选择性第一列会让复合 GiST 退化为扫大量索引项</text>
</svg>
