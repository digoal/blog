<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">SP-GiST 的空间分区模型</title>
  <desc id="desc">对比 B-tree 的线性排序、GiST 的可重叠谓词和 SP-GiST 的不相交分区树，说明 SP-GiST 适合 quad-tree、kd-tree 和 radix tree。</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5}.title{font:700 20px sans-serif;fill:#0f172a}.text{font:15px sans-serif;fill:#334155}.small{font:13px sans-serif;fill:#475569}.axis{stroke:#64748b;stroke-width:2}.node{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5}.leaf{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.warn{fill:#fee2e2;stroke:#dc2626;stroke-width:1.5}.part{fill:#fef3c7;stroke:#d97706;stroke-width:1.5}.line{stroke:#475569;stroke-width:1.5;fill:none}.dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:5 5}.label{font:700 14px sans-serif;fill:#0f172a}
  </style>
  <rect class="bg" width="980" height="520"/>
  <text class="title" x="40" y="42">同样是索引树，SP-GiST 解决的是“递归切分空间”的问题</text>

  <rect class="panel" x="40" y="75" width="270" height="360" rx="8"/>
  <text class="label" x="62" y="105">B-tree：线性全序</text>
  <line class="axis" x1="72" y1="210" x2="278" y2="210"/>
  <line class="axis" x1="72" y1="210" x2="72" y2="195"/>
  <line class="axis" x1="130" y1="210" x2="130" y2="195"/>
  <line class="axis" x1="190" y1="210" x2="190" y2="195"/>
  <line class="axis" x1="248" y1="210" x2="248" y2="195"/>
  <text class="small" x="64" y="235">10</text>
  <text class="small" x="121" y="235">20</text>
  <text class="small" x="181" y="235">30</text>
  <text class="small" x="238" y="235">40</text>
  <rect class="node" x="86" y="135" width="56" height="34" rx="5"/>
  <rect class="node" x="174" y="135" width="56" height="34" rx="5"/>
  <path class="line" d="M142 152 C160 152 160 152 174 152"/>
  <text class="small" x="79" y="287">适合：=、范围、排序</text>
  <text class="small" x="79" y="315">路径：通常唯一</text>
  <text class="small" x="79" y="343">问题：复杂对象难转成全序</text>

  <rect class="panel" x="355" y="75" width="270" height="360" rx="8"/>
  <text class="label" x="377" y="105">GiST：可重叠谓词</text>
  <rect class="warn" x="395" y="150" width="120" height="95" rx="8"/>
  <rect class="warn" x="455" y="190" width="120" height="95" rx="8" opacity="0.75"/>
  <circle cx="430" cy="185" r="8" fill="#dc2626"/>
  <circle cx="520" cy="245" r="8" fill="#dc2626"/>
  <text class="small" x="386" y="315">内部项：子树摘要</text>
  <text class="small" x="386" y="343">搜索：可能下探多条路径</text>
  <text class="small" x="386" y="371">代价：重叠越多，剪枝越弱</text>

  <rect class="panel" x="670" y="75" width="270" height="360" rx="8"/>
  <text class="label" x="692" y="105">SP-GiST：不相交分区</text>
  <rect class="part" x="718" y="140" width="150" height="150" rx="4"/>
  <line class="axis" x1="793" y1="140" x2="793" y2="290"/>
  <line class="axis" x1="718" y1="215" x2="868" y2="215"/>
  <circle cx="790" cy="212" r="5" fill="#d97706"/>
  <text class="small" x="730" y="166">Q4</text>
  <text class="small" x="835" y="166">Q1</text>
  <text class="small" x="730" y="276">Q3</text>
  <text class="small" x="835" y="276">Q2</text>
  <path class="dash" d="M793 215 L910 345"/>
  <rect class="leaf" x="735" y="322" width="70" height="34" rx="5"/>
  <rect class="leaf" x="817" y="322" width="70" height="34" rx="5"/>
  <text class="small" x="706" y="392">适合：quad-tree、kd-tree、trie</text>
  <text class="small" x="706" y="420">前提：查询能贴合分区规则</text>
  <text class="small" x="706" y="448">风险：倾斜数据会生成深路径</text>

  <text class="text" x="40" y="486">SP-GiST 不是“更通用的 GiST”，而是把一类非平衡、递归分区树工程化到数据库页、WAL、锁和 VACUUM 中。</text>
</svg>
