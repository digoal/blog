<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">SP-GiST 页面与元组布局</title>
  <desc id="desc">展示 SP-GiST 固定页面、inner page、leaf page、inner tuple、node tuple 和 leaf tuple 的关系。</desc>
  <style>
    .bg{fill:#f8fafc}.title{font:700 20px sans-serif;fill:#0f172a}.text{font:15px sans-serif;fill:#334155}.small{font:13px sans-serif;fill:#475569}.page{fill:#ffffff;stroke:#64748b;stroke-width:1.5}.meta{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5}.inner{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.5}.leaf{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.dead{fill:#fee2e2;stroke:#dc2626;stroke-width:1.5}.slot{fill:#f8fafc;stroke:#94a3b8;stroke-width:1}.line{stroke:#475569;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.4;stroke-dasharray:5 5;fill:none}.label{font:700 14px sans-serif;fill:#0f172a}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="40" y="42">SP-GiST 把逻辑树节点映射到少量磁盘页</text>

  <rect class="meta" x="40" y="80" width="155" height="70" rx="8"/>
  <text class="label" x="58" y="108">Block 0</text>
  <text class="small" x="58" y="132">metapage</text>
  <rect class="inner" x="230" y="80" width="155" height="70" rx="8"/>
  <text class="label" x="248" y="108">Block 1</text>
  <text class="small" x="248" y="132">normal root</text>
  <rect class="leaf" x="420" y="80" width="155" height="70" rx="8"/>
  <text class="label" x="438" y="108">Block 2</text>
  <text class="small" x="438" y="132">null root</text>
  <text class="small" x="620" y="100">固定页面来自 `spgist_private.h`：</text>
  <text class="small" x="620" y="124">普通值和 NULL 值使用分离的根。</text>

  <rect class="page" x="60" y="210" width="390" height="255" rx="8"/>
  <text class="label" x="82" y="238">Inner page：只放 inner tuple</text>
  <rect class="inner" x="95" y="265" width="315" height="150" rx="6"/>
  <text class="small" x="115" y="292">SpGistInnerTuple</text>
  <rect class="slot" x="115" y="315" width="90" height="62" rx="4"/>
  <text class="small" x="128" y="340">prefix</text>
  <text class="small" x="128" y="361">中心点/前缀</text>
  <rect class="slot" x="222" y="315" width="70" height="62" rx="4"/>
  <text class="small" x="234" y="340">node 0</text>
  <text class="small" x="234" y="361">downlink</text>
  <rect class="slot" x="310" y="315" width="70" height="62" rx="4"/>
  <text class="small" x="322" y="340">node N</text>
  <text class="small" x="322" y="361">downlink</text>
  <text class="small" x="82" y="445">node = 可选 label + 指向 inner tuple 或 leaf 链的 TID</text>

  <rect class="page" x="530" y="210" width="390" height="255" rx="8"/>
  <text class="label" x="552" y="238">Leaf page：只放 leaf tuple 链</text>
  <rect class="leaf" x="560" y="283" width="95" height="78" rx="6"/>
  <text class="small" x="576" y="306">leaf</text>
  <text class="small" x="576" y="329">datum</text>
  <text class="small" x="576" y="351">heap TID</text>
  <rect class="leaf" x="692" y="283" width="95" height="78" rx="6"/>
  <text class="small" x="708" y="306">leaf</text>
  <text class="small" x="708" y="329">datum</text>
  <text class="small" x="708" y="351">nextOffset</text>
  <rect class="dead" x="824" y="283" width="70" height="78" rx="6"/>
  <text class="small" x="836" y="312">dead /</text>
  <text class="small" x="836" y="335">redirect</text>
  <path class="line" d="M655 322 L692 322"/>
  <path class="line" d="M787 322 L824 322"/>
  <text class="small" x="552" y="407">同一父 node 的 leaf 链必须在同一页。</text>
  <text class="small" x="552" y="431">这样 nextOffset 可以用页内 offset，减少跨页 seek。</text>

  <path class="line" d="M292 377 C410 500 545 396 560 340"/>
  <path class="dash" d="M345 377 C500 172 655 175 720 280"/>
  <text class="text" x="40" y="520">关键边界：inner tuple、leaf tuple、单个 node 下的 leaf 链都必须适合页容量；这决定了 opclass 不能无限增加节点数或保存过大的前缀/叶值。</text>
</svg>
