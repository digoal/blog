<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
  <title id="title">SP-GiST 插入与扫描链路</title>
  <desc id="desc">展示 SP-GiST support functions 在插入、叶页分裂、普通扫描和 KNN 扫描中的角色。</desc>
  <style>
    .bg{fill:#f8fafc}.title{font:700 20px sans-serif;fill:#0f172a}.text{font:15px sans-serif;fill:#334155}.small{font:13px sans-serif;fill:#475569}.box{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5}.core{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5}.op{fill:#fef3c7;stroke:#d97706;stroke-width:1.5}.leaf{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.queue{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.4;stroke-dasharray:5 5;fill:none;marker-end:url(#arrow)}.label{font:700 14px sans-serif;fill:#0f172a}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="600"/>
  <text class="title" x="40" y="42">SP-GiST core 管页和并发，opclass 管分区语义</text>

  <text class="label" x="55" y="88">插入路径</text>
  <rect class="core" x="55" y="110" width="160" height="58" rx="8"/>
  <text class="small" x="76" y="137">spgdoinsert</text>
  <text class="small" x="76" y="157">从 root 下探</text>
  <rect class="op" x="270" y="110" width="165" height="58" rx="8"/>
  <text class="small" x="292" y="137">choose()</text>
  <text class="small" x="292" y="157">选 Match/Add/Split</text>
  <rect class="core" x="490" y="110" width="165" height="58" rx="8"/>
  <text class="small" x="512" y="137">改 inner tuple</text>
  <text class="small" x="512" y="157">或继续下探</text>
  <rect class="leaf" x="710" y="110" width="165" height="58" rx="8"/>
  <text class="small" x="732" y="137">leaf page</text>
  <text class="small" x="732" y="157">追加 leaf tuple</text>
  <path class="line" d="M215 139 L270 139"/>
  <path class="line" d="M435 139 L490 139"/>
  <path class="line" d="M655 139 L710 139"/>

  <rect class="op" x="270" y="220" width="165" height="66" rx="8"/>
  <text class="small" x="292" y="247">picksplit()</text>
  <text class="small" x="292" y="267">叶链放不下时</text>
  <rect class="core" x="490" y="220" width="165" height="66" rx="8"/>
  <text class="small" x="512" y="247">生成 inner tuple</text>
  <text class="small" x="512" y="267">分配 leaf 链</text>
  <rect class="core" x="710" y="220" width="165" height="66" rx="8"/>
  <text class="small" x="732" y="247">WAL + redirect</text>
  <text class="small" x="732" y="267">保持并发扫描可达</text>
  <path class="dash" d="M792 168 C790 205 520 186 435 238"/>
  <path class="line" d="M435 253 L490 253"/>
  <path class="line" d="M655 253 L710 253"/>

  <text class="label" x="55" y="355">扫描路径</text>
  <rect class="core" x="55" y="380" width="160" height="58" rx="8"/>
  <text class="small" x="76" y="407">spggettuple /</text>
  <text class="small" x="76" y="427">spggetbitmap</text>
  <rect class="op" x="270" y="380" width="165" height="58" rx="8"/>
  <text class="small" x="292" y="407">inner_consistent()</text>
  <text class="small" x="292" y="427">选要访问的 nodes</text>
  <rect class="queue" x="490" y="380" width="165" height="58" rx="8"/>
  <text class="small" x="512" y="407">scanQueue</text>
  <text class="small" x="512" y="427">普通 / 距离优先</text>
  <rect class="op" x="710" y="380" width="165" height="58" rx="8"/>
  <text class="small" x="732" y="407">leaf_consistent()</text>
  <text class="small" x="732" y="427">候选 + recheck</text>
  <path class="line" d="M215 409 L270 409"/>
  <path class="line" d="M435 409 L490 409"/>
  <path class="line" d="M655 409 L710 409"/>

  <rect class="box" x="110" y="490" width="760" height="58" rx="8"/>
  <text class="text" x="135" y="523">KNN 是扫描队列的排序问题：opclass 给每个子 node 或 leaf 返回距离下界，core 用优先队列先访问最可能近的项。</text>
</svg>
