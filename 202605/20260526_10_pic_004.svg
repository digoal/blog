<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">SP-GiST 并发与 VACUUM 生命周期</title>
  <desc id="desc">展示 SP-GiST 使用 redirect、dead、placeholder 元组维持并发扫描安全和 VACUUM 清理。</desc>
  <style>
    .bg{fill:#f8fafc}.title{font:700 20px sans-serif;fill:#0f172a}.text{font:15px sans-serif;fill:#334155}.small{font:13px sans-serif;fill:#475569}.box{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5}.live{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.redirect{fill:#fef3c7;stroke:#d97706;stroke-width:1.5}.dead{fill:#fee2e2;stroke:#dc2626;stroke-width:1.5}.place{fill:#e2e8f0;stroke:#64748b;stroke-width:1.5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.4;stroke-dasharray:5 5;fill:none;marker-end:url(#arrow)}.label{font:700 14px sans-serif;fill:#0f172a}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="40" y="42">SP-GiST 不移动 offset，而是用状态元组维持可达性</text>

  <rect class="box" x="60" y="95" width="250" height="310" rx="8"/>
  <text class="label" x="84" y="126">1. 正常叶链</text>
  <rect class="live" x="95" y="170" width="70" height="58" rx="6"/>
  <text class="small" x="112" y="203">LIVE</text>
  <rect class="live" x="205" y="170" width="70" height="58" rx="6"/>
  <text class="small" x="222" y="203">LIVE</text>
  <path class="line" d="M165 199 L205 199"/>
  <text class="small" x="88" y="285">父 inner node 的 downlink</text>
  <text class="small" x="88" y="309">指向链头 offset。</text>
  <text class="small" x="88" y="333">链内 nextOffset 都是页内 offset。</text>

  <rect class="box" x="365" y="95" width="250" height="310" rx="8"/>
  <text class="label" x="389" y="126">2. 并发移动/分裂</text>
  <rect class="redirect" x="400" y="170" width="88" height="58" rx="6"/>
  <text class="small" x="414" y="194">REDIRECT</text>
  <text class="small" x="414" y="214">to new TID</text>
  <rect class="live" x="522" y="170" width="70" height="58" rx="6"/>
  <text class="small" x="539" y="203">LIVE</text>
  <path class="line" d="M488 199 L522 199"/>
  <text class="small" x="393" y="285">旧扫描可能已读过父页。</text>
  <text class="small" x="393" y="309">redirect 让它到新位置继续。</text>
  <text class="small" x="393" y="333">插入路径不应再指到 redirect。</text>

  <rect class="box" x="670" y="95" width="250" height="310" rx="8"/>
  <text class="label" x="694" y="126">3. VACUUM 后</text>
  <rect class="dead" x="705" y="170" width="70" height="58" rx="6"/>
  <text class="small" x="722" y="203">DEAD</text>
  <rect class="place" x="815" y="170" width="88" height="58" rx="6"/>
  <text class="small" x="829" y="194">PLACE-</text>
  <text class="small" x="829" y="214">HOLDER</text>
  <path class="dash" d="M775 199 L815 199"/>
  <text class="small" x="698" y="285">删除链头且无 live tuple 时，</text>
  <text class="small" x="698" y="309">保留 DEAD 让父 downlink 有效。</text>
  <text class="small" x="698" y="333">尾部 placeholder 可被回收。</text>

  <path class="line" d="M310 250 L365 250"/>
  <path class="line" d="M615 250 L670 250"/>
  <rect class="box" x="115" y="450" width="750" height="58" rx="8"/>
  <text class="text" x="138" y="483">维护目标不是“立刻整理成最干净的树”，而是在并发扫描、页内 offset 稳定、VACUUM 可回收之间取工程平衡。</text>
</svg>
