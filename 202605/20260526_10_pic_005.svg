<svg xmlns="http://www.w3.org/2000/svg" width="980" height="610" viewBox="0 0 980 610" role="img" aria-labelledby="title desc">
  <title id="title">PostGIS SP-GiST 的 4D 与 2N 维映射</title>
  <desc id="desc">展示 PostGIS 把 2D bounding box 映射为 4D 点，并用 16 个象限避免 R-tree 中重叠对象带来的剪枝问题。</desc>
  <style>
    .bg{fill:#f8fafc}.title{font:700 20px sans-serif;fill:#0f172a}.text{font:15px sans-serif;fill:#334155}.small{font:13px sans-serif;fill:#475569}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5}.box1{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.box2{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.cent{fill:#fef3c7;stroke:#d97706;stroke-width:1.5}.node{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.axis{stroke:#64748b;stroke-width:2}.dash{stroke:#94a3b8;stroke-width:1.4;stroke-dasharray:5 5}.label{font:700 14px sans-serif;fill:#0f172a}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="610"/>
  <text class="title" x="40" y="42">PostGIS：把“会重叠的空间对象”变成“高维点”再分区</text>

  <rect class="panel" x="45" y="85" width="270" height="390" rx="8"/>
  <text class="label" x="70" y="118">真实 2D 空间</text>
  <line class="axis" x1="85" y1="420" x2="270" y2="420"/>
  <line class="axis" x1="85" y1="420" x2="85" y2="165"/>
  <rect class="box1" x="115" y="245" width="105" height="95" rx="4" opacity="0.8"/>
  <rect class="box2" x="165" y="205" width="95" height="115" rx="4" opacity="0.7"/>
  <text class="small" x="118" y="362">两个 polygon 的 bbox 可重叠</text>
  <text class="small" x="118" y="386">R-tree/GiST 会保存重叠 MBR</text>
  <text class="small" x="118" y="410">重叠多时多路径下探</text>

  <rect class="panel" x="355" y="85" width="270" height="390" rx="8"/>
  <text class="label" x="380" y="118">BOX2DF 作为 4D 点</text>
  <rect class="node" x="395" y="155" width="190" height="60" rx="8"/>
  <text class="small" x="417" y="180">bbox = xmin,xmax,ymin,ymax</text>
  <text class="small" x="417" y="201">point4D = 四个坐标</text>
  <path class="line" d="M490 215 L490 255"/>
  <rect class="cent" x="395" y="255" width="190" height="82" rx="8"/>
  <text class="small" x="417" y="282">picksplit()</text>
  <text class="small" x="417" y="304">取四个坐标的 median</text>
  <text class="small" x="417" y="326">形成 centroid prefix</text>
  <path class="line" d="M490 337 L490 377"/>
  <rect class="node" x="395" y="377" width="190" height="55" rx="8"/>
  <text class="small" x="417" y="400">getQuadrant4D()</text>
  <text class="small" x="417" y="422">4 bit => 16 个子 node</text>

  <rect class="panel" x="665" y="85" width="270" height="390" rx="8"/>
  <text class="label" x="690" y="118">分区树中的候选剪枝</text>
  <rect class="cent" x="720" y="160" width="160" height="160" rx="4"/>
  <line class="axis" x1="800" y1="160" x2="800" y2="320"/>
  <line class="axis" x1="720" y1="240" x2="880" y2="240"/>
  <line class="dash" x1="760" y1="160" x2="760" y2="320"/>
  <line class="dash" x1="840" y1="160" x2="840" y2="320"/>
  <line class="dash" x1="720" y1="200" x2="880" y2="200"/>
  <line class="dash" x1="720" y1="280" x2="880" y2="280"/>
  <text class="small" x="705" y="356">inner_consistent() 通过 traversal value</text>
  <text class="small" x="705" y="380">维护每个象限的高维边界。</text>
  <text class="small" x="705" y="404">不能与查询 bbox 相交的象限直接跳过。</text>

  <path class="line" d="M315 280 L355 280"/>
  <path class="line" d="M625 280 L665 280"/>
  <text class="text" x="55" y="535">2D geometry 使用 4D quad-tree 类比；ND geometry/geography 使用 GIDX，把 N 维 bbox 当作 2N 维点，最多按 2N 个比较位形成子 node。</text>
</svg>
