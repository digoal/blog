<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">BRIN 块范围摘要模型</title>
  <desc id="desc">展示 heap 页面按 pages_per_range 分组，每个块范围在 BRIN 中保存一个摘要元组，查询用摘要判断是否跳过整段页面。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" fill="#ffffff" stroke="#d8dee4" rx="8"/>
  <text x="48" y="58" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2328">BRIN: 用“块范围摘要”替代逐行定位</text>
  <text x="48" y="90" font-family="Arial, sans-serif" font-size="15" fill="#57606a">pages_per_range = 4 示例；真实默认值由建索引参数决定。</text>

  <g transform="translate(48 130)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2328">Heap 物理页面</text>
    <g transform="translate(0 28)">
      <rect x="0" y="0" width="90" height="64" fill="#eaf4ff" stroke="#8bb7e0"/>
      <rect x="90" y="0" width="90" height="64" fill="#eaf4ff" stroke="#8bb7e0"/>
      <rect x="180" y="0" width="90" height="64" fill="#eaf4ff" stroke="#8bb7e0"/>
      <rect x="270" y="0" width="90" height="64" fill="#eaf4ff" stroke="#8bb7e0"/>
      <text x="18" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 0</text>
      <text x="108" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 1</text>
      <text x="198" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 2</text>
      <text x="288" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 3</text>
      <path d="M0 78 H360" stroke="#2f5d62" stroke-width="2"/>
      <text x="92" y="108" font-family="Arial, sans-serif" font-size="15" fill="#2f5d62">range 0: heap block 0-3</text>
    </g>
    <g transform="translate(420 28)">
      <rect x="0" y="0" width="90" height="64" fill="#fff4d6" stroke="#d8a72e"/>
      <rect x="90" y="0" width="90" height="64" fill="#fff4d6" stroke="#d8a72e"/>
      <rect x="180" y="0" width="90" height="64" fill="#fff4d6" stroke="#d8a72e"/>
      <rect x="270" y="0" width="90" height="64" fill="#fff4d6" stroke="#d8a72e"/>
      <text x="18" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 4</text>
      <text x="108" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 5</text>
      <text x="198" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 6</text>
      <text x="288" y="38" font-family="Arial, sans-serif" font-size="15" fill="#1f2328">page 7</text>
      <path d="M0 78 H360" stroke="#8a6500" stroke-width="2"/>
      <text x="92" y="108" font-family="Arial, sans-serif" font-size="15" fill="#8a6500">range 1: heap block 4-7</text>
    </g>
  </g>

  <g transform="translate(96 320)">
    <rect x="0" y="0" width="300" height="104" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2328">BRIN tuple: range 0</text>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="15" fill="#57606a">bt_blkno = 0</text>
    <text x="18" y="84" font-family="Arial, sans-serif" font-size="15" fill="#57606a">created_at_min = 10:00, max = 10:39</text>
  </g>
  <g transform="translate(584 320)">
    <rect x="0" y="0" width="300" height="104" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2328">BRIN tuple: range 1</text>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="15" fill="#57606a">bt_blkno = 4</text>
    <text x="18" y="84" font-family="Arial, sans-serif" font-size="15" fill="#57606a">created_at_min = 10:40, max = 11:19</text>
  </g>
  <path d="M226 260 V316" stroke="#2f5d62" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M744 260 V316" stroke="#8a6500" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(370 192)">
    <rect x="0" y="0" width="240" height="70" fill="#e9f7ef" stroke="#6cc28a" rx="6"/>
    <text x="18" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2328">查询: created_at &gt;= 11:00</text>
    <text x="18" y="52" font-family="Arial, sans-serif" font-size="14" fill="#57606a">range 0 可跳过，range 1 进入 bitmap</text>
  </g>
</svg>
