<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">BRIN 索引页布局</title>
  <desc id="desc">展示 BRIN metapage、revmap page、regular page 与 heap range 之间的映射关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="500" fill="#ffffff" stroke="#d8dee4" rx="8"/>
  <text x="48" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2328">BRIN 物理页: metapage + revmap + regular page</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="15" fill="#57606a">revmap 不是查询树，而是 heap range 到 summary tuple TID 的定长数组。</text>

  <g transform="translate(54 140)">
    <rect x="0" y="0" width="190" height="260" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="22" y="34" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2328">block 0: metapage</text>
    <text x="22" y="76" font-family="Arial, sans-serif" font-size="15" fill="#57606a">brinMagic</text>
    <text x="22" y="110" font-family="Arial, sans-serif" font-size="15" fill="#57606a">brinVersion</text>
    <text x="22" y="144" font-family="Arial, sans-serif" font-size="15" fill="#57606a">pagesPerRange</text>
    <text x="22" y="178" font-family="Arial, sans-serif" font-size="15" fill="#57606a">lastRevmapPage</text>
  </g>

  <g transform="translate(322 118)">
    <rect x="0" y="0" width="250" height="304" fill="#eaf4ff" stroke="#8bb7e0" rx="6"/>
    <text x="22" y="34" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2328">block 1..N: revmap</text>
    <rect x="24" y="66" width="202" height="38" fill="#ffffff" stroke="#8bb7e0"/>
    <rect x="24" y="104" width="202" height="38" fill="#ffffff" stroke="#8bb7e0"/>
    <rect x="24" y="142" width="202" height="38" fill="#ffffff" stroke="#8bb7e0"/>
    <rect x="24" y="180" width="202" height="38" fill="#ffffff" stroke="#8bb7e0"/>
    <text x="42" y="91" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">range 0 -&gt; (8,1)</text>
    <text x="42" y="129" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">range 1 -&gt; (8,2)</text>
    <text x="42" y="167" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">range 2 -&gt; invalid</text>
    <text x="42" y="205" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">range 3 -&gt; (9,1)</text>
    <text x="24" y="254" font-family="Arial, sans-serif" font-size="14" fill="#57606a">invalid 表示未摘要，扫描时必须保守返回。</text>
  </g>

  <g transform="translate(650 118)">
    <rect x="0" y="0" width="250" height="304" fill="#fff4d6" stroke="#d8a72e" rx="6"/>
    <text x="22" y="34" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2328">regular pages</text>
    <rect x="24" y="66" width="202" height="46" fill="#ffffff" stroke="#d8a72e"/>
    <rect x="24" y="112" width="202" height="46" fill="#ffffff" stroke="#d8a72e"/>
    <rect x="24" y="176" width="202" height="46" fill="#ffffff" stroke="#d8a72e"/>
    <text x="42" y="94" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">tuple (bt_blkno=0, min/max)</text>
    <text x="42" y="140" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">tuple (bt_blkno=128, min/max)</text>
    <text x="42" y="204" font-family="Arial, sans-serif" font-size="14" fill="#1f2328">tuple (bt_blkno=384, min/max)</text>
    <text x="24" y="254" font-family="Arial, sans-serif" font-size="14" fill="#57606a">tuple 可移动，revmap 更新到新 TID。</text>
  </g>

  <path d="M244 260 H318" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M572 185 H646" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M572 223 H646" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M572 337 H646" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
