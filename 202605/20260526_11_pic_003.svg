<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">BRIN Bitmap Scan 路径</title>
  <desc id="desc">展示 BRIN bringetbitmap 顺序扫描 revmap、调用 consistent、把匹配范围加入 lossy TIDBitmap，再由 Bitmap Heap Scan 复查。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" fill="#ffffff" stroke="#d8dee4" rx="8"/>
  <text x="48" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2328">查询路径: BRIN 只产出 lossy bitmap</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="15" fill="#57606a">BRIN 没有 amgettuple；执行器必须回表复查每个候选页里的行。</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="68" y="142" width="170" height="86" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="92" y="176" font-size="17" font-weight="700" fill="#1f2328">WHERE 条件</text>
    <text x="92" y="202" fill="#57606a">created_at BETWEEN ...</text>

    <rect x="310" y="142" width="190" height="86" fill="#eaf4ff" stroke="#8bb7e0" rx="6"/>
    <text x="335" y="176" font-size="17" font-weight="700" fill="#1f2328">Bitmap Index Scan</text>
    <text x="335" y="202" fill="#57606a">调用 bringetbitmap()</text>

    <rect x="572" y="116" width="230" height="138" fill="#fff4d6" stroke="#d8a72e" rx="6"/>
    <text x="596" y="150" font-size="17" font-weight="700" fill="#1f2328">顺序扫描 revmap</text>
    <text x="596" y="178" fill="#57606a">有 tuple: 调 consistent()</text>
    <text x="596" y="204" fill="#57606a">无 tuple: 未摘要，保守返回</text>
    <text x="596" y="230" fill="#57606a">命中: 加整段 heap pages</text>

    <rect x="310" y="328" width="190" height="86" fill="#e9f7ef" stroke="#6cc28a" rx="6"/>
    <text x="342" y="362" font-size="17" font-weight="700" fill="#1f2328">TIDBitmap</text>
    <text x="342" y="388" fill="#57606a">page-level lossy entries</text>

    <rect x="572" y="328" width="230" height="86" fill="#fdecef" stroke="#d48a95" rx="6"/>
    <text x="596" y="362" font-size="17" font-weight="700" fill="#1f2328">Bitmap Heap Scan</text>
    <text x="596" y="388" fill="#57606a">访问候选页并 Recheck</text>
  </g>

  <path d="M238 185 H306" stroke="#2f5d62" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 185 H568" stroke="#2f5d62" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M687 254 C687 306 506 285 428 324" stroke="#2f5d62" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M500 371 H568" stroke="#2f5d62" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(86 456)">
    <rect x="0" y="0" width="808" height="44" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="18" y="28" font-family="Arial, sans-serif" font-size="15" fill="#57606a">正确性规则：consistent=false 才能跳过；consistent=true 只是“可能命中”，不能免复查。</text>
  </g>
</svg>
