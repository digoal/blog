<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">BRIN 摘要维护生命周期</title>
  <desc id="desc">展示创建索引、插入、未摘要范围、VACUUM/autosummarize、desummarize 的生命周期。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" fill="#ffffff" stroke="#d8dee4" rx="8"/>
  <text x="48" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2328">维护生命周期: 摘要只会变宽，必要时重建</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="15" fill="#57606a">删除旧行不会自动收紧 min/max；需要重新摘要或 desummarize 后再 summarize。</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="58" y="148" width="165" height="88" fill="#eaf4ff" stroke="#8bb7e0" rx="6"/>
    <text x="84" y="182" font-size="17" font-weight="700" fill="#1f2328">CREATE INDEX</text>
    <text x="84" y="208" fill="#57606a">按物理顺序扫 heap</text>

    <rect x="288" y="148" width="165" height="88" fill="#e9f7ef" stroke="#6cc28a" rx="6"/>
    <text x="321" y="182" font-size="17" font-weight="700" fill="#1f2328">已摘要范围</text>
    <text x="321" y="208" fill="#57606a">insert 更新 summary</text>

    <rect x="518" y="148" width="165" height="88" fill="#fff4d6" stroke="#d8a72e" rx="6"/>
    <text x="551" y="182" font-size="17" font-weight="700" fill="#1f2328">新范围</text>
    <text x="551" y="208" fill="#57606a">默认先未摘要</text>

    <rect x="748" y="148" width="165" height="88" fill="#fdecef" stroke="#d48a95" rx="6"/>
    <text x="780" y="182" font-size="17" font-weight="700" fill="#1f2328">查询遇到它</text>
    <text x="780" y="208" fill="#57606a">必须返回整段</text>

    <rect x="288" y="344" width="165" height="88" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="318" y="378" font-size="17" font-weight="700" fill="#1f2328">VACUUM / 函数</text>
    <text x="318" y="404" fill="#57606a">summarize 新范围</text>

    <rect x="518" y="344" width="165" height="88" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="543" y="378" font-size="17" font-weight="700" fill="#1f2328">desummarize</text>
    <text x="543" y="404" fill="#57606a">让旧 summary 失效</text>
  </g>

  <path d="M223 192 H284" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M453 192 H514" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M683 192 H744" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 236 C590 292 470 302 400 340" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M371 344 V240" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 344 V240" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="92" y="506" font-family="Arial, sans-serif" font-size="15" fill="#57606a">运维含义：BRIN 对追加写友好；对大量乱序更新/删除，摘要可能变粗，需要监控扫描候选页和 recheck 代价。</text>
</svg>
