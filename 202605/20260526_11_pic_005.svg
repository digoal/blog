<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">PostGIS BRIN inclusion opclass</title>
  <desc id="desc">展示 PostGIS geometry/geography 的 BRIN inclusion opclass 如何把一段 heap 页内的对象合并为 bounding box 摘要。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" fill="#ffffff" stroke="#d8dee4" rx="8"/>
  <text x="48" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2328">PostGIS: 用 inclusion 摘要空间范围</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="15" fill="#57606a">2D geometry 存 BOX2DF；3D/4D geometry 与 geography 存 GIDX。</text>

  <g transform="translate(80 138)">
    <rect x="0" y="0" width="310" height="270" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="24" y="34" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2328">一个 block range 内的空间对象</text>
    <circle cx="78" cy="92" r="18" fill="#8bb7e0" stroke="#2f5d62"/>
    <rect x="148" y="76" width="52" height="34" fill="#fff4d6" stroke="#8a6500"/>
    <path d="M72 180 L112 142 L158 166 L132 216 Z" fill="#e9f7ef" stroke="#388e4a"/>
    <text x="42" y="248" font-family="Arial, sans-serif" font-size="14" fill="#57606a">真实几何可很复杂，BRIN 摘要只关心外包框。</text>
  </g>

  <g transform="translate(570 138)">
    <rect x="0" y="0" width="310" height="270" fill="#eaf4ff" stroke="#8bb7e0" rx="6"/>
    <text x="24" y="34" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2328">BRIN inclusion summary</text>
    <rect x="62" y="62" width="178" height="172" fill="none" stroke="#d48a2c" stroke-width="4" stroke-dasharray="8 6"/>
    <circle cx="96" cy="104" r="16" fill="#8bb7e0" stroke="#2f5d62"/>
    <rect x="158" y="91" width="47" height="31" fill="#fff4d6" stroke="#8a6500"/>
    <path d="M90 184 L126 150 L168 172 L144 216 Z" fill="#e9f7ef" stroke="#388e4a"/>
    <text x="62" y="258" font-family="Arial, sans-serif" font-size="14" fill="#57606a">查询框与该摘要相交时，整段页面进入候选。</text>
  </g>

  <path d="M408 270 H552" stroke="#2f5d62" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="432" y="248" font-family="Arial, sans-serif" font-size="15" fill="#2f5d62">add_value / merge</text>

  <g transform="translate(110 452)">
    <rect x="0" y="0" width="760" height="48" fill="#f6f8fa" stroke="#d8dee4" rx="6"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="15" fill="#57606a">适合：空间上排序、范围重叠小、更新少的大表。若数据随机散布，外包框互相覆盖，BRIN 过滤会快速失效。</text>
  </g>
</svg>
