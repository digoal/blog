<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Bloom 索引把多列值压成定长签名</title>
  <desc id="desc">展示一行数据的多个列值经列相关哈希映射到同一个定长 bit 签名，查询条件也生成签名，并通过包含关系判断候选行。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .accent{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}
    .warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}
    .bit0{fill:#e5e7eb;stroke:#9ca3af}
    .bit1{fill:#22c55e;stroke:#15803d}
    .qbit{fill:#f97316;stroke:#c2410c}
    .txt{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:15px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="30" y="35" width="220" height="150" rx="8" class="box"/>
  <text x="55" y="70" class="txt">Heap 行</text>
  <text x="55" y="105" class="small">TID = (block, offset)</text>
  <text x="55" y="132" class="small">i1 = 42</text>
  <text x="55" y="159" class="small">i2 = 'alice'</text>

  <rect x="330" y="35" width="250" height="150" rx="8" class="accent"/>
  <text x="355" y="70" class="txt">列相关哈希</text>
  <text x="355" y="105" class="small">先用 attno 改变种子</text>
  <text x="355" y="132" class="small">再用 opclass hash 函数</text>
  <text x="355" y="159" class="small">每列设置 colN 个 bit</text>

  <rect x="675" y="35" width="250" height="150" rx="8" class="box"/>
  <text x="700" y="70" class="txt">Index tuple</text>
  <text x="700" y="105" class="small">heapPtr + signature</text>
  <text x="700" y="132" class="small">签名有损，必须回表复查</text>

  <line x1="250" y1="110" x2="330" y2="110" class="arrow"/>
  <line x1="580" y1="110" x2="675" y2="110" class="arrow"/>

  <text x="58" y="245" class="small">行签名</text>
  <g transform="translate(130,225)">
    <rect x="0" y="0" width="28" height="28" class="bit0"/><rect x="30" y="0" width="28" height="28" class="bit1"/>
    <rect x="60" y="0" width="28" height="28" class="bit0"/><rect x="90" y="0" width="28" height="28" class="bit1"/>
    <rect x="120" y="0" width="28" height="28" class="bit1"/><rect x="150" y="0" width="28" height="28" class="bit0"/>
    <rect x="180" y="0" width="28" height="28" class="bit0"/><rect x="210" y="0" width="28" height="28" class="bit1"/>
    <rect x="240" y="0" width="28" height="28" class="bit0"/><rect x="270" y="0" width="28" height="28" class="bit0"/>
    <rect x="300" y="0" width="28" height="28" class="bit1"/><rect x="330" y="0" width="28" height="28" class="bit0"/>
    <rect x="360" y="0" width="28" height="28" class="bit1"/><rect x="390" y="0" width="28" height="28" class="bit0"/>
    <rect x="420" y="0" width="28" height="28" class="bit0"/><rect x="450" y="0" width="28" height="28" class="bit1"/>
  </g>

  <text x="58" y="305" class="small">查询签名</text>
  <g transform="translate(130,285)">
    <rect x="0" y="0" width="28" height="28" class="bit0"/><rect x="30" y="0" width="28" height="28" class="qbit"/>
    <rect x="60" y="0" width="28" height="28" class="bit0"/><rect x="90" y="0" width="28" height="28" class="qbit"/>
    <rect x="120" y="0" width="28" height="28" class="bit0"/><rect x="150" y="0" width="28" height="28" class="bit0"/>
    <rect x="180" y="0" width="28" height="28" class="bit0"/><rect x="210" y="0" width="28" height="28" class="bit0"/>
    <rect x="240" y="0" width="28" height="28" class="bit0"/><rect x="270" y="0" width="28" height="28" class="bit0"/>
    <rect x="300" y="0" width="28" height="28" class="bit0"/><rect x="330" y="0" width="28" height="28" class="bit0"/>
    <rect x="360" y="0" width="28" height="28" class="bit0"/><rect x="390" y="0" width="28" height="28" class="bit0"/>
    <rect x="420" y="0" width="28" height="28" class="bit0"/><rect x="450" y="0" width="28" height="28" class="bit0"/>
  </g>

  <rect x="675" y="255" width="250" height="90" rx="8" class="warn"/>
  <text x="700" y="290" class="txt">判断条件</text>
  <text x="700" y="320" class="small">(row_sign &amp; query_sign) == query_sign</text>
  <text x="700" y="345" class="small">通过只是候选，不代表命中</text>
</svg>
