<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL bloom 索引物理布局</title>
  <desc id="desc">展示 bloom 索引 metapage、数据页、BloomTuple 和 page opaque 的关系。</desc>
  <style>
    .page{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .meta{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}
    .tuple{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}
    .opaque{fill:#fef3c7;stroke:#d97706;stroke-width:1.5}
    .txt{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="35" y="35" class="txt">索引文件：block 0 是 metapage，block 1 起是顺序数据页</text>
  <rect x="35" y="65" width="180" height="250" rx="8" class="meta"/>
  <text x="65" y="100" class="txt">Block 0</text>
  <text x="65" y="130" class="small">BloomMetaPageData</text>
  <text x="65" y="158" class="small">magickNumber</text>
  <text x="65" y="184" class="small">opts.length</text>
  <text x="65" y="210" class="small">opts.col1..colN</text>
  <text x="65" y="236" class="small">notFullPage[]</text>
  <text x="65" y="262" class="small">nStart / nEnd</text>

  <line x1="215" y1="190" x2="310" y2="190" class="arrow"/>

  <rect x="310" y="65" width="270" height="250" rx="8" class="page"/>
  <text x="335" y="100" class="txt">Data page</text>
  <rect x="335" y="125" width="220" height="44" class="tuple"/>
  <text x="350" y="153" class="small">BloomTuple 1: heapPtr + sign[]</text>
  <rect x="335" y="177" width="220" height="44" class="tuple"/>
  <text x="350" y="205" class="small">BloomTuple 2: heapPtr + sign[]</text>
  <rect x="335" y="229" width="220" height="44" class="tuple"/>
  <text x="350" y="257" class="small">... fixed-size tuples ...</text>
  <rect x="335" y="283" width="220" height="40" class="opaque"/>
  <text x="350" y="309" class="small">opaque: maxoff, flags, page_id</text>

  <line x1="580" y1="190" x2="655" y2="190" class="arrow"/>

  <rect x="655" y="65" width="285" height="250" rx="8" class="page"/>
  <text x="680" y="100" class="txt">固定元组大小</text>
  <text x="680" y="132" class="small">BLOOMTUPLEHDRSZ</text>
  <text x="680" y="158" class="small">+ bloomLength * sizeof(uint16)</text>
  <text x="680" y="195" class="small">length 以 bit 配置，存储时上取整到</text>
  <text x="680" y="221" class="small">16-bit word 数组。</text>
  <text x="680" y="258" class="small">页内没有树形导航，扫描时顺序读。</text>

  <rect x="115" y="345" width="730" height="50" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="145" y="377" class="small">notFullPage[] 只是插入时找可用空间的提示，不是查询入口；查询从 block 1 扫到文件末尾。</text>
</svg>
