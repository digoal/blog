<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450" role="img" aria-labelledby="title desc">
  <title id="title">Bloom 索引构建、插入和 VACUUM 生命周期</title>
  <desc id="desc">展示构建时顺序扫描 heap 形成签名页，插入时复用 notFullPage 或扩展新页，VACUUM 删除死 TID 并回收空页。</desc>
  <style>
    .step{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .build{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}
    .insert{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
    .vacuum{fill:#fef3c7;stroke:#d97706;stroke-width:2}
    .txt{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="35" y="45" width="260" height="130" rx="8" class="build"/>
  <text x="60" y="80" class="txt">CREATE INDEX</text>
  <text x="60" y="110" class="small">初始化 metapage</text>
  <text x="60" y="136" class="small">table_index_build_scan(heap)</text>
  <text x="60" y="162" class="small">每行形成 BloomTuple</text>

  <rect x="360" y="45" width="260" height="130" rx="8" class="build"/>
  <text x="385" y="80" class="txt">缓存一个数据页</text>
  <text x="385" y="110" class="small">BloomPageAddItem()</text>
  <text x="385" y="136" class="small">页满则 WAL full image</text>
  <text x="385" y="162" class="small">再初始化新页</text>

  <rect x="685" y="45" width="260" height="130" rx="8" class="build"/>
  <text x="710" y="80" class="txt">索引文件增长</text>
  <text x="710" y="110" class="small">block 0: meta</text>
  <text x="710" y="136" class="small">block 1..N: tuple pages</text>
  <text x="710" y="162" class="small">result.index_tuples 计数</text>

  <line x1="295" y1="110" x2="360" y2="110" class="arrow"/>
  <line x1="620" y1="110" x2="685" y2="110" class="arrow"/>

  <rect x="35" y="245" width="260" height="135" rx="8" class="insert"/>
  <text x="60" y="280" class="txt">INSERT / UPDATE</text>
  <text x="60" y="310" class="small">生成新行签名</text>
  <text x="60" y="336" class="small">优先尝试 notFullPage[0]</text>
  <text x="60" y="362" class="small">失败则扫描更多候选页</text>

  <rect x="360" y="245" width="260" height="135" rx="8" class="insert"/>
  <text x="385" y="280" class="txt">找不到空间</text>
  <text x="385" y="310" class="small">BloomNewBuffer()</text>
  <text x="385" y="336" class="small">先试 FSM 删除页</text>
  <text x="385" y="362" class="small">再扩展索引文件</text>

  <rect x="685" y="245" width="260" height="135" rx="8" class="vacuum"/>
  <text x="710" y="280" class="txt">VACUUM</text>
  <text x="710" y="310" class="small">回调判断 dead TID</text>
  <text x="710" y="336" class="small">页内 memmove 压缩</text>
  <text x="710" y="362" class="small">空页标记 deleted 并入 FSM</text>

  <line x1="295" y1="312" x2="360" y2="312" class="arrow"/>
  <line x1="620" y1="312" x2="685" y2="312" class="arrow"/>
</svg>
