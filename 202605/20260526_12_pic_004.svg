<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">Bloom 索引扫描路径</title>
  <desc id="desc">展示查询条件生成查询签名，扫描整个 bloom 索引，将签名包含的 TID 加入 bitmap，再由 Bitmap Heap Scan 回表复查。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .idx{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}
    .heap{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
    .warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}
    .txt{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="45" y="45" width="230" height="105" rx="8" class="box"/>
  <text x="70" y="82" class="txt">WHERE 条件</text>
  <text x="70" y="112" class="small">i2 = ? AND i5 = ?</text>
  <text x="70" y="136" class="small">NULL 查询直接无候选</text>

  <rect x="370" y="45" width="230" height="105" rx="8" class="idx"/>
  <text x="395" y="82" class="txt">生成查询签名</text>
  <text x="395" y="112" class="small">对每个 scan key 调 signValue</text>
  <text x="395" y="136" class="small">得到需要包含的 bit 集</text>

  <rect x="705" y="45" width="230" height="105" rx="8" class="idx"/>
  <text x="730" y="82" class="txt">顺序扫描索引</text>
  <text x="730" y="112" class="small">从 block 1 到文件末尾</text>
  <text x="730" y="136" class="small">BAS_BULKREAD / stream read</text>

  <line x1="275" y1="98" x2="370" y2="98" class="arrow"/>
  <line x1="600" y1="98" x2="705" y2="98" class="arrow"/>

  <rect x="140" y="235" width="250" height="120" rx="8" class="warn"/>
  <text x="165" y="272" class="txt">签名包含测试</text>
  <text x="165" y="302" class="small">(itup.sign &amp; scan.sign)</text>
  <text x="165" y="328" class="small">== scan.sign</text>

  <rect x="515" y="235" width="250" height="120" rx="8" class="heap"/>
  <text x="540" y="272" class="txt">TIDBitmap</text>
  <text x="540" y="302" class="small">候选 TID 加入 bitmap</text>
  <text x="540" y="328" class="small">标记 recheck = true</text>

  <line x1="705" y1="150" x2="390" y2="250" class="arrow"/>
  <line x1="390" y1="295" x2="515" y2="295" class="arrow"/>

  <rect x="330" y="390" width="320" height="55" rx="8" class="heap"/>
  <text x="360" y="424" class="txt">Bitmap Heap Scan 回表复查真实列值</text>
  <line x1="640" y1="355" x2="520" y2="390" class="arrow"/>
</svg>
