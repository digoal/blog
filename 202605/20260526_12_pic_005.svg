<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450" role="img" aria-labelledby="title desc">
  <title id="title">Bloom 索引参数与误判代价</title>
  <desc id="desc">展示 signature length、每列 bit 数、行内列数、查询列数之间的空间和误判权衡。</desc>
  <style>
    .good{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
    .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:2}
    .neutral{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .note{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}
    .txt{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="55" y="55" width="240" height="130" rx="8" class="neutral"/>
  <text x="80" y="92" class="txt">length 变大</text>
  <text x="80" y="122" class="small">签名更长，索引 tuple 更大</text>
  <text x="80" y="148" class="small">同样 bit 更稀疏</text>
  <text x="80" y="174" class="small">误判通常下降</text>

  <rect x="370" y="55" width="240" height="130" rx="8" class="neutral"/>
  <text x="395" y="92" class="txt">colN 变大</text>
  <text x="395" y="122" class="small">该列查询检查更多 bit</text>
  <text x="395" y="148" class="small">单列过滤更强</text>
  <text x="395" y="174" class="small">但行签名更容易变满</text>

  <rect x="685" y="55" width="240" height="130" rx="8" class="bad"/>
  <text x="710" y="92" class="txt">签名太满</text>
  <text x="710" y="122" class="small">不同列/值互相碰撞</text>
  <text x="710" y="148" class="small">候选 TID 激增</text>
  <text x="710" y="174" class="small">Rows Removed by Recheck 高</text>

  <line x1="295" y1="120" x2="370" y2="120" class="arrow"/>
  <line x1="610" y1="120" x2="685" y2="120" class="arrow"/>

  <rect x="125" y="270" width="300" height="110" rx="8" class="good"/>
  <text x="150" y="306" class="txt">适合</text>
  <text x="150" y="336" class="small">多列、任意组合、等值查询</text>
  <text x="150" y="362" class="small">能接受回表复查，想少建索引</text>

  <rect x="555" y="270" width="300" height="110" rx="8" class="bad"/>
  <text x="580" y="306" class="txt">不适合</text>
  <text x="580" y="336" class="small">范围查询、排序、唯一约束</text>
  <text x="580" y="362" class="small">极高选择性点查或 NULL 查询</text>

  <rect x="265" y="205" width="450" height="42" rx="8" class="note"/>
  <text x="292" y="233" class="small">调参目标：减少无用 heap visit，而不是追求“精确索引”。</text>
</svg>
