<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">ParadeDB BM25 索引总体结构</title>
  <desc id="desc">展示 PostgreSQL 表、ParadeDB 自定义索引和 Tantivy 分段倒排索引之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="1032" height="572" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="54" y="70" font-size="26" font-family="Arial, sans-serif" fill="#0f172a">ParadeDB BM25 索引: PostgreSQL 接入层 + Tantivy 搜索内核</text>

  <rect x="60" y="120" width="250" height="360" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="88" y="158" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">PostgreSQL</text>
  <rect x="86" y="188" width="198" height="62" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="112" y="226" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">heap table</text>
  <rect x="86" y="276" width="198" height="62" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="108" y="314" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">MVCC snapshot</text>
  <rect x="86" y="364" width="198" height="62" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="112" y="402" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">planner/executor</text>

  <rect x="394" y="120" width="280" height="360" rx="8" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
  <text x="430" y="158" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">pg_search / ParadeDB</text>
  <rect x="424" y="188" width="220" height="58" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="448" y="224" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">bm25 index access method</text>
  <rect x="424" y="272" width="220" height="58" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="464" y="308" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">custom scan</text>
  <rect x="424" y="356" width="220" height="58" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="456" y="392" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">MVCC directory</text>

  <rect x="758" y="120" width="250" height="360" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="820" y="158" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">Tantivy</text>
  <rect x="786" y="188" width="194" height="54" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="824" y="221" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">segment</text>
  <rect x="786" y="260" width="194" height="54" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="816" y="293" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">term dictionary</text>
  <rect x="786" y="332" width="194" height="54" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="810" y="365" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">postings + positions</text>
  <rect x="786" y="404" width="194" height="54" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="812" y="437" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">fieldnorm + fast field</text>

  <line x1="310" y1="219" x2="424" y2="219" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="328" y="204" font-size="15" font-family="Arial, sans-serif" fill="#334155">INSERT/UPDATE</text>
  <line x1="644" y1="217" x2="786" y2="217" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="676" y="202" font-size="15" font-family="Arial, sans-serif" fill="#334155">写入 segment</text>
  <line x1="424" y1="301" x2="310" y2="394" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="324" y="360" font-size="15" font-family="Arial, sans-serif" fill="#334155">计划改写</text>
  <line x1="644" y1="301" x2="786" y2="357" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="662" y="346" font-size="15" font-family="Arial, sans-serif" fill="#334155">查询转换</text>
  <line x1="786" y1="431" x2="644" y2="385" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="668" y="427" font-size="15" font-family="Arial, sans-serif" fill="#334155">docid/score</text>
  <line x1="424" y1="385" x2="310" y2="307" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="322" y="324" font-size="15" font-family="Arial, sans-serif" fill="#334155">可见性过滤</text>

  <rect x="80" y="518" width="900" height="42" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="545" font-size="17" font-family="Arial, sans-serif" fill="#334155">关键边界: Postgres 负责事务和 SQL 外壳，ParadeDB 负责接入与下推，Tantivy 负责倒排结构和 BM25/Top-K 检索。</text>
</svg>
