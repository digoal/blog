<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680" role="img" aria-labelledby="title desc">
  <title id="title">Tantivy segment 内部文件与查询路径</title>
  <desc id="desc">展示一个 Tantivy segment 中 term dictionary、postings、positions、fieldnorm、store 与 delete bitset 的作用。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="1032" height="632" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="54" y="70" font-size="26" font-family="Arial, sans-serif" fill="#0f172a">一个 Tantivy segment 是一组不可变文件</text>

  <rect x="70" y="120" width="940" height="470" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="100" y="158" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">segment_uuid.*</text>

  <rect x="110" y="198" width="210" height="96" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="136" y="230" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">.term</text>
  <text x="136" y="258" font-size="15" font-family="Arial, sans-serif" fill="#334155">term -> TermInfo</text>
  <text x="136" y="280" font-size="15" font-family="Arial, sans-serif" fill="#334155">doc_freq, byte range</text>

  <rect x="410" y="198" width="250" height="96" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="438" y="230" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">.idx postings</text>
  <text x="438" y="258" font-size="15" font-family="Arial, sans-serif" fill="#334155">docid block: 128 docs</text>
  <text x="438" y="280" font-size="15" font-family="Arial, sans-serif" fill="#334155">delta + bitpack / VInt</text>

  <rect x="748" y="198" width="210" height="96" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="776" y="230" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">.pos</text>
  <text x="776" y="258" font-size="15" font-family="Arial, sans-serif" fill="#334155">position delta</text>
  <text x="776" y="280" font-size="15" font-family="Arial, sans-serif" fill="#334155">phrase query</text>

  <rect x="110" y="374" width="210" height="96" rx="6" fill="#fae8ff" stroke="#9333ea"/>
  <text x="136" y="406" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">.fieldnorm</text>
  <text x="136" y="434" font-size="15" font-family="Arial, sans-serif" fill="#334155">doc -> field length id</text>
  <text x="136" y="456" font-size="15" font-family="Arial, sans-serif" fill="#334155">1 byte 近似长度</text>

  <rect x="410" y="374" width="250" height="96" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="438" y="406" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">.del alive bitset</text>
  <text x="438" y="434" font-size="15" font-family="Arial, sans-serif" fill="#334155">删除标记</text>
  <text x="438" y="456" font-size="15" font-family="Arial, sans-serif" fill="#334155">merge 时回收</text>

  <rect x="748" y="374" width="210" height="96" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="776" y="406" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">.store / fast fields</text>
  <text x="776" y="434" font-size="15" font-family="Arial, sans-serif" fill="#334155">返回字段 / 列式字段</text>
  <text x="776" y="456" font-size="15" font-family="Arial, sans-serif" fill="#334155">排序、过滤、聚合</text>

  <line x1="320" y1="246" x2="410" y2="246" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="336" y="232" font-size="15" font-family="Arial, sans-serif" fill="#334155">定位 range</text>
  <line x1="660" y1="246" x2="748" y2="246" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="674" y="232" font-size="15" font-family="Arial, sans-serif" fill="#334155">短语需要</text>
  <line x1="535" y1="294" x2="248" y2="374" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="354" font-size="15" font-family="Arial, sans-serif" fill="#334155">BM25 长度归一化</text>
  <line x1="535" y1="294" x2="535" y2="374" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="548" y="342" font-size="15" font-family="Arial, sans-serif" fill="#334155">过滤删除</text>
  <line x1="660" y1="422" x2="748" y2="422" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="678" y="408" font-size="15" font-family="Arial, sans-serif" fill="#334155">返回列</text>

  <rect x="104" y="528" width="852" height="34" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="126" y="551" font-size="16" font-family="Arial, sans-serif" fill="#334155">读路径: query term -> .term -> .idx block -> fieldnorm 评分 -> delete/MVCC 过滤 -> heap 或 store/fast field 返回。</text>
</svg>
