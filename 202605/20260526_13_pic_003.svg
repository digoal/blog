<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" role="img" aria-labelledby="title desc">
  <title id="title">posting block 与 Block-Max WAND</title>
  <desc id="desc">展示 postings 按 128 文档分块，每块保存可用于 Top-K 剪枝的最大 BM25 上界。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="1032" height="652" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="54" y="72" font-size="26" font-family="Arial, sans-serif" fill="#0f172a">Block-Max WAND: 先用上界排除不可能进入 Top-K 的 block</text>

  <text x="70" y="126" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">term = shoes 的 posting list</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="150" width="220" height="110" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="95" y="184" font-size="17" fill="#0f172a">block 0: doc 1..128</text>
    <text x="95" y="212" font-size="15" fill="#334155">docid delta + bitpack</text>
    <text x="95" y="238" font-size="15" fill="#334155">max score = 0.8</text>

    <rect x="330" y="150" width="220" height="110" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="355" y="184" font-size="17" fill="#0f172a">block 1: doc 129..256</text>
    <text x="355" y="212" font-size="15" fill="#334155">tf bitpack</text>
    <text x="355" y="238" font-size="15" fill="#334155">max score = 3.4</text>

    <rect x="590" y="150" width="220" height="110" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="615" y="184" font-size="17" fill="#0f172a">block 2: doc 257..384</text>
    <text x="615" y="212" font-size="15" fill="#334155">skip info</text>
    <text x="615" y="238" font-size="15" fill="#334155">max score = 1.1</text>

    <rect x="850" y="150" width="150" height="110" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="882" y="184" font-size="17" fill="#0f172a">tail</text>
    <text x="872" y="212" font-size="15" fill="#334155">不足 128</text>
    <text x="872" y="238" font-size="15" fill="#334155">VInt 编码</text>
  </g>

  <text x="70" y="330" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">Top-K 查询时的动态阈值</text>
  <rect x="70" y="358" width="930" height="230" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <line x1="130" y1="520" x2="940" y2="520" stroke="#64748b" stroke-width="2"/>
  <line x1="130" y1="520" x2="130" y2="390" stroke="#64748b" stroke-width="2"/>
  <text x="78" y="392" font-size="15" font-family="Arial, sans-serif" fill="#334155">score</text>
  <text x="932" y="548" font-size="15" font-family="Arial, sans-serif" fill="#334155">docid</text>
  <line x1="130" y1="450" x2="940" y2="450" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="145" y="440" font-size="15" font-family="Arial, sans-serif" fill="#dc2626">当前 Top-K 阈值 = 2.0</text>

  <rect x="176" y="476" width="100" height="44" fill="#cbd5e1" stroke="#64748b"/>
  <text x="182" y="505" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">0.8 跳过</text>
  <rect x="420" y="392" width="100" height="128" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="428" y="463" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">3.4 解码</text>
  <rect x="690" y="458" width="100" height="62" fill="#cbd5e1" stroke="#64748b"/>
  <text x="698" y="495" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">1.1 跳过</text>

  <line x1="232" y1="300" x2="232" y2="476" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="448" y1="260" x2="470" y2="392" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="704" y1="300" x2="740" y2="458" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="92" y="616" width="870" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="114" y="640" font-size="16" font-family="Arial, sans-serif" fill="#334155">安全剪枝条件: block 的最大可能分数之和仍不能超过当前阈值，则该 block 不可能改变 Top-K 结果。</text>
</svg>
