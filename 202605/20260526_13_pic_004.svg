<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" role="img" aria-labelledby="title desc">
  <title id="title">ParadeDB BM25 写入、查询、合并生命周期</title>
  <desc id="desc">展示写入生成 segment，查询跨 segment 合并，后台合并回收删除的生命周期。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="1032" height="652" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="54" y="72" font-size="26" font-family="Arial, sans-serif" fill="#0f172a">生命周期: 写入追加 segment，查询多段合并，merge 回收空间</text>

  <rect x="66" y="128" width="210" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="104" y="162" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">DML/COPY</text>
  <text x="94" y="194" font-size="16" font-family="Arial, sans-serif" fill="#334155">事务内更新 BM25</text>

  <rect x="356" y="128" width="260" height="92" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="410" y="162" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">buffer / writer</text>
  <text x="390" y="194" font-size="16" font-family="Arial, sans-serif" fill="#334155">语句结束或缓冲满后 flush</text>

  <rect x="700" y="128" width="270" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="776" y="162" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">new segment</text>
  <text x="736" y="194" font-size="16" font-family="Arial, sans-serif" fill="#334155">倒排索引 + columnar/fast fields</text>

  <line x1="276" y1="174" x2="356" y2="174" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="616" y1="174" x2="700" y2="174" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="318" width="250" height="92" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="104" y="352" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">query custom scan</text>
  <text x="96" y="384" font-size="16" font-family="Arial, sans-serif" fill="#334155">按 snapshot 读取可见 segment</text>

  <rect x="410" y="294" width="260" height="140" rx="8" fill="#f0fdf4" stroke="#15803d"/>
  <text x="448" y="326" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">跨 segment Top-K</text>
  <text x="446" y="358" font-size="16" font-family="Arial, sans-serif" fill="#334155">每段用 Tantivy 检索</text>
  <text x="446" y="386" font-size="16" font-family="Arial, sans-serif" fill="#334155">合并 docid 与 score</text>
  <text x="446" y="414" font-size="16" font-family="Arial, sans-serif" fill="#334155">应用 MVCC/delete 过滤</text>

  <rect x="760" y="318" width="220" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="806" y="352" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">SQL result</text>
  <text x="798" y="384" font-size="16" font-family="Arial, sans-serif" fill="#334155">score、排序、聚合</text>

  <line x1="320" y1="364" x2="410" y2="364" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="364" x2="760" y2="364" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="834" y1="220" x2="574" y2="294" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="184" y="520" width="260" height="94" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="230" y="554" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">delete / vacuum</text>
  <text x="216" y="586" font-size="16" font-family="Arial, sans-serif" fill="#334155">先标记删除或不可见</text>

  <rect x="598" y="520" width="300" height="94" rx="8" fill="#fae8ff" stroke="#9333ea"/>
  <text x="666" y="554" font-size="20" font-family="Arial, sans-serif" fill="#0f172a">merge / compaction</text>
  <text x="636" y="586" font-size="16" font-family="Arial, sans-serif" fill="#334155">重写 segment，丢弃删除文档</text>

  <line x1="444" y1="567" x2="598" y2="567" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="748" y1="520" x2="832" y2="220" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="822" y="492" font-size="15" font-family="Arial, sans-serif" fill="#334155">新层级 segment</text>
</svg>
