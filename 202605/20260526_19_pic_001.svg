<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">Roaring bitmap 的两级结构</title>
  <desc id="desc">32 位整数被拆成高 16 位目录键和低 16 位容器内偏移，目录项指向 array、bitset 或 run 容器。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.4; }
    .key { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.2; }
    .low { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; }
    .dir { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; }
    .array { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.2; }
    .bitset { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.2; }
    .run { fill: #fce7f3; stroke: #be185d; stroke-width: 1.2; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .mono { font-family: Consolas, Menlo, monospace; font-size: 16px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="470"/>
  <text class="text" x="36" y="46">输入整数 value = 0x0002_01F4</text>
  <rect class="panel" x="36" y="70" width="360" height="110" rx="6"/>
  <rect class="key" x="58" y="102" width="140" height="46" rx="4"/>
  <rect class="low" x="216" y="102" width="140" height="46" rx="4"/>
  <text class="mono" x="88" y="131">high=0x0002</text>
  <text class="mono" x="246" y="131">low=0x01F4</text>
  <text class="small" x="62" y="166">高 16 位定位容器</text>
  <text class="small" x="220" y="166">低 16 位进入容器</text>
  <rect class="panel" x="462" y="56" width="455" height="360" rx="6"/>
  <text class="text" x="492" y="92">roaring_array_t：有序目录</text>
  <rect class="dir" x="504" y="122" width="116" height="44" rx="4"/>
  <rect class="dir" x="504" y="184" width="116" height="44" rx="4"/>
  <rect class="dir" x="504" y="246" width="116" height="44" rx="4"/>
  <text class="mono" x="524" y="150">key 0x0001</text>
  <text class="mono" x="524" y="212">key 0x0002</text>
  <text class="mono" x="524" y="274">key 0x0010</text>
  <rect class="array" x="694" y="112" width="168" height="64" rx="5"/>
  <text class="text" x="722" y="140">array container</text>
  <text class="small" x="726" y="162">稀疏：排序 uint16</text>
  <rect class="bitset" x="694" y="194" width="168" height="64" rx="5"/>
  <text class="text" x="722" y="222">bitset container</text>
  <text class="small" x="724" y="244">稠密：固定 8 KiB</text>
  <rect class="run" x="694" y="276" width="168" height="64" rx="5"/>
  <text class="text" x="724" y="304">run container</text>
  <text class="small" x="724" y="326">连续段：(start,len)</text>
  <path class="arrow" d="M198 126 C300 126, 350 206, 500 206"/>
  <path class="arrow" d="M620 144 L690 144"/>
  <path class="arrow" d="M620 206 L690 226"/>
  <path class="arrow" d="M620 268 L690 308"/>
  <text class="small" x="38" y="218">目录只保存有数据的 high-key，所以空洞的 32 位空间不会分配完整 bitmap。</text>
  <text class="small" x="38" y="246">每个容器只覆盖 0..65535 的局部空间，因此可以按局部密度选择最省/最快的表示。</text>
  <text class="small" x="38" y="274">这是 Roaring 相比普通完整 bitmap 和纯 RLE bitmap 的核心折中。</text>
</svg>
