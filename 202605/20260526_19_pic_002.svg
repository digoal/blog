<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">容器选择与转换规则</title>
  <desc id="desc">容器按局部 cardinality 和连续段数量在 array、bitset、run 三类表示之间切换。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.4; }
    .array { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.3; }
    .bitset { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.3; }
    .run { fill: #fce7f3; stroke: #be185d; stroke-width: 1.3; }
    .rule { fill: #fef3c7; stroke: #b45309; stroke-width: 1.3; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .mono { font-family: Consolas, Menlo, monospace; font-size: 15px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="text" x="36" y="44">一个 16-bit 分片内，CRoaring 不固定使用一种表示</text>
  <rect class="array" x="62" y="86" width="248" height="140" rx="6"/>
  <text class="text" x="100" y="122">Array container</text>
  <text class="small" x="86" y="154">排序 uint16 数组</text>
  <text class="small" x="86" y="182">适合少量离散值</text>
  <text class="mono" x="86" y="210">空间约 2 * cardinality</text>
  <rect class="bitset" x="366" y="86" width="248" height="140" rx="6"/>
  <text class="text" x="402" y="122">Bitset container</text>
  <text class="small" x="390" y="154">1024 个 uint64 word</text>
  <text class="small" x="390" y="182">适合稠密值和批量位运算</text>
  <text class="mono" x="390" y="210">固定 8192 bytes</text>
  <rect class="run" x="670" y="86" width="248" height="140" rx="6"/>
  <text class="text" x="716" y="122">Run container</text>
  <text class="small" x="700" y="154">有序不重叠 RLE 段</text>
  <text class="small" x="700" y="182">适合长连续区间</text>
  <text class="mono" x="700" y="210">每段 4 bytes</text>
  <path class="arrow" d="M310 156 L362 156"/>
  <text class="small" x="318" y="140">超过 4096</text>
  <path class="arrow" d="M366 192 C322 250, 250 250, 224 226"/>
  <text class="small" x="274" y="268">删除后 &lt;= 4096 可回 array</text>
  <path class="arrow dash" d="M186 226 C210 314, 350 344, 486 330 C620 316, 724 276, 794 226"/>
  <path class="arrow dash" d="M794 226 C774 318, 682 376, 548 382 C384 390, 230 320, 186 226"/>
  <rect class="rule" x="112" y="330" width="760" height="126" rx="6"/>
  <text class="text" x="142" y="366">run_optimize：按序列段数量重新比较空间</text>
  <text class="small" x="142" y="398">array/bitset 如果转换成 run 更省空间，就变成 run。</text>
  <text class="small" x="142" y="424">run 如果不再比 array 或 bitset 省空间，就转回对应容器。</text>
  <text class="small" x="142" y="450">因此 run 不是默认插入形态，而是面向连续区间的压缩优化。</text>
</svg>
