<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Roaring 集合运算执行路径</title>
  <desc id="desc">两个 Roaring bitmap 先按 high-key 对齐，再在同 key 的容器之间执行类型相关的交并差操作。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.3; }
    .key { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; }
    .op { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; }
    .out { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.2; }
    .skip { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.2; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .mono { font-family: Consolas, Menlo, monospace; font-size: 15px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="text" x="36" y="42">交集 A AND B：先合并目录，再做容器级运算</text>
  <rect class="panel" x="54" y="76" width="250" height="300" rx="6"/>
  <text class="text" x="88" y="110">Bitmap A</text>
  <rect class="key" x="86" y="134" width="170" height="42" rx="4"/><text class="mono" x="122" y="161">key 1: array</text>
  <rect class="key" x="86" y="196" width="170" height="42" rx="4"/><text class="mono" x="122" y="223">key 2: bitset</text>
  <rect class="key" x="86" y="258" width="170" height="42" rx="4"/><text class="mono" x="122" y="285">key 5: run</text>
  <rect class="panel" x="676" y="76" width="250" height="300" rx="6"/>
  <text class="text" x="710" y="110">Bitmap B</text>
  <rect class="key" x="708" y="134" width="170" height="42" rx="4"/><text class="mono" x="744" y="161">key 2: array</text>
  <rect class="key" x="708" y="196" width="170" height="42" rx="4"/><text class="mono" x="744" y="223">key 4: bitset</text>
  <rect class="key" x="708" y="258" width="170" height="42" rx="4"/><text class="mono" x="744" y="285">key 5: run</text>
  <rect class="op" x="386" y="114" width="208" height="74" rx="6"/>
  <text class="text" x="416" y="145">目录 key 对齐</text>
  <text class="small" x="416" y="171">跳过一侧没有的分片</text>
  <rect class="op" x="386" y="226" width="208" height="88" rx="6"/>
  <text class="text" x="412" y="258">容器分派函数</text>
  <text class="small" x="412" y="284">array-array / array-bitset</text>
  <text class="small" x="412" y="306">run-bitset / bitset-bitset</text>
  <rect class="out" x="358" y="392" width="264" height="74" rx="6"/>
  <text class="text" x="406" y="425">结果 bitmap</text>
  <text class="small" x="390" y="450">只保留 key 2、key 5 的交集结果</text>
  <rect class="skip" x="116" y="402" width="150" height="42" rx="4"/>
  <text class="small" x="135" y="428">key 1 被跳过</text>
  <rect class="skip" x="714" y="402" width="150" height="42" rx="4"/>
  <text class="small" x="733" y="428">key 4 被跳过</text>
  <path class="arrow" d="M304 214 C344 214, 356 151, 382 151"/>
  <path class="arrow" d="M676 214 C636 214, 624 151, 598 151"/>
  <path class="arrow" d="M490 188 L490 222"/>
  <path class="arrow" d="M490 314 L490 388"/>
  <path class="arrow" d="M256 154 C328 170, 350 270, 382 270"/>
  <path class="arrow" d="M708 154 C636 170, 624 270, 598 270"/>
  <text class="small" x="62" y="486">核心收益：不同 high-key 的空间天然剪枝，同 high-key 内再用最合适的容器算法；稠密 bitset 走 word/SIMD 位运算，稀疏 array 走排序数组交集。</text>
</svg>
