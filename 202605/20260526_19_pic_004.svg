<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Roaring 在数据库索引中的常见位置</title>
  <desc id="desc">Roaring 通常作为列存段、倒排索引 posting list 或执行期候选集合的压缩整数集合，而不是完整替代数据库索引访问方法。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.3; }
    .table { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.2; }
    .dict { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; }
    .rbm { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; }
    .exec { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.2; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .mono { font-family: Consolas, Menlo, monospace; font-size: 15px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="text" x="36" y="44">数据库里更常见的是“值/词项 -> Roaring rowid/docid 集合”</text>
  <rect class="table" x="58" y="92" width="220" height="270" rx="6"/>
  <text class="text" x="100" y="128">事实表/列存段</text>
  <text class="mono" x="88" y="166">rowid  status  city</text>
  <text class="mono" x="88" y="198">101    paid    CN</text>
  <text class="mono" x="88" y="230">102    trial   US</text>
  <text class="mono" x="88" y="262">103    paid    CN</text>
  <text class="mono" x="88" y="294">...</text>
  <rect class="dict" x="366" y="88" width="250" height="156" rx="6"/>
  <text class="text" x="410" y="124">字典 / posting 入口</text>
  <text class="mono" x="396" y="162">status=paid</text>
  <text class="mono" x="396" y="194">city=CN</text>
  <text class="mono" x="396" y="226">term='bitmap'</text>
  <rect class="rbm" x="698" y="78" width="220" height="190" rx="6"/>
  <text class="text" x="740" y="114">Roaring 集合</text>
  <text class="mono" x="732" y="154">{101,103,...}</text>
  <text class="mono" x="732" y="188">{101,103,...}</text>
  <text class="small" x="728" y="224">压缩 rowid/docid</text>
  <text class="small" x="728" y="248">支持 AND / OR / ANDNOT</text>
  <rect class="exec" x="358" y="330" width="278" height="112" rx="6"/>
  <text class="text" x="400" y="366">查询执行</text>
  <text class="mono" x="392" y="400">paid AND CN</text>
  <text class="small" x="392" y="426">先做集合交集，再访问候选行</text>
  <path class="arrow" d="M278 202 L362 166"/>
  <path class="arrow" d="M616 166 L694 166"/>
  <path class="arrow" d="M808 268 C782 330, 688 386, 640 386"/>
  <path class="arrow" d="M358 386 C276 386, 232 342, 210 306"/>
  <text class="small" x="58" y="480">注意边界：事务可见性、MVCC、锁、WAL、代价估算、回表 recheck 仍由数据库引擎负责；Roaring 解决的是整数集合表示和集合运算。</text>
</svg>
