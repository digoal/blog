<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Roaring bitmap 选型边界</title>
  <desc id="desc">按 workload 判断 Roaring bitmap 是否适合：集合规模、局部密度、更新频率、是否需要事务索引语义。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .node { fill: #ffffff; stroke: #334155; stroke-width: 1.3; }
    .yes { fill: #dcfce7; stroke: #15803d; stroke-width: 1.3; }
    .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 1.3; }
    .no { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.3; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="text" x="36" y="44">选型不是“bitmap 快不快”，而是“你的瓶颈是不是集合运算”</text>
  <rect class="node" x="92" y="92" width="270" height="82" rx="6"/>
  <text class="text" x="128" y="126">候选集合是否很大？</text>
  <text class="small" x="128" y="154">rowid/docid 数量足以压缩和批处理</text>
  <rect class="node" x="92" y="232" width="270" height="82" rx="6"/>
  <text class="text" x="126" y="266">是否经常交并差？</text>
  <text class="small" x="126" y="294">多维过滤、倒排词项、权限集合</text>
  <rect class="node" x="92" y="372" width="270" height="82" rx="6"/>
  <text class="text" x="126" y="406">更新是否可控？</text>
  <text class="small" x="126" y="434">批量构建优于高频单点改写</text>
  <rect class="yes" x="618" y="92" width="260" height="94" rx="6"/>
  <text class="text" x="666" y="128">适合 Roaring</text>
  <text class="small" x="648" y="158">搜索/OLAP/列存元数据</text>
  <text class="small" x="648" y="180">集合运算重、读多写少</text>
  <rect class="warn" x="618" y="236" width="260" height="94" rx="6"/>
  <text class="text" x="666" y="272">需要实测</text>
  <text class="small" x="648" y="302">极稀疏、极小集合、短生命周期</text>
  <text class="small" x="648" y="324">普通数组可能更简单</text>
  <rect class="no" x="618" y="380" width="260" height="94" rx="6"/>
  <text class="text" x="654" y="416">不应直接替代索引 AM</text>
  <text class="small" x="648" y="446">需要 MVCC、WAL、锁、优化器成本</text>
  <text class="small" x="648" y="468">仍要由数据库访问方法承载</text>
  <path class="arrow" d="M362 133 C456 132, 532 130, 614 130"/>
  <path class="arrow" d="M362 273 C456 274, 532 280, 614 282"/>
  <path class="arrow" d="M362 413 C456 414, 532 426, 614 426"/>
  <path class="arrow" d="M228 174 L228 228"/>
  <path class="arrow" d="M228 314 L228 368"/>
  <text class="small" x="398" y="116">是 + 读多</text>
  <text class="small" x="398" y="258">不明显</text>
  <text class="small" x="398" y="398">高频事务写</text>
</svg>
