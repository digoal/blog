<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>HNSW-PQ 的两层职责</title>
  <desc>图展示 HNSW 图结构只保存邻接关系，PQ storage 保存压缩编码，查询时图遍历通过 PQ 距离计算器打分。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 17px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #334155; }
    .small { font: 13px sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .muted { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .edge { stroke: #64748b; stroke-width: 2; fill: none; }
    .node { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
  </style>
  <rect x="20" y="20" width="920" height="480" class="muted"/>
  <text x="50" y="60" class="title">IndexHNSWPQ = HNSW 邻接图 + IndexPQ 压缩存储</text>

  <rect x="60" y="100" width="390" height="310" class="box"/>
  <text x="85" y="135" class="label">HNSW 图层</text>
  <text x="85" y="162" class="text">只保存 node id、level、neighbor offsets、neighbors</text>
  <text x="85" y="187" class="small">level 0 最密，默认最多 2M 条边；上层默认最多 M 条边</text>

  <line x1="150" y1="320" x2="230" y2="260" class="edge"/>
  <line x1="230" y1="260" x2="330" y2="330" class="edge"/>
  <line x1="150" y1="320" x2="330" y2="330" class="edge"/>
  <line x1="250" y1="205" x2="230" y2="260" class="edge"/>
  <line x1="250" y1="205" x2="360" y2="230" class="edge"/>
  <circle cx="150" cy="320" r="24" class="node"/>
  <circle cx="230" cy="260" r="24" class="node"/>
  <circle cx="330" cy="330" r="24" class="node"/>
  <circle cx="250" cy="205" r="20" class="node"/>
  <circle cx="360" cy="230" r="20" class="node"/>
  <text x="142" y="326" class="small">17</text>
  <text x="222" y="266" class="small">42</text>
  <text x="322" y="336" class="small">88</text>
  <text x="243" y="211" class="small">5</text>
  <text x="352" y="236" class="small">9</text>

  <rect x="510" y="100" width="370" height="310" class="box"/>
  <text x="535" y="135" class="label">PQ storage 层</text>
  <text x="535" y="162" class="text">IndexPQ 继承 IndexFlatCodes，连续保存定长 code</text>
  <text x="535" y="187" class="small">code_size = ceil(pq_m * pq_nbits / 8)</text>

  <rect x="545" y="220" width="290" height="44" class="blue" rx="6"/>
  <text x="560" y="247" class="text">id 17: c0 c1 c2 c3 ...</text>
  <rect x="545" y="274" width="290" height="44" class="green" rx="6"/>
  <text x="560" y="301" class="text">id 42: c0 c1 c2 c3 ...</text>
  <rect x="545" y="328" width="290" height="44" class="amber" rx="6"/>
  <text x="560" y="355" class="text">id 88: c0 c1 c2 c3 ...</text>

  <path d="M450 250 C475 250 485 250 510 250" class="line"/>
  <text x="455" y="236" class="small">node id 对齐 storage offset</text>

  <rect x="250" y="435" width="460" height="42" class="muted"/>
  <text x="270" y="462" class="text">查询向量 q 先生成 PQ 查表距离，再在 HNSW 候选边上逐点打分</text>
</svg>
