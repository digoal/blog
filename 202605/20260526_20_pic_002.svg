<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>PQ 训练、编码与距离表</title>
  <desc>图展示向量被切分为多个子空间，每个子空间训练 k-means 码本，数据库向量保存子码，查询时用查表累加近似距离。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 17px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #334155; }
    .small { font: 13px sans-serif; fill: #475569; }
    .box { fill: #fff; stroke: #334155; stroke-width: 2; rx: 8; }
    .sub0 { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .sub1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .sub2 { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
    .sub3 { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #94a3b8; stroke-width: 1.2; fill: none; }
  </style>
  <text x="40" y="55" class="title">Product Quantization：把 d 维向量拆成 pq_m 个子向量</text>

  <rect x="55" y="105" width="260" height="120" class="box"/>
  <text x="75" y="137" class="label">原始向量 x</text>
  <rect x="75" y="165" width="50" height="32" class="sub0"/>
  <rect x="125" y="165" width="50" height="32" class="sub1"/>
  <rect x="175" y="165" width="50" height="32" class="sub2"/>
  <rect x="225" y="165" width="50" height="32" class="sub3"/>
  <text x="88" y="187" class="small">x0</text>
  <text x="138" y="187" class="small">x1</text>
  <text x="188" y="187" class="small">x2</text>
  <text x="238" y="187" class="small">x3</text>
  <text x="75" y="212" class="small">要求 d % pq_m == 0</text>

  <path d="M315 165 C345 165 360 165 390 165" class="line"/>

  <rect x="390" y="85" width="250" height="170" class="box"/>
  <text x="410" y="117" class="label">每个子空间独立 k-means</text>
  <text x="410" y="145" class="text">ksub = 2^pq_nbits</text>
  <circle cx="430" cy="190" r="10" class="sub0"/>
  <circle cx="460" cy="205" r="10" class="sub0"/>
  <circle cx="490" cy="182" r="10" class="sub0"/>
  <circle cx="535" cy="190" r="10" class="sub1"/>
  <circle cx="565" cy="210" r="10" class="sub1"/>
  <circle cx="595" cy="180" r="10" class="sub1"/>
  <text x="410" y="235" class="small">centroids: M * ksub * dsub</text>

  <path d="M640 165 C670 165 685 165 715 165" class="line"/>

  <rect x="715" y="105" width="190" height="120" class="box"/>
  <text x="735" y="137" class="label">数据库只存 code</text>
  <rect x="735" y="165" width="32" height="32" class="sub0"/>
  <rect x="767" y="165" width="32" height="32" class="sub1"/>
  <rect x="799" y="165" width="32" height="32" class="sub2"/>
  <rect x="831" y="165" width="32" height="32" class="sub3"/>
  <text x="742" y="187" class="small">7</text>
  <text x="774" y="187" class="small">2</text>
  <text x="806" y="187" class="small">9</text>
  <text x="838" y="187" class="small">1</text>
  <text x="735" y="212" class="small">每段保存最近 centroid id</text>

  <rect x="110" y="320" width="740" height="140" class="box"/>
  <text x="135" y="352" class="label">查询路径：ADC 查表累加</text>
  <text x="135" y="382" class="text">q 生成每个子空间到所有 centroid 的距离表，然后对候选 code 做 M 次查表并累加。</text>
  <line x1="160" y1="420" x2="330" y2="420" class="thin"/>
  <line x1="330" y1="420" x2="500" y2="420" class="thin"/>
  <line x1="500" y1="420" x2="670" y2="420" class="thin"/>
  <text x="158" y="445" class="small">dist(q0, c0[7])</text>
  <text x="332" y="445" class="small">dist(q1, c1[2])</text>
  <text x="505" y="445" class="small">dist(q2, c2[9]) ...</text>
  <text x="690" y="426" class="text">≈ dist(q, x)</text>
</svg>
