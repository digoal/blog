<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img">
  <title>HNSW-PQ 查询路径</title>
  <desc>图展示查询从 HNSW 最高层入口点开始贪心下降，到 level 0 用 efSearch 控制候选扩展，并由 PQ 距离表给候选打分。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 17px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #334155; }
    .small { font: 13px sans-serif; fill: #475569; }
    .layer { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .node { fill: #ffffff; stroke: #2563eb; stroke-width: 2; }
    .chosen { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
    .cand { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .line { stroke: #64748b; stroke-width: 2; fill: none; }
    .path { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
  </style>
  <text x="40" y="55" class="title">查询：上层贪心定位，底层候选扩展</text>

  <rect x="70" y="90" width="560" height="85" class="layer"/>
  <text x="90" y="120" class="label">level 2：稀疏长边</text>
  <line x1="170" y1="138" x2="330" y2="138" class="line"/>
  <line x1="330" y1="138" x2="510" y2="138" class="line"/>
  <circle cx="170" cy="138" r="18" class="chosen"/>
  <circle cx="330" cy="138" r="18" class="node"/>
  <circle cx="510" cy="138" r="18" class="node"/>
  <text x="164" y="143" class="small">5</text>

  <rect x="70" y="210" width="560" height="105" class="layer"/>
  <text x="90" y="240" class="label">level 1：继续贪心</text>
  <line x1="145" y1="275" x2="260" y2="258" class="line"/>
  <line x1="260" y1="258" x2="390" y2="280" class="line"/>
  <line x1="390" y1="280" x2="525" y2="252" class="line"/>
  <circle cx="145" cy="275" r="18" class="node"/>
  <circle cx="260" cy="258" r="18" class="chosen"/>
  <circle cx="390" cy="280" r="18" class="node"/>
  <circle cx="525" cy="252" r="18" class="node"/>
  <path d="M180 156 C210 190 235 220 255 240" class="path"/>

  <rect x="70" y="350" width="560" height="135" class="layer"/>
  <text x="90" y="380" class="label">level 0：efSearch 控制候选队列</text>
  <line x1="135" y1="435" x2="235" y2="410" class="line"/>
  <line x1="235" y1="410" x2="340" y2="440" class="line"/>
  <line x1="340" y1="440" x2="450" y2="405" class="line"/>
  <line x1="450" y1="405" x2="550" y2="438" class="line"/>
  <line x1="235" y1="410" x2="450" y2="405" class="line"/>
  <circle cx="135" cy="435" r="19" class="cand"/>
  <circle cx="235" cy="410" r="19" class="chosen"/>
  <circle cx="340" cy="440" r="19" class="cand"/>
  <circle cx="450" cy="405" r="19" class="cand"/>
  <circle cx="550" cy="438" r="19" class="node"/>
  <path d="M265 276 C270 315 255 350 240 392" class="path"/>

  <rect x="690" y="120" width="215" height="320" class="box"/>
  <text x="712" y="155" class="label">候选打分</text>
  <text x="712" y="190" class="text">1. query 建 PQ 距离表</text>
  <text x="712" y="222" class="text">2. 访问邻居 code</text>
  <text x="712" y="254" class="text">3. 查表累加近似距离</text>
  <text x="712" y="286" class="text">4. 更新候选队列与结果堆</text>
  <rect x="720" y="325" width="150" height="44" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="6"/>
  <text x="738" y="353" class="text">efSearch 越大</text>
  <text x="720" y="398" class="small">召回通常更高，但距离计算、跳边、CPU cache 压力也更高。</text>
  <path d="M630 418 C660 410 675 385 705 360" class="arrow"/>
</svg>
