<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>HNSW-PQ 的空间、召回和写入权衡</title>
  <desc>图比较 Flat、HNSWFlat、PQ 和 HNSWPQ 的主要代价维度，强调 HNSW-PQ 用压缩向量降低向量存储，但仍保留图边内存和近似误差。</desc>
  <style>
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 16px sans-serif; fill: #0f172a; }
    .text { font: 14px sans-serif; fill: #334155; }
    .small { font: 13px sans-serif; fill: #475569; }
    .axis { stroke: #334155; stroke-width: 2; }
    .grid { stroke: #cbd5e1; stroke-width: 1; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .hnsw { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .pq { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .hpq { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
  </style>
  <text x="40" y="55" class="title">权衡：HNSW-PQ 降低向量存储，不消除图成本和近似误差</text>

  <rect x="70" y="100" width="520" height="330" class="box"/>
  <line x1="125" y1="375" x2="540" y2="375" class="axis"/>
  <line x1="125" y1="375" x2="125" y2="145" class="axis"/>
  <line x1="125" y1="320" x2="540" y2="320" class="grid"/>
  <line x1="125" y1="265" x2="540" y2="265" class="grid"/>
  <line x1="125" y1="210" x2="540" y2="210" class="grid"/>
  <text x="110" y="405" class="small">低</text>
  <text x="505" y="405" class="small">高</text>
  <text x="290" y="415" class="label">内存与写入代价</text>
  <text x="55" y="150" class="label" transform="rotate(-90 55 150)">召回稳定性</text>

  <circle cx="215" cy="185" r="28" class="flat"/>
  <text x="197" y="190" class="small">Flat</text>
  <circle cx="440" cy="175" r="34" class="hnsw"/>
  <text x="410" y="180" class="small">HNSWFlat</text>
  <circle cx="235" cy="305" r="30" class="pq"/>
  <text x="226" y="310" class="small">PQ</text>
  <circle cx="385" cy="260" r="36" class="hpq"/>
  <text x="354" y="265" class="small">HNSW-PQ</text>

  <rect x="640" y="105" width="250" height="330" class="box"/>
  <text x="665" y="140" class="label">主要工程含义</text>
  <text x="665" y="178" class="text">Flat：准确但线性扫描</text>
  <text x="665" y="215" class="text">HNSWFlat：快，但向量+图都占内存</text>
  <text x="665" y="252" class="text">PQ：省内存，但距离有量化误差</text>
  <text x="665" y="289" class="text">HNSW-PQ：图导航 + 压缩打分</text>
  <text x="665" y="326" class="text">写入：训练后 add，会更新图边</text>
  <text x="665" y="363" class="text">删除：Faiss HNSW 路径不适合高频原地删改</text>
  <text x="665" y="400" class="small">参数调优要同时看召回、P99、内存和重建成本。</text>
</svg>
