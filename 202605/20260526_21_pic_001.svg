<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">HNSW 与低精度向量表示的职责边界</title>
  <desc id="desc">图展示原始向量、半精度、二值量化与严格标量量化在 pgvector HNSW 中的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #3d4b63; }
    .box { fill: #ffffff; stroke: #2e5e8c; stroke-width: 2; rx: 8; }
    .pg { fill: #e9f3ff; stroke: #2368a2; }
    .paper { fill: #fff4df; stroke: #b87413; }
    .warn { fill: #fff1f2; stroke: #c13c4a; }
    .arrow { stroke: #3d4b63; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3d4b63" />
    </marker>
  </defs>
  <rect x="28" y="24" width="904" height="472" fill="#f7fafc" stroke="#d8e2ee" rx="10"/>
  <text x="56" y="64" class="title">HNSW-SQ 先拆成两个问题：怎么走图，怎么表示向量</text>

  <rect x="70" y="110" width="210" height="98" class="box pg"/>
  <text x="92" y="145" class="label">HNSW 图</text>
  <text x="92" y="174" class="small">entry point、多层邻居</text>
  <text x="92" y="196" class="tiny">m / ef_construction / ef_search</text>

  <rect x="376" y="92" width="220" height="60" class="box pg"/>
  <text x="398" y="128" class="label">vector: float32</text>

  <rect x="376" y="172" width="220" height="60" class="box pg"/>
  <text x="398" y="208" class="label">halfvec: float16</text>

  <rect x="376" y="252" width="220" height="60" class="box pg"/>
  <text x="398" y="288" class="label">bit: 1 bit/维</text>

  <rect x="376" y="332" width="220" height="72" class="box warn"/>
  <text x="398" y="362" class="label">INT8 SQ</text>
  <text x="398" y="386" class="small">pgvector 当前无独立类型</text>

  <rect x="690" y="92" width="190" height="60" class="box pg"/>
  <text x="712" y="128" class="label">vector_*_ops</text>

  <rect x="690" y="172" width="190" height="60" class="box pg"/>
  <text x="712" y="208" class="label">halfvec_*_ops</text>

  <rect x="690" y="252" width="190" height="60" class="box pg"/>
  <text x="712" y="288" class="label">bit_hamming_ops</text>

  <rect x="690" y="332" width="190" height="72" class="box paper"/>
  <text x="712" y="362" class="label">论文/其他系统</text>
  <text x="712" y="386" class="small">per-dim scale/zero point</text>

  <path d="M280 158 C320 158 335 122 374 122" class="arrow"/>
  <path d="M280 158 C320 158 335 202 374 202" class="arrow"/>
  <path d="M280 158 C320 158 335 282 374 282" class="arrow"/>
  <path d="M596 122 L688 122" class="arrow"/>
  <path d="M596 202 L688 202" class="arrow"/>
  <path d="M596 282 L688 282" class="arrow"/>
  <path d="M596 368 L688 368" class="arrow dash"/>

  <text x="70" y="452" class="small">读图方法：pgvector 的 HNSW 是访问路径；低精度/量化是距离计算对象。两者组合后，召回误差来自“走图近似”和“表示误差”两层。</text>
</svg>
