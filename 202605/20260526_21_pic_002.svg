<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">pgvector HNSW 磁盘页布局</title>
  <desc id="desc">图展示 metapage、element tuple、neighbor tuple 与 heap TID 的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #162033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #41506a; }
    .page { fill: #ffffff; stroke: #274c77; stroke-width: 2; rx: 8; }
    .tuple { fill: #e8f4ff; stroke: #2f6fa4; stroke-width: 1.5; rx: 6; }
    .neighbor { fill: #eef9ed; stroke: #3c8a4d; stroke-width: 1.5; rx: 6; }
    .meta { fill: #fff4df; stroke: #b87413; stroke-width: 1.5; rx: 6; }
    .heap { fill: #f5efff; stroke: #7c55b0; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #3d4b63; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3d4b63" />
    </marker>
  </defs>
  <rect x="28" y="24" width="904" height="508" fill="#f7fafc" stroke="#d8e2ee" rx="10"/>
  <text x="56" y="64" class="title">pgvector HNSW：节点值和邻接表是两类 index tuple</text>

  <rect x="64" y="102" width="210" height="150" class="page"/>
  <text x="88" y="134" class="label">Block 0: metapage</text>
  <rect x="88" y="154" width="162" height="70" class="meta"/>
  <text x="104" y="181" class="small">m, efConstruction</text>
  <text x="104" y="205" class="small">entry blk/off/level</text>

  <rect x="368" y="102" width="242" height="370" class="page"/>
  <text x="392" y="134" class="label">Element page</text>
  <rect x="392" y="160" width="194" height="120" class="tuple"/>
  <text x="414" y="190" class="small">HnswElementTuple</text>
  <text x="414" y="216" class="tiny">level / deleted / version</text>
  <text x="414" y="238" class="tiny">最多 10 个 heap TID</text>
  <text x="414" y="260" class="tiny">data = vector/halfvec/bit/...</text>

  <rect x="392" y="318" width="194" height="108" class="neighbor"/>
  <text x="414" y="348" class="small">HnswNeighborTuple</text>
  <text x="414" y="374" class="tiny">count / version</text>
  <text x="414" y="396" class="tiny">indextids[] 指向邻居节点</text>

  <rect x="704" y="132" width="168" height="84" class="heap"/>
  <text x="728" y="164" class="small">Heap tuple(s)</text>
  <text x="728" y="190" class="tiny">MVCC 可见性在堆表判断</text>

  <rect x="704" y="288" width="168" height="110" class="page"/>
  <text x="728" y="320" class="small">Other element</text>
  <rect x="728" y="342" width="120" height="34" class="tuple"/>
  <text x="746" y="365" class="tiny">neighbor target</text>

  <path d="M250 190 C300 170 320 145 366 135" class="arrow"/>
  <path d="M586 218 C635 206 650 184 702 174" class="arrow dash"/>
  <path d="M486 280 L486 316" class="arrow"/>
  <path d="M586 374 C630 358 655 344 702 344" class="arrow"/>

  <text x="64" y="502" class="small">关键点：HNSW 索引 tuple 自带被索引值，所以表达式索引会把表达式结果写入索引；heap TID 仍指向原表行，过滤和 MVCC 可见性在执行阶段处理。</text>
</svg>
