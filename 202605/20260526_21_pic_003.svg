<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">量化 HNSW 的召回与重排路径</title>
  <desc id="desc">图展示使用二值量化或低精度索引先召回候选，再用原始向量重排的查询流程。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #46546c; }
    .box { fill: #ffffff; stroke: #2f5e88; stroke-width: 2; rx: 8; }
    .blue { fill: #e8f4ff; }
    .green { fill: #eef9ed; stroke: #3c8a4d; }
    .orange { fill: #fff4df; stroke: #b87413; }
    .purple { fill: #f4f0ff; stroke: #7457a8; }
    .arrow { stroke: #3d4b63; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3d4b63" />
    </marker>
  </defs>
  <rect x="28" y="24" width="904" height="492" fill="#f7fafc" stroke="#d8e2ee" rx="10"/>
  <text x="56" y="64" class="title">工程上常用两阶段：低成本召回，高精度重排</text>

  <rect x="70" y="126" width="168" height="92" class="box blue"/>
  <text x="94" y="160" class="label">Query 向量</text>
  <text x="94" y="188" class="small">float32 或 halfvec</text>

  <rect x="298" y="96" width="188" height="88" class="box orange"/>
  <text x="320" y="130" class="label">表达式转换</text>
  <text x="320" y="158" class="small">binary_quantize()</text>

  <rect x="298" y="226" width="188" height="88" class="box purple"/>
  <text x="320" y="260" class="label">低精度索引</text>
  <text x="320" y="288" class="small">HNSW + bit/halfvec</text>

  <rect x="552" y="160" width="170" height="112" class="box green"/>
  <text x="574" y="194" class="label">候选 top-R</text>
  <text x="574" y="222" class="small">R 通常大于 K</text>
  <text x="574" y="246" class="tiny">受 ef_search 影响</text>

  <rect x="774" y="126" width="118" height="92" class="box blue"/>
  <text x="796" y="160" class="label">原始向量</text>
  <text x="796" y="188" class="small">精确距离</text>

  <rect x="774" y="272" width="118" height="92" class="box green"/>
  <text x="802" y="306" class="label">最终 K</text>
  <text x="796" y="334" class="small">重排后返回</text>

  <path d="M238 172 L296 140" class="arrow"/>
  <path d="M392 184 L392 224" class="arrow"/>
  <path d="M486 270 C515 260 525 234 550 220" class="arrow"/>
  <path d="M722 208 C745 190 750 176 772 172" class="arrow"/>
  <path d="M833 218 L833 270" class="arrow"/>
  <path d="M722 228 C750 246 760 288 772 310" class="arrow"/>

  <text x="70" y="432" class="small">读图方法：召回阶段追求“少访问、少 IO、少内存”；重排阶段用更高精度纠正量化误差。pgvector README 的二值量化示例正是这种 top-R 再按原始 `embedding &lt;=&gt; query` 排序的模式。</text>
</svg>
