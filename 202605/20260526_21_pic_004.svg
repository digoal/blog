<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">pgvector HNSW 构建、插入和 VACUUM 生命周期</title>
  <desc id="desc">图展示 pgvector HNSW 在内存构建、落盘、增量插入和 vacuum 修图中的状态变化。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #46546c; }
    .box { fill: #ffffff; stroke: #2f5e88; stroke-width: 2; rx: 8; }
    .mem { fill: #e8f4ff; }
    .disk { fill: #eef9ed; stroke: #3c8a4d; }
    .maint { fill: #fff4df; stroke: #b87413; }
    .warn { fill: #fff1f2; stroke: #c13c4a; }
    .arrow { stroke: #3d4b63; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3d4b63" />
    </marker>
  </defs>
  <rect x="28" y="24" width="904" height="508" fill="#f7fafc" stroke="#d8e2ee" rx="10"/>
  <text x="56" y="64" class="title">HNSW 不是只读结构：构建、插入、删除都要维护图</text>

  <rect x="68" y="112" width="188" height="100" class="box mem"/>
  <text x="92" y="146" class="label">内存建图阶段</text>
  <text x="92" y="174" class="small">graphCtx / shared area</text>
  <text x="92" y="196" class="tiny">受 maintenance_work_mem 约束</text>

  <rect x="324" y="112" width="188" height="100" class="box disk"/>
  <text x="348" y="146" class="label">CreateGraphPages</text>
  <text x="348" y="174" class="small">写 element tuple</text>
  <text x="348" y="196" class="tiny">再写 neighbor tuple</text>

  <rect x="580" y="112" width="188" height="100" class="box disk"/>
  <text x="604" y="146" class="label">在线插入</text>
  <text x="604" y="174" class="small">Find neighbors</text>
  <text x="604" y="196" class="tiny">UpdateGraphOnDisk</text>

  <rect x="196" y="314" width="188" height="112" class="box warn"/>
  <text x="220" y="348" class="label">删除/更新后的死 TID</text>
  <text x="220" y="376" class="small">先清 heap TID</text>
  <text x="220" y="400" class="tiny">元素可能变成 deleted</text>

  <rect x="452" y="314" width="188" height="112" class="box maint"/>
  <text x="476" y="348" class="label">RepairGraph</text>
  <text x="476" y="376" class="small">重算受影响邻居</text>
  <text x="476" y="400" class="tiny">标记 deleted 后释放位置</text>

  <rect x="708" y="314" width="150" height="112" class="box maint"/>
  <text x="732" y="348" class="label">REINDEX</text>
  <text x="732" y="376" class="small">大规模清理前</text>
  <text x="732" y="400" class="tiny">降低 VACUUM 成本</text>

  <path d="M256 162 L322 162" class="arrow"/>
  <path d="M512 162 L578 162" class="arrow"/>
  <path d="M674 212 C654 266 600 294 542 312" class="arrow"/>
  <path d="M384 370 L450 370" class="arrow"/>
  <path d="M640 370 L706 370" class="arrow"/>
  <path d="M290 314 C260 274 190 252 162 214" class="arrow"/>

  <text x="68" y="492" class="small">关键点：低精度向量能降低单节点值大小，但不会消除图维护成本。写入慢、VACUUM 慢、重建有峰值内存，是 HNSW 在数据库里必须接受的运维边界。</text>
</svg>
