<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">向量表示选择的空间与召回权衡</title>
  <desc id="desc">图展示 vector、halfvec、binary quantization 和理论 INT8 SQ 在空间、距离误差、重排需求上的差异。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .axis { font-size: 15px; font-weight: 700; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 12px; fill: #42506a; }
    .grid { stroke: #d2dbe8; stroke-width: 1; }
    .axisline { stroke: #2f3e55; stroke-width: 2; marker-end: url(#arrow); }
    .bubble { stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f3e55" />
    </marker>
  </defs>
  <rect x="28" y="24" width="904" height="472" fill="#f7fafc" stroke="#d8e2ee" rx="10"/>
  <text x="56" y="64" class="title">压缩越激进，越要用评测和重排兜底</text>

  <line x1="110" y1="408" x2="820" y2="408" class="axisline"/>
  <line x1="110" y1="408" x2="110" y2="100" class="axisline"/>
  <text x="714" y="444" class="axis">空间节省 / 缓存友好程度增加</text>
  <text x="50" y="112" class="axis" transform="rotate(-90 50,112)">表示误差增加</text>

  <line x1="110" y1="330" x2="820" y2="330" class="grid"/>
  <line x1="110" y1="252" x2="820" y2="252" class="grid"/>
  <line x1="110" y1="174" x2="820" y2="174" class="grid"/>
  <line x1="280" y1="100" x2="280" y2="408" class="grid"/>
  <line x1="450" y1="100" x2="450" y2="408" class="grid"/>
  <line x1="620" y1="100" x2="620" y2="408" class="grid"/>

  <circle cx="205" cy="360" r="38" fill="#e8f4ff" stroke="#2368a2" class="bubble"/>
  <text x="173" y="356" class="label">vector</text>
  <text x="166" y="377" class="small">float32</text>

  <circle cx="390" cy="300" r="42" fill="#eef9ed" stroke="#3c8a4d" class="bubble"/>
  <text x="356" y="296" class="label">halfvec</text>
  <text x="350" y="318" class="small">float16</text>

  <circle cx="555" cy="240" r="42" fill="#fff4df" stroke="#b87413" class="bubble"/>
  <text x="527" y="236" class="label">INT8 SQ</text>
  <text x="512" y="258" class="small">概念/其他系统</text>

  <circle cx="725" cy="165" r="48" fill="#fff1f2" stroke="#c13c4a" class="bubble"/>
  <text x="692" y="160" class="label">binary</text>
  <text x="685" y="184" class="small">1 bit/维 + 重排</text>

  <text x="132" y="465" class="small">pgvector 可落地路径：`vector`、`halfvec`、`bit`/`binary_quantize`。严格 per-dimension INT8 SQ 需要其他系统或自定义扩展支持。</text>
</svg>
