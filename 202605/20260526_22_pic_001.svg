<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">IVFFlat 把全量向量扫描转化为少量倒排桶扫描</title>
  <desc id="desc">图中展示向量空间被中心点切成多个 list，查询只访问距离 query 最近的若干 list，再在 list 内计算真实距离。</desc>
  <style>
    .bg{fill:#fbfbf8}
    .box{fill:#ffffff;stroke:#2f3a45;stroke-width:2}
    .list{fill:#e8f2ff;stroke:#2d6cdf;stroke-width:2}
    .hot{fill:#ffe9d6;stroke:#d97706;stroke-width:2}
    .pt{fill:#3c4856}
    .q{fill:#d13b3b}
    .cent{fill:#2d6cdf}
    .line{stroke:#667085;stroke-width:2;stroke-dasharray:5 5}
    .arrow{stroke:#2f3a45;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .txt{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#1f2937}
    .small{font-size:15px;fill:#374151}
    .label{font-size:16px;font-weight:700;fill:#111827}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f3a45"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="txt" x="36" y="44">精确 KNN：每次查询扫描所有向量</text>
  <rect class="box" x="36" y="70" width="400" height="360" rx="8"/>
  <circle class="pt" cx="93" cy="144" r="5"/><circle class="pt" cx="140" cy="184" r="5"/><circle class="pt" cx="194" cy="139" r="5"/>
  <circle class="pt" cx="126" cy="274" r="5"/><circle class="pt" cx="216" cy="238" r="5"/><circle class="pt" cx="320" cy="174" r="5"/>
  <circle class="pt" cx="344" cy="260" r="5"/><circle class="pt" cx="278" cy="322" r="5"/><circle class="pt" cx="168" cy="350" r="5"/>
  <circle class="q" cx="257" cy="218" r="9"/>
  <line class="line" x1="257" y1="218" x2="93" y2="144"/><line class="line" x1="257" y1="218" x2="140" y2="184"/>
  <line class="line" x1="257" y1="218" x2="194" y2="139"/><line class="line" x1="257" y1="218" x2="126" y2="274"/>
  <line class="line" x1="257" y1="218" x2="216" y2="238"/><line class="line" x1="257" y1="218" x2="320" y2="174"/>
  <line class="line" x1="257" y1="218" x2="344" y2="260"/><line class="line" x1="257" y1="218" x2="278" y2="322"/>
  <line class="line" x1="257" y1="218" x2="168" y2="350"/>
  <text class="small" x="62" y="405">代价约为 N * d 次距离计算</text>
  <path class="arrow" d="M455 250 C490 250, 505 250, 535 250"/>
  <text class="txt" x="560" y="44">IVFFlat：先找最近 list，再扫描 list 内向量</text>
  <rect class="box" x="560" y="70" width="380" height="360" rx="8"/>
  <ellipse class="list" cx="650" cy="155" rx="70" ry="60"/>
  <ellipse class="hot" cx="765" cy="205" rx="90" ry="74"/>
  <ellipse class="list" cx="690" cy="330" rx="88" ry="62"/>
  <ellipse class="hot" cx="842" cy="322" rx="68" ry="58"/>
  <circle class="cent" cx="650" cy="155" r="8"/><circle class="cent" cx="765" cy="205" r="8"/>
  <circle class="cent" cx="690" cy="330" r="8"/><circle class="cent" cx="842" cy="322" r="8"/>
  <circle class="pt" cx="622" cy="130" r="4"/><circle class="pt" cx="676" cy="174" r="4"/><circle class="pt" cx="645" cy="196" r="4"/>
  <circle class="pt" cx="734" cy="176" r="4"/><circle class="pt" cx="790" cy="183" r="4"/><circle class="pt" cx="806" cy="231" r="4"/>
  <circle class="pt" cx="700" cy="288" r="4"/><circle class="pt" cx="651" cy="340" r="4"/><circle class="pt" cx="728" cy="366" r="4"/>
  <circle class="pt" cx="820" cy="286" r="4"/><circle class="pt" cx="876" cy="319" r="4"/><circle class="pt" cx="848" cy="356" r="4"/>
  <circle class="q" cx="790" cy="262" r="9"/>
  <line class="line" x1="790" y1="262" x2="765" y2="205"/>
  <line class="line" x1="790" y1="262" x2="842" y2="322"/>
  <text class="label" x="728" y="125">probes=2</text>
  <text class="small" x="585" y="405">代价约为 lists 个中心距离 + 被选中 list 的候选距离</text>
</svg>
