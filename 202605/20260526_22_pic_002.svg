<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">pgvector IVFFlat 物理页面布局</title>
  <desc id="desc">展示 metapage、list pages 和每个倒排 list 的 entry pages 链表结构。</desc>
  <style>
    .bg{fill:#fbfbf8}
    .page{fill:#ffffff;stroke:#243041;stroke-width:2}
    .meta{fill:#eef7e8;stroke:#3f7d20;stroke-width:2}
    .list{fill:#e8f2ff;stroke:#2d6cdf;stroke-width:2}
    .entry{fill:#fff3e0;stroke:#d97706;stroke-width:2}
    .opaque{fill:#f3f4f6;stroke:#6b7280;stroke-width:1.5}
    .arrow{stroke:#243041;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#667085;stroke-width:2;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
    .txt{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#111827}
    .small{font-size:14px;fill:#374151}
    .mono{font-size:14px;fill:#111827}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#243041"/>
    </marker>
  </defs>
  <rect class="bg" width="1080" height="560"/>
  <text class="txt" x="36" y="44">索引文件页面：block 0 是 metapage，block 1 起是 list page，entry page 由每个 list 串起来</text>
  <rect class="page meta" x="44" y="90" width="230" height="170" rx="8"/>
  <text class="txt" x="70" y="124">block 0: metapage</text>
  <text class="mono" x="70" y="158">magicNumber</text>
  <text class="mono" x="70" y="184">version</text>
  <text class="mono" x="70" y="210">dimensions</text>
  <text class="mono" x="70" y="236">lists</text>
  <rect class="opaque" x="44" y="270" width="230" height="48" rx="4"/>
  <text class="small" x="72" y="300">page opaque: page_id</text>
  <path class="arrow" d="M282 175 L338 175"/>
  <rect class="page list" x="350" y="80" width="290" height="260" rx="8"/>
  <text class="txt" x="380" y="114">block 1+: list pages</text>
  <rect class="page" x="382" y="136" width="225" height="50" rx="5"/>
  <text class="mono" x="398" y="167">list 0: center, start, insert</text>
  <rect class="page" x="382" y="196" width="225" height="50" rx="5"/>
  <text class="mono" x="398" y="227">list 1: center, start, insert</text>
  <rect class="page" x="382" y="256" width="225" height="50" rx="5"/>
  <text class="mono" x="398" y="287">list 2: center, start, insert</text>
  <rect class="opaque" x="350" y="352" width="290" height="48" rx="4"/>
  <text class="small" x="382" y="382">nextblkno 链接下一张 list page</text>
  <path class="dash" d="M608 160 C690 112, 730 104, 784 118"/>
  <path class="dash" d="M608 220 C690 212, 724 212, 780 224"/>
  <path class="dash" d="M608 280 C690 332, 725 360, 782 376"/>
  <rect class="page entry" x="792" y="76" width="230" height="96" rx="8"/>
  <text class="txt" x="820" y="108">list 0 entry page</text>
  <text class="small" x="820" y="136">IndexTuple: vector + heap TID</text>
  <rect class="opaque" x="792" y="178" width="230" height="36" rx="4"/>
  <text class="small" x="820" y="202">nextblkno</text>
  <rect class="page entry" x="792" y="206" width="230" height="96" rx="8"/>
  <text class="txt" x="820" y="238">list 1 entry page</text>
  <text class="small" x="820" y="266">IndexTuple: vector + heap TID</text>
  <rect class="opaque" x="792" y="308" width="230" height="36" rx="4"/>
  <text class="small" x="820" y="332">nextblkno</text>
  <rect class="page entry" x="792" y="348" width="230" height="96" rx="8"/>
  <text class="txt" x="820" y="380">list 2 entry page</text>
  <text class="small" x="820" y="408">IndexTuple: vector + heap TID</text>
  <rect class="opaque" x="792" y="450" width="230" height="36" rx="4"/>
  <text class="small" x="820" y="474">nextblkno</text>
  <text class="small" x="66" y="482">源码锚点：IvfflatMetaPageData、IvfflatListData、IvfflatPageOpaqueData、CreateMetaPage、CreateListPages、InsertTuples</text>
</svg>
