<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">pgvector IVFFlat 构建流程</title>
  <desc id="desc">展示采样、k-means、创建元信息、分配 tuple、按 list 排序并装载页面的流程。</desc>
  <style>
    .bg{fill:#fbfbf8}
    .step{fill:#ffffff;stroke:#263241;stroke-width:2}
    .phase{fill:#e8f2ff;stroke:#2d6cdf;stroke-width:2}
    .warn{fill:#fff3e0;stroke:#d97706;stroke-width:2}
    .arrow{stroke:#263241;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .txt{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#111827}
    .small{font-size:14px;fill:#374151}
    .code{font-size:14px;fill:#111827}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#263241"/>
    </marker>
  </defs>
  <rect class="bg" width="1080" height="500"/>
  <text class="txt" x="40" y="42">CREATE INDEX USING ivfflat 的关键阶段</text>
  <rect class="step phase" x="44" y="92" width="180" height="110" rx="8"/>
  <text class="txt" x="72" y="126">1. 采样</text>
  <text class="small" x="64" y="158">目标：lists * 50</text>
  <text class="small" x="64" y="182">下限：10000</text>
  <path class="arrow" d="M226 147 L282 147"/>
  <rect class="step phase" x="286" y="92" width="190" height="110" rx="8"/>
  <text class="txt" x="318" y="126">2. k-means</text>
  <text class="small" x="310" y="158">k-means++ 初始化</text>
  <text class="small" x="310" y="182">Elkan k-means</text>
  <path class="arrow" d="M478 147 L534 147"/>
  <rect class="step phase" x="538" y="92" width="190" height="110" rx="8"/>
  <text class="txt" x="566" y="126">3. 建索引骨架</text>
  <text class="small" x="560" y="158">metapage</text>
  <text class="small" x="560" y="182">list pages + centers</text>
  <path class="arrow" d="M730 147 L786 147"/>
  <rect class="step phase" x="790" y="92" width="230" height="110" rx="8"/>
  <text class="txt" x="824" y="126">4. 扫表分配 list</text>
  <text class="small" x="812" y="158">找最近 center</text>
  <text class="small" x="812" y="182">tuple: list, tid, vector</text>
  <path class="arrow" d="M905 204 L905 260"/>
  <rect class="step warn" x="790" y="264" width="230" height="112" rx="8"/>
  <text class="txt" x="824" y="298">5. 排序并装载</text>
  <text class="small" x="812" y="330">按 list 排序</text>
  <text class="small" x="812" y="354">写入每个 list 的 entry pages</text>
  <path class="arrow" d="M790 320 L728 320"/>
  <rect class="step" x="486" y="264" width="240" height="112" rx="8"/>
  <text class="txt" x="512" y="298">可并行部分</text>
  <text class="small" x="510" y="330">k-means 后复制 centers</text>
  <text class="small" x="510" y="354">worker 扫表、分配、排序</text>
  <path class="arrow" d="M486 320 L426 320"/>
  <rect class="step" x="162" y="264" width="260" height="112" rx="8"/>
  <text class="txt" x="188" y="298">进度可观测</text>
  <text class="code" x="186" y="330">performing k-means</text>
  <text class="code" x="186" y="354">assigning tuples / loading tuples</text>
  <text class="small" x="56" y="446">注意：建索引时如果样本数少于 lists，源码会 NOTICE 提醒低召回风险。</text>
</svg>
