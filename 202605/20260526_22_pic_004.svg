<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">pgvector IVFFlat 查询与过滤路径</title>
  <desc id="desc">展示查询向量通过 centroid 排序选 list，扫描候选并排序，返回 TID 后由 PostgreSQL heap 与过滤条件完成可见性和谓词检查。</desc>
  <style>
    .bg{fill:#fbfbf8}
    .box{fill:#ffffff;stroke:#263241;stroke-width:2}
    .ivf{fill:#e8f2ff;stroke:#2d6cdf;stroke-width:2}
    .pg{fill:#eef7e8;stroke:#3f7d20;stroke-width:2}
    .warn{fill:#fff3e0;stroke:#d97706;stroke-width:2}
    .arrow{stroke:#263241;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#667085;stroke-width:2;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
    .txt{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#111827}
    .small{font-size:14px;fill:#374151}
    .code{font-size:14px;fill:#111827}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#263241"/>
    </marker>
  </defs>
  <rect class="bg" width="1080" height="520"/>
  <text class="txt" x="40" y="42">查询路径：IVFFlat 负责 ANN 候选，PostgreSQL 负责 MVCC 与非向量谓词</text>
  <rect class="box" x="44" y="90" width="190" height="96" rx="8"/>
  <text class="txt" x="78" y="124">SQL</text>
  <text class="code" x="66" y="154">ORDER BY embedding &lt;-&gt; q</text>
  <text class="code" x="66" y="174">LIMIT k</text>
  <path class="arrow" d="M236 138 L292 138"/>
  <rect class="box ivf" x="296" y="90" width="210" height="96" rx="8"/>
  <text class="txt" x="326" y="124">选 list</text>
  <text class="small" x="320" y="154">计算 q 到所有 center 距离</text>
  <text class="small" x="320" y="174">取 maxProbes 内最近 list</text>
  <path class="arrow" d="M508 138 L564 138"/>
  <rect class="box ivf" x="568" y="90" width="210" height="96" rx="8"/>
  <text class="txt" x="598" y="124">扫描 probes</text>
  <text class="small" x="592" y="154">读取 list entry pages</text>
  <text class="small" x="592" y="174">候选距离放入 tuplesort</text>
  <path class="arrow" d="M780 138 L836 138"/>
  <rect class="box ivf" x="840" y="90" width="196" height="96" rx="8"/>
  <text class="txt" x="870" y="124">返回 TID</text>
  <text class="small" x="862" y="154">按距离顺序取出</text>
  <text class="small" x="862" y="174">xs_heaptid</text>
  <path class="arrow" d="M938 188 L938 250"/>
  <rect class="box pg" x="790" y="254" width="246" height="112" rx="8"/>
  <text class="txt" x="816" y="288">Heap Fetch / Filter</text>
  <text class="small" x="814" y="320">MVCC snapshot 检查</text>
  <text class="small" x="814" y="344">WHERE category_id = ? 等过滤</text>
  <path class="dash" d="M790 310 C700 310, 638 274, 620 194"/>
  <rect class="box warn" x="382" y="254" width="330" height="112" rx="8"/>
  <text class="txt" x="414" y="288">过滤后的结果可能不够 k</text>
  <text class="small" x="410" y="320">原因：近似索引先返回候选，谓词通常后过滤</text>
  <text class="small" x="410" y="344">缓解：提高 probes 或启用 iterative_scan</text>
  <rect class="box" x="44" y="254" width="260" height="112" rx="8"/>
  <text class="txt" x="72" y="288">迭代扫描</text>
  <text class="code" x="68" y="320">ivfflat.iterative_scan=relaxed_order</text>
  <text class="code" x="68" y="344">ivfflat.max_probes=N</text>
  <path class="arrow" d="M304 310 L378 310"/>
  <text class="small" x="54" y="450">源码锚点：ivfflatcostestimate 拒绝无 orderBy 的索引路径；ivfflatgettuple 要求 MVCC snapshot；ivfflatbeginscan 限制 probes/maxProbes 不超过 lists。</text>
</svg>
