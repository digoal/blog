<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">IVF-PQ 索引结构</title>
  <desc id="desc">展示查询向量先经过粗量化器选择倒排 list，再在 list 内扫描残差 PQ code 的结构。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4b7c"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #1f2937; }
    .label { font: 16px sans-serif; fill: #1f2937; }
    .small { font: 14px sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 6; }
    .accent { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 6; }
    .pq { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 6; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 6; }
    .line { stroke: #2f4b7c; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 6 5; fill: none; }
  </style>
  <rect x="32" y="28" width="1056" height="504" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="66" text-anchor="middle" class="title">IVF-PQ：粗量化少看桶，残差 PQ 少存向量</text>

  <rect x="70" y="130" width="160" height="86" class="box"/>
  <text x="150" y="166" text-anchor="middle" class="label">原始向量 x</text>
  <text x="150" y="192" text-anchor="middle" class="small">float32[d]</text>

  <rect x="290" y="112" width="210" height="122" class="accent"/>
  <text x="395" y="146" text-anchor="middle" class="label">粗量化器</text>
  <text x="395" y="174" text-anchor="middle" class="small">IndexFlatL2 等</text>
  <text x="395" y="201" text-anchor="middle" class="small">选择 nearest list</text>

  <rect x="580" y="90" width="420" height="318" class="box"/>
  <text x="790" y="126" text-anchor="middle" class="label">InvertedLists</text>

  <rect x="620" y="154" width="330" height="58" class="warn"/>
  <text x="642" y="188" class="small">list 17: id + PQ(residual) code</text>
  <rect x="620" y="230" width="330" height="58" class="pq"/>
  <text x="642" y="264" class="small">list 41: id + PQ(residual) code</text>
  <rect x="620" y="306" width="330" height="58" class="warn"/>
  <text x="642" y="340" class="small">list 89: id + PQ(residual) code</text>

  <rect x="290" y="330" width="210" height="86" class="pq"/>
  <text x="395" y="365" text-anchor="middle" class="label">ProductQuantizer</text>
  <text x="395" y="392" text-anchor="middle" class="small">M 个子码本，nbits/段</text>

  <path d="M230 173 L290 173" class="line"/>
  <path d="M500 173 L580 183" class="line"/>
  <path d="M500 373 L580 259" class="line"/>
  <path d="M790 408 L790 468 L150 468 L150 216" class="dash"/>
  <text x="404" y="496" text-anchor="middle" class="small">训练/入库：x 分配到 list，计算 residual = x - centroid，再编码成 PQ code</text>
</svg>
