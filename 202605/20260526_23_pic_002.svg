<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">IVF-PQ 构建流程</title>
  <desc id="desc">展示训练粗量化器、训练 PQ、编码残差、追加倒排 list 的构建路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #374151; }
    .stage { fill: #f9fafb; stroke: #475569; stroke-width: 2; rx: 6; }
    .train { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 6; }
    .store { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 6; }
    .line { stroke: #1d4ed8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="32" y="28" width="1056" height="504" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="68" text-anchor="middle" class="title">构建路径：训练两个量化器，再把残差码放入倒排桶</text>

  <rect x="72" y="140" width="160" height="92" class="stage"/>
  <text x="152" y="176" text-anchor="middle" class="label">训练样本</text>
  <text x="152" y="204" text-anchor="middle" class="small">representative x</text>

  <rect x="292" y="110" width="190" height="92" class="train"/>
  <text x="387" y="145" text-anchor="middle" class="label">Level1Quantizer</text>
  <text x="387" y="173" text-anchor="middle" class="small">k-means 得 nlist 个中心</text>

  <rect x="292" y="270" width="190" height="92" class="train"/>
  <text x="387" y="305" text-anchor="middle" class="label">ProductQuantizer</text>
  <text x="387" y="333" text-anchor="middle" class="small">每个子空间训练码本</text>

  <rect x="552" y="140" width="190" height="92" class="stage"/>
  <text x="647" y="175" text-anchor="middle" class="label">add(x)</text>
  <text x="647" y="203" text-anchor="middle" class="small">assign 到最近 list</text>

  <rect x="552" y="300" width="190" height="92" class="stage"/>
  <text x="647" y="335" text-anchor="middle" class="label">encode residual</text>
  <text x="647" y="363" text-anchor="middle" class="small">PQ(x - centroid)</text>

  <rect x="812" y="220" width="220" height="112" class="store"/>
  <text x="922" y="260" text-anchor="middle" class="label">InvertedLists</text>
  <text x="922" y="288" text-anchor="middle" class="small">list_no -> ids + codes</text>
  <text x="922" y="314" text-anchor="middle" class="small">code_size = ceil(M*nbits/8)</text>

  <path d="M232 170 L292 156" class="line"/>
  <path d="M232 202 L292 306" class="line"/>
  <path d="M482 156 L552 172" class="line"/>
  <path d="M482 316 L552 336" class="line"/>
  <path d="M742 186 L812 250" class="line"/>
  <path d="M742 346 L812 302" class="line"/>

  <text x="560" y="452" text-anchor="middle" class="small">Faiss 的 IndexIVF::train 训练粗量化器并调用 train_encoder；IndexIVFPQ::train_encoder 内部训练 ProductQuantizer。</text>
</svg>
