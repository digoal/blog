<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">IVF-PQ 查询路径</title>
  <desc id="desc">展示查询先搜索粗中心，再预取倒排 list，随后用 PQ 查表累加近似距离。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #475569; stroke-width: 2; rx: 6; }
    .probe { fill: #ccfbf1; stroke: #0f766e; stroke-width: 2; rx: 6; }
    .score { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 6; }
    .line { stroke: #0f766e; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="32" y="28" width="1056" height="504" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="68" text-anchor="middle" class="title">查询路径：nprobe 控制候选桶，PQ LUT 控制单候选成本</text>

  <rect x="72" y="132" width="160" height="88" class="box"/>
  <text x="152" y="168" text-anchor="middle" class="label">query q</text>
  <text x="152" y="196" text-anchor="middle" class="small">原始 float，不编码</text>

  <rect x="292" y="110" width="190" height="112" class="probe"/>
  <text x="387" y="145" text-anchor="middle" class="label">粗量化搜索</text>
  <text x="387" y="173" text-anchor="middle" class="small">q 到 nlist 中心距离</text>
  <text x="387" y="198" text-anchor="middle" class="small">取最近 nprobe 个 list</text>

  <rect x="552" y="98" width="190" height="136" class="score"/>
  <text x="647" y="133" text-anchor="middle" class="label">准备距离表</text>
  <text x="647" y="161" text-anchor="middle" class="small">term1: coarse_dis</text>
  <text x="647" y="186" text-anchor="middle" class="small">term2: precomputed</text>
  <text x="647" y="211" text-anchor="middle" class="small">term3: q 与 PQ 码本</text>

  <rect x="812" y="110" width="220" height="112" class="probe"/>
  <text x="922" y="150" text-anchor="middle" class="label">扫描 list codes</text>
  <text x="922" y="178" text-anchor="middle" class="small">逐 code 查表累加</text>
  <text x="922" y="204" text-anchor="middle" class="small">维护 top-k heap</text>

  <rect x="292" y="322" width="190" height="92" class="box"/>
  <text x="387" y="358" text-anchor="middle" class="label">max_codes</text>
  <text x="387" y="386" text-anchor="middle" class="small">限制扫描 code 总数</text>

  <rect x="552" y="322" width="190" height="92" class="box"/>
  <text x="647" y="358" text-anchor="middle" class="label">IDSelector</text>
  <text x="647" y="386" text-anchor="middle" class="small">外部过滤候选 id</text>

  <rect x="812" y="322" width="220" height="92" class="box"/>
  <text x="922" y="358" text-anchor="middle" class="label">返回近似 top-k</text>
  <text x="922" y="386" text-anchor="middle" class="small">可再取原向量 rerank</text>

  <path d="M232 176 L292 166" class="line"/>
  <path d="M482 166 L552 166" class="line"/>
  <path d="M742 166 L812 166" class="line"/>
  <path d="M922 222 L922 322" class="line"/>
  <path d="M482 368 L552 368" class="line"/>
  <path d="M742 368 L812 368" class="line"/>
  <path d="M387 322 L387 222" class="line"/>

  <text x="560" y="476" text-anchor="middle" class="small">精度由两层近似共同决定：未 probe 的 list 可能漏召回，已扫描候选的 PQ 距离也有量化误差。</text>
</svg>
