<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">PQ、OPQ、AQ 的编码模型差异</title>
  <desc id="desc">比较 PQ 的子空间拼接、OPQ 的旋转后再 PQ、AQ 的多码本相加。</desc>
  <style>
    .title { font: 700 22px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #374151; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 6; }
    .pq { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 4; }
    .opq { fill: #fae8ff; stroke: #a21caf; stroke-width: 2; rx: 4; }
    .aq { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 4; }
    .axis { stroke: #475569; stroke-width: 2; }
    .line { stroke: #64748b; stroke-width: 1.8; fill: none; stroke-dasharray: 6 4; }
  </style>
  <rect x="32" y="28" width="1056" height="504" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="68" text-anchor="middle" class="title">PQ、OPQ、AQ：都是短码，但误差模型不一样</text>

  <rect x="70" y="120" width="300" height="330" class="panel"/>
  <text x="220" y="154" text-anchor="middle" class="label">PQ</text>
  <rect x="110" y="205" width="58" height="150" class="pq"/>
  <rect x="176" y="205" width="58" height="150" class="pq"/>
  <rect x="242" y="205" width="58" height="150" class="pq"/>
  <text x="139" y="385" text-anchor="middle" class="small">subspace 1</text>
  <text x="205" y="385" text-anchor="middle" class="small">subspace 2</text>
  <text x="271" y="385" text-anchor="middle" class="small">subspace 3</text>
  <text x="220" y="420" text-anchor="middle" class="small">按维度切块，各块独立量化</text>

  <rect x="410" y="120" width="300" height="330" class="panel"/>
  <text x="560" y="154" text-anchor="middle" class="label">OPQ</text>
  <line x1="464" y1="330" x2="636" y2="190" class="axis"/>
  <line x1="462" y1="190" x2="638" y2="330" class="axis"/>
  <rect x="478" y="210" width="58" height="130" class="opq" transform="rotate(-38 507 275)"/>
  <rect x="546" y="210" width="58" height="130" class="opq" transform="rotate(-38 575 275)"/>
  <text x="560" y="385" text-anchor="middle" class="small">先学旋转矩阵，再做 PQ</text>
  <text x="560" y="420" text-anchor="middle" class="small">目标是降低子空间切分带来的失真</text>

  <rect x="750" y="120" width="300" height="330" class="panel"/>
  <text x="900" y="154" text-anchor="middle" class="label">AQ / RQ / LSQ</text>
  <circle cx="850" cy="250" r="38" class="aq"/>
  <circle cx="915" cy="292" r="38" class="aq"/>
  <circle cx="970" cy="230" r="38" class="aq"/>
  <line x1="850" y1="250" x2="915" y2="292" class="line"/>
  <line x1="915" y1="292" x2="970" y2="230" class="line"/>
  <text x="900" y="385" text-anchor="middle" class="small">多个码本向量相加重构</text>
  <text x="900" y="420" text-anchor="middle" class="small">表达力更强，编码/搜索通常更复杂</text>
</svg>
