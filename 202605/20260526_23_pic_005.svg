<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">IVF-PQ 参数与代价权衡</title>
  <desc id="desc">展示 nlist、nprobe、M、nbits、precomputed table 对召回、延迟、空间、训练成本的影响。</desc>
  <style>
    .title { font: 700 22px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #374151; }
    .axis { stroke: #334155; stroke-width: 2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .curve1 { stroke: #2563eb; stroke-width: 3; fill: none; }
    .curve2 { stroke: #dc2626; stroke-width: 3; fill: none; }
    .curve3 { stroke: #16a34a; stroke-width: 3; fill: none; }
    .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 6; }
  </style>
  <rect x="32" y="28" width="1056" height="504" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="68" text-anchor="middle" class="title">调参不是找神奇值，而是在召回、延迟、空间之间换</text>

  <line x1="100" y1="420" x2="540" y2="420" class="axis"/>
  <line x1="100" y1="420" x2="100" y2="120" class="axis"/>
  <line x1="180" y1="120" x2="180" y2="420" class="grid"/>
  <line x1="260" y1="120" x2="260" y2="420" class="grid"/>
  <line x1="340" y1="120" x2="340" y2="420" class="grid"/>
  <line x1="420" y1="120" x2="420" y2="420" class="grid"/>
  <path d="M110 390 C180 330, 260 250, 350 185 C425 132, 485 118, 530 114" class="curve1"/>
  <path d="M110 405 C190 380, 285 330, 375 250 C450 185, 500 150, 530 132" class="curve2"/>
  <text x="318" y="102" text-anchor="middle" class="small">nprobe 增大</text>
  <text x="74" y="154" text-anchor="middle" class="small" transform="rotate(-90 74 154)">召回/延迟</text>
  <text x="535" y="446" text-anchor="end" class="small">更多 list/code 被扫描</text>
  <text x="420" y="150" class="small" fill="#2563eb">召回上升</text>
  <text x="416" y="228" class="small" fill="#dc2626">延迟上升</text>

  <line x1="640" y1="420" x2="1040" y2="420" class="axis"/>
  <line x1="640" y1="420" x2="640" y2="120" class="axis"/>
  <path d="M650 390 C720 330, 800 260, 880 210 C950 170, 1000 150, 1030 140" class="curve3"/>
  <path d="M650 170 C730 185, 820 215, 905 275 C970 322, 1010 365, 1030 394" class="curve2"/>
  <text x="840" y="102" text-anchor="middle" class="small">M 或 nbits 增大</text>
  <text x="614" y="154" text-anchor="middle" class="small" transform="rotate(-90 614 154)">空间/误差</text>
  <text x="1035" y="446" text-anchor="end" class="small">更长 code / 更大码本</text>
  <text x="918" y="174" class="small" fill="#16a34a">量化误差下降</text>
  <text x="920" y="334" class="small" fill="#dc2626">空间和训练成本上升</text>

  <rect x="170" y="462" width="780" height="48" class="note"/>
  <text x="560" y="492" text-anchor="middle" class="small">容量估算：N * code_size + N * id_size + 倒排结构 + PQ 码本 + 可选 nlist*M*ksub 预计算表</text>
</svg>
