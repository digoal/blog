<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">IVFFlat-SQ 的职责边界</title>
  <desc id="desc">展示 IVF 粗分桶、Flat 原始向量、SQ 低精度编码和 pgvector 可落地路径之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .soft { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .pg { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="430"/>
  <text class="text" x="34" y="42">同一个名字容易混淆：IVF 是候选生成，SQ 是向量编码</text>

  <rect class="soft" x="38" y="82" width="250" height="112"/>
  <text class="text" x="62" y="118">IVF 粗分桶</text>
  <text class="small" x="62" y="150">k-means 中心点</text>
  <text class="small" x="62" y="174">查询只探测 nprobe/probes 个桶</text>

  <rect class="box" x="365" y="62" width="250" height="112"/>
  <text class="text" x="389" y="98">Flat payload</text>
  <text class="small" x="389" y="130">桶内保存原始或低精度向量</text>
  <text class="small" x="389" y="154">距离计算更接近真实值</text>

  <rect class="warn" x="365" y="220" width="250" height="128"/>
  <text class="text" x="389" y="256">SQ payload</text>
  <text class="small" x="389" y="288">每维映射到 8/6/4 bit 等 code</text>
  <text class="small" x="389" y="312">距离来自解码或近似计算</text>
  <text class="tiny" x="389" y="336">典型参照：Faiss IndexIVFScalarQuantizer</text>

  <rect class="pg" x="700" y="82" width="240" height="266"/>
  <text class="text" x="724" y="118">pgvector 当前边界</text>
  <text class="small" x="724" y="154">有 ivfflat access method</text>
  <text class="small" x="724" y="184">有 vector / halfvec / bit opclass</text>
  <text class="small" x="724" y="214">有 binary_quantize() 表达式路径</text>
  <text class="small" x="724" y="244">没有独立 ivfflat_sq_ops</text>
  <text class="small" x="724" y="274">没有 per-dim scale/zero point</text>
  <text class="small" x="724" y="304">工程上需要召回 + 重排验证</text>

  <path class="arrow" d="M288 138 C320 138 330 118 365 118"/>
  <path class="dash" d="M288 138 C325 160 332 284 365 284"/>
  <path class="arrow" d="M615 118 C650 118 662 150 700 170"/>
  <path class="dash" d="M615 284 C650 284 662 250 700 238"/>

  <text class="tiny" x="56" y="236">写作约定：本文的 ivfflat-sq = IVF 候选生成 + 标量量化思想。</text>
  <text class="tiny" x="56" y="260">pgvector 落地时要写成具体类型和表达式，不能假设存在独立 SQ 索引。</text>
</svg>
