<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">pgvector IVFFlat 与低精度 payload 页面布局</title>
  <desc id="desc">展示 metapage、list page、entry page 以及 vector、halfvec、bit 三种 payload 在 pgvector IVFFlat 中的关系。</desc>
  <style>
    .bg { fill: #ffffff; }
    .page { fill: #f8fafc; stroke: #1e293b; stroke-width: 2; rx: 8; }
    .meta { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 6; }
    .list { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 6; }
    .entry { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 6; }
    .payload { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="520"/>
  <text class="text" x="34" y="40">pgvector IVFFlat：页面结构不变，payload 类型改变工作集大小</text>

  <rect class="page" x="36" y="78" width="230" height="145"/>
  <text class="text" x="58" y="110">Block 0: metapage</text>
  <rect class="meta" x="58" y="128" width="184" height="66"/>
  <text class="small" x="75" y="154">magic / version</text>
  <text class="small" x="75" y="178">dimensions / lists</text>

  <rect class="page" x="335" y="78" width="275" height="220"/>
  <text class="text" x="357" y="110">Block 1+: list pages</text>
  <rect class="list" x="360" y="132" width="225" height="48"/>
  <text class="small" x="376" y="162">list 0: center + startPage + insertPage</text>
  <rect class="list" x="360" y="190" width="225" height="48"/>
  <text class="small" x="376" y="220">list 1: center + startPage + insertPage</text>
  <rect class="list" x="360" y="248" width="225" height="30"/>
  <text class="tiny" x="376" y="268">... list N</text>

  <rect class="page" x="690" y="78" width="300" height="330"/>
  <text class="text" x="712" y="110">entry page 链</text>
  <rect class="entry" x="718" y="132" width="245" height="58"/>
  <text class="small" x="734" y="156">IndexTuple: payload + heap TID</text>
  <text class="tiny" x="734" y="176">xs_heaptid 指向原表行</text>
  <rect class="entry" x="718" y="206" width="245" height="58"/>
  <text class="small" x="734" y="230">IndexTuple: payload + heap TID</text>
  <text class="tiny" x="734" y="250">页面 opaque 保存 nextblkno</text>
  <rect class="entry" x="718" y="280" width="245" height="58"/>
  <text class="small" x="734" y="304">IndexTuple: payload + heap TID</text>
  <text class="tiny" x="734" y="324">list 内距离真实计算或低精度计算</text>

  <path class="arrow" d="M266 150 C300 150 305 150 335 150"/>
  <path class="arrow" d="M585 156 C630 156 646 156 690 156"/>
  <path class="arrow" d="M585 214 C636 214 646 234 690 234"/>

  <rect class="payload" x="58" y="335" width="220" height="98"/>
  <text class="text" x="78" y="366">vector</text>
  <text class="small" x="78" y="394">float32 * d</text>
  <text class="small" x="78" y="418">pgvector IVFFlat 默认路径</text>

  <rect class="payload" x="410" y="335" width="220" height="98"/>
  <text class="text" x="430" y="366">halfvec</text>
  <text class="small" x="430" y="394">float16 * d</text>
  <text class="small" x="430" y="418">更小 payload，不是 INT8 SQ</text>

  <rect class="payload" x="762" y="420" width="220" height="72"/>
  <text class="text" x="782" y="450">bit</text>
  <text class="small" x="782" y="476">1 bit * d，Hamming 距离</text>

  <path class="arrow" d="M278 384 C335 384 350 384 410 384"/>
  <path class="arrow" d="M630 384 C690 390 718 430 762 450"/>
</svg>
