<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" role="img" aria-labelledby="title desc">
  <title id="title">IVF-SQ 构建与查询流程</title>
  <desc id="desc">对比严格 IVF-SQ 的构建和查询流程，以及 pgvector IVFFlat 低精度表达式索引的对应位置。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .ivf { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 8; }
    .sq { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .pg { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1060" height="560"/>
  <text class="text" x="34" y="40">构建：先训练粗中心，再决定桶内 payload 如何保存</text>

  <rect class="step" x="42" y="84" width="180" height="82"/>
  <text class="text" x="66" y="118">样本数据</text>
  <text class="small" x="66" y="146">embedding rows</text>

  <rect class="ivf" x="275" y="84" width="210" height="82"/>
  <text class="text" x="300" y="118">训练 IVF 中心</text>
  <text class="small" x="300" y="146">k-means / lists</text>

  <rect class="sq" x="540" y="84" width="210" height="82"/>
  <text class="text" x="565" y="118">训练 SQ 参数</text>
  <text class="small" x="565" y="146">min/max, scale, range</text>

  <rect class="step" x="805" y="84" width="210" height="82"/>
  <text class="text" x="830" y="118">写入倒排桶</text>
  <text class="small" x="830" y="146">list id + code/TID</text>

  <path class="arrow" d="M222 125 L275 125"/>
  <path class="arrow" d="M485 125 L540 125"/>
  <path class="arrow" d="M750 125 L805 125"/>

  <text class="text" x="34" y="235">查询：probes 控制看多少桶，SQ 控制桶内每条候选多大、多准</text>
  <rect class="step" x="42" y="278" width="180" height="82"/>
  <text class="text" x="66" y="312">query vector</text>
  <text class="small" x="66" y="340">保持 float 或转换表达式</text>

  <rect class="ivf" x="275" y="278" width="210" height="82"/>
  <text class="text" x="300" y="312">选择最近中心</text>
  <text class="small" x="300" y="340">probes / nprobe</text>

  <rect class="sq" x="540" y="278" width="210" height="82"/>
  <text class="text" x="565" y="312">扫描 SQ code</text>
  <text class="small" x="565" y="340">近似距离或解码距离</text>

  <rect class="step" x="805" y="278" width="210" height="82"/>
  <text class="text" x="830" y="312">候选 top-R</text>
  <text class="small" x="830" y="340">再回表/重排得到 top-K</text>

  <path class="arrow" d="M222 319 L275 319"/>
  <path class="arrow" d="M485 319 L540 319"/>
  <path class="arrow" d="M750 319 L805 319"/>

  <rect class="pg" x="160" y="425" width="735" height="86"/>
  <text class="text" x="188" y="458">pgvector 对应关系</text>
  <text class="small" x="188" y="486">IVF 中心与 list 由 ivfflat 实现；SQ 参数训练没有独立实现。可用 halfvec / bit payload 或 binary_quantize 表达式索引做低精度召回。</text>
  <path class="dash" d="M645 166 C645 204 645 236 645 278"/>
</svg>
