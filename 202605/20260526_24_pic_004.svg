<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">量化误差与重排</title>
  <desc id="desc">展示低精度索引召回候选后用原始向量重排，以降低量化误差对最终 top-k 的影响。</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .approx { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 6; }
    .exact { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 6; }
    .query { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
    .cand { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .miss { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="500"/>
  <text class="text" x="34" y="40">低精度索引通常负责召回，不应直接替代最终精确排序</text>

  <rect class="panel" x="42" y="78" width="395" height="330"/>
  <text class="text" x="66" y="112">阶段 1：IVF + 低精度 payload</text>
  <circle class="query" cx="112" cy="205" r="20"/>
  <text class="tiny" x="92" y="244">query</text>
  <circle class="cand" cx="210" cy="155" r="16"/>
  <circle class="cand" cx="266" cy="205" r="16"/>
  <circle class="cand" cx="328" cy="255" r="16"/>
  <circle class="miss" cx="230" cy="292" r="16"/>
  <line x1="112" y1="205" x2="210" y2="155" stroke="#c2410c" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="112" y1="205" x2="266" y2="205" stroke="#c2410c" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="112" y1="205" x2="328" y2="255" stroke="#c2410c" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="small" x="66" y="344">候选 top-R：按近似距离或低精度距离得到</text>
  <text class="tiny" x="66" y="372">红点可能因为未探测桶或量化误差被漏掉/排序靠后</text>

  <rect class="panel" x="545" y="78" width="395" height="330"/>
  <text class="text" x="569" y="112">阶段 2：原始向量重排</text>
  <rect class="exact" x="590" y="150" width="300" height="48"/>
  <text class="small" x="612" y="180">回表取 embedding，计算真实 L2/IP/cosine</text>
  <rect class="exact" x="590" y="225" width="300" height="48"/>
  <text class="small" x="612" y="255">ORDER BY 原始距离 LIMIT K</text>
  <rect class="exact" x="590" y="300" width="300" height="48"/>
  <text class="small" x="612" y="330">记录 recall@K、latency、buffers、index size</text>

  <path class="arrow" d="M437 240 C485 240 500 240 545 240"/>
  <text class="tiny" x="453" y="222">扩大 R</text>
  <text class="tiny" x="453" y="264">再精排</text>
</svg>
