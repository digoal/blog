<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">IVFFlat-SQ 选型决策流</title>
  <desc id="desc">给出在 pgvector 中选择 vector、halfvec、bit/binary_quantize、HNSW 或外部 IVF-SQ 的决策路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .node { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .good { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .stop { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 16px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 13px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="text" x="34" y="40">选型先问约束，不先问名字</text>

  <rect class="node" x="365" y="72" width="250" height="70"/>
  <text class="text" x="390" y="102">必须 100% 精确 top-K？</text>
  <text class="small" x="390" y="124">业务能否接受 ANN 召回误差</text>

  <rect class="stop" x="80" y="190" width="240" height="78"/>
  <text class="text" x="104" y="222">走精确扫描/精确索引基线</text>
  <text class="small" x="104" y="246">先用 EXPLAIN 验证成本</text>

  <rect class="node" x="365" y="190" width="250" height="78"/>
  <text class="text" x="390" y="222">pgvector 内完成？</text>
  <text class="small" x="390" y="246">需要 SQL、MVCC、VACUUM 一体化吗</text>

  <rect class="warn" x="680" y="190" width="240" height="78"/>
  <text class="text" x="704" y="222">考虑 Faiss IVF-SQ / 专用引擎</text>
  <text class="small" x="704" y="246">严格 INT8/4bit SQ 由引擎承担</text>

  <rect class="node" x="365" y="315" width="250" height="78"/>
  <text class="text" x="390" y="347">主要瓶颈是内存/带宽？</text>
  <text class="small" x="390" y="371">而不是过滤或写入漂移</text>

  <rect class="good" x="80" y="430" width="250" height="86"/>
  <text class="text" x="104" y="462">pgvector IVFFlat + vector</text>
  <text class="small" x="104" y="486">先调 lists/probes 建立基线</text>

  <rect class="good" x="365" y="430" width="250" height="86"/>
  <text class="text" x="390" y="462">IVFFlat + halfvec / bit</text>
  <text class="small" x="390" y="486">扩大 top-R 后原始向量重排</text>

  <rect class="warn" x="650" y="430" width="250" height="86"/>
  <text class="text" x="674" y="462">过滤/漂移强：重新建模</text>
  <text class="small" x="674" y="486">分区、局部索引、HNSW、重建窗口</text>

  <path class="arrow" d="M365 107 C310 110 260 158 220 190"/>
  <text class="label" x="272" y="136">是</text>
  <path class="arrow" d="M490 142 L490 190"/>
  <text class="label" x="502" y="168">否</text>
  <path class="arrow" d="M615 229 L680 229"/>
  <text class="label" x="636" y="218">否</text>
  <path class="arrow" d="M490 268 L490 315"/>
  <text class="label" x="502" y="294">是</text>
  <path class="arrow" d="M365 354 C300 360 250 405 205 430"/>
  <text class="label" x="282" y="385">否</text>
  <path class="arrow" d="M490 393 L490 430"/>
  <text class="label" x="502" y="416">是</text>
  <path class="arrow" d="M615 354 C665 370 700 402 748 430"/>
  <text class="label" x="668" y="386">过滤/漂移强</text>
</svg>
