<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">pgvectorscale DiskANN 访问方法总体结构</title>
  <desc id="desc">展示 SQL 查询、PostgreSQL index access method、StreamingDiskANN 图、存储布局、Heap 可见性之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1060" height="600" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="550" y="58" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">StreamingDiskANN 在 PostgreSQL 里的位置</text>

  <rect x="70" y="105" width="260" height="112" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="200" y="145" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">SQL 层</text>
  <text x="200" y="177" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">ORDER BY embedding &lt;=&gt; $q</text>
  <text x="200" y="199" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">可选 labels &amp;&amp; smallint[]</text>

  <rect x="420" y="105" width="260" height="112" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="550" y="144" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">Index AM</text>
  <text x="550" y="176" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">ambuild / aminsert</text>
  <text x="550" y="198" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">ambeginscan / amgettuple / VACUUM</text>

  <rect x="770" y="105" width="260" height="112" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="900" y="144" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">MetaPage</text>
  <text x="900" y="176" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">维度、距离类型、R、L、alpha</text>
  <text x="900" y="198" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">start node 与量化元数据指针</text>

  <rect x="90" y="300" width="290" height="190" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="235" y="336" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">图结构</text>
  <circle cx="170" cy="392" r="22" fill="#bfdbfe" stroke="#2563eb"/>
  <circle cx="260" cy="370" r="22" fill="#bbf7d0" stroke="#16a34a"/>
  <circle cx="300" cy="440" r="22" fill="#fde68a" stroke="#ca8a04"/>
  <circle cx="190" cy="455" r="22" fill="#fecaca" stroke="#dc2626"/>
  <path d="M190 386 L238 375" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M276 389 L292 418" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M280 444 L214 454" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M184 432 L170 416" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="235" y="520" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">每个节点保存邻居 IndexPointer</text>

  <rect x="435" y="300" width="260" height="190" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="565" y="336" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">节点存储</text>
  <rect x="472" y="365" width="186" height="36" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="565" y="389" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">heap TID</text>
  <rect x="472" y="410" width="186" height="36" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="565" y="434" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">plain vector 或 SBQ code</text>
  <rect x="472" y="455" width="186" height="36" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="565" y="479" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">labels 与邻居列表</text>

  <rect x="760" y="300" width="260" height="190" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="890" y="336" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">Heap 表</text>
  <rect x="800" y="365" width="180" height="36" rx="4" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="890" y="389" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">原始行与 MVCC</text>
  <rect x="800" y="410" width="180" height="36" rx="4" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="890" y="434" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">完整向量可用于重排</text>
  <rect x="800" y="455" width="180" height="36" rx="4" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="890" y="479" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">可见性由执行器复核</text>

  <path d="M330 160 L420 160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M680 160 L770 160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M550 218 L550 290" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M435 395 L390 395" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M695 395 L760 395" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="550" y="575" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">关键点：索引节点不是普通行副本，而是“图邻居 + 压缩/原始向量 + Heap TID”的访问路径。</text>
</svg>
