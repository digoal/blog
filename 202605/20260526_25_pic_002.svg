<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">Vamana 风格的候选生成与 RobustPrune</title>
  <desc id="desc">展示从 start node 做 greedy search，收集访问过的候选，再用 alpha 与度上限 R 剪枝邻居。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1060" height="640" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="550" y="58" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">从“找到候选”到“保留少量好边”</text>

  <rect x="70" y="110" width="300" height="430" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="220" y="146" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">1. GreedySearch</text>
  <circle cx="150" cy="245" r="25" fill="#bfdbfe" stroke="#2563eb"/>
  <text x="150" y="252" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">s</text>
  <circle cx="235" cy="210" r="25" fill="#e2e8f0" stroke="#64748b"/>
  <circle cx="295" cy="290" r="25" fill="#e2e8f0" stroke="#64748b"/>
  <circle cx="210" cy="345" r="25" fill="#e2e8f0" stroke="#64748b"/>
  <circle cx="305" cy="410" r="25" fill="#fecaca" stroke="#dc2626"/>
  <text x="305" y="417" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">q?</text>
  <path d="M173 235 L211 219" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M251 231 L279 268" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M280 307 L229 332" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M231 363 L284 396" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="220" y="485" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">访问 search_list_size 个近候选</text>
  <text x="220" y="510" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">V = visited nodes</text>

  <rect x="430" y="110" width="300" height="430" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="580" y="146" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">2. 候选集合</text>
  <rect x="475" y="190" width="210" height="52" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="580" y="224" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">V ∪ old_neighbors - self</text>
  <rect x="475" y="280" width="210" height="52" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="580" y="313" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">按 distance(p, x) 排序</text>
  <rect x="475" y="370" width="210" height="52" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="580" y="403" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">逐步扩大 alpha</text>
  <path d="M580 242 L580 278" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M580 332 L580 368" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="580" y="485" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">目标：少量但方向分散的边</text>
  <text x="580" y="510" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">避免全连边导致空间和 I/O 爆炸</text>

  <rect x="790" y="110" width="240" height="430" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="910" y="146" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#0f172a">3. RobustPrune</text>
  <circle cx="910" cy="285" r="28" fill="#fecaca" stroke="#dc2626"/>
  <text x="910" y="292" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">p</text>
  <circle cx="848" cy="210" r="18" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="974" cy="205" r="18" fill="#dcfce7" stroke="#16a34a"/>
  <circle cx="835" cy="360" r="18" fill="#fef3c7" stroke="#d97706"/>
  <circle cx="990" cy="375" r="18" fill="#e2e8f0" stroke="#64748b"/>
  <circle cx="925" cy="460" r="18" fill="#e2e8f0" stroke="#64748b"/>
  <path d="M895 261 L860 226" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M927 262 L963 221" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M892 308 L849 346" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M934 309 L975 361" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M912 313 L923 442" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="910" y="485" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">保留 &lt;= R 条出边</text>
  <text x="910" y="510" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">被覆盖的近似重复方向丢弃</text>

  <path d="M370 325 L430 325" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M730 325 L790 325" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="550" y="610" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">pgvectorscale 的 `search_list_size` 对应候选宽度，`num_neighbors` 对应 R，`max_alpha` 对应剪枝强度。</text>
</svg>
