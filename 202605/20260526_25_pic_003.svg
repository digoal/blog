<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">plain 与 memory_optimized 存储布局对比</title>
  <desc id="desc">对比 pgvectorscale plain 节点和 SBQ memory_optimized 节点保存的内容，以及它们与 Heap 的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1060" height="600" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="550" y="58" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">节点里到底存什么？</text>

  <rect x="70" y="105" width="430" height="430" rx="8" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
  <text x="285" y="142" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#0f172a">storage_layout = plain</text>
  <rect x="120" y="185" width="330" height="54" rx="5" fill="#dbeafe" stroke="#2563eb"/>
  <text x="285" y="219" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">heap_item_pointer</text>
  <rect x="120" y="255" width="330" height="54" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="285" y="289" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">vector: Vec&lt;f32&gt;</text>
  <rect x="120" y="325" width="330" height="54" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="285" y="359" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">neighbor_index_pointers[R]</text>
  <rect x="120" y="395" width="330" height="54" rx="5" fill="#fee2e2" stroke="#dc2626"/>
  <text x="285" y="429" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">高维上限较低，IP 不支持</text>
  <text x="285" y="492" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">适合验证、低维、希望少一层量化误差</text>

  <rect x="600" y="105" width="430" height="430" rx="8" fill="#f8fafc" stroke="#16a34a" stroke-width="2"/>
  <text x="815" y="142" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#0f172a">storage_layout = memory_optimized</text>
  <rect x="650" y="185" width="330" height="54" rx="5" fill="#dbeafe" stroke="#2563eb"/>
  <text x="815" y="219" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">heap_item_pointer</text>
  <rect x="650" y="255" width="330" height="54" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="815" y="289" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">bq_vector: Vec&lt;u64&gt;</text>
  <rect x="650" y="325" width="330" height="54" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="815" y="359" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">neighbor_index_pointers[R]</text>
  <rect x="650" y="395" width="330" height="54" rx="5" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="815" y="429" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">可选 labels: smallint[]</text>
  <text x="815" y="492" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">默认布局，先用 SBQ 近似距离，再用 Heap 向量重排</text>

  <rect x="400" y="555" width="300" height="48" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="550" y="585" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">完整向量仍在 Heap 表行中</text>
  <path d="M350 535 L462 555" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M750 535 L638 555" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
