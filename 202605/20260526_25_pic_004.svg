<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">查询、重排与删除标记路径</title>
  <desc id="desc">展示 pgvectorscale DiskANN 查询从图遍历到候选消费、精确重排和 VACUUM 删除标记的路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1060" height="640" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="550" y="58" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">读路径和清理路径是两条线</text>

  <rect x="70" y="110" width="960" height="250" rx="8" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="145" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#0f172a">查询路径</text>
  <rect x="115" y="195" width="165" height="64" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="198" y="222" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">amrescan</text>
  <text x="198" y="244" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">解析 query / labels</text>
  <rect x="340" y="195" width="165" height="64" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="423" y="222" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">streaming init</text>
  <text x="423" y="244" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">start node + L</text>
  <rect x="565" y="195" width="165" height="64" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="648" y="222" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">greedy iterate</text>
  <text x="648" y="244" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">扩展邻居</text>
  <rect x="790" y="195" width="165" height="64" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="873" y="222" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">amgettuple</text>
  <text x="873" y="244" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">返回 Heap TID</text>
  <path d="M280 227 L340 227" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M505 227 L565 227" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M730 227 L790 227" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="410" y="290" width="280" height="45" rx="6" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="550" y="319" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">query_rescore &gt; 0 时读取完整向量精确重排</text>

  <rect x="70" y="410" width="960" height="170" rx="8" fill="#f8fafc" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="445" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#0f172a">VACUUM / 删除路径</text>
  <rect x="130" y="485" width="190" height="54" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="225" y="519" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">ambulkdelete 扫索引页</text>
  <rect x="450" y="485" width="190" height="54" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="545" y="519" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">callback 判断 Heap TID</text>
  <rect x="770" y="485" width="190" height="54" rx="6" fill="#e2e8f0" stroke="#64748b"/>
  <text x="865" y="519" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">标记 InvalidOffsetNumber</text>
  <path d="M320 512 L450 512" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M640 512 L770 512" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="550" y="625" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#334155">删除不是立即重连全图；查询消费候选时跳过已标记节点，空间与图质量需要通过维护策略观察。</text>
</svg>
