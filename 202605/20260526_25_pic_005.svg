<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">DiskANN 参数调优的收益与代价</title>
  <desc id="desc">展示 num_neighbors、search_list_size、max_alpha、query_search_list_size、query_rescore 与召回、延迟、构建、空间之间的关系。</desc>
  <rect x="20" y="20" width="1060" height="600" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="550" y="58" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">调参不是越大越好，而是把代价放到哪里</text>

  <line x1="150" y1="500" x2="950" y2="500" stroke="#334155" stroke-width="2"/>
  <line x1="150" y1="500" x2="150" y2="130" stroke="#334155" stroke-width="2"/>
  <text x="550" y="545" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">参数变大</text>
  <text x="90" y="315" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155" transform="rotate(-90 90 315)">收益 / 代价</text>

  <path d="M170 455 C300 340 430 270 560 235 C700 198 830 185 930 180" fill="none" stroke="#16a34a" stroke-width="4"/>
  <text x="790" y="168" font-size="17" font-family="Arial, sans-serif" fill="#166534">召回率：边际收益递减</text>

  <path d="M170 470 C300 420 430 360 560 300 C700 230 830 165 930 120" fill="none" stroke="#dc2626" stroke-width="4"/>
  <text x="760" y="118" font-size="17" font-family="Arial, sans-serif" fill="#991b1b">构建/查询延迟：持续上升</text>

  <path d="M170 485 C330 455 485 400 635 315 C770 240 860 190 930 150" fill="none" stroke="#d97706" stroke-width="4" stroke-dasharray="8 6"/>
  <text x="680" y="285" font-size="17" font-family="Arial, sans-serif" fill="#92400e">空间：主要受 R 与布局影响</text>

  <rect x="210" y="110" width="190" height="92" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="305" y="140" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">num_neighbors</text>
  <text x="305" y="166" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">边更多，图更密</text>
  <text x="305" y="186" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">空间和访问更多</text>

  <rect x="455" y="110" width="190" height="92" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="550" y="140" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">search_list_size</text>
  <text x="550" y="166" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">建图候选更宽</text>
  <text x="550" y="186" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">构建更慢</text>

  <rect x="700" y="110" width="190" height="92" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="795" y="140" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">query_rescore</text>
  <text x="795" y="166" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">完整向量重排</text>
  <text x="795" y="186" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">更准但读 Heap</text>

  <text x="550" y="590" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#334155">工程建议：先固定 build 参数，用 query_search_list_size 和 query_rescore 做每类查询的召回-延迟曲线。</text>
</svg>
