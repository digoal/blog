<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">VectorChord vchordrq 索引结构</title>
  <desc id="desc">展示 PostgreSQL 表、vchordrq 元信息页、层级聚类中心、叶子列表、压缩向量与重排数据之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="56" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">vchordrq: IVF 分区 + RaBitQ 估算 + 精确重排</text>

  <rect x="60" y="110" width="210" height="350" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="165" y="140" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#075985">PostgreSQL Heap</text>
  <rect x="85" y="170" width="160" height="52" rx="4" fill="#ffffff" stroke="#38bdf8"/>
  <text x="165" y="202" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">ctid + vector</text>
  <rect x="85" y="245" width="160" height="52" rx="4" fill="#ffffff" stroke="#38bdf8"/>
  <text x="165" y="277" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">WHERE 过滤列</text>
  <rect x="85" y="320" width="160" height="52" rx="4" fill="#ffffff" stroke="#38bdf8"/>
  <text x="165" y="352" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">MVCC 可见性</text>

  <rect x="350" y="95" width="250" height="85" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="475" y="126" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#92400e">MetaTuple: dim / height / cells</text>
  <text x="475" y="154" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#92400e">root centroid + vectors_first + freepages</text>

  <rect x="335" y="230" width="280" height="150" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="475" y="260" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#166534">层级空间分区</text>
  <circle cx="400" cy="315" r="24" fill="#ffffff" stroke="#22c55e"/>
  <circle cx="475" cy="315" r="24" fill="#ffffff" stroke="#22c55e"/>
  <circle cx="550" cy="315" r="24" fill="#ffffff" stroke="#22c55e"/>
  <text x="400" y="321" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">cell</text>
  <text x="475" y="321" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">cell</text>
  <text x="550" y="321" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">cell</text>
  <text x="475" y="357" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">build.internal.lists 决定层数与叶子数</text>

  <rect x="700" y="110" width="210" height="350" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="805" y="140" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#5b21b6">叶子列表</text>
  <rect x="725" y="170" width="160" height="52" rx="4" fill="#ffffff" stroke="#a78bfa"/>
  <text x="805" y="202" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">FrozenTuple</text>
  <rect x="725" y="245" width="160" height="52" rx="4" fill="#ffffff" stroke="#a78bfa"/>
  <text x="805" y="277" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">AppendableTuple</text>
  <rect x="725" y="320" width="160" height="52" rx="4" fill="#ffffff" stroke="#a78bfa"/>
  <text x="805" y="352" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">payload(ctid) + code</text>
  <rect x="725" y="395" width="160" height="42" rx="4" fill="#ffffff" stroke="#a78bfa"/>
  <text x="805" y="421" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">rerank 向量</text>

  <line x1="270" y1="196" x2="350" y2="138" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="138" x2="700" y2="196" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="305" x2="700" y2="270" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="805" y1="395" x2="270" y2="346" stroke="#334155" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="505" y="425" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">rerank_in_table=true 时，精确重排从 heap 取原向量</text>
</svg>
