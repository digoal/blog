<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">vchordrq 构建流程</title>
  <desc id="desc">展示采样、K-means 分区、中心点旋转、索引结构初始化、并行插入和压缩整理的构建路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">CREATE INDEX USING vchordrq 的两段成本</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="60" y="120" width="130" height="80" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="125" y="150" text-anchor="middle" fill="#075985">Heap 扫描</text>
    <text x="125" y="178" text-anchor="middle" fill="#075985">采样向量</text>

    <rect x="245" y="120" width="150" height="80" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="320" y="150" text-anchor="middle" fill="#166534">K-means</text>
    <text x="320" y="178" text-anchor="middle" fill="#166534">生成 lists</text>

    <rect x="450" y="120" width="150" height="80" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="525" y="150" text-anchor="middle" fill="#92400e">中心点旋转</text>
    <text x="525" y="178" text-anchor="middle" fill="#92400e">RaBitQ 友好</text>

    <rect x="655" y="120" width="150" height="80" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="730" y="150" text-anchor="middle" fill="#5b21b6">初始化页</text>
    <text x="730" y="178" text-anchor="middle" fill="#5b21b6">Meta/centroid/list</text>

    <rect x="820" y="310" width="110" height="80" rx="6" fill="#fee2e2" stroke="#dc2626"/>
    <text x="875" y="340" text-anchor="middle" fill="#991b1b">Compaction</text>
    <text x="875" y="368" text-anchor="middle" fill="#991b1b">整理页空间</text>

    <rect x="575" y="310" width="150" height="80" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="650" y="340" text-anchor="middle" fill="#5b21b6">并行/串行插入</text>
    <text x="650" y="368" text-anchor="middle" fill="#5b21b6">选择叶子列表</text>

    <rect x="335" y="310" width="150" height="80" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="410" y="340" text-anchor="middle" fill="#92400e">RaBitQ code</text>
    <text x="410" y="368" text-anchor="middle" fill="#92400e">rough + err</text>

    <rect x="105" y="310" width="150" height="80" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="180" y="340" text-anchor="middle" fill="#075985">payload</text>
    <text x="180" y="368" text-anchor="middle" fill="#075985">ctid + extra</text>
  </g>

  <line x1="190" y1="160" x2="245" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="395" y1="160" x2="450" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="160" x2="655" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M730 200 L730 255 L650 255 L650 310" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="575" y1="350" x2="485" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="335" y1="350" x2="255" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M725 350 L820 350" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="320" y="245" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">分区阶段通常消耗构建时间和内存</text>
  <text x="640" y="430" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">插入阶段受 PostgreSQL 并行建索引、I/O 和 list 分布影响</text>
</svg>
