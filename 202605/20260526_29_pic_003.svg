<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">RaBitQ 下界与重排</title>
  <desc id="desc">展示压缩 code 给出粗略距离和误差界，VectorChord 用下界筛候选，再用原向量重排。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">为什么 vchordrq 不是只靠压缩距离排序</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="125" width="180" height="90" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="160" y="160" text-anchor="middle" font-size="16" fill="#075985">原始向量 x</text>
    <text x="160" y="188" text-anchor="middle" font-size="14" fill="#075985">float32 / halfvec</text>

    <rect x="330" y="125" width="180" height="90" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="420" y="160" text-anchor="middle" font-size="16" fill="#92400e">RaBitQ code</text>
    <text x="420" y="188" text-anchor="middle" font-size="14" fill="#92400e">sign bits + metadata</text>

    <rect x="590" y="125" width="180" height="90" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="680" y="160" text-anchor="middle" font-size="16" fill="#166534">估算距离</text>
    <text x="680" y="188" text-anchor="middle" font-size="14" fill="#166534">rough 与 err</text>

    <rect x="330" y="315" width="180" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="420" y="350" text-anchor="middle" font-size="16" fill="#5b21b6">候选下界</text>
    <text x="420" y="378" text-anchor="middle" font-size="14" fill="#5b21b6">rough - err * epsilon</text>

    <rect x="590" y="315" width="180" height="90" rx="6" fill="#fee2e2" stroke="#dc2626"/>
    <text x="680" y="350" text-anchor="middle" font-size="16" fill="#991b1b">精确距离</text>
    <text x="680" y="378" text-anchor="middle" font-size="14" fill="#991b1b">读取原向量重排</text>
  </g>

  <line x1="250" y1="170" x2="330" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="170" x2="590" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M680 215 L680 265 L420 265 L420 315" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="360" x2="590" y2="360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M160 215 L160 450 L680 450 L680 405" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow)"/>

  <text x="490" y="472" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">压缩 code 用来少读、快估、排候选；最终排序仍依赖 rerank_index 或 rerank_heap。</text>
</svg>
