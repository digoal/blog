<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">vchordrq 查询流程</title>
  <desc id="desc">展示 query 进入 PostgreSQL index scan 后，经过层级 cell 搜索、RaBitQ 下界排序、候选重排和返回 CTID 的流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">ORDER BY embedding &lt;-&gt; query LIMIT k 的执行路径</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="110" width="180" height="90" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="150" y="145" text-anchor="middle" font-size="16" fill="#075985">amrescan</text>
    <text x="150" y="175" text-anchor="middle" font-size="14" fill="#075985">读取 orderby / WHERE / GUC</text>

    <rect x="300" y="110" width="180" height="90" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="390" y="145" text-anchor="middle" font-size="16" fill="#166534">层级探测</text>
    <text x="390" y="175" text-anchor="middle" font-size="14" fill="#166534">probes 选择 cell</text>

    <rect x="540" y="110" width="180" height="90" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="630" y="145" text-anchor="middle" font-size="16" fill="#92400e">RaBitQ 快扫</text>
    <text x="630" y="175" text-anchor="middle" font-size="14" fill="#92400e">rough - err * epsilon</text>

    <rect x="780" y="110" width="140" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="850" y="145" text-anchor="middle" font-size="16" fill="#5b21b6">候选堆</text>
    <text x="850" y="175" text-anchor="middle" font-size="14" fill="#5b21b6">按下界出队</text>

    <rect x="175" y="315" width="190" height="95" rx="6" fill="#ffffff" stroke="#64748b"/>
    <text x="270" y="350" text-anchor="middle" font-size="16" fill="#334155">精确重排</text>
    <text x="270" y="378" text-anchor="middle" font-size="14" fill="#334155">index 或 heap 读取原向量</text>

    <rect x="430" y="315" width="190" height="95" rx="6" fill="#ffffff" stroke="#64748b"/>
    <text x="525" y="350" text-anchor="middle" font-size="16" fill="#334155">prefilter 可选</text>
    <text x="525" y="378" text-anchor="middle" font-size="14" fill="#334155">严格且便宜的过滤才值得</text>

    <rect x="685" y="315" width="190" height="95" rx="6" fill="#ffffff" stroke="#64748b"/>
    <text x="780" y="350" text-anchor="middle" font-size="16" fill="#334155">amgettuple</text>
    <text x="780" y="378" text-anchor="middle" font-size="14" fill="#334155">返回 CTID 给 PostgreSQL</text>
  </g>

  <line x1="240" y1="155" x2="300" y2="155" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="155" x2="540" y2="155" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="155" x2="780" y2="155" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M850 200 L850 255 L270 255 L270 315" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="365" y1="362" x2="430" y2="362" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="362" x2="685" y2="362" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="490" y="485" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">epsilon 越大，下界越保守，召回倾向更好但要重排更多候选；probes 越多，访问更多 cell。</text>
</svg>
