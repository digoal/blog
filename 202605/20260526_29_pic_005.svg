<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">vchordrq 调参边界</title>
  <desc id="desc">展示 lists、probes、epsilon、rerank_in_table、prefilter 在召回、延迟、空间和构建成本上的取舍。</desc>
  <rect x="20" y="20" width="940" height="480" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">调参不是越大越好：每个旋钮移动的代价不同</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="80" y="115" width="190" height="100" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="175" y="148" text-anchor="middle" fill="#166534">lists 增大</text>
    <text x="175" y="178" text-anchor="middle" fill="#166534">叶子更细，构建更贵</text>
    <text x="175" y="202" text-anchor="middle" fill="#166534">probes 形状必须匹配</text>

    <rect x="300" y="115" width="190" height="100" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="395" y="148" text-anchor="middle" fill="#92400e">probes 增大</text>
    <text x="395" y="178" text-anchor="middle" fill="#92400e">召回倾向提高</text>
    <text x="395" y="202" text-anchor="middle" fill="#92400e">扫描 cell 与 I/O 增加</text>

    <rect x="520" y="115" width="190" height="100" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="615" y="148" text-anchor="middle" fill="#075985">epsilon 增大</text>
    <text x="615" y="178" text-anchor="middle" fill="#075985">下界更保守</text>
    <text x="615" y="202" text-anchor="middle" fill="#075985">重排候选更多</text>

    <rect x="740" y="115" width="160" height="100" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="820" y="148" text-anchor="middle" fill="#5b21b6">prefilter</text>
    <text x="820" y="178" text-anchor="middle" fill="#5b21b6">过滤严格才收益</text>
    <text x="820" y="202" text-anchor="middle" fill="#5b21b6">过滤昂贵会反噬</text>

    <rect x="190" y="315" width="260" height="105" rx="6" fill="#ffffff" stroke="#64748b"/>
    <text x="320" y="350" text-anchor="middle" fill="#334155">rerank_in_table=false</text>
    <text x="320" y="380" text-anchor="middle" fill="#334155">索引存重排向量，空间更大</text>
    <text x="320" y="405" text-anchor="middle" fill="#334155">查询通常更快</text>

    <rect x="530" y="315" width="260" height="105" rx="6" fill="#ffffff" stroke="#64748b"/>
    <text x="660" y="350" text-anchor="middle" fill="#334155">rerank_in_table=true</text>
    <text x="660" y="380" text-anchor="middle" fill="#334155">索引少存向量，空间更省</text>
    <text x="660" y="405" text-anchor="middle" fill="#334155">查询要回表，延迟更高</text>
  </g>

  <line x1="80" y1="270" x2="900" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="258" font-size="14" font-family="Arial, sans-serif" fill="#475569">更偏性能</text>
  <text x="832" y="258" font-size="14" font-family="Arial, sans-serif" fill="#475569">更偏召回/空间</text>
</svg>
