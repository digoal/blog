<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">VectorChord-bm25 总体架构</title>
  <desc id="desc">展示 SQL 层、PostgreSQL Index AM、BM25 核心算法、压缩倒排存储和维护路径的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fbfd;stroke:#345;stroke-width:1.6;rx:8}
    .core{fill:#eef7f0;stroke:#2f6844;stroke-width:1.6;rx:8}
    .store{fill:#fff6e8;stroke:#8a5a19;stroke-width:1.6;rx:8}
    .pg{fill:#f1f4ff;stroke:#3b4b8f;stroke-width:1.6;rx:8}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#1f2d3d}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#2f4050}
    .arrow{stroke:#34495e;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="36" y="36" width="908" height="448" fill="#ffffff" stroke="#d4dae2"/>
  <rect class="box" x="76" y="80" width="210" height="112"/>
  <text class="text" x="104" y="118">SQL 接口</text>
  <text class="small" x="104" y="150">tsvector</text>
  <text class="small" x="104" y="174">&lt;&amp;&gt; / to_bm25query()</text>
  <rect class="pg" x="386" y="70" width="230" height="132"/>
  <text class="text" x="423" y="108">PostgreSQL Index AM</text>
  <text class="small" x="423" y="140">ambuild / aminsert</text>
  <text class="small" x="423" y="164">ambeginscan / amgettuple</text>
  <text class="small" x="423" y="188">ambulkdelete / vacuumcleanup</text>
  <rect class="core" x="704" y="80" width="190" height="112"/>
  <text class="text" x="737" y="118">BM25 查询核心</text>
  <text class="small" x="737" y="150">Block-WAND</text>
  <text class="small" x="737" y="174">Top-K 阈值剪枝</text>
  <rect class="store" x="90" y="312" width="220" height="112"/>
  <text class="text" x="120" y="350">构建临时段</text>
  <text class="small" x="120" y="382">records: doc length + CTID</text>
  <text class="small" x="120" y="406">mappings: token -> doc, tf</text>
  <rect class="store" x="388" y="296" width="226" height="144"/>
  <text class="text" x="416" y="334">索引物理结构</text>
  <text class="small" x="416" y="366">MetaTuple / JumpTuple</text>
  <text class="small" x="416" y="390">DocumentTuple / TokenTuple</text>
  <text class="small" x="416" y="414">SummaryTuple / BlockTuple</text>
  <rect class="store" x="706" y="312" width="190" height="112"/>
  <text class="text" x="736" y="350">增量与维护</text>
  <text class="small" x="736" y="382">ptr_vectors 追加区</text>
  <text class="small" x="736" y="406">VACUUM 标记并重写</text>
  <path class="arrow" d="M286 136 H378"/>
  <path class="arrow" d="M616 136 H696"/>
  <path class="arrow" d="M500 204 V286"/>
  <path class="arrow" d="M310 368 H380"/>
  <path class="arrow" d="M614 368 H698"/>
  <path class="arrow" d="M790 312 C780 250,720 226,628 206"/>
  <path class="arrow" d="M196 312 C220 244,300 210,386 176"/>
  <text class="small" x="314" y="116">ORDER BY rank LIMIT k</text>
  <text class="small" x="632" y="116">读取倒排 + 回 CTID</text>
  <text class="small" x="194" y="260">CREATE INDEX 扫 heap</text>
  <text class="small" x="636" y="262">INSERT/UPDATE/DELETE 生命周期</text>
</svg>
