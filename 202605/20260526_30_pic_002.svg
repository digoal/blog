<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">构建、插入与维护流程</title>
  <desc id="desc">展示 CREATE INDEX、INSERT、VACUUM 三条路径如何写入或重写 VectorChord-bm25 索引。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .step{fill:#f7fbff;stroke:#37506b;stroke-width:1.5;rx:8}
    .temp{fill:#fff7e8;stroke:#8a5a19;stroke-width:1.5;rx:8}
    .maint{fill:#eef8f0;stroke:#2f6844;stroke-width:1.5;rx:8}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#1f2d3d}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#2f4050}
    .arrow{stroke:#34495e;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="30" y="30" width="980" height="458" fill="#ffffff" stroke="#d6dbe3"/>
  <rect class="step" x="64" y="72" width="170" height="82"/>
  <text class="text" x="94" y="104">扫 heap</text>
  <text class="small" x="88" y="132">FormIndexDatum</text>
  <rect class="temp" x="300" y="72" width="188" height="82"/>
  <text class="text" x="328" y="104">写临时文件</text>
  <text class="small" x="326" y="132">records + mappings</text>
  <rect class="temp" x="552" y="72" width="180" height="82"/>
  <text class="text" x="588" y="104">外部归并</text>
  <text class="small" x="584" y="132">按 token, doc 排序</text>
  <rect class="step" x="798" y="72" width="166" height="82"/>
  <text class="text" x="830" y="104">flush 成页</text>
  <text class="small" x="824" y="132">doc/token/summary/block</text>
  <path class="arrow" d="M234 113 H292"/>
  <path class="arrow" d="M488 113 H544"/>
  <path class="arrow" d="M732 113 H790"/>
  <text class="small" x="64" y="48">CREATE INDEX</text>
  <rect class="step" x="64" y="228" width="170" height="82"/>
  <text class="text" x="94" y="260">INSERT/UPDATE</text>
  <text class="small" x="88" y="288">tsvector -> Document</text>
  <rect class="maint" x="300" y="228" width="188" height="82"/>
  <text class="text" x="334" y="260">追加向量</text>
  <text class="small" x="326" y="288">VectorTuple 链表</text>
  <path class="arrow" d="M234 269 H292"/>
  <text class="small" x="64" y="204">DML 增量路径</text>
  <rect class="step" x="64" y="382" width="170" height="82"/>
  <text class="text" x="94" y="414">bulkdelete</text>
  <text class="small" x="88" y="442">按 CTID 标记 deleted</text>
  <rect class="maint" x="300" y="382" width="188" height="82"/>
  <text class="text" x="334" y="414">maintain</text>
  <text class="small" x="326" y="442">重编号 + 重建倒排</text>
  <rect class="maint" x="552" y="382" width="180" height="82"/>
  <text class="text" x="590" y="414">回收旧页</text>
  <text class="small" x="584" y="442">free + vacuum</text>
  <path class="arrow" d="M234 423 H292"/>
  <path class="arrow" d="M488 423 H544"/>
  <path class="arrow" d="M642 382 V162"/>
  <path class="arrow" d="M488 269 C620 268,690 210,806 154"/>
  <text class="small" x="64" y="358">VACUUM 生命周期</text>
  <text class="small" x="742" y="250">追加区先参与查询；维护后并入压缩倒排。</text>
</svg>
