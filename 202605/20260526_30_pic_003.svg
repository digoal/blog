<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">VectorChord-bm25 物理布局</title>
  <desc id="desc">展示元信息页、跳转页、文档表、词项表、summary/block 倒排链和追加向量区。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#445"/>
    </marker>
  </defs>
  <style>
    .page{fill:#f7f9fc;stroke:#29384a;stroke-width:1.5;rx:6}
    .tuple{fill:#ffffff;stroke:#7d8aa0;stroke-width:1;rx:4}
    .post{fill:#fff5e8;stroke:#9b651e;stroke-width:1.3;rx:6}
    .append{fill:#eef8f0;stroke:#34754a;stroke-width:1.3;rx:6}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#1f2d3d}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#2f4050}
    .arrow{stroke:#445;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="30" y="28" width="980" height="504" fill="#ffffff" stroke="#d6dbe3"/>
  <rect class="page" x="70" y="68" width="180" height="120"/>
  <text class="text" x="104" y="100">Page 0</text>
  <rect class="tuple" x="92" y="118" width="136" height="48"/>
  <text class="small" x="110" y="148">MetaTuple</text>
  <text class="small" x="72" y="212">k1, b, seed, ptr_jump, ptr_lock</text>
  <rect class="page" x="354" y="68" width="214" height="134"/>
  <text class="text" x="400" y="100">JumpTuple</text>
  <text class="small" x="382" y="130">N, sum(dl), address roots</text>
  <text class="small" x="382" y="154">ptr_documents / ptr_tokens</text>
  <text class="small" x="382" y="178">ptr_summaries / ptr_blocks</text>
  <rect class="page" x="672" y="68" width="220" height="134"/>
  <text class="text" x="714" y="100">追加向量区</text>
  <text class="small" x="704" y="130">VectorTuple::_2 fieldnorm</text>
  <text class="small" x="704" y="154">VectorTuple::_1 elements</text>
  <text class="small" x="704" y="178">VectorTuple::_0 CTID + deleted</text>
  <rect class="page" x="78" y="314" width="204" height="128"/>
  <text class="text" x="122" y="346">DocumentTuple</text>
  <text class="small" x="110" y="378">doc_id -> fieldnorm</text>
  <text class="small" x="110" y="402">doc_id -> CTID payload</text>
  <text class="small" x="110" y="426">deleted 标记</text>
  <rect class="page" x="358" y="300" width="222" height="156"/>
  <text class="text" x="410" y="332">TokenTuple</text>
  <text class="small" x="390" y="362">token_id: [u8; 16]</text>
  <text class="small" x="390" y="386">df, token upper bound</text>
  <text class="small" x="390" y="410">wptr_summaries</text>
  <text class="small" x="390" y="434">address_tokens 查找入口</text>
  <rect class="post" x="682" y="282" width="250" height="194"/>
  <text class="text" x="714" y="318">Posting Blocks</text>
  <rect class="tuple" x="714" y="340" width="176" height="44"/>
  <text class="small" x="730" y="368">SummaryTuple: min/max docid</text>
  <rect class="tuple" x="714" y="396" width="176" height="50"/>
  <text class="small" x="730" y="424">BlockTuple: docids + tfs</text>
  <text class="small" x="714" y="468">每块最多 128 个 posting</text>
  <path class="arrow" d="M250 128 H346"/>
  <path class="arrow" d="M568 132 H664"/>
  <path class="arrow" d="M454 202 C410 248,314 294,284 344"/>
  <path class="arrow" d="M502 202 C520 240,534 272,548 300"/>
  <path class="arrow" d="M580 378 H674"/>
  <path class="arrow" d="M782 202 V274"/>
  <text class="small" x="604" y="258">VACUUM maintain 后把追加区合并回倒排结构</text>
  <text class="small" x="80" y="490">内部 doc_id 是连续编号；CTID 被编码为 [block_hi, block_lo, offset] 三个 u16。</text>
</svg>
