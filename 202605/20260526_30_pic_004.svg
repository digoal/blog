<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Block-WAND 查询流程</title>
  <desc id="desc">展示查询词项游标、token upper bound、block upper bound、Top-K 阈值与精确打分之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .term{fill:#f7fbff;stroke:#37506b;stroke-width:1.4;rx:7}
    .block{fill:#fff7e8;stroke:#8a5a19;stroke-width:1.3;rx:6}
    .score{fill:#eef8f0;stroke:#2f6844;stroke-width:1.4;rx:7}
    .skip{fill:#fbeeee;stroke:#9a3d3d;stroke-width:1.3;rx:7}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#1f2d3d}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#2f4050}
    .arrow{stroke:#34495e;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="30" y="30" width="980" height="500" fill="#ffffff" stroke="#d6dbe3"/>
  <rect class="term" x="70" y="70" width="190" height="82"/>
  <text class="text" x="104" y="102">查询 tsvector</text>
  <text class="small" x="96" y="130">去重 token -> cursor</text>
  <rect class="term" x="70" y="204" width="190" height="234"/>
  <text class="text" x="108" y="236">posting 游标</text>
  <text class="small" x="100" y="268">term A: doc 2..128</text>
  <text class="small" x="100" y="294">term B: doc 8..256</text>
  <text class="small" x="100" y="320">term C: doc 30..180</text>
  <text class="small" x="100" y="356">token_upper_bound</text>
  <text class="small" x="100" y="382">block_upper_bound</text>
  <rect class="block" x="342" y="78" width="238" height="154"/>
  <text class="text" x="386" y="112">浅 seek 到 block</text>
  <text class="small" x="374" y="144">只看 SummaryTuple</text>
  <text class="small" x="374" y="170">min/max docid</text>
  <text class="small" x="374" y="196">block WAND 上界</text>
  <rect class="skip" x="674" y="78" width="232" height="154"/>
  <text class="text" x="724" y="112">上界不够</text>
  <text class="small" x="704" y="144">sum(block UB) &lt;= threshold</text>
  <text class="small" x="704" y="170">推进高上界游标</text>
  <text class="small" x="704" y="196">不解压 block</text>
  <rect class="block" x="342" y="308" width="238" height="154"/>
  <text class="text" x="382" y="342">上界可能进入 Top-K</text>
  <text class="small" x="374" y="374">解压 docids + tf</text>
  <text class="small" x="374" y="400">读取 DocumentTuple fieldnorm</text>
  <text class="small" x="374" y="426">计算 BM25 精确分</text>
  <rect class="score" x="674" y="308" width="232" height="154"/>
  <text class="text" x="736" y="342">Top-K 堆</text>
  <text class="small" x="704" y="374">保存当前最优 k 个 CTID</text>
  <text class="small" x="704" y="400">第 k 名分数作为 threshold</text>
  <text class="small" x="704" y="426">阈值越高，跳过越多</text>
  <path class="arrow" d="M165 152 V196"/>
  <path class="arrow" d="M260 318 C296 260,310 178,334 156"/>
  <path class="arrow" d="M580 156 H666"/>
  <path class="arrow" d="M460 232 V300"/>
  <path class="arrow" d="M580 385 H666"/>
  <path class="arrow" d="M790 308 C760 252,744 232,704 220"/>
  <text class="small" x="132" y="490">核心判断：先用 token/block 上界证明“不可能进 Top-K”，只有证明不了时才解压和打分。</text>
</svg>
