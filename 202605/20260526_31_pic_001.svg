<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">pg_tokenizer 总体架构</title>
  <desc id="desc">展示 SQL 接口、catalog 配置、对象缓存、文本分析器、模型和整数 token id 输出之间的关系。</desc>
  <style>
    .bg { fill: #f7fafc; }
    .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .box2 { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 8; }
    .box3 { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .box4 { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #4b5563; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>

  <rect class="box" x="40" y="70" width="250" height="130"/>
  <text class="text" x="70" y="115">SQL 接口</text>
  <text class="small" x="70" y="150">create_tokenizer()</text>
  <text class="small" x="70" y="178">tokenize(text, name)</text>

  <rect class="box2" x="40" y="280" width="250" height="160"/>
  <text class="text" x="70" y="325">catalog 表</text>
  <text class="small" x="70" y="362">text_analyzer</text>
  <text class="small" x="70" y="390">model</text>
  <text class="small" x="70" y="418">tokenizer</text>

  <rect class="box3" x="400" y="65" width="300" height="145"/>
  <text class="text" x="430" y="110">Tokenizer</text>
  <text class="small" x="430" y="145">绑定 TextAnalyzer</text>
  <text class="small" x="430" y="173">绑定 TokenizerModel</text>

  <rect class="box" x="385" y="285" width="330" height="145"/>
  <text class="text" x="420" y="330">TextAnalyzer</text>
  <text class="small" x="420" y="365">字符过滤 -> 预切分</text>
  <text class="small" x="420" y="393">-> token 过滤</text>

  <rect class="box4" x="795" y="285" width="285" height="145"/>
  <text class="text" x="830" y="330">TokenizerModel</text>
  <text class="small" x="830" y="365">builtin / custom</text>
  <text class="small" x="830" y="393">HuggingFace / Lindera</text>

  <rect class="box3" x="790" y="70" width="295" height="130"/>
  <text class="text" x="825" y="115">INT[] 输出</text>
  <text class="small" x="825" y="150">给 BM25 / 向量化</text>
  <text class="small" x="825" y="178">或业务列保存</text>

  <rect class="box2" x="390" y="500" width="330" height="72"/>
  <text class="small" x="425" y="545">DashMap 对象缓存：按名称懒加载</text>

  <path class="arrow" d="M290 135 H390"/>
  <path class="arrow" d="M700 135 H790"/>
  <path class="arrow" d="M550 210 V280"/>
  <path class="arrow" d="M715 358 H790"/>
  <path class="arrow" d="M940 285 V210"/>
  <path class="arrow" d="M165 280 V205"/>
  <path class="arrow" d="M290 360 H382"/>
  <path class="arrow" d="M555 500 V435"/>
  <path class="arrow" d="M720 536 C850 536 935 470 935 435"/>
  <text class="tiny" x="310" y="115">SQL 调用</text>
  <text class="tiny" x="300" y="345">TOML 转 JSON 存储</text>
  <text class="tiny" x="590" y="255">先分析文本</text>
  <text class="tiny" x="740" y="340">再映射 ID</text>
</svg>
