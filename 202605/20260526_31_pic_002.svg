<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">TextAnalyzer 流水线</title>
  <desc id="desc">展示输入文本经过字符过滤、预切分、token 过滤后形成 token 数组的过程。</desc>
  <style>
    .bg { fill: #fbfbf9; }
    .stage { fill: #ffffff; stroke: #0f766e; stroke-width: 2; rx: 8; }
    .stage2 { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .stage3 { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #4b5563; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <rect class="stage2" x="40" y="205" width="180" height="110"/>
  <text class="text" x="78" y="252">原始文本</text>
  <text class="tiny" x="68" y="285">Text / VARCHAR</text>

  <rect class="stage" x="285" y="80" width="230" height="150"/>
  <text class="text" x="320" y="125">字符过滤</text>
  <text class="small" x="320" y="160">to_lowercase</text>
  <text class="small" x="320" y="190">unicode_normalization</text>

  <rect class="stage" x="285" y="320" width="230" height="150"/>
  <text class="text" x="320" y="365">预切分</text>
  <text class="small" x="320" y="400">regex</text>
  <text class="small" x="320" y="428">unicode_segmentation</text>
  <text class="small" x="320" y="456">jieba</text>

  <rect class="stage3" x="590" y="155" width="270" height="210"/>
  <text class="text" x="625" y="205">token 过滤</text>
  <text class="small" x="625" y="240">skip_non_alphanumeric</text>
  <text class="small" x="625" y="270">stopwords / synonym</text>
  <text class="small" x="625" y="300">stemmer / pg_dict</text>
  <text class="small" x="625" y="330">ngram</text>

  <rect class="stage2" x="930" y="205" width="150" height="110"/>
  <text class="text" x="965" y="252">tokens</text>
  <text class="tiny" x="965" y="285">TEXT[]</text>

  <path class="arrow" d="M220 260 C250 260 250 155 280 155"/>
  <path class="arrow" d="M400 230 V315"/>
  <path class="arrow" d="M515 395 C560 395 560 260 585 260"/>
  <path class="arrow" d="M860 260 H925"/>
  <text class="tiny" x="245" y="135">改写文本</text>
  <text class="tiny" x="420" y="280">切成初始 token</text>
  <text class="tiny" x="535" y="380">过滤、归一、扩展</text>
</svg>
