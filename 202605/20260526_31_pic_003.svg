<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">模型层把 token 映射成整数 ID</title>
  <desc id="desc">比较 builtin、HuggingFace、Lindera 和 custom model 的映射路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 8; }
    .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .green { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .yellow { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 8; }
    .red { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #4b5563; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <rect class="box" x="45" y="250" width="185" height="105"/>
  <text class="text" x="85" y="292">tokens</text>
  <text class="small" x="82" y="325">Vec&lt;String&gt;</text>

  <rect class="blue" x="325" y="55" width="285" height="120"/>
  <text class="text" x="360" y="100">builtin model</text>
  <text class="small" x="360" y="133">bert / gemma / llmlingua2</text>

  <rect class="green" x="325" y="205" width="285" height="120"/>
  <text class="text" x="360" y="250">HuggingFace</text>
  <text class="small" x="360" y="283">tokenizers.json</text>

  <rect class="yellow" x="325" y="355" width="285" height="120"/>
  <text class="text" x="360" y="400">Lindera</text>
  <text class="small" x="360" y="433">日文形态分析配置</text>

  <rect class="red" x="695" y="355" width="285" height="120"/>
  <text class="text" x="730" y="400">custom model</text>
  <text class="small" x="730" y="433">model_x(token,id) 表</text>

  <rect class="box" x="825" y="205" width="230" height="120"/>
  <text class="text" x="870" y="250">INT[]</text>
  <text class="small" x="860" y="283">Vec&lt;u32&gt; -> SQL int[]</text>

  <rect class="box" x="690" y="55" width="275" height="120"/>
  <text class="text" x="725" y="100">词表边界</text>
  <text class="small" x="725" y="133">未知词被拆分或丢弃</text>

  <path class="arrow" d="M230 302 C285 302 285 115 320 115"/>
  <path class="arrow" d="M230 302 H320"/>
  <path class="arrow" d="M230 302 C285 302 285 415 320 415"/>
  <path class="arrow" d="M610 115 H685"/>
  <path class="arrow" d="M610 265 H820"/>
  <path class="arrow" d="M610 415 H690"/>
  <path class="arrow" d="M980 415 C1050 415 1050 330 1018 325"/>
  <path class="arrow" d="M965 115 C1030 115 1030 205 1000 205"/>
  <text class="tiny" x="270" y="95">预训练词表</text>
  <text class="tiny" x="645" y="395">数据库内词表</text>
</svg>
