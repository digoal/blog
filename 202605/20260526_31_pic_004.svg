<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">配置、缓存和事务边界</title>
  <desc id="desc">展示 create/drop 函数、catalog 表、DashMap 缓存和事务回滚之间的关系。</desc>
  <style>
    .bg { fill: #f9fafb; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .db { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .cache { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .warn { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #4b5563; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #e11d48; stroke-width: 2.4; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e11d48" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <rect class="box" x="45" y="95" width="250" height="115"/>
  <text class="text" x="78" y="140">create_* 函数</text>
  <text class="small" x="78" y="174">TOML 校验并构建对象</text>

  <rect class="db" x="425" y="75" width="270" height="155"/>
  <text class="text" x="465" y="122">catalog 持久化</text>
  <text class="small" x="465" y="158">config 保存为 JSON</text>
  <text class="small" x="465" y="188">受事务回滚影响</text>

  <rect class="cache" x="785" y="75" width="290" height="155"/>
  <text class="text" x="825" y="122">进程内缓存</text>
  <text class="small" x="825" y="158">DashMap&lt;name, object&gt;</text>
  <text class="small" x="825" y="188">不等价于事务快照</text>

  <rect class="box" x="45" y="345" width="250" height="115"/>
  <text class="text" x="78" y="390">tokenize()</text>
  <text class="small" x="78" y="424">按名称读取对象</text>

  <rect class="warn" x="425" y="330" width="650" height="145"/>
  <text class="text" x="465" y="378">ROLLBACK 后的风险</text>
  <text class="small" x="465" y="414">catalog 记录回滚，但本连接缓存可能仍保留对象</text>
  <text class="small" x="465" y="444">规避：显式 drop_* 或重连，生产变更用独立发布窗口</text>

  <path class="arrow" d="M295 152 H420"/>
  <path class="arrow" d="M695 152 H780"/>
  <path class="arrow" d="M295 402 C365 402 365 152 420 152"/>
  <path class="arrow" d="M295 402 C470 402 620 250 785 205"/>
  <path class="dash" d="M560 230 V325"/>
  <path class="dash" d="M930 230 V325"/>
  <text class="tiny" x="315" y="132">INSERT config</text>
  <text class="tiny" x="710" y="132">insert cache</text>
  <text class="tiny" x="575" y="290">事务回滚</text>
  <text class="tiny" x="945" y="290">缓存未自动回滚</text>
</svg>
