<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">pg_tokenizer 方案选择</title>
  <desc id="desc">展示不同业务目标下选择 builtin、custom、Lindera、HuggingFace 或 PostgreSQL 字典的决策路径。</desc>
  <style>
    .bg { fill: #ffffff; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .choice { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 21px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="640"/>
  <rect class="node" x="390" y="35" width="340" height="95"/>
  <text class="text" x="430" y="78">你要解决什么问题？</text>
  <text class="small" x="430" y="106">搜索、召回、LLM token、业务词表</text>

  <rect class="choice" x="70" y="210" width="250" height="120"/>
  <text class="text" x="105" y="254">英文/多语言文本</text>
  <text class="small" x="105" y="286">需要稳定预训练词表</text>
  <text class="small" x="105" y="310">选 builtin/HF</text>

  <rect class="choice" x="435" y="210" width="250" height="120"/>
  <text class="text" x="470" y="254">中文/日文分词</text>
  <text class="small" x="470" y="286">先处理词边界</text>
  <text class="small" x="470" y="310">中文 jieba，日文 Lindera</text>

  <rect class="choice" x="800" y="210" width="250" height="120"/>
  <text class="text" x="835" y="254">业务私有词表</text>
  <text class="small" x="835" y="286">用表内语料生成 id</text>
  <text class="small" x="835" y="310">选 custom model</text>

  <rect class="ok" x="70" y="455" width="250" height="120"/>
  <text class="text" x="105" y="500">低维护成本</text>
  <text class="small" x="105" y="532">但词表边界外会拆分</text>

  <rect class="warn" x="435" y="455" width="250" height="120"/>
  <text class="text" x="470" y="500">高召回优先</text>
  <text class="small" x="470" y="532">调分词、同义词、停用词</text>

  <rect class="warn" x="800" y="455" width="250" height="120"/>
  <text class="text" x="835" y="500">一致性优先</text>
  <text class="small" x="835" y="532">关注触发器、回滚、缓存</text>

  <path class="arrow" d="M500 130 C370 155 270 180 200 205"/>
  <path class="arrow" d="M560 130 V205"/>
  <path class="arrow" d="M620 130 C750 155 850 180 925 205"/>
  <path class="arrow" d="M195 330 V450"/>
  <path class="arrow" d="M560 330 V450"/>
  <path class="arrow" d="M925 330 V450"/>
</svg>
