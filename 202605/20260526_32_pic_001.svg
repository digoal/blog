<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">json 与 jsonb 的写入和读取路径</title>
  <desc id="desc">展示 json 保存原始文本、读取时重复解析，jsonb 写入时解析为二进制树、读取时直接遍历并可使用索引。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .box { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.4; rx: 7; }
    .box2 { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 7; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 7; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .title { font-size: 24px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="txt title" x="40" y="44">同一份 JSON 输入，PostgreSQL 有两条物理路径</text>

  <rect class="lane" x="40" y="80" width="900" height="180"/>
  <text class="txt title" x="70" y="118">json：保存输入文本</text>
  <rect class="box" x="70" y="145" width="170" height="72"/>
  <text class="txt" x="95" y="176">输入文本</text>
  <text class="txt small" x="92" y="200">空白、键顺序保留</text>
  <path class="arrow" d="M250 181 H340"/>
  <rect class="box" x="350" y="145" width="180" height="72"/>
  <text class="txt" x="393" y="176">原样存储</text>
  <text class="txt small" x="378" y="200">每次处理要重解析</text>
  <path class="arrow" d="M540 181 H630"/>
  <rect class="warn" x="640" y="145" width="250" height="72"/>
  <text class="txt" x="682" y="176">适合少量校验/归档</text>
  <text class="txt small" x="667" y="200">不支持 jsonb 的 GIN 能力</text>

  <rect class="lane" x="40" y="300" width="900" height="180"/>
  <text class="txt title" x="70" y="338">jsonb：写入时解析，之后按二进制树处理</text>
  <rect class="box2" x="70" y="365" width="170" height="72"/>
  <text class="txt" x="95" y="396">输入文本</text>
  <text class="txt small" x="87" y="420">合法性 + 类型映射</text>
  <path class="arrow" d="M250 401 H340"/>
  <rect class="box2" x="350" y="365" width="180" height="72"/>
  <text class="txt" x="388" y="396">二进制结构</text>
  <text class="txt small" x="376" y="420">去空白、键排序、去重</text>
  <path class="arrow" d="M540 401 H630"/>
  <rect class="box2" x="640" y="365" width="250" height="72"/>
  <text class="txt" x="678" y="396">遍历 / 比较 / GIN</text>
  <text class="txt small" x="670" y="420">更快处理，写入转换有代价</text>
</svg>
