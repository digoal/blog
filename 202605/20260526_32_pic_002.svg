<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">JSONB 二进制布局</title>
  <desc id="desc">展示 JSONB varlena、根容器、JEntry 数组、数据区，以及对象中 key 和 value 分区存放的结构。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.4; rx: 6; }
    .head { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.4; rx: 6; }
    .jentry { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; rx: 5; }
    .data { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; rx: 5; }
    .note { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.1; rx: 6; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 24px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="620"/>
  <text class="txt title" x="40" y="45">JSONB Datum：树结构被摊平成容器 + JEntry + 数据区</text>

  <rect class="head" x="70" y="90" width="150" height="70"/>
  <text class="txt" x="96" y="122">varlena</text>
  <text class="txt small" x="92" y="146">总长度 vl_len_</text>
  <path class="arrow" d="M225 125 H290"/>
  <rect class="head" x="300" y="90" width="250" height="70"/>
  <text class="txt" x="342" y="122">Root JsonbContainer</text>
  <text class="txt small" x="322" y="146">header = count + object/array/scalar 标志</text>
  <path class="arrow" d="M555 125 H620"/>
  <rect class="box" x="630" y="90" width="320" height="70"/>
  <text class="txt" x="680" y="122">根节点没有自己的 JEntry</text>
  <text class="txt small" x="660" y="146">裸标量用一元素数组模拟</text>

  <text class="txt title" x="70" y="220">对象容器内部</text>
  <rect class="head" x="70" y="250" width="190" height="70"/>
  <text class="txt" x="94" y="282">container header</text>
  <text class="txt small" x="98" y="305">nPairs + JB_FOBJECT</text>
  <path class="arrow" d="M265 285 H320"/>
  <rect class="jentry" x="330" y="250" width="110" height="70"/>
  <text class="txt" x="357" y="282">key1</text>
  <text class="txt small" x="347" y="305">JEntry</text>
  <rect class="jentry" x="450" y="250" width="110" height="70"/>
  <text class="txt" x="477" y="282">key2</text>
  <text class="txt small" x="467" y="305">JEntry</text>
  <rect class="jentry" x="570" y="250" width="110" height="70"/>
  <text class="txt" x="592" y="282">value1</text>
  <text class="txt small" x="587" y="305">JEntry</text>
  <rect class="jentry" x="690" y="250" width="110" height="70"/>
  <text class="txt" x="712" y="282">value2</text>
  <text class="txt small" x="707" y="305">JEntry</text>

  <path class="arrow" d="M405 325 V375"/>
  <path class="arrow" d="M525 325 V375"/>
  <path class="arrow" d="M645 325 V375"/>
  <path class="arrow" d="M765 325 V375"/>
  <rect class="data" x="300" y="385" width="120" height="65"/>
  <text class="txt" x="325" y="416">key1 文本</text>
  <text class="txt small" x="320" y="438">短 key 靠前</text>
  <rect class="data" x="430" y="385" width="120" height="65"/>
  <text class="txt" x="455" y="416">key2 文本</text>
  <text class="txt small" x="450" y="438">二分查找</text>
  <rect class="data" x="560" y="385" width="130" height="65"/>
  <text class="txt" x="595" y="416">value1</text>
  <text class="txt small" x="585" y="438">字符串/数字/容器</text>
  <rect class="data" x="700" y="385" width="130" height="65"/>
  <text class="txt" x="735" y="416">value2</text>
  <text class="txt small" x="725" y="438">按需 4 字节对齐</text>

  <rect class="note" x="70" y="500" width="890" height="78"/>
  <text class="txt" x="95" y="532">关键取舍：JEntry 有时存长度、有时存偏移；每 32 个子项存一个偏移。</text>
  <text class="txt small" x="95" y="558">这样在 TOAST 压缩友好和随机定位之间折中：最多检查一个 stride 内的 JEntry，仍然是常数级。</text>
</svg>
