<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">JSONB 包含与存在操作符语义</title>
  <desc id="desc">解释 jsonb 包含操作符按结构匹配，存在操作符只看顶层对象键或数组字符串元素。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .ok { fill: #dcfce7; stroke: #15803d; stroke-width: 1.3; rx: 6; }
    .no { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.3; rx: 6; }
    .mid { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.3; rx: 6; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="txt title" x="40" y="45">两个常用判断：@&gt; 看结构包含，? 看顶层存在</text>

  <rect class="card" x="50" y="80" width="410" height="410"/>
  <text class="txt title" x="80" y="118">@&gt; containment</text>
  <text class="txt small" x="80" y="148">右侧必须能在左侧结构中找到匹配</text>
  <rect class="mid" x="80" y="180" width="330" height="70"/>
  <text class="code" x="100" y="210">{"tags":[{"term":"paris"}]}</text>
  <text class="code" x="100" y="235">@&gt; {"tags":[{"term":"paris"}]}</text>
  <path class="arrow" d="M245 255 V285"/>
  <rect class="ok" x="125" y="295" width="240" height="55"/>
  <text class="txt" x="195" y="328">结构匹配：true</text>
  <rect class="no" x="80" y="375" width="330" height="70"/>
  <text class="code" x="100" y="405">{"foo":{"bar":"baz"}}</text>
  <text class="code" x="100" y="430">@&gt; {"bar":"baz"}  => false</text>

  <rect class="card" x="520" y="80" width="410" height="410"/>
  <text class="txt title" x="550" y="118">? existence</text>
  <text class="txt small" x="550" y="148">只匹配顶层对象 key，或顶层数组字符串元素</text>
  <rect class="ok" x="550" y="180" width="330" height="70"/>
  <text class="code" x="570" y="210">{"foo":"bar"} ? "foo"</text>
  <text class="txt" x="690" y="236">true</text>
  <rect class="no" x="550" y="270" width="330" height="70"/>
  <text class="code" x="570" y="300">{"foo":"bar"} ? "bar"</text>
  <text class="txt" x="690" y="326">false</text>
  <rect class="no" x="550" y="360" width="330" height="70"/>
  <text class="code" x="570" y="390">{"foo":{"bar":"baz"}} ? "bar"</text>
  <text class="txt" x="690" y="416">false</text>

  <text class="txt small" x="70" y="530">工程含义：把可检索属性放在对象 key/value 的稳定位置；嵌套匹配优先用 @&gt; 或 jsonpath，不要误把 ? 当递归搜索。</text>
</svg>
