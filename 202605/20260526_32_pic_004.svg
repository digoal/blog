<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">jsonb_ops 与 jsonb_path_ops 的 GIN 索引项差异</title>
  <desc id="desc">比较默认 jsonb_ops 把 key 和 value 分别建索引，jsonb_path_ops 为路径和值组合生成一个哈希索引项。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .input { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.4; rx: 7; }
    .ops { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; rx: 6; }
    .path { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; rx: 6; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.2; rx: 6; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1060" height="620"/>
  <text class="txt title" x="40" y="45">同一个文档，不同 opclass 抽出的 GIN key 完全不同</text>

  <rect class="input" x="300" y="80" width="460" height="80"/>
  <text class="txt" x="330" y="112">JSONB 文档</text>
  <text class="code" x="330" y="142">{"foo":{"bar":"baz"}}</text>
  <path class="arrow" d="M430 165 C360 210 280 230 230 260"/>
  <path class="arrow" d="M620 165 C700 210 780 230 830 260"/>

  <rect class="card" x="50" y="250" width="430" height="270"/>
  <text class="txt title" x="80" y="290">jsonb_ops（默认）</text>
  <text class="txt small" x="80" y="320">key 和 value 分别成为索引项，字符串数组元素也按 key 处理</text>
  <rect class="ops" x="95" y="350" width="110" height="52"/>
  <text class="code" x="127" y="382">foo</text>
  <rect class="ops" x="220" y="350" width="110" height="52"/>
  <text class="code" x="252" y="382">bar</text>
  <rect class="ops" x="345" y="350" width="110" height="52"/>
  <text class="code" x="377" y="382">baz</text>
  <text class="txt small" x="80" y="440">支持：@&gt;、?、?|、?&amp;、@?、@@</text>
  <text class="txt small" x="80" y="468">优点：灵活，可查 key 是否存在</text>
  <text class="txt small" x="80" y="496">代价：索引更大，常见 key 的匹配特异性较弱</text>

  <rect class="card" x="580" y="250" width="430" height="270"/>
  <text class="txt title" x="610" y="290">jsonb_path_ops</text>
  <text class="txt small" x="610" y="320">路径上的 key 与最终 value 合成一个 32 位哈希索引项</text>
  <rect class="path" x="650" y="350" width="290" height="52"/>
  <text class="code" x="682" y="382">HASH(foo, bar, baz)</text>
  <text class="txt small" x="610" y="440">支持：@&gt;、@?、@@</text>
  <text class="txt small" x="610" y="468">优点：索引通常更小，包含查询更具体</text>
  <text class="txt small" x="610" y="496">代价：不能查单独 key；空对象结构没有索引项</text>

  <rect class="bad" x="225" y="545" width="610" height="48"/>
  <text class="txt" x="260" y="576">例外边界：查询 {"a": {}} 时，jsonb_path_ops 可能需要慢的全索引扫描。</text>
</svg>
