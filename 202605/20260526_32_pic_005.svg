<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">JSONB 建模边界与查询路径</title>
  <desc id="desc">展示关系列、生成列、表达式索引、整列 GIN 和 jsonpath 在应用建模中的分工。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .rel { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.3; rx: 6; }
    .json { fill: #dcfce7; stroke: #15803d; stroke-width: 1.3; rx: 6; }
    .idx { fill: #fef3c7; stroke: #b45309; stroke-width: 1.3; rx: 6; }
    .warn { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.3; rx: 6; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="560"/>
  <text class="txt title" x="40" y="45">建模决策：不要把 JSONB 当作免设计的表</text>

  <rect class="box" x="50" y="90" width="900" height="90"/>
  <text class="txt" x="80" y="123">一行订单事件</text>
  <text class="code" x="80" y="153">tenant_id, order_id, created_at, status, payload jsonb</text>

  <path class="arrow" d="M210 185 V240"/>
  <path class="arrow" d="M500 185 V240"/>
  <path class="arrow" d="M780 185 V240"/>
  <rect class="rel" x="70" y="250" width="250" height="90"/>
  <text class="txt" x="105" y="283">高频过滤/连接字段</text>
  <text class="txt small" x="95" y="312">用普通列 + B-tree</text>
  <rect class="json" x="375" y="250" width="250" height="90"/>
  <text class="txt" x="415" y="283">中低频扩展属性</text>
  <text class="txt small" x="395" y="312">放 payload jsonb</text>
  <rect class="idx" x="680" y="250" width="250" height="90"/>
  <text class="txt" x="715" y="283">稳定 JSON 路径查询</text>
  <text class="txt small" x="700" y="312">表达式索引 / 生成列 / GIN</text>

  <path class="arrow" d="M500 345 V400"/>
  <rect class="idx" x="280" y="410" width="440" height="70"/>
  <text class="code" x="310" y="440">CREATE INDEX ON orders USING GIN (payload jsonb_path_ops);</text>
  <text class="code" x="310" y="463">CREATE INDEX ON orders ((payload-&gt;&apos;tags&apos;));</text>

  <rect class="warn" x="50" y="500" width="900" height="42"/>
  <text class="txt" x="80" y="527">边界：更新 JSONB 中一个字段仍然是整行更新，受 MVCC、行锁、TOAST 和索引维护成本约束。</text>
</svg>
