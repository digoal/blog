<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">tsvector 构建流水线</title>
  <desc id="desc">从原始文本经过 parser、dictionary、去停用词、排序去重，生成 tsvector 的流程。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; }
    .box { fill: #f7f9fc; stroke: #44617f; stroke-width: 2; rx: 8; }
    .accent { fill: #eaf4ef; stroke: #31845b; stroke-width: 2; rx: 8; }
    .warn { fill: #fff6e6; stroke: #bf7a1f; stroke-width: 2; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .small { font-size: 16px; }
    .label { font-size: 20px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="30" y="70" width="150" height="110" class="box"/>
  <text x="105" y="108" text-anchor="middle" class="label">原始文本</text>
  <text x="105" y="138" text-anchor="middle" class="small">标题、正文、JSON</text>
  <text x="105" y="164" text-anchor="middle" class="mono">text/json/jsonb</text>

  <path d="M180 125 L245 125" class="arrow"/>
  <rect x="245" y="70" width="150" height="110" class="box"/>
  <text x="320" y="108" text-anchor="middle" class="label">parser</text>
  <text x="320" y="138" text-anchor="middle" class="small">切 token</text>
  <text x="320" y="164" text-anchor="middle" class="small">记录位置</text>

  <path d="M395 125 L460 125" class="arrow"/>
  <rect x="460" y="70" width="160" height="110" class="box"/>
  <text x="540" y="108" text-anchor="middle" class="label">dictionary</text>
  <text x="540" y="138" text-anchor="middle" class="small">归一化词形</text>
  <text x="540" y="164" text-anchor="middle" class="small">过滤停用词</text>

  <path d="M620 125 L685 125" class="arrow"/>
  <rect x="685" y="70" width="160" height="110" class="accent"/>
  <text x="765" y="108" text-anchor="middle" class="label">make_tsvector</text>
  <text x="765" y="138" text-anchor="middle" class="small">排序、去重</text>
  <text x="765" y="164" text-anchor="middle" class="small">合并位置</text>

  <path d="M845 125 L910 125" class="arrow"/>
  <rect x="910" y="70" width="160" height="110" class="warn"/>
  <text x="990" y="108" text-anchor="middle" class="label">tsvector</text>
  <text x="990" y="138" text-anchor="middle" class="small">lexeme 列表</text>
  <text x="990" y="164" text-anchor="middle" class="small">位置 + 权重</text>

  <rect x="245" y="235" width="600" height="70" fill="#ffffff" stroke="#b6c2d1" stroke-width="1.5" rx="8"/>
  <text x="545" y="263" text-anchor="middle" class="small">源码路径：parsetext() → make_tsvector()</text>
  <text x="545" y="290" text-anchor="middle" class="mono">src/backend/tsearch/to_tsany.c</text>
</svg>
