<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460" role="img" aria-labelledby="title desc">
  <title id="title">tsvector 内部存储布局</title>
  <desc id="desc">展示 varlena 头、size、WordEntry 数组、lexeme 字符串和可选位置数组的关系。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; }
    .seg { stroke: #334155; stroke-width: 2; }
    .hdr { fill: #e8eef7; }
    .entry { fill: #edf7ee; }
    .data { fill: #fff3d6; }
    .pos { fill: #fce8e6; }
    .arrow { stroke: #52657a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#52657a"/>
    </marker>
  </defs>
  <text x="40" y="44" class="label">一个 tsvector datum</text>
  <rect x="40" y="70" width="130" height="80" class="seg hdr"/>
  <text x="105" y="103" text-anchor="middle" class="label">vl_len_</text>
  <text x="105" y="130" text-anchor="middle" class="small">varlena 头</text>
  <rect x="170" y="70" width="110" height="80" class="seg hdr"/>
  <text x="225" y="103" text-anchor="middle" class="label">size</text>
  <text x="225" y="130" text-anchor="middle" class="small">词项数</text>
  <rect x="280" y="70" width="170" height="80" class="seg entry"/>
  <text x="365" y="103" text-anchor="middle" class="label">WordEntry[0]</text>
  <text x="365" y="130" text-anchor="middle" class="mono">len,pos,haspos</text>
  <rect x="450" y="70" width="170" height="80" class="seg entry"/>
  <text x="535" y="103" text-anchor="middle" class="label">WordEntry[1]</text>
  <text x="535" y="130" text-anchor="middle" class="mono">len,pos,haspos</text>
  <rect x="620" y="70" width="110" height="80" class="seg entry"/>
  <text x="675" y="103" text-anchor="middle" class="label">...</text>
  <text x="675" y="130" text-anchor="middle" class="small">已排序</text>
  <rect x="730" y="70" width="160" height="80" class="seg data"/>
  <text x="810" y="103" text-anchor="middle" class="label">lexeme bytes</text>
  <text x="810" y="130" text-anchor="middle" class="small">非 0 结尾字符串</text>
  <rect x="890" y="70" width="170" height="80" class="seg pos"/>
  <text x="975" y="103" text-anchor="middle" class="label">positions</text>
  <text x="975" y="130" text-anchor="middle" class="small">可选，对齐后存放</text>

  <path d="M365 150 C365 215 760 210 790 160" class="arrow"/>
  <text x="505" y="214" class="small">pos 是从 WordEntry 数组末尾到词串起点的字节偏移</text>
  <path d="M535 150 C590 255 935 250 960 160" class="arrow"/>
  <text x="610" y="270" class="small">haspos=true 时，词串后还有 npos + WordEntryPos[]</text>

  <rect x="95" y="330" width="260" height="76" fill="#ffffff" stroke="#b6c2d1" rx="8"/>
  <text x="225" y="360" text-anchor="middle" class="label">WordEntry</text>
  <text x="225" y="388" text-anchor="middle" class="mono">haspos:1 len:11 pos:20</text>
  <rect x="420" y="330" width="260" height="76" fill="#ffffff" stroke="#b6c2d1" rx="8"/>
  <text x="550" y="360" text-anchor="middle" class="label">WordEntryPos</text>
  <text x="550" y="388" text-anchor="middle" class="mono">weight:2 pos:14</text>
  <rect x="745" y="330" width="260" height="76" fill="#ffffff" stroke="#b6c2d1" rx="8"/>
  <text x="875" y="360" text-anchor="middle" class="label">边界</text>
  <text x="875" y="388" text-anchor="middle" class="small">lexeme &lt; 2KB，位置最多 16383</text>
</svg>
