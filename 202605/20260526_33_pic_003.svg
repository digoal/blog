<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="470" viewBox="0 0 1100 470" role="img" aria-labelledby="title desc">
  <title id="title">tsvector 匹配和索引路径</title>
  <desc id="desc">展示 tsvector 与 tsquery 匹配、GIN 倒排查找和回表复查的关系。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #40546b; stroke-width: 2; rx: 8; }
    .green { fill: #e9f6ef; stroke: #2f7d57; stroke-width: 2; rx: 8; }
    .yellow { fill: #fff6df; stroke: #b87616; stroke-width: 2; rx: 8; }
    .red { fill: #fae8e8; stroke: #b43d3d; stroke-width: 2; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="35" y="65" width="190" height="105" class="box"/>
  <text x="130" y="100" text-anchor="middle" class="label">SQL 谓词</text>
  <text x="130" y="130" text-anchor="middle" class="mono">doc_tsv @@ query</text>
  <text x="130" y="154" text-anchor="middle" class="small">AND / OR / ! / 短语</text>

  <path d="M225 118 L300 118" class="arrow"/>
  <rect x="300" y="65" width="205" height="105" class="green"/>
  <text x="402" y="100" text-anchor="middle" class="label">extract tsquery</text>
  <text x="402" y="130" text-anchor="middle" class="small">抽查询 lexeme</text>
  <text x="402" y="154" text-anchor="middle" class="small">识别 prefix / ! 查询</text>

  <path d="M505 118 L585 118" class="arrow"/>
  <rect x="585" y="65" width="210" height="105" class="yellow"/>
  <text x="690" y="100" text-anchor="middle" class="label">GIN entry tree</text>
  <text x="690" y="130" text-anchor="middle" class="small">lexeme → TID 集合</text>
  <text x="690" y="154" text-anchor="middle" class="small">posting list / tree</text>

  <path d="M795 118 L875 118" class="arrow"/>
  <rect x="875" y="65" width="190" height="105" class="box"/>
  <text x="970" y="100" text-anchor="middle" class="label">Bitmap Heap</text>
  <text x="970" y="130" text-anchor="middle" class="small">访问候选行</text>
  <text x="970" y="154" text-anchor="middle" class="small">MVCC 可见性</text>

  <path d="M970 170 L970 245" class="arrow"/>
  <rect x="795" y="245" width="270" height="125" class="red"/>
  <text x="930" y="282" text-anchor="middle" class="label">recheck 条件</text>
  <text x="930" y="314" text-anchor="middle" class="small">权重限制：GIN 不存权重</text>
  <text x="930" y="340" text-anchor="middle" class="small">短语距离：GIN 不存位置</text>
  <text x="930" y="366" text-anchor="middle" class="small">GiST 签名：可能误判</text>

  <rect x="90" y="250" width="575" height="112" fill="#ffffff" stroke="#b6c2d1" rx="8"/>
  <text x="378" y="285" text-anchor="middle" class="label">没有索引时</text>
  <text x="378" y="318" text-anchor="middle" class="small">逐行读取 tsvector，二分/执行 tsquery 表达式树</text>
  <text x="378" y="346" text-anchor="middle" class="mono">ts_match_vq → TS_execute()</text>
  <path d="M225 145 C300 225 530 215 665 286" class="arrow"/>
</svg>
