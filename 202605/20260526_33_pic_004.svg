<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="480" viewBox="0 0 1100 480" role="img" aria-labelledby="title desc">
  <title id="title">GIN 与 GiST 支持 tsvector 的差异</title>
  <desc id="desc">比较 GIN 倒排索引和 GiST 签名索引对 tsvector 的建模方式和代价。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; }
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
    .gin { fill: #e9f6ef; stroke: #2f7d57; stroke-width: 2; rx: 7; }
    .gist { fill: #fff3dc; stroke: #b87616; stroke-width: 2; rx: 7; }
    .line { stroke: #52657a; stroke-width: 2; }
    .label { font-size: 21px; font-weight: 700; }
    .small { font-size: 15px; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; }
  </style>
  <rect x="35" y="40" width="490" height="390" class="panel"/>
  <text x="280" y="80" text-anchor="middle" class="label">GIN：lexeme 倒排</text>
  <rect x="75" y="120" width="150" height="54" class="gin"/>
  <text x="150" y="154" text-anchor="middle" class="mono">database</text>
  <line x1="225" y1="147" x2="315" y2="147" class="line"/>
  <rect x="315" y="120" width="170" height="54" class="gin"/>
  <text x="400" y="154" text-anchor="middle" class="small">TID: 1,7,20...</text>
  <rect x="75" y="205" width="150" height="54" class="gin"/>
  <text x="150" y="239" text-anchor="middle" class="mono">search</text>
  <line x1="225" y1="232" x2="315" y2="232" class="line"/>
  <rect x="315" y="205" width="170" height="54" class="gin"/>
  <text x="400" y="239" text-anchor="middle" class="small">TID: 7,9,20...</text>
  <text x="280" y="315" text-anchor="middle" class="small">精确知道候选行是否包含某个 lexeme</text>
  <text x="280" y="345" text-anchor="middle" class="small">不保存权重和位置，相关查询仍需回表</text>
  <text x="280" y="375" text-anchor="middle" class="small">写入会按 lexeme 数量放大</text>

  <rect x="575" y="40" width="490" height="390" class="panel"/>
  <text x="820" y="80" text-anchor="middle" class="label">GiST：固定长度签名</text>
  <rect x="620" y="120" width="400" height="70" class="gist"/>
  <text x="820" y="150" text-anchor="middle" class="mono">document signature: 010110010010...</text>
  <text x="820" y="176" text-anchor="middle" class="small">多个词 hash 到 bit，按 OR 合并</text>
  <rect x="660" y="230" width="80" height="54" fill="#fce8e6" stroke="#b43d3d" rx="6"/>
  <text x="700" y="263" text-anchor="middle" class="small">bit 命中</text>
  <rect x="770" y="230" width="80" height="54" fill="#fce8e6" stroke="#b43d3d" rx="6"/>
  <text x="810" y="263" text-anchor="middle" class="small">bit 命中</text>
  <rect x="880" y="230" width="80" height="54" fill="#fce8e6" stroke="#b43d3d" rx="6"/>
  <text x="920" y="263" text-anchor="middle" class="small">误判?</text>
  <text x="820" y="325" text-anchor="middle" class="small">签名越长，误判越少，索引越大</text>
  <text x="820" y="355" text-anchor="middle" class="small">所有匹配都标记 recheck</text>
  <text x="820" y="385" text-anchor="middle" class="small">可用 INCLUDE 做覆盖列</text>
</svg>
