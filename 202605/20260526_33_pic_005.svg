<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">tsvector 建模实践路径</title>
  <desc id="desc">比较表达式索引、生成列和触发器维护 tsvector 三种实践路径。</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; }
    .lane { fill: #f8fafc; stroke: #40546b; stroke-width: 2; rx: 8; }
    .good { fill: #e9f6ef; stroke: #2f7d57; stroke-width: 2; rx: 8; }
    .mid { fill: #fff6df; stroke: #b87616; stroke-width: 2; rx: 8; }
    .bad { fill: #fae8e8; stroke: #b43d3d; stroke-width: 2; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 13px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="40" y="50" width="190" height="100" class="lane"/>
  <text x="135" y="88" text-anchor="middle" class="label">业务字段</text>
  <text x="135" y="118" text-anchor="middle" class="small">title / body / tags</text>
  <path d="M230 100 L305 100" class="arrow"/>

  <rect x="305" y="35" width="225" height="130" class="good"/>
  <text x="417" y="73" text-anchor="middle" class="label">生成列</text>
  <text x="417" y="104" text-anchor="middle" class="small">写入时生成 tsvector</text>
  <text x="417" y="130" text-anchor="middle" class="mono">GENERATED ALWAYS AS</text>
  <text x="417" y="151" text-anchor="middle" class="small">推荐：结构清晰</text>

  <rect x="305" y="190" width="225" height="130" class="mid"/>
  <text x="417" y="228" text-anchor="middle" class="label">表达式索引</text>
  <text x="417" y="259" text-anchor="middle" class="small">不存 tsvector 列</text>
  <text x="417" y="285" text-anchor="middle" class="mono">GIN(to_tsvector(...))</text>
  <text x="417" y="306" text-anchor="middle" class="small">适合简单模型</text>

  <rect x="575" y="35" width="225" height="130" class="mid"/>
  <text x="687" y="73" text-anchor="middle" class="label">触发器</text>
  <text x="687" y="104" text-anchor="middle" class="small">自定义权重与组合</text>
  <text x="687" y="130" text-anchor="middle" class="mono">setweight(...) || ...</text>
  <text x="687" y="151" text-anchor="middle" class="small">注意维护一致性</text>

  <path d="M530 100 L575 100" class="arrow"/>
  <path d="M530 255 C600 255 625 180 640 165" class="arrow"/>
  <rect x="855" y="115" width="205" height="125" class="bad"/>
  <text x="957" y="153" text-anchor="middle" class="label">GIN 索引</text>
  <text x="957" y="184" text-anchor="middle" class="small">读快，写放大</text>
  <text x="957" y="210" text-anchor="middle" class="small">监控 pending list</text>
  <path d="M800 100 C850 110 860 135 875 150" class="arrow"/>
  <path d="M530 255 C685 280 815 245 855 205" class="arrow"/>

  <text x="550" y="375" text-anchor="middle" class="small">核心选择：先定文本配置和字段权重，再决定 tsvector 是否物化；高写入表要把 GIN pending cleanup 纳入运维。</text>
</svg>
