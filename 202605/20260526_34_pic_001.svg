<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img">
  <title>PostgreSQL array 的平面 varlena 存储布局</title>
  <desc>展示 ArrayType 头、维度、下界、可选 null bitmap 和按行优先顺序存储的数据区。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 16px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #374151; }
    .tiny { font: 12px sans-serif; fill: #4b5563; }
    .box { stroke: #334155; stroke-width: 1.5; rx: 8; }
    .line { stroke: #355070; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="20" y="20" width="940" height="480" fill="#f8fafc" stroke="#cbd5e1" rx="10"/>
  <text x="40" y="58" class="title">ArrayType：紧凑存储，计算时可能需要扫描</text>

  <g transform="translate(48 98)">
    <rect class="box" x="0" y="0" width="116" height="82" fill="#dbeafe"/>
    <text x="18" y="32" class="label">vl_len_</text>
    <text x="15" y="58" class="small">总字节数</text>

    <rect class="box" x="116" y="0" width="116" height="82" fill="#e0f2fe"/>
    <text x="152" y="32" class="label">ndim</text>
    <text x="132" y="58" class="small">维度数</text>

    <rect class="box" x="232" y="0" width="132" height="82" fill="#ccfbf1"/>
    <text x="250" y="32" class="label">dataoffset</text>
    <text x="244" y="58" class="small">0 表示无 null 位图</text>

    <rect class="box" x="364" y="0" width="116" height="82" fill="#dcfce7"/>
    <text x="392" y="32" class="label">elemtype</text>
    <text x="385" y="58" class="small">元素类型 OID</text>

    <rect class="box" x="480" y="0" width="128" height="82" fill="#fef3c7"/>
    <text x="502" y="32" class="label">dims[]</text>
    <text x="492" y="58" class="small">每一维长度</text>

    <rect class="box" x="608" y="0" width="128" height="82" fill="#ffedd5"/>
    <text x="628" y="32" class="label">lbound[]</text>
    <text x="621" y="58" class="small">每一维下界</text>

    <rect class="box" x="736" y="0" width="144" height="82" fill="#fee2e2"/>
    <text x="760" y="32" class="label">null bitmap</text>
    <text x="748" y="58" class="small">可选，1 表示非空</text>
  </g>

  <g transform="translate(92 235)">
    <text x="0" y="-22" class="label">二维数组示例：ARRAY[[10,20,30],[40,NULL,60]]</text>
    <rect class="box" x="0" y="0" width="120" height="76" fill="#eef2ff"/>
    <text x="34" y="32" class="label">10</text>
    <text x="20" y="57" class="tiny">[1][1]</text>

    <rect class="box" x="120" y="0" width="120" height="76" fill="#eef2ff"/>
    <text x="154" y="32" class="label">20</text>
    <text x="140" y="57" class="tiny">[1][2]</text>

    <rect class="box" x="240" y="0" width="120" height="76" fill="#eef2ff"/>
    <text x="274" y="32" class="label">30</text>
    <text x="260" y="57" class="tiny">[1][3]</text>

    <rect class="box" x="360" y="0" width="120" height="76" fill="#eef2ff"/>
    <text x="394" y="32" class="label">40</text>
    <text x="380" y="57" class="tiny">[2][1]</text>

    <rect class="box" x="480" y="0" width="120" height="76" fill="#fee2e2"/>
    <text x="516" y="32" class="label">NULL</text>
    <text x="500" y="57" class="tiny">[2][2]</text>

    <rect class="box" x="600" y="0" width="120" height="76" fill="#eef2ff"/>
    <text x="634" y="32" class="label">60</text>
    <text x="620" y="57" class="tiny">[2][3]</text>

    <path class="line" d="M50,110 C150,165 585,165 670,110"/>
    <text x="150" y="155" class="small">row-major：最后一个下标变化最快，变长元素定位第 N 个值通常要跳过前面的值</text>
  </g>

  <g transform="translate(74 410)">
    <rect x="0" y="0" width="832" height="56" fill="#fff" stroke="#cbd5e1" rx="8"/>
    <text x="20" y="24" class="small">源码依据：src/include/utils/array.h 定义 ArrayType、MAXDIM、null bitmap、row-major、expanded array。</text>
    <text x="20" y="44" class="small">工程含义：磁盘表示紧凑；频繁随机访问或修改大数组时，CPU 与内存搬移成本会上升。</text>
  </g>
</svg>
