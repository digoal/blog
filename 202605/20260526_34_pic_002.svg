<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>数组访问与更新路径</title>
  <desc>展示普通平面数组和 expanded array 在访问、切片和赋值时的不同路径。</desc>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 13px sans-serif; fill: #374151; }
    .box { stroke: #334155; stroke-width: 1.4; rx: 8; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
  </style>
  <rect x="20" y="20" width="940" height="520" fill="#f8fafc" stroke="#cbd5e1" rx="10"/>
  <text x="44" y="58" class="title">访问和更新：读可定位，写通常生成新 datum</text>

  <g transform="translate(56 102)">
    <rect class="box" x="0" y="0" width="190" height="78" fill="#dbeafe"/>
    <text x="34" y="32" class="label">SQL 下标表达式</text>
    <text x="24" y="56" class="small">a[2] / a[2:4] / a[3] := x</text>

    <path class="arrow" d="M190,39 L282,39"/>
    <rect class="box" x="282" y="0" width="194" height="78" fill="#e0f2fe"/>
    <text x="316" y="32" class="label">arraysubs.c</text>
    <text x="307" y="56" class="small">检查下标数量与 MAXDIM</text>

    <path class="arrow" d="M476,39 L572,39"/>
    <rect class="box" x="572" y="0" width="252" height="78" fill="#ccfbf1"/>
    <text x="604" y="32" class="label">arrayfuncs.c</text>
    <text x="596" y="56" class="small">array_get_element / array_set_element</text>
  </g>

  <g transform="translate(74 220)">
    <rect class="box" x="0" y="0" width="240" height="120" fill="#fff7ed"/>
    <text x="24" y="34" class="label">平面 varlena 数组</text>
    <text x="24" y="62" class="small">1. 读取 ndim/dims/lbound</text>
    <text x="24" y="84" class="small">2. ArrayGetOffset 计算线性偏移</text>
    <text x="24" y="106" class="small">3. array_seek 跳到元素位置</text>

    <rect class="box" x="330" y="0" width="240" height="120" fill="#ecfdf5"/>
    <text x="354" y="34" class="label">expanded array</text>
    <text x="354" y="62" class="small">1. 指向内存对象</text>
    <text x="354" y="84" class="small">2. 必要时 deconstruct</text>
    <text x="354" y="106" class="small">3. Datum/isnull 数组直接访问</text>

    <rect class="box" x="660" y="0" width="190" height="120" fill="#fef2f2"/>
    <text x="684" y="34" class="label">更新语义</text>
    <text x="684" y="62" class="small">普通数组返回新数组</text>
    <text x="684" y="84" class="small">读写 expanded 可原地改</text>
    <text x="684" y="106" class="small">一维可越界扩展并补 NULL</text>

    <path class="arrow" d="M240,60 L330,60"/>
    <path class="arrow" d="M570,60 L660,60"/>
  </g>

  <g transform="translate(72 400)">
    <rect x="0" y="0" width="836" height="76" fill="#fff" stroke="#cbd5e1" rx="8"/>
    <text x="18" y="28" class="small">源码依据：array_get_element() 对无效下标返回 NULL；array_get_slice() 可截断越界切片；array_set_element() 对非法赋值抛错。</text>
    <text x="18" y="52" class="small">工程含义：数组不是局部可变的小表。把一个很长数组当作频繁更新的明细表，会把代价转成整行/TOAST/索引更新。</text>
  </g>
</svg>
