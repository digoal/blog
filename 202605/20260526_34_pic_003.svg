<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>array 操作符与 GIN 索引路径</title>
  <desc>展示数组包含、被包含、重叠和相等操作符如何映射到 GIN array_ops 的抽取和一致性判断。</desc>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 13px sans-serif; fill: #374151; }
    .tiny { font: 12px sans-serif; fill: #4b5563; }
    .box { stroke: #334155; stroke-width: 1.4; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow3); }
  </style>
  <rect x="20" y="20" width="940" height="520" fill="#f8fafc" stroke="#cbd5e1" rx="10"/>
  <text x="44" y="58" class="title">数组检索：集合语义 + 元素倒排</text>

  <g transform="translate(54 96)">
    <rect class="box" x="0" y="0" width="220" height="104" fill="#dbeafe"/>
    <text x="22" y="32" class="label">表行数组列</text>
    <text x="22" y="58" class="small">tags = {'red','hot','sql'}</text>
    <text x="22" y="82" class="small">GIN 提取每个元素作为 key</text>

    <path class="arrow" d="M220,52 L302,52"/>
    <rect class="box" x="302" y="0" width="254" height="104" fill="#ecfdf5"/>
    <text x="330" y="32" class="label">ginarrayextract()</text>
    <text x="330" y="58" class="small">deconstruct_array()</text>
    <text x="330" y="82" class="small">返回 Datum[] + null flags</text>

    <path class="arrow" d="M556,52 L636,52"/>
    <rect class="box" x="636" y="0" width="250" height="104" fill="#fef3c7"/>
    <text x="664" y="32" class="label">GIN posting list/tree</text>
    <text x="664" y="58" class="small">red -> TID...</text>
    <text x="664" y="82" class="small">hot -> TID... sql -> TID...</text>
  </g>

  <g transform="translate(74 258)">
    <rect class="box" x="0" y="0" width="190" height="148" fill="#fff"/>
    <text x="20" y="30" class="label">查询操作符</text>
    <text x="20" y="58" class="small">a &amp;&amp; q：任一非空元素命中</text>
    <text x="20" y="82" class="small">a @&gt; q：q 所有元素命中</text>
    <text x="20" y="106" class="small">a &lt;@ q：候选后复查</text>
    <text x="20" y="130" class="small">a = q：候选后复查</text>

    <path class="arrow" d="M190,74 L288,74"/>
    <rect class="box" x="288" y="0" width="236" height="148" fill="#eef2ff"/>
    <text x="314" y="30" class="label">ginqueryarrayextract()</text>
    <text x="314" y="58" class="small">按策略设置 searchMode</text>
    <text x="314" y="82" class="small">空数组有特殊语义</text>
    <text x="314" y="106" class="small">NULL 元素不等于普通元素</text>

    <path class="arrow" d="M524,74 L622,74"/>
    <rect class="box" x="622" y="0" width="236" height="148" fill="#fee2e2"/>
    <text x="648" y="30" class="label">ginarrayconsistent()</text>
    <text x="648" y="58" class="small">@&gt; / &amp;&amp; 可非 lossy 判断</text>
    <text x="648" y="82" class="small">&lt;@ / = 需要 recheck</text>
    <text x="648" y="106" class="small">最终仍受 MVCC 可见性约束</text>
  </g>

  <g transform="translate(78 452)">
    <rect x="0" y="0" width="824" height="56" fill="#fff" stroke="#cbd5e1" rx="8"/>
    <text x="18" y="24" class="small">源码依据：src/backend/access/gin/ginarrayproc.c；操作符族来自 pg_amop.dat 中 gin/array_ops。</text>
    <text x="18" y="44" class="small">建模含义：GIN 适合“元素集合过滤”，不适合按元素顺序、位置、数组整体频繁变更来承担明细关系。</text>
  </g>
</svg>
