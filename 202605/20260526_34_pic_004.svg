<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>array 统计信息与优化器选择率估算</title>
  <desc>展示 ANALYZE 如何为数组列收集常见元素和不同元素数量直方图，并供 arraycontsel 使用。</desc>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 13px sans-serif; fill: #374151; }
    .box { stroke: #334155; stroke-width: 1.4; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow4); }
  </style>
  <rect x="20" y="20" width="940" height="520" fill="#f8fafc" stroke="#cbd5e1" rx="10"/>
  <text x="44" y="58" class="title">优化器不是只看数组整体，也看数组元素分布</text>

  <g transform="translate(62 100)">
    <rect class="box" x="0" y="0" width="200" height="98" fill="#dbeafe"/>
    <text x="26" y="32" class="label">ANALYZE 采样行</text>
    <text x="26" y="58" class="small">跳过 NULL 数组</text>
    <text x="26" y="80" class="small">过宽数组不进入元素统计</text>

    <path class="arrow" d="M200,49 L282,49"/>
    <rect class="box" x="282" y="0" width="222" height="98" fill="#ecfdf5"/>
    <text x="306" y="32" class="label">array_typanalyze()</text>
    <text x="306" y="58" class="small">Lossy Counting 追踪常见元素</text>
    <text x="306" y="80" class="small">每行重复元素只算一次</text>

    <path class="arrow" d="M504,49 L586,49"/>
    <rect class="box" x="586" y="0" width="266" height="98" fill="#fef3c7"/>
    <text x="610" y="32" class="label">pg_statistic slots</text>
    <text x="610" y="58" class="small">MCELEM：最常见数组元素</text>
    <text x="610" y="80" class="small">DECHIST：每行不同元素数直方图</text>
  </g>

  <g transform="translate(74 264)">
    <rect class="box" x="0" y="0" width="214" height="118" fill="#fff"/>
    <text x="20" y="34" class="label">WHERE tags @&gt; '{sql}'</text>
    <text x="20" y="64" class="small">@&gt; 默认选择率 0.005</text>
    <text x="20" y="90" class="small">&amp;&amp; 默认选择率 0.01</text>

    <path class="arrow" d="M214,59 L322,59"/>
    <rect class="box" x="322" y="0" width="222" height="118" fill="#eef2ff"/>
    <text x="346" y="34" class="label">arraycontsel()</text>
    <text x="346" y="64" class="small">只处理 Var 与 Const</text>
    <text x="346" y="90" class="small">元素类型不一致则回退默认值</text>

    <path class="arrow" d="M544,59 L652,59"/>
    <rect class="box" x="652" y="0" width="214" height="118" fill="#fee2e2"/>
    <text x="676" y="34" class="label">路径选择</text>
    <text x="676" y="64" class="small">Seq Scan / Bitmap Scan</text>
    <text x="676" y="90" class="small">join 顺序与成本估算</text>
  </g>

  <g transform="translate(78 450)">
    <rect x="0" y="0" width="824" height="58" fill="#fff" stroke="#cbd5e1" rx="8"/>
    <text x="18" y="24" class="small">源码依据：array_typanalyze.c 产生 MCELEM/DECHIST；array_selfuncs.c 用它估算 @&gt;、&amp;&amp;、&lt;@。</text>
    <text x="18" y="46" class="small">工程含义：数组列的元素分布会影响计划质量；批量导入或分布改变后要及时 ANALYZE。</text>
  </g>
</svg>
