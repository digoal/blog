<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>array 建模边界决策图</title>
  <desc>用决策流程说明什么时候适合使用数组，什么时候应该拆成子表、JSONB 或全文检索结构。</desc>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #111827; }
    .small { font: 13px sans-serif; fill: #374151; }
    .box { stroke: #334155; stroke-width: 1.4; rx: 8; }
    .diamond { stroke: #334155; stroke-width: 1.4; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow5); }
  </style>
  <rect x="20" y="20" width="940" height="520" fill="#f8fafc" stroke="#cbd5e1" rx="10"/>
  <text x="44" y="58" class="title">建模边界：数组适合小而稳定的集合属性</text>

  <g transform="translate(80 105)">
    <rect class="box" x="300" y="0" width="250" height="66" fill="#dbeafe"/>
    <text x="338" y="30" class="label">一个字段有多个同类型值？</text>
    <text x="344" y="52" class="small">例如标签、候选渠道、季度数值</text>

    <path class="arrow" d="M425,66 L425,112"/>
    <polygon class="diamond" points="425,112 548,176 425,240 302,176" fill="#ecfdf5"/>
    <text x="352" y="170" class="label">元素是否小、数量可控、</text>
    <text x="370" y="194" class="label">整体更新为主？</text>

    <path class="arrow" d="M302,176 L170,176"/>
    <text x="214" y="160" class="small">否</text>
    <rect class="box" x="0" y="130" width="170" height="92" fill="#fee2e2"/>
    <text x="24" y="164" class="label">拆子表</text>
    <text x="18" y="190" class="small">需要单元素事务、外键、审计、</text>
    <text x="18" y="212" class="small">高频增删改或复杂 join</text>

    <path class="arrow" d="M548,176 L680,176"/>
    <text x="600" y="160" class="small">是</text>
    <rect class="box" x="680" y="130" width="170" height="92" fill="#fef3c7"/>
    <text x="720" y="164" class="label">考虑 array</text>
    <text x="700" y="190" class="small">用 CHECK 控边界</text>
    <text x="700" y="212" class="small">用 GIN 支持集合过滤</text>

    <path class="arrow" d="M425,240 L425,292"/>
    <polygon class="diamond" points="425,292 548,356 425,420 302,356" fill="#eef2ff"/>
    <text x="352" y="350" class="label">需要文档结构、键值差异</text>
    <text x="366" y="374" class="label">或全文语义吗？</text>

    <path class="arrow" d="M302,356 L170,356"/>
    <rect class="box" x="0" y="310" width="170" height="92" fill="#fff7ed"/>
    <text x="44" y="344" class="label">JSONB</text>
    <text x="18" y="370" class="small">结构不固定、键存在性、</text>
    <text x="18" y="392" class="small">嵌套文档检索</text>

    <path class="arrow" d="M548,356 L680,356"/>
    <rect class="box" x="680" y="310" width="170" height="92" fill="#f0fdf4"/>
    <text x="714" y="344" class="label">tsvector</text>
    <text x="700" y="370" class="small">分词、归一、权重、短语、</text>
    <text x="700" y="392" class="small">排名和全文检索</text>
  </g>

  <text x="92" y="500" class="small">判断口径：array 是单个 datum，不是关系模型里的子表；适合表达“这一行的有限集合属性”，不适合承担大规模明细关系。</text>
</svg>
