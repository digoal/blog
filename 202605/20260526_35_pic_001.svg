<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>range 的逻辑模型</title>
  <desc>展示 subtype、下界、上界、开闭边界、无限边界、empty 和 multirange 的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 600 18px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #334155; }
    .tiny { font: 13px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .accent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .line { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
    .axis { stroke: #111827; stroke-width: 3; }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; }
  </style>
  <rect x="24" y="24" width="912" height="472" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" rx="10"/>
  <text x="52" y="70" class="title">range = 有序 subtype 上的一段值域</text>
  <text x="52" y="104" class="small">subtype 必须有全序；range 在这个顺序上表达包含、重叠、相邻、左右关系。</text>

  <line x1="92" y1="210" x2="780" y2="210" class="axis"/>
  <line x1="120" y1="188" x2="120" y2="232" class="dash"/>
  <line x1="640" y1="188" x2="640" y2="232" class="dash"/>
  <circle cx="120" cy="210" r="13" fill="#2563eb"/>
  <circle cx="640" cy="210" r="13" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
  <line x1="120" y1="210" x2="640" y2="210" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
  <text x="96" y="170" class="label">[ lower</text>
  <text x="606" y="170" class="label">upper )</text>
  <text x="285" y="252" class="small">`[2010-01-01 14:30, 2010-01-01 15:30)`</text>
  <text x="802" y="216" class="small">subtype 顺序</text>

  <rect x="68" y="306" width="230" height="118" class="accent"/>
  <text x="92" y="342" class="label">开闭边界</text>
  <text x="92" y="374" class="small">`[` / `]` 包含端点</text>
  <text x="92" y="402" class="small">`(`/`)` 不包含端点</text>

  <rect x="362" y="306" width="230" height="118" class="box"/>
  <text x="386" y="342" class="label">无限边界</text>
  <text x="386" y="374" class="small">省略 lower 或 upper</text>
  <text x="386" y="402" class="small">表示特殊的无界端</text>

  <rect x="656" y="306" width="230" height="118" class="warn"/>
  <text x="680" y="342" class="label">empty / multirange</text>
  <text x="680" y="374" class="small">empty 没有上下界</text>
  <text x="680" y="402" class="small">multirange 是有序非连续片段</text>
</svg>
