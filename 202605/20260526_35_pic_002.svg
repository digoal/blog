<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img">
  <title>range 的物理存储布局</title>
  <desc>展示 RangeType varlena、rangetypid、可选上下界值和 flags 字节。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 600 17px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #334155; }
    .tiny { font: 13px sans-serif; fill: #475569; }
    .field { stroke: #334155; stroke-width: 2; rx: 7; }
    .line { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="24" width="912" height="492" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" rx="10"/>
  <text x="52" y="70" class="title">RangeType 是一个紧凑 varlena datum</text>
  <text x="52" y="104" class="small">源码注释：4 字节 varlena header + 4 字节 range type OID + 0 到 2 个 subtype 边界值 + 1 字节 flags。</text>

  <rect x="70" y="162" width="130" height="96" fill="#e0f2fe" class="field"/>
  <text x="94" y="202" class="label">vl_len_</text>
  <text x="96" y="232" class="tiny">总长度</text>

  <rect x="200" y="162" width="150" height="96" fill="#dcfce7" class="field"/>
  <text x="228" y="202" class="label">rangetypid</text>
  <text x="234" y="232" class="tiny">自身类型 OID</text>

  <rect x="350" y="162" width="205" height="96" fill="#fef3c7" class="field"/>
  <text x="389" y="202" class="label">lower value</text>
  <text x="384" y="232" class="tiny">按 subtype 对齐，可缺省</text>

  <rect x="555" y="162" width="205" height="96" fill="#fde68a" class="field"/>
  <text x="596" y="202" class="label">upper value</text>
  <text x="590" y="232" class="tiny">按 subtype 对齐，可缺省</text>

  <rect x="760" y="162" width="110" height="96" fill="#fee2e2" class="field"/>
  <text x="792" y="202" class="label">flags</text>
  <text x="784" y="232" class="tiny">1 字节位图</text>

  <path d="M 132 282 C 132 322, 112 340, 92 366" class="line"/>
  <path d="M 815 282 C 815 326, 790 346, 760 370" class="line"/>

  <rect x="70" y="370" width="330" height="96" fill="#f8fafc" stroke="#334155" stroke-width="2" rx="8"/>
  <text x="94" y="404" class="label">为什么不直接存两个列？</text>
  <text x="94" y="434" class="small">range 是一个单独 datum，可参与类型系统、函数、索引操作类、</text>
  <text x="94" y="458" class="small">统计信息和表达式化简。</text>

  <rect x="520" y="346" width="350" height="124" fill="#f8fafc" stroke="#334155" stroke-width="2" rx="8"/>
  <text x="544" y="380" class="label">flags 包含的状态</text>
  <text x="544" y="410" class="small">empty、lower/upper inclusive、lower/upper infinite</text>
  <text x="544" y="438" class="small">GiST 内部页还会用 contain-empty 标记子树含 empty。</text>
</svg>
