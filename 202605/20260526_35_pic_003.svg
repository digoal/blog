<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img">
  <title>range 规范化与操作符语义</title>
  <desc>展示离散 range 的 canonical 函数如何把等价表达统一为标准形式，以及操作符如何基于边界比较。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 600 17px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #334155; }
    .tiny { font: 13px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .orange { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .line { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="24" width="912" height="512" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" rx="10"/>
  <text x="52" y="70" class="title">离散 range 的核心：等价值必须规范化</text>
  <text x="52" y="104" class="small">int4range、int8range、daterange 使用 `[)` 作为内置 canonical 形式；连续 range 通常没有 canonical 函数。</text>

  <rect x="70" y="152" width="190" height="82" class="blue"/>
  <text x="96" y="186" class="label">用户输入</text>
  <text x="92" y="214" class="small">`[1,7]` 或 `(0,8)`</text>

  <path d="M 270 192 L 380 192" class="line"/>
  <rect x="390" y="152" width="210" height="82" class="orange"/>
  <text x="414" y="186" class="label">canonical 函数</text>
  <text x="414" y="214" class="small">调整开闭边界和端点</text>

  <path d="M 610 192 L 720 192" class="line"/>
  <rect x="730" y="152" width="160" height="82" class="green"/>
  <text x="764" y="186" class="label">标准值</text>
  <text x="770" y="214" class="small">`[1,8)`</text>

  <rect x="70" y="300" width="250" height="146" class="box"/>
  <text x="94" y="334" class="label">关系判断</text>
  <text x="94" y="364" class="small">`&amp;&amp;`：两个非空 range 有共同元素</text>
  <text x="94" y="392" class="small">`@>`：左边包含右边或元素</text>
  <text x="94" y="420" class="small">`-|-`：边界相邻</text>

  <rect x="356" y="300" width="250" height="146" class="box"/>
  <text x="380" y="334" class="label">代数运算</text>
  <text x="380" y="364" class="small">`*`：交集</text>
  <text x="380" y="392" class="small">`+`：并集，要求重叠或相邻</text>
  <text x="380" y="420" class="small">`-`：差集，结果必须仍是单 range</text>

  <rect x="642" y="300" width="250" height="146" class="box"/>
  <text x="666" y="334" class="label">排序与相等</text>
  <text x="666" y="364" class="small">B-tree 先比 lower，再比 upper</text>
  <text x="666" y="392" class="small">主要服务排序、hash、unique 内部需求</text>
  <text x="666" y="420" class="small">通常不适合业务上的大小排序</text>
</svg>
