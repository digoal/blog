<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img">
  <title>range 的 GiST 与 SP-GiST 索引路径</title>
  <desc>对比 GiST 用包围区间聚合子树，SP-GiST 把 range 映射为 lower/upper 二维点后按象限拆分。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 600 17px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #334155; }
    .tiny { font: 13px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .line { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
    .axis { stroke: #111827; stroke-width: 2.5; }
    .grid { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 6; }
  </style>
  <rect x="24" y="24" width="912" height="552" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" rx="10"/>
  <text x="52" y="70" class="title">range 查询的两条主索引路径</text>
  <text x="52" y="104" class="small">GiST 适合通用范围关系和 multirange；SP-GiST 只支持 range，用 lower/upper 的二维空间划分。</text>

  <rect x="60" y="140" width="390" height="380" class="box"/>
  <text x="84" y="176" class="label">GiST range_ops</text>
  <rect x="122" y="212" width="260" height="52" class="blue"/>
  <text x="172" y="245" class="small">父节点：super union</text>
  <path d="M 252 265 L 150 316" class="line"/>
  <path d="M 252 265 L 252 316" class="line"/>
  <path d="M 252 265 L 354 316" class="line"/>
  <rect x="88" y="320" width="124" height="62" class="green"/>
  <text x="111" y="356" class="tiny">子树 A</text>
  <text x="103" y="376" class="tiny">[1,20)</text>
  <rect x="222" y="320" width="124" height="62" class="green"/>
  <text x="245" y="356" class="tiny">子树 B</text>
  <text x="236" y="376" class="tiny">[18,50)</text>
  <rect x="356" y="320" width="66" height="62" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8"/>
  <text x="374" y="356" class="tiny">empty</text>
  <text x="86" y="430" class="small">consistent 用内部页谓词决定是否下探；</text>
  <text x="86" y="458" class="small">penalty/picksplit 依赖 subtype_diff 时更容易分裂得好。</text>

  <rect x="510" y="140" width="390" height="380" class="box"/>
  <text x="534" y="176" class="label">SP-GiST range_ops</text>
  <line x1="580" y1="440" x2="846" y2="440" class="axis"/>
  <line x1="580" y1="440" x2="580" y2="220" class="axis"/>
  <text x="812" y="468" class="tiny">lower</text>
  <text x="536" y="230" class="tiny">upper</text>
  <line x1="706" y1="440" x2="706" y2="220" class="grid"/>
  <line x1="580" y1="328" x2="846" y2="328" class="grid"/>
  <circle cx="706" cy="328" r="8" fill="#111827"/>
  <text x="718" y="320" class="tiny">centroid</text>
  <circle cx="650" cy="380" r="8" fill="#2563eb"/>
  <circle cx="760" cy="260" r="8" fill="#16a34a"/>
  <circle cx="632" cy="264" r="8" fill="#ea580c"/>
  <circle cx="778" cy="390" r="8" fill="#9333ea"/>
  <text x="722" y="274" class="tiny">1</text>
  <text x="724" y="396" class="tiny">2</text>
  <text x="640" y="396" class="tiny">3</text>
  <text x="640" y="274" class="tiny">4</text>
  <rect x="548" y="478" width="300" height="34" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="8"/>
  <text x="568" y="501" class="tiny">root 可有第 5 分支专门放 empty range</text>
</svg>
