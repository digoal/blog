<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" viewBox="0 0 960 580" role="img">
  <title>range 统计信息、优化器与约束路径</title>
  <desc>展示 ANALYZE 采集 bounds/length histogram 和 empty fraction，优化器估算选择率，执行层通过 GiST/exclusion 约束阻止重叠。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 600 17px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #334155; }
    .tiny { font: 13px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .orange { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .line { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="24" width="912" height="532" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" rx="10"/>
  <text x="52" y="70" class="title">range 的工程价值落在优化器与约束上</text>
  <text x="52" y="104" class="small">没有统计信息，范围查询容易退化为默认选择率；没有约束，业务侧很难可靠防止时间段冲突。</text>

  <rect x="64" y="154" width="190" height="92" class="blue"/>
  <text x="96" y="190" class="label">ANALYZE</text>
  <text x="88" y="218" class="small">采样 range 列</text>
  <path d="M 264 200 L 370 200" class="line"/>

  <rect x="380" y="132" width="230" height="136" class="box"/>
  <text x="404" y="166" class="label">pg_statistic 槽位</text>
  <text x="404" y="196" class="small">lower/upper bounds histogram</text>
  <text x="404" y="224" class="small">length histogram</text>
  <text x="404" y="252" class="small">empty fraction + null fraction</text>
  <path d="M 620 200 L 724 200" class="line"/>

  <rect x="734" y="154" width="160" height="92" class="green"/>
  <text x="766" y="190" class="label">rangesel</text>
  <text x="756" y="218" class="small">估算选择率</text>

  <rect x="80" y="348" width="230" height="122" class="orange"/>
  <text x="104" y="384" class="label">业务写入</text>
  <text x="104" y="414" class="small">预约、价格有效期、版本区间</text>
  <text x="104" y="442" class="small">希望同一实体不重叠</text>
  <path d="M 322 410 L 436 410" class="line"/>

  <rect x="446" y="348" width="208" height="122" class="box"/>
  <text x="470" y="384" class="label">GiST exclusion</text>
  <text x="470" y="414" class="small">`room WITH =`</text>
  <text x="470" y="442" class="small">`during WITH &amp;&amp;`</text>
  <path d="M 666 410 L 760 410" class="line"/>

  <rect x="770" y="348" width="124" height="122" class="green"/>
  <text x="795" y="384" class="label">结果</text>
  <text x="794" y="414" class="small">冲突拒绝</text>
  <text x="790" y="442" class="small">不冲突写入</text>
</svg>
