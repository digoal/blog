<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">PostGIS geometry 逻辑模型到物理表示</title>
  <desc id="desc">展示 geometry 列从业务对象、OGC 几何模型、typmod 约束到 GSERIALIZED 存储和索引摘要的映射关系。</desc>
  <style>
    .bg{fill:#f7f8fb}
    .box{fill:#ffffff;stroke:#2f3a4a;stroke-width:1.5;rx:8}
    .soft{fill:#eef6ff;stroke:#2f6fab;stroke-width:1.3;rx:8}
    .green{fill:#eef9f0;stroke:#2f7d42;stroke-width:1.3;rx:8}
    .warn{fill:#fff7e8;stroke:#b26b00;stroke-width:1.3;rx:8}
    .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#1f2937}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#374151}
    .tiny{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;fill:#4b5563}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#64748b;stroke-width:1.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="text" x="36" y="42">geometry 是“带坐标系统元数据的平面几何对象”，不是普通坐标字符串</text>

  <rect class="box" x="40" y="82" width="190" height="112"/>
  <text class="text" x="70" y="122">业务对象</text>
  <text class="small" x="70" y="153">门店、地块、路线</text>
  <text class="small" x="70" y="176">围栏、轨迹片段</text>

  <rect class="soft" x="280" y="72" width="210" height="132"/>
  <text class="text" x="318" y="112">OGC 几何模型</text>
  <text class="small" x="308" y="144">POINT / LINESTRING</text>
  <text class="small" x="308" y="168">POLYGON / MULTI*</text>
  <text class="small" x="308" y="192">GEOMETRYCOLLECTION</text>

  <rect class="warn" x="550" y="72" width="190" height="132"/>
  <text class="text" x="592" y="112">typmod 约束</text>
  <text class="small" x="580" y="144">类型：Point</text>
  <text class="small" x="580" y="168">维度：Z / M</text>
  <text class="small" x="580" y="192">SRID：4326</text>

  <rect class="green" x="790" y="82" width="150" height="112"/>
  <text class="text" x="826" y="122">SQL 列</text>
  <text class="small" x="818" y="153">geometry</text>
  <text class="small" x="818" y="176">(Point, 4326)</text>

  <path class="arrow" d="M230 138 H280"/>
  <path class="arrow" d="M490 138 H550"/>
  <path class="arrow" d="M740 138 H790"/>

  <rect class="soft" x="120" y="285" width="245" height="140"/>
  <text class="text" x="165" y="323">GSERIALIZED</text>
  <text class="small" x="150" y="355">varlena size + SRID</text>
  <text class="small" x="150" y="381">flags：Z/M/BBox/版本</text>
  <text class="small" x="150" y="407">递归几何数据 + 坐标数组</text>

  <rect class="box" x="425" y="285" width="230" height="140"/>
  <text class="text" x="474" y="323">LWGEOM 内存树</text>
  <text class="small" x="455" y="355">解析、构造、计算</text>
  <text class="small" x="455" y="381">按类型分派算法</text>
  <text class="small" x="455" y="407">必要时调用 GEOS/PROJ</text>

  <rect class="warn" x="715" y="285" width="205" height="140"/>
  <text class="text" x="758" y="323">索引摘要</text>
  <text class="small" x="745" y="355">2D：BOX2DF</text>
  <text class="small" x="745" y="381">ND：GIDX</text>
  <text class="small" x="745" y="407">先粗过滤，再精算</text>

  <path class="arrow" d="M865 194 V250 H242 V285"/>
  <path class="arrow" d="M365 355 H425"/>
  <path class="dash" d="M655 355 H715"/>
  <text class="tiny" x="705" y="250">存储和索引都围绕“元数据 + 边界框 + 坐标”展开</text>
</svg>
