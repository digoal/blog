<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">GSERIALIZED 二进制布局</title>
  <desc id="desc">展示 PostGIS geometry 的 GSERIALIZED 存储头部、可选边界框和递归几何内容。</desc>
  <style>
    .bg{fill:#f8fafc}
    .slot{stroke:#1f2937;stroke-width:1.4;rx:6}
    .s1{fill:#e8f2ff}.s2{fill:#eaf8ef}.s3{fill:#fff3dc}.s4{fill:#f1edff}.s5{fill:#ffecec}
    .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#111827}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#374151}
    .tiny{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;fill:#4b5563}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .line{stroke:#64748b;stroke-width:1.4;fill:none}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="540"/>
  <text class="text" x="36" y="42">GSERIALIZED：PostgreSQL varlena 里的紧凑空间对象</text>

  <rect class="slot s1" x="55" y="95" width="145" height="95"/>
  <text class="text" x="96" y="130">size</text>
  <text class="small" x="78" y="160">4 字节</text>
  <text class="tiny" x="75" y="182">兼容 varlena</text>

  <rect class="slot s2" x="200" y="95" width="145" height="95"/>
  <text class="text" x="248" y="130">srid</text>
  <text class="small" x="232" y="160">3 字节</text>
  <text class="tiny" x="222" y="182">生产数据常用</text>

  <rect class="slot s3" x="345" y="95" width="170" height="95"/>
  <text class="text" x="400" y="130">flags</text>
  <text class="small" x="374" y="160">Z / M / BBox</text>
  <text class="tiny" x="374" y="182">版本与扩展标志</text>

  <rect class="slot s4" x="515" y="95" width="190" height="95"/>
  <text class="text" x="565" y="130">可选 BBox</text>
  <text class="small" x="548" y="160">xmin/xmax...</text>
  <text class="tiny" x="548" y="182">小对象可省略</text>

  <rect class="slot s5" x="705" y="95" width="220" height="95"/>
  <text class="text" x="765" y="130">geometry data</text>
  <text class="small" x="736" y="160">类型、计数、坐标</text>
  <text class="tiny" x="736" y="182">递归集合，double 对齐</text>

  <path class="arrow" d="M125 210 V278"/>
  <path class="arrow" d="M430 210 V278"/>
  <path class="arrow" d="M815 210 V278"/>

  <rect class="slot s1" x="55" y="285" width="230" height="115"/>
  <text class="text" x="88" y="323">数据库存储层</text>
  <text class="small" x="82" y="355">TOAST / 页 / 行版本</text>
  <text class="small" x="82" y="381">依赖 size 判断 datum 长度</text>

  <rect class="slot s3" x="360" y="285" width="260" height="115"/>
  <text class="text" x="410" y="323">元数据快速读取</text>
  <text class="small" x="392" y="355">不必完整反序列化</text>
  <text class="small" x="392" y="381">可先取 SRID、维度、BBox</text>

  <rect class="slot s5" x="695" y="285" width="235" height="115"/>
  <text class="text" x="748" y="323">几何计算路径</text>
  <text class="small" x="728" y="355">转为 LWGEOM 内存结构</text>
  <text class="small" x="728" y="381">再做拓扑、测量、输出</text>

  <path class="line" d="M610 190 C612 235 620 258 690 300"/>
  <text class="tiny" x="350" y="455">设计取舍：把 SRID、维度、BBox 放在前面，换取过滤和元数据读取效率；BBox 可选，换取小对象空间。</text>
  <text class="tiny" x="350" y="480">坐标区保持 double 对齐，避免读取坐标时频繁复制和重新对齐。</text>
</svg>
