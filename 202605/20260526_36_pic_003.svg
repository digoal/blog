<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">geometry 输入、typmod 校验与序列化路径</title>
  <desc id="desc">展示 WKT、WKB、GeoJSON 输入如何经过解析、BBox 生成、typmod 校验并写入 geometry 列。</desc>
  <style>
    .bg{fill:#f7faf9}
    .box{fill:#ffffff;stroke:#263445;stroke-width:1.4;rx:8}
    .input{fill:#eef6ff;stroke:#2f6fab;stroke-width:1.4;rx:8}
    .check{fill:#fff7df;stroke:#a16207;stroke-width:1.4;rx:8}
    .ok{fill:#edf9f0;stroke:#2f7d42;stroke-width:1.4;rx:8}
    .bad{fill:#fff0f0;stroke:#b91c1c;stroke-width:1.4;rx:8}
    .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#111827}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#374151}
    .tiny{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;fill:#4b5563}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#64748b;stroke-width:1.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="text" x="36" y="42">写入 geometry 列时，PostGIS 先构造对象，再用 typmod 兜住建模边界</text>

  <rect class="input" x="45" y="100" width="175" height="120"/>
  <text class="text" x="92" y="136">输入</text>
  <text class="small" x="72" y="168">WKT / EWKT</text>
  <text class="small" x="72" y="192">WKB / EWKB</text>
  <text class="small" x="72" y="216">GeoJSON</text>

  <rect class="box" x="280" y="100" width="185" height="120"/>
  <text class="text" x="323" y="136">解析为 LWGEOM</text>
  <text class="small" x="306" y="168">语法和结构检查</text>
  <text class="small" x="306" y="192">读取或补充 SRID</text>

  <rect class="box" x="525" y="100" width="185" height="120"/>
  <text class="text" x="563" y="136">生成 BBox</text>
  <text class="small" x="550" y="168">对象需要时添加</text>
  <text class="small" x="550" y="192">供过滤和索引使用</text>

  <rect class="check" x="770" y="100" width="165" height="120"/>
  <text class="text" x="812" y="136">typmod</text>
  <text class="small" x="796" y="168">类型、SRID</text>
  <text class="small" x="796" y="192">Z/M 维度</text>

  <path class="arrow" d="M220 160 H280"/>
  <path class="arrow" d="M465 160 H525"/>
  <path class="arrow" d="M710 160 H770"/>

  <rect class="ok" x="225" y="330" width="220" height="110"/>
  <text class="text" x="270" y="366">可自动修正</text>
  <text class="small" x="252" y="397">无 SRID 可继承列 SRID</text>
  <text class="small" x="252" y="421">单对象可提升为 MULTI*</text>

  <rect class="bad" x="510" y="330" width="235" height="110"/>
  <text class="text" x="560" y="366">必须拒绝</text>
  <text class="small" x="538" y="397">SRID 不匹配</text>
  <text class="small" x="538" y="421">类型或 Z/M 维度不匹配</text>

  <rect class="ok" x="790" y="330" width="150" height="110"/>
  <text class="text" x="828" y="366">写入</text>
  <text class="small" x="815" y="397">GSERIALIZED</text>
  <text class="small" x="815" y="421">PostgreSQL 行</text>

  <path class="dash" d="M852 220 C850 285 390 260 335 330"/>
  <path class="dash" d="M852 220 C850 285 620 270 625 330"/>
  <path class="arrow" d="M745 385 H790"/>

  <text class="tiny" x="72" y="500">工程含义：`geometry(Point,4326)` 比裸 `geometry` 更适合生产表。错误数据尽早失败，优化器和客户端也能从 catalog 看到更明确的列语义。</text>
</svg>
