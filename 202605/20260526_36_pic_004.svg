<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">geometry 空间索引的两阶段过滤</title>
  <desc id="desc">展示 PostGIS geometry 查询如何通过 GiST、SP-GiST 或 BRIN 的边界框摘要先过滤候选，再执行精确空间谓词。</desc>
  <style>
    .bg{fill:#f8fafc}
    .box{fill:#ffffff;stroke:#2f3a4a;stroke-width:1.4;rx:8}
    .blue{fill:#e8f2ff;stroke:#2f6fab;stroke-width:1.4;rx:8}
    .green{fill:#eef9f0;stroke:#2f7d42;stroke-width:1.4;rx:8}
    .warn{fill:#fff7e8;stroke:#b26b00;stroke-width:1.4;rx:8}
    .bad{fill:#fff0f0;stroke:#b91c1c;stroke-width:1.4;rx:8}
    .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#111827}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#374151}
    .tiny{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;fill:#4b5563}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="text" x="36" y="42">空间查询不是直接拿所有 geometry 做精确计算，而是先用边界框缩小候选集</text>

  <rect class="blue" x="45" y="95" width="205" height="120"/>
  <text class="text" x="82" y="132">SQL 谓词</text>
  <text class="small" x="72" y="164">ST_Intersects</text>
  <text class="small" x="72" y="188">ST_DWithin</text>
  <text class="small" x="72" y="212">geom &amp;&amp; envelope</text>

  <rect class="warn" x="315" y="70" width="285" height="170"/>
  <text class="text" x="370" y="110">索引摘要层</text>
  <text class="small" x="345" y="145">GiST：R-tree 风格 BBox 树</text>
  <text class="small" x="345" y="171">SP-GiST：象限/分区树</text>
  <text class="small" x="345" y="197">BRIN：block range inclusion</text>
  <text class="tiny" x="345" y="222">2D 用 BOX2DF；3D/ND 用 GIDX</text>

  <rect class="green" x="665" y="95" width="240" height="120"/>
  <text class="text" x="715" y="132">候选行版本</text>
  <text class="small" x="695" y="164">可能命中，不保证命中</text>
  <text class="small" x="695" y="188">数量取决于数据分布</text>

  <path class="arrow" d="M250 155 H315"/>
  <path class="arrow" d="M600 155 H665"/>

  <rect class="box" x="135" y="330" width="235" height="120"/>
  <text class="text" x="180" y="366">精确计算层</text>
  <text class="small" x="165" y="398">GEOS / liblwgeom</text>
  <text class="small" x="165" y="422">拓扑谓词、距离、覆盖</text>

  <rect class="bad" x="455" y="330" width="205" height="120"/>
  <text class="text" x="500" y="366">剔除误命中</text>
  <text class="small" x="485" y="398">BBox 相交但几何不相交</text>
  <text class="small" x="485" y="422">大对象越多越常见</text>

  <rect class="green" x="745" y="330" width="160" height="120"/>
  <text class="text" x="790" y="366">结果集</text>
  <text class="small" x="775" y="398">真实满足谓词</text>
  <text class="small" x="775" y="422">返回给执行器</text>

  <path class="arrow" d="M785 215 C785 285 252 260 252 330"/>
  <path class="arrow" d="M370 390 H455"/>
  <path class="arrow" d="M660 390 H745"/>

  <text class="tiny" x="80" y="505">性能判断：索引扫描返回候选越少、误命中越低，收益越大。空间相关性差的大追加表可考虑 BRIN；普通二维范围和 KNN 优先 GiST。</text>
</svg>
