<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">geography 输入、校验与序列化路径</title>
  <desc id="desc">展示 WKT、WKB、geometry 转 geography 时经过解析、经纬度 SRID 校验、地理坐标归一化、typmod 校验和 GSERIALIZED 序列化。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .check { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .out { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; rx: 8; }
    .label { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="56" width="150" height="88" class="box"/>
  <text x="105" y="92" text-anchor="middle" class="label">输入</text>
  <text x="105" y="120" text-anchor="middle" class="small">WKT / EWKB</text>
  <text x="105" y="140" text-anchor="middle" class="small">geometry cast</text>

  <rect x="230" y="56" width="160" height="88" class="box"/>
  <text x="310" y="92" text-anchor="middle" class="label">解析为 LWGEOM</text>
  <text x="310" y="120" text-anchor="middle" class="small">保留类型、坐标、SRID</text>

  <rect x="440" y="40" width="185" height="120" class="check"/>
  <text x="532" y="80" text-anchor="middle" class="label">地理坐标校验</text>
  <text x="532" y="110" text-anchor="middle" class="small">SRID 必须是经纬度坐标系</text>
  <text x="532" y="132" text-anchor="middle" class="small">坐标贴近边界则 nudge</text>

  <rect x="675" y="56" width="150" height="88" class="warn"/>
  <text x="750" y="92" text-anchor="middle" class="label">类型约束</text>
  <text x="750" y="120" text-anchor="middle" class="small">POINT / LINE / POLYGON</text>
  <text x="750" y="140" text-anchor="middle" class="small">无曲线类型</text>

  <rect x="230" y="244" width="160" height="90" class="check"/>
  <text x="310" y="282" text-anchor="middle" class="label">设置 geodetic</text>
  <text x="310" y="310" text-anchor="middle" class="small">默认 SRID 4326</text>

  <rect x="440" y="244" width="185" height="90" class="check"/>
  <text x="532" y="282" text-anchor="middle" class="label">typmod 校验</text>
  <text x="532" y="310" text-anchor="middle" class="small">类型、维度、SRID 一致</text>

  <rect x="675" y="244" width="150" height="90" class="out"/>
  <text x="750" y="282" text-anchor="middle" class="label">GSERIALIZED</text>
  <text x="750" y="310" text-anchor="middle" class="small">写入 PostgreSQL 行</text>

  <path d="M180 100 H230" class="arrow"/>
  <path d="M390 100 H440" class="arrow"/>
  <path d="M625 100 H675" class="arrow"/>
  <path d="M750 144 V202 H310 V244" class="arrow"/>
  <path d="M390 289 H440" class="arrow"/>
  <path d="M625 289 H675" class="arrow"/>

  <text x="495" y="386" text-anchor="middle" class="small">关键点：geography 不是普通经纬度文本，而是带 geodetic 标志、经纬度 SRID 校验和列级 typmod 契约的空间类型。</text>
</svg>
