<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">geometry 与 geography 的测量模型差异</title>
  <desc id="desc">对比平面直线距离、球面大圆弧和椭球测地线三种测量模型，并说明精度与 CPU 代价的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .earth { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .ellipse { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
    .line { stroke: #dc2626; stroke-width: 3; fill: none; }
    .arc { stroke: #16a34a; stroke-width: 3; fill: none; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .axis { stroke: #94a3b8; stroke-width: 1.2; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="35" y="45" width="270" height="290" class="panel"/>
  <text x="170" y="78" text-anchor="middle" class="text">geometry：平面</text>
  <line x1="82" y1="250" x2="260" y2="250" class="axis"/>
  <line x1="82" y1="250" x2="82" y2="110" class="axis"/>
  <circle cx="110" cy="220" r="6" fill="#dc2626"/>
  <circle cx="250" cy="130" r="6" fill="#dc2626"/>
  <line x1="110" y1="220" x2="250" y2="130" class="line"/>
  <text x="170" y="282" text-anchor="middle" class="small">直线距离，单位取决于 SRID</text>
  <text x="170" y="304" text-anchor="middle" class="small">4326 下通常是“度”，不是米</text>

  <rect x="355" y="45" width="270" height="290" class="panel"/>
  <text x="490" y="78" text-anchor="middle" class="text">geography：球面</text>
  <circle cx="490" cy="185" r="88" class="earth"/>
  <path d="M425 225 C460 130, 535 120, 560 180" class="arc"/>
  <circle cx="425" cy="225" r="6" fill="#16a34a"/>
  <circle cx="560" cy="180" r="6" fill="#16a34a"/>
  <text x="490" y="282" text-anchor="middle" class="small">大圆弧，速度较快</text>
  <text x="490" y="304" text-anchor="middle" class="small">`use_spheroid=false` 或 KNN 常用</text>

  <rect x="675" y="45" width="270" height="290" class="panel"/>
  <text x="810" y="78" text-anchor="middle" class="text">geography：椭球</text>
  <ellipse cx="810" cy="185" rx="100" ry="82" class="ellipse"/>
  <path d="M742 225 C775 120, 860 115, 890 178" class="arc"/>
  <circle cx="742" cy="225" r="6" fill="#0891b2"/>
  <circle cx="890" cy="178" r="6" fill="#0891b2"/>
  <text x="810" y="282" text-anchor="middle" class="small">测地线，默认更准确</text>
  <text x="810" y="304" text-anchor="middle" class="small">距离、面积、长度单位为米</text>

  <path d="M185 370 H780" class="arrow"/>
  <text x="485" y="396" text-anchor="middle" class="small">一般趋势：平面最快但可能语义错误；球面近似更快；椭球默认更准确但 CPU 更贵。</text>
</svg>
