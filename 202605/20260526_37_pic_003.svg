<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">geography 索引的粗过滤与精确复核</title>
  <desc id="desc">展示 GiST 或 BRIN 先使用 gidx 边界摘要做重叠或距离过滤，再对候选行执行 spheroid 或 sphere 精确计算。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .idx { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; rx: 8; }
    .cand { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .grid { stroke: #cbd5e1; stroke-width: 1; fill: none; }
    .query { fill: none; stroke: #dc2626; stroke-width: 2.5; stroke-dasharray: 7 5; }
    .gidx { fill: rgba(67,56,202,0.12); stroke: #4338ca; stroke-width: 2; }
  </style>

  <rect x="35" y="55" width="210" height="92" class="box"/>
  <text x="140" y="92" text-anchor="middle" class="text">SQL 谓词</text>
  <text x="140" y="122" text-anchor="middle" class="small">ST_DWithin / &amp;&amp; / &lt;-&gt;</text>

  <rect x="300" y="42" width="230" height="118" class="idx"/>
  <text x="415" y="80" text-anchor="middle" class="text">索引摘要</text>
  <text x="415" y="112" text-anchor="middle" class="small">GiST：gidx box tree</text>
  <text x="415" y="134" text-anchor="middle" class="small">BRIN：page range gidx</text>

  <rect x="585" y="55" width="175" height="92" class="cand"/>
  <text x="672" y="92" text-anchor="middle" class="text">候选行</text>
  <text x="672" y="122" text-anchor="middle" class="small">可能命中，需复核</text>

  <rect x="800" y="55" width="145" height="92" class="ok"/>
  <text x="872" y="92" text-anchor="middle" class="text">精确结果</text>
  <text x="872" y="122" text-anchor="middle" class="small">球面/椭球计算</text>

  <path d="M245 101 H300" class="arrow"/>
  <path d="M530 101 H585" class="arrow"/>
  <path d="M760 101 H800" class="arrow"/>

  <rect x="80" y="220" width="330" height="150" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
  <path d="M80 270 H410 M80 320 H410 M135 220 V370 M190 220 V370 M245 220 V370 M300 220 V370 M355 220 V370" class="grid"/>
  <rect x="160" y="250" width="130" height="70" class="query"/>
  <rect x="112" y="240" width="60" height="45" class="gidx"/>
  <rect x="205" y="255" width="70" height="60" class="gidx"/>
  <rect x="325" y="300" width="45" height="45" class="gidx"/>
  <text x="245" y="396" text-anchor="middle" class="small">gidx 只能证明“不相交的排除”，不能替代真实 geography 计算。</text>

  <rect x="535" y="215" width="365" height="160" class="box"/>
  <text x="718" y="252" text-anchor="middle" class="text">为什么要 recheck？</text>
  <text x="718" y="286" text-anchor="middle" class="small">索引保存的是球面边界摘要，不是完整线/面。</text>
  <text x="718" y="314" text-anchor="middle" class="small">GiST KNN 的 index distance 是 box-to-box 下界。</text>
  <text x="718" y="342" text-anchor="middle" class="small">叶子节点命中后还要计算真实距离或关系。</text>
</svg>
