<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">选择 geography、geometry 或投影 geometry 的决策路径</title>
  <desc id="desc">展示业务范围、单位、函数能力、性能和投影知识如何影响空间数据类型选择。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .start { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .geo { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; rx: 8; }
    .geog { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="370" y="30" width="240" height="80" class="start"/>
  <text x="490" y="62" text-anchor="middle" class="text">空间数据建模</text>
  <text x="490" y="90" text-anchor="middle" class="small">经纬度、距离、范围、关系</text>

  <rect x="70" y="170" width="250" height="95" class="geo"/>
  <text x="195" y="205" text-anchor="middle" class="text">小范围、本地业务</text>
  <text x="195" y="235" text-anchor="middle" class="small">选合适投影后用 geometry</text>
  <text x="195" y="256" text-anchor="middle" class="small">函数多，性能好，单位可控</text>

  <rect x="365" y="170" width="250" height="95" class="geog"/>
  <text x="490" y="205" text-anchor="middle" class="text">全球或跨区域</text>
  <text x="490" y="235" text-anchor="middle" class="small">用 geography 存 lon/lat</text>
  <text x="490" y="256" text-anchor="middle" class="small">距离/面积/长度以米返回</text>

  <rect x="660" y="170" width="250" height="95" class="warn"/>
  <text x="785" y="205" text-anchor="middle" class="text">复杂空间处理</text>
  <text x="785" y="235" text-anchor="middle" class="small">转 geometry 做叠加/拓扑/编辑</text>
  <text x="785" y="256" text-anchor="middle" class="small">必要时再转回 geography</text>

  <rect x="205" y="325" width="570" height="70" class="start"/>
  <text x="490" y="354" text-anchor="middle" class="text">生产建议</text>
  <text x="490" y="382" text-anchor="middle" class="small">原始 lon/lat 可保留 geography；高频局部计算可增加投影 geometry 派生列。</text>

  <path d="M450 110 C390 135, 295 145, 210 170" class="arrow"/>
  <path d="M490 110 V170" class="arrow"/>
  <path d="M530 110 C590 135, 685 145, 770 170" class="arrow"/>
  <path d="M195 265 C250 302, 315 315, 390 325" class="arrow"/>
  <path d="M490 265 V325" class="arrow"/>
  <path d="M785 265 C730 302, 665 315, 590 325" class="arrow"/>
</svg>
