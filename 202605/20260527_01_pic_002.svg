<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">RUM 页面与 tuple 布局</title>
  <desc id="desc">展示 RUM metapage、entry tree、leaf entry tuple、posting list、posting tree data page 的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35536b"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #17324d; }
    .label { font: 600 15px sans-serif; fill: #1f3346; }
    .text { font: 13px sans-serif; fill: #243447; }
    .small { font: 12px sans-serif; fill: #52697f; }
    .page { fill: #f7fbff; stroke: #8aa8c2; stroke-width: 1.5; rx: 8; }
    .entry { fill: #e8f2ff; stroke: #5b8dc9; }
    .data { fill: #eaf7f0; stroke: #4c9f70; }
    .meta { fill: #fff3d8; stroke: #d49b35; }
    .tuple { fill: #ffffff; stroke: #93a4b5; }
    .line { stroke: #35536b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="36" y="42" class="title">RUM 物理结构：entry tree 找 key，posting list/tree 承载 TID 与 addInfo</text>

  <rect x="40" y="86" width="190" height="126" class="page meta"/>
  <text x="62" y="116" class="label">Block 0: metapage</text>
  <text x="62" y="144" class="text">rumVersion</text>
  <text x="62" y="166" class="text">nTotalPages</text>
  <text x="62" y="188" class="text">nEntryPages / nDataPages</text>
  <text x="62" y="210" class="small">pending 字段保留，源码注释为 unused</text>

  <rect x="320" y="72" width="300" height="160" class="page entry"/>
  <text x="342" y="103" class="label">Block 1 起：entry tree</text>
  <rect x="348" y="124" width="226" height="34" class="tuple"/>
  <text x="365" y="146" class="text">IndexTuple: key=postgres, downlink</text>
  <rect x="348" y="172" width="226" height="34" class="tuple"/>
  <text x="365" y="194" class="text">IndexTuple: key=rum, downlink</text>

  <rect x="690" y="86" width="230" height="126" class="page entry"/>
  <text x="712" y="116" class="label">entry leaf tuple</text>
  <text x="712" y="145" class="text">key + null category</text>
  <text x="712" y="168" class="text">posting offset 或 posting root</text>
  <text x="712" y="191" class="small">RUM_TREE_POSTING = 0xffff</text>

  <path d="M230 148 H314" class="line"/>
  <path d="M620 150 H684" class="line"/>

  <rect x="118" y="322" width="250" height="156" class="page data"/>
  <text x="140" y="352" class="label">小集合：posting list 内联</text>
  <rect x="145" y="376" width="198" height="30" class="tuple"/>
  <text x="160" y="396" class="text">RumItem: ctid=(0,7), addInfo</text>
  <rect x="145" y="416" width="198" height="30" class="tuple"/>
  <text x="160" y="436" class="text">RumItem: ctid=(3,12), addInfo</text>
  <text x="145" y="466" class="small">读一个 entry tuple 即可拿到短 posting</text>

  <rect x="570" y="300" width="320" height="190" class="page data"/>
  <text x="592" y="330" class="label">大集合：posting tree data pages</text>
  <rect x="600" y="354" width="250" height="34" class="tuple"/>
  <text x="616" y="376" class="text">right bound: RumItem</text>
  <rect x="600" y="402" width="250" height="34" class="tuple"/>
  <text x="616" y="424" class="text">internal: RumPostingItem(child, RumItem)</text>
  <rect x="600" y="450" width="250" height="34" class="tuple"/>
  <text x="616" y="472" class="text">leaf: variable-byte RumItem stream</text>

  <path d="M760 214 C680 265 455 268 346 324" class="line"/>
  <path d="M824 214 C850 256 842 278 804 300" class="line"/>
  <text x="388" y="530" class="small">核心判断：posting 能放入 leaf tuple 就内联，放不下就转成独立 posting tree。</text>
</svg>
