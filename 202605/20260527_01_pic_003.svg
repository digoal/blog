<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">RUM 构建与插入路径</title>
  <desc id="desc">展示 rumbuild 和 ruminsert 如何抽取 entry、聚合、写入 entry tree，并在 posting list 过大时转成 posting tree。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35536b"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #17324d; }
    .label { font: 600 15px sans-serif; fill: #1f3346; }
    .text { font: 13px sans-serif; fill: #243447; }
    .small { font: 12px sans-serif; fill: #52697f; }
    .box { fill: #f7fbff; stroke: #8aa8c2; stroke-width: 1.5; rx: 8; }
    .hot { fill: #eaf7f0; stroke: #4c9f70; }
    .warn { fill: #fff3d8; stroke: #d49b35; }
    .line { stroke: #35536b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect width="980" height="500" fill="#ffffff"/>
  <text x="36" y="42" class="title">写入路径：一行先拆成多个 entry，再决定 posting list 还是 posting tree</text>

  <rect x="50" y="95" width="150" height="70" class="box"/>
  <text x="82" y="124" class="label">heap tuple</text>
  <text x="72" y="146" class="text">tsvector / array / 标量</text>

  <rect x="255" y="95" width="180" height="70" class="box"/>
  <text x="288" y="124" class="label">rumExtractEntries()</text>
  <text x="278" y="146" class="text">调用 opclass extractValue</text>

  <rect x="500" y="78" width="180" height="104" class="box hot"/>
  <text x="536" y="108" class="label">build 阶段</text>
  <text x="520" y="132" class="text">BuildAccumulator</text>
  <text x="520" y="154" class="text">red-black tree 聚合</text>
  <text x="520" y="176" class="small">减少随机写</text>

  <rect x="500" y="230" width="180" height="82" class="box warn"/>
  <text x="535" y="260" class="label">单行插入</text>
  <text x="520" y="284" class="text">rumHeapTupleInsert()</text>
  <text x="520" y="304" class="small">直接维护主结构</text>

  <rect x="735" y="148" width="170" height="82" class="box"/>
  <text x="770" y="178" class="label">rumEntryInsert()</text>
  <text x="756" y="202" class="text">定位 entry tree</text>
  <text x="756" y="222" class="text">更新 leaf tuple</text>

  <rect x="180" y="365" width="230" height="70" class="box hot"/>
  <text x="214" y="394" class="label">posting list 仍能放下</text>
  <text x="208" y="416" class="text">addItemPointersToLeafTuple()</text>

  <rect x="570" y="365" width="230" height="70" class="box warn"/>
  <text x="604" y="394" class="label">posting list 放不下</text>
  <text x="617" y="416" class="text">createPostingTree()</text>

  <path d="M200 130 H249" class="line"/>
  <path d="M435 130 H494" class="line"/>
  <path d="M435 130 C465 205 465 245 494 270" class="line"/>
  <path d="M680 130 C710 135 720 154 730 178" class="line"/>
  <path d="M680 270 C720 262 725 231 735 205" class="line"/>
  <path d="M820 231 C790 305 528 328 410 370" class="line"/>
  <path d="M820 231 C810 306 760 340 720 365" class="line"/>

  <text x="56" y="470" class="small">RUM 源码使用 PostgreSQL generic WAL 写入页面变化；相比 GIN，附加信息会增加写入与 WAL 成本。</text>
</svg>
