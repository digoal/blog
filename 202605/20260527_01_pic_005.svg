<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">RUM 运维边界和选型决策</title>
  <desc id="desc">展示 RUM 的收益和成本如何随查询需求、写入强度、附加信息类型、VACUUM 和 Top-N 场景变化。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35536b"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #17324d; }
    .label { font: 600 15px sans-serif; fill: #1f3346; }
    .text { font: 13px sans-serif; fill: #243447; }
    .small { font: 12px sans-serif; fill: #52697f; }
    .box { fill: #f7fbff; stroke: #8aa8c2; stroke-width: 1.5; rx: 8; }
    .yes { fill: #eaf7f0; stroke: #4c9f70; }
    .no { fill: #ffecec; stroke: #cf6b6b; }
    .warn { fill: #fff3d8; stroke: #d49b35; }
    .line { stroke: #35536b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="36" y="42" class="title">RUM 的边界：把排序线索放进索引，换来更重的维护</text>

  <rect x="70" y="85" width="220" height="86" class="box"/>
  <text x="96" y="116" class="label">查询是否需要附加信息？</text>
  <text x="100" y="142" class="text">排名、短语、timestamp 距离</text>

  <rect x="410" y="70" width="220" height="86" class="yes"/>
  <text x="454" y="101" class="label">是：优先评估 RUM</text>
  <text x="435" y="127" class="text">addInfo 降低回表和排序成本</text>

  <rect x="410" y="190" width="220" height="86" class="no"/>
  <text x="450" y="221" class="label">否：GIN 通常更简单</text>
  <text x="435" y="247" class="text">只做包含/成员过滤时成本更低</text>

  <rect x="730" y="70" width="190" height="86" class="warn"/>
  <text x="755" y="101" class="label">检查附加列类型</text>
  <text x="750" y="127" class="text">order_by_attach 不支持</text>
  <text x="750" y="147" class="text">pass-by-reference 类型</text>

  <rect x="80" y="320" width="190" height="86" class="warn"/>
  <text x="112" y="351" class="label">写入与 WAL 成本</text>
  <text x="104" y="377" class="text">posting 多存 addInfo</text>
  <text x="104" y="397" class="text">generic WAL 更重</text>

  <rect x="315" y="320" width="190" height="86" class="warn"/>
  <text x="347" y="351" class="label">VACUUM 成本</text>
  <text x="340" y="377" class="text">清 posting list/tree</text>
  <text x="340" y="397" class="text">刷新统计信息</text>

  <rect x="550" y="320" width="190" height="86" class="yes"/>
  <text x="580" y="351" class="label">Top-N 读收益</text>
  <text x="575" y="377" class="text">可按距离早返回</text>
  <text x="575" y="397" class="text">减少全量排序</text>

  <rect x="785" y="320" width="140" height="86" class="no"/>
  <text x="815" y="351" class="label">不适合</text>
  <text x="805" y="377" class="text">高频更新</text>
  <text x="805" y="397" class="text">低选择性热词</text>

  <path d="M290 128 H404" class="line"/>
  <path d="M290 128 C340 165 350 212 404 232" class="line"/>
  <path d="M630 113 H724" class="line"/>
  <path d="M520 156 C480 230 250 285 186 320" class="line"/>
  <path d="M520 156 C500 240 430 280 410 320" class="line"/>
  <path d="M630 113 C690 205 670 280 650 320" class="line"/>
  <path d="M825 156 C850 220 854 270 855 320" class="line"/>
  <text x="80" y="470" class="small">判断顺序：先看查询语义，再看写入强度和附加信息类型，最后用 EXPLAIN 和 page inspect 验证真实收益。</text>
</svg>
