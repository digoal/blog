<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">protobuf wire format 的字段编码结构</title>
  <desc id="desc">展示一个 protobuf message 如何被编码为字段 key、wire type、长度和值的连续字节流。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #536171; }
    .box { stroke: #26364a; stroke-width: 1.4; rx: 7; }
    .line { stroke: #536171; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .brace { stroke: #536171; stroke-width: 1.4; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#536171"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1060" height="480" fill="#ffffff" stroke="#d8dee8"/>
  <text x="48" y="62" class="title">protobuf：不是“行格式”，而是字段级二进制 wire format</text>

  <rect x="60" y="105" width="980" height="88" class="box" fill="#eef5ff"/>
  <text x="84" y="138" class="label">Message 字节流</text>
  <text x="84" y="168" class="small">字段按 tag 编码连续出现；未出现的字段不占空间；重复字段可以多次出现或 packed。</text>

  <rect x="90" y="245" width="120" height="82" class="box" fill="#f5fbf7"/>
  <text x="112" y="279" class="label">key</text>
  <text x="102" y="305" class="small">field_number</text>
  <text x="125" y="323" class="tiny">+ wire_type</text>

  <rect x="210" y="245" width="150" height="82" class="box" fill="#fff7e8"/>
  <text x="238" y="279" class="label">value</text>
  <text x="232" y="305" class="small">varint / fixed</text>
  <text x="238" y="323" class="tiny">按 wire type 解释</text>

  <rect x="430" y="245" width="120" height="82" class="box" fill="#f5fbf7"/>
  <text x="452" y="279" class="label">key</text>
  <text x="442" y="305" class="small">field_number</text>
  <text x="465" y="323" class="tiny">+ wire_type</text>

  <rect x="550" y="245" width="110" height="82" class="box" fill="#f7efff"/>
  <text x="574" y="279" class="label">len</text>
  <text x="570" y="305" class="small">varint</text>
  <text x="568" y="323" class="tiny">字节长度</text>

  <rect x="660" y="245" width="205" height="82" class="box" fill="#fff7e8"/>
  <text x="716" y="279" class="label">payload</text>
  <text x="690" y="305" class="small">string / bytes / 子消息</text>
  <text x="705" y="323" class="tiny">长度限定载荷</text>

  <rect x="910" y="245" width="75" height="82" class="box" fill="#eef5ff"/>
  <text x="932" y="279" class="label">...</text>
  <text x="927" y="305" class="small">下一字段</text>

  <path d="M150 193 L150 238" class="line"/>
  <path d="M285 193 L285 238" class="line"/>
  <path d="M490 193 L490 238" class="line"/>
  <path d="M605 193 L605 238" class="line"/>
  <path d="M762 193 L762 238" class="line"/>
  <path d="M947 193 L947 238" class="line"/>

  <path d="M90 365 Q225 405 360 365" class="brace"/>
  <text x="142" y="424" class="small">字段 A：适合稀疏、可演进消息</text>

  <path d="M430 365 Q647 425 865 365" class="brace"/>
  <text x="520" y="458" class="small">字段 B：length-delimited 载荷能嵌套 bytes 或子消息</text>

  <text x="60" y="480" class="tiny">数据库落盘时还需要额外解决：页内寻址、MVCC、校验、压缩块边界、类型 OID、schema 演进和随机访问。</text>
</svg>
