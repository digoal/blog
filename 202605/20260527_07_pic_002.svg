<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">数据库页中保存二进制序列化载荷的层次</title>
  <desc id="desc">展示 protobuf 或其他二进制载荷进入数据库页后，还需要 tuple header、varlena、TOAST 和索引元数据。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; fill: #536171; }
    .box { stroke: #26364a; stroke-width: 1.3; rx: 7; }
    .line { stroke: #536171; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#536171"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="520" fill="#fff" stroke="#d8dee8"/>
  <text x="48" y="62" class="title">把 protobuf 放进数据库：wire format 只是载荷，不是完整存储引擎</text>

  <rect x="60" y="105" width="230" height="92" class="box" fill="#eef5ff"/>
  <text x="84" y="138" class="label">应用对象</text>
  <text x="84" y="166" class="small">message / struct / event</text>

  <rect x="360" y="105" width="270" height="92" class="box" fill="#fff7e8"/>
  <text x="385" y="138" class="label">二进制序列化载荷</text>
  <text x="385" y="166" class="small">protobuf bytes / Avro / FlatBuffers</text>

  <rect x="700" y="105" width="330" height="92" class="box" fill="#f5fbf7"/>
  <text x="725" y="138" class="label">数据库类型系统</text>
  <text x="725" y="166" class="small">bytea / 自定义类型 / columnar vector</text>

  <path d="M290 151 L350 151" class="line"/>
  <path d="M630 151 L690 151" class="line"/>

  <rect x="60" y="260" width="980" height="195" class="box" fill="#f8fafc"/>
  <text x="84" y="292" class="label">PostgreSQL heap page / TOAST / compressed chunk</text>

  <rect x="94" y="322" width="140" height="82" class="box" fill="#e9eef6"/>
  <text x="114" y="350" class="label">page header</text>
  <text x="116" y="377" class="small">LSN / checksum</text>

  <rect x="250" y="322" width="130" height="82" class="box" fill="#edf7ff"/>
  <text x="274" y="350" class="label">line ptr</text>
  <text x="272" y="377" class="small">页内定位</text>

  <rect x="396" y="322" width="150" height="82" class="box" fill="#fff4df"/>
  <text x="420" y="350" class="label">tuple header</text>
  <text x="416" y="377" class="small">MVCC / null bitmap</text>

  <rect x="562" y="322" width="140" height="82" class="box" fill="#f7efff"/>
  <text x="590" y="350" class="label">varlena</text>
  <text x="584" y="377" class="small">长度 / toast 指针</text>

  <rect x="718" y="322" width="170" height="82" class="box" fill="#f5fbf7"/>
  <text x="748" y="350" class="label">payload bytes</text>
  <text x="744" y="377" class="small">protobuf 或压缩载荷</text>

  <rect x="904" y="322" width="110" height="82" class="box" fill="#fff7e8"/>
  <text x="929" y="350" class="label">index</text>
  <text x="922" y="377" class="small">可选投影</text>

  <text x="86" y="488" class="tiny">关键取舍：protobuf 负责字段编码和 schema 演进；数据库负责页管理、事务可见性、索引、压缩块边界、统计信息和恢复。</text>
</svg>
