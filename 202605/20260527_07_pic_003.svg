<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="590" viewBox="0 0 1160 590" role="img" aria-labelledby="title desc">
  <title id="title">TimescaleDB 压缩 chunk 的行到列批次转换</title>
  <desc id="desc">展示未压缩 hypertable 行被按 segmentby 和 orderby 组织为压缩 chunk 中的一行批次。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; fill: #536171; }
    .box { stroke: #26364a; stroke-width: 1.3; rx: 7; }
    .line { stroke: #536171; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#536171"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1120" height="550" fill="#fff" stroke="#d8dee8"/>
  <text x="48" y="62" class="title">TimescaleDB 样本：不是 protobuf，而是自定义 `compressed_data` 批次格式</text>

  <rect x="60" y="110" width="330" height="350" class="box" fill="#eef5ff"/>
  <text x="90" y="142" class="label">未压缩 chunk：行存</text>
  <rect x="90" y="170" width="270" height="46" class="box" fill="#fff"/>
  <text x="108" y="198" class="small">time, device_id, temp, status</text>
  <rect x="90" y="228" width="270" height="46" class="box" fill="#fff"/>
  <text x="108" y="256" class="small">time, device_id, temp, status</text>
  <rect x="90" y="286" width="270" height="46" class="box" fill="#fff"/>
  <text x="108" y="314" class="small">time, device_id, temp, status</text>
  <rect x="90" y="344" width="270" height="46" class="box" fill="#fff"/>
  <text x="108" y="372" class="small">time, device_id, temp, status</text>
  <text x="90" y="425" class="tiny">按 orderby 排序，按 segmentby 分组，积累一批行。</text>

  <rect x="470" y="110" width="160" height="110" class="box" fill="#fff7e8"/>
  <text x="501" y="143" class="label">RowCompressor</text>
  <text x="493" y="172" class="small">append_val/null</text>
  <text x="493" y="194" class="small">metadata builder</text>

  <path d="M390 285 L462 170" class="line"/>

  <rect x="720" y="90" width="360" height="420" class="box" fill="#f8fafc"/>
  <text x="750" y="124" class="label">压缩 chunk：一行代表一个批次</text>

  <rect x="760" y="160" width="280" height="48" class="box" fill="#f5fbf7"/>
  <text x="780" y="190" class="small">segmentby 原值：device_id = d01</text>

  <rect x="760" y="222" width="280" height="48" class="box" fill="#fff4df"/>
  <text x="780" y="252" class="small">_ts_meta_count = 批次行数</text>

  <rect x="760" y="284" width="280" height="48" class="box" fill="#fff4df"/>
  <text x="780" y="314" class="small">_ts_meta_min/max_time</text>

  <rect x="760" y="346" width="280" height="48" class="box" fill="#f7efff"/>
  <text x="780" y="376" class="small">temp :: compressed_data</text>

  <rect x="760" y="408" width="280" height="48" class="box" fill="#f7efff"/>
  <text x="780" y="438" class="small">status :: compressed_data</text>

  <path d="M630 165 L710 300" class="line"/>
  <text x="452" y="505" class="tiny">源码依据：RowCompressor 对普通列调用 compressor->append_*，finish 后写入 compressed_values；segmentby 直接保存原值，metadata builder 写入批次元数据。</text>
</svg>
