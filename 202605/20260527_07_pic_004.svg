<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">TimescaleDB compressed_data 的算法载荷布局</title>
  <desc id="desc">展示 compressed_data 的公共 varlena header 与不同压缩算法载荷之间的关系。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; fill: #536171; }
    .box { stroke: #26364a; stroke-width: 1.3; rx: 7; }
    .line { stroke: #536171; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#536171"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1120" height="580" fill="#fff" stroke="#d8dee8"/>
  <text x="48" y="62" class="title">`compressed_data`：公共头 + 算法专属载荷</text>

  <rect x="70" y="110" width="1020" height="86" class="box" fill="#eef5ff"/>
  <text x="96" y="143" class="label">公共头</text>
  <rect x="210" y="128" width="200" height="42" class="box" fill="#fff"/>
  <text x="245" y="154" class="small">vl_len_[4]</text>
  <rect x="420" y="128" width="230" height="42" class="box" fill="#fff"/>
  <text x="450" y="154" class="small">compression_algorithm</text>
  <rect x="660" y="128" width="350" height="42" class="box" fill="#fff"/>
  <text x="710" y="154" class="small">算法专属二进制载荷</text>

  <rect x="70" y="260" width="220" height="240" class="box" fill="#f5fbf7"/>
  <text x="104" y="294" class="label">ARRAY</text>
  <text x="94" y="326" class="small">has_nulls</text>
  <text x="94" y="350" class="small">element_type</text>
  <text x="94" y="374" class="small">null bitmap</text>
  <text x="94" y="398" class="small">sizes(Simple8b)</text>
  <text x="94" y="422" class="small">data bytes</text>

  <rect x="330" y="260" width="220" height="240" class="box" fill="#fff7e8"/>
  <text x="360" y="294" class="label">DICTIONARY</text>
  <text x="354" y="326" class="small">has_nulls</text>
  <text x="354" y="350" class="small">element_type</text>
  <text x="354" y="374" class="small">num_distinct</text>
  <text x="354" y="398" class="small">row -> dict index</text>
  <text x="354" y="422" class="small">dictionary items</text>

  <rect x="590" y="260" width="220" height="240" class="box" fill="#f7efff"/>
  <text x="640" y="294" class="label">GORILLA</text>
  <text x="614" y="326" class="small">has_nulls</text>
  <text x="614" y="350" class="small">last_value</text>
  <text x="614" y="374" class="small">tag0/tag1</text>
  <text x="614" y="398" class="small">leading zeros</text>
  <text x="614" y="422" class="small">xor bit stream</text>

  <rect x="850" y="260" width="220" height="240" class="box" fill="#fff4df"/>
  <text x="895" y="294" class="label">DELTADELTA</text>
  <text x="874" y="326" class="small">has_nulls</text>
  <text x="874" y="350" class="small">last_value</text>
  <text x="874" y="374" class="small">last_delta</text>
  <text x="874" y="398" class="small">delta_deltas</text>
  <text x="874" y="422" class="small">null bitmap</text>

  <path d="M835 196 L180 252" class="line"/>
  <path d="M835 196 L440 252" class="line"/>
  <path d="M835 196 L700 252" class="line"/>
  <path d="M835 196 L960 252" class="line"/>
  <text x="80" y="550" class="tiny">与 protobuf 相似点：都有字段/算法 id 和紧凑字节载荷。关键差异：这里强绑定 PostgreSQL varlena、类型 OID、对齐、批次行数和解压迭代器。</text>
</svg>
