<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">二进制序列化载荷的写入、过滤和读取路径</title>
  <desc id="desc">展示压缩批次写入、批次级过滤、解压和回表/重构行的执行路径。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; fill: #536171; }
    .box { stroke: #26364a; stroke-width: 1.3; rx: 7; }
    .line { stroke: #536171; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .skip { stroke: #c55353; stroke-width: 1.5; fill: none; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#536171"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#c55353"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1120" height="580" fill="#fff" stroke="#d8dee8"/>
  <text x="48" y="62" class="title">读写路径：收益来自批次过滤，成本来自解码和重构行</text>

  <rect x="70" y="120" width="190" height="85" class="box" fill="#eef5ff"/>
  <text x="108" y="153" class="label">写入/压缩</text>
  <text x="94" y="180" class="small">行进入 RowCompressor</text>

  <rect x="330" y="120" width="190" height="85" class="box" fill="#fff7e8"/>
  <text x="370" y="153" class="label">形成批次</text>
  <text x="354" y="180" class="small">元数据 + compressed_data</text>

  <rect x="590" y="120" width="190" height="85" class="box" fill="#f5fbf7"/>
  <text x="624" y="153" class="label">落入页/TOAST</text>
  <text x="622" y="180" class="small">普通 PostgreSQL 存储</text>

  <path d="M260 162 L320 162" class="line"/>
  <path d="M520 162 L580 162" class="line"/>

  <rect x="70" y="320" width="200" height="95" class="box" fill="#f8fafc"/>
  <text x="105" y="354" class="label">查询条件</text>
  <text x="96" y="382" class="small">time/device/status...</text>

  <rect x="340" y="320" width="220" height="95" class="box" fill="#fff4df"/>
  <text x="375" y="354" class="label">批次级判断</text>
  <text x="366" y="382" class="small">segmentby / min-max / sparse index</text>

  <rect x="630" y="320" width="205" height="95" class="box" fill="#f7efff"/>
  <text x="672" y="354" class="label">解压迭代器</text>
  <text x="664" y="382" class="small">try_next 重建列值</text>

  <rect x="900" y="320" width="190" height="95" class="box" fill="#eef5ff"/>
  <text x="940" y="354" class="label">输出行</text>
  <text x="928" y="382" class="small">heap_form_tuple / slot</text>

  <path d="M270 367 L330 367" class="line"/>
  <path d="M560 367 L620 367" class="line"/>
  <path d="M835 367 L890 367" class="line"/>
  <path d="M450 415 C450 495 710 495 710 425" class="skip"/>
  <text x="476" y="518" class="tiny">若批次元数据能排除，则跳过 compressed_data 解码；否则必须按算法解压，必要时重构整批或部分列。</text>
</svg>
