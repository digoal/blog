<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">HLL 表示法层级与晋升路径</title>
  <desc id="desc">展示 postgresql-hll 从 EMPTY 到 EXPLICIT、SPARSE、FULL 的存储表示、准确性和空间代价变化。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1100" height="560" fill="#ffffff"/>
  <text x="48" y="56" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">postgresql-hll 的四级存储表示</text>
  <text x="48" y="88" font-family="Arial, sans-serif" font-size="16" fill="#52606d">同一个 hll 值会随基数增大自动从精确小集合转为概率寄存器，最后选择稀疏或完整 bit-packed 载荷。</text>

  <g font-family="Arial, sans-serif">
    <rect x="50" y="150" width="220" height="220" rx="8" fill="#f2f4f7" stroke="#829ab1" stroke-width="2"/>
    <text x="80" y="190" font-size="24" font-weight="700" fill="#102a43">EMPTY</text>
    <text x="80" y="225" font-size="16" fill="#334e68">空集合哨兵</text>
    <text x="80" y="258" font-size="15" fill="#486581">载荷：3 字节头部</text>
    <text x="80" y="286" font-size="15" fill="#486581">结果：cardinality = 0</text>
    <text x="80" y="314" font-size="15" fill="#486581">第一次 add 后晋升</text>

    <rect x="318" y="150" width="220" height="220" rx="8" fill="#eef9f2" stroke="#2f855a" stroke-width="2"/>
    <text x="348" y="190" font-size="24" font-weight="700" fill="#22543d">EXPLICIT</text>
    <text x="348" y="225" font-size="16" fill="#276749">排序去重的 64 位 hash 列表</text>
    <text x="348" y="258" font-size="15" fill="#2f855a">精确计数：元素个数</text>
    <text x="348" y="286" font-size="15" fill="#2f855a">空间：3 + 8n 字节</text>
    <text x="348" y="314" font-size="15" fill="#2f855a">超过 expthresh 后转寄存器</text>

    <rect x="586" y="150" width="220" height="220" rx="8" fill="#fff8e6" stroke="#b7791f" stroke-width="2"/>
    <text x="616" y="190" font-size="24" font-weight="700" fill="#8a5a12">SPARSE</text>
    <text x="616" y="225" font-size="16" fill="#975a16">只存非零寄存器</text>
    <text x="616" y="258" font-size="15" fill="#975a16">每项：index + value</text>
    <text x="616" y="286" font-size="15" fill="#975a16">空间：nfilled*(log2m+regwidth)</text>
    <text x="616" y="314" font-size="15" fill="#975a16">比 FULL 大时转 FULL</text>

    <rect x="854" y="150" width="220" height="220" rx="8" fill="#edf2ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="884" y="190" font-size="24" font-weight="700" fill="#1c3d99">FULL</text>
    <text x="884" y="225" font-size="16" fill="#274690">完整寄存器数组</text>
    <text x="884" y="258" font-size="15" fill="#274690">2^log2m 个寄存器</text>
    <text x="884" y="286" font-size="15" fill="#274690">每个 regwidth bit</text>
    <text x="884" y="314" font-size="15" fill="#274690">高基数下写入最快、空间固定</text>
  </g>

  <line x1="270" y1="260" x2="318" y2="260" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="538" y1="260" x2="586" y2="260" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="806" y1="260" x2="854" y2="260" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="285" y="238" font-family="Arial, sans-serif" font-size="14" fill="#334e68">首个值</text>
  <text x="552" y="238" font-family="Arial, sans-serif" font-size="14" fill="#334e68">超过阈值</text>
  <text x="812" y="238" font-family="Arial, sans-serif" font-size="14" fill="#334e68">稀疏不再省空间</text>

  <rect x="64" y="430" width="972" height="66" rx="8" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="88" y="457" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#243b53">准确性边界</text>
  <text x="88" y="482" font-family="Arial, sans-serif" font-size="15" fill="#334e68">EMPTY / EXPLICIT 是精确结果；SPARSE / FULL 使用 HyperLogLog 估算，默认 log2m=11 时标准误差约 1.04/sqrt(2048)。</text>
</svg>
