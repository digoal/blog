<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">HLL 二进制载荷布局</title>
  <desc id="desc">展示 postgresql-hll 在 PostgreSQL varlena 外壳内的 3 字节 HLL 头部，以及 EXPLICIT、SPARSE、FULL 三种主体编码。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect width="1120" height="620" fill="#ffffff"/>
  <text x="48" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">HLL 值的磁盘载荷：PostgreSQL varlena + HLL payload</text>
  <text x="48" y="86" font-family="Arial, sans-serif" font-size="16" fill="#52606d">源码中 hll 本质上按 bytea 读写；HLL 自己的 payload 从 3 字节头部开始。</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="130" width="150" height="78" rx="6" fill="#e6f6ff" stroke="#2b6cb0" stroke-width="2"/>
    <text x="100" y="164" font-size="16" font-weight="700" fill="#1a365d">varlena</text>
    <text x="92" y="188" font-size="14" fill="#2a4365">VARSIZE 外壳</text>

    <rect x="250" y="130" width="180" height="78" rx="6" fill="#edf2f7" stroke="#718096" stroke-width="2"/>
    <text x="280" y="158" font-size="15" font-weight="700" fill="#2d3748">byte 0</text>
    <text x="274" y="184" font-size="14" fill="#4a5568">version(4) | type(4)</text>

    <rect x="450" y="130" width="220" height="78" rx="6" fill="#edf2f7" stroke="#718096" stroke-width="2"/>
    <text x="486" y="158" font-size="15" font-weight="700" fill="#2d3748">byte 1</text>
    <text x="478" y="184" font-size="14" fill="#4a5568">(regwidth-1)(3) | log2m(5)</text>

    <rect x="690" y="130" width="220" height="78" rx="6" fill="#edf2f7" stroke="#718096" stroke-width="2"/>
    <text x="726" y="158" font-size="15" font-weight="700" fill="#2d3748">byte 2</text>
    <text x="728" y="184" font-size="14" fill="#4a5568">sparseon(1) | expthresh(6)</text>

    <rect x="930" y="130" width="120" height="78" rx="6" fill="#fff5f5" stroke="#c53030" stroke-width="2"/>
    <text x="960" y="158" font-size="15" font-weight="700" fill="#742a2a">body</text>
    <text x="948" y="184" font-size="14" fill="#742a2a">按 type 变化</text>
  </g>
  <line x1="220" y1="169" x2="250" y2="169" stroke="#334e68" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="169" x2="450" y2="169" stroke="#334e68" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="169" x2="690" y2="169" stroke="#334e68" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="910" y1="169" x2="930" y2="169" stroke="#334e68" stroke-width="2" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif">
    <text x="70" y="270" font-size="22" font-weight="700" fill="#243b53">body 的三种主要编码</text>

    <rect x="70" y="305" width="300" height="210" rx="8" fill="#eef9f2" stroke="#2f855a" stroke-width="2"/>
    <text x="96" y="340" font-size="20" font-weight="700" fill="#22543d">EXPLICIT body</text>
    <rect x="98" y="370" width="220" height="38" fill="#c6f6d5" stroke="#2f855a"/>
    <text x="122" y="395" font-size="14" fill="#22543d">hashval[0] 8 bytes</text>
    <rect x="98" y="412" width="220" height="38" fill="#c6f6d5" stroke="#2f855a"/>
    <text x="122" y="437" font-size="14" fill="#22543d">hashval[1] 8 bytes</text>
    <rect x="98" y="454" width="220" height="38" fill="#c6f6d5" stroke="#2f855a"/>
    <text x="122" y="479" font-size="14" fill="#22543d">... 排序且无重复</text>

    <rect x="410" y="305" width="300" height="210" rx="8" fill="#fff8e6" stroke="#b7791f" stroke-width="2"/>
    <text x="436" y="340" font-size="20" font-weight="700" fill="#8a5a12">SPARSE body</text>
    <rect x="438" y="370" width="220" height="38" fill="#fef3c7" stroke="#b7791f"/>
    <text x="456" y="395" font-size="14" fill="#8a5a12">index | value</text>
    <rect x="438" y="412" width="220" height="38" fill="#fef3c7" stroke="#b7791f"/>
    <text x="456" y="437" font-size="14" fill="#8a5a12">log2m + regwidth bits</text>
    <rect x="438" y="454" width="220" height="38" fill="#fef3c7" stroke="#b7791f"/>
    <text x="456" y="479" font-size="14" fill="#8a5a12">只写非零寄存器</text>

    <rect x="750" y="305" width="300" height="210" rx="8" fill="#edf2ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="776" y="340" font-size="20" font-weight="700" fill="#1c3d99">FULL body</text>
    <rect x="778" y="370" width="46" height="80" fill="#dbe4ff" stroke="#3b5bdb"/>
    <rect x="824" y="370" width="46" height="80" fill="#dbe4ff" stroke="#3b5bdb"/>
    <rect x="870" y="370" width="46" height="80" fill="#dbe4ff" stroke="#3b5bdb"/>
    <rect x="916" y="370" width="46" height="80" fill="#dbe4ff" stroke="#3b5bdb"/>
    <text x="786" y="420" font-size="13" fill="#1c3d99">R0</text>
    <text x="832" y="420" font-size="13" fill="#1c3d99">R1</text>
    <text x="878" y="420" font-size="13" fill="#1c3d99">R2</text>
    <text x="922" y="420" font-size="13" fill="#1c3d99">...</text>
    <text x="792" y="480" font-size="14" fill="#274690">每个寄存器 regwidth bit，连续 bit-packed</text>
  </g>

  <text x="70" y="570" font-family="Arial, sans-serif" font-size="15" fill="#52606d">注意：EMPTY / UNDEFINED 只有 3 字节 HLL 头部；源码把磁盘上的 SPARSE 解包为内存中的 COMPRESSED 寄存器数组。</text>
</svg>
