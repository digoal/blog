<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">HLL add 与 cardinality 计算路径</title>
  <desc id="desc">展示输入值经过 MurmurHash3 后如何映射到寄存器，以及 cardinality 如何用调和平均和小/大范围修正得到估计值。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect width="1120" height="640" fill="#ffffff"/>
  <text x="48" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">写入一个值：hash 拆成寄存器编号和 rank</text>
  <text x="48" y="86" font-family="Arial, sans-serif" font-size="16" fill="#52606d">postgresql-hll 要求先把业务值转换成 hll_hashval；寄存器只保存观察到的最大 rank。</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="150" width="170" height="76" rx="8" fill="#f8fafc" stroke="#829ab1" stroke-width="2"/>
    <text x="100" y="182" font-size="18" font-weight="700" fill="#243b53">业务值</text>
    <text x="96" y="207" font-size="14" fill="#52606d">user_id / text / bytea</text>

    <rect x="300" y="150" width="190" height="76" rx="8" fill="#e6fffa" stroke="#319795" stroke-width="2"/>
    <text x="326" y="182" font-size="18" font-weight="700" fill="#234e52">MurmurHash3</text>
    <text x="334" y="207" font-size="14" fill="#285e61">固定 seed，输出 64 位</text>

    <rect x="550" y="130" width="440" height="116" rx="8" fill="#edf2ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="580" y="162" font-size="18" font-weight="700" fill="#1c3d99">64 位 hashval</text>
    <rect x="580" y="186" width="150" height="34" fill="#c3dafe" stroke="#3b5bdb"/>
    <text x="604" y="209" font-size="14" fill="#1c3d99">低 log2m 位</text>
    <rect x="730" y="186" width="230" height="34" fill="#dbe4ff" stroke="#3b5bdb"/>
    <text x="762" y="209" font-size="14" fill="#1c3d99">其余位：计算连续 0 个数</text>
  </g>
  <line x1="240" y1="188" x2="300" y2="188" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="490" y1="188" x2="550" y2="188" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif">
    <rect x="90" y="330" width="430" height="185" rx="8" fill="#fff8e6" stroke="#b7791f" stroke-width="2"/>
    <text x="120" y="364" font-size="20" font-weight="700" fill="#8a5a12">hll_add 的寄存器更新</text>
    <text x="120" y="400" font-size="15" fill="#8a5a12">1. ndx = hash &amp; (m - 1)</text>
    <text x="120" y="430" font-size="15" fill="#8a5a12">2. rank = ctz(hash &gt;&gt; log2m) + 1</text>
    <text x="120" y="460" font-size="15" fill="#8a5a12">3. register[ndx] = max(register[ndx], rank)</text>
    <text x="120" y="490" font-size="15" fill="#8a5a12">4. rank 超过 regwidth 可表示范围时截断</text>

    <rect x="600" y="330" width="430" height="185" rx="8" fill="#eef9f2" stroke="#2f855a" stroke-width="2"/>
    <text x="630" y="364" font-size="20" font-weight="700" fill="#22543d">hll_cardinality 的估计</text>
    <text x="630" y="400" font-size="15" fill="#2f855a">1. EMPTY 返回 0，EXPLICIT 返回元素个数</text>
    <text x="630" y="430" font-size="15" fill="#2f855a">2. 对寄存器求 sum(2^-Rj)</text>
    <text x="630" y="460" font-size="15" fill="#2f855a">3. E = alpha_m * m^2 / sum</text>
    <text x="630" y="490" font-size="15" fill="#2f855a">4. 小范围用 linear counting，大范围用修正公式</text>
  </g>
  <line x1="730" y1="246" x2="360" y2="330" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="845" y1="246" x2="820" y2="330" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="240" y="560" width="640" height="42" rx="8" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="270" y="586" font-family="Arial, sans-serif" font-size="15" fill="#334e68">核心直觉：HLL 不保存元素本身，只保存每个桶见过的“最罕见 bit 模式”。罕见模式越极端，说明输入集合通常越大。</text>
</svg>
