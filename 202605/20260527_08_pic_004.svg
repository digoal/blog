<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">HLL union 与时间窗口汇总</title>
  <desc id="desc">展示每日 HLL 草图如何通过寄存器逐位取最大值合并成周、月或滑动窗口唯一数估计。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect width="1120" height="640" fill="#ffffff"/>
  <text x="48" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2933">HLL 的工程价值：可合并的去重摘要</text>
  <text x="48" y="86" font-family="Arial, sans-serif" font-size="16" fill="#52606d">按天预聚合后，周/月/滑动窗口唯一数可以通过 hll_union_agg 直接汇总。</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="150" width="190" height="86" rx="8" fill="#edf2ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="98" y="182" font-size="18" font-weight="700" fill="#1c3d99">2026-05-01</text>
    <text x="116" y="210" font-size="15" fill="#274690">users_hll</text>

    <rect x="70" y="270" width="190" height="86" rx="8" fill="#edf2ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="98" y="302" font-size="18" font-weight="700" fill="#1c3d99">2026-05-02</text>
    <text x="116" y="330" font-size="15" fill="#274690">users_hll</text>

    <rect x="70" y="390" width="190" height="86" rx="8" fill="#edf2ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="98" y="422" font-size="18" font-weight="700" fill="#1c3d99">2026-05-03</text>
    <text x="116" y="450" font-size="15" fill="#274690">users_hll</text>

    <rect x="385" y="215" width="270" height="196" rx="8" fill="#eef9f2" stroke="#2f855a" stroke-width="2"/>
    <text x="426" y="254" font-size="20" font-weight="700" fill="#22543d">hll_union_agg</text>
    <text x="420" y="292" font-size="15" fill="#2f855a">metadata 必须一致</text>
    <text x="420" y="324" font-size="15" fill="#2f855a">EXPLICIT 可逐元素加入</text>
    <text x="420" y="356" font-size="15" fill="#2f855a">FULL/SPARSE 寄存器逐位 max</text>
    <text x="420" y="388" font-size="15" fill="#2f855a">输出仍是一个 hll</text>

    <rect x="780" y="215" width="260" height="196" rx="8" fill="#fff8e6" stroke="#b7791f" stroke-width="2"/>
    <text x="826" y="254" font-size="20" font-weight="700" fill="#8a5a12">查询阶段</text>
    <text x="820" y="292" font-size="15" fill="#8a5a12">#hll_union_agg(users)</text>
    <text x="820" y="324" font-size="15" fill="#8a5a12">周活、月活、滚动 7 日</text>
    <text x="820" y="356" font-size="15" fill="#8a5a12">误差仍由 log2m 控制</text>
    <text x="820" y="388" font-size="15" fill="#8a5a12">不需要重扫明细事实表</text>
  </g>

  <line x1="260" y1="193" x2="385" y2="278" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="260" y1="313" x2="385" y2="313" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="260" y1="433" x2="385" y2="348" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="655" y1="313" x2="780" y2="313" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="110" y="540" width="900" height="52" rx="8" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="138" y="572" font-family="Arial, sans-serif" font-size="15" fill="#334e68">边界：union 很稳；intersection 通常靠 inclusion-exclusion，若交集远小于并集，绝对误差会被放大成很高的相对误差。</text>
</svg>
