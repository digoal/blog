<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">层级数据建模取舍</title>
  <desc id="desc">比较邻接表、ltree 路径、闭包表和嵌套集在读取、移动子树和索引方式上的取舍。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 6; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
    .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .label { font: 18px sans-serif; fill: #0f172a; font-weight: 600; }
    .small { font: 14px sans-serif; fill: #334155; }
    .mono { font: 14px monospace; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="40" y="48">同一棵业务树，不同关系化编码</text>
  <rect class="box" x="58" y="92" width="170" height="90"/>
  <text class="mono" x="82" y="125">邻接表</text>
  <text class="small" x="82" y="153">parent_id</text>
  <text class="small" x="82" y="174">递归查询自然</text>
  <rect class="blue" x="278" y="92" width="170" height="90"/>
  <text class="mono" x="302" y="125">ltree 路径</text>
  <text class="small" x="302" y="153">Top.A.B</text>
  <text class="small" x="302" y="174">前缀关系自然</text>
  <rect class="green" x="498" y="92" width="170" height="90"/>
  <text class="mono" x="522" y="125">闭包表</text>
  <text class="small" x="522" y="153">ancestor/desc</text>
  <text class="small" x="522" y="174">读快写放大</text>
  <rect class="amber" x="718" y="92" width="170" height="90"/>
  <text class="mono" x="742" y="125">嵌套集</text>
  <text class="small" x="742" y="153">lft/rgt</text>
  <text class="small" x="742" y="174">静态树友好</text>
  <rect class="box" x="58" y="258" width="170" height="124"/>
  <text class="small" x="82" y="292">读子树：递归</text>
  <text class="small" x="82" y="322">移动子树：局部</text>
  <text class="small" x="82" y="352">深度查询：需递归</text>
  <rect class="blue" x="278" y="258" width="170" height="124"/>
  <text class="small" x="302" y="292">读子树：GiST/B-tree</text>
  <text class="small" x="302" y="322">移动子树：改后代路径</text>
  <text class="small" x="302" y="352">模式匹配：原生</text>
  <rect class="green" x="498" y="258" width="170" height="124"/>
  <text class="small" x="522" y="292">读祖先/后代：快</text>
  <text class="small" x="522" y="322">移动子树：维护多行</text>
  <text class="small" x="522" y="352">空间：O(n*h)</text>
  <rect class="amber" x="718" y="258" width="170" height="124"/>
  <text class="small" x="742" y="292">读子树：范围快</text>
  <text class="small" x="742" y="322">插入/移动：重编号</text>
  <text class="small" x="742" y="352">动态树代价高</text>
  <path class="arrow" d="M 143 184 L 143 256"/>
  <path class="arrow" d="M 363 184 L 363 256"/>
  <path class="arrow" d="M 583 184 L 583 256"/>
  <path class="arrow" d="M 803 184 L 803 256"/>
  <rect class="red" x="58" y="442" width="830" height="62"/>
  <text class="small" x="80" y="477">ltree 的定位：把层级路径作为一个强类型值存入行内，用算子和 GiST/B-tree/hash 接入优化器；它不是通用图引擎，也不自动消除移动子树的写放大。</text>
</svg>
