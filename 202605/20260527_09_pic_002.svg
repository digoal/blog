<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">ltree varlena 存储布局</title>
  <desc id="desc">展示 PostgreSQL ltree 值从文本路径到 varlena、numlevel 和按 MAXALIGN 对齐的 label 段的物理布局。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 6; }
    .head { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .label { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 14px sans-serif; fill: #334155; }
    .mono { font: 15px monospace; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 6; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="520"/>
  <text class="label" x="36" y="48">输入文本</text>
  <rect class="box" x="36" y="68" width="420" height="54"/>
  <text class="mono" x="58" y="102">Top.Science.Astronomy</text>
  <path class="arrow" d="M 456 95 C 510 95 520 95 574 95"/>
  <text class="small" x="482" y="78">ltree_in / parse_ltree</text>
  <text class="label" x="592" y="48">内存/磁盘 varlena</text>
  <rect class="head" x="592" y="68" width="112" height="54"/>
  <text class="mono" x="614" y="101">vl_len_</text>
  <rect class="head" x="704" y="68" width="132" height="54"/>
  <text class="mono" x="724" y="101">numlevel=3</text>
  <rect class="box" x="36" y="190" width="164" height="76"/>
  <text class="mono" x="58" y="222">len=3</text>
  <text class="mono" x="58" y="246">name=Top</text>
  <rect class="box" x="218" y="190" width="194" height="76"/>
  <text class="mono" x="240" y="222">len=7</text>
  <text class="mono" x="240" y="246">name=Science</text>
  <rect class="box" x="430" y="190" width="238" height="76"/>
  <text class="mono" x="452" y="222">len=9</text>
  <text class="mono" x="452" y="246">name=Astronomy</text>
  <rect class="warn" x="686" y="190" width="238" height="76"/>
  <text class="mono" x="708" y="222">MAXALIGN padding</text>
  <text class="small" x="708" y="247">每个 level 独立对齐</text>
  <path class="arrow" d="M 770 122 C 770 156 160 150 118 188"/>
  <path class="arrow" d="M 770 122 C 770 156 320 150 315 188"/>
  <path class="arrow" d="M 770 122 C 770 156 550 150 549 188"/>
  <text class="label" x="36" y="334">关键边界</text>
  <rect class="box" x="36" y="356" width="270" height="92"/>
  <text class="small" x="58" y="388">label：字母数字、下划线、连字符</text>
  <text class="small" x="58" y="416">长度上限：1000 个字符</text>
  <rect class="box" x="340" y="356" width="270" height="92"/>
  <text class="small" x="362" y="388">path：0 到 65535 个 label</text>
  <text class="small" x="362" y="416">点号只是输入/输出分隔符</text>
  <rect class="box" x="644" y="356" width="280" height="92"/>
  <text class="small" x="666" y="388">STORAGE = extended</text>
  <text class="small" x="666" y="416">大值可被 TOAST 处理</text>
</svg>
