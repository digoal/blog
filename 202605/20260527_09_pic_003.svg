<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">lquery 与 ltxtquery 内部结构</title>
  <desc id="desc">展示 lquery 的层级模式结构与 ltxtquery 的波兰式 ITEM 数组和 operand 区。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 6; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
    .label { font: 18px sans-serif; fill: #0f172a; font-weight: 600; }
    .small { font: 14px sans-serif; fill: #334155; }
    .mono { font: 14px monospace; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="36" y="46">lquery：位置敏感的路径模式</text>
  <rect class="blue" x="36" y="68" width="236" height="74"/>
  <text class="mono" x="56" y="98">vl_len_, numlevel</text>
  <text class="mono" x="56" y="122">firstgood, flag</text>
  <rect class="box" x="306" y="68" width="180" height="74"/>
  <text class="mono" x="326" y="98">level: Top</text>
  <text class="small" x="326" y="122">numvar=1 low/high</text>
  <rect class="box" x="520" y="68" width="180" height="74"/>
  <text class="mono" x="540" y="98">level: *{0,2}</text>
  <text class="small" x="540" y="122">numvar=0 表示 *</text>
  <rect class="box" x="734" y="68" width="180" height="74"/>
  <text class="mono" x="754" y="98">level: A@|B*</text>
  <text class="small" x="754" y="122">多个 variant OR</text>
  <path class="arrow" d="M 272 105 L 303 105"/>
  <path class="arrow" d="M 486 105 L 517 105"/>
  <path class="arrow" d="M 700 105 L 731 105"/>
  <rect class="amber" x="306" y="178" width="608" height="92"/>
  <text class="mono" x="328" y="210">variant = CRC(label) + len + flag + 原始 label</text>
  <text class="small" x="328" y="238">flag 包含前缀匹配 *、大小写不敏感 @、下划线词匹配 %、NOT/COUNT 等信息</text>
  <path class="arrow" d="M 824 142 C 824 165 780 170 736 178"/>
  <text class="label" x="36" y="338">ltxtquery：位置无关的词逻辑表达式</text>
  <rect class="green" x="36" y="360" width="210" height="76"/>
  <text class="mono" x="56" y="390">vl_len_, size</text>
  <text class="small" x="56" y="414">ITEM 数量</text>
  <rect class="box" x="280" y="360" width="300" height="76"/>
  <text class="mono" x="300" y="390">ITEM[]: 逆波兰/波兰式逻辑树</text>
  <text class="small" x="300" y="414">type, val(CRC), flag, distance</text>
  <rect class="box" x="614" y="360" width="300" height="76"/>
  <text class="mono" x="634" y="390">operand text 区</text>
  <text class="small" x="634" y="414">保存用户可读词项</text>
  <path class="arrow" d="M 246 398 L 277 398"/>
  <path class="arrow" d="M 580 398 L 611 398"/>
  <rect class="amber" x="36" y="474" width="878" height="54"/>
  <text class="small" x="58" y="507">索引过滤时，能安全查签名的简单词项会用 CRC 位图剪枝；复杂项在叶子或回表阶段按真实 ltree 语义判断。</text>
</svg>
