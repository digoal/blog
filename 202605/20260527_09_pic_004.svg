<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">ltree GiST 索引 key 布局</title>
  <desc id="desc">展示 gist_ltree_ops 在叶子页和非叶子页中使用 ltree_gist 存储不同内容。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 6; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .label { font: 18px sans-serif; fill: #0f172a; font-weight: 600; }
    .small { font: 14px sans-serif; fill: #334155; }
    .mono { font: 14px monospace; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560"/>
  <text class="label" x="40" y="48">叶子页：精确 ltree</text>
  <rect class="blue" x="40" y="74" width="130" height="62"/>
  <text class="mono" x="62" y="110">vl_len_</text>
  <rect class="blue" x="170" y="74" width="140" height="62"/>
  <text class="mono" x="190" y="110">flag=ONENODE</text>
  <rect class="box" x="310" y="74" width="300" height="62"/>
  <text class="mono" x="332" y="110">完整 ltree value</text>
  <rect class="green" x="648" y="74" width="232" height="62"/>
  <text class="small" x="670" y="101">consistent 在叶子精确判断</text>
  <text class="small" x="670" y="123">gist_ltree_ops recheck=false</text>
  <path class="arrow" d="M 610 105 L 645 105"/>
  <text class="label" x="40" y="210">非叶子页：签名 + 左右边界</text>
  <rect class="blue" x="40" y="236" width="120" height="62"/>
  <text class="mono" x="62" y="272">vl_len_</text>
  <rect class="blue" x="160" y="236" width="100" height="62"/>
  <text class="mono" x="184" y="272">flag</text>
  <rect class="red" x="260" y="236" width="190" height="62"/>
  <text class="mono" x="284" y="272">sign bitmap</text>
  <rect class="box" x="450" y="236" width="190" height="62"/>
  <text class="mono" x="474" y="272">left_ltree</text>
  <rect class="box" x="640" y="236" width="190" height="62"/>
  <text class="mono" x="664" y="272">right_ltree</text>
  <rect class="green" x="40" y="354" width="390" height="96"/>
  <text class="small" x="62" y="386">sign：子树所有 label 的 CRC32 取模后置位</text>
  <text class="small" x="62" y="414">left/right：按 ltree_compare 维护的边界</text>
  <text class="small" x="62" y="442">ALLTRUE：签名全 1 时可省略 sign 区</text>
  <rect class="green" x="470" y="354" width="390" height="96"/>
  <text class="small" x="492" y="386">union：签名按位 OR，边界取最小/最大</text>
  <text class="small" x="492" y="414">penalty：按边界扩张代价选插入子树</text>
  <text class="small" x="492" y="442">picksplit：按左边界排序后分半</text>
</svg>
