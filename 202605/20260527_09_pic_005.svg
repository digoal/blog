<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">ltree GiST 签名过滤路径</title>
  <desc id="desc">展示 ltree 查询如何通过 GiST 内部页的签名位图和左右边界剪枝，再在叶子页精确判断。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 6; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
    .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .label { font: 18px sans-serif; fill: #0f172a; font-weight: 600; }
    .small { font: 14px sans-serif; fill: #334155; }
    .mono { font: 14px monospace; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="620"/>
  <text class="label" x="42" y="48">查询</text>
  <rect class="blue" x="42" y="72" width="280" height="78"/>
  <text class="mono" x="64" y="105">path ~ 'Top.*.Astronomy'</text>
  <text class="small" x="64" y="130">或 path @&gt; / &lt;@ / @ / ?</text>
  <path class="arrow" d="M 322 111 L 394 111"/>
  <rect class="amber" x="396" y="72" width="246" height="78"/>
  <text class="small" x="418" y="104">提取可查签名的简单 label</text>
  <text class="small" x="418" y="130">结合 firstgood 前缀边界</text>
  <path class="arrow" d="M 642 111 L 714 111"/>
  <rect class="box" x="716" y="72" width="202" height="78"/>
  <text class="small" x="738" y="104">访问 GiST root</text>
  <text class="small" x="738" y="130">逐层 consistent</text>
  <rect class="box" x="86" y="238" width="220" height="110"/>
  <text class="mono" x="108" y="270">内部 entry A</text>
  <text class="small" x="108" y="298">sign 包含所需 bit</text>
  <text class="small" x="108" y="324">left/right 可能覆盖</text>
  <rect class="red" x="370" y="238" width="220" height="110"/>
  <text class="mono" x="392" y="270">内部 entry B</text>
  <text class="small" x="392" y="298">缺少必要 bit</text>
  <text class="small" x="392" y="324">整棵子树剪掉</text>
  <rect class="amber" x="654" y="238" width="220" height="110"/>
  <text class="mono" x="676" y="270">内部 entry C</text>
  <text class="small" x="676" y="298">bit 命中但可能碰撞</text>
  <text class="small" x="676" y="324">继续下探</text>
  <path class="arrow" d="M 818 150 C 818 198 764 210 764 236"/>
  <path class="arrow" d="M 818 150 C 780 205 500 205 480 236"/>
  <path class="arrow" d="M 818 150 C 735 190 190 196 196 236"/>
  <rect class="green" x="86" y="440" width="326" height="90"/>
  <text class="mono" x="108" y="474">叶子：完整 ltree + TID</text>
  <text class="small" x="108" y="502">按真实算子精确判断，返回候选 TID</text>
  <rect class="green" x="548" y="440" width="326" height="90"/>
  <text class="mono" x="570" y="474">ltree[]：只有签名</text>
  <text class="small" x="570" y="502">叶子仍可能误判，必须 recheck</text>
  <path class="arrow" d="M 196 348 C 196 396 220 406 248 438"/>
  <path class="arrow" d="M 764 348 C 764 392 720 410 711 438"/>
</svg>
