<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">GIN 与 RUM 的倒排项差异</title>
  <desc id="desc">对比 GIN 只保存 key 到 TID 集合，RUM 在 TID 旁保存附加信息，用于排名、短语和附加列排序。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b5b7a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #16324f; }
    .label { font: 600 16px sans-serif; fill: #243447; }
    .text { font: 14px sans-serif; fill: #243447; }
    .small { font: 12px sans-serif; fill: #4d6175; }
    .box { fill: #f7fafc; stroke: #9fb3c8; stroke-width: 1.5; rx: 8; }
    .gin { fill: #e8f2ff; stroke: #5b8dc9; }
    .rum { fill: #eaf7f0; stroke: #4c9f70; }
    .heap { fill: #fff4df; stroke: #d49b35; }
    .line { stroke: #3b5b7a; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="40" y="44" class="title">同样是倒排索引：GIN 找到行，RUM 还把排序/位置线索放进 posting</text>

  <rect x="40" y="90" width="390" height="350" class="box gin"/>
  <text x="65" y="125" class="label">GIN：key -> TID 集合</text>
  <rect x="70" y="155" width="130" height="44" class="box"/>
  <text x="102" y="182" class="text">lexeme: rum</text>
  <path d="M205 177 H255" class="line"/>
  <rect x="260" y="138" width="130" height="78" class="box"/>
  <text x="286" y="164" class="text">(0,7)</text>
  <text x="286" y="185" class="text">(3,12)</text>
  <text x="286" y="206" class="text">(8,4)</text>
  <text x="70" y="260" class="text">排名或短语判断需要：</text>
  <path d="M90 285 H180" class="line"/>
  <rect x="185" y="260" width="170" height="58" class="heap"/>
  <text x="222" y="286" class="text">回表读取 tsvector</text>
  <text x="217" y="306" class="small">取 position/weight</text>
  <text x="70" y="370" class="small">优点：结构更轻，成熟通用。</text>
  <text x="70" y="392" class="small">代价：排序、短语、附加列信息常在索引外。</text>

  <rect x="530" y="90" width="390" height="350" class="box rum"/>
  <text x="555" y="125" class="label">RUM：key -> (TID, addInfo) 集合</text>
  <rect x="560" y="155" width="130" height="44" class="box"/>
  <text x="592" y="182" class="text">lexeme: rum</text>
  <path d="M695 177 H735" class="line"/>
  <rect x="740" y="124" width="145" height="116" class="box"/>
  <text x="758" y="150" class="text">(0,7), pos=[2]</text>
  <text x="758" y="174" class="text">(3,12), pos=[5]</text>
  <text x="758" y="198" class="text">(8,4), ts=...</text>
  <text x="758" y="222" class="small">TID 旁带附加信息</text>
  <text x="560" y="283" class="text">索引内可计算：</text>
  <rect x="575" y="305" width="110" height="46" class="heap"/>
  <text x="605" y="333" class="text">ranking</text>
  <rect x="705" y="305" width="110" height="46" class="heap"/>
  <text x="732" y="333" class="text">phrase</text>
  <rect x="635" y="370" width="150" height="46" class="heap"/>
  <text x="662" y="398" class="text">ORDER BY 附加列</text>
  <text x="560" y="462" class="small">收益：少回表、可早返回 Top-N。</text>
  <text x="560" y="484" class="small">代价：posting 更重，build/insert 更慢。</text>
</svg>
