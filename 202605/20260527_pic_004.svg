<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">RUM 扫描、排序和 Top-N 返回路径</title>
  <desc id="desc">展示查询 key 初始化、entry/posting 扫描、consistent 判断、ordering 计算和 bitmap/gettuple 两种输出。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35536b"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #17324d; }
    .label { font: 600 15px sans-serif; fill: #1f3346; }
    .text { font: 13px sans-serif; fill: #243447; }
    .small { font: 12px sans-serif; fill: #52697f; }
    .box { fill: #f7fbff; stroke: #8aa8c2; stroke-width: 1.5; rx: 8; }
    .hot { fill: #eaf7f0; stroke: #4c9f70; }
    .out { fill: #fff3d8; stroke: #d49b35; }
    .line { stroke: #35536b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="36" y="42" class="title">扫描路径：RUM 同时支持 bitmap 输出和按距离逐 tuple 输出</text>

  <rect x="45" y="95" width="170" height="72" class="box"/>
  <text x="79" y="124" class="label">WHERE / ORDER BY</text>
  <text x="66" y="146" class="text">t @@ q, d &lt;=&gt; const</text>

  <rect x="270" y="95" width="170" height="72" class="box"/>
  <text x="303" y="124" class="label">rumrescan()</text>
  <text x="292" y="146" class="text">rumNewScanKey()</text>

  <rect x="505" y="95" width="170" height="72" class="box hot"/>
  <text x="532" y="124" class="label">extractQueryFn</text>
  <text x="526" y="146" class="text">拆 query entry</text>

  <rect x="740" y="95" width="180" height="72" class="box hot"/>
  <text x="778" y="124" class="label">startScan()</text>
  <text x="760" y="146" class="text">定位 entry/posting</text>

  <rect x="170" y="265" width="190" height="82" class="box"/>
  <text x="198" y="294" class="label">entryGetItem()</text>
  <text x="190" y="318" class="text">推进 posting 游标</text>
  <text x="190" y="338" class="small">posting list 或 tree</text>

  <rect x="410" y="265" width="190" height="82" class="box"/>
  <text x="439" y="294" class="label">callConsistentFn()</text>
  <text x="431" y="318" class="text">判断 query 逻辑</text>
  <text x="431" y="338" class="small">可能要求 recheck</text>

  <rect x="650" y="265" width="190" height="82" class="box"/>
  <text x="684" y="294" class="label">keyGetOrdering()</text>
  <text x="670" y="318" class="text">基于 addInfo 计算距离</text>
  <text x="670" y="338" class="small">支持 amcanorderbyop</text>

  <rect x="235" y="420" width="205" height="62" class="out"/>
  <text x="276" y="448" class="label">rumgetbitmap()</text>
  <text x="263" y="468" class="text">返回 TIDBitmap</text>

  <rect x="560" y="420" width="205" height="62" class="out"/>
  <text x="604" y="448" class="label">rumgettuple()</text>
  <text x="579" y="468" class="text">按排序逐条返回</text>

  <path d="M215 131 H264" class="line"/>
  <path d="M440 131 H499" class="line"/>
  <path d="M675 131 H734" class="line"/>
  <path d="M830 168 C798 220 364 224 288 265" class="line"/>
  <path d="M360 306 H404" class="line"/>
  <path d="M600 306 H644" class="line"/>
  <path d="M505 347 C470 382 412 399 360 420" class="line"/>
  <path d="M745 347 C738 382 709 399 680 420" class="line"/>

  <text x="52" y="504" class="small">实践含义：只求过滤时常见 Bitmap Scan；需要 ORDER BY distance LIMIT N 时，RUM 可避免候选集全部回表排序。</text>
</svg>
