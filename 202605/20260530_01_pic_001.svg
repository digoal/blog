<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Volcano Pull 模型的需求驱动执行树</title>
  <desc id="desc">展示客户端、顶层计划节点、连接节点、扫描节点之间逐行拉取 TupleTableSlot 的调用方向和数据返回方向。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
    <marker id="returnArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1b7f5a"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="580" rx="8" fill="#fbfcfe" stroke="#c8d3df"/>
  <text x="490" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#22313f">一次 ExecProcNode 调用如何向下拉取一行</text>

  <rect x="390" y="90" width="200" height="64" rx="8" fill="#e7f0fa" stroke="#7fa7cf"/>
  <text x="490" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#1d3557">ExecutePlan</text>
  <text x="490" y="142" text-anchor="middle" font-size="14" fill="#31485f">循环调用根 PlanState</text>

  <rect x="392" y="210" width="196" height="70" rx="8" fill="#fff3d6" stroke="#d7aa38"/>
  <text x="490" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#664d03">Limit / Aggregate / Join</text>
  <text x="490" y="264" text-anchor="middle" font-size="14" fill="#705d28">上层算子决定要不要继续拉</text>

  <rect x="180" y="365" width="210" height="76" rx="8" fill="#e9f7ef" stroke="#73b58a"/>
  <text x="285" y="394" text-anchor="middle" font-size="17" font-weight="700" fill="#195c3f">Outer Scan</text>
  <text x="285" y="418" text-anchor="middle" font-size="14" fill="#2c674d">SeqScan / IndexScan</text>

  <rect x="590" y="365" width="210" height="76" rx="8" fill="#e9f7ef" stroke="#73b58a"/>
  <text x="695" y="394" text-anchor="middle" font-size="17" font-weight="700" fill="#195c3f">Inner Scan</text>
  <text x="695" y="418" text-anchor="middle" font-size="14" fill="#2c674d">按外表参数重扫或探测</text>

  <rect x="280" y="510" width="420" height="48" rx="8" fill="#f5f6f8" stroke="#b8c1cc"/>
  <text x="490" y="540" text-anchor="middle" font-size="16" font-weight="700" fill="#34495e">返回单位：TupleTableSlot 或 NULL</text>

  <path d="M490 154 L490 205" stroke="#2f5d8c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="512" y="188" font-size="14" fill="#2f5d8c">next()</text>
  <path d="M460 210 L310 360" stroke="#2f5d8c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="320" y="286" font-size="14" fill="#2f5d8c">拉 outer</text>
  <path d="M520 210 L670 360" stroke="#2f5d8c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="620" y="286" font-size="14" fill="#2f5d8c">拉 inner</text>

  <path d="M310 365 L455 282" stroke="#1b7f5a" stroke-width="3" marker-end="url(#returnArrow)" stroke-dasharray="8 6"/>
  <text x="305" y="337" font-size="14" fill="#1b7f5a">返回一行</text>
  <path d="M670 365 L525 282" stroke="#1b7f5a" stroke-width="3" marker-end="url(#returnArrow)" stroke-dasharray="8 6"/>
  <text x="674" y="337" font-size="14" fill="#1b7f5a">返回一行</text>
  <path d="M490 280 L490 506" stroke="#1b7f5a" stroke-width="3" marker-end="url(#returnArrow)" stroke-dasharray="8 6"/>
  <text x="512" y="505" font-size="14" fill="#1b7f5a">根节点返回给接收端</text>

  <text x="70" y="585" font-size="14" fill="#5b6773">要点：调用从上往下，数据从下往上；没有上层需求，下层算子不会继续生产下一行。</text>
</svg>
