<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 执行器运行期结构</title>
  <desc id="desc">展示 Plan 树、PlanState 树、ExecProcNode 函数指针、ExprState、TupleTableSlot、EState 和内存上下文的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f5f8f"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="600" rx="8" fill="#fcfcfb" stroke="#ccd2d8"/>
  <text x="490" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#22313f">Plan 是只读蓝图，PlanState 保存运行期状态</text>

  <rect x="70" y="100" width="250" height="360" rx="8" fill="#eef4fb" stroke="#87a9cf"/>
  <text x="195" y="132" text-anchor="middle" font-size="20" font-weight="700" fill="#24466b">Plan Tree</text>
  <rect x="115" y="170" width="160" height="46" rx="6" fill="#ffffff" stroke="#87a9cf"/>
  <text x="195" y="199" text-anchor="middle" font-size="15" fill="#24466b">NestLoop Plan</text>
  <rect x="82" y="280" width="125" height="46" rx="6" fill="#ffffff" stroke="#87a9cf"/>
  <text x="145" y="309" text-anchor="middle" font-size="15" fill="#24466b">SeqScan</text>
  <rect x="222" y="280" width="125" height="46" rx="6" fill="#ffffff" stroke="#87a9cf"/>
  <text x="285" y="309" text-anchor="middle" font-size="15" fill="#24466b">IndexScan</text>
  <path d="M176 216 L150 278" stroke="#87a9cf" stroke-width="2"/>
  <path d="M214 216 L280 278" stroke="#87a9cf" stroke-width="2"/>
  <text x="195" y="410" text-anchor="middle" font-size="15" fill="#4c5d70">planner 生成，执行期不改写</text>

  <rect x="390" y="100" width="300" height="430" rx="8" fill="#fff7e8" stroke="#d5a142"/>
  <text x="540" y="132" text-anchor="middle" font-size="20" font-weight="700" fill="#624c11">PlanState Tree</text>
  <rect x="440" y="165" width="200" height="70" rx="6" fill="#ffffff" stroke="#d5a142"/>
  <text x="540" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="#624c11">NestLoopState</text>
  <text x="540" y="216" text-anchor="middle" font-size="13" fill="#624c11">ExecProcNode = ExecNestLoop</text>
  <rect x="410" y="315" width="130" height="70" rx="6" fill="#ffffff" stroke="#d5a142"/>
  <text x="475" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#624c11">SeqScanState</text>
  <text x="475" y="366" text-anchor="middle" font-size="12" fill="#624c11">ExecSeqScan*</text>
  <rect x="555" y="315" width="130" height="70" rx="6" fill="#ffffff" stroke="#d5a142"/>
  <text x="620" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#624c11">IndexScanState</text>
  <text x="620" y="366" text-anchor="middle" font-size="12" fill="#624c11">ExecIndexScan</text>
  <path d="M508 235 L480 313" stroke="#d5a142" stroke-width="2"/>
  <path d="M572 235 L616 313" stroke="#d5a142" stroke-width="2"/>
  <text x="540" y="435" text-anchor="middle" font-size="14" fill="#624c11">qual / projection / chgParam / instrumentation</text>
  <text x="540" y="462" text-anchor="middle" font-size="14" fill="#624c11">ps_ResultTupleSlot 保存当前输出行</text>

  <path d="M320 193 L435 193" stroke="#3f5f8f" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="356" y="180" font-size="13" fill="#3f5f8f">ExecInitNode</text>

  <rect x="735" y="110" width="180" height="78" rx="8" fill="#eaf8f1" stroke="#6fb58b"/>
  <text x="825" y="140" text-anchor="middle" font-size="17" font-weight="700" fill="#17603d">EState</text>
  <text x="825" y="164" text-anchor="middle" font-size="13" fill="#17603d">全局执行状态</text>
  <rect x="735" y="230" width="180" height="88" rx="8" fill="#eaf8f1" stroke="#6fb58b"/>
  <text x="825" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#17603d">ExprState</text>
  <text x="825" y="286" text-anchor="middle" font-size="13" fill="#17603d">qual / targetlist</text>
  <rect x="735" y="360" width="180" height="92" rx="8" fill="#eaf8f1" stroke="#6fb58b"/>
  <text x="825" y="392" text-anchor="middle" font-size="17" font-weight="700" fill="#17603d">TupleTableSlot</text>
  <text x="825" y="416" text-anchor="middle" font-size="13" fill="#17603d">heap / minimal / virtual</text>
  <rect x="735" y="494" width="180" height="70" rx="8" fill="#f5f6f8" stroke="#aeb8c3"/>
  <text x="825" y="524" text-anchor="middle" font-size="16" font-weight="700" fill="#45515f">Memory Context</text>
  <text x="825" y="546" text-anchor="middle" font-size="13" fill="#45515f">per-query / per-tuple</text>

  <path d="M690 150 L730 150" stroke="#3f5f8f" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M690 276 L730 276" stroke="#3f5f8f" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M690 406 L730 406" stroke="#3f5f8f" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M690 510 L730 526" stroke="#3f5f8f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="70" y="590" font-size="14" fill="#5b6773">要点：PostgreSQL 没有实例化抽象 PlanState 本身，而是用各类 *State 节点共享这个公共头部。</text>
</svg>
