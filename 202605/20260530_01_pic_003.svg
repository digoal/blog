<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">流式算子与阻塞算子的首行延迟差异</title>
  <desc id="desc">对比 SeqScan、NestLoop 等流式算子与 Sort、Hash、Aggregate 等阻塞或半阻塞算子的生产方式。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="580" rx="8" fill="#fbfcfd" stroke="#cad2dc"/>
  <text x="490" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#22313f">Pull 模型不等于每个算子都能立刻吐出第一行</text>

  <rect x="70" y="110" width="380" height="390" rx="8" fill="#edf8f2" stroke="#74b58b"/>
  <text x="260" y="146" text-anchor="middle" font-size="20" font-weight="700" fill="#185c3f">流式 / Pipeline Friendly</text>
  <rect x="112" y="195" width="118" height="52" rx="6" fill="#ffffff" stroke="#74b58b"/>
  <text x="171" y="227" text-anchor="middle" font-size="15" fill="#185c3f">SeqScan</text>
  <rect x="285" y="195" width="118" height="52" rx="6" fill="#ffffff" stroke="#74b58b"/>
  <text x="344" y="227" text-anchor="middle" font-size="15" fill="#185c3f">Filter</text>
  <rect x="198" y="315" width="124" height="52" rx="6" fill="#ffffff" stroke="#74b58b"/>
  <text x="260" y="347" text-anchor="middle" font-size="15" fill="#185c3f">Limit</text>
  <path d="M230 221 L282 221" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M344 247 L283 313" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="425" text-anchor="middle" font-size="15" fill="#2d6a4f">一边拉一边返回；LIMIT 可以提前停止下层。</text>
  <text x="260" y="452" text-anchor="middle" font-size="15" fill="#2d6a4f">低首行延迟，函数调用频繁。</text>

  <rect x="530" y="110" width="380" height="390" rx="8" fill="#fff4df" stroke="#d6a03a"/>
  <text x="720" y="146" text-anchor="middle" font-size="20" font-weight="700" fill="#684d05">阻塞 / Materializing</text>
  <rect x="585" y="195" width="118" height="52" rx="6" fill="#ffffff" stroke="#d6a03a"/>
  <text x="644" y="227" text-anchor="middle" font-size="15" fill="#684d05">Child Plan</text>
  <rect x="748" y="195" width="118" height="52" rx="6" fill="#ffffff" stroke="#d6a03a"/>
  <text x="807" y="227" text-anchor="middle" font-size="15" fill="#684d05">Tuplesort</text>
  <rect x="650" y="315" width="140" height="52" rx="6" fill="#ffffff" stroke="#d6a03a"/>
  <text x="720" y="347" text-anchor="middle" font-size="15" fill="#684d05">Sort 输出</text>
  <path d="M703 221 L745 221" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M807 247 L740 313" stroke="#334e68" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="720" y="425" text-anchor="middle" font-size="15" fill="#7a5b10">首次调用先消费全部或大量输入。</text>
  <text x="720" y="452" text-anchor="middle" font-size="15" fill="#7a5b10">首行延迟高，但可换来有序、哈希表或聚合状态。</text>

  <line x1="80" y1="550" x2="900" y2="550" stroke="#b8c1cc" stroke-width="2"/>
  <text x="80" y="580" font-size="14" fill="#5b6773">工程判断：看 EXPLAIN 的 startup cost、actual time、loops、temp blocks，才能判断阻塞代价是否值得。</text>
</svg>
