<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" role="img" aria-labelledby="title desc">
  <title id="title">Volcano 单行模型与向量化模型对比</title>
  <desc id="desc">展示传统单行 Pull 模型每次返回一行，向量化执行每次返回一批向量，二者在函数调用、缓存局部性和控制复杂度上的取舍。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="600" rx="8" fill="#fbfcfe" stroke="#c9d3df"/>
  <text x="490" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#22313f">同样是 Pull，返回单位不同，性能画像不同</text>

  <rect x="60" y="110" width="410" height="430" rx="8" fill="#eef4fb" stroke="#7fa7cf"/>
  <text x="265" y="148" text-anchor="middle" font-size="21" font-weight="700" fill="#1d3557">传统单行 Volcano</text>
  <rect x="120" y="205" width="290" height="64" rx="8" fill="#ffffff" stroke="#7fa7cf"/>
  <text x="265" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#1d3557">ExecProcNode()</text>
  <text x="265" y="255" text-anchor="middle" font-size="14" fill="#1d3557">返回 1 个 TupleTableSlot</text>
  <rect x="120" y="318" width="68" height="44" rx="4" fill="#dbeafe" stroke="#7fa7cf"/>
  <text x="154" y="345" text-anchor="middle" font-size="13" fill="#1d3557">row</text>
  <rect x="205" y="318" width="68" height="44" rx="4" fill="#dbeafe" stroke="#7fa7cf"/>
  <text x="239" y="345" text-anchor="middle" font-size="13" fill="#1d3557">row</text>
  <rect x="290" y="318" width="68" height="44" rx="4" fill="#dbeafe" stroke="#7fa7cf"/>
  <text x="324" y="345" text-anchor="middle" font-size="13" fill="#1d3557">row</text>
  <path d="M154 314 L154 276" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M239 314 L239 276" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M324 314 L324 276" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="420" text-anchor="middle" font-size="15" fill="#334155">优点：接口简单、可组合、低首行延迟。</text>
  <text x="265" y="450" text-anchor="middle" font-size="15" fill="#334155">代价：每行函数调度、分支、解释开销更明显。</text>

  <rect x="510" y="110" width="410" height="430" rx="8" fill="#eaf8f1" stroke="#6fb58b"/>
  <text x="715" y="148" text-anchor="middle" font-size="21" font-weight="700" fill="#17603d">向量化 / X100 风格</text>
  <rect x="570" y="205" width="290" height="64" rx="8" fill="#ffffff" stroke="#6fb58b"/>
  <text x="715" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#17603d">nextBatch()</text>
  <text x="715" y="255" text-anchor="middle" font-size="14" fill="#17603d">返回一批 column vector</text>
  <rect x="585" y="315" width="260" height="34" rx="4" fill="#d7f4e4" stroke="#6fb58b"/>
  <text x="715" y="338" text-anchor="middle" font-size="13" fill="#17603d">col_a: [v1, v2, v3, ...]</text>
  <rect x="585" y="360" width="260" height="34" rx="4" fill="#d7f4e4" stroke="#6fb58b"/>
  <text x="715" y="383" text-anchor="middle" font-size="13" fill="#17603d">col_b: [v1, v2, v3, ...]</text>
  <path d="M715 312 L715 276" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="715" y="420" text-anchor="middle" font-size="15" fill="#245b42">优点：摊薄函数调用，改善缓存和 CPU pipeline。</text>
  <text x="715" y="450" text-anchor="middle" font-size="15" fill="#245b42">代价：算子状态、表达式、边界处理更复杂。</text>

  <text x="70" y="590" font-size="14" fill="#5b6773">判断标准：OLTP 小结果更看重首行与通用性；OLAP 扫描/聚合更看重每 CPU 周期处理多少值。</text>
</svg>
