<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">单行 Pull 与向量化批处理的执行粒度对比</title>
  <desc id="desc">展示 Volcano 单行 Pull 每次传一行，向量化批处理每次传一个 DataChunk，减少函数调用和解释开销。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="472" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="480" y="62" font-size="24" text-anchor="middle" fill="#1f2328" font-family="Arial, sans-serif">执行接口不只决定“怎么取数”，还决定 CPU 每次处理多少行</text>

  <g>
    <rect x="70" y="105" width="360" height="330" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
    <text x="250" y="140" font-size="20" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">传统单行 Pull / Volcano</text>
    <rect x="135" y="175" width="230" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="250" y="205" font-size="16" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">父算子 next()</text>
    <line x1="250" y1="224" x2="250" y2="264" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="135" y="265" width="230" height="48" rx="6" fill="#fff7ed" stroke="#f97316"/>
    <text x="250" y="295" font-size="16" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">子算子返回 1 行</text>
    <line x1="250" y1="314" x2="250" y2="354" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="135" y="355" width="230" height="48" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="250" y="385" font-size="16" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">重复 N 次函数调用</text>
  </g>

  <g>
    <rect x="530" y="105" width="360" height="330" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
    <text x="710" y="140" font-size="20" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">向量化批处理 / Vectorized Batch</text>
    <rect x="595" y="175" width="230" height="48" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="710" y="205" font-size="16" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">请求一个 DataChunk</text>
    <line x1="710" y1="224" x2="710" y2="264" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="595" y="265" width="230" height="48" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="710" y="295" font-size="16" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">列向量: 最多 2048 行</text>
    <line x1="710" y1="314" x2="710" y2="354" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="595" y="355" width="230" height="48" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="710" y="385" font-size="16" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">批内循环 / SIMD / 少解释</text>
  </g>

  <text x="480" y="468" font-size="16" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">核心变化：控制流仍可按需取数，但数据流从“tuple”变成“batch of column vectors”。</text>
</svg>
