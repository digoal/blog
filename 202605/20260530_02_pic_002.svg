<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">DuckDB DataChunk、Vector 与 UnifiedVectorFormat</title>
  <desc id="desc">展示 DuckDB DataChunk 包含多个等长 Vector，Vector 可为 flat、constant、dictionary 等形式，并可转成统一访问格式。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="512" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="490" y="62" font-size="24" text-anchor="middle" fill="#1f2328" font-family="Arial, sans-serif">DuckDB 的批：DataChunk = 多个等长列向量</text>

  <rect x="70" y="105" width="420" height="350" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="280" y="138" font-size="20" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">DataChunk</text>
  <text x="280" y="166" font-size="15" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">count = 本批行数；所有 Vector 同长</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#1f2937">
    <rect x="105" y="200" width="330" height="52" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="128" y="232">Vector col0: id</text>
    <rect x="105" y="272" width="330" height="52" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="128" y="304">Vector col1: k</text>
    <rect x="105" y="344" width="330" height="52" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="128" y="376">Vector col2: v</text>
  </g>

  <line x1="490" y1="280" x2="570" y2="280" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="570" y="105" width="340" height="350" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="740" y="138" font-size="20" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">Vector 表示</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#1f2937">
    <rect x="610" y="175" width="260" height="42" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="740" y="202" text-anchor="middle">FLAT: 连续数组 + validity</text>
    <rect x="610" y="235" width="260" height="42" rx="6" fill="#fae8ff" stroke="#a855f7"/>
    <text x="740" y="262" text-anchor="middle">CONSTANT: 一个值表示整批</text>
    <rect x="610" y="295" width="260" height="42" rx="6" fill="#ffedd5" stroke="#f97316"/>
    <text x="740" y="322" text-anchor="middle">DICTIONARY: 原向量 + 选择表</text>
    <rect x="610" y="365" width="260" height="52" rx="6" fill="#ecfdf5" stroke="#10b981"/>
    <text x="740" y="387" text-anchor="middle">UnifiedVectorFormat</text>
    <text x="740" y="407" text-anchor="middle" font-size="13">data pointer + validity + sel</text>
  </g>

  <text x="490" y="500" font-size="16" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">算子可以直接引用、切片或统一读取向量，避免每一行都拆装成独立对象。</text>
</svg>
