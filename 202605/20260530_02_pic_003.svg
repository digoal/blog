<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">DuckDB PipelineExecutor 的批处理路径</title>
  <desc id="desc">展示 DuckDB source 取出 DataChunk 后，经中间算子 Execute，最后进入 sink，并支持 HAVE_MORE_OUTPUT、BLOCKED 和 FINISHED 状态。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="512" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="490" y="62" font-size="24" text-anchor="middle" fill="#1f2328" font-family="Arial, sans-serif">DuckDB 当前实现：pipeline 调度 + DataChunk 批流动</text>

  <rect x="70" y="180" width="170" height="95" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="155" y="218" font-size="18" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Source</text>
  <text x="155" y="244" font-size="14" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">GetData(chunk)</text>

  <line x1="240" y1="228" x2="325" y2="228" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="282" y="210" font-size="13" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">DataChunk</text>

  <rect x="325" y="160" width="160" height="135" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="405" y="202" font-size="18" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Operator 1</text>
  <text x="405" y="228" font-size="14" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Filter</text>
  <text x="405" y="254" font-size="14" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Execute(in,out)</text>

  <line x1="485" y1="228" x2="570" y2="228" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="570" y="160" width="160" height="135" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="650" y="202" font-size="18" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Operator 2</text>
  <text x="650" y="228" font-size="14" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Projection</text>
  <text x="650" y="254" font-size="14" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Execute(in,out)</text>

  <line x1="730" y1="228" x2="815" y2="228" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="815" y="180" width="105" height="95" rx="8" fill="#fae8ff" stroke="#a855f7"/>
  <text x="867" y="218" font-size="18" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Sink</text>
  <text x="867" y="244" font-size="14" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">Sink(chunk)</text>

  <rect x="190" y="360" width="600" height="70" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="490" y="388" font-size="16" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">状态返回值控制调度</text>
  <text x="490" y="414" font-size="14" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">HAVE_MORE_OUTPUT: 当前算子还有输出；BLOCKED: 等待异步/资源；FINISHED: pipeline 结束</text>

  <text x="490" y="500" font-size="16" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">所以 DuckDB 不是简单递归 next()，而是把批处理接口放进可并行、可中断、可缓存的 pipeline 执行框架。</text>
</svg>
