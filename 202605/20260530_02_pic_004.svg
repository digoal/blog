<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">过滤算子的选择向量路径</title>
  <desc id="desc">展示过滤表达式对一个批次生成 SelectionVector，输出 DataChunk 通过 Slice 引用输入向量而不是复制所有值。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="512" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="490" y="62" font-size="24" text-anchor="middle" fill="#1f2328" font-family="Arial, sans-serif">Filter 不是逐行拷贝，而是先生成通过行号</text>

  <rect x="70" y="120" width="250" height="300" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="195" y="152" font-size="18" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">输入 DataChunk</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#1f2937">
    <rect x="105" y="185" width="180" height="30" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="195" y="205" text-anchor="middle">row 0: k=8</text>
    <rect x="105" y="218" width="180" height="30" fill="#dcfce7" stroke="#16a34a"/>
    <text x="195" y="238" text-anchor="middle">row 1: k=12</text>
    <rect x="105" y="251" width="180" height="30" fill="#dcfce7" stroke="#16a34a"/>
    <text x="195" y="271" text-anchor="middle">row 2: k=15</text>
    <rect x="105" y="284" width="180" height="30" fill="#fee2e2" stroke="#ef4444"/>
    <text x="195" y="304" text-anchor="middle">row 3: k=33</text>
    <rect x="105" y="317" width="180" height="30" fill="#dcfce7" stroke="#16a34a"/>
    <text x="195" y="337" text-anchor="middle">row 4: k=20</text>
  </g>

  <line x1="320" y1="270" x2="420" y2="270" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="420" y="150" width="190" height="240" rx="8" fill="#fff7ed" stroke="#f97316"/>
  <text x="515" y="184" font-size="18" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">表达式选择</text>
  <text x="515" y="215" font-size="15" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">k BETWEEN 10 AND 20</text>
  <rect x="460" y="255" width="110" height="78" rx="6" fill="#ffffff" stroke="#8c959f"/>
  <text x="515" y="282" font-size="15" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">SelectionVector</text>
  <text x="515" y="307" font-size="15" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif">[1, 2, 4]</text>

  <line x1="610" y1="270" x2="710" y2="270" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="710" y="120" width="210" height="300" rx="8" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="815" y="152" font-size="18" text-anchor="middle" fill="#24292f" font-family="Arial, sans-serif">输出 DataChunk</text>
  <text x="815" y="182" font-size="14" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">Slice 引用输入向量</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#1f2937">
    <rect x="750" y="225" width="130" height="34" fill="#dcfce7" stroke="#16a34a"/>
    <text x="815" y="247" text-anchor="middle">row 1</text>
    <rect x="750" y="267" width="130" height="34" fill="#dcfce7" stroke="#16a34a"/>
    <text x="815" y="289" text-anchor="middle">row 2</text>
    <rect x="750" y="309" width="130" height="34" fill="#dcfce7" stroke="#16a34a"/>
    <text x="815" y="331" text-anchor="middle">row 4</text>
  </g>

  <text x="490" y="500" font-size="16" text-anchor="middle" fill="#57606a" font-family="Arial, sans-serif">选择向量把“过滤后剩哪些行”从“复制数据”变成“传递索引”，低选择率和多列宽表尤其受益。</text>
</svg>
