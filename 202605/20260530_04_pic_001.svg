<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Pull 模型与编译型 Push Pipeline 对比</title>
  <desc id="desc">对比 Volcano Pull 模型的 next 调用链和编译型 Push 模型的融合循环。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .h{font:700 18px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .t{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#243447}
    .small{font:13px Arial,"Noto Sans CJK SC",sans-serif;fill:#465a69}
    .box{fill:#f7fbff;stroke:#4b7bec;stroke-width:2;rx:8}
    .box2{fill:#f7fff7;stroke:#20bf6b;stroke-width:2;rx:8}
    .warn{fill:#fff8e8;stroke:#f5a623;stroke-width:2;rx:8}
    .line{stroke:#34495e;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#7f8c8d;stroke-width:2;stroke-dasharray:7 6;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="20" y="20" width="1060" height="520" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="550" y="58" text-anchor="middle" class="title">从 Pull 到编译型 Push：把“每行问一次”改成“一个紧循环推到底”</text>

  <text x="170" y="105" text-anchor="middle" class="h">Volcano / Pull</text>
  <rect x="65" y="135" width="210" height="70" class="box"/>
  <text x="170" y="164" text-anchor="middle" class="t">Aggregate.next()</text>
  <text x="170" y="187" text-anchor="middle" class="small">请求一行或一批</text>
  <rect x="65" y="245" width="210" height="70" class="box"/>
  <text x="170" y="274" text-anchor="middle" class="t">Filter.next()</text>
  <text x="170" y="297" text-anchor="middle" class="small">函数调用 / 分支 / 虚调用</text>
  <rect x="65" y="355" width="210" height="70" class="box"/>
  <text x="170" y="384" text-anchor="middle" class="t">Scan.next()</text>
  <text x="170" y="407" text-anchor="middle" class="small">返回 tuple / chunk</text>
  <path d="M170 205 L170 245" class="line"/>
  <path d="M170 315 L170 355" class="line"/>
  <path d="M276 390 C350 390 350 170 276 170" class="dash"/>
  <text x="350" y="285" class="small">控制权反复上下跳转</text>

  <text x="790" y="105" text-anchor="middle" class="h">Compiled Push Pipeline</text>
  <rect x="560" y="135" width="460" height="290" class="box2"/>
  <text x="790" y="170" text-anchor="middle" class="t">一个为 pipeline 生成的机器码函数</text>
  <rect x="610" y="205" width="360" height="54" class="warn"/>
  <text x="790" y="238" text-anchor="middle" class="t">for row/vector in morsel: 读取列、算谓词</text>
  <rect x="610" y="280" width="360" height="54" class="warn"/>
  <text x="790" y="313" text-anchor="middle" class="t">if predicate: 直接更新聚合 / hash table</text>
  <rect x="610" y="355" width="360" height="44" class="warn"/>
  <text x="790" y="383" text-anchor="middle" class="t">满批次或结束时输出</text>
  <path d="M790 259 L790 280" class="line"/>
  <path d="M790 334 L790 355" class="line"/>
  <path d="M970 377 C1030 377 1030 225 970 225" class="dash"/>
  <text x="620" y="460" class="small">收益：少解释器分派、少中间物化、更多寄存器驻留和编译器优化</text>
  <text x="620" y="486" class="small">代价：编译延迟、代码缓存、debug 难度、对短查询可能不划算</text>
</svg>
