<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">LLVM Codegen 生命周期</title>
  <desc id="desc">展示 SQL 从计划、pipeline 切分、IR 生成、优化、机器码执行到缓存失效的生命周期。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .h{font:700 16px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .t{font:14px Arial,"Noto Sans CJK SC",sans-serif;fill:#34495e}
    .small{font:12px Arial,"Noto Sans CJK SC",sans-serif;fill:#5d6d7e}
    .box{fill:#f8fbff;stroke:#3867d6;stroke-width:2;rx:8}
    .run{fill:#f5fff8;stroke:#20bf6b;stroke-width:2;rx:8}
    .risk{fill:#fff7f0;stroke:#fa8231;stroke-width:2;rx:8}
    .line{stroke:#2c3e50;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="20" y="20" width="1080" height="480" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="560" y="58" text-anchor="middle" class="title">LLVM Codegen 不是“换个执行器”，而是一条生命周期</text>

  <rect x="55" y="125" width="150" height="82" class="box"/>
  <text x="130" y="154" text-anchor="middle" class="h">SQL / Plan</text>
  <text x="130" y="180" text-anchor="middle" class="t">逻辑优化</text>

  <rect x="245" y="125" width="160" height="82" class="box"/>
  <text x="325" y="154" text-anchor="middle" class="h">Pipeline 切分</text>
  <text x="325" y="180" text-anchor="middle" class="t">阻塞算子断开</text>

  <rect x="445" y="125" width="150" height="82" class="box"/>
  <text x="520" y="154" text-anchor="middle" class="h">IR 生成</text>
  <text x="520" y="180" text-anchor="middle" class="t">谓词/投影/Join</text>

  <rect x="635" y="125" width="150" height="82" class="box"/>
  <text x="710" y="154" text-anchor="middle" class="h">LLVM 优化</text>
  <text x="710" y="180" text-anchor="middle" class="t">inline / DCE</text>

  <rect x="825" y="125" width="150" height="82" class="run"/>
  <text x="900" y="154" text-anchor="middle" class="h">机器码执行</text>
  <text x="900" y="180" text-anchor="middle" class="t">紧循环 push</text>

  <path d="M205 166 L245 166" class="line"/>
  <path d="M405 166 L445 166" class="line"/>
  <path d="M595 166 L635 166" class="line"/>
  <path d="M785 166 L825 166" class="line"/>

  <rect x="130" y="292" width="210" height="92" class="risk"/>
  <text x="235" y="323" text-anchor="middle" class="h">编译预算</text>
  <text x="235" y="350" text-anchor="middle" class="t">短查询不一定回本</text>
  <text x="235" y="372" text-anchor="middle" class="small">hybrid / tiered execution</text>

  <rect x="455" y="292" width="210" height="92" class="risk"/>
  <text x="560" y="323" text-anchor="middle" class="h">代码缓存</text>
  <text x="560" y="350" text-anchor="middle" class="t">schema / UDF / 参数变化</text>
  <text x="560" y="372" text-anchor="middle" class="small">需要失效与内存上限</text>

  <rect x="780" y="292" width="210" height="92" class="risk"/>
  <text x="885" y="323" text-anchor="middle" class="h">可观测性</text>
  <text x="885" y="350" text-anchor="middle" class="t">EXPLAIN、profile、fallback</text>
  <text x="885" y="372" text-anchor="middle" class="small">否则故障定位困难</text>

  <path d="M520 207 C520 250 235 250 235 292" class="line"/>
  <path d="M710 207 C710 250 560 250 560 292" class="line"/>
  <path d="M900 207 C900 250 885 250 885 292" class="line"/>
</svg>
