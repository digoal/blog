<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Morsel-Driven Parallelism</title>
  <desc id="desc">展示 morsel 队列如何把扫描范围切成小块，并由 worker 持续领取以减少负载不均。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .h{font:700 16px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .t{font:14px Arial,"Noto Sans CJK SC",sans-serif;fill:#34495e}
    .small{font:12px Arial,"Noto Sans CJK SC",sans-serif;fill:#5d6d7e}
    .queue{fill:#f8fbff;stroke:#3867d6;stroke-width:2;rx:8}
    .worker{fill:#f5fff8;stroke:#20bf6b;stroke-width:2;rx:8}
    .numa{fill:#fff8e8;stroke:#f5a623;stroke-width:2;rx:8}
    .m{fill:#dff3ff;stroke:#3867d6}
    .line{stroke:#34495e;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="20" y="20" width="1080" height="520" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="560" y="58" text-anchor="middle" class="title">Morsel：并行执行的调度单位，不是 SQL 语义单位</text>

  <rect x="60" y="125" width="270" height="330" class="queue"/>
  <text x="195" y="158" text-anchor="middle" class="h">扫描范围 / 分区</text>
  <text x="195" y="184" text-anchor="middle" class="t">切成多个小 morsel</text>
  <g>
    <rect x="90" y="220" width="52" height="52" class="m"/><text x="116" y="252" text-anchor="middle" class="t">M1</text>
    <rect x="152" y="220" width="52" height="52" class="m"/><text x="178" y="252" text-anchor="middle" class="t">M2</text>
    <rect x="214" y="220" width="52" height="52" class="m"/><text x="240" y="252" text-anchor="middle" class="t">M3</text>
    <rect x="90" y="292" width="52" height="52" class="m"/><text x="116" y="324" text-anchor="middle" class="t">M4</text>
    <rect x="152" y="292" width="52" height="52" class="m"/><text x="178" y="324" text-anchor="middle" class="t">M5</text>
    <rect x="214" y="292" width="52" height="52" class="m"/><text x="240" y="324" text-anchor="middle" class="t">M6</text>
  </g>

  <rect x="455" y="105" width="210" height="80" class="worker"/>
  <text x="560" y="136" text-anchor="middle" class="h">Worker 1</text>
  <text x="560" y="162" text-anchor="middle" class="t">执行 compiled pipeline</text>
  <rect x="455" y="220" width="210" height="80" class="worker"/>
  <text x="560" y="251" text-anchor="middle" class="h">Worker 2</text>
  <text x="560" y="277" text-anchor="middle" class="t">执行 compiled pipeline</text>
  <rect x="455" y="335" width="210" height="80" class="worker"/>
  <text x="560" y="366" text-anchor="middle" class="h">Worker 3</text>
  <text x="560" y="392" text-anchor="middle" class="t">执行 compiled pipeline</text>

  <path d="M330 245 L455 145" class="line"/>
  <path d="M330 282 L455 260" class="line"/>
  <path d="M330 330 L455 375" class="line"/>

  <rect x="780" y="140" width="255" height="245" class="numa"/>
  <text x="907" y="174" text-anchor="middle" class="h">调度目标</text>
  <text x="907" y="210" text-anchor="middle" class="t">负载均衡：谁空谁拿下一块</text>
  <text x="907" y="245" text-anchor="middle" class="t">局部性：优先本 NUMA / 本分区</text>
  <text x="907" y="280" text-anchor="middle" class="t">低同步：morsel 足够大</text>
  <text x="907" y="315" text-anchor="middle" class="t">高响应：morsel 又不能过大</text>
  <text x="907" y="350" text-anchor="middle" class="small">适合长扫描、Join、聚合等 CPU 密集查询</text>
  <path d="M665 260 L780 260" class="line"/>
</svg>
