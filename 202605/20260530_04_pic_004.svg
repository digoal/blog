<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="620" viewBox="0 0 1140 620" role="img" aria-labelledby="title desc">
  <title id="title">RisingWave 当前 Chunk 执行路径</title>
  <desc id="desc">展示 RisingWave 从 SQL 到 batch 或 stream executor，再到 DataChunk 或 StreamChunk 和表达式 eval 的执行路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .h{font:700 16px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .t{font:14px Arial,"Noto Sans CJK SC",sans-serif;fill:#34495e}
    .small{font:12px Arial,"Noto Sans CJK SC",sans-serif;fill:#5d6d7e}
    .box{fill:#f8fbff;stroke:#3867d6;stroke-width:2;rx:8}
    .stream{fill:#f5fff8;stroke:#20bf6b;stroke-width:2;rx:8}
    .expr{fill:#fff8e8;stroke:#f5a623;stroke-width:2;rx:8}
    .no{fill:#fff4f4;stroke:#eb3b5a;stroke-width:2;rx:8}
    .line{stroke:#34495e;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="20" y="20" width="1100" height="580" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="570" y="58" text-anchor="middle" class="title">RisingWave 源码事实：Chunk + Rust 表达式执行，而非运行时 LLVM JIT</text>

  <rect x="470" y="95" width="200" height="66" class="box"/>
  <text x="570" y="124" text-anchor="middle" class="h">SQL / Binder / Planner</text>
  <text x="570" y="146" text-anchor="middle" class="small">frontend 生成 batch / stream plan</text>

  <rect x="170" y="225" width="250" height="80" class="box"/>
  <text x="295" y="256" text-anchor="middle" class="h">Batch Executor</text>
  <text x="295" y="282" text-anchor="middle" class="t">BoxedDataChunkStream</text>

  <rect x="720" y="225" width="250" height="80" class="stream"/>
  <text x="845" y="256" text-anchor="middle" class="h">Stream Executor</text>
  <text x="845" y="282" text-anchor="middle" class="t">BoxedMessageStream</text>

  <path d="M520 161 L340 225" class="line"/>
  <path d="M620 161 L800 225" class="line"/>

  <rect x="140" y="360" width="310" height="88" class="box"/>
  <text x="295" y="392" text-anchor="middle" class="h">DataChunk</text>
  <text x="295" y="418" text-anchor="middle" class="t">列数组 + visibility bitmap</text>

  <rect x="690" y="360" width="310" height="88" class="stream"/>
  <text x="845" y="392" text-anchor="middle" class="h">StreamChunk</text>
  <text x="845" y="418" text-anchor="middle" class="t">DataChunk + Op 插入/删除/更新</text>

  <path d="M295 305 L295 360" class="line"/>
  <path d="M845 305 L845 360" class="line"/>

  <rect x="395" y="500" width="350" height="62" class="expr"/>
  <text x="570" y="526" text-anchor="middle" class="h">risingwave_expr::Expression::eval</text>
  <text x="570" y="548" text-anchor="middle" class="small">vectorized eval / eval_v2；必要时 eval_row</text>
  <path d="M395 448 L520 500" class="line"/>
  <path d="M745 448 L620 500" class="line"/>

  <rect x="825" y="500" width="240" height="62" class="no"/>
  <text x="945" y="526" text-anchor="middle" class="h">未见 LLVM/JIT 入口</text>
  <text x="945" y="548" text-anchor="middle" class="small">codegen 多为 Rust 宏/构建期生成</text>
</svg>
