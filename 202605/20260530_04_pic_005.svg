<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">编译型执行模型适用边界</title>
  <desc id="desc">用决策树展示何时适合 LLVM Codegen，何时保持解释型、向量化或混合执行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .h{font:700 16px Arial,"Noto Sans CJK SC",sans-serif;fill:#1f2d3d}
    .t{font:14px Arial,"Noto Sans CJK SC",sans-serif;fill:#34495e}
    .small{font:12px Arial,"Noto Sans CJK SC",sans-serif;fill:#5d6d7e}
    .q{fill:#f8fbff;stroke:#3867d6;stroke-width:2;rx:8}
    .yes{fill:#f5fff8;stroke:#20bf6b;stroke-width:2;rx:8}
    .no{fill:#fff4f4;stroke:#eb3b5a;stroke-width:2;rx:8}
    .mix{fill:#fff8e8;stroke:#f5a623;stroke-width:2;rx:8}
    .line{stroke:#34495e;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="20" y="20" width="1080" height="560" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="560" y="58" text-anchor="middle" class="title">是否值得 LLVM Codegen：先看工作负载，再看工程边界</text>

  <rect x="420" y="95" width="280" height="70" class="q"/>
  <text x="560" y="124" text-anchor="middle" class="h">查询是否足够长、足够热？</text>
  <text x="560" y="147" text-anchor="middle" class="small">CPU 时间能否覆盖编译成本</text>

  <rect x="120" y="225" width="260" height="78" class="no"/>
  <text x="250" y="256" text-anchor="middle" class="h">否：解释型 / 向量化</text>
  <text x="250" y="282" text-anchor="middle" class="small">OLTP 点查、短查询、一次性 ad hoc</text>

  <rect x="740" y="225" width="260" height="78" class="q"/>
  <text x="870" y="256" text-anchor="middle" class="h">算子是否可融合？</text>
  <text x="870" y="282" text-anchor="middle" class="small">Scan-Filter-Project-Join-Agg pipeline</text>

  <path d="M420 130 L250 225" class="line"/>
  <path d="M700 130 L870 225" class="line"/>

  <rect x="600" y="365" width="230" height="78" class="mix"/>
  <text x="715" y="396" text-anchor="middle" class="h">部分可融合：Hybrid</text>
  <text x="715" y="422" text-anchor="middle" class="small">先跑解释型，同时后台编译</text>

  <rect x="890" y="365" width="190" height="78" class="yes"/>
  <text x="985" y="396" text-anchor="middle" class="h">可融合：Codegen</text>
  <text x="985" y="422" text-anchor="middle" class="small">生成 pipeline 机器码</text>

  <path d="M835 303 L715 365" class="line"/>
  <path d="M905 303 L985 365" class="line"/>

  <rect x="110" y="405" width="330" height="105" class="q"/>
  <text x="275" y="435" text-anchor="middle" class="h">工程检查项</text>
  <text x="275" y="464" text-anchor="middle" class="t">EXPLAIN 是否能显示编译/回退？</text>
  <text x="275" y="489" text-anchor="middle" class="t">代码缓存是否有上限和失效策略？</text>
  <path d="M250 303 L275 405" class="line"/>

  <rect x="560" y="500" width="420" height="52" class="q"/>
  <text x="770" y="532" text-anchor="middle" class="t">结论：编译是执行引擎的“高温路径优化”，不是所有查询的默认答案</text>
  <path d="M715 443 L720 500" class="line"/>
  <path d="M985 443 L900 500" class="line"/>
</svg>
