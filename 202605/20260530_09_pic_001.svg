<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">顺序扫描从 SQL 到元组输出的主路径</title>
  <desc id="desc">展示 PostgreSQL 中 Seq Scan 从计划器路径、执行器节点、TableAM 到 heap 页面和可见性判断的流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#44546a"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .blue{fill:#e0f2fe}
      .green{fill:#dcfce7}
      .amber{fill:#fef3c7}
      .rose{fill:#ffe4e6}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#0f172a}
      .small{font-size:14px;fill:#475569}
      .line{stroke:#44546a;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="30" y="35" width="190" height="82" class="box blue"/>
  <text x="125" y="66" text-anchor="middle" class="text">计划器</text>
  <text x="125" y="92" text-anchor="middle" class="small">create_seqscan_path</text>
  <text x="125" y="110" text-anchor="middle" class="small">cost_seqscan</text>

  <rect x="285" y="35" width="190" height="82" class="box blue"/>
  <text x="380" y="66" text-anchor="middle" class="text">计划树</text>
  <text x="380" y="94" text-anchor="middle" class="small">SeqScan(plan)</text>

  <rect x="540" y="35" width="190" height="82" class="box green"/>
  <text x="635" y="66" text-anchor="middle" class="text">执行器节点</text>
  <text x="635" y="92" text-anchor="middle" class="small">ExecSeqScan*</text>
  <text x="635" y="110" text-anchor="middle" class="small">SeqNext</text>

  <rect x="795" y="35" width="150" height="82" class="box green"/>
  <text x="870" y="66" text-anchor="middle" class="text">通用表接口</text>
  <text x="870" y="94" text-anchor="middle" class="small">TableAM</text>

  <rect x="120" y="220" width="205" height="110" class="box amber"/>
  <text x="222" y="252" text-anchor="middle" class="text">heap 扫描描述符</text>
  <text x="222" y="280" text-anchor="middle" class="small">startblock / nblocks</text>
  <text x="222" y="300" text-anchor="middle" class="small">bulk-read strategy</text>

  <rect x="390" y="220" width="205" height="110" class="box amber"/>
  <text x="492" y="252" text-anchor="middle" class="text">页面读取</text>
  <text x="492" y="280" text-anchor="middle" class="small">read_stream_next_buffer</text>
  <text x="492" y="300" text-anchor="middle" class="small">共享缓冲区 / OS cache</text>

  <rect x="660" y="220" width="205" height="110" class="box rose"/>
  <text x="762" y="252" text-anchor="middle" class="text">页面内元组</text>
  <text x="762" y="280" text-anchor="middle" class="small">MVCC 可见性</text>
  <text x="762" y="300" text-anchor="middle" class="small">qual 过滤 / projection</text>

  <path d="M220 76 H285" class="line"/>
  <path d="M475 76 H540" class="line"/>
  <path d="M730 76 H795" class="line"/>
  <path d="M870 117 C870 175 220 165 220 220" class="line"/>
  <path d="M325 275 H390" class="line"/>
  <path d="M595 275 H660" class="line"/>
  <path d="M762 330 C762 375 635 384 492 384 C350 384 222 376 222 330" class="line"/>
  <text x="492" y="405" text-anchor="middle" class="small">每次返回一个可见且满足条件的 tuple slot；父节点可能提前停止，例如 LIMIT</text>
</svg>
