<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">顺序扫描代价模型</title>
  <desc id="desc">展示 cost_seqscan 中磁盘页面成本、CPU 过滤成本、投影成本和并行调整的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .disk{fill:#dbeafe}
      .cpu{fill:#dcfce7}
      .target{fill:#fef3c7}
      .parallel{fill:#fce7f3}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#0f172a}
      .small{font-size:14px;fill:#475569}
      .line{stroke:#475569;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .formula{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#1e293b}
    </style>
  </defs>
  <rect x="35" y="55" width="210" height="110" class="box disk"/>
  <text x="140" y="86" text-anchor="middle" class="text">磁盘运行成本</text>
  <text x="140" y="118" text-anchor="middle" class="formula">seq_page_cost</text>
  <text x="140" y="140" text-anchor="middle" class="formula">* rel.pages</text>

  <rect x="285" y="55" width="210" height="110" class="box cpu"/>
  <text x="390" y="86" text-anchor="middle" class="text">CPU 扫描成本</text>
  <text x="390" y="118" text-anchor="middle" class="formula">(cpu_tuple_cost</text>
  <text x="390" y="140" text-anchor="middle" class="formula">+ qual_per_tuple) * rel.tuples</text>

  <rect x="535" y="55" width="210" height="110" class="box target"/>
  <text x="640" y="86" text-anchor="middle" class="text">输出表达式成本</text>
  <text x="640" y="118" text-anchor="middle" class="formula">target_startup</text>
  <text x="640" y="140" text-anchor="middle" class="formula">+ target_per_tuple * rows</text>

  <rect x="775" y="55" width="170" height="110" class="box parallel"/>
  <text x="860" y="86" text-anchor="middle" class="text">并行修正</text>
  <text x="860" y="118" text-anchor="middle" class="small">CPU 按 worker 分摊</text>
  <text x="860" y="140" text-anchor="middle" class="small">I/O 默认不分摊</text>

  <rect x="250" y="250" width="480" height="105" class="box"/>
  <text x="490" y="284" text-anchor="middle" class="text">total_cost</text>
  <text x="490" y="315" text-anchor="middle" class="formula">startup_cost + cpu_run_cost + disk_run_cost</text>
  <text x="490" y="338" text-anchor="middle" class="small">Seq Scan 无索引定位能力；选择它常常是全表访问代价最低</text>

  <path d="M140 165 C140 220 350 220 410 250" class="line"/>
  <path d="M390 165 V250" class="line"/>
  <path d="M640 165 C640 220 560 220 540 250" class="line"/>
  <path d="M860 165 C860 235 700 235 620 250" class="line"/>
  <text x="490" y="395" text-anchor="middle" class="small">enable_seqscan=off 只是提高劣势标记/禁用倾向；没有其他访问路径时仍可能出现 Seq Scan</text>
</svg>
