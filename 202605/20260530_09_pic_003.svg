<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Heap 页面内顺序扫描与可见性判断</title>
  <desc id="desc">展示顺序扫描读取页面、检查行指针、MVCC 可见性和 WHERE 条件过滤的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .page{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .hdr{fill:#e2e8f0;stroke:#64748b}
      .tuple{fill:#dcfce7;stroke:#166534;rx:5}
      .dead{fill:#fee2e2;stroke:#991b1b;rx:5}
      .free{fill:#f1f5f9;stroke:#94a3b8;rx:5}
      .box{fill:#fff7ed;stroke:#9a3412;stroke-width:1.5;rx:8}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:16px;fill:#0f172a}
      .small{font-size:13px;fill:#475569}
      .line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="45" y="55" width="410" height="300" class="page"/>
  <rect x="65" y="80" width="370" height="48" class="hdr"/>
  <text x="250" y="110" text-anchor="middle" class="text">Heap Page Header / line pointers</text>
  <rect x="75" y="155" width="95" height="58" class="tuple"/>
  <text x="122" y="187" text-anchor="middle" class="text">tuple 1</text>
  <rect x="190" y="155" width="95" height="58" class="dead"/>
  <text x="237" y="187" text-anchor="middle" class="text">tuple 2</text>
  <rect x="305" y="155" width="95" height="58" class="tuple"/>
  <text x="352" y="187" text-anchor="middle" class="text">tuple 3</text>
  <rect x="75" y="240" width="95" height="58" class="free"/>
  <text x="122" y="272" text-anchor="middle" class="text">空闲</text>
  <rect x="190" y="240" width="95" height="58" class="tuple"/>
  <text x="237" y="272" text-anchor="middle" class="text">tuple 4</text>
  <rect x="305" y="240" width="95" height="58" class="dead"/>
  <text x="352" y="272" text-anchor="middle" class="text">tuple 5</text>

  <rect x="545" y="55" width="365" height="72" class="box"/>
  <text x="728" y="84" text-anchor="middle" class="text">1. 页级准备</text>
  <text x="728" y="108" text-anchor="middle" class="small">可 page-at-a-time；可利用 all-visible 快路径</text>

  <rect x="545" y="165" width="365" height="72" class="box"/>
  <text x="728" y="194" text-anchor="middle" class="text">2. MVCC 可见性</text>
  <text x="728" y="218" text-anchor="middle" class="small">HeapTupleSatisfiesVisibility / MVCC batch</text>

  <rect x="545" y="275" width="365" height="72" class="box"/>
  <text x="728" y="304" text-anchor="middle" class="text">3. SQL 条件与投影</text>
  <text x="728" y="328" text-anchor="middle" class="small">ExecScanExtended 做 qual 和 projection</text>

  <path d="M455 110 H545" class="line"/>
  <path d="M455 205 H545" class="line"/>
  <path d="M455 295 H545" class="line"/>
  <text x="490" y="390" text-anchor="middle" class="small">Seq Scan 会读完整块范围；WHERE 不能减少已读取页面，只能减少向上返回的行</text>
</svg>
