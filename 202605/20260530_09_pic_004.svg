<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">同步顺序扫描的环形起点</title>
  <desc id="desc">展示多个后端扫描同一大表时，新扫描可从已有扫描附近开始并绕回表头，从而共享缓存和 I/O。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .seg{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5;rx:5}
      .hot{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:5}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:16px;fill:#0f172a}
      .small{font-size:13px;fill:#475569}
      .line{stroke:#475569;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .scan1{stroke:#2563eb;stroke-width:5;fill:none;marker-end:url(#arrow)}
      .scan2{stroke:#16a34a;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="60" y="55" class="text">表块序列</text>
  <g transform="translate(60 80)">
    <rect x="0" y="0" width="78" height="55" class="seg"/><text x="39" y="34" text-anchor="middle" class="text">0</text>
    <rect x="82" y="0" width="78" height="55" class="seg"/><text x="121" y="34" text-anchor="middle" class="text">1</text>
    <rect x="164" y="0" width="78" height="55" class="seg"/><text x="203" y="34" text-anchor="middle" class="text">2</text>
    <rect x="246" y="0" width="78" height="55" class="seg"/><text x="285" y="34" text-anchor="middle" class="text">3</text>
    <rect x="328" y="0" width="78" height="55" class="hot"/><text x="367" y="34" text-anchor="middle" class="text">4</text>
    <rect x="410" y="0" width="78" height="55" class="hot"/><text x="449" y="34" text-anchor="middle" class="text">5</text>
    <rect x="492" y="0" width="78" height="55" class="hot"/><text x="531" y="34" text-anchor="middle" class="text">6</text>
    <rect x="574" y="0" width="78" height="55" class="seg"/><text x="613" y="34" text-anchor="middle" class="text">7</text>
    <rect x="656" y="0" width="78" height="55" class="seg"/><text x="695" y="34" text-anchor="middle" class="text">8</text>
    <rect x="738" y="0" width="78" height="55" class="seg"/><text x="777" y="34" text-anchor="middle" class="text">9</text>
  </g>
  <path d="M390 170 C500 205 600 205 700 170" class="scan1"/>
  <text x="545" y="220" text-anchor="middle" class="small">已有扫描报告当前位置</text>
  <path d="M470 255 C600 290 760 290 860 150" class="scan2"/>
  <path d="M860 150 C930 215 875 355 120 355 C70 355 55 290 95 250" class="scan2"/>
  <text x="565" y="325" text-anchor="middle" class="small">新扫描从附近开始，扫到尾部后 wrap around 回到 0</text>
  <rect x="635" y="245" width="285" height="98" class="box"/>
  <text x="777" y="276" text-anchor="middle" class="text">收益</text>
  <text x="777" y="302" text-anchor="middle" class="small">减少重复物理 I/O</text>
  <text x="777" y="324" text-anchor="middle" class="small">提高共享缓冲区/OS cache 命中</text>
  <rect x="70" y="245" width="285" height="98" class="box"/>
  <text x="212" y="276" text-anchor="middle" class="text">代价</text>
  <text x="212" y="302" text-anchor="middle" class="small">无 ORDER BY 时返回顺序不稳定</text>
  <text x="212" y="324" text-anchor="middle" class="small">只对大表、允许 syncscan 时启用</text>
</svg>
