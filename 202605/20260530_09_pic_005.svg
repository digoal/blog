<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">并行顺序扫描的块分配</title>
  <desc id="desc">展示 Gather 下多个 worker 通过共享计数器按连续 chunk 获取表块并返回部分结果。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .worker{fill:#dcfce7;stroke:#166534;stroke-width:1.5;rx:8}
      .shared{fill:#fef3c7;stroke:#b45309;stroke-width:1.5;rx:8}
      .chunk{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.3;rx:4}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:16px;fill:#0f172a}
      .small{font-size:13px;fill:#475569}
      .line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="395" y="30" width="190" height="62" class="box"/>
  <text x="490" y="67" text-anchor="middle" class="text">Gather / Leader</text>
  <rect x="80" y="135" width="180" height="70" class="worker"/>
  <text x="170" y="166" text-anchor="middle" class="text">Worker 1</text>
  <text x="170" y="188" text-anchor="middle" class="small">chunk A, D...</text>
  <rect x="300" y="135" width="180" height="70" class="worker"/>
  <text x="390" y="166" text-anchor="middle" class="text">Worker 2</text>
  <text x="390" y="188" text-anchor="middle" class="small">chunk B, E...</text>
  <rect x="520" y="135" width="180" height="70" class="worker"/>
  <text x="610" y="166" text-anchor="middle" class="text">Worker 3</text>
  <text x="610" y="188" text-anchor="middle" class="small">chunk C, F...</text>
  <rect x="740" y="135" width="160" height="70" class="worker"/>
  <text x="820" y="166" text-anchor="middle" class="text">Leader 可参与</text>
  <text x="820" y="188" text-anchor="middle" class="small">视执行而定</text>

  <rect x="350" y="245" width="280" height="62" class="shared"/>
  <text x="490" y="272" text-anchor="middle" class="text">共享扫描状态 DSM</text>
  <text x="490" y="294" text-anchor="middle" class="small">phs_startblock / phs_nallocated</text>

  <g transform="translate(85 345)">
    <rect x="0" y="0" width="85" height="44" class="chunk"/><text x="42" y="28" text-anchor="middle" class="text">A</text>
    <rect x="90" y="0" width="85" height="44" class="chunk"/><text x="132" y="28" text-anchor="middle" class="text">B</text>
    <rect x="180" y="0" width="85" height="44" class="chunk"/><text x="222" y="28" text-anchor="middle" class="text">C</text>
    <rect x="270" y="0" width="85" height="44" class="chunk"/><text x="312" y="28" text-anchor="middle" class="text">D</text>
    <rect x="360" y="0" width="85" height="44" class="chunk"/><text x="402" y="28" text-anchor="middle" class="text">E</text>
    <rect x="450" y="0" width="85" height="44" class="chunk"/><text x="492" y="28" text-anchor="middle" class="text">F</text>
    <rect x="540" y="0" width="85" height="44" class="chunk"/><text x="582" y="28" text-anchor="middle" class="text">G</text>
    <rect x="630" y="0" width="85" height="44" class="chunk"/><text x="672" y="28" text-anchor="middle" class="text">H</text>
    <rect x="720" y="0" width="85" height="44" class="chunk"/><text x="762" y="28" text-anchor="middle" class="text">...</text>
  </g>

  <path d="M490 92 C490 115 170 110 170 135" class="line"/>
  <path d="M490 92 C490 115 390 110 390 135" class="line"/>
  <path d="M490 92 C490 115 610 110 610 135" class="line"/>
  <path d="M490 92 C490 115 820 110 820 135" class="line"/>
  <path d="M170 205 C170 238 350 225 420 245" class="line"/>
  <path d="M390 205 V245" class="line"/>
  <path d="M610 205 C610 238 560 225 540 245" class="line"/>
  <path d="M490 307 V345" class="line"/>
  <text x="490" y="415" text-anchor="middle" class="small">按连续块范围分配给 worker，兼顾 OS readahead；尾部逐步缩小 chunk 以减少长尾</text>
</svg>
