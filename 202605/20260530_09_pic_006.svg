<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">常见扫描方法选择边界</title>
  <desc id="desc">比较顺序扫描、索引扫描、位图堆扫描、索引仅扫描和分区裁剪的选择边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .node{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .yes{fill:#dcfce7}
      .no{fill:#fee2e2}
      .choice{fill:#e0f2fe}
      .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:15px;fill:#0f172a}
      .small{font-size:12.5px;fill:#475569}
      .line{stroke:#475569;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="365" y="25" width="250" height="58" class="node choice"/>
  <text x="490" y="60" text-anchor="middle" class="text">WHERE / ORDER BY / LIMIT / 统计信息</text>

  <rect x="365" y="115" width="250" height="58" class="node"/>
  <text x="490" y="148" text-anchor="middle" class="text">能先缩小物理访问范围吗？</text>

  <rect x="60" y="220" width="180" height="82" class="node yes"/>
  <text x="150" y="250" text-anchor="middle" class="text">Index Scan</text>
  <text x="150" y="274" text-anchor="middle" class="small">少量随机取行</text>
  <text x="150" y="292" text-anchor="middle" class="small">或利用索引顺序</text>

  <rect x="285" y="220" width="180" height="82" class="node yes"/>
  <text x="375" y="250" text-anchor="middle" class="text">Bitmap Heap Scan</text>
  <text x="375" y="274" text-anchor="middle" class="small">中等选择率</text>
  <text x="375" y="292" text-anchor="middle" class="small">合并多个索引后按块访问</text>

  <rect x="515" y="220" width="180" height="82" class="node yes"/>
  <text x="605" y="250" text-anchor="middle" class="text">Index Only Scan</text>
  <text x="605" y="274" text-anchor="middle" class="small">索引覆盖列</text>
  <text x="605" y="292" text-anchor="middle" class="small">visibility map 友好</text>

  <rect x="745" y="220" width="180" height="82" class="node no"/>
  <text x="835" y="250" text-anchor="middle" class="text">Seq Scan</text>
  <text x="835" y="274" text-anchor="middle" class="small">全表/大比例访问</text>
  <text x="835" y="292" text-anchor="middle" class="small">索引随机 I/O 不划算</text>

  <rect x="365" y="345" width="250" height="58" class="node choice"/>
  <text x="490" y="371" text-anchor="middle" class="text">表很大且查询安全？</text>
  <text x="490" y="392" text-anchor="middle" class="small">考虑 Parallel Seq Scan / 分区裁剪</text>

  <path d="M490 83 V115" class="line"/>
  <path d="M365 150 C185 160 150 190 150 220" class="line"/>
  <path d="M430 173 C390 190 375 205 375 220" class="line"/>
  <path d="M550 173 C590 190 605 205 605 220" class="line"/>
  <path d="M615 150 C790 160 835 190 835 220" class="line"/>
  <path d="M835 302 C835 340 620 322 570 345" class="line"/>
  <path d="M375 302 C375 340 430 322 450 345" class="line"/>
</svg>
