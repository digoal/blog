<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Index Scan Pipeline</title>
  <desc id="desc">Planner and executor pipeline for PostgreSQL index scan from SQL predicate to index access method, heap fetch, visibility check, and projection.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#364152"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .lane { fill: #ffffff; stroke: #c7ced8; stroke-width: 1.5; rx: 8; }
      .box { fill: #edf6f9; stroke: #2a6f7f; stroke-width: 1.5; rx: 7; }
      .box2 { fill: #fff4df; stroke: #a46300; stroke-width: 1.5; rx: 7; }
      .box3 { fill: #f0f5e8; stroke: #557a1f; stroke-width: 1.5; rx: 7; }
      .box4 { fill: #f8eef7; stroke: #8a4b82; stroke-width: 1.5; rx: 7; }
      .txt { font-family: Arial, sans-serif; fill: #202734; font-size: 17px; }
      .small { font-family: Arial, sans-serif; fill: #3f4a5a; font-size: 14px; }
      .label { font-family: Arial, sans-serif; fill: #111827; font-size: 20px; font-weight: 700; }
      .arrow { stroke: #364152; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7d8898; stroke-width: 1.8; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="640"/>
  <text class="label" x="42" y="46">PostgreSQL: Index Scan 从“条件”到“可见行”的流水线</text>

  <rect class="lane" x="34" y="80" width="1110" height="165"/>
  <text class="label" x="60" y="114">Planner</text>
  <rect class="box" x="62" y="142" width="190" height="70"/>
  <text class="txt" x="88" y="174">WHERE / ORDER BY</text>
  <text class="small" x="84" y="196">谓词、排序、LIMIT</text>
  <rect class="box" x="322" y="142" width="195" height="70"/>
  <text class="txt" x="354" y="173">create_index_path</text>
  <text class="small" x="356" y="196">indexclauses / pathkeys</text>
  <rect class="box" x="588" y="142" width="185" height="70"/>
  <text class="txt" x="635" y="173">cost_index</text>
  <text class="small" x="614" y="196">选择率、相关性、I/O</text>
  <rect class="box" x="844" y="142" width="235" height="70"/>
  <text class="txt" x="878" y="173">create_indexscan_plan</text>
  <text class="small" x="884" y="196">indexqual 与 qpqual 分离</text>
  <path class="arrow" d="M252 177 H322"/>
  <path class="arrow" d="M517 177 H588"/>
  <path class="arrow" d="M773 177 H844"/>

  <rect class="lane" x="34" y="275" width="1110" height="300"/>
  <text class="label" x="60" y="309">Executor</text>
  <rect class="box2" x="62" y="338" width="180" height="75"/>
  <text class="txt" x="98" y="369">ExecIndexScan</text>
  <text class="small" x="93" y="392">运行时 key / ExecScan</text>
  <rect class="box2" x="292" y="338" width="180" height="75"/>
  <text class="txt" x="326" y="369">index_beginscan</text>
  <text class="small" x="328" y="392">绑定 snapshot</text>
  <rect class="box2" x="522" y="338" width="190" height="75"/>
  <text class="txt" x="552" y="369">index_getnext_slot</text>
  <text class="small" x="546" y="392">循环取候选 TID</text>
  <rect class="box3" x="762" y="338" width="168" height="75"/>
  <text class="txt" x="801" y="369">btgettuple</text>
  <text class="small" x="790" y="392">_bt_first / _bt_next</text>
  <rect class="box4" x="968" y="338" width="140" height="75"/>
  <text class="txt" x="1002" y="369">Heap Fetch</text>
  <text class="small" x="996" y="392">MVCC 可见性</text>
  <path class="arrow" d="M242 376 H292"/>
  <path class="arrow" d="M472 376 H522"/>
  <path class="arrow" d="M712 376 H762"/>
  <path class="arrow" d="M930 376 H968"/>

  <rect class="box4" x="640" y="462" width="185" height="75"/>
  <text class="txt" x="682" y="493">xs_recheck?</text>
  <text class="small" x="675" y="516">lossy AM 需复核</text>
  <rect class="box4" x="890" y="462" width="190" height="75"/>
  <text class="txt" x="934" y="493">qpqual / project</text>
  <text class="small" x="925" y="516">剩余谓词与输出列</text>
  <path class="arrow" d="M1038 413 V448 C1038 456 1030 462 1018 462 H825"/>
  <path class="arrow" d="M825 500 H890"/>
  <path class="dash" d="M960 212 V280 C960 316 908 330 850 338"/>
  <text class="small" x="905" y="262">Plan node</text>
</svg>
