<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Scan Choice Boundary</title>
  <desc id="desc">Decision boundaries among sequential scan, index scan, bitmap scan, index-only scan, and DuckDB ART index scan.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill:#ffffff; }
      .axis { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .region1 { fill:#e0f2fe; stroke:#0284c7; stroke-width:1.5; rx:8; }
      .region2 { fill:#dcfce7; stroke:#16a34a; stroke-width:1.5; rx:8; }
      .region3 { fill:#ffedd5; stroke:#ea580c; stroke-width:1.5; rx:8; }
      .region4 { fill:#f3e8ff; stroke:#9333ea; stroke-width:1.5; rx:8; }
      .region5 { fill:#fee2e2; stroke:#dc2626; stroke-width:1.5; rx:8; }
      .txt { font-family:Arial, sans-serif; fill:#1f2937; font-size:16px; }
      .small { font-family:Arial, sans-serif; fill:#475569; font-size:14px; }
      .title { font-family:Arial, sans-serif; fill:#111827; font-size:20px; font-weight:700; }
      .line { stroke:#64748b; stroke-width:2; stroke-dasharray:7 5; fill:none; }
    </style>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="title" x="42" y="46">扫描方法选择边界：选择率只是第一维，还要看排序、可见性、随机 I/O 和执行引擎</text>

  <path class="axis" d="M120 540 H1040"/>
  <path class="axis" d="M120 540 V105"/>
  <text class="small" x="845" y="585">选择率从低到高</text>
  <text class="small" x="32" y="130" transform="rotate(-90 32 130)">每个候选行的表访问成本</text>

  <rect class="region2" x="165" y="140" width="230" height="120"/>
  <text class="txt" x="210" y="176">Index Scan</text>
  <text class="small" x="192" y="205">少量候选行</text>
  <text class="small" x="192" y="229">可利用排序或 LIMIT</text>
  <rect class="region4" x="170" y="305" width="235" height="95"/>
  <text class="txt" x="205" y="340">DuckDB ART Index Scan</text>
  <text class="small" x="195" y="367">低于阈值才进入 row_id fetch</text>
  <rect class="region3" x="475" y="185" width="245" height="130"/>
  <text class="txt" x="545" y="222">Bitmap Scan</text>
  <text class="small" x="505" y="251">中等选择率</text>
  <text class="small" x="505" y="275">批量整理 TID，降低随机性</text>
  <rect class="region1" x="760" y="340" width="235" height="110"/>
  <text class="txt" x="828" y="377">Seq Scan</text>
  <text class="small" x="790" y="405">高选择率</text>
  <text class="small" x="790" y="429">顺序吞吐更重要</text>
  <rect class="region5" x="470" y="390" width="230" height="95"/>
  <text class="txt" x="535" y="425">Index-only</text>
  <text class="small" x="500" y="452">前提：索引覆盖 + all-visible</text>

  <path class="line" d="M430 125 C470 210 505 285 540 540"/>
  <path class="line" d="M735 120 C720 260 770 395 940 540"/>
  <text class="small" x="420" y="96">边界会随统计信息与缓存改变</text>
</svg>
