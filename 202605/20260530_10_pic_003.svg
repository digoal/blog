<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL B-tree Navigation</title>
  <desc id="desc">How a PostgreSQL B-tree index scan descends from root to leaf, locates the first matching item, moves across leaf pages, and follows right links after page split.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill:#f8fafc; }
      .page { fill:#ffffff; stroke:#64748b; stroke-width:1.8; rx:8; }
      .page2 { fill:#eef7f1; stroke:#3f7a4a; stroke-width:1.8; rx:8; }
      .key { fill:#e2e8f0; stroke:#94a3b8; stroke-width:1; rx:4; }
      .hot { fill:#ffedd5; stroke:#c2410c; stroke-width:1.4; rx:4; }
      .txt { font-family:Arial, sans-serif; fill:#1f2937; font-size:16px; }
      .small { font-family:Arial, sans-serif; fill:#475569; font-size:14px; }
      .title { font-family:Arial, sans-serif; fill:#111827; font-size:20px; font-weight:700; }
      .arrow { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:2; stroke-dasharray:6 5; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="title" x="42" y="46">PostgreSQL B-tree Index Scan: 找起点、顺序推进、处理并发分裂</text>

  <rect class="page" x="492" y="86" width="196" height="86"/>
  <text class="txt" x="558" y="116">Root Page</text>
  <rect class="key" x="515" y="132" width="42" height="24"/><text class="small" x="525" y="150">20</text>
  <rect class="key" x="568" y="132" width="42" height="24"/><text class="small" x="578" y="150">50</text>
  <rect class="key" x="621" y="132" width="42" height="24"/><text class="small" x="631" y="150">80</text>

  <rect class="page" x="160" y="260" width="210" height="86"/>
  <text class="txt" x="218" y="290">Internal</text>
  <rect class="key" x="184" y="306" width="48" height="24"/><text class="small" x="196" y="324">10</text>
  <rect class="key" x="244" y="306" width="48" height="24"/><text class="small" x="256" y="324">20</text>
  <rect class="page" x="485" y="260" width="210" height="86"/>
  <text class="txt" x="543" y="290">Internal</text>
  <rect class="key" x="510" y="306" width="48" height="24"/><text class="small" x="522" y="324">35</text>
  <rect class="key" x="570" y="306" width="48" height="24"/><text class="small" x="582" y="324">50</text>
  <rect class="page" x="810" y="260" width="210" height="86"/>
  <text class="txt" x="868" y="290">Internal</text>
  <rect class="key" x="835" y="306" width="48" height="24"/><text class="small" x="847" y="324">65</text>
  <rect class="key" x="895" y="306" width="48" height="24"/><text class="small" x="907" y="324">80</text>
  <path class="arrow" d="M535 172 C460 210 372 230 300 260"/>
  <path class="arrow" d="M590 172 V260"/>
  <path class="arrow" d="M645 172 C720 210 808 230 880 260"/>

  <rect class="page2" x="110" y="455" width="200" height="92"/>
  <text class="txt" x="158" y="484">Leaf Page A</text>
  <rect class="key" x="134" y="502" width="36" height="24"/><text class="small" x="141" y="520">21</text>
  <rect class="key" x="178" y="502" width="36" height="24"/><text class="small" x="185" y="520">27</text>
  <rect class="hot" x="222" y="502" width="46" height="24"/><text class="small" x="229" y="520">31</text>
  <rect class="page2" x="375" y="455" width="220" height="92"/>
  <text class="txt" x="428" y="484">Leaf Page B</text>
  <rect class="hot" x="400" y="502" width="46" height="24"/><text class="small" x="407" y="520">35</text>
  <rect class="hot" x="454" y="502" width="46" height="24"/><text class="small" x="461" y="520">42</text>
  <rect class="key" x="508" y="502" width="46" height="24"/><text class="small" x="515" y="520">48</text>
  <rect class="page2" x="660" y="455" width="220" height="92"/>
  <text class="txt" x="713" y="484">Leaf Page C</text>
  <rect class="key" x="686" y="502" width="46" height="24"/><text class="small" x="693" y="520">51</text>
  <rect class="key" x="740" y="502" width="46" height="24"/><text class="small" x="747" y="520">58</text>
  <rect class="key" x="794" y="502" width="46" height="24"/><text class="small" x="801" y="520">64</text>
  <path class="arrow" d="M560 346 C510 385 485 410 485 455"/>
  <path class="dash" d="M310 502 H375"/>
  <path class="dash" d="M595 502 H660"/>
  <text class="small" x="316" y="488">right link</text>
  <text class="small" x="604" y="488">right link</text>

  <rect class="page" x="900" y="448" width="220" height="116"/>
  <text class="txt" x="938" y="479">并发安全要点</text>
  <text class="small" x="924" y="507">_bt_search 下探</text>
  <text class="small" x="924" y="529">_bt_binsrch 定位起点</text>
  <text class="small" x="924" y="551">_bt_moveright 跟随 high key</text>
  <path class="arrow" d="M880 501 H900"/>
</svg>
