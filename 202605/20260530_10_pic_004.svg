<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Index Scan Cost Model</title>
  <desc id="desc">Inputs and trade-offs in PostgreSQL index scan costing, including selectivity, correlation, heap page fetches, random I/O, CPU cost, and index-only visibility map effect.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill:#fbfbf8; }
      .box { fill:#ffffff; stroke:#9ca3af; stroke-width:1.5; rx:8; }
      .in { fill:#eaf3ff; stroke:#2563eb; stroke-width:1.5; rx:8; }
      .calc { fill:#ecfdf3; stroke:#16803c; stroke-width:1.5; rx:8; }
      .warn { fill:#fff7ed; stroke:#c2410c; stroke-width:1.5; rx:8; }
      .txt { font-family:Arial, sans-serif; fill:#1f2937; font-size:16px; }
      .small { font-family:Arial, sans-serif; fill:#4b5563; font-size:14px; }
      .title { font-family:Arial, sans-serif; fill:#111827; font-size:20px; font-weight:700; }
      .arrow { stroke:#374151; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#6b7280; stroke-width:1.8; stroke-dasharray:6 5; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="title" x="42" y="46">Index Scan 的代价不是“走索引就便宜”，而是“索引定位 + 表访问 + CPU”</text>

  <rect class="in" x="55" y="100" width="210" height="90"/>
  <text class="txt" x="92" y="132">AM estimate</text>
  <text class="small" x="82" y="158">indexStartupCost</text>
  <text class="small" x="82" y="178">indexSelectivity / pages</text>
  <rect class="in" x="55" y="235" width="210" height="90"/>
  <text class="txt" x="96" y="267">Statistics</text>
  <text class="small" x="84" y="293">表行数、相关性</text>
  <text class="small" x="84" y="313">allvisfrac / cache</text>
  <rect class="in" x="55" y="370" width="210" height="90"/>
  <text class="txt" x="95" y="402">Query shape</text>
  <text class="small" x="84" y="428">ORDER BY / LIMIT</text>
  <text class="small" x="84" y="448">qpqual CPU</text>

  <rect class="calc" x="370" y="122" width="230" height="90"/>
  <text class="txt" x="423" y="154">tuples_fetched</text>
  <text class="small" x="405" y="181">selectivity * reltuples</text>
  <rect class="calc" x="370" y="275" width="230" height="90"/>
  <text class="txt" x="415" y="307">heap pages fetched</text>
  <text class="small" x="395" y="334">Mackert-Lohman + cache</text>
  <rect class="calc" x="370" y="430" width="230" height="90"/>
  <text class="txt" x="420" y="462">I/O interpolation</text>
  <text class="small" x="393" y="489">random_page_cost ↔ seq_page_cost</text>

  <rect class="warn" x="725" y="110" width="360" height="110"/>
  <text class="txt" x="770" y="145">低选择率、好相关性、能早停</text>
  <text class="small" x="762" y="173">Index Scan 常胜：少量 TID，少量 heap page</text>
  <text class="small" x="762" y="195">匹配排序时可省排序或配合 LIMIT</text>
  <rect class="warn" x="725" y="265" width="360" height="120"/>
  <text class="txt" x="772" y="300">高选择率、低相关性、随机访问</text>
  <text class="small" x="762" y="328">Index Scan 可能退化为大量随机 heap fetch</text>
  <text class="small" x="762" y="350">Seq Scan 或 Bitmap Scan 可能更稳</text>
  <rect class="warn" x="725" y="430" width="360" height="110"/>
  <text class="txt" x="788" y="465">Index-only 是另一个问题</text>
  <text class="small" x="762" y="493">只有可见性图证明 all-visible 时</text>
  <text class="small" x="762" y="515">才可能避免 heap I/O</text>

  <path class="arrow" d="M265 145 H370"/>
  <path class="arrow" d="M265 280 H370"/>
  <path class="arrow" d="M265 415 H370"/>
  <path class="arrow" d="M485 212 V275"/>
  <path class="arrow" d="M485 365 V430"/>
  <path class="arrow" d="M600 167 C655 153 680 148 725 152"/>
  <path class="arrow" d="M600 320 C655 320 680 320 725 320"/>
  <path class="dash" d="M600 475 C660 486 680 490 725 490"/>
</svg>
