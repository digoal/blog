<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">DuckDB ART Index Scan</title>
  <desc id="desc">DuckDB table scan initialization chooses an ART index scan only for selective single-filter cases, gathers row ids from ART, then fetches vectors from storage.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill:#f9fafb; }
      .box { fill:#ffffff; stroke:#94a3b8; stroke-width:1.5; rx:8; }
      .gate { fill:#eef2ff; stroke:#4f46e5; stroke-width:1.5; rx:8; }
      .art { fill:#ecfdf5; stroke:#047857; stroke-width:1.5; rx:8; }
      .fetch { fill:#fff7ed; stroke:#c2410c; stroke-width:1.5; rx:8; }
      .txt { font-family:Arial, sans-serif; fill:#1f2937; font-size:16px; }
      .small { font-family:Arial, sans-serif; fill:#475569; font-size:14px; }
      .title { font-family:Arial, sans-serif; fill:#111827; font-size:20px; font-weight:700; }
      .arrow { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:1.8; stroke-dasharray:6 5; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="title" x="42" y="46">DuckDB: ART Index Scan 是 Table Scan 里的“选择性优化分支”</text>

  <rect class="box" x="70" y="110" width="210" height="90"/>
  <text class="txt" x="105" y="143">TableScanInitGlobal</text>
  <text class="small" x="100" y="170">检查过滤条件与索引</text>
  <rect class="gate" x="365" y="78" width="250" height="84"/>
  <text class="txt" x="410" y="111">FilterCount == 1?</text>
  <text class="small" x="405" y="138">否则普通 table scan</text>
  <rect class="gate" x="365" y="205" width="250" height="84"/>
  <text class="txt" x="412" y="238">单列 ART?</text>
  <text class="small" x="395" y="265">复合 ART 当前不走 scan</text>
  <rect class="gate" x="365" y="332" width="250" height="84"/>
  <text class="txt" x="405" y="365">row_ids &lt;= threshold?</text>
  <text class="small" x="392" y="392">max(2048, 0.1% * rows)</text>
  <rect class="box" x="365" y="475" width="250" height="84"/>
  <text class="txt" x="424" y="508">Table Scan</text>
  <text class="small" x="400" y="535">条件不满足时回退</text>

  <rect class="art" x="710" y="120" width="205" height="92"/>
  <text class="txt" x="756" y="153">ART::Scan</text>
  <text class="small" x="744" y="180">=, &gt;, &gt;=, &lt;, &lt;=, BETWEEN</text>
  <rect class="art" x="710" y="265" width="205" height="92"/>
  <text class="txt" x="740" y="298">row_t set / arena</text>
  <text class="small" x="744" y="325">排序后的 row id 列表</text>
  <rect class="fetch" x="710" y="410" width="205" height="92"/>
  <text class="txt" x="747" y="443">storage.Fetch</text>
  <text class="small" x="744" y="470">按 STANDARD_VECTOR_SIZE</text>
  <rect class="fetch" x="960" y="410" width="155" height="92"/>
  <text class="txt" x="989" y="443">DataChunk</text>
  <text class="small" x="988" y="470">向量化输出</text>

  <path class="arrow" d="M280 155 H365"/>
  <path class="arrow" d="M490 162 V205"/>
  <path class="arrow" d="M490 289 V332"/>
  <path class="arrow" d="M615 374 C650 330 682 280 710 198"/>
  <path class="arrow" d="M812 212 V265"/>
  <path class="arrow" d="M812 357 V410"/>
  <path class="arrow" d="M915 456 H960"/>
  <path class="dash" d="M615 120 H665 C690 120 690 517 615 517"/>
  <path class="dash" d="M615 247 H660 C690 247 690 517 615 517"/>
  <path class="dash" d="M615 374 H660 C690 374 690 517 615 517"/>
  <text class="small" x="642" y="548">任一门槛不满足就回退普通扫描</text>
</svg>
