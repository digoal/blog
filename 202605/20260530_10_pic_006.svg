<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Adaptive Radix Tree Layout</title>
  <desc id="desc">Adaptive Radix Tree with path compression and adaptive node sizes Node4, Node16, Node48, and Node256.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill:#f8fafc; }
      .node { fill:#ffffff; stroke:#64748b; stroke-width:1.6; rx:8; }
      .node4 { fill:#ecfeff; stroke:#0891b2; stroke-width:1.6; rx:8; }
      .node16 { fill:#f0fdf4; stroke:#16a34a; stroke-width:1.6; rx:8; }
      .node48 { fill:#fff7ed; stroke:#ea580c; stroke-width:1.6; rx:8; }
      .node256 { fill:#fdf2f8; stroke:#db2777; stroke-width:1.6; rx:8; }
      .leaf { fill:#ede9fe; stroke:#7c3aed; stroke-width:1.6; rx:8; }
      .txt { font-family:Arial, sans-serif; fill:#1f2937; font-size:16px; }
      .small { font-family:Arial, sans-serif; fill:#475569; font-size:14px; }
      .title { font-family:Arial, sans-serif; fill:#111827; font-size:20px; font-weight:700; }
      .arrow { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="title" x="42" y="46">ART: 用自适应节点把“稀疏前缀树”压成紧凑索引</text>

  <rect class="node" x="490" y="88" width="200" height="88"/>
  <text class="txt" x="540" y="120">Compressed Prefix</text>
  <text class="small" x="530" y="148">公共前缀只存一次</text>

  <rect class="node4" x="100" y="270" width="180" height="100"/>
  <text class="txt" x="154" y="302">Node4</text>
  <text class="small" x="130" y="330">最多 4 个孩子</text>
  <text class="small" x="130" y="352">很稀疏时节省空间</text>
  <rect class="node16" x="350" y="270" width="180" height="100"/>
  <text class="txt" x="400" y="302">Node16</text>
  <text class="small" x="380" y="330">最多 16 个孩子</text>
  <text class="small" x="380" y="352">小规模分支</text>
  <rect class="node48" x="600" y="270" width="180" height="100"/>
  <text class="txt" x="650" y="302">Node48</text>
  <text class="small" x="630" y="330">256 字节映射</text>
  <text class="small" x="630" y="352">最多 48 个孩子</text>
  <rect class="node256" x="850" y="270" width="180" height="100"/>
  <text class="txt" x="896" y="302">Node256</text>
  <text class="small" x="880" y="330">直接 256 路寻址</text>
  <text class="small" x="880" y="352">高扇出时少比较</text>

  <path class="arrow" d="M535 176 C420 222 320 250 230 270"/>
  <path class="arrow" d="M565 176 C520 220 475 245 455 270"/>
  <path class="arrow" d="M620 176 C650 220 675 245 690 270"/>
  <path class="arrow" d="M660 176 C770 225 855 250 920 270"/>

  <rect class="leaf" x="135" y="475" width="160" height="82"/>
  <text class="txt" x="178" y="508">Leaf</text>
  <text class="small" x="165" y="534">row_id list</text>
  <rect class="leaf" x="510" y="475" width="160" height="82"/>
  <text class="txt" x="553" y="508">Leaf</text>
  <text class="small" x="538" y="534">row_id list</text>
  <rect class="leaf" x="875" y="475" width="160" height="82"/>
  <text class="txt" x="918" y="508">Leaf</text>
  <text class="small" x="903" y="534">row_id list</text>
  <path class="arrow" d="M190 370 V475"/>
  <path class="arrow" d="M690 370 C640 410 610 440 590 475"/>
  <path class="arrow" d="M940 370 V475"/>
</svg>
