<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Index Only Scan 执行主路径</title>
  <desc id="desc">展示 PostgreSQL index only scan 从索引条目、TID、visibility map 到可选 heap fetch 的执行路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="312" rx="8" fill="#fbfcfe" stroke="#d7dee8"/>
  <rect x="58" y="76" width="170" height="88" rx="6" fill="#e8f2ff" stroke="#5b8fd6"/>
  <text x="143" y="108" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#163b64">B-tree/GiST/SP-GiST</text>
  <text x="143" y="134" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#163b64">返回 index tuple + TID</text>
  <rect x="286" y="76" width="170" height="88" rx="6" fill="#eef9ef" stroke="#58a75b"/>
  <text x="371" y="108" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#255d29">Visibility Map</text>
  <text x="371" y="134" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#255d29">检查 heap page all-visible</text>
  <rect x="526" y="48" width="170" height="88" rx="6" fill="#fff6e3" stroke="#d69a36"/>
  <text x="611" y="82" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#6c4810">命中 VM bit</text>
  <text x="611" y="108" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#6c4810">直接从索引填 slot</text>
  <rect x="526" y="184" width="170" height="88" rx="6" fill="#fff0f0" stroke="#d36d6d"/>
  <text x="611" y="218" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#6a2222">未命中 VM bit</text>
  <text x="611" y="244" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#6a2222">访问 heap 判断 MVCC</text>
  <rect x="756" y="116" width="150" height="88" rx="6" fill="#f2f0ff" stroke="#7d70c9"/>
  <text x="831" y="150" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#332a73">返回上层节点</text>
  <text x="831" y="176" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#332a73">Filter / Projection</text>
  <line x1="228" y1="120" x2="286" y2="120" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="456" y1="120" x2="526" y2="92" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="456" y1="120" x2="526" y2="228" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="696" y1="92" x2="756" y2="150" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="696" y1="228" x2="756" y2="174" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="493" y="78" font-size="15" font-family="Arial, sans-serif" fill="#34495e">all-visible</text>
  <text x="482" y="214" font-size="15" font-family="Arial, sans-serif" fill="#34495e">not all-visible</text>
  <text x="480" y="318" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#5b6572">Index Only Scan 不是永远不读 heap；它先用 VM 证明“无需读 heap”，证明不了就回表。</text>
</svg>
