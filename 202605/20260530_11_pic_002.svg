<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Visibility Map 与 Heap 页面映射</title>
  <desc id="desc">展示每个 heap 页面在 visibility map 中对应两个 bit：all-visible 和 all-frozen。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d4852"/>
    </marker>
  </defs>
  <rect x="24" y="22" width="912" height="342" rx="8" fill="#ffffff" stroke="#d8dee8"/>
  <text x="70" y="62" font-size="20" font-family="Arial, sans-serif" fill="#263238">Heap fork</text>
  <text x="575" y="62" font-size="20" font-family="Arial, sans-serif" fill="#263238">Visibility Map fork (_vm)</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#25313d">
    <rect x="64" y="92" width="115" height="74" rx="5" fill="#e8f2ff" stroke="#5c8fd6"/>
    <text x="121" y="122" text-anchor="middle">heap block 0</text>
    <text x="121" y="145" text-anchor="middle">tuple pages</text>
    <rect x="198" y="92" width="115" height="74" rx="5" fill="#e8f2ff" stroke="#5c8fd6"/>
    <text x="255" y="122" text-anchor="middle">heap block 1</text>
    <text x="255" y="145" text-anchor="middle">recent update</text>
    <rect x="332" y="92" width="115" height="74" rx="5" fill="#e8f2ff" stroke="#5c8fd6"/>
    <text x="389" y="122" text-anchor="middle">heap block 2</text>
    <text x="389" y="145" text-anchor="middle">frozen tuples</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#25313d">
    <rect x="548" y="94" width="92" height="50" rx="4" fill="#eef9ef" stroke="#58a75b"/>
    <text x="594" y="116" text-anchor="middle">AV=1</text>
    <text x="594" y="134" text-anchor="middle">AF=0</text>
    <rect x="660" y="94" width="92" height="50" rx="4" fill="#fff0f0" stroke="#cf6e6e"/>
    <text x="706" y="116" text-anchor="middle">AV=0</text>
    <text x="706" y="134" text-anchor="middle">AF=0</text>
    <rect x="772" y="94" width="92" height="50" rx="4" fill="#eef9ef" stroke="#58a75b"/>
    <text x="818" y="116" text-anchor="middle">AV=1</text>
    <text x="818" y="134" text-anchor="middle">AF=1</text>
  </g>
  <line x1="179" y1="129" x2="548" y2="119" stroke="#3d4852" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="313" y1="129" x2="660" y2="119" stroke="#3d4852" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="447" y1="129" x2="772" y2="119" stroke="#3d4852" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="86" y="222" width="790" height="76" rx="6" fill="#f7f9fb" stroke="#d1d9e6"/>
  <text x="110" y="252" font-size="17" font-family="Arial, sans-serif" fill="#263238">保守语义</text>
  <text x="110" y="278" font-size="15" font-family="Arial, sans-serif" fill="#4b5966">bit 置位：必须真实 all-visible/all-frozen；bit 未置位：可能并不代表页面不可见，只是系统不能安全证明。</text>
  <text x="110" y="326" font-size="15" font-family="Arial, sans-serif" fill="#4b5966">AV = all-visible，AF = all-frozen。Index Only Scan 只需要 AV；VACUUM 与冻结还会使用 AF。</text>
</svg>
