<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">覆盖索引与 INCLUDE 列布局</title>
  <desc id="desc">展示 B-tree 覆盖索引中 key 列参与搜索和排序，INCLUDE 列只存在于 leaf tuple 中用于返回。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="360" rx="8" fill="#ffffff" stroke="#d8dee8"/>
  <text x="64" y="64" font-size="20" font-family="Arial, sans-serif" fill="#263238">CREATE INDEX ON orders(customer_id, created_at) INCLUDE (amount, status)</text>
  <rect x="370" y="92" width="220" height="58" rx="6" fill="#fff6e3" stroke="#d69a36"/>
  <text x="480" y="127" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#67440d">upper page: 只保留导航 key</text>
  <rect x="120" y="214" width="720" height="104" rx="6" fill="#eef6ff" stroke="#5b8fd6"/>
  <text x="480" y="242" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#163b64">leaf page: non-pivot index tuple</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#263238">
    <rect x="152" y="266" width="85" height="34" fill="#e8f2ff" stroke="#5b8fd6"/>
    <text x="194" y="288" text-anchor="middle">heap TID</text>
    <rect x="237" y="266" width="122" height="34" fill="#eaf8ed" stroke="#58a75b"/>
    <text x="298" y="288" text-anchor="middle">key: customer_id</text>
    <rect x="359" y="266" width="118" height="34" fill="#eaf8ed" stroke="#58a75b"/>
    <text x="418" y="288" text-anchor="middle">key: created_at</text>
    <rect x="477" y="266" width="100" height="34" fill="#f4efff" stroke="#7d70c9"/>
    <text x="527" y="288" text-anchor="middle">include: amount</text>
    <rect x="577" y="266" width="100" height="34" fill="#f4efff" stroke="#7d70c9"/>
    <text x="627" y="288" text-anchor="middle">include: status</text>
    <rect x="677" y="266" width="126" height="34" fill="#f9fbfd" stroke="#aab4c0"/>
    <text x="740" y="288" text-anchor="middle">其他 tuple ...</text>
  </g>
  <line x1="480" y1="150" x2="480" y2="214" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="94" y="342" width="270" height="42" rx="5" fill="#eaf8ed" stroke="#58a75b"/>
  <text x="229" y="368" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#255d29">key 列：搜索、排序、唯一性语义</text>
  <rect x="394" y="342" width="288" height="42" rx="5" fill="#f4efff" stroke="#7d70c9"/>
  <text x="538" y="368" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#332a73">INCLUDE 列：payload，只为返回/覆盖</text>
  <rect x="712" y="342" width="170" height="42" rx="5" fill="#fff0f0" stroke="#cf6e6e"/>
  <text x="797" y="368" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#6a2222">更宽、更贵</text>
</svg>
