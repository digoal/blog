<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">优化器选择 Index Only Scan 的判断</title>
  <desc id="desc">展示 PostgreSQL planner 在开关、访问方法、列覆盖和成本层面决定是否生成 index only scan。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="372" rx="8" fill="#ffffff" stroke="#d8dee8"/>
  <g font-family="Arial, sans-serif" font-size="16" fill="#263238">
    <rect x="70" y="64" width="180" height="64" rx="6" fill="#eef6ff" stroke="#5b8fd6"/>
    <text x="160" y="91" text-anchor="middle">enable_indexscan</text>
    <text x="160" y="113" text-anchor="middle">enable_indexonlyscan</text>
    <rect x="304" y="64" width="180" height="64" rx="6" fill="#eef9ef" stroke="#58a75b"/>
    <text x="394" y="91" text-anchor="middle">AM 可返回列值</text>
    <text x="394" y="113" text-anchor="middle">amcanreturn</text>
    <rect x="538" y="64" width="180" height="64" rx="6" fill="#f4efff" stroke="#7d70c9"/>
    <text x="628" y="91" text-anchor="middle">查询所需列</text>
    <text x="628" y="113" text-anchor="middle">全部在索引中</text>
    <rect x="374" y="190" width="212" height="70" rx="6" fill="#fff6e3" stroke="#d69a36"/>
    <text x="480" y="219" text-anchor="middle">生成 IndexPath</text>
    <text x="480" y="242" text-anchor="middle">indexonly = true</text>
    <rect x="228" y="310" width="220" height="64" rx="6" fill="#f7f9fb" stroke="#aab4c0"/>
    <text x="338" y="337" text-anchor="middle">成本估算</text>
    <text x="338" y="359" text-anchor="middle">allvisfrac 降低 heap I/O</text>
    <rect x="512" y="310" width="220" height="64" rx="6" fill="#f7f9fb" stroke="#aab4c0"/>
    <text x="622" y="337" text-anchor="middle">和 Seq/Index/Bitmap</text>
    <text x="622" y="359" text-anchor="middle">比较后选最低成本</text>
  </g>
  <line x1="250" y1="96" x2="304" y2="96" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="484" y1="96" x2="538" y2="96" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="628" y1="128" x2="540" y2="190" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="260" x2="372" y2="310" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="260" x2="588" y2="310" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="790" y="92" font-size="15" font-family="Arial, sans-serif" fill="#5b6572">任一条件失败：</text>
  <text x="790" y="118" font-size="15" font-family="Arial, sans-serif" fill="#5b6572">不生成 index-only path</text>
  <text x="790" y="144" font-size="15" font-family="Arial, sans-serif" fill="#5b6572">或成本竞争失败</text>
</svg>
