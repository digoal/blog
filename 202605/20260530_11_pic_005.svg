<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Index Only Scan 的收益与代价</title>
  <desc id="desc">对比普通 index scan 与 index only scan 的 I/O 路径、写入维护成本和表更新影响。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="318" rx="8" fill="#ffffff" stroke="#d8dee8"/>
  <text x="88" y="65" font-size="20" font-family="Arial, sans-serif" fill="#263238">读路径</text>
  <text x="595" y="65" font-size="20" font-family="Arial, sans-serif" fill="#263238">写入与维护代价</text>
  <rect x="74" y="96" width="160" height="62" rx="6" fill="#eef6ff" stroke="#5b8fd6"/>
  <text x="154" y="133" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#163b64">普通 Index Scan</text>
  <rect x="304" y="96" width="160" height="62" rx="6" fill="#fff0f0" stroke="#cf6e6e"/>
  <text x="384" y="133" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#6a2222">大量 heap fetch</text>
  <rect x="74" y="210" width="160" height="62" rx="6" fill="#eef9ef" stroke="#58a75b"/>
  <text x="154" y="247" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#255d29">Index Only Scan</text>
  <rect x="304" y="210" width="160" height="62" rx="6" fill="#eef9ef" stroke="#58a75b"/>
  <text x="384" y="247" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#255d29">VM 命中则少回表</text>
  <line x1="234" y1="127" x2="304" y2="127" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="234" y1="241" x2="304" y2="241" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="96" width="300" height="62" rx="6" fill="#fff6e3" stroke="#d69a36"/>
  <text x="710" y="122" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#67440d">INCLUDE 列扩大索引、增加缓存压力</text>
  <text x="710" y="144" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#67440d">B-tree 含非 key 列时不能使用 deduplication</text>
  <rect x="560" y="188" width="300" height="62" rx="6" fill="#fff6e3" stroke="#d69a36"/>
  <text x="710" y="214" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#67440d">UPDATE/INSERT 会清 VM bit</text>
  <text x="710" y="236" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#67440d">热表可能退化为频繁回表</text>
  <rect x="560" y="280" width="300" height="42" rx="6" fill="#f7f9fb" stroke="#aab4c0"/>
  <text x="710" y="307" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#4b5966">VACUUM/ANALYZE 影响 VM 与 relallvisible 统计</text>
</svg>
