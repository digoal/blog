<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Bitmap Scan 从索引到 Heap 的执行管线</title>
  <desc id="desc">展示 BitmapIndexScan、BitmapAnd/BitmapOr、TIDBitmap 与 BitmapHeapScan 的关系。</desc>
  <style>
    .box{fill:#f7fafc;stroke:#2d3748;stroke-width:2;rx:8}
    .idx{fill:#e6fffa;stroke:#23736a;stroke-width:2;rx:8}
    .heap{fill:#fff5f5;stroke:#b83232;stroke-width:2;rx:8}
    .tbm{fill:#fffbea;stroke:#975a16;stroke-width:2;rx:8}
    .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#1a202c}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;fill:#4a5568}
    .arrow{stroke:#2d3748;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2d3748"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="40" width="230" height="100"/>
  <text class="txt" x="70" y="82">WHERE 条件</text>
  <text class="small" x="70" y="112">可被一个或多个索引支持</text>

  <rect class="idx" x="350" y="20" width="250" height="90"/>
  <text class="txt" x="380" y="57">Bitmap Index Scan A</text>
  <text class="small" x="380" y="85">index_getbitmap() 写入 TID</text>

  <rect class="idx" x="350" y="145" width="250" height="90"/>
  <text class="txt" x="380" y="182">Bitmap Index Scan B</text>
  <text class="small" x="380" y="210">可来自不同索引或同一索引多次</text>

  <rect class="box" x="690" y="72" width="200" height="110"/>
  <text class="txt" x="735" y="112">BitmapAnd</text>
  <text class="txt" x="742" y="142">BitmapOr</text>
  <text class="small" x="715" y="166">tbm_intersect / tbm_union</text>

  <rect class="tbm" x="650" y="260" width="280" height="130"/>
  <text class="txt" x="700" y="300">TIDBitmap</text>
  <text class="small" x="685" y="330">按 block 组织候选 TID</text>
  <text class="small" x="685" y="358">exact: 记 tuple offset</text>
  <text class="small" x="685" y="384">lossy: 只记 page 需要访问</text>

  <rect class="heap" x="470" y="425" width="280" height="70"/>
  <text class="txt" x="520" y="468">Bitmap Heap Scan</text>

  <rect class="heap" x="840" y="425" width="230" height="70"/>
  <text class="txt" x="890" y="468">返回可见行</text>

  <path class="arrow" d="M270 90 C305 90,315 65,350 65"/>
  <path class="arrow" d="M270 90 C310 105,315 190,350 190"/>
  <path class="arrow" d="M600 65 C650 70,660 100,690 112"/>
  <path class="arrow" d="M600 190 C650 185,660 155,690 142"/>
  <path class="arrow" d="M790 182 L790 260"/>
  <path class="arrow" d="M650 348 C570 370,535 405,560 425"/>
  <path class="arrow" d="M750 460 L840 460"/>

  <text class="small" x="62" y="220">关键点：先批量收集候选位置，再按 heap block 顺序访问表。</text>
  <text class="small" x="62" y="250">收益：减少随机回表，支持多个索引结果的 AND/OR 组合。</text>
  <text class="small" x="62" y="280">代价：需要启动阶段构建 bitmap，且不保留索引顺序。</text>
</svg>
