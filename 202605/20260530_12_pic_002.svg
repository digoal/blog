<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">TIDBitmap 的 exact 与 lossy 表示</title>
  <desc id="desc">展示 PostgreSQL TIDBitmap 在内存充足时记录 tuple offset，内存不足时退化为只记录 page。</desc>
  <style>
    .page{fill:#edf2f7;stroke:#2d3748;stroke-width:2;rx:8}
    .hit{fill:#68d391;stroke:#276749;stroke-width:1}
    .miss{fill:#fff;stroke:#a0aec0;stroke-width:1}
    .lossy{fill:#fed7d7;stroke:#c53030;stroke-width:2;rx:8}
    .chunk{fill:#fffaf0;stroke:#c05621;stroke-width:2;rx:8}
    .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#1a202c}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;fill:#4a5568}
    .arrow{stroke:#2d3748;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2d3748"/>
    </marker>
  </defs>

  <text class="txt" x="70" y="55">exact page：保存 block 号 + tuple offset 位图</text>
  <rect class="page" x="70" y="80" width="420" height="210"/>
  <text class="small" x="95" y="115">block 128</text>
  <g transform="translate(95,135)">
    <rect class="miss" x="0" y="0" width="36" height="32"/><rect class="hit" x="42" y="0" width="36" height="32"/>
    <rect class="miss" x="84" y="0" width="36" height="32"/><rect class="hit" x="126" y="0" width="36" height="32"/>
    <rect class="miss" x="168" y="0" width="36" height="32"/><rect class="miss" x="210" y="0" width="36" height="32"/>
    <rect class="hit" x="252" y="0" width="36" height="32"/><rect class="miss" x="294" y="0" width="36" height="32"/>
    <text class="small" x="5" y="55">1</text><text class="small" x="48" y="55">2</text><text class="small" x="90" y="55">3</text><text class="small" x="132" y="55">4</text>
    <text class="small" x="174" y="55">5</text><text class="small" x="216" y="55">6</text><text class="small" x="258" y="55">7</text><text class="small" x="300" y="55">8</text>
  </g>
  <text class="small" x="95" y="245">只访问 offset 2、4、7；必要时跟 HOT 链找可见版本。</text>

  <text class="txt" x="650" y="55">lossy chunk：保存“这些 page 需要访问”</text>
  <rect class="chunk" x="650" y="80" width="390" height="210"/>
  <text class="small" x="675" y="115">chunk: block 256 - 511</text>
  <g transform="translate(675,135)">
    <rect class="lossy" x="0" y="0" width="45" height="34"/><rect class="miss" x="54" y="0" width="45" height="34"/>
    <rect class="lossy" x="108" y="0" width="45" height="34"/><rect class="lossy" x="162" y="0" width="45" height="34"/>
    <rect class="miss" x="216" y="0" width="45" height="34"/><rect class="lossy" x="270" y="0" width="45" height="34"/>
    <text class="small" x="5" y="58">256</text><text class="small" x="58" y="58">257</text><text class="small" x="112" y="58">258</text>
    <text class="small" x="166" y="58">259</text><text class="small" x="220" y="58">260</text><text class="small" x="274" y="58">261</text>
  </g>
  <text class="small" x="675" y="245">访问命中的 page 后检查每个可见 tuple，并重验条件。</text>

  <path class="arrow" d="M490 188 C555 188,590 188,650 188"/>
  <text class="small" x="505" y="160">work_mem 压力</text>

  <rect class="page" x="210" y="365" width="700" height="95"/>
  <text class="txt" x="250" y="405">设计取舍</text>
  <text class="small" x="250" y="435">exact 更精确，少复核；lossy 更省内存，但会放大 heap tuple 检查。</text>
</svg>
