<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">优化器选择 Bitmap Scan 的边界</title>
  <desc id="desc">展示 Seq Scan、Index Scan、Bitmap Heap Scan、Index Only Scan 的典型成本边界。</desc>
  <style>
    .axis{stroke:#2d3748;stroke-width:2.5}
    .zone1{fill:#e6fffa;stroke:#2c7a7b;stroke-width:2;rx:8}
    .zone2{fill:#fffaf0;stroke:#c05621;stroke-width:2;rx:8}
    .zone3{fill:#edf2f7;stroke:#4a5568;stroke-width:2;rx:8}
    .zone4{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:2;rx:8}
    .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#1a202c}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;fill:#4a5568}
    .curve{stroke:#2d3748;stroke-width:3;fill:none;stroke-dasharray:8 6}
    .arrow{stroke:#2d3748;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2d3748"/>
    </marker>
  </defs>

  <line class="axis" x1="110" y1="470" x2="1010" y2="470"/>
  <line class="axis" x1="110" y1="470" x2="110" y2="80"/>
  <text class="small" x="465" y="520">返回比例 / 候选 heap page 数上升</text>
  <text class="small" x="20" y="275" transform="rotate(-90 20 275)">总成本</text>

  <rect class="zone1" x="145" y="300" width="190" height="120"/>
  <text class="txt" x="175" y="345">Index Scan</text>
  <text class="small" x="165" y="377">少量行、可提前停止</text>
  <text class="small" x="165" y="402">可保留索引顺序</text>

  <rect class="zone2" x="405" y="210" width="250" height="150"/>
  <text class="txt" x="452" y="255">Bitmap Heap Scan</text>
  <text class="small" x="430" y="288">候选行不少但 page 可收敛</text>
  <text class="small" x="430" y="315">多个索引 AND/OR 有价值</text>

  <rect class="zone3" x="735" y="140" width="220" height="135"/>
  <text class="txt" x="792" y="185">Seq Scan</text>
  <text class="small" x="760" y="218">读大比例数据</text>
  <text class="small" x="760" y="245">顺序吞吐胜过回表</text>

  <rect class="zone4" x="380" y="65" width="275" height="90"/>
  <text class="txt" x="425" y="102">Index Only Scan</text>
  <text class="small" x="405" y="130">覆盖查询 + visibility map 友好</text>

  <path class="curve" d="M140 430 C250 270,350 230,465 275 C590 325,680 300,940 165"/>
  <path class="arrow" d="M250 445 L600 445"/>
  <text class="small" x="315" y="430">随机回表成本逐渐变差</text>
  <text class="small" x="685" y="350">Bitmap scan 的启动成本较高，LIMIT 小时常输给 index scan。</text>
</svg>
