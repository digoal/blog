<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Bitmap Heap Scan 的协作方式</title>
  <desc id="desc">展示一个进程构建 TIDBitmap，多个进程并行访问 heap blocks。</desc>
  <style>
    .box{fill:#f7fafc;stroke:#2d3748;stroke-width:2;rx:8}
    .leader{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:2;rx:8}
    .worker{fill:#e6fffa;stroke:#23736a;stroke-width:2;rx:8}
    .tbm{fill:#fffbea;stroke:#975a16;stroke-width:2;rx:8}
    .block{fill:#fff5f5;stroke:#c53030;stroke-width:2;rx:6}
    .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#1a202c}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;fill:#4a5568}
    .arrow{stroke:#2d3748;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2d3748"/>
    </marker>
  </defs>

  <rect class="leader" x="70" y="70" width="280" height="105"/>
  <text class="txt" x="110" y="112">Leader / chosen process</text>
  <text class="small" x="110" y="145">扫描一个或多个索引，构建 bitmap</text>

  <rect class="tbm" x="430" y="70" width="260" height="105"/>
  <text class="txt" x="505" y="112">Shared TIDBitmap</text>
  <text class="small" x="470" y="145">DSA + shared iterator</text>

  <rect class="block" x="770" y="70" width="280" height="105"/>
  <text class="txt" x="835" y="112">Heap Blocks</text>
  <text class="small" x="810" y="145">按 bitmap 命中的 block 分配</text>

  <path class="arrow" d="M350 122 L430 122"/>
  <path class="arrow" d="M690 122 L770 122"/>

  <rect class="worker" x="115" y="290" width="230" height="90"/>
  <text class="txt" x="165" y="330">Worker 1</text>
  <text class="small" x="145" y="358">取下一批 block</text>

  <rect class="worker" x="445" y="290" width="230" height="90"/>
  <text class="txt" x="495" y="330">Worker 2</text>
  <text class="small" x="475" y="358">取下一批 block</text>

  <rect class="worker" x="775" y="290" width="230" height="90"/>
  <text class="txt" x="825" y="330">Worker 3</text>
  <text class="small" x="805" y="358">取下一批 block</text>

  <path class="arrow" d="M840 175 C760 235,345 235,230 290"/>
  <path class="arrow" d="M900 175 C820 235,640 235,560 290"/>
  <path class="arrow" d="M950 175 C990 220,955 260,890 290"/>

  <text class="small" x="120" y="455">注意：PostgreSQL 文档说明 parallel bitmap heap scan 中 heap scan 并行，底层 index scan 不并行。</text>
  <text class="small" x="120" y="485">因此瓶颈可能在 bitmap 构建阶段，也可能在 heap block 访问、recheck 或上层节点。</text>
</svg>
