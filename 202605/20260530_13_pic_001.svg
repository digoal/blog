<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Index Bitmap Scan 从优化器到执行器</title>
  <desc id="desc">展示 PostgreSQL 如何把多个可索引条件规划成 BitmapAnd 或 BitmapOr，再由 BitmapHeapScan 访问 heap。</desc>
  <style>
    .bg { fill: #f7f8fb; }
    .box { fill: #ffffff; stroke: #2f4858; stroke-width: 2; rx: 8; }
    .planner { fill: #e8f4f8; stroke: #1b6f8f; }
    .exec { fill: #fff4e6; stroke: #b7651b; }
    .heap { fill: #eaf7ea; stroke: #37743a; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #17202a; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 15px; font-weight: 700; fill: #1f2937; }
    .arrow { stroke: #52616b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52616b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="500"/>

  <rect class="box planner" x="35" y="45" width="190" height="90"/>
  <text class="label" x="58" y="80">WHERE 条件</text>
  <text class="small" x="58" y="106">a = 10 AND b = 20</text>
  <text class="small" x="58" y="126">或 a = 10 OR b = 20</text>

  <rect class="box planner" x="285" y="32" width="230" height="116"/>
  <text class="label" x="310" y="68">indxpath.c</text>
  <text class="small" x="310" y="94">为每个索引生成 IndexPath</text>
  <text class="small" x="310" y="116">OR 每一臂必须可索引</text>
  <text class="small" x="310" y="138">AND 组合避免重复子句</text>

  <rect class="box planner" x="575" y="32" width="230" height="116"/>
  <text class="label" x="600" y="68">pathnode/costsize</text>
  <text class="small" x="600" y="94">create_bitmap_and_path</text>
  <text class="small" x="600" y="116">create_bitmap_or_path</text>
  <text class="small" x="600" y="138">估算选择率与组合成本</text>

  <rect class="box exec" x="72" y="245" width="210" height="104"/>
  <text class="label" x="98" y="280">BitmapIndexScan</text>
  <text class="small" x="98" y="306">调用 amgetbitmap</text>
  <text class="small" x="98" y="328">输出 TIDBitmap</text>

  <rect class="box exec" x="370" y="230" width="220" height="134"/>
  <text class="label" x="413" y="265">BitmapAnd / Or</text>
  <text class="small" x="404" y="292">AND: tbm_intersect</text>
  <text class="small" x="404" y="315">OR: tbm_union</text>
  <text class="small" x="404" y="338">得到单个候选 TIDBitmap</text>

  <rect class="box heap" x="695" y="245" width="230" height="104"/>
  <text class="label" x="732" y="280">BitmapHeapScan</text>
  <text class="small" x="732" y="306">按 heap block 顺序访问</text>
  <text class="small" x="732" y="328">MVCC + recheck + filter</text>

  <path class="arrow" d="M225 90 H285"/>
  <path class="arrow" d="M515 90 H575"/>
  <path class="arrow dash" d="M690 148 C690 192 480 176 480 230"/>
  <path class="arrow" d="M282 297 H370"/>
  <path class="arrow" d="M590 297 H695"/>
  <path class="arrow dash" d="M177 245 C177 198 350 185 400 148"/>

  <text class="small" x="338" y="190">计划期：路径组合与成本比较</text>
  <text class="small" x="350" y="410">执行期：每个子计划先产出位图，集合运算后再访问表</text>
</svg>
