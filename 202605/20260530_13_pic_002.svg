<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">BitmapAnd 与 BitmapOr 的集合语义</title>
  <desc id="desc">展示多个索引扫描返回的 TIDBitmap 如何通过交集和并集合并。</desc>
  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #34495e; stroke-width: 2; rx: 8; }
    .page { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; rx: 4; }
    .hitA { fill: #2f80ed; }
    .hitB { fill: #f2994a; }
    .hitBoth { fill: #27ae60; }
    .muted { fill: #cbd5e1; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #111827; }
    .small { font-size: 13px; fill: #334155; }
    .label { font-size: 18px; font-weight: 700; }
    .arrow { stroke: #52616b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52616b"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="520"/>

  <rect class="panel" x="40" y="44" width="260" height="160"/>
  <text class="text label" x="70" y="78">索引 A: city_id</text>
  <text class="small" x="70" y="103">命中 TID: block + offset</text>
  <g transform="translate(70,122)">
    <rect class="page" x="0" y="0" width="46" height="46"/><circle class="hitA" cx="16" cy="16" r="6"/><circle class="hitA" cx="30" cy="29" r="6"/>
    <rect class="page" x="62" y="0" width="46" height="46"/><circle class="hitA" cx="84" cy="22" r="6"/>
    <rect class="page" x="124" y="0" width="46" height="46"/><circle class="muted" cx="146" cy="22" r="6"/>
    <rect class="page" x="186" y="0" width="46" height="46"/><circle class="hitA" cx="210" cy="31" r="6"/>
  </g>

  <rect class="panel" x="40" y="310" width="260" height="160"/>
  <text class="text label" x="70" y="344">索引 B: status</text>
  <text class="small" x="70" y="369">另一个条件的候选集合</text>
  <g transform="translate(70,388)">
    <rect class="page" x="0" y="0" width="46" height="46"/><circle class="hitB" cx="30" cy="29" r="6"/>
    <rect class="page" x="62" y="0" width="46" height="46"/><circle class="muted" cx="84" cy="22" r="6"/>
    <rect class="page" x="124" y="0" width="46" height="46"/><circle class="hitB" cx="145" cy="20" r="6"/><circle class="hitB" cx="157" cy="33" r="6"/>
    <rect class="page" x="186" y="0" width="46" height="46"/><circle class="hitB" cx="210" cy="31" r="6"/>
  </g>

  <rect class="panel" x="400" y="44" width="230" height="160"/>
  <text class="text label" x="444" y="78">BitmapAnd</text>
  <text class="small" x="430" y="103">WHERE city_id = ? AND status = ?</text>
  <g transform="translate(430,122)">
    <rect class="page" x="0" y="0" width="46" height="46"/><circle class="hitBoth" cx="30" cy="29" r="6"/>
    <rect class="page" x="62" y="0" width="46" height="46"/><circle class="muted" cx="84" cy="22" r="6"/>
    <rect class="page" x="124" y="0" width="46" height="46"/><circle class="muted" cx="146" cy="22" r="6"/>
  </g>

  <rect class="panel" x="400" y="310" width="230" height="160"/>
  <text class="text label" x="450" y="344">BitmapOr</text>
  <text class="small" x="430" y="369">WHERE city_id = ? OR status = ?</text>
  <g transform="translate(430,388)">
    <rect class="page" x="0" y="0" width="46" height="46"/><circle class="hitA" cx="16" cy="16" r="6"/><circle class="hitBoth" cx="30" cy="29" r="6"/>
    <rect class="page" x="62" y="0" width="46" height="46"/><circle class="hitA" cx="84" cy="22" r="6"/>
    <rect class="page" x="124" y="0" width="46" height="46"/><circle class="hitB" cx="145" cy="20" r="6"/><circle class="hitB" cx="157" cy="33" r="6"/>
  </g>

  <rect class="panel" x="720" y="175" width="220" height="170"/>
  <text class="text label" x="759" y="210">Heap 访问</text>
  <text class="small" x="750" y="238">最终都交给 BitmapHeapScan</text>
  <text class="small" x="750" y="262">按 block 顺序访问表页</text>
  <text class="small" x="750" y="286">exact: 只查命中 offset</text>
  <text class="small" x="750" y="310">lossy: 整页 recheck</text>

  <path class="arrow" d="M300 124 C340 124 360 124 400 124"/>
  <path class="arrow" d="M300 388 C340 388 360 388 400 388"/>
  <path class="arrow" d="M630 124 C686 132 704 176 720 214"/>
  <path class="arrow" d="M630 388 C686 380 704 334 720 300"/>

  <text class="small" x="50" y="252">AND 缩小候选集合，OR 扩大候选集合；两者都不保留原索引顺序。</text>
</svg>
