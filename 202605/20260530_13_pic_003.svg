<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">多列索引与多单列索引组合的取舍</title>
  <desc id="desc">比较多列 B-tree 索引、多个单列索引加 BitmapAnd、单索引加过滤三种设计。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .good { fill: #e8f7ee; stroke: #2e7d32; }
    .mid { fill: #fff7e6; stroke: #b7791f; }
    .bad { fill: #feecec; stroke: #b91c1c; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #111827; }
    .small { font-size: 13px; fill: #334155; }
    .title { font-size: 19px; font-weight: 700; }
    .arrow { stroke: #52616b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52616b"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="520"/>

  <rect class="card" x="60" y="50" width="860" height="72"/>
  <text class="text title" x="90" y="84">业务查询形态</text>
  <text class="small" x="90" y="108">Q1: a = ? AND b = ?　Q2: a = ?　Q3: b = ?　Q4: a = ? ORDER BY b LIMIT 20</text>

  <rect class="card good" x="60" y="180" width="250" height="220"/>
  <text class="text title" x="92" y="218">多列索引 (a, b)</text>
  <text class="small" x="92" y="250">强项：a + b 同时过滤</text>
  <text class="small" x="92" y="274">强项：保留索引顺序</text>
  <text class="small" x="92" y="298">适合：稳定主路径</text>
  <text class="small" x="92" y="322">代价：对 b 单独查询较弱</text>
  <text class="small" x="92" y="346">代价：索引更宽，写入更重</text>

  <rect class="card mid" x="365" y="180" width="250" height="220"/>
  <text class="text title" x="394" y="218">单列索引 a + b</text>
  <text class="small" x="394" y="250">强项：Q1 可 BitmapAnd</text>
  <text class="small" x="394" y="274">强项：Q2/Q3 都可独立使用</text>
  <text class="small" x="394" y="298">适合：查询组合多变</text>
  <text class="small" x="394" y="322">代价：Q1 启动成本更高</text>
  <text class="small" x="394" y="346">代价：ORDER BY 通常需排序</text>

  <rect class="card bad" x="670" y="180" width="250" height="220"/>
  <text class="text title" x="708" y="218">单索引 + Filter</text>
  <text class="small" x="708" y="250">强项：索引少，写入轻</text>
  <text class="small" x="708" y="274">强项：低维护成本</text>
  <text class="small" x="708" y="298">适合：次要条件选择性差</text>
  <text class="small" x="708" y="322">代价：回表后过滤更多行</text>
  <text class="small" x="708" y="346">代价：容易随机访问放大</text>

  <path class="arrow" d="M185 122 V180"/>
  <path class="arrow" d="M490 122 V180"/>
  <path class="arrow" d="M795 122 V180"/>

  <rect class="card" x="130" y="440" width="720" height="48"/>
  <text class="small" x="160" y="470">选择不是“谁更高级”，而是看主查询是否稳定、是否需要排序、单列查询是否重要、写入维护预算是否充足。</text>
</svg>
