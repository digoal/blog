<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Index Bitmap Scan 的代价边界</title>
  <desc id="desc">展示选择率、work_mem、排序需求和 LIMIT 对多索引 bitmap 扫描的影响。</desc>
  <style>
    .bg { fill: #ffffff; }
    .axis { stroke: #111827; stroke-width: 2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .curve1 { stroke: #2f80ed; stroke-width: 4; fill: none; }
    .curve2 { stroke: #27ae60; stroke-width: 4; fill: none; }
    .curve3 { stroke: #b91c1c; stroke-width: 4; fill: none; }
    .zone { opacity: 0.18; }
    .z1 { fill: #2f80ed; }
    .z2 { fill: #27ae60; }
    .z3 { fill: #b91c1c; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #111827; }
    .small { font-size: 13px; fill: #334155; }
    .title { font-size: 19px; font-weight: 700; }
  </style>
  <rect class="bg" width="980" height="520"/>

  <text class="text title" x="60" y="48">选择率从低到高时的典型边界</text>
  <line class="axis" x1="90" y1="420" x2="890" y2="420"/>
  <line class="axis" x1="90" y1="420" x2="90" y2="90"/>
  <text class="small" x="420" y="462">候选行 / 候选页比例上升</text>
  <text class="small" x="22" y="86">成本</text>
  <line class="grid" x1="90" y1="330" x2="890" y2="330"/>
  <line class="grid" x1="90" y1="240" x2="890" y2="240"/>
  <line class="grid" x1="90" y1="150" x2="890" y2="150"/>

  <rect class="zone z1" x="90" y="90" width="210" height="330"/>
  <rect class="zone z2" x="300" y="90" width="330" height="330"/>
  <rect class="zone z3" x="630" y="90" width="260" height="330"/>

  <path class="curve1" d="M100 365 C170 210 240 160 310 190 C410 235 500 300 610 370 C710 430 810 470 880 492"/>
  <path class="curve2" d="M100 410 C200 392 285 340 360 265 C450 170 550 165 635 235 C725 312 800 376 880 430"/>
  <path class="curve3" d="M100 390 C230 385 360 374 500 344 C640 315 760 300 880 290"/>

  <text class="small" x="132" y="116">极低选择率</text>
  <text class="small" x="133" y="137">Index Scan / Top-N 常胜</text>
  <text class="small" x="390" y="116">中等选择率</text>
  <text class="small" x="374" y="137">BitmapAnd/Or 容易胜出</text>
  <text class="small" x="690" y="116">很高选择率</text>
  <text class="small" x="676" y="137">Seq Scan 更可能胜出</text>

  <rect x="120" y="475" width="18" height="6" fill="#2f80ed"/><text class="small" x="146" y="483">Index Scan：启动低，随机回表随候选行上升</text>
  <rect x="450" y="475" width="18" height="6" fill="#27ae60"/><text class="small" x="476" y="483">Bitmap：启动高，中间区间用 page 顺序访问换收益</text>
  <rect x="735" y="475" width="18" height="6" fill="#b91c1c"/><text class="small" x="761" y="483">Seq Scan：读多时吞吐稳定</text>

  <text class="small" x="610" y="215">work_mem 太小会产生 lossy page，曲线抬高</text>
  <text class="small" x="610" y="238">ORDER BY / LIMIT 会把优势推回 Index Scan</text>
</svg>
