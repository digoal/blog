<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">多列 B-tree 中缺失前导等值条件的问题</title>
  <desc id="desc">展示普通多列索引扫描和 skip scan 在索引 (x,y) 上执行 WHERE y=7700 时的访问范围差异。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5597"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="380" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="40" y="58" font-size="24" font-family="Arial, sans-serif" fill="#111827">索引 (x, y)，查询条件只有 y = 7700</text>
  <text x="40" y="92" font-size="16" font-family="Arial, sans-serif" fill="#4b5563">传统左前缀规则下，缺少 x 的等值条件，y 条件很难缩小连续扫描区间。</text>

  <g transform="translate(42,132)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#111827">普通扫描倾向</text>
    <rect x="0" y="22" width="860" height="54" fill="#f3f4f6" stroke="#9ca3af"/>
    <g font-size="15" font-family="Arial, sans-serif" text-anchor="middle">
      <rect x="0" y="22" width="143" height="54" fill="#fee2e2" stroke="#9ca3af"/>
      <text x="71" y="55" fill="#991b1b">x=1</text>
      <rect x="143" y="22" width="143" height="54" fill="#fee2e2" stroke="#9ca3af"/>
      <text x="214" y="55" fill="#991b1b">x=2</text>
      <rect x="286" y="22" width="143" height="54" fill="#fee2e2" stroke="#9ca3af"/>
      <text x="357" y="55" fill="#991b1b">x=3</text>
      <rect x="429" y="22" width="143" height="54" fill="#fee2e2" stroke="#9ca3af"/>
      <text x="500" y="55" fill="#991b1b">x=4</text>
      <rect x="572" y="22" width="143" height="54" fill="#fee2e2" stroke="#9ca3af"/>
      <text x="643" y="55" fill="#991b1b">x=5</text>
      <rect x="715" y="22" width="145" height="54" fill="#fee2e2" stroke="#9ca3af"/>
      <text x="787" y="55" fill="#991b1b">x=6</text>
    </g>
    <line x1="20" y1="98" x2="840" y2="98" stroke="#991b1b" stroke-width="4"/>
    <text x="0" y="130" font-size="15" font-family="Arial, sans-serif" fill="#991b1b">可能需要检查大量 leaf tuple，再过滤 y。</text>
  </g>

  <g transform="translate(42,270)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#111827">Skip scan 的改写</text>
    <rect x="0" y="22" width="860" height="54" fill="#ecfdf5" stroke="#9ca3af"/>
    <g font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      <rect x="0" y="22" width="143" height="54" fill="#dcfce7" stroke="#9ca3af"/>
      <text x="71" y="48" fill="#166534">x=1</text><text x="71" y="66" fill="#166534">y=7700</text>
      <rect x="143" y="22" width="143" height="54" fill="#dcfce7" stroke="#9ca3af"/>
      <text x="214" y="48" fill="#166534">x=2</text><text x="214" y="66" fill="#166534">y=7700</text>
      <rect x="286" y="22" width="143" height="54" fill="#dcfce7" stroke="#9ca3af"/>
      <text x="357" y="48" fill="#166534">x=3</text><text x="357" y="66" fill="#166534">y=7700</text>
      <rect x="429" y="22" width="143" height="54" fill="#dcfce7" stroke="#9ca3af"/>
      <text x="500" y="48" fill="#166534">x=4</text><text x="500" y="66" fill="#166534">y=7700</text>
      <rect x="572" y="22" width="143" height="54" fill="#dcfce7" stroke="#9ca3af"/>
      <text x="643" y="48" fill="#166534">x=5</text><text x="643" y="66" fill="#166534">y=7700</text>
      <rect x="715" y="22" width="145" height="54" fill="#dcfce7" stroke="#9ca3af"/>
      <text x="787" y="48" fill="#166534">x=6</text><text x="787" y="66" fill="#166534">y=7700</text>
    </g>
    <line x1="72" y1="98" x2="214" y2="98" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="214" y1="98" x2="357" y2="98" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="357" y1="98" x2="500" y2="98" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="98" x2="643" y2="98" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="643" y1="98" x2="787" y2="98" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="0" y="130" font-size="15" font-family="Arial, sans-serif" fill="#1f2937">把缺失的 x 动态枚举成若干等值搜索：x=N AND y=7700。</text>
  </g>
</svg>
