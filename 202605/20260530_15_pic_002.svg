<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">skip scan 的优化器估算流程</title>
  <desc id="desc">展示 PostgreSQL btcostestimate 如何根据缺失等值列、ndistinct、页数和成本比较决定是否让后续列成为边界条件。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5597"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="42" y="58" font-size="24" font-family="Arial, sans-serif" fill="#111827">Planner：把 skip scan 当成多次 primitive index search 估算</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="70" y="96" width="220" height="70" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="180" y="126" text-anchor="middle">按索引列顺序读取</text>
    <text x="180" y="148" text-anchor="middle">IndexClause / indexqual</text>

    <rect x="380" y="96" width="220" height="70" rx="6" fill="#fefce8" stroke="#fde68a"/>
    <text x="490" y="126" text-anchor="middle">发现属性 gap</text>
    <text x="490" y="148" text-anchor="middle">前导列没有 = 条件</text>

    <rect x="690" y="96" width="220" height="70" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="800" y="126" text-anchor="middle">查询 ndistinct</text>
    <text x="800" y="148" text-anchor="middle">估算 skip array 元素数</text>

    <rect x="70" y="244" width="220" height="70" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="180" y="272" text-anchor="middle">乘到 num_sa_scans</text>
    <text x="180" y="294" text-anchor="middle">代表重复下探次数</text>

    <rect x="380" y="244" width="220" height="70" rx="6" fill="#fff7ed" stroke="#fdba74"/>
    <text x="490" y="272" text-anchor="middle">若超过 index pages</text>
    <text x="490" y="294" text-anchor="middle">认为跳跃不划算</text>

    <rect x="690" y="244" width="220" height="70" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="800" y="272" text-anchor="middle">后续列进入边界条件</text>
    <text x="800" y="294" text-anchor="middle">降低 numIndexTuples</text>

    <rect x="210" y="392" width="250" height="70" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
    <text x="335" y="420" text-anchor="middle">加上每次下探 CPU 成本</text>
    <text x="335" y="442" text-anchor="middle">tree height + log 比较</text>

    <rect x="540" y="392" width="250" height="70" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
    <text x="665" y="420" text-anchor="middle">与 Seq / Index / Bitmap</text>
    <text x="665" y="442" text-anchor="middle">统一比较总代价</text>
  </g>

  <g stroke="#2f5597" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="290" y1="131" x2="380" y2="131"/>
    <line x1="600" y1="131" x2="690" y2="131"/>
    <path d="M800 166 C800 205 180 205 180 244"/>
    <line x1="290" y1="279" x2="380" y2="279"/>
    <line x1="600" y1="279" x2="690" y2="279"/>
    <path d="M800 314 C800 358 335 358 335 392"/>
    <line x1="460" y1="427" x2="540" y2="427"/>
  </g>

  <text x="70" y="204" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">默认统计值不可靠时，源码会保守放弃把 gap 补成 skip array。</text>
  <text x="70" y="354" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">核心判断：少量重复搜索能否跳过足够多 leaf page 和 tuple qual 计算。</text>
</svg>
