<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">B-tree 执行期 skip array 工作方式</title>
  <desc id="desc">展示 PostgreSQL nbtree 预处理 scan key、生成 skip array，并在 leaf page 扫描中推进到下一组可能匹配元组。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="42" y="58" font-size="24" font-family="Arial, sans-serif" fill="#111827">Executor / nbtree：skip array 不是物理数组，而是可推进的扫描键</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="58" y="100" width="230" height="82" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="173" y="130" text-anchor="middle">输入 scan key</text>
    <text x="173" y="154" text-anchor="middle">WHERE y = 7700</text>

    <rect x="375" y="100" width="230" height="82" rx="6" fill="#fefce8" stroke="#fde68a"/>
    <text x="490" y="130" text-anchor="middle">_bt_preprocess_array_keys</text>
    <text x="490" y="154" text-anchor="middle">为 x 生成 SK_BT_SKIP</text>

    <rect x="692" y="100" width="230" height="82" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="807" y="130" text-anchor="middle">实际执行 key</text>
    <text x="807" y="154" text-anchor="middle">x = skip_array AND y = 7700</text>
  </g>

  <g stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="288" y1="141" x2="375" y2="141"/>
    <line x1="605" y1="141" x2="692" y2="141"/>
  </g>

  <g transform="translate(70,245)" font-family="Arial, sans-serif">
    <text x="0" y="-30" font-size="18" fill="#111827">leaf page 中的推进</text>
    <rect x="0" y="0" width="820" height="74" fill="#f9fafb" stroke="#9ca3af"/>
    <g font-size="13" text-anchor="middle">
      <rect x="0" y="0" width="102" height="74" fill="#dbeafe" stroke="#9ca3af"/><text x="51" y="32">x=1</text><text x="51" y="52">y=100</text>
      <rect x="102" y="0" width="102" height="74" fill="#dcfce7" stroke="#9ca3af"/><text x="153" y="32">x=1</text><text x="153" y="52">y=7700</text>
      <rect x="204" y="0" width="102" height="74" fill="#fee2e2" stroke="#9ca3af"/><text x="255" y="32">x=1</text><text x="255" y="52">y=9000</text>
      <rect x="306" y="0" width="102" height="74" fill="#dbeafe" stroke="#9ca3af"/><text x="357" y="32">x=2</text><text x="357" y="52">y=120</text>
      <rect x="408" y="0" width="102" height="74" fill="#dcfce7" stroke="#9ca3af"/><text x="459" y="32">x=2</text><text x="459" y="52">y=7700</text>
      <rect x="510" y="0" width="102" height="74" fill="#fee2e2" stroke="#9ca3af"/><text x="561" y="32">x=2</text><text x="561" y="52">y=9900</text>
      <rect x="612" y="0" width="102" height="74" fill="#dbeafe" stroke="#9ca3af"/><text x="663" y="32">x=3</text><text x="663" y="52">y=200</text>
      <rect x="714" y="0" width="106" height="74" fill="#dcfce7" stroke="#9ca3af"/><text x="767" y="32">x=3</text><text x="767" y="52">y=7700</text>
    </g>
    <path d="M155 106 C225 140 385 140 455 106" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M462 106 C532 140 695 140 765 106" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="100" y="176" font-size="15" fill="#1f2937">当前 x 组结束后，推进 skip array 到下一组 x，再用 lower-order 条件重新定位。</text>
  </g>
</svg>
