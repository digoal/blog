<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">skip support 与 fallback 的区别</title>
  <desc id="desc">比较离散类型提供 skip support 时直接生成下一个可能值，以及缺少 skip support 时用 next/prior sentinel 重新探测真实下一值。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5597"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="430" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="42" y="58" font-size="24" font-family="Arial, sans-serif" fill="#111827">skip support：帮助 skip array 更便宜地找到下一个值</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="105" width="380" height="270" rx="8" fill="#f0fdf4" stroke="#86efac"/>
    <text x="260" y="140" text-anchor="middle" font-size="20" fill="#166534">离散类型有 skip support</text>
    <text x="95" y="180" font-size="15" fill="#1f2937">例：bool、int2、int4、int8、oid、date、timestamp、uuid 等</text>
    <circle cx="120" cy="245" r="22" fill="#dcfce7" stroke="#16a34a"/>
    <text x="120" y="251" text-anchor="middle" font-size="14" fill="#166534">7</text>
    <line x1="145" y1="245" x2="245" y2="245" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <circle cx="275" cy="245" r="22" fill="#dcfce7" stroke="#16a34a"/>
    <text x="275" y="251" text-anchor="middle" font-size="14" fill="#166534">8</text>
    <text x="95" y="315" font-size="15" fill="#1f2937">increment/decrement 直接给出下一个可表示值。</text>
    <text x="95" y="342" font-size="15" fill="#1f2937">若猜中索引中的下一组，可少做一次探测。</text>

    <rect x="530" y="105" width="380" height="270" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="720" y="140" text-anchor="middle" font-size="20" fill="#9a3412">连续或复杂类型使用 fallback</text>
    <text x="555" y="180" font-size="15" fill="#1f2937">例：text 可能没有 opclass skip support。</text>
    <circle cx="580" cy="245" r="22" fill="#ffedd5" stroke="#f97316"/>
    <text x="580" y="251" text-anchor="middle" font-size="14" fill="#9a3412">abc</text>
    <line x1="605" y1="245" x2="705" y2="245" stroke="#2f5597" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="725" y="223" width="115" height="44" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="782" y="251" text-anchor="middle" font-size="14" fill="#92400e">NEXT 探测</text>
    <text x="555" y="315" font-size="15" fill="#1f2937">设置 NEXT/PRIOR sentinel，重新定位真实下一值。</text>
    <text x="555" y="342" font-size="15" fill="#1f2937">仍可 skip scan，只是可能多一次探测。</text>
  </g>
</svg>
