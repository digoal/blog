<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">skip scan 适用边界</title>
  <desc id="desc">用二维坐标展示前导列 distinct 数、后续条件选择率、索引页数和替代路径对 skip scan 是否划算的影响。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111827"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="460" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="42" y="58" font-size="24" font-family="Arial, sans-serif" fill="#111827">什么时候 skip scan 更可能划算？</text>

  <line x1="120" y1="405" x2="860" y2="405" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="405" x2="120" y2="95" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="445" font-size="16" font-family="Arial, sans-serif" fill="#111827" text-anchor="middle">被跳过列的 distinct / skip array 元素数</text>
  <text x="48" y="250" font-size="16" font-family="Arial, sans-serif" fill="#111827" transform="rotate(-90 48 250)" text-anchor="middle">后续列条件越精确，越能跳过无关 leaf page</text>

  <path d="M125 390 C260 315 365 245 455 195 C555 140 685 112 850 102 L850 405 L125 405 Z" fill="#dcfce7" opacity="0.75"/>
  <path d="M125 390 C260 315 365 245 455 195 C555 140 685 112 850 102" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="360" y="315" font-size="18" font-family="Arial, sans-serif" fill="#166534">较适合 skip scan</text>
  <text x="355" y="342" font-size="14" font-family="Arial, sans-serif" fill="#166534">少量分组 + 后续列高选择率</text>

  <path d="M125 95 L850 95 L850 102 C685 112 555 140 455 195 C365 245 260 315 125 390 Z" fill="#fee2e2" opacity="0.75"/>
  <text x="625" y="190" font-size="18" font-family="Arial, sans-serif" fill="#991b1b">更可能改选 Seq / 普通 Index / Bitmap</text>
  <text x="625" y="217" font-size="14" font-family="Arial, sans-serif" fill="#991b1b">分组太多时，重复下探成本接近扫完整个索引</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#374151">
    <rect x="610" y="292" width="260" height="78" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="320">工程校验：</text>
    <text x="630" y="345">EXPLAIN ANALYZE 看 Index Searches</text>
    <text x="630" y="365">同时看 Buffers、Heap Fetches、实际行数</text>
  </g>
</svg>
