<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img">
  <title>自适应并行扫描从计划到执行的主路径</title>
  <desc>展示 PostgreSQL 从普通关系路径、partial path、Gather 到共享并行扫描描述符和多个 worker 领取块范围的流程。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .blue { fill: #e0f2fe; stroke: #0369a1; }
    .green { fill: #dcfce7; stroke: #15803d; }
    .amber { fill: #fef3c7; stroke: #b45309; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #111827; }
    .small { font-size: 15px; fill: #374151; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="190" height="86" class="box blue"/>
  <text x="135" y="92" text-anchor="middle" class="text">Planner</text>
  <text x="135" y="120" text-anchor="middle" class="small">普通 Seq Scan path</text>

  <rect x="286" y="56" width="210" height="86" class="box blue"/>
  <text x="391" y="90" text-anchor="middle" class="text">Partial Path</text>
  <text x="391" y="119" text-anchor="middle" class="small">parallel_aware=true</text>

  <rect x="554" y="56" width="210" height="86" class="box green"/>
  <text x="659" y="90" text-anchor="middle" class="text">Gather</text>
  <text x="659" y="119" text-anchor="middle" class="small">启动 worker 并汇聚结果</text>

  <rect x="822" y="56" width="240" height="86" class="box green"/>
  <text x="942" y="90" text-anchor="middle" class="text">ExecSeqScan DSM</text>
  <text x="942" y="119" text-anchor="middle" class="small">共享 ParallelTableScanDesc</text>

  <path d="M230 99 H286" class="arrow"/>
  <path d="M496 99 H554" class="arrow"/>
  <path d="M764 99 H822" class="arrow"/>

  <rect x="82" y="224" width="190" height="78" class="box amber"/>
  <text x="177" y="258" text-anchor="middle" class="text">leader</text>
  <text x="177" y="284" text-anchor="middle" class="small">可参与扫描或汇聚</text>

  <rect x="340" y="224" width="190" height="78" class="box amber"/>
  <text x="435" y="258" text-anchor="middle" class="text">worker 1</text>
  <text x="435" y="284" text-anchor="middle" class="small">领取连续 block chunk</text>

  <rect x="598" y="224" width="190" height="78" class="box amber"/>
  <text x="693" y="258" text-anchor="middle" class="text">worker 2</text>
  <text x="693" y="284" text-anchor="middle" class="small">领取连续 block chunk</text>

  <rect x="856" y="224" width="190" height="78" class="box amber"/>
  <text x="951" y="258" text-anchor="middle" class="text">worker N</text>
  <text x="951" y="284" text-anchor="middle" class="small">慢者少拿，快者多拿</text>

  <path d="M942 142 V182 H177 V224" class="arrow"/>
  <path d="M942 182 H435 V224" class="arrow"/>
  <path d="M942 182 H693 V224" class="arrow"/>
  <path d="M942 182 V224" class="arrow"/>

  <rect x="70" y="384" width="980" height="62" class="box"/>
  <text x="560" y="421" text-anchor="middle" class="text">同一个扫描任务被拆成互斥的块范围：每个输出行只由一个参与进程产生</text>
  <path d="M177 302 V384" class="arrow"/>
  <path d="M435 302 V384" class="arrow"/>
  <path d="M693 302 V384" class="arrow"/>
  <path d="M951 302 V384" class="arrow"/>
</svg>
