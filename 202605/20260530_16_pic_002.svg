<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img">
  <title>连续块 chunk 动态分配与末段收敛</title>
  <desc>展示 PostgreSQL 并行顺序扫描使用原子计数器分配连续块范围，并在扫描末尾减小 chunk size 以减少长尾。</desc>
  <style>
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #374151; }
    .axis { stroke: #334155; stroke-width: 2; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .counter { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .w1 { fill: #dbeafe; stroke: #1d4ed8; }
    .w2 { fill: #dcfce7; stroke: #15803d; }
    .w3 { fill: #fef3c7; stroke: #b45309; }
    .tail { fill: #fee2e2; stroke: #b91c1c; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="60" y="54" class="text">关系文件 block 空间</text>
  <line x1="70" y1="108" x2="1040" y2="108" class="axis"/>
  <text x="68" y="136" class="small">0</text>
  <text x="1010" y="136" class="small">phs_nblocks - 1</text>

  <rect x="80" y="84" width="150" height="48" class="w1"/>
  <rect x="230" y="84" width="150" height="48" class="w2"/>
  <rect x="380" y="84" width="150" height="48" class="w3"/>
  <rect x="530" y="84" width="150" height="48" class="w1"/>
  <rect x="680" y="84" width="150" height="48" class="w2"/>
  <rect x="830" y="84" width="80" height="48" class="tail"/>
  <rect x="910" y="84" width="50" height="48" class="tail"/>
  <rect x="960" y="84" width="30" height="48" class="tail"/>
  <text x="155" y="113" text-anchor="middle" class="small">chunk A</text>
  <text x="305" y="113" text-anchor="middle" class="small">chunk B</text>
  <text x="455" y="113" text-anchor="middle" class="small">chunk C</text>
  <text x="605" y="113" text-anchor="middle" class="small">chunk D</text>
  <text x="755" y="113" text-anchor="middle" class="small">chunk E</text>
  <text x="890" y="113" text-anchor="middle" class="small">1/2</text>
  <text x="935" y="113" text-anchor="middle" class="small">1/4</text>
  <text x="975" y="113" text-anchor="middle" class="small">1</text>

  <rect x="430" y="205" width="260" height="72" class="counter"/>
  <text x="560" y="234" text-anchor="middle" class="text">phs_nallocated</text>
  <text x="560" y="260" text-anchor="middle" class="small">atomic fetch-and-add(chunk_size)</text>

  <rect x="120" y="350" width="210" height="70" class="w1"/>
  <text x="225" y="380" text-anchor="middle" class="text">worker 快</text>
  <text x="225" y="406" text-anchor="middle" class="small">更早回来，再领下一段</text>
  <rect x="455" y="350" width="210" height="70" class="w2"/>
  <text x="560" y="380" text-anchor="middle" class="text">worker 正常</text>
  <text x="560" y="406" text-anchor="middle" class="small">按连续范围预读</text>
  <rect x="790" y="350" width="210" height="70" class="w3"/>
  <text x="895" y="380" text-anchor="middle" class="text">worker 慢</text>
  <text x="895" y="406" text-anchor="middle" class="small">不会阻塞其他人继续领取</text>

  <path d="M225 350 C260 300, 420 300, 500 277" class="arrow"/>
  <path d="M560 350 V277" class="arrow"/>
  <path d="M895 350 C860 300, 700 300, 620 277" class="arrow"/>
  <text x="560" y="178" text-anchor="middle" class="small">初始 chunk 大小按表块数计算，上限 8192 blocks；末尾进入 ramp-down，降低长尾风险</text>
</svg>
