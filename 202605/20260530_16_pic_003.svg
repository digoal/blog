<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img">
  <title>PostgreSQL 块范围分配与 morsel-driven parallelism 对比</title>
  <desc>对比 PostgreSQL 并行顺序扫描的 block chunk 分配和论文中的 morsel-driven pipeline 调度。</desc>
  <style>
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #374151; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .pg { fill: #e0f2fe; stroke: #0369a1; }
    .paper { fill: #dcfce7; stroke: #15803d; }
    .warn { fill: #fef3c7; stroke: #b45309; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="280" y="48" text-anchor="middle" class="text">PostgreSQL parallel seq scan</text>
  <text x="840" y="48" text-anchor="middle" class="text">Morsel-driven parallelism</text>

  <rect x="70" y="85" width="420" height="80" class="box pg"/>
  <text x="280" y="118" text-anchor="middle" class="text">扫描层 block chunk</text>
  <text x="280" y="145" text-anchor="middle" class="small">连续块范围，动态领取，避免重复扫描</text>

  <rect x="630" y="85" width="420" height="80" class="box paper"/>
  <text x="840" y="118" text-anchor="middle" class="text">执行流水线 morsel</text>
  <text x="840" y="145" text-anchor="middle" class="small">小任务单元，跨算子、跨 NUMA 节点调度</text>

  <rect x="70" y="215" width="420" height="80" class="box pg"/>
  <text x="280" y="248" text-anchor="middle" class="text">自适应点</text>
  <text x="280" y="275" text-anchor="middle" class="small">谁先扫完谁再取；末段缩小 chunk</text>

  <rect x="630" y="215" width="420" height="80" class="box paper"/>
  <text x="840" y="248" text-anchor="middle" class="text">自适应点</text>
  <text x="840" y="275" text-anchor="middle" class="small">负载均衡、局部性、流水线调度统一考虑</text>

  <rect x="70" y="345" width="420" height="80" class="box warn"/>
  <text x="280" y="378" text-anchor="middle" class="text">边界</text>
  <text x="280" y="405" text-anchor="middle" class="small">不是完整运行时重优化；不按 CPU/NUMA 反馈改计划</text>

  <rect x="630" y="345" width="420" height="80" class="box warn"/>
  <text x="840" y="378" text-anchor="middle" class="text">边界</text>
  <text x="840" y="405" text-anchor="middle" class="small">论文架构假设内存/多核分析执行器，不等同 PostgreSQL</text>

  <path d="M490 125 H630" class="arrow"/>
  <path d="M490 255 H630" class="arrow"/>
  <path d="M490 385 H630" class="arrow"/>
  <text x="560" y="487" text-anchor="middle" class="text">相同思想：把大扫描拆小，用运行时领取替代静态切分；不同范围：PostgreSQL 主要在扫描块分配层自适应</text>
</svg>
