<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img">
  <title>自适应并行扫描的收益边界</title>
  <desc>展示并行扫描适合和不适合的场景，以及 I/O、CPU、worker、Gather 汇聚的瓶颈关系。</desc>
  <style>
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #374151; }
    .axis { stroke: #334155; stroke-width: 2; }
    .grid { stroke: #cbd5e1; stroke-width: 1; }
    .good { fill: #dcfce7; stroke: #15803d; stroke-width: 2; opacity: 0.9; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; opacity: 0.9; }
    .mid { fill: #fef3c7; stroke: #b45309; stroke-width: 2; opacity: 0.9; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
  </style>
  <line x1="110" y1="430" x2="1010" y2="430" class="axis"/>
  <line x1="110" y1="430" x2="110" y2="80" class="axis"/>
  <text x="560" y="488" text-anchor="middle" class="text">扫描数据量 / CPU 过滤成本</text>
  <text x="38" y="260" transform="rotate(-90 38 260)" text-anchor="middle" class="text">并行收益</text>
  <line x1="110" y1="310" x2="1010" y2="310" class="grid"/>
  <line x1="360" y1="430" x2="360" y2="80" class="grid"/>
  <line x1="710" y1="430" x2="710" y2="80" class="grid"/>

  <path d="M130 400 C260 385, 360 330, 470 210 C580 90, 760 110, 900 185 C960 220, 995 255, 1010 290 L1010 430 L130 430 Z" class="good"/>
  <path d="M120 430 L350 430 L350 338 C260 385, 180 400, 120 406 Z" class="bad"/>
  <path d="M780 165 C910 205, 985 255, 1010 300 L1010 430 L780 430 Z" class="mid"/>

  <text x="245" y="366" text-anchor="middle" class="text">太小</text>
  <text x="245" y="392" text-anchor="middle" class="small">worker 启动和传输成本吃掉收益</text>
  <text x="560" y="190" text-anchor="middle" class="text">甜区</text>
  <text x="560" y="216" text-anchor="middle" class="small">大表、CPU 过滤/聚合可分摊、I/O 未完全饱和</text>
  <text x="890" y="350" text-anchor="middle" class="text">受限</text>
  <text x="890" y="376" text-anchor="middle" class="small">I/O 饱和、Gather 汇聚、上层排序/聚合成为瓶颈</text>

  <rect x="160" y="28" width="800" height="38" class="box"/>
  <text x="560" y="53" text-anchor="middle" class="small">判断标准不是“开了几个 worker”，而是每个 worker 实际做了多少块、多少 CPU，以及等待在哪里</text>
</svg>
