<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">采样扫描的两条主路径</title>
  <desc id="desc">展示 PostgreSQL 中面向查询的 TABLESAMPLE SampleScan 与面向统计信息的 ANALYZE 采样两条路径。</desc>
  <style>
    .bg{fill:#f7f9fb}
    .box{fill:#ffffff;stroke:#335c67;stroke-width:2;rx:8}
    .query{fill:#e7f1ff;stroke:#2f6f9f}
    .stats{fill:#fff4df;stroke:#b36b00}
    .store{fill:#eef7ee;stroke:#3f7d3d}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#1f2933}
    .small{font-size:14px;fill:#46525f}
    .title{font-size:22px;font-weight:700}
    .arrow{stroke:#334e68;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="560"/>
  <text class="text title" x="44" y="48">同一个问题，两种入口：少读一些，接受不确定性</text>
  <rect class="box query" x="60" y="90" width="380" height="96"/>
  <text class="text title" x="86" y="126">查询入口</text>
  <text class="text" x="86" y="156">SELECT ... FROM t TABLESAMPLE ...</text>
  <text class="text small" x="86" y="178">目标：让用户查询直接返回样本行</text>
  <rect class="box query" x="60" y="240" width="380" height="110"/>
  <text class="text title" x="86" y="278">SampleScan</text>
  <text class="text" x="86" y="310">TsmRoutine 回调</text>
  <text class="text small" x="86" y="334">估算页/行数，选择块，选择 tuple</text>
  <rect class="box stats" x="540" y="90" width="380" height="96"/>
  <text class="text title" x="566" y="126">统计入口</text>
  <text class="text" x="566" y="156">ANALYZE / VACUUM ANALYZE</text>
  <text class="text small" x="566" y="178">目标：为优化器构造 pg_statistic</text>
  <rect class="box stats" x="540" y="240" width="380" height="110"/>
  <text class="text title" x="566" y="278">acquire_sample_rows</text>
  <text class="text" x="566" y="310">BlockSampler + Reservoir</text>
  <text class="text small" x="566" y="334">随机块采样，再从候选行保留固定容量样本</text>
  <rect class="box store" x="260" y="415" width="460" height="92"/>
  <text class="text title" x="300" y="452">共同底座：TableAM + Heap 页面</text>
  <text class="text" x="300" y="482">读 block/page，检查 MVCC 可见性，输出 tuple slot</text>
  <path class="arrow" d="M250 186 L250 240"/>
  <path class="arrow" d="M730 186 L730 240"/>
  <path class="arrow" d="M250 350 L405 415"/>
  <path class="arrow" d="M730 350 L575 415"/>
  <text class="text small" x="62" y="530">关键区别：TABLESAMPLE 是用户可见的近似查询；ANALYZE 是优化器内部统计采样。</text>
</svg>
