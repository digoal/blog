<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">TABLESAMPLE 从计划到执行</title>
  <desc id="desc">展示 TABLESAMPLE 经过 planner、SampleScan、TsmRoutine、TableAM 到可见 tuple 的执行链路。</desc>
  <style>
    .bg{fill:#f8fafc}
    .box{fill:#ffffff;stroke:#264653;stroke-width:2;rx:8}
    .plan{fill:#e8f3ff;stroke:#2f6f9f}
    .exec{fill:#f0fff4;stroke:#2f855a}
    .method{fill:#fff6e5;stroke:#b7791f}
    .heap{fill:#f3edf7;stroke:#6b46c1}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#1f2933}
    .small{font-size:14px;fill:#52606d}
    .title{font-size:22px;font-weight:700}
    .arrow{stroke:#334e68;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="620"/>
  <text class="text title" x="42" y="48">TABLESAMPLE 执行链路</text>
  <rect class="box plan" x="50" y="86" width="250" height="94"/>
  <text class="text title" x="76" y="122">Planner</text>
  <text class="text" x="76" y="152">set_tablesample_rel_size</text>
  <text class="small text" x="76" y="174">调用 SampleScanGetSampleSize</text>
  <rect class="box plan" x="390" y="86" width="250" height="94"/>
  <text class="text title" x="416" y="122">Path / Plan</text>
  <text class="text" x="416" y="152">create_samplescan_path</text>
  <text class="small text" x="416" y="174">生成 SampleScan 节点</text>
  <rect class="box exec" x="730" y="86" width="250" height="94"/>
  <text class="text title" x="756" y="122">Executor</text>
  <text class="text" x="756" y="152">ExecSampleScan</text>
  <text class="small text" x="756" y="174">ExecScan 驱动取下一行</text>
  <rect class="box method" x="70" y="270" width="400" height="220"/>
  <text class="text title" x="96" y="306">TsmRoutine</text>
  <text class="text" x="96" y="342">BeginSampleScan(params, seed)</text>
  <text class="text" x="96" y="378">NextSampleBlock()</text>
  <text class="small text" x="130" y="402">SYSTEM：按 block 选择；BERNOULLI：为空</text>
  <text class="text" x="96" y="438">NextSampleTuple(block, maxoffset)</text>
  <text class="small text" x="130" y="462">返回候选 offset，不负责最终可见性</text>
  <rect class="box heap" x="570" y="270" width="400" height="220"/>
  <text class="text title" x="596" y="306">TableAM / HeapAM</text>
  <text class="text" x="596" y="342">table_beginscan_sampling()</text>
  <text class="text" x="596" y="378">scan_sample_next_block()</text>
  <text class="text" x="596" y="414">scan_sample_next_tuple()</text>
  <text class="small text" x="596" y="442">读页面、检查 line pointer、MVCC 可见性</text>
  <text class="small text" x="596" y="466">返回可见 tuple slot 给上层过滤/投影</text>
  <path class="arrow" d="M300 133 L390 133"/>
  <path class="arrow" d="M640 133 L730 133"/>
  <path class="arrow" d="M855 180 L855 235 L770 270"/>
  <path class="arrow" d="M570 379 L470 379"/>
  <path class="arrow" d="M470 438 L570 438"/>
  <text class="text small" x="70" y="548">成本模型要点：如果采样方法提供 NextSampleBlock，cost_samplescan 按随机页成本估算；否则按顺序页成本估算。</text>
  <text class="text small" x="70" y="575">语义要点：TABLESAMPLE 在 WHERE 之前发生，WHERE 只过滤已抽到的样本。</text>
</svg>
