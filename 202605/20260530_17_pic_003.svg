<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">SYSTEM 与 BERNOULLI 采样差异</title>
  <desc id="desc">对比块级 SYSTEM 采样和逐行 BERNOULLI 采样在页面访问、随机性和聚簇偏差上的差异。</desc>
  <style>
    .bg{fill:#f9fafb}
    .page{fill:#ffffff;stroke:#394b59;stroke-width:2;rx:6}
    .sampled{fill:#d9f0ff;stroke:#1f78b4}
    .row{fill:#edf2f7;stroke:#718096}
    .hit{fill:#ffd166;stroke:#b7791f}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:16px;fill:#1f2933}
    .title{font-size:22px;font-weight:700}
    .small{font-size:14px;fill:#52606d}
    .divider{stroke:#cbd5e0;stroke-width:2}
  </style>
  <rect class="bg" width="1040" height="560"/>
  <text class="text title" x="48" y="46">SYSTEM 快在少读块，BERNOULLI 稳在逐行独立</text>
  <line class="divider" x1="520" y1="78" x2="520" y2="515"/>
  <text class="text title" x="70" y="96">SYSTEM(p)</text>
  <text class="text small" x="70" y="124">每个 block 独立抽中；抽中后返回该 block 的全部可见行</text>
  <text class="text title" x="570" y="96">BERNOULLI(p)</text>
  <text class="text small" x="570" y="124">扫描全部 block；每个 tuple offset 独立抽中</text>
  <g transform="translate(70,160)">
    <rect class="page sampled" x="0" y="0" width="90" height="150"/>
    <rect class="row hit" x="12" y="18" width="66" height="20"/>
    <rect class="row hit" x="12" y="48" width="66" height="20"/>
    <rect class="row hit" x="12" y="78" width="66" height="20"/>
    <rect class="row hit" x="12" y="108" width="66" height="20"/>
    <text class="text small" x="18" y="178">block 0 抽中</text>
    <rect class="page" x="120" y="0" width="90" height="150"/>
    <rect class="row" x="132" y="18" width="66" height="20"/>
    <rect class="row" x="132" y="48" width="66" height="20"/>
    <rect class="row" x="132" y="78" width="66" height="20"/>
    <rect class="row" x="132" y="108" width="66" height="20"/>
    <text class="text small" x="138" y="178">block 1 跳过</text>
    <rect class="page sampled" x="240" y="0" width="90" height="150"/>
    <rect class="row hit" x="252" y="18" width="66" height="20"/>
    <rect class="row hit" x="252" y="48" width="66" height="20"/>
    <rect class="row hit" x="252" y="78" width="66" height="20"/>
    <rect class="row hit" x="252" y="108" width="66" height="20"/>
    <text class="text small" x="258" y="178">block 2 抽中</text>
  </g>
  <g transform="translate(570,160)">
    <rect class="page" x="0" y="0" width="90" height="150"/>
    <rect class="row" x="12" y="18" width="66" height="20"/>
    <rect class="row hit" x="12" y="48" width="66" height="20"/>
    <rect class="row" x="12" y="78" width="66" height="20"/>
    <rect class="row" x="12" y="108" width="66" height="20"/>
    <text class="text small" x="20" y="178">扫描</text>
    <rect class="page" x="120" y="0" width="90" height="150"/>
    <rect class="row hit" x="132" y="18" width="66" height="20"/>
    <rect class="row" x="132" y="48" width="66" height="20"/>
    <rect class="row" x="132" y="78" width="66" height="20"/>
    <rect class="row hit" x="132" y="108" width="66" height="20"/>
    <text class="text small" x="140" y="178">扫描</text>
    <rect class="page" x="240" y="0" width="90" height="150"/>
    <rect class="row" x="252" y="18" width="66" height="20"/>
    <rect class="row" x="252" y="48" width="66" height="20"/>
    <rect class="row hit" x="252" y="78" width="66" height="20"/>
    <rect class="row" x="252" y="108" width="66" height="20"/>
    <text class="text small" x="260" y="178">扫描</text>
  </g>
  <rect x="70" y="390" width="390" height="98" fill="#ffffff" stroke="#cbd5e0" rx="8"/>
  <text class="text" x="92" y="426">优势：小比例采样时少读很多页面</text>
  <text class="text" x="92" y="456">风险：页面内行高度相关时，样本有聚簇偏差</text>
  <rect x="570" y="390" width="390" height="98" fill="#ffffff" stroke="#cbd5e0" rx="8"/>
  <text class="text" x="592" y="426">优势：行级独立概率更接近朴素随机样本</text>
  <text class="text" x="592" y="456">代价：仍要访问全表页面，低比例也不省 I/O</text>
</svg>
