<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">ANALYZE 两阶段采样</title>
  <desc id="desc">展示 PostgreSQL ANALYZE 如何先抽样 block，再用蓄水池采样得到固定容量行样本，最后计算统计信息。</desc>
  <style>
    .bg{fill:#f8fafc}
    .box{fill:#ffffff;stroke:#2d3748;stroke-width:2;rx:8}
    .block{fill:#e6fffa;stroke:#319795}
    .row{fill:#fff5d6;stroke:#b7791f}
    .stat{fill:#edf2ff;stroke:#4c51bf}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#1f2933}
    .title{font-size:22px;font-weight:700}
    .small{font-size:14px;fill:#52606d}
    .arrow{stroke:#334e68;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="620"/>
  <text class="text title" x="44" y="48">ANALYZE：为了优化器统计，不是为了返回查询结果</text>
  <rect class="box block" x="54" y="100" width="230" height="125"/>
  <text class="text title" x="82" y="138">1. 确定目标样本数</text>
  <text class="text" x="82" y="170">targrows</text>
  <text class="text small" x="82" y="196">由统计目标、列类型、扩展统计决定</text>
  <rect class="box block" x="390" y="100" width="260" height="125"/>
  <text class="text title" x="418" y="138">2. BlockSampler</text>
  <text class="text" x="418" y="170">从 totalblocks 抽最多 targrows 个块</text>
  <text class="text small" x="418" y="196">Knuth Algorithm S，块集合无偏</text>
  <rect class="box row" x="756" y="100" width="230" height="125"/>
  <text class="text title" x="784" y="138">3. 扫描候选块</text>
  <text class="text" x="784" y="170">统计 live/dead tuple</text>
  <text class="text small" x="784" y="196">TableAM 负责可见性和 tuple slot</text>
  <rect class="box row" x="224" y="330" width="270" height="135"/>
  <text class="text title" x="252" y="368">4. Reservoir</text>
  <text class="text" x="252" y="400">固定容量保存行样本</text>
  <text class="text small" x="252" y="426">Vitter Algorithm Z 计算跳过多少行</text>
  <rect class="box stat" x="600" y="330" width="300" height="135"/>
  <text class="text title" x="628" y="368">5. compute_stats</text>
  <text class="text" x="628" y="400">MCV、histogram、nullfrac</text>
  <text class="text" x="628" y="428">ndistinct、correlation、avg_width</text>
  <path class="arrow" d="M284 162 L390 162"/>
  <path class="arrow" d="M650 162 L756 162"/>
  <path class="arrow" d="M870 225 C870 292 492 262 420 330"/>
  <path class="arrow" d="M494 398 L600 398"/>
  <text class="text small" x="72" y="538">重要边界：PostgreSQL 源码注释承认该两阶段方法并非“所有可能行样本等概率”，但每行进入最终样本的机会相等。</text>
  <text class="text small" x="72" y="566">工程收益：随机块样本可以估算每块平均 live/dead 行数，避免只看表开头导致行密度估计偏差。</text>
</svg>
