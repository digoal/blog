<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">采样误差与适用边界</title>
  <desc id="desc">展示采样比例、数据聚簇、稀有值和统计目标如何影响采样扫描的准确性和代价。</desc>
  <style>
    .bg{fill:#f9fafb}
    .axis{stroke:#2d3748;stroke-width:2}
    .curve{stroke:#2f6f9f;stroke-width:4;fill:none}
    .risk{stroke:#c05621;stroke-width:4;fill:none}
    .box{fill:#ffffff;stroke:#cbd5e0;stroke-width:2;rx:8}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#1f2933}
    .title{font-size:22px;font-weight:700}
    .small{font-size:14px;fill:#52606d}
    .good{fill:#e6fffa;stroke:#319795}
    .bad{fill:#fff5f5;stroke:#c53030}
  </style>
  <rect class="bg" width="1040" height="560"/>
  <text class="text title" x="44" y="48">采样不是免费午餐：读得少，误差和偏差就要被管理</text>
  <line class="axis" x1="88" y1="420" x2="500" y2="420"/>
  <line class="axis" x1="88" y1="420" x2="88" y2="112"/>
  <path class="curve" d="M100 142 C170 185 230 250 300 315 C365 372 425 402 490 414"/>
  <path class="risk" d="M100 385 C180 362 245 337 315 285 C380 235 432 180 490 125"/>
  <text class="text small" x="78" y="102">代价</text>
  <text class="text small" x="440" y="448">样本量</text>
  <text class="text small" x="184" y="160" fill="#2f6f9f">读取/计算成本上升</text>
  <text class="text small" x="270" y="256" fill="#c05621">随机误差下降</text>
  <rect class="box good" x="575" y="100" width="380" height="105"/>
  <text class="text title" x="604" y="136">适合</text>
  <text class="text" x="604" y="166">探索性分析、近似估计、抽样质检</text>
  <text class="text small" x="604" y="190">允许误差，并能用重复采样或扩大样本验证</text>
  <rect class="box bad" x="575" y="245" width="380" height="125"/>
  <text class="text title" x="604" y="281">不适合</text>
  <text class="text" x="604" y="311">账务精确结果、稀有异常发现</text>
  <text class="text" x="604" y="339">强顺序语义、行间高度聚簇且用 SYSTEM</text>
  <text class="text small" x="604" y="362">此时要全量、索引、分区或专用统计结构</text>
  <rect class="box" x="575" y="410" width="380" height="82"/>
  <text class="text" x="604" y="446">经验判断：先问“错误样本会造成什么损失”</text>
  <text class="text small" x="604" y="472">能承受再谈性能；不能承受就不要采样。</text>
</svg>
