<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">NestLoop 执行主循环</title>
  <desc id="desc">展示 PostgreSQL NestLoop 执行器如何获取外表行、传递参数、重扫内表、检查 joinqual 和 otherqual。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .decision { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; }
    .param { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.4; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
    .line { stroke: #333; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="28" width="920" height="504" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="60" y="65" class="text" font-weight="700">PostgreSQL ExecNestLoop 主循环</text>
  <rect x="70" y="105" width="190" height="76" class="box"/>
  <text x="95" y="135" class="text">需要新外表行?</text>
  <text x="95" y="162" class="small">nl_NeedNewOuter</text>
  <path d="M260 143 H338" class="line"/>
  <rect x="340" y="105" width="210" height="76" class="box"/>
  <text x="365" y="135" class="text">ExecProcNode(outer)</text>
  <text x="365" y="162" class="small">取一行 outer tuple</text>
  <path d="M550 143 H628" class="line"/>
  <polygon points="680,94 765,143 680,192 595,143" class="decision"/>
  <text x="630" y="138" class="text">外表耗尽?</text>
  <text x="655" y="162" class="small">TupIsNull</text>
  <path d="M765 143 H835" class="line"/>
  <rect x="838" y="110" width="82" height="66" class="ok"/>
  <text x="857" y="150" class="text">结束</text>
  <path d="M680 192 V245 H555" class="line"/>
  <rect x="335" y="220" width="220" height="88" class="param"/>
  <text x="360" y="250" class="text">设置 PARAM_EXEC</text>
  <text x="360" y="276" class="small">outer Var -&gt; nestParams</text>
  <text x="360" y="297" class="small">标记 innerPlan-&gt;chgParam</text>
  <path d="M335 265 H250 V340 H312" class="line"/>
  <rect x="315" y="302" width="210" height="76" class="box"/>
  <text x="342" y="332" class="text">ExecReScan(inner)</text>
  <text x="342" y="359" class="small">用新参数重启内表</text>
  <path d="M525 340 H620" class="line"/>
  <rect x="620" y="302" width="230" height="76" class="box"/>
  <text x="650" y="332" class="text">ExecProcNode(inner)</text>
  <text x="650" y="359" class="small">取下一行 inner tuple</text>
  <path d="M735 378 V420" class="line"/>
  <polygon points="735,420 825,470 735,520 645,470" class="decision"/>
  <text x="685" y="465" class="text">joinqual 通过?</text>
  <text x="692" y="489" class="small">例如 a.k = b.k</text>
  <path d="M645 470 H475" class="line"/>
  <rect x="275" y="432" width="200" height="76" class="box"/>
  <text x="300" y="462" class="text">继续取 inner</text>
  <text x="300" y="489" class="small">直到内表耗尽</text>
  <path d="M375 432 V392 H735 V378" class="line"/>
  <path d="M825 470 H875" class="line"/>
  <rect x="878" y="432" width="70" height="76" class="ok"/>
  <text x="891" y="462" class="text">投影</text>
  <text x="895" y="489" class="small">返回</text>
  <text x="778" y="419" class="small">若 SEMI / inner_unique</text>
  <text x="778" y="440" class="small">命中后切换新外表行</text>
</svg>
