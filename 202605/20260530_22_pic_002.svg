<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Parameterized Path 与内表索引扫描</title>
  <desc id="desc">展示外表小结果集如何通过 NestLoopParam 把当前键值传给内表索引扫描，从而避免扫描整个内表。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .area { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.2; rx: 10; }
    .outer { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.4; rx: 8; }
    .inner { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.4; rx: 8; }
    .param { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
    .line { stroke: #333; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #4f46e5; stroke-width: 1.7; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="25" width="920" height="470" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="60" y="62" class="text" font-weight="700">从 “A.X = B.Y” 到参数化内表扫描</text>
  <rect x="70" y="105" width="255" height="315" class="area"/>
  <text x="95" y="138" class="text" font-weight="700">外表路径</text>
  <rect x="105" y="170" width="185" height="65" class="outer"/>
  <text x="132" y="198" class="text">Seq/Bitmap Scan A</text>
  <text x="132" y="220" class="small">输出少量 A 行</text>
  <rect x="105" y="270" width="185" height="65" class="outer"/>
  <text x="132" y="298" class="text">当前 outer tuple</text>
  <text x="132" y="320" class="small">A.X = 42</text>
  <path d="M198 235 V270" class="line"/>
  <rect x="395" y="170" width="210" height="115" class="param"/>
  <text x="425" y="204" class="text">NestLoopParam</text>
  <text x="425" y="232" class="small">paramno: PARAM_EXEC 槽</text>
  <text x="425" y="255" class="small">paramval: OUTER_VAR A.X</text>
  <path d="M290 302 H395" class="dash"/>
  <rect x="675" y="105" width="240" height="315" class="area"/>
  <text x="700" y="138" class="text" font-weight="700">内表参数化路径</text>
  <rect x="705" y="170" width="180" height="65" class="inner"/>
  <text x="730" y="198" class="text">Index Scan B</text>
  <text x="730" y="220" class="small">Index Cond: B.Y = $0</text>
  <rect x="705" y="270" width="180" height="65" class="inner"/>
  <text x="730" y="298" class="text">B-tree 查找</text>
  <text x="730" y="320" class="small">把 $0 当常量键</text>
  <path d="M605 227 H705" class="dash"/>
  <path d="M795 235 V270" class="line"/>
  <text x="86" y="386" class="small">成本大致：外表成本 + 外表行数 x 内表重扫成本</text>
  <text x="414" y="335" class="small">规划器用 parameterized path 记录</text>
  <text x="414" y="358" class="small">“这个内表路径依赖哪些外部 rel”</text>
  <text x="702" y="386" class="small">优势：不必扫描整个 B，只查相关键</text>
</svg>
