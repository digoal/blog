<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Nested Loop 成本放大与早停</title>
  <desc id="desc">比较普通 Nested Loop、内表索引 Nested Loop、SEMI 或 inner_unique 早停、Memoize 缓存重复参数的成本差异。</desc>
  <style>
    .axis { stroke: #111827; stroke-width: 1.5; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .bar1 { fill: #0891b2; }
    .bar2 { fill: #4f46e5; }
    .bar3 { fill: #16a34a; }
    .bar4 { fill: #ea580c; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
    .formula { font-family: Arial, sans-serif; font-size: 17px; fill: #1f2937; }
  </style>
  <rect x="30" y="24" width="920" height="490" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="60" y="60" class="text" font-weight="700">成本形状：不是“循环”本身慢，而是内表重扫是否昂贵</text>
  <line x1="110" y1="405" x2="875" y2="405" class="axis"/>
  <line x1="110" y1="105" x2="110" y2="405" class="axis"/>
  <line x1="110" y1="330" x2="875" y2="330" class="grid"/>
  <line x1="110" y1="255" x2="875" y2="255" class="grid"/>
  <line x1="110" y1="180" x2="875" y2="180" class="grid"/>
  <rect x="155" y="130" width="120" height="275" class="bar1"/>
  <rect x="335" y="250" width="120" height="155" class="bar2"/>
  <rect x="515" y="305" width="120" height="100" class="bar3"/>
  <rect x="695" y="330" width="120" height="75" class="bar4"/>
  <text x="145" y="435" class="small">内表全扫</text>
  <text x="315" y="435" class="small">内表索引扫描</text>
  <text x="500" y="435" class="small">SEMI / 唯一早停</text>
  <text x="682" y="435" class="small">Memoize 命中</text>
  <text x="137" y="118" class="small">外表行数 x 内表全成本</text>
  <text x="318" y="238" class="small">外表行数 x 单次索引查找</text>
  <text x="498" y="293" class="small">找到首个匹配即停</text>
  <text x="678" y="318" class="small">重复参数复用结果</text>
  <text x="105" y="88" class="small">相对成本</text>
  <rect x="110" y="465" width="760" height="34" fill="#f8fafc" stroke="#cbd5e1" rx="6"/>
  <text x="128" y="488" class="formula">简化公式：startup(outer+inner) + rows(outer) x rescan(inner) + join qual CPU</text>
</svg>
