<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">优化器中的 Join 方法选择</title>
  <desc id="desc">展示 PostgreSQL 优化器在 Nested Loop、Hash Join、Merge Join 之间基于行数、索引、排序和内存做成本选择。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .nl { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.4; rx: 8; }
    .hash { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.4; rx: 8; }
    .merge { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
    .line { stroke: #333; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="24" width="920" height="490" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="60" y="60" class="text" font-weight="700">同一个 joinrel 上的候选路径竞争</text>
  <rect x="85" y="105" width="230" height="82" class="box"/>
  <text x="112" y="138" class="text">统计信息与谓词</text>
  <text x="112" y="164" class="small">rows、selectivity、join clauses</text>
  <rect x="375" y="105" width="230" height="82" class="box"/>
  <text x="405" y="138" class="text">生成 Path</text>
  <text x="405" y="164" class="small">outer_path x inner_path</text>
  <rect x="665" y="105" width="230" height="82" class="box"/>
  <text x="695" y="138" class="text">add_path 竞争</text>
  <text x="695" y="164" class="small">成本、行数、pathkeys</text>
  <path d="M315 146 H375" class="line"/>
  <path d="M605 146 H665" class="line"/>
  <rect x="85" y="250" width="240" height="170" class="nl"/>
  <text x="112" y="285" class="text" font-weight="700">Nested Loop</text>
  <text x="112" y="318" class="small">强项：外表小，内表可索引</text>
  <text x="112" y="342" class="small">可参数化：B.Y = A.X</text>
  <text x="112" y="366" class="small">可早停：SEMI / inner_unique</text>
  <text x="112" y="390" class="small">风险：外表行数估错会放大</text>
  <rect x="370" y="250" width="240" height="170" class="hash"/>
  <text x="397" y="285" class="text" font-weight="700">Hash Join</text>
  <text x="397" y="318" class="small">强项：等值 join、大批量</text>
  <text x="397" y="342" class="small">先构建 hash table</text>
  <text x="397" y="366" class="small">不依赖内表索引</text>
  <text x="397" y="390" class="small">风险：内存不足会 batch</text>
  <rect x="655" y="250" width="240" height="170" class="merge"/>
  <text x="682" y="285" class="text" font-weight="700">Merge Join</text>
  <text x="682" y="318" class="small">强项：两边已有排序</text>
  <text x="682" y="342" class="small">适合范围与有序输出</text>
  <text x="682" y="366" class="small">可能需要 Sort</text>
  <text x="682" y="390" class="small">风险：排序启动成本高</text>
  <path d="M490 187 V225 H205 V250" class="line"/>
  <path d="M490 187 V250" class="line"/>
  <path d="M490 187 V225 H775 V250" class="line"/>
  <text x="80" y="462" class="small">`enable_nestloop = off` 只能劝退：若语义或参数化路径只能由 NestLoop 实现，优化器仍可能选择它。</text>
</svg>
