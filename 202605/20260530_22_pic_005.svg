<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">EXPLAIN 诊断 Nested Loop</title>
  <desc id="desc">展示通过 EXPLAIN ANALYZE 的 loops、rows、Buffers、Index Cond、Join Filter 判断 Nested Loop 是否健康。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .panel { fill: #f8fafc; stroke: #64748b; stroke-width: 1.3; rx: 8; }
    .good { fill: #ecfdf5; stroke: #047857; stroke-width: 1.3; rx: 8; }
    .bad { fill: #fff1f2; stroke: #be123c; stroke-width: 1.3; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #111827; }
    .line { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="24" width="920" height="510" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="60" y="60" class="text" font-weight="700">Nested Loop 的 EXPLAIN 诊断路径</text>
  <rect x="70" y="95" width="400" height="190" class="panel"/>
  <text x="95" y="126" class="code">Nested Loop</text>
  <text x="95" y="152" class="code">  -&gt; outer scan (rows=10 loops=1)</text>
  <text x="95" y="178" class="code">  -&gt; Index Scan on B</text>
  <text x="95" y="204" class="code">       Index Cond: (b.k = a.k)</text>
  <text x="95" y="230" class="code">       rows=1 loops=10</text>
  <text x="95" y="256" class="code">       Buffers: shared hit/read...</text>
  <rect x="560" y="95" width="340" height="86" class="good"/>
  <text x="585" y="128" class="text">健康信号</text>
  <text x="585" y="154" class="small">内表有 Index Cond，loops 接近外表行数</text>
  <path d="M470 190 H560" class="line"/>
  <rect x="560" y="210" width="340" height="116" class="bad"/>
  <text x="585" y="243" class="text">风险信号</text>
  <text x="585" y="269" class="small">内表 Seq Scan 或 Materialize 太大</text>
  <text x="585" y="292" class="small">loops 很高，Buffers 随 loops 放大</text>
  <path d="M470 238 H560" class="line"/>
  <rect x="70" y="345" width="250" height="118" class="panel"/>
  <text x="95" y="378" class="text">先看估算偏差</text>
  <text x="95" y="405" class="small">estimated rows vs actual rows</text>
  <text x="95" y="428" class="small">外表低估会放大内表重扫</text>
  <rect x="365" y="345" width="250" height="118" class="panel"/>
  <text x="390" y="378" class="text">再看内表访问</text>
  <text x="390" y="405" class="small">Index Cond 是否使用 join key</text>
  <text x="390" y="428" class="small">Filter / Join Filter 是否过重</text>
  <rect x="660" y="345" width="250" height="118" class="panel"/>
  <text x="685" y="378" class="text">最后看缓存与 I/O</text>
  <text x="685" y="405" class="small">Buffers、Memoize、work_mem</text>
  <text x="685" y="428" class="small">重复 key 是否可复用</text>
  <path d="M320 404 H365" class="line"/>
  <path d="M615 404 H660" class="line"/>
</svg>
