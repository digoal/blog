<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">Merge Join 有序输入与同步推进</title>
  <desc id="desc">展示 PostgreSQL merge join 将两侧输入按 join key 排序后同步推进，比较当前 key，跳过较小一侧，key 相等时输出匹配组合。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .stage{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}
    .sort{fill:#fef3c7;stroke:#b45309;stroke-width:2}
    .join{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}
    .key{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:16px;fill:#075985;font-weight:700}
    .arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;fill:none}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="box" x="30" y="45" width="210" height="120" rx="8"/>
  <text class="text" x="65" y="80">outer 输入</text>
  <text class="small" x="60" y="112">可能来自 Seq Scan</text>
  <text class="small" x="60" y="138">或 Index Scan</text>

  <rect class="box" x="30" y="330" width="210" height="120" rx="8"/>
  <text class="text" x="68" y="365">inner 输入</text>
  <text class="small" x="60" y="397">必须可按 key 顺序读</text>
  <text class="small" x="60" y="423">且通常要支持 mark/restore</text>

  <rect class="sort" x="310" y="45" width="190" height="120" rx="8"/>
  <text class="text" x="354" y="82">outer 排序</text>
  <text class="small" x="342" y="116">已有 pathkeys 时</text>
  <text class="small" x="355" y="142">可省略 Sort</text>

  <rect class="sort" x="310" y="330" width="190" height="120" rx="8"/>
  <text class="text" x="356" y="367">inner 排序</text>
  <text class="small" x="338" y="401">不能用增量排序</text>
  <text class="small" x="342" y="427">因为需 mark/restore</text>

  <rect class="stage" x="575" y="165" width="190" height="190" rx="8"/>
  <text class="text" x="618" y="202">同步比较</text>
  <text class="key" x="620" y="240">outer key</text>
  <text class="small" x="707" y="240">vs</text>
  <text class="key" x="620" y="272">inner key</text>
  <text class="small" x="606" y="310">小的一侧向前推进</text>
  <text class="small" x="606" y="336">相等进入匹配阶段</text>

  <rect class="join" x="835" y="165" width="170" height="190" rx="8"/>
  <text class="text" x="879" y="202">输出行</text>
  <text class="small" x="866" y="240">Merge Cond 通过</text>
  <text class="small" x="866" y="270">再检查 Join Filter</text>
  <text class="small" x="866" y="300">再检查 Filter</text>

  <path class="arrow" d="M240 105 H310"/>
  <path class="arrow" d="M240 390 H310"/>
  <path class="arrow" d="M500 105 C565 105 560 205 575 225"/>
  <path class="arrow" d="M500 390 C565 390 560 315 575 295"/>
  <path class="arrow" d="M765 260 H835"/>
  <path class="dash" d="M665 355 C650 430 560 450 500 430"/>
  <text class="small" x="612" y="470">重复 key 时，inner 回到 mark 位置重放匹配段</text>
</svg>
