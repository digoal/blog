<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">ExecMergeJoin 状态机</title>
  <desc id="desc">展示 PostgreSQL ExecMergeJoin 的主要状态：初始化两侧、跳过不匹配元组、标记 inner、连接匹配元组、推进 inner 或 outer、处理 outer join 补空。</desc>
  <style>
    .state{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .hot{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    .skip{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}
    .end{fill:#fee2e2;stroke:#b91c1c;stroke-width:2}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#475569;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
    .thin{stroke:#64748b;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="state" x="60" y="70" width="190" height="78" rx="8"/>
  <text class="text" x="91" y="104">INITIALIZE_OUTER</text>
  <text class="small" x="94" y="130">读取首个可匹配 outer</text>

  <rect class="state" x="330" y="70" width="190" height="78" rx="8"/>
  <text class="text" x="363" y="104">INITIALIZE_INNER</text>
  <text class="small" x="365" y="130">读取首个可匹配 inner</text>

  <rect class="skip" x="600" y="70" width="190" height="78" rx="8"/>
  <text class="text" x="647" y="104">SKIP_TEST</text>
  <text class="small" x="625" y="130">比较 key，跳过较小侧</text>

  <rect class="hot" x="860" y="70" width="190" height="78" rx="8"/>
  <text class="text" x="906" y="104">JOINTUPLES</text>
  <text class="small" x="893" y="130">mergeclause 相等后投影</text>

  <rect class="skip" x="600" y="240" width="190" height="78" rx="8"/>
  <text class="text" x="620" y="274">SKIPOUTER_ADVANCE</text>
  <text class="small" x="632" y="300">outer &lt; inner，推进 outer</text>

  <rect class="skip" x="600" y="410" width="190" height="78" rx="8"/>
  <text class="text" x="620" y="444">SKIPINNER_ADVANCE</text>
  <text class="small" x="632" y="470">outer &gt; inner，推进 inner</text>

  <rect class="state" x="860" y="240" width="190" height="78" rx="8"/>
  <text class="text" x="908" y="274">NEXTINNER</text>
  <text class="small" x="890" y="300">继续扫描当前 key 的 inner 段</text>

  <rect class="state" x="860" y="410" width="190" height="78" rx="8"/>
  <text class="text" x="912" y="444">NEXTOUTER</text>
  <text class="small" x="895" y="470">inner 段结束，取下一 outer</text>

  <rect class="state" x="330" y="410" width="190" height="78" rx="8"/>
  <text class="text" x="377" y="444">TESTOUTER</text>
  <text class="small" x="363" y="470">新 outer 是否等于 marked inner</text>

  <rect class="end" x="60" y="500" width="190" height="78" rx="8"/>
  <text class="text" x="101" y="534">ENDINNER</text>
  <text class="small" x="86" y="560">left/full join 补 inner NULL</text>

  <rect class="end" x="60" y="380" width="190" height="78" rx="8"/>
  <text class="text" x="100" y="414">ENDOUTER</text>
  <text class="small" x="86" y="440">right/full join 补 outer NULL</text>

  <path class="arrow" d="M250 109 H330"/>
  <path class="arrow" d="M520 109 H600"/>
  <path class="arrow" d="M790 109 H860"/>
  <path class="arrow" d="M955 148 V240"/>
  <path class="arrow" d="M955 318 V410"/>
  <path class="arrow" d="M860 449 H520"/>
  <path class="arrow" d="M425 410 C425 340 820 340 860 279"/>
  <path class="arrow" d="M695 148 V240"/>
  <path class="arrow" d="M695 318 V410"/>
  <path class="thin" d="M600 279 C520 275 520 148 600 130"/>
  <path class="thin" d="M600 449 C540 445 540 150 600 128"/>
  <path class="thin" d="M330 449 H250"/>
  <path class="thin" d="M250 419 H330"/>
  <text class="small" x="797" y="178">相等时 Mark inner</text>
  <text class="small" x="782" y="538">重复 outer key 时 Restore inner mark</text>
  <text class="small" x="62" y="620">图中省略了非匹配 NULL key 的快速跳过；源码还区分 MatchedOuter/MatchedInner 以保证外连接语义。</text>
</svg>
