<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">重复键下的 mark/restore</title>
  <desc id="desc">展示 outer 和 inner 都存在重复 key=5 时，Merge Join 标记 inner 第一个 5，当前 outer 的 inner 段扫完后，下一个 outer 5 需要恢复到标记位置重新输出组合。</desc>
  <style>
    .lane{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .cell{fill:#ffffff;stroke:#94a3b8;stroke-width:1.5}
    .match{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    .mark{fill:#fef3c7;stroke:#b45309;stroke-width:2}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}
    .num{font-family:Arial,sans-serif;font-size:20px;fill:#0f172a;font-weight:700}
    .arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#b45309;stroke-width:2.5;stroke-dasharray:7 5;fill:none;marker-end:url(#arrow2)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#b45309"/>
    </marker>
  </defs>
  <text class="text" x="55" y="50">输入流</text>
  <rect class="lane" x="55" y="80" width="650" height="90" rx="8"/>
  <text class="text" x="75" y="116">outer</text>
  <g transform="translate(160,100)">
    <rect class="cell" x="0" y="0" width="52" height="45"/><text class="num" x="20" y="29">4</text>
    <rect class="match" x="62" y="0" width="52" height="45"/><text class="num" x="82" y="29">5</text>
    <rect class="match" x="124" y="0" width="52" height="45"/><text class="num" x="144" y="29">5</text>
    <rect class="cell" x="186" y="0" width="52" height="45"/><text class="num" x="206" y="29">6</text>
    <rect class="cell" x="248" y="0" width="52" height="45"/><text class="num" x="268" y="29">9</text>
  </g>
  <rect class="lane" x="55" y="210" width="650" height="90" rx="8"/>
  <text class="text" x="75" y="246">inner</text>
  <g transform="translate(160,230)">
    <rect class="cell" x="0" y="0" width="52" height="45"/><text class="num" x="20" y="29">3</text>
    <rect class="mark" x="62" y="0" width="52" height="45"/><text class="num" x="82" y="29">5</text>
    <rect class="match" x="124" y="0" width="52" height="45"/><text class="num" x="144" y="29">5</text>
    <rect class="match" x="186" y="0" width="52" height="45"/><text class="num" x="206" y="29">5</text>
    <rect class="cell" x="248" y="0" width="52" height="45"/><text class="num" x="268" y="29">8</text>
  </g>
  <text class="small" x="230" y="315">mark: inner 第一个 5</text>

  <rect class="lane" x="770" y="80" width="250" height="220" rx="8"/>
  <text class="text" x="810" y="118">输出组合</text>
  <text class="small" x="810" y="156">outer 第一个 5:</text>
  <text class="small" x="830" y="184">(5,5) (5,5) (5,5)</text>
  <text class="small" x="810" y="224">outer 第二个 5:</text>
  <text class="small" x="830" y="252">(5,5) (5,5) (5,5)</text>

  <path class="arrow" d="M425 145 C520 150 560 210 425 230"/>
  <path class="dash" d="M455 275 C520 360 245 370 222 275"/>
  <text class="small" x="515" y="365">当下一个 outer 仍是 5，inner 回到 mark 重放 5 段</text>
  <text class="small" x="55" y="430">为什么需要 mark/restore：如果只线性向前扫，第二个 outer=5 会错过已经扫过的 inner=5 段。</text>
  <text class="small" x="55" y="462">为什么会贵：重复键越多，inner 匹配段被重复发射越多；规划器会估算 rescannedtuples，并可能加 Material。</text>
</svg>
