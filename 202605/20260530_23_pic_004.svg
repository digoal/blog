<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">MergePath 到运行时计划节点</title>
  <desc id="desc">展示 PostgreSQL MergePath 在规划阶段可以代表 Merge Join、outer Sort、inner Sort、inner Material 四类运行时节点，并记录排序键、merge clauses、skip mark restore 等决策。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .path{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}
    .plan{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    .warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}
    .arrow{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="box" x="55" y="55" width="250" height="100" rx="8"/>
  <text class="text" x="98" y="92">候选输入路径</text>
  <text class="small" x="82" y="122">Seq Scan / Index Scan / Join Path</text>

  <rect class="box" x="55" y="215" width="250" height="100" rx="8"/>
  <text class="text" x="100" y="252">mergejoinable 条件</text>
  <text class="small" x="88" y="282">等值操作符属于 btree opfamily</text>

  <rect class="path" x="390" y="115" width="310" height="235" rx="8"/>
  <text class="text" x="505" y="152">MergePath</text>
  <text class="small" x="425" y="190">path_mergeclauses</text>
  <text class="small" x="425" y="220">outersortkeys / innersortkeys</text>
  <text class="small" x="425" y="250">outer_presorted_keys</text>
  <text class="small" x="425" y="280">skip_mark_restore</text>
  <text class="small" x="425" y="310">materialize_inner</text>

  <rect class="plan" x="795" y="45" width="250" height="72" rx="8"/>
  <text class="text" x="842" y="89">Merge Join 节点</text>
  <rect class="warn" x="795" y="150" width="250" height="72" rx="8"/>
  <text class="text" x="865" y="194">outer Sort</text>
  <rect class="warn" x="795" y="255" width="250" height="72" rx="8"/>
  <text class="text" x="870" y="299">inner Sort</text>
  <rect class="warn" x="795" y="360" width="250" height="72" rx="8"/>
  <text class="text" x="848" y="404">inner Material</text>

  <path class="arrow" d="M305 105 H390"/>
  <path class="arrow" d="M305 265 H390"/>
  <path class="arrow" d="M700 210 C760 165 760 80 795 80"/>
  <path class="arrow" d="M700 230 C755 220 760 185 795 185"/>
  <path class="arrow" d="M700 255 C755 260 760 290 795 290"/>
  <path class="arrow" d="M700 285 C755 315 760 395 795 395"/>

  <text class="small" x="60" y="410">关键含义：MergePath 不是单个节点的成本，它已经把可能需要的排序和物化纳入成本。</text>
  <text class="small" x="60" y="442">outer 可用 incremental sort；inner 目前不使用 incremental sort，因为 inner 可能需要 mark/restore。</text>
  <text class="small" x="60" y="474">当 inner 原路径不支持 mark/restore，或 materialize 更便宜，规划器会插入 Material 节点。</text>
</svg>
