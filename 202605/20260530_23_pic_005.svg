<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="610" viewBox="0 0 1100 610" role="img" aria-labelledby="title desc">
  <title id="title">Merge Join 成本边界</title>
  <desc id="desc">展示 Merge Join 的成本由排序或索引有序输入、同步比较、重复键重扫、额外过滤和投影组成，并与 Hash Join、Nested Loop 的优势区间对比。</desc>
  <style>
    .axis{stroke:#334155;stroke-width:2}
    .curve1{stroke:#15803d;stroke-width:4;fill:none}
    .curve2{stroke:#0369a1;stroke-width:4;fill:none}
    .curve3{stroke:#b91c1c;stroke-width:4;fill:none}
    .zone{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}
    .label{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;font-weight:700}
    .box{fill:#ffffff;stroke:#64748b;stroke-width:1.5}
  </style>
  <rect class="zone" x="65" y="60" width="650" height="420" rx="8"/>
  <line class="axis" x1="120" y1="430" x2="660" y2="430"/>
  <line class="axis" x1="120" y1="430" x2="120" y2="110"/>
  <text class="small" x="300" y="468">输入规模 / 需要处理的行数</text>
  <text class="small" x="35" y="285" transform="rotate(-90 35 285)">相对成本</text>

  <path class="curve1" d="M130 385 C230 330 340 245 485 145 C560 95 625 88 655 85"/>
  <path class="curve2" d="M130 355 C245 270 390 205 650 155"/>
  <path class="curve3" d="M130 395 C210 375 295 350 380 315 C485 270 570 205 650 120"/>

  <text class="label" x="500" y="118" fill="#15803d">Merge Join: 需排序时启动成本高</text>
  <text class="label" x="470" y="175" fill="#0369a1">Hash Join: build + probe</text>
  <text class="label" x="420" y="335" fill="#b91c1c">Nested Loop: outer x inner</text>

  <rect class="box" x="760" y="70" width="290" height="96" rx="8"/>
  <text class="text" x="790" y="105">Merge Join 变强</text>
  <text class="small" x="790" y="135">两边已有索引顺序或上游已排序</text>
  <text class="small" x="790" y="158">下游还需要同样的有序输出</text>

  <rect class="box" x="760" y="205" width="290" height="112" rx="8"/>
  <text class="text" x="790" y="240">Merge Join 变弱</text>
  <text class="small" x="790" y="270">两边都要大排序且 work_mem 不足</text>
  <text class="small" x="790" y="294">重复 key 很多导致 inner 重扫</text>

  <rect class="box" x="760" y="360" width="290" height="132" rx="8"/>
  <text class="text" x="790" y="395">成本组成</text>
  <text class="small" x="790" y="425">sort 或 index 有序读取</text>
  <text class="small" x="790" y="449">mergequal 比较次数</text>
  <text class="small" x="790" y="473">rescannedtuples 与 materialize</text>
</svg>
