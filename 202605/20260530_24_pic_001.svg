<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">In-Memory Hash Join 执行流水线</title>
  <desc id="desc">展示内表构建哈希表、外表探测桶链、再检查 join qual 和输出结果的主路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .accent { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .hash { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="520"/>
  <text class="text" x="45" y="45">Hash Join 的两个阶段：先把较小/内侧输入变成内存哈希表，再用外侧输入逐行探测</text>

  <rect class="accent" x="60" y="95" width="210" height="90"/>
  <text class="text" x="96" y="130">Inner 输入</text>
  <text class="small" x="88" y="160">Hash 节点读取 build 侧</text>

  <rect class="box" x="340" y="80" width="230" height="120"/>
  <text class="text" x="384" y="118">计算 hash key</text>
  <text class="small" x="374" y="150">严格等值 join 中</text>
  <text class="small" x="370" y="174">NULL key 通常不入表</text>

  <rect class="hash" x="650" y="60" width="360" height="170"/>
  <text class="text" x="760" y="94">HashJoinTable</text>
  <line x1="680" y1="120" x2="980" y2="120" stroke="#047857" stroke-width="2"/>
  <text class="small" x="690" y="148">bucket 0: tuple -> tuple</text>
  <text class="small" x="690" y="178">bucket 1: tuple</text>
  <text class="small" x="690" y="208">bucket 2: empty</text>

  <rect class="accent" x="60" y="325" width="210" height="90"/>
  <text class="text" x="96" y="360">Outer 输入</text>
  <text class="small" x="84" y="390">Hash Join 节点探测侧</text>

  <rect class="box" x="340" y="310" width="230" height="120"/>
  <text class="text" x="384" y="348">计算 hash key</text>
  <text class="small" x="372" y="380">定位 bucket / batch</text>
  <text class="small" x="388" y="404">扫描桶链</text>

  <rect class="warn" x="650" y="310" width="360" height="120"/>
  <text class="text" x="716" y="348">二次判断与输出</text>
  <text class="small" x="692" y="380">先用 hash value 缩小候选集</text>
  <text class="small" x="692" y="404">再执行 hashclauses / otherqual</text>

  <path class="arrow" d="M270 140 H340"/>
  <path class="arrow" d="M570 140 H650"/>
  <path class="arrow" d="M270 370 H340"/>
  <path class="arrow" d="M570 370 H650"/>
  <path class="dash" d="M830 310 V230"/>
</svg>
