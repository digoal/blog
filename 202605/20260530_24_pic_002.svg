<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Hash Join 哈希表布局</title>
  <desc id="desc">展示 bucket 指针数组、HashJoinTuple 链表、MinimalTuple 数据和 32KB chunk 分配方式。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .bucket { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .tuple { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 7; }
    .chunk { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .mono { font: 15px monospace; fill: #1e293b; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="560"/>
  <text class="text" x="45" y="45">哈希表不是一张二维表，而是 bucket 指针数组 + 桶内链表 + MinimalTuple 数据</text>

  <rect class="box" x="60" y="95" width="260" height="330"/>
  <text class="text" x="110" y="130">bucket 指针数组</text>
  <rect class="bucket" x="95" y="165" width="180" height="42"/>
  <text class="mono" x="125" y="192">bucket[0]</text>
  <rect class="bucket" x="95" y="217" width="180" height="42"/>
  <text class="mono" x="125" y="244">bucket[1]</text>
  <rect class="bucket" x="95" y="269" width="180" height="42"/>
  <text class="mono" x="125" y="296">bucket[2]</text>
  <rect class="bucket" x="95" y="321" width="180" height="42"/>
  <text class="mono" x="125" y="348">bucket[3]</text>
  <text class="small" x="88" y="398">nbuckets 为 2 的幂</text>

  <rect class="tuple" x="430" y="130" width="250" height="92"/>
  <text class="mono" x="458" y="164">HashJoinTupleData</text>
  <text class="small" x="458" y="194">next + hashvalue + tuple</text>
  <rect class="tuple" x="770" y="130" width="250" height="92"/>
  <text class="mono" x="798" y="164">HashJoinTupleData</text>
  <text class="small" x="798" y="194">同桶链表的下一项</text>

  <rect class="chunk" x="430" y="310" width="590" height="130"/>
  <text class="text" x="588" y="348">HashMemoryChunk</text>
  <text class="small" x="476" y="382">当前 batch 的 tuple 通常打包进 32KB chunk，减少逐行 palloc 开销</text>
  <text class="small" x="476" y="412">大 tuple 超过阈值时单独占用 chunk</text>

  <path class="arrow" d="M275 238 C340 238 352 176 430 176"/>
  <path class="arrow" d="M680 176 H770"/>
  <path class="arrow" d="M555 222 V310"/>
  <path class="arrow" d="M895 222 V310"/>
</svg>
