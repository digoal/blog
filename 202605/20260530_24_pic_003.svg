<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="610" viewBox="0 0 1100 610" role="img" aria-labelledby="title desc">
  <title id="title">Hash Join batch 与溢写机制</title>
  <desc id="desc">展示内存不足时 batch 数翻倍、非当前 batch tuple 写入临时文件、后续逐批加载和探测。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .mem { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .disk { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .calc { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="610"/>
  <text class="text" x="45" y="45">当 build 侧放不进 hash_mem，Hash Join 退化为多 batch 的 hybrid hash join</text>

  <rect class="calc" x="55" y="105" width="260" height="110"/>
  <text class="text" x="88" y="142">hashvalue 拆分</text>
  <text class="small" x="84" y="174">低位定位 bucket</text>
  <text class="small" x="84" y="196">旋转后部分位定位 batch</text>

  <rect class="mem" x="420" y="80" width="270" height="160"/>
  <text class="text" x="498" y="118">当前 batch</text>
  <text class="small" x="470" y="152">batch 0 常驻内存</text>
  <text class="small" x="470" y="180">构建桶链并立即探测</text>
  <text class="small" x="470" y="208">spaceUsed 受 spaceAllowed 限制</text>

  <rect class="disk" x="790" y="80" width="250" height="160"/>
  <text class="text" x="862" y="118">后续 batch</text>
  <text class="small" x="830" y="152">innerBatchFile[n]</text>
  <text class="small" x="830" y="180">outerBatchFile[n]</text>
  <text class="small" x="830" y="208">临时文件顺序读写</text>

  <rect class="box" x="150" y="335" width="280" height="130"/>
  <text class="text" x="202" y="374">运行期增长</text>
  <text class="small" x="186" y="408">nbatch 按 2 倍增加</text>
  <text class="small" x="186" y="434">只允许 tuple 去更晚 batch</text>

  <rect class="box" x="565" y="335" width="330" height="130"/>
  <text class="text" x="640" y="374">逐 batch 执行</text>
  <text class="small" x="610" y="408">加载 inner batch 到内存</text>
  <text class="small" x="610" y="434">扫描 outer batch 并探测</text>

  <path class="arrow" d="M315 160 H420"/>
  <path class="dash" d="M690 160 H790"/>
  <path class="arrow" d="M555 240 C555 290 290 290 290 335"/>
  <path class="arrow" d="M430 400 H565"/>
  <path class="dash" d="M915 240 C915 300 730 300 730 335"/>
  <text class="small" x="475" y="525">关键边界：同一 hash value 无法靠增加 batch 再拆小；极端倾斜会让增长失效。</text>
</svg>
