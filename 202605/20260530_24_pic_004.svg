<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Hash Join 的 skew 优化与 NULL key 处理</title>
  <desc id="desc">展示高频外侧键使用 skew hash table 减少溢写，以及 NULL join key 在外连接中的延迟输出。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .skew { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .hash { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .null { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 8; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="560"/>
  <text class="text" x="45" y="45">工程里的 Hash Join 必须处理两类麻烦：热点 key 和 NULL key</text>

  <rect class="box" x="70" y="105" width="250" height="130"/>
  <text class="text" x="120" y="145">外侧统计信息</text>
  <text class="small" x="105" y="178">Most Common Values</text>
  <text class="small" x="105" y="204">决定是否启用 skew</text>

  <rect class="skew" x="430" y="80" width="270" height="170"/>
  <text class="text" x="500" y="120">skew hash table</text>
  <text class="small" x="470" y="155">只占总内存预算的一小部分</text>
  <text class="small" x="470" y="184">热点 hash value 留在首批</text>
  <text class="small" x="470" y="213">减少热点 tuple 溢写</text>

  <rect class="hash" x="800" y="105" width="230" height="130"/>
  <text class="text" x="852" y="145">主 hash table</text>
  <text class="small" x="838" y="178">普通 key 进入主表</text>
  <text class="small" x="838" y="204">或分流到 batch 文件</text>

  <rect class="null" x="160" y="345" width="330" height="130"/>
  <text class="text" x="235" y="384">NULL join key</text>
  <text class="small" x="205" y="418">严格等值 join 中不能匹配</text>
  <text class="small" x="205" y="444">普通 inner join 可丢弃</text>

  <rect class="null" x="620" y="345" width="330" height="130"/>
  <text class="text" x="706" y="384">外连接补空</text>
  <text class="small" x="665" y="418">需要保留到 tuplestore</text>
  <text class="small" x="665" y="444">后续输出 null-extended tuple</text>

  <path class="arrow" d="M320 170 H430"/>
  <path class="arrow" d="M700 165 H800"/>
  <path class="dash" d="M325 345 C325 300 565 300 565 250"/>
  <path class="arrow" d="M490 410 H620"/>
</svg>
