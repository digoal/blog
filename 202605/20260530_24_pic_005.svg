<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="610" viewBox="0 0 1100 610" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Hash Join 与 NUMA 边界</title>
  <desc id="desc">展示 PostgreSQL parallel hash join 的 barrier 阶段，以及现代多核 NUMA 机器上的本地/远程内存访问代价。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .socket { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
    .worker { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 7; }
    .mem { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 7; }
    .bar { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .remote { stroke: #b91c1c; stroke-width: 2.4; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrowred); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="610"/>
  <text class="text" x="45" y="45">并行 Hash Join 的瓶颈从算法复杂度转向同步、内存带宽、缓存争用和 NUMA 本地性</text>

  <rect class="socket" x="70" y="95" width="430" height="320"/>
  <text class="text" x="210" y="130">NUMA 节点 0</text>
  <rect class="worker" x="110" y="165" width="130" height="60"/>
  <text class="small" x="144" y="202">worker 1</text>
  <rect class="worker" x="270" y="165" width="130" height="60"/>
  <text class="small" x="304" y="202">worker 2</text>
  <rect class="mem" x="150" y="285" width="280" height="80"/>
  <text class="small" x="215" y="319">本地内存 / 本地 batch</text>
  <text class="small" x="205" y="344">访问延迟低，带宽高</text>

  <rect class="socket" x="600" y="95" width="430" height="320"/>
  <text class="text" x="740" y="130">NUMA 节点 1</text>
  <rect class="worker" x="640" y="165" width="130" height="60"/>
  <text class="small" x="674" y="202">worker 3</text>
  <rect class="worker" x="800" y="165" width="130" height="60"/>
  <text class="small" x="834" y="202">worker 4</text>
  <rect class="mem" x="680" y="285" width="280" height="80"/>
  <text class="small" x="745" y="319">本地内存 / 本地 batch</text>
  <text class="small" x="735" y="344">访问延迟低，带宽高</text>

  <rect class="bar" x="190" y="470" width="720" height="80"/>
  <text class="text" x="308" y="505">PostgreSQL Parallel Hash 阶段同步</text>
  <text class="small" x="245" y="532">ALLOCATE -> HASH INNER -> HASH OUTER -> RUN -> FREE；增长 batch/bucket 也需 barrier 协调</text>

  <path class="arrow" d="M175 225 V285"/>
  <path class="arrow" d="M335 225 V285"/>
  <path class="arrow" d="M705 225 V285"/>
  <path class="arrow" d="M865 225 V285"/>
  <path class="remote" d="M400 195 C520 120 650 120 705 165"/>
  <path class="remote" d="M705 365 C580 455 390 455 290 365"/>
  <path class="arrow" d="M500 510 H190"/>
  <path class="arrow" d="M600 510 H910"/>
</svg>
