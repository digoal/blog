<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid Hash Join 总览</title>
  <desc id="desc">展示 PostgreSQL on-disk hash join 如何把 inner 和 outer 按 batch 分区，当前 batch 留在内存，未来 batch 写入临时文件。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:8}
    .soft{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
    .mem{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:8}
    .disk{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
    .label{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#334155}
    .tiny{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="34" y="32" width="1012" height="556" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <text x="540" y="72" text-anchor="middle" class="label">On-Disk Hash Join = Hybrid Hash Join：内存当前批 + 磁盘未来批</text>

  <rect x="74" y="126" width="200" height="110" class="soft"/>
  <text x="174" y="166" text-anchor="middle" class="label">Inner / Build</text>
  <text x="174" y="197" text-anchor="middle" class="small">Hash 节点读取</text>
  <text x="174" y="222" text-anchor="middle" class="small">计算 hashvalue</text>

  <rect x="438" y="108" width="220" height="146" class="mem"/>
  <text x="548" y="148" text-anchor="middle" class="label">Batch 0</text>
  <text x="548" y="181" text-anchor="middle" class="small">bucket 指针数组</text>
  <text x="548" y="207" text-anchor="middle" class="small">HashJoinTuple 链表</text>
  <text x="548" y="232" text-anchor="middle" class="tiny">当前批保留在 batchCxt</text>

  <rect x="438" y="318" width="220" height="150" class="disk"/>
  <text x="548" y="356" text-anchor="middle" class="label">Batch 1..N</text>
  <text x="548" y="389" text-anchor="middle" class="small">innerBatchFile[i]</text>
  <text x="548" y="416" text-anchor="middle" class="small">outerBatchFile[i]</text>
  <text x="548" y="443" text-anchor="middle" class="tiny">BufFile 临时文件</text>

  <rect x="804" y="126" width="200" height="110" class="soft"/>
  <text x="904" y="166" text-anchor="middle" class="label">Outer / Probe</text>
  <text x="904" y="197" text-anchor="middle" class="small">逐行计算 hash</text>
  <text x="904" y="222" text-anchor="middle" class="small">探测当前批</text>

  <rect x="804" y="318" width="200" height="150" class="box"/>
  <text x="904" y="356" text-anchor="middle" class="label">后续批循环</text>
  <text x="904" y="389" text-anchor="middle" class="small">加载 inner batch</text>
  <text x="904" y="416" text-anchor="middle" class="small">扫描 outer batch</text>
  <text x="904" y="443" text-anchor="middle" class="tiny">处理完即关闭文件</text>

  <path d="M274 181 C330 181 362 181 438 181" class="arrow"/>
  <path d="M274 215 C340 264 370 360 438 392" class="arrow"/>
  <path d="M804 181 C738 181 704 181 658 181" class="arrow"/>
  <path d="M904 236 C904 276 904 292 904 318" class="arrow"/>
  <path d="M658 393 C720 393 758 393 804 393" class="arrow"/>
  <path d="M548 254 C548 282 548 294 548 318" class="arrow"/>

  <text x="350" y="166" class="tiny">batchno = curbatch</text>
  <text x="324" y="330" class="tiny">batchno &gt; curbatch</text>
  <text x="690" y="166" class="tiny">匹配 bucket</text>
  <text x="678" y="378" class="tiny">按批重放</text>

  <rect x="96" y="505" width="888" height="42" fill="#e2e8f0" stroke="#94a3b8" rx="6"/>
  <text x="540" y="532" text-anchor="middle" class="small">核心约束：batch 数为 2 的幂；运行期增长只会把 tuple 推到更晚 batch，避免回到已处理批次。</text>
</svg>
