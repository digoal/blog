<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">Hash Join 内存上下文与临时文件</title>
  <desc id="desc">展示 HashTableContext、HashBatchContext、HashSpillContext 与 BufFile 临时文件之间的生命周期关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .root{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .ctx{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
    .batch{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:8}
    .spill{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
    .label{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#334155}
    .tiny{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="34" y="30" width="1012" height="580" fill="#ffffff" stroke="#cbd5e1" rx="12"/>
  <text x="540" y="70" text-anchor="middle" class="label">内存不只是 hash table：spill 文件缓冲也会吃内存</text>

  <rect x="88" y="120" width="260" height="120" class="root"/>
  <text x="218" y="158" text-anchor="middle" class="label">Per-query context</text>
  <text x="218" y="192" text-anchor="middle" class="small">语句结束统一回收</text>
  <text x="218" y="219" text-anchor="middle" class="tiny">错误退出也能清理</text>

  <rect x="410" y="104" width="260" height="150" class="ctx"/>
  <text x="540" y="144" text-anchor="middle" class="label">HashTableContext</text>
  <text x="540" y="178" text-anchor="middle" class="small">HashJoinTable 元数据</text>
  <text x="540" y="205" text-anchor="middle" class="small">文件数组、控制块</text>
  <text x="540" y="232" text-anchor="middle" class="tiny">整个 join 生命周期</text>

  <rect x="190" y="344" width="260" height="150" class="batch"/>
  <text x="320" y="384" text-anchor="middle" class="label">HashBatchContext</text>
  <text x="320" y="418" text-anchor="middle" class="small">当前 batch 的 buckets</text>
  <text x="320" y="445" text-anchor="middle" class="small">HashMemoryChunk</text>
  <text x="320" y="472" text-anchor="middle" class="tiny">每切换 batch 可 reset</text>

  <rect x="630" y="344" width="260" height="150" class="spill"/>
  <text x="760" y="384" text-anchor="middle" class="label">HashSpillContext</text>
  <text x="760" y="418" text-anchor="middle" class="small">BufFile 指针与缓冲</text>
  <text x="760" y="445" text-anchor="middle" class="small">inner/outer batch files</text>
  <text x="760" y="472" text-anchor="middle" class="tiny">跨 batch 存活</text>

  <path d="M348 180 L410 180" class="arrow"/>
  <path d="M500 254 C455 292 395 320 346 344" class="arrow"/>
  <path d="M580 254 C625 292 688 320 734 344" class="arrow"/>

  <rect x="118" y="538" width="844" height="40" fill="#e2e8f0" stroke="#94a3b8" rx="6"/>
  <text x="540" y="564" text-anchor="middle" class="small">调参含义：`work_mem * hash_mem_multiplier` 限制 hash 类操作，但多 batch 的文件缓冲、并发节点和 worker 都要一起算。</text>
</svg>
