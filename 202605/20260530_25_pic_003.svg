<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-labelledby="title desc">
  <title id="title">运行期 batch 增长与重分区</title>
  <desc id="desc">展示当 PostgreSQL hash join 内存超过预算时，nbatch 翻倍并把不再属于当前批的 tuple 写入未来批文件。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:8}
    .warn{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:8}
    .mem{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:8}
    .disk{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
    .label{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#334155}
    .tiny{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="34" y="32" width="1012" height="596" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <text x="540" y="72" text-anchor="middle" class="label">串行 Hash Join 的“损害控制”：超内存后 batch 翻倍</text>

  <rect x="80" y="126" width="230" height="120" class="mem"/>
  <text x="195" y="164" text-anchor="middle" class="label">插入当前批</text>
  <text x="195" y="196" text-anchor="middle" class="small">spaceUsed 增加</text>
  <text x="195" y="222" text-anchor="middle" class="small">bucket 链表变长</text>

  <rect x="425" y="126" width="230" height="120" class="warn"/>
  <text x="540" y="164" text-anchor="middle" class="label">超过预算</text>
  <text x="540" y="196" text-anchor="middle" class="small">spaceUsed + bucket_bytes</text>
  <text x="540" y="222" text-anchor="middle" class="small">&gt; spaceAllowed</text>

  <rect x="770" y="126" width="230" height="120" class="box"/>
  <text x="885" y="164" text-anchor="middle" class="label">选择动作</text>
  <text x="885" y="196" text-anchor="middle" class="small">扩大 spaceAllowed</text>
  <text x="885" y="222" text-anchor="middle" class="small">或 nbatch x 2</text>

  <path d="M310 186 L425 186" class="arrow"/>
  <path d="M655 186 L770 186" class="arrow"/>

  <rect x="120" y="342" width="210" height="132" class="box"/>
  <text x="225" y="378" text-anchor="middle" class="label">扫描旧 chunks</text>
  <text x="225" y="411" text-anchor="middle" class="small">重新计算 batchno</text>
  <text x="225" y="438" text-anchor="middle" class="small">清空 bucket 数组</text>

  <rect x="438" y="324" width="210" height="168" class="mem"/>
  <text x="543" y="362" text-anchor="middle" class="label">仍属当前批</text>
  <text x="543" y="396" text-anchor="middle" class="small">复制到新 chunk</text>
  <text x="543" y="423" text-anchor="middle" class="small">重新挂 bucket</text>
  <text x="543" y="450" text-anchor="middle" class="tiny">继续留内存</text>

  <rect x="760" y="324" width="210" height="168" class="disk"/>
  <text x="865" y="362" text-anchor="middle" class="label">属于未来批</text>
  <text x="865" y="396" text-anchor="middle" class="small">写 innerBatchFile</text>
  <text x="865" y="423" text-anchor="middle" class="small">释放内存空间</text>
  <text x="865" y="450" text-anchor="middle" class="tiny">稍后按批加载</text>

  <path d="M885 246 C820 286 725 314 648 366" class="arrow"/>
  <path d="M885 246 C900 282 898 302 874 324" class="arrow"/>
  <path d="M330 408 L438 408" class="arrow"/>
  <path d="M648 408 L760 408" class="arrow"/>

  <rect x="108" y="540" width="864" height="54" fill="#e2e8f0" stroke="#94a3b8" rx="6"/>
  <text x="540" y="563" text-anchor="middle" class="small">增长停止条件：若翻倍后某个 batch 保留全部或没有保留 tuple，说明 hash 分布/热点极端，继续拆批无效。</text>
  <text x="540" y="587" text-anchor="middle" class="tiny">此后执行器允许相关 batch 超过预算，这是 PostgreSQL 注释里说的 best effort。</text>
</svg>
