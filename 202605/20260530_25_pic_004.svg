<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Hash Join 的批次协作</title>
  <desc id="desc">展示 PostgreSQL Parallel Hash Join 使用 build barrier、batch barrier 和 shared tuplestore 协调多个 worker。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .worker{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
    .shared{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:8}
    .phase{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
    .label{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#334155}
    .tiny{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="34" y="30" width="1012" height="590" fill="#f8fafc" stroke="#cbd5e1" rx="12"/>
  <text x="540" y="70" text-anchor="middle" class="label">Parallel Hash Join：先共同分区，再按 batch 并行 probe</text>

  <rect x="76" y="120" width="150" height="76" class="worker"/>
  <text x="151" y="153" text-anchor="middle" class="small">Worker 1</text>
  <text x="151" y="178" text-anchor="middle" class="tiny">hash inner</text>
  <rect x="76" y="224" width="150" height="76" class="worker"/>
  <text x="151" y="257" text-anchor="middle" class="small">Worker 2</text>
  <text x="151" y="282" text-anchor="middle" class="tiny">hash inner</text>
  <rect x="76" y="328" width="150" height="76" class="worker"/>
  <text x="151" y="361" text-anchor="middle" class="small">Worker N</text>
  <text x="151" y="386" text-anchor="middle" class="tiny">hash inner</text>

  <rect x="360" y="122" width="300" height="128" class="phase"/>
  <text x="510" y="158" text-anchor="middle" class="label">Build Barrier</text>
  <text x="510" y="190" text-anchor="middle" class="small">ALLOCATE → HASH_INNER</text>
  <text x="510" y="217" text-anchor="middle" class="small">必要时 GROW_BATCHES</text>

  <rect x="360" y="320" width="300" height="168" class="shared"/>
  <text x="510" y="358" text-anchor="middle" class="label">Shared Batches</text>
  <text x="510" y="392" text-anchor="middle" class="small">ParallelHashJoinBatch[i]</text>
  <text x="510" y="419" text-anchor="middle" class="small">inner shared tuplestore</text>
  <text x="510" y="446" text-anchor="middle" class="small">outer shared tuplestore</text>
  <text x="510" y="472" text-anchor="middle" class="tiny">SharedFileSet 管理临时文件</text>

  <rect x="792" y="122" width="210" height="128" class="phase"/>
  <text x="897" y="158" text-anchor="middle" class="label">HASH_OUTER</text>
  <text x="897" y="190" text-anchor="middle" class="small">多 batch 时</text>
  <text x="897" y="217" text-anchor="middle" class="small">outer 也预分区</text>

  <rect x="792" y="320" width="210" height="168" class="phase"/>
  <text x="897" y="358" text-anchor="middle" class="label">Batch Barrier</text>
  <text x="897" y="392" text-anchor="middle" class="small">ALLOCATE → LOAD</text>
  <text x="897" y="419" text-anchor="middle" class="small">PROBE → SCAN</text>
  <text x="897" y="446" text-anchor="middle" class="small">FREE</text>
  <text x="897" y="472" text-anchor="middle" class="tiny">worker 抢 batch 执行</text>

  <path d="M226 158 L360 174" class="arrow"/>
  <path d="M226 262 L360 192" class="arrow"/>
  <path d="M226 366 L360 216" class="arrow"/>
  <path d="M510 250 L510 320" class="arrow"/>
  <path d="M660 186 L792 186" class="arrow"/>
  <path d="M792 404 L660 404" class="arrow"/>
  <path d="M897 250 L897 320" class="arrow"/>

  <rect x="112" y="542" width="856" height="48" fill="#e2e8f0" stroke="#94a3b8" rx="6"/>
  <text x="540" y="564" text-anchor="middle" class="small">串行算法可以边扫边把 tuple 推向未来批；Parallel Hash 为了批次可独立处理，多 batch 时先把 outer 也分区。</text>
  <text x="540" y="587" text-anchor="middle" class="tiny">共享表减少重复 build，但同步、共享内存访问和临时文件协调会成为新成本。</text>
</svg>
