<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-labelledby="title desc">
  <title id="title">On-Disk Hash Join 诊断路径</title>
  <desc id="desc">展示 DBA 如何通过 EXPLAIN、临时文件日志、统计信息和内存参数判断 Hash Join 是否发生落盘及其原因。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .check{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
    .bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:8}
    .good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:8}
    .act{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
    .label{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#0f172a}
    .small{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:17px;fill:#334155}
    .tiny{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="34" y="30" width="1012" height="590" fill="#ffffff" stroke="#cbd5e1" rx="12"/>
  <text x="540" y="70" text-anchor="middle" class="label">从 EXPLAIN 识别 On-Disk Hash Join</text>

  <rect x="92" y="120" width="244" height="118" class="check"/>
  <text x="214" y="158" text-anchor="middle" class="label">看 Hash 节点</text>
  <text x="214" y="191" text-anchor="middle" class="small">Buckets / Batches</text>
  <text x="214" y="218" text-anchor="middle" class="small">Memory Usage</text>

  <rect x="418" y="120" width="244" height="118" class="bad"/>
  <text x="540" y="158" text-anchor="middle" class="label">Batches &gt; 1</text>
  <text x="540" y="191" text-anchor="middle" class="small">发生多批执行</text>
  <text x="540" y="218" text-anchor="middle" class="small">通常意味着临时 I/O</text>

  <rect x="744" y="120" width="244" height="118" class="bad"/>
  <text x="866" y="158" text-anchor="middle" class="label">originally 变大</text>
  <text x="866" y="191" text-anchor="middle" class="small">运行期估算不足</text>
  <text x="866" y="218" text-anchor="middle" class="small">batch 或 bucket 增长</text>

  <path d="M336 179 L418 179" class="arrow"/>
  <path d="M662 179 L744 179" class="arrow"/>

  <rect x="92" y="344" width="244" height="136" class="act"/>
  <text x="214" y="382" text-anchor="middle" class="label">查临时文件</text>
  <text x="214" y="416" text-anchor="middle" class="small">log_temp_files</text>
  <text x="214" y="443" text-anchor="middle" class="small">temp_tablespaces</text>
  <text x="214" y="470" text-anchor="middle" class="tiny">定位 I/O 压力</text>

  <rect x="418" y="344" width="244" height="136" class="act"/>
  <text x="540" y="382" text-anchor="middle" class="label">查估算误差</text>
  <text x="540" y="416" text-anchor="middle" class="small">ANALYZE / MCV</text>
  <text x="540" y="443" text-anchor="middle" class="small">ndistinct / row width</text>
  <text x="540" y="470" text-anchor="middle" class="tiny">看 build 侧是否低估</text>

  <rect x="744" y="344" width="244" height="136" class="good"/>
  <text x="866" y="382" text-anchor="middle" class="label">选择处置</text>
  <text x="866" y="416" text-anchor="middle" class="small">调内存或改计划</text>
  <text x="866" y="443" text-anchor="middle" class="small">降并发或换 join</text>
  <text x="866" y="470" text-anchor="middle" class="tiny">先验证后上线</text>

  <path d="M214 238 L214 344" class="arrow"/>
  <path d="M540 238 L540 344" class="arrow"/>
  <path d="M866 238 L866 344" class="arrow"/>
  <path d="M336 412 L418 412" class="arrow"/>
  <path d="M662 412 L744 412" class="arrow"/>

  <rect x="118" y="542" width="844" height="42" fill="#e2e8f0" stroke="#94a3b8" rx="6"/>
  <text x="540" y="569" text-anchor="middle" class="small">原则：不要只把 work_mem 调大。Hash 节点数量 × 并发数 × worker 数，才是内存风险。</text>
</svg>
