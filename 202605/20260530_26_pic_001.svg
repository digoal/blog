<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Hash Join 总览</title>
  <desc id="desc">多个 PostgreSQL worker 协作构建共享 hash table，再并行探测 outer 输入。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .worker { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; rx: 6; }
      .shared { fill: #ecfdf5; stroke: #059669; stroke-width: 1.6; rx: 8; }
      .spill { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 6; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 18px; }
      .small { font-size: 15px; fill: #334155; }
      .label { font-size: 16px; font-weight: 600; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="640"/>
  <text class="text label" x="40" y="48">Parallel Hash Join: 共享 build，协作 probe</text>

  <rect class="panel" x="40" y="84" width="300" height="472"/>
  <text class="text label" x="66" y="122">Inner / build 输入</text>
  <rect class="worker" x="72" y="158" width="220" height="58"/>
  <text class="text small" x="92" y="193">Worker 1 扫描一部分 inner</text>
  <rect class="worker" x="72" y="236" width="220" height="58"/>
  <text class="text small" x="92" y="271">Worker 2 扫描一部分 inner</text>
  <rect class="worker" x="72" y="314" width="220" height="58"/>
  <text class="text small" x="92" y="349">Leader 也可参与 build</text>
  <text class="text small" x="68" y="426">每行计算 hash value</text>
  <text class="text small" x="68" y="456">插入 DSA 中的共享 tuple chunk</text>
  <text class="text small" x="68" y="486">必要时触发 bucket 或 batch 增长</text>

  <rect class="shared" x="420" y="112" width="280" height="396"/>
  <text class="text label" x="455" y="150">共享 HashJoinTable</text>
  <rect x="460" y="190" width="205" height="46" fill="#d1fae5" stroke="#059669" rx="5"/>
  <text class="text small" x="485" y="219">bucket 指针数组</text>
  <rect x="460" y="262" width="205" height="46" fill="#d1fae5" stroke="#059669" rx="5"/>
  <text class="text small" x="488" y="291">HashMemoryChunk</text>
  <rect x="460" y="334" width="205" height="46" fill="#d1fae5" stroke="#059669" rx="5"/>
  <text class="text small" x="488" y="363">ParallelHashJoinState</text>
  <rect x="460" y="406" width="205" height="46" fill="#d1fae5" stroke="#059669" rx="5"/>
  <text class="text small" x="500" y="435">barrier + locks</text>

  <rect class="panel" x="780" y="84" width="300" height="472"/>
  <text class="text label" x="810" y="122">Outer / probe 输入</text>
  <rect class="worker" x="820" y="158" width="220" height="58"/>
  <text class="text small" x="840" y="193">Worker 1 探测 bucket</text>
  <rect class="worker" x="820" y="236" width="220" height="58"/>
  <text class="text small" x="840" y="271">Worker 2 探测 bucket</text>
  <rect class="worker" x="820" y="314" width="220" height="58"/>
  <text class="text small" x="840" y="349">多 batch 时领取 batch</text>
  <text class="text small" x="816" y="426">匹配 hash value 后再执行 join qual</text>
  <text class="text small" x="816" y="456">可并行处理不同 batch</text>
  <text class="text small" x="816" y="486">right/full join 还要扫描未匹配 inner</text>

  <rect class="spill" x="420" y="540" width="280" height="62"/>
  <text class="text small" x="452" y="576">多 batch: SharedTuplestore + SharedFileSet</text>

  <path class="arrow" d="M292 186 C338 184, 368 176, 420 214"/>
  <path class="arrow" d="M292 266 C338 266, 368 266, 420 286"/>
  <path class="arrow" d="M292 346 C338 350, 370 360, 420 360"/>
  <path class="arrow" d="M700 214 C742 208, 768 194, 820 186"/>
  <path class="arrow" d="M700 286 C742 280, 768 266, 820 266"/>
  <path class="arrow" d="M700 360 C742 354, 768 344, 820 344"/>
  <path class="arrow dash" d="M560 508 L560 540"/>
  <text class="text small" x="372" y="78">build 阶段同步</text>
  <text class="text small" x="720" y="78">probe 阶段并行</text>
</svg>
