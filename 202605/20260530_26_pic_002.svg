<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">共享哈希表内存布局</title>
  <desc id="desc">Parallel Hash Join 使用 DSM/DSA 保存共享状态、bucket 数组、tuple chunk 和 shared tuplestore。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .dsm { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
      .dsa { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
      .local { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; rx: 6; }
      .spill { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 6; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 17px; }
      .small { font-size: 14px; fill: #334155; }
      .label { font-size: 17px; font-weight: 600; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="660"/>
  <text class="text label" x="40" y="48">Parallel Hash 的共享与私有状态</text>

  <rect class="local" x="40" y="90" width="270" height="500"/>
  <text class="text label" x="72" y="128">每个参与者私有</text>
  <rect class="box" x="72" y="168" width="206" height="54"/>
  <text class="text small" x="96" y="201">HashJoinState</text>
  <rect class="box" x="72" y="248" width="206" height="54"/>
  <text class="text small" x="94" y="281">HashJoinTable 指针</text>
  <rect class="box" x="72" y="328" width="206" height="54"/>
  <text class="text small" x="96" y="361">当前 batch accessor</text>
  <rect class="box" x="72" y="408" width="206" height="54"/>
  <text class="text small" x="100" y="441">局部 null tuplestore</text>
  <text class="text small" x="70" y="516">私有状态负责执行进度、slot、</text>
  <text class="text small" x="70" y="542">表达式上下文和本 worker 的计数。</text>

  <rect class="dsm" x="388" y="90" width="300" height="500"/>
  <text class="text label" x="430" y="128">DSM 共享控制面</text>
  <rect class="box" x="426" y="168" width="224" height="54"/>
  <text class="text small" x="454" y="201">ParallelHashJoinState</text>
  <rect class="box" x="426" y="248" width="224" height="54"/>
  <text class="text small" x="466" y="281">build_barrier</text>
  <rect class="box" x="426" y="328" width="224" height="54"/>
  <text class="text small" x="448" y="361">grow barriers + lock</text>
  <rect class="box" x="426" y="408" width="224" height="54"/>
  <text class="text small" x="454" y="441">batch barriers</text>
  <text class="text small" x="420" y="516">控制谁来 allocate、谁来 repartition、</text>
  <text class="text small" x="420" y="542">什么时候 build 完成并进入 probe。</text>

  <rect class="dsa" x="780" y="90" width="300" height="500"/>
  <text class="text label" x="826" y="128">DSA 共享数据面</text>
  <rect class="box" x="818" y="168" width="224" height="54"/>
  <text class="text small" x="848" y="201">bucket 指针数组</text>
  <rect class="box" x="818" y="248" width="224" height="54"/>
  <text class="text small" x="846" y="281">tuple chunks</text>
  <rect class="box" x="818" y="328" width="224" height="54"/>
  <text class="text small" x="844" y="361">ParallelHashJoinBatch</text>
  <rect class="spill" x="818" y="408" width="224" height="54"/>
  <text class="text small" x="844" y="441">SharedTuplestore</text>
  <text class="text small" x="812" y="516">真实 tuple 和 batch 临时数据在这里，</text>
  <text class="text small" x="812" y="542">worker 通过 dsa_pointer 访问。</text>

  <path class="arrow" d="M278 274 C330 274, 350 195, 426 195"/>
  <path class="arrow" d="M650 195 C720 194, 750 194, 818 195"/>
  <path class="arrow" d="M650 435 C720 436, 750 436, 818 436"/>
  <path class="arrow" d="M278 355 C500 620, 730 624, 930 462"/>
  <text class="text small" x="330" y="250">attach</text>
  <text class="text small" x="694" y="178">指向共享数据</text>
  <text class="text small" x="594" y="628">每个 worker 保留 accessor，避免所有操作都抢全局锁</text>
</svg>
