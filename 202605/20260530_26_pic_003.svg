<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Hash Join barrier 状态机</title>
  <desc id="desc">构建 barrier、增长 barrier 和 batch barrier 的主要阶段。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .phase { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; rx: 8; }
      .single { fill: #fef3c7; stroke: #d97706; stroke-width: 1.4; rx: 8; }
      .all { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.4; rx: 8; }
      .batch { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.4; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 16px; }
      .small { font-size: 13px; fill: #334155; }
      .label { font-size: 18px; font-weight: 600; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="720"/>
  <text class="text label" x="40" y="48">Barrier 把“多进程并发”变成“阶段化协作”</text>

  <text class="text label" x="60" y="104">Build barrier</text>
  <rect class="phase" x="60" y="130" width="150" height="58"/>
  <text class="text small" x="86" y="164">PHJ_BUILD_ELECT</text>
  <rect class="single" x="250" y="130" width="170" height="58"/>
  <text class="text small" x="274" y="164">ALLOCATE*</text>
  <rect class="all" x="460" y="130" width="180" height="58"/>
  <text class="text small" x="486" y="164">HASH_INNER</text>
  <rect class="all" x="680" y="130" width="180" height="58"/>
  <text class="text small" x="706" y="164">HASH_OUTER</text>
  <rect class="batch" x="900" y="130" width="150" height="58"/>
  <text class="text small" x="942" y="164">RUN</text>
  <path class="arrow" d="M210 159 L250 159"/>
  <path class="arrow" d="M420 159 L460 159"/>
  <path class="arrow" d="M640 159 L680 159"/>
  <path class="arrow" d="M860 159 L900 159"/>
  <text class="text small" x="694" y="210">只有多 batch 才需要预先分区 outer</text>

  <text class="text label" x="60" y="286">Growth barriers during HASH_INNER</text>
  <rect class="phase" x="60" y="312" width="160" height="58"/>
  <text class="text small" x="84" y="346">GROW_ELECT</text>
  <rect class="single" x="260" y="312" width="180" height="58"/>
  <text class="text small" x="284" y="346">REALLOCATE*</text>
  <rect class="all" x="480" y="312" width="180" height="58"/>
  <text class="text small" x="510" y="346">REPARTITION</text>
  <rect class="single" x="700" y="312" width="160" height="58"/>
  <text class="text small" x="724" y="346">DECIDE*</text>
  <rect class="phase" x="900" y="312" width="150" height="58"/>
  <text class="text small" x="936" y="346">FINISH</text>
  <path class="arrow" d="M220 341 L260 341"/>
  <path class="arrow" d="M440 341 L480 341"/>
  <path class="arrow" d="M660 341 L700 341"/>
  <path class="arrow" d="M860 341 L900 341"/>
  <path class="arrow dash" d="M974 370 C974 420, 140 420, 140 370"/>
  <text class="text small" x="328" y="444">bucket 增长类似：ELECT -> REALLOCATE* -> REINSERT</text>

  <text class="text label" x="60" y="520">Per-batch barrier</text>
  <rect class="phase" x="60" y="546" width="140" height="58"/>
  <text class="text small" x="94" y="580">ELECT</text>
  <rect class="single" x="240" y="546" width="150" height="58"/>
  <text class="text small" x="272" y="580">ALLOCATE*</text>
  <rect class="all" x="430" y="546" width="140" height="58"/>
  <text class="text small" x="480" y="580">LOAD</text>
  <rect class="batch" x="610" y="546" width="140" height="58"/>
  <text class="text small" x="660" y="580">PROBE</text>
  <rect class="single" x="790" y="546" width="140" height="58"/>
  <text class="text small" x="838" y="580">SCAN*</text>
  <rect class="single" x="970" y="546" width="140" height="58"/>
  <text class="text small" x="1018" y="580">FREE*</text>
  <path class="arrow" d="M200 575 L240 575"/>
  <path class="arrow" d="M390 575 L430 575"/>
  <path class="arrow" d="M570 575 L610 575"/>
  <path class="arrow" d="M750 575 L790 575"/>
  <path class="arrow" d="M930 575 L970 575"/>

  <text class="text small" x="58" y="662">黄色阶段由一个参与者完成；绿色阶段所有参与者协作；蓝色阶段可以产出 join 结果。</text>
</svg>
