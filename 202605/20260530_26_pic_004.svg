<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">parallel-oblivious 与 parallel-aware hash join 对比</title>
  <desc id="desc">每个 worker 私有建表与多个 worker 共享建表的资源差异。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .private { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.4; rx: 6; }
      .shared { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.4; rx: 6; }
      .worker { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.2; rx: 6; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 17px; }
      .small { font-size: 14px; fill: #334155; }
      .label { font-size: 18px; font-weight: 600; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text label" x="40" y="48">两种并行 hash join 形态：复制建表 vs 共享建表</text>

  <rect class="panel" x="50" y="90" width="480" height="450"/>
  <text class="text label" x="88" y="132">Parallel-oblivious Hash Join</text>
  <rect class="worker" x="90" y="170" width="130" height="52"/>
  <text class="text small" x="120" y="201">Worker 1</text>
  <rect class="private" x="270" y="170" width="180" height="52"/>
  <text class="text small" x="310" y="201">私有 hash table</text>
  <rect class="worker" x="90" y="260" width="130" height="52"/>
  <text class="text small" x="120" y="291">Worker 2</text>
  <rect class="private" x="270" y="260" width="180" height="52"/>
  <text class="text small" x="310" y="291">私有 hash table</text>
  <rect class="worker" x="90" y="350" width="130" height="52"/>
  <text class="text small" x="124" y="381">Leader</text>
  <rect class="private" x="270" y="350" width="180" height="52"/>
  <text class="text small" x="310" y="381">私有 hash table</text>
  <path class="arrow" d="M220 196 L270 196"/>
  <path class="arrow" d="M220 286 L270 286"/>
  <path class="arrow" d="M220 376 L270 376"/>
  <text class="text small" x="92" y="466">优点：同步少，逻辑简单。</text>
  <text class="text small" x="92" y="496">代价：build 输入、CPU、内存按参与者重复。</text>

  <rect class="panel" x="590" y="90" width="480" height="450"/>
  <text class="text label" x="628" y="132">Parallel-aware Hash Join</text>
  <rect class="worker" x="626" y="170" width="130" height="52"/>
  <text class="text small" x="656" y="201">Worker 1</text>
  <rect class="worker" x="626" y="260" width="130" height="52"/>
  <text class="text small" x="656" y="291">Worker 2</text>
  <rect class="worker" x="626" y="350" width="130" height="52"/>
  <text class="text small" x="660" y="381">Leader</text>
  <rect class="shared" x="836" y="220" width="180" height="112"/>
  <text class="text small" x="870" y="262">共享 hash table</text>
  <text class="text small" x="874" y="294">Parallel Hash</text>
  <path class="arrow" d="M756 196 C796 202, 812 226, 836 246"/>
  <path class="arrow" d="M756 286 L836 286"/>
  <path class="arrow" d="M756 376 C796 370, 812 330, 836 316"/>
  <text class="text small" x="632" y="466">优点：build 侧不重复，batch 可协同处理。</text>
  <text class="text small" x="632" y="496">代价：barrier、锁、共享内存和临时文件协调。</text>
</svg>
