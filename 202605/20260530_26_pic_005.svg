<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Hash Join 诊断流程</title>
  <desc id="desc">从 EXPLAIN、配置、统计信息和临时文件日志诊断 Parallel Hash Join 性能问题。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .step { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; rx: 8; }
      .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 1.4; rx: 8; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 8; }
      .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.4; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 16px; }
      .small { font-size: 14px; fill: #334155; }
      .label { font-size: 18px; font-weight: 600; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="700"/>
  <text class="text label" x="40" y="48">Parallel Hash Join 诊断路径</text>

  <rect class="step" x="430" y="82" width="260" height="70"/>
  <text class="text small" x="460" y="112">EXPLAIN (ANALYZE, BUFFERS)</text>
  <text class="text small" x="488" y="136">是否看到 Parallel Hash?</text>

  <rect class="ok" x="90" y="210" width="280" height="88"/>
  <text class="text small" x="126" y="242">没有 Parallel Hash</text>
  <text class="text small" x="126" y="268">检查 max_parallel_workers_per_gather、</text>
  <text class="text small" x="126" y="290">enable_parallel_hash、并行安全性</text>

  <rect class="step" x="430" y="210" width="260" height="88"/>
  <text class="text small" x="466" y="246">Buckets / Batches / Memory</text>
  <text class="text small" x="496" y="272">actual 是否偏离 originally?</text>

  <rect class="warn" x="760" y="210" width="280" height="88"/>
  <text class="text small" x="796" y="242">Batches 大于 1 或运行期增长</text>
  <text class="text small" x="796" y="268">先怀疑估算、行宽、内存、倾斜</text>

  <rect class="step" x="430" y="360" width="260" height="88"/>
  <text class="text small" x="470" y="394">查看临时文件与 I/O</text>
  <text class="text small" x="478" y="420">log_temp_files / temp read write</text>

  <rect class="bad" x="90" y="500" width="280" height="104"/>
  <text class="text small" x="126" y="532">热点 key 或单个 MCV 过大</text>
  <text class="text small" x="126" y="558">增加 batch 不能拆开相同 hash value</text>
  <text class="text small" x="126" y="584">考虑预聚合、拆热点、改模型</text>

  <rect class="warn" x="430" y="500" width="280" height="104"/>
  <text class="text small" x="466" y="532">只是内存不足或估算偏小</text>
  <text class="text small" x="466" y="558">ANALYZE / 调 work_mem 与 multiplier</text>
  <text class="text small" x="466" y="584">控制并发与 worker 数</text>

  <rect class="ok" x="770" y="500" width="280" height="104"/>
  <text class="text small" x="806" y="532">共享同步或 NUMA 成为瓶颈</text>
  <text class="text small" x="806" y="558">对比 enable_parallel_hash=off</text>
  <text class="text small" x="806" y="584">尝试降低并行度或分区本地化</text>

  <path class="arrow" d="M500 152 C380 180, 310 190, 230 210"/>
  <path class="arrow" d="M560 152 L560 210"/>
  <path class="arrow" d="M620 152 C736 180, 808 190, 900 210"/>
  <path class="arrow" d="M560 298 L560 360"/>
  <path class="arrow" d="M476 448 C390 480, 314 490, 230 500"/>
  <path class="arrow" d="M560 448 L560 500"/>
  <path class="arrow" d="M642 448 C730 480, 808 490, 910 500"/>
</svg>
