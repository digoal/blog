<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">快速排序的分治骨架</title>
  <desc id="desc">展示选择枢轴、三路分区、递归处理左右分区和小数组插入排序的流程。</desc>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .pivot{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:8}
    .less{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:8}
    .equal{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:8}
    .greater{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:20px;fill:#0f172a}
    .small{font-size:16px;fill:#334155}
    .arrow{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="70" y="45" width="840" height="70" class="box"/>
  <text x="490" y="75" text-anchor="middle" class="text">未排序数组：把全局排序问题拆成局部排序问题</text>
  <text x="490" y="100" text-anchor="middle" class="small">比较器定义顺序；算法只移动元素位置</text>

  <rect x="360" y="155" width="260" height="70" class="pivot"/>
  <text x="490" y="185" text-anchor="middle" class="text">选择枢轴 pivot</text>
  <text x="490" y="210" text-anchor="middle" class="small">工程实现要避免坏枢轴</text>
  <path d="M490 115 L490 155" class="arrow"/>

  <rect x="70" y="280" width="220" height="80" class="less"/>
  <text x="180" y="312" text-anchor="middle" class="text">&lt; pivot</text>
  <text x="180" y="338" text-anchor="middle" class="small">继续排序左分区</text>

  <rect x="380" y="280" width="220" height="80" class="equal"/>
  <text x="490" y="312" text-anchor="middle" class="text">= pivot</text>
  <text x="490" y="338" text-anchor="middle" class="small">一次归位，不再递归</text>

  <rect x="690" y="280" width="220" height="80" class="greater"/>
  <text x="800" y="312" text-anchor="middle" class="text">&gt; pivot</text>
  <text x="800" y="338" text-anchor="middle" class="small">继续排序右分区</text>

  <path d="M490 225 C390 245 260 245 180 280" class="arrow"/>
  <path d="M490 225 L490 280" class="arrow"/>
  <path d="M490 225 C590 245 720 245 800 280" class="arrow"/>

  <rect x="110" y="415" width="260" height="60" class="box"/>
  <text x="240" y="440" text-anchor="middle" class="text">小数组：插入排序</text>
  <text x="240" y="462" text-anchor="middle" class="small">常数小，缓存友好</text>
  <path d="M180 360 C180 390 215 395 240 415" class="arrow"/>

  <rect x="610" y="415" width="260" height="60" class="box"/>
  <text x="740" y="440" text-anchor="middle" class="text">大数组：继续分治</text>
  <text x="740" y="462" text-anchor="middle" class="small">平均 O(n log n)</text>
  <path d="M800 360 C800 390 765 395 740 415" class="arrow"/>
</svg>
