<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 的 quicksort 模板化生成</title>
  <desc id="desc">展示 sort_template.h 如何通过宏生成 pg_qsort、qsort_arg、qsort_interruptible、qsort_tuple 和 qsort_ssup。</desc>
  <style>
    .core{fill:#eef2ff;stroke:#4338ca;stroke-width:2;rx:8}
    .file{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .use{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-size:15px;fill:#334155}
    .arrow{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="345" y="35" width="350" height="95" class="core"/>
  <text x="520" y="70" text-anchor="middle" class="text">src/include/lib/sort_template.h</text>
  <text x="520" y="96" text-anchor="middle" class="small">同一套 Bentley-McIlroy 风格排序骨架</text>
  <text x="520" y="116" text-anchor="middle" class="small">由宏决定元素类型、比较器、是否可中断</text>

  <rect x="50" y="195" width="250" height="95" class="file"/>
  <text x="175" y="228" text-anchor="middle" class="text">src/port/qsort.c</text>
  <text x="175" y="254" text-anchor="middle" class="small">ST_SORT=pg_qsort</text>
  <text x="175" y="274" text-anchor="middle" class="small">传统 void* + element_size</text>

  <rect x="395" y="195" width="250" height="95" class="file"/>
  <text x="520" y="228" text-anchor="middle" class="text">src/port/qsort_arg.c</text>
  <text x="520" y="254" text-anchor="middle" class="small">ST_SORT=qsort_arg</text>
  <text x="520" y="274" text-anchor="middle" class="small">比较器带 void* 参数</text>

  <rect x="740" y="195" width="250" height="95" class="file"/>
  <text x="865" y="228" text-anchor="middle" class="text">qsort_interruptible.c</text>
  <text x="865" y="254" text-anchor="middle" class="small">ST_CHECK_FOR_INTERRUPTS</text>
  <text x="865" y="274" text-anchor="middle" class="small">长排序可响应取消</text>

  <path d="M430 130 C320 155 230 160 175 195" class="arrow"/>
  <path d="M520 130 L520 195" class="arrow"/>
  <path d="M610 130 C720 155 810 160 865 195" class="arrow"/>

  <rect x="185" y="395" width="300" height="95" class="use"/>
  <text x="335" y="428" text-anchor="middle" class="text">tuplesort.c: qsort_tuple</text>
  <text x="335" y="454" text-anchor="middle" class="small">SortTuple + comparetup</text>
  <text x="335" y="474" text-anchor="middle" class="small">多列、变体比较、可中断</text>

  <rect x="555" y="395" width="300" height="95" class="use"/>
  <text x="705" y="428" text-anchor="middle" class="text">tuplesort.c: qsort_ssup</text>
  <text x="705" y="454" text-anchor="middle" class="small">SortSupport + ApplySortComparator</text>
  <text x="705" y="474" text-anchor="middle" class="small">单 key Datum / MinimalTuple 快路径</text>

  <path d="M520 130 C455 240 390 315 335 395" class="arrow"/>
  <path d="M520 130 C585 240 650 315 705 395" class="arrow"/>
</svg>
