<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">tuplesort 状态机中的 quicksort 位置</title>
  <desc id="desc">展示 TSS_INITIAL、TSS_BOUNDED、TSS_BUILDRUNS、TSS_SORTEDINMEM、TSS_SORTEDONTAPE 和 TSS_FINALMERGE 的转换。</desc>
  <style>
    .state{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .hot{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:8}
    .disk{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:8}
    .done{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-size:15px;fill:#334155}
    .arrow{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .label{font-size:14px;fill:#475569}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="65" y="65" width="245" height="90" class="state"/>
  <text x="187" y="98" text-anchor="middle" class="text">TSS_INITIAL</text>
  <text x="187" y="124" text-anchor="middle" class="small">把输入追加到 memtuples[]</text>
  <text x="187" y="144" text-anchor="middle" class="small">尚未超过 work_mem</text>

  <rect x="420" y="65" width="245" height="90" class="hot"/>
  <text x="542" y="98" text-anchor="middle" class="text">TSS_BOUNDED</text>
  <text x="542" y="124" text-anchor="middle" class="small">LIMIT / top-N 堆</text>
  <text x="542" y="144" text-anchor="middle" class="small">保留最小 N 个候选</text>

  <rect x="770" y="65" width="245" height="90" class="disk"/>
  <text x="892" y="98" text-anchor="middle" class="text">TSS_BUILDRUNS</text>
  <text x="892" y="124" text-anchor="middle" class="small">超过 work_mem</text>
  <text x="892" y="144" text-anchor="middle" class="small">排序内存批次并写入 tape</text>

  <rect x="65" y="385" width="245" height="90" class="done"/>
  <text x="187" y="418" text-anchor="middle" class="text">TSS_SORTEDINMEM</text>
  <text x="187" y="444" text-anchor="middle" class="small">quicksort / radix 完成</text>
  <text x="187" y="464" text-anchor="middle" class="small">顺序扫描数组返回</text>

  <rect x="420" y="385" width="245" height="90" class="done"/>
  <text x="542" y="418" text-anchor="middle" class="text">TSS_SORTEDONTAPE</text>
  <text x="542" y="444" text-anchor="middle" class="small">最终 run 在逻辑 tape</text>
  <text x="542" y="464" text-anchor="middle" class="small">支持随机访问时冻结</text>

  <rect x="770" y="385" width="245" height="90" class="done"/>
  <text x="892" y="418" text-anchor="middle" class="text">TSS_FINALMERGE</text>
  <text x="892" y="444" text-anchor="middle" class="small">边取边做最终归并</text>
  <text x="892" y="464" text-anchor="middle" class="small">少一次写回/读回</text>

  <path d="M310 110 L420 110" class="arrow"/>
  <text x="365" y="94" text-anchor="middle" class="label">bounded 且足够多输入</text>

  <path d="M310 132 C500 220 700 200 825 155" class="arrow"/>
  <text x="580" y="218" text-anchor="middle" class="label">LACKMEM：切到外部排序</text>

  <path d="M187 155 L187 385" class="arrow"/>
  <text x="150" y="272" text-anchor="middle" class="label">performsort</text>
  <text x="150" y="292" text-anchor="middle" class="label">sort_memtuples()</text>

  <path d="M542 155 L542 385" class="arrow"/>
  <text x="500" y="272" text-anchor="middle" class="label">sort_bounded_heap()</text>

  <path d="M892 155 L892 385" class="arrow"/>
  <text x="845" y="265" text-anchor="middle" class="label">dumptuples()</text>
  <text x="845" y="285" text-anchor="middle" class="label">mergeruns()</text>

  <path d="M770 430 L665 430" class="arrow"/>
  <text x="718" y="414" text-anchor="middle" class="label">需要 materialized result</text>

  <rect x="285" y="245" width="510" height="58" class="hot"/>
  <text x="540" y="270" text-anchor="middle" class="text">quicksort 出现在两处</text>
  <text x="540" y="292" text-anchor="middle" class="small">内存排序直接完成；外部排序先把每个 run 排好再归并</text>
</svg>
