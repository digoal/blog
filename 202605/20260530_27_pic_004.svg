<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-labelledby="title desc">
  <title id="title">从 quicksort run 到 balanced k-way merge</title>
  <desc id="desc">展示 PostgreSQL 外部排序如何用 quicksort 或 radix sort 生成有序 run，再通过逻辑 tape 做多路归并。</desc>
  <style>
    .mem{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:8}
    .run{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:8}
    .merge{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:8}
    .out{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-size:15px;fill:#334155}
    .arrow{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="55" y="55" width="230" height="85" class="out"/>
  <text x="170" y="88" text-anchor="middle" class="text">执行器输入</text>
  <text x="170" y="114" text-anchor="middle" class="small">ExecSort 持续喂 tuple</text>

  <rect x="385" y="55" width="300" height="85" class="mem"/>
  <text x="535" y="88" text-anchor="middle" class="text">memtuples[] 批次</text>
  <text x="535" y="114" text-anchor="middle" class="small">受 work_mem 和数组容量约束</text>
  <path d="M285 98 L385 98" class="arrow"/>

  <rect x="795" y="55" width="230" height="85" class="mem"/>
  <text x="910" y="88" text-anchor="middle" class="text">sort_memtuples()</text>
  <text x="910" y="114" text-anchor="middle" class="small">quicksort 或 radix sort</text>
  <path d="M685 98 L795 98" class="arrow"/>

  <rect x="120" y="245" width="160" height="70" class="run"/>
  <text x="200" y="275" text-anchor="middle" class="text">run 1</text>
  <text x="200" y="298" text-anchor="middle" class="small">已排序</text>

  <rect x="330" y="245" width="160" height="70" class="run"/>
  <text x="410" y="275" text-anchor="middle" class="text">run 2</text>
  <text x="410" y="298" text-anchor="middle" class="small">已排序</text>

  <rect x="540" y="245" width="160" height="70" class="run"/>
  <text x="620" y="275" text-anchor="middle" class="text">run 3</text>
  <text x="620" y="298" text-anchor="middle" class="small">已排序</text>

  <rect x="750" y="245" width="160" height="70" class="run"/>
  <text x="830" y="275" text-anchor="middle" class="text">run M</text>
  <text x="830" y="298" text-anchor="middle" class="small">逻辑 tape</text>

  <path d="M910 140 C850 205 235 200 200 245" class="arrow"/>
  <path d="M910 140 C830 205 455 200 410 245" class="arrow"/>
  <path d="M910 140 C860 205 650 205 620 245" class="arrow"/>
  <path d="M910 140 L830 245" class="arrow"/>

  <rect x="330" y="405" width="420" height="85" class="merge"/>
  <text x="540" y="438" text-anchor="middle" class="text">balanced k-way merge</text>
  <text x="540" y="464" text-anchor="middle" class="small">每条输入 tape 取前端 tuple，堆中保留 M 个候选</text>
  <path d="M200 315 C260 365 365 380 435 405" class="arrow"/>
  <path d="M410 315 L455 405" class="arrow"/>
  <path d="M620 315 L605 405" class="arrow"/>
  <path d="M830 315 C780 365 720 380 655 405" class="arrow"/>

  <rect x="385" y="525" width="310" height="55" class="out"/>
  <text x="540" y="558" text-anchor="middle" class="text">有序输出流</text>
  <path d="M540 490 L540 525" class="arrow"/>
</svg>
