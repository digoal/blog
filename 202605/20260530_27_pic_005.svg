<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">数据库排序算法边界对比</title>
  <desc id="desc">对比 quicksort、introsort、dual-pivot quicksort、radix sort、top-N heapsort 和 external merge 在数据库中的适用边界。</desc>
  <style>
    .axis{stroke:#334155;stroke-width:2}
    .cell{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
    .q{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:8}
    .i{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;rx:8}
    .r{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:8}
    .h{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:8}
    .e{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:8}
    .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}
    .small{font-size:14px;fill:#334155}
    .label{font-size:16px;fill:#0f172a;font-weight:bold}
  </style>
  <line x1="90" y1="520" x2="980" y2="520" class="axis"/>
  <line x1="90" y1="520" x2="90" y2="70" class="axis"/>
  <text x="535" y="565" text-anchor="middle" class="label">数据规模 / 是否超出内存</text>
  <text x="25" y="300" transform="rotate(-90 25 300)" text-anchor="middle" class="label">比较成本 / key 表示复杂度</text>

  <rect x="140" y="370" width="210" height="85" class="q"/>
  <text x="245" y="402" text-anchor="middle" class="text">quicksort</text>
  <text x="245" y="428" text-anchor="middle" class="small">通用比较排序</text>
  <text x="245" y="448" text-anchor="middle" class="small">内存排序与 run 生成</text>

  <rect x="370" y="330" width="210" height="85" class="i"/>
  <text x="475" y="362" text-anchor="middle" class="text">introsort</text>
  <text x="475" y="388" text-anchor="middle" class="small">坏分区时切 heapsort</text>
  <text x="475" y="408" text-anchor="middle" class="small">给最坏 O(n log n) 兜底</text>

  <rect x="600" y="360" width="210" height="85" class="q"/>
  <text x="705" y="392" text-anchor="middle" class="text">dual-pivot quicksort</text>
  <text x="705" y="418" text-anchor="middle" class="small">双枢轴三段切分</text>
  <text x="705" y="438" text-anchor="middle" class="small">实现细节更敏感</text>

  <rect x="270" y="185" width="230" height="85" class="r"/>
  <text x="385" y="217" text-anchor="middle" class="text">radix sort</text>
  <text x="385" y="243" text-anchor="middle" class="small">pass-by-value / 整数化 key</text>
  <text x="385" y="263" text-anchor="middle" class="small">比较少，依赖表示</text>

  <rect x="560" y="185" width="230" height="85" class="h"/>
  <text x="675" y="217" text-anchor="middle" class="text">top-N heapsort</text>
  <text x="675" y="243" text-anchor="middle" class="small">ORDER BY ... LIMIT</text>
  <text x="675" y="263" text-anchor="middle" class="small">只保留 N 个候选</text>

  <rect x="735" y="75" width="230" height="85" class="e"/>
  <text x="850" y="107" text-anchor="middle" class="text">external merge</text>
  <text x="850" y="133" text-anchor="middle" class="small">数据超过 work_mem</text>
  <text x="850" y="153" text-anchor="middle" class="small">I/O 与 tape buffer 主导</text>
</svg>
