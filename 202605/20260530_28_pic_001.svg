<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">堆的数组表示与父子关系</title>
  <desc id="desc">展示二叉堆如何用数组保存，以及父节点和子节点之间的索引关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .node { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .root { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .slot { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; }
    .slotTop { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 16px; fill: #1e293b; }
    .line { stroke: #475569; stroke-width: 2; fill: none; }
    .formula { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="980" height="520"/>
  <rect class="panel" x="40" y="34" width="900" height="452" rx="8"/>
  <text class="text" x="70" y="76">最小堆：父节点不大于子节点，堆顶总是当前最小候选</text>

  <circle class="root" cx="490" cy="132" r="34"/>
  <text class="text" x="480" y="139">3</text>
  <text class="small" x="472" y="96">i=0</text>

  <line class="line" x1="466" y1="157" x2="360" y2="224"/>
  <line class="line" x1="514" y1="157" x2="620" y2="224"/>

  <circle class="node" cx="340" cy="250" r="32"/>
  <text class="text" x="330" y="257">8</text>
  <text class="small" x="322" y="213">i=1</text>
  <circle class="node" cx="640" cy="250" r="32"/>
  <text class="text" x="630" y="257">5</text>
  <text class="small" x="622" y="213">i=2</text>

  <line class="line" x1="322" y1="278" x2="250" y2="348"/>
  <line class="line" x1="358" y1="278" x2="430" y2="348"/>
  <line class="line" x1="622" y1="278" x2="550" y2="348"/>
  <line class="line" x1="658" y1="278" x2="730" y2="348"/>

  <circle class="node" cx="230" cy="374" r="30"/>
  <text class="text" x="215" y="381">17</text>
  <text class="small" x="214" y="338">i=3</text>
  <circle class="node" cx="450" cy="374" r="30"/>
  <text class="text" x="435" y="381">11</text>
  <text class="small" x="434" y="338">i=4</text>
  <circle class="node" cx="530" cy="374" r="30"/>
  <text class="text" x="515" y="381">12</text>
  <text class="small" x="514" y="338">i=5</text>
  <circle class="node" cx="750" cy="374" r="30"/>
  <text class="text" x="735" y="381">20</text>
  <text class="small" x="734" y="338">i=6</text>

  <g transform="translate(88 420)">
    <rect class="slotTop" x="0" y="0" width="82" height="42"/>
    <rect class="slot" x="82" y="0" width="82" height="42"/>
    <rect class="slot" x="164" y="0" width="82" height="42"/>
    <rect class="slot" x="246" y="0" width="82" height="42"/>
    <rect class="slot" x="328" y="0" width="82" height="42"/>
    <rect class="slot" x="410" y="0" width="82" height="42"/>
    <rect class="slot" x="492" y="0" width="82" height="42"/>
    <text class="small" x="34" y="-8">0</text>
    <text class="small" x="116" y="-8">1</text>
    <text class="small" x="198" y="-8">2</text>
    <text class="small" x="280" y="-8">3</text>
    <text class="small" x="362" y="-8">4</text>
    <text class="small" x="444" y="-8">5</text>
    <text class="small" x="526" y="-8">6</text>
    <text class="text" x="35" y="28">3</text>
    <text class="text" x="117" y="28">8</text>
    <text class="text" x="199" y="28">5</text>
    <text class="text" x="276" y="28">17</text>
    <text class="text" x="358" y="28">11</text>
    <text class="text" x="440" y="28">12</text>
    <text class="text" x="522" y="28">20</text>
  </g>

  <rect class="formula" x="710" y="417" width="188" height="52" rx="6"/>
  <text class="label" x="728" y="439">left = 2*i + 1</text>
  <text class="label" x="728" y="462">right = 2*i + 2</text>
</svg>
