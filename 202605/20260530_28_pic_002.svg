<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Top-N bounded heapsort 的执行路径</title>
  <desc id="desc">展示 PostgreSQL 在 ORDER BY LIMIT 场景中如何维护固定大小候选堆。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .input { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .heap { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .drop { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; }
    .out { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="text" x="46" y="52">`ORDER BY score DESC LIMIT N`：不必完整排序全部输入，先保留 N 个候选</text>

  <rect class="box" x="48" y="92" width="205" height="340"/>
  <text class="text" x="80" y="130">输入流</text>
  <text class="small" x="80" y="158">ExecSort 读取子计划</text>
  <g transform="translate(82 192)">
    <rect class="input" x="0" y="0" width="52" height="34" rx="5"/><text class="small" x="17" y="22">91</text>
    <rect class="input" x="64" y="0" width="52" height="34" rx="5"/><text class="small" x="81" y="22">74</text>
    <rect class="input" x="0" y="48" width="52" height="34" rx="5"/><text class="small" x="17" y="70">88</text>
    <rect class="input" x="64" y="48" width="52" height="34" rx="5"/><text class="small" x="81" y="70">12</text>
    <rect class="input" x="0" y="96" width="52" height="34" rx="5"/><text class="small" x="17" y="118">63</text>
    <rect class="input" x="64" y="96" width="52" height="34" rx="5"/><text class="small" x="81" y="118">97</text>
    <rect class="input" x="0" y="144" width="52" height="34" rx="5"/><text class="small" x="17" y="166">39</text>
    <rect class="input" x="64" y="144" width="52" height="34" rx="5"/><text class="small" x="81" y="166">82</text>
  </g>

  <path class="arrow" d="M 260 258 L 365 258"/>
  <rect class="box" x="382" y="92" width="300" height="340"/>
  <text class="text" x="420" y="130">固定大小堆</text>
  <text class="small" x="420" y="158">PostgreSQL 反转排序方向，堆顶放“最差候选”</text>
  <circle class="heap" cx="532" cy="226" r="32"/><text class="text" x="518" y="233">74</text>
  <line class="thin" x1="513" y1="253" x2="468" y2="310"/>
  <line class="thin" x1="551" y1="253" x2="596" y2="310"/>
  <circle class="heap" cx="452" cy="334" r="30"/><text class="text" x="438" y="341">91</text>
  <circle class="heap" cx="612" cy="334" r="30"/><text class="text" x="598" y="341">88</text>
  <text class="small" x="420" y="390">新值更差：丢弃</text>
  <text class="small" x="420" y="414">新值更好：替换堆顶并 sift-down</text>

  <path class="arrow" d="M 690 208 L 810 168"/>
  <path class="arrow" d="M 690 318 L 810 362"/>
  <rect class="drop" x="818" y="118" width="170" height="92" rx="8"/>
  <text class="text" x="858" y="154">丢弃</text>
  <text class="small" x="844" y="184">不进入候选集</text>
  <rect class="out" x="818" y="318" width="170" height="114" rx="8"/>
  <text class="text" x="846" y="354">结束后</text>
  <text class="small" x="846" y="382">sort_bounded_heap()</text>
  <text class="small" x="846" y="406">输出前 N 名有序数组</text>
</svg>
