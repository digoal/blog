<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" role="img" aria-labelledby="title desc">
  <title id="title">外部排序归并阶段的 heap</title>
  <desc id="desc">展示多条 logical tape 的前端 tuple 如何进入 heap，输出最小 tuple 后从同一 tape 补入下一个。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .tape { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    .front { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .heap { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .out { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1080" height="580"/>
  <text class="text" x="46" y="54">外部排序：heap 只保存每条输入 run 的当前前端 tuple</text>

  <g transform="translate(70 112)">
    <text class="text" x="0" y="-20">Logical tapes / sorted runs</text>
    <rect class="front" x="0" y="0" width="62" height="42" rx="4"/><rect class="tape" x="62" y="0" width="62" height="42"/><rect class="tape" x="124" y="0" width="62" height="42"/><rect class="tape" x="186" y="0" width="62" height="42"/>
    <text class="small" x="24" y="27">2</text><text class="small" x="84" y="27">9</text><text class="small" x="144" y="27">21</text><text class="small" x="203" y="27">33</text>
    <rect class="front" x="0" y="78" width="62" height="42" rx="4"/><rect class="tape" x="62" y="78" width="62" height="42"/><rect class="tape" x="124" y="78" width="62" height="42"/><rect class="tape" x="186" y="78" width="62" height="42"/>
    <text class="small" x="24" y="105">4</text><text class="small" x="84" y="105">8</text><text class="small" x="144" y="105">19</text><text class="small" x="203" y="105">27</text>
    <rect class="front" x="0" y="156" width="62" height="42" rx="4"/><rect class="tape" x="62" y="156" width="62" height="42"/><rect class="tape" x="124" y="156" width="62" height="42"/><rect class="tape" x="186" y="156" width="62" height="42"/>
    <text class="small" x="24" y="183">1</text><text class="small" x="84" y="183">7</text><text class="small" x="144" y="183">15</text><text class="small" x="203" y="183">40</text>
    <rect class="front" x="0" y="234" width="62" height="42" rx="4"/><rect class="tape" x="62" y="234" width="62" height="42"/><rect class="tape" x="124" y="234" width="62" height="42"/><rect class="tape" x="186" y="234" width="62" height="42"/>
    <text class="small" x="24" y="261">6</text><text class="small" x="84" y="261">13</text><text class="small" x="144" y="261">18</text><text class="small" x="203" y="261">25</text>
  </g>

  <path class="arrow" d="M 330 134 C 410 140 440 158 496 190"/>
  <path class="arrow" d="M 330 212 C 410 206 440 202 496 218"/>
  <path class="arrow" d="M 330 290 C 410 280 440 260 496 246"/>
  <path class="arrow" d="M 330 368 C 410 356 440 304 496 274"/>

  <g transform="translate(510 150)">
    <text class="text" x="0" y="-24">Merge heap</text>
    <circle class="heap" cx="115" cy="48" r="32"/><text class="text" x="106" y="55">1</text>
    <line class="thin" x1="95" y1="74" x2="58" y2="132"/>
    <line class="thin" x1="135" y1="74" x2="172" y2="132"/>
    <circle class="heap" cx="48" cy="158" r="30"/><text class="text" x="39" y="165">2</text>
    <circle class="heap" cx="182" cy="158" r="30"/><text class="text" x="173" y="165">4</text>
    <line class="thin" x1="48" y1="188" x2="48" y2="246"/>
    <circle class="heap" cx="48" cy="272" r="30"/><text class="text" x="39" y="279">6</text>
    <text class="small" x="-20" y="336">输出堆顶后，从同一 tape 读下一个 tuple 替换堆顶</text>
  </g>

  <path class="arrow" d="M 724 197 L 854 197"/>
  <rect class="out" x="872" y="156" width="150" height="84" rx="8"/>
  <text class="text" x="905" y="190">输出流</text>
  <text class="small" x="904" y="218">1, 2, 4, ...</text>
  <path class="arrow" d="M 950 250 C 912 340 790 388 672 346"/>
  <text class="small" x="774" y="382">补入同一 run 的下一个前端值</text>
</svg>
