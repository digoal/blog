<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL tuplesort 中 heap 的三种角色</title>
  <desc id="desc">展示 heap 在历史 run generation、当前 top-N bounded sort、外部归并中的不同角色。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .old { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
    .current { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .merge { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .muted { font-size: 14px; fill: #64748b; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1080" height="620"/>
  <text class="text" x="46" y="52">同一个 heap 思想，在 tuplesort 的不同阶段承担不同任务</text>

  <rect class="card" x="54" y="92" width="294" height="430" rx="8"/>
  <rect class="old" x="84" y="128" width="234" height="64" rx="8"/>
  <text class="text" x="116" y="168">历史：replacement selection</text>
  <text class="small" x="84" y="230">目标：边读输入边产生较长 sorted run</text>
  <text class="small" x="84" y="262">结构：优先树 / heap</text>
  <text class="small" x="84" y="294">源码注释：PostgreSQL 现在不再用它</text>
  <text class="muted" x="84" y="344">当前 run generation 改为：</text>
  <text class="muted" x="84" y="372">内存批次 + quicksort/radix sort</text>
  <text class="muted" x="84" y="400">再写入 logical tape</text>

  <rect class="card" x="394" y="92" width="294" height="430" rx="8"/>
  <rect class="current" x="424" y="128" width="234" height="64" rx="8"/>
  <text class="text" x="460" y="168">当前：Top-N heapsort</text>
  <text class="small" x="424" y="230">触发：bounded sort，通常来自 LIMIT</text>
  <text class="small" x="424" y="262">目标：只保留 N 个候选</text>
  <text class="small" x="424" y="294">堆顶：当前候选中最差的 tuple</text>
  <text class="small" x="424" y="326">收益：比较成本约 NlogK</text>
  <text class="muted" x="424" y="376">函数：</text>
  <text class="muted" x="424" y="404">make_bounded_heap()</text>
  <text class="muted" x="424" y="432">sort_bounded_heap()</text>

  <rect class="card" x="734" y="92" width="294" height="430" rx="8"/>
  <rect class="merge" x="764" y="128" width="234" height="64" rx="8"/>
  <text class="text" x="802" y="168">当前：多路归并 heap</text>
  <text class="small" x="764" y="230">触发：外部排序 final merge</text>
  <text class="small" x="764" y="262">目标：每条 tape 只放前端候选</text>
  <text class="small" x="764" y="294">堆顶：所有输入 run 的最小 tuple</text>
  <text class="small" x="764" y="326">收益：内存约等于归并路数 M</text>
  <text class="muted" x="764" y="376">函数：</text>
  <text class="muted" x="764" y="404">beginmerge()</text>
  <text class="muted" x="764" y="432">mergeonerun()</text>

  <path class="arrow" d="M 348 306 L 394 306"/>
  <path class="arrow" d="M 688 306 L 734 306"/>
  <text class="muted" x="398" y="566">要点：heap 不是 PostgreSQL 排序的全部，而是处理 Top-N 和归并前端候选的基础数据结构。</text>
</svg>
