<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-labelledby="title desc">
  <title id="title">数据库排序策略选择边界</title>
  <desc id="desc">展示 PostgreSQL 在内存容量、LIMIT 和外部排序之间如何选择 quicksort、top-N heapsort 和 external merge。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    .qsort { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
    .heap { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .merge { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1080" height="600"/>
  <text class="text" x="46" y="54">排序策略不是单选算法题，而是由数据量、LIMIT、work_mem 和访问方式共同决定</text>

  <rect class="node" x="410" y="96" width="260" height="78" rx="8"/>
  <text class="text" x="462" y="128">输入 tuple 流</text>
  <text class="small" x="452" y="154">ORDER BY / DISTINCT / Merge Join 等</text>

  <path class="arrow" d="M 540 176 L 540 226"/>
  <rect class="node" x="390" y="232" width="300" height="86" rx="8"/>
  <text class="text" x="448" y="264">是否有有效 LIMIT?</text>
  <text class="small" x="430" y="292">limit_tuples &gt; 0 且小于输入行数</text>

  <path class="arrow" d="M 390 276 L 226 276"/>
  <text class="small" x="268" y="254">否</text>
  <rect class="node" x="52" y="230" width="174" height="92" rx="8"/>
  <text class="text" x="84" y="264">完整排序</text>
  <text class="small" x="74" y="292">结果需要全局有序</text>

  <path class="arrow" d="M 690 276 L 842 276"/>
  <text class="small" x="768" y="254">是</text>
  <rect class="heap" x="842" y="226" width="190" height="100" rx="8"/>
  <text class="text" x="884" y="260">Top-N</text>
  <text class="small" x="872" y="288">候选能放进内存</text>
  <text class="small" x="872" y="310">维护 N 大小堆</text>

  <path class="arrow" d="M 138 324 L 138 392"/>
  <rect class="node" x="52" y="396" width="220" height="86" rx="8"/>
  <text class="text" x="82" y="428">是否超过 work_mem?</text>
  <text class="small" x="88" y="456">含 tuple 本体和 memtuples[]</text>

  <path class="arrow" d="M 272 438 L 392 438"/>
  <text class="small" x="318" y="416">否</text>
  <rect class="qsort" x="392" y="388" width="220" height="104" rx="8"/>
  <text class="text" x="444" y="424">quicksort</text>
  <text class="small" x="424" y="452">或整数 key radix sort</text>
  <text class="small" x="424" y="474">EXPLAIN: quicksort</text>

  <path class="arrow" d="M 162 482 C 240 540 610 540 720 486"/>
  <text class="small" x="302" y="532">是</text>
  <rect class="merge" x="720" y="388" width="258" height="104" rx="8"/>
  <text class="text" x="768" y="424">external merge</text>
  <text class="small" x="758" y="452">内存批次生成 sorted runs</text>
  <text class="small" x="758" y="474">多路归并 heap 输出</text>
</svg>
