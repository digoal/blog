<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 外部归并排序流水线</title>
  <desc id="desc">展示 Sort 节点把输入元组交给 tuplesort，内存不足时生成有序 run，再通过 balanced k-way merge 输出有序结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .hot{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .disk{fill:#eef2ff;stroke:#4338ca;stroke-width:2;rx:8}
    .out{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:8}
    .text{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="30" y="58" width="150" height="86" class="box"/>
  <text x="105" y="94" text-anchor="middle" class="text">子计划输入</text>
  <text x="105" y="121" text-anchor="middle" class="small">Seq Scan / Join / Agg</text>

  <rect x="230" y="46" width="170" height="110" class="hot"/>
  <text x="315" y="84" text-anchor="middle" class="text">Sort 节点</text>
  <text x="315" y="112" text-anchor="middle" class="small">ExecSort()</text>
  <text x="315" y="136" text-anchor="middle" class="small">喂入 tuplesort</text>

  <rect x="455" y="36" width="195" height="130" class="hot"/>
  <text x="552" y="73" text-anchor="middle" class="text">memtuples[]</text>
  <text x="552" y="101" text-anchor="middle" class="small">未超过 work_mem</text>
  <text x="552" y="125" text-anchor="middle" class="small">quicksort / radix sort</text>
  <text x="552" y="149" text-anchor="middle" class="small">生成内存有序批次</text>

  <rect x="705" y="30" width="205" height="142" class="disk"/>
  <text x="807" y="66" text-anchor="middle" class="text">logical tapes</text>
  <text x="807" y="94" text-anchor="middle" class="small">run 1, run 2, run 3...</text>
  <text x="807" y="118" text-anchor="middle" class="small">临时文件顺序写入</text>
  <text x="807" y="142" text-anchor="middle" class="small">logtape 复用空间</text>

  <rect x="270" y="260" width="210" height="105" class="disk"/>
  <text x="375" y="296" text-anchor="middle" class="text">Balanced k-way merge</text>
  <text x="375" y="324" text-anchor="middle" class="small">每条 run 前端入 heap</text>
  <text x="375" y="348" text-anchor="middle" class="small">多轮或最终在线归并</text>

  <rect x="560" y="260" width="170" height="105" class="out"/>
  <text x="645" y="300" text-anchor="middle" class="text">有序输出</text>
  <text x="645" y="328" text-anchor="middle" class="small">tuplesort_get*</text>
  <text x="645" y="352" text-anchor="middle" class="small">返回上层节点</text>

  <path d="M180 101 H230" class="arrow"/>
  <path d="M400 101 H455" class="arrow"/>
  <path d="M650 101 H705" class="arrow"/>
  <path d="M807 172 C807 230 475 212 430 260" class="arrow"/>
  <path d="M480 312 H560" class="arrow"/>
  <path d="M552 166 C552 210 650 210 645 260" class="arrow"/>
  <text x="604" y="218" class="small">内存可容纳时直接输出</text>
  <text x="698" y="225" class="small">超过 work_mem 时落盘</text>
</svg>
