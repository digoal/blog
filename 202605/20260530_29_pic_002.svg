<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">k 路归并中的 heap 前端候选</title>
  <desc id="desc">展示每条有序 run 只把当前第一个元组放入 heap，输出堆顶后从同一条 run 读取下一个元组替换。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .run{fill:#f8fafc;stroke:#475569;stroke-width:2;rx:7}
    .head{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:7}
    .heap{fill:#eef2ff;stroke:#4338ca;stroke-width:2}
    .out{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:7}
    .text{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .num{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:17px;fill:#0f172a}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <text x="82" y="44" class="text">输入 run</text>
  <text x="418" y="44" class="text">merge heap</text>
  <text x="730" y="44" class="text">输出流</text>

  <g transform="translate(45,75)">
    <text x="0" y="25" class="small">run 1</text>
    <rect x="62" y="0" width="58" height="42" class="head"/><text x="91" y="27" text-anchor="middle" class="num">3</text>
    <rect x="128" y="0" width="58" height="42" class="run"/><text x="157" y="27" text-anchor="middle" class="num">12</text>
    <rect x="194" y="0" width="58" height="42" class="run"/><text x="223" y="27" text-anchor="middle" class="num">25</text>
    <rect x="260" y="0" width="58" height="42" class="run"/><text x="289" y="27" text-anchor="middle" class="num">41</text>
  </g>
  <g transform="translate(45,145)">
    <text x="0" y="25" class="small">run 2</text>
    <rect x="62" y="0" width="58" height="42" class="head"/><text x="91" y="27" text-anchor="middle" class="num">7</text>
    <rect x="128" y="0" width="58" height="42" class="run"/><text x="157" y="27" text-anchor="middle" class="num">9</text>
    <rect x="194" y="0" width="58" height="42" class="run"/><text x="223" y="27" text-anchor="middle" class="num">31</text>
    <rect x="260" y="0" width="58" height="42" class="run"/><text x="289" y="27" text-anchor="middle" class="num">50</text>
  </g>
  <g transform="translate(45,215)">
    <text x="0" y="25" class="small">run 3</text>
    <rect x="62" y="0" width="58" height="42" class="head"/><text x="91" y="27" text-anchor="middle" class="num">5</text>
    <rect x="128" y="0" width="58" height="42" class="run"/><text x="157" y="27" text-anchor="middle" class="num">18</text>
    <rect x="194" y="0" width="58" height="42" class="run"/><text x="223" y="27" text-anchor="middle" class="num">22</text>
    <rect x="260" y="0" width="58" height="42" class="run"/><text x="289" y="27" text-anchor="middle" class="num">60</text>
  </g>
  <g transform="translate(45,285)">
    <text x="0" y="25" class="small">run 4</text>
    <rect x="62" y="0" width="58" height="42" class="head"/><text x="91" y="27" text-anchor="middle" class="num">1</text>
    <rect x="128" y="0" width="58" height="42" class="run"/><text x="157" y="27" text-anchor="middle" class="num">14</text>
    <rect x="194" y="0" width="58" height="42" class="run"/><text x="223" y="27" text-anchor="middle" class="num">17</text>
    <rect x="260" y="0" width="58" height="42" class="run"/><text x="289" y="27" text-anchor="middle" class="num">39</text>
  </g>

  <circle cx="505" cy="110" r="32" class="heap"/><text x="505" y="116" text-anchor="middle" class="num">1</text>
  <circle cx="448" cy="190" r="32" class="heap"/><text x="448" y="196" text-anchor="middle" class="num">3</text>
  <circle cx="562" cy="190" r="32" class="heap"/><text x="562" y="196" text-anchor="middle" class="num">5</text>
  <circle cx="620" cy="270" r="32" class="heap"/><text x="620" y="276" text-anchor="middle" class="num">7</text>
  <line x1="493" y1="139" x2="462" y2="162" stroke="#4338ca" stroke-width="2"/>
  <line x1="517" y1="139" x2="548" y2="162" stroke="#4338ca" stroke-width="2"/>
  <line x1="576" y1="217" x2="606" y2="244" stroke="#4338ca" stroke-width="2"/>
  <text x="505" y="330" text-anchor="middle" class="small">heap 大小约等于输入 run 数</text>

  <rect x="725" y="105" width="60" height="42" class="out"/><text x="755" y="132" text-anchor="middle" class="num">1</text>
  <rect x="793" y="105" width="60" height="42" class="out"/><text x="823" y="132" text-anchor="middle" class="num">3</text>
  <rect x="861" y="105" width="60" height="42" class="out"/><text x="891" y="132" text-anchor="middle" class="num">5</text>
  <text x="823" y="178" text-anchor="middle" class="small">每次输出当前最小值</text>

  <path d="M365 96 C405 86 430 92 474 104" class="arrow"/>
  <path d="M365 166 C398 168 418 178 417 188" class="arrow"/>
  <path d="M365 236 C428 230 500 216 538 198" class="arrow"/>
  <path d="M365 306 C444 300 574 295 596 276" class="arrow"/>
  <path d="M537 110 H725" class="arrow"/>
  <path d="M725 235 C665 235 645 285 645 310" class="arrow"/>
  <text x="738" y="238" class="small">从同一 run 读取下一个值替换堆顶</text>
</svg>
