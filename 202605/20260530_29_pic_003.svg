<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">merge order 与内存分配</title>
  <desc id="desc">展示 PostgreSQL 根据 work_mem 计算输入 tape 数，并在输入 tape、输出 tape 和预读缓冲之间分配内存。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .mem{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:6}
    .tapebuf{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:6}
    .heap{fill:#ede9fe;stroke:#6d28d9;stroke-width:2;rx:6}
    .warn{fill:#fff1f2;stroke:#be123c;stroke-width:2;rx:6}
    .text{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;fill:#0f172a}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="35" y="55" width="250" height="290" class="frame"/>
  <text x="160" y="92" text-anchor="middle" class="text">allowedMem</text>
  <text x="160" y="120" text-anchor="middle" class="small">通常来自 work_mem</text>
  <rect x="70" y="155" width="180" height="44" class="mem"/>
  <text x="160" y="183" text-anchor="middle" class="small">memtuples[] / tuple 空间</text>
  <rect x="70" y="215" width="180" height="44" class="tapebuf"/>
  <text x="160" y="243" text-anchor="middle" class="small">输入 tape 预读缓冲</text>
  <rect x="70" y="275" width="180" height="44" class="heap"/>
  <text x="160" y="303" text-anchor="middle" class="small">归并 heap 与 slab slot</text>

  <rect x="360" y="58" width="245" height="126" class="frame"/>
  <text x="482" y="93" text-anchor="middle" class="text">tuplesort_merge_order()</text>
  <text x="482" y="122" text-anchor="middle" class="small">M = allowedMem /</text>
  <text x="482" y="146" text-anchor="middle" class="small">(2 * tape overhead + merge buffer)</text>
  <text x="482" y="170" text-anchor="middle" class="small">再限制在 6 到 500 之间</text>

  <rect x="685" y="45" width="235" height="155" class="frame"/>
  <text x="802" y="78" text-anchor="middle" class="text">一次归并 pass</text>
  <rect x="710" y="102" width="52" height="42" class="tapebuf"/><text x="736" y="128" text-anchor="middle" class="small">in</text>
  <rect x="772" y="102" width="52" height="42" class="tapebuf"/><text x="798" y="128" text-anchor="middle" class="small">in</text>
  <rect x="834" y="102" width="52" height="42" class="tapebuf"/><text x="860" y="128" text-anchor="middle" class="small">in</text>
  <rect x="752" y="152" width="94" height="34" class="mem"/><text x="799" y="174" text-anchor="middle" class="small">out tapes</text>

  <rect x="360" y="250" width="245" height="112" class="warn"/>
  <text x="482" y="286" text-anchor="middle" class="text">过大的 M 也有代价</text>
  <text x="482" y="315" text-anchor="middle" class="small">每条 tape 缓冲变薄</text>
  <text x="482" y="339" text-anchor="middle" class="small">heap 与 cache 压力上升</text>

  <rect x="685" y="250" width="235" height="112" class="frame"/>
  <text x="802" y="287" text-anchor="middle" class="text">工程目标</text>
  <text x="802" y="316" text-anchor="middle" class="small">少做重复 I/O</text>
  <text x="802" y="340" text-anchor="middle" class="small">保持尽量顺序的临时文件访问</text>

  <path d="M285 122 H360" class="arrow"/>
  <path d="M605 122 H685" class="arrow"/>
  <path d="M605 306 H685" class="arrow"/>
</svg>
