<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 排序策略选择</title>
  <desc id="desc">展示 PostgreSQL 在索引有序输出、内存排序、Top-N heap、外部归并排序和增量排序之间选择的主要条件。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .q{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .yes{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:8}
    .no{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .sort{fill:#eef2ff;stroke:#4338ca;stroke-width:2;rx:8}
    .text{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="50" y="172" width="175" height="72" class="q"/>
  <text x="137" y="201" text-anchor="middle" class="text">ORDER BY / 排序需求</text>
  <text x="137" y="225" text-anchor="middle" class="small">Sort / Unique / Merge Join 等</text>

  <rect x="285" y="70" width="185" height="84" class="q"/>
  <text x="378" y="102" text-anchor="middle" class="text">已有有序路径？</text>
  <text x="378" y="127" text-anchor="middle" class="small">B-tree / pathkeys / prefix</text>

  <rect x="550" y="50" width="175" height="74" class="yes"/>
  <text x="637" y="80" text-anchor="middle" class="text">直接有序输出</text>
  <text x="637" y="104" text-anchor="middle" class="small">或 Incremental Sort</text>

  <rect x="285" y="250" width="185" height="84" class="q"/>
  <text x="378" y="282" text-anchor="middle" class="text">只有前 K 行？</text>
  <text x="378" y="307" text-anchor="middle" class="small">ORDER BY ... LIMIT</text>

  <rect x="550" y="205" width="175" height="74" class="yes"/>
  <text x="637" y="235" text-anchor="middle" class="text">Top-N heapsort</text>
  <text x="637" y="259" text-anchor="middle" class="small">保留 K 个候选</text>

  <rect x="550" y="315" width="175" height="74" class="q"/>
  <text x="637" y="346" text-anchor="middle" class="text">能放入内存？</text>
  <text x="637" y="371" text-anchor="middle" class="small">work_mem 约束</text>

  <rect x="780" y="255" width="140" height="64" class="sort"/>
  <text x="850" y="282" text-anchor="middle" class="text">quicksort</text>
  <text x="850" y="304" text-anchor="middle" class="small">或 radix sort</text>

  <rect x="780" y="350" width="140" height="64" class="sort"/>
  <text x="850" y="377" text-anchor="middle" class="text">external merge</text>
  <text x="850" y="399" text-anchor="middle" class="small">run + k-way merge</text>

  <path d="M225 195 C250 150 260 116 285 112" class="arrow"/>
  <path d="M470 112 H550" class="arrow"/>
  <path d="M378 154 V250" class="arrow"/>
  <path d="M225 220 C252 255 263 292 285 292" class="arrow"/>
  <path d="M470 292 C510 270 522 245 550 242" class="arrow"/>
  <path d="M470 315 C505 340 520 352 550 352" class="arrow"/>
  <path d="M725 352 C753 340 762 302 780 287" class="arrow"/>
  <path d="M725 365 C753 372 762 379 780 382" class="arrow"/>
  <text x="495" y="98" class="small">是</text>
  <text x="390" y="205" class="small">否</text>
  <text x="503" y="258" class="small">是</text>
  <text x="503" y="335" class="small">否</text>
  <text x="746" y="324" class="small">是</text>
  <text x="746" y="395" class="small">否</text>
</svg>
