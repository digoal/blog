<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 外部归并排序流水线</title>
  <desc id="desc">展示 Sort 节点从子计划拉取输入、tuplesort 在 work_mem 内积累、超过内存后生成 run、最终多路归并输出的流程。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .hot { fill: #fff7ed; stroke: #c2410c; }
    .disk { fill: #eef6ff; stroke: #1d4ed8; }
    .out { fill: #f0fdf4; stroke: #15803d; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="30" y="48" width="145" height="82" class="box"/>
  <text x="102" y="82" text-anchor="middle" class="label">子计划</text>
  <text x="102" y="108" text-anchor="middle" class="small">Seq Scan / Join</text>

  <rect x="230" y="48" width="150" height="82" class="box"/>
  <text x="305" y="82" text-anchor="middle" class="label">ExecSort()</text>
  <text x="305" y="108" text-anchor="middle" class="small">阻塞式收集输入</text>

  <rect x="435" y="48" width="175" height="82" class="hot"/>
  <text x="522" y="80" text-anchor="middle" class="label">memtuples[]</text>
  <text x="522" y="106" text-anchor="middle" class="small">受 work_mem 约束</text>

  <path d="M175 89 H230" class="arrow"/>
  <path d="M380 89 H435" class="arrow"/>

  <rect x="690" y="30" width="190" height="62" class="out"/>
  <text x="785" y="58" text-anchor="middle" class="label">内存排序</text>
  <text x="785" y="80" text-anchor="middle" class="small">quicksort / radix</text>
  <path d="M610 72 H690" class="arrow"/>

  <rect x="690" y="142" width="190" height="72" class="disk"/>
  <text x="785" y="172" text-anchor="middle" class="label">生成 sorted runs</text>
  <text x="785" y="196" text-anchor="middle" class="small">写入 logical tapes</text>
  <path d="M522 130 C540 165 610 178 690 178" class="dash"/>

  <rect x="390" y="270" width="220" height="78" class="disk"/>
  <text x="500" y="302" text-anchor="middle" class="label">balanced k-way merge</text>
  <text x="500" y="327" text-anchor="middle" class="small">每条 run 只保留前端候选</text>
  <path d="M785 214 C770 286 680 310 610 310" class="arrow"/>

  <rect x="90" y="270" width="170" height="78" class="out"/>
  <text x="175" y="302" text-anchor="middle" class="label">有序输出</text>
  <text x="175" y="327" text-anchor="middle" class="small">gettupleslot()</text>
  <path d="M390 310 H260" class="arrow"/>

  <text x="645" y="305" class="tiny">random access?</text>
  <path d="M610 296 C685 260 765 260 820 225" class="dash"/>
  <text x="737" y="255" class="tiny">需要时物化最终 tape</text>

  <text x="522" y="157" text-anchor="middle" class="tiny">超过 work_mem</text>
  <text x="650" y="64" text-anchor="middle" class="tiny">输入结束且未超内存</text>
</svg>
