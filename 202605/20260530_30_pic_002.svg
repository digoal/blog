<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" role="img" aria-labelledby="title desc">
  <title id="title">run generation：内存批次到外部 run</title>
  <desc id="desc">展示 PostgreSQL 外部排序如何把超过 work_mem 的输入拆成多个内存批次，分别排序后写入 logical tape。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .mem { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .run { fill: #eef6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="35" y="58" width="160" height="82" class="box"/>
  <text x="115" y="91" text-anchor="middle" class="label">输入流</text>
  <text x="115" y="117" text-anchor="middle" class="small">tuple 不断进入</text>

  <rect x="260" y="38" width="210" height="122" class="mem"/>
  <text x="365" y="70" text-anchor="middle" class="label">memtuples[]</text>
  <text x="365" y="95" text-anchor="middle" class="small">积累当前批次</text>
  <line x1="280" y1="116" x2="450" y2="116" stroke="#c2410c" stroke-width="2"/>
  <text x="365" y="140" text-anchor="middle" class="tiny">LACKMEM 或数组满</text>

  <rect x="545" y="58" width="175" height="82" class="box"/>
  <text x="632" y="91" text-anchor="middle" class="label">批内排序</text>
  <text x="632" y="117" text-anchor="middle" class="small">quicksort / radix</text>

  <rect x="785" y="58" width="140" height="82" class="run"/>
  <text x="855" y="91" text-anchor="middle" class="label">run 1</text>
  <text x="855" y="117" text-anchor="middle" class="small">有序</text>

  <path d="M195 99 H260" class="arrow"/>
  <path d="M470 99 H545" class="arrow"/>
  <path d="M720 99 H785" class="arrow"/>

  <rect x="260" y="212" width="210" height="122" class="mem"/>
  <text x="365" y="244" text-anchor="middle" class="label">memtuples[]</text>
  <text x="365" y="269" text-anchor="middle" class="small">下一批继续积累</text>
  <line x1="280" y1="290" x2="450" y2="290" stroke="#c2410c" stroke-width="2"/>
  <text x="365" y="314" text-anchor="middle" class="tiny">输入未结束</text>

  <rect x="545" y="232" width="175" height="82" class="box"/>
  <text x="632" y="265" text-anchor="middle" class="label">再次批内排序</text>
  <text x="632" y="291" text-anchor="middle" class="small">dumptuples()</text>

  <rect x="785" y="232" width="140" height="82" class="run"/>
  <text x="855" y="265" text-anchor="middle" class="label">run 2..N</text>
  <text x="855" y="291" text-anchor="middle" class="small">按 tape 轮转写入</text>

  <path d="M115 140 C130 235 190 273 260 273" class="arrow"/>
  <path d="M470 273 H545" class="arrow"/>
  <path d="M720 273 H785" class="arrow"/>

  <rect x="380" y="386" width="250" height="50" class="run"/>
  <text x="505" y="417" text-anchor="middle" class="label">所有 run 进入 mergeruns()</text>
  <path d="M855 140 C835 350 655 410 630 410" class="arrow"/>
  <path d="M855 314 C825 386 700 410 630 410" class="arrow"/>

  <text x="36" y="395" class="tiny">要点：PostgreSQL 当前 run generation 使用 quicksort 或 radix sort，历史 replacement selection 已不再是当前路径。</text>
</svg>
