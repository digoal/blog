<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">k 路归并与 logical tape 空间复用</title>
  <desc id="desc">展示多条 run 在归并时各自提供一个前端候选，logical tape 在同一临时文件中按块链式组织并回收读完的块。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .tape { fill: #eef6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .heap { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .out { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .block { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 4; }
    .free { fill: #dcfce7; stroke: #16a34a; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .green { stroke: #16a34a; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="35" class="label">归并堆：每条输入 tape 只放一个当前候选</text>

  <rect x="45" y="70" width="190" height="52" class="tape"/>
  <text x="140" y="102" text-anchor="middle" class="small">run A: 3, 8, 20...</text>
  <rect x="45" y="150" width="190" height="52" class="tape"/>
  <text x="140" y="182" text-anchor="middle" class="small">run B: 1, 9, 17...</text>
  <rect x="45" y="230" width="190" height="52" class="tape"/>
  <text x="140" y="262" text-anchor="middle" class="small">run C: 5, 7, 30...</text>

  <rect x="355" y="100" width="200" height="150" class="heap"/>
  <text x="455" y="132" text-anchor="middle" class="label">heap</text>
  <circle cx="455" cy="166" r="22" fill="#fed7aa" stroke="#c2410c"/>
  <text x="455" y="172" text-anchor="middle" class="small">1</text>
  <circle cx="420" cy="215" r="22" fill="#ffedd5" stroke="#c2410c"/>
  <text x="420" y="221" text-anchor="middle" class="small">3</text>
  <circle cx="490" cy="215" r="22" fill="#ffedd5" stroke="#c2410c"/>
  <text x="490" y="221" text-anchor="middle" class="small">5</text>

  <rect x="690" y="135" width="190" height="78" class="out"/>
  <text x="785" y="166" text-anchor="middle" class="label">输出 tape / 调用方</text>
  <text x="785" y="191" text-anchor="middle" class="small">输出最小值后从同源 run 读下一个</text>

  <path d="M235 96 C285 100 315 125 355 150" class="arrow"/>
  <path d="M235 176 H355" class="arrow"/>
  <path d="M235 256 C285 245 315 225 355 205" class="arrow"/>
  <path d="M555 174 H690" class="arrow"/>

  <text x="40" y="330" class="label">logical tape：同一临时文件中的块链与回收</text>
  <rect x="45" y="360" width="88" height="52" class="block"/>
  <text x="89" y="392" text-anchor="middle" class="tiny">A1</text>
  <rect x="145" y="360" width="88" height="52" class="block"/>
  <text x="189" y="392" text-anchor="middle" class="tiny">B1</text>
  <rect x="245" y="360" width="88" height="52" class="block"/>
  <text x="289" y="392" text-anchor="middle" class="tiny">A2</text>
  <rect x="345" y="360" width="88" height="52" class="block"/>
  <text x="389" y="392" text-anchor="middle" class="tiny">C1</text>
  <rect x="445" y="360" width="88" height="52" class="free"/>
  <text x="489" y="392" text-anchor="middle" class="tiny">已读完</text>
  <rect x="545" y="360" width="88" height="52" class="block"/>
  <text x="589" y="392" text-anchor="middle" class="tiny">B2</text>
  <rect x="645" y="360" width="88" height="52" class="free"/>
  <text x="689" y="392" text-anchor="middle" class="tiny">可复用</text>
  <rect x="745" y="360" width="88" height="52" class="block"/>
  <text x="789" y="392" text-anchor="middle" class="tiny">输出</text>

  <path d="M489 412 C505 455 650 455 689 412" class="arrow green"/>
  <text x="590" y="470" text-anchor="middle" class="small">读完的块释放给新 tape，降低峰值临时空间</text>
</svg>
