<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" role="img" aria-labelledby="title desc">
  <title id="title">外部排序观测与调优闭环</title>
  <desc id="desc">展示从 EXPLAIN、日志、统计视图观察外部排序，再回到 SQL、索引、work_mem、临时空间和并发预算的调优闭环。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .ok { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="55" y="70" width="190" height="86" class="warn"/>
  <text x="150" y="102" text-anchor="middle" class="label">现象</text>
  <text x="150" y="128" text-anchor="middle" class="small">ORDER BY 慢</text>
  <text x="150" y="148" text-anchor="middle" class="tiny">临时文件 / I/O 上升</text>

  <rect x="360" y="45" width="230" height="136" class="box"/>
  <text x="475" y="78" text-anchor="middle" class="label">观测</text>
  <text x="475" y="106" text-anchor="middle" class="small">EXPLAIN ANALYZE</text>
  <text x="475" y="130" text-anchor="middle" class="small">Sort Method: external merge</text>
  <text x="475" y="154" text-anchor="middle" class="small">Disk: xxxkB</text>

  <rect x="710" y="70" width="190" height="86" class="box"/>
  <text x="805" y="102" text-anchor="middle" class="label">补充证据</text>
  <text x="805" y="128" text-anchor="middle" class="small">log_temp_files</text>
  <text x="805" y="148" text-anchor="middle" class="tiny">pg_stat_database / pg_stat_statements</text>

  <path d="M245 113 H360" class="arrow"/>
  <path d="M590 113 H710" class="arrow"/>

  <rect x="70" y="285" width="170" height="98" class="ok"/>
  <text x="155" y="317" text-anchor="middle" class="label">减少输入</text>
  <text x="155" y="343" text-anchor="middle" class="small">过滤、投影、分页</text>
  <text x="155" y="365" text-anchor="middle" class="tiny">避免排序宽行</text>

  <rect x="290" y="285" width="170" height="98" class="ok"/>
  <text x="375" y="317" text-anchor="middle" class="label">利用顺序</text>
  <text x="375" y="343" text-anchor="middle" class="small">匹配 ORDER BY 的索引</text>
  <text x="375" y="365" text-anchor="middle" class="tiny">或增量排序</text>

  <rect x="510" y="285" width="170" height="98" class="ok"/>
  <text x="595" y="317" text-anchor="middle" class="label">预算内存</text>
  <text x="595" y="343" text-anchor="middle" class="small">谨慎调 work_mem</text>
  <text x="595" y="365" text-anchor="middle" class="tiny">乘以节点、worker、并发</text>

  <rect x="730" y="285" width="170" height="98" class="ok"/>
  <text x="815" y="317" text-anchor="middle" class="label">保护磁盘</text>
  <text x="815" y="343" text-anchor="middle" class="small">temp_tablespaces</text>
  <text x="815" y="365" text-anchor="middle" class="tiny">temp_file_limit</text>

  <path d="M475 181 C420 245 230 245 155 285" class="arrow"/>
  <path d="M475 181 C455 245 390 245 375 285" class="arrow"/>
  <path d="M475 181 C510 245 585 245 595 285" class="arrow"/>
  <path d="M805 156 C845 220 835 245 815 285" class="arrow"/>

  <path d="M595 383 C505 435 260 430 155 383" class="arrow"/>
  <text x="390" y="442" text-anchor="middle" class="small">调完回到 EXPLAIN 和日志验证，不用单次运行时间猜结论</text>
</svg>
