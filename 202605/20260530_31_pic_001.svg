<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">增量排序把前缀有序输入拆成后缀排序组</title>
  <desc id="desc">展示输入已经按 key1 排序，目标需要按 key1,key2 排序时，PostgreSQL 可以按 key1 相等的前缀组分别排序 key2。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="520" fill="#ffffff"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#0f172a">目标：ORDER BY key1, key2</text>
  <text x="40" y="82" font-size="16" fill="#475569">下层路径已经保证 key1 有序，只需要在每个 key1 相等的组内补齐 key2 顺序。</text>

  <text x="70" y="135" font-size="18" font-weight="700" fill="#0f172a">输入流：Presorted Key = key1</text>
  <g font-size="15" text-anchor="middle">
    <rect x="55" y="158" width="88" height="42" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="99" y="184" fill="#0f172a">(1,5)</text>
    <rect x="153" y="158" width="88" height="42" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="197" y="184" fill="#0f172a">(1,2)</text>
    <rect x="251" y="158" width="88" height="42" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="295" y="184" fill="#0f172a">(2,9)</text>
    <rect x="349" y="158" width="88" height="42" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="393" y="184" fill="#0f172a">(2,1)</text>
    <rect x="447" y="158" width="88" height="42" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="491" y="184" fill="#0f172a">(2,5)</text>
    <rect x="545" y="158" width="88" height="42" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="589" y="184" fill="#0f172a">(3,3)</text>
    <rect x="643" y="158" width="88" height="42" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="687" y="184" fill="#0f172a">(3,7)</text>
  </g>
  <path d="M 395 226 L 395 292" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="265" font-size="15" fill="#334155">按 key1 相等拆组</text>

  <text x="70" y="330" font-size="18" font-weight="700" fill="#0f172a">分组内排序：只处理后缀 key2</text>
  <g font-size="15" text-anchor="middle">
    <rect x="55" y="355" width="190" height="76" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="150" y="381" font-weight="700" fill="#0369a1">key1 = 1</text>
    <text x="150" y="410" fill="#0f172a">(1,2)  (1,5)</text>
    <rect x="285" y="355" width="220" height="76" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="395" y="381" font-weight="700" fill="#15803d">key1 = 2</text>
    <text x="395" y="410" fill="#0f172a">(2,1)  (2,5)  (2,9)</text>
    <rect x="545" y="355" width="190" height="76" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="640" y="381" font-weight="700" fill="#b45309">key1 = 3</text>
    <text x="640" y="410" fill="#0f172a">(3,3)  (3,7)</text>
  </g>

  <rect x="785" y="126" width="150" height="305" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="860" y="160" font-size="17" text-anchor="middle" font-weight="700" fill="#0f172a">关键收益</text>
  <text x="805" y="200" font-size="15" fill="#334155">1. 首组排完即可返回</text>
  <text x="805" y="232" font-size="15" fill="#334155">2. 降低单次排序内存</text>
  <text x="805" y="264" font-size="15" fill="#334155">3. LIMIT 更容易受益</text>
  <text x="805" y="296" font-size="15" fill="#334155">4. 代价是分组检测</text>
  <text x="805" y="328" font-size="15" fill="#334155">5. 小组过多会有额外</text>
  <text x="827" y="350" font-size="15" fill="#334155">tuplesort 开销</text>
</svg>
