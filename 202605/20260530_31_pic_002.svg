<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" role="img" aria-labelledby="title desc">
  <title id="title">优化器如何选择 Sort 或 Incremental Sort</title>
  <desc id="desc">展示 pathkeys_count_contained_in 识别前缀有序，再由 enable_incremental_sort 和 cost_incremental_sort 决定路径成本。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1060" height="600" fill="#ffffff"/>
  <text x="42" y="48" font-size="24" font-weight="700" fill="#0f172a">优化器路径：已有顺序能覆盖多少目标 pathkeys？</text>

  <rect x="70" y="112" width="210" height="80" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="175" y="145" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">候选输入路径</text>
  <text x="90" y="172" font-size="14" fill="#334155">Index Scan / Sort / MergeAppend</text>

  <rect x="365" y="102" width="250" height="100" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="490" y="135" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">pathkeys_count_contained_in</text>
  <text x="385" y="165" font-size="14" fill="#334155">比较目标 pathkeys 与输入 pathkeys</text>
  <text x="385" y="187" font-size="14" fill="#334155">输出 is_sorted 与 presorted_keys</text>

  <path d="M 280 152 L 360 152" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="710" y="72" width="230" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="825" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">已经完全有序</text>
  <text x="730" y="130" font-size="14" fill="#334155">直接复用输入路径</text>
  <path d="M 615 130 L 705 112" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="710" y="207" width="230" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="825" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">无前缀或功能关闭</text>
  <text x="730" y="268" font-size="14" fill="#334155">create_sort_path</text>
  <text x="730" y="290" font-size="14" fill="#334155">cost_sort 全量排序</text>
  <path d="M 615 160 L 705 250" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="710" y="362" width="230" height="104" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="825" y="395" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">部分前缀有序</text>
  <text x="730" y="423" font-size="14" fill="#334155">create_incremental_sort_path</text>
  <text x="730" y="445" font-size="14" fill="#334155">cost_incremental_sort</text>
  <text x="730" y="467" font-size="14" fill="#334155">nPresortedCols = presorted_keys</text>
  <path d="M 615 185 L 705 410" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="350" width="520" height="170" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="350" y="382" font-size="18" text-anchor="middle" font-weight="700" fill="#0f172a">cost_incremental_sort 的核心估算</text>
  <text x="118" y="420" font-size="15" fill="#334155">1. 用 presorted expressions 估算 input_groups</text>
  <text x="118" y="450" font-size="15" fill="#334155">2. group_tuples = input_tuples / input_groups</text>
  <text x="118" y="480" font-size="15" fill="#334155">3. 对单组调用 cost_tuplesort，再乘以组数</text>
  <text x="118" y="510" font-size="15" fill="#334155">4. 额外加分组检测、tuple copy、tuplesort_reset 成本</text>
  <text x="118" y="540" font-size="15" fill="#475569">风险：组数估错时，计划可能低估或高估增量排序收益。</text>
</svg>
