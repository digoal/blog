<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Incremental Sort 执行器双模式状态机</title>
  <desc id="desc">展示 nodeIncrementalSort.c 在 full sort 模式和 presorted prefix 模式之间切换，并从 tuplesort 中读取结果。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="620" fill="#ffffff"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#0f172a">Incremental Sort 执行器：两种装载模式 + 两种读取模式</text>
  <text x="40" y="80" font-size="16" fill="#475569">源码状态：INCSORT_LOADFULLSORT、INCSORT_READFULLSORT、INCSORT_LOADPREFIXSORT、INCSORT_READPREFIXSORT。</text>

  <rect x="55" y="128" width="220" height="96" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="160" font-size="18" text-anchor="middle" font-weight="700" fill="#0f172a">LOADFULLSORT</text>
  <text x="75" y="190" font-size="14" fill="#334155">先积累至少 32 行</text>
  <text x="75" y="212" font-size="14" fill="#334155">fullsort_state 按全部 key 排序</text>

  <rect x="410" y="128" width="220" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="520" y="160" font-size="18" text-anchor="middle" font-weight="700" fill="#0f172a">READFULLSORT</text>
  <text x="430" y="190" font-size="14" fill="#334155">读出当前小批次</text>
  <text x="430" y="212" font-size="14" fill="#334155">可能包含一个完整前缀组</text>

  <rect x="55" y="372" width="220" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="165" y="404" font-size="18" text-anchor="middle" font-weight="700" fill="#0f172a">LOADPREFIXSORT</text>
  <text x="75" y="434" font-size="14" fill="#334155">确认大前缀组后切换</text>
  <text x="75" y="456" font-size="14" fill="#334155">prefixsort_state 只排后缀 key</text>

  <rect x="410" y="372" width="220" height="104" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="520" y="404" font-size="18" text-anchor="middle" font-weight="700" fill="#0f172a">READPREFIXSORT</text>
  <text x="430" y="434" font-size="14" fill="#334155">读出当前前缀组</text>
  <text x="430" y="456" font-size="14" fill="#334155">组结束后回到 fullsort</text>

  <path d="M 275 176 L 405 176" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="154" font-size="14" text-anchor="middle" fill="#334155">发现组边界</text>
  <path d="M 520 224 C 520 280 190 280 165 365" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="288" font-size="14" text-anchor="middle" fill="#334155">大组启发式触发</text>
  <path d="M 275 424 L 405 424" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="404" font-size="14" text-anchor="middle" fill="#334155">后缀排序完成</text>
  <path d="M 410 458 C 330 555 105 545 105 482" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="242" y="555" font-size="14" text-anchor="middle" fill="#334155">下一组重新开始</text>

  <rect x="730" y="120" width="250" height="370" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="855" y="154" font-size="18" text-anchor="middle" font-weight="700" fill="#0f172a">关键字段与阈值</text>
  <line x1="750" y1="174" x2="960" y2="174" stroke="#cbd5e1"/>
  <text x="750" y="205" font-size="14" fill="#334155">DEFAULT_MIN_GROUP_SIZE = 32</text>
  <text x="750" y="235" font-size="14" fill="#334155">DEFAULT_MAX_FULL_SORT_GROUP_SIZE = 64</text>
  <text x="750" y="265" font-size="14" fill="#334155">group_pivot 记录当前前缀组</text>
  <text x="750" y="295" font-size="14" fill="#334155">transfer_tuple 搬运跨组 tuple</text>
  <text x="750" y="325" font-size="14" fill="#334155">fullsort_state 排全部 sort key</text>
  <text x="750" y="355" font-size="14" fill="#334155">prefixsort_state 跳过前缀 key</text>
  <text x="750" y="385" font-size="14" fill="#334155">bounded/bound 服务 LIMIT</text>
  <text x="750" y="425" font-size="14" fill="#475569">设计目标：小组避免频繁重建排序器，</text>
  <text x="750" y="450" font-size="14" fill="#475569">大组避免重复比较已知相等的前缀列。</text>
</svg>
