<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="560" viewBox="0 0 1020 560" role="img" aria-labelledby="title desc">
  <title id="title">增量排序适用边界</title>
  <desc id="desc">用矩阵说明 LIMIT、前缀组大小、work_mem 和索引顺序如何影响增量排序收益。</desc>
  <rect width="1020" height="560" fill="#ffffff"/>
  <text x="42" y="48" font-size="24" font-weight="700" fill="#0f172a">什么时候 Incremental Sort 值得期待？</text>
  <text x="42" y="80" font-size="16" fill="#475569">判断不是“看到 Sort 就建联合索引”，而是看已有顺序、组大小、LIMIT 和内存压力。</text>

  <rect x="80" y="135" width="250" height="135" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="205" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">强收益</text>
  <text x="105" y="200" font-size="15" fill="#334155">已有前缀索引顺序</text>
  <text x="105" y="228" font-size="15" fill="#334155">ORDER BY 前缀相同</text>
  <text x="105" y="256" font-size="15" fill="#334155">LIMIT 较小，首组很快产出</text>

  <rect x="385" y="135" width="250" height="135" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="510" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">中等收益</text>
  <text x="410" y="200" font-size="15" fill="#334155">每组能放进 work_mem</text>
  <text x="410" y="228" font-size="15" fill="#334155">整体排序会落盘</text>
  <text x="410" y="256" font-size="15" fill="#334155">组数估计较可靠</text>

  <rect x="690" y="135" width="250" height="135" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="815" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">弱收益或反噬</text>
  <text x="715" y="200" font-size="15" fill="#334155">前缀组极小且很多</text>
  <text x="715" y="228" font-size="15" fill="#334155">分组检测成本明显</text>
  <text x="715" y="256" font-size="15" fill="#334155">统计信息误导组数估计</text>

  <line x1="120" y1="335" x2="900" y2="335" stroke="#94a3b8" stroke-width="2"/>
  <line x1="120" y1="335" x2="120" y2="460" stroke="#94a3b8" stroke-width="2"/>
  <text x="505" y="520" font-size="16" text-anchor="middle" fill="#334155">前缀组大小：小而多  ->  中等  ->  大而少</text>
  <text x="68" y="405" font-size="16" text-anchor="middle" fill="#334155" transform="rotate(-90 68 405)">收益</text>
  <circle cx="210" cy="420" r="18" fill="#fee2e2" stroke="#dc2626"/>
  <text x="210" y="426" font-size="14" text-anchor="middle" fill="#0f172a">低</text>
  <circle cx="500" cy="350" r="18" fill="#fef3c7" stroke="#d97706"/>
  <text x="500" y="356" font-size="14" text-anchor="middle" fill="#0f172a">中</text>
  <circle cx="760" cy="275" r="18" fill="#dcfce7" stroke="#16a34a"/>
  <text x="760" y="281" font-size="14" text-anchor="middle" fill="#0f172a">高</text>
  <text x="150" y="475" font-size="14" fill="#64748b">频繁 reset/比较</text>
  <text x="435" y="475" font-size="14" fill="#64748b">批次排序更小</text>
  <text x="705" y="475" font-size="14" fill="#64748b">但单组过大仍可能落盘</text>
</svg>
