<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Inner Join 的逻辑模型</title>
  <desc id="desc">两张输入表先形成候选行对，只有 ON 或 USING 条件为真的行对会进入 inner join 结果，WHERE 条件再继续过滤。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="472" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="480" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#101828">Inner Join：只保留满足连接条件的行对</text>

  <rect x="70" y="116" width="210" height="220" rx="8" fill="#e8f3ff" stroke="#2e90fa" stroke-width="2"/>
  <text x="175" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#175cd3">T1 / outer 候选</text>
  <rect x="96" y="176" width="158" height="34" rx="4" fill="#ffffff" stroke="#84caff"/>
  <text x="175" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1849a9">R1: customer_id=7</text>
  <rect x="96" y="226" width="158" height="34" rx="4" fill="#ffffff" stroke="#84caff"/>
  <text x="175" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1849a9">R2: customer_id=9</text>
  <rect x="96" y="276" width="158" height="34" rx="4" fill="#ffffff" stroke="#84caff"/>
  <text x="175" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1849a9">R3: customer_id=42</text>

  <rect x="680" y="116" width="210" height="220" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="2"/>
  <text x="785" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#027a48">T2 / inner 候选</text>
  <rect x="706" y="176" width="158" height="34" rx="4" fill="#ffffff" stroke="#86efac"/>
  <text x="785" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#05603a">S1: id=7</text>
  <rect x="706" y="226" width="158" height="34" rx="4" fill="#ffffff" stroke="#86efac"/>
  <text x="785" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#05603a">S2: id=8</text>
  <rect x="706" y="276" width="158" height="34" rx="4" fill="#ffffff" stroke="#86efac"/>
  <text x="785" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#05603a">S3: id=42</text>

  <rect x="362" y="120" width="236" height="72" rx="8" fill="#fffaeb" stroke="#f79009" stroke-width="2"/>
  <text x="480" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b54708">join condition</text>
  <text x="480" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#93370d">T1.customer_id = T2.id</text>

  <path d="M 282 226 C 330 226, 332 156, 360 156" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 678 226 C 630 226, 628 156, 600 156" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="345" y="244" width="270" height="92" rx="8" fill="#f9fafb" stroke="#98a2b3" stroke-width="2"/>
  <text x="480" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#344054">候选行对检查</text>
  <text x="480" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475467">true：输出组合</text>
  <text x="480" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475467">false / NULL：丢弃</text>

  <path d="M 480 194 L 480 240" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 480 338 L 480 384" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="290" y="386" width="380" height="70" rx="8" fill="#f4f3ff" stroke="#7a5af8" stroke-width="2"/>
  <text x="480" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5925dc">inner join 结果</text>
  <text x="480" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">(R1,S1), (R3,S3)，不补 NULL 行</text>
</svg>
