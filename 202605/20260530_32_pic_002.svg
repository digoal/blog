<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Inner Join 的优化器搜索流程</title>
  <desc id="desc">优化器从基本关系生成访问路径，再用动态规划生成 join relation，并为每个 join relation 竞争 Nested Loop、Merge Join 和 Hash Join 路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="992" height="572" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="520" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#101828">优化器不是选一个名字，而是在 Path 空间里竞争</text>

  <rect x="64" y="106" width="220" height="116" rx="8" fill="#e8f3ff" stroke="#2e90fa" stroke-width="2"/>
  <text x="174" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#175cd3">query_planner()</text>
  <text x="174" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1849a9">拆 restriction / join clauses</text>
  <text x="174" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1849a9">标记 merge/hash 可用条件</text>

  <rect x="402" y="106" width="236" height="116" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="2"/>
  <text x="520" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#027a48">base RelOptInfo</text>
  <text x="520" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#05603a">Seq Scan / Index Scan</text>
  <text x="520" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#05603a">rows、width、pathkeys、cost</text>

  <rect x="756" y="106" width="220" height="116" rx="8" fill="#fff4ed" stroke="#ff692e" stroke-width="2"/>
  <text x="866" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c4320a">standard_join_search()</text>
  <text x="866" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9c2a10">动态规划：2 表、3 表...</text>
  <text x="866" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9c2a10">必要时 GEQO 接管大连接</text>

  <path d="M 286 164 L 398 164" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 640 164 L 752 164" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="110" y="292" width="820" height="78" rx="8" fill="#f9fafb" stroke="#98a2b3" stroke-width="2"/>
  <text x="520" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#344054">join_search_one_level() / make_join_rel()</text>
  <text x="520" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475467">为每个合法 join relation 枚举左右输入组合，生成 restrictlist 和候选路径</text>
  <path d="M 866 224 L 866 250 C 866 282, 826 292, 780 292" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="82" y="438" width="260" height="96" rx="8" fill="#f4f3ff" stroke="#7a5af8" stroke-width="2"/>
  <text x="212" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5925dc">Nested Loop Path</text>
  <text x="212" y="497" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">outer 驱动 inner 重扫</text>
  <text x="212" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">可用参数化索引路径</text>

  <rect x="390" y="438" width="260" height="96" rx="8" fill="#fffaeb" stroke="#f79009" stroke-width="2"/>
  <text x="520" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b54708">Merge Join Path</text>
  <text x="520" y="497" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93370d">使用 pathkeys / sort</text>
  <text x="520" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93370d">需要 mergejoinable 条件</text>

  <rect x="698" y="438" width="260" height="96" rx="8" fill="#fef3f2" stroke="#f04438" stroke-width="2"/>
  <text x="828" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b42318">Hash Join Path</text>
  <text x="828" y="497" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#912018">build hash table + probe</text>
  <text x="828" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#912018">需要 hashjoinable 条件</text>

  <path d="M 318 370 L 235 434" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 520 372 L 520 434" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 722 370 L 805 434" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="520" y="574" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475467">add_path() 会按启动成本、总成本、排序顺序、参数化关系等维度淘汰被支配路径</text>
</svg>
