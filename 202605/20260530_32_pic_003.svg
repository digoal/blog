<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">三类 Inner Join 物理算法的成本边界</title>
  <desc id="desc">Nested Loop、Hash Join 和 Merge Join 的优势区间由外表行数、内表访问成本、等值条件、排序顺序和内存共同决定。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="992" height="572" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="520" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#101828">Inner Join 方法选择：看数据流和代价，不看名字</text>

  <line x1="110" y1="506" x2="940" y2="506" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="110" y1="506" x2="110" y2="116" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="530" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#344054">参与 join 的行数 / 批量程度增加</text>
  <text x="54" y="312" text-anchor="middle" transform="rotate(-90 54 312)" font-family="Arial, sans-serif" font-size="16" fill="#344054">单次访问、排序或内存代价</text>

  <path d="M 140 468 C 230 300, 322 230, 435 190" fill="none" stroke="#7a5af8" stroke-width="5"/>
  <circle cx="230" cy="324" r="7" fill="#7a5af8"/>
  <rect x="158" y="130" width="260" height="92" rx="8" fill="#f4f3ff" stroke="#7a5af8" stroke-width="2"/>
  <text x="288" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5925dc">Nested Loop</text>
  <text x="288" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">外表小，内表索引点查便宜</text>
  <text x="288" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">风险：外表行数低估会放大</text>

  <path d="M 360 430 C 500 310, 640 290, 880 270" fill="none" stroke="#f04438" stroke-width="5"/>
  <circle cx="642" cy="290" r="7" fill="#f04438"/>
  <rect x="596" y="124" width="284" height="92" rx="8" fill="#fef3f2" stroke="#f04438" stroke-width="2"/>
  <text x="738" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b42318">Hash Join</text>
  <text x="738" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#912018">大批量等值连接，build + probe</text>
  <text x="738" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#912018">风险：内存不足会 batch / spill</text>

  <path d="M 248 470 C 410 450, 600 372, 890 210" fill="none" stroke="#f79009" stroke-width="5"/>
  <circle cx="612" cy="364" r="7" fill="#f79009"/>
  <rect x="516" y="380" width="306" height="92" rx="8" fill="#fffaeb" stroke="#f79009" stroke-width="2"/>
  <text x="669" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b54708">Merge Join</text>
  <text x="669" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93370d">两边已有序或排序可复用</text>
  <text x="669" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93370d">风险：排序启动成本、重复 key 重放</text>

  <rect x="144" y="402" width="230" height="64" rx="8" fill="#f9fafb" stroke="#98a2b3"/>
  <text x="259" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#344054">首行延迟敏感</text>
  <text x="259" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475467">常偏向低启动成本路径</text>

  <rect x="706" y="292" width="232" height="64" rx="8" fill="#f9fafb" stroke="#98a2b3"/>
  <text x="822" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#344054">吞吐 / 全量结果敏感</text>
  <text x="822" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475467">总成本和内存边界更重要</text>
</svg>
