<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">执行器中的 joinqual、hash/merge clause 和 other qual</title>
  <desc id="desc">Hash Join 和 Merge Join 会把可用条件拆成物理定位条件与额外 joinqual；所有 join 节点最终还要执行 plan.qual。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="992" height="572" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="520" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#101828">条件从 SQL 到执行节点的分工</text>

  <rect x="80" y="110" width="880" height="74" rx="8" fill="#e8f3ff" stroke="#2e90fa" stroke-width="2"/>
  <text x="520" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#175cd3">SQL</text>
  <text x="520" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1849a9">FROM a JOIN b ON a.k = b.k AND a.ts &lt; b.ts WHERE a.status = 'ok'</text>

  <path d="M 520 186 L 520 232" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="86" y="234" width="270" height="118" rx="8" fill="#fef3f2" stroke="#f04438" stroke-width="2"/>
  <text x="221" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b42318">Hash Cond</text>
  <text x="221" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#912018">hashclauses</text>
  <text x="221" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#912018">例如 a.k = b.k</text>
  <text x="221" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#912018">用于定位 bucket</text>

  <rect x="386" y="234" width="270" height="118" rx="8" fill="#fffaeb" stroke="#f79009" stroke-width="2"/>
  <text x="521" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b54708">Merge Cond</text>
  <text x="521" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93370d">mergeclauses</text>
  <text x="521" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93370d">例如 a.k = b.k</text>
  <text x="521" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#93370d">用于同步有序流</text>

  <rect x="686" y="234" width="270" height="118" rx="8" fill="#f4f3ff" stroke="#7a5af8" stroke-width="2"/>
  <text x="821" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5925dc">Join Filter</text>
  <text x="821" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">join.joinqual</text>
  <text x="821" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4a1fb8">例如 a.ts &lt; b.ts</text>
  <text x="821" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4a1fb8">决定是否算匹配</text>

  <path d="M 221 354 L 385 428" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 521 354 L 520 426" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 821 354 L 655 428" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="282" y="430" width="476" height="76" rx="8" fill="#ecfdf3" stroke="#12b76a" stroke-width="2"/>
  <text x="520" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#027a48">组合候选 tuple，并执行 joinqual</text>
  <text x="520" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#05603a">inner join 中 joinqual 与 plan.qual 语义可交换，但执行展示仍会分栏</text>

  <path d="M 520 508 L 520 542" fill="none" stroke="#344054" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="318" y="544" width="404" height="42" rx="8" fill="#f9fafb" stroke="#98a2b3"/>
  <text x="520" y="571" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#344054">Filter / plan.qual：返回前最终过滤，例如 a.status = 'ok'</text>
</svg>
