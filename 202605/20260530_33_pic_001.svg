<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">LEFT OUTER JOIN 的逻辑模型</title>
  <desc id="desc">展示左表每一行如何先寻找右表匹配行，未匹配时补出右侧 NULL 列。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 600 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #5b6b7d; stroke-width: 1.4; rx: 8; }
    .left { fill: #eaf4ff; stroke: #3978b8; }
    .right { fill: #eef8f0; stroke: #3f8f55; }
    .result { fill: #fff7e6; stroke: #c37a13; }
    .null { fill: #f6f7f9; stroke: #9aa4b2; stroke-dasharray: 6 4; }
    .line { stroke: #3f4a5a; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .match { stroke: #2f7d45; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .miss { stroke: #9aa4b2; stroke-width: 1.8; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="20" width="872" height="480" class="box"/>
  <text x="48" y="58" class="title">LEFT OUTER JOIN = 匹配行对 + 左侧未匹配行的右侧 NULL 扩展</text>

  <text x="76" y="108" class="label">左表 orders</text>
  <rect x="56" y="128" width="210" height="58" class="left"/>
  <text x="78" y="162" class="text">o1: customer_id = 1</text>
  <rect x="56" y="196" width="210" height="58" class="left"/>
  <text x="78" y="230" class="text">o2: customer_id = 2</text>
  <rect x="56" y="264" width="210" height="58" class="left"/>
  <text x="78" y="298" class="text">o3: customer_id = 9</text>

  <text x="362" y="108" class="label">右表 customers</text>
  <rect x="338" y="128" width="226" height="58" class="right"/>
  <text x="360" y="162" class="text">c1: customer_id = 1</text>
  <rect x="338" y="196" width="226" height="58" class="right"/>
  <text x="360" y="230" class="text">c2: customer_id = 2</text>
  <rect x="338" y="264" width="226" height="58" class="right"/>
  <text x="360" y="298" class="text">c3: customer_id = 3</text>

  <text x="670" y="108" class="label">结果</text>
  <rect x="632" y="128" width="226" height="58" class="result"/>
  <text x="652" y="162" class="text">o1 + c1</text>
  <rect x="632" y="196" width="226" height="58" class="result"/>
  <text x="652" y="230" class="text">o2 + c2</text>
  <rect x="632" y="264" width="226" height="58" class="null"/>
  <text x="652" y="298" class="text">o3 + 右侧列 NULL</text>

  <path d="M266 157 C296 157, 306 157, 338 157" class="match"/>
  <path d="M266 225 C296 225, 306 225, 338 225" class="match"/>
  <path d="M266 293 C304 330, 512 330, 632 293" class="miss"/>
  <path d="M564 157 C596 157, 604 157, 632 157" class="line"/>
  <path d="M564 225 C596 225, 604 225, 632 225" class="line"/>

  <rect x="80" y="374" width="760" height="72" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="106" y="405" class="text">判断匹配只看 JOIN/ON 或 JOIN/USING 的 join condition 是否为 true。</text>
  <text x="106" y="432" class="small">右侧没有匹配行时，LEFT JOIN 仍输出左行；右表列由执行器用 null tuple slot 补成 NULL。</text>
</svg>
