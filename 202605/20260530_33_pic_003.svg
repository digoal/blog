<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">LEFT JOIN 执行器的 null-extension 状态</title>
  <desc id="desc">展示 Nested Loop、Hash Join、Merge Join 共同的 MatchedOuter 与 NullInnerTupleSlot 逻辑。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .state { fill: #eef5ff; stroke: #477cb8; rx: 8; }
    .decision { fill: #fff7e6; stroke: #c37a13; }
    .emit { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .null { fill: #f8f8fa; stroke: #929dac; stroke-dasharray: 6 4; rx: 8; }
    .drop { fill: #fff0f0; stroke: #c45b5b; rx: 8; }
    .arrow { stroke: #3f4a5a; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">执行器：joinqual 决定是否匹配，otherqual 决定是否返回</text>

  <rect x="70" y="98" width="220" height="58" class="state"/>
  <text x="92" y="132" class="text">读取一个 outer tuple</text>
  <path d="M290 127 L360 127" class="arrow"/>

  <rect x="360" y="98" width="230" height="58" class="state"/>
  <text x="382" y="132" class="text">寻找 inner 候选 tuple</text>
  <path d="M590 127 L660 127" class="arrow"/>

  <path d="M735 86 L820 127 L735 168 L650 127 Z" class="decision"/>
  <text x="690" y="132" class="label">joinqual 为 true?</text>

  <path d="M820 127 L884 127 L884 212 L822 212" class="arrow"/>
  <text x="836" y="116" class="small">是</text>
  <rect x="610" y="184" width="212" height="56" class="emit"/>
  <text x="632" y="218" class="text">MatchedOuter = true</text>
  <path d="M610 212 L548 212" class="arrow"/>
  <path d="M475 170 L555 212 L475 254 L395 212 Z" class="decision"/>
  <text x="430" y="217" class="label">otherqual 通过?</text>
  <path d="M395 212 L310 212" class="arrow"/>
  <rect x="100" y="184" width="210" height="56" class="emit"/>
  <text x="122" y="218" class="text">投影并返回 joined row</text>
  <path d="M475 254 L475 315" class="arrow"/>
  <rect x="370" y="316" width="210" height="56" class="drop"/>
  <text x="392" y="350" class="text">不返回；统计 Filter</text>

  <path d="M735 168 L735 300" class="arrow"/>
  <text x="746" y="216" class="small">否或没有候选</text>
  <path d="M735 300 L475 300 L475 340" class="arrow"/>
  <rect x="625" y="316" width="245" height="62" class="null"/>
  <text x="647" y="342" class="text">若 MatchedOuter = false</text>
  <text x="647" y="365" class="text">使用 NullInnerTupleSlot</text>
  <path d="M625 347 L580 347" class="arrow"/>

  <rect x="92" y="418" width="796" height="70" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="118" y="448" class="text">Nested Loop、Hash Join、Merge Join 的代码细节不同，但 LEFT JOIN 都需要保存“左行是否已经匹配”。</text>
  <text x="118" y="474" class="small">只有 joinqual 能把 MatchedOuter 置真；WHERE 来源的 otherqual 不能阻止补 NULL，只能阻止最终返回。</text>
</svg>
