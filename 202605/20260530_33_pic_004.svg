<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">LEFT JOIN 对优化器搜索空间的约束</title>
  <desc id="desc">说明 SpecialJoinInfo、nullable side 和合法 join 顺序检查如何限制外连接重排。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .left { fill: #eaf4ff; stroke: #3978b8; rx: 8; }
    .right { fill: #fff3e8; stroke: #c37a13; rx: 8; }
    .ok { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .bad { fill: #fff0f0; stroke: #c45b5b; rx: 8; }
    .meta { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">LEFT JOIN 不是普通内连接：nullable side 会限制重排</text>

  <rect x="74" y="108" width="200" height="82" class="left"/>
  <text x="100" y="142" class="label">A：保留侧</text>
  <text x="100" y="168" class="small">non-nullable side</text>
  <rect x="346" y="108" width="200" height="82" class="right"/>
  <text x="372" y="142" class="label">B：可补 NULL 侧</text>
  <text x="372" y="168" class="small">nullable side</text>
  <path d="M274 149 L346 149" class="arrow"/>
  <text x="288" y="132" class="small">A LEFT JOIN B</text>

  <rect x="642" y="96" width="230" height="110" class="meta"/>
  <text x="666" y="128" class="label">SpecialJoinInfo</text>
  <text x="666" y="154" class="small">min_lefthand = A</text>
  <text x="666" y="178" class="small">min_righthand = B</text>

  <rect x="88" y="270" width="330" height="76" class="ok"/>
  <text x="112" y="302" class="label">通常合法：先把 C 合到 A 侧</text>
  <text x="112" y="328" class="small">(A JOIN C) LEFT JOIN B，前提是谓词不依赖 B 的 NULL 扩展值</text>

  <rect x="550" y="270" width="330" height="76" class="bad"/>
  <text x="574" y="302" class="label">通常非法：把 inner join 推入 B 侧</text>
  <text x="574" y="328" class="small">A LEFT JOIN (B JOIN C) 可能改变未匹配左行的输出</text>

  <path d="M216 190 C216 224, 252 238, 252 270" class="arrow"/>
  <path d="M446 190 C446 224, 714 238, 714 270" class="arrow"/>

  <rect x="94" y="408" width="792" height="76" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="120" y="438" class="text">PostgreSQL 用 join_is_legal() 查询 SpecialJoinInfo，排除会破坏 LEFT JOIN 语义的 join order。</text>
  <text x="120" y="466" class="small">满足外连接恒等式且谓词 strict 时，某些 left join 可以重排；FULL JOIN 的重排最受限制。</text>
</svg>
