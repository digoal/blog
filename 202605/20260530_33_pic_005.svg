<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">LEFT JOIN 慢 SQL 的诊断路径</title>
  <desc id="desc">从语义、估算、物理算法和过滤位置四个方面诊断 left join 问题。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .warn { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .action { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">LEFT JOIN 诊断：先确认语义，再看计划</text>

  <rect x="70" y="96" width="250" height="74" class="node"/>
  <text x="94" y="126" class="label">1. 是否真的要保留左行？</text>
  <text x="94" y="150" class="small">右表条件在 ON 还是 WHERE</text>
  <path d="M320 133 L390 133" class="arrow"/>

  <rect x="390" y="96" width="250" height="74" class="warn"/>
  <text x="414" y="126" class="label">2. 行数估算是否偏离？</text>
  <text x="414" y="150" class="small">rows vs actual rows，MCV，NDV</text>
  <path d="M640 133 L710 133" class="arrow"/>

  <rect x="710" y="96" width="200" height="74" class="node"/>
  <text x="734" y="126" class="label">3. 物理算法是否合适？</text>
  <text x="734" y="150" class="small">Nested / Hash / Merge</text>

  <path d="M195 170 L195 242" class="arrow"/>
  <rect x="70" y="244" width="250" height="82" class="warn"/>
  <text x="94" y="274" class="label">Join Filter 很大</text>
  <text x="94" y="300" class="small">ON 条件太晚过滤，候选行对膨胀</text>

  <path d="M515 170 L515 242" class="arrow"/>
  <rect x="390" y="244" width="250" height="82" class="warn"/>
  <text x="414" y="274" class="label">Hash Batches / temp I/O</text>
  <text x="414" y="300" class="small">build 侧过大、work_mem 不足或倾斜</text>

  <path d="M810 170 L810 242" class="arrow"/>
  <rect x="710" y="244" width="200" height="82" class="warn"/>
  <text x="734" y="274" class="label">Nested Loop 放大</text>
  <text x="734" y="300" class="small">outer 行数低估，inner 重扫过多</text>

  <rect x="90" y="392" width="800" height="82" class="action"/>
  <text x="116" y="424" class="label">行动顺序</text>
  <text x="116" y="450" class="text">EXPLAIN (ANALYZE, BUFFERS) → 修正语义位置 → ANALYZE/扩展统计 → 建索引或调整 SQL 形状。</text>
  <text x="116" y="474" class="small">不要先调 enable_*join；那适合验证假设，不适合当长期修复。</text>
</svg>
