<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">RIGHT OUTER JOIN 的逻辑模型</title>
  <desc id="desc">展示右表每一行如何先寻找左表匹配行，未匹配时补出左侧 NULL 列。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 600 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #5b6b7d; stroke-width: 1.4; rx: 8; }
    .left { fill: #eaf4ff; stroke: #3978b8; }
    .right { fill: #eef8f0; stroke: #3f8f55; }
    .result { fill: #fff7e6; stroke: #c37a13; }
    .null { fill: #f6f7f9; stroke: #9aa4b2; stroke-dasharray: 6 4; }
    .line { stroke: #3f4a5a; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .match { stroke: #2f7d45; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .miss { stroke: #9aa4b2; stroke-width: 1.8; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="20" width="872" height="480" class="box"/>
  <text x="48" y="58" class="title">RIGHT OUTER JOIN = 匹配行对 + 右侧未匹配行的左侧 NULL 扩展</text>

  <text x="72" y="108" class="label">左表 shipments</text>
  <rect x="56" y="128" width="226" height="58" class="left"/>
  <text x="76" y="162" class="text">s1: order_id = 1</text>
  <rect x="56" y="196" width="226" height="58" class="left"/>
  <text x="76" y="230" class="text">s2: order_id = 2</text>
  <rect x="56" y="264" width="226" height="58" class="left"/>
  <text x="76" y="298" class="text">s3: order_id = 4</text>

  <text x="364" y="108" class="label">右表 orders</text>
  <rect x="342" y="128" width="226" height="58" class="right"/>
  <text x="362" y="162" class="text">o1: order_id = 1</text>
  <rect x="342" y="196" width="226" height="58" class="right"/>
  <text x="362" y="230" class="text">o2: order_id = 2</text>
  <rect x="342" y="264" width="226" height="58" class="right"/>
  <text x="362" y="298" class="text">o3: order_id = 3</text>

  <text x="670" y="108" class="label">结果</text>
  <rect x="632" y="128" width="226" height="58" class="result"/>
  <text x="652" y="162" class="text">s1 + o1</text>
  <rect x="632" y="196" width="226" height="58" class="result"/>
  <text x="652" y="230" class="text">s2 + o2</text>
  <rect x="632" y="264" width="226" height="58" class="null"/>
  <text x="652" y="298" class="text">左侧列 NULL + o3</text>

  <path d="M282 157 C310 157, 316 157, 342 157" class="match"/>
  <path d="M282 225 C310 225, 316 225, 342 225" class="match"/>
  <path d="M568 157 C598 157, 604 157, 632 157" class="line"/>
  <path d="M568 225 C598 225, 604 225, 632 225" class="line"/>
  <path d="M568 293 C600 330, 612 330, 632 293" class="miss"/>

  <rect x="80" y="374" width="760" height="72" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="106" y="405" class="text">判断匹配只看 JOIN/ON 或 JOIN/USING 的 join condition 是否为 true。</text>
  <text x="106" y="432" class="small">左侧没有匹配行时，RIGHT JOIN 仍输出右行；左表列由执行器用 null tuple slot 补成 NULL。</text>
</svg>
