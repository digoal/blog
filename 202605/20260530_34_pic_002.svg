<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">RIGHT JOIN 与 LEFT JOIN 的等价改写</title>
  <desc id="desc">说明 RIGHT JOIN 是交换输入后的 LEFT JOIN，PostgreSQL 优化器也会在特殊连接信息中按 LEFT JOIN 处理。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .panel { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .sql { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .keep { fill: #eef8f0; stroke: #3f8f55; rx: 8; }
    .swap { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.7; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="912" height="500" class="panel"/>
  <text x="48" y="58" class="title">RIGHT JOIN 的实用心法：把“要保留的一侧”放到 LEFT JOIN 左边</text>

  <rect x="80" y="108" width="330" height="118" class="sql"/>
  <text x="106" y="140" class="label">写法 A：RIGHT JOIN</text>
  <text x="106" y="172" class="text">shipments s RIGHT JOIN orders o</text>
  <text x="106" y="198" class="small">保留右侧 orders</text>

  <rect x="550" y="108" width="330" height="118" class="sql"/>
  <text x="576" y="140" class="label">写法 B：等价 LEFT JOIN</text>
  <text x="576" y="172" class="text">orders o LEFT JOIN shipments s</text>
  <text x="576" y="198" class="small">保留左侧 orders</text>

  <path d="M410 167 C456 167, 492 167, 550 167" class="arrow"/>
  <rect x="435" y="130" width="90" height="42" class="swap"/>
  <text x="457" y="156" class="text">交换输入</text>

  <rect x="124" y="298" width="270" height="82" class="keep"/>
  <text x="150" y="330" class="label">SQL 语义</text>
  <text x="150" y="356" class="small">右侧未匹配行保留，左侧补 NULL</text>

  <rect x="568" y="298" width="270" height="82" class="keep"/>
  <text x="594" y="330" class="label">优化器内部</text>
  <text x="594" y="356" class="small">SpecialJoinInfo 不保留 JOIN_RIGHT</text>

  <path d="M480 226 L480 420" class="arrow"/>
  <rect x="248" y="424" width="464" height="56" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="276" y="458" class="text">PostgreSQL 可翻转 RIGHT JOIN 为 LEFT JOIN，再在路径/计划阶段按成本选择输入方向。</text>
</svg>
