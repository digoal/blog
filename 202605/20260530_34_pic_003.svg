<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">RIGHT JOIN 中 ON 与 WHERE 的语义差异</title>
  <desc id="desc">比较左表过滤条件放在 ON 和 WHERE 中时，右侧保留行是否被删除。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .panel { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .step { fill: #f4f7fb; stroke: #aab4c0; rx: 7; }
    .keep { fill: #eaf7ee; stroke: #3e8f55; rx: 7; }
    .drop { fill: #fff0f0; stroke: #c45b5b; rx: 7; }
    .null { fill: #f8f8fa; stroke: #929dac; stroke-dasharray: 6 4; rx: 7; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="912" height="500" class="panel"/>
  <text x="48" y="58" class="title">RIGHT JOIN 中，左表条件的位置决定是否保留右行</text>

  <rect x="58" y="92" width="390" height="376" class="panel"/>
  <text x="84" y="128" class="label">条件在 ON：保留右行</text>
  <rect x="88" y="154" width="300" height="50" class="step"/>
  <text x="110" y="184" class="text">ON: s.order_id = o.order_id AND s.done = true</text>
  <path d="M238 204 L238 236" class="arrow"/>
  <rect x="88" y="238" width="300" height="50" class="null"/>
  <text x="110" y="268" class="text">左侧不满足条件，不算匹配</text>
  <path d="M238 288 L238 320" class="arrow"/>
  <rect x="88" y="322" width="300" height="50" class="keep"/>
  <text x="110" y="352" class="text">输出：左侧 NULL + 右表行</text>
  <text x="86" y="412" class="small">ON 决定“是否匹配”；失败后仍可能保留右侧行。</text>

  <rect x="512" y="92" width="390" height="376" class="panel"/>
  <text x="538" y="128" class="label">条件在 WHERE：可能删掉右行</text>
  <rect x="542" y="154" width="300" height="50" class="step"/>
  <text x="564" y="184" class="text">ON: s.order_id = o.order_id</text>
  <path d="M692 204 L692 236" class="arrow"/>
  <rect x="542" y="238" width="300" height="50" class="null"/>
  <text x="564" y="268" class="text">未匹配右行先补左侧 NULL</text>
  <path d="M692 288 L692 320" class="arrow"/>
  <rect x="542" y="322" width="300" height="50" class="drop"/>
  <text x="564" y="352" class="text">WHERE s.done = true 不为 true，删除</text>
  <text x="540" y="412" class="small">WHERE 在 null-extension 后执行；左侧列为 NULL 时普通比较不通过。</text>
</svg>
