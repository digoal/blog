<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">RIGHT JOIN 执行器的左侧补 NULL 逻辑</title>
  <desc id="desc">展示 Hash Join 和 Merge Join 如何用 NullOuterTupleSlot 输出未匹配右侧行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .state { fill: #eef5ff; stroke: #477cb8; rx: 8; }
    .decision { fill: #fff7e6; stroke: #c37a13; }
    .emit { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .null { fill: #f8f8fa; stroke: #929dac; stroke-dasharray: 6 4; rx: 8; }
    .warn { fill: #fff0f0; stroke: #c45b5b; rx: 8; }
    .arrow { stroke: #3f4a5a; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">执行器：未匹配右侧行用 NullOuterTupleSlot 补左侧 NULL</text>

  <rect x="70" y="104" width="230" height="62" class="state"/>
  <text x="94" y="132" class="text">右侧保留输入参与匹配</text>
  <text x="94" y="154" class="small">SQL 语义中的 RHS</text>
  <path d="M300 135 L370 135" class="arrow"/>

  <path d="M470 94 L568 135 L470 176 L372 135 Z" class="decision"/>
  <text x="425" y="140" class="label">joinqual 为 true?</text>
  <path d="M568 135 L650 135" class="arrow"/>
  <text x="590" y="124" class="small">是</text>
  <rect x="650" y="107" width="230" height="56" class="emit"/>
  <text x="674" y="141" class="text">输出真实左右行组合</text>

  <path d="M470 176 L470 248" class="arrow"/>
  <text x="482" y="214" class="small">否</text>
  <rect x="340" y="250" width="260" height="62" class="null"/>
  <text x="364" y="276" class="text">设置 outer tuple = NULL</text>
  <text x="364" y="299" class="text">保留 inner/right tuple</text>
  <path d="M470 312 L470 374" class="arrow"/>
  <path d="M470 374 L650 374" class="arrow"/>
  <rect x="650" y="346" width="230" height="56" class="emit"/>
  <text x="674" y="380" class="text">输出左侧 NULL + 右行</text>

  <rect x="82" y="358" width="246" height="84" class="warn"/>
  <text x="108" y="390" class="label">Nested Loop 限制</text>
  <text x="108" y="416" class="small">nodeNestloop.c 只为 LEFT/ANTI</text>
  <text x="108" y="438" class="small">准备 NullInnerTupleSlot</text>

  <rect x="92" y="474" width="796" height="50" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="118" y="505" class="small">Hash Join 和 Merge Join 有 NullOuterTupleSlot；Merge Right Join 对非 mergejoinable 的额外 joinqual 有执行器限制。</text>
</svg>
