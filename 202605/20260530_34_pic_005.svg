<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">RIGHT JOIN 的诊断与改写路径</title>
  <desc id="desc">从保留侧、等价改写、过滤位置和物理计划四个步骤诊断 right join 问题。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .warn { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .action { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">RIGHT JOIN 诊断：先改写成 LEFT JOIN 再分析</text>

  <rect x="70" y="96" width="230" height="74" class="node"/>
  <text x="94" y="126" class="label">1. 谁是保留侧？</text>
  <text x="94" y="150" class="small">RIGHT JOIN 的右表必须完整</text>
  <path d="M300 133 L370 133" class="arrow"/>

  <rect x="370" y="96" width="240" height="74" class="action"/>
  <text x="394" y="126" class="label">2. 交换输入改写</text>
  <text x="394" y="150" class="small">R RIGHT JOIN K → K LEFT JOIN R</text>
  <path d="M610 133 L680 133" class="arrow"/>

  <rect x="680" y="96" width="230" height="74" class="node"/>
  <text x="704" y="126" class="label">3. 检查条件位置</text>
  <text x="704" y="150" class="small">可补 NULL 侧条件在 ON/WHERE?</text>

  <path d="M185 170 L185 246" class="arrow"/>
  <rect x="70" y="248" width="230" height="82" class="warn"/>
  <text x="94" y="278" class="label">可读性风险</text>
  <text x="94" y="304" class="small">读者要反向理解“右侧保留”</text>

  <path d="M490 170 L490 246" class="arrow"/>
  <rect x="370" y="248" width="240" height="82" class="warn"/>
  <text x="394" y="278" class="label">计划可能翻转</text>
  <text x="394" y="304" class="small">EXPLAIN 名称不等于 SQL 文本方向</text>

  <path d="M795 170 L795 246" class="arrow"/>
  <rect x="680" y="248" width="230" height="82" class="warn"/>
  <text x="704" y="278" class="label">过滤误删保留行</text>
  <text x="704" y="304" class="small">WHERE 左侧列会删补 NULL 行</text>

  <rect x="90" y="396" width="800" height="84" class="action"/>
  <text x="116" y="428" class="label">行动顺序</text>
  <text x="116" y="454" class="text">语义改写为 LEFT JOIN → EXPLAIN ANALYZE → 查估算偏差、Hash/Merge 条件和 Filter 位置。</text>
  <text x="116" y="478" class="small">长期代码优先保留 LEFT JOIN 写法；RIGHT JOIN 更适合临时阅读反向关系。</text>
</svg>
