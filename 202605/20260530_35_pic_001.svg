<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" role="img" aria-labelledby="title desc">
  <title id="title">FULL OUTER JOIN 的逻辑模型</title>
  <desc id="desc">展示 FULL JOIN 输出匹配行、左侧未匹配行和右侧未匹配行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 600 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #5b6b7d; stroke-width: 1.4; rx: 8; }
    .left { fill: #eaf4ff; stroke: #3978b8; }
    .right { fill: #eef8f0; stroke: #3f8f55; }
    .result { fill: #fff7e6; stroke: #c37a13; }
    .null { fill: #f6f7f9; stroke: #9aa4b2; stroke-dasharray: 6 4; }
    .match { stroke: #2f7d45; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .miss { stroke: #9aa4b2; stroke-width: 1.8; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="20" width="892" height="500" class="box"/>
  <text x="48" y="58" class="title">FULL OUTER JOIN = 匹配行对 + 两侧未匹配行</text>

  <text x="72" y="108" class="label">左表 ledger_a</text>
  <rect x="56" y="128" width="220" height="58" class="left"/>
  <text x="76" y="162" class="text">a1: txn_id = 1</text>
  <rect x="56" y="196" width="220" height="58" class="left"/>
  <text x="76" y="230" class="text">a2: txn_id = 2</text>
  <rect x="56" y="264" width="220" height="58" class="left"/>
  <text x="76" y="298" class="text">a4: txn_id = 4</text>

  <text x="364" y="108" class="label">右表 ledger_b</text>
  <rect x="342" y="128" width="220" height="58" class="right"/>
  <text x="362" y="162" class="text">b1: txn_id = 1</text>
  <rect x="342" y="196" width="220" height="58" class="right"/>
  <text x="362" y="230" class="text">b3: txn_id = 3</text>
  <rect x="342" y="264" width="220" height="58" class="right"/>
  <text x="362" y="298" class="text">b4: txn_id = 4</text>

  <text x="674" y="108" class="label">结果</text>
  <rect x="632" y="118" width="240" height="50" class="result"/>
  <text x="652" y="149" class="text">a1 + b1</text>
  <rect x="632" y="176" width="240" height="50" class="null"/>
  <text x="652" y="207" class="text">a2 + 右侧 NULL</text>
  <rect x="632" y="234" width="240" height="50" class="null"/>
  <text x="652" y="265" class="text">左侧 NULL + b3</text>
  <rect x="632" y="292" width="240" height="50" class="result"/>
  <text x="652" y="323" class="text">a4 + b4</text>

  <path d="M276 157 C304 157, 316 157, 342 157" class="match"/>
  <path d="M276 293 C304 293, 316 293, 342 293" class="match"/>
  <path d="M562 157 C600 140, 606 140, 632 143" class="match"/>
  <path d="M276 225 C420 358, 600 230, 632 201" class="miss"/>
  <path d="M562 225 C596 228, 608 244, 632 259" class="miss"/>
  <path d="M562 293 C600 320, 608 320, 632 317" class="match"/>

  <rect x="84" y="390" width="772" height="72" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="110" y="421" class="text">FULL JOIN 的输出下限不是某一侧，而是两侧 key 并集对应的行集合。</text>
  <text x="110" y="448" class="small">匹配行输出真实左右列；左侧未匹配补右侧 NULL；右侧未匹配补左侧 NULL。</text>
</svg>
