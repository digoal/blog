<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">FULL JOIN 对优化器的约束</title>
  <desc id="desc">说明 FULL JOIN 不被扁平化和重排，并且需要可 hash 或 merge 的连接条件。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .lock { fill: #fff0f0; stroke: #c45b5b; rx: 8; }
    .ok { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">FULL JOIN 是优化器的硬边界</text>

  <rect x="84" y="112" width="230" height="84" class="node"/>
  <text x="110" y="146" class="label">普通 inner/left join</text>
  <text x="110" y="172" class="small">可在合法范围内扁平化和重排</text>

  <rect x="374" y="112" width="230" height="84" class="lock"/>
  <text x="400" y="146" class="label">FULL JOIN 节点</text>
  <text x="400" y="172" class="small">不 flatten，不尝试重排</text>

  <rect x="664" y="112" width="230" height="84" class="node"/>
  <text x="690" y="146" class="label">上层 join 搜索</text>
  <text x="690" y="172" class="small">把 FULL JOIN 结果当作子问题</text>

  <path d="M314 154 L374 154" class="arrow"/>
  <path d="M604 154 L664 154" class="arrow"/>

  <rect x="120" y="286" width="300" height="78" class="ok"/>
  <text x="146" y="318" class="label">可行条件</text>
  <text x="146" y="344" class="small">hash-joinable 或 merge-joinable join condition</text>

  <rect x="560" y="286" width="300" height="78" class="lock"/>
  <text x="586" y="318" class="label">不可行条件</text>
  <text x="586" y="344" class="small">非 hash/merge 条件可能直接报错</text>

  <rect x="94" y="424" width="792" height="66" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="120" y="454" class="text">PostgreSQL 当前不尝试重排 FULL JOIN；joinrels.c 在无有效路径时会报出明确错误。</text>
  <text x="120" y="478" class="small">这和 inner join 的自由搜索空间完全不同，也是 full join 调优的核心边界。</text>
</svg>
