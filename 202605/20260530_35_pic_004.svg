<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">FULL JOIN 执行器的双向补 NULL 状态</title>
  <desc id="desc">展示 Hash Join 和 Merge Join 在 FULL JOIN 中同时输出左侧和右侧未匹配行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .state { fill: #eef5ff; stroke: #477cb8; rx: 8; }
    .decision { fill: #fff7e6; stroke: #c37a13; }
    .emit { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .null { fill: #f8f8fa; stroke: #929dac; stroke-dasharray: 6 4; rx: 8; }
    .arrow { stroke: #3f4a5a; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">执行器：FULL JOIN 要分别输出两侧未匹配行</text>

  <rect x="70" y="100" width="220" height="62" class="state"/>
  <text x="94" y="128" class="text">读取左右候选行</text>
  <text x="94" y="150" class="small">Hash 或 Merge 定位</text>
  <path d="M290 131 L360 131" class="arrow"/>

  <path d="M462 90 L560 131 L462 172 L364 131 Z" class="decision"/>
  <text x="418" y="136" class="label">joinqual 匹配?</text>
  <path d="M560 131 L650 131" class="arrow"/>
  <rect x="650" y="103" width="230" height="56" class="emit"/>
  <text x="674" y="137" class="text">输出真实左右行组合</text>

  <path d="M462 172 L462 236" class="arrow"/>
  <rect x="332" y="238" width="260" height="58" class="null"/>
  <text x="356" y="272" class="text">左侧未匹配：右侧 NULL</text>
  <path d="M462 296 L462 350" class="arrow"/>
  <rect x="332" y="352" width="260" height="58" class="null"/>
  <text x="356" y="386" class="text">右侧未匹配：左侧 NULL</text>

  <rect x="88" y="448" width="794" height="66" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="114" y="478" class="text">Hash Join 初始化 hj_NullOuterTupleSlot 和 hj_NullInnerTupleSlot；Merge Join 设置 FillOuter 和 FillInner。</text>
  <text x="114" y="502" class="small">Nested Loop 不适合承载这种双向补 NULL 状态；FULL JOIN 主要依赖 Hash/Merge 计划。</text>
</svg>
