<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">FULL JOIN 对账诊断路径</title>
  <desc id="desc">从对账目标、条件位置、执行计划和结果分类四步诊断 FULL JOIN 查询。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .warn { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .action { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">FULL JOIN 诊断：把结果分成三类再调优</text>

  <rect x="70" y="96" width="220" height="74" class="node"/>
  <text x="94" y="126" class="label">1. 明确对账 key</text>
  <text x="94" y="150" class="small">唯一性、NULL、粒度</text>
  <path d="M290 133 L360 133" class="arrow"/>

  <rect x="360" y="96" width="240" height="74" class="warn"/>
  <text x="384" y="126" class="label">2. 检查 ON/WHERE</text>
  <text x="384" y="150" class="small">差异条件不要误删缺失行</text>
  <path d="M600 133 L670 133" class="arrow"/>

  <rect x="670" y="96" width="240" height="74" class="node"/>
  <text x="694" y="126" class="label">3. 看 Hash/Merge 计划</text>
  <text x="694" y="150" class="small">条件是否可 hash/merge</text>

  <rect x="90" y="250" width="240" height="78" class="action"/>
  <text x="116" y="282" class="label">匹配且一致</text>
  <text x="116" y="308" class="small">a.key IS NOT NULL AND b.key IS NOT NULL</text>

  <rect x="370" y="250" width="240" height="78" class="warn"/>
  <text x="396" y="282" class="label">只在左侧</text>
  <text x="396" y="308" class="small">b.key IS NULL</text>

  <rect x="650" y="250" width="240" height="78" class="warn"/>
  <text x="676" y="282" class="label">只在右侧</text>
  <text x="676" y="308" class="small">a.key IS NULL</text>

  <rect x="94" y="408" width="792" height="76" class="action"/>
  <text x="120" y="440" class="label">行动顺序</text>
  <text x="120" y="466" class="text">先保证 key 粒度一行一键，再 FULL JOIN 分三类，最后用 EXPLAIN 查估算、内存和临时 I/O。</text>
</svg>
