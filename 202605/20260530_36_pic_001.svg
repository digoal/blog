<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" role="img" aria-labelledby="title desc">
  <title id="title">CROSS JOIN 的笛卡尔积模型</title>
  <desc id="desc">展示左表 N 行与右表 M 行组合后输出 N 乘 M 行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 600 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #5b6b7d; stroke-width: 1.4; rx: 8; }
    .left { fill: #eaf4ff; stroke: #3978b8; }
    .right { fill: #eef8f0; stroke: #3f8f55; }
    .result { fill: #fff7e6; stroke: #c37a13; }
    .line { stroke: #3f4a5a; stroke-width: 1.3; fill: none; marker-end: url(#arrow); opacity: .7; }
  </style>
  <rect x="24" y="20" width="892" height="500" class="box"/>
  <text x="48" y="58" class="title">CROSS JOIN = 每个左行与每个右行组合</text>

  <text x="78" y="112" class="label">左表 colors: N = 3</text>
  <rect x="72" y="136" width="170" height="48" class="left"/>
  <text x="96" y="166" class="text">red</text>
  <rect x="72" y="196" width="170" height="48" class="left"/>
  <text x="96" y="226" class="text">green</text>
  <rect x="72" y="256" width="170" height="48" class="left"/>
  <text x="96" y="286" class="text">blue</text>

  <text x="350" y="112" class="label">右表 sizes: M = 2</text>
  <rect x="344" y="156" width="170" height="48" class="right"/>
  <text x="368" y="186" class="text">S</text>
  <rect x="344" y="236" width="170" height="48" class="right"/>
  <text x="368" y="266" class="text">L</text>

  <text x="648" y="112" class="label">结果: N * M = 6</text>
  <rect x="620" y="132" width="220" height="42" class="result"/>
  <text x="644" y="159" class="text">red, S</text>
  <rect x="620" y="182" width="220" height="42" class="result"/>
  <text x="644" y="209" class="text">red, L</text>
  <rect x="620" y="232" width="220" height="42" class="result"/>
  <text x="644" y="259" class="text">green, S</text>
  <rect x="620" y="282" width="220" height="42" class="result"/>
  <text x="644" y="309" class="text">green, L</text>
  <rect x="620" y="332" width="220" height="42" class="result"/>
  <text x="644" y="359" class="text">blue, S</text>
  <rect x="620" y="382" width="220" height="42" class="result"/>
  <text x="644" y="409" class="text">blue, L</text>

  <path d="M242 160 C292 160, 300 180, 344 180" class="line"/>
  <path d="M242 160 C292 160, 300 260, 344 260" class="line"/>
  <path d="M242 220 C292 220, 300 180, 344 180" class="line"/>
  <path d="M242 220 C292 220, 300 260, 344 260" class="line"/>
  <path d="M242 280 C292 280, 300 180, 344 180" class="line"/>
  <path d="M242 280 C292 280, 300 260, 344 260" class="line"/>

  <rect x="86" y="452" width="768" height="46" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="112" y="481" class="small">PostgreSQL 官方文档：如果两表分别有 N 和 M 行，CROSS JOIN 输出 N * M 行。</text>
</svg>
