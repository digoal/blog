<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">CROSS JOIN 在 PostgreSQL parser 中的表示</title>
  <desc id="desc">说明 CROSS JOIN 被解析为 JOIN_INNER 且没有 quals。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 17px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .panel { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .code { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .warn { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="912" height="500" class="panel"/>
  <text x="48" y="58" class="title">CROSS JOIN 在解析树里是无条件 INNER JOIN</text>

  <rect x="74" y="114" width="260" height="88" class="code"/>
  <text x="98" y="148" class="label">SQL 文本</text>
  <text x="98" y="176" class="text">a CROSS JOIN b</text>
  <path d="M334 158 L420 158" class="arrow"/>

  <rect x="420" y="114" width="240" height="88" class="code"/>
  <text x="444" y="148" class="label">JoinExpr</text>
  <text x="444" y="176" class="text">jointype = JOIN_INNER</text>
  <path d="M660 158 L744 158" class="arrow"/>

  <rect x="744" y="114" width="150" height="88" class="warn"/>
  <text x="768" y="148" class="label">quals</text>
  <text x="768" y="176" class="text">NULL</text>

  <rect x="104" y="284" width="752" height="94" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="132" y="320" class="text">`INNER JOIN ... ON TRUE` 和 `CROSS JOIN` 语义等价，但 parser 路径不同。</text>
  <text x="132" y="350" class="small">`gram.y` 注释：CROSS JOIN is same as unqualified inner join；`parse_clause.c` 注释：CROSS JOIN: no quals。</text>
</svg>
