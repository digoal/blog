<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">优化器如何处理无连接条件的 join</title>
  <desc id="desc">展示 PostgreSQL 优先连接有 join clause 的关系，必要时才生成 clauseless Cartesian-product join。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .ok { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .warn { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">Join 搜索：有条件优先，无条件才笛卡尔积</text>

  <rect x="72" y="110" width="230" height="74" class="node"/>
  <text x="96" y="140" class="label">当前 RelOptInfo</text>
  <text x="96" y="164" class="small">是否有可用 join clause?</text>
  <path d="M302 147 L382 147" class="arrow"/>

  <rect x="382" y="96" width="250" height="74" class="ok"/>
  <text x="406" y="126" class="label">有 join clause</text>
  <text x="406" y="150" class="small">make_rels_by_clause_joins()</text>
  <path d="M632 133 L710 133" class="arrow"/>

  <rect x="710" y="96" width="200" height="74" class="ok"/>
  <text x="734" y="126" class="label">生成候选路径</text>
  <text x="734" y="150" class="small">Nested/Hash/Merge</text>

  <path d="M187 184 L187 270" class="arrow"/>
  <rect x="72" y="272" width="260" height="80" class="warn"/>
  <text x="96" y="304" class="label">没有 join clause</text>
  <text x="96" y="330" class="small">make_rels_by_clauseless_joins()</text>
  <path d="M332 312 L430 312" class="arrow"/>

  <rect x="430" y="272" width="260" height="80" class="warn"/>
  <text x="454" y="304" class="label">生成笛卡尔积候选</text>
  <text x="454" y="330" class="small">通常成本随 rowsA * rowsB 放大</text>
  <path d="M690 312 L790 312" class="arrow"/>

  <rect x="790" y="272" width="120" height="80" class="warn"/>
  <text x="814" y="304" class="label">风险</text>
  <text x="814" y="330" class="small">结果爆炸</text>

  <rect x="94" y="432" width="792" height="62" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="120" y="462" class="text">优化器不会因为 CROSS JOIN 就替你补条件；它只能在无条件语义下选择较低成本的执行路径。</text>
</svg>
