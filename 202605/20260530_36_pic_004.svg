<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">CROSS JOIN 的基数和成本放大</title>
  <desc id="desc">展示多张表 cross join 时行数按乘法增长，以及后续过滤晚执行的风险。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .warn { fill: #fff0f0; stroke: #c45b5b; rx: 8; }
    .ok { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">基数估算：笛卡尔积先乘，再按过滤选择率缩小</text>

  <rect x="80" y="112" width="160" height="68" class="node"/>
  <text x="110" y="142" class="label">A</text>
  <text x="110" y="164" class="small">1,000 行</text>
  <path d="M240 146 L320 146" class="arrow"/>
  <rect x="320" y="112" width="160" height="68" class="node"/>
  <text x="350" y="142" class="label">B</text>
  <text x="350" y="164" class="small">10,000 行</text>
  <path d="M480 146 L560 146" class="arrow"/>
  <rect x="560" y="112" width="260" height="68" class="warn"/>
  <text x="590" y="142" class="label">A CROSS JOIN B</text>
  <text x="590" y="164" class="small">10,000,000 候选行</text>

  <rect x="106" y="272" width="280" height="76" class="warn"/>
  <text x="132" y="304" class="label">过滤写晚了</text>
  <text x="132" y="330" class="small">先形成巨大候选，再 Filter</text>
  <path d="M386 310 L510 310" class="arrow"/>
  <rect x="510" y="272" width="340" height="76" class="ok"/>
  <text x="536" y="304" class="label">更好的形状</text>
  <text x="536" y="330" class="small">先限制输入行数，或明确 join key</text>

  <rect x="94" y="430" width="792" height="64" fill="#f8fafc" stroke="#c7d0db" rx="8"/>
  <text x="120" y="460" class="text">PostgreSQL costsize.c 的 join 行数估算基线是 outer_rows * inner_rows * selectivity。</text>
  <text x="120" y="484" class="small">CROSS JOIN 没有 join selectivity 条件，乘法放大是语义本身，不是优化器缺陷。</text>
</svg>
