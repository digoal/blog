<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">CROSS JOIN 查询诊断路径</title>
  <desc id="desc">从意图、输入规模、计划形态和防护策略诊断 cross join 查询。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455160"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 16px sans-serif; fill: #263241; }
    .text { font: 15px sans-serif; fill: #2f3b4b; }
    .small { font: 13px sans-serif; fill: #526070; }
    .box { fill: #ffffff; stroke: #667587; stroke-width: 1.4; rx: 8; }
    .node { fill: #f4f7fb; stroke: #aab4c0; rx: 8; }
    .warn { fill: #fff7e6; stroke: #c37a13; rx: 8; }
    .bad { fill: #fff0f0; stroke: #c45b5b; rx: 8; }
    .action { fill: #eaf7ee; stroke: #3f8f55; rx: 8; }
    .arrow { stroke: #455160; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="24" y="20" width="932" height="520" class="box"/>
  <text x="48" y="58" class="title">CROSS JOIN 诊断：先问“是否有意产生组合”</text>

  <rect x="70" y="96" width="230" height="74" class="node"/>
  <text x="94" y="126" class="label">1. 是否有意?</text>
  <text x="94" y="150" class="small">组合生成 vs 漏条件</text>
  <path d="M300 133 L370 133" class="arrow"/>

  <rect x="370" y="96" width="240" height="74" class="warn"/>
  <text x="394" y="126" class="label">2. 输入规模</text>
  <text x="394" y="150" class="small">N * M 是否可接受</text>
  <path d="M610 133 L680 133" class="arrow"/>

  <rect x="680" y="96" width="230" height="74" class="node"/>
  <text x="704" y="126" class="label">3. 看计划</text>
  <text x="704" y="150" class="small">Nested Loop / Materialize</text>

  <rect x="90" y="252" width="240" height="80" class="action"/>
  <text x="116" y="284" class="label">有意组合</text>
  <text x="116" y="310" class="small">先过滤维表、限制行数</text>

  <rect x="370" y="252" width="240" height="80" class="bad"/>
  <text x="396" y="284" class="label">漏 join key</text>
  <text x="396" y="310" class="small">改为 INNER JOIN ... ON</text>

  <rect x="650" y="252" width="240" height="80" class="warn"/>
  <text x="676" y="284" class="label">生成测试数据</text>
  <text x="676" y="310" class="small">用 LIMIT 和 batch 控制</text>

  <rect x="94" y="410" width="792" height="76" class="action"/>
  <text x="120" y="442" class="label">行动顺序</text>
  <text x="120" y="468" class="text">确认意图 → 估算 N*M → EXPLAIN ANALYZE → 把过滤前置或补上 join condition。</text>
</svg>
