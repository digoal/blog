<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Semi Join 的逻辑模型</title>
  <desc id="desc">左表订单经过右表支付记录的存在性检查后，只输出左表中存在匹配的行，右表列不会进入结果。</desc>
  <style>
    .bg { fill: #f7fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .head { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.2; }
    .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    .match { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .drop { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .out { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #475569; }
    .title { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="520"/>
  <text class="title" x="40" y="42">Semi Join：右侧只负责证明“存在”，结果只保留左侧行</text>

  <rect class="panel" x="40" y="78" width="250" height="300"/>
  <rect class="head" x="58" y="102" width="214" height="42"/>
  <text class="text" x="78" y="129">orders 左表</text>
  <rect class="match" x="58" y="160" width="214" height="44"/>
  <text class="small" x="78" y="188">o1  customer=10</text>
  <rect class="drop" x="58" y="214" width="214" height="44"/>
  <text class="small" x="78" y="242">o2  customer=20</text>
  <rect class="match" x="58" y="268" width="214" height="44"/>
  <text class="small" x="78" y="296">o3  customer=10</text>

  <rect class="panel" x="365" y="78" width="250" height="300"/>
  <rect class="head" x="383" y="102" width="214" height="42"/>
  <text class="text" x="403" y="129">payments 右表</text>
  <rect class="row" x="383" y="160" width="214" height="44"/>
  <text class="small" x="403" y="188">p1  customer=10</text>
  <rect class="row" x="383" y="214" width="214" height="44"/>
  <text class="small" x="403" y="242">p2  customer=10</text>
  <rect class="row" x="383" y="268" width="214" height="44"/>
  <text class="small" x="403" y="296">p3  customer=30</text>

  <path class="dash" d="M272 182 C320 150 330 160 383 182"/>
  <path class="dash" d="M272 290 C330 315 335 250 383 236"/>
  <text class="tiny" x="300" y="126">找到任意一条匹配即可</text>
  <text class="tiny" x="300" y="340">右表重复匹配不放大左表</text>

  <path class="arrow" d="M630 228 L710 228"/>
  <text class="small" x="650" y="205">输出</text>

  <rect class="panel" x="740" y="108" width="180" height="210"/>
  <rect class="head" x="758" y="132" width="144" height="42"/>
  <text class="text" x="780" y="159">结果</text>
  <rect class="out" x="758" y="190" width="144" height="44"/>
  <text class="small" x="777" y="218">o1</text>
  <rect class="out" x="758" y="244" width="144" height="44"/>
  <text class="small" x="777" y="272">o3</text>

  <rect class="drop" x="70" y="410" width="820" height="64"/>
  <text class="small" x="96" y="437">核心差异：Inner Join 会输出匹配行对，右表两条匹配会让 o1 变两行；Semi Join 只问“是否至少一条匹配”。</text>
  <text class="small" x="96" y="462">SQL 常见入口：EXISTS、IN、= ANY；PostgreSQL 内部使用 JOIN_SEMI 表达这种关系算子。</text>
</svg>
