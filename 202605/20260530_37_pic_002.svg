<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Semi Join 规划管线</title>
  <desc id="desc">从 SQL 子查询到 JOIN_SEMI 的规划过程，包括 SubLink、pull_up_sublinks、SpecialJoinInfo、路径生成和计划节点。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .blue { fill: #e0f2fe; stroke: #0284c7; }
    .green { fill: #dcfce7; stroke: #16a34a; }
    .yellow { fill: #fef9c3; stroke: #ca8a04; }
    .red { fill: #fee2e2; stroke: #dc2626; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .title { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="42" y="44">从 SQL 子查询到 JOIN_SEMI：能拉平才进入 Join 搜索空间</text>

  <rect class="box blue" x="50" y="86" width="210" height="96"/>
  <text class="text" x="72" y="122">SQL 表达式</text>
  <text class="small" x="72" y="150">EXISTS (...) / IN (...)</text>
  <text class="small" x="72" y="171">= ANY (...)</text>

  <rect class="box blue" x="330" y="86" width="220" height="96"/>
  <text class="text" x="352" y="122">解析后 SubLink</text>
  <text class="small" x="352" y="150">EXISTS_SUBLINK</text>
  <text class="small" x="352" y="171">ANY_SUBLINK</text>

  <rect class="box green" x="620" y="86" width="280" height="96"/>
  <text class="text" x="642" y="122">pull_up_sublinks()</text>
  <text class="small" x="642" y="150">只处理顶层 WHERE / JOIN ON</text>
  <text class="small" x="642" y="171">受 NULL、外连接边界和 volatile 限制</text>

  <path class="arrow" d="M260 134 L330 134"/>
  <path class="arrow" d="M550 134 L620 134"/>

  <rect class="box yellow" x="120" y="252" width="245" height="112"/>
  <text class="text" x="144" y="288">JoinExpr</text>
  <text class="small" x="144" y="316">jointype = JOIN_SEMI</text>
  <text class="small" x="144" y="338">quals = 子查询 WHERE / testexpr</text>

  <rect class="box yellow" x="435" y="252" width="245" height="112"/>
  <text class="text" x="459" y="288">SpecialJoinInfo</text>
  <text class="small" x="459" y="316">min_lefthand / min_righthand</text>
  <text class="small" x="459" y="338">semi_can_btree / semi_can_hash</text>

  <rect class="box green" x="750" y="252" width="185" height="112"/>
  <text class="text" x="774" y="288">Join 搜索</text>
  <text class="small" x="774" y="316">join_is_legal()</text>
  <text class="small" x="774" y="338">add_paths_to_joinrel()</text>

  <path class="arrow" d="M760 182 C760 222 260 216 245 252"/>
  <path class="arrow" d="M365 308 L435 308"/>
  <path class="arrow" d="M680 308 L750 308"/>

  <rect class="box blue" x="150" y="430" width="200" height="76"/>
  <text class="text" x="173" y="462">Nested Loop Semi</text>
  <text class="small" x="173" y="486">内侧可参数化索引时常见</text>

  <rect class="box blue" x="390" y="430" width="200" height="76"/>
  <text class="text" x="413" y="462">Hash Semi</text>
  <text class="small" x="413" y="486">批量等值存在性过滤</text>

  <rect class="box blue" x="630" y="430" width="200" height="76"/>
  <text class="text" x="653" y="462">Merge Semi</text>
  <text class="small" x="653" y="486">两侧有序或可排序</text>

  <path class="thin" d="M842 364 C810 405 270 392 250 430"/>
  <path class="thin" d="M842 364 C820 405 500 397 490 430"/>
  <path class="thin" d="M842 364 C830 402 735 398 730 430"/>

  <rect class="box red" x="44" y="204" width="858" height="34"/>
  <text class="small" x="66" y="227">不能拉平时，仍可能以 SubPlan / hashed SubPlan 执行；这不是 JOIN_SEMI 路径搜索。</text>
</svg>
