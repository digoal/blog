<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Semi Join 的执行和成本关键点</title>
  <desc id="desc">展示 Semi Join 对每个外侧行找到首个内侧匹配后即可停止，并说明 outer_match_frac 与 match_count 对成本估算的意义。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .match { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .scan { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
    .stop { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
    .miss { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .title { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="42" y="44">执行器优化：每个外侧行只需要证明“至少一条匹配”</text>

  <rect class="box" x="54" y="86" width="245" height="356"/>
  <text class="text" x="82" y="122">外侧输入</text>
  <rect class="scan" x="82" y="154" width="185" height="48"/>
  <text class="small" x="105" y="184">outer row A</text>
  <rect class="scan" x="82" y="226" width="185" height="48"/>
  <text class="small" x="105" y="256">outer row B</text>
  <rect class="scan" x="82" y="298" width="185" height="48"/>
  <text class="small" x="105" y="328">outer row C</text>

  <rect class="box" x="384" y="86" width="255" height="356"/>
  <text class="text" x="416" y="122">内侧探测 / 扫描</text>
  <rect class="scan" x="416" y="154" width="185" height="38"/>
  <text class="small" x="438" y="179">检查 candidate 1</text>
  <rect class="match" x="416" y="198" width="185" height="38"/>
  <text class="small" x="438" y="223">找到匹配</text>
  <rect class="stop" x="416" y="242" width="185" height="38"/>
  <text class="small" x="438" y="267">停止本轮内侧扫描</text>
  <rect class="scan" x="416" y="318" width="185" height="38"/>
  <text class="small" x="438" y="343">检查全部候选</text>
  <rect class="miss" x="416" y="362" width="185" height="38"/>
  <text class="small" x="438" y="387">没有匹配，丢弃外侧行</text>

  <path class="arrow" d="M267 178 L416 178"/>
  <path class="arrow" d="M267 250 L416 250"/>
  <path class="arrow" d="M267 322 L416 342"/>

  <rect class="box" x="704" y="104" width="220" height="286"/>
  <text class="text" x="730" y="140">成本修正因子</text>
  <rect class="match" x="730" y="168" width="168" height="54"/>
  <text class="small" x="746" y="191">outer_match_frac</text>
  <text class="small" x="746" y="211">外侧有匹配的比例</text>
  <rect class="stop" x="730" y="246" width="168" height="54"/>
  <text class="small" x="746" y="269">match_count</text>
  <text class="small" x="746" y="289">有匹配时平均匹配数</text>
  <rect class="scan" x="730" y="324" width="168" height="44"/>
  <text class="small" x="746" y="351">影响 NL / Hash 成本</text>

  <path class="thin" d="M602 217 C670 202 680 194 730 195"/>
  <path class="thin" d="M602 263 C675 270 685 272 730 273"/>

  <rect class="box" x="76" y="468" width="828" height="52"/>
  <text class="small" x="100" y="492">PostgreSQL 在 compute_semi_anti_join_factors() 中同时估算 SEMI/ANTI 选择率和普通 inner join 选择率。</text>
  <text class="small" x="100" y="512">执行节点中 JOIN_SEMI 或 inner_unique 会设置 single_match，首个匹配后进入下一个外侧行。</text>
</svg>
