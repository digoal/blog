<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Semi Join 与相邻写法对比</title>
  <desc id="desc">比较 Semi Join、Inner Join 加 DISTINCT、SubPlan 和 Anti Join 在输出、重复行、NULL 和优化器空间上的差异。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .semi { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .inner { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
    .sub { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; }
    .anti { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #475569; }
    .title { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="42" y="44">同样像“筛选左表”，语义和代价并不一样</text>

  <rect class="box" x="50" y="88" width="200" height="96"/>
  <text class="text" x="76" y="124">需求</text>
  <text class="small" x="76" y="153">找出有支付记录的订单</text>
  <text class="small" x="76" y="174">只要订单列</text>

  <rect class="semi" x="330" y="70" width="250" height="112"/>
  <text class="text" x="356" y="106">Semi Join</text>
  <text class="small" x="356" y="134">EXISTS / IN 可拉平</text>
  <text class="small" x="356" y="156">输出左侧行，不被右侧重复放大</text>

  <rect class="inner" x="330" y="214" width="250" height="112"/>
  <text class="text" x="356" y="250">Inner Join + DISTINCT</text>
  <text class="small" x="356" y="278">先组合匹配行对</text>
  <text class="small" x="356" y="300">再去重，可能多做很多工作</text>

  <rect class="sub" x="330" y="358" width="250" height="112"/>
  <text class="text" x="356" y="394">SubPlan / hashed SubPlan</text>
  <text class="small" x="356" y="422">不能拉平或选择不拉平时使用</text>
  <text class="small" x="356" y="444">仍是布尔表达式求值路径</text>

  <rect class="anti" x="670" y="214" width="250" height="112"/>
  <text class="text" x="696" y="250">Anti Join</text>
  <text class="small" x="696" y="278">NOT EXISTS 常见入口</text>
  <text class="small" x="696" y="300">NOT IN 受 NULL 语义限制</text>

  <path class="arrow" d="M250 136 L330 126"/>
  <path class="arrow" d="M250 136 C288 180 295 246 330 270"/>
  <path class="arrow" d="M250 136 C295 240 290 380 330 414"/>
  <path class="arrow" d="M580 270 L670 270"/>

  <rect class="box" x="668" y="70" width="254" height="112"/>
  <text class="text" x="696" y="106">判断标准</text>
  <text class="tiny" x="696" y="132">需要右侧列？用普通 join</text>
  <text class="tiny" x="696" y="153">只问存在？优先 EXISTS / IN</text>
  <text class="tiny" x="696" y="174">否定存在？优先 NOT EXISTS</text>

  <rect class="box" x="668" y="358" width="254" height="112"/>
  <text class="text" x="696" y="394">线上诊断</text>
  <text class="tiny" x="696" y="420">看 EXPLAIN 是否出现 Semi Join</text>
  <text class="tiny" x="696" y="441">看估算行数与实际行数偏差</text>
  <text class="tiny" x="696" y="462">看 Hash Batches / 内侧索引条件</text>
</svg>
