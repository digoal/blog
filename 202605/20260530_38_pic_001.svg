<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Anti Join 的逻辑模型</title>
  <desc id="desc">展示左表订单与右表支付记录做反连接时，只输出在右表没有匹配的左表行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="490" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Anti Join：保留左侧无匹配行</text>

  <g>
    <text x="105" y="105" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">orders 左表</text>
    <rect x="60" y="130" width="250" height="52" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="85" y="162" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">order_id=1, customer=10</text>
    <rect x="60" y="198" width="250" height="52" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="85" y="230" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">order_id=2, customer=20</text>
    <rect x="60" y="266" width="250" height="52" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="85" y="298" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">order_id=3, customer=10</text>
    <rect x="60" y="334" width="250" height="52" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="85" y="366" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">order_id=4, customer=30</text>
  </g>

  <g>
    <text x="410" y="105" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">payments 右表</text>
    <rect x="365" y="130" width="250" height="52" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="390" y="162" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">customer=10, success</text>
    <rect x="365" y="198" width="250" height="52" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="390" y="230" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">customer=10, retry</text>
    <rect x="365" y="266" width="250" height="52" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="390" y="298" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">customer=40, success</text>
  </g>

  <line x1="310" y1="156" x2="365" y2="156" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="310" y1="292" x2="365" y2="156" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="335" y="125" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">匹配则丢弃左行</text>

  <line x1="310" y1="224" x2="690" y2="224" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="310" y1="360" x2="690" y2="360" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <text x="735" y="105" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">输出</text>
    <rect x="690" y="198" width="230" height="52" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="715" y="230" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">order_id=2, customer=20</text>
    <rect x="690" y="334" width="230" height="52" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="715" y="366" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">order_id=4, customer=30</text>
  </g>

  <rect x="90" y="440" width="800" height="58" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="490" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#111827">A ANTI JOIN B ON A.k = B.k</text>
  <text x="490" y="491" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">输出满足“不存在任何匹配右侧行”的左侧行；右侧列不参与结果。</text>
</svg>
