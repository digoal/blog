<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Anti Join 规划管线</title>
  <desc id="desc">展示 NOT EXISTS、NOT IN、LEFT JOIN IS NULL 进入 PostgreSQL 优化器后可能被改写为 JOIN_ANTI 的主要路径和限制。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1040" height="600" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="540" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">从 SQL 到 JOIN_ANTI</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <rect x="60" y="110" width="250" height="70" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="185" y="138" text-anchor="middle" font-weight="700">NOT EXISTS</text>
    <text x="185" y="164" text-anchor="middle">NOT (EXISTS_SUBLINK)</text>

    <rect x="60" y="250" width="250" height="82" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="185" y="278" text-anchor="middle" font-weight="700">NOT IN / NOT = ANY</text>
    <text x="185" y="304" text-anchor="middle">NOT (ANY_SUBLINK)</text>
    <text x="185" y="324" text-anchor="middle" font-size="14" fill="#92400e">必须证明 NULL 安全</text>

    <rect x="60" y="410" width="250" height="82" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="185" y="438" text-anchor="middle" font-weight="700">LEFT JOIN ... IS NULL</text>
    <text x="185" y="464" text-anchor="middle">nullable side 被强制为 NULL</text>
    <text x="185" y="484" text-anchor="middle" font-size="14" fill="#166534">匹配行中该列必须非空</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <rect x="410" y="95" width="275" height="105" rx="6" fill="#f9fafb" stroke="#9ca3af"/>
    <text x="548" y="124" text-anchor="middle" font-weight="700">pull_up_sublinks()</text>
    <text x="548" y="151" text-anchor="middle">prepjointree.c</text>
    <text x="548" y="176" text-anchor="middle" font-size="14" fill="#4b5563">顶层 WHERE / JOIN ON 条件</text>

    <rect x="410" y="235" width="275" height="120" rx="6" fill="#f9fafb" stroke="#9ca3af"/>
    <text x="548" y="264" text-anchor="middle" font-weight="700">convert_*_sublink_to_join()</text>
    <text x="548" y="291" text-anchor="middle">subselect.c</text>
    <text x="548" y="316" text-anchor="middle" font-size="14" fill="#4b5563">检查外层变量、volatile、WITH、NULL</text>
    <text x="548" y="338" text-anchor="middle" font-size="14" fill="#4b5563">成功则构造 JoinExpr</text>

    <rect x="410" y="410" width="275" height="105" rx="6" fill="#f9fafb" stroke="#9ca3af"/>
    <text x="548" y="439" text-anchor="middle" font-weight="700">reduce_outer_joins()</text>
    <text x="548" y="466" text-anchor="middle">prepjointree.c</text>
    <text x="548" y="491" text-anchor="middle" font-size="14" fill="#4b5563">JOIN_LEFT 降强度为 JOIN_ANTI</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <rect x="785" y="210" width="235" height="100" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="903" y="241" text-anchor="middle" font-weight="700">JoinExpr.jointype</text>
    <text x="903" y="270" text-anchor="middle">JOIN_ANTI</text>
    <text x="903" y="294" text-anchor="middle" font-size="14" fill="#991b1b">只输出左侧无匹配行</text>

    <rect x="785" y="380" width="235" height="110" rx="6" fill="#eef2ff" stroke="#6366f1"/>
    <text x="903" y="411" text-anchor="middle" font-weight="700">路径选择</text>
    <text x="903" y="438" text-anchor="middle">Hash / Merge / Nested Loop</text>
    <text x="903" y="464" text-anchor="middle" font-size="14" fill="#4338ca">SpecialJoinInfo 约束 join order</text>
  </g>

  <line x1="310" y1="145" x2="410" y2="145" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="291" x2="410" y2="291" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="451" x2="410" y2="451" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="295" x2="785" y2="260" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="462" x2="785" y2="260" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="903" y1="310" x2="903" y2="380" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="540" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">不能安全改写时，仍可能保留 SubPlan 或 hashed SubPlan 执行。</text>
</svg>
