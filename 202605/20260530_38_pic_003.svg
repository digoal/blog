<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Anti Join 执行器状态</title>
  <desc id="desc">展示 Hash、Nested Loop、Merge Anti Join 共同的语义：当前外侧行一旦找到匹配就丢弃，扫描完仍无匹配才输出。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1040" height="580" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="540" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">执行语义：匹配即丢弃，无匹配才输出</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <rect x="70" y="120" width="210" height="74" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="175" y="149" text-anchor="middle" font-weight="700">取一行外侧 tuple</text>
    <text x="175" y="174" text-anchor="middle">outer row</text>

    <rect x="390" y="105" width="270" height="104" rx="6" fill="#f9fafb" stroke="#9ca3af"/>
    <text x="525" y="135" text-anchor="middle" font-weight="700">查找内侧匹配</text>
    <text x="525" y="162" text-anchor="middle">Hash bucket / index probe</text>
    <text x="525" y="186" text-anchor="middle">或 Merge key group</text>

    <path d="M775,110 L950,155 L775,200 L600,155 Z" fill="#fef3c7" stroke="#d97706"/>
    <text x="775" y="151" text-anchor="middle" font-weight="700">joinqual</text>
    <text x="775" y="174" text-anchor="middle">是否有匹配?</text>

    <rect x="690" y="295" width="220" height="76" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="800" y="326" text-anchor="middle" font-weight="700">有匹配</text>
    <text x="800" y="351" text-anchor="middle">丢弃当前外侧行</text>

    <rect x="390" y="430" width="270" height="86" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="525" y="462" text-anchor="middle" font-weight="700">内侧扫描结束仍无匹配</text>
    <text x="525" y="490" text-anchor="middle">返回 null-extended 投影中的左侧行</text>

    <rect x="70" y="430" width="210" height="86" rx="6" fill="#eef2ff" stroke="#6366f1"/>
    <text x="175" y="462" text-anchor="middle" font-weight="700">下一行外侧 tuple</text>
    <text x="175" y="490" text-anchor="middle">继续循环</text>
  </g>

  <line x1="280" y1="157" x2="390" y2="157" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="157" x2="600" y2="157" stroke="#4b5563" stroke-width="2.5"/>
  <line x1="660" y1="157" x2="600" y2="157" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="775" y1="200" x2="800" y2="295" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="834" y="250" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">yes</text>
  <line x1="695" y1="202" x2="575" y2="430" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="610" y="304" font-family="Arial, sans-serif" font-size="15" fill="#166534">no after full probe</text>
  <line x1="690" y1="333" x2="280" y2="473" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="473" x2="280" y2="473" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="105" y="550" width="870" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="540" y="573" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">nodeHashjoin.c、nodeNestloop.c、nodeMergejoin.c 都在 JOIN_ANTI 分支中跳过已匹配行。</text>
</svg>
