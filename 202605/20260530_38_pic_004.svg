<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">NOT IN 转 Anti Join 的 NULL 安全边界</title>
  <desc id="desc">展示 NOT IN 在右侧存在 NULL 时结果为 unknown，不等价于反连接；只有两侧表达式都可证明非空且操作符安全时才可转为 anti join。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1040" height="580" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="540" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">NOT IN 不是天然 Anti Join</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <rect x="70" y="105" width="420" height="170" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="280" y="137" text-anchor="middle" font-size="20" font-weight="700">不安全：右侧可能有 NULL</text>
    <text x="105" y="178">左侧：id = 2</text>
    <text x="105" y="208">右侧集合：(1, NULL)</text>
    <text x="105" y="238">2 NOT IN (1, NULL) = UNKNOWN</text>
    <text x="105" y="262" fill="#991b1b">WHERE 不保留 UNKNOWN 行</text>

    <rect x="590" y="105" width="420" height="170" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="800" y="137" text-anchor="middle" font-size="20" font-weight="700">安全：两侧可证明非空</text>
    <text x="625" y="178">左侧：id int NOT NULL</text>
    <text x="625" y="208">右侧：id int NOT NULL 或 WHERE id IS NOT NULL</text>
    <text x="625" y="238">操作符非 NULL 输入不会返回 NULL</text>
    <text x="625" y="262" fill="#166534">可改写为 JOIN_ANTI</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <rect x="150" y="350" width="250" height="74" rx="6" fill="#f9fafb" stroke="#9ca3af"/>
    <text x="275" y="380" text-anchor="middle" font-weight="700">保持 SubPlan</text>
    <text x="275" y="405" text-anchor="middle">hashed SubPlan 或逐行求值</text>

    <rect x="415" y="350" width="250" height="74" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="540" y="380" text-anchor="middle" font-weight="700">证明条件</text>
    <text x="540" y="405" text-anchor="middle">表达式非空 + 输出非空 + 操作符安全</text>

    <rect x="680" y="350" width="250" height="74" rx="6" fill="#eef2ff" stroke="#6366f1"/>
    <text x="805" y="380" text-anchor="middle" font-weight="700">生成 Anti Join</text>
    <text x="805" y="405" text-anchor="middle">Hash / Merge / Nested Loop</text>
  </g>

  <line x1="280" y1="275" x2="275" y2="350" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="275" x2="805" y2="350" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="665" y1="387" x2="680" y2="387" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="387" x2="415" y2="387" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="95" y="500" width="890" height="54" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="540" y="523" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">PostgreSQL 19 源码中 convert_ANY_sublink_to_join() 在 under_not 时会检查这些条件。</text>
  <text x="540" y="546" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">这也是 NOT EXISTS 通常比 NOT IN 更少踩 NULL 语义坑的原因。</text>
</svg>
