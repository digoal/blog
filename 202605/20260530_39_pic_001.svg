<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">LATERAL JOIN 的逻辑模型</title>
  <desc id="desc">展示左侧订单行如何逐行向右侧 LATERAL 子查询提供参数，并把每次子查询返回的行拼接到结果中。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
    .head { fill: #e2e8f0; stroke: #334155; stroke-width: 1.5; }
    .row { fill: #fefce8; stroke: #a16207; stroke-width: 1.3; }
    .sub { fill: #ecfeff; stroke: #0e7490; stroke-width: 1.5; }
    .out { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #334155; }
    .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 17px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="560"/>
  <text class="text" x="42" y="48">LATERAL 的本质：右侧 FROM 项可以引用左侧已经产生的行</text>

  <rect class="panel" x="45" y="85" width="250" height="365"/>
  <rect class="head" x="45" y="85" width="250" height="48"/>
  <text class="text" x="76" y="117">orders o</text>
  <rect class="row" x="70" y="160" width="200" height="58"/>
  <text class="mono" x="88" y="195">o.id=101, user=7</text>
  <rect class="row" x="70" y="245" width="200" height="58"/>
  <text class="mono" x="88" y="280">o.id=102, user=8</text>
  <rect class="row" x="70" y="330" width="200" height="58"/>
  <text class="mono" x="88" y="365">o.id=103, user=7</text>

  <rect class="sub" x="390" y="135" width="320" height="260"/>
  <text class="text" x="425" y="176">LATERAL 子查询</text>
  <text class="mono" x="420" y="220">SELECT *</text>
  <text class="mono" x="420" y="250">FROM payments p</text>
  <text class="mono" x="420" y="280">WHERE p.order_id = o.id</text>
  <text class="mono" x="420" y="310">ORDER BY p.created_at DESC</text>
  <text class="mono" x="420" y="340">LIMIT 1</text>
  <text class="small" x="420" y="375">每个 o 行都会触发一次带参数求值</text>

  <rect class="panel" x="800" y="105" width="250" height="315"/>
  <rect class="head" x="800" y="105" width="250" height="48"/>
  <text class="text" x="838" y="137">输出行</text>
  <rect class="out" x="825" y="180" width="200" height="50"/>
  <text class="mono" x="842" y="211">101 + latest pay</text>
  <rect class="out" x="825" y="250" width="200" height="50"/>
  <text class="mono" x="842" y="281">102 + NULL/pay</text>
  <rect class="out" x="825" y="320" width="200" height="50"/>
  <text class="mono" x="842" y="351">103 + latest pay</text>

  <path class="arrow" d="M 270 189 C 320 188, 340 190, 390 205"/>
  <path class="arrow" d="M 270 274 C 323 273, 348 270, 390 263"/>
  <path class="arrow" d="M 270 359 C 325 357, 347 340, 390 324"/>
  <path class="arrow" d="M 710 260 C 742 260, 765 260, 800 260"/>
  <text class="small" x="318" y="145">传入当前外侧行的值</text>
  <text class="small" x="735" y="238">拼接返回行</text>

  <rect x="80" y="480" width="940" height="40" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="105" y="506">CROSS JOIN LATERAL：无右侧行则丢弃外侧行；LEFT JOIN LATERAL：无右侧行也保留外侧行并补 NULL。</text>
</svg>
