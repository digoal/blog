<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 中 LATERAL 从解析到执行计划的路径</title>
  <desc id="desc">展示 PostgreSQL 处理 LATERAL 的主要阶段：解析可见性、记录 lateral 依赖、生成参数化路径、创建 NestLoopParam、执行时重扫内侧计划。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 9; }
    .parser { fill: #eff6ff; }
    .planner { fill: #f0fdf4; }
    .executor { fill: #fff7ed; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 25px; font-weight: 700; fill: #0f172a; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 19px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="620"/>
  <text class="title" x="40" y="48">PostgreSQL 处理 LATERAL 的主路径</text>

  <rect class="box parser" x="45" y="95" width="300" height="150"/>
  <text class="text" x="75" y="128">1. 解析 FROM 项</text>
  <text class="small" x="75" y="164">左到右处理 FROM 列表</text>
  <text class="code" x="75" y="195">transformFromClause()</text>
  <text class="code" x="75" y="218">p_lateral_active</text>

  <rect class="box parser" x="430" y="95" width="300" height="150"/>
  <text class="text" x="460" y="128">2. 建立 RTE 标记</text>
  <text class="small" x="460" y="164">显式 LATERAL 或函数隐式引用</text>
  <text class="code" x="460" y="195">RangeTblEntry.lateral</text>
  <text class="code" x="460" y="218">contain_vars_of_level()</text>

  <rect class="box planner" x="815" y="95" width="300" height="150"/>
  <text class="text" x="845" y="128">3. 计算依赖集合</text>
  <text class="small" x="845" y="164">哪些关系必须在外侧先出现</text>
  <text class="code" x="845" y="195">create_lateral_join_info()</text>
  <text class="code" x="845" y="218">lateral_relids</text>

  <rect class="box planner" x="240" y="330" width="300" height="150"/>
  <text class="text" x="270" y="363">4. 生成参数化路径</text>
  <text class="small" x="270" y="399">内侧路径携带 required_outer</text>
  <text class="code" x="270" y="430">ParamPathInfo</text>
  <text class="code" x="270" y="453">PATH_REQ_OUTER(path)</text>

  <rect class="box planner" x="625" y="330" width="300" height="150"/>
  <text class="text" x="655" y="363">5. 生成 NestLoop 计划</text>
  <text class="small" x="655" y="399">外侧 Var 替换成 PARAM_EXEC</text>
  <text class="code" x="655" y="430">replace_nestloop_params()</text>
  <text class="code" x="655" y="453">NestLoopParam</text>

  <rect class="box executor" x="815" y="520" width="300" height="70"/>
  <text class="text" x="845" y="550">6. 执行时逐外侧行重扫内侧</text>
  <text class="code" x="845" y="575">ExecNestLoop()</text>

  <path class="arrow" d="M 345 170 L 430 170"/>
  <path class="arrow" d="M 730 170 L 815 170"/>
  <path class="arrow" d="M 965 245 C 965 292, 594 310, 540 352"/>
  <path class="arrow" d="M 540 405 L 625 405"/>
  <path class="arrow" d="M 775 480 C 800 506, 830 522, 865 538"/>

  <rect x="52" y="510" width="640" height="70" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="75" y="538">关键约束：被 LATERAL 引用的关系必须先可用；携带外部参数的路径最终只能放到能提供参数的 Nested Loop 内侧。</text>
  <text class="small" x="75" y="566">因此 LATERAL 既是语义能力，也是优化器搜索空间的约束。</text>
</svg>
