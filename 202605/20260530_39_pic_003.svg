<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="610" viewBox="0 0 1160 610" role="img" aria-labelledby="title desc">
  <title id="title">LATERAL Top-N per group 模式</title>
  <desc id="desc">对比全局窗口排序与 LATERAL LIMIT 模式的执行代价形态，说明有合适复合索引时 LATERAL 可以为每个外侧键做小范围索引查找。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
    .left { fill: #fef2f2; stroke: #b91c1c; }
    .right { fill: #ecfdf5; stroke: #047857; }
    .index { fill: #e0f2fe; stroke: #0369a1; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 25px; font-weight: 700; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #334155; }
    .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1160" height="610"/>
  <text class="title" x="42" y="48">每组取 Top-N：窗口函数与 LATERAL 的代价形态不同</text>

  <rect class="panel left" x="55" y="95" width="480" height="390"/>
  <text class="text" x="90" y="132">写法 A：窗口函数</text>
  <text class="code" x="90" y="170">row_number() over (partition by user_id</text>
  <text class="code" x="90" y="194">                    order by created_at desc)</text>
  <rect x="90" y="235" width="380" height="46" fill="#fee2e2" stroke="#b91c1c"/>
  <text class="small" x="110" y="265">扫描 orders/payment 大集合</text>
  <path class="arrow" d="M 280 282 L 280 325"/>
  <rect x="90" y="325" width="380" height="46" fill="#fee2e2" stroke="#b91c1c"/>
  <text class="small" x="110" y="355">按 user_id 分区排序或增量排序</text>
  <path class="arrow" d="M 280 372 L 280 415"/>
  <rect x="90" y="415" width="380" height="46" fill="#fee2e2" stroke="#b91c1c"/>
  <text class="small" x="110" y="445">过滤 rn &lt;= N</text>

  <rect class="panel right" x="625" y="95" width="480" height="390"/>
  <text class="text" x="660" y="132">写法 B：LATERAL + LIMIT</text>
  <text class="code" x="660" y="170">users u</text>
  <text class="code" x="660" y="194">LEFT JOIN LATERAL (... WHERE user_id=u.id</text>
  <text class="code" x="660" y="218">ORDER BY created_at DESC LIMIT N) p ON true</text>
  <rect x="660" y="248" width="165" height="50" fill="#dcfce7" stroke="#047857"/>
  <text class="small" x="685" y="280">取一个 user</text>
  <path class="arrow" d="M 825 273 L 900 273"/>
  <rect class="index" x="900" y="235" width="155" height="76"/>
  <text class="small" x="922" y="265">复合索引</text>
  <text class="code" x="916" y="292">(user_id, ts desc)</text>
  <path class="arrow" d="M 978 312 L 978 360"/>
  <rect x="820" y="360" width="235" height="52" fill="#dcfce7" stroke="#047857"/>
  <text class="small" x="842" y="392">只读该 user 的前 N 条</text>

  <rect x="80" y="525" width="1000" height="48" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="105" y="556">结论：LATERAL 不是总更快。只有外侧键较少、内侧有选择性索引、N 很小、并且全局排序代价高时，它才常常胜出。</text>
</svg>
