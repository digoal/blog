<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">LATERAL 参数化路径与 Memoize 缓存</title>
  <desc id="desc">展示外侧行重复参数值时，PostgreSQL 可以在 Nested Loop 内侧使用 Memoize 缓存参数化扫描结果，减少重复索引查找。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 9; }
    .outer { fill: #fefce8; stroke: #a16207; }
    .memo { fill: #ede9fe; stroke: #6d28d9; }
    .scan { fill: #e0f2fe; stroke: #0369a1; }
    .hit { fill: #dcfce7; stroke: #047857; }
    .miss { fill: #fee2e2; stroke: #b91c1c; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 25px; font-weight: 700; fill: #0f172a; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #334155; }
    .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <text class="title" x="42" y="48">参数值重复时，Memoize 可以缓解 LATERAL 的重复内侧扫描</text>

  <rect class="box outer" x="60" y="95" width="235" height="345"/>
  <text class="text" x="95" y="130">外侧 t1 行</text>
  <text class="code" x="100" y="180">twenty = 3</text>
  <text class="code" x="100" y="220">twenty = 7</text>
  <text class="code" x="100" y="260">twenty = 3</text>
  <text class="code" x="100" y="300">twenty = 9</text>
  <text class="code" x="100" y="340">twenty = 7</text>
  <text class="small" x="95" y="392">参数值存在重复</text>

  <rect class="box memo" x="415" y="115" width="285" height="305"/>
  <text class="text" x="455" y="150">Memoize</text>
  <text class="code" x="455" y="188">Cache Key: t1.twenty</text>
  <rect class="miss" x="455" y="225" width="185" height="42"/>
  <text class="small" x="480" y="252">3 第一次：miss</text>
  <rect class="miss" x="455" y="280" width="185" height="42"/>
  <text class="small" x="480" y="307">7 第一次：miss</text>
  <rect class="hit" x="455" y="335" width="185" height="42"/>
  <text class="small" x="480" y="362">3 第二次：hit</text>

  <rect class="box scan" x="820" y="150" width="235" height="210"/>
  <text class="text" x="858" y="185">内侧扫描</text>
  <text class="code" x="850" y="230">Index Only Scan</text>
  <text class="code" x="850" y="260">Index Cond:</text>
  <text class="code" x="850" y="288">unique1 = $PARAM</text>
  <text class="small" x="850" y="325">miss 时才真正访问索引</text>

  <path class="arrow" d="M 295 267 L 415 267"/>
  <path class="arrow" d="M 700 267 L 820 267"/>
  <path class="arrow" d="M 820 325 C 735 465, 510 470, 455 380"/>
  <text class="small" x="320" y="245">PARAM_EXEC</text>
  <text class="small" x="720" y="245">未命中</text>
  <text class="small" x="600" y="475">结果写回缓存</text>

  <rect x="75" y="485" width="970" height="42" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="100" y="512">回归测试 `memoize.sql` 展示了 LATERAL 查询下的 Nested Loop + Memoize + Index Only Scan 形态。</text>
</svg>
