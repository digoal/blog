<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="590" viewBox="0 0 1120 590" role="img" aria-labelledby="title desc">
  <title id="title">LATERAL JOIN 的适用边界</title>
  <desc id="desc">用决策树展示何时适合使用 LATERAL JOIN，何时应考虑普通 JOIN、窗口函数、聚合或预计算。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .q { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .yes { fill: #dcfce7; stroke: #047857; stroke-width: 2; rx: 8; }
    .no { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .alt { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 25px; font-weight: 700; fill: #0f172a; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="590"/>
  <text class="title" x="42" y="48">是否应该使用 LATERAL JOIN？</text>

  <rect class="q" x="390" y="85" width="340" height="72"/>
  <text class="text" x="425" y="128">右侧计算是否依赖左侧当前行？</text>

  <rect class="alt" x="80" y="210" width="300" height="86"/>
  <text class="text" x="115" y="245">否</text>
  <text class="small" x="115" y="274">优先普通 JOIN、聚合或窗口函数</text>

  <rect class="q" x="515" y="210" width="360" height="86"/>
  <text class="text" x="550" y="245">是：每个外侧键内侧结果是否很小？</text>
  <text class="small" x="550" y="274">例如 LIMIT 1 / LIMIT N / SRF 小集合</text>

  <rect class="no" x="320" y="360" width="330" height="90"/>
  <text class="text" x="355" y="394">否</text>
  <text class="small" x="355" y="423">Nested Loop 会放大内侧扫描</text>

  <rect class="q" x="750" y="360" width="320" height="90"/>
  <text class="text" x="785" y="394">是否有匹配索引或低成本函数？</text>
  <text class="small" x="785" y="423">能按参数快速定位</text>

  <rect class="yes" x="770" y="495" width="300" height="62"/>
  <text class="text" x="805" y="533">适合试用 LATERAL 并验证计划</text>

  <rect class="no" x="410" y="495" width="300" height="62"/>
  <text class="text" x="445" y="533">不适合：先建索引或改写</text>

  <path class="arrow" d="M 450 157 L 300 210"/>
  <path class="arrow" d="M 620 157 L 655 210"/>
  <path class="arrow" d="M 630 296 L 525 360"/>
  <path class="arrow" d="M 775 296 L 870 360"/>
  <path class="arrow" d="M 850 450 L 655 495"/>
  <path class="arrow" d="M 940 450 L 940 495"/>
  <text class="small" x="337" y="184">否</text>
  <text class="small" x="655" y="184">是</text>
  <text class="small" x="575" y="336">否</text>
  <text class="small" x="818" y="336">是</text>
  <text class="small" x="700" y="484">否</text>
  <text class="small" x="955" y="484">是</text>
</svg>
