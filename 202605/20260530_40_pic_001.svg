<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">GroupAggregate 逻辑模型</title>
  <desc id="desc">展示输入行按分组键连续排列后，GroupAggregate 如何把每个连续分组压缩成一行聚合结果。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .row { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; rx: 5; }
    .groupA { fill: #dbeafe; stroke: #2563eb; }
    .groupB { fill: #dcfce7; stroke: #16a34a; }
    .groupC { fill: #fee2e2; stroke: #dc2626; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .small { font-size: 14px; }
    .label { font-size: 17px; font-weight: 700; }
    .title { font-size: 22px; font-weight: 800; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="32" y="38" class="title">输入必须按 GROUP BY 键连续排列</text>
  <rect x="30" y="70" width="310" height="280" class="box"/>
  <text x="52" y="102" class="label">排序后的输入流</text>
  <rect x="58" y="125" width="238" height="32" class="row groupA"/>
  <text x="75" y="147" class="small">region=CN, amount=100</text>
  <rect x="58" y="164" width="238" height="32" class="row groupA"/>
  <text x="75" y="186" class="small">region=CN, amount=80</text>
  <rect x="58" y="203" width="238" height="32" class="row groupB"/>
  <text x="75" y="225" class="small">region=EU, amount=70</text>
  <rect x="58" y="242" width="238" height="32" class="row groupB"/>
  <text x="75" y="264" class="small">region=EU, amount=20</text>
  <rect x="58" y="281" width="238" height="32" class="row groupC"/>
  <text x="75" y="303" class="small">region=US, amount=50</text>
  <path d="M352 210 H475" class="arrow"/>
  <rect x="485" y="92" width="185" height="235" class="box"/>
  <text x="510" y="124" class="label">GroupAggregate</text>
  <text x="510" y="157" class="small">1. 保存首行作为组代表</text>
  <text x="510" y="190" class="small">2. 同组行推进 transfn</text>
  <text x="510" y="223" class="small">3. 键变化即 finalize</text>
  <text x="510" y="256" class="small">4. HAVING 过滤后输出</text>
  <path d="M680 210 H795" class="arrow"/>
  <rect x="805" y="107" width="84" height="32" class="row groupA"/>
  <text x="818" y="129" class="small">CN, 180</text>
  <rect x="805" y="176" width="84" height="32" class="row groupB"/>
  <text x="818" y="198" class="small">EU, 90</text>
  <rect x="805" y="245" width="84" height="32" class="row groupC"/>
  <text x="818" y="267" class="small">US, 50</text>
  <text x="738" y="335" class="small">每个连续分组输出一行</text>
</svg>
