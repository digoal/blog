<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">GroupAggregate 规划路径</title>
  <desc id="desc">展示 PostgreSQL 优化器如何从 GROUP BY 可排序性、输入路径顺序、HashAggregate 可用性和成本比较中选择 GroupAggregate。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .small { font-size: 14px; }
    .label { font-size: 16px; font-weight: 700; }
    .title { font-size: 22px; font-weight: 800; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="34" y="40" class="title">优化器选择 GroupAggregate 的主线</text>
  <rect x="40" y="80" width="190" height="70" class="node"/>
  <text x="60" y="108" class="label">SQL: GROUP BY</text>
  <text x="60" y="132" class="small">解析出 groupClause</text>
  <path d="M230 115 H315" class="arrow"/>
  <polygon points="335,70 485,115 335,160 185,115" transform="translate(160,0)" class="decision"/>
  <text x="515" y="107" class="label" text-anchor="middle">分组键可排序?</text>
  <text x="515" y="131" class="small" text-anchor="middle">sortop / collation 可用</text>
  <path d="M665 115 H735" class="arrow"/>
  <rect x="750" y="80" width="190" height="70" class="ok"/>
  <text x="770" y="108" class="label">生成有序输入</text>
  <text x="770" y="132" class="small">索引 / Sort / Incremental Sort</text>
  <path d="M845 150 V225" class="arrow"/>
  <rect x="750" y="240" width="190" height="78" class="ok"/>
  <text x="770" y="268" class="label">create_agg_path</text>
  <text x="770" y="292" class="small">aggstrategy = AGG_SORTED</text>
  <path d="M750 279 H640" class="arrow"/>
  <rect x="415" y="240" width="210" height="78" class="node"/>
  <text x="435" y="268" class="label">cost_agg()</text>
  <text x="435" y="292" class="small">输入已排序则低 startup cost</text>
  <path d="M415 279 H300" class="arrow"/>
  <rect x="70" y="240" width="210" height="78" class="ok"/>
  <text x="90" y="268" class="label">最终 EXPLAIN 名称</text>
  <text x="90" y="292" class="small">GroupAggregate / Strategy: Sorted</text>
  <path d="M515 160 V225" class="arrow"/>
  <rect x="400" y="370" width="230" height="82" class="warn"/>
  <text x="420" y="398" class="label">排序不可用或成本较差</text>
  <text x="420" y="422" class="small">可能选择 HashAggregate</text>
  <text x="420" y="446" class="small">或报无法实现 GROUP BY</text>
  <path d="M515 318 V370" class="arrow"/>
</svg>
