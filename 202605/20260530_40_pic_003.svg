<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">GroupAggregate 执行器循环</title>
  <desc id="desc">展示 agg_retrieve_direct 如何取首行、比较分组键、推进聚合状态、组边界 finalize 并投影输出。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .state { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .memory { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
    .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .small { font-size: 14px; }
    .label { font-size: 16px; font-weight: 700; }
    .title { font-size: 22px; font-weight: 800; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="34" y="38" class="title">agg_retrieve_direct 的逐组推进过程</text>
  <rect x="50" y="80" width="180" height="68" class="node"/>
  <text x="72" y="108" class="label">fetch_input_tuple()</text>
  <text x="72" y="132" class="small">从外层计划取有序行</text>
  <path d="M230 114 H325" class="arrow"/>
  <rect x="340" y="80" width="200" height="68" class="state"/>
  <text x="362" y="108" class="label">grp_firstTuple</text>
  <text x="362" y="132" class="small">保存当前组的代表行</text>
  <path d="M540 114 H635" class="arrow"/>
  <rect x="650" y="80" width="230" height="68" class="memory"/>
  <text x="672" y="108" class="label">initialize_aggregates()</text>
  <text x="672" y="132" class="small">初始化 transition state</text>
  <path d="M765 148 V215" class="arrow"/>
  <rect x="650" y="230" width="230" height="76" class="memory"/>
  <text x="672" y="258" class="label">advance_aggregates()</text>
  <text x="672" y="282" class="small">执行参数表达式与 transfn</text>
  <path d="M650 268 H540" class="arrow"/>
  <polygon points="440,218 565,268 440,318 315,268" class="decision"/>
  <text x="440" y="260" class="label" text-anchor="middle">分组键相等?</text>
  <text x="440" y="284" class="small" text-anchor="middle">eqfunctions 比较</text>
  <path d="M315 268 H220" class="arrow"/>
  <rect x="50" y="230" width="170" height="76" class="node"/>
  <text x="72" y="258" class="label">继续取下一行</text>
  <text x="72" y="282" class="small">相等则留在当前组</text>
  <path d="M135 230 V148" class="arrow"/>
  <path d="M440 318 V390" class="arrow"/>
  <rect x="320" y="405" width="240" height="76" class="memory"/>
  <text x="342" y="433" class="label">finalize_aggregates()</text>
  <text x="342" y="457" class="small">ORDER BY/DISTINCT 聚合先内部排序</text>
  <path d="M560 443 H650" class="arrow"/>
  <rect x="650" y="405" width="230" height="76" class="state"/>
  <text x="672" y="433" class="label">project_aggregates()</text>
  <text x="672" y="457" class="small">HAVING 通过后输出一行</text>
  <text x="62" y="520" class="small">每个输入行重置 tmpcontext；每个组边界重扫 aggcontext，释放上一组过渡状态和回调资源。</text>
</svg>
