<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">GroupAggregate 与相邻聚合策略对比</title>
  <desc id="desc">比较 GroupAggregate、HashAggregate、Aggregate 和 Group 在输入前提、内存、输出时机、溢写风险上的差异。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .good { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
    .small { font-size: 14px; }
    .label { font-size: 17px; font-weight: 800; }
    .title { font-size: 22px; font-weight: 800; }
    .axis { stroke: #475569; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="34" y="38" class="title">资源边界：排序流式 vs 哈希驻留</text>
  <rect x="50" y="80" width="205" height="250" class="good"/>
  <text x="74" y="112" class="label">GroupAggregate</text>
  <text x="74" y="148" class="small">前提：输入按组键排序</text>
  <text x="74" y="178" class="small">内存：每组 transition state</text>
  <text x="74" y="208" class="small">输出：组边界后可输出</text>
  <text x="74" y="238" class="small">风险：Sort 可能写临时文件</text>
  <text x="74" y="268" class="small">优势：无 hash table 爆内存风险</text>
  <rect x="285" y="80" width="205" height="250" class="warn"/>
  <text x="309" y="112" class="label">HashAggregate</text>
  <text x="309" y="148" class="small">前提：分组键可 hash</text>
  <text x="309" y="178" class="small">内存：所有活跃 group</text>
  <text x="309" y="208" class="small">输出：通常填表后读取</text>
  <text x="309" y="238" class="small">风险：batch / spill</text>
  <text x="309" y="268" class="small">优势：不要求输入有序</text>
  <rect x="520" y="80" width="205" height="250" class="panel"/>
  <text x="544" y="112" class="label">Aggregate</text>
  <text x="544" y="148" class="small">前提：无 GROUP BY</text>
  <text x="544" y="178" class="small">内存：一个全局状态</text>
  <text x="544" y="208" class="small">输出：读完输入后一行</text>
  <text x="544" y="238" class="small">风险：大状态聚合增长</text>
  <text x="544" y="268" class="small">例子：SELECT count(*)</text>
  <rect x="755" y="80" width="175" height="250" class="risk"/>
  <text x="779" y="112" class="label">Group</text>
  <text x="779" y="148" class="small">前提：只有 GROUP BY</text>
  <text x="779" y="178" class="small">无聚合函数</text>
  <text x="779" y="208" class="small">接近 DISTINCT</text>
  <text x="779" y="238" class="small">仍依赖有序输入</text>
  <line x1="70" y1="385" x2="910" y2="385" class="axis"/>
  <text x="70" y="420" class="small">更偏流式、低驻留内存</text>
  <text x="740" y="420" class="small">更偏一次性构建状态</text>
</svg>
