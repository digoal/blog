<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">现金在投资系统中的四重角色</text>
  <rect x="40" y="60" width="160" height="150" rx="10" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="120" y="88" text-anchor="middle" font-size="26">🫁</text>
  <text x="120" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a6ba0">维持生存</text>
  <text x="120" y="140" text-anchor="middle" font-size="12" fill="#444">应急备用金</text>
  <text x="120" y="158" text-anchor="middle" font-size="12" fill="#444">3-6个月生活费</text>
  <text x="120" y="176" text-anchor="middle" font-size="12" fill="#444">不参与任何投资</text>
  <text x="120" y="194" text-anchor="middle" font-size="11" fill="#888">货币基金/活期</text>
  <rect x="220" y="60" width="160" height="150" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="300" y="88" text-anchor="middle" font-size="26">🎯</text>
  <text x="300" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e8449">等待机会</text>
  <text x="300" y="140" text-anchor="middle" font-size="12" fill="#444">战略现金仓</text>
  <text x="300" y="158" text-anchor="middle" font-size="12" fill="#444">等市场回调入场</text>
  <text x="300" y="176" text-anchor="middle" font-size="12" fill="#444">主动保留不焦虑</text>
  <text x="300" y="194" text-anchor="middle" font-size="11" fill="#888">货币基金/短债</text>
  <rect x="400" y="60" width="160" height="150" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="480" y="88" text-anchor="middle" font-size="26">🛡</text>
  <text x="480" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#b7770d">降低波动</text>
  <text x="480" y="140" text-anchor="middle" font-size="12" fill="#444">组合防守层</text>
  <text x="480" y="158" text-anchor="middle" font-size="12" fill="#444">市场下跌时缓冲</text>
  <text x="480" y="176" text-anchor="middle" font-size="12" fill="#444">让你撑过熊市</text>
  <text x="480" y="194" text-anchor="middle" font-size="11" fill="#888">货币/短债/存款</text>
  <rect x="580" y="60" width="160" height="150" rx="10" fill="#fdf2f8" stroke="#9b59b6" stroke-width="2"/>
  <text x="660" y="88" text-anchor="middle" font-size="26">🧠</text>
  <text x="660" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#7d3c98">保持理性</text>
  <text x="660" y="140" text-anchor="middle" font-size="12" fill="#444">心理缓冲垫</text>
  <text x="660" y="158" text-anchor="middle" font-size="12" fill="#444">不被迫在底部卖</text>
  <text x="660" y="176" text-anchor="middle" font-size="12" fill="#444">不因恐慌乱操作</text>
  <text x="660" y="194" text-anchor="middle" font-size="11" fill="#888">持有现金=持有选择权</text>
  <line x1="40" y1="235" x2="760" y2="235" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="262" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">三桶钱框架（现金分配原则）</text>
  <rect x="60" y="278" width="200" height="118" rx="8" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <text x="160" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a90d9">生活钱</text>
  <text x="160" y="320" text-anchor="middle" font-size="12" fill="#333">近6个月必要支出</text>
  <text x="160" y="338" text-anchor="middle" font-size="12" fill="#333">绝不参与投资</text>
  <text x="160" y="358" text-anchor="middle" font-size="11" fill="#666">工具：活期/货币基金</text>
  <text x="160" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">优先级1，不可动</text>
  <rect x="300" y="278" width="200" height="118" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">防守钱</text>
  <text x="400" y="320" text-anchor="middle" font-size="12" fill="#333">可投资金的20-40%</text>
  <text x="400" y="338" text-anchor="middle" font-size="12" fill="#333">低风险工具存放</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#666">工具：货币/短债/逆回购</text>
  <text x="400" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#196f3d">优先级2，随市调整</text>
  <rect x="540" y="278" width="200" height="118" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="640" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">进攻钱</text>
  <text x="640" y="320" text-anchor="middle" font-size="12" fill="#333">可投资金的60-80%</text>
  <text x="640" y="338" text-anchor="middle" font-size="12" fill="#333">ETF、股票、转债等</text>
  <text x="640" y="358" text-anchor="middle" font-size="11" fill="#666">工具：各类权益资产</text>
  <text x="640" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#922b21">优先级3，可承受亏损</text>
</svg>
