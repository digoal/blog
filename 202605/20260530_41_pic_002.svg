<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">满仓操作 vs 保留现金 — 两种命运对比</text>

  <!-- Timeline base -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#bbb" stroke-width="2"/>
  <text x="60" y="300" text-anchor="middle" font-size="11" fill="#666">开始</text>
  <text x="220" y="300" text-anchor="middle" font-size="11" fill="#666">第3月</text>
  <text x="380" y="300" text-anchor="middle" font-size="11" fill="#666">第6月(急跌)</text>
  <text x="540" y="300" text-anchor="middle" font-size="11" fill="#666">第9月</text>
  <text x="700" y="300" text-anchor="middle" font-size="11" fill="#666">第12月</text>
  <!-- Tick marks -->
  <line x1="60" y1="275" x2="60" y2="285" stroke="#bbb" stroke-width="2"/>
  <line x1="220" y1="275" x2="220" y2="285" stroke="#bbb" stroke-width="2"/>
  <line x1="380" y1="275" x2="380" y2="285" stroke="#bbb" stroke-width="2"/>
  <line x1="540" y1="275" x2="540" y2="285" stroke="#bbb" stroke-width="2"/>
  <line x1="700" y1="275" x2="700" y2="285" stroke="#bbb" stroke-width="2"/>

  <!-- Full position line (red) -->
  <polyline points="60,200 220,160 380,260 540,240 700,220" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linejoin="round"/>
  <!-- At crash point -->
  <circle cx="380" cy="260" r="6" fill="#e74c3c"/>
  <text x="395" y="258" font-size="11" fill="#e74c3c" font-weight="bold">被迫割肉</text>
  <text x="395" y="272" font-size="10" fill="#e74c3c">或扛着亏损煎熬</text>
  <!-- End point red -->
  <circle cx="700" cy="220" r="6" fill="#e74c3c"/>
  <text x="712" y="224" font-size="11" fill="#e74c3c" font-weight="bold">-12%</text>

  <!-- Cash buffer line (green) -->
  <polyline points="60,210 220,175 380,250 540,200 700,160" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="8,4" stroke-linejoin="round"/>
  <!-- At crash point cash person buys -->
  <circle cx="380" cy="250" r="6" fill="#27ae60"/>
  <text x="280" y="244" font-size="11" fill="#27ae60" font-weight="bold">用现金抄底加仓</text>
  <!-- End point green -->
  <circle cx="700" cy="160" r="6" fill="#27ae60"/>
  <text x="712" y="164" font-size="11" fill="#27ae60" font-weight="bold">+18%</text>

  <!-- Legend -->
  <line x1="80" y1="60" x2="130" y2="60" stroke="#e74c3c" stroke-width="3"/>
  <circle cx="105" cy="60" r="5" fill="#e74c3c"/>
  <text x="138" y="65" font-size="13" fill="#333">满仓操作者：无子弹，只能等</text>

  <line x1="80" y1="88" x2="130" y2="88" stroke="#27ae60" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="105" cy="88" r="5" fill="#27ae60"/>
  <text x="138" y="93" font-size="13" fill="#333">保留现金者：急跌时反手加仓</text>

  <!-- Y axis labels -->
  <text x="52" y="164" text-anchor="end" font-size="11" fill="#aaa">高</text>
  <text x="52" y="280" text-anchor="end" font-size="11" fill="#aaa">低</text>
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#888">*示意图，非真实数据。差异来自急跌时的应对能力</text>
</svg>
