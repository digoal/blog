<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">现金仓位决策树：我现在应该持多少现金？</text>

  <!-- Root -->
  <rect x="300" y="55" width="200" height="48" rx="8" fill="#4a90d9" />
  <text x="400" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">我的生活应急金够吗？</text>
  <text x="400" y="92" text-anchor="middle" font-size="11" fill="#ddeeff">（6个月生活费）</text>

  <!-- Yes / No branches from root -->
  <line x1="300" y1="79" x2="160" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="118" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">不够</text>
  <line x1="500" y1="79" x2="640" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="582" y="118" text-anchor="middle" font-size="12" fill="#196f3d" font-weight="bold">够了</text>

  <!-- Left: No branch -->
  <rect x="60" y="130" width="200" height="48" rx="8" fill="#e74c3c"/>
  <text x="160" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">先把生活钱补齐</text>
  <text x="160" y="167" text-anchor="middle" font-size="11" fill="#fdd">其他投资计划暂停</text>

  <!-- Right: Yes branch -> second question -->
  <rect x="540" y="130" width="200" height="48" rx="8" fill="#4a90d9"/>
  <text x="640" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">当前市场处于什么阶段？</text>
  <text x="640" y="167" text-anchor="middle" font-size="11" fill="#ddeeff">（自我判断）</text>

  <!-- From second question: three branches -->
  <line x1="540" y1="154" x2="200" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="210" text-anchor="middle" font-size="11" fill="#7d3c98" font-weight="bold">熊市/估值高</text>
  <line x1="640" y1="178" x2="640" y2="228" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="218" font-size="11" fill="#b7770d" font-weight="bold">震荡/不确定</text>
  <line x1="740" y1="154" x2="760" y2="228" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="762" y="218" font-size="11" fill="#196f3d" font-weight="bold">牛市初/低估</text>

  <!-- Three outcome boxes -->
  <rect x="60" y="228" width="210" height="70" rx="8" fill="#fdf2f8" stroke="#9b59b6" stroke-width="2"/>
  <text x="165" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">防守优先</text>
  <text x="165" y="268" text-anchor="middle" font-size="11" fill="#555">现金占可投资金40-50%</text>
  <text x="165" y="286" text-anchor="middle" font-size="11" fill="#555">工具：货币/短债/逆回购</text>

  <rect x="535" y="228" width="210" height="70" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="640" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#b7770d">均衡持仓</text>
  <text x="640" y="268" text-anchor="middle" font-size="11" fill="#555">现金占可投资金25-35%</text>
  <text x="640" y="286" text-anchor="middle" font-size="11" fill="#555">工具：货币基金为主</text>

  <!-- Fourth box off-screen right adjusted -->
  <rect x="690" y="228" width="0" height="0"/>
  <!-- Reposition rightmost to avoid overlap -->
  <!-- Adjust: put third box below right branch separately -->
  <rect x="660" y="228" width="0" height="0"/>

  <!-- arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Reposition: since third branch goes to 760,228, put third box there -->
  <rect x="690" y="228" width="100" height="0"/>

  <!-- Bottom note -->
  <text x="400" y="355" text-anchor="middle" font-size="11" fill="#888">注：以上为参考框架，实际比例因个人风险承受能力而异</text>

  <!-- Third outcome -->
  <rect x="315" y="305" width="175" height="60" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="403" y="326" text-anchor="middle" font-size="12" font-weight="bold" fill="#196f3d">轻仓备战</text>
  <text x="403" y="344" text-anchor="middle" font-size="11" fill="#555">现金占15-25%</text>
  <text x="403" y="360" text-anchor="middle" font-size="11" fill="#555">以防突发卖出需求</text>
  <!-- Connect -->
  <line x1="165" y1="298" x2="350" y2="305" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="640" y1="298" x2="460" y2="305" stroke="#f39c12" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
