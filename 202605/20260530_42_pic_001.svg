<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">货币基金的钱从哪里来，收益怎么产生</text>
  
  <!-- Left: Investor -->
  <rect x="30" y="70" width="140" height="280" fill="#e8f4fd" rx="10" stroke="#3498db" stroke-width="1.5"/>
  <text x="100" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">投资者</text>
  <text x="100" y="125" text-anchor="middle" font-size="11" fill="#555">你的钱</text>
  
  <rect x="50" y="140" width="100" height="30" fill="#3498db" rx="5"/>
  <text x="100" y="160" text-anchor="middle" font-size="11" fill="white">活期储蓄</text>
  <text x="100" y="185" text-anchor="middle" font-size="11" fill="#e74c3c">年化 ~0.35%</text>
  
  <rect x="50" y="210" width="100" height="30" fill="#2ecc71" rx="5"/>
  <text x="100" y="230" text-anchor="middle" font-size="11" fill="white">货币基金</text>
  <text x="100" y="255" text-anchor="middle" font-size="11" fill="#27ae60">年化 ~1.5-2%</text>
  
  <rect x="50" y="280" width="100" height="30" fill="#e67e22" rx="5"/>
  <text x="100" y="300" text-anchor="middle" font-size="11" fill="white">定期存款</text>
  <text x="100" y="325" text-anchor="middle" font-size="11" fill="#d35400">锁定1-3年</text>

  <!-- Arrow right -->
  <path d="M 175 210 L 220 210" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Center: Fund Manager -->
  <rect x="225" y="70" width="170" height="280" fill="#fef9e7" rx="10" stroke="#f39c12" stroke-width="1.5"/>
  <text x="310" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">基金公司</text>
  <text x="310" y="120" text-anchor="middle" font-size="11" fill="#888">汇集所有人的钱</text>
  <text x="310" y="140" text-anchor="middle" font-size="11" fill="#888">统一管理</text>
  
  <text x="310" y="175" text-anchor="middle" font-size="11" fill="#555">每日计算收益</text>
  <text x="310" y="195" text-anchor="middle" font-size="11" fill="#555">每日分红再投入</text>
  <text x="310" y="215" text-anchor="middle" font-size="11" fill="#555">T+1或T+7赎回</text>
  
  <rect x="245" y="250" width="130" height="40" fill="#f39c12" rx="5"/>
  <text x="310" y="273" text-anchor="middle" font-size="11" fill="white">规模效应</text>
  <text x="310" y="289" text-anchor="middle" font-size="10" fill="white">才能拿到机构利率</text>

  <!-- Arrow right -->
  <path d="M 400 210 L 445 210" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Right: Investment Targets -->
  <rect x="450" y="70" width="315" height="280" fill="#eafaf1" rx="10" stroke="#27ae60" stroke-width="1.5"/>
  <text x="607" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">投资标的（全部是短期低风险）</text>
  
  <rect x="470" y="115" width="275" height="38" fill="#27ae60" rx="6"/>
  <text x="607" y="134" text-anchor="middle" font-size="12" fill="white">国债逆回购 / 银行同业存款</text>
  <text x="607" y="149" text-anchor="middle" font-size="10" fill="#d5f5e3">机构之间互相借钱，最安全</text>
  
  <rect x="470" y="162" width="275" height="38" fill="#1abc9c" rx="6"/>
  <text x="607" y="181" text-anchor="middle" font-size="12" fill="white">银行承兑汇票 / 商业票据</text>
  <text x="607" y="196" text-anchor="middle" font-size="10" fill="#d5f5e3">企业短期融资工具，信用要求高</text>
  
  <rect x="470" y="209" width="275" height="38" fill="#3498db" rx="6"/>
  <text x="607" y="228" text-anchor="middle" font-size="12" fill="white">短期国债 / 地方政府债</text>
  <text x="607" y="243" text-anchor="middle" font-size="10" fill="#d6eaf8">政府信用背书，剩余期限≤397天</text>
  
  <rect x="470" y="256" width="275" height="38" fill="#9b59b6" rx="6"/>
  <text x="607" y="275" text-anchor="middle" font-size="12" fill="white">AAA级信用债 / 金融债</text>
  <text x="607" y="290" text-anchor="middle" font-size="10" fill="#e8daef">最高信用评级，期限极短</text>

  <!-- Key rule box -->
  <rect x="30" y="370" width="740" height="35" fill="#2c3e50" rx="8"/>
  <text x="400" y="392" text-anchor="middle" font-size="12" fill="white">📋 监管规定：货币基金只能投资剩余期限≤397天的高流动性、低风险资产，组合平均剩余期限≤120天</text>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
</svg>
