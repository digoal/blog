<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#f8f9fa" rx="12"/>
  
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">货币基金的三个真实风险（很多人不知道）</text>
  
  <!-- Risk 1: Yield drop -->
  <rect x="30" y="60" width="225" height="200" fill="white" rx="10" stroke="#3498db" stroke-width="1.5"/>
  <rect x="30" y="60" width="225" height="40" fill="#3498db" rx="10"/>
  <rect x="30" y="88" width="225" height="12" fill="#3498db"/>
  <text x="142" y="86" text-anchor="middle" font-size="13" fill="white" font-weight="bold">① 收益率会随市场下降</text>
  
  <text x="142" y="125" text-anchor="middle" font-size="11" fill="#333">2019年：年化 ~3.5%</text>
  <line x1="60" y1="140" x2="225" y2="140" stroke="#ddd" stroke-width="1"/>
  <text x="142" y="163" text-anchor="middle" font-size="11" fill="#333">2022年：年化 ~2.0%</text>
  <line x1="60" y1="178" x2="225" y2="178" stroke="#ddd" stroke-width="1"/>
  <text x="142" y="201" text-anchor="middle" font-size="11" fill="#e74c3c">2024年：年化 ~1.5%</text>
  
  <text x="142" y="235" text-anchor="middle" font-size="10" fill="#888">降息周期，收益率跟着降</text>
  <text x="142" y="252" text-anchor="middle" font-size="10" fill="#888">无法锁定收益</text>

  <!-- Risk 2: T+7 -->
  <rect x="288" y="60" width="225" height="200" fill="white" rx="10" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="288" y="60" width="225" height="40" fill="#e67e22" rx="10"/>
  <rect x="288" y="88" width="225" height="12" fill="#e67e22"/>
  <text x="400" y="86" text-anchor="middle" font-size="13" fill="white" font-weight="bold">② 赎回不一定当天到账</text>
  
  <text x="400" y="120" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">T+1产品</text>
  <text x="400" y="138" text-anchor="middle" font-size="11" fill="#555">次日到账（余额宝类）</text>
  <text x="400" y="158" text-anchor="middle" font-size="12" fill="#e67e22" font-weight="bold">T+7产品</text>
  <text x="400" y="176" text-anchor="middle" font-size="11" fill="#555">7天后到账（传统货基）</text>
  
  <rect x="308" y="192" width="185" height="40" fill="#fef3cd" rx="5"/>
  <text x="400" y="210" text-anchor="middle" font-size="11" fill="#e67e22">⚠️ 临时需要大额用钱</text>
  <text x="400" y="226" text-anchor="middle" font-size="11" fill="#e67e22">T+7赎回可能来不及！</text>

  <!-- Risk 3: Not guaranteed -->
  <rect x="546" y="60" width="225" height="200" fill="white" rx="10" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="546" y="60" width="225" height="40" fill="#e74c3c" rx="10"/>
  <rect x="546" y="88" width="225" height="12" fill="#e74c3c"/>
  <text x="658" y="86" text-anchor="middle" font-size="13" fill="white" font-weight="bold">③ 极端情况下可能亏本</text>

  <text x="658" y="118" text-anchor="middle" font-size="11" fill="#555">监管要求净值≥0.9985</text>
  <text x="658" y="136" text-anchor="middle" font-size="11" fill="#555">（不是0.9999，更不是1.0）</text>
  
  <rect x="566" y="150" width="185" height="50" fill="#fdecea" rx="5"/>
  <text x="658" y="168" text-anchor="middle" font-size="11" fill="#c0392b">历史案例：</text>
  <text x="658" y="184" text-anchor="middle" font-size="10" fill="#c0392b">2008年美国货基"破钱"事件</text>
  
  <text x="658" y="220" text-anchor="middle" font-size="10" fill="#888">中国迄今未出现本金亏损</text>
  <text x="658" y="238" text-anchor="middle" font-size="10" fill="#888">但理论风险存在，非"无风险"</text>
  
  <!-- Bottom -->
  <rect x="30" y="275" width="740" height="32" fill="#1a1a2e" rx="8"/>
  <text x="400" y="296" text-anchor="middle" font-size="12" fill="white">认识这三个风险，不是要你不买货基，而是要你用对它、不依赖它</text>
</svg>
