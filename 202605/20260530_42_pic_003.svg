<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="480" fill="#f8f9fa" rx="12"/>
  
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">货币基金"适合/不适合"决策树</text>
  
  <!-- Start -->
  <ellipse cx="400" cy="80" rx="100" ry="28" fill="#2c3e50"/>
  <text x="400" y="85" text-anchor="middle" font-size="13" fill="white">这笔钱用来做什么？</text>
  
  <!-- Arrow down -->
  <line x1="400" y1="108" x2="400" y2="138" stroke="#555" stroke-width="2"/>
  <polygon points="394,135 406,135 400,145" fill="#555"/>
  
  <!-- Decision 1 -->
  <rect x="270" y="148" width="260" height="44" fill="#ecf0f1" rx="8" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="168" text-anchor="middle" font-size="12" fill="#333">未来3个月内确定要用？</text>
  <text x="400" y="184" text-anchor="middle" font-size="11" fill="#777">（如：买车首付、学费、装修款）</text>
  
  <!-- Yes branch left -->
  <line x1="270" y1="170" x2="170" y2="170" stroke="#27ae60" stroke-width="2"/>
  <line x1="170" y1="170" x2="170" y2="240" stroke="#27ae60" stroke-width="2"/>
  <polygon points="164,237 176,237 170,247" fill="#27ae60"/>
  <text x="218" y="163" font-size="11" fill="#27ae60" font-weight="bold">是</text>
  
  <rect x="80" y="250" width="180" height="60" fill="#d5f5e3" rx="8" stroke="#27ae60" stroke-width="2"/>
  <text x="170" y="275" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">✅ 非常适合</text>
  <text x="170" y="293" text-anchor="middle" font-size="11" fill="#27ae60">比活期好，随时可取</text>
  
  <!-- No branch right -->
  <line x1="530" y1="170" x2="630" y2="170" stroke="#e74c3c" stroke-width="2"/>
  <line x1="630" y1="170" x2="630" y2="240" stroke="#e74c3c" stroke-width="2"/>
  <polygon points="624,237 636,237 630,247" fill="#e74c3c"/>
  <text x="573" y="163" font-size="11" fill="#e74c3c" font-weight="bold">否</text>
  
  <!-- No → sub question -->
  <rect x="540" y="248" width="180" height="44" fill="#fdecea" rx="8" stroke="#e74c3c" stroke-width="1"/>
  <text x="630" y="267" text-anchor="middle" font-size="12" fill="#c0392b">3年内不需要？</text>
  <text x="630" y="283" text-anchor="middle" font-size="11" fill="#e74c3c">（投资型资金）</text>
  
  <!-- Sub yes -->
  <line x1="630" y1="292" x2="630" y2="360" stroke="#e67e22" stroke-width="2"/>
  <polygon points="624,357 636,357 630,367" fill="#e67e22"/>
  <text x="638" y="335" font-size="11" fill="#e67e22">是</text>
  
  <rect x="542" y="368" width="180" height="60" fill="#fef3cd" rx="8" stroke="#e67e22" stroke-width="2"/>
  <text x="632" y="390" text-anchor="middle" font-size="12" fill="#d35400" font-weight="bold">⚠️ 不够用</text>
  <text x="632" y="408" text-anchor="middle" font-size="11" fill="#e67e22">应考虑ETF/债券</text>
  
  <!-- Center down -->
  <line x1="400" y1="192" x2="400" y2="320" stroke="#3498db" stroke-width="2"/>
  <polygon points="394,317 406,317 400,327" fill="#3498db"/>
  <text x="408" y="265" font-size="11" fill="#3498db">6-18个月</text>
  
  <rect x="280" y="330" width="240" height="60" fill="#d6eaf8" rx="8" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="352" text-anchor="middle" font-size="12" fill="#1a5276" font-weight="bold">✅ 合适，但有上限</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#3498db">中期备用金的好选择</text>
  
  <!-- Bottom legend -->
  <rect x="30" y="435" width="740" height="32" fill="#2c3e50" rx="8"/>
  <text x="400" y="455" text-anchor="middle" font-size="12" fill="white">💡 核心原则：用时间维度分类资金，对号入座，不要用一个产品装所有钱</text>
</svg>
