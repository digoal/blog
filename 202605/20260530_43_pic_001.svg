<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">国债逆回购：资金出借流程</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="40" y="70" width="140" height="80" rx="10" fill="#4a90d9" />
  <text x="110" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">你（出借方）</text>
  <text x="110" y="124" text-anchor="middle" font-size="12" fill="#e8f0fe">持有闲置资金</text>
  <text x="110" y="140" text-anchor="middle" font-size="12" fill="#e8f0fe">想赚点利息</text>

  <!-- Arrow 1 -->
  <line x1="182" y1="110" x2="240" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="211" y="103" text-anchor="middle" font-size="11" fill="#555">下单买入</text>
  <text x="211" y="118" text-anchor="middle" font-size="11" fill="#555">GC001等</text>

  <!-- Step 2 -->
  <rect x="242" y="70" width="140" height="80" rx="10" fill="#5cb85c"/>
  <text x="312" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">交易所撮合</text>
  <text x="312" y="120" text-anchor="middle" font-size="12" fill="#e8ffe8">把你的资金</text>
  <text x="312" y="136" text-anchor="middle" font-size="12" fill="#e8ffe8">借给质押方</text>

  <!-- Arrow 2 -->
  <line x1="384" y1="110" x2="442" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="413" y="103" text-anchor="middle" font-size="11" fill="#555">T+0到账</text>
  <text x="413" y="118" text-anchor="middle" font-size="11" fill="#555">利息锁定</text>

  <!-- Step 3 -->
  <rect x="444" y="70" width="140" height="80" rx="10" fill="#e07b39"/>
  <text x="514" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">借入方（机构）</text>
  <text x="514" y="120" text-anchor="middle" font-size="12" fill="#fff">以国债为抵押</text>
  <text x="514" y="136" text-anchor="middle" font-size="12" fill="#fff">短期融资</text>

  <!-- Arrow 3 -->
  <line x1="586" y1="110" x2="644" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="615" y="103" text-anchor="middle" font-size="11" fill="#555">到期还款</text>
  <text x="615" y="118" text-anchor="middle" font-size="11" fill="#555">+利息</text>

  <!-- Step 4 -->
  <rect x="646" y="70" width="110" height="80" rx="10" fill="#9b59b6"/>
  <text x="701" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">你到期</text>
  <text x="701" y="124" text-anchor="middle" font-size="12" fill="#f3e8ff">收回本金</text>
  <text x="701" y="140" text-anchor="middle" font-size="12" fill="#f3e8ff">+ 利息</text>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="40" y1="185" x2="760" y2="185" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Key features table -->
  <text x="400" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">常用品种一览</text>

  <!-- Table header -->
  <rect x="40" y="222" width="720" height="34" rx="6" fill="#4a90d9"/>
  <text x="130" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">品种代码</text>
  <text x="290" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">期限</text>
  <text x="430" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">最低金额</text>
  <text x="590" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">典型年化收益率区间</text>

  <!-- Row 1 -->
  <rect x="40" y="256" width="720" height="34" rx="0" fill="#e8f4fd"/>
  <text x="130" y="278" text-anchor="middle" font-size="13" fill="#333">GC001（沪市1天）</text>
  <text x="290" y="278" text-anchor="middle" font-size="13" fill="#333">1天</text>
  <text x="430" y="278" text-anchor="middle" font-size="13" fill="#333">1000元</text>
  <text x="590" y="278" text-anchor="middle" font-size="13" fill="#e07b39">1%～5%（节前可飙升）</text>

  <!-- Row 2 -->
  <rect x="40" y="290" width="720" height="34" rx="0" fill="#fff"/>
  <text x="130" y="312" text-anchor="middle" font-size="13" fill="#333">GC007（沪市7天）</text>
  <text x="290" y="312" text-anchor="middle" font-size="13" fill="#333">7天</text>
  <text x="430" y="312" text-anchor="middle" font-size="13" fill="#333">1000元</text>
  <text x="590" y="312" text-anchor="middle" font-size="13" fill="#333">1.5%～3.5%</text>

  <!-- Row 3 -->
  <rect x="40" y="324" width="720" height="34" rx="0" fill="#e8f4fd"/>
  <text x="130" y="346" text-anchor="middle" font-size="13" fill="#333">131810（深市1天）</text>
  <text x="290" y="346" text-anchor="middle" font-size="13" fill="#333">1天</text>
  <text x="430" y="346" text-anchor="middle" font-size="13" fill="#333">100元</text>
  <text x="590" y="346" text-anchor="middle" font-size="13" fill="#e07b39">门槛最低，适合小资金</text>

  <!-- Row 4 -->
  <rect x="40" y="358" width="720" height="34" rx="0" fill="#fff"/>
  <text x="130" y="380" text-anchor="middle" font-size="13" fill="#333">GC014（沪市14天）</text>
  <text x="290" y="380" text-anchor="middle" font-size="13" fill="#333">14天</text>
  <text x="430" y="380" text-anchor="middle" font-size="13" fill="#333">1000元</text>
  <text x="590" y="380" text-anchor="middle" font-size="13" fill="#333">2%～4%（节前布局首选）</text>

  <!-- Note -->
  <text x="400" y="410" text-anchor="middle" font-size="11" fill="#888">注：上述收益率为历史区间，仅供参考，实际利率随市场供需实时变动</text>
</svg>
