<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">节假日前后：最优操作时间窗口</text>

  <!-- Timeline bar -->
  <rect x="60" y="65" width="680" height="18" rx="9" fill="#e0e0e0"/>

  <!-- Segments on timeline -->
  <!-- T-5 to T-3: preparation zone -->
  <rect x="60" y="65" width="150" height="18" rx="9" fill="#f0ad4e"/>
  <!-- T-2 to T-1: golden zone -->
  <rect x="210" y="65" width="150" height="18" rx="0" fill="#5cb85c"/>
  <!-- Holiday period -->
  <rect x="360" y="65" width="180" height="18" rx="0" fill="#d9534f"/>
  <!-- T+1: return period -->
  <rect x="540" y="65" width="100" height="18" rx="0" fill="#9b59b6"/>
  <!-- T+2 to after: normal -->
  <rect x="640" y="65" width="100" height="18" rx="9" fill="#5bc0de"/>

  <!-- Labels above -->
  <text x="135" y="58" text-anchor="middle" font-size="11" fill="#f0ad4e">节前5~3天</text>
  <text x="285" y="58" text-anchor="middle" font-size="11" fill="#5cb85c">节前2~1天</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#d9534f">节假日期间</text>
  <text x="590" y="58" text-anchor="middle" font-size="11" fill="#9b59b6">节后首日</text>
  <text x="690" y="58" text-anchor="middle" font-size="11" fill="#5bc0de">恢复正常</text>

  <!-- Action cards -->
  <!-- Card 1 -->
  <rect x="40" y="110" width="168" height="130" rx="10" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="40" y="110" width="168" height="28" rx="10" fill="#f0ad4e"/>
  <text x="124" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">📌 开始关注</text>
  <text x="124" y="158" text-anchor="middle" font-size="12" fill="#555">利率开始走高</text>
  <text x="124" y="174" text-anchor="middle" font-size="12" fill="#555">选14天品种布局</text>
  <text x="124" y="190" text-anchor="middle" font-size="12" fill="#555">可覆盖整个假期</text>
  <text x="124" y="210" text-anchor="middle" font-size="11" fill="#e07b39">利率：1.5%~2.5%</text>
  <text x="124" y="228" text-anchor="middle" font-size="11" fill="#e07b39">操作：小仓位试水</text>

  <!-- Card 2 -->
  <rect x="218" y="110" width="168" height="130" rx="10" fill="#fff" stroke="#5cb85c" stroke-width="2"/>
  <rect x="218" y="110" width="168" height="28" rx="10" fill="#5cb85c"/>
  <text x="302" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">🟢 黄金窗口</text>
  <text x="302" y="158" text-anchor="middle" font-size="12" fill="#555">资金最紧张时刻</text>
  <text x="302" y="174" text-anchor="middle" font-size="12" fill="#555">利率最高峰出现</text>
  <text x="302" y="190" text-anchor="middle" font-size="12" fill="#555">重点加仓GC001</text>
  <text x="302" y="210" text-anchor="middle" font-size="11" fill="#5cb85c">利率：2%~5%+</text>
  <text x="302" y="228" text-anchor="middle" font-size="11" fill="#5cb85c">操作：主力资金进场</text>

  <!-- Card 3 -->
  <rect x="396" y="110" width="168" height="130" rx="10" fill="#fff" stroke="#d9534f" stroke-width="2"/>
  <rect x="396" y="110" width="168" height="28" rx="10" fill="#d9534f"/>
  <text x="480" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">🔴 资金被锁定</text>
  <text x="480" y="158" text-anchor="middle" font-size="12" fill="#555">资金在回购中</text>
  <text x="480" y="174" text-anchor="middle" font-size="12" fill="#555">无法买卖其他品种</text>
  <text x="480" y="190" text-anchor="middle" font-size="12" fill="#555">等待到期即可</text>
  <text x="480" y="210" text-anchor="middle" font-size="11" fill="#d9534f">提示：提前预留</text>
  <text x="480" y="228" text-anchor="middle" font-size="11" fill="#d9534f">生活和急用资金！</text>

  <!-- Card 4 -->
  <rect x="574" y="110" width="182" height="130" rx="10" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
  <rect x="574" y="110" width="182" height="28" rx="10" fill="#9b59b6"/>
  <text x="665" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">📤 资金解锁</text>
  <text x="665" y="158" text-anchor="middle" font-size="12" fill="#555">本金+利息到账</text>
  <text x="665" y="174" text-anchor="middle" font-size="12" fill="#555">可重新操作</text>
  <text x="665" y="190" text-anchor="middle" font-size="12" fill="#555">节后利率快速回落</text>
  <text x="665" y="210" text-anchor="middle" font-size="11" fill="#9b59b6">操作：转入其他品种</text>
  <text x="665" y="228" text-anchor="middle" font-size="11" fill="#9b59b6">或等下次机会</text>

  <!-- Example calculation -->
  <rect x="40" y="268" width="720" height="152" rx="10" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="40" y="268" width="720" height="32" rx="10" fill="#4a90d9"/>
  <text x="400" y="289" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">📊 实操收益演示（春节前后，仅供举例）</text>

  <text x="70" y="324" font-size="13" fill="#333">场景：持有20万闲置资金，春节前2天操作GC007（年化4%）</text>
  <text x="70" y="346" font-size="13" fill="#333">计算：200,000 × 4% ÷ 365 × 7 = <tspan font-weight="bold" fill="#5cb85c">约153元</tspan>，7天到期自动到账</text>
  <text x="70" y="368" font-size="13" fill="#333">对比：同期货币基金年化约1.8%，7天收益 ≈ <tspan font-weight="bold" fill="#888">69元</tspan>，逆回购多赚约84元</text>
  <text x="70" y="390" font-size="13" fill="#e07b39">⚠ 注意：GC007占用资金7天，期间不可动用，请确保生活费充足</text>
  <text x="70" y="408" font-size="11" fill="#888">历史数据仅供参考，实际收益随市场利率波动；本例不代表未来收益保证</text>
</svg>
