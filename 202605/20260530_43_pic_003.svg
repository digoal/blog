<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">逆回购常见误区 vs 正确认知</text>

  <!-- Header row -->
  <rect x="40" y="55" width="350" height="36" rx="8" fill="#d9534f"/>
  <text x="215" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">❌ 常见误区</text>
  <rect x="410" y="55" width="350" height="36" rx="8" fill="#5cb85c"/>
  <text x="585" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">✅ 正确认知</text>

  <!-- Row 1 -->
  <rect x="40" y="95" width="350" height="50" rx="6" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1"/>
  <text x="215" y="116" text-anchor="middle" font-size="12" fill="#721c24">"随时可以用来替代货币基金"</text>
  <text x="215" y="134" text-anchor="middle" font-size="11" fill="#888">资金在期限内被锁定，无法提前赎回</text>

  <rect x="410" y="95" width="350" height="50" rx="6" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1"/>
  <text x="585" y="116" text-anchor="middle" font-size="12" fill="#155724">只放不需要动用的闲钱，急用钱留在货基</text>
  <text x="585" y="134" text-anchor="middle" font-size="11" fill="#888">资金分层管理，各司其职</text>

  <!-- Row 2 -->
  <rect x="40" y="152" width="350" height="50" rx="6" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1"/>
  <text x="215" y="173" text-anchor="middle" font-size="12" fill="#721c24">"年化5%，把所有钱都拿去做"</text>
  <text x="215" y="191" text-anchor="middle" font-size="11" fill="#888">高利率只在特定窗口出现，平时远低于此</text>

  <rect x="410" y="152" width="350" height="50" rx="6" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1"/>
  <text x="585" y="173" text-anchor="middle" font-size="12" fill="#155724">节前窗口机会性操作，不要全年重仓押注</text>
  <text x="585" y="191" text-anchor="middle" font-size="11" fill="#888">高利率≠长期稳定，需结合市场判断</text>

  <!-- Row 3 -->
  <rect x="40" y="209" width="350" height="50" rx="6" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1"/>
  <text x="215" y="230" text-anchor="middle" font-size="12" fill="#721c24">"深市和沪市一样，随便选"</text>
  <text x="215" y="248" text-anchor="middle" font-size="11" fill="#888">深市最低100元，沪市最低1000元，规则有差异</text>

  <rect x="410" y="209" width="350" height="50" rx="6" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1"/>
  <text x="585" y="230" text-anchor="middle" font-size="12" fill="#155724">小资金用深市（131810），大资金两市都可</text>
  <text x="585" y="248" text-anchor="middle" font-size="11" fill="#888">注意利率差异，选当时更高的市场</text>

  <!-- Row 4 -->
  <rect x="40" y="266" width="350" height="40" rx="6" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1"/>
  <text x="215" y="282" text-anchor="middle" font-size="12" fill="#721c24">"到期后资金自动转到下一笔"</text>
  <text x="215" y="298" text-anchor="middle" font-size="11" fill="#888">到期后资金回到账户，需手动续做</text>

  <rect x="410" y="266" width="350" height="40" rx="6" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1"/>
  <text x="585" y="282" text-anchor="middle" font-size="12" fill="#155724">到期后主动观察利率，再决定是否续做</text>
  <text x="585" y="298" text-anchor="middle" font-size="11" fill="#888">利率回落时，不必强行续做</text>
</svg>
