<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">从关系表到 CSR 图索引</title>
  <desc id="desc">展示 PostgreSQL 源表、注册元数据、节点索引、边解析和 CSR 数组之间的转换关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.4}
      .head{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.2}
      .accent{fill:#ecfdf5;stroke:#047857;stroke-width:1.2}
      .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.2}
      .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
      .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}
      .tiny{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#475569}
      .arrow{stroke:#2563eb;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .line{stroke:#64748b;stroke-width:1.2}
    </style>
  </defs>

  <rect x="24" y="28" width="244" height="164" rx="8" class="box"/>
  <rect x="24" y="28" width="244" height="42" rx="8" class="head"/>
  <text x="44" y="55" class="text">PostgreSQL 源表</text>
  <text x="44" y="96" class="small">users(id, name, tenant)</text>
  <text x="44" y="124" class="small">orders(id, user_id)</text>
  <text x="44" y="152" class="small">relationships(src, dst)</text>
  <text x="44" y="178" class="tiny">事实来源：WAL、MVCC、约束、权限仍归 PostgreSQL</text>

  <rect x="24" y="286" width="244" height="146" rx="8" class="box"/>
  <rect x="24" y="286" width="244" height="42" rx="8" class="warn"/>
  <text x="44" y="313" class="text">注册目录</text>
  <text x="44" y="354" class="small">_registered_tables</text>
  <text x="44" y="382" class="small">_registered_edges</text>
  <text x="44" y="410" class="small">_registered_filter_columns</text>

  <rect x="360" y="64" width="234" height="340" rx="8" class="box"/>
  <rect x="360" y="64" width="234" height="42" rx="8" class="accent"/>
  <text x="380" y="91" class="text">graph.build()</text>
  <text x="382" y="136" class="small">1. SPI 游标分批读源表</text>
  <text x="382" y="168" class="small">2. 分配 node_idx</text>
  <text x="382" y="200" class="small">3. 写临时节点查找表</text>
  <text x="382" y="232" class="small">4. 解析边端点</text>
  <text x="382" y="264" class="small">5. 边按 source,target,type 排序</text>
  <text x="382" y="296" class="small">6. 流式构建 CSR</text>
  <text x="382" y="338" class="tiny">不把所有原始边长期留在 Rust 堆里</text>
  <text x="382" y="366" class="tiny">重复边按 (source,target,type) 去重</text>

  <rect x="698" y="34" width="238" height="204" rx="8" class="box"/>
  <rect x="698" y="34" width="238" height="42" rx="8" class="head"/>
  <text x="718" y="61" class="text">NodeStore</text>
  <text x="718" y="104" class="small">node_idx: 0..N-1</text>
  <text x="718" y="134" class="small">is_active[]</text>
  <text x="718" y="164" class="small">table_oids[]</text>
  <text x="718" y="194" class="small">primary_key_offsets + bytes</text>

  <rect x="698" y="286" width="238" height="174" rx="8" class="box"/>
  <rect x="698" y="286" width="238" height="42" rx="8" class="head"/>
  <text x="718" y="313" class="text">EdgeStore CSR</text>
  <text x="718" y="356" class="small">edge_offsets[N+1]</text>
  <text x="718" y="386" class="small">targets[E]</text>
  <text x="718" y="416" class="small">type_ids[E]</text>
  <text x="718" y="446" class="small">weights[E] 可选</text>

  <path d="M268 110 C310 110 320 136 360 150" class="arrow"/>
  <path d="M268 356 C312 356 324 322 360 302" class="arrow"/>
  <path d="M594 156 C642 136 650 122 698 112" class="arrow"/>
  <path d="M594 302 C642 316 650 342 698 364" class="arrow"/>
  <line x1="817" y1="238" x2="817" y2="286" class="line"/>
  <text x="706" y="262" class="tiny">边数组只保存内部 node_idx</text>
</svg>
