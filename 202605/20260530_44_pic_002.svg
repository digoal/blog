<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">CSR 邻接切片访问</title>
  <desc id="desc">展示 edge_offsets 如何把一个节点映射到 targets 和 type_ids 的连续切片。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#0f172a}
      .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}
      .idx{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#64748b}
      .cell{fill:#f8fafc;stroke:#334155;stroke-width:1.2}
      .sel{fill:#dcfce7;stroke:#15803d;stroke-width:1.8}
      .off{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.2}
      .lab{fill:#fef3c7;stroke:#b45309;stroke-width:1.2}
      .arrow{stroke:#2563eb;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .guide{stroke:#16a34a;stroke-width:2;stroke-dasharray:6 5}
    </style>
  </defs>

  <text x="48" y="48" class="text">节点 2 的邻居 = targets[edge_offsets[2] .. edge_offsets[3])</text>
  <text x="48" y="78" class="small">一次 O(1) 偏移查表 + 一段连续数组扫描，适合 BFS 热循环。</text>

  <text x="48" y="132" class="text">edge_offsets</text>
  <g transform="translate(48,154)">
    <rect x="0" y="0" width="92" height="56" class="off"/><text x="38" y="35" class="text">0</text><text x="38" y="-10" class="idx">0</text>
    <rect x="92" y="0" width="92" height="56" class="off"/><text x="130" y="35" class="text">2</text><text x="130" y="-10" class="idx">1</text>
    <rect x="184" y="0" width="92" height="56" class="sel"/><text x="222" y="35" class="text">5</text><text x="222" y="-10" class="idx">2</text>
    <rect x="276" y="0" width="92" height="56" class="sel"/><text x="314" y="35" class="text">8</text><text x="314" y="-10" class="idx">3</text>
    <rect x="368" y="0" width="92" height="56" class="off"/><text x="406" y="35" class="text">9</text><text x="406" y="-10" class="idx">4</text>
    <rect x="460" y="0" width="92" height="56" class="off"/><text x="498" y="35" class="text">9</text><text x="498" y="-10" class="idx">5</text>
  </g>

  <path d="M270 222 C270 266 208 276 208 316" class="arrow"/>
  <path d="M362 222 C362 266 484 276 484 316" class="arrow"/>
  <text x="242" y="258" class="small">start=5</text>
  <text x="382" y="258" class="small">end=8</text>

  <text x="48" y="304" class="text">targets</text>
  <g transform="translate(48,326)">
    <rect x="0" y="0" width="92" height="56" class="cell"/><text x="36" y="35" class="text">4</text><text x="38" y="76" class="idx">0</text>
    <rect x="92" y="0" width="92" height="56" class="cell"/><text x="128" y="35" class="text">7</text><text x="130" y="76" class="idx">1</text>
    <rect x="184" y="0" width="92" height="56" class="cell"/><text x="220" y="35" class="text">1</text><text x="222" y="76" class="idx">2</text>
    <rect x="276" y="0" width="92" height="56" class="cell"/><text x="312" y="35" class="text">3</text><text x="314" y="76" class="idx">3</text>
    <rect x="368" y="0" width="92" height="56" class="cell"/><text x="404" y="35" class="text">9</text><text x="406" y="76" class="idx">4</text>
    <rect x="460" y="0" width="92" height="56" class="sel"/><text x="496" y="35" class="text">0</text><text x="498" y="76" class="idx">5</text>
    <rect x="552" y="0" width="92" height="56" class="sel"/><text x="588" y="35" class="text">6</text><text x="590" y="76" class="idx">6</text>
    <rect x="644" y="0" width="92" height="56" class="sel"/><text x="680" y="35" class="text">8</text><text x="682" y="76" class="idx">7</text>
    <rect x="736" y="0" width="92" height="56" class="cell"/><text x="772" y="35" class="text">2</text><text x="774" y="76" class="idx">8</text>
  </g>

  <text x="48" y="442" class="text">type_ids</text>
  <g transform="translate(48,464)">
    <rect x="0" y="0" width="92" height="38" class="lab"/><text x="35" y="25" class="small">1</text>
    <rect x="92" y="0" width="92" height="38" class="lab"/><text x="127" y="25" class="small">2</text>
    <rect x="184" y="0" width="92" height="38" class="lab"/><text x="219" y="25" class="small">1</text>
    <rect x="276" y="0" width="92" height="38" class="lab"/><text x="311" y="25" class="small">1</text>
    <rect x="368" y="0" width="92" height="38" class="lab"/><text x="403" y="25" class="small">3</text>
    <rect x="460" y="0" width="92" height="38" class="sel"/><text x="495" y="25" class="small">2</text>
    <rect x="552" y="0" width="92" height="38" class="sel"/><text x="587" y="25" class="small">1</text>
    <rect x="644" y="0" width="92" height="38" class="sel"/><text x="679" y="25" class="small">2</text>
    <rect x="736" y="0" width="92" height="38" class="lab"/><text x="771" y="25" class="small">1</text>
  </g>
  <line x1="508" y1="318" x2="508" y2="430" class="guide"/>
  <line x1="784" y1="318" x2="784" y2="430" class="guide"/>
  <text x="660" y="304" class="small">连续邻接切片</text>
</svg>
