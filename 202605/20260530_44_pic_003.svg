<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">构建、持久化、查询与维护生命周期</title>
  <desc id="desc">展示 pgGraph 从构建到 mmap 加载、查询、同步覆盖层和维护重建的生命周期。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.3}
      .blue{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.2}
      .green{fill:#dcfce7;stroke:#15803d;stroke-width:1.2}
      .orange{fill:#ffedd5;stroke:#c2410c;stroke-width:1.2}
      .purple{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.2}
      .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#0f172a}
      .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
      .tiny{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:12px;fill:#475569}
      .arrow{stroke:#2563eb;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:1.8;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect x="36" y="42" width="190" height="98" rx="8" class="blue"/>
  <text x="58" y="78" class="text">注册目录</text>
  <text x="58" y="106" class="small">表、边、过滤列</text>

  <rect x="288" y="42" width="190" height="98" rx="8" class="green"/>
  <text x="310" y="78" class="text">graph.build()</text>
  <text x="310" y="106" class="small">构建 NodeStore + CSR</text>

  <rect x="540" y="42" width="190" height="98" rx="8" class="orange"/>
  <text x="562" y="78" class="text">main.pggraph</text>
  <text x="562" y="106" class="small">原子写入、CRC、fsync</text>

  <rect x="36" y="226" width="190" height="118" rx="8" class="box"/>
  <text x="58" y="262" class="text">后端连接 A</text>
  <text x="58" y="292" class="small">mmap 正向图数组</text>
  <text x="58" y="318" class="small">本地反向 CSR</text>

  <rect x="288" y="226" width="190" height="118" rx="8" class="box"/>
  <text x="310" y="262" class="text">后端连接 B</text>
  <text x="310" y="292" class="small">共享 OS 页缓存</text>
  <text x="310" y="318" class="small">本地 FilterIndex</text>

  <rect x="540" y="226" width="190" height="118" rx="8" class="purple"/>
  <text x="562" y="262" class="text">查询热路径</text>
  <text x="562" y="292" class="small">resolve 种子节点</text>
  <text x="562" y="318" class="small">BFS/DFS/最短路径</text>

  <rect x="772" y="226" width="150" height="118" rx="8" class="blue"/>
  <text x="794" y="262" class="text">SQL 输出</text>
  <text x="794" y="292" class="small">表 OID + PK</text>
  <text x="794" y="318" class="small">可选 hydrate</text>

  <rect x="36" y="426" width="190" height="94" rx="8" class="orange"/>
  <text x="58" y="462" class="text">源表 DML</text>
  <text x="58" y="490" class="small">INSERT/UPDATE/DELETE</text>

  <rect x="288" y="426" width="190" height="94" rx="8" class="box"/>
  <text x="310" y="462" class="text">_sync_log</text>
  <text x="310" y="490" class="small">触发器记录变更</text>

  <rect x="540" y="426" width="190" height="94" rx="8" class="box"/>
  <text x="562" y="462" class="text">apply_sync()</text>
  <text x="562" y="490" class="small">节点增量 + 边覆盖层</text>

  <rect x="772" y="426" width="150" height="94" rx="8" class="green"/>
  <text x="794" y="462" class="text">maintenance</text>
  <text x="794" y="490" class="small">重建并合并覆盖层</text>

  <path d="M226 91 L288 91" class="arrow"/>
  <path d="M478 91 L540 91" class="arrow"/>
  <path d="M635 140 C635 184 356 184 356 226" class="arrow"/>
  <path d="M635 140 C635 184 126 184 126 226" class="arrow"/>
  <path d="M478 285 L540 285" class="arrow"/>
  <path d="M226 285 L288 285" class="dash"/>
  <path d="M730 285 L772 285" class="arrow"/>
  <path d="M226 473 L288 473" class="arrow"/>
  <path d="M478 473 L540 473" class="arrow"/>
  <path d="M730 473 L772 473" class="arrow"/>
  <path d="M847 426 C847 378 842 366 842 344" class="dash"/>
  <text x="666" y="382" class="tiny">覆盖层过多或 tombstone 增多时重建</text>
</svg>
