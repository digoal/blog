<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">遍历热循环与剪枝条件</title>
  <desc id="desc">展示从 SQL 参数到节点解析、邻居扫描、访问控制、过滤、限流和结果输出的查询路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.3}
      .blue{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.2}
      .green{fill:#dcfce7;stroke:#15803d;stroke-width:1.2}
      .orange{fill:#ffedd5;stroke:#c2410c;stroke-width:1.2}
      .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#0f172a}
      .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
      .tiny{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:12px;fill:#475569}
      .arrow{stroke:#2563eb;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .no{stroke:#c2410c;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect x="48" y="40" width="188" height="92" rx="8" class="blue"/>
  <text x="70" y="76" class="text">SQL 调用</text>
  <text x="70" y="104" class="small">graph.traverse()</text>

  <rect x="308" y="40" width="188" height="92" rx="8" class="box"/>
  <text x="330" y="76" class="text">解析参数</text>
  <text x="330" y="104" class="small">方向、边类型、租户、过滤</text>

  <rect x="568" y="40" width="188" height="92" rx="8" class="box"/>
  <text x="590" y="76" class="text">ResolutionIndex</text>
  <text x="590" y="104" class="small">(table_oid, pk) -> node_idx</text>

  <rect x="48" y="210" width="188" height="92" rx="8" class="green"/>
  <text x="70" y="246" class="text">frontier 队列</text>
  <text x="70" y="274" class="small">BFS: VecDeque</text>

  <rect x="308" y="210" width="188" height="92" rx="8" class="green"/>
  <text x="330" y="246" class="text">CSR 邻居切片</text>
  <text x="330" y="274" class="small">targets[start..end]</text>

  <rect x="568" y="190" width="250" height="132" rx="8" class="orange"/>
  <text x="590" y="226" class="text">候选节点检查</text>
  <text x="590" y="254" class="small">visited / is_active</text>
  <text x="590" y="280" class="small">edge_type / tenant bitmap</text>
  <text x="590" y="306" class="small">FilterIndex 谓词</text>

  <rect x="48" y="394" width="188" height="92" rx="8" class="box"/>
  <text x="70" y="430" class="text">断路器</text>
  <text x="70" y="458" class="small">max_depth/max_nodes/frontier</text>

  <rect x="308" y="394" width="188" height="92" rx="8" class="box"/>
  <text x="330" y="430" class="text">路径元数据</text>
  <text x="330" y="458" class="small">parent/depth/edge_type</text>

  <rect x="568" y="394" width="250" height="92" rx="8" class="blue"/>
  <text x="590" y="430" class="text">结果格式化</text>
  <text x="590" y="458" class="small">坐标、path、edge_path、hydrate</text>

  <path d="M236 86 L308 86" class="arrow"/>
  <path d="M496 86 L568 86" class="arrow"/>
  <path d="M662 132 C662 168 142 174 142 210" class="arrow"/>
  <path d="M236 256 L308 256" class="arrow"/>
  <path d="M496 256 L568 256" class="arrow"/>
  <path d="M818 256 C878 256 878 356 818 440" class="no"/>
  <text x="830" y="310" class="tiny">不合格候选被剪枝</text>
  <path d="M694 322 C694 360 424 360 424 394" class="arrow"/>
  <path d="M308 440 L236 440" class="arrow"/>
  <path d="M142 394 C142 344 142 330 142 302" class="arrow"/>
  <path d="M496 440 L568 440" class="arrow"/>
</svg>
