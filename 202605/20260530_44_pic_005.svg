<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">图式存储与搜索方案边界</title>
  <desc id="desc">比较递归 SQL、pgGraph CSR 派生索引、属性图数据库、SQL/PGQ 和专用图计算框架的适用边界。</desc>
  <style>
    .axis{stroke:#334155;stroke-width:2}
    .grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:5 5}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#0f172a}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#334155}
    .tiny{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:12px;fill:#475569}
    .bubble{stroke:#334155;stroke-width:1.3}
  </style>
  <line x1="120" y1="450" x2="860" y2="450" class="axis"/>
  <line x1="120" y1="450" x2="120" y2="70" class="axis"/>
  <line x1="120" y1="260" x2="860" y2="260" class="grid"/>
  <line x1="490" y1="450" x2="490" y2="70" class="grid"/>
  <text x="342" y="504" class="text">关系模型保真度 / PostgreSQL 原生运维</text>
  <text x="28" y="286" class="text" transform="rotate(-90 28 286)">遍历热路径专用化程度</text>
  <text x="126" y="474" class="tiny">低</text>
  <text x="830" y="474" class="tiny">高</text>
  <text x="82" y="446" class="tiny">低</text>
  <text x="82" y="82" class="tiny">高</text>

  <circle cx="252" cy="376" r="62" fill="#e0f2fe" class="bubble"/>
  <text x="210" y="366" class="text">递归 SQL</text>
  <text x="198" y="394" class="small">零派生存储</text>

  <circle cx="650" cy="220" r="76" fill="#dcfce7" class="bubble"/>
  <text x="608" y="206" class="text">pgGraph</text>
  <text x="586" y="234" class="small">关系表 + CSR 派生索引</text>

  <circle cx="710" cy="365" r="66" fill="#ede9fe" class="bubble"/>
  <text x="672" y="356" class="text">SQL/PGQ</text>
  <text x="654" y="384" class="small">标准图模式表达</text>

  <circle cx="378" cy="170" r="70" fill="#ffedd5" class="bubble"/>
  <text x="330" y="160" class="text">属性图数据库</text>
  <text x="324" y="188" class="small">图为事实来源</text>

  <circle cx="310" cy="268" r="62" fill="#fef3c7" class="bubble"/>
  <text x="274" y="258" class="text">Ligra 类框架</text>
  <text x="262" y="286" class="small">批量图计算</text>

  <rect x="548" y="96" width="238" height="54" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1.1"/>
  <text x="566" y="128" class="small">适合：现有 PG 数据上的有界邻域搜索</text>
  <rect x="548" y="470" width="238" height="42" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1.1"/>
  <text x="566" y="496" class="small">不适合：跨库分布式全图 OLAP</text>
</svg>
