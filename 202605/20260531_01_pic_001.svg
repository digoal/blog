<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">关系表、图和稀疏矩阵的等价映射</title>
  <desc id="desc">展示边表中的 source、target、weight 如何转换为图的边，再映射到邻接矩阵的非空元素。</desc>
  <style>
    .bg { fill: #fbfbf8; }
    .panel { fill: #ffffff; stroke: #2f3a40; stroke-width: 1.5; rx: 8; }
    .head { fill: #e8f1f2; stroke: #2f3a40; stroke-width: 1; }
    .text { font: 16px sans-serif; fill: #1f2933; }
    .small { font: 13px sans-serif; fill: #36454f; }
    .title { font: 20px sans-serif; font-weight: 700; fill: #1f2933; }
    .node { fill: #f5c542; stroke: #2f3a40; stroke-width: 1.5; }
    .edge { stroke: #2f3a40; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .matrixCell { fill: #f7f7f2; stroke: #c7c9c7; stroke-width: 1; }
    .nz { fill: #66a5ad; stroke: #1f5f66; stroke-width: 1.5; }
    .arrow { stroke: #7d4f50; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d4f50"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <rect class="panel" x="30" y="70" width="270" height="350"/>
  <text class="title" x="55" y="110">关系边表</text>
  <rect class="head" x="55" y="135" width="220" height="36"/>
  <text class="small" x="70" y="158">src</text>
  <text class="small" x="140" y="158">dst</text>
  <text class="small" x="210" y="158">w</text>
  <g class="text">
    <text x="70" y="205">A</text><text x="140" y="205">B</text><text x="210" y="205">1</text>
    <text x="70" y="250">A</text><text x="140" y="250">C</text><text x="210" y="250">1</text>
    <text x="70" y="295">B</text><text x="140" y="295">D</text><text x="210" y="295">1</text>
    <text x="70" y="340">C</text><text x="140" y="340">D</text><text x="210" y="340">1</text>
  </g>
  <path class="arrow" d="M 310 245 C 345 245, 355 245, 390 245"/>
  <rect class="panel" x="395" y="70" width="210" height="350"/>
  <text class="title" x="425" y="110">图模型</text>
  <circle class="node" cx="470" cy="180" r="26"/><text class="text" x="461" y="186">A</text>
  <circle class="node" cx="540" cy="245" r="26"/><text class="text" x="531" y="251">B</text>
  <circle class="node" cx="455" cy="315" r="26"/><text class="text" x="446" y="321">C</text>
  <circle class="node" cx="555" cy="350" r="26"/><text class="text" x="546" y="356">D</text>
  <path class="edge" d="M 489 198 L 520 226"/>
  <path class="edge" d="M 466 206 L 459 289"/>
  <path class="edge" d="M 543 271 L 552 323"/>
  <path class="edge" d="M 480 325 L 528 342"/>
  <path class="arrow" d="M 615 245 C 650 245, 660 245, 695 245"/>
  <rect class="panel" x="700" y="70" width="250" height="350"/>
  <text class="title" x="725" y="110">邻接矩阵 A</text>
  <text class="small" x="765" y="145">A</text><text class="small" x="815" y="145">B</text><text class="small" x="865" y="145">C</text><text class="small" x="915" y="145">D</text>
  <text class="small" x="730" y="185">A</text><text class="small" x="730" y="235">B</text><text class="small" x="730" y="285">C</text><text class="small" x="730" y="335">D</text>
  <g>
    <rect class="matrixCell" x="760" y="160" width="42" height="42"/><rect class="nz" x="810" y="160" width="42" height="42"/><rect class="nz" x="860" y="160" width="42" height="42"/><rect class="matrixCell" x="910" y="160" width="42" height="42"/>
    <rect class="matrixCell" x="760" y="210" width="42" height="42"/><rect class="matrixCell" x="810" y="210" width="42" height="42"/><rect class="matrixCell" x="860" y="210" width="42" height="42"/><rect class="nz" x="910" y="210" width="42" height="42"/>
    <rect class="matrixCell" x="760" y="260" width="42" height="42"/><rect class="matrixCell" x="810" y="260" width="42" height="42"/><rect class="matrixCell" x="860" y="260" width="42" height="42"/><rect class="nz" x="910" y="260" width="42" height="42"/>
    <rect class="matrixCell" x="760" y="310" width="42" height="42"/><rect class="matrixCell" x="810" y="310" width="42" height="42"/><rect class="matrixCell" x="860" y="310" width="42" height="42"/><rect class="matrixCell" x="910" y="310" width="42" height="42"/>
  </g>
  <text class="small" x="735" y="390">非空元素 A[i,j] 表示 i -> j 存在边</text>
</svg>
