<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">GraphBLAS 半环把搜索问题改写为矩阵乘法</title>
  <desc id="desc">展示普通数值半环、布尔半环和 min-plus 半环在同一 mxv/mxm 框架下表达不同图搜索语义。</desc>
  <style>
    .bg { fill: #fbfbf8; }
    .panel { fill: #fff; stroke: #2f3a40; stroke-width: 1.5; rx: 8; }
    .box { fill: #e8f1f2; stroke: #2f3a40; stroke-width: 1.2; rx: 6; }
    .accent { fill: #f5c542; stroke: #2f3a40; stroke-width: 1.2; rx: 6; }
    .text { font: 16px sans-serif; fill: #1f2933; }
    .small { font: 13px sans-serif; fill: #36454f; }
    .title { font: 20px sans-serif; font-weight: 700; fill: #1f2933; }
    .arrow { stroke: #7d4f50; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d4f50"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="540"/>
  <text class="title" x="50" y="55">同一稀疏矩阵，换半环就换搜索语义</text>
  <rect class="panel" x="50" y="95" width="250" height="330"/>
  <text class="title" x="78" y="135">输入</text>
  <rect class="box" x="80" y="170" width="190" height="58"/>
  <text class="text" x="105" y="205">邻接矩阵 A</text>
  <rect class="box" x="80" y="255" width="190" height="58"/>
  <text class="text" x="105" y="290">frontier 向量 v</text>
  <text class="small" x="80" y="360">A 存边，v 存当前层候选点</text>
  <path class="arrow" d="M 310 260 L 390 260"/>
  <rect class="panel" x="400" y="95" width="220" height="330"/>
  <text class="title" x="435" y="135">GraphBLAS</text>
  <rect class="accent" x="435" y="175" width="150" height="58"/>
  <text class="text" x="471" y="210">mxv / mxm</text>
  <rect class="box" x="435" y="260" width="150" height="58"/>
  <text class="text" x="456" y="295">mask + accum</text>
  <text class="small" x="430" y="360">算法描述不绑定存储格式</text>
  <path class="arrow" d="M 630 260 L 700 180"/>
  <path class="arrow" d="M 630 260 L 700 260"/>
  <path class="arrow" d="M 630 260 L 700 340"/>
  <rect class="panel" x="710" y="115" width="220" height="70"/>
  <text class="text" x="735" y="145">布尔半环</text>
  <text class="small" x="735" y="168">or-and: 可达性 / BFS</text>
  <rect class="panel" x="710" y="225" width="220" height="70"/>
  <text class="text" x="735" y="255">min-plus 半环</text>
  <text class="small" x="735" y="278">最短路松弛</text>
  <rect class="panel" x="710" y="335" width="220" height="70"/>
  <text class="text" x="735" y="365">plus-times 半环</text>
  <text class="small" x="735" y="388">路径计数 / 线性代数</text>
  <text class="small" x="50" y="480">关键点：GraphBLAS 的核心不是“矩阵乘法语法”，而是把乘法和加法替换成业务需要的二元运算与聚合。</text>
</svg>
