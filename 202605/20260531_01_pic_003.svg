<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="560" viewBox="0 0 1020 560" role="img" aria-labelledby="title desc">
  <title id="title">OneSparse 架构：SQL 类型到 GraphBLAS 对象</title>
  <desc id="desc">展示 PostgreSQL SQL 层、OneSparse C 扩展、SuiteSparse GraphBLAS 和 LAGraph 之间的调用关系。</desc>
  <style>
    .bg { fill: #fbfbf8; }
    .lane { fill: #fff; stroke: #2f3a40; stroke-width: 1.5; rx: 8; }
    .box { fill: #e8f1f2; stroke: #2f3a40; stroke-width: 1.2; rx: 6; }
    .hot { fill: #f5c542; stroke: #2f3a40; stroke-width: 1.2; rx: 6; }
    .lib { fill: #dfe7d7; stroke: #2f3a40; stroke-width: 1.2; rx: 6; }
    .text { font: 15px sans-serif; fill: #1f2933; }
    .small { font: 12px sans-serif; fill: #36454f; }
    .title { font: 20px sans-serif; font-weight: 700; fill: #1f2933; }
    .arrow { stroke: #7d4f50; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d4f50"/>
    </marker>
  </defs>
  <rect class="bg" width="1020" height="560"/>
  <text class="title" x="40" y="45">OneSparse 调用栈</text>
  <rect class="lane" x="40" y="80" width="210" height="400"/>
  <text class="title" x="75" y="120">PostgreSQL</text>
  <rect class="box" x="65" y="150" width="160" height="55"/><text class="text" x="95" y="183">matrix 类型</text>
  <rect class="box" x="65" y="225" width="160" height="55"/><text class="text" x="95" y="258">vector 类型</text>
  <rect class="box" x="65" y="300" width="160" height="55"/><text class="text" x="102" y="333">graph 类型</text>
  <rect class="box" x="65" y="375" width="160" height="55"/><text class="text" x="94" y="408">SQL 函数/算子</text>
  <path class="arrow" d="M 260 280 L 340 280"/>
  <rect class="lane" x="350" y="80" width="310" height="400"/>
  <text class="title" x="425" y="120">OneSparse C 扩展</text>
  <rect class="hot" x="380" y="150" width="250" height="55"/><text class="text" x="405" y="183">expanded object: flat / expanded</text>
  <rect class="box" x="380" y="225" width="250" height="55"/><text class="text" x="405" y="258">matrix_query: SQL 三元组 -> Matrix</text>
  <rect class="box" x="380" y="300" width="250" height="55"/><text class="text" x="420" y="333">mxm / mxv / vxm 包装</text>
  <rect class="box" x="380" y="375" width="250" height="55"/><text class="text" x="415" y="408">graph_bfs / graph_sssp</text>
  <path class="arrow" d="M 670 245 L 750 190"/>
  <path class="arrow" d="M 670 355 L 750 365"/>
  <rect class="lane" x="760" y="100" width="220" height="140"/>
  <text class="title" x="805" y="140">SuiteSparse</text>
  <rect class="lib" x="790" y="165" width="160" height="50"/><text class="text" x="820" y="197">GraphBLAS</text>
  <rect class="lane" x="760" y="310" width="220" height="140"/>
  <text class="title" x="820" y="350">LAGraph</text>
  <rect class="lib" x="790" y="375" width="160" height="50"/><text class="text" x="824" y="407">图算法库</text>
  <text class="small" x="390" y="515">源码依据：CLAUDE.md、src/matrix/matrix.c、matrix_query.c、matrix_mxm.c、graph_bfs.c、graph_sssp.c。</text>
</svg>
