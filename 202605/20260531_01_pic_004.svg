<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">OneSparse 对象在 PostgreSQL 内的存储生命周期</title>
  <desc id="desc">展示矩阵从 SQL 构造、内存 expanded object、GraphBLAS 序列化、TOAST 存储到再次展开执行的路径。</desc>
  <style>
    .bg { fill: #fbfbf8; }
    .box { fill: #fff; stroke: #2f3a40; stroke-width: 1.4; rx: 8; }
    .hot { fill: #f5c542; stroke: #2f3a40; stroke-width: 1.4; rx: 8; }
    .cold { fill: #e8f1f2; stroke: #2f3a40; stroke-width: 1.4; rx: 8; }
    .text { font: 15px sans-serif; fill: #1f2933; }
    .small { font: 12px sans-serif; fill: #36454f; }
    .title { font: 20px sans-serif; font-weight: 700; fill: #1f2933; }
    .arrow { stroke: #7d4f50; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d4f50"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="title" x="45" y="50">Flat / Expanded 双形态：把 PostgreSQL 存储和 GraphBLAS 执行接起来</text>
  <rect class="box" x="55" y="140" width="180" height="95"/>
  <text class="text" x="85" y="175">SQL 输入</text>
  <text class="small" x="78" y="205">literal / matrix_query</text>
  <path class="arrow" d="M 245 188 L 320 188"/>
  <rect class="hot" x="330" y="125" width="220" height="125"/>
  <text class="text" x="365" y="165">Expanded Object</text>
  <text class="small" x="365" y="195">GrB_Matrix 指针</text>
  <text class="small" x="365" y="218">适合连续计算和就地复用</text>
  <path class="arrow" d="M 560 188 L 645 188"/>
  <rect class="cold" x="655" y="140" width="180" height="95"/>
  <text class="text" x="688" y="175">serialize</text>
  <text class="small" x="685" y="205">GxB_Matrix_serialize</text>
  <path class="arrow" d="M 845 188 L 920 188"/>
  <rect class="box" x="925" y="140" width="90" height="95"/>
  <text class="text" x="943" y="175">TOAST</text>
  <text class="small" x="938" y="205">external</text>
  <path class="arrow" d="M 925 310 C 800 390, 620 390, 520 310"/>
  <rect class="cold" x="330" y="285" width="220" height="125"/>
  <text class="text" x="365" y="325">Flat Datum</text>
  <text class="small" x="365" y="355">serialized bytes</text>
  <text class="small" x="365" y="378">适合行存储、传递和持久化</text>
  <path class="arrow" d="M 320 345 C 250 345, 235 250, 330 220"/>
  <text class="small" x="70" y="480">源码依据：matrix_get_flat_size 调用 GxB_Matrix_serialize；expand_matrix 调用 GxB_Matrix_deserialize；DatumGetMatrix 在需要计算时展开 flat datum。</text>
</svg>
