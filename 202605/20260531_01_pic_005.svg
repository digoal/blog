<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">从 SQL 三元组到图搜索结果的执行路径</title>
  <desc id="desc">展示 matrix_query 读取 SQL 三元组构造矩阵，随后通过 GraphBLAS 或 LAGraph 执行图搜索的路径。</desc>
  <style>
    .bg { fill: #fbfbf8; }
    .box { fill: #fff; stroke: #2f3a40; stroke-width: 1.4; rx: 8; }
    .hot { fill: #f5c542; stroke: #2f3a40; stroke-width: 1.4; rx: 8; }
    .lib { fill: #dfe7d7; stroke: #2f3a40; stroke-width: 1.4; rx: 8; }
    .text { font: 15px sans-serif; fill: #1f2933; }
    .small { font: 12px sans-serif; fill: #36454f; }
    .title { font: 20px sans-serif; font-weight: 700; fill: #1f2933; }
    .arrow { stroke: #7d4f50; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d4f50"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="title" x="45" y="50">OneSparse 查询路径</text>
  <rect class="box" x="55" y="120" width="190" height="105"/>
  <text class="text" x="88" y="155">业务边表</text>
  <text class="small" x="80" y="185">src bigint</text>
  <text class="small" x="80" y="205">dst bigint</text>
  <text class="small" x="80" y="225">weight / bool</text>
  <path class="arrow" d="M 255 172 L 335 172"/>
  <rect class="hot" x="345" y="120" width="210" height="105"/>
  <text class="text" x="375" y="155">matrix_query()</text>
  <text class="small" x="375" y="185">SPI 游标分批读取</text>
  <text class="small" x="375" y="205">GrB_Matrix_setElement</text>
  <path class="arrow" d="M 565 172 L 645 172"/>
  <rect class="box" x="655" y="120" width="180" height="105"/>
  <text class="text" x="690" y="155">matrix A</text>
  <text class="small" x="685" y="185">邻接矩阵</text>
  <text class="small" x="685" y="205">稀疏/超稀疏由库决定</text>
  <path class="arrow" d="M 745 235 L 745 305"/>
  <rect class="lib" x="605" y="315" width="280" height="120"/>
  <text class="text" x="635" y="350">GraphBLAS / LAGraph 执行</text>
  <text class="small" x="635" y="380">mxv / vxm / mxm: 半环搜索</text>
  <text class="small" x="635" y="402">bfs / sssp / pagerank: LAGraph 包装</text>
  <path class="arrow" d="M 595 375 L 445 375"/>
  <rect class="box" x="250" y="315" width="185" height="120"/>
  <text class="text" x="285" y="350">返回结果</text>
  <text class="small" x="280" y="380">vector / matrix</text>
  <text class="small" x="280" y="402">level、parent、distance</text>
  <text class="small" x="55" y="500">这条路径不是 PostgreSQL 优化器内置的图算子；它是 SQL 函数把关系数据转成 GraphBLAS 对象，再交给稀疏线性代数内核。</text>
</svg>
