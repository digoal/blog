<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">货币基金 vs 短债基金：风险层级对比</text>

  <!-- 货币基金 -->
  <rect x="60" y="65" width="300" height="310" fill="#e8f5e9" rx="10" stroke="#4caf50" stroke-width="2"/>
  <text x="210" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">货币基金</text>

  <rect x="80" y="110" width="260" height="50" fill="#c8e6c9" rx="8"/>
  <text x="210" y="130" text-anchor="middle" font-size="12" fill="#1b5e20">持仓资产：短期存款、国债逆回购</text>
  <text x="210" y="150" text-anchor="middle" font-size="12" fill="#1b5e20">平均久期 ≤ 120天</text>

  <rect x="80" y="175" width="260" height="50" fill="#c8e6c9" rx="8"/>
  <text x="210" y="195" text-anchor="middle" font-size="12" fill="#1b5e20">净值波动：几乎为零</text>
  <text x="210" y="215" text-anchor="middle" font-size="12" fill="#1b5e20">采用"摊余成本法"估值</text>

  <rect x="80" y="240" width="260" height="50" fill="#c8e6c9" rx="8"/>
  <text x="210" y="260" text-anchor="middle" font-size="12" fill="#1b5e20">收益率：约1.5%~2.2%</text>
  <text x="210" y="280" text-anchor="middle" font-size="12" fill="#1b5e20">（2024年市场环境参考）</text>

  <rect x="80" y="305" width="260" height="55" fill="#a5d6a7" rx="8"/>
  <text x="210" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">⚡ 赎回：T+1到账</text>
  <text x="210" y="345" text-anchor="middle" font-size="12" fill="#1b5e20">部分产品支持实时赎回</text>

  <!-- 短债基金 -->
  <rect x="440" y="65" width="300" height="310" fill="#fff3e0" rx="10" stroke="#ff9800" stroke-width="2"/>
  <text x="590" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">短债基金</text>

  <rect x="460" y="110" width="260" height="50" fill="#ffe0b2" rx="8"/>
  <text x="590" y="130" text-anchor="middle" font-size="12" fill="#bf360c">持仓资产：短期债券、信用债</text>
  <text x="590" y="150" text-anchor="middle" font-size="12" fill="#bf360c">平均久期 1~3年</text>

  <rect x="460" y="175" width="260" height="50" fill="#ffe0b2" rx="8"/>
  <text x="590" y="195" text-anchor="middle" font-size="12" fill="#bf360c">净值波动：有，可能出现亏损</text>
  <text x="590" y="215" text-anchor="middle" font-size="12" fill="#bf360c">采用"市值法"估值</text>

  <rect x="460" y="240" width="260" height="50" fill="#ffe0b2" rx="8"/>
  <text x="590" y="260" text-anchor="middle" font-size="12" fill="#bf360c">收益率：约2.5%~4%</text>
  <text x="590" y="280" text-anchor="middle" font-size="12" fill="#bf360c">（视信用资质和时间段）</text>

  <rect x="460" y="305" width="260" height="55" fill="#ffcc80" rx="8"/>
  <text x="590" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">⚡ 赎回：T+1~T+3</text>
  <text x="590" y="345" text-anchor="middle" font-size="12" fill="#bf360c">无实时赎回，有最短持有期</text>

  <!-- 中间箭头 -->
  <text x="395" y="220" text-anchor="middle" font-size="22" fill="#9e9e9e">→</text>
  <text x="395" y="245" text-anchor="middle" font-size="11" fill="#757575">多承担</text>
  <text x="395" y="262" text-anchor="middle" font-size="11" fill="#757575">利率+信用</text>
  <text x="395" y="279" text-anchor="middle" font-size="11" fill="#757575">风险</text>
</svg>
