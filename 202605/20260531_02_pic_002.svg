<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">短债基金的两大风险来源与应对</text>

  <!-- 利率风险 -->
  <rect x="50" y="65" width="320" height="340" fill="#fff" rx="12" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="50" y="65" width="320" height="50" fill="#5c6bc0" rx="12"/>
  <rect x="50" y="95" width="320" height="20" fill="#5c6bc0"/>
  <text x="210" y="97" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">📈 利率风险</text>

  <text x="80" y="140" font-size="13" font-weight="bold" fill="#3949ab">▌ 是什么</text>
  <text x="80" y="162" font-size="12" fill="#333">市场利率上升时，已持有的债券</text>
  <text x="80" y="180" font-size="12" fill="#333">价格下跌，基金净值随之走低</text>

  <text x="80" y="215" font-size="13" font-weight="bold" fill="#3949ab">▌ 为什么会这样</text>
  <text x="80" y="237" font-size="12" fill="#333">债券价格与利率反向运动——</text>
  <text x="80" y="255" font-size="12" fill="#333">利率↑ → 老债吸引力↓ → 价格↓</text>

  <text x="80" y="290" font-size="13" font-weight="bold" fill="#3949ab">▌ 久期越长，冲击越大</text>
  <text x="80" y="312" font-size="12" fill="#333">短债基金久期1~3年，相对可控</text>
  <text x="80" y="330" font-size="12" fill="#333">利率升1%，净值约跌1%~3%</text>

  <rect x="70" y="350" width="280" height="42" fill="#e8eaf6" rx="8"/>
  <text x="210" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#3949ab">如何应对：</text>
  <text x="210" y="385" text-anchor="middle" font-size="12" fill="#333">利率上升期缩短久期 / 降低仓位</text>

  <!-- 信用风险 -->
  <rect x="430" y="65" width="320" height="340" fill="#fff" rx="12" stroke="#e53935" stroke-width="2"/>
  <rect x="430" y="65" width="320" height="50" fill="#e53935" rx="12"/>
  <rect x="430" y="95" width="320" height="20" fill="#e53935"/>
  <text x="590" y="97" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">💥 信用风险</text>

  <text x="460" y="140" font-size="13" font-weight="bold" fill="#c62828">▌ 是什么</text>
  <text x="460" y="162" font-size="12" fill="#333">债券发行主体（企业）还不上钱</text>
  <text x="460" y="180" font-size="12" fill="#333">基金持有该债券则直接亏损</text>

  <text x="460" y="215" font-size="13" font-weight="bold" fill="#c62828">▌ 为什么短债也有这个风险</text>
  <text x="460" y="237" font-size="12" fill="#333">短债基金持有企业信用债，</text>
  <text x="460" y="255" font-size="12" fill="#333">若公司违约，本金可能部分损失</text>

  <text x="460" y="290" font-size="13" font-weight="bold" fill="#c62828">▌ 信用债分级</text>
  <text x="460" y="312" font-size="12" fill="#333">AAA → AA+ → AA → AA- → A+</text>
  <text x="460" y="330" font-size="12" fill="#333">评级越低，收益越高，风险越大</text>

  <rect x="450" y="350" width="280" height="42" fill="#ffebee" rx="8"/>
  <text x="590" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">如何应对：</text>
  <text x="590" y="385" text-anchor="middle" font-size="12" fill="#333">选AA+以上持仓占比高的基金</text>

  <!-- 底部提示 -->
  <text x="400" y="432" text-anchor="middle" font-size="12" fill="#757575">💡 短债基金遭受两者叠加冲击时，可能阶段性跑输货币基金甚至出现亏损</text>
</svg>
