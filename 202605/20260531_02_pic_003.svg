<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">短债基金选择决策树</text>

  <!-- Root -->
  <rect x="300" y="60" width="200" height="50" fill="#5c6bc0" rx="10"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">我要买短债基金吗？</text>
  <text x="400" y="100" text-anchor="middle" font-size="12" fill="#c5cae9">（先问自己三个问题）</text>

  <!-- 问题1 -->
  <line x1="400" y1="110" x2="400" y2="145" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="270" y="145" width="260" height="45" fill="#fff" rx="8" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="400" y="163" text-anchor="middle" font-size="12" fill="#6a1b9a">Q1：这笔钱半年内要用吗？</text>
  <text x="400" y="182" text-anchor="middle" font-size="12" fill="#9c27b0">（要用→选货币基金；不用→继续↓）</text>

  <!-- 问题2 -->
  <line x1="400" y1="190" x2="400" y2="225" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="270" y="225" width="260" height="45" fill="#fff" rx="8" stroke="#0288d1" stroke-width="1.5"/>
  <text x="400" y="243" text-anchor="middle" font-size="12" fill="#01579b">Q2：能接受净值短暂下跌吗？</text>
  <text x="400" y="262" text-anchor="middle" font-size="12" fill="#0288d1">（不能接受→货币基金；能接受→继续↓）</text>

  <!-- 问题3 -->
  <line x1="400" y1="270" x2="400" y2="305" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="270" y="305" width="260" height="45" fill="#fff" rx="8" stroke="#388e3c" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" font-size="12" fill="#1b5e20">Q3：看懂基金持仓的信用等级？</text>
  <text x="400" y="342" text-anchor="middle" font-size="12" fill="#388e3c">（不看→选纯利率型；能看→信用+利率型）</text>

  <!-- 左分支：货币基金 -->
  <line x1="270" y1="167" x2="140" y2="167" stroke="#9e9e9e" stroke-width="1.5"/>
  <line x1="140" y1="167" x2="140" y2="325" stroke="#9e9e9e" stroke-width="1.5"/>
  <rect x="60" y="305" width="160" height="40" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="1.5"/>
  <text x="140" y="323" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">✅ 货币基金</text>
  <text x="140" y="339" text-anchor="middle" font-size="11" fill="#4caf50">安全第一</text>

  <!-- 右分支：短债 -->
  <line x1="530" y1="327" x2="680" y2="327" stroke="#9e9e9e" stroke-width="1.5"/>
  <rect x="610" y="307" width="160" height="40" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1.5"/>
  <text x="690" y="325" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">✅ 短债基金</text>
  <text x="690" y="341" text-anchor="middle" font-size="11" fill="#ff9800">多赚一点点</text>
</svg>
