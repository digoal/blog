<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">利率 与 债券价格：一根翘翘板</text>

  <!-- 翘翘板支架 -->
  <line x1="400" y1="340" x2="400" y2="380" stroke="#888" stroke-width="4"/>
  <polygon points="400,380 370,410 430,410" fill="#888"/>

  <!-- 翘翘板横梁（左低右高，利率上升状态） -->
  <g id="seesaw_up">
    <line x1="120" y1="310" x2="680" y2="250" stroke="#e76f51" stroke-width="6" stroke-linecap="round"/>
    <!-- 左侧 利率 -->
    <rect x="60" y="250" width="110" height="56" rx="10" fill="#e76f51"/>
    <text x="115" y="274" text-anchor="middle" font-size="14" fill="white" font-weight="bold">利率</text>
    <text x="115" y="294" text-anchor="middle" font-size="20" fill="white">↑ 上升</text>
    <!-- 右侧 债券价格 -->
    <rect x="630" y="190" width="120" height="56" rx="10" fill="#2a9d8f"/>
    <text x="690" y="214" text-anchor="middle" font-size="14" fill="white" font-weight="bold">债券价格</text>
    <text x="690" y="234" text-anchor="middle" font-size="20" fill="white">↓ 下跌</text>
  </g>

  <!-- 说明文字 -->
  <text x="400" y="300" text-anchor="middle" font-size="13" fill="#555">这是债券的铁律：利率和债券价格，永远相反运动</text>

  <!-- 下方两个场景 -->
  <!-- 场景A -->
  <rect x="60" y="120" width="300" height="100" rx="12" fill="#fff" stroke="#e76f51" stroke-width="2"/>
  <text x="210" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#e76f51">😰 利率上升 → 债价下跌</text>
  <text x="210" y="170" text-anchor="middle" font-size="12" fill="#444">新债利率更高，老债变"不划算"</text>
  <text x="210" y="190" text-anchor="middle" font-size="12" fill="#444">市场压低老债价格 → 基金净值跌</text>
  <text x="210" y="210" text-anchor="middle" font-size="12" fill="#c0392b">持有中长期债基可能亏损</text>

  <!-- 场景B -->
  <rect x="440" y="120" width="300" height="100" rx="12" fill="#fff" stroke="#2a9d8f" stroke-width="2"/>
  <text x="590" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a9d8f">😊 利率下降 → 债价上涨</text>
  <text x="590" y="170" text-anchor="middle" font-size="12" fill="#444">新债利率更低，老债变"香饽饽"</text>
  <text x="590" y="190" text-anchor="middle" font-size="12" fill="#444">市场抬高老债价格 → 基金净值涨</text>
  <text x="590" y="210" text-anchor="middle" font-size="12" fill="#27ae60">持有中长期债基可能赚到价差</text>

  <!-- 顶部标注 -->
  <rect x="280" y="55" width="240" height="44" rx="10" fill="#264653"/>
  <text x="400" y="74" text-anchor="middle" font-size="13" fill="white">久期越长，价格波动越大</text>
  <text x="400" y="92" text-anchor="middle" font-size="12" fill="#a8d8d8">短债微波动 → 中债中波动 → 长债大波动</text>
</svg>
