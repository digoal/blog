<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="460" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">三类债基对比：久期决定命运</text>

  <!-- 表头 -->
  <rect x="40" y="60" width="720" height="44" rx="8" fill="#264653"/>
  <text x="140" y="88" text-anchor="middle" font-size="14" fill="white" font-weight="bold">类型</text>
  <text x="300" y="88" text-anchor="middle" font-size="14" fill="white" font-weight="bold">典型久期</text>
  <text x="450" y="88" text-anchor="middle" font-size="14" fill="white" font-weight="bold">利率降1%，净值约涨</text>
  <text x="620" y="88" text-anchor="middle" font-size="14" fill="white" font-weight="bold">适合场景</text>

  <!-- 行1：货币基金 -->
  <rect x="40" y="104" width="720" height="60" rx="0" fill="white"/>
  <line x1="40" y1="164" x2="760" y2="164" stroke="#eee" stroke-width="1"/>
  <text x="140" y="130" text-anchor="middle" font-size="14" fill="#333">货币基金</text>
  <text x="140" y="152" text-anchor="middle" font-size="12" fill="#888">（第3节已讲）</text>
  <text x="300" y="140" text-anchor="middle" font-size="15" fill="#555">≈ 0.1天</text>
  <rect x="380" y="122" width="130" height="28" rx="6" fill="#e8f5e9"/>
  <text x="445" y="141" text-anchor="middle" font-size="14" fill="#27ae60" font-weight="bold">几乎不动</text>
  <text x="620" y="140" text-anchor="middle" font-size="13" fill="#444">随时存取，稳定优先</text>

  <!-- 行2：短债基金 -->
  <rect x="40" y="164" width="720" height="60" fill="#fafafa"/>
  <line x1="40" y1="224" x2="760" y2="224" stroke="#eee" stroke-width="1"/>
  <text x="140" y="190" text-anchor="middle" font-size="14" fill="#333">短债基金</text>
  <text x="140" y="210" text-anchor="middle" font-size="12" fill="#888">（第4节已讲）</text>
  <text x="300" y="200" text-anchor="middle" font-size="15" fill="#555">0.5 ~ 2年</text>
  <rect x="380" y="182" width="130" height="28" rx="6" fill="#fff3e0"/>
  <text x="445" y="201" text-anchor="middle" font-size="14" fill="#e67e22" font-weight="bold">+0.5%~2%</text>
  <text x="620" y="200" text-anchor="middle" font-size="13" fill="#444">比货基多点收益</text>

  <!-- 行3：中长期债基 ★ 本节主角 -->
  <rect x="40" y="224" width="720" height="72" fill="#e8f4fd"/>
  <line x1="40" y1="296" x2="760" y2="296" stroke="#2980b9" stroke-width="1" stroke-dasharray="4"/>
  <rect x="40" y="224" width="4" height="72" fill="#2980b9"/>
  <text x="140" y="254" text-anchor="middle" font-size="14" fill="#1a5276" font-weight="bold">中长期债基</text>
  <text x="140" y="274" text-anchor="middle" font-size="13" fill="#2980b9">★ 本节主角</text>
  <text x="300" y="264" text-anchor="middle" font-size="15" fill="#1a5276" font-weight="bold">3 ~ 8年</text>
  <rect x="380" y="242" width="130" height="32" rx="6" fill="#2980b9"/>
  <text x="445" y="263" text-anchor="middle" font-size="15" fill="white" font-weight="bold">+3%~8%</text>
  <text x="620" y="264" text-anchor="middle" font-size="13" fill="#1a5276" font-weight="bold">利率下行周期主打</text>

  <!-- 行4：长债/超长债 -->
  <rect x="40" y="296" width="720" height="60" fill="white"/>
  <line x1="40" y1="356" x2="760" y2="356" stroke="#eee" stroke-width="1"/>
  <text x="140" y="322" text-anchor="middle" font-size="14" fill="#333">长债/超长债</text>
  <text x="140" y="342" text-anchor="middle" font-size="12" fill="#888">（30年国债等）</text>
  <text x="300" y="332" text-anchor="middle" font-size="15" fill="#555">10 ~ 25年</text>
  <rect x="380" y="314" width="130" height="28" rx="6" fill="#fdecea"/>
  <text x="445" y="333" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">+10%~25%</text>
  <text x="620" y="332" text-anchor="middle" font-size="13" fill="#c0392b">高收益高波动，谨慎</text>

  <!-- 底部注释 -->
  <text x="400" y="390" text-anchor="middle" font-size="12" fill="#888">※ "利率降1%净值约涨"基于久期近似计算，实际会因基金构成有所差异</text>
  <text x="400" y="412" text-anchor="middle" font-size="12" fill="#888">久期（Duration）= 回收全部现金流的加权平均时间，是衡量利率敏感度的核心指标</text>
</svg>
