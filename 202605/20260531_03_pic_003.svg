<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">中长期债基：什么时候买，什么时候跑</text>

  <!-- 时间轴 -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#bbb" stroke-width="2"/>
  <!-- 箭头 -->
  <polygon points="740,200 728,194 728,206" fill="#bbb"/>
  <text x="750" y="204" font-size="12" fill="#888">时间</text>

  <!-- 利率曲线（下降再上升的抛物线形）-->
  <!-- 高点 → 低点 → 反弹，模拟一个利率周期 -->
  <path d="M 80,100 C 200,100 250,290 400,290 C 550,290 600,100 720,100" 
        fill="none" stroke="#e76f51" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="750" y="104" font-size="12" fill="#e76f51">利率</text>

  <!-- 债价曲线（与利率相反）-->
  <path d="M 80,290 C 200,290 250,100 400,100 C 550,100 600,290 720,290" 
        fill="none" stroke="#2a9d8f" stroke-width="3"/>
  <text x="750" y="294" font-size="12" fill="#2a9d8f">债价</text>

  <!-- 买入区间标注 -->
  <rect x="78" y="70" width="160" height="36" rx="8" fill="#27ae60" opacity="0.15"/>
  <rect x="78" y="70" width="4" height="36" rx="2" fill="#27ae60"/>
  <text x="165" y="88" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="bold">✅ 买入区：利率高位</text>
  <text x="165" y="104" text-anchor="middle" font-size="12" fill="#1e8449">利率已高，下行概率大</text>

  <!-- 持有阶段 -->
  <rect x="260" y="130" width="280" height="36" rx="8" fill="#2980b9" opacity="0.10"/>
  <text x="400" y="153" text-anchor="middle" font-size="13" fill="#1a5276">持有阶段：利率下行，净值上涨，拿住</text>

  <!-- 卖出区间 -->
  <rect x="560" y="70" width="160" height="36" rx="8" fill="#e74c3c" opacity="0.15"/>
  <rect x="716" y="70" width="4" height="36" rx="2" fill="#e74c3c"/>
  <text x="638" y="88" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">⚠️ 卖出区：利率低位</text>
  <text x="638" y="104" text-anchor="middle" font-size="12" fill="#c0392b">利率已低，上行风险来了</text>

  <!-- 底部三个关键指标 -->
  <rect x="50" y="320" width="200" height="44" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="150" y="340" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">买入信号</text>
  <text x="150" y="358" text-anchor="middle" font-size="11" fill="#444">10年国债收益率接近历史高位</text>

  <rect x="300" y="320" width="200" height="44" rx="8" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" font-size="13" fill="#2980b9" font-weight="bold">持有信号</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#444">央行宽松，CPI低，经济偏弱</text>

  <rect x="550" y="320" width="200" height="44" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="650" y="340" text-anchor="middle" font-size="13" fill="#e74c3c" font-weight="bold">减仓信号</text>
  <text x="650" y="358" text-anchor="middle" font-size="11" fill="#444">收益率创新低，通胀预期升温</text>
</svg>
