<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">债券ETF vs 场外债基：核心差异对比</text>

  <!-- 表头 -->
  <rect x="40" y="50" width="200" height="44" rx="6" fill="#4a6fa5"/>
  <rect x="250" y="50" width="230" height="44" rx="6" fill="#2d6a4f"/>
  <rect x="490" y="50" width="270" height="44" rx="6" fill="#c77dff" fill-opacity="0.85"/>

  <text x="140" y="77" text-anchor="middle" font-size="13" fill="white" font-weight="bold">维度</text>
  <text x="365" y="77" text-anchor="middle" font-size="13" fill="white" font-weight="bold">债券ETF（场内）</text>
  <text x="625" y="77" text-anchor="middle" font-size="13" fill="white" font-weight="bold">场外债券基金</text>

  <!-- 数据行 -->
  <rect x="40" y="100" width="720" height="44" rx="4" fill="#e9ecef"/>
  <rect x="40" y="150" width="720" height="44" rx="4" fill="white"/>
  <rect x="40" y="200" width="720" height="44" rx="4" fill="#e9ecef"/>
  <rect x="40" y="250" width="720" height="44" rx="4" fill="white"/>
  <rect x="40" y="300" width="720" height="44" rx="4" fill="#e9ecef"/>
  <rect x="40" y="350" width="720" height="44" rx="4" fill="white"/>

  <!-- 维度列 -->
  <text x="140" y="127" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">买卖方式</text>
  <text x="140" y="177" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">价格形成</text>
  <text x="140" y="227" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">赎回到账</text>
  <text x="140" y="277" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">折溢价现象</text>
  <text x="140" y="327" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">最低门槛</text>
  <text x="140" y="377" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">适合场景</text>

  <!-- ETF列 -->
  <text x="365" y="127" text-anchor="middle" font-size="12" fill="#2d6a4f">证券账户 实时买卖</text>
  <text x="365" y="177" text-anchor="middle" font-size="12" fill="#2d6a4f">市场撮合 随时波动</text>
  <text x="365" y="227" text-anchor="middle" font-size="12" fill="#2d6a4f">T+0可卖出（但货到T+1）</text>
  <text x="365" y="277" text-anchor="middle" font-size="12" fill="#e63946" font-weight="bold">存在（需注意溢价风险）</text>
  <text x="365" y="327" text-anchor="middle" font-size="12" fill="#2d6a4f">1手（约百元起）</text>
  <text x="365" y="377" text-anchor="middle" font-size="12" fill="#2d6a4f">灵活操作 快进快出</text>

  <!-- 场外列 -->
  <text x="625" y="127" text-anchor="middle" font-size="12" fill="#555">基金账户 每日申赎</text>
  <text x="625" y="177" text-anchor="middle" font-size="12" fill="#555">每日收市后公布净值</text>
  <text x="625" y="227" text-anchor="middle" font-size="12" fill="#555">T+1~T+3到账</text>
  <text x="625" y="277" text-anchor="middle" font-size="12" fill="#2d6a4f">不存在（净值交易）</text>
  <text x="625" y="327" text-anchor="middle" font-size="12" fill="#555">通常1元起</text>
  <text x="625" y="377" text-anchor="middle" font-size="12" fill="#555">长期持有 忽略价差</text>

  <!-- 分隔线 -->
  <line x1="240" y1="50" x2="240" y2="394" stroke="#ccc" stroke-width="1"/>
  <line x1="480" y1="50" x2="480" y2="394" stroke="#ccc" stroke-width="1"/>
</svg>
