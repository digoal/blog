<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">溢价买入债券ETF的亏损路径</text>

  <!-- 场景说明 -->
  <rect x="40" y="50" width="720" height="36" rx="6" fill="#fff3cd"/>
  <text x="400" y="73" text-anchor="middle" font-size="12" fill="#856404">场景假设：某债券ETF净值=1.000元，市场价=1.025元，溢价率=2.5%</text>

  <!-- 步骤框 -->
  <!-- Step 1 -->
  <rect x="40" y="105" width="155" height="90" rx="8" fill="#e63946" fill-opacity="0.12" stroke="#e63946" stroke-width="1.5"/>
  <text x="118" y="128" text-anchor="middle" font-size="12" fill="#e63946" font-weight="bold">① 你高价买入</text>
  <text x="118" y="148" text-anchor="middle" font-size="11" fill="#333">花1.025元买</text>
  <text x="118" y="164" text-anchor="middle" font-size="11" fill="#333">实际价值1.000</text>
  <text x="118" y="180" text-anchor="middle" font-size="11" fill="#e63946">立亏2.5%</text>

  <!-- 箭头 -->
  <line x1="196" y1="150" x2="230" y2="150" stroke="#999" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Step 2 -->
  <rect x="235" y="105" width="155" height="90" rx="8" fill="#fd7014" fill-opacity="0.12" stroke="#fd7014" stroke-width="1.5"/>
  <text x="313" y="128" text-anchor="middle" font-size="12" fill="#fd7014" font-weight="bold">② 套利者出现</text>
  <text x="313" y="148" text-anchor="middle" font-size="11" fill="#333">机构在场外用</text>
  <text x="313" y="164" text-anchor="middle" font-size="11" fill="#333">1.000申购基金</text>
  <text x="313" y="180" text-anchor="middle" font-size="11" fill="#333">场内卖出压价</text>

  <!-- 箭头 -->
  <line x1="391" y1="150" x2="425" y2="150" stroke="#999" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="430" y="105" width="155" height="90" rx="8" fill="#2d6a4f" fill-opacity="0.12" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="508" y="128" text-anchor="middle" font-size="12" fill="#2d6a4f" font-weight="bold">③ 溢价收窄</text>
  <text x="508" y="148" text-anchor="middle" font-size="11" fill="#333">市价从1.025</text>
  <text x="508" y="164" text-anchor="middle" font-size="11" fill="#333">回落至1.000</text>
  <text x="508" y="180" text-anchor="middle" font-size="11" fill="#2d6a4f">套利者获利</text>

  <!-- 箭头 -->
  <line x1="586" y1="150" x2="620" y2="150" stroke="#999" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="625" y="105" width="135" height="90" rx="8" fill="#e63946" fill-opacity="0.18" stroke="#e63946" stroke-width="2"/>
  <text x="693" y="128" text-anchor="middle" font-size="12" fill="#e63946" font-weight="bold">④ 你亏损</text>
  <text x="693" y="148" text-anchor="middle" font-size="11" fill="#333">债券没跌</text>
  <text x="693" y="164" text-anchor="middle" font-size="11" fill="#333">但你账面</text>
  <text x="693" y="180" text-anchor="middle" font-size="11" fill="#e63946">损失2.5%</text>

  <!-- 结论 -->
  <rect x="40" y="220" width="720" height="50" rx="8" fill="#1a1a2e"/>
  <text x="400" y="242" text-anchor="middle" font-size="13" fill="white" font-weight="bold">核心教训：买债券ETF，看净值；高溢价时，等一等或换场外基金</text>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#adb5bd">溢价率 = (市价 - 净值) ÷ 净值 × 100%，超过0.5%要警惕，超过1%请三思</text>

  <!-- 流动性风险图示 -->
  <text x="40" y="305" font-size="13" fill="#333" font-weight="bold">流动性风险示意（成交量 vs 买卖价差）</text>
  <rect x="40" y="315" width="220" height="44" rx="6" fill="#2d6a4f" fill-opacity="0.15" stroke="#2d6a4f"/>
  <text x="150" y="334" text-anchor="middle" font-size="11" fill="#2d6a4f" font-weight="bold">高流动性ETF</text>
  <text x="150" y="350" text-anchor="middle" font-size="10" fill="#555">日均成交&gt;1亿 | 买卖差&lt;0.02%</text>

  <text x="290" y="340" text-anchor="middle" font-size="18" fill="#aaa">→</text>

  <rect x="310" y="315" width="220" height="44" rx="6" fill="#fd7014" fill-opacity="0.15" stroke="#fd7014"/>
  <text x="420" y="334" text-anchor="middle" font-size="11" fill="#fd7014" font-weight="bold">低流动性ETF</text>
  <text x="420" y="350" text-anchor="middle" font-size="10" fill="#555">日均成交&lt;500万 | 买卖差&gt;0.1%</text>

  <text x="560" y="340" text-anchor="middle" font-size="18" fill="#aaa">→</text>

  <rect x="580" y="315" width="180" height="44" rx="6" fill="#e63946" fill-opacity="0.15" stroke="#e63946"/>
  <text x="670" y="334" text-anchor="middle" font-size="11" fill="#e63946" font-weight="bold">危险信号</text>
  <text x="670" y="350" text-anchor="middle" font-size="10" fill="#555">规模&lt;2亿 → 清盘风险</text>
</svg>
