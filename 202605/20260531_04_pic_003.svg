<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">债券ETF买入决策树</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a6fa5"/>
    </marker>
  </defs>

  <!-- 起点 -->
  <rect x="300" y="45" width="200" height="40" rx="20" fill="#4a6fa5"/>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="white" font-weight="bold">想买债券ETF？</text>

  <!-- 问题1 -->
  <line x1="400" y1="85" x2="400" y2="115" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="115" width="260" height="40" rx="6" fill="#fff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="400" y="140" text-anchor="middle" font-size="12" fill="#333">①先查溢价率（市价÷净值-1）</text>

  <!-- 分支 -->
  <line x1="400" y1="155" x2="400" y2="175" stroke="#4a6fa5" stroke-width="2"/>
  <line x1="400" y1="175" x2="180" y2="175" stroke="#4a6fa5" stroke-width="2"/>
  <line x1="400" y1="175" x2="620" y2="175" stroke="#4a6fa5" stroke-width="2"/>

  <!-- 左分支：低溢价 -->
  <line x1="180" y1="175" x2="180" y2="195" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="195" width="240" height="36" rx="6" fill="#2d6a4f" fill-opacity="0.12" stroke="#2d6a4f"/>
  <text x="180" y="212" text-anchor="middle" font-size="11" fill="#2d6a4f" font-weight="bold">溢价率 &lt; 0.3%</text>
  <text x="180" y="225" text-anchor="middle" font-size="10" fill="#555">正常区间，可以考虑</text>

  <!-- 右分支：高溢价 -->
  <line x1="620" y1="175" x2="620" y2="195" stroke="#e63946" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="195" width="240" height="36" rx="6" fill="#e63946" fill-opacity="0.12" stroke="#e63946"/>
  <text x="620" y="212" text-anchor="middle" font-size="11" fill="#e63946" font-weight="bold">溢价率 &gt; 0.5%</text>
  <text x="620" y="225" text-anchor="middle" font-size="10" fill="#555">暂缓，等回落或换场外</text>

  <!-- 问题2 -->
  <line x1="180" y1="231" x2="180" y2="255" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="255" width="240" height="36" rx="6" fill="#fff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="180" y="272" text-anchor="middle" font-size="11" fill="#333">②查成交额（日均是否&gt;2000万）</text>
  <text x="180" y="284" text-anchor="middle" font-size="10" fill="#e63946">若&lt;500万，流动性差，风险高</text>

  <!-- 问题3 -->
  <line x1="180" y1="291" x2="180" y2="310" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="310" width="240" height="26" rx="6" fill="#2d6a4f"/>
  <text x="180" y="328" text-anchor="middle" font-size="11" fill="white" font-weight="bold">✓ 下单，用限价单不用市价单</text>

  <!-- 右侧替代方案 -->
  <line x1="620" y1="231" x2="620" y2="255" stroke="#e63946" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="255" width="240" height="60" rx="6" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="620" y="275" text-anchor="middle" font-size="11" fill="#856404" font-weight="bold">替代方案</text>
  <text x="620" y="292" text-anchor="middle" font-size="10" fill="#555">A. 同标的场外指数基金</text>
  <text x="620" y="307" text-anchor="middle" font-size="10" fill="#555">B. 等溢价收窄后再买</text>

  <!-- 标签 -->
  <text x="290" y="170" text-anchor="middle" font-size="10" fill="#2d6a4f">低溢价</text>
  <text x="510" y="170" text-anchor="middle" font-size="10" fill="#e63946">高溢价</text>
</svg>
