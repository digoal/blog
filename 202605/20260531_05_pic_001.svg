<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">同业存单指数基金：收益从哪来？</text>

  <!-- 三个来源框 -->
  <!-- 来源1 -->
  <rect x="50" y="65" width="200" height="100" rx="10" fill="#e8f4f8" stroke="#3a86c8" stroke-width="2"/>
  <text x="150" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">① 票息收入</text>
  <text x="150" y="115" text-anchor="middle" font-size="11" fill="#333">银行发行存单，</text>
  <text x="150" y="133" text-anchor="middle" font-size="11" fill="#333">约定到期还本付息</text>
  <text x="150" y="153" text-anchor="middle" font-size="11" fill="#c0392b">（最主要收益来源）</text>

  <!-- 来源2 -->
  <rect x="300" y="65" width="200" height="100" rx="10" fill="#e8f8ef" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">② 价格波动</text>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#333">市场利率变动导致</text>
  <text x="400" y="133" text-anchor="middle" font-size="11" fill="#333">存单二级市场价格涨跌</text>
  <text x="400" y="153" text-anchor="middle" font-size="11" fill="#7d6608">（波动较小，可正可负）</text>

  <!-- 来源3 -->
  <rect x="550" y="65" width="200" height="100" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="650" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a5e0a">③ 滚动操作</text>
  <text x="650" y="115" text-anchor="middle" font-size="11" fill="#333">存单到期，基金经理</text>
  <text x="650" y="133" text-anchor="middle" font-size="11" fill="#333">再买入新存单</text>
  <text x="650" y="153" text-anchor="middle" font-size="11" fill="#7d6608">（持续复利效果）</text>

  <!-- 箭头 -->
  <line x1="250" y1="115" x2="300" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="115" x2="550" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- 分界线 -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 下半部分：对比货基 -->
  <text x="400" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">与货币基金的关键差异</text>

  <!-- 货基 -->
  <rect x="60" y="248" width="300" height="130" rx="8" fill="#fff" stroke="#3a86c8" stroke-width="1.5"/>
  <text x="210" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a86c8">货币基金</text>
  <text x="80" y="298" font-size="11" fill="#444">• 资产更分散（协议存款、国债等）</text>
  <text x="80" y="320" font-size="11" fill="#444">• 组合久期极短（≤120天）</text>
  <text x="80" y="342" font-size="11" fill="#444">• 流动性最强（T+0或T+1）</text>
  <text x="80" y="364" font-size="11" fill="#444">• 收益率略低，波动几乎为零</text>

  <!-- 同业存单基金 -->
  <rect x="430" y="248" width="300" height="130" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="580" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">同业存单指数基金</text>
  <text x="450" y="298" font-size="11" fill="#444">• 专注同业存单（银行间市场）</text>
  <text x="450" y="320" font-size="11" fill="#444">• 久期1年以内（略长于货基）</text>
  <text x="450" y="342" font-size="11" fill="#444">• 流动性次之（T+1或T+2）</text>
  <text x="450" y="364" font-size="11" fill="#444">• 收益率通常高于货基0.2%~0.5%</text>

  <!-- 底部说明 -->
  <text x="400" y="407" text-anchor="middle" font-size="10" fill="#888">数据仅为说明规律，实际收益受市场环境影响，历史不代表未来</text>
</svg>
