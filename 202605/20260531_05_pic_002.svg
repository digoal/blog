<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">同业存单指数基金：三类风险边界地图</text>

  <!-- 风险1：信用风险 -->
  <rect x="30" y="55" width="225" height="185" rx="10" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <rect x="30" y="55" width="225" height="38" rx="10" fill="#e74c3c"/>
  <text x="143" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">① 信用风险</text>
  <text x="50" y="115" font-size="11" fill="#333">银行发不出钱？</text>
  <text x="50" y="135" font-size="11" fill="#555">存单由银行发行，理论上存在</text>
  <text x="50" y="153" font-size="11" fill="#555">银行违约风险，但：</text>
  <text x="50" y="175" font-size="11" fill="#27ae60">✓ 指数基金持仓分散（50+家）</text>
  <text x="50" y="195" font-size="11" fill="#27ae60">✓ 优先选AAA评级存单</text>
  <text x="50" y="215" font-size="11" fill="#c0392b">⚠ 中小行存单风险 > 国有行</text>
  <text x="50" y="233" font-size="11" fill="#888">结论：现实概率极低，但非零</text>

  <!-- 风险2：利率风险 -->
  <rect x="288" y="55" width="225" height="185" rx="10" fill="#fff" stroke="#f39c12" stroke-width="2"/>
  <rect x="288" y="55" width="225" height="38" rx="10" fill="#f39c12"/>
  <text x="400" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">② 利率风险</text>
  <text x="308" y="115" font-size="11" fill="#333">短期亏损怎么回事？</text>
  <text x="308" y="135" font-size="11" fill="#555">市场利率突然上升时，</text>
  <text x="308" y="153" font-size="11" fill="#555">存单价格下跌 → 净值短暂回撤</text>
  <text x="308" y="175" font-size="11" fill="#c0392b">⚠ 持有1~3个月可能短亏</text>
  <text x="308" y="195" font-size="11" fill="#27ae60">✓ 久期短，恢复较快</text>
  <text x="308" y="215" font-size="11" fill="#27ae60">✓ 持有越久，票息覆盖亏损</text>
  <text x="308" y="233" font-size="11" fill="#888">结论：短期波动工具，慎用</text>

  <!-- 风险3：流动性风险 -->
  <rect x="546" y="55" width="225" height="185" rx="10" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <rect x="546" y="55" width="225" height="38" rx="10" fill="#8e44ad"/>
  <text x="658" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">③ 流动性风险</text>
  <text x="566" y="115" font-size="11" fill="#333">急用钱能马上取出？</text>
  <text x="566" y="135" font-size="11" fill="#555">场内ETF：随时交易（T+1到账）</text>
  <text x="566" y="153" font-size="11" fill="#555">场外申购：T+1确认，T+2到账</text>
  <text x="566" y="175" font-size="11" fill="#c0392b">⚠ 比货基慢1~2天</text>
  <text x="566" y="195" font-size="11" fill="#c0392b">⚠ 极端市场可能有申购限制</text>
  <text x="566" y="215" font-size="11" fill="#27ae60">✓ 正常市场赎回无障碍</text>
  <text x="566" y="233" font-size="11" fill="#888">结论：比货基稍差，日常可接受</text>

  <!-- 底部适用场景 -->
  <rect x="30" y="265" width="740" height="90" rx="10" fill="#eaf4fb" stroke="#3a86c8" stroke-width="1.5"/>
  <text x="400" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">✅ 什么钱适合放同业存单指数基金？</text>
  <text x="70" y="315" font-size="11" fill="#333">• 3~12个月内不用但也不想锁死的"备用现金"</text>
  <text x="70" y="337" font-size="11" fill="#333">• 等待市场机会、尚未部署的"子弹仓"</text>
  <text x="400" y="315" font-size="11" fill="#c0392b">❌ 不适合：明天要还款的钱 / 要抄底用的即时资金 / 追求保本刚兑的钱</text>
  <text x="400" y="337" font-size="11" fill="#888">（银行理财也不保本，但概念上散户仍有刚兑预期，需要清晰认知差异）</text>
</svg>
