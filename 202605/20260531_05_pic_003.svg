<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa"/>
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">闲置资金工具选择决策树</text>

  <!-- 根节点 -->
  <rect x="280" y="52" width="240" height="44" rx="8" fill="#3a86c8"/>
  <text x="400" y="69" text-anchor="middle" font-size="12" font-weight="bold" fill="white">这笔钱多久内要用？</text>
  <text x="400" y="87" text-anchor="middle" font-size="11" fill="white">（生活钱不在投资系统里）</text>

  <!-- 分支线 -->
  <line x1="320" y1="96" x2="200" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="400" y1="96" x2="400" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="480" y1="96" x2="600" y2="140" stroke="#555" stroke-width="1.5"/>

  <text x="185" y="130" text-anchor="middle" font-size="11" fill="#e74c3c">随时可能用</text>
  <text x="400" y="130" text-anchor="middle" font-size="11" fill="#f39c12">3~12个月</text>
  <text x="615" y="130" text-anchor="middle" font-size="11" fill="#27ae60">12个月以上</text>

  <!-- 三个节点 -->
  <rect x="80" y="148" width="220" height="56" rx="8" fill="#3a86c8" opacity="0.8"/>
  <text x="190" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="white">货币基金</text>
  <text x="190" y="190" text-anchor="middle" font-size="10" fill="#d9f0fb">T+0/T+1，流动性最佳</text>

  <rect x="290" y="148" width="220" height="56" rx="8" fill="#27ae60"/>
  <text x="400" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="white">同业存单指数基金</text>
  <text x="400" y="190" text-anchor="middle" font-size="10" fill="#d5f5e3">收益略高，接受T+1/T+2</text>

  <rect x="500" y="148" width="220" height="56" rx="8" fill="#8e44ad" opacity="0.85"/>
  <text x="610" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="white">短债基金 / 债券ETF</text>
  <text x="610" y="190" text-anchor="middle" font-size="10" fill="#e8daef">承担更多利率风险，预期收益更高</text>

  <!-- 第二层问题 -->
  <line x1="400" y1="204" x2="400" y2="245" stroke="#555" stroke-width="1.5"/>
  <rect x="260" y="245" width="280" height="50" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">能否接受短期净值小幅回撤？</text>
  <text x="400" y="285" text-anchor="middle" font-size="11" fill="#555">（利率上升时可能1~3个月微亏）</text>

  <line x1="330" y1="295" x2="230" y2="330" stroke="#555" stroke-width="1.5"/>
  <line x1="470" y1="295" x2="570" y2="330" stroke="#555" stroke-width="1.5"/>

  <text x="220" y="325" text-anchor="middle" font-size="11" fill="#e74c3c">不能接受</text>
  <text x="580" y="325" text-anchor="middle" font-size="11" fill="#27ae60">能接受</text>

  <rect x="80" y="335" width="200" height="20" rx="6" fill="#e74c3c" opacity="0.8"/>
  <text x="180" y="349" text-anchor="middle" font-size="11" fill="white">货币基金 / 银行活期</text>

  <rect x="520" y="335" width="200" height="20" rx="6" fill="#27ae60"/>
  <text x="620" y="349" text-anchor="middle" font-size="11" fill="white">✓ 同业存单指数基金合适</text>
</svg>
