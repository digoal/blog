<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Hash Agg 在 SQL 执行流水线中的位置</title>
  <desc id="desc">展示 HashAggregate 从子计划读取元组，按 GROUP BY 键建立哈希表，最后输出每组聚合结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .hot{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .note{fill:#eef2ff;stroke:#4338ca;stroke-width:1.6;rx:8}
    .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:18px;fill:#111827}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="45" y="70" width="150" height="88" class="box"/>
  <text x="120" y="108" text-anchor="middle" class="text">Seq / Index Scan</text>
  <text x="120" y="134" text-anchor="middle" class="small">产生输入元组</text>

  <rect x="270" y="70" width="160" height="88" class="box"/>
  <text x="350" y="104" text-anchor="middle" class="text">Filter / Join</text>
  <text x="350" y="132" text-anchor="middle" class="small">减少或扩展输入</text>

  <rect x="505" y="45" width="185" height="138" class="hot"/>
  <text x="598" y="88" text-anchor="middle" class="text">HashAggregate</text>
  <text x="598" y="118" text-anchor="middle" class="small">hash(GROUP BY key)</text>
  <text x="598" y="142" text-anchor="middle" class="small">更新 transition state</text>

  <rect x="765" y="70" width="160" height="88" class="box"/>
  <text x="845" y="108" text-anchor="middle" class="text">Result</text>
  <text x="845" y="134" text-anchor="middle" class="small">每组一行</text>

  <path d="M195 114 H270" class="arrow"/>
  <path d="M430 114 H505" class="arrow"/>
  <path d="M690 114 H765" class="arrow"/>

  <rect x="72" y="255" width="235" height="86" class="note"/>
  <text x="190" y="288" text-anchor="middle" class="text">输入行数 N</text>
  <text x="190" y="316" text-anchor="middle" class="small">决定 transition 调用次数</text>

  <rect x="372" y="255" width="235" height="86" class="note"/>
  <text x="490" y="288" text-anchor="middle" class="text">分组数 G</text>
  <text x="490" y="316" text-anchor="middle" class="small">决定哈希表和输出规模</text>

  <rect x="672" y="255" width="235" height="86" class="note"/>
  <text x="790" y="288" text-anchor="middle" class="text">状态大小 S</text>
  <text x="790" y="316" text-anchor="middle" class="small">决定内存和溢写风险</text>

  <path d="M598 183 V224 H190 V255" class="arrow"/>
  <path d="M598 183 V255" class="arrow"/>
  <path d="M598 224 H790 V255" class="arrow"/>
</svg>
