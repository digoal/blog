<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Hash Agg 哈希表条目结构</title>
  <desc id="desc">展示每个不同分组键对应一个 TupleHashEntry，里面保存代表元组和每个聚合函数的 transition state。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bucket{fill:#ecfeff;stroke:#0e7490;stroke-width:2;rx:7}
    .entry{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .state{fill:#fef3c7;stroke:#b45309;stroke-width:1.8;rx:6}
    .ctx{fill:#f0fdf4;stroke:#15803d;stroke-width:1.8;rx:8}
    .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <text x="70" y="42" class="text">Bucket 数组</text>
  <rect x="60" y="70" width="120" height="48" class="bucket"/>
  <text x="120" y="101" text-anchor="middle" class="small">bucket 0</text>
  <rect x="60" y="130" width="120" height="48" class="bucket"/>
  <text x="120" y="161" text-anchor="middle" class="small">bucket 1</text>
  <rect x="60" y="190" width="120" height="48" class="bucket"/>
  <text x="120" y="221" text-anchor="middle" class="small">bucket 2</text>
  <rect x="60" y="250" width="120" height="48" class="bucket"/>
  <text x="120" y="281" text-anchor="middle" class="small">bucket 3</text>

  <rect x="285" y="78" width="590" height="135" class="entry"/>
  <text x="580" y="106" text-anchor="middle" class="text">TupleHashEntry: 一个 GROUP BY 键</text>
  <rect x="315" y="128" width="150" height="55" class="state"/>
  <text x="390" y="151" text-anchor="middle" class="small">代表元组</text>
  <text x="390" y="172" text-anchor="middle" class="small">group key</text>
  <rect x="495" y="128" width="160" height="55" class="state"/>
  <text x="575" y="151" text-anchor="middle" class="small">agg 1 状态</text>
  <text x="575" y="172" text-anchor="middle" class="small">sum/count/min...</text>
  <rect x="685" y="128" width="160" height="55" class="state"/>
  <text x="765" y="151" text-anchor="middle" class="small">agg 2 状态</text>
  <text x="765" y="172" text-anchor="middle" class="small">array_agg/json...</text>

  <rect x="285" y="270" width="590" height="135" class="entry"/>
  <text x="580" y="298" text-anchor="middle" class="text">另一个分组键的条目</text>
  <rect x="315" y="320" width="150" height="55" class="state"/>
  <text x="390" y="343" text-anchor="middle" class="small">代表元组</text>
  <text x="390" y="364" text-anchor="middle" class="small">group key</text>
  <rect x="495" y="320" width="160" height="55" class="state"/>
  <text x="575" y="343" text-anchor="middle" class="small">agg 1 状态</text>
  <text x="575" y="364" text-anchor="middle" class="small">transValue</text>
  <rect x="685" y="320" width="160" height="55" class="state"/>
  <text x="765" y="343" text-anchor="middle" class="small">agg 2 状态</text>
  <text x="765" y="364" text-anchor="middle" class="small">transValue</text>

  <path d="M180 154 C225 154 235 145 285 145" class="arrow"/>
  <path d="M180 274 C225 274 235 338 285 338" class="arrow"/>

  <rect x="210" y="440" width="220" height="54" class="ctx"/>
  <text x="320" y="464" text-anchor="middle" class="small">hash_metacxt</text>
  <text x="320" y="484" text-anchor="middle" class="small">桶数组和元数据</text>
  <rect x="470" y="440" width="220" height="54" class="ctx"/>
  <text x="580" y="464" text-anchor="middle" class="small">hash_tuplescxt</text>
  <text x="580" y="484" text-anchor="middle" class="small">条目、键、per-group 数据</text>
  <rect x="730" y="440" width="200" height="54" class="ctx"/>
  <text x="830" y="464" text-anchor="middle" class="small">hashcontext</text>
  <text x="830" y="484" text-anchor="middle" class="small">by-ref transition 值</text>
</svg>
