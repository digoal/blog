<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Hash Agg 内存不足时的分区溢写和批次重放</title>
  <desc id="desc">展示超过 hash_mem 后进入 spill mode，新分组写入 logical tapes，随后按 batch 读回重新聚合。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .mem{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:8}
    .spill{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .tape{fill:#eef2ff;stroke:#4338ca;stroke-width:2;rx:8}
    .done{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="55" y="70" width="190" height="105" class="mem"/>
  <text x="150" y="106" text-anchor="middle" class="text">内存哈希表</text>
  <text x="150" y="134" text-anchor="middle" class="small">已有分组继续更新</text>
  <text x="150" y="156" text-anchor="middle" class="small">新分组受限</text>

  <rect x="315" y="70" width="190" height="105" class="spill"/>
  <text x="410" y="103" text-anchor="middle" class="text">触发 spill mode</text>
  <text x="410" y="132" text-anchor="middle" class="small">memory 或 ngroups</text>
  <text x="410" y="154" text-anchor="middle" class="small">超过执行器限制</text>

  <rect x="575" y="35" width="145" height="65" class="tape"/>
  <text x="648" y="75" text-anchor="middle" class="small">partition 0</text>
  <rect x="575" y="120" width="145" height="65" class="tape"/>
  <text x="648" y="160" text-anchor="middle" class="small">partition 1</text>
  <rect x="575" y="205" width="145" height="65" class="tape"/>
  <text x="648" y="245" text-anchor="middle" class="small">partition 2</text>
  <rect x="575" y="290" width="145" height="65" class="tape"/>
  <text x="648" y="330" text-anchor="middle" class="small">partition N</text>

  <rect x="795" y="120" width="135" height="65" class="done"/>
  <text x="862" y="148" text-anchor="middle" class="small">HashAggBatch</text>
  <text x="862" y="169" text-anchor="middle" class="small">待重放</text>

  <path d="M245 122 H315" class="arrow"/>
  <path d="M505 122 C535 122 545 67 575 67" class="arrow"/>
  <path d="M505 122 H575" class="arrow"/>
  <path d="M505 122 C535 122 545 237 575 237" class="arrow"/>
  <path d="M505 122 C535 122 545 322 575 322" class="arrow"/>
  <path d="M720 152 H795" class="arrow"/>

  <rect x="100" y="410" width="230" height="82" class="done"/>
  <text x="215" y="442" text-anchor="middle" class="text">输出内存批次</text>
  <text x="215" y="470" text-anchor="middle" class="small">finalize + project</text>
  <rect x="405" y="410" width="230" height="82" class="mem"/>
  <text x="520" y="442" text-anchor="middle" class="text">读回一个 batch</text>
  <text x="520" y="470" text-anchor="middle" class="small">重建哈希表，可递归溢写</text>
  <rect x="710" y="410" width="180" height="82" class="done"/>
  <text x="800" y="442" text-anchor="middle" class="text">全部输出</text>
  <text x="800" y="470" text-anchor="middle" class="small">Batches 反映总批次数</text>

  <path d="M862 185 C862 330 520 330 520 410" class="arrow"/>
  <path d="M330 451 H405" class="arrow"/>
  <path d="M635 451 H710" class="arrow"/>
</svg>
