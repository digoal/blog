<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">HashAggregate 与 GroupAggregate 的选择边界</title>
  <desc id="desc">展示优化器如何在已有排序、分组数估计、内存风险和 enable_hashagg 设置之间选择聚合策略。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .q{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .yes{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:8}
    .no{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="385" y="35" width="220" height="70" class="q"/>
  <text x="495" y="65" text-anchor="middle" class="text">GROUP BY 查询</text>
  <text x="495" y="88" text-anchor="middle" class="small">估计 rows / groups / width</text>

  <rect x="365" y="145" width="260" height="78" class="q"/>
  <text x="495" y="177" text-anchor="middle" class="text">输入是否已有合适排序？</text>
  <text x="495" y="201" text-anchor="middle" class="small">索引序、MergeJoin 输出、显式 Sort</text>

  <rect x="85" y="260" width="255" height="78" class="yes"/>
  <text x="213" y="292" text-anchor="middle" class="text">倾向 GroupAggregate</text>
  <text x="213" y="316" text-anchor="middle" class="small">低启动延迟，无哈希溢写风险</text>

  <rect x="385" y="260" width="260" height="78" class="q"/>
  <text x="515" y="292" text-anchor="middle" class="text">HashAgg 是否可用？</text>
  <text x="515" y="316" text-anchor="middle" class="small">enable_hashagg = on</text>

  <rect x="700" y="260" width="210" height="78" class="no"/>
  <text x="805" y="292" text-anchor="middle" class="text">改走排序聚合</text>
  <text x="805" y="316" text-anchor="middle" class="small">或禁用节点被惩罚</text>

  <rect x="305" y="400" width="260" height="78" class="yes"/>
  <text x="435" y="432" text-anchor="middle" class="text">HashAggregate</text>
  <text x="435" y="456" text-anchor="middle" class="small">一次构建，分组随机分布友好</text>

  <rect x="620" y="400" width="260" height="78" class="no"/>
  <text x="750" y="432" text-anchor="middle" class="text">预计溢写时加成本</text>
  <text x="750" y="456" text-anchor="middle" class="small">按 batch 深度估算读写和 CPU</text>

  <path d="M495 105 V145" class="arrow"/>
  <path d="M365 184 H213 V260" class="arrow"/>
  <text x="286" y="174" class="small">是</text>
  <path d="M495 223 V260" class="arrow"/>
  <text x="508" y="247" class="small">否</text>
  <path d="M645 299 H700" class="arrow"/>
  <text x="664" y="289" class="small">否</text>
  <path d="M515 338 C515 370 435 370 435 400" class="arrow"/>
  <text x="482" y="366" class="small">是</text>
  <path d="M515 338 C515 370 750 370 750 400" class="arrow"/>
  <text x="633" y="366" class="small">高溢写风险</text>
</svg>
