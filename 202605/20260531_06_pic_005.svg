<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Hash Agg 诊断指标到调优动作的映射</title>
  <desc id="desc">展示从 EXPLAIN 指标观察 Batches、Memory Usage、Disk Usage 和 rows 估计，再映射到统计信息、内存参数、SQL 改写和索引策略。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .obs{fill:#eef2ff;stroke:#4338ca;stroke-width:2;rx:8}
    .cause{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .act{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:8}
    .text{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,'Noto Sans CJK SC',sans-serif;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="55" y="50" width="245" height="86" class="obs"/>
  <text x="178" y="82" text-anchor="middle" class="text">EXPLAIN 观察</text>
  <text x="178" y="110" text-anchor="middle" class="small">Batches / Memory / Disk</text>

  <rect x="55" y="180" width="245" height="86" class="obs"/>
  <text x="178" y="212" text-anchor="middle" class="text">估计偏差</text>
  <text x="178" y="240" text-anchor="middle" class="small">rows=估计, actual=实际</text>

  <rect x="55" y="310" width="245" height="86" class="obs"/>
  <text x="178" y="342" text-anchor="middle" class="text">临时文件</text>
  <text x="178" y="370" text-anchor="middle" class="small">log_temp_files / temp bytes</text>

  <rect x="385" y="50" width="245" height="86" class="cause"/>
  <text x="508" y="82" text-anchor="middle" class="text">分组数或状态太大</text>
  <text x="508" y="110" text-anchor="middle" class="small">G * entry_size 超过 hash_mem</text>

  <rect x="385" y="180" width="245" height="86" class="cause"/>
  <text x="508" y="212" text-anchor="middle" class="text">统计信息不足</text>
  <text x="508" y="240" text-anchor="middle" class="small">多列 ndistinct 估计错误</text>

  <rect x="385" y="310" width="245" height="86" class="cause"/>
  <text x="508" y="342" text-anchor="middle" class="text">并发内存压力</text>
  <text x="508" y="370" text-anchor="middle" class="small">每个节点和会话独立消耗</text>

  <rect x="705" y="35" width="220" height="70" class="act"/>
  <text x="815" y="64" text-anchor="middle" class="text">调 work_mem</text>
  <text x="815" y="88" text-anchor="middle" class="small">或 hash_mem_multiplier</text>

  <rect x="705" y="135" width="220" height="70" class="act"/>
  <text x="815" y="164" text-anchor="middle" class="text">补统计信息</text>
  <text x="815" y="188" text-anchor="middle" class="small">ANALYZE / 扩展统计</text>

  <rect x="705" y="235" width="220" height="70" class="act"/>
  <text x="815" y="264" text-anchor="middle" class="text">减少输入或状态</text>
  <text x="815" y="288" text-anchor="middle" class="small">预过滤 / 两阶段聚合</text>

  <rect x="705" y="335" width="220" height="70" class="act"/>
  <text x="815" y="364" text-anchor="middle" class="text">利用有序路径</text>
  <text x="815" y="388" text-anchor="middle" class="small">索引支持 GroupAggregate</text>

  <path d="M300 93 H385" class="arrow"/>
  <path d="M300 223 H385" class="arrow"/>
  <path d="M300 353 H385" class="arrow"/>
  <path d="M630 93 H705" class="arrow"/>
  <path d="M630 223 C665 223 670 170 705 170" class="arrow"/>
  <path d="M630 93 C665 93 670 270 705 270" class="arrow"/>
  <path d="M630 353 C665 353 670 370 705 370" class="arrow"/>
</svg>
