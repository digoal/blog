<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">Ordered-Set Aggregate 的语法与参数模型</title>
  <desc id="desc">展示 percentile_cont 的直接参数、WITHIN GROUP 排序输入和最终函数之间的关系。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .direct { fill: #fff7ed; stroke: #c2410c; }
    .agg { fill: #ecfeff; stroke: #0e7490; }
    .final { fill: #f0fdf4; stroke: #15803d; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .code { font: 17px monospace; fill: #111827; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="40" y="38" width="900" height="70" class="box"/>
  <text x="70" y="82" class="code">percentile_cont(0.95) WITHIN GROUP (ORDER BY latency_ms)</text>

  <rect x="70" y="165" width="235" height="120" class="box direct"/>
  <text x="95" y="205" class="text">直接参数</text>
  <text x="95" y="240" class="code">0.95</text>
  <text x="95" y="267" class="small">每个聚合调用计算一次</text>

  <rect x="370" y="165" width="245" height="120" class="box agg"/>
  <text x="395" y="205" class="text">聚合输入</text>
  <text x="395" y="240" class="code">latency_ms</text>
  <text x="395" y="267" class="small">每行求值，并按 ORDER BY 排序</text>

  <rect x="685" y="165" width="225" height="120" class="box final"/>
  <text x="710" y="205" class="text">final function</text>
  <text x="710" y="240" class="code">state + fraction</text>
  <text x="710" y="267" class="small">从已排序集合取位点</text>

  <path d="M185 108 L185 158" class="arrow"/>
  <path d="M492 108 L492 158" class="arrow"/>
  <path d="M305 225 L360 225" class="arrow"/>
  <path d="M615 225 L675 225" class="arrow"/>

  <rect x="115" y="338" width="750" height="56" fill="#f1f5f9" stroke="#94a3b8" rx="8"/>
  <text x="145" y="372" class="small">普通聚合的 ORDER BY 是可选排序修饰；Ordered-Set Agg 的 WITHIN GROUP 是语义必需输入。</text>
</svg>
