<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">Ordered-Set Aggregate 执行流水线</title>
  <desc id="desc">展示 Agg 节点调用 ordered_set_transition，把输入写入 tuplesort，最终函数排序并读取结果。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .scan { fill: #eef2ff; stroke: #4338ca; }
    .trans { fill: #ecfeff; stroke: #0e7490; }
    .sort { fill: #fff7ed; stroke: #c2410c; }
    .final { fill: #f0fdf4; stroke: #15803d; }
    .text { font: 18px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #374151; }
    .code { font: 15px monospace; fill: #111827; }
    .arrow { stroke: #4b5563; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect x="45" y="80" width="180" height="105" class="box scan"/>
  <text x="75" y="120" class="text">子计划输出</text>
  <text x="75" y="150" class="small">Seq Scan / Join</text>

  <rect x="300" y="80" width="230" height="105" class="box trans"/>
  <text x="325" y="115" class="text">transition function</text>
  <text x="325" y="145" class="code">ordered_set_transition</text>
  <text x="325" y="170" class="small">NULL 输入被忽略</text>

  <rect x="605" y="58" width="250" height="150" class="box sort"/>
  <text x="635" y="98" class="text">tuplesort state</text>
  <text x="635" y="128" class="small">使用 work_mem</text>
  <text x="635" y="154" class="small">必要时写临时文件</text>
  <text x="635" y="180" class="code">tuplesort_putdatum()</text>

  <rect x="405" y="315" width="280" height="105" class="box final"/>
  <text x="430" y="350" class="text">final function</text>
  <text x="430" y="380" class="code">percentile_cont_final</text>
  <text x="430" y="405" class="small">performsort / rescan / skip / get</text>

  <rect x="790" y="315" width="210" height="105" class="box"/>
  <text x="825" y="355" class="text">输出一行结果</text>
  <text x="825" y="385" class="small">精确分位数或众数</text>

  <path d="M225 132 L290 132" class="arrow"/>
  <path d="M530 132 L595 132" class="arrow"/>
  <path d="M730 208 L595 305" class="arrow"/>
  <path d="M685 368 L780 368" class="arrow"/>

  <text x="84" y="252" class="small">每个 group 有自己的 OSAPerGroupState</text>
  <path d="M170 245 C250 245 320 275 430 315" class="arrow"/>
  <text x="620" y="252" class="small">排序不由 nodeAgg 的通用 ordered-aggregate 路径完成，</text>
  <text x="620" y="276" class="small">而是由 support function 内部维护 tuplesort。</text>
</svg>
