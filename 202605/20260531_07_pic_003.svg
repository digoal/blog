<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">percentile_disc 与 percentile_cont 的取位逻辑</title>
  <desc id="desc">对比离散分位数和连续分位数在排序数组上的定位公式。</desc>
  <style>
    .cell { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 6; }
    .hit { fill: #dcfce7; stroke: #15803d; }
    .mix { fill: #ffedd5; stroke: #c2410c; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .code { font: 16px monospace; fill: #111827; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="70" y="62" class="text">已排序输入：N = 5</text>
  <g>
    <rect x="80" y="95" width="90" height="62" class="cell"/><text x="113" y="134" class="text">1</text>
    <rect x="180" y="95" width="90" height="62" class="cell"/><text x="213" y="134" class="text">2</text>
    <rect x="280" y="95" width="90" height="62" class="cell hit"/><text x="313" y="134" class="text">3</text>
    <rect x="380" y="95" width="90" height="62" class="cell"/><text x="413" y="134" class="text">4</text>
    <rect x="480" y="95" width="90" height="62" class="cell"/><text x="513" y="134" class="text">5</text>
  </g>
  <text x="85" y="186" class="small">位置 K：1</text>
  <text x="185" y="186" class="small">2</text>
  <text x="285" y="186" class="small">3</text>
  <text x="385" y="186" class="small">4</text>
  <text x="485" y="186" class="small">5</text>

  <rect x="70" y="245" width="440" height="160" fill="#f0fdf4" stroke="#15803d" rx="8"/>
  <text x="100" y="285" class="text">percentile_disc(0.5)</text>
  <text x="100" y="322" class="code">K = ceil(p * N) = ceil(0.5 * 5) = 3</text>
  <text x="100" y="356" class="small">返回第 3 行，也就是输入中真实存在的值 3。</text>

  <rect x="570" y="245" width="440" height="160" fill="#fff7ed" stroke="#c2410c" rx="8"/>
  <text x="600" y="285" class="text">percentile_cont(0.6)</text>
  <text x="600" y="322" class="code">pos = p * (N - 1) = 2.4</text>
  <text x="600" y="356" class="small">在第 3、4 个值之间插值：3 + 0.4 * (4 - 3) = 3.4。</text>

  <path d="M325 160 L290 238" class="arrow"/>
  <path d="M330 160 C530 185 680 205 770 238" class="arrow"/>
  <rect x="780" y="95" width="90" height="62" class="cell hit"/><text x="813" y="134" class="text">3</text>
  <rect x="880" y="95" width="90" height="62" class="cell mix"/><text x="913" y="134" class="text">4</text>
  <text x="780" y="186" class="small">插值端点</text>
</svg>
