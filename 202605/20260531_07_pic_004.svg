<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" role="img" aria-labelledby="title desc">
  <title id="title">Hypothetical-Set Aggregate 的虚拟行模型</title>
  <desc id="desc">展示 rank 等 hypothetical-set 聚合如何把直接参数构造成虚拟行插入排序集合。</desc>
  <style>
    .row { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 6; }
    .hypo { fill: #fee2e2; stroke: #b91c1c; }
    .flag { fill: #f1f5f9; stroke: #334155; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
    .code { font: 16px monospace; fill: #111827; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="60" y="55" class="text">SQL：rank(3) WITHIN GROUP (ORDER BY x)</text>
  <rect x="70" y="95" width="260" height="78" class="row"/>
  <text x="95" y="128" class="text">普通输入行</text>
  <text x="95" y="155" class="code">(x = 1), (x = 1), ...</text>
  <rect x="70" y="215" width="260" height="78" class="hypo"/>
  <text x="95" y="248" class="text">虚拟行</text>
  <text x="95" y="275" class="code">(x = 3, flag = -1)</text>
  <path d="M330 135 L435 170" class="arrow"/>
  <path d="M330 255 L435 220" class="arrow"/>

  <rect x="445" y="100" width="270" height="240" fill="#fff7ed" stroke="#c2410c" rx="8"/>
  <text x="475" y="138" class="text">tuplesort 排序集合</text>
  <rect x="485" y="162" width="190" height="34" class="row"/><text x="515" y="185" class="code">1, flag 0</text>
  <rect x="485" y="204" width="190" height="34" class="row"/><text x="515" y="227" class="code">1, flag 0</text>
  <rect x="485" y="246" width="190" height="34" class="row"/><text x="515" y="269" class="code">2, flag 0</text>
  <rect x="485" y="288" width="190" height="34" class="hypo"/><text x="515" y="311" class="code">3, flag -1</text>

  <path d="M715 220 L805 220" class="arrow"/>
  <rect x="815" y="145" width="210" height="150" class="flag"/>
  <text x="845" y="185" class="text">扫描直到 flag 非 0</text>
  <text x="845" y="220" class="small">rank：虚拟行排在 peers 前</text>
  <text x="845" y="248" class="small">cume_dist：虚拟行排在 peers 后</text>

  <rect x="120" y="385" width="840" height="58" fill="#f1f5f9" stroke="#94a3b8" rx="8"/>
  <text x="150" y="421" class="small">hypothetical-set 聚合不丢弃 NULL；直接参数数量和类型必须匹配 WITHIN GROUP 的排序列。</text>
</svg>
