<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" role="img" aria-labelledby="title desc">
  <title id="title">精确 Ordered-Set Agg 与在线近似分位数的边界</title>
  <desc id="desc">对比 PostgreSQL 内置 Ordered-Set Agg、P2/GK 和 t-digest 在精确性、内存和合并能力上的差异。</desc>
  <style>
    .axis { stroke: #334155; stroke-width: 2.5; }
    .grid { stroke: #cbd5e1; stroke-width: 1; }
    .bubble { stroke-width: 2.4; }
    .pg { fill: #dbeafe; stroke: #1d4ed8; }
    .gk { fill: #dcfce7; stroke: #15803d; }
    .td { fill: #ffedd5; stroke: #c2410c; }
    .text { font: 18px sans-serif; fill: #0f172a; }
    .small { font: 15px sans-serif; fill: #334155; }
  </style>
  <line x1="120" y1="420" x2="960" y2="420" class="axis"/>
  <line x1="120" y1="420" x2="120" y2="85" class="axis"/>
  <line x1="120" y1="300" x2="960" y2="300" class="grid"/>
  <line x1="120" y1="180" x2="960" y2="180" class="grid"/>
  <text x="410" y="470" class="text">吞吐/流式友好度、可合并性</text>
  <text x="35" y="120" class="text" transform="rotate(-90 35,120)">精确性</text>

  <circle cx="245" cy="145" r="72" class="bubble pg"/>
  <text x="187" y="138" class="text">PostgreSQL</text>
  <text x="177" y="166" class="small">Ordered-Set Agg</text>

  <circle cx="565" cy="245" r="68" class="bubble gk"/>
  <text x="540" y="238" class="text">P² / GK</text>
  <text x="500" y="266" class="small">在线分位数估计</text>

  <circle cx="805" cy="215" r="76" class="bubble td"/>
  <text x="775" y="208" class="text">t-digest</text>
  <text x="742" y="236" class="small">尾部分位数友好</text>

  <text x="180" y="275" class="small">精确：需要排序，内存/临时文件随分组输入增长</text>
  <text x="480" y="350" class="small">近似：小状态，适合流式/分布式，但有误差模型</text>
  <text x="680" y="118" class="small">工程选择不是谁更高级，</text>
  <text x="680" y="142" class="small">而是是否允许误差、是否需要合并。</text>
</svg>
