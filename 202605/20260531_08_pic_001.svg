<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Agg 的两阶段计划形态</title>
  <desc id="desc">展示 PostgreSQL 并行聚合中 worker 执行 Partial Aggregate，leader 通过 Gather 接收局部状态并执行 Finalize Aggregate。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .worker { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .leader { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .data { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; rx: 6; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="34" y="36" width="1012" height="488" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="10"/>
  <text x="54" y="76" class="txt" font-weight="700">SQL: SELECT k, sum(v), count(*) FROM t GROUP BY k;</text>
  <text x="54" y="106" class="small">并行聚合的核心不是共享一个全局哈希表，而是先把每个 worker 看见的数据压缩成局部状态。</text>

  <rect x="70" y="150" width="190" height="76" class="data"/>
  <text x="102" y="184" class="txt">Parallel Scan</text>
  <text x="104" y="208" class="small">按 block / path 切分输入</text>

  <rect x="330" y="118" width="250" height="88" class="worker"/>
  <text x="371" y="153" class="txt" font-weight="700">Worker 1</text>
  <text x="366" y="180" class="small">Partial HashAggregate</text>
  <text x="364" y="201" class="small">k -> transition state</text>

  <rect x="330" y="236" width="250" height="88" class="worker"/>
  <text x="371" y="271" class="txt" font-weight="700">Worker 2</text>
  <text x="366" y="298" class="small">Partial HashAggregate</text>
  <text x="364" y="319" class="small">k -> transition state</text>

  <rect x="330" y="354" width="250" height="88" class="worker"/>
  <text x="371" y="389" class="txt" font-weight="700">Leader 参与</text>
  <text x="366" y="416" class="small">可执行 parallel 部分</text>
  <text x="364" y="437" class="small">受 leader_participation 影响</text>

  <rect x="660" y="236" width="150" height="88" class="box"/>
  <text x="702" y="272" class="txt" font-weight="700">Gather</text>
  <text x="685" y="300" class="small">传输 partial rows</text>

  <rect x="870" y="205" width="134" height="150" class="leader"/>
  <text x="898" y="242" class="txt" font-weight="700">Leader</text>
  <text x="887" y="273" class="small">Finalize Aggregate</text>
  <text x="893" y="297" class="small">combine states</text>
  <text x="893" y="321" class="small">finalfn 输出 SQL 结果</text>

  <path d="M260 188 C292 188 300 162 330 162" class="arrow"/>
  <path d="M260 188 C296 220 300 280 330 280" class="arrow"/>
  <path d="M260 188 C292 310 300 398 330 398" class="arrow"/>
  <path d="M580 162 C625 168 630 250 660 260" class="arrow"/>
  <path d="M580 280 L660 280" class="arrow"/>
  <path d="M580 398 C625 390 630 310 660 300" class="arrow"/>
  <path d="M810 280 L870 280" class="arrow"/>
  <path d="M735 324 C735 385 830 408 937 356" class="dash"/>
  <text x="648" y="390" class="small">分组多、partial row 多时，Gather 与 Finalize 会成为串行瓶颈</text>
</svg>
