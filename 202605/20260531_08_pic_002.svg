<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">AggSplit 模式与状态类型变化</title>
  <desc id="desc">说明 AGGSPLIT_SIMPLE、AGGSPLIT_INITIAL_SERIAL、AGGSPLIT_FINAL_DESERIAL 在执行函数、final 函数、序列化和反序列化上的差异。</desc>
  <style>
    .hdr { fill: #0f172a; }
    .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .mode { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
    .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .white { fill: #ffffff; font-size: 17px; font-weight: 700; }
  </style>
  <rect x="30" y="28" width="1020" height="458" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="10"/>
  <rect x="70" y="76" width="940" height="48" class="hdr" rx="6"/>
  <text x="90" y="107" class="white">AggSplit 是 Agg 节点的“执行模式开关”：同一个聚合函数在不同阶段调用不同函数、返回不同类型</text>

  <rect x="70" y="154" width="260" height="92" class="mode" rx="8"/>
  <text x="93" y="187" class="txt" font-weight="700">AGGSPLIT_SIMPLE</text>
  <text x="93" y="216" class="small">transfn 处理输入行</text>
  <text x="93" y="238" class="small">finalfn 输出 SQL 结果</text>

  <rect x="410" y="154" width="260" height="92" class="ok" rx="8"/>
  <text x="433" y="187" class="txt" font-weight="700">INITIAL_SERIAL</text>
  <text x="433" y="216" class="small">SKIPFINAL：不执行 finalfn</text>
  <text x="433" y="238" class="small">SERIALIZE：internal 状态转 bytea</text>

  <rect x="750" y="154" width="260" height="92" class="warn" rx="8"/>
  <text x="773" y="187" class="txt" font-weight="700">FINAL_DESERIAL</text>
  <text x="773" y="216" class="small">DESERIALIZE：bytea 转状态</text>
  <text x="773" y="238" class="small">COMBINE：用 combinefn 合并状态</text>

  <rect x="70" y="300" width="188" height="46" class="cell"/>
  <rect x="258" y="300" width="250" height="46" class="cell"/>
  <rect x="508" y="300" width="250" height="46" class="cell"/>
  <rect x="758" y="300" width="252" height="46" class="cell"/>
  <text x="92" y="329" class="txt" font-weight="700">维度</text>
  <text x="300" y="329" class="txt" font-weight="700">Simple</text>
  <text x="550" y="329" class="txt" font-weight="700">Partial</text>
  <text x="795" y="329" class="txt" font-weight="700">Finalize</text>

  <rect x="70" y="346" width="188" height="46" class="cell"/><text x="92" y="375" class="small">输入</text>
  <rect x="258" y="346" width="250" height="46" class="cell"/><text x="278" y="375" class="small">原始 tuple</text>
  <rect x="508" y="346" width="250" height="46" class="cell"/><text x="528" y="375" class="small">原始 tuple</text>
  <rect x="758" y="346" width="252" height="46" class="cell"/><text x="778" y="375" class="small">partial transition value</text>

  <rect x="70" y="392" width="188" height="46" class="cell"/><text x="92" y="421" class="small">核心函数</text>
  <rect x="258" y="392" width="250" height="46" class="cell"/><text x="278" y="421" class="small">transfn + finalfn</text>
  <rect x="508" y="392" width="250" height="46" class="cell"/><text x="528" y="421" class="small">transfn + serialfn</text>
  <rect x="758" y="392" width="252" height="46" class="cell"/><text x="778" y="421" class="small">deserialfn + combinefn + finalfn</text>

  <rect x="70" y="438" width="188" height="46" class="cell"/><text x="92" y="467" class="small">输出</text>
  <rect x="258" y="438" width="250" height="46" class="cell"/><text x="278" y="467" class="small">SQL 结果类型</text>
  <rect x="508" y="438" width="250" height="46" class="cell"/><text x="528" y="467" class="small">transtype 或 bytea</text>
  <rect x="758" y="438" width="252" height="46" class="cell"/><text x="778" y="467" class="small">SQL 结果类型</text>
</svg>
