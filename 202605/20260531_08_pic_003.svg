<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">并行聚合函数调用链</title>
  <desc id="desc">展示普通输入行如何经过 transfn 形成 transition state，partial 输出如何经 serialfn 或 bytea 传输，finalize 阶段如何 deserialize 与 combine。</desc>
  <style>
    .stage { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .func { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .state { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .wire { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="32" y="32" width="1016" height="484" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="10"/>
  <text x="58" y="76" class="txt" font-weight="700">一个可并行聚合必须回答：局部状态如何产生、如何跨进程传输、如何无损合并？</text>

  <rect x="70" y="128" width="190" height="70" class="stage"/>
  <text x="110" y="160" class="txt" font-weight="700">输入 tuple</text>
  <text x="100" y="184" class="small">worker 本地扫描结果</text>

  <rect x="310" y="128" width="170" height="70" class="func"/>
  <text x="360" y="160" class="txt" font-weight="700">transfn</text>
  <text x="335" y="184" class="small">逐行推进状态</text>

  <rect x="530" y="128" width="190" height="70" class="state"/>
  <text x="568" y="160" class="txt" font-weight="700">transition state</text>
  <text x="558" y="184" class="small">sum,count / internal</text>

  <rect x="770" y="128" width="190" height="70" class="wire"/>
  <text x="822" y="160" class="txt" font-weight="700">serialfn</text>
  <text x="802" y="184" class="small">internal 状态转 bytea</text>

  <path d="M260 163 L310 163" class="arrow"/>
  <path d="M480 163 L530 163" class="arrow"/>
  <path d="M720 163 L770 163" class="arrow"/>

  <rect x="190" y="276" width="190" height="70" class="wire"/>
  <text x="247" y="308" class="txt" font-weight="700">Gather</text>
  <text x="220" y="332" class="small">传输 partial rows</text>

  <rect x="430" y="276" width="190" height="70" class="func"/>
  <text x="480" y="308" class="txt" font-weight="700">deserialfn</text>
  <text x="464" y="332" class="small">bytea 还原为状态</text>

  <rect x="670" y="276" width="190" height="70" class="func"/>
  <text x="720" y="308" class="txt" font-weight="700">combinefn</text>
  <text x="699" y="332" class="small">state + state -> state</text>

  <rect x="670" y="404" width="190" height="70" class="func"/>
  <text x="728" y="436" class="txt" font-weight="700">finalfn</text>
  <text x="705" y="460" class="small">状态转 SQL 结果</text>

  <path d="M865 198 C865 246 340 246 285 276" class="arrow"/>
  <path d="M380 311 L430 311" class="arrow"/>
  <path d="M620 311 L670 311" class="arrow"/>
  <path d="M765 346 L765 404" class="arrow"/>

  <text x="72" y="430" class="small">注意：transtype 不是 internal 时可以不序列化；transtype 是 internal 时并行聚合要求 serialfn/deserialfn。</text>
  <text x="72" y="458" class="small">Finalize 阶段的 filter 已在 Partial 阶段处理，combine 只面对局部状态，不再重新判断原始行。</text>
</svg>
