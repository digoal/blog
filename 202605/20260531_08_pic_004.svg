<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">分组基数对 Parallel Agg 收益的影响</title>
  <desc id="desc">比较低基数和高基数聚合中 Partial Aggregate 压缩比、Gather 传输量与 Finalize 压力的变化。</desc>
  <style>
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
    .good { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .bad { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 8; }
    .bar1 { fill: #14b8a6; }
    .bar2 { fill: #f43f5e; }
    .axis { stroke: #64748b; stroke-width: 2; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="30" width="1020" height="488" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="10"/>
  <text x="58" y="76" class="txt" font-weight="700">Parallel Agg 的收益来自“先压缩再传输”；如果每个 worker 产生的 group 接近输入行数，收益会消失。</text>

  <rect x="70" y="116" width="430" height="330" class="panel"/>
  <text x="102" y="154" class="txt" font-weight="700">低基数：每 worker 大幅压缩</text>
  <rect x="110" y="196" width="95" height="190" class="bar1"/>
  <text x="110" y="416" class="small">输入 1,000 万行</text>
  <rect x="260" y="350" width="95" height="36" class="bar1"/>
  <text x="250" y="416" class="small">partial 1,000 组</text>
  <path d="M205 288 L260 368" class="arrow"/>
  <rect x="100" y="462" width="370" height="36" class="good"/>
  <text x="122" y="486" class="small">Gather 少量状态，Finalize 压力小，通常值得并行</text>

  <rect x="580" y="116" width="430" height="330" class="panel"/>
  <text x="612" y="154" class="txt" font-weight="700">高基数：压缩比很低</text>
  <rect x="620" y="196" width="95" height="190" class="bar2"/>
  <text x="620" y="416" class="small">输入 1,000 万行</text>
  <rect x="770" y="218" width="95" height="168" class="bar2"/>
  <text x="754" y="416" class="small">partial 900 万组</text>
  <path d="M715 288 L770 302" class="arrow"/>
  <rect x="610" y="462" width="370" height="36" class="bad"/>
  <text x="632" y="486" class="small">传输和 leader 合并接近全量，计划器会降低偏好</text>

  <line x1="100" y1="386" x2="410" y2="386" class="axis"/>
  <line x1="610" y1="386" x2="920" y2="386" class="axis"/>
</svg>
