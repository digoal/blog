<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Parallel Agg 诊断决策图</title>
  <desc id="desc">从 EXPLAIN 计划是否出现 Partial Aggregate 和 Finalize Aggregate 出发，定位并行聚合缺失或收益差的原因。</desc>
  <style>
    .q { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .a { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="1020" height="552" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="10"/>
  <rect x="380" y="62" width="320" height="62" class="q"/>
  <text x="425" y="88" class="txt" font-weight="700">EXPLAIN 是否出现</text>
  <text x="420" y="111" class="small">Partial Aggregate + Gather + Finalize Aggregate？</text>

  <rect x="80" y="190" width="270" height="78" class="a"/>
  <text x="108" y="219" class="txt" font-weight="700">没有并行计划</text>
  <text x="106" y="244" class="small">检查 worker 参数、parallel safety、表大小阈值</text>

  <rect x="405" y="190" width="270" height="78" class="risk"/>
  <text x="438" y="219" class="txt" font-weight="700">有 Gather 但无 Partial Agg</text>
  <text x="430" y="244" class="small">检查聚合是否支持 Partial Mode</text>

  <rect x="730" y="190" width="270" height="78" class="a"/>
  <text x="760" y="219" class="txt" font-weight="700">有完整两阶段计划</text>
  <text x="752" y="244" class="small">继续看实际 worker、rows、内存和耗时</text>

  <path d="M450 124 C360 150 270 160 215 190" class="arrow"/>
  <path d="M540 124 L540 190" class="arrow"/>
  <path d="M630 124 C720 150 805 160 865 190" class="arrow"/>

  <rect x="80" y="335" width="270" height="86" class="risk"/>
  <text x="108" y="364" class="txt" font-weight="700">聚合函数层面</text>
  <text x="106" y="389" class="small">缺 combinefn；internal 缺 serial/deserial</text>
  <text x="106" y="411" class="small">ORDER BY / DISTINCT / ordered-set / grouping sets</text>

  <rect x="405" y="335" width="270" height="86" class="risk"/>
  <text x="438" y="364" class="txt" font-weight="700">代价模型层面</text>
  <text x="430" y="389" class="small">预计 group 太多，Finalize 成本高</text>
  <text x="430" y="411" class="small">parallel_setup_cost / tuple_cost 抵消收益</text>

  <rect x="730" y="335" width="270" height="86" class="risk"/>
  <text x="760" y="364" class="txt" font-weight="700">执行层面</text>
  <text x="752" y="389" class="small">Workers Launched 少于 Planned</text>
  <text x="752" y="411" class="small">leader finalize 或 Gather 耗时集中</text>

  <path d="M215 268 L215 335" class="arrow"/>
  <path d="M540 268 L540 335" class="arrow"/>
  <path d="M865 268 L865 335" class="arrow"/>

  <rect x="175" y="488" width="730" height="58" class="q"/>
  <text x="220" y="512" class="txt" font-weight="700">调优方向</text>
  <text x="220" y="535" class="small">先验证统计信息和分组基数，再决定是否调 worker、work_mem、SQL 形态或改成预聚合/近似聚合。</text>
  <path d="M215 421 C260 468 360 478 540 488" class="arrow"/>
  <path d="M540 421 L540 488" class="arrow"/>
  <path d="M865 421 C820 468 720 478 540 488" class="arrow"/>
</svg>
