<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">FILTER 聚合在执行流水线中的位置</title>
  <desc id="desc">展示 WHERE、GROUP BY 和每个聚合 FILTER 的不同作用范围。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b4856"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f7f9fb; stroke: #5d6b7a; stroke-width: 1.5; rx: 8; }
    .agg { fill: #eef7f2; stroke: #3b7f5f; stroke-width: 1.5; rx: 8; }
    .filter { fill: #fff4e6; stroke: #b36b00; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #1f2a36; }
    .small { font-size: 15px; fill: #3b4856; }
    .line { stroke: #3b4856; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="40" y="150" width="145" height="70" class="box"/>
  <text x="112" y="180" text-anchor="middle" class="text">扫描/连接</text>
  <text x="112" y="204" text-anchor="middle" class="small">产生候选行</text>

  <rect x="230" y="150" width="145" height="70" class="box"/>
  <text x="302" y="180" text-anchor="middle" class="text">WHERE</text>
  <text x="302" y="204" text-anchor="middle" class="small">整行提前过滤</text>

  <rect x="420" y="150" width="145" height="70" class="box"/>
  <text x="492" y="180" text-anchor="middle" class="text">GROUP BY</text>
  <text x="492" y="204" text-anchor="middle" class="small">定位分组状态</text>

  <rect x="630" y="50" width="250" height="72" class="filter"/>
  <text x="755" y="80" text-anchor="middle" class="text">sum(amount)</text>
  <text x="755" y="104" text-anchor="middle" class="small">FILTER (WHERE status='paid')</text>

  <rect x="630" y="170" width="250" height="72" class="filter"/>
  <text x="755" y="200" text-anchor="middle" class="text">count(*)</text>
  <text x="755" y="224" text-anchor="middle" class="small">FILTER (WHERE channel='app')</text>

  <rect x="630" y="290" width="250" height="72" class="agg"/>
  <text x="755" y="320" text-anchor="middle" class="text">max(created_at)</text>
  <text x="755" y="344" text-anchor="middle" class="small">无 FILTER，接收全部组内行</text>

  <path d="M185 185 H230" class="line"/>
  <path d="M375 185 H420" class="line"/>
  <path d="M565 185 C600 185 600 86 630 86" class="line"/>
  <path d="M565 185 H630" class="line"/>
  <path d="M565 185 C600 185 600 326 630 326" class="line"/>

  <text x="48" y="34" class="text">关键区别：WHERE 影响整条输入流；FILTER 只影响绑定的那个聚合函数。</text>
  <text x="48" y="392" class="small">同一分组里的同一行，可以进入一个聚合、跳过另一个聚合，也可以进入全部聚合。</text>
</svg>
