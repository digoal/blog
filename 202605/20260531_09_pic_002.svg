<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">FILTER 从语法到执行器的路径</title>
  <desc id="desc">展示 FILTER 子句被解析为 Aggref.aggfilter，并在执行阶段成为提前跳转步骤。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .stage { fill: #f6f8fa; stroke: #607080; stroke-width: 1.5; rx: 8; }
    .data { fill: #eef6ff; stroke: #2f6fab; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff6e8; stroke: #b46b00; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #1f2a36; }
    .small { font-size: 14px; fill: #3b4856; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #25313f; }
    .line { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="36" y="50" width="180" height="90" class="stage"/>
  <text x="126" y="82" text-anchor="middle" class="text">SQL 语法</text>
  <text x="126" y="110" text-anchor="middle" class="code">sum(x) FILTER</text>
  <text x="126" y="130" text-anchor="middle" class="code">(WHERE p)</text>

  <rect x="282" y="50" width="190" height="90" class="stage"/>
  <text x="377" y="82" text-anchor="middle" class="text">解析/转换</text>
  <text x="377" y="110" text-anchor="middle" class="small">transformWhereClause</text>
  <text x="377" y="130" text-anchor="middle" class="small">EXPR_KIND_FILTER</text>

  <rect x="538" y="50" width="190" height="90" class="data"/>
  <text x="633" y="82" text-anchor="middle" class="text">Aggref 节点</text>
  <text x="633" y="110" text-anchor="middle" class="code">aggfilter = p</text>
  <text x="633" y="130" text-anchor="middle" class="small">和 args/order/distinct 并列</text>

  <rect x="794" y="50" width="150" height="90" class="stage"/>
  <text x="869" y="82" text-anchor="middle" class="text">执行计划</text>
  <text x="869" y="110" text-anchor="middle" class="small">Agg 节点携带</text>
  <text x="869" y="130" text-anchor="middle" class="small">多个 Aggref</text>

  <path d="M216 95 H282" class="line"/>
  <path d="M472 95 H538" class="line"/>
  <path d="M728 95 H794" class="line"/>

  <rect x="86" y="235" width="220" height="136" class="warn"/>
  <text x="196" y="266" text-anchor="middle" class="text">ExecBuildAggTrans</text>
  <text x="196" y="294" text-anchor="middle" class="small">先生成 FILTER 求值步骤</text>
  <text x="196" y="320" text-anchor="middle" class="small">false/null 则跳到下一个聚合</text>
  <text x="196" y="346" text-anchor="middle" class="small">避免不必要参数求值</text>

  <rect x="390" y="235" width="220" height="136" class="data"/>
  <text x="500" y="266" text-anchor="middle" class="text">参数求值</text>
  <text x="500" y="294" text-anchor="middle" class="small">只对通过 FILTER 的行</text>
  <text x="500" y="320" text-anchor="middle" class="small">计算聚合参数/排序键</text>
  <text x="500" y="346" text-anchor="middle" class="small">再做 strict/null 检查</text>

  <rect x="694" y="235" width="220" height="136" class="stage"/>
  <text x="804" y="266" text-anchor="middle" class="text">transition 调用</text>
  <text x="804" y="294" text-anchor="middle" class="small">更新 Hash/Sort 分组状态</text>
  <text x="804" y="320" text-anchor="middle" class="small">combine 阶段不再执行 FILTER</text>
  <text x="804" y="346" text-anchor="middle" class="small">FILTER 已在 child 处理</text>

  <path d="M633 140 C633 185 196 190 196 235" class="line"/>
  <path d="M306 303 H390" class="line"/>
  <path d="M610 303 H694" class="line"/>
</svg>
