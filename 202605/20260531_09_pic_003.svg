<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">FILTER 与 CASE 条件聚合的执行差异</title>
  <desc id="desc">比较 SUM(CASE WHEN ...) 和 SUM(...) FILTER (WHERE ...) 的语义与执行代价。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; }
    .filter { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .case { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #1e293b; }
    .small { font-size: 14px; fill: #475569; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #1e293b; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <text x="42" y="36" class="text">同样是“条件聚合”，CASE 是把条件塞进参数，FILTER 是聚合调用自己的行门禁。</text>

  <rect x="50" y="82" width="880" height="72" class="box"/>
  <text x="490" y="113" text-anchor="middle" class="text">输入行：status='refund', amount=100, expensive_expr(amount)</text>
  <text x="490" y="138" text-anchor="middle" class="small">目标：只统计 status='paid' 的金额</text>

  <rect x="90" y="205" width="340" height="185" class="case"/>
  <text x="260" y="235" text-anchor="middle" class="text">CASE 写法</text>
  <text x="260" y="264" text-anchor="middle" class="code">sum(CASE WHEN status='paid'</text>
  <text x="260" y="284" text-anchor="middle" class="code">         THEN expensive_expr(amount)</text>
  <text x="260" y="304" text-anchor="middle" class="code">         ELSE 0 END)</text>
  <text x="260" y="334" text-anchor="middle" class="small">条件属于参数表达式</text>
  <text x="260" y="358" text-anchor="middle" class="small">不同聚合函数的 NULL/ELSE 语义要手写正确</text>

  <rect x="550" y="205" width="340" height="185" class="filter"/>
  <text x="720" y="235" text-anchor="middle" class="text">FILTER 写法</text>
  <text x="720" y="264" text-anchor="middle" class="code">sum(expensive_expr(amount))</text>
  <text x="720" y="284" text-anchor="middle" class="code">FILTER (WHERE status='paid')</text>
  <text x="720" y="334" text-anchor="middle" class="small">先判断 FILTER</text>
  <text x="720" y="358" text-anchor="middle" class="small">未通过时不求参数，不调用 transition</text>

  <path d="M300 154 C300 178 260 178 260 205" class="line"/>
  <path d="M680 154 C680 178 720 178 720 205" class="line"/>

  <text x="70" y="430" class="small">实践判断：FILTER 更适合多个互斥/重叠指标并列统计；CASE 更适合需要把不同行映射成不同值再聚合的场景。</text>
</svg>
