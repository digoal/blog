<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">FILTER 对优化器边界的影响</title>
  <desc id="desc">展示 FILTER 会参与聚合共享、成本估算、MIN/MAX 改写和预排序安全检查。</desc>
  <style>
    .center { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.8; rx: 10; }
    .item { fill: #f8fafc; stroke: #64748b; stroke-width: 1.4; rx: 8; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #1e293b; }
    .small { font-size: 14px; fill: #475569; }
    .line { stroke: #475569; stroke-width: 1.8; fill: none; }
  </style>
  <rect x="380" y="200" width="220" height="92" class="center"/>
  <text x="490" y="234" text-anchor="middle" class="text">Aggref.aggfilter</text>
  <text x="490" y="260" text-anchor="middle" class="small">不是普通 WHERE</text>
  <text x="490" y="280" text-anchor="middle" class="small">是每个聚合调用的属性</text>

  <rect x="60" y="55" width="285" height="105" class="ok"/>
  <text x="202" y="86" text-anchor="middle" class="text">聚合共享</text>
  <text x="202" y="113" text-anchor="middle" class="small">FILTER 必须相同才可共享 aggno</text>
  <text x="202" y="136" text-anchor="middle" class="small">不同条件意味着不同 transition</text>

  <rect x="635" y="55" width="285" height="105" class="item"/>
  <text x="777" y="86" text-anchor="middle" class="text">成本估算</text>
  <text x="777" y="113" text-anchor="middle" class="small">filter 表达式成本计入 per-tuple</text>
  <text x="777" y="136" text-anchor="middle" class="small">当前不按选择率折减参数成本</text>

  <rect x="60" y="340" width="285" height="105" class="risk"/>
  <text x="202" y="371" text-anchor="middle" class="text">MIN/MAX 索引改写</text>
  <text x="202" y="398" text-anchor="middle" class="small">存在 FILTER 时当前直接放弃</text>
  <text x="202" y="421" text-anchor="middle" class="small">避免错误地下推到子查询</text>

  <rect x="635" y="340" width="285" height="105" class="risk"/>
  <text x="777" y="371" text-anchor="middle" class="text">ORDER BY/DISTINCT 预排序</text>
  <text x="777" y="398" text-anchor="middle" class="small">FILTER 必须先于参数/排序键求值</text>
  <text x="777" y="421" text-anchor="middle" class="small">有潜在错误表达式时不预排序</text>

  <line x1="345" y1="130" x2="410" y2="200" class="line"/>
  <line x1="635" y1="130" x2="570" y2="200" class="line"/>
  <line x1="345" y1="368" x2="410" y2="292" class="line"/>
  <line x1="635" y1="368" x2="570" y2="292" class="line"/>
</svg>
