<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">并行聚合中 FILTER 的执行位置</title>
  <desc id="desc">展示 Partial Aggregate 在 worker 侧应用 FILTER，Finalize Aggregate 只合并局部状态。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .worker { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .leader { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .gather { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #1e293b; }
    .small { font-size: 14px; fill: #475569; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="60" y="70" width="230" height="92" class="worker"/>
  <text x="175" y="102" text-anchor="middle" class="text">Worker 1</text>
  <text x="175" y="128" text-anchor="middle" class="small">Partial HashAggregate</text>
  <text x="175" y="148" text-anchor="middle" class="small">先执行 FILTER，再更新局部状态</text>

  <rect x="60" y="208" width="230" height="92" class="worker"/>
  <text x="175" y="240" text-anchor="middle" class="text">Worker 2</text>
  <text x="175" y="266" text-anchor="middle" class="small">Partial HashAggregate</text>
  <text x="175" y="286" text-anchor="middle" class="small">只输出通过条件后的 state</text>

  <rect x="380" y="139" width="200" height="92" class="gather"/>
  <text x="480" y="171" text-anchor="middle" class="text">Gather</text>
  <text x="480" y="197" text-anchor="middle" class="small">传输 partial state</text>
  <text x="480" y="217" text-anchor="middle" class="small">不是传输原始全部行</text>

  <rect x="680" y="139" width="240" height="92" class="leader"/>
  <text x="800" y="171" text-anchor="middle" class="text">Leader</text>
  <text x="800" y="197" text-anchor="middle" class="small">Finalize Aggregate</text>
  <text x="800" y="217" text-anchor="middle" class="small">combine 阶段不重新执行 FILTER</text>

  <path d="M290 116 C330 116 340 185 380 185" class="line"/>
  <path d="M290 254 C330 254 340 185 380 185" class="line"/>
  <path d="M580 185 H680" class="line"/>

  <text x="55" y="365" class="small">原因：FILTER 是原始输入行级别的条件；到了 Finalize 阶段，输入已经是 transition state，不能再按业务列重新过滤。</text>
</svg>
