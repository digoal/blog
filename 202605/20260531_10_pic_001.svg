<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">普通聚合与 Ordered Agg 的输入差异</title>
  <desc id="desc">展示 sum 等普通聚合可按任意输入顺序转移状态，而 array_agg、string_agg、json_object_agg 等带 ORDER BY 的聚合要求每组内输入按指定顺序进入 transition function。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .row { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1; rx: 6; }
    .row2 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1; rx: 6; }
    .sort { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .agg { fill: #f1f5f9; stroke: #475569; stroke-width: 1.5; rx: 8; }
    .text { font: 15px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .title { font: 18px sans-serif; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="360"/>
  <rect class="panel" x="30" y="42" width="430" height="276"/>
  <text class="title" x="55" y="78">普通聚合：顺序通常不影响结果</text>
  <rect class="row" x="58" y="110" width="84" height="42"/><text class="text" x="80" y="136">x=3</text>
  <rect class="row" x="58" y="168" width="84" height="42"/><text class="text" x="80" y="194">x=1</text>
  <rect class="row" x="58" y="226" width="84" height="42"/><text class="text" x="80" y="252">x=2</text>
  <path class="arrow" d="M150 131 H245"/>
  <path class="arrow" d="M150 189 H245"/>
  <path class="arrow" d="M150 247 H245"/>
  <rect class="agg" x="250" y="142" width="150" height="92"/>
  <text class="text" x="287" y="177">sum(x)</text>
  <text class="small" x="277" y="205">状态: total += x</text>
  <text class="small" x="72" y="296">只要 transition 满足语义，扫描顺序可以来自任意计划。</text>

  <rect class="panel" x="520" y="42" width="430" height="276"/>
  <text class="title" x="545" y="78">Ordered Agg：每组内输入顺序是语义</text>
  <rect class="row2" x="548" y="110" width="104" height="42"/><text class="text" x="565" y="136">a=3,b=30</text>
  <rect class="row2" x="548" y="168" width="104" height="42"/><text class="text" x="565" y="194">a=1,b=10</text>
  <rect class="row2" x="548" y="226" width="104" height="42"/><text class="text" x="565" y="252">a=2,b=20</text>
  <path class="arrow" d="M660 189 H705"/>
  <rect class="sort" x="710" y="130" width="92" height="116"/>
  <text class="text" x="733" y="170">排序</text>
  <text class="small" x="729" y="198">ORDER</text>
  <text class="small" x="735" y="216">BY a</text>
  <path class="arrow" d="M810 189 H848"/>
  <rect class="agg" x="852" y="142" width="76" height="92"/>
  <text class="small" x="863" y="178">array_agg</text>
  <text class="small" x="870" y="204">b</text>
  <text class="small" x="548" y="296">结果应是 {10,20,30}；如果输入乱序，transition 看到的序列就错了。</text>
</svg>
