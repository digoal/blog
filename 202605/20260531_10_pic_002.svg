<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Ordered Agg 从语法到执行的控制链路</title>
  <desc id="desc">展示 SQL 聚合内 ORDER BY 或 DISTINCT 在 Aggref 中形成 aggorder/aggdistinct，planner 选择 pathkeys 并设置 aggpresorted，executor 决定是否需要内部 tuplesort。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .hot { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
    .code { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
    .text { font: 15px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .title { font: 18px sans-serif; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="420"/>
  <text class="title" x="38" y="42">Ordered Agg 控制链路</text>
  <rect class="box" x="42" y="78" width="190" height="120"/>
  <text class="text" x="64" y="112">SQL</text>
  <text class="small" x="64" y="142">array_agg(v ORDER BY k)</text>
  <text class="small" x="64" y="166">array_agg(DISTINCT v)</text>
  <path class="arrow" d="M232 138 H292"/>
  <rect class="code" x="300" y="78" width="210" height="120"/>
  <text class="text" x="322" y="112">Parser: Aggref</text>
  <text class="small" x="322" y="140">aggorder: SortGroupClause</text>
  <text class="small" x="322" y="162">aggdistinct: SortGroupClause</text>
  <text class="small" x="322" y="184">aggpresorted = false</text>
  <path class="arrow" d="M510 138 H570"/>
  <rect class="hot" x="578" y="78" width="220" height="120"/>
  <text class="text" x="600" y="112">Planner: pathkeys</text>
  <text class="small" x="600" y="140">选择覆盖最多聚合的排序</text>
  <text class="small" x="600" y="162">追加到 group_pathkeys</text>
  <text class="small" x="600" y="184">可复用则 aggpresorted=true</text>
  <path class="arrow" d="M798 138 H858"/>
  <rect class="ok" x="866" y="78" width="140" height="120"/>
  <text class="text" x="890" y="112">Executor</text>
  <text class="small" x="888" y="140">aggsortrequired?</text>
  <text class="small" x="888" y="164">排序 / 去重 /</text>
  <text class="small" x="888" y="186">直接 transition</text>

  <rect class="box" x="82" y="260" width="185" height="84"/>
  <text class="text" x="106" y="292">源码入口</text>
  <text class="small" x="106" y="320">parse_agg.c</text>
  <path class="arrow" d="M267 302 H330"/>
  <rect class="box" x="338" y="260" width="210" height="84"/>
  <text class="text" x="362" y="292">优化入口</text>
  <text class="small" x="362" y="320">planner.c</text>
  <path class="arrow" d="M548 302 H612"/>
  <rect class="box" x="620" y="260" width="210" height="84"/>
  <text class="text" x="644" y="292">执行初始化</text>
  <text class="small" x="644" y="320">nodeAgg.c / execExpr.c</text>
  <path class="arrow" d="M830 302 H890"/>
  <rect class="box" x="898" y="260" width="110" height="84"/>
  <text class="text" x="921" y="292">转移</text>
  <text class="small" x="918" y="320">tuplesort 或</text>
  <text class="small" x="924" y="338">transfn</text>
</svg>
