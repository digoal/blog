<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">预排序聚合的 pathkeys 选择</title>
  <desc id="desc">展示多个 ordered aggregate 请求不同排序时，planner 会选择能覆盖最多聚合的排序键，并把可覆盖的 Aggref 标为 aggpresorted。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .win { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
    .lose { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
    .sort { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .text { font: 15px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .title { font: 18px sans-serif; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="430"/>
  <text class="title" x="40" y="44">多个 Ordered Agg 共享一条外部排序的机会</text>
  <rect class="box" x="50" y="82" width="245" height="72"/>
  <text class="text" x="74" y="112">agg1: sum(x ORDER BY a)</text>
  <text class="small" x="74" y="136">需要 pathkeys: a</text>
  <rect class="box" x="50" y="174" width="245" height="72"/>
  <text class="text" x="74" y="204">agg2: sum(x ORDER BY a,b)</text>
  <text class="small" x="74" y="228">需要 pathkeys: a, b</text>
  <rect class="box" x="50" y="266" width="245" height="72"/>
  <text class="text" x="74" y="296">agg3: sum(x ORDER BY c)</text>
  <text class="small" x="74" y="320">需要 pathkeys: c</text>
  <path class="arrow" d="M300 210 H385"/>
  <rect class="sort" x="392" y="142" width="230" height="136"/>
  <text class="text" x="422" y="180">planner 比较 pathkeys</text>
  <text class="small" x="422" y="210">a,b 能覆盖 a</text>
  <text class="small" x="422" y="234">a 不能覆盖 a,b</text>
  <text class="small" x="422" y="258">c 与 a,b 不兼容</text>
  <path class="arrow" d="M622 210 H690"/>
  <rect class="win" x="698" y="86" width="285" height="114"/>
  <text class="text" x="724" y="122">选择 group_pathkeys = GROUP BY + a,b</text>
  <text class="small" x="724" y="150">agg1, agg2: aggpresorted = true</text>
  <text class="small" x="724" y="174">执行器不再为它们各自完整排序</text>
  <rect class="lose" x="698" y="232" width="285" height="94"/>
  <text class="text" x="724" y="266">agg3 仍需独立排序</text>
  <text class="small" x="724" y="294">排序键不兼容，不能靠同一条输入顺序保证语义</text>
  <text class="small" x="70" y="382">这不是全局最优搜索的所有组合枚举，而是源码注释定义的“覆盖最多聚合”的保守选择。</text>
</svg>
