<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">执行器处理 ordered aggregate 的三种模式</title>
  <desc id="desc">展示非预排序 ORDER BY 聚合需要内部 tuplesort，预排序 ORDER BY 可直接 transition，预排序 DISTINCT 还需要相邻去重。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .step { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
    .sort { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .dedup { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
    .text { font: 15px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .title { font: 18px sans-serif; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="430"/>
  <text class="title" x="38" y="42">nodeAgg.c 中的执行分支</text>
  <rect class="lane" x="38" y="76" width="964" height="86"/>
  <text class="text" x="60" y="108">1. 未预排序的 ORDER BY / DISTINCT</text>
  <rect class="step" x="350" y="96" width="130" height="44"/><text class="small" x="376" y="123">读取输入</text>
  <path class="arrow" d="M485 118 H545"/>
  <rect class="sort" x="552" y="96" width="150" height="44"/><text class="small" x="578" y="123">tuplesort 排序</text>
  <path class="arrow" d="M708 118 H768"/>
  <rect class="step" x="775" y="96" width="150" height="44"/><text class="small" x="802" y="123">transition</text>

  <rect class="lane" x="38" y="184" width="964" height="86"/>
  <text class="text" x="60" y="216">2. 预排序 ORDER BY，且没有 DISTINCT</text>
  <rect class="step" x="350" y="204" width="170" height="44"/><text class="small" x="378" y="231">输入已按需排序</text>
  <path class="arrow" d="M526 226 H642"/>
  <rect class="step" x="650" y="204" width="170" height="44"/><text class="small" x="686" y="231">直接 transition</text>

  <rect class="lane" x="38" y="292" width="964" height="86"/>
  <text class="text" x="60" y="324">3. 预排序 DISTINCT</text>
  <rect class="step" x="350" y="312" width="150" height="44"/><text class="small" x="376" y="339">输入已排序</text>
  <path class="arrow" d="M506 334 H570"/>
  <rect class="dedup" x="578" y="312" width="165" height="44"/><text class="small" x="606" y="339">相邻值去重</text>
  <path class="arrow" d="M750 334 H812"/>
  <rect class="step" x="820" y="312" width="150" height="44"/><text class="small" x="846" y="339">transition</text>
  <text class="small" x="60" y="400">关键点：预排序省掉的是每个 Aggref 内部的完整排序；DISTINCT 语义仍要求去重。</text>
</svg>
