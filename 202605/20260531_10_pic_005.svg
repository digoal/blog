<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="460" viewBox="0 0 1040 460" role="img" aria-labelledby="title desc">
  <title id="title">Ordered Agg 实践决策路径</title>
  <desc id="desc">给出开发者和 DBA 判断是否使用聚合内 ORDER BY、是否依赖预排序、是否改写查询或建索引的实践流程。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
    .mid { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .text { font: 15px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .title { font: 18px sans-serif; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="460"/>
  <text class="title" x="38" y="42">使用 Ordered Agg 前先回答的问题</text>
  <rect class="box" x="50" y="82" width="210" height="72"/>
  <text class="text" x="76" y="112">结果是否依赖顺序？</text>
  <text class="small" x="76" y="136">数组、字符串、JSON 键冲突</text>
  <path class="arrow" d="M260 118 H330"/>
  <rect class="ok" x="338" y="82" width="220" height="72"/>
  <text class="text" x="364" y="112">是：写进聚合内部</text>
  <text class="small" x="364" y="136">agg(x ORDER BY k)</text>
  <path class="arrow" d="M558 118 H628"/>
  <rect class="box" x="636" y="82" width="330" height="72"/>
  <text class="text" x="662" y="112">不要只依赖子查询 ORDER BY</text>
  <text class="small" x="662" y="136">外层 join、group、planner 改写可能重排</text>

  <rect class="box" x="50" y="206" width="250" height="82"/>
  <text class="text" x="76" y="238">是否有 GROUP BY + 大组？</text>
  <text class="small" x="76" y="264">每组排序会消耗 work_mem / 临时文件</text>
  <path class="arrow" d="M300 247 H372"/>
  <rect class="mid" x="380" y="206" width="250" height="82"/>
  <text class="text" x="406" y="238">观察计划是否有 Sort</text>
  <text class="small" x="406" y="264">EXPLAIN，看 GroupAggregate 输入顺序</text>
  <path class="arrow" d="M630 247 H702"/>
  <rect class="ok" x="710" y="206" width="256" height="82"/>
  <text class="text" x="736" y="238">可用索引或增量排序降低代价</text>
  <text class="small" x="736" y="264">按 group key + order key 组织访问路径</text>

  <rect class="box" x="50" y="340" width="250" height="78"/>
  <text class="text" x="76" y="372">是否带 DISTINCT / FILTER？</text>
  <text class="small" x="76" y="396">语义约束比性能更重要</text>
  <path class="arrow" d="M300 379 H372"/>
  <rect class="warn" x="380" y="340" width="250" height="78"/>
  <text class="text" x="406" y="372">DISTINCT 仍需去重</text>
  <text class="small" x="406" y="396">FILTER 表达式可能阻止预排序</text>
  <path class="arrow" d="M630 379 H702"/>
  <rect class="box" x="710" y="340" width="256" height="78"/>
  <text class="text" x="736" y="372">验证而不是猜</text>
  <text class="small" x="736" y="396">对比 enable_presorted_aggregate</text>
</svg>
