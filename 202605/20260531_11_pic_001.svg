<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">滑动窗口聚合的重算与反向转移</title>
  <desc id="desc">比较窗口帧起点移动时从头重算和使用 inverse transition 删除最早输入行的执行差异。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .row { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.2; }
    .row-old { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; }
    .row-new { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.2; }
    .state { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
    .cost { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; font-weight: 700; fill: #b45309; }
    .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" x="0" y="0" width="960" height="520"/>
  <text class="title" x="48" y="48">窗口帧向右滑动：同一结果，两个代价模型</text>

  <rect class="panel" x="48" y="82" width="400" height="360" rx="8"/>
  <text class="title" x="78" y="122">没有 inverse transition</text>
  <text class="small" x="78" y="154">帧起点变化后，重新扫描当前帧内所有行</text>
  <g transform="translate(78 190)">
    <rect class="row" x="0" y="0" width="54" height="54" rx="6"/><text class="text" x="20" y="35">r1</text>
    <rect class="row" x="66" y="0" width="54" height="54" rx="6"/><text class="text" x="86" y="35">r2</text>
    <rect class="row" x="132" y="0" width="54" height="54" rx="6"/><text class="text" x="152" y="35">r3</text>
    <rect class="row" x="198" y="0" width="54" height="54" rx="6"/><text class="text" x="218" y="35">r4</text>
    <rect class="row-new" x="264" y="0" width="54" height="54" rx="6"/><text class="text" x="284" y="35">r5</text>
  </g>
  <path class="arrow" d="M156 270 C170 306, 228 306, 242 270"/>
  <path class="arrow" d="M222 270 C236 318, 294 318, 308 270"/>
  <path class="arrow" d="M288 270 C302 330, 360 330, 374 270"/>
  <rect class="state" x="150" y="346" width="196" height="54" rx="8"/>
  <text class="text" x="178" y="380">sfunc(r2,r3,r4,r5)</text>
  <text class="cost" x="78" y="424">每行结果约 O(窗口长度)</text>

  <rect class="panel" x="512" y="82" width="400" height="360" rx="8"/>
  <text class="title" x="542" y="122">有 inverse transition</text>
  <text class="small" x="542" y="154">移出最早行，再追加新进入的行</text>
  <g transform="translate(542 190)">
    <rect class="row-old" x="0" y="0" width="54" height="54" rx="6"/><text class="text" x="20" y="35">r1</text>
    <rect class="row" x="66" y="0" width="54" height="54" rx="6"/><text class="text" x="86" y="35">r2</text>
    <rect class="row" x="132" y="0" width="54" height="54" rx="6"/><text class="text" x="152" y="35">r3</text>
    <rect class="row" x="198" y="0" width="54" height="54" rx="6"/><text class="text" x="218" y="35">r4</text>
    <rect class="row-new" x="264" y="0" width="54" height="54" rx="6"/><text class="text" x="284" y="35">r5</text>
  </g>
  <rect class="state" x="604" y="320" width="120" height="52" rx="8"/>
  <text class="text" x="629" y="353">state</text>
  <path class="arrow" d="M570 244 C560 280, 585 302, 620 320"/>
  <text class="small" x="548" y="298">minvfunc(r1)</text>
  <path class="arrow" d="M833 244 C850 284, 815 312, 724 333"/>
  <text class="small" x="770" y="298">msfunc(r5)</text>
  <text class="cost" x="542" y="424">每次滑动通常 O(1)</text>
</svg>
