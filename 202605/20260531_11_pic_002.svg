<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL moving aggregate 的目录契约</title>
  <desc id="desc">展示 pg_aggregate 中普通聚合实现和 moving aggregate 实现的字段对应关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
    .plain { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
    .moving { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .guard { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="48" y="48">pg_aggregate 同时保存普通聚合与 moving aggregate 两套实现</text>

  <rect class="box" x="58" y="88" width="844" height="370" rx="8"/>
  <text class="text" x="86" y="126">pg_aggregate</text>
  <text class="small" x="86" y="150">同一个 SQL 聚合函数，可以有普通执行路径，也可以有窗口滑动优化路径。</text>

  <rect class="plain" x="100" y="190" width="300" height="180" rx="8"/>
  <text class="text" x="128" y="226">普通聚合字段</text>
  <text class="small" x="128" y="260">aggtransfn</text>
  <text class="small" x="128" y="288">aggfinalfn</text>
  <text class="small" x="128" y="316">aggtranstype</text>
  <text class="small" x="128" y="344">agginitval / aggtransspace</text>

  <rect class="moving" x="560" y="170" width="300" height="220" rx="8"/>
  <text class="text" x="588" y="206">moving aggregate 字段</text>
  <text class="small" x="588" y="240">aggmtransfn：加入新行</text>
  <text class="small" x="588" y="268">aggminvtransfn：移出旧行</text>
  <text class="small" x="588" y="296">aggmfinalfn：从移动状态产出结果</text>
  <text class="small" x="588" y="324">aggmtranstype：移动状态类型</text>
  <text class="small" x="588" y="352">aggminitval / aggmtransspace</text>

  <path class="arrow" d="M405 270 C455 270, 505 270, 554 270"/>
  <text class="small" x="433" y="248">同一结果类型</text>

  <rect class="guard" x="140" y="410" width="680" height="74" rx="8"/>
  <text class="text" x="168" y="446">创建时校验</text>
  <text class="small" x="168" y="470">MINVFUNC 与 MSFUNC 参数和返回状态类型匹配；两者 strictness 必须一致；MSTYPE 存在时 MSFUNC 与 MINVFUNC 不能缺失。</text>
</svg>
