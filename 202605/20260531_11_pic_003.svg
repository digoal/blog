<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">WindowAgg 使用 inverse transition 的决策流程</title>
  <desc id="desc">展示 PostgreSQL WindowAgg 在窗口帧移动时选择使用 inverse transition、继续追加或重启聚合的主要判断。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .start { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
    .decision { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; }
    .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" width="960" height="640"/>
  <text class="title" x="48" y="46">WindowAgg：什么时候能用 inverse transition？</text>

  <rect class="start" x="356" y="78" width="248" height="58" rx="8"/>
  <text class="text" x="392" y="113">计算当前输出行窗口帧</text>

  <path class="arrow" d="M480 136 L480 170"/>
  <rect class="decision" x="324" y="170" width="312" height="70" rx="8"/>
  <text class="text" x="356" y="200">帧起点是否会移动？</text>
  <text class="small" x="356" y="222">UNBOUNDED PRECEDING 通常不需要删除旧行</text>

  <path class="arrow" d="M324 205 L170 205 L170 292"/>
  <text class="small" x="205" y="194">否</text>
  <rect class="ok" x="72" y="292" width="196" height="70" rx="8"/>
  <text class="text" x="104" y="322">只继续追加新行</text>
  <text class="small" x="104" y="344">不需要 inverse</text>

  <path class="arrow" d="M480 240 L480 280"/>
  <rect class="decision" x="324" y="280" width="312" height="70" rx="8"/>
  <text class="text" x="366" y="310">聚合有 MINVFUNC？</text>
  <text class="small" x="366" y="332">pg_aggregate.aggminvtransfn</text>

  <path class="arrow" d="M636 315 L758 315 L758 392"/>
  <text class="small" x="672" y="304">否</text>
  <rect class="bad" x="668" y="392" width="180" height="70" rx="8"/>
  <text class="text" x="702" y="422">重启并重算</text>
  <text class="small" x="702" y="444">从当前帧头扫描</text>

  <path class="arrow" d="M480 350 L480 388"/>
  <rect class="decision" x="324" y="388" width="312" height="82" rx="8"/>
  <text class="text" x="344" y="418">参数/过滤表达式是否稳定？</text>
  <text class="small" x="344" y="442">volatile 参数或 filter 可能让重启与不重启结果不同</text>

  <path class="arrow" d="M636 430 L668 430"/>
  <text class="small" x="640" y="418">否</text>

  <path class="arrow" d="M480 470 L480 508"/>
  <rect class="decision" x="324" y="508" width="312" height="70" rx="8"/>
  <text class="text" x="350" y="538">MINVFUNC 是否返回 NULL？</text>
  <text class="small" x="350" y="560">NULL 表示本次不能反向撤销</text>

  <path class="arrow" d="M636 543 L758 543 L758 462"/>
  <text class="small" x="674" y="532">是</text>
  <path class="arrow" d="M324 543 L170 543 L170 362"/>
  <text class="small" x="206" y="532">否</text>
  <text class="small" x="88" y="402">删除旧行 + 追加新行</text>
</svg>
