<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Inverse transition 的适用边界</title>
  <desc id="desc">从代数可逆性、数值稳定性、状态大小和窗口语义四个维度判断 inverse transition 是否适合。</desc>
  <style>
    .bg { fill: #ffffff; }
    .axis { stroke: #334155; stroke-width: 2; }
    .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .mid { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; }
    .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
  </style>
  <rect class="bg" width="960" height="560"/>
  <text class="title" x="48" y="48">不要把 inverse transition 理解成“所有滑动窗口都免费”</text>

  <line class="axis" x1="150" y1="460" x2="810" y2="460"/>
  <line class="axis" x1="150" y1="460" x2="150" y2="120"/>
  <text class="small" x="364" y="504">状态可逆性 / 可维护性：低 → 高</text>
  <text class="small" x="34" y="306" transform="rotate(-90 34 306)">重算代价：低 → 高</text>

  <rect class="good" x="560" y="150" width="230" height="110" rx="8"/>
  <text class="text" x="586" y="184">强适合</text>
  <text class="small" x="586" y="212">count / sum(integer)</text>
  <text class="small" x="586" y="236">avg 的 sum/count 状态</text>

  <rect class="mid" x="360" y="250" width="245" height="118" rx="8"/>
  <text class="text" x="386" y="284">有条件适合</text>
  <text class="small" x="386" y="312">部分值无法撤销时返回 NULL</text>
  <text class="small" x="386" y="336">触发单个聚合重启重算</text>

  <rect class="bad" x="180" y="150" width="245" height="120" rx="8"/>
  <text class="text" x="206" y="184">不适合直接做 inverse</text>
  <text class="small" x="206" y="212">浮点精度不可逆</text>
  <text class="small" x="206" y="236">中位数/分位数需复杂状态</text>
  <text class="small" x="206" y="260">volatile 参数会改变语义</text>

  <rect class="mid" x="608" y="330" width="210" height="90" rx="8"/>
  <text class="text" x="632" y="364">收益有限</text>
  <text class="small" x="632" y="392">窗口很小或帧头不移动</text>

  <text class="small" x="162" y="108">重算很贵，最需要优化</text>
  <text class="small" x="658" y="484">可逆且状态小</text>
</svg>
