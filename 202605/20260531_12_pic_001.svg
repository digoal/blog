<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">RBO 与 CBO 的分工边界</title>
  <desc id="desc">展示规则、候选计划、统计信息和代价模型之间的关系。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
    .box { fill: #f8fafc; stroke: #34495e; stroke-width: 2; rx: 8; }
    .rule { fill: #fff7e6; stroke: #b7791f; stroke-width: 2; rx: 8; }
    .cost { fill: #e8f5f3; stroke: #147d64; stroke-width: 2; rx: 8; }
    .bad { fill: #fdecec; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; }
    .tiny { font-size: 14px; fill: #52606d; }
    .arrow { stroke: #34495e; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>

  <rect x="40" y="52" width="190" height="92" class="box"/>
  <text x="135" y="92" text-anchor="middle" class="label">SQL 查询</text>
  <text x="135" y="120" text-anchor="middle" class="small">逻辑表达式</text>

  <rect x="300" y="34" width="270" height="128" class="rule"/>
  <text x="435" y="74" text-anchor="middle" class="label">规则层</text>
  <text x="435" y="103" text-anchor="middle" class="small">等价变换、谓词下推</text>
  <text x="435" y="130" text-anchor="middle" class="small">合法性检查、搜索空间裁剪</text>

  <rect x="650" y="52" width="240" height="92" class="box"/>
  <text x="770" y="92" text-anchor="middle" class="label">候选 Path 集合</text>
  <text x="770" y="120" text-anchor="middle" class="small">SeqScan / IndexScan / Join</text>

  <rect x="115" y="250" width="240" height="120" class="bad"/>
  <text x="235" y="292" text-anchor="middle" class="label">纯 RBO 风险</text>
  <text x="235" y="321" text-anchor="middle" class="small">按固定优先级选计划</text>
  <text x="235" y="348" text-anchor="middle" class="small">不看数据量与分布</text>

  <rect x="430" y="236" width="210" height="148" class="box"/>
  <text x="535" y="278" text-anchor="middle" class="label">统计信息</text>
  <text x="535" y="308" text-anchor="middle" class="small">行数、页数、选择率</text>
  <text x="535" y="335" text-anchor="middle" class="small">相关性、缓存假设</text>
  <text x="535" y="362" text-anchor="middle" class="small">ANALYZE 维护</text>

  <rect x="710" y="236" width="210" height="148" class="cost"/>
  <text x="815" y="278" text-anchor="middle" class="label">代价层</text>
  <text x="815" y="308" text-anchor="middle" class="small">startup_cost</text>
  <text x="815" y="335" text-anchor="middle" class="small">total_cost</text>
  <text x="815" y="362" text-anchor="middle" class="small">保留非支配路径</text>

  <rect x="350" y="430" width="260" height="58" class="cost"/>
  <text x="480" y="466" text-anchor="middle" class="label">最便宜且合法的 Plan</text>

  <path d="M230 98 H300" class="arrow"/>
  <path d="M570 98 H650" class="arrow"/>
  <path d="M770 144 V236" class="arrow"/>
  <path d="M640 310 H710" class="arrow"/>
  <path d="M815 384 C780 430 680 455 610 459" class="arrow"/>
  <path d="M300 144 C220 176 205 215 225 250" class="arrow"/>
  <path d="M355 310 H430" class="arrow"/>

  <text x="480" y="200" text-anchor="middle" class="tiny">现代优化器通常不是 RBO 或 CBO 二选一：规则负责生成和裁剪候选，代价负责在候选中选择。</text>
</svg>
