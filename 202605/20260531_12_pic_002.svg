<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 优化器主流水线</title>
  <desc id="desc">展示从 Query 到 Path 再到 Plan 的 PostgreSQL 优化器主流程。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
    .stage { fill: #f8fafc; stroke: #334e68; stroke-width: 2; rx: 8; }
    .hot { fill: #e8f5f3; stroke: #147d64; stroke-width: 2; rx: 8; }
    .rule { fill: #fff7e6; stroke: #b7791f; stroke-width: 2; rx: 8; }
    .label { font-size: 19px; font-weight: 700; }
    .small { font-size: 15px; }
    .code { font-size: 14px; fill: #486581; }
    .arrow { stroke: #334e68; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>

  <rect x="36" y="54" width="170" height="84" class="stage"/>
  <text x="121" y="90" text-anchor="middle" class="label">Query</text>
  <text x="121" y="116" text-anchor="middle" class="small">解析/重写后语法树</text>

  <rect x="262" y="38" width="210" height="116" class="rule"/>
  <text x="367" y="73" text-anchor="middle" class="label">subquery_planner</text>
  <text x="367" y="99" text-anchor="middle" class="small">拉平子查询、规范化条件</text>
  <text x="367" y="124" text-anchor="middle" class="code">planner.c</text>

  <rect x="528" y="38" width="210" height="116" class="rule"/>
  <text x="633" y="73" text-anchor="middle" class="label">query_planner</text>
  <text x="633" y="99" text-anchor="middle" class="small">拆 restriction / join qual</text>
  <text x="633" y="124" text-anchor="middle" class="code">planmain.c</text>

  <rect x="804" y="38" width="230" height="116" class="hot"/>
  <text x="919" y="73" text-anchor="middle" class="label">make_one_rel</text>
  <text x="919" y="99" text-anchor="middle" class="small">生成扫描与连接 Path</text>
  <text x="919" y="124" text-anchor="middle" class="code">allpaths.c</text>

  <rect x="92" y="240" width="220" height="118" class="hot"/>
  <text x="202" y="276" text-anchor="middle" class="label">Base Rel Path</text>
  <text x="202" y="303" text-anchor="middle" class="small">SeqScan / IndexScan</text>
  <text x="202" y="329" text-anchor="middle" class="code">set_base_rel_pathlists</text>

  <rect x="430" y="228" width="240" height="142" class="hot"/>
  <text x="550" y="264" text-anchor="middle" class="label">Join Search</text>
  <text x="550" y="292" text-anchor="middle" class="small">动态规划或 GEQO</text>
  <text x="550" y="319" text-anchor="middle" class="small">生成 joinrel Path</text>
  <text x="550" y="344" text-anchor="middle" class="code">standard_join_search</text>

  <rect x="786" y="240" width="220" height="118" class="hot"/>
  <text x="896" y="276" text-anchor="middle" class="label">add_path</text>
  <text x="896" y="303" text-anchor="middle" class="small">非支配路径竞争</text>
  <text x="896" y="329" text-anchor="middle" class="code">pathnode.c</text>

  <rect x="430" y="446" width="240" height="74" class="stage"/>
  <text x="550" y="477" text-anchor="middle" class="label">create_plan</text>
  <text x="550" y="503" text-anchor="middle" class="small">最优 Path 转执行 Plan</text>

  <path d="M206 96 H262" class="arrow"/>
  <path d="M472 96 H528" class="arrow"/>
  <path d="M738 96 H804" class="arrow"/>
  <path d="M919 154 C902 205 824 252 670 283" class="arrow"/>
  <path d="M804 154 C710 220 440 220 312 273" class="arrow"/>
  <path d="M312 299 H430" class="arrow"/>
  <path d="M670 299 H786" class="arrow"/>
  <path d="M896 358 C840 418 722 458 670 476" class="arrow"/>
</svg>
