<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">规则如何控制搜索空间</title>
  <desc id="desc">展示连接顺序动态规划、合法性规则和 add_path 竞争如何共同控制候选计划数量。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
    .rel { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 8; }
    .join { fill: #e8f5f3; stroke: #147d64; stroke-width: 2; rx: 8; }
    .rule { fill: #fff7e6; stroke: #b7791f; stroke-width: 2; rx: 8; }
    .drop { fill: #fdecec; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; fill: #52606d; }
    .arrow { stroke: #334e68; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #b91c1c; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#redarrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <text x="78" y="42" class="label">Level 1：基础关系</text>
  <rect x="70" y="70" width="90" height="54" class="rel"/><text x="115" y="104" text-anchor="middle" class="label">A</text>
  <rect x="185" y="70" width="90" height="54" class="rel"/><text x="230" y="104" text-anchor="middle" class="label">B</text>
  <rect x="300" y="70" width="90" height="54" class="rel"/><text x="345" y="104" text-anchor="middle" class="label">C</text>
  <rect x="415" y="70" width="90" height="54" class="rel"/><text x="460" y="104" text-anchor="middle" class="label">D</text>

  <text x="78" y="188" class="label">Level 2：优先按 join clause 生成</text>
  <rect x="70" y="216" width="120" height="60" class="join"/><text x="130" y="252" text-anchor="middle" class="label">{A,B}</text>
  <rect x="225" y="216" width="120" height="60" class="join"/><text x="285" y="252" text-anchor="middle" class="label">{B,C}</text>
  <rect x="380" y="216" width="120" height="60" class="join"/><text x="440" y="252" text-anchor="middle" class="label">{C,D}</text>
  <rect x="535" y="216" width="150" height="60" class="drop"/><text x="610" y="252" text-anchor="middle" class="label">{A,D} 被裁剪</text>

  <text x="78" y="340" class="label">Level 3/4：同一 joinrel 多条 Path 竞争</text>
  <rect x="90" y="368" width="160" height="66" class="join"/><text x="170" y="397" text-anchor="middle" class="label">{A,B,C}</text><text x="170" y="421" text-anchor="middle" class="small">NL / Hash / Merge</text>
  <rect x="300" y="368" width="160" height="66" class="join"/><text x="380" y="397" text-anchor="middle" class="label">{B,C,D}</text><text x="380" y="421" text-anchor="middle" class="small">不同 pathkeys</text>
  <rect x="550" y="368" width="180" height="66" class="join"/><text x="640" y="397" text-anchor="middle" class="label">{A,B,C,D}</text><text x="640" y="421" text-anchor="middle" class="small">保留 cheapest path</text>

  <rect x="770" y="70" width="240" height="138" class="rule"/>
  <text x="890" y="105" text-anchor="middle" class="label">规则不是最终答案</text>
  <text x="890" y="133" text-anchor="middle" class="small">只决定能不能变换</text>
  <text x="890" y="159" text-anchor="middle" class="small">值不值得生成候选</text>
  <text x="890" y="185" text-anchor="middle" class="small">是否合法执行</text>

  <rect x="770" y="250" width="240" height="138" class="rule"/>
  <text x="890" y="285" text-anchor="middle" class="label">代价决定 winner</text>
  <text x="890" y="313" text-anchor="middle" class="small">rows、startup、total</text>
  <text x="890" y="339" text-anchor="middle" class="small">pathkeys、并行安全</text>
  <text x="890" y="365" text-anchor="middle" class="small">parameterized path</text>

  <path d="M130 124 V216" class="arrow"/>
  <path d="M230 124 L285 216" class="arrow"/>
  <path d="M345 124 L285 216" class="arrow"/>
  <path d="M345 124 L440 216" class="arrow"/>
  <path d="M460 124 V216" class="arrow"/>
  <path d="M460 124 L610 216" class="dash"/>
  <path d="M130 276 L170 368" class="arrow"/>
  <path d="M285 276 L170 368" class="arrow"/>
  <path d="M285 276 L380 368" class="arrow"/>
  <path d="M440 276 L380 368" class="arrow"/>
  <path d="M250 401 H300" class="arrow"/>
  <path d="M460 401 H550" class="arrow"/>
  <path d="M685 246 C740 246 775 226 808 208" class="arrow"/>
  <path d="M730 401 C774 389 797 372 818 388" class="arrow"/>

  <text x="540" y="508" text-anchor="middle" class="tiny">PostgreSQL 的 join_search_one_level 按层构造 joinrel；add_path 让同一关系集合的候选实现互相淘汰。</text>
</svg>
