<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" role="img" aria-labelledby="title desc">
  <title id="title">优化器问题诊断闭环</title>
  <desc id="desc">展示从 EXPLAIN 到统计信息、代价参数、SQL 形态和索引设计的诊断顺序。</desc>
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
    .box { fill: #f8fafc; stroke: #334e68; stroke-width: 2; rx: 8; }
    .focus { fill: #e8f5f3; stroke: #147d64; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7e6; stroke: #b7791f; stroke-width: 2; rx: 8; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; fill: #52606d; }
    .arrow { stroke: #334e68; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>

  <rect x="70" y="58" width="210" height="96" class="focus"/>
  <text x="175" y="94" text-anchor="middle" class="label">1. 看计划事实</text>
  <text x="175" y="121" text-anchor="middle" class="small">EXPLAIN ANALYZE</text>
  <text x="175" y="144" text-anchor="middle" class="tiny">估算行数 vs 实际行数</text>

  <rect x="390" y="58" width="220" height="96" class="box"/>
  <text x="500" y="94" text-anchor="middle" class="label">2. 修统计信息</text>
  <text x="500" y="121" text-anchor="middle" class="small">ANALYZE / extended stats</text>
  <text x="500" y="144" text-anchor="middle" class="tiny">先修选择率，不先调开关</text>

  <rect x="720" y="58" width="210" height="96" class="box"/>
  <text x="825" y="94" text-anchor="middle" class="label">3. 校准代价</text>
  <text x="825" y="121" text-anchor="middle" class="small">seq/random page cost</text>
  <text x="825" y="144" text-anchor="middle" class="tiny">反映缓存与存储现实</text>

  <rect x="720" y="248" width="210" height="96" class="box"/>
  <text x="825" y="284" text-anchor="middle" class="label">4. 调 SQL/索引</text>
  <text x="825" y="311" text-anchor="middle" class="small">谓词、连接键、pathkeys</text>
  <text x="825" y="334" text-anchor="middle" class="tiny">让候选计划可被生成</text>

  <rect x="390" y="248" width="220" height="96" class="warn"/>
  <text x="500" y="284" text-anchor="middle" class="label">5. 临时验证开关</text>
  <text x="500" y="311" text-anchor="middle" class="small">enable_* / join_collapse_limit</text>
  <text x="500" y="334" text-anchor="middle" class="tiny">用于对照，不当长期策略</text>

  <rect x="70" y="248" width="210" height="96" class="focus"/>
  <text x="175" y="284" text-anchor="middle" class="label">6. 回归验证</text>
  <text x="175" y="311" text-anchor="middle" class="small">真实数据 + 典型 SQL</text>
  <text x="175" y="334" text-anchor="middle" class="tiny">关注 p95 与计划稳定性</text>

  <rect x="248" y="418" width="504" height="70" class="warn"/>
  <text x="500" y="450" text-anchor="middle" class="label">不要把 RBO 当成 hint 系统</text>
  <text x="500" y="476" text-anchor="middle" class="small">规则能帮你控制搜索空间；根因通常在统计、代价、SQL 形态或索引契约。</text>

  <path d="M280 106 H390" class="arrow"/>
  <path d="M610 106 H720" class="arrow"/>
  <path d="M825 154 V248" class="arrow"/>
  <path d="M720 296 H610" class="arrow"/>
  <path d="M390 296 H280" class="arrow"/>
  <path d="M175 248 V154" class="arrow"/>
  <path d="M175 344 C230 390 320 410 410 418" class="arrow"/>
  <path d="M500 344 V418" class="arrow"/>
</svg>
