<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL CBO 从 SQL 到执行计划的主流程</title>
  <desc id="desc">展示查询从解析树进入 planner，经过预处理、Path 生成、代价比较，最终变成 Plan 的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345995"/>
    </marker>
  </defs>
  <style>
    .box { fill:#f7f9fc; stroke:#345995; stroke-width:2; rx:8; }
    .accent { fill:#fff7e6; stroke:#c77700; stroke-width:2; rx:8; }
    .data { fill:#eef9f1; stroke:#247a3b; stroke-width:2; rx:8; }
    .text { font-family:Arial, sans-serif; font-size:18px; fill:#1f2933; }
    .small { font-family:Arial, sans-serif; font-size:14px; fill:#4b5563; }
    .code { font-family:Menlo, Consolas, monospace; font-size:14px; fill:#1f2933; }
    .arrow { stroke:#345995; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
  </style>
  <rect x="30" y="78" width="150" height="88" class="box"/>
  <text x="105" y="115" text-anchor="middle" class="text">SQL 查询</text>
  <text x="105" y="142" text-anchor="middle" class="small">Query parse tree</text>

  <rect x="230" y="52" width="185" height="140" class="box"/>
  <text x="322" y="90" text-anchor="middle" class="text">planner.c</text>
  <text x="322" y="118" text-anchor="middle" class="code">standard_planner</text>
  <text x="322" y="146" text-anchor="middle" class="small">处理子查询、聚合</text>
  <text x="322" y="170" text-anchor="middle" class="small">排序、LIMIT 等上层节点</text>

  <rect x="465" y="52" width="190" height="140" class="box"/>
  <text x="560" y="90" text-anchor="middle" class="text">planmain.c</text>
  <text x="560" y="118" text-anchor="middle" class="code">query_planner</text>
  <text x="560" y="146" text-anchor="middle" class="small">构造 base rel</text>
  <text x="560" y="170" text-anchor="middle" class="small">拆解 join tree</text>

  <rect x="705" y="52" width="180" height="140" class="accent"/>
  <text x="795" y="90" text-anchor="middle" class="text">allpaths.c</text>
  <text x="795" y="118" text-anchor="middle" class="code">make_one_rel</text>
  <text x="795" y="146" text-anchor="middle" class="small">生成 scan Path</text>
  <text x="795" y="170" text-anchor="middle" class="small">生成 join Path</text>

  <rect x="935" y="52" width="155" height="140" class="box"/>
  <text x="1012" y="90" text-anchor="middle" class="text">Plan tree</text>
  <text x="1012" y="118" text-anchor="middle" class="small">cheapest Path</text>
  <text x="1012" y="146" text-anchor="middle" class="small">转为执行器节点</text>
  <text x="1012" y="170" text-anchor="middle" class="small">SeqScan/HashJoin...</text>

  <rect x="225" y="292" width="190" height="120" class="data"/>
  <text x="320" y="328" text-anchor="middle" class="text">统计信息</text>
  <text x="320" y="356" text-anchor="middle" class="code">pg_class</text>
  <text x="320" y="380" text-anchor="middle" class="code">pg_statistic</text>
  <text x="320" y="404" text-anchor="middle" class="code">pg_statistic_ext</text>

  <rect x="465" y="292" width="190" height="120" class="data"/>
  <text x="560" y="328" text-anchor="middle" class="text">选择率与基数</text>
  <text x="560" y="356" text-anchor="middle" class="code">clauselist_selectivity</text>
  <text x="560" y="384" text-anchor="middle" class="small">rows = tuples * selectivity</text>

  <rect x="705" y="292" width="180" height="120" class="data"/>
  <text x="795" y="328" text-anchor="middle" class="text">代价模型</text>
  <text x="795" y="356" text-anchor="middle" class="code">costsize.c</text>
  <text x="795" y="384" text-anchor="middle" class="small">IO + CPU + 并行代价</text>

  <path d="M180 122 L230 122" class="arrow"/>
  <path d="M415 122 L465 122" class="arrow"/>
  <path d="M655 122 L705 122" class="arrow"/>
  <path d="M885 122 L935 122" class="arrow"/>
  <path d="M320 292 L485 192" class="arrow"/>
  <path d="M560 292 L645 192" class="arrow"/>
  <path d="M795 292 L795 192" class="arrow"/>
  <path d="M655 352 L705 352" class="arrow"/>
  <text x="560" y="470" text-anchor="middle" class="small">CBO 不是直接猜一个计划，而是生成多个可行 Path，用统计信息估 rows，再把 rows 放进代价模型比较。</text>
</svg>
