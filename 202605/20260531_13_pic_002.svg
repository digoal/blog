<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">代价模型把页面、行数、条件和排序折算为可比较的 cost</title>
  <desc id="desc">对比顺序扫描、索引扫描和并行路径的主要代价组成。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345995"/>
    </marker>
  </defs>
  <style>
    .axis { stroke:#2f3a45; stroke-width:2; }
    .bar1 { fill:#8ecae6; }
    .bar2 { fill:#ffb703; }
    .bar3 { fill:#90be6d; }
    .bar4 { fill:#d8dee9; }
    .text { font-family:Arial, sans-serif; font-size:18px; fill:#1f2933; }
    .small { font-family:Arial, sans-serif; font-size:14px; fill:#4b5563; }
    .code { font-family:Menlo, Consolas, monospace; font-size:14px; fill:#1f2933; }
    .box { fill:#f8fafc; stroke:#6b7280; stroke-width:1.5; rx:8; }
    .arrow { stroke:#345995; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>
  <text x="560" y="40" text-anchor="middle" class="text">同一把尺子：startup_cost + run_cost</text>

  <line x1="90" y1="395" x2="710" y2="395" class="axis"/>
  <line x1="90" y1="110" x2="90" y2="395" class="axis"/>
  <text x="90" y="92" text-anchor="middle" class="small">cost</text>

  <rect x="145" y="180" width="80" height="215" class="bar1"/>
  <rect x="145" y="130" width="80" height="50" class="bar2"/>
  <text x="185" y="423" text-anchor="middle" class="small">Seq Scan</text>
  <text x="185" y="160" text-anchor="middle" class="small">CPU</text>
  <text x="185" y="288" text-anchor="middle" class="small">顺序页</text>

  <rect x="315" y="250" width="80" height="145" class="bar1"/>
  <rect x="315" y="170" width="80" height="80" class="bar2"/>
  <rect x="315" y="115" width="80" height="55" class="bar3"/>
  <text x="355" y="423" text-anchor="middle" class="small">Index Scan</text>
  <text x="355" y="207" text-anchor="middle" class="small">随机页</text>
  <text x="355" y="147" text-anchor="middle" class="small">索引</text>

  <rect x="485" y="285" width="80" height="110" class="bar1"/>
  <rect x="485" y="235" width="80" height="50" class="bar2"/>
  <rect x="485" y="195" width="80" height="40" class="bar4"/>
  <text x="525" y="423" text-anchor="middle" class="small">Parallel</text>
  <text x="525" y="218" text-anchor="middle" class="small">通信</text>
  <text x="525" y="263" text-anchor="middle" class="small">CPU 分摊</text>

  <rect x="760" y="105" width="300" height="285" class="box"/>
  <text x="910" y="140" text-anchor="middle" class="text">关键输入</text>
  <text x="790" y="180" class="code">seq_page_cost</text>
  <text x="930" y="180" class="small">顺序读取页成本</text>
  <text x="790" y="215" class="code">random_page_cost</text>
  <text x="930" y="215" class="small">随机读取页成本</text>
  <text x="790" y="250" class="code">cpu_tuple_cost</text>
  <text x="930" y="250" class="small">处理一行成本</text>
  <text x="790" y="285" class="code">effective_cache_size</text>
  <text x="930" y="285" class="small">估算缓存影响</text>
  <text x="790" y="320" class="code">rows</text>
  <text x="930" y="320" class="small">来自选择率与统计信息</text>
  <text x="790" y="355" class="code">startup_cost</text>
  <text x="930" y="355" class="small">第一行之前的成本</text>
  <path d="M600 245 L760 245" class="arrow"/>
  <text x="560" y="465" text-anchor="middle" class="small">调 cost 参数不是“让索引更快”，而是改变优化器对 IO、CPU、缓存、并行开销的相对判断。</text>
</svg>
