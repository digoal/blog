<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">基数误差如何沿连接树放大</title>
  <desc id="desc">展示单表选择率低估会影响连接结果行数，再影响连接算法与上下层计划选择。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9f1239"/>
    </marker>
  </defs>
  <style>
    .good { fill:#dcfce7; stroke:#15803d; stroke-width:2; rx:8; }
    .bad { fill:#ffe4e6; stroke:#be123c; stroke-width:2; rx:8; }
    .join { fill:#f8fafc; stroke:#475569; stroke-width:2; rx:8; }
    .text { font-family:Arial, sans-serif; font-size:18px; fill:#1f2933; }
    .small { font-family:Arial, sans-serif; font-size:14px; fill:#4b5563; }
    .code { font-family:Menlo, Consolas, monospace; font-size:14px; fill:#1f2933; }
    .arrow { stroke:#9f1239; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>
  <text x="560" y="42" text-anchor="middle" class="text">CBO 的第一风险：rows 估错，cost 再精细也会比较错</text>

  <rect x="70" y="120" width="175" height="95" class="bad"/>
  <text x="158" y="155" text-anchor="middle" class="text">表 A 过滤</text>
  <text x="158" y="182" text-anchor="middle" class="code">估 100 行</text>
  <text x="158" y="204" text-anchor="middle" class="small">实际 10,000 行</text>

  <rect x="70" y="300" width="175" height="95" class="good"/>
  <text x="158" y="335" text-anchor="middle" class="text">表 B 过滤</text>
  <text x="158" y="362" text-anchor="middle" class="code">估 1,000 行</text>
  <text x="158" y="384" text-anchor="middle" class="small">实际接近</text>

  <rect x="335" y="205" width="210" height="110" class="bad"/>
  <text x="440" y="240" text-anchor="middle" class="text">A join B</text>
  <text x="440" y="270" text-anchor="middle" class="code">估 500 行</text>
  <text x="440" y="295" text-anchor="middle" class="small">实际可能 500,000 行</text>

  <rect x="635" y="205" width="210" height="110" class="bad"/>
  <text x="740" y="240" text-anchor="middle" class="text">选择 join 方法</text>
  <text x="740" y="270" text-anchor="middle" class="code">Nested Loop?</text>
  <text x="740" y="295" text-anchor="middle" class="small">小结果假设导致误选</text>

  <rect x="920" y="205" width="145" height="110" class="join"/>
  <text x="992" y="240" text-anchor="middle" class="text">上层节点</text>
  <text x="992" y="270" text-anchor="middle" class="small">排序</text>
  <text x="992" y="294" text-anchor="middle" class="small">聚合</text>

  <path d="M245 165 C285 165 290 220 335 240" class="arrow"/>
  <path d="M245 350 C285 350 290 300 335 280" class="arrow"/>
  <path d="M545 260 L635 260" class="arrow"/>
  <path d="M845 260 L920 260" class="arrow"/>

  <rect x="335" y="380" width="510" height="70" class="join"/>
  <text x="590" y="410" text-anchor="middle" class="text">常见根因</text>
  <text x="590" y="438" text-anchor="middle" class="small">过期统计信息、多列相关性、表达式缺统计、数据倾斜、参数化 SQL 的通用计划</text>
</svg>
