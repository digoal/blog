<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">连接顺序搜索：动态规划、bushy plan 与 GEQO</title>
  <desc id="desc">展示 PostgreSQL 标准优化器按关系集合大小逐层构造 joinrel，大表数量超过阈值时可进入 GEQO。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345995"/>
    </marker>
  </defs>
  <style>
    .level { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; rx:10; }
    .rel { fill:#e0f2fe; stroke:#0369a1; stroke-width:1.5; rx:8; }
    .join { fill:#fef3c7; stroke:#b45309; stroke-width:1.5; rx:8; }
    .geqo { fill:#fce7f3; stroke:#be185d; stroke-width:2; rx:8; }
    .text { font-family:Arial, sans-serif; font-size:18px; fill:#1f2933; }
    .small { font-family:Arial, sans-serif; font-size:14px; fill:#4b5563; }
    .code { font-family:Menlo, Consolas, monospace; font-size:14px; fill:#1f2933; }
    .arrow { stroke:#345995; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>
  <text x="560" y="42" text-anchor="middle" class="text">标准搜索：先建小 joinrel，再建大 joinrel</text>

  <rect x="50" y="82" width="220" height="350" class="level"/>
  <text x="160" y="115" text-anchor="middle" class="text">Level 1</text>
  <rect x="90" y="145" width="70" height="48" class="rel"/><text x="125" y="175" text-anchor="middle" class="code">A</text>
  <rect x="170" y="145" width="70" height="48" class="rel"/><text x="205" y="175" text-anchor="middle" class="code">B</text>
  <rect x="90" y="215" width="70" height="48" class="rel"/><text x="125" y="245" text-anchor="middle" class="code">C</text>
  <rect x="170" y="215" width="70" height="48" class="rel"/><text x="205" y="245" text-anchor="middle" class="code">D</text>
  <text x="160" y="320" text-anchor="middle" class="small">每个 base rel 有多条 Path</text>
  <text x="160" y="345" text-anchor="middle" class="small">Seq / Index / Bitmap / Parallel</text>

  <rect x="330" y="82" width="250" height="350" class="level"/>
  <text x="455" y="115" text-anchor="middle" class="text">Level 2</text>
  <rect x="370" y="145" width="80" height="48" class="join"/><text x="410" y="175" text-anchor="middle" class="code">{A B}</text>
  <rect x="470" y="145" width="80" height="48" class="join"/><text x="510" y="175" text-anchor="middle" class="code">{B C}</text>
  <rect x="370" y="215" width="80" height="48" class="join"/><text x="410" y="245" text-anchor="middle" class="code">{C D}</text>
  <rect x="470" y="215" width="80" height="48" class="join"/><text x="510" y="245" text-anchor="middle" class="code">{A C}</text>
  <text x="455" y="320" text-anchor="middle" class="small">只保留未被支配的 Path</text>
  <text x="455" y="345" text-anchor="middle" class="small">NestLoop / Merge / Hash 竞争</text>

  <rect x="640" y="82" width="250" height="350" class="level"/>
  <text x="765" y="115" text-anchor="middle" class="text">Level 3+</text>
  <rect x="680" y="145" width="95" height="48" class="join"/><text x="728" y="175" text-anchor="middle" class="code">{A B C}</text>
  <rect x="785" y="145" width="95" height="48" class="join"/><text x="833" y="175" text-anchor="middle" class="code">{B C D}</text>
  <rect x="705" y="240" width="145" height="54" class="join"/><text x="778" y="273" text-anchor="middle" class="code">{A B C D}</text>
  <text x="765" y="345" text-anchor="middle" class="small">left / right / bushy plan</text>
  <text x="765" y="370" text-anchor="middle" class="small">同一集合共享 RelOptInfo</text>

  <rect x="930" y="155" width="150" height="160" class="geqo"/>
  <text x="1005" y="195" text-anchor="middle" class="text">GEQO</text>
  <text x="1005" y="225" text-anchor="middle" class="code">geqo_threshold</text>
  <text x="1005" y="255" text-anchor="middle" class="small">关系数过多时</text>
  <text x="1005" y="280" text-anchor="middle" class="small">用遗传搜索</text>

  <path d="M270 255 L330 255" class="arrow"/>
  <path d="M580 255 L640 255" class="arrow"/>
  <path d="M890 235 L930 235" class="arrow"/>
  <text x="560" y="495" text-anchor="middle" class="small">搜索空间太小会错过好计划，搜索空间太大会让规划时间爆炸；CBO 的工程核心是把候选集控制在可承受范围内。</text>
</svg>
