<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">学习型优化器在传统 CBO 旁边的位置</title>
  <desc id="desc">展示 Neo 这类端到端学习优化器与 Bao 这类 steering 方法和传统 CBO 的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345995"/>
    </marker>
  </defs>
  <style>
    .base { fill:#eff6ff; stroke:#2563eb; stroke-width:2; rx:10; }
    .learn { fill:#fef3c7; stroke:#b45309; stroke-width:2; rx:10; }
    .risk { fill:#fee2e2; stroke:#b91c1c; stroke-width:2; rx:10; }
    .text { font-family:Arial, sans-serif; font-size:18px; fill:#1f2933; }
    .small { font-family:Arial, sans-serif; font-size:14px; fill:#4b5563; }
    .code { font-family:Menlo, Consolas, monospace; font-size:14px; fill:#1f2933; }
    .arrow { stroke:#345995; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>
  <text x="560" y="42" text-anchor="middle" class="text">学习型优化器不是万能替代品，更常见的是补传统 CBO 的弱点</text>

  <rect x="60" y="120" width="250" height="190" class="base"/>
  <text x="185" y="158" text-anchor="middle" class="text">传统 CBO</text>
  <text x="185" y="190" text-anchor="middle" class="small">规则生成候选 Path</text>
  <text x="185" y="220" text-anchor="middle" class="small">统计信息估 rows</text>
  <text x="185" y="250" text-anchor="middle" class="small">代价模型选 cheapest</text>
  <text x="185" y="280" text-anchor="middle" class="code">PostgreSQL planner</text>

  <rect x="435" y="90" width="250" height="140" class="learn"/>
  <text x="560" y="128" text-anchor="middle" class="text">Neo 类方向</text>
  <text x="560" y="160" text-anchor="middle" class="small">学习生成或评分计划</text>
  <text x="560" y="190" text-anchor="middle" class="small">挑战：训练、泛化、解释</text>

  <rect x="435" y="290" width="250" height="140" class="learn"/>
  <text x="560" y="328" text-anchor="middle" class="text">Bao 类方向</text>
  <text x="560" y="360" text-anchor="middle" class="small">给传统优化器 hint</text>
  <text x="560" y="390" text-anchor="middle" class="small">用反馈学习何时 steering</text>

  <rect x="815" y="150" width="240" height="220" class="risk"/>
  <text x="935" y="188" text-anchor="middle" class="text">工程边界</text>
  <text x="935" y="222" text-anchor="middle" class="small">不能牺牲正确性</text>
  <text x="935" y="252" text-anchor="middle" class="small">需要失败兜底</text>
  <text x="935" y="282" text-anchor="middle" class="small">短查询怕规划开销</text>
  <text x="935" y="312" text-anchor="middle" class="small">数据漂移要持续校准</text>
  <text x="935" y="342" text-anchor="middle" class="small">DBA 需要可观测性</text>

  <path d="M310 210 L435 160" class="arrow"/>
  <path d="M310 230 L435 355" class="arrow"/>
  <path d="M685 160 L815 230" class="arrow"/>
  <path d="M685 360 L815 290" class="arrow"/>
  <text x="560" y="475" text-anchor="middle" class="small">实用路线通常不是“扔掉 CBO”，而是保留成熟的搜索与执行知识，用反馈修正代价、hint 或计划选择。</text>
</svg>
