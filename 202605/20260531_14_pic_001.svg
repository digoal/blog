<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">GEQO 触发位置</title>
  <desc id="desc">展示 PostgreSQL 优化器在 make_rel_from_joinlist 中根据 join_search_hook、geqo 和 geqo_threshold 选择 join 搜索算法。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .decision { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
    .geqo { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .normal { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 16px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="60" y="40" width="860" height="70" class="box"/>
  <text x="490" y="82" text-anchor="middle" class="text">query_planner / make_one_rel</text>
  <text x="490" y="104" text-anchor="middle" class="small">先生成 base relation 的扫描路径，再进入 join order 搜索</text>

  <path d="M490 110 L490 150" class="arrow"/>
  <rect x="270" y="150" width="440" height="72" class="box"/>
  <text x="490" y="192" text-anchor="middle" class="text">make_rel_from_joinlist()</text>
  <text x="490" y="214" text-anchor="middle" class="small">统计 joinlist 中需要搜索的 relation 数量</text>

  <path d="M490 222 L490 260" class="arrow"/>
  <path d="M490 260 L640 330 L490 400 L340 330 Z" class="decision"/>
  <text x="490" y="316" text-anchor="middle" class="text">如何搜索连接顺序？</text>
  <text x="490" y="343" text-anchor="middle" class="small">hook 优先，其次 GEQO 阈值</text>

  <path d="M340 330 L170 330 L170 420" class="arrow"/>
  <text x="250" y="316" text-anchor="middle" class="label">join_search_hook 存在</text>
  <rect x="55" y="420" width="230" height="64" class="box"/>
  <text x="170" y="458" text-anchor="middle" class="text">插件接管搜索</text>

  <path d="M490 400 L490 420" class="arrow"/>
  <text x="565" y="412" class="label">geqo=on 且 relation 数 &gt;= geqo_threshold</text>
  <rect x="350" y="420" width="280" height="64" class="geqo"/>
  <text x="490" y="458" text-anchor="middle" class="text">GEQO 随机启发式搜索</text>

  <path d="M640 330 L810 330 L810 420" class="arrow"/>
  <text x="733" y="316" text-anchor="middle" class="label">否则</text>
  <rect x="695" y="420" width="230" height="64" class="normal"/>
  <text x="810" y="458" text-anchor="middle" class="text">动态规划近穷举搜索</text>
</svg>
