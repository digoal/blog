<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">GEQO 染色体编码 join order</title>
  <desc id="desc">展示一个 join tree 如何被编码为整数序列，序列中的每个基因代表一个 base relation。</desc>
  <style>
    .rel { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .gene { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .join { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 16px; fill: #334155; }
    .line { stroke: #475569; stroke-width: 2; fill: none; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="60" y="48" class="text">四表连接的一个候选顺序</text>
  <text x="60" y="76" class="small">Gene 是整数，指向 initial_rels 中的第几个 relation；Chromosome 是完整整数串。</text>

  <circle cx="260" cy="170" r="24" class="join"/>
  <text x="260" y="177" text-anchor="middle" class="text">⋈</text>
  <circle cx="185" cy="260" r="24" class="join"/>
  <text x="185" y="267" text-anchor="middle" class="text">⋈</text>
  <circle cx="335" cy="260" r="24" class="join"/>
  <text x="335" y="267" text-anchor="middle" class="text">⋈</text>
  <rect x="90" y="360" width="90" height="54" class="rel"/>
  <text x="135" y="394" text-anchor="middle" class="text">R4</text>
  <rect x="210" y="360" width="90" height="54" class="rel"/>
  <text x="255" y="394" text-anchor="middle" class="text">R1</text>
  <rect x="330" y="360" width="90" height="54" class="rel"/>
  <text x="375" y="394" text-anchor="middle" class="text">R3</text>
  <rect x="450" y="360" width="90" height="54" class="rel"/>
  <text x="495" y="394" text-anchor="middle" class="text">R2</text>
  <path d="M260 194 L185 236" class="line"/>
  <path d="M260 194 L335 236" class="line"/>
  <path d="M185 284 L135 360" class="line"/>
  <path d="M185 284 L255 360" class="line"/>
  <path d="M335 284 L375 360" class="line"/>
  <path d="M335 284 L495 360" class="line"/>

  <path d="M580 270 L660 270" class="arrow"/>
  <text x="620" y="250" text-anchor="middle" class="small">编码</text>

  <rect x="690" y="205" width="70" height="70" class="gene"/>
  <rect x="770" y="205" width="70" height="70" class="gene"/>
  <rect x="850" y="205" width="70" height="70" class="gene"/>
  <rect x="690" y="300" width="70" height="70" class="gene"/>
  <text x="725" y="248" text-anchor="middle" class="text">4</text>
  <text x="805" y="248" text-anchor="middle" class="text">1</text>
  <text x="885" y="248" text-anchor="middle" class="text">3</text>
  <text x="725" y="343" text-anchor="middle" class="text">2</text>
  <text x="770" y="342" class="text">= 4-1-3-2</text>
  <text x="690" y="410" class="small">含义：先尝试把 R4、R1 合成 clump，</text>
  <text x="690" y="435" class="small">再按序加入 R3、R2；不合法或不理想的连接会被推迟。</text>
</svg>
