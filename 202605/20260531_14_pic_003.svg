<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">GEQO 遗传搜索循环</title>
  <desc id="desc">展示 PostgreSQL GEQO 的随机初始化、排序、父代选择、ERX 重组、评价、替换最差个体和返回最优 tour 的循环。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .green { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .orange { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .blue { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="60" y="55" width="230" height="72" class="box"/>
  <text x="175" y="86" text-anchor="middle" class="text">计算参数</text>
  <text x="175" y="112" text-anchor="middle" class="small">pool_size / generations</text>

  <rect x="375" y="55" width="230" height="72" class="box"/>
  <text x="490" y="86" text-anchor="middle" class="text">随机初始化种群</text>
  <text x="490" y="112" text-anchor="middle" class="small">init_tour + geqo_eval</text>

  <rect x="690" y="55" width="230" height="72" class="blue"/>
  <text x="805" y="86" text-anchor="middle" class="text">按 worth 排序</text>
  <text x="805" y="112" text-anchor="middle" class="small">成本越低越靠前</text>

  <path d="M290 91 L375 91" class="arrow"/>
  <path d="M605 91 L690 91" class="arrow"/>

  <rect x="690" y="210" width="230" height="72" class="green"/>
  <text x="805" y="241" text-anchor="middle" class="text">线性偏置选择父代</text>
  <text x="805" y="267" text-anchor="middle" class="small">geqo_selection_bias</text>

  <rect x="375" y="210" width="230" height="72" class="green"/>
  <text x="490" y="241" text-anchor="middle" class="text">ERX 重组生成子代</text>
  <text x="490" y="267" text-anchor="middle" class="small">默认 #define ERX</text>

  <rect x="60" y="210" width="230" height="72" class="orange"/>
  <text x="175" y="241" text-anchor="middle" class="text">评价子代成本</text>
  <text x="175" y="267" text-anchor="middle" class="small">gimme_tree + cheapest path</text>

  <path d="M805 127 L805 210" class="arrow"/>
  <path d="M690 246 L605 246" class="arrow"/>
  <path d="M375 246 L290 246" class="arrow"/>

  <rect x="60" y="365" width="230" height="72" class="blue"/>
  <text x="175" y="396" text-anchor="middle" class="text">插回种群</text>
  <text x="175" y="422" text-anchor="middle" class="small">若不差于最差个体则替换</text>

  <rect x="375" y="365" width="230" height="72" class="box"/>
  <text x="490" y="396" text-anchor="middle" class="text">循环 generations 次</text>
  <text x="490" y="422" text-anchor="middle" class="small">稳态 GA，不整代替换</text>

  <rect x="690" y="365" width="230" height="72" class="green"/>
  <text x="805" y="396" text-anchor="middle" class="text">返回 pool[0]</text>
  <text x="805" y="422" text-anchor="middle" class="small">用最佳 tour 生成最终 joinrel</text>

  <path d="M175 282 L175 365" class="arrow"/>
  <path d="M290 401 L375 401" class="arrow"/>
  <path d="M605 401 L690 401" class="arrow"/>
  <path d="M490 365 C490 320 805 320 805 282" class="arrow"/>
</svg>
