<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580" role="img" aria-labelledby="title desc">
  <title id="title">候选 join order 的评价路径</title>
  <desc id="desc">展示 geqo_eval 如何把一个 tour 转成 clump 合并、调用标准 planner 生成 join path，并用 cheapest_total_path 的 total_cost 作为 fitness。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .green { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .red { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .orange { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="70" y="45" width="260" height="70" class="box"/>
  <text x="200" y="76" text-anchor="middle" class="text">输入 tour</text>
  <text x="200" y="101" text-anchor="middle" class="small">例如 4-1-3-2</text>

  <rect x="420" y="45" width="260" height="70" class="box"/>
  <text x="550" y="76" text-anchor="middle" class="text">创建临时内存上下文</text>
  <text x="550" y="101" text-anchor="middle" class="small">每次评价后释放</text>
  <path d="M330 80 L420 80" class="arrow"/>

  <rect x="245" y="165" width="490" height="78" class="green"/>
  <text x="490" y="198" text-anchor="middle" class="text">gimme_tree：按 tour 扫描 relation，维护 clump 列表</text>
  <text x="490" y="224" text-anchor="middle" class="small">有 join clause 或 join order restriction 时优先合并</text>
  <path d="M550 115 L550 165" class="arrow"/>

  <rect x="70" y="305" width="260" height="78" class="orange"/>
  <text x="200" y="338" text-anchor="middle" class="text">make_join_rel()</text>
  <text x="200" y="364" text-anchor="middle" class="small">生成该连接的可行 path</text>

  <rect x="420" y="305" width="260" height="78" class="orange"/>
  <text x="550" y="338" text-anchor="middle" class="text">set_cheapest()</text>
  <text x="550" y="364" text-anchor="middle" class="small">为 joinrel 找 cheapest path</text>

  <rect x="720" y="305" width="190" height="78" class="red"/>
  <text x="815" y="338" text-anchor="middle" class="text">无法形成合法连接</text>
  <text x="815" y="364" text-anchor="middle" class="small">fitness = DBL_MAX</text>

  <path d="M390 243 C315 260 230 270 200 305" class="arrow"/>
  <path d="M490 243 L550 305" class="arrow"/>
  <path d="M610 243 C720 260 810 270 815 305" class="arrow"/>

  <rect x="245" y="445" width="490" height="78" class="green"/>
  <text x="490" y="478" text-anchor="middle" class="text">fitness = cheapest_total_path-&gt;total_cost</text>
  <text x="490" y="504" text-anchor="middle" class="small">GEQO 只搜索 join order，单步 scan/join path 仍由标准 planner 估价</text>
  <path d="M200 383 C240 430 320 445 390 445" class="arrow"/>
  <path d="M550 383 L520 445" class="arrow"/>
</svg>
