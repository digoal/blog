<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">GEQO 参数与权衡</title>
  <desc id="desc">展示 GEQO 参数如何影响规划时间、搜索覆盖、计划质量稳定性和人工调优风险。</desc>
  <style>
    .axis { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    .curve1 { stroke: #047857; stroke-width: 4; fill: none; }
    .curve2 { stroke: #c2410c; stroke-width: 4; fill: none; stroke-dasharray: 8 6; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .param { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; fill: #334155; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <line x1="75" y1="410" x2="455" y2="410" class="axis"/>
  <line x1="75" y1="410" x2="75" y2="85" class="axis"/>
  <text x="260" y="448" text-anchor="middle" class="small">搜索投入：pool_size / generations / effort</text>
  <text x="42" y="254" transform="rotate(-90 42 254)" text-anchor="middle" class="small">规划时间与搜索覆盖</text>
  <path d="M90 390 C150 345 210 285 280 205 C340 140 390 105 440 90" class="curve1"/>
  <path d="M90 385 C170 315 260 250 345 220 C390 205 420 200 445 198" class="curve2"/>
  <text x="270" y="160" class="small" fill="#047857">规划时间基本随评价次数增加</text>
  <text x="280" y="245" class="small" fill="#c2410c">计划质量提升概率递增但不保证</text>

  <rect x="540" y="70" width="360" height="72" class="param"/>
  <text x="720" y="101" text-anchor="middle" class="text">geqo_threshold</text>
  <text x="720" y="126" text-anchor="middle" class="small">决定从近穷举切换到 GEQO 的 relation 数</text>

  <rect x="540" y="172" width="360" height="72" class="param"/>
  <text x="720" y="203" text-anchor="middle" class="text">geqo_pool_size / geqo_generations</text>
  <text x="720" y="228" text-anchor="middle" class="small">直接决定种群规模和迭代次数</text>

  <rect x="540" y="274" width="360" height="72" class="param"/>
  <text x="720" y="305" text-anchor="middle" class="text">geqo_selection_bias / geqo_seed</text>
  <text x="720" y="330" text-anchor="middle" class="small">影响选择压力、随机路径与结果可复现性</text>

  <rect x="540" y="390" width="360" height="92" class="warn"/>
  <text x="720" y="421" text-anchor="middle" class="text">边界</text>
  <text x="720" y="448" text-anchor="middle" class="small">GEQO 是启发式搜索：降低规划爆炸，</text>
  <text x="720" y="471" text-anchor="middle" class="small">代价是可能错过更优连接顺序。</text>
</svg>
