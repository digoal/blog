<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">AQO 在 PostgreSQL 优化器中的位置</title>
  <desc id="desc">展示 SQL 进入 PostgreSQL planner 后，传统统计估算与 AQO 学习型基数估算如何影响 Path 成本和最终 Plan。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .core { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .learn { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #16a34a; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow-green); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="35" y="75" width="150" height="80" class="box"/>
  <text x="110" y="108" text-anchor="middle" class="text">SQL</text>
  <text x="110" y="134" text-anchor="middle" class="small">Query / queryId</text>

  <rect x="245" y="50" width="185" height="130" class="core"/>
  <text x="337" y="88" text-anchor="middle" class="text">planner</text>
  <text x="337" y="116" text-anchor="middle" class="small">生成 RelOptInfo</text>
  <text x="337" y="141" text-anchor="middle" class="small">生成候选 Path</text>

  <rect x="495" y="35" width="220" height="155" class="warn"/>
  <text x="605" y="72" text-anchor="middle" class="text">传统基数估算</text>
  <text x="605" y="102" text-anchor="middle" class="small">pg_class / pg_statistic</text>
  <text x="605" y="127" text-anchor="middle" class="small">选择率、扩展统计</text>
  <text x="605" y="152" text-anchor="middle" class="small">rows = tuples * selectivity</text>

  <rect x="495" y="250" width="220" height="155" class="learn"/>
  <text x="605" y="287" text-anchor="middle" class="text">AQO 基数估算</text>
  <text x="605" y="317" text-anchor="middle" class="small">planner hook</text>
  <text x="605" y="342" text-anchor="middle" class="small">特征子空间 + kNN</text>
  <text x="605" y="367" text-anchor="middle" class="small">执行反馈持续学习</text>

  <rect x="790" y="70" width="170" height="100" class="core"/>
  <text x="875" y="108" text-anchor="middle" class="text">Path cost</text>
  <text x="875" y="136" text-anchor="middle" class="small">rows 进入成本模型</text>

  <rect x="790" y="265" width="170" height="100" class="box"/>
  <text x="875" y="303" text-anchor="middle" class="text">Executor</text>
  <text x="875" y="331" text-anchor="middle" class="small">实际 rows / loops</text>

  <rect x="995" y="85" width="75" height="70" class="box"/>
  <text x="1032" y="116" text-anchor="middle" class="text">Plan</text>
  <text x="1032" y="139" text-anchor="middle" class="small">执行</text>

  <path d="M185 115 L245 115" class="arrow"/>
  <path d="M430 115 L495 115" class="arrow"/>
  <path d="M715 112 L790 112" class="arrow"/>
  <path d="M960 120 L995 120" class="arrow"/>
  <path d="M1032 155 C1032 235 970 315 960 315" class="arrow"/>
  <path d="M790 315 C735 315 735 328 715 328" class="dash"/>
  <path d="M605 250 C605 220 605 210 605 190" class="dash"/>
  <text x="690" y="236" text-anchor="middle" class="label">替换或补充 rows</text>
  <text x="745" y="302" text-anchor="middle" class="label">反馈学习</text>
  <text x="135" y="430" class="small">要点：AQO 不替代 join/path 搜索，也不直接生成执行计划；它把“执行后的真实行数”变成下一次规划时更可信的基数估计。</text>
</svg>
