<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">AQO 学习闭环</title>
  <desc id="desc">展示一次查询从预处理、规划期预测、执行期采集、后处理学习到下次使用模型的闭环。</desc>
  <style>
    .stage { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .green { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .orange { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #059669; stroke-width: 2.4; fill: none; marker-end: url(#arrow-green); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
  </defs>

  <rect x="50" y="70" width="180" height="100" class="stage"/>
  <text x="140" y="107" text-anchor="middle" class="text">1. 预处理</text>
  <text x="140" y="135" text-anchor="middle" class="small">query_hash</text>
  <text x="140" y="158" text-anchor="middle" class="small">mode / learn / use</text>

  <rect x="300" y="70" width="190" height="100" class="blue"/>
  <text x="395" y="107" text-anchor="middle" class="text">2. 规划期</text>
  <text x="395" y="135" text-anchor="middle" class="small">抽取 clauses</text>
  <text x="395" y="158" text-anchor="middle" class="small">计算 selectivities</text>

  <rect x="560" y="70" width="190" height="100" class="green"/>
  <text x="655" y="107" text-anchor="middle" class="text">3. ML 预测</text>
  <text x="655" y="135" text-anchor="middle" class="small">fspace / fss</text>
  <text x="655" y="158" text-anchor="middle" class="small">OkNNr_predict</text>

  <rect x="820" y="70" width="190" height="100" class="stage"/>
  <text x="915" y="107" text-anchor="middle" class="text">4. 选计划</text>
  <text x="915" y="135" text-anchor="middle" class="small">rows 影响 cost</text>
  <text x="915" y="158" text-anchor="middle" class="small">cheapest Path</text>

  <rect x="820" y="300" width="190" height="100" class="orange"/>
  <text x="915" y="337" text-anchor="middle" class="text">5. 执行期</text>
  <text x="915" y="365" text-anchor="middle" class="small">INSTRUMENT_ROWS</text>
  <text x="915" y="388" text-anchor="middle" class="small">actual rows / loops</text>

  <rect x="560" y="300" width="190" height="100" class="green"/>
  <text x="655" y="337" text-anchor="middle" class="text">6. 后处理学习</text>
  <text x="655" y="365" text-anchor="middle" class="small">target = log(actual)</text>
  <text x="655" y="388" text-anchor="middle" class="small">OkNNr_learn</text>

  <rect x="300" y="300" width="190" height="100" class="green"/>
  <text x="395" y="337" text-anchor="middle" class="text">7. 写入知识库</text>
  <text x="395" y="365" text-anchor="middle" class="small">aqo_data</text>
  <text x="395" y="388" text-anchor="middle" class="small">aqo_query_stat</text>

  <rect x="50" y="300" width="180" height="100" class="stage"/>
  <text x="140" y="337" text-anchor="middle" class="text">8. 下次查询</text>
  <text x="140" y="365" text-anchor="middle" class="small">同类 SQL</text>
  <text x="140" y="388" text-anchor="middle" class="small">复用模型</text>

  <path d="M230 120 L300 120" class="arrow"/>
  <path d="M490 120 L560 120" class="arrow"/>
  <path d="M750 120 L820 120" class="arrow"/>
  <path d="M915 170 L915 300" class="arrow"/>
  <path d="M820 350 L750 350" class="arrow"/>
  <path d="M560 350 L490 350" class="arrow"/>
  <path d="M300 350 L230 350" class="arrow"/>
  <path d="M140 300 C110 230 110 210 140 170" class="loop"/>

  <text x="92" y="485" class="small">要点：第一次学习可能不稳定；AQO 的收益来自重复、相似、基数误差大的查询模式，而不是一次性 SQL 的即时魔法。</text>
</svg>
