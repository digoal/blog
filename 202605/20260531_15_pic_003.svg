<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">AQO 特征空间与特征子空间</title>
  <desc id="desc">展示 query hash、feature space、feature subspace、clause hash、selectivity feature 和 target 的关系。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .fs { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .fss { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .data { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="45" y="55" width="220" height="120" class="box"/>
  <text x="155" y="92" text-anchor="middle" class="text">归一化查询</text>
  <text x="155" y="122" text-anchor="middle" class="small">常量被抽象</text>
  <text x="155" y="148" text-anchor="middle" class="small">query_hash</text>

  <rect x="340" y="55" width="230" height="120" class="fs"/>
  <text x="455" y="92" text-anchor="middle" class="text">Feature Space</text>
  <text x="455" y="122" text-anchor="middle" class="small">fs = query_hash</text>
  <text x="455" y="148" text-anchor="middle" class="small">或 fs = 0 COMMON</text>

  <rect x="655" y="35" width="370" height="185" class="fss"/>
  <text x="840" y="72" text-anchor="middle" class="text">Feature Subspace</text>
  <text x="840" y="102" text-anchor="middle" class="small">fss = hash(clauses, eclasses, relations)</text>
  <text x="840" y="132" text-anchor="middle" class="small">同一查询内：base rel、join rel、agg 可有不同 fss</text>
  <text x="840" y="162" text-anchor="middle" class="small">同一结构、不同常量：落到相同 fss</text>
  <text x="840" y="190" text-anchor="middle" class="tiny">hash.c: get_fss_for_object()</text>

  <rect x="90" y="310" width="215" height="125" class="box"/>
  <text x="197" y="347" text-anchor="middle" class="text">谓词结构</text>
  <text x="197" y="377" text-anchor="middle" class="small">clause_hash</text>
  <text x="197" y="403" text-anchor="middle" class="small">等价类 eclass</text>

  <rect x="380" y="310" width="215" height="125" class="data"/>
  <text x="487" y="347" text-anchor="middle" class="text">特征向量 X</text>
  <text x="487" y="377" text-anchor="middle" class="small">log(selectivity)</text>
  <text x="487" y="403" text-anchor="middle" class="small">下限截断</text>

  <rect x="670" y="310" width="215" height="125" class="data"/>
  <text x="777" y="347" text-anchor="middle" class="text">训练目标 y</text>
  <text x="777" y="377" text-anchor="middle" class="small">log(actual rows)</text>
  <text x="777" y="403" text-anchor="middle" class="small">来自执行器统计</text>

  <path d="M265 115 L340 115" class="arrow"/>
  <path d="M570 115 L655 115" class="arrow"/>
  <path d="M305 372 L380 372" class="arrow"/>
  <path d="M595 372 L670 372" class="arrow"/>
  <path d="M840 220 C835 260 790 282 777 310" class="arrow"/>
  <path d="M840 220 C750 255 540 260 487 310" class="arrow"/>

  <text x="82" y="505" class="small">要点：AQO 学的不是“这条 SQL 应该用某个固定计划”，而是在具体关系集合和谓词结构下，选择率特征到真实输出行数的映射。</text>
</svg>
