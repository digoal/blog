<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">OkNN 回归器的预测与学习</title>
  <desc id="desc">展示 AQO 使用有限样本矩阵、k 个近邻、距离权重、平滑更新来预测 log cardinality。</desc>
  <style>
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .point { fill: #2563eb; stroke: #1e3a8a; stroke-width: 1.5; }
    .near { fill: #f97316; stroke: #9a3412; stroke-width: 2; }
    .new { fill: #16a34a; stroke: #166534; stroke-width: 2; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
    .axis { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    .link { stroke: #f97316; stroke-width: 2; stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="45" y="40" width="600" height="430" class="panel"/>
  <text x="345" y="78" text-anchor="middle" class="text">特征空间中的 kNN 预测</text>
  <line x1="115" y1="395" x2="560" y2="395" class="axis"/>
  <line x1="115" y1="395" x2="115" y2="115" class="axis"/>
  <text x="548" y="426" class="tiny">log(sel_1)</text>
  <text x="55" y="125" class="tiny">log(sel_2)</text>

  <circle cx="205" cy="315" r="8" class="point"/>
  <circle cx="255" cy="245" r="8" class="point"/>
  <circle cx="310" cy="305" r="8" class="near"/>
  <circle cx="355" cy="260" r="8" class="near"/>
  <circle cx="410" cy="215" r="8" class="near"/>
  <circle cx="505" cy="155" r="8" class="point"/>
  <circle cx="455" cy="340" r="8" class="point"/>
  <circle cx="365" cy="300" r="10" class="new"/>
  <line x1="365" y1="300" x2="310" y2="305" class="link"/>
  <line x1="365" y1="300" x2="355" y2="260" class="link"/>
  <line x1="365" y1="300" x2="410" y2="215" class="link"/>
  <text x="385" y="296" class="small">新样本 X</text>
  <text x="230" y="445" class="small">距离越近，权重 1 / (0.001 + distance) 越大</text>

  <rect x="700" y="55" width="340" height="105" class="panel"/>
  <text x="870" y="92" text-anchor="middle" class="text">预测</text>
  <text x="870" y="122" text-anchor="middle" class="small">y_hat = 加权平均近邻 targets</text>
  <text x="870" y="145" text-anchor="middle" class="small">rows_hat = exp(y_hat)</text>

  <rect x="700" y="205" width="340" height="115" class="panel"/>
  <text x="870" y="242" text-anchor="middle" class="text">学习</text>
  <text x="870" y="272" text-anchor="middle" class="small">新样本太近：平滑更新已有行</text>
  <text x="870" y="295" text-anchor="middle" class="small">样本未满：追加一行</text>

  <rect x="700" y="365" width="340" height="115" class="panel"/>
  <text x="870" y="402" text-anchor="middle" class="text">边界</text>
  <text x="870" y="432" text-anchor="middle" class="small">样本数受 aqo_K 限制</text>
  <text x="870" y="455" text-anchor="middle" class="small">样本太少可拒绝预测</text>

  <text x="78" y="520" class="small">要点：AQO 的 ML 核心很朴素，优势是可增量、低开销、可解释；代价是只能在相似 workload 上泛化，遇到结构漂移要重新学习。</text>
</svg>
