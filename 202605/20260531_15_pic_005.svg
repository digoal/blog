<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">AQO 模式与生产边界</title>
  <desc id="desc">比较 disabled、controlled、learn、intelligent、forced、frozen 六种 AQO 模式的学习和使用行为。</desc>
  <style>
    .head { fill: #0f172a; }
    .row1 { fill: #f8fafc; }
    .row2 { fill: #eef2ff; }
    .grid { stroke: #cbd5e1; stroke-width: 1.4; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .white { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #ffffff; font-weight: 700; }
    .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 6; }
    .warn { fill: #ffedd5; stroke: #f97316; stroke-width: 1.5; rx: 6; }
    .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; rx: 6; }
  </style>

  <rect x="55" y="55" width="990" height="52" class="head"/>
  <text x="105" y="88" class="white">模式</text>
  <text x="245" y="88" class="white">未知查询</text>
  <text x="430" y="88" class="white">使用 AQO</text>
  <text x="590" y="88" class="white">学习</text>
  <text x="735" y="88" class="white">适合用途</text>
  <text x="940" y="88" class="white">主要风险</text>

  <g>
    <rect x="55" y="107" width="990" height="62" class="row1"/>
    <rect x="55" y="169" width="990" height="62" class="row2"/>
    <rect x="55" y="231" width="990" height="62" class="row1"/>
    <rect x="55" y="293" width="990" height="62" class="row2"/>
    <rect x="55" y="355" width="990" height="62" class="row1"/>
    <rect x="55" y="417" width="990" height="62" class="row2"/>
  </g>

  <g class="grid">
    <line x1="170" y1="55" x2="170" y2="479"/>
    <line x1="355" y1="55" x2="355" y2="479"/>
    <line x1="520" y1="55" x2="520" y2="479"/>
    <line x1="655" y1="55" x2="655" y2="479"/>
    <line x1="850" y1="55" x2="850" y2="479"/>
    <line x1="55" y1="107" x2="1045" y2="107"/>
    <line x1="55" y1="169" x2="1045" y2="169"/>
    <line x1="55" y1="231" x2="1045" y2="231"/>
    <line x1="55" y1="293" x2="1045" y2="293"/>
    <line x1="55" y1="355" x2="1045" y2="355"/>
    <line x1="55" y1="417" x2="1045" y2="417"/>
    <line x1="55" y1="479" x2="1045" y2="479"/>
    <rect x="55" y="55" width="990" height="424" fill="none"/>
  </g>

  <text x="82" y="144" class="text">disabled</text>
  <text x="205" y="144" class="small">忽略</text>
  <text x="405" y="144" class="small">否</text>
  <text x="575" y="144" class="small">否</text>
  <text x="692" y="135" class="small">临时关停</text>
  <text x="692" y="157" class="small">保留已有数据</text>
  <text x="884" y="144" class="small">无自适应收益</text>

  <text x="82" y="206" class="text">controlled</text>
  <text x="205" y="206" class="small">忽略</text>
  <text x="390" y="206" class="small">仅已登记</text>
  <text x="560" y="206" class="small">按配置</text>
  <text x="692" y="197" class="small">生产默认</text>
  <text x="692" y="219" class="small">白名单治理</text>
  <text x="884" y="206" class="small">需人工选择查询</text>

  <text x="82" y="268" class="text">learn</text>
  <text x="205" y="259" class="small">登记新 query</text>
  <text x="205" y="281" class="small">fs=queryid</text>
  <text x="405" y="268" class="small">是</text>
  <text x="575" y="268" class="small">是</text>
  <text x="692" y="259" class="small">离线训练</text>
  <text x="692" y="281" class="small">固定 SQL 模板</text>
  <text x="884" y="259" class="small">全库常开会膨胀</text>
  <text x="884" y="281" class="small">且可能变慢</text>

  <text x="82" y="330" class="text">intelligent</text>
  <text x="205" y="321" class="small">登记新 query</text>
  <text x="205" y="343" class="small">启用自调优</text>
  <text x="405" y="330" class="small">探索后决定</text>
  <text x="575" y="330" class="small">探索期是</text>
  <text x="692" y="321" class="small">实验环境</text>
  <text x="692" y="343" class="small">自动筛选候选</text>
  <text x="884" y="321" class="small">不推荐生产盲开</text>
  <text x="884" y="343" class="small">决策有噪声</text>

  <text x="82" y="392" class="text">forced</text>
  <text x="205" y="383" class="small">不登记</text>
  <text x="205" y="405" class="small">fs=0 COMMON</text>
  <text x="405" y="392" class="small">是</text>
  <text x="575" y="392" class="small">是</text>
  <text x="692" y="383" class="small">动态 SQL</text>
  <text x="692" y="405" class="small">低内存试验</text>
  <text x="884" y="383" class="small">不同查询互相污染</text>
  <text x="884" y="405" class="small">无性能保证</text>

  <text x="82" y="454" class="text">frozen</text>
  <text x="205" y="454" class="small">忽略</text>
  <text x="390" y="454" class="small">仅已知查询</text>
  <text x="575" y="454" class="small">否</text>
  <text x="692" y="445" class="small">冻结已收敛模型</text>
  <text x="692" y="467" class="small">变更窗口后使用</text>
  <text x="884" y="445" class="small">数据分布变化后</text>
  <text x="884" y="467" class="small">模型会过期</text>

  <text x="72" y="525" class="small">要点：生产上优先 controlled + 查询白名单；learn/intelligent/forced 更适合训练、验证或受控实验，不能替代常规统计信息和 SQL 诊断。</text>
</svg>
