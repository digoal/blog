<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL query rewrite 与 planner preprocessing 的位置</title>
  <desc id="desc">展示 SQL 从解析、规则重写、预处理、路径搜索到执行计划的主要阶段，以及每阶段处理的改写类型。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f5f7f"/>
    </marker>
  </defs>
  <rect width="1120" height="520" fill="#f7f8fa"/>
  <text x="560" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#203040">一条 SQL 被改写的两层边界</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="60" y="105" width="150" height="82" rx="8" fill="#ffffff" stroke="#54708f" stroke-width="2"/>
    <text x="135" y="139" text-anchor="middle" fill="#203040">SQL 文本</text>
    <text x="135" y="166" text-anchor="middle" font-size="14" fill="#5d6d7e">用户写法</text>

    <rect x="270" y="105" width="170" height="82" rx="8" fill="#ffffff" stroke="#54708f" stroke-width="2"/>
    <text x="355" y="133" text-anchor="middle" fill="#203040">Parser / Analyze</text>
    <text x="355" y="161" text-anchor="middle" font-size="14" fill="#5d6d7e">生成 Query tree</text>

    <rect x="500" y="92" width="190" height="108" rx="8" fill="#e8f2ff" stroke="#2d669f" stroke-width="2"/>
    <text x="595" y="124" text-anchor="middle" fill="#203040">QueryRewrite()</text>
    <text x="595" y="153" text-anchor="middle" font-size="14" fill="#3f5f7f">规则、视图、RLS</text>
    <text x="595" y="176" text-anchor="middle" font-size="14" fill="#3f5f7f">0..N 个 Query tree</text>

    <rect x="750" y="92" width="210" height="108" rx="8" fill="#e9f6ee" stroke="#3b7a57" stroke-width="2"/>
    <text x="855" y="124" text-anchor="middle" fill="#203040">Planner preprocessing</text>
    <text x="855" y="153" text-anchor="middle" font-size="14" fill="#3b7a57">SubLink / 子查询拉起</text>
    <text x="855" y="176" text-anchor="middle" font-size="14" fill="#3b7a57">外连接降级、连接消除</text>

    <rect x="450" y="320" width="220" height="104" rx="8" fill="#fff7e6" stroke="#9a6b22" stroke-width="2"/>
    <text x="560" y="354" text-anchor="middle" fill="#203040">Path / cost search</text>
    <text x="560" y="382" text-anchor="middle" font-size="14" fill="#7b5a2a">RelOptInfo / Path</text>
    <text x="560" y="405" text-anchor="middle" font-size="14" fill="#7b5a2a">选择 cheapest path</text>

    <rect x="730" y="320" width="170" height="104" rx="8" fill="#ffffff" stroke="#54708f" stroke-width="2"/>
    <text x="815" y="359" text-anchor="middle" fill="#203040">Plan tree</text>
    <text x="815" y="390" text-anchor="middle" font-size="14" fill="#5d6d7e">交给 executor</text>
  </g>
  <g stroke="#3f5f7f" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M210 146 H270"/>
    <path d="M440 146 H500"/>
    <path d="M690 146 H750"/>
    <path d="M855 200 C855 270 670 270 610 320"/>
    <path d="M670 372 H730"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#4b5d70">
    <rect x="74" y="246" width="300" height="132" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="94" y="280">规则重写回答：</text>
    <text x="94" y="308">“这棵查询树要不要替换、展开、复制？”</text>
    <text x="94" y="336">例：视图 _RETURN 规则展开成子查询。</text>

    <rect x="730" y="246" width="320" height="132" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="750" y="280">优化器预处理回答：</text>
    <text x="750" y="308">“等价语义下，怎样暴露更多搜索空间？”</text>
    <text x="750" y="336">例：EXISTS 改成 semi join，LEFT JOIN 降级。</text>
  </g>
</svg>
