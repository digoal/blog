<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">视图与规则系统如何展开查询</title>
  <desc id="desc">展示普通视图通过 pg_rewrite 中的 ON SELECT 规则被替换为子查询，并保留权限、行安全和可更新视图处理边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4c6b82"/>
    </marker>
  </defs>
  <rect width="1120" height="540" fill="#fbfcfd"/>
  <text x="560" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#203040">规则系统：把“名字”替换成可规划的 Query tree</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="95" width="290" height="120" rx="8" fill="#ffffff" stroke="#54708f" stroke-width="2"/>
    <text x="215" y="130" text-anchor="middle" font-size="18" fill="#203040">用户查询</text>
    <text x="95" y="164" font-size="15" fill="#425466">SELECT ... FROM v_order_summary</text>
    <text x="95" y="190" font-size="15" fill="#425466">WHERE total_amt &gt; 1000</text>

    <rect x="430" y="80" width="260" height="150" rx="8" fill="#e8f2ff" stroke="#2d669f" stroke-width="2"/>
    <text x="560" y="116" text-anchor="middle" font-size="18" fill="#203040">pg_rewrite / _RETURN</text>
    <text x="455" y="150" font-size="15" fill="#3f5f7f">ON SELECT DO INSTEAD</text>
    <text x="455" y="176" font-size="15" fill="#3f5f7f">SELECT cust_id, sum(...) ...</text>
    <text x="455" y="202" font-size="15" fill="#3f5f7f">规则动作本身也是 Query tree</text>

    <rect x="760" y="95" width="290" height="120" rx="8" fill="#e9f6ee" stroke="#3b7a57" stroke-width="2"/>
    <text x="905" y="130" text-anchor="middle" font-size="18" fill="#203040">重写结果</text>
    <text x="785" y="164" font-size="15" fill="#3b6048">FROM (SELECT ... GROUP BY ...) v</text>
    <text x="785" y="190" font-size="15" fill="#3b6048">WHERE v.total_amt &gt; 1000</text>
  </g>
  <g stroke="#4c6b82" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M360 155 H430"/>
    <path d="M690 155 H760"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#425466">
    <rect x="80" y="295" width="286" height="142" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="105" y="327" font-size="17" fill="#203040">SELECT 规则</text>
    <text x="105" y="358">fireRIRrules() 递归扫描 rangetable</text>
    <text x="105" y="384">ApplyRetrieveRule() 展开 ON SELECT</text>
    <text x="105" y="410">检测递归，避免无限视图套视图</text>

    <rect x="418" y="295" width="286" height="142" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="443" y="327" font-size="17" fill="#203040">非 SELECT 规则</text>
    <text x="443" y="358">INSERT / UPDATE / DELETE / MERGE</text>
    <text x="443" y="384">可能改写成 0、1 或多条查询</text>
    <text x="443" y="410">CTE、多语句规则有额外限制</text>

    <rect x="756" y="295" width="286" height="142" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="781" y="327" font-size="17" fill="#203040">物化视图边界</text>
    <text x="781" y="358">普通查询引用 matview 时当表扫描</text>
    <text x="781" y="384">不会自动把查询匹配到 matview</text>
    <text x="781" y="410">REFRESH 是维护，不是透明改写</text>
  </g>
</svg>
