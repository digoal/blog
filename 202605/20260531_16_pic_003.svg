<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">子查询拉起与半连接改写</title>
  <desc id="desc">展示 PostgreSQL 将顶层 WHERE 或 JOIN ON 中的 EXISTS/ANY 子查询改写为 semi join 或 anti join 的过程和限制。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f5f7f"/>
    </marker>
  </defs>
  <rect width="1120" height="560" fill="#f7f8fa"/>
  <text x="560" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#203040">SubLink 拉起：从逐行相关判断到 join 搜索空间</text>
  <g font-family="Arial, sans-serif">
    <rect x="65" y="90" width="420" height="170" rx="8" fill="#ffffff" stroke="#54708f" stroke-width="2"/>
    <text x="275" y="126" text-anchor="middle" font-size="19" fill="#203040">原始写法</text>
    <text x="95" y="162" font-size="15" fill="#425466">SELECT * FROM orders o</text>
    <text x="95" y="188" font-size="15" fill="#425466">WHERE EXISTS (</text>
    <text x="125" y="214" font-size="15" fill="#425466">SELECT 1 FROM payments p</text>
    <text x="125" y="240" font-size="15" fill="#425466">WHERE p.order_id = o.id)</text>

    <rect x="635" y="90" width="420" height="170" rx="8" fill="#e9f6ee" stroke="#3b7a57" stroke-width="2"/>
    <text x="845" y="126" text-anchor="middle" font-size="19" fill="#203040">改写后的逻辑形态</text>
    <text x="665" y="162" font-size="15" fill="#3b6048">orders o SEMI JOIN payments p</text>
    <text x="665" y="188" font-size="15" fill="#3b6048">ON p.order_id = o.id</text>
    <text x="665" y="222" font-size="15" fill="#3b6048">只保留 o 的列，不复制匹配行</text>
  </g>
  <path d="M495 175 H625" stroke="#3f5f7f" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="85" y="340" width="230" height="126" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="110" y="372" font-size="17" fill="#203040">可拉起</text>
    <text x="110" y="402" fill="#425466">顶层 WHERE / JOIN ON</text>
    <text x="110" y="428" fill="#425466">ANY、EXISTS、NOT EXISTS</text>
    <text x="110" y="454" fill="#425466">NULL 语义可保持</text>

    <rect x="445" y="340" width="230" height="126" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="470" y="372" font-size="17" fill="#203040">改写收益</text>
    <text x="470" y="402" fill="#425466">进入 join order 搜索</text>
    <text x="470" y="428" fill="#425466">可选 hash / merge / nested loop</text>
    <text x="470" y="454" fill="#425466">可使用索引和统计信息</text>

    <rect x="805" y="340" width="230" height="126" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="830" y="372" font-size="17" fill="#203040">不能乱改</text>
    <text x="830" y="402" fill="#425466">非顶层表达式可能受 NULL 影响</text>
    <text x="830" y="428" fill="#425466">外连接 nullable 边有约束</text>
    <text x="830" y="454" fill="#425466">NOT IN 需要更谨慎</text>
  </g>
  <g stroke="#3f5f7f" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M275 260 C275 300 200 300 200 340"/>
    <path d="M560 260 V340"/>
    <path d="M845 260 C845 300 920 300 920 340"/>
  </g>
</svg>
