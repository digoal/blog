<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">外连接降级与无用连接消除</title>
  <desc id="desc">展示 PostgreSQL 如何利用严格条件、唯一性和未引用列判断将外连接降级为内连接或移除无用左连接。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f5f7f"/>
    </marker>
  </defs>
  <rect width="1120" height="560" fill="#fbfcfd"/>
  <text x="560" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#203040">外连接改写：语义证明优先于代价估算</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="92" width="440" height="150" rx="8" fill="#ffffff" stroke="#54708f" stroke-width="2"/>
    <text x="290" y="128" text-anchor="middle" font-size="18" fill="#203040">LEFT JOIN + nullable 边严格过滤</text>
    <text x="100" y="164" font-size="15" fill="#425466">FROM customer c LEFT JOIN orders o ON o.c_id = c.id</text>
    <text x="100" y="194" font-size="15" fill="#425466">WHERE o.status = 'paid'</text>
    <text x="100" y="222" font-size="14" fill="#6c7784">o.status 为 NULL 时严格条件不通过</text>

    <rect x="610" y="92" width="440" height="150" rx="8" fill="#e9f6ee" stroke="#3b7a57" stroke-width="2"/>
    <text x="830" y="128" text-anchor="middle" font-size="18" fill="#203040">可降级为 INNER JOIN</text>
    <text x="640" y="164" font-size="15" fill="#3b6048">FROM customer c JOIN orders o ON o.c_id = c.id</text>
    <text x="640" y="194" font-size="15" fill="#3b6048">WHERE o.status = 'paid'</text>
    <text x="640" y="222" font-size="14" fill="#5c735f">减少 null-extended row，放开 join reorder 空间</text>
  </g>
  <path d="M520 167 H600" stroke="#3f5f7f" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="80" y="330" width="300" height="135" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="105" y="363" font-size="17" fill="#203040">reduce_outer_joins()</text>
    <text x="105" y="393" fill="#425466">严格 qual 证明 nullable 行会被过滤</text>
    <text x="105" y="419" fill="#425466">FULL JOIN 可按边分别降级</text>
    <text x="105" y="445" fill="#425466">LEFT + IS NULL 可变 anti join</text>

    <rect x="410" y="330" width="300" height="135" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="435" y="363" font-size="17" fill="#203040">remove_useless_joins()</text>
    <text x="435" y="393" fill="#425466">右侧列未被上层使用</text>
    <text x="435" y="419" fill="#425466">右侧在连接键上可证明唯一</text>
    <text x="435" y="445" fill="#425466">删除无结果贡献的 LEFT JOIN</text>

    <rect x="740" y="330" width="300" height="135" rx="8" fill="#ffffff" stroke="#d5dde6"/>
    <text x="765" y="363" font-size="17" fill="#203040">不能只看代价</text>
    <text x="765" y="393" fill="#425466">外连接 ON 与 WHERE 不等价</text>
    <text x="765" y="419" fill="#425466">NULL、重复行、权限边界会改变语义</text>
    <text x="765" y="445" fill="#425466">先证明等价，再进入 cost search</text>
  </g>
</svg>
