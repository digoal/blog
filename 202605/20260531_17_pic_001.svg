<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">你的钱到底流向哪里？</text>

  <!-- 投资者 -->
  <rect x="30" y="60" width="120" height="60" rx="10" fill="#e8f4fd" stroke="#1565c0" stroke-width="2"/>
  <text x="90" y="85" text-anchor="middle" font-size="15" fill="#1565c0">👤 你</text>
  <text x="90" y="105" text-anchor="middle" font-size="12" fill="#1565c0">（投资者）</text>

  <!-- 银行存款路径 -->
  <line x1="155" y1="90" x2="230" y2="90" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow_blue)"/>
  <rect x="230" y="60" width="130" height="60" rx="10" fill="#e8f4fd" stroke="#1565c0" stroke-width="2"/>
  <text x="295" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">🏦 银行存款</text>
  <text x="295" y="100" text-anchor="middle" font-size="11" fill="#1565c0">银行直接借你的钱</text>
  <text x="295" y="114" text-anchor="middle" font-size="11" fill="#1565c0">用于放贷赚利差</text>
  <text x="190" y="82" text-anchor="middle" font-size="10" fill="#1565c0">钱</text>

  <!-- 存款保险 -->
  <rect x="230" y="138" width="130" height="38" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="295" y="153" text-anchor="middle" font-size="11" fill="#1565c0">✅ 存款保险制度</text>
  <text x="295" y="168" text-anchor="middle" font-size="11" fill="#1565c0">50万内国家兜底</text>
  <line x1="295" y1="120" x2="295" y2="138" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- 银行理财路径 -->
  <line x1="155" y1="140" x2="230" y2="200" stroke="#e65100" stroke-width="2" marker-end="url(#arrow_orange)"/>
  <rect x="230" y="185" width="130" height="60" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="295" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">🏛 银行理财</text>
  <text x="295" y="225" text-anchor="middle" font-size="11" fill="#e65100">理财子公司管理</text>
  <text x="295" y="240" text-anchor="middle" font-size="11" fill="#e65100">投资多类资产</text>

  <line x1="360" y1="215" x2="430" y2="215" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow_orange)"/>
  <rect x="430" y="196" width="110" height="38" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="485" y="213" text-anchor="middle" font-size="11" fill="#e65100">债券、货币市场</text>
  <text x="485" y="228" text-anchor="middle" font-size="11" fill="#e65100">非标资产（不同比例）</text>

  <rect x="430" y="244" width="110" height="32" rx="6" fill="#ffccbc" stroke="#e65100" stroke-width="1"/>
  <text x="485" y="258" text-anchor="middle" font-size="11" fill="#bf360c">⚠️ 不保本</text>
  <text x="485" y="272" text-anchor="middle" font-size="11" fill="#bf360c">亏损自担</text>

  <!-- 基金路径 -->
  <line x1="155" y1="90" x2="540" y2="90" stroke="#2e7d32" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow_green)"/>
  <rect x="540" y="60" width="130" height="60" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="605" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">📦 基金</text>
  <text x="605" y="100" text-anchor="middle" font-size="11" fill="#2e7d32">基金公司+托管银行</text>
  <text x="605" y="114" text-anchor="middle" font-size="11" fill="#2e7d32">持有人利益保护</text>
  <text x="460" y="82" text-anchor="middle" font-size="10" fill="#2e7d32">钱（独立账户）</text>

  <!-- 基金细分 -->
  <line x1="605" y1="120" x2="605" y2="145" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="540" y1="145" x2="680" y2="145" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="545" y1="145" x2="545" y2="165" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="605" y1="145" x2="605" y2="165" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="675" y1="145" x2="675" y2="165" stroke="#2e7d32" stroke-width="1.5"/>

  <rect x="495" y="165" width="100" height="50" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="545" y="185" text-anchor="middle" font-size="12" fill="#2e7d32">货币基金</text>
  <text x="545" y="200" text-anchor="middle" font-size="11" fill="#2e7d32">极低风险</text>
  <text x="545" y="213" text-anchor="middle" font-size="11" fill="#2e7d32">约1.8~2.2%</text>

  <rect x="557" y="165" width="100" height="50" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1"/>
  <text x="607" y="185" text-anchor="middle" font-size="12" fill="#f57f17">债券基金</text>
  <text x="607" y="200" text-anchor="middle" font-size="11" fill="#f57f17">中低风险</text>
  <text x="607" y="213" text-anchor="middle" font-size="11" fill="#f57f17">约2~6%</text>

  <rect x="619" y="165" width="100" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="669" y="185" text-anchor="middle" font-size="12" fill="#c62828">股票基金</text>
  <text x="669" y="200" text-anchor="middle" font-size="11" fill="#c62828">高风险</text>
  <text x="669" y="213" text-anchor="middle" font-size="11" fill="#c62828">-30%~+50%</text>

  <!-- 关键差异标注 -->
  <rect x="30" y="270" width="740" height="72" rx="8" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">🔑 最关键的差异</text>
  <text x="205" y="314" text-anchor="middle" font-size="12" fill="#4a148c">存款：银行欠你的债</text>
  <text x="205" y="332" text-anchor="middle" font-size="11" fill="#6a1b9a">银行破产有保险兜底</text>
  <text x="400" y="314" text-anchor="middle" font-size="12" fill="#4a148c">银行理财：拿你钱去投资</text>
  <text x="400" y="332" text-anchor="middle" font-size="11" fill="#6a1b9a">亏了是你的损失</text>
  <text x="595" y="314" text-anchor="middle" font-size="12" fill="#4a148c">基金：专业机构替你投资</text>
  <text x="595" y="332" text-anchor="middle" font-size="11" fill="#6a1b9a">你的钱独立托管，机构倒闭不影响</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow_blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow_orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
    <marker id="arrow_green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>
</svg>
