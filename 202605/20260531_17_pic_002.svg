<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">三类产品核心对比</text>

  <!-- 列标题 -->
  <rect x="30" y="55" width="220" height="44" fill="#e8f4fd" rx="8"/>
  <rect x="270" y="55" width="220" height="44" fill="#fff3e0" rx="8"/>
  <rect x="510" y="55" width="260" height="44" fill="#e8f5e9" rx="8"/>

  <text x="140" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">🏦 银行存款</text>
  <text x="140" y="91" text-anchor="middle" font-size="12" fill="#1565c0">（定期/活期）</text>
  <text x="380" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">🏛 银行理财</text>
  <text x="380" y="91" text-anchor="middle" font-size="12" fill="#e65100">（净值型/预期收益型）</text>
  <text x="640" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">📦 基金</text>
  <text x="640" y="91" text-anchor="middle" font-size="12" fill="#2e7d32">（货币/债券/股票）</text>

  <!-- 行数据 -->
  <!-- 行1：保本性 -->
  <rect x="10" y="108" width="780" height="42" fill="#ffffff" rx="4"/>
  <text x="20" y="125" font-size="12" fill="#555" font-weight="bold">保本性</text>
  <text x="20" y="143" font-size="11" fill="#777">本金安全</text>
  <text x="140" y="134" text-anchor="middle" font-size="13" fill="#1565c0">✅ 存款保险保障</text>
  <text x="140" y="148" text-anchor="middle" font-size="11" fill="#777">（50万内全额）</text>
  <text x="380" y="134" text-anchor="middle" font-size="13" fill="#e65100">⚠️ 不保本</text>
  <text x="380" y="148" text-anchor="middle" font-size="11" fill="#777">（2018年后已打破刚兑）</text>
  <text x="640" y="134" text-anchor="middle" font-size="13" fill="#2e7d32">❌ 不保本</text>
  <text x="640" y="148" text-anchor="middle" font-size="11" fill="#777">（货基极低风险，其余看类型）</text>

  <!-- 行2：收益性 -->
  <rect x="10" y="152" width="780" height="42" fill="#f8f9fa" rx="4"/>
  <text x="20" y="170" font-size="12" fill="#555" font-weight="bold">预期收益</text>
  <text x="20" y="186" font-size="11" fill="#777">大致范围</text>
  <text x="140" y="172" text-anchor="middle" font-size="13" fill="#1565c0">1.5%~2.5%/年</text>
  <text x="140" y="188" text-anchor="middle" font-size="11" fill="#777">（利率下行中持续走低）</text>
  <text x="380" y="172" text-anchor="middle" font-size="13" fill="#e65100">2.5%~3.5%/年</text>
  <text x="380" y="188" text-anchor="middle" font-size="11" fill="#777">（不保证，有波动）</text>
  <text x="640" y="172" text-anchor="middle" font-size="13" fill="#2e7d32">2%~15%+</text>
  <text x="640" y="188" text-anchor="middle" font-size="11" fill="#777">（差别极大，与风险正相关）</text>

  <!-- 行3：流动性 -->
  <rect x="10" y="196" width="780" height="42" fill="#ffffff" rx="4"/>
  <text x="20" y="214" font-size="12" fill="#555" font-weight="bold">流动性</text>
  <text x="20" y="230" font-size="11" fill="#777">能否随时取</text>
  <text x="140" y="214" text-anchor="middle" font-size="13" fill="#1565c0">活期随取，定期有违约金</text>
  <text x="380" y="214" text-anchor="middle" font-size="13" fill="#e65100">多数有封闭期（1月~3年）</text>
  <text x="640" y="214" text-anchor="middle" font-size="13" fill="#2e7d32">货基T+1，其余T+3左右</text>

  <!-- 行4：起购门槛 -->
  <rect x="10" y="240" width="780" height="42" fill="#f8f9fa" rx="4"/>
  <text x="20" y="258" font-size="12" fill="#555" font-weight="bold">起购门槛</text>
  <text x="20" y="274" font-size="11" fill="#777">最低投入</text>
  <text x="140" y="261" text-anchor="middle" font-size="13" fill="#1565c0">1元起（活期）</text>
  <text x="140" y="275" text-anchor="middle" font-size="11" fill="#777">定期一般100元起</text>
  <text x="380" y="261" text-anchor="middle" font-size="13" fill="#e65100">1元起（部分银行）</text>
  <text x="380" y="275" text-anchor="middle" font-size="11" fill="#777">传统产品曾需1万</text>
  <text x="640" y="261" text-anchor="middle" font-size="13" fill="#2e7d32">1元起（大多数）</text>
  <text x="640" y="275" text-anchor="middle" font-size="11" fill="#777">ETF约100元起</text>

  <!-- 行5：发行主体 -->
  <rect x="10" y="284" width="780" height="42" fill="#ffffff" rx="4"/>
  <text x="20" y="302" font-size="12" fill="#555" font-weight="bold">发行主体</text>
  <text x="20" y="318" font-size="11" fill="#777">谁来发行</text>
  <text x="140" y="303" text-anchor="middle" font-size="13" fill="#1565c0">银行（直接负债）</text>
  <text x="380" y="303" text-anchor="middle" font-size="13" fill="#e65100">银行理财子公司</text>
  <text x="380" y="317" text-anchor="middle" font-size="11" fill="#777">（已与银行表内隔离）</text>
  <text x="640" y="303" text-anchor="middle" font-size="13" fill="#2e7d32">基金公司（公募持牌）</text>

  <!-- 行6：投资者保护 -->
  <rect x="10" y="328" width="780" height="42" fill="#f8f9fa" rx="4"/>
  <text x="20" y="346" font-size="12" fill="#555" font-weight="bold">投资者保护</text>
  <text x="20" y="362" font-size="11" fill="#777">风险隔离</text>
  <text x="140" y="348" text-anchor="middle" font-size="13" fill="#1565c0">存款保险制度</text>
  <text x="140" y="362" text-anchor="middle" font-size="11" fill="#777">最高50万兜底</text>
  <text x="380" y="348" text-anchor="middle" font-size="13" fill="#e65100">信披义务 + 银保监监管</text>
  <text x="380" y="362" text-anchor="middle" font-size="11" fill="#777">无刚性兜底</text>
  <text x="640" y="348" text-anchor="middle" font-size="13" fill="#2e7d32">证监会监管 + 独立托管</text>
  <text x="640" y="362" text-anchor="middle" font-size="11" fill="#777">基金公司倒闭不影响持有人</text>

  <!-- 分隔线 -->
  <line x1="250" y1="108" x2="250" y2="372" stroke="#ddd" stroke-width="1.5"/>
  <line x1="490" y1="108" x2="490" y2="372" stroke="#ddd" stroke-width="1.5"/>

  <!-- 底部 -->
  <rect x="10" y="376" width="780" height="36" fill="#e3f2fd" rx="6"/>
  <text x="400" y="399" text-anchor="middle" font-size="12" fill="#1565c0">核心记忆：存款=国家保底；银行理财=类存款但不保本；基金=专业管理但与风险挂钩</text>
</svg>
