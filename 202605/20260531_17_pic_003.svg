<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">选哪个？决策树</text>

  <!-- 起点 -->
  <rect x="300" y="48" width="200" height="44" rx="10" fill="#e8eaf6" stroke="#3949ab" stroke-width="2"/>
  <text x="400" y="67" text-anchor="middle" font-size="14" font-weight="bold" fill="#3949ab">我有一笔闲钱</text>
  <text x="400" y="83" text-anchor="middle" font-size="12" fill="#3949ab">该放哪里？</text>

  <!-- Q1 -->
  <line x1="400" y1="92" x2="400" y2="120" stroke="#555" stroke-width="1.5"/>
  <rect x="270" y="120" width="260" height="44" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="400" y="138" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">问题①：多久不会用这笔钱？</text>
  <text x="400" y="155" text-anchor="middle" font-size="12" fill="#795548">（流动性需求）</text>

  <!-- 左分支 -->
  <line x1="300" y1="142" x2="150" y2="200" stroke="#555" stroke-width="1.5"/>
  <rect x="50" y="200" width="200" height="44" rx="8" fill="#e8f4fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="150" y="219" text-anchor="middle" font-size="13" fill="#1565c0" font-weight="bold">随时可能要用</text>
  <text x="150" y="235" text-anchor="middle" font-size="11" fill="#1565c0">流动性第一</text>
  <text x="190" y="175" text-anchor="middle" font-size="11" fill="#888">6个月内</text>

  <!-- 右分支 -->
  <line x1="500" y1="142" x2="650" y2="200" stroke="#555" stroke-width="1.5"/>
  <rect x="550" y="200" width="200" height="44" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="650" y="219" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">封起来1年以上</text>
  <text x="650" y="235" text-anchor="middle" font-size="11" fill="#e65100">可以牺牲流动性</text>
  <text x="610" y="175" text-anchor="middle" font-size="11" fill="#888">1年+</text>

  <!-- Q2 左侧 -->
  <line x1="150" y1="244" x2="150" y2="270" stroke="#555" stroke-width="1.5"/>
  <rect x="40" y="270" width="220" height="44" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="150" y="289" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">问题②：能接受本金波动吗？</text>

  <!-- 左-左 -->
  <line x1="90" y1="314" x2="90" y2="340" stroke="#555" stroke-width="1.5"/>
  <rect x="20" y="340" width="140" height="50" rx="8" fill="#e8f4fd" stroke="#1565c0" stroke-width="2"/>
  <text x="90" y="358" text-anchor="middle" font-size="13" fill="#1565c0" font-weight="bold">✅ 活期存款</text>
  <text x="90" y="373" text-anchor="middle" font-size="11" fill="#1565c0">或货币基金</text>
  <text x="90" y="386" text-anchor="middle" font-size="10" fill="#555">不接受任何波动</text>
  <text x="60" y="335" text-anchor="middle" font-size="10" fill="#888">不接受</text>

  <!-- 左-右 -->
  <line x1="210" y1="314" x2="210" y2="340" stroke="#555" stroke-width="1.5"/>
  <rect x="155" y="340" width="120" height="50" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="215" y="358" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">✅ 货基/短债</text>
  <text x="215" y="373" text-anchor="middle" font-size="11" fill="#2e7d32">基金</text>
  <text x="215" y="386" text-anchor="middle" font-size="10" fill="#555">可小幅波动</text>
  <text x="215" y="335" text-anchor="middle" font-size="10" fill="#888">接受小波动</text>

  <!-- Q2 右侧 -->
  <line x1="650" y1="244" x2="650" y2="270" stroke="#555" stroke-width="1.5"/>
  <rect x="540" y="270" width="220" height="44" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="650" y="289" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">问题③：追求多高回报？</text>

  <!-- 右-左 -->
  <line x1="590" y1="314" x2="540" y2="340" stroke="#555" stroke-width="1.5"/>
  <rect x="460" y="340" width="160" height="50" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="540" y="358" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">✅ 银行理财</text>
  <text x="540" y="373" text-anchor="middle" font-size="11" fill="#e65100">或债券基金</text>
  <text x="540" y="386" text-anchor="middle" font-size="10" fill="#555">稳健增值</text>
  <text x="556" y="335" text-anchor="middle" font-size="10" fill="#888">稳健3~4%</text>

  <!-- 右-右 -->
  <line x1="710" y1="314" x2="730" y2="340" stroke="#555" stroke-width="1.5"/>
  <rect x="640" y="340" width="140" height="50" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="710" y="358" text-anchor="middle" font-size="13" fill="#c62828" font-weight="bold">✅ 股票/混合</text>
  <text x="710" y="373" text-anchor="middle" font-size="11" fill="#c62828">基金/ETF</text>
  <text x="710" y="386" text-anchor="middle" font-size="10" fill="#555">承担高风险</text>
  <text x="726" y="335" text-anchor="middle" font-size="10" fill="#888">追求5%+</text>
</svg>
