<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">三桶钱模型：现金仓位配置框架</text>
  
  <!-- Bucket 1: Life Money -->
  <rect x="40" y="65" width="210" height="300" rx="12" fill="#e8f4fd" stroke="#3b82f6" stroke-width="2"/>
  <rect x="40" y="65" width="210" height="52" rx="12" fill="#3b82f6"/>
  <rect x="40" y="100" width="210" height="17" fill="#3b82f6"/>
  <text x="145" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🏠 生活钱</text>
  
  <text x="145" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">建议比例：总资产 3~6 个月</text>
  <text x="145" y="162" text-anchor="middle" font-size="11" fill="#374151">月支出</text>
  
  <line x1="60" y1="175" x2="230" y2="175" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="70" y="198" font-size="12" fill="#374151">✓ 房租/房贷</text>
  <text x="70" y="218" font-size="12" fill="#374151">✓ 日常餐饮</text>
  <text x="70" y="238" font-size="12" fill="#374151">✓ 医疗应急</text>
  <text x="70" y="258" font-size="12" fill="#374151">✓ 家庭刚需支出</text>
  
  <line x1="60" y1="272" x2="230" y2="272" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="145" y="293" text-anchor="middle" font-size="11" fill="#6b7280">放在哪里</text>
  <rect x="60" y="300" width="170" height="26" rx="6" fill="#dbeafe"/>
  <text x="145" y="317" text-anchor="middle" font-size="11" fill="#1d4ed8">活期存款 / 货币基金</text>
  <text x="145" y="346" text-anchor="middle" font-size="10" fill="#ef4444">绝对不能投资！</text>
  
  <!-- Bucket 2: Defense Money -->
  <rect x="295" y="65" width="210" height="300" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <rect x="295" y="65" width="210" height="52" rx="12" fill="#22c55e"/>
  <rect x="295" y="100" width="210" height="17" fill="#22c55e"/>
  <text x="400" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🛡️ 防守钱</text>
  
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">建议比例：投资资产 20~40%</text>
  <text x="400" y="162" text-anchor="middle" font-size="11" fill="#374151">熊市 / 机会成本补偿</text>
  
  <line x1="315" y1="175" x2="485" y2="175" stroke="#86efac" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="320" y="198" font-size="12" fill="#374151">✓ 承受组合最大回撤</text>
  <text x="320" y="218" font-size="12" fill="#374151">✓ 熊市底部加仓弹药</text>
  <text x="320" y="238" font-size="12" fill="#374151">✓ 机会出现的行动资本</text>
  <text x="320" y="258" font-size="12" fill="#374151">✓ 平滑组合整体波动</text>
  
  <line x1="315" y1="272" x2="485" y2="272" stroke="#86efac" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="400" y="293" text-anchor="middle" font-size="11" fill="#6b7280">放在哪里</text>
  <rect x="315" y="300" width="170" height="26" rx="6" fill="#dcfce7"/>
  <text x="400" y="317" text-anchor="middle" font-size="11" fill="#15803d">短债基金 / 同业存单基金</text>
  <text x="400" y="346" text-anchor="middle" font-size="10" fill="#f59e0b">可以有轻微波动，不恐慌</text>
  
  <!-- Bucket 3: Offense Money -->
  <rect x="550" y="65" width="210" height="300" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="550" y="65" width="210" height="52" rx="12" fill="#f97316"/>
  <rect x="550" y="100" width="210" height="17" fill="#f97316"/>
  <text x="655" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="white">⚔️ 进攻钱</text>
  
  <text x="655" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">建议比例：投资资产 60~80%</text>
  <text x="655" y="162" text-anchor="middle" font-size="11" fill="#374151">承担风险 / 追求收益</text>
  
  <line x1="570" y1="175" x2="740" y2="175" stroke="#fdba74" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="575" y="198" font-size="12" fill="#374151">✓ ETF / 指数基金</text>
  <text x="575" y="218" font-size="12" fill="#374151">✓ 可转债 / 个股</text>
  <text x="575" y="238" font-size="12" fill="#374151">✓ 黄金 / REITs</text>
  <text x="575" y="258" font-size="12" fill="#374151">✓ 美股 / 港股</text>
  
  <line x1="570" y1="272" x2="740" y2="272" stroke="#fdba74" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="655" y="293" text-anchor="middle" font-size="11" fill="#6b7280">核心原则</text>
  <rect x="570" y="300" width="170" height="26" rx="6" fill="#ffedd5"/>
  <text x="655" y="317" text-anchor="middle" font-size="11" fill="#c2410c">只用"不怕涨不怕跌"的钱</text>
  <text x="655" y="346" text-anchor="middle" font-size="10" fill="#ef4444">亏了不影响生活继续</text>
  
  <!-- Bottom label -->
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#9ca3af">三桶钱相互独立，生活钱不参与投资，防守钱不追求高收益，进攻钱不借钱</text>
</svg>
