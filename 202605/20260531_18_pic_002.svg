<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#f8f9fa" rx="12"/>
  
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">散户最常见的三桶钱混用陷阱</text>
  
  <!-- Trap 1 -->
  <rect x="30" y="52" width="228" height="240" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="30" y="52" width="228" height="44" rx="10" fill="#ef4444"/>
  <rect x="30" y="80" width="228" height="16" fill="#ef4444"/>
  <text x="144" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">陷阱①：用生活钱投资</text>
  
  <text x="144" y="116" text-anchor="middle" font-size="12" fill="#7f1d1d">典型话术：</text>
  <rect x="50" y="124" width="188" height="36" rx="6" fill="#fee2e2"/>
  <text x="144" y="139" text-anchor="middle" font-size="11" fill="#991b1b">"反正这钱放着也没用，</text>
  <text x="144" y="155" text-anchor="middle" font-size="11" fill="#991b1b">先买点基金试试"</text>
  
  <text x="144" y="182" text-anchor="middle" font-size="11" fill="#374151">后果：</text>
  <text x="55" y="200" font-size="11" fill="#dc2626">• 市场跌了被迫卖出</text>
  <text x="55" y="218" font-size="11" fill="#dc2626">• 急用钱时割肉亏损</text>
  <text x="55" y="236" font-size="11" fill="#dc2626">• 情绪失控，判断失误</text>
  
  <rect x="50" y="252" width="188" height="26" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="144" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#b91c1c">✗ 生活钱绝不参与投资</text>
  
  <!-- Trap 2 -->
  <rect x="286" y="52" width="228" height="240" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <rect x="286" y="52" width="228" height="44" rx="10" fill="#f97316"/>
  <rect x="286" y="80" width="228" height="16" fill="#f97316"/>
  <text x="400" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">陷阱②：防守钱追求高收益</text>
  
  <text x="400" y="116" text-anchor="middle" font-size="12" fill="#7c2d12">典型话术：</text>
  <rect x="306" y="124" width="188" height="36" rx="6" fill="#ffedd5"/>
  <text x="400" y="139" text-anchor="middle" font-size="11" fill="#9a3412">"短债才4%，买个债基</text>
  <text x="400" y="155" text-anchor="middle" font-size="11" fill="#9a3412">能到7%，差那么多"</text>
  
  <text x="400" y="182" text-anchor="middle" font-size="11" fill="#374151">后果：</text>
  <text x="311" y="200" font-size="11" fill="#ea580c">• 真正机会来时没弹药</text>
  <text x="311" y="218" font-size="11" fill="#ea580c">• 防守资产也大幅回撤</text>
  <text x="311" y="236" font-size="11" fill="#ea580c">• 全仓被套，无法动弹</text>
  
  <rect x="306" y="252" width="188" height="26" rx="6" fill="#ffedd5" stroke="#f97316" stroke-width="1"/>
  <text x="400" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">✗ 防守钱只买低波动品种</text>
  
  <!-- Trap 3 -->
  <rect x="542" y="52" width="228" height="240" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="542" y="52" width="228" height="44" rx="10" fill="#16a34a"/>
  <rect x="542" y="80" width="228" height="16" fill="#16a34a"/>
  <text x="656" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">陷阱③：进攻钱借钱加仓</text>
  
  <text x="656" y="116" text-anchor="middle" font-size="12" fill="#14532d">典型话术：</text>
  <rect x="562" y="124" width="188" height="36" rx="6" fill="#dcfce7"/>
  <text x="656" y="139" text-anchor="middle" font-size="11" fill="#166534">"看得这么准，多借点</text>
  <text x="656" y="155" text-anchor="middle" font-size="11" fill="#166534">钱，涨了一起还"</text>
  
  <text x="656" y="182" text-anchor="middle" font-size="11" fill="#374151">后果：</text>
  <text x="567" y="200" font-size="11" fill="#15803d">• 市场回撤被强制平仓</text>
  <text x="567" y="218" font-size="11" fill="#15803d">• 利息侵蚀长期收益</text>
  <text x="567" y="236" font-size="11" fill="#15803d">• 心理压力导致判断错误</text>
  
  <rect x="562" y="252" width="188" height="26" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="656" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">✗ 进攻钱只用自有闲置资金</text>
  
  <text x="400" y="306" text-anchor="middle" font-size="11" fill="#9ca3af">三个陷阱的共同根源：把不同属性的钱放在同一个"账户"里不加区分</text>
</svg>
