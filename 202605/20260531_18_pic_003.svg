<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">不同市场环境下，防守钱比例怎么调</text>
  
  <!-- Header row -->
  <rect x="30" y="52" width="740" height="36" rx="6" fill="#374151"/>
  <text x="115" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">市场环境</text>
  <text x="290" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">信号特征</text>
  <text x="490" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">防守钱建议比例</text>
  <text x="680" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">操作方向</text>
  
  <!-- Row 1 -->
  <rect x="30" y="88" width="740" height="52" rx="0" fill="#fef2f2"/>
  <text x="115" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">🔥 牛市疯狂期</text>
  <text x="115" y="126" text-anchor="middle" font-size="11" fill="#6b7280">估值极高/情绪极热</text>
  <text x="290" y="108" text-anchor="middle" font-size="11" fill="#374151">市盈率创历史新高</text>
  <text x="290" y="126" text-anchor="middle" font-size="11" fill="#374151">新股民大量入场</text>
  <!-- Bar -->
  <rect x="410" y="98" width="140" height="24" rx="4" fill="#fca5a5"/>
  <rect x="410" y="98" width="112" height="24" rx="4" fill="#ef4444"/>
  <text x="490" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="white">30~40%</text>
  <text x="680" y="117" text-anchor="middle" font-size="12" fill="#dc2626">减仓 → 补充防守钱</text>
  
  <!-- Row 2 -->
  <rect x="30" y="140" width="740" height="52" fill="#fff7ed"/>
  <text x="115" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#ea580c">📈 牛市中期</text>
  <text x="115" y="178" text-anchor="middle" font-size="11" fill="#6b7280">趋势确认/估值合理</text>
  <text x="290" y="160" text-anchor="middle" font-size="11" fill="#374151">成交量温和放量</text>
  <text x="290" y="178" text-anchor="middle" font-size="11" fill="#374151">估值处于历史中位</text>
  <rect x="410" y="150" width="140" height="24" rx="4" fill="#fed7aa"/>
  <rect x="410" y="150" width="70" height="24" rx="4" fill="#f97316"/>
  <text x="490" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">20~25%</text>
  <text x="680" y="169" text-anchor="middle" font-size="12" fill="#ea580c">维持仓位 / 小幅调整</text>
  
  <!-- Row 3 -->
  <rect x="30" y="192" width="740" height="52" fill="#f0fdf4"/>
  <text x="115" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">🔄 震荡市</text>
  <text x="115" y="230" text-anchor="middle" font-size="11" fill="#6b7280">方向不明/指数横盘</text>
  <text x="290" y="212" text-anchor="middle" font-size="11" fill="#374151">成交量低迷</text>
  <text x="290" y="230" text-anchor="middle" font-size="11" fill="#374151">情绪平淡无方向</text>
  <rect x="410" y="202" width="140" height="24" rx="4" fill="#bbf7d0"/>
  <rect x="410" y="202" width="84" height="24" rx="4" fill="#22c55e"/>
  <text x="490" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="white">20~30%</text>
  <text x="680" y="221" text-anchor="middle" font-size="12" fill="#16a34a">用于网格 / 守仓不动</text>
  
  <!-- Row 4 -->
  <rect x="30" y="244" width="740" height="52" fill="#eff6ff"/>
  <text x="115" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">📉 熊市初期</text>
  <text x="115" y="282" text-anchor="middle" font-size="11" fill="#6b7280">趋势向下/不确定</text>
  <text x="290" y="264" text-anchor="middle" font-size="11" fill="#374151">指数跌破均线</text>
  <text x="290" y="282" text-anchor="middle" font-size="11" fill="#374151">流动性开始收紧</text>
  <rect x="410" y="254" width="140" height="24" rx="4" fill="#bfdbfe"/>
  <rect x="410" y="254" width="105" height="24" rx="4" fill="#3b82f6"/>
  <text x="490" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="white">30~50%</text>
  <text x="680" y="273" text-anchor="middle" font-size="12" fill="#2563eb">主动减仓 / 留弹药</text>
  
  <!-- Row 5 -->
  <rect x="30" y="296" width="740" height="52" rx="0" fill="#f5f3ff"/>
  <text x="115" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">💀 熊市深度期</text>
  <text x="115" y="334" text-anchor="middle" font-size="11" fill="#6b7280">恐慌/估值极低</text>
  <text x="290" y="316" text-anchor="middle" font-size="11" fill="#374151">人人说不敢买</text>
  <text x="290" y="334" text-anchor="middle" font-size="11" fill="#374151">估值跌至历史低位</text>
  <rect x="410" y="306" width="140" height="24" rx="4" fill="#ddd6fe"/>
  <rect x="410" y="306" width="28" height="24" rx="4" fill="#7c3aed"/>
  <text x="490" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">逐步降至 10%</text>
  <text x="680" y="325" text-anchor="middle" font-size="12" fill="#7c3aed">分批建仓 / 减少防守</text>
  
  <!-- dividers -->
  <line x1="200" y1="52" x2="200" y2="348" stroke="#d1d5db" stroke-width="1"/>
  <line x1="370" y1="52" x2="370" y2="348" stroke="#d1d5db" stroke-width="1"/>
  <line x1="570" y1="52" x2="570" y2="348" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#9ca3af">* 以上比例为"防守钱占投资资产"，不含生活钱。比例仅供参考，需结合个人风险承受能力调整。</text>
</svg>
