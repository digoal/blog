<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">三类资金的时间匹配原则</text>

  <!-- 生活钱 -->
  <rect x="40" y="60" width="210" height="310" rx="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="145" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">💵 生活钱</text>
  <text x="145" y="116" text-anchor="middle" font-size="12" fill="#388e3c">用途：3~6个月生活支出</text>
  <text x="145" y="136" text-anchor="middle" font-size="12" fill="#388e3c">时间：随时可能用</text>
  <rect x="60" y="150" width="170" height="36" rx="6" fill="#c8e6c9"/>
  <text x="145" y="173" text-anchor="middle" font-size="12" fill="#1b5e20">✅ 货币基金</text>
  <rect x="60" y="194" width="170" height="36" rx="6" fill="#c8e6c9"/>
  <text x="145" y="217" text-anchor="middle" font-size="12" fill="#1b5e20">✅ 国债逆回购</text>
  <rect x="60" y="238" width="170" height="36" rx="6" fill="#c8e6c9"/>
  <text x="145" y="261" text-anchor="middle" font-size="12" fill="#1b5e20">✅ 银行活期存款</text>
  <rect x="60" y="300" width="170" height="36" rx="6" fill="#ffcdd2"/>
  <text x="145" y="323" text-anchor="middle" font-size="12" fill="#b71c1c">❌ 股票/ETF/转债</text>
  <rect x="60" y="344" width="170" height="18" rx="4" fill="#ffcdd2"/>
  <text x="145" y="357" text-anchor="middle" font-size="11" fill="#b71c1c">❌ 债券基金/REITs</text>

  <!-- 防守钱 -->
  <rect x="295" y="60" width="210" height="310" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d47a1">🛡️ 防守钱</text>
  <text x="400" y="116" text-anchor="middle" font-size="12" fill="#1565c0">用途：应急备用/中期目标</text>
  <text x="400" y="136" text-anchor="middle" font-size="12" fill="#1565c0">时间：1~3年内可能用</text>
  <rect x="315" y="150" width="170" height="36" rx="6" fill="#bbdefb"/>
  <text x="400" y="173" text-anchor="middle" font-size="12" fill="#0d47a1">✅ 短债/中短债基金</text>
  <rect x="315" y="194" width="170" height="36" rx="6" fill="#bbdefb"/>
  <text x="400" y="217" text-anchor="middle" font-size="12" fill="#0d47a1">✅ 同业存单指数基金</text>
  <rect x="315" y="238" width="170" height="36" rx="6" fill="#bbdefb"/>
  <text x="400" y="261" text-anchor="middle" font-size="12" fill="#0d47a1">✅ 中低风险银行理财</text>
  <rect x="315" y="300" width="170" height="36" rx="6" fill="#ffcdd2"/>
  <text x="400" y="323" text-anchor="middle" font-size="12" fill="#b71c1c">❌ 行业ETF/个股</text>
  <rect x="315" y="344" width="170" height="18" rx="4" fill="#fff9c4"/>
  <text x="400" y="357" text-anchor="middle" font-size="11" fill="#f57f17">⚠️ 宽基ETF（谨慎）</text>

  <!-- 进攻钱 -->
  <rect x="550" y="60" width="210" height="310" rx="12" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="655" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">⚔️ 进攻钱</text>
  <text x="655" y="116" text-anchor="middle" font-size="12" fill="#c62828">用途：长期增值</text>
  <text x="655" y="136" text-anchor="middle" font-size="12" fill="#c62828">时间：3年以上不会用</text>
  <rect x="570" y="150" width="170" height="36" rx="6" fill="#ef9a9a"/>
  <text x="655" y="173" text-anchor="middle" font-size="12" fill="#7f0000">✅ 宽基ETF/行业ETF</text>
  <rect x="570" y="194" width="170" height="36" rx="6" fill="#ef9a9a"/>
  <text x="655" y="217" text-anchor="middle" font-size="12" fill="#7f0000">✅ 优质个股/转债</text>
  <rect x="570" y="238" width="170" height="36" rx="6" fill="#ef9a9a"/>
  <text x="655" y="261" text-anchor="middle" font-size="12" fill="#7f0000">✅ REITs/黄金ETF</text>
  <rect x="570" y="300" width="170" height="36" rx="6" fill="#c8e6c9"/>
  <text x="655" y="323" text-anchor="middle" font-size="12" fill="#1b5e20">✅ 美股ETF/QDII</text>
  <rect x="570" y="344" width="170" height="18" rx="4" fill="#ffcdd2"/>
  <text x="655" y="357" text-anchor="middle" font-size="11" fill="#b71c1c">❌ 期货/高杠杆产品</text>

  <!-- 底部说明 -->
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#666">核心原则：钱的用途时间 ≥ 资产的合理持有周期</text>
</svg>
