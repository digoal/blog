<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">主要资产的"安全持有周期"参考</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#888">（历史数据参考，非盈利保证）</text>

  <!-- 表头 -->
  <rect x="40" y="68" width="720" height="36" rx="6" fill="#37474f"/>
  <text x="150" y="91" text-anchor="middle" font-size="13" fill="white" font-weight="bold">资产类型</text>
  <text x="380" y="91" text-anchor="middle" font-size="13" fill="white" font-weight="bold">建议最短持有周期</text>
  <text x="600" y="91" text-anchor="middle" font-size="13" fill="white" font-weight="bold">历史最大回撤参考</text>
  <text x="730" y="91" text-anchor="middle" font-size="13" fill="white" font-weight="bold">适合</text>

  <!-- 数据行 -->
  <rect x="40" y="104" width="720" height="34" rx="0" fill="#e8f5e9"/>
  <text x="150" y="126" text-anchor="middle" font-size="12" fill="#2e7d32">货币基金</text>
  <text x="380" y="126" text-anchor="middle" font-size="12" fill="#2e7d32">随时可取</text>
  <text x="600" y="126" text-anchor="middle" font-size="12" fill="#2e7d32">几乎为零</text>
  <text x="730" y="126" text-anchor="middle" font-size="12" fill="#2e7d32">生活钱</text>

  <rect x="40" y="138" width="720" height="34" rx="0" fill="#f1f8e9"/>
  <text x="150" y="160" text-anchor="middle" font-size="12" fill="#33691e">短债基金</text>
  <text x="380" y="160" text-anchor="middle" font-size="12" fill="#33691e">6个月以上</text>
  <text x="600" y="160" text-anchor="middle" font-size="12" fill="#33691e">约1~3%</text>
  <text x="730" y="160" text-anchor="middle" font-size="12" fill="#33691e">防守钱</text>

  <rect x="40" y="172" width="720" height="34" rx="0" fill="#e3f2fd"/>
  <text x="150" y="194" text-anchor="middle" font-size="12" fill="#0d47a1">中长期债券基金</text>
  <text x="380" y="194" text-anchor="middle" font-size="12" fill="#0d47a1">1~2年以上</text>
  <text x="600" y="194" text-anchor="middle" font-size="12" fill="#0d47a1">约5~15%（利率大幅上行时）</text>
  <text x="730" y="194" text-anchor="middle" font-size="12" fill="#0d47a1">防守钱</text>

  <rect x="40" y="206" width="720" height="34" rx="0" fill="#fff3e0"/>
  <text x="150" y="228" text-anchor="middle" font-size="12" fill="#e65100">黄金ETF</text>
  <text x="380" y="228" text-anchor="middle" font-size="12" fill="#e65100">2~3年以上</text>
  <text x="600" y="228" text-anchor="middle" font-size="12" fill="#e65100">约20~40%</text>
  <text x="730" y="228" text-anchor="middle" font-size="12" fill="#e65100">进攻钱</text>

  <rect x="40" y="240" width="720" height="34" rx="0" fill="#fce4ec"/>
  <text x="150" y="262" text-anchor="middle" font-size="12" fill="#880e4f">宽基ETF（沪深300）</text>
  <text x="380" y="262" text-anchor="middle" font-size="12" fill="#880e4f">3~5年以上</text>
  <text x="600" y="262" text-anchor="middle" font-size="12" fill="#880e4f">约45~72%（2007年、2015年）</text>
  <text x="730" y="262" text-anchor="middle" font-size="12" fill="#880e4f">进攻钱</text>

  <rect x="40" y="274" width="720" height="34" rx="0" fill="#f8bbd0"/>
  <text x="150" y="296" text-anchor="middle" font-size="12" fill="#880e4f">行业ETF / 个股</text>
  <text x="380" y="296" text-anchor="middle" font-size="12" fill="#880e4f">5年以上（高确定性前提）</text>
  <text x="600" y="296" text-anchor="middle" font-size="12" fill="#880e4f">可达60~90%+</text>
  <text x="730" y="296" text-anchor="middle" font-size="12" fill="#880e4f">进攻钱</text>

  <line x1="40" y1="104" x2="760" y2="104" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="138" x2="760" y2="138" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="172" x2="760" y2="172" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="206" x2="760" y2="206" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="240" x2="760" y2="240" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="274" x2="760" y2="274" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="308" x2="760" y2="308" stroke="#ccc" stroke-width="1"/>
  <line x1="260" y1="68" x2="260" y2="308" stroke="#ccc" stroke-width="1"/>
  <line x1="500" y1="68" x2="500" y2="308" stroke="#ccc" stroke-width="1"/>
  <line x1="680" y1="68" x2="680" y2="308" stroke="#ccc" stroke-width="1"/>
  <rect x="40" y="68" width="720" height="240" rx="0" fill="none" stroke="#bbb" stroke-width="1.5"/>

  <text x="400" y="346" text-anchor="middle" font-size="11" fill="#e53935">⚠️ 历史最大回撤是已发生的最坏情况，未来可能更大或更小，不构成预测</text>
  <text x="400" y="366" text-anchor="middle" font-size="11" fill="#888">数据来源：Wind、各指数历史区间统计，截至2025年</text>
</svg>
