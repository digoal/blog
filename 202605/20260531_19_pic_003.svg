<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="360" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">被迫卖出：时间错配的致命后果</text>

  <!-- 时间轴 -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="#999" stroke-width="2"/>
  <!-- 箭头 -->
  <polygon points="740,155 755,160 740,165" fill="#999"/>

  <!-- 时间节点 -->
  <!-- T0 买入 -->
  <circle cx="100" cy="160" r="10" fill="#1976d2"/>
  <text x="100" y="195" text-anchor="middle" font-size="12" fill="#1976d2" font-weight="bold">买入</text>
  <text x="100" y="210" text-anchor="middle" font-size="11" fill="#555">资金10万</text>
  <text x="100" y="225" text-anchor="middle" font-size="11" fill="#555">债券基金</text>

  <!-- 正常走势曲线 -->
  <path d="M100,160 C200,120 300,100 400,90 C500,80 600,70 700,60" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#4caf50">正常持有：净值稳步上涨</text>

  <!-- 回调走势 -->
  <path d="M100,160 C180,165 240,220 310,240 C370,255 420,245 480,230 C550,210 630,180 700,60" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="360" y="270" text-anchor="middle" font-size="11" fill="#e53935">市场波动：净值暂时下跌</text>

  <!-- 被迫卖出点 -->
  <circle cx="310" cy="240" r="12" fill="#ff5722"/>
  <line x1="310" y1="240" x2="310" y2="295" stroke="#ff5722" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="210" y="295" width="200" height="44" rx="6" fill="#fff3e0" stroke="#ff5722" stroke-width="1.5"/>
  <text x="310" y="314" text-anchor="middle" font-size="12" font-weight="bold" fill="#bf360c">💥 被迫卖出</text>
  <text x="310" y="330" text-anchor="middle" font-size="11" fill="#bf360c">钱到期了，亏7%割肉</text>

  <!-- 如果不卖 -->
  <circle cx="700" cy="60" r="10" fill="#4caf50"/>
  <text x="700" y="45" text-anchor="middle" font-size="11" fill="#4caf50">若持有到此</text>
  <text x="700" y="32" text-anchor="middle" font-size="11" fill="#4caf50">涨回并盈利</text>

  <!-- 悲剧原因说明 -->
  <rect x="60" y="305" width="140" height="40" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="130" y="322" text-anchor="middle" font-size="11" fill="#3949ab">根本原因：</text>
  <text x="130" y="338" text-anchor="middle" font-size="11" fill="#3949ab">这笔钱本来1年要用</text>

  <text x="760" y="163" text-anchor="start" font-size="11" fill="#999">时间 →</text>
</svg>
