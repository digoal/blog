<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>pgvector 在 PostgreSQL 内的逻辑路径</title>
  <desc>展示应用请求、SQL 层、类型和操作符、索引访问方法、堆表与 WAL 的关系。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .core { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .idx { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="55" width="180" height="95"/>
  <text class="text" x="130" y="92" text-anchor="middle">应用服务</text>
  <text class="small" x="130" y="122" text-anchor="middle">生成 embedding</text>

  <rect class="core" x="285" y="55" width="210" height="95"/>
  <text class="text" x="390" y="88" text-anchor="middle">PostgreSQL SQL</text>
  <text class="small" x="390" y="118" text-anchor="middle">ORDER BY 距离 LIMIT K</text>

  <rect class="core" x="570" y="55" width="280" height="95"/>
  <text class="text" x="710" y="88" text-anchor="middle">pgvector 扩展接口</text>
  <text class="small" x="710" y="118" text-anchor="middle">类型、函数、操作符、opclass</text>

  <rect class="box" x="80" y="245" width="210" height="105"/>
  <text class="text" x="185" y="283" text-anchor="middle">堆表数据</text>
  <text class="small" x="185" y="312" text-anchor="middle">业务列 + 向量列</text>

  <rect class="idx" x="375" y="220" width="210" height="150"/>
  <text class="text" x="480" y="255" text-anchor="middle">索引访问方法</text>
  <text class="small" x="480" y="288" text-anchor="middle">HNSW：图近邻</text>
  <text class="small" x="480" y="318" text-anchor="middle">IVFFlat：分桶扫描</text>
  <text class="small" x="480" y="348" text-anchor="middle">返回候选 TID</text>

  <rect class="warn" x="670" y="245" width="220" height="105"/>
  <text class="text" x="780" y="283" text-anchor="middle">Postgres 能力</text>
  <text class="small" x="780" y="312" text-anchor="middle">MVCC / WAL / 备份恢复</text>

  <rect class="warn" x="285" y="415" width="390" height="70"/>
  <text class="text" x="480" y="445" text-anchor="middle">结果语义</text>
  <text class="small" x="480" y="470" text-anchor="middle">精确扫描保证召回；ANN 用召回率换延迟</text>

  <path class="arrow" d="M 220 103 L 285 103"/>
  <path class="arrow" d="M 495 103 L 570 103"/>
  <path class="arrow" d="M 710 150 L 540 220"/>
  <path class="arrow" d="M 375 295 L 290 295"/>
  <path class="arrow" d="M 585 295 L 670 295"/>
  <path class="arrow" d="M 480 370 L 480 415"/>
</svg>
