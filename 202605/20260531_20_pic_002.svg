<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img">
  <title>pgvector 类型、距离操作符与索引支持矩阵</title>
  <desc>展示 vector、halfvec、bit、sparsevec 与距离操作符、HNSW、IVFFlat 的支持关系。</desc>
  <style>
    .head { fill: #1f2937; }
    .cell { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .yes { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .no { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
    .note { fill: #fffbeb; stroke: #d97706; stroke-width: 1.5; }
    .htext { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #ffffff; font-weight: 700; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
  </style>

  <rect class="head" x="40" y="35" width="880" height="48" rx="8"/>
  <text class="htext" x="480" y="66" text-anchor="middle">类型不是索引；操作符类决定“按哪种距离排序”</text>

  <rect class="cell" x="40" y="120" width="170" height="55"/>
  <rect class="cell" x="210" y="120" width="210" height="55"/>
  <rect class="cell" x="420" y="120" width="210" height="55"/>
  <rect class="cell" x="630" y="120" width="290" height="55"/>
  <text class="text" x="125" y="154" text-anchor="middle">类型</text>
  <text class="text" x="315" y="154" text-anchor="middle">存储侧能力</text>
  <text class="text" x="525" y="154" text-anchor="middle">HNSW</text>
  <text class="text" x="775" y="154" text-anchor="middle">IVFFlat</text>

  <rect class="cell" x="40" y="175" width="170" height="75"/>
  <rect class="cell" x="210" y="175" width="210" height="75"/>
  <rect class="yes" x="420" y="175" width="210" height="75"/>
  <rect class="yes" x="630" y="175" width="290" height="75"/>
  <text class="text" x="125" y="205" text-anchor="middle">vector</text>
  <text class="small" x="315" y="203" text-anchor="middle">float32，最多 16000 维</text>
  <text class="small" x="315" y="226" text-anchor="middle">4*维度+8 字节</text>
  <text class="small" x="525" y="203" text-anchor="middle">最多 2000 维</text>
  <text class="small" x="525" y="226" text-anchor="middle">L2/IP/Cosine/L1</text>
  <text class="small" x="775" y="203" text-anchor="middle">最多 2000 维</text>
  <text class="small" x="775" y="226" text-anchor="middle">L2/IP/Cosine</text>

  <rect class="cell" x="40" y="250" width="170" height="75"/>
  <rect class="cell" x="210" y="250" width="210" height="75"/>
  <rect class="yes" x="420" y="250" width="210" height="75"/>
  <rect class="yes" x="630" y="250" width="290" height="75"/>
  <text class="text" x="125" y="280" text-anchor="middle">halfvec</text>
  <text class="small" x="315" y="278" text-anchor="middle">float16，最多 16000 维</text>
  <text class="small" x="315" y="301" text-anchor="middle">2*维度+8 字节</text>
  <text class="small" x="525" y="278" text-anchor="middle">最多 4000 维</text>
  <text class="small" x="525" y="301" text-anchor="middle">L2/IP/Cosine/L1</text>
  <text class="small" x="775" y="278" text-anchor="middle">最多 4000 维</text>
  <text class="small" x="775" y="301" text-anchor="middle">L2/IP/Cosine</text>

  <rect class="cell" x="40" y="325" width="170" height="75"/>
  <rect class="cell" x="210" y="325" width="210" height="75"/>
  <rect class="yes" x="420" y="325" width="210" height="75"/>
  <rect class="yes" x="630" y="325" width="290" height="75"/>
  <text class="text" x="125" y="355" text-anchor="middle">bit</text>
  <text class="small" x="315" y="353" text-anchor="middle">二进制量化向量</text>
  <text class="small" x="315" y="376" text-anchor="middle">维度/8+8 字节</text>
  <text class="small" x="525" y="353" text-anchor="middle">最多 64000 维</text>
  <text class="small" x="525" y="376" text-anchor="middle">Hamming/Jaccard</text>
  <text class="small" x="775" y="353" text-anchor="middle">最多 64000 维</text>
  <text class="small" x="775" y="376" text-anchor="middle">Hamming</text>

  <rect class="cell" x="40" y="400" width="170" height="75"/>
  <rect class="cell" x="210" y="400" width="210" height="75"/>
  <rect class="yes" x="420" y="400" width="210" height="75"/>
  <rect class="no" x="630" y="400" width="290" height="75"/>
  <text class="text" x="125" y="430" text-anchor="middle">sparsevec</text>
  <text class="small" x="315" y="428" text-anchor="middle">最多 16000 非零元素</text>
  <text class="small" x="315" y="451" text-anchor="middle">8*非零+16 字节</text>
  <text class="small" x="525" y="428" text-anchor="middle">最多 1000 非零元素</text>
  <text class="small" x="525" y="451" text-anchor="middle">L2/IP/Cosine/L1</text>
  <text class="small" x="775" y="440" text-anchor="middle">当前 SQL opclass 未提供</text>

  <rect class="note" x="80" y="505" width="800" height="38" rx="6"/>
  <text class="small" x="480" y="530" text-anchor="middle">查询必须写成按距离操作符升序 ORDER BY，并配合 LIMIT，优化器才有使用 ANN 索引的语义入口。</text>
</svg>
