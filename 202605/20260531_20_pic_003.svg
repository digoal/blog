<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img">
  <title>HNSW 多层图搜索与参数代价</title>
  <desc>展示 HNSW 从入口点在高层贪心下降，再在第 0 层用候选队列扩展的搜索流程。</desc>
  <style>
    .layer { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; }
    .node { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .hit { fill: #bbf7d0; stroke: #15803d; stroke-width: 2.5; }
    .q { fill: #fed7aa; stroke: #c2410c; stroke-width: 2; }
    .edge { stroke: #64748b; stroke-width: 2; fill: none; }
    .search { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="layer" x="55" y="65" width="600" height="105"/>
  <text class="text" x="90" y="100">高层：少量长边，快速接近目标区域</text>
  <circle class="node" cx="185" cy="130" r="18"/>
  <circle class="node" cx="335" cy="120" r="18"/>
  <circle class="hit" cx="520" cy="135" r="18"/>
  <path class="edge" d="M 203 129 L 317 122"/>
  <path class="edge" d="M 353 122 L 502 134"/>
  <path class="search" d="M 185 130 L 330 121 L 515 134"/>

  <rect class="layer" x="55" y="220" width="600" height="220"/>
  <text class="text" x="90" y="255">第 0 层：候选队列扩展，返回距离最近的 K 个 TID</text>
  <circle class="node" cx="145" cy="355" r="17"/>
  <circle class="node" cx="235" cy="310" r="17"/>
  <circle class="node" cx="245" cy="405" r="17"/>
  <circle class="hit" cx="370" cy="335" r="20"/>
  <circle class="hit" cx="440" cy="392" r="20"/>
  <circle class="node" cx="530" cy="310" r="17"/>
  <circle class="node" cx="555" cy="415" r="17"/>
  <path class="edge" d="M 160 347 L 220 318 M 160 363 L 230 398 M 252 314 L 352 333 M 261 398 L 351 342 M 390 345 L 425 380 M 458 386 L 538 417 M 390 330 L 513 312"/>
  <path class="search" d="M 520 135 C 480 190 410 240 372 315"/>

  <circle class="q" cx="735" cy="105" r="24"/>
  <text class="text" x="735" y="112" text-anchor="middle">Q</text>
  <text class="small" x="735" y="145" text-anchor="middle">查询向量</text>

  <rect class="layer" x="690" y="205" width="220" height="235"/>
  <text class="text" x="800" y="242" text-anchor="middle">关键参数</text>
  <text class="small" x="800" y="283" text-anchor="middle">m：每层连接数</text>
  <text class="small" x="800" y="316" text-anchor="middle">ef_construction：构图候选</text>
  <text class="small" x="800" y="349" text-anchor="middle">ef_search：查询候选</text>
  <text class="small" x="800" y="390" text-anchor="middle">候选越大，召回越高</text>
  <text class="small" x="800" y="418" text-anchor="middle">代价是内存和延迟</text>

  <path class="search" d="M 712 121 C 645 188 552 262 445 376"/>
</svg>
