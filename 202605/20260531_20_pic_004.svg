<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img">
  <title>IVFFlat 训练、分桶与 probes 查询</title>
  <desc>展示 IVFFlat 先采样做 k-means 得到中心，再把向量写入最近 list，查询时只扫描最近的若干 list。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .train { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .list { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .dot { fill: #2563eb; }
    .center { fill: #f97316; stroke: #9a3412; stroke-width: 2; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="train" x="45" y="55" width="230" height="130"/>
  <text class="text" x="160" y="92" text-anchor="middle">建索引阶段</text>
  <text class="small" x="160" y="124" text-anchor="middle">采样：lists*50</text>
  <text class="small" x="160" y="151" text-anchor="middle">最低目标 10000 样本</text>

  <rect class="train" x="365" y="55" width="230" height="130"/>
  <text class="text" x="480" y="92" text-anchor="middle">k-means</text>
  <text class="small" x="480" y="124" text-anchor="middle">得到 list 中心</text>
  <text class="small" x="480" y="151" text-anchor="middle">数据太少会低召回</text>

  <rect class="list" x="680" y="55" width="230" height="130"/>
  <text class="text" x="795" y="92" text-anchor="middle">写入倒排 list</text>
  <text class="small" x="795" y="124" text-anchor="middle">每个向量进最近中心</text>
  <text class="small" x="795" y="151" text-anchor="middle">新增行继续分配</text>

  <path class="arrow" d="M 275 120 L 365 120"/>
  <path class="arrow" d="M 595 120 L 680 120"/>

  <rect class="box" x="65" y="260" width="310" height="205"/>
  <text class="text" x="220" y="292" text-anchor="middle">向量空间被切成 lists 个区域</text>
  <circle class="center" cx="160" cy="350" r="13"/>
  <circle class="center" cx="285" cy="390" r="13"/>
  <circle class="dot" cx="125" cy="330" r="6"/>
  <circle class="dot" cx="190" cy="365" r="6"/>
  <circle class="dot" cx="140" cy="390" r="6"/>
  <circle class="dot" cx="260" cy="355" r="6"/>
  <circle class="dot" cx="320" cy="410" r="6"/>
  <path class="arrow" d="M 160 350 L 285 390"/>
  <text class="small" x="220" y="438" text-anchor="middle">中心质量决定桶是否均衡</text>

  <rect class="list" x="470" y="250" width="190" height="225"/>
  <text class="text" x="565" y="284" text-anchor="middle">查询阶段</text>
  <text class="small" x="565" y="320" text-anchor="middle">计算 Q 到所有中心距离</text>
  <text class="small" x="565" y="350" text-anchor="middle">选最近 probes 个 list</text>
  <text class="small" x="565" y="380" text-anchor="middle">扫描 list 内条目</text>
  <text class="small" x="565" y="410" text-anchor="middle">按真实距离排序返回</text>

  <rect class="risk" x="715" y="260" width="200" height="205"/>
  <text class="text" x="815" y="294" text-anchor="middle">代价旋钮</text>
  <text class="small" x="815" y="332" text-anchor="middle">lists 多：桶更细</text>
  <text class="small" x="815" y="360" text-anchor="middle">但单桶召回可能下降</text>
  <text class="small" x="815" y="400" text-anchor="middle">probes 多：召回更高</text>
  <text class="small" x="815" y="428" text-anchor="middle">但扫描更多页面</text>
</svg>
