<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img">
  <title>pgvector 生产实践决策闭环</title>
  <desc>展示从业务目标到建模、索引选择、召回评估、监控和重建的闭环。</desc>
  <style>
    .step { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .check { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#arrow2); }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #334155; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="step" x="50" y="70" width="185" height="95"/>
  <text class="text" x="142" y="104" text-anchor="middle">定义目标</text>
  <text class="small" x="142" y="133" text-anchor="middle">TopK / P95 / 召回率</text>

  <rect class="step" x="295" y="70" width="185" height="95"/>
  <text class="text" x="387" y="104" text-anchor="middle">选择表示</text>
  <text class="small" x="387" y="133" text-anchor="middle">vector / halfvec / bit</text>

  <rect class="step" x="540" y="70" width="185" height="95"/>
  <text class="text" x="632" y="104" text-anchor="middle">选择索引</text>
  <text class="small" x="632" y="133" text-anchor="middle">HNSW 或 IVFFlat</text>

  <rect class="check" x="760" y="70" width="155" height="95"/>
  <text class="text" x="837" y="104" text-anchor="middle">上线查询</text>
  <text class="small" x="837" y="133" text-anchor="middle">ORDER BY + LIMIT</text>

  <rect class="check" x="150" y="300" width="220" height="105"/>
  <text class="text" x="260" y="335" text-anchor="middle">召回校验</text>
  <text class="small" x="260" y="365" text-anchor="middle">ANN 对比精确扫描</text>

  <rect class="check" x="470" y="300" width="220" height="105"/>
  <text class="text" x="580" y="335" text-anchor="middle">性能观测</text>
  <text class="small" x="580" y="365" text-anchor="middle">EXPLAIN / BUFFERS / 索引大小</text>

  <rect class="risk" x="735" y="300" width="180" height="105"/>
  <text class="text" x="825" y="335" text-anchor="middle">维护动作</text>
  <text class="small" x="825" y="365" text-anchor="middle">REINDEX / VACUUM / 重建</text>

  <path class="arrow" d="M 235 118 L 295 118"/>
  <path class="arrow" d="M 480 118 L 540 118"/>
  <path class="arrow" d="M 725 118 L 760 118"/>
  <path class="arrow" d="M 837 165 C 835 235 770 285 690 325"/>
  <path class="arrow" d="M 470 352 L 370 352"/>
  <path class="arrow" d="M 690 352 L 735 352"/>
  <path class="loop" d="M 150 352 C 65 335 45 230 100 165"/>
  <path class="loop" d="M 825 300 C 835 210 730 175 632 165"/>
</svg>
