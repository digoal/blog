<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img">
  <title>tsvector 生成链路</title>
  <desc>展示 PostgreSQL 将原始文档经过 parser、dictionary、lexeme 合并和位置权重保存为 tsvector 的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="25" width="940" height="310" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="55" y="75" width="150" height="80" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="130" y="105" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">原始文档</text>
  <text x="130" y="132" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">title/body/json</text>
  <rect x="260" y="75" width="150" height="80" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="335" y="105" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">Parser</text>
  <text x="335" y="132" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">切分 token + 类型</text>
  <rect x="465" y="75" width="150" height="80" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="540" y="105" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">Dictionary</text>
  <text x="540" y="132" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">归一化 / 停用词</text>
  <rect x="670" y="75" width="150" height="80" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="745" y="105" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">make_tsvector</text>
  <text x="745" y="132" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">排序 / 去重 / 位置</text>
  <rect x="355" y="225" width="270" height="70" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="490" y="253" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">tsvector</text>
  <text x="490" y="278" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">'cat':2A 'search':7D ...</text>
  <line x1="205" y1="115" x2="255" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="115" x2="460" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="115" x2="665" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M745 155 V190 C745 210 625 210 580 225" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="42" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">从业务文本到可检索表示</text>
  <text x="110" y="214" font-size="14" font-family="Arial, sans-serif" fill="#475569">关键约束：配置要显式；NULL 要 coalesce；权重来自位置标签。</text>
</svg>
