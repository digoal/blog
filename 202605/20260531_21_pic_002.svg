<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img">
  <title>tsvector 物理布局</title>
  <desc>展示 TSVectorData 的 varlena 头、size、WordEntry 数组、词位字符串以及可选位置权重数组。</desc>
  <rect x="24" y="28" width="932" height="330" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="58" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">TSVectorData: 排序后的 lexeme + 可选位置权重</text>
  <rect x="70" y="100" width="120" height="80" fill="#dbeafe" stroke="#2563eb"/>
  <text x="130" y="132" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">vl_len_</text>
  <text x="130" y="156" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">varlena</text>
  <rect x="190" y="100" width="110" height="80" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="245" y="132" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">size</text>
  <text x="245" y="156" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">lexeme 数</text>
  <rect x="300" y="100" width="290" height="80" fill="#dcfce7" stroke="#16a34a"/>
  <text x="445" y="126" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">WordEntry[]</text>
  <text x="445" y="151" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">haspos / len / pos，按 lexeme 排序</text>
  <rect x="590" y="100" width="320" height="80" fill="#fef3c7" stroke="#d97706"/>
  <text x="750" y="126" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">lexeme storage</text>
  <text x="750" y="151" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">字符串 + npos + WordEntryPos[]</text>
  <rect x="130" y="235" width="170" height="58" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="215" y="258" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">WordEntryPos</text>
  <text x="215" y="280" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">2 bit weight + 14 bit pos</text>
  <rect x="375" y="235" width="210" height="58" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="480" y="258" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">限制</text>
  <text x="480" y="280" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">单词最长约 2KB，位置最多 256 个</text>
  <rect x="660" y="235" width="190" height="58" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="755" y="258" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#0f172a">strip()</text>
  <text x="755" y="280" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">移除位置和权重</text>
  <line x1="445" y1="180" x2="250" y2="235" stroke="#334155" stroke-width="2"/>
  <line x1="750" y1="180" x2="520" y2="235" stroke="#334155" stroke-width="2"/>
  <line x1="750" y1="180" x2="755" y2="235" stroke="#334155" stroke-width="2"/>
</svg>
