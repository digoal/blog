<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img">
  <title>tsvector 查询执行路径</title>
  <desc>展示 tsquery 解析、索引候选、@@ recheck、rank 排序和返回结果的执行链路。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="22" y="24" width="936" height="360" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="54" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">@@ 是过滤；rank 是排序；headline 需要原文</text>
  <rect x="70" y="95" width="150" height="78" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="145" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">用户搜索词</text>
  <text x="145" y="148" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">websearch / plain</text>
  <rect x="285" y="95" width="150" height="78" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="360" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">tsquery</text>
  <text x="360" y="148" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">&amp; | ! &lt;-&gt; :*</text>
  <rect x="500" y="95" width="150" height="78" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="575" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">GIN / GiST</text>
  <text x="575" y="148" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">候选 TID</text>
  <rect x="715" y="95" width="150" height="78" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="790" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">Heap Recheck</text>
  <text x="790" y="148" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">MVCC + 精确 @@</text>
  <rect x="245" y="260" width="180" height="72" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="335" y="288" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">ts_rank</text>
  <text x="335" y="312" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">频率 + 权重 + 归一化</text>
  <rect x="555" y="260" width="180" height="72" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="645" y="288" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">ts_headline</text>
  <text x="645" y="312" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">回原文生成摘要</text>
  <line x1="220" y1="134" x2="280" y2="134" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="435" y1="134" x2="495" y2="134" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="134" x2="710" y2="134" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M790 173 V210 C790 230 425 230 365 260" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M790 173 V210 C790 230 645 235 645 260" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
