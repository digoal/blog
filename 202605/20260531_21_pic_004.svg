<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img">
  <title>GIN 与 GiST 全文检索索引对比</title>
  <desc>展示 GIN 倒排词典和 GiST 签名索引在 tsvector 搜索中的结构差异和 recheck 原因。</desc>
  <rect x="24" y="24" width="932" height="360" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="54" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">同样支持 @@，GIN 和 GiST 的代价模型不同</text>
  <rect x="70" y="90" width="380" height="245" rx="8" fill="#ecfeff" stroke="#0891b2"/>
  <text x="260" y="122" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">GIN：倒排索引</text>
  <rect x="105" y="155" width="120" height="42" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="165" y="181" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">lexeme=search</text>
  <rect x="260" y="155" width="145" height="42" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="332" y="181" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">TID posting list</text>
  <rect x="105" y="220" width="120" height="42" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="165" y="246" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">lexeme=cat</text>
  <rect x="260" y="220" width="145" height="42" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="332" y="246" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">TID posting list</text>
  <text x="260" y="304" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#475569">优先用于全文检索；权重和短语需要回表确认</text>
  <rect x="530" y="90" width="380" height="245" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="720" y="122" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">GiST：签名索引</text>
  <rect x="575" y="155" width="290" height="60" rx="4" fill="#fed7aa" stroke="#ea580c"/>
  <text x="720" y="180" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#0f172a">文档签名：bitset(siglen)</text>
  <text x="720" y="201" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#475569">多个词 hash 到固定长度位图</text>
  <circle cx="620" cy="255" r="12" fill="#f97316"/>
  <circle cx="675" cy="255" r="12" fill="#f97316"/>
  <circle cx="730" cy="255" r="12" fill="#f97316"/>
  <circle cx="785" cy="255" r="12" fill="#f97316"/>
  <circle cx="840" cy="255" r="12" fill="#fed7aa" stroke="#ea580c"/>
  <text x="720" y="304" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#475569">签名越短误判越多；siglen 越大索引越大</text>
</svg>
