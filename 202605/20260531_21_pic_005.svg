<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img">
  <title>tsvector 生产实践闭环</title>
  <desc>展示从建模、生成列、索引、ANALYZE、查询验证、维护 GIN pending list 到效果回归的闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="360" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="54" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">全文检索不是只建一个 GIN 索引</text>
  <g font-family="Arial, sans-serif">
    <rect x="392" y="82" width="196" height="58" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="490" y="116" text-anchor="middle" font-size="15" fill="#0f172a">确定文档单元和语言配置</text>
    <rect x="635" y="152" width="196" height="58" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="733" y="186" text-anchor="middle" font-size="15" fill="#0f172a">生成列 / 表达式索引</text>
    <rect x="635" y="262" width="196" height="58" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="733" y="296" text-anchor="middle" font-size="15" fill="#0f172a">GIN/GiST 参数与维护</text>
    <rect x="392" y="310" width="196" height="58" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="490" y="344" text-anchor="middle" font-size="15" fill="#0f172a">ANALYZE 与选择率校准</text>
    <rect x="149" y="262" width="196" height="58" rx="6" fill="#fff7ed" stroke="#ea580c"/>
    <text x="247" y="296" text-anchor="middle" font-size="15" fill="#0f172a">EXPLAIN / BUFFERS 验证</text>
    <rect x="149" y="152" width="196" height="58" rx="6" fill="#fee2e2" stroke="#dc2626"/>
    <text x="247" y="186" text-anchor="middle" font-size="15" fill="#0f172a">召回、排序、摘要回归</text>
  </g>
  <path d="M588 111 C640 115 660 132 680 152" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M733 210 V257" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M635 306 C610 322 590 332 588 335" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M392 339 C350 334 310 320 300 320" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M247 262 V215" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M345 168 C375 130 392 118 392 112" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
