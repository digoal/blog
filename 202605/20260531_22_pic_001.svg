<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">range 的逻辑模型与常用操作符</title>
  <desc id="desc">展示 range 如何把两个边界之间的连续或离散点集表示成一个值，并解释包含、重叠、相邻和左右关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="978" height="518" fill="#ffffff" stroke="#d5dde5"/>
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2a33">从两个边界到可操作的点集</text>
  <text x="40" y="86" font-family="Arial, sans-serif" font-size="16" fill="#52616f">range 保存 lower / upper / inclusive / infinite / empty 语义，操作符直接描述集合关系。</text>

  <line x1="90" y1="170" x2="880" y2="170" stroke="#9aa8b5" stroke-width="3" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" font-size="15" fill="#44515c">
    <text x="86" y="145">0</text>
    <text x="245" y="145">10</text>
    <text x="405" y="145">20</text>
    <text x="565" y="145">30</text>
    <text x="725" y="145">40</text>
    <text x="875" y="145">50</text>
  </g>
  <g stroke="#9aa8b5" stroke-width="2">
    <line x1="95" y1="158" x2="95" y2="182"/>
    <line x1="255" y1="158" x2="255" y2="182"/>
    <line x1="415" y1="158" x2="415" y2="182"/>
    <line x1="575" y1="158" x2="575" y2="182"/>
    <line x1="735" y1="158" x2="735" y2="182"/>
    <line x1="880" y1="158" x2="880" y2="182"/>
  </g>

  <g font-family="Arial, sans-serif">
    <text x="40" y="228" font-size="17" font-weight="700" fill="#1f2a33">A = [10, 30)</text>
    <line x1="255" y1="250" x2="575" y2="250" stroke="#2c7fb8" stroke-width="16" stroke-linecap="butt"/>
    <circle cx="255" cy="250" r="12" fill="#ffffff" stroke="#2c7fb8" stroke-width="4"/>
    <circle cx="575" cy="250" r="12" fill="#ffffff" stroke="#2c7fb8" stroke-width="4"/>
    <circle cx="255" cy="250" r="7" fill="#2c7fb8"/>
    <circle cx="575" cy="250" r="7" fill="#ffffff"/>
    <text x="600" y="256" font-size="15" fill="#52616f">包含 10，不包含 30</text>

    <text x="40" y="310" font-size="17" font-weight="700" fill="#1f2a33">B = [20, 40)</text>
    <line x1="415" y1="332" x2="735" y2="332" stroke="#f28e2b" stroke-width="16"/>
    <circle cx="415" cy="332" r="12" fill="#ffffff" stroke="#f28e2b" stroke-width="4"/>
    <circle cx="735" cy="332" r="12" fill="#ffffff" stroke="#f28e2b" stroke-width="4"/>
    <circle cx="415" cy="332" r="7" fill="#f28e2b"/>
    <circle cx="735" cy="332" r="7" fill="#ffffff"/>
    <text x="600" y="338" font-size="15" fill="#52616f">A &amp;&amp; B 为真，交集是 [20,30)</text>

    <text x="40" y="392" font-size="17" font-weight="700" fill="#1f2a33">C = [30, 40)</text>
    <line x1="575" y1="414" x2="735" y2="414" stroke="#59a14f" stroke-width="16"/>
    <circle cx="575" cy="414" r="12" fill="#ffffff" stroke="#59a14f" stroke-width="4"/>
    <circle cx="735" cy="414" r="12" fill="#ffffff" stroke="#59a14f" stroke-width="4"/>
    <circle cx="575" cy="414" r="7" fill="#59a14f"/>
    <circle cx="735" cy="414" r="7" fill="#ffffff"/>
    <text x="600" y="420" font-size="15" fill="#52616f">A -|- C 为真，但 A &amp;&amp; C 为假</text>
  </g>

  <g transform="translate(730,215)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="210" height="200" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <text x="18" y="34" font-size="17" font-weight="700" fill="#1f2a33">常用关系</text>
    <text x="18" y="70" font-size="15" fill="#374151">@&gt; 包含</text>
    <text x="18" y="100" font-size="15" fill="#374151">&lt;@ 被包含</text>
    <text x="18" y="130" font-size="15" fill="#374151">&amp;&amp; 重叠</text>
    <text x="18" y="160" font-size="15" fill="#374151">-|- 相邻</text>
    <text x="18" y="190" font-size="15" fill="#374151">&lt;&lt; / &gt;&gt; 严格在左/右</text>
  </g>
</svg>
