<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">RangeType 物理表示与 canonical 归一化</title>
  <desc id="desc">展示 PostgreSQL RangeType 的 varlena 存储布局，以及离散 range 如何通过 canonical 函数统一边界表示。</desc>
  <rect x="1" y="1" width="978" height="538" fill="#ffffff" stroke="#d5dde5"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2a33">RangeType：一个值里保存类型、边界和 flags</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="16" fill="#52616f">源码 rangetypes.c 注释给出的序列化格式：varlena header + range OID + 0-2 个边界值 + 1 字节 flags。</text>

  <g transform="translate(60,140)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="145" height="86" rx="6" fill="#e8f1f8" stroke="#2c7fb8"/>
    <text x="20" y="35" font-size="16" font-weight="700" fill="#1f2a33">4 bytes</text>
    <text x="20" y="62" font-size="15" fill="#374151">varlena header</text>

    <rect x="145" y="0" width="145" height="86" rx="6" fill="#eef7ed" stroke="#59a14f"/>
    <text x="165" y="35" font-size="16" font-weight="700" fill="#1f2a33">4 bytes</text>
    <text x="165" y="62" font-size="15" fill="#374151">rangetypid</text>

    <rect x="290" y="0" width="210" height="86" rx="6" fill="#fff4e6" stroke="#f28e2b"/>
    <text x="313" y="35" font-size="16" font-weight="700" fill="#1f2a33">lower bound</text>
    <text x="313" y="62" font-size="15" fill="#374151">按 subtype 对齐</text>

    <rect x="500" y="0" width="210" height="86" rx="6" fill="#fff4e6" stroke="#f28e2b"/>
    <text x="523" y="35" font-size="16" font-weight="700" fill="#1f2a33">upper bound</text>
    <text x="523" y="62" font-size="15" fill="#374151">可能缺省为无界</text>

    <rect x="710" y="0" width="130" height="86" rx="6" fill="#f2eef8" stroke="#8b6fcb"/>
    <text x="733" y="35" font-size="16" font-weight="700" fill="#1f2a33">1 byte</text>
    <text x="733" y="62" font-size="15" fill="#374151">flags</text>
  </g>

  <g transform="translate(70,280)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#1f2a33">flags 负责保存边界语义</text>
    <rect x="0" y="25" width="395" height="165" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <text x="22" y="60" font-size="15" fill="#374151">RANGE_EMPTY：空 range</text>
    <text x="22" y="92" font-size="15" fill="#374151">RANGE_LB_INC / RANGE_UB_INC：边界是否闭合</text>
    <text x="22" y="124" font-size="15" fill="#374151">RANGE_LB_INF / RANGE_UB_INF：是否无界</text>
    <text x="22" y="156" font-size="15" fill="#374151">RANGE_CONTAIN_EMPTY：GiST 内部项包含空 range</text>
  </g>

  <g transform="translate(535,280)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#1f2a33">离散类型需要 canonical</text>
    <rect x="0" y="25" width="370" height="165" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <text x="24" y="60" font-size="16" fill="#374151">int4range(1, 10, '[]')</text>
    <path d="M 190 79 C 230 88, 230 108, 190 118" fill="none" stroke="#2f4858" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="24" y="135" font-size="16" fill="#374151">int4range(1, 11, '[)')</text>
    <text x="24" y="168" font-size="14" fill="#52616f">同一组整数点集必须有同一表示，等值、索引和约束才稳定。</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
  </defs>
</svg>
