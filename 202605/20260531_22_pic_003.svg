<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">range 的 GiST 与 SP-GiST 索引路径</title>
  <desc id="desc">对比 range 在 GiST 中用覆盖范围剪枝，在 SP-GiST 中映射为 lower 和 upper 两个维度做空间划分。</desc>
  <rect x="1" y="1" width="978" height="558" fill="#ffffff" stroke="#d5dde5"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2a33">索引不是排序 range，而是剪掉不可能命中的范围</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="16" fill="#52616f">GiST 用 union range 作为内部谓词；SP-GiST 把 range 映射为二维点 lower/upper 并按象限路由。</text>

  <g transform="translate(55,135)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#1f2a33">GiST：树节点保存覆盖范围</text>
    <rect x="0" y="25" width="410" height="340" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <rect x="135" y="55" width="150" height="52" rx="6" fill="#e8f1f8" stroke="#2c7fb8"/>
    <text x="160" y="88" font-size="16" fill="#1f2a33">[1, 100)</text>
    <path d="M 185 108 L 90 160" stroke="#52616f" stroke-width="2"/>
    <path d="M 235 108 L 330 160" stroke="#52616f" stroke-width="2"/>
    <rect x="35" y="160" width="135" height="48" rx="6" fill="#eef7ed" stroke="#59a14f"/>
    <text x="60" y="190" font-size="15" fill="#1f2a33">[1, 45)</text>
    <rect x="250" y="160" width="135" height="48" rx="6" fill="#fff4e6" stroke="#f28e2b"/>
    <text x="275" y="190" font-size="15" fill="#1f2a33">[40, 100)</text>
    <path d="M 100 209 L 60 260" stroke="#52616f" stroke-width="2"/>
    <path d="M 120 209 L 165 260" stroke="#52616f" stroke-width="2"/>
    <path d="M 315 209 L 270 260" stroke="#52616f" stroke-width="2"/>
    <path d="M 335 209 L 360 260" stroke="#52616f" stroke-width="2"/>
    <rect x="20" y="260" width="90" height="40" rx="5" fill="#ffffff" stroke="#9aa8b5"/>
    <text x="38" y="285" font-size="13" fill="#374151">[5,10)</text>
    <rect x="125" y="260" width="90" height="40" rx="5" fill="#ffffff" stroke="#9aa8b5"/>
    <text x="142" y="285" font-size="13" fill="#374151">[30,45)</text>
    <rect x="230" y="260" width="90" height="40" rx="5" fill="#ffffff" stroke="#9aa8b5"/>
    <text x="247" y="285" font-size="13" fill="#374151">[40,60)</text>
    <rect x="335" y="260" width="90" height="40" rx="5" fill="#ffffff" stroke="#9aa8b5"/>
    <text x="350" y="285" font-size="13" fill="#374151">[80,99)</text>
    <text x="24" y="330" font-size="14" fill="#52616f">查询 &amp;&amp; [35,50)：左、右子树都可能命中；</text>
    <text x="24" y="354" font-size="14" fill="#52616f">查询 &amp;&amp; [70,75)：左子树可直接剪掉。</text>
  </g>

  <g transform="translate(535,135)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#1f2a33">SP-GiST：lower / upper 二维划分</text>
    <rect x="0" y="25" width="390" height="340" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <line x1="55" y1="300" x2="345" y2="300" stroke="#9aa8b5" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="55" y1="300" x2="55" y2="60" stroke="#9aa8b5" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="305" y="325" font-size="14" fill="#52616f">lower</text>
    <text x="15" y="72" font-size="14" fill="#52616f">upper</text>
    <line x1="190" y1="300" x2="190" y2="60" stroke="#b8c2cc" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="55" y1="180" x2="345" y2="180" stroke="#b8c2cc" stroke-width="2" stroke-dasharray="5 5"/>
    <circle cx="190" cy="180" r="7" fill="#2c7fb8"/>
    <text x="205" y="185" font-size="14" fill="#1f2a33">centroid</text>
    <text x="245" y="110" font-size="16" fill="#374151">象限 1</text>
    <text x="245" y="250" font-size="16" fill="#374151">象限 2</text>
    <text x="95" y="250" font-size="16" fill="#374151">象限 3</text>
    <text x="95" y="110" font-size="16" fill="#374151">象限 4</text>
    <circle cx="120" cy="245" r="6" fill="#59a14f"/>
    <circle cx="155" cy="220" r="6" fill="#59a14f"/>
    <circle cx="260" cy="135" r="6" fill="#f28e2b"/>
    <circle cx="300" cy="100" r="6" fill="#f28e2b"/>
    <circle cx="275" cy="240" r="6" fill="#8b6fcb"/>
    <circle cx="130" cy="120" r="6" fill="#8b6fcb"/>
    <text x="38" y="340" font-size="14" fill="#52616f">空 range 没有边界，根节点可有第 5 象限专门处理。</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa8b5"/>
    </marker>
  </defs>
</svg>
