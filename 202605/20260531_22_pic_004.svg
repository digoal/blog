<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">range 在时态建模中的实践路径</title>
  <desc id="desc">展示业务状态随时间变化时，range 如何用半开区间表示版本有效期，并通过 WITHOUT OVERLAPS 或排他约束防止同一实体时间重叠。</desc>
  <rect x="1" y="1" width="978" height="558" fill="#ffffff" stroke="#d5dde5"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2a33">时态建模：把“每一刻有效”压缩成少量区间</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="16" fill="#52616f">半开区间 [start, end) 让相邻版本无缝衔接而不重叠，是价格、排班、权限、租约等场景的核心模式。</text>

  <g transform="translate(70,145)" font-family="Arial, sans-serif">
    <line x1="80" y1="80" x2="850" y2="80" stroke="#9aa8b5" stroke-width="3" marker-end="url(#arrow)"/>
    <g stroke="#9aa8b5" stroke-width="2" fill="#52616f" font-size="14">
      <line x1="120" y1="68" x2="120" y2="92"/>
      <line x1="330" y1="68" x2="330" y2="92"/>
      <line x1="540" y1="68" x2="540" y2="92"/>
      <line x1="750" y1="68" x2="750" y2="92"/>
      <text x="84" y="48">2020-01-01</text>
      <text x="294" y="48">2022-01-01</text>
      <text x="504" y="48">2024-01-01</text>
      <text x="714" y="48">未来</text>
    </g>

    <text x="0" y="150" font-size="17" font-weight="700" fill="#1f2a33">product_no = 5</text>
    <rect x="120" y="125" width="210" height="44" rx="6" fill="#e8f1f8" stroke="#2c7fb8"/>
    <text x="165" y="153" font-size="15" fill="#1f2a33">price = 5.00</text>
    <rect x="330" y="125" width="420" height="44" rx="6" fill="#eef7ed" stroke="#59a14f"/>
    <text x="470" y="153" font-size="15" fill="#1f2a33">price = 8.00</text>
    <text x="770" y="153" font-size="14" fill="#52616f">相邻但不重叠</text>

    <text x="0" y="235" font-size="17" font-weight="700" fill="#1f2a33">product_no = 6</text>
    <rect x="225" y="210" width="315" height="44" rx="6" fill="#fff4e6" stroke="#f28e2b"/>
    <text x="330" y="238" font-size="15" fill="#1f2a33">price = 9.00</text>

    <rect x="85" y="315" width="355" height="110" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <text x="110" y="350" font-size="17" font-weight="700" fill="#1f2a33">约束表达</text>
    <text x="110" y="382" font-size="15" fill="#374151">PRIMARY KEY (id, valid_at WITHOUT OVERLAPS)</text>
    <text x="110" y="412" font-size="15" fill="#374151">或 EXCLUDE USING gist (id WITH =, valid_at WITH &amp;&amp;)</text>

    <rect x="500" y="315" width="355" height="110" rx="8" fill="#f7fafc" stroke="#d5dde5"/>
    <text x="525" y="350" font-size="17" font-weight="700" fill="#1f2a33">查询表达</text>
    <text x="525" y="382" font-size="15" fill="#374151">valid_at @&gt; DATE '2023-01-01'</text>
    <text x="525" y="412" font-size="15" fill="#374151">valid_at &amp;&amp; daterange(:start, :end)</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa8b5"/>
    </marker>
  </defs>
</svg>
