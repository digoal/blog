<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">range 生产实践闭环</title>
  <desc id="desc">展示从业务语义、类型选择、约束、索引、统计信息到验证和运维的 range 实践闭环。</desc>
  <rect x="1" y="1" width="978" height="538" fill="#ffffff" stroke="#d5dde5"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2a33">生产闭环：先定语义，再谈索引</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="16" fill="#52616f">range 的坑多数不是语法问题，而是边界、空值、约束和统计信息没有一起设计。</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#1f2a33" stroke="#d5dde5" stroke-width="1.4">
    <rect x="390" y="125" width="205" height="70" rx="8" fill="#e8f1f8"/>
    <text x="428" y="156" font-weight="700">1. 定义业务点集</text>
    <text x="413" y="181" fill="#52616f">时间、价格、序号、额度</text>

    <rect x="680" y="205" width="205" height="70" rx="8" fill="#eef7ed"/>
    <text x="714" y="236" font-weight="700">2. 选择 range 类型</text>
    <text x="710" y="261" fill="#52616f">离散 / 连续 / multirange</text>

    <rect x="610" y="365" width="205" height="70" rx="8" fill="#fff4e6"/>
    <text x="645" y="396" font-weight="700">3. 加约束</text>
    <text x="636" y="421" fill="#52616f">非空、半开、无重叠</text>

    <rect x="390" y="420" width="205" height="70" rx="8" fill="#f2eef8"/>
    <text x="424" y="451" font-weight="700">4. 建索引</text>
    <text x="414" y="476" fill="#52616f">GiST / SP-GiST / equality</text>

    <rect x="165" y="365" width="205" height="70" rx="8" fill="#e8f1f8"/>
    <text x="200" y="396" font-weight="700">5. ANALYZE</text>
    <text x="195" y="421" fill="#52616f">边界直方图、长度直方图</text>

    <rect x="95" y="205" width="205" height="70" rx="8" fill="#eef7ed"/>
    <text x="131" y="236" font-weight="700">6. 验证查询</text>
    <text x="121" y="261" fill="#52616f">EXPLAIN、冲突样本、边界样本</text>
  </g>

  <g fill="none" stroke="#2f4858" stroke-width="2.4" marker-end="url(#arrow)">
    <path d="M 595 160 C 650 165, 690 185, 725 205"/>
    <path d="M 780 275 C 785 315, 760 345, 725 365"/>
    <path d="M 610 420 C 585 438, 570 447, 595 455"/>
    <path d="M 390 455 C 340 450, 310 435, 285 435"/>
    <path d="M 185 365 C 150 330, 135 300, 155 275"/>
    <path d="M 300 205 C 340 175, 365 165, 390 160"/>
  </g>

  <g transform="translate(355,235)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="270" height="95" rx="8" fill="#ffffff" stroke="#d5dde5"/>
    <text x="28" y="35" font-size="17" font-weight="700" fill="#1f2a33">验证目标</text>
    <text x="28" y="63" font-size="14" fill="#52616f">没有伪造性能数字；用真实数据看误估、冲突、回表。</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
  </defs>
</svg>
