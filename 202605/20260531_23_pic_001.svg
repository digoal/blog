<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">ArrayType 物理结构</title>
  <desc id="desc">PostgreSQL 普通数组的 varlena 头、维度、下界、可选 NULL 位图和按行优先顺序存储的数据。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    .box { stroke: #24324a; stroke-width: 2; rx: 8; }
    .soft { fill: #f5f7fb; }
    .header { fill: #d9e7ff; }
    .meta { fill: #dff3e6; }
    .nulls { fill: #fff1cc; }
    .data { fill: #f1ddff; }
    .arrow { stroke: #40506b; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
    .grid { stroke: #ffffff; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#40506b"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1060" height="580" fill="#ffffff" stroke="#d8dee9" stroke-width="1"/>
  <text x="50" y="62" class="title">数组不是逗号分隔字符串，而是带维度元数据的 varlena 值</text>

  <g transform="translate(55,105)">
    <rect x="0" y="0" width="128" height="96" class="box header"/>
    <text x="20" y="38" class="label">vl_len_</text>
    <text x="18" y="66" class="small">总字节数</text>

    <rect x="128" y="0" width="128" height="96" class="box meta"/>
    <text x="164" y="38" class="label">ndim</text>
    <text x="150" y="66" class="small">维度数</text>

    <rect x="256" y="0" width="154" height="96" class="box meta"/>
    <text x="282" y="38" class="label">dataoffset</text>
    <text x="276" y="66" class="small">0 或数据偏移</text>

    <rect x="410" y="0" width="138" height="96" class="box meta"/>
    <text x="444" y="38" class="label">elemtype</text>
    <text x="450" y="66" class="small">元素 OID</text>

    <rect x="548" y="0" width="160" height="96" class="box soft"/>
    <text x="578" y="38" class="label">dims[]</text>
    <text x="568" y="66" class="small">每维长度</text>

    <rect x="708" y="0" width="160" height="96" class="box soft"/>
    <text x="734" y="38" class="label">lbound[]</text>
    <text x="728" y="66" class="small">每维下界</text>

    <rect x="868" y="0" width="142" height="96" class="box nulls"/>
    <text x="895" y="38" class="label">bitmap</text>
    <text x="884" y="66" class="small">可选 NULL 位图</text>
  </g>

  <path d="M940 205 C940 250 830 260 744 284" class="arrow"/>
  <text x="765" y="252" class="small">有 NULL 时存在；无 NULL 时 dataoffset=0</text>

  <g transform="translate(120,310)">
    <text x="0" y="-28" class="label">示例：二维 int 数组 ARRAY[[10,20,30],[40,50,60]]</text>
    <rect x="0" y="0" width="720" height="180" fill="#fbfcff" stroke="#d8dee9" stroke-width="2" rx="8"/>
    <text x="28" y="40" class="small">ndim = 2</text>
    <text x="28" y="75" class="small">dims = [2, 3]</text>
    <text x="28" y="110" class="small">lbound = [1, 1]</text>
    <text x="28" y="145" class="small">元素按行优先顺序存放：最后一个下标变化最快</text>

    <g transform="translate(320,36)">
      <rect x="0" y="0" width="88" height="54" class="box data"/>
      <rect x="88" y="0" width="88" height="54" class="box data"/>
      <rect x="176" y="0" width="88" height="54" class="box data"/>
      <rect x="264" y="0" width="88" height="54" class="box data"/>
      <rect x="352" y="0" width="88" height="54" class="box data"/>
      <rect x="440" y="0" width="88" height="54" class="box data"/>
      <text x="29" y="34" class="label">10</text>
      <text x="117" y="34" class="label">20</text>
      <text x="205" y="34" class="label">30</text>
      <text x="293" y="34" class="label">40</text>
      <text x="381" y="34" class="label">50</text>
      <text x="469" y="34" class="label">60</text>
      <text x="7" y="88" class="tiny">[1][1]</text>
      <text x="95" y="88" class="tiny">[1][2]</text>
      <text x="183" y="88" class="tiny">[1][3]</text>
      <text x="271" y="88" class="tiny">[2][1]</text>
      <text x="359" y="88" class="tiny">[2][2]</text>
      <text x="447" y="88" class="tiny">[2][3]</text>
    </g>
  </g>

  <g transform="translate(880,338)">
    <rect x="0" y="0" width="160" height="116" fill="#fff8ea" stroke="#d99b1f" stroke-width="2" rx="8"/>
    <text x="18" y="34" class="label">限制</text>
    <text x="18" y="66" class="small">MAXDIM = 6</text>
    <text x="18" y="94" class="small">元素数受 MaxArraySize 约束</text>
  </g>
</svg>
