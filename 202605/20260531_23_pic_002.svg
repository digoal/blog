<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">Array 操作符语义</title>
  <desc id="desc">数组包含、被包含、重叠、ANY 和 ALL 的集合语义与 NULL、重复元素的影响。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 8; }
    .setA { fill: #d9e7ff; stroke: #2e65b8; stroke-width: 2; }
    .setB { fill: #e3f7df; stroke: #2f8a43; stroke-width: 2; }
    .warn { fill: #fff1cc; stroke: #d99b1f; stroke-width: 2; rx: 8; }
    .arrow { stroke: #40506b; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#40506b"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1060" height="610" fill="#ffffff" stroke="#d8dee9" stroke-width="1"/>
  <text x="50" y="62" class="title">数组关系操作符主要看“元素是否出现”，不是看位置和重复次数</text>

  <g transform="translate(55,100)">
    <rect x="0" y="0" width="310" height="220" class="panel"/>
    <text x="24" y="38" class="label">@&gt; 包含</text>
    <ellipse cx="138" cy="118" rx="95" ry="65" class="setA"/>
    <ellipse cx="160" cy="118" rx="46" ry="32" class="setB"/>
    <text x="66" y="116" class="small">ARRAY[1,4,3]</text>
    <text x="134" y="124" class="small">[3,1,3]</text>
    <text x="24" y="196" class="small">重复元素不特殊处理：有 3 即可匹配多个 3</text>
  </g>

  <g transform="translate(395,100)">
    <rect x="0" y="0" width="310" height="220" class="panel"/>
    <text x="24" y="38" class="label">&amp;&amp; 重叠</text>
    <ellipse cx="128" cy="118" rx="78" ry="58" class="setA"/>
    <ellipse cx="178" cy="118" rx="78" ry="58" class="setB"/>
    <text x="83" y="116" class="small">1,4,3</text>
    <text x="170" y="116" class="small">2,1</text>
    <text x="145" y="146" class="label">1</text>
    <text x="24" y="196" class="small">任意一个非 NULL 元素相等，就返回 true</text>
  </g>

  <g transform="translate(735,100)">
    <rect x="0" y="0" width="310" height="220" class="panel"/>
    <text x="24" y="38" class="label">= ANY / = ALL</text>
    <rect x="44" y="76" width="64" height="46" fill="#d9e7ff" stroke="#2e65b8" stroke-width="2" rx="6"/>
    <text x="66" y="106" class="label">x</text>
    <path d="M112 99 H170" class="arrow"/>
    <rect x="176" y="70" width="92" height="58" fill="#f1ddff" stroke="#8055a2" stroke-width="2" rx="6"/>
    <text x="191" y="104" class="small">数组元素</text>
    <text x="24" y="166" class="small">ANY：至少一个比较为 true</text>
    <text x="24" y="194" class="small">ALL：所有比较都为 true</text>
  </g>

  <g transform="translate(95,380)">
    <rect x="0" y="0" width="420" height="170" class="warn"/>
    <text x="24" y="38" class="label">NULL 语义</text>
    <text x="24" y="72" class="small">数组列为 NULL：不是空数组，比较结果通常为 NULL。</text>
    <text x="24" y="104" class="small">元素为 NULL：@&gt; / &amp;&amp; 的匹配不会把 NULL 当成普通值。</text>
    <text x="24" y="136" class="small">ANY / ALL 遵守 SQL 三值逻辑。</text>
  </g>

  <g transform="translate(585,380)">
    <rect x="0" y="0" width="420" height="170" fill="#eef7ff" stroke="#3a77b8" stroke-width="2" rx="8"/>
    <text x="24" y="38" class="label">位置语义</text>
    <text x="24" y="72" class="small">@&gt;、&lt;@、&amp;&amp; 忽略维度信息，只看元素关系。</text>
    <text x="24" y="104" class="small">普通比较运算符会按行优先顺序逐元素比较。</text>
    <text x="24" y="136" class="small">下标访问、切片、array_dims 仍保留维度和下界。</text>
  </g>
</svg>
