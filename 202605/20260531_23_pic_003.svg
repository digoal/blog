<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">数组 GIN 索引路径</title>
  <desc id="desc">数组值被拆成元素 key，GIN entry tree 维护 key 到 heap TID posting list 或 posting tree 的倒排关系，查询再由策略函数组合候选。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    .box { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 8; }
    .row { fill: #f5f7fb; stroke: #9aa8bd; stroke-width: 1.5; rx: 6; }
    .key { fill: #d9e7ff; stroke: #2e65b8; stroke-width: 2; rx: 6; }
    .posting { fill: #e3f7df; stroke: #2f8a43; stroke-width: 2; rx: 6; }
    .strategy { fill: #fff1cc; stroke: #d99b1f; stroke-width: 2; rx: 8; }
    .arrow { stroke: #40506b; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#40506b"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1080" height="640" fill="#ffffff" stroke="#d8dee9" stroke-width="1"/>
  <text x="50" y="62" class="title">GIN 把一行里的数组元素倒排成 key -> 行指针集合</text>

  <g transform="translate(55,105)">
    <rect x="0" y="0" width="300" height="240" class="box"/>
    <text x="24" y="38" class="label">堆表行</text>
    <rect x="28" y="68" width="238" height="42" class="row"/>
    <text x="42" y="95" class="small">T1: tags = {pg,array}</text>
    <rect x="28" y="122" width="238" height="42" class="row"/>
    <text x="42" y="149" class="small">T2: tags = {pg,gin}</text>
    <rect x="28" y="176" width="238" height="42" class="row"/>
    <text x="42" y="203" class="small">T3: tags = {json,array}</text>
  </g>

  <path d="M360 210 C410 210 430 210 480 210" class="arrow"/>
  <text x="390" y="188" class="small">ginarrayextract</text>

  <g transform="translate(480,105)">
    <rect x="0" y="0" width="250" height="240" class="box"/>
    <text x="24" y="38" class="label">entry tree</text>
    <rect x="36" y="70" width="170" height="42" class="key"/>
    <text x="88" y="97" class="small">array</text>
    <rect x="36" y="124" width="170" height="42" class="key"/>
    <text x="99" y="151" class="small">gin</text>
    <rect x="36" y="178" width="170" height="42" class="key"/>
    <text x="103" y="205" class="small">pg</text>
  </g>

  <path d="M730 210 C780 210 790 210 840 210" class="arrow"/>

  <g transform="translate(840,105)">
    <rect x="0" y="0" width="225" height="240" class="box"/>
    <text x="24" y="38" class="label">posting</text>
    <rect x="30" y="70" width="150" height="42" class="posting"/>
    <text x="61" y="97" class="small">array -> T1,T3</text>
    <rect x="30" y="124" width="150" height="42" class="posting"/>
    <text x="72" y="151" class="small">gin -> T2</text>
    <rect x="30" y="178" width="150" height="42" class="posting"/>
    <text x="74" y="205" class="small">pg -> T1,T2</text>
  </g>

  <g transform="translate(90,410)">
    <rect x="0" y="0" width="940" height="170" class="strategy"/>
    <text x="24" y="38" class="label">查询策略由 opclass 支持函数解释</text>
    <text x="24" y="75" class="small">&amp;&amp; overlap：至少一个非 NULL 查询 key 命中，通常不需要 recheck。</text>
    <text x="24" y="108" class="small">@&gt; contains：查询数组的所有非 NULL key 都要命中，查询含 NULL 时不能用 key 证明包含。</text>
    <text x="24" y="141" class="small">&lt;@ contained 与 =：仅靠 key 很难证明“没有额外元素”或维度完全相同，因此需要 recheck。</text>
  </g>
</svg>
