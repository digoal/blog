<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">数组统计信息与选择率估算</title>
  <desc id="desc">ANALYZE 对数组列收集 most common elements 和 distinct element count histogram，优化器用它估算 @&gt;、&amp;&amp;、&lt;@ 和 = ANY 查询选择率。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    .box { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 8; }
    .blue { fill: #d9e7ff; stroke: #2e65b8; stroke-width: 2; rx: 6; }
    .green { fill: #e3f7df; stroke: #2f8a43; stroke-width: 2; rx: 6; }
    .purple { fill: #f1ddff; stroke: #8055a2; stroke-width: 2; rx: 6; }
    .warn { fill: #fff1cc; stroke: #d99b1f; stroke-width: 2; rx: 8; }
    .arrow { stroke: #40506b; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#40506b"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1080" height="610" fill="#ffffff" stroke="#d8dee9" stroke-width="1"/>
  <text x="50" y="62" class="title">优化器需要知道“哪些元素常见”和“每行有多少不同元素”</text>

  <g transform="translate(55,105)">
    <rect x="0" y="0" width="250" height="190" class="box"/>
    <text x="24" y="38" class="label">采样数组列</text>
    <text x="24" y="75" class="small">{pg,array,gin}</text>
    <text x="24" y="107" class="small">{pg,json}</text>
    <text x="24" y="139" class="small">{array,sql,sql}</text>
  </g>

  <path d="M315 200 H420" class="arrow"/>
  <text x="335" y="178" class="small">array_typanalyze</text>

  <g transform="translate(420,105)">
    <rect x="0" y="0" width="290" height="190" class="box"/>
    <text x="24" y="38" class="label">去重计数</text>
    <rect x="30" y="65" width="90" height="42" class="blue"/>
    <text x="52" y="92" class="small">pg</text>
    <rect x="130" y="65" width="90" height="42" class="blue"/>
    <text x="151" y="92" class="small">array</text>
    <rect x="30" y="122" width="190" height="42" class="green"/>
    <text x="48" y="149" class="small">每行不同元素数</text>
  </g>

  <path d="M720 200 H825" class="arrow"/>

  <g transform="translate(825,105)">
    <rect x="0" y="0" width="235" height="190" class="box"/>
    <text x="24" y="38" class="label">pg_statistic</text>
    <text x="24" y="76" class="small">MCELEM</text>
    <text x="24" y="108" class="small">元素出现频率</text>
    <text x="24" y="140" class="small">DECHIST</text>
    <text x="24" y="168" class="small">不同元素个数直方图</text>
  </g>

  <g transform="translate(90,365)">
    <rect x="0" y="0" width="450" height="170" class="purple"/>
    <text x="24" y="38" class="label">arraycontsel</text>
    <text x="24" y="73" class="small">估算 @&gt;、&amp;&amp;、&lt;@ 的过滤比例。</text>
    <text x="24" y="106" class="small">= ANY(array_var) 可转化为 array_var @&gt; ARRAY[const] 估算。</text>
    <text x="24" y="139" class="small">统计不足时退回默认选择率。</text>
  </g>

  <g transform="translate(590,365)">
    <rect x="0" y="0" width="450" height="170" class="warn"/>
    <text x="24" y="38" class="label">工程含义</text>
    <text x="24" y="73" class="small">数组元素分布偏斜时，ANALYZE 对计划质量很关键。</text>
    <text x="24" y="106" class="small">超宽数组分析会被跳过，避免采样阶段消耗过大。</text>
    <text x="24" y="139" class="small">必要时提高列级 statistics target。</text>
  </g>
</svg>
