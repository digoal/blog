<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">数组建模决策</title>
  <desc id="desc">应用建模时在 array、关系表、jsonb、range 和向量之间选择的决策路径。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .node { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 8; }
    .good { fill: #e3f7df; stroke: #2f8a43; stroke-width: 2; rx: 8; }
    .warn { fill: #fff1cc; stroke: #d99b1f; stroke-width: 2; rx: 8; }
    .blue { fill: #d9e7ff; stroke: #2e65b8; stroke-width: 2; rx: 8; }
    .purple { fill: #f1ddff; stroke: #8055a2; stroke-width: 2; rx: 8; }
    .arrow { stroke: #40506b; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#40506b"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1080" height="660" fill="#ffffff" stroke="#d8dee9" stroke-width="1"/>
  <text x="50" y="62" class="title">array 是“小集合字段”的工具，不是替代关系模型的万能容器</text>

  <g transform="translate(420,95)">
    <rect x="0" y="0" width="280" height="78" class="blue"/>
    <text x="26" y="32" class="label">一行里是否天然拥有一组同类型值？</text>
    <text x="26" y="58" class="small">标签、角色、候选 ID、固定周期数值</text>
  </g>

  <path d="M560 173 V230" class="arrow"/>

  <g transform="translate(390,230)">
    <rect x="0" y="0" width="340" height="82" class="node"/>
    <text x="24" y="34" class="label">需要频繁按单个元素增删改、审计、外键？</text>
    <text x="24" y="61" class="small">例如订单明细、成员关系、权限授权流水</text>
  </g>

  <path d="M390 270 H210" class="arrow"/>
  <path d="M730 270 H910" class="arrow"/>

  <g transform="translate(55,225)">
    <rect x="0" y="0" width="155" height="92" class="warn"/>
    <text x="24" y="36" class="label">是</text>
    <text x="24" y="66" class="small">拆成子表</text>
  </g>

  <g transform="translate(910,225)">
    <rect x="0" y="0" width="155" height="92" class="good"/>
    <text x="24" y="36" class="label">否</text>
    <text x="24" y="66" class="small">继续判断</text>
  </g>

  <path d="M988 317 V385 H730" class="arrow"/>

  <g transform="translate(390,385)">
    <rect x="0" y="0" width="340" height="82" class="node"/>
    <text x="24" y="34" class="label">值是否结构异构或键名经常变化？</text>
    <text x="24" y="61" class="small">例如埋点属性、第三方回调、半结构化配置</text>
  </g>

  <path d="M390 426 H210" class="arrow"/>
  <path d="M730 426 H910" class="arrow"/>

  <g transform="translate(55,381)">
    <rect x="0" y="0" width="155" height="92" class="purple"/>
    <text x="24" y="36" class="label">是</text>
    <text x="24" y="66" class="small">考虑 jsonb</text>
  </g>

  <g transform="translate(910,381)">
    <rect x="0" y="0" width="155" height="92" class="good"/>
    <text x="24" y="36" class="label">否</text>
    <text x="24" y="66" class="small">array 合适</text>
  </g>

  <g transform="translate(175,545)">
    <rect x="0" y="0" width="770" height="95" class="blue"/>
    <text x="24" y="34" class="label">array 的舒适区</text>
    <text x="24" y="63" class="small">同类型、元素数量受控、整列读写多于局部更新、主要查询是包含/重叠/成员判断。</text>
  </g>
</svg>
