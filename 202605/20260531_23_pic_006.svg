<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">数组应用实践闭环</title>
  <desc id="desc">数组字段从建模、约束、索引、统计、查询验证到演化拆表的运维闭环。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .node { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 8; }
    .blue { fill: #d9e7ff; stroke: #2e65b8; stroke-width: 2; rx: 8; }
    .green { fill: #e3f7df; stroke: #2f8a43; stroke-width: 2; rx: 8; }
    .warn { fill: #fff1cc; stroke: #d99b1f; stroke-width: 2; rx: 8; }
    .arrow { stroke: #40506b; stroke-width: 2.3; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#40506b"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1080" height="620" fill="#ffffff" stroke="#d8dee9" stroke-width="1"/>
  <text x="50" y="62" class="title">生产中使用 array，要把建模、索引和演化一起设计</text>

  <g transform="translate(90,120)">
    <rect x="0" y="0" width="210" height="95" class="blue"/>
    <text x="24" y="34" class="label">1. 建模</text>
    <text x="24" y="63" class="small">同类型、小集合、整行语义</text>
  </g>
  <g transform="translate(455,90)">
    <rect x="0" y="0" width="210" height="95" class="node"/>
    <text x="24" y="34" class="label">2. 约束</text>
    <text x="24" y="63" class="small">NOT NULL、长度、去重、排序</text>
  </g>
  <g transform="translate(820,120)">
    <rect x="0" y="0" width="210" height="95" class="green"/>
    <text x="24" y="34" class="label">3. 索引</text>
    <text x="24" y="63" class="small">GIN array_ops，表达式索引</text>
  </g>
  <g transform="translate(820,405)">
    <rect x="0" y="0" width="210" height="95" class="node"/>
    <text x="24" y="34" class="label">4. 统计</text>
    <text x="24" y="63" class="small">ANALYZE，统计目标</text>
  </g>
  <g transform="translate(455,450)">
    <rect x="0" y="0" width="210" height="95" class="warn"/>
    <text x="24" y="34" class="label">5. 验证</text>
    <text x="24" y="63" class="small">EXPLAIN，回表，膨胀</text>
  </g>
  <g transform="translate(90,405)">
    <rect x="0" y="0" width="210" height="95" class="node"/>
    <text x="24" y="34" class="label">6. 演化</text>
    <text x="24" y="63" class="small">超宽、强关系时拆表</text>
  </g>

  <path d="M300 155 C365 125 390 125 455 137" class="arrow"/>
  <path d="M665 137 C735 125 760 125 820 155" class="arrow"/>
  <path d="M925 215 V405" class="arrow"/>
  <path d="M820 452 C750 490 735 498 665 498" class="arrow"/>
  <path d="M455 498 C380 498 360 475 300 452" class="arrow"/>
  <path d="M195 405 V215" class="arrow"/>

  <g transform="translate(395,275)">
    <rect x="0" y="0" width="330" height="95" fill="#fbfcff" stroke="#9aa8bd" stroke-width="2" rx="8"/>
    <text x="26" y="37" class="label">核心原则</text>
    <text x="26" y="68" class="small">array 是行内集合；一旦集合有自己的生命周期，就拆出来。</text>
  </g>
</svg>
