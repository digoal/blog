<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">模糊搜索技术选型地图</title>
  <desc id="desc">从业务搜索意图出发，选择 LIKE、pg_trgm、pg_bigm、PGroonga 或 tsvector 的路径。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .box { fill: #ffffff; stroke: #40617a; stroke-width: 2; rx: 8; }
    .head { fill: #e8f1f7; stroke: #40617a; stroke-width: 2; rx: 8; }
    .accent { fill: #f6efe1; stroke: #9a6b1f; stroke-width: 2; rx: 8; }
    .green { fill: #e7f4ec; stroke: #3f7b55; stroke-width: 2; rx: 8; }
    .pink { fill: #f8e9ef; stroke: #9a4964; stroke-width: 2; rx: 8; }
    .line { stroke: #52636f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-size: 18px; font-weight: 650; }
    .small { font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#52636f"/>
    </marker>
  </defs>
  <rect x="360" y="24" width="260" height="70" class="head"/>
  <text x="490" y="54" text-anchor="middle" class="label">用户输入一个关键词</text>
  <text x="490" y="78" text-anchor="middle" class="small">商品、工单、姓名、地址、日志、文档</text>

  <path d="M490 94 L490 134" class="line"/>
  <rect x="340" y="134" width="300" height="78" class="box"/>
  <text x="490" y="166" text-anchor="middle" class="label">先问：要的是什么“像”？</text>
  <text x="490" y="192" text-anchor="middle" class="small">包含、拼写近似、短词、中文日文、语义排序</text>

  <path d="M340 174 L170 238" class="line"/>
  <path d="M430 212 L360 270" class="line"/>
  <path d="M550 212 L620 270" class="line"/>
  <path d="M640 174 L810 238" class="line"/>

  <rect x="36" y="236" width="260" height="116" class="accent"/>
  <text x="166" y="266" text-anchor="middle" class="label">简单包含</text>
  <text x="166" y="292" text-anchor="middle" class="small">小表、低频后台、前缀可控</text>
  <text x="166" y="318" text-anchor="middle" class="small">`LIKE` / `ILIKE` / B-tree 前缀</text>
  <text x="166" y="342" text-anchor="middle" class="small">收益：零依赖；代价：大表扫描风险</text>

  <rect x="300" y="270" width="260" height="122" class="green"/>
  <text x="430" y="300" text-anchor="middle" class="label">英文/拉丁相似</text>
  <text x="430" y="326" text-anchor="middle" class="small">错别字、拼写相近、`%foo%`</text>
  <text x="430" y="352" text-anchor="middle" class="small">`pg_trgm` + GIN/GiST</text>
  <text x="430" y="376" text-anchor="middle" class="small">3-gram，支持 LIKE/ILIKE/regex/相似度</text>

  <rect x="594" y="270" width="260" height="122" class="pink"/>
  <text x="724" y="300" text-anchor="middle" class="label">短词/非空格语言</text>
  <text x="724" y="326" text-anchor="middle" class="small">中文、日文、1-2 字关键词</text>
  <text x="724" y="352" text-anchor="middle" class="small">`pg_bigm` + GIN</text>
  <text x="724" y="376" text-anchor="middle" class="small">2-gram，LIKE 精确确认，误判可控</text>

  <rect x="684" y="236" width="260" height="116" class="box"/>
  <text x="814" y="266" text-anchor="middle" class="label">多语言全文搜索</text>
  <text x="814" y="292" text-anchor="middle" class="small">分词、归一化、评分、前缀、正则</text>
  <text x="814" y="318" text-anchor="middle" class="small">`PGroonga` + Groonga</text>
  <text x="814" y="342" text-anchor="middle" class="small">能力强；要理解独立索引维护</text>

  <path d="M166 352 L166 424 L430 424" class="line"/>
  <path d="M430 392 L430 424" class="line"/>
  <path d="M724 392 L724 424 L550 424" class="line"/>
  <path d="M814 352 L814 464 L550 464" class="line"/>
  <rect x="316" y="412" width="350" height="82" class="head"/>
  <text x="491" y="444" text-anchor="middle" class="label">共同底线：索引只是候选集</text>
  <text x="491" y="470" text-anchor="middle" class="small">必须验证召回、误判、回表、排序、写入放大和维护成本</text>
</svg>
