<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">n-gram 候选召回过程</title>
  <desc id="desc">展示 pg_trgm 和 pg_bigm 如何把字符串拆成 n-gram，并用倒排表召回候选行。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #182631; }
    .panel { fill: #ffffff; stroke: #36566b; stroke-width: 2; rx: 8; }
    .token3 { fill: #dcebf7; stroke: #42749a; stroke-width: 1.5; rx: 5; }
    .token2 { fill: #f2e4c7; stroke: #9b712d; stroke-width: 1.5; rx: 5; }
    .hit { fill: #e4f2e9; stroke: #3f7b55; stroke-width: 1.5; rx: 5; }
    .bad { fill: #f8e4ea; stroke: #9a4964; stroke-width: 1.5; rx: 5; }
    .line { stroke: #52636f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-size: 18px; font-weight: 650; }
    .small { font-size: 14px; }
    .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#52636f"/>
    </marker>
  </defs>
  <rect x="32" y="32" width="916" height="92" class="panel"/>
  <text x="490" y="66" text-anchor="middle" class="label">核心转换：文本相似或包含问题 -> n-gram 集合交集问题</text>
  <text x="490" y="96" text-anchor="middle" class="small">索引不能直接理解“模糊”，它只知道某个片段在哪些行出现过</text>

  <rect x="46" y="160" width="390" height="130" class="panel"/>
  <text x="66" y="192" class="label">pg_trgm：3-gram</text>
  <text x="66" y="218" class="small">例：`cat` 左补两个空格、右补一个空格</text>
  <rect x="72" y="238" width="58" height="32" class="token3"/><text x="101" y="259" text-anchor="middle" class="mono">  c</text>
  <rect x="144" y="238" width="58" height="32" class="token3"/><text x="173" y="259" text-anchor="middle" class="mono"> ca</text>
  <rect x="216" y="238" width="58" height="32" class="token3"/><text x="245" y="259" text-anchor="middle" class="mono">cat</text>
  <rect x="288" y="238" width="58" height="32" class="token3"/><text x="317" y="259" text-anchor="middle" class="mono">at </text>

  <rect x="544" y="160" width="390" height="130" class="panel"/>
  <text x="564" y="192" class="label">pg_bigm：2-gram</text>
  <text x="564" y="218" class="small">例：`ABC` 左右各补一个空格</text>
  <rect x="576" y="238" width="58" height="32" class="token2"/><text x="605" y="259" text-anchor="middle" class="mono"> A</text>
  <rect x="648" y="238" width="58" height="32" class="token2"/><text x="677" y="259" text-anchor="middle" class="mono">AB</text>
  <rect x="720" y="238" width="58" height="32" class="token2"/><text x="749" y="259" text-anchor="middle" class="mono">BC</text>
  <rect x="792" y="238" width="58" height="32" class="token2"/><text x="821" y="259" text-anchor="middle" class="mono">C </text>

  <path d="M240 290 L240 335" class="line"/>
  <path d="M740 290 L740 335" class="line"/>
  <rect x="168" y="338" width="644" height="72" class="panel"/>
  <text x="490" y="368" text-anchor="middle" class="label">GIN 倒排表</text>
  <text x="490" y="394" text-anchor="middle" class="small">key = n-gram，posting list = 包含该 key 的行号集合</text>

  <path d="M490 410 L490 448" class="line"/>
  <rect x="116" y="448" width="220" height="46" class="hit"/>
  <text x="226" y="477" text-anchor="middle" class="small">候选 A：所有片段都出现</text>
  <rect x="380" y="448" width="220" height="46" class="bad"/>
  <text x="490" y="477" text-anchor="middle" class="small">候选 B：片段出现但顺序不对</text>
  <rect x="644" y="448" width="220" height="46" class="bad"/>
  <text x="754" y="477" text-anchor="middle" class="small">候选 C：相似但不是包含</text>
</svg>
