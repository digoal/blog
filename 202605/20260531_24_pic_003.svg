<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">GIN 候选与回表确认</title>
  <desc id="desc">展示 LIKE 模糊搜索从查询模式到 GIN 候选，再到堆表回表 recheck 的执行路径。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .box { fill: #ffffff; stroke: #36566b; stroke-width: 2; rx: 8; }
    .blue { fill: #e4eef6; stroke: #42749a; stroke-width: 2; rx: 8; }
    .yellow { fill: #f6efe1; stroke: #9a6b1f; stroke-width: 2; rx: 8; }
    .green { fill: #e7f4ec; stroke: #3f7b55; stroke-width: 2; rx: 8; }
    .red { fill: #f8e4ea; stroke: #9a4964; stroke-width: 2; rx: 8; }
    .line { stroke: #52636f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #9a4964; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#redarrow); }
    .label { font-size: 18px; font-weight: 650; }
    .small { font-size: 14px; }
    .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#52636f"/>
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#9a4964"/>
    </marker>
  </defs>
  <rect x="48" y="44" width="220" height="78" class="blue"/>
  <text x="158" y="76" text-anchor="middle" class="label">SQL 条件</text>
  <text x="158" y="102" text-anchor="middle" class="mono">col LIKE '%trial%'</text>
  <path d="M268 83 L346 83" class="line"/>

  <rect x="346" y="44" width="266" height="78" class="yellow"/>
  <text x="479" y="76" text-anchor="middle" class="label">extractQuery</text>
  <text x="479" y="102" text-anchor="middle" class="small">抽取“所有匹配行必然包含”的 n-gram</text>
  <path d="M612 83 L690 83" class="line"/>

  <rect x="690" y="44" width="240" height="78" class="box"/>
  <text x="810" y="76" text-anchor="middle" class="label">GIN posting list</text>
  <text x="810" y="102" text-anchor="middle" class="small">求交 / 合并得到候选 TID</text>

  <path d="M810 122 L810 168" class="line"/>
  <rect x="660" y="168" width="300" height="92" class="box"/>
  <text x="810" y="200" text-anchor="middle" class="label">Bitmap Index Scan</text>
  <text x="810" y="226" text-anchor="middle" class="small">只证明“可能匹配”</text>
  <text x="810" y="248" text-anchor="middle" class="small">pg_trgm LIKE/ILIKE 总是 inexact</text>

  <path d="M660 214 L538 214" class="line"/>
  <rect x="288" y="168" width="250" height="92" class="green"/>
  <text x="413" y="200" text-anchor="middle" class="label">Bitmap Heap Scan</text>
  <text x="413" y="226" text-anchor="middle" class="small">按候选 TID 回堆表取行</text>
  <text x="413" y="248" text-anchor="middle" class="small">MVCC 可见性和原始条件在这里确认</text>

  <path d="M413 260 L413 312" class="line"/>
  <rect x="210" y="312" width="406" height="78" class="yellow"/>
  <text x="413" y="344" text-anchor="middle" class="label">Recheck Cond</text>
  <text x="413" y="370" text-anchor="middle" class="small">重新执行 `LIKE` / 相似度 / 正则，过滤误判</text>

  <path d="M356 390 L252 438" class="line"/>
  <path d="M470 390 L574 438" class="dash"/>
  <rect x="92" y="438" width="320" height="48" class="green"/>
  <text x="252" y="468" text-anchor="middle" class="small">正确结果：`He is awaiting trial`</text>
  <rect x="450" y="438" width="412" height="48" class="red"/>
  <text x="656" y="468" text-anchor="middle" class="small">误判过滤：`It was a trivial mistake`</text>

  <rect x="44" y="166" width="190" height="96" class="red"/>
  <text x="139" y="198" text-anchor="middle" class="label">关闭 recheck</text>
  <text x="139" y="224" text-anchor="middle" class="small">只适合调试或评估</text>
  <text x="139" y="248" text-anchor="middle" class="small">可能直接返回误判</text>
</svg>
