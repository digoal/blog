<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">PGroonga 架构路径</title>
  <desc id="desc">展示 PostgreSQL 通过 pgroonga 访问方法连接 Groonga，并在索引、搜索、WAL、恢复之间协作。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .box { fill: #ffffff; stroke: #36566b; stroke-width: 2; rx: 8; }
    .pg { fill: #e4eef6; stroke: #42749a; stroke-width: 2; rx: 8; }
    .grn { fill: #e7f4ec; stroke: #3f7b55; stroke-width: 2; rx: 8; }
    .ops { fill: #f6efe1; stroke: #9a6b1f; stroke-width: 2; rx: 8; }
    .wal { fill: #f8e4ea; stroke: #9a4964; stroke-width: 2; rx: 8; }
    .line { stroke: #52636f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-size: 18px; font-weight: 650; }
    .small { font-size: 14px; }
    .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#52636f"/>
    </marker>
  </defs>
  <rect x="42" y="42" width="270" height="116" class="pg"/>
  <text x="177" y="76" text-anchor="middle" class="label">PostgreSQL 表</text>
  <text x="177" y="102" text-anchor="middle" class="small">MVCC、事务、权限、普通过滤条件</text>
  <text x="177" y="128" text-anchor="middle" class="mono">CREATE INDEX ... USING pgroonga</text>

  <path d="M312 100 L382 100" class="line"/>
  <rect x="382" y="42" width="230" height="116" class="ops"/>
  <text x="497" y="76" text-anchor="middle" class="label">pgroonga 访问方法</text>
  <text x="497" y="102" text-anchor="middle" class="small">handler、opclass、scan、insert、delete</text>
  <text x="497" y="128" text-anchor="middle" class="mono">pgroonga.c / pgrn-create.c</text>

  <path d="M612 100 L684 100" class="line"/>
  <rect x="684" y="42" width="250" height="116" class="grn"/>
  <text x="809" y="76" text-anchor="middle" class="label">Groonga 存储结构</text>
  <text x="809" y="102" text-anchor="middle" class="small">sources table、lexicon、index column</text>
  <text x="809" y="128" text-anchor="middle" class="mono">tokenizer / normalizer / token filters</text>

  <rect x="82" y="226" width="250" height="104" class="box"/>
  <text x="207" y="258" text-anchor="middle" class="label">查询操作符</text>
  <text x="207" y="284" text-anchor="middle" class="mono">&amp;@  &amp;@~  &amp;@*  &amp;^  &amp;~</text>
  <text x="207" y="308" text-anchor="middle" class="small">匹配、查询语法、相似、前缀、正则</text>

  <path d="M332 278 L430 278" class="line"/>
  <rect x="430" y="226" width="270" height="104" class="grn"/>
  <text x="565" y="258" text-anchor="middle" class="label">Groonga 表达式执行</text>
  <text x="565" y="284" text-anchor="middle" class="small">按词典和索引列计算候选与 score</text>
  <text x="565" y="308" text-anchor="middle" class="mono">pgrn-search.h / sequential-search</text>

  <path d="M700 278 L792 278" class="line"/>
  <rect x="792" y="226" width="150" height="104" class="pg"/>
  <text x="867" y="258" text-anchor="middle" class="label">返回 TID</text>
  <text x="867" y="284" text-anchor="middle" class="small">回到 PostgreSQL</text>
  <text x="867" y="308" text-anchor="middle" class="small">继续过滤和排序</text>

  <path d="M498 158 L498 390" class="line"/>
  <rect x="142" y="390" width="268" height="102" class="wal"/>
  <text x="276" y="422" text-anchor="middle" class="label">PGroonga WAL</text>
  <text x="276" y="448" text-anchor="middle" class="small">记录建表、建列、插入、删除、插件注册</text>
  <text x="276" y="472" text-anchor="middle" class="mono">pgrn-wal.h</text>

  <rect x="510" y="390" width="328" height="102" class="wal"/>
  <text x="674" y="422" text-anchor="middle" class="label">崩溃安全与复制边界</text>
  <text x="674" y="448" text-anchor="middle" class="small">需要按版本和部署方式验证 WAL/resource manager</text>
  <text x="674" y="472" text-anchor="middle" class="small">不应把它当作普通 GIN 的维护模型</text>
</svg>
