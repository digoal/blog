<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">模糊搜索上线验证闭环</title>
  <desc id="desc">展示模糊搜索从样本、建模、索引、验证到监控调参的闭环。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .node { fill: #ffffff; stroke: #36566b; stroke-width: 2; rx: 8; }
    .blue { fill: #e4eef6; stroke: #42749a; stroke-width: 2; rx: 8; }
    .green { fill: #e7f4ec; stroke: #3f7b55; stroke-width: 2; rx: 8; }
    .yellow { fill: #f6efe1; stroke: #9a6b1f; stroke-width: 2; rx: 8; }
    .red { fill: #f8e4ea; stroke: #9a4964; stroke-width: 2; rx: 8; }
    .line { stroke: #52636f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .label { font-size: 18px; font-weight: 650; }
    .small { font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#52636f"/>
    </marker>
  </defs>
  <rect x="364" y="34" width="252" height="82" class="blue"/>
  <text x="490" y="66" text-anchor="middle" class="label">1. 搜索样本集</text>
  <text x="490" y="92" text-anchor="middle" class="small">真实关键词、错别字、短词、无结果词</text>

  <path d="M616 75 C740 86 812 142 830 226" class="line"/>
  <rect x="714" y="220" width="228" height="86" class="green"/>
  <text x="828" y="252" text-anchor="middle" class="label">2. 语义建模</text>
  <text x="828" y="278" text-anchor="middle" class="small">包含、相似、分词、前缀、正则</text>

  <path d="M828 306 C808 390 728 444 610 452" class="line"/>
  <rect x="364" y="402" width="252" height="86" class="yellow"/>
  <text x="490" y="434" text-anchor="middle" class="label">3. 索引与 SQL</text>
  <text x="490" y="460" text-anchor="middle" class="small">opclass、GUC、表达式、排序、分页</text>

  <path d="M364 445 C240 430 168 374 150 290" class="line"/>
  <rect x="38" y="220" width="228" height="86" class="red"/>
  <text x="152" y="252" text-anchor="middle" class="label">4. 验证误判与召回</text>
  <text x="152" y="278" text-anchor="middle" class="small">EXPLAIN、Rows Removed、人工标注</text>

  <path d="M152 220 C172 136 252 82 370 74" class="line"/>
  <rect x="340" y="202" width="300" height="116" class="node"/>
  <text x="490" y="238" text-anchor="middle" class="label">上线观测</text>
  <text x="490" y="266" text-anchor="middle" class="small">慢 SQL、回表比例、pending list、索引大小</text>
  <text x="490" y="292" text-anchor="middle" class="small">搜索成功率、点击率、零结果率、写入延迟</text>

  <path d="M490 318 L490 390" class="line"/>
  <path d="M490 202 L490 128" class="line"/>
</svg>
