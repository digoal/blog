<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">HLL 在指标汇总中的业务模型</title>
  <desc id="desc">展示明细事件经过哈希和 HLL 聚合后形成日粒度草图，再通过 union 支持周、月、滑动窗口和交并估算。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0f172a">从 COUNT(DISTINCT) 到可合并草图</text>
  <text x="40" y="82" font-size="15" fill="#475569">目标不是保存每个用户 ID，而是保存“可重复合并、大小近似固定”的去重摘要。</text>

  <rect x="42" y="125" width="190" height="240" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="72" y="158" font-size="18" font-weight="700" fill="#075985">明细事实表</text>
  <text x="72" y="195" font-size="15" fill="#0f172a">date</text>
  <text x="72" y="225" font-size="15" fill="#0f172a">user_id</text>
  <text x="72" y="255" font-size="15" fill="#0f172a">activity_type</text>
  <text x="72" y="285" font-size="15" fill="#0f172a">referrer</text>
  <text x="72" y="328" font-size="13" fill="#475569">亿级行数时，临时去重</text>
  <text x="72" y="350" font-size="13" fill="#475569">排序或 Hash 聚合成本高</text>

  <line x1="232" y1="245" x2="320" y2="245" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="320" y="158" width="160" height="174" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="195" font-size="18" font-weight="700" fill="#166534">先哈希</text>
  <text x="348" y="232" font-size="15" fill="#0f172a">hll_hash_integer</text>
  <text x="348" y="262" font-size="15" fill="#0f172a">hll_hash_text</text>
  <text x="348" y="292" font-size="13" fill="#475569">同一集合必须用</text>
  <text x="348" y="314" font-size="13" fill="#475569">稳定 seed</text>

  <line x1="480" y1="245" x2="570" y2="245" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="570" y="118" width="170" height="254" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="604" y="152" font-size="18" font-weight="700" fill="#854d0e">日粒度 HLL</text>
  <rect x="602" y="182" width="106" height="28" rx="4" fill="#fde68a" stroke="#ca8a04"/>
  <text x="619" y="202" font-size="13" fill="#0f172a">2026-05-01</text>
  <rect x="602" y="222" width="106" height="28" rx="4" fill="#fde68a" stroke="#ca8a04"/>
  <text x="619" y="242" font-size="13" fill="#0f172a">2026-05-02</text>
  <rect x="602" y="262" width="106" height="28" rx="4" fill="#fde68a" stroke="#ca8a04"/>
  <text x="619" y="282" font-size="13" fill="#0f172a">2026-05-03</text>
  <text x="598" y="330" font-size="13" fill="#475569">每行保存一个 hll 值</text>
  <text x="598" y="352" font-size="13" fill="#475569">而不是用户明细集合</text>

  <line x1="740" y1="245" x2="830" y2="245" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="830" y="116" width="88" height="252" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="848" y="150" font-size="17" font-weight="700" fill="#86198f">查询</text>
  <text x="848" y="190" font-size="14" fill="#0f172a">日 UV</text>
  <text x="848" y="222" font-size="14" fill="#0f172a">周 UV</text>
  <text x="848" y="254" font-size="14" fill="#0f172a">月 UV</text>
  <text x="848" y="286" font-size="14" fill="#0f172a">滑窗</text>
  <text x="848" y="318" font-size="14" fill="#0f172a">流失估算</text>

  <text x="44" y="430" font-size="15" font-weight="700" fill="#0f172a">工程含义</text>
  <text x="126" y="430" font-size="15" fill="#475569">HLL 把“每次扫描明细并重新去重”改成“预先生成可合并摘要，然后按时间或维度 union”。</text>
</svg>
