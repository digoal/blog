<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">HLL add 的哈希到寄存器路径</title>
  <desc id="desc">展示输入值必须先用 MurmurHash3 变成 hll_hashval，然后低 log2m 位选择寄存器，高位计算尾随零数量并更新寄存器最大值。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0f172a">一次 hll_add 发生了什么</text>
  <text x="40" y="82" font-size="15" fill="#475569">源码中的 compressed_add 使用低位定位寄存器，用剩余高位的尾随零数估算“稀有程度”。</text>

  <rect x="48" y="130" width="150" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="77" y="159" font-size="17" font-weight="700" fill="#075985">原始值</text>
  <text x="75" y="185" font-size="14" fill="#0f172a">user_id = 12345</text>
  <line x1="198" y1="166" x2="285" y2="166" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="285" y="130" width="170" height="72" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="317" y="159" font-size="17" font-weight="700" fill="#166534">MurmurHash3</text>
  <text x="318" y="185" font-size="14" fill="#0f172a">hll_hash_integer()</text>
  <line x1="455" y1="166" x2="540" y2="166" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="540" y="112" width="350" height="108" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="568" y="145" font-size="17" font-weight="700" fill="#854d0e">64 bit hll_hashval</text>
  <rect x="570" y="166" width="210" height="30" fill="#fde68a" stroke="#ca8a04"/>
  <rect x="780" y="166" width="78" height="30" fill="#fed7aa" stroke="#ea580c"/>
  <text x="618" y="187" font-size="13" fill="#0f172a">高位：用于计算 p_w</text>
  <text x="789" y="187" font-size="13" fill="#0f172a">低 log2m 位</text>

  <line x1="710" y1="220" x2="710" y2="278" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="820" y1="220" x2="820" y2="278" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="580" y="278" width="250" height="76" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="607" y="307" font-size="17" font-weight="700" fill="#86198f">寄存器更新规则</text>
  <text x="607" y="333" font-size="14" fill="#0f172a">register[index] = max(register[index], p_w)</text>

  <rect x="78" y="286" width="390" height="112" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="105" y="318" font-size="17" font-weight="700" fill="#9a3412">源码对应</text>
  <text x="105" y="350" font-size="14" fill="#0f172a">mask = nregs - 1</text>
  <text x="105" y="376" font-size="14" fill="#0f172a">ndx = elem &amp; mask</text>
  <text x="105" y="402" font-size="14" fill="#0f172a">p_w = ctz(elem &gt;&gt; log2m) + 1，再受 regwidth 上限截断</text>

  <text x="44" y="462" font-size="15" font-weight="700" fill="#0f172a">为什么必须哈希</text>
  <text x="168" y="462" font-size="15" fill="#475569">HLL 的误差保证依赖输入近似均匀随机；不同 seed 的 HLL 不能直接 union 成同一语义集合。</text>
</svg>
