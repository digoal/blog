<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">postgresql-hll 的四级表示与提升路径</title>
  <desc id="desc">展示 EMPTY、EXPLICIT、SPARSE、FULL 四种表示，以及 expthresh、sparseon 和 sparse/full 阈值如何影响提升路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0f172a">表示不是固定的：按规模逐级提升</text>
  <text x="40" y="82" font-size="15" fill="#475569">小集合先精确保存；到阈值后转为 HLL 寄存器；磁盘上可选择 SPARSE 或 FULL 编码。</text>

  <rect x="48" y="150" width="160" height="128" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="92" y="182" font-size="19" font-weight="700" fill="#075985">EMPTY</text>
  <text x="74" y="220" font-size="14" fill="#0f172a">3 字节 header</text>
  <text x="74" y="248" font-size="14" fill="#475569">空集合哨兵</text>

  <line x1="208" y1="214" x2="280" y2="214" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="213" y="196" font-size="13" fill="#475569">首次 add</text>

  <rect x="280" y="130" width="190" height="168" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="330" y="162" font-size="19" font-weight="700" fill="#166534">EXPLICIT</text>
  <text x="310" y="200" font-size="14" fill="#0f172a">排序去重的 64 bit 值</text>
  <text x="310" y="228" font-size="14" fill="#0f172a">cardinality 精确</text>
  <text x="310" y="256" font-size="14" fill="#475569">默认 auto 阈值按空间算</text>

  <line x1="470" y1="214" x2="540" y2="214" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="474" y="196" font-size="13" fill="#475569">超过 expthresh</text>

  <rect x="540" y="118" width="170" height="192" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="586" y="150" font-size="19" font-weight="700" fill="#854d0e">SPARSE</text>
  <text x="568" y="188" font-size="14" fill="#0f172a">只保存非零寄存器</text>
  <text x="568" y="216" font-size="14" fill="#0f172a">编码为 index + value</text>
  <text x="568" y="244" font-size="14" fill="#475569">本地源码解包后</text>
  <text x="568" y="268" font-size="14" fill="#475569">内存中转为 compressed</text>

  <line x1="710" y1="214" x2="780" y2="214" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="714" y="196" font-size="13" fill="#475569">稀疏不再省空间</text>

  <rect x="780" y="130" width="140" height="168" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="825" y="162" font-size="19" font-weight="700" fill="#86198f">FULL</text>
  <text x="805" y="200" font-size="14" fill="#0f172a">全部寄存器</text>
  <text x="805" y="228" font-size="14" fill="#0f172a">regwidth 位打包</text>
  <text x="805" y="256" font-size="14" fill="#475569">固定空间</text>

  <path d="M 470 300 C 540 390, 710 390, 780 300" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="390" font-size="14" fill="#475569">sparseon = 0 时跳过 SPARSE</text>

  <rect x="72" y="360" width="380" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="98" y="392" font-size="17" font-weight="700" fill="#0f172a">控制参数</text>
  <text x="98" y="422" font-size="14" fill="#334155">log2m：寄存器数量 m = 2^log2m，精度随 m 提升</text>
  <text x="98" y="448" font-size="14" fill="#334155">regwidth：每个寄存器位宽，决定可表达的最大 rho</text>

  <rect x="510" y="360" width="380" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="536" y="392" font-size="17" font-weight="700" fill="#0f172a">提升参数</text>
  <text x="536" y="422" font-size="14" fill="#334155">expthresh：EXPLICIT 到 HLL 的阈值，-1 为自动</text>
  <text x="536" y="448" font-size="14" fill="#334155">sparseon / max_sparse：是否和何时使用稀疏磁盘编码</text>
</svg>
