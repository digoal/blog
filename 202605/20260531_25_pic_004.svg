<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">HLL union 与 cardinality 估算路径</title>
  <desc id="desc">展示同参数 HLL 的 union 通过寄存器逐位取最大值完成，cardinality 按调和平均估算，并在小范围和大范围做校正。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0f172a">为什么 HLL 适合汇总后再汇总</text>
  <text x="40" y="82" font-size="15" fill="#475569">同参数、同 hash seed 的 HLL 可以按寄存器取最大值 union，误差阶仍由 m 决定。</text>

  <rect x="60" y="130" width="250" height="120" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="84" y="162" font-size="18" font-weight="700" fill="#075985">HLL A</text>
  <text x="84" y="196" font-size="14" fill="#0f172a">[0, 3, 1, 0, 5, 2, ...]</text>
  <text x="84" y="224" font-size="13" fill="#475569">例如：星期一 UV 草图</text>

  <rect x="60" y="288" width="250" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="84" y="320" font-size="18" font-weight="700" fill="#166534">HLL B</text>
  <text x="84" y="354" font-size="14" fill="#0f172a">[2, 1, 1, 4, 3, 2, ...]</text>
  <text x="84" y="382" font-size="13" fill="#475569">例如：星期二 UV 草图</text>

  <line x1="310" y1="190" x2="405" y2="258" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="310" y1="348" x2="405" y2="282" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="405" y="210" width="200" height="120" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="437" y="242" font-size="18" font-weight="700" fill="#854d0e">逐寄存器 max</text>
  <text x="436" y="276" font-size="14" fill="#0f172a">max(A[i], B[i])</text>
  <text x="436" y="304" font-size="13" fill="#475569">源码 multiset_union</text>

  <line x1="605" y1="270" x2="690" y2="270" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="690" y="130" width="210" height="120" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="720" y="162" font-size="18" font-weight="700" fill="#86198f">Union HLL</text>
  <text x="720" y="196" font-size="14" fill="#0f172a">[2, 3, 1, 4, 5, 2, ...]</text>
  <text x="720" y="224" font-size="13" fill="#475569">可继续和更多 HLL 合并</text>

  <line x1="795" y1="250" x2="795" y2="310" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="690" y="310" width="210" height="132" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="720" y="342" font-size="18" font-weight="700" fill="#9a3412">cardinality</text>
  <text x="720" y="376" font-size="14" fill="#0f172a">估算式：alpha * m^2 / sum</text>
  <text x="720" y="402" font-size="14" fill="#0f172a">小范围：linear counting</text>
  <text x="720" y="428" font-size="14" fill="#0f172a">大范围：修正饱和误差</text>

  <rect x="70" y="444" width="800" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="96" y="477" font-size="15" font-weight="700" fill="#0f172a">硬约束</text>
  <text x="170" y="477" font-size="15" fill="#475569">union 前必须确认 log2m、regwidth、expthresh、sparseon 一致；源码 check_metadata 会直接报错。</text>
</svg>
