<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img">
  <title>从明细事件到滑动窗口去重指标</title>
  <desc>展示事实表事件先按天预聚合为 HLL 摘要，再通过窗口函数合并最近 N 天摘要，得到滑动窗口去重估算。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#335c67"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="480" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="560" y="62" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">滑动窗口去重的两段式模型</text>

  <rect x="70" y="115" width="250" height="260" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="195" y="150" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#075985">明细事件表</text>
  <text x="95" y="190" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">event_day</text>
  <text x="95" y="222" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">user_id</text>
  <text x="95" y="254" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">tenant_id</text>
  <text x="95" y="286" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">channel</text>
  <text x="95" y="330" font-size="15" font-family="Arial, sans-serif" fill="#334155">数据量随事件数增长</text>

  <rect x="430" y="115" width="260" height="260" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="560" y="150" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#065f46">日粒度 HLL 汇总</text>
  <text x="455" y="190" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">event_day</text>
  <text x="455" y="222" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">tenant_id</text>
  <text x="455" y="254" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">channel</text>
  <text x="455" y="286" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">users_hll</text>
  <text x="455" y="330" font-size="15" font-family="Arial, sans-serif" fill="#334155">大小由参数控制</text>

  <rect x="800" y="115" width="250" height="260" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="925" y="150" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#9a3412">滑动窗口查询</text>
  <text x="825" y="190" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">ORDER BY event_day</text>
  <text x="825" y="222" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">ROWS 6 PRECEDING</text>
  <text x="825" y="254" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">hll_union_agg(users_hll)</text>
  <text x="825" y="286" font-size="16" font-family="Arial, sans-serif" fill="#0f172a"># 窗口 HLL</text>
  <text x="825" y="330" font-size="15" font-family="Arial, sans-serif" fill="#334155">代价随窗口天数增长</text>

  <path d="M325 245 H420" stroke="#335c67" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M695 245 H790" stroke="#335c67" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="372" y="225" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">hash + group by</text>
  <text x="743" y="225" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">window union</text>

  <rect x="180" y="420" width="760" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="560" y="447" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">核心转换：从反复扫描明细，变成反复合并可复用的集合摘要</text>
</svg>
