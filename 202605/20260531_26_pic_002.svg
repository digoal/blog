<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img">
  <title>ROWS 滑动窗口的帧语义</title>
  <desc>展示按日期排序后，ROWS 6 PRECEDING 在每一行合并当前行和前 6 行 HLL 摘要。</desc>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="460" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="560" y="62" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">ROWS 6 PRECEDING：最近 7 行，不一定是自然 7 天</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="85" y="125" width="110" height="82" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="140" y="158" text-anchor="middle">05-01</text>
    <text x="140" y="184" text-anchor="middle">HLL D1</text>
    <rect x="210" y="125" width="110" height="82" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="265" y="158" text-anchor="middle">05-02</text>
    <text x="265" y="184" text-anchor="middle">HLL D2</text>
    <rect x="335" y="125" width="110" height="82" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="390" y="158" text-anchor="middle">05-03</text>
    <text x="390" y="184" text-anchor="middle">HLL D3</text>
    <rect x="460" y="125" width="110" height="82" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="515" y="158" text-anchor="middle">05-04</text>
    <text x="515" y="184" text-anchor="middle">HLL D4</text>
    <rect x="585" y="125" width="110" height="82" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="640" y="158" text-anchor="middle">05-05</text>
    <text x="640" y="184" text-anchor="middle">HLL D5</text>
    <rect x="710" y="125" width="110" height="82" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="765" y="158" text-anchor="middle">05-06</text>
    <text x="765" y="184" text-anchor="middle">HLL D6</text>
    <rect x="835" y="125" width="110" height="82" rx="6" fill="#fed7aa" stroke="#ea580c"/>
    <text x="890" y="158" text-anchor="middle">05-07</text>
    <text x="890" y="184" text-anchor="middle">当前行</text>
  </g>

  <path d="M95 245 H935" stroke="#ea580c" stroke-width="4" fill="none"/>
  <path d="M95 238 V252 M935 238 V252" stroke="#ea580c" stroke-width="4"/>
  <text x="515" y="283" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#9a3412">窗口帧：当前行 + 前 6 行，共 7 行 HLL</text>

  <path d="M890 210 V330 H560" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow2)"/>
  <rect x="350" y="330" width="420" height="68" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="560" y="358" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0f172a">hll_union_agg(users_hll) OVER (...)</text>
  <text x="560" y="383" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">合并窗口内所有日摘要，再用 # 取基数估算</text>

  <text x="560" y="440" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">如果日期缺行，ROWS 仍按行数滑动；自然日窗口需要补齐日期维表或改写范围逻辑。</text>
</svg>
