<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img">
  <title>HLL union 的寄存器取最大值</title>
  <desc>展示多个日 HLL 合并时，相同位置寄存器逐位取最大值，得到窗口 HLL。</desc>
  <rect x="20" y="20" width="1080" height="500" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="560" y="62" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">HLL union：同一寄存器位置取 max</text>

  <g font-family="Arial, sans-serif" font-size="16">
    <text x="90" y="128" fill="#0f172a">D1</text>
    <text x="90" y="198" fill="#0f172a">D2</text>
    <text x="90" y="268" fill="#0f172a">D3</text>
    <text x="90" y="378" fill="#0f172a">窗口</text>
    <text x="178" y="100" fill="#475569">r0</text>
    <text x="278" y="100" fill="#475569">r1</text>
    <text x="378" y="100" fill="#475569">r2</text>
    <text x="478" y="100" fill="#475569">r3</text>
    <text x="578" y="100" fill="#475569">r4</text>
    <text x="678" y="100" fill="#475569">r5</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    <rect x="150" y="110" width="70" height="42" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="185" y="137">2</text>
    <rect x="250" y="110" width="70" height="42" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="285" y="137">0</text>
    <rect x="350" y="110" width="70" height="42" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="385" y="137">5</text>
    <rect x="450" y="110" width="70" height="42" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="485" y="137">1</text>
    <rect x="550" y="110" width="70" height="42" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="585" y="137">0</text>
    <rect x="650" y="110" width="70" height="42" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="685" y="137">3</text>

    <rect x="150" y="180" width="70" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="185" y="207">1</text>
    <rect x="250" y="180" width="70" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="285" y="207">4</text>
    <rect x="350" y="180" width="70" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="385" y="207">2</text>
    <rect x="450" y="180" width="70" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="485" y="207">1</text>
    <rect x="550" y="180" width="70" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="585" y="207">6</text>
    <rect x="650" y="180" width="70" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="685" y="207">0</text>

    <rect x="150" y="250" width="70" height="42" rx="5" fill="#fee2e2" stroke="#dc2626"/><text x="185" y="277">3</text>
    <rect x="250" y="250" width="70" height="42" rx="5" fill="#fee2e2" stroke="#dc2626"/><text x="285" y="277">2</text>
    <rect x="350" y="250" width="70" height="42" rx="5" fill="#fee2e2" stroke="#dc2626"/><text x="385" y="277">4</text>
    <rect x="450" y="250" width="70" height="42" rx="5" fill="#fee2e2" stroke="#dc2626"/><text x="485" y="277">7</text>
    <rect x="550" y="250" width="70" height="42" rx="5" fill="#fee2e2" stroke="#dc2626"/><text x="585" y="277">1</text>
    <rect x="650" y="250" width="70" height="42" rx="5" fill="#fee2e2" stroke="#dc2626"/><text x="685" y="277">3</text>

    <rect x="150" y="360" width="70" height="42" rx="5" fill="#ffedd5" stroke="#ea580c"/><text x="185" y="387">3</text>
    <rect x="250" y="360" width="70" height="42" rx="5" fill="#ffedd5" stroke="#ea580c"/><text x="285" y="387">4</text>
    <rect x="350" y="360" width="70" height="42" rx="5" fill="#ffedd5" stroke="#ea580c"/><text x="385" y="387">5</text>
    <rect x="450" y="360" width="70" height="42" rx="5" fill="#ffedd5" stroke="#ea580c"/><text x="485" y="387">7</text>
    <rect x="550" y="360" width="70" height="42" rx="5" fill="#ffedd5" stroke="#ea580c"/><text x="585" y="387">6</text>
    <rect x="650" y="360" width="70" height="42" rx="5" fill="#ffedd5" stroke="#ea580c"/><text x="685" y="387">3</text>
  </g>

  <line x1="135" y1="322" x2="735" y2="322" stroke="#64748b" stroke-width="2"/>
  <text x="780" y="210" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">窗口 union 不回放用户明细。</text>
  <text x="780" y="246" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">只要参数和 hash seed 一致，</text>
  <text x="780" y="282" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">合并后的误差仍按窗口 HLL 的参数计算。</text>
  <text x="780" y="342" font-size="16" font-family="Arial, sans-serif" fill="#475569">源码对应：multiset_union()</text>
  <text x="780" y="372" font-size="16" font-family="Arial, sans-serif" fill="#475569">COMPRESSED + COMPRESSED 逐寄存器比较并保留较大值。</text>
</svg>
