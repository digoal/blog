<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img">
  <title>PostgreSQL 中滑动窗口 HLL 查询的执行路径</title>
  <desc>展示从日汇总表扫描、排序、WindowAgg 维护窗口聚合状态，到 hll_pack 和 hll_cardinality 取结果的路径。</desc>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="520" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="560" y="60" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">查询执行：摘要表扫描 + 排序 + WindowAgg</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="125" width="190" height="95" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="165" y="160" text-anchor="middle" font-size="18" fill="#075985">daily_uniques</text>
    <text x="165" y="190" text-anchor="middle" font-size="15" fill="#334155">event_day, users_hll</text>

    <rect x="330" y="125" width="190" height="95" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="425" y="160" text-anchor="middle" font-size="18" fill="#5b21b6">ORDER BY</text>
    <text x="425" y="190" text-anchor="middle" font-size="15" fill="#334155">按日期或业务键排序</text>

    <rect x="590" y="125" width="210" height="95" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="695" y="160" text-anchor="middle" font-size="18" fill="#065f46">WindowAgg</text>
    <text x="695" y="190" text-anchor="middle" font-size="15" fill="#334155">hll_union_trans</text>

    <rect x="870" y="125" width="180" height="95" rx="8" fill="#fff7ed" stroke="#ea580c"/>
    <text x="960" y="160" text-anchor="middle" font-size="18" fill="#9a3412">结果行</text>
    <text x="960" y="190" text-anchor="middle" font-size="15" fill="#334155">#hll 或 hll_cardinality</text>
  </g>

  <path d="M265 172 H320" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow3)"/>
  <path d="M525 172 H580" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow3)"/>
  <path d="M805 172 H860" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow3)"/>

  <rect x="170" y="310" width="780" height="145" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="560" y="346" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0f172a">聚合函数定义</text>
  <text x="205" y="385" font-size="16" font-family="Arial, sans-serif" fill="#334155">SFUNC: hll_union_trans</text>
  <text x="205" y="417" font-size="16" font-family="Arial, sans-serif" fill="#334155">STYPE: internal</text>
  <text x="465" y="385" font-size="16" font-family="Arial, sans-serif" fill="#334155">FINALFUNC: hll_pack</text>
  <text x="465" y="417" font-size="16" font-family="Arial, sans-serif" fill="#334155">COMBINEFUNC: hll_union_internal</text>
  <text x="725" y="385" font-size="16" font-family="Arial, sans-serif" fill="#334155">PARALLEL: SAFE</text>
  <text x="725" y="417" font-size="16" font-family="Arial, sans-serif" fill="#334155">SSPACE: 131120 for add agg</text>
  <text x="560" y="488" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#475569">窗口聚合没有 inverse transition，滑动窗口不是 O(1) 删除旧日 HLL；窗口越宽，合并工作越多。</text>
</svg>
