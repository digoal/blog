<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img">
  <title>滑动窗口 HLL 的工程边界检查</title>
  <desc>展示上线滑动窗口去重指标前需要检查的日期完整性、参数一致性、哈希一致性、误差预算和查询计划。</desc>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="520" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="560" y="62" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">上线前的 5 个边界检查</text>

  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="80" y="130" width="180" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="170" y="165" text-anchor="middle" font-size="18" fill="#075985">日期完整性</text>
    <text x="170" y="195" text-anchor="middle" fill="#334155">缺天先补空 HLL</text>

    <rect x="315" y="130" width="180" height="92" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="405" y="165" text-anchor="middle" font-size="18" fill="#065f46">参数一致</text>
    <text x="405" y="195" text-anchor="middle" fill="#334155">log2m/regwidth 固化</text>

    <rect x="550" y="130" width="180" height="92" rx="8" fill="#fff7ed" stroke="#ea580c"/>
    <text x="640" y="165" text-anchor="middle" font-size="18" fill="#9a3412">哈希一致</text>
    <text x="640" y="195" text-anchor="middle" fill="#334155">同类型同 seed</text>

    <rect x="785" y="130" width="180" height="92" rx="8" fill="#fef2f2" stroke="#dc2626"/>
    <text x="875" y="165" text-anchor="middle" font-size="18" fill="#991b1b">误差预算</text>
    <text x="875" y="195" text-anchor="middle" fill="#334155">不用于精确结算</text>

    <rect x="315" y="320" width="490" height="92" rx="8" fill="#f1f5f9" stroke="#64748b"/>
    <text x="560" y="355" text-anchor="middle" font-size="18" fill="#0f172a">执行计划与内存</text>
    <text x="560" y="385" text-anchor="middle" fill="#334155">窗口宽度、分区数、work_mem、hll.force_groupagg</text>
  </g>

  <path d="M260 176 H305" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow4)"/>
  <path d="M495 176 H540" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow4)"/>
  <path d="M730 176 H775" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow4)"/>
  <path d="M875 225 C875 300 800 335 810 365" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow4)"/>
  <path d="M170 225 C170 300 300 335 310 365" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow4)"/>

  <text x="560" y="478" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">这些检查比 SQL 写法更重要：SQL 能跑，不代表指标口径、误差和资源消耗已经可控。</text>
</svg>
