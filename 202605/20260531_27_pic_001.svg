<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">GIS 应用在 PostgreSQL 与 PostGIS 中的分层架构</title>
  <desc id="desc">展示业务事件、空间建模、PostGIS 类型函数、索引与 PostgreSQL 执行存储之间的关系。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .band { fill: #f4f7fa; stroke: #cbd5df; stroke-width: 1.5; }
    .box { fill: #ffffff; stroke: #57708a; stroke-width: 1.6; rx: 8; }
    .box2 { fill: #eef7f3; stroke: #3c7a62; stroke-width: 1.6; rx: 8; }
    .box3 { fill: #fff6e8; stroke: #b87524; stroke-width: 1.6; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #1f2933; font-size: 18px; }
    .small { font-size: 15px; fill: #44515f; }
    .label { font-size: 20px; font-weight: 700; fill: #243447; }
    .arrow { stroke: #5b6b7b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5b6b7b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="560"/>
  <text class="label" x="40" y="42">从业务坐标到数据库执行的 GIS 路径</text>

  <rect class="band" x="40" y="70" width="960" height="105" rx="10"/>
  <text class="label" x="65" y="105">业务层</text>
  <rect class="box" x="190" y="92" width="170" height="58"/>
  <text class="text" x="214" y="126">门店/车辆/设备</text>
  <rect class="box" x="410" y="92" width="170" height="58"/>
  <text class="text" x="433" y="126">行政区/围栏</text>
  <rect class="box" x="630" y="92" width="170" height="58"/>
  <text class="text" x="653" y="126">轨迹/路径/路网</text>

  <rect class="band" x="40" y="205" width="960" height="120" rx="10"/>
  <text class="label" x="65" y="240">建模层</text>
  <rect class="box2" x="190" y="226" width="180" height="68"/>
  <text class="text" x="216" y="253">geometry</text>
  <text class="small" x="208" y="278">平面坐标，功能多</text>
  <rect class="box2" x="430" y="226" width="180" height="68"/>
  <text class="text" x="456" y="253">geography</text>
  <text class="small" x="448" y="278">经纬度，米制距离</text>
  <rect class="box2" x="670" y="226" width="180" height="68"/>
  <text class="text" x="690" y="253">SRID / typmod</text>
  <text class="small" x="695" y="278">类型、维度、坐标系约束</text>

  <rect class="band" x="40" y="355" width="960" height="125" rx="10"/>
  <text class="label" x="65" y="392">执行与存储层</text>
  <rect class="box3" x="185" y="380" width="170" height="64"/>
  <text class="text" x="228" y="407">GSERIALIZED</text>
  <text class="small" x="205" y="431">bbox + 坐标 + 元数据</text>
  <rect class="box3" x="405" y="380" width="185" height="64"/>
  <text class="text" x="431" y="407">GiST / SP-GiST / BRIN</text>
  <text class="small" x="435" y="431">以包围盒先过滤</text>
  <rect class="box3" x="640" y="380" width="185" height="64"/>
  <text class="text" x="683" y="407">PostgreSQL</text>
  <text class="small" x="672" y="431">MVCC / WAL / SQL</text>

  <path class="arrow" d="M275 150 L275 218"/>
  <path class="arrow" d="M495 150 L520 218"/>
  <path class="arrow" d="M715 150 L760 218"/>
  <path class="arrow" d="M280 294 L270 372"/>
  <path class="arrow" d="M520 294 L498 372"/>
  <path class="arrow" d="M760 294 L732 372"/>
  <path class="arrow" d="M355 412 L398 412"/>
  <path class="arrow" d="M590 412 L633 412"/>

  <text class="small" x="55" y="520">工程重点：先把空间语义建模正确，再让索引和优化器减少候选，最后用精确空间函数确认结果。</text>
</svg>
