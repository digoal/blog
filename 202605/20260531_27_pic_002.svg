<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">geometry 与 geography 的模型差异</title>
  <desc id="desc">比较平面模型和球面模型在距离、函数覆盖和适用区域上的差异。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .panel { fill: #ffffff; stroke: #cbd5df; stroke-width: 1.5; rx: 10; }
    .plane { fill: #edf5ff; stroke: #4078b8; stroke-width: 1.5; }
    .sphere { fill: #eef7f3; stroke: #3c7a62; stroke-width: 1.5; }
    .grid { stroke: #9eb4c9; stroke-width: 1; opacity: 0.7; }
    .arc { stroke: #c4513b; stroke-width: 4; fill: none; }
    .line { stroke: #c4513b; stroke-width: 4; fill: none; }
    .point { fill: #243447; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #1f2933; font-size: 18px; }
    .small { font-size: 15px; fill: #465767; }
    .title { font-size: 22px; font-weight: 700; fill: #243447; }
  </style>
  <rect class="bg" width="1040" height="560"/>
  <text class="title" x="40" y="42">geometry 与 geography：不是同一个距离模型</text>

  <rect class="panel" x="45" y="75" width="450" height="365"/>
  <text class="title" x="75" y="112">geometry：投影平面</text>
  <rect class="plane" x="105" y="145" width="310" height="190"/>
  <path class="grid" d="M105 183 H415 M105 221 H415 M105 259 H415 M105 297 H415 M167 145 V335 M229 145 V335 M291 145 V335 M353 145 V335"/>
  <circle class="point" cx="160" cy="285" r="6"/>
  <circle class="point" cx="365" cy="180" r="6"/>
  <path class="line" d="M160 285 L365 180"/>
  <text class="small" x="126" y="368">距离单位来自 SRID：米、英尺或度</text>
  <text class="small" x="126" y="394">适合局部区域和需要丰富几何函数的场景</text>

  <rect class="panel" x="545" y="75" width="450" height="365"/>
  <text class="title" x="575" y="112">geography：球面/椭球面</text>
  <circle class="sphere" cx="770" cy="235" r="100"/>
  <path class="grid" d="M670 235 H870 M770 135 V335"/>
  <ellipse class="grid" cx="770" cy="235" rx="100" ry="35"/>
  <ellipse class="grid" cx="770" cy="235" rx="45" ry="100"/>
  <circle class="point" cx="700" cy="285" r="6"/>
  <circle class="point" cx="850" cy="195" r="6"/>
  <path class="arc" d="M700 285 C735 205, 795 165, 850 195"/>
  <text class="small" x="626" y="368">距离参数和测量结果以米为主</text>
  <text class="small" x="626" y="394">适合全球/跨大陆经纬度数据，但函数更少、CPU 更贵</text>

  <rect class="panel" x="110" y="465" width="820" height="62"/>
  <text class="text" x="135" y="501">选择规则：小范围高性能分析优先 geometry + 合适投影；跨大范围距离/面积优先 geography；不要把经纬度度数当米用。</text>
</svg>
