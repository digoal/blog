<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">空间索引的两阶段过滤路径</title>
  <desc id="desc">展示 PostGIS 查询先用包围盒和索引筛候选，再调用精确空间谓词确认结果。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .box { fill: #ffffff; stroke: #61758a; stroke-width: 1.6; rx: 8; }
    .idx { fill: #eef7f3; stroke: #3c7a62; stroke-width: 1.6; rx: 8; }
    .exact { fill: #fff6e8; stroke: #b87524; stroke-width: 1.6; rx: 8; }
    .reject { fill: #f8e9e7; stroke: #bf5b4b; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #1f2933; font-size: 18px; font-weight: 600; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #465767; }
    .title { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 22px; font-weight: 700; fill: #243447; }
    .arrow { stroke: #5b6b7b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .bbox { fill: none; stroke: #c4513b; stroke-width: 2; stroke-dasharray: 6 4; }
    .geom { fill: #7db7d8; stroke: #30698a; stroke-width: 2; opacity: 0.82; }
    .query { fill: #f2c46d; stroke: #9f6616; stroke-width: 2; opacity: 0.9; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5b6b7b"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1040" height="560"/>
  <text class="title" x="40" y="45">PostGIS 空间查询：先便宜筛选，再精确判断</text>

  <rect class="box" x="60" y="85" width="210" height="90"/>
  <text class="text" x="80" y="115">SQL 谓词</text>
  <text class="small" x="80" y="142">ST_Intersects(a,b)</text>
  <text class="small" x="80" y="162">ST_DWithin(a,b,r)</text>

  <rect class="idx" x="330" y="85" width="240" height="90"/>
  <text class="text" x="350" y="115">Support Function</text>
  <text class="small" x="350" y="142">自动重写，补充 &amp;&amp; 算子</text>
  <text class="small" x="350" y="162">触发 GiST / SP-GiST 索引</text>

  <rect class="idx" x="635" y="85" width="250" height="90"/>
  <text class="text" x="655" y="115">第一阶段：粗筛候选</text>
  <text class="small" x="655" y="142">仅比较 MBR（包围盒）相交</text>
  <text class="small" x="655" y="162">速度极快，允许 False Positive</text>

  <path class="arrow" d="M270 130 H322"/>
  <path class="arrow" d="M570 130 H627"/>
  <path class="arrow" d="M760 175 V222"/>

  <rect class="exact" x="635" y="230" width="250" height="90"/>
  <text class="text" x="655" y="260">第二阶段：精细计算</text>
  <text class="small" x="655" y="287">计算真实 Geometry 拓扑关系</text>
  <text class="small" x="655" y="307">调用 GEOS 库，计算开销大</text>

  <path class="arrow" d="M760 320 V362"/>

  <rect class="reject" x="635" y="370" width="250" height="90"/>
  <text class="text" x="655" y="400">输出最终结果</text>
  <text class="small" x="655" y="427">剔除“包围盒交但实体不交”</text>
  <text class="small" x="655" y="447">精确命中的行进入结果集</text>

  <rect class="box" x="60" y="230" width="510" height="230"/>
  <text class="text" x="80" y="265">二维 MBR（最小外包矩形）粗筛示意</text>
  
  <polygon class="geom" points="110,365 175,310 265,330 280,410 180,430"/>
  <rect class="bbox" x="110" y="310" width="170" height="120"/>
  <text class="small" x="115" y="300" fill="#c4513b">MBR A</text>

  <circle class="query" cx="310" cy="330" r="40"/>
  <rect class="bbox" x="270" y="290" width="80" height="80"/>
  <text class="small" x="270" y="280" fill="#c4513b">MBR B</text>
  
  <path d="M 275 320 L 250 280" stroke="#c4513b" stroke-width="1" fill="none"/>
  <text class="small" x="195" y="275" fill="#c4513b">MBR 相交 (X轴重叠 270~280)</text>

  <text class="small" x="80" y="445" font-weight="bold">结论：MBR 相交触发第二阶段精算，GEOS 判定实体未碰撞 -> 剔除。</text>

  <text class="small" x="60" y="515" font-weight="bold">核心代价考量：</text>
  <text class="small" x="155" y="515">空间索引（GiST）极大地缩小了第二阶段精细计算的基数。若无索引，全表每行都要做复杂的 GEOS 运算，引发灾难性全表扫描。</text>
</svg>
