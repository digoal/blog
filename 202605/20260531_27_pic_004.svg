<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">GIS 数据库实践闭环</title>
  <desc id="desc">展示 GIS 应用从导入、清洗、建模、索引、查询、观测到维护演进的闭环。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .node { fill: #ffffff; stroke: #61758a; stroke-width: 1.6; rx: 9; }
    .green { fill: #eef7f3; stroke: #3c7a62; }
    .orange { fill: #fff6e8; stroke: #b87524; }
    .red { fill: #f8e9e7; stroke: #bf5b4b; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #1f2933; font-size: 18px; }
    .small { font-size: 15px; fill: #465767; }
    .title { font-size: 22px; font-weight: 700; fill: #243447; }
    .arrow { stroke: #5b6b7b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5b6b7b"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="title" x="40" y="42">GIS 生产实践：一次建表不等于完成</text>

  <rect class="node green" x="90" y="90" width="190" height="78"/>
  <text class="text" x="124" y="122">导入与清洗</text>
  <text class="small" x="112" y="148">WKT/WKB/GeoJSON/SHP</text>

  <rect class="node" x="425" y="90" width="190" height="78"/>
  <text class="text" x="464" y="122">建模约束</text>
  <text class="small" x="450" y="148">typmod、SRID、有效性</text>

  <rect class="node orange" x="760" y="90" width="190" height="78"/>
  <text class="text" x="805" y="122">索引设计</text>
  <text class="small" x="786" y="148">GiST/SP-GiST/BRIN</text>

  <rect class="node" x="760" y="255" width="190" height="78"/>
  <text class="text" x="805" y="287">查询改写</text>
  <text class="small" x="786" y="313">ST_DWithin、KNN、bbox</text>

  <rect class="node red" x="425" y="255" width="190" height="78"/>
  <text class="text" x="471" y="287">观测验证</text>
  <text class="small" x="450" y="313">EXPLAIN、BUFFERS、ANALYZE</text>

  <rect class="node" x="90" y="255" width="190" height="78"/>
  <text class="text" x="134" y="287">维护演进</text>
  <text class="small" x="112" y="313">VACUUM、CLUSTER、分区</text>

  <rect class="node green" x="425" y="410" width="190" height="78"/>
  <text class="text" x="463" y="442">业务反馈</text>
  <text class="small" x="445" y="468">误差、延迟、热点、数据增长</text>

  <path class="arrow" d="M280 129 H417"/>
  <path class="arrow" d="M615 129 H752"/>
  <path class="arrow" d="M855 168 V247"/>
  <path class="arrow" d="M760 294 H623"/>
  <path class="arrow" d="M425 294 H288"/>
  <path class="arrow" d="M185 255 V176"/>
  <path class="arrow" d="M520 333 V402"/>
  <path class="arrow" d="M615 449 C750 445 880 390 855 340"/>
  <path class="arrow" d="M425 449 C290 445 160 390 185 340"/>

  <text class="small" x="95" y="525">闭环原则：每次数据分布、业务半径、坐标系或过滤条件变化，都要重新验证计划、命中率和维护成本。</text>
</svg>
