<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">混合搜索总体架构</title>
  <desc id="desc">展示用户查询如何同时进入 BM25 词法检索和向量语义检索，再用 SQL 层融合排序返回结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="472" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">PostgreSQL 内的混合搜索路径</text>

  <rect x="70" y="106" width="170" height="72" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="155" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">用户查询</text>
  <text x="155" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">关键词 + 语义意图</text>

  <rect x="320" y="92" width="220" height="104" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="430" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">词法检索分支</text>
  <text x="430" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">ParadeDB pg_search</text>
  <text x="430" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">BM25 / Tantivy / @@@</text>

  <rect x="320" y="306" width="220" height="104" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="430" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">语义检索分支</text>
  <text x="430" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">pgvector</text>
  <text x="430" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">HNSW / IVFFlat / TopK</text>

  <rect x="642" y="176" width="210" height="150" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="747" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">SQL 融合层</text>
  <text x="747" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">rank_bm25 + rank_vector</text>
  <text x="747" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">RRF / 加权融合 / 重排</text>
  <text x="747" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">权限、租户、状态过滤</text>

  <rect x="660" y="392" width="176" height="64" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="748" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">最终 TopK</text>
  <text x="748" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">可解释、可分页、可审计</text>

  <line x1="240" y1="142" x2="318" y2="142" stroke="#355070" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M240 142 C280 142 270 358 318 358" fill="none" stroke="#355070" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M540 144 C604 144 600 222 640 235" fill="none" stroke="#355070" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M540 358 C604 358 600 280 640 268" fill="none" stroke="#355070" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="747" y1="326" x2="747" y2="390" stroke="#355070" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="80" y="286" width="150" height="104" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="155" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">同一张业务表</text>
  <text x="155" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">id / title / body</text>
  <text x="155" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">tenant / status</text>
  <text x="155" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">embedding</text>
  <path d="M230 320 C270 270 284 196 318 174" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M230 370 C272 378 288 370 318 366" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
</svg>
