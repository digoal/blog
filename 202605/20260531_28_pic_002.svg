<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">BM25 与向量检索的互补关系</title>
  <desc id="desc">对比 BM25 与向量检索在输入、索引、排序信号和失败模式上的差异。</desc>
  <rect x="28" y="28" width="904" height="464" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">两种召回信号：精确词项 vs 语义邻近</text>

  <rect x="72" y="116" width="360" height="300" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="252" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">BM25 / 全文检索</text>
  <text x="100" y="196" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">输入：关键词、短语、字段条件</text>
  <text x="100" y="228" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">索引：倒排表，term -&gt; doc list</text>
  <text x="100" y="260" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">排序：词频、逆文档频率、字段长度</text>
  <text x="100" y="292" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">强项：专名、型号、错误码、可解释匹配</text>
  <text x="100" y="324" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">弱项：同义表达、意图改写、概念相近</text>
  <rect x="110" y="354" width="284" height="34" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="252" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">“退货政策” 命中文档中的相同词项</text>

  <rect x="528" y="116" width="360" height="300" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="708" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7c2d12">Vector / 语义检索</text>
  <text x="556" y="196" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">输入：query embedding</text>
  <text x="556" y="228" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">索引：HNSW 图或 IVFFlat 分桶</text>
  <text x="556" y="260" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">排序：距离，通常越小越近</text>
  <text x="556" y="292" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">强项：同义、改写、问答意图、跨语言</text>
  <text x="556" y="324" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">弱项：专名、数字、过滤后召回不足</text>
  <rect x="566" y="354" width="284" height="34" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="708" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">“怎么退款” 召回“退货政策”</text>

  <line x1="452" y1="266" x2="508" y2="266" stroke="#64748b" stroke-width="2"/>
  <circle cx="480" cy="266" r="26" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="480" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#4c1d95">融合</text>
</svg>
