<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">ParadeDB pg_search 内部路径</title>
  <desc id="desc">展示 PostgreSQL 规划器、自定义扫描、BM25 索引访问方法、MVCC Directory 与 Tantivy 之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="512" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="490" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">pg_search：把 Tantivy 变成 PostgreSQL 可规划的索引</text>

  <rect x="62" y="112" width="180" height="86" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="152" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">SQL 查询</text>
  <text x="152" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">WHERE body @@@ '...'</text>

  <rect x="312" y="102" width="206" height="106" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="415" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Planner Hook</text>
  <text x="415" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">set_rel_pathlist_hook</text>
  <text x="415" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">PdbScan::create_custom_path</text>

  <rect x="590" y="102" width="230" height="106" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="705" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Custom Scan</text>
  <text x="705" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">抽取搜索谓词</text>
  <text x="705" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">成本估算、投影、TopN</text>

  <rect x="62" y="298" width="224" height="116" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="174" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">BM25 Index AM</text>
  <text x="174" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">bm25_handler()</text>
  <text x="174" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">ambuild / aminsert</text>
  <text x="174" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">ambulkdelete / vacuumcleanup</text>

  <rect x="362" y="298" width="224" height="116" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="474" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">MVCC Directory</text>
  <text x="474" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">按 snapshot 过滤 segment</text>
  <text x="474" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">xmin / xmax 可见性</text>
  <text x="474" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">merge / vacuum 边界</text>

  <rect x="662" y="298" width="224" height="116" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="774" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Tantivy Segment</text>
  <text x="774" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">inverted index</text>
  <text x="774" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">columnar fast fields</text>
  <text x="774" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">BM25 score</text>

  <line x1="242" y1="155" x2="310" y2="155" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="518" y1="155" x2="588" y2="155" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M705 208 C684 254 616 300 588 330" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="286" y1="356" x2="360" y2="356" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="586" y1="356" x2="660" y2="356" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M172 298 C206 252 254 220 312 184" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <text x="490" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">读路径看 Custom Scan，写入/删除/VACUUM 看 Index AM，事务一致性看 MVCC Directory。</text>
</svg>
