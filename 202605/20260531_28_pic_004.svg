<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">RRF 融合排序流程</title>
  <desc id="desc">展示 BM25 排名和向量排名如何通过 Reciprocal Rank Fusion 转换为统一分数。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="472" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">RRF：把不同量纲的分数改成排名投票</text>

  <rect x="78" y="112" width="260" height="270" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="208" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#14532d">BM25 结果</text>
  <text x="118" y="190" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 1: doc A</text>
  <text x="118" y="224" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 2: doc C</text>
  <text x="118" y="258" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 3: doc B</text>
  <text x="118" y="292" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 4: doc E</text>
  <text x="118" y="334" font-family="Arial, sans-serif" font-size="13" fill="#475569">BM25 分数不可直接与距离相加</text>

  <rect x="622" y="112" width="260" height="270" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="752" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7c2d12">向量结果</text>
  <text x="662" y="190" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 1: doc B</text>
  <text x="662" y="224" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 2: doc D</text>
  <text x="662" y="258" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 3: doc A</text>
  <text x="662" y="292" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">rank 4: doc C</text>
  <text x="662" y="334" font-family="Arial, sans-serif" font-size="13" fill="#475569">距离越小越好，方向也不同</text>

  <rect x="380" y="154" width="200" height="168" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="480" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#4c1d95">RRF 公式</text>
  <text x="480" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">score = Σ 1 / (k + rank)</text>
  <text x="480" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">常见 k = 60</text>
  <text x="480" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">rank 越靠前贡献越大</text>

  <rect x="332" y="404" width="296" height="58" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="480" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">融合后 TopK</text>
  <text x="480" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">同时被两个分支高排名召回的文档更靠前</text>

  <line x1="338" y1="236" x2="378" y2="236" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
  <line x1="622" y1="236" x2="582" y2="236" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
  <line x1="480" y1="322" x2="480" y2="402" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
</svg>
