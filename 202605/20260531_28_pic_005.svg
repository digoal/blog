<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">混合搜索上线运维闭环</title>
  <desc id="desc">展示从数据建模、索引、查询、评测到运维观测的混合搜索闭环。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="492" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">混合搜索不是一条 SQL，而是一套闭环</text>

  <g font-family="Arial, sans-serif">
    <rect x="96" y="118" width="190" height="86" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="191" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">1. 数据建模</text>
    <text x="191" y="174" text-anchor="middle" font-size="12" fill="#334155">文本字段、主键、权限</text>
    <text x="191" y="192" text-anchor="middle" font-size="12" fill="#334155">embedding 版本</text>

    <rect x="386" y="118" width="190" height="86" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="481" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">2. 建索引</text>
    <text x="481" y="174" text-anchor="middle" font-size="12" fill="#334155">bm25 + hnsw/ivfflat</text>
    <text x="481" y="192" text-anchor="middle" font-size="12" fill="#334155">ANALYZE 与参数</text>

    <rect x="676" y="118" width="190" height="86" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="771" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">3. 查询改写</text>
    <text x="771" y="174" text-anchor="middle" font-size="12" fill="#334155">两个候选集先 LIMIT</text>
    <text x="771" y="192" text-anchor="middle" font-size="12" fill="#334155">RRF 或重排</text>

    <rect x="676" y="316" width="190" height="86" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="771" y="348" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">4. 质量评测</text>
    <text x="771" y="372" text-anchor="middle" font-size="12" fill="#334155">recall@K / NDCG</text>
    <text x="771" y="390" text-anchor="middle" font-size="12" fill="#334155">坏例归因</text>

    <rect x="386" y="316" width="190" height="86" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="481" y="348" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">5. 性能观测</text>
    <text x="481" y="372" text-anchor="middle" font-size="12" fill="#334155">EXPLAIN BUFFERS</text>
    <text x="481" y="390" text-anchor="middle" font-size="12" fill="#334155">延迟、IO、排序</text>

    <rect x="96" y="316" width="190" height="86" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="191" y="348" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">6. 维护演进</text>
    <text x="191" y="372" text-anchor="middle" font-size="12" fill="#334155">VACUUM / REINDEX</text>
    <text x="191" y="390" text-anchor="middle" font-size="12" fill="#334155">重嵌入、版本切换</text>
  </g>

  <line x1="286" y1="161" x2="384" y2="161" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="576" y1="161" x2="674" y2="161" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="771" y1="204" x2="771" y2="314" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="676" y1="359" x2="578" y2="359" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="386" y1="359" x2="288" y2="359" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M191 316 C128 246 130 214 190 206" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
