<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">TensorChord 三件套混合搜索架构</title>
  <desc id="desc">展示业务表如何同时连接 pg_tokenizer、VectorChord-bm25 和 VectorChord，并在 SQL 层完成候选融合。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .core { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 8; }
    .lex { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .vec { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .sql { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 16px; fill: #0f172a; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <rect x="42" y="56" width="190" height="110" class="core"/>
  <text x="137" y="91" text-anchor="middle" class="label">业务表 docs</text>
  <text x="137" y="121" text-anchor="middle" class="small">id / tenant / ACL</text>
  <text x="137" y="145" text-anchor="middle" class="small">text / bm25vector / vector</text>

  <rect x="386" y="38" width="220" height="90" class="box"/>
  <text x="496" y="73" text-anchor="middle" class="label">pg_tokenizer.rs</text>
  <text x="496" y="101" text-anchor="middle" class="small">文本清洗、分词、词表 ID</text>

  <rect x="386" y="196" width="220" height="108" class="lex"/>
  <text x="496" y="231" text-anchor="middle" class="label">VectorChord-bm25</text>
  <text x="496" y="259" text-anchor="middle" class="small">BM25 稀疏表示</text>
  <text x="496" y="283" text-anchor="middle" class="small">Block-WEAK-AND TopK</text>

  <rect x="386" y="370" width="220" height="108" class="vec"/>
  <text x="496" y="405" text-anchor="middle" class="label">VectorChord</text>
  <text x="496" y="433" text-anchor="middle" class="small">vchordrq / vchordg</text>
  <text x="496" y="457" text-anchor="middle" class="small">ANN 召回 + rerank</text>

  <rect x="728" y="196" width="190" height="118" class="sql"/>
  <text x="823" y="232" text-anchor="middle" class="label">SQL 融合层</text>
  <text x="823" y="261" text-anchor="middle" class="small">RRF / 加权 / 重排</text>
  <text x="823" y="286" text-anchor="middle" class="small">权限、状态、时间过滤</text>

  <rect x="728" y="386" width="190" height="88" class="box"/>
  <text x="823" y="421" text-anchor="middle" class="label">最终 TopK</text>
  <text x="823" y="449" text-anchor="middle" class="small">可解释、可回表、可观测</text>

  <path d="M232 96 C286 96, 324 84, 386 84" class="arrow"/>
  <path d="M496 128 C496 156, 496 170, 496 196" class="arrow"/>
  <path d="M232 123 C304 149, 318 242, 386 250" class="arrow"/>
  <path d="M232 148 C304 212, 318 409, 386 424" class="arrow"/>
  <path d="M606 250 C652 250, 679 250, 728 250" class="arrow"/>
  <path d="M606 424 C680 424, 696 302, 728 286" class="arrow"/>
  <path d="M823 314 C823 344, 823 358, 823 386" class="arrow"/>

  <text x="303" y="72" class="small">文本配置</text>
  <text x="286" y="218" class="small">词法分支</text>
  <text x="281" y="388" class="small">语义分支</text>
  <text x="644" y="232" class="small">bm25 rank</text>
  <text x="646" y="404" class="small">vector rank</text>
</svg>
