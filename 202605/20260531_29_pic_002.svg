<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">pg_tokenizer.rs 文本处理流水线</title>
  <desc id="desc">展示字符过滤、预分词、词过滤和模型映射如何把原始文本变成 token id 数组。</desc>
  <style>
    .stage { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .model { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .catalog { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <rect x="42" y="82" width="140" height="86" class="stage"/>
  <text x="112" y="116" text-anchor="middle" class="text label">原始文本</text>
  <text x="112" y="144" text-anchor="middle" class="text small">title / body</text>

  <rect x="232" y="82" width="150" height="86" class="stage"/>
  <text x="307" y="112" text-anchor="middle" class="text label">字符过滤</text>
  <text x="307" y="139" text-anchor="middle" class="text small">lowercase</text>
  <text x="307" y="159" text-anchor="middle" class="text small">Unicode 归一化</text>

  <rect x="432" y="82" width="150" height="86" class="stage"/>
  <text x="507" y="112" text-anchor="middle" class="text label">预分词</text>
  <text x="507" y="139" text-anchor="middle" class="text small">regex / unicode</text>
  <text x="507" y="159" text-anchor="middle" class="text small">jieba / lindera</text>

  <rect x="632" y="82" width="150" height="86" class="stage"/>
  <text x="707" y="112" text-anchor="middle" class="text label">词过滤</text>
  <text x="707" y="139" text-anchor="middle" class="text small">stopwords / stem</text>
  <text x="707" y="159" text-anchor="middle" class="text small">synonym / ngram</text>

  <rect x="810" y="82" width="120" height="86" class="model"/>
  <text x="870" y="112" text-anchor="middle" class="text label">模型</text>
  <text x="870" y="139" text-anchor="middle" class="text small">词表映射</text>
  <text x="870" y="159" text-anchor="middle" class="text small">token ids</text>

  <rect x="282" y="252" width="398" height="92" class="catalog"/>
  <text x="481" y="285" text-anchor="middle" class="text label">catalog + 连接内对象池</text>
  <text x="481" y="314" text-anchor="middle" class="text small">配置持久化在 tokenizer_catalog，首次使用后缓存在连接内</text>
  <text x="481" y="336" text-anchor="middle" class="text small">事务回滚后缓存可能仍在，需显式 drop 或重连清理</text>

  <path d="M182 125 L232 125" class="arrow"/>
  <path d="M382 125 L432 125" class="arrow"/>
  <path d="M582 125 L632 125" class="arrow"/>
  <path d="M782 125 L810 125" class="arrow"/>
  <path d="M870 168 C870 210, 700 238, 662 252" class="arrow"/>
  <path d="M481 252 C434 220, 354 191, 307 168" class="arrow"/>
</svg>
