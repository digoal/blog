<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">VectorChord-bm25 的 Block-WEAK-AND 剪枝路径</title>
  <desc id="desc">展示查询 token、倒排块上界、动态阈值和最终 TopK 之间的关系。</desc>
  <style>
    .token { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .block { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 6; }
    .hot { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 6; }
    .top { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <rect x="44" y="70" width="160" height="84" class="token"/>
  <text x="124" y="103" text-anchor="middle" class="text label">bm25query</text>
  <text x="124" y="131" text-anchor="middle" class="text small">token A / B / C</text>

  <rect x="280" y="42" width="154" height="74" class="block"/>
  <text x="357" y="72" text-anchor="middle" class="text label">token A</text>
  <text x="357" y="96" text-anchor="middle" class="text small">posting blocks</text>
  <rect x="280" y="142" width="154" height="74" class="hot"/>
  <text x="357" y="172" text-anchor="middle" class="text label">token B</text>
  <text x="357" y="196" text-anchor="middle" class="text small">高上界块</text>
  <rect x="280" y="242" width="154" height="74" class="block"/>
  <text x="357" y="272" text-anchor="middle" class="text label">token C</text>
  <text x="357" y="296" text-anchor="middle" class="text small">低上界块</text>

  <rect x="512" y="78" width="180" height="98" class="block"/>
  <text x="602" y="112" text-anchor="middle" class="text label">块级上界求和</text>
  <text x="602" y="141" text-anchor="middle" class="text small">若上界 ≤ 当前阈值</text>
  <text x="602" y="162" text-anchor="middle" class="text small">整块跳过</text>

  <rect x="512" y="244" width="180" height="98" class="hot"/>
  <text x="602" y="278" text-anchor="middle" class="text label">候选文档计分</text>
  <text x="602" y="307" text-anchor="middle" class="text small">idf + tf + fieldnorm</text>
  <text x="602" y="328" text-anchor="middle" class="text small">命中过滤后入堆</text>

  <rect x="756" y="142" width="158" height="126" class="top"/>
  <text x="835" y="178" text-anchor="middle" class="text label">TopK 堆</text>
  <text x="835" y="207" text-anchor="middle" class="text small">第 K 名分数</text>
  <text x="835" y="229" text-anchor="middle" class="text small">变成动态阈值</text>
  <text x="835" y="251" text-anchor="middle" class="text small">继续剪枝</text>

  <path d="M204 112 C236 101, 244 81, 280 79" class="arrow"/>
  <path d="M204 112 C239 128, 245 175, 280 179" class="arrow"/>
  <path d="M204 112 C238 159, 246 271, 280 279" class="arrow"/>
  <path d="M434 79 C468 84, 483 101, 512 118" class="arrow"/>
  <path d="M434 179 C469 179, 485 149, 512 135" class="arrow"/>
  <path d="M434 279 C468 282, 484 300, 512 302" class="arrow"/>
  <path d="M692 293 C720 272, 731 244, 756 222" class="arrow"/>
  <path d="M756 172 C720 122, 707 114, 692 113" class="arrow"/>
  <path d="M764 268 C690 388, 439 394, 358 318" class="dash"/>
  <text x="530" y="402" class="text small">阈值越高，可跳过的 token 块越多</text>
</svg>
