<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">VectorChord 查询、预过滤与重排</title>
  <desc id="desc">展示 vchordrq 搜索先用量化结构召回候选，再按配置做预过滤和精确重排。</desc>
  <style>
    .stage { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .filter { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 8; }
    .heap { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <rect x="46" y="72" width="150" height="90" class="stage"/>
  <text x="121" y="106" text-anchor="middle" class="text label">查询向量</text>
  <text x="121" y="134" text-anchor="middle" class="text small">vector / halfvec</text>

  <rect x="266" y="58" width="170" height="118" class="stage"/>
  <text x="351" y="94" text-anchor="middle" class="text label">vchordrq 搜索</text>
  <text x="351" y="123" text-anchor="middle" class="text small">RaBitQ / centroid</text>
  <text x="351" y="146" text-anchor="middle" class="text small">probes + epsilon</text>

  <rect x="500" y="58" width="172" height="118" class="filter"/>
  <text x="586" y="94" text-anchor="middle" class="text label">可选 prefilter</text>
  <text x="586" y="123" text-anchor="middle" class="text small">回表检查 WHERE</text>
  <text x="586" y="146" text-anchor="middle" class="text small">减少无效重排</text>

  <rect x="736" y="58" width="170" height="118" class="heap"/>
  <text x="821" y="94" text-anchor="middle" class="text label">精确重排</text>
  <text x="821" y="123" text-anchor="middle" class="text small">rerank_in_index</text>
  <text x="821" y="146" text-anchor="middle" class="text small">或 rerank_in_table</text>

  <rect x="266" y="292" width="170" height="96" class="warn"/>
  <text x="351" y="326" text-anchor="middle" class="text label">候选不足风险</text>
  <text x="351" y="354" text-anchor="middle" class="text small">过滤选择性高时</text>
  <text x="351" y="376" text-anchor="middle" class="text small">需要扩大召回</text>

  <rect x="500" y="292" width="172" height="96" class="warn"/>
  <text x="586" y="326" text-anchor="middle" class="text label">I/O 策略</text>
  <text x="586" y="354" text-anchor="middle" class="text small">read_buffer</text>
  <text x="586" y="376" text-anchor="middle" class="text small">prefetch / stream</text>

  <rect x="736" y="292" width="170" height="96" class="heap"/>
  <text x="821" y="326" text-anchor="middle" class="text label">向量 TopN</text>
  <text x="821" y="354" text-anchor="middle" class="text small">进入 SQL 融合</text>
  <text x="821" y="376" text-anchor="middle" class="text small">保留 rank 与距离</text>

  <path d="M196 117 L266 117" class="arrow"/>
  <path d="M436 117 L500 117" class="arrow"/>
  <path d="M672 117 L736 117" class="arrow"/>
  <path d="M821 176 L821 292" class="arrow"/>
  <path d="M351 176 L351 292" class="arrow"/>
  <path d="M586 176 L586 292" class="arrow"/>
  <path d="M436 340 L500 340" class="arrow"/>
  <path d="M672 340 L736 340" class="arrow"/>
</svg>
