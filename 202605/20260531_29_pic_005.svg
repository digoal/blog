<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">混合搜索质量与运维闭环</title>
  <desc id="desc">展示从离线标注、参数调优、线上观测到坏例回放的混合搜索迭代闭环。</desc>
  <style>
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .quality { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
    .ops { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <rect x="380" y="38" width="200" height="92" class="quality"/>
  <text x="480" y="72" text-anchor="middle" class="text label">离线评测集</text>
  <text x="480" y="101" text-anchor="middle" class="text small">query / relevant docs</text>

  <rect x="676" y="142" width="202" height="98" class="node"/>
  <text x="777" y="176" text-anchor="middle" class="text label">参数与策略</text>
  <text x="777" y="205" text-anchor="middle" class="text small">tokenizer / probes</text>
  <text x="777" y="227" text-anchor="middle" class="text small">bm25.limit / RRF k</text>

  <rect x="676" y="328" width="202" height="98" class="ops"/>
  <text x="777" y="362" text-anchor="middle" class="text label">线上观测</text>
  <text x="777" y="391" text-anchor="middle" class="text small">EXPLAIN BUFFERS</text>
  <text x="777" y="413" text-anchor="middle" class="text small">P95 / index size / VACUUM</text>

  <rect x="380" y="408" width="200" height="92" class="node"/>
  <text x="480" y="442" text-anchor="middle" class="text label">坏例回放</text>
  <text x="480" y="471" text-anchor="middle" class="text small">漏召回 / 误排序 / 过滤丢失</text>

  <rect x="82" y="328" width="202" height="98" class="quality"/>
  <text x="183" y="362" text-anchor="middle" class="text label">质量指标</text>
  <text x="183" y="391" text-anchor="middle" class="text small">Recall@K / NDCG@K</text>
  <text x="183" y="413" text-anchor="middle" class="text small">分支贡献率</text>

  <rect x="82" y="142" width="202" height="98" class="ops"/>
  <text x="183" y="176" text-anchor="middle" class="text label">发布边界</text>
  <text x="183" y="205" text-anchor="middle" class="text small">重建窗口 / 回滚</text>
  <text x="183" y="227" text-anchor="middle" class="text small">模型版本 / 词表版本</text>

  <path d="M580 84 C640 91, 704 111, 758 142" class="arrow"/>
  <path d="M777 240 L777 328" class="arrow"/>
  <path d="M676 377 C628 407, 608 431, 580 454" class="arrow"/>
  <path d="M380 454 C335 430, 310 407, 284 377" class="arrow"/>
  <path d="M183 328 L183 240" class="arrow"/>
  <path d="M284 191 C324 140, 344 112, 380 84" class="arrow"/>
  <path d="M284 377 C364 330, 604 330, 676 377" class="arrow"/>
  <text x="480" y="318" text-anchor="middle" class="text small">没有评测闭环，混合搜索只是在 SQL 里叠复杂度</text>
</svg>
