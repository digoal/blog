<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">时序应用在 TimescaleDB 中的分层架构</title>
  <desc id="desc">展示应用写入、Hypertable、Chunk、压缩列存、连续聚合和后台策略之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .band { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .hot { fill: #fee2e2; stroke: #b91c1c; }
    .warm { fill: #e0f2fe; stroke: #0369a1; }
    .cold { fill: #dcfce7; stroke: #15803d; }
    .meta { fill: #fef3c7; stroke: #a16207; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="text title" x="36" y="48">时序应用：把“按时间持续流入的数据”交给数据库的类型、分区、执行器和后台任务体系</text>

  <rect class="band" x="40" y="86" width="220" height="120"/>
  <text class="text title" x="66" y="125">业务写入</text>
  <text class="text small" x="66" y="158">设备、交易、日志、事件</text>
  <text class="text small" x="66" y="184">核心字段：time + entity + value</text>

  <rect class="band warm" x="330" y="76" width="250" height="140"/>
  <text class="text title" x="356" y="116">Hypertable</text>
  <text class="text small" x="356" y="150">用户看到的一张逻辑表</text>
  <text class="text small" x="356" y="176">时间维度必选，可加空间维度</text>
  <text class="text small" x="356" y="202">元数据在 _timescaledb_catalog</text>

  <rect class="band hot" x="660" y="76" width="360" height="140"/>
  <text class="text title" x="686" y="116">热 Chunk：行存 + PostgreSQL MVCC</text>
  <text class="text small" x="686" y="150">按时间范围切片，必要时再按 hash 空间切片</text>
  <text class="text small" x="686" y="176">写入时找 chunk，不存在则创建</text>
  <text class="text small" x="686" y="202">查询时按约束裁剪无关 chunk</text>

  <rect class="band cold" x="660" y="270" width="360" height="130"/>
  <text class="text title" x="686" y="310">冷 Chunk：压缩/列存</text>
  <text class="text small" x="686" y="344">segmentby 保留分组键，orderby 决定批内顺序</text>
  <text class="text small" x="686" y="370">DeltaDelta、Gorilla、Dictionary、UUID 等算法</text>

  <rect class="band meta" x="330" y="270" width="250" height="130"/>
  <text class="text title" x="356" y="310">Continuous Aggregate</text>
  <text class="text small" x="356" y="344">time_bucket 分桶</text>
  <text class="text small" x="356" y="370">内部物化 hypertable 存 partial state</text>

  <rect class="band meta" x="40" y="270" width="220" height="130"/>
  <text class="text title" x="66" y="310">后台策略</text>
  <text class="text small" x="66" y="344">压缩、保留、连续聚合刷新</text>
  <text class="text small" x="66" y="370">由 PostgreSQL background worker 执行</text>

  <rect class="band" x="150" y="470" width="820" height="90"/>
  <text class="text title" x="180" y="508">PostgreSQL 基座</text>
  <text class="text small" x="180" y="540">SQL、事务、WAL、索引、统计信息、优化器、执行器、权限、备份恢复仍然是基础边界</text>

  <path class="arrow" d="M260 146 H330"/>
  <path class="arrow" d="M580 146 H660"/>
  <path class="arrow" d="M840 216 V270"/>
  <path class="arrow" d="M660 335 H580"/>
  <path class="arrow" d="M330 335 H260"/>
  <path class="arrow" d="M150 400 V470"/>
  <path class="arrow" d="M455 400 V470"/>
  <path class="arrow" d="M840 400 V470"/>
</svg>
