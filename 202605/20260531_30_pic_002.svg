<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Hypertable 写入路由和 Chunk 创建路径</title>
  <desc id="desc">展示写入行根据时间和空间维度形成 point，查询缓存和 catalog，找到或创建目标 chunk。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 9; }
    .decision { fill: #fef3c7; stroke: #a16207; stroke-width: 1.5; }
    .chunk { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .lock { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text title" x="36" y="48">写入路径：每行先定位到维度空间中的 point，再找到对应 chunk</text>

  <rect class="box" x="54" y="105" width="190" height="90"/>
  <text class="text" x="78" y="140">INSERT 行</text>
  <text class="small" x="78" y="168">time, device_id, value</text>

  <rect class="box" x="304" y="92" width="230" height="116"/>
  <text class="text" x="328" y="128">计算维度 point</text>
  <text class="small" x="328" y="158">时间维度：range slice</text>
  <text class="small" x="328" y="184">空间维度：hash slice 可选</text>

  <rect class="box" x="594" y="92" width="230" height="116"/>
  <text class="text" x="618" y="128">subspace 缓存</text>
  <text class="small" x="618" y="158">同一批写入复用 ChunkInsertState</text>
  <text class="small" x="618" y="184">减少重复打开 chunk</text>

  <polygon class="decision" points="930,90 1045,150 930,210 815,150"/>
  <text class="text" x="887" y="145">chunk</text>
  <text class="text" x="880" y="171">已存在？</text>

  <rect class="chunk" x="640" y="300" width="250" height="110"/>
  <text class="text" x="666" y="336">找到目标 chunk</text>
  <text class="small" x="666" y="366">RowExclusiveLock</text>
  <text class="small" x="666" y="392">转换 tuple 到 chunk 描述符</text>

  <rect class="lock" x="875" y="455" width="205" height="90"/>
  <text class="text" x="902" y="490">必要时创建 chunk</text>
  <text class="small" x="902" y="518">序列化并发 chunk 创建</text>

  <rect class="chunk" x="310" y="455" width="250" height="90"/>
  <text class="text" x="340" y="490">写入物理 chunk 表</text>
  <text class="small" x="340" y="518">仍走 PostgreSQL heap/MVCC/WAL</text>

  <path class="arrow" d="M244 150 H304"/>
  <path class="arrow" d="M534 150 H594"/>
  <path class="arrow" d="M824 150 H815"/>
  <path class="arrow" d="M930 210 C920 265 870 296 790 300"/>
  <path class="arrow" d="M930 210 C1010 280 1030 390 1000 455"/>
  <path class="arrow" d="M875 500 H560"/>
  <path class="arrow" d="M640 355 C560 380 500 425 455 455"/>

  <text class="small" x="72" y="260">源码对应：src/chunk_tuple_routing.c 中先查找 chunk，未命中时调用创建路径。</text>
  <text class="small" x="72" y="286">工程含义：chunk_interval 不合适，会直接影响写入打开关系数量、索引数量和查询裁剪粒度。</text>
</svg>
