<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">查询裁剪与 ChunkAppend 执行路径</title>
  <desc id="desc">展示 WHERE 时间条件如何在计划期和执行期排除无关 chunk，减少扫描数据量。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 9; }
    .scan { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 7; }
    .skip { fill: #e2e8f0; stroke: #64748b; stroke-width: 1.5; rx: 7; }
    .plan { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 9; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text title" x="36" y="48">查询路径：先少展开 chunk，再在 ChunkAppend 中继续排除无关分区</text>

  <rect class="box" x="60" y="96" width="280" height="130"/>
  <text class="text" x="86" y="132">SQL 条件</text>
  <text class="small" x="86" y="164">WHERE time &gt;= now() - interval '1 day'</text>
  <text class="small" x="86" y="190">AND device_id = 42</text>

  <rect class="plan" x="420" y="96" width="290" height="130"/>
  <text class="text" x="448" y="132">计划期展开 hypertable</text>
  <text class="small" x="448" y="164">使用维度约束和 restrict info</text>
  <text class="small" x="448" y="190">避免先展开所有 chunk</text>

  <rect class="plan" x="790" y="96" width="260" height="130"/>
  <text class="text" x="818" y="132">Custom Scan</text>
  <text class="small" x="818" y="164">ChunkAppend / ConstraintAwareAppend</text>
  <text class="small" x="818" y="190">支持 startup/runtime exclusion</text>

  <rect class="skip" x="80" y="330" width="135" height="80"/>
  <text class="text" x="108" y="363">昨天前</text>
  <text class="small" x="106" y="390">排除</text>
  <rect class="scan" x="245" y="330" width="135" height="80"/>
  <text class="text" x="274" y="363">最近 1 天</text>
  <text class="small" x="286" y="390">扫描</text>
  <rect class="scan" x="410" y="330" width="135" height="80"/>
  <text class="text" x="438" y="363">当前热块</text>
  <text class="small" x="452" y="390">扫描</text>
  <rect class="skip" x="575" y="330" width="135" height="80"/>
  <text class="text" x="606" y="363">未来块</text>
  <text class="small" x="616" y="390">排除</text>

  <rect class="box" x="790" y="318" width="260" height="115"/>
  <text class="text" x="818" y="354">输出计划信号</text>
  <text class="small" x="818" y="384">EXPLAIN 可见 Chunks excluded</text>
  <text class="small" x="818" y="410">也可能看到 Runtime Exclusion</text>

  <path class="arrow" d="M340 161 H420"/>
  <path class="arrow" d="M710 161 H790"/>
  <path class="arrow" d="M920 226 V318"/>
  <path class="arrow" d="M565 226 C520 280 450 312 325 330"/>
  <path class="arrow" d="M565 226 C590 280 620 305 642 330"/>

  <text class="small" x="70" y="500">源码对应：src/planner/expand_hypertable.c 说明 TimescaleDB 将 chunk exclusion 前移到计划期。</text>
  <text class="small" x="70" y="526">src/nodes/chunk_append/exec.c 负责 startup/runtime exclusion，并在 EXPLAIN 中输出排除数量。</text>
</svg>
