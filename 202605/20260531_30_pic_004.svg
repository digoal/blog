<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">TimescaleDB 压缩列存的 segmentby 和 orderby</title>
  <desc id="desc">展示行存 chunk 如何按 segmentby 分组、按 orderby 排序，并转换为带稀疏元数据的压缩列。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 9; }
    .row { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1; rx: 5; }
    .seg { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .col { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .meta { fill: #fef3c7; stroke: #a16207; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text title" x="36" y="48">压缩路径：让相邻值更相似，让查询先用元数据跳过批次</text>

  <rect class="box" x="55" y="95" width="250" height="360"/>
  <text class="text" x="82" y="132">行存 Chunk</text>
  <rect class="row" x="82" y="165" width="195" height="38"/><text class="small" x="96" y="190">dev=A, t=10:00, v=10.1</text>
  <rect class="row" x="82" y="213" width="195" height="38"/><text class="small" x="96" y="238">dev=B, t=10:00, v=20.2</text>
  <rect class="row" x="82" y="261" width="195" height="38"/><text class="small" x="96" y="286">dev=A, t=10:01, v=10.3</text>
  <rect class="row" x="82" y="309" width="195" height="38"/><text class="small" x="96" y="334">dev=B, t=10:01, v=20.1</text>
  <rect class="row" x="82" y="357" width="195" height="38"/><text class="small" x="96" y="382">dev=A, t=10:02, v=10.4</text>

  <rect class="seg" x="390" y="105" width="270" height="145"/>
  <text class="text" x="420" y="142">segmentby = device_id</text>
  <text class="small" x="420" y="174">按实体分组，保留过滤键</text>
  <text class="small" x="420" y="202">同一设备的值更连续</text>
  <text class="small" x="420" y="230">适合高频设备、用户、租户</text>

  <rect class="seg" x="390" y="310" width="270" height="145"/>
  <text class="text" x="420" y="347">orderby = time DESC</text>
  <text class="small" x="420" y="379">决定批内顺序</text>
  <text class="small" x="420" y="407">提高 delta-delta 等算法效果</text>
  <text class="small" x="420" y="435">利于时间范围 min/max 裁剪</text>

  <rect class="col" x="755" y="90" width="300" height="205"/>
  <text class="text" x="785" y="126">压缩列存批次</text>
  <text class="small" x="785" y="158">time[]：DeltaDelta / UUID v7</text>
  <text class="small" x="785" y="186">value[]：Gorilla / Array</text>
  <text class="small" x="785" y="214">status[]：Dictionary / Bool</text>
  <text class="small" x="785" y="242">读取时用 iterator 顺序解压</text>
  <text class="small" x="785" y="270">没有任意随机访问假设</text>

  <rect class="meta" x="755" y="350" width="300" height="115"/>
  <text class="text" x="785" y="386">稀疏元数据</text>
  <text class="small" x="785" y="416">每个 orderby 可能产生 min/max</text>
  <text class="small" x="785" y="442">组合键可用 bloom 过滤</text>

  <path class="arrow" d="M305 250 H390"/>
  <path class="arrow" d="M660 178 C710 170 725 160 755 150"/>
  <path class="arrow" d="M660 382 C710 398 725 406 755 408"/>

  <text class="small" x="70" y="535">源码对应：tsl/src/compression/README.md 说明算法面向相邻值相似的时序场景。</text>
  <text class="small" x="70" y="561">tsl/src/compression/create.c 校验 segmentby + orderby 形成的隐式索引键数量不能超过 PostgreSQL INDEX_MAX_KEYS。</text>
</svg>
