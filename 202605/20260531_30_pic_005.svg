<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">连续聚合的增量刷新机制</title>
  <desc id="desc">展示原始 hypertable、invalidation log、刷新窗口、内部物化 hypertable 和用户视图之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 9; }
    .raw { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 9; }
    .log { fill: #fef3c7; stroke: #a16207; stroke-width: 1.5; rx: 9; }
    .mat { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 9; }
    .view { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 9; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text title" x="36" y="48">连续聚合：不是反复刷新整张物化视图，而是刷新被 invalidation 标记的时间桶</text>

  <rect class="raw" x="55" y="105" width="245" height="130"/>
  <text class="text" x="84" y="142">原始 Hypertable</text>
  <text class="small" x="84" y="174">INSERT / UPDATE / DELETE</text>
  <text class="small" x="84" y="202">修改时间范围被记录</text>

  <rect class="log" x="390" y="90" width="270" height="160"/>
  <text class="text" x="420" y="126">Hypertable Invalidation Log</text>
  <text class="small" x="420" y="158">每个事务尽量合并为范围</text>
  <text class="small" x="420" y="186">低于 threshold 才写 invalidation</text>
  <text class="small" x="420" y="214">降低热桶写放大</text>

  <rect class="log" x="755" y="90" width="300" height="160"/>
  <text class="text" x="785" y="126">Cagg Invalidation Log</text>
  <text class="small" x="785" y="158">刷新时从 hypertable log 切分</text>
  <text class="small" x="785" y="186">同一原始表可对应多个连续聚合</text>
  <text class="small" x="785" y="214">只刷新窗口内无效区域</text>

  <rect class="mat" x="390" y="340" width="270" height="135"/>
  <text class="text" x="420" y="377">内部物化 Hypertable</text>
  <text class="small" x="420" y="409">按 time_bucket 存 partial state</text>
  <text class="small" x="420" y="437">avg 可能存 sum/count 等中间态</text>

  <rect class="view" x="755" y="340" width="300" height="135"/>
  <text class="text" x="785" y="377">用户查询视图</text>
  <text class="small" x="785" y="409">查询时 finalize partial state</text>
  <text class="small" x="785" y="437">可叠加实时部分或策略刷新</text>

  <rect class="box" x="55" y="340" width="245" height="135"/>
  <text class="text" x="84" y="377">刷新策略/手工刷新</text>
  <text class="small" x="84" y="409">refresh_continuous_aggregate</text>
  <text class="small" x="84" y="437">add_continuous_aggregate_policy</text>

  <path class="arrow" d="M300 170 H390"/>
  <path class="arrow" d="M660 170 H755"/>
  <path class="arrow" d="M525 250 V340"/>
  <path class="arrow" d="M300 408 H390"/>
  <path class="arrow" d="M660 408 H755"/>
  <path class="arrow" d="M905 340 V250"/>

  <text class="small" x="70" y="540">源码对应：tsl/src/continuous_aggs/README.md 描述用户视图、partial view、direct view、内部物化 hypertable、invalidation threshold 和两个 log。</text>
  <text class="small" x="70" y="566">tsl/src/continuous_aggs/invalidation.c 描述 invalidation 从 insert trigger 到 refresh 的流转和合并/切分。</text>
</svg>
