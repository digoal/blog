<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">时序数据生命周期与后台策略</title>
  <desc id="desc">展示热写、查询、压缩、连续聚合刷新、保留删除策略在时间轴上的配合。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .axis { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
    .zone { rx: 10; stroke-width: 1.5; }
    .hot { fill: #fee2e2; stroke: #b91c1c; }
    .warm { fill: #fef3c7; stroke: #a16207; }
    .cold { fill: #dcfce7; stroke: #15803d; }
    .drop { fill: #e2e8f0; stroke: #64748b; }
    .policy { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text title" x="36" y="48">生命周期：先保证热写和近实时查询，再把历史数据自动转为便宜的形态</text>

  <line class="axis" x1="90" y1="300" x2="1030" y2="300"/>
  <text class="small" x="88" y="335">过去</text>
  <text class="small" x="997" y="335">现在</text>

  <rect class="zone drop" x="95" y="180" width="170" height="105"/>
  <text class="text" x="132" y="218">过期数据</text>
  <text class="small" x="124" y="250">retention policy</text>
  <text class="small" x="126" y="272">drop_chunks</text>

  <rect class="zone cold" x="310" y="180" width="210" height="105"/>
  <text class="text" x="354" y="218">冷数据</text>
  <text class="small" x="348" y="250">compressed chunk</text>
  <text class="small" x="350" y="272">列存分析为主</text>

  <rect class="zone warm" x="565" y="180" width="210" height="105"/>
  <text class="text" x="610" y="218">温数据</text>
  <text class="small" x="600" y="250">连续聚合覆盖</text>
  <text class="small" x="602" y="272">少量回补可刷新</text>

  <rect class="zone hot" x="820" y="180" width="210" height="105"/>
  <text class="text" x="864" y="218">热数据</text>
  <text class="small" x="852" y="250">行存写入和实时查询</text>
  <text class="small" x="854" y="272">暂不压缩或延迟刷新</text>

  <rect class="policy" x="285" y="390" width="250" height="95"/>
  <text class="text" x="312" y="426">add_compression_policy</text>
  <text class="small" x="312" y="456">compress_after 应大于乱序/补写窗口</text>

  <rect class="policy" x="555" y="390" width="260" height="95"/>
  <text class="text" x="582" y="426">add_continuous_aggregate_policy</text>
  <text class="small" x="582" y="456">start_offset/end_offset 定义刷新窗口</text>

  <rect class="policy" x="50" y="390" width="215" height="95"/>
  <text class="text" x="78" y="426">add_retention_policy</text>
  <text class="small" x="78" y="456">drop_after 必须晚于审计需求</text>

  <path class="arrow" d="M410 390 V285"/>
  <path class="arrow" d="M685 390 V285"/>
  <path class="arrow" d="M157 390 V285"/>

  <text class="small" x="70" y="545">源码对应：sql/policy_api.sql 暴露 add_retention_policy、add_compression_policy、add_columnstore_policy。</text>
  <text class="small" x="70" y="571">tsl/src/bgw_policy/job.c 与各 policy API 文件负责读取 config、计算窗口并执行任务。</text>
</svg>
