<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img">
  <title>HTAP 与数据湖的组合架构</title>
  <desc>展示应用、PostgreSQL、pg_duckdb、DuckDB、对象存储、开放湖格式和 Quack 远端 DuckDB 节点之间的职责边界。</desc>
  <defs>
    <marker id="arrow-a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="580" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="590" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">一套 SQL 门面，三类执行与存储边界</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="112" width="180" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="160" y="148" text-anchor="middle" font-size="18" fill="#075985">业务应用</text>
    <text x="160" y="178" text-anchor="middle" font-size="15" fill="#334155">OLTP 写入 / 报表查询</text>

    <rect x="330" y="92" width="250" height="132" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="455" y="130" text-anchor="middle" font-size="19" fill="#065f46">PostgreSQL</text>
    <text x="455" y="160" text-anchor="middle" font-size="15" fill="#334155">MVCC / WAL / Catalog</text>
    <text x="455" y="188" text-anchor="middle" font-size="15" fill="#334155">事务边界和权限入口</text>

    <rect x="660" y="92" width="220" height="132" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="770" y="130" text-anchor="middle" font-size="19" fill="#5b21b6">pg_duckdb</text>
    <text x="770" y="160" text-anchor="middle" font-size="15" fill="#334155">Planner Hook</text>
    <text x="770" y="188" text-anchor="middle" font-size="15" fill="#334155">CustomScan + 类型转换</text>

    <rect x="955" y="92" width="155" height="132" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="1032" y="130" text-anchor="middle" font-size="19" fill="#9a3412">DuckDB</text>
    <text x="1032" y="160" text-anchor="middle" font-size="15" fill="#334155">向量化 OLAP</text>
    <text x="1032" y="188" text-anchor="middle" font-size="15" fill="#334155">DataChunk / Pipeline</text>

    <rect x="210" y="350" width="240" height="112" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="330" y="388" text-anchor="middle" font-size="18" fill="#0f172a">PostgreSQL 堆表</text>
    <text x="330" y="418" text-anchor="middle" font-size="15" fill="#334155">行存、索引、可见性快照</text>

    <rect x="530" y="350" width="250" height="112" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="655" y="388" text-anchor="middle" font-size="18" fill="#0f172a">对象存储 / 文件湖</text>
    <text x="655" y="418" text-anchor="middle" font-size="15" fill="#334155">Parquet / CSV / JSON</text>
    <text x="655" y="444" text-anchor="middle" font-size="15" fill="#334155">Iceberg / Delta 元数据</text>

    <rect x="860" y="350" width="200" height="112" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="960" y="388" text-anchor="middle" font-size="18" fill="#0f172a">远端 DuckDB</text>
    <text x="960" y="418" text-anchor="middle" font-size="15" fill="#334155">Quack RPC / ATTACH</text>
  </g>

  <path d="M250 158 H320" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-a)"/>
  <path d="M580 158 H650" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-a)"/>
  <path d="M880 158 H945" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-a)"/>
  <path d="M455 225 C455 286 365 300 340 340" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-a)"/>
  <path d="M815 225 C815 286 700 300 670 340" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-a)"/>
  <path d="M1032 225 C1032 285 982 310 968 340" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-a)"/>

  <text x="590" y="525" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">核心原则：PostgreSQL 管在线一致性，DuckDB 管分析执行，对象存储管冷数据容量；pg_duckdb 负责把这些边界接到一个 SQL 入口。</text>
</svg>
