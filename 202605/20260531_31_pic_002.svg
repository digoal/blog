<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img">
  <title>pg_duckdb 的查询接管路径</title>
  <desc>展示 PostgreSQL 解析查询后，pg_duckdb 根据 DuckDB-only 对象或 duckdb.force_execution 决定是否生成 DuckDB CustomScan。</desc>
  <defs>
    <marker id="arrow-b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="600" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="590" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">查询路由：不是所有 SQL 都交给 DuckDB</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="105" width="190" height="84" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="165" y="140" text-anchor="middle" font-size="18" fill="#075985">SQL 进入 PG</text>
    <text x="165" y="168" text-anchor="middle" font-size="15" fill="#334155">parse / rewrite</text>

    <rect x="335" y="105" width="230" height="84" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="450" y="140" text-anchor="middle" font-size="18" fill="#065f46">planner_hook</text>
    <text x="450" y="168" text-anchor="middle" font-size="15" fill="#334155">ShouldTry / Needs DuckDB</text>

    <rect x="650" y="75" width="250" height="120" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="775" y="112" text-anchor="middle" font-size="18" fill="#5b21b6">进入 DuckDB 条件</text>
    <text x="775" y="142" text-anchor="middle" font-size="15" fill="#334155">DuckDB 表 / read_parquet</text>
    <text x="775" y="168" text-anchor="middle" font-size="15" fill="#334155">或 duckdb.force_execution</text>

    <rect x="975" y="105" width="145" height="84" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="1048" y="140" text-anchor="middle" font-size="18" fill="#9a3412">CustomScan</text>
    <text x="1048" y="168" text-anchor="middle" font-size="15" fill="#334155">DuckDB 执行</text>

    <rect x="335" y="315" width="250" height="104" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="460" y="352" text-anchor="middle" font-size="18" fill="#0f172a">留在 PostgreSQL</text>
    <text x="460" y="382" text-anchor="middle" font-size="15" fill="#334155">常量查询、系统表、非允许语句</text>

    <rect x="695" y="315" width="290" height="104" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="840" y="352" text-anchor="middle" font-size="18" fill="#0f172a">结果回到 PostgreSQL 协议</text>
    <text x="840" y="382" text-anchor="middle" font-size="15" fill="#334155">DuckDB 列向量转 TupleTableSlot</text>
  </g>

  <path d="M260 147 H325" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-b)"/>
  <path d="M565 147 H640" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-b)"/>
  <path d="M900 147 H965" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-b)"/>
  <path d="M450 190 V305" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow-b)"/>
  <path d="M1048 190 C1048 275 940 285 868 310" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow-b)"/>

  <rect x="185" y="495" width="810" height="62" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="590" y="532" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#9a3412">工程含义：先让路由可解释，再谈性能。EXPLAIN、duckdb.log_pg_explain 和查询口径检查比盲目 force 更重要。</text>
</svg>
