<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img">
  <title>PostgreSQL 表扫描转换成 DuckDB DataChunk</title>
  <desc>展示 pg_duckdb 如何把 PostgreSQL 表扫描、投影和过滤转换成 DuckDB DataChunk，供向量化算子继续处理。</desc>
  <defs>
    <marker id="arrow-c" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="580" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="590" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">从行存快照到列向量批</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="115" width="205" height="116" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="172" y="152" text-anchor="middle" font-size="18" fill="#065f46">PG 表访问方法</text>
    <text x="172" y="182" text-anchor="middle" font-size="15" fill="#334155">Seq / Index / Bitmap</text>
    <text x="172" y="208" text-anchor="middle" font-size="15" fill="#334155">按快照判断可见性</text>

    <rect x="350" y="115" width="220" height="116" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="460" y="152" text-anchor="middle" font-size="18" fill="#075985">PostgresTableReader</text>
    <text x="460" y="182" text-anchor="middle" font-size="15" fill="#334155">生成内部 SELECT</text>
    <text x="460" y="208" text-anchor="middle" font-size="15" fill="#334155">可用 PG 并行 worker</text>

    <rect x="650" y="115" width="210" height="116" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="755" y="152" text-anchor="middle" font-size="18" fill="#5b21b6">类型转换</text>
    <text x="755" y="182" text-anchor="middle" font-size="15" fill="#334155">TupleTableSlot</text>
    <text x="755" y="208" text-anchor="middle" font-size="15" fill="#334155">转 DuckDB Vector</text>

    <rect x="935" y="115" width="175" height="116" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="1022" y="152" text-anchor="middle" font-size="18" fill="#9a3412">DataChunk</text>
    <text x="1022" y="182" text-anchor="middle" font-size="15" fill="#334155">默认 2048 行批</text>
    <text x="1022" y="208" text-anchor="middle" font-size="15" fill="#334155">列式向量处理</text>

    <rect x="235" y="360" width="280" height="96" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="375" y="398" text-anchor="middle" font-size="18" fill="#0f172a">投影下推</text>
    <text x="375" y="428" text-anchor="middle" font-size="15" fill="#334155">只读后续需要的列</text>

    <rect x="665" y="360" width="280" height="96" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="805" y="398" text-anchor="middle" font-size="18" fill="#0f172a">过滤下推</text>
    <text x="805" y="428" text-anchor="middle" font-size="15" fill="#334155">可表达谓词进入 PG WHERE</text>
  </g>

  <path d="M275 173 H340" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-c)"/>
  <path d="M570 173 H640" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-c)"/>
  <path d="M860 173 H925" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-c)"/>
  <path d="M460 232 C450 300 390 315 377 350" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow-c)"/>
  <path d="M755 232 C765 300 800 315 804 350" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow-c)"/>

  <text x="590" y="526" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">代价在边界上：每个 PostgreSQL tuple 要经过可见性、slot、类型转换；收益在边界之后：聚合、连接、排序按 DuckDB 向量化 pipeline 处理。</text>
</svg>
