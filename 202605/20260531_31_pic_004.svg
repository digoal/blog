<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img">
  <title>数据湖扫描中的裁剪路径</title>
  <desc>展示 DuckDB 读取 Parquet、Iceberg、Delta 时如何从目录、元数据、行组统计、列投影逐层减少读取。</desc>
  <defs>
    <marker id="arrow-d" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="600" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="590" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">数据湖性能来自“少读”，不是只来自“算得快”</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="110" width="210" height="100" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="175" y="146" text-anchor="middle" font-size="18" fill="#075985">路径与分区</text>
    <text x="175" y="176" text-anchor="middle" font-size="15" fill="#334155">s3://bucket/year=2026/</text>

    <rect x="350" y="110" width="210" height="100" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="455" y="146" text-anchor="middle" font-size="18" fill="#065f46">表格式元数据</text>
    <text x="455" y="176" text-anchor="middle" font-size="15" fill="#334155">Iceberg / Delta 快照</text>

    <rect x="630" y="110" width="210" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="735" y="146" text-anchor="middle" font-size="18" fill="#5b21b6">Parquet 行组</text>
    <text x="735" y="176" text-anchor="middle" font-size="15" fill="#334155">min/max/null_count</text>

    <rect x="910" y="110" width="200" height="100" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="1010" y="146" text-anchor="middle" font-size="18" fill="#9a3412">列投影</text>
    <text x="1010" y="176" text-anchor="middle" font-size="15" fill="#334155">只取需要的 column chunk</text>

    <rect x="185" y="350" width="810" height="114" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="590" y="390" text-anchor="middle" font-size="19" fill="#0f172a">最终进入 DuckDB pipeline 的 DataChunk</text>
    <text x="590" y="424" text-anchor="middle" font-size="15" fill="#334155">文件少、行组少、列少、远端请求少，聚合和连接才有意义</text>
  </g>

  <path d="M280 160 H340" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-d)"/>
  <path d="M560 160 H620" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-d)"/>
  <path d="M840 160 H900" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow-d)"/>
  <path d="M175 212 C190 290 400 305 455 340" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow-d)"/>
  <path d="M1010 212 C995 290 780 305 720 340" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow-d)"/>

  <text x="590" y="536" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">实践重点：分区粒度、文件大小、行组大小、统计信息质量、列裁剪和谓词写法，往往比“换一个引擎”更决定湖查询成本。</text>
</svg>
