<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img">
  <title>HTAP 与数据湖上线边界检查</title>
  <desc>展示上线 pg_duckdb、DuckDB 数据湖查询和 Quack 远端节点前需要检查的事务、安全、资源、类型和观测边界。</desc>
  <defs>
    <marker id="arrow-e" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="600" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="590" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">上线前先画清楚 5 条红线</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="125" width="185" height="96" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="172" y="160" text-anchor="middle" font-size="18" fill="#991b1b">事务红线</text>
    <text x="172" y="190" text-anchor="middle" font-size="15" fill="#334155">不混写 PG 与 DuckDB</text>

    <rect x="305" y="125" width="185" height="96" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="397" y="160" text-anchor="middle" font-size="18" fill="#9a3412">权限红线</text>
    <text x="397" y="190" text-anchor="middle" font-size="15" fill="#334155">secret / 文件系统 / 扩展</text>

    <rect x="530" y="125" width="185" height="96" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="622" y="160" text-anchor="middle" font-size="18" fill="#075985">资源红线</text>
    <text x="622" y="190" text-anchor="middle" font-size="15" fill="#334155">内存、线程、临时目录</text>

    <rect x="755" y="125" width="185" height="96" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="847" y="160" text-anchor="middle" font-size="18" fill="#065f46">类型红线</text>
    <text x="847" y="190" text-anchor="middle" font-size="15" fill="#334155">numeric / timestamp / struct</text>

    <rect x="980" y="125" width="130" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="1045" y="160" text-anchor="middle" font-size="18" fill="#5b21b6">观测</text>
    <text x="1045" y="190" text-anchor="middle" font-size="15" fill="#334155">EXPLAIN</text>

    <rect x="185" y="360" width="810" height="114" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="590" y="400" text-anchor="middle" font-size="19" fill="#0f172a">可生产化的 HTAP 不是“一个查询能跑”</text>
    <text x="590" y="434" text-anchor="middle" font-size="15" fill="#334155">而是任何失败、慢查询、权限泄露、精度变化和数据不一致都有边界、告警和回滚方案</text>
  </g>

  <path d="M172 223 C180 290 360 320 455 350" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-e)"/>
  <path d="M397 223 C405 280 500 320 535 350" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-e)"/>
  <path d="M622 223 V350" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-e)"/>
  <path d="M847 223 C840 280 735 320 685 350" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-e)"/>
  <path d="M1045 223 C1030 295 850 325 760 350" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow-e)"/>

  <text x="590" y="548" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">建议按角色分工：架构师定数据边界，DBA 定资源和权限，开发者定 SQL 写法与回归用例。</text>
</svg>
