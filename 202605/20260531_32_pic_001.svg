<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>物化视图在查询链路中的位置</title>
  <desc>对比普通视图、物化视图和结果缓存：普通视图每次展开并执行底层查询，物化视图查询持久化结果，刷新时才重算。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="472" rx="8" fill="#fbfbf8" stroke="#d7d3c8"/>
  <text x="48" y="64" font-size="24" font-family="Arial, sans-serif" fill="#263238">把重复计算前置：三种查询路径</text>

  <rect x="64" y="112" width="208" height="72" rx="6" fill="#e7f0f1" stroke="#8bb0b5"/>
  <text x="92" y="143" font-size="18" font-family="Arial, sans-serif" fill="#20343a">业务 SQL</text>
  <text x="92" y="168" font-size="14" font-family="Arial, sans-serif" fill="#546e7a">报表、看板、聚合查询</text>

  <rect x="376" y="82" width="220" height="92" rx="6" fill="#fff4df" stroke="#e0a84f"/>
  <text x="402" y="116" font-size="18" font-family="Arial, sans-serif" fill="#45331a">普通视图</text>
  <text x="402" y="143" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">保存查询定义</text>
  <text x="402" y="164" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">每次访问重算底层表</text>

  <rect x="684" y="82" width="188" height="92" rx="6" fill="#f2e9f7" stroke="#a982bd"/>
  <text x="712" y="116" font-size="18" font-family="Arial, sans-serif" fill="#3f2b4a">底层表</text>
  <text x="712" y="143" font-size="14" font-family="Arial, sans-serif" fill="#60456c">原始明细</text>
  <text x="712" y="164" font-size="14" font-family="Arial, sans-serif" fill="#60456c">MVCC 数据源</text>

  <rect x="376" y="224" width="220" height="116" rx="6" fill="#eaf5eb" stroke="#7fb487"/>
  <text x="402" y="258" font-size="18" font-family="Arial, sans-serif" fill="#214329">物化视图</text>
  <text x="402" y="285" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">保存查询定义</text>
  <text x="402" y="306" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">也保存结果表</text>
  <text x="402" y="327" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">查询时像表一样读取</text>

  <rect x="684" y="236" width="188" height="92" rx="6" fill="#e9eef7" stroke="#8095bf"/>
  <text x="712" y="270" font-size="18" font-family="Arial, sans-serif" fill="#24344f">持久化结果</text>
  <text x="712" y="297" font-size="14" font-family="Arial, sans-serif" fill="#42536f">可建索引</text>
  <text x="712" y="318" font-size="14" font-family="Arial, sans-serif" fill="#42536f">可 ANALYZE/VACUUM</text>

  <rect x="376" y="388" width="220" height="72" rx="6" fill="#f7eeee" stroke="#c68b8b"/>
  <text x="402" y="420" font-size="18" font-family="Arial, sans-serif" fill="#5a2b2b">结果缓存</text>
  <text x="402" y="447" font-size="14" font-family="Arial, sans-serif" fill="#764747">通常不保存 SQL 语义</text>

  <line x1="272" y1="148" x2="368" y2="128" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="596" y1="128" x2="676" y2="128" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="272" y1="148" x2="368" y2="282" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="596" y1="282" x2="676" y2="282" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="778" y1="236" x2="778" y2="184" stroke="#8b6f2f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="794" y="215" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">刷新时重算</text>

  <line x1="272" y1="148" x2="368" y2="424" stroke="#8f4d4d" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="7 6"/>
  <text x="82" y="244" font-size="15" font-family="Arial, sans-serif" fill="#263238">核心取舍：</text>
  <text x="82" y="270" font-size="15" font-family="Arial, sans-serif" fill="#263238">读路径少算一次，写后需要刷新一次。</text>
  <text x="82" y="296" font-size="15" font-family="Arial, sans-serif" fill="#263238">PostgreSQL 原生实现不会自动增量维护，</text>
  <text x="82" y="322" font-size="15" font-family="Arial, sans-serif" fill="#263238">也不会自动把普通查询改写到物化视图。</text>
</svg>
