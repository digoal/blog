<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>CREATE MATERIALIZED VIEW 的创建路径</title>
  <desc>展示 PostgreSQL 创建物化视图时从语法节点、语义检查、关系定义、规则保存到可选刷新填充的流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#315f72"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="512" rx="8" fill="#fcfbf7" stroke="#d8d1c4"/>
  <text x="48" y="64" font-size="24" font-family="Arial, sans-serif" fill="#263238">创建路径：先定义“表壳 + 查询规则”，再决定是否填数</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#263238">
    <rect x="56" y="112" width="170" height="78" rx="6" fill="#e8f2f4" stroke="#83aeba"/>
    <text x="78" y="145" font-size="17">SQL 语法</text>
    <text x="78" y="170">CreateTableAsStmt</text>

    <rect x="286" y="112" width="190" height="98" rx="6" fill="#fff2d9" stroke="#daa64b"/>
    <text x="310" y="143" font-size="17">语义检查</text>
    <text x="310" y="168">禁止修改型 CTE</text>
    <text x="310" y="190">禁止临时对象、参数</text>

    <rect x="536" y="112" width="178" height="98" rx="6" fill="#eaf5eb" stroke="#79b585"/>
    <text x="560" y="143" font-size="17">创建关系</text>
    <text x="560" y="168">pg_class.relkind='m'</text>
    <text x="560" y="190">初始未 populated</text>

    <rect x="774" y="112" width="150" height="98" rx="6" fill="#eee8f6" stroke="#a485bf"/>
    <text x="798" y="143" font-size="17">保存定义</text>
    <text x="798" y="168">pg_rewrite</text>
    <text x="798" y="190">ON SELECT rule</text>

    <rect x="286" y="286" width="190" height="86" rx="6" fill="#f7eeee" stroke="#c28b8b"/>
    <text x="310" y="318" font-size="17">WITH NO DATA</text>
    <text x="310" y="345">只建结构与规则</text>

    <rect x="536" y="286" width="178" height="86" rx="6" fill="#e9eef7" stroke="#8198c2"/>
    <text x="560" y="318" font-size="17">WITH DATA</text>
    <text x="560" y="345">调用 REFRESH 逻辑</text>

    <rect x="774" y="286" width="150" height="86" rx="6" fill="#e7f3ef" stroke="#75aa97"/>
    <text x="798" y="318" font-size="17">持久化结果</text>
    <text x="798" y="345">relispopulated=true</text>

    <rect x="56" y="424" width="868" height="64" rx="6" fill="#f4f5f5" stroke="#c2c7c9"/>
    <text x="82" y="452">源码锚点：gram.y 生成 OBJECT_MATVIEW；analyze.c 做限制；createas.c 创建 RELKIND_MATVIEW 并调用 StoreViewQuery；matview.c 填充数据。</text>
  </g>

  <line x1="226" y1="151" x2="278" y2="151" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="476" y1="161" x2="528" y2="161" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="714" y1="161" x2="766" y2="161" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M381 210 L381 278" fill="none" stroke="#8a5f31" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M625 210 L625 278" fill="none" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="714" y1="329" x2="766" y2="329" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M476 329 C500 329 510 329 528 329" fill="none" stroke="#b05c5c" stroke-width="2.5" stroke-dasharray="6 6"/>

  <text x="104" y="250" font-size="15" font-family="Arial, sans-serif" fill="#263238">注意：物化视图允许 USING table access method、storage parameter、tablespace，</text>
  <text x="104" y="275" font-size="15" font-family="Arial, sans-serif" fill="#263238">但 PostgreSQL 原生不支持临时物化视图，也不允许 unlogged materialized view。</text>
</svg>
