<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img">
  <title>普通 REFRESH MATERIALIZED VIEW 的刷新路径</title>
  <desc>展示非并发刷新时 PostgreSQL 创建新堆、执行定义查询、批量插入、交换 relfilenode 并重建索引的流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="492" rx="8" fill="#fbfcfb" stroke="#ccd4ce"/>
  <text x="48" y="64" font-size="24" font-family="Arial, sans-serif" fill="#263238">普通刷新：重算全量结果，然后替换物理存储</text>

  <rect x="64" y="114" width="178" height="86" rx="6" fill="#f7eeee" stroke="#c28b8b"/>
  <text x="90" y="146" font-size="18" font-family="Arial, sans-serif" fill="#4d2b2b">AccessExclusiveLock</text>
  <text x="90" y="174" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">阻塞并发读写</text>

  <rect x="300" y="96" width="184" height="86" rx="6" fill="#fff4df" stroke="#d9a64c"/>
  <text x="326" y="129" font-size="18" font-family="Arial, sans-serif" fill="#4a3519">取出定义查询</text>
  <text x="326" y="157" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">pg_rewrite rule</text>

  <rect x="552" y="96" width="184" height="86" rx="6" fill="#e8f2f4" stroke="#83aeba"/>
  <text x="578" y="129" font-size="18" font-family="Arial, sans-serif" fill="#223b45">make_new_heap</text>
  <text x="578" y="157" font-size="14" font-family="Arial, sans-serif" fill="#455e68">新建 transient heap</text>

  <rect x="300" y="252" width="184" height="98" rx="6" fill="#e9eef7" stroke="#8198c2"/>
  <text x="326" y="285" font-size="18" font-family="Arial, sans-serif" fill="#263a5b">执行 SELECT</text>
  <text x="326" y="313" font-size="14" font-family="Arial, sans-serif" fill="#42536f">planner + executor</text>
  <text x="326" y="334" font-size="14" font-family="Arial, sans-serif" fill="#42536f">DestTransientRel</text>

  <rect x="552" y="252" width="184" height="98" rx="6" fill="#eaf5eb" stroke="#79b585"/>
  <text x="578" y="285" font-size="18" font-family="Arial, sans-serif" fill="#214329">批量写新堆</text>
  <text x="578" y="313" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">TABLE_INSERT_FROZEN</text>
  <text x="578" y="334" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">先不维护旧索引</text>

  <rect x="790" y="252" width="132" height="98" rx="6" fill="#eee8f6" stroke="#a485bf"/>
  <text x="814" y="285" font-size="18" font-family="Arial, sans-serif" fill="#3f2b4a">交换</text>
  <text x="814" y="313" font-size="14" font-family="Arial, sans-serif" fill="#60456c">finish_heap_swap</text>
  <text x="814" y="334" font-size="14" font-family="Arial, sans-serif" fill="#60456c">REINDEX</text>

  <rect x="64" y="406" width="858" height="58" rx="6" fill="#f3f4f2" stroke="#c8ceca"/>
  <text x="88" y="431" font-size="15" font-family="Arial, sans-serif" fill="#263238">效果：保留物化视图 OID、权限、依赖关系；旧内容被整体丢弃。代价：刷新期间 AccessExclusiveLock，读查询也会被挡住。</text>
  <text x="88" y="454" font-size="15" font-family="Arial, sans-serif" fill="#263238">WITH NO DATA 走同一框架，但跳过数据生成，最终 relispopulated=false，物化视图不可扫描。</text>

  <line x1="242" y1="157" x2="292" y2="145" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="484" y1="139" x2="544" y2="139" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M644 182 L644 222 L392 222 L392 244" fill="none" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="484" y1="301" x2="544" y2="301" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="736" y1="301" x2="782" y2="301" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
