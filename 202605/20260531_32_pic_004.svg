<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img">
  <title>REFRESH MATERIALIZED VIEW CONCURRENTLY 的差分合并路径</title>
  <desc>展示并发刷新通过临时新数据表、全外连接差分表、DELETE 和 INSERT 更新旧物化视图，并要求可用唯一索引。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#315f72"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="992" height="572" rx="8" fill="#fcfbf7" stroke="#d8d1c4"/>
  <text x="48" y="64" font-size="24" font-family="Arial, sans-serif" fill="#263238">并发刷新：允许 SELECT，但用差分 DML 更新旧结果</text>

  <rect x="56" y="112" width="194" height="92" rx="6" fill="#f7eeee" stroke="#c28b8b"/>
  <text x="82" y="144" font-size="18" font-family="Arial, sans-serif" fill="#4d2b2b">前置条件</text>
  <text x="82" y="171" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">已 populated</text>
  <text x="82" y="192" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">可用 UNIQUE 索引</text>

  <rect x="316" y="94" width="190" height="92" rx="6" fill="#e8f2f4" stroke="#83aeba"/>
  <text x="342" y="127" font-size="18" font-family="Arial, sans-serif" fill="#223b45">生成新全量</text>
  <text x="342" y="154" font-size="14" font-family="Arial, sans-serif" fill="#455e68">临时 heap</text>
  <text x="342" y="175" font-size="14" font-family="Arial, sans-serif" fill="#455e68">ANALYZE temp</text>

  <rect x="584" y="94" width="190" height="92" rx="6" fill="#fff4df" stroke="#d9a64c"/>
  <text x="610" y="127" font-size="18" font-family="Arial, sans-serif" fill="#4a3519">构造差分</text>
  <text x="610" y="154" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">FULL JOIN old/new</text>
  <text x="610" y="175" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">比较唯一键与整行</text>

  <rect x="838" y="94" width="142" height="92" rx="6" fill="#eee8f6" stroke="#a485bf"/>
  <text x="862" y="127" font-size="18" font-family="Arial, sans-serif" fill="#3f2b4a">diff 表</text>
  <text x="862" y="154" font-size="14" font-family="Arial, sans-serif" fill="#60456c">tid</text>
  <text x="862" y="175" font-size="14" font-family="Arial, sans-serif" fill="#60456c">newdata row</text>

  <rect x="584" y="278" width="190" height="92" rx="6" fill="#f7eeee" stroke="#c28b8b"/>
  <text x="610" y="311" font-size="18" font-family="Arial, sans-serif" fill="#4d2b2b">先 DELETE</text>
  <text x="610" y="338" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">旧行存在，新行不存在</text>
  <text x="610" y="359" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">按 ctid 删除</text>

  <rect x="316" y="278" width="190" height="92" rx="6" fill="#eaf5eb" stroke="#79b585"/>
  <text x="342" y="311" font-size="18" font-family="Arial, sans-serif" fill="#214329">再 INSERT</text>
  <text x="342" y="338" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">新行存在，旧行不存在</text>
  <text x="342" y="359" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">插入 newdata</text>

  <rect x="56" y="278" width="194" height="92" rx="6" fill="#e9eef7" stroke="#8198c2"/>
  <text x="82" y="311" font-size="18" font-family="Arial, sans-serif" fill="#263a5b">旧物化视图</text>
  <text x="82" y="338" font-size="14" font-family="Arial, sans-serif" fill="#42536f">保留原 heap</text>
  <text x="82" y="359" font-size="14" font-family="Arial, sans-serif" fill="#42536f">读者可 ACCESS SHARE</text>

  <rect x="56" y="438" width="924" height="94" rx="6" fill="#f3f4f2" stroke="#c8ceca"/>
  <text x="82" y="466" font-size="15" font-family="Arial, sans-serif" fill="#263238">锁语义：CONCURRENTLY 使用 ExclusiveLock，只允许普通 SELECT 并行；同一物化视图一次只能一个 REFRESH。</text>
  <text x="82" y="491" font-size="15" font-family="Arial, sans-serif" fill="#263238">索引条件：必须唯一、有效、immediate、非 partial、只引用普通用户列；表达式唯一索引和带 WHERE 的唯一索引不可用。</text>
  <text x="82" y="516" font-size="15" font-family="Arial, sans-serif" fill="#263238">代价：相比 heap swap 更复杂，要建差分表、做全外连接、执行 DELETE/INSERT，并可能触发更多行级维护成本。</text>

  <line x1="250" y1="158" x2="308" y2="144" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="506" y1="140" x2="576" y2="140" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="774" y1="140" x2="830" y2="140" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M909 186 L909 232 L679 232 L679 270" fill="none" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="584" y1="324" x2="514" y2="324" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="316" y1="324" x2="258" y2="324" stroke="#315f72" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
