<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>物化视图的工程决策边界</title>
  <desc>展示何时适合使用物化视图，何时应选择普通表、普通视图、连续聚合或缓存。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="932" height="512" rx="8" fill="#fbfbf8" stroke="#d7d3c8"/>
  <text x="48" y="64" font-size="24" font-family="Arial, sans-serif" fill="#263238">决策边界：用“新鲜度预算”换“读路径成本”</text>

  <rect x="72" y="110" width="220" height="86" rx="6" fill="#e8f2f4" stroke="#83aeba"/>
  <text x="98" y="143" font-size="18" font-family="Arial, sans-serif" fill="#223b45">查询是否重复且昂贵？</text>
  <text x="98" y="171" font-size="14" font-family="Arial, sans-serif" fill="#455e68">聚合、排序、远端访问、Join</text>

  <rect x="380" y="110" width="220" height="86" rx="6" fill="#fff4df" stroke="#d9a64c"/>
  <text x="406" y="143" font-size="18" font-family="Arial, sans-serif" fill="#4a3519">是否允许延迟？</text>
  <text x="406" y="171" font-size="14" font-family="Arial, sans-serif" fill="#6b521f">分钟级、小时级、T+1</text>

  <rect x="688" y="110" width="220" height="86" rx="6" fill="#eaf5eb" stroke="#79b585"/>
  <text x="714" y="143" font-size="18" font-family="Arial, sans-serif" fill="#214329">是否能安排刷新？</text>
  <text x="714" y="171" font-size="14" font-family="Arial, sans-serif" fill="#365a3b">窗口、锁、唯一索引、监控</text>

  <rect x="72" y="288" width="220" height="94" rx="6" fill="#e9eef7" stroke="#8198c2"/>
  <text x="98" y="321" font-size="18" font-family="Arial, sans-serif" fill="#263a5b">是：物化视图</text>
  <text x="98" y="349" font-size="14" font-family="Arial, sans-serif" fill="#42536f">读快、可索引、可统计</text>
  <text x="98" y="370" font-size="14" font-family="Arial, sans-serif" fill="#42536f">刷新承担成本</text>

  <rect x="380" y="288" width="220" height="94" rx="6" fill="#f7eeee" stroke="#c28b8b"/>
  <text x="406" y="321" font-size="18" font-family="Arial, sans-serif" fill="#4d2b2b">否：普通视图或 SQL</text>
  <text x="406" y="349" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">要实时一致</text>
  <text x="406" y="370" font-size="14" font-family="Arial, sans-serif" fill="#6a4444">接受每次计算</text>

  <rect x="688" y="288" width="220" height="94" rx="6" fill="#eee8f6" stroke="#a485bf"/>
  <text x="714" y="321" font-size="18" font-family="Arial, sans-serif" fill="#3f2b4a">更复杂：专用方案</text>
  <text x="714" y="349" font-size="14" font-family="Arial, sans-serif" fill="#60456c">触发器汇总表、流处理</text>
  <text x="714" y="370" font-size="14" font-family="Arial, sans-serif" fill="#60456c">Timescale 连续聚合等</text>

  <rect x="72" y="440" width="836" height="58" rx="6" fill="#f3f4f2" stroke="#c8ceca"/>
  <text x="98" y="466" font-size="15" font-family="Arial, sans-serif" fill="#263238">验证闭环：看查询计划和耗时、看刷新耗时和锁等待、看 staleness 是否越界、看磁盘与索引膨胀。</text>
  <text x="98" y="489" font-size="15" font-family="Arial, sans-serif" fill="#263238">不要只因为“视图慢”就物化；先确认重复、昂贵、可延迟、可运维。</text>

  <line x1="292" y1="153" x2="372" y2="153" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="153" x2="680" y2="153" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M798 196 C798 250 208 236 182 280" fill="none" stroke="#2f5d62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M490 196 L490 280" fill="none" stroke="#8f4d4d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M798 196 L798 280" fill="none" stroke="#6b5692" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
