<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">读时计算与流式计算的成本位置对比</title>
  <desc id="desc">对比传统查询在读路径反复扫描明细，与流式计算在写入路径持续维护汇总结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .label { font: 600 16px sans-serif; fill: #0f172a; }
    .text { font: 14px sans-serif; fill: #334155; }
    .small { font: 12px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .hot { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; rx: 8; }
    .cool { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <text x="32" y="42" class="title">同一件事：把事件聚合成可查询指标，成本放在哪里？</text>

  <text x="70" y="92" class="label">读时计算</text>
  <rect x="45" y="115" width="170" height="66" class="box"/>
  <text x="78" y="145" class="text">明细事件表</text>
  <text x="65" y="166" class="small">持续写入、长期保存</text>
  <path d="M215 148 H325" class="line"/>
  <rect x="325" y="115" width="200" height="66" class="hot"/>
  <text x="365" y="145" class="text">每次查询重新聚合</text>
  <text x="350" y="166" class="small">scan / join / group / sort</text>
  <path d="M525 148 H635" class="line"/>
  <rect x="635" y="115" width="155" height="66" class="box"/>
  <text x="682" y="145" class="text">报表结果</text>
  <text x="657" y="166" class="small">读请求承担延迟</text>
  <rect x="815" y="111" width="110" height="74" class="hot"/>
  <text x="842" y="140" class="text">问题</text>
  <text x="830" y="162" class="small">重复 CPU</text>
  <text x="830" y="180" class="small">重复 IO</text>

  <text x="70" y="244" class="label">流式计算</text>
  <rect x="45" y="267" width="170" height="66" class="box"/>
  <text x="80" y="297" class="text">事件流</text>
  <text x="63" y="318" class="small">到达即处理，可不落明细</text>
  <path d="M215 300 H325" class="line"/>
  <rect x="325" y="267" width="200" height="66" class="cool"/>
  <text x="366" y="297" class="text">持续增量维护</text>
  <text x="350" y="318" class="small">filter / window / aggregate</text>
  <path d="M525 300 H635" class="line"/>
  <rect x="635" y="267" width="155" height="66" class="box"/>
  <text x="669" y="297" class="text">汇总状态表</text>
  <text x="656" y="318" class="small">查询小结果集</text>
  <path d="M710 267 V215 H430 V181" class="dash"/>
  <text x="460" y="209" class="small">把重复读成本前移到写入/后台执行</text>
  <rect x="815" y="263" width="110" height="74" class="cool"/>
  <text x="842" y="292" class="text">收益</text>
  <text x="830" y="314" class="small">低读延迟</text>
  <text x="830" y="332" class="small">状态可索引</text>
</svg>
