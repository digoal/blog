<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">PipelineDB 从 INSERT 到连续视图的处理路径</title>
  <desc id="desc">展示流写入经 Stream FDW 形成微批，再由 worker 和 combiner 更新物化关系的路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#1f2937"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #111827; }
    .label { font: 600 16px sans-serif; fill: #111827; }
    .text { font: 14px sans-serif; fill: #374151; }
    .small { font: 12px sans-serif; fill: #4b5563; }
    .box { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; rx: 8; }
    .stream { fill: #ecfdf5; stroke: #059669; stroke-width: 1.7; rx: 8; }
    .worker { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .combiner { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.7; rx: 8; }
    .state { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.7; rx: 8; }
    .line { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <text x="32" y="42" class="title">PipelineDB：把 PostgreSQL INSERT 变成流式微批处理</text>

  <rect x="40" y="100" width="150" height="72" class="box"/>
  <text x="72" y="130" class="label">客户端 SQL</text>
  <text x="60" y="152" class="small">INSERT INTO stream</text>

  <path d="M190 136 H265" class="line"/>
  <rect x="265" y="100" width="160" height="72" class="stream"/>
  <text x="303" y="130" class="label">Stream FDW</text>
  <text x="285" y="152" class="small">ExecForeignInsert</text>

  <path d="M425 136 H505" class="line"/>
  <rect x="505" y="100" width="165" height="72" class="stream"/>
  <text x="548" y="130" class="label">microbatch</text>
  <text x="525" y="152" class="small">按大小/条数切批</text>

  <path d="M670 136 H750" class="line"/>
  <rect x="750" y="100" width="190" height="72" class="worker"/>
  <text x="792" y="130" class="label">worker 进程</text>
  <text x="770" y="152" class="small">执行连续查询计划</text>

  <path d="M845 172 V238" class="line"/>
  <rect x="720" y="238" width="250" height="78" class="combiner"/>
  <text x="777" y="268" class="label">combiner 进程</text>
  <text x="745" y="290" class="small">按 group hash 分片合并部分状态</text>

  <path d="M720 277 H635" class="line"/>
  <rect x="445" y="238" width="190" height="78" class="state"/>
  <text x="491" y="268" class="label">物化关系</text>
  <text x="466" y="290" class="small">只保存聚合输出和索引</text>

  <path d="M540 316 V385 H295" class="dash"/>
  <rect x="85" y="350" width="210" height="78" class="box"/>
  <text x="137" y="380" class="label">普通 SELECT</text>
  <text x="109" y="402" class="small">读连续视图暴露的结果</text>

  <rect x="295" y="238" width="115" height="78" class="box"/>
  <text x="319" y="267" class="label">catalog</text>
  <text x="310" y="289" class="small">stream readers</text>
  <path d="M345 172 V238" class="dash"/>
  <text x="253" y="214" class="small">写入前查找订阅读者</text>

  <rect x="40" y="238" width="205" height="78" class="box"/>
  <text x="92" y="268" class="label">无读者流</text>
  <text x="62" y="290" class="small">没有连续查询订阅时可直接返回</text>
  <path d="M265 150 C210 190 165 210 145 238" class="dash"/>
</svg>
