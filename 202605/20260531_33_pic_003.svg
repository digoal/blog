<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Partial Aggregate 与 Combine Aggregate</title>
  <desc id="desc">展示 worker 对事件子集产生部分聚合状态，combiner 合并状态并更新最终结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .label { font: 600 16px sans-serif; fill: #0f172a; }
    .text { font: 14px sans-serif; fill: #334155; }
    .small { font: 12px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .part { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .comb { fill: #fff7ed; stroke: #f97316; stroke-width: 1.7; rx: 8; }
    .final { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.7; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #64748b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <text x="32" y="42" class="title">流式聚合不是每行改一次表，而是“局部状态 + 合并状态”</text>

  <rect x="50" y="95" width="170" height="70" class="box"/>
  <text x="86" y="126" class="label">事件微批 A</text>
  <text x="78" y="148" class="small">group_id, amount...</text>
  <rect x="50" y="215" width="170" height="70" class="box"/>
  <text x="86" y="246" class="label">事件微批 B</text>
  <text x="78" y="268" class="small">group_id, amount...</text>
  <rect x="50" y="335" width="170" height="70" class="box"/>
  <text x="86" y="366" class="label">事件微批 C</text>
  <text x="78" y="388" class="small">group_id, amount...</text>

  <path d="M220 130 H300" class="line"/>
  <path d="M220 250 H300" class="line"/>
  <path d="M220 370 H300" class="line"/>

  <rect x="300" y="80" width="200" height="92" class="part"/>
  <text x="342" y="112" class="label">worker partial</text>
  <text x="324" y="137" class="text">count: 不是最终值</text>
  <text x="324" y="158" class="small">输出 transition state</text>
  <rect x="300" y="200" width="200" height="92" class="part"/>
  <text x="342" y="232" class="label">worker partial</text>
  <text x="324" y="257" class="text">sum: 局部累计</text>
  <text x="324" y="278" class="small">可序列化后跨进程传输</text>
  <rect x="300" y="320" width="200" height="92" class="part"/>
  <text x="342" y="352" class="label">worker partial</text>
  <text x="324" y="377" class="text">avg: sum/count 状态</text>
  <text x="324" y="398" class="small">跳过 finalfunc</text>

  <path d="M500 126 C570 126 595 205 650 225" class="thin"/>
  <path d="M500 246 H650" class="line"/>
  <path d="M500 366 C570 366 595 287 650 267" class="thin"/>

  <rect x="650" y="205" width="210" height="100" class="comb"/>
  <text x="696" y="238" class="label">combiner aggregate</text>
  <text x="676" y="264" class="text">combinefunc 合并状态</text>
  <text x="676" y="286" class="small">必要时 deserialize / serialize</text>

  <path d="M860 255 H925" class="line"/>
  <rect x="925" y="210" width="55" height="90" class="final"/>
  <text x="940" y="245" class="label">表</text>
  <text x="936" y="269" class="small">最终</text>
  <text x="936" y="286" class="small">状态</text>

  <text x="300" y="455" class="small">PostgreSQL nodeAgg.c 的 aggsplit 支持 skip final、combine、serialize、deserialize；PipelineDB planner.c 显式改写 worker/combiner 聚合计划。</text>
</svg>
