<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">连续视图背后的对象关系</title>
  <desc id="desc">展示 PipelineDB 创建连续视图时涉及的 stream、definition relation、overlay view、materialization relation、output stream 和索引。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #111827; }
    .label { font: 600 15px sans-serif; fill: #111827; }
    .text { font: 13px sans-serif; fill: #374151; }
    .small { font: 12px sans-serif; fill: #4b5563; }
    .box { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; rx: 8; }
    .stream { fill: #ecfdf5; stroke: #059669; stroke-width: 1.7; rx: 8; }
    .view { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .table { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.7; rx: 8; }
    .index { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.7; rx: 8; }
    .line { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #6b7280; stroke-width: 1.8; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <text x="32" y="42" class="title">一个连续视图不是一个普通视图：它是一组协作对象</text>

  <rect x="55" y="105" width="170" height="82" class="stream"/>
  <text x="89" y="137" class="label">输入 stream</text>
  <text x="76" y="160" class="small">foreign table</text>
  <text x="76" y="177" class="small">只作为事件入口</text>

  <path d="M225 146 H320" class="line"/>
  <rect x="320" y="105" width="185" height="82" class="view"/>
  <text x="356" y="137" class="label">连续查询定义</text>
  <text x="344" y="160" class="small">保存 SQL 与 reloptions</text>
  <text x="344" y="177" class="small">记录 stream reader</text>

  <path d="M505 146 H600" class="line"/>
  <rect x="600" y="105" width="185" height="82" class="table"/>
  <text x="650" y="137" class="label">matrel</text>
  <text x="628" y="160" class="small">物化聚合状态</text>
  <text x="628" y="177" class="small">真实查询数据来源</text>

  <path d="M692 187 V252" class="line"/>
  <rect x="585" y="252" width="215" height="82" class="view"/>
  <text x="644" y="284" class="label">overlay view</text>
  <text x="610" y="307" class="small">用户查询连续视图名</text>
  <text x="610" y="324" class="small">底层映射到 matrel</text>

  <path d="M785 146 H875" class="dash"/>
  <rect x="875" y="105" width="125" height="82" class="index"/>
  <text x="905" y="137" class="label">索引</text>
  <text x="895" y="160" class="small">pkey index</text>
  <text x="895" y="177" class="small">lookup index</text>

  <rect x="600" y="382" width="185" height="82" class="stream"/>
  <text x="648" y="414" class="label">输出 stream</text>
  <text x="625" y="437" class="small">old / new / delta row</text>
  <text x="625" y="454" class="small">可继续级联计算</text>
  <path d="M692 334 V382" class="dash"/>

  <rect x="70" y="302" width="245" height="80" class="box"/>
  <text x="96" y="332" class="label">pipelinedb.cont_query catalog</text>
  <text x="96" y="356" class="small">记录 relid、streamrelid、matrelid、osrelid</text>
  <path d="M315 342 C430 320 495 250 600 180" class="dash"/>
</svg>
