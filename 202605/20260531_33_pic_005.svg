<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">流计算是否应该进入数据库的决策边界</title>
  <desc id="desc">展示选择流计算、物化视图、消息队列加外部引擎、以及保留读时计算的判断路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .label { font: 600 15px sans-serif; fill: #0f172a; }
    .text { font: 13px sans-serif; fill: #334155; }
    .small { font: 12px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .yes { fill: #ecfdf5; stroke: #059669; stroke-width: 1.7; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.7; rx: 8; }
    .no { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.7; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <text x="32" y="42" class="title">选型边界：不要因为“实时”两个字就把所有计算做成流</text>

  <rect x="410" y="85" width="220" height="70" class="box"/>
  <text x="448" y="113" class="label">指标是否反复查询？</text>
  <text x="435" y="136" class="small">看板、告警、排行榜、窗口指标</text>

  <path d="M410 120 H250 V205" class="line"/>
  <rect x="135" y="205" width="230" height="74" class="no"/>
  <text x="176" y="234" class="label">否：保留读时计算</text>
  <text x="157" y="257" class="small">一次性分析不值得维护状态</text>

  <path d="M630 120 H795 V205" class="line"/>
  <rect x="680" y="205" width="230" height="74" class="box"/>
  <text x="713" y="234" class="label">是否允许分钟级延迟？</text>
  <text x="706" y="257" class="small">能否周期刷新而非逐事件更新</text>

  <path d="M795 279 V355" class="line"/>
  <rect x="680" y="355" width="230" height="74" class="warn"/>
  <text x="710" y="384" class="label">是：优先物化视图</text>
  <text x="708" y="407" class="small">简单、可控、刷新可观测</text>

  <path d="M680 242 H520 V315" class="line"/>
  <rect x="405" y="315" width="230" height="74" class="box"/>
  <text x="445" y="344" class="label">能否丢弃明细？</text>
  <text x="430" y="367" class="small">审计、重放、纠错是否依赖原始事件</text>

  <path d="M405 352 H250 V430" class="line"/>
  <rect x="100" y="430" width="300" height="74" class="warn"/>
  <text x="128" y="459" class="label">否：消息队列 + 外部流引擎</text>
  <text x="126" y="482" class="small">保留日志，数据库只承载服务化查询</text>

  <path d="M635 352 H760 V430" class="line"/>
  <rect x="610" y="430" width="300" height="74" class="yes"/>
  <text x="650" y="459" class="label">是：数据库内流式聚合</text>
  <text x="634" y="482" class="small">高写入、低读延迟、状态集较小</text>

  <text x="420" y="506" class="small">关键验证：乱序/迟到、重放、幂等、后台进程容量、状态膨胀、失败后的补偿路径。</text>
</svg>
