<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">rule 位于 parser 与 planner 之间</title>
  <desc id="desc">展示 PostgreSQL 查询从 SQL 文本到执行计划的路径，rule system 在 parse tree 之后、planner 之前改写查询树。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f3a4a"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f7f9fc;stroke:#334155;stroke-width:2;rx:8}
    .hot{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .cat{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:8}
    .txt{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;fill:#111827}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .arrow{stroke:#2f3a4a;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="34" y="76" width="138" height="78" class="box"/>
  <text x="103" y="108" text-anchor="middle" class="txt">SQL 文本</text>
  <text x="103" y="134" text-anchor="middle" class="small">SELECT / DML</text>

  <path d="M172 115 H232" class="arrow"/>
  <rect x="232" y="76" width="150" height="78" class="box"/>
  <text x="307" y="108" text-anchor="middle" class="txt">Parser</text>
  <text x="307" y="134" text-anchor="middle" class="small">生成 Query tree</text>

  <path d="M382 115 H442" class="arrow"/>
  <rect x="442" y="58" width="178" height="114" class="hot"/>
  <text x="531" y="96" text-anchor="middle" class="txt">Rule System</text>
  <text x="531" y="124" text-anchor="middle" class="small">按规则改写查询树</text>
  <text x="531" y="148" text-anchor="middle" class="small">输出 0..N 个 Query</text>

  <path d="M620 115 H680" class="arrow"/>
  <rect x="680" y="76" width="138" height="78" class="box"/>
  <text x="749" y="108" text-anchor="middle" class="txt">Planner</text>
  <text x="749" y="134" text-anchor="middle" class="small">优化与选路径</text>

  <path d="M818 115 H878" class="arrow"/>
  <rect x="878" y="76" width="48" height="78" class="box"/>
  <text x="902" y="108" text-anchor="middle" class="txt">执行</text>
  <text x="902" y="134" text-anchor="middle" class="small">Plan</text>

  <rect x="394" y="232" width="274" height="78" class="cat"/>
  <text x="531" y="264" text-anchor="middle" class="txt">pg_rewrite / relcache</text>
  <text x="531" y="290" text-anchor="middle" class="small">规则动作也以 query tree 形式保存</text>
  <path d="M531 232 V174" class="arrow"/>
</svg>
