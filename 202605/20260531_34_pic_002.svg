<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">pg_rewrite 到 relcache 的规则加载路径</title>
  <desc id="desc">展示 CREATE RULE 写入 pg_rewrite，pg_class.relhasrules 标记关系有规则，relcache 按规则名顺序加载规则。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .cat{fill:#ecfeff;stroke:#0e7490;stroke-width:2;rx:8}
    .cache{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:8}
    .txt{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="38" y="50" width="178" height="90" class="box"/>
  <text x="127" y="83" text-anchor="middle" class="txt">CREATE RULE</text>
  <text x="127" y="110" text-anchor="middle" class="small">DefineQueryRewrite()</text>

  <path d="M216 95 H286" class="arrow"/>
  <rect x="286" y="36" width="244" height="118" class="cat"/>
  <text x="408" y="68" text-anchor="middle" class="txt">pg_rewrite</text>
  <text x="312" y="96" class="mono">rulename</text>
  <text x="312" y="118" class="mono">ev_class, ev_type</text>
  <text x="312" y="140" class="mono">is_instead, ev_qual, ev_action</text>

  <path d="M408 154 V218" class="arrow"/>
  <rect x="286" y="218" width="244" height="86" class="cat"/>
  <text x="408" y="252" text-anchor="middle" class="txt">pg_class.relhasrules</text>
  <text x="408" y="278" text-anchor="middle" class="small">标记该 relation 需要加载规则</text>

  <path d="M530 95 H604" class="arrow"/>
  <rect x="604" y="36" width="312" height="118" class="cache"/>
  <text x="760" y="68" text-anchor="middle" class="txt">RelationBuildRuleLock()</text>
  <text x="760" y="96" text-anchor="middle" class="small">用 RewriteRelRulenameIndexId 扫描</text>
  <text x="760" y="122" text-anchor="middle" class="small">通常按规则名顺序读入</text>
  <text x="760" y="146" text-anchor="middle" class="small">写入 relation-&gt;rd_rules</text>

  <rect x="604" y="230" width="312" height="116" class="box"/>
  <text x="760" y="262" text-anchor="middle" class="txt">RewriteRule / RuleLock</text>
  <text x="630" y="291" class="mono">event, enabled, isInstead</text>
  <text x="630" y="316" class="mono">qual, actions</text>
  <path d="M760 154 V230" class="arrow"/>

  <rect x="70" y="328" width="392" height="54" class="box"/>
  <text x="266" y="361" text-anchor="middle" class="small">ALTER TABLE ENABLE/DISABLE RULE 只影响非 SELECT rule；ON SELECT 为保证视图工作总会应用</text>
</svg>
