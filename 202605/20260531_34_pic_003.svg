<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">视图 _RETURN rule 展开为子查询</title>
  <desc id="desc">展示 SELECT 视图时，_RETURN 规则把视图的 RTE 替换成保存的 SELECT 子查询，随后 planner 可继续拉平和优化。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .view{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:8}
    .sub{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .txt{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="40" y="54" width="300" height="116" class="box"/>
  <text x="190" y="86" text-anchor="middle" class="txt">原始查询树</text>
  <text x="72" y="118" class="mono">SELECT * FROM active_users</text>
  <text x="72" y="144" class="mono">WHERE city = '杭州';</text>

  <rect x="54" y="230" width="272" height="94" class="view"/>
  <text x="190" y="262" text-anchor="middle" class="txt">视图 RTE</text>
  <text x="190" y="288" text-anchor="middle" class="small">active_users</text>
  <text x="190" y="311" text-anchor="middle" class="small">命中 _RETURN ON SELECT rule</text>
  <path d="M190 170 V230" class="arrow"/>

  <path d="M340 112 H420" class="arrow"/>
  <rect x="420" y="54" width="496" height="300" class="sub"/>
  <text x="668" y="86" text-anchor="middle" class="txt">改写后的查询树</text>
  <text x="454" y="122" class="mono">SELECT active_users.*</text>
  <text x="454" y="148" class="mono">FROM (</text>
  <text x="482" y="174" class="mono">SELECT id, name, city</text>
  <text x="482" y="200" class="mono">FROM users</text>
  <text x="482" y="226" class="mono">WHERE enabled</text>
  <text x="454" y="252" class="mono">) active_users</text>
  <text x="454" y="278" class="mono">WHERE active_users.city = '杭州';</text>
  <text x="668" y="320" text-anchor="middle" class="small">rule system 只负责展开；子查询拉平、谓词下推、join 顺序交给 planner</text>

  <path d="M326 277 C380 277 384 224 420 204" class="arrow"/>
</svg>
