<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">INSERT UPDATE DELETE rule 生成多个查询树</title>
  <desc id="desc">展示非 SELECT rule 不原地修改查询树，而是根据 ALSO、INSTEAD 和条件生成规则动作查询、保留或抑制原始查询。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .also{fill:#ecfdf5;stroke:#15803d;stroke-width:2;rx:8}
    .instead{fill:#fef2f2;stroke:#b91c1c;stroke-width:2;rx:8}
    .qual{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
    .txt{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:17px;fill:#111827}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;fill:#475569}
    .mono{font-family:Menlo,Consolas,monospace;font-size:14px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="38" y="58" width="250" height="92" class="box"/>
  <text x="163" y="90" text-anchor="middle" class="txt">原始 DML Query</text>
  <text x="70" y="120" class="mono">UPDATE t SET ... WHERE q</text>

  <path d="M288 104 H374" class="arrow"/>
  <rect x="374" y="36" width="226" height="136" class="box"/>
  <text x="487" y="70" text-anchor="middle" class="txt">matchLocks + fireRules</text>
  <text x="487" y="98" text-anchor="middle" class="small">匹配 event 与 result relation</text>
  <text x="487" y="124" text-anchor="middle" class="small">替换 OLD / NEW</text>
  <text x="487" y="150" text-anchor="middle" class="small">递归改写 rule action</text>

  <path d="M600 84 H678" class="arrow"/>
  <rect x="678" y="38" width="236" height="84" class="also"/>
  <text x="796" y="69" text-anchor="middle" class="txt">ALSO</text>
  <text x="796" y="96" text-anchor="middle" class="small">规则动作 + 原始查询</text>

  <path d="M600 132 H678" class="arrow"/>
  <rect x="678" y="150" width="236" height="84" class="instead"/>
  <text x="796" y="181" text-anchor="middle" class="txt">无条件 INSTEAD</text>
  <text x="796" y="208" text-anchor="middle" class="small">只保留规则动作，抑制原始查询</text>

  <path d="M487 172 V252" class="arrow"/>
  <rect x="374" y="252" width="226" height="112" class="qual"/>
  <text x="487" y="284" text-anchor="middle" class="txt">有条件 INSTEAD</text>
  <text x="487" y="312" text-anchor="middle" class="small">动作查询追加 rule qual 与原查询 qual</text>
  <text x="487" y="338" text-anchor="middle" class="small">原查询追加 NOT(rule qual)</text>

  <path d="M600 308 H678" class="arrow"/>
  <rect x="678" y="274" width="236" height="104" class="box"/>
  <text x="796" y="306" text-anchor="middle" class="txt">最终 Query List</text>
  <text x="796" y="332" text-anchor="middle" class="small">INSERT：原始查询通常先执行</text>
  <text x="796" y="356" text-anchor="middle" class="small">UPDATE/DELETE：原始查询通常后执行</text>

  <rect x="66" y="312" width="240" height="72" class="box"/>
  <text x="186" y="342" text-anchor="middle" class="txt">风险点</text>
  <text x="186" y="368" text-anchor="middle" class="small">一次语句可能被复制成多次执行路径</text>
</svg>
