<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 触发器类型矩阵</title>
  <desc id="desc">按触发时机、粒度、对象和事件展示普通触发器、视图 INSTEAD OF 触发器、约束触发器和事件触发器的边界。</desc>
  <style>
    .bg { fill: #f7f8fb; }
    .panel { fill: #ffffff; stroke: #c9d2df; stroke-width: 1.5; rx: 8; }
    .head { fill: #23395d; }
    .accent { fill: #4f7cac; }
    .warn { fill: #c26d3f; }
    .ok { fill: #4f8f65; }
    .muted { fill: #eef2f7; stroke: #c9d2df; }
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #223044; font-size: 18px; }
    .small { font-size: 15px; fill: #46566c; }
    .tiny { font-size: 13px; fill: #5f6f84; }
    .white { fill: #ffffff; font-weight: 700; }
    .label { font-weight: 700; }
  </style>
  <rect class="bg" width="980" height="600"/>
  <text x="40" y="46" class="label" font-size="26">触发器不是一种形态，而是多个维度的组合</text>
  <text x="40" y="78" class="small">CREATE TRIGGER 把 timing、event、level、target relation、WHEN、function 组合后写入 pg_trigger。</text>

  <rect x="40" y="110" width="900" height="400" class="panel"/>
  <rect x="40" y="110" width="900" height="48" class="head"/>
  <text x="70" y="141" class="white">维度</text>
  <text x="245" y="141" class="white">可选值</text>
  <text x="570" y="141" class="white">工程含义</text>

  <line x1="210" y1="110" x2="210" y2="510" stroke="#c9d2df"/>
  <line x1="520" y1="110" x2="520" y2="510" stroke="#c9d2df"/>
  <g stroke="#d8e0ea">
    <line x1="40" y1="210" x2="940" y2="210"/>
    <line x1="40" y1="270" x2="940" y2="270"/>
    <line x1="40" y1="330" x2="940" y2="330"/>
    <line x1="40" y1="390" x2="940" y2="390"/>
    <line x1="40" y1="450" x2="940" y2="450"/>
  </g>

  <text x="70" y="188" class="label">时机</text>
  <rect x="245" y="173" width="88" height="30" rx="6" class="accent"/><text x="262" y="194" class="white" font-size="15">BEFORE</text>
  <rect x="345" y="173" width="74" height="30" rx="6" class="ok"/><text x="362" y="194" class="white" font-size="15">AFTER</text>
  <rect x="431" y="173" width="92" height="30" rx="6" class="warn"/><text x="446" y="194" class="white" font-size="15">INSTEAD</text>
  <text x="570" y="188" class="small">改写行、排队到语句/事务末尾、或接管视图写入。</text>

  <text x="70" y="248" class="label">事件</text>
  <text x="245" y="248" class="small">INSERT / UPDATE / DELETE / TRUNCATE</text>
  <text x="570" y="240" class="small">SELECT 没有触发器；TRUNCATE 只能语句级。</text>
  <text x="570" y="260" class="tiny">MERGE 会按实际或声明的 INSERT/UPDATE/DELETE 动作触发。</text>

  <text x="70" y="308" class="label">粒度</text>
  <text x="245" y="308" class="small">FOR EACH ROW / FOR EACH STATEMENT</text>
  <text x="570" y="300" class="small">行级有 OLD/NEW；语句级默认只知道一次语句。</text>
  <text x="570" y="320" class="tiny">AFTER 可用 transition table 得到受影响行集合。</text>

  <text x="70" y="368" class="label">对象</text>
  <text x="245" y="360" class="small">table / foreign table / view</text>
  <text x="245" y="382" class="tiny">event trigger 是数据库级 DDL/login 事件。</text>
  <text x="570" y="360" class="small">普通表处理 DML；视图用 INSTEAD OF 接管写入。</text>
  <text x="570" y="382" class="tiny">分区表行级触发器会克隆到分区。</text>

  <text x="70" y="428" class="label">存储</text>
  <text x="245" y="428" class="small">pg_trigger + pg_proc + relcache TriggerDesc</text>
  <text x="570" y="420" class="small">tgtype 位图记录时机/事件/粒度；函数 OID 指向 pg_proc。</text>
  <text x="570" y="440" class="tiny">WHEN、参数、transition table 名称也在 catalog 中。</text>

  <text x="70" y="488" class="label">事务</text>
  <text x="245" y="488" class="small">同一事务内执行；错误会整体回滚</text>
  <text x="570" y="480" class="small">AFTER/约束触发器可能排队；延迟约束可到提交前触发。</text>
  <text x="570" y="500" class="tiny">SECURITY DEFINER 会改变触发函数的执行角色。</text>

  <rect x="40" y="535" width="900" height="40" rx="8" class="muted"/>
  <text x="60" y="561" class="small">阅读提示：先确认“时机 + 粒度”，再讨论是否适合把业务计算前置到写路径。</text>
</svg>
