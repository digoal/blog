<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">DML 执行链路中的触发器位置</title>
  <desc id="desc">展示 ModifyTable 执行 INSERT UPDATE DELETE 时 BEFORE STATEMENT、BEFORE ROW、实际写入、AFTER ROW 排队和 AFTER STATEMENT 排队的顺序。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315d7f"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #fafbfc; }
    .box { fill: #ffffff; stroke: #c8d3df; stroke-width: 1.5; rx: 8; }
    .exec { fill: #e7f0f7; stroke: #5e8caf; }
    .before { fill: #e9f4ec; stroke: #5e9b73; }
    .after { fill: #fff0e2; stroke: #cc7b38; }
    .queue { fill: #f0edf8; stroke: #7a67a8; }
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #223044; font-size: 17px; }
    .title { font-size: 26px; font-weight: 700; }
    .small { font-size: 14px; fill: #536277; }
    .label { font-weight: 700; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #39485a; }
  </style>
  <rect class="bg" width="1060" height="620"/>
  <text x="42" y="48" class="title">触发器在 ModifyTable 写路径上插队</text>
  <text x="42" y="78" class="small">BEFORE 直接参与当前行是否写入；AFTER 先保存事件，语句末或事务末再触发。</text>

  <rect x="55" y="130" width="170" height="82" class="before"/>
  <text x="78" y="164" class="label">BEFORE STATEMENT</text>
  <text x="75" y="188" class="code">ExecBS*Triggers</text>

  <rect x="295" y="130" width="170" height="82" class="before"/>
  <text x="323" y="164" class="label">BEFORE ROW</text>
  <text x="322" y="188" class="code">ExecBR*Triggers</text>

  <rect x="535" y="130" width="170" height="82" class="exec"/>
  <text x="572" y="164" class="label">实际写入</text>
  <text x="558" y="188" class="small">heap / table AM / index</text>

  <rect x="775" y="130" width="210" height="82" class="after"/>
  <text x="825" y="164" class="label">AFTER ROW</text>
  <text x="803" y="188" class="code">AfterTriggerSaveEvent</text>

  <path d="M225 171 H295" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M465 171 H535" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M705 171 H775" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="295" y="255" width="410" height="118" class="box"/>
  <text x="325" y="292" class="label">每一行重复：读取 OLD / 构造 NEW / 调用函数</text>
  <text x="325" y="322" class="small">返回 NULL：跳过本行写入</text>
  <text x="325" y="350" class="small">返回 NEW：继续写入，后续 BEFORE 看到修改后的行</text>

  <path d="M620 212 V255" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M500 373 V425" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="55" y="425" width="270" height="88" class="after"/>
  <text x="85" y="460" class="label">AFTER STATEMENT 排队</text>
  <text x="82" y="485" class="code">ExecAS*Triggers</text>

  <rect x="390" y="425" width="270" height="88" class="queue"/>
  <text x="420" y="460" class="label">AfterTriggerEndQuery</text>
  <text x="420" y="485" class="small">触发 immediate AFTER 事件</text>

  <rect x="725" y="425" width="270" height="88" class="queue"/>
  <text x="755" y="460" class="label">AfterTriggerFireDeferred</text>
  <text x="755" y="485" class="small">提交前触发延迟约束事件</text>

  <path d="M325 469 H390" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M660 469 H725" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M880 212 C880 300 525 310 525 425" fill="none" stroke="#7a67a8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="55" y="545" width="940" height="42" class="box"/>
  <text x="80" y="572" class="small">源码锚点：nodeModifyTable.c 调用 ExecBS/BR/AR/AS；trigger.c 负责调用函数、保存 AFTER 事件和处理延迟队列。</text>
</svg>
