<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">AFTER 触发器事件队列与延迟约束</title>
  <desc id="desc">展示 PostgreSQL 将 AFTER 触发器事件保存到 query stack 和 transaction event list，并在语句末或提交前触发。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345c7d"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f7f8fb; }
    .box { fill: #ffffff; stroke: #c8d3df; stroke-width: 1.5; rx: 8; }
    .event { fill: #edf4fb; stroke: #5e8caf; rx: 6; }
    .shared { fill: #f5efe7; stroke: #bf824c; rx: 6; }
    .defer { fill: #f0edf8; stroke: #7b67a9; rx: 6; }
    .commit { fill: #e9f4ec; stroke: #5a956e; rx: 6; }
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #223044; font-size: 17px; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-weight: 700; }
    .small { font-size: 14px; fill: #536277; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #39485a; }
  </style>
  <rect class="bg" width="1040" height="620"/>
  <text x="40" y="48" class="title">AFTER 触发器的成本来自“排队 + 回放”</text>
  <text x="40" y="78" class="small">它不是在行刚写完时立刻执行函数，而是保存足够的信息，在语句末或事务末统一处理。</text>

  <rect x="55" y="125" width="230" height="105" class="box"/>
  <text x="82" y="160" class="label">写入路径</text>
  <text x="82" y="188" class="code">ExecAR*Triggers</text>
  <text x="82" y="212" class="small">保存 CTID / tuple / transition 行</text>

  <rect x="370" y="105" width="290" height="145" class="box"/>
  <text x="400" y="138" class="label">query_stack[depth]</text>
  <rect x="400" y="158" width="105" height="42" class="event"/>
  <text x="417" y="184" class="small">event</text>
  <rect x="515" y="158" width="115" height="42" class="shared"/>
  <text x="531" y="184" class="small">shared data</text>
  <text x="400" y="224" class="small">语句级临时队列，可持有 tuplestore</text>

  <rect x="745" y="125" width="230" height="105" class="commit"/>
  <text x="775" y="160" class="label">语句结束</text>
  <text x="775" y="188" class="code">AfterTriggerEndQuery</text>
  <text x="775" y="212" class="small">触发 immediate，移动 deferred</text>

  <path d="M285 178 H370" stroke="#345c7d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M660 178 H745" stroke="#345c7d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="115" y="330" width="300" height="150" class="defer"/>
  <text x="145" y="365" class="label">事务级 deferred event list</text>
  <text x="145" y="394" class="small">约束触发器可 INITIALLY DEFERRED</text>
  <text x="145" y="420" class="small">SET CONSTRAINTS 可改变触发时机</text>
  <text x="145" y="446" class="small">子事务失败时丢弃对应新增事件</text>

  <rect x="625" y="330" width="300" height="150" class="commit"/>
  <text x="655" y="365" class="label">提交前回放</text>
  <text x="655" y="394" class="code">AfterTriggerFireDeferred</text>
  <text x="655" y="420" class="small">必要时建立 snapshot</text>
  <text x="655" y="446" class="small">循环触发，直到没有新事件</text>

  <path d="M800 230 C750 300 430 290 390 330" fill="none" stroke="#7b67a9" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M415 405 H625" stroke="#345c7d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="55" y="535" width="920" height="44" class="box"/>
  <text x="80" y="563" class="small">核心 tradeoff：AFTER 能看到最终结果并支持延迟约束，但大量受影响行会积累事件、CTID/tuple 和 transition table 存储。</text>
</svg>
