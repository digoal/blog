<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Transition table 把逐行变化变成语句级集合</title>
  <desc id="desc">展示 UPDATE 语句的 OLD TABLE 和 NEW TABLE 如何收集多行变化，并被 AFTER STATEMENT 触发函数按集合读取。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315d7f"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #fbfcfd; }
    .box { fill: #ffffff; stroke: #c8d3df; stroke-width: 1.5; rx: 8; }
    .old { fill: #f5e9e2; stroke: #c07245; rx: 6; }
    .new { fill: #e7f1ec; stroke: #58946f; rx: 6; }
    .func { fill: #eef0fa; stroke: #7468aa; rx: 8; }
    .row { fill: #ffffff; stroke: #d1d9e4; rx: 4; }
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #223044; font-size: 17px; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-weight: 700; }
    .small { font-size: 14px; fill: #536277; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #39485a; }
  </style>
  <rect class="bg" width="1040" height="620"/>
  <text x="40" y="48" class="title">Transition table：把 N 次行触发，改成 1 次集合处理</text>
  <text x="40" y="78" class="small">适合审计、批量汇总、变更投递等需要“本语句全部变化”的场景。</text>

  <rect x="60" y="130" width="250" height="130" class="box"/>
  <text x="88" y="165" class="label">一条 UPDATE 语句</text>
  <text x="88" y="195" class="code">UPDATE emp SET salary = ...</text>
  <text x="88" y="222" class="small">影响多行：r1、r2、r3...</text>

  <rect x="410" y="105" width="250" height="185" class="old"/>
  <text x="440" y="140" class="label">OLD TABLE</text>
  <rect x="440" y="160" width="190" height="32" class="row"/><text x="456" y="182" class="small">r1 before-image</text>
  <rect x="440" y="200" width="190" height="32" class="row"/><text x="456" y="222" class="small">r2 before-image</text>
  <rect x="440" y="240" width="190" height="32" class="row"/><text x="456" y="262" class="small">r3 before-image</text>

  <rect x="410" y="330" width="250" height="185" class="new"/>
  <text x="440" y="365" class="label">NEW TABLE</text>
  <rect x="440" y="385" width="190" height="32" class="row"/><text x="456" y="407" class="small">r1 after-image</text>
  <rect x="440" y="425" width="190" height="32" class="row"/><text x="456" y="447" class="small">r2 after-image</text>
  <rect x="440" y="465" width="190" height="32" class="row"/><text x="456" y="487" class="small">r3 after-image</text>

  <rect x="765" y="205" width="220" height="180" class="func"/>
  <text x="794" y="242" class="label">AFTER STATEMENT</text>
  <text x="794" y="270" class="code">process_audit()</text>
  <text x="794" y="300" class="small">SELECT ... FROM old_table</text>
  <text x="794" y="326" class="small">SELECT ... FROM new_table</text>
  <text x="794" y="352" class="small">一次函数调用，集合化写日志</text>

  <path d="M310 195 H410" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M310 220 C355 285 355 410 410 423" fill="none" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M660 198 C705 210 730 235 765 262" fill="none" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M660 423 C705 405 730 365 765 326" fill="none" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="60" y="535" width="925" height="44" class="box"/>
  <text x="85" y="563" class="small">限制：只用于 AFTER 触发器；不能和约束触发器、多个事件、UPDATE OF 列表随意组合；底层实现使用 tuplestore。</text>
</svg>
