<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="650" viewBox="0 0 1040 650" role="img" aria-labelledby="title desc">
  <title id="title">触发器使用边界决策图</title>
  <desc id="desc">展示在约束、生成列、规则、物化视图、应用逻辑和触发器之间做工程选择的路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315d7f"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #fafbfc; }
    .q { fill: #eef4fb; stroke: #5e8caf; stroke-width: 1.5; rx: 8; }
    .yes { fill: #e8f4ec; stroke: #5a956e; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff1e3; stroke: #c67b3f; stroke-width: 1.5; rx: 8; }
    .no { fill: #f2edf8; stroke: #7a67a8; stroke-width: 1.5; rx: 8; }
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #223044; font-size: 16px; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-weight: 700; }
    .small { font-size: 14px; fill: #536277; }
    .edge { font-size: 13px; fill: #315d7f; font-weight: 700; }
  </style>
  <rect class="bg" width="1040" height="650"/>
  <text x="40" y="48" class="title">触发器是写路径工具，不是默认业务框架</text>
  <text x="40" y="78" class="small">先问是否已有声明式机制；只有需要执行期上下文、OLD/NEW 或同事务副作用时，触发器才有优势。</text>

  <rect x="385" y="115" width="270" height="70" class="q"/>
  <text x="415" y="145" class="label">能用声明式约束表达吗？</text>
  <text x="415" y="168" class="small">NOT NULL / CHECK / FK / UNIQUE</text>

  <rect x="105" y="235" width="260" height="80" class="yes"/>
  <text x="135" y="268" class="label">优先用约束</text>
  <text x="135" y="292" class="small">可优化、可推理、语义清楚</text>

  <rect x="675" y="235" width="260" height="80" class="q"/>
  <text x="705" y="268" class="label">只是派生列或全文列？</text>
  <text x="705" y="292" class="small">可由输入列确定</text>

  <rect x="675" y="360" width="260" height="80" class="yes"/>
  <text x="705" y="393" class="label">优先生成列/表达式索引</text>
  <text x="705" y="417" class="small">避免隐藏写路径副作用</text>

  <rect x="385" y="360" width="270" height="80" class="q"/>
  <text x="415" y="393" class="label">需要 OLD/NEW 或同事务副作用？</text>
  <text x="415" y="417" class="small">审计、汇总、跨表校验、视图写入</text>

  <rect x="105" y="360" width="260" height="80" class="warn"/>
  <text x="135" y="393" class="label">考虑 rule / 视图 / 批处理</text>
  <text x="135" y="417" class="small">执行前改写或离线计算更直接</text>

  <rect x="385" y="500" width="270" height="85" class="no"/>
  <text x="415" y="532" class="label">使用触发器，但设边界</text>
  <text x="415" y="556" class="small">WHEN 过滤、命名顺序、幂等、防递归</text>
  <text x="415" y="578" class="small">大批量用 transition table 或异步化</text>

  <path d="M385 150 H260 V235" fill="none" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="282" y="135" class="edge">是</text>
  <path d="M655 150 H805 V235" fill="none" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="760" y="135" class="edge">否</text>
  <path d="M805 315 V360" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="820" y="342" class="edge">是</text>
  <path d="M675 275 H520 V360" fill="none" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="575" y="260" class="edge">否</text>
  <path d="M385 400 H365" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="373" y="387" class="edge">否</text>
  <path d="M520 440 V500" stroke="#315d7f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="535" y="475" class="edge">是</text>

  <rect x="40" y="610" width="960" height="1" fill="#c8d3df"/>
  <text x="55" y="633" class="small">核心判断：把计算前置到写入时，会让读更简单，但会增加写延迟、锁等待、递归和排错成本。</text>
</svg>
