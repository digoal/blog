<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF = 一个篮子，装着一堆资产</text>
  
  <!-- 左边：普通人买股票 -->
  <rect x="30" y="65" width="230" height="320" fill="#fff3e0" rx="10" stroke="#ff9800" stroke-width="1.5"/>
  <text x="145" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">❌ 自己买个股</text>
  
  <rect x="55" y="108" width="180" height="36" fill="#ffccbc" rx="6"/>
  <text x="145" y="131" text-anchor="middle" font-size="12" fill="#bf360c">买茅台：1手 = 1000股 ≈ 15万</text>
  
  <rect x="55" y="154" width="180" height="36" fill="#ffccbc" rx="6"/>
  <text x="145" y="177" text-anchor="middle" font-size="12" fill="#bf360c">买宁德：1手 = 100股 ≈ 15000元</text>

  <rect x="55" y="200" width="180" height="36" fill="#ffccbc" rx="6"/>
  <text x="145" y="223" text-anchor="middle" font-size="12" fill="#bf360c">买中国平安：≈ 4000元/手</text>
  
  <text x="145" y="270" text-anchor="middle" font-size="12" fill="#bf360c">⚠ 需要大量资金</text>
  <text x="145" y="292" text-anchor="middle" font-size="12" fill="#bf360c">⚠ 需要研究每家公司</text>
  <text x="145" y="314" text-anchor="middle" font-size="12" fill="#bf360c">⚠ 一只股票暴雷影响大</text>
  <text x="145" y="350" text-anchor="middle" font-size="11" fill="#999">（还没计算港股、美股...）</text>

  <!-- 中间箭头 -->
  <text x="400" y="235" text-anchor="middle" font-size="28" fill="#4caf50">→</text>
  <text x="400" y="258" text-anchor="middle" font-size="11" fill="#666">用ETF解决</text>

  <!-- 右边：ETF -->
  <rect x="540" y="65" width="230" height="320" fill="#e8f5e9" rx="10" stroke="#4caf50" stroke-width="1.5"/>
  <text x="655" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">✅ 买沪深300 ETF</text>
  
  <rect x="565" y="108" width="180" height="36" fill="#c8e6c9" rx="6"/>
  <text x="655" y="131" text-anchor="middle" font-size="12" fill="#1b5e20">100元起买</text>
  
  <rect x="565" y="154" width="180" height="36" fill="#c8e6c9" rx="6"/>
  <text x="655" y="177" text-anchor="middle" font-size="12" fill="#1b5e20">同时持有300家公司</text>

  <rect x="565" y="200" width="180" height="36" fill="#c8e6c9" rx="6"/>
  <text x="655" y="223" text-anchor="middle" font-size="12" fill="#1b5e20">费率低至0.05%/年</text>
  
  <text x="655" y="270" text-anchor="middle" font-size="12" fill="#2e7d32">✓ 门槛低</text>
  <text x="655" y="292" text-anchor="middle" font-size="12" fill="#2e7d32">✓ 自动分散风险</text>
  <text x="655" y="314" text-anchor="middle" font-size="12" fill="#2e7d32">✓ 无需研究个股</text>
  <text x="655" y="350" text-anchor="middle" font-size="11" fill="#999">（基金公司帮你管理）</text>
</svg>
