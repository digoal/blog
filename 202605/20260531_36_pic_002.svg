<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF运作机制：钱是怎么流转的</text>

  <!-- 散户 -->
  <rect x="30" y="65" width="130" height="60" fill="#bbdefb" rx="8" stroke="#1976d2" stroke-width="1.5"/>
  <text x="95" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">散户A</text>
  <text x="95" y="110" text-anchor="middle" font-size="11" fill="#0d47a1">买入 1000元</text>

  <rect x="30" y="145" width="130" height="60" fill="#bbdefb" rx="8" stroke="#1976d2" stroke-width="1.5"/>
  <text x="95" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">散户B</text>
  <text x="95" y="190" text-anchor="middle" font-size="11" fill="#0d47a1">买入 5000元</text>

  <rect x="30" y="225" width="130" height="60" fill="#bbdefb" rx="8" stroke="#1976d2" stroke-width="1.5"/>
  <text x="95" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">机构C</text>
  <text x="95" y="270" text-anchor="middle" font-size="11" fill="#0d47a1">买入 100万</text>

  <!-- 箭头到交易所 -->
  <line x1="160" y1="95" x2="280" y2="200" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="175" x2="280" y2="210" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="255" x2="280" y2="220" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- 交易所/ETF -->
  <rect x="280" y="155" width="150" height="90" fill="#f3e5f5" rx="10" stroke="#7b1fa2" stroke-width="2"/>
  <text x="355" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a148c">证券交易所</text>
  <text x="355" y="205" text-anchor="middle" font-size="12" fill="#4a148c">ETF份额</text>
  <text x="355" y="222" text-anchor="middle" font-size="11" fill="#7b1fa2">实时净值 + 价格</text>

  <!-- 箭头到基金公司 -->
  <line x1="430" y1="200" x2="540" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="485" y="192" text-anchor="middle" font-size="10" fill="#888">申赎</text>

  <!-- 基金公司 -->
  <rect x="540" y="145" width="140" height="110" fill="#fff8e1" rx="10" stroke="#f57f17" stroke-width="2"/>
  <text x="610" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">基金管理人</text>
  <text x="610" y="193" text-anchor="middle" font-size="11" fill="#e65100">（华夏/易方达等）</text>
  <text x="610" y="213" text-anchor="middle" font-size="11" fill="#e65100">按指数比例</text>
  <text x="610" y="230" text-anchor="middle" font-size="11" fill="#e65100">买卖成分股</text>

  <!-- 箭头到成分股 -->
  <line x1="680" y1="200" x2="730" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 成分股 -->
  <rect x="730" y="80" width="50" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="1"/>
  <text x="755" y="102" text-anchor="middle" font-size="10" fill="#1b5e20">茅台</text>

  <rect x="730" y="130" width="50" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="1"/>
  <text x="755" y="152" text-anchor="middle" font-size="10" fill="#1b5e20">工行</text>

  <rect x="730" y="180" width="50" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="1"/>
  <text x="755" y="202" text-anchor="middle" font-size="10" fill="#1b5e20">平安</text>

  <rect x="730" y="230" width="50" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="1"/>
  <text x="755" y="252" text-anchor="middle" font-size="10" fill="#1b5e20">宁德</text>

  <rect x="730" y="280" width="50" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="1"/>
  <text x="755" y="302" text-anchor="middle" font-size="11" fill="#888">...300家</text>

  <!-- 底部说明 -->
  <rect x="30" y="360" width="740" height="80" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">你买ETF，本质上是买了背后这篮子股票的"等比例份额"</text>
  <text x="400" y="408" text-anchor="middle" font-size="12" fill="#666">指数涨10%，你的ETF净值也涨约10%（扣除极小管理费后）</text>
  <text x="400" y="428" text-anchor="middle" font-size="11" fill="#999">基金公司不替你择时，只负责"忠实跟踪指数"</text>
</svg>
