<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">费率对比：ETF 为什么是散户最便宜的工具</text>

  <!-- 表头 -->
  <rect x="30" y="55" width="740" height="38" fill="#37474f" rx="6"/>
  <text x="130" y="79" text-anchor="middle" font-size="13" fill="white" font-weight="bold">工具类型</text>
  <text x="300" y="79" text-anchor="middle" font-size="13" fill="white" font-weight="bold">典型年费率</text>
  <text x="480" y="79" text-anchor="middle" font-size="13" fill="white" font-weight="bold">10万本金每年付多少</text>
  <text x="660" y="79" text-anchor="middle" font-size="13" fill="white" font-weight="bold">适合谁</text>

  <!-- 行1 -->
  <rect x="30" y="93" width="740" height="40" fill="#e8f5e9" rx="0"/>
  <text x="130" y="118" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">宽基ETF（如华夏300）</text>
  <text x="300" y="118" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">0.05% ~ 0.15%</text>
  <text x="480" y="118" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">50 ~ 150元</text>
  <text x="660" y="118" text-anchor="middle" font-size="12" fill="#2e7d32">所有散户</text>

  <!-- 行2 -->
  <rect x="30" y="133" width="740" height="40" fill="#fff9c4" rx="0"/>
  <text x="130" y="158" text-anchor="middle" font-size="12" fill="#795548">主动型公募基金</text>
  <text x="300" y="158" text-anchor="middle" font-size="13" fill="#e65100">1.0% ~ 1.5%</text>
  <text x="480" y="158" text-anchor="middle" font-size="13" fill="#e65100">1000 ~ 1500元</text>
  <text x="660" y="158" text-anchor="middle" font-size="12" fill="#795548">信任基金经理者</text>

  <!-- 行3 -->
  <rect x="30" y="173" width="740" height="40" fill="#fff9c4" rx="0"/>
  <text x="130" y="198" text-anchor="middle" font-size="12" fill="#795548">FOF基金（基金中的基金）</text>
  <text x="300" y="198" text-anchor="middle" font-size="13" fill="#e65100">1.2% ~ 2.0%</text>
  <text x="480" y="198" text-anchor="middle" font-size="13" fill="#e65100">1200 ~ 2000元</text>
  <text x="660" y="198" text-anchor="middle" font-size="12" fill="#795548">懒人一键配置</text>

  <!-- 行4 -->
  <rect x="30" y="213" width="740" height="40" fill="#ffebee" rx="0"/>
  <text x="130" y="238" text-anchor="middle" font-size="12" fill="#b71c1c">私募基金</text>
  <text x="300" y="238" text-anchor="middle" font-size="13" fill="#c62828">2% + 20%业绩提成</text>
  <text x="480" y="238" text-anchor="middle" font-size="13" fill="#c62828">2000+（业绩好时更多）</text>
  <text x="660" y="238" text-anchor="middle" font-size="12" fill="#b71c1c">100万门槛以上</text>

  <!-- 行5 -->
  <rect x="30" y="253" width="740" height="40" fill="#ffebee" rx="0"/>
  <text x="130" y="278" text-anchor="middle" font-size="12" fill="#b71c1c">银行结构性理财产品</text>
  <text x="300" y="278" text-anchor="middle" font-size="13" fill="#c62828">1.5% ~ 3%（隐含）</text>
  <text x="480" y="278" text-anchor="middle" font-size="13" fill="#c62828">1500 ~ 3000元</text>
  <text x="660" y="278" text-anchor="middle" font-size="12" fill="#b71c1c">不了解实际费用者</text>

  <!-- 底部注释 -->
  <text x="400" y="320" text-anchor="middle" font-size="11" fill="#888">*以上均为管理费，不含交易佣金；ETF场内交易另有约0.025%/次佣金，可忽略不计</text>
  <text x="400" y="340" text-anchor="middle" font-size="11" fill="#666">费率看起来很小，但长期复利下差距巨大：年化10%时，30年后0.1%与1.5%费率相差约35%总收益</text>
</svg>
