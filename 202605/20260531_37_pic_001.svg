<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF 与指数基金三兄弟对比</text>
  
  <!-- 三列标题 -->
  <rect x="40" y="55" width="220" height="44" rx="8" fill="#3a86ff"/>
  <text x="150" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="white">场内ETF</text>
  <text x="150" y="90" text-anchor="middle" font-size="11" fill="#d0e8ff">证券账户 · 像买股票一样</text>

  <rect x="290" y="55" width="220" height="44" rx="8" fill="#ff6b6b"/>
  <text x="400" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="white">场外指数基金</text>
  <text x="400" y="90" text-anchor="middle" font-size="11" fill="#ffe0e0">基金账户 · 直接申购赎回</text>

  <rect x="540" y="55" width="220" height="44" rx="8" fill="#06d6a0"/>
  <text x="650" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="white">联接基金</text>
  <text x="650" y="90" text-anchor="middle" font-size="11" fill="#d0fff4">场外买 · 投资场内ETF</text>

  <!-- 行标签 -->
  <text x="20" y="145" font-size="11" fill="#555" font-weight="bold">买卖方式</text>
  <text x="20" y="195" font-size="11" fill="#555" font-weight="bold">交易时间</text>
  <text x="20" y="245" font-size="11" fill="#555" font-weight="bold">价格确定</text>
  <text x="20" y="295" font-size="11" fill="#555" font-weight="bold">最低门槛</text>
  <text x="20" y="345" font-size="11" fill="#555" font-weight="bold">手续费</text>
  <text x="20" y="395" font-size="11" fill="#555" font-weight="bold">适合人群</text>

  <!-- 分隔线 -->
  <line x1="40" y1="115" x2="760" y2="115" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="40" y1="165" x2="760" y2="165" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="40" y1="215" x2="760" y2="215" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="40" y1="265" x2="760" y2="265" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="40" y1="315" x2="760" y2="315" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="40" y1="365" x2="760" y2="365" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ETF列 -->
  <text x="150" y="143" text-anchor="middle" font-size="11" fill="#333">证券账户下单</text>
  <text x="150" y="193" text-anchor="middle" font-size="11" fill="#333">开盘实时交易</text>
  <text x="150" y="243" text-anchor="middle" font-size="11" fill="#333">实时市场价格</text>
  <text x="150" y="293" text-anchor="middle" font-size="11" fill="#333">100份（约几十元起）</text>
  <text x="150" y="343" text-anchor="middle" font-size="11" fill="#3a86ff" font-weight="bold">最低（万分之几）</text>
  <text x="150" y="386" text-anchor="middle" font-size="11" fill="#333">有证券账户</text>
  <text x="150" y="400" text-anchor="middle" font-size="11" fill="#333">想灵活买卖</text>

  <!-- 场外指数基金列 -->
  <text x="400" y="143" text-anchor="middle" font-size="11" fill="#333">基金App申购赎回</text>
  <text x="400" y="193" text-anchor="middle" font-size="11" fill="#333">按日下单，次日确认</text>
  <text x="400" y="243" text-anchor="middle" font-size="11" fill="#333">当日收盘净值</text>
  <text x="400" y="293" text-anchor="middle" font-size="11" fill="#333">1元起（部分10元）</text>
  <text x="400" y="343" text-anchor="middle" font-size="11" fill="#333">申购费0.1~1%</text>
  <text x="400" y="386" text-anchor="middle" font-size="11" fill="#333">没有证券账户</text>
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#333">定投、小额入场</text>

  <!-- 联接基金列 -->
  <text x="650" y="143" text-anchor="middle" font-size="11" fill="#333">基金App申购赎回</text>
  <text x="650" y="193" text-anchor="middle" font-size="11" fill="#333">按日下单，次日确认</text>
  <text x="650" y="243" text-anchor="middle" font-size="11" fill="#333">当日收盘净值</text>
  <text x="650" y="293" text-anchor="middle" font-size="11" fill="#333">1元起</text>
  <text x="650" y="335" text-anchor="middle" font-size="11" fill="#ff6b6b">额外收管理费</text>
  <text x="650" y="350" text-anchor="middle" font-size="11" fill="#ff6b6b">（ETF+联接双层）</text>
  <text x="650" y="386" text-anchor="middle" font-size="11" fill="#333">没证券账户但想</text>
  <text x="650" y="400" text-anchor="middle" font-size="11" fill="#333">买特定ETF策略</text>
</svg>
