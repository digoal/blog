<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="340" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">三种产品的资金流向示意图</text>

  <!-- 你的钱 -->
  <rect x="30" y="120" width="110" height="50" rx="8" fill="#ffd166"/>
  <text x="85" y="141" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">你的钱</text>
  <text x="85" y="158" text-anchor="middle" font-size="11" fill="#555">（投资者）</text>

  <!-- 场内ETF路径 -->
  <text x="220" y="75" text-anchor="middle" font-size="11" fill="#3a86ff" font-weight="bold">路径① 场内ETF</text>
  <line x1="140" y1="135" x2="270" y2="110" stroke="#3a86ff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="90" width="130" height="40" rx="6" fill="#3a86ff" opacity="0.15" stroke="#3a86ff" stroke-width="1.5"/>
  <text x="335" y="108" text-anchor="middle" font-size="11" fill="#3a86ff">证券交易所</text>
  <text x="335" y="123" text-anchor="middle" font-size="11" fill="#3a86ff">实时买卖</text>
  <line x1="400" y1="110" x2="520" y2="110" stroke="#3a86ff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="520" y="90" width="110" height="40" rx="6" fill="#3a86ff" opacity="0.15" stroke="#3a86ff" stroke-width="1.5"/>
  <text x="575" y="108" text-anchor="middle" font-size="11" fill="#3a86ff">ETF份额</text>
  <text x="575" y="123" text-anchor="middle" font-size="11" fill="#3a86ff">→持有一篮子股票</text>

  <!-- 场外指数基金路径 -->
  <text x="230" y="175" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="bold">路径② 场外指数基金</text>
  <line x1="140" y1="150" x2="270" y2="170" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="270" y="160" width="130" height="40" rx="6" fill="#ff6b6b" opacity="0.12" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="335" y="178" text-anchor="middle" font-size="11" fill="#cc3333">基金公司</text>
  <text x="335" y="193" text-anchor="middle" font-size="11" fill="#cc3333">次日按净值申购</text>
  <line x1="400" y1="180" x2="520" y2="180" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="520" y="163" width="110" height="36" rx="6" fill="#ff6b6b" opacity="0.12" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="575" y="178" text-anchor="middle" font-size="11" fill="#cc3333">基金份额</text>
  <text x="575" y="193" text-anchor="middle" font-size="11" fill="#cc3333">→按净值计算</text>

  <!-- 联接基金路径 -->
  <text x="230" y="255" text-anchor="middle" font-size="11" fill="#06d6a0" font-weight="bold">路径③ 联接基金</text>
  <line x1="140" y1="162" x2="270" y2="240" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="270" y="228" width="130" height="50" rx="6" fill="#06d6a0" opacity="0.12" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="335" y="248" text-anchor="middle" font-size="11" fill="#048a66">联接基金公司</text>
  <text x="335" y="263" text-anchor="middle" font-size="11" fill="#048a66">收你的钱再买ETF</text>
  <line x1="400" y1="253" x2="520" y2="253" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="520" y="238" width="110" height="38" rx="6" fill="#06d6a0" opacity="0.12" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="575" y="255" text-anchor="middle" font-size="11" fill="#048a66">场内ETF份额</text>
  <text x="575" y="270" text-anchor="middle" font-size="11" fill="#ff6b6b">★多一层费用</text>

  <!-- 标注 -->
  <rect x="30" y="295" width="740" height="30" rx="6" fill="#fff3cd"/>
  <text x="400" y="314" text-anchor="middle" font-size="11" fill="#856404">💡 联接基金 = 你花钱雇了个"中间人"帮你去场内买ETF，中间人要收管理费，所以费用比直接买ETF高</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a86ff"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#06d6a0"/>
    </marker>
  </defs>
</svg>
