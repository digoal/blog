<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">我该选哪种？——两分钟决策树</text>

  <!-- 根节点 -->
  <rect x="300" y="48" width="200" height="44" rx="10" fill="#1a1a2e"/>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="white" font-weight="bold">我有证券账户吗？</text>
  <text x="400" y="84" text-anchor="middle" font-size="11" fill="#aaa">（买股票那种）</text>

  <!-- 有 → 左 -->
  <line x1="340" y1="92" x2="180" y2="155" stroke="#555" stroke-width="2"/>
  <text x="235" y="130" font-size="12" fill="#3a86ff" font-weight="bold">有 ✓</text>
  <rect x="80" y="155" width="200" height="44" rx="10" fill="#e8f4fd" stroke="#3a86ff" stroke-width="2"/>
  <text x="180" y="173" text-anchor="middle" font-size="12" fill="#1a1a2e">想随时买卖 / 看盘？</text>
  <text x="180" y="188" text-anchor="middle" font-size="11" fill="#666">（还是只需定投？）</text>

  <!-- 无 → 右 -->
  <line x1="460" y1="92" x2="620" y2="155" stroke="#555" stroke-width="2"/>
  <text x="565" y="130" font-size="12" fill="#ff6b6b" font-weight="bold">没有 ✗</text>
  <rect x="520" y="155" width="200" height="44" rx="10" fill="#fff0f0" stroke="#ff6b6b" stroke-width="2"/>
  <text x="620" y="173" text-anchor="middle" font-size="12" fill="#1a1a2e">想投的ETF有联接基金</text>
  <text x="620" y="188" text-anchor="middle" font-size="11" fill="#666">且不在意费用差距？</text>

  <!-- 左分支 有/无 -->
  <line x1="130" y1="199" x2="80" y2="262" stroke="#555" stroke-width="2"/>
  <text x="74" y="238" font-size="11" fill="#3a86ff">想随时交易</text>
  <rect x="20" y="262" width="130" height="52" rx="10" fill="#3a86ff"/>
  <text x="85" y="283" text-anchor="middle" font-size="13" fill="white" font-weight="bold">场内ETF</text>
  <text x="85" y="299" text-anchor="middle" font-size="10" fill="#d0e8ff">灵活 · 费用最低</text>
  <text x="85" y="313" text-anchor="middle" font-size="10" fill="#d0e8ff">需看盘下单</text>

  <line x1="230" y1="199" x2="260" y2="262" stroke="#555" stroke-width="2"/>
  <text x="222" y="238" font-size="11" fill="#555">只想定投</text>
  <rect x="185" y="262" width="150" height="52" rx="10" fill="#ff6b6b"/>
  <text x="260" y="283" text-anchor="middle" font-size="13" fill="white" font-weight="bold">场外指数基金</text>
  <text x="260" y="299" text-anchor="middle" font-size="10" fill="#ffe0e0">定投方便 · 费用低</text>
  <text x="260" y="313" text-anchor="middle" font-size="10" fill="#ffe0e0">次日按净值成交</text>

  <!-- 右分支 有/无 -->
  <line x1="570" y1="199" x2="510" y2="262" stroke="#555" stroke-width="2"/>
  <text x="492" y="238" font-size="11" fill="#555">在意费用</text>
  <rect x="430" y="262" width="160" height="52" rx="10" fill="#555"/>
  <text x="510" y="283" text-anchor="middle" font-size="12" fill="white" font-weight="bold">开个证券账户</text>
  <text x="510" y="299" text-anchor="middle" font-size="10" fill="#ddd">再买场内ETF</text>
  <text x="510" y="313" text-anchor="middle" font-size="10" fill="#ddd">开户约15分钟</text>

  <line x1="670" y1="199" x2="690" y2="262" stroke="#555" stroke-width="2"/>
  <text x="675" y="238" font-size="11" fill="#06d6a0">不在意</text>
  <rect x="620" y="262" width="150" height="52" rx="10" fill="#06d6a0"/>
  <text x="695" y="283" text-anchor="middle" font-size="13" fill="white" font-weight="bold">联接基金</text>
  <text x="695" y="299" text-anchor="middle" font-size="10" fill="#d0fff4">最方便 · 费用略高</text>
  <text x="695" y="313" text-anchor="middle" font-size="10" fill="#d0fff4">适合特定策略需求</text>

  <!-- 底部说明 -->
  <rect x="30" y="328" width="740" height="38" rx="6" fill="#fff3cd"/>
  <text x="400" y="345" text-anchor="middle" font-size="11" fill="#856404">📌 大多数情况下建议：先开证券账户，优先用场内ETF，费用最低、操作最灵活。</text>
  <text x="400" y="361" text-anchor="middle" font-size="11" fill="#856404">如果只想设置定投自动扣款，场外指数基金也是很好的选择。</text>
</svg>
