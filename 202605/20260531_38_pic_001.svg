<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">宽基ETF全景图：你买的是什么？</text>
  
  <!-- 沪深300 -->
  <rect x="40" y="60" width="160" height="120" fill="#2563eb" rx="10"/>
  <text x="120" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">沪深300</text>
  <text x="120" y="108" text-anchor="middle" font-size="11" fill="#bfdbfe">300只大盘股</text>
  <text x="120" y="126" text-anchor="middle" font-size="11" fill="#bfdbfe">A股市值覆盖</text>
  <text x="120" y="144" text-anchor="middle" font-size="11" fill="#bfdbfe">约60%</text>
  <text x="120" y="166" text-anchor="middle" font-size="12" fill="#fbbf24">代表：510300</text>

  <!-- 中证500 -->
  <rect x="220" y="60" width="160" height="120" fill="#7c3aed" rx="10"/>
  <text x="300" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">中证500</text>
  <text x="300" y="108" text-anchor="middle" font-size="11" fill="#ddd6fe">500只中盘股</text>
  <text x="300" y="126" text-anchor="middle" font-size="11" fill="#ddd6fe">中小盘成长</text>
  <text x="300" y="144" text-anchor="middle" font-size="11" fill="#ddd6fe">弹性更大</text>
  <text x="300" y="166" text-anchor="middle" font-size="12" fill="#fbbf24">代表：510500</text>

  <!-- 创业板 -->
  <rect x="400" y="60" width="160" height="120" fill="#059669" rx="10"/>
  <text x="480" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">创业板100</text>
  <text x="480" y="108" text-anchor="middle" font-size="11" fill="#a7f3d0">科技成长主题</text>
  <text x="480" y="126" text-anchor="middle" font-size="11" fill="#a7f3d0">高弹性高波动</text>
  <text x="480" y="144" text-anchor="middle" font-size="11" fill="#a7f3d0">牛市弹性强</text>
  <text x="480" y="166" text-anchor="middle" font-size="12" fill="#fbbf24">代表：159915</text>

  <!-- 科创50 -->
  <rect x="580" y="60" width="160" height="120" fill="#dc2626" rx="10"/>
  <text x="660" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">科创50</text>
  <text x="660" y="108" text-anchor="middle" font-size="11" fill="#fecaca">硬科技龙头</text>
  <text x="660" y="126" text-anchor="middle" font-size="11" fill="#fecaca">半导体/生物等</text>
  <text x="660" y="144" text-anchor="middle" font-size="11" fill="#fecaca">高波动高风险</text>
  <text x="660" y="166" text-anchor="middle" font-size="12" fill="#fbbf24">代表：588000</text>

  <!-- 风险收益横轴 -->
  <text x="30" y="230" font-size="13" font-weight="bold" fill="#374151">风险/弹性排序（低 → 高）：</text>
  <line x1="30" y1="260" x2="770" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <circle cx="120" cy="260" r="28" fill="#2563eb" opacity="0.85"/>
  <text x="120" y="256" text-anchor="middle" font-size="11" fill="white" font-weight="bold">沪深</text>
  <text x="120" y="270" text-anchor="middle" font-size="11" fill="white" font-weight="bold">300</text>
  
  <circle cx="300" cy="260" r="30" fill="#7c3aed" opacity="0.85"/>
  <text x="300" y="256" text-anchor="middle" font-size="11" fill="white" font-weight="bold">中证</text>
  <text x="300" y="270" text-anchor="middle" font-size="11" fill="white" font-weight="bold">500</text>
  
  <circle cx="500" cy="260" r="33" fill="#059669" opacity="0.85"/>
  <text x="500" y="256" text-anchor="middle" font-size="11" fill="white" font-weight="bold">创业板</text>
  <text x="500" y="270" text-anchor="middle" font-size="11" fill="white" font-weight="bold">100</text>

  <circle cx="700" cy="260" r="36" fill="#dc2626" opacity="0.85"/>
  <text x="700" y="256" text-anchor="middle" font-size="11" fill="white" font-weight="bold">科创</text>
  <text x="700" y="270" text-anchor="middle" font-size="11" fill="white" font-weight="bold">50</text>

  <!-- 底部说明 -->
  <rect x="30" y="310" width="740" height="90" fill="#e0f2fe" rx="8"/>
  <text x="50" y="333" font-size="12" fill="#0369a1" font-weight="bold">🔑 选择原则：</text>
  <text x="50" y="354" font-size="12" fill="#0c4a6e">• 稳健型投资者首选沪深300：覆盖最广、流动性最好、波动相对可控</text>
  <text x="50" y="372" font-size="12" fill="#0c4a6e">• 进取型可加配中证500/创业板100，但需要控制仓位比例</text>
  <text x="50" y="390" font-size="12" fill="#0c4a6e">• 科创50不是入门品种：高波动+低流动性+高估值，仓位建议不超过整体5%</text>
</svg>
