<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">A股市值层级示意：宽基ETF覆盖的是哪段水域</text>
  
  <!-- 金字塔 -->
  <!-- 顶层：超大盘 -->
  <polygon points="400,55 320,105 480,105" fill="#1e40af" opacity="0.9"/>
  <text x="400" y="87" text-anchor="middle" font-size="11" fill="white" font-weight="bold">超大盘龙头</text>
  
  <!-- 第二层：大盘 沪深300 -->
  <polygon points="320,105 260,165 540,165 480,105" fill="#2563eb" opacity="0.88"/>
  <text x="400" y="142" text-anchor="middle" font-size="12" fill="white" font-weight="bold">大盘股（沪深300覆盖核心）</text>
  <text x="590" y="142" text-anchor="start" font-size="11" fill="#1d4ed8">← 稳定 流动性强</text>

  <!-- 第三层：中盘 中证500 -->
  <polygon points="260,165 190,230 610,230 540,165" fill="#7c3aed" opacity="0.85"/>
  <text x="400" y="205" text-anchor="middle" font-size="12" fill="white" font-weight="bold">中盘股（中证500覆盖）</text>
  <text x="620" y="205" text-anchor="start" font-size="11" fill="#6d28d9">← 弹性大 波动大</text>

  <!-- 第四层：小盘 中证1000 -->
  <polygon points="190,230 110,300 690,300 610,230" fill="#9ca3af" opacity="0.75"/>
  <text x="400" y="270" text-anchor="middle" font-size="12" fill="white" font-weight="bold">小盘股（中证1000等）</text>
  <text x="700" y="270" text-anchor="start" font-size="11" fill="#4b5563">← 风险大</text>

  <!-- 创业板/科创板特殊标注 -->
  <rect x="30" y="310" width="740" height="40" fill="#fef3c7" rx="6"/>
  <text x="400" y="335" text-anchor="middle" font-size="12" fill="#92400e">⚡ 创业板/科创板是按板块划分，会跨越大中小盘——特点是成长主题集中度高，波动显著高于同规模主板股票</text>
</svg>
