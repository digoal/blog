<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">宽基ETF选择决策树</text>

  <!-- 根节点 -->
  <rect x="300" y="48" width="200" height="44" rx="10" fill="#1e40af"/>
  <text x="400" y="66" text-anchor="middle" font-size="13" fill="white" font-weight="bold">我的投资目标是什么？</text>
  <text x="400" y="83" text-anchor="middle" font-size="11" fill="#93c5fd">（先回答这个问题）</text>

  <!-- 分支线 -->
  <line x1="350" y1="92" x2="200" y2="148" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="92" x2="400" y2="148" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="450" y1="92" x2="600" y2="148" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- 三个分支 -->
  <rect x="100" y="148" width="180" height="44" rx="8" fill="#1d4ed8"/>
  <text x="190" y="166" text-anchor="middle" font-size="12" fill="white">稳健增值</text>
  <text x="190" y="183" text-anchor="middle" font-size="11" fill="#bfdbfe">长期持有 + 低波动</text>

  <rect x="310" y="148" width="180" height="44" rx="8" fill="#7c3aed"/>
  <text x="400" y="166" text-anchor="middle" font-size="12" fill="white">进取成长</text>
  <text x="400" y="183" text-anchor="middle" font-size="11" fill="#ddd6fe">愿意承受回撤换弹性</text>

  <rect x="520" y="148" width="180" height="44" rx="8" fill="#be185d"/>
  <text x="610" y="166" text-anchor="middle" font-size="12" fill="white">主题押注</text>
  <text x="610" y="183" text-anchor="middle" font-size="11" fill="#fbcfe8">科技/新能源等方向</text>

  <!-- 结论线 -->
  <line x1="190" y1="192" x2="190" y2="248" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="192" x2="400" y2="248" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="610" y1="192" x2="610" y2="248" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- 推荐结论 -->
  <rect x="90" y="248" width="200" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="270" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="bold">沪深300 ETF</text>
  <text x="190" y="287" text-anchor="middle" font-size="11" fill="#1d4ed8">核心仓，40~60%以上</text>
  <text x="190" y="302" text-anchor="middle" font-size="11" fill="#1d4ed8">可配合定投</text>

  <rect x="300" y="248" width="200" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="400" y="270" text-anchor="middle" font-size="13" fill="#6d28d9" font-weight="bold">300 + 500 组合</text>
  <text x="400" y="287" text-anchor="middle" font-size="11" fill="#7c3aed">6:4或7:3比例参考</text>
  <text x="400" y="302" text-anchor="middle" font-size="11" fill="#7c3aed">需要高估值意识</text>

  <rect x="510" y="248" width="200" height="60" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="610" y="270" text-anchor="middle" font-size="13" fill="#9d174d" font-weight="bold">创业板/科创 ETF</text>
  <text x="610" y="287" text-anchor="middle" font-size="11" fill="#be185d">卫星仓，不超过20%</text>
  <text x="610" y="302" text-anchor="middle" font-size="11" fill="#be185d">明确失效条件再买</text>

  <!-- 底部提示 -->
  <rect x="60" y="330" width="680" height="50" fill="#fef9c3" rx="8"/>
  <text x="400" y="351" text-anchor="middle" font-size="12" fill="#713f12" font-weight="bold">⚠️ 所有宽基ETF都会随市场整体下跌，选哪只都无法避开系统性风险</text>
  <text x="400" y="370" text-anchor="middle" font-size="12" fill="#92400e">差别在于：回撤深度不同、反弹弹性不同、流动性不同</text>
</svg>
