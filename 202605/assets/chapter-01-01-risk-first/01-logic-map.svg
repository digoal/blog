<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">为什么先识别风险再谈赚钱</title>
  <desc id="desc">从小白的信息劣势、资金有限和市场不确定性推导出先保命再赚钱的投资顺序。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f7faf8"/>
  <text x="480" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#1f2d2b">第一课: 不是先问能赚多少, 而是先问会亏在哪里</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#1f2d2b">
    <rect x="40" y="92" width="180" height="104" rx="8" fill="#dfeeea" stroke="#2f5d62" stroke-width="2"/>
    <text x="130" y="126" text-anchor="middle" font-weight="700">前提 1</text>
    <text x="130" y="156" text-anchor="middle">小白信息少</text>
    <text x="130" y="182" text-anchor="middle">经验少</text>

    <rect x="280" y="92" width="180" height="104" rx="8" fill="#fff3d8" stroke="#a97720" stroke-width="2"/>
    <text x="370" y="126" text-anchor="middle" font-weight="700">前提 2</text>
    <text x="370" y="156" text-anchor="middle">本金有限</text>
    <text x="370" y="182" text-anchor="middle">犯错空间小</text>

    <rect x="520" y="92" width="180" height="104" rx="8" fill="#e8eef7" stroke="#486a9a" stroke-width="2"/>
    <text x="610" y="126" text-anchor="middle" font-weight="700">前提 3</text>
    <text x="610" y="156" text-anchor="middle">市场结果</text>
    <text x="610" y="182" text-anchor="middle">高度不确定</text>

    <rect x="760" y="92" width="160" height="104" rx="8" fill="#fde7e0" stroke="#b55a3c" stroke-width="2"/>
    <text x="840" y="126" text-anchor="middle" font-weight="700">机制</text>
    <text x="840" y="156" text-anchor="middle">一次重伤</text>
    <text x="840" y="182" text-anchor="middle">会破坏复利</text>
  </g>
  <g stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)">
    <line x1="220" y1="144" x2="275" y2="144"/>
    <line x1="460" y1="144" x2="515" y2="144"/>
    <line x1="700" y1="144" x2="755" y2="144"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="19" fill="#1f2d2b">
    <rect x="150" y="260" width="660" height="92" rx="10" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <text x="480" y="294" text-anchor="middle" font-weight="700">结论</text>
    <text x="480" y="326" text-anchor="middle">小白的第一能力不是预测收益, 而是识别风险暴露、控制仓位、保留再学习机会</text>
  </g>
  <path d="M 840 196 C 840 238, 780 252, 726 272" fill="none" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#53615f">先保命, 再赚钱: 活得久, 才有资格让方法慢慢变好</text>
</svg>
