<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">前提变化后的行动决策树</title>
  <desc id="desc">当看不懂产品、亏损超过承受能力、需要短期用钱或使用杠杆时, 小白应该降低风险或暂停。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315c72"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#fbfbf7"/>
  <text x="480" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#20323a">买之前先走一遍: 风险能不能承受?</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#20323a" stroke-width="2">
    <rect x="370" y="78" width="220" height="70" rx="8" fill="#e8f1f2" stroke="#315c72"/>
    <text x="480" y="108" text-anchor="middle" font-weight="700">准备买一个产品</text>
    <text x="480" y="132" text-anchor="middle">先别问收益, 先问风险</text>

    <rect x="80" y="210" width="190" height="78" rx="8" fill="#fff4d9" stroke="#b07a22"/>
    <text x="175" y="242" text-anchor="middle" font-weight="700">看懂了吗?</text>
    <text x="175" y="266" text-anchor="middle">亏钱原因说不清</text>

    <rect x="300" y="210" width="190" height="78" rx="8" fill="#fff4d9" stroke="#b07a22"/>
    <text x="395" y="242" text-anchor="middle" font-weight="700">亏得起吗?</text>
    <text x="395" y="266" text-anchor="middle">最大回撤能承受</text>

    <rect x="520" y="210" width="190" height="78" rx="8" fill="#fff4d9" stroke="#b07a22"/>
    <text x="615" y="242" text-anchor="middle" font-weight="700">钱等得起吗?</text>
    <text x="615" y="266" text-anchor="middle">短期不用这笔钱</text>

    <rect x="740" y="210" width="160" height="78" rx="8" fill="#fff4d9" stroke="#b07a22"/>
    <text x="820" y="242" text-anchor="middle" font-weight="700">有杠杆吗?</text>
    <text x="820" y="266" text-anchor="middle">会不会爆仓</text>

    <rect x="80" y="374" width="190" height="74" rx="8" fill="#fde9e2" stroke="#b65b3d"/>
    <text x="175" y="405" text-anchor="middle" font-weight="700">不懂: 不买</text>
    <text x="175" y="429" text-anchor="middle">先学规则和风险</text>

    <rect x="300" y="374" width="190" height="74" rx="8" fill="#e3f0e6" stroke="#3d7a4f"/>
    <text x="395" y="405" text-anchor="middle" font-weight="700">懂且亏得起</text>
    <text x="395" y="429" text-anchor="middle">小仓位试错</text>

    <rect x="520" y="374" width="190" height="74" rx="8" fill="#fde9e2" stroke="#b65b3d"/>
    <text x="615" y="405" text-anchor="middle" font-weight="700">短期要用钱</text>
    <text x="615" y="429" text-anchor="middle">优先现金工具</text>

    <rect x="740" y="374" width="160" height="74" rx="8" fill="#fde9e2" stroke="#b65b3d"/>
    <text x="820" y="405" text-anchor="middle" font-weight="700">带杠杆</text>
    <text x="820" y="429" text-anchor="middle">小白默认回避</text>
  </g>
  <g stroke="#315c72" stroke-width="3" marker-end="url(#arrow)">
    <line x1="480" y1="148" x2="175" y2="206"/>
    <line x1="480" y1="148" x2="395" y2="206"/>
    <line x1="480" y1="148" x2="615" y2="206"/>
    <line x1="480" y1="148" x2="820" y2="206"/>
    <line x1="175" y1="288" x2="175" y2="370"/>
    <line x1="395" y1="288" x2="395" y2="370"/>
    <line x1="615" y1="288" x2="615" y2="370"/>
    <line x1="820" y1="288" x2="820" y2="370"/>
  </g>
  <text x="480" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5a6669">任何一个关键答案变成“否”, 结论就从“寻找收益”改为“降低风险或暂停”。</text>
</svg>
