<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">小白风险边界清单</title>
  <desc id="desc">把投资前需要检查的风险边界分成可用、减仓、回避和复盘四个区域。</desc>
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="42" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#22313f">风险边界: 什么时候可试、什么时候该退</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#22313f">
    <rect x="56" y="90" width="200" height="270" rx="8" fill="#e5f2e7" stroke="#3b7a57" stroke-width="2"/>
    <text x="156" y="126" text-anchor="middle" font-size="21" font-weight="700">可小仓位试</text>
    <text x="80" y="170">1. 产品规则能复述</text>
    <text x="80" y="208">2. 最坏亏损能接受</text>
    <text x="80" y="246">3. 不影响生活现金</text>
    <text x="80" y="284">4. 有退出条件</text>
    <text x="80" y="322">5. 先记录后交易</text>

    <rect x="280" y="90" width="200" height="270" rx="8" fill="#fff5db" stroke="#b58225" stroke-width="2"/>
    <text x="380" y="126" text-anchor="middle" font-size="21" font-weight="700">必须降风险</text>
    <text x="304" y="170">1. 波动让你失眠</text>
    <text x="304" y="208">2. 仓位超过计划</text>
    <text x="304" y="246">3. 只因上涨才买</text>
    <text x="304" y="284">4. 亏损理由变了</text>
    <text x="304" y="322">5. 需要短期用钱</text>

    <rect x="504" y="90" width="200" height="270" rx="8" fill="#fde8e1" stroke="#b65b3d" stroke-width="2"/>
    <text x="604" y="126" text-anchor="middle" font-size="21" font-weight="700">小白默认回避</text>
    <text x="528" y="170">1. 借钱投资</text>
    <text x="528" y="208">2. 满仓单一品种</text>
    <text x="528" y="246">3. 不懂的杠杆</text>
    <text x="528" y="284">4. 听消息重仓</text>
    <text x="528" y="322">5. 不能接受亏损</text>

    <rect x="728" y="90" width="176" height="270" rx="8" fill="#e9eef7" stroke="#536f9a" stroke-width="2"/>
    <text x="816" y="126" text-anchor="middle" font-size="21" font-weight="700">复盘问题</text>
    <text x="752" y="170">1. 买的是什么风险</text>
    <text x="752" y="208">2. 前提是否还在</text>
    <text x="752" y="246">3. 亏损来自哪里</text>
    <text x="752" y="284">4. 下次如何变小</text>
    <text x="752" y="322">5. 是否继续学习</text>
  </g>
  <text x="480" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#53616d">风险识别不是让你永远不投, 而是让每一次试错都小到不会毁掉下一次机会。</text>
</svg>
