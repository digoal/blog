<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <title>金融产品六大底层风险逻辑图</title>
  <desc>展示权益、利率、信用、商品、汇率、杠杆六大底层风险，以及它们的典型影响资产和传导机制</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="520" fill="#f8fafc" rx="8"/>

  <!-- 标题 -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b" font-family="sans-serif">金融产品的六大底层风险</text>

  <!-- 中心圆 -->
  <circle cx="130" cy="260" r="55" fill="#1e40af" opacity="0.1" stroke="#1e40af" stroke-width="2"/>
  <text x="130" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af" font-family="sans-serif">底层风险</text>
  <text x="130" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af" font-family="sans-serif">无处不在</text>

  <!-- 六条风险分支 -->
  <!-- 1. 权益风险 - 向右上 -->
  <line x1="185" y1="230" x2="270" y2="110" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="270" y="75" width="170" height="75" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
  <text x="355" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af" font-family="sans-serif">① 权益风险</text>
  <text x="355" y="116" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">股票、基金、ETF</text>
  <text x="355" y="133" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">↕ 企业盈利 + 估值</text>

  <!-- 2. 利率风险 - 向右 -->
  <line x1="185" y1="260" x2="270" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="270" y="220" width="170" height="75" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
  <text x="355" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46" font-family="sans-serif">② 利率风险</text>
  <text x="355" y="261" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">债券、银行理财</text>
  <text x="355" y="278" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">↕ 利率反向变动</text>

  <!-- 3. 信用风险 - 向右下 -->
  <line x1="185" y1="290" x2="270" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="270" y="375" width="170" height="75" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <text x="355" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="sans-serif">③ 信用风险</text>
  <text x="355" y="416" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">企业债、REITs</text>
  <text x="355" y="433" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">↕ 违约/降级</text>

  <!-- 4. 商品风险 - 向左 -->
  <line x1="75" y1="260" x2="520" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="520" y="220" width="170" height="75" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="605" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b" font-family="sans-serif">④ 商品风险</text>
  <text x="605" y="261" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">黄金、石油、农产品</text>
  <text x="605" y="278" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">↕ 供需+美元</text>

  <!-- 5. 汇率风险 - 向左上 -->
  <line x1="100" y1="220" x2="520" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="520" y="55" width="170" height="75" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
  <text x="605" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6" font-family="sans-serif">⑤ 汇率风险</text>
  <text x="605" y="96" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">QDII、港股、美股</text>
  <text x="605" y="113" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">↕ 本币 vs 外币</text>

  <!-- 6. 杠杆风险 - 向左下 -->
  <line x1="100" y1="300" x2="520" y2="430" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="520" y="395" width="170" height="75" rx="6" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
  <text x="605" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#9d174d" font-family="sans-serif">⑥ 杠杆风险</text>
  <text x="605" y="436" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">期权、期货、融资</text>
  <text x="605" y="453" text-anchor="middle" font-size="11" fill="#334155" font-family="sans-serif">↕ 收益非线性</text>

  <!-- 底部结论 -->
  <rect x="200" y="490" width="500" height="25" rx="4" fill="#1e40af" opacity="0.08"/>
  <text x="450" y="507" text-anchor="middle" font-size="12" fill="#1e40af" font-family="sans-serif">所有产品都是这六大风险的排列组合——识别它是第一步</text>
</svg>