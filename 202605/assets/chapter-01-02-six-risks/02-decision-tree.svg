<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <title>六类风险的决策树</title>
  <desc>根据市场环境和宏观变量，判断哪种风险是当前主要矛盾，以及对应的小白仓位参考</desc>

  <rect width="900" height="520" fill="#f8fafc" rx="8"/>

  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b" font-family="sans-serif">六类风险的决策树：哪种风险当前主导？</text>

  <!-- 根节点 -->
  <rect x="350" y="50" width="200" height="38" rx="6" fill="#1e40af" opacity="0.1" stroke="#1e40af" stroke-width="2"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af" font-family="sans-serif">当前市场环境判断</text>

  <!-- 左分支：经济下行 -->
  <line x1="380" y1="88" x2="180" y2="160" stroke="#64748b" stroke-width="2"/>
  <text x="210" y="120" font-size="10" fill="#475569" font-family="sans-serif">经济下行</text>
  <text x="210" y="134" font-size="10" fill="#475569" font-family="sans-serif">企业盈利下滑</text>

  <!-- 右分支：经济上行 -->
  <line x1="520" y1="88" x2="720" y2="160" stroke="#64748b" stroke-width="2"/>
  <text x="750" y="120" font-size="10" fill="#475569" font-family="sans-serif">经济上行/通胀</text>
  <text x="750" y="134" font-size="10" fill="#475569" font-family="sans-serif">企业盈利上升</text>

  <!-- 利率分支 -->
  <line x1="450" y1="88" x2="450" y2="160" stroke="#64748b" stroke-width="2"/>
  <text x="468" y="120" font-size="10" fill="#475569" font-family="sans-serif">利率变化</text>
  <text x="468" y="134" font-size="10" fill="#475569" font-family="sans-serif">央行政策</text>

  <!-- 第二层节点 -->
  <!-- 利率下行 -->
  <rect x="380" y="160" width="140" height="35" rx="5" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="183" text-anchor="middle" font-size="11" fill="#065f46" font-family="sans-serif">利率风险↑ 债券牛</text>

  <!-- 信用风险 -->
  <rect x="130" y="160" width="140" height="35" rx="5" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="183" text-anchor="middle" font-size="11" fill="#92400e" font-family="sans-serif">信用风险↑ 债务压力</text>

  <!-- 权益风险（下行） -->
  <rect x="20" y="160" width="105" height="35" rx="5" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="72" y="183" text-anchor="middle" font-size="11" fill="#1e40af" font-family="sans-serif">权益风险↑</text>

  <!-- 利率上行 -->
  <rect x="530" y="160" width="140" height="35" rx="5" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="183" text-anchor="middle" font-size="11" fill="#065f46" font-family="sans-serif">利率风险↑ 债券熊</text>

  <!-- 商品/通胀 -->
  <rect x="680" y="160" width="140" height="35" rx="5" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="750" y="183" text-anchor="middle" font-size="11" fill="#991b1b" font-family="sans-serif">商品风险↑ 通胀</text>

  <!-- 汇率分支 -->
  <line x1="450" y1="195" x2="450" y2="250" stroke="#64748b" stroke-width="2"/>
  <text x="468" y="228" font-size="10" fill="#475569" font-family="sans-serif">汇率政策</text>

  <!-- 汇率节点 -->
  <rect x="380" y="250" width="140" height="35" rx="5" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="273" text-anchor="middle" font-size="11" fill="#5b21b6" font-family="sans-serif">汇率风险↑ 汇率波动</text>

  <!-- 杠杆节点 -->
  <rect x="20" y="250" width="140" height="35" rx="5" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1.5"/>
  <text x="90" y="273" text-anchor="middle" font-size="11" fill="#9d174d" font-family="sans-serif">杠杆风险↑ 工具复杂</text>

  <!-- 第三层：小白仓位建议 -->
  <line x1="72" y1="285" x2="72" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="200" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="450" y1="195" x2="450" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="600" y1="195" x2="600" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="750" y1="195" x2="750" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="90" y1="285" x2="90" y2="340" stroke="#64748b" stroke-width="1.5"/>

  <!-- 仓位建议框 -->
  <rect x="20" y="340" width="860" height="165" rx="8" fill="#1e40af" opacity="0.05" stroke="#1e40af" stroke-width="1.5"/>

  <text x="450" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b" font-family="sans-serif">小白仓位参考（在你能承受亏损的前提下）</text>

  <!-- 左列：风险 + 建议 -->
  <rect x="35" y="375" width="115" height="115" rx="5" fill="#3b82f6" opacity="0.1"/>
  <text x="92" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af" font-family="sans-serif">① 权益风险</text>
  <text x="92" y="413" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">降仓：减股票</text>
  <text x="92" y="429" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">换：宽基ETF</text>
  <text x="92" y="445" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">防：货币+黄金</text>
  <text x="92" y="461" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">参考最大回撤-30%</text>

  <rect x="160" y="375" width="115" height="115" rx="5" fill="#10b981" opacity="0.1"/>
  <text x="217" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46" font-family="sans-serif">② 利率风险</text>
  <text x="217" y="413" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">利率下行→债券</text>
  <text x="217" y="429" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">利率上行→短债</text>
  <text x="217" y="445" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">关注久期长短</text>
  <text x="217" y="461" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">利率+1%→债-5%</text>

  <rect x="285" y="375" width="115" height="115" rx="5" fill="#f59e0b" opacity="0.1"/>
  <text x="342" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="sans-serif">③ 信用风险</text>
  <text x="342" y="413" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">看评级：AAA/AA</text>
  <text x="342" y="429" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">避开低评级债</text>
  <text x="342" y="445" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">避免重仓企债</text>
  <text x="342" y="461" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">警惕民企/弱资质</text>

  <rect x="410" y="375" width="115" height="115" rx="5" fill="#ef4444" opacity="0.1"/>
  <text x="467" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="sans-serif">④ 商品风险</text>
  <text x="467" y="413" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">通胀↑→黄金/商品</text>
  <text x="467" y="429" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">经济差→黄金</text>
  <text x="467" y="445" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">用ETF非期货</text>
  <text x="467" y="461" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">仓位≤10%为宜</text>

  <rect x="535" y="375" width="115" height="115" rx="5" fill="#8b5cf6" opacity="0.1"/>
  <text x="592" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" font-family="sans-serif">⑤ 汇率风险</text>
  <text x="592" y="413" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">RMB贬值→美元资产</text>
  <text x="592" y="429" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">QDII/港股/美股</text>
  <text x="592" y="445" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">汇率对冲成本</text>
  <text x="592" y="461" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">汇率+5%→收益±5%</text>

  <rect x="660" y="375" width="115" height="115" rx="5" fill="#ec4899" opacity="0.1"/>
  <text x="717" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d" font-family="sans-serif">⑥ 杠杆风险</text>
  <text x="717" y="413" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">小白慎用杠杆</text>
  <text x="717" y="429" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">期权/期货/T+D</text>
  <text x="717" y="445" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">最多用10%仓位</text>
  <text x="717" y="461" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">熟悉规则前不碰</text>

  <!-- 警示 -->
  <text x="450" y="512" text-anchor="middle" font-size="11" fill="#ef4444" font-family="sans-serif">⚠ 以上为风险识别框架，仓位比例需根据个人风险承受能力调整，不是投资建议</text>
</svg>