<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <title>六类风险边界与红线检查表</title>
  <desc>六类风险的边界条件、可承受范围和必须回避的红线</desc>

  <rect width="900" height="480" fill="#f8fafc" rx="8"/>

  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b" font-family="sans-serif">六类风险的边界与红线</text>

  <!-- 表头 -->
  <rect x="20" y="48" width="130" height="28" rx="4" fill="#1e40af" opacity="0.1" stroke="#1e40af" stroke-width="1.5"/>
  <text x="85" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af" font-family="sans-serif">风险类型</text>

  <rect x="155" y="48" width="155" height="28" rx="4" fill="#1e40af" opacity="0.1" stroke="#1e40af" stroke-width="1.5"/>
  <text x="232" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af" font-family="sans-serif">正常范围（参考）</text>

  <rect x="315" y="48" width="185" height="28" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="407" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="sans-serif">需要注意（警惕信号）</text>

  <rect x="505" y="48" width="185" height="28" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="597" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="sans-serif">必须回避（红线）</text>

  <rect x="695" y="48" width="185" height="28" rx="4" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
  <text x="787" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46" font-family="sans-serif">小白参考操作</text>

  <!-- 行1：权益风险 -->
  <rect x="20" y="82" width="130" height="58" rx="4" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="85" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af" font-family="sans-serif">权益风险</text>
  <text x="85" y="115" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">股票/基金</text>
  <text x="85" y="130" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">↕ 估值+盈利</text>

  <rect x="155" y="82" width="155" height="58" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="232" y="100" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">PE历史分位数30%~70%</text>
  <text x="232" y="115" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">指数最大回撤&lt;20%</text>
  <text x="232" y="130" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">单只股票仓位≤10%</text>

  <rect x="315" y="82" width="185" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="407" y="100" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">PE分位数&gt;80%</text>
  <text x="407" y="115" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">指数回撤20%~30%</text>
  <text x="407" y="130" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">行业集中度&gt;30%</text>

  <rect x="505" y="82" width="185" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="597" y="100" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">PE分位数&gt;90%明显泡沫</text>
  <text x="597" y="115" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">指数回撤&gt;30%未止损</text>
  <text x="597" y="130" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">单票仓位&gt;30%满仓</text>

  <rect x="695" y="82" width="185" height="58" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="787" y="100" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">沪深300/中证500宽基</text>
  <text x="787" y="115" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">指数定投，仓位≤20%</text>
  <text x="787" y="130" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">高估时减仓不止损</text>

  <!-- 行2：利率风险 -->
  <rect x="20" y="146" width="130" height="58" rx="4" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="85" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46" font-family="sans-serif">利率风险</text>
  <text x="85" y="179" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">债券/理财</text>
  <text x="85" y="194" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">↕ 利率反向</text>

  <rect x="155" y="146" width="155" height="58" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="232" y="164" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">债券久期1~3年</text>
  <text x="232" y="179" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">纯债基金年化3%~5%</text>
  <text x="232" y="194" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">评级AA以上</text>

  <rect x="315" y="146" width="185" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="407" y="164" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">利率上行周期</text>
  <text x="407" y="179" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">长久期债券（久期&gt;5年）</text>
  <text x="407" y="194" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">BBB以下低评级</text>

  <rect x="505" y="146" width="185" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="597" y="164" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">长久期+利率上行</text>
  <text x="597" y="179" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">债券基金回撤&gt;10%</text>
  <text x="597" y="194" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">重仓垃圾债（CCC）</text>

  <rect x="695" y="146" width="185" height="58" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="787" y="164" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">利率下行：长久期债</text>
  <text x="787" y="179" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">利率上行：短债/货币</text>
  <text x="787" y="194" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">债券ETF，久期≤5年</text>

  <!-- 行3：信用风险 -->
  <rect x="20" y="210" width="130" height="58" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="85" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="sans-serif">信用风险</text>
  <text x="85" y="243" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">企业债/REITs</text>
  <text x="85" y="258" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">↕ 违约/降级</text>

  <rect x="155" y="210" width="155" height="58" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="232" y="228" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">主体评级AAA/AA</text>
  <text x="232" y="243" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">国企/央企背景</text>
  <text x="232" y="258" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">单只债券≤5%仓位</text>

  <rect x="315" y="210" width="185" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="407" y="228" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">民企债占比上升</text>
  <text x="407" y="243" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">行业融资环境恶化</text>
  <text x="407" y="258" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">评级AA-以下</text>

  <rect x="505" y="210" width="185" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="597" y="228" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">重仓单只BBB以下</text>
  <text x="597" y="243" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">信用债集中违约事件</text>
  <text x="597" y="258" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">高收益债/垃圾债</text>

  <rect x="695" y="210" width="185" height="58" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="787" y="228" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">优选公募债基/REITs</text>
  <text x="787" y="243" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">AA以上国企债券</text>
  <text x="787" y="258" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">分散，单只≤5%</text>

  <!-- 行4：商品风险 -->
  <rect x="20" y="274" width="130" height="58" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="sans-serif">商品风险</text>
  <text x="85" y="307" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">黄金/石油</text>
  <text x="85" y="322" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">↕ 供需+美元</text>

  <rect x="155" y="274" width="155" height="58" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="232" y="292" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">黄金仓位5%~10%</text>
  <text x="232" y="307" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">商品ETF（非期货）</text>
  <text x="232" y="322" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">美元走弱背景</text>

  <rect x="315" y="274" width="185" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="407" y="292" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">通胀&gt;5%，实际利率负</text>
  <text x="407" y="307" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">地缘风险升级</text>
  <text x="407" y="322" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">黄金创新高追高</text>

  <rect x="505" y="274" width="185" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="597" y="292" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">商品期货/原油ETF</text>
  <text x="597" y="307" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">黄金仓位&gt;20%当主仓</text>
  <text x="597" y="322" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">短线追涨商品</text>

  <rect x="695" y="274" width="185" height="58" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="787" y="292" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">黄金ETF（518880）</text>
  <text x="787" y="307" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">配置5%~10%防风险</text>
  <text x="787" y="322" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">通胀高时作对冲</text>

  <!-- 行5：汇率风险 -->
  <rect x="20" y="338" width="130" height="58" rx="4" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
  <text x="85" y="356" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" font-family="sans-serif">汇率风险</text>
  <text x="85" y="371" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">QDII/港股/美股</text>
  <text x="85" y="386" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">↕ 本币vs外币</text>

  <rect x="155" y="338" width="155" height="58" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="232" y="356" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">海外资产≤20%仓位</text>
  <text x="232" y="371" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">汇率对冲基金</text>
  <text x="232" y="386" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">汇率波动&lt;10%</text>

  <rect x="315" y="338" width="185" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="407" y="356" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">RMB快速贬值期</text>
  <text x="407" y="371" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">港股/美股仓位&gt;30%</text>
  <text x="407" y="386" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">QDII溢价率高</text>

  <rect x="505" y="338" width="185" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="597" y="356" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">满仓港股/美股无对冲</text>
  <text x="597" y="371" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">汇率+15%以上波动</text>
  <text x="597" y="386" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">QDII高溢价买入</text>

  <rect x="695" y="338" width="185" height="58" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="787" y="356" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">港股ETF/标普500ETF</text>
  <text x="787" y="371" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">RMB贬值配美元资产</text>
  <text x="787" y="386" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">海外仓≤20%</text>

  <!-- 行6：杠杆风险 -->
  <rect x="20" y="402" width="130" height="58" rx="4" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="1"/>
  <text x="85" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d" font-family="sans-serif">杠杆风险</text>
  <text x="85" y="435" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">期权/期货/T+D</text>
  <text x="85" y="450" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">↕ 收益非线性</text>

  <rect x="155" y="402" width="155" height="58" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="232" y="420" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">期权熟悉规则后</text>
  <text x="232" y="435" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">杠杆仓位≤10%</text>
  <text x="232" y="450" text-anchor="middle" font-size="10" fill="#334155" font-family="sans-serif">严格止损线</text>

  <rect x="315" y="402" width="185" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="407" y="420" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">买入期权快到期</text>
  <text x="407" y="435" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">卖出Covered Call</text>
  <text x="407" y="450" text-anchor="middle" font-size="10" fill="#92400e" font-family="sans-serif">保证金&lt;20%缓冲</text>

  <rect x="505" y="402" width="185" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="597" y="420" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">融资买入/满仓期货</text>
  <text x="597" y="435" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">裸卖期权/跨式</text>
  <text x="597" y="450" text-anchor="middle" font-size="10" fill="#991b1b" font-family="sans-serif">扛单/加保证金</text>

  <rect x="695" y="402" width="185" height="58" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="787" y="420" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">小白阶段：不碰杠杆</text>
  <text x="787" y="435" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">学懂规则后再考虑</text>
  <text x="787" y="450" text-anchor="middle" font-size="10" fill="#065f46" font-family="sans-serif">期权仓位≤5%</text>

  <!-- 底部说明 -->
  <text x="450" y="470" text-anchor="middle" font-size="11" fill="#64748b" font-family="sans-serif">绿色=适合小白的参考操作；黄色=需要警惕；红色=必须回避（小白红线）</text>
</svg>