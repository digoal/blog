<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540">
  <title>风险量化三维度逻辑图</title>
  <desc>从前提到结论的逻辑链：识别风险→量化风险→三个核心指标→小白决策框架</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="540" fill="#f7fafc"/>

  <!-- 标题 -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a202c" text-anchor="middle">风险量化三维度：从定性到定量的推理链</text>

  <!-- 第一层：前提 -->
  <rect x="30" y="70" width="200" height="80" rx="8" fill="#e2e8f0" stroke="#4a5568" stroke-width="2"/>
  <text x="130" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748" text-anchor="middle">前提1：识别风险是定性</text>
  <text x="130" y="115" font-family="Arial, sans-serif" font-size="11" fill="#4a5568" text-anchor="middle">知道"有什么风险"</text>
  <text x="130" y="132" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">（第一章第二节内容）</text>

  <rect x="280" y="70" width="200" height="80" rx="8" fill="#e2e8f0" stroke="#4a5568" stroke-width="2"/>
  <text x="380" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748" text-anchor="middle">前提2：需要量化才知道"多大"</text>
  <text x="380" y="115" font-family="Arial, sans-serif" font-size="11" fill="#4a5568" text-anchor="middle">定性→定量才有操作意义</text>
  <text x="380" y="132" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">（本章第三节核心）</text>

  <rect x="530" y="70" width="200" height="80" rx="8" fill="#e2e8f0" stroke="#4a5568" stroke-width="2"/>
  <text x="630" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748" text-anchor="middle">前提3：三个工具足够小白</text>
  <text x="630" y="115" font-family="Arial, sans-serif" font-size="11" fill="#4a5568" text-anchor="middle">最大回撤/波动率/VaR</text>
  <text x="630" y="132" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">入门级标尺</text>

  <!-- 箭头连接 -->
  <line x1="230" y1="110" x2="280" y2="110" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="110" x2="530" y2="110" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 第二层：三个核心指标 -->
  <rect x="30" y="190" width="260" height="90" rx="8" fill="#3182ce" stroke="#2b6cb0" stroke-width="2"/>
  <text x="160" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">最大回撤 (Max Drawdown)</text>
  <text x="160" y="238" font-family="Arial, sans-serif" font-size="11" fill="#bee3f8" text-anchor="middle">回答："最坏情况会跌多少？"</text>
  <text x="160" y="258" font-family="Arial, sans-serif" font-size="11" fill="#90cdf4" text-anchor="middle">→ 设止损线，评估底部承受力</text>

  <rect x="320" y="190" width="260" height="90" rx="8" fill="#38a169" stroke="#2f855a" stroke-width="2"/>
  <text x="450" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">历史波动率 (Volatility)</text>
  <text x="450" y="238" font-family="Arial, sans-serif" font-size="11" fill="#c6f6d5" text-anchor="middle">回答："平时波动有多剧烈？"</text>
  <text x="450" y="258" font-family="Arial, sans-serif" font-size="11" fill="#9ae6b4" text-anchor="middle">→ 评估每天看盘心态</text>

  <rect x="610" y="190" width="260" height="90" rx="8" fill="#d69e2e" stroke="#b7791f" stroke-width="2"/>
  <text x="740" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">风险价值 (VaR)</text>
  <text x="740" y="238" font-family="Arial, sans-serif" font-size="11" fill="#fefcbf" text-anchor="middle">回答："正常情况下一天最多亏多少？"</text>
  <text x="740" y="258" font-family="Arial, sans-serif" font-size="11" fill="#f6e05e" text-anchor="middle">→ 做日内止损边界</text>

  <!-- 箭头向下 -->
  <line x1="160" y1="280" x2="160" y2="320" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="280" x2="450" y2="320" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="280" x2="740" y2="320" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 第三层：小白决策框架 -->
  <rect x="30" y="340" width="840" height="130" rx="10" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <text x="450" y="368" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">小白决策框架：用三个指标匹配自己的风险承受力</text>

  <!-- 决策步骤 -->
  <rect x="60" y="385" width="220" height="65" rx="6" fill="#4a5568"/>
  <text x="170" y="408" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#63b3ed" text-anchor="middle">① 查指标</text>
  <text x="170" y="426" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">最大回撤/波动率/VaR</text>
  <text x="170" y="442" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">产品详情页/招募说明书</text>

  <text x="295" y="420" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="middle">→</text>

  <rect x="320" y="385" width="220" height="65" rx="6" fill="#4a5568"/>
  <text x="430" y="408" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#63b3ed" text-anchor="middle">② 问自己</text>
  <text x="430" y="426" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">"跌到X%我会不会睡不着"</text>
  <text x="430" y="442" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">主观风险容忍度测试</text>

  <text x="555" y="420" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="middle">→</text>

  <rect x="580" y="385" width="260" height="65" rx="6" fill="#4a5568"/>
  <text x="710" y="408" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#63b3ed" text-anchor="middle">③ 做决策</text>
  <text x="710" y="426" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">匹配→持有 | 不匹配→降仓位换产品</text>
  <text x="710" y="442" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">先下10%试探仓</text>

  <!-- 底部结论 -->
  <rect x="30" y="490" width="840" height="40" rx="6" fill="#3182ce" stroke="#2b6cb0" stroke-width="2"/>
  <text x="450" y="515" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">结论：最大回撤看底部 · 波动率看日常 · VaR看边界 → 三者配合，构建完整风险认知</text>

  <!-- 标注线 -->
  <line x1="160" y1="160" x2="160" y2="180" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="160" x2="450" y2="180" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="740" y1="160" x2="740" y2="180" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="9" fill="#4a5568" text-anchor="middle">看底部</text>
  <text x="450" y="168" font-family="Arial, sans-serif" font-size="9" fill="#4a5568" text-anchor="middle">看日常</text>
  <text x="740" y="168" font-family="Arial, sans-serif" font-size="9" fill="#4a5568" text-anchor="middle">看边界</text>
</svg>