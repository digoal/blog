<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <title>风险量化工具选择决策树</title>
  <desc>不同市场环境和投资目标下，选择不同风险量化工具的决策树</desc>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c53030"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="520" fill="#f7fafc"/>

  <!-- 标题 -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a202c" text-anchor="middle">风险量化工具选择决策树</text>
  <text x="450" y="50" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">根据你的投资目标和产品类型，选择合适的量化工具</text>

  <!-- 起点 -->
  <ellipse cx="450" cy="75" rx="60" ry="22" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <text x="450" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">选择风险量化工具</text>

  <!-- 第一层判断 -->
  <line x1="450" y1="97" x2="450" y2="130" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="250" y="135" width="400" height="50" rx="8" fill="#e2e8f0" stroke="#4a5568" stroke-width="2"/>
  <text x="450" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748" text-anchor="middle">你更关注哪个维度？</text>
  <text x="450" y="172" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">①最坏情况 ②日常波动 ③单日边界</text>

  <!-- 三个分支 -->
  <line x1="300" y1="185" x2="170" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="450" y1="185" x2="450" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="600" y1="185" x2="730" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- 分支标签 -->
  <text x="220" y="202" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3182ce" text-anchor="middle">选①</text>
  <text x="450" y="202" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#38a169" text-anchor="middle">选②</text>
  <text x="680" y="202" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d69e2e" text-anchor="middle">选③</text>

  <!-- 三个工具卡片 -->
  <!-- 最大回撤 -->
  <rect x="60" y="220" width="220" height="180" rx="8" fill="#3182ce" stroke="#2b6cb0" stroke-width="2"/>
  <text x="170" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">最大回撤</text>
  <text x="170" y="268" font-family="Arial, sans-serif" font-size="11" fill="#bee3f8" text-anchor="middle">Max Drawdown</text>
  <line x1="80" y1="278" x2="260" y2="278" stroke="#90cdf4" stroke-width="1"/>
  <text x="170" y="298" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">适用场景：</text>
  <text x="80" y="316" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 设止损线</text>
  <text x="80" y="332" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 评估最坏情况承受力</text>
  <text x="80" y="348" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 对比同类产品风险</text>
  <text x="80" y="364" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 配置前压力测试</text>
  <line x1="80" y1="380" x2="260" y2="380" stroke="#90cdf4" stroke-width="1"/>
  <text x="170" y="396" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">小白记忆：看底部</text>

  <!-- 波动率 -->
  <rect x="340" y="220" width="220" height="180" rx="8" fill="#38a169" stroke="#2f855a" stroke-width="2"/>
  <text x="450" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">历史波动率</text>
  <text x="450" y="268" font-family="Arial, sans-serif" font-size="11" fill="#c6f6d5" text-anchor="middle">Historical Volatility</text>
  <line x1="360" y1="278" x2="540" y2="278" stroke="#9ae6b4" stroke-width="1"/>
  <text x="450" y="298" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">适用场景：</text>
  <text x="360" y="316" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 评估持仓日常心跳</text>
  <text x="360" y="332" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 选择看盘频率</text>
  <text x="360" y="348" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 判断是否需要止损线</text>
  <text x="360" y="364" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">• 比较基金波动特征</text>
  <line x1="360" y1="380" x2="540" y2="380" stroke="#9ae6b4" stroke-width="1"/>
  <text x="450" y="396" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">小白记忆：看日常</text>

  <!-- VaR -->
  <rect x="620" y="220" width="220" height="180" rx="8" fill="#d69e2e" stroke="#b7791f" stroke-width="2"/>
  <text x="730" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">风险价值 VaR</text>
  <text x="730" y="268" font-family="Arial, sans-serif" font-size="11" fill="#fefcbf" text-anchor="middle">Value at Risk</text>
  <line x1="640" y1="278" x2="820" y2="278" stroke="#f6e05e" stroke-width="1"/>
  <text x="730" y="298" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">适用场景：</text>
  <text x="640" y="316" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">• 日内止损参考</text>
  <text x="640" y="332" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">• 评估持仓压力</text>
  <text x="640" y="348" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">• 正常市场边界判断</text>
  <text x="640" y="364" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">• 资金管理</text>
  <line x1="640" y1="380" x2="820" y2="380" stroke="#f6e05e" stroke-width="1"/>
  <text x="730" y="396" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">小白记忆：看边界</text>

  <!-- 底部重要提示 -->
  <rect x="60" y="420" width="780" height="85" rx="8" fill="#fff5f5" stroke="#fc8181" stroke-width="2"/>
  <text x="450" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c53030" text-anchor="middle">⚠ 重要边界条件（指标局限性）</text>
  <text x="450" y="463" font-family="Arial, sans-serif" font-size="10" fill="#742a2a" text-anchor="middle">• 新产品（数据不足3年）→ 历史指标不可靠，用近似品替代</text>
  <text x="450" y="480" font-family="Arial, sans-serif" font-size="10" fill="#742a2a" text-anchor="middle">• 极端市场（2008/2020）→ VaR失效，最大回撤也可能被突破</text>
  <text x="450" y="497" font-family="Arial, sans-serif" font-size="10" fill="#742a2a" text-anchor="middle">• 三个指标都是历史数据 → 理解局限性比记住数字更重要</text>
</svg>