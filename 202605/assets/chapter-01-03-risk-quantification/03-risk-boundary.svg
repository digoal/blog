<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <title>风险量化指标的常见误区与使用边界</title>
  <desc>小白使用最大回撤、波动率、VaR三个指标时的常见错误和正确做法</desc>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="480" fill="#f7fafc"/>

  <!-- 标题 -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a202c" text-anchor="middle">风险量化指标的常见误区与使用边界</text>

  <!-- 三个指标的误区表格 -->
  <!-- 表头 -->
  <rect x="30" y="55" width="840" height="35" rx="4" fill="#2d3748"/>
  <text x="140" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">指标</text>
  <text x="370" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">常见误区</text>
  <text x="650" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">正确做法</text>
  <text x="820" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">边界条件</text>

  <!-- 最大回撤行 -->
  <rect x="30" y="95" width="840" height="110" rx="4" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <rect x="30" y="95" width="140" height="110" rx="4" fill="#3182ce"/>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">最大回撤</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="9" fill="#bee3f8" text-anchor="middle">Max Drawdown</text>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">底部承受力</text>

  <text x="165" y="120" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">• 误："历史最惨-30%→</text>
  <text x="165" y="136" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">   这次最多亏30%"</text>
  <text x="165" y="156" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">✗ 最大回撤≠未来回撤</text>
  <text x="165" y="176" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">• 误："回撤小=安全"</text>
  <text x="165" y="192" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">   （横盘≠无风险）</text>

  <text x="380" y="120" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">→ 做压力测试：</text>
  <text x="380" y="136" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">"如果再跌10%我</text>
  <text x="380" y="152" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start"> 怎么办？"</text>
  <text x="380" y="172" font-family="Arial, sans-serif" font-size="10" fill="#38a169" text-anchor="start">✓ 看最大回撤+</text>
  <text x="380" y="188" font-family="Arial, sans-serif" font-size="10" fill="#38a169" text-anchor="start">  产品规模+流动性</text>

  <text x="680" y="120" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 历史数据不足3年→</text>
  <text x="680" y="136" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  不可靠</text>
  <text x="680" y="156" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 极端市场→可能</text>
  <text x="680" y="172" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  被突破</text>
  <text x="680" y="188" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 横盘产品→仍可能</text>
  <text x="680" y="200" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  大幅单日下跌</text>

  <!-- 波动率行 -->
  <rect x="30" y="210" width="840" height="110" rx="4" fill="#f0fff4" stroke="#38a169" stroke-width="1"/>
  <rect x="30" y="210" width="140" height="110" rx="4" fill="#38a169"/>
  <text x="100" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">历史波动率</text>
  <text x="100" y="260" font-family="Arial, sans-serif" font-size="9" fill="#c6f6d5" text-anchor="middle">Volatility</text>
  <text x="100" y="285" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">日常心跳</text>

  <text x="165" y="235" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">• 误："波动率低→</text>
  <text x="165" y="251" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">   风险低→全仓"</text>
  <text x="165" y="271" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">✗ 低波动≠不大幅下跌</text>
  <text x="165" y="287" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">• 误："两只波动率</text>
  <text x="165" y="303" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">   一样→风险一样"</text>
  <text x="165" y="315" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">   （不同风险类型）</text>

  <text x="380" y="235" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">→ 配合最大回撤</text>
  <text x="380" y="251" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">  一起用</text>
  <text x="380" y="271" font-family="Arial, sans-serif" font-size="10" fill="#38a169" text-anchor="start">✓ 同类型才能</text>
  <text x="380" y="287" font-family="Arial, sans-serif" font-size="10" fill="#38a169" text-anchor="start">  比较波动率</text>
  <text x="380" y="303" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">→ 债券vs股票不可</text>
  <text x="380" y="315" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">  直接比</text>

  <text x="680" y="235" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 波动率只反映价格</text>
  <text x="680" y="251" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  波动，不看购买力</text>
  <text x="680" y="271" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 流动性差的产品</text>
  <text x="680" y="287" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  波动率可能失真</text>
  <text x="680" y="303" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 相关性高的资产</text>
  <text x="680" y="315" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  组合波动率被低估</text>

  <!-- VaR行 -->
  <rect x="30" y="325" width="840" height="110" rx="4" fill="#fffaf0" stroke="#d69e2e" stroke-width="1"/>
  <rect x="30" y="325" width="140" height="110" rx="4" fill="#d69e2e"/>
  <text x="100" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">风险价值</text>
  <text x="100" y="375" font-family="Arial, sans-serif" font-size="9" fill="#fefcbf" text-anchor="middle">VaR</text>
  <text x="100" y="400" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">单日边界</text>

  <text x="165" y="350" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">• 误："VaR=5%→</text>
  <text x="165" y="366" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">   最多亏5%就撤"</text>
  <text x="165" y="386" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">✗ VaR是正常市场</text>
  <text x="165" y="402" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">  参考，非最大亏损</text>
  <text x="165" y="418" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">• 误："95%把握"</text>
  <text x="165" y="430" font-family="Arial, sans-serif" font-size="10" fill="#c53030" text-anchor="start">  →不会亏更多</text>

  <text x="380" y="350" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">→ VaR × 3 做</text>
  <text x="380" y="366" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">  安全边界估算</text>
  <text x="380" y="386" font-family="Arial, sans-serif" font-size="10" fill="#38a169" text-anchor="start">✓ VaR是"正常</text>
  <text x="380" y="402" font-family="Arial, sans-serif" font-size="10" fill="#38a169" text-anchor="start">  情况参考"</text>
  <text x="380" y="418" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">→ 止损参考非门槛</text>
  <text x="380" y="430" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="start">  避免频繁止损</text>

  <text x="680" y="350" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 极端市场→VaR</text>
  <text x="680" y="366" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  完全失效</text>
  <text x="680" y="386" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 小白产品一般不</text>
  <text x="680" y="402" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  披露VaR</text>
  <text x="680" y="418" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">• 可用波动率推算</text>
  <text x="680" y="430" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="start">  日VaR ≈ 波幅÷16</text>

  <!-- 底部总结 -->
  <rect x="30" y="445" width="840" height="28" rx="4" fill="#2d3748"/>
  <text x="450" y="464" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">核心原则：三个指标都是历史数据的平滑结果，极端事件会被平均掉——理解局限性比记住数字更重要</text>
</svg>