<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <title>风险管理心理建设推导链</title>
  <desc>从市场价格波动到人性弱点，再到规则约束的完整推导链条</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc6b6b"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="480" fill="#fefefe" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">为什么风险管理需要心理规则</text>

  <!-- 节点1 -->
  <rect x="20" y="60" width="180" height="70" rx="6" fill="#e8f4fd" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="110" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">市场价格由情绪+预期</text>
  <text x="110" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">共同决定</text>
  <text x="110" y="118" text-anchor="middle" font-size="11" fill="#666">短期波动常脱离基本面</text>

  <!-- 节点2 -->
  <rect x="310" y="60" width="180" height="70" rx="6" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="400" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">双重压力下</text>
  <text x="400" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">判断力系统性下降</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#666">损失厌恶 + 确认偏误</text>

  <!-- 节点3 -->
  <rect x="600" y="60" width="180" height="70" rx="6" fill="#fce4ec" stroke="#c96b6b" stroke-width="1.5"/>
  <text x="690" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">计划与执行之间</text>
  <text x="690" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">存在天然裂缝</text>
  <text x="690" y="118" text-anchor="middle" font-size="11" fill="#666">平静时觉得合理</text>

  <!-- 连接线1→2 -->
  <line x1="200" y1="95" x2="305" y2="95" stroke="#dc6b6b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="252" y="88" text-anchor="middle" font-size="10" fill="#888">所以</text>

  <!-- 连接线2→3 -->
  <line x1="490" y1="95" x2="595" y2="95" stroke="#dc6b6b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="542" y="88" text-anchor="middle" font-size="10" fill="#888">所以</text>

  <!-- 节点4：人性弱点被放大 -->
  <rect x="200" y="180" width="400" height="60" rx="6" fill="#fce4ec" stroke="#c96b6b" stroke-width="1.5"/>
  <text x="400" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#c96b6b">人性弱点在高压下被放大，分析能力下降</text>
  <text x="400" y="225" text-anchor="middle" font-size="11" fill="#666">损失厌恶 · 确认偏误 · 后见之明 · 羊群效应</text>

  <!-- 连接3→4 -->
  <line x1="690" y1="130" x2="690" y2="175" stroke="#dc6b6b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="710" y="155" font-size="10" fill="#888">+ 自我怀疑</text>

  <!-- 节点5：结论 -->
  <rect x="150" y="290" width="500" height="90" rx="8" fill="#e8f5e9" stroke="#5cb85c" stroke-width="2"/>
  <text x="400" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">核心结论</text>
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#333">需要一套在情绪失控时仍能强制执行的规则</text>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#333">不依赖判断力，只依赖规则的刚性</text>

  <!-- 连接4→5 -->
  <line x1="400" y1="240" x2="400" y2="285" stroke="#5cb85c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="420" y="265" font-size="10" fill="#888">所以</text>

  <!-- 两个层面 -->
  <rect x="50" y="410" width="320" height="55" rx="6" fill="#e8f4fd" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="210" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">第一层：仓位和标的选择</text>
  <text x="210" y="452" text-anchor="middle" font-size="11" fill="#666">决定单次错误能伤害你多少</text>

  <rect x="430" y="410" width="320" height="55" rx="6" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="590" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">第二层：心理规则</text>
  <text x="590" y="452" text-anchor="middle" font-size="11" fill="#666">决定极端波动时能否按计划行动</text>

  <!-- 连接到两个层面 -->
  <line x1="400" y1="380" x2="210" y2="405" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="380" x2="590" y2="405" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- 底部强调 -->
  <text x="400" y="475" text-anchor="middle" font-size="10" fill="#999">第二层比第一层更难，因为它是反人性的</text>
</svg>