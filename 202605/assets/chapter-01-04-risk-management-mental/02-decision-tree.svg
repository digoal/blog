<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>前提变化后的决策树</title>
  <desc>当市场或持仓发生变化时，小白应该做什么判断</desc>

  <!-- 背景 -->
  <rect width="800" height="500" fill="#fefefe" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">当前提变化时的判断流程</text>

  <!-- 起点：价格变动 -->
  <rect x="310" y="45" width="180" height="45" rx="22" fill="#4a9fd4" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="400" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">持仓品种价格变动</text>

  <!-- 问题1 -->
  <line x1="400" y1="90" x2="400" y2="120" stroke="#dc6b6b" stroke-width="1.5"/>
  <rect x="310" y="120" width="180" height="38" rx="4" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="400" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">前提条件变了吗？</text>

  <!-- 否分支（左） -->
  <line x1="310" y1="139" x2="160" y2="139" stroke="#888" stroke-width="1.5"/>
  <line x1="160" y1="139" x2="160" y2="180" stroke="#888" stroke-width="1.5"/>
  <text x="235" y="132" font-size="10" fill="#888">否</text>
  <rect x="70" y="180" width="180" height="60" rx="6" fill="#e8f5e9" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="160" y="203" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">只是波动，不行动</text>
  <text x="160" y="222" text-anchor="middle" font-size="11" fill="#666">确认退出线是否完整</text>
  <text x="160" y="237" text-anchor="middle" font-size="11" fill="#666">等待，不因恐慌操作</text>

  <!-- 是分支（右） -->
  <line x1="490" y1="139" x2="640" y2="139" stroke="#dc6b6b" stroke-width="1.5"/>
  <line x1="640" y1="139" x2="640" y2="180" stroke="#dc6b6b" stroke-width="1.5"/>
  <text x="565" y="132" font-size="10" fill="#dc6b6b">是</text>
  <rect x="550" y="180" width="180" height="60" rx="6" fill="#fce4ec" stroke="#c96b6b" stroke-width="1.5"/>
  <text x="640" y="203" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">前提确实变化了</text>
  <text x="640" y="222" text-anchor="middle" font-size="11" fill="#666">估值/基本面/行业逻辑</text>
  <text x="640" y="237" text-anchor="middle" font-size="11" fill="#666">发生了实质性改变</text>

  <!-- 汇聚到问题2 -->
  <line x1="160" y1="240" x2="160" y2="270" stroke="#888" stroke-width="1"/>
  <line x1="640" y1="240" x2="640" y2="270" stroke="#888" stroke-width="1"/>
  <line x1="160" y1="270" x2="400" y2="270" stroke="#888" stroke-width="1"/>
  <line x1="640" y1="270" x2="400" y2="270" stroke="#888" stroke-width="1"/>
  <line x1="400" y1="270" x2="400" y2="295" stroke="#888" stroke-width="1.5"/>

  <!-- 问题2：止损线是否被击穿 -->
  <rect x="310" y="295" width="180" height="38" rx="4" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="400" y="317" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">退出线被击穿了吗？</text>

  <!-- 线被击穿（左） -->
  <line x1="310" y1="314" x2="160" y2="314" stroke="#c96b6b" stroke-width="1.5"/>
  <line x1="160" y1="314" x2="160" y2="355" stroke="#c96b6b" stroke-width="1.5"/>
  <text x="235" y="307" font-size="10" fill="#c96b6b">是</text>
  <rect x="70" y="355" width="180" height="50" rx="6" fill="#fce4ec" stroke="#c96b6b" stroke-width="1.5"/>
  <text x="160" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#c96b6b">执行止损，不要犹豫</text>
  <text x="160" y="396" text-anchor="middle" font-size="11" fill="#666">规则在买入前就定好了</text>

  <!-- 线未被击穿（右） -->
  <line x1="490" y1="314" x2="640" y2="314" stroke="#5cb85c" stroke-width="1.5"/>
  <line x1="640" y1="314" x2="640" y2="355" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="565" y="307" font-size="10" fill="#5cb85c">否</text>
  <rect x="550" y="355" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="640" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">保持仓位，等待</text>
  <text x="640" y="396" text-anchor="middle" font-size="11" fill="#666">但启动24小时冷静期</text>

  <!-- 底部汇总 -->
  <line x1="160" y1="405" x2="160" y2="430" stroke="#888" stroke-width="1"/>
  <line x1="640" y1="405" x2="640" y2="430" stroke="#888" stroke-width="1"/>
  <line x1="160" y1="430" x2="640" y2="430" stroke="#888" stroke-width="1"/>
  <line x1="400" y1="430" x2="400" y2="450" stroke="#888" stroke-width="1.5"/>

  <rect x="200" y="450" width="400" height="38" rx="6" fill="#e8f4fd" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="400" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">定期复盘，不临时改规则</text>
</svg>