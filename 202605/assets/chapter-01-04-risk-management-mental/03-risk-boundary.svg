<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <title>小白风险边界清单</title>
  <desc>五步风险规则速查</desc>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#fefefe" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">小白风险边界清单</text>

  <!-- 左侧：规则 -->
  <!-- 规则1 -->
  <rect x="20" y="55" width="360" height="55" rx="6" fill="#e8f5e9" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="45" y="78" font-size="28" font-weight="bold" fill="#5cb85c">①</text>
  <text x="80" y="75" font-size="13" font-weight="bold" fill="#2c3e50">止损线要物理化</text>
  <text x="80" y="95" font-size="11" fill="#666">写下来，能看见，不依赖记忆</text>

  <!-- 规则2 -->
  <rect x="20" y="120" width="360" height="55" rx="6" fill="#e8f4fd" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="45" y="143" font-size="28" font-weight="bold" fill="#4a9fd4">②</text>
  <text x="80" y="140" font-size="13" font-weight="bold" fill="#2c3e50">仓位上限是铁律</text>
  <text x="80" y="160" font-size="11" fill="#666">单笔&lt;20%，总权益&lt;60%</text>

  <!-- 规则3 -->
  <rect x="20" y="185" width="360" height="55" rx="6" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="45" y="208" font-size="28" font-weight="bold" fill="#f5a623">③</text>
  <text x="80" y="205" font-size="13" font-weight="bold" fill="#2c3e50">区分波动与趋势</text>
  <text x="80" y="225" font-size="11" fill="#666">前提变了才行动，否则等待</text>

  <!-- 规则4 -->
  <rect x="20" y="250" width="360" height="55" rx="6" fill="#fce4ec" stroke="#c96b6b" stroke-width="1.5"/>
  <text x="45" y="273" font-size="28" font-weight="bold" fill="#c96b6b">④</text>
  <text x="80" y="270" font-size="13" font-weight="bold" fill="#2c3e50">大跌不临时改规则</text>
  <text x="80" y="290" font-size="11" fill="#666">改规则留到复盘日</text>

  <!-- 规则5 -->
  <rect x="20" y="315" width="360" height="55" rx="6" fill="#f3e5f5" stroke="#9c6bad" stroke-width="1.5"/>
  <text x="45" y="338" font-size="28" font-weight="bold" fill="#9c6bad">⑤</text>
  <text x="80" y="335" font-size="13" font-weight="bold" fill="#2c3e50">焦虑时强制24小时</text>
  <text x="80" y="355" font-size="11" fill="#666">不在情绪峰值做决定</text>

  <!-- 右侧：核心警示 -->
  <rect x="400" y="55" width="380" height="315" rx="8" fill="#2c3e50" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="590" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">最常见的散户陷阱</text>

  <text x="425" y="130" font-size="12" fill="#dc6b6b">✗ "等回本我就卖"</text>
  <text x="425" y="155" font-size="11" fill="#aaa">跌了不止损，反弹了又觉得还能涨</text>

  <text x="425" y="190" font-size="12" fill="#dc6b6b">✗ 真亏时纪律全忘</text>
  <text x="425" y="215" font-size="11" fill="#aaa">模拟盘练的规则，真钱上执行不了</text>

  <text x="425" y="250" font-size="12" fill="#dc6b6b">✗ 用长期持有逃避止损</text>
  <text x="425" y="275" font-size="11" fill="#aaa">不是在投资，是在赌下一次反弹</text>

  <text x="425" y="310" font-size="12" fill="#dc6b6b">✗ 把亏损归咎于市场</text>
  <text x="425" y="335" font-size="11" fill="#aaa">不认错，不复盘，换新热点继续</text>

  <text x="590" y="365" text-anchor="middle" font-size="11" fill="#666">先保命，再赚钱</text>
</svg>