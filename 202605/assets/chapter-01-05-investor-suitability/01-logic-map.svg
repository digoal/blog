<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">投资者适当性的第一性原理链条</title>
  <desc id="desc">从产品复杂度、亏损速度和投资者承受能力，推导为什么有些工具需要门槛。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f7f9fb"/>
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">为什么有些工具有门槛</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#52616b">适当性不是奖励, 是把复杂风险挡在承受能力之外</text>

  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="40" y="120" width="190" height="92" rx="8" fill="#e3f2fd" stroke="#2b6cb0" stroke-width="2"/>
    <text x="135" y="152" text-anchor="middle" font-weight="700" fill="#1e3a8a">产品风险不同</text>
    <text x="135" y="182" text-anchor="middle" fill="#1f2933">股票、期权、期货</text>
    <text x="135" y="204" text-anchor="middle" fill="#1f2933">亏损路径不一样</text>

    <rect x="285" y="120" width="190" height="92" rx="8" fill="#eef7ed" stroke="#2f855a" stroke-width="2"/>
    <text x="380" y="152" text-anchor="middle" font-weight="700" fill="#166534">亏损速度不同</text>
    <text x="380" y="182" text-anchor="middle" fill="#1f2933">杠杆和到期日</text>
    <text x="380" y="204" text-anchor="middle" fill="#1f2933">会放大时间压力</text>

    <rect x="530" y="120" width="190" height="92" rx="8" fill="#fff7e6" stroke="#b7791f" stroke-width="2"/>
    <text x="625" y="152" text-anchor="middle" font-weight="700" fill="#92400e">承受能力不同</text>
    <text x="625" y="182" text-anchor="middle" fill="#1f2933">资产、经验、知识</text>
    <text x="625" y="204" text-anchor="middle" fill="#1f2933">决定能否扛住错误</text>

    <rect x="775" y="120" width="145" height="92" rx="8" fill="#fdecec" stroke="#c53030" stroke-width="2"/>
    <text x="847" y="152" text-anchor="middle" font-weight="700" fill="#991b1b">需要门槛</text>
    <text x="847" y="182" text-anchor="middle" fill="#1f2933">先筛选</text>
    <text x="847" y="204" text-anchor="middle" fill="#1f2933">再参与</text>

    <line x1="230" y1="166" x2="276" y2="166" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="475" y1="166" x2="521" y2="166" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="720" y1="166" x2="766" y2="166" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="282" width="800" height="142" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="480" y="318" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">小白该得到的判断</text>
    <text x="480" y="354" text-anchor="middle" font-size="17" fill="#334155">能开通权限 ≠ 适合重仓参与</text>
    <text x="480" y="384" text-anchor="middle" font-size="17" fill="#334155">不能开通权限 ≠ 永远不能学习</text>
    <text x="480" y="414" text-anchor="middle" font-size="17" fill="#334155">正确顺序: 先用低门槛工具理解风险, 再判断是否需要高门槛工具</text>
  </g>

  <text x="480" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">门槛只能减少错配, 不能替你承担亏损。</text>
</svg>
