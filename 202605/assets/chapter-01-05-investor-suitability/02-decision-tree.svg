<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">投资者适当性决策树</title>
  <desc id="desc">根据工具是否有门槛、是否理解风险、是否能承受亏损，决定学习、观望或小额参与。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#f8fafc"/>
  <text x="490" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">看到一个有门槛的工具, 先这样判断</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="360" y="76" width="260" height="68" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="490" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">这个工具有没有适当性门槛?</text>
    <text x="490" y="128" text-anchor="middle" fill="#1e293b">资产、经验、测试、风险测评</text>

    <line x1="430" y1="144" x2="270" y2="198" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="550" y1="144" x2="710" y2="198" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="120" y="200" width="260" height="74" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="250" y="230" text-anchor="middle" font-weight="700" fill="#166534">没有门槛</text>
    <text x="250" y="254" text-anchor="middle" fill="#1e293b">仍要检查波动、流动性、费用</text>

    <rect x="600" y="200" width="260" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="730" y="230" text-anchor="middle" font-weight="700" fill="#9a3412">有门槛</text>
    <text x="730" y="254" text-anchor="middle" fill="#1e293b">先问: 门槛挡的是什么风险?</text>

    <line x1="250" y1="274" x2="250" y2="330" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="730" y1="274" x2="730" y2="330" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="100" y="332" width="300" height="74" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="250" y="362" text-anchor="middle" font-weight="700" fill="#334155">低门槛也不能满仓</text>
    <text x="250" y="386" text-anchor="middle" fill="#1e293b">用统一模板设仓位和退出线</text>

    <rect x="580" y="332" width="300" height="74" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="730" y="362" text-anchor="middle" font-weight="700" fill="#991b1b">不能解释亏损路径?</text>
    <text x="730" y="386" text-anchor="middle" fill="#1e293b">不参与真钱交易, 先学习或模拟</text>

    <line x1="730" y1="406" x2="610" y2="462" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="730" y1="406" x2="850" y2="462" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="440" y="464" width="300" height="64" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="590" y="492" text-anchor="middle" font-weight="700" fill="#854d0e">能解释, 但承受不了亏损?</text>
    <text x="590" y="516" text-anchor="middle" fill="#1e293b">只做观察清单, 不做实盘</text>

    <rect x="770" y="464" width="170" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="855" y="492" text-anchor="middle" font-weight="700" fill="#166534">都满足</text>
    <text x="855" y="516" text-anchor="middle" fill="#1e293b">小额试错</text>
  </g>
</svg>
