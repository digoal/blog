<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">适当性门槛的风险边界</title>
  <desc id="desc">列出适当性门槛能够帮助过滤的风险，以及不能替投资者解决的问题。</desc>
  <rect width="980" height="560" fill="#f8fafc"/>
  <text x="490" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">适当性门槛能做什么, 不能做什么</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="84" width="390" height="380" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="265" y="124" text-anchor="middle" font-size="21" font-weight="700" fill="#166534">门槛能帮助过滤</text>
    <text x="110" y="172" font-size="17" fill="#1e293b">1. 完全没有经验就碰复杂工具</text>
    <text x="110" y="222" font-size="17" fill="#1e293b">2. 用短期生活钱承担长期波动</text>
    <text x="110" y="272" font-size="17" fill="#1e293b">3. 不懂杠杆、保证金和到期日</text>
    <text x="110" y="322" font-size="17" fill="#1e293b">4. 风险承受能力明显不匹配</text>
    <text x="110" y="372" font-size="17" fill="#1e293b">5. 机构未充分提示产品风险</text>

    <rect x="520" y="84" width="390" height="380" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="715" y="124" text-anchor="middle" font-size="21" font-weight="700" fill="#9f1239">门槛不能替你解决</text>
    <text x="560" y="172" font-size="17" fill="#1e293b">1. 买入后价格一定上涨</text>
    <text x="560" y="222" font-size="17" fill="#1e293b">2. 高门槛产品一定更高级</text>
    <text x="560" y="272" font-size="17" fill="#1e293b">3. 开通权限后可以重仓</text>
    <text x="560" y="322" font-size="17" fill="#1e293b">4. 测试通过就真正理解风险</text>
    <text x="560" y="372" font-size="17" fill="#1e293b">5. 亏损后可以把责任推给门槛</text>
  </g>

  <rect x="170" y="492" width="640" height="46" rx="8" fill="#1e293b"/>
  <text x="490" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">小白红线: 把“能不能开通”改成“错了会不会活下来”。</text>
</svg>
