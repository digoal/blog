<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="520" viewBox="0 0 1020 520" role="img" aria-labelledby="title desc">
  <title id="title">本书统一操作模板主流程</title>
  <desc id="desc">展示从环境判断到复盘的六步投资操作链条。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1020" height="520" fill="#f8fafc"/>
  <text x="510" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">统一操作模板: 先判断, 再行动</text>
  <text x="510" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">每一类工具都走同一条链, 避免被情绪和消息带走</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="30" y="132" width="140" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="100" y="164" text-anchor="middle" font-weight="700" fill="#1e3a8a">1 环境判断</text>
    <text x="100" y="192" text-anchor="middle" fill="#1e293b">胜率来自</text>
    <text x="100" y="214" text-anchor="middle" fill="#1e293b">市场条件</text>

    <rect x="200" y="132" width="140" height="92" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="270" y="164" text-anchor="middle" font-weight="700" fill="#166534">2 品种选择</text>
    <text x="270" y="192" text-anchor="middle" fill="#1e293b">工具匹配</text>
    <text x="270" y="214" text-anchor="middle" fill="#1e293b">当前风险</text>

    <rect x="370" y="132" width="140" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="440" y="164" text-anchor="middle" font-weight="700" fill="#854d0e">3 仓位上限</text>
    <text x="440" y="192" text-anchor="middle" fill="#1e293b">先定亏损</text>
    <text x="440" y="214" text-anchor="middle" fill="#1e293b">再定投入</text>

    <rect x="540" y="132" width="140" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="610" y="164" text-anchor="middle" font-weight="700" fill="#9a3412">4 买入条件</text>
    <text x="610" y="192" text-anchor="middle" fill="#1e293b">条件满足</text>
    <text x="610" y="214" text-anchor="middle" fill="#1e293b">才执行</text>

    <rect x="710" y="132" width="140" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="780" y="164" text-anchor="middle" font-weight="700" fill="#991b1b">5 卖出条件</text>
    <text x="780" y="192" text-anchor="middle" fill="#1e293b">错了退出</text>
    <text x="780" y="214" text-anchor="middle" fill="#1e293b">对了减仓</text>

    <rect x="880" y="132" width="110" height="92" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="935" y="164" text-anchor="middle" font-weight="700" fill="#5b21b6">6 复盘</text>
    <text x="935" y="192" text-anchor="middle" fill="#1e293b">改规则</text>
    <text x="935" y="214" text-anchor="middle" fill="#1e293b">不改情绪</text>

    <line x1="170" y1="178" x2="191" y2="178" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="340" y1="178" x2="361" y2="178" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="510" y1="178" x2="531" y2="178" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="680" y1="178" x2="701" y2="178" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="850" y1="178" x2="871" y2="178" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="100" y="304" width="820" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="510" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">核心纪律</text>
  <text x="510" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">没有环境判断, 就没有品种选择; 没有仓位上限, 就没有买入动作。</text>
  <text x="510" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">买入前先写卖出条件, 交易后只在复盘日修改规则。</text>
  <text x="510" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">模板的目的不是预测准确, 而是让错误小到可修正。</text>
</svg>
