<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">前提变化后的操作决策树</title>
  <desc id="desc">当市场环境、产品风险或个人资金发生变化时，如何调整操作模板。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#f8fafc"/>
  <text x="490" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">前提变了, 结论也要变</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="360" y="76" width="260" height="68" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="490" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">原计划还能执行吗?</text>
    <text x="490" y="130" text-anchor="middle" fill="#1e293b">先检查三个关键前提</text>

    <line x1="490" y1="144" x2="220" y2="204" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="144" x2="490" y2="204" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="144" x2="760" y2="204" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="80" y="206" width="280" height="82" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="220" y="236" text-anchor="middle" font-weight="700" fill="#9a3412">市场环境变了吗?</text>
    <text x="220" y="262" text-anchor="middle" fill="#1e293b">牛、熊、震荡、利率方向</text>

    <rect x="350" y="206" width="280" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="490" y="236" text-anchor="middle" font-weight="700" fill="#991b1b">品种风险变了吗?</text>
    <text x="490" y="262" text-anchor="middle" fill="#1e293b">波动、流动性、信用、杠杆</text>

    <rect x="620" y="206" width="280" height="82" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="760" y="236" text-anchor="middle" font-weight="700" fill="#166534">个人资金变了吗?</text>
    <text x="760" y="262" text-anchor="middle" fill="#1e293b">现金需求、收入、承受力</text>

    <line x1="220" y1="288" x2="220" y2="348" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="288" x2="490" y2="348" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="760" y1="288" x2="760" y2="348" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="95" y="350" width="250" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="220" y="380" text-anchor="middle" font-weight="700" fill="#334155">重做环境判断</text>
    <text x="220" y="404" text-anchor="middle" fill="#1e293b">改品种或降仓位</text>

    <rect x="365" y="350" width="250" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="490" y="380" text-anchor="middle" font-weight="700" fill="#334155">重算亏损边界</text>
    <text x="490" y="404" text-anchor="middle" fill="#1e293b">暂停买入或退出</text>

    <rect x="635" y="350" width="250" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="760" y="380" text-anchor="middle" font-weight="700" fill="#334155">重设仓位上限</text>
    <text x="760" y="404" text-anchor="middle" fill="#1e293b">生活钱先退出风险</text>

    <rect x="250" y="468" width="480" height="54" rx="8" fill="#1e293b"/>
    <text x="490" y="502" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">只要关键前提变了, 不要修补理由, 要重跑模板。</text>
  </g>
</svg>
