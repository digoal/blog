<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">统一操作模板风险边界</title>
  <desc id="desc">列出模板在可执行、降仓、暂停和复盘四个状态下的判断标准。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">模板不是让你多交易, 是让你少犯大错</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="420" height="170" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="270" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">可执行</text>
    <text x="100" y="164" font-size="17" fill="#1e293b">环境、品种、仓位、买卖条件都写清</text>
    <text x="100" y="198" font-size="17" fill="#1e293b">单笔亏损不会伤到生活和心态</text>
    <text x="100" y="232" font-size="17" fill="#1e293b">买入理由可被事实验证</text>

    <rect x="520" y="86" width="420" height="170" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="730" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须降仓</text>
    <text x="560" y="164" font-size="17" fill="#1e293b">仓位超过事前上限</text>
    <text x="560" y="198" font-size="17" fill="#1e293b">环境不再支持原品种</text>
    <text x="560" y="232" font-size="17" fill="#1e293b">情绪开始替代规则</text>

    <rect x="60" y="300" width="420" height="170" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="270" y="338" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">暂停买入</text>
    <text x="100" y="378" font-size="17" fill="#1e293b">说不清买入条件或卖出条件</text>
    <text x="100" y="412" font-size="17" fill="#1e293b">需要短期用钱却买长期波动资产</text>
    <text x="100" y="446" font-size="17" fill="#1e293b">靠消息、群聊、短视频做决定</text>

    <rect x="520" y="300" width="420" height="170" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="730" y="338" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">复盘修正</text>
    <text x="560" y="378" font-size="17" fill="#1e293b">亏损是否来自规则错误?</text>
    <text x="560" y="412" font-size="17" fill="#1e293b">盈利是否来自运气而非框架?</text>
    <text x="560" y="446" font-size="17" fill="#1e293b">下一次只改规则, 不改借口</text>
  </g>

  <text x="500" y="526" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">风险边界优先级: 生活现金 > 仓位上限 > 退出条件 > 收益想象。</text>
</svg>
