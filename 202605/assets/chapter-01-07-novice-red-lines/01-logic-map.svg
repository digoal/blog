<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="540" viewBox="0 0 1020 540" role="img" aria-labelledby="title desc">
  <title id="title">小白四条红线的逻辑链</title>
  <desc id="desc">从亏损不可控、波动不可预测和信息不对称，推导四条小白投资红线。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1020" height="540" fill="#f8fafc"/>
  <text x="510" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">小白红线: 先把毁灭性错误挡住</text>
  <text x="510" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">红线不是保守, 是让你有资格活到下一轮机会</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="60" y="130" width="190" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="155" y="162" text-anchor="middle" font-weight="700" fill="#991b1b">不借钱</text>
    <text x="155" y="190" text-anchor="middle" fill="#1e293b">亏损会变成</text>
    <text x="155" y="212" text-anchor="middle" fill="#1e293b">债务压力</text>

    <rect x="300" y="130" width="190" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="395" y="162" text-anchor="middle" font-weight="700" fill="#9a3412">不满仓</text>
    <text x="395" y="190" text-anchor="middle" fill="#1e293b">波动会夺走</text>
    <text x="395" y="212" text-anchor="middle" fill="#1e293b">修正空间</text>

    <rect x="540" y="130" width="190" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="635" y="162" text-anchor="middle" font-weight="700" fill="#854d0e">不碰不懂杠杆</text>
    <text x="635" y="190" text-anchor="middle" fill="#1e293b">收益和亏损</text>
    <text x="635" y="212" text-anchor="middle" fill="#1e293b">都被放大</text>

    <rect x="780" y="130" width="190" height="92" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="875" y="162" text-anchor="middle" font-weight="700" fill="#5b21b6">不听消息重仓</text>
    <text x="875" y="190" text-anchor="middle" fill="#1e293b">信息无法验证</text>
    <text x="875" y="212" text-anchor="middle" fill="#1e293b">仓位却真实</text>

    <line x1="250" y1="176" x2="291" y2="176" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="176" x2="531" y2="176" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="730" y1="176" x2="771" y2="176" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="120" y="306" width="780" height="128" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="510" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">四条红线共同保护一件事</text>
  <text x="510" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">当判断错了, 亏损仍然可承受; 当市场变了, 账户仍然能修正。</text>
  <text x="510" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">红线破一条, 风险从“投资错误”升级为“生存错误”。</text>
  <text x="510" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">小白阶段最重要的收益, 是不被一次错误清出牌桌。</text>
</svg>
