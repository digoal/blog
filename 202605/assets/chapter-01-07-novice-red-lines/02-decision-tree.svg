<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">小白红线决策树</title>
  <desc id="desc">买入前逐项检查是否借钱、满仓、杠杆不懂或消息重仓。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#f8fafc"/>
  <text x="490" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">买入前先过红线闸门</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="370" y="76" width="240" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="490" y="112" text-anchor="middle" font-weight="700" fill="#1e3a8a">准备买入或加仓?</text>

    <line x1="490" y1="138" x2="490" y2="180" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="350" y="182" width="280" height="62" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="490" y="218" text-anchor="middle" font-weight="700" fill="#991b1b">钱是借来的吗?</text>

    <line x1="350" y1="213" x2="190" y2="270" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="630" y1="213" x2="790" y2="270" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="70" y="272" width="240" height="62" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="190" y="308" text-anchor="middle" font-weight="700" fill="#991b1b">是: 停止</text>
    <rect x="670" y="272" width="240" height="62" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="790" y="308" text-anchor="middle" font-weight="700" fill="#166534">否: 继续检查</text>

    <line x1="790" y1="334" x2="790" y2="370" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="650" y="372" width="280" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="790" y="408" text-anchor="middle" font-weight="700" fill="#9a3412">仓位会不会满仓?</text>

    <line x1="650" y1="403" x2="490" y2="470" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="790" y1="434" x2="790" y2="470" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="370" y="472" width="240" height="62" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="490" y="508" text-anchor="middle" font-weight="700" fill="#854d0e">是: 先降仓</text>
    <rect x="670" y="472" width="240" height="62" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="790" y="496" text-anchor="middle" font-weight="700" fill="#166534">否: 再问</text>
    <text x="790" y="518" text-anchor="middle" fill="#166534">杠杆懂吗? 消息可靠吗?</text>

    <text x="490" y="360" text-anchor="middle" font-size="15" fill="#64748b">任何一个答案触发红线, 结论都不是“少买点”, 而是先停止。</text>
  </g>
</svg>
