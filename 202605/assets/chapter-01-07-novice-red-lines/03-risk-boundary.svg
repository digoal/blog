<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">小白红线边界清单</title>
  <desc id="desc">展示红线触发、降风险和允许学习的边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">红线边界: 哪些必须停, 哪些可以学</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须停止</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">借钱买风险资产</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">满仓赌单一方向</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">不懂保证金却用杠杆</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">听消息重仓单一品种</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">生活钱拿去赌波动</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须降风险</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">仓位超过事前上限</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">亏损影响睡眠和生活</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">卖出条件说不清</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">频繁刷消息改判断</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">把回本当唯一目标</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">可以学习</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">用模拟盘理解杠杆</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">用小额观察仓练流程</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">先写风险清单再行动</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">把消息当待验证线索</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">固定周期复盘规则</text>
  </g>

  <rect x="160" y="488" width="680" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">红线不是让你不投资, 是让每次错误都小到还能继续学习。</text>
</svg>
