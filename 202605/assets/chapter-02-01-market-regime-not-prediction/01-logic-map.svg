<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="540" viewBox="0 0 1020 540" role="img" aria-labelledby="title desc">
  <title id="title">市场环境判断不是预测涨跌</title>
  <desc id="desc">展示市场环境判断如何从预测涨跌转化为判断胜率、选择工具和控制仓位。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1020" height="540" fill="#f8fafc"/>
  <text x="510" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">环境判断: 不猜明天, 只判断哪边胜率更高</text>
  <text x="510" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">预测问“会不会涨”, 环境判断问“现在承担什么风险更划算”</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="70" y="128" width="190" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="165" y="160" text-anchor="middle" font-weight="700" fill="#991b1b">错误问题</text>
    <text x="165" y="188" text-anchor="middle" fill="#1e293b">明天涨还是跌?</text>
    <text x="165" y="210" text-anchor="middle" fill="#1e293b">点位到哪里?</text>

    <rect x="315" y="128" width="190" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="410" y="160" text-anchor="middle" font-weight="700" fill="#1e3a8a">正确问题</text>
    <text x="410" y="188" text-anchor="middle" fill="#1e293b">现在是哪类环境?</text>
    <text x="410" y="210" text-anchor="middle" fill="#1e293b">胜率在哪边?</text>

    <rect x="560" y="128" width="190" height="92" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="655" y="160" text-anchor="middle" font-weight="700" fill="#166534">工具选择</text>
    <text x="655" y="188" text-anchor="middle" fill="#1e293b">权益、债券</text>
    <text x="655" y="210" text-anchor="middle" fill="#1e293b">黄金、现金</text>

    <rect x="805" y="128" width="150" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="880" y="160" text-anchor="middle" font-weight="700" fill="#854d0e">仓位边界</text>
    <text x="880" y="188" text-anchor="middle" fill="#1e293b">胜率高加</text>
    <text x="880" y="210" text-anchor="middle" fill="#1e293b">不确定降</text>

    <line x1="260" y1="174" x2="306" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="505" y1="174" x2="551" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="174" x2="796" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="120" y="310" width="780" height="128" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="510" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">核心结论</text>
  <text x="510" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">环境判断不能保证你买完就涨, 只能提高“承担某类风险”的胜率。</text>
  <text x="510" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">胜率不高时, 最重要的动作不是反向预测, 而是降仓位、留现金、等条件。</text>
  <text x="510" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">小白要从“猜方向”升级为“管理赔率和仓位”。</text>
</svg>
