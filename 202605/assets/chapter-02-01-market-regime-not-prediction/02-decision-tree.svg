<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">市场环境判断决策树</title>
  <desc id="desc">用三个问题判断市场环境，并转化为工具选择和仓位动作。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#f8fafc"/>
  <text x="490" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">三问判断市场环境</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="360" y="76" width="260" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="490" y="112" text-anchor="middle" font-weight="700" fill="#1e3a8a">当前适合承担风险吗?</text>

    <line x1="490" y1="140" x2="210" y2="200" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="140" x2="490" y2="200" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="140" x2="770" y2="200" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="70" y="202" width="280" height="78" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="210" y="232" text-anchor="middle" font-weight="700" fill="#166534">经济和盈利在改善?</text>
    <text x="210" y="258" text-anchor="middle" fill="#1e293b">是: 权益胜率可能上升</text>

    <rect x="350" y="202" width="280" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="490" y="232" text-anchor="middle" font-weight="700" fill="#854d0e">流动性在变松?</text>
    <text x="490" y="258" text-anchor="middle" fill="#1e293b">是: 估值压力可能下降</text>

    <rect x="630" y="202" width="280" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="770" y="232" text-anchor="middle" font-weight="700" fill="#991b1b">风险偏好在下降?</text>
    <text x="770" y="258" text-anchor="middle" fill="#1e293b">是: 防守资产更重要</text>

    <line x1="210" y1="280" x2="210" y2="350" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="280" x2="490" y2="350" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="770" y1="280" x2="770" y2="350" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="80" y="352" width="260" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="210" y="382" text-anchor="middle" font-weight="700" fill="#334155">进攻环境</text>
    <text x="210" y="406" text-anchor="middle" fill="#1e293b">权益仓位可逐步提高</text>

    <rect x="360" y="352" width="260" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="490" y="382" text-anchor="middle" font-weight="700" fill="#334155">修复环境</text>
    <text x="490" y="406" text-anchor="middle" fill="#1e293b">分批、低仓位验证</text>

    <rect x="640" y="352" width="260" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="770" y="382" text-anchor="middle" font-weight="700" fill="#334155">防守环境</text>
    <text x="770" y="406" text-anchor="middle" fill="#1e293b">现金、短债、黄金优先</text>

    <rect x="250" y="474" width="480" height="52" rx="8" fill="#1e293b"/>
    <text x="490" y="507" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">环境判断给的是仓位方向, 不是明天涨跌答案。</text>
  </g>
</svg>
