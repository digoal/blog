<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">市场环境判断的边界</title>
  <desc id="desc">列出市场环境判断能做和不能做的事情，以及小白的行动边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">市场环境判断的使用边界</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="86" width="390" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="265" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">它能帮助你</text>
    <text x="110" y="174" font-size="17" fill="#1e293b">判断哪类风险更值得承担</text>
    <text x="110" y="222" font-size="17" fill="#1e293b">决定进攻、防守还是等待</text>
    <text x="110" y="270" font-size="17" fill="#1e293b">选择现金、债券、权益、黄金等工具</text>
    <text x="110" y="318" font-size="17" fill="#1e293b">给仓位上限一个依据</text>
    <text x="110" y="366" font-size="17" fill="#1e293b">在环境变化时及时复盘</text>

    <rect x="540" y="86" width="390" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="735" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">它不能替你</text>
    <text x="580" y="174" font-size="17" fill="#1e293b">预测明天涨跌</text>
    <text x="580" y="222" font-size="17" fill="#1e293b">保证买入后立刻盈利</text>
    <text x="580" y="270" font-size="17" fill="#1e293b">解释所有短期波动</text>
    <text x="580" y="318" font-size="17" fill="#1e293b">替代止损和仓位纪律</text>
    <text x="580" y="366" font-size="17" fill="#1e293b">把不确定市场变成确定答案</text>
  </g>

  <rect x="160" y="486" width="680" height="50" rx="8" fill="#1e293b"/>
  <text x="500" y="518" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">只要你开始问“明天一定涨吗”, 就已经偏离了环境判断。</text>
</svg>
