<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">四个市场环境核心变量</title>
  <desc id="desc">用经济周期、流动性、利率和风险偏好构成市场环境判断仪表盘。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">市场环境四变量仪表盘</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">先看四个慢变量, 再决定工具和仓位</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="70" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="165" y="158" text-anchor="middle" font-weight="700" fill="#166534">经济周期</text>
    <text x="165" y="186" text-anchor="middle" fill="#1e293b">企业赚钱</text>
    <text x="165" y="208" text-anchor="middle" fill="#1e293b">是在变好还是变差</text>

    <rect x="310" y="126" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="405" y="158" text-anchor="middle" font-weight="700" fill="#1e3a8a">流动性</text>
    <text x="405" y="186" text-anchor="middle" fill="#1e293b">市场钱多</text>
    <text x="405" y="208" text-anchor="middle" fill="#1e293b">还是钱紧</text>

    <rect x="550" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="645" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">利率</text>
    <text x="645" y="186" text-anchor="middle" fill="#1e293b">钱的价格</text>
    <text x="645" y="208" text-anchor="middle" fill="#1e293b">在升还是降</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#5b21b6">风险偏好</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">资金愿不愿意</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">承担波动</text>

    <line x1="165" y1="222" x2="400" y2="316" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="405" y1="222" x2="470" y2="316" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="645" y1="222" x2="570" y2="316" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="885" y1="222" x2="640" y2="316" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="340" y="318" width="360" height="106" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">合成判断</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">四个变量同向: 环境清晰</text>
  <text x="520" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">四个变量打架: 降低仓位</text>

  <rect x="170" y="470" width="700" height="46" rx="8" fill="#1e293b"/>
  <text x="520" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">不是看单个指标, 而是看四个变量是否互相验证。</text>
</svg>
