<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">四变量到工具选择的决策树</title>
  <desc id="desc">根据经济周期、流动性、利率和风险偏好的组合，判断进攻、防守或等待。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">四变量合成后, 再选工具</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="68" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">四个变量是否同向?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">经济、流动性、利率、风险偏好</text>

    <line x1="430" y1="144" x2="230" y2="208" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="144" x2="500" y2="208" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="144" x2="770" y2="208" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="70" y="210" width="320" height="82" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="230" y="240" text-anchor="middle" font-weight="700" fill="#166534">同向改善</text>
    <text x="230" y="266" text-anchor="middle" fill="#1e293b">经济修复 + 钱变松 + 风险偏好回升</text>

    <rect x="340" y="210" width="320" height="82" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="240" text-anchor="middle" font-weight="700" fill="#854d0e">变量打架</text>
    <text x="500" y="266" text-anchor="middle" fill="#1e293b">经济弱但流动性松, 或利率方向不明</text>

    <rect x="610" y="210" width="320" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="770" y="240" text-anchor="middle" font-weight="700" fill="#991b1b">同向恶化</text>
    <text x="770" y="266" text-anchor="middle" fill="#1e293b">盈利下行 + 钱变紧 + 风险偏好下降</text>

    <line x1="230" y1="292" x2="230" y2="356" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="292" x2="500" y2="356" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="770" y1="292" x2="770" y2="356" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="358" width="280" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="230" y="388" text-anchor="middle" font-weight="700" fill="#334155">进攻</text>
    <text x="230" y="414" text-anchor="middle" fill="#1e293b">宽基、成长、弹性资产</text>

    <rect x="360" y="358" width="280" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="500" y="388" text-anchor="middle" font-weight="700" fill="#334155">验证</text>
    <text x="500" y="414" text-anchor="middle" fill="#1e293b">小仓、分批、现金缓冲</text>

    <rect x="630" y="358" width="280" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="770" y="388" text-anchor="middle" font-weight="700" fill="#334155">防守</text>
    <text x="770" y="414" text-anchor="middle" fill="#1e293b">现金、短债、黄金优先</text>

    <rect x="240" y="496" width="520" height="50" rx="8" fill="#1e293b"/>
    <text x="500" y="528" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">变量越一致, 仓位越有依据; 变量越冲突, 仓位越要保守。</text>
  </g>
</svg>
