<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">四变量使用边界</title>
  <desc id="desc">说明四个市场变量能帮助判断什么，不能替代什么。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">四变量的使用边界</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="86" width="390" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="265" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">能做</text>
    <text x="110" y="174" font-size="17" fill="#1e293b">识别环境是进攻、防守还是验证</text>
    <text x="110" y="222" font-size="17" fill="#1e293b">解释为什么某类资产胜率变化</text>
    <text x="110" y="270" font-size="17" fill="#1e293b">给工具选择提供依据</text>
    <text x="110" y="318" font-size="17" fill="#1e293b">提示什么时候该降仓位</text>
    <text x="110" y="366" font-size="17" fill="#1e293b">帮助复盘原假设是否失效</text>

    <rect x="540" y="86" width="390" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="735" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">不能做</text>
    <text x="580" y="174" font-size="17" fill="#1e293b">预测具体点位和日期</text>
    <text x="580" y="222" font-size="17" fill="#1e293b">用一个指标替代完整判断</text>
    <text x="580" y="270" font-size="17" fill="#1e293b">证明某个产品一定赚钱</text>
    <text x="580" y="318" font-size="17" fill="#1e293b">替代止损、仓位和现金管理</text>
    <text x="580" y="366" font-size="17" fill="#1e293b">消除市场噪音和突发事件</text>
  </g>

  <rect x="170" y="486" width="660" height="50" rx="8" fill="#1e293b"/>
  <text x="500" y="518" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">只看一个变量, 很容易把复杂市场看成单选题。</text>
</svg>
