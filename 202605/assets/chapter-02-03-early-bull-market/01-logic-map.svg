<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">牛市初期的逻辑链</title>
  <desc id="desc">展示从四变量修复到宽基ETF、成长风格和弹性行业的推导链。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市初期: 先买市场修复, 再买弹性</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">牛市初期不是已经安全, 而是风险补偿开始改善</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="50" y="126" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="145" y="158" text-anchor="middle" font-weight="700" fill="#1e3a8a">四变量修复</text>
    <text x="145" y="186" text-anchor="middle" fill="#1e293b">经济不再恶化</text>
    <text x="145" y="208" text-anchor="middle" fill="#1e293b">钱和情绪改善</text>

    <rect x="285" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="380" y="158" text-anchor="middle" font-weight="700" fill="#166534">估值修复</text>
    <text x="380" y="186" text-anchor="middle" fill="#1e293b">风险溢价下降</text>
    <text x="380" y="208" text-anchor="middle" fill="#1e293b">宽基先受益</text>

    <rect x="520" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="615" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">成长风格</text>
    <text x="615" y="186" text-anchor="middle" fill="#1e293b">远期盈利</text>
    <text x="615" y="208" text-anchor="middle" fill="#1e293b">被重新定价</text>

    <rect x="755" y="126" width="230" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="870" y="158" text-anchor="middle" font-weight="700" fill="#5b21b6">弹性行业</text>
    <text x="870" y="186" text-anchor="middle" fill="#1e293b">情绪回升后</text>
    <text x="870" y="208" text-anchor="middle" fill="#1e293b">波动和收益都放大</text>

    <line x1="240" y1="174" x2="276" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="475" y1="174" x2="511" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="710" y1="174" x2="746" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="316" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">小白顺序</text>
  <text x="520" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">先宽基ETF承接市场平均修复, 再观察成长风格, 最后才考虑弹性行业。</text>
  <text x="520" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">越往后弹性越大, 对仓位和退出条件要求越高。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">牛市初期的核心动作是分批验证, 不是一次性梭哈。</text>
</svg>
