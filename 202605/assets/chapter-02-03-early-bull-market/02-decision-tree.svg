<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">牛市初期工具选择决策树</title>
  <desc id="desc">判断是否进入牛市初期，以及宽基ETF、成长风格、弹性行业的使用顺序。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市初期不要一步跳到高弹性</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="345" y="76" width="310" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">四变量是否开始修复?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">经济、流动性、利率、风险偏好</text>

    <line x1="430" y1="146" x2="260" y2="212" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="740" y2="212" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="214" width="340" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="260" y="244" text-anchor="middle" font-weight="700" fill="#991b1b">没有修复</text>
    <text x="260" y="270" text-anchor="middle" fill="#1e293b">继续防守, 现金和短债优先</text>

    <rect x="570" y="214" width="340" height="78" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="740" y="244" text-anchor="middle" font-weight="700" fill="#166534">开始修复</text>
    <text x="740" y="270" text-anchor="middle" fill="#1e293b">用小仓位验证, 不满仓确认</text>

    <line x1="740" y1="292" x2="740" y2="346" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="570" y="348" width="340" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="740" y="378" text-anchor="middle" font-weight="700" fill="#334155">第一层: 宽基ETF</text>
    <text x="740" y="402" text-anchor="middle" fill="#1e293b">买市场平均修复, 降低选错行业风险</text>

    <line x1="740" y1="424" x2="640" y2="486" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="740" y1="424" x2="850" y2="486" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="480" y="488" width="280" height="62" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="620" y="512" text-anchor="middle" font-weight="700" fill="#854d0e">第二层: 成长风格</text>
    <text x="620" y="534" text-anchor="middle" fill="#1e293b">确认后逐步增加</text>

    <rect x="790" y="488" width="170" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="875" y="512" text-anchor="middle" font-weight="700" fill="#5b21b6">第三层</text>
    <text x="875" y="534" text-anchor="middle" fill="#5b21b6">弹性行业</text>
  </g>
</svg>
