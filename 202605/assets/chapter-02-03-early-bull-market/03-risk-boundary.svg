<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">牛市初期风险边界</title>
  <desc id="desc">列出牛市初期可以做、必须降仓和必须回避的条件。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市初期的边界: 先验证, 再加速</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">可以做</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">宽基ETF小仓分批</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">观察成长风格扩散</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">用成交和回撤验证</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">写好前提失效条件</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">保留现金等待回踩</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须降仓</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">只有价格涨, 变量未修复</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">反弹缩量, 热点不扩散</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">利率或流动性再次转紧</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">宽基未稳就追行业</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">亏损触发事前规则</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">借钱抢反弹</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">一上来满仓行业ETF</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">把弹性当确定性</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">听消息追小票</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">没有卖出条件</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">牛市初期最怕把“修复”误读成“确认”。</text>
</svg>
