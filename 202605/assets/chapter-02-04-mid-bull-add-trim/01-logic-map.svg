<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">牛市中期加仓与止盈逻辑链</title>
  <desc id="desc">展示趋势确认后为什么可以加仓，但必须同步设置止盈和风险边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市中期: 趋势确认后, 加仓和止盈要一起设计</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">确认趋势不是取消风险, 而是提高胜率后重新管理仓位</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="55" y="126" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="158" text-anchor="middle" font-weight="700" fill="#1e3a8a">趋势确认</text>
    <text x="150" y="186" text-anchor="middle" fill="#1e293b">宽基站稳</text>
    <text x="150" y="208" text-anchor="middle" fill="#1e293b">成交和扩散改善</text>

    <rect x="300" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="395" y="158" text-anchor="middle" font-weight="700" fill="#166534">胜率提高</text>
    <text x="395" y="186" text-anchor="middle" fill="#1e293b">仓位可增加</text>
    <text x="395" y="208" text-anchor="middle" fill="#1e293b">但不能满仓</text>

    <rect x="545" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="640" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">分层加仓</text>
    <text x="640" y="186" text-anchor="middle" fill="#1e293b">突破加一点</text>
    <text x="640" y="208" text-anchor="middle" fill="#1e293b">回踩确认加一点</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#991b1b">分批止盈</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">上涨越多</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">风险越要锁定</text>

    <line x1="245" y1="174" x2="291" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="174" x2="536" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="735" y1="174" x2="781" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="318" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">核心纪律</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">牛市中期可以提高仓位, 但每一次加仓都必须对应一个止盈或失效条件。</text>
  <text x="520" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">上涨不是取消风险的理由, 而是把浮盈变成规则管理对象的信号。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">趋势确认后最容易亏在两件事: 追太急, 卖太晚。</text>
</svg>
