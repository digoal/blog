<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">牛市中期加仓决策树</title>
  <desc id="desc">趋势确认后，根据仓位、回撤和估值决定加仓、持有、止盈或复盘。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">趋势确认后, 每一步都要问仓位</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">趋势是否确认?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">宽基、成交、板块扩散是否同步</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#991b1b">未确认</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">不加仓, 回到观察或防守</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#166534">已确认</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">检查仓位和止盈计划</text>

    <line x1="750" y1="292" x2="750" y2="346" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="590" y="348" width="320" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="750" y="378" text-anchor="middle" font-weight="700" fill="#334155">仓位低于上限?</text>
    <text x="750" y="402" text-anchor="middle" fill="#1e293b">是: 分层加仓; 否: 只持有或止盈</text>

    <line x1="750" y1="424" x2="640" y2="488" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="424" x2="860" y2="488" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="475" y="490" width="290" height="62" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="620" y="514" text-anchor="middle" font-weight="700" fill="#854d0e">突破或回踩确认</text>
    <text x="620" y="536" text-anchor="middle" fill="#1e293b">加一层, 同步写退出</text>

    <rect x="795" y="490" width="170" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="880" y="514" text-anchor="middle" font-weight="700" fill="#5b21b6">估值过热</text>
    <text x="880" y="536" text-anchor="middle" fill="#5b21b6">分批止盈</text>
  </g>
</svg>
