<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">牛市中期加仓止盈边界</title>
  <desc id="desc">列出牛市中期可加仓、应止盈和必须复盘的条件。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市中期: 越顺越要守边界</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">可以加仓</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">宽基趋势仍向上</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">成交和行业扩散配合</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">仓位低于事前上限</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">回踩后能重新站稳</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">退出条件已写清楚</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">应该止盈</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">仓位明显超过上限</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">估值和情绪快速升温</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">单一行业涨幅过大</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">浮盈影响纪律</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">原目标已部分实现</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须复盘</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">宽基跌破趋势区间</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">成交放大但价格不涨</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">行业轮动无法扩散</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">利率或流动性转紧</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">加仓变成追涨冲动</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">牛市中期不是不卖, 而是用规则把利润分批带走。</text>
</svg>
