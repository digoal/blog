<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">牛市末期三热降风险逻辑链</title>
  <desc id="desc">展示估值过热、成交过热、情绪过热如何推导到降低仓位和分批止盈。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市末期: 三热出现时, 不猜顶, 先降风险</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">顶部无法精确预测, 但风险补偿变差可以观察</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="70" y="126" width="190" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="165" y="158" text-anchor="middle" font-weight="700" fill="#991b1b">估值过热</text>
    <text x="165" y="186" text-anchor="middle" fill="#1e293b">价格跑得比</text>
    <text x="165" y="208" text-anchor="middle" fill="#1e293b">盈利更快</text>

    <rect x="310" y="126" width="190" height="96" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="405" y="158" text-anchor="middle" font-weight="700" fill="#9a3412">成交过热</text>
    <text x="405" y="186" text-anchor="middle" fill="#1e293b">资金拥挤</text>
    <text x="405" y="208" text-anchor="middle" fill="#1e293b">换手过快</text>

    <rect x="550" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="645" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">情绪过热</text>
    <text x="645" y="186" text-anchor="middle" fill="#1e293b">人人谈赚钱</text>
    <text x="645" y="208" text-anchor="middle" fill="#1e293b">忽视亏损路径</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#5b21b6">风险补偿下降</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">上涨空间变窄</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">回撤空间变大</text>

    <line x1="260" y1="174" x2="301" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="174" x2="541" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="740" y1="174" x2="781" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="318" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">小白结论</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">三热不是卖光信号, 而是降仓、止盈、减少弹性风险的信号。</text>
  <text x="520" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">不要试图卖在最高点, 要把“活到下一轮”放在“多赚最后一段”之前。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">牛市末期最贵的错误, 是把运气当能力。</text>
</svg>
