<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">牛市末期降风险决策树</title>
  <desc id="desc">根据估值、成交和情绪是否过热，决定持有、分批止盈、降弹性或转入防守。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">三热越多, 仓位越要降</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">出现几个过热信号?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">估值、成交、情绪</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="146" x2="500" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#166534">0-1个</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">趋势仍可持有, 不盲目加速</text>

    <rect x="340" y="216" width="320" height="76" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="246" text-anchor="middle" font-weight="700" fill="#854d0e">2个</text>
    <text x="500" y="270" text-anchor="middle" fill="#1e293b">停止加仓, 分批止盈</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#991b1b">3个</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">降低弹性, 提高现金和防守</text>

    <line x1="250" y1="292" x2="250" y2="358" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="292" x2="500" y2="358" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="292" x2="750" y2="358" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="100" y="360" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="250" y="390" text-anchor="middle" font-weight="700" fill="#334155">持有但不追</text>
    <text x="250" y="414" text-anchor="middle" fill="#1e293b">继续按趋势规则复盘</text>

    <rect x="350" y="360" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="500" y="390" text-anchor="middle" font-weight="700" fill="#334155">减一部分</text>
    <text x="500" y="414" text-anchor="middle" fill="#1e293b">锁定浮盈, 降低行业集中</text>

    <rect x="600" y="360" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="750" y="390" text-anchor="middle" font-weight="700" fill="#334155">切换防守</text>
    <text x="750" y="414" text-anchor="middle" fill="#1e293b">现金、短债、低波动优先</text>

    <rect x="230" y="496" width="540" height="50" rx="8" fill="#1e293b"/>
    <text x="500" y="528" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">降风险不是看空, 是承认风险补偿已经变差。</text>
  </g>
</svg>
