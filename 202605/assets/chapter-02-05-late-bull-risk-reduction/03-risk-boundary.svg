<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">牛市末期风险边界</title>
  <desc id="desc">列出牛市末期可以持有、应该降风险和必须回避的条件。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">牛市末期: 不卖最高点, 只守生存线</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">可以持有</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">只有一个过热信号</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">仓位仍低于上限</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">趋势未破坏</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">止盈计划已写好</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">不再追高加仓</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">应该降风险</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">估值和成交同时过热</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">情绪明显亢奋</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">弹性行业占比过高</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">浮盈让你不愿复盘</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">身边新手大量入场</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">借钱加仓</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">满仓追最热行业</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">用“这次不一样”解释高估</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">放弃止盈规则</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">只看收益截图做决策</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">越接近狂热, 越要把收益从市场里搬回规则里。</text>
</svg>
