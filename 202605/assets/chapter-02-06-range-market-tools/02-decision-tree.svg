<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">震荡市工具选择决策树</title>
  <desc id="desc">根据资金期限、波动承受力和纪律能力选择现金、红利ETF、可转债或网格。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">震荡市先问钱的用途, 再选工具</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">这笔钱多久不用?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">短期钱不能承担震荡波动</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#5b21b6">短期要用</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">现金、货币基金、短债优先</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#166534">中长期闲钱</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">再看波动和纪律能力</text>

    <line x1="750" y1="292" x2="650" y2="358" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="292" x2="860" y2="358" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="480" y="360" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="630" y="390" text-anchor="middle" font-weight="700" fill="#334155">能承受权益波动?</text>
    <text x="630" y="414" text-anchor="middle" fill="#1e293b">红利ETF或宽基低仓位</text>

    <rect x="800" y="360" width="170" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="885" y="390" text-anchor="middle" font-weight="700" fill="#854d0e">有纪律?</text>
    <text x="885" y="414" text-anchor="middle" fill="#854d0e">小仓网格</text>

    <rect x="250" y="500" width="500" height="46" rx="8" fill="#1e293b"/>
    <text x="500" y="529" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">如果无法执行买卖规则, 网格就会变成越跌越补的陷阱。</text>
  </g>
</svg>
