<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">震荡市工具风险边界</title>
  <desc id="desc">列出红利ETF、可转债、网格和现金管理在震荡市中的适用与回避边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">震荡市工具边界: 能用, 但不能乱用</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">相对适合</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">现金和短债打底</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">红利ETF低仓位</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">低估值、分散标的网格</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">小仓可转债学习</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">固定复盘周期</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须谨慎</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">红利高股息不等于保本</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">可转债有信用和强赎风险</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">网格需要资金和纪律</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">震荡可能变单边下跌</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">现金收益低但有选择权</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">短期钱买权益波动</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">无上限地网格补仓</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">满仓押震荡不破</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">把高股息当稳赚</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">不懂可转债条款就重仓</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">震荡市最大的风险, 是把“反复波动”误以为“没有趋势风险”。</text>
</svg>
