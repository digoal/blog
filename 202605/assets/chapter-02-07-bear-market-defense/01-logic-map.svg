<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">熊市防守工具逻辑链</title>
  <desc id="desc">展示熊市中货币基金、短债、黄金和分批定投的不同任务。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">熊市: 先保命, 再保留修复机会</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">熊市不是抄底比赛, 是现金流、心理和仓位纪律的压力测试</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="55" y="126" width="190" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="150" y="158" text-anchor="middle" font-weight="700" fill="#991b1b">系统性下跌</text>
    <text x="150" y="186" text-anchor="middle" fill="#1e293b">盈利、估值</text>
    <text x="150" y="208" text-anchor="middle" fill="#1e293b">情绪同时承压</text>

    <rect x="300" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="395" y="158" text-anchor="middle" font-weight="700" fill="#166534">货币基金/短债</text>
    <text x="395" y="186" text-anchor="middle" fill="#1e293b">保护流动性</text>
    <text x="395" y="208" text-anchor="middle" fill="#1e293b">降低净值波动</text>

    <rect x="545" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="640" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">黄金</text>
    <text x="640" y="186" text-anchor="middle" fill="#1e293b">对冲信用</text>
    <text x="640" y="208" text-anchor="middle" fill="#1e293b">和货币不确定性</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#1e3a8a">分批定投</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">小额参与</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">未来修复</text>

    <line x1="245" y1="174" x2="291" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="174" x2="536" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="735" y1="174" x2="781" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="318" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">小白顺序</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">先把短期钱和生活钱放到低波动工具, 再考虑黄金和小额定投。</text>
  <text x="520" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">熊市里的定投不是抄底, 是用可承受亏损换未来修复概率。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">现金不是懦弱, 是熊市里最贵的选择权。</text>
</svg>
