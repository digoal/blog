<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">熊市工具选择决策树</title>
  <desc id="desc">根据资金期限、风险承受力和市场修复信号选择货币基金、短债、黄金或分批定投。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">熊市先分资金, 再谈机会</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">这笔钱能承受多久回撤?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">熊市最先考验时间和现金流</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#166534">短期要用/承受不了亏损</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">货币基金、短债、现金管理</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#854d0e">长期闲钱/能承受波动</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">再看对冲和定投</text>

    <line x1="750" y1="292" x2="640" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="292" x2="860" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="480" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="630" y="392" text-anchor="middle" font-weight="700" fill="#334155">担心信用/货币冲击?</text>
    <text x="630" y="416" text-anchor="middle" fill="#1e293b">少量黄金作对冲</text>

    <rect x="800" y="362" width="170" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="885" y="392" text-anchor="middle" font-weight="700" fill="#334155">看长期修复?</text>
    <text x="885" y="416" text-anchor="middle" fill="#334155">小额定投</text>

    <rect x="230" y="500" width="540" height="46" rx="8" fill="#1e293b"/>
    <text x="500" y="529" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">熊市里所有进攻动作, 都必须小到不会破坏生活现金流。</text>
  </g>
</svg>
