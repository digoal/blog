<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">熊市工具风险边界</title>
  <desc id="desc">列出熊市中货币基金、短债、黄金和定投的适用与回避边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">熊市边界: 防守优先, 进攻小额</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">优先使用</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">现金和货币基金</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">短债和低波动工具</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">少量黄金对冲</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">宽基小额定投</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">固定复盘和再平衡</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须谨慎</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">短债也有利率和信用风险</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">黄金不是保本资产</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">定投可能长期浮亏</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">熊市反弹不等于反转</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">心理承受力会被低估</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">借钱抄底</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">满仓赌政策底</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">用生活钱定投</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">越跌越加没有上限</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">把黄金当稳赚避险</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">熊市的第一收益, 是不被迫在最低点卖出。</text>
</svg>
