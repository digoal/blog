<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">利率下行工具逻辑链</title>
  <desc id="desc">展示利率下行如何影响债券ETF、高股息资产和REITs。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">利率下行: 钱变便宜, 现金流资产被重估</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">关键不是“利率下行一定赚钱”, 而是理解不同工具受益路径</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="55" y="126" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="158" text-anchor="middle" font-weight="700" fill="#1e3a8a">利率下行</text>
    <text x="150" y="186" text-anchor="middle" fill="#1e293b">钱的价格下降</text>
    <text x="150" y="208" text-anchor="middle" fill="#1e293b">折现率下降</text>

    <rect x="300" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="395" y="158" text-anchor="middle" font-weight="700" fill="#166534">债券ETF</text>
    <text x="395" y="186" text-anchor="middle" fill="#1e293b">旧债票息更值钱</text>
    <text x="395" y="208" text-anchor="middle" fill="#1e293b">价格可能上升</text>

    <rect x="545" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="640" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">高股息</text>
    <text x="640" y="186" text-anchor="middle" fill="#1e293b">分红相对吸引力</text>
    <text x="640" y="208" text-anchor="middle" fill="#1e293b">可能提升</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#5b21b6">REITs</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">现金流折现</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">和融资成本变化</text>

    <line x1="245" y1="174" x2="291" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="174" x2="536" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="735" y1="174" x2="781" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="318" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">小白顺序</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">先理解债券久期, 再看高股息分红质量, 最后评估REITs项目现金流。</text>
  <text x="520" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">利率下行若来自经济太弱, 权益类现金流资产也可能承压。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">利率是机会来源, 也是风险来源。</text>
</svg>
