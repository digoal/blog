<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">利率下行工具选择决策树</title>
  <desc id="desc">根据利率下行原因、风险承受力和现金流质量选择债券ETF、高股息或REITs。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">利率下行先问原因, 再选资产</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">利率为什么下行?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">宽松预期, 还是经济走弱?</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#166534">温和宽松</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">债券、高股息、REITs都可观察</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#991b1b">经济压力下行</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">先债券, 谨慎权益现金流</text>

    <line x1="250" y1="292" x2="250" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="292" x2="750" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="362" width="320" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="250" y="392" text-anchor="middle" font-weight="700" fill="#334155">能承受净值波动?</text>
    <text x="250" y="416" text-anchor="middle" fill="#1e293b">可看中短债ETF, 久期逐步增加</text>

    <rect x="590" y="362" width="320" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="750" y="392" text-anchor="middle" font-weight="700" fill="#334155">现金流是否稳?</text>
    <text x="750" y="416" text-anchor="middle" fill="#1e293b">高股息和REITs先看质量</text>

    <rect x="230" y="500" width="540" height="46" rx="8" fill="#1e293b"/>
    <text x="500" y="529" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">利率下行不是买入指令, 是重新比较现金流资产的起点。</text>
  </g>
</svg>
