<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">利率下行工具风险边界</title>
  <desc id="desc">列出债券ETF、高股息和REITs在利率下行环境中的适用与回避边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">利率下行工具边界: 看久期, 看现金流, 看经济压力</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">相对适合</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">中短久期债券ETF</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">分红质量稳定的高股息</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">现金流清楚的REITs</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">分批配置, 不追涨</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">固定复盘利率方向</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须谨慎</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">长久期债券波动更大</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">高股息可能是股价下跌造成</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">REITs分派不等于保本收益</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">经济下行会伤害现金流</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">利率反弹会造成回撤</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">不懂久期就重仓长债</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">只看股息率不看盈利</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">把REITs当无风险高息</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">利率已大幅下行后追涨</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">忽略信用和流动性风险</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">利率下行能抬估值, 但不能替现金流质量背书。</text>
</svg>
