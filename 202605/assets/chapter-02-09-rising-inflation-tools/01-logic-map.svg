<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">通胀上行工具逻辑链</title>
  <desc id="desc">展示通胀上行如何影响黄金、商品基金、资源股和REITs。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">通胀上行: 现金购买力下降, 实物和现金流资产被重估</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">通胀不是单一利好, 要看成本能否传导、价格是否已透支</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="55" y="126" width="190" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="150" y="158" text-anchor="middle" font-weight="700" fill="#991b1b">通胀上行</text>
    <text x="150" y="186" text-anchor="middle" fill="#1e293b">货币购买力</text>
    <text x="150" y="208" text-anchor="middle" fill="#1e293b">下降</text>

    <rect x="300" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="395" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">黄金</text>
    <text x="395" y="186" text-anchor="middle" fill="#1e293b">货币信用</text>
    <text x="395" y="208" text-anchor="middle" fill="#1e293b">重新定价</text>

    <rect x="545" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="640" y="158" text-anchor="middle" font-weight="700" fill="#166534">商品/资源股</text>
    <text x="640" y="186" text-anchor="middle" fill="#1e293b">价格上涨</text>
    <text x="640" y="208" text-anchor="middle" fill="#1e293b">改善收入或利润</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#5b21b6">REITs</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">租金/收费</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">能否传导通胀</text>

    <line x1="245" y1="174" x2="291" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="174" x2="536" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="735" y1="174" x2="781" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="318" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">小白顺序</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">黄金先看实际利率和货币信用, 商品看供需, 资源股看利润弹性, REITs看租金传导。</text>
  <text x="520" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">通胀资产波动大, 只能作为组合分散, 不能作为追涨主仓位。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">通胀上行时, 价格保护和价格波动会同时出现。</text>
</svg>
