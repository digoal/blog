<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">通胀上行工具选择决策树</title>
  <desc id="desc">根据通胀来源、供需状态和成本传导能力选择黄金、商品基金、资源股或REITs。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">通胀上行先问来源, 再选工具</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">通胀来自哪里?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">货币、供给冲击、需求过热?</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="146" x2="500" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#854d0e">货币信用担忧</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">少量黄金分散风险</text>

    <rect x="340" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="500" y="246" text-anchor="middle" font-weight="700" fill="#166534">商品供需紧张</text>
    <text x="500" y="270" text-anchor="middle" fill="#1e293b">商品基金或资源行业观察</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#5b21b6">租金/收费能传导</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">REITs现金流需验证</text>

    <line x1="250" y1="292" x2="250" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="292" x2="500" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="292" x2="750" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="95" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="245" y="392" text-anchor="middle" font-weight="700" fill="#334155">看实际利率</text>
    <text x="245" y="416" text-anchor="middle" fill="#1e293b">实际利率下行更支持黄金</text>

    <rect x="350" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="500" y="392" text-anchor="middle" font-weight="700" fill="#334155">看供需和库存</text>
    <text x="500" y="416" text-anchor="middle" fill="#1e293b">供给缺口才有持续性</text>

    <rect x="605" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="755" y="392" text-anchor="middle" font-weight="700" fill="#334155">看租约和负债</text>
    <text x="755" y="416" text-anchor="middle" fill="#1e293b">现金流稳定才有意义</text>

    <rect x="230" y="500" width="540" height="46" rx="8" fill="#1e293b"/>
    <text x="500" y="529" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">通胀工具不是越涨越买, 而是先看价格是否已透支。</text>
  </g>
</svg>
