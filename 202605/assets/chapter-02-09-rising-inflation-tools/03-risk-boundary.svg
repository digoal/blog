<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">通胀上行工具风险边界</title>
  <desc id="desc">列出黄金、商品基金、资源股和REITs在通胀上行环境中的适用与回避边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">通胀工具边界: 防通胀不等于防回撤</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">相对适合</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">少量黄金分散风险</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">供需紧张的商品基金</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">成本能传导的资源股</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">租金能调整的REITs</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">分批、小仓、复盘</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须谨慎</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">黄金受实际利率影响</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">商品基金波动大</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">资源股有经营和估值风险</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">REITs可能被融资成本压制</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">通胀回落会打击价格</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">把黄金当保本资产</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">追涨高波动商品</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">只看涨价不看库存</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">把资源股当商品本身</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">忽略REITs项目质量</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">通胀保护来自机制匹配, 不是来自产品名字。</text>
</svg>
