<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">海外资产配置风险叠加逻辑链</title>
  <desc id="desc">展示美股、港股、QDII和美元资产如何叠加市场风险、汇率风险和产品结构风险。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">海外资产配置: 买的不只是海外市场, 还买了汇率和结构风险</text>
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">海外配置的价值是分散, 风险是多了一层看不见的变量</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="55" y="126" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="158" text-anchor="middle" font-weight="700" fill="#1e3a8a">海外市场风险</text>
    <text x="150" y="186" text-anchor="middle" fill="#1e293b">经济、估值</text>
    <text x="150" y="208" text-anchor="middle" fill="#1e293b">利率、行业</text>

    <rect x="300" y="126" width="190" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="395" y="158" text-anchor="middle" font-weight="700" fill="#854d0e">汇率风险</text>
    <text x="395" y="186" text-anchor="middle" fill="#1e293b">美元/港币</text>
    <text x="395" y="208" text-anchor="middle" fill="#1e293b">换回人民币</text>

    <rect x="545" y="126" width="190" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="640" y="158" text-anchor="middle" font-weight="700" fill="#5b21b6">产品结构风险</text>
    <text x="640" y="186" text-anchor="middle" fill="#1e293b">QDII额度</text>
    <text x="640" y="208" text-anchor="middle" fill="#1e293b">溢价、时差</text>

    <rect x="790" y="126" width="190" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700" fill="#166534">分散价值</text>
    <text x="885" y="186" text-anchor="middle" fill="#1e293b">降低单一市场</text>
    <text x="885" y="208" text-anchor="middle" fill="#1e293b">和单一货币暴露</text>

    <line x1="245" y1="174" x2="291" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="490" y1="174" x2="536" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="735" y1="174" x2="781" y2="174" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <rect x="130" y="318" width="780" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">小白结论</text>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">海外配置先问“解决什么分散问题”, 再问“承担了哪些新风险”。</text>
  <text x="520" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">美股、港股、QDII、美元资产不是同一件事, 不能混成一个“海外”标签。</text>
  <text x="520" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">分散不是逃避风险, 而是把风险拆开管理。</text>
</svg>
