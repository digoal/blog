<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">海外资产配置决策树</title>
  <desc id="desc">根据配置目的、汇率承受力和产品结构选择美股、港股、QDII或美元资产。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">海外配置先问目的, 再选通道</text>

  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="350" y="76" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="500" y="106" text-anchor="middle" font-weight="700" fill="#1e3a8a">为什么要配置海外?</text>
    <text x="500" y="130" text-anchor="middle" fill="#1e293b">分散市场? 分散货币? 追热点?</text>

    <line x1="430" y1="146" x2="250" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="146" x2="500" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="570" y1="146" x2="750" y2="214" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="90" y="216" width="320" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="250" y="246" text-anchor="middle" font-weight="700" fill="#166534">分散市场风险</text>
    <text x="250" y="270" text-anchor="middle" fill="#1e293b">宽基QDII或海外指数工具</text>

    <rect x="340" y="216" width="320" height="76" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="246" text-anchor="middle" font-weight="700" fill="#854d0e">分散货币风险</text>
    <text x="500" y="270" text-anchor="middle" fill="#1e293b">美元资产和汇率敞口</text>

    <rect x="590" y="216" width="320" height="76" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="750" y="246" text-anchor="middle" font-weight="700" fill="#991b1b">追热点</text>
    <text x="750" y="270" text-anchor="middle" fill="#1e293b">暂停, 先查溢价和风险</text>

    <line x1="250" y1="292" x2="250" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="292" x2="500" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="750" y1="292" x2="750" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="95" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="245" y="392" text-anchor="middle" font-weight="700" fill="#334155">看估值和相关性</text>
    <text x="245" y="416" text-anchor="middle" fill="#1e293b">是否真能分散A股风险</text>

    <rect x="350" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="500" y="392" text-anchor="middle" font-weight="700" fill="#334155">看汇率和期限</text>
    <text x="500" y="416" text-anchor="middle" fill="#1e293b">短期用钱不赌汇率</text>

    <rect x="605" y="362" width="300" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="755" y="392" text-anchor="middle" font-weight="700" fill="#334155">看QDII溢价</text>
    <text x="755" y="416" text-anchor="middle" fill="#1e293b">高溢价不等于好机会</text>

    <rect x="230" y="500" width="540" height="46" rx="8" fill="#1e293b"/>
    <text x="500" y="529" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">海外配置的第一目标是分散, 不是追更远的热点。</text>
  </g>
</svg>
