<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">海外资产配置风险边界</title>
  <desc id="desc">列出海外资产配置中美股、港股、QDII和美元资产的适用与回避边界。</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">海外资产边界: 多一层市场, 多一层汇率</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="86" width="270" height="360" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="195" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">相对适合</text>
    <text x="92" y="174" font-size="16" fill="#1e293b">长期分散配置</text>
    <text x="92" y="222" font-size="16" fill="#1e293b">宽基而非单一主题</text>
    <text x="92" y="270" font-size="16" fill="#1e293b">能承受汇率波动</text>
    <text x="92" y="318" font-size="16" fill="#1e293b">低溢价或无溢价工具</text>
    <text x="92" y="366" font-size="16" fill="#1e293b">固定复盘再平衡</text>

    <rect x="365" y="86" width="270" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="500" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">必须谨慎</text>
    <text x="397" y="174" font-size="16" fill="#1e293b">美股估值和利率风险</text>
    <text x="397" y="222" font-size="16" fill="#1e293b">港股受中国和海外流动性影响</text>
    <text x="397" y="270" font-size="16" fill="#1e293b">QDII有额度和溢价风险</text>
    <text x="397" y="318" font-size="16" fill="#1e293b">美元资产有汇率双向波动</text>
    <text x="397" y="366" font-size="16" fill="#1e293b">时差影响交易执行</text>

    <rect x="670" y="86" width="270" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="805" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">必须回避</text>
    <text x="702" y="174" font-size="16" fill="#1e293b">短期钱赌汇率</text>
    <text x="702" y="222" font-size="16" fill="#1e293b">QDII高溢价追涨</text>
    <text x="702" y="270" font-size="16" fill="#1e293b">把美元当只涨不跌</text>
    <text x="702" y="318" font-size="16" fill="#1e293b">不看底层持仓</text>
    <text x="702" y="366" font-size="16" fill="#1e293b">用海外配置逃避仓位纪律</text>
  </g>

  <rect x="150" y="488" width="700" height="48" rx="8" fill="#1e293b"/>
  <text x="500" y="519" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">海外配置不是更高级, 而是风险维度更多。</text>
</svg>
