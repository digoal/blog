<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img">
  <title>市场切换的仓位调整逻辑链</title>
  <desc>展示市场切换时从猜方向改为调整仓位的前提、机制和行动结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f5f7f"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#f7f9fb"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2d3d">市场切换: 不是猜对方向, 而是校准仓位</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#1f2d3d">
    <rect x="48" y="110" width="170" height="88" rx="8" fill="#ffffff" stroke="#6c8ebf" stroke-width="2"/>
    <text x="133" y="143" text-anchor="middle" font-weight="700">前提变化</text>
    <text x="133" y="171" text-anchor="middle">周期/流动性/利率</text>
    <text x="133" y="194" text-anchor="middle">风险偏好变了</text>
    <line x1="218" y1="154" x2="282" y2="154" stroke="#3f5f7f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="282" y="110" width="170" height="88" rx="8" fill="#ffffff" stroke="#82b366" stroke-width="2"/>
    <text x="367" y="143" text-anchor="middle" font-weight="700">暴露错位</text>
    <text x="367" y="171" text-anchor="middle">原仓位承受的风险</text>
    <text x="367" y="194" text-anchor="middle">不再匹配环境</text>
    <line x1="452" y1="154" x2="516" y2="154" stroke="#3f5f7f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="516" y="110" width="170" height="88" rx="8" fill="#ffffff" stroke="#d79b00" stroke-width="2"/>
    <text x="601" y="143" text-anchor="middle" font-weight="700">不做二元押注</text>
    <text x="601" y="171" text-anchor="middle">先降错配风险</text>
    <text x="601" y="194" text-anchor="middle">再小步验证</text>
    <line x1="686" y1="154" x2="750" y2="154" stroke="#3f5f7f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="750" y="110" width="130" height="88" rx="8" fill="#ffffff" stroke="#b85450" stroke-width="2"/>
    <text x="815" y="143" text-anchor="middle" font-weight="700">结果</text>
    <text x="815" y="171" text-anchor="middle">即使判断慢</text>
    <text x="815" y="194" text-anchor="middle">也能活下来</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" fill="#34495e">
    <rect x="110" y="265" width="700" height="82" rx="10" fill="#e8f1fb" stroke="#6c8ebf"/>
    <text x="460" y="298" text-anchor="middle" font-weight="700">核心问题从“会不会涨跌?”改成“当前仓位还适合这个环境吗?”</text>
    <text x="460" y="326" text-anchor="middle">动作顺序: 停止加错方向 -> 减少过重暴露 -> 留出现金缓冲 -> 用小仓位验证新假设</text>
  </g>
</svg>
