<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img">
  <title>市场切换时的仓位决策树</title>
  <desc>根据变量变化数量和持仓错配程度决定观察、轻调仓或重估框架。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#43627f"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fbfcfd"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2d3d">从变量变化判断仓位动作</text>
  <g font-family="Arial, sans-serif" font-size="16" fill="#1f2d3d">
    <rect x="330" y="82" width="260" height="72" rx="8" fill="#ffffff" stroke="#6c8ebf" stroke-width="2"/>
    <text x="460" y="113" text-anchor="middle" font-weight="700">四个变量是否明显变化?</text>
    <text x="460" y="139" text-anchor="middle">周期、流动性、利率、风险偏好</text>
    <line x1="460" y1="154" x2="460" y2="196" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="80" y="205" width="220" height="82" rx="8" fill="#ffffff" stroke="#82b366" stroke-width="2"/>
    <text x="190" y="238" text-anchor="middle" font-weight="700">0-1个变量变弱</text>
    <text x="190" y="264" text-anchor="middle">先观察, 不因波动大换仓</text>
    <rect x="350" y="205" width="220" height="82" rx="8" fill="#ffffff" stroke="#d79b00" stroke-width="2"/>
    <text x="460" y="238" text-anchor="middle" font-weight="700">2个变量同向变化</text>
    <text x="460" y="264" text-anchor="middle">停止加仓, 做轻量校准</text>
    <rect x="620" y="205" width="220" height="82" rx="8" fill="#ffffff" stroke="#b85450" stroke-width="2"/>
    <text x="730" y="238" text-anchor="middle" font-weight="700">3-4个变量同向变化</text>
    <text x="730" y="264" text-anchor="middle">重估市场环境和仓位上限</text>
    <line x1="402" y1="154" x2="190" y2="205" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="460" y1="154" x2="460" y2="205" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="518" y1="154" x2="730" y2="205" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="190" y1="287" x2="190" y2="335" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="460" y1="287" x2="460" y2="335" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="730" y1="287" x2="730" y2="335" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="80" y="342" width="220" height="92" rx="8" fill="#eef7ee" stroke="#82b366"/>
    <text x="190" y="374" text-anchor="middle" font-weight="700">动作</text>
    <text x="190" y="400" text-anchor="middle">保持仓位上限</text>
    <text x="190" y="424" text-anchor="middle">只更新观察清单</text>
    <rect x="350" y="342" width="220" height="92" rx="8" fill="#fff6df" stroke="#d79b00"/>
    <text x="460" y="374" text-anchor="middle" font-weight="700">动作</text>
    <text x="460" y="400" text-anchor="middle">减过热/过重仓</text>
    <text x="460" y="424" text-anchor="middle">提高现金或防守资产</text>
    <rect x="620" y="342" width="220" height="92" rx="8" fill="#fceaea" stroke="#b85450"/>
    <text x="730" y="374" text-anchor="middle" font-weight="700">动作</text>
    <text x="730" y="400" text-anchor="middle">重设股债商品比例</text>
    <text x="730" y="424" text-anchor="middle">用小仓位验证新方向</text>
  </g>
  <text x="460" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#586b7a">规则: 先看变量, 再看仓位错配; 价格涨跌只是提醒, 不是唯一证据。</text>
</svg>
