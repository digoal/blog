<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img">
  <title>市场切换调仓的风险边界</title>
  <desc>区分允许做、谨慎做和避免做的仓位调整动作。</desc>
  <rect width="920" height="430" fill="#f8fafb"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2d3d">调仓边界: 允许、谨慎、避免</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#1f2d3d">
    <rect x="55" y="92" width="250" height="230" rx="10" fill="#edf7ed" stroke="#82b366" stroke-width="2"/>
    <text x="180" y="128" text-anchor="middle" font-size="20" font-weight="700">允许做</text>
    <text x="85" y="170">1. 停止给旧方向继续加仓</text>
    <text x="85" y="207">2. 降低明显过重风险暴露</text>
    <text x="85" y="244">3. 增加现金或低波动缓冲</text>
    <text x="85" y="281">4. 记录下一次复核条件</text>
    <rect x="335" y="92" width="250" height="230" rx="10" fill="#fff6df" stroke="#d79b00" stroke-width="2"/>
    <text x="460" y="128" text-anchor="middle" font-size="20" font-weight="700">谨慎做</text>
    <text x="365" y="170">1. 用单一信号大幅换仓</text>
    <text x="365" y="207">2. 高频来回追涨杀跌</text>
    <text x="365" y="244">3. 只因短期盈亏改体系</text>
    <text x="365" y="281">4. 把新方向一次买满</text>
    <rect x="615" y="92" width="250" height="230" rx="10" fill="#fceaea" stroke="#b85450" stroke-width="2"/>
    <text x="740" y="128" text-anchor="middle" font-size="20" font-weight="700">避免做</text>
    <text x="645" y="170">1. 方向一变就满仓反手</text>
    <text x="645" y="207">2. 借钱补仓或摊平亏损</text>
    <text x="645" y="244">3. 没有上限地加风险</text>
    <text x="645" y="281">4. 用消息替代复盘记录</text>
  </g>
  <rect x="130" y="355" width="660" height="42" rx="8" fill="#e8f1fb" stroke="#6c8ebf"/>
  <text x="460" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2d3d">一句话: 调仓的目标是降低错配, 不是证明自己预测正确。</text>
</svg>
