<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" role="img">
  <title>不同市场环境下的工具选择逻辑</title>
  <desc>展示从识别市场环境到选择工具和控制仓位的完整逻辑链。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f5f7f"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#f8fafc"/>
  <text x="470" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2d3d">工具选择不是找“最强品种”, 而是匹配环境</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#1f2d3d">
    <rect x="45" y="115" width="165" height="90" rx="8" fill="#ffffff" stroke="#6c8ebf" stroke-width="2"/>
    <text x="127" y="150" text-anchor="middle" font-weight="700">先识别环境</text>
    <text x="127" y="178" text-anchor="middle">趋势/震荡/防守</text>
    <line x1="210" y1="160" x2="270" y2="160" stroke="#3f5f7f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="270" y="115" width="165" height="90" rx="8" fill="#ffffff" stroke="#82b366" stroke-width="2"/>
    <text x="352" y="150" text-anchor="middle" font-weight="700">再识别风险</text>
    <text x="352" y="178" text-anchor="middle">权益/利率/信用</text>
    <line x1="435" y1="160" x2="495" y2="160" stroke="#3f5f7f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="495" y="115" width="165" height="90" rx="8" fill="#ffffff" stroke="#d79b00" stroke-width="2"/>
    <text x="577" y="150" text-anchor="middle" font-weight="700">选择工具篮子</text>
    <text x="577" y="178" text-anchor="middle">主工具+缓冲工具</text>
    <line x1="660" y1="160" x2="720" y2="160" stroke="#3f5f7f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="720" y="115" width="175" height="90" rx="8" fill="#ffffff" stroke="#b85450" stroke-width="2"/>
    <text x="807" y="150" text-anchor="middle" font-weight="700">最后定仓位</text>
    <text x="807" y="178" text-anchor="middle">上限/分批/复核</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" fill="#34495e">
    <rect x="115" y="270" width="710" height="78" rx="10" fill="#e8f1fb" stroke="#6c8ebf"/>
    <text x="470" y="302" text-anchor="middle" font-weight="700">同一个工具在不同环境里的作用会变</text>
    <text x="470" y="330" text-anchor="middle">例如债券在利率下行时偏进攻, 在信用压力上升时也可能变成风险来源。</text>
  </g>
</svg>
