<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" role="img">
  <title>市场环境到工具选择的决策树</title>
  <desc>根据趋势强弱、流动性、利率和通胀环境选择不同工具组合。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#43627f"/>
    </marker>
  </defs>
  <rect width="940" height="560" fill="#fbfcfd"/>
  <text x="470" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2d3d">先问环境, 再选工具</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#1f2d3d">
    <rect x="350" y="78" width="240" height="64" rx="8" fill="#ffffff" stroke="#6c8ebf" stroke-width="2"/>
    <text x="470" y="107" text-anchor="middle" font-weight="700">四变量给出什么环境?</text>
    <text x="470" y="130" text-anchor="middle">周期/流动性/利率/风险偏好</text>
    <line x1="470" y1="142" x2="470" y2="174" stroke="#43627f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="55" y="190" width="130" height="70" rx="8" fill="#eef7ee" stroke="#82b366"/>
    <text x="120" y="220" text-anchor="middle" font-weight="700">牛市初中期</text>
    <text x="120" y="244" text-anchor="middle">权益进攻</text>
    <rect x="205" y="190" width="130" height="70" rx="8" fill="#fff6df" stroke="#d79b00"/>
    <text x="270" y="220" text-anchor="middle" font-weight="700">牛市末期</text>
    <text x="270" y="244" text-anchor="middle">降波动</text>
    <rect x="355" y="190" width="130" height="70" rx="8" fill="#eef3fb" stroke="#6c8ebf"/>
    <text x="420" y="220" text-anchor="middle" font-weight="700">震荡市</text>
    <text x="420" y="244" text-anchor="middle">现金流/网格</text>
    <rect x="505" y="190" width="130" height="70" rx="8" fill="#fceaea" stroke="#b85450"/>
    <text x="570" y="220" text-anchor="middle" font-weight="700">熊市</text>
    <text x="570" y="244" text-anchor="middle">防守/定投</text>
    <rect x="655" y="190" width="130" height="70" rx="8" fill="#edf7ed" stroke="#82b366"/>
    <text x="720" y="220" text-anchor="middle" font-weight="700">利率下行</text>
    <text x="720" y="244" text-anchor="middle">债券/高股息</text>
    <rect x="805" y="190" width="90" height="70" rx="8" fill="#fff0e6" stroke="#d79b00"/>
    <text x="850" y="220" text-anchor="middle" font-weight="700">通胀上行</text>
    <text x="850" y="244" text-anchor="middle">黄金商品</text>
    <line x1="410" y1="142" x2="120" y2="190" stroke="#43627f" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="430" y1="142" x2="270" y2="190" stroke="#43627f" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="455" y1="142" x2="420" y2="190" stroke="#43627f" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="485" y1="142" x2="570" y2="190" stroke="#43627f" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="510" y1="142" x2="720" y2="190" stroke="#43627f" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="535" y1="142" x2="850" y2="190" stroke="#43627f" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="42" y="325" width="856" height="128" rx="10" fill="#ffffff" stroke="#d4dde7"/>
    <text x="92" y="362" font-weight="700">工具篮子示例</text>
    <text x="92" y="393">进攻: 宽基ETF、成长/弹性行业、部分海外权益</text>
    <text x="92" y="423">防守: 货币基金、短债、现金管理、分批定投</text>
    <text x="492" y="393">震荡: 红利ETF、可转债、网格、现金管理</text>
    <text x="492" y="423">通胀/利率: 黄金、商品基金、资源股、债券ETF、高股息、REITs</text>
  </g>
  <text x="470" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#586b7a">注意: 表格只给“候选工具”, 最终动作还要经过仓位上限、估值和个人风险承受能力过滤。</text>
</svg>
