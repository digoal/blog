<svg xmlns="http://www.w3.org/2000/svg" width="940" height="450" viewBox="0 0 940 450" role="img">
  <title>工具选择表的使用边界</title>
  <desc>说明工具选择表中可以做、需要确认和禁止做的事项。</desc>
  <rect width="940" height="450" fill="#f8fafb"/>
  <text x="470" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2d3d">工具表只能缩小范围, 不能替你下单</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#1f2d3d">
    <rect x="60" y="92" width="250" height="240" rx="10" fill="#edf7ed" stroke="#82b366" stroke-width="2"/>
    <text x="185" y="128" text-anchor="middle" font-size="20" font-weight="700">可以做</text>
    <text x="92" y="170">1. 用环境筛出候选工具</text>
    <text x="92" y="208">2. 给每类工具设置上限</text>
    <text x="92" y="246">3. 主工具配缓冲工具</text>
    <text x="92" y="284">4. 定期复核环境是否变了</text>
    <rect x="345" y="92" width="250" height="240" rx="10" fill="#fff6df" stroke="#d79b00" stroke-width="2"/>
    <text x="470" y="128" text-anchor="middle" font-size="20" font-weight="700">必须确认</text>
    <text x="377" y="170">1. 这个工具的主要风险</text>
    <text x="377" y="208">2. 波动是否超过承受力</text>
    <text x="377" y="246">3. 是否已经估值过热</text>
    <text x="377" y="284">4. 是否有流动性或折溢价</text>
    <rect x="630" y="92" width="250" height="240" rx="10" fill="#fceaea" stroke="#b85450" stroke-width="2"/>
    <text x="755" y="128" text-anchor="middle" font-size="20" font-weight="700">不要做</text>
    <text x="662" y="170">1. 看到表格就满仓买</text>
    <text x="662" y="208">2. 把工具当成稳赚答案</text>
    <text x="662" y="246">3. 忽略费用、税费和规则</text>
    <text x="662" y="284">4. 用杠杆放大不懂的风险</text>
  </g>
  <rect x="145" y="365" width="650" height="44" rx="8" fill="#e8f1fb" stroke="#6c8ebf"/>
  <text x="470" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2d3d">最终顺序: 环境 -> 候选工具 -> 风险过滤 -> 仓位上限 -> 分批执行。</text>
</svg>
