<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">普通 CTE 的优化器决策路径</title>
  <desc id="desc">展示 PostgreSQL 对非递归 CTE 在内联与物化之间的主要判断条件。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .decision { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
    .good { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .small { font-size: 17px; }
    .label { font-size: 20px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .note { font-size: 15px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="920" height="504" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="66" text-anchor="middle" class="label">WITH 查询进入 SS_process_ctes()</text>

  <rect x="80" y="105" width="250" height="70" class="box"/>
  <text x="205" y="134" text-anchor="middle" class="label">未被引用的 SELECT CTE</text>
  <text x="205" y="160" text-anchor="middle" class="small">cte_refcount = 0</text>

  <rect x="420" y="105" width="250" height="70" class="decision"/>
  <text x="545" y="134" text-anchor="middle" class="label">能否内联?</text>
  <text x="545" y="160" text-anchor="middle" class="small">非递归、纯 SELECT、无 volatile</text>

  <rect x="80" y="235" width="250" height="84" class="warn"/>
  <text x="205" y="264" text-anchor="middle" class="label">忽略</text>
  <text x="205" y="291" text-anchor="middle" class="small">cte_plan_ids 记录 -1</text>

  <rect x="420" y="235" width="250" height="92" class="good"/>
  <text x="545" y="264" text-anchor="middle" class="label">内联为 RTE_SUBQUERY</text>
  <text x="545" y="292" text-anchor="middle" class="small">父查询可下推谓词、联合优化</text>

  <rect x="710" y="235" width="220" height="92" class="warn"/>
  <text x="820" y="264" text-anchor="middle" class="label">生成 init SubPlan</text>
  <text x="820" y="292" text-anchor="middle" class="small">后续由 CteScan 读取</text>

  <rect x="350" y="397" width="250" height="86" class="box"/>
  <text x="475" y="426" text-anchor="middle" class="label">默认规则</text>
  <text x="475" y="452" text-anchor="middle" class="small">单次引用倾向内联</text>
  <text x="475" y="475" text-anchor="middle" class="small">多次引用倾向物化</text>

  <rect x="660" y="397" width="260" height="86" class="box"/>
  <text x="790" y="426" text-anchor="middle" class="label">显式控制</text>
  <text x="790" y="452" text-anchor="middle" class="small">MATERIALIZED 强制围栏</text>
  <text x="790" y="475" text-anchor="middle" class="small">NOT MATERIALIZED 请求内联</text>

  <path class="arrow" d="M 205 175 L 205 232"/>
  <path class="arrow" d="M 330 140 L 416 140"/>
  <path class="arrow" d="M 545 175 L 545 232"/>
  <path class="arrow" d="M 670 140 C 760 145 820 180 820 232"/>
  <path class="arrow" d="M 545 327 C 530 360 500 370 482 394"/>
  <path class="arrow" d="M 820 327 L 800 394"/>

  <text x="373" y="126" class="note">否则继续判断</text>
  <text x="576" y="218" class="note">满足条件</text>
  <text x="785" y="194" class="note">递归 / 副作用 / 强制物化 / 不适合内联</text>
</svg>
