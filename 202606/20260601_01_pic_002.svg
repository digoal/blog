<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
  <title id="title">递归 CTE 的迭代求值模型</title>
  <desc id="desc">展示非递归项、工作表、中间表、递归项之间的迭代关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .table { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .result { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .dedup { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .label { font-size: 21px; font-weight: 700; }
    .small { font-size: 17px; }
    .tiny { font-size: 14px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrow-purple); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="920" height="540" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="66" text-anchor="middle" class="label">WITH RECURSIVE：递归写法，迭代执行</text>

  <rect x="70" y="120" width="220" height="82" class="box"/>
  <text x="180" y="152" text-anchor="middle" class="label">非递归项</text>
  <text x="180" y="180" text-anchor="middle" class="small">anchor term</text>

  <rect x="380" y="120" width="220" height="82" class="table"/>
  <text x="490" y="152" text-anchor="middle" class="label">工作表</text>
  <text x="490" y="180" text-anchor="middle" class="small">working_table</text>

  <rect x="690" y="120" width="220" height="82" class="box"/>
  <text x="800" y="152" text-anchor="middle" class="label">递归项</text>
  <text x="800" y="180" text-anchor="middle" class="small">recursive term</text>

  <rect x="690" y="285" width="220" height="82" class="table"/>
  <text x="800" y="317" text-anchor="middle" class="label">中间表</text>
  <text x="800" y="345" text-anchor="middle" class="small">intermediate_table</text>

  <rect x="380" y="430" width="220" height="82" class="result"/>
  <text x="490" y="462" text-anchor="middle" class="label">结果流</text>
  <text x="490" y="490" text-anchor="middle" class="small">返回给上层节点</text>

  <rect x="70" y="285" width="220" height="82" class="dedup"/>
  <text x="180" y="315" text-anchor="middle" class="label">UNION 去重</text>
  <text x="180" y="343" text-anchor="middle" class="small">哈希表记录已见行</text>

  <path class="arrow" d="M 290 160 L 376 160"/>
  <path class="arrow" d="M 490 202 L 490 426"/>
  <path class="arrow" d="M 600 160 L 686 160"/>
  <path class="arrow" d="M 800 202 L 800 281"/>
  <path class="loop" d="M 690 326 C 560 384 430 372 380 210"/>
  <path class="arrow" d="M 290 326 C 345 350 390 390 435 426"/>
  <path class="arrow" d="M 800 367 C 735 430 660 464 604 470"/>
  <path class="arrow" d="M 180 202 L 180 281"/>

  <text x="336" y="146" class="tiny">第一批行</text>
  <text x="622" y="146" class="tiny">替换自引用</text>
  <text x="682" y="397" class="tiny">一轮结束：中间表变成新工作表</text>
  <text x="100" y="410" class="tiny">UNION ALL 不走全局去重；UNION 需要可哈希列</text>
  <text x="688" y="522" class="tiny">当中间表为空，迭代终止</text>
</svg>
