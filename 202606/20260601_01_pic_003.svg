<svg xmlns="http://www.w3.org/2000/svg" width="980" height="610" viewBox="0 0 980 610" role="img" aria-labelledby="title desc">
  <title id="title">CTE 与递归查询的执行节点关系</title>
  <desc id="desc">展示 CteScan、SubPlan、RecursiveUnion、WorkTableScan 以及 ParamExecData 和 tuplestore 的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .store { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .param { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .run { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .label { font-size: 21px; font-weight: 700; }
    .small { font-size: 16px; }
    .tiny { font-size: 14px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="920" height="548" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="64" text-anchor="middle" class="label">执行器里的两个世界：普通 CTE 与递归 CTE</text>

  <text x="245" y="105" text-anchor="middle" class="label">普通物化 CTE</text>
  <rect x="70" y="135" width="230" height="84" class="run"/>
  <text x="185" y="167" text-anchor="middle" class="label">CTE SubPlan</text>
  <text x="185" y="194" text-anchor="middle" class="small">产出 CTE 行</text>

  <rect x="70" y="292" width="230" height="84" class="node"/>
  <text x="185" y="324" text-anchor="middle" class="label">CteScan</text>
  <text x="185" y="351" text-anchor="middle" class="small">顺序读取共享结果</text>

  <rect x="350" y="210" width="230" height="84" class="store"/>
  <text x="465" y="242" text-anchor="middle" class="label">tuplestore</text>
  <text x="465" y="269" text-anchor="middle" class="small">work_mem，可落盘</text>

  <rect x="350" y="335" width="230" height="84" class="param"/>
  <text x="465" y="367" text-anchor="middle" class="label">ParamExecData</text>
  <text x="465" y="394" text-anchor="middle" class="small">保存 leader 指针</text>

  <text x="735" y="105" text-anchor="middle" class="label">递归 CTE</text>
  <rect x="650" y="135" width="230" height="84" class="run"/>
  <text x="765" y="167" text-anchor="middle" class="label">RecursiveUnion</text>
  <text x="765" y="194" text-anchor="middle" class="small">驱动迭代与去重</text>

  <rect x="650" y="292" width="230" height="84" class="node"/>
  <text x="765" y="324" text-anchor="middle" class="label">WorkTableScan</text>
  <text x="765" y="351" text-anchor="middle" class="small">扫描当前工作表</text>

  <rect x="650" y="450" width="230" height="84" class="store"/>
  <text x="765" y="482" text-anchor="middle" class="label">working / intermediate</text>
  <text x="765" y="509" text-anchor="middle" class="small">两个 tuplestore 轮换</text>

  <path class="arrow" d="M 185 219 L 185 288"/>
  <path class="arrow" d="M 300 177 C 375 184 420 198 450 207"/>
  <path class="arrow" d="M 300 334 C 366 321 413 299 444 295"/>
  <path class="dash" d="M 350 376 C 270 405 170 405 185 378"/>

  <path class="arrow" d="M 765 219 L 765 288"/>
  <path class="arrow" d="M 765 376 L 765 446"/>
  <path class="dash" d="M 650 492 C 585 412 600 205 646 176"/>
  <path class="dash" d="M 650 334 C 595 310 590 195 648 177"/>

  <text x="90" y="462" class="tiny">多个 CteScan 可以有各自 read pointer，读同一个 leader tuplestore。</text>
  <text x="604" y="558" class="tiny">WorkTableScan 通过 wtParam 找到祖先 RecursiveUnionState。</text>
</svg>
