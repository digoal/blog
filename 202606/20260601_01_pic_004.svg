<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
  <title id="title">CTE 和递归查询最佳实践选择图</title>
  <desc id="desc">展示开发者在选择子查询、CTE、物化 CTE、NOT MATERIALIZED 和递归 CTE 时的判断路径。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .choice { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 8; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; }
    .tiny { font-size: 14px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="28" width="920" height="540" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="66" text-anchor="middle" class="label">写 SQL 前先问：我要的是可读性、围栏、复用，还是图遍历?</text>

  <rect x="75" y="110" width="230" height="82" class="choice"/>
  <text x="190" y="140" text-anchor="middle" class="label">只是拆复杂 SQL?</text>
  <text x="190" y="168" text-anchor="middle" class="small">没有复用、没有副作用</text>

  <rect x="375" y="110" width="230" height="82" class="choice"/>
  <text x="490" y="140" text-anchor="middle" class="label">需要优化器下推?</text>
  <text x="490" y="168" text-anchor="middle" class="small">过滤条件只服务某个使用点</text>

  <rect x="675" y="110" width="230" height="82" class="choice"/>
  <text x="790" y="140" text-anchor="middle" class="label">需要只算一次?</text>
  <text x="790" y="168" text-anchor="middle" class="small">昂贵函数、多处复用、DML</text>

  <rect x="75" y="280" width="230" height="82" class="ok"/>
  <text x="190" y="310" text-anchor="middle" class="label">普通子查询或 CTE</text>
  <text x="190" y="338" text-anchor="middle" class="small">以清晰表达为主</text>

  <rect x="375" y="280" width="230" height="82" class="ok"/>
  <text x="490" y="310" text-anchor="middle" class="label">NOT MATERIALIZED</text>
  <text x="490" y="338" text-anchor="middle" class="small">换取联合优化，接受重复计算</text>

  <rect x="675" y="280" width="230" height="82" class="warn"/>
  <text x="790" y="310" text-anchor="middle" class="label">MATERIALIZED</text>
  <text x="790" y="338" text-anchor="middle" class="small">显式优化围栏，控制执行次数</text>

  <rect x="225" y="445" width="250" height="82" class="ok"/>
  <text x="350" y="475" text-anchor="middle" class="label">WITH RECURSIVE</text>
  <text x="350" y="503" text-anchor="middle" class="small">树、图、依赖链、层级汇总</text>

  <rect x="535" y="445" width="270" height="82" class="bad"/>
  <text x="670" y="475" text-anchor="middle" class="label">先写终止条件</text>
  <text x="670" y="503" text-anchor="middle" class="small">深度上限、CYCLE、路径去重</text>

  <path class="arrow" d="M 305 151 L 371 151"/>
  <path class="arrow" d="M 605 151 L 671 151"/>
  <path class="arrow" d="M 190 192 L 190 276"/>
  <path class="arrow" d="M 490 192 L 490 276"/>
  <path class="arrow" d="M 790 192 L 790 276"/>
  <path class="arrow" d="M 305 362 C 318 397 335 412 346 442"/>
  <path class="arrow" d="M 535 486 L 479 486"/>

  <text x="86" y="226" class="tiny">单次引用时 PostgreSQL 默认可能内联</text>
  <text x="374" y="396" class="tiny">递归 CTE 不适用 NOT MATERIALIZED 内联</text>
  <text x="632" y="394" class="tiny">多次引用默认物化；显式写出意图更可维护</text>
  <text x="560" y="548" class="tiny">生产环境不要依赖外层 LIMIT 作为唯一保险。</text>
</svg>
