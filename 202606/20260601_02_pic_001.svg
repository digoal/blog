<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">SKIP LOCKED 的队列消费模型</title>
  <desc id="desc">多个消费者按相同顺序扫描队列表，遇到已经被其他事务锁住的行时跳过，继续锁定后面的可用任务。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5f8f"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1060" height="580" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="550" y="62" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">FOR UPDATE SKIP LOCKED：多消费者领取任务</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="110" width="220" height="96" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="180" y="148" text-anchor="middle" font-size="22" fill="#075985">Worker A</text>
    <text x="180" y="178" text-anchor="middle" font-size="16" fill="#075985">BEGIN; 领取 1 条任务</text>

    <rect x="70" y="260" width="220" height="96" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="180" y="298" text-anchor="middle" font-size="22" fill="#065f46">Worker B</text>
    <text x="180" y="328" text-anchor="middle" font-size="16" fill="#065f46">同样 ORDER BY id</text>

    <rect x="70" y="410" width="220" height="96" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="180" y="448" text-anchor="middle" font-size="22" fill="#9a3412">Worker C</text>
    <text x="180" y="478" text-anchor="middle" font-size="16" fill="#9a3412">不等待被锁行</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="470" y="110" width="540" height="410" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="740" y="148" text-anchor="middle" font-size="22" fill="#0f172a">queue 表：status = 'ready'</text>
    <line x1="500" y1="170" x2="980" y2="170" stroke="#cbd5e1"/>

    <g font-size="18">
      <rect x="520" y="205" width="420" height="54" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="545" y="238" fill="#7f1d1d">id=1</text>
      <text x="650" y="238" fill="#7f1d1d">已被 Worker A 锁住</text>
      <text x="895" y="238" text-anchor="end" fill="#7f1d1d">跳过</text>

      <rect x="520" y="285" width="420" height="54" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="545" y="318" fill="#14532d">id=2</text>
      <text x="650" y="318" fill="#14532d">可立即加锁</text>
      <text x="895" y="318" text-anchor="end" fill="#14532d">领取</text>

      <rect x="520" y="365" width="420" height="54" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
      <text x="545" y="398" fill="#334155">id=3</text>
      <text x="650" y="398" fill="#334155">等待下一批消费者</text>

      <rect x="520" y="445" width="420" height="54" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
      <text x="545" y="478" fill="#334155">id=4</text>
      <text x="650" y="478" fill="#334155">等待下一批消费者</text>
    </g>
  </g>

  <path d="M 290 158 C 350 158, 380 210, 510 230" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 290 308 C 350 308, 380 310, 510 310" stroke="#059669" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 290 458 C 350 458, 390 430, 510 392" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="550" y="565" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">核心收益：减少队头阻塞；核心代价：返回结果不再是普通一致性读意义上的完整视图。</text>
</svg>
