<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">SKIP LOCKED 从语法到执行器的路径</title>
  <desc id="desc">SQL 锁定子句在分析阶段变成 RowMarkClause 和 LockWaitSkip，执行时由 LockRows 节点调用 table_tuple_lock，遇到 TM_WouldBlock 后取下一行。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="620" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="590" y="62" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">源码路径：SKIP LOCKED 如何进入行锁执行</text>

  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="70" y="125" width="220" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="180" y="160" text-anchor="middle" font-size="21" fill="#1e3a8a">SQL</text>
    <text x="180" y="190" text-anchor="middle" fill="#1e3a8a">FOR UPDATE SKIP LOCKED</text>

    <rect x="360" y="125" width="250" height="92" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="485" y="158" text-anchor="middle" font-size="21" fill="#155e75">analyze.c</text>
    <text x="485" y="188" text-anchor="middle" fill="#155e75">applyLockingClause()</text>

    <rect x="680" y="125" width="220" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="790" y="158" text-anchor="middle" font-size="21" fill="#14532d">RowMark</text>
    <text x="790" y="188" text-anchor="middle" fill="#14532d">waitPolicy=LockWaitSkip</text>

    <rect x="70" y="305" width="230" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="185" y="340" text-anchor="middle" font-size="21" fill="#9a3412">Plan/Exec</text>
    <text x="185" y="370" text-anchor="middle" fill="#9a3412">LockRows 节点</text>

    <rect x="370" y="305" width="250" height="100" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="495" y="338" text-anchor="middle" font-size="21" fill="#854d0e">nodeLockRows.c</text>
    <text x="495" y="368" text-anchor="middle" fill="#854d0e">ExecLockRows()</text>

    <rect x="700" y="305" width="260" height="100" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
    <text x="830" y="338" text-anchor="middle" font-size="21" fill="#831843">table AM</text>
    <text x="830" y="368" text-anchor="middle" fill="#831843">table_tuple_lock()</text>

    <rect x="255" y="495" width="290" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="400" y="530" text-anchor="middle" font-size="21" fill="#7f1d1d">TM_WouldBlock</text>
    <text x="400" y="560" text-anchor="middle" fill="#7f1d1d">不能立即拿锁</text>

    <rect x="645" y="495" width="290" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="790" y="530" text-anchor="middle" font-size="21" fill="#14532d">goto lnext</text>
    <text x="790" y="560" text-anchor="middle" fill="#14532d">跳过当前行，取下一行</text>
  </g>

  <path d="M 290 171 L 350 171" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 610 171 L 670 171" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 790 217 C 790 255, 185 255, 185 295" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 300 355 L 360 355" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 620 355 L 690 355" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 830 405 C 830 455, 400 455, 400 485" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 545 541 L 635 541" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="590" y="622" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#334155">关键点：SKIP LOCKED 不是优化器跳表，而是执行器锁行失败后的非阻塞分支。</text>
</svg>
