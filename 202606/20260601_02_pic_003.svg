<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">三种行锁等待策略对比</title>
  <desc id="desc">默认等待、NOWAIT 和 SKIP LOCKED 在遇到被锁行时的不同结果：阻塞、报错或跳过。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="620" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="560" y="62" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">遇到被锁行时：Block / NOWAIT / SKIP LOCKED</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="125" width="980" height="90" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="135" y="178" font-size="20" fill="#0f172a">扫描候选行</text>
    <rect x="310" y="145" width="160" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="390" y="177" text-anchor="middle" font-size="18" fill="#7f1d1d">行已被锁</text>
    <rect x="600" y="145" width="160" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="680" y="177" text-anchor="middle" font-size="18" fill="#14532d">后续可用行</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="85" y="300" width="280" height="210" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="225" y="338" text-anchor="middle" font-size="23" fill="#1e3a8a">默认 Block</text>
    <text x="225" y="380" text-anchor="middle" fill="#1e3a8a">等待持锁事务结束</text>
    <text x="225" y="415" text-anchor="middle" fill="#1e3a8a">保持完整候选顺序</text>
    <text x="225" y="450" text-anchor="middle" fill="#1e3a8a">吞吐受队头阻塞影响</text>

    <rect x="420" y="300" width="280" height="210" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="560" y="338" text-anchor="middle" font-size="23" fill="#9a3412">NOWAIT</text>
    <text x="560" y="380" text-anchor="middle" fill="#9a3412">立即失败并报错</text>
    <text x="560" y="415" text-anchor="middle" fill="#9a3412">适合快速探测锁冲突</text>
    <text x="560" y="450" text-anchor="middle" fill="#9a3412">需要应用层重试</text>

    <rect x="755" y="300" width="280" height="210" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="895" y="338" text-anchor="middle" font-size="23" fill="#14532d">SKIP LOCKED</text>
    <text x="895" y="380" text-anchor="middle" fill="#14532d">立即跳过当前行</text>
    <text x="895" y="415" text-anchor="middle" fill="#14532d">继续扫描后续候选</text>
    <text x="895" y="450" text-anchor="middle" fill="#14532d">牺牲一致视图换吞吐</text>
  </g>

  <path d="M 390 215 C 390 260, 225 260, 225 292" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 390 215 C 390 260, 560 260, 560 292" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 390 215 C 390 260, 895 260, 895 292" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 895 510 C 895 560, 680 560, 680 205" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="560" y="590" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">选择标准：需要公平和顺序就等待；需要快速失败就 NOWAIT；需要多消费者并发吞吐就 SKIP LOCKED。</text>
</svg>
