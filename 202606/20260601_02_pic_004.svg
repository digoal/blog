<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="720" viewBox="0 0 1140 720" role="img" aria-labelledby="title desc">
  <title id="title">SKIP LOCKED 实践决策路径</title>
  <desc id="desc">从业务是否允许跳过、是否有状态流转、是否有超时回收、是否需要最终兜底四个问题判断能否使用 SKIP LOCKED。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1100" height="680" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="570" y="62" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">什么时候应该使用 SKIP LOCKED？</text>

  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="390" y="105" width="360" height="74" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="570" y="136" text-anchor="middle" font-size="20" fill="#075985">业务能接受暂时跳过某些行吗？</text>
    <text x="570" y="162" text-anchor="middle" fill="#075985">例如任务队列、批处理、重试任务</text>

    <rect x="115" y="235" width="310" height="88" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="270" y="270" text-anchor="middle" font-size="20" fill="#7f1d1d">不能</text>
    <text x="270" y="298" text-anchor="middle" fill="#7f1d1d">使用普通等待或 NOWAIT</text>

    <rect x="715" y="235" width="310" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="870" y="270" text-anchor="middle" font-size="20" fill="#14532d">可以</text>
    <text x="870" y="298" text-anchor="middle" fill="#14532d">继续检查队列模型</text>

    <rect x="690" y="380" width="360" height="86" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="870" y="413" text-anchor="middle" font-size="20" fill="#854d0e">是否有原子领取状态流转？</text>
    <text x="870" y="442" text-anchor="middle" fill="#854d0e">ready -> running，记录 worker 与时间</text>

    <rect x="690" y="530" width="360" height="86" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="870" y="563" text-anchor="middle" font-size="20" fill="#14532d">是否有超时回收和最终兜底？</text>
    <text x="870" y="592" text-anchor="middle" fill="#14532d">重试、补偿、无 SKIP LOCKED 扫尾</text>

    <rect x="115" y="530" width="360" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="295" y="563" text-anchor="middle" font-size="20" fill="#9a3412">缺少任一条件</text>
    <text x="295" y="592" text-anchor="middle" fill="#9a3412">先补业务幂等和恢复机制</text>
  </g>

  <path d="M 475 179 C 390 205, 315 210, 270 235" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="360" y="220" font-size="16" font-family="Arial, sans-serif" fill="#334155">否</text>
  <path d="M 665 179 C 750 205, 825 210, 870 235" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="760" y="220" font-size="16" font-family="Arial, sans-serif" fill="#334155">是</text>
  <path d="M 870 323 L 870 370" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 870 466 L 870 520" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 690 423 C 560 423, 430 515, 415 530" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 690 573 L 485 573" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="570" y="662" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">最佳实践不是“加上关键字”，而是把领取、执行、失败、回收、补偿做成闭环。</text>
</svg>
