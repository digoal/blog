<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">查询条件从 WHERE 到执行节点的分流</title>
  <desc id="desc">展示 PostgreSQL 如何把 WHERE 条件分成 Index Cond、Recheck Cond 和 Filter，分别影响索引候选集、回表重检和后置过滤。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="480" rx="8" fill="#ffffff" stroke="#c9d3df"/>
  <rect x="60" y="55" width="860" height="70" rx="6" fill="#eef6ff" stroke="#78a6d1"/>
  <text x="490" y="88" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#18324a">WHERE 条件</text>
  <text x="490" y="113" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#3a5872">例：a = ? AND b &gt; ? AND expensive_func(c) AND geom @&gt; point</text>

  <rect x="60" y="190" width="250" height="150" rx="6" fill="#ecf8ef" stroke="#60a46c"/>
  <text x="185" y="220" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#1f5a2b">Index Cond</text>
  <text x="85" y="255" font-size="15" font-family="Arial, sans-serif" fill="#24442a">可被索引访问方法使用</text>
  <text x="85" y="282" font-size="15" font-family="Arial, sans-serif" fill="#24442a">缩小 TID / key 范围</text>
  <text x="85" y="309" font-size="15" font-family="Arial, sans-serif" fill="#24442a">减少候选 heap tuple</text>

  <rect x="365" y="190" width="250" height="150" rx="6" fill="#fff5e8" stroke="#d79b48"/>
  <text x="490" y="220" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7a4b00">Recheck Cond</text>
  <text x="390" y="255" font-size="15" font-family="Arial, sans-serif" fill="#5d420f">索引返回近似候选</text>
  <text x="390" y="282" font-size="15" font-family="Arial, sans-serif" fill="#5d420f">或 bitmap page 变 lossy</text>
  <text x="390" y="309" font-size="15" font-family="Arial, sans-serif" fill="#5d420f">回表后重新判断原条件</text>

  <rect x="670" y="190" width="250" height="150" rx="6" fill="#fdeeee" stroke="#d77a7a"/>
  <text x="795" y="220" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7d2525">Filter</text>
  <text x="695" y="255" font-size="15" font-family="Arial, sans-serif" fill="#5e2a2a">不能被当前索引吸收</text>
  <text x="695" y="282" font-size="15" font-family="Arial, sans-serif" fill="#5e2a2a">在取到 tuple 后执行</text>
  <text x="695" y="309" font-size="15" font-family="Arial, sans-serif" fill="#5e2a2a">只减少输出，不减少已访问候选</text>

  <line x1="370" y1="125" x2="185" y2="185" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="125" x2="490" y2="185" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="125" x2="795" y2="185" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="395" width="800" height="60" rx="6" fill="#f7f9fb" stroke="#d7dde5"/>
  <text x="120" y="430" font-size="17" font-family="Arial, sans-serif" fill="#243447">优化目标：把高选择性、便宜、稳定的判断尽量前移到 Index Cond；把不可避免的 Recheck 和 Filter 控制在小候选集上。</text>
</svg>
