<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Bitmap Heap Scan 与 recheck 的执行路径</title>
  <desc id="desc">展示 Bitmap Index Scan 生成 TIDBitmap，Bitmap Heap Scan 按 heap page 读取 tuple，并在 lossy 或近似索引条件下执行 recheck。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" rx="8" fill="#ffffff" stroke="#c9d3df"/>
  <rect x="60" y="70" width="190" height="100" rx="6" fill="#ecf8ef" stroke="#5aa568"/>
  <text x="155" y="112" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#1f5a2b">Bitmap Index Scan</text>
  <text x="155" y="140" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#24442a">用 Index Cond 找候选 TID</text>

  <rect x="330" y="60" width="260" height="120" rx="6" fill="#eef6ff" stroke="#74a4d4"/>
  <text x="460" y="92" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#18324a">TIDBitmap</text>
  <text x="360" y="125" font-size="14" font-family="Arial, sans-serif" fill="#24455f">exact page：记录具体 tuple offset</text>
  <text x="360" y="150" font-size="14" font-family="Arial, sans-serif" fill="#24455f">lossy page：只知道整页可能匹配</text>

  <rect x="670" y="70" width="220" height="100" rx="6" fill="#fff5e8" stroke="#d89b48"/>
  <text x="780" y="112" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#7a4b00">Bitmap Heap Scan</text>
  <text x="780" y="140" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#5d420f">按物理页顺序回表</text>

  <line x1="250" y1="120" x2="325" y2="120" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="120" x2="665" y2="120" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="90" y="245" width="145" height="165" rx="4" fill="#f6fbf7" stroke="#80b887"/>
    <text x="162" y="275" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#1f5a2b">exact heap page</text>
    <rect x="115" y="300" width="28" height="28" fill="#6cc27a"/>
    <rect x="153" y="300" width="28" height="28" fill="#dfe7df"/>
    <rect x="191" y="300" width="28" height="28" fill="#6cc27a"/>
    <rect x="115" y="338" width="28" height="28" fill="#dfe7df"/>
    <rect x="153" y="338" width="28" height="28" fill="#6cc27a"/>
    <rect x="191" y="338" width="28" height="28" fill="#dfe7df"/>
    <text x="162" y="395" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#24442a">只访问标记 tuple</text>
  </g>

  <g>
    <rect x="310" y="245" width="145" height="165" rx="4" fill="#fff9f0" stroke="#d89b48"/>
    <text x="382" y="275" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#7a4b00">lossy heap page</text>
    <rect x="335" y="300" width="28" height="28" fill="#f0b35a"/>
    <rect x="373" y="300" width="28" height="28" fill="#f0b35a"/>
    <rect x="411" y="300" width="28" height="28" fill="#f0b35a"/>
    <rect x="335" y="338" width="28" height="28" fill="#f0b35a"/>
    <rect x="373" y="338" width="28" height="28" fill="#f0b35a"/>
    <rect x="411" y="338" width="28" height="28" fill="#f0b35a"/>
    <text x="382" y="395" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#5d420f">整页 tuple 都需 recheck</text>
  </g>

  <rect x="560" y="245" width="330" height="165" rx="6" fill="#fdeeee" stroke="#d77a7a"/>
  <text x="725" y="280" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7d2525">执行器重检与过滤</text>
  <text x="585" y="318" font-size="15" font-family="Arial, sans-serif" fill="#5e2a2a">1. Recheck Cond 失败：Rows Removed by Index Recheck</text>
  <text x="585" y="350" font-size="15" font-family="Arial, sans-serif" fill="#5e2a2a">2. Filter 失败：Rows Removed by Filter</text>
  <text x="585" y="382" font-size="15" font-family="Arial, sans-serif" fill="#5e2a2a">3. 通过者才进入上层节点</text>

  <line x1="455" y1="330" x2="555" y2="330" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="480" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#243447">可观测信号：Heap Blocks exact/lossy、Rows Removed by Index Recheck、Rows Removed by Filter、Buffers。</text>
</svg>
