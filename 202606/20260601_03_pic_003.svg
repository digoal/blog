<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">OR 条件的两种执行形态</title>
  <desc id="desc">比较 OR 条件被拆成 BitmapOr 与无法索引化后逐行计算的差异，说明 CPU 与 IO 放大的来源。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="500" rx="8" fill="#ffffff" stroke="#c9d3df"/>
  <rect x="70" y="55" width="840" height="62" rx="6" fill="#eef6ff" stroke="#74a4d4"/>
  <text x="490" y="92" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#18324a">WHERE a = 1 OR b = 2 OR expensive_func(c)</text>

  <rect x="70" y="165" width="390" height="250" rx="6" fill="#ecf8ef" stroke="#5aa568"/>
  <text x="265" y="198" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#1f5a2b">每个分支可索引</text>
  <rect x="105" y="235" width="110" height="48" rx="4" fill="#ffffff" stroke="#8dbd95"/>
  <text x="160" y="265" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#24442a">Index a</text>
  <rect x="105" y="315" width="110" height="48" rx="4" fill="#ffffff" stroke="#8dbd95"/>
  <text x="160" y="345" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#24442a">Index b</text>
  <rect x="285" y="275" width="120" height="65" rx="4" fill="#ffffff" stroke="#8dbd95"/>
  <text x="345" y="303" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#24442a">BitmapOr</text>
  <text x="345" y="326" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#24442a">合并候选 TID</text>
  <line x1="215" y1="259" x2="280" y2="295" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="215" y1="339" x2="280" y2="320" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="388" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#24442a">IO：访问候选页；CPU：合并 bitmap + 少量重检</text>

  <rect x="520" y="165" width="390" height="250" rx="6" fill="#fdeeee" stroke="#d77a7a"/>
  <text x="715" y="198" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#7d2525">存在不可索引分支或选择性太差</text>
  <rect x="565" y="235" width="130" height="70" rx="4" fill="#ffffff" stroke="#dd9b9b"/>
  <text x="630" y="265" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#5e2a2a">Seq Scan</text>
  <text x="630" y="288" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#5e2a2a">或宽候选 Index Scan</text>
  <rect x="750" y="235" width="120" height="70" rx="4" fill="#ffffff" stroke="#dd9b9b"/>
  <text x="810" y="263" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#5e2a2a">Filter</text>
  <text x="810" y="286" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#5e2a2a">逐行 OR 计算</text>
  <line x1="695" y1="270" x2="745" y2="270" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="715" y="365" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#5e2a2a">IO：扫描大量行；CPU：每行执行 OR 分支和函数</text>

  <text x="490" y="470" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#243447">优化方向：把 OR 拆成可索引子查询、使用 UNION ALL 去重策略、补表达式/部分索引，或接受顺序扫描。</text>
</svg>
