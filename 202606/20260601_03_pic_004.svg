<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">IO 与 CPU 放大的诊断闭环</title>
  <desc id="desc">展示从 EXPLAIN 观测到优化动作的闭环：确认候选行、过滤行、recheck、buffer 与 CPU 时间，再选择索引、SQL 改写和统计信息维护。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="940" height="520" rx="8" fill="#ffffff" stroke="#c9d3df"/>
  <rect x="90" y="70" width="250" height="95" rx="6" fill="#eef6ff" stroke="#74a4d4"/>
  <text x="215" y="105" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#18324a">1. 观察计划</text>
  <text x="115" y="134" font-size="14" font-family="Arial, sans-serif" fill="#24455f">EXPLAIN (ANALYZE, BUFFERS)</text>
  <text x="115" y="154" font-size="14" font-family="Arial, sans-serif" fill="#24455f">loops / rows / time</text>

  <rect x="635" y="70" width="250" height="95" rx="6" fill="#fff5e8" stroke="#d89b48"/>
  <text x="760" y="105" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7a4b00">2. 定位放大源</text>
  <text x="660" y="134" font-size="14" font-family="Arial, sans-serif" fill="#5d420f">Filter、Index Recheck</text>
  <text x="660" y="154" font-size="14" font-family="Arial, sans-serif" fill="#5d420f">Heap Blocks、Buffers、JIT</text>

  <rect x="635" y="340" width="250" height="105" rx="6" fill="#ecf8ef" stroke="#5aa568"/>
  <text x="760" y="375" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1f5a2b">3. 选择动作</text>
  <text x="660" y="405" font-size="14" font-family="Arial, sans-serif" fill="#24442a">复合/部分/表达式索引</text>
  <text x="660" y="426" font-size="14" font-family="Arial, sans-serif" fill="#24442a">SQL 拆分、统计信息、work_mem</text>

  <rect x="90" y="340" width="250" height="105" rx="6" fill="#fdeeee" stroke="#d77a7a"/>
  <text x="215" y="375" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7d2525">4. 复测边界</text>
  <text x="115" y="405" font-size="14" font-family="Arial, sans-serif" fill="#5e2a2a">同样参数、同样数据量</text>
  <text x="115" y="426" font-size="14" font-family="Arial, sans-serif" fill="#5e2a2a">验证写入代价和计划稳定性</text>

  <line x1="340" y1="118" x2="630" y2="118" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="165" x2="760" y2="335" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="635" y1="395" x2="345" y2="395" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="215" y1="340" x2="215" y2="170" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="365" y="225" width="250" height="85" rx="6" fill="#f7f9fb" stroke="#d7dde5"/>
  <text x="490" y="255" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#243447">核心指标</text>
  <text x="390" y="282" font-size="14" font-family="Arial, sans-serif" fill="#243447">候选行 / 输出行、读页 / 命中页、重检失败率</text>
</svg>
