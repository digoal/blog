<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img">
  <title>OFFSET LIMIT 执行流水线</title>
  <desc>展示 PostgreSQL Limit 节点从子计划拉取 OFFSET 加 LIMIT 行，其中 OFFSET 行被计算后丢弃。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f8fbff;stroke:#2f5d8c;stroke-width:2;rx:8}
    .drop{fill:#fff4ef;stroke:#b85c38;stroke-width:2;rx:8}
    .keep{fill:#eef8f0;stroke:#3a7d44;stroke-width:2;rx:8}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#1f2933}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#4b5563}
    .num{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:16px;fill:#111827;font-weight:700}
    .line{stroke:#2f5d8c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="42" y="62" width="170" height="84" class="box"/>
  <text x="127" y="96" text-anchor="middle" class="text">索引/排序/扫描</text>
  <text x="127" y="122" text-anchor="middle" class="small">子计划按 ORDER BY 产出行</text>
  <path d="M212 104 H298" class="line"/>
  <rect x="300" y="50" width="210" height="108" class="box"/>
  <text x="405" y="86" text-anchor="middle" class="text">Limit 节点</text>
  <text x="405" y="114" text-anchor="middle" class="small">position 从 0 递增</text>
  <text x="405" y="138" text-anchor="middle" class="small">直到 position &gt; offset</text>
  <path d="M510 104 H596" class="line"/>
  <rect x="598" y="40" width="136" height="72" class="drop"/>
  <text x="666" y="72" text-anchor="middle" class="text">丢弃</text>
  <text x="666" y="96" text-anchor="middle" class="small">OFFSET 行</text>
  <path d="M510 136 C570 190 610 214 676 228" class="line"/>
  <rect x="698" y="190" width="184" height="92" class="keep"/>
  <text x="790" y="226" text-anchor="middle" class="text">返回给客户端</text>
  <text x="790" y="252" text-anchor="middle" class="small">LIMIT 行</text>
  <rect x="90" y="250" width="780" height="80" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8"/>
  <text x="126" y="283" class="num">例：</text>
  <text x="166" y="283" class="text">LIMIT 20 OFFSET 100000</text>
  <text x="166" y="313" class="small">执行器通常至少需要从子计划取出 100020 行；前 100000 行不是免费跳过，而是被计算后过滤。</text>
  <text x="80" y="380" class="small">关键结论：OFFSET 的成本随页码线性增长，底层扫描、排序、可见性检查、锁等待等代价不会因为行被丢弃而消失。</text>
</svg>
