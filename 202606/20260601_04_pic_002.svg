<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img">
  <title>Keyset Pagination 边界递进</title>
  <desc>展示用上一页最后一行的排序键作为 WHERE 边界，下一页从 B-tree 索引中继续向后扫描。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#1f2933}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#4b5563}
    .node{fill:#eef5ff;stroke:#2f5d8c;stroke-width:2;rx:6}
    .old{fill:#f3f4f6;stroke:#9ca3af;stroke-width:2;rx:6}
    .next{fill:#eef8f0;stroke:#3a7d44;stroke-width:2;rx:6}
    .line{stroke:#2f5d8c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#b85c38;stroke-width:2;stroke-dasharray:8 6;fill:none}
  </style>
  <text x="70" y="48" class="text">ORDER BY created_at DESC, id DESC</text>
  <text x="70" y="76" class="small">复合索引：CREATE INDEX ON feed (created_at DESC, id DESC)</text>
  <g transform="translate(70,120)">
    <rect x="0" y="0" width="118" height="74" class="old"/>
    <text x="59" y="32" text-anchor="middle" class="small">上一页</text>
    <text x="59" y="56" text-anchor="middle" class="small">第 1 行</text>
    <rect x="128" y="0" width="118" height="74" class="old"/>
    <text x="187" y="32" text-anchor="middle" class="small">上一页</text>
    <text x="187" y="56" text-anchor="middle" class="small">...</text>
    <rect x="256" y="0" width="152" height="74" class="node"/>
    <text x="332" y="30" text-anchor="middle" class="small">上一页最后一行</text>
    <text x="332" y="55" text-anchor="middle" class="small">边界 K</text>
    <rect x="418" y="0" width="118" height="74" class="next"/>
    <text x="477" y="32" text-anchor="middle" class="small">下一页</text>
    <text x="477" y="56" text-anchor="middle" class="small">第 1 行</text>
    <rect x="546" y="0" width="118" height="74" class="next"/>
    <text x="605" y="32" text-anchor="middle" class="small">下一页</text>
    <text x="605" y="56" text-anchor="middle" class="small">...</text>
    <rect x="674" y="0" width="118" height="74" class="next"/>
    <text x="733" y="32" text-anchor="middle" class="small">下一页</text>
    <text x="733" y="56" text-anchor="middle" class="small">第 20 行</text>
  </g>
  <path d="M404 205 V286" class="dash"/>
  <text x="430" y="242" class="small">保存边界：last_created_at, last_id</text>
  <rect x="118" y="300" width="724" height="78" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8"/>
  <text x="148" y="333" class="text">下一页条件：</text>
  <text x="270" y="333" class="text">(created_at, id) &lt; (:last_created_at, :last_id)</text>
  <text x="148" y="360" class="small">索引不需要从第一页重新数 100000 行，而是从边界附近继续读 LIMIT 行。</text>
  <path d="M680 378 C680 418 310 418 310 378" class="line"/>
  <text x="70" y="430" class="small">关键结论：游标 token 里存的是“排序边界”，不是页号；排序键必须稳定且最好唯一，常用主键作为最后 tie-breaker。</text>
</svg>
