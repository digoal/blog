<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img">
  <title>Cursor 与 Portal 分批取数</title>
  <desc>展示 DECLARE CURSOR 创建 Portal，FETCH 通过 PortalRunFetch 递进读取结果，portalPos 记录当前位置。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#1f2933}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#4b5563}
    .box{fill:#f8fbff;stroke:#2f5d8c;stroke-width:2;rx:8}
    .state{fill:#fffdf2;stroke:#a67c00;stroke-width:2;rx:8}
    .tmp{fill:#fff4ef;stroke:#b85c38;stroke-width:2;rx:8}
    .line{stroke:#2f5d8c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="54" y="70" width="170" height="82" class="box"/>
  <text x="139" y="104" text-anchor="middle" class="text">BEGIN</text>
  <text x="139" y="130" text-anchor="middle" class="small">事务边界</text>
  <path d="M224 111 H290" class="line"/>
  <rect x="292" y="52" width="210" height="118" class="box"/>
  <text x="397" y="88" text-anchor="middle" class="text">DECLARE CURSOR</text>
  <text x="397" y="116" text-anchor="middle" class="small">解析并规划 SELECT</text>
  <text x="397" y="142" text-anchor="middle" class="small">CreatePortal + PortalStart</text>
  <path d="M502 111 H570" class="line"/>
  <rect x="572" y="54" width="250" height="114" class="state"/>
  <text x="697" y="88" text-anchor="middle" class="text">Portal</text>
  <text x="697" y="116" text-anchor="middle" class="small">保存执行状态和快照</text>
  <text x="697" y="142" text-anchor="middle" class="small">portalPos 记录当前位置</text>
  <path d="M697 168 V232" class="line"/>
  <rect x="538" y="234" width="318" height="92" class="box"/>
  <text x="697" y="270" text-anchor="middle" class="text">FETCH FORWARD n</text>
  <text x="697" y="296" text-anchor="middle" class="small">PortalRunFetch -> PortalRunSelect</text>
  <path d="M538 280 H432" class="line"/>
  <rect x="238" y="234" width="194" height="92" class="box"/>
  <text x="335" y="270" text-anchor="middle" class="text">返回 n 行</text>
  <text x="335" y="296" text-anchor="middle" class="small">下一次从当前位置继续</text>
  <rect x="72" y="354" width="360" height="70" class="tmp"/>
  <text x="252" y="384" text-anchor="middle" class="text">WITH HOLD</text>
  <text x="252" y="410" text-anchor="middle" class="small">提交后可继续用，但结果会物化到内存或临时文件</text>
  <rect x="496" y="354" width="388" height="70" class="tmp"/>
  <text x="690" y="384" text-anchor="middle" class="text">FETCH ABSOLUTE k</text>
  <text x="690" y="410" text-anchor="middle" class="small">不是随机定位加速；实现仍需经过中间行</text>
</svg>
