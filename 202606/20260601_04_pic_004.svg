<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img">
  <title>分页方案选择边界</title>
  <desc>比较 OFFSET、游标和 keyset pagination 在跳页、深分页、状态管理、稳定排序方面的适用边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
  </defs>
  <style>
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#1f2933}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#4b5563}
    .q{fill:#f8fbff;stroke:#2f5d8c;stroke-width:2;rx:8}
    .yes{fill:#eef8f0;stroke:#3a7d44;stroke-width:2;rx:8}
    .warn{fill:#fff4ef;stroke:#b85c38;stroke-width:2;rx:8}
    .line{stroke:#2f5d8c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <rect x="360" y="36" width="240" height="70" class="q"/>
  <text x="480" y="65" text-anchor="middle" class="text">需要分页读取？</text>
  <text x="480" y="90" text-anchor="middle" class="small">先确认排序和一致性</text>
  <path d="M480 106 V150" class="line"/>
  <rect x="312" y="152" width="336" height="76" class="q"/>
  <text x="480" y="183" text-anchor="middle" class="text">必须按页号随机跳转？</text>
  <text x="480" y="208" text-anchor="middle" class="small">例如直接跳到第 500 页</text>
  <path d="M312 190 H152 V278" class="line"/>
  <text x="220" y="178" class="small">是</text>
  <rect x="54" y="280" width="250" height="88" class="warn"/>
  <text x="179" y="313" text-anchor="middle" class="text">OFFSET/LIMIT</text>
  <text x="179" y="340" text-anchor="middle" class="small">只适合浅页或后台低频</text>
  <text x="179" y="363" text-anchor="middle" class="small">必须有唯一 ORDER BY</text>
  <path d="M648 190 H802 V278" class="line"/>
  <text x="724" y="178" class="small">否</text>
  <rect x="672" y="280" width="250" height="88" class="yes"/>
  <text x="797" y="313" text-anchor="middle" class="text">Keyset Pagination</text>
  <text x="797" y="340" text-anchor="middle" class="small">用上一页末行作边界</text>
  <text x="797" y="363" text-anchor="middle" class="small">深分页首选</text>
  <path d="M480 228 V280" class="line"/>
  <rect x="342" y="280" width="276" height="88" class="yes"/>
  <text x="480" y="313" text-anchor="middle" class="text">服务端游标</text>
  <text x="480" y="340" text-anchor="middle" class="small">同一会话/事务内流式读取</text>
  <text x="480" y="363" text-anchor="middle" class="small">适合导出和批处理</text>
  <rect x="84" y="418" width="792" height="64" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8"/>
  <text x="112" y="446" class="small">共同前提：排序必须稳定；索引要匹配 WHERE + ORDER BY；并发写入会改变集合，需用快照、边界条件或业务去重处理。</text>
  <text x="112" y="470" class="small">不要把三者混为一谈：OFFSET 是“数过 N 行”，游标是“保存执行状态”，keyset 是“把上一页边界变成下一页谓词”。</text>
</svg>
