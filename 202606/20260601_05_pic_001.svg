<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">子查询的语义分类</title>
  <desc id="desc">展示 PostgreSQL 中 FROM 子查询、表达式子查询、EXISTS、IN、ANY、ALL、标量子查询和相关子查询的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 13px; fill: #4b5563; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .blue { fill: #e0f2fe; stroke: #0369a1; }
    .green { fill: #dcfce7; stroke: #15803d; }
    .yellow { fill: #fef3c7; stroke: #b45309; }
    .red { fill: #fee2e2; stroke: #b91c1c; }
    .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">PostgreSQL sub query：先按语义分类，再谈性能</text>

  <rect x="40" y="86" width="250" height="120" class="box blue"/>
  <text x="64" y="124" class="label">FROM 子查询</text>
  <text x="64" y="154" class="small">RTE_SUBQUERY / 派生表</text>
  <text x="64" y="182" class="tiny">可能被 pull up 到父查询 join tree</text>

  <rect x="355" y="86" width="250" height="120" class="box green"/>
  <text x="379" y="124" class="label">表达式子查询</text>
  <text x="379" y="154" class="small">SubLink 节点</text>
  <text x="379" y="182" class="tiny">规划阶段变成 SubPlan / InitPlan</text>

  <rect x="670" y="86" width="250" height="120" class="box yellow"/>
  <text x="694" y="124" class="label">相关性</text>
  <text x="694" y="154" class="small">是否引用外层变量</text>
  <text x="694" y="182" class="tiny">决定能否一次执行、hash 或 join 化</text>

  <path d="M290 146 H355" class="line"/>
  <path d="M605 146 H670" class="line"/>

  <rect x="70" y="275" width="180" height="82" class="box"/>
  <text x="94" y="307" class="label">EXISTS</text>
  <text x="94" y="333" class="tiny">只关心是否有行</text>

  <rect x="286" y="275" width="180" height="82" class="box"/>
  <text x="310" y="307" class="label">IN / = ANY</text>
  <text x="310" y="333" class="tiny">任一匹配为 true</text>

  <rect x="502" y="275" width="180" height="82" class="box"/>
  <text x="526" y="307" class="label">ALL / NOT IN</text>
  <text x="526" y="333" class="tiny">三值逻辑影响最大</text>

  <rect x="718" y="275" width="180" height="82" class="box"/>
  <text x="742" y="307" class="label">标量/行比较</text>
  <text x="742" y="333" class="tiny">最多一行，否则报错</text>

  <path d="M480 206 V244 H160 V275" class="line"/>
  <path d="M480 206 V244 H376 V275" class="line"/>
  <path d="M480 206 V244 H592 V275" class="line"/>
  <path d="M480 206 V244 H808 V275" class="line"/>

  <rect x="84" y="422" width="360" height="78" class="box green"/>
  <text x="108" y="453" class="label">非相关</text>
  <text x="108" y="480" class="small">可变成 InitPlan、hashed SubPlan 或物化子计划</text>

  <rect x="516" y="422" width="360" height="78" class="box red"/>
  <text x="540" y="453" class="label">相关</text>
  <text x="540" y="480" class="small">通常随外层行重新求值，除非能拉成 join</text>

  <path d="M795 206 V390 H264 V422" class="line"/>
  <path d="M795 206 V422" class="line"/>
</svg>
