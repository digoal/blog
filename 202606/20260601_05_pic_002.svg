<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">子查询的优化器转换路径</title>
  <desc id="desc">展示 PostgreSQL 规划器将子查询拉平、转换为半连接、反连接、SubPlan、InitPlan 或 hashed SubPlan 的决策路径。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .stage { fill: #dbeafe; stroke: #1d4ed8; }
    .ok { fill: #dcfce7; stroke: #15803d; }
    .warn { fill: #fef3c7; stroke: #b45309; }
    .stop { fill: #fee2e2; stroke: #b91c1c; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; fill: #374151; }
    .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">优化器不是“执行子查询”，而是先尝试改写问题</text>

  <rect x="60" y="92" width="230" height="88" class="box stage"/>
  <text x="84" y="125" class="label">输入 Query 树</text>
  <text x="84" y="151" class="small">FROM 子查询 / SubLink</text>

  <rect x="382" y="78" width="270" height="116" class="box warn"/>
  <text x="406" y="112" class="label">pull_up_sublinks()</text>
  <text x="406" y="139" class="small">顶层 WHERE/HAVING 的 EXISTS/ANY</text>
  <text x="406" y="164" class="small">可转 semi join / anti join</text>

  <rect x="735" y="78" width="245" height="116" class="box ok"/>
  <text x="759" y="112" class="label">JoinExpr</text>
  <text x="759" y="139" class="small">进入普通 join 搜索空间</text>
  <text x="759" y="164" class="small">可选 nested loop/hash/merge join</text>

  <path d="M290 136 H382" class="line"/>
  <path d="M652 136 H735" class="line"/>

  <rect x="382" y="256" width="270" height="122" class="box warn"/>
  <text x="406" y="290" class="label">pull_up_subqueries()</text>
  <text x="406" y="317" class="small">简单 FROM 子查询可拉平</text>
  <text x="406" y="342" class="small">聚合、排序、LIMIT、WITH 等会阻止</text>

  <rect x="735" y="262" width="245" height="110" class="box ok"/>
  <text x="759" y="296" class="label">父查询 jointree</text>
  <text x="759" y="323" class="small">谓词下推、重排 join 顺序</text>
  <text x="759" y="348" class="small">规划空间变大，规划时间也可能上升</text>

  <path d="M175 180 V317 H382" class="line"/>
  <path d="M652 317 H735" class="line"/>

  <rect x="382" y="442" width="270" height="116" class="box stage"/>
  <text x="406" y="476" class="label">SS_process_sublinks()</text>
  <text x="406" y="503" class="small">剩余 SubLink 规划成子计划</text>
  <text x="406" y="528" class="small">make_subplan() / build_subplan()</text>

  <rect x="60" y="442" width="230" height="116" class="box stop"/>
  <text x="84" y="476" class="label">不能拉平的原因</text>
  <text x="84" y="503" class="small">语义不安全、volatile、NULL 语义</text>
  <text x="84" y="528" class="small">外连接位置、相关变量、复杂子查询</text>

  <rect x="735" y="410" width="245" height="68" class="box ok"/>
  <text x="759" y="438" class="label">InitPlan</text>
  <text x="759" y="462" class="small">非相关且最多一次结果：每查询一次</text>

  <rect x="735" y="500" width="245" height="68" class="box warn"/>
  <text x="759" y="528" class="label">SubPlan / hashed SubPlan</text>
  <text x="759" y="552" class="small">按需重扫，或一次建 hash 后探测</text>

  <path d="M175 180 V500 H382" class="line"/>
  <path d="M652 486 L735 444" class="line"/>
  <path d="M652 518 H735" class="line"/>
</svg>
