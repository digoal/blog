<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">SubPlan 的执行路径</title>
  <desc id="desc">展示 InitPlan、普通 SubPlan 和 hashed SubPlan 的执行方式、参数传递和 NULL 处理代价。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .outer { fill: #dbeafe; stroke: #1d4ed8; }
    .sub { fill: #ede9fe; stroke: #6d28d9; }
    .hash { fill: #dcfce7; stroke: #15803d; }
    .warn { fill: #fef3c7; stroke: #b45309; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; fill: #374151; }
    .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">执行器看到的是 SubPlan 策略，不是 SQL 的括号</text>

  <rect x="60" y="110" width="230" height="88" class="box outer"/>
  <text x="84" y="143" class="label">外层 PlanState</text>
  <text x="84" y="169" class="small">逐行产生 outer tuple</text>

  <rect x="405" y="92" width="250" height="110" class="box sub"/>
  <text x="429" y="126" class="label">普通 SubPlan</text>
  <text x="429" y="153" class="small">parParam 传入外层变量</text>
  <text x="429" y="178" class="small">ExecScanSubPlan() 重新扫描子计划</text>

  <rect x="748" y="92" width="230" height="110" class="box warn"/>
  <text x="772" y="126" class="label">代价形态</text>
  <text x="772" y="153" class="small">相关子查询常见：外层行数 × 子计划代价</text>
  <text x="772" y="178" class="small">EXISTS/ANY/ALL 可短路</text>

  <path d="M290 154 H405" class="line"/>
  <path d="M655 154 H748" class="line"/>

  <rect x="60" y="282" width="230" height="92" class="box outer"/>
  <text x="84" y="316" class="label">InitPlan</text>
  <text x="84" y="343" class="small">非相关，先算一次或首次需要时算</text>

  <rect x="405" y="282" width="250" height="92" class="box hash"/>
  <text x="429" y="316" class="label">PARAM_EXEC</text>
  <text x="429" y="343" class="small">结果写入 setParam，外层复用</text>

  <rect x="748" y="282" width="230" height="92" class="box warn"/>
  <text x="772" y="316" class="label">EXPLAIN 信号</text>
  <text x="772" y="343" class="small">InitPlan 1 / (InitPlan 1).col1</text>

  <path d="M290 328 H405" class="line"/>
  <path d="M655 328 H748" class="line"/>

  <rect x="60" y="458" width="230" height="94" class="box outer"/>
  <text x="84" y="492" class="label">hashed SubPlan</text>
  <text x="84" y="519" class="small">非相关 ANY / IN，操作符可 hash</text>

  <rect x="405" y="440" width="250" height="130" class="box hash"/>
  <text x="429" y="474" class="label">ExecHashSubPlan()</text>
  <text x="429" y="501" class="small">子计划输出装入内存 hash table</text>
  <text x="429" y="526" class="small">NULL 行可能进入单独 hashnulls</text>
  <text x="429" y="551" class="small">受 work_mem × hash_mem_multiplier 限制</text>

  <rect x="748" y="458" width="230" height="94" class="box warn"/>
  <text x="772" y="492" class="label">探测</text>
  <text x="772" y="519" class="small">外层每行探测 hash，避免全表比较</text>

  <path d="M290 505 H405" class="line"/>
  <path d="M655 505 H748" class="line"/>

  <path d="M175 198 V282" class="dash"/>
  <path d="M175 374 V458" class="dash"/>
</svg>
