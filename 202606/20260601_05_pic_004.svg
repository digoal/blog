<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" role="img" aria-labelledby="title desc">
  <title id="title">子查询最佳实践决策树</title>
  <desc id="desc">展示应用开发者在 EXISTS、IN、JOIN、标量子查询、NOT IN 和 FROM 子查询之间选择的实践路径。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .q { fill: #dbeafe; stroke: #1d4ed8; }
    .good { fill: #dcfce7; stroke: #15803d; }
    .warn { fill: #fef3c7; stroke: #b45309; }
    .bad { fill: #fee2e2; stroke: #b91c1c; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; fill: #374151; }
    .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .tag { font-size: 12px; fill: #334155; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">写 sub query 前，先问 5 个工程问题</text>

  <rect x="390" y="82" width="260" height="82" class="box q"/>
  <text x="414" y="115" class="label">你只关心“是否存在”吗？</text>
  <text x="414" y="140" class="small">不需要右表列，也不需要重复匹配行</text>

  <rect x="92" y="214" width="250" height="86" class="box good"/>
  <text x="116" y="248" class="label">优先 EXISTS / NOT EXISTS</text>
  <text x="116" y="274" class="small">让优化器有机会转 semi/anti join</text>

  <rect x="698" y="214" width="250" height="86" class="box q"/>
  <text x="722" y="248" class="label">需要返回右表列吗？</text>
  <text x="722" y="274" class="small">需要组合两边结果，通常就是 join</text>

  <path d="M390 123 H217 V214" class="line"/>
  <text x="262" y="112" class="tag">是</text>
  <path d="M650 123 H823 V214" class="line"/>
  <text x="746" y="112" class="tag">否</text>

  <rect x="92" y="372" width="250" height="92" class="box warn"/>
  <text x="116" y="406" class="label">NOT IN 要先处理 NULL</text>
  <text x="116" y="432" class="small">右侧有 NULL 时结果可能是 UNKNOWN</text>

  <rect x="395" y="372" width="250" height="92" class="box good"/>
  <text x="419" y="406" class="label">IN / = ANY</text>
  <text x="419" y="432" class="small">非相关、小结果或可 hash 时很合适</text>

  <rect x="698" y="372" width="250" height="92" class="box good"/>
  <text x="722" y="406" class="label">JOIN / LATERAL</text>
  <text x="722" y="432" class="small">需要列、需要多行关系、需要明确连接条件</text>

  <path d="M217 300 V372" class="line"/>
  <text x="226" y="340" class="tag">反匹配</text>
  <path d="M823 300 V372" class="line"/>
  <text x="832" y="340" class="tag">是</text>
  <path d="M698 257 H520 V372" class="line"/>
  <text x="596" y="246" class="tag">否，成员测试</text>

  <rect x="92" y="548" width="250" height="92" class="box q"/>
  <text x="116" y="582" class="label">标量子查询</text>
  <text x="116" y="608" class="small">必须证明最多一行；否则运行时报错</text>

  <rect x="395" y="548" width="250" height="92" class="box warn"/>
  <text x="419" y="582" class="label">相关子查询</text>
  <text x="419" y="608" class="small">用 EXPLAIN 看 SubPlan 是否按外层行重扫</text>

  <rect x="698" y="548" width="250" height="92" class="box bad"/>
  <text x="722" y="582" class="label">复杂 FROM 子查询</text>
  <text x="722" y="608" class="small">聚合、LIMIT、volatile 等可能挡住拉平</text>

  <path d="M217 464 V548" class="line"/>
  <path d="M520 464 V548" class="line"/>
  <path d="M823 464 V548" class="line"/>
</svg>
