<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 一连接一后端进程模型</title>
  <desc id="desc">展示客户端连接进入 postmaster 后 fork 出独立 backend process，并连接共享内存、锁、buffer 与 WAL 子系统。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .soft { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .shared { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="650"/>

  <text class="text" x="44" y="48">PostgreSQL 进程模型：连接请求进来后，postmaster 派生独立后端进程</text>

  <g>
    <rect class="soft" x="50" y="105" width="165" height="62"/>
    <text class="text" x="84" y="143">Client 1</text>
    <rect class="soft" x="50" y="202" width="165" height="62"/>
    <text class="text" x="84" y="240">Client 2</text>
    <rect class="soft" x="50" y="299" width="165" height="62"/>
    <text class="text" x="78" y="337">Client N</text>
  </g>

  <rect class="warn" x="330" y="185" width="230" height="120"/>
  <text class="text" x="374" y="233">postmaster</text>
  <text class="small" x="358" y="263">监听端口、接受连接</text>
  <text class="small" x="358" y="286">fork / launch backend</text>

  <path class="arrow" d="M215 136 C260 136 286 196 330 220"/>
  <path class="arrow" d="M215 233 L330 238"/>
  <path class="arrow" d="M215 330 C260 330 286 285 330 264"/>

  <g>
    <rect class="box" x="690" y="85" width="260" height="74"/>
    <text class="text" x="725" y="128">backend process 1</text>
    <rect class="box" x="690" y="198" width="260" height="74"/>
    <text class="text" x="725" y="241">backend process 2</text>
    <rect class="box" x="690" y="311" width="260" height="74"/>
    <text class="text" x="721" y="354">backend process N</text>
  </g>

  <path class="arrow" d="M560 220 C610 160 635 124 690 122"/>
  <path class="arrow" d="M560 245 L690 235"/>
  <path class="arrow" d="M560 270 C610 328 635 347 690 348"/>

  <rect class="shared" x="302" y="470" width="560" height="112"/>
  <text class="text" x="356" y="515">共享内存与全局资源</text>
  <text class="small" x="356" y="546">PGPROC / lock table / shared buffers / WAL / proc array</text>
  <text class="tiny" x="356" y="570">max_connections 增大时，部分资源按连接上限预留或放大</text>

  <path class="dash" d="M760 159 C705 260 630 398 570 470"/>
  <path class="dash" d="M800 272 C744 346 685 420 625 470"/>
  <path class="dash" d="M830 385 C760 425 720 450 690 470"/>

  <rect class="warn" x="72" y="468" width="160" height="84"/>
  <text class="small" x="94" y="500">连接风暴时</text>
  <text class="small" x="94" y="525">成本不是 socket</text>
  <text class="small" x="94" y="550">而是进程和状态</text>

  <rect class="box" x="900" y="490" width="170" height="70"/>
  <text class="small" x="928" y="519">保留连接槽</text>
  <text class="tiny" x="920" y="545">superuser / reserved</text>
  <path class="dash" d="M900 525 L862 525"/>
</svg>
