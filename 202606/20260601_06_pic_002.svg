<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">连接池把客户端并发和数据库执行并发解耦</title>
  <desc id="desc">展示大量客户端连接进入 PgBouncer 后排队复用少量 PostgreSQL server connections。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .client { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .pool { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .server { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .queue { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="650"/>
  <text class="text" x="44" y="48">连接池的本质：允许很多客户端等待，但限制数据库同时服务的后端数量</text>

  <g>
    <rect class="client" x="48" y="105" width="170" height="56"/>
    <text class="small" x="83" y="139">App conn 1</text>
    <rect class="client" x="48" y="184" width="170" height="56"/>
    <text class="small" x="83" y="218">App conn 2</text>
    <rect class="client" x="48" y="263" width="170" height="56"/>
    <text class="small" x="83" y="297">App conn 3</text>
    <rect class="client" x="48" y="342" width="170" height="56"/>
    <text class="small" x="83" y="376">App conn ...</text>
    <rect class="client" x="48" y="421" width="170" height="56"/>
    <text class="small" x="83" y="455">App conn 1000</text>
  </g>

  <rect class="pool" x="345" y="120" width="300" height="385"/>
  <text class="text" x="408" y="158">PgBouncer</text>
  <text class="small" x="388" y="190">单进程事件循环</text>
  <text class="small" x="388" y="218">PgSocket 状态机</text>
  <text class="small" x="388" y="246">PgPool = database + user</text>

  <rect class="queue" x="385" y="300" width="220" height="78"/>
  <text class="small" x="416" y="331">waiting_client_list</text>
  <text class="tiny" x="421" y="358">没有空闲 server 时排队</text>

  <rect class="server" x="790" y="132" width="240" height="58"/>
  <text class="small" x="828" y="168">server conn 1</text>
  <rect class="server" x="790" y="232" width="240" height="58"/>
  <text class="small" x="828" y="268">server conn 2</text>
  <rect class="server" x="790" y="332" width="240" height="58"/>
  <text class="small" x="828" y="368">server conn 20</text>
  <rect class="server" x="790" y="460" width="240" height="58"/>
  <text class="small" x="825" y="496">PostgreSQL backends</text>

  <path class="thin" d="M218 133 C270 140 298 145 345 150"/>
  <path class="thin" d="M218 212 C272 220 300 224 345 228"/>
  <path class="thin" d="M218 291 C272 303 303 314 385 330"/>
  <path class="thin" d="M218 370 C276 360 316 348 385 346"/>
  <path class="thin" d="M218 449 C275 426 318 390 385 365"/>

  <path class="arrow" d="M645 160 L790 160"/>
  <path class="arrow" d="M645 260 L790 260"/>
  <path class="arrow" d="M645 360 L790 360"/>
  <path class="arrow" d="M910 390 L910 460"/>

  <text class="small" x="388" y="430">max_client_conn 控制入口上限</text>
  <text class="small" x="388" y="458">default_pool_size 控制后端上限</text>
  <text class="small" x="754" y="96">数据库只看到少量稳定连接</text>
</svg>
