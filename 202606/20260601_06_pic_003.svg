<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">PgBouncer 三种 pool_mode 的释放边界</title>
  <desc id="desc">比较 session、transaction、statement 三种池化模式在何时释放 server connection。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .session { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 6; }
    .tx { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 6; }
    .stmt { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 6; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, sans-serif; font-size: 14px; fill: #4b5563; }
    .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .tick { stroke: #334155; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="660"/>
  <text class="text" x="44" y="48">pool_mode 的关键不是名字，而是 server connection 什么时候归还给池</text>

  <rect class="lane" x="70" y="95" width="980" height="140"/>
  <text class="text" x="100" y="134">session</text>
  <path class="line" d="M245 165 L950 165"/>
  <rect class="session" x="280" y="137" width="610" height="56"/>
  <text class="small" x="430" y="171">整个客户端会话独占一个 server connection</text>
  <line class="tick" x1="280" y1="125" x2="280" y2="205"/>
  <line class="tick" x1="890" y1="125" x2="890" y2="205"/>
  <text class="tiny" x="252" y="222">connect</text>
  <text class="tiny" x="862" y="222">disconnect</text>

  <rect class="lane" x="70" y="270" width="980" height="150"/>
  <text class="text" x="100" y="312">transaction</text>
  <path class="line" d="M245 345 L950 345"/>
  <rect class="tx" x="300" y="317" width="180" height="56"/>
  <text class="small" x="333" y="351">事务 1</text>
  <rect class="tx" x="575" y="317" width="180" height="56"/>
  <text class="small" x="608" y="351">事务 2</text>
  <text class="tiny" x="308" y="395">COMMIT 后释放</text>
  <text class="tiny" x="583" y="395">ROLLBACK 后释放</text>

  <rect class="lane" x="70" y="455" width="980" height="150"/>
  <text class="text" x="100" y="497">statement</text>
  <path class="line" d="M245 530 L950 530"/>
  <rect class="stmt" x="295" y="503" width="120" height="54"/>
  <text class="small" x="325" y="536">SQL 1</text>
  <rect class="stmt" x="455" y="503" width="120" height="54"/>
  <text class="small" x="485" y="536">SQL 2</text>
  <rect class="bad" x="650" y="496" width="210" height="68"/>
  <text class="small" x="680" y="524">显式多语句事务</text>
  <text class="tiny" x="690" y="548">不允许跨语句持有</text>

  <text class="small" x="730" y="88">复用率增强，语义约束也增强</text>
  <text class="tiny" x="900" y="181">兼容性最好</text>
  <text class="tiny" x="825" y="358">常用于 OLTP 短事务</text>
  <text class="tiny" x="870" y="540">最激进，限制最多</text>
</svg>
