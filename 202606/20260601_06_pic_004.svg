<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="670" viewBox="0 0 1120 670" role="img" aria-labelledby="title desc">
  <title id="title">连接池容量规划与观测闭环</title>
  <desc id="desc">展示从业务并发、事务耗时、池大小到 PgBouncer 与 PostgreSQL 观测指标的闭环。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .blue { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .green { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .red { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="670"/>
  <text class="text" x="44" y="48">容量规划不要从 max_connections 开始，而要从数据库能稳定执行多少工作开始</text>

  <rect class="blue" x="70" y="105" width="245" height="115"/>
  <text class="text" x="105" y="144">业务输入</text>
  <text class="small" x="98" y="176">QPS / TPS / P95 耗时</text>
  <text class="small" x="98" y="202">短事务比例 / 峰值</text>

  <rect class="green" x="438" y="105" width="245" height="115"/>
  <text class="text" x="473" y="144">数据库能力</text>
  <text class="small" x="466" y="176">CPU 核数 / IO / 锁等待</text>
  <text class="small" x="466" y="202">可稳定并行执行数</text>

  <rect class="orange" x="805" y="105" width="245" height="115"/>
  <text class="text" x="837" y="144">池参数</text>
  <text class="small" x="828" y="176">default_pool_size</text>
  <text class="small" x="828" y="202">reserve_pool_size</text>

  <path class="arrow" d="M315 162 L438 162"/>
  <path class="arrow" d="M683 162 L805 162"/>

  <rect class="box" x="170" y="302" width="260" height="130"/>
  <text class="text" x="210" y="342">PgBouncer 观测</text>
  <text class="small" x="205" y="374">SHOW POOLS: cl_waiting</text>
  <text class="small" x="205" y="400">SHOW POOLS: maxwait</text>
  <text class="small" x="205" y="426">SHOW STATS: wait_time</text>

  <rect class="box" x="688" y="302" width="260" height="130"/>
  <text class="text" x="728" y="342">PostgreSQL 观测</text>
  <text class="small" x="722" y="374">pg_stat_activity</text>
  <text class="small" x="722" y="400">wait_event / locks</text>
  <text class="small" x="722" y="426">CPU / IO / work_mem</text>

  <path class="arrow" d="M805 220 C670 270 540 290 430 330"/>
  <path class="arrow" d="M928 220 C900 255 860 280 825 302"/>
  <path class="arrow" d="M430 385 C510 455 590 455 688 385"/>

  <rect class="red" x="330" y="520" width="460" height="92"/>
  <text class="text" x="390" y="556">调参判断</text>
  <text class="small" x="375" y="586">等待升高且数据库未满：池可能偏小</text>
  <text class="small" x="375" y="610">等待升高且数据库已满：SQL 或容量是主因</text>

  <path class="arrow" d="M560 520 C555 472 510 438 430 405"/>
  <path class="arrow" d="M560 520 C618 470 662 433 688 405"/>
</svg>
