<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">MVCC 更新删除如何产生死元组</title>
  <desc id="desc">展示 PostgreSQL heap 页中 UPDATE 和 DELETE 不立即物理移除旧行版本，而是依赖 xmin、xmax、t_ctid 和 VACUUM 后续清理。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="920" height="480" rx="8" fill="#ffffff" stroke="#d8dee4"/>
  <text x="480" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827">UPDATE/DELETE 先制造旧版本, 不是立刻挪走字节</text>

  <rect x="70" y="100" width="250" height="310" rx="6" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="195" y="132" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">Heap Page P42</text>
  <rect x="95" y="160" width="200" height="62" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="195" y="184" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#111827">LP 1: v1</text>
  <text x="195" y="207" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">xmin=10, xmax=20</text>
  <rect x="95" y="250" width="200" height="62" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="195" y="274" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#111827">LP 2: v2</text>
  <text x="195" y="297" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">xmin=20, xmax=0</text>
  <path d="M 295 191 C 360 192 345 280 298 280" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="232" font-size="13" font-family="Arial, sans-serif" fill="#374151">v1.t_ctid 指向 v2</text>

  <rect x="375" y="120" width="220" height="98" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="485" y="150" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#111827">旧版本是否能清理?</text>
  <text x="485" y="178" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">取决于仍在运行的事务</text>
  <text x="485" y="199" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">是否可能看见 v1</text>

  <rect x="645" y="100" width="245" height="310" rx="6" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="767" y="132" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">生命周期状态</text>
  <rect x="680" y="160" width="175" height="46" rx="4" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="767" y="188" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#111827">LIVE: 当前快照可见</text>
  <rect x="680" y="230" width="175" height="46" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="767" y="258" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#111827">RECENTLY DEAD: 暂不能删</text>
  <rect x="680" y="300" width="175" height="46" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="767" y="328" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#111827">DEAD: 可被 VACUUM 回收</text>
  <path d="M 767 206 L 767 228" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 767 276 L 767 298" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M 595 169 L 642 169" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="452" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#374151">膨胀的第一根因: 写入不是覆盖, UPDATE 通常是插入新版本 + 标记旧版本</text>
</svg>
