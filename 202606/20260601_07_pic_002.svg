<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL lazy vacuum 三阶段</title>
  <desc id="desc">展示 vacuumlazy.c 中 heap 扫描、索引清理、heap 二次回收三个阶段和 TID store 的作用。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1040" height="520" rx="8" fill="#ffffff" stroke="#d8dee4"/>
  <text x="540" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827">标准 VACUUM 的目标是让空间可复用, 不是总是缩小文件</text>

  <rect x="60" y="120" width="250" height="260" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="185" y="152" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">阶段 I: 扫 heap</text>
  <text x="185" y="190" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">剪枝 HOT 链</text>
  <text x="185" y="218" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">冻结老 xmin/xmax</text>
  <text x="185" y="246" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">记录 LP_DEAD 的 TID</text>
  <text x="185" y="274" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">更新 VM/FSM 条件</text>

  <rect x="390" y="120" width="250" height="260" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="515" y="152" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">阶段 II: 清索引</text>
  <text x="515" y="190" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">读取 TID store</text>
  <text x="515" y="218" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">调用索引 AM bulkdelete</text>
  <text x="515" y="246" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">删除指向死元组的索引项</text>
  <text x="515" y="274" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">可并行处理部分索引</text>

  <rect x="720" y="120" width="300" height="260" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="870" y="152" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">阶段 III: 再回 heap</text>
  <text x="870" y="190" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">LP_DEAD -> LP_UNUSED</text>
  <text x="870" y="218" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">截断页面末尾 line pointer</text>
  <text x="870" y="246" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">RecordPageWithFreeSpace</text>
  <text x="870" y="274" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">必要时设置 all-visible/all-frozen</text>

  <path d="M 310 250 L 388 250" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 640 250 L 718 250" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="350" y="410" width="360" height="70" rx="6" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="530" y="438" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">TID store 受 maintenance_work_mem / autovacuum_work_mem 限制</text>
  <text x="530" y="464" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">装满后会暂停 heap 扫描, 先清一轮索引和 heap</text>

  <path d="M 185 380 C 210 440 300 455 348 445" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 710 445 C 810 445 880 405 880 382" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
