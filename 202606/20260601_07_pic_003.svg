<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">FSM 与 VM 在垃圾回收中的分工</title>
  <desc id="desc">展示 Free Space Map 用于寻找可复用页, Visibility Map 用于跳过无需 vacuum 的页和支持 index-only scan。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1000" height="520" rx="8" fill="#ffffff" stroke="#d8dee4"/>
  <text x="520" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827">回收后的空间主要通过 FSM 复用, VM 帮助跳过安全页面</text>

  <rect x="70" y="120" width="360" height="300" rx="6" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="250" y="150" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">Heap 主文件</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#111827">
    <rect x="100" y="185" width="65" height="130" fill="#dcfce7" stroke="#16a34a"/>
    <text x="132" y="340" text-anchor="middle">P0</text>
    <rect x="175" y="185" width="65" height="130" fill="#fee2e2" stroke="#dc2626"/>
    <text x="207" y="340" text-anchor="middle">P1</text>
    <rect x="250" y="185" width="65" height="130" fill="#fef3c7" stroke="#d97706"/>
    <text x="282" y="340" text-anchor="middle">P2</text>
    <rect x="325" y="185" width="65" height="130" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="357" y="340" text-anchor="middle">P3</text>
  </g>
  <text x="250" y="382" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">页面内空洞可复用; 只有末尾连续空页才可能 truncate</text>

  <rect x="540" y="105" width="420" height="145" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="750" y="135" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">FSM: Free Space Map</text>
  <text x="750" y="168" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">每页近似记录空闲空间, 用树保存子节点最大值</text>
  <text x="750" y="196" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">INSERT/UPDATE 找到足够空间的页, 避免无谓扩展文件</text>
  <text x="750" y="224" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">VACUUM 周期性传播底层页的空闲信息到上层</text>

  <rect x="540" y="300" width="420" height="145" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="750" y="330" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">VM: Visibility Map</text>
  <text x="750" y="363" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">每个 heap page 两个 bit: all-visible / all-frozen</text>
  <text x="750" y="391" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">VACUUM 设置; INSERT/UPDATE/DELETE 清除</text>
  <text x="750" y="419" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">支持 VACUUM 跳页、index-only scan、抗 wraparound</text>

  <path d="M 430 245 C 470 215 500 175 538 175" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 430 300 C 480 330 500 372 538 372" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="500" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#374151">FSM 解决“写到哪里”, VM 解决“哪些页可以少看或不用看”</text>
</svg>
