<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-labelledby="title desc">
  <title id="title">autovacuum 触发逻辑</title>
  <desc id="desc">展示 autovacuum 基于 dead tuples、inserted tuples、freeze age 和 worker 资源判断是否启动 vacuum。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1040" height="560" rx="8" fill="#ffffff" stroke="#d8dee4"/>
  <text x="540" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827">autovacuum 是动态阈值调度, 不是固定夜间任务</text>

  <rect x="70" y="105" width="250" height="125" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="195" y="136" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#111827">更新/删除触发</text>
  <text x="195" y="168" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">dead &gt; min(max_threshold,</text>
  <text x="195" y="192" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">threshold + scale_factor * reltuples)</text>

  <rect x="70" y="260" width="250" height="125" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="195" y="291" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#111827">插入触发</text>
  <text x="195" y="323" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">inserted &gt; insert_threshold +</text>
  <text x="195" y="347" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">insert_scale * reltuples * 未冻结比例</text>

  <rect x="70" y="415" width="250" height="95" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="195" y="446" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#111827">wraparound 保护</text>
  <text x="195" y="478" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">relfrozenxid / relminmxid 太老</text>

  <rect x="430" y="225" width="230" height="130" rx="6" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="545" y="257" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">候选表排序</text>
  <text x="545" y="291" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">数据库级选择</text>
  <text x="545" y="319" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">表级 vacuum/analyze score</text>

  <rect x="770" y="180" width="240" height="210" rx="6" fill="#fef2f2" stroke="#dc2626"/>
  <text x="890" y="213" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827">执行约束</text>
  <text x="890" y="248" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">autovacuum_max_workers</text>
  <text x="890" y="276" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">autovacuum_naptime</text>
  <text x="890" y="304" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">cost delay / cost limit</text>
  <text x="890" y="332" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">锁冲突可能中断普通 worker</text>
  <text x="890" y="360" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">防 wraparound worker 更强硬</text>

  <path d="M 320 168 C 375 190 390 250 428 275" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 320 323 L 428 300" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 320 462 C 380 430 395 350 428 320" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 660 290 L 768 290" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="535" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#374151">表越大, 默认 20% scale factor 越可能让清理来得太晚; 热表要按表设置阈值</text>
</svg>
