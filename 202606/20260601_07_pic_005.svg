<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">膨胀根因排查路径</title>
  <desc id="desc">展示从发现 n_dead_tup 和表大小异常开始, 分析长事务、复制槽、autovacuum 能力、索引更新和表重写需求。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1040" height="580" rx="8" fill="#ffffff" stroke="#d8dee4"/>
  <text x="540" y="58" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827">膨胀治理先找“为什么清不掉/来不及清”, 再决定是否重写</text>

  <rect x="70" y="110" width="220" height="82" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="180" y="143" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">发现异常</text>
  <text x="180" y="170" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">表/索引大小、n_dead_tup、dead_tuple_percent</text>

  <rect x="420" y="100" width="240" height="102" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="540" y="132" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">能否清理?</text>
  <text x="540" y="160" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">长事务、prepared xact、replication slot</text>
  <text x="540" y="184" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">订阅 retain_dead_tuples、backend_xmin</text>

  <rect x="790" y="110" width="220" height="82" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="900" y="143" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">先解除保留者</text>
  <text x="900" y="170" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">提交/回滚/终止/修复 slot</text>

  <rect x="420" y="270" width="240" height="102" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="540" y="302" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">来得及清吗?</text>
  <text x="540" y="330" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">阈值过大、worker 不足、cost 太保守</text>
  <text x="540" y="354" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">锁冲突、maintenance_work_mem 太小</text>

  <rect x="790" y="280" width="220" height="82" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="900" y="313" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">调度与参数治理</text>
  <text x="900" y="340" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">按表阈值、worker、cost、手工 VACUUM</text>

  <rect x="420" y="455" width="240" height="82" rx="6" fill="#f6f8fa" stroke="#8c959f"/>
  <text x="540" y="488" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">是否需要归还 OS?</text>
  <text x="540" y="515" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">标准 VACUUM 已可复用但文件仍大</text>

  <rect x="790" y="455" width="220" height="82" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="900" y="488" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#111827">计划表重写</text>
  <text x="900" y="515" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#374151">VACUUM FULL / CLUSTER / pg_repack</text>

  <path d="M 290 151 L 418 151" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 660 151 L 788 151" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 540 202 L 540 268" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 660 321 L 788 321" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 540 372 L 540 453" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 660 496 L 788 496" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
