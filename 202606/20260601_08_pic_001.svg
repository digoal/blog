<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Vortex 的逻辑层、物理编码层与文件布局层</title>
  <desc id="desc">展示 Vortex 从逻辑 DType 和表达式，到 Array 编码，再到 Layout 树、Segment 与 Footer 的分层关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="920" height="480" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Vortex：把“数据语义”和“落盘形态”拆开</text>

  <rect x="70" y="105" width="220" height="285" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="180" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#155e75">逻辑层</text>
  <text x="95" y="178" font-family="Arial, sans-serif" font-size="16" fill="#164e63">DType / Struct 字段</text>
  <text x="95" y="212" font-family="Arial, sans-serif" font-size="16" fill="#164e63">Expression</text>
  <text x="95" y="246" font-family="Arial, sans-serif" font-size="16" fill="#164e63">Projection / Filter</text>
  <text x="95" y="280" font-family="Arial, sans-serif" font-size="16" fill="#164e63">Stats 语义</text>
  <text x="95" y="333" font-family="Arial, sans-serif" font-size="14" fill="#475569">回答：这一列是什么？</text>
  <text x="95" y="358" font-family="Arial, sans-serif" font-size="14" fill="#475569">这个谓词能不能成立？</text>

  <rect x="370" y="105" width="220" height="285" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">物理编码层</text>
  <text x="395" y="178" font-family="Arial, sans-serif" font-size="16" fill="#14532d">Canonical Array</text>
  <text x="395" y="212" font-family="Arial, sans-serif" font-size="16" fill="#14532d">Dict / RLE / FSST</text>
  <text x="395" y="246" font-family="Arial, sans-serif" font-size="16" fill="#14532d">FoR / BitPacking</text>
  <text x="395" y="280" font-family="Arial, sans-serif" font-size="16" fill="#14532d">ALP / Pco / Zstd</text>
  <text x="395" y="333" font-family="Arial, sans-serif" font-size="14" fill="#475569">回答：这些值怎样存</text>
  <text x="395" y="358" font-family="Arial, sans-serif" font-size="14" fill="#475569">才省空间、少分支？</text>

  <rect x="670" y="105" width="220" height="285" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="780" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">文件布局层</text>
  <text x="695" y="178" font-family="Arial, sans-serif" font-size="16" fill="#7c2d12">Layout 树</text>
  <text x="695" y="212" font-family="Arial, sans-serif" font-size="16" fill="#7c2d12">Struct / Zoned</text>
  <text x="695" y="246" font-family="Arial, sans-serif" font-size="16" fill="#7c2d12">Chunked / Flat</text>
  <text x="695" y="280" font-family="Arial, sans-serif" font-size="16" fill="#7c2d12">Segment / Footer</text>
  <text x="695" y="333" font-family="Arial, sans-serif" font-size="14" fill="#475569">回答：读哪段字节？</text>
  <text x="695" y="358" font-family="Arial, sans-serif" font-size="14" fill="#475569">哪些列和行可跳过？</text>

  <line x1="290" y1="248" x2="365" y2="248" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">执行/编码</text>
  <line x1="590" y1="248" x2="665" y2="248" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">组织/落盘</text>

  <rect x="140" y="430" width="680" height="42" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="457" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">查询读取时反向走：Footer 定位 Layout，Layout 只请求必要 Segment，Array 编码负责解码和计算</text>
</svg>
