<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Vortex 文件尾部自描述结构</title>
  <desc id="desc">展示 Vortex 文件中数据段、统计段、Schema、Layout、Footer、Postscript 和 EOF 的相对位置。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="25" y="25" width="910" height="510" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">.vortex 文件：数据在前，解释数据的索引和元数据在后</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#0f172a">
    <rect x="90" y="110" width="520" height="60" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="350" y="146" text-anchor="middle">Data Segments：列数据、编码后的数组 buffer</text>
    <rect x="90" y="170" width="520" height="52" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="350" y="202" text-anchor="middle">Per-column Statistics：zone / file 统计数组</text>
    <rect x="90" y="222" width="520" height="52" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="350" y="254" text-anchor="middle">Schema Flatbuffer：可选 DType</text>
    <rect x="90" y="274" width="520" height="58" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="350" y="309" text-anchor="middle">Layout Flatbuffer：Layout 树和 Segment 引用</text>
    <rect x="90" y="332" width="520" height="58" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="350" y="367" text-anchor="middle">Footer Flatbuffer：SegmentSpec、ArraySpec、LayoutSpec</text>
    <rect x="90" y="390" width="520" height="54" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="350" y="423" text-anchor="middle">Postscript：Schema / Layout / Stats / Footer 的绝对偏移</text>
    <rect x="90" y="444" width="520" height="48" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="350" y="474" text-anchor="middle">EOF 8 字节：version + postscript length + VTXF</text>
  </g>

  <rect x="675" y="128" width="205" height="116" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="777" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">打开文件</text>
  <text x="695" y="190" font-family="Arial, sans-serif" font-size="14" fill="#475569">1. 读末尾 initial read</text>
  <text x="695" y="216" font-family="Arial, sans-serif" font-size="14" fill="#475569">2. 解析 EOF 和 Postscript</text>

  <rect x="675" y="300" width="205" height="124" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="777" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">按需读取</text>
  <text x="695" y="362" font-family="Arial, sans-serif" font-size="14" fill="#475569">3. 读缺失的 footer/layout</text>
  <text x="695" y="388" font-family="Arial, sans-serif" font-size="14" fill="#475569">4. SegmentSource 请求字节段</text>

  <line x1="610" y1="466" x2="672" y2="206" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="360" x2="672" y2="365" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="678" y="472" font-family="Arial, sans-serif" font-size="13" fill="#334155">Footer 不搬数据，只告诉 reader 去哪里读</text>
</svg>
