<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Vortex 默认写入策略</title>
  <desc id="desc">展示 TableStrategy、Repartition、Zoned、Dict、Compressing、Buffered、Chunked、Flat 等写入阶段。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1000" height="520" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">默认写入策略：先塑造可跳过的数据块，再压缩并落成 segment</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#0f172a">
    <rect x="55" y="118" width="135" height="72" rx="7" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="122" y="148" text-anchor="middle" font-weight="700">输入 ArrayStream</text>
    <text x="122" y="173" text-anchor="middle">批次 / chunk</text>

    <rect x="240" y="118" width="135" height="72" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="307" y="148" text-anchor="middle" font-weight="700">TableStrategy</text>
    <text x="307" y="173" text-anchor="middle">Struct 拆列</text>

    <rect x="425" y="118" width="135" height="72" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="492" y="143" text-anchor="middle" font-weight="700">Repartition</text>
    <text x="492" y="168" text-anchor="middle">按 8192 行</text>

    <rect x="610" y="118" width="135" height="72" rx="7" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="677" y="143" text-anchor="middle" font-weight="700">Zoned</text>
    <text x="677" y="168" text-anchor="middle">生成 zone stats</text>

    <rect x="795" y="118" width="135" height="72" rx="7" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="862" y="143" text-anchor="middle" font-weight="700">Dict</text>
    <text x="862" y="168" text-anchor="middle">低基数字段</text>

    <rect x="795" y="280" width="135" height="72" rx="7" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="862" y="305" text-anchor="middle" font-weight="700">Repartition</text>
    <text x="862" y="330" text-anchor="middle">目标约 1MB</text>

    <rect x="610" y="280" width="135" height="72" rx="7" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="677" y="305" text-anchor="middle" font-weight="700">Compressing</text>
    <text x="677" y="330" text-anchor="middle">BtrBlocks 策略</text>

    <rect x="425" y="280" width="135" height="72" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="492" y="305" text-anchor="middle" font-weight="700">Buffered</text>
    <text x="492" y="330" text-anchor="middle">相邻 segment</text>

    <rect x="240" y="280" width="135" height="72" rx="7" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="307" y="305" text-anchor="middle" font-weight="700">Chunked</text>
    <text x="307" y="330" text-anchor="middle">块级 layout</text>

    <rect x="55" y="280" width="135" height="72" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="122" y="305" text-anchor="middle" font-weight="700">Flat</text>
    <text x="122" y="330" text-anchor="middle">写 segment</text>
  </g>

  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="154" x2="238" y2="154"/>
    <line x1="375" y1="154" x2="423" y2="154"/>
    <line x1="560" y1="154" x2="608" y2="154"/>
    <line x1="745" y1="154" x2="793" y2="154"/>
    <path d="M 862 190 L 862 278"/>
    <line x1="795" y1="316" x2="747" y2="316"/>
    <line x1="610" y1="316" x2="562" y2="316"/>
    <line x1="425" y1="316" x2="377" y2="316"/>
    <line x1="240" y1="316" x2="192" y2="316"/>
  </g>

  <rect x="120" y="420" width="800" height="62" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="520" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">两个粒度同时存在：8192 行 zone 用于剪枝；约 1MB partition/segment 用于对象存储随机读和并发读</text>
  <text x="520" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">这也是它在压缩比、CPU 解码、IOPS 与并行度之间折中的地方</text>
</svg>
