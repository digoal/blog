<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Vortex 扫描路径</title>
  <desc id="desc">展示 Vortex scan 从 projection/filter 请求，到 file stats、zone map、filter、projection、decode 的执行路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1000" height="520" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="520" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">读取不是“解完整文件”：先剪枝，再按投影和 mask 读 segment</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#0f172a">
    <rect x="70" y="108" width="160" height="70" rx="7" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="150" y="137" text-anchor="middle" font-weight="700">ScanBuilder</text>
    <text x="150" y="162" text-anchor="middle">projection / filter</text>

    <rect x="295" y="108" width="170" height="70" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="380" y="137" text-anchor="middle" font-weight="700">File stats</text>
    <text x="380" y="162" text-anchor="middle">文件级 can_prune</text>

    <rect x="530" y="108" width="170" height="70" rx="7" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="615" y="137" text-anchor="middle" font-weight="700">Split tasks</text>
    <text x="615" y="162" text-anchor="middle">按 layout 切分</text>

    <rect x="765" y="108" width="170" height="70" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="850" y="137" text-anchor="middle" font-weight="700">Zoned pruning</text>
    <text x="850" y="162" text-anchor="middle">zone map -> mask</text>

    <rect x="765" y="270" width="170" height="70" rx="7" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="850" y="299" text-anchor="middle" font-weight="700">Filter eval</text>
    <text x="850" y="324" text-anchor="middle">剩余行真实计算</text>

    <rect x="530" y="270" width="170" height="70" rx="7" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="615" y="299" text-anchor="middle" font-weight="700">Projection eval</text>
    <text x="615" y="324" text-anchor="middle">只取需要列</text>

    <rect x="295" y="270" width="170" height="70" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="380" y="299" text-anchor="middle" font-weight="700">SegmentSource</text>
    <text x="380" y="324" text-anchor="middle">请求字节段</text>

    <rect x="70" y="270" width="160" height="70" rx="7" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="150" y="299" text-anchor="middle" font-weight="700">Array decode</text>
    <text x="150" y="324" text-anchor="middle">输出 ArrayStream</text>
  </g>

  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="230" y1="143" x2="293" y2="143"/>
    <line x1="465" y1="143" x2="528" y2="143"/>
    <line x1="700" y1="143" x2="763" y2="143"/>
    <path d="M 850 178 L 850 268"/>
    <line x1="765" y1="305" x2="702" y2="305"/>
    <line x1="530" y1="305" x2="467" y2="305"/>
    <line x1="295" y1="305" x2="232" y2="305"/>
  </g>

  <rect x="155" y="420" width="730" height="62" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="520" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">剪枝只证明“不可能命中”，不能替代真实过滤；因此 Vortex 先用 stats 降低 IO，再对剩余行执行完整表达式</text>
  <text x="520" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">投影在 StructReader 中按字段拆开，宽表查询可以避免读取无关列</text>
</svg>
