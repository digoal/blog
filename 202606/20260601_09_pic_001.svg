<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img">
  <title>Lance 存储分层架构</title>
  <desc>展示 Lance 从应用接口到表格式、索引格式、文件格式、编码和对象存储的分层关系，以及各层主要职责。</desc>
  <style>
    .bg { fill: #f7fafc; }
    .box { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 8; }
    .accent { fill: #e6f2ff; stroke: #2468a2; stroke-width: 2; rx: 8; }
    .green { fill: #eaf7ef; stroke: #2f7d4f; stroke-width: 2; rx: 8; }
    .orange { fill: #fff4e6; stroke: #b76416; stroke-width: 2; rx: 8; }
    .purple { fill: #f0ecff; stroke: #6951a8; stroke-width: 2; rx: 8; }
    .line { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #667085; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
    .label { font: 700 18px Arial, sans-serif; fill: #17202a; }
    .small { font: 15px Arial, sans-serif; fill: #344054; }
    .tiny { font: 13px Arial, sans-serif; fill: #475467; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#243447"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="620"/>
  <text class="title" x="38" y="48">Lance：把“随机访问、列式扫描、AI 多模态数据”拆成可组合存储层</text>

  <rect class="box" x="70" y="86" width="260" height="94"/>
  <text class="label" x="96" y="122">应用与引擎接口</text>
  <text class="small" x="96" y="150">Python / Rust / Java</text>
  <text class="small" x="96" y="172">Arrow / DataFusion / PyTorch</text>

  <rect class="accent" x="420" y="86" width="260" height="94"/>
  <text class="label" x="446" y="122">Lance Table Format</text>
  <text class="small" x="446" y="150">Manifest、Fragment、Deletion</text>
  <text class="small" x="446" y="172">ACID、MVCC、Schema Evolution</text>

  <rect class="purple" x="770" y="86" width="260" height="94"/>
  <text class="label" x="796" y="122">Index Formats</text>
  <text class="small" x="796" y="150">Vector / Scalar / FTS / System</text>
  <text class="small" x="796" y="172">与表版本事务协调</text>

  <rect class="green" x="245" y="272" width="260" height="112"/>
  <text class="label" x="271" y="310">Lance File Format</text>
  <text class="small" x="271" y="340">无 row group，仅 column page</text>
  <text class="small" x="271" y="362">尾部 column metadata 定位 page</text>

  <rect class="orange" x="595" y="272" width="260" height="112"/>
  <text class="label" x="621" y="310">Encoding Layer</text>
  <text class="small" x="621" y="340">Structural encoding</text>
  <text class="small" x="621" y="362">MiniBlock / FullZip / Blob / Constant</text>

  <rect class="box" x="420" y="470" width="260" height="94"/>
  <text class="label" x="446" y="506">Object Store / NVMe</text>
  <text class="small" x="446" y="534">Local、S3、GCS、Azure</text>
  <text class="small" x="446" y="556">Range Read、并行 I/O、缓存</text>

  <path class="line" d="M330 133 H420"/>
  <path class="line" d="M680 133 H770"/>
  <path class="line" d="M550 180 V272"/>
  <path class="line" d="M505 328 H595"/>
  <path class="line" d="M550 384 V470"/>
  <path class="dash" d="M900 180 C880 250, 840 290, 855 328"/>
  <path class="dash" d="M725 384 C710 430, 662 454, 630 470"/>

  <text class="tiny" x="64" y="602">关键判断：Lance 不是单个文件格式，而是 file/table/index/catalog 可独立演化的存储栈。</text>
</svg>
