<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img">
  <title>Lance 文件格式布局</title>
  <desc>展示 Lance 文件中数据页、列元数据、列元数据偏移表、全局缓冲偏移表和固定尾部的关系。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .panel { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 8; }
    .data { fill: #eaf7ef; stroke: #2f7d4f; stroke-width: 2; }
    .meta { fill: #e6f2ff; stroke: #2468a2; stroke-width: 2; }
    .footer { fill: #fff4e6; stroke: #b76416; stroke-width: 2; }
    .line { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
    .label { font: 700 17px Arial, sans-serif; fill: #17202a; }
    .small { font: 15px Arial, sans-serif; fill: #344054; }
    .tiny { font: 13px Arial, sans-serif; fill: #475467; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#243447"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="640"/>
  <text class="title" x="38" y="48">Lance File：数据先写，定位信息放在文件尾部</text>

  <rect class="panel" x="80" y="86" width="560" height="500"/>
  <rect class="data" x="120" y="124" width="480" height="145"/>
  <text class="label" x="146" y="158">Data Pages / Buffers</text>
  <text class="small" x="146" y="190">Column 0 page buffers</text>
  <text class="small" x="146" y="216">Column 1 page buffers</text>
  <text class="small" x="146" y="242">Blob 或全局数据也可 out-of-line</text>

  <rect class="meta" x="120" y="292" width="480" height="86"/>
  <text class="label" x="146" y="325">Column Metadatas</text>
  <text class="small" x="146" y="352">每列一个 protobuf：pages、encoding、buffer offsets</text>

  <rect class="meta" x="120" y="398" width="480" height="64"/>
  <text class="label" x="146" y="436">Column Metadata Offset Table</text>

  <rect class="meta" x="120" y="482" width="480" height="52"/>
  <text class="label" x="146" y="515">Global Buffers Offset Table</text>

  <rect class="footer" x="120" y="548" width="480" height="26"/>
  <text class="tiny" x="146" y="566">Footer：metadata offsets、global buffer count、column count、version、"LANC"</text>

  <rect class="panel" x="720" y="112" width="300" height="155"/>
  <text class="label" x="746" y="148">打开文件</text>
  <text class="small" x="746" y="180">1. 从尾部读 footer</text>
  <text class="small" x="746" y="206">2. 找到 metadata offset table</text>
  <text class="small" x="746" y="232">3. 只加载需要列的 metadata</text>

  <rect class="panel" x="720" y="342" width="300" height="168"/>
  <text class="label" x="746" y="378">读取行范围或 take</text>
  <text class="small" x="746" y="410">1. 用 page priority 找目标 page</text>
  <text class="small" x="746" y="436">2. 用 structural encoding 算字节范围</text>
  <text class="small" x="746" y="462">3. 对目标 buffer 发起 range read</text>

  <path class="line" d="M720 188 C660 210, 645 516, 600 560"/>
  <path class="line" d="M720 426 C660 392, 640 330, 600 335"/>
  <path class="line" d="M600 196 H720"/>

  <text class="tiny" x="80" y="616">重点：文件层没有 schema 和事务语义；它只负责把列 page 和 encoding metadata 组织成可随机定位的容器。</text>
</svg>
