<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="670" viewBox="0 0 1180 670" role="img">
  <title>Lance 自适应结构编码</title>
  <desc>展示 Lance 如何根据值宽度和数据形态选择 MiniBlock、FullZip、Constant、Blob 等布局，并说明随机访问与扫描取舍。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 8; }
    .mini { fill: #e6f2ff; stroke: #2468a2; stroke-width: 2; rx: 8; }
    .full { fill: #eaf7ef; stroke: #2f7d4f; stroke-width: 2; rx: 8; }
    .blob { fill: #fff4e6; stroke: #b76416; stroke-width: 2; rx: 8; }
    .const { fill: #f0ecff; stroke: #6951a8; stroke-width: 2; rx: 8; }
    .line { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
    .label { font: 700 17px Arial, sans-serif; fill: #17202a; }
    .small { font: 15px Arial, sans-serif; fill: #344054; }
    .tiny { font: 13px Arial, sans-serif; fill: #475467; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#243447"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="670"/>
  <text class="title" x="38" y="48">Structural Encoding：把 Arrow 的结构信息改造成可随机访问的磁盘布局</text>

  <rect class="box" x="70" y="96" width="260" height="132"/>
  <text class="label" x="96" y="132">输入 Arrow Array</text>
  <text class="small" x="96" y="162">primitive / string / list / struct</text>
  <text class="small" x="96" y="188">validity bitmap、offsets、values</text>
  <text class="small" x="96" y="214">目标：输出 Arrow 语义不变</text>

  <rect class="box" x="460" y="96" width="260" height="132"/>
  <text class="label" x="486" y="132">结构层转换</text>
  <text class="small" x="486" y="162">rep / def levels</text>
  <text class="small" x="486" y="188">fixed-size list flatten</text>
  <text class="small" x="486" y="214">dictionary、struct packing</text>

  <rect class="mini" x="90" y="328" width="230" height="158"/>
  <text class="label" x="116" y="362">MiniBlock Layout</text>
  <text class="small" x="116" y="392">小值类型默认路径</text>
  <text class="small" x="116" y="418">chunk 元数据进 search cache</text>
  <text class="small" x="116" y="444">随机读放大约为 mini-block</text>
  <text class="tiny" x="116" y="470">适合整数、浮点、小字符串等</text>

  <rect class="full" x="358" y="328" width="230" height="158"/>
  <text class="label" x="384" y="362">FullZip Layout</text>
  <text class="small" x="384" y="392">较大值类型路径</text>
  <text class="small" x="384" y="418">rep / def / value zip 到一条流</text>
  <text class="small" x="384" y="444">变量宽度需 repetition index</text>
  <text class="tiny" x="384" y="470">常见于向量 embedding 等</text>

  <rect class="const" x="626" y="328" width="230" height="158"/>
  <text class="label" x="652" y="362">Constant Layout</text>
  <text class="small" x="652" y="392">整页同一标量或全 NULL</text>
  <text class="small" x="652" y="418">值可内联到 encoding metadata</text>
  <text class="small" x="652" y="444">仍可能需要 rep / def</text>
  <text class="tiny" x="652" y="470">减少无意义数据 buffer</text>

  <rect class="blob" x="894" y="328" width="230" height="158"/>
  <text class="label" x="920" y="362">Blob Layout</text>
  <text class="small" x="920" y="392">大二进制对象 out-of-line</text>
  <text class="small" x="920" y="418">page 只保存 position / size</text>
  <text class="small" x="920" y="444">lazy loading 避免扫描搬大对象</text>
  <text class="tiny" x="920" y="470">图像、音频、视频等多模态数据</text>

  <rect class="box" x="396" y="548" width="390" height="72"/>
  <text class="label" x="422" y="584">输出：PageLayout + Page Buffers</text>
  <text class="small" x="422" y="610">reader 用 encoding metadata 定位最小必要字节范围</text>

  <path class="line" d="M330 162 H460"/>
  <path class="line" d="M590 228 C420 266, 250 286, 205 328"/>
  <path class="line" d="M590 228 C545 270, 492 290, 473 328"/>
  <path class="line" d="M590 228 C666 264, 724 290, 741 328"/>
  <path class="line" d="M590 228 C788 260, 950 286, 1009 328"/>
  <path class="line" d="M205 486 C265 530, 340 550, 396 584"/>
  <path class="line" d="M473 486 C500 520, 532 540, 556 548"/>
  <path class="line" d="M741 486 C700 526, 664 540, 626 548"/>
  <path class="line" d="M1009 486 C920 540, 824 560, 786 584"/>
</svg>
