<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img">
  <title>Lance 表格式中的 Manifest、Fragment 与 MVCC</title>
  <desc>展示 Lance 表版本通过不可变 manifest 指向 fragments，每个 fragment 包含多个 data files 和 deletion file，从而支持版本化写入与数据演进。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .box { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 8; }
    .man { fill: #e6f2ff; stroke: #2468a2; stroke-width: 2; rx: 8; }
    .frag { fill: #eaf7ef; stroke: #2f7d4f; stroke-width: 2; rx: 8; }
    .del { fill: #fff4e6; stroke: #b76416; stroke-width: 2; rx: 8; }
    .idx { fill: #f0ecff; stroke: #6951a8; stroke-width: 2; rx: 8; }
    .line { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #667085; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
    .label { font: 700 17px Arial, sans-serif; fill: #17202a; }
    .small { font: 15px Arial, sans-serif; fill: #344054; }
    .tiny { font: 13px Arial, sans-serif; fill: #475467; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#243447"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="660"/>
  <text class="title" x="38" y="48">Table Format：版本化 Manifest 管住行分片、列文件、删除向量和索引</text>

  <rect class="man" x="70" y="104" width="260" height="128"/>
  <text class="label" x="96" y="140">Manifest v1</text>
  <text class="small" x="96" y="170">schema、fragments、indices</text>
  <text class="small" x="96" y="196">timestamp、feature flags</text>
  <text class="small" x="96" y="220">不可变快照</text>

  <rect class="man" x="70" y="312" width="260" height="128"/>
  <text class="label" x="96" y="348">Manifest v2</text>
  <text class="small" x="96" y="378">append / delete / update 后生成</text>
  <text class="small" x="96" y="404">复用未变 fragment</text>
  <text class="small" x="96" y="428">新版本指向新元数据</text>

  <rect class="frag" x="450" y="92" width="280" height="168"/>
  <text class="label" x="476" y="128">Fragment 7</text>
  <text class="small" x="476" y="158">水平行分片：physical_rows</text>
  <text class="small" x="476" y="184">data file A：字段 id, vector</text>
  <text class="small" x="476" y="210">data file B：后加特征列</text>
  <text class="small" x="476" y="236">可按列文件独立读取</text>

  <rect class="frag" x="450" y="332" width="280" height="168"/>
  <text class="label" x="476" y="368">Fragment 8</text>
  <text class="small" x="476" y="398">append 新行得到新 fragment</text>
  <text class="small" x="476" y="424">rewrite / compaction 也可生成新 fragment</text>
  <text class="small" x="476" y="450">旧文件不原地改写</text>

  <rect class="del" x="830" y="92" width="260" height="124"/>
  <text class="label" x="856" y="128">Deletion File</text>
  <text class="small" x="856" y="158">每个 fragment 每版本最多一个</text>
  <text class="small" x="856" y="184">Arrow IPC：稀疏删除</text>
  <text class="small" x="856" y="206">Roaring Bitmap：密集删除</text>

  <rect class="idx" x="830" y="332" width="260" height="124"/>
  <text class="label" x="856" y="368">Index Section</text>
  <text class="small" x="856" y="398">uuid、fields、dataset_version</text>
  <text class="small" x="856" y="424">fragment bitmap、index details</text>
  <text class="small" x="856" y="446">搜索结构与表版本协调</text>

  <rect class="box" x="450" y="548" width="410" height="66"/>
  <text class="label" x="476" y="584">数据演进</text>
  <text class="small" x="476" y="608">新增列可给现有 fragment 追加 data file，而不是重写整表</text>

  <path class="line" d="M330 168 H450"/>
  <path class="line" d="M330 376 H450"/>
  <path class="dash" d="M330 202 C390 262, 388 326, 450 376"/>
  <path class="line" d="M730 154 H830"/>
  <path class="line" d="M730 416 H830"/>
  <path class="dash" d="M590 500 V548"/>
  <path class="dash" d="M590 260 V332"/>

  <text class="tiny" x="70" y="638">关键取舍：MVCC 和删除向量让写入便宜，但频繁更新会积累 tombstone、小 fragment 和索引维护成本。</text>
</svg>
