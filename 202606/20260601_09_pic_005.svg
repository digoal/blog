<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img">
  <title>Lance 读写路径与代价位置</title>
  <desc>展示 Lance 写入、提交、读取、过滤、索引回表和优化维护的路径，以及每一步主要代价。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 8; }
    .write { fill: #eaf7ef; stroke: #2f7d4f; stroke-width: 2; rx: 8; }
    .read { fill: #e6f2ff; stroke: #2468a2; stroke-width: 2; rx: 8; }
    .maint { fill: #fff4e6; stroke: #b76416; stroke-width: 2; rx: 8; }
    .risk { fill: #fff1f3; stroke: #b42318; stroke-width: 2; rx: 8; }
    .line { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #667085; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
    .label { font: 700 17px Arial, sans-serif; fill: #17202a; }
    .small { font: 15px Arial, sans-serif; fill: #344054; }
    .tiny { font: 13px Arial, sans-serif; fill: #475467; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#243447"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="700"/>
  <text class="title" x="38" y="48">读写路径：先定位，再搬最少字节；写入靠新版本发布</text>

  <rect class="write" x="70" y="104" width="210" height="118"/>
  <text class="label" x="96" y="140">写入 Arrow Batch</text>
  <text class="small" x="96" y="170">RecordBatch stream</text>
  <text class="small" x="96" y="196">schema validation</text>

  <rect class="write" x="340" y="104" width="210" height="118"/>
  <text class="label" x="366" y="140">编码与 page flush</text>
  <text class="small" x="366" y="170">structural encoding</text>
  <text class="small" x="366" y="196">8MiB/page 默认思路</text>

  <rect class="write" x="610" y="104" width="210" height="118"/>
  <text class="label" x="636" y="140">生成 fragment</text>
  <text class="small" x="636" y="170">data files</text>
  <text class="small" x="636" y="196">row counts / field ids</text>

  <rect class="write" x="880" y="104" width="210" height="118"/>
  <text class="label" x="906" y="140">提交新 manifest</text>
  <text class="small" x="906" y="170">transaction</text>
  <text class="small" x="906" y="196">ACID / optimistic conflict</text>

  <rect class="read" x="70" y="338" width="210" height="118"/>
  <text class="label" x="96" y="374">打开 dataset</text>
  <text class="small" x="96" y="404">读取 manifest</text>
  <text class="small" x="96" y="430">确定 fragments / indices</text>

  <rect class="read" x="340" y="338" width="210" height="118"/>
  <text class="label" x="366" y="374">规划 scanner</text>
  <text class="small" x="366" y="404">projection / filter / limit</text>
  <text class="small" x="366" y="430">row id / row address</text>

  <rect class="read" x="610" y="338" width="210" height="118"/>
  <text class="label" x="636" y="374">加载 search cache</text>
  <text class="small" x="636" y="404">column metadata</text>
  <text class="small" x="636" y="430">page location / encoding</text>

  <rect class="read" x="880" y="338" width="210" height="118"/>
  <text class="label" x="906" y="374">Range read + decode</text>
  <text class="small" x="906" y="404">过滤 deletion vector</text>
  <text class="small" x="906" y="430">输出 Arrow batch</text>

  <rect class="maint" x="210" y="562" width="240" height="88"/>
  <text class="label" x="236" y="598">维护</text>
  <text class="small" x="236" y="626">compact、cleanup、rebuild/remap index</text>

  <rect class="risk" x="720" y="562" width="300" height="88"/>
  <text class="label" x="746" y="598">主要风险</text>
  <text class="small" x="746" y="626">小 fragment、tombstone、cache 失效、对象存储 IOPS</text>

  <path class="line" d="M280 163 H340"/>
  <path class="line" d="M550 163 H610"/>
  <path class="line" d="M820 163 H880"/>
  <path class="line" d="M280 397 H340"/>
  <path class="line" d="M550 397 H610"/>
  <path class="line" d="M820 397 H880"/>
  <path class="dash" d="M985 222 C985 278, 985 304, 985 338"/>
  <path class="dash" d="M985 456 C968 512, 950 536, 900 562"/>
  <path class="dash" d="M715 222 C640 280, 442 510, 390 562"/>

  <text class="tiny" x="70" y="684">验证性能时同时看 iops、bytes_read、indices_loaded、batch_size、io_buffer_size 和 CPU decode，而不是只看文件大小。</text>
</svg>
