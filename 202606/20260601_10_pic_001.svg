<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">ORC 文件由 Header、Body 和 Tail 组成</title>
  <desc id="desc">展示 ORC 文件尾部自描述结构、stripe 列式数据区，以及读取时从尾部反向解析 footer 的路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .header { fill: #dbeafe; stroke: #1d4ed8; }
    .stripe { fill: #dcfce7; stroke: #15803d; }
    .tail { fill: #fef3c7; stroke: #b45309; }
    .meta { fill: #fee2e2; stroke: #b91c1c; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-size: 16px; fill: #334155; }
    .tiny { font-size: 14px; fill: #475569; }
    .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="520"/>
  <text class="text" x="42" y="54">ORC 文件布局：数据先写，导航信息放尾部</text>
  <rect class="box header" x="60" y="120" width="80" height="210"/>
  <text class="text" x="80" y="210">Header</text>
  <text class="small" x="82" y="238">"ORC"</text>
  <rect class="box stripe" x="160" y="120" width="210" height="210"/>
  <text class="text" x="212" y="150">Stripe 0</text>
  <rect class="box" x="185" y="172" width="160" height="42"/>
  <text class="small" x="218" y="199">index streams</text>
  <rect class="box" x="185" y="226" width="160" height="42"/>
  <text class="small" x="222" y="253">data streams</text>
  <rect class="box" x="185" y="280" width="160" height="32"/>
  <text class="tiny" x="225" y="302">stripe footer</text>
  <rect class="box stripe" x="390" y="120" width="210" height="210"/>
  <text class="text" x="442" y="150">Stripe 1</text>
  <rect class="box" x="415" y="172" width="160" height="42"/>
  <text class="small" x="448" y="199">index streams</text>
  <rect class="box" x="415" y="226" width="160" height="42"/>
  <text class="small" x="452" y="253">data streams</text>
  <rect class="box" x="415" y="280" width="160" height="32"/>
  <text class="tiny" x="455" y="302">stripe footer</text>
  <rect class="box stripe" x="620" y="120" width="120" height="210"/>
  <text class="text" x="651" y="217">...</text>
  <rect class="box meta" x="760" y="120" width="135" height="210"/>
  <text class="text" x="792" y="170">Metadata</text>
  <text class="small" x="781" y="205">stripe-level</text>
  <text class="small" x="782" y="232">statistics</text>
  <rect class="box tail" x="910" y="120" width="110" height="210"/>
  <text class="text" x="935" y="170">Footer</text>
  <text class="small" x="928" y="205">schema</text>
  <text class="small" x="928" y="232">stripes</text>
  <text class="small" x="928" y="259">file stats</text>
  <rect class="box tail" x="1032" y="120" width="48" height="210"/>
  <text class="small" transform="translate(1062 265) rotate(-90)">Postscript + psLen</text>
  <path class="arrow" d="M1030 382 C900 450, 690 450, 515 360"/>
  <text class="small" x="590" y="455">reader 先读最后一段，解析 psLen/Postscript/Footer，再定位 stripes</text>
  <path class="arrow dash" d="M930 260 C770 390, 410 390, 230 315"/>
  <text class="small" x="250" y="410">Footer 记录每个 stripe 的 offset、indexLength、dataLength、footerLength、row count</text>
</svg>
