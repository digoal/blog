<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">ORC 类型树、列流和编码关系</title>
  <desc id="desc">展示逻辑 schema 如何展开成类型树，每个列在 stripe 内由多个 stream 组成，并由 ColumnEncoding 指定 direct 或 dictionary 与 RLE 版本。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .node { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .stream { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 6; }
    .enc { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .line { stroke: #475569; stroke-width: 2; fill: none; }
    .arrow { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="620"/>
  <text class="text" x="42" y="48">从逻辑类型到物理 stream：ORC 的“类型感知”在哪里发生</text>
  <rect class="panel" x="45" y="82" width="330" height="465"/>
  <text class="text" x="72" y="118">逻辑 schema / 类型树</text>
  <rect class="node" x="130" y="150" width="160" height="48"/>
  <text class="small" x="164" y="180">struct root</text>
  <rect class="node" x="70" y="250" width="120" height="44"/>
  <text class="small" x="105" y="278">id:int</text>
  <rect class="node" x="220" y="250" width="120" height="44"/>
  <text class="small" x="245" y="278">name:string</text>
  <rect class="node" x="145" y="350" width="140" height="44"/>
  <text class="small" x="176" y="378">ts:timestamp</text>
  <path class="line" d="M210 198 L130 250"/>
  <path class="line" d="M210 198 L280 250"/>
  <path class="line" d="M210 198 L215 350"/>
  <text class="tiny" x="72" y="476">复合类型只保存结构关系，子列保存真实值。</text>
  <rect class="panel" x="420" y="82" width="295" height="465"/>
  <text class="text" x="448" y="118">一个 string 列的 streams</text>
  <rect class="stream" x="465" y="155" width="205" height="48"/>
  <text class="small" x="510" y="184">PRESENT</text>
  <text class="tiny" x="490" y="222">是否为 NULL，可全非空时省略</text>
  <rect class="stream" x="465" y="260" width="205" height="48"/>
  <text class="small" x="516" y="289">DATA</text>
  <text class="tiny" x="475" y="327">direct: UTF-8 字节；dict: 字典 id</text>
  <rect class="stream" x="465" y="365" width="205" height="48"/>
  <text class="small" x="506" y="394">LENGTH</text>
  <text class="tiny" x="475" y="432">direct: 每个值长度；dict: 字典项长度</text>
  <rect class="stream" x="465" y="468" width="205" height="48"/>
  <text class="small" x="486" y="497">DICTIONARY_DATA</text>
  <path class="arrow" d="M340 272 C375 272, 395 275, 455 285"/>
  <rect class="panel" x="760" y="82" width="295" height="465"/>
  <text class="text" x="790" y="118">StripeFooter 解释字节</text>
  <rect class="enc" x="805" y="160" width="205" height="55"/>
  <text class="small" x="835" y="190">ColumnEncoding</text>
  <text class="tiny" x="829" y="209">DIRECT / DICTIONARY</text>
  <rect class="enc" x="805" y="255" width="205" height="55"/>
  <text class="small" x="842" y="285">RLE v1 / v2</text>
  <text class="tiny" x="833" y="304">整数、长度、字典 id</text>
  <rect class="enc" x="805" y="350" width="205" height="55"/>
  <text class="small" x="840" y="380">Stream directory</text>
  <text class="tiny" x="828" y="399">kind、column id、length</text>
  <rect class="enc" x="805" y="445" width="205" height="55"/>
  <text class="small" x="844" y="475">Writer choice</text>
  <text class="tiny" x="820" y="494">字典阈值、编码策略、版本</text>
  <path class="arrow" d="M675 285 C715 285, 738 285, 795 285"/>
  <text class="small" x="160" y="585">读者不能假设 stream 顺序；StripeFooter 是定位 stream kind、column id 和长度的唯一依据。</text>
</svg>
