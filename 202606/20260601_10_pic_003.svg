<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">ORC 谓词下推与 row group 剪枝</title>
  <desc id="desc">展示 ORC 读取时使用 file、stripe、row group 统计信息和 bloom filter 逐层减少读取的数据范围。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .yes { fill: #dcfce7; stroke: #15803d; }
    .no { fill: #fee2e2; stroke: #b91c1c; }
    .maybe { fill: #fef3c7; stroke: #b45309; }
    .read { fill: #dbeafe; stroke: #1d4ed8; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="640"/>
  <text class="text" x="42" y="48">谓词下推：先证明“不可能命中”，再读取剩余 row group</text>
  <rect class="box read" x="70" y="90" width="210" height="72"/>
  <text class="small" x="105" y="122">查询条件</text>
  <text class="text" x="102" y="150">status = 'PAID'</text>
  <path class="arrow" d="M280 126 L355 126"/>
  <rect class="box maybe" x="355" y="90" width="230" height="72"/>
  <text class="small" x="392" y="120">文件/stripe 统计</text>
  <text class="tiny" x="386" y="145">min/max、null、count、sum...</text>
  <path class="arrow" d="M585 126 L660 126"/>
  <rect class="box maybe" x="660" y="90" width="230" height="72"/>
  <text class="small" x="692" y="120">row group index</text>
  <text class="tiny" x="692" y="145">每 10,000 行默认一项</text>
  <path class="arrow" d="M775 162 L775 220"/>
  <rect class="box" x="90" y="225" width="920" height="280"/>
  <text class="text" x="120" y="262">Stripe 内 row groups</text>
  <rect class="box no" x="130" y="300" width="120" height="88"/>
  <text class="small" x="160" y="336">RG 0</text>
  <text class="tiny" x="150" y="360">min/max 排除</text>
  <rect class="box maybe" x="275" y="300" width="120" height="88"/>
  <text class="small" x="305" y="336">RG 1</text>
  <text class="tiny" x="292" y="360">需查 Bloom</text>
  <rect class="box no" x="420" y="300" width="120" height="88"/>
  <text class="small" x="450" y="336">RG 2</text>
  <text class="tiny" x="438" y="360">Bloom 排除</text>
  <rect class="box yes" x="565" y="300" width="120" height="88"/>
  <text class="small" x="595" y="336">RG 3</text>
  <text class="tiny" x="590" y="360">可能命中</text>
  <rect class="box yes" x="710" y="300" width="120" height="88"/>
  <text class="small" x="740" y="336">RG 4</text>
  <text class="tiny" x="735" y="360">可能命中</text>
  <rect class="box no" x="855" y="300" width="120" height="88"/>
  <text class="small" x="885" y="336">RG 5</text>
  <text class="tiny" x="874" y="360">统计排除</text>
  <path class="arrow" d="M625 388 L625 470"/>
  <path class="arrow" d="M770 388 L770 470"/>
  <rect class="box read" x="530" y="470" width="340" height="88"/>
  <text class="small" x="566" y="504">只定位并解码被保留 row group 的必要列 stream</text>
  <text class="tiny" x="580" y="532">统计和 Bloom 只负责剪枝，不能替代真实过滤</text>
  <text class="small" x="110" y="592">源码对应：Java RecordReaderImpl/SargApplier，C++ sargs/SargsApplier.cc；Bloom 仅用于等值、NULL-safe 等值和 IN 等场景。</text>
</svg>
