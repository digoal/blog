<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">ORC 写入参数的成本权衡</title>
  <desc id="desc">展示 stripe 大小、row index stride、压缩块大小、字典与 Bloom filter 对 IO、CPU、元数据和空间成本的影响。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .axis { stroke: #334155; stroke-width: 2.5; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .good { fill: #dcfce7; stroke: #15803d; }
    .bad { fill: #fee2e2; stroke: #b91c1c; }
    .mid { fill: #fef3c7; stroke: #b45309; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text class="text" x="42" y="48">ORC 参数不是“越大/越小越好”，而是在元数据、IO、CPU、空间之间折中</text>
  <rect class="box" x="70" y="90" width="430" height="190"/>
  <text class="text" x="100" y="128">stripe size</text>
  <line class="axis" x1="120" y1="210" x2="450" y2="210"/>
  <path class="arrow" d="M120 210 L450 210"/>
  <text class="tiny" x="115" y="238">小 stripe</text>
  <text class="tiny" x="383" y="238">大 stripe</text>
  <rect class="good" x="125" y="155" width="128" height="36"/>
  <text class="tiny" x="137" y="179">并行/跳过更细</text>
  <rect class="bad" x="285" y="155" width="140" height="36"/>
  <text class="tiny" x="298" y="179">单次读更大</text>
  <text class="small" x="100" y="262">大 stripe 压缩和顺序读更稳；小 stripe 元数据与调度成本更高。</text>
  <rect class="box" x="600" y="90" width="430" height="190"/>
  <text class="text" x="630" y="128">row index stride</text>
  <line class="axis" x1="650" y1="210" x2="980" y2="210"/>
  <path class="arrow" d="M650 210 L980 210"/>
  <text class="tiny" x="646" y="238">小 stride</text>
  <text class="tiny" x="900" y="238">大 stride</text>
  <rect class="good" x="655" y="155" width="140" height="36"/>
  <text class="tiny" x="673" y="179">剪枝更精细</text>
  <rect class="bad" x="830" y="155" width="135" height="36"/>
  <text class="tiny" x="845" y="179">误读更多行</text>
  <text class="small" x="630" y="262">默认 10,000 行；太小会让 ROW_INDEX/Bloom 元数据压过数据。</text>
  <rect class="box" x="70" y="330" width="430" height="205"/>
  <text class="text" x="100" y="368">compression block size</text>
  <line class="axis" x1="120" y1="455" x2="450" y2="455"/>
  <path class="arrow" d="M120 455 L450 455"/>
  <text class="tiny" x="116" y="483">小块</text>
  <text class="tiny" x="400" y="483">大块</text>
  <rect class="good" x="125" y="400" width="130" height="36"/>
  <text class="tiny" x="137" y="424">随机读更轻</text>
  <rect class="bad" x="285" y="400" width="140" height="36"/>
  <text class="tiny" x="300" y="424">内存/解压更重</text>
  <text class="small" x="100" y="512">默认 256KB；独立压缩块让 reader 可跳过字节而不解全 stream。</text>
  <rect class="box" x="600" y="330" width="430" height="205"/>
  <text class="text" x="630" y="368">dictionary / bloom</text>
  <rect class="good" x="650" y="405" width="140" height="48"/>
  <text class="tiny" x="666" y="428">低基数字符串</text>
  <text class="tiny" x="675" y="446">字典收益高</text>
  <rect class="mid" x="830" y="405" width="145" height="48"/>
  <text class="tiny" x="852" y="428">高基数字符串</text>
  <text class="tiny" x="850" y="446">可能回退 direct</text>
  <rect class="mid" x="650" y="470" width="325" height="42"/>
  <text class="tiny" x="675" y="496">Bloom 适合等值/IN 剪枝；有空间成本和误判率</text>
  <text class="small" x="166" y="580">最佳实践是以 workload 验证：实际读取字节、解压 CPU、row group 命中率、footer/index 占比、端到端延迟。</text>
</svg>
