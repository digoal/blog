<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">宽基ETF定投：买的不是"最低点"，买的是"平均成本"</text>

  <!-- Axes -->
  <line x1="70" y1="320" x2="740" y2="320" stroke="#bbb" stroke-width="1.5"/>
  <line x1="70" y1="80" x2="70" y2="320" stroke="#bbb" stroke-width="1.5"/>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#888">时间（月）→</text>
  <text x="25" y="200" text-anchor="middle" font-size="12" fill="#888" transform="rotate(-90,25,200)">净值</text>

  <!-- Y axis labels -->
  <text x="60" y="95" text-anchor="end" font-size="11" fill="#555">1.20</text>
  <text x="60" y="155" text-anchor="end" font-size="11" fill="#555">1.00</text>
  <text x="60" y="215" text-anchor="end" font-size="11" fill="#555">0.80</text>
  <text x="60" y="275" text-anchor="end" font-size="11" fill="#555">0.60</text>

  <!-- Grid lines -->
  <line x1="70" y1="155" x2="740" y2="155" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="215" x2="740" y2="215" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Price curve (volatile, dips and recovers) -->
  <polyline points="70,155 130,185 190,230 250,260 310,240 370,200 430,175 490,210 550,245 610,210 670,175 730,145"
    fill="none" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- Average cost line (declining over time) -->
  <line x1="70" y1="155" x2="730" y2="195" stroke="#3498db" stroke-width="2" stroke-dasharray="7,3"/>

  <!-- Buy markers -->
  <circle cx="130" cy="185" r="6" fill="#27ae60"/>
  <circle cx="250" cy="260" r="6" fill="#27ae60"/>
  <circle cx="370" cy="200" r="6" fill="#27ae60"/>
  <circle cx="490" cy="210" r="6" fill="#27ae60"/>
  <circle cx="610" cy="210" r="6" fill="#27ae60"/>
  <circle cx="730" cy="145" r="6" fill="#e67e22"/>

  <!-- Labels for buy points -->
  <text x="130" y="175" text-anchor="middle" font-size="10" fill="#27ae60">买入</text>
  <text x="250" y="250" text-anchor="middle" font-size="10" fill="#27ae60">买入</text>
  <text x="370" y="190" text-anchor="middle" font-size="10" fill="#27ae60">买入</text>
  <text x="490" y="200" text-anchor="middle" font-size="10" fill="#27ae60">买入</text>
  <text x="610" y="200" text-anchor="middle" font-size="10" fill="#27ae60">买入</text>
  <text x="730" y="135" text-anchor="middle" font-size="10" fill="#e67e22">当前</text>

  <!-- Legend -->
  <line x1="400" y1="385" x2="430" y2="385" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="435" y="389" font-size="11" fill="#555">ETF净值走势</text>
  <line x1="545" y1="385" x2="575" y2="385" stroke="#3498db" stroke-width="2" stroke-dasharray="7,3"/>
  <text x="580" y="389" font-size="11" fill="#555">平均持仓成本</text>
  <circle cx="205" cy="385" r="6" fill="#27ae60"/>
  <text x="215" y="389" font-size="11" fill="#555">每次定投买入</text>

  <!-- Annotation: low price buy more -->
  <rect x="200" y="268" width="130" height="30" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="265" y="283" text-anchor="middle" font-size="11" fill="#856404">跌得越多，买得越多</text>
  <text x="265" y="295" text-anchor="middle" font-size="10" fill="#856404">（等额定投自动摊低成本）</text>
</svg>
