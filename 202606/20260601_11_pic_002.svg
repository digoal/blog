<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">估值定投法：用PE百分位决定每月投多少</text>

  <!-- Five zones -->
  <!-- Zone 1: Very cheap -->
  <rect x="60" y="60" width="135" height="220" rx="8" fill="#27ae60" opacity="0.15"/>
  <rect x="60" y="60" width="135" height="220" rx="8" fill="none" stroke="#27ae60" stroke-width="2"/>
  <text x="128" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6e35">极低估</text>
  <text x="128" y="108" text-anchor="middle" font-size="11" fill="#1a6e35">PE百分位 &lt;20%</text>
  <text x="128" y="145" text-anchor="middle" font-size="28" font-weight="bold" fill="#27ae60">×2</text>
  <text x="128" y="165" text-anchor="middle" font-size="11" fill="#1a6e35">双倍定投</text>
  <text x="128" y="230" text-anchor="middle" font-size="10" fill="#555">例：月均1000元</text>
  <text x="128" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">→ 投2000元</text>

  <!-- Zone 2: Cheap -->
  <rect x="210" y="60" width="135" height="220" rx="8" fill="#2ecc71" opacity="0.12"/>
  <rect x="210" y="60" width="135" height="220" rx="8" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="278" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">低估</text>
  <text x="278" y="108" text-anchor="middle" font-size="11" fill="#1e8449">PE百分位 20-40%</text>
  <text x="278" y="145" text-anchor="middle" font-size="28" font-weight="bold" fill="#2ecc71">×1.5</text>
  <text x="278" y="165" text-anchor="middle" font-size="11" fill="#1e8449">加量定投</text>
  <text x="278" y="230" text-anchor="middle" font-size="10" fill="#555">例：月均1000元</text>
  <text x="278" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#2ecc71">→ 投1500元</text>

  <!-- Zone 3: Fair -->
  <rect x="360" y="60" width="135" height="220" rx="8" fill="#f39c12" opacity="0.12"/>
  <rect x="360" y="60" width="135" height="220" rx="8" fill="none" stroke="#f39c12" stroke-width="2"/>
  <text x="428" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#b7770d">合理估值</text>
  <text x="428" y="108" text-anchor="middle" font-size="11" fill="#b7770d">PE百分位 40-70%</text>
  <text x="428" y="145" text-anchor="middle" font-size="28" font-weight="bold" fill="#f39c12">×1</text>
  <text x="428" y="165" text-anchor="middle" font-size="11" fill="#b7770d">正常定投</text>
  <text x="428" y="230" text-anchor="middle" font-size="10" fill="#555">例：月均1000元</text>
  <text x="428" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#f39c12">→ 投1000元</text>

  <!-- Zone 4: Expensive -->
  <rect x="510" y="60" width="135" height="220" rx="8" fill="#e74c3c" opacity="0.10"/>
  <rect x="510" y="60" width="135" height="220" rx="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <text x="578" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">高估</text>
  <text x="578" y="108" text-anchor="middle" font-size="11" fill="#922b21">PE百分位 70-90%</text>
  <text x="578" y="145" text-anchor="middle" font-size="28" font-weight="bold" fill="#e74c3c">×0.5</text>
  <text x="578" y="165" text-anchor="middle" font-size="11" fill="#922b21">减量定投</text>
  <text x="578" y="230" text-anchor="middle" font-size="10" fill="#555">例：月均1000元</text>
  <text x="578" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">→ 投500元</text>

  <!-- Zone 5: Very expensive -->
  <rect x="660" y="60" width="115" height="220" rx="8" fill="#c0392b" opacity="0.10"/>
  <rect x="660" y="60" width="115" height="220" rx="8" fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="718" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b241c">极高估</text>
  <text x="718" y="108" text-anchor="middle" font-size="11" fill="#7b241c">PE百分位 &gt;90%</text>
  <text x="718" y="145" text-anchor="middle" font-size="28" font-weight="bold" fill="#c0392b">暂停</text>
  <text x="718" y="165" text-anchor="middle" font-size="11" fill="#7b241c">或开始减仓</text>
  <text x="718" y="230" text-anchor="middle" font-size="10" fill="#555">例：月均1000元</text>
  <text x="718" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">→ 投0元</text>

  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#888">数据来源参考：中证指数官网、理杏仁、且慢等平台提供PE/PB历史百分位</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#aaa">注：不同宽基ETF适合的估值体系不同，科创/创业板波动大，百分位仅供参考</text>
</svg>
