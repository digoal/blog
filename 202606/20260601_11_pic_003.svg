<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">定投止盈决策树：什么时候可以收手？</text>

  <!-- Start node -->
  <rect x="320" y="60" width="160" height="44" rx="22" fill="#3498db"/>
  <text x="400" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="white">触发止盈检查</text>

  <!-- Arrow down -->
  <line x1="400" y1="104" x2="400" y2="128" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision 1 -->
  <polygon points="400,130 540,175 400,220 260,175" fill="#fff3cd" stroke="#f39c12" stroke-width="2"/>
  <text x="400" y="171" text-anchor="middle" font-size="12" fill="#856404">盈利是否 ≥ 目标</text>
  <text x="400" y="186" text-anchor="middle" font-size="12" fill="#856404">（如预设20%、30%）？</text>

  <!-- Left: No -->
  <line x1="260" y1="175" x2="130" y2="175" stroke="#888" stroke-width="1.5"/>
  <line x1="130" y1="175" x2="130" y2="240" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="195" y="165" text-anchor="middle" font-size="11" fill="#888">否</text>
  <rect x="60" y="240" width="140" height="44" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="260" text-anchor="middle" font-size="12" fill="#1a6e35">继续定投</text>
  <text x="130" y="276" text-anchor="middle" font-size="11" fill="#1a6e35">不改变计划</text>

  <!-- Right: Yes -->
  <line x1="540" y1="175" x2="670" y2="175" stroke="#888" stroke-width="1.5"/>
  <line x1="670" y1="175" x2="670" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="605" y="165" text-anchor="middle" font-size="11" fill="#888">是</text>

  <!-- Decision 2 -->
  <polygon points="670,212 760,240 670,268 580,240" fill="#fce4ec" stroke="#e74c3c" stroke-width="2"/>
  <text x="670" y="236" text-anchor="middle" font-size="11" fill="#922b21">估值是否仍高？</text>
  <text x="670" y="252" text-anchor="middle" font-size="11" fill="#922b21">（PE百分位&gt;70%）</text>

  <!-- Down from decision 2: Yes -->
  <line x1="670" y1="268" x2="670" y2="298" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="685" y="285" font-size="11" fill="#888">是</text>
  <rect x="590" y="298" width="160" height="34" rx="8" fill="#ffcdd2" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="670" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">分批止盈，逐步减仓</text>

  <!-- Left from decision 2: No -->
  <line x1="580" y1="240" x2="430" y2="240" stroke="#888" stroke-width="1.5"/>
  <line x1="430" y1="240" x2="430" y2="298" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="230" text-anchor="middle" font-size="11" fill="#888">否（估值合理）</text>
  <rect x="330" y="298" width="200" height="34" rx="8" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
  <text x="430" y="321" text-anchor="middle" font-size="12" fill="#1565c0">持有，减少新增投入</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
</svg>
