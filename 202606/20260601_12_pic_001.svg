<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">经济周期四阶段与行业ETF轮动图</text>

  <!-- 圆形轮动示意 -->
  <circle cx="400" cy="220" r="130" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 四个象限色块 -->
  <!-- 复苏期 右上 -->
  <path d="M400,220 L530,90 A140,140 0 0,1 530,350 Z" fill="#e8f5e9" opacity="0.7"/>
  <!-- 扩张期 右下 -->
  <path d="M400,220 L530,350 A140,140 0 0,1 270,350 Z" fill="#fff3e0" opacity="0.7"/>
  <!-- 滞涨期 左下 -->
  <path d="M400,220 L270,350 A140,140 0 0,1 270,90 Z" fill="#fce4ec" opacity="0.7"/>
  <!-- 衰退期 左上 -->
  <path d="M400,220 L270,90 A140,140 0 0,1 530,90 Z" fill="#e3f2fd" opacity="0.7"/>

  <!-- 阶段标签 -->
  <text x="510" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">复苏期</text>
  <text x="510" y="192" text-anchor="middle" font-size="11" fill="#388e3c">↑ 金融/消费/科技</text>

  <text x="480" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">扩张期</text>
  <text x="480" y="337" text-anchor="middle" font-size="11" fill="#ef6c00">↑ 能源/材料/工业</text>

  <text x="310" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">滞涨期</text>
  <text x="310" y="337" text-anchor="middle" font-size="11" fill="#d32f2f">↑ 黄金/能源/医疗</text>

  <text x="290" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">衰退期</text>
  <text x="290" y="192" text-anchor="middle" font-size="11" fill="#1976d2">↑ 医疗/公用/债券</text>

  <!-- 中心圆 -->
  <circle cx="400" cy="220" r="42" fill="white" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="400" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">行业ETF</text>
  <text x="400" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">轮动核心</text>

  <!-- 顺时针箭头 -->
  <path d="M 510 145 A 120 120 0 0 1 530 210" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <text x="540" y="185" font-size="11" fill="#555">顺时针轮动</text>

  <!-- 底部说明 -->
  <rect x="50" y="385" width="700" height="24" rx="4" fill="#eeeeee"/>
  <text x="400" y="401" text-anchor="middle" font-size="11" fill="#666">注：轮动方向为一般规律，实际周期节奏受政策、外部冲击影响，需结合当前宏观数据判断</text>
</svg>
