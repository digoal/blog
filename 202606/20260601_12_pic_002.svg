<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">行业ETF切换信号三角模型</text>

  <!-- 三角形背景 -->
  <polygon points="400,55 80,310 720,310" fill="#fff" stroke="#ccc" stroke-width="1.5"/>

  <!-- 三个角 -->
  <!-- 顶部：宏观信号 -->
  <circle cx="400" cy="55" r="48" fill="#1565c0"/>
  <text x="400" y="49" text-anchor="middle" font-size="12" font-weight="bold" fill="white">宏观信号</text>
  <text x="400" y="66" text-anchor="middle" font-size="10" fill="#bbdefb">PMI / CPI / 利率</text>

  <!-- 左下：资金信号 -->
  <circle cx="130" cy="300" r="48" fill="#2e7d32"/>
  <text x="130" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="white">资金信号</text>
  <text x="130" y="311" text-anchor="middle" font-size="10" fill="#c8e6c9">成交额 / 北向 / 净流入</text>

  <!-- 右下：相对强度 -->
  <circle cx="670" cy="300" r="48" fill="#e65100"/>
  <text x="670" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="white">相对强度</text>
  <text x="670" y="311" text-anchor="middle" font-size="10" fill="#ffe0b2">行业 vs 宽基 涨跌比</text>

  <!-- 中心三角 -->
  <polygon points="400,140 240,270 560,270" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">三信号同向</text>
  <text x="400" y="228" text-anchor="middle" font-size="11" fill="#7b1fa2">→ 确认切换</text>
  <text x="400" y="246" text-anchor="middle" font-size="11" fill="#7b1fa2">→ 执行换仓</text>

  <!-- 连线标注 -->
  <line x1="355" y1="90" x2="215" y2="260" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="445" y1="90" x2="565" y2="260" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="300" x2="620" y2="300" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 单信号提示 -->
  <text x="400" y="340" text-anchor="middle" font-size="11" fill="#888">⚠️ 仅一个信号 = 观察； 两个信号 = 小仓位试探；三个信号同向 = 确认换仓</text>
</svg>
