<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="300" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">行业ETF轮动操作流程</text>

  <!-- 步骤盒子 -->
  <!-- Step1 -->
  <rect x="30" y="55" width="130" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="95" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">① 判断周期</text>
  <text x="95" y="103" text-anchor="middle" font-size="10" fill="#1565c0">PMI趋势</text>
  <text x="95" y="118" text-anchor="middle" font-size="10" fill="#1565c0">CPI/PPI走向</text>

  <!-- 箭头 -->
  <line x1="160" y1="95" x2="195" y2="95" stroke="#555" stroke-width="2" marker-end="url(#a1)"/>
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Step2 -->
  <rect x="195" y="55" width="130" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="260" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">② 选候选行业</text>
  <text x="260" y="103" text-anchor="middle" font-size="10" fill="#2e7d32">匹配周期偏好</text>
  <text x="260" y="118" text-anchor="middle" font-size="10" fill="#2e7d32">圈出2~3个板块</text>

  <line x1="325" y1="95" x2="360" y2="95" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Step3 -->
  <rect x="360" y="55" width="130" height="80" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="425" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">③ 验证信号</text>
  <text x="425" y="103" text-anchor="middle" font-size="10" fill="#bf360c">资金流入确认</text>
  <text x="425" y="118" text-anchor="middle" font-size="10" fill="#bf360c">相对强度领先</text>

  <line x1="490" y1="95" x2="525" y2="95" stroke="#555" stroke-width="2" marker-end="url(#a3)"/>
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Step4 -->
  <rect x="525" y="55" width="130" height="80" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="590" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#880e4f">④ 执行换仓</text>
  <text x="590" y="103" text-anchor="middle" font-size="10" fill="#ad1457">分2次买入</text>
  <text x="590" y="118" text-anchor="middle" font-size="10" fill="#ad1457">旧仓分批减出</text>

  <line x1="655" y1="95" x2="690" y2="95" stroke="#555" stroke-width="2" marker-end="url(#a4)"/>
  <defs>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Step5 -->
  <rect x="690" y="55" width="85" height="80" rx="8" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="733" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a148c">⑤ 持续</text>
  <text x="733" y="99" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a148c">复盘</text>
  <text x="733" y="120" text-anchor="middle" font-size="10" fill="#6a1b9a">每2周检视</text>

  <!-- 失效指示 -->
  <rect x="195" y="165" width="450" height="55" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="420" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57f17">⚠️ 信号失效？立刻重新进入步骤①</text>
  <text x="420" y="206" text-anchor="middle" font-size="11" fill="#795548">触发条件：周期信号反转 / 行业大幅跑输宽基 / 资金连续3周净流出</text>

  <!-- 向上箭头 -->
  <line x1="420" y1="165" x2="420" y2="140" stroke="#f9a825" stroke-width="2" stroke-dasharray="4,3"/>

  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#888">轮动不是频繁换仓，正常轮动周期在3~6个月以上，过于频繁换仓会吃掉利润</text>
</svg>
