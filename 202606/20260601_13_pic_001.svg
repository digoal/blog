<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">三类"聪明β"ETF对比图</text>

  <!-- 红利ETF -->
  <rect x="40" y="60" width="220" height="320" fill="#fff3e0" rx="10" stroke="#f57c00" stroke-width="2"/>
  <text x="150" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">红利ETF</text>
  <text x="150" y="112" text-anchor="middle" font-size="11" fill="#bf360c">高股息率筛选</text>

  <text x="60" y="140" font-size="11" fill="#333">选股逻辑：</text>
  <text x="60" y="158" font-size="10" fill="#555">• 股息率高（分红/股价）</text>
  <text x="60" y="174" font-size="10" fill="#555">• 连续分红记录</text>
  <text x="60" y="190" font-size="10" fill="#555">• 多数为银行、煤炭、电力</text>

  <text x="60" y="218" font-size="11" fill="#333">适合场景：</text>
  <text x="60" y="236" font-size="10" fill="#555">• 震荡市/熊市防守</text>
  <text x="60" y="252" font-size="10" fill="#555">• 利率下行时增配</text>
  <text x="60" y="268" font-size="10" fill="#555">• 追求现金流收益</text>

  <text x="60" y="296" font-size="11" fill="#333">主要风险：</text>
  <text x="60" y="314" font-size="10" fill="#c62828">• 行业集中（金融/能源）</text>
  <text x="60" y="330" font-size="10" fill="#c62828">• 经济好转时跑输成长</text>
  <text x="60" y="346" font-size="10" fill="#c62828">• 分红可持续性不保证</text>

  <rect x="60" y="358" width="140" height="10" fill="#ffcc02" rx="3"/>
  <text x="130" y="387" text-anchor="middle" font-size="10" fill="#888">防守★★★★  成长★★</text>

  <!-- 低波ETF -->
  <rect x="290" y="60" width="220" height="320" fill="#e8f5e9" rx="10" stroke="#388e3c" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">低波ETF</text>
  <text x="400" y="112" text-anchor="middle" font-size="11" fill="#2e7d32">低波动率筛选</text>

  <text x="310" y="140" font-size="11" fill="#333">选股逻辑：</text>
  <text x="310" y="158" font-size="10" fill="#555">• 历史价格波动率低</text>
  <text x="310" y="174" font-size="10" fill="#555">• 回撤较小的稳定品种</text>
  <text x="310" y="190" font-size="10" fill="#555">• 公用事业、消费龙头居多</text>

  <text x="310" y="218" font-size="11" fill="#333">适合场景：</text>
  <text x="310" y="236" font-size="10" fill="#555">• 市场不确定性高时</text>
  <text x="310" y="252" font-size="10" fill="#555">• 投资者心理承受弱</text>
  <text x="310" y="268" font-size="10" fill="#555">• 追求低回撤体验</text>

  <text x="310" y="296" font-size="11" fill="#333">主要风险：</text>
  <text x="310" y="314" font-size="10" fill="#c62828">• 牛市严重跑输大盘</text>
  <text x="310" y="330" font-size="10" fill="#c62828">• 历史低波不代表未来</text>
  <text x="310" y="346" font-size="10" fill="#c62828">• 可能积聚"拥挤"风险</text>

  <rect x="310" y="358" width="140" height="10" fill="#66bb6a" rx="3"/>
  <text x="380" y="387" text-anchor="middle" font-size="10" fill="#888">防守★★★★  成长★★</text>

  <!-- 质量ETF -->
  <rect x="540" y="60" width="220" height="320" fill="#e3f2fd" rx="10" stroke="#1565c0" stroke-width="2"/>
  <text x="650" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d47a1">质量ETF</text>
  <text x="650" y="112" text-anchor="middle" font-size="11" fill="#1565c0">基本面质量筛选</text>

  <text x="560" y="140" font-size="11" fill="#333">选股逻辑：</text>
  <text x="560" y="158" font-size="10" fill="#555">• ROE高且稳定</text>
  <text x="560" y="174" font-size="10" fill="#555">• 低杠杆、盈利稳定</text>
  <text x="560" y="190" font-size="10" fill="#555">• 消费、医药、科技白马</text>

  <text x="560" y="218" font-size="11" fill="#333">适合场景：</text>
  <text x="560" y="236" font-size="10" fill="#555">• 宽基ETF的"升级版"</text>
  <text x="560" y="252" font-size="10" fill="#555">• 想要质量但不选个股</text>
  <text x="560" y="268" font-size="10" fill="#555">• 各种市场环境通用性强</text>

  <text x="560" y="296" font-size="11" fill="#333">主要风险：</text>
  <text x="560" y="314" font-size="10" fill="#c62828">• 估值往往偏贵</text>
  <text x="560" y="330" font-size="10" fill="#c62828">• 质量因子可能失效</text>
  <text x="560" y="346" font-size="10" fill="#c62828">• 标准不统一，各家差异大</text>

  <rect x="560" y="358" width="140" height="10" fill="#42a5f5" rx="3"/>
  <text x="630" y="387" text-anchor="middle" font-size="10" fill="#888">防守★★★  成长★★★</text>

  <!-- 底部标注 -->
  <text x="400" y="410" text-anchor="middle" font-size="9" fill="#999">本图为逻辑示意，不构成投资建议</text>
</svg>
