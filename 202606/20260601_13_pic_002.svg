<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">市场周期与三类ETF适配表</text>

  <!-- 表头 -->
  <rect x="20" y="50" width="760" height="40" fill="#37474f" rx="4"/>
  <text x="110" y="76" text-anchor="middle" font-size="13" fill="white" font-weight="bold">市场环境</text>
  <text x="300" y="76" text-anchor="middle" font-size="13" fill="#ffcc02" font-weight="bold">红利ETF</text>
  <text x="490" y="76" text-anchor="middle" font-size="13" fill="#66bb6a" font-weight="bold">低波ETF</text>
  <text x="680" y="76" text-anchor="middle" font-size="13" fill="#42a5f5" font-weight="bold">质量ETF</text>

  <!-- 行1：牛市初期 -->
  <rect x="20" y="92" width="760" height="44" fill="#fff9c4" rx="2"/>
  <text x="110" y="110" text-anchor="middle" font-size="12" fill="#333">📈 牛市初期</text>
  <text x="110" y="126" text-anchor="middle" font-size="10" fill="#666">经济复苏、情绪转暖</text>
  <text x="300" y="116" text-anchor="middle" font-size="20">😐</text>
  <text x="300" y="130" text-anchor="middle" font-size="9" fill="#888">跑输成长</text>
  <text x="490" y="116" text-anchor="middle" font-size="20">😐</text>
  <text x="490" y="130" text-anchor="middle" font-size="9" fill="#888">相对落后</text>
  <text x="680" y="116" text-anchor="middle" font-size="20">🟢</text>
  <text x="680" y="130" text-anchor="middle" font-size="9" fill="#2e7d32">较好参与</text>

  <!-- 行2：牛市中后期 -->
  <rect x="20" y="138" width="760" height="44" fill="#fff3e0" rx="2"/>
  <text x="110" y="156" text-anchor="middle" font-size="12" fill="#333">🔥 牛市中后期</text>
  <text x="110" y="172" text-anchor="middle" font-size="10" fill="#666">估值抬升、情绪亢奋</text>
  <text x="300" y="156" text-anchor="middle" font-size="20">🔴</text>
  <text x="300" y="172" text-anchor="middle" font-size="9" fill="#c62828">大幅落后</text>
  <text x="490" y="156" text-anchor="middle" font-size="20">🔴</text>
  <text x="490" y="172" text-anchor="middle" font-size="9" fill="#c62828">大幅落后</text>
  <text x="680" y="156" text-anchor="middle" font-size="20">😐</text>
  <text x="680" y="172" text-anchor="middle" font-size="9" fill="#888">追不上但涨</text>

  <!-- 行3：震荡市 -->
  <rect x="20" y="184" width="760" height="44" fill="#e8f5e9" rx="2"/>
  <text x="110" y="202" text-anchor="middle" font-size="12" fill="#333">↕️ 震荡市</text>
  <text x="110" y="218" text-anchor="middle" font-size="10" fill="#666">横盘消化、方向不明</text>
  <text x="300" y="202" text-anchor="middle" font-size="20">🟢</text>
  <text x="300" y="218" text-anchor="middle" font-size="9" fill="#2e7d32">分红收益显现</text>
  <text x="490" y="202" text-anchor="middle" font-size="20">🟢</text>
  <text x="490" y="218" text-anchor="middle" font-size="9" fill="#2e7d32">回撤较小</text>
  <text x="680" y="202" text-anchor="middle" font-size="20">🟢</text>
  <text x="680" y="218" text-anchor="middle" font-size="9" fill="#2e7d32">稳健跑出超额</text>

  <!-- 行4：熊市 -->
  <rect x="20" y="230" width="760" height="44" fill="#fce4ec" rx="2"/>
  <text x="110" y="248" text-anchor="middle" font-size="12" fill="#333">📉 熊市</text>
  <text x="110" y="264" text-anchor="middle" font-size="10" fill="#666">下跌趋势、风险规避</text>
  <text x="300" y="248" text-anchor="middle" font-size="20">🟢</text>
  <text x="300" y="264" text-anchor="middle" font-size="9" fill="#2e7d32">相对抗跌</text>
  <text x="490" y="248" text-anchor="middle" font-size="20">🟢</text>
  <text x="490" y="264" text-anchor="middle" font-size="9" fill="#2e7d32">最抗跌品种</text>
  <text x="680" y="248" text-anchor="middle" font-size="20">😐</text>
  <text x="680" y="264" text-anchor="middle" font-size="9" fill="#888">跌幅适中</text>

  <!-- 行5：利率下行 -->
  <rect x="20" y="276" width="760" height="44" fill="#e3f2fd" rx="2"/>
  <text x="110" y="294" text-anchor="middle" font-size="12" fill="#333">⬇️ 利率下行</text>
  <text x="110" y="310" text-anchor="middle" font-size="10" fill="#666">降息周期、债市走强</text>
  <text x="300" y="294" text-anchor="middle" font-size="20">🌟</text>
  <text x="300" y="310" text-anchor="middle" font-size="9" fill="#e65100">最受益品种</text>
  <text x="490" y="294" text-anchor="middle" font-size="20">🟢</text>
  <text x="490" y="310" text-anchor="middle" font-size="9" fill="#2e7d32">受益</text>
  <text x="680" y="294" text-anchor="middle" font-size="20">😐</text>
  <text x="680" y="310" text-anchor="middle" font-size="9" fill="#888">中性</text>

  <line x1="200" y1="52" x2="200" y2="320" stroke="#ccc" stroke-width="1"/>
  <line x1="390" y1="52" x2="390" y2="320" stroke="#ccc" stroke-width="1"/>
  <line x1="580" y1="52" x2="580" y2="320" stroke="#ccc" stroke-width="1"/>

  <text x="400" y="348" text-anchor="middle" font-size="9" fill="#999">🟢适合配置 😐中性 🔴不适合 🌟最佳场景 | 仅供参考，非投资建议</text>
</svg>
