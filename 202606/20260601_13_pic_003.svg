<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">选哪只ETF？决策流程图</text>

  <!-- 开始 -->
  <rect x="310" y="50" width="180" height="40" fill="#37474f" rx="20"/>
  <text x="400" y="75" text-anchor="middle" font-size="13" fill="white">你现在最在意什么？</text>

  <!-- 箭头下 -->
  <line x1="400" y1="90" x2="400" y2="115" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 三分支 -->
  <line x1="400" y1="115" x2="150" y2="115" stroke="#666" stroke-width="2"/>
  <line x1="400" y1="115" x2="650" y2="115" stroke="#666" stroke-width="2"/>
  <line x1="150" y1="115" x2="150" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="115" x2="400" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="115" x2="650" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="150" y="110" text-anchor="middle" font-size="10" fill="#e65100">稳定分红/现金收益</text>
  <text x="400" y="110" text-anchor="middle" font-size="10" fill="#2e7d32">少亏钱/睡得着觉</text>
  <text x="650" y="110" text-anchor="middle" font-size="10" fill="#0d47a1">长期跑赢/高质量</text>

  <!-- 三个问题框 -->
  <rect x="60" y="140" width="180" height="50" fill="#fff3e0" rx="8" stroke="#f57c00" stroke-width="1.5"/>
  <text x="150" y="160" text-anchor="middle" font-size="11" fill="#333">你持有期≥1年，</text>
  <text x="150" y="176" text-anchor="middle" font-size="11" fill="#333">愿意持仓等分红？</text>

  <rect x="310" y="140" width="180" height="50" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1.5"/>
  <text x="400" y="160" text-anchor="middle" font-size="11" fill="#333">你看到-10%会</text>
  <text x="400" y="176" text-anchor="middle" font-size="11" fill="#333">慌乱想卖出？</text>

  <rect x="560" y="140" width="180" height="50" fill="#e3f2fd" rx="8" stroke="#1565c0" stroke-width="1.5"/>
  <text x="650" y="160" text-anchor="middle" font-size="11" fill="#333">你想长期配置，</text>
  <text x="650" y="176" text-anchor="middle" font-size="11" fill="#333">但懒得选个股？</text>

  <!-- 是/否 -->
  <line x1="150" y1="190" x2="150" y2="215" stroke="#f57c00" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="190" x2="400" y2="215" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="650" y1="190" x2="650" y2="215" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow4)"/>

  <text x="155" y="208" font-size="9" fill="#f57c00">是 ↓</text>
  <text x="405" y="208" font-size="9" fill="#388e3c">是 ↓</text>
  <text x="655" y="208" font-size="9" fill="#1565c0">是 ↓</text>

  <!-- 结果框 -->
  <rect x="40" y="215" width="220" height="90" fill="#f57c00" rx="10"/>
  <text x="150" y="237" text-anchor="middle" font-size="14" fill="white" font-weight="bold">🏆 红利ETF</text>
  <text x="150" y="256" text-anchor="middle" font-size="10" fill="#fff3e0">代表产品：</text>
  <text x="150" y="272" text-anchor="middle" font-size="10" fill="white">512890 红利ETF</text>
  <text x="150" y="288" text-anchor="middle" font-size="10" fill="white">515000 红利低波ETF</text>
  <text x="150" y="304" text-anchor="middle" font-size="10" fill="#ffe0b2">适合：收益型配置</text>

  <rect x="290" y="215" width="220" height="90" fill="#388e3c" rx="10"/>
  <text x="400" y="237" text-anchor="middle" font-size="14" fill="white" font-weight="bold">🏆 低波ETF</text>
  <text x="400" y="256" text-anchor="middle" font-size="10" fill="#e8f5e9">代表产品：</text>
  <text x="400" y="272" text-anchor="middle" font-size="10" fill="white">512260 中证低波ETF</text>
  <text x="400" y="288" text-anchor="middle" font-size="10" fill="white">沪深300低波ETF</text>
  <text x="400" y="304" text-anchor="middle" font-size="10" fill="#c8e6c9">适合：防守型配置</text>

  <rect x="540" y="215" width="220" height="90" fill="#1565c0" rx="10"/>
  <text x="650" y="237" text-anchor="middle" font-size="14" fill="white" font-weight="bold">🏆 质量ETF</text>
  <text x="650" y="256" text-anchor="middle" font-size="10" fill="#e3f2fd">代表产品：</text>
  <text x="650" y="272" text-anchor="middle" font-size="10" fill="white">A500质量增强ETF</text>
  <text x="650" y="288" text-anchor="middle" font-size="10" fill="white">中证质量成长ETF</text>
  <text x="650" y="304" text-anchor="middle" font-size="10" fill="#bbdefb">适合：核心配置升级</text>

  <!-- 三者都不是 -->
  <line x1="150" y1="190" x2="150" y2="325" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="190" x2="400" y2="325" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="650" y1="190" x2="650" y2="325" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="150" y="335" text-anchor="middle" font-size="9" fill="#999">否 ↓</text>
  <text x="400" y="335" text-anchor="middle" font-size="9" fill="#999">否 ↓</text>
  <text x="650" y="335" text-anchor="middle" font-size="9" fill="#999">否 ↓</text>

  <rect x="150" y="345" width="500" height="40" fill="#eceff1" rx="8"/>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#546e7a">考虑宽基ETF（沪深300/中证500）作为核心仓位</text>
  <text x="400" y="377" text-anchor="middle" font-size="10" fill="#90a4ae">聪明β ETF 是在宽基之上的风格增强，不是替代品</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f57c00"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <text x="400" y="450" text-anchor="middle" font-size="9" fill="#999">本图为教学用途，产品代码仅为示例，不构成投资建议，请核实最新产品信息</text>
</svg>
