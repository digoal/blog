<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">相似搜索从输入到结果的执行链路</title>
  <desc id="desc">展示业务输入经过归一化、tokenizer、相似度函数、阈值操作符、可选 GIN 候选集过滤和精确重检后得到结果集的过程。</desc>
  <style>
    .box { fill:#f8fafc; stroke:#334155; stroke-width:1.5; rx:8; }
    .hot { fill:#ecfeff; stroke:#0e7490; stroke-width:1.5; rx:8; }
    .warn { fill:#fff7ed; stroke:#c2410c; stroke-width:1.5; rx:8; }
    .text { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:16px; fill:#0f172a; }
    .small { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:13px; fill:#475569; }
    .arrow { stroke:#475569; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
    .dash { stroke:#64748b; stroke-width:1.4; stroke-dasharray:6 5; fill:none; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="30" y="48" width="130" height="70" class="box"/>
  <text x="95" y="78" text-anchor="middle" class="text">业务输入</text>
  <text x="95" y="101" text-anchor="middle" class="small">姓名/地址/SKU/标签</text>

  <rect x="205" y="48" width="145" height="70" class="box"/>
  <text x="277" y="78" text-anchor="middle" class="text">规范化</text>
  <text x="277" y="101" text-anchor="middle" class="small">大小写、空格、标点</text>

  <rect x="395" y="48" width="150" height="70" class="hot"/>
  <text x="470" y="78" text-anchor="middle" class="text">Tokenizer</text>
  <text x="470" y="101" text-anchor="middle" class="small">alnum/word/gram/camelcase</text>

  <rect x="590" y="48" width="145" height="70" class="hot"/>
  <text x="662" y="78" text-anchor="middle" class="text">相似度函数</text>
  <text x="662" y="101" text-anchor="middle" class="small">返回 float8 分数</text>

  <rect x="780" y="48" width="145" height="70" class="box"/>
  <text x="852" y="78" text-anchor="middle" class="text">阈值操作符</text>
  <text x="852" y="101" text-anchor="middle" class="small">score &gt;= threshold</text>

  <path d="M160 83 H205" class="arrow"/>
  <path d="M350 83 H395" class="arrow"/>
  <path d="M545 83 H590" class="arrow"/>
  <path d="M735 83 H780" class="arrow"/>

  <rect x="395" y="180" width="150" height="72" class="warn"/>
  <text x="470" y="209" text-anchor="middle" class="text">GIN 候选过滤</text>
  <text x="470" y="232" text-anchor="middle" class="small">只支持 token 类操作符</text>

  <rect x="590" y="180" width="145" height="72" class="warn"/>
  <text x="662" y="209" text-anchor="middle" class="text">Heap Recheck</text>
  <text x="662" y="232" text-anchor="middle" class="small">重新计算真实相似度</text>

  <rect x="780" y="180" width="145" height="72" class="box"/>
  <text x="852" y="209" text-anchor="middle" class="text">结果集</text>
  <text x="852" y="232" text-anchor="middle" class="small">按业务规则排序/限量</text>

  <path d="M470 118 V180" class="dash"/>
  <path d="M545 216 H590" class="arrow"/>
  <path d="M735 216 H780" class="arrow"/>
  <path d="M852 118 V180" class="arrow"/>

  <rect x="60" y="315" width="840" height="56" fill="#f1f5f9" stroke="#cbd5e1" rx="8"/>
  <text x="85" y="339" class="text">关键判断：</text>
  <text x="170" y="339" class="small">相似搜索不是“一个函数”，而是规范化、分词、打分、阈值、候选集控制、重检和排序的组合。</text>
  <text x="170" y="360" class="small">要优化性能，先减少候选集；要优化质量，先校准算法、tokenizer 和阈值。</text>
</svg>
