<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">相似度算法选择矩阵</title>
  <desc id="desc">按字符编辑、token 集合、频次向量、语音编码和序列比对分类，说明常见业务字段应优先选择的算法类型。</desc>
  <style>
    .axis { stroke:#334155; stroke-width:1.6; }
    .grid { stroke:#cbd5e1; stroke-width:1; }
    .label { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:15px; fill:#0f172a; }
    .small { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:12.5px; fill:#475569; }
    .cell { rx:8; stroke-width:1.4; }
  </style>
  <line x1="110" y1="370" x2="880" y2="370" class="axis"/>
  <line x1="110" y1="370" x2="110" y2="70" class="axis"/>
  <text x="495" y="420" text-anchor="middle" class="label">字段粒度：单词/短码 → 短文本 → 长文本/标签集合</text>
  <text x="36" y="220" transform="rotate(-90 36 220)" text-anchor="middle" class="label">变形类型：字符错漏 → 词项重排 → 局部片段匹配</text>

  <line x1="110" y1="270" x2="880" y2="270" class="grid"/>
  <line x1="110" y1="170" x2="880" y2="170" class="grid"/>
  <line x1="360" y1="70" x2="360" y2="370" class="grid"/>
  <line x1="620" y1="70" x2="620" y2="370" class="grid"/>

  <rect x="145" y="285" width="185" height="62" class="cell" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="237" y="310" text-anchor="middle" class="label">Levenshtein/Jaro</text>
  <text x="237" y="333" text-anchor="middle" class="small">姓名、短码、拼写错误</text>

  <rect x="385" y="285" width="205" height="62" class="cell" fill="#dcfce7" stroke="#15803d"/>
  <text x="487" y="310" text-anchor="middle" class="label">Q-Gram/Block</text>
  <text x="487" y="333" text-anchor="middle" class="small">短文本错漏、连续片段</text>

  <rect x="655" y="285" width="185" height="62" class="cell" fill="#fef3c7" stroke="#b45309"/>
  <text x="747" y="310" text-anchor="middle" class="label">Jaccard/Dice</text>
  <text x="747" y="333" text-anchor="middle" class="small">标签、去重词项集合</text>

  <rect x="385" y="185" width="205" height="62" class="cell" fill="#f3e8ff" stroke="#7e22ce"/>
  <text x="487" y="210" text-anchor="middle" class="label">Cosine/Euclidean</text>
  <text x="487" y="233" text-anchor="middle" class="small">词项向量、频次差异</text>

  <rect x="655" y="185" width="185" height="62" class="cell" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="747" y="210" text-anchor="middle" class="label">Overlap</text>
  <text x="747" y="233" text-anchor="middle" class="small">短查询包含在长文本中</text>

  <rect x="145" y="86" width="185" height="62" class="cell" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="237" y="111" text-anchor="middle" class="label">Soundex/Hamming</text>
  <text x="237" y="134" text-anchor="middle" class="small">发音近似/等长编码</text>

  <rect x="385" y="86" width="205" height="62" class="cell" fill="#ede9fe" stroke="#6d28d9"/>
  <text x="487" y="111" text-anchor="middle" class="label">Smith-Waterman</text>
  <text x="487" y="134" text-anchor="middle" class="small">局部序列片段相似</text>

  <text x="120" y="396" class="small">低召回风险：算法与字段变形不匹配</text>
  <text x="600" y="396" class="small">高成本风险：候选集大、逐行计算重</text>
</svg>
