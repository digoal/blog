<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">GIN token 候选集与重检机制</title>
  <desc id="desc">说明 pg_similarity 的 GIN 操作符类根据 token 建索引，查询时返回可能匹配的候选 TID，并在 heap recheck 阶段重新执行相似度操作符。</desc>
  <style>
    .box { fill:#f8fafc; stroke:#334155; stroke-width:1.5; rx:8; }
    .idx { fill:#ecfeff; stroke:#0891b2; stroke-width:1.5; rx:8; }
    .heap { fill:#f0fdf4; stroke:#16a34a; stroke-width:1.5; rx:8; }
    .bad { fill:#fff7ed; stroke:#ea580c; stroke-width:1.5; rx:8; }
    .text { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:15.5px; fill:#0f172a; }
    .small { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:12.5px; fill:#475569; }
    .arrow { stroke:#475569; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="45" y="58" width="170" height="75" class="box"/>
  <text x="130" y="88" text-anchor="middle" class="text">文本列 a</text>
  <text x="130" y="112" text-anchor="middle" class="small">原始 heap tuple</text>

  <rect x="275" y="58" width="170" height="75" class="idx"/>
  <text x="360" y="88" text-anchor="middle" class="text">extract_value</text>
  <text x="360" y="112" text-anchor="middle" class="small">默认编译为 alnum token</text>

  <rect x="505" y="38" width="185" height="115" class="idx"/>
  <text x="597" y="66" text-anchor="middle" class="text">GIN 倒排项</text>
  <text x="597" y="91" text-anchor="middle" class="small">euler → TID 列表</text>
  <text x="597" y="113" text-anchor="middle" class="small">oliveira → TID 列表</text>
  <text x="597" y="135" text-anchor="middle" class="small">taveira → TID 列表</text>

  <rect x="748" y="58" width="170" height="75" class="box"/>
  <text x="833" y="88" text-anchor="middle" class="text">查询文本</text>
  <text x="833" y="112" text-anchor="middle" class="small">extract_query token</text>

  <path d="M215 95 H275" class="arrow"/>
  <path d="M445 95 H505" class="arrow"/>
  <path d="M748 95 H690" class="arrow"/>

  <rect x="255" y="220" width="210" height="80" class="bad"/>
  <text x="360" y="251" text-anchor="middle" class="text">consistent 总是 true</text>
  <text x="360" y="274" text-anchor="middle" class="small">只表示“可能匹配”</text>

  <rect x="535" y="220" width="210" height="80" class="heap"/>
  <text x="640" y="251" text-anchor="middle" class="text">recheck = true</text>
  <text x="640" y="274" text-anchor="middle" class="small">回表重新计算操作符</text>

  <rect x="785" y="220" width="120" height="80" class="box"/>
  <text x="845" y="251" text-anchor="middle" class="text">最终命中</text>
  <text x="845" y="274" text-anchor="middle" class="small">过滤误候选</text>

  <path d="M597 153 C585 195 430 192 382 220" class="arrow"/>
  <path d="M465 260 H535" class="arrow"/>
  <path d="M745 260 H785" class="arrow"/>

  <rect x="68" y="344" width="824" height="50" fill="#f1f5f9" stroke="#cbd5e1" rx="8"/>
  <text x="92" y="374" class="small">工程含义：GIN 可以减少进入相似度函数的候选行，但 pg_similarity 的实现仍需要 heap recheck；tokenizer 与 GUC 不一致时，索引选择要特别谨慎。</text>
</svg>
