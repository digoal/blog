<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">相似度阈值的召回、误匹配和成本权衡</title>
  <desc id="desc">显示阈值降低时召回和候选集增加，阈值升高时误匹配降低但漏召回增加，最佳实践应通过标注样本校准阈值。</desc>
  <style>
    .axis { stroke:#334155; stroke-width:1.6; }
    .grid { stroke:#cbd5e1; stroke-width:1; }
    .recall { stroke:#0284c7; stroke-width:3; fill:none; }
    .false { stroke:#dc2626; stroke-width:3; fill:none; }
    .cost { stroke:#16a34a; stroke-width:3; fill:none; stroke-dasharray:8 5; }
    .label { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:15px; fill:#0f172a; }
    .small { font-family:Arial, "Noto Sans CJK SC", sans-serif; font-size:12.5px; fill:#475569; }
    .note { fill:#f8fafc; stroke:#cbd5e1; rx:8; }
  </style>
  <line x1="100" y1="330" x2="850" y2="330" class="axis"/>
  <line x1="100" y1="330" x2="100" y2="70" class="axis"/>
  <text x="475" y="380" text-anchor="middle" class="label">阈值 threshold：低 → 高</text>
  <text x="45" y="205" transform="rotate(-90 45 205)" text-anchor="middle" class="label">比例 / 成本</text>

  <line x1="100" y1="265" x2="850" y2="265" class="grid"/>
  <line x1="100" y1="200" x2="850" y2="200" class="grid"/>
  <line x1="100" y1="135" x2="850" y2="135" class="grid"/>

  <path d="M120 105 C230 112 360 145 500 205 C640 262 750 305 835 318" class="recall"/>
  <path d="M120 115 C245 135 360 185 505 245 C640 298 760 322 835 326" class="false"/>
  <path d="M120 90 C250 125 385 185 535 265 C670 310 770 326 835 328" class="cost"/>

  <text x="695" y="110" class="small" fill="#0284c7">召回率：阈值越高越容易下降</text>
  <text x="695" y="132" class="small" fill="#dc2626">误匹配：阈值越低越容易上升</text>
  <text x="695" y="154" class="small" fill="#16a34a">候选成本：低阈值更容易放大</text>

  <rect x="330" y="78" width="250" height="55" class="note"/>
  <text x="455" y="101" text-anchor="middle" class="label">建议阈值区间</text>
  <text x="455" y="123" text-anchor="middle" class="small">用人工标注样本和业务损失函数校准</text>

  <line x1="365" y1="78" x2="365" y2="330" stroke="#94a3b8" stroke-dasharray="5 5"/>
  <line x1="545" y1="78" x2="545" y2="330" stroke="#94a3b8" stroke-dasharray="5 5"/>
</svg>
