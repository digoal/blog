<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 优化器选择索引访问路径</title>
  <desc id="desc">展示 WHERE、ORDER BY、输出列、统计信息如何进入优化器，生成普通索引扫描、bitmap 扫描、index only scan 或顺序扫描。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .key { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.4; rx: 8; }
    .cost { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
    .out { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 8; }
    .warn { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; }
    .line { stroke: #374151; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.3; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; fill: #374151; }
    .tiny { font-size: 13px; fill: #475569; }
    .title { font-size: 22px; font-weight: 700; }
  </style>
  <text x="36" y="42" class="title">一次索引选择不是“有索引就用”，而是成本比较</text>

  <rect x="38" y="78" width="180" height="92" class="box"/>
  <text x="68" y="112">SQL 查询</text>
  <text x="58" y="142" class="small">WHERE / JOIN</text>
  <text x="58" y="162" class="small">ORDER BY / LIMIT</text>

  <rect x="292" y="58" width="190" height="132" class="key"/>
  <text x="325" y="92">候选索引</text>
  <text x="314" y="123" class="small">列、表达式、谓词</text>
  <text x="314" y="145" class="small">操作符类、排序</text>
  <text x="314" y="167" class="small">INCLUDE 可返回列</text>

  <rect x="292" y="224" width="190" height="116" class="cost"/>
  <text x="326" y="258">统计信息</text>
  <text x="314" y="289" class="small">pg_statistic</text>
  <text x="314" y="311" class="small">扩展统计: mcv</text>
  <text x="314" y="333" class="small">ndistinct / dependencies</text>

  <rect x="555" y="96" width="196" height="174" class="box"/>
  <text x="590" y="130">indxpath.c</text>
  <text x="580" y="160" class="small">create_index_paths()</text>
  <text x="580" y="184" class="small">匹配 restriction</text>
  <text x="580" y="208" class="small">匹配 join / OR</text>
  <text x="580" y="232" class="small">检查 partial predicate</text>
  <text x="580" y="256" class="small">检查 index only</text>

  <rect x="555" y="320" width="196" height="108" class="cost"/>
  <text x="590" y="354">成本比较</text>
  <text x="580" y="385" class="small">选择性、页数、相关性</text>
  <text x="580" y="407" class="small">随机/顺序 IO、CPU</text>

  <rect x="805" y="56" width="138" height="76" class="out"/>
  <text x="826" y="92">Index Scan</text>
  <text x="825" y="116" class="tiny">保留索引顺序</text>

  <rect x="805" y="154" width="138" height="78" class="out"/>
  <text x="817" y="190">Index Only</text>
  <text x="823" y="214" class="tiny">依赖可见性图</text>

  <rect x="805" y="254" width="138" height="86" class="out"/>
  <text x="817" y="289">Bitmap Heap</text>
  <text x="819" y="314" class="tiny">BitmapAnd / Or</text>

  <rect x="805" y="362" width="138" height="76" class="warn"/>
  <text x="828" y="398">Seq Scan</text>
  <text x="817" y="422" class="tiny">扫描成本更低</text>

  <path d="M218 124 L292 124" class="line"/>
  <path d="M218 124 C250 190 258 250 292 282" class="dash"/>
  <path d="M482 124 L555 170" class="line"/>
  <path d="M482 282 L555 365" class="line"/>
  <path d="M653 270 L653 320" class="line"/>
  <path d="M751 374 C778 260 776 100 805 94" class="line"/>
  <path d="M751 374 C780 320 778 210 805 194" class="line"/>
  <path d="M751 374 C780 360 777 305 805 298" class="line"/>
  <path d="M751 374 L805 400" class="line"/>

  <rect x="52" y="402" width="420" height="104" class="box"/>
  <text x="74" y="434">关键判断</text>
  <text x="74" y="462" class="small">1. 条件是否能变成 index qual，而不只是 filter</text>
  <text x="74" y="486" class="small">2. 多个索引组合后，减少的 heap 访问是否抵消 bitmap 成本</text>
  <text x="74" y="510" class="small">3. 输出列是否都在索引中，且 all-visible 页比例是否足够高</text>
</svg>
