<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">BitmapAnd 与 BitmapOr 执行流程</title>
  <desc id="desc">展示多个 Bitmap Index Scan 生成 TID bitmap 后通过交集或并集合并，再按物理顺序访问 heap。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .idx { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.4; rx: 8; }
    .bm { fill: #fef9c3; stroke: #a16207; stroke-width: 1.4; rx: 8; }
    .op { fill: #f3e8ff; stroke: #7e22ce; stroke-width: 1.4; rx: 8; }
    .heap { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; }
    .loss { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; }
    .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; fill: #374151; }
    .tiny { font-size: 13px; fill: #475569; }
    .title { font-size: 22px; font-weight: 700; }
  </style>
  <text x="38" y="42" class="title">多索引组合：先合并 TID 位图，再访问 heap</text>

  <rect x="54" y="82" width="178" height="76" class="idx"/>
  <text x="82" y="116">idx_customer</text>
  <text x="77" y="140" class="small">customer_id = 42</text>
  <rect x="54" y="212" width="178" height="76" class="idx"/>
  <text x="88" y="246">idx_status</text>
  <text x="88" y="270" class="small">status = 'P'</text>
  <rect x="54" y="342" width="178" height="76" class="idx"/>
  <text x="93" y="376">idx_region</text>
  <text x="88" y="400" class="small">region = 'CN'</text>

  <rect x="300" y="82" width="168" height="76" class="bm"/>
  <text x="337" y="116">TID Bitmap A</text>
  <text x="325" y="140" class="tiny">heap block + offset</text>
  <rect x="300" y="212" width="168" height="76" class="bm"/>
  <text x="337" y="246">TID Bitmap B</text>
  <text x="325" y="270" class="tiny">精确或 lossy 页</text>
  <rect x="300" y="342" width="168" height="76" class="bm"/>
  <text x="337" y="376">TID Bitmap C</text>
  <text x="323" y="400" class="tiny">受 work_mem 约束</text>

  <rect x="548" y="132" width="152" height="78" class="op"/>
  <text x="586" y="166">BitmapAnd</text>
  <text x="574" y="190" class="small">交集: AND 条件</text>

  <rect x="548" y="296" width="152" height="78" class="op"/>
  <text x="592" y="330">BitmapOr</text>
  <text x="576" y="354" class="small">并集: OR 条件</text>

  <rect x="778" y="194" width="150" height="112" class="heap"/>
  <text x="803" y="228">Bitmap Heap</text>
  <text x="818" y="252">Scan</text>
  <text x="800" y="280" class="small">按 heap block</text>
  <text x="801" y="302" class="small">物理顺序读取</text>

  <rect x="778" y="350" width="150" height="78" class="loss"/>
  <text x="805" y="384">Recheck</text>
  <text x="796" y="408" class="small">lossy 页/索引谓词</text>

  <path d="M232 120 L300 120" class="line"/>
  <path d="M232 250 L300 250" class="line"/>
  <path d="M232 380 L300 380" class="line"/>
  <path d="M468 120 C505 125 514 145 548 160" class="line"/>
  <path d="M468 250 C508 240 520 196 548 178" class="line"/>
  <path d="M468 250 C510 265 520 306 548 326" class="line"/>
  <path d="M468 380 C508 375 520 344 548 336" class="line"/>
  <path d="M700 170 C742 177 751 222 778 238" class="line"/>
  <path d="M700 334 C742 320 750 280 778 260" class="line"/>
  <path d="M853 306 L853 350" class="line"/>

  <text x="72" y="482" class="small">收益：多个单列索引能覆盖混合查询，heap 访问按物理顺序聚合，随机 IO 更少。</text>
  <text x="72" y="508" class="small">代价：额外扫描多个索引、构造位图、丢失索引顺序，ORDER BY 常需要另行排序。</text>
</svg>
