<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">多列组合索引与多个单列索引的取舍</title>
  <desc id="desc">对比 B-tree 多列索引的左前缀和 skip scan，与多个单列索引 bitmap 组合的适用场景。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .good { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; rx: 6; }
    .mid { fill: #fef9c3; stroke: #a16207; stroke-width: 1.2; rx: 6; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.2; rx: 6; }
    .idx { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.2; rx: 6; }
    .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; fill: #374151; }
    .tiny { font-size: 13px; fill: #475569; }
    .title { font-size: 22px; font-weight: 700; }
  </style>
  <text x="36" y="42" class="title">不是“多列索引越多越好”，而是看查询族和列顺序</text>

  <rect x="46" y="76" width="410" height="398" class="panel"/>
  <text x="78" y="112">方案 A：组合索引 (tenant_id, created_at, status)</text>
  <rect x="82" y="142" width="318" height="46" class="idx"/>
  <text x="104" y="171">tenant_id | created_at | status | TID</text>

  <rect x="82" y="226" width="330" height="54" class="good"/>
  <text x="104" y="258">tenant_id = ? AND created_at BETWEEN ? AND ?</text>
  <rect x="82" y="298" width="330" height="54" class="mid"/>
  <text x="104" y="330">created_at = ?：可能 skip scan，依赖 tenant 数量</text>
  <rect x="82" y="370" width="330" height="54" class="bad"/>
  <text x="104" y="402">status = ?：通常不能有效限制扫描范围</text>

  <path d="M241 188 L241 226" class="line"/>
  <text x="96" y="462" class="small">优点：AND 查询最紧凑，可保留 B-tree 顺序，适合 ORDER BY/LIMIT。</text>
  <text x="96" y="488" class="small">代价：写入维护一个更宽索引；右侧列单独查询不一定高效。</text>

  <rect x="524" y="76" width="410" height="398" class="panel"/>
  <text x="556" y="112">方案 B：多个单列索引 + BitmapAnd/Or</text>
  <rect x="570" y="142" width="118" height="44" class="idx"/>
  <text x="592" y="170">tenant_id</text>
  <rect x="713" y="142" width="118" height="44" class="idx"/>
  <text x="733" y="170">created_at</text>
  <rect x="640" y="220" width="118" height="44" class="idx"/>
  <text x="676" y="248">status</text>
  <rect x="620" y="312" width="160" height="58" class="mid"/>
  <text x="654" y="346">TID Bitmap</text>
  <text x="651" y="366" class="tiny">AND / OR 合并</text>
  <path d="M629 186 L677 312" class="line"/>
  <path d="M772 186 L720 312" class="line"/>
  <path d="M699 264 L699 312" class="line"/>
  <text x="570" y="418" class="small">优点：单列查询灵活，混合条件可组合。</text>
  <text x="570" y="444" class="small">代价：组合成本、丢失顺序，常需 Bitmap Heap Scan + Sort。</text>

  <rect x="214" y="510" width="552" height="34" class="good"/>
  <text x="244" y="533">经验：高频查询族固定时优先组合索引；查询组合分散时保留少量单列索引。</text>
</svg>
