<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">统计信息如何影响索引选择</title>
  <desc id="desc">展示 ANALYZE、pg_statistic、扩展统计和 EXPLAIN 反馈如何共同影响行数估算和索引路径选择。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .stat { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.4; rx: 8; }
    .ext { fill: #f3e8ff; stroke: #7e22ce; stroke-width: 1.4; rx: 8; }
    .plan { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; }
    .warn { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; }
    .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; fill: #374151; }
    .tiny { font-size: 13px; fill: #475569; }
    .title { font-size: 22px; font-weight: 700; }
  </style>
  <text x="36" y="42" class="title">统计信息错误，索引设计再漂亮也可能被错用</text>

  <rect x="56" y="88" width="158" height="82" class="box"/>
  <text x="89" y="123">业务数据</text>
  <text x="76" y="149" class="small">倾斜、相关、热点</text>

  <rect x="292" y="88" width="158" height="82" class="stat"/>
  <text x="337" y="123">ANALYZE</text>
  <text x="316" y="149" class="small">抽样采集</text>

  <rect x="530" y="60" width="180" height="116" class="stat"/>
  <text x="574" y="96">单列统计</text>
  <text x="552" y="126" class="small">null_frac / n_distinct</text>
  <text x="552" y="148" class="small">MCV / histogram</text>

  <rect x="530" y="220" width="180" height="126" class="ext"/>
  <text x="574" y="256">扩展统计</text>
  <text x="552" y="286" class="small">dependencies</text>
  <text x="552" y="308" class="small">ndistinct</text>
  <text x="552" y="330" class="small">mcv / 表达式统计</text>

  <rect x="786" y="112" width="148" height="96" class="plan"/>
  <text x="817" y="148">行数估算</text>
  <text x="816" y="174" class="small">rows / selectivity</text>

  <rect x="786" y="268" width="148" height="96" class="plan"/>
  <text x="817" y="304">访问路径</text>
  <text x="810" y="330" class="small">Index / Bitmap</text>
  <text x="825" y="350" class="small">Seq Scan</text>

  <rect x="254" y="388" width="286" height="82" class="warn"/>
  <text x="286" y="424">EXPLAIN (ANALYZE, BUFFERS)</text>
  <text x="286" y="450" class="small">对比 estimated rows 与 actual rows</text>

  <path d="M214 129 L292 129" class="line"/>
  <path d="M450 129 L530 118" class="line"/>
  <path d="M450 129 C490 162 494 238 530 282" class="line"/>
  <path d="M710 118 L786 154" class="line"/>
  <path d="M710 282 L786 168" class="line"/>
  <path d="M860 208 L860 268" class="line"/>
  <path d="M786 316 C690 380 610 422 540 428" class="line"/>
  <path d="M254 428 C156 412 124 258 128 170" class="line"/>

  <text x="68" y="514" class="small">闭环：数据变了要 ANALYZE；列相关要 CREATE STATISTICS；计划偏差要用 EXPLAIN 验证，而不是盲目加索引。</text>
</svg>
