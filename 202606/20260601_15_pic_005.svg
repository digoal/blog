<svg xmlns="http://www.w3.org/2000/svg" width="980" height="590" viewBox="0 0 980 590" role="img" aria-labelledby="title desc">
  <title id="title">表达式索引、部分索引、INCLUDE 索引与排他约束索引</title>
  <desc id="desc">展示四类特殊索引分别解决的工程问题、访问路径和维护代价。</desc>
  <style>
    .card { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .expr { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.4; rx: 8; }
    .part { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; }
    .inc { fill: #fef9c3; stroke: #a16207; stroke-width: 1.4; rx: 8; }
    .excl { fill: #f3e8ff; stroke: #7e22ce; stroke-width: 1.4; rx: 8; }
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; fill: #374151; }
    .tiny { font-size: 13px; fill: #475569; }
    .title { font-size: 22px; font-weight: 700; }
  </style>
  <text x="36" y="42" class="title">特殊索引类型：解决不同约束，不是互相替代</text>

  <rect x="54" y="82" width="402" height="206" class="card"/>
  <rect x="78" y="112" width="150" height="58" class="expr"/>
  <text x="107" y="146">表达式索引</text>
  <text x="78" y="210" class="small">例：CREATE INDEX ON users (lower(email));</text>
  <text x="78" y="238" class="small">读：WHERE lower(email)=? 可直接查索引表达式值。</text>
  <text x="78" y="264" class="small">写：INSERT 或非 HOT UPDATE 要重新计算表达式。</text>

  <rect x="524" y="82" width="402" height="206" class="card"/>
  <rect x="548" y="112" width="150" height="58" class="part"/>
  <text x="583" y="146">部分索引</text>
  <text x="548" y="210" class="small">例：CREATE INDEX ON orders(order_nr)</text>
  <text x="548" y="234" class="small">WHERE billed IS NOT TRUE;</text>
  <text x="548" y="262" class="small">前提：查询 WHERE 必须能推出索引谓词。</text>

  <rect x="54" y="330" width="402" height="206" class="card"/>
  <rect x="78" y="360" width="150" height="58" class="inc"/>
  <text x="102" y="394">INCLUDE 索引</text>
  <text x="78" y="458" class="small">例：CREATE INDEX ON tab(x) INCLUDE (y);</text>
  <text x="78" y="486" class="small">目标：覆盖 SELECT y WHERE x=?，争取 Index Only Scan。</text>
  <text x="78" y="512" class="small">边界：可见性图未置位时仍需访问 heap。</text>

  <rect x="524" y="330" width="402" height="206" class="card"/>
  <rect x="548" y="360" width="150" height="58" class="excl"/>
  <text x="583" y="394">排他约束</text>
  <text x="548" y="458" class="small">例：EXCLUDE USING gist (room WITH =,</text>
  <text x="548" y="482" class="small">during WITH &amp;&amp;)</text>
  <text x="548" y="512" class="small">目标：防止两行在指定操作符下同时冲突。</text>

  <text x="78" y="568" class="tiny">共同代价：更慢写入、更多 WAL/空间、更多 ANALYZE/REINDEX/VACUUM 维护关注点。</text>
</svg>
