<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">统计信息驱动优化器估算闭环</title>
  <desc id="desc">展示 SQL 谓词、统计信息、行数估算、路径成本和执行反馈之间的关系。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .accent { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 24px; fill: #111827; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #374151; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #ea580c; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowWarn); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowWarn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect x="40" y="60" width="210" height="120" class="box"/>
  <text x="145" y="112" text-anchor="middle" class="text">SQL 条件</text>
  <text x="145" y="145" text-anchor="middle" class="small">WHERE / GROUP BY</text>

  <rect x="330" y="30" width="310" height="180" class="accent"/>
  <text x="485" y="78" text-anchor="middle" class="text">统计信息输入</text>
  <text x="485" y="112" text-anchor="middle" class="small">pg_class: pages / tuples</text>
  <text x="485" y="140" text-anchor="middle" class="small">pg_statistic: 单列分布</text>
  <text x="485" y="168" text-anchor="middle" class="small">pg_statistic_ext_data: 多列/表达式</text>

  <rect x="720" y="60" width="280" height="120" class="box"/>
  <text x="860" y="112" text-anchor="middle" class="text">选择率与行数估算</text>
  <text x="860" y="145" text-anchor="middle" class="small">clauselist_selectivity()</text>

  <rect x="720" y="320" width="280" height="120" class="box"/>
  <text x="860" y="372" text-anchor="middle" class="text">路径成本比较</text>
  <text x="860" y="405" text-anchor="middle" class="small">Seq / Index / Join / Agg</text>

  <rect x="330" y="350" width="310" height="120" class="warn"/>
  <text x="485" y="398" text-anchor="middle" class="text">执行反馈</text>
  <text x="485" y="430" text-anchor="middle" class="small">EXPLAIN: estimated vs actual rows</text>

  <rect x="40" y="350" width="210" height="120" class="warn"/>
  <text x="145" y="398" text-anchor="middle" class="text">修正动作</text>
  <text x="145" y="430" text-anchor="middle" class="small">ANALYZE / 统计目标 / CREATE STATISTICS</text>

  <path d="M250 120 H330" class="arrow"/>
  <path d="M640 120 H720" class="arrow"/>
  <path d="M860 180 V320" class="arrow"/>
  <path d="M720 380 H640" class="arrow"/>
  <path d="M330 410 H250" class="dash"/>
  <path d="M145 350 V180" class="dash"/>
  <text x="155" y="255" text-anchor="middle" class="small" fill="#ea580c">估算偏差大时</text>
</svg>
