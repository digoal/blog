<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">CREATE STATISTICS 到优化器使用的生命周期</title>
  <desc id="desc">展示扩展统计从定义、ANALYZE 构建、目录存储到优化器读取的完整链路。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .catalog { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .work { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .planner { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 23px; fill: #111827; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 17px; fill: #374151; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="40" y="70" width="260" height="120" class="box"/>
  <text x="170" y="120" text-anchor="middle" class="text">CREATE STATISTICS</text>
  <text x="170" y="154" text-anchor="middle" class="small">列、表达式、统计类型</text>

  <rect x="410" y="70" width="260" height="120" class="catalog"/>
  <text x="540" y="120" text-anchor="middle" class="text">pg_statistic_ext</text>
  <text x="540" y="154" text-anchor="middle" class="small">只保存定义，不保存统计值</text>

  <rect x="780" y="70" width="260" height="120" class="work"/>
  <text x="910" y="120" text-anchor="middle" class="text">ANALYZE 采样</text>
  <text x="910" y="154" text-anchor="middle" class="small">复用普通统计样本</text>

  <rect x="780" y="300" width="260" height="170" class="work"/>
  <text x="910" y="348" text-anchor="middle" class="text">BuildRelationExtStatistics</text>
  <text x="910" y="382" text-anchor="middle" class="small">ndistinct / dependencies</text>
  <text x="910" y="410" text-anchor="middle" class="small">MCV / expression stats</text>

  <rect x="410" y="300" width="260" height="170" class="catalog"/>
  <text x="540" y="348" text-anchor="middle" class="text">pg_statistic_ext_data</text>
  <text x="540" y="382" text-anchor="middle" class="small">stxdndistinct</text>
  <text x="540" y="410" text-anchor="middle" class="small">stxddependencies / stxdmcv</text>
  <text x="540" y="438" text-anchor="middle" class="small">stxdexpr</text>

  <rect x="40" y="300" width="260" height="170" class="planner"/>
  <text x="170" y="348" text-anchor="middle" class="text">优化器读取</text>
  <text x="170" y="382" text-anchor="middle" class="small">get_relation_statistics()</text>
  <text x="170" y="410" text-anchor="middle" class="small">statext_clauselist_selectivity()</text>
  <text x="170" y="438" text-anchor="middle" class="small">estimate_num_groups()</text>

  <path d="M300 130 H410" class="arrow"/>
  <path d="M670 130 H780" class="arrow"/>
  <path d="M910 190 V300" class="arrow"/>
  <path d="M780 385 H670" class="arrow"/>
  <path d="M410 385 H300" class="arrow"/>
  <text x="540" y="555" text-anchor="middle" class="small">创建对象后必须 ANALYZE；否则只有定义，优化器没有可用统计值。</text>
</svg>
