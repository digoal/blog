<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">扩展统计类型选择</title>
  <desc id="desc">比较 dependencies、ndistinct、MCV 和表达式统计分别解决的问题与代价。</desc>
  <style>
    .card { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .head1 { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .head2 { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .head3 { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .head4 { fill: #fae8ff; stroke: #a21caf; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 23px; fill: #111827; font-weight: 700; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 17px; fill: #374151; }
    .line { stroke: #cbd5e1; stroke-width: 1.5; }
  </style>
  <rect x="40" y="50" width="230" height="500" class="card"/>
  <rect x="40" y="50" width="230" height="80" class="head1"/>
  <text x="155" y="100" text-anchor="middle" class="text">dependencies</text>
  <text x="155" y="170" text-anchor="middle" class="small">解决：多列等值条件</text>
  <text x="155" y="205" text-anchor="middle" class="small">独立性假设误判</text>
  <line x1="65" y1="240" x2="245" y2="240" class="line"/>
  <text x="155" y="282" text-anchor="middle" class="small">适合：邮编 -> 城市</text>
  <text x="155" y="315" text-anchor="middle" class="small">租户 -> 地域</text>
  <line x1="65" y1="350" x2="245" y2="350" class="line"/>
  <text x="155" y="392" text-anchor="middle" class="small">代价低，但只表达</text>
  <text x="155" y="425" text-anchor="middle" class="small">全局软依赖</text>

  <rect x="300" y="50" width="230" height="500" class="card"/>
  <rect x="300" y="50" width="230" height="80" class="head2"/>
  <text x="415" y="100" text-anchor="middle" class="text">ndistinct</text>
  <text x="415" y="170" text-anchor="middle" class="small">解决：GROUP BY 多列</text>
  <text x="415" y="205" text-anchor="middle" class="small">distinct 组合数误判</text>
  <line x1="325" y1="240" x2="505" y2="240" class="line"/>
  <text x="415" y="282" text-anchor="middle" class="small">适合：去重、聚合、</text>
  <text x="415" y="315" text-anchor="middle" class="small">HashAgg 容量估算</text>
  <line x1="325" y1="350" x2="505" y2="350" class="line"/>
  <text x="415" y="392" text-anchor="middle" class="small">不直接改善单个</text>
  <text x="415" y="425" text-anchor="middle" class="small">WHERE 组合频率</text>

  <rect x="560" y="50" width="230" height="500" class="card"/>
  <rect x="560" y="50" width="230" height="80" class="head3"/>
  <text x="675" y="100" text-anchor="middle" class="text">MCV</text>
  <text x="675" y="170" text-anchor="middle" class="small">解决：热门组合值</text>
  <text x="675" y="205" text-anchor="middle" class="small">和不可能组合</text>
  <line x1="585" y1="240" x2="765" y2="240" class="line"/>
  <text x="675" y="282" text-anchor="middle" class="small">适合：状态、品类、</text>
  <text x="675" y="315" text-anchor="middle" class="small">地域等低基数组合</text>
  <line x1="585" y1="350" x2="765" y2="350" class="line"/>
  <text x="675" y="392" text-anchor="middle" class="small">更准，但 ANALYZE、</text>
  <text x="675" y="425" text-anchor="middle" class="small">存储和规划成本更高</text>

  <rect x="820" y="50" width="230" height="500" class="card"/>
  <rect x="820" y="50" width="230" height="80" class="head4"/>
  <text x="935" y="100" text-anchor="middle" class="text">表达式统计</text>
  <text x="935" y="170" text-anchor="middle" class="small">解决：函数或虚拟</text>
  <text x="935" y="205" text-anchor="middle" class="small">生成列分布未知</text>
  <line x1="845" y1="240" x2="1025" y2="240" class="line"/>
  <text x="935" y="282" text-anchor="middle" class="small">适合：lower(email)、</text>
  <text x="935" y="315" text-anchor="middle" class="small">date_trunc(ts)</text>
  <line x1="845" y1="350" x2="1025" y2="350" class="line"/>
  <text x="935" y="392" text-anchor="middle" class="small">改善估算，不提供</text>
  <text x="935" y="425" text-anchor="middle" class="small">索引访问路径</text>
</svg>
