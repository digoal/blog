<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-labelledby="title desc">
  <title id="title">自定义统计信息实践决策流程</title>
  <desc id="desc">展示从发现估算偏差到选择统计目标、扩展统计或临时恢复统计信息的流程。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .decision { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .action { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 22px; fill: #111827; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 17px; fill: #374151; }
    .arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="400" y="30" width="280" height="90" class="box"/>
  <text x="540" y="65" text-anchor="middle" class="text">发现计划异常</text>
  <text x="540" y="96" text-anchor="middle" class="small">EXPLAIN 行数估算偏差大</text>

  <rect x="380" y="170" width="320" height="95" class="decision"/>
  <text x="540" y="207" text-anchor="middle" class="text">是否只是统计过旧？</text>
  <text x="540" y="238" text-anchor="middle" class="small">数据突变、导入、分区新建</text>

  <rect x="60" y="330" width="280" height="105" class="action"/>
  <text x="200" y="368" text-anchor="middle" class="text">先 ANALYZE</text>
  <text x="200" y="400" text-anchor="middle" class="small">必要时调整 autovacuum analyze</text>

  <rect x="400" y="330" width="280" height="105" class="decision"/>
  <text x="540" y="368" text-anchor="middle" class="text">是单列样本不足？</text>
  <text x="540" y="400" text-anchor="middle" class="small">MCV 或 histogram 太粗</text>

  <rect x="740" y="330" width="280" height="105" class="action"/>
  <text x="880" y="368" text-anchor="middle" class="text">调统计目标</text>
  <text x="880" y="400" text-anchor="middle" class="small">ALTER COLUMN SET STATISTICS</text>

  <rect x="225" y="500" width="285" height="105" class="action"/>
  <text x="367" y="538" text-anchor="middle" class="text">建扩展统计</text>
  <text x="367" y="570" text-anchor="middle" class="small">dependencies / ndistinct / mcv</text>

  <rect x="575" y="500" width="285" height="105" class="risk"/>
  <text x="717" y="538" text-anchor="middle" class="text">仅特殊窗口手工恢复</text>
  <text x="717" y="570" text-anchor="middle" class="small">pg_restore_*_stats，临时且会被覆盖</text>

  <path d="M540 120 V170" class="arrow"/>
  <path d="M380 218 C260 218 200 270 200 330" class="arrow"/>
  <path d="M540 265 V330" class="arrow"/>
  <path d="M700 218 C830 218 880 270 880 330" class="arrow"/>
  <path d="M540 435 C500 465 430 475 367 500" class="arrow"/>
  <path d="M880 435 C855 470 790 485 717 500" class="arrow"/>
  <text x="270" y="290" text-anchor="middle" class="small">是</text>
  <text x="578" y="302" text-anchor="middle" class="small">否</text>
  <text x="805" y="290" text-anchor="middle" class="small">单列问题</text>
</svg>
