<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">SQL 注入边界：拼接 SQL 与参数化 SQL</title>
  <desc id="desc">对比把用户输入拼进 SQL 文本和把用户输入作为参数值传递时，解析器看到的边界差异。</desc>
  <style>
    .bg { fill: #f7f9fc; }
    .panel { fill: #ffffff; stroke: #9aa7b7; stroke-width: 1.5; rx: 8; }
    .bad { fill: #fff1f0; stroke: #d65b4a; }
    .good { fill: #eef8f2; stroke: #3f9b62; }
    .box { fill: #ffffff; stroke: #5e6b7a; rx: 6; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #1f2933; }
    .small { font-size: 15px; fill: #3f4a59; }
    .title { font-size: 24px; font-weight: 700; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 16px; }
    .arrow { stroke: #394b5f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .badText { fill: #a23b2d; font-weight: 700; }
    .goodText { fill: #237a45; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#394b5f"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="text title" x="40" y="45">SQL 注入的本质：用户输入越过“值”的边界，进入“语法”的边界</text>

  <rect class="panel bad" x="40" y="80" width="420" height="385"/>
  <text class="text title badText" x="65" y="120">危险路径：字符串拼接</text>
  <rect class="box" x="70" y="150" width="350" height="62"/>
  <text class="text small" x="90" y="176">用户输入</text>
  <text class="text code badText" x="90" y="199">' OR 1=1; DROP TABLE users; --</text>
  <path class="arrow" d="M245 218 L245 255"/>
  <rect class="box" x="70" y="260" width="350" height="82"/>
  <text class="text small" x="90" y="286">应用拼成一整段 SQL 文本</text>
  <text class="text code" x="90" y="313">... WHERE name = '' OR 1=1;</text>
  <text class="text code badText" x="90" y="335">DROP TABLE users; --'</text>
  <path class="arrow" d="M245 348 L245 385"/>
  <rect class="box" x="70" y="390" width="350" height="45"/>
  <text class="text badText" x="90" y="420">解析器把攻击片段当作 SQL 语法</text>

  <rect class="panel good" x="520" y="80" width="420" height="385"/>
  <text class="text title goodText" x="545" y="120">安全路径：参数化</text>
  <rect class="box" x="550" y="150" width="350" height="62"/>
  <text class="text small" x="570" y="176">SQL 模板</text>
  <text class="text code" x="570" y="199">SELECT ... WHERE name = $1</text>
  <path class="arrow" d="M725 218 L725 255"/>
  <rect class="box" x="550" y="260" width="350" height="82"/>
  <text class="text small" x="570" y="286">参数值单独传输</text>
  <text class="text code goodText" x="570" y="313">$1 = "' OR 1=1; DROP ..."</text>
  <text class="text small" x="570" y="336">类型输入函数把它当作一个值</text>
  <path class="arrow" d="M725 348 L725 385"/>
  <rect class="box" x="550" y="390" width="350" height="45"/>
  <text class="text goodText" x="570" y="420">解析器只解析模板，不解析参数为语法</text>
</svg>
