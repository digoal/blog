<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 简单协议与扩展协议路径</title>
  <desc id="desc">展示简单 Query 消息和扩展 Parse、Bind、Execute 消息在 PostgreSQL 后端中的主要处理路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #aab4c0; stroke-width: 1.5; rx: 8; }
    .step { fill: #f1f5f9; stroke: #536579; rx: 6; }
    .risk { fill: #fff3e8; stroke: #c86f2b; rx: 6; }
    .safe { fill: #eaf8f0; stroke: #3b8f5a; rx: 6; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2933; font-size: 17px; }
    .small { font-size: 14px; fill: #44515f; }
    .title { font-size: 24px; font-weight: 700; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; }
    .arrow { stroke: #394b5f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#394b5f"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="text title" x="40" y="45">PostgreSQL 协议层如何影响 SQL 注入边界</text>

  <rect class="lane" x="40" y="85" width="960" height="190"/>
  <text class="text title" x="65" y="122">简单 Query 协议</text>
  <rect class="risk" x="65" y="145" width="205" height="72"/>
  <text class="text" x="85" y="174">客户端 Query 消息</text>
  <text class="text code" x="85" y="199">一整段 SQL 字符串</text>
  <path class="arrow" d="M270 181 L345 181"/>
  <rect class="step" x="345" y="145" width="220" height="72"/>
  <text class="text code" x="365" y="174">exec_simple_query()</text>
  <text class="text small" x="365" y="199">src/backend/tcop/postgres.c</text>
  <path class="arrow" d="M565 181 L640 181"/>
  <rect class="step" x="640" y="145" width="160" height="72"/>
  <text class="text code" x="660" y="174">pg_parse_query()</text>
  <text class="text small" x="660" y="199">可解析多条语句</text>
  <path class="arrow" d="M800 181 L875 181"/>
  <rect class="risk" x="875" y="145" width="95" height="72"/>
  <text class="text" x="894" y="174">执行</text>
  <text class="text small" x="894" y="199">语法已成形</text>
  <text class="text small" x="65" y="250">风险点：应用若把输入拼进 SQL，数据库无法知道哪一段原本是“值”。</text>

  <rect class="lane" x="40" y="315" width="960" height="205"/>
  <text class="text title" x="65" y="352">扩展 Query 协议</text>
  <rect class="safe" x="65" y="375" width="150" height="72"/>
  <text class="text code" x="85" y="404">Parse</text>
  <text class="text small" x="85" y="429">SQL + $1/$2</text>
  <path class="arrow" d="M215 411 L285 411"/>
  <rect class="step" x="285" y="375" width="170" height="72"/>
  <text class="text code" x="305" y="404">exec_parse_message()</text>
  <text class="text small" x="305" y="429">只允许一条语句</text>
  <path class="arrow" d="M455 411 L525 411"/>
  <rect class="safe" x="525" y="375" width="150" height="72"/>
  <text class="text code" x="545" y="404">Bind</text>
  <text class="text small" x="545" y="429">参数值 + 格式</text>
  <path class="arrow" d="M675 411 L745 411"/>
  <rect class="step" x="745" y="375" width="175" height="72"/>
  <text class="text code" x="765" y="404">exec_execute_message()</text>
  <text class="text small" x="765" y="429">执行 portal</text>
  <text class="text small" x="65" y="485">安全点：SQL 结构在 Parse 阶段确定，参数值在 Bind 阶段进入，不再参与 SQL 语法切分。</text>
</svg>
