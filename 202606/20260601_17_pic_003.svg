<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">动态 SQL 安全决策树</title>
  <desc id="desc">帮助开发者判断输入应当作为参数值、标识符还是受限语法片段处理。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .node { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 8; }
    .choice { fill: #eef6ff; stroke: #2f78b7; rx: 8; }
    .safe { fill: #ecf8f0; stroke: #3b8b5b; rx: 8; }
    .warn { fill: #fff4e6; stroke: #b7791f; rx: 8; }
    .stop { fill: #fff1f0; stroke: #c84d3b; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2933; font-size: 17px; }
    .small { font-size: 14px; fill: #465569; }
    .title { font-size: 24px; font-weight: 700; }
    .code { font-family: Menlo, Consolas, monospace; font-size: 14px; }
    .arrow { stroke: #42566b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#42566b"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="620"/>
  <text class="text title" x="45" y="45">动态 SQL 输入分类：先判断“它是值，还是结构”</text>

  <rect class="node" x="375" y="85" width="290" height="70"/>
  <text class="text" x="405" y="116">这个输入来自用户或外部系统？</text>
  <text class="text small" x="405" y="140">搜索词、租户 ID、列名、排序字段等</text>

  <path class="arrow" d="M520 155 L520 205"/>
  <rect class="choice" x="350" y="205" width="340" height="72"/>
  <text class="text" x="380" y="236">它表示数据值吗？</text>
  <text class="text small" x="380" y="260">字符串、数字、时间、JSON、数组元素</text>

  <path class="arrow" d="M350 242 L180 242 L180 330"/>
  <text class="text small" x="230" y="228">是</text>
  <rect class="safe" x="55" y="330" width="250" height="88"/>
  <text class="text" x="80" y="362">用参数绑定</text>
  <text class="text code" x="80" y="388">$1 / ? / USING</text>
  <text class="text small" x="80" y="410">不要手写引号和转义</text>

  <path class="arrow" d="M690 242 L860 242 L860 330"/>
  <text class="text small" x="765" y="228">否</text>
  <rect class="choice" x="735" y="330" width="250" height="88"/>
  <text class="text" x="760" y="362">它表示标识符吗？</text>
  <text class="text small" x="760" y="388">schema、table、column</text>
  <text class="text small" x="760" y="410">不能用 $1 替代</text>

  <path class="arrow" d="M735 374 L520 374 L520 465"/>
  <text class="text small" x="625" y="360">是</text>
  <rect class="warn" x="370" y="465" width="300" height="92"/>
  <text class="text" x="395" y="498">白名单 + 标识符引用</text>
  <text class="text code" x="395" y="524">format('%I', colname)</text>
  <text class="text small" x="395" y="546">或 quote_ident/PQescapeIdentifier</text>

  <path class="arrow" d="M985 374 L1010 374 L1010 465 L825 465"/>
  <text class="text small" x="990" y="360">否</text>
  <rect class="stop" x="705" y="465" width="240" height="92"/>
  <text class="text" x="730" y="498">只接受枚举值</text>
  <text class="text small" x="730" y="524">例如 ASC/DESC、LIMIT 上限</text>
  <text class="text small" x="730" y="546">不允许自由拼接语法</text>
</svg>
