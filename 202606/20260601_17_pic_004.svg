<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="560" viewBox="0 0 1020 560" role="img" aria-labelledby="title desc">
  <title id="title">SQL 注入防线分层</title>
  <desc id="desc">展示从应用参数化到数据库权限和观测检测的多层防线关系。</desc>
  <style>
    .bg { fill: #f7f9fb; }
    .layer { fill: #ffffff; stroke: #94a3b8; rx: 8; stroke-width: 1.4; }
    .primary { fill: #e8f5ff; stroke: #2878b8; }
    .db { fill: #edf8f1; stroke: #3c8b5a; }
    .detect { fill: #fff6e6; stroke: #b7791f; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2933; font-size: 17px; }
    .small { font-size: 14px; fill: #455364; }
    .title { font-size: 24px; font-weight: 700; }
    .head { font-size: 19px; font-weight: 700; }
    .arrow { stroke: #44566c; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#44566c"/>
    </marker>
  </defs>
  <rect class="bg" width="1020" height="560"/>
  <text class="text title" x="45" y="45">SQL 注入不是单点问题：预防、隔离、检测要分层</text>

  <rect class="layer primary" x="70" y="95" width="880" height="80"/>
  <text class="text head" x="95" y="128">第一层：构造 SQL 的方式</text>
  <text class="text small" x="95" y="154">首选参数化：JDBC PreparedStatement、libpq PQexecParams/PQprepare、PL/pgSQL EXECUTE ... USING。</text>

  <path class="arrow" d="M510 177 L510 212"/>
  <rect class="layer primary" x="70" y="215" width="880" height="80"/>
  <text class="text head" x="95" y="248">第二层：必须拼接的对象只允许是结构片段</text>
  <text class="text small" x="95" y="274">表名、列名、排序方向不能当参数值传入，应白名单校验，并用 %I/quote_ident 或 PQescapeIdentifier 处理。</text>

  <path class="arrow" d="M510 297 L510 332"/>
  <rect class="layer db" x="70" y="335" width="880" height="80"/>
  <text class="text head" x="95" y="368">第三层：数据库权限与 search_path</text>
  <text class="text small" x="95" y="394">最小权限、独立业务角色、SECURITY DEFINER 函数固定安全 search_path，可降低注入后的横向破坏。</text>

  <path class="arrow" d="M510 417 L510 452"/>
  <rect class="layer detect" x="70" y="455" width="880" height="70"/>
  <text class="text head" x="95" y="488">第四层：观测与检测</text>
  <text class="text small" x="95" y="512">日志、pg_stat_statements、WAF、AST/机器学习检测用于发现异常，不能替代参数化预防。</text>
</svg>
