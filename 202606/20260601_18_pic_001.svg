<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">SCRAM-SHA-256 认证消息流</title>
  <desc id="desc">展示 PostgreSQL 客户端与服务端通过 SASL 完成 SCRAM-SHA-256 挑战响应认证的五个主要步骤。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="620" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">PostgreSQL SCRAM-SHA-256 认证消息流</text>
  <rect x="70" y="82" width="230" height="470" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="680" y="82" width="230" height="470" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="185" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#075985">libpq 客户端</text>
  <text x="795" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#065f46">PostgreSQL 服务端</text>
  <line x1="300" y1="160" x2="680" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">1. StartupMessage: user/database</text>
  <line x1="680" y1="220" x2="300" y2="220" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">2. AuthenticationSASL: SCRAM-SHA-256[-PLUS]</text>
  <line x1="300" y1="285" x2="680" y2="285" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">3. client-first: cbind flag + client nonce</text>
  <line x1="680" y1="350" x2="300" y2="350" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">4. server-first: combined nonce + salt + iterations</text>
  <line x1="300" y1="415" x2="680" y2="415" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">5. client-final: channel binding + proof</text>
  <line x1="680" y1="480" x2="300" y2="480" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">6. server-final: server signature + AuthenticationOk</text>
  <rect x="104" y="506" width="162" height="28" rx="5" fill="#bae6fd" stroke="#0284c7"/>
  <text x="185" y="526" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#075985">验证服务端签名</text>
  <rect x="714" y="506" width="162" height="28" rx="5" fill="#bbf7d0" stroke="#059669"/>
  <text x="795" y="526" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065f46">验证客户端 Proof</text>
  <text x="490" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">密码明文不在网络上传输；网络上传的是 nonce、salt、迭代次数、proof 和签名。</text>
</svg>
