<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="660" viewBox="0 0 1040 660" role="img" aria-labelledby="title desc">
  <title id="title">SCRAM-SHA-256 密钥派生与验证</title>
  <desc id="desc">展示密码经 SASLprep、PBKDF2-HMAC-SHA-256、ClientKey、StoredKey、ServerKey 生成后，客户端 proof 和服务端签名如何被验证。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1040" height="660" fill="#ffffff"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">SCRAM-SHA-256 密钥派生链路</text>
  <rect x="70" y="90" width="170" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="155" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">用户密码</text>
  <line x1="240" y1="119" x2="320" y2="119" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="90" width="190" height="58" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="415" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#854d0e">SASLprep</text>
  <text x="415" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#854d0e">失败则使用原始字节</text>
  <line x1="510" y1="119" x2="590" y2="119" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="590" y="82" width="260" height="74" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">SaltedPassword</text>
  <text x="720" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">PBKDF2-HMAC-SHA-256</text>
  <text x="720" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">salt + iterations</text>
  <line x1="720" y1="156" x2="720" y2="218" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="220" y="230" width="220" height="58" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="330" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#5b21b6">ClientKey</text>
  <text x="330" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b21b6">HMAC(SaltedPassword, "Client Key")</text>
  <rect x="600" y="230" width="240" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">ServerKey</text>
  <text x="720" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">HMAC(SaltedPassword, "Server Key")</text>
  <path d="M720 190 C610 210 470 220 380 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M720 190 C720 205 720 215 720 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="288" x2="330" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="220" y="350" width="220" height="58" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="330" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9d174d">StoredKey</text>
  <text x="330" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9d174d">H(ClientKey)</text>
  <rect x="82" y="488" width="330" height="84" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="247" y="516" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">客户端 Proof</text>
  <text x="247" y="539" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">ClientProof = ClientKey XOR ClientSignature</text>
  <text x="247" y="558" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">ClientSignature = HMAC(StoredKey, AuthMessage)</text>
  <line x1="330" y1="408" x2="270" y2="488" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="288" x2="720" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="590" y="350" width="260" height="70" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="720" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#047857">服务端签名</text>
  <text x="720" y="399" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#047857">ServerSignature = HMAC(ServerKey, AuthMessage)</text>
  <rect x="560" y="488" width="360" height="84" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="740" y="516" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">服务端验证与客户端验证</text>
  <text x="740" y="539" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">服务端用 StoredKey 还原并比对 H(ClientKey)</text>
  <text x="740" y="558" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">客户端用 ServerKey 验证服务端签名</text>
  <line x1="720" y1="420" x2="720" y2="488" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">服务端持久化 StoredKey 与 ServerKey，不需要保存明文密码或 SaltedPassword。</text>
</svg>
