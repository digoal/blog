<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">pg_authid.rolpassword 中的 SCRAM secret 格式</title>
  <desc id="desc">展示 PostgreSQL 将 SCRAM-SHA-256 secret 存储为算法、迭代次数、salt、StoredKey 和 ServerKey 组成的字符串。</desc>
  <rect width="1040" height="500" fill="#ffffff"/>
  <text x="520" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">SCRAM secret 存储格式</text>
  <rect x="70" y="88" width="900" height="72" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="520" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">SCRAM-SHA-256$&lt;iteration count&gt;:&lt;salt&gt;$&lt;StoredKey&gt;:&lt;ServerKey&gt;</text>
  <rect x="80" y="220" width="170" height="94" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">算法名</text>
  <text x="165" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">当前支持</text>
  <text x="165" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">SCRAM-SHA-256</text>
  <rect x="285" y="220" width="170" height="94" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">迭代次数</text>
  <text x="370" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">默认 4096</text>
  <text x="370" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">生成时写入</text>
  <rect x="490" y="220" width="170" height="94" rx="8" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="575" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3f6212">Salt</text>
  <text x="575" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#3f6212">随机 16 字节</text>
  <text x="575" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#3f6212">Base64 保存</text>
  <rect x="695" y="220" width="170" height="94" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="780" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9d174d">StoredKey</text>
  <text x="780" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9d174d">H(ClientKey)</text>
  <text x="780" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9d174d">Base64 保存</text>
  <rect x="390" y="352" width="260" height="94" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="520" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">ServerKey</text>
  <text x="520" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">HMAC(SaltedPassword, "Server Key")</text>
  <text x="520" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">Base64 保存，用于服务端签名</text>
  <line x1="165" y1="160" x2="165" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="370" y1="160" x2="370" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="575" y1="160" x2="575" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="780" y1="160" x2="780" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="520" y1="160" x2="520" y2="352" stroke="#64748b" stroke-width="2" stroke-dasharray="6 6"/>
</svg>
