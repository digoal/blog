<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">SCRAM channel binding 防中间人</title>
  <desc id="desc">对比未使用通道绑定时的中间人转发风险，以及 SCRAM-SHA-256-PLUS 将 TLS 服务端证书哈希纳入 proof 后的绑定效果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1080" height="620" fill="#ffffff"/>
  <text x="540" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">SCRAM-SHA-256 与 SCRAM-SHA-256-PLUS 的边界差异</text>
  <rect x="50" y="90" width="460" height="430" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="280" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">未绑定 TLS 通道</text>
  <circle cx="120" cy="220" r="44" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="120" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">客户端</text>
  <circle cx="280" cy="220" r="44" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="280" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">假服务端</text>
  <circle cx="440" cy="220" r="44" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="440" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">真服务端</text>
  <line x1="164" y1="220" x2="236" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="324" y1="220" x2="396" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="396" y1="260" x2="324" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="236" y1="260" x2="164" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7c2d12">攻击者可以转发 nonce 与 proof</text>
  <text x="280" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7c2d12">客户端不能把认证结果绑定到已验证的 TLS 服务端身份</text>
  <rect x="570" y="90" width="460" height="430" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">绑定 TLS 服务端证书</text>
  <circle cx="640" cy="220" r="44" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">客户端</text>
  <circle cx="800" cy="220" r="44" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="800" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">假服务端</text>
  <circle cx="960" cy="220" r="44" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="960" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">真服务端</text>
  <line x1="684" y1="220" x2="756" y2="220" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="844" y1="220" x2="916" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="618" y="302" width="364" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">client-final-message 包含 c=base64(GS2 header + 证书哈希)</text>
  <text x="800" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">PostgreSQL 使用 tls-server-end-point</text>
  <text x="800" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">证书身份与 SCRAM proof 被放进同一份 AuthMessage</text>
  <text x="540" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">通道绑定不能替代 TLS 校验证书；它把“这个 TLS 连接”和“这次 SCRAM 认证”绑在一起。</text>
</svg>
