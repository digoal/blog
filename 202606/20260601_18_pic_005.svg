<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="680" viewBox="0 0 1020 680" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL SCRAM-SHA-256 迁移决策树</title>
  <desc id="desc">展示 DBA 从检查客户端兼容性、启用 scram-sha-256 密码生成、轮换口令到收紧 pg_hba.conf 和 channel_binding 的迁移步骤。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1020" height="680" fill="#ffffff"/>
  <text x="510" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">从 MD5 / password 迁移到 SCRAM-SHA-256</text>
  <rect x="350" y="78" width="320" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="510" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">盘点客户端与驱动版本</text>
  <line x1="510" y1="134" x2="510" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="510,180 680,245 510,310 340,245" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="510" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">客户端是否支持</text>
  <text x="510" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">SCRAM-SHA-256?</text>
  <line x1="340" y1="245" x2="175" y2="245" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">否</text>
  <rect x="52" y="210" width="124" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="114" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b">先升级驱动</text>
  <text x="114" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">保留过渡窗口</text>
  <line x1="510" y1="310" x2="510" y2="360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="532" y="338" font-family="Arial, sans-serif" font-size="13" fill="#475569">是</text>
  <rect x="328" y="360" width="364" height="70" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="510" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#047857">设置 password_encryption='scram-sha-256'</text>
  <text x="510" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#047857">需要轮换密码后才写入 SCRAM secret</text>
  <line x1="510" y1="430" x2="510" y2="480" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="328" y="480" width="364" height="70" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="510" y="506" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075985">ALTER ROLE / \\password 轮换口令</text>
  <text x="510" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#075985">按需设置 scram_iterations，并验证 rolpassword 前缀</text>
  <line x1="510" y1="550" x2="510" y2="598" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="302" y="598" width="416" height="58" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="510" y="622" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">pg_hba.conf 改为 scram-sha-256</text>
  <text x="510" y="644" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">高安全链路使用 sslmode=verify-full + channel_binding=require</text>
  <rect x="748" y="358" width="210" height="116" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="853" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#9a3412">验证点</text>
  <text x="853" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">pg_authid.rolpassword</text>
  <text x="853" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">日志 method=scram-sha-256</text>
  <text x="853" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">require_auth 客户端约束</text>
  <line x1="692" y1="395" x2="748" y2="395" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
