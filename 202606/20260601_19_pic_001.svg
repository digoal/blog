<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">字段加密的威胁边界</title>
  <desc id="desc">展示字段加密在应用、数据库、备份、日志和密钥系统之间改变了哪些攻击面。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="560" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">字段加密不是“数据库更安全”，而是重新划定泄露后的损失边界</text>

  <rect x="60" y="92" width="190" height="110" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="155" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#075985">应用</text>
  <text x="155" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">明文输入/展示</text>
  <text x="155" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">最小权限角色</text>

  <rect x="390" y="78" width="210" height="140" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="495" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#065f46">PostgreSQL</text>
  <text x="495" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">触发器写入密文</text>
  <text x="495" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">视图按授权解密</text>
  <text x="495" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">SQL 执行仍在服务端</text>

  <rect x="730" y="92" width="190" height="110" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="825" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">密钥来源</text>
  <text x="825" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">root key 不进 SQL</text>
  <text x="825" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">启动脚本/HSM/KMS</text>

  <line x1="250" y1="147" x2="390" y2="147" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="320" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">明文 DML</text>
  <line x1="730" y1="147" x2="600" y2="147" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="665" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">派生密钥</text>

  <rect x="85" y="305" width="190" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="180" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#991b1b">物理泄露</text>
  <text x="180" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">表文件/磁盘快照</text>
  <text x="180" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">看到密文</text>

  <rect x="395" y="305" width="190" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="490" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#991b1b">逻辑泄露</text>
  <text x="490" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">pg_dump/WAL/日志</text>
  <text x="490" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">取决于访问路径</text>

  <rect x="705" y="305" width="190" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="800" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#991b1b">权限泄露</text>
  <text x="800" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">能调用解密函数/视图</text>
  <text x="800" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">仍可能读明文</text>

  <line x1="420" y1="218" x2="220" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="495" y1="218" x2="490" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="218" x2="760" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="115" y="462" width="750" height="44" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="490" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7c2d12">字段加密重点降低离线数据副本的价值；不能替代 SQL 权限、审计、RLS、日志治理和主机加固。</text>
</svg>
