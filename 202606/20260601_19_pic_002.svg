<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">pgsodium TCE 写入与读取路径</title>
  <desc id="desc">展示 SECURITY LABEL 生成触发器和解密视图之后，应用写入明文、表存储密文、视图读取明文的路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="620" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">pgsodium Transparent Column Encryption 的读写路径</text>

  <rect x="55" y="92" width="170" height="86" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#075985">应用写入</text>
  <text x="140" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">明文 DML</text>

  <rect x="310" y="80" width="230" height="110" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="425" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#065f46">BEFORE 触发器</text>
  <text x="425" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">convert_to(text,'utf8')</text>
  <text x="425" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">crypto_aead_det_encrypt</text>

  <rect x="655" y="92" width="230" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="770" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#92400e">业务表</text>
  <text x="770" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">加密列存储 base64/bytea 密文</text>

  <line x1="225" y1="135" x2="310" y2="135" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="135" x2="655" y2="135" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="660" y="292" width="220" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="770" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#92400e">decrypted_* 视图</text>
  <text x="770" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">crypto_aead_det_decrypt</text>
  <text x="770" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">convert_from(...,'utf8')</text>

  <rect x="380" y="302" width="190" height="76" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="475" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#075985">应用读取</text>
  <text x="475" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">SELECT 视图明文列</text>

  <line x1="770" y1="178" x2="770" y2="292" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="815" y="238" font-family="Arial, sans-serif" font-size="14" fill="#334155">视图从表读取密文</text>
  <line x1="660" y1="340" x2="570" y2="340" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="80" y="462" width="820" height="92" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="105" y="494" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">生成条件</text>
  <text x="105" y="524" font-family="Arial, sans-serif" font-size="15" fill="#334155">SECURITY LABEL FOR pgsodium ON COLUMN ... IS 'ENCRYPT WITH KEY ...'</text>
  <text x="105" y="548" font-family="Arial, sans-serif" font-size="15" fill="#334155">ddl_command_end 事件触发器调用 update_mask/create_mask_view，生成触发器函数、触发器和解密视图。</text>
</svg>
