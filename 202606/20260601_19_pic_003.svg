<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
  <title id="title">pgsodium 密钥层次</title>
  <desc id="desc">展示 root key、key 表、valid_key 视图、key_id/key_context 与派生数据密钥之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="600" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Server Key Management：SQL 只拿 key UUID，不拿 root key</text>

  <rect x="70" y="100" width="210" height="105" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="175" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#92400e">getkey_script</text>
  <text x="175" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">启动时输出 64 hex</text>
  <text x="175" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">KMS/HSM/文件脚本</text>

  <rect x="390" y="92" width="210" height="120" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="495" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#991b1b">root secret key</text>
  <text x="495" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">sodium_malloc 内存</text>
  <text x="495" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">不通过 SQL 暴露</text>

  <rect x="700" y="100" width="210" height="105" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="805" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#065f46">pgsodium.key</text>
  <text x="805" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">uuid, key_id</text>
  <text x="805" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">key_context, status</text>

  <line x1="280" y1="152" x2="390" y2="152" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="152" x2="600" y2="152" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="650" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">元数据参与派生</text>

  <rect x="145" y="312" width="220" height="105" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="255" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#075985">应用/视图</text>
  <text x="255" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">只传 key UUID</text>
  <text x="255" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">不保存 raw key</text>

  <rect x="460" y="300" width="250" height="130" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="585" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">crypto_kdf_derive_from_key</text>
  <text x="585" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">root key + key_id</text>
  <text x="585" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">+ 8 字节 context</text>
  <text x="585" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">=> 数据加密 key</text>

  <rect x="765" y="322" width="150" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="840" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#065f46">AEAD</text>
  <text x="840" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">加密/认证</text>

  <line x1="365" y1="365" x2="460" y2="365" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="212" x2="565" y2="300" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="805" y1="205" x2="620" y2="300" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="365" x2="765" y2="365" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="490" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">泄露表数据和 pgsodium.key 元数据，不等于泄露 root key；但能执行解密函数的数据库角色仍是高风险边界。</text>
</svg>
