<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
  <title id="title">AEAD 与关联数据</title>
  <desc id="desc">展示明文、密钥、nonce 和 associated data 进入 AEAD 加密后产生密文与认证标签，篡改任何参与认证的数据都会导致解密失败。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="600" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">AEAD：加密明文，也认证上下文</text>

  <rect x="70" y="95" width="200" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#075985">明文 secret</text>
  <text x="170" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">需要隐藏的字段值</text>

  <rect x="70" y="215" width="200" height="78" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="170" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#065f46">associated data</text>
  <text x="170" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">id, owner, type...</text>

  <rect x="70" y="335" width="200" height="78" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="170" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">key + nonce</text>
  <text x="170" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">派生密钥与去重值</text>

  <rect x="405" y="190" width="210" height="150" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="510" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">AEAD</text>
  <text x="510" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">ChaCha20/XChaCha20</text>
  <text x="510" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">+ Poly1305/SIV 类认证</text>
  <text x="510" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">输出密文和 tag</text>

  <rect x="715" y="150" width="195" height="96" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="812" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">密文</text>
  <text x="812" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">隐藏明文内容</text>

  <rect x="715" y="318" width="195" height="96" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="812" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">认证标签</text>
  <text x="812" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">绑定密文和上下文</text>

  <line x1="270" y1="134" x2="405" y2="234" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="254" x2="405" y2="265" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="374" x2="405" y2="302" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="235" x2="715" y2="198" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="300" x2="715" y2="366" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="150" y="482" width="680" height="48" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="490" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">如果密文、nonce 或 associated data 被篡改，认证校验失败，解密函数应报错而不是返回伪造明文。</text>
</svg>
