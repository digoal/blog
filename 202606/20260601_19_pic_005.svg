<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">字段加密方案选择</title>
  <desc id="desc">展示从威胁模型、查询需求、密钥边界和运维能力选择列加密、应用侧加密、全盘加密或不加密的决策流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="620" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">字段加密先看威胁模型，再看查询能力</text>

  <rect x="380" y="82" width="220" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="490" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#075985">主要防谁？</text>

  <rect x="90" y="220" width="210" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="195" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#065f46">磁盘/备份泄露</text>
  <text x="195" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">DBA 仍可被授权读取</text>

  <rect x="385" y="220" width="210" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="490" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e">数据库管理员也不可信</text>
  <text x="490" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">密钥不能进数据库进程</text>

  <rect x="680" y="220" width="210" height="86" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="785" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">只防整机丢盘</text>
  <text x="785" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">SQL 层无需改造</text>

  <line x1="430" y1="152" x2="225" y2="220" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="152" x2="490" y2="220" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="152" x2="755" y2="220" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="90" y="382" width="210" height="108" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="195" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#065f46">数据库侧字段加密</text>
  <text x="195" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">pgsodium TCE/pgcrypto</text>
  <text x="195" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">换取部分查询能力</text>

  <rect x="385" y="382" width="210" height="108" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="490" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">应用侧加密</text>
  <text x="490" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">DB 只存 opaque bytes</text>
  <text x="490" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">牺牲 SQL 明文能力</text>

  <rect x="680" y="382" width="210" height="108" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="785" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">磁盘/卷加密</text>
  <text x="785" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">透明、低改造</text>
  <text x="785" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">不防 SQL/备份明文</text>

  <line x1="195" y1="306" x2="195" y2="382" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="306" x2="490" y2="382" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="785" y1="306" x2="785" y2="382" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="490" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">需要明文排序、范围查询、模糊查询时，字段加密会和查询能力直接冲突；不要先选工具再倒推威胁模型。</text>
</svg>
