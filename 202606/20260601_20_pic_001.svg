<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">分区表本地索引与全局索引的问题空间</title>
  <desc id="desc">展示分区表按时间分区时，本地索引只覆盖单个分区，全局索引跨所有分区维护一套键空间。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .box { fill: #ffffff; stroke: #263238; stroke-width: 1.5; rx: 6; }
    .part { fill: #e9f4ff; stroke: #2f6f9f; stroke-width: 1.2; rx: 4; }
    .local { fill: #f2f8e9; stroke: #6c8f28; stroke-width: 1.2; rx: 4; }
    .global { fill: #fff2d8; stroke: #b06b00; stroke-width: 1.4; rx: 4; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #1d252b; }
    .small { font-size: 15px; fill: #37474f; }
    .label { font-size: 16px; font-weight: 700; }
    .arrow { stroke: #455a64; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="txt label" x="42" y="42">业务痛点：按分区裁剪快，但按非分区键查找会变成多分区探测</text>

  <rect class="box" x="45" y="75" width="420" height="350"/>
  <text class="txt label" x="65" y="105">本地索引：每个分区一棵索引</text>
  <rect class="part" x="70" y="135" width="110" height="180"/>
  <rect class="part" x="200" y="135" width="110" height="180"/>
  <rect class="part" x="330" y="135" width="110" height="180"/>
  <text class="txt small" x="92" y="165">P2026Q1</text>
  <text class="txt small" x="222" y="165">P2026Q2</text>
  <text class="txt small" x="352" y="165">P2026Q3</text>
  <rect class="local" x="82" y="205" width="86" height="55"/>
  <rect class="local" x="212" y="205" width="86" height="55"/>
  <rect class="local" x="342" y="205" width="86" height="55"/>
  <text class="txt small" x="103" y="238">idx</text>
  <text class="txt small" x="233" y="238">idx</text>
  <text class="txt small" x="363" y="238">idx</text>
  <path class="arrow dash" d="M 250 360 C 145 355, 122 285, 122 260"/>
  <path class="arrow dash" d="M 250 360 C 250 330, 252 290, 252 260"/>
  <path class="arrow dash" d="M 250 360 C 358 355, 382 285, 382 260"/>
  <text class="txt small" x="82" y="350">WHERE user_id = ?</text>
  <text class="txt small" x="82" y="378">若没有分区键，可能要查多棵本地索引</text>

  <rect class="box" x="515" y="75" width="420" height="350"/>
  <text class="txt label" x="535" y="105">全局索引：跨分区的一套键空间</text>
  <rect class="part" x="545" y="135" width="100" height="115"/>
  <rect class="part" x="665" y="135" width="100" height="115"/>
  <rect class="part" x="785" y="135" width="100" height="115"/>
  <text class="txt small" x="567" y="164">P1</text>
  <text class="txt small" x="687" y="164">P2</text>
  <text class="txt small" x="807" y="164">P3</text>
  <rect class="global" x="555" y="305" width="320" height="65"/>
  <text class="txt small" x="590" y="342">GSI(user_id) -> row locator / primary key</text>
  <path class="arrow" d="M 715 370 C 715 410, 655 412, 595 370"/>
  <path class="arrow" d="M 715 370 C 715 405, 715 405, 715 370"/>
  <path class="arrow" d="M 715 370 C 715 410, 780 412, 835 370"/>
  <path class="arrow" d="M 715 305 L 715 255"/>
  <text class="txt small" x="548" y="402">收益：按非分区键一次定位</text>
  <text class="txt small" x="548" y="428">代价：写入、唯一性、分区维护都要同步全局结构</text>

  <text class="txt small" x="45" y="475">核心判断：全局索引不是“免费加速器”，它把读路径的多分区扫描，换成写路径和维护路径的全局一致性成本。</text>
</svg>
