<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">CockroachDB 二级索引在全局 KV 空间中的编码</title>
  <desc id="desc">展示租户前缀、表 ID、索引 ID、索引列、主键后缀和列族值如何组成二级索引条目。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .seg { stroke: #263238; stroke-width: 1.3; rx: 5; }
    .a { fill: #dceefb; }
    .b { fill: #e8f5df; }
    .c { fill: #fff0cf; }
    .d { fill: #f7e3ef; }
    .e { fill: #e4e7fb; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #1d252b; }
    .small { font-size: 14px; fill: #37474f; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; }
    .label { font-size: 18px; font-weight: 700; }
    .arrow { stroke: #455a64; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="560"/>
  <text class="txt label" x="40" y="42">CockroachDB：表和二级索引都落在同一个有序 KV keyspace</text>

  <text class="txt" x="50" y="95">二级索引 Key</text>
  <rect class="seg a" x="50" y="120" width="135" height="70"/>
  <rect class="seg b" x="185" y="120" width="105" height="70"/>
  <rect class="seg c" x="290" y="120" width="115" height="70"/>
  <rect class="seg d" x="405" y="120" width="190" height="70"/>
  <rect class="seg e" x="595" y="120" width="190" height="70"/>
  <rect class="seg a" x="785" y="120" width="130" height="70"/>
  <text class="txt small" x="72" y="148">tenant prefix</text>
  <text class="txt small" x="217" y="148">tableID</text>
  <text class="txt small" x="325" y="148">indexID</text>
  <text class="txt small" x="435" y="148">indexed columns</text>
  <text class="txt small" x="628" y="148">PK suffix</text>
  <text class="txt small" x="804" y="148">family id</text>
  <text class="mono" x="70" y="176">/tenant</text>
  <text class="mono" x="215" y="176">/53</text>
  <text class="mono" x="320" y="176">/2</text>
  <text class="mono" x="425" y="176">/email</text>
  <text class="mono" x="625" y="176">/id</text>
  <text class="mono" x="815" y="176">/0</text>

  <text class="txt" x="50" y="245">二级索引 Value</text>
  <rect class="seg e" x="50" y="270" width="245" height="70"/>
  <rect class="seg c" x="295" y="270" width="245" height="70"/>
  <rect class="seg b" x="540" y="270" width="245" height="70"/>
  <text class="txt small" x="75" y="300">唯一索引的隐式主键列</text>
  <text class="txt small" x="325" y="300">STORING / composite 列</text>
  <text class="txt small" x="575" y="300">其他列族的 TUPLE 值</text>
  <text class="txt small" x="75" y="323">用于回表和唯一性校验</text>
  <text class="txt small" x="325" y="323">让查询可覆盖</text>
  <text class="txt small" x="575" y="323">减少不必要回表</text>

  <rect class="seg a" x="70" y="405" width="185" height="60"/>
  <rect class="seg b" x="300" y="405" width="185" height="60"/>
  <rect class="seg c" x="530" y="405" width="185" height="60"/>
  <rect class="seg d" x="760" y="405" width="185" height="60"/>
  <text class="txt small" x="103" y="440">Range A</text>
  <text class="txt small" x="333" y="440">Range B</text>
  <text class="txt small" x="563" y="440">Range C</text>
  <text class="txt small" x="793" y="440">Range D</text>
  <path class="arrow" d="M 180 190 C 180 245, 162 350, 162 405"/>
  <path class="arrow" d="M 500 190 C 500 250, 392 355, 392 405"/>
  <path class="arrow" d="M 720 190 C 720 250, 622 355, 622 405"/>
  <text class="txt small" x="50" y="510">全局二级索引的“全局”体现在逻辑 keyspace 覆盖整表；物理上仍按 key range 切分、复制、迁移。</text>
</svg>
