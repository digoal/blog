<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">全局二级索引的读写路径</title>
  <desc id="desc">展示写入同时修改主索引和二级索引，读取先扫二级索引再回表或走覆盖索引。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .box { fill: #ffffff; stroke: #263238; stroke-width: 1.4; rx: 6; }
    .write { fill: #ffe7d6; stroke: #b85c18; stroke-width: 1.3; rx: 6; }
    .read { fill: #e2f0ff; stroke: #2f6f9f; stroke-width: 1.3; rx: 6; }
    .kv { fill: #edf7e6; stroke: #5f7f24; stroke-width: 1.3; rx: 6; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #1d252b; }
    .small { font-size: 14px; fill: #37474f; }
    .label { font-size: 18px; font-weight: 700; }
    .arrow { stroke: #455a64; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .warn { fill: #fff7e6; stroke: #c17900; stroke-width: 1.2; rx: 5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="560"/>
  <text class="txt label" x="40" y="42">读快的背后：每次写入都要维护更多 KV 条目</text>

  <rect class="write" x="55" y="95" width="180" height="70"/>
  <text class="txt" x="85" y="125">INSERT/UPDATE</text>
  <text class="txt small" x="83" y="148">SQL mutation</text>
  <path class="arrow" d="M 235 130 L 325 130"/>
  <rect class="box" x="325" y="85" width="215" height="90"/>
  <text class="txt" x="350" y="118">EncodePrimaryIndex</text>
  <text class="txt" x="350" y="145">EncodeSecondaryIndexes</text>
  <path class="arrow" d="M 540 130 L 640 95"/>
  <path class="arrow" d="M 540 130 L 640 165"/>
  <rect class="kv" x="640" y="65" width="265" height="60"/>
  <text class="txt small" x="665" y="100">主索引 KV：row authority</text>
  <rect class="kv" x="640" y="145" width="265" height="60"/>
  <text class="txt small" x="665" y="180">二级索引 KV：lookup / covering</text>
  <rect class="warn" x="325" y="220" width="580" height="58"/>
  <text class="txt small" x="350" y="254">写放大 = 主索引条目 + 每个二级索引条目 + 复制/共识/事务冲突检测成本</text>

  <rect class="read" x="55" y="345" width="180" height="70"/>
  <text class="txt" x="85" y="374">SELECT</text>
  <text class="txt small" x="78" y="397">WHERE non_pk = ?</text>
  <path class="arrow" d="M 235 380 L 325 380"/>
  <rect class="box" x="325" y="335" width="215" height="90"/>
  <text class="txt" x="352" y="368">优化器选择索引</text>
  <text class="txt small" x="352" y="394">scan / lookup join / covering</text>
  <path class="arrow" d="M 540 380 L 640 345"/>
  <path class="arrow" d="M 540 380 L 640 415"/>
  <rect class="kv" x="640" y="315" width="265" height="60"/>
  <text class="txt small" x="665" y="350">覆盖索引：直接返回列</text>
  <rect class="kv" x="640" y="395" width="265" height="60"/>
  <text class="txt small" x="665" y="430">非覆盖：拿主键后缀回表</text>
  <text class="txt small" x="55" y="505">设计目标不是“建更多索引”，而是把高频读路径的随机探测，控制在可接受的写放大和维护窗口内。</text>
</svg>
