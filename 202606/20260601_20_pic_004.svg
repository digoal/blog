<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">全局索引选型边界</title>
  <desc id="desc">用决策树展示什么时候选择本地索引、全局索引、包含分区键的唯一约束或分布式全局二级索引。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .node { fill: #ffffff; stroke: #263238; stroke-width: 1.4; rx: 6; }
    .yes { fill: #e7f4e4; stroke: #527a2d; stroke-width: 1.3; rx: 6; }
    .no { fill: #fff0d6; stroke: #ad6900; stroke-width: 1.3; rx: 6; }
    .bad { fill: #fde8e7; stroke: #a93632; stroke-width: 1.3; rx: 6; }
    .txt { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #1d252b; }
    .small { font-size: 13.5px; fill: #37474f; }
    .label { font-size: 18px; font-weight: 700; }
    .arrow { stroke: #455a64; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="600"/>
  <text class="txt label" x="40" y="42">选型边界：先问 workload，再问实现</text>

  <rect class="node" x="360" y="80" width="280" height="70"/>
  <text class="txt" x="405" y="110">查询是否总带分区键？</text>
  <text class="small" x="410" y="134">例如 tenant_id / dt / region</text>

  <path class="arrow" d="M 360 115 L 205 190"/>
  <path class="arrow" d="M 640 115 L 795 190"/>
  <text class="small" x="278" y="150">是</text>
  <text class="small" x="700" y="150">否</text>

  <rect class="yes" x="70" y="190" width="270" height="80"/>
  <text class="txt" x="106" y="220">优先本地索引 / 分区裁剪</text>
  <text class="small" x="95" y="245">读写局部，分区维护简单</text>
  <rect class="node" x="660" y="190" width="270" height="80"/>
  <text class="txt" x="696" y="220">是否必须低延迟点查？</text>
  <text class="small" x="690" y="245">按 email / order_no / device_id</text>

  <path class="arrow" d="M 795 270 L 795 340"/>
  <path class="arrow" d="M 660 230 L 520 350"/>
  <text class="small" x="810" y="312">是</text>
  <text class="small" x="590" y="286">否</text>

  <rect class="no" x="650" y="340" width="290" height="82"/>
  <text class="txt" x="682" y="371">考虑全局索引 / GSI</text>
  <text class="small" x="680" y="397">接受写放大、回表、维护成本</text>
  <rect class="yes" x="370" y="340" width="270" height="82"/>
  <text class="txt" x="405" y="371">让查询显式带分区键</text>
  <text class="small" x="395" y="397">或用异步检索表/物化视图</text>

  <path class="arrow" d="M 795 422 L 795 490"/>
  <rect class="bad" x="650" y="490" width="290" height="72"/>
  <text class="txt" x="682" y="520">高写入 + 频繁分区维护？</text>
  <text class="small" x="680" y="544">谨慎：可能被全局一致性反噬</text>

  <text class="txt small" x="70" y="520">最佳实践：能用业务建模把访问局部化，就不要先上全局索引；必须跨分区唯一或点查时，再付全局维护成本。</text>
</svg>
