  <text x="555" y="275" text-anchor="middle" font-size="11" fill="#2c3e50">📌 适合环境</text>
  <text x="555" y="293" text-anchor="middle" font-size="10" fill="#555">海外市场强势时</text>
  <rect x="506" y="320" width="98" height="28" rx="6" fill="#e91e8c"/>
  <text x="555" y="339" text-anchor="middle" font-size="11" fill="white">全球配置</text>

  <!-- 商品ETF -->
  <rect x="638" y="60" width="138" height="310" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
  <text x="707" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">商品ETF</text>
  <text x="707" y="115" text-anchor="middle" font-size="11" fill="#2c3e50">📌 买的是什么？</text>
