  <text x="99" y="115" text-anchor="middle" font-size="11" fill="#2c3e50">📌 买的是什么？</text>
  <text x="99" y="133" text-anchor="middle" font-size="10" fill="#555">一篮子债券</text>
  <text x="99" y="153" text-anchor="middle" font-size="11" fill="#2c3e50">📌 收益来源</text>
  <text x="99" y="171" text-anchor="middle" font-size="10" fill="#555">利息+价格波动</text>
  <text x="99" y="195" text-anchor="middle" font-size="11" fill="#2c3e50">📌 典型品种</text>
  <text x="99" y="213" text-anchor="middle" font-size="10" fill="#555">国债/政金债/信用</text>
  <text x="99" y="233" text-anchor="middle" font-size="11" fill="#2c3e50">📌 主要风险</text>
  <text x="99" y="251" text-anchor="middle" font-size="10" fill="#555">利率风险</text>
  <text x="99" y="275" text-anchor="middle" font-size="11" fill="#2c3e50">📌 适合环境</text>
  <text x="99" y="293" text-anchor="middle" font-size="10" fill="#555">利率下行周期</text>
  <rect x="50" y="320" width="98" height="28" rx="6" fill="#4a90d9"/>
  <text x="99" y="339" text-anchor="middle" font-size="11" fill="white">防守资产</text>

