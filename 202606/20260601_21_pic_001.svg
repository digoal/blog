  <text x="707" y="233" text-anchor="middle" font-size="11" fill="#2c3e50">📌 主要风险</text>
  <text x="707" y="251" text-anchor="middle" font-size="10" fill="#555">高波动+期货展期</text>
  <text x="707" y="275" text-anchor="middle" font-size="11" fill="#2c3e50">📌 适合环境</text>
