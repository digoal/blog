  <text x="707" y="153" text-anchor="middle" font-size="11" fill="#2c3e50">📌 收益来源</text>
  <text x="707" y="171" text-anchor="middle" font-size="10" fill="#555">商品价格涨跌</text>
  <text x="707" y="195" text-anchor="middle" font-size="11" fill="#2c3e50">📌 典型品种</text>
