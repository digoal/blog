<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#fff9f9"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">跨境ETF溢价陷阱：小白最容易踩的坑</text>

  <!-- 正常情况 -->
  <rect x="50" y="55" width="200" height="210" rx="10" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="150" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">正常情况</text>
  <text x="150" y="108" text-anchor="middle" font-size="11" fill="#333">净值（NAV）= 100元</text>
  <text x="150" y="128" text-anchor="middle" font-size="11" fill="#333">市场价格 = 100.5元</text>
  <text x="150" y="148" text-anchor="middle" font-size="11" fill="#555">溢价率 ≈ 0.5%</text>
  <rect x="80" y="162" width="140" height="36" rx="8" fill="#27ae60"/>
  <text x="150" y="185" text-anchor="middle" font-size="12" fill="white">✓ 可以正常买入</text>
  <text x="150" y="218" text-anchor="middle" font-size="10" fill="#666">买卖价格接近真实</text>
  <text x="150" y="236" text-anchor="middle" font-size="10" fill="#666">资产价值，安全</text>

  <!-- 箭头 -->
  <line x1="260" y1="160" x2="320" y2="160" stroke="#e74c3c" stroke-width="2.5"/>
  <polygon points="320,156 332,160 320,164" fill="#e74c3c"/>
  <text x="290" y="150" text-anchor="middle" font-size="11" fill="#e74c3c">热炒!</text>

  <!-- 危险溢价 -->
  <rect x="335" y="55" width="200" height="210" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="435" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">溢价过高</text>
  <text x="435" y="108" text-anchor="middle" font-size="11" fill="#333">净值（NAV）= 100元</text>
  <text x="435" y="128" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">市场价格 = 115元</text>
  <text x="435" y="148" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">溢价率 = 15%！</text>
  <rect x="365" y="162" width="140" height="36" rx="8" fill="#e67e22"/>
  <text x="435" y="185" text-anchor="middle" font-size="12" fill="white">⚠ 谨慎买入</text>
  <text x="435" y="218" text-anchor="middle" font-size="10" fill="#666">你花15元买了只</text>
  <text x="435" y="236" text-anchor="middle" font-size="10" fill="#666">值10元的东西</text>

  <!-- 箭头 -->
  <line x1="545" y1="160" x2="605" y2="160" stroke="#c0392b" stroke-width="2.5"/>
  <polygon points="605,156 617,160 605,164" fill="#c0392b"/>
  <text x="575" y="150" text-anchor="middle" font-size="11" fill="#c0392b">回调!</text>

  <!-- 亏损结局 -->
  <rect x="620" y="55" width="150" height="210" rx="10" fill="#ffebee" stroke="#c0392b" stroke-width="1.5"/>
  <text x="695" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">溢价回归</text>
  <text x="695" y="110" text-anchor="middle" font-size="11" fill="#333">净值不变 = 100元</text>
  <text x="695" y="132" text-anchor="middle" font-size="11" fill="#c0392b">价格跌回 100.5元</text>
  <text x="695" y="155" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">即使净值涨了5%</text>
  <text x="695" y="175" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">你仍然亏损！</text>
  <rect x="645" y="193" width="100" height="36" rx="8" fill="#c0392b"/>
  <text x="695" y="216" text-anchor="middle" font-size="12" fill="white">已经亏了</text>

  <text x="400" y="298" text-anchor="middle" font-size="11" fill="#888">溢价率超过3%时需额外谨慎；超过8%建议等待，不要追高</text>
</svg>
