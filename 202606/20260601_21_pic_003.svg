<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">五类ETF：风险 vs 流动性矩阵</text>

  <!-- 坐标轴 -->
  <line x1="100" y1="380" x2="750" y2="380" stroke="#999" stroke-width="1.5"/>
  <line x1="100" y1="380" x2="100" y2="60" stroke="#999" stroke-width="1.5"/>
  <!-- X轴箭头 -->
  <polygon points="750,376 758,380 750,384" fill="#999"/>
  <!-- Y轴箭头 -->
  <polygon points="96,60 100,52 104,60" fill="#999"/>

  <text x="430" y="410" text-anchor="middle" font-size="12" fill="#555">← 低风险     风险水平     高风险 →</text>
  <text x="52" y="220" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90 52 220)">← 低     流动性     高 →</text>

  <!-- 网格线 -->
  <line x1="100" y1="220" x2="750" y2="220" stroke="#ddd" stroke-dasharray="4,4"/>
  <line x1="425" y1="60" x2="425" y2="380" stroke="#ddd" stroke-dasharray="4,4"/>

  <!-- 象限标签 -->
  <text x="240" y="80" text-anchor="middle" font-size="11" fill="#aaa">低风险低流动</text>
  <text x="600" y="80" text-anchor="middle" font-size="11" fill="#aaa">高风险低流动</text>
  <text x="240" y="370" text-anchor="middle" font-size="11" fill="#aaa">低风险高流动</text>
  <text x="600" y="370" text-anchor="middle" font-size="11" fill="#aaa">高风险高流动</text>

  <!-- 货币ETF：低风险，高流动性 -->
  <circle cx="160" cy="340" r="28" fill="#43a047" opacity="0.85"/>
  <text x="160" y="336" text-anchor="middle" font-size="11" font-weight="bold" fill="white">货币</text>
  <text x="160" y="350" text-anchor="middle" font-size="11" fill="white">ETF</text>

  <!-- 债券ETF：低中风险，较高流动性 -->
  <circle cx="240" cy="270" r="28" fill="#4a90d9" opacity="0.85"/>
  <text x="240" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="white">债券</text>
  <text x="240" y="280" text-anchor="middle" font-size="11" fill="white">ETF</text>

  <!-- 黄金ETF：中等风险，高流动性 -->
  <circle cx="430" cy="310" r="30" fill="#f9a825" opacity="0.85"/>
  <text x="430" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="white">黄金</text>
  <text x="430" y="320" text-anchor="middle" font-size="11" fill="white">ETF</text>

  <!-- 跨境ETF：中高风险，中流动性 -->
  <circle cx="560" cy="200" r="30" fill="#e91e8c" opacity="0.85"/>
  <text x="560" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="white">跨境</text>
  <text x="560" y="210" text-anchor="middle" font-size="11" fill="white">ETF</text>

  <!-- 商品ETF：高风险，低流动性 -->
  <circle cx="660" cy="130" r="30" fill="#8e24aa" opacity="0.85"/>
  <text x="660" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="white">商品</text>
  <text x="660" y="140" text-anchor="middle" font-size="11" fill="white">ETF</text>

  <!-- 小白推荐区域 -->
  <rect x="115" y="235" width="180" height="155" rx="10" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="205" y="255" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">✓ 小白优先区</text>

  <text x="400" y="430" text-anchor="middle" font-size="10" fill="#aaa">全品种操盘手册 · 第四章第七节 | 位置仅为示意，非精确量化</text>
</svg>
