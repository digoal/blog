<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">ETF买卖的四大关键指标</text>

  <!-- Box 1: 成交量 -->
  <rect x="40" y="70" width="160" height="150" rx="10" fill="#4361ee" opacity="0.12"/>
  <rect x="40" y="70" width="160" height="8" rx="4" fill="#4361ee"/>
  <text x="120" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#4361ee">成交量</text>
  <text x="120" y="125" text-anchor="middle" font-size="11" fill="#333">每日实际成交额</text>
  <text x="120" y="145" text-anchor="middle" font-size="11" fill="#333">流动性的体温计</text>
  <text x="55" y="170" font-size="10" fill="#555">✓ 日成交&gt;1000万：安全</text>
  <text x="55" y="190" font-size="10" fill="#e63946">✗ 日成交&lt;100万：危险</text>
  <text x="55" y="210" font-size="10" fill="#555">→ 买卖价差变大</text>

  <!-- Box 2: 盘口 -->
  <rect x="220" y="70" width="160" height="150" rx="10" fill="#f72585" opacity="0.12"/>
  <rect x="220" y="70" width="160" height="8" rx="4" fill="#f72585"/>
  <text x="300" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#f72585">盘口</text>
  <text x="300" y="125" text-anchor="middle" font-size="11" fill="#333">买一价 / 卖一价</text>
  <text x="300" y="145" text-anchor="middle" font-size="11" fill="#333">实时成交的快照</text>
  <text x="235" y="170" font-size="10" fill="#555">✓ 价差&lt;0.01元：正常</text>
  <text x="235" y="190" font-size="10" fill="#e63946">✗ 价差&gt;0.05元：注意</text>
  <text x="235" y="210" font-size="10" fill="#555">→ 用限价单替代市价单</text>

  <!-- Box 3: 折溢价 -->
  <rect x="400" y="70" width="160" height="150" rx="10" fill="#7209b7" opacity="0.12"/>
  <rect x="400" y="70" width="160" height="8" rx="4" fill="#7209b7"/>
  <text x="480" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#7209b7">折溢价率</text>
  <text x="480" y="125" text-anchor="middle" font-size="11" fill="#333">市价 vs 基金净值</text>
  <text x="480" y="145" text-anchor="middle" font-size="11" fill="#333">ETF的"真实打折"</text>
  <text x="415" y="170" font-size="10" fill="#555">✓ 溢价&lt;0.3%：可接受</text>
  <text x="415" y="190" font-size="10" fill="#e63946">✗ 溢价&gt;2%：别追买</text>
  <text x="415" y="210" font-size="10" fill="#555">→ 折价时可能有机会</text>

  <!-- Box 4: 跟踪误差 -->
  <rect x="580" y="70" width="180" height="150" rx="10" fill="#06d6a0" opacity="0.12"/>
  <rect x="580" y="70" width="180" height="8" rx="4" fill="#06d6a0"/>
  <text x="670" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#048a68">跟踪误差</text>
  <text x="670" y="125" text-anchor="middle" font-size="11" fill="#333">ETF vs 指数收益差</text>
  <text x="670" y="145" text-anchor="middle" font-size="11" fill="#333">经理人的"失分榜"</text>
  <text x="595" y="170" font-size="10" fill="#555">✓ 年化误差&lt;0.5%：优秀</text>
  <text x="595" y="190" font-size="10" fill="#e63946">✗ 年化误差&gt;2%：警惕</text>
  <text x="595" y="210" font-size="10" fill="#555">→ 优选老牌大规模ETF</text>

  <!-- Arrows and conclusion bar -->
  <rect x="40" y="245" width="720" height="60" rx="10" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">📌 下单前检查清单</text>
  <text x="400" y="293" text-anchor="middle" font-size="11" fill="#333">成交量足够？盘口价差合理？溢价率正常？长期跟踪误差低？→ 四项都OK再下单</text>

  <!-- Bottom legend -->
  <rect x="40" y="325" width="720" height="75" rx="10" fill="white" opacity="0.8"/>
  <text x="60" y="350" font-size="11" font-weight="bold" fill="#1a1a2e">记忆口诀：</text>
  <text x="60" y="372" font-size="11" fill="#333">量（成交量）→ 盘（盘口价差）→ 价（折溢价）→ 差（跟踪误差）</text>
  <text x="60" y="392" font-size="10" fill="#888">小白操作：用限价单、避开开盘前5分钟、不碰溢价超2%的ETF、优先选规模大的同类ETF</text>
</svg>
