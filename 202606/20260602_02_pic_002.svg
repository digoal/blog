<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">折溢价的形成与演变</text>

  <!-- Timeline axis -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#ccc" stroke-width="2"/>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#888">时间轴（每个交易日）</text>

  <!-- NAV line -->
  <polyline points="80,200 200,185 320,175 440,185 560,170 680,160 720,158" fill="none" stroke="#4361ee" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="730" y="162" font-size="11" fill="#4361ee">基金净值NAV</text>

  <!-- Price line -->
  <polyline points="80,200 200,170 320,165 440,195 560,165 680,175 720,173" fill="none" stroke="#f72585" stroke-width="2.5"/>
  <text x="730" y="177" font-size="11" fill="#f72585">市场价格</text>

  <!-- Premium area annotation -->
  <rect x="155" y="60" width="150" height="55" rx="8" fill="#f72585" opacity="0.15"/>
  <text x="230" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#f72585">溢价区间</text>
  <text x="230" y="100" text-anchor="middle" font-size="10" fill="#333">市价 &gt; NAV</text>
  <text x="230" y="116" text-anchor="middle" font-size="10" fill="#333">→ 追买有风险，等回落</text>
  <line x1="230" y1="118" x2="230" y2="175" stroke="#f72585" stroke-dasharray="4,3" stroke-width="1.5"/>

  <!-- Discount area annotation -->
  <rect x="390" y="205" width="150" height="55" rx="8" fill="#06d6a0" opacity="0.15"/>
  <text x="465" y="227" text-anchor="middle" font-size="12" font-weight="bold" fill="#048a68">折价区间</text>
  <text x="465" y="245" text-anchor="middle" font-size="10" fill="#333">市价 &lt; NAV</text>
  <text x="465" y="261" text-anchor="middle" font-size="10" fill="#333">→ 相对划算，可考虑买</text>
  <line x1="465" y1="204" x2="465" y2="192" stroke="#048a68" stroke-dasharray="4,3" stroke-width="1.5"/>

  <!-- Key points on x axis -->
  <circle cx="200" cy="200" r="4" fill="#ccc"/>
  <circle cx="320" cy="200" r="4" fill="#ccc"/>
  <circle cx="440" cy="200" r="4" fill="#ccc"/>
  <circle cx="560" cy="200" r="4" fill="#ccc"/>
  <circle cx="680" cy="200" r="4" fill="#ccc"/>

  <!-- Zero line label -->
  <text x="65" y="204" text-anchor="end" font-size="10" fill="#888">基准</text>

  <!-- Bottom note -->
  <rect x="60" y="300" width="680" height="55" rx="8" fill="white" opacity="0.85"/>
  <text x="400" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">⚠️ 跨境ETF警告</text>
  <text x="400" y="342" text-anchor="middle" font-size="11" fill="#444">A股无法申购赎回美股资产时，溢价率可能达到10%-30%（如2022年纳斯达克ETF溢价事件）</text>
  <text x="400" y="358" text-anchor="middle" font-size="10" fill="#888">溢价买入 = 你比别人多花了10%-30%的钱买同样的资产，涨幅需先填补溢价才能真正盈利</text>
</svg>
