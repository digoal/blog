<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF下单决策树</text>

  <!-- Start -->
  <rect x="310" y="58" width="180" height="44" rx="22" fill="#1a1a2e"/>
  <text x="400" y="76" text-anchor="middle" font-size="13" fill="white" font-weight="bold">准备买这只ETF</text>
  <text x="400" y="94" text-anchor="middle" font-size="11" fill="#aaa">→ 先做检查</text>

  <!-- Arrow down -->
  <line x1="400" y1="102" x2="400" y2="130" stroke="#888" stroke-width="1.5"/>
  <polygon points="400,130 395,122 405,122" fill="#888"/>

  <!-- Q1 -->
  <rect x="270" y="130" width="260" height="44" rx="8" fill="#4361ee" opacity="0.15" stroke="#4361ee" stroke-width="1.5"/>
  <text x="400" y="152" text-anchor="middle" font-size="12" fill="#1a1a2e">① 日成交额 &gt; 1000万？</text>
  <text x="400" y="168" text-anchor="middle" font-size="10" fill="#666">（看行情页面"成交量×价格"）</text>

  <!-- Q1 YES -->
  <line x1="530" y1="152" x2="580" y2="152" stroke="#888" stroke-width="1.5"/>
  <text x="555" y="145" text-anchor="middle" font-size="10" fill="#048a68">✓ 是</text>
  <line x1="580" y1="152" x2="580" y2="230" stroke="#888" stroke-width="1.5"/>

  <!-- Q1 NO -->
  <line x1="270" y1="152" x2="220" y2="152" stroke="#888" stroke-width="1.5"/>
  <text x="245" y="145" text-anchor="middle" font-size="10" fill="#e63946">✗ 否</text>
  <rect x="120" y="130" width="100" height="40" rx="8" fill="#e63946" opacity="0.15" stroke="#e63946" stroke-width="1.2"/>
  <text x="170" y="147" text-anchor="middle" font-size="10" fill="#e63946">换更大</text>
  <text x="170" y="163" text-anchor="middle" font-size="10" fill="#e63946">规模ETF</text>

  <!-- Q2 -->
  <line x1="400" y1="174" x2="400" y2="230" stroke="#888" stroke-width="1.5"/>
  <rect x="270" y="230" width="260" height="44" rx="8" fill="#f72585" opacity="0.12" stroke="#f72585" stroke-width="1.5"/>
  <text x="400" y="252" text-anchor="middle" font-size="12" fill="#1a1a2e">② 溢价率 &lt; 0.5%？</text>
  <text x="400" y="268" text-anchor="middle" font-size="10" fill="#666">（基金公司官网或行情软件查看）</text>

  <!-- Q2 paths -->
  <line x1="580" y1="230" x2="580" y2="252" stroke="#888" stroke-width="1.5"/>

  <!-- Q2 YES -->
  <text x="415" y="312" text-anchor="start" font-size="10" fill="#048a68">✓ 是 →</text>
  <line x1="400" y1="274" x2="400" y2="330" stroke="#888" stroke-width="1.5"/>

  <!-- Q2 NO -->
  <line x1="270" y1="252" x2="220" y2="252" stroke="#888" stroke-width="1.5"/>
  <text x="245" y="245" text-anchor="middle" font-size="10" fill="#e63946">✗ 否</text>
  <rect x="95" y="230" width="125" height="50" rx="8" fill="#e63946" opacity="0.12" stroke="#e63946" stroke-width="1.2"/>
  <text x="157" y="251" text-anchor="middle" font-size="10" fill="#e63946">跨境ETF高溢价</text>
  <text x="157" y="267" text-anchor="middle" font-size="10" fill="#e63946">→ 等回落或改</text>
  <text x="157" y="281" text-anchor="middle" font-size="10" fill="#e63946">买QDII基金</text>

  <!-- Q3 -->
  <rect x="270" y="330" width="260" height="44" rx="8" fill="#7209b7" opacity="0.12" stroke="#7209b7" stroke-width="1.5"/>
  <text x="400" y="352" text-anchor="middle" font-size="12" fill="#1a1a2e">③ 用限价单？</text>
  <text x="400" y="368" text-anchor="middle" font-size="10" fill="#666">（不用市价单，输入买一价或卖一价）</text>

  <!-- Final YES -->
  <line x1="580" y1="252" x2="580" y2="352" stroke="#888" stroke-width="1.5"/>
  <line x1="580" y1="352" x2="530" y2="352" stroke="#888" stroke-width="1.5"/>

  <line x1="400" y1="374" x2="400" y2="408" stroke="#888" stroke-width="1.5"/>
  <rect x="280" y="408" width="240" height="26" rx="13" fill="#048a68"/>
  <text x="400" y="426" text-anchor="middle" font-size="12" fill="white" font-weight="bold">✅ 可以下单了</text>
</svg>
