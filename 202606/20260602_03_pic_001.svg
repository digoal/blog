<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF套利：市场价 vs 净值 的价差游戏</text>

  <!-- 左侧：一级市场 -->
  <rect x="40" y="65" width="210" height="300" rx="12" fill="#e8f4fd" stroke="#3a86ff" stroke-width="2"/>
  <text x="145" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a86ff">一级市场（申购/赎回）</text>
  <text x="145" y="118" text-anchor="middle" font-size="12" fill="#444">机构投资者直接与</text>
  <text x="145" y="136" text-anchor="middle" font-size="12" fill="#444">基金公司操作</text>
  <rect x="65" y="155" width="160" height="50" rx="8" fill="#3a86ff"/>
  <text x="145" y="178" text-anchor="middle" font-size="12" fill="white" font-weight="bold">申购：</text>
  <text x="145" y="196" text-anchor="middle" font-size="11" fill="white">一篮子股票 → ETF份额</text>
  <rect x="65" y="220" width="160" height="50" rx="8" fill="#0077b6"/>
  <text x="145" y="243" text-anchor="middle" font-size="12" fill="white" font-weight="bold">赎回：</text>
  <text x="145" y="261" text-anchor="middle" font-size="11" fill="white">ETF份额 → 一篮子股票</text>
  <text x="145" y="305" text-anchor="middle" font-size="11" fill="#555">门槛高：通常需要</text>
  <text x="145" y="322" text-anchor="middle" font-size="11" fill="#555">百万级资金起步</text>
  <text x="145" y="345" text-anchor="middle" font-size="12" fill="#888">≈ 批发商</text>

  <!-- 右侧：二级市场 -->
  <rect x="550" y="65" width="210" height="300" rx="12" fill="#fff3e0" stroke="#fb8500" stroke-width="2"/>
  <text x="655" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#fb8500">二级市场（买卖交易）</text>
  <text x="655" y="118" text-anchor="middle" font-size="12" fill="#444">普通投资者在交易所</text>
  <text x="655" y="136" text-anchor="middle" font-size="12" fill="#444">像买股票一样买卖</text>
  <rect x="575" y="155" width="160" height="50" rx="8" fill="#fb8500"/>
  <text x="655" y="178" text-anchor="middle" font-size="12" fill="white" font-weight="bold">市场价格：</text>
  <text x="655" y="196" text-anchor="middle" font-size="11" fill="white">供需决定，实时波动</text>
  <rect x="575" y="220" width="160" height="50" rx="8" fill="#e07000"/>
  <text x="655" y="243" text-anchor="middle" font-size="12" fill="white" font-weight="bold">净值（IOPV）：</text>
  <text x="655" y="261" text-anchor="middle" font-size="11" fill="white">成分股市值/份额数</text>
  <text x="655" y="305" text-anchor="middle" font-size="11" fill="#555">门槛低：1手起步</text>
  <text x="655" y="322" text-anchor="middle" font-size="11" fill="#555">随时可以交易</text>
  <text x="655" y="345" text-anchor="middle" font-size="12" fill="#888">≈ 零售商</text>

  <!-- 中间：套利箭头 -->
  <rect x="285" y="130" width="230" height="200" rx="12" fill="#f0fff4" stroke="#38b000" stroke-width="2"/>
  <text x="400" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#38b000">价差 = 套利机会</text>
  <!-- 溢价箭头 -->
  <text x="400" y="192" text-anchor="middle" font-size="11" fill="#d62828" font-weight="bold">溢价时（市价＞净值）</text>
  <text x="400" y="210" text-anchor="middle" font-size="10" fill="#555">买一篮子股票→申购ETF→卖ETF</text>
  <line x1="310" y1="220" x2="490" y2="220" stroke="#d62828" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 折价箭头 -->
  <text x="400" y="250" text-anchor="middle" font-size="11" fill="#023e8a" font-weight="bold">折价时（市价＜净值）</text>
  <text x="400" y="268" text-anchor="middle" font-size="10" fill="#555">买ETF→赎回→卖股票</text>
  <line x1="310" y1="278" x2="490" y2="278" stroke="#023e8a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#38b000">两个市场同步操作</text>
  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#38b000">锁定价差利润</text>

  <!-- 连接线 -->
  <line x1="250" y1="215" x2="285" y2="215" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="215" x2="515" y2="215" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- 底部提示 -->
  <text x="400" y="398" text-anchor="middle" font-size="11" fill="#888">套利行为本身让折溢价收敛——这是维持ETF定价效率的机制</text>
</svg>
