<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">小白为什么不能轻易套利——五道隐形门槛</text>

  <!-- 5个障碍 -->
  <!-- 1 -->
  <rect x="30" y="60" width="145" height="140" rx="10" fill="#ffe8e8" stroke="#d62828" stroke-width="2"/>
  <text x="102" y="85" text-anchor="middle" font-size="28">🚧</text>
  <text x="102" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#d62828">资金门槛</text>
  <text x="102" y="132" text-anchor="middle" font-size="11" fill="#555">申购/赎回</text>
  <text x="102" y="150" text-anchor="middle" font-size="11" fill="#555">最低100万</text>
  <text x="102" y="168" text-anchor="middle" font-size="11" fill="#555">份额起步</text>
  <text x="102" y="186" text-anchor="middle" font-size="10" fill="#d62828">普通人直接出局</text>

  <!-- 2 -->
  <rect x="188" y="60" width="145" height="140" rx="10" fill="#fff3cd" stroke="#f4a261" stroke-width="2"/>
  <text x="260" y="85" text-anchor="middle" font-size="28">⚡</text>
  <text x="260" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#e07000">速度门槛</text>
  <text x="260" y="132" text-anchor="middle" font-size="11" fill="#555">价差存在时间</text>
  <text x="260" y="150" text-anchor="middle" font-size="11" fill="#555">往往只有</text>
  <text x="260" y="168" text-anchor="middle" font-size="11" fill="#555">几秒到几分钟</text>
  <text x="260" y="186" text-anchor="middle" font-size="10" fill="#e07000">机构程序化抢先</text>

  <!-- 3 -->
  <rect x="346" y="60" width="145" height="140" rx="10" fill="#e8f4fd" stroke="#3a86ff" stroke-width="2"/>
  <text x="418" y="85" text-anchor="middle" font-size="28">📋</text>
  <text x="418" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a86ff">流程门槛</text>
  <text x="418" y="132" text-anchor="middle" font-size="11" fill="#555">一级市场申购</text>
  <text x="418" y="150" text-anchor="middle" font-size="11" fill="#555">T+2日才到账</text>
  <text x="418" y="168" text-anchor="middle" font-size="11" fill="#555">期间价差已变</text>
  <text x="418" y="186" text-anchor="middle" font-size="10" fill="#3a86ff">时间错配，套不到</text>

  <!-- 4 -->
  <rect x="504" y="60" width="145" height="140" rx="10" fill="#f0fff4" stroke="#38b000" stroke-width="2"/>
  <text x="576" y="85" text-anchor="middle" font-size="28">💸</text>
  <text x="576" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#38b000">成本门槛</text>
  <text x="576" y="132" text-anchor="middle" font-size="11" fill="#555">印花税、手续费</text>
  <text x="576" y="150" text-anchor="middle" font-size="11" fill="#555">冲击成本</text>
  <text x="576" y="168" text-anchor="middle" font-size="11" fill="#555">买卖价差</text>
  <text x="576" y="186" text-anchor="middle" font-size="10" fill="#38b000">吃掉大部分利润</text>

  <!-- 5 -->
  <rect x="625" y="60" width="145" height="140" rx="10" fill="#f5e6ff" stroke="#7b2d8b" stroke-width="2"/>
  <text x="697" y="85" text-anchor="middle" font-size="28">📉</text>
  <text x="697" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b2d8b">风险门槛</text>
  <text x="697" y="132" text-anchor="middle" font-size="11" fill="#555">等待套利</text>
  <text x="697" y="150" text-anchor="middle" font-size="11" fill="#555">期间市场暴跌</text>
  <text x="697" y="168" text-anchor="middle" font-size="11" fill="#555">锁定的是亏损</text>
  <text x="697" y="186" text-anchor="middle" font-size="10" fill="#7b2d8b">执行风险难控制</text>

  <!-- 底部：小白能做什么 -->
  <rect x="30" y="225" width="740" height="110" rx="12" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <text x="400" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">✅ 小白从套利原理能学到什么？</text>
  <text x="90" y="280" font-size="12" fill="#333">① 折溢价是买入信号参考</text>
  <text x="90" y="300" font-size="12" fill="#333">② 避免在高溢价时盲目追买ETF</text>
  <text x="90" y="320" font-size="12" fill="#333">③ 理解ETF价格为何不会永久偏离净值</text>
  <text x="440" y="280" font-size="12" fill="#333">④ 识别流动性差的小ETF更容易偏离</text>
  <text x="440" y="300" font-size="12" fill="#333">⑤ 跨境ETF溢价特殊，要单独理解</text>
  <text x="440" y="320" font-size="12" fill="#333">⑥ 别买溢价超过2%的ETF，让别人去套利</text>
</svg>
