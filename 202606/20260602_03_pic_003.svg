<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">小白遇到折溢价的决策树</text>

  <!-- 根节点 -->
  <rect x="280" y="50" width="240" height="50" rx="10" fill="#3a86ff" />
  <text x="400" y="71" text-anchor="middle" font-size="13" fill="white" font-weight="bold">我想买的ETF有折溢价</text>
  <text x="400" y="89" text-anchor="middle" font-size="12" fill="#cce5ff">当前市价 vs 净值差多少？</text>

  <!-- 左：溢价 -->
  <line x1="320" y1="100" x2="200" y2="150" stroke="#d62828" stroke-width="2"/>
  <text x="230" y="135" font-size="11" fill="#d62828">溢价（市价＞净值）</text>
  <rect x="80" y="150" width="230" height="55" rx="10" fill="#ffe8e8" stroke="#d62828" stroke-width="2"/>
  <text x="195" y="172" text-anchor="middle" font-size="12" fill="#d62828" font-weight="bold">溢价超过1%？</text>
  <text x="195" y="192" text-anchor="middle" font-size="11" fill="#555">你买贵了，多付溢价给市场</text>

  <!-- 溢价 → 小于1% -->
  <line x1="145" y1="205" x2="120" y2="250" stroke="#38b000" stroke-width="1.5"/>
  <text x="70" y="244" font-size="10" fill="#38b000">小于1%</text>
  <rect x="40" y="252" width="165" height="60" rx="8" fill="#f0fff4" stroke="#38b000" stroke-width="1.5"/>
  <text x="122" y="275" text-anchor="middle" font-size="11" fill="#333">可以接受</text>
  <text x="122" y="293" text-anchor="middle" font-size="11" fill="#333">正常买，损失有限</text>

  <!-- 溢价 → 大于1% -->
  <line x1="245" y1="205" x2="270" y2="250" stroke="#d62828" stroke-width="1.5"/>
  <text x="248" y="244" font-size="10" fill="#d62828">大于1%</text>
  <rect x="210" y="252" width="165" height="60" rx="8" fill="#ffe8e8" stroke="#d62828" stroke-width="1.5"/>
  <text x="292" y="275" text-anchor="middle" font-size="11" fill="#333">暂缓买入</text>
  <text x="292" y="293" text-anchor="middle" font-size="11" fill="#333">等溢价收窄再买</text>

  <!-- 右：折价 -->
  <line x1="480" y1="100" x2="600" y2="150" stroke="#023e8a" stroke-width="2"/>
  <text x="530" y="135" font-size="11" fill="#023e8a">折价（市价＜净值）</text>
  <rect x="490" y="150" width="230" height="55" rx="10" fill="#e8f4fd" stroke="#023e8a" stroke-width="2"/>
  <text x="605" y="172" text-anchor="middle" font-size="12" fill="#023e8a" font-weight="bold">折价超过1%？</text>
  <text x="605" y="192" text-anchor="middle" font-size="11" fill="#555">市价低于净值，理论上便宜</text>

  <!-- 折价 → 小于1% -->
  <line x1="555" y1="205" x2="530" y2="250" stroke="#38b000" stroke-width="1.5"/>
  <text x="490" y="244" font-size="10" fill="#38b000">小于1%</text>
  <rect x="398" y="252" width="165" height="60" rx="8" fill="#f0fff4" stroke="#38b000" stroke-width="1.5"/>
  <text x="480" y="275" text-anchor="middle" font-size="11" fill="#333">正常现象</text>
  <text x="480" y="293" text-anchor="middle" font-size="11" fill="#333">按计划买入即可</text>

  <!-- 折价 → 大于1% -->
  <line x1="655" y1="205" x2="680" y2="250" stroke="#f4a261" stroke-width="1.5"/>
  <text x="660" y="244" font-size="10" fill="#f4a261">大于1%</text>
  <rect x="560" y="252" width="200" height="60" rx="8" fill="#fff3cd" stroke="#f4a261" stroke-width="1.5"/>
  <text x="660" y="272" text-anchor="middle" font-size="11" fill="#333">先查原因</text>
  <text x="660" y="290" text-anchor="middle" font-size="11" fill="#333">停牌、流动性差？</text>
  <text x="660" y="308" text-anchor="middle" font-size="10" fill="#e07000">小心有坑，谨慎操作</text>

  <!-- 特殊说明 -->
  <rect x="155" y="330" width="490" height="22" rx="6" fill="#eee"/>
  <text x="400" y="345" text-anchor="middle" font-size="11" fill="#555">⭐ 跨境ETF（如恒生科技、纳斯达克100ETF）溢价规律特殊，单独判断，详见第十二章</text>
</svg>
