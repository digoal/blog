<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#fafafa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">ETF三大危险地带</text>

  <!-- Zone 1: 规模太小 -->
  <rect x="30" y="60" width="220" height="320" rx="10" fill="#fff3f3" stroke="#e74c3c" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="44" rx="10" fill="#e74c3c"/>
  <rect x="30" y="90" width="220" height="14" fill="#e74c3c"/>
  <text x="140" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">❶ 规模太小</text>
  <text x="140" y="130" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">危险线：&lt; 5000万元</text>
  <line x1="50" y1="145" x2="230" y2="145" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="140" y="168" text-anchor="middle" font-size="11" fill="#555">⚠ 触发清盘条件</text>
  <text x="140" y="188" text-anchor="middle" font-size="10" fill="#777">连续60日净值 &lt; 5000万</text>
  <text x="140" y="208" text-anchor="middle" font-size="10" fill="#777">或持有人 &lt; 200人</text>
  <line x1="50" y1="220" x2="230" y2="220" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="140" y="243" text-anchor="middle" font-size="11" fill="#555">⚠ 跟踪误差放大</text>
  <text x="140" y="263" text-anchor="middle" font-size="10" fill="#777">小规模难以精确复制</text>
  <text x="140" y="280" text-anchor="middle" font-size="10" fill="#777">成分股持仓</text>
  <line x1="50" y1="293" x2="230" y2="293" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="140" y="316" text-anchor="middle" font-size="11" fill="#555">⚠ 被动清仓风险</text>
  <text x="140" y="336" text-anchor="middle" font-size="10" fill="#777">清盘按净值结算</text>
  <text x="140" y="353" text-anchor="middle" font-size="10" fill="#777">你没得选择</text>

  <!-- Zone 2: 流动性太差 -->
  <rect x="290" y="60" width="220" height="320" rx="10" fill="#fff8f0" stroke="#e67e22" stroke-width="2"/>
  <rect x="290" y="60" width="220" height="44" rx="10" fill="#e67e22"/>
  <rect x="290" y="90" width="220" height="14" fill="#e67e22"/>
  <text x="400" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">❷ 流动性太差</text>
  <text x="400" y="130" text-anchor="middle" font-size="12" fill="#d35400" font-weight="bold">警戒线：日均成交 &lt; 1000万</text>
  <line x1="310" y1="145" x2="490" y2="145" stroke="#e67e22" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="168" text-anchor="middle" font-size="11" fill="#555">⚠ 买卖价差吃钱</text>
  <text x="400" y="188" text-anchor="middle" font-size="10" fill="#777">差价可达0.3%-1%</text>
  <text x="400" y="208" text-anchor="middle" font-size="10" fill="#777">来回就是0.6%+的损耗</text>
  <line x1="310" y1="220" x2="490" y2="220" stroke="#e67e22" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="243" text-anchor="middle" font-size="11" fill="#555">⚠ 想卖卖不掉</text>
  <text x="400" y="263" text-anchor="middle" font-size="10" fill="#777">急需资金时挂单无人接</text>
  <text x="400" y="280" text-anchor="middle" font-size="10" fill="#777">只能不断降价</text>
  <line x1="310" y1="293" x2="490" y2="293" stroke="#e67e22" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="316" text-anchor="middle" font-size="11" fill="#555">⚠ 大资金冲击价格</text>
  <text x="400" y="336" text-anchor="middle" font-size="10" fill="#777">一笔买单就能拉高</text>
  <text x="400" y="353" text-anchor="middle" font-size="10" fill="#777">接着反向砸下来</text>

  <!-- Zone 3: 溢价太高 -->
  <rect x="550" y="60" width="220" height="320" rx="10" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
  <rect x="550" y="60" width="220" height="44" rx="10" fill="#27ae60"/>
  <rect x="550" y="90" width="220" height="14" fill="#27ae60"/>
  <text x="660" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">❸ 溢价太高</text>
  <text x="660" y="130" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">红线：溢价率 &gt; 2%</text>
  <line x1="570" y1="145" x2="750" y2="145" stroke="#27ae60" stroke-width="1" stroke-dasharray="4"/>
  <text x="660" y="168" text-anchor="middle" font-size="11" fill="#555">⚠ 你买的是泡沫</text>
  <text x="660" y="188" text-anchor="middle" font-size="10" fill="#777">溢价终将回归净值</text>
  <text x="660" y="208" text-anchor="middle" font-size="10" fill="#777">方向对了也可能亏钱</text>
  <line x1="570" y1="220" x2="750" y2="220" stroke="#27ae60" stroke-width="1" stroke-dasharray="4"/>
  <text x="660" y="243" text-anchor="middle" font-size="11" fill="#555">⚠ 跨境ETF最危险</text>
  <text x="660" y="263" text-anchor="middle" font-size="10" fill="#777">无法申赎套利</text>
  <text x="660" y="280" text-anchor="middle" font-size="10" fill="#777">溢价可达38%+</text>
  <line x1="570" y1="293" x2="750" y2="293" stroke="#27ae60" stroke-width="1" stroke-dasharray="4"/>
  <text x="660" y="316" text-anchor="middle" font-size="11" fill="#555">⚠ 情绪崩了跌更快</text>
  <text x="660" y="336" text-anchor="middle" font-size="10" fill="#777">净值跌+溢价收敛</text>
  <text x="660" y="353" text-anchor="middle" font-size="10" fill="#777">双杀不留情</text>
</svg>
