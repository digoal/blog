<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#fafafa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">高溢价ETF的"双杀"路径</text>

  <!-- Timeline line -->
  <line x1="80" y1="180" x2="720" y2="180" stroke="#bbb" stroke-width="2"/>

  <!-- Phase labels -->
  <text x="160" y="70" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">阶段①</text>
  <text x="160" y="88" text-anchor="middle" font-size="11" fill="#555">情绪爆发</text>
  <text x="160" y="104" text-anchor="middle" font-size="11" fill="#555">资金涌入</text>

  <text x="340" y="70" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">阶段②</text>
  <text x="340" y="88" text-anchor="middle" font-size="11" fill="#e74c3c">溢价攀升</text>
  <text x="340" y="104" text-anchor="middle" font-size="11" fill="#e74c3c">追涨进场</text>

  <text x="520" y="70" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">阶段③</text>
  <text x="520" y="88" text-anchor="middle" font-size="11" fill="#c0392b">情绪反转</text>
  <text x="520" y="104" text-anchor="middle" font-size="11" fill="#c0392b">资金撤出</text>

  <text x="680" y="70" text-anchor="middle" font-size="12" fill="#7f8c8d" font-weight="bold">阶段④</text>
  <text x="680" y="88" text-anchor="middle" font-size="11" fill="#7f8c8d">净值回落</text>
  <text x="680" y="104" text-anchor="middle" font-size="11" fill="#7f8c8d">溢价消失</text>

  <!-- Arrows on timeline -->
  <circle cx="160" cy="180" r="10" fill="#2c3e50"/>
  <circle cx="340" cy="180" r="10" fill="#e74c3c"/>
  <circle cx="520" cy="180" r="10" fill="#c0392b"/>
  <circle cx="680" cy="180" r="10" fill="#7f8c8d"/>

  <!-- Loss explanation boxes -->
  <rect x="270" y="210" width="320" height="110" rx="8" fill="#fff0f0" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="430" y="232" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">追涨进场者的双重亏损</text>
  <text x="290" y="256" font-size="11" fill="#555">· 净值下跌亏损：指数本身跌了 -10%</text>
  <text x="290" y="276" font-size="11" fill="#555">· 溢价收敛亏损：溢价从 +15% → 0%</text>
  <line x1="290" y1="288" x2="570" y2="288" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="290" y="308" font-size="12" fill="#c0392b" font-weight="bold">合计亏损可达 -25%，指数还没跌完</text>

  <!-- Real case note -->
  <rect x="30" y="310" width="740" height="44" rx="8" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="400" y="331" text-anchor="middle" font-size="11" fill="#856404">⚡ 真实案例：2025年1月，某标普消费ETF溢价率飙至38.6%，当日换手率超1000%</text>
  <text x="400" y="348" text-anchor="middle" font-size="11" fill="#856404">高溢价买入者在随后数日溢价回归过程中，承担了与净值涨跌无关的额外亏损</text>
</svg>
