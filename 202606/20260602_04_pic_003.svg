<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="360" fill="#fafafa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">ETF买前三秒钟检查表</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#888">任何一项亮红灯，放下！换一只！</text>

  <!-- Check 1 -->
  <rect x="40" y="72" width="340" height="110" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="40" y="72" width="340" height="34" rx="8" fill="#27ae60"/>
  <rect x="40" y="92" width="340" height="14" fill="#27ae60"/>
  <text x="210" y="94" text-anchor="middle" font-size="13" fill="white" font-weight="bold">✓ 检查一：规模</text>
  <text x="60" y="124" font-size="12" fill="#333">📏 规模 ≥ 2亿元 → 安全区</text>
  <text x="60" y="144" font-size="12" fill="#e67e22">⚠ 规模 5000万~2亿 → 谨慎区，要追踪</text>
  <text x="60" y="164" font-size="12" fill="#e74c3c">🚨 规模 &lt; 5000万 → 红灯，不碰</text>

  <!-- Check 2 -->
  <rect x="420" y="72" width="340" height="110" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <rect x="420" y="72" width="340" height="34" rx="8" fill="#3498db"/>
  <rect x="420" y="92" width="340" height="14" fill="#3498db"/>
  <text x="590" y="94" text-anchor="middle" font-size="13" fill="white" font-weight="bold">✓ 检查二：流动性</text>
  <text x="440" y="124" font-size="12" fill="#333">💧 日均成交 ≥ 1亿 → 优质</text>
  <text x="440" y="144" font-size="12" fill="#e67e22">⚠ 日均成交 1000万~1亿 → 可接受</text>
  <text x="440" y="164" font-size="12" fill="#e74c3c">🚨 日均成交 &lt; 1000万 → 红灯，不碰</text>

  <!-- Check 3 -->
  <rect x="40" y="200" width="340" height="110" rx="8" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
  <rect x="40" y="200" width="340" height="34" rx="8" fill="#9b59b6"/>
  <rect x="40" y="220" width="340" height="14" fill="#9b59b6"/>
  <text x="210" y="222" text-anchor="middle" font-size="13" fill="white" font-weight="bold">✓ 检查三：溢价率</text>
  <text x="60" y="252" font-size="12" fill="#333">💰 溢价率 &lt; 0.5% → 正常区间</text>
  <text x="60" y="272" font-size="12" fill="#e67e22">⚠ 溢价率 0.5%~2% → 留意，追踪</text>
  <text x="60" y="292" font-size="12" fill="#e74c3c">🚨 溢价率 &gt; 2% → 红灯，等回落再看</text>

  <!-- Where to look -->
  <rect x="420" y="200" width="340" height="110" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="420" y="200" width="340" height="34" rx="8" fill="#e67e22"/>
  <rect x="420" y="220" width="340" height="14" fill="#e67e22"/>
  <text x="590" y="222" text-anchor="middle" font-size="13" fill="white" font-weight="bold">📍 数据在哪里查</text>
  <text x="440" y="252" font-size="12" fill="#333">规模：基金官网 / 天天基金 / 东财</text>
  <text x="440" y="272" font-size="12" fill="#333">成交量：交易软件当日行情页</text>
  <text x="440" y="292" font-size="12" fill="#333">溢价率：搜"XX ETF溢价率"或看iNAV</text>

  <text x="400" y="334" text-anchor="middle" font-size="11" fill="#888">iNAV = 场内基金参考净值（实时披露），与场内价格的差即溢价/折价</text>
</svg>
