<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF组合三层结构</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#666">核心宽基 · 卫星行业 · 防守资产</text>
  
  <!-- Core layer (bottom/base) -->
  <rect x="100" y="310" width="600" height="80" rx="10" fill="#2563eb" opacity="0.9"/>
  <text x="400" y="345" text-anchor="middle" font-size="15" font-weight="bold" fill="white">核心宽基 ETF（50%–70%）</text>
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#dbeafe">沪深300 · 中证500 · 纳斯达克100 · 标普500</text>
  <text x="400" y="382" text-anchor="middle" font-size="11" fill="#bfdbfe">低费率、高流动性、长期持有、定投为主</text>

  <!-- Satellite layer (middle) -->
  <rect x="160" y="200" width="480" height="88" rx="10" fill="#7c3aed" opacity="0.85"/>
  <text x="400" y="232" text-anchor="middle" font-size="15" font-weight="bold" fill="white">卫星行业 ETF（20%–35%）</text>
  <text x="400" y="254" text-anchor="middle" font-size="12" fill="#ede9fe">科技 · 消费 · 医药 · 半导体 · 新能源 · 金融</text>
  <text x="400" y="274" text-anchor="middle" font-size="11" fill="#ddd6fe">结合市场环境轮动，单行业上限 10%</text>

  <!-- Defense layer (top) -->
  <rect x="250" y="100" width="300" height="78" rx="10" fill="#059669" opacity="0.85"/>
  <text x="400" y="132" text-anchor="middle" font-size="15" font-weight="bold" fill="white">防守资产 ETF（10%–20%）</text>
  <text x="400" y="154" text-anchor="middle" font-size="12" fill="#d1fae5">黄金ETF · 债券ETF · 红利ETF</text>
  <text x="400" y="172" text-anchor="middle" font-size="11" fill="#a7f3d0">抗跌缓冲 · 降低整体回撤</text>

  <!-- Left labels -->
  <text x="68" y="352" text-anchor="middle" font-size="11" fill="#555" font-style="italic">基础</text>
  <text x="68" y="244" text-anchor="middle" font-size="11" fill="#555" font-style="italic">增强</text>
  <text x="68" y="142" text-anchor="middle" font-size="11" fill="#555" font-style="italic">防御</text>
  
  <!-- Arrows on right -->
  <text x="732" y="352" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">稳</text>
  <text x="732" y="244" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="bold">进</text>
  <text x="732" y="142" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">守</text>
</svg>
