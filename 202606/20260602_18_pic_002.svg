<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">不同市场环境下的组合仓位参考</text>

  <!-- Header row -->
  <rect x="20" y="54" width="148" height="36" rx="0" fill="#1e3a5f"/>
  <rect x="170" y="54" width="148" height="36" rx="0" fill="#1e3a5f"/>
  <rect x="320" y="54" width="148" height="36" rx="0" fill="#1e3a5f"/>
  <rect x="470" y="54" width="148" height="36" rx="0" fill="#1e3a5f"/>
  <rect x="620" y="54" width="160" height="36" rx="0" fill="#1e3a5f"/>
  <text x="94" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">市场环境</text>
  <text x="244" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">核心宽基</text>
  <text x="394" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">卫星行业</text>
  <text x="544" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">防守资产</text>
  <text x="700" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">卫星方向建议</text>

  <!-- Row 1: 牛市 -->
  <rect x="20" y="90" width="148" height="44" fill="#dcfce7"/>
  <rect x="170" y="90" width="148" height="44" fill="#f0fdf4"/>
  <rect x="320" y="90" width="148" height="44" fill="#f0fdf4"/>
  <rect x="470" y="90" width="148" height="44" fill="#f0fdf4"/>
  <rect x="620" y="90" width="160" height="44" fill="#f0fdf4"/>
  <text x="94" y="107" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold">牛市初期</text>
  <text x="94" y="123" text-anchor="middle" font-size="11" fill="#166534">情绪回暖</text>
  <text x="244" y="115" text-anchor="middle" font-size="13" fill="#15803d" font-weight="bold">55%–65%</text>
  <text x="394" y="115" text-anchor="middle" font-size="13" fill="#15803d" font-weight="bold">25%–35%</text>
  <text x="544" y="115" text-anchor="middle" font-size="13" fill="#15803d" font-weight="bold">10%</text>
  <text x="700" y="115" text-anchor="middle" font-size="11" fill="#166534">科技/成长/周期</text>

  <!-- Row 2: 震荡 -->
  <rect x="20" y="134" width="148" height="44" fill="#fef9c3"/>
  <rect x="170" y="134" width="148" height="44" fill="#fefce8"/>
  <rect x="320" y="134" width="148" height="44" fill="#fefce8"/>
  <rect x="470" y="134" width="148" height="44" fill="#fefce8"/>
  <rect x="620" y="134" width="160" height="44" fill="#fefce8"/>
  <text x="94" y="151" text-anchor="middle" font-size="12" fill="#854d0e" font-weight="bold">震荡市</text>
  <text x="94" y="167" text-anchor="middle" font-size="11" fill="#854d0e">方向不明</text>
  <text x="244" y="159" text-anchor="middle" font-size="13" fill="#ca8a04" font-weight="bold">55%–60%</text>
  <text x="394" y="159" text-anchor="middle" font-size="13" fill="#ca8a04" font-weight="bold">15%–20%</text>
  <text x="544" y="159" text-anchor="middle" font-size="13" fill="#ca8a04" font-weight="bold">20%–25%</text>
  <text x="700" y="159" text-anchor="middle" font-size="11" fill="#854d0e">红利/消费/医药</text>

  <!-- Row 3: 熊市 -->
  <rect x="20" y="178" width="148" height="44" fill="#fee2e2"/>
  <rect x="170" y="178" width="148" height="44" fill="#fef2f2"/>
  <rect x="320" y="178" width="148" height="44" fill="#fef2f2"/>
  <rect x="470" y="178" width="148" height="44" fill="#fef2f2"/>
  <rect x="620" y="178" width="160" height="44" fill="#fef2f2"/>
  <text x="94" y="195" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="bold">熊市 / 下行期</text>
  <text x="94" y="211" text-anchor="middle" font-size="11" fill="#991b1b">风险上升</text>
  <text x="244" y="203" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="bold">40%–50%</text>
  <text x="394" y="203" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="bold">10%</text>
  <text x="544" y="203" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="bold">20%–30%</text>
  <text x="700" y="203" text-anchor="middle" font-size="11" fill="#991b1b">黄金/短债/货币</text>

  <!-- Row 4: 利率下行 -->
  <rect x="20" y="222" width="148" height="44" fill="#ede9fe"/>
  <rect x="170" y="222" width="148" height="44" fill="#f5f3ff"/>
  <rect x="320" y="222" width="148" height="44" fill="#f5f3ff"/>
  <rect x="470" y="222" width="148" height="44" fill="#f5f3ff"/>
  <rect x="620" y="222" width="160" height="44" fill="#f5f3ff"/>
  <text x="94" y="239" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="bold">利率下行</text>
  <text x="94" y="255" text-anchor="middle" font-size="11" fill="#5b21b6">降息周期</text>
  <text x="244" y="247" text-anchor="middle" font-size="13" fill="#6d28d9" font-weight="bold">50%–60%</text>
  <text x="394" y="247" text-anchor="middle" font-size="13" fill="#6d28d9" font-weight="bold">15%–20%</text>
  <text x="544" y="247" text-anchor="middle" font-size="13" fill="#6d28d9" font-weight="bold">20%–25%</text>
  <text x="700" y="247" text-anchor="middle" font-size="11" fill="#5b21b6">债券ETF/REITs</text>

  <text x="400" y="315" text-anchor="middle" font-size="11" fill="#6b7280">* 仅为参考区间，实际仓位应结合个人风险承受能力调整</text>
</svg>
