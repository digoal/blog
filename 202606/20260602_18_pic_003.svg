<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">再平衡触发条件 · 决策树</text>

  <!-- Root node -->
  <rect x="300" y="58" width="200" height="44" rx="8" fill="#1e40af"/>
  <text x="400" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">检查当前组合占比</text>
  <text x="400" y="93" text-anchor="middle" font-size="11" fill="#bfdbfe">每季度 or 偏离5%时</text>

  <!-- Arrow down -->
  <line x1="400" y1="102" x2="400" y2="128" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="400,128 490,162 400,196 310,162" fill="#6d28d9" opacity="0.9"/>
  <text x="400" y="157" text-anchor="middle" font-size="12" fill="white" font-weight="bold">偏离超过5%？</text>
  <text x="400" y="174" text-anchor="middle" font-size="11" fill="#ddd6fe">核心/卫星/防守</text>

  <!-- Yes branch -->
  <line x1="490" y1="162" x2="570" y2="162" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="155" text-anchor="middle" font-size="11" fill="#d97706">是</text>
  <rect x="572" y="138" width="164" height="48" rx="8" fill="#d97706" opacity="0.9"/>
  <text x="654" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">执行再平衡</text>
  <text x="654" y="176" text-anchor="middle" font-size="11" fill="#fef3c7">卖多 → 买少，恢复目标</text>

  <!-- No branch -->
  <line x1="400" y1="196" x2="400" y2="224" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="215" font-size="11" fill="#16a34a">否</text>
  <rect x="300" y="226" width="200" height="44" rx="8" fill="#16a34a" opacity="0.9"/>
  <text x="400" y="245" text-anchor="middle" font-size="12" fill="white" font-weight="bold">维持现有仓位</text>
  <text x="400" y="263" text-anchor="middle" font-size="11" fill="#d1fae5">不交易，等下次检查</text>

  <!-- From rebalance: check market condition -->
  <line x1="654" y1="186" x2="654" y2="226" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="572" y="228" width="164" height="60" rx="8" fill="#374151" opacity="0.9"/>
  <text x="654" y="250" text-anchor="middle" font-size="11" fill="white" font-weight="bold">检查市场环境</text>
  <text x="654" y="266" text-anchor="middle" font-size="10" fill="#d1d5db">牛市→提高核心占比</text>
  <text x="654" y="280" text-anchor="middle" font-size="10" fill="#d1d5db">熊市→提高防守占比</text>

  <!-- Bottom note -->
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#6b7280">💡 再平衡不是频繁操作，每季度检查一次已足够</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>
</svg>
