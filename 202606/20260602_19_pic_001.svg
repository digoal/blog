<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF复盘五维度框架</text>
  
  <!-- 五个维度卡片 -->
  <!-- 指数 -->
  <rect x="30" y="60" width="140" height="320" fill="#4361ee" rx="10"/>
  <text x="100" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">① 指数</text>
  <line x1="50" y1="98" x2="150" y2="98" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="white">买的是什么？</text>
  <text x="100" y="145" text-anchor="middle" font-size="11" fill="#b8c5ff">沪深300</text>
  <text x="100" y="165" text-anchor="middle" font-size="11" fill="#b8c5ff">中证500</text>
  <text x="100" y="185" text-anchor="middle" font-size="11" fill="#b8c5ff">科创50</text>
  <text x="100" y="215" text-anchor="middle" font-size="10" fill="white">核心问题：</text>
  <text x="100" y="235" text-anchor="middle" font-size="10" fill="#e0e7ff">成份股变了吗？</text>
  <text x="100" y="255" text-anchor="middle" font-size="10" fill="#e0e7ff">规则还稳定吗？</text>
  <text x="100" y="280" text-anchor="middle" font-size="10" fill="#e0e7ff">ETF规模&gt;5亿？</text>
  <text x="100" y="300" text-anchor="middle" font-size="10" fill="#e0e7ff">跟踪误差&lt;1%？</text>

  <!-- 估值 -->
  <rect x="180" y="60" width="140" height="320" fill="#3a0ca3" rx="10"/>
  <text x="250" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">② 估值</text>
  <line x1="200" y1="98" x2="300" y2="98" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="250" y="120" text-anchor="middle" font-size="11" fill="white">贵了还是便宜了？</text>
  <text x="250" y="145" text-anchor="middle" font-size="11" fill="#b8c5ff">PE百分位</text>
  <text x="250" y="165" text-anchor="middle" font-size="11" fill="#b8c5ff">PB百分位</text>
  <text x="250" y="185" text-anchor="middle" font-size="11" fill="#b8c5ff">股息率水平</text>
  <text x="250" y="215" text-anchor="middle" font-size="10" fill="white">参考标准：</text>
  <text x="250" y="235" text-anchor="middle" font-size="10" fill="#e0e7ff">低于30% → 可关注</text>
  <text x="250" y="255" text-anchor="middle" font-size="10" fill="#e0e7ff">低于10% → 可加仓</text>
  <text x="250" y="275" text-anchor="middle" font-size="10" fill="#e0e7ff">高于80% → 慎追</text>
  <text x="250" y="295" text-anchor="middle" font-size="10" fill="#e0e7ff">高于90% → 可减仓</text>

  <!-- 趋势 -->
  <rect x="330" y="60" width="140" height="320" fill="#7209b7" rx="10"/>
  <text x="400" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">③ 趋势</text>
  <line x1="350" y1="98" x2="450" y2="98" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="400" y="120" text-anchor="middle" font-size="11" fill="white">方向往哪走？</text>
  <text x="400" y="145" text-anchor="middle" font-size="11" fill="#d4b8ff">MA20/60/120</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" fill="#d4b8ff">是否破位？</text>
  <text x="400" y="185" text-anchor="middle" font-size="11" fill="#d4b8ff">成交量配合？</text>
  <text x="400" y="215" text-anchor="middle" font-size="10" fill="white">核心判断：</text>
  <text x="400" y="235" text-anchor="middle" font-size="10" fill="#ede0ff">价格&gt;MA60 → 偏多</text>
  <text x="400" y="255" text-anchor="middle" font-size="10" fill="#ede0ff">价格&lt;MA60 → 偏空</text>
  <text x="400" y="275" text-anchor="middle" font-size="10" fill="#ede0ff">放量下跌 → 警惕</text>
  <text x="400" y="295" text-anchor="middle" font-size="10" fill="#ede0ff">缩量调整 → 观察</text>

  <!-- 资金 -->
  <rect x="480" y="60" width="140" height="320" fill="#f72585" rx="10"/>
  <text x="550" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">④ 资金</text>
  <line x1="500" y1="98" x2="600" y2="98" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="550" y="120" text-anchor="middle" font-size="11" fill="white">钱在流进还是流出？</text>
  <text x="550" y="145" text-anchor="middle" font-size="11" fill="#ffd6e8">ETF净申购</text>
  <text x="550" y="165" text-anchor="middle" font-size="11" fill="#ffd6e8">北向资金流向</text>
  <text x="550" y="185" text-anchor="middle" font-size="11" fill="#ffd6e8">机构持仓变化</text>
  <text x="550" y="215" text-anchor="middle" font-size="10" fill="white">核心信号：</text>
  <text x="550" y="235" text-anchor="middle" font-size="10" fill="#ffe0ee">连续净申购 → 共识增强</text>
  <text x="550" y="255" text-anchor="middle" font-size="10" fill="#ffe0ee">持续赎回 → 注意</text>
  <text x="550" y="275" text-anchor="middle" font-size="10" fill="#ffe0ee">北向连续流入 → 积极</text>
  <text x="550" y="295" text-anchor="middle" font-size="10" fill="#ffe0ee">折溢价变化 → 关注</text>

  <!-- 仓位 -->
  <rect x="630" y="60" width="140" height="320" fill="#06d6a0" rx="10"/>
  <text x="700" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">⑤ 仓位</text>
  <line x1="650" y1="98" x2="750" y2="98" stroke="#1a1a2e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="700" y="120" text-anchor="middle" font-size="11" fill="#1a1a2e">我拿了多少？合理吗？</text>
  <text x="700" y="145" text-anchor="middle" font-size="11" fill="#004d3a">当前占比%</text>
  <text x="700" y="165" text-anchor="middle" font-size="11" fill="#004d3a">目标上限</text>
  <text x="700" y="185" text-anchor="middle" font-size="11" fill="#004d3a">浮盈/浮亏</text>
  <text x="700" y="215" text-anchor="middle" font-size="10" fill="#1a1a2e">操作触发：</text>
  <text x="700" y="235" text-anchor="middle" font-size="10" fill="#004d3a">偏离目标&gt;5% → 再平衡</text>
  <text x="700" y="255" text-anchor="middle" font-size="10" fill="#004d3a">浮亏&gt;止损线 → 执行</text>
  <text x="700" y="275" text-anchor="middle" font-size="10" fill="#004d3a">达到目标价 → 减仓</text>
  <text x="700" y="295" text-anchor="middle" font-size="10" fill="#004d3a">逻辑破坏 → 清仓</text>

  <!-- 底部说明 -->
  <rect x="30" y="395" width="740" height="18" fill="none"/>
  <text x="400" y="408" text-anchor="middle" font-size="11" fill="#666">每周至少检查一次 · 每月出一张完整复盘表 · 有信号才动，没信号就等</text>
</svg>
