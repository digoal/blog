<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="320" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">估值百分位示意：以沪深300 PE为例（2015-2024）</text>

  <!-- 坐标系 -->
  <line x1="60" y1="250" x2="760" y2="250" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="60" y1="60" x2="60" y2="250" stroke="#adb5bd" stroke-width="1.5"/>

  <!-- Y轴标签 -->
  <text x="50" y="65" text-anchor="end" font-size="10" fill="#666">70x</text>
  <text x="50" y="105" text-anchor="end" font-size="10" fill="#666">50x</text>
  <text x="50" y="148" text-anchor="end" font-size="10" fill="#666">35x</text>
  <text x="50" y="185" text-anchor="end" font-size="10" fill="#666">20x</text>
  <text x="50" y="230" text-anchor="end" font-size="10" fill="#666">10x</text>

  <!-- 参考线 - 历史高估线 -->
  <line x1="60" y1="90" x2="760" y2="90" stroke="#f72585" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="765" y="94" font-size="10" fill="#f72585">高估（90%）</text>

  <!-- 参考线 - 历史低估线 -->
  <line x1="60" y1="210" x2="760" y2="210" stroke="#06d6a0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="765" y="214" font-size="10" fill="#06d6a0">低估（10%）</text>

  <!-- 历史PE曲线 (近似模拟值，仅用于示意) -->
  <polyline points="60,240 110,215 160,170 210,125 250,95 290,120 330,155 370,170 410,190 450,185 490,165 530,175 560,160 590,155 630,170 670,165 710,155 750,148"
    fill="none" stroke="#4361ee" stroke-width="2.5"/>

  <!-- 阶段注释 -->
  <!-- 低估区域 -->
  <rect x="65" y="218" width="75" height="30" fill="#d1fae5" rx="4"/>
  <text x="102" y="233" text-anchor="middle" font-size="9" fill="#065f46" font-weight="bold">2016底部</text>
  <text x="102" y="244" text-anchor="middle" font-size="9" fill="#065f46">买入机会</text>

  <!-- 高估区域 -->
  <rect x="230" y="65" width="75" height="30" fill="#ffe4e6" rx="4"/>
  <text x="267" y="80" text-anchor="middle" font-size="9" fill="#9f1239" font-weight="bold">2015牛市顶</text>
  <text x="267" y="91" text-anchor="middle" font-size="9" fill="#9f1239">极度高估</text>

  <!-- 当前位置示意 -->
  <circle cx="750" cy="148" r="7" fill="#f72585" stroke="white" stroke-width="2"/>
  <text x="750" y="138" text-anchor="middle" font-size="10" fill="#f72585" font-weight="bold">当前</text>

  <!-- 区域填充 -->
  <rect x="60" y="90" width="700" height="120" fill="#fffbeb" fill-opacity="0.4"/>
  <text x="400" y="155" text-anchor="middle" font-size="11" fill="#92400e" font-style="italic">中性区间（10%~90%百分位）：持有观察</text>

  <!-- X轴年份 -->
  <text x="80" y="265" text-anchor="middle" font-size="10" fill="#666">2015</text>
  <text x="220" y="265" text-anchor="middle" font-size="10" fill="#666">2017</text>
  <text x="360" y="265" text-anchor="middle" font-size="10" fill="#666">2019</text>
  <text x="500" y="265" text-anchor="middle" font-size="10" fill="#666">2021</text>
  <text x="640" y="265" text-anchor="middle" font-size="10" fill="#666">2023</text>
  <text x="750" y="265" text-anchor="middle" font-size="10" fill="#666">2025</text>

  <!-- 底部说明 -->
  <text x="400" y="300" text-anchor="middle" font-size="10" fill="#888">注：图示为示意性历史区间，实际数据请参考中证指数、国证数据、Wind等专业平台。历史数据不代表未来走势。</text>
</svg>
