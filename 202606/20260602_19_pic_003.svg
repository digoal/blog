<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">ETF复盘后的行动决策树</text>

  <!-- 起点 -->
  <rect x="310" y="55" width="180" height="44" fill="#4361ee" rx="8"/>
  <text x="400" y="73" text-anchor="middle" font-size="13" fill="white" font-weight="bold">完成本周复盘</text>
  <text x="400" y="91" text-anchor="middle" font-size="11" fill="#c0ccff">五维度全部评估完成</text>

  <!-- 箭头 -->
  <line x1="400" y1="99" x2="400" y2="125" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- 问题1 -->
  <rect x="260" y="125" width="280" height="40" fill="#e9ecef" rx="8" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="143" text-anchor="middle" font-size="12" fill="#333">估值是否在合理或低估区间？</text>
  <text x="400" y="159" text-anchor="middle" font-size="10" fill="#666">（PE/PB百分位 &lt; 50%）</text>

  <!-- 否 分支 -->
  <line x1="260" y1="145" x2="160" y2="145" stroke="#f72585" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f72585"/>
    </marker>
  </defs>
  <text x="210" y="138" text-anchor="middle" font-size="10" fill="#f72585">否（高估）</text>
  <rect x="50" y="160" width="130" height="50" fill="#fff0f3" rx="8" stroke="#f72585" stroke-width="1.5"/>
  <text x="115" y="180" text-anchor="middle" font-size="11" fill="#c9184a" font-weight="bold">不买 / 减仓</text>
  <text x="115" y="198" text-anchor="middle" font-size="10" fill="#c9184a">记录警戒价格</text>

  <!-- 是 分支 -->
  <line x1="400" y1="165" x2="400" y2="200" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#06d6a0"/>
    </marker>
  </defs>
  <text x="415" y="186" text-anchor="start" font-size="10" fill="#06d6a0">是</text>

  <!-- 问题2 -->
  <rect x="260" y="200" width="280" height="40" fill="#e9ecef" rx="8" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="218" text-anchor="middle" font-size="12" fill="#333">趋势是否偏多？</text>
  <text x="400" y="234" text-anchor="middle" font-size="10" fill="#666">（价格 &gt; MA60，不破位）</text>

  <!-- 趋势否 -->
  <line x1="260" y1="220" x2="160" y2="260" stroke="#f72585" stroke-width="1.5"/>
  <text x="180" y="248" text-anchor="middle" font-size="10" fill="#f72585">否</text>
  <rect x="50" y="255" width="130" height="50" fill="#fff8e1" rx="8" stroke="#ffc300" stroke-width="1.5"/>
  <text x="115" y="275" text-anchor="middle" font-size="11" fill="#856404" font-weight="bold">定投观望</text>
  <text x="115" y="293" text-anchor="middle" font-size="10" fill="#856404">等趋势企稳再加</text>

  <!-- 趋势是 -->
  <line x1="400" y1="240" x2="400" y2="275" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#06d6a0"/>
    </marker>
  </defs>
  <text x="415" y="260" text-anchor="start" font-size="10" fill="#06d6a0">是</text>

  <!-- 问题3 -->
  <rect x="260" y="275" width="280" height="40" fill="#e9ecef" rx="8" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="293" text-anchor="middle" font-size="12" fill="#333">仓位是否在目标范围内？</text>
  <text x="400" y="309" text-anchor="middle" font-size="10" fill="#666">（未超上限，未严重偏离）</text>

  <!-- 仓位否 -->
  <line x1="540" y1="295" x2="640" y2="295" stroke="#f72585" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <defs>
    <marker id="arrow5" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f72585"/>
    </marker>
  </defs>
  <text x="590" y="288" text-anchor="middle" font-size="10" fill="#f72585">超上限</text>
  <rect x="640" y="270" width="120" height="50" fill="#fff0f3" rx="8" stroke="#f72585" stroke-width="1.5"/>
  <text x="700" y="292" text-anchor="middle" font-size="11" fill="#c9184a" font-weight="bold">再平衡减仓</text>
  <text x="700" y="308" text-anchor="middle" font-size="10" fill="#c9184a">恢复至目标仓位</text>

  <!-- 仓位是 -->
  <line x1="400" y1="315" x2="400" y2="345" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <defs>
    <marker id="arrow6" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#06d6a0"/>
    </marker>
  </defs>
  <text x="415" y="333" text-anchor="start" font-size="10" fill="#06d6a0">是</text>

  <!-- 最终结论 -->
  <rect x="270" y="345" width="260" height="28" fill="#4361ee" rx="8"/>
  <text x="400" y="364" text-anchor="middle" font-size="13" fill="white" font-weight="bold">持仓不动 / 按计划小额加仓</text>
</svg>
