<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">个股 vs ETF：你在面对什么量级的对手</text>

  <!-- ETF 区块 -->
  <rect x="40" y="60" width="320" height="320" rx="10" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="200" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">ETF（指数基金）</text>

  <rect x="60" y="108" width="280" height="44" rx="6" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
  <text x="200" y="127" text-anchor="middle" font-size="12" fill="#1b5e20">对手：整个市场平均表现</text>
  <text x="200" y="143" text-anchor="middle" font-size="11" fill="#388e3c">只要大盘涨，你就涨</text>

  <rect x="60" y="162" width="280" height="44" rx="6" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
  <text x="200" y="181" text-anchor="middle" font-size="12" fill="#1b5e20">分散：持有300~500只股票</text>
  <text x="200" y="197" text-anchor="middle" font-size="11" fill="#388e3c">一只暴雷，影响极小</text>

  <rect x="60" y="216" width="280" height="44" rx="6" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
  <text x="200" y="235" text-anchor="middle" font-size="12" fill="#1b5e20">信息壁垒：几乎没有</text>
  <text x="200" y="251" text-anchor="middle" font-size="11" fill="#388e3c">指数规则公开透明</text>

  <rect x="60" y="270" width="280" height="44" rx="6" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
  <text x="200" y="289" text-anchor="middle" font-size="12" fill="#1b5e20">管理成本：极低</text>
  <text x="200" y="305" text-anchor="middle" font-size="11" fill="#388e3c">年费0.1%~0.5%，被动跟踪</text>

  <rect x="60" y="324" width="280" height="44" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="200" y="343" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">难度系数</text>
  <text x="200" y="360" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e7d32">★★☆☆☆</text>

  <!-- 个股区块 -->
  <rect x="440" y="60" width="320" height="320" rx="10" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="600" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">A股个股</text>

  <rect x="460" y="108" width="280" height="44" rx="6" fill="#ffffff" stroke="#ef9a9a" stroke-width="1"/>
  <text x="600" y="127" text-anchor="middle" font-size="12" fill="#b71c1c">对手：5000+只股票同台竞技</text>
  <text x="600" y="143" text-anchor="middle" font-size="11" fill="#c62828">选错一只，输掉整体收益</text>

  <rect x="460" y="162" width="280" height="44" rx="6" fill="#ffffff" stroke="#ef9a9a" stroke-width="1"/>
  <text x="600" y="181" text-anchor="middle" font-size="12" fill="#b71c1c">集中：单票仓位可能很高</text>
  <text x="600" y="197" text-anchor="middle" font-size="11" fill="#c62828">一只暴雷，直接影响全局</text>

  <rect x="460" y="216" width="280" height="44" rx="6" fill="#ffffff" stroke="#ef9a9a" stroke-width="1"/>
  <text x="600" y="235" text-anchor="middle" font-size="12" fill="#b71c1c">信息壁垒：极高</text>
  <text x="600" y="251" text-anchor="middle" font-size="11" fill="#c62828">机构掌握更多内部数据</text>

  <rect x="460" y="270" width="280" height="44" rx="6" fill="#ffffff" stroke="#ef9a9a" stroke-width="1"/>
  <text x="600" y="289" text-anchor="middle" font-size="12" fill="#b71c1c">研究成本：极高</text>
  <text x="600" y="305" text-anchor="middle" font-size="11" fill="#c62828">需持续跟踪财报、行业、管理层</text>

  <rect x="460" y="324" width="280" height="44" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="600" y="343" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">难度系数</text>
  <text x="600" y="360" text-anchor="middle" font-size="20" font-weight="bold" fill="#c62828">★★★★☆</text>

  <!-- 中间箭头 -->
  <text x="400" y="215" text-anchor="middle" font-size="28" fill="#78909c">⟷</text>
  <text x="400" y="240" text-anchor="middle" font-size="11" fill="#546e7a">差距</text>
</svg>
