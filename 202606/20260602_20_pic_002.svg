<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">个股难在哪里：五大障碍拆解</text>

  <!-- 障碍1 -->
  <rect x="30" y="58" width="220" height="120" rx="10" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="140" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">① 信息不对称</text>
  <text x="140" y="103" text-anchor="middle" font-size="11" fill="#bf360c">机构有分析师团队</text>
  <text x="140" y="119" text-anchor="middle" font-size="11" fill="#bf360c">散户只有公告和新闻</text>
  <text x="140" y="135" text-anchor="middle" font-size="11" fill="#bf360c">你看到消息时</text>
  <text x="140" y="151" text-anchor="middle" font-size="11" fill="#bf360c">往往已经反映在股价里</text>
  <text x="140" y="168" text-anchor="middle" font-size="20" fill="#fb8c00">🔍</text>

  <!-- 障碍2 -->
  <rect x="290" y="58" width="220" height="120" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
  <text x="400" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">② 基本面研究量大</text>
  <text x="400" y="103" text-anchor="middle" font-size="11" fill="#4a148c">每季财报</text>
  <text x="400" y="119" text-anchor="middle" font-size="11" fill="#4a148c">行业动态</text>
  <text x="400" y="135" text-anchor="middle" font-size="11" fill="#4a148c">竞争对手</text>
  <text x="400" y="151" text-anchor="middle" font-size="11" fill="#4a148c">管理层变化</text>
  <text x="400" y="168" text-anchor="middle" font-size="20" fill="#8e24aa">📊</text>

  <!-- 障碍3 -->
  <rect x="550" y="58" width="220" height="120" rx="10" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5"/>
  <text x="660" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">③ 估值判断难</text>
  <text x="660" y="103" text-anchor="middle" font-size="11" fill="#283593">PE多少算贵？</text>
  <text x="660" y="119" text-anchor="middle" font-size="11" fill="#283593">行业不同，标准不同</text>
  <text x="660" y="135" text-anchor="middle" font-size="11" fill="#283593">成长期估值逻辑</text>
  <text x="660" y="151" text-anchor="middle" font-size="11" fill="#283593">跟价值期完全不同</text>
  <text x="660" y="168" text-anchor="middle" font-size="20" fill="#3949ab">⚖️</text>

  <!-- 障碍4 -->
  <rect x="160" y="210" width="220" height="120" rx="10" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5"/>
  <text x="270" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#004d40">④ 情绪放大效应</text>
  <text x="270" y="255" text-anchor="middle" font-size="11" fill="#00695c">持有单只股票时</text>
  <text x="270" y="271" text-anchor="middle" font-size="11" fill="#00695c">每天波动都与你有关</text>
  <text x="270" y="287" text-anchor="middle" font-size="11" fill="#00695c">容易追涨杀跌</text>
  <text x="270" y="303" text-anchor="middle" font-size="11" fill="#00695c">情绪干扰理性判断</text>
  <text x="270" y="320" text-anchor="middle" font-size="20" fill="#00897b">😰</text>

  <!-- 障碍5 -->
  <rect x="420" y="210" width="220" height="120" rx="10" fill="#fbe9e7" stroke="#f4511e" stroke-width="1.5"/>
  <text x="530" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">⑤ 极端风险无法分散</text>
  <text x="530" y="255" text-anchor="middle" font-size="11" fill="#d84315">财务造假</text>
  <text x="530" y="271" text-anchor="middle" font-size="11" fill="#d84315">行业政策突变</text>
  <text x="530" y="287" text-anchor="middle" font-size="11" fill="#d84315">竞争对手颠覆</text>
  <text x="530" y="303" text-anchor="middle" font-size="11" fill="#d84315">ETF里这些被平均掉</text>
  <text x="530" y="320" text-anchor="middle" font-size="20" fill="#f4511e">💥</text>

  <!-- 底部结论 -->
  <rect x="60" y="360" width="680" height="70" rx="10" fill="#263238" />
  <text x="400" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">核心结论</text>
  <text x="400" y="415" text-anchor="middle" font-size="12" fill="#b0bec5">个股难不是因为规则复杂，而是因为你要在信息不对称的游戏里</text>
  <text x="400" y="432" text-anchor="middle" font-size="12" fill="#b0bec5">持续做出比市场平均水平更好的判断——这本来就是小概率事件</text>
</svg>
