<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">什么时候才适合参与个股：四维评估框架</text>

  <!-- 四象限 -->
  <!-- 轴 -->
  <line x1="400" y1="65" x2="400" y2="345" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="80" y1="205" x2="720" y2="205" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- X轴标签 -->
  <text x="200" y="360" text-anchor="middle" font-size="12" fill="#546e7a">研究时间：少</text>
  <text x="600" y="360" text-anchor="middle" font-size="12" fill="#546e7a">研究时间：充足</text>
  <!-- Y轴标签 -->
  <text x="30" y="145" text-anchor="middle" font-size="12" fill="#546e7a" transform="rotate(-90,30,145)">风险承受：低</text>
  <text x="30" y="280" text-anchor="middle" font-size="12" fill="#546e7a" transform="rotate(-90,30,280)">风险承受：高</text>

  <!-- 象限1：左上 研究少+风险低 -->
  <rect x="85" y="70" width="305" height="128" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="237" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">✅ 坚守ETF</text>
  <text x="237" y="120" text-anchor="middle" font-size="11" fill="#388e3c">研究时间不足 + 承受不了大亏</text>
  <text x="237" y="138" text-anchor="middle" font-size="11" fill="#388e3c">→ 宽基ETF定投是最优解</text>
  <text x="237" y="156" text-anchor="middle" font-size="11" fill="#388e3c">不必觉得遗憾，80%职业基金</text>
  <text x="237" y="172" text-anchor="middle" font-size="11" fill="#388e3c">经理长期都跑不赢沪深300</text>
  <text x="237" y="190" text-anchor="middle" font-size="20">🌿</text>

  <!-- 象限2：右上 研究充足+风险低 -->
  <rect x="410" y="70" width="305" height="128" rx="8" fill="#fff8e1" stroke="#ffa726" stroke-width="1.5"/>
  <text x="562" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">⚠️ 小仓位试水</text>
  <text x="562" y="120" text-anchor="middle" font-size="11" fill="#bf360c">研究时间充足 + 风险承受偏低</text>
  <text x="562" y="138" text-anchor="middle" font-size="11" fill="#bf360c">→ 可以用组合5%~10%试验</text>
  <text x="562" y="156" text-anchor="middle" font-size="11" fill="#bf360c">主仓位仍以ETF为核心</text>
  <text x="562" y="172" text-anchor="middle" font-size="11" fill="#bf360c">亏了不心疼，学到经验值</text>
  <text x="562" y="190" text-anchor="middle" font-size="20">🧪</text>

  <!-- 象限3：左下 研究少+风险高 -->
  <rect x="85" y="213" width="305" height="125" rx="8" fill="#ffebee" stroke="#ef5350" stroke-width="1.5"/>
  <text x="237" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">❌ 最危险组合</text>
  <text x="237" y="263" text-anchor="middle" font-size="11" fill="#c62828">不研究 + 大仓位重压</text>
  <text x="237" y="281" text-anchor="middle" font-size="11" fill="#c62828">→ 纯粹赌博，输了怪运气</text>
  <text x="237" y="299" text-anchor="middle" font-size="11" fill="#c62828">本书不教这种操作</text>
  <text x="237" y="315" text-anchor="middle" font-size="11" fill="#c62828">亏损不可承受</text>
  <text x="237" y="332" text-anchor="middle" font-size="20">☠️</text>

  <!-- 象限4：右下 研究充足+风险高 -->
  <rect x="410" y="213" width="305" height="125" rx="8" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5"/>
  <text x="562" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">🎯 可以认真做个股</text>
  <text x="562" y="263" text-anchor="middle" font-size="11" fill="#1565c0">研究充足 + 能承受大回撤</text>
  <text x="562" y="281" text-anchor="middle" font-size="11" fill="#1565c0">→ 按本章框架系统操盘</text>
  <text x="562" y="299" text-anchor="middle" font-size="11" fill="#1565c0">单票仓位依然要有上限</text>
  <text x="562" y="315" text-anchor="middle" font-size="11" fill="#1565c0">记住：自信不等于正确</text>
  <text x="562" y="332" text-anchor="middle" font-size="20">🚀</text>
</svg>
