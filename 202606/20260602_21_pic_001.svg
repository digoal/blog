<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#F8F9FA" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">A股三类股票核心特征对比</text>

  <!-- Card: 成长股 -->
  <rect x="30" y="60" width="220" height="320" rx="10" fill="#EBF5FB" stroke="#2980B9" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="44" rx="10" fill="#2980B9"/>
  <rect x="30" y="90" width="220" height="14" fill="#2980B9"/>
  <text x="140" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🚀 成长股</text>
  <text x="140" y="122" text-anchor="middle" font-size="12" fill="#1A5276">代表行业</text>
  <text x="140" y="142" text-anchor="middle" font-size="11" fill="#2C3E50">科技 / AI / 新能源 / 创新药</text>
  <line x1="50" y1="155" x2="230" y2="155" stroke="#AED6F1" stroke-width="1"/>
  <text x="140" y="175" text-anchor="middle" font-size="12" fill="#1A5276">核心驱动力</text>
  <text x="140" y="195" text-anchor="middle" font-size="11" fill="#2C3E50">收入/利润高速增长预期</text>
  <line x1="50" y1="208" x2="230" y2="208" stroke="#AED6F1" stroke-width="1"/>
  <text x="140" y="228" text-anchor="middle" font-size="12" fill="#1A5276">估值特点</text>
  <text x="140" y="248" text-anchor="middle" font-size="11" fill="#2C3E50">PE高（20-100倍+）</text>
  <text x="140" y="265" text-anchor="middle" font-size="11" fill="#2C3E50">容忍当下不盈利</text>
  <line x1="50" y1="278" x2="230" y2="278" stroke="#AED6F1" stroke-width="1"/>
  <text x="140" y="298" text-anchor="middle" font-size="12" fill="#1A5276">适合环境</text>
  <text x="140" y="318" text-anchor="middle" font-size="11" fill="#2C3E50">降息周期 / 宽松流动性</text>
  <text x="140" y="335" text-anchor="middle" font-size="11" fill="#2C3E50">产业政策催化期</text>
  <line x1="50" y1="348" x2="230" y2="348" stroke="#AED6F1" stroke-width="1"/>
  <text x="140" y="368" text-anchor="middle" font-size="11" fill="#E74C3C">⚡ 高弹性 · 高波动</text>

  <!-- Card: 价值股 -->
  <rect x="290" y="60" width="220" height="320" rx="10" fill="#EAFAF1" stroke="#27AE60" stroke-width="2"/>
  <rect x="290" y="60" width="220" height="44" rx="10" fill="#27AE60"/>
  <rect x="290" y="90" width="220" height="14" fill="#27AE60"/>
  <text x="400" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🏦 价值股</text>
  <text x="400" y="122" text-anchor="middle" font-size="12" fill="#1E8449">代表行业</text>
  <text x="400" y="142" text-anchor="middle" font-size="11" fill="#2C3E50">银行 / 保险 / 白酒 / 公用事业</text>
  <line x1="310" y1="155" x2="490" y2="155" stroke="#A9DFBF" stroke-width="1"/>
  <text x="400" y="175" text-anchor="middle" font-size="12" fill="#1E8449">核心驱动力</text>
  <text x="400" y="195" text-anchor="middle" font-size="11" fill="#2C3E50">稳定盈利 + 分红回报</text>
  <line x1="310" y1="208" x2="490" y2="208" stroke="#A9DFBF" stroke-width="1"/>
  <text x="400" y="228" text-anchor="middle" font-size="12" fill="#1E8449">估值特点</text>
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#2C3E50">PE低（6-15倍）</text>
  <text x="400" y="265" text-anchor="middle" font-size="11" fill="#2C3E50">高股息率（4%-8%+）</text>
  <line x1="310" y1="278" x2="490" y2="278" stroke="#A9DFBF" stroke-width="1"/>
  <text x="400" y="298" text-anchor="middle" font-size="12" fill="#1E8449">适合环境</text>
  <text x="400" y="318" text-anchor="middle" font-size="11" fill="#2C3E50">震荡市 / 熊市防御</text>
  <text x="400" y="335" text-anchor="middle" font-size="11" fill="#2C3E50">利率下行 / 避险情绪高</text>
  <line x1="310" y1="348" x2="490" y2="348" stroke="#A9DFBF" stroke-width="1"/>
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#E74C3C">🛡️ 低弹性 · 低波动</text>

  <!-- Card: 周期股 -->
  <rect x="550" y="60" width="220" height="320" rx="10" fill="#FEF9E7" stroke="#E67E22" stroke-width="2"/>
  <rect x="550" y="60" width="220" height="44" rx="10" fill="#E67E22"/>
  <rect x="550" y="90" width="220" height="14" fill="#E67E22"/>
  <text x="660" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🔄 周期股</text>
  <text x="660" y="122" text-anchor="middle" font-size="12" fill="#9A5C0A">代表行业</text>
  <text x="660" y="142" text-anchor="middle" font-size="11" fill="#2C3E50">煤炭 / 钢铁 / 化工 / 有色</text>
  <line x1="570" y1="155" x2="750" y2="155" stroke="#FAD7A0" stroke-width="1"/>
  <text x="660" y="175" text-anchor="middle" font-size="12" fill="#9A5C0A">核心驱动力</text>
  <text x="660" y="195" text-anchor="middle" font-size="11" fill="#2C3E50">大宗商品价格 + 经济周期</text>
  <line x1="570" y1="208" x2="750" y2="208" stroke="#FAD7A0" stroke-width="1"/>
  <text x="660" y="228" text-anchor="middle" font-size="12" fill="#9A5C0A">估值特点</text>
  <text x="660" y="248" text-anchor="middle" font-size="11" fill="#2C3E50">PE在景气顶部看起来高</text>
  <text x="660" y="265" text-anchor="middle" font-size="11" fill="#2C3E50">景气底部PE反而低</text>
  <line x1="570" y1="278" x2="750" y2="278" stroke="#FAD7A0" stroke-width="1"/>
  <text x="660" y="298" text-anchor="middle" font-size="12" fill="#9A5C0A">适合环境</text>
  <text x="660" y="318" text-anchor="middle" font-size="11" fill="#2C3E50">经济复苏 / 通胀上行</text>
  <text x="660" y="335" text-anchor="middle" font-size="11" fill="#2C3E50">大宗商品供给收缩期</text>
  <line x1="570" y1="348" x2="750" y2="348" stroke="#FAD7A0" stroke-width="1"/>
  <text x="660" y="368" text-anchor="middle" font-size="11" fill="#E74C3C">💥 强弹性 · 极高波动</text>
</svg>
