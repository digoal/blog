<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#F8F9FA" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A1A2E">周期股的"PE陷阱"：越便宜越危险</text>

  <!-- 左图：景气顶部 -->
  <rect x="40" y="55" width="330" height="250" rx="10" fill="white" stroke="#E74C3C" stroke-width="2"/>
  <rect x="40" y="55" width="330" height="36" rx="10" fill="#E74C3C"/>
  <rect x="40" y="77" width="330" height="14" fill="#E74C3C"/>
  <text x="205" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌ 陷阱：景气顶部 PE=8倍 看似"低估"</text>
  <text x="205" y="115" text-anchor="middle" font-size="12" fill="#2C3E50">某钢铁股：股价 20元</text>
  <text x="205" y="138" text-anchor="middle" font-size="12" fill="#2C3E50">当年利润 2.5元/股 → PE = 8倍</text>
  <text x="205" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#E74C3C">散户："这么便宜！买！"</text>
  <line x1="60" y1="180" x2="350" y2="180" stroke="#FADBD8" stroke-width="1"/>
  <text x="205" y="202" text-anchor="middle" font-size="12" fill="#2C3E50">但钢价已在历史高位，需求开始萎缩</text>
  <text x="205" y="222" text-anchor="middle" font-size="12" fill="#2C3E50">明年利润 → 0.5元/股（暴跌80%）</text>
  <text x="205" y="248" text-anchor="middle" font-size="12" fill="#2C3E50">真实PE（用明年利润算）= 40倍</text>
  <text x="205" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#E74C3C">结果：股价跌去 60%+</text>

  <!-- 右图：景气底部 -->
  <rect x="430" y="55" width="330" height="250" rx="10" fill="white" stroke="#27AE60" stroke-width="2"/>
  <rect x="430" y="55" width="330" height="36" rx="10" fill="#27AE60"/>
  <rect x="430" y="77" width="330" height="14" fill="#27AE60"/>
  <text x="595" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅ 机会：景气底部 PE=50倍 看似"贵"</text>
  <text x="595" y="115" text-anchor="middle" font-size="12" fill="#2C3E50">同一钢铁股：股价 10元（已腰斩）</text>
  <text x="595" y="138" text-anchor="middle" font-size="12" fill="#2C3E50">当年利润 0.2元/股 → PE = 50倍</text>
  <text x="595" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#27AE60">散户："这么贵？不敢买！"</text>
  <line x1="450" y1="180" x2="740" y2="180" stroke="#A9DFBF" stroke-width="1"/>
  <text x="595" y="202" text-anchor="middle" font-size="12" fill="#2C3E50">但钢价在历史低位，产能出清进行中</text>
  <text x="595" y="222" text-anchor="middle" font-size="12" fill="#2C3E50">明年利润 → 1.5元/股（大幅回升）</text>
  <text x="595" y="248" text-anchor="middle" font-size="12" fill="#2C3E50">真实PE（用明年利润算）= 6.7倍</text>
  <text x="595" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#27AE60">结果：股价涨 2-3倍</text>

  <!-- 底部结论 -->
  <text x="400" y="318" text-anchor="middle" font-size="12" fill="#7F8C8D">周期股不能用当期PE判断，要看商品价格周期位置 + 行业产能利用率</text>
</svg>
