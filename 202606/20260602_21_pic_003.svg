<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#F8F9FA" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A1A2E">三类股票与经济周期的对应关系</text>

  <!-- 经济周期弧线 -->
  <!-- X轴 -->
  <line x1="60" y1="280" x2="750" y2="280" stroke="#BDC3C7" stroke-width="1.5"/>
  <!-- 曲线 path -->
  <path d="M80,280 Q200,60 360,280 Q520,60 680,280" fill="none" stroke="#3498DB" stroke-width="3" stroke-dasharray="0"/>
  
  <!-- 区间标注 -->
  <!-- 复苏期 -->
  <rect x="70" y="290" width="130" height="26" rx="5" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5"/>
  <text x="135" y="308" text-anchor="middle" font-size="12" fill="#1E8449">📈 复苏期</text>
  <!-- 繁荣期 -->
  <rect x="210" y="290" width="130" height="26" rx="5" fill="#EBF5FB" stroke="#2980B9" stroke-width="1.5"/>
  <text x="275" y="308" text-anchor="middle" font-size="12" fill="#1A5276">🚀 繁荣期</text>
  <!-- 滞涨期 -->
  <rect x="350" y="290" width="130" height="26" rx="5" fill="#FEF9E7" stroke="#E67E22" stroke-width="1.5"/>
  <text x="415" y="308" text-anchor="middle" font-size="12" fill="#9A5C0A">⚠️ 滞涨/转折</text>
  <!-- 衰退期 -->
  <rect x="490" y="290" width="130" height="26" rx="5" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="555" y="308" text-anchor="middle" font-size="12" fill="#922B21">📉 衰退期</text>
  <!-- 底部 -->
  <rect x="630" y="290" width="110" height="26" rx="5" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="685" y="308" text-anchor="middle" font-size="12" fill="#6C3483">🔄 底部蓄力</text>

  <!-- 标注气泡 - 周期股好时期（复苏） -->
  <ellipse cx="155" cy="200" rx="58" ry="22" fill="#FEF9E7" stroke="#E67E22" stroke-width="2"/>
  <text x="155" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#E67E22">🔄周期股</text>
  <text x="155" y="212" text-anchor="middle" font-size="10" fill="#935116">先启动</text>
  <line x1="155" y1="222" x2="155" y2="255" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 成长股繁荣 -->
  <ellipse cx="280" cy="130" rx="58" ry="22" fill="#EBF5FB" stroke="#2980B9" stroke-width="2"/>
  <text x="280" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980B9">🚀成长股</text>
  <text x="280" y="142" text-anchor="middle" font-size="10" fill="#1A5276">最受益</text>
  <line x1="280" y1="152" x2="280" y2="175" stroke="#2980B9" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 价值股防守 -->
  <ellipse cx="555" cy="190" rx="58" ry="22" fill="#EAFAF1" stroke="#27AE60" stroke-width="2"/>
  <text x="555" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">🏦价值股</text>
  <text x="555" y="202" text-anchor="middle" font-size="10" fill="#1E8449">防守主角</text>
  <line x1="555" y1="212" x2="555" y2="255" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 底部注释 -->
  <text x="400" y="350" text-anchor="middle" font-size="11" fill="#7F8C8D">注：三类股票无法精确预判经济拐点，以上为历史规律参考，不代表每次完全一致</text>
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#7F8C8D">数据来源：Wind A股风格轮动研究（2003年至今）</text>
</svg>
