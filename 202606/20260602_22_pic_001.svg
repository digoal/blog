<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">基本面四层筛选框架</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#666">从外到内，逐层淘汰——只有四层都通过，才值得深入研究</text>

  <!-- 第一层：行业空间 -->
  <rect x="60" y="80" width="680" height="68" rx="8" fill="#4361ee" opacity="0.9"/>
  <text x="190" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="white">第一层：行业空间</text>
  <text x="190" y="128" text-anchor="middle" font-size="12" fill="#dde" >这个行业的蛋糕还能长大吗？</text>
  <text x="500" y="108" text-anchor="middle" font-size="12" fill="white">✓ 市场规模 ✓ 成长速度 ✓ 天花板距离</text>
  <text x="500" y="128" text-anchor="middle" font-size="12" fill="#dde">淘汰：夕阳行业 / 增量空间不足</text>

  <!-- 第二层：商业模式 -->
  <rect x="100" y="162" width="600" height="68" rx="8" fill="#3a86ff" opacity="0.9"/>
  <text x="230" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="white">第二层：商业模式</text>
  <text x="230" y="210" text-anchor="middle" font-size="12" fill="#dde">它用什么方式赚钱？可持续吗？</text>
  <text x="530" y="190" text-anchor="middle" font-size="12" fill="white">✓ 收入来源 ✓ 定价权 ✓ 客户粘性</text>
  <text x="530" y="210" text-anchor="middle" font-size="12" fill="#dde">淘汰：靠补贴 / 价格战模式 / 一次性交易</text>

  <!-- 第三层：竞争优势 -->
  <rect x="140" y="244" width="520" height="68" rx="8" fill="#06aed5" opacity="0.9"/>
  <text x="270" y="272" text-anchor="middle" font-size="14" font-weight="bold" fill="white">第三层：竞争优势</text>
  <text x="270" y="292" text-anchor="middle" font-size="12" fill="#dde">为什么是它，不是别人？</text>
  <text x="540" y="272" text-anchor="middle" font-size="12" fill="white">✓ 护城河类型 ✓ 宽度 ✓ 持久性</text>
  <text x="540" y="292" text-anchor="middle" font-size="12" fill="#dde">淘汰：同质化严重 / 技术壁垒弱</text>

  <!-- 第四层：财务质量 -->
  <rect x="180" y="326" width="440" height="68" rx="8" fill="#2ec4b6" opacity="0.9"/>
  <text x="310" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="white">第四层：财务质量</text>
  <text x="310" y="374" text-anchor="middle" font-size="12" fill="#dde">数字有没有在说谎？</text>
  <text x="555" y="354" text-anchor="middle" font-size="12" fill="white">✓ 利润含金量 ✓ 负债率 ✓ 现金流</text>
  <text x="555" y="374" text-anchor="middle" font-size="12" fill="#dde">淘汰：高应收 / 负现金流 / 财务异常</text>
</svg>
