<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">商业模式质量矩阵</text>

  <!-- 坐标轴 -->
  <line x1="120" y1="340" x2="720" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="340" x2="120" y2="60" stroke="#333" stroke-width="2"/>
  <!-- 箭头 -->
  <polygon points="720,335 730,340 720,345" fill="#333"/>
  <polygon points="115,60 120,50 125,60" fill="#333"/>

  <!-- 轴标签 -->
  <text x="730" y="345" font-size="12" fill="#333">客户粘性 →</text>
  <text x="30" y="200" font-size="12" fill="#333" transform="rotate(-90,50,200)">定价权 →</text>

  <!-- 四象限背景 -->
  <rect x="120" y="200" width="300" height="140" fill="#ffebee" opacity="0.5"/>
  <rect x="420" y="200" width="300" height="140" fill="#fff3e0" opacity="0.5"/>
  <rect x="120" y="60" width="300" height="140" fill="#e8f5e9" opacity="0.5"/>
  <rect x="420" y="60" width="300" height="140" fill="#e3f2fd" opacity="0.5"/>

  <!-- 象限标题 -->
  <text x="270" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">低粘性+低定价权</text>
  <text x="270" y="310" text-anchor="middle" font-size="11" fill="#c62828">→ 回避区（价格战红海）</text>
  <text x="270" y="325" text-anchor="middle" font-size="11" fill="#888">例：服装代工、普通餐饮</text>

  <text x="570" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">高粘性+低定价权</text>
  <text x="570" y="310" text-anchor="middle" font-size="11" fill="#e65100">→ 观察区（有规模优势可期）</text>
  <text x="570" y="325" text-anchor="middle" font-size="11" fill="#888">例：社交平台早期、外卖</text>

  <text x="270" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">低粘性+高定价权</text>
  <text x="270" y="140" text-anchor="middle" font-size="11" fill="#2e7d32">→ 关注区（稀缺资源型）</text>
  <text x="270" y="155" text-anchor="middle" font-size="11" fill="#888">例：矿业、牌照资产</text>

  <text x="570" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">高粘性+高定价权</text>
  <text x="570" y="140" text-anchor="middle" font-size="11" fill="#1565c0">→ 理想区（最优商业模式）</text>
  <text x="570" y="155" text-anchor="middle" font-size="11" fill="#888">例：茅台、工业软件、医疗器械</text>

  <!-- 中轴线 -->
  <line x1="420" y1="60" x2="420" y2="340" stroke="#aaa" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="120" y1="200" x2="720" y2="200" stroke="#aaa" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- 底部提示 -->
  <text x="400" y="378" text-anchor="middle" font-size="12" fill="#555">散户选股：优先右上角，回避左下角，对左上角和右下角保持谨慎</text>
</svg>
