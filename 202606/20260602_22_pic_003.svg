<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">护城河的五种类型</text>

  <!-- 品牌 -->
  <rect x="30" y="60" width="138" height="140" rx="10" fill="#4361ee"/>
  <text x="99" y="95" text-anchor="middle" font-size="28">🏆</text>
  <text x="99" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">品牌壁垒</text>
  <text x="99" y="145" text-anchor="middle" font-size="11" fill="#dde">消费者愿意</text>
  <text x="99" y="162" text-anchor="middle" font-size="11" fill="#dde">为品牌溢价</text>
  <text x="99" y="185" text-anchor="middle" font-size="11" fill="#aef">茅台/爱马仕</text>

  <!-- 网络效应 -->
  <rect x="178" y="60" width="138" height="140" rx="10" fill="#3a86ff"/>
  <text x="247" y="95" text-anchor="middle" font-size="28">🌐</text>
  <text x="247" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">网络效应</text>
  <text x="247" y="145" text-anchor="middle" font-size="11" fill="#dde">用户越多</text>
  <text x="247" y="162" text-anchor="middle" font-size="11" fill="#dde">产品越有价值</text>
  <text x="247" y="185" text-anchor="middle" font-size="11" fill="#aef">微信/美团</text>

  <!-- 成本优势 -->
  <rect x="326" y="60" width="138" height="140" rx="10" fill="#06aed5"/>
  <text x="395" y="95" text-anchor="middle" font-size="28">⚙️</text>
  <text x="395" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">成本优势</text>
  <text x="395" y="145" text-anchor="middle" font-size="11" fill="#dde">同品质更便宜</text>
  <text x="395" y="162" text-anchor="middle" font-size="11" fill="#dde">或规模效应强</text>
  <text x="395" y="185" text-anchor="middle" font-size="11" fill="#aef">海天味业/福耀</text>

  <!-- 转换成本 -->
  <rect x="474" y="60" width="138" height="140" rx="10" fill="#2ec4b6"/>
  <text x="543" y="95" text-anchor="middle" font-size="28">🔗</text>
  <text x="543" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">转换成本</text>
  <text x="543" y="145" text-anchor="middle" font-size="11" fill="#dde">换掉它代价</text>
  <text x="543" y="162" text-anchor="middle" font-size="11" fill="#dde">太高或太麻烦</text>
  <text x="543" y="185" text-anchor="middle" font-size="11" fill="#aef">工业软件/ERP</text>

  <!-- 牌照资源 -->
  <rect x="622" y="60" width="138" height="140" rx="10" fill="#f77f00"/>
  <text x="691" y="95" text-anchor="middle" font-size="28">📜</text>
  <text x="691" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">牌照/资源</text>
  <text x="691" y="145" text-anchor="middle" font-size="11" fill="#dde">政策或稀缺</text>
  <text x="691" y="162" text-anchor="middle" font-size="11" fill="#dde">资源的独占</text>
  <text x="691" y="185" text-anchor="middle" font-size="11" fill="#aef">银行/机场/矿</text>

  <!-- 底部说明 -->
  <rect x="30" y="225" width="740" height="130" rx="10" fill="white" stroke="#e0e0e0"/>
  <text x="400" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">判断护城河的两个关键问题</text>
  <text x="50" y="278" font-size="12" fill="#555">❶  如果竞争对手砸三倍资金进来，这家公司的市场份额会怎样？——宽度测试</text>
  <text x="50" y="304" font-size="12" fill="#555">❷  5年后这家公司的护城河是更深还是更浅？——持久性测试</text>
  <text x="50" y="334" font-size="12" fill="#e74c3c">⚠️  警惕：技术优势≠护城河（技术可以被抄），低价格≠护城河（价格战会杀死自己）</text>
</svg>
