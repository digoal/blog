<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">财报三张表：一家公司的"体检报告"</text>
  
  <!-- 利润表 -->
  <rect x="40" y="60" width="210" height="320" fill="#fff" rx="10" stroke="#4a90d9" stroke-width="2"/>
  <rect x="40" y="60" width="210" height="44" fill="#4a90d9" rx="10"/>
  <rect x="40" y="90" width="210" height="14" fill="#4a90d9"/>
  <text x="145" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">利润表</text>
  <text x="145" y="108" text-anchor="middle" font-size="11" fill="#4a90d9">（赚了多少钱）</text>
  
  <text x="60" y="135" font-size="12" fill="#333">营业收入</text>
  <text x="230" y="135" text-anchor="end" font-size="12" fill="#333">10亿</text>
  <line x1="55" y1="142" x2="235" y2="142" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="60" y="162" font-size="12" fill="#e74c3c">- 营业成本</text>
  <text x="230" y="162" text-anchor="end" font-size="12" fill="#e74c3c">-7亿</text>
  <line x1="55" y1="169" x2="235" y2="169" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="60" y="190" font-size="12" fill="#27ae60" font-weight="bold">= 毛利润</text>
  <text x="230" y="190" text-anchor="end" font-size="12" fill="#27ae60" font-weight="bold">3亿</text>
  <line x1="55" y1="197" x2="235" y2="197" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="60" y="218" font-size="12" fill="#e74c3c">- 费用(销管研)</text>
  <text x="230" y="218" text-anchor="end" font-size="12" fill="#e74c3c">-1.5亿</text>
  <line x1="55" y1="225" x2="235" y2="225" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="60" y="246" font-size="12" fill="#27ae60" font-weight="bold">= 营业利润</text>
  <text x="230" y="246" text-anchor="end" font-size="12" fill="#27ae60" font-weight="bold">1.5亿</text>
  <line x1="55" y1="253" x2="235" y2="253" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="60" y="274" font-size="12" fill="#333">± 非经常项目</text>
  <text x="230" y="274" text-anchor="end" font-size="12" fill="#333">-0.3亿</text>
  <line x1="55" y1="281" x2="235" y2="281" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="60" y="305" font-size="13" fill="#1a1a2e" font-weight="bold">= 净利润</text>
  <text x="230" y="305" text-anchor="end" font-size="13" fill="#1a1a2e" font-weight="bold">1.2亿</text>
  
  <rect x="50" y="316" width="180" height="48" fill="#fff3cd" rx="6"/>
  <text x="140" y="336" text-anchor="middle" font-size="11" fill="#856404">⚠️ 净利润≠真实收益</text>
  <text x="140" y="354" text-anchor="middle" font-size="11" fill="#856404">还要看现金流！</text>

  <!-- 现金流量表 -->
  <rect x="295" y="60" width="210" height="320" fill="#fff" rx="10" stroke="#27ae60" stroke-width="2"/>
  <rect x="295" y="60" width="210" height="44" fill="#27ae60" rx="10"/>
  <rect x="295" y="90" width="210" height="14" fill="#27ae60"/>
  <text x="400" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">现金流量表</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#27ae60">（真金白银进出）</text>
  
  <text x="310" y="138" font-size="12" fill="#333" font-weight="bold">经营现金流</text>
  <text x="490" y="138" text-anchor="end" font-size="12" fill="#27ae60" font-weight="bold">+1.8亿 ✓</text>
  <text x="310" y="158" font-size="11" fill="#666">↑ 主业真正收到的钱</text>
  <line x1="305" y1="167" x2="485" y2="167" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="310" y="188" font-size="12" fill="#333" font-weight="bold">投资现金流</text>
  <text x="490" y="188" text-anchor="end" font-size="12" fill="#e74c3c" font-weight="bold">-0.5亿</text>
  <text x="310" y="208" font-size="11" fill="#666">↑ 买设备/扩张投入</text>
  <line x1="305" y1="217" x2="485" y2="217" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="310" y="238" font-size="12" fill="#333" font-weight="bold">融资现金流</text>
  <text x="490" y="238" text-anchor="end" font-size="12" fill="#e74c3c" font-weight="bold">-0.3亿</text>
  <text x="310" y="258" font-size="11" fill="#666">↑ 还债/分红支出</text>
  <line x1="305" y1="267" x2="485" y2="267" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="310" y="295" font-size="13" fill="#1a1a2e" font-weight="bold">净现金流</text>
  <text x="490" y="295" text-anchor="end" font-size="13" fill="#27ae60" font-weight="bold">+1.0亿</text>

  <rect x="305" y="316" width="180" height="48" fill="#d4edda" rx="6"/>
  <text x="395" y="336" text-anchor="middle" font-size="11" fill="#155724">✅ 经营现金流>净利润</text>
  <text x="395" y="354" text-anchor="middle" font-size="11" fill="#155724">= 利润质量高信号</text>

  <!-- 资产负债表 -->
  <rect x="550" y="60" width="210" height="320" fill="#fff" rx="10" stroke="#9b59b6" stroke-width="2"/>
  <rect x="550" y="60" width="210" height="44" fill="#9b59b6" rx="10"/>
  <rect x="550" y="90" width="210" height="14" fill="#9b59b6"/>
  <text x="655" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">资产负债表</text>
  <text x="655" y="108" text-anchor="middle" font-size="11" fill="#9b59b6">（家底与债务）</text>
  
  <text x="570" y="135" font-size="12" fill="#333" font-weight="bold">资产端</text>
  <text x="570" y="158" font-size="11" fill="#555">货币资金: 2亿</text>
  <text x="570" y="178" font-size="11" fill="#555">应收账款: 1.5亿</text>
  <text x="570" y="198" font-size="11" fill="#555">存货: 0.8亿</text>
  <text x="570" y="218" font-size="11" fill="#555">固定资产: 5亿</text>
  <line x1="560" y1="228" x2="748" y2="228" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="570" y="248" font-size="12" fill="#1a1a2e" font-weight="bold">总资产: 9.3亿</text>
  
  <line x1="560" y1="258" x2="748" y2="258" stroke="#e0e0e0" stroke-width="1"/>
  <text x="570" y="276" font-size="12" fill="#333" font-weight="bold">负债端</text>
  <text x="570" y="296" font-size="11" fill="#e74c3c">短期借款: 1亿</text>
  <text x="570" y="316" font-size="11" fill="#555">长期负债: 2亿</text>
  
  <rect x="560" y="328" width="180" height="36" fill="#ede7f6" rx="6"/>
  <text x="650" y="348" text-anchor="middle" font-size="11" fill="#4a148c">资产负债率 = 负债/资产</text>
  <text x="650" y="363" text-anchor="middle" font-size="11" fill="#4a148c">= 32% (健康范围)</text>
  
  <!-- Arrow labels at bottom -->
  <text x="400" y="405" text-anchor="middle" font-size="12" fill="#666">三张表相互验证 → 利润表的净利润必须有现金流对应，否则是"纸上富贵"</text>
</svg>
