<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  
  <text x="400" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">利润≠现金：两家公司的对比故事</text>
  
  <!-- Company A - Good -->
  <rect x="40" y="55" width="340" height="280" fill="#fff" rx="10" stroke="#27ae60" stroke-width="2"/>
  <rect x="40" y="55" width="340" height="40" fill="#27ae60" rx="10"/>
  <rect x="40" y="82" width="340" height="13" fill="#27ae60"/>
  <text x="210" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">✅ A公司（利润质量高）</text>
  
  <text x="65" y="120" font-size="13" fill="#333">净利润: 1亿元</text>
  <text x="65" y="148" font-size="13" fill="#27ae60" font-weight="bold">经营现金流: +1.3亿元</text>
  <text x="65" y="173" font-size="11" fill="#555">→ 收现金流 > 净利润</text>
  <text x="65" y="193" font-size="11" fill="#555">→ 说明客户都及时付款了</text>
  <text x="65" y="213" font-size="11" fill="#555">→ 利润是"真金白银"落袋</text>
  
  <line x1="55" y1="225" x2="365" y2="225" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="65" y="248" font-size="12" fill="#333">应收账款增长: 几乎没有</text>
  <text x="65" y="270" font-size="12" fill="#27ae60">毛利率: 稳定 35%</text>
  <text x="65" y="292" font-size="12" fill="#27ae60">负债率: 25%（安全）</text>
  
  <rect x="55" y="305" width="310" height="22" fill="#d4edda" rx="5"/>
  <text x="210" y="320" text-anchor="middle" font-size="11" fill="#155724" font-weight="bold">结论：值得深入研究的候选股</text>

  <!-- Company B - Bad -->
  <rect x="420" y="55" width="340" height="280" fill="#fff" rx="10" stroke="#e74c3c" stroke-width="2"/>
  <rect x="420" y="55" width="340" height="40" fill="#e74c3c" rx="10"/>
  <rect x="420" y="82" width="340" height="13" fill="#e74c3c"/>
  <text x="590" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⚠️ B公司（利润质量差）</text>
  
  <text x="445" y="120" font-size="13" fill="#333">净利润: 1亿元</text>
  <text x="445" y="148" font-size="13" fill="#e74c3c" font-weight="bold">经营现金流: -0.2亿元</text>
  <text x="445" y="173" font-size="11" fill="#555">→ 账面赚钱，实际没收到钱</text>
  <text x="445" y="193" font-size="11" fill="#555">→ 客户欠了很多款没付</text>
  <text x="445" y="213" font-size="11" fill="#555">→ 应收账款暴增，风险积聚</text>
  
  <line x1="435" y1="225" x2="745" y2="225" stroke="#e0e0e0" stroke-width="1"/>
  
  <text x="445" y="248" font-size="12" fill="#e74c3c">应收账款增长: +80%</text>
  <text x="445" y="270" font-size="12" fill="#555">毛利率: 异常高 68%（需核查）</text>
  <text x="445" y="292" font-size="12" fill="#e74c3c">负债率: 70%（压力大）</text>
  
  <rect x="435" y="305" width="310" height="22" fill="#f8d7da" rx="5"/>
  <text x="590" y="320" text-anchor="middle" font-size="11" fill="#721c24" font-weight="bold">结论：排除，或至少等待下季验证</text>
</svg>
