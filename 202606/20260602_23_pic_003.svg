<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  
  <text x="400" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">散户5分钟财报速读框架</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#666">按顺序检查，任一步骤亮红灯就要谨慎</text>
  
  <!-- Step 1 -->
  <rect x="40" y="75" width="720" height="52" fill="#fff" rx="8" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="75" cy="101" r="18" fill="#4a90d9"/>
  <text x="75" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <text x="110" y="96" font-size="13" font-weight="bold" fill="#1a1a2e">看营收趋势（3年）</text>
  <text x="110" y="117" font-size="11" fill="#555">问自己：连续增长？增速在提升还是下滑？如果连续两年营收下降——大概率不看了</text>

  <!-- Arrow -->
  <text x="400" y="143" text-anchor="middle" font-size="16" fill="#aaa">↓</text>

  <!-- Step 2 -->
  <rect x="40" y="150" width="720" height="52" fill="#fff" rx="8" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="75" cy="176" r="18" fill="#27ae60"/>
  <text x="75" y="181" text-anchor="middle" font-size="14" font-weight="bold" fill="white">2</text>
  <text x="110" y="171" font-size="13" font-weight="bold" fill="#1a1a2e">看毛利率（是否稳定/提升）</text>
  <text x="110" y="192" font-size="11" fill="#555">毛利率突然下降&gt;5%：成本涨了 or 竞争加剧，需查原因。暴增也要查：有没有会计手段？</text>

  <!-- Arrow -->
  <text x="400" y="218" text-anchor="middle" font-size="16" fill="#aaa">↓</text>

  <!-- Step 3 -->
  <rect x="40" y="225" width="720" height="52" fill="#fff" rx="8" stroke="#f39c12" stroke-width="1.5"/>
  <circle cx="75" cy="251" r="18" fill="#f39c12"/>
  <text x="75" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3</text>
  <text x="110" y="246" font-size="13" font-weight="bold" fill="#1a1a2e">比较净利润 vs 经营现金流</text>
  <text x="110" y="267" font-size="11" fill="#555">经营现金流长期低于净利润50%以上？——红灯！利润可能是"纸面数字"，实际没收到钱</text>

  <!-- Arrow -->
  <text x="400" y="293" text-anchor="middle" font-size="16" fill="#aaa">↓</text>

  <!-- Step 4 -->
  <rect x="40" y="300" width="720" height="52" fill="#fff" rx="8" stroke="#9b59b6" stroke-width="1.5"/>
  <circle cx="75" cy="326" r="18" fill="#9b59b6"/>
  <text x="75" y="331" text-anchor="middle" font-size="14" font-weight="bold" fill="white">4</text>
  <text x="110" y="321" font-size="13" font-weight="bold" fill="#1a1a2e">看资产负债率 + 有息负债</text>
  <text x="110" y="342" font-size="11" fill="#555">资产负债率&gt;70%？短期有息负债 &gt; 货币资金？——财务风险高，牛市可能没事，熊市先暴雷</text>

  <!-- Final label -->
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#888">4步全部绿灯 → 才值得进入下一步研究（估值、竞争格局、管理层）</text>
</svg>
