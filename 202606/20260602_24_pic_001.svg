<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
  <!-- 背景 -->
  <rect width="900" height="620" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a">
    智能体时代的数据库:价值蛋糕在往上长
  </text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#666">
    三层价值递进 / 时间窗口不同 / 越往上,赔率越高、风险越大
  </text>

  <!-- 顶层:数据交易所 -->
  <g>
    <rect x="120" y="100" width="660" height="120" fill="#ff6b6b" rx="10"/>
    <text x="450" y="135" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      第三层 · 数据交易所 + 做市商
    </text>
    <text x="450" y="162" text-anchor="middle" font-size="13" fill="white" opacity="0.95">
      Agent 间的"数据微交易"撮合 / 抽佣模式 / 金融属性 / 毛利率最高
    </text>
    <text x="450" y="186" text-anchor="middle" font-size="11" fill="white" opacity="0.9" font-style="italic">
      关键产品: 数据交易所、数据做市商、链上数据信托
    </text>
    <text x="450" y="206" text-anchor="middle" font-size="11" fill="white" opacity="0.9" font-style="italic">
      时间窗口: 2028-2032 · 既有玩家: Datarade / 上海数交所 / Snowflake Marketplace
    </text>
  </g>

  <!-- 中层:语义 API + 治理 + 计费 -->
  <g>
    <rect x="120" y="240" width="660" height="120" fill="#ffa94d" rx="10"/>
    <text x="450" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      第二层 · 语义 API + 治理 + 计费
    </text>
    <text x="450" y="302" text-anchor="middle" font-size="13" fill="white" opacity="0.95">
      Database as MCP Server / Data as a Product for Agent
    </text>
    <text x="450" y="326" text-anchor="middle" font-size="11" fill="white" opacity="0.9" font-style="italic">
      关键产品: 向量 + 结构化统一查询、字段级血缘、Token 级计费
    </text>
    <text x="450" y="346" text-anchor="middle" font-size="11" fill="white" opacity="0.9" font-style="italic">
      时间窗口: 2026-2028 · 既有玩家: Snowflake Cortex / Databricks Unity / PolarDB / Supabase
    </text>
  </g>

  <!-- 底层:存储 + 计算 -->
  <g>
    <rect x="120" y="380" width="660" height="120" fill="#4dabf7" rx="10"/>
    <text x="450" y="415" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      第一层 · 存储 + 计算(传统 OLTP/OLAP)
    </text>
    <text x="450" y="442" text-anchor="middle" font-size="13" fill="white" opacity="0.95">
      QPS 极致优化 / 向量索引 / 边缘协同 / Lakehouse 统一
    </text>
    <text x="450" y="466" text-anchor="middle" font-size="11" fill="white" opacity="0.9" font-style="italic">
      关键能力: HTAP、列存、向量、Iceberg/Hudi/Lance、Serverless
    </text>
    <text x="450" y="486" text-anchor="middle" font-size="11" fill="white" opacity="0.9" font-style="italic">
      时间窗口: 现在-2027 · 既有玩家: PostgreSQL / DuckDB / ClickHouse / TiDB / OceanBase
    </text>
  </g>

  <!-- 箭头 -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L10,4 z" fill="#333"/>
    </marker>
  </defs>
  <line x1="450" y1="220" x2="450" y2="235" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="360" x2="450" y2="375" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 价值密度标注 -->
  <g>
    <text x="80" y="160" text-anchor="end" font-size="11" fill="#999">高赔率</text>
    <text x="80" y="178" text-anchor="end" font-size="11" fill="#999">高风险</text>
    <text x="80" y="196" text-anchor="end" font-size="11" fill="#999">长周期</text>

    <text x="80" y="300" text-anchor="end" font-size="11" fill="#999">中赔率</text>
    <text x="80" y="318" text-anchor="end" font-size="11" fill="#999">中风险</text>
    <text x="80" y="336" text-anchor="end" font-size="11" fill="#999">中周期</text>

    <text x="80" y="440" text-anchor="end" font-size="11" fill="#999">低赔率</text>
    <text x="80" y="458" text-anchor="end" font-size="11" fill="#999">低风险</text>
    <text x="80" y="476" text-anchor="end" font-size="11" fill="#999">短周期</text>
  </g>

  <!-- 右侧:智能体在三层的作用 -->
  <g>
    <rect x="120" y="525" width="660" height="55" fill="#f0f0f0" rx="6"/>
    <text x="450" y="548" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">
      智能体对三层的影响
    </text>
    <text x="450" y="568" text-anchor="middle" font-size="11" fill="#555">
      底层: 推高 QPS / 推动 HTAP / 推动 Lakehouse 落地
    </text>
  </g>

  <!-- 底注 -->
  <text x="450" y="605" text-anchor="middle" font-size="10" fill="#999" font-style="italic">
    价值密度: 上层 &gt; 中层 &gt; 底层    |    时间窗口: 上层 &gt; 中层 &gt; 底层    |    风险: 上层 &gt; 中层 &gt; 底层
  </text>
</svg>
