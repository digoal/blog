<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">四大估值指标：你到底在量什么？</text>

  <!-- PE Box -->
  <rect x="30" y="60" width="170" height="150" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="30" y="60" width="170" height="40" rx="10" fill="#4a90d9"/>
  <rect x="30" y="88" width="170" height="12" fill="#4a90d9"/>
  <text x="115" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">PE 市盈率</text>
  <text x="115" y="120" text-anchor="middle" font-size="12" fill="#333">股价 ÷ 每股盈利</text>
  <text x="115" y="142" text-anchor="middle" font-size="11" fill="#555">测的是：</text>
  <text x="115" y="162" text-anchor="middle" font-size="11" fill="#333">花多少钱买1元利润</text>
  <text x="115" y="185" text-anchor="middle" font-size="10" fill="#888">✔ 稳定盈利型企业</text>
  <text x="115" y="202" text-anchor="middle" font-size="10" fill="#e74c3c">✘ 亏损/强周期行业</text>

  <!-- PB Box -->
  <rect x="215" y="60" width="170" height="150" rx="10" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
  <rect x="215" y="60" width="170" height="40" rx="10" fill="#27ae60"/>
  <rect x="215" y="88" width="170" height="12" fill="#27ae60"/>
  <text x="300" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">PB 市净率</text>
  <text x="300" y="120" text-anchor="middle" font-size="12" fill="#333">股价 ÷ 每股净资产</text>
  <text x="300" y="142" text-anchor="middle" font-size="11" fill="#555">测的是：</text>
  <text x="300" y="162" text-anchor="middle" font-size="11" fill="#333">花多少钱买1元家底</text>
  <text x="300" y="185" text-anchor="middle" font-size="10" fill="#888">✔ 银行/保险/重资产</text>
  <text x="300" y="202" text-anchor="middle" font-size="10" fill="#e74c3c">✘ 轻资产科技公司</text>

  <!-- PS Box -->
  <rect x="400" y="60" width="170" height="150" rx="10" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <rect x="400" y="60" width="170" height="40" rx="10" fill="#e67e22"/>
  <rect x="400" y="88" width="170" height="12" fill="#e67e22"/>
  <text x="485" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">PS 市销率</text>
  <text x="485" y="120" text-anchor="middle" font-size="12" fill="#333">股价 ÷ 每股营收</text>
  <text x="485" y="142" text-anchor="middle" font-size="11" fill="#555">测的是：</text>
  <text x="485" y="162" text-anchor="middle" font-size="11" fill="#333">花多少钱买1元收入</text>
  <text x="485" y="185" text-anchor="middle" font-size="10" fill="#888">✔ 亏损/高增速科技股</text>
  <text x="485" y="202" text-anchor="middle" font-size="10" fill="#e74c3c">✘ 低利润率传统行业</text>

  <!-- 股息率 Box -->
  <rect x="585" y="60" width="185" height="150" rx="10" fill="#ffffff" stroke="#9b59b6" stroke-width="2"/>
  <rect x="585" y="60" width="185" height="40" rx="10" fill="#9b59b6"/>
  <rect x="585" y="88" width="185" height="12" fill="#9b59b6"/>
  <text x="677" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">股息率</text>
  <text x="677" y="120" text-anchor="middle" font-size="12" fill="#333">每股分红 ÷ 股价</text>
  <text x="677" y="142" text-anchor="middle" font-size="11" fill="#555">测的是：</text>
  <text x="677" y="162" text-anchor="middle" font-size="11" fill="#333">每年实际现金回报</text>
  <text x="677" y="185" text-anchor="middle" font-size="10" fill="#888">✔ 成熟分红型企业</text>
  <text x="677" y="202" text-anchor="middle" font-size="10" fill="#e74c3c">✘ 不分红/高成长股</text>

  <!-- 横向对比行 -->
  <text x="400" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">行业适配速查</text>
  
  <!-- 行业行 -->
  <rect x="30" y="258" width="740" height="38" rx="6" fill="#eaf4fb"/>
  <text x="120" y="282" text-anchor="middle" font-size="12" fill="#333">银行/保险</text>
  <rect x="180" y="264" width="55" height="26" rx="4" fill="#27ae60"/>
  <text x="207" y="282" text-anchor="middle" font-size="11" fill="white">PB为主</text>
  <rect x="243" y="264" width="75" height="26" rx="4" fill="#bdc3c7"/>
  <text x="280" y="282" text-anchor="middle" font-size="11" fill="white">PE参考</text>
  <rect x="326" y="264" width="85" height="26" rx="4" fill="#e74c3c"/>
  <text x="368" y="282" text-anchor="middle" font-size="11" fill="white">PS不适用</text>
  <rect x="420" y="264" width="80" height="26" rx="4" fill="#9b59b6"/>
  <text x="460" y="282" text-anchor="middle" font-size="11" fill="white">股息率看</text>

  <rect x="30" y="302" width="740" height="38" rx="6" fill="#f0faf4"/>
  <text x="120" y="326" text-anchor="middle" font-size="12" fill="#333">科技/互联网</text>
  <rect x="180" y="308" width="55" height="26" rx="4" fill="#4a90d9"/>
  <text x="207" y="326" text-anchor="middle" font-size="11" fill="white">PE参考</text>
  <rect x="243" y="308" width="75" height="26" rx="4" fill="#bdc3c7"/>
  <text x="280" y="326" text-anchor="middle" font-size="11" fill="white">PB失效</text>
  <rect x="326" y="308" width="85" height="26" rx="4" fill="#e67e22"/>
  <text x="368" y="326" text-anchor="middle" font-size="11" fill="white">PS为主</text>
  <rect x="420" y="308" width="80" height="26" rx="4" fill="#bdc3c7"/>
  <text x="460" y="326" text-anchor="middle" font-size="11" fill="white">股息率低</text>

  <rect x="30" y="346" width="740" height="38" rx="6" fill="#fef9f0"/>
  <text x="120" y="370" text-anchor="middle" font-size="12" fill="#333">消费/白酒</text>
  <rect x="180" y="352" width="55" height="26" rx="4" fill="#4a90d9"/>
  <text x="207" y="370" text-anchor="middle" font-size="11" fill="white">PE为主</text>
  <rect x="243" y="352" width="75" height="26" rx="4" fill="#27ae60"/>
  <text x="280" y="370" text-anchor="middle" font-size="11" fill="white">PB辅助</text>
  <rect x="326" y="352" width="85" height="26" rx="4" fill="#bdc3c7"/>
  <text x="368" y="370" text-anchor="middle" font-size="11" fill="white">PS参考</text>
  <rect x="420" y="352" width="80" height="26" rx="4" fill="#9b59b6"/>
  <text x="460" y="370" text-anchor="middle" font-size="11" fill="white">股息率看</text>

  <text x="400" y="408" text-anchor="middle" font-size="10" fill="#999">注：估值指标需结合历史分位数纵向比较，仅凭绝对值判断高低风险极大</text>
</svg>
