<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">估值三大陷阱：低PE≠便宜</text>

  <!-- Trap 1 -->
  <rect x="30" y="55" width="228" height="280" rx="12" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <rect x="30" y="55" width="228" height="50" rx="12" fill="#e74c3c"/>
  <rect x="30" y="93" width="228" height="12" fill="#e74c3c"/>
  <text x="144" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">陷阱一：跨行业比PE</text>
  
  <text x="144" y="130" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">❌ 错误做法</text>
  <text x="144" y="152" text-anchor="middle" font-size="11" fill="#555">"招行PE才7倍，腾讯PE</text>
  <text x="144" y="168" text-anchor="middle" font-size="11" fill="#555">25倍，招行便宜多了！"</text>
  
  <line x1="50" y1="185" x2="238" y2="185" stroke="#eee" stroke-width="1"/>
  
  <text x="144" y="208" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">✅ 正确认知</text>
  <text x="144" y="230" text-anchor="middle" font-size="11" fill="#555">银行用PB估值，科技用</text>
  <text x="144" y="248" text-anchor="middle" font-size="11" fill="#555">PS/PE，规则不同，</text>
  <text x="144" y="266" text-anchor="middle" font-size="11" fill="#555">不能直接比较</text>
  <text x="144" y="300" text-anchor="middle" font-size="10" fill="#e74c3c">跨行业对比PE = 用公斤比米数</text>

  <!-- Trap 2 -->
  <rect x="286" y="55" width="228" height="280" rx="12" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <rect x="286" y="55" width="228" height="50" rx="12" fill="#e67e22"/>
  <rect x="286" y="93" width="228" height="12" fill="#e67e22"/>
  <text x="400" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">陷阱二：只看绝对值</text>
  
  <text x="400" y="130" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">❌ 错误做法</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#555">"白酒龙头PE 30倍</text>
  <text x="400" y="168" text-anchor="middle" font-size="11" fill="#555">历史最高60倍，现在便宜"</text>
  
  <line x1="306" y1="185" x2="494" y2="185" stroke="#eee" stroke-width="1"/>
  
  <text x="400" y="208" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">✅ 正确认知</text>
  <text x="400" y="230" text-anchor="middle" font-size="11" fill="#555">需看历史10年分位数</text>
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#555">30倍若处于60%分位</text>
  <text x="400" y="266" text-anchor="middle" font-size="11" fill="#555">仍属偏贵，不算低估</text>
  <text x="400" y="300" text-anchor="middle" font-size="10" fill="#e67e22">分位数才是真正的参照系</text>

  <!-- Trap 3 -->
  <rect x="542" y="55" width="228" height="280" rx="12" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <rect x="542" y="55" width="228" height="50" rx="12" fill="#8e44ad"/>
  <rect x="542" y="93" width="228" height="12" fill="#8e44ad"/>
  <text x="656" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">陷阱三：忽略利润质量</text>
  
  <text x="656" y="130" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">❌ 错误做法</text>
  <text x="656" y="152" text-anchor="middle" font-size="11" fill="#555">"某公司PE才5倍，</text>
  <text x="656" y="168" text-anchor="middle" font-size="11" fill="#555">超级低估，抄底！"</text>
  
  <line x1="562" y1="185" x2="750" y2="185" stroke="#eee" stroke-width="1"/>
  
  <text x="656" y="208" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">✅ 正确认知</text>
  <text x="656" y="230" text-anchor="middle" font-size="11" fill="#555">PE=5可能是"一次性利润"</text>
  <text x="656" y="248" text-anchor="middle" font-size="11" fill="#555">（卖地/补贴），明年利润</text>
  <text x="656" y="266" text-anchor="middle" font-size="11" fill="#555">归零，PE变成无穷大</text>
  <text x="656" y="300" text-anchor="middle" font-size="10" fill="#8e44ad">先看利润是否可持续</text>

  <text x="400" y="352" text-anchor="middle" font-size="12" fill="#555">估值是工具，不是真理；低估值是买入的必要条件，但远非充分条件</text>
  <text x="400" y="372" text-anchor="middle" font-size="11" fill="#999">数据来源：基于A股市场实际案例整理，历史数据仅供学习参考</text>
</svg>
