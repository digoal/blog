<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">「估值三步法」操作流程</text>

  <!-- Step 1 -->
  <rect x="30" y="55" width="220" height="270" rx="10" fill="#eaf4fb" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="140" cy="85" r="22" fill="#4a90d9"/>
  <text x="140" y="91" text-anchor="middle" font-size="18" font-weight="bold" fill="white">1</text>
  <text x="140" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a5c">选对指标</text>
  <text x="140" y="148" text-anchor="middle" font-size="11" fill="#555">问：这家公司赚钱吗？</text>
  <text x="140" y="167" text-anchor="middle" font-size="11" fill="#333">稳定盈利 → PE</text>
  <text x="140" y="185" text-anchor="middle" font-size="11" fill="#333">银行/重资产 → PB</text>
  <text x="140" y="203" text-anchor="middle" font-size="11" fill="#333">亏损高增速 → PS</text>
  <text x="140" y="221" text-anchor="middle" font-size="11" fill="#333">看分红回报 → 股息率</text>
  <rect x="55" y="240" width="170" height="28" rx="6" fill="#4a90d9"/>
  <text x="140" y="259" text-anchor="middle" font-size="11" fill="white">用错工具 = 得出错答案</text>
  <text x="140" y="290" text-anchor="middle" font-size="10" fill="#888">先定类型，再选指标</text>
  <text x="140" y="308" text-anchor="middle" font-size="10" fill="#888">不要一个PE打天下</text>

  <!-- Arrow 1 -->
  <polygon points="260,185 278,175 278,195" fill="#4a90d9"/>
  <line x1="258" y1="185" x2="278" y2="185" stroke="#4a90d9" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="288" y="55" width="224" height="270" rx="10" fill="#f0faf4" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="400" cy="85" r="22" fill="#27ae60"/>
  <text x="400" y="91" text-anchor="middle" font-size="18" font-weight="bold" fill="white">2</text>
  <text x="400" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4a2e">纵向定位</text>
  <text x="400" y="148" text-anchor="middle" font-size="11" fill="#555">查历史分位数（5-10年）</text>
  
  <!-- Distribution bar -->
  <rect x="318" y="162" width="164" height="16" rx="4" fill="#e0e0e0"/>
  <rect x="318" y="162" width="40" height="16" rx="4" fill="#27ae60"/>
  <rect x="358" y="162" width="42" height="16" fill="#a8d5b5"/>
  <rect x="400" y="162" width="40" height="16" fill="#ffd280"/>
  <rect x="440" y="162" width="42" height="16" rx="4" fill="#e74c3c"/>
  <text x="338" y="174" text-anchor="middle" font-size="9" fill="white">低估</text>
  <text x="379" y="174" text-anchor="middle" font-size="9" fill="#555">偏低</text>
  <text x="420" y="174" text-anchor="middle" font-size="9" fill="#555">偏高</text>
  <text x="461" y="174" text-anchor="middle" font-size="9" fill="white">高估</text>
  <text x="318" y="196" text-anchor="middle" font-size="9" fill="#555">0%</text>
  <text x="400" y="196" text-anchor="middle" font-size="9" fill="#555">50%</text>
  <text x="482" y="196" text-anchor="middle" font-size="9" fill="#555">100%</text>
  
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#333">分位&lt;30% → 历史低估区</text>
  <text x="400" y="236" text-anchor="middle" font-size="11" fill="#333">分位30-70% → 历史合理区</text>
  <text x="400" y="254" text-anchor="middle" font-size="11" fill="#333">分位&gt;70% → 历史偏贵区</text>
  <rect x="315" y="265" width="178" height="28" rx="6" fill="#27ae60"/>
  <text x="400" y="284" text-anchor="middle" font-size="11" fill="white">同一公司，与自己历史比</text>
  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#888">工具：乌龟量化、理杏仁</text>

  <!-- Arrow 2 -->
  <polygon points="522,185 540,175 540,195" fill="#27ae60"/>
  <line x1="520" y1="185" x2="540" y2="185" stroke="#27ae60" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="548" y="55" width="222" height="270" rx="10" fill="#fef6ff" stroke="#9b59b6" stroke-width="1.5"/>
  <circle cx="659" cy="85" r="22" fill="#9b59b6"/>
  <text x="659" y="91" text-anchor="middle" font-size="18" font-weight="bold" fill="white">3</text>
  <text x="659" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b1a5c">交叉验证</text>
  <text x="659" y="148" text-anchor="middle" font-size="11" fill="#555">至少2个指标互相印证</text>
  <text x="659" y="170" text-anchor="middle" font-size="11" fill="#333">PE低 + PB也低 = 信号增强</text>
  <text x="659" y="190" text-anchor="middle" font-size="11" fill="#e74c3c">PE低 + PB高 = 注意利润质量</text>
  <text x="659" y="210" text-anchor="middle" font-size="11" fill="#e74c3c">PE高 + 股息率高 = 细看分红</text>
  <text x="659" y="230" text-anchor="middle" font-size="11" fill="#333">PE高 + PS低 = 利润率改善期</text>
  <rect x="570" y="248" width="178" height="28" rx="6" fill="#9b59b6"/>
  <text x="659" y="267" text-anchor="middle" font-size="11" fill="white">指标一致才是真信号</text>
  <text x="659" y="295" text-anchor="middle" font-size="10" fill="#888">单一指标低估不等于可买</text>
  <text x="659" y="313" text-anchor="middle" font-size="10" fill="#888">多维度共振才有把握</text>

  <text x="400" y="345" text-anchor="middle" font-size="11" fill="#555">三步走完，估值才算"看懂了"——但估值只是买入的准入条件，不是买入信号</text>
</svg>
