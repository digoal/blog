<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">技术面四要素：趋势 · 支撑 · 压力 · 成交量</text>

  <!-- 左上：趋势 -->
  <rect x="30" y="55" width="355" height="155" fill="#fff" rx="8" stroke="#4361ee" stroke-width="1.5"/>
  <text x="45" y="80" font-size="13" font-weight="bold" fill="#4361ee">① 趋势：方向比时机更重要</text>
  <!-- 趋势线示意 -->
  <polyline points="55,185 100,165 145,170 190,140 235,145 280,115 325,120 360,95" fill="none" stroke="#4361ee" stroke-width="2.5" stroke-dasharray="0"/>
  <!-- 均线 -->
  <polyline points="55,190 100,175 145,172 190,155 235,150 280,130 325,125 360,110" fill="none" stroke="#e63946" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="55" y="208" font-size="11" fill="#555">股价</text>
  <line x1="70" y1="204" x2="100" y2="204" stroke="#4361ee" stroke-width="2"/>
  <text x="108" y="208" font-size="11" fill="#555">均线（MA20）</text>
  <line x1="180" y1="204" x2="210" y2="204" stroke="#e63946" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="52" y="93" font-size="11" fill="#888">股价站在均线上方 = 上升趋势</text>

  <!-- 右上：支撑与压力 -->
  <rect x="415" y="55" width="355" height="155" fill="#fff" rx="8" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="430" y="80" font-size="13" font-weight="bold" fill="#2a9d8f">② 支撑与压力：关键价位的博弈</text>
  <!-- K线简示 -->
  <line x1="430" y1="155" x2="760" y2="155" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="185" x2="760" y2="185" stroke="#2a9d8f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="765" y="159" font-size="11" fill="#e63946">压力</text>
  <text x="765" y="189" font-size="11" fill="#2a9d8f">支撑</text>
  <!-- 几根K线 -->
  <rect x="445" y="162" width="12" height="20" fill="#e63946" opacity="0.8"/>
  <rect x="468" y="158" width="12" height="25" fill="#e63946" opacity="0.8"/>
  <rect x="491" y="164" width="12" height="15" fill="#4caf50" opacity="0.8"/>
  <rect x="514" y="175" width="12" height="10" fill="#4caf50" opacity="0.8"/>
  <rect x="537" y="170" width="12" height="14" fill="#e63946" opacity="0.8"/>
  <rect x="560" y="178" width="12" height="8" fill="#4caf50" opacity="0.8"/>
  <rect x="583" y="172" width="12" height="13" fill="#4caf50" opacity="0.8"/>
  <rect x="606" y="167" width="12" height="18" fill="#e63946" opacity="0.8"/>
  <text x="430" y="210" font-size="11" fill="#888">价格在支撑压力间反复，突破才有意义</text>

  <!-- 左下：成交量 -->
  <rect x="30" y="230" width="355" height="165" fill="#fff" rx="8" stroke="#e76f51" stroke-width="1.5"/>
  <text x="45" y="255" font-size="13" font-weight="bold" fill="#e76f51">③ 成交量：趋势的"发动机"</text>
  <!-- 量柱 -->
  <rect x="55" y="335" width="18" height="30" fill="#e63946" opacity="0.7"/>
  <rect x="82" y="325" width="18" height="40" fill="#e63946" opacity="0.7"/>
  <rect x="109" y="300" width="18" height="65" fill="#e63946" opacity="0.7"/>
  <rect x="136" y="345" width="18" height="20" fill="#4caf50" opacity="0.7"/>
  <rect x="163" y="350" width="18" height="15" fill="#4caf50" opacity="0.7"/>
  <rect x="190" y="305" width="18" height="60" fill="#e63946" opacity="0.7"/>
  <rect x="217" y="295" width="18" height="70" fill="#e63946" opacity="0.7"/>
  <rect x="244" y="330" width="18" height="35" fill="#4caf50" opacity="0.7"/>
  <rect x="271" y="340" width="18" height="25" fill="#4caf50" opacity="0.7"/>
  <rect x="298" y="350" width="18" height="15" fill="#4caf50" opacity="0.7"/>
  <line x1="45" y1="365" x2="375" y2="365" stroke="#ccc" stroke-width="1"/>
  <text x="55" y="383" font-size="10.5" fill="#555">红柱=放量上涨/下跌</text>
  <text x="210" y="383" font-size="10.5" fill="#555">绿柱=缩量</text>

  <!-- 右下：综合信号 -->
  <rect x="415" y="230" width="355" height="165" fill="#fff" rx="8" stroke="#f4a261" stroke-width="1.5"/>
  <text x="430" y="255" font-size="13" font-weight="bold" fill="#f4a261">④ 四要素组合信号表</text>
  <!-- 表格 -->
  <rect x="430" y="265" width="325" height="25" fill="#f4a261" opacity="0.15" rx="3"/>
  <text x="440" y="282" font-size="11" font-weight="bold" fill="#333">信号组合</text>
  <text x="620" y="282" font-size="11" font-weight="bold" fill="#333">含义</text>
  
  <text x="440" y="305" font-size="11" fill="#2a9d8f">↑趋势 + 放量突破压力</text>
  <text x="620" y="305" font-size="11" fill="#2a9d8f">强烈买入信号 ✓</text>
  
  <text x="440" y="325" font-size="11" fill="#e63946">↓趋势 + 放量跌破支撑</text>
  <text x="620" y="325" font-size="11" fill="#e63946">止损/离场信号 ✗</text>
  
  <text x="440" y="345" font-size="11" fill="#888">横盘 + 缩量</text>
  <text x="620" y="345" font-size="11" fill="#888">等待观望，不操作</text>
  
  <text x="440" y="365" font-size="11" fill="#e76f51">↑趋势 + 缩量涨</text>
  <text x="620" y="365" font-size="11" fill="#e76f51">小心，动力不足</text>
  
  <text x="440" y="385" font-size="11" fill="#4361ee">回踩支撑 + 缩量不跌</text>
  <text x="620" y="385" font-size="11" fill="#4361ee">低风险买入窗口</text>
</svg>
