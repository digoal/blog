<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">支撑与压力：一旦突破，角色互换</text>

  <!-- 坐标轴 -->
  <line x1="60" y1="310" x2="750" y2="310" stroke="#bbb" stroke-width="1.5"/>
  <line x1="60" y1="50" x2="60" y2="310" stroke="#bbb" stroke-width="1.5"/>
  <text x="30" y="314" font-size="12" fill="#888">时间→</text>

  <!-- 支撑线（绿色虚线） -->
  <line x1="60" y1="240" x2="420" y2="240" stroke="#2a9d8f" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 突破后变压力（红色虚线） -->
  <line x1="420" y1="240" x2="750" y2="240" stroke="#e63946" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- K线走势 -->
  <!-- 前段在支撑上方震荡 -->
  <polyline points="80,200 120,180 160,220 200,195 240,210 280,185 320,215 360,200 400,220 420,242" 
    fill="none" stroke="#4361ee" stroke-width="2.5"/>
  <!-- 跌破支撑后继续跌 -->
  <polyline points="420,242 450,265 490,258 530,280 560,270 600,290 640,275 680,295 720,285"
    fill="none" stroke="#e63946" stroke-width="2.5"/>

  <!-- 回抽测试标注 -->
  <polyline points="530,280 550,250 570,265" fill="none" stroke="#e63946" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="555" y="245" font-size="11" fill="#e63946">回抽测试压力</text>
  <text x="555" y="257" font-size="11" fill="#e63946">（原支撑变压力）</text>

  <!-- 标注 -->
  <text x="65" y="235" font-size="12" fill="#2a9d8f">支撑位</text>
  <text x="430" y="235" font-size="12" fill="#e63946">同一价位 → 变压力</text>

  <!-- 箭头和说明 -->
  <text x="200" y="170" font-size="11" fill="#4361ee">价格在支撑上方反复震荡</text>
  <text x="560" y="308" font-size="11" fill="#e63946">跌破后继续下行</text>
  
  <!-- 突破点标记 -->
  <circle cx="420" cy="242" r="6" fill="#f4a261" opacity="0.9"/>
  <text x="395" y="263" font-size="12" font-weight="bold" fill="#f4a261">突破点</text>

  <!-- 底部说明 -->
  <rect x="60" y="320" width="680" height="32" fill="#fff" rx="5" stroke="#ddd"/>
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#333">
    核心逻辑：支撑 = 曾经被大量资金认可的买入区；一旦失守，这些被套资金会在反弹时"解套出逃"，原支撑变成压力
  </text>
</svg>
