<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">量价关系四象限：最该记住的操盘常识</text>
  
  <!-- 四个象限 -->
  <!-- 左上：量增价涨（健康） -->
  <rect x="30" y="55" width="355" height="145" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
  <text x="207" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">量增价涨 ✓ 最健康</text>
  <text x="50" y="100" font-size="12" fill="#333">• 资金持续流入，多头占主导</text>
  <text x="50" y="118" font-size="12" fill="#333">• 趋势可信度高，可持仓或加仓</text>
  <text x="50" y="136" font-size="12" fill="#333">• 案例：2024年9月底A股放量拉升</text>
  <text x="50" y="154" font-size="12" fill="#555">  沪深300单日成交量放大3倍，当周涨逾15%</text>
  <text x="50" y="178" font-size="11" fill="#888">⚠ 注意：若持续过度放量，警惕见顶</text>

  <!-- 右上：量缩价涨（警惕） -->
  <rect x="415" y="55" width="355" height="145" fill="#fff3e0" rx="8" stroke="#f4a261" stroke-width="2"/>
  <text x="592" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">量缩价涨 ⚠ 需警惕</text>
  <text x="435" y="100" font-size="12" fill="#333">• 涨势缺乏量能支撑，随时可能反转</text>
  <text x="435" y="118" font-size="12" fill="#333">• 短线可跟，不宜重仓追高</text>
  <text x="435" y="136" font-size="12" fill="#333">• 案例：震荡市中的"无量空涨"</text>
  <text x="435" y="154" font-size="12" fill="#555">  往往是主力控盘拉高，随时要派发</text>
  <text x="435" y="178" font-size="11" fill="#888">⚠ 结合均线判断，不要盲目追涨</text>

  <!-- 左下：量增价跌（危险） -->
  <rect x="30" y="218" width="355" height="145" fill="#ffebee" rx="8" stroke="#e63946" stroke-width="2"/>
  <text x="207" y="241" text-anchor="middle" font-size="14" font-weight="bold" fill="#b71c1c">量增价跌 ✗ 最危险</text>
  <text x="50" y="263" font-size="12" fill="#333">• 资金大量出逃，看起来"热闹"实则出货</text>
  <text x="50" y="281" font-size="12" fill="#333">• 止损信号，不要抄底，等量能萎缩再说</text>
  <text x="50" y="299" font-size="12" fill="#333">• 案例：庄股出货时的放量跌停</text>
  <text x="50" y="317" font-size="12" fill="#555">  外表看成交活跃，实则主力出货完毕</text>
  <text x="50" y="351" font-size="11" fill="#888">⚠ 高位放量大跌 = 出货，低位除外</text>

  <!-- 右下：量缩价跌（底部信号） -->
  <rect x="415" y="218" width="355" height="145" fill="#e8eaf6" rx="8" stroke="#4361ee" stroke-width="2"/>
  <text x="592" y="241" text-anchor="middle" font-size="14" font-weight="bold" fill="#283593">量缩价跌 → 可能见底</text>
  <text x="435" y="263" font-size="12" fill="#333">• 卖盘枯竭，抛压减弱，底部信号</text>
  <text x="435" y="281" font-size="12" fill="#333">• 不等于立刻反弹，需等放量确认</text>
  <text x="435" y="299" font-size="12" fill="#333">• 案例：A股2024年初的"量缩筑底"</text>
  <text x="435" y="317" font-size="12" fill="#555">  2024年2月成交萎缩至极低点后反弹</text>
  <text x="435" y="351" font-size="11" fill="#888">⚠ 缩量下跌→等放量向上突破再买</text>
</svg>
