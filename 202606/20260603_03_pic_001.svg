<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">A股资金面四大雷达：散户看盘工具图</text>

  <!-- 北向资金 -->
  <rect x="30" y="60" width="170" height="155" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="115" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">🌐 北向资金</text>
  <text x="115" y="101" text-anchor="middle" font-size="11" fill="#555">（外资通过沪深港通）</text>
  <line x1="45" y1="110" x2="185" y2="110" stroke="#90CAF9" stroke-width="1"/>
  <text x="50" y="127" font-size="10.5" fill="#333">✅ 连续5日+净流入 → 中线看多</text>
  <text x="50" y="145" font-size="10.5" fill="#333">✅ 重仓高ROE龙头 → 基本面背书</text>
  <text x="50" y="163" font-size="10.5" fill="#E53935">⚠ 单日巨额流入 → 可能被动调仓</text>
  <text x="50" y="181" font-size="10.5" fill="#E53935">⚠ 2021年后信号衰减明显</text>
  <text x="50" y="199" font-size="10.5" fill="#555">持股市值 ≈ 2.29万亿（2025）</text>

  <!-- 机构资金 -->
  <rect x="220" y="60" width="170" height="155" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="305" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">🏦 机构资金</text>
  <text x="305" y="101" text-anchor="middle" font-size="11" fill="#555">（公募基金/保险/社保）</text>
  <line x1="235" y1="110" x2="375" y2="110" stroke="#A5D6A7" stroke-width="1"/>
  <text x="235" y="127" font-size="10.5" fill="#333">✅ 季报持仓变化 → 中长线方向</text>
  <text x="235" y="145" font-size="10.5" fill="#333">✅ 多家机构同方向 → 信号增强</text>
  <text x="235" y="163" font-size="10.5" fill="#E53935">⚠ 机构调仓有滞后 → 追高风险</text>
  <text x="235" y="181" font-size="10.5" fill="#E53935">⚠ 龙虎榜机构席位≠所有机构</text>
  <text x="235" y="199" font-size="10.5" fill="#555">A股持有市值 ≈ 21.4万亿（2025）</text>

  <!-- 龙虎榜 -->
  <rect x="410" y="60" width="170" height="155" rx="10" fill="#fff3e0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="495" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">🐉 龙虎榜</text>
  <text x="495" y="101" text-anchor="middle" font-size="11" fill="#555">（交易所公布异动榜单）</text>
  <line x1="425" y1="110" x2="565" y2="110" stroke="#FFCC80" stroke-width="1"/>
  <text x="425" y="127" font-size="10.5" fill="#333">✅ 机构+游资共买 → 短线关注</text>
  <text x="425" y="145" font-size="10.5" fill="#333">✅ 机构净买入≥5% → 筹码认可</text>
  <text x="425" y="163" font-size="10.5" fill="#E53935">⚠ 拉萨席位出现 → 大概率出货</text>
  <text x="425" y="181" font-size="10.5" fill="#E53935">⚠ 一家独大 → 散户盘中险境</text>
  <text x="425" y="199" font-size="10.5" fill="#555">触发条件：涨跌±7%/换手≥20%</text>

  <!-- 成交额 -->
  <rect x="600" y="60" width="170" height="155" rx="10" fill="#fce4ec" stroke="#E91E63" stroke-width="1.5"/>
  <text x="685" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#880E4F">📊 成交额</text>
  <text x="685" y="101" text-anchor="middle" font-size="11" fill="#555">（市场温度计）</text>
  <line x1="615" y1="110" x2="755" y2="110" stroke="#F48FB1" stroke-width="1"/>
  <text x="615" y="127" font-size="10.5" fill="#333">✅ 两市成交 &gt; 1.5万亿 → 活跃</text>
  <text x="615" y="145" font-size="10.5" fill="#333">✅ 放量上涨 → 有效突破信号</text>
  <text x="615" y="163" font-size="10.5" fill="#E53935">⚠ 缩量上涨 → 犹豫，谨慎追</text>
  <text x="615" y="181" font-size="10.5" fill="#E53935">⚠ 放量下跌 → 出货信号警惕</text>
  <text x="615" y="199" font-size="10.5" fill="#555">换手率 = 成交股数 ÷ 流通股总数</text>

  <!-- 综合判断栏 -->
  <rect x="30" y="235" width="740" height="80" rx="10" fill="#ede7f6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="400" y="257" text-anchor="middle" font-size="13" font-weight="bold" fill="#4527A0">⚡ 信号共振：多项同向才是真信号</text>
  <text x="60" y="278" font-size="11" fill="#333">做多共振：北向连续净流入 + 机构龙虎榜净买入 + 两市成交额持续放大 + 个股换手温和放量</text>
  <text x="60" y="298" font-size="11" fill="#C62828">做空警示：北向大额流出 + 机构龙虎榜净卖出 + 放量下跌 + 游资席位主导（短线博弈性强）</text>

  <!-- 散户误区 -->
  <rect x="30" y="333" width="740" height="70" rx="10" fill="#ffebee" stroke="#EF9A9A" stroke-width="1"/>
  <text x="400" y="354" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">❌ 散户三大误区（避开才能少亏钱）</text>
  <text x="60" y="373" font-size="11" fill="#555">① 把单日北向流入当"神谕"，忽视持续性 ｜ ② 龙虎榜上机构买入就立刻跟单，不问原因 ｜ ③ 只看涨不涨、不看成交量，买了不知道是真突破还是假突破</text>
  <text x="60" y="393" font-size="11" fill="#555">正确做法：资金面信号作为辅助确认，不单独用来做决策，配合第5节（估值）和第8节（技术面）综合判断。</text>
</svg>
