<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">龙虎榜解剖图：一张榜单里藏了什么信息</text>

  <!-- 上榜条件 -->
  <rect x="30" y="55" width="220" height="130" rx="8" fill="#e3f2fd" stroke="#1976D2" stroke-width="1.5"/>
  <text x="140" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">🔔 什么股票会上榜？</text>
  <text x="45" y="96" font-size="10.5" fill="#333">主板 涨跌幅 ≥ ±7%</text>
  <text x="45" y="112" font-size="10.5" fill="#333">创业板/科创板 ≥ ±15%</text>
  <text x="45" y="128" font-size="10.5" fill="#333">日换手率 ≥ 20%</text>
  <text x="45" y="144" font-size="10.5" fill="#333">日振幅 ≥ 15%</text>
  <text x="45" y="160" font-size="10.5" fill="#333">3日涨跌幅累计 ≥ 20%</text>
  <text x="45" y="176" font-size="10.5" fill="#777">→ 上榜 = 已经异动，不是预警</text>

  <!-- 席位类型 -->
  <rect x="270" y="55" width="230" height="130" rx="8" fill="#f3e5f5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="385" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A148C">🎭 席位类型决定含义</text>
  <text x="285" y="96" font-size="10.5" fill="#333">机构专用席位</text>
  <text x="285" y="112" font-size="10" fill="#555">→ 公募基金/保险/社保/QFII</text>
  <text x="285" y="128" font-size="10" fill="#555">→ 偏中长线，有基本面逻辑</text>
  <text x="285" y="146" font-size="10.5" fill="#333">游资营业部席位</text>
  <text x="285" y="162" font-size="10" fill="#555">→ 知名游资（杭州上塘路等）</text>
  <text x="285" y="178" font-size="10" fill="#C62828">→ 短线博弈，跟单需谨慎</text>

  <!-- 解读要点 -->
  <rect x="520" y="55" width="250" height="130" rx="8" fill="#e8f5e9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="645" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">📋 看懂三个核心维度</text>
  <text x="535" y="96" font-size="10.5" fill="#333">① 席位身份：机构 or 游资</text>
  <text x="535" y="114" font-size="10.5" fill="#333">② 买卖力量比：买方合计 vs 卖方</text>
  <text x="535" y="132" font-size="10.5" fill="#333">③ 节奏：单日进出 or 连续操作</text>
  <text x="535" y="150" font-size="10.5" fill="#555">机构+游资共同净买入 = 最强信号</text>
  <text x="535" y="168" font-size="10.5" fill="#C62828">拉萨席位 or 一家独大 = 出货预警</text>

  <!-- 危险信号区 -->
  <rect x="30" y="205" width="360" height="85" rx="8" fill="#fff8e1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="210" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">⚡ 龙虎榜最危险的6种情形</text>
  <text x="45" y="246" font-size="10.5" fill="#555">① 拉萨（西藏东方财富）现身买方 → 出货信号</text>
  <text x="45" y="262" font-size="10.5" fill="#555">② 一家营业部占买入总量 &gt; 50% → 操控嫌疑</text>
  <text x="45" y="278" font-size="10.5" fill="#555">③ 连续上榜但量能萎缩 → 主力减仓中</text>

  <!-- 机会信号区 -->
  <rect x="410" y="205" width="360" height="85" rx="8" fill="#e8f5e9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="590" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">✅ 龙虎榜最值得关注的3种情形</text>
  <text x="425" y="246" font-size="10.5" fill="#333">① 多个机构席位同日净买入（基本面认同）</text>
  <text x="425" y="262" font-size="10.5" fill="#333">② 机构+北向共同出现在买方（双重确认）</text>
  <text x="425" y="278" font-size="10.5" fill="#333">③ 放量涨停+机构席位，次日仍强势</text>

  <!-- 底部警示 -->
  <rect x="30" y="308" width="740" height="55" rx="8" fill="#ffebee" stroke="#EF9A9A" stroke-width="1"/>
  <text x="400" y="328" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#B71C1C">📌 散户跟龙虎榜最常见的亏损路径</text>
  <text x="400" y="350" text-anchor="middle" font-size="11" fill="#555">看到机构买入 → 次日高开追进 → 当天机构已卖出 → 接盘被套。龙虎榜是盘后数据，当你看到时，主力可能已换仓完毕。</text>
</svg>
