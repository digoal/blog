<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="300" fill="#f8f9fa" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">成交额×价格组合：读懂市场的"脉搏"</text>

  <!-- 4个组合格子 -->
  <!-- 放量上涨 -->
  <rect x="30" y="52" width="175" height="110" rx="8" fill="#c8e6c9" stroke="#2E7D32" stroke-width="2"/>
  <text x="117" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">放量上涨 ✅</text>
  <text x="117" y="96" text-anchor="middle" font-size="11" fill="#333">成交量↑ + 价格↑</text>
  <text x="45" y="116" font-size="10.5" fill="#2E7D32">→ 有真实买盘推动</text>
  <text x="45" y="132" font-size="10.5" fill="#2E7D32">→ 突破确认度高</text>
  <text x="45" y="150" font-size="10.5" fill="#555">操作：可以追进，设好止损</text>

  <!-- 缩量上涨 -->
  <rect x="218" y="52" width="175" height="110" rx="8" fill="#fff9c4" stroke="#F57F17" stroke-width="2"/>
  <text x="305" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">缩量上涨 ⚠️</text>
  <text x="305" y="96" text-anchor="middle" font-size="11" fill="#333">成交量↓ + 价格↑</text>
  <text x="233" y="116" font-size="10.5" fill="#E65100">→ 无量拉升，底气不足</text>
  <text x="233" y="132" font-size="10.5" fill="#E65100">→ 突破易假，回踩大</text>
  <text x="233" y="150" font-size="10.5" fill="#555">操作：观望，等量能跟上</text>

  <!-- 放量下跌 -->
  <rect x="406" y="52" width="175" height="110" rx="8" fill="#ffcdd2" stroke="#C62828" stroke-width="2"/>
  <text x="493" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#B71C1C">放量下跌 ❌</text>
  <text x="493" y="96" text-anchor="middle" font-size="11" fill="#333">成交量↑ + 价格↓</text>
  <text x="421" y="116" font-size="10.5" fill="#C62828">→ 主力加速出货</text>
  <text x="421" y="132" font-size="10.5" fill="#C62828">→ 趋势破位，危险</text>
  <text x="421" y="150" font-size="10.5" fill="#555">操作：坚决减仓止损</text>

  <!-- 缩量下跌 -->
  <rect x="594" y="52" width="175" height="110" rx="8" fill="#e8f4fd" stroke="#1976D2" stroke-width="2"/>
  <text x="681" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">缩量下跌 🔍</text>
  <text x="681" y="96" text-anchor="middle" font-size="11" fill="#333">成交量↓ + 价格↓</text>
  <text x="609" y="116" font-size="10.5" fill="#1976D2">→ 抛压有限，底部探索</text>
  <text x="609" y="132" font-size="10.5" fill="#1976D2">→ 筑底可能，需观察</text>
  <text x="609" y="150" font-size="10.5" fill="#555">操作：轻仓观察，等企稳</text>

  <!-- 全市场成交额参考 -->
  <rect x="30" y="180" width="740" height="100" rx="8" fill="#ede7f6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="400" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#4527A0">全市场成交额：判断市场温度的"温度计"</text>
  <text x="55" y="222" font-size="11" fill="#333">🌡 低温（&lt;6000亿）：市场冷淡，小心个股分化，慎重追高</text>
  <text x="55" y="240" font-size="11" fill="#333">🌤 适温（6000亿–1.2万亿）：正常交易，信号有参考价值</text>
  <text x="55" y="258" font-size="11" fill="#E65100">🔥 高温（&gt;1.5万亿）：市场情绪亢奋，接近过热，警惕追高</text>
  <text x="55" y="276" font-size="11" fill="#777">注：2024–2025年A股活跃行情期间，两市单日成交额多次突破2万亿，属极端高温状态。</text>
</svg>
