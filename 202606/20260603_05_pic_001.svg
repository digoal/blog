<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">A股个股买入时机三大类型</text>

  <!-- 底部区域卡片 -->
  <rect x="30" y="60" width="220" height="320" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="48" rx="10" fill="#2196F3"/>
  <rect x="30" y="90" width="220" height="18" fill="#2196F3"/>
  <text x="140" y="91" text-anchor="middle" font-size="15" font-weight="bold" fill="white">① 底部区域买入</text>
  <text x="140" y="108" text-anchor="middle" font-size="11" fill="white">Left Side Entry · 左侧交易</text>

  <text x="50" y="138" font-size="12" fill="#1565C0" font-weight="bold">特征识别</text>
  <text x="50" y="158" font-size="11" fill="#333">• 估值低于历史均值 30%+</text>
  <text x="50" y="175" font-size="11" fill="#333">• 成交量极度萎缩</text>
  <text x="50" y="192" font-size="11" fill="#333">• 市场情绪极度悲观</text>
  <text x="50" y="209" font-size="11" fill="#333">• 基本面未发生质变</text>

  <text x="50" y="232" font-size="12" fill="#1565C0" font-weight="bold">风险提示</text>
  <text x="50" y="252" font-size="11" fill="#c0392b">• 底部无法精确预测</text>
  <text x="50" y="269" font-size="11" fill="#c0392b">• 可能继续下跌 30%+</text>
  <text x="50" y="286" font-size="11" fill="#c0392b">• 需要分批建仓</text>

  <text x="50" y="309" font-size="12" fill="#1565C0" font-weight="bold">适合人群</text>
  <text x="50" y="329" font-size="11" fill="#333">有耐心、不用短期钱</text>
  <text x="50" y="346" font-size="11" fill="#333">愿意承受浮亏等待</text>

  <rect x="55" y="358" width="140" height="10" rx="5" fill="#e0e0e0"/>
  <rect x="55" y="358" width="56" height="10" rx="5" fill="#2196F3"/>
  <text x="140" y="384" text-anchor="middle" font-size="10" fill="#777">胜率 ★★☆  赔率 ★★★★★</text>

  <!-- 趋势确认卡片 -->
  <rect x="290" y="60" width="220" height="320" rx="10" fill="#e8fdf1" stroke="#4CAF50" stroke-width="2"/>
  <rect x="290" y="60" width="220" height="48" rx="10" fill="#4CAF50"/>
  <rect x="290" y="90" width="220" height="18" fill="#4CAF50"/>
  <text x="400" y="91" text-anchor="middle" font-size="15" font-weight="bold" fill="white">② 趋势确认买入</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="white">Trend Confirmation · 右侧交易</text>

  <text x="310" y="138" font-size="12" fill="#2e7d32" font-weight="bold">特征识别</text>
  <text x="310" y="158" font-size="11" fill="#333">• 价格站上 20/60 日均线</text>
  <text x="310" y="175" font-size="11" fill="#333">• 成交量放大配合上涨</text>
  <text x="310" y="192" font-size="11" fill="#333">• 基本面有催化剂</text>
  <text x="310" y="209" font-size="11" fill="#333">• 行业景气度转好</text>

  <text x="310" y="232" font-size="12" fill="#2e7d32" font-weight="bold">风险提示</text>
  <text x="310" y="252" font-size="11" fill="#c0392b">• 相比底部已涨20-40%</text>
  <text x="310" y="269" font-size="11" fill="#c0392b">• 可能追高在短期高点</text>
  <text x="310" y="286" font-size="11" fill="#c0392b">• 假突破陷阱</text>

  <text x="310" y="309" font-size="12" fill="#2e7d32" font-weight="bold">适合人群</text>
  <text x="310" y="329" font-size="11" fill="#333">不想左侧等待煎熬</text>
  <text x="310" y="346" font-size="11" fill="#333">看重确定性的投资者</text>

  <rect x="315" y="358" width="140" height="10" rx="5" fill="#e0e0e0"/>
  <rect x="315" y="358" width="98" height="10" rx="5" fill="#4CAF50"/>
  <text x="400" y="384" text-anchor="middle" font-size="10" fill="#777">胜率 ★★★★  赔率 ★★★</text>

  <!-- 回踩确认卡片 -->
  <rect x="550" y="60" width="220" height="320" rx="10" fill="#fef9e8" stroke="#FF9800" stroke-width="2"/>
  <rect x="550" y="60" width="220" height="48" rx="10" fill="#FF9800"/>
  <rect x="550" y="90" width="220" height="18" fill="#FF9800"/>
  <text x="660" y="91" text-anchor="middle" font-size="15" font-weight="bold" fill="white">③ 回踩确认买入</text>
  <text x="660" y="108" text-anchor="middle" font-size="11" fill="white">Pullback Confirmation · 右侧优化</text>

  <text x="570" y="138" font-size="12" fill="#e65100" font-weight="bold">特征识别</text>
  <text x="570" y="158" font-size="11" fill="#333">• 趋势确认后回调 5-15%</text>
  <text x="570" y="175" font-size="11" fill="#333">• 缩量回踩关键支撑</text>
  <text x="570" y="192" font-size="11" fill="#333">• 基本面逻辑未变化</text>
  <text x="570" y="209" font-size="11" fill="#333">• 大盘无系统性风险</text>

  <text x="570" y="232" font-size="12" fill="#e65100" font-weight="bold">风险提示</text>
  <text x="570" y="252" font-size="11" fill="#c0392b">• 回踩可能变成破位</text>
  <text x="570" y="269" font-size="11" fill="#c0392b">• 需要判断是否缩量</text>
  <text x="570" y="286" font-size="11" fill="#c0392b">• 不是所有回调都值得买</text>

  <text x="570" y="309" font-size="12" fill="#e65100" font-weight="bold">适合人群</text>
  <text x="570" y="329" font-size="11" fill="#333">有一定技术面基础</text>
  <text x="570" y="346" font-size="11" fill="#333">追求高性价比入场点</text>

  <rect x="575" y="358" width="140" height="10" rx="5" fill="#e0e0e0"/>
  <rect x="575" y="358" width="112" height="10" rx="5" fill="#FF9800"/>
  <text x="660" y="384" text-anchor="middle" font-size="10" fill="#777">胜率 ★★★★  赔率 ★★★★</text>

  <!-- 底部说明 -->
  <text x="400" y="408" text-anchor="middle" font-size="10" fill="#999">胜率=判断正确的概率；赔率=盈亏比；两者结合决定期望值</text>
</svg>
