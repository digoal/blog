<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#fff" rx="10"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">个股K线走势与三类买入点示意图</text>

  <!-- 坐标轴 -->
  <line x1="70" y1="50" x2="70" y2="380" stroke="#ccc" stroke-width="1.5"/>
  <line x1="70" y1="380" x2="750" y2="380" stroke="#ccc" stroke-width="1.5"/>

  <!-- Y轴价格标注 -->
  <text x="62" y="380" text-anchor="end" font-size="10" fill="#888">8</text>
  <text x="62" y="330" text-anchor="end" font-size="10" fill="#888">12</text>
  <text x="62" y="270" text-anchor="end" font-size="10" fill="#888">17</text>
  <text x="62" y="210" text-anchor="end" font-size="10" fill="#888">22</text>
  <text x="62" y="150" text-anchor="end" font-size="10" fill="#888">27</text>
  <text x="62" y="90" text-anchor="end" font-size="10" fill="#888">32</text>
  <line x1="66" y1="380" x2="750" y2="380" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="66" y1="330" x2="750" y2="330" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="66" y1="270" x2="750" y2="270" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="66" y1="210" x2="750" y2="210" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="66" y1="150" x2="750" y2="150" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3"/>

  <!-- 走势曲线：下跌→底部→趋势确认→回踩→上涨 -->
  <!-- 下跌段：高点到底 -->
  <polyline points="80,110 130,150 175,210 210,270 240,330 265,358 280,370" fill="none" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- 底部震荡区域 -->
  <rect x="265" y="350" width="120" height="40" fill="#2196F320" rx="4"/>
  <polyline points="280,370 300,365 320,372 340,362 360,368 380,360" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="325" y="405" text-anchor="middle" font-size="10" fill="#666">底部震荡区</text>

  <!-- 趋势确认段：放量突破 -->
  <polyline points="380,360 410,330 440,280 460,240" fill="none" stroke="#4CAF50" stroke-width="2.5"/>

  <!-- 回踩段 -->
  <polyline points="460,240 480,260 495,270 510,260" fill="none" stroke="#FF9800" stroke-width="2.5"/>

  <!-- 继续上涨 -->
  <polyline points="510,260 540,220 580,170 620,130 660,100 700,80" fill="none" stroke="#4CAF50" stroke-width="2.5"/>

  <!-- 均线（虚拟20日线） -->
  <polyline points="80,120 130,165 175,220 210,275 240,338 265,360 310,368 355,365 395,340 430,295 455,248 480,252 510,258 545,225 582,178 622,135 662,104 702,84" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="710" y="80" font-size="10" fill="#9b59b6">20日线</text>

  <!-- 买入点①：底部区域 -->
  <circle cx="320" cy="372" r="12" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="2"/>
  <text x="320" y="376" text-anchor="middle" font-size="11" font-weight="bold" fill="#2196F3">①</text>
  <line x1="320" y1="360" x2="320" y2="310" stroke="#2196F3" stroke-width="1" stroke-dasharray="3"/>
  <rect x="253" y="285" width="134" height="28" rx="5" fill="#2196F3" fill-opacity="0.9"/>
  <text x="320" y="303" text-anchor="middle" font-size="11" fill="white">底部区域买入</text>

  <!-- 买入点②：趋势确认 -->
  <circle cx="430" cy="280" r="12" fill="#4CAF50" fill-opacity="0.2" stroke="#4CAF50" stroke-width="2"/>
  <text x="430" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#4CAF50">②</text>
  <line x1="430" y1="267" x2="430" y2="215" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3"/>
  <rect x="363" y="190" width="134" height="28" rx="5" fill="#4CAF50" fill-opacity="0.9"/>
  <text x="430" y="208" text-anchor="middle" font-size="11" fill="white">趋势确认买入</text>

  <!-- 买入点③：回踩确认 -->
  <circle cx="495" cy="270" r="12" fill="#FF9800" fill-opacity="0.2" stroke="#FF9800" stroke-width="2"/>
  <text x="495" y="274" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF9800">③</text>
  <line x1="495" y1="258" x2="530" y2="195" stroke="#FF9800" stroke-width="1" stroke-dasharray="3"/>
  <rect x="462" y="170" width="136" height="28" rx="5" fill="#FF9800" fill-opacity="0.9"/>
  <text x="530" y="188" text-anchor="middle" font-size="11" fill="white">回踩确认买入</text>

  <!-- 止损线提示 -->
  <line x1="265" y1="390" x2="400" y2="390" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="335" y="402" text-anchor="middle" font-size="9" fill="#e74c3c">①的止损参考线</text>

  <!-- X轴时间说明 -->
  <text x="200" y="426" text-anchor="middle" font-size="10" fill="#888">← 下跌阶段 →</text>
  <text x="340" y="426" text-anchor="middle" font-size="10" fill="#888">← 底部 →</text>
  <text x="475" y="426" text-anchor="middle" font-size="10" fill="#888">← 反转 →</text>
  <text x="600" y="426" text-anchor="middle" font-size="10" fill="#888">← 上涨趋势 →</text>

  <!-- 图例 -->
  <line x1="100" y1="445" x2="130" y2="445" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="135" y="448" font-size="10" fill="#666">20日均线</text>
  <line x1="230" y1="445" x2="260" y2="445" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="265" y="448" font-size="10" fill="#666">下跌走势</text>
  <line x1="340" y1="445" x2="370" y2="445" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="375" y="448" font-size="10" fill="#666">上涨走势</text>
  <line x1="460" y1="445" x2="490" y2="445" stroke="#FF9800" stroke-width="2.5"/>
  <text x="495" y="448" font-size="10" fill="#666">回踩走势</text>
</svg>
