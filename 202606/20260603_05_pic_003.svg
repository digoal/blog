<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#fafafa" rx="10"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">买入时机判断流程（小白决策树）</text>

  <!-- 开始 -->
  <rect x="320" y="50" width="160" height="40" rx="20" fill="#1a1a2e"/>
  <text x="400" y="75" text-anchor="middle" font-size="13" fill="white">发现一只感兴趣的股票</text>
  <line x1="400" y1="90" x2="400" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 菱形1：基本面 -->
  <polygon points="400,115 520,155 400,195 280,155" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"/>
  <text x="400" y="150" text-anchor="middle" font-size="12" fill="#1565C0">基本面是否</text>
  <text x="400" y="166" text-anchor="middle" font-size="12" fill="#1565C0">逻辑清晰？</text>

  <!-- 否：右边 -->
  <line x1="520" y1="155" x2="640" y2="155" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="640" y="133" width="130" height="44" rx="8" fill="#fdecea"/>
  <text x="705" y="151" text-anchor="middle" font-size="11" fill="#c0392b">放弃，不买</text>
  <text x="705" y="167" text-anchor="middle" font-size="11" fill="#c0392b">看下一只</text>
  <text x="577" y="148" text-anchor="middle" font-size="10" fill="#e74c3c">否</text>

  <!-- 是：向下 -->
  <line x1="400" y1="195" x2="400" y2="225" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="412" y="213" font-size="10" fill="#4CAF50">是</text>

  <!-- 菱形2：估值 -->
  <polygon points="400,225 520,265 400,305 280,265" fill="#e8fdf1" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-size="12" fill="#2e7d32">当前估值是否</text>
  <text x="400" y="276" text-anchor="middle" font-size="12" fill="#2e7d32">处于合理区间？</text>

  <!-- 贵：右边 -->
  <line x1="520" y1="265" x2="640" y2="265" stroke="#FF9800" stroke-width="1.5"/>
  <rect x="640" y="243" width="130" height="44" rx="8" fill="#fff3e0"/>
  <text x="705" y="261" text-anchor="middle" font-size="11" fill="#e65100">加入观察名单</text>
  <text x="705" y="277" text-anchor="middle" font-size="11" fill="#e65100">等待估值回落</text>
  <text x="566" y="258" text-anchor="middle" font-size="10" fill="#FF9800">估值贵</text>

  <!-- 合理：向下 -->
  <line x1="400" y1="305" x2="400" y2="335" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="412" y="323" font-size="10" fill="#4CAF50">合理/低估</text>

  <!-- 菱形3：趋势位置 -->
  <polygon points="400,335 520,375 400,415 280,375" fill="#fef9e8" stroke="#FF9800" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" font-size="12" fill="#e65100">价格在哪个</text>
  <text x="400" y="382" text-anchor="middle" font-size="12" fill="#e65100">趋势阶段？</text>

  <!-- 三个出口 -->
  <!-- 底部：左 -->
  <line x1="280" y1="375" x2="155" y2="375" stroke="#2196F3" stroke-width="1.5"/>
  <line x1="155" y1="375" x2="155" y2="445" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="80" y="445" width="150" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="155" y="462" text-anchor="middle" font-size="11" fill="#1565C0">底部区域</text>
  <text x="155" y="478" text-anchor="middle" font-size="11" fill="#1565C0">分3批建仓30%</text>
  <text x="218" y="368" text-anchor="middle" font-size="10" fill="#2196F3">底部震荡</text>

  <!-- 趋势确认：右 -->
  <line x1="520" y1="375" x2="645" y2="375" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="645" y1="375" x2="645" y2="445" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="570" y="445" width="150" height="44" rx="8" fill="#e8fdf1" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="645" y="462" text-anchor="middle" font-size="11" fill="#2e7d32">趋势确认放量</text>
  <text x="645" y="478" text-anchor="middle" font-size="11" fill="#2e7d32">建仓30%右侧</text>
  <text x="576" y="368" text-anchor="middle" font-size="10" fill="#4CAF50">趋势突破</text>

  <!-- 回踩：向下 -->
  <line x1="400" y1="415" x2="400" y2="445" stroke="#FF9800" stroke-width="1.5"/>
  <rect x="325" y="445" width="150" height="44" rx="8" fill="#fef9e8" stroke="#FF9800" stroke-width="1.5"/>
  <text x="400" y="462" text-anchor="middle" font-size="11" fill="#e65100">缩量回踩支撑</text>
  <text x="400" y="478" text-anchor="middle" font-size="11" fill="#e65100">买入补仓20%</text>
  <text x="412" y="432" font-size="10" fill="#FF9800">回踩确认</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
</svg>
