<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">卖出的四大触发信号</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#666">任何一条成立 → 必须认真考虑减仓或清仓</text>

  <!-- Box 1: Logic broken -->
  <rect x="40" y="80" width="160" height="130" rx="10" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="120" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">① 逻辑破坏</text>
  <text x="120" y="128" text-anchor="middle" font-size="11" fill="#555">当初买入的理由</text>
  <text x="120" y="143" text-anchor="middle" font-size="11" fill="#555">不再成立</text>
  <line x1="60" y1="158" x2="180" y2="158" stroke="#f57c00" stroke-width="1" stroke-dasharray="4"/>
  <text x="120" y="173" text-anchor="middle" font-size="11" fill="#e65100">无论盈亏</text>
  <text x="120" y="189" text-anchor="middle" font-size="11" fill="#e65100">优先级最高</text>

  <!-- Arrow 1 -->
  <text x="220" y="155" text-anchor="middle" font-size="20" fill="#aaa">→</text>

  <!-- Box 2: Valuation hot -->
  <rect x="250" y="80" width="160" height="130" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="330" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#b71c1c">② 估值过热</text>
  <text x="330" y="128" text-anchor="middle" font-size="11" fill="#555">PE/PB 远超</text>
  <text x="330" y="143" text-anchor="middle" font-size="11" fill="#555">历史均值 2 倍以上</text>
  <line x1="270" y1="158" x2="390" y2="158" stroke="#c62828" stroke-width="1" stroke-dasharray="4"/>
  <text x="330" y="173" text-anchor="middle" font-size="11" fill="#c62828">分批减仓</text>
  <text x="330" y="189" text-anchor="middle" font-size="11" fill="#c62828">落袋为安</text>

  <!-- Arrow 2 -->
  <text x="430" y="155" text-anchor="middle" font-size="20" fill="#aaa">→</text>

  <!-- Box 3: Trend breakdown -->
  <rect x="460" y="80" width="160" height="130" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="540" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">③ 趋势破位</text>
  <text x="540" y="128" text-anchor="middle" font-size="11" fill="#555">跌破关键均线</text>
  <text x="540" y="143" text-anchor="middle" font-size="11" fill="#555">或重要支撑位</text>
  <line x1="480" y1="158" x2="600" y2="158" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4"/>
  <text x="540" y="173" text-anchor="middle" font-size="11" fill="#2e7d32">纪律止损</text>
  <text x="540" y="189" text-anchor="middle" font-size="11" fill="#2e7d32">设好执行</text>

  <!-- Arrow 3 -->
  <text x="640" y="155" text-anchor="middle" font-size="20" fill="#aaa">→</text>

  <!-- Box 4: Position out of control -->
  <rect x="660" y="80" width="110" height="130" rx="10" fill="#ede7f6" stroke="#6a1b9a" stroke-width="2"/>
  <text x="715" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">④ 仓位</text>
  <text x="715" y="124" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">失控</text>
  <text x="715" y="144" text-anchor="middle" font-size="11" fill="#555">单票超上限</text>
  <text x="715" y="159" text-anchor="middle" font-size="11" fill="#555">超出心理</text>
  <text x="715" y="174" text-anchor="middle" font-size="11" fill="#555">承受能力</text>
  <text x="715" y="195" text-anchor="middle" font-size="11" fill="#6a1b9a">强制修正</text>

  <!-- Bottom decision flow -->
  <rect x="100" y="250" width="600" height="55" rx="10" fill="#fff" stroke="#37474f" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#37474f">卖出决策顺序：逻辑 &gt; 估值 &gt; 趋势 &gt; 仓位</text>
  <text x="400" y="295" text-anchor="middle" font-size="11" fill="#666">逻辑破坏时，不管是盈是亏，第一时间处理；其余三条，可分批执行</text>

  <!-- Fatal mistake box -->
  <rect x="100" y="325" width="600" height="55" rx="10" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="400" y="349" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">⚠ 散户最常见的错误</text>
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#555">该卖不卖（亏损扛着）+ 不该卖乱卖（小盈就跑）= 亏损无限 盈利有限</text>
</svg>
