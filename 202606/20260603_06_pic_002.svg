<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="480" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">逻辑破坏自查清单（买入前写，卖出时对）</text>

  <!-- Header row -->
  <rect x="30" y="55" width="740" height="36" rx="6" fill="#37474f"/>
  <text x="100" y="78" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">当初的买入理由</text>
  <line x1="200" y1="55" x2="200" y2="91" stroke="#fff" stroke-width="0.5"/>
  <text x="430" y="78" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">现在的状态检查</text>
  <line x1="650" y1="55" x2="650" y2="91" stroke="#fff" stroke-width="0.5"/>
  <text x="720" y="78" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">结论</text>

  <!-- Row 1 -->
  <rect x="30" y="91" width="740" height="48" rx="0" fill="#fff"/>
  <text x="100" y="112" text-anchor="middle" font-size="12" fill="#333">公司业绩增长逻辑</text>
  <text x="100" y="128" text-anchor="middle" font-size="11" fill="#888">（如：AI算力需求暴增）</text>
  <line x1="200" y1="91" x2="200" y2="139" stroke="#ddd"/>
  <text x="430" y="112" text-anchor="middle" font-size="12" fill="#333">业绩预告/财报/订单 是否还支持这个增速？</text>
  <text x="430" y="128" text-anchor="middle" font-size="11" fill="#888">连续两季业绩低于预期 → 逻辑开始松动</text>
  <line x1="650" y1="91" x2="650" y2="139" stroke="#ddd"/>
  <text x="720" y="116" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">减仓观察</text>
  <line x1="30" y1="139" x2="770" y2="139" stroke="#eee"/>

  <!-- Row 2 -->
  <rect x="30" y="139" width="740" height="48" fill="#f9f9f9"/>
  <text x="100" y="161" text-anchor="middle" font-size="12" fill="#333">行业政策催化逻辑</text>
  <text x="100" y="176" text-anchor="middle" font-size="11" fill="#888">（如：光伏补贴政策）</text>
  <line x1="200" y1="139" x2="200" y2="187" stroke="#ddd"/>
  <text x="430" y="161" text-anchor="middle" font-size="12" fill="#333">政策是否已退潮？行业竞争是否急剧恶化？</text>
  <text x="430" y="176" text-anchor="middle" font-size="11" fill="#888">补贴取消 / 新竞争对手大规模进入 → 逻辑破坏</text>
  <line x1="650" y1="139" x2="650" y2="187" stroke="#ddd"/>
  <text x="720" y="169" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">清仓离场</text>
  <line x1="30" y1="187" x2="770" y2="187" stroke="#eee"/>

  <!-- Row 3 -->
  <rect x="30" y="187" width="740" height="48" fill="#fff"/>
  <text x="100" y="209" text-anchor="middle" font-size="12" fill="#333">估值洼地逻辑</text>
  <text x="100" y="225" text-anchor="middle" font-size="11" fill="#888">（如：PE仅8倍历史低位）</text>
  <line x1="200" y1="187" x2="200" y2="235" stroke="#ddd"/>
  <text x="430" y="209" text-anchor="middle" font-size="12" fill="#333">股价已涨至历史均值以上？催化剂已兑现？</text>
  <text x="430" y="225" text-anchor="middle" font-size="11" fill="#888">PE从8倍修复至25倍 → 估值逻辑兑现，该考虑止盈</text>
  <line x1="650" y1="187" x2="650" y2="235" stroke="#ddd"/>
  <text x="720" y="217" text-anchor="middle" font-size="12" fill="#f57c00" font-weight="bold">止盈减仓</text>
  <line x1="30" y1="235" x2="770" y2="235" stroke="#eee"/>

  <!-- Row 4 -->
  <rect x="30" y="235" width="740" height="48" fill="#f9f9f9"/>
  <text x="100" y="257" text-anchor="middle" font-size="12" fill="#333">管理层/竞争优势逻辑</text>
  <text x="100" y="272" text-anchor="middle" font-size="11" fill="#888">（如：创始人技术壁垒）</text>
  <line x1="200" y1="235" x2="200" y2="283" stroke="#ddd"/>
  <text x="430" y="257" text-anchor="middle" font-size="12" fill="#333">核心管理层离职？专利到期？护城河是否消失？</text>
  <text x="430" y="272" text-anchor="middle" font-size="11" fill="#888">CEO突然辞职 / 核心专利被竞争对手绕过 → 考虑清仓</text>
  <line x1="650" y1="235" x2="650" y2="283" stroke="#ddd"/>
  <text x="720" y="265" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">清仓离场</text>
  <line x1="30" y1="283" x2="770" y2="283" stroke="#eee"/>

  <!-- Row 5 -->
  <rect x="30" y="283" width="740" height="48" fill="#fff"/>
  <text x="100" y="305" text-anchor="middle" font-size="12" fill="#333">市场情绪/事件驱动</text>
  <text x="100" y="320" text-anchor="middle" font-size="11" fill="#888">（如：并购预期、重组）</text>
  <line x1="200" y1="283" x2="200" y2="331" stroke="#ddd"/>
  <text x="430" y="305" text-anchor="middle" font-size="12" fill="#333">事件已落地？情绪已透支？"买预期，卖事实"?</text>
  <text x="430" y="320" text-anchor="middle" font-size="11" fill="#888">重组完成公告 → 正是情绪巅峰，往往是卖出时机</text>
  <line x1="650" y1="283" x2="650" y2="331" stroke="#ddd"/>
  <text x="720" y="313" text-anchor="middle" font-size="12" fill="#f57c00" font-weight="bold">事实后减仓</text>
  <line x1="30" y1="331" x2="770" y2="331" stroke="#eee"/>

  <!-- Bottom tips -->
  <rect x="30" y="355" width="740" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="400" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">🔑 核心操作纪律</text>
  <text x="400" y="400" text-anchor="middle" font-size="12" fill="#333">买入时，把"买入理由"写下来，存到手机备忘录</text>
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#333">每季财报后，逐条对照检查——理由还在，持有；理由消失，离场</text>
  <text x="400" y="440" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">不要用"跌了舍不得卖"代替理性判断</text>
</svg>
