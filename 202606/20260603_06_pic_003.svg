<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">估值过热 vs 趋势破位：两种卖法比较</text>

  <!-- Left panel: Valuation -->
  <rect x="30" y="55" width="355" height="320" rx="10" fill="#fff" stroke="#e53935" stroke-width="2"/>
  <rect x="30" y="55" width="355" height="40" rx="10" fill="#e53935"/>
  <text x="207" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">估值过热卖出法（主动出击）</text>

  <text x="60" y="118" font-size="12" fill="#555">适合人群：</text>
  <text x="160" y="118" font-size="12" fill="#333" font-weight="bold">持有成本低、已大幅盈利</text>

  <text x="60" y="145" font-size="12" fill="#555">触发条件：</text>
  <text x="60" y="163" font-size="11" fill="#555">· 当前PE &gt; 历史均值 ×2</text>
  <text x="60" y="180" font-size="11" fill="#555">· PB超过历史80%分位</text>
  <text x="60" y="197" font-size="11" fill="#555">· 全市场情绪极度亢奋（成交量创历史峰值）</text>
  <text x="60" y="214" font-size="11" fill="#555">· 分析师一致唱多、媒体频繁报道</text>

  <line x1="50" y1="228" x2="368" y2="228" stroke="#eee"/>
  <text x="60" y="248" font-size="12" fill="#555">操作方式：</text>
  <text x="60" y="266" font-size="11" fill="#333">分批减仓，不必等到最高点</text>
  <text x="60" y="283" font-size="11" fill="#888">· 达到目标估值卖 1/3</text>
  <text x="60" y="299" font-size="11" fill="#888">· 再涨 20% 卖 1/3</text>
  <text x="60" y="315" font-size="11" fill="#888">· 留最后 1/3 让利润继续跑</text>

  <rect x="50" y="332" width="315" height="30" rx="6" fill="#ffebee"/>
  <text x="207" y="352" text-anchor="middle" font-size="11" fill="#c62828">核心：赚的是估值回归的钱，不等最高点</text>

  <!-- Right panel: Trend -->
  <rect x="415" y="55" width="355" height="320" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <rect x="415" y="55" width="355" height="40" rx="10" fill="#2e7d32"/>
  <text x="592" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">趋势破位卖出法（纪律止损）</text>

  <text x="445" y="118" font-size="12" fill="#555">适合人群：</text>
  <text x="545" y="118" font-size="12" fill="#333" font-weight="bold">技术面导向、波段操作者</text>

  <text x="445" y="145" font-size="12" fill="#555">触发条件：</text>
  <text x="445" y="163" font-size="11" fill="#555">· 收盘价跌破 20 日均线（短线参考）</text>
  <text x="445" y="180" font-size="11" fill="#555">· 跌破前期重要低点或支撑平台</text>
  <text x="445" y="197" font-size="11" fill="#555">· 头肩顶、双顶等顶部形态确认</text>
  <text x="445" y="214" font-size="11" fill="#555">· 跌破买入时设定的止损位</text>

  <line x1="430" y1="228" x2="755" y2="228" stroke="#eee"/>
  <text x="445" y="248" font-size="12" fill="#555">操作方式：</text>
  <text x="445" y="266" font-size="11" fill="#333">买入前提前写好止损价，触发时不犹豫</text>
  <text x="445" y="283" font-size="11" fill="#888">· 买入价 -8% 为初始止损参考</text>
  <text x="445" y="299" font-size="11" fill="#888">· 上涨后移动止损（成本 +10% 时改止损为成本价）</text>
  <text x="445" y="315" font-size="11" fill="#888">· 跳空低开超 5%，直接执行，不等反弹</text>

  <rect x="435" y="332" width="315" height="30" rx="6" fill="#e8f5e9"/>
  <text x="592" y="352" text-anchor="middle" font-size="11" fill="#2e7d32">核心：设好规则提前写，执行靠纪律不靠感觉</text>
</svg>
