<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">仓位失控：什么情况必须强制减仓</text>

  <!-- Left: Pyramid -->
  <text x="200" y="68" text-anchor="middle" font-size="13" fill="#666">健康仓位结构（金字塔型）</text>

  <!-- Pyramid blocks -->
  <!-- Bottom: core -->
  <rect x="60" y="280" width="280" height="45" rx="4" fill="#1565c0"/>
  <text x="200" y="307" text-anchor="middle" font-size="12" fill="#fff">核心宽基 ETF（40-50%）稳定压舱</text>

  <!-- Middle: satellite -->
  <rect x="100" y="225" width="200" height="50" rx="4" fill="#1976d2"/>
  <text x="200" y="252" text-anchor="middle" font-size="12" fill="#fff">行业/个股（25-30%）卫星仓</text>

  <!-- Top: trial -->
  <rect x="140" y="175" width="120" height="45" rx="4" fill="#42a5f5"/>
  <text x="200" y="200" text-anchor="middle" font-size="12" fill="#fff">试错仓（5-10%）</text>

  <!-- Top tip: cash -->
  <rect x="160" y="135" width="80" height="35" rx="4" fill="#90caf9"/>
  <text x="200" y="158" text-anchor="middle" font-size="11" fill="#333">现金（20%）</text>

  <!-- Right: danger signals -->
  <rect x="420" y="60" width="340" height="280" rx="10" fill="#fff" stroke="#ef9a9a" stroke-width="1.5"/>
  <rect x="420" y="60" width="340" height="38" rx="10" fill="#c62828"/>
  <text x="590" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">⚠ 仓位失控的四个预警信号</text>

  <!-- Signal 1 -->
  <rect x="435" y="112" width="310" height="48" rx="6" fill="#ffebee"/>
  <text x="445" y="132" font-size="12" font-weight="bold" fill="#c62828">单只个股超过总仓位 20%</text>
  <text x="445" y="150" font-size="11" fill="#666">该票大跌 30% 就让整个账户损失 6%，风险过度集中</text>

  <!-- Signal 2 -->
  <rect x="435" y="170" width="310" height="48" rx="6" fill="#fff3e0"/>
  <text x="445" y="190" font-size="12" font-weight="bold" fill="#e65100">某只票亏损额已超心理承受极限</text>
  <text x="445" y="208" font-size="11" fill="#666">开始影响睡眠和情绪 → 仓位超过自己的风险阈值</text>

  <!-- Signal 3 -->
  <rect x="435" y="228" width="310" height="48" rx="6" fill="#e8f5e9"/>
  <text x="445" y="248" font-size="12" font-weight="bold" fill="#2e7d32">总仓位超过 80%，无现金缓冲</text>
  <text x="445" y="266" font-size="11" fill="#666">遇到急跌无法加仓，且亏损直接影响流动性</text>

  <!-- Signal 4 -->
  <rect x="435" y="286" width="310" height="48" rx="6" fill="#ede7f6"/>
  <text x="445" y="306" font-size="12" font-weight="bold" fill="#6a1b9a">同一行业持仓超过 30%</text>
  <text x="445" y="324" font-size="11" fill="#666">一个行业政策/周期风险会同时打击所有持仓</text>
</svg>
