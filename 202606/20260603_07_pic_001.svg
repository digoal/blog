<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">散户卖出决策的两种状态</text>
  
  <!-- Left Panel: 有卖出规则 -->
  <rect x="40" y="60" width="330" height="320" fill="#e8f5e9" rx="10" stroke="#4caf50" stroke-width="2"/>
  <text x="205" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">✅ 提前写好卖出规则</text>
  
  <!-- Timeline boxes left -->
  <rect x="65" y="110" width="280" height="50" fill="#fff" rx="8" stroke="#81c784" stroke-width="1.5"/>
  <text x="205" y="130" text-anchor="middle" font-size="13" fill="#333">买入时就写好：</text>
  <text x="205" y="148" text-anchor="middle" font-size="12" fill="#555">止损线 -8%｜止盈目标 +20%</text>
  
  <text x="205" y="180" text-anchor="middle" font-size="20" fill="#999">↓</text>
  
  <rect x="65" y="190" width="280" height="50" fill="#fff" rx="8" stroke="#81c784" stroke-width="1.5"/>
  <text x="205" y="210" text-anchor="middle" font-size="13" fill="#333">股价下跌 -8% 触发止损</text>
  <text x="205" y="228" text-anchor="middle" font-size="12" fill="#e53935">→ 按计划卖出，不犹豫</text>
  
  <text x="205" y="260" text-anchor="middle" font-size="20" fill="#999">↓</text>
  
  <rect x="65" y="270" width="280" height="60" fill="#c8e6c9" rx="8" stroke="#4caf50" stroke-width="1.5"/>
  <text x="205" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">结果：</text>
  <text x="205" y="312" text-anchor="middle" font-size="12" fill="#2e7d32">单次亏 8%，剩余资金完好</text>
  <text x="205" y="330" text-anchor="middle" font-size="12" fill="#2e7d32">可以等下一次好机会</text>
  
  <text x="205" y="362" text-anchor="middle" font-size="13" fill="#388e3c">🎯 理性决策，保住本金</text>

  <!-- Right Panel: 无卖出规则 -->
  <rect x="430" y="60" width="330" height="320" fill="#ffebee" rx="10" stroke="#ef5350" stroke-width="2"/>
  <text x="595" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">❌ 没有提前写卖出规则</text>
  
  <rect x="455" y="110" width="280" height="50" fill="#fff" rx="8" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="595" y="130" text-anchor="middle" font-size="13" fill="#333">买入时凭感觉：</text>
  <text x="595" y="148" text-anchor="middle" font-size="12" fill="#555">"跌了等回来，涨了再说"</text>
  
  <text x="595" y="180" text-anchor="middle" font-size="20" fill="#999">↓</text>
  
  <rect x="455" y="190" width="280" height="50" fill="#fff" rx="8" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="595" y="210" text-anchor="middle" font-size="13" fill="#333">股价下跌 -8%，情绪接管</text>
  <text x="595" y="228" text-anchor="middle" font-size="12" fill="#e53935">→ "再跌就割，等等先"</text>
  
  <text x="595" y="260" text-anchor="middle" font-size="20" fill="#999">↓</text>
  
  <rect x="455" y="270" width="280" height="60" fill="#ffcdd2" rx="8" stroke="#ef5350" stroke-width="1.5"/>
  <text x="595" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">结果：</text>
  <text x="595" y="312" text-anchor="middle" font-size="12" fill="#c62828">越跌越扛，从 -8% 亏到 -30%</text>
  <text x="595" y="330" text-anchor="middle" font-size="12" fill="#c62828">甚至 -50%，被深度套牢</text>
  
  <text x="595" y="362" text-anchor="middle" font-size="13" fill="#e53935">💸 情绪决策，越陷越深</text>
</svg>
