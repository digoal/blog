<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">四种止损 × 三种止盈 全景图</text>

  <!-- 止损部分 -->
  <text x="30" y="70" font-size="15" font-weight="bold" fill="#c62828">【止损：控制亏损下限】</text>

  <!-- 价格止损 -->
  <rect x="20" y="80" width="180" height="110" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
  <text x="110" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">价格止损</text>
  <text x="110" y="122" text-anchor="middle" font-size="11" fill="#555">买入后跌幅达到</text>
  <text x="110" y="138" text-anchor="middle" font-size="11" fill="#555">预设比例即卖出</text>
  <text x="110" y="158" text-anchor="middle" font-size="12" fill="#e65100">典型：-8% 强制出</text>
  <text x="110" y="178" text-anchor="middle" font-size="11" fill="#777">优点：机械执行简单</text>

  <!-- 逻辑止损 -->
  <rect x="215" y="80" width="180" height="110" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
  <text x="305" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">逻辑止损</text>
  <text x="305" y="122" text-anchor="middle" font-size="11" fill="#555">买入理由不再成立</text>
  <text x="305" y="138" text-anchor="middle" font-size="11" fill="#555">不管涨跌都应卖出</text>
  <text x="305" y="158" text-anchor="middle" font-size="12" fill="#e65100">典型：核心业务变坏</text>
  <text x="305" y="178" text-anchor="middle" font-size="11" fill="#777">优点：避免持有烂股</text>

  <!-- 技术止损 -->
  <rect x="410" y="80" width="180" height="110" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
  <text x="500" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">技术止损</text>
  <text x="500" y="122" text-anchor="middle" font-size="11" fill="#555">跌破关键支撑位</text>
  <text x="500" y="138" text-anchor="middle" font-size="11" fill="#555">趋势结构被破坏</text>
  <text x="500" y="158" text-anchor="middle" font-size="12" fill="#e65100">典型：跌破均线/低点</text>
  <text x="500" y="178" text-anchor="middle" font-size="11" fill="#777">优点：止损点有依据</text>

  <!-- 时间止损 -->
  <rect x="605" y="80" width="180" height="110" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
  <text x="695" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">时间止损</text>
  <text x="695" y="122" text-anchor="middle" font-size="11" fill="#555">持有超过预期时间</text>
  <text x="695" y="138" text-anchor="middle" font-size="11" fill="#555">股价毫无动静即卖</text>
  <text x="695" y="158" text-anchor="middle" font-size="12" fill="#e65100">典型：3个月没涨就出</text>
  <text x="695" y="178" text-anchor="middle" font-size="11" fill="#777">优点：释放资金效率</text>

  <!-- 分隔线 -->
  <line x1="20" y1="215" x2="780" y2="215" stroke="#ddd" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 止盈部分 -->
  <text x="30" y="242" font-size="15" font-weight="bold" fill="#1b5e20">【止盈：锁定利润上限】</text>

  <!-- 目标止盈 -->
  <rect x="110" y="255" width="180" height="120" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
  <text x="200" y="277" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">目标止盈</text>
  <text x="200" y="297" text-anchor="middle" font-size="11" fill="#555">买入前设好盈利目标</text>
  <text x="200" y="313" text-anchor="middle" font-size="11" fill="#555">达到就分批兑现</text>
  <text x="200" y="333" text-anchor="middle" font-size="12" fill="#2e7d32">典型：+20%减半仓</text>
  <text x="200" y="352" text-anchor="middle" font-size="11" fill="#777">+30%再清剩余</text>

  <!-- 估值止盈 -->
  <rect x="310" y="255" width="180" height="120" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
  <text x="400" y="277" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">估值止盈</text>
  <text x="400" y="297" text-anchor="middle" font-size="11" fill="#555">PE/PB 进入历史高位</text>
  <text x="400" y="313" text-anchor="middle" font-size="11" fill="#555">市场明显高估时减仓</text>
  <text x="400" y="333" text-anchor="middle" font-size="12" fill="#2e7d32">典型：PE超历史90%分位</text>
  <text x="400" y="352" text-anchor="middle" font-size="11" fill="#777">需要学会基本估值判断</text>

  <!-- 趋势止盈 -->
  <rect x="510" y="255" width="180" height="120" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
  <text x="600" y="277" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">趋势止盈</text>
  <text x="600" y="297" text-anchor="middle" font-size="11" fill="#555">上涨趋势破位时减仓</text>
  <text x="600" y="313" text-anchor="middle" font-size="11" fill="#555">不追顶部，只走趋势</text>
  <text x="600" y="333" text-anchor="middle" font-size="12" fill="#2e7d32">典型：跌破20日均线减仓</text>
  <text x="600" y="352" text-anchor="middle" font-size="11" fill="#777">适合趋势交易风格</text>

  <!-- 底部说明 -->
  <rect x="20" y="400" width="760" height="45" fill="#e3f2fd" rx="8"/>
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#1565c0">💡 小白建议：止损首选【价格止损 + 逻辑止损】双触发；止盈首选【目标止盈】，简单可执行</text>
  <text x="400" y="438" text-anchor="middle" font-size="11" fill="#1976d2">两种止损都触发时，以更早触发的为准；止盈分两次执行，不要一次全清</text>
</svg>
