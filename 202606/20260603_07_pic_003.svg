<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#f8f9fa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">个股持仓卖出决策树</text>

  <!-- 起点 -->
  <rect x="310" y="55" width="180" height="45" fill="#1565c0" rx="8"/>
  <text x="400" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">我持有一只股票</text>
  <text x="400" y="91" text-anchor="middle" font-size="12" fill="#bbdefb">现在需要做决定</text>

  <line x1="400" y1="100" x2="400" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 问题1 -->
  <polygon points="400,130 530,165 400,200 270,165" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" font-size="12" fill="#e65100">买入理由还成立吗？</text>
  <text x="400" y="178" text-anchor="middle" font-size="11" fill="#795548">（基本面 / 逻辑）</text>

  <!-- 否 分支 左 -->
  <line x1="270" y1="165" x2="130" y2="165" stroke="#e53935" stroke-width="2"/>
  <text x="200" y="158" text-anchor="middle" font-size="11" fill="#e53935">逻辑破了</text>
  <rect x="50" y="185" width="160" height="50" fill="#ffcdd2" rx="8" stroke="#ef5350" stroke-width="2"/>
  <text x="130" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">⚡ 逻辑止损</text>
  <text x="130" y="225" text-anchor="middle" font-size="11" fill="#c62828">不管涨跌，卖出</text>

  <!-- 是 分支 右 -->
  <line x1="400" y1="200" x2="400" y2="230" stroke="#666" stroke-width="2"/>
  <text x="415" y="220" font-size="11" fill="#2e7d32">逻辑还在</text>

  <!-- 问题2 -->
  <polygon points="400,230 530,265 400,300 270,265" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="12" fill="#e65100">价格触发止损线了吗？</text>
  <text x="400" y="277" text-anchor="middle" font-size="11" fill="#795548">（跌幅超过 -8%？）</text>

  <!-- 是 分支 左 -->
  <line x1="270" y1="265" x2="130" y2="265" stroke="#e53935" stroke-width="2"/>
  <text x="200" y="258" text-anchor="middle" font-size="11" fill="#e53935">已触发</text>
  <rect x="50" y="285" width="160" height="50" fill="#ffcdd2" rx="8" stroke="#ef5350" stroke-width="2"/>
  <text x="130" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">⚡ 价格止损</text>
  <text x="130" y="325" text-anchor="middle" font-size="11" fill="#c62828">按计划卖出，不拖</text>

  <!-- 未触发 分支 右 -->
  <line x1="400" y1="300" x2="400" y2="330" stroke="#666" stroke-width="2"/>
  <text x="415" y="320" font-size="11" fill="#2e7d32">未触发</text>

  <!-- 问题3 -->
  <polygon points="400,330 530,365 400,400 270,365" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="358" text-anchor="middle" font-size="12" fill="#e65100">达到止盈目标了吗？</text>
  <text x="400" y="378" text-anchor="middle" font-size="11" fill="#795548">（涨幅达到预设目标？）</text>

  <!-- 是 分支 右 -->
  <line x1="530" y1="365" x2="660" y2="365" stroke="#2e7d32" stroke-width="2"/>
  <text x="595" y="358" text-anchor="middle" font-size="11" fill="#2e7d32">达到了</text>
  <rect x="620" y="340" width="155" height="50" fill="#c8e6c9" rx="8" stroke="#4caf50" stroke-width="2"/>
  <text x="697" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">🎯 目标止盈</text>
  <text x="697" y="380" text-anchor="middle" font-size="11" fill="#2e7d32">分批兑现利润</text>

  <!-- 否 分支 下 -->
  <line x1="400" y1="400" x2="400" y2="430" stroke="#666" stroke-width="2"/>
  <text x="415" y="420" font-size="11" fill="#555">未达到</text>
  <rect x="300" y="435" width="200" height="45" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
  <text x="400" y="455" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">✅ 继续持有</text>
  <text x="400" y="472" text-anchor="middle" font-size="11" fill="#1565c0">等待触发条件，不乱动</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#666"/>
    </marker>
  </defs>
</svg>
