<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">散户个股仓位三层防护结构</text>

  <!-- 第一层：总股票仓位 -->
  <rect x="50" y="60" width="700" height="80" fill="#e8f4fd" rx="8" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5f8a">第一层：总股票仓位上限</text>
  <text x="400" y="115" text-anchor="middle" font-size="13" fill="#2c5f8a">根据市场环境设定（牛市≤80%  震荡市≤50%  熊市≤20%）</text>
  <text x="400" y="133" text-anchor="middle" font-size="11" fill="#5a7fa0">总股票仓位 = 所有个股持仓 ÷ 总资产</text>

  <!-- 第二层：行业上限 -->
  <rect x="80" y="160" width="640" height="80" fill="#fef3e2" rx="8" stroke="#e8a020" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a5a10">第二层：单一行业仓位上限</text>
  <text x="400" y="213" text-anchor="middle" font-size="13" fill="#8a5a10">散户建议：单行业不超过股票仓位的 30%</text>
  <text x="400" y="231" text-anchor="middle" font-size="11" fill="#a07030">例：股票仓位50万，单行业≤15万</text>

  <!-- 第三层：单票上限 -->
  <rect x="110" y="260" width="580" height="80" fill="#fde8e8" rx="8" stroke="#d94a4a" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a2020">第三层：单只个股仓位上限</text>
  <text x="400" y="313" text-anchor="middle" font-size="13" fill="#8a2020">散户建议：单只个股不超过股票仓位的 15%~20%</text>
  <text x="400" y="331" text-anchor="middle" font-size="11" fill="#a03030">研究越深、确信度越高，上限可适当放宽，但最高不超过30%</text>

  <!-- 底部说明 -->
  <rect x="50" y="358" width="700" height="48" fill="#f0f0f0" rx="6"/>
  <text x="400" y="378" text-anchor="middle" font-size="12" fill="#555">结构记忆：总仓 → 行业仓 → 个股仓，每一层都要先设上限</text>
  <text x="400" y="396" text-anchor="middle" font-size="11" fill="#777">三层都守住 = 单股暴雷不致命  行业崩盘可承受  整体回撤可控</text>

  <!-- 箭头 -->
  <line x1="400" y1="140" x2="400" y2="160" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="240" x2="400" y2="260" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#999"/>
    </marker>
  </defs>
</svg>
