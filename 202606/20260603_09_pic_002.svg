<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">集中 vs 分散：两个极端的代价</text>

  <!-- 极端集中 -->
  <rect x="40" y="60" width="330" height="280" fill="#fff" rx="8" stroke="#e74c3c" stroke-width="2"/>
  <rect x="40" y="60" width="330" height="44" fill="#e74c3c" rx="8"/>
  <rect x="40" y="88" width="330" height="16" fill="#e74c3c"/>
  <text x="205" y="87" text-anchor="middle" font-size="15" font-weight="bold" fill="white">❌ 极端集中（单票80%+）</text>

  <text x="205" y="130" text-anchor="middle" font-size="12" fill="#333">A股个股年均最大回撤中位数：</text>
  <text x="205" y="150" text-anchor="middle" font-size="22" font-weight="bold" fill="#e74c3c">-40% ~ -60%</text>
  <text x="205" y="175" text-anchor="middle" font-size="11" fill="#666">（非ST类个股，2015-2024统计）</text>

  <line x1="60" y1="195" x2="350" y2="195" stroke="#eee" stroke-width="1"/>

  <text x="205" y="218" text-anchor="middle" font-size="12" fill="#333">若总资产100万，单票80万：</text>
  <text x="205" y="240" text-anchor="middle" font-size="13" fill="#e74c3c">股票跌50% → 总资产只剩 60万</text>
  <text x="205" y="262" text-anchor="middle" font-size="13" fill="#e74c3c">跌幅40%，需涨67%才能回本</text>

  <line x1="60" y1="280" x2="350" y2="280" stroke="#eee" stroke-width="1"/>
  <text x="205" y="305" text-anchor="middle" font-size="11" fill="#888">典型案例：2021年教育股政策崩盘</text>
  <text x="205" y="323" text-anchor="middle" font-size="11" fill="#888">新东方当年最大回撤超过90%</text>
  <text x="205" y="341" text-anchor="middle" font-size="11" fill="#c0392b">满仓者几乎清零</text>

  <!-- 合理分散 -->
  <rect x="430" y="60" width="330" height="280" fill="#fff" rx="8" stroke="#27ae60" stroke-width="2"/>
  <rect x="430" y="60" width="330" height="44" fill="#27ae60" rx="8"/>
  <rect x="430" y="88" width="330" height="16" fill="#27ae60"/>
  <text x="595" y="87" text-anchor="middle" font-size="15" font-weight="bold" fill="white">✅ 合理分散（单票≤15%）</text>

  <text x="595" y="130" text-anchor="middle" font-size="12" fill="#333">假设持7只个股，其中1只暴雷跌70%：</text>
  <text x="595" y="155" text-anchor="middle" font-size="22" font-weight="bold" fill="#27ae60">总资产损失约 10%</text>
  <text x="595" y="178" text-anchor="middle" font-size="11" fill="#666">（仅占15%仓位 × 跌70% = 损失10.5%）</text>

  <line x1="450" y1="195" x2="740" y2="195" stroke="#eee" stroke-width="1"/>

  <text x="595" y="218" text-anchor="middle" font-size="12" fill="#333">同样100万总资产：</text>
  <text x="595" y="240" text-anchor="middle" font-size="13" fill="#27ae60">1只崩盘 → 总资产约剩90万</text>
  <text x="595" y="262" text-anchor="middle" font-size="13" fill="#27ae60">其余6只只要平均涨11%即可弥补</text>

  <line x1="450" y1="280" x2="740" y2="280" stroke="#eee" stroke-width="1"/>
  <text x="595" y="305" text-anchor="middle" font-size="11" fill="#888">合理分散后：</text>
  <text x="595" y="323" text-anchor="middle" font-size="11" fill="#27ae60">任何一只「黑天鹅」都不会要命</text>
  <text x="595" y="341" text-anchor="middle" font-size="11" fill="#27ae60">继续持有，等待其他持仓修复</text>
</svg>
