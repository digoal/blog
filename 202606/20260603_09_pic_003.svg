<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">三种分批买入方式对比</text>

  <!-- 标题行 -->
  <rect x="30" y="55" width="220" height="36" fill="#2c3e50" rx="4"/>
  <rect x="260" y="55" width="220" height="36" fill="#2c3e50" rx="4"/>
  <rect x="490" y="55" width="280" height="36" fill="#2c3e50" rx="4"/>
  <text x="140" y="78" text-anchor="middle" font-size="13" fill="white" font-weight="bold">方式</text>
  <text x="370" y="78" text-anchor="middle" font-size="13" fill="white" font-weight="bold">适用场景</text>
  <text x="630" y="78" text-anchor="middle" font-size="13" fill="white" font-weight="bold">核心优缺点</text>

  <!-- 左侧买 -->
  <rect x="30" y="95" width="220" height="100" fill="#e8f4fd" rx="4" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5f8a">左侧买入</text>
  <text x="140" y="143" text-anchor="middle" font-size="11" fill="#2c5f8a">（主动抄底，价格还</text>
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#2c5f8a">在下跌时买）</text>
  <text x="140" y="183" text-anchor="middle" font-size="11" fill="#888">价格更低，但可能</text>
  <text x="140" y="196" text-anchor="middle" font-size="11" fill="#888">"接飞刀"</text>

  <rect x="260" y="95" width="220" height="100" fill="#e8f4fd" rx="4" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="370" y="120" text-anchor="middle" font-size="11" fill="#333">• 基本面逻辑清晰</text>
  <text x="370" y="140" text-anchor="middle" font-size="11" fill="#333">• 下跌原因可识别</text>
  <text x="370" y="160" text-anchor="middle" font-size="11" fill="#333">• 有充足研究支撑</text>
  <text x="370" y="180" text-anchor="middle" font-size="11" fill="#c0392b">⚠ 不适合新手，亏损</text>
  <text x="370" y="195" text-anchor="middle" font-size="11" fill="#c0392b">容忍度要高</text>

  <rect x="490" y="95" width="280" height="100" fill="#e8f4fd" rx="4" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="630" y="120" text-anchor="middle" font-size="11" fill="#333">✅ 均价更优，潜在收益高</text>
  <text x="630" y="140" text-anchor="middle" font-size="11" fill="#333">❌ 账面浮亏期间心理压力大</text>
  <text x="630" y="160" text-anchor="middle" font-size="11" fill="#333">❌ 若基本面变坏，越买越亏</text>
  <text x="630" y="180" text-anchor="middle" font-size="11" fill="#666">关键前提：必须有止损线</text>

  <!-- 右侧买 -->
  <rect x="30" y="205" width="220" height="100" fill="#fef3e2" rx="4" stroke="#e8a020" stroke-width="1.5"/>
  <text x="140" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a5a10">右侧买入</text>
  <text x="140" y="253" text-anchor="middle" font-size="11" fill="#8a5a10">（趋势确认后买，价格</text>
  <text x="140" y="270" text-anchor="middle" font-size="11" fill="#8a5a10">已经在上涨中）</text>
  <text x="140" y="293" text-anchor="middle" font-size="11" fill="#888">确认性强，成功率</text>
  <text x="140" y="306" text-anchor="middle" font-size="11" fill="#888">更高</text>

  <rect x="260" y="205" width="220" height="100" fill="#fef3e2" rx="4" stroke="#e8a020" stroke-width="1.5"/>
  <text x="370" y="230" text-anchor="middle" font-size="11" fill="#333">• 趋势已经扭转</text>
  <text x="370" y="250" text-anchor="middle" font-size="11" fill="#333">• 成交量配合放大</text>
  <text x="370" y="270" text-anchor="middle" font-size="11" fill="#333">• 基本面有改善信号</text>
  <text x="370" y="290" text-anchor="middle" font-size="11" fill="#27ae60">✅ 更适合新手入门</text>

  <rect x="490" y="205" width="280" height="100" fill="#fef3e2" rx="4" stroke="#e8a020" stroke-width="1.5"/>
  <text x="630" y="230" text-anchor="middle" font-size="11" fill="#333">✅ 确认度高，心理压力小</text>
  <text x="630" y="250" text-anchor="middle" font-size="11" fill="#333">✅ 趋势可持续，持有更舒适</text>
  <text x="630" y="270" text-anchor="middle" font-size="11" fill="#333">❌ 买入均价偏高</text>
  <text x="630" y="290" text-anchor="middle" font-size="11" fill="#333">❌ 追涨过猛时风险大</text>

  <!-- 定投 -->
  <rect x="30" y="315" width="220" height="100" fill="#e8fde8" rx="4" stroke="#27ae60" stroke-width="1.5"/>
  <text x="140" y="342" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6b1a">定期定量</text>
  <text x="140" y="363" text-anchor="middle" font-size="11" fill="#1a6b1a">（不管价格高低，按</text>
  <text x="140" y="380" text-anchor="middle" font-size="11" fill="#1a6b1a">计划买）</text>
  <text x="140" y="403" text-anchor="middle" font-size="11" fill="#888">最省心，适合长</text>
  <text x="140" y="416" text-anchor="middle" font-size="11" fill="#888">期配置</text>

  <rect x="260" y="315" width="220" height="100" fill="#e8fde8" rx="4" stroke="#27ae60" stroke-width="1.5"/>
  <text x="370" y="340" text-anchor="middle" font-size="11" fill="#333">• 不确定什么时候便宜</text>
  <text x="370" y="360" text-anchor="middle" font-size="11" fill="#333">• 看好长期逻辑</text>
  <text x="370" y="380" text-anchor="middle" font-size="11" fill="#333">• 时间充裕不急于套利</text>
  <text x="370" y="400" text-anchor="middle" font-size="11" fill="#27ae60">✅ 小白首选策略</text>

  <rect x="490" y="315" width="280" height="100" fill="#e8fde8" rx="4" stroke="#27ae60" stroke-width="1.5"/>
  <text x="630" y="340" text-anchor="middle" font-size="11" fill="#333">✅ 平均成本，降低踏错时机风险</text>
  <text x="630" y="360" text-anchor="middle" font-size="11" fill="#333">✅ 不需要预测涨跌，执行难度低</text>
  <text x="630" y="380" text-anchor="middle" font-size="11" fill="#333">❌ 牛市初期建仓慢</text>
  <text x="630" y="400" text-anchor="middle" font-size="11" fill="#333">❌ 熊市末期也要继续买才有效</text>

  <!-- 说明线 -->
  <line x1="250" y1="55" x2="250" y2="420" stroke="#ddd" stroke-width="1"/>
  <line x1="480" y1="55" x2="480" y2="420" stroke="#ddd" stroke-width="1"/>
</svg>
