<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#fafafa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0392b">A股个股五大雷区地图</text>

  <!-- 五个雷区块 -->
  <!-- ST/退市 -->
  <rect x="30" y="60" width="140" height="320" rx="10" fill="#fdecea"/>
  <text x="100" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">☠️ ST/退市</text>
  <line x1="50" y1="100" x2="150" y2="100" stroke="#e57373" stroke-width="1"/>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="#555">连亏2年→ST</text>
  <text x="100" y="140" text-anchor="middle" font-size="11" fill="#555">连亏3年→退市</text>
  <text x="100" y="165" text-anchor="middle" font-size="11" fill="#555">净资产为负</text>
  <text x="100" y="185" text-anchor="middle" font-size="11" fill="#555">→ *ST</text>
  <text x="100" y="215" text-anchor="middle" font-size="11" fill="#e53935">⚡ 触发信号：</text>
  <text x="100" y="235" text-anchor="middle" font-size="10" fill="#777">连续三年亏损</text>
  <text x="100" y="252" text-anchor="middle" font-size="10" fill="#777">净资产转负</text>
  <text x="100" y="269" text-anchor="middle" font-size="10" fill="#777">审计意见非标</text>
  <rect x="50" y="320" width="100" height="30" rx="6" fill="#e53935"/>
  <text x="100" y="340" text-anchor="middle" font-size="11" fill="white" font-weight="bold">绕道走</text>

  <!-- 财务造假 -->
  <rect x="185" y="60" width="140" height="320" rx="10" fill="#fff3e0"/>
  <text x="255" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">🎭 财务造假</text>
  <line x1="205" y1="100" x2="305" y2="100" stroke="#ffb74d" stroke-width="1"/>
  <text x="255" y="120" text-anchor="middle" font-size="11" fill="#555">虚增收入</text>
  <text x="255" y="140" text-anchor="middle" font-size="11" fill="#555">虚减费用</text>
  <text x="255" y="165" text-anchor="middle" font-size="11" fill="#555">关联交易</text>
  <text x="255" y="185" text-anchor="middle" font-size="11" fill="#555">粉饰报表</text>
  <text x="255" y="215" text-anchor="middle" font-size="11" fill="#e65100">⚡ 触发信号：</text>
  <text x="255" y="235" text-anchor="middle" font-size="10" fill="#777">利润高,现金流低</text>
  <text x="255" y="252" text-anchor="middle" font-size="10" fill="#777">应收账款暴增</text>
  <text x="255" y="269" text-anchor="middle" font-size="10" fill="#777">审计机构换了</text>
  <rect x="205" y="320" width="100" height="30" rx="6" fill="#e65100"/>
  <text x="255" y="340" text-anchor="middle" font-size="11" fill="white" font-weight="bold">重点排查</text>

  <!-- 高质押 -->
  <rect x="340" y="60" width="140" height="320" rx="10" fill="#e8f5e9"/>
  <text x="410" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">💣 高质押</text>
  <line x1="360" y1="100" x2="460" y2="100" stroke="#81c784" stroke-width="1"/>
  <text x="410" y="120" text-anchor="middle" font-size="11" fill="#555">大股东质押</text>
  <text x="410" y="140" text-anchor="middle" font-size="11" fill="#555">股份给银行</text>
  <text x="410" y="165" text-anchor="middle" font-size="11" fill="#555">跌破平仓线</text>
  <text x="410" y="185" text-anchor="middle" font-size="11" fill="#555">→ 被强平</text>
  <text x="410" y="215" text-anchor="middle" font-size="11" fill="#2e7d32">⚡ 触发信号：</text>
  <text x="410" y="235" text-anchor="middle" font-size="10" fill="#777">质押率>60%</text>
  <text x="410" y="252" text-anchor="middle" font-size="10" fill="#777">大股东频繁减持</text>
  <text x="410" y="269" text-anchor="middle" font-size="10" fill="#777">公告质押增加</text>
  <rect x="360" y="320" width="100" height="30" rx="6" fill="#388e3c"/>
  <text x="410" y="340" text-anchor="middle" font-size="11" fill="white" font-weight="bold">保持警惕</text>

  <!-- 高商誉 -->
  <rect x="495" y="60" width="140" height="320" rx="10" fill="#ede7f6"/>
  <text x="565" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#4527a0">💰 高商誉</text>
  <line x1="515" y1="100" x2="615" y2="100" stroke="#9575cd" stroke-width="1"/>
  <text x="565" y="120" text-anchor="middle" font-size="11" fill="#555">并购溢价</text>
  <text x="565" y="140" text-anchor="middle" font-size="11" fill="#555">形成商誉</text>
  <text x="565" y="165" text-anchor="middle" font-size="11" fill="#555">业绩变差→</text>
  <text x="565" y="185" text-anchor="middle" font-size="11" fill="#555">商誉减值</text>
  <text x="565" y="215" text-anchor="middle" font-size="11" fill="#4527a0">⚡ 触发信号：</text>
  <text x="565" y="235" text-anchor="middle" font-size="10" fill="#777">商誉/净资产>50%</text>
  <text x="565" y="252" text-anchor="middle" font-size="10" fill="#777">被并购方业绩差</text>
  <text x="565" y="269" text-anchor="middle" font-size="10" fill="#777">频繁做大额并购</text>
  <rect x="515" y="320" width="100" height="30" rx="6" fill="#512da8"/>
  <text x="565" y="340" text-anchor="middle" font-size="11" fill="white" font-weight="bold">查净资产比</text>

  <!-- 流动性陷阱 -->
  <rect x="650" y="60" width="120" height="320" rx="10" fill="#e3f2fd"/>
  <text x="710" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">🔒 流动性陷阱</text>
  <line x1="665" y1="100" x2="755" y2="100" stroke="#64b5f6" stroke-width="1"/>
  <text x="710" y="120" text-anchor="middle" font-size="11" fill="#555">日成交额极低</text>
  <text x="710" y="140" text-anchor="middle" font-size="11" fill="#555">买卖价差大</text>
  <text x="710" y="165" text-anchor="middle" font-size="11" fill="#555">跌停时</text>
  <text x="710" y="185" text-anchor="middle" font-size="11" fill="#555">卖不出去</text>
  <text x="710" y="215" text-anchor="middle" font-size="11" fill="#0d47a1">⚡ 触发信号：</text>
  <text x="710" y="235" text-anchor="middle" font-size="10" fill="#777">日均成交&lt;1000万</text>
  <text x="710" y="252" text-anchor="middle" font-size="10" fill="#777">市值&lt;5亿</text>
  <text x="710" y="269" text-anchor="middle" font-size="10" fill="#777">换手率持续极低</text>
  <rect x="665" y="320" width="90" height="30" rx="6" fill="#1565c0"/>
  <text x="710" y="340" text-anchor="middle" font-size="11" fill="white" font-weight="bold">小心陷阱</text>

  <!-- 底部文字 -->
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#999">* 以上五类风险可叠加出现，一旦同时触及多个信号，风险成倍放大</text>
</svg>
