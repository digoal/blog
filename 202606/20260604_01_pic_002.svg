<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#fafafa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#4527a0">商誉炸弹的引爆路径</text>

  <!-- 步骤框 -->
  <!-- 1 -->
  <rect x="30" y="60" width="130" height="70" rx="8" fill="#e3f2fd"/>
  <text x="95" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">① 高价并购</text>
  <text x="95" y="108" text-anchor="middle" font-size="10" fill="#555">10亿买5亿资产</text>
  <text x="95" y="123" text-anchor="middle" font-size="10" fill="#555">→ 5亿商誉入账</text>

  <!-- 箭头 -->
  <polygon points="175,95 195,88 195,102" fill="#999"/>
  <line x1="160" y1="95" x2="196" y2="95" stroke="#999" stroke-width="2"/>

  <!-- 2 -->
  <rect x="200" y="60" width="130" height="70" rx="8" fill="#ede7f6"/>
  <text x="265" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#4527a0">② 商誉挂账</text>
  <text x="265" y="108" text-anchor="middle" font-size="10" fill="#555">报表显示净资产高</text>
  <text x="265" y="123" text-anchor="middle" font-size="10" fill="#555">PE看起来不贵</text>

  <!-- 箭头 -->
  <polygon points="345,95 365,88 365,102" fill="#999"/>
  <line x1="330" y1="95" x2="366" y2="95" stroke="#999" stroke-width="2"/>

  <!-- 3 -->
  <rect x="370" y="60" width="130" height="70" rx="8" fill="#fff3e0"/>
  <text x="435" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">③ 业绩变脸</text>
  <text x="435" y="108" text-anchor="middle" font-size="10" fill="#555">被并购公司</text>
  <text x="435" y="123" text-anchor="middle" font-size="10" fill="#555">完不成业绩承诺</text>

  <!-- 箭头 -->
  <polygon points="515,95 535,88 535,102" fill="#999"/>
  <line x1="500" y1="95" x2="536" y2="95" stroke="#999" stroke-width="2"/>

  <!-- 4 -->
  <rect x="540" y="60" width="130" height="70" rx="8" fill="#fdecea"/>
  <text x="605" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">④ 商誉减值</text>
  <text x="605" y="108" text-anchor="middle" font-size="10" fill="#555">一次性计提</text>
  <text x="605" y="123" text-anchor="middle" font-size="10" fill="#555">利润暴跌甚至巨亏</text>

  <!-- 结果框 -->
  <rect x="200" y="170" width="400" height="80" rx="10" fill="#c0392b" opacity="0.9"/>
  <text x="400" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="white">💥 散户的感受</text>
  <text x="400" y="222" text-anchor="middle" font-size="12" fill="white">持仓公司突然爆出"巨额商誉减值"</text>
  <text x="400" y="240" text-anchor="middle" font-size="12" fill="white">次日跌停，甚至连续数日跌停</text>

  <!-- 向下箭头 -->
  <line x1="400" y1="130" x2="400" y2="168" stroke="#c0392b" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="394,165 400,170 406,165" fill="#c0392b"/>

  <!-- 排雷方法 -->
  <rect x="30" y="270" width="740" height="65" rx="8" fill="#e8f5e9"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">🛡️ 排雷方法：买股前先算"商誉/净资产"</text>
  <text x="400" y="313" text-anchor="middle" font-size="11" fill="#555">商誉/净资产 &lt; 20%：相对安全 ｜ 20%~50%：需要关注并购子公司业绩 ｜ &gt; 50%：高风险，要么深研究，要么不碰</text>
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#888">查询路径：同花顺/东方财富 → 财务报表 → 资产负债表 → 搜索"商誉"</text>
</svg>
