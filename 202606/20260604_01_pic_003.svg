<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#fafafa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2e7d32">高质押：大股东的"定时炸弹"</text>

  <!-- 正常状态 -->
  <rect x="30" y="55" width="220" height="110" rx="8" fill="#e8f5e9"/>
  <text x="140" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">正常状态</text>
  <text x="140" y="100" text-anchor="middle" font-size="11" fill="#555">大股东持有1亿股</text>
  <text x="140" y="118" text-anchor="middle" font-size="11" fill="#555">质押6000万股给银行</text>
  <text x="140" y="136" text-anchor="middle" font-size="11" fill="#555">换取现金用于经营</text>
  <text x="140" y="154" text-anchor="middle" font-size="11" fill="#2e7d32">✅ 质押率60%，尚可</text>

  <!-- 中箭头 -->
  <line x1="255" y1="110" x2="295" y2="110" stroke="#e65100" stroke-width="2"/>
  <polygon points="292,104 300,110 292,116" fill="#e65100"/>
  <text x="275" y="100" text-anchor="middle" font-size="10" fill="#e65100">股价下跌</text>
  <text x="275" y="125" text-anchor="middle" font-size="10" fill="#e65100">30%</text>

  <!-- 危险状态 -->
  <rect x="300" y="55" width="220" height="110" rx="8" fill="#fff3e0"/>
  <text x="410" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">警戒状态</text>
  <text x="410" y="100" text-anchor="middle" font-size="11" fill="#555">质押股价值缩水</text>
  <text x="410" y="118" text-anchor="middle" font-size="11" fill="#555">银行要求补保证金</text>
  <text x="410" y="136" text-anchor="middle" font-size="11" fill="#555">大股东没钱补</text>
  <text x="410" y="154" text-anchor="middle" font-size="11" fill="#e65100">⚠️ 接近强平线</text>

  <!-- 右箭头 -->
  <line x1="525" y1="110" x2="565" y2="110" stroke="#c0392b" stroke-width="2"/>
  <polygon points="562,104 570,110 562,116" fill="#c0392b"/>
  <text x="545" y="100" text-anchor="middle" font-size="10" fill="#c0392b">继续跌</text>
  <text x="545" y="125" text-anchor="middle" font-size="10" fill="#c0392b">或无法</text>
  <text x="545" y="138" text-anchor="middle" font-size="10" fill="#c0392b">补仓</text>

  <!-- 爆仓状态 -->
  <rect x="570" y="55" width="200" height="110" rx="8" fill="#fdecea"/>
  <text x="670" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">强制平仓</text>
  <text x="670" y="100" text-anchor="middle" font-size="11" fill="#555">银行强制出售</text>
  <text x="670" y="118" text-anchor="middle" font-size="11" fill="#555">大股东股份</text>
  <text x="670" y="136" text-anchor="middle" font-size="11" fill="#555">市场大量抛压</text>
  <text x="670" y="154" text-anchor="middle" font-size="11" fill="#c0392b">❌ 股价雪崩</text>

  <!-- 散户视角 -->
  <rect x="30" y="185" width="740" height="55" rx="8" fill="#e3f2fd"/>
  <text x="400" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">📊 散户怎么查质押率（两分钟学会）</text>
  <text x="400" y="227" text-anchor="middle" font-size="11" fill="#555">①东方财富/同花顺搜索个股 → ②股东信息 → ③主要股东质押情况 → ④看"质押股数/持股总数"</text>

  <!-- 红线标准 -->
  <rect x="30" y="255" width="220" height="45" rx="8" fill="#e8f5e9"/>
  <text x="140" y="276" text-anchor="middle" font-size="12" fill="#2e7d32">质押率 &lt; 30%</text>
  <text x="140" y="293" text-anchor="middle" font-size="11" fill="#555">✅ 风险较低</text>

  <rect x="290" y="255" width="220" height="45" rx="8" fill="#fff3e0"/>
  <text x="400" y="276" text-anchor="middle" font-size="12" fill="#e65100">质押率 30%~60%</text>
  <text x="400" y="293" text-anchor="middle" font-size="11" fill="#555">⚠️ 需关注股价波动</text>

  <rect x="550" y="255" width="220" height="45" rx="8" fill="#fdecea"/>
  <text x="660" y="276" text-anchor="middle" font-size="12" fill="#c0392b">质押率 &gt; 60%</text>
  <text x="660" y="293" text-anchor="middle" font-size="11" fill="#555">❌ 高风险，需深入研判</text>
</svg>
