<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#fafafa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#e65100">财务造假的三大异常信号</text>

  <!-- 信号1 -->
  <rect x="20" y="55" width="240" height="200" rx="10" fill="#fff3e0"/>
  <text x="140" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">📈 信号一</text>
  <text x="140" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">利润高，现金流低</text>
  <line x1="40" y1="115" x2="240" y2="115" stroke="#ffb74d" stroke-width="1"/>
  <text x="140" y="135" text-anchor="middle" font-size="11" fill="#555">正常公司：</text>
  <text x="140" y="153" text-anchor="middle" font-size="11" fill="#2e7d32">利润 ≈ 经营现金流</text>
  <text x="140" y="175" text-anchor="middle" font-size="11" fill="#555">异常公司：</text>
  <text x="140" y="193" text-anchor="middle" font-size="11" fill="#c0392b">利润1亿，现金流-2000万</text>
  <text x="140" y="215" text-anchor="middle" font-size="10" fill="#777">→ 利润可能是"纸面利润"</text>
  <text x="140" y="233" text-anchor="middle" font-size="10" fill="#777">查：经营活动现金流/净利润</text>
  <text x="140" y="250" text-anchor="middle" font-size="10" fill="#e65100">持续&lt;0.5 → 需高度警惕</text>

  <!-- 信号2 -->
  <rect x="280" y="55" width="240" height="200" rx="10" fill="#fdecea"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">📊 信号二</text>
  <text x="400" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">应收账款异常暴增</text>
  <line x1="300" y1="115" x2="500" y2="115" stroke="#e57373" stroke-width="1"/>
  <text x="400" y="135" text-anchor="middle" font-size="11" fill="#555">正常公司：</text>
  <text x="400" y="153" text-anchor="middle" font-size="11" fill="#2e7d32">收入增10%→应收增10%</text>
  <text x="400" y="175" text-anchor="middle" font-size="11" fill="#555">异常公司：</text>
  <text x="400" y="193" text-anchor="middle" font-size="11" fill="#c0392b">收入增10%→应收增80%</text>
  <text x="400" y="215" text-anchor="middle" font-size="10" fill="#777">→ 收入可能是虚增的</text>
  <text x="400" y="233" text-anchor="middle" font-size="10" fill="#777">查：应收账款/营收比率趋势</text>
  <text x="400" y="250" text-anchor="middle" font-size="10" fill="#e65100">比率持续上升 → 警觉</text>

  <!-- 信号3 -->
  <rect x="540" y="55" width="240" height="200" rx="10" fill="#ede7f6"/>
  <text x="660" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#4527a0">🔍 信号三</text>
  <text x="660" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">审计意见非标</text>
  <line x1="560" y1="115" x2="760" y2="115" stroke="#9575cd" stroke-width="1"/>
  <text x="660" y="135" text-anchor="middle" font-size="11" fill="#555">正常公司：</text>
  <text x="660" y="153" text-anchor="middle" font-size="11" fill="#2e7d32">标准无保留意见</text>
  <text x="660" y="175" text-anchor="middle" font-size="11" fill="#555">危险信号：</text>
  <text x="660" y="193" text-anchor="middle" font-size="11" fill="#c0392b">带强调事项/保留意见</text>
  <text x="660" y="210" text-anchor="middle" font-size="11" fill="#c0392b">无法表示意见</text>
  <text x="660" y="228" text-anchor="middle" font-size="10" fill="#777">查：年报第一部分"审计报告"</text>
  <text x="660" y="250" text-anchor="middle" font-size="10" fill="#e65100">非标意见 → 严重红旗</text>

  <!-- 底部汇总 -->
  <rect x="20" y="270" width="760" height="52" rx="8" fill="#333"/>
  <text x="400" y="292" text-anchor="middle" font-size="12" fill="white" font-weight="bold">三个信号同时出现 → 概率极高是问题公司，不碰为上</text>
  <text x="400" y="313" text-anchor="middle" font-size="11" fill="#ccc">出现其中任意两个 → 必须深查，找不到合理解释 → 默认回避</text>
</svg>
