<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#F8F9FA" rx="12"/>
  
  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">复盘核心问题：买入理由是否还成立？</text>
  
  <!-- 中心圆 -->
  <circle cx="400" cy="220" r="58" fill="#2563EB" opacity="0.9"/>
  <text x="400" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="white">买入</text>
  <text x="400" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="white">理由</text>
  <text x="400" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="white">还在吗？</text>
  
  <!-- 左侧：成立 → 持有 -->
  <rect x="30" y="160" width="160" height="120" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="110" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">✅ 逻辑完整</text>
  <line x1="58" y1="220" x2="342" y2="220" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="110" y="215" text-anchor="middle" font-size="12" fill="#065F46">行业景气未变</text>
  <text x="110" y="233" text-anchor="middle" font-size="12" fill="#065F46">财务数据正常</text>
  <text x="110" y="251" text-anchor="middle" font-size="12" fill="#065F46">竞争优势在位</text>
  <text x="110" y="269" text-anchor="middle" font-size="12" fill="#065F46">→ 持有/加仓</text>
  
  <!-- 右侧：破坏 → 卖出 -->
  <rect x="610" y="160" width="160" height="120" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="690" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#991B1B">❌ 逻辑破坏</text>
  <line x1="458" y1="220" x2="610" y2="220" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="690" y="215" text-anchor="middle" font-size="12" fill="#991B1B">核心假设失效</text>
  <text x="690" y="233" text-anchor="middle" font-size="12" fill="#991B1B">财务出现异常</text>
  <text x="690" y="251" text-anchor="middle" font-size="12" fill="#991B1B">竞争对手颠覆</text>
  <text x="690" y="269" text-anchor="middle" font-size="12" fill="#991B1B">→ 减仓/清仓</text>
  
  <!-- 下方：模糊地带 -->
  <rect x="280" y="310" width="240" height="85" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">⚠️ 逻辑部分动摇</text>
  <line x1="400" y1="278" x2="400" y2="310" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="356" text-anchor="middle" font-size="12" fill="#92400E">非核心假设变化</text>
  <text x="400" y="374" text-anchor="middle" font-size="12" fill="#92400E">→ 减半仓，设观察期</text>
  
  <!-- 底部说明 -->
  <text x="400" y="408" text-anchor="middle" font-size="11" fill="#6B7280">记住：价格下跌本身不是卖出理由，逻辑破坏才是</text>
</svg>
