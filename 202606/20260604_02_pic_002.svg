<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#F8F9FA" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">个股持仓复盘四维检验表</text>
  
  <!-- 维度1：基本面 -->
  <rect x="30" y="60" width="355" height="190" rx="10" fill="white" stroke="#2563EB" stroke-width="2"/>
  <rect x="30" y="60" width="355" height="36" rx="10" fill="#2563EB"/>
  <rect x="30" y="84" width="355" height="12" fill="#2563EB"/>
  <text x="207" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📊 维度一：基本面逻辑</text>
  <text x="50" y="118" font-size="12" fill="#374151">□ 行业景气度是否仍处于上行周期？</text>
  <text x="50" y="140" font-size="12" fill="#374151">□ 公司收入/利润增速是否符合预期？</text>
  <text x="50" y="162" font-size="12" fill="#374151">□ 最新财报有无异常科目（应收款暴增、</text>
  <text x="65" y="180" font-size="12" fill="#374151">    现金流持续为负、商誉减值风险）？</text>
  <text x="50" y="202" font-size="12" fill="#374151">□ 核心竞争优势（技术/渠道/品牌）是否</text>
  <text x="65" y="220" font-size="12" fill="#374151">    受到新进者威胁？</text>
  <text x="50" y="242" font-size="12" fill="#6B7280">⚡ 任意一项出现重大负面变化 → 触发减仓</text>
  
  <!-- 维度2：估值 -->
  <rect x="415" y="60" width="355" height="190" rx="10" fill="white" stroke="#10B981" stroke-width="2"/>
  <rect x="415" y="60" width="355" height="36" rx="10" fill="#10B981"/>
  <rect x="415" y="84" width="355" height="12" fill="#10B981"/>
  <text x="592" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="white">💰 维度二：估值是否透支</text>
  <text x="435" y="118" font-size="12" fill="#374151">□ 当前PE/PB是否已达到历史高分位？</text>
  <text x="435" y="140" font-size="12" fill="#374151">□ 市场给的估值溢价，是否还有对应的</text>
  <text x="450" y="158" font-size="12" fill="#374151">    业绩增速支撑？</text>
  <text x="435" y="178" font-size="12" fill="#374151">□ 同类公司估值对比，是否明显偏贵？</text>
  <text x="435" y="200" font-size="12" fill="#374151">□ 分析师预期是否已经过度乐观，难以</text>
  <text x="450" y="218" font-size="12" fill="#374151">    超预期？</text>
  <text x="435" y="242" font-size="12" fill="#6B7280">⚡ 估值透支 + 增速放缓 → 触发止盈</text>
  
  <!-- 维度3：技术/趋势 -->
  <rect x="30" y="270" width="355" height="190" rx="10" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="30" y="270" width="355" height="36" rx="10" fill="#8B5CF6"/>
  <rect x="30" y="294" width="355" height="12" fill="#8B5CF6"/>
  <text x="207" y="294" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📈 维度三：趋势与资金</text>
  <text x="50" y="328" font-size="12" fill="#374151">□ 股价是否跌破关键支撑（120日均线/</text>
  <text x="65" y="346" font-size="12" fill="#374151">    前期重要底部）？</text>
  <text x="50" y="366" font-size="12" fill="#374151">□ 近期成交量是否明显放大下跌？</text>
  <text x="50" y="388" font-size="12" fill="#374151">□ 北向/机构持仓是否持续净流出？</text>
  <text x="50" y="410" font-size="12" fill="#374151">□ 同板块龙头股是否也开始走弱？</text>
  <text x="50" y="450" font-size="12" fill="#6B7280">⚡ 趋势破位 + 资金撤退 → 警戒信号，</text>
  <text x="65" y="468" font-size="12" fill="#6B7280">    结合基本面决定去留</text>
  
  <!-- 维度4：仓位 -->
  <rect x="415" y="270" width="355" height="190" rx="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <rect x="415" y="270" width="355" height="36" rx="10" fill="#F59E0B"/>
  <rect x="415" y="294" width="355" height="12" fill="#F59E0B"/>
  <text x="592" y="294" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⚖️ 维度四：仓位是否失控</text>
  <text x="435" y="328" font-size="12" fill="#374151">□ 该股占总仓位是否超过20%上限？</text>
  <text x="435" y="350" font-size="12" fill="#374151">□ 该行业整体仓位是否超过30%？</text>
  <text x="435" y="372" font-size="12" fill="#374151">□ 是否因为亏损而"被动"变成重仓？</text>
  <text x="435" y="394" font-size="12" fill="#374151">□ 是否存在"越跌越买"越买越套的情况？</text>
  <text x="435" y="450" font-size="12" fill="#6B7280">⚡ 仓位失控本身即是风险信号，</text>
  <text x="450" y="468" font-size="12" fill="#6B7280">    无论基本面如何，先减至上限以内</text>
</svg>
