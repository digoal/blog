<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#F8F9FA" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">逻辑 vs 股价：四种持仓情景</text>
  
  <!-- 轴线 -->
  <line x1="400" y1="60" x2="400" y2="330" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="70" y1="195" x2="730" y2="195" stroke="#9CA3AF" stroke-width="2"/>
  
  <!-- 轴标签 -->
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#6B7280">逻辑完整</text>
  <text x="400" y="345" text-anchor="middle" font-size="12" fill="#6B7280">逻辑破坏</text>
  <text x="65" y="198" text-anchor="end" font-size="12" fill="#6B7280">股价跌</text>
  <text x="735" y="198" text-anchor="start" font-size="12" fill="#6B7280">股价涨</text>
  
  <!-- 象限1：右上 逻辑好+股价涨 -->
  <rect x="410" y="65" width="310" height="120" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="565" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#065F46">🚀 理想状态</text>
  <text x="565" y="122" text-anchor="middle" font-size="12" fill="#065F46">逻辑正确，市场认可</text>
  <text x="565" y="142" text-anchor="middle" font-size="12" fill="#065F46">→ 持有，估值未透支可加仓</text>
  <text x="565" y="162" text-anchor="middle" font-size="12" fill="#065F46">→ 设好止盈目标，不贪</text>
  
  <!-- 象限2：左上 逻辑好+股价跌 -->
  <rect x="80" y="65" width="310" height="120" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="235" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E40AF">💎 黄金机会</text>
  <text x="235" y="122" text-anchor="middle" font-size="12" fill="#1E40AF">逻辑正确，市场短期误判</text>
  <text x="235" y="142" text-anchor="middle" font-size="12" fill="#1E40AF">→ 核实逻辑无误后，考虑</text>
  <text x="235" y="162" text-anchor="middle" font-size="12" fill="#1E40AF">   分批加仓（不超上限）</text>
  
  <!-- 象限3：右下 逻辑破+股价涨 -->
  <rect x="410" y="205" width="310" height="120" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="565" y="240" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400E">⚠️ 最危险状态</text>
  <text x="565" y="262" text-anchor="middle" font-size="12" fill="#92400E">逻辑破坏，情绪推高股价</text>
  <text x="565" y="282" text-anchor="middle" font-size="12" fill="#92400E">→ 逢高减仓，切勿恋战</text>
  <text x="565" y="302" text-anchor="middle" font-size="12" fill="#92400E">→ 破坏的逻辑不会自动修复</text>
  
  <!-- 象限4：左下 逻辑破+股价跌 -->
  <rect x="80" y="205" width="310" height="120" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="235" y="240" text-anchor="middle" font-size="15" font-weight="bold" fill="#991B1B">🚨 果断离场</text>
  <text x="235" y="262" text-anchor="middle" font-size="12" fill="#991B1B">逻辑破坏，股价也在跌</text>
  <text x="235" y="282" text-anchor="middle" font-size="12" fill="#991B1B">→ 不是被套，是错判</text>
  <text x="235" y="302" text-anchor="middle" font-size="12" fill="#991B1B">→ 果断止损，早走早解脱</text>
</svg>
