<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">可转债的双重身份</text>
  <rect x="40" y="65" width="300" height="200" rx="10" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <text x="190" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#2980b9">债券属性（下方保护）</text>
  <line x1="60" y1="105" x2="320" y2="105" stroke="#3498db" stroke-width="1" stroke-dasharray="4"/>
  <text x="190" y="130" text-anchor="middle" font-size="12" fill="#2c3e50">固定期限（通常6年）</text>
  <text x="190" y="155" text-anchor="middle" font-size="12" fill="#2c3e50">每年付息（票息通常0.1%~1%）</text>
  <text x="190" y="180" text-anchor="middle" font-size="12" fill="#2c3e50">到期按面值100元偿还</text>
  <text x="190" y="205" text-anchor="middle" font-size="12" fill="#2c3e50">纯债价值 = 价格下跌底线</text>
  <text x="190" y="235" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">亏损有底，持有到期可回本</text>
  <rect x="460" y="65" width="300" height="200" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="610" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#d68910">期权属性（上方弹性）</text>
  <line x1="480" y1="105" x2="740" y2="105" stroke="#f39c12" stroke-width="1" stroke-dasharray="4"/>
  <text x="610" y="130" text-anchor="middle" font-size="12" fill="#2c3e50">可按转股价换成正股</text>
  <text x="610" y="155" text-anchor="middle" font-size="12" fill="#2c3e50">股价涨，转债跟着涨</text>
  <text x="610" y="180" text-anchor="middle" font-size="12" fill="#2c3e50">股价跌，债底托住价格</text>
  <text x="610" y="205" text-anchor="middle" font-size="12" fill="#2c3e50">涨幅理论上没有上限</text>
  <text x="610" y="235" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">盈利弹性大，机会参与</text>
  <text x="400" y="175" text-anchor="middle" font-size="32" fill="#8e44ad">+</text>
  <text x="400" y="205" text-anchor="middle" font-size="11" fill="#8e44ad" font-weight="bold">组合</text>
  <rect x="120" y="295" width="560" height="105" rx="10" fill="#eaf5ea" stroke="#27ae60" stroke-width="2.5"/>
  <text x="400" y="325" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e8449">= 可转债（债底 + 股票看涨期权）</text>
  <text x="400" y="352" text-anchor="middle" font-size="13" fill="#2c3e50">持有到期最差情况：拿回本金 + 少量利息</text>
  <text x="400" y="378" text-anchor="middle" font-size="13" fill="#2c3e50">正股大涨最好情况：跟随股票上涨，卖出获利</text>
</svg>
