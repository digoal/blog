<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">正股价格 vs 转债价格：不对称的涨跌</text>

  <!-- Axes -->
  <line x1="80" y1="330" x2="730" y2="330" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="60" x2="80" y2="330" stroke="#555" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#555">时间 / 正股价格变动</text>
  <text x="30" y="195" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,30,195)">价格</text>

  <!-- Bond floor line -->
  <line x1="80" y1="270" x2="730" y2="270" stroke="#3498db" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="740" y="274" font-size="11" fill="#3498db">纯债价值（底线）</text>

  <!-- Stock price line: falls then rises -->
  <polyline points="80,200 200,260 320,310 440,200 560,120 680,80" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="690" y="82" font-size="11" fill="#e74c3c">正股价格</text>

  <!-- Convertible bond price line: floored on bottom, follows on top -->
  <polyline points="80,210 200,268 320,270 440,210 560,135 680,98" fill="none" stroke="#27ae60" stroke-width="2.5"/>
  <text x="690" y="100" font-size="11" fill="#27ae60">转债价格</text>

  <!-- Annotations -->
  <!-- Down phase -->
  <rect x="130" y="275" width="160" height="45" rx="6" fill="#fdecea" stroke="#e74c3c" stroke-width="1"/>
  <text x="210" y="293" text-anchor="middle" font-size="11" fill="#c0392b">正股大跌</text>
  <text x="210" y="310" text-anchor="middle" font-size="11" fill="#c0392b">转债被债底托住</text>

  <!-- Up phase -->
  <rect x="520" y="85" width="160" height="45" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="600" y="103" text-anchor="middle" font-size="11" fill="#1e8449">正股大涨</text>
  <text x="600" y="120" text-anchor="middle" font-size="11" fill="#1e8449">转债跟随上涨</text>

  <!-- Arrow for asymmetry -->
  <text x="400" y="358" text-anchor="middle" font-size="12" fill="#8e44ad" font-weight="bold">结论：下跌有限，上涨参与——这就是不对称的魅力</text>
</svg>
