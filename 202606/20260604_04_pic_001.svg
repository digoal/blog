<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">可转债的两层结构：底板 + 弹跳板</text>

  <!-- 底板（债底） -->
  <rect x="80" y="270" width="640" height="72" fill="#d0e8ff" rx="10" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="400" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a4fa0">债底（纯债价值）：到期还本付息的兜底承诺</text>
  <text x="400" y="326" text-anchor="middle" font-size="12" fill="#3a7bd5">正股跌再惨，债底在这里 ——「下跌空间有限」的根源</text>

  <!-- 弹跳板（期权） -->
  <rect x="80" y="140" width="640" height="110" fill="#fff3cd" rx="10" stroke="#e6a817" stroke-width="1.5"/>
  <text x="400" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#8a5700">期权价值：随正股上涨而变大的「弹跳板」</text>
  <text x="400" y="200" text-anchor="middle" font-size="12" fill="#7a5000">正股涨得越多，这块价值就越高</text>
  <text x="400" y="224" text-anchor="middle" font-size="12" fill="#7a5000">持有人可以选择：转成股票「锁定涨幅」，或直接卖出转债</text>

  <!-- 合并说明 -->
  <text x="400" y="108" text-anchor="middle" font-size="14" fill="#444">可转债 ＝</text>
  <rect x="186" y="80" width="155" height="34" fill="#d0e8ff" rx="7" stroke="#3a7bd5" stroke-width="1.2"/>
  <text x="264" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4fa0">普通债券</text>
  <text x="360" y="102" text-anchor="middle" font-size="18" fill="#888">＋</text>
  <rect x="385" y="80" width="230" height="34" fill="#fff3cd" rx="7" stroke="#e6a817" stroke-width="1.2"/>
  <text x="500" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5700">免费的股票看涨期权</text>

  <!-- 竖向箭头 -->
  <line x1="400" y1="116" x2="400" y2="136" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 下跌/上涨标注 -->
  <text x="62" y="310" text-anchor="middle" font-size="12" fill="#3a7bd5" font-weight="bold">↓</text>
  <text x="62" y="185" text-anchor="middle" font-size="12" fill="#e6a817" font-weight="bold">↑</text>

  <!-- 底部说明 -->
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#999">* 债底保护并非绝对，依赖发行公司偿债能力，信用资质差的转债债底可能失效</text>
</svg>
