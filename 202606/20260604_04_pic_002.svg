<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="340" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">三种场景下可转债的行为对比</text>

  <!-- 表头 -->
  <rect x="40" y="55" width="720" height="38" fill="#3a7bd5" rx="6"/>
  <text x="160" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">市场情景</text>
  <text x="360" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">正股表现</text>
  <text x="530" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">可转债表现</text>
  <text x="690" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">主导因子</text>

  <!-- 行1：熊市 -->
  <rect x="40" y="93" width="720" height="60" fill="#fff0f0" rx="0"/>
  <text x="160" y="117" text-anchor="middle" font-size="14" fill="#c0392b">😰 熊市/正股大跌</text>
  <text x="160" y="137" text-anchor="middle" font-size="12" fill="#888">正股跌20%~40%</text>
  <text x="360" y="127" text-anchor="middle" font-size="14" fill="#c0392b">-20% ~ -40%</text>
  <text x="530" y="117" text-anchor="middle" font-size="13" fill="#c0392b">跌幅收窄至 -5% ~ -12%</text>
  <text x="530" y="137" text-anchor="middle" font-size="11" fill="#888">债底托住了下跌</text>
  <text x="690" y="127" text-anchor="middle" font-size="13" fill="#3a7bd5">债底起作用</text>

  <!-- 行2：震荡市 -->
  <rect x="40" y="153" width="720" height="60" fill="#fffbe6" rx="0"/>
  <text x="160" y="177" text-anchor="middle" font-size="14" fill="#e67e00">😶 震荡/横盘</text>
  <text x="160" y="197" text-anchor="middle" font-size="12" fill="#888">正股涨跌±10%</text>
  <text x="360" y="183" text-anchor="middle" font-size="14" fill="#888">±10%</text>
  <text x="530" y="177" text-anchor="middle" font-size="13" fill="#888">转债价格波动更小</text>
  <text x="530" y="197" text-anchor="middle" font-size="11" fill="#888">息票利息对冲部分损耗</text>
  <text x="690" y="183" text-anchor="middle" font-size="13" fill="#888">期权+债底平衡</text>

  <!-- 行3：牛市 -->
  <rect x="40" y="213" width="720" height="60" fill="#f0fff4" rx="0"/>
  <text x="160" y="237" text-anchor="middle" font-size="14" fill="#27ae60">🚀 牛市/正股大涨</text>
  <text x="160" y="257" text-anchor="middle" font-size="12" fill="#888">正股涨30%~60%</text>
  <text x="360" y="247" text-anchor="middle" font-size="14" fill="#27ae60">+30% ~ +60%</text>
  <text x="530" y="237" text-anchor="middle" font-size="13" fill="#27ae60">涨幅跟上 +20% ~ +55%</text>
  <text x="530" y="257" text-anchor="middle" font-size="11" fill="#888">期权价值爆发</text>
  <text x="690" y="247" text-anchor="middle" font-size="13" fill="#e6a817">期权起作用</text>

  <!-- 分隔线 -->
  <line x1="40" y1="153" x2="760" y2="153" stroke="#ddd" stroke-width="1"/>
  <line x1="40" y1="213" x2="760" y2="213" stroke="#ddd" stroke-width="1"/>
  <line x1="40" y1="273" x2="760" y2="273" stroke="#ddd" stroke-width="1"/>

  <!-- 列分隔线 -->
  <line x1="260" y1="55" x2="260" y2="273" stroke="#ddd" stroke-width="1"/>
  <line x1="460" y1="55" x2="460" y2="273" stroke="#ddd" stroke-width="1"/>
  <line x1="620" y1="55" x2="620" y2="273" stroke="#ddd" stroke-width="1"/>

  <!-- 核心结论 -->
  <rect x="40" y="285" width="720" height="40" fill="#e8f4fd" rx="6" stroke="#3a7bd5" stroke-width="1"/>
  <text x="400" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4fa0">核心规律：下跌时跌得少，上涨时涨得多（但不是100%跟涨）——这就是「不对称」的含义</text>
</svg>
