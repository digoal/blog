<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">可转债 vs 股票：收益/损失对比示意图</text>

  <!-- 坐标轴 -->
  <!-- X轴 -->
  <line x1="100" y1="280" x2="720" y2="280" stroke="#aaa" stroke-width="1.5"/>
  <!-- Y轴 -->
  <line x1="100" y1="60" x2="100" y2="370" stroke="#aaa" stroke-width="1.5"/>

  <!-- X轴标签 -->
  <text x="190" y="300" text-anchor="middle" font-size="12" fill="#555">正股大跌30%</text>
  <text x="350" y="300" text-anchor="middle" font-size="12" fill="#555">正股不变</text>
  <text x="510" y="300" text-anchor="middle" font-size="12" fill="#555">正股上涨30%</text>
  <text x="660" y="300" text-anchor="middle" font-size="12" fill="#555">正股上涨60%</text>

  <!-- Y轴标签 -->
  <text x="90" y="284" text-anchor="end" font-size="11" fill="#888">0%</text>
  <text x="90" y="180" text-anchor="end" font-size="11" fill="#888">+30%</text>
  <text x="90" y="130" text-anchor="end" font-size="11" fill="#888">+50%</text>
  <text x="90" y="370" text-anchor="end" font-size="11" fill="#888">-30%</text>

  <!-- 辅助横线 -->
  <line x1="100" y1="180" x2="720" y2="180" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="130" x2="720" y2="130" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="370" x2="720" y2="370" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 股票折线（红色，大幅波动） -->
  <polyline points="190,370 350,280 510,180 660,100" fill="none" stroke="#e05c5c" stroke-width="2.5"/>
  <!-- 股票数据点 -->
  <circle cx="190" cy="370" r="5" fill="#e05c5c"/>
  <circle cx="350" cy="280" r="5" fill="#e05c5c"/>
  <circle cx="510" cy="180" r="5" fill="#e05c5c"/>
  <circle cx="660" cy="100" r="5" fill="#e05c5c"/>

  <!-- 可转债折线（蓝色，下跌收窄、上涨参与） -->
  <polyline points="190,260 350,280 510,195 660,110" fill="none" stroke="#3a7bd5" stroke-width="2.5"/>
  <!-- 转债数据点 -->
  <circle cx="190" cy="260" r="5" fill="#3a7bd5"/>
  <circle cx="350" cy="280" r="5" fill="#3a7bd5"/>
  <circle cx="510" cy="195" r="5" fill="#3a7bd5"/>
  <circle cx="660" cy="110" r="5" fill="#3a7bd5"/>

  <!-- 图例 -->
  <rect x="490" y="58" width="220" height="60" fill="white" rx="8" stroke="#ddd" stroke-width="1"/>
  <line x1="505" y1="80" x2="535" y2="80" stroke="#e05c5c" stroke-width="2.5"/>
  <circle cx="520" cy="80" r="4" fill="#e05c5c"/>
  <text x="545" y="84" font-size="13" fill="#333">直接买股票</text>
  <line x1="505" y1="104" x2="535" y2="104" stroke="#3a7bd5" stroke-width="2.5"/>
  <circle cx="520" cy="104" r="4" fill="#3a7bd5"/>
  <text x="545" y="108" font-size="13" fill="#333">买可转债（债底保护）</text>

  <!-- 标注文字 -->
  <text x="168" y="248" font-size="11" fill="#3a7bd5" font-weight="bold">-8%</text>
  <text x="168" y="378" font-size="11" fill="#e05c5c" font-weight="bold">-30%</text>
  <text x="665" y="125" font-size="11" fill="#3a7bd5" font-weight="bold">+55%</text>
  <text x="665" y="94" font-size="11" fill="#e05c5c" font-weight="bold">+60%</text>

  <!-- 底部说明 -->
  <text x="400" y="408" text-anchor="middle" font-size="11" fill="#999">示意图，非实际数据。债底保护效果因个券信用资质不同而存在差异。</text>
</svg>
