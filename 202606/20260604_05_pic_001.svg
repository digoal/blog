<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">可转债四大核心指标关系图</text>

  <!-- Center bond icon -->
  <rect x="330" y="165" width="140" height="60" rx="10" fill="#4a4e8f" />
  <text x="400" y="190" text-anchor="middle" font-size="13" fill="white" font-weight="bold">一张可转债</text>
  <text x="400" y="213" text-anchor="middle" font-size="11" fill="#ccd" >面值100元</text>

  <!-- Left: 纯债价值 -->
  <rect x="30" y="80" width="170" height="90" rx="10" fill="#2d6a4f" />
  <text x="115" y="110" text-anchor="middle" font-size="13" fill="white" font-weight="bold">纯债价值（债底）</text>
  <text x="115" y="130" text-anchor="middle" font-size="11" fill="#b7e4c7">把票息+到期还本</text>
  <text x="115" y="148" text-anchor="middle" font-size="11" fill="#b7e4c7">折现后的价值</text>
  <text x="115" y="166" text-anchor="middle" font-size="10" fill="#95d5b2">典型：90~100元区间</text>

  <!-- Right: 转股价值 -->
  <rect x="600" y="80" width="170" height="90" rx="10" fill="#c77dff" />
  <text x="685" y="110" text-anchor="middle" font-size="13" fill="white" font-weight="bold">转股价值（平价）</text>
  <text x="685" y="130" text-anchor="middle" font-size="11" fill="#f3c4fb">按转股价换成股票</text>
  <text x="685" y="148" text-anchor="middle" font-size="11" fill="#f3c4fb">当前市值是多少</text>
  <text x="685" y="166" text-anchor="middle" font-size="10" fill="#e0aaff">随正股涨跌每天变</text>

  <!-- Bottom left: 转股溢价率 -->
  <rect x="80" y="290" width="200" height="90" rx="10" fill="#e76f51" />
  <text x="180" y="320" text-anchor="middle" font-size="13" fill="white" font-weight="bold">转股溢价率</text>
  <text x="180" y="340" text-anchor="middle" font-size="11" fill="#fde0d0">= (价格−转股价值)</text>
  <text x="180" y="358" text-anchor="middle" font-size="11" fill="#fde0d0">/ 转股价值 × 100%</text>
  <text x="180" y="376" text-anchor="middle" font-size="10" fill="#ffba85">越低 → 股性越强</text>

  <!-- Bottom right: 到期收益率 -->
  <rect x="520" y="290" width="200" height="90" rx="10" fill="#457b9d" />
  <text x="620" y="320" text-anchor="middle" font-size="13" fill="white" font-weight="bold">到期收益率（YTM）</text>
  <text x="620" y="340" text-anchor="middle" font-size="11" fill="#cde6f5">持有到期的年化回报</text>
  <text x="620" y="358" text-anchor="middle" font-size="11" fill="#cde6f5">含票息+到期价差</text>
  <text x="620" y="376" text-anchor="middle" font-size="10" fill="#a8dadc">越高 → 债性保护越强</text>

  <!-- Arrows -->
  <!-- Left box to center -->
  <line x1="200" y1="125" x2="328" y2="185" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Right box to center -->
  <line x1="600" y1="125" x2="472" y2="185" stroke="#c77dff" stroke-width="2" marker-end="url(#arr-purple)"/>
  <!-- Center to bottom left -->
  <line x1="370" y1="225" x2="250" y2="290" stroke="#e76f51" stroke-width="2" marker-end="url(#arr-red)"/>
  <!-- Center to bottom right -->
  <line x1="430" y1="225" x2="550" y2="290" stroke="#457b9d" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d6a4f"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c77dff"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e76f51"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#457b9d"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="400" y="405" text-anchor="middle" font-size="11" fill="#777">四个指标共同决定一张转债"现在值多少钱、未来能怎么赚钱"</text>
</svg>
