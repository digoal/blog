<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">到期收益率（YTM）计算示意</text>

  <!-- Timeline arrow -->
  <line x1="80" y1="165" x2="720" y2="165" stroke="#4a4e8f" stroke-width="2.5" marker-end="url(#arr-main)"/>
  <defs>
    <marker id="arr-main" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a4e8f"/>
    </marker>
  </defs>

  <!-- Buy point -->
  <circle cx="120" cy="165" r="8" fill="#e76f51"/>
  <text x="120" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#e76f51">今天买入</text>
  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#555">102元</text>

  <!-- Coupon payments -->
  <circle cx="240" cy="165" r="5" fill="#2d6a4f"/>
  <rect x="215" y="100" width="50" height="30" rx="5" fill="#2d6a4f"/>
  <text x="240" y="120" text-anchor="middle" font-size="10" fill="white">+0.3元</text>
  <line x1="240" y1="130" x2="240" y2="160" stroke="#2d6a4f" stroke-width="1.5"/>

  <circle cx="380" cy="165" r="5" fill="#2d6a4f"/>
  <rect x="355" y="100" width="50" height="30" rx="5" fill="#2d6a4f"/>
  <text x="380" y="120" text-anchor="middle" font-size="10" fill="white">+0.5元</text>
  <line x1="380" y1="130" x2="380" y2="160" stroke="#2d6a4f" stroke-width="1.5"/>

  <circle cx="520" cy="165" r="5" fill="#2d6a4f"/>
  <rect x="495" y="100" width="50" height="30" rx="5" fill="#2d6a4f"/>
  <text x="520" y="120" text-anchor="middle" font-size="10" fill="white">+0.8元</text>
  <line x1="520" y1="130" x2="520" y2="160" stroke="#2d6a4f" stroke-width="1.5"/>

  <!-- Maturity -->
  <circle cx="680" cy="165" r="8" fill="#4a4e8f"/>
  <text x="680" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a4e8f">到期赎回</text>
  <text x="680" y="198" text-anchor="middle" font-size="11" fill="#555">+102元（含最后票息）</text>

  <!-- Labels below timeline -->
  <text x="240" y="220" text-anchor="middle" font-size="10" fill="#777">第1年</text>
  <text x="380" y="220" text-anchor="middle" font-size="10" fill="#777">第2年</text>
  <text x="520" y="220" text-anchor="middle" font-size="10" fill="#777">第3年</text>

  <!-- YTM summary box -->
  <rect x="240" y="250" width="320" height="50" rx="10" fill="#4a4e8f" opacity="0.9"/>
  <text x="400" y="271" text-anchor="middle" font-size="12" fill="white">以102元买入，到期能拿回多少？</text>
  <text x="400" y="291" text-anchor="middle" font-size="13" fill="#ffd166" font-weight="bold">YTM = 年化回报率（含票息 + 到期价差）</text>

  <!-- Annotation: YTM negative means buying too expensive -->
  <text x="400" y="312" text-anchor="middle" font-size="10" fill="#e76f51">YTM为负 = 买贵了，到期连本金都亏</text>
</svg>
