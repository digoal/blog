<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">转股溢价率 × 价格 → 四象限操盘图</text>

  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="400" stroke="#aaa" stroke-width="1.5"/>
  <line x1="100" y1="230" x2="750" y2="230" stroke="#aaa" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="60" y="148" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,60,148)">溢价率</text>
  <text x="78" y="80" text-anchor="middle" font-size="11" fill="#888">高</text>
  <text x="78" y="398" text-anchor="middle" font-size="11" fill="#888">低</text>

  <!-- X axis label -->
  <text x="420" y="425" text-anchor="middle" font-size="12" fill="#555">转债价格</text>
  <text x="120" y="425" text-anchor="middle" font-size="11" fill="#888">低价</text>
  <text x="730" y="425" text-anchor="middle" font-size="11" fill="#888">高价</text>

  <!-- Quadrant 1: 高溢价 低价 → 偏债型 -->
  <rect x="101" y="61" width="324" height="168" fill="#d4edda" opacity="0.7" rx="6"/>
  <text x="263" y="125" text-anchor="middle" font-size="14" fill="#155724" font-weight="bold">偏债型</text>
  <text x="263" y="148" text-anchor="middle" font-size="11" fill="#155724">低价 + 高溢价</text>
  <text x="263" y="168" text-anchor="middle" font-size="11" fill="#155724">债底保护 ✓ 弹性 ✗</text>
  <text x="263" y="188" text-anchor="middle" font-size="10" fill="#2d6a4f">适合：防御性配置</text>
  <text x="263" y="205" text-anchor="middle" font-size="10" fill="#2d6a4f">看YTM是否为正</text>

  <!-- Quadrant 2: 高溢价 高价 → 危险区 -->
  <rect x="426" y="61" width="323" height="168" fill="#f8d7da" opacity="0.7" rx="6"/>
  <text x="587" y="125" text-anchor="middle" font-size="14" fill="#721c24" font-weight="bold">估值过高区</text>
  <text x="587" y="148" text-anchor="middle" font-size="11" fill="#721c24">高价 + 高溢价</text>
  <text x="587" y="168" text-anchor="middle" font-size="11" fill="#721c24">债底远 + 弹性弱 ✗</text>
  <text x="587" y="188" text-anchor="middle" font-size="10" fill="#721c24">适合：避开或轻仓</text>
  <text x="587" y="205" text-anchor="middle" font-size="10" fill="#721c24">强赎风险高</text>

  <!-- Quadrant 3: 低溢价 低价 → 双低宝藏 -->
  <rect x="101" y="231" width="324" height="168" fill="#fff3cd" opacity="0.85" rx="6"/>
  <text x="263" y="295" text-anchor="middle" font-size="14" fill="#856404" font-weight="bold">双低宝藏区 ★</text>
  <text x="263" y="318" text-anchor="middle" font-size="11" fill="#856404">低价 + 低溢价</text>
  <text x="263" y="338" text-anchor="middle" font-size="11" fill="#856404">债底保护 ✓ 弹性 ✓</text>
  <text x="263" y="358" text-anchor="middle" font-size="10" fill="#856404">适合：重点关注</text>
  <text x="263" y="375" text-anchor="middle" font-size="10" fill="#856404">双低策略核心标的</text>

  <!-- Quadrant 4: 低溢价 高价 → 偏股型 -->
  <rect x="426" y="231" width="323" height="168" fill="#cce5ff" opacity="0.7" rx="6"/>
  <text x="587" y="295" text-anchor="middle" font-size="14" fill="#004085" font-weight="bold">偏股型</text>
  <text x="587" y="318" text-anchor="middle" font-size="11" fill="#004085">高价 + 低溢价</text>
  <text x="587" y="338" text-anchor="middle" font-size="11" fill="#004085">债底保护弱 弹性强✓</text>
  <text x="587" y="358" text-anchor="middle" font-size="10" fill="#004085">适合：进攻配置</text>
  <text x="587" y="375" text-anchor="middle" font-size="10" fill="#004085">正股强则跟涨</text>

  <!-- Divider line at 110元 / 30%溢价 -->
  <line x1="425" y1="61" x2="425" y2="399" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="425" y="52" text-anchor="middle" font-size="10" fill="#666">约110元</text>
</svg>
