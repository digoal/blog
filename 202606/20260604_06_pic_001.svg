<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">双低分数计算公式与筛选流程</text>

  <!-- Formula box -->
  <rect x="160" y="55" width="480" height="60" rx="10" fill="#2c3e50" />
  <text x="400" y="82" text-anchor="middle" font-size="15" fill="#ecf0f1">双低分数 = 转债价格（元）+ 转股溢价率（%）× 100</text>
  <text x="400" y="105" text-anchor="middle" font-size="13" fill="#f39c12">分数越低 → 越值得关注（通常筛选最低的20只）</text>

  <!-- Steps flow -->
  <!-- Step 1 -->
  <rect x="60" y="140" width="140" height="70" rx="8" fill="#3498db"/>
  <text x="130" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">第一步</text>
  <text x="130" y="186" text-anchor="middle" font-size="12" fill="white">剔除信用风险券</text>
  <text x="130" y="202" text-anchor="middle" font-size="11" fill="#d6eaf8">评级BB以下排除</text>

  <line x1="200" y1="175" x2="230" y2="175" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="228,170 240,175 228,180" fill="#7f8c8d"/>

  <!-- Step 2 -->
  <rect x="240" y="140" width="140" height="70" rx="8" fill="#3498db"/>
  <text x="310" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">第二步</text>
  <text x="310" y="186" text-anchor="middle" font-size="12" fill="white">计算双低分数</text>
  <text x="310" y="202" text-anchor="middle" font-size="11" fill="#d6eaf8">价格+溢价率×100</text>

  <line x1="380" y1="175" x2="410" y2="175" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="408,170 420,175 408,180" fill="#7f8c8d"/>

  <!-- Step 3 -->
  <rect x="420" y="140" width="140" height="70" rx="8" fill="#3498db"/>
  <text x="490" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">第三步</text>
  <text x="490" y="186" text-anchor="middle" font-size="12" fill="white">选最低20只</text>
  <text x="490" y="202" text-anchor="middle" font-size="11" fill="#d6eaf8">分散持有</text>

  <line x1="560" y1="175" x2="590" y2="175" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="588,170 600,175 588,180" fill="#7f8c8d"/>

  <!-- Step 4 -->
  <rect x="600" y="140" width="140" height="70" rx="8" fill="#27ae60"/>
  <text x="670" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">第四步</text>
  <text x="670" y="186" text-anchor="middle" font-size="12" fill="white">每月调仓一次</text>
  <text x="670" y="202" text-anchor="middle" font-size="11" fill="#d6eaf8">换出已升高的</text>

  <!-- Example calculation -->
  <rect x="80" y="240" width="290" height="110" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="225" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">✓ 双低标的示例</text>
  <text x="100" y="282" font-size="12" fill="#333">某转债：价格 115元，溢价率 18%</text>
  <text x="100" y="300" font-size="12" fill="#333">双低分数 = 115 + 18×100 = <tspan font-weight="bold" fill="#27ae60">1915</tspan></text>
  <text x="100" y="318" font-size="12" fill="#2980b9">债底保护：票面100元托底</text>
  <text x="100" y="336" font-size="12" fill="#2980b9">弹性空间：股票上涨后可转股</text>

  <rect x="420" y="240" width="290" height="110" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="565" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">✗ 高溢价陷阱示例</text>
  <text x="440" y="282" font-size="12" fill="#333">某转债：价格 108元，溢价率 55%</text>
  <text x="440" y="300" font-size="12" fill="#333">双低分数 = 108 + 55×100 = <tspan font-weight="bold" fill="#e74c3c">5608</tspan></text>
  <text x="440" y="318" font-size="12" fill="#e74c3c">价格便宜但溢价极高</text>
  <text x="440" y="336" font-size="12" fill="#e74c3c">股票涨20%，转债可能只涨5%</text>
</svg>
