<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">双低策略选债坐标系</text>

  <!-- Axes -->
  <line x1="100" y1="360" x2="720" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="360" x2="100" y2="60" stroke="#333" stroke-width="2"/>

  <!-- Arrow heads -->
  <polygon points="720,355 735,360 720,365" fill="#333"/>
  <polygon points="95,60 100,45 105,60" fill="#333"/>

  <!-- Axis labels -->
  <text x="730" y="364" font-size="13" fill="#333">转股溢价率</text>
  <text x="20" y="220" font-size="13" fill="#333" transform="rotate(-90,50,220)">转债价格（元）</text>

  <!-- Y axis ticks -->
  <line x1="96" y1="280" x2="104" y2="280" stroke="#666" stroke-width="1.5"/>
  <text x="88" y="284" text-anchor="end" font-size="12" fill="#555">110</text>
  <line x1="96" y1="200" x2="104" y2="200" stroke="#666" stroke-width="1.5"/>
  <text x="88" y="204" text-anchor="end" font-size="12" fill="#555">120</text>
  <line x1="96" y1="120" x2="104" y2="120" stroke="#666" stroke-width="1.5"/>
  <text x="88" y="124" text-anchor="end" font-size="12" fill="#555">130</text>
  <line x1="96" y1="360" x2="104" y2="360" stroke="#666" stroke-width="1.5"/>
  <text x="88" y="364" text-anchor="end" font-size="12" fill="#555">100</text>

  <!-- X axis ticks -->
  <line x1="250" y1="356" x2="250" y2="364" stroke="#666" stroke-width="1.5"/>
  <text x="250" y="378" text-anchor="middle" font-size="12" fill="#555">15%</text>
  <line x1="400" y1="356" x2="400" y2="364" stroke="#666" stroke-width="1.5"/>
  <text x="400" y="378" text-anchor="middle" font-size="12" fill="#555">30%</text>
  <line x1="550" y1="356" x2="550" y2="364" stroke="#666" stroke-width="1.5"/>
  <text x="550" y="378" text-anchor="middle" font-size="12" fill="#555">45%</text>

  <!-- Double low zone (shaded) -->
  <rect x="100" y="280" width="150" height="80" fill="#27ae60" fill-opacity="0.18" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="175" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">双低区</text>
  <text x="175" y="342" text-anchor="middle" font-size="11" fill="#27ae60">≤120元 + ≤20%</text>

  <!-- Scatter dots -->
  <!-- Green (double low) -->
  <circle cx="130" cy="340" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="155" cy="310" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="190" cy="330" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="220" cy="295" r="7" fill="#27ae60" opacity="0.85"/>
  <circle cx="140" cy="285" r="7" fill="#27ae60" opacity="0.85"/>

  <!-- Yellow (low price, high premium - risky) -->
  <circle cx="430" cy="340" r="7" fill="#e67e22" opacity="0.85"/>
  <circle cx="500" cy="310" r="7" fill="#e67e22" opacity="0.85"/>
  <circle cx="580" cy="345" r="7" fill="#e67e22" opacity="0.85"/>
  <circle cx="620" cy="295" r="7" fill="#e67e22" opacity="0.85"/>

  <!-- Blue (low premium, high price - still OK) -->
  <circle cx="160" cy="180" r="7" fill="#2980b9" opacity="0.85"/>
  <circle cx="200" cy="140" r="7" fill="#2980b9" opacity="0.85"/>
  <circle cx="240" cy="160" r="7" fill="#2980b9" opacity="0.85"/>

  <!-- Gray (high both - avoid) -->
  <circle cx="500" cy="160" r="7" fill="#95a5a6" opacity="0.75"/>
  <circle cx="580" cy="130" r="7" fill="#95a5a6" opacity="0.75"/>
  <circle cx="650" cy="180" r="7" fill="#95a5a6" opacity="0.75"/>

  <!-- Legend -->
  <circle cx="120" cy="400" r="6" fill="#27ae60"/>
  <text x="132" y="405" font-size="12" fill="#333">双低标的（优先选)</text>
  <circle cx="290" cy="400" r="6" fill="#e67e22"/>
  <text x="302" y="405" font-size="12" fill="#333">低价高溢（谨慎）</text>
  <circle cx="460" cy="400" r="6" fill="#2980b9"/>
  <text x="472" y="405" font-size="12" fill="#333">低溢高价（次选）</text>
  <circle cx="610" cy="400" r="6" fill="#95a5a6"/>
  <text x="622" y="405" font-size="12" fill="#333">高价高溢（回避）</text>
</svg>
