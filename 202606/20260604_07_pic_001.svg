<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="serif">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#FAFAFA"/>
  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A1A">强赎触发机制：从"赚钱信号"到"清仓倒计时"</text>
  
  <!-- 时间轴 -->
  <line x1="60" y1="220" x2="740" y2="220" stroke="#CCCCCC" stroke-width="2"/>
  
  <!-- 阶段1 -->
  <rect x="60" y="130" width="140" height="60" rx="8" fill="#E8F4FD" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="130" y="155" text-anchor="middle" font-size="13" fill="#1A3A5C">转股价格：10元</text>
  <text x="130" y="175" text-anchor="middle" font-size="13" fill="#1A3A5C">正股价格：8元</text>
  <text x="130" y="198" text-anchor="middle" font-size="11" fill="#999">溢价率高，持有中</text>

  <!-- 箭头 -->
  <polygon points="215,220 235,210 235,230" fill="#AAAAAA"/>
  <line x1="200" y1="220" x2="235" y2="220" stroke="#AAAAAA" stroke-width="2"/>
  
  <!-- 阶段2 -->
  <rect x="240" y="130" width="160" height="60" rx="8" fill="#FFF3CD" stroke="#F0A500" stroke-width="1.5"/>
  <text x="320" y="155" text-anchor="middle" font-size="13" fill="#7A4F00">正股涨到10.5元</text>
  <text x="320" y="175" text-anchor="middle" font-size="13" fill="#7A4F00">超过转股价130%</text>
  <text x="320" y="198" text-anchor="middle" font-size="11" fill="#999">= 超过 13 元/股</text>

  <!-- 箭头 -->
  <polygon points="415,220 435,210 435,230" fill="#AAAAAA"/>
  <line x1="400" y1="220" x2="435" y2="220" stroke="#AAAAAA" stroke-width="2"/>

  <!-- 阶段3 触发 -->
  <rect x="440" y="110" width="160" height="80" rx="8" fill="#FDDEDE" stroke="#D9534F" stroke-width="2"/>
  <text x="520" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#B00020">连续15/20交易日</text>
  <text x="520" y="158" text-anchor="middle" font-size="13" fill="#B00020">股价 ≥ 130%转股价</text>
  <text x="520" y="178" text-anchor="middle" font-size="12" fill="#B00020">⚡ 强赎触发！</text>
  <text x="520" y="198" text-anchor="middle" font-size="11" fill="#999">公告30天内赎回</text>

  <!-- 箭头 -->
  <polygon points="615,220 635,210 635,230" fill="#D9534F"/>
  <line x1="600" y1="220" x2="635" y2="220" stroke="#D9534F" stroke-width="2"/>

  <!-- 阶段4 结局 -->
  <rect x="640" y="120" width="120" height="70" rx="8" fill="#D4EDDA" stroke="#28A745" stroke-width="1.5"/>
  <text x="700" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">你的选择：</text>
  <text x="700" y="168" text-anchor="middle" font-size="12" fill="#155724">① 转股套现</text>
  <text x="700" y="185" text-anchor="middle" font-size="12" fill="#155724">② 卖出转债</text>

  <!-- 时间轴标签 -->
  <text x="130" y="250" text-anchor="middle" font-size="11" fill="#888">持有期</text>
  <text x="320" y="250" text-anchor="middle" font-size="11" fill="#888">股价上涨</text>
  <text x="520" y="250" text-anchor="middle" font-size="11" fill="#CC0000" font-weight="bold">⚠️ 强赎倒计时</text>
  <text x="700" y="250" text-anchor="middle" font-size="11" fill="#888">必须行动！</text>

  <!-- 底部警示 -->
  <rect x="60" y="290" width="680" height="70" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1"/>
  <text x="400" y="317" text-anchor="middle" font-size="13" font-weight="bold" fill="#7A4F00">⚠️ 强赎后若不操作：按100元面值赎回</text>
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#7A4F00">转债实际价格可能在120~150元，按100元赎回 = 白送利润给上市公司</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#999">（手续费等情况略有差异，原则：强赎公告发出后，尽早行动）</text>
</svg>
