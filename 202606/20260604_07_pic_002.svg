<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="serif">
  <rect width="800" height="420" fill="#FAFAFA"/>
  <text x="400" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A1A1A">散户面对强赎的三种命运</text>

  <!-- 列 -->
  <!-- 类型1 -->
  <rect x="40" y="60" width="220" height="310" rx="10" fill="#D4EDDA" stroke="#28A745" stroke-width="2"/>
  <text x="150" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724">✅ 懂行的散户</text>
  <line x1="60" y1="100" x2="240" y2="100" stroke="#28A745" stroke-width="1"/>
  <text x="150" y="125" text-anchor="middle" font-size="12" fill="#155724">提前设置条件提醒</text>
  <text x="150" y="148" text-anchor="middle" font-size="12" fill="#155724">持续关注正股走势</text>
  <text x="150" y="171" text-anchor="middle" font-size="12" fill="#155724">强赎公告当天即行动</text>
  <text x="150" y="194" text-anchor="middle" font-size="12" fill="#155724">选择转股或卖出</text>
  <rect x="65" y="220" width="170" height="50" rx="6" fill="#28A745"/>
  <text x="150" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="white">结果：</text>
  <text x="150" y="263" text-anchor="middle" font-size="12" fill="white">利润落袋 ✓</text>
  <text x="150" y="315" text-anchor="middle" font-size="11" fill="#155724">代表人群：</text>
  <text x="150" y="333" text-anchor="middle" font-size="11" fill="#155724">有跟踪习惯的投资者</text>
  <text x="150" y="351" text-anchor="middle" font-size="11" fill="#155724">设置了价格提醒的人</text>

  <!-- 类型2 -->
  <rect x="290" y="60" width="220" height="310" rx="10" fill="#FFF3CD" stroke="#F0A500" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#7A4F00">⚠️ 迷糊的散户</text>
  <line x1="310" y1="100" x2="490" y2="100" stroke="#F0A500" stroke-width="1"/>
  <text x="400" y="125" text-anchor="middle" font-size="12" fill="#7A4F00">看到账面浮盈很开心</text>
  <text x="400" y="148" text-anchor="middle" font-size="12" fill="#7A4F00">没注意强赎公告</text>
  <text x="400" y="171" text-anchor="middle" font-size="12" fill="#7A4F00">拖到截止日才惊觉</text>
  <text x="400" y="194" text-anchor="middle" font-size="12" fill="#7A4F00">慌忙操作，手续费损失</text>
  <rect x="315" y="220" width="170" height="50" rx="6" fill="#F0A500"/>
  <text x="400" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="white">结果：</text>
  <text x="400" y="263" text-anchor="middle" font-size="12" fill="white">少赚一部分 △</text>
  <text x="400" y="315" text-anchor="middle" font-size="11" fill="#7A4F00">代表人群：</text>
  <text x="400" y="333" text-anchor="middle" font-size="11" fill="#7A4F00">买了就不管的持有者</text>
  <text x="400" y="351" text-anchor="middle" font-size="11" fill="#7A4F00">不看公告的散户</text>

  <!-- 类型3 -->
  <rect x="540" y="60" width="220" height="310" rx="10" fill="#FDDEDE" stroke="#D9534F" stroke-width="2"/>
  <text x="650" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#B00020">❌ 吃亏的散户</text>
  <line x1="560" y1="100" x2="740" y2="100" stroke="#D9534F" stroke-width="1"/>
  <text x="650" y="125" text-anchor="middle" font-size="12" fill="#B00020">认为"还会涨"继续持有</text>
  <text x="650" y="148" text-anchor="middle" font-size="12" fill="#B00020">完全不知道强赎规则</text>
  <text x="650" y="171" text-anchor="middle" font-size="12" fill="#B00020">截止日后被动赎回</text>
  <text x="650" y="194" text-anchor="middle" font-size="12" fill="#B00020">按100元面值拿回现金</text>
  <rect x="565" y="220" width="170" height="50" rx="6" fill="#D9534F"/>
  <text x="650" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="white">结果：</text>
  <text x="650" y="263" text-anchor="middle" font-size="12" fill="white">利润大幅缩水 ✗</text>
  <text x="650" y="315" text-anchor="middle" font-size="11" fill="#B00020">代表人群：</text>
  <text x="650" y="333" text-anchor="middle" font-size="11" fill="#B00020">不读条款的持有人</text>
  <text x="650" y="351" text-anchor="middle" font-size="11" fill="#B00020">误以为越涨越好等</text>

  <!-- 底部说明 -->
  <text x="400" y="395" text-anchor="middle" font-size="11" fill="#888">三种命运的分水岭，只是一条条款知识的差距</text>
</svg>
