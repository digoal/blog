<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">下修条款触发与生效流程</text>
  
  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="30" y="70" width="140" height="70" rx="10" fill="#4a90d9" opacity="0.9"/>
  <text x="100" y="100" text-anchor="middle" font-size="13" fill="white" font-weight="bold">① 股价持续下跌</text>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="#e0f0ff">连续N日低于</text>
  <text x="100" y="136" text-anchor="middle" font-size="11" fill="#e0f0ff">转股价×85%~90%</text>
  
  <!-- Arrow 1 -->
  <polygon points="178,105 195,97 195,113" fill="#555"/>
  <line x1="170" y1="105" x2="195" y2="105" stroke="#555" stroke-width="2"/>
  
  <!-- Step 2 -->
  <rect x="200" y="70" width="140" height="70" rx="10" fill="#e67e22" opacity="0.9"/>
  <text x="270" y="100" text-anchor="middle" font-size="13" fill="white" font-weight="bold">② 公司有权提出</text>
  <text x="270" y="120" text-anchor="middle" font-size="11" fill="#fff3e0">董事会审议</text>
  <text x="270" y="136" text-anchor="middle" font-size="11" fill="#fff3e0">下修转股价方案</text>

  <!-- Arrow 2 -->
  <polygon points="348,105 365,97 365,113" fill="#555"/>
  <line x1="340" y1="105" x2="365" y2="105" stroke="#555" stroke-width="2"/>
  
  <!-- Step 3 -->
  <rect x="370" y="70" width="140" height="70" rx="10" fill="#8e44ad" opacity="0.9"/>
  <text x="440" y="100" text-anchor="middle" font-size="13" fill="white" font-weight="bold">③ 股东大会投票</text>
  <text x="440" y="120" text-anchor="middle" font-size="11" fill="#f3e0ff">股东+转债持有人</text>
  <text x="440" y="136" text-anchor="middle" font-size="11" fill="#f3e0ff">分类表决通过</text>
  
  <!-- Arrow 3 -->
  <polygon points="518,105 535,97 535,113" fill="#555"/>
  <line x1="510" y1="105" x2="535" y2="105" stroke="#555" stroke-width="2"/>
  
  <!-- Step 4 -->
  <rect x="540" y="70" width="140" height="70" rx="10" fill="#27ae60" opacity="0.9"/>
  <text x="610" y="100" text-anchor="middle" font-size="13" fill="white" font-weight="bold">④ 下修生效</text>
  <text x="610" y="120" text-anchor="middle" font-size="11" fill="#e0ffee">转股价降低</text>
  <text x="610" y="136" text-anchor="middle" font-size="11" fill="#e0ffee">转股价值上升</text>
  
  <!-- Divider -->
  <line x1="30" y1="175" x2="770" y2="175" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>
  
  <!-- Before/After comparison -->
  <text x="400" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">下修前后对比示例</text>

  <!-- Before box -->
  <rect x="50" y="215" width="310" height="160" rx="10" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="205" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">【下修前】</text>
  <text x="80" y="268" font-size="13" fill="#444">转股价：10元</text>
  <text x="80" y="292" font-size="13" fill="#444">正股现价：7元</text>
  <text x="80" y="316" font-size="13" fill="#444">转股价值：70元（面值100元）</text>
  <text x="80" y="340" font-size="13" fill="#e74c3c">转股毫无吸引力 ❌</text>
  <text x="80" y="362" font-size="12" fill="#999">转债价格接近纯债价值</text>

  <!-- Arrow between boxes -->
  <polygon points="373,295 390,287 390,303" fill="#27ae60"/>
  <line x1="360" y1="295" x2="390" y2="295" stroke="#27ae60" stroke-width="2.5"/>
  <text x="375" y="282" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">下修</text>

  <!-- After box -->
  <rect x="400" y="215" width="310" height="160" rx="10" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="555" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">【下修后】</text>
  <text x="430" y="268" font-size="13" fill="#444">转股价：7.5元（下修至接近股价）</text>
  <text x="430" y="292" font-size="13" fill="#444">正股现价：7元</text>
  <text x="430" y="316" font-size="13" fill="#444">转股价值：93元（面值100元）</text>
  <text x="430" y="340" font-size="13" fill="#27ae60">转股吸引力大增 ✅</text>
  <text x="430" y="362" font-size="12" fill="#999">转债价格跟随上涨</text>
</svg>
