<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">博弈局：谁想下修，谁不想下修？</text>
  
  <!-- Company side -->
  <rect x="30" y="60" width="340" height="280" rx="12" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#e67e22">🏢 发行公司</text>
  
  <!-- wants -->
  <text x="55" y="120" font-size="13" font-weight="bold" fill="#27ae60">✅ 想下修的情景：</text>
  <text x="65" y="142" font-size="12" fill="#444">• 即将触发回售条款，要被迫还钱</text>
  <text x="65" y="162" font-size="12" fill="#444">• 想尽快把转债变成股本（减少债务）</text>
  <text x="65" y="182" font-size="12" fill="#444">• 公司现金紧张，拿不出钱还债</text>
  
  <line x1="55" y1="198" x2="345" y2="198" stroke="#ddd" stroke-width="1"/>
  
  <text x="55" y="222" font-size="13" font-weight="bold" fill="#e74c3c">❌ 不想下修的情景：</text>
  <text x="65" y="244" font-size="12" fill="#444">• 觉得股价会自然反弹，不愿摊薄股东</text>
  <text x="65" y="264" font-size="12" fill="#444">• 转股价过低会引发大量转股，稀释股价</text>
  <text x="65" y="284" font-size="12" fill="#444">• 大股东持股比例不想被稀释</text>
  <text x="65" y="312" font-size="11" fill="#999" font-style="italic">关键：公司有权提但不一定用</text>

  <!-- divider -->
  <line x1="390" y1="60" x2="390" y2="340" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="400" y="200" text-anchor="middle" font-size="22" fill="#aaa">VS</text>

  <!-- Investor side -->
  <rect x="430" y="60" width="340" height="280" rx="12" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="600" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a90d9">💼 转债持有人（你）</text>
  
  <text x="455" y="120" font-size="13" font-weight="bold" fill="#27ae60">✅ 下修对你的好处：</text>
  <text x="465" y="142" font-size="12" fill="#444">• 转股价值上升，转债价格涨</text>
  <text x="465" y="162" font-size="12" fill="#444">• 如果正股同时上涨，双重获利</text>
  <text x="465" y="182" font-size="12" fill="#444">• 持仓低价转债，等待下修是常见策略</text>
  
  <line x1="455" y1="198" x2="745" y2="198" stroke="#ddd" stroke-width="1"/>
  
  <text x="455" y="222" font-size="13" font-weight="bold" fill="#e74c3c">❌ 要注意的风险：</text>
  <text x="465" y="244" font-size="12" fill="#444">• 公司也可以选择不下修</text>
  <text x="465" y="264" font-size="12" fill="#444">• 下修后大量转股可能压制正股价格</text>
  <text x="465" y="284" font-size="12" fill="#444">• 下修是利好，但不是无风险的</text>
  <text x="465" y="312" font-size="11" fill="#999" font-style="italic">关键：下修预期是价格上涨的驱动力</text>
</svg>
