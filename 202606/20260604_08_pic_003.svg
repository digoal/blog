<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">下修博弈投资框架（三问法）</text>
  
  <!-- Q1 -->
  <rect x="30" y="60" width="220" height="260" rx="10" fill="white" stroke="#4a90d9" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="46" rx="10" fill="#4a90d9"/>
  <text x="140" y="80" text-anchor="middle" font-size="14" fill="white" font-weight="bold">问题一</text>
  <text x="140" y="98" text-anchor="middle" font-size="13" fill="white">公司有没有下修动机？</text>
  
  <text x="50" y="130" font-size="12" fill="#27ae60" font-weight="bold">✅ 动机强：</text>
  <text x="50" y="150" font-size="11" fill="#444">• 距回售日期不足3个月</text>
  <text x="50" y="168" font-size="11" fill="#444">• 公司现金流偏紧</text>
  <text x="50" y="186" font-size="11" fill="#444">• 大股东有减持需求</text>
  
  <text x="50" y="212" font-size="12" fill="#e74c3c" font-weight="bold">❌ 动机弱：</text>
  <text x="50" y="232" font-size="11" fill="#444">• 公司账上现金充裕</text>
  <text x="50" y="250" font-size="11" fill="#444">• 大股东担心股权稀释</text>
  <text x="50" y="268" font-size="11" fill="#444">• 前次下修刚完成</text>
  <text x="50" y="294" font-size="11" fill="#888">→ 动机强，持仓逻辑稳</text>
  
  <!-- Arrow -->
  <polygon points="258,190 272,183 272,197" fill="#aaa"/>
  <line x1="250" y1="190" x2="272" y2="190" stroke="#aaa" stroke-width="1.5"/>
  
  <!-- Q2 -->
  <rect x="280" y="60" width="220" height="260" rx="10" fill="white" stroke="#e67e22" stroke-width="2"/>
  <rect x="280" y="60" width="220" height="46" rx="10" fill="#e67e22"/>
  <text x="390" y="80" text-anchor="middle" font-size="14" fill="white" font-weight="bold">问题二</text>
  <text x="390" y="98" text-anchor="middle" font-size="13" fill="white">公司有没有能力下修？</text>
  
  <text x="300" y="130" font-size="12" fill="#27ae60" font-weight="bold">✅ 能下修：</text>
  <text x="300" y="150" font-size="11" fill="#444">• 转股价距下修红线不远</text>
  <text x="300" y="168" font-size="11" fill="#444">• 历史上有过下修先例</text>
  <text x="300" y="186" font-size="11" fill="#444">• 大股东态度积极</text>
  
  <text x="300" y="212" font-size="12" fill="#e74c3c" font-weight="bold">❌ 难下修：</text>
  <text x="300" y="232" font-size="11" fill="#444">• 转股价已接近票面价值</text>
  <text x="300" y="250" font-size="11" fill="#444">• 涉及国资，决策流程长</text>
  <text x="300" y="268" font-size="11" fill="#444">• 之前股东大会否决过</text>
  <text x="300" y="294" font-size="11" fill="#888">→ 能力弱，加大不确定性</text>
  
  <!-- Arrow -->
  <polygon points="508,190 522,183 522,197" fill="#aaa"/>
  <line x1="500" y1="190" x2="522" y2="190" stroke="#aaa" stroke-width="1.5"/>
  
  <!-- Q3 -->
  <rect x="530" y="60" width="240" height="260" rx="10" fill="white" stroke="#27ae60" stroke-width="2"/>
  <rect x="530" y="60" width="240" height="46" rx="10" fill="#27ae60"/>
  <text x="650" y="80" text-anchor="middle" font-size="14" fill="white" font-weight="bold">问题三</text>
  <text x="650" y="98" text-anchor="middle" font-size="13" fill="white">转债价格有没有安全边际？</text>
  
  <text x="550" y="130" font-size="12" fill="#27ae60" font-weight="bold">✅ 安全边际足：</text>
  <text x="550" y="150" font-size="11" fill="#444">• 价格接近纯债价值（≈90元）</text>
  <text x="550" y="168" font-size="11" fill="#444">• 到期收益率为正</text>
  <text x="550" y="186" font-size="11" fill="#444">• 溢价率不高（正股空间大）</text>
  
  <text x="550" y="212" font-size="12" fill="#e74c3c" font-weight="bold">❌ 安全边际弱：</text>
  <text x="550" y="232" font-size="11" fill="#444">• 价格已涨至120元以上</text>
  <text x="550" y="250" font-size="11" fill="#444">• 市场已提前price in下修</text>
  <text x="550" y="268" font-size="11" fill="#444">• 公司信用评级差</text>
  <text x="550" y="294" font-size="11" fill="#888">→ 只有三问都OK才出手</text>
</svg>
