<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">可转债「出口」全景图</text>

  <!-- 三个出口 -->
  <!-- 1. 转股 -->
  <rect x="40" y="60" width="210" height="300" rx="10" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <text x="145" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">① 转股（主动）</text>
  <text x="145" y="112" text-anchor="middle" font-size="11" fill="#555">投资者主动把债转成股票</text>
  <line x1="60" y1="124" x2="230" y2="124" stroke="#acd" stroke-width="1" stroke-dasharray="4"/>
  <text x="145" y="145" text-anchor="middle" font-size="11" fill="#333">触发条件</text>
  <text x="145" y="165" text-anchor="middle" font-size="10" fill="#555">股价 ≥ 转股价×130%</text>
  <text x="145" y="183" text-anchor="middle" font-size="10" fill="#555">且持续15个交易日</text>
  <text x="145" y="210" text-anchor="middle" font-size="11" fill="#333">谁获利</text>
  <text x="145" y="230" text-anchor="middle" font-size="10" fill="#27ae60">📈 股票大涨，投资者赚钱</text>
  <text x="145" y="260" text-anchor="middle" font-size="11" fill="#333">风险提示</text>
  <text x="145" y="280" text-anchor="middle" font-size="10" fill="#e74c3c">强赎后不转股</text>
  <text x="145" y="298" text-anchor="middle" font-size="10" fill="#e74c3c">只拿到强赎价，可能亏</text>

  <!-- 2. 回售 -->
  <rect x="295" y="60" width="210" height="300" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">② 回售（主动）</text>
  <text x="400" y="112" text-anchor="middle" font-size="11" fill="#555">投资者把债卖还给发行公司</text>
  <line x1="315" y1="124" x2="485" y2="124" stroke="#fdc" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="145" text-anchor="middle" font-size="11" fill="#333">触发条件</text>
  <text x="400" y="165" text-anchor="middle" font-size="10" fill="#555">最后2年内，股价连续30天</text>
  <text x="400" y="183" text-anchor="middle" font-size="10" fill="#555">低于转股价×70%</text>
  <text x="400" y="210" text-anchor="middle" font-size="11" fill="#333">谁获利</text>
  <text x="400" y="230" text-anchor="middle" font-size="10" fill="#27ae60">🛡️ 股价大跌，投资者保本</text>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#333">风险提示</font>
  <text x="400" y="280" text-anchor="middle" font-size="10" fill="#e74c3c">公司可能先下修转股价</text>
  <text x="400" y="298" text-anchor="middle" font-size="10" fill="#e74c3c">来规避回售义务</text>

  <!-- 3. 到期赎回 -->
  <rect x="550" y="60" width="210" height="300" rx="10" fill="#f9ebea" stroke="#e74c3c" stroke-width="2"/>
  <text x="655" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">③ 到期赎回（被动）</text>
  <text x="655" y="112" text-anchor="middle" font-size="11" fill="#555">6年到期，公司强制赎回</text>
  <line x1="570" y1="124" x2="740" y2="124" stroke="#fcc" stroke-width="1" stroke-dasharray="4"/>
  <text x="655" y="145" text-anchor="middle" font-size="11" fill="#333">触发条件</text>
  <text x="655" y="165" text-anchor="middle" font-size="10" fill="#555">满6年，未转股、未回售</text>
  <text x="655" y="183" text-anchor="middle" font-size="10" fill="#555">（发行时已注明赎回价）</text>
  <text x="655" y="210" text-anchor="middle" font-size="11" fill="#333">价格参考</text>
  <text x="655" y="230" text-anchor="middle" font-size="10" fill="#555">典型：面值100元×(1+2%)^6</text>
  <text x="655" y="248" text-anchor="middle" font-size="10" fill="#555">≈ 112元（含利息补偿）</text>
  <text x="655" y="275" text-anchor="middle" font-size="11" fill="#333">风险提示</text>
  <text x="655" y="295" text-anchor="middle" font-size="10" fill="#e74c3c">若高价买入再持有到期</text>
  <text x="655" y="313" text-anchor="middle" font-size="10" fill="#e74c3c">可能亏损</text>

  <!-- 底部说明 -->
  <rect x="40" y="375" width="720" height="32" rx="6" fill="#ecf0f1"/>
  <text x="400" y="396" text-anchor="middle" font-size="11" fill="#666">三条出路的优先顺序：对投资者最好的是转股（赚股票涨幅），最差的是高价买入后被动等到期赎回</text>
</svg>
