<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">可转债信用评级风险地图</text>

  <!-- 评级梯队 -->
  <!-- AAA -->
  <rect x="40" y="55" width="720" height="50" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="120" y="76" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e8449">AAA</text>
  <text x="120" y="95" text-anchor="middle" font-size="10" fill="#555">最高评级</text>
  <text x="420" y="76" text-anchor="middle" font-size="11" fill="#333">国企背景、大型央企。违约概率极低，但收益率也低。</text>
  <text x="420" y="95" text-anchor="middle" font-size="11" fill="#27ae60">✓ 安全，但别期待高收益</text>
  <text x="710" y="83" text-anchor="middle" font-size="12" fill="#1e8449">低风险</text>

  <!-- AA+ / AA -->
  <rect x="40" y="115" width="720" height="50" rx="8" fill="#eafaf1" stroke="#58d68d" stroke-width="1.5"/>
  <text x="120" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#239b56">AA+ / AA</text>
  <text x="120" y="155" text-anchor="middle" font-size="10" fill="#555">优质</text>
  <text x="420" y="136" text-anchor="middle" font-size="11" fill="#333">大多数主流可转债所在区间，流动性好，违约少见。</text>
  <text x="420" y="155" text-anchor="middle" font-size="11" fill="#27ae60">✓ 散户主力配置区间</text>
  <text x="710" y="143" text-anchor="middle" font-size="12" fill="#239b56">可接受</text>

  <!-- AA- -->
  <rect x="40" y="175" width="720" height="50" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="120" y="196" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">AA-</text>
  <text x="120" y="215" text-anchor="middle" font-size="10" fill="#555">注意观察</text>
  <text x="420" y="196" text-anchor="middle" font-size="11" fill="#333">中小企业居多，需要关注公司基本面，风险有所上升。</text>
  <text x="420" y="215" text-anchor="middle" font-size="11" fill="#e67e22">⚠ 溢价率和债底保护需重点核查</text>
  <text x="710" y="203" text-anchor="middle" font-size="12" fill="#e67e22">需谨慎</text>

  <!-- A+ 及以下 -->
  <rect x="40" y="235" width="720" height="50" rx="8" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="120" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">A+ 及以下</text>
  <text x="120" y="275" text-anchor="middle" font-size="10" fill="#555">高风险</text>
  <text x="420" y="256" text-anchor="middle" font-size="11" fill="#333">历史上多数退市/违约风险转债出自此区间。</text>
  <text x="420" y="275" text-anchor="middle" font-size="11" fill="#e74c3c">✗ 小白建议回避，除非确有专业能力</text>
  <text x="710" y="263" text-anchor="middle" font-size="12" fill="#c0392b">高危</text>

  <!-- 底部说明 -->
  <rect x="40" y="298" width="720" height="65" rx="8" fill="#ecf0f1"/>
  <text x="400" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">⚠ 关键提醒</text>
  <text x="400" y="340" text-anchor="middle" font-size="11" fill="#555">评级是初始的，不是静态的。公司经营恶化会导致评级下调（下调过程股价往往也在跌）。</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#e74c3c">低价格 ≠ 低风险。A评级、价格80元的转债，不如AA评级、价格105元的转债安全。</text>
</svg>
