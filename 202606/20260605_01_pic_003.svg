<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">回售触发后的决策树</text>

  <!-- 起点 -->
  <rect x="300" y="55" width="200" height="44" rx="8" fill="#3498db" />
  <text x="400" y="73" text-anchor="middle" font-size="12" fill="white" font-weight="bold">股价连续跌破回售触发线</text>
  <text x="400" y="91" text-anchor="middle" font-size="10" fill="#dce" >(30天低于转股价×70%)</text>

  <!-- 箭头 -->
  <line x1="400" y1="99" x2="400" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- 问题1 -->
  <rect x="275" y="130" width="250" height="38" rx="8" fill="#ecf0f1" stroke="#95a5a6"/>
  <text x="400" y="154" text-anchor="middle" font-size="12" fill="#2c3e50">公司有没有宣布下修转股价？</text>

  <!-- 左：有下修 -->
  <line x1="275" y1="149" x2="160" y2="205" stroke="#555" stroke-width="1.5"/>
  <text x="190" y="185" font-size="10" fill="#555">有下修</text>
  <rect x="60" y="205" width="200" height="54" rx="8" fill="#fef9e7" stroke="#f39c12"/>
  <text x="160" y="223" text-anchor="middle" font-size="11" fill="#333">观察下修后转股价</text>
  <text x="160" y="241" text-anchor="middle" font-size="10" fill="#e67e22">若转股价下移，债券价值回升</text>
  <text x="160" y="257" text-anchor="middle" font-size="10" fill="#555">评估后再决定是否回售</text>

  <!-- 右：没有下修 -->
  <line x1="525" y1="149" x2="640" y2="205" stroke="#555" stroke-width="1.5"/>
  <text x="600" y="185" font-size="10" fill="#555">没有下修</text>
  <rect x="540" y="205" width="200" height="54" rx="8" fill="#fdecea" stroke="#e74c3c"/>
  <text x="640" y="223" text-anchor="middle" font-size="11" fill="#333">评估是否触发回售条件</text>
  <text x="640" y="241" text-anchor="middle" font-size="10" fill="#e74c3c">条件满足：申报回售，锁定收益</text>
  <text x="640" y="257" text-anchor="middle" font-size="10" fill="#555">注意：回售窗口期有限！</text>

  <!-- 向下箭头两支汇合 -->
  <line x1="160" y1="259" x2="160" y2="300" stroke="#555" stroke-width="1.2"/>
  <line x1="640" y1="259" x2="640" y2="300" stroke="#555" stroke-width="1.2"/>
  <line x1="160" y1="300" x2="640" y2="300" stroke="#555" stroke-width="1.2"/>
  <line x1="400" y1="300" x2="400" y2="330" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 结论 -->
  <rect x="220" y="330" width="360" height="50" rx="8" fill="#2ecc71"/>
  <text x="400" y="352" text-anchor="middle" font-size="12" font-weight="bold" fill="white">核心原则：回售是权利，不是义务</text>
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="white">把握窗口期，主动申报，避免错过保护机制</text>
</svg>
