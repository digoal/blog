<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">新债申购收益 vs 市场环境关系图</text>

  <!-- 坐标轴 -->
  <line x1="100" y1="330" x2="720" y2="330" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="330" stroke="#333" stroke-width="2"/>

  <!-- X轴标签 -->
  <text x="400" y="365" text-anchor="middle" font-size="13" fill="#555">市场环境（熊市 → 牛市）</text>
  <text x="140" y="350" text-anchor="middle" font-size="11" fill="#e74c3c">熊市</text>
  <text x="290" y="350" text-anchor="middle" font-size="11" fill="#e67e22">震荡市</text>
  <text x="450" y="350" text-anchor="middle" font-size="11" fill="#27ae60">牛市初期</text>
  <text x="620" y="350" text-anchor="middle" font-size="11" fill="#2980b9">牛市中期</text>

  <!-- Y轴标签 -->
  <text x="90" y="335" text-anchor="end" font-size="11" fill="#555">0%</text>
  <text x="90" y="280" text-anchor="end" font-size="11" fill="#555">10%</text>
  <text x="90" y="225" text-anchor="end" font-size="11" fill="#555">20%</text>
  <text x="90" y="170" text-anchor="end" font-size="11" fill="#555">30%</text>
  <text x="90" y="115" text-anchor="end" font-size="11" fill="#555">40%</text>
  <text x="55" y="200" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,55,200)">首日平均涨幅</text>

  <!-- 辅助横线 -->
  <line x1="100" y1="280" x2="720" y2="280" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="225" x2="720" y2="225" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="170" x2="720" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="115" x2="720" y2="115" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>

  <!-- 折线：首日涨幅趋势 -->
  <!-- 熊市：可能破发，用-5%表示 -->
  <polyline points="140,357 290,300 450,225 620,140" fill="none" stroke="#4a90d9" stroke-width="3"/>

  <!-- 数据点 -->
  <circle cx="140" cy="357" r="7" fill="#e74c3c"/>
  <circle cx="290" cy="300" r="7" fill="#e67e22"/>
  <circle cx="450" cy="225" r="7" fill="#27ae60"/>
  <circle cx="620" cy="140" r="7" fill="#2980b9"/>

  <!-- 数值标注 -->
  <text x="140" y="348" text-anchor="middle" font-size="11" fill="#e74c3c">破发风险</text>
  <text x="290" y="291" text-anchor="middle" font-size="11" fill="#e67e22">~5-10%</text>
  <text x="450" y="216" text-anchor="middle" font-size="11" fill="#27ae60">~15-20%</text>
  <text x="620" y="131" text-anchor="middle" font-size="11" fill="#2980b9">~25-40%</text>

  <!-- 破发警戒线 -->
  <line x1="100" y1="330" x2="720" y2="330" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="730" y="334" font-size="11" fill="#e74c3c">破发线</text>

  <!-- 图例 -->
  <rect x="130" y="55" width="280" height="50" fill="white" rx="4" stroke="#ddd" stroke-width="1"/>
  <line x1="145" y1="73" x2="175" y2="73" stroke="#4a90d9" stroke-width="3"/>
  <circle cx="160" cy="73" r="5" fill="#4a90d9"/>
  <text x="185" y="77" font-size="12" fill="#333">新债上市首日平均涨幅</text>
  <text x="145" y="96" font-size="11" fill="#888">数据来源：Wind，统计区间2019-2025年</text>
</svg>
