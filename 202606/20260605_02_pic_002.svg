<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="380" fill="#f8f9fa" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">新债申购全流程时间轴</text>

  <!-- 时间轴横线 -->
  <line x1="60" y1="100" x2="740" y2="100" stroke="#4a90d9" stroke-width="3"/>

  <!-- 节点圆圈 -->
  <circle cx="110" cy="100" r="18" fill="#4a90d9"/>
  <circle cx="270" cy="100" r="18" fill="#4a90d9"/>
  <circle cx="430" cy="100" r="18" fill="#4a90d9"/>
  <circle cx="570" cy="100" r="18" fill="#4a90d9"/>
  <circle cx="710" cy="100" r="18" fill="#e74c3c"/>

  <!-- 节点标签（上方） -->
  <text x="110" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">T日</text>
  <text x="270" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">T+1日</text>
  <text x="430" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">T+2日</text>
  <text x="570" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">T+15~20日</text>
  <text x="710" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">上市首日</text>

  <!-- 节点说明（下方） -->
  <text x="110" y="140" text-anchor="middle" font-size="12" fill="#333">顶格申购</text>
  <text x="110" y="157" text-anchor="middle" font-size="12" fill="#333">（无需资金）</text>

  <text x="270" y="140" text-anchor="middle" font-size="12" fill="#333">公布中签率</text>
  <text x="270" y="157" text-anchor="middle" font-size="12" fill="#333">确认是否中签</text>

  <text x="430" y="140" text-anchor="middle" font-size="12" fill="#333">中签缴款</text>
  <text x="430" y="157" text-anchor="middle" font-size="12" fill="#333">（16:00前，1000元/签）</text>

  <text x="570" y="140" text-anchor="middle" font-size="12" fill="#333">债券到账</text>
  <text x="570" y="157" text-anchor="middle" font-size="12" fill="#333">等待上市</text>

  <text x="710" y="140" text-anchor="middle" font-size="12" fill="#e74c3c">开盘卖出</text>
  <text x="710" y="157" text-anchor="middle" font-size="12" fill="#e74c3c">（或择机持有）</text>

  <!-- 箭头 -->
  <text x="100" y="103" text-anchor="middle" font-size="14" fill="white">1</text>
  <text x="270" y="103" text-anchor="middle" font-size="14" fill="white">2</text>
  <text x="430" y="103" text-anchor="middle" font-size="14" fill="white">3</text>
  <text x="570" y="103" text-anchor="middle" font-size="14" fill="white">4</text>
  <text x="710" y="103" text-anchor="middle" font-size="14" fill="white">5</text>

  <!-- 分隔线 -->
  <line x1="60" y1="220" x2="740" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>

  <!-- 关键提示区 -->
  <rect x="60" y="235" width="320" height="120" fill="#e8f4fd" rx="6" stroke="#4a90d9" stroke-width="1"/>
  <text x="220" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6ca8">✅ 打新优点</text>
  <text x="80" y="280" font-size="12" fill="#333">• 申购时无需资金，中签后才缴款</text>
  <text x="80" y="298" font-size="12" fill="#333">• 每签仅需1000元，门槛极低</text>
  <text x="80" y="316" font-size="12" fill="#333">• 2020-2025年整体破发率低于10%</text>
  <text x="80" y="334" font-size="12" fill="#333">• 牛市环境下首日平均涨幅可达20%+</text>

  <rect x="420" y="235" width="320" height="120" fill="#fdeaea" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="580" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">⚠️ 需要警惕</text>
  <text x="440" y="280" font-size="12" fill="#333">• 中签率极低（2025年低于0.05%）</text>
  <text x="440" y="298" font-size="12" fill="#333">• 熊市/大盘暴跌时破发概率大增</text>
  <text x="440" y="316" font-size="12" fill="#333">• 发行规模大、评级低的债风险高</text>
  <text x="440" y="334" font-size="12" fill="#333">• 3次弃购将被限制申购资格6个月</text>
</svg>
