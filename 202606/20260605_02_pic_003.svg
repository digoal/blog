<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="420" fill="#f8f9fa" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">新债申购破发风险评估矩阵</text>

  <!-- 四象限背景 -->
  <rect x="80" y="50" width="310" height="170" fill="#fdeaea" rx="4" opacity="0.7"/>
  <rect x="410" y="50" width="310" height="170" fill="#fff3e0" rx="4" opacity="0.7"/>
  <rect x="80" y="240" width="310" height="160" fill="#e8f5e9" rx="4" opacity="0.7"/>
  <rect x="410" y="240" width="310" height="160" fill="#e3f2fd" rx="4" opacity="0.7"/>

  <!-- 象限标题 -->
  <text x="235" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">❌ 高危区</text>
  <text x="565" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">⚡ 谨慎区</text>
  <text x="235" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">✅ 适合申购</text>
  <text x="565" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">🌟 黄金机会</text>

  <!-- 轴线 -->
  <line x1="400" y1="45" x2="400" y2="410" stroke="#999" stroke-width="2" stroke-dasharray="5"/>
  <line x1="75" y1="235" x2="730" y2="235" stroke="#999" stroke-width="2" stroke-dasharray="5"/>

  <!-- 轴标签 -->
  <text x="400" y="420" text-anchor="middle" font-size="13" fill="#555">← 熊市/震荡市 | 牛市 →</text>
  <text x="35" y="145" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,35,145)">↑ 大盘/评级差</text>
  <text x="35" y="320" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,35,320)">↓ 小盘/评级好</text>

  <!-- 象限内容 -->
  <text x="95" y="100" font-size="12" fill="#c0392b">• 大发行规模（>20亿）</text>
  <text x="95" y="120" font-size="12" fill="#c0392b">• 评级较低（AA-以下）</text>
  <text x="95" y="140" font-size="12" fill="#c0392b">• 熊市/大盘下跌期</text>
  <text x="95" y="160" font-size="12" fill="#c0392b">• 正股跌破发行价</text>
  <text x="95" y="185" font-size="11" fill="#888">→ 破发概率高，慎参与</text>

  <text x="425" y="100" font-size="12" fill="#d35400">• 大发行规模</text>
  <text x="425" y="120" font-size="12" fill="#d35400">• 但市场偏好还行</text>
  <text x="425" y="140" font-size="12" fill="#d35400">• 正股走势一般</text>
  <text x="425" y="160" font-size="12" fill="#d35400">• 资金面中性</text>
  <text x="425" y="185" font-size="11" fill="#888">→ 收益有限，选择性参与</text>

  <text x="95" y="285" font-size="12" fill="#27ae60">• 小发行规模（<5亿）</text>
  <text x="95" y="305" font-size="12" fill="#27ae60">• 评级不错（AA及以上）</text>
  <text x="95" y="325" font-size="12" fill="#27ae60">• 市场整体平稳</text>
  <text x="95" y="345" font-size="12" fill="#27ae60">• 正股无明显破位</text>
  <text x="95" y="370" font-size="11" fill="#888">→ 申购胜率较高</text>

  <text x="425" y="285" font-size="12" fill="#2980b9">• 小/中发行规模</text>
  <text x="425" y="305" font-size="12" fill="#2980b9">• 评级良好</text>
  <text x="425" y="325" font-size="12" fill="#2980b9">• 牛市上行期</text>
  <text x="425" y="345" font-size="12" fill="#2980b9">• 正股趋势向好</text>
  <text x="425" y="370" font-size="11" fill="#888">→ 首日溢价最大，积极申购</text>
</svg>
