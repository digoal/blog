<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">配债策略全景图：三种参与方式对比</text>

  <!-- Column headers -->
  <rect x="30" y="55" width="220" height="44" rx="8" fill="#4361ee"/>
  <text x="140" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">参与方式</text>
  <text x="140" y="89" text-anchor="middle" font-size="12" fill="#c8d6ff">比较维度</text>

  <rect x="265" y="55" width="155" height="44" rx="8" fill="#7209b7"/>
  <text x="342" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">①网上申购打新</text>
  <text x="342" y="89" text-anchor="middle" font-size="11" fill="#e0c3fc">中签才能参与</text>

  <rect x="435" y="55" width="155" height="44" rx="8" fill="#f72585"/>
  <text x="512" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">②持股配售</text>
  <text x="512" y="89" text-anchor="middle" font-size="11" fill="#ffc8dd">股权登记日前持股</text>

  <rect x="605" y="55" width="165" height="44" rx="8" fill="#fb8500"/>
  <text x="687" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">③抢权配售</text>
  <text x="687" y="89" text-anchor="middle" font-size="11" fill="#ffe5b4">登记日买入登记日后卖</text>

  <!-- Rows -->
  <!-- Row 1 -->
  <rect x="30" y="107" width="220" height="42" rx="0" fill="#eef2ff"/>
  <text x="140" y="133" text-anchor="middle" font-size="13" fill="#333">资金占用</text>
  <rect x="265" y="107" width="155" height="42" fill="#f0e6ff"/>
  <text x="342" y="133" text-anchor="middle" font-size="12" fill="#5a0070">几乎为零（中签才冻结）</text>
  <rect x="435" y="107" width="155" height="42" fill="#ffe4ef"/>
  <text x="512" y="124" text-anchor="middle" font-size="12" fill="#8a0033">持续占用股票资金</text>
  <text x="512" y="140" text-anchor="middle" font-size="11" fill="#b0004a">（至少到登记日）</text>
  <rect x="605" y="107" width="165" height="42" fill="#fff3e0"/>
  <text x="687" y="124" text-anchor="middle" font-size="12" fill="#7a3800">仅占用1~2日</text>
  <text x="687" y="140" text-anchor="middle" font-size="11" fill="#a05000">买入→登记→卖出</text>

  <!-- Row 2 -->
  <rect x="30" y="149" width="220" height="42" rx="0" fill="#fff"/>
  <text x="140" y="175" text-anchor="middle" font-size="13" fill="#333">参与门槛</text>
  <rect x="265" y="149" width="155" height="42" fill="#f9f0ff"/>
  <text x="342" y="166" text-anchor="middle" font-size="12" fill="#5a0070">低，无需持股</text>
  <text x="342" y="182" text-anchor="middle" font-size="11" fill="#8a4fbe">沪市1手=每1股配售1元</text>
  <rect x="435" y="149" width="155" height="42" fill="#fff0f5"/>
  <text x="512" y="166" text-anchor="middle" font-size="12" fill="#8a0033">需在登记日持有正股</text>
  <text x="512" y="182" text-anchor="middle" font-size="11" fill="#cc3366">每1股可配1元转债</text>
  <rect x="605" y="149" width="165" height="42" fill="#fff8f0"/>
  <text x="687" y="166" text-anchor="middle" font-size="12" fill="#7a3800">需买入正股</text>
  <text x="687" y="182" text-anchor="middle" font-size="11" fill="#a05000">资金要求最高</text>

  <!-- Row 3 -->
  <rect x="30" y="191" width="220" height="42" rx="0" fill="#eef2ff"/>
  <text x="140" y="217" text-anchor="middle" font-size="13" fill="#333">主要收益来源</text>
  <rect x="265" y="191" width="155" height="42" fill="#f0e6ff"/>
  <text x="342" y="208" text-anchor="middle" font-size="12" fill="#5a0070">上市首日溢价</text>
  <text x="342" y="224" text-anchor="middle" font-size="11" fill="#8a4fbe">（有时10%~30%）</text>
  <rect x="435" y="191" width="155" height="42" fill="#ffe4ef"/>
  <text x="512" y="208" text-anchor="middle" font-size="12" fill="#8a0033">上市首日溢价</text>
  <text x="512" y="224" text-anchor="middle" font-size="11" fill="#cc3366">确定性高于打新</text>
  <rect x="605" y="191" width="165" height="42" fill="#fff3e0"/>
  <text x="687" y="208" text-anchor="middle" font-size="12" fill="#7a3800">配债溢价+股票差价</text>
  <text x="687" y="224" text-anchor="middle" font-size="11" fill="#a05000">双刃剑</text>

  <!-- Row 4 -->
  <rect x="30" y="233" width="220" height="42" rx="0" fill="#fff"/>
  <text x="140" y="259" text-anchor="middle" font-size="13" fill="#333">主要风险</text>
  <rect x="265" y="233" width="155" height="42" fill="#f9f0ff"/>
  <text x="342" y="250" text-anchor="middle" font-size="12" fill="#5a0070">破发或涨幅不足</text>
  <text x="342" y="266" text-anchor="middle" font-size="11" fill="#8a4fbe">中签反成负担</text>
  <rect x="435" y="233" width="155" height="42" fill="#fff0f5"/>
  <text x="512" y="250" text-anchor="middle" font-size="12" fill="#8a0033">正股下跌</text>
  <text x="512" y="266" text-anchor="middle" font-size="11" fill="#cc3366">配债涨幅覆盖不了股亏</text>
  <rect x="605" y="233" width="165" height="42" fill="#fff8f0"/>
  <text x="687" y="250" text-anchor="middle" font-size="12" fill="#7a3800">正股暴跌</text>
  <text x="687" y="266" text-anchor="middle" font-size="11" fill="#a05000">亏损可能远超配债收益</text>

  <!-- Row 5 -->
  <rect x="30" y="275" width="220" height="42" rx="0" fill="#eef2ff"/>
  <text x="140" y="301" text-anchor="middle" font-size="13" fill="#333">小白适合度</text>
  <rect x="265" y="275" width="155" height="42" fill="#e8ffe8"/>
  <text x="342" y="292" text-anchor="middle" font-size="13" fill="#1a7a1a" font-weight="bold">★★★★☆</text>
  <text x="342" y="308" text-anchor="middle" font-size="11" fill="#2e8b2e">最适合入门</text>
  <rect x="435" y="275" width="155" height="42" fill="#fffde0"/>
  <text x="512" y="292" text-anchor="middle" font-size="13" fill="#9a7700" font-weight="bold">★★★☆☆</text>
  <text x="512" y="308" text-anchor="middle" font-size="11" fill="#b38a00">需理解正股逻辑</text>
  <rect x="605" y="275" width="165" height="42" fill="#ffeded"/>
  <text x="687" y="292" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">★★☆☆☆</text>
  <text x="687" y="308" text-anchor="middle" font-size="11" fill="#c0392b">不推荐新手</text>

  <!-- Bottom border -->
  <rect x="30" y="317" width="740" height="1" fill="#ddd"/>

  <!-- Legend -->
  <text x="400" y="345" text-anchor="middle" font-size="12" fill="#666">注：配售比例规则：每持有1股正股，可优先认购面值1元可转债（沪市），需凑满1000元/张</text>
  <text x="400" y="368" text-anchor="middle" font-size="12" fill="#888">★越多表示小白参与越合适，不代表收益高低</text>

  <!-- Warning box -->
  <rect x="30" y="384" width="740" height="26" rx="6" fill="#fff3cd"/>
  <text x="400" y="401" text-anchor="middle" font-size="12" fill="#856404">⚠️ 三种方式都存在亏损可能——没有任何一种"无风险套利"，请勿满仓押注单只新债</text>
</svg>
