<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">抢权配售：收益与风险拆解</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#555">以10万元正股、配到5张转债（面值5000元）为例</text>

  <!-- Timeline -->
  <!-- D-1 -->
  <circle cx="100" cy="130" r="24" fill="#4361ee"/>
  <text x="100" y="125" text-anchor="middle" font-size="11" fill="white" font-weight="bold">D-1</text>
  <text x="100" y="140" text-anchor="middle" font-size="10" fill="white">登记前日</text>
  <text x="100" y="165" text-anchor="middle" font-size="12" fill="#333">买入正股</text>
  <text x="100" y="181" text-anchor="middle" font-size="11" fill="#666">10万元买入</text>

  <!-- Arrow -->
  <line x1="126" y1="130" x2="204" y2="130" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- D -->
  <circle cx="230" cy="130" r="24" fill="#4361ee"/>
  <text x="230" y="125" text-anchor="middle" font-size="12" fill="white" font-weight="bold">D</text>
  <text x="230" y="140" text-anchor="middle" font-size="10" fill="white">股权登记日</text>
  <text x="230" y="165" text-anchor="middle" font-size="12" fill="#333">获得配债资格</text>
  <text x="230" y="181" text-anchor="middle" font-size="11" fill="#7209b7">每股可配1元转债</text>

  <!-- Arrow -->
  <line x1="256" y1="130" x2="334" y2="130" stroke="#aaa" stroke-width="2"/>
  
  <!-- D+1 -->
  <circle cx="360" cy="130" r="24" fill="#f72585"/>
  <text x="360" y="125" text-anchor="middle" font-size="11" fill="white" font-weight="bold">D+1</text>
  <text x="360" y="140" text-anchor="middle" font-size="10" fill="white">次日</text>
  <text x="360" y="165" text-anchor="middle" font-size="12" fill="#333">卖出正股</text>
  <text x="360" y="181" text-anchor="middle" font-size="11" fill="#666">锁定差价</text>

  <!-- Arrow -->
  <line x1="386" y1="130" x2="464" y2="130" stroke="#aaa" stroke-width="2"/>

  <!-- 缴款 -->
  <circle cx="490" cy="130" r="24" fill="#fb8500"/>
  <text x="490" y="125" text-anchor="middle" font-size="10" fill="white" font-weight="bold">缴款日</text>
  <text x="490" y="140" text-anchor="middle" font-size="10" fill="white">约D+3</text>
  <text x="490" y="165" text-anchor="middle" font-size="12" fill="#333">缴纳认购款</text>
  <text x="490" y="181" text-anchor="middle" font-size="11" fill="#666">5000元</text>

  <!-- Arrow -->
  <line x1="516" y1="130" x2="594" y2="130" stroke="#aaa" stroke-width="2"/>

  <!-- 上市 -->
  <circle cx="620" cy="130" r="24" fill="#2dc653"/>
  <text x="620" y="125" text-anchor="middle" font-size="10" fill="white" font-weight="bold">上市日</text>
  <text x="620" y="140" text-anchor="middle" font-size="10" fill="white">约D+20</text>
  <text x="620" y="165" text-anchor="middle" font-size="12" fill="#333">转债上市卖出</text>
  <text x="620" y="181" text-anchor="middle" font-size="11" fill="#2dc653">收回本金+收益</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="40" y1="210" x2="760" y2="210" stroke="#ddd" stroke-width="1.5"/>

  <!-- Profit scenario -->
  <rect x="40" y="222" width="340" height="155" rx="8" fill="#e8f8e8"/>
  <text x="210" y="244" text-anchor="middle" font-size="14" fill="#1a7a1a" font-weight="bold">✅ 理想情景：股票横盘/小涨</text>
  <text x="60" y="268" font-size="12" fill="#333">正股：买入10万，卖出10.5万（涨0.5%）</text>
  <text x="60" y="288" font-size="12" fill="#333">股票差价收益：≈+500元</text>
  <text x="60" y="308" font-size="12" fill="#333">配到5张转债，上市首日涨15%</text>
  <text x="60" y="328" font-size="12" fill="#333">转债收益：5000×15% = +750元</text>
  <rect x="60" y="342" width="300" height="26" rx="5" fill="#2dc653"/>
  <text x="210" y="360" text-anchor="middle" font-size="13" fill="white" font-weight="bold">总收益约 +1250元 / 2天 / 10万本金</text>

  <!-- Loss scenario -->
  <rect x="420" y="222" width="340" height="155" rx="8" fill="#fce8e8"/>
  <text x="590" y="244" text-anchor="middle" font-size="14" fill="#c0392b" font-weight="bold">❌ 风险情景：正股大跌</text>
  <text x="440" y="268" font-size="12" fill="#333">正股：买入10万，卖出9.3万（跌7%）</text>
  <text x="440" y="288" font-size="12" fill="#333">股票亏损：≈-7000元</text>
  <text x="440" y="308" font-size="12" fill="#333">配到5张转债，上市首日涨10%</text>
  <text x="440" y="328" font-size="12" fill="#333">转债收益：5000×10% = +500元</text>
  <rect x="440" y="342" width="300" height="26" rx="5" fill="#e74c3c"/>
  <text x="590" y="360" text-anchor="middle" font-size="13" fill="white" font-weight="bold">总亏损约 -6500元 ⚠️ 不是小数目</text>
</svg>
