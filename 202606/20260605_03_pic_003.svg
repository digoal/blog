<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">小白参与配债策略决策树</text>

  <!-- Start -->
  <rect x="310" y="52" width="180" height="38" rx="8" fill="#4361ee"/>
  <text x="400" y="76" text-anchor="middle" font-size="13" fill="white" font-weight="bold">有新债发行公告</text>

  <!-- Q1 -->
  <line x1="400" y1="90" x2="400" y2="115" stroke="#aaa" stroke-width="2"/>
  <rect x="270" y="115" width="260" height="38" rx="8" fill="#7209b7"/>
  <text x="400" y="139" text-anchor="middle" font-size="13" fill="white">我有该公司正股吗？</text>

  <!-- Yes / No branches -->
  <line x1="400" y1="153" x2="400" y2="170" stroke="#aaa" stroke-width="2"/>
  <!-- Yes left -->
  <line x1="270" y1="153" x2="180" y2="180" stroke="#2dc653" stroke-width="2"/>
  <text x="215" y="172" font-size="11" fill="#2dc653" font-weight="bold">有</text>
  <!-- No right -->
  <line x1="530" y1="153" x2="620" y2="180" stroke="#e74c3c" stroke-width="2"/>
  <text x="583" y="172" font-size="11" fill="#e74c3c" font-weight="bold">没有</text>

  <!-- Left: has stock -->
  <rect x="80" y="180" width="200" height="38" rx="8" fill="#2dc653"/>
  <text x="180" y="204" text-anchor="middle" font-size="12" fill="white" font-weight="bold">持股配售</text>

  <!-- Q2 left -->
  <line x1="180" y1="218" x2="180" y2="242" stroke="#aaa" stroke-width="2"/>
  <rect x="80" y="242" width="200" height="48" rx="8" fill="#e8f8e8" stroke="#2dc653" stroke-width="1.5"/>
  <text x="180" y="261" text-anchor="middle" font-size="11" fill="#1a7a1a">缴款截止前确认是否认购</text>
  <text x="180" y="278" text-anchor="middle" font-size="11" fill="#1a7a1a">预判上市首日涨幅 &gt; 0</text>

  <line x1="180" y1="290" x2="180" y2="314" stroke="#aaa" stroke-width="2"/>
  <rect x="80" y="314" width="200" height="38" rx="8" fill="#4361ee"/>
  <text x="180" y="338" text-anchor="middle" font-size="12" fill="white">✅ 参与配售，上市后卖出</text>

  <!-- Right: no stock -->
  <rect x="520" y="180" width="200" height="38" rx="8" fill="#e74c3c"/>
  <text x="620" y="204" text-anchor="middle" font-size="12" fill="white" font-weight="bold">考虑打新申购</text>

  <line x1="620" y1="218" x2="620" y2="242" stroke="#aaa" stroke-width="2"/>
  <rect x="520" y="242" width="200" height="48" rx="8" fill="#fce8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="620" y="261" text-anchor="middle" font-size="11" fill="#c0392b">免费申请，中签才冻结资金</text>
  <text x="620" y="278" text-anchor="middle" font-size="11" fill="#c0392b">上市首日破发可立即卖出</text>

  <line x1="620" y1="290" x2="620" y2="314" stroke="#aaa" stroke-width="2"/>
  <rect x="520" y="314" width="200" height="38" rx="8" fill="#4361ee"/>
  <text x="620" y="338" text-anchor="middle" font-size="12" fill="white">✅ 申购，等待摇号结果</text>

  <!-- Middle: don't buy stock for pei zhai -->
  <rect x="270" y="170" width="260" height="38" rx="8" fill="#f72585" opacity="0.9"/>
  <text x="400" y="188" text-anchor="middle" font-size="11" fill="white" font-weight="bold">❌ 抢权配售：新手请勿尝试</text>
  <text x="400" y="202" text-anchor="middle" font-size="10" fill="white">专为持股配售而临时买股，风险远超收益</text>

  <!-- Warning -->
  <rect x="180" y="360" width="440" height="14" rx="4" fill="#fff3cd"/>
  <text x="400" y="372" text-anchor="middle" font-size="10" fill="#856404">⚠️ 任何策略都不应超过可转债组合单只仓位上限（参见本章第11节）</text>
</svg>
