<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">低价转债的"便宜幻觉"：价格下跌的三条路径</text>

  <!-- 起点 -->
  <rect x="310" y="60" width="180" height="52" rx="10" fill="#4361ee"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="white" font-weight="bold">转债价格跌到 85 元以下</text>
  <text x="400" y="100" text-anchor="middle" font-size="12" fill="#c8d3ff">你以为：债底保护，安全</text>

  <!-- 三条路径箭头 -->
  <line x1="280" y1="112" x2="140" y2="175" stroke="#e63946" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="112" x2="400" y2="175" stroke="#f4a261" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="112" x2="660" y2="175" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- 路径1：信用风险 -->
  <rect x="30" y="175" width="210" height="100" rx="10" fill="#e63946" opacity="0.9"/>
  <text x="135" y="200" text-anchor="middle" font-size="13" fill="white" font-weight="bold">路径①：信用风险</text>
  <text x="135" y="222" text-anchor="middle" font-size="11" fill="white">公司连续亏损</text>
  <text x="135" y="240" text-anchor="middle" font-size="11" fill="white">偿债能力存疑</text>
  <text x="135" y="258" text-anchor="middle" font-size="11" fill="white">→ 债底失效，价格无底线</text>

  <!-- 路径2：正股退市 -->
  <rect x="290" y="175" width="220" height="100" rx="10" fill="#f4a261" opacity="0.9"/>
  <text x="400" y="200" text-anchor="middle" font-size="13" fill="white" font-weight="bold">路径②：正股退市</text>
  <text x="400" y="222" text-anchor="middle" font-size="11" fill="white">股价跌破1元或财务退市</text>
  <text x="400" y="240" text-anchor="middle" font-size="11" fill="white">转债强制退市</text>
  <text x="400" y="258" text-anchor="middle" font-size="11" fill="white">→ 流动性消失，回收不确定</text>

  <!-- 路径3：真正低估 -->
  <rect x="560" y="175" width="210" height="100" rx="10" fill="#2a9d8f" opacity="0.9"/>
  <text x="665" y="200" text-anchor="middle" font-size="13" fill="white" font-weight="bold">路径③：真正低估</text>
  <text x="665" y="222" text-anchor="middle" font-size="11" fill="white">公司基本面尚可</text>
  <text x="665" y="240" text-anchor="middle" font-size="11" fill="white">市场情绪过度悲观</text>
  <text x="665" y="258" text-anchor="middle" font-size="11" fill="white">→ 这才是机会</text>

  <!-- 关键问题 -->
  <rect x="80" y="305" width="640" height="52" rx="8" fill="#1a1a2e"/>
  <text x="400" y="327" text-anchor="middle" font-size="13" fill="#ffd166" font-weight="bold">核心问题：你看到"便宜"，但你能区分这三条路径吗？</text>
  <text x="400" y="347" text-anchor="middle" font-size="12" fill="#c8d3ff">绝大多数散户看到低价只想到路径③，却没有能力排除路径①和②</text>

  <!-- 底部注释 -->
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#888">数据参考：2024-2025年，A股已有5只转债发生实质性违约，5只随正股同步退市（联合资信，2025）</text>
</svg>
