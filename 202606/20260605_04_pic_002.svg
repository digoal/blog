<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">低价转债风险识别雷达：5个必查指标</text>

  <!-- 五列 -->
  <!-- 指标1 -->
  <rect x="28" y="55" width="140" height="240" rx="10" fill="white" stroke="#e63946" stroke-width="2"/>
  <rect x="28" y="55" width="140" height="38" rx="10" fill="#e63946"/>
  <text x="98" y="79" text-anchor="middle" font-size="12" fill="white" font-weight="bold">① 连续亏损年数</text>
  <text x="98" y="115" text-anchor="middle" font-size="28" fill="#e63946" font-weight="bold">3年+</text>
  <text x="98" y="140" text-anchor="middle" font-size="11" fill="#555">= 高危红线</text>
  <line x1="48" y1="158" x2="148" y2="158" stroke="#eee" stroke-width="1"/>
  <text x="98" y="180" text-anchor="middle" font-size="11" fill="#333">连亏3年以上</text>
  <text x="98" y="198" text-anchor="middle" font-size="11" fill="#333">还款能力存疑</text>
  <text x="98" y="225" text-anchor="middle" font-size="11" fill="#e63946" font-weight="bold">→ 直接回避</text>

  <!-- 指标2 -->
  <rect x="178" y="55" width="140" height="240" rx="10" fill="white" stroke="#f4a261" stroke-width="2"/>
  <rect x="178" y="55" width="140" height="38" rx="10" fill="#f4a261"/>
  <text x="248" y="79" text-anchor="middle" font-size="12" fill="white" font-weight="bold">② 正股股价</text>
  <text x="248" y="115" text-anchor="middle" font-size="28" fill="#f4a261" font-weight="bold">&lt;2元</text>
  <text x="248" y="140" text-anchor="middle" font-size="11" fill="#555">= 退市预警</text>
  <line x1="198" y1="158" x2="298" y2="158" stroke="#eee" stroke-width="1"/>
  <text x="248" y="180" text-anchor="middle" font-size="11" fill="#333">面值退市风险</text>
  <text x="248" y="198" text-anchor="middle" font-size="11" fill="#333">正股拖垮转债</text>
  <text x="248" y="225" text-anchor="middle" font-size="11" fill="#e63946" font-weight="bold">→ 高度警惕</text>

  <!-- 指标3 -->
  <rect x="328" y="55" width="144" height="240" rx="10" fill="white" stroke="#e9c46a" stroke-width="2"/>
  <rect x="328" y="55" width="144" height="38" rx="10" fill="#e9c46a"/>
  <text x="400" y="79" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">③ 信用评级</text>
  <text x="400" y="115" text-anchor="middle" font-size="28" fill="#888" font-weight="bold">AA-↓</text>
  <text x="400" y="140" text-anchor="middle" font-size="11" fill="#555">= 需追踪评级变动</text>
  <line x1="348" y1="158" x2="452" y2="158" stroke="#eee" stroke-width="1"/>
  <text x="400" y="180" text-anchor="middle" font-size="11" fill="#333">评级被下调时</text>
  <text x="400" y="198" text-anchor="middle" font-size="11" fill="#333">市场抛售加速</text>
  <text x="400" y="225" text-anchor="middle" font-size="11" fill="#f4a261" font-weight="bold">→ 持续观察</text>

  <!-- 指标4 -->
  <rect x="482" y="55" width="140" height="240" rx="10" fill="white" stroke="#2a9d8f" stroke-width="2"/>
  <rect x="482" y="55" width="140" height="38" rx="10" fill="#2a9d8f"/>
  <text x="552" y="79" text-anchor="middle" font-size="12" fill="white" font-weight="bold">④ 剩余期限</text>
  <text x="552" y="115" text-anchor="middle" font-size="28" fill="#2a9d8f" font-weight="bold">&lt;1年</text>
  <text x="552" y="140" text-anchor="middle" font-size="11" fill="#555">= 兑付压力窗口</text>
  <line x1="502" y1="158" x2="602" y2="158" stroke="#eee" stroke-width="1"/>
  <text x="552" y="180" text-anchor="middle" font-size="11" fill="#333">兑付期临近</text>
  <text x="552" y="198" text-anchor="middle" font-size="11" fill="#333">公司现金能还吗</text>
  <text x="552" y="225" text-anchor="middle" font-size="11" fill="#2a9d8f" font-weight="bold">→ 重点核查</text>

  <!-- 指标5 -->
  <rect x="632" y="55" width="140" height="240" rx="10" fill="white" stroke="#4361ee" stroke-width="2"/>
  <rect x="632" y="55" width="140" height="38" rx="10" fill="#4361ee"/>
  <text x="702" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">⑤ 转债余额/</text>
  <text x="702" y="88" text-anchor="middle" font-size="12" fill="white" font-weight="bold">正股市值</text>
  <text x="702" y="120" text-anchor="middle" font-size="26" fill="#4361ee" font-weight="bold">&gt;30%</text>
  <text x="702" y="145" text-anchor="middle" font-size="11" fill="#555">= 稀释风险高</text>
  <line x1="652" y1="158" x2="752" y2="158" stroke="#eee" stroke-width="1"/>
  <text x="702" y="180" text-anchor="middle" font-size="11" fill="#333">公司必须想办法</text>
  <text x="702" y="198" text-anchor="middle" font-size="11" fill="#333">消化这笔负债</text>
  <text x="702" y="225" text-anchor="middle" font-size="11" fill="#4361ee" font-weight="bold">→ 需评估动机</text>

  <!-- 底部总结 -->
  <rect x="28" y="318" width="744" height="46" rx="8" fill="#1a1a2e"/>
  <text x="400" y="338" text-anchor="middle" font-size="12" fill="#ffd166" font-weight="bold">散户操作规则：以上5项，触发任意2项 → 不碰。触发0项 → 进入下一步分析。</text>
  <text x="400" y="356" text-anchor="middle" font-size="11" fill="#c8d3ff">一个指标不能定生死，但组合出现多个红灯时，风险是指数级叠加的。</text>
</svg>
