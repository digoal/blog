<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="460" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">低价转债决策树：碰还是不碰？</text>

  <!-- 起点 -->
  <rect x="290" y="48" width="220" height="46" rx="10" fill="#4361ee"/>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="white" font-weight="bold">发现一只价格低于90元的转债</text>
  <text x="400" y="86" text-anchor="middle" font-size="11" fill="#c8d3ff">开始排查</text>

  <!-- 问题1 -->
  <line x1="400" y1="94" x2="400" y2="130" stroke="#888" stroke-width="1.5"/>
  <polygon points="394,126 400,136 406,126" fill="#888"/>
  <rect x="270" y="136" width="260" height="46" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="400" y="156" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Q1. 正股净利润连续3年为负？</text>
  <text x="400" y="173" text-anchor="middle" font-size="11" fill="#666">查财报：归母净利润是否连续亏损</text>

  <!-- Q1 分支 -->
  <line x1="270" y1="159" x2="150" y2="220" stroke="#e63946" stroke-width="1.5"/>
  <text x="175" y="195" font-size="11" fill="#e63946" font-weight="bold">是</text>
  <line x1="530" y1="159" x2="650" y2="220" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="600" y="195" font-size="11" fill="#2a9d8f" font-weight="bold">否</text>

  <!-- 左：直接出局 -->
  <rect x="60" y="220" width="180" height="52" rx="8" fill="#e63946"/>
  <text x="150" y="242" text-anchor="middle" font-size="12" fill="white" font-weight="bold">❌ 直接排除</text>
  <text x="150" y="260" text-anchor="middle" font-size="11" fill="white">信用风险太高，不碰</text>

  <!-- 右：继续问题2 -->
  <rect x="560" y="220" width="200" height="46" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="660" y="240" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Q2. 正股价格低于2元？</text>
  <text x="660" y="257" text-anchor="middle" font-size="11" fill="#666">或已被ST/被立案调查？</text>

  <!-- Q2分支 -->
  <line x1="600" y1="243" x2="520" y2="300" stroke="#e63946" stroke-width="1.5"/>
  <text x="525" y="277" font-size="11" fill="#e63946" font-weight="bold">是</text>
  <line x1="720" y1="243" x2="720" y2="300" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="726" y="277" font-size="11" fill="#2a9d8f" font-weight="bold">否</text>

  <!-- Q2-是：排除 -->
  <rect x="430" y="300" width="170" height="46" rx="8" fill="#f4a261"/>
  <text x="515" y="320" text-anchor="middle" font-size="12" fill="white" font-weight="bold">⚠️ 高风险，回避</text>
  <text x="515" y="337" text-anchor="middle" font-size="11" fill="white">退市拖垮转债</text>

  <!-- Q3 -->
  <rect x="630" y="300" width="140" height="46" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="700" y="320" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Q3. 还款来源是否</text>
  <text x="700" y="337" text-anchor="middle" font-size="11" fill="#666">经营现金流能覆盖？</text>

  <line x1="670" y1="320" x2="560" y2="380" stroke="#e63946" stroke-width="1.5"/>
  <text x="580" y="355" font-size="11" fill="#e63946" font-weight="bold">不能</text>
  <line x1="730" y1="346" x2="730" y2="380" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="736" y="367" font-size="11" fill="#2a9d8f" font-weight="bold">能</text>

  <!-- 不能：谨慎 -->
  <rect x="470" y="380" width="160" height="46" rx="8" fill="#e9c46a"/>
  <text x="550" y="400" text-anchor="middle" font-size="12" fill="white" font-weight="bold">⚠️ 谨慎博弈</text>
  <text x="550" y="417" text-anchor="middle" font-size="11" fill="white">仓位严格控制在3%内</text>

  <!-- 能：机会 -->
  <rect x="640" y="380" width="160" height="46" rx="8" fill="#2a9d8f"/>
  <text x="720" y="400" text-anchor="middle" font-size="12" fill="white" font-weight="bold">✅ 可以关注</text>
  <text x="720" y="417" text-anchor="middle" font-size="11" fill="white">做完估值再决定建仓</text>

  <!-- 底部注释 -->
  <text x="400" y="450" text-anchor="middle" font-size="11" fill="#888">注：以上为排除框架，通过所有筛选≠必赚，只是消除了最明显的大坑</text>
</svg>
