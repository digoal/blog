<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">可转债组合三层防线</text>

  <!-- 第一层：分散持仓 -->
  <rect x="40" y="60" width="210" height="300" fill="#e8f4fd" rx="10" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">第一层：分散</text>
  <text x="145" y="108" text-anchor="middle" font-size="11" fill="#475569">防集中踩雷</text>
  
  <rect x="60" y="120" width="170" height="36" fill="#bfdbfe" rx="6"/>
  <text x="145" y="142" text-anchor="middle" font-size="12" fill="#1e40af">持债数量 ≥ 10只</text>
  
  <rect x="60" y="164" width="170" height="36" fill="#bfdbfe" rx="6"/>
  <text x="145" y="186" text-anchor="middle" font-size="12" fill="#1e40af">行业不重叠</text>
  
  <rect x="60" y="208" width="170" height="36" fill="#bfdbfe" rx="6"/>
  <text x="145" y="230" text-anchor="middle" font-size="12" fill="#1e40af">评级分层搭配</text>

  <rect x="60" y="252" width="170" height="80" fill="#dbeafe" rx="6"/>
  <text x="145" y="272" text-anchor="middle" font-size="11" fill="#1e40af">🎯 目标：</text>
  <text x="145" y="291" text-anchor="middle" font-size="11" fill="#1e40af">单只黑天鹅</text>
  <text x="145" y="310" text-anchor="middle" font-size="11" fill="#1e40af">不影响整体</text>

  <!-- 第二层：单只上限 -->
  <rect x="295" y="60" width="210" height="300" fill="#f0fdf4" rx="10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">第二层：上限</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#475569">防押注过重</text>

  <rect x="315" y="120" width="170" height="36" fill="#bbf7d0" rx="6"/>
  <text x="400" y="142" text-anchor="middle" font-size="12" fill="#166534">单只≤总资金10%</text>

  <rect x="315" y="164" width="170" height="36" fill="#bbf7d0" rx="6"/>
  <text x="400" y="186" text-anchor="middle" font-size="12" fill="#166534">同行业≤20%</text>

  <rect x="315" y="208" width="170" height="36" fill="#bbf7d0" rx="6"/>
  <text x="400" y="230" text-anchor="middle" font-size="12" fill="#166534">低评级合计≤30%</text>

  <rect x="315" y="252" width="170" height="80" fill="#dcfce7" rx="6"/>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#166534">🎯 目标：</text>
  <text x="400" y="291" text-anchor="middle" font-size="11" fill="#166534">任何一只违约</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#166534">最多亏10%</text>

  <!-- 第三层：止损 -->
  <rect x="550" y="60" width="210" height="300" fill="#fef2f2" rx="10" stroke="#ef4444" stroke-width="1.5"/>
  <text x="655" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">第三层：止损</text>
  <text x="655" y="108" text-anchor="middle" font-size="11" fill="#475569">防越套越深</text>

  <rect x="570" y="120" width="170" height="36" fill="#fecaca" rx="6"/>
  <text x="655" y="142" text-anchor="middle" font-size="12" fill="#991b1b">价格跌破85元</text>

  <rect x="570" y="164" width="170" height="36" fill="#fecaca" rx="6"/>
  <text x="655" y="186" text-anchor="middle" font-size="12" fill="#991b1b">信用事件触发</text>

  <rect x="570" y="208" width="170" height="36" fill="#fecaca" rx="6"/>
  <text x="655" y="230" text-anchor="middle" font-size="12" fill="#991b1b">强赎前不止盈=亏损</text>

  <rect x="570" y="252" width="170" height="80" fill="#fee2e2" rx="6"/>
  <text x="655" y="272" text-anchor="middle" font-size="11" fill="#991b1b">🎯 目标：</text>
  <text x="655" y="291" text-anchor="middle" font-size="11" fill="#991b1b">亏损可控</text>
  <text x="655" y="310" text-anchor="middle" font-size="11" fill="#991b1b">本金不归零</text>

  <!-- 底部箭头说明 -->
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#64748b">三层叠加 → 把"可能大亏"变成"最多小亏"</text>
</svg>
