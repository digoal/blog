<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">止损决策树：什么情况必须卖？</text>

  <!-- 起始节点 -->
  <rect x="300" y="55" width="200" height="44" fill="#6366f1" rx="8"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="white" font-weight="bold">持有某只转债</text>

  <!-- 箭头向下 -->
  <line x1="400" y1="99" x2="400" y2="125" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 判断1 -->
  <polygon points="400,125 560,165 400,205 240,165" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="160" text-anchor="middle" font-size="12" fill="#92400e">信用评级下调/</text>
  <text x="400" y="177" text-anchor="middle" font-size="12" fill="#92400e">公司暴雷风险？</text>

  <!-- 是 → 立刻止损 -->
  <line x1="560" y1="165" x2="640" y2="165" stroke="#ef4444" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="600" y="155" text-anchor="middle" font-size="11" fill="#dc2626">是</text>
  <rect x="640" y="142" width="130" height="46" fill="#fecaca" rx="7"/>
  <text x="705" y="162" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="bold">立刻止损</text>
  <text x="705" y="179" text-anchor="middle" font-size="11" fill="#991b1b">不等纯债价值</text>

  <!-- 否 → 向下 -->
  <line x1="400" y1="205" x2="400" y2="232" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="375" y="222" font-size="11" fill="#475569">否</text>

  <!-- 判断2 -->
  <polygon points="400,232 560,272 400,312 240,272" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="266" text-anchor="middle" font-size="12" fill="#92400e">价格跌破85元</text>
  <text x="400" y="283" text-anchor="middle" font-size="12" fill="#92400e">且无下修预期？</text>

  <!-- 是 → 止损 -->
  <line x1="560" y1="272" x2="640" y2="272" stroke="#ef4444" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="600" y="262" text-anchor="middle" font-size="11" fill="#dc2626">是</text>
  <rect x="640" y="249" width="130" height="46" fill="#fecaca" rx="7"/>
  <text x="705" y="269" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="bold">考虑止损</text>
  <text x="705" y="286" text-anchor="middle" font-size="11" fill="#991b1b">等待可能更深</text>

  <!-- 否 → 继续持有 -->
  <line x1="240" y1="272" x2="130" y2="272" stroke="#22c55e" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="195" y="262" text-anchor="middle" font-size="11" fill="#15803d">否</text>
  <rect x="30" y="249" width="100" height="46" fill="#bbf7d0" rx="7"/>
  <text x="80" y="269" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold">继续持有</text>
  <text x="80" y="286" text-anchor="middle" font-size="11" fill="#166534">保持观察</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <text x="400" y="348" text-anchor="middle" font-size="11" fill="#94a3b8">止损是规则，不是情绪——提前写好，执行时不需要纠结</text>
</svg>
