<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">10万元可转债组合示意（双低策略）</text>

  <!-- 表头 -->
  <rect x="30" y="52" width="740" height="36" fill="#1e40af" rx="6"/>
  <text x="90" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">转债名称</text>
  <text x="210" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">行业</text>
  <text x="320" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">价格</text>
  <text x="420" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">溢价率</text>
  <text x="530" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">评级</text>
  <text x="650" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">仓位</text>
  <text x="740" y="75" text-anchor="middle" font-size="12" fill="white" font-weight="bold">金额</text>

  <!-- 数据行 -->
  <rect x="30" y="88" width="740" height="30" fill="#eff6ff" rx="3"/>
  <text x="90" y="108" text-anchor="middle" font-size="11" fill="#1e293b">某制造转债</text>
  <text x="210" y="108" text-anchor="middle" font-size="11" fill="#1e293b">制造业</text>
  <text x="320" y="108" text-anchor="middle" font-size="11" fill="#1e293b">105元</text>
  <text x="420" y="108" text-anchor="middle" font-size="11" fill="#1e293b">8%</text>
  <text x="530" y="108" text-anchor="middle" font-size="11" fill="#16a34a">AA</text>
  <text x="650" y="108" text-anchor="middle" font-size="11" fill="#1e293b">9%</text>
  <text x="740" y="108" text-anchor="middle" font-size="11" fill="#1e293b">9000元</text>

  <rect x="30" y="118" width="740" height="30" fill="white" rx="3"/>
  <text x="90" y="138" text-anchor="middle" font-size="11" fill="#1e293b">某消费转债</text>
  <text x="210" y="138" text-anchor="middle" font-size="11" fill="#1e293b">消费</text>
  <text x="320" y="138" text-anchor="middle" font-size="11" fill="#1e293b">108元</text>
  <text x="420" y="138" text-anchor="middle" font-size="11" fill="#1e293b">12%</text>
  <text x="530" y="138" text-anchor="middle" font-size="11" fill="#16a34a">AA-</text>
  <text x="650" y="138" text-anchor="middle" font-size="11" fill="#1e293b">8%</text>
  <text x="740" y="138" text-anchor="middle" font-size="11" fill="#1e293b">8000元</text>

  <rect x="30" y="148" width="740" height="30" fill="#eff6ff" rx="3"/>
  <text x="90" y="168" text-anchor="middle" font-size="11" fill="#1e293b">某医药转债</text>
  <text x="210" y="168" text-anchor="middle" font-size="11" fill="#1e293b">医药</text>
  <text x="320" y="168" text-anchor="middle" font-size="11" fill="#1e293b">99元</text>
  <text x="420" y="168" text-anchor="middle" font-size="11" fill="#1e293b">15%</text>
  <text x="530" y="168" text-anchor="middle" font-size="11" fill="#16a34a">A+</text>
  <text x="650" y="168" text-anchor="middle" font-size="11" fill="#1e293b">9%</text>
  <text x="740" y="168" text-anchor="middle" font-size="11" fill="#1e293b">9000元</text>

  <rect x="30" y="178" width="740" height="30" fill="white" rx="3"/>
  <text x="90" y="198" text-anchor="middle" font-size="11" fill="#1e293b">某科技转债</text>
  <text x="210" y="198" text-anchor="middle" font-size="11" fill="#1e293b">TMT</text>
  <text x="320" y="198" text-anchor="middle" font-size="11" fill="#1e293b">103元</text>
  <text x="420" y="198" text-anchor="middle" font-size="11" fill="#1e293b">9%</text>
  <text x="530" y="198" text-anchor="middle" font-size="11" fill="#eab308">A</text>
  <text x="650" y="198" text-anchor="middle" font-size="11" fill="#1e293b">7%</text>
  <text x="740" y="198" text-anchor="middle" font-size="11" fill="#1e293b">7000元</text>

  <!-- 省略号行 -->
  <rect x="30" y="208" width="740" height="30" fill="#eff6ff" rx="3"/>
  <text x="400" y="228" text-anchor="middle" font-size="13" fill="#94a3b8">…… 共持有12只，其余8只合计57% ……</text>

  <!-- 风险警示区 -->
  <rect x="30" y="252" width="350" height="108" fill="#fef2f2" rx="8" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">❌ 错误示范</text>
  <text x="205" y="296" text-anchor="middle" font-size="12" fill="#7f1d1d">只买2~3只，单只仓位40%+</text>
  <text x="205" y="316" text-anchor="middle" font-size="12" fill="#7f1d1d">同一行业全部集中</text>
  <text x="205" y="336" text-anchor="middle" font-size="12" fill="#7f1d1d">全买低评级博高收益</text>
  <text x="205" y="354" text-anchor="middle" font-size="12" fill="#7f1d1d">→ 一只爆雷，组合腰斩</text>

  <rect x="420" y="252" width="350" height="108" fill="#f0fdf4" rx="8" stroke="#86efac" stroke-width="1"/>
  <text x="595" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">✅ 正确示范</text>
  <text x="595" y="296" text-anchor="middle" font-size="12" fill="#14532d">持10~15只，单只≤10%</text>
  <text x="595" y="316" text-anchor="middle" font-size="12" fill="#14532d">跨行业分散配置</text>
  <text x="595" y="336" text-anchor="middle" font-size="12" fill="#14532d">评级AA/AA-/A+搭配</text>
  <text x="595" y="354" text-anchor="middle" font-size="12" fill="#14532d">→ 一只爆雷，顶多亏10%</text>
</svg>
