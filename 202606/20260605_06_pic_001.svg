<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#f8f9fa"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">可转债风险层级图</text>

  <!-- 三角形警示 -->
  <!-- 层1：最危险 -->
  <polygon points="400,70 580,280 220,280" fill="#e74c3c" opacity="0.85"/>
  <text x="400" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">违约 / 退市</text>
  <text x="400" y="175" text-anchor="middle" font-size="11" fill="#ffe0e0">本金全毁，几乎不可回头</text>

  <!-- 层2：高风险 -->
  <polygon points="400,290 620,390 180,390" fill="#e67e22" opacity="0.75"/>
  <text x="400" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">强赎踏空 / 流动性枯竭</text>
  <text x="400" y="363" text-anchor="middle" font-size="11" fill="#fff3e0">赚了逻辑亏了价格</text>

  <!-- 层3：注释区域 -->
  <!-- 右侧说明 -->
  <rect x="640" y="90" width="145" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="712" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">最高风险</text>
  <text x="712" y="136" text-anchor="middle" font-size="11" fill="#555">• 信用评级BB以下</text>
  <text x="712" y="153" text-anchor="middle" font-size="11" fill="#555">• 股票已退市</text>
  <text x="712" y="168" text-anchor="middle" font-size="11" fill="#555">• 发行人资不抵债</text>

  <rect x="640" y="190" width="145" height="80" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="712" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">次级风险</text>
  <text x="712" y="236" text-anchor="middle" font-size="11" fill="#555">• 价格高溢价率高</text>
  <text x="712" y="253" text-anchor="middle" font-size="11" fill="#555">• 成交量骤减</text>
  <text x="712" y="268" text-anchor="middle" font-size="11" fill="#555">• 到期日逼近</text>

  <!-- 左侧红线 -->
  <rect x="15" y="90" width="145" height="295" rx="8" fill="#fff" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="87" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">散户防御清单</text>
  <text x="87" y="145" text-anchor="middle" font-size="11" fill="#27ae60">✓ 信用评级 ≥ AA</text>
  <text x="87" y="165" text-anchor="middle" font-size="11" fill="#27ae60">✓ 转债价格 ≤ 130</text>
  <text x="87" y="185" text-anchor="middle" font-size="11" fill="#27ae60">✓ 纯债价值 ≥ 90</text>
  <text x="87" y="205" text-anchor="middle" font-size="11" fill="#27ae60">✓ 溢价率 ≤ 30%</text>
  <text x="87" y="225" text-anchor="middle" font-size="11" fill="#27ae60">✓ 分散持有5只以上</text>
  <text x="87" y="255" text-anchor="middle" font-size="11" fill="#e74c3c">✗ 单只超仓位20%</text>
  <text x="87" y="275" text-anchor="middle" font-size="11" fill="#e74c3c">✗ 买评级被下调的</text>
  <text x="87" y="295" text-anchor="middle" font-size="11" fill="#e74c3c">✗ 买正股已退市的</text>
  <text x="87" y="315" text-anchor="middle" fill="#e74c3c" font-size="11">✗ 买到期日<3月的</text>
  <text x="87" y="335" text-anchor="middle" fill="#e74c3c" font-size="11">✗ 持有诉讼中公司</text>
  <text x="87" y="360" text-anchor="middle" fill="#e74c3c" font-size="11">✗ 市值<30亿的小盘</text>
  <text x="87" y="380" text-anchor="middle" fill="#e74c3c" font-size="11">✗ 新债上市溢价>20%</text>
</svg>
