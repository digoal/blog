<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="350" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a2e">A股可转债违约事件时间轴（2021-2024）</text>

  <!-- 时间轴 -->
  <line x1="60" y1="190" x2="750" y2="190" stroke="#bdc3c7" stroke-width="2"/>
  <!-- 年份标记 -->
  <text x="120" y="215" text-anchor="middle" font-size="12" fill="#7f8c8d">2021</text>
  <text x="280" y="215" text-anchor="middle" font-size="12" fill="#7f8c8d">2022</text>
  <text x="450" y="215" text-anchor="middle" font-size="12" fill="#7f8c8d">2023</text>
  <text x="640" y="215" text-anchor="middle" font-size="12" fill="#7f8c8d">2024</text>

  <!-- 事件 -->
  <!-- 鸿达兴业 -->
  <circle cx="130" cy="190" r="8" fill="#e74c3c"/>
  <line x1="130" y1="182" x2="130" y2="100" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="40" y="55" width="175" height="48" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="127" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">鸿达转债（2021）</text>
  <text x="127" y="93" text-anchor="middle" font-size="10" fill="#555">A股首单实质违约</text>
  <text x="127" y="108" text-anchor="middle" font-size="10" fill="#555">持有人损失超60%</text>

  <!-- 搜特转债 -->
  <circle cx="310" cy="190" r="8" fill="#e74c3c"/>
  <line x1="310" y1="182" x2="310" y2="240" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="220" y="242" width="175" height="48" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="307" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">搜特转债（2022）</text>
  <text x="307" y="280" text-anchor="middle" font-size="10" fill="#555">正股ST后转债价格</text>
  <text x="307" y="295" text-anchor="middle" font-size="10" fill="#555">从100跌至30以下</text>

  <!-- 岭南转债 -->
  <circle cx="480" cy="190" r="8" fill="#e74c3c"/>
  <line x1="480" y1="182" x2="480" y2="105" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="390" y="58" width="175" height="48" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="477" y="79" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">岭南转债（2023）</text>
  <text x="477" y="96" text-anchor="middle" font-size="10" fill="#555">评级连续下调至CC</text>
  <text x="477" y="111" text-anchor="middle" font-size="10" fill="#555">末期价格跌破30元</text>

  <!-- 蓝盾转债 -->
  <circle cx="650" cy="190" r="8" fill="#e74c3c"/>
  <line x1="650" y1="182" x2="650" y2="240" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="555" y="242" width="185" height="48" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="647" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">蓝盾转债（2024）</text>
  <text x="647" y="280" text-anchor="middle" font-size="10" fill="#555">到期未能兑付本息</text>
  <text x="647" y="295" text-anchor="middle" font-size="10" fill="#555">进入司法重整程序</text>

  <!-- 共同特征 -->
  <rect x="120" y="315" width="560" height="25" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="400" y="332" text-anchor="middle" font-size="11" fill="#1e8449">共同特征：正股先ST → 评级下调 → 转债价格崩塌 → 到期无力兑付（有明显预警信号）</text>
</svg>
