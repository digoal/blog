<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="380" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a2e">可转债危险信号识别流程</text>

  <!-- 流程框 -->
  <!-- 步骤1 -->
  <rect x="30" y="60" width="160" height="65" rx="10" fill="#3498db" opacity="0.9"/>
  <text x="110" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">第一步</text>
  <text x="110" y="107" text-anchor="middle" font-size="12" fill="#fff">查信用评级</text>
  <text x="110" y="122" text-anchor="middle" font-size="11" fill="#d6eaf8">Wind / 集思录</text>

  <text x="205" y="96" text-anchor="middle" font-size="20" fill="#2c3e50">→</text>

  <!-- 步骤2 -->
  <rect x="230" y="60" width="160" height="65" rx="10" fill="#3498db" opacity="0.9"/>
  <text x="310" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">第二步</text>
  <text x="310" y="107" text-anchor="middle" font-size="12" fill="#fff">查正股状态</text>
  <text x="310" y="122" text-anchor="middle" font-size="11" fill="#d6eaf8">ST/退市/停牌？</text>

  <text x="405" y="96" text-anchor="middle" font-size="20" fill="#2c3e50">→</text>

  <!-- 步骤3 -->
  <rect x="430" y="60" width="160" height="65" rx="10" fill="#3498db" opacity="0.9"/>
  <text x="510" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">第三步</text>
  <text x="510" y="107" text-anchor="middle" font-size="12" fill="#fff">看纯债价值</text>
  <text x="510" y="122" text-anchor="middle" font-size="11" fill="#d6eaf8">跌破90风险升</text>

  <text x="605" y="96" text-anchor="middle" font-size="20" fill="#2c3e50">→</text>

  <!-- 步骤4 -->
  <rect x="630" y="60" width="145" height="65" rx="10" fill="#3498db" opacity="0.9"/>
  <text x="702" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">第四步</text>
  <text x="702" y="107" text-anchor="middle" font-size="12" fill="#fff">看到期日距离</text>
  <text x="702" y="122" text-anchor="middle" font-size="11" fill="#d6eaf8">&lt;6个月谨慎</text>

  <!-- 判断区 -->
  <!-- 评级判断 -->
  <rect x="30" y="155" width="160" height="55" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="110" y="178" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">⚠ 危险</text>
  <text x="110" y="198" text-anchor="middle" font-size="11" fill="#c0392b">评级BB及以下</text>
  <line x1="110" y1="125" x2="110" y2="155" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>

  <rect x="30" y="230" width="160" height="55" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.2"/>
  <text x="110" y="253" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">✓ 安全</text>
  <text x="110" y="273" text-anchor="middle" font-size="11" fill="#1e8449">评级AA及以上</text>

  <!-- 正股判断 -->
  <rect x="230" y="155" width="160" height="55" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="310" y="178" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">⚠ 立刻卖出</text>
  <text x="310" y="198" text-anchor="middle" font-size="11" fill="#c0392b">ST或退市预警</text>
  <line x1="310" y1="125" x2="310" y2="155" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>

  <rect x="230" y="230" width="160" height="55" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.2"/>
  <text x="310" y="253" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">✓ 继续持有</text>
  <text x="310" y="273" text-anchor="middle" font-size="11" fill="#1e8449">正股正常交易</text>

  <!-- 纯债价值判断 -->
  <rect x="430" y="155" width="160" height="55" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="510" y="178" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">⚠ 减仓</text>
  <text x="510" y="198" text-anchor="middle" font-size="11" fill="#c0392b">纯债值 &lt; 85元</text>
  <line x1="510" y1="125" x2="510" y2="155" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>

  <rect x="430" y="230" width="160" height="55" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.2"/>
  <text x="510" y="253" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">✓ 有底</text>
  <text x="510" y="273" text-anchor="middle" font-size="11" fill="#1e8449">纯债值 ≥ 90元</text>

  <!-- 到期日判断 -->
  <rect x="630" y="155" width="145" height="55" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.2"/>
  <text x="702" y="178" text-anchor="middle" font-size="12" fill="#d35400" font-weight="bold">⚠ 关注</text>
  <text x="702" y="198" text-anchor="middle" font-size="11" fill="#d35400">到期&lt;6月转股难</text>
  <line x1="702" y1="125" x2="702" y2="155" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4"/>

  <rect x="630" y="230" width="145" height="55" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.2"/>
  <text x="702" y="253" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">✓ 充裕</text>
  <text x="702" y="273" text-anchor="middle" font-size="11" fill="#1e8449">剩余期限&gt;1年</text>

  <!-- 底部总结 -->
  <rect x="100" y="310" width="600" height="50" rx="10" fill="#2c3e50" opacity="0.9"/>
  <text x="400" y="333" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">四项检查全部通过 → 持有；任一亮红灯 → 减仓或卖出</text>
  <text x="400" y="352" text-anchor="middle" font-size="11" fill="#bdc3c7">不需要全对，只需要不踩地雷</text>
</svg>
