<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Microsoft YaHei', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#FAFAFA" rx="12"/>
  <text x="400" y="36" font-size="18" font-weight="bold" fill="#1A1A2E" text-anchor="middle">资产收益来源对比</text>
  
  <!-- 股票 -->
  <rect x="40" y="60" width="160" height="300" fill="#E8F4FD" rx="10" stroke="#3498DB" stroke-width="2"/>
  <text x="120" y="90" font-size="14" font-weight="bold" fill="#2C3E50" text-anchor="middle">📈 股票</text>
  <rect x="60" y="110" width="120" height="50" fill="#3498DB" rx="6"/>
  <text x="120" y="130" font-size="11" fill="white" text-anchor="middle">分红</text>
  <text x="120" y="148" font-size="11" fill="white" text-anchor="middle">（现金流）</text>
  <rect x="60" y="170" width="120" height="50" fill="#5DADE2" rx="6"/>
  <text x="120" y="190" font-size="11" fill="white" text-anchor="middle">股价上涨</text>
  <text x="120" y="208" font-size="11" fill="white" text-anchor="middle">（资本利得）</text>
  <text x="120" y="290" font-size="12" fill="#2C3E50" text-anchor="middle" font-weight="bold">两种收益</text>
  <text x="120" y="310" font-size="11" fill="#555" text-anchor="middle">持有期间有分红</text>
  <text x="120" y="328" font-size="11" fill="#555" text-anchor="middle">收益来源稳定</text>

  <!-- 债券 -->
  <rect x="220" y="60" width="160" height="300" fill="#EAFAF1" rx="10" stroke="#27AE60" stroke-width="2"/>
  <text x="300" y="90" font-size="14" font-weight="bold" fill="#2C3E50" text-anchor="middle">🏦 债券</text>
  <rect x="240" y="110" width="120" height="50" fill="#27AE60" rx="6"/>
  <text x="300" y="130" font-size="11" fill="white" text-anchor="middle">利息</text>
  <text x="300" y="148" font-size="11" fill="white" text-anchor="middle">（固定现金流）</text>
  <rect x="240" y="170" width="120" height="50" fill="#58D68D" rx="6"/>
  <text x="300" y="190" font-size="11" fill="white" text-anchor="middle">价格变动</text>
  <text x="300" y="208" font-size="11" fill="white" text-anchor="middle">（资本利得）</text>
  <text x="300" y="290" font-size="12" fill="#2C3E50" text-anchor="middle" font-weight="bold">两种收益</text>
  <text x="300" y="310" font-size="11" fill="#555" text-anchor="middle">定期支付利息</text>
  <text x="300" y="328" font-size="11" fill="#555" text-anchor="middle">收益较为确定</text>

  <!-- 房产 -->
  <rect x="400" y="60" width="160" height="300" fill="#FEF9E7" rx="10" stroke="#F39C12" stroke-width="2"/>
  <text x="480" y="90" font-size="14" font-weight="bold" fill="#2C3E50" text-anchor="middle">🏠 房产</text>
  <rect x="420" y="110" width="120" height="50" fill="#F39C12" rx="6"/>
  <text x="480" y="130" font-size="11" fill="white" text-anchor="middle">租金</text>
  <text x="480" y="148" font-size="11" fill="white" text-anchor="middle">（现金流）</text>
  <rect x="420" y="170" width="120" height="50" fill="#F8C471" rx="6"/>
  <text x="480" y="190" font-size="11" fill="white" text-anchor="middle">房价上涨</text>
  <text x="480" y="208" font-size="11" fill="white" text-anchor="middle">（资本利得）</text>
  <text x="480" y="290" font-size="12" fill="#2C3E50" text-anchor="middle" font-weight="bold">两种收益</text>
  <text x="480" y="310" font-size="11" fill="#555" text-anchor="middle">持有期间有租金</text>
  <text x="480" y="328" font-size="11" fill="#555" text-anchor="middle">收益来源稳定</text>

  <!-- 黄金 -->
  <rect x="580" y="60" width="180" height="300" fill="#FDF2F8" rx="10" stroke="#E74C3C" stroke-width="2.5"/>
  <text x="670" y="90" font-size="14" font-weight="bold" fill="#E74C3C" text-anchor="middle">🥇 黄金</text>
  <!-- 空白区域 -->
  <rect x="600" y="110" width="140" height="50" fill="#FADBD8" rx="6" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="670" y="140" font-size="12" fill="#E74C3C" text-anchor="middle">❌ 无任何分红</text>
  <rect x="600" y="170" width="140" height="50" fill="#FADBD8" rx="6" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="670" y="200" font-size="12" fill="#E74C3C" text-anchor="middle">❌ 无任何利息</text>
  <rect x="600" y="230" width="140" height="50" fill="#F9EBEA" rx="6"/>
  <text x="670" y="250" font-size="11" fill="#333" text-anchor="middle">价格上涨时获利</text>
  <text x="670" y="268" font-size="11" fill="#333" text-anchor="middle">（唯一来源）</text>
  <text x="670" y="310" font-size="12" fill="#E74C3C" text-anchor="middle" font-weight="bold">⚠️ 零息资产</text>
  <text x="670" y="330" font-size="11" fill="#555" text-anchor="middle">持有期间无回报</text>
  <text x="670" y="348" font-size="11" fill="#555" text-anchor="middle">靠价差才能赚钱</text>

  <text x="400" y="406" font-size="11" fill="#999" text-anchor="middle">黄金是唯一一种"持有本身不产生任何收益"的主流资产</text>
</svg>
