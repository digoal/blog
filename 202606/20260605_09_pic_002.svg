<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Microsoft YaHei', sans-serif">
  <rect width="800" height="380" fill="#FAFAFA" rx="12"/>
  <text x="400" y="36" font-size="18" font-weight="bold" fill="#1A1A2E" text-anchor="middle">持有黄金的机会成本天平</text>

  <!-- 天平支柱 -->
  <line x1="400" y1="80" x2="400" y2="200" stroke="#7F8C8D" stroke-width="4"/>
  <rect x="370" y="196" width="60" height="14" fill="#7F8C8D" rx="3"/>
  <rect x="340" y="210" width="120" height="10" fill="#95A5A6" rx="3"/>

  <!-- 天平横梁 - 右倾（利率高时，黄金不划算） -->
  <line x1="160" y1="110" x2="640" y2="140" stroke="#2C3E50" stroke-width="3"/>
  <circle cx="400" cy="125" r="8" fill="#2C3E50"/>

  <!-- 左盘（黄金吸引力） -->
  <ellipse cx="160" cy="200" rx="80" ry="22" fill="#F0C040" stroke="#D4A017" stroke-width="2"/>
  <text x="160" y="196" font-size="12" font-weight="bold" fill="#5A3E00" text-anchor="middle">黄金吸引力</text>
  <text x="160" y="214" font-size="11" fill="#5A3E00" text-anchor="middle">零息但保值</text>
  <line x1="160" y1="110" x2="160" y2="178" stroke="#7F8C8D" stroke-width="2"/>

  <!-- 右盘（美债吸引力） -->
  <ellipse cx="640" cy="230" rx="80" ry="22" fill="#3498DB" stroke="#2980B9" stroke-width="2"/>
  <text x="640" y="226" font-size="12" font-weight="bold" fill="white" text-anchor="middle">美债吸引力</text>
  <text x="640" y="244" font-size="11" fill="white" text-anchor="middle">有息且安全</text>
  <line x1="640" y1="140" x2="640" y2="208" stroke="#7F8C8D" stroke-width="2"/>

  <!-- 场景1说明框 - 利率高 -->
  <rect x="40" y="255" width="340" height="100" fill="#FEF9E7" rx="8" stroke="#E67E22" stroke-width="1.5"/>
  <text x="210" y="278" font-size="13" font-weight="bold" fill="#E67E22" text-anchor="middle">⚠️ 实际利率高时</text>
  <text x="210" y="298" font-size="11" fill="#333" text-anchor="middle">美债年化回报 4%+</text>
  <text x="210" y="316" font-size="11" fill="#333" text-anchor="middle">黄金 = 0% 收益（还要交存储费）</text>
  <text x="210" y="334" font-size="11" fill="#E67E22" text-anchor="middle">→ 资金流出黄金，金价承压</text>

  <!-- 场景2说明框 - 利率低 -->
  <rect x="420" y="255" width="340" height="100" fill="#EAFAF1" rx="8" stroke="#27AE60" stroke-width="1.5"/>
  <text x="590" y="278" font-size="13" font-weight="bold" fill="#27AE60" text-anchor="middle">✅ 实际利率低/负时</text>
  <text x="590" y="298" font-size="11" fill="#333" text-anchor="middle">美债实际收益率接近0甚至为负</text>
  <text x="590" y="316" font-size="11" fill="#333" text-anchor="middle">黄金 vs 美债 = 打平甚至胜出</text>
  <text x="590" y="334" font-size="11" fill="#27AE60" text-anchor="middle">→ 资金涌入黄金，金价上涨</text>

  <text x="400" y="368" font-size="11" fill="#999" text-anchor="middle">黄金赚的是"实际利率下行"的钱，本质上是机会成本的重新定价</text>
</svg>
