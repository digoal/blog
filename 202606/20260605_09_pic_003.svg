<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Microsoft YaHei', sans-serif">
  <rect width="800" height="460" fill="#FAFAFA" rx="12"/>
  <text x="400" y="36" font-size="18" font-weight="bold" fill="#1A1A2E" text-anchor="middle">黄金价格的四大驱动力</text>

  <!-- 中心黄金圆 -->
  <circle cx="400" cy="230" r="58" fill="#F0C040" stroke="#D4A017" stroke-width="3"/>
  <text x="400" y="224" font-size="15" font-weight="bold" fill="#1A1A2E" text-anchor="middle">🥇 黄金</text>
  <text x="400" y="244" font-size="12" fill="#5A3E00" text-anchor="middle">价格</text>

  <!-- 驱动力1：实际利率（左上） -->
  <rect x="40" y="70" width="190" height="100" fill="#EAF4FB" rx="10" stroke="#2980B9" stroke-width="2"/>
  <text x="135" y="98" font-size="13" font-weight="bold" fill="#2980B9" text-anchor="middle">① 实际利率</text>
  <text x="135" y="118" font-size="11" fill="#333" text-anchor="middle">实际利率↓ → 金价↑</text>
  <text x="135" y="136" font-size="11" fill="#333" text-anchor="middle">实际利率↑ → 金价↓</text>
  <text x="135" y="156" font-size="10" fill="#888" text-anchor="middle">（名义利率 - 通胀率）</text>
  <!-- 连线 -->
  <line x1="230" y1="130" x2="350" y2="195" stroke="#2980B9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="285" y="158" font-size="11" fill="#2980B9" text-anchor="middle">负相关</text>

  <!-- 驱动力2：美元强弱（右上） -->
  <rect x="570" y="70" width="190" height="100" fill="#EAF4FB" rx="10" stroke="#8E44AD" stroke-width="2"/>
  <text x="665" y="98" font-size="13" font-weight="bold" fill="#8E44AD" text-anchor="middle">② 美元强弱</text>
  <text x="665" y="118" font-size="11" fill="#333" text-anchor="middle">美元↓ → 金价↑</text>
  <text x="665" y="136" font-size="11" fill="#333" text-anchor="middle">美元↑ → 金价↓</text>
  <text x="665" y="156" font-size="10" fill="#888" text-anchor="middle">（美元计价，反向关系）</text>
  <line x1="570" y1="130" x2="450" y2="195" stroke="#8E44AD" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="514" y="158" font-size="11" fill="#8E44AD" text-anchor="middle">负相关</text>

  <!-- 驱动力3：避险情绪（左下） -->
  <rect x="40" y="300" width="190" height="110" fill="#FEF9E7" rx="10" stroke="#E67E22" stroke-width="2"/>
  <text x="135" y="328" font-size="13" font-weight="bold" fill="#E67E22" text-anchor="middle">③ 避险情绪</text>
  <text x="135" y="348" font-size="11" fill="#333" text-anchor="middle">战争/危机 → 金价↑</text>
  <text x="135" y="366" font-size="11" fill="#333" text-anchor="middle">风险偏好回升 → 金价↓</text>
  <text x="135" y="386" font-size="10" fill="#888" text-anchor="middle">（地缘政治、金融危机）</text>
  <line x1="230" y1="330" x2="350" y2="265" stroke="#E67E22" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="285" y="298" font-size="11" fill="#E67E22" text-anchor="middle">正相关</text>

  <!-- 驱动力4：央行购金（右下） -->
  <rect x="570" y="300" width="190" height="110" fill="#EAFAF1" rx="10" stroke="#27AE60" stroke-width="2"/>
  <text x="665" y="328" font-size="13" font-weight="bold" fill="#27AE60" text-anchor="middle">④ 央行购金</text>
  <text x="665" y="348" font-size="11" fill="#333" text-anchor="middle">央行增持 → 金价↑</text>
  <text x="665" y="366" font-size="11" fill="#333" text-anchor="middle">央行减持 → 金价↓</text>
  <text x="665" y="386" font-size="10" fill="#888" text-anchor="middle">（去美元化大趋势）</text>
  <line x1="570" y1="330" x2="450" y2="265" stroke="#27AE60" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="514" y="298" font-size="11" fill="#27AE60" text-anchor="middle">正相关</text>

  <text x="400" y="446" font-size="11" fill="#999" text-anchor="middle">四大因素共同决定金价，无法单一押注某一驱动力</text>
</svg>
