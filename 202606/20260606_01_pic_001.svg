<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#fafaf8"/>
  
  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c2c2c">黄金价格的四大驱动力</text>
  
  <!-- 中心圆：金价 -->
  <circle cx="400" cy="220" r="58" fill="#d4a017" opacity="0.95"/>
  <text x="400" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="white">金价</text>
  <text x="400" y="234" text-anchor="middle" font-size="12" fill="white">GOLD</text>
  
  <!-- 左上：实际利率 -->
  <rect x="60" y="60" width="170" height="100" rx="12" fill="#e8f4fd" stroke="#3a8fd8" stroke-width="2"/>
  <text x="145" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5fa8">① 实际利率</text>
  <text x="145" y="116" text-anchor="middle" font-size="11" fill="#444">实际利率↑ → 金价↓</text>
  <text x="145" y="135" text-anchor="middle" font-size="11" fill="#444">实际利率↓ → 金价↑</text>
  <text x="145" y="152" text-anchor="middle" font-size="10" fill="#888">（最核心的锚）</text>
  <!-- 连接线 -->
  <line x1="230" y1="130" x2="348" y2="185" stroke="#3a8fd8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="348,185 338,178 344,192" fill="#3a8fd8"/>

  <!-- 右上：美元指数 -->
  <rect x="570" y="60" width="170" height="100" rx="12" fill="#fff0e6" stroke="#e06820" stroke-width="2"/>
  <text x="655" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#b34f10">② 美元强弱</text>
  <text x="655" y="116" text-anchor="middle" font-size="11" fill="#444">美元↑ → 金价↓</text>
  <text x="655" y="135" text-anchor="middle" font-size="11" fill="#444">美元↓ → 金价↑</text>
  <text x="655" y="152" text-anchor="middle" font-size="10" fill="#888">（与实际利率联动）</text>
  <!-- 连接线 -->
  <line x1="570" y1="135" x2="452" y2="185" stroke="#e06820" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="452,185 460,178 456,192" fill="#e06820"/>

  <!-- 左下：央行购金 -->
  <rect x="60" y="290" width="170" height="100" rx="12" fill="#edf7ed" stroke="#2e9b3e" stroke-width="2"/>
  <text x="145" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a7a2a">③ 央行购金</text>
  <text x="145" y="346" text-anchor="middle" font-size="11" fill="#444">结构性买盘支撑</text>
  <text x="145" y="365" text-anchor="middle" font-size="11" fill="#444">2022-2024年均超千吨</text>
  <text x="145" y="382" text-anchor="middle" font-size="10" fill="#888">（2022后的新变量）</text>
  <!-- 连接线 -->
  <line x1="230" y1="310" x2="348" y2="255" stroke="#2e9b3e" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="348,255 336,252 344,265" fill="#2e9b3e"/>

  <!-- 右下：避险/通胀预期 -->
  <rect x="570" y="290" width="170" height="100" rx="12" fill="#f5edf9" stroke="#7b3fa0" stroke-width="2"/>
  <text x="655" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a1e80">④ 避险情绪</text>
  <text x="655" y="341" text-anchor="middle" font-size="11" fill="#444">地缘冲突、金融危机</text>
  <text x="655" y="360" text-anchor="middle" font-size="11" fill="#444">货币信用受疑</text>
  <text x="655" y="379" text-anchor="middle" font-size="10" fill="#888">（短期催化剂）</text>
  <!-- 连接线 -->
  <line x1="570" y1="310" x2="452" y2="255" stroke="#7b3fa0" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="452,255 460,248 456,262" fill="#7b3fa0"/>

  <!-- 底部注释 -->
  <text x="400" y="408" text-anchor="middle" font-size="10" fill="#999">注：四大驱动力可同向叠加，也可相互抵消，需综合判断</text>
</svg>
