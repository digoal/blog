<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="800" height="380" fill="#fafaf8"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c2c2c">实际利率 vs 金价：最重要的反向关系</text>
  
  <!-- 坐标轴 -->
  <line x1="80" y1="300" x2="740" y2="300" stroke="#aaa" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="80" y2="300" stroke="#aaa" stroke-width="1.5"/>
  
  <!-- 时间轴标签（示意） -->
  <text x="130" y="318" text-anchor="middle" font-size="10" fill="#666">2008</text>
  <text x="240" y="318" text-anchor="middle" font-size="10" fill="#666">2012</text>
  <text x="350" y="318" text-anchor="middle" font-size="10" fill="#666">2016</text>
  <text x="460" y="318" text-anchor="middle" font-size="10" fill="#666">2020</text>
  <text x="570" y="318" text-anchor="middle" font-size="10" fill="#666">2022</text>
  <text x="680" y="318" text-anchor="middle" font-size="10" fill="#666">2025</text>

  <!-- 金价曲线（橙色） -->
  <!-- 从低到2012高，到2015低，到2020飙升，到2022-2025继续涨 -->
  <polyline points="80,260 130,230 200,170 240,130 290,200 350,210 410,190 460,80 510,75 560,90 600,85 640,70 700,55 740,50"
            fill="none" stroke="#d4a017" stroke-width="2.5"/>
  <text x="745" y="50" font-size="11" fill="#d4a017" font-weight="bold">金价</text>

  <!-- 实际利率曲线（蓝色，与金价反向） -->
  <polyline points="80,180 130,200 200,230 240,250 290,180 350,160 410,170 460,280 510,275 560,150 600,140 640,160 700,170 740,165"
            fill="none" stroke="#3a8fd8" stroke-width="2.5"/>
  <text x="745" y="165" font-size="11" fill="#3a8fd8" font-weight="bold">实际利率</text>

  <!-- Y轴标签 -->
  <text x="72" y="300" text-anchor="end" font-size="10" fill="#888">低</text>
  <text x="72" y="180" text-anchor="end" font-size="10" fill="#888">中</text>
  <text x="72" y="64" text-anchor="end" font-size="10" fill="#888">高</text>
  
  <!-- 关键阶段标注 -->
  <!-- 2020-2022负实际利率 -->
  <rect x="440" y="60" width="120" height="36" rx="6" fill="#fff8e1" stroke="#d4a017" stroke-width="1.2" opacity="0.9"/>
  <text x="500" y="78" text-anchor="middle" font-size="10" fill="#8a6000">2020-2022</text>
  <text x="500" y="91" text-anchor="middle" font-size="10" fill="#8a6000">负实际利率→黄金狂涨</text>
  
  <!-- 2022后结构性脱锚 -->
  <rect x="555" y="100" width="150" height="36" rx="6" fill="#e8f4fd" stroke="#3a8fd8" stroke-width="1.2" opacity="0.9"/>
  <text x="630" y="118" text-anchor="middle" font-size="10" fill="#1a5fa8">2022后：传统框架弱化</text>
  <text x="630" y="131" text-anchor="middle" font-size="10" fill="#1a5fa8">央行购金接棒驱动</text>

  <!-- 公式 -->
  <rect x="80" y="330" width="640" height="34" rx="8" fill="#f0f0f0"/>
  <text x="400" y="350" text-anchor="middle" font-size="12" fill="#333">实际利率 = 名义利率（如10年美债收益率） − 通胀预期（TIPS隐含通胀）</text>
  <text x="400" y="365" text-anchor="middle" font-size="10" fill="#888">→ 数据来源：美联储 FRED，可搜"TIPS 10年实际利率"查看实时数据</text>
</svg>
