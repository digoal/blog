<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="800" height="360" fill="#fafaf8"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c2c2c">全球央行购金量变化（世界黄金协会数据）</text>

  <!-- 柱状图区域 -->
  <!-- X轴 -->
  <line x1="80" y1="270" x2="740" y2="270" stroke="#bbb" stroke-width="1.5"/>
  <!-- Y轴 -->
  <line x1="80" y1="60" x2="80" y2="270" stroke="#bbb" stroke-width="1.5"/>
  
  <!-- Y轴刻度 -->
  <text x="72" y="274" text-anchor="end" font-size="10" fill="#888">0</text>
  <text x="72" y="220" text-anchor="end" font-size="10" fill="#888">300</text>
  <text x="72" y="166" text-anchor="end" font-size="10" fill="#888">600</text>
  <text x="72" y="112" text-anchor="end" font-size="10" fill="#888">900</text>
  <text x="72" y="68" text-anchor="end" font-size="10" fill="#888">1200吨</text>
  <line x1="78" y1="220" x2="740" y2="220" stroke="#eee" stroke-width="1"/>
  <line x1="78" y1="166" x2="740" y2="166" stroke="#eee" stroke-width="1"/>
  <line x1="78" y1="112" x2="740" y2="112" stroke="#eee" stroke-width="1"/>

  <!-- 年份柱子 -->
  <!-- 2010-2021年均约473吨：高度约96px，用浅色 -->
  <!-- 代表柱 2010~2021 用一组浅色柱 -->
  <rect x="100" y="178" width="55" height="92" rx="4" fill="#90c4e8"/>
  <text x="127" y="290" text-anchor="middle" font-size="10" fill="#555">2010~</text>
  <text x="127" y="303" text-anchor="middle" font-size="10" fill="#555">2021均值</text>
  <text x="127" y="168" text-anchor="middle" font-size="10" fill="#3a8fd8">473吨</text>
  
  <!-- 2022年1078吨 -->
  <rect x="250" y="54" width="60" height="216" rx="4" fill="#d4a017"/>
  <text x="280" y="316" text-anchor="middle" font-size="10" fill="#555">2022年</text>
  <text x="280" y="44" text-anchor="middle" font-size="10" fill="#a07010" font-weight="bold">1078吨</text>
  
  <!-- 2023年1037吨 -->
  <rect x="330" y="62" width="60" height="208" rx="4" fill="#d4a017" opacity="0.85"/>
  <text x="360" y="316" text-anchor="middle" font-size="10" fill="#555">2023年</text>
  <text x="360" y="52" text-anchor="middle" font-size="10" fill="#a07010" font-weight="bold">1037吨</text>
  
  <!-- 2024年1045-1089吨 -->
  <rect x="410" y="57" width="60" height="213" rx="4" fill="#c8820a"/>
  <text x="440" y="316" text-anchor="middle" font-size="10" fill="#555">2024年</text>
  <text x="440" y="47" text-anchor="middle" font-size="10" fill="#7a4f00" font-weight="bold">1089吨</text>
  <text x="440" y="37" text-anchor="middle" font-size="9" fill="#7a4f00">历史纪录</text>

  <!-- 连续三年超1000吨标注 -->
  <rect x="236" y="270" width="248" height="26" rx="0" fill="none"/>
  <line x1="245" y1="276" x2="475" y2="276" stroke="#c8820a" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="360" y="308" text-anchor="middle" font-size="11" fill="#c8820a" font-weight="bold">← 连续三年购金量超1000吨 →</text>

  <!-- 右侧说明 -->
  <rect x="545" y="70" width="200" height="175" rx="10" fill="#fff8e1" stroke="#d4a017" stroke-width="1.5"/>
  <text x="645" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a6000">购金主力：新兴市场</text>
  <text x="565" y="118" font-size="11" fill="#555">🥇 波兰   +90吨 (2024)</text>
  <text x="565" y="138" font-size="11" fill="#555">🥈 土耳其 +75吨 (2024)</text>
  <text x="565" y="158" font-size="11" fill="#555">🥉 印度   +73吨 (2024)</text>
  <text x="565" y="178" font-size="11" fill="#555">🇨🇳 中国   累计+358吨</text>
  <text x="565" y="200" font-size="11" fill="#555">     (2022-2025)</text>
  <line x1="560" y1="212" x2="738" y2="212" stroke="#e0c060" stroke-width="1"/>
  <text x="645" y="230" text-anchor="middle" font-size="10" fill="#888">美元在全球外储占比</text>
  <text x="645" y="246" text-anchor="middle" font-size="10" fill="#888">55.25%(2010) → 46.74%(2024)</text>
</svg>
