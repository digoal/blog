<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="800" height="400" fill="#fafaf8"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c2c2c">黄金定价情景推演：看这两个信号</text>

  <!-- 根节点：看实际利率方向 -->
  <rect x="280" y="48" width="240" height="50" rx="10" fill="#3a8fd8"/>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="white" font-weight="bold">看信号①：实际利率方向</text>
  <text x="400" y="88" text-anchor="middle" font-size="11" fill="#d0eaff">10年TIPS收益率是上行还是下行？</text>

  <!-- 分支线 -->
  <line x1="330" y1="98" x2="200" y2="148" stroke="#bbb" stroke-width="1.5"/>
  <line x1="470" y1="98" x2="600" y2="148" stroke="#bbb" stroke-width="1.5"/>
  
  <!-- 左：实际利率下行 -->
  <rect x="100" y="148" width="200" height="50" rx="8" fill="#2e9b3e"/>
  <text x="200" y="170" text-anchor="middle" font-size="12" fill="white" font-weight="bold">实际利率下行↓</text>
  <text x="200" y="188" text-anchor="middle" font-size="11" fill="#c8f0cc">持有黄金机会成本低</text>

  <!-- 右：实际利率上行 -->
  <rect x="500" y="148" width="200" height="50" rx="8" fill="#c0392b"/>
  <text x="600" y="170" text-anchor="middle" font-size="12" fill="white" font-weight="bold">实际利率上行↑</text>
  <text x="600" y="188" text-anchor="middle" font-size="11" fill="#fcc">存债比存金更划算</text>

  <!-- 继续往下 -->
  <line x1="200" y1="198" x2="200" y2="238" stroke="#bbb" stroke-width="1.5"/>
  <line x1="600" y1="198" x2="600" y2="238" stroke="#bbb" stroke-width="1.5"/>

  <!-- 看信号②：美元方向 -->
  <rect x="100" y="238" width="200" height="44" rx="8" fill="#f0f4ff" stroke="#3a8fd8" stroke-width="1.5"/>
  <text x="200" y="257" text-anchor="middle" font-size="12" fill="#1a5fa8" font-weight="bold">看信号②：美元强弱</text>
  <text x="200" y="274" text-anchor="middle" font-size="11" fill="#555">美元同步弱 → 双重利好</text>

  <rect x="500" y="238" width="200" height="44" rx="8" fill="#fff5f5" stroke="#c0392b" stroke-width="1.5"/>
  <text x="600" y="257" text-anchor="middle" font-size="12" fill="#8b1a0e" font-weight="bold">看信号②：避险情绪</text>
  <text x="600" y="274" text-anchor="middle" font-size="11" fill="#555">若地缘风险大 → 或支撑</text>

  <!-- 结论框 -->
  <line x1="200" y1="282" x2="200" y2="310" stroke="#bbb" stroke-width="1.5"/>
  <line x1="600" y1="282" x2="600" y2="310" stroke="#bbb" stroke-width="1.5"/>

  <rect x="80" y="310" width="240" height="60" rx="10" fill="#d4a017" opacity="0.9"/>
  <text x="200" y="332" text-anchor="middle" font-size="13" fill="white" font-weight="bold">✅ 利好黄金</text>
  <text x="200" y="350" text-anchor="middle" font-size="11" fill="#fff3cc">考虑配置/加仓黄金</text>
  <text x="200" y="365" text-anchor="middle" font-size="10" fill="#ffe08a">（还需看仓位是否过高）</text>

  <rect x="480" y="310" width="240" height="60" rx="10" fill="#7f8c8d" opacity="0.9"/>
  <text x="600" y="332" text-anchor="middle" font-size="13" fill="white" font-weight="bold">⚠️ 逆风环境</text>
  <text x="600" y="350" text-anchor="middle" font-size="11" fill="#ddd">持仓审视/等待信号转变</text>
  <text x="600" y="365" text-anchor="middle" font-size="10" fill="#ccc">（央行购金或能托底）</text>

  <!-- 中间注释 -->
  <rect x="300" y="290" width="200" height="36" rx="8" fill="#f5edf9" stroke="#7b3fa0" stroke-width="1.2"/>
  <text x="400" y="306" text-anchor="middle" font-size="10" fill="#5a1e80">2022年后新增判断：</text>
  <text x="400" y="320" text-anchor="middle" font-size="10" fill="#5a1e80">央行购金力度是否强劲？</text>
</svg>
