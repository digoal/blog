<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#fafaf8"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">黄金投资三件套：你买的是什么？</text>

  <!-- Column Headers -->
  <!-- Gold ETF -->
  <rect x="60" y="60" width="200" height="50" rx="8" fill="#c8973a"/>
  <text x="160" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🥇 黄金ETF</text>
  <text x="160" y="102" text-anchor="middle" font-size="11" fill="white">场内交易的黄金基金</text>

  <!-- Gold Fund -->
  <rect x="300" y="60" width="200" height="50" rx="8" fill="#8c6d2f"/>
  <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">💼 黄金基金（场外）</text>
  <text x="400" y="102" text-anchor="middle" font-size="11" fill="white">申购赎回的基金份额</text>

  <!-- Gold Stock -->
  <rect x="540" y="60" width="200" height="50" rx="8" fill="#4a6741"/>
  <text x="640" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📈 黄金股</text>
  <text x="640" y="102" text-anchor="middle" font-size="11" fill="white">黄金公司的上市股票</text>

  <!-- Row Labels (left side) -->
  <text x="30" y="170" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,30,170)">买的是什么</text>
  <text x="30" y="240" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,30,240)">价格跟不跟金价</text>
  <text x="30" y="310" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,30,310)">波动幅度</text>
  <text x="30" y="375" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,30,375)">适合人群</text>

  <!-- Row dividers -->
  <line x1="48" y1="135" x2="760" y2="135" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="48" y1="205" x2="760" y2="205" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="48" y1="275" x2="760" y2="275" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="48" y1="345" x2="760" y2="345" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Col dividers -->
  <line x1="278" y1="135" x2="278" y2="410" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="518" y1="135" x2="518" y2="410" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Row 1: 买的是什么 -->
  <rect x="48" y="135" width="752" height="70" fill="#fff9ef"/>
  <text x="160" y="162" text-anchor="middle" font-size="12" fill="#1a1a1a">实物黄金</text>
  <text x="160" y="180" text-anchor="middle" font-size="11" fill="#666">（基金持有金条）</text>
  <text x="400" y="162" text-anchor="middle" font-size="12" fill="#1a1a1a">ETF联接基金份额</text>
  <text x="400" y="180" text-anchor="middle" font-size="11" fill="#666">（间接持有黄金ETF）</text>
  <text x="640" y="162" text-anchor="middle" font-size="12" fill="#1a1a1a">矿企公司股权</text>
  <text x="640" y="180" text-anchor="middle" font-size="11" fill="#666">（受经营、管理影响）</text>

  <!-- Row 2: 价格跟金价 -->
  <rect x="48" y="205" width="752" height="70" fill="#ffffff"/>
  <text x="160" y="232" text-anchor="middle" font-size="12" fill="#2a7a2a" font-weight="bold">✅ 高度紧密</text>
  <text x="160" y="252" text-anchor="middle" font-size="11" fill="#666">日内可交易，折溢价小</text>
  <text x="400" y="232" text-anchor="middle" font-size="12" fill="#2a7a2a" font-weight="bold">✅ 较紧密</text>
  <text x="400" y="252" text-anchor="middle" font-size="11" fill="#666">T+1赎回，略有延迟</text>
  <text x="640" y="232" text-anchor="middle" font-size="12" fill="#c04000" font-weight="bold">⚠️ 相关但不完全</text>
  <text x="640" y="252" text-anchor="middle" font-size="11" fill="#666">叠加公司经营变量</text>

  <!-- Row 3: 波动幅度 -->
  <rect x="48" y="275" width="752" height="70" fill="#fff9ef"/>
  <text x="160" y="302" text-anchor="middle" font-size="12" fill="#1a1a1a">≈ 金价波动</text>
  <text x="160" y="322" text-anchor="middle" font-size="11" fill="#666">年化波动约15-20%</text>
  <text x="400" y="302" text-anchor="middle" font-size="12" fill="#1a1a1a">≈ 金价波动</text>
  <text x="400" y="322" text-anchor="middle" font-size="11" fill="#666">略高于ETF（费率差异）</text>
  <text x="640" y="302" text-anchor="middle" font-size="12" fill="#c04000" font-weight="bold">1.5x~3x 放大</text>
  <text x="640" y="322" text-anchor="middle" font-size="11" fill="#666">赚更多，也亏更多</text>

  <!-- Row 4: 适合人群 -->
  <rect x="48" y="345" width="752" height="65" fill="#ffffff"/>
  <text x="160" y="370" text-anchor="middle" font-size="12" fill="#1a1a1a">小白首选</text>
  <text x="160" y="390" text-anchor="middle" font-size="11" fill="#666">有证券账户即可</text>
  <text x="400" y="370" text-anchor="middle" font-size="12" fill="#1a1a1a">无证券账户时用</text>
  <text x="400" y="390" text-anchor="middle" font-size="11" fill="#666">手机APP申购方便</text>
  <text x="640" y="370" text-anchor="middle" font-size="12" fill="#c04000">有经验的主动投资者</text>
  <text x="640" y="390" text-anchor="middle" font-size="11" fill="#666">需研究个股基本面</text>
</svg>
