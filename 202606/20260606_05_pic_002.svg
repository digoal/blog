<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="380" fill="#fafaf8"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">黄金股的"放大器效应"：好时比ETF赚更多，坏时亏更惨</text>
  
  <!-- Chart Area -->
  <rect x="80" y="55" width="640" height="260" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
  
  <!-- Y-axis labels -->
  <text x="72" y="75" text-anchor="end" font-size="10" fill="#888">+80%</text>
  <text x="72" y="120" text-anchor="end" font-size="10" fill="#888">+40%</text>
  <text x="72" y="170" text-anchor="end" font-size="10" fill="#888">0%</text>
  <text x="72" y="220" text-anchor="end" font-size="10" fill="#888">-40%</text>
  <text x="72" y="270" text-anchor="end" font-size="10" fill="#888">-80%</text>
  
  <!-- Zero line -->
  <line x1="80" y1="170" x2="720" y2="170" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="120" x2="720" y2="120" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="220" x2="720" y2="220" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="75" x2="720" y2="75" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="270" x2="720" y2="270" stroke="#f0f0f0" stroke-width="1"/>
  
  <!-- X-axis: Scenarios -->
  <text x="180" y="330" text-anchor="middle" font-size="11" fill="#555">金价大涨+20%</text>
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#555">金价微涨+5%</text>
  <text x="580" y="330" text-anchor="middle" font-size="11" fill="#555">金价下跌-15%</text>

  <!-- Scenario 1: Gold up 20% -->
  <!-- ETF bar: +20% -->
  <rect x="130" y="130" width="40" height="40" fill="#c8973a" rx="3"/>
  <text x="150" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#c8973a">+20%</text>
  <!-- Stock bar: +45% -->
  <rect x="180" y="95" width="40" height="75" fill="#4a6741" rx="3"/>
  <text x="200" y="89" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a6741">+45%</text>
  
  <!-- Scenario 2: Gold up 5% -->
  <!-- ETF bar: +5% -->
  <rect x="360" y="160" width="40" height="10" fill="#c8973a" rx="3"/>
  <text x="380" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#c8973a">+5%</text>
  <!-- Stock bar: +8% (small gain but may be muted) -->
  <rect x="410" y="154" width="40" height="16" fill="#4a6741" rx="3"/>
  <text x="430" y="149" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a6741">+8%</text>
  <!-- Cost note -->
  <text x="420" y="185" text-anchor="middle" font-size="9" fill="#999">（矿企成本压缩利润）</text>

  <!-- Scenario 3: Gold down 15% -->
  <!-- ETF bar: -15% -->
  <rect x="545" y="170" width="40" height="30" fill="#c8973a" rx="3"/>
  <text x="565" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#c8973a">-15%</text>
  <!-- Stock bar: -38% -->
  <rect x="595" y="170" width="40" height="76" fill="#c04000" rx="3"/>
  <text x="615" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#c04000">-38%</text>

  <!-- Legend -->
  <rect x="480" y="58" width="16" height="16" fill="#c8973a" rx="2"/>
  <text x="500" y="71" font-size="11" fill="#555">黄金ETF（紧跟金价）</text>
  <rect x="480" y="82" width="16" height="16" fill="#4a6741" rx="2"/>
  <text x="500" y="95" font-size="11" fill="#555">黄金股（放大涨跌）</text>

  <!-- Key insight -->
  <rect x="85" y="295" width="630" height="30" fill="#fff3cd" rx="4"/>
  <text x="400" y="313" text-anchor="middle" font-size="11" fill="#7a5c00">⚡ 核心规律：金价涨幅越大，黄金股超额收益越明显；金价涨幅小或下跌，黄金股反而跑输</text>

  <!-- Data note -->
  <text x="400" y="355" text-anchor="middle" font-size="9" fill="#aaa">数据示意图，基于历史规律参考，非精确预测</text>
</svg>
