<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="440" fill="#fafaf8"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">你该买哪种？3步选工具</text>

  <!-- Q1 -->
  <rect x="300" y="55" width="200" height="55" rx="28" fill="#c8973a"/>
  <text x="400" y="78" text-anchor="middle" font-size="13" fill="white" font-weight="bold">有证券账户吗？</text>
  <text x="400" y="98" text-anchor="middle" font-size="11" fill="#fff9ef">（股票交易账户）</text>

  <!-- Yes/No from Q1 -->
  <line x1="300" y1="82" x2="180" y2="140" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="82" x2="620" y2="140" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="225" y="128" text-anchor="middle" font-size="11" fill="#c04000">没有</text>
  <text x="575" y="128" text-anchor="middle" font-size="11" fill="#2a7a2a">有</text>

  <!-- No branch: Gold Fund -->
  <rect x="80" y="140" width="200" height="55" rx="8" fill="#8c6d2f"/>
  <text x="180" y="161" text-anchor="middle" font-size="13" fill="white" font-weight="bold">💼 买黄金基金</text>
  <text x="180" y="181" text-anchor="middle" font-size="11" fill="#fff9ef">（支付宝/天天等APP）</text>

  <!-- Yes branch: Q2 -->
  <rect x="520" y="140" width="200" height="55" rx="28" fill="#c8973a"/>
  <text x="620" y="162" text-anchor="middle" font-size="13" fill="white" font-weight="bold">是否只想</text>
  <text x="620" y="182" text-anchor="middle" font-size="11" fill="#fff9ef">跟踪金价，不选股？</text>

  <!-- Yes/No from Q2 -->
  <line x1="520" y1="167" x2="400" y2="240" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="167" x2="720" y2="240" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="445" y="220" text-anchor="middle" font-size="11" fill="#2a7a2a">是</text>
  <text x="735" y="210" text-anchor="middle" font-size="11" fill="#c04000">否，想放大收益</text>

  <!-- Yes → ETF -->
  <rect x="290" y="240" width="220" height="55" rx="8" fill="#c8973a"/>
  <text x="400" y="261" text-anchor="middle" font-size="13" fill="white" font-weight="bold">🥇 买黄金ETF</text>
  <text x="400" y="281" text-anchor="middle" font-size="11" fill="#fff9ef">如：518880、159937</text>

  <!-- No → Q3 -->
  <rect x="590" y="240" width="160" height="55" rx="28" fill="#c8973a"/>
  <text x="670" y="262" text-anchor="middle" font-size="13" fill="white" font-weight="bold">能研究</text>
  <text x="670" y="282" text-anchor="middle" font-size="11" fill="#fff9ef">矿企财报吗？</text>

  <!-- Q3 yes/no -->
  <line x1="590" y1="267" x2="500" y2="340" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="267" x2="750" y2="340" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="325" text-anchor="middle" font-size="11" fill="#c04000">不能/不想</text>
  <text x="762" y="310" text-anchor="middle" font-size="11" fill="#2a7a2a">能</text>

  <!-- No to stock → Back to ETF -->
  <rect x="400" y="340" width="130" height="45" rx="8" fill="#c8973a"/>
  <text x="465" y="358" text-anchor="middle" font-size="11" fill="white" font-weight="bold">🥇 还是买ETF</text>
  <text x="465" y="377" text-anchor="middle" font-size="10" fill="#fff9ef">用杠杆ETF放大</text>

  <!-- Yes to stock -->
  <rect x="620" y="340" width="150" height="45" rx="8" fill="#4a6741"/>
  <text x="695" y="358" text-anchor="middle" font-size="12" fill="white" font-weight="bold">📈 考虑黄金股</text>
  <text x="695" y="377" text-anchor="middle" font-size="10" fill="#d4f0d4">仓位≤总仓5-10%</text>

  <!-- Warning note -->
  <rect x="80" y="345" width="280" height="60" fill="#fef0e0" rx="6" stroke="#c8973a" stroke-width="1"/>
  <text x="220" y="365" text-anchor="middle" font-size="11" fill="#7a4000" font-weight="bold">黄金基金 vs ETF 本质区别</text>
  <text x="220" y="383" text-anchor="middle" font-size="10" fill="#7a4000">基金：每天15:30后才能申购/赎回</text>
  <text x="220" y="399" text-anchor="middle" font-size="10" fill="#7a4000">ETF：交易时间随时可买卖，灵活</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>
</svg>
