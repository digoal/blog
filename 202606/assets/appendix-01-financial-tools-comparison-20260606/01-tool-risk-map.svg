<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <line x1="100" y1="320" x2="720" y2="320" stroke="#334155" stroke-width="2"/>
  <line x1="100" y1="320" x2="100" y2="60" stroke="#334155" stroke-width="2"/>
  <path d="M720 320 L705 312 L705 328 Z" fill="#334155"/>
  <path d="M100 60 L92 75 L108 75 Z" fill="#334155"/>
  <text x="695" y="350" font-size="18" fill="#334155" text-anchor="end">复杂度 / 门槛更高</text>
  <text x="56" y="78" font-size="18" fill="#334155" text-anchor="middle" transform="rotate(-90 56 78)">犯错成本更高</text>

  <rect x="130" y="250" width="160" height="52" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="210" y="272" font-size="17" fill="#14532d" text-anchor="middle">存款 / 货币基金</text>
  <text x="210" y="294" font-size="13" fill="#14532d" text-anchor="middle">生活钱、短期钱优先</text>

  <rect x="318" y="225" width="160" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="398" y="250" font-size="17" fill="#075985" text-anchor="middle">短债 / 宽基ETF</text>
  <text x="398" y="272" font-size="13" fill="#075985" text-anchor="middle">先看期限和仓位</text>

  <rect x="492" y="165" width="168" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="576" y="190" font-size="17" fill="#713f12" text-anchor="middle">行业ETF / 个股</text>
  <text x="576" y="212" font-size="13" fill="#713f12" text-anchor="middle">需要研究和止损规则</text>

  <rect x="530" y="78" width="178" height="68" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="619" y="103" font-size="17" fill="#7f1d1d" text-anchor="middle">融资 / 期权 / 期货</text>
  <text x="619" y="125" font-size="13" fill="#7f1d1d" text-anchor="middle">默认不作为小白工具</text>

  <rect x="275" y="122" width="160" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="355" y="146" font-size="17" fill="#4c1d95" text-anchor="middle">QDII / 港股通</text>
  <text x="355" y="168" font-size="13" fill="#4c1d95" text-anchor="middle">叠加汇率和规则差异</text>

  <text x="400" y="32" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="700">散户工具不是收益排序，而是匹配排序</text>
  <text x="400" y="374" font-size="15" fill="#64748b" text-anchor="middle">先选“自己能承受错误”的工具，再讨论收益空间</text>
