<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="700">工具选择的论证链</text>

  <rect x="42" y="88" width="152" height="90" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="118" y="116" font-size="17" fill="#075985" text-anchor="middle" font-weight="700">前提A</text>
  <text x="118" y="142" font-size="14" fill="#075985" text-anchor="middle">可参与工具很多</text>
  <text x="118" y="162" font-size="14" fill="#075985" text-anchor="middle">名字相似风险不同</text>

  <rect x="234" y="88" width="152" height="90" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="310" y="116" font-size="17" fill="#14532d" text-anchor="middle" font-weight="700">前提B</text>
  <text x="310" y="142" font-size="14" fill="#14532d" text-anchor="middle">门槛、杠杆、流动性</text>
  <text x="310" y="162" font-size="14" fill="#14532d" text-anchor="middle">决定犯错成本</text>

  <rect x="426" y="88" width="152" height="90" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="502" y="116" font-size="17" fill="#713f12" text-anchor="middle" font-weight="700">前提C</text>
  <text x="502" y="142" font-size="14" fill="#713f12" text-anchor="middle">资金期限和能力</text>
  <text x="502" y="162" font-size="14" fill="#713f12" text-anchor="middle">每个人都不同</text>

  <rect x="618" y="88" width="140" height="90" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="688" y="116" font-size="17" fill="#7f1d1d" text-anchor="middle" font-weight="700">错误路径</text>
  <text x="688" y="142" font-size="14" fill="#7f1d1d" text-anchor="middle">工具不匹配</text>
  <text x="688" y="162" font-size="14" fill="#7f1d1d" text-anchor="middle">亏损被放大</text>

  <path d="M194 133 H234" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M386 133 H426" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M578 133 H618" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="165" y="242" width="470" height="92" rx="10" fill="#f1f5f9" stroke="#475569"/>
  <text x="400" y="270" font-size="19" fill="#0f172a" text-anchor="middle" font-weight="700">结论：四问筛选</text>
  <text x="400" y="298" font-size="15" fill="#334155" text-anchor="middle">1 能不能买  2 最坏亏什么  3 什么时候能退出  4 我能不能解释清楚</text>
  <text x="400" y="320" font-size="15" fill="#334155" text-anchor="middle">四问有一问答不清，就先降级到更简单的工具</text>

  <path d="M400 178 V242" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
