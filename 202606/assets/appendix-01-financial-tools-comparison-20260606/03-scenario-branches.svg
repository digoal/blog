<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="700">前提变化时，工具要跟着切换</text>

  <rect x="310" y="72" width="180" height="64" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="98" font-size="17" fill="#0f172a" text-anchor="middle" font-weight="700">先问资金和能力</text>
  <text x="400" y="120" font-size="14" fill="#475569" text-anchor="middle">不是先问哪个更赚钱</text>

  <path d="M400 136 L170 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 136 L330 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 136 L500 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 136 L660 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="54" y="190" width="190" height="112" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="149" y="218" font-size="16" fill="#14532d" text-anchor="middle" font-weight="700">3个月内要用钱</text>
  <text x="149" y="244" font-size="14" fill="#14532d" text-anchor="middle">存款 / 货币基金</text>
  <text x="149" y="266" font-size="14" fill="#14532d" text-anchor="middle">国债逆回购</text>
  <text x="149" y="288" font-size="13" fill="#14532d" text-anchor="middle">不碰波动资产</text>

  <rect x="268" y="190" width="190" height="112" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="363" y="218" font-size="16" fill="#075985" text-anchor="middle" font-weight="700">3年以上不用</text>
  <text x="363" y="244" font-size="14" fill="#075985" text-anchor="middle">宽基ETF做核心</text>
  <text x="363" y="266" font-size="14" fill="#075985" text-anchor="middle">债券/黄金做防守</text>
  <text x="363" y="288" font-size="13" fill="#075985" text-anchor="middle">分批和再平衡</text>

  <rect x="482" y="190" width="190" height="112" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="577" y="218" font-size="16" fill="#713f12" text-anchor="middle" font-weight="700">看不懂规则</text>
  <text x="577" y="244" font-size="14" fill="#713f12" text-anchor="middle">不升级工具</text>
  <text x="577" y="266" font-size="14" fill="#713f12" text-anchor="middle">先读公告和费用</text>
  <text x="577" y="288" font-size="13" fill="#713f12" text-anchor="middle">写不出失效条件不买</text>

  <rect x="612" y="68" width="150" height="82" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="687" y="94" font-size="16" fill="#7f1d1d" text-anchor="middle" font-weight="700">想用杠杆翻本</text>
  <text x="687" y="120" font-size="14" fill="#7f1d1d" text-anchor="middle">停止交易</text>
  <text x="687" y="140" font-size="13" fill="#7f1d1d" text-anchor="middle">回到现金和复盘</text>

  <text x="400" y="358" font-size="15" fill="#64748b" text-anchor="middle">规则变了，表格也要更新；前提变了，工具必须降级或换挡</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
