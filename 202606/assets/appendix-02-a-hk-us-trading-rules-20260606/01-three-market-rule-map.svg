<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">A股港股美股规则地图</title>
  <desc id="desc">用五个闸门对照A股、港股、美股交易规则</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">三地市场不是同一套下单规则</text>
  <text x="400" y="64" text-anchor="middle" font-size="14" fill="#4b5563">先过规则闸门，再谈买入理由</text>

  <g transform="translate(38 92)">
    <rect width="210" height="250" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="210" height="42" rx="8" fill="#2563eb"/>
    <text x="105" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">A股</text>
    <text x="22" y="72" font-size="14" fill="#111827">时间: 日盘为主</text>
    <text x="22" y="103" font-size="14" fill="#111827">单位: 通常100股起买</text>
    <text x="22" y="134" font-size="14" fill="#111827">回转: 普通股票T+1</text>
    <text x="22" y="165" font-size="14" fill="#111827">涨跌: 多数有涨跌幅</text>
    <text x="22" y="196" font-size="14" fill="#111827">动作: 不用当天卖出纠错</text>
    <rect x="22" y="216" width="166" height="26" rx="4" fill="#dbeafe"/>
    <text x="105" y="234" text-anchor="middle" font-size="13" fill="#1d4ed8">先算一手和T+1</text>
  </g>

  <g transform="translate(285 92)">
    <rect width="230" height="250" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="230" height="42" rx="8" fill="#059669"/>
    <text x="115" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">港股</text>
    <text x="24" y="72" font-size="14" fill="#111827">时间: 分段交易</text>
    <text x="24" y="103" font-size="14" fill="#111827">单位: 每手股数不固定</text>
    <text x="24" y="134" font-size="14" fill="#111827">回转: 可T+0, 交收T+2</text>
    <text x="24" y="165" font-size="14" fill="#111827">涨跌: 无普遍日涨跌停</text>
    <text x="24" y="196" font-size="14" fill="#111827">动作: 先查整手和成本</text>
    <rect x="24" y="216" width="182" height="26" rx="4" fill="#d1fae5"/>
    <text x="115" y="234" text-anchor="middle" font-size="13" fill="#047857">T+0不等于低成本</text>
  </g>

  <g transform="translate(552 92)">
    <rect width="210" height="250" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="210" height="42" rx="8" fill="#7c3aed"/>
    <text x="105" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">美股</text>
    <text x="22" y="72" font-size="14" fill="#111827">时间: 美东时间为准</text>
    <text x="22" y="103" font-size="14" fill="#111827">单位: 通常可1股交易</text>
    <text x="22" y="134" font-size="14" fill="#111827">交收: 标准T+1</text>
    <text x="22" y="165" font-size="14" fill="#111827">涨跌: 无普遍日涨跌停</text>
    <text x="22" y="196" font-size="14" fill="#111827">动作: 看账户和时段</text>
    <rect x="22" y="216" width="166" height="26" rx="4" fill="#ede9fe"/>
    <text x="105" y="234" text-anchor="middle" font-size="13" fill="#6d28d9">权限不是能力</text>
  </g>

  <line x1="248" y1="217" x2="285" y2="217" stroke="#94a3b8" stroke-width="2"/>
  <line x1="515" y1="217" x2="552" y2="217" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="374" text-anchor="middle" font-size="13" fill="#64748b">同样买股票，先翻译规则：时间、单位、回转、价格保护、账户权限</text>
</svg>
