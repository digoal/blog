<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">交易规则论证链</title>
  <desc id="desc">从市场规则差异推导到下单前检查动作</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 规则先于买入理由</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g transform="translate(40 82)">
    <rect width="160" height="92" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="80" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
    <text x="80" y="54" text-anchor="middle" font-size="13" fill="#111827">交易时间不同</text>
    <text x="80" y="74" text-anchor="middle" font-size="13" fill="#111827">成交质量不同</text>
  </g>
  <g transform="translate(40 218)">
    <rect width="160" height="92" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text x="80" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提B</text>
    <text x="80" y="54" text-anchor="middle" font-size="13" fill="#111827">最小单位不同</text>
    <text x="80" y="74" text-anchor="middle" font-size="13" fill="#111827">仓位入口不同</text>
  </g>
  <g transform="translate(300 82)">
    <rect width="180" height="92" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="90" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">前提C</text>
    <text x="90" y="54" text-anchor="middle" font-size="13" fill="#111827">回转和交收不同</text>
    <text x="90" y="74" text-anchor="middle" font-size="13" fill="#111827">纠错速度不同</text>
  </g>
  <g transform="translate(300 218)">
    <rect width="180" height="92" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="90" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">前提D</text>
    <text x="90" y="54" text-anchor="middle" font-size="13" fill="#111827">账户权限不同</text>
    <text x="90" y="74" text-anchor="middle" font-size="13" fill="#111827">错误后果不同</text>
  </g>

  <g transform="translate(585 102)">
    <rect width="170" height="170" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="85" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">推导结论</text>
    <text x="85" y="66" text-anchor="middle" font-size="13" fill="#111827">因为规则改变</text>
    <text x="85" y="88" text-anchor="middle" font-size="13" fill="#111827">真实盈亏和退出路径</text>
    <text x="85" y="120" text-anchor="middle" font-size="13" fill="#111827">所以先做规则翻译</text>
    <text x="85" y="142" text-anchor="middle" font-size="13" fill="#111827">再决定是否下单</text>
  </g>

  <line x1="200" y1="128" x2="300" y2="128" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="264" x2="300" y2="264" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="128" x2="585" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="264" x2="585" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="190" y="342" width="420" height="32" rx="6" fill="#e2e8f0"/>
  <text x="400" y="363" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">正常操作: 时间合格 + 单位合格 + 交收合格 + 账户合格，才允许下单</text>
</svg>
