<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">交易规则情景分支</title>
  <desc id="desc">展示规则前提变化时的下单调整</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提一变，操作必须跟着变</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="308" y="72" width="184" height="58" rx="8" fill="#111827"/>
  <text x="400" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">准备下单</text>
  <text x="400" y="117" text-anchor="middle" font-size="12" fill="#e5e7eb">先看规则，不先看涨跌</text>

  <line x1="400" y1="130" x2="400" y2="166" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="285" y="166" width="230" height="48" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="400" y="196" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">四项是否都合格?</text>

  <line x1="285" y1="190" x2="96" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="214" x2="315" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="214" x2="515" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="515" y1="190" x2="704" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(44 248)">
    <rect width="172" height="96" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="86" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">A股当天想卖</text>
    <text x="86" y="50" text-anchor="middle" font-size="12" fill="#111827">普通股票T+1</text>
    <text x="86" y="70" text-anchor="middle" font-size="12" fill="#111827">新买仓不能当天卖</text>
    <text x="86" y="88" text-anchor="middle" font-size="12" fill="#1d4ed8">动作: 降低买入仓位</text>
  </g>

  <g transform="translate(246 260)">
    <rect width="172" height="96" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text x="86" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">港股一手太大</text>
    <text x="86" y="50" text-anchor="middle" font-size="12" fill="#111827">每手股数不固定</text>
    <text x="86" y="70" text-anchor="middle" font-size="12" fill="#111827">最小仓位已超标</text>
    <text x="86" y="88" text-anchor="middle" font-size="12" fill="#047857">动作: 换ETF或放弃</text>
  </g>

  <g transform="translate(448 260)">
    <rect width="172" height="96" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="86" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">美股盘前冲动</text>
    <text x="86" y="50" text-anchor="middle" font-size="12" fill="#111827">延长时段流动性薄</text>
    <text x="86" y="70" text-anchor="middle" font-size="12" fill="#111827">市价单成本不可控</text>
    <text x="86" y="88" text-anchor="middle" font-size="12" fill="#6d28d9">动作: 限价或等盘中</text>
  </g>

  <g transform="translate(650 248)">
    <rect width="172" height="96" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="86" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">账户规则不清</text>
    <text x="86" y="50" text-anchor="middle" font-size="12" fill="#111827">结算和保证金未知</text>
    <text x="86" y="70" text-anchor="middle" font-size="12" fill="#111827">错误会被权限放大</text>
    <text x="86" y="88" text-anchor="middle" font-size="12" fill="#c2410c">动作: 不实盘试错</text>
  </g>
</svg>
