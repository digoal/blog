<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">四类“买一篮子资产”的外壳差异</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" fill="#4b5563">先看交易入口，再看底层资产，最后看执行风险</text>

  <rect x="40" y="105" width="160" height="225" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">ETF</text>
  <line x1="65" y1="150" x2="175" y2="150" stroke="#bfdbfe" stroke-width="2"/>
  <text x="60" y="178" font-size="14" fill="#111827">交易地: A股场内</text>
  <text x="60" y="205" font-size="14" fill="#111827">底层: A股/债券/商品</text>
  <text x="60" y="232" font-size="14" fill="#111827">价格: 盘中成交价</text>
  <text x="60" y="259" font-size="14" fill="#111827">适合: 国内核心仓</text>
  <text x="60" y="286" font-size="14" fill="#b91c1c">重点: 流动性和折溢价</text>

  <rect x="230" y="105" width="160" height="225" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="310" y="135" text-anchor="middle" font-size="20" font-weight="700" fill="#047857">QDII</text>
  <line x1="255" y1="150" x2="365" y2="150" stroke="#bbf7d0" stroke-width="2"/>
  <text x="250" y="178" font-size="14" fill="#111827">交易地: 场外基金</text>
  <text x="250" y="205" font-size="14" fill="#111827">底层: 海外股票/债券</text>
  <text x="250" y="232" font-size="14" fill="#111827">价格: 净值确认</text>
  <text x="250" y="259" font-size="14" fill="#111827">适合: 长期海外配置</text>
  <text x="250" y="286" font-size="14" fill="#b91c1c">重点: 额度和净值时差</text>

  <rect x="420" y="105" width="160" height="225" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="135" text-anchor="middle" font-size="20" font-weight="700" fill="#b45309">跨境ETF</text>
  <line x1="445" y1="150" x2="555" y2="150" stroke="#fde68a" stroke-width="2"/>
  <text x="440" y="178" font-size="14" fill="#111827">交易地: A股场内</text>
  <text x="440" y="205" font-size="14" fill="#111827">底层: 境外指数</text>
  <text x="440" y="232" font-size="14" fill="#111827">价格: 盘中成交价</text>
  <text x="440" y="259" font-size="14" fill="#111827">适合: 便捷海外暴露</text>
  <text x="440" y="286" font-size="14" fill="#b91c1c">重点: 溢价和休市错位</text>

  <rect x="610" y="105" width="160" height="225" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="690" y="135" text-anchor="middle" font-size="20" font-weight="700" fill="#6d28d9">美股ETF</text>
  <line x1="635" y1="150" x2="745" y2="150" stroke="#ddd6fe" stroke-width="2"/>
  <text x="630" y="178" font-size="14" fill="#111827">交易地: 美国市场</text>
  <text x="630" y="205" font-size="14" fill="#111827">底层: 全球/美国资产</text>
  <text x="630" y="232" font-size="14" fill="#111827">价格: 美元实时成交</text>
  <text x="630" y="259" font-size="14" fill="#111827">适合: 规则熟悉者</text>
  <text x="630" y="286" font-size="14" fill="#b91c1c">重点: 汇率税务合规</text>

  <rect x="70" y="355" width="660" height="38" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="400" y="379" text-anchor="middle" font-size="15" fill="#312e81">同样叫“ETF”，真正决定风险的是：入口规则 + 底层资产 + 价格机制 + 退出条件</text>
</svg>
