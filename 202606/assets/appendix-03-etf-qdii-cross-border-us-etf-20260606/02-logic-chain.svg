<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">工具选择论证链</text>
  <text x="400" y="64" text-anchor="middle" font-size="14" fill="#4b5563">从“想买海外资产”推导到“该用哪种外壳”</text>

  <rect x="50" y="105" width="150" height="75" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="125" y="157" text-anchor="middle" font-size="13" fill="#111827">外壳决定交易规则</text>

  <rect x="235" y="105" width="150" height="75" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="310" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提B</text>
  <text x="310" y="157" text-anchor="middle" font-size="13" fill="#111827">底层决定风险来源</text>

  <rect x="420" y="105" width="150" height="75" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="495" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">前提C</text>
  <text x="495" y="157" text-anchor="middle" font-size="13" fill="#111827">跨市场有时差和额度</text>

  <rect x="605" y="105" width="150" height="75" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="680" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">前提D</text>
  <text x="680" y="157" text-anchor="middle" font-size="13" fill="#111827">执行风险会吞收益</text>

  <path d="M125 190 L125 225 L310 225" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M310 190 L310 225" fill="none" stroke="#6b7280" stroke-width="2"/>
  <path d="M495 190 L495 225" fill="none" stroke="#6b7280" stroke-width="2"/>
  <path d="M680 190 L680 225 L495 225" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="190" y="235" width="420" height="78" rx="10" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="400" y="263" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="288" text-anchor="middle" font-size="14" fill="#111827">因为四个外壳的入口、净值、额度、税务和流动性不同</text>
  <text x="400" y="308" text-anchor="middle" font-size="14" fill="#111827">所以不能只按“收益率排行”选择</text>

  <path d="M400 315 L400 345" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="105" y="350" width="590" height="80" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="400" y="379" text-anchor="middle" font-size="18" font-weight="700" fill="#0e7490">结论</text>
  <text x="400" y="405" text-anchor="middle" font-size="14" fill="#111827">先选入口，再选底层，最后检查溢价、价差、额度、汇率和退出条件</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
