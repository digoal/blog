<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">四类工具选择流程</text>
  <text x="400" y="64" text-anchor="middle" font-size="14" fill="#4b5563">每一步都先问“我能不能承受这个外壳的代价”</text>

  <rect x="285" y="90" width="230" height="54" rx="8" fill="#111827"/>
  <text x="400" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">想买一篮子资产</text>

  <path d="M400 144 L400 178" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="180" width="280" height="58" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">第一问: 资产主要在哪里?</text>
  <text x="400" y="225" text-anchor="middle" font-size="13" fill="#374151">境内 / 境外 / 美国市场</text>

  <path d="M260 210 L135 210 L135 270" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 238 L400 270" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 210 L665 210 L665 270" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="45" y="275" width="180" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="302" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">境内资产</text>
  <text x="135" y="327" text-anchor="middle" font-size="13" fill="#111827">优先看ETF</text>
  <text x="135" y="348" text-anchor="middle" font-size="13" fill="#b91c1c">检查成交额和折溢价</text>

  <rect x="310" y="275" width="180" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="302" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">境外资产</text>
  <text x="400" y="327" text-anchor="middle" font-size="13" fill="#111827">QDII或跨境ETF</text>
  <text x="400" y="348" text-anchor="middle" font-size="13" fill="#b91c1c">检查额度、溢价和时差</text>

  <rect x="575" y="275" width="180" height="86" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="665" y="302" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">美国账户</text>
  <text x="665" y="327" text-anchor="middle" font-size="13" fill="#111827">美股ETF</text>
  <text x="665" y="348" text-anchor="middle" font-size="13" fill="#b91c1c">检查美元、税务和合规</text>

  <path d="M135 362 L135 405 L400 405" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M400 362 L400 405" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M665 362 L665 405 L400 405" stroke="#6b7280" stroke-width="2" fill="none"/>
  <path d="M400 405 L400 426" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="165" y="430" width="470" height="48" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="459" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412">任何一项红灯: 高溢价、低成交、额度暂停、汇率税务不清，先不下单</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
