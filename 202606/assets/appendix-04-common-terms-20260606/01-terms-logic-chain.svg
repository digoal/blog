<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">常用术语论证链</title>
  <desc id="desc">展示术语从信息压缩到行动判断的因果路径。</desc>
  <rect width="800" height="400" fill="#f7f8fa"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:8}
      .head{font:700 20px Arial,sans-serif;fill:#111827}
      .text{font:15px Arial,sans-serif;fill:#374151}
      .small{font:13px Arial,sans-serif;fill:#4b5563}
      .accent{fill:#e8f3ff;stroke:#60a5fa}
      .warn{fill:#fff7ed;stroke:#fb923c}
      .ok{fill:#ecfdf5;stroke:#34d399}
      .line{stroke:#374151;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="40" y="42" class="head">术语不是答案, 是压缩后的风险标签</text>
  <rect x="40" y="74" width="165" height="96" class="box accent"/>
  <text x="62" y="105" class="head">前提A</text>
  <text x="62" y="132" class="text">术语压缩信息</text>
  <text x="62" y="154" class="small">PE、EPS、久期...</text>
  <rect x="235" y="74" width="165" height="96" class="box accent"/>
  <text x="257" y="105" class="head">前提B</text>
  <text x="257" y="132" class="text">每个词有前提</text>
  <text x="257" y="154" class="small">行业、期限、口径</text>
  <rect x="430" y="74" width="165" height="96" class="box warn"/>
  <text x="452" y="105" class="head">前提C</text>
  <text x="452" y="132" class="text">前提会变化</text>
  <text x="452" y="154" class="small">盈利、利率、溢价</text>
  <rect x="625" y="74" width="135" height="96" class="box warn"/>
  <text x="646" y="105" class="head">前提D</text>
  <text x="646" y="132" class="text">账户目标不同</text>
  <text x="646" y="154" class="small">短钱/长钱不同</text>
  <path class="line" d="M205 122 H235"/>
  <path class="line" d="M400 122 H430"/>
  <path class="line" d="M595 122 H625"/>
  <rect x="145" y="218" width="235" height="96" class="box"/>
  <text x="168" y="249" class="head">逻辑推导</text>
  <text x="168" y="276" class="text">因为术语会省略前提</text>
  <text x="168" y="299" class="text">所以先补齐公式和口径</text>
  <rect x="430" y="218" width="235" height="96" class="box ok"/>
  <text x="453" y="249" class="head">行动结论</text>
  <text x="453" y="276" class="text">先分类, 再查失效条件</text>
  <text x="453" y="299" class="text">最后才决定买、卖或不动</text>
  <path class="line" d="M318 170 C318 190 262 190 262 218"/>
  <path class="line" d="M512 170 C512 190 548 190 548 218"/>
  <path class="line" d="M380 266 H430"/>
  <text x="165" y="354" class="small">检验顺序: 公式 → 口径 → 适用前提 → 失效条件 → 账户动作</text>
</svg>
