<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">术语分类查找图</title>
  <desc id="desc">把常用投资术语按它回答的问题分组。</desc>
  <rect width="800" height="400" fill="#f7f8fa"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .center{fill:#111827}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:8}
      .blue{fill:#eff6ff;stroke:#60a5fa}
      .green{fill:#ecfdf5;stroke:#34d399}
      .orange{fill:#fff7ed;stroke:#fb923c}
      .purple{fill:#f5f3ff;stroke:#a78bfa}
      .title{font:700 19px Arial,sans-serif;fill:#111827}
      .text{font:15px Arial,sans-serif;fill:#334155}
      .small{font:13px Arial,sans-serif;fill:#475569}
      .line{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <circle cx="400" cy="198" r="72" class="center"/>
  <text x="400" y="188" text-anchor="middle" class="title" fill="#ffffff">看到术语</text>
  <text x="400" y="216" text-anchor="middle" class="text" fill="#e5e7eb">先问它管什么风险</text>
  <rect x="50" y="54" width="250" height="108" class="box blue"/>
  <text x="75" y="86" class="title">贵不贵</text>
  <text x="75" y="114" class="text">PE / PB / EPS / Guidance</text>
  <text x="75" y="139" class="small">动作: 先看盈利口径和预期差</text>
  <rect x="500" y="54" width="250" height="108" class="box green"/>
  <text x="525" y="86" class="title">债券怕不怕利率</text>
  <text x="525" y="114" class="text">久期</text>
  <text x="525" y="139" class="small">动作: 久期越长, 仓位越要小心</text>
  <rect x="50" y="250" width="250" height="108" class="box orange"/>
  <text x="75" y="282" class="title">买卖价有没有偏离净值</text>
  <text x="75" y="310" class="text">溢价率 / 折价率</text>
  <text x="75" y="335" class="small">动作: 高溢价暂停追买</text>
  <rect x="500" y="250" width="250" height="108" class="box purple"/>
  <text x="525" y="282" class="title">自己能不能扛住</text>
  <text x="525" y="310" class="text">回撤 / 波动率</text>
  <text x="525" y="335" class="small">动作: 用风险预算决定仓位</text>
  <path class="line" d="M345 162 C310 125 300 108 300 108"/>
  <path class="line" d="M455 162 C492 126 500 108 500 108"/>
  <path class="line" d="M345 236 C310 274 300 304 300 304"/>
  <path class="line" d="M455 236 C492 274 500 304 500 304"/>
</svg>
