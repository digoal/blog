<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">常用数据源的四层顺序</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#475569">先找原件，再看解释，最后才看观点</text>

  <rect x="90" y="104" width="620" height="58" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="139" font-size="18" font-weight="700" fill="#1e3a8a">第一层：原始披露</text>
  <text x="310" y="139" font-size="15" fill="#1f2937">交易所公告、基金公告、SEC、公司IR、指数公司文件</text>

  <rect x="120" y="182" width="560" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="155" y="217" font-size="18" font-weight="700" fill="#14532d">第二层：规则口径</text>
  <text x="340" y="217" font-size="15" fill="#1f2937">交易规则、指数编制、基金合同、统计制度、监管说明</text>

  <rect x="150" y="260" width="500" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="185" y="295" font-size="18" font-weight="700" fill="#78350f">第三层：整理工具</text>
  <text x="370" y="295" font-size="15" fill="#1f2937">券商软件、数据库、财经网站、筛选器、行情终端</text>

  <rect x="180" y="338" width="440" height="48" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="215" y="368" font-size="18" font-weight="700" fill="#7f1d1d">第四层：市场观点</text>
  <text x="400" y="368" font-size="15" fill="#1f2937">研报、媒体、社区、短视频、群聊</text>

  <path d="M400 162 L400 180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 240 L400 258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 318 L400 336" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
