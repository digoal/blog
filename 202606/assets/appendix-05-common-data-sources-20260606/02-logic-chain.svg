<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">数据核验论证链</text>

  <rect x="38" y="82" width="170" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="123" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">前提A</text>
  <text x="123" y="140" text-anchor="middle" font-size="14" fill="#1f2937">数据会被转述</text>
  <text x="123" y="160" text-anchor="middle" font-size="14" fill="#1f2937">也会被误读</text>

  <rect x="228" y="82" width="170" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="313" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提B</text>
  <text x="313" y="140" text-anchor="middle" font-size="14" fill="#1f2937">官方源最接近</text>
  <text x="313" y="160" text-anchor="middle" font-size="14" fill="#1f2937">事实原件</text>

  <rect x="418" y="82" width="170" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="503" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">前提C</text>
  <text x="503" y="140" text-anchor="middle" font-size="14" fill="#1f2937">不同市场</text>
  <text x="503" y="160" text-anchor="middle" font-size="14" fill="#1f2937">口径不同</text>

  <rect x="608" y="82" width="154" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">前提D</text>
  <text x="685" y="140" text-anchor="middle" font-size="14" fill="#1f2937">下单需要</text>
  <text x="685" y="160" text-anchor="middle" font-size="14" fill="#1f2937">可验证条件</text>

  <path d="M123 176 L123 228" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M313 176 L313 228" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M503 176 L503 228" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M685 176 L685 228" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="95" y="228" width="610" height="80" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="286" text-anchor="middle" font-size="15" fill="#1f2937">因为数据会被转述、口径会变化，所以不能用单一页面直接下单</text>

  <path d="M400 310 L400 348" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="348" width="560" height="54" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="381" text-anchor="middle" font-size="18" font-weight="700" fill="#064e3b">结论：原始披露 + 规则口径 + 行情数据 三者一致，才允许进入交易计划</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
