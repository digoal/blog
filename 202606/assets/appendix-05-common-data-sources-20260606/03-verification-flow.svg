<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">下单前的数据核验流程</text>

  <rect x="70" y="78" width="210" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">1. 找原件</text>
  <text x="175" y="130" text-anchor="middle" font-size="13" fill="#1f2937">公告、年报、合同、指数文件</text>

  <rect x="520" y="78" width="210" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="625" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">2. 查口径</text>
  <text x="625" y="130" text-anchor="middle" font-size="13" fill="#1f2937">时间、单位、币种、复权、样本</text>

  <path d="M280 110 L518 110" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="520" y="184" width="210" height="64" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="625" y="213" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">3. 对行情</text>
  <text x="625" y="236" text-anchor="middle" font-size="13" fill="#1f2937">价格、成交额、折溢价、价差</text>

  <path d="M625 142 L625 182" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="184" width="210" height="64" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="175" y="213" text-anchor="middle" font-size="17" font-weight="700" fill="#831843">4. 找冲突</text>
  <text x="175" y="236" text-anchor="middle" font-size="13" fill="#1f2937">两个来源不一致时先停手</text>

  <path d="M520 216 L282 216" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="400,290 520,350 400,410 280,350" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="342" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">三项一致?</text>
  <text x="400" y="366" text-anchor="middle" font-size="13" fill="#1f2937">事实、口径、行情</text>

  <path d="M175 248 L330 316" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="58" y="332" width="170" height="58" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="143" y="357" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">否：不下单</text>
  <text x="143" y="379" text-anchor="middle" font-size="13" fill="#1f2937">先复核或放弃</text>

  <rect x="572" y="332" width="170" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="357" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">是：进计划</text>
  <text x="657" y="379" text-anchor="middle" font-size="13" fill="#1f2937">再算仓位和买卖点</text>

  <path d="M280 350 L230 350" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M520 350 L570 350" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
