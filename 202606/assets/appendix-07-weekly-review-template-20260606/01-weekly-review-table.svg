<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="每周复盘表的四个区域">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">每周复盘模板：四个区域，不写流水账</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">先填事实，再找模式，最后只给下周一条动作规则</text>

  <g font-family="Arial, sans-serif">
    <rect x="44" y="98" width="330" height="118" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="64" y="128" font-size="18" font-weight="700" fill="#1e3a8a">1. 账户事实区</text>
    <text x="64" y="158" font-size="14" fill="#1e3a8a">本周收益、最大回撤、现金比例</text>
    <text x="64" y="184" font-size="14" fill="#1e3a8a">实际仓位 vs 目标仓位</text>
    <text x="64" y="204" font-size="13" fill="#334155">只填数字，不评价自己聪不聪明</text>

    <rect x="426" y="98" width="330" height="118" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="446" y="128" font-size="18" font-weight="700" fill="#166534">2. 交易样本区</text>
    <text x="446" y="158" font-size="14" fill="#166534">计划交易、冲动交易、加仓、减仓</text>
    <text x="446" y="184" font-size="14" fill="#166534">每笔对应买入理由和卖出条件</text>
    <text x="446" y="204" font-size="13" fill="#334155">按规则分类，不按盈亏分类</text>

    <rect x="44" y="248" width="330" height="118" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="64" y="278" font-size="18" font-weight="700" fill="#92400e">3. 偏差归因区</text>
    <text x="64" y="308" font-size="14" fill="#92400e">仓位超限、无计划下单、追涨杀跌</text>
    <text x="64" y="334" font-size="14" fill="#92400e">只找出现次数最多的一个问题</text>
    <text x="64" y="354" font-size="13" fill="#334155">错误越多，越要先抓主因</text>

    <rect x="426" y="248" width="330" height="118" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="446" y="278" font-size="18" font-weight="700" fill="#991b1b">4. 下周动作区</text>
    <text x="446" y="308" font-size="14" fill="#991b1b">保留什么、暂停什么、修正什么</text>
    <text x="446" y="334" font-size="14" fill="#991b1b">只写一条最关键的执行规则</text>
    <text x="446" y="354" font-size="13" fill="#334155">复盘必须改变下一周动作</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M374 157 H426"/>
    <path d="M591 216 V248"/>
    <path d="M426 307 H374"/>
    <path d="M209 248 V216"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
