<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="每周复盘模板论证链">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">每周复盘模板论证链</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">周复盘的目标不是预测下周，而是拦住重复错误</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111827">
    <rect x="34" y="96" width="150" height="82" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="109" y="126" text-anchor="middle" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="109" y="152" text-anchor="middle" fill="#1e3a8a">单笔盈亏有噪声</text>

    <rect x="218" y="96" width="150" height="82" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="293" y="126" text-anchor="middle" font-weight="700" fill="#166534">前提B</text>
    <text x="293" y="152" text-anchor="middle" fill="#166534">错误会成批重复</text>

    <rect x="402" y="96" width="150" height="82" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="477" y="126" text-anchor="middle" font-weight="700" fill="#92400e">前提C</text>
    <text x="477" y="152" text-anchor="middle" fill="#92400e">仓位每周会漂移</text>

    <rect x="586" y="96" width="150" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="661" y="126" text-anchor="middle" font-weight="700" fill="#991b1b">前提D</text>
    <text x="661" y="152" text-anchor="middle" fill="#991b1b">规则太多会失效</text>
  </g>

  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M109 178 V216 H252"/>
    <path d="M293 178 V216"/>
    <path d="M477 178 V216"/>
    <path d="M661 178 V216 H548"/>
  </g>

  <rect x="206" y="216" width="388" height="82" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">推导</text>
  <text x="400" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">事实过滤噪声，统计暴露模式，规则控制动作</text>

  <path d="M400 298 V332" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="126" y="332" width="548" height="48" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#047857">结论：每周只找一个主错因，只改一条下周规则</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
