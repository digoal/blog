<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="周末复盘执行流程">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">周末 30 分钟复盘流程</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">按顺序做，任何一步跳过都会把复盘变成感觉判断</text>

  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="50" y="112" width="126" height="74" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="113" y="141" text-anchor="middle" font-weight="700" fill="#1e3a8a">第1步</text>
    <text x="113" y="164" text-anchor="middle" fill="#1e3a8a">导出事实</text>

    <rect x="210" y="112" width="126" height="74" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="273" y="141" text-anchor="middle" font-weight="700" fill="#166534">第2步</text>
    <text x="273" y="164" text-anchor="middle" fill="#166534">分类交易</text>

    <rect x="370" y="112" width="126" height="74" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="433" y="141" text-anchor="middle" font-weight="700" fill="#92400e">第3步</text>
    <text x="433" y="164" text-anchor="middle" fill="#92400e">统计偏差</text>

    <rect x="530" y="112" width="126" height="74" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="593" y="141" text-anchor="middle" font-weight="700" fill="#991b1b">第4步</text>
    <text x="593" y="164" text-anchor="middle" fill="#991b1b">写下周规则</text>
  </g>

  <g stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M176 149 H210"/>
    <path d="M336 149 H370"/>
    <path d="M496 149 H530"/>
  </g>

  <rect x="132" y="250" width="504" height="74" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="384" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">输出物：一张表 + 一个错因 + 一条规则</text>
  <text x="384" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">例如：冲动买入出现3次；下周没有买入计划的品种一律不下单</text>

  <g stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M593 186 C593 228 515 238 460 250"/>
  </g>

  <rect x="76" y="344" width="650" height="34" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="401" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#047857">检查标准：这条规则能不能在下周开盘前直接执行</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
