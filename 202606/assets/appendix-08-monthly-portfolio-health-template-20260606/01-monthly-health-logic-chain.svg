<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">每月组合体检模板论证链</title>
  <desc id="desc">展示为什么月度组合体检要从账户事实推导到红黄绿动作。</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">每月组合体检模板：从事实到动作</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-size="14" fill="#111827">
    <rect x="42" y="86" width="166" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="125" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提 A</text>
    <text x="125" y="148" text-anchor="middle">账户会漂移</text>
    <text x="125" y="168" text-anchor="middle" fill="#475569">市值每天改比例</text>

    <rect x="232" y="86" width="166" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="315" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">前提 B</text>
    <text x="315" y="148" text-anchor="middle">情绪会放大</text>
    <text x="315" y="168" text-anchor="middle" fill="#475569">赚钱追，亏钱慌</text>

    <rect x="422" y="86" width="166" height="92" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="505" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">前提 C</text>
    <text x="505" y="148" text-anchor="middle">频繁交易有成本</text>
    <text x="505" y="168" text-anchor="middle" fill="#475569">错判和费用叠加</text>

    <rect x="612" y="86" width="146" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="685" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">前提 D</text>
    <text x="685" y="148" text-anchor="middle">阈值能拦截</text>
    <text x="685" y="168" text-anchor="middle" fill="#475569">只在越界时动</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M208 132 L226 132"/>
    <path d="M398 132 L416 132"/>
    <path d="M588 132 L606 132"/>
    <path d="M400 180 L400 225"/>
  </g>

  <rect x="94" y="230" width="612" height="80" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="288" text-anchor="middle" font-size="15" fill="#334155">因为账户会漂移、情绪会误导，所以每月先填数字，再按阈值决定记录、暂停或调整</text>

  <path d="M400 312 L400 350" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="160" y="354" width="480" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="389" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">结论：月度体检表不是预测工具，是防止仓位失控的刹车表</text>
</svg>
