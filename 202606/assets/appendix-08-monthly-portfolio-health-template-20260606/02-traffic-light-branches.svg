<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">月度组合体检红黄绿分支</title>
  <desc id="desc">展示月度组合体检后不同灯号对应的操作。</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">体检结果怎么处理</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="280" y="78" width="240" height="68" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">每月最后一个交易日</text>
  <text x="400" y="132" text-anchor="middle" font-size="14" fill="#475569">填收益、回撤、仓位、现金、同跌测试</text>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M400 146 L400 188"/>
    <path d="M400 188 L170 188 L170 220"/>
    <path d="M400 188 L400 220"/>
    <path d="M400 188 L630 188 L630 220"/>
  </g>

  <g font-size="15" fill="#111827">
    <rect x="62" y="224" width="216" height="112" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="170" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">绿灯</text>
    <text x="170" y="284" text-anchor="middle">偏离小于5个百分点</text>
    <text x="170" y="308" text-anchor="middle">回撤低于预算50%</text>
    <text x="170" y="330" text-anchor="middle" fill="#166534">动作：记录，不交易</text>

    <rect x="292" y="224" width="216" height="112" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="400" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#854d0e">黄灯</text>
    <text x="400" y="284" text-anchor="middle">偏离5到10个百分点</text>
    <text x="400" y="308" text-anchor="middle">回撤达到预算50%到80%</text>
    <text x="400" y="330" text-anchor="middle" fill="#854d0e">动作：暂停加风险</text>

    <rect x="522" y="224" width="216" height="112" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="630" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">红灯</text>
    <text x="630" y="284" text-anchor="middle">偏离超过10个百分点</text>
    <text x="630" y="308" text-anchor="middle">回撤达到预算80%以上</text>
    <text x="630" y="330" text-anchor="middle" fill="#991b1b">动作：降回上限</text>
  </g>

  <rect x="108" y="374" width="584" height="40" rx="7" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="399" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">规则：只因为数字越界而行动，不因为新闻、涨跌和群聊临时改仓</text>
</svg>
