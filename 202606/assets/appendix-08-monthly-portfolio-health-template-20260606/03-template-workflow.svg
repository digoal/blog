<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">每月组合体检模板填写流程</title>
  <desc id="desc">展示每月组合体检模板的填写顺序。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">每月体检只填六格</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-size="14" fill="#111827">
    <rect x="60" y="82" width="160" height="78" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="140" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">1 总资产</text>
    <text x="140" y="138" text-anchor="middle" fill="#475569">本月 vs 上月</text>

    <rect x="300" y="82" width="160" height="78" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="380" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">2 收益来源</text>
    <text x="380" y="138" text-anchor="middle" fill="#475569">谁赚谁亏</text>

    <rect x="540" y="82" width="160" height="78" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="620" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">3 回撤波动</text>
    <text x="620" y="138" text-anchor="middle" fill="#475569">是否接近预算</text>

    <rect x="60" y="238" width="160" height="78" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="140" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">4 仓位漂移</text>
    <text x="140" y="294" text-anchor="middle" fill="#475569">目标 vs 当前</text>

    <rect x="300" y="238" width="160" height="78" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="380" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">5 同跌测试</text>
    <text x="380" y="294" text-anchor="middle" fill="#475569">坏时会不会一起坏</text>

    <rect x="540" y="238" width="160" height="78" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="620" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">6 下月动作</text>
    <text x="620" y="294" text-anchor="middle" fill="#475569">加、减、停、不动</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M220 121 L294 121"/>
    <path d="M460 121 L534 121"/>
    <path d="M620 160 L620 198 L140 198 L140 232"/>
    <path d="M220 277 L294 277"/>
    <path d="M460 277 L534 277"/>
  </g>

  <rect x="115" y="360" width="570" height="44" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="387" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">填写顺序固定，结论才不会被当天行情带跑</text>
</svg>
