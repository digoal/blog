<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">高风险产品红线总闸门</title>
  <desc id="desc">用五道闸门筛掉不适合散户的高风险产品。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="32" y="28" width="736" height="344" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="62" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">高风险产品红线总闸门</text>
  <text x="400" y="92" text-anchor="middle" font-size="14" fill="#475569">先过闸门，再谈收益；任一红灯亮起，默认不下单</text>

  <g transform="translate(60,125)">
    <rect x="0" y="0" width="125" height="170" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <circle cx="62.5" cy="34" r="17" fill="#ef4444"/>
    <text x="62.5" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="62.5" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">合法性</text>
    <text x="62.5" y="104" text-anchor="middle" font-size="13" fill="#7f1d1d">无牌平台</text>
    <text x="62.5" y="126" text-anchor="middle" font-size="13" fill="#7f1d1d">场外配资</text>
    <text x="62.5" y="148" text-anchor="middle" font-size="13" fill="#7f1d1d">虚拟盘</text>
  </g>

  <g transform="translate(200,125)">
    <rect x="0" y="0" width="125" height="170" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <circle cx="62.5" cy="34" r="17" fill="#f97316"/>
    <text x="62.5" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="62.5" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">杠杆</text>
    <text x="62.5" y="104" text-anchor="middle" font-size="13" fill="#7c2d12">借钱交易</text>
    <text x="62.5" y="126" text-anchor="middle" font-size="13" fill="#7c2d12">保证金</text>
    <text x="62.5" y="148" text-anchor="middle" font-size="13" fill="#7c2d12">强平风险</text>
  </g>

  <g transform="translate(340,125)">
    <rect x="0" y="0" width="125" height="170" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
    <circle cx="62.5" cy="34" r="17" fill="#eab308"/>
    <text x="62.5" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="62.5" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#854d0e">亏损边界</text>
    <text x="62.5" y="104" text-anchor="middle" font-size="13" fill="#713f12">最大亏损</text>
    <text x="62.5" y="126" text-anchor="middle" font-size="13" fill="#713f12">说不清</text>
    <text x="62.5" y="148" text-anchor="middle" font-size="13" fill="#713f12">不下单</text>
  </g>

  <g transform="translate(480,125)">
    <rect x="0" y="0" width="125" height="170" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <circle cx="62.5" cy="34" r="17" fill="#22c55e"/>
    <text x="62.5" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="62.5" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">规则</text>
    <text x="62.5" y="104" text-anchor="middle" font-size="13" fill="#14532d">到期日</text>
    <text x="62.5" y="126" text-anchor="middle" font-size="13" fill="#14532d">每日重置</text>
    <text x="62.5" y="148" text-anchor="middle" font-size="13" fill="#14532d">交割移仓</text>
  </g>

  <g transform="translate(620,125)">
    <rect x="0" y="0" width="125" height="170" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="62.5" cy="34" r="17" fill="#0ea5e9"/>
    <text x="62.5" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">5</text>
    <text x="62.5" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">退出</text>
    <text x="62.5" y="104" text-anchor="middle" font-size="13" fill="#0c4a6e">成交稀少</text>
    <text x="62.5" y="126" text-anchor="middle" font-size="13" fill="#0c4a6e">点差很大</text>
    <text x="62.5" y="148" text-anchor="middle" font-size="13" fill="#0c4a6e">停牌退市</text>
  </g>

  <path d="M190 210 H198" stroke="#64748b" stroke-width="3"/>
  <path d="M330 210 H338" stroke="#64748b" stroke-width="3"/>
  <path d="M470 210 H478" stroke="#64748b" stroke-width="3"/>
  <path d="M610 210 H618" stroke="#64748b" stroke-width="3"/>
  <rect x="170" y="320" width="460" height="34" rx="8" fill="#0f172a"/>
  <text x="400" y="342" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">红线不是看空市场，是保护账户不被一次错误带走</text>
</svg>
