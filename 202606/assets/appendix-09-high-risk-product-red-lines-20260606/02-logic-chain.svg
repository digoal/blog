<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">高风险产品红线论证链</title>
  <desc id="desc">展示从产品结构、散户约束、平台规则到红线结论的推导路径。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">论证链：先排除会放大错误的产品</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g>
    <rect x="50" y="84" width="155" height="94" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="127.5" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">前提A</text>
    <text x="127.5" y="139" text-anchor="middle" font-size="13" fill="#7f1d1d">高风险产品</text>
    <text x="127.5" y="160" text-anchor="middle" font-size="13" fill="#7f1d1d">自带放大器</text>
  </g>
  <g>
    <rect x="50" y="218" width="155" height="94" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <text x="127.5" y="247" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">前提B</text>
    <text x="127.5" y="273" text-anchor="middle" font-size="13" fill="#7c2d12">散户资金和风控</text>
    <text x="127.5" y="294" text-anchor="middle" font-size="13" fill="#7c2d12">承压能力有限</text>
  </g>

  <g>
    <rect x="322" y="78" width="160" height="104" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="402" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">推导1</text>
    <text x="402" y="135" text-anchor="middle" font-size="13" fill="#0c4a6e">看错方向不可怕</text>
    <text x="402" y="156" text-anchor="middle" font-size="13" fill="#0c4a6e">可怕是错误被放大</text>
  </g>
  <g>
    <rect x="322" y="216" width="160" height="104" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
    <text x="402" y="246" text-anchor="middle" font-size="16" font-weight="700" fill="#854d0e">推导2</text>
    <text x="402" y="273" text-anchor="middle" font-size="13" fill="#713f12">规则不清</text>
    <text x="402" y="294" text-anchor="middle" font-size="13" fill="#713f12">亏损边界不清</text>
  </g>

  <g>
    <rect x="600" y="148" width="150" height="116" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="675" y="181" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">结论</text>
    <text x="675" y="210" text-anchor="middle" font-size="13" fill="#14532d">红线清单</text>
    <text x="675" y="231" text-anchor="middle" font-size="13" fill="#14532d">放在收益判断之前</text>
  </g>

  <line x1="205" y1="131" x2="312" y2="131" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="205" y1="265" x2="312" y2="265" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="482" y1="130" x2="590" y2="186" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="482" y1="268" x2="590" y2="226" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="88" y="350" width="624" height="48" rx="8" fill="#0f172a"/>
  <text x="400" y="379" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">操作原则：合法、懂规则、亏损可封顶、仓位可承受，四项缺一不可</text>
</svg>
