<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" role="img" aria-labelledby="title desc">
  <title id="title">下单前红线决策树</title>
  <desc id="desc">散户在购买高风险产品前使用的红线决策流程。</desc>
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">下单前红线决策树</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="310" y="70" width="180" height="54" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">准备买入某产品</text>

  <rect x="285" y="155" width="230" height="54" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="187" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">平台和账户是否合规？</text>
  <line x1="400" y1="124" x2="400" y2="151" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="70" y="155" width="150" height="54" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="145" y="187" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">否：停止</text>
  <line x1="285" y1="182" x2="226" y2="182" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="285" y="242" width="230" height="54" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="274" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">最大亏损能写成数字？</text>
  <line x1="400" y1="209" x2="400" y2="238" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="70" y="242" width="150" height="54" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="145" y="274" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">否：停止</text>
  <line x1="285" y1="269" x2="226" y2="269" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="285" y="329" width="230" height="54" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="361" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">会被强平或追加保证金？</text>
  <line x1="400" y1="296" x2="400" y2="325" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="580" y="242" width="150" height="54" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="655" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">是：只学习</text>
  <text x="655" y="286" text-anchor="middle" font-size="13" fill="#7c2d12">模拟或极小仓</text>
  <line x1="515" y1="269" x2="574" y2="269" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="580" y="329" width="150" height="54" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="655" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">否：看仓位</text>
  <text x="655" y="373" text-anchor="middle" font-size="13" fill="#14532d">小比例试错</text>
  <line x1="515" y1="356" x2="574" y2="356" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="250" y="404" width="300" height="34" rx="8" fill="#0f172a"/>
  <text x="400" y="426" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">任何一步说不清：不解释，不侥幸，不下单</text>
</svg>
