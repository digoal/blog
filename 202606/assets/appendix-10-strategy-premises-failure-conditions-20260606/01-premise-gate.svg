<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="策略前提门槛图">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">策略不是按钮，而是一道前提门</text>
  <text x="400" y="72" text-anchor="middle" font-size="15" fill="#475569">前提合格，策略才进入执行；前提失效，动作必须切换</text>

  <rect x="48" y="126" width="170" height="98" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="133" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">资金前提</text>
  <text x="133" y="186" text-anchor="middle" font-size="14" fill="#1e3a8a">期限够不够长</text>
  <text x="133" y="207" text-anchor="middle" font-size="14" fill="#1e3a8a">亏损能不能承受</text>

  <rect x="248" y="126" width="170" height="98" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="333" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">品种前提</text>
  <text x="333" y="186" text-anchor="middle" font-size="14" fill="#166534">风险来源清不清楚</text>
  <text x="333" y="207" text-anchor="middle" font-size="14" fill="#166534">流动性是否合格</text>

  <rect x="448" y="126" width="170" height="98" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="533" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">环境前提</text>
  <text x="533" y="186" text-anchor="middle" font-size="14" fill="#92400e">估值 利率 情绪</text>
  <text x="533" y="207" text-anchor="middle" font-size="14" fill="#92400e">是否支持该策略</text>

  <rect x="648" y="126" width="104" height="98" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="700" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">红线</text>
  <text x="700" y="186" text-anchor="middle" font-size="14" fill="#991b1b">杠杆</text>
  <text x="700" y="207" text-anchor="middle" font-size="14" fill="#991b1b">借钱 满仓</text>

  <path d="M218 175 H248" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M418 175 H448" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M618 175 H648" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M400 238 V285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="250" y="292" width="300" height="60" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="318" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">执行动作</text>
  <text x="400" y="342" text-anchor="middle" font-size="14" fill="#334155">买入 / 持有 / 降仓 / 暂停 / 退出</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
