<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="策略前提论证链">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链：先验前提决定策略动作</text>

  <rect x="42" y="84" width="156" height="104" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="120" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">前提A</text>
  <text x="120" y="145" text-anchor="middle" font-size="14" fill="#0c4a6e">每个策略</text>
  <text x="120" y="166" text-anchor="middle" font-size="14" fill="#0c4a6e">只赚特定风险的钱</text>

  <rect x="232" y="84" width="156" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="310" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">前提B</text>
  <text x="310" y="145" text-anchor="middle" font-size="14" fill="#166534">风险补偿</text>
  <text x="310" y="166" text-anchor="middle" font-size="14" fill="#166534">有环境边界</text>

  <rect x="422" y="84" width="156" height="104" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">前提C</text>
  <text x="500" y="145" text-anchor="middle" font-size="14" fill="#92400e">估值 利率</text>
  <text x="500" y="166" text-anchor="middle" font-size="14" fill="#92400e">流动性会变化</text>

  <rect x="612" y="84" width="146" height="104" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">前提D</text>
  <text x="685" y="145" text-anchor="middle" font-size="14" fill="#991b1b">人会把旧收益</text>
  <text x="685" y="166" text-anchor="middle" font-size="14" fill="#991b1b">误当永久规律</text>

  <path d="M198 136 H232" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M388 136 H422" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M578 136 H612" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M400 205 V248" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="102" y="255" width="596" height="72" rx="9" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="284" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="309" text-anchor="middle" font-size="15" fill="#334155">因为策略有边界，且边界会变化，所以买入前要写适用前提，持有中要查失效条件</text>

  <path d="M400 327 V354" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="182" y="360" width="436" height="42" rx="8" fill="#0f172a"/>
  <text x="400" y="386" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">结论：前提合格才执行，前提失效先降风险</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
