<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="策略失效切换图">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化后的动作切换</text>
  <text x="400" y="66" text-anchor="middle" font-size="15" fill="#475569">不要问“还能不能涨”，先问“原来的前提还剩几个”</text>

  <rect x="288" y="96" width="224" height="60" rx="9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">策略体检</text>
  <text x="400" y="144" text-anchor="middle" font-size="14" fill="#334155">资金 品种 环境 红线</text>

  <path d="M400 156 V194" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <circle cx="400" cy="220" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="214" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">几个前提</text>
  <text x="400" y="235" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">失效?</text>

  <path d="M365 232 C285 260 230 280 168 320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 256 V310" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M435 232 C515 260 570 280 632 320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="52" y="318" width="210" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="157" y="345" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">0个失效</text>
  <text x="157" y="370" text-anchor="middle" font-size="14" fill="#166534">继续按计划执行</text>
  <text x="157" y="390" text-anchor="middle" font-size="14" fill="#166534">只做常规复盘</text>

  <rect x="295" y="318" width="210" height="78" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">1个失效</text>
  <text x="400" y="370" text-anchor="middle" font-size="14" fill="#92400e">暂停加仓 降低速度</text>
  <text x="400" y="390" text-anchor="middle" font-size="14" fill="#92400e">等下一次确认</text>

  <rect x="538" y="318" width="210" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="643" y="345" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">2个及以上失效</text>
  <text x="643" y="370" text-anchor="middle" font-size="14" fill="#991b1b">降仓或退出</text>
  <text x="643" y="390" text-anchor="middle" font-size="14" fill="#991b1b">重新写买入理由</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
