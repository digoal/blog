<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560">
  <rect width="960" height="560" fill="#f8fafc"/>
  <text x="480" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#111827">基率边界: 检测很准，也可能误判很多</text>
  <rect x="80" y="95" width="800" height="360" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="150" y="135" font-size="18" font-weight="700" fill="#0f172a">假设: 1000 人中，真实有病 10 人，没病 990 人</text>
  <rect x="145" y="175" width="90" height="210" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="190" y="415" text-anchor="middle" font-size="17" fill="#0f172a">真实有病</text>
  <text x="190" y="445" text-anchor="middle" font-size="16" fill="#64748b">10 人</text>
  <rect x="360" y="205" width="70" height="175" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="395" y="405" text-anchor="middle" font-size="16" fill="#0f172a">真阳性</text>
  <text x="395" y="430" text-anchor="middle" font-size="15" fill="#64748b">约 9 人</text>
  <rect x="530" y="140" width="300" height="240" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="680" y="405" text-anchor="middle" font-size="16" fill="#0f172a">假阳性</text>
  <text x="680" y="430" text-anchor="middle" font-size="15" fill="#64748b">即使误报率低，也可能人数很多</text>
  <line x1="235" y1="240" x2="350" y2="270" stroke="#334155" stroke-width="3" marker-end="url(#arrow2)"/>
  <line x1="235" y1="330" x2="520" y2="260" stroke="#334155" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="480" y="505" text-anchor="middle" font-size="18" fill="#334155">贝叶斯提醒你：不能只看“检测准确率”，还要看事情本来有多常见。</text>
</svg>
