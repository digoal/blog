<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#fbfaf7"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="480" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#111827">贝叶斯更新: 旧判断遇到新证据</text>
  <rect x="70" y="115" width="190" height="115" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">先验概率</text>
  <text x="165" y="188" text-anchor="middle" font-size="17" fill="#334155">P(H)</text>
  <text x="165" y="213" text-anchor="middle" font-size="15" fill="#475569">证据出现前的判断</text>
  <rect x="355" y="115" width="250" height="115" rx="12" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="480" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">证据解释力</text>
  <text x="480" y="182" text-anchor="middle" font-size="17" fill="#334155">P(E|H) 与 P(E|not H)</text>
  <text x="480" y="208" text-anchor="middle" font-size="15" fill="#475569">如果假设真或假，证据有多常见</text>
  <rect x="705" y="115" width="190" height="115" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="800" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">后验概率</text>
  <text x="800" y="188" text-anchor="middle" font-size="17" fill="#334155">P(H|E)</text>
  <text x="800" y="213" text-anchor="middle" font-size="15" fill="#475569">证据出现后的判断</text>
  <line x1="260" y1="172" x2="350" y2="172" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="605" y1="172" x2="700" y2="172" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="170" y="315" width="620" height="86" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="350" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">核心公式</text>
  <text x="480" y="382" text-anchor="middle" font-size="24" fill="#0f172a">P(H|E) = P(E|H) × P(H) / P(E)</text>
  <text x="480" y="444" text-anchor="middle" font-size="17" fill="#475569">理性更新不是“相信证据”，而是比较：这个证据在不同假设下分别有多容易出现。</text>
</svg>
