<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="中心极限定理适用边界示意图">
  <rect width="960" height="560" fill="#fbfaf6"/>
  <text x="480" y="44" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">中心极限定理不是万能正态化按钮</text>
  <text x="480" y="76" text-anchor="middle" font-size="16" fill="#52606d">它依赖一组条件；条件破坏时，正态近似会误导决策</text>

  <g transform="translate(70,120)">
    <rect x="0" y="0" width="380" height="340" rx="18" fill="#e6f4ea" stroke="#2da44e" stroke-width="2"/>
    <text x="190" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a7f37">可以谨慎使用</text>
    <circle cx="65" cy="92" r="10" fill="#2da44e"/>
    <text x="90" y="98" font-size="17" fill="#1f2933">样本近似独立</text>
    <circle cx="65" cy="142" r="10" fill="#2da44e"/>
    <text x="90" y="148" font-size="17" fill="#1f2933">同分布，或差异不极端</text>
    <circle cx="65" cy="192" r="10" fill="#2da44e"/>
    <text x="90" y="198" font-size="17" fill="#1f2933">方差有限，极端值不主宰总和</text>
    <circle cx="65" cy="242" r="10" fill="#2da44e"/>
    <text x="90" y="248" font-size="17" fill="#1f2933">样本量足够大</text>
    <circle cx="65" cy="292" r="10" fill="#2da44e"/>
    <text x="90" y="298" font-size="17" fill="#1f2933">目标是均值、总和或比例的近似</text>
  </g>

  <g transform="translate(510,120)">
    <rect x="0" y="0" width="380" height="340" rx="18" fill="#fff1f0" stroke="#cf222e" stroke-width="2"/>
    <text x="190" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#cf222e">容易误用</text>
    <circle cx="65" cy="92" r="10" fill="#cf222e"/>
    <text x="90" y="98" font-size="17" fill="#1f2933">样本互相影响，如社交传播或挤兑</text>
    <circle cx="65" cy="142" r="10" fill="#cf222e"/>
    <text x="90" y="148" font-size="17" fill="#1f2933">分布随时间变，如政策或市场结构突变</text>
    <circle cx="65" cy="192" r="10" fill="#cf222e"/>
    <text x="90" y="198" font-size="17" fill="#1f2933">厚尾风险，少数极端值决定结果</text>
    <circle cx="65" cy="242" r="10" fill="#cf222e"/>
    <text x="90" y="248" font-size="17" fill="#1f2933">样本量小，却给出精确置信结论</text>
    <circle cx="65" cy="292" r="10" fill="#cf222e"/>
    <text x="90" y="298" font-size="17" fill="#1f2933">把个体分布误说成一定正态</text>
  </g>

  <g transform="translate(160,495)">
    <rect x="0" y="0" width="640" height="36" rx="9" fill="#ffffff" stroke="#d0d7de"/>
    <text x="320" y="24" text-anchor="middle" font-size="16" fill="#1f2933">决策前先问：独立吗？同分布吗？方差有限吗？样本量够吗？我估的是平均值吗？</text>
  </g>
</svg>
