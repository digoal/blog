<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-label="中心极限定理的收敛机制示意图">
  <rect width="960" height="520" fill="#fbfaf6"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <text x="480" y="44" text-anchor="middle" font-size="28" font-weight="700" fill="#1f2933">很多小影响相加，平均值会变得可预测</text>
  <text x="480" y="76" text-anchor="middle" font-size="16" fill="#52606d">不要求原始变量本身是正态分布；要求独立、同分布或足够接近，且方差有限</text>

  <g transform="translate(55,125)">
    <rect x="0" y="0" width="230" height="260" rx="14" fill="#fff" stroke="#d0d7de"/>
    <text x="115" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">原始个体分布</text>
    <text x="115" y="58" text-anchor="middle" font-size="14" fill="#52606d">可以很偏、很怪、不对称</text>
    <line x1="35" y1="220" x2="205" y2="220" stroke="#9aa6b2"/>
    <line x1="35" y1="220" x2="35" y2="95" stroke="#9aa6b2"/>
    <path d="M40,218 L55,205 L70,190 L85,160 L100,130 L115,120 L130,148 L145,175 L160,195 L175,208 L200,216" fill="none" stroke="#d9480f" stroke-width="4"/>
    <circle cx="105" cy="132" r="5" fill="#d9480f"/>
    <text x="115" y="248" text-anchor="middle" font-size="13" fill="#52606d">例：单次消费、单个误差、一次抽样</text>
  </g>

  <line x1="310" y1="255" x2="420" y2="255" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="365" y="235" text-anchor="middle" font-size="15" fill="#333">抽很多个</text>
  <text x="365" y="278" text-anchor="middle" font-size="15" fill="#333">求和或求平均</text>

  <g transform="translate(420,125)">
    <rect x="0" y="0" width="250" height="260" rx="14" fill="#fff" stroke="#d0d7de"/>
    <text x="125" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">样本平均值分布</text>
    <text x="125" y="58" text-anchor="middle" font-size="14" fill="#52606d">样本量越大，波动越小</text>
    <line x1="35" y1="220" x2="215" y2="220" stroke="#9aa6b2"/>
    <line x1="35" y1="220" x2="35" y2="95" stroke="#9aa6b2"/>
    <path d="M45,218 C75,215 84,180 103,145 C116,120 134,120 147,145 C166,180 175,215 205,218" fill="rgba(47,128,237,0.18)" stroke="#2f80ed" stroke-width="4"/>
    <line x1="125" y1="92" x2="125" y2="224" stroke="#2f80ed" stroke-dasharray="6 5"/>
    <text x="125" y="248" text-anchor="middle" font-size="13" fill="#52606d">中心靠近真实均值，宽度约为标准误</text>
  </g>

  <line x1="700" y1="255" x2="805" y2="255" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="752" y="235" text-anchor="middle" font-size="15" fill="#333">标准化</text>

  <g transform="translate(760,125)">
    <rect x="0" y="0" width="185" height="260" rx="14" fill="#fff" stroke="#d0d7de"/>
    <text x="92" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">近似正态</text>
    <text x="92" y="58" text-anchor="middle" font-size="14" fill="#52606d">可估置信区间</text>
    <line x1="25" y1="220" x2="160" y2="220" stroke="#9aa6b2"/>
    <path d="M28,218 C55,216 61,160 82,115 C90,98 104,98 112,115 C133,160 139,216 158,218" fill="#e6f4ea" stroke="#1a7f37" stroke-width="4"/>
    <text x="92" y="248" text-anchor="middle" font-size="13" fill="#52606d">预测总体均值的不确定性</text>
  </g>

  <g transform="translate(85,435)">
    <rect x="0" y="0" width="790" height="48" rx="10" fill="#fff8e6" stroke="#f0c36d"/>
    <text x="395" y="30" text-anchor="middle" font-size="17" fill="#5f3b00">关键不是“世界都服从正态分布”，而是“许多独立小因素的平均值常能用正态近似”。</text>
  </g>
</svg>
