<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img">
  <title>实物黄金的逻辑链</title>
  <desc>从实物黄金的资产属性推导到保管成本、买卖价差和流动性边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect width="980" height="520" fill="#f7f4ed"/>
  <text x="490" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#243b3d">实物黄金: 买的是金属本体, 也买进了保管和交易摩擦</text>
  <g font-size="20" fill="#243b3d">
    <rect x="55" y="110" width="190" height="100" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <text x="150" y="148" text-anchor="middle" font-weight="700">前提A</text>
    <text x="150" y="180" text-anchor="middle">黄金不生息</text>
    <text x="150" y="204" text-anchor="middle">收益来自价格重估</text>

    <rect x="300" y="110" width="190" height="100" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <text x="395" y="148" text-anchor="middle" font-weight="700">前提B</text>
    <text x="395" y="180" text-anchor="middle">实物需要保管</text>
    <text x="395" y="204" text-anchor="middle">防盗、防损、验真</text>

    <rect x="545" y="110" width="190" height="100" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <text x="640" y="148" text-anchor="middle" font-weight="700">前提C</text>
    <text x="640" y="180" text-anchor="middle">零售买卖有价差</text>
    <text x="640" y="204" text-anchor="middle">工费、渠道、检测</text>

    <rect x="790" y="110" width="135" height="100" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <text x="857" y="148" text-anchor="middle" font-weight="700">前提D</text>
    <text x="857" y="180" text-anchor="middle">变现需渠道</text>
    <text x="857" y="204" text-anchor="middle">不是一键卖出</text>
  </g>
  <g stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)">
    <line x1="245" y1="160" x2="292" y2="160"/>
    <line x1="490" y1="160" x2="537" y2="160"/>
    <line x1="735" y1="160" x2="782" y2="160"/>
    <line x1="858" y1="215" x2="858" y2="270"/>
  </g>
  <rect x="165" y="285" width="650" height="110" rx="10" fill="#e9f0ef" stroke="#2f5d62" stroke-width="2"/>
  <text x="490" y="326" text-anchor="middle" font-size="24" font-weight="700" fill="#243b3d">结论</text>
  <text x="490" y="362" text-anchor="middle" font-size="22" fill="#243b3d">实物黄金适合少量、长期、防守性持有</text>
  <text x="490" y="392" text-anchor="middle" font-size="22" fill="#243b3d">不适合短线交易、频繁换手、重仓押注</text>
  <g font-size="18" fill="#6b4f1d">
    <rect x="220" y="430" width="540" height="54" rx="8" fill="#fff7d6" stroke="#c18f21" stroke-width="2"/>
    <text x="490" y="464" text-anchor="middle">小白判断: 先算价差和保管, 再谈涨跌想象</text>
  </g>
</svg>
