<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>实物黄金是否适合你的决策树</title>
  <desc>根据持有目的、期限、保管能力和变现需求判断是否选择实物黄金。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34515e"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#f7f4ed"/>
  <text x="490" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#263238">先问目的, 再选工具</text>
  <rect x="350" y="85" width="280" height="70" rx="8" fill="#ffffff" stroke="#34515e" stroke-width="2"/>
  <text x="490" y="128" text-anchor="middle" font-size="22" font-weight="700" fill="#263238">你为什么买黄金?</text>
  <g stroke="#34515e" stroke-width="3" marker-end="url(#arrow)">
    <line x1="490" y1="155" x2="230" y2="210"/>
    <line x1="490" y1="155" x2="490" y2="210"/>
    <line x1="490" y1="155" x2="750" y2="210"/>
  </g>
  <g font-size="19" fill="#263238">
    <rect x="75" y="215" width="310" height="88" rx="8" fill="#e9f0ef" stroke="#34515e" stroke-width="2"/>
    <text x="230" y="248" text-anchor="middle" font-weight="700">长期防守 + 少量纪念</text>
    <text x="230" y="276" text-anchor="middle">能承担保管和价差</text>

    <rect x="415" y="215" width="150" height="88" rx="8" fill="#fff7d6" stroke="#c18f21" stroke-width="2"/>
    <text x="490" y="248" text-anchor="middle" font-weight="700">资产配置</text>
    <text x="490" y="276" text-anchor="middle">想要低摩擦</text>

    <rect x="595" y="215" width="310" height="88" rx="8" fill="#f7e3df" stroke="#b55b4b" stroke-width="2"/>
    <text x="750" y="248" text-anchor="middle" font-weight="700">短线赚钱 + 快速变现</text>
    <text x="750" y="276" text-anchor="middle">频繁买卖或资金急用</text>
  </g>
  <g stroke="#34515e" stroke-width="3" marker-end="url(#arrow)">
    <line x1="230" y1="303" x2="230" y2="360"/>
    <line x1="490" y1="303" x2="490" y2="360"/>
    <line x1="750" y1="303" x2="750" y2="360"/>
  </g>
  <g font-size="19" fill="#263238">
    <rect x="75" y="365" width="310" height="110" rx="8" fill="#ffffff" stroke="#34515e" stroke-width="2"/>
    <text x="230" y="400" text-anchor="middle" font-weight="700">可以考虑实物金条</text>
    <text x="230" y="430" text-anchor="middle">优先正规渠道、可回购</text>
    <text x="230" y="458" text-anchor="middle">仓位小, 记录发票凭证</text>

    <rect x="415" y="365" width="150" height="110" rx="8" fill="#ffffff" stroke="#c18f21" stroke-width="2"/>
    <text x="490" y="400" text-anchor="middle" font-weight="700">优先研究</text>
    <text x="490" y="430" text-anchor="middle">黄金ETF</text>
    <text x="490" y="458" text-anchor="middle">或黄金基金</text>

    <rect x="595" y="365" width="310" height="110" rx="8" fill="#ffffff" stroke="#b55b4b" stroke-width="2"/>
    <text x="750" y="400" text-anchor="middle" font-weight="700">不适合作为默认选择</text>
    <text x="750" y="430" text-anchor="middle">价差吞噬短线利润</text>
    <text x="750" y="458" text-anchor="middle">变现速度不可假设</text>
  </g>
  <text x="490" y="525" text-anchor="middle" font-size="20" fill="#6b4f1d">前提变化: 如果你不能安全保管或需要随时卖出, 结论自动转向低摩擦工具</text>
</svg>
