<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img">
  <title>实物黄金风险边界</title>
  <desc>用四个区域说明什么时候可以持有、减少、避免或重新评估实物黄金。</desc>
  <rect width="980" height="520" fill="#f7f4ed"/>
  <text x="490" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#263238">实物黄金的风险边界</text>
  <line x1="490" y1="105" x2="490" y2="445" stroke="#7f8c8d" stroke-width="3"/>
  <line x1="125" y1="275" x2="855" y2="275" stroke="#7f8c8d" stroke-width="3"/>
  <text x="490" y="92" text-anchor="middle" font-size="18" fill="#263238">保管能力高</text>
  <text x="490" y="477" text-anchor="middle" font-size="18" fill="#263238">保管能力低</text>
  <text x="95" y="282" text-anchor="middle" font-size="18" fill="#263238">变现需求低</text>
  <text x="885" y="282" text-anchor="middle" font-size="18" fill="#263238">变现需求高</text>
  <g font-size="20" fill="#263238">
    <rect x="155" y="125" width="285" height="115" rx="8" fill="#e9f0ef" stroke="#2f5d62" stroke-width="2"/>
    <text x="298" y="162" text-anchor="middle" font-weight="700">可少量长期持有</text>
    <text x="298" y="195" text-anchor="middle">正规金条 + 凭证完整</text>
    <text x="298" y="222" text-anchor="middle">适合防守仓的一部分</text>

    <rect x="540" y="125" width="285" height="115" rx="8" fill="#fff7d6" stroke="#c18f21" stroke-width="2"/>
    <text x="683" y="162" text-anchor="middle" font-weight="700">谨慎: 先确认回购</text>
    <text x="683" y="195" text-anchor="middle">报价、网点、检测流程</text>
    <text x="683" y="222" text-anchor="middle">不要假设当天成交</text>

    <rect x="155" y="310" width="285" height="115" rx="8" fill="#fff7d6" stroke="#c18f21" stroke-width="2"/>
    <text x="298" y="347" text-anchor="middle" font-weight="700">减少实物比例</text>
    <text x="298" y="380" text-anchor="middle">保管不稳定会抬高成本</text>
    <text x="298" y="407" text-anchor="middle">考虑银行托管或非实物</text>

    <rect x="540" y="310" width="285" height="115" rx="8" fill="#f7e3df" stroke="#b55b4b" stroke-width="2"/>
    <text x="683" y="347" text-anchor="middle" font-weight="700">避免作为主工具</text>
    <text x="683" y="380" text-anchor="middle">保管弱 + 急需钱</text>
    <text x="683" y="407" text-anchor="middle">价差和折价最容易伤人</text>
  </g>
</svg>
