<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img">
  <title>实物黄金买入前清单</title>
  <desc>列出购买实物黄金前必须确认的五个问题。</desc>
  <rect width="980" height="560" fill="#f7f4ed"/>
  <text x="490" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#263238">买实物黄金前, 先过五道门</text>
  <g font-size="20" fill="#263238">
    <rect x="115" y="95" width="750" height="70" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <circle cx="155" cy="130" r="17" fill="#2f5d62"/>
    <text x="155" y="137" text-anchor="middle" fill="#ffffff" font-weight="700">1</text>
    <text x="195" y="124" font-weight="700">买什么?</text>
    <text x="330" y="124">投资金条优先于高工艺首饰, 纪念需求另算</text>

    <rect x="115" y="180" width="750" height="70" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <circle cx="155" cy="215" r="17" fill="#2f5d62"/>
    <text x="155" y="222" text-anchor="middle" fill="#ffffff" font-weight="700">2</text>
    <text x="195" y="209" font-weight="700">哪里买?</text>
    <text x="330" y="209">正规渠道、成色清楚、发票和证书可留存</text>

    <rect x="115" y="265" width="750" height="70" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <circle cx="155" cy="300" r="17" fill="#2f5d62"/>
    <text x="155" y="307" text-anchor="middle" fill="#ffffff" font-weight="700">3</text>
    <text x="195" y="294" font-weight="700">怎么卖?</text>
    <text x="330" y="294">回购范围、检测、扣减、到账时间提前查</text>

    <rect x="115" y="350" width="750" height="70" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="2"/>
    <circle cx="155" cy="385" r="17" fill="#2f5d62"/>
    <text x="155" y="392" text-anchor="middle" fill="#ffffff" font-weight="700">4</text>
    <text x="195" y="379" font-weight="700">放哪里?</text>
    <text x="330" y="379">家中保险、银行保管箱、机构托管三选一</text>

    <rect x="115" y="435" width="750" height="70" rx="8" fill="#ffffff" stroke="#b55b4b" stroke-width="2"/>
    <circle cx="155" cy="470" r="17" fill="#b55b4b"/>
    <text x="155" y="477" text-anchor="middle" fill="#ffffff" font-weight="700">5</text>
    <text x="195" y="464" font-weight="700">亏多少?</text>
    <text x="330" y="464">买入价 - 回购价 + 保管费 = 你的起步成本</text>
  </g>
</svg>
