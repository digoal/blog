<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">黄金ETF的逻辑链</title>
  <desc id="desc">从黄金不生息、实物摩擦高、ETF标准化交易，推导到黄金ETF适合作为小比例防守工具。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc"/>
  <text x="48" y="56" font-size="28" font-weight="700" fill="#0f172a">黄金ETF: 把“黄金价格暴露”装进证券账户</text>
  <g font-family="Arial, sans-serif" font-size="20">
    <rect x="48" y="105" width="170" height="96" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="78" y="143" fill="#7c2d12" font-weight="700">前提1</text>
    <text x="73" y="174" fill="#431407">黄金不生息</text>

    <rect x="282" y="105" width="190" height="96" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="312" y="143" fill="#155e75" font-weight="700">前提2</text>
    <text x="312" y="174" fill="#164e63">实物交易摩擦高</text>

    <rect x="540" y="105" width="170" height="96" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="570" y="143" fill="#166534" font-weight="700">机制</text>
    <text x="570" y="174" fill="#14532d">ETF标准化</text>

    <rect x="772" y="105" width="140" height="96" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="806" y="143" fill="#3730a3" font-weight="700">判断</text>
    <text x="795" y="174" fill="#312e81">小比例防守</text>

    <line x1="218" y1="153" x2="272" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="472" y1="153" x2="530" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="710" y1="153" x2="762" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="105" y="264" width="750" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="132" y="303" fill="#0f172a" font-weight="700">关键边界</text>
    <text x="248" y="303" fill="#334155">ETF解决保管和变现摩擦, 但不解决金价波动、溢价折价、跟踪误差和仓位失控。</text>
    <text x="132" y="336" fill="#334155">所以它是“更容易理解的黄金工具”, 不是“无风险赚钱工具”。</text>
  </g>
</svg>
