<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">黄金ETF使用决策树</title>
  <desc id="desc">根据目的、期限、承受波动能力和溢价水平判断是否研究黄金ETF。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8fafc"/>
  <text x="48" y="54" font-size="28" font-weight="700" fill="#0f172a">先问目的, 再看工具</text>
  <g font-family="Arial, sans-serif" font-size="19">
    <rect x="355" y="90" width="250" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="393" y="134" fill="#075985" font-weight="700">我想买黄金的什么?</text>

    <line x1="480" y1="162" x2="205" y2="220" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="480" y1="162" x2="480" y2="220" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="480" y1="162" x2="755" y2="220" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="70" y="220" width="270" height="84" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="100" y="256" fill="#7c2d12" font-weight="700">要拿到实物</text>
    <text x="100" y="285" fill="#431407">研究金条和回购规则</text>

    <rect x="345" y="220" width="270" height="84" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="373" y="256" fill="#166534" font-weight="700">要跟踪金价</text>
    <text x="373" y="285" fill="#14532d">黄金ETF进入候选</text>

    <rect x="620" y="220" width="270" height="84" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="650" y="256" fill="#991b1b" font-weight="700">想短线暴富</text>
    <text x="650" y="285" fill="#7f1d1d">先停止, 重新学风险</text>

    <line x1="480" y1="304" x2="480" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="275" y="360" width="410" height="94" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="310" y="397" fill="#0f172a" font-weight="700">再检查三件事</text>
    <text x="310" y="427" fill="#334155">期限够长? 仓位不高? 溢价和成交量正常?</text>
    <text x="310" y="457" fill="#334155">任一答案是否定, 就先降低仓位或暂缓。</text>
  </g>
</svg>
