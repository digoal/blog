<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">黄金ETF风险边界</title>
  <desc id="desc">展示黄金ETF从适合使用、降低仓位到避免参与的风险边界。</desc>
  <rect width="960" height="430" fill="#f8fafc"/>
  <text x="48" y="56" font-size="28" font-weight="700" fill="#0f172a">黄金ETF不是无风险, 风险边界要写在买入前</text>
  <g font-family="Arial, sans-serif" font-size="19">
    <rect x="72" y="112" width="230" height="210" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="105" y="152" fill="#166534" font-weight="700">可以研究</text>
    <text x="105" y="190" fill="#14532d">长期防守配置</text>
    <text x="105" y="224" fill="#14532d">证券账户操作熟悉</text>
    <text x="105" y="258" fill="#14532d">溢价折价很小</text>
    <text x="105" y="292" fill="#14532d">仓位有上限</text>

    <rect x="365" y="112" width="230" height="210" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="398" y="152" fill="#9a3412" font-weight="700">降低仓位</text>
    <text x="398" y="190" fill="#431407">金价短期暴涨</text>
    <text x="398" y="224" fill="#431407">账户亏损承受力差</text>
    <text x="398" y="258" fill="#431407">ETF成交量下降</text>
    <text x="398" y="292" fill="#431407">组合黄金过多</text>

    <rect x="658" y="112" width="230" height="210" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="691" y="152" fill="#991b1b" font-weight="700">应该避开</text>
    <text x="691" y="190" fill="#7f1d1d">短期生活钱</text>
    <text x="691" y="224" fill="#7f1d1d">借钱或满仓</text>
    <text x="691" y="258" fill="#7f1d1d">只因热点追涨</text>
    <text x="691" y="292" fill="#7f1d1d">把ETF当保本产品</text>

    <rect x="154" y="352" width="650" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="185" y="382" fill="#334155">核心原则: 黄金ETF降低交易摩擦, 但不能替你承担波动。</text>
  </g>
</svg>
