<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">黄金ETF执行清单</title>
  <desc id="desc">黄金ETF买入前需要检查的产品、价格、成本、仓位和退出条件。</desc>
  <rect width="960" height="430" fill="#f8fafc"/>
  <text x="48" y="56" font-size="28" font-weight="700" fill="#0f172a">买入前五问</text>
  <g font-family="Arial, sans-serif" font-size="20">
    <rect x="70" y="100" width="820" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="105" y="135" fill="#0f172a">1. 它跟踪的是 Au99.99、上海金, 还是其他口径?</text>

    <rect x="70" y="164" width="820" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="105" y="199" fill="#0f172a">2. 场内价格相对基金净值有没有明显溢价?</text>

    <rect x="70" y="228" width="820" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="105" y="263" fill="#0f172a">3. 成交额和买卖价差是否足够友好?</text>

    <rect x="70" y="292" width="820" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="105" y="327" fill="#0f172a">4. 管理费、托管费、佣金是否已计入总成本?</text>

    <rect x="70" y="356" width="820" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="105" y="391" fill="#0f172a">5. 如果金价跌 10%-20%, 我是否仍能按计划持有或减仓?</text>
  </g>
</svg>
