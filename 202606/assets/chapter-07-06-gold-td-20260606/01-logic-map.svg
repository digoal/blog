<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520">
  <title>黄金T+D风险逻辑链</title>
  <desc>展示黄金T+D从黄金价格判断到杠杆、保证金、延期费和强平风险的推导链。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#f7f3e8"/>
  <text x="54" y="58" font-size="30" font-weight="700" fill="#1f2933">黄金T+D不是黄金ETF的升级版</text>
  <text x="54" y="94" font-size="18" fill="#52616b">它把黄金价格波动、杠杆、保证金和延期费放进同一个账户</text>
  <g font-size="20" fill="#1f2933">
    <rect x="54" y="150" width="190" height="110" rx="8" fill="#ffffff" stroke="#d6b656" stroke-width="2"/>
    <text x="84" y="190" font-weight="700">前提1</text>
    <text x="84" y="224">黄金不生息</text>
    <text x="84" y="250" font-size="16" fill="#697386">收益靠价格重估</text>
    <rect x="304" y="150" width="190" height="110" rx="8" fill="#ffffff" stroke="#7aa6a1" stroke-width="2"/>
    <text x="334" y="190" font-weight="700">前提2</text>
    <text x="334" y="224">T+D带杠杆</text>
    <text x="334" y="250" font-size="16" fill="#697386">小波动可放大亏损</text>
    <rect x="554" y="150" width="190" height="110" rx="8" fill="#ffffff" stroke="#c97c5d" stroke-width="2"/>
    <text x="584" y="190" font-weight="700">前提3</text>
    <text x="584" y="224">保证金交易</text>
    <text x="584" y="250" font-size="16" fill="#697386">补钱失败会被平仓</text>
    <rect x="804" y="150" width="190" height="110" rx="8" fill="#ffffff" stroke="#80558c" stroke-width="2"/>
    <text x="834" y="190" font-weight="700">前提4</text>
    <text x="834" y="224">延期费逐日收付</text>
    <text x="834" y="250" font-size="16" fill="#697386">持仓成本不固定</text>
  </g>
  <g stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)">
    <line x1="244" y1="205" x2="294" y2="205"/>
    <line x1="494" y1="205" x2="544" y2="205"/>
    <line x1="744" y1="205" x2="794" y2="205"/>
  </g>
  <rect x="164" y="340" width="752" height="92" rx="10" fill="#243b53"/>
  <text x="205" y="378" font-size="24" font-weight="700" fill="#ffffff">结论</text>
  <text x="205" y="414" font-size="20" fill="#ffffff">小白默认不把黄金T+D当配置工具；只有先懂规则、能承受追保和强平，才谈学习。</text>
</svg>
