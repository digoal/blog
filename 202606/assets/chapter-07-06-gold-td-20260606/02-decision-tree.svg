<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620">
  <title>黄金T+D适用性决策树</title>
  <desc>用决策树判断小白是否应接触黄金T+D。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344e41"/>
    </marker>
  </defs>
  <rect width="1080" height="620" fill="#f5f7f2"/>
  <text x="54" y="58" font-size="30" font-weight="700" fill="#1f2933">是否应该碰黄金T+D?</text>
  <g font-size="19" fill="#1f2933">
    <rect x="390" y="105" width="300" height="72" rx="8" fill="#ffffff" stroke="#9caf88" stroke-width="2"/>
    <text x="435" y="149" font-weight="700">你只是想配置黄金吗?</text>
    <rect x="95" y="255" width="280" height="90" rx="8" fill="#ffffff" stroke="#d6b656" stroke-width="2"/>
    <text x="125" y="292" font-weight="700">是</text>
    <text x="125" y="322">优先比较黄金ETF/基金</text>
    <rect x="705" y="255" width="280" height="90" rx="8" fill="#ffffff" stroke="#d6b656" stroke-width="2"/>
    <text x="735" y="292" font-weight="700">不是</text>
    <text x="735" y="322">你想学习保证金交易?</text>
    <rect x="555" y="430" width="230" height="90" rx="8" fill="#ffffff" stroke="#c97c5d" stroke-width="2"/>
    <text x="584" y="466" font-weight="700">不懂追保/强平</text>
    <text x="584" y="496">停止, 先学规则</text>
    <rect x="820" y="430" width="230" height="90" rx="8" fill="#ffffff" stroke="#7aa6a1" stroke-width="2"/>
    <text x="849" y="466" font-weight="700">懂且能承受</text>
    <text x="849" y="496">小额模拟, 不重仓</text>
  </g>
  <g stroke="#344e41" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M485 177 C430 215, 335 232, 265 254"/>
    <path d="M595 177 C650 215, 745 232, 815 254"/>
    <path d="M820 345 C760 382, 710 400, 675 430"/>
    <path d="M870 345 C895 382, 920 400, 930 430"/>
  </g>
  <text x="160" y="388" font-size="18" fill="#52616b">配置需求: 低摩擦、可复盘、少杠杆</text>
  <text x="610" y="558" font-size="18" fill="#52616b">交易学习需求: 先规则、再仓位、最后才谈方向</text>
</svg>
