<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580">
  <title>黄金T+D风险边界</title>
  <desc>列出黄金T+D从可学习到应停止的风险边界。</desc>
  <rect width="1080" height="580" fill="#fbfaf6"/>
  <text x="54" y="58" font-size="30" font-weight="700" fill="#1f2933">黄金T+D的三道边界</text>
  <g font-size="20" fill="#1f2933">
    <rect x="70" y="125" width="285" height="330" rx="8" fill="#e8f3ef" stroke="#7aa6a1" stroke-width="2"/>
    <text x="105" y="174" font-size="24" font-weight="700">可学习区</text>
    <text x="105" y="220">只用模拟或极小资金</text>
    <text x="105" y="260">先记录保证金比例</text>
    <text x="105" y="300">懂延期费方向</text>
    <text x="105" y="340">能接受夜盘波动</text>
    <text x="105" y="380">亏损触发复盘</text>
    <rect x="400" y="125" width="285" height="330" rx="8" fill="#fff3d6" stroke="#d6b656" stroke-width="2"/>
    <text x="435" y="174" font-size="24" font-weight="700">必须降风险</text>
    <text x="435" y="220">仓位超过计划</text>
    <text x="435" y="260">保证金占用升高</text>
    <text x="435" y="300">延期费连续不利</text>
    <text x="435" y="340">行情与前提相反</text>
    <text x="435" y="380">睡眠被夜盘影响</text>
    <rect x="730" y="125" width="285" height="330" rx="8" fill="#fde8df" stroke="#c97c5d" stroke-width="2"/>
    <text x="765" y="174" font-size="24" font-weight="700">应避免区</text>
    <text x="765" y="220">借钱或满仓</text>
    <text x="765" y="260">不懂强平规则</text>
    <text x="765" y="300">生活钱做保证金</text>
    <text x="765" y="340">追涨杀跌加杠杆</text>
    <text x="765" y="380">不能及时补保证金</text>
  </g>
  <rect x="120" y="490" width="840" height="54" rx="8" fill="#243b53"/>
  <text x="152" y="525" font-size="22" fill="#ffffff">底线: 看错方向不可怕, 可怕的是方向只错一点, 杠杆和强平让你失去继续学习的本金。</text>
</svg>
