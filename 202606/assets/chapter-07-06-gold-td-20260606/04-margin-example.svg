<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560">
  <title>黄金T+D保证金示例</title>
  <desc>用假设数字说明保证金交易如何放大盈亏和追保压力。</desc>
  <rect width="1080" height="560" fill="#f8fafc"/>
  <text x="54" y="58" font-size="30" font-weight="700" fill="#1f2933">保证金不是便宜, 是把风险压缩进更小本金</text>
  <text x="54" y="95" font-size="18" fill="#52616b">以下为教育示例, 实际保证金比例和规则以交易所、会员及银行最新公告为准</text>
  <g font-size="20" fill="#1f2933">
    <rect x="70" y="145" width="260" height="110" rx="8" fill="#ffffff" stroke="#7aa6a1" stroke-width="2"/>
    <text x="100" y="185" font-weight="700">名义合约价值</text>
    <text x="100" y="225">800元/克 x 1000克</text>
    <text x="100" y="250" font-size="18" fill="#697386">约 80万元</text>
    <rect x="410" y="145" width="260" height="110" rx="8" fill="#ffffff" stroke="#d6b656" stroke-width="2"/>
    <text x="440" y="185" font-weight="700">15%保证金示意</text>
    <text x="440" y="225">占用约 12万元</text>
    <text x="440" y="250" font-size="18" fill="#697386">不是只冒12万元风险</text>
    <rect x="750" y="145" width="260" height="110" rx="8" fill="#ffffff" stroke="#c97c5d" stroke-width="2"/>
    <text x="780" y="185" font-weight="700">金价反向1%</text>
    <text x="780" y="225">名义亏损约 8000元</text>
    <text x="780" y="250" font-size="18" fill="#697386">占保证金约 6.7%</text>
  </g>
  <g>
    <rect x="110" y="335" width="860" height="46" rx="6" fill="#dbeafe"/>
    <rect x="110" y="399" width="140" height="46" rx="6" fill="#fecaca"/>
    <rect x="250" y="399" width="690" height="46" rx="6" fill="#e5e7eb"/>
    <text x="130" y="365" font-size="20" fill="#1f2933">现货全额买入: 1%价格波动 = 本金约1%波动</text>
    <text x="130" y="429" font-size="20" fill="#1f2933">T+D保证金: 同样1%价格波动, 对保证金账户冲击被放大</text>
  </g>
  <text x="110" y="502" font-size="22" fill="#1f2933">所以小白先问: 我能承受价格反向、保证金追加、延期费和夜盘波动同时发生吗?</text>
</svg>
