<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">白银的核心逻辑链</text>
  <rect x="45" y="72" width="170" height="90" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">贵金属属性</text>
  <text x="130" y="132" text-anchor="middle" font-size="14" fill="#334155">跟随黄金与避险</text>
  <text x="130" y="152" text-anchor="middle" font-size="14" fill="#334155">但不如黄金稳定</text>

  <rect x="300" y="72" width="170" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="385" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">工业金属属性</text>
  <text x="385" y="132" text-anchor="middle" font-size="14" fill="#334155">电子 光伏 汽车</text>
  <text x="385" y="152" text-anchor="middle" font-size="14" fill="#334155">受经济周期影响</text>

  <rect x="555" y="72" width="170" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">市场更小更薄</text>
  <text x="640" y="132" text-anchor="middle" font-size="14" fill="#334155">价差更宽</text>
  <text x="640" y="152" text-anchor="middle" font-size="14" fill="#334155">波动约为黄金两倍</text>

  <path d="M215 117 L300 117" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M470 117 L555 117" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M130 162 C130 220 640 220 640 162" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="7 7"/>

  <rect x="155" y="245" width="490" height="80" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="278" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">结论: 白银只能做高弹性卫星</text>
  <text x="400" y="306" text-anchor="middle" font-size="15" fill="#334155">仓位小于黄金, 优先低杠杆, 不用防守资产的名义做重仓赌博</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
