<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">前提变化后的白银路径</text>

  <rect x="280" y="66" width="240" height="58" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="91" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">当前判断: 想参与白银</text>
  <text x="400" y="113" text-anchor="middle" font-size="13" fill="#334155">先检查三个前提是否同时成立</text>

  <path d="M400 124 L185 175" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <path d="M400 124 L400 175" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <path d="M400 124 L615 175" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="55" y="176" width="230" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="170" y="205" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">贵金属 + 工业共振</text>
  <text x="170" y="230" text-anchor="middle" font-size="13" fill="#334155">避险上升, 工业需求不弱</text>
  <text x="170" y="250" text-anchor="middle" font-size="13" fill="#334155">操作: 小仓卫星, 分批</text>

  <rect x="285" y="176" width="230" height="88" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">工业前提走弱</text>
  <text x="400" y="230" text-anchor="middle" font-size="13" fill="#334155">光伏降银耗或周期下行</text>
  <text x="400" y="250" text-anchor="middle" font-size="13" fill="#334155">操作: 降低仓位或暂停</text>

  <rect x="515" y="176" width="230" height="88" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="630" y="205" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">流动性与杠杆恶化</text>
  <text x="630" y="230" text-anchor="middle" font-size="13" fill="#334155">价差扩大, 保证金上调</text>
  <text x="630" y="250" text-anchor="middle" font-size="13" fill="#334155">操作: 先退杠杆再复盘</text>

  <rect x="150" y="322" width="500" height="55" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">统一纪律</text>
  <text x="400" y="367" text-anchor="middle" font-size="13" fill="#334155">任何一条关键前提失效, 先缩小风险预算, 不用补仓证明自己正确</text>

  <path d="M170 264 C170 305 400 302 400 322" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M400 264 L400 322" stroke="#94a3b8" stroke-width="2"/>
  <path d="M630 264 C630 305 400 302 400 322" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
