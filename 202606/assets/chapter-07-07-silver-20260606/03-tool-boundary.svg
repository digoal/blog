<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">白银工具边界: 从低摩擦到高风险</text>

  <rect x="60" y="82" width="160" height="220" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">实物银</text>
  <text x="140" y="150" text-anchor="middle" font-size="13" fill="#334155">买卖价差大</text>
  <text x="140" y="174" text-anchor="middle" font-size="13" fill="#334155">保管和回购麻烦</text>
  <text x="140" y="198" text-anchor="middle" font-size="13" fill="#334155">适合认知体验</text>
  <text x="140" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#0891b2">杠杆: 低</text>

  <rect x="240" y="82" width="160" height="220" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">白银基金</text>
  <text x="320" y="150" text-anchor="middle" font-size="13" fill="#334155">看清跟踪标的</text>
  <text x="320" y="174" text-anchor="middle" font-size="13" fill="#334155">注意费率和净值</text>
  <text x="320" y="198" text-anchor="middle" font-size="13" fill="#334155">适合低杠杆观察</text>
  <text x="320" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">杠杆: 低</text>

  <rect x="420" y="82" width="160" height="220" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="500" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Ag(T+D)</text>
  <text x="500" y="150" text-anchor="middle" font-size="13" fill="#334155">保证金交易</text>
  <text x="500" y="174" text-anchor="middle" font-size="13" fill="#334155">延期费和夜盘</text>
  <text x="500" y="198" text-anchor="middle" font-size="13" fill="#334155">先学规则再实盘</text>
  <text x="500" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">杠杆: 中高</text>

  <rect x="600" y="82" width="160" height="220" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="680" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">白银期货</text>
  <text x="680" y="150" text-anchor="middle" font-size="13" fill="#334155">15千克每手</text>
  <text x="680" y="174" text-anchor="middle" font-size="13" fill="#334155">每日结算</text>
  <text x="680" y="198" text-anchor="middle" font-size="13" fill="#334155">不做小白默认入口</text>
  <text x="680" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">杠杆: 高</text>

  <line x1="100" y1="350" x2="705" y2="350" stroke="#475569" stroke-width="4" marker-end="url(#arrow3)"/>
  <text x="100" y="378" font-size="14" fill="#334155">低风险摩擦</text>
  <text x="602" y="378" font-size="14" fill="#334155">高规则复杂度</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
