<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">白银下单前的仓位检查</text>

  <rect x="70" y="82" width="660" height="62" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="105" cy="113" r="15" fill="#0ea5e9"/>
  <text x="105" y="119" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <text x="135" y="107" font-size="16" font-weight="700" fill="#0f172a">先定角色</text>
  <text x="135" y="128" font-size="13" fill="#334155">白银是高弹性卫星, 不是替代现金或黄金的核心防守仓</text>

  <rect x="70" y="158" width="660" height="62" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="105" cy="189" r="15" fill="#16a34a"/>
  <text x="105" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <text x="135" y="183" font-size="16" font-weight="700" fill="#0f172a">再算波动</text>
  <text x="135" y="204" font-size="13" fill="#334155">按黄金两倍波动预留风险预算, 看错也不能伤到生活现金</text>

  <rect x="70" y="234" width="660" height="62" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="105" cy="265" r="15" fill="#ea580c"/>
  <text x="105" y="271" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <text x="135" y="259" font-size="16" font-weight="700" fill="#0f172a">最后查工具</text>
  <text x="135" y="280" font-size="13" fill="#334155">保证金、延期费、价差、成交量、夜盘影响, 任一说不清就暂停</text>

  <rect x="180" y="326" width="440" height="42" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="352" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">规则: 先缩小仓位, 再讨论方向</text>
</svg>
