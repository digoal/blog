<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">黄金买入时机的三信号逻辑链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="40" y="90" width="170" height="90" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="125" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#075985">实际利率下行</text>
  <text x="125" y="150" text-anchor="middle" font-size="14" fill="#0f172a">持有现金和债券</text>
  <text x="125" y="170" text-anchor="middle" font-size="14" fill="#0f172a">的机会成本下降</text>
  <rect x="40" y="220" width="170" height="90" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="125" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">避险需求上升</text>
  <text x="125" y="280" text-anchor="middle" font-size="14" fill="#0f172a">投资者需要组合</text>
  <text x="125" y="300" text-anchor="middle" font-size="14" fill="#0f172a">里的防守资产</text>
  <rect x="310" y="155" width="180" height="90" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="188" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">货币信用受疑</text>
  <text x="400" y="216" text-anchor="middle" font-size="14" fill="#0f172a">央行和投资者</text>
  <text x="400" y="236" text-anchor="middle" font-size="14" fill="#0f172a">提高黄金配置需求</text>
  <rect x="590" y="155" width="170" height="90" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="675" y="188" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">分批买入</text>
  <text x="675" y="216" text-anchor="middle" font-size="14" fill="#0f172a">两盏灯以上亮起</text>
  <text x="675" y="236" text-anchor="middle" font-size="14" fill="#0f172a">才提高目标仓位</text>
  <line x1="210" y1="135" x2="310" y2="178" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="265" x2="310" y2="222" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="200" x2="590" y2="200" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="335" text-anchor="middle" font-size="15" fill="#475569">核心: 黄金不生息, 所以买入时机不是猜最低点, 而是等机会成本下降、防守需求上升、信用担忧被数据确认。</text>
</svg>
