<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化后的买入结论</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="300" y="68" width="200" height="70" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="400" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">先问三盏灯</text>
  <text x="400" y="122" text-anchor="middle" font-size="14" fill="#334155">利率 / 避险 / 信用</text>
  <line x1="400" y1="138" x2="400" y2="170" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="58" y="180" width="200" height="105" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="158" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">两盏以上亮起</text>
  <text x="158" y="240" text-anchor="middle" font-size="14" fill="#0f172a">胜率改善</text>
  <text x="158" y="262" text-anchor="middle" font-size="14" fill="#0f172a">分批提高到目标仓</text>
  <rect x="300" y="180" width="200" height="105" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="400" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">只有一盏亮起</text>
  <text x="400" y="240" text-anchor="middle" font-size="14" fill="#0f172a">证据不足</text>
  <text x="400" y="262" text-anchor="middle" font-size="14" fill="#0f172a">只观察或小额试仓</text>
  <rect x="542" y="180" width="200" height="105" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="642" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">三盏都熄灭</text>
  <text x="642" y="240" text-anchor="middle" font-size="14" fill="#0f172a">实际利率走强</text>
  <text x="642" y="262" text-anchor="middle" font-size="14" fill="#0f172a">避险降温, 暂停追入</text>
  <line x1="400" y1="170" x2="158" y2="180" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="170" x2="400" y2="180" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="170" x2="642" y2="180" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="58" y="330" width="684" height="54" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="354" text-anchor="middle" font-size="15" fill="#334155">反例: 2022年实际利率快速上行、美元走强时, 即使有地缘风险, 金价也受压。</text>
  <text x="400" y="376" text-anchor="middle" font-size="15" fill="#334155">所以黄金买入不能只看新闻恐慌, 必须把利率和美元一起检查。</text>
</svg>
