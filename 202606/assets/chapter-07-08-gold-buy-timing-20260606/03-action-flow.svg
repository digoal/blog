<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">黄金买入执行流程</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="45" y="82" width="145" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="118" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">1 定目标</text>
  <text x="118" y="140" text-anchor="middle" font-size="13" fill="#0f172a">防守仓上限</text>
  <rect x="235" y="82" width="145" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="308" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">2 查三灯</text>
  <text x="308" y="140" text-anchor="middle" font-size="13" fill="#0f172a">利率/避险/信用</text>
  <rect x="425" y="82" width="145" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="498" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">3 看价格</text>
  <text x="498" y="140" text-anchor="middle" font-size="13" fill="#0f172a">不追高溢价</text>
  <rect x="615" y="82" width="145" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="688" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">4 分批买</text>
  <text x="688" y="140" text-anchor="middle" font-size="13" fill="#0f172a">1/3, 1/3, 1/3</text>
  <line x1="190" y1="121" x2="235" y2="121" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="121" x2="425" y2="121" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="121" x2="615" y2="121" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="110" y="230" width="250" height="96" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="235" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">前提继续成立</text>
  <text x="235" y="288" text-anchor="middle" font-size="14" fill="#0f172a">按计划补到目标仓</text>
  <text x="235" y="310" text-anchor="middle" font-size="14" fill="#0f172a">不因上涨临时加码</text>
  <rect x="440" y="230" width="250" height="96" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="565" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">前提失效</text>
  <text x="565" y="288" text-anchor="middle" font-size="14" fill="#0f172a">暂停下一笔, 降低目标仓</text>
  <text x="565" y="310" text-anchor="middle" font-size="14" fill="#0f172a">实际利率转强时先复盘</text>
  <line x1="688" y1="160" x2="235" y2="230" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="688" y1="160" x2="565" y2="230" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="375" text-anchor="middle" font-size="15" fill="#475569">买入规则写在下单前: 目标仓位、触发条件、分批节奏、失效条件。</text>
</svg>
