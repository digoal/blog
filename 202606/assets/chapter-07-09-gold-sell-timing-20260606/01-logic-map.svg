<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">黄金卖出时机的论证链</title>
  <desc id="desc">实际利率走强、风险偏好回升、仓位过高共同推导出减仓或再平衡结论。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
    .hot { fill: #fff7ed; stroke: #fb923c; }
    .cool { fill: #eef2ff; stroke: #6366f1; }
    .risk { fill: #fef2f2; stroke: #ef4444; }
    .result { fill: #ecfdf5; stroke: #10b981; }
    .label { font-size: 19px; font-weight: 700; }
    .small { font-size: 15px; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" class="label">黄金卖出不是看空预测, 而是把防守仓位收回到规则内</text>

  <rect x="34" y="70" width="205" height="86" class="box hot"/>
  <text x="136" y="101" text-anchor="middle" class="label">实际利率走强</text>
  <text x="136" y="128" text-anchor="middle" class="small">现金和债券真实收益上升</text>
  <text x="136" y="149" text-anchor="middle" class="small">黄金机会成本变高</text>

  <rect x="34" y="202" width="205" height="86" class="box cool"/>
  <text x="136" y="233" text-anchor="middle" class="label">风险偏好回升</text>
  <text x="136" y="260" text-anchor="middle" class="small">避险需求降温</text>
  <text x="136" y="281" text-anchor="middle" class="small">防守溢价开始回吐</text>

  <rect x="306" y="136" width="205" height="96" class="box risk"/>
  <text x="408" y="169" text-anchor="middle" class="label">仓位过高</text>
  <text x="408" y="196" text-anchor="middle" class="small">黄金从防守资产</text>
  <text x="408" y="217" text-anchor="middle" class="small">变成组合集中风险</text>

  <rect x="575" y="123" width="195" height="124" class="box result"/>
  <text x="672" y="157" text-anchor="middle" class="label">操作结论</text>
  <text x="672" y="186" text-anchor="middle" class="small">两条线成立: 减超额</text>
  <text x="672" y="209" text-anchor="middle" class="small">三条线成立: 回目标</text>
  <text x="672" y="232" text-anchor="middle" class="small">前提反转: 暂停卖出</text>

  <path d="M239 113 C268 113, 276 153, 306 169" class="arrow"/>
  <path d="M239 245 C268 245, 276 207, 306 196" class="arrow"/>
  <path d="M511 184 C536 184, 549 184, 575 184" class="arrow"/>

  <rect x="130" y="324" width="540" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="353" text-anchor="middle" class="small">核心句: 不是因为黄金一定要跌才卖, 而是因为持有黄金的性价比或仓位边界变了。</text>
</svg>
