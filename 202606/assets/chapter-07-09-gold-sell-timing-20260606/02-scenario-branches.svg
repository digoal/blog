<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">黄金卖出前提变化分支图</title>
  <desc id="desc">不同前提组合对应不同卖出动作。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .start { fill: #ffffff; stroke: #0f766e; stroke-width: 2; rx: 10; }
    .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
    .warn { fill: #fff7ed; stroke: #f97316; }
    .sell { fill: #ecfdf5; stroke: #10b981; }
    .stop { fill: #eef2ff; stroke: #6366f1; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" class="label">前提变化后, 卖出动作也要变</text>

  <rect x="280" y="64" width="240" height="62" class="start"/>
  <text x="400" y="91" text-anchor="middle" class="label">先问三条线</text>
  <text x="400" y="114" text-anchor="middle" class="small">利率线 / 情绪线 / 仓位线</text>

  <rect x="42" y="176" width="180" height="86" class="node sell"/>
  <text x="132" y="207" text-anchor="middle" class="label">三线成立</text>
  <text x="132" y="233" text-anchor="middle" class="small">减到目标仓位</text>
  <text x="132" y="254" text-anchor="middle" class="small">激进者降到下限</text>

  <rect x="292" y="176" width="180" height="86" class="node warn"/>
  <text x="382" y="207" text-anchor="middle" class="label">两线成立</text>
  <text x="382" y="233" text-anchor="middle" class="small">先卖超额部分</text>
  <text x="382" y="254" text-anchor="middle" class="small">保留核心防守仓</text>

  <rect x="542" y="176" width="180" height="86" class="node warn"/>
  <text x="632" y="207" text-anchor="middle" class="label">只有仓位过高</text>
  <text x="632" y="233" text-anchor="middle" class="small">做再平衡</text>
  <text x="632" y="254" text-anchor="middle" class="small">不做方向判断</text>

  <rect x="160" y="320" width="210" height="64" class="node stop"/>
  <text x="265" y="348" text-anchor="middle" class="label">利率转弱或风险升温</text>
  <text x="265" y="372" text-anchor="middle" class="small">暂停卖出, 重新推导</text>

  <rect x="450" y="320" width="210" height="64" class="node stop"/>
  <text x="555" y="348" text-anchor="middle" class="label">工具溢价或杠杆过高</text>
  <text x="555" y="372" text-anchor="middle" class="small">优先处理工具风险</text>

  <path d="M340 126 C280 145, 194 154, 132 176" class="arrow"/>
  <path d="M400 126 C397 145, 389 158, 382 176" class="arrow"/>
  <path d="M461 126 C515 145, 582 154, 632 176" class="arrow"/>
  <path d="M345 262 C320 286, 295 300, 265 320" class="arrow"/>
  <path d="M632 262 C624 290, 591 303, 555 320" class="arrow"/>
</svg>
