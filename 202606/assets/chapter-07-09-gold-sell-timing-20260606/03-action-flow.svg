<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">黄金减仓执行流程</title>
  <desc id="desc">从目标仓位、三线检查到卖出比例和复盘的操作流程。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .step { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
    .check { fill: #eef2ff; stroke: #6366f1; }
    .act { fill: #ecfdf5; stroke: #10b981; }
    .review { fill: #fff7ed; stroke: #f97316; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" class="label">黄金减仓四步: 先定边界, 再看信号, 最后执行</text>

  <rect x="44" y="86" width="160" height="86" class="step"/>
  <text x="124" y="119" text-anchor="middle" class="label">1. 定目标</text>
  <text x="124" y="145" text-anchor="middle" class="small">目标仓位 5%-10%</text>
  <text x="124" y="164" text-anchor="middle" class="small">写清上限和下限</text>

  <rect x="234" y="86" width="170" height="86" class="step check"/>
  <text x="319" y="119" text-anchor="middle" class="label">2. 查三线</text>
  <text x="319" y="145" text-anchor="middle" class="small">实际利率</text>
  <text x="319" y="164" text-anchor="middle" class="small">风险偏好 / 仓位</text>

  <rect x="434" y="86" width="170" height="86" class="step act"/>
  <text x="519" y="119" text-anchor="middle" class="label">3. 定卖量</text>
  <text x="519" y="145" text-anchor="middle" class="small">一线: 卖超额一半</text>
  <text x="519" y="164" text-anchor="middle" class="small">两线: 卖回目标</text>

  <rect x="634" y="86" width="122" height="86" class="step review"/>
  <text x="695" y="119" text-anchor="middle" class="label">4. 复盘</text>
  <text x="695" y="145" text-anchor="middle" class="small">每2-4周</text>
  <text x="695" y="164" text-anchor="middle" class="small">重查前提</text>

  <path d="M204 129 L234 129" class="arrow"/>
  <path d="M404 129 L434 129" class="arrow"/>
  <path d="M604 129 L634 129" class="arrow"/>

  <rect x="72" y="236" width="656" height="114" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="266" text-anchor="middle" class="label">卖出比例参考</text>
  <text x="400" y="299" text-anchor="middle" class="small">0条线成立: 不为预测而卖; 只按年度再平衡处理</text>
  <text x="400" y="322" text-anchor="middle" class="small">1条线成立: 卖出超出目标上限的部分, 或卖超额的一半</text>
  <text x="400" y="345" text-anchor="middle" class="small">2-3条线成立: 减回目标仓位; 工具有杠杆或高溢价时优先退出工具风险</text>

  <text x="400" y="395" text-anchor="middle" class="small">原则: 先卖“多出来的风险”, 不把长期防守仓做成情绪化清仓。</text>
</svg>
