<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">黄金仓位的核心论证链</text>
  <rect x="40" y="74" width="180" height="92" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="130" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7c2d12">前提A 常量</text>
  <text x="130" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7c2d12">黄金不生息</text>
  <text x="130" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7c2d12">收益靠价格重估</text>

  <rect x="40" y="214" width="180" height="92" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="130" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#164e63">前提B 慢变量</text>
  <text x="130" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#164e63">低相关和高流动性</text>
  <text x="130" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#164e63">能改善组合防守</text>

  <rect x="310" y="144" width="190" height="92" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="405" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#312e81">前提C 变量</text>
  <text x="405" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#312e81">实际利率、美元、风险偏好</text>
  <text x="405" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#312e81">会改变黄金胜率</text>

  <rect x="590" y="74" width="170" height="92" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="675" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#14532d">正常结论</text>
  <text x="675" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#14532d">做防守仓</text>
  <text x="675" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#14532d">不做重仓赌博</text>

  <rect x="590" y="214" width="170" height="92" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="675" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#881337">操作动作</text>
  <text x="675" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#881337">设仓位上限</text>
  <text x="675" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#881337">分批 + 再平衡</text>

  <path d="M220 120 C260 120 275 170 310 180" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M220 260 C260 260 275 220 310 206" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 186 C540 175 555 130 590 120" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 210 C540 222 555 250 590 260" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M675 166 L675 214" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">因为黄金能分散风险但不能产生现金流, 所以仓位要按风险预算, 不是按上涨想象。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
