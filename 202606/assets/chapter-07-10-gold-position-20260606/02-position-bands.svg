<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">小白黄金仓位分层</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">这里是教育框架, 不是对所有人的固定建议</text>

  <rect x="70" y="116" width="150" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="145" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0c4a6e">0%-3%</text>
  <text x="145" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0c4a6e">观察/学习仓</text>
  <text x="145" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0c4a6e">先熟悉工具</text>

  <rect x="240" y="116" width="150" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="315" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#14532d">3%-8%</text>
  <text x="315" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#14532d">防守配置仓</text>
  <text x="315" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14532d">适合多数练习</text>

  <rect x="410" y="116" width="150" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="485" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#78350f">8%-10%</text>
  <text x="485" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#78350f">上限观察区</text>
  <text x="485" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">只因组合需要</text>

  <rect x="580" y="116" width="150" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="655" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#7f1d1d">&gt;10%</text>
  <text x="655" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7f1d1d">重仓警戒区</text>
  <text x="655" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">先复盘再加仓</text>

  <line x1="85" y1="264" x2="715" y2="264" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="145" cy="264" r="10" fill="#0284c7"/>
  <circle cx="315" cy="264" r="10" fill="#16a34a"/>
  <circle cx="485" cy="264" r="10" fill="#d97706"/>
  <circle cx="655" cy="264" r="10" fill="#dc2626"/>
  <text x="145" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">知道它是什么</text>
  <text x="315" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">承担组合防守</text>
  <text x="485" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">开始需要纪律</text>
  <text x="655" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">容易变成押注</text>

  <text x="400" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">先定角色, 再定仓位; 先定上限, 再谈买入。</text>
</svg>
