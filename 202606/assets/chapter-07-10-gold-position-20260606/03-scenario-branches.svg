<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">前提变化后的仓位动作</text>

  <rect x="300" y="72" width="200" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#312e81">先问三件事</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#312e81">角色 / 宏观 / 仓位</text>

  <rect x="55" y="210" width="200" height="98" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="155" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">防守前提成立</text>
  <text x="155" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14532d">实际利率下行</text>
  <text x="155" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14532d">风险或信用担忧上升</text>
  <text x="155" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">动作: 分批补到目标仓</text>

  <rect x="300" y="210" width="200" height="98" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#78350f">前提变弱</text>
  <text x="400" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">实际利率走强</text>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">风险偏好恢复</text>
  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#78350f">动作: 停止加仓</text>

  <rect x="545" y="210" width="200" height="98" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">仓位越界</text>
  <text x="645" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">涨多后占比过高</text>
  <text x="645" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">或追涨临时加码</text>
  <text x="645" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">动作: 减回计划内</text>

  <path d="M365 142 C305 165 240 180 175 210" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 142 L400 210" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M435 142 C495 165 560 180 625 210" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">方向对了但仓位越界, 仍然按错误处理。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
