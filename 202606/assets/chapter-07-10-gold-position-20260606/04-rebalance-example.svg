<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">10万元组合的黄金再平衡例子</text>

  <rect x="70" y="82" width="210" height="270" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="175" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">初始计划</text>
  <circle cx="175" cy="205" r="70" fill="#e2e8f0"/>
  <path d="M175 205 L175 135 A70 70 0 0 1 200 270 Z" fill="#f59e0b"/>
  <text x="175" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">6%</text>
  <text x="175" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">黄金目标仓</text>
  <text x="175" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">10万元中买6000元</text>
  <text x="175" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">上下限: 4%-8%</text>

  <rect x="305" y="82" width="210" height="270" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="410" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">上涨后</text>
  <circle cx="410" cy="205" r="70" fill="#e2e8f0"/>
  <path d="M410 205 L410 135 A70 70 0 0 1 475 230 Z" fill="#ef4444"/>
  <text x="410" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">9%</text>
  <text x="410" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">超过上限</text>
  <text x="410" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">不因盈利继续加码</text>
  <text x="410" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">先减回计划内</text>

  <rect x="540" y="82" width="210" height="270" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="645" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">下跌后</text>
  <circle cx="645" cy="205" r="70" fill="#e2e8f0"/>
  <path d="M645 205 L645 135 A70 70 0 0 1 662 273 Z" fill="#3b82f6"/>
  <text x="645" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">3%</text>
  <text x="645" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">跌破下限</text>
  <text x="645" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">先复核前提</text>
  <text x="645" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">成立才补回目标</text>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">再平衡的目的: 防止防守仓变成情绪化押注。</text>
</svg>
