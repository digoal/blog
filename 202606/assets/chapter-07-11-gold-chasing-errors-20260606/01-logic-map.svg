<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">追涨黄金的错误链条</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="34" y="78" width="130" height="72" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="99" y="106" text-anchor="middle" font-weight="700">价格大涨</text>
    <text x="99" y="130" text-anchor="middle">新闻很热</text>

    <rect x="196" y="78" width="130" height="72" rx="8" fill="#ffedd5" stroke="#f97316"/>
    <text x="261" y="106" text-anchor="middle" font-weight="700">害怕踏空</text>
    <text x="261" y="130" text-anchor="middle">把情绪当信号</text>

    <rect x="358" y="78" width="130" height="72" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="423" y="106" text-anchor="middle" font-weight="700">一次重仓</text>
    <text x="423" y="130" text-anchor="middle">仓位超过上限</text>

    <rect x="520" y="78" width="130" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="585" y="106" text-anchor="middle" font-weight="700">成本被抬高</text>
    <text x="585" y="130" text-anchor="middle">回撤承受差</text>

    <rect x="650" y="196" width="116" height="76" rx="8" fill="#e2e8f0" stroke="#475569"/>
    <text x="708" y="225" text-anchor="middle" font-weight="700">防守资产</text>
    <text x="708" y="249" text-anchor="middle">变风险源</text>

    <line x1="164" y1="114" x2="194" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="326" y1="114" x2="356" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="488" y1="114" x2="518" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M650 114 C704 130 724 160 716 194" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#064e3b">
    <rect x="70" y="276" width="660" height="72" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="400" y="304" text-anchor="middle" font-weight="700">正确链条：先检查前提，再限定仓位，最后分批执行</text>
    <text x="400" y="330" text-anchor="middle">实际利率 / 避险需求 / 货币信用 → 目标仓位 → 三笔买入 → 定期复盘</text>
  </g>
</svg>
