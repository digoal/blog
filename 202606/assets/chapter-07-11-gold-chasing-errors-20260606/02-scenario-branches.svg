<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">想买黄金时的四种分支</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="310" y="70" width="180" height="58" rx="10" fill="#f1f5f9" stroke="#64748b"/>
    <text x="400" y="104" text-anchor="middle" font-weight="700">我想买黄金</text>

    <rect x="42" y="184" width="166" height="92" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="125" y="212" text-anchor="middle" font-weight="700">两盏灯以上亮</text>
    <text x="125" y="236" text-anchor="middle">无明显溢价</text>
    <text x="125" y="260" text-anchor="middle">按目标仓位分批</text>

    <rect x="226" y="184" width="166" height="92" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="309" y="212" text-anchor="middle" font-weight="700">只有价格上涨</text>
    <text x="309" y="236" text-anchor="middle">前提没确认</text>
    <text x="309" y="260" text-anchor="middle">不追涨</text>

    <rect x="410" y="184" width="166" height="92" rx="8" fill="#fff7ed" stroke="#f97316"/>
    <text x="493" y="212" text-anchor="middle" font-weight="700">仓位已超标</text>
    <text x="493" y="236" text-anchor="middle">上涨带来集中</text>
    <text x="493" y="260" text-anchor="middle">只减不加</text>

    <rect x="594" y="184" width="166" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="677" y="212" text-anchor="middle" font-weight="700">实际利率走强</text>
    <text x="677" y="236" text-anchor="middle">美元走强</text>
    <text x="677" y="260" text-anchor="middle">暂停下一笔</text>

    <path d="M370 128 C310 154 210 160 125 184" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M392 128 C350 150 330 162 309 184" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M420 128 C454 152 476 164 493 184" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M438 128 C518 154 604 162 677 184" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="84" y="322" width="632" height="42" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="400" y="349" text-anchor="middle" font-weight="700">结论：买不买黄金，先由前提决定；买多少黄金，先由仓位上限决定。</text>
  </g>
</svg>
