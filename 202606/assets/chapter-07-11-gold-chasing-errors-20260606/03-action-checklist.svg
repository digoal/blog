<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">反追涨执行表</text>

  <g font-family="Arial, sans-serif" fill="#111827">
    <rect x="54" y="72" width="210" height="260" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="54" y="72" width="210" height="48" rx="10" fill="#dbeafe" stroke="#cbd5e1"/>
    <text x="159" y="102" text-anchor="middle" font-size="18" font-weight="700">买前</text>
    <text x="82" y="150" font-size="15">1. 写清黄金角色</text>
    <text x="82" y="182" font-size="15">2. 检查三盏灯</text>
    <text x="82" y="214" font-size="15">3. 定最高仓位</text>
    <text x="82" y="246" font-size="15">4. 查溢价和价差</text>
    <text x="82" y="278" font-size="15">5. 不用生活钱</text>

    <rect x="295" y="72" width="210" height="260" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="295" y="72" width="210" height="48" rx="10" fill="#dcfce7" stroke="#cbd5e1"/>
    <text x="400" y="102" text-anchor="middle" font-size="18" font-weight="700">买中</text>
    <text x="323" y="150" font-size="15">1. 只买第一笔</text>
    <text x="323" y="182" font-size="15">2. 不因上涨加码</text>
    <text x="323" y="214" font-size="15">3. 不碰高杠杆</text>
    <text x="323" y="246" font-size="15">4. 记录买入理由</text>
    <text x="323" y="278" font-size="15">5. 设置复盘日期</text>

    <rect x="536" y="72" width="210" height="260" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="536" y="72" width="210" height="48" rx="10" fill="#fee2e2" stroke="#cbd5e1"/>
    <text x="641" y="102" text-anchor="middle" font-size="18" font-weight="700">买后</text>
    <text x="564" y="150" font-size="15">1. 前提变坏暂停</text>
    <text x="564" y="182" font-size="15">2. 超仓只做再平衡</text>
    <text x="564" y="214" font-size="15">3. 下跌不自动补仓</text>
    <text x="564" y="246" font-size="15">4. 上涨不改上限</text>
    <text x="564" y="278" font-size="15">5. 复盘是否仍成立</text>
  </g>

  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">防守资产的纪律：先保护组合，再追求收益。</text>
</svg>
