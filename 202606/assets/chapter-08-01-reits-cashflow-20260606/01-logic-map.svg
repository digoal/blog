<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">REITs现金流论证链</title>
  <desc id="desc">基础设施资产产生现金流, 通过公募REITs结构分配给投资者, 但价格和运营变量会改变回报。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">REITs: 买的是基础设施现金流</text>
  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="42" y="88" width="150" height="86" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="117" y="122" text-anchor="middle" font-weight="700" fill="#1e3a8a">基础设施</text>
    <text x="117" y="150" text-anchor="middle" fill="#1f2937">高速/园区/仓储</text>

    <rect x="236" y="88" width="150" height="86" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="311" y="122" text-anchor="middle" font-weight="700" fill="#166534">运营现金流</text>
    <text x="311" y="150" text-anchor="middle" fill="#1f2937">租金/通行费/电费</text>

    <rect x="430" y="88" width="150" height="86" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="505" y="122" text-anchor="middle" font-weight="700" fill="#92400e">基金结构</text>
    <text x="505" y="150" text-anchor="middle" fill="#1f2937">高比例分配</text>

    <rect x="624" y="88" width="136" height="86" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="692" y="122" text-anchor="middle" font-weight="700" fill="#991b1b">投资者回报</text>
    <text x="692" y="150" text-anchor="middle" fill="#1f2937">分红 + 价格变化</text>

    <line x1="192" y1="131" x2="226" y2="131" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="386" y1="131" x2="420" y2="131" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="580" y1="131" x2="614" y2="131" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="72" y="230" width="180" height="94" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="162" y="260" text-anchor="middle" font-weight="700" fill="#0f172a">前提A: 项目能赚钱</text>
    <text x="162" y="286" text-anchor="middle" fill="#475569">出租率、车流量、</text>
    <text x="162" y="310" text-anchor="middle" fill="#475569">收缴率要跟得上</text>

    <rect x="310" y="230" width="180" height="94" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="260" text-anchor="middle" font-weight="700" fill="#0f172a">前提B: 规则要分配</text>
    <text x="400" y="286" text-anchor="middle" fill="#475569">不是保证收益,</text>
    <text x="400" y="310" text-anchor="middle" fill="#475569">是可供分配后再分</text>

    <rect x="548" y="230" width="180" height="94" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="638" y="260" text-anchor="middle" font-weight="700" fill="#0f172a">前提C: 买价要合理</text>
    <text x="638" y="286" text-anchor="middle" fill="#475569">价格越贵,</text>
    <text x="638" y="310" text-anchor="middle" fill="#475569">分派率越被压低</text>
  </g>
</svg>
