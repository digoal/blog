<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">REITs前提变化分支</title>
  <desc id="desc">REITs在现金流、价格和剩余期限变化时的不同操作分支。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提一变, 结论就要重推</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="300" y="70" width="200" height="64" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="400" y="98" text-anchor="middle" font-weight="700" fill="#1e3a8a">买入前的核心问题</text>
    <text x="400" y="120" text-anchor="middle" fill="#1f2937">现金流是否稳定且价格合理?</text>

    <line x1="400" y1="134" x2="400" y2="164" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <rect x="312" y="164" width="176" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="194" text-anchor="middle" font-weight="700" fill="#0f172a">拆成三个前提</text>

    <line x1="400" y1="216" x2="165" y2="260" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="400" y1="216" x2="400" y2="260" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="400" y1="216" x2="635" y2="260" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

    <rect x="50" y="260" width="230" height="96" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="165" y="288" text-anchor="middle" font-weight="700" fill="#166534">现金流稳定</text>
    <text x="165" y="315" text-anchor="middle" fill="#1f2937">出租率/车流量/收缴率正常</text>
    <text x="165" y="340" text-anchor="middle" fill="#1f2937">小仓位配置, 定期复盘</text>

    <rect x="285" y="260" width="230" height="96" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="400" y="288" text-anchor="middle" font-weight="700" fill="#991b1b">现金流变弱</text>
    <text x="400" y="315" text-anchor="middle" fill="#1f2937">收入或可供分配下降</text>
    <text x="400" y="340" text-anchor="middle" fill="#1f2937">暂停加仓, 先查原因</text>

    <rect x="520" y="260" width="230" height="96" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="635" y="288" text-anchor="middle" font-weight="700" fill="#92400e">价格太贵或期限太短</text>
    <text x="635" y="315" text-anchor="middle" fill="#1f2937">分派率被压低或本金回收快</text>
    <text x="635" y="340" text-anchor="middle" fill="#1f2937">等价格, 或改算IRR</text>
  </g>
</svg>
