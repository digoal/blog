<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">REITs买前检查流程</title>
  <desc id="desc">从资产类型、现金流、分配、价格、仓位和复盘六步检查REITs。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">小白买REITs前的六步检查</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="40" y="86" width="205" height="74" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="142" y="116" text-anchor="middle" font-weight="700" fill="#1e3a8a">1. 看资产</text>
    <text x="142" y="140" text-anchor="middle" fill="#1f2937">租金、通行费还是电费?</text>

    <rect x="298" y="86" width="205" height="74" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="400" y="116" text-anchor="middle" font-weight="700" fill="#166534">2. 看经营</text>
    <text x="400" y="140" text-anchor="middle" fill="#1f2937">出租率、车流量、收缴率</text>

    <rect x="556" y="86" width="205" height="74" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="658" y="116" text-anchor="middle" font-weight="700" fill="#92400e">3. 看分配</text>
    <text x="658" y="140" text-anchor="middle" fill="#1f2937">可供分配金额是否稳定?</text>

    <line x1="245" y1="123" x2="288" y2="123" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="503" y1="123" x2="546" y2="123" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="658" y1="160" x2="658" y2="209" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

    <rect x="556" y="210" width="205" height="74" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="658" y="240" text-anchor="middle" font-weight="700" fill="#991b1b">4. 看价格</text>
    <text x="658" y="264" text-anchor="middle" fill="#1f2937">分派率是否被高价压低?</text>

    <rect x="298" y="210" width="205" height="74" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="400" y="240" text-anchor="middle" font-weight="700" fill="#5b21b6">5. 定仓位</text>
    <text x="400" y="264" text-anchor="middle" fill="#1f2937">收益型资产, 不当保本</text>

    <rect x="40" y="210" width="205" height="74" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="142" y="240" text-anchor="middle" font-weight="700" fill="#075985">6. 写复盘</text>
    <text x="142" y="264" text-anchor="middle" fill="#1f2937">前提坏了就换动作</text>

    <line x1="556" y1="247" x2="513" y2="247" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="298" y1="247" x2="255" y2="247" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

    <rect x="110" y="326" width="580" height="42" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="353" text-anchor="middle" font-weight="700" fill="#0f172a">只要有一步说不清, 就先不下单</text>
  </g>
</svg>
