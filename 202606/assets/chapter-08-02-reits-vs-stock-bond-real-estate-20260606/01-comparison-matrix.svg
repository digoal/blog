<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">REITs与股票债券房地产的区别</title>
  <desc id="desc">用权利性质、收益来源和核心风险对比REITs、股票、债券和直接房地产。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">别按名字买, 按“权利”分类</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="36" y="70" width="728" height="302" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <rect x="36" y="70" width="728" height="48" rx="8" fill="#e0f2fe"/>
    <line x1="36" y1="118" x2="764" y2="118" stroke="#94a3b8"/>
    <line x1="36" y1="188" x2="764" y2="188" stroke="#e2e8f0"/>
    <line x1="36" y1="258" x2="764" y2="258" stroke="#e2e8f0"/>
    <line x1="36" y1="328" x2="764" y2="328" stroke="#e2e8f0"/>
    <line x1="150" y1="70" x2="150" y2="372" stroke="#94a3b8"/>
    <line x1="338" y1="70" x2="338" y2="372" stroke="#94a3b8"/>
    <line x1="526" y1="70" x2="526" y2="372" stroke="#94a3b8"/>

    <text x="93" y="100" text-anchor="middle" font-weight="700" fill="#0f172a">品种</text>
    <text x="244" y="100" text-anchor="middle" font-weight="700" fill="#0f172a">你买到什么权利</text>
    <text x="432" y="100" text-anchor="middle" font-weight="700" fill="#0f172a">主要收益来源</text>
    <text x="620" y="100" text-anchor="middle" font-weight="700" fill="#0f172a">最该盯的风险</text>

    <text x="93" y="154" text-anchor="middle" font-weight="700" fill="#1d4ed8">股票</text>
    <text x="244" y="146" text-anchor="middle" fill="#1f2937">公司股东权利</text>
    <text x="244" y="168" text-anchor="middle" fill="#64748b">跟公司价值同涨跌</text>
    <text x="432" y="146" text-anchor="middle" fill="#1f2937">利润增长、分红、估值</text>
    <text x="432" y="168" text-anchor="middle" fill="#64748b">回报没有上限也无保证</text>
    <text x="620" y="146" text-anchor="middle" fill="#1f2937">经营下滑、估值过高</text>
    <text x="620" y="168" text-anchor="middle" fill="#64748b">股价波动和退市</text>

    <text x="93" y="224" text-anchor="middle" font-weight="700" fill="#047857">债券</text>
    <text x="244" y="216" text-anchor="middle" fill="#1f2937">债权人的收款权</text>
    <text x="244" y="238" text-anchor="middle" fill="#64748b">按约定还本付息</text>
    <text x="432" y="216" text-anchor="middle" fill="#1f2937">票息、到期本金</text>
    <text x="432" y="238" text-anchor="middle" fill="#64748b">价格受利率影响</text>
    <text x="620" y="216" text-anchor="middle" fill="#1f2937">违约、利率上行</text>
    <text x="620" y="238" text-anchor="middle" fill="#64748b">流动性不足</text>

    <text x="93" y="294" text-anchor="middle" font-weight="700" fill="#92400e">房地产</text>
    <text x="244" y="286" text-anchor="middle" fill="#1f2937">具体房产或物业控制权</text>
    <text x="244" y="308" text-anchor="middle" fill="#64748b">自己承担买卖和管理</text>
    <text x="432" y="286" text-anchor="middle" fill="#1f2937">租金、房价变化</text>
    <text x="432" y="308" text-anchor="middle" fill="#64748b">交易慢、金额大</text>
    <text x="620" y="286" text-anchor="middle" fill="#1f2937">空置、税费、折价出售</text>
    <text x="620" y="308" text-anchor="middle" fill="#64748b">单一资产集中</text>

    <text x="93" y="354" text-anchor="middle" font-weight="700" fill="#be123c">REITs</text>
    <text x="244" y="348" text-anchor="middle" fill="#1f2937">基金份额背后的项目权益</text>
    <text x="244" y="368" text-anchor="middle" fill="#64748b">不等于一套房或一张借条</text>
    <text x="432" y="348" text-anchor="middle" fill="#1f2937">项目现金流 + 价格变化</text>
    <text x="432" y="368" text-anchor="middle" fill="#64748b">分配不等于固定利息</text>
    <text x="620" y="348" text-anchor="middle" fill="#1f2937">运营、估值、流动性</text>
    <text x="620" y="368" text-anchor="middle" fill="#64748b">买贵会压低回报</text>
  </g>
</svg>
