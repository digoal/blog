<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">REITs分类论证链</title>
  <desc id="desc">REITs的权利性质、现金流来源和上市交易机制共同决定它既不是普通股票、债券，也不是直接买房。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">REITs的三层判断</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="42" y="82" width="205" height="94" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="144" y="112" text-anchor="middle" font-weight="700" fill="#1e3a8a">前提A: 权利不同</text>
    <text x="144" y="139" text-anchor="middle" fill="#1f2937">买基金份额</text>
    <text x="144" y="162" text-anchor="middle" fill="#475569">不是上市公司股票</text>

    <rect x="289" y="82" width="222" height="94" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="400" y="112" text-anchor="middle" font-weight="700" fill="#166534">前提B: 收益不同</text>
    <text x="400" y="139" text-anchor="middle" fill="#1f2937">来自项目经营现金流</text>
    <text x="400" y="162" text-anchor="middle" fill="#475569">不是固定票息</text>

    <rect x="553" y="82" width="205" height="94" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="655" y="112" text-anchor="middle" font-weight="700" fill="#92400e">前提C: 交易不同</text>
    <text x="655" y="139" text-anchor="middle" fill="#1f2937">交易所买卖</text>
    <text x="655" y="162" text-anchor="middle" fill="#475569">不是直接买卖物业</text>

    <line x1="144" y1="176" x2="274" y2="238" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="400" y1="176" x2="400" y2="230" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="655" y1="176" x2="526" y2="238" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="218" y="232" width="364" height="82" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="263" text-anchor="middle" font-weight="700" fill="#0f172a">推导: 不能套用单一品种规则</text>
    <text x="400" y="289" text-anchor="middle" fill="#334155">用股票看成长, 用债券看还本付息, 用房产看自用</text>

    <line x1="400" y1="314" x2="400" y2="342" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <rect x="150" y="342" width="500" height="54" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="400" y="374" text-anchor="middle" font-weight="700" fill="#991b1b">结论: REITs按“现金流稳定性 + 买入价格 + 仓位”决策</text>
  </g>
</svg>
