<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">四类资产选择流程</title>
  <desc id="desc">根据投资目标和风险来源选择股票、债券、直接房地产或REITs。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">买之前先问: 我想赚哪一种钱?</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="292" y="72" width="216" height="62" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="400" y="98" text-anchor="middle" font-weight="700" fill="#1e3a8a">第一问</text>
    <text x="400" y="120" text-anchor="middle" fill="#1f2937">目标是增长、固定利息、收租还是现金流?</text>

    <line x1="400" y1="134" x2="400" y2="166" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
    <rect x="276" y="166" width="248" height="54" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="198" text-anchor="middle" font-weight="700" fill="#0f172a">第二问: 能承受哪种风险?</text>

    <line x1="400" y1="220" x2="110" y2="270" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="400" y1="220" x2="304" y2="270" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="400" y1="220" x2="496" y2="270" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="400" y1="220" x2="690" y2="270" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

    <rect x="34" y="270" width="152" height="90" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="110" y="298" text-anchor="middle" font-weight="700" fill="#1d4ed8">要企业成长</text>
    <text x="110" y="324" text-anchor="middle" fill="#1f2937">研究股票</text>
    <text x="110" y="346" text-anchor="middle" fill="#64748b">接受高波动</text>

    <rect x="228" y="270" width="152" height="90" rx="8" fill="#ecfdf5" stroke="#16a34a"/>
    <text x="304" y="298" text-anchor="middle" font-weight="700" fill="#047857">要还本付息</text>
    <text x="304" y="324" text-anchor="middle" fill="#1f2937">研究债券</text>
    <text x="304" y="346" text-anchor="middle" fill="#64748b">盯信用和利率</text>

    <rect x="420" y="270" width="152" height="90" rx="8" fill="#fff7ed" stroke="#d97706"/>
    <text x="496" y="298" text-anchor="middle" font-weight="700" fill="#92400e">要房产控制</text>
    <text x="496" y="324" text-anchor="middle" fill="#1f2937">研究房地产</text>
    <text x="496" y="346" text-anchor="middle" fill="#64748b">承担低流动性</text>

    <rect x="614" y="270" width="152" height="90" rx="8" fill="#fff1f2" stroke="#e11d48"/>
    <text x="690" y="298" text-anchor="middle" font-weight="700" fill="#be123c">要项目现金流</text>
    <text x="690" y="324" text-anchor="middle" fill="#1f2937">研究REITs</text>
    <text x="690" y="346" text-anchor="middle" fill="#64748b">盯运营和价格</text>
  </g>
</svg>
