<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">REITs收益来源拆解</title>
  <desc id="desc">REITs总回报由现金分配、资产运营和估值变化三部分共同决定。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">REITs总回报: 三个账本一起看</text>

  <rect x="64" y="84" width="190" height="108" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="159" y="118" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">现金分配</text>
  <text x="159" y="148" text-anchor="middle" font-size="15" fill="#1e40af">来自可供分配金额</text>
  <text x="159" y="174" text-anchor="middle" font-size="15" fill="#1e40af">不是固定利息</text>

  <rect x="305" y="84" width="190" height="108" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">资产运营</text>
  <text x="400" y="148" text-anchor="middle" font-size="15" fill="#166534">出租率/车流量</text>
  <text x="400" y="174" text-anchor="middle" font-size="15" fill="#166534">收入和收缴率</text>

  <rect x="546" y="84" width="190" height="108" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="641" y="118" text-anchor="middle" font-size="20" font-weight="700" fill="#7c2d12">估值变化</text>
  <text x="641" y="148" text-anchor="middle" font-size="15" fill="#9a3412">价格上涨或下跌</text>
  <text x="641" y="174" text-anchor="middle" font-size="15" fill="#9a3412">会放大也会吞掉收益</text>

  <path d="M159 196 V248 H362" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 196 V248" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M641 196 V248 H438" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="240" y="260" width="320" height="84" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">买入前结论</text>
  <text x="400" y="324" text-anchor="middle" font-size="16" fill="#334155">先确认现金流, 再判断价格是否合理</text>

  <text x="400" y="382" text-anchor="middle" font-size="15" fill="#64748b">高分红只是结果, 不是买入理由; 运营和估值决定它能不能持续。</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
