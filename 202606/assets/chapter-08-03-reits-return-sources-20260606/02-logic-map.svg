<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">REITs收益来源论证链</title>
  <desc id="desc">展示从制度分配、底层现金流、运营变化和二级市场价格到操作结论的因果路径。</desc>
  <rect width="800" height="450" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 收益先拆来源, 再决定动作</text>

  <rect x="38" y="78" width="160" height="86" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="118" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#312e81">前提A</text>
  <text x="118" y="134" text-anchor="middle" font-size="14" fill="#3730a3">高比例分配规则</text>
  <text x="118" y="154" text-anchor="middle" font-size="13" fill="#3730a3">相对稳定</text>

  <rect x="228" y="78" width="160" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="308" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提B</text>
  <text x="308" y="134" text-anchor="middle" font-size="14" fill="#1e40af">底层资产现金流</text>
  <text x="308" y="154" text-anchor="middle" font-size="13" fill="#1e40af">会变化</text>

  <rect x="418" y="78" width="160" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="498" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提C</text>
  <text x="498" y="134" text-anchor="middle" font-size="14" fill="#166534">运营质量变化</text>
  <text x="498" y="154" text-anchor="middle" font-size="13" fill="#166534">可改善也可恶化</text>

  <rect x="608" y="78" width="160" height="86" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="688" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">前提D</text>
  <text x="688" y="134" text-anchor="middle" font-size="14" fill="#9a3412">交易价格波动</text>
  <text x="688" y="154" text-anchor="middle" font-size="13" fill="#9a3412">每日变化</text>

  <path d="M118 166 V218 H330" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M308 166 V218 H350" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M498 166 V218 H450" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M688 166 V218 H470" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="285" y="224" width="230" height="96" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="286" text-anchor="middle" font-size="15" fill="#334155">分红来自经营结果</text>
  <text x="400" y="308" text-anchor="middle" font-size="15" fill="#334155">价格决定买到的回报</text>

  <path d="M400 322 V360" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="195" y="368" width="410" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">操作结论</text>
  <text x="400" y="416" text-anchor="middle" font-size="15" fill="#92400e">现金流真实 + 运营不坏 + 价格未透支, 才能小仓位买</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
