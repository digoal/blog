<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">REITs收益来源情景分支</title>
  <desc id="desc">展示现金流、运营和估值变化时对应的买入、等待、暂停和减仓动作。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化后, 操作要跟着变</text>

  <rect x="278" y="70" width="244" height="72" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">先问三件事</text>
  <text x="400" y="126" text-anchor="middle" font-size="15" fill="#334155">分红来源 / 运营趋势 / 当前价格</text>

  <path d="M400 144 V180" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M400 180 H143 V214" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 180 H400 V214" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 180 H657 V214" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="42" y="222" width="202" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="143" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">现金流稳</text>
  <text x="143" y="278" text-anchor="middle" font-size="14" fill="#166534">出租率和收入达标</text>
  <text x="143" y="302" text-anchor="middle" font-size="14" fill="#166534">价格没有明显追高</text>
  <text x="143" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">小仓位分批</text>

  <rect x="299" y="222" width="202" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">运营变弱</text>
  <text x="400" y="278" text-anchor="middle" font-size="14" fill="#991b1b">现金流完成度下降</text>
  <text x="400" y="302" text-anchor="middle" font-size="14" fill="#991b1b">高分红可能是表象</text>
  <text x="400" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">暂停加仓</text>

  <rect x="556" y="222" width="202" height="110" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="657" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">估值过热</text>
  <text x="657" y="278" text-anchor="middle" font-size="14" fill="#9a3412">价格涨快于分配</text>
  <text x="657" y="302" text-anchor="middle" font-size="14" fill="#9a3412">未来回报被压缩</text>
  <text x="657" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">等待回落</text>

  <rect x="162" y="362" width="476" height="44" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="390" text-anchor="middle" font-size="16" font-weight="700" fill="#312e81">季度复盘: 如果三件事任意一件失效, 买入理由就要重写</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
