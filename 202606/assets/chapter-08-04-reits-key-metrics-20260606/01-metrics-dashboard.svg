<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">REITs四个关键指标仪表盘</title>
  <desc id="desc">分派率、出租率、收费权和剩余期限分别对应价格、经营、权利类型和时间四个维度。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">REITs四个关键指标不是并列排名</text>
  <text x="400" y="70" text-anchor="middle" font-size="15" fill="#475569">它们分别回答: 买贵了吗、现金流稳吗、权利是什么、还能收多久</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="45" y="115" width="330" height="115" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="210" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">分派率</text>
    <text x="210" y="176" text-anchor="middle" fill="#1f2937">分配金额 / 买入价格</text>
    <text x="210" y="202" text-anchor="middle" fill="#475569">看的是价格补偿, 不是安全承诺</text>

    <rect x="425" y="115" width="330" height="115" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="590" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">出租率</text>
    <text x="590" y="176" text-anchor="middle" fill="#1f2937">已出租面积 / 可出租面积</text>
    <text x="590" y="202" text-anchor="middle" fill="#475569">看的是现金流发动机有没有空转</text>

    <rect x="45" y="265" width="330" height="115" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="210" y="295" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">收费权</text>
    <text x="210" y="326" text-anchor="middle" fill="#1f2937">经营权、特许经营权、产权</text>
    <text x="210" y="352" text-anchor="middle" fill="#475569">先分清你收的是租金还是过路费</text>

    <rect x="425" y="265" width="330" height="115" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="590" y="295" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">剩余期限</text>
    <text x="590" y="326" text-anchor="middle" fill="#1f2937">土地、租约、收费期限还剩多久</text>
    <text x="590" y="352" text-anchor="middle" fill="#475569">时间越短, 越不能只看当年分红</text>
  </g>
</svg>
