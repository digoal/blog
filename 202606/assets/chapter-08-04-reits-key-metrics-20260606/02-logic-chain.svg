<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">REITs关键指标论证链</title>
  <desc id="desc">从收费权和剩余期限确定资产类型, 再用出租率验证经营现金流, 最后用分派率判断价格补偿。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">先看资产, 再看经营, 最后才看分派率</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="40" y="105" width="145" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="112" y="137" text-anchor="middle" font-weight="700" fill="#92400e">收费权</text>
    <text x="112" y="164" text-anchor="middle" fill="#1f2937">靠什么收钱</text>

    <rect x="230" y="105" width="145" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="302" y="137" text-anchor="middle" font-weight="700" fill="#991b1b">剩余期限</text>
    <text x="302" y="164" text-anchor="middle" fill="#1f2937">还能收多久</text>

    <rect x="420" y="105" width="145" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="492" y="137" text-anchor="middle" font-weight="700" fill="#166534">出租率</text>
    <text x="492" y="164" text-anchor="middle" fill="#1f2937">现金流稳不稳</text>

    <rect x="610" y="105" width="145" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="682" y="137" text-anchor="middle" font-weight="700" fill="#1e3a8a">分派率</text>
    <text x="682" y="164" text-anchor="middle" fill="#1f2937">价格补偿够不够</text>

    <line x1="185" y1="150" x2="220" y2="150" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="375" y1="150" x2="410" y2="150" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="565" y1="150" x2="600" y2="150" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="70" y="265" width="660" height="82" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.8"/>
    <text x="400" y="297" text-anchor="middle" font-weight="700" fill="#0f172a">正常结论</text>
    <text x="400" y="324" text-anchor="middle" fill="#334155">权利清楚 + 期限足够 + 经营稳定 + 价格合理</text>
    <text x="400" y="350" text-anchor="middle" fill="#334155">才允许进入观察仓; 任一前提坏掉, 先停止加仓</text>
    <line x1="400" y1="198" x2="400" y2="255" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  </g>
</svg>
