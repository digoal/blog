<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">REITs指标情景分支</title>
  <desc id="desc">不同指标组合对应买入、观察、暂停和回避四类操作。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">同一个分派率, 四种完全不同的动作</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="310" y="78" width="180" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="400" y="105" text-anchor="middle" font-weight="700" fill="#1e3a8a">看到高分派率</text>
    <text x="400" y="127" text-anchor="middle" fill="#1f2937">先别急着买</text>

    <rect x="50" y="205" width="160" height="98" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="130" y="234" text-anchor="middle" font-weight="700" fill="#166534">经营稳定</text>
    <text x="130" y="259" text-anchor="middle" fill="#1f2937">期限足够</text>
    <text x="130" y="284" text-anchor="middle" fill="#1f2937">小仓观察</text>

    <rect x="230" y="205" width="160" height="98" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="310" y="234" text-anchor="middle" font-weight="700" fill="#92400e">经营稳定</text>
    <text x="310" y="259" text-anchor="middle" fill="#1f2937">价格追高</text>
    <text x="310" y="284" text-anchor="middle" fill="#1f2937">等待回报修复</text>

    <rect x="410" y="205" width="160" height="98" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="490" y="234" text-anchor="middle" font-weight="700" fill="#991b1b">出租率下滑</text>
    <text x="490" y="259" text-anchor="middle" fill="#1f2937">分配承压</text>
    <text x="490" y="284" text-anchor="middle" fill="#1f2937">暂停加仓</text>

    <rect x="590" y="205" width="160" height="98" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="670" y="234" text-anchor="middle" font-weight="700" fill="#5b21b6">期限偏短</text>
    <text x="670" y="259" text-anchor="middle" fill="#1f2937">回收压力大</text>
    <text x="670" y="284" text-anchor="middle" fill="#1f2937">看IRR不看表面息</text>

    <line x1="365" y1="143" x2="150" y2="196" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="390" y1="143" x2="315" y2="196" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="420" y1="143" x2="485" y2="196" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <line x1="445" y1="143" x2="650" y2="196" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

    <rect x="105" y="344" width="590" height="42" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="371" text-anchor="middle" font-weight="700" fill="#0f172a">高分派率只是入口, 不是结论</text>
  </g>
</svg>
