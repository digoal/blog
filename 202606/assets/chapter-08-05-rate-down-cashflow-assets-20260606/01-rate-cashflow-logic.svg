<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="利率下行与现金流资产论证链">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">利率下行不是买入信号, 是估值压力下降的前提之一</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="40" y="82" width="160" height="86" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="120" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#075985">前提A</text>
  <text x="120" y="140" text-anchor="middle" font-size="15" fill="#0f172a">市场利率下行</text>
  <rect x="230" y="82" width="170" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="315" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">前提B</text>
  <text x="315" y="140" text-anchor="middle" font-size="15" fill="#0f172a">现金流资产更有吸引力</text>
  <rect x="430" y="82" width="160" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="510" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#c2410c">前提C</text>
  <text x="510" y="140" text-anchor="middle" font-size="15" fill="#0f172a">底层现金流稳定</text>
  <rect x="620" y="82" width="140" height="86" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="690" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="690" y="140" text-anchor="middle" font-size="15" fill="#0f172a">价格没有抢贵</text>
  <line x1="200" y1="125" x2="226" y2="125" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="125" x2="426" y2="125" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="125" x2="616" y2="125" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="128" y="232" width="500" height="84" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="378" y="265" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">正常情景结论</text>
  <text x="378" y="292" text-anchor="middle" font-size="16" fill="#0f172a">利率下行 + 现金流稳 + 价格合理 = 小仓位、分批、季度复盘</text>
  <line x1="378" y1="168" x2="378" y2="228" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="80" y="354" width="300" height="44" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="230" y="382" text-anchor="middle" font-size="15" fill="#991b1b">现金流恶化: 高分派率可能是陷阱</text>
  <rect x="420" y="354" width="300" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="570" y="382" text-anchor="middle" font-size="15" fill="#92400e">价格过热: 不追高, 等回报修复</text>
  <line x1="300" y1="316" x2="240" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="316" x2="560" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
