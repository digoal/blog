<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="利率与现金流情景矩阵">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">四种情景: 不同环境对应不同动作</text>
  <line x1="140" y1="210" x2="720" y2="210" stroke="#334155" stroke-width="3"/>
  <line x1="410" y1="80" x2="410" y2="350" stroke="#334155" stroke-width="3"/>
  <text x="410" y="384" text-anchor="middle" font-size="17" fill="#334155">市场利率方向</text>
  <text x="155" y="384" text-anchor="middle" font-size="15" fill="#334155">上行</text>
  <text x="665" y="384" text-anchor="middle" font-size="15" fill="#334155">下行</text>
  <text x="62" y="215" text-anchor="middle" font-size="17" fill="#334155" transform="rotate(-90 62 215)">现金流状态</text>
  <text x="94" y="112" text-anchor="middle" font-size="15" fill="#334155">稳定</text>
  <text x="94" y="308" text-anchor="middle" font-size="15" fill="#334155">变弱</text>
  <rect x="430" y="94" width="250" height="112" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="555" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">适合观察/配置</text>
  <text x="555" y="157" text-anchor="middle" font-size="15" fill="#14532d">低利率提高吸引力</text>
  <text x="555" y="183" text-anchor="middle" font-size="15" fill="#14532d">但仍需价格闸门</text>
  <rect x="155" y="94" width="250" height="112" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="280" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#075985">只看现金流</text>
  <text x="280" y="157" text-anchor="middle" font-size="15" fill="#0c4a6e">利率上行压估值</text>
  <text x="280" y="183" text-anchor="middle" font-size="15" fill="#0c4a6e">仓位不主动放大</text>
  <rect x="430" y="226" width="250" height="112" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="555" y="260" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">暂停追买</text>
  <text x="555" y="289" text-anchor="middle" font-size="15" fill="#78350f">利率利好抵不过经营变差</text>
  <text x="555" y="315" text-anchor="middle" font-size="15" fill="#78350f">先查公告和分配来源</text>
  <rect x="155" y="226" width="250" height="112" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="280" y="260" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">风险区</text>
  <text x="280" y="289" text-anchor="middle" font-size="15" fill="#7f1d1d">估值压力和经营压力叠加</text>
  <text x="280" y="315" text-anchor="middle" font-size="15" fill="#7f1d1d">停止加仓, 检查减仓条件</text>
</svg>
