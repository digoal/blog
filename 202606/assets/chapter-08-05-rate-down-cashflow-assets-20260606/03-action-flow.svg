<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-label="现金流资产买入流程">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">买入前五步: 先过闸门, 再谈仓位</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="58" y="88" width="130" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="123" y="119" text-anchor="middle" font-weight="700">1. 看利率</text>
    <text x="123" y="145" text-anchor="middle">是否真的下行</text>
    <line x1="188" y1="127" x2="226" y2="127" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="230" y="88" width="130" height="78" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="295" y="119" text-anchor="middle" font-weight="700">2. 看现金流</text>
    <text x="295" y="145" text-anchor="middle">收入能否持续</text>
    <line x1="360" y1="127" x2="398" y2="127" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="402" y="88" width="130" height="78" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="467" y="119" text-anchor="middle" font-weight="700">3. 看价格</text>
    <text x="467" y="145" text-anchor="middle">回报是否被压低</text>
    <line x1="532" y1="127" x2="570" y2="127" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="574" y="88" width="130" height="78" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
    <text x="639" y="119" text-anchor="middle" font-weight="700">4. 定仓位</text>
    <text x="639" y="145" text-anchor="middle">小仓位分批</text>
  </g>
  <line x1="639" y1="166" x2="639" y2="224" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="500" y="228" width="278" height="74" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="639" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">5. 季度复盘</text>
  <text x="639" y="282" text-anchor="middle" font-size="15" fill="#334155">利率、现金流、价格任一变化都重算</text>
  <rect x="70" y="230" width="360" height="96" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="262" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">任一闸门没过</text>
  <text x="250" y="289" text-anchor="middle" font-size="15" fill="#7f1d1d">现金流看不懂、分配下降、价格过热</text>
  <text x="250" y="314" text-anchor="middle" font-size="15" fill="#7f1d1d">动作: 不买、不补、先读公告</text>
  <line x1="467" y1="166" x2="300" y2="226" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="145" y="360" width="510" height="48" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="400" y="390" text-anchor="middle" font-size="16" fill="#0f172a">核心: 利率只决定风向, 现金流和价格决定能不能下手</text>
</svg>
