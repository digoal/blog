<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化后的操作分支</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="290" y="72" width="220" height="64" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">准备买入REITs</text>
  <text x="400" y="121" text-anchor="middle" font-size="13" fill="#334155">先问: 哪个前提变了?</text>
  <rect x="40" y="196" width="160" height="94" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="120" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">经营变弱</text>
  <text x="120" y="249" text-anchor="middle" font-size="13" fill="#475569">收入或可分配下降</text>
  <text x="120" y="272" text-anchor="middle" font-size="13" fill="#991b1b">暂停加仓</text>
  <rect x="230" y="196" width="160" height="94" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="310" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">价格买贵</text>
  <text x="310" y="249" text-anchor="middle" font-size="13" fill="#475569">分派率被压低</text>
  <text x="310" y="272" text-anchor="middle" font-size="13" fill="#9a3412">等回报修复</text>
  <rect x="420" y="196" width="160" height="94" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="500" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">成交太薄</text>
  <text x="500" y="249" text-anchor="middle" font-size="13" fill="#475569">卖出冲击大</text>
  <text x="500" y="272" text-anchor="middle" font-size="13" fill="#854d0e">降低仓位上限</text>
  <rect x="610" y="196" width="150" height="94" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="685" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">政策重定价</text>
  <text x="685" y="249" text-anchor="middle" font-size="13" fill="#475569">规则或期限变化</text>
  <text x="685" y="272" text-anchor="middle" font-size="13" fill="#047857">重读公告</text>
  <line x1="372" y1="136" x2="120" y2="187" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="392" y1="136" x2="310" y2="187" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="414" y1="136" x2="500" y2="187" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="432" y1="136" x2="685" y2="187" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="190" y="338" width="420" height="48" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="367" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">四个前提都稳定: 只做小仓位、分批买、季度复盘</text>
</svg>
