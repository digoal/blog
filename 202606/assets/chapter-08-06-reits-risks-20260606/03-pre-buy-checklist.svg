<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">REITs买前四闸门</text>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="62" y="82" width="154" height="86" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="139" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">1 经营闸门</text>
  <text x="139" y="138" text-anchor="middle" font-size="13" fill="#334155">收入和可分配</text>
  <text x="139" y="156" text-anchor="middle" font-size="13" fill="#334155">没有连续恶化</text>
  <rect x="246" y="82" width="154" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="323" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">2 价格闸门</text>
  <text x="323" y="138" text-anchor="middle" font-size="13" fill="#334155">分派率不是</text>
  <text x="323" y="156" text-anchor="middle" font-size="13" fill="#334155">跌出来的陷阱</text>
  <rect x="430" y="82" width="154" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="507" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">3 流动性闸门</text>
  <text x="507" y="138" text-anchor="middle" font-size="13" fill="#334155">成交量够用</text>
  <text x="507" y="156" text-anchor="middle" font-size="13" fill="#334155">价差不夸张</text>
  <rect x="614" y="82" width="132" height="86" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="680" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">4 政策闸门</text>
  <text x="680" y="138" text-anchor="middle" font-size="13" fill="#334155">公告没有</text>
  <text x="680" y="156" text-anchor="middle" font-size="13" fill="#334155">重大不利变化</text>
  <line x1="216" y1="125" x2="237" y2="125" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow3)"/>
  <line x1="400" y1="125" x2="421" y2="125" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow3)"/>
  <line x1="584" y1="125" x2="605" y2="125" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow3)"/>
  <rect x="110" y="230" width="580" height="116" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="263" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">通过: 观察仓不超过账户2%至3%</text>
  <text x="400" y="294" text-anchor="middle" font-size="15" fill="#334155">任一闸门没过: 不补仓, 先读公告和季报</text>
  <text x="400" y="322" text-anchor="middle" font-size="15" fill="#334155">两个季度确认稳定后, 再考虑提高到收益型资产仓位</text>
  <text x="400" y="386" text-anchor="middle" font-size="14" fill="#64748b">核心原则: 风险先过闸门, 收益才有讨论价值</text>
</svg>
