  <rect x="42" y="88" width="150" height="82" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="117" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">利润真实</text>
  <text x="117" y="145" text-anchor="middle" font-size="14" fill="#374151">主业能赚钱</text>

  <rect x="232" y="88" width="150" height="82" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="307" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">现金流够</text>
  <text x="307" y="145" text-anchor="middle" font-size="14" fill="#374151">有钱可分</text>

  <rect x="422" y="88" width="150" height="82" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="2"/>
  <text x="497" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#6b21a8">分红稳定</text>
  <text x="497" y="145" text-anchor="middle" font-size="14" fill="#374151">规则能延续</text>

  <rect x="612" y="88" width="150" height="82" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="687" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">价格合理</text>
  <text x="687" y="145" text-anchor="middle" font-size="14" fill="#374151">没被买贵</text>

  <path d="M192 129 H232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M382 129 H422" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M572 129 H612" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M687 170 C687 220 570 236 505 254" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="236" y="246" width="328" height="94" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="282" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">正常结论</text>
  <text x="400" y="312" text-anchor="middle" font-size="16" fill="#14532d">小仓位作为收益型资产</text>

  <line x1="128" y1="170" x2="255" y2="246" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-red)"/>
  <text x="112" y="225" font-size="14" fill="#b91c1c">任一前提坏掉</text>
  <text x="112" y="247" font-size="14" fill="#b91c1c">高股息变陷阱</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
