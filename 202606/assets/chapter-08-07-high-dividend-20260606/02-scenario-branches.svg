<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">同样是高股息，结论可能完全相反</text>

  <rect x="278" y="72" width="244" height="64" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">先问：股息率为什么高？</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" fill="#475569">股息率 = 每股分红 / 股价</text>

  <path d="M400 136 V174" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 174 H155 V206" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 174 H400 V206" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 174 H645 V206" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="206" width="190" height="100" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="155" y="238" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">现金流稳定</text>
  <text x="155" y="264" text-anchor="middle" font-size="14" fill="#14532d">利润和分红都能跟上</text>
  <text x="155" y="288" text-anchor="middle" font-size="14" fill="#14532d">结论：可纳入收益仓</text>

  <rect x="305" y="206" width="190" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="238" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">股价下跌</text>
  <text x="400" y="264" text-anchor="middle" font-size="14" fill="#9a3412">分红没变但风险上升</text>
  <text x="400" y="288" text-anchor="middle" font-size="14" fill="#9a3412">结论：先查原因</text>

  <rect x="550" y="206" width="190" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="645" y="238" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">利润下滑</text>
  <text x="645" y="264" text-anchor="middle" font-size="14" fill="#991b1b">分红可能不可持续</text>
  <text x="645" y="288" text-anchor="middle" font-size="14" fill="#991b1b">结论：警惕陷阱</text>

  <rect x="94" y="344" width="612" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="400" y="373" text-anchor="middle" font-size="16" fill="#334155">操作原则：先验证分红来源，再判断价格便宜，不把软件显示的高股息率当结论</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
