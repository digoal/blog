<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">高股息资产买前四步检查</text>

  <rect x="86" y="82" width="628" height="56" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="116" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">第一步：看利润是不是稳定来自主业</text>

  <path d="M400 138 V168" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="86" y="168" width="628" height="56" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="202" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">第二步：看经营现金流是否覆盖分红</text>

  <path d="M400 224 V254" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="86" y="254" width="628" height="56" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="2"/>
  <text x="400" y="288" text-anchor="middle" font-size="18" font-weight="700" fill="#6b21a8">第三步：看分红政策是否连续、不过度透支</text>

  <path d="M400 310 V340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="86" y="340" width="628" height="56" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="374" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">第四步：看价格有没有把未来回报买贵</text>

  <path d="M188 396 C188 428 280 430 330 430" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M612 396 C612 428 520 430 470 430" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <text x="250" y="436" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">全部通过：小仓位分批</text>
  <text x="550" y="436" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">任一不通过：暂停买入</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
