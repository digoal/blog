<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">红利ETF vs 单只高股息股票: 核心逻辑</text>
  <rect x="40" y="80" width="200" height="88" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#075985">前提A</text>
  <text x="140" y="140" text-anchor="middle" font-size="15" fill="#0f172a">收益 = 股息 + 价格变化</text>
  <rect x="300" y="80" width="200" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">前提B</text>
  <text x="400" y="140" text-anchor="middle" font-size="15" fill="#0f172a">单家公司分红会变化</text>
  <rect x="560" y="80" width="200" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="660" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">前提C</text>
  <text x="660" y="140" text-anchor="middle" font-size="15" fill="#0f172a">ETF用规则分散个股风险</text>
  <path d="M240 124 L300 124" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 124 L560 124" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="220" width="440" height="90" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="253" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="281" text-anchor="middle" font-size="15" fill="#0f172a">因为单股分红和股价都可能变, 所以小白先买一篮子</text>
  <path d="M400 168 L400 220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="338" width="250" height="40" rx="8" fill="#0369a1"/>
  <text x="245" y="364" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">红利ETF: 核心收益仓</text>
  <rect x="430" y="338" width="250" height="40" rx="8" fill="#b45309"/>
  <text x="555" y="364" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">单只高股息股: 小卫星仓</text>
  <path d="M340 310 L260 338" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M460 310 L540 338" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
