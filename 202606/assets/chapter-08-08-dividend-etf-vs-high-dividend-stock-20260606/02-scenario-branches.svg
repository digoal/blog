<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">三种情景: 该买ETF、股票, 还是都不买?</text>
  <rect x="300" y="70" width="200" height="56" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">想配置高股息资产</text>
  <path d="M400 126 L160 174" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 126 L400 174" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 126 L640 174" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="174" width="240" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="204" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">没有精力研究公司</text>
  <text x="160" y="232" text-anchor="middle" font-size="14" fill="#0f172a">只想要风格暴露和分散</text>
  <text x="160" y="254" text-anchor="middle" font-size="14" fill="#0f172a">动作: 红利ETF优先</text>
  <rect x="280" y="174" width="240" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">能读财报和公告</text>
  <text x="400" y="232" text-anchor="middle" font-size="14" fill="#0f172a">利润、现金流、负债通过</text>
  <text x="400" y="254" text-anchor="middle" font-size="14" fill="#0f172a">动作: 单股小仓位试错</text>
  <rect x="520" y="174" width="240" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="204" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">股息率靠暴跌变高</text>
  <text x="640" y="232" text-anchor="middle" font-size="14" fill="#0f172a">利润下滑或行业反转</text>
  <text x="640" y="254" text-anchor="middle" font-size="14" fill="#0f172a">动作: 先停手反查</text>
  <path d="M160 266 L160 322" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 266 L400 322" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M640 266 L640 322" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="50" y="322" width="220" height="58" rx="8" fill="#1d4ed8"/>
  <text x="160" y="356" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">账户5%-10%上限</text>
  <rect x="290" y="322" width="220" height="58" rx="8" fill="#15803d"/>
  <text x="400" y="356" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">单股不超过2%-3%</text>
  <rect x="530" y="322" width="220" height="58" rx="8" fill="#b91c1c"/>
  <text x="640" y="356" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">不补仓, 查原因</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
