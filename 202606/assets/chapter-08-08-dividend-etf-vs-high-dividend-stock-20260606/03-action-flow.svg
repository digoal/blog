<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">小白配置高股息资产的操作流程</text>
  <rect x="70" y="72" width="660" height="56" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">第一步: 先定功能 - 收益型权益资产, 不是保本资产</text>
  <path d="M400 128 L400 164" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="164" width="660" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="194" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">第二步: 默认先筛红利ETF</text>
  <text x="400" y="218" text-anchor="middle" font-size="14" fill="#0f172a">看指数规则、规模成交、买卖价差、行业集中、估值和股息率</text>
  <path d="M400 234 L400 270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="270" width="310" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="225" y="300" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">ETF通过</text>
  <text x="225" y="326" text-anchor="middle" font-size="14" fill="#0f172a">分批买, 单类资产设上限</text>
  <rect x="420" y="270" width="310" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="575" y="300" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">还想买单股</text>
  <text x="575" y="326" text-anchor="middle" font-size="14" fill="#0f172a">利润、现金流、负债、分红政策再过关</text>
  <path d="M225 350 L225 386" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M575 350 L575 386" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="386" width="290" height="34" rx="8" fill="#0369a1"/>
  <text x="225" y="409" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">ETF做核心: 账户5%-10%内</text>
  <rect x="430" y="386" width="290" height="34" rx="8" fill="#b45309"/>
  <text x="575" y="409" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">单股做卫星: 单只2%-3%内</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
