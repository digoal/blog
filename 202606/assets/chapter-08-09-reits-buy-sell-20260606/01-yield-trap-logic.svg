<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" fill="#111827" font-weight="700">REITs买入卖出: 分派率只是结果, 不是决策按钮</text>

  <rect x="38" y="78" width="160" height="76" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="118" y="108" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">可供分配金额</text>
  <text x="118" y="132" text-anchor="middle" font-size="14" fill="#374151">来自项目现金流</text>

  <rect x="38" y="222" width="160" height="76" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="118" y="252" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">当前交易价格</text>
  <text x="118" y="276" text-anchor="middle" font-size="14" fill="#374151">由市场重新定价</text>

  <rect x="284" y="145" width="190" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="379" y="178" text-anchor="middle" font-size="18" fill="#111827" font-weight="700">表面分派率</text>
  <text x="379" y="205" text-anchor="middle" font-size="14" fill="#374151">过去分配 / 当前价格</text>

  <rect x="555" y="66" width="168" height="58" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="639" y="101" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">现金流是否稳定</text>
  <rect x="555" y="142" width="168" height="58" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="639" y="177" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">价格补偿是否够</text>
  <rect x="555" y="218" width="168" height="58" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="639" y="253" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">流动性是否支撑</text>
  <rect x="555" y="294" width="168" height="58" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="639" y="329" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">仓位角色是否清楚</text>

  <line x1="198" y1="116" x2="284" y2="166" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="198" y1="260" x2="284" y2="209" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="474" y1="188" x2="540" y2="188" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="501" y="177" text-anchor="middle" font-size="14" fill="#2563eb">反查</text>

  <path d="M723 95 C760 120, 760 300, 723 323" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="740" y="207" font-size="15" fill="#16a34a" font-weight="700">四项通过才买入</text>

  <rect x="300" y="316" width="184" height="46" rx="8" fill="#fff7ed" stroke="#dc2626" stroke-width="2"/>
  <text x="392" y="345" text-anchor="middle" font-size="15" fill="#dc2626" font-weight="700">任一核心前提失效: 暂停或卖出</text>
</svg>
