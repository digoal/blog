<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" fill="#111827" font-weight="700">分派率变化后的四种操作分支</text>

  <rect x="296" y="70" width="208" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">看到分派率变化</text>
  <text x="400" y="124" text-anchor="middle" font-size="14" fill="#374151">先问分子变了还是分母变了</text>

  <rect x="38" y="220" width="170" height="92" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="123" y="248" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">分配增长</text>
  <text x="123" y="272" text-anchor="middle" font-size="14" fill="#374151">经营指标同步改善</text>
  <text x="123" y="296" text-anchor="middle" font-size="14" fill="#16a34a" font-weight="700">小仓位分批买</text>

  <rect x="226" y="220" width="170" height="92" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="311" y="248" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">价格下跌</text>
  <text x="311" y="272" text-anchor="middle" font-size="14" fill="#374151">现金流也变弱</text>
  <text x="311" y="296" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">不补仓, 先排雷</text>

  <rect x="414" y="220" width="170" height="92" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="499" y="248" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">价格上涨</text>
  <text x="499" y="272" text-anchor="middle" font-size="14" fill="#374151">现金流没有同步涨</text>
  <text x="499" y="296" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">不追高, 等补偿</text>

  <rect x="602" y="220" width="170" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="687" y="248" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">价格合理</text>
  <text x="687" y="272" text-anchor="middle" font-size="14" fill="#374151">但成交太弱</text>
  <text x="687" y="296" text-anchor="middle" font-size="14" fill="#2563eb" font-weight="700">降仓位, 不短炒</text>

  <line x1="360" y1="140" x2="124" y2="220" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="384" y1="140" x2="312" y2="220" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="418" y1="140" x2="500" y2="220" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="140" x2="686" y2="220" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="400" y="360" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">核心: 高分派率只有一种好情况, 就是现金流变好; 靠价格下跌算出来的高分派率要先查风险。</text>
</svg>
