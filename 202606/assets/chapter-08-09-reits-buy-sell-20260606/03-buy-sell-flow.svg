<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" fill="#111827" font-weight="700">REITs买入、持有、卖出流程</text>

  <rect x="38" y="82" width="150" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="113" y="111" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">1. 查现金流</text>
  <text x="113" y="136" text-anchor="middle" font-size="13" fill="#374151">收入和可分配金额</text>

  <rect x="224" y="82" width="150" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="299" y="111" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">2. 算价格补偿</text>
  <text x="299" y="136" text-anchor="middle" font-size="13" fill="#374151">分派率或IRR</text>

  <rect x="410" y="82" width="150" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="485" y="111" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">3. 看流动性</text>
  <text x="485" y="136" text-anchor="middle" font-size="13" fill="#374151">成交额和价差</text>

  <rect x="596" y="82" width="150" height="74" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="671" y="111" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">4. 定仓位</text>
  <text x="671" y="136" text-anchor="middle" font-size="13" fill="#374151">收益型资产上限</text>

  <line x1="188" y1="119" x2="224" y2="119" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="374" y1="119" x2="410" y2="119" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="119" x2="596" y2="119" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="110" y="230" width="220" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="220" y="260" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">持有: 按季度复盘</text>
  <text x="220" y="285" text-anchor="middle" font-size="14" fill="#374151">经营没坏, 价格没过热, 继续持有</text>

  <rect x="470" y="230" width="220" height="76" rx="8" fill="#fff7ed" stroke="#dc2626" stroke-width="2"/>
  <text x="580" y="260" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">卖出: 三个触发器</text>
  <text x="580" y="285" text-anchor="middle" font-size="14" fill="#374151">现金流坏 / 买贵 / 仓位超标</text>

  <line x1="671" y1="156" x2="580" y2="230" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="671" y1="156" x2="220" y2="230" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="268" x2="470" y2="268" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="400" y="356" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">不要把REITs当现金管理: 买入看补偿, 持有看前提, 卖出看失效条件。</text>
</svg>
