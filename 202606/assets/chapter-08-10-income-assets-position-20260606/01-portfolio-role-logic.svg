<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">收益型资产在组合中的角色逻辑</title>
  <desc id="desc">展示生活现金、核心资产、防守资产、收益型资产和进攻资产的角色边界。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">小白组合先分角色, 再谈收益</text>
  <text x="400" y="70" text-anchor="middle" font-size="14" fill="#64748b">收益型资产负责现金流, 不是本金保险</text>

  <g transform="translate(55 115)">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#075985">生活现金</text>
    <text x="60" y="66" text-anchor="middle" font-size="13" fill="#0f172a">先保流动性</text>
    <text x="60" y="88" text-anchor="middle" font-size="13" fill="#0f172a">不追收益</text>
  </g>

  <g transform="translate(210 115)">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">核心资产</text>
    <text x="60" y="66" text-anchor="middle" font-size="13" fill="#0f172a">宽基/分散</text>
    <text x="60" y="88" text-anchor="middle" font-size="13" fill="#0f172a">承担长期波动</text>
  </g>

  <g transform="translate(365 115)">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#854d0e">防守资产</text>
    <text x="60" y="66" text-anchor="middle" font-size="13" fill="#0f172a">短债/黄金</text>
    <text x="60" y="88" text-anchor="middle" font-size="13" fill="#0f172a">降低冲击</text>
  </g>

  <g transform="translate(520 115)">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">收益资产</text>
    <text x="60" y="66" text-anchor="middle" font-size="13" fill="#0f172a">REITs/红利</text>
    <text x="60" y="88" text-anchor="middle" font-size="13" fill="#0f172a">现金流但波动</text>
  </g>

  <g transform="translate(675 115)">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">进攻资产</text>
    <text x="60" y="66" text-anchor="middle" font-size="13" fill="#0f172a">行业/个股</text>
    <text x="60" y="88" text-anchor="middle" font-size="13" fill="#0f172a">弹性更大</text>
  </g>

  <path d="M175 175 H205" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M330 175 H360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M485 175 H515" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M640 175 H670" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="285" width="600" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="310" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">核心推导</text>
  <text x="400" y="333" text-anchor="middle" font-size="14" fill="#334155">因为收益型资产有现金流也有价格波动, 所以它只能做收益仓, 不能替代现金仓和保本需求。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
