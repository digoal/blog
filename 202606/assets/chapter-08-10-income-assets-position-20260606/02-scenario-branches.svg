<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">收益型资产前提变化分支</title>
  <desc id="desc">展示现金流、价格、利率和个人资金前提变化时的不同操作结论。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变了, 结论也要变</text>

  <rect x="280" y="75" width="240" height="65" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="102" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">收益型资产入组合</text>
  <text x="400" y="125" text-anchor="middle" font-size="13" fill="#334155">现金流 + 价格 + 仓位一起看</text>

  <path d="M400 140 C400 175 165 165 165 200" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 140 C400 175 330 165 330 200" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 140 C400 175 500 165 500 200" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 140 C400 175 665 165 665 200" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(45 200)">
    <rect width="240" height="95" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">现金流稳定</text>
    <text x="120" y="53" text-anchor="middle" font-size="13" fill="#0f172a">分配金额和经营指标接近预期</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="#0f172a">结论: 小仓位分批观察</text>
  </g>

  <g transform="translate(300 200)">
    <rect width="240" height="95" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">现金流恶化</text>
    <text x="120" y="53" text-anchor="middle" font-size="13" fill="#0f172a">出租率/车流/利润下滑</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="#0f172a">结论: 停止加仓, 查公告</text>
  </g>

  <g transform="translate(555 200)">
    <rect width="240" height="95" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#854d0e">价格追高</text>
    <text x="120" y="53" text-anchor="middle" font-size="13" fill="#0f172a">分红没涨, 价格先涨</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="#0f172a">结论: 不把收益买贵</text>
  </g>

  <g transform="translate(210 330)">
    <rect width="180" height="55" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="90" y="23" text-anchor="middle" font-size="15" font-weight="700" fill="#075985">现金仓不足</text>
    <text x="90" y="43" text-anchor="middle" font-size="12" fill="#0f172a">先补备用金</text>
  </g>

  <g transform="translate(430 330)">
    <rect width="180" height="55" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="90" y="23" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">利率上行</text>
    <text x="90" y="43" text-anchor="middle" font-size="12" fill="#0f172a">提高估值要求</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
