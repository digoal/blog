<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">收益型资产买前仓位流程</title>
  <desc id="desc">展示从备用金到角色确认、现金流检查、价格检查、仓位上限和复盘的步骤。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">买入前按这个顺序走</text>

  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2">
    <rect x="75" y="85" width="150" height="72" rx="10"/>
    <rect x="315" y="85" width="150" height="72" rx="10"/>
    <rect x="555" y="85" width="150" height="72" rx="10"/>
    <rect x="75" y="245" width="150" height="72" rx="10"/>
    <rect x="315" y="245" width="150" height="72" rx="10"/>
    <rect x="555" y="245" width="150" height="72" rx="10"/>
  </g>

  <text x="150" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">1. 备用金</text>
  <text x="150" y="136" text-anchor="middle" font-size="13" fill="#334155">短期钱不能买</text>

  <text x="390" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">2. 定角色</text>
  <text x="390" y="136" text-anchor="middle" font-size="13" fill="#334155">收益仓, 非保本仓</text>

  <text x="630" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">3. 查现金流</text>
  <text x="630" y="136" text-anchor="middle" font-size="13" fill="#334155">分配来自哪里</text>

  <text x="150" y="272" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">4. 查价格</text>
  <text x="150" y="296" text-anchor="middle" font-size="13" fill="#334155">别把收益买贵</text>

  <text x="390" y="272" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">5. 设上限</text>
  <text x="390" y="296" text-anchor="middle" font-size="13" fill="#334155">先小仓位学习</text>

  <text x="630" y="272" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">6. 季度复盘</text>
  <text x="630" y="296" text-anchor="middle" font-size="13" fill="#334155">前提坏了就调整</text>

  <path d="M225 121 H307" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M465 121 H547" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M630 157 C630 207 150 195 150 239" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M225 281 H307" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M465 281 H547" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="155" y="355" width="490" height="40" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="400" y="380" text-anchor="middle" font-size="14" fill="#1e3a8a">任何一步答不上来, 动作都不是硬买, 而是回去补信息。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
