<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="40" y="52" font-size="24" font-weight="700" fill="#0f172a">为什么要学美股: 它是全球资产配置地图上的核心节点</text>
  <text x="40" y="82" font-size="15" fill="#475569">学习美股不是为了追热点, 而是为了看懂全球资产、美元、科技龙头和披露规则。</text>

  <rect x="48" y="125" width="180" height="190" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="138" y="160" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">美国市场</text>
  <text x="138" y="195" text-anchor="middle" font-size="15" fill="#1e40af">大市值</text>
  <text x="138" y="225" text-anchor="middle" font-size="15" fill="#1e40af">高流动性</text>
  <text x="138" y="255" text-anchor="middle" font-size="15" fill="#1e40af">全球龙头集中</text>
  <text x="138" y="285" text-anchor="middle" font-size="15" fill="#1e40af">美元计价</text>

  <rect x="312" y="118" width="176" height="74" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" font-size="17" font-weight="700" fill="#065f46">全球股票权重</text>
  <text x="400" y="171" text-anchor="middle" font-size="14" fill="#047857">市值越大, 越难绕开</text>

  <rect x="312" y="226" width="176" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">美元与汇率</text>
  <text x="400" y="279" text-anchor="middle" font-size="14" fill="#c2410c">收益叠加汇率波动</text>

  <rect x="576" y="84" width="154" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="653" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">指数ETF</text>
  <text x="653" y="135" text-anchor="middle" font-size="13" fill="#b91c1c">小白优先入口</text>

  <rect x="576" y="184" width="154" height="68" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="653" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">行业ETF</text>
  <text x="653" y="235" text-anchor="middle" font-size="13" fill="#6d28d9">理解行业弹性</text>

  <rect x="576" y="284" width="154" height="68" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="653" y="312" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">个股/期权</text>
  <text x="653" y="335" text-anchor="middle" font-size="13" fill="#475569">学习后再碰</text>

  <line x1="228" y1="220" x2="306" y2="156" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="228" y1="230" x2="306" y2="262" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="488" y1="154" x2="568" y2="118" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="488" y1="262" x2="568" y2="318" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="488" y1="190" x2="568" y2="218" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="80" y="350" width="640" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">行动结论: 先学规则和指数ETF, 再决定是否扩展到行业和个股</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
