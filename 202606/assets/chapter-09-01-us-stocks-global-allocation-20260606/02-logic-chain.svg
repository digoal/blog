<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#111827">论证链: 美股为什么要学, 但不能一上来就重仓冲</text>

  <rect x="42" y="92" width="172" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="128" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="128" y="148" text-anchor="middle" font-size="14" fill="#1e40af">美股占全球资产</text>
  <text x="128" y="168" text-anchor="middle" font-size="14" fill="#1e40af">重要权重</text>

  <rect x="294" y="92" width="172" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="380" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#065f46">前提B</text>
  <text x="380" y="148" text-anchor="middle" font-size="14" fill="#047857">规则清晰</text>
  <text x="380" y="168" text-anchor="middle" font-size="14" fill="#047857">披露资料多</text>

  <rect x="546" y="92" width="172" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="632" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">前提C</text>
  <text x="632" y="148" text-anchor="middle" font-size="14" fill="#c2410c">美元、估值、波动</text>
  <text x="632" y="168" text-anchor="middle" font-size="14" fill="#c2410c">都是变量</text>

  <line x1="214" y1="135" x2="288" y2="135" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="466" y1="135" x2="540" y2="135" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="96" y="238" width="608" height="72" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="266" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">推导</text>
  <text x="400" y="292" text-anchor="middle" font-size="15" fill="#334155">因为重要权重大 + 信息可验证, 所以美股值得学; 因为汇率和估值会变, 所以不能把学习误当成重仓理由。</text>

  <line x1="400" y1="178" x2="400" y2="232" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="80" y="364" width="208" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="184" y="389" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">正常结论</text>
  <text x="184" y="413" text-anchor="middle" font-size="14" fill="#b91c1c">先指数ETF, 小仓位学习</text>

  <rect x="320" y="364" width="208" height="60" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="424" y="389" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">证据路径</text>
  <text x="424" y="413" text-anchor="middle" font-size="14" fill="#6d28d9">市值、指数、披露、SPIVA</text>

  <rect x="560" y="364" width="208" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="664" y="389" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">失效条件</text>
  <text x="664" y="413" text-anchor="middle" font-size="14" fill="#475569">汇率/估值/规则看不懂</text>

  <line x1="328" y1="310" x2="190" y2="358" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="400" y1="310" x2="424" y2="358" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="472" y1="310" x2="650" y2="358" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
