<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" width="800" height="470">
  <rect width="800" height="470" fill="#f8fafc"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#0f172a">情景推演: 同样是学美股, 前提不同, 动作不同</text>

  <rect x="286" y="82" width="224" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="398" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">起点: 想参与美股</text>
  <text x="398" y="130" text-anchor="middle" font-size="14" fill="#475569">先判断三个前提</text>

  <line x1="398" y1="144" x2="398" y2="186" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="84" y="194" width="178" height="78" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="173" y="223" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">前提成立</text>
  <text x="173" y="248" text-anchor="middle" font-size="14" fill="#047857">闲钱、规则清楚</text>
  <text x="173" y="266" text-anchor="middle" font-size="14" fill="#047857">可承受波动</text>

  <rect x="312" y="194" width="178" height="78" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="401" y="223" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">汇率不确定</text>
  <text x="401" y="248" text-anchor="middle" font-size="14" fill="#c2410c">人民币/美元波动</text>
  <text x="401" y="266" text-anchor="middle" font-size="14" fill="#c2410c">影响最终收益</text>

  <rect x="540" y="194" width="178" height="78" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="629" y="223" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">规则看不懂</text>
  <text x="629" y="248" text-anchor="middle" font-size="14" fill="#b91c1c">税、账户、披露</text>
  <text x="629" y="266" text-anchor="middle" font-size="14" fill="#b91c1c">还没搞清</text>

  <line x1="346" y1="144" x2="176" y2="188" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="398" y1="144" x2="401" y2="188" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="454" y1="144" x2="628" y2="188" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="84" y="340" width="178" height="78" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="173" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">动作</text>
  <text x="173" y="395" text-anchor="middle" font-size="14" fill="#047857">宽基ETF小仓位</text>
  <text x="173" y="413" text-anchor="middle" font-size="14" fill="#047857">按月复盘</text>

  <rect x="312" y="340" width="178" height="78" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="401" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">动作</text>
  <text x="401" y="395" text-anchor="middle" font-size="14" fill="#c2410c">降低单次换汇</text>
  <text x="401" y="413" text-anchor="middle" font-size="14" fill="#c2410c">分批或先QDII</text>

  <rect x="540" y="340" width="178" height="78" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="629" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">动作</text>
  <text x="629" y="395" text-anchor="middle" font-size="14" fill="#b91c1c">只学习不下单</text>
  <text x="629" y="413" text-anchor="middle" font-size="14" fill="#b91c1c">先读10-K/ETF资料</text>

  <line x1="173" y1="272" x2="173" y2="334" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="401" y1="272" x2="401" y2="334" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="629" y1="272" x2="629" y2="334" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
