<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">美股市场不是一条路, 而是分层道路</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">小白先看交易层级, 再谈估值和买卖</text>

  <rect x="48" y="105" width="160" height="190" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="128" cy="135" r="20" fill="#dbeafe"/>
  <text x="128" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">1</text>
  <text x="128" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">NYSE</text>
  <text x="128" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">大型公司主场</text>
  <text x="128" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">上市门槛</text>
  <text x="128" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">DMM和开收盘拍卖</text>

  <rect x="232" y="105" width="160" height="190" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="312" cy="135" r="20" fill="#d1fae5"/>
  <text x="312" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">2</text>
  <text x="312" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Nasdaq</text>
  <text x="312" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">电子化市场</text>
  <text x="312" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Global Select</text>
  <text x="312" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Global / Capital</text>

  <rect x="416" y="105" width="160" height="190" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="496" cy="135" r="20" fill="#fef3c7"/>
  <text x="496" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b45309">3</text>
  <text x="496" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">NYSE American</text>
  <text x="496" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">旧称 AMEX</text>
  <text x="496" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">成长型和小盘公司</text>
  <text x="496" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">仍是交易所市场</text>

  <rect x="600" y="105" width="160" height="190" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="680" cy="135" r="20" fill="#fee2e2"/>
  <text x="680" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">4</text>
  <text x="680" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">OTC</text>
  <text x="680" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">场外报价市场</text>
  <text x="680" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">披露和流动性差异大</text>
  <text x="680" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">小白默认不碰</text>

  <path d="M128 316 L680 316" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 6"/>
  <polygon points="680,316 666,308 666,324" fill="#9ca3af"/>
  <text x="400" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">越往右, 信息不确定性和流动性风险越需要单独检查</text>
</svg>
