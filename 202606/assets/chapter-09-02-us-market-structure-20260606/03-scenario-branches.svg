<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">实操判断树: 看到一只美股先问三个问题</text>

  <rect x="300" y="72" width="200" height="58" rx="8" fill="#111827"/>
  <text x="400" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">这只股票在哪里上市/报价?</text>

  <path d="M400 130 V168" stroke="#6b7280" stroke-width="2"/>
  <polygon points="400,168 394,158 406,158" fill="#6b7280"/>

  <rect x="52" y="170" width="190" height="70" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="147" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">NYSE / Nasdaq</text>
  <text x="147" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">进入正常研究流程</text>

  <rect x="305" y="170" width="190" height="70" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="400" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b45309">NYSE American</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">再查流动性和披露</text>

  <rect x="558" y="170" width="190" height="70" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="653" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">OTC / Pink / Expert</text>
  <text x="653" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">小白默认不交易</text>

  <path d="M147 240 V278" stroke="#6b7280" stroke-width="2"/>
  <polygon points="147,278 141,268 153,268" fill="#6b7280"/>
  <path d="M400 240 V278" stroke="#6b7280" stroke-width="2"/>
  <polygon points="400,278 394,268 406,268" fill="#6b7280"/>
  <path d="M653 240 V278" stroke="#6b7280" stroke-width="2"/>
  <polygon points="653,278 647,268 659,268" fill="#6b7280"/>

  <rect x="52" y="280" width="190" height="86" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="147" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">第二问: 披露</text>
  <text x="147" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">能否读到10-K/10-Q</text>
  <text x="147" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">ETF持仓和费用?</text>

  <rect x="305" y="280" width="190" height="86" rx="8" fill="#ffffff" stroke="#fcd34d"/>
  <text x="400" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">第三问: 流动性</text>
  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">成交额够不够?</text>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">买卖价差是否过宽?</text>

  <rect x="558" y="280" width="190" height="86" rx="8" fill="#ffffff" stroke="#fecaca"/>
  <text x="653" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">红灯条件</text>
  <text x="653" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">缺披露 / 低成交</text>
  <text x="653" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">被推广 / 曾停牌</text>

  <text x="400" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">任何一问答不清, 动作都不是少买一点, 而是先不下单</text>
</svg>
