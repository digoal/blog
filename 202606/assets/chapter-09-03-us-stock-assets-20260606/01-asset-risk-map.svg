<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">美股主要资产不是一类风险</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">先看底层风险, 再看收益想象</text>

  <line x1="120" y1="350" x2="720" y2="350" stroke="#9ca3af" stroke-width="2"/>
  <text x="115" y="382" font-family="Arial, sans-serif" font-size="13" fill="#374151">低波动</text>
  <text x="665" y="382" font-family="Arial, sans-serif" font-size="13" fill="#374151">高波动</text>
  <line x1="120" y1="350" x2="120" y2="110" stroke="#9ca3af" stroke-width="2"/>
  <text x="36" y="116" font-family="Arial, sans-serif" font-size="13" fill="#374151">低分散</text>
  <text x="34" y="344" font-family="Arial, sans-serif" font-size="13" fill="#374151">高分散</text>

  <rect x="150" y="285" width="132" height="54" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="166" y="307" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">货币市场基金</text>
  <text x="166" y="327" font-family="Arial, sans-serif" font-size="12" fill="#166534">现金停泊, 低收益</text>

  <rect x="285" y="245" width="118" height="54" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="309" y="267" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075985">债券ETF</text>
  <text x="300" y="287" font-family="Arial, sans-serif" font-size="12" fill="#075985">利率+信用风险</text>

  <rect x="420" y="190" width="118" height="54" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="457" y="212" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">REITs</text>
  <text x="435" y="232" font-family="Arial, sans-serif" font-size="12" fill="#92400e">地产现金流</text>

  <rect x="435" y="285" width="132" height="54" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="477" y="307" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e40af">ETF</text>
  <text x="456" y="327" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">一篮子股票/债券</text>

  <rect x="565" y="142" width="118" height="54" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="610" y="164" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#5b21b6">ADR</text>
  <text x="581" y="184" font-family="Arial, sans-serif" font-size="12" fill="#5b21b6">外国公司+汇率</text>

  <rect x="610" y="78" width="118" height="54" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="653" y="100" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">个股</text>
  <text x="630" y="120" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">公司判断难度高</text>

  <text x="40" y="412" font-family="Arial, sans-serif" font-size="12" fill="#64748b">位置只是教学示意: 具体风险取决于标的、期限、估值、费用、流动性和汇率。</text>
</svg>
