<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">论证链: 先分风险, 再选工具</text>

  <rect x="42" y="84" width="150" height="82" rx="8" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="66" y="111" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#312e81">前提A</text>
  <text x="61" y="136" font-family="Arial, sans-serif" font-size="13" fill="#312e81">账户只是货架</text>
  <text x="62" y="154" font-family="Arial, sans-serif" font-size="12" fill="#4338ca">不是资产类别</text>

  <rect x="232" y="84" width="150" height="82" rx="8" fill="#ecfeff" stroke="#0891b2"/>
  <text x="256" y="111" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#155e75">前提B</text>
  <text x="251" y="136" font-family="Arial, sans-serif" font-size="13" fill="#155e75">收益来源不同</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="12" fill="#0e7490">股/债/地产/现金</text>

  <rect x="422" y="84" width="150" height="82" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="446" y="111" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">前提C</text>
  <text x="441" y="136" font-family="Arial, sans-serif" font-size="13" fill="#92400e">能力边界不同</text>
  <text x="440" y="154" font-family="Arial, sans-serif" font-size="12" fill="#b45309">披露/税务/汇率</text>

  <rect x="612" y="84" width="150" height="82" rx="8" fill="#fce7f3" stroke="#db2777"/>
  <text x="636" y="111" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9d174d">前提D</text>
  <text x="632" y="136" font-family="Arial, sans-serif" font-size="13" fill="#9d174d">市场环境会变</text>
  <text x="630" y="154" font-family="Arial, sans-serif" font-size="12" fill="#be185d">利率/估值/流动性</text>

  <path d="M192 125 H232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M382 125 H422" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M572 125 H612" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M116 166 C130 225, 226 225, 300 252" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M306 166 C325 218, 360 231, 390 252" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M496 166 C480 218, 458 231, 430 252" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M686 166 C660 230, 560 235, 486 252" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="190" y="252" width="420" height="86" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="282" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">结论</text>
  <text x="230" y="308" font-family="Arial, sans-serif" font-size="15" fill="#334155">小白不要按“美股”两个字下单</text>
  <text x="230" y="330" font-family="Arial, sans-serif" font-size="15" fill="#334155">先把每个工具放进: 底层风险 → 组合角色 → 仓位上限</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
