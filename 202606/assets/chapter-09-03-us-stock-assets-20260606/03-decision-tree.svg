<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">小白选择美股资产的三层筛选</text>

  <rect x="290" y="72" width="220" height="58" rx="10" fill="#ffffff" stroke="#334155" stroke-width="1.6"/>
  <text x="326" y="96" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">第一问: 这笔钱多久不用?</text>
  <text x="332" y="117" font-family="Arial, sans-serif" font-size="12" fill="#475569">期限决定能不能承受波动</text>

  <path d="M400 130 V165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="68" y="165" width="190" height="68" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="102" y="191" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">一年内要用</text>
  <text x="92" y="214" font-family="Arial, sans-serif" font-size="13" fill="#166534">货币市场基金/短债优先</text>

  <rect x="305" y="165" width="190" height="68" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="344" y="191" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e40af">三年以上闲钱</text>
  <text x="335" y="214" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">宽基ETF可做核心研究</text>

  <rect x="542" y="165" width="190" height="68" rx="10" fill="#fee2e2" stroke="#dc2626"/>
  <text x="583" y="191" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">想短线暴富</text>
  <text x="572" y="214" font-family="Arial, sans-serif" font-size="13" fill="#b91c1c">先暂停真实下单</text>

  <path d="M400 233 V268" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="268" width="220" height="58" rx="10" fill="#ffffff" stroke="#334155" stroke-width="1.6"/>
  <text x="322" y="292" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">第二问: 能看懂什么?</text>
  <text x="331" y="313" font-family="Arial, sans-serif" font-size="12" fill="#475569">披露能力决定工具复杂度</text>

  <path d="M400 326 V360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="92" y="360" width="160" height="58" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="128" y="384" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075985">只会看费用</text>
  <text x="114" y="405" font-family="Arial, sans-serif" font-size="12" fill="#0369a1">指数ETF/债券ETF</text>

  <rect x="320" y="360" width="160" height="58" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="347" y="384" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">能看经营数据</text>
  <text x="351" y="405" font-family="Arial, sans-serif" font-size="12" fill="#a16207">REITs/行业ETF</text>

  <rect x="548" y="360" width="160" height="58" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="573" y="384" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#5b21b6">能读财报风险</text>
  <text x="579" y="405" font-family="Arial, sans-serif" font-size="12" fill="#6d28d9">个股/ADR小仓</text>

  <path d="M290 101 C210 105, 165 130, 163 165" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M510 101 C590 105, 635 130, 637 165" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 326 C310 340, 205 342, 172 360" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 326 C490 340, 595 342, 628 360" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
