<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">三种参与美股路径地图</title>
  <desc id="desc">QDII基金、跨境ETF、境外券商账户三条路径的责任分工和适合人群。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">参与美股不是选收益, 是选责任边界</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#475569">同样买美国资产, 三条路把合规、交易、税务、溢价风险放在不同位置</text>

  <rect x="45" y="115" width="210" height="210" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="150" cy="150" r="24" fill="#dbeafe"/>
  <text x="150" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">1</text>
  <text x="150" y="195" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">QDII基金</text>
  <text x="150" y="228" text-anchor="middle" font-size="15" fill="#334155">基金公司代买海外资产</text>
  <text x="150" y="256" text-anchor="middle" font-size="15" fill="#334155">你承担净值、汇率、申赎风险</text>
  <text x="150" y="286" text-anchor="middle" font-size="14" fill="#1d4ed8">适合: 不想处理境外账户</text>

  <rect x="295" y="115" width="210" height="210" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="400" cy="150" r="24" fill="#dcfce7"/>
  <text x="400" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">2</text>
  <text x="400" y="195" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">跨境ETF</text>
  <text x="400" y="228" text-anchor="middle" font-size="15" fill="#334155">A股账户内买海外指数</text>
  <text x="400" y="256" text-anchor="middle" font-size="15" fill="#334155">重点看成交、折溢价、停复牌</text>
  <text x="400" y="286" text-anchor="middle" font-size="14" fill="#047857">适合: 已有证券账户</text>

  <rect x="545" y="115" width="210" height="210" rx="10" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <circle cx="650" cy="150" r="24" fill="#ffedd5"/>
  <text x="650" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">3</text>
  <text x="650" y="195" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">境外券商</text>
  <text x="650" y="228" text-anchor="middle" font-size="15" fill="#334155">自己处理账户、资金、税务</text>
  <text x="650" y="256" text-anchor="middle" font-size="15" fill="#334155">工具最多, 责任也最多</text>
  <text x="650" y="286" text-anchor="middle" font-size="14" fill="#c2410c">适合: 能做合规核查</text>

  <path d="M255 220 H295" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M505 220 H545" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="357" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">小白默认顺序: 先低复杂度, 再高自由度</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
