<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">三种参与路径的论证链</title>
  <desc id="desc">从监管边界、工具复杂度、价格偏离和账户保护推导出路径选择。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">路径选择的核心论证链</text>

  <rect x="35" y="82" width="160" height="88" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="115" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">前提A</text>
  <text x="115" y="140" text-anchor="middle" font-size="14" fill="#1f2937">三条路径买的</text>
  <text x="115" y="160" text-anchor="middle" font-size="14" fill="#1f2937">都是海外资产</text>

  <rect x="225" y="82" width="160" height="88" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="305" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提B</text>
  <text x="305" y="140" text-anchor="middle" font-size="14" fill="#1f2937">个人资金出境</text>
  <text x="305" y="160" text-anchor="middle" font-size="14" fill="#1f2937">有合规边界</text>

  <rect x="415" y="82" width="160" height="88" rx="8" fill="#fff7ed" stroke="#f97316"/>
  <text x="495" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="495" y="140" text-anchor="middle" font-size="14" fill="#1f2937">跨境产品会有</text>
  <text x="495" y="160" text-anchor="middle" font-size="14" fill="#1f2937">额度和溢价约束</text>

  <rect x="605" y="82" width="160" height="88" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="685" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="685" y="140" text-anchor="middle" font-size="14" fill="#1f2937">境外账户保护</text>
  <text x="685" y="160" text-anchor="middle" font-size="14" fill="#1f2937">不等于保本</text>

  <path d="M115 170 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M305 170 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M495 170 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M685 170 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="75" y="225" width="650" height="70" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="400" y="253" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">因为责任越往自己身上移, 错误成本越高</text>
  <text x="400" y="278" text-anchor="middle" font-size="15" fill="#334155">所以小白先选规则透明、复杂度低、价格不偏离的入口</text>

  <path d="M400 295 V330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="190" y="330" width="420" height="48" rx="9" fill="#0f172a"/>
  <text x="400" y="360" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论: 先QDII或跨境ETF, 境外券商放到最后</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
