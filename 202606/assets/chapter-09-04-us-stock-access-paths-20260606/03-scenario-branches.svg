<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">三种路径的情景分支</title>
  <desc id="desc">根据账户、合规能力和产品溢价选择不同美股参与路径。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">路径选择情景分支</text>

  <rect x="270" y="78" width="260" height="58" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">你是否能处理境外账户与资金合规?</text>

  <path d="M325 136 C250 170,190 185,150 215" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 136 V205" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M475 136 C550 170,610 185,650 215" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="55" y="215" width="190" height="115" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="150" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">不能</text>
  <text x="150" y="272" text-anchor="middle" font-size="15" fill="#334155">优先QDII基金</text>
  <text x="150" y="296" text-anchor="middle" font-size="14" fill="#334155">看申购开放、费率、持仓</text>
  <text x="150" y="318" text-anchor="middle" font-size="14" fill="#334155">不处理境外开户</text>

  <rect x="305" y="215" width="190" height="115" rx="10" fill="#ecfdf5" stroke="#059669"/>
  <text x="400" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">只想用A股账户</text>
  <text x="400" y="272" text-anchor="middle" font-size="15" fill="#334155">选择跨境ETF</text>
  <text x="400" y="296" text-anchor="middle" font-size="14" fill="#334155">溢价低再买</text>
  <text x="400" y="318" text-anchor="middle" font-size="14" fill="#334155">高溢价直接等待</text>

  <rect x="555" y="215" width="190" height="115" rx="10" fill="#fff7ed" stroke="#f97316"/>
  <text x="650" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">能</text>
  <text x="650" y="272" text-anchor="middle" font-size="15" fill="#334155">再考虑境外券商</text>
  <text x="650" y="296" text-anchor="middle" font-size="14" fill="#334155">查BrokerCheck和SIPC</text>
  <text x="650" y="318" text-anchor="middle" font-size="14" fill="#334155">填W-8BEN并控仓</text>

  <text x="400" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">任意路径只要说不清风险, 动作都是: 先学, 不下单</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
