<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">美股小白的工具优先级</text>
  <text x="400" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">从分散、透明、可控开始，再逐步走向集中、复杂、杠杆</text>

  <g font-family="Arial, sans-serif">
    <rect x="90" y="310" width="620" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="130" y="344" font-size="20" font-weight="700" fill="#1e3a8a">1. 指数ETF</text>
    <text x="470" y="344" font-size="15" fill="#1e40af">先买一篮子，降低选错单只股票的风险</text>

    <rect x="140" y="238" width="520" height="56" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="180" y="272" font-size="20" font-weight="700" fill="#14532d">2. 行业ETF</text>
    <text x="430" y="272" font-size="15" fill="#166534">看懂行业周期后，再做小比例卫星仓</text>

    <rect x="190" y="166" width="420" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="230" y="200" font-size="20" font-weight="700" fill="#78350f">3. 龙头个股</text>
    <text x="430" y="200" font-size="15" fill="#92400e">能读财报、估值和风险后再碰</text>

    <rect x="240" y="94" width="320" height="56" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="270" y="128" font-size="20" font-weight="700" fill="#7f1d1d">4. 期权 / 杠杆产品</text>
    <text x="446" y="128" font-size="14" fill="#991b1b">最后学习，默认不实盘</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5 5">
    <path d="M400 310 L400 294"/>
    <path d="M400 238 L400 222"/>
    <path d="M400 166 L400 150"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#334155">
    <rect x="94" y="382" width="128" height="24" rx="12" fill="#e2e8f0"/>
    <text x="158" y="399" text-anchor="middle">分散度最高</text>
    <rect x="596" y="382" width="128" height="24" rx="12" fill="#e2e8f0"/>
    <text x="660" y="399" text-anchor="middle">犯错成本最高</text>
  </g>
</svg>
