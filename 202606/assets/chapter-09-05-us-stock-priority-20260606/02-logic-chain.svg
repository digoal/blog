<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">从工具特性推出操作顺序</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="82" width="165" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="127" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="127" y="138" text-anchor="middle" font-size="15" fill="#1e40af">宽基ETF分散</text>
    <text x="127" y="158" text-anchor="middle" font-size="15" fill="#1e40af">覆盖市场主干</text>

    <rect x="45" y="218" width="165" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="127" y="248" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">前提B</text>
    <text x="127" y="274" text-anchor="middle" font-size="15" fill="#166534">行业ETF更集中</text>
    <text x="127" y="294" text-anchor="middle" font-size="15" fill="#166534">需要行业判断</text>

    <rect x="304" y="82" width="185" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="396" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">前提C</text>
    <text x="396" y="138" text-anchor="middle" font-size="15" fill="#9a3412">个股结果取决于</text>
    <text x="396" y="158" text-anchor="middle" font-size="15" fill="#9a3412">公司与估值</text>

    <rect x="304" y="218" width="185" height="90" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="396" y="248" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">前提D</text>
    <text x="396" y="274" text-anchor="middle" font-size="15" fill="#991b1b">期权和杠杆会</text>
    <text x="396" y="294" text-anchor="middle" font-size="15" fill="#991b1b">放大时间和波动</text>

    <rect x="570" y="148" width="180" height="116" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="660" y="180" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">结论</text>
    <text x="660" y="207" text-anchor="middle" font-size="15" fill="#334155">先指数ETF</text>
    <text x="660" y="229" text-anchor="middle" font-size="15" fill="#334155">再行业ETF</text>
    <text x="660" y="251" text-anchor="middle" font-size="15" fill="#334155">再个股，最后复杂工具</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M210 127 C245 127, 265 127, 304 127"/>
    <path d="M210 263 C245 263, 265 263, 304 263"/>
    <path d="M489 127 C535 130, 548 158, 570 180"/>
    <path d="M489 263 C535 260, 548 232, 570 214"/>
  </g>

  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">因为复杂度和犯错成本逐级上升，所以学习顺序必须从简单到复杂</text>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">排序不是收益高低排序，而是小白的生存顺序</text>
</svg>
