<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">前提变化时，工具选择也要切换</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="300" y="75" width="200" height="66" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="400" y="103" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">想参与美股</text>
    <text x="400" y="125" text-anchor="middle" font-size="14" fill="#475569">先判断你满足哪个前提</text>

    <rect x="55" y="218" width="190" height="104" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="246" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">规则不熟</text>
    <text x="150" y="272" text-anchor="middle" font-size="14" fill="#1e40af">不知道账户、税、汇率</text>
    <text x="150" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">只学习或用QDII观察</text>

    <rect x="285" y="218" width="190" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="380" y="246" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">能接受波动</text>
    <text x="380" y="272" text-anchor="middle" font-size="14" fill="#166534">长期闲钱，小仓位</text>
    <text x="380" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">指数ETF优先</text>

    <rect x="515" y="218" width="190" height="104" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="610" y="246" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">有行业判断</text>
    <text x="610" y="272" text-anchor="middle" font-size="14" fill="#92400e">能解释周期和估值</text>
    <text x="610" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">行业ETF做卫星仓</text>

    <rect x="285" y="350" width="190" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="380" y="372" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">只想短线翻倍?</text>
    <text x="380" y="393" text-anchor="middle" font-size="14" fill="#991b1b">停止实盘，回到学习</text>
  </g>

  <g stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#arrow2)">
    <path d="M360 141 C280 165, 200 185, 150 218"/>
    <path d="M400 141 L380 218"/>
    <path d="M440 141 C510 165, 570 185, 610 218"/>
    <path d="M380 322 L380 350"/>
  </g>

  <text x="400" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">同一个“买美股”念头，在不同前提下对应不同动作</text>
</svg>
