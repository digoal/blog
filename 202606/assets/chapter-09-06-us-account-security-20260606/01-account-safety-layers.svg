<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">美股账户安全的四层门</text>

  <g font-family="Arial, sans-serif">
    <rect x="72" y="82" width="656" height="282" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

    <rect x="112" y="118" width="280" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="252" y="149" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">第一层: 券商资质</text>
    <text x="252" y="176" text-anchor="middle" font-size="15" fill="#1e40af">BrokerCheck 可查</text>
    <text x="252" y="196" text-anchor="middle" font-size="15" fill="#1e40af">SIPC 成员身份明确</text>

    <rect x="408" y="118" width="280" height="86" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="548" y="149" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">第二层: 账户托管</text>
    <text x="548" y="176" text-anchor="middle" font-size="15" fill="#166534">客户资产分开保管</text>
    <text x="548" y="196" text-anchor="middle" font-size="15" fill="#166534">看清清算与持仓主体</text>

    <rect x="112" y="228" width="280" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="252" y="259" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">第三层: SIPC 边界</text>
    <text x="252" y="286" text-anchor="middle" font-size="15" fill="#9a3412">券商倒闭保护</text>
    <text x="252" y="306" text-anchor="middle" font-size="15" fill="#9a3412">不赔市场下跌</text>

    <rect x="408" y="228" width="280" height="86" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="548" y="259" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">第四层: 登录防线</text>
    <text x="548" y="286" text-anchor="middle" font-size="15" fill="#991b1b">强密码 + 双重验证</text>
    <text x="548" y="306" text-anchor="middle" font-size="15" fill="#991b1b">防钓鱼和账户接管</text>

    <text x="400" y="372" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">四层都过关，才进入小额交易；任一层说不清，先暂停开户或下单</text>
  </g>
</svg>
