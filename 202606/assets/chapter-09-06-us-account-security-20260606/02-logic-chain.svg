<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">从账户安全前提推出操作结论</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="40" y="82" width="150" height="82" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="115" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="115" y="137" text-anchor="middle" font-size="14" fill="#1e40af">真实受监管券商</text>
    <text x="115" y="155" text-anchor="middle" font-size="14" fill="#1e40af">才是入口</text>

    <rect x="40" y="205" width="150" height="82" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="115" y="235" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提B</text>
    <text x="115" y="260" text-anchor="middle" font-size="14" fill="#166534">客户资产隔离</text>
    <text x="115" y="278" text-anchor="middle" font-size="14" fill="#166534">降低挪用风险</text>

    <rect x="40" y="328" width="150" height="82" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="115" y="358" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">前提C</text>
    <text x="115" y="383" text-anchor="middle" font-size="14" fill="#9a3412">SIPC 有上限</text>
    <text x="115" y="401" text-anchor="middle" font-size="14" fill="#9a3412">不保护亏损</text>

    <rect x="275" y="146" width="190" height="106" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="370" y="178" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">中间命题</text>
    <text x="370" y="205" text-anchor="middle" font-size="15" fill="#334155">账户安全先于</text>
    <text x="370" y="226" text-anchor="middle" font-size="15" fill="#334155">收益和交易品种</text>

    <rect x="275" y="286" width="190" height="82" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="370" y="316" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">前提D</text>
    <text x="370" y="341" text-anchor="middle" font-size="14" fill="#991b1b">密码和钓鱼风险</text>
    <text x="370" y="359" text-anchor="middle" font-size="14" fill="#991b1b">由自己负责</text>

    <rect x="570" y="174" width="182" height="128" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="661" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">结论</text>
    <text x="661" y="235" text-anchor="middle" font-size="15" fill="#334155">先查券商</text>
    <text x="661" y="256" text-anchor="middle" font-size="15" fill="#334155">再查托管和保护</text>
    <text x="661" y="277" text-anchor="middle" font-size="15" fill="#334155">最后才小额交易</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M190 123 C222 125, 244 153, 275 174"/>
    <path d="M190 246 C228 241, 246 219, 275 205"/>
    <path d="M190 369 C227 356, 247 330, 275 317"/>
    <path d="M465 199 C510 200, 535 211, 570 229"/>
    <path d="M465 327 C515 320, 544 279, 570 258"/>
  </g>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">因为账户安全是交易入口的底座，所以开户检查必须排在收益想象之前</text>
</svg>
