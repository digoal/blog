<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">前提变化时的账户安全分支</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="285" y="78" width="230" height="74" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="400" y="109" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">开户前四问</text>
    <text x="400" y="134" text-anchor="middle" font-size="15" fill="#1e40af">资质、托管、保护、登录</text>

    <rect x="40" y="226" width="170" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="125" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">四问都清楚</text>
    <text x="125" y="282" text-anchor="middle" font-size="14" fill="#166534">小额开户</text>
    <text x="125" y="301" text-anchor="middle" font-size="14" fill="#166534">只买熟悉工具</text>

    <rect x="230" y="226" width="170" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="315" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">资质查不到</text>
    <text x="315" y="282" text-anchor="middle" font-size="14" fill="#9a3412">停止开户</text>
    <text x="315" y="301" text-anchor="middle" font-size="14" fill="#9a3412">不下载陌生App</text>

    <rect x="420" y="226" width="170" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="505" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">保护边界误读</text>
    <text x="505" y="282" text-anchor="middle" font-size="14" fill="#991b1b">降低现金留存</text>
    <text x="505" y="301" text-anchor="middle" font-size="14" fill="#991b1b">不把SIPC当保险</text>

    <rect x="610" y="226" width="150" height="92" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="685" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">登录防线弱</text>
    <text x="685" y="282" text-anchor="middle" font-size="14" fill="#334155">先改密码</text>
    <text x="685" y="301" text-anchor="middle" font-size="14" fill="#334155">开启双重验证</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M345 152 C250 175, 174 197, 125 226"/>
    <path d="M377 152 C350 178, 331 199, 315 226"/>
    <path d="M423 152 C450 178, 485 199, 505 226"/>
    <path d="M455 152 C555 174, 641 198, 685 226"/>
  </g>

  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">安全检查不是形式；它决定你是在投资，还是在把钱交给不可控入口</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">任一分支不合格，操作结论都不是“少买一点”，而是先补安全条件</text>
</svg>
