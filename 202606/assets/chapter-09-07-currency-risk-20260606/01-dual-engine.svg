<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">买美股的人民币收益有两个引擎</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="96" width="225" height="112" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="172" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">引擎一</text>
    <text x="172" y="160" text-anchor="middle" font-size="17" fill="#1e40af">美股资产本身涨跌</text>
    <text x="172" y="186" text-anchor="middle" font-size="14" fill="#475569">指数、ETF、个股的美元收益</text>

    <rect x="60" y="246" width="225" height="112" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="172" y="278" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">引擎二</text>
    <text x="172" y="310" text-anchor="middle" font-size="17" fill="#166534">人民币/美元汇率变化</text>
    <text x="172" y="336" text-anchor="middle" font-size="14" fill="#475569">USD/CNY上升或下降</text>

    <rect x="508" y="160" width="230" height="134" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="623" y="196" text-anchor="middle" font-size="20" font-weight="700" fill="#7c2d12">最终结果</text>
    <text x="623" y="228" text-anchor="middle" font-size="17" fill="#9a3412">换回人民币后的收益</text>
    <text x="623" y="256" text-anchor="middle" font-size="14" fill="#475569">不是只看美股涨跌</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M285 152 C360 152, 410 180, 508 202"/>
    <path d="M285 302 C360 302, 410 272, 508 246"/>
  </g>

  <rect x="130" y="375" width="540" height="28" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">人民币收益 = (1 + 美元资产收益) × (1 + USD/CNY变化) - 1</text>
</svg>
