<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">从汇率前提出发推导操作规则</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="92" width="185" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="137" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="137" y="148" text-anchor="middle" font-size="15" fill="#1e40af">美股资产按美元计价</text>
    <text x="137" y="168" text-anchor="middle" font-size="15" fill="#1e40af">涨跌先发生在美元里</text>

    <rect x="45" y="230" width="185" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="137" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">前提B</text>
    <text x="137" y="286" text-anchor="middle" font-size="15" fill="#166534">投资者最终用人民币</text>
    <text x="137" y="306" text-anchor="middle" font-size="15" fill="#166534">汇率会改写结果</text>

    <rect x="312" y="160" width="185" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="404" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">前提C</text>
    <text x="404" y="216" text-anchor="middle" font-size="15" fill="#9a3412">用钱时间越近</text>
    <text x="404" y="236" text-anchor="middle" font-size="15" fill="#9a3412">汇率误差越不能扛</text>

    <rect x="572" y="142" width="185" height="128" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="664" y="176" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">结论</text>
    <text x="664" y="204" text-anchor="middle" font-size="15" fill="#334155">下单前先算两本账</text>
    <text x="664" y="226" text-anchor="middle" font-size="15" fill="#334155">美元账 + 人民币账</text>
    <text x="664" y="248" text-anchor="middle" font-size="15" fill="#334155">短钱不重仓美股</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M230 138 C270 146, 286 170, 312 190"/>
    <path d="M230 276 C270 268, 286 240, 312 222"/>
    <path d="M497 206 C530 206, 548 206, 572 206"/>
  </g>

  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">因为最终花钱的币种是人民币，所以买入理由必须同时经得起美股和汇率两层波动</text>
  <text x="400" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">汇率不是额外小数点，而是会放大、缓冲或吞掉部分美元收益的变量</text>
</svg>
