<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">汇率变化后的三条分支</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="292" y="82" width="216" height="78" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="400" y="113" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">买入美股资产后</text>
    <text x="400" y="138" text-anchor="middle" font-size="15" fill="#334155">同时观察资产涨跌和USD/CNY</text>

    <rect x="48" y="238" width="210" height="112" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="153" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">USD/CNY上升</text>
    <text x="153" y="298" text-anchor="middle" font-size="15" fill="#166534">美元升值或人民币贬值</text>
    <text x="153" y="324" text-anchor="middle" font-size="14" fill="#475569">人民币收益被放大</text>

    <rect x="295" y="238" width="210" height="112" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="400" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">汇率基本持平</text>
    <text x="400" y="298" text-anchor="middle" font-size="15" fill="#1e40af">主要看美股资产表现</text>
    <text x="400" y="324" text-anchor="middle" font-size="14" fill="#475569">按原仓位计划复盘</text>

    <rect x="542" y="238" width="210" height="112" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="647" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">USD/CNY下降</text>
    <text x="647" y="298" text-anchor="middle" font-size="15" fill="#991b1b">美元贬值或人民币升值</text>
    <text x="647" y="324" text-anchor="middle" font-size="14" fill="#475569">人民币收益被拖累</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M350 160 C255 184, 190 205, 153 238"/>
    <path d="M400 160 C400 190, 400 210, 400 238"/>
    <path d="M450 160 C545 184, 610 205, 647 238"/>
  </g>

  <text x="400" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">操作含义：不要把汇率收益当能力，也不要把汇率损失当指数失效</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">先拆账，再决定是继续持有、控制仓位，还是等待更合适的换汇区间</text>
</svg>
