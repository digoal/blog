<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">资金出入境的四个合规问题</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" fill="#52616b">不是问“钱能不能出去”，而是问“每一步能不能解释清楚”</text>

  <rect x="55" y="118" width="150" height="110" rx="8" fill="#e8f4ff" stroke="#2f80ed" stroke-width="2"/>
  <text x="130" y="150" text-anchor="middle" font-size="19" font-weight="700" fill="#174a7c">资金来源</text>
  <text x="130" y="181" text-anchor="middle" font-size="14" fill="#174a7c">工资 / 经营 /</text>
  <text x="130" y="203" text-anchor="middle" font-size="14" fill="#174a7c">存款 / 境外收入</text>

  <rect x="235" y="118" width="150" height="110" rx="8" fill="#eef8ef" stroke="#27ae60" stroke-width="2"/>
  <text x="310" y="150" text-anchor="middle" font-size="19" font-weight="700" fill="#1f6b3a">真实用途</text>
  <text x="310" y="181" text-anchor="middle" font-size="14" fill="#1f6b3a">留学 / 旅游 /</text>
  <text x="310" y="203" text-anchor="middle" font-size="14" fill="#1f6b3a">QDII / 其他合规用途</text>

  <rect x="415" y="118" width="150" height="110" rx="8" fill="#fff4e6" stroke="#f2994a" stroke-width="2"/>
  <text x="490" y="150" text-anchor="middle" font-size="19" font-weight="700" fill="#8a4b12">合规通道</text>
  <text x="490" y="181" text-anchor="middle" font-size="14" fill="#8a4b12">银行 / QDII /</text>
  <text x="490" y="203" text-anchor="middle" font-size="14" fill="#8a4b12">跨境ETF / 合法账户</text>

  <rect x="595" y="118" width="150" height="110" rx="8" fill="#fdeeee" stroke="#eb5757" stroke-width="2"/>
  <text x="670" y="150" text-anchor="middle" font-size="19" font-weight="700" fill="#8f2727">留痕材料</text>
  <text x="670" y="181" text-anchor="middle" font-size="14" fill="#8f2727">申请书 / 回单 /</text>
  <text x="670" y="203" text-anchor="middle" font-size="14" fill="#8f2727">公告 / 税务资料</text>

  <path d="M205 173 H235" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M385 173 H415" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M565 173 H595" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="120" y="292" width="560" height="56" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
  <text x="400" y="326" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">四项都能说明白，才进入投资判断；任何一项说不清，先停手。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
