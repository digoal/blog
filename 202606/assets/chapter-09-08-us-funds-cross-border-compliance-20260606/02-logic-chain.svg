<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">从规则前提推出操作结论</text>

  <rect x="55" y="88" width="190" height="92" rx="8" fill="#e8f4ff" stroke="#2f80ed" stroke-width="2"/>
  <text x="150" y="119" text-anchor="middle" font-size="17" font-weight="700" fill="#174a7c">前提A</text>
  <text x="150" y="146" text-anchor="middle" font-size="14" fill="#174a7c">便利化额度是</text>
  <text x="150" y="166" text-anchor="middle" font-size="14" fill="#174a7c">经常项目便利</text>

  <rect x="300" y="88" width="190" height="92" rx="8" fill="#eef8ef" stroke="#27ae60" stroke-width="2"/>
  <text x="395" y="119" text-anchor="middle" font-size="17" font-weight="700" fill="#1f6b3a">前提B</text>
  <text x="395" y="146" text-anchor="middle" font-size="14" fill="#1f6b3a">境外证券投资</text>
  <text x="395" y="166" text-anchor="middle" font-size="14" fill="#1f6b3a">有规定通道</text>

  <rect x="545" y="88" width="190" height="92" rx="8" fill="#fff4e6" stroke="#f2994a" stroke-width="2"/>
  <text x="640" y="119" text-anchor="middle" font-size="17" font-weight="700" fill="#8a4b12">前提C</text>
  <text x="640" y="146" text-anchor="middle" font-size="14" fill="#8a4b12">银行和监管会看</text>
  <text x="640" y="166" text-anchor="middle" font-size="14" fill="#8a4b12">真实性和留痕</text>

  <path d="M245 134 H300" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 134 H545" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="160" y="235" width="480" height="94" rx="10" fill="#f3f6f8" stroke="#90a4ae" stroke-width="2"/>
  <text x="400" y="269" text-anchor="middle" font-size="19" font-weight="700" fill="#263238">结论：先选合规入口，再谈买什么美股资产</text>
  <text x="400" y="301" text-anchor="middle" font-size="15" fill="#455a64">小白默认优先 QDII / 跨境ETF；境外账户必须先过资金路径审查</text>

  <path d="M400 180 V235" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
