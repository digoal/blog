<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f7f9fb"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">前提变化时的资金路径分支</text>

  <rect x="305" y="72" width="190" height="62" rx="8" fill="#ffffff" stroke="#607d8b" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#263238">先问：用途是什么？</text>
  <text x="400" y="121" text-anchor="middle" font-size="13" fill="#455a64">用途决定通道，不是通道决定用途</text>

  <path d="M400 134 V165" stroke="#6b7280" stroke-width="3"/>
  <path d="M150 165 H650" stroke="#6b7280" stroke-width="3"/>
  <path d="M150 165 V198" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 165 V198" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M650 165 V198" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="55" y="198" width="200" height="104" rx="8" fill="#eef8ef" stroke="#27ae60" stroke-width="2"/>
  <text x="155" y="229" text-anchor="middle" font-size="17" font-weight="700" fill="#1f6b3a">经常项目支出</text>
  <text x="155" y="256" text-anchor="middle" font-size="14" fill="#1f6b3a">留学 / 就医 / 旅游等</text>
  <text x="155" y="281" text-anchor="middle" font-size="14" fill="#1f6b3a">按材料和额度办理</text>

  <rect x="300" y="198" width="200" height="104" rx="8" fill="#e8f4ff" stroke="#2f80ed" stroke-width="2"/>
  <text x="400" y="229" text-anchor="middle" font-size="17" font-weight="700" fill="#174a7c">境外证券配置</text>
  <text x="400" y="256" text-anchor="middle" font-size="14" fill="#174a7c">优先 QDII / 跨境ETF</text>
  <text x="400" y="281" text-anchor="middle" font-size="14" fill="#174a7c">不把购汇额度当投资额度</text>

  <rect x="545" y="198" width="200" height="104" rx="8" fill="#fdeeee" stroke="#eb5757" stroke-width="2"/>
  <text x="645" y="229" text-anchor="middle" font-size="17" font-weight="700" fill="#8f2727">说不清的路径</text>
  <text x="645" y="256" text-anchor="middle" font-size="14" fill="#8f2727">借额度 / 地下换汇</text>
  <text x="645" y="281" text-anchor="middle" font-size="14" fill="#8f2727">虚假用途 / 分拆转出</text>

  <rect x="80" y="348" width="170" height="44" rx="7" fill="#ffffff" stroke="#b0bec5"/>
  <text x="165" y="376" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">保留真实凭证</text>

  <rect x="315" y="348" width="170" height="44" rx="7" fill="#ffffff" stroke="#b0bec5"/>
  <text x="400" y="376" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">查产品公告</text>

  <rect x="560" y="348" width="170" height="44" rx="7" fill="#ffffff" stroke="#b0bec5"/>
  <text x="645" y="376" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">停止操作</text>

  <path d="M155 302 V348" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 302 V348" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M645 302 V348" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
