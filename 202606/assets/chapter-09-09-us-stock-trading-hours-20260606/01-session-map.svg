<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美股交易时间地图</title>
  <desc id="desc">展示美股盘前、盘中、盘后与北京时间换算，以及不同时间段的交易风险。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="40" y="42" font-size="24" font-weight="700" fill="#111827">美股交易时间不是一条线，而是三段风险</text>
  <text x="40" y="72" font-size="14" fill="#4b5563">以美东时间 ET 为基准。券商开放窗口可能不同，下单前以账户页面为准。</text>

  <line x1="70" y1="155" x2="730" y2="155" stroke="#111827" stroke-width="2"/>
  <line x1="70" y1="145" x2="70" y2="165" stroke="#111827" stroke-width="2"/>
  <line x1="300" y1="145" x2="300" y2="165" stroke="#111827" stroke-width="2"/>
  <line x1="565" y1="145" x2="565" y2="165" stroke="#111827" stroke-width="2"/>
  <line x1="730" y1="145" x2="730" y2="165" stroke="#111827" stroke-width="2"/>

  <rect x="70" y="105" width="230" height="50" rx="8" fill="#fde68a" stroke="#f59e0b"/>
  <rect x="300" y="105" width="265" height="50" rx="8" fill="#bbf7d0" stroke="#16a34a"/>
  <rect x="565" y="105" width="165" height="50" rx="8" fill="#fecaca" stroke="#ef4444"/>

  <text x="150" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#7c2d12">盘前</text>
  <text x="432" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#14532d">盘中</text>
  <text x="648" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#7f1d1d">盘后</text>

  <text x="70" y="188" font-size="14" text-anchor="middle" fill="#111827">4:00</text>
  <text x="300" y="188" font-size="14" text-anchor="middle" fill="#111827">9:30</text>
  <text x="565" y="188" font-size="14" text-anchor="middle" fill="#111827">16:00</text>
  <text x="730" y="188" font-size="14" text-anchor="middle" fill="#111827">20:00</text>
  <text x="394" y="212" font-size="13" text-anchor="middle" fill="#4b5563">美东时间 ET</text>

  <rect x="55" y="245" width="690" height="104" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="80" y="278" font-size="16" font-weight="700" fill="#111827">北京时间换算</text>
  <text x="80" y="307" font-size="14" fill="#374151">美东夏令时 2026-03-08 至 2026-11-01：盘中 21:30 - 次日 04:00</text>
  <text x="80" y="333" font-size="14" fill="#374151">美东标准时：盘中 22:30 - 次日 05:00</text>
  <text x="470" y="307" font-size="14" fill="#b45309">盘前/盘后更像窄路会车</text>
  <text x="470" y="333" font-size="14" fill="#166534">盘中才是主干道</text>

  <circle cx="86" cy="118" r="7" fill="#f59e0b"/>
  <circle cx="316" cy="118" r="7" fill="#16a34a"/>
  <circle cx="581" cy="118" r="7" fill="#ef4444"/>
</svg>
