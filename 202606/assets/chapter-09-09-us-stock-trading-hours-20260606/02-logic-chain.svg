<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">交易时间论证链</title>
  <desc id="desc">从交易时段差异推导出小白默认在盘中交易，盘前盘后只做例外动作。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="40" y="42" font-size="24" font-weight="700" fill="#111827">从时间表推出操作纪律</text>

  <rect x="35" y="85" width="150" height="92" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="110" y="113" font-size="16" font-weight="700" text-anchor="middle" fill="#1e3a8a">前提A</text>
  <text x="110" y="140" font-size="13" text-anchor="middle" fill="#1e293b">盘中是主要</text>
  <text x="110" y="160" font-size="13" text-anchor="middle" fill="#1e293b">价格发现窗口</text>

  <rect x="230" y="85" width="150" height="92" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="305" y="113" font-size="16" font-weight="700" text-anchor="middle" fill="#7c2d12">前提B</text>
  <text x="305" y="140" font-size="13" text-anchor="middle" fill="#1e293b">盘前盘后</text>
  <text x="305" y="160" font-size="13" text-anchor="middle" fill="#1e293b">流动性更薄</text>

  <rect x="425" y="85" width="150" height="92" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="500" y="113" font-size="16" font-weight="700" text-anchor="middle" fill="#4c1d95">前提C</text>
  <text x="500" y="140" font-size="13" text-anchor="middle" fill="#1e293b">北京时间</text>
  <text x="500" y="160" font-size="13" text-anchor="middle" fill="#1e293b">容易疲劳交易</text>

  <rect x="620" y="85" width="145" height="92" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="692" y="113" font-size="16" font-weight="700" text-anchor="middle" fill="#7f1d1d">前提D</text>
  <text x="692" y="140" font-size="13" text-anchor="middle" fill="#1e293b">23/5 推进</text>
  <text x="692" y="160" font-size="13" text-anchor="middle" fill="#1e293b">不等于低风险</text>

  <line x1="185" y1="131" x2="230" y2="131" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="131" x2="425" y2="131" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="575" y1="131" x2="620" y2="131" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="110" y1="177" x2="110" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="305" y1="177" x2="305" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="177" x2="500" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="692" y1="177" x2="692" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="235" width="660" height="76" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="400" y="265" font-size="18" font-weight="700" text-anchor="middle" fill="#111827">推导：时间越偏离主会场，成交质量越不能靠直觉假设</text>
  <text x="400" y="292" font-size="14" text-anchor="middle" fill="#475569">所以小白的默认动作不是延长交易时间，而是缩小交易窗口、使用限价、降低仓位</text>

  <line x1="400" y1="311" x2="400" y2="342" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="344" width="460" height="38" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="368" font-size="16" font-weight="700" text-anchor="middle" fill="#14532d">结论：默认盘中交易；盘前盘后只做有预案的例外动作</text>
</svg>
