<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">盘前盘后下单决策树</title>
  <desc id="desc">展示小白是否应该在盘前盘后下单的检查流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="40" y="42" font-size="24" font-weight="700" fill="#111827">盘前盘后，不是看到价格就能下单</text>

  <rect x="286" y="70" width="228" height="52" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="400" y="102" font-size="16" font-weight="700" text-anchor="middle" fill="#1e3a8a">必须现在交易吗？</text>

  <line x1="286" y1="96" x2="138" y2="96" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="35" y="72" width="103" height="48" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="86" y="101" font-size="15" font-weight="700" text-anchor="middle" fill="#14532d">否：等盘中</text>

  <line x1="400" y1="122" x2="400" y2="158" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="266" y="160" width="268" height="50" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="400" y="190" font-size="15" font-weight="700" text-anchor="middle" fill="#7c2d12">是：先过五道门</text>

  <line x1="400" y1="210" x2="400" y2="235" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="245" width="680" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="105" y="282" font-size="13" text-anchor="middle" fill="#111827">1 限价单</text>
  <text x="242" y="282" font-size="13" text-anchor="middle" fill="#111827">2 成交量够</text>
  <text x="380" y="282" font-size="13" text-anchor="middle" fill="#111827">3 买卖价差小</text>
  <text x="520" y="282" font-size="13" text-anchor="middle" fill="#111827">4 仓位很小</text>
  <text x="660" y="282" font-size="13" text-anchor="middle" fill="#111827">5 接受不成交</text>

  <line x1="260" y1="309" x2="260" y2="345" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="309" x2="540" y2="345" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="135" y="348" width="250" height="34" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="260" y="370" font-size="14" font-weight="700" text-anchor="middle" fill="#7f1d1d">任一不满足：不交易</text>

  <rect x="415" y="348" width="250" height="34" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="540" y="370" font-size="14" font-weight="700" text-anchor="middle" fill="#14532d">全部满足：小仓位限价</text>
</svg>
