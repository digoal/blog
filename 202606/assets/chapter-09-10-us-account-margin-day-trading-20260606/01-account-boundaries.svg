<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">现金账户、保证金账户、日内交易的边界</text>

  <rect x="55" y="90" width="210" height="245" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="160" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f766e">现金账户</text>
  <line x1="80" y1="145" x2="240" y2="145" stroke="#99f6e4" stroke-width="2"/>
  <text x="80" y="178" font-family="Arial, sans-serif" font-size="15" fill="#111827">只用自己的钱</text>
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="15" fill="#111827">买入要等资金结算</text>
  <text x="80" y="242" font-family="Arial, sans-serif" font-size="15" fill="#111827">不能裸卖空</text>
  <text x="80" y="274" font-family="Arial, sans-serif" font-size="15" fill="#111827">核心风险: 违规使用</text>
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="15" fill="#111827">未结算资金</text>

  <rect x="295" y="90" width="210" height="245" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2563eb">保证金账户</text>
  <line x1="320" y1="145" x2="480" y2="145" stroke="#bfdbfe" stroke-width="2"/>
  <text x="320" y="178" font-family="Arial, sans-serif" font-size="15" fill="#111827">可以使用券商信用</text>
  <text x="320" y="210" font-family="Arial, sans-serif" font-size="15" fill="#111827">Reg T 初始保证金</text>
  <text x="320" y="236" font-family="Arial, sans-serif" font-size="15" fill="#111827">通常为 50%</text>
  <text x="320" y="268" font-family="Arial, sans-serif" font-size="15" fill="#111827">核心风险: 追加保证金</text>
  <text x="320" y="300" font-family="Arial, sans-serif" font-size="15" fill="#111827">和强制平仓</text>

  <rect x="535" y="90" width="210" height="245" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="640" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b45309">日内交易</text>
  <line x1="560" y1="145" x2="720" y2="145" stroke="#fde68a" stroke-width="2"/>
  <text x="560" y="178" font-family="Arial, sans-serif" font-size="15" fill="#111827">同日买入又卖出</text>
  <text x="560" y="210" font-family="Arial, sans-serif" font-size="15" fill="#111827">新规看日内保证金</text>
  <text x="560" y="242" font-family="Arial, sans-serif" font-size="15" fill="#111827">旧 PDT 框架已替换</text>
  <text x="560" y="274" font-family="Arial, sans-serif" font-size="15" fill="#111827">核心风险: 频繁交易</text>
  <text x="560" y="300" font-family="Arial, sans-serif" font-size="15" fill="#111827">放大错误</text>

  <path d="M265 212 H295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M505 212 H535" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">小白默认顺序: 先现金账户学规则，再判断是否需要保证金权限，日内交易只放在学习区</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
