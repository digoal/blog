<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">从账户规则推出操作结论</text>

  <rect x="45" y="82" width="145" height="95" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="117" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0e7490">前提A</text>
  <text x="117" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">现金账户</text>
  <text x="117" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">靠结算资金</text>

  <rect x="225" y="82" width="145" height="95" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="297" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">前提B</text>
  <text x="297" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">保证金账户</text>
  <text x="297" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">引入借款</text>

  <rect x="405" y="82" width="145" height="95" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="477" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#c2410c">前提C</text>
  <text x="477" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">日内交易</text>
  <text x="477" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">看日内风险</text>

  <rect x="585" y="82" width="145" height="95" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="657" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">频繁交易</text>
  <text x="657" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">放大错误</text>

  <path d="M190 130 H225" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M370 130 H405" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M550 130 H585" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="238" width="620" height="95" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">因为账户权限越高，规则、借款和强制处理风险越多</text>
  <text x="400" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">所以小白不能把“能交易”误当成“适合交易”</text>

  <path d="M400 177 V238" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 333 V370" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="130" y="370" width="540" height="42" rx="8" fill="#0f172a"/>
  <text x="400" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">结论: 现金账户做中长期学习，保证金不用借满，日内交易不做默认策略</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
