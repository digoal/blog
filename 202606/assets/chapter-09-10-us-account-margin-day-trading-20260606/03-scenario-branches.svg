<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">前提变化时的账户决策分支</text>

  <rect x="280" y="72" width="240" height="64" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">准备下单前先问</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">资金、账户、交易频率是否匹配?</text>

  <path d="M400 136 V170" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="180" width="180" height="105" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="160" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">中长期买ETF</text>
  <text x="160" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">闲钱、低频、长持</text>
  <text x="160" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">现金账户优先</text>

  <rect x="300" y="180" width="180" height="105" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="390" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">用未结算资金</text>
  <text x="390" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">现金到账前再买卖</text>
  <text x="390" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">先等T+1结算</text>

  <rect x="530" y="180" width="180" height="105" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">想开保证金</text>
  <text x="620" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">可借钱、可被追缴</text>
  <text x="620" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">先设不用杠杆线</text>

  <path d="M400 170 C260 160 180 160 160 180" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 170 V180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 170 C540 160 600 160 620 180" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="170" y="340" width="460" height="72" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#b91c1c">如果变成频繁日内交易</text>
  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">按券商最新日内保证金框架检查，先停止加频率，不用旧PDT规则自我安慰</text>

  <path d="M390 285 V340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M620 285 C620 315 560 335 510 340" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
