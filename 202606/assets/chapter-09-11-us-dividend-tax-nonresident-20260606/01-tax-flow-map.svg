<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">非美国居民买美股: 税务不是一笔账</text>
  <rect x="40" y="84" width="160" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a" font-family="Arial, sans-serif">美股资产</text>
  <text x="120" y="148" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">股票 / ETF / REITs</text>
  <path d="M200 130 H270" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="84" width="170" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="355" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#166534" font-family="Arial, sans-serif">分红</text>
  <text x="355" y="140" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">美国源泉预扣</text>
  <text x="355" y="162" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">30% 或协定税率</text>
  <path d="M440 130 H510" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="510" y="84" width="210" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="615" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">W-8BEN</text>
  <text x="615" y="140" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">证明非美国身份</text>
  <text x="615" y="162" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">券商按表格处理预扣</text>
  <rect x="120" y="236" width="180" height="94" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="210" y="266" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6" font-family="Arial, sans-serif">资本利得</text>
  <text x="210" y="294" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">一般不同于分红</text>
  <text x="210" y="316" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">看居留天数和特殊资产</text>
  <rect x="430" y="236" width="230" height="94" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="545" y="266" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">中国税收居民</text>
  <text x="545" y="294" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">境外所得仍要申报</text>
  <text x="545" y="316" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">已缴境外税可按规则抵免</text>
  <path d="M355 176 C350 220 300 238 265 250" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M615 176 C610 220 590 232 560 238" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="372" text-anchor="middle" font-size="15" fill="#374151" font-family="Arial, sans-serif">行动结论: 先确认身份和表格, 再用税后口径算收益, 最后保存凭证</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
