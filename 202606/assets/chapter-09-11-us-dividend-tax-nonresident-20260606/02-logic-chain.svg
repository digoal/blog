<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">论证链: 税务身份决定真实收益</text>
  <rect x="42" y="78" width="148" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="116" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a" font-family="Arial, sans-serif">前提A</text>
  <text x="116" y="137" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">非美国居民</text>
  <text x="116" y="157" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">按美国非居民规则</text>
  <path d="M190 126 H232" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="232" y="78" width="148" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="306" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#166534" font-family="Arial, sans-serif">前提B</text>
  <text x="306" y="137" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">分红是美国源泉收入</text>
  <text x="306" y="157" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">券商通常源泉预扣</text>
  <path d="M380 126 H422" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="422" y="78" width="148" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="496" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">前提C</text>
  <text x="496" y="137" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">W-8BEN 与协定</text>
  <text x="496" y="157" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">影响预扣税率</text>
  <path d="M570 126 H612" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="612" y="78" width="148" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="686" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">前提D</text>
  <text x="686" y="137" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">中国居民全球所得</text>
  <text x="686" y="157" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">仍有申报口径</text>
  <rect x="80" y="238" width="230" height="86" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="195" y="270" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="Arial, sans-serif">推导1</text>
  <text x="195" y="296" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">税前股息率不能当真实股息率</text>
  <path d="M310 281 H390" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="390" y="238" width="230" height="86" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="505" y="270" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="Arial, sans-serif">推导2</text>
  <text x="505" y="296" text-anchor="middle" font-size="14" fill="#1f2937" font-family="Arial, sans-serif">税后收益要连同申报和凭证计算</text>
  <path d="M505 324 V360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="240" y="360" width="320" height="44" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="388" text-anchor="middle" font-size="17" font-weight="700" fill="#166534" font-family="Arial, sans-serif">结论: 先填表留痕, 再按税后现金流选资产</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
