<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">前提变化时: 税务操作要跟着切换</text>
  <rect x="300" y="70" width="200" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a" font-family="Arial, sans-serif">买入美股前</text>
  <text x="400" y="118" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">先确认身份、表格、税后收益</text>
  <path d="M400 134 V164" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="180" width="190" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="155" y="208" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">没有 W-8BEN</text>
  <text x="155" y="235" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">预扣可能按默认高税率</text>
  <text x="155" y="257" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">动作: 先补表再重算收益</text>
  <rect x="290" y="180" width="190" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="385" y="208" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">持有高分红资产</text>
  <text x="385" y="235" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">税后股息率明显下降</text>
  <text x="385" y="257" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">动作: 与低分红ETF比较</text>
  <rect x="520" y="180" width="190" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="615" y="208" text-anchor="middle" font-size="16" font-weight="700" fill="#166534" font-family="Arial, sans-serif">中国税收居民</text>
  <text x="615" y="235" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">境外所得有申报要求</text>
  <text x="615" y="257" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">动作: 保存 1042-S 等凭证</text>
  <path d="M315 134 C255 154 205 166 155 180" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 134 C395 154 390 166 385 180" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M485 134 C545 154 585 166 615 180" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="326" width="460" height="58" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6" font-family="Arial, sans-serif">特殊提醒: 美国 PTP、美国不动产相关资产、较大规模直接持股</text>
  <text x="400" y="372" text-anchor="middle" font-size="13" fill="#1f2937" font-family="Arial, sans-serif">不按普通股票简化处理, 下单前查券商税务提示或咨询专业人士</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
