<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">美股披露体系: 先分清信息层级</text>
  <rect x="70" y="82" width="160" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">10-K</text>
  <text x="150" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">年度全景</text>
  <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">经审计财报</text>
  <rect x="320" y="82" width="160" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#14532d">10-Q</text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">季度更新</text>
  <text x="400" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">未审计财报</text>
  <rect x="570" y="82" width="160" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="650" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#7f1d1d">8-K</text>
  <text x="650" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">重大事件</text>
  <text x="650" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">通常4个工作日</text>
  <path d="M230 137 H320" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M480 137 H570" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="180" y="252" width="440" height="84" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7c2d12">Earnings Call / 财报电话会</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">解释管理层口径, 但必须回到文件核对</text>
  <path d="M150 192 C170 245, 220 260, 265 260" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M400 192 V252" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M650 192 C630 245, 580 260, 535 260" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">行动顺序: 先看8-K有没有突发, 再用10-Q看变化, 最后用10-K校准长期判断</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
