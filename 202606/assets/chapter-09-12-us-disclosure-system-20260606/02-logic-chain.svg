<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">论证链: 披露文件比二手解读更接近事实</text>
  <rect x="44" y="82" width="150" height="104" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="119" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="119" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">上市公司</text>
  <text x="119" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">必须定期披露</text>
  <rect x="238" y="82" width="150" height="104" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="313" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#14532d">前提B</text>
  <text x="313" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">文件有层级</text>
  <text x="313" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">10-K / 10-Q / 8-K</text>
  <rect x="432" y="82" width="150" height="104" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="507" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7c2d12">前提C</text>
  <text x="507" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">电话会解释</text>
  <text x="507" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">不能替代文件</text>
  <rect x="626" y="82" width="130" height="104" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="691" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7f1d1d">前提D</text>
  <text x="691" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">文件也会错</text>
  <text x="691" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">需交叉验证</text>
  <path d="M194 134 H238" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M388 134 H432" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M582 134 H626" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="105" y="242" width="250" height="82" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="230" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="230" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">先原始文件, 后观点解读</text>
  <rect x="445" y="242" width="250" height="82" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="570" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0c4a6e">结论</text>
  <text x="570" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">没读披露, 不重仓个股</text>
  <path d="M400 186 C330 215, 275 225, 230 242" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M355 283 H445" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">核心动作: 用披露文件回答“发生了什么、怎么赚钱、风险变没变、管理层怎么解释”</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
