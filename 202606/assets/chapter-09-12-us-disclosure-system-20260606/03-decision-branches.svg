<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f9fafb"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">下单前的披露检查决策树</text>
  <rect x="300" y="78" width="200" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">准备买入美股个股?</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">先查披露, 再谈价格</text>
  <rect x="60" y="202" width="200" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">有重大8-K?</text>
  <text x="160" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">并购 / 换CEO / 重述 / 违约</text>
  <rect x="300" y="202" width="200" height="82" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">10-Q趋势清楚?</text>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">收入 / 利润 / 现金流 / 指引</text>
  <rect x="540" y="202" width="200" height="82" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">10-K风险读完?</text>
  <text x="640" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">业务 / 风险 / MD&amp;A / 审计</text>
  <path d="M400 142 V174 H160 V202" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 142 V202" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 142 V174 H640 V202" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="92" y="350" width="170" height="60" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="177" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#881337">不清楚</text>
  <text x="177" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">先不重仓</text>
  <rect x="315" y="350" width="170" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#713f12">只懂一半</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">只用观察仓</text>
  <rect x="538" y="350" width="170" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="623" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">三项通过</text>
  <text x="623" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">按计划小仓位</text>
  <path d="M160 284 C155 320, 170 335, 177 350" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 284 V350" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M640 284 C650 320, 635 335, 623 350" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
