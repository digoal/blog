<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">美股数据源分层地图</title>
  <desc id="desc">展示SEC EDGAR、公司IR、交易所和FINRA在美股研究中的不同位置。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">常用数据源不是排名，是分层验真</text>

  <rect x="55" y="78" width="690" height="66" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="90" y="108" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3730a3">第一层：原始披露</text>
  <text x="90" y="132" font-family="Arial, sans-serif" font-size="15" fill="#111827">SEC EDGAR、公司IR：10-K、10-Q、8-K、财报新闻稿、电话会材料</text>

  <rect x="55" y="171" width="690" height="66" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="90" y="201" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0e7490">第二层：交易规则</text>
  <text x="90" y="225" font-family="Arial, sans-serif" font-size="15" fill="#111827">Nasdaq、NYSE：上市地、交易时间、假期、报价、市场状态</text>

  <rect x="55" y="264" width="690" height="66" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="90" y="294" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">第三层：监管与行为数据</text>
  <text x="90" y="318" font-family="Arial, sans-serif" font-size="15" fill="#111827">FINRA：BrokerCheck、做空持仓、做空成交量、账户与风险教育</text>

  <path d="M400 144 V170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 237 V263" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="135" y="358" width="530" height="38" rx="8" fill="#111827"/>
  <text x="400" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">结论：先问事实，再问能否交易，最后看情绪和拥挤度</text>
</svg>
