<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">从数据源推出下单纪律</title>
  <desc id="desc">展示美股研究中从原始披露、交易所规则、FINRA数据到操作结论的因果链。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">从数据源推出下单纪律</text>

  <rect x="40" y="78" width="158" height="92" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="119" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#3730a3">前提A</text>
  <text x="119" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">公司事实</text>
  <text x="119" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">先看披露</text>

  <rect x="226" y="78" width="158" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="305" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">前提B</text>
  <text x="305" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">财报解读</text>
  <text x="305" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">IR辅助确认</text>

  <rect x="412" y="78" width="158" height="92" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="491" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0e7490">前提C</text>
  <text x="491" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">交易规则</text>
  <text x="491" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">交易所确认</text>

  <rect x="598" y="78" width="158" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="677" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#c2410c">前提D</text>
  <text x="677" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">监管数据</text>
  <text x="677" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#111827">FINRA校验</text>

  <path d="M198 124 H226" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M384 124 H412" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M570 124 H598" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="228" width="600" height="102" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">因为不同数据源回答的问题不同</text>
  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">所以不能用行情软件的一条涨跌替代完整核对</text>

  <path d="M400 170 V228" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 330 V370" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="135" y="370" width="530" height="42" rx="8" fill="#0f172a"/>
  <text x="400" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">结论：三类信息一致才下单；不一致就降仓或等待</text>
</svg>
