<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">买入前的数据源核对流程</title>
  <desc id="desc">展示散户买入美股前如何依次核对SEC披露、公司IR、交易所信息和FINRA数据。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">买入前，先过四道数据门</text>

  <rect x="70" y="78" width="190" height="64" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="165" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3730a3">1 SEC EDGAR</text>
  <text x="165" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">最新10-K/10-Q/8-K</text>

  <rect x="305" y="78" width="190" height="64" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">2 公司IR</text>
  <text x="400" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">新闻稿和电话会材料</text>

  <rect x="540" y="78" width="190" height="64" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="635" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">3 Nasdaq/NYSE</text>
  <text x="635" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">上市地、时间、报价</text>

  <path d="M260 110 H305" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M495 110 H540" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="305" y="200" width="190" height="64" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">4 FINRA</text>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">券商资质和做空数据</text>

  <path d="M635 142 C635 190 520 232 495 232" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="130" y="324" width="210" height="46" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="235" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">信息一致：按计划小仓位</text>

  <rect x="460" y="324" width="210" height="46" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="565" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">信息冲突：不追，先复核</text>

  <path d="M400 264 V300" stroke="#475569" stroke-width="2"/>
  <path d="M400 300 H235 V324" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 300 H565 V324" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
