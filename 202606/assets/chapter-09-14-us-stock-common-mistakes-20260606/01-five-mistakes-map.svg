<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美股小白常见误区地图</title>
  <desc id="desc">展示中文社区、股价、汇率、税和估值五个下单前检查点。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">美股下单前，不是只看一个涨跌幅</text>

  <circle cx="400" cy="205" r="78" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">真实收益</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">信息 + 价格 + 汇率</text>
  <text x="400" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">税 + 估值</text>

  <rect x="55" y="86" width="165" height="70" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="137" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">只看中文社区</text>
  <text x="137" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">先问原始披露</text>

  <rect x="575" y="86" width="165" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="657" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">只看股价</text>
  <text x="657" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">先算市值和业绩</text>

  <rect x="60" y="275" width="165" height="70" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="142" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">不看汇率</text>
  <text x="142" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">先还原人民币收益</text>

  <rect x="317" y="305" width="165" height="70" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="399" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">不看税</text>
  <text x="399" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">先算税后现金流</text>

  <rect x="575" y="275" width="165" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">不看估值</text>
  <text x="657" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111827">先问预期贵不贵</text>

  <path d="M220 132 L329 171" stroke="#64748b" stroke-width="2"/>
  <path d="M575 132 L471 171" stroke="#64748b" stroke-width="2"/>
  <path d="M225 305 L333 245" stroke="#64748b" stroke-width="2"/>
  <path d="M400 305 L400 283" stroke="#64748b" stroke-width="2"/>
  <path d="M575 305 L467 245" stroke="#64748b" stroke-width="2"/>
</svg>
