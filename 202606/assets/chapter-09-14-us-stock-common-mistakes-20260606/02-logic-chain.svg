<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">美股小白避坑论证链</title>
  <desc id="desc">展示从信息、价格、汇率税费和估值前提出发，推导出下单前五问的因果路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">从五个前提推出一张下单检查表</text>

  <rect x="35" y="75" width="140" height="86" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="105" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">前提A</text>
  <text x="105" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">社区是二手信息</text>

  <rect x="205" y="75" width="140" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="275" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提B</text>
  <text x="275" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">股价不等于便宜</text>

  <rect x="375" y="75" width="140" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="445" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="445" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">汇率会改收益</text>

  <rect x="545" y="75" width="140" height="86" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="615" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="615" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">税会吃掉现金流</text>

  <rect x="293" y="204" width="214" height="64" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">前提E</text>
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">估值决定容错率</text>

  <path d="M105 161 C130 196, 235 205, 293 230" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M275 161 C295 184, 330 200, 354 204" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M445 161 C432 183, 418 195, 408 204" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M615 161 C577 191, 534 209, 507 228" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="82" y="312" width="636" height="70" rx="8" fill="#0f172a"/>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">结论: 下单前必须过五问</text>
  <text x="400" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe">原始披露、总市值、人民币收益、税后现金流、估值和预期</text>

  <path d="M400 268 V312" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
