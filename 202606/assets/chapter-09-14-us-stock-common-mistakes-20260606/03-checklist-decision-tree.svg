<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">美股下单前五问决策树</title>
  <desc id="desc">展示小白买入美股前逐步检查信息、股价、汇率、税和估值的流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">买入前五问：过不了就先不买</text>

  <rect x="65" y="72" width="180" height="54" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="155" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0e7490">1 原始披露看过吗？</text>

  <rect x="310" y="72" width="180" height="54" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">2 股价换成市值了吗？</text>

  <rect x="555" y="72" width="180" height="54" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="645" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#c2410c">3 汇率算进收益了吗？</text>

  <rect x="188" y="190" width="180" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="278" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">4 分红税扣了吗？</text>

  <rect x="432" y="190" width="180" height="54" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="522" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">5 估值有边界吗？</text>

  <path d="M245 99 H310" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M490 99 H555" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M645 126 C645 165, 575 174, 540 190" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M432 217 H368" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="316" width="285" height="54" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="212" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">任一问题答不上：先不买</text>

  <rect x="445" y="316" width="285" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="587" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">五问都通过：小仓位执行</text>

  <path d="M278 244 C250 273, 225 292, 212 316" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M522 244 C548 273, 575 292, 587 316" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
