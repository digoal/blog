<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">指数ETF先把难题拆开</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="42" y="86" width="178" height="74" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="131" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">直接买个股</text>
    <text x="131" y="141" text-anchor="middle" font-size="14" fill="#991b1b">同时判断公司、估值、财报</text>

    <rect x="42" y="194" width="178" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="131" y="224" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">追热门主题</text>
    <text x="131" y="249" text-anchor="middle" font-size="14" fill="#9a3412">同时承担集中和情绪风险</text>

    <rect x="304" y="108" width="192" height="138" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="400" y="143" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a8a">指数ETF</text>
    <text x="400" y="174" text-anchor="middle" font-size="15" fill="#1e40af">先买一篮子规则</text>
    <text x="400" y="198" text-anchor="middle" font-size="15" fill="#1e40af">再学习费用、流动性</text>
    <text x="400" y="222" text-anchor="middle" font-size="15" fill="#1e40af">最后再谈行业和个股</text>

    <rect x="584" y="72" width="170" height="66" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="669" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">先学市场主干</text>
    <text x="669" y="122" text-anchor="middle" font-size="13" fill="#166534">不是先猜一家公司</text>

    <rect x="584" y="168" width="170" height="66" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="669" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">先控犯错成本</text>
    <text x="669" y="218" text-anchor="middle" font-size="13" fill="#475569">仓位、费用、汇率写清</text>

    <rect x="584" y="264" width="170" height="66" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="669" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#713f12">再升级工具</text>
    <text x="669" y="314" text-anchor="middle" font-size="13" fill="#854d0e">行业ETF和个股排后面</text>
  </g>

  <g stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)">
    <path d="M220 123 C252 128, 270 142, 304 160"/>
    <path d="M220 231 C252 225, 270 211, 304 194"/>
    <path d="M496 158 C536 140, 550 116, 584 105"/>
    <path d="M496 180 C536 185, 550 196, 584 201"/>
    <path d="M496 211 C536 235, 550 274, 584 297"/>
  </g>

  <text x="400" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">小白第一步不是追收益想象，而是把风险拆成能检查的项目</text>
</svg>
