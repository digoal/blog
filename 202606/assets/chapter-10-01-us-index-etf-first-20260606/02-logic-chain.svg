<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">为什么指数和ETF要排在第一课</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="38" y="78" width="162" height="84" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="119" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="119" y="132" text-anchor="middle" font-size="14" fill="#1e40af">小白最大弱点</text>
    <text x="119" y="151" text-anchor="middle" font-size="14" fill="#1e40af">是判断链太长</text>

    <rect x="38" y="202" width="162" height="84" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="119" y="231" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提B</text>
    <text x="119" y="256" text-anchor="middle" font-size="14" fill="#166534">宽基指数</text>
    <text x="119" y="275" text-anchor="middle" font-size="14" fill="#166534">分散单票风险</text>

    <rect x="318" y="78" width="162" height="84" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
    <text x="399" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">前提C</text>
    <text x="399" y="132" text-anchor="middle" font-size="14" fill="#9a3412">ETF有规则优势</text>
    <text x="399" y="151" text-anchor="middle" font-size="14" fill="#9a3412">也有费用和折溢价</text>

    <rect x="318" y="202" width="162" height="84" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="2"/>
    <text x="399" y="231" text-anchor="middle" font-size="17" font-weight="700" fill="#581c87">前提D</text>
    <text x="399" y="256" text-anchor="middle" font-size="14" fill="#6b21a8">主动选股</text>
    <text x="399" y="275" text-anchor="middle" font-size="14" fill="#6b21a8">长期胜率不轻松</text>

    <rect x="592" y="132" width="168" height="106" rx="8" fill="#111827" stroke="#111827" stroke-width="2"/>
    <text x="676" y="165" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论</text>
    <text x="676" y="193" text-anchor="middle" font-size="14" fill="#e5e7eb">先研究宽基指数ETF</text>
    <text x="676" y="215" text-anchor="middle" font-size="14" fill="#e5e7eb">再研究行业和个股</text>
  </g>

  <g stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow2)">
    <path d="M200 120 C240 120, 270 120, 318 120"/>
    <path d="M200 244 C240 244, 270 244, 318 244"/>
    <path d="M480 120 C532 128, 554 150, 592 170"/>
    <path d="M480 244 C532 236, 554 212, 592 198"/>
  </g>

  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">因为指数ETF降低了第一步的判断难度，所以它适合做学习入口</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">但“ETF优先”只等于“先研究合格ETF”，不等于随便买任何ETF</text>
</svg>
