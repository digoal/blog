<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">前提变化时，动作也要切换</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="300" y="72" width="200" height="66" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">想买美股ETF</text>
    <text x="400" y="122" text-anchor="middle" font-size="14" fill="#475569">先问前提是否成立</text>

    <rect x="45" y="208" width="168" height="104" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="129" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">三年以上闲钱</text>
    <text x="129" y="263" text-anchor="middle" font-size="13" fill="#0369a1">能承受股市和汇率波动</text>
    <text x="129" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">研究宽基指数ETF</text>

    <rect x="236" y="208" width="168" height="104" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="320" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">短期要用钱</text>
    <text x="320" y="263" text-anchor="middle" font-size="13" fill="#92400e">不能承受下跌周期</text>
    <text x="320" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">不进股票ETF</text>

    <rect x="427" y="208" width="168" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="511" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">只看热门主题</text>
    <text x="511" y="263" text-anchor="middle" font-size="13" fill="#166534">说不清指数规则</text>
    <text x="511" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">降为观察名单</text>

    <rect x="618" y="208" width="138" height="104" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="687" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">高溢价/杠杆</text>
    <text x="687" y="263" text-anchor="middle" font-size="13" fill="#991b1b">工具前提失效</text>
    <text x="687" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">暂停下单</text>
  </g>

  <g stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#arrow3)">
    <path d="M358 138 C270 160, 178 178, 129 208"/>
    <path d="M388 138 C360 160, 334 178, 320 208"/>
    <path d="M421 138 C460 160, 492 178, 511 208"/>
    <path d="M470 138 C560 160, 642 178, 687 208"/>
  </g>

  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">同样叫ETF，前提不同，动作不同；先检查，再交易</text>
</svg>
