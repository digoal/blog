<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">标普500在组合里的角色</text>
  <text x="400" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">它不是“保证赚钱”的产品，而是美国大盘股票风险的核心代表</text>

  <rect x="64" y="122" width="170" height="84" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="149" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">500家大公司</text>
  <text x="149" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">覆盖约80%可投资</text>
  <text x="149" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">美国股票市值</text>

  <path d="M238 164 H322" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="330" y="104" width="210" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="435" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">市值加权指数</text>
  <text x="435" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">大公司权重更高</text>
  <text x="435" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">强者影响指数更大</text>
  <text x="435" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">也带来集中度风险</text>

  <path d="M544 164 H628" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="636" y="122" width="150" height="84" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="711" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">核心仓候选</text>
  <text x="711" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">长期钱</text>
  <text x="711" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">分批买入</text>

  <rect x="96" y="276" width="608" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">正确理解</text>
  <text x="400" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">标普500 = 美国大盘股票风险入口；不是现金、不是保本、不是短线暴富工具</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
