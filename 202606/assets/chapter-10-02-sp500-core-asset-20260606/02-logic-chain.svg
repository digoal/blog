<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从事实推出操作结论</text>

  <rect x="42" y="82" width="170" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="127" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="127" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">覆盖美国大盘</text>
  <text x="127" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">分散单公司风险</text>

  <rect x="292" y="82" width="170" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="377" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">前提B</text>
  <text x="377" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">规则透明</text>
  <text x="377" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">ETF成本低</text>

  <rect x="542" y="82" width="170" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="627" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">前提C</text>
  <text x="627" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">仍是股票资产</text>
  <text x="627" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">会回撤和集中</text>

  <path d="M127 178 V226 H285" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M377 178 V226" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M627 178 V226 H465" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="268" y="228" width="264" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">逻辑推导</text>
  <text x="400" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">因为它代表大盘且易执行</text>
  <text x="400" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">所以可做核心；但不能满仓</text>

  <path d="M400 316 V346" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="190" y="350" width="420" height="48" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">操作结论：长期钱、核心仓、分批买、定期再平衡</text>

  <defs>
