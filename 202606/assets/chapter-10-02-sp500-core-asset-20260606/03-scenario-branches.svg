<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提变化时，动作也要变化</text>

  <rect x="284" y="72" width="232" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">想买标普500ETF</text>
  <text x="400" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">先检查资金属性和市场前提</text>

  <path d="M400 134 V166" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="76" y="180" width="184" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="168" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">长期闲钱</text>
  <text x="168" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">能承受回撤</text>
  <text x="168" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">动作：核心仓分批买</text>

  <rect x="308" y="180" width="184" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">估值或汇率不舒服</text>
  <text x="400" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">不做一次性重仓</text>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">动作：降低节奏</text>

  <rect x="540" y="180" width="184" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="632" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">短期要用钱</text>
  <text x="632" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">或无法承受下跌</text>
  <text x="632" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">动作：不要买股票ETF</text>

  <path d="M352 136 L168 174" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 136 V174" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M448 136 L632 174" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="116" y="326" width="568" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">失败提醒</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">把标普500ETF当短线筹码、满仓筹码或保本工具，都是前提错配</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
