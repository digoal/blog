<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">纳斯达克100的弹性来自集中度</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">示意图：不是全部股票平均用力，而是大盘成长和科技相关公司权重更重</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="115" width="660" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="400" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">指数规则：纳斯达克上市的大型非金融公司</text>

    <rect x="70" y="210" width="320" height="94" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="230" y="240" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">好处</text>
    <text x="230" y="267" text-anchor="middle" font-size="15" fill="#166534">成长股盈利上行时</text>
    <text x="230" y="288" text-anchor="middle" font-size="15" fill="#166534">涨幅可能比普通宽基更猛</text>

    <rect x="410" y="210" width="320" height="94" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="570" y="240" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">代价</text>
    <text x="570" y="267" text-anchor="middle" font-size="15" fill="#991b1b">利率上行或估值收缩时</text>
    <text x="570" y="288" text-anchor="middle" font-size="15" fill="#991b1b">回撤也会更集中</text>

    <rect x="178" y="345" width="444" height="44" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="400" y="373" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">结论：它适合做成长卫星仓，不适合当全部美股仓</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <g stroke="#475569" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M300 161 C270 178, 245 190, 230 210"/>
    <path d="M500 161 C535 178, 555 190, 570 210"/>
    <path d="M230 304 C260 328, 315 344, 365 345"/>
    <path d="M570 304 C540 328, 485 344, 435 345"/>
  </g>
</svg>
