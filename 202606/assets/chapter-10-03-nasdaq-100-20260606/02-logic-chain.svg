<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">从指数结构推出操作规则</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="88" width="175" height="88" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="132" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="132" y="142" text-anchor="middle" font-size="14" fill="#1e40af">大盘非金融公司</text>
    <text x="132" y="161" text-anchor="middle" font-size="14" fill="#1e40af">规则透明</text>

    <rect x="45" y="224" width="175" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="132" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">前提B</text>
    <text x="132" y="278" text-anchor="middle" font-size="14" fill="#92400e">科技成长权重高</text>
    <text x="132" y="297" text-anchor="middle" font-size="14" fill="#92400e">集中度更强</text>

    <rect x="310" y="88" width="185" height="88" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="402" y="116" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提C</text>
    <text x="402" y="142" text-anchor="middle" font-size="14" fill="#166534">盈利扩张时</text>
    <text x="402" y="161" text-anchor="middle" font-size="14" fill="#166534">弹性更大</text>

    <rect x="310" y="224" width="185" height="88" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="402" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">前提D</text>
    <text x="402" y="278" text-anchor="middle" font-size="14" fill="#991b1b">利率和估值逆风</text>
    <text x="402" y="297" text-anchor="middle" font-size="14" fill="#991b1b">回撤也更大</text>

    <rect x="575" y="150" width="178" height="110" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="664" y="181" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">结论</text>
    <text x="664" y="208" text-anchor="middle" font-size="14" fill="#334155">用它抓成长弹性</text>
    <text x="664" y="229" text-anchor="middle" font-size="14" fill="#334155">仓位不能替代全部宽基</text>
    <text x="664" y="250" text-anchor="middle" font-size="14" fill="#334155">跌破前提就降仓</text>
  </g>

  <g stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)">
    <path d="M220 132 C255 132, 275 132, 310 132"/>
    <path d="M220 268 C255 268, 275 268, 310 268"/>
    <path d="M495 132 C535 138, 555 162, 575 184"/>
    <path d="M495 268 C535 264, 555 238, 575 219"/>
  </g>

  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">因为收益弹性和回撤弹性来自同一个集中结构，所以买入前必须先定仓位上限</text>
  <text x="400" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">纳指100不是保守型底仓，它是美股组合里的成长引擎</text>
</svg>
