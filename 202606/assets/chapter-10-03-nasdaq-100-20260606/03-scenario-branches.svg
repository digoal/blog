<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">前提变化时，纳指100仓位要跟着变</text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">同一只ETF，在不同环境下不是同一个风险</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="300" y="92" width="200" height="64" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="400" y="119" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">想买纳指100ETF</text>
    <text x="400" y="141" text-anchor="middle" font-size="14" fill="#475569">先看三个前提</text>

    <rect x="45" y="226" width="210" height="106" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="150" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">盈利和AI投资兑现</text>
    <text x="150" y="280" text-anchor="middle" font-size="14" fill="#166534">估值不极端，趋势确认</text>
    <text x="150" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">小比例成长仓</text>

    <rect x="295" y="226" width="210" height="106" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="400" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">估值很贵但趋势强</text>
    <text x="400" y="280" text-anchor="middle" font-size="14" fill="#92400e">上涨靠情绪和资金</text>
    <text x="400" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">只观察或轻仓</text>

    <rect x="545" y="226" width="210" height="106" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="650" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">利率上行或盈利转弱</text>
    <text x="650" y="280" text-anchor="middle" font-size="14" fill="#991b1b">高估值资产被压缩</text>
    <text x="650" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">降仓，不补成重仓</text>

    <rect x="240" y="365" width="320" height="40" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <text x="400" y="391" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">纪律：先写仓位上限，再谈买入价格</text>
  </g>

  <g stroke="#475569" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M350 156 C270 178, 195 200, 150 226"/>
    <path d="M400 156 L400 226"/>
    <path d="M450 156 C530 178, 605 200, 650 226"/>
    <path d="M150 332 C200 350, 275 360, 343 365"/>
    <path d="M400 332 L400 365"/>
    <path d="M650 332 C600 350, 525 360, 457 365"/>
  </g>
</svg>
