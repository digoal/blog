<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">道琼斯指数: 历史温度计, 不是完整市场地图</text>
  <rect x="60" y="92" width="185" height="210" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="152" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">30只蓝筹</text>
  <text x="152" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">成分股少</text>
  <text x="152" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">代表老牌大公司</text>
  <text x="152" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">不是全市场</text>
  <path d="M245 195 H305" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="305" y="92" width="185" height="210" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="398" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#047857">价格加权</text>
  <text x="398" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">股价高</text>
  <text x="398" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">影响更大</text>
  <text x="398" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">不按市值大小</text>
  <path d="M490 195 H550" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="550" y="92" width="190" height="210" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">使用定位</text>
  <text x="645" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">看新闻可以</text>
  <text x="645" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">做辅助基准可以</text>
  <text x="645" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">当核心需谨慎</text>
  <rect x="130" y="330" width="540" height="40" rx="8" fill="#e2e8f0"/>
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">结论: 新手核心基准优先看覆盖更广、权重逻辑更直观的标普500或全市场指数</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
