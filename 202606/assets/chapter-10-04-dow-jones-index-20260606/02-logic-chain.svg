<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">论证链: 为什么道指不应默认做小白核心基准</text>
  <rect x="35" y="80" width="170" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="120" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">只有30家公司</text>
  <text x="120" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">覆盖面窄</text>
  <rect x="35" y="210" width="170" height="90" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="120" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#047857">前提B</text>
  <text x="120" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">价格加权</text>
  <text x="120" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">股价影响权重</text>
  <rect x="270" y="145" width="170" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="355" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#c2410c">前提C</text>
  <text x="355" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">小白需要核心仓</text>
  <text x="355" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">先求代表性</text>
  <path d="M205 125 C245 125 245 180 270 180" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M205 255 C245 255 245 215 270 205" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M440 190 H505" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="505" y="105" width="250" height="170" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="630" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#b91c1c">推导结论</text>
  <text x="630" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">因为覆盖窄 + 权重特殊</text>
  <text x="630" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">所以道指更适合做辅助观察</text>
  <text x="630" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">核心配置先看更广指数</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">行动: 新闻看道指, 核心仓先看标普500/全市场, DIA只做小比例卫星或比较工具</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
