<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">情景分支: 道指该怎么用</text>
  <rect x="315" y="78" width="170" height="64" rx="8" fill="#111827"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">你看到道指涨跌</text>
  <text x="400" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1">先问用途</text>
  <path d="M400 142 V178" stroke="#64748b" stroke-width="3"/>
  <path d="M185 178 H615" stroke="#64748b" stroke-width="3"/>
  <path d="M185 178 V208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 178 V208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M615 178 V208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="65" y="208" width="240" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="185" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">看新闻温度</text>
  <text x="185" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">可以用</text>
  <text x="185" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">但不据此满仓</text>
  <rect x="280" y="208" width="240" height="110" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#047857">做核心配置</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">优先看标普500</text>
  <text x="400" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">或全市场指数</text>
  <rect x="495" y="208" width="240" height="110" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="615" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#c2410c">买DIA卫星</text>
  <text x="615" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">只给小比例</text>
  <text x="615" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">并设替代基准</text>
  <rect x="115" y="345" width="570" height="34" rx="8" fill="#fee2e2"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">禁止情景: 把30只价格加权指数误当作整个美国股市</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
