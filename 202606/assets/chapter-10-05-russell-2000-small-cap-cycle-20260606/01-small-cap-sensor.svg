<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">罗素2000的小盘股敏感器</title>
  <desc id="desc">展示罗素2000与标普500在公司规模、经济敏感度、利率敏感度和组合位置上的区别。</desc>
  <rect width="800" height="400" fill="#f7f8fa"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">罗素2000不是小号标普500，而是小盘股经济敏感器</text>

  <rect x="72" y="84" width="260" height="240" rx="8" fill="#ffffff" stroke="#ccd3df"/>
  <rect x="428" y="84" width="260" height="240" rx="8" fill="#ffffff" stroke="#ccd3df"/>

  <text x="202" y="123" text-anchor="middle" font-size="21" font-weight="700" fill="#1f4e79">标普500</text>
  <text x="202" y="153" text-anchor="middle" font-size="15" fill="#4d5b6c">美国大盘核心资产</text>
  <line x1="112" y1="176" x2="292" y2="176" stroke="#d7dde6"/>
  <text x="118" y="210" font-size="15" fill="#263445">大公司为主</text>
  <text x="118" y="240" font-size="15" fill="#263445">全球收入占比更高</text>
  <text x="118" y="270" font-size="15" fill="#263445">融资渠道更宽</text>
  <text x="118" y="300" font-size="15" fill="#263445">更适合做核心基准</text>

  <text x="558" y="123" text-anchor="middle" font-size="21" font-weight="700" fill="#9a5a00">罗素2000</text>
  <text x="558" y="153" text-anchor="middle" font-size="15" fill="#4d5b6c">美国小盘股代表</text>
  <line x1="468" y1="176" x2="648" y2="176" stroke="#d7dde6"/>
  <text x="474" y="210" font-size="15" fill="#263445">约2000只小公司</text>
  <text x="474" y="240" font-size="15" fill="#263445">更依赖美国本土经济</text>
  <text x="474" y="270" font-size="15" fill="#263445">更怕利率和信用收紧</text>
  <text x="474" y="300" font-size="15" fill="#263445">更适合做卫星仓</text>

  <path d="M342 203 C374 185, 400 185, 418 203" fill="none" stroke="#577590" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="231" text-anchor="middle" font-size="14" fill="#4d5b6c">不是替代关系</text>
  <text x="400" y="253" text-anchor="middle" font-size="14" fill="#4d5b6c">是风险层级不同</text>

  <rect x="158" y="344" width="484" height="34" rx="6" fill="#e9f2ef" stroke="#8fb7a7"/>
  <text x="400" y="366" text-anchor="middle" font-size="15" font-weight="700" fill="#22543d">行动结论：小白先用大盘ETF做核心，罗素2000只做小比例周期卫星</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#577590"/>
    </marker>
  </defs>
</svg>
