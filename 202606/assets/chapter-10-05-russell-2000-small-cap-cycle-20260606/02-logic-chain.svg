<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">罗素2000论证链</title>
  <desc id="desc">用前提、推导、结论展示为什么罗素2000应作为小比例周期卫星仓。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">从小盘股特性推出操作结论</text>

  <rect x="44" y="78" width="170" height="95" rx="8" fill="#eef5ff" stroke="#7aa2d6"/>
  <text x="129" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#1f4e79">前提A</text>
  <text x="129" y="132" text-anchor="middle" font-size="14" fill="#263445">公司更小</text>
  <text x="129" y="153" text-anchor="middle" font-size="14" fill="#263445">盈利和融资更脆弱</text>

  <rect x="44" y="204" width="170" height="95" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="129" y="231" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5200">前提B</text>
  <text x="129" y="258" text-anchor="middle" font-size="14" fill="#263445">本土收入占比高</text>
  <text x="129" y="279" text-anchor="middle" font-size="14" fill="#263445">更看美国经济脸色</text>

  <rect x="298" y="141" width="196" height="116" rx="8" fill="#f2f4f7" stroke="#aab4c3"/>
  <text x="396" y="169" text-anchor="middle" font-size="17" font-weight="700" fill="#263445">推导</text>
  <text x="396" y="198" text-anchor="middle" font-size="14" fill="#263445">经济改善 + 信用宽松</text>
  <text x="396" y="221" text-anchor="middle" font-size="14" fill="#263445">小盘弹性才更容易释放</text>
  <text x="396" y="244" text-anchor="middle" font-size="14" fill="#263445">否则波动先放大亏损</text>

  <rect x="584" y="78" width="170" height="95" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="669" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#22543d">正常结论</text>
  <text x="669" y="132" text-anchor="middle" font-size="14" fill="#263445">小比例卫星仓</text>
  <text x="669" y="153" text-anchor="middle" font-size="14" fill="#263445">不替代核心宽基</text>

  <rect x="584" y="204" width="170" height="95" rx="8" fill="#fcebea" stroke="#d97a7a"/>
  <text x="669" y="231" text-anchor="middle" font-size="17" font-weight="700" fill="#8a2d2d">失效结论</text>
  <text x="669" y="258" text-anchor="middle" font-size="14" fill="#263445">加息或衰退压力上升</text>
  <text x="669" y="279" text-anchor="middle" font-size="14" fill="#263445">降仓或停止加仓</text>

  <path d="M214 126 L288 174" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M214 252 L288 222" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M494 184 L574 136" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M494 222 L574 252" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="96" y="342" width="608" height="42" rx="7" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="400" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">先判断环境，再给仓位；看不懂经济和利率，就不要把罗素2000当主仓</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
