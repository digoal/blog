<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title desc">
  <title id="title">罗素2000情景分支</title>
  <desc id="desc">展示增长、利率、信用和仓位四个情景下罗素2000的操作分支。</desc>
  <rect width="800" height="440" fill="#f7f8fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">罗素2000的情景推演</text>

  <rect x="310" y="74" width="180" height="62" rx="8" fill="#ffffff" stroke="#aab4c3"/>
  <text x="400" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#263445">先问三件事</text>
  <text x="400" y="122" text-anchor="middle" font-size="13" fill="#4d5b6c">增长、利率、信用</text>

  <rect x="56" y="196" width="170" height="104" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="141" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#22543d">增长改善</text>
  <text x="141" y="253" text-anchor="middle" font-size="14" fill="#263445">利润预期上修</text>
  <text x="141" y="276" text-anchor="middle" font-size="14" fill="#263445">允许小仓试探</text>

  <rect x="286" y="196" width="170" height="104" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="371" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5200">利率上行</text>
  <text x="371" y="253" text-anchor="middle" font-size="14" fill="#263445">融资成本上升</text>
  <text x="371" y="276" text-anchor="middle" font-size="14" fill="#263445">暂停追涨</text>

  <rect x="516" y="196" width="170" height="104" rx="8" fill="#fcebea" stroke="#d97a7a"/>
  <text x="601" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#8a2d2d">信用收紧</text>
  <text x="601" y="253" text-anchor="middle" font-size="14" fill="#263445">再融资难度上升</text>
  <text x="601" y="276" text-anchor="middle" font-size="14" fill="#263445">降到观察仓</text>

  <rect x="246" y="344" width="308" height="54" rx="8" fill="#ffffff" stroke="#aab4c3"/>
  <text x="400" y="366" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">仓位规则</text>
  <text x="400" y="387" text-anchor="middle" font-size="14" fill="#263445">总组合5%-10%以内；前提破坏时先减仓再复盘</text>

  <path d="M400 136 L141 190" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 136 L371 190" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 136 L601 190" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M141 300 C198 326, 246 344, 304 344" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M371 300 L386 338" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M601 300 C550 326, 518 344, 496 344" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
