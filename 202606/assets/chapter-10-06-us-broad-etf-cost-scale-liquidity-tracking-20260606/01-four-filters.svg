<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美股宽基ETF四道筛子</title>
  <desc id="desc">用费用率、规模、流动性和跟踪误差四个维度筛选美股宽基ETF。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">同一个指数，不等于同一只ETF</text>

  <rect x="54" y="86" width="150" height="118" rx="8" fill="#eef5ff" stroke="#6f9ed6" stroke-width="2"/>
  <text x="129" y="118" text-anchor="middle" font-size="19" font-weight="700" fill="#1f4e79">费用率</text>
  <text x="129" y="150" text-anchor="middle" font-size="14" fill="#263445">每年从净值里扣</text>
  <text x="129" y="174" text-anchor="middle" font-size="14" fill="#263445">长期像慢漏气</text>

  <rect x="238" y="86" width="150" height="118" rx="8" fill="#eaf7ee" stroke="#6aa982" stroke-width="2"/>
  <text x="313" y="118" text-anchor="middle" font-size="19" font-weight="700" fill="#22543d">规模</text>
  <text x="313" y="150" text-anchor="middle" font-size="14" fill="#263445">资产越大</text>
  <text x="313" y="174" text-anchor="middle" font-size="14" fill="#263445">运营越稳</text>

  <rect x="422" y="86" width="150" height="118" rx="8" fill="#fff4e5" stroke="#d99a38" stroke-width="2"/>
  <text x="497" y="118" text-anchor="middle" font-size="19" font-weight="700" fill="#8a5200">流动性</text>
  <text x="497" y="150" text-anchor="middle" font-size="14" fill="#263445">成交量和价差</text>
  <text x="497" y="174" text-anchor="middle" font-size="14" fill="#263445">决定进出摩擦</text>

  <rect x="606" y="86" width="150" height="118" rx="8" fill="#fcebea" stroke="#d97a7a" stroke-width="2"/>
  <text x="681" y="118" text-anchor="middle" font-size="19" font-weight="700" fill="#8a2d2d">跟踪误差</text>
  <text x="681" y="150" text-anchor="middle" font-size="14" fill="#263445">ETF表现</text>
  <text x="681" y="174" text-anchor="middle" font-size="14" fill="#263445">偏离指数多少</text>

  <path d="M129 224 L129 268 L396 268" stroke="#6b7a90" stroke-width="3" fill="none"/>
  <path d="M313 224 L313 268" stroke="#6b7a90" stroke-width="3" fill="none"/>
  <path d="M497 224 L497 268" stroke="#6b7a90" stroke-width="3" fill="none"/>
  <path d="M681 224 L681 268 L404 268" stroke="#6b7a90" stroke-width="3" fill="none"/>
  <path d="M396 268 L396 292" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="170" y="300" width="460" height="58" rx="8" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="400" y="325" text-anchor="middle" font-size="16" font-weight="700" fill="#172033">合格宽基ETF</text>
  <text x="400" y="348" text-anchor="middle" font-size="14" fill="#263445">低费用 + 大规模 + 好成交 + 稳定贴近指数</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
