<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">美股宽基ETF选择论证链</title>
  <desc id="desc">展示从ETF外壳差异推导到先筛成本和成交质量的操作结论。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">从“同指数不同外壳”推出买入规则</text>

  <rect x="42" y="78" width="178" height="98" rx="8" fill="#eef5ff" stroke="#7aa2d6"/>
  <text x="131" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#1f4e79">前提A</text>
  <text x="131" y="132" text-anchor="middle" font-size="14" fill="#263445">指数决定底层风险</text>
  <text x="131" y="154" text-anchor="middle" font-size="14" fill="#263445">ETF决定执行成本</text>

  <rect x="42" y="208" width="178" height="98" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="131" y="235" text-anchor="middle" font-size="17" font-weight="700" fill="#22543d">前提B</text>
  <text x="131" y="262" text-anchor="middle" font-size="14" fill="#263445">长期持有时</text>
  <text x="131" y="284" text-anchor="middle" font-size="14" fill="#263445">小成本会复利放大</text>

  <rect x="310" y="130" width="190" height="124" rx="8" fill="#f2f4f7" stroke="#aab4c3"/>
  <text x="405" y="160" text-anchor="middle" font-size="17" font-weight="700" fill="#263445">推导</text>
  <text x="405" y="190" text-anchor="middle" font-size="14" fill="#263445">因为ETF不是指数本身</text>
  <text x="405" y="214" text-anchor="middle" font-size="14" fill="#263445">所以要检查外壳质量</text>
  <text x="405" y="238" text-anchor="middle" font-size="14" fill="#263445">不能只看名称和涨跌</text>

  <rect x="584" y="78" width="174" height="98" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="671" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5200">正常结论</text>
  <text x="671" y="132" text-anchor="middle" font-size="14" fill="#263445">先筛主流低成本ETF</text>
  <text x="671" y="154" text-anchor="middle" font-size="14" fill="#263445">再分批建仓</text>

  <rect x="584" y="208" width="174" height="98" rx="8" fill="#fcebea" stroke="#d97a7a"/>
  <text x="671" y="235" text-anchor="middle" font-size="17" font-weight="700" fill="#8a2d2d">失效结论</text>
  <text x="671" y="262" text-anchor="middle" font-size="14" fill="#263445">高费率或低流动性</text>
  <text x="671" y="284" text-anchor="middle" font-size="14" fill="#263445">降级为观察对象</text>

  <path d="M220 128 L300 172" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M220 256 L300 222" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M500 176 L574 132" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M500 222 L574 256" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="94" y="344" width="612" height="42" rx="7" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="400" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">先看跟踪指数，再看ETF外壳；外壳不合格，指数再好也先不买</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
