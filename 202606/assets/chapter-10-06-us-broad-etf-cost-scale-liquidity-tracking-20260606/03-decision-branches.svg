<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">美股宽基ETF情景分支</title>
  <desc id="desc">根据费用、规模、流动性、跟踪情况和溢价判断买入、观察或排除。</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">候选ETF进入买入清单前的分支判断</text>

  <rect x="300" y="70" width="200" height="64" rx="8" fill="#eef5ff" stroke="#7aa2d6"/>
  <text x="400" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#1f4e79">候选宽基ETF</text>
  <text x="400" y="120" text-anchor="middle" font-size="13" fill="#263445">先确认跟踪同一类宽基指数</text>

  <rect x="72" y="188" width="186" height="92" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="165" y="216" text-anchor="middle" font-size="16" font-weight="700" fill="#22543d">四项合格</text>
  <text x="165" y="242" text-anchor="middle" font-size="13" fill="#263445">低费用、大规模</text>
  <text x="165" y="263" text-anchor="middle" font-size="13" fill="#263445">价差小、贴近指数</text>

  <rect x="307" y="188" width="186" height="92" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="400" y="216" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5200">一项有疑问</text>
  <text x="400" y="242" text-anchor="middle" font-size="13" fill="#263445">费用或成交一般</text>
  <text x="400" y="263" text-anchor="middle" font-size="13" fill="#263445">但规则仍看得懂</text>

  <rect x="542" y="188" width="186" height="92" rx="8" fill="#fcebea" stroke="#d97a7a"/>
  <text x="635" y="216" text-anchor="middle" font-size="16" font-weight="700" fill="#8a2d2d">两项以上不合格</text>
  <text x="635" y="242" text-anchor="middle" font-size="13" fill="#263445">低成交、高价差</text>
  <text x="635" y="263" text-anchor="middle" font-size="13" fill="#263445">跟踪偏离或高溢价</text>

  <rect x="72" y="330" width="186" height="56" rx="8" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="165" y="354" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">进入买入清单</text>
  <text x="165" y="375" text-anchor="middle" font-size="13" fill="#263445">限价单、分批、记成本</text>

  <rect x="307" y="330" width="186" height="56" rx="8" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="400" y="354" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">观察不下单</text>
  <text x="400" y="375" text-anchor="middle" font-size="13" fill="#263445">等价差和溢价回落</text>

  <rect x="542" y="330" width="186" height="56" rx="8" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="635" y="354" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">排除</text>
  <text x="635" y="375" text-anchor="middle" font-size="13" fill="#263445">换主流替代品</text>

  <path d="M400 134 L400 162" stroke="#6b7a90" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 162 L165 162 L165 180" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 162 L400 180" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 162 L635 162 L635 180" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M165 280 L165 322" stroke="#6b7a90" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 280 L400 322" stroke="#6b7a90" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M635 280 L635 322" stroke="#6b7a90" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
