<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">行业ETF在组合里的位置</title>
  <desc id="desc">展示宽基核心仓与行业卫星仓的关系</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">行业ETF不是另一只宽基, 而是给某个行业加浓度</text>

  <rect x="70" y="92" width="270" height="220" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="205" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">核心宽基仓</text>
  <text x="205" y="154" text-anchor="middle" font-size="15" fill="#334155">标普500 / 全市场ETF</text>
  <rect x="105" y="178" width="200" height="34" rx="6" fill="#dbeafe"/>
  <text x="205" y="200" text-anchor="middle" font-size="15" fill="#1e40af">已经包含11个主要行业</text>
  <rect x="105" y="228" width="200" height="34" rx="6" fill="#e0f2fe"/>
  <text x="205" y="250" text-anchor="middle" font-size="15" fill="#075985">任务: 做账户底盘</text>
  <rect x="105" y="278" width="200" height="34" rx="6" fill="#ecfeff"/>
  <text x="205" y="300" text-anchor="middle" font-size="15" fill="#155e75">原则: 少前提, 可长期跟踪</text>

  <path d="M355 202 L435 202" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="185" text-anchor="middle" font-size="14" fill="#475569">主动加码</text>

  <rect x="460" y="92" width="270" height="220" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="595" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">行业卫星仓</text>
  <text x="595" y="154" text-anchor="middle" font-size="15" fill="#334155">科技、医疗、金融、能源、消费、半导体</text>
  <rect x="495" y="178" width="200" height="34" rx="6" fill="#fee2e2"/>
  <text x="595" y="200" text-anchor="middle" font-size="15" fill="#991b1b">风险: 集中在一个驱动</text>
  <rect x="495" y="228" width="200" height="34" rx="6" fill="#ffedd5"/>
  <text x="595" y="250" text-anchor="middle" font-size="15" fill="#9a3412">任务: 增强弹性</text>
  <rect x="495" y="278" width="200" height="34" rx="6" fill="#fef3c7"/>
  <text x="595" y="300" text-anchor="middle" font-size="15" fill="#92400e">原则: 有假设, 有上限</text>

  <text x="400" y="356" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">行动结论: 先有核心宽基, 再用小比例行业ETF表达明确判断</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
