<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">行业ETF论证链</title>
  <desc id="desc">从前提到操作结论的因果路径</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">从行业集中度推出仓位规则</text>

  <rect x="35" y="80" width="155" height="90" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="112" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="112" y="133" text-anchor="middle" font-size="13" fill="#0f172a">宽基已含行业</text>
  <text x="112" y="153" text-anchor="middle" font-size="13" fill="#0f172a">不买也有暴露</text>

  <rect x="220" y="80" width="155" height="90" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="2"/>
  <text x="297" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提B</text>
  <text x="297" y="133" text-anchor="middle" font-size="13" fill="#0f172a">行业ETF更窄</text>
  <text x="297" y="153" text-anchor="middle" font-size="13" fill="#0f172a">集中风险更高</text>

  <rect x="405" y="80" width="155" height="90" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="482" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="482" y="133" text-anchor="middle" font-size="13" fill="#0f172a">行业胜负轮换</text>
  <text x="482" y="153" text-anchor="middle" font-size="13" fill="#0f172a">受宏观和盈利影响</text>

  <rect x="590" y="80" width="155" height="90" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="667" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">前提D</text>
  <text x="667" y="133" text-anchor="middle" font-size="13" fill="#0f172a">小白难长期判断</text>
  <text x="667" y="153" text-anchor="middle" font-size="13" fill="#0f172a">必须先管仓位</text>

  <path d="M112 184 L112 226 L297 226" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M297 184 L297 226" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M482 184 L482 226 L297 226" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M667 184 L667 226 L297 226" stroke="#64748b" stroke-width="3" fill="none"/>

  <rect x="190" y="236" width="420" height="74" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="290" text-anchor="middle" font-size="15" fill="#334155">行业ETF是在已有宽基上主动增加单一行业浓度</text>

  <path d="M400 312 L400 342" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="150" y="350" width="500" height="52" rx="8" fill="#111827"/>
  <text x="400" y="382" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论: 行业ETF只做卫星仓, 有假设才买, 前提破坏就降仓</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
