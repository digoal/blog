<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">行业ETF情景分支</title>
  <desc id="desc">展示不同前提下的行业ETF操作路径</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">买行业ETF前, 先走这棵决策树</text>

  <rect x="250" y="72" width="300" height="54" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">你已经有核心宽基仓了吗?</text>

  <path d="M300 126 L185 176" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 126 L615 176" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="178" width="230" height="70" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="185" y="206" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">没有</text>
  <text x="185" y="230" text-anchor="middle" font-size="14" fill="#7f1d1d">先建核心, 不急着买行业</text>

  <rect x="500" y="178" width="230" height="70" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="615" y="206" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">有</text>
  <text x="615" y="230" text-anchor="middle" font-size="14" fill="#14532d">进入行业假设检查</text>

  <path d="M615 250 L615 285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="465" y="292" width="300" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="615" y="317" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">行业驱动、估值、仓位都合格?</text>
  <text x="615" y="339" text-anchor="middle" font-size="13" fill="#475569">三项少一项, 就不是合格交易</text>

  <path d="M520 350 L405 382" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M685 350 L715 382" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="260" y="370" width="220" height="52" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="370" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">不合格: 观察或减仓</text>

  <rect x="575" y="370" width="190" height="52" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="670" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">合格: 小比例分批</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
