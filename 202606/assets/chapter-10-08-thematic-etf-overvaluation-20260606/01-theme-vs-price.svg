<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">主题ETF的叙事与价格</title>
  <desc id="desc">展示好主题不等于好买点，主题ETF需要经过估值、持仓、费用和流动性检查。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">主题ETF：买的是一篮子公司，不是一句未来口号</text>
  <rect x="54" y="88" width="166" height="88" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="137" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#075985" font-family="Arial, sans-serif">热门叙事</text>
  <text x="137" y="150" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">AI / 机器人 / 云</text>
  <text x="137" y="169" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">网络安全</text>
  <path d="M228 132 H296" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="306" y="88" width="166" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="389" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">基金持仓</text>
  <text x="389" y="150" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">成分股、权重</text>
  <text x="389" y="169" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">是否真有主题收入</text>
  <path d="M480 132 H548" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="558" y="88" width="166" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="641" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#166534" font-family="Arial, sans-serif">买入价格</text>
  <text x="641" y="150" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">估值、费用</text>
  <text x="641" y="169" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">价差、成交量</text>
  <rect x="92" y="236" width="604" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="394" y="267" text-anchor="middle" font-size="18" font-weight="700" fill="#111827" font-family="Arial, sans-serif">核心判断</text>
  <text x="394" y="294" text-anchor="middle" font-size="16" fill="#1f2937" font-family="Arial, sans-serif">主题长期有前景，只能证明值得研究；价格、持仓和仓位合格，才证明可以买入。</text>
  <text x="400" y="356" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">行动结论：主题ETF默认是卫星仓，不替代标普500或全市场核心仓</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
