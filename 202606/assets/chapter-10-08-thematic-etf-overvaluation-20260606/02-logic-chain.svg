<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">主题ETF论证链</title>
  <desc id="desc">展示从主题叙事、持仓集中、估值费用到卫星仓结论的因果链。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">从好故事到可买入，中间隔着四道门</text>
  <rect x="38" y="84" width="150" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="113" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#1e40af" font-family="Arial, sans-serif">前提A</text>
  <text x="113" y="139" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">主题是真趋势</text>
  <text x="113" y="160" text-anchor="middle" font-size="13" fill="#334155" font-family="Arial, sans-serif">变量</text>
  <path d="M196 129 H239" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="248" y="84" width="150" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="323" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">前提B</text>
  <text x="323" y="139" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">持仓集中</text>
  <text x="323" y="160" text-anchor="middle" font-size="13" fill="#334155" font-family="Arial, sans-serif">常量+变量</text>
  <path d="M406 129 H449" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="458" y="84" width="150" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="533" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">前提C</text>
  <text x="533" y="139" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">估值已透支?</text>
  <text x="533" y="160" text-anchor="middle" font-size="13" fill="#334155" font-family="Arial, sans-serif">变量</text>
  <path d="M616 129 H659" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="668" y="84" width="92" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="714" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#166534" font-family="Arial, sans-serif">前提D</text>
  <text x="714" y="139" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">仓位</text>
  <text x="714" y="160" text-anchor="middle" font-size="13" fill="#334155" font-family="Arial, sans-serif">可控</text>
  <rect x="82" y="238" width="636" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#111827" font-family="Arial, sans-serif">推导</text>
  <text x="400" y="298" text-anchor="middle" font-size="15" fill="#1f2937" font-family="Arial, sans-serif">因为主题ETF同时承担叙事、集中、估值、费用和流动性风险，</text>
  <text x="400" y="320" text-anchor="middle" font-size="15" fill="#1f2937" font-family="Arial, sans-serif">所以小白不能用“未来很好”推出“现在重仓”。</text>
  <path d="M400 334 V360" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="176" y="366" width="448" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="393" text-anchor="middle" font-size="17" font-weight="700" fill="#065f46" font-family="Arial, sans-serif">结论：小比例卫星仓 + 估值冷却后分批进入</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
