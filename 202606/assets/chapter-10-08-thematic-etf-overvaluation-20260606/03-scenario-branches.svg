<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">主题ETF情景分支</title>
  <desc id="desc">展示主题ETF在不同前提下的操作切换。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">主题ETF买不买，先看前提是否还成立</text>
  <rect x="285" y="76" width="230" height="64" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="Arial, sans-serif">下单前检查</text>
  <text x="400" y="123" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">主题、持仓、估值、仓位</text>
  <path d="M400 141 V173" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="64" y="190" width="200" height="112" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="164" y="219" text-anchor="middle" font-size="17" font-weight="700" fill="#166534" font-family="Arial, sans-serif">前提成立</text>
  <text x="164" y="249" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">主题增长可验证</text>
  <text x="164" y="270" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">估值未明显透支</text>
  <text x="164" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46" font-family="Arial, sans-serif">动作：小仓分批</text>
  <rect x="300" y="190" width="200" height="112" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="219" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">前提不清</text>
  <text x="400" y="249" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">只懂故事</text>
  <text x="400" y="270" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">看不懂持仓</text>
  <text x="400" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">动作：只观察</text>
  <rect x="536" y="190" width="200" height="112" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="636" y="219" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">前提失效</text>
  <text x="636" y="249" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">估值过热</text>
  <text x="636" y="270" text-anchor="middle" font-size="14" fill="#111827" font-family="Arial, sans-serif">成交差 / 仓位超标</text>
  <text x="636" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">动作：不追或降仓</text>
  <path d="M400 173 C330 174 248 178 164 190" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 173 V190" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 173 C470 174 552 178 636 190" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="92" y="350" width="604" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="394" y="383" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="Arial, sans-serif">纪律：主题ETF超过计划上限，不用“长期看好”当加仓理由</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
