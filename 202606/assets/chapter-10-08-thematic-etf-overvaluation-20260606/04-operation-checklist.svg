<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">主题ETF下单流程</title>
  <desc id="desc">展示主题ETF从研究到仓位控制的下单流程。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, sans-serif">主题ETF下单前的四步流程</text>
  <rect x="72" y="84" width="144" height="82" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="144" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#075985" font-family="Arial, sans-serif">1 看主题</text>
  <text x="144" y="141" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">收入是否真实</text>
  <path d="M226 125 H276" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="286" y="84" width="144" height="82" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="358" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e" font-family="Arial, sans-serif">2 看篮子</text>
  <text x="358" y="141" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">持仓与权重</text>
  <path d="M440 125 H490" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="500" y="84" width="144" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="572" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b" font-family="Arial, sans-serif">3 看价格</text>
  <text x="572" y="141" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">估值与费用</text>
  <path d="M572 172 V218" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="500" y="228" width="144" height="82" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="572" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#166534" font-family="Arial, sans-serif">4 定仓位</text>
  <text x="572" y="285" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Arial, sans-serif">卫星上限</text>
  <path d="M490 269 H252" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="72" y="228" width="180" height="82" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="162" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="Arial, sans-serif">通过才下单</text>
  <text x="162" y="285" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">否则回观察名单</text>
  <rect x="116" y="356" width="568" height="44" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="384" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412" font-family="Arial, sans-serif">任何一步答不上来，都不能把主题ETF当成核心仓重仓买入</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
