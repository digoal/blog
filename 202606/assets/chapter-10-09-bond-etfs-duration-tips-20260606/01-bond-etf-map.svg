<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">债券ETF不是一种工具，而是一排不同期限的工具</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" fill="#4b5563">核心差别：久期越长，对利率越敏感；期限越短，越像现金管理</text>

  <line x1="90" y1="210" x2="710" y2="210" stroke="#334155" stroke-width="4"/>
  <polygon points="710,210 690,198 690,222" fill="#334155"/>

  <g>
    <circle cx="130" cy="210" r="34" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="130" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">现金型</text>
    <text x="130" y="225" text-anchor="middle" font-size="13" fill="#1d4ed8">0-3个月</text>
    <text x="130" y="270" text-anchor="middle" font-size="14" fill="#111827">货币市场基金</text>
    <text x="130" y="292" text-anchor="middle" font-size="14" fill="#111827">超短债ETF</text>
  </g>

  <g>
    <circle cx="290" cy="210" r="34" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="290" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">短债</text>
    <text x="290" y="225" text-anchor="middle" font-size="13" fill="#15803d">1-3年</text>
    <text x="290" y="270" text-anchor="middle" font-size="14" fill="#111827">波动较小</text>
    <text x="290" y="292" text-anchor="middle" font-size="14" fill="#111827">利率敏感低</text>
  </g>

  <g>
    <circle cx="450" cy="210" r="34" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="450" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">中债</text>
    <text x="450" y="225" text-anchor="middle" font-size="13" fill="#b45309">7-10年</text>
    <text x="450" y="270" text-anchor="middle" font-size="14" fill="#111827">收益和波动</text>
    <text x="450" y="292" text-anchor="middle" font-size="14" fill="#111827">都居中</text>
  </g>

  <g>
    <circle cx="610" cy="210" r="34" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="610" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">长债</text>
    <text x="610" y="225" text-anchor="middle" font-size="13" fill="#b91c1c">20年以上</text>
    <text x="610" y="270" text-anchor="middle" font-size="14" fill="#111827">利率弹性大</text>
    <text x="610" y="292" text-anchor="middle" font-size="14" fill="#111827">回撤也大</text>
  </g>

  <rect x="205" y="92" width="390" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">TIPS 是另一条轴：抗的是通胀侵蚀</text>
  <text x="400" y="138" text-anchor="middle" font-size="13" fill="#4b5563">它也有久期，所以不是“通胀上行就稳赚”的工具</text>

  <text x="398" y="345" text-anchor="middle" font-size="14" fill="#4b5563">从左到右：现金属性下降，利率敏感度上升</text>
</svg>
