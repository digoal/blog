<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">从三个前提推出债券ETF选择</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <g>
    <rect x="45" y="88" width="170" height="92" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="130" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提A</text>
    <text x="130" y="148" text-anchor="middle" font-size="14" fill="#111827">债券价格与利率</text>
    <text x="130" y="168" text-anchor="middle" font-size="14" fill="#111827">大多反向运动</text>
  </g>

  <g>
    <rect x="45" y="216" width="170" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="130" y="248" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">前提B</text>
    <text x="130" y="276" text-anchor="middle" font-size="14" fill="#111827">久期越长</text>
    <text x="130" y="296" text-anchor="middle" font-size="14" fill="#111827">价格波动越大</text>
  </g>

  <g>
    <rect x="45" y="344" width="170" height="58" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="130" y="370" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">前提C</text>
    <text x="130" y="392" text-anchor="middle" font-size="14" fill="#111827">用钱期限会变</text>
  </g>

  <line x1="215" y1="134" x2="315" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="215" y1="262" x2="315" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="215" y1="373" x2="315" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="315" y="158" width="205" height="116" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="418" y="194" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">逻辑推导</text>
  <text x="418" y="224" text-anchor="middle" font-size="14" fill="#111827">先匹配用钱期限</text>
  <text x="418" y="246" text-anchor="middle" font-size="14" fill="#111827">再决定承担多少久期</text>

  <line x1="520" y1="216" x2="590" y2="216" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="590" y="122" width="165" height="235" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="673" y="156" text-anchor="middle" font-size="18" font-weight="700" fill="#c2410c">操作结论</text>
  <text x="673" y="194" text-anchor="middle" font-size="14" fill="#111827">短钱：现金型/短债</text>
  <text x="673" y="224" text-anchor="middle" font-size="14" fill="#111827">防守仓：短债为主</text>
  <text x="673" y="254" text-anchor="middle" font-size="14" fill="#111827">利率下行判断：</text>
  <text x="673" y="276" text-anchor="middle" font-size="14" fill="#111827">中债或长债小仓</text>
  <text x="673" y="306" text-anchor="middle" font-size="14" fill="#111827">抗通胀：</text>
  <text x="673" y="328" text-anchor="middle" font-size="14" fill="#111827">TIPS小比例</text>
  <text x="400" y="414" text-anchor="middle" font-size="13" fill="#64748b">结论不是“债券ETF安全”，而是“按期限和久期选择风险”。</text>
</svg>
