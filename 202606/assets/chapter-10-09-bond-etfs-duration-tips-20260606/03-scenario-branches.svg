<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">利率前提变化后，债券ETF结论要切换</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="300" y="78" width="200" height="76" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">先判断利率环境</text>
  <text x="400" y="132" text-anchor="middle" font-size="14" fill="#475569">不是预测顶底，而是分配久期风险</text>

  <line x1="400" y1="154" x2="180" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="154" x2="400" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="154" x2="620" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="70" y="210" width="220" height="130" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="180" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">利率上行</text>
    <text x="180" y="270" text-anchor="middle" font-size="14" fill="#111827">长债价格压力最大</text>
    <text x="180" y="296" text-anchor="middle" font-size="14" fill="#111827">操作：降久期</text>
    <text x="180" y="320" text-anchor="middle" font-size="14" fill="#111827">现金型/短债优先</text>
  </g>

  <g>
    <rect x="290" y="210" width="220" height="130" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="400" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">利率横盘</text>
    <text x="400" y="270" text-anchor="middle" font-size="14" fill="#111827">票息是主要来源</text>
    <text x="400" y="296" text-anchor="middle" font-size="14" fill="#111827">操作：短中债为主</text>
    <text x="400" y="320" text-anchor="middle" font-size="14" fill="#111827">长债只做小仓观察</text>
  </g>

  <g>
    <rect x="510" y="210" width="220" height="130" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="620" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">利率下行</text>
    <text x="620" y="270" text-anchor="middle" font-size="14" fill="#111827">长久期有价格弹性</text>
    <text x="620" y="296" text-anchor="middle" font-size="14" fill="#111827">操作：中债/长债</text>
    <text x="620" y="320" text-anchor="middle" font-size="14" fill="#111827">分批、小比例参与</text>
  </g>

  <rect x="156" y="366" width="488" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="390" text-anchor="middle" font-size="14" fill="#111827">前提切换时，先改久期，不要用“债券安全”硬扛回撤。</text>
</svg>
