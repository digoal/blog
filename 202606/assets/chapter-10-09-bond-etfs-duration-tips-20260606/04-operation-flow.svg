<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">买债券ETF前的四步检查</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <g>
    <rect x="55" y="110" width="150" height="88" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="130" y="140" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">第一步</text>
    <text x="130" y="166" text-anchor="middle" font-size="14" fill="#111827">这笔钱多久不用？</text>
    <text x="130" y="186" text-anchor="middle" font-size="13" fill="#475569">期限先于收益</text>
  </g>
  <line x1="205" y1="154" x2="260" y2="154" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="260" y="110" width="150" height="88" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="335" y="140" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">第二步</text>
    <text x="335" y="166" text-anchor="middle" font-size="14" fill="#111827">能承受几%回撤？</text>
    <text x="335" y="186" text-anchor="middle" font-size="13" fill="#475569">回撤决定久期</text>
  </g>
  <line x1="410" y1="154" x2="465" y2="154" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="465" y="110" width="150" height="88" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="540" y="140" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">第三步</text>
    <text x="540" y="166" text-anchor="middle" font-size="14" fill="#111827">利率怎么走？</text>
    <text x="540" y="186" text-anchor="middle" font-size="13" fill="#475569">上行就降久期</text>
  </g>
  <line x1="615" y1="154" x2="670" y2="154" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="670" y="110" width="100" height="88" rx="8" fill="#fff7ed" stroke="#ea580c"/>
    <text x="720" y="140" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">第四步</text>
    <text x="720" y="166" text-anchor="middle" font-size="14" fill="#111827">定上限</text>
    <text x="720" y="186" text-anchor="middle" font-size="13" fill="#475569">分批买</text>
  </g>

  <rect x="72" y="255" width="654" height="86" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="285" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">对应选择</text>
  <text x="400" y="312" text-anchor="middle" font-size="14" fill="#111827">一年内要用的钱：货币市场基金或超短债ETF</text>
  <text x="400" y="334" text-anchor="middle" font-size="14" fill="#111827">三年以上防守仓：短债为主，中债辅助；长债和TIPS必须有明确前提</text>

  <text x="400" y="384" text-anchor="middle" font-size="14" fill="#64748b">操作目标：用债券ETF管理现金流和利率风险，而不是赌一次利率方向。</text>
</svg>
