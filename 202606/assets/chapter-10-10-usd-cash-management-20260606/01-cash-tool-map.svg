<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美元现金管理工具地图</title>
  <desc id="desc">按用钱时间把美元现金管理分为保险现金、货币市场和短债ETF三层。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">美元现金管理: 先看用钱时间, 再看工具</text>
  <line x1="90" y1="200" x2="710" y2="200" stroke="#94a3b8" stroke-width="4"/>
  <circle cx="150" cy="200" r="12" fill="#0ea5e9"/>
  <circle cx="330" cy="200" r="12" fill="#22c55e"/>
  <circle cx="520" cy="200" r="12" fill="#f59e0b"/>
  <circle cx="680" cy="200" r="12" fill="#ef4444"/>
  <rect x="70" y="90" width="160" height="82" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="150" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#075985">0-3个月</text>
  <text x="150" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#075985">先要能取出来</text>
  <rect x="250" y="228" width="160" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="330" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">3-12个月</text>
  <text x="330" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">货币基金/超短债</text>
  <rect x="440" y="90" width="160" height="92" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="520" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">1-3年</text>
  <text x="520" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#92400e">短债ETF可考虑</text>
  <rect x="620" y="228" width="140" height="92" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="690" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">超过3年</text>
  <text x="690" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#991b1b">不再叫现金仓</text>
  <text x="150" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">银行现金/国债货币基金</text>
  <text x="330" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">SGOV/SHV/BIL等</text>
  <text x="520" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">SHY/VGSH等</text>
  <text x="680" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">股票ETF/长期配置</text>
  <rect x="98" y="348" width="604" height="30" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">现金管理的第一目标: 到期能用钱; 收益只能在风险合格后再比较</text>
</svg>
