<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美元现金管理论证链</title>
  <desc id="desc">展示用钱期限、工具久期、利率环境到操作结论的因果链。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">论证链: 现金仓不是追高收益, 是匹配用钱时间</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="40" y="86" width="160" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="120" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#075985">前提A</text>
  <text x="120" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#075985">现金仓有用钱日</text>
  <text x="120" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#075985">不能先承受大波动</text>
  <rect x="236" y="86" width="160" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="316" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">前提B</text>
  <text x="316" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">货币基金/超短债</text>
  <text x="316" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">利率风险很低</text>
  <rect x="432" y="86" width="160" height="92" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="512" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e">前提C</text>
  <text x="512" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">1-3年短债ETF</text>
  <text x="512" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">仍有净值波动</text>
  <rect x="628" y="86" width="132" height="92" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="694" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">前提D</text>
  <text x="694" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">收益率随利率变</text>
  <text x="694" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">不是固定工资</text>
  <line x1="200" y1="132" x2="232" y2="132" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="396" y1="132" x2="428" y2="132" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="592" y1="132" x2="624" y2="132" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="78" y="238" width="644" height="78" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">结论: 先按期限分桶, 再在同一风险等级里比收益</text>
  <text x="400" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">0-12个月偏货币市场和超短债; 1-3年才考虑短债ETF; 不用短债ETF替代活钱</text>
  <line x1="400" y1="180" x2="400" y2="234" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">因为现金仓的失败不是少赚0.3%, 而是该用钱时遇到净值下跌或取不出来</text>
</svg>
