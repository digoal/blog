<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美元现金管理情景分支</title>
  <desc id="desc">展示不同利率和用钱期限下现金管理工具的切换路径。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">前提变化时: 工具怎么切换</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="300" y="76" width="200" height="58" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="400" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">先问: 钱什么时候要用?</text>
  <line x1="400" y1="134" x2="400" y2="162" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="162" x2="165" y2="198" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="162" x2="400" y2="198" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="162" x2="635" y2="198" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="58" y="202" width="214" height="100" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="165" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#075985">3个月内</text>
  <text x="165" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#075985">流动性优先</text>
  <text x="165" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#075985">银行现金/国债货币基金</text>
  <rect x="293" y="202" width="214" height="100" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">3-12个月</text>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">低久期优先</text>
  <text x="400" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">SGOV/SHV/BIL等超短债</text>
  <rect x="528" y="202" width="214" height="100" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="635" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e">1-3年</text>
  <text x="635" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">可承受小波动</text>
  <text x="635" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">短债ETF/短债梯</text>
  <rect x="92" y="334" width="616" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">若利率快速下行: 货币收益会降; 若利率重新上行: 短债ETF先承受净值压力</text>
</svg>
