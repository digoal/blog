<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">美股REITs现金流地图</title>
  <desc id="desc">展示租户租金、REIT分红、股价波动和利率之间的关系。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">REIT不是存款: 它把房地产现金流装进股票</text>

  <rect x="50" y="92" width="150" height="92" rx="8" fill="#eef5ff" stroke="#7aa2d6"/>
  <text x="125" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#1f4e79">租户</text>
  <text x="125" y="150" text-anchor="middle" font-size="14" fill="#263445">办公楼、仓库</text>
  <text x="125" y="171" text-anchor="middle" font-size="14" fill="#263445">商场、数据中心</text>

  <rect x="304" y="92" width="192" height="92" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="400" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#22543d">REIT公司</text>
  <text x="400" y="150" text-anchor="middle" font-size="14" fill="#263445">收租、运营、融资</text>
  <text x="400" y="171" text-anchor="middle" font-size="14" fill="#263445">再把利润分给股东</text>

  <rect x="600" y="92" width="150" height="92" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="675" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5200">投资者</text>
  <text x="675" y="150" text-anchor="middle" font-size="14" fill="#263445">收到分红</text>
  <text x="675" y="171" text-anchor="middle" font-size="14" fill="#263445">也承受股价波动</text>

  <path d="M200 138 L294 138" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="247" y="124" text-anchor="middle" font-size="14" fill="#263445">租金</text>
  <path d="M496 138 L590 138" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="543" y="124" text-anchor="middle" font-size="14" fill="#263445">分红</text>

  <rect x="86" y="250" width="142" height="82" rx="8" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="157" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#263445">出租率</text>
  <text x="157" y="306" text-anchor="middle" font-size="14" fill="#263445">房子空不空</text>

  <rect x="246" y="250" width="142" height="82" rx="8" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="317" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#263445">租金增长</text>
  <text x="317" y="306" text-anchor="middle" font-size="14" fill="#263445">能不能提价</text>

  <rect x="406" y="250" width="142" height="82" rx="8" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="477" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#263445">融资成本</text>
  <text x="477" y="306" text-anchor="middle" font-size="14" fill="#263445">借钱贵不贵</text>

  <rect x="566" y="250" width="142" height="82" rx="8" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="637" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#263445">利率估值</text>
  <text x="637" y="306" text-anchor="middle" font-size="14" fill="#263445">高息是否有吸引力</text>

  <path d="M157 250 C190 214 242 197 310 172" stroke="#b4bfcc" stroke-width="2" fill="none" marker-end="url(#smallArrow)"/>
  <path d="M317 250 C340 214 370 198 394 184" stroke="#b4bfcc" stroke-width="2" fill="none" marker-end="url(#smallArrow)"/>
  <path d="M477 250 C462 214 443 199 424 184" stroke="#b4bfcc" stroke-width="2" fill="none" marker-end="url(#smallArrow)"/>
  <path d="M637 250 C648 214 660 198 670 184" stroke="#b4bfcc" stroke-width="2" fill="none" marker-end="url(#smallArrow)"/>

  <rect x="112" y="360" width="576" height="38" rx="7" fill="#fcebea" stroke="#d97a7a"/>
  <text x="400" y="384" text-anchor="middle" font-size="15" font-weight="700" fill="#8a2d2d">现金流能发分红，但股价仍会随利率、经营和市场情绪波动</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
    <marker id="smallArrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#b4bfcc"/>
    </marker>
  </defs>
</svg>
