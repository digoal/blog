<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">美股REITs论证链</title>
  <desc id="desc">用前提、推导、结论展示为什么美股REITs应作为收益卫星仓。</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">从现金流资产推出仓位规则</text>

  <rect x="44" y="74" width="176" height="92" rx="8" fill="#eef5ff" stroke="#7aa2d6"/>
  <text x="132" y="102" text-anchor="middle" font-size="17" font-weight="700" fill="#1f4e79">前提A</text>
  <text x="132" y="130" text-anchor="middle" font-size="14" fill="#263445">REIT有分红制度约束</text>
  <text x="132" y="151" text-anchor="middle" font-size="14" fill="#263445">现金流属性真实</text>

  <rect x="44" y="206" width="176" height="92" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="132" y="234" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5200">前提B</text>
  <text x="132" y="262" text-anchor="middle" font-size="14" fill="#263445">它在交易所买卖</text>
  <text x="132" y="283" text-anchor="middle" font-size="14" fill="#263445">价格像股票一样波动</text>

  <rect x="312" y="136" width="176" height="112" rx="8" fill="#f2f4f7" stroke="#aab4c3"/>
  <text x="400" y="164" text-anchor="middle" font-size="17" font-weight="700" fill="#263445">推导</text>
  <text x="400" y="193" text-anchor="middle" font-size="14" fill="#263445">因为现金流要折现</text>
  <text x="400" y="216" text-anchor="middle" font-size="14" fill="#263445">所以利率上行会压估值</text>
  <text x="400" y="239" text-anchor="middle" font-size="14" fill="#263445">经营变差会伤分红</text>

  <rect x="580" y="74" width="176" height="92" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="668" y="102" text-anchor="middle" font-size="17" font-weight="700" fill="#22543d">正常结论</text>
  <text x="668" y="130" text-anchor="middle" font-size="14" fill="#263445">收益型卫星仓</text>
  <text x="668" y="151" text-anchor="middle" font-size="14" fill="#263445">小比例、长期钱参与</text>

  <rect x="580" y="206" width="176" height="92" rx="8" fill="#fcebea" stroke="#d97a7a"/>
  <text x="668" y="234" text-anchor="middle" font-size="17" font-weight="700" fill="#8a2d2d">失效结论</text>
  <text x="668" y="262" text-anchor="middle" font-size="14" fill="#263445">不是现金替代品</text>
  <text x="668" y="283" text-anchor="middle" font-size="14" fill="#263445">利率或经营恶化先降仓</text>

  <path d="M220 120 L302 174" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M220 252 L302 216" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M488 176 L570 126" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M488 216 L570 252" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="94" y="338" width="612" height="48" rx="7" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="400" y="361" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">操作顺序: 先留现金和核心宽基，再用小仓位买REITs现金流</text>
  <text x="400" y="382" text-anchor="middle" font-size="14" fill="#263445">看到高分红不等于看到低风险，分红率必须和利率、租金、负债一起看</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
