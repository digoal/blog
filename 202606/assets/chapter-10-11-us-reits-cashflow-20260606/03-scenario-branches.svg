<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="title desc">
  <title id="title">美股REITs情景分支</title>
  <desc id="desc">展示利率、租金和资金期限变化时，美股REITs的操作切换。</desc>
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">前提一变，REITs操作要立刻换挡</text>

  <rect x="292" y="72" width="216" height="74" rx="8" fill="#f2f4f7" stroke="#aab4c3"/>
  <text x="400" y="102" text-anchor="middle" font-size="17" font-weight="700" fill="#263445">准备买美股REITs</text>
  <text x="400" y="126" text-anchor="middle" font-size="14" fill="#263445">先问利率、租金、资金期限</text>

  <rect x="54" y="218" width="172" height="104" rx="8" fill="#eaf7ee" stroke="#74a987"/>
  <text x="140" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#22543d">利率稳定或下行</text>
  <text x="140" y="274" text-anchor="middle" font-size="14" fill="#263445">租金和出租率稳定</text>
  <text x="140" y="296" text-anchor="middle" font-size="14" fill="#263445">用长期钱小比例买</text>

  <rect x="246" y="218" width="172" height="104" rx="8" fill="#fff4e5" stroke="#d99a38"/>
  <text x="332" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5200">利率重新上行</text>
  <text x="332" y="274" text-anchor="middle" font-size="14" fill="#263445">高息吸引力下降</text>
  <text x="332" y="296" text-anchor="middle" font-size="14" fill="#263445">停止加仓，等折价</text>

  <rect x="438" y="218" width="172" height="104" rx="8" fill="#fcebea" stroke="#d97a7a"/>
  <text x="524" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#8a2d2d">物业经营变差</text>
  <text x="524" y="274" text-anchor="middle" font-size="14" fill="#263445">空置、租金、负债恶化</text>
  <text x="524" y="296" text-anchor="middle" font-size="14" fill="#263445">降仓，不迷信分红率</text>

  <rect x="630" y="218" width="116" height="104" rx="8" fill="#eef5ff" stroke="#7aa2d6"/>
  <text x="688" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#1f4e79">短期钱</text>
  <text x="688" y="274" text-anchor="middle" font-size="14" fill="#263445">三年内要用</text>
  <text x="688" y="296" text-anchor="middle" font-size="14" fill="#263445">不买</text>

  <path d="M360 146 L150 208" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M390 146 L336 208" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M420 146 L520 208" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M452 146 L684 208" stroke="#6b7a90" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="86" y="370" width="628" height="48" rx="7" fill="#f7f8fa" stroke="#ccd3df"/>
  <text x="400" y="393" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">一条底线: REITs属于权益类资产，不负责替你保本</text>
  <text x="400" y="414" text-anchor="middle" font-size="14" fill="#263445">买入理由必须写清: 现金流、利率、仓位三项同时合格</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7a90"/>
    </marker>
  </defs>
</svg>
