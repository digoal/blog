<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">杠杆ETF的每日重置</title>
  <desc id="desc">展示普通ETF和三倍杠杆ETF在两天波动后的不同路径。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">每日目标 ≠ 长期倍数</text>
  <line x1="90" y1="325" x2="710" y2="325" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="120" y1="80" x2="120" y2="325" stroke="#cbd5e1" stroke-width="2"/>
  <text x="122" y="348" text-anchor="middle" font-size="14" fill="#0f172a">开始</text>
  <text x="405" y="348" text-anchor="middle" font-size="14" fill="#0f172a">第1天</text>
  <text x="690" y="348" text-anchor="middle" font-size="14" fill="#0f172a">第2天</text>
  <polyline points="120,205 405,235 690,208" fill="none" stroke="#2563eb" stroke-width="5"/>
  <polyline points="120,205 405,265 690,245" fill="none" stroke="#dc2626" stroke-width="5"/>
  <circle cx="120" cy="205" r="7" fill="#0f172a"/>
  <circle cx="405" cy="235" r="7" fill="#2563eb"/>
  <circle cx="690" cy="208" r="7" fill="#2563eb"/>
  <circle cx="405" cy="265" r="7" fill="#dc2626"/>
  <circle cx="690" cy="245" r="7" fill="#dc2626"/>
  <text x="128" y="195" font-size="16" fill="#0f172a">1000</text>
  <text x="416" y="230" font-size="16" fill="#2563eb">指数: -10% 到 900</text>
  <text x="506" y="203" font-size="16" fill="#2563eb">再 +10% 到 990</text>
  <text x="416" y="283" font-size="16" fill="#dc2626">2x: -20% 到 800</text>
  <text x="506" y="265" font-size="16" fill="#dc2626">再 +20% 到 960</text>
  <rect x="115" y="82" width="570" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">每天都完成目标，长期结果仍会偏离直觉</text>
  <text x="400" y="135" text-anchor="middle" font-size="16" fill="#0f172a">指数两天 -1%，2倍杠杆两天 -4%，不是简单的 -2%</text>
  <rect x="116" y="358" width="568" height="28" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="378" text-anchor="middle" font-size="15" fill="#0f172a">核心原因: 杠杆ETF按“每天”重置仓位，路径越波动，复利偏差越明显</text>
</svg>
