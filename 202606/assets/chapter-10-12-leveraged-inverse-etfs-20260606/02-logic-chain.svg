<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">杠杆与反向ETF论证链</title>
  <desc id="desc">前提到操作结论的因果路径。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">从产品机制推出操作边界</text>
  <rect x="36" y="78" width="160" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="116" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提A</text>
  <text x="116" y="135" text-anchor="middle" font-size="15" fill="#0f172a">目标是单日</text>
  <text x="116" y="158" text-anchor="middle" font-size="15" fill="#0f172a">不是长期倍数</text>
  <rect x="228" y="78" width="160" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="308" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提B</text>
  <text x="308" y="135" text-anchor="middle" font-size="15" fill="#0f172a">每天重置</text>
  <text x="308" y="158" text-anchor="middle" font-size="15" fill="#0f172a">路径会改变结果</text>
  <rect x="420" y="78" width="160" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="500" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提C</text>
  <text x="500" y="135" text-anchor="middle" font-size="15" fill="#0f172a">杠杆与反向</text>
  <text x="500" y="158" text-anchor="middle" font-size="15" fill="#0f172a">放大错误</text>
  <rect x="612" y="78" width="152" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="688" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提D</text>
  <text x="688" y="135" text-anchor="middle" font-size="15" fill="#0f172a">小白缺少</text>
  <text x="688" y="158" text-anchor="middle" font-size="15" fill="#0f172a">日内纪律</text>
  <path d="M196 124 H228" stroke="#2563eb" stroke-width="3"/>
  <path d="M388 124 H420" stroke="#2563eb" stroke-width="3"/>
  <path d="M580 124 H612" stroke="#2563eb" stroke-width="3"/>
  <path d="M690 174 C690 215 560 216 560 244" fill="none" stroke="#2563eb" stroke-width="3"/>
  <path d="M116 174 C116 216 240 216 240 244" fill="none" stroke="#2563eb" stroke-width="3"/>
  <rect x="166" y="244" width="468" height="72" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="400" y="274" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">推导: 能用它做短期表达，不能用它替代长期配置</text>
  <text x="400" y="301" text-anchor="middle" font-size="15" fill="#0f172a">因为目标、重置、成本、波动都按短周期工作</text>
  <path d="M400 316 V342" stroke="#2563eb" stroke-width="3"/>
  <rect x="186" y="342" width="428" height="42" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <text x="400" y="369" text-anchor="middle" font-size="17" font-weight="700" fill="#dc2626">结论: 只进短期工具箱，不进小白核心仓</text>
</svg>
