<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">杠杆和反向ETF情景分支</title>
  <desc id="desc">根据前提是否成立选择观察、短期使用或退出。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">先问用途，再决定是否能碰</text>
  <rect x="255" y="70" width="290" height="56" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="400" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">你想买杠杆/反向ETF</text>
  <path d="M400 126 V158" stroke="#2563eb" stroke-width="3"/>
  <rect x="230" y="158" width="340" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="183" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">是否有明确短期交易计划？</text>
  <text x="400" y="205" text-anchor="middle" font-size="14" fill="#0f172a">目标、时间、止损、仓位都写清</text>
  <path d="M230 187 H90 V270" stroke="#dc2626" stroke-width="3" fill="none"/>
  <path d="M570 187 H710 V270" stroke="#2563eb" stroke-width="3" fill="none"/>
  <text x="146" y="177" text-anchor="middle" font-size="15" fill="#dc2626">没有</text>
  <text x="654" y="177" text-anchor="middle" font-size="15" fill="#2563eb">有</text>
  <rect x="42" y="270" width="220" height="72" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <text x="152" y="300" text-anchor="middle" font-size="17" font-weight="700" fill="#dc2626">不买</text>
  <text x="152" y="325" text-anchor="middle" font-size="14" fill="#0f172a">回到普通宽基/现金管理</text>
  <rect x="540" y="270" width="220" height="72" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="650" y="300" text-anchor="middle" font-size="17" font-weight="700" fill="#2563eb">只可小仓短用</text>
  <text x="650" y="325" text-anchor="middle" font-size="14" fill="#0f172a">盘中/数日级别严密盯盘</text>
  <path d="M400 216 V258" stroke="#2563eb" stroke-width="3"/>
  <rect x="285" y="258" width="230" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="286" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">中途前提破坏</text>
  <text x="400" y="310" text-anchor="middle" font-size="14" fill="#0f172a">波动放大、判断失效</text>
  <text x="400" y="331" text-anchor="middle" font-size="14" fill="#0f172a">或持有超过计划</text>
  <path d="M400 342 V365" stroke="#dc2626" stroke-width="3"/>
  <text x="400" y="385" text-anchor="middle" font-size="17" font-weight="700" fill="#dc2626">先退出，再复盘；不要用补仓证明自己</text>
</svg>
