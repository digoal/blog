<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">ETF成交价格的三层结构</title>
  <desc id="desc">展示ETF净值、市场价格、买一卖一价差和成交量之间的关系。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">ETF下单前看的不是一个价格，而是三层价格</text>

  <rect x="72" y="85" width="656" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="113" font-size="18" font-weight="700" fill="#1e3a8a">第一层：NAV净值</text>
  <text x="110" y="140" font-size="15" fill="#1f2937">基金持有资产的估算价值，像商品的“成本锚”</text>
  <text x="632" y="127" text-anchor="middle" font-size="18" fill="#1e3a8a">例：100.00</text>

  <rect x="72" y="178" width="656" height="72" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="110" y="206" font-size="18" font-weight="700" fill="#14532d">第二层：市场价</text>
  <text x="110" y="233" font-size="15" fill="#1f2937">交易所里真实成交的价格，高于净值叫溢价，低于净值叫折价</text>
  <text x="632" y="220" text-anchor="middle" font-size="18" fill="#14532d">例：100.30</text>

  <rect x="72" y="271" width="656" height="72" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="110" y="299" font-size="18" font-weight="700" fill="#9a3412">第三层：买一/卖一</text>
  <text x="110" y="326" font-size="15" fill="#1f2937">你立刻卖给别人看买一，立刻买别人筹码看卖一，中间差额就是价差</text>
  <text x="582" y="299" text-anchor="middle" font-size="16" fill="#9a3412">买一 100.28</text>
  <text x="674" y="299" text-anchor="middle" font-size="16" fill="#9a3412">卖一 100.32</text>
  <path d="M595 314 H661" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <text x="628" y="337" text-anchor="middle" font-size="14" fill="#9a3412">价差</text>

  <line x1="400" y1="157" x2="400" y2="178" stroke="#64748b" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="400" y1="250" x2="400" y2="271" stroke="#64748b" stroke-width="2" stroke-dasharray="5 5"/>

  <text x="400" y="376" text-anchor="middle" font-size="15" fill="#374151">成交量告诉你交易热度，但真正影响下单成本的是“偏离净值 + 买卖价差”。</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrowStart" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 Z" fill="#ea580c"/>
    </marker>
  </defs>
</svg>
