<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">ETF交易成本论证链</title>
  <desc id="desc">展示从ETF二级市场交易机制到下单规则的推导链。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">从价格偏离到下单动作：一条完整推导链</text>

  <rect x="44" y="80" width="155" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="121" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">前提A</text>
  <text x="121" y="136" text-anchor="middle" font-size="14" fill="#1f2937">ETF按市场价成交</text>
  <text x="121" y="157" text-anchor="middle" font-size="14" fill="#1f2937">不按净值成交</text>

  <rect x="232" y="80" width="155" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="309" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">前提B</text>
  <text x="309" y="136" text-anchor="middle" font-size="14" fill="#1f2937">价差是交易成本</text>
  <text x="309" y="157" text-anchor="middle" font-size="14" fill="#1f2937">买卖都要跨价</text>

  <rect x="420" y="80" width="155" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="497" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提C</text>
  <text x="497" y="136" text-anchor="middle" font-size="14" fill="#1f2937">套利机制会拉回</text>
  <text x="497" y="157" text-anchor="middle" font-size="14" fill="#1f2937">但压力中会变慢</text>

  <rect x="608" y="80" width="155" height="92" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="685" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#4c1d95">前提D</text>
  <text x="685" y="136" text-anchor="middle" font-size="14" fill="#1f2937">小白无法补救</text>
  <text x="685" y="157" text-anchor="middle" font-size="14" fill="#1f2937">糟糕成交</text>

  <path d="M121 184 V219 H309" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M309 184 V219" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M497 184 V219 H309" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M685 184 V219 H497" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="195" y="225" width="410" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="253" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="278" text-anchor="middle" font-size="15" fill="#1f2937">因为市场价会偏离净值，且买卖价差会吞掉收益，</text>
  <text x="400" y="298" text-anchor="middle" font-size="15" fill="#1f2937">所以先检查“偏离 + 价差”，再决定是否下单。</text>

  <path d="M400 302 V330" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="164" y="336" width="472" height="58" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="361" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">结论</text>
  <text x="400" y="384" text-anchor="middle" font-size="15" fill="#1f2937">超过红线就暂停；正常范围内用限价单，不用情绪化市价单。</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
