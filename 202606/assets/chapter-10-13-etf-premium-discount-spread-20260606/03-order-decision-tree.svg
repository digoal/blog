<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="title desc">
  <title id="title">ETF下单决策树</title>
  <desc id="desc">展示ETF下单前检查净值偏离、价差、成交量和订单类型的步骤。</desc>
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">ETF下单决策树：先过三道门，再按按钮</text>

  <rect x="310" y="70" width="180" height="54" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="103" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">准备买入ETF</text>

  <path d="M400 124 V151" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="246" y="154" width="308" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">第一道门：溢价/折价是否异常？</text>
  <text x="400" y="199" text-anchor="middle" font-size="13" fill="#374151">宽基超过0.5%，主题或跨境超过1%，先暂停</text>

  <path d="M246 184 H114 V250" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="42" y="252" width="145" height="54" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="114" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">异常</text>
  <text x="114" y="295" text-anchor="middle" font-size="13" fill="#991b1b">不追价</text>

  <path d="M400 212 V239" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="246" y="242" width="308" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">第二道门：买卖价差是否太宽？</text>
  <text x="400" y="287" text-anchor="middle" font-size="13" fill="#374151">宽基超过0.1%，非核心超过0.3%，降低或等待</text>

  <path d="M554 271 H686 V337" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="613" y="340" width="145" height="54" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="686" y="363" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">太宽</text>
  <text x="686" y="383" text-anchor="middle" font-size="13" fill="#991b1b">等流动性恢复</text>

  <path d="M400 300 V327" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="246" y="330" width="308" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="354" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">第三道门：市场是否在开盘/收盘/剧烈波动？</text>
  <text x="400" y="375" text-anchor="middle" font-size="13" fill="#374151">是，就避开或只用更保守限价单</text>

  <path d="M400 388 V415" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="282" y="418" width="236" height="32" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="439" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">通过后：用限价单，小单分批成交</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
