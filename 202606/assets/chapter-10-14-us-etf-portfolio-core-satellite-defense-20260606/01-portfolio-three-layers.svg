<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">美股ETF组合三层结构</title>
  <desc id="desc">核心宽基、行业卫星、债券黄金防守三层组合结构</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">美股ETF组合不是堆产品，而是分工</text>
  <text x="400" y="70" text-anchor="middle" font-size="14" fill="#475569">先定每层任务，再定仓位上限，最后才选具体ETF</text>

  <rect x="70" y="115" width="580" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="150" font-size="20" font-weight="700" fill="#1e3a8a">核心宽基</text>
  <text x="105" y="178" font-size="15" fill="#1e40af">任务：长期暴露美国市场主干，少做判断</text>
  <text x="525" y="158" text-anchor="middle" font-size="26" font-weight="700" fill="#1d4ed8">60%-80%</text>
  <text x="525" y="182" text-anchor="middle" font-size="13" fill="#1e40af">标普500 / 全市场 / 纳指100小比例</text>

  <rect x="150" y="230" width="440" height="74" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="185" y="260" font-size="19" font-weight="700" fill="#14532d">行业卫星</text>
  <text x="185" y="285" font-size="14" fill="#166534">任务：在明确主题和周期前提下增强弹性</text>
  <text x="500" y="268" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">10%-20%</text>

  <rect x="230" y="330" width="280" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="255" y="355" font-size="17" font-weight="700" fill="#78350f">债券 / 黄金 / 现金防守</text>
  <text x="255" y="377" font-size="13" fill="#92400e">任务：降低组合脆弱性，不承诺保本</text>
  <text x="452" y="363" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">10%-30%</text>

  <path d="M665 160 C710 190 710 310 520 356" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 6"/>
  <text x="665" y="230" font-size="13" fill="#334155">再平衡</text>
  <text x="665" y="250" font-size="13" fill="#334155">把偏离拉回上限</text>
</svg>
