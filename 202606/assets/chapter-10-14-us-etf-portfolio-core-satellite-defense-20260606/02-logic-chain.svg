<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">核心卫星防守组合论证链</title>
  <desc id="desc">从ETF工具差异推导到核心卫星防守组合结论</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">论证链：不同ETF承担不同任务</text>

  <rect x="42" y="82" width="170" height="112" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="127" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="127" y="139" text-anchor="middle" font-size="14" fill="#1e40af">宽基覆盖市场主干</text>
  <text x="127" y="162" text-anchor="middle" font-size="13" fill="#1e40af">适合做账户骨架</text>

  <rect x="227" y="82" width="170" height="112" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="312" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">前提B</text>
  <text x="312" y="139" text-anchor="middle" font-size="14" fill="#166534">行业ETF更集中</text>
  <text x="312" y="162" text-anchor="middle" font-size="13" fill="#166534">收益和回撤都放大</text>

  <rect x="412" y="82" width="170" height="112" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="497" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">前提C</text>
  <text x="497" y="139" text-anchor="middle" font-size="14" fill="#92400e">债券黄金会失效</text>
  <text x="497" y="162" text-anchor="middle" font-size="13" fill="#92400e">只能做防守层</text>

  <rect x="597" y="82" width="160" height="112" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="677" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#6d28d9">前提D</text>
  <text x="677" y="139" text-anchor="middle" font-size="14" fill="#5b21b6">小白需要少犯错</text>
  <text x="677" y="162" text-anchor="middle" font-size="13" fill="#5b21b6">仓位比观点重要</text>

  <path d="M127 205 V240 H390" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M312 205 V240" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M497 205 V240" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M677 205 V240 H390" fill="none" stroke="#64748b" stroke-width="2"/>
  <polygon points="390,240 382,234 382,246" fill="#64748b"/>

  <rect x="140" y="248" width="520" height="78" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="400" y="278" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">推导</text>
  <text x="400" y="306" text-anchor="middle" font-size="15" fill="#334155">因为工具风险不同，所以组合必须先分工，再设上限，再选择标的</text>

  <path d="M400 326 V356" stroke="#64748b" stroke-width="2"/>
  <polygon points="400,366 392,354 408,354" fill="#64748b"/>

  <rect x="210" y="365" width="380" height="48" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="394" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">结论：核心宽基 + 行业卫星 + 债券/黄金防守</text>
</svg>
