<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">ETF组合再平衡流程</title>
  <desc id="desc">从仓位偏离和前提变化出发的再平衡操作流程</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">再平衡不是预测，是把组合拉回纪律</text>

  <rect x="310" y="72" width="180" height="54" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">每月或每季度体检</text>

  <path d="M400 126 V155" stroke="#64748b" stroke-width="2"/>
  <polygon points="400,164 392,152 408,152" fill="#64748b"/>

  <rect x="260" y="164" width="280" height="64" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">三层仓位是否偏离上限？</text>
  <text x="400" y="212" text-anchor="middle" font-size="13" fill="#475569">核心、卫星、防守分别检查</text>

  <path d="M260 196 H105 V270" fill="none" stroke="#64748b" stroke-width="2"/>
  <polygon points="105,280 97,268 113,268" fill="#64748b"/>
  <text x="135" y="185" font-size="13" fill="#334155">未偏离</text>

  <path d="M540 196 H690 V270" fill="none" stroke="#64748b" stroke-width="2"/>
  <polygon points="690,280 682,268 698,268" fill="#64748b"/>
  <text x="610" y="185" font-size="13" fill="#334155">已偏离</text>

  <rect x="45" y="280" width="210" height="74" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="309" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">不为了交易而交易</text>
  <text x="150" y="332" text-anchor="middle" font-size="13" fill="#166534">只记录市场、汇率和估值变化</text>

  <rect x="585" y="280" width="210" height="74" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="690" y="309" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">卖高补低或暂停加仓</text>
  <text x="690" y="332" text-anchor="middle" font-size="13" fill="#92400e">先处理超过上限的那一层</text>

  <path d="M150 354 V386 H400" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M690 354 V386 H400" fill="none" stroke="#64748b" stroke-width="2"/>
  <polygon points="400,386 388,378 388,394" fill="#64748b"/>

  <rect x="250" y="392" width="300" height="24" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="409" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">前提失效：先降风险，再复盘，不机械补仓</text>
</svg>
