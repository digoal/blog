<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美股ETF定投的四个阀门</title>
  <desc id="desc">定投只是发动机，估值、汇率、仓位和再平衡决定每次投入多少以及何时调整。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="300" y="128" width="200" height="116" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="166" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">定投引擎</text>
  <text x="400" y="198" text-anchor="middle" font-size="15" fill="#475569">固定节奏</text>
  <text x="400" y="222" text-anchor="middle" font-size="15" fill="#475569">不是固定重仓</text>
  <rect x="70" y="54" width="170" height="82" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="155" y="86" text-anchor="middle" font-size="19" font-weight="700" fill="#155e75">估值阀门</text>
  <text x="155" y="113" text-anchor="middle" font-size="14" fill="#155e75">贵了降速 便宜才加速</text>
  <rect x="560" y="54" width="170" height="82" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="645" y="86" text-anchor="middle" font-size="19" font-weight="700" fill="#92400e">汇率阀门</text>
  <text x="645" y="113" text-anchor="middle" font-size="14" fill="#92400e">人民币成本要单独看</text>
  <rect x="70" y="264" width="170" height="82" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="155" y="296" text-anchor="middle" font-size="19" font-weight="700" fill="#3730a3">仓位阀门</text>
  <text x="155" y="323" text-anchor="middle" font-size="14" fill="#3730a3">先定上限 再谈买点</text>
  <rect x="560" y="264" width="170" height="82" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="645" y="296" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">再平衡阀门</text>
  <text x="645" y="323" text-anchor="middle" font-size="14" fill="#166534">涨多减回 跌多补回</text>
  <path d="M240 95 C275 105 292 128 312 150" fill="none" stroke="#0891b2" stroke-width="3"/>
  <path d="M560 95 C525 105 508 128 488 150" fill="none" stroke="#d97706" stroke-width="3"/>
  <path d="M240 305 C275 292 292 260 312 224" fill="none" stroke="#4f46e5" stroke-width="3"/>
  <path d="M560 305 C525 292 508 260 488 224" fill="none" stroke="#16a34a" stroke-width="3"/>
  <circle cx="400" cy="318" r="26" fill="#0f172a"/>
  <text x="400" y="325" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">规则</text>
  <path d="M400 244 L400 292" stroke="#0f172a" stroke-width="3"/>
  <text x="400" y="366" text-anchor="middle" font-size="15" fill="#334155">结论：定投解决执行，四个阀门解决风险边界</text>
</svg>
