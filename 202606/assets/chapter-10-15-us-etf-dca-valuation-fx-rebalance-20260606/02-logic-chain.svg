<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">美股ETF定投论证链</title>
  <desc id="desc">从定投、波动、估值、汇率、再平衡五个前提推出小白应当用规则定投而不是闭眼买入。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">从事实到动作：定投不能脱离四个控制器</text>
  <rect x="38" y="74" width="132" height="84" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="104" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#155e75">前提A</text>
  <text x="104" y="131" text-anchor="middle" font-size="13" fill="#155e75">择时很难</text>
  <rect x="190" y="74" width="132" height="84" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="256" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">前提B</text>
  <text x="256" y="131" text-anchor="middle" font-size="13" fill="#92400e">ETF仍会大跌</text>
  <rect x="342" y="74" width="132" height="84" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="408" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">前提C</text>
  <text x="408" y="131" text-anchor="middle" font-size="13" fill="#3730a3">估值影响赔率</text>
  <rect x="494" y="74" width="132" height="84" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="560" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">前提D</text>
  <text x="560" y="131" text-anchor="middle" font-size="13" fill="#166534">汇率改变成本</text>
  <rect x="646" y="74" width="116" height="84" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="704" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#9f1239">前提E</text>
  <text x="704" y="131" text-anchor="middle" font-size="13" fill="#9f1239">仓位会漂移</text>
  <path d="M104 158 L104 206 L256 206" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M256 158 L256 206" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M408 158 L408 206" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M560 158 L560 206" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M704 158 L704 206 L560 206" stroke="#64748b" stroke-width="2" fill="none"/>
  <rect x="160" y="206" width="480" height="82" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="236" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">逻辑推导</text>
  <text x="400" y="263" text-anchor="middle" font-size="14" fill="#334155">因为择时难，所以分批；因为风险还在，所以用估值、汇率、仓位调节速度</text>
  <path d="M400 288 L400 326" stroke="#334155" stroke-width="3"/>
  <polygon points="400,344 391,326 409,326" fill="#334155"/>
  <rect x="155" y="344" width="490" height="38" rx="8" fill="#0f172a"/>
  <text x="400" y="369" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">结论：定投金额可变，仓位上限不可变；定期复盘和再平衡</text>
</svg>
