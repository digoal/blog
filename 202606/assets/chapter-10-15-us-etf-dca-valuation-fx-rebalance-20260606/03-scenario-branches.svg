<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">美股ETF定投情景分支</title>
  <desc id="desc">展示正常、估值高且美元贵、下跌且估值回落、仓位漂移、短期资金五种情景下的操作切换。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">前提一变，定投动作也要变</text>
  <rect x="305" y="68" width="190" height="64" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">每月定投检查</text>
  <text x="400" y="119" text-anchor="middle" font-size="13" fill="#475569">估值 汇率 仓位 资金期限</text>
  <rect x="46" y="176" width="134" height="96" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="113" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">正常情景</text>
  <text x="113" y="232" text-anchor="middle" font-size="13" fill="#155e75">按基础金额</text>
  <text x="113" y="253" text-anchor="middle" font-size="13" fill="#155e75">持续记录</text>
  <rect x="198" y="176" width="134" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="265" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">估值高</text>
  <text x="265" y="232" text-anchor="middle" font-size="13" fill="#92400e">美元也贵</text>
  <text x="265" y="253" text-anchor="middle" font-size="13" fill="#92400e">降到半速</text>
  <rect x="350" y="176" width="134" height="96" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="417" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">明显回撤</text>
  <text x="417" y="232" text-anchor="middle" font-size="13" fill="#166534">估值回落</text>
  <text x="417" y="253" text-anchor="middle" font-size="13" fill="#166534">小幅加速</text>
  <rect x="502" y="176" width="134" height="96" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="569" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">仓位漂移</text>
  <text x="569" y="232" text-anchor="middle" font-size="13" fill="#3730a3">超过上限</text>
  <text x="569" y="253" text-anchor="middle" font-size="13" fill="#3730a3">停止加仓</text>
  <rect x="654" y="176" width="110" height="96" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="709" y="205" text-anchor="middle" font-size="16" font-weight="700" fill="#9f1239">短期钱</text>
  <text x="709" y="232" text-anchor="middle" font-size="13" fill="#9f1239">三年内用</text>
  <text x="709" y="253" text-anchor="middle" font-size="13" fill="#9f1239">不进股票ETF</text>
  <path d="M400 132 L113 176" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M400 132 L265 176" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M400 132 L417 176" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M400 132 L569 176" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M400 132 L709 176" stroke="#64748b" stroke-width="2" fill="none"/>
  <rect x="78" y="326" width="644" height="54" rx="8" fill="#0f172a"/>
  <text x="400" y="349" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">核心规则</text>
  <text x="400" y="372" text-anchor="middle" font-size="14" fill="#e2e8f0">不要让定投变成自动重仓；每次投入都要服从期限、估值、汇率和目标仓位</text>
</svg>
