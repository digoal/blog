<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">美股ETF卖出规则不是一个价格线</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">先分清这笔钱的角色，再决定止盈止损方式</text>

  <rect x="42" y="105" width="210" height="210" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="147" cy="145" r="28" fill="#dbeafe"/>
  <text x="147" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">1</text>
  <text x="147" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">核心宽基</text>
  <text x="147" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">标普500 / 全市场ETF</text>
  <text x="147" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">止盈: 仓位再平衡</text>
  <text x="147" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">止损: 资金期限或组合前提失效</text>

  <rect x="295" y="105" width="210" height="210" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <circle cx="400" cy="145" r="28" fill="#dcfce7"/>
  <text x="400" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15803d">2</text>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">卫星行业</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">科技 / 医疗 / 半导体</text>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">止盈: 超过上限就减回</text>
  <text x="400" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">止损: 行业逻辑被证伪</text>

  <rect x="548" y="105" width="210" height="210" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="653" cy="145" r="28" fill="#fee2e2"/>
  <text x="653" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">3</text>
  <text x="653" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">交易工具</text>
  <text x="653" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">杠杆 / 反向 / 高波动主题</text>
  <text x="653" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">止盈: 目标价或时间到</text>
  <text x="653" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">止损: 计划亏损线触发</text>

  <path d="M135 338 H665" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">同样叫“卖出”，核心仓卖的是偏离，卫星仓卖的是前提，交易仓卖的是纪律</text>
</svg>
