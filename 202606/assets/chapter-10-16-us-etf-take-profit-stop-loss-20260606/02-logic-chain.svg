<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从市场事实推出止盈止损规则</text>

  <rect x="36" y="86" width="170" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="121" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="121" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">宽基ETF短期回撤常见</text>
  <text x="121" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不是每次下跌都代表错</text>

  <rect x="36" y="242" width="170" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="121" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提B</text>
  <text x="121" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">最佳上涨日难预测</text>
  <text x="121" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">频繁离场会损伤复利</text>

  <path d="M220 132 H302" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M220 288 H302" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="310" y="134" width="180" height="142" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">逻辑推导</text>
  <text x="400" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为普通回撤常见</text>
  <text x="400" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以价格线不能单独决定卖出</text>
  <text x="400" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为离场后回补很难</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以卖出必须有可复核前提</text>

  <path d="M500 205 H582" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="592" y="86" width="172" height="248" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="678" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">结论</text>
  <text x="678" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">长期核心ETF</text>
  <text x="678" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">用“仓位偏离”止盈</text>
  <text x="678" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">用“前提失效”止损</text>
  <line x1="628" y1="236" x2="728" y2="236" stroke="#e2e8f0" stroke-width="2"/>
  <text x="678" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不要把长期配置</text>
  <text x="678" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">做成每天猜涨跌</text>

  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">卖出规则 = 资金期限 + 仓位上限 + 买入逻辑是否还成立</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
