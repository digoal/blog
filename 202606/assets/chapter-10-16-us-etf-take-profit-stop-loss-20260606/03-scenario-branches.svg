<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提变化后的卖出分支</text>

  <rect x="285" y="72" width="230" height="70" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f766e">先问: 我为什么买这只ETF?</text>
  <text x="400" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">长期配置、行业卫星，还是短期交易?</text>

  <path d="M400 142 V185" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 185 H146 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 185 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 185 H654 V222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="50" y="224" width="192" height="118" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="146" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">只是普通回撤</text>
  <text x="146" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">资金期限没变</text>
  <text x="146" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">ETF角色没变</text>
  <text x="146" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">动作: 不因恐慌清仓</text>

  <rect x="304" y="224" width="192" height="118" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">仓位超过上限</text>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">目标60%涨到66%</text>
  <text x="400" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">风险暴露变大</text>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">动作: 减回目标仓位</text>

  <rect x="558" y="224" width="192" height="118" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="654" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">买入逻辑失效</text>
  <text x="654" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">主题热度退潮</text>
  <text x="654" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">杠杆工具持有过久</text>
  <text x="654" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">动作: 按计划退出</text>

  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">真正的止损不是“跌了就卖”，而是“当初买入的理由不成立就卖”</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
