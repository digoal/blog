<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">美股个股: 放大镜，不是提款机</text>
  <rect x="60" y="82" width="290" height="250" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <rect x="450" y="82" width="290" height="250" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="205" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#047857">为什么值得研究</text>
  <text x="595" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">为什么不更容易赚钱</text>
  <circle cx="100" cy="160" r="8" fill="#10b981"/>
  <text x="120" y="166" font-family="Arial, sans-serif" font-size="16" fill="#064e3b">能直接研究公司业务</text>
  <circle cx="100" cy="205" r="8" fill="#10b981"/>
  <text x="120" y="211" font-family="Arial, sans-serif" font-size="16" fill="#064e3b">10-K、10-Q、8-K披露充分</text>
  <circle cx="100" cy="250" r="8" fill="#10b981"/>
  <text x="120" y="256" font-family="Arial, sans-serif" font-size="16" fill="#064e3b">优秀公司有长期复利样本</text>
  <circle cx="490" cy="160" r="8" fill="#ef4444"/>
  <text x="510" y="166" font-family="Arial, sans-serif" font-size="16" fill="#7f1d1d">赢家少数，收益高度集中</text>
  <circle cx="490" cy="205" r="8" fill="#ef4444"/>
  <text x="510" y="211" font-family="Arial, sans-serif" font-size="16" fill="#7f1d1d">单家公司黑天鹅无法分散</text>
  <circle cx="490" cy="250" r="8" fill="#ef4444"/>
  <text x="510" y="256" font-family="Arial, sans-serif" font-size="16" fill="#7f1d1d">财报、估值、卖出纪律都难</text>
  <path d="M360 205 L440 205" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">结论</text>
  <rect x="198" y="350" width="404" height="34" rx="6" fill="#111827"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">先研究，再小仓试错；不让个股替代核心资产</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
