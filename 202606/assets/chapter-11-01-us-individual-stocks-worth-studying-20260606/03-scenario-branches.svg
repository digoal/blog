<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f9fafb"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">前提变化时，动作必须切换</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect x="285" y="70" width="230" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">准备研究一只美股个股</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e3a8a">先问三个前提是否成立</text>
  <path d="M400 134 L400 165" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="248" y="165" width="304" height="62" rx="8" fill="#ffffff" stroke="#6b7280"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">能读披露 + 有估值区间 + 有失效条件?</text>
  <text x="400" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">并且单票不替代核心仓</text>
  <path d="M248 196 L120 260" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M400 227 L400 260" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M552 196 L680 260" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="38" y="260" width="190" height="88" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="133" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">读不懂</text>
  <text x="133" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">只进观察名单</text>
  <text x="133" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">不下单</text>
  <rect x="305" y="260" width="190" height="88" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#047857">前提成立</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#064e3b">小仓试错</text>
  <text x="400" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#064e3b">按季度复盘</text>
  <rect x="572" y="260" width="190" height="88" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="667" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">仓位超标</text>
  <text x="667" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c2d12">先减回上限</text>
  <text x="667" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c2d12">不再加码</text>
</svg>
