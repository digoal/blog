<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">美股公司分类地图</title>
  <desc id="desc">把美股公司按赚钱发动机分成七类，并标出每类优先看的指标</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">公司分类不是贴标签, 是找赚钱发动机</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#475569">先归类, 再选指标, 最后才谈估值和仓位</text>

  <rect x="34" y="95" width="160" height="102" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text x="114" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">科技成长</text>
  <text x="114" y="150" text-anchor="middle" font-size="13" fill="#0f172a">收入增速</text>
  <text x="114" y="171" text-anchor="middle" font-size="13" fill="#0f172a">毛利率 / FCF</text>

  <rect x="218" y="95" width="160" height="102" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
  <text x="298" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">消费龙头</text>
  <text x="298" y="150" text-anchor="middle" font-size="13" fill="#0f172a">品牌与复购</text>
  <text x="298" y="171" text-anchor="middle" font-size="13" fill="#0f172a">提价 / 库存</text>

  <rect x="402" y="95" width="160" height="102" rx="8" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="482" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#6d28d9">金融</text>
  <text x="482" y="150" text-anchor="middle" font-size="13" fill="#0f172a">利差与坏账</text>
  <text x="482" y="171" text-anchor="middle" font-size="13" fill="#0f172a">资本充足率</text>

  <rect x="586" y="95" width="160" height="102" rx="8" fill="#ffffff" stroke="#fb7185" stroke-width="2"/>
  <text x="666" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#be123c">医药</text>
  <text x="666" y="150" text-anchor="middle" font-size="13" fill="#0f172a">管线 / 专利</text>
  <text x="666" y="171" text-anchor="middle" font-size="13" fill="#0f172a">审批与支付</text>

  <rect x="126" y="240" width="160" height="102" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="206" y="269" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">能源</text>
  <text x="206" y="295" text-anchor="middle" font-size="13" fill="#0f172a">油气价格</text>
  <text x="206" y="316" text-anchor="middle" font-size="13" fill="#0f172a">成本 / 资本开支</text>

  <rect x="310" y="240" width="160" height="102" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="390" y="269" text-anchor="middle" font-size="17" font-weight="700" fill="#334155">工业</text>
  <text x="390" y="295" text-anchor="middle" font-size="13" fill="#0f172a">订单 / 积压</text>
  <text x="390" y="316" text-anchor="middle" font-size="13" fill="#0f172a">资本开支周期</text>

  <rect x="494" y="240" width="160" height="102" rx="8" fill="#ffffff" stroke="#facc15" stroke-width="2"/>
  <text x="574" y="269" text-anchor="middle" font-size="17" font-weight="700" fill="#a16207">周期股</text>
  <text x="574" y="295" text-anchor="middle" font-size="13" fill="#0f172a">供需 / 库存</text>
  <text x="574" y="316" text-anchor="middle" font-size="13" fill="#0f172a">价格与杠杆</text>

  <path d="M114 203 L206 233" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M298 203 L390 233" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M482 203 L390 233" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M666 203 L574 233" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <rect x="190" y="366" width="420" height="34" rx="8" fill="#111827"/>
  <text x="400" y="388" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">同一类里比较估值, 不同类先比较赚钱逻辑</text>
</svg>
