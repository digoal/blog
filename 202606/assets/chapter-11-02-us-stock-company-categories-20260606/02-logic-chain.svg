<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">公司分类论证链</title>
  <desc id="desc">从公司分类前提出发，推导出先归类再估值的操作结论</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">从公司分类推出研究顺序</text>

  <rect x="34" y="78" width="160" height="96" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text x="114" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="114" y="131" text-anchor="middle" font-size="13" fill="#0f172a">官方分类帮助</text>
  <text x="114" y="151" text-anchor="middle" font-size="13" fill="#0f172a">找到可比公司</text>

  <rect x="218" y="78" width="160" height="96" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
  <text x="298" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提B</text>
  <text x="298" y="131" text-anchor="middle" font-size="13" fill="#0f172a">不同公司</text>
  <text x="298" y="151" text-anchor="middle" font-size="13" fill="#0f172a">赚钱发动机不同</text>

  <rect x="402" y="78" width="160" height="96" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="482" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="482" y="131" text-anchor="middle" font-size="13" fill="#0f172a">市场环境变化</text>
  <text x="482" y="151" text-anchor="middle" font-size="13" fill="#0f172a">奖励的发动机变化</text>

  <rect x="586" y="78" width="160" height="96" rx="8" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="666" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">前提D</text>
  <text x="666" y="131" text-anchor="middle" font-size="13" fill="#0f172a">宽基已有暴露</text>
  <text x="666" y="151" text-anchor="middle" font-size="13" fill="#0f172a">个股会加浓度</text>

  <path d="M114 186 L114 224 L250 224" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M298 186 L298 224" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M482 186 L482 224 L350 224" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M666 186 L666 224 L350 224" stroke="#64748b" stroke-width="3" fill="none"/>

  <rect x="170" y="236" width="460" height="78" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="264" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="289" text-anchor="middle" font-size="15" fill="#334155">先归类才能选指标, 先看已有暴露才能定仓位</text>

  <path d="M400 318 L400 346" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="100" y="354" width="600" height="52" rx="8" fill="#111827"/>
  <text x="400" y="382" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">结论: 每只个股先写分类卡, 再谈买入价格和仓位上限</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
