<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">分类失效情景分支</title>
  <desc id="desc">展示公司分类、市场环境和组合暴露变化后的操作调整</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">分类不是一次性答案, 要跟着前提切换</text>

  <rect x="260" y="70" width="280" height="58" rx="8" fill="#111827"/>
  <text x="400" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">准备买一只美股个股</text>

  <path d="M400 130 L400 166" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="235" y="174" width="330" height="58" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="209" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">先写分类卡: 类型 / 指标 / 失效条件</text>

  <path d="M400 235 L170 272" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 235 L400 272" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 235 L630 272" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="52" y="282" width="224" height="86" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
  <text x="164" y="310" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">分类清楚</text>
  <text x="164" y="335" text-anchor="middle" font-size="13" fill="#0f172a">用同类指标比较</text>
  <text x="164" y="356" text-anchor="middle" font-size="13" fill="#0f172a">小仓分批验证</text>

  <rect x="288" y="282" width="224" height="86" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">驱动改变</text>
  <text x="400" y="335" text-anchor="middle" font-size="13" fill="#0f172a">原指标失效</text>
  <text x="400" y="356" text-anchor="middle" font-size="13" fill="#0f172a">停止加仓或降仓</text>

  <rect x="524" y="282" width="224" height="86" rx="8" fill="#ffffff" stroke="#fb7185" stroke-width="2"/>
  <text x="636" y="310" text-anchor="middle" font-size="16" font-weight="700" fill="#be123c">已有暴露过高</text>
  <text x="636" y="335" text-anchor="middle" font-size="13" fill="#0f172a">个股变成集中押注</text>
  <text x="636" y="356" text-anchor="middle" font-size="13" fill="#0f172a">先降仓位上限</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
