<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">美股财报四层漏斗</title>
  <desc id="desc">展示收入、毛利率、营业利润、自由现金流从上到下筛选公司质量的关系。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">美股财报四层漏斗</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#4b5563">先看生意规模，再看赚钱质量，最后看现金能不能落袋</text>

  <path d="M120 105 H680 L625 175 H175 Z" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="135" text-anchor="middle" font-size="21" font-weight="700" fill="#1e3a8a">收入 Revenue</text>
  <text x="400" y="160" text-anchor="middle" font-size="14" fill="#1e40af">客户愿意付多少钱，先证明有没有需求</text>

  <path d="M175 190 H625 L570 260 H230 Z" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="220" text-anchor="middle" font-size="21" font-weight="700" fill="#14532d">毛利率 Gross Margin</text>
  <text x="400" y="245" text-anchor="middle" font-size="14" fill="#166534">扣掉直接成本后，还剩多少空间</text>

  <path d="M230 275 H570 L515 345 H285 Z" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-size="21" font-weight="700" fill="#78350f">营业利润 Operating Income</text>
  <text x="400" y="330" text-anchor="middle" font-size="14" fill="#92400e">扣掉研发、销售、管理后，主业是否赚钱</text>

  <path d="M285 360 H515 L485 405 H315 Z" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="386" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">自由现金流 FCF</text>
  <text x="400" y="405" text-anchor="middle" font-size="12" fill="#991b1b">经营现金流 - 资本开支</text>
</svg>
