<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">从四个指标推出买入动作</title>
  <desc id="desc">用收入、毛利率、营业利润、自由现金流四个前提推导出观察、轻仓试错和暂不买入三类动作。</desc>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 四个指标决定个股能不能进入观察池</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="35" y="85" width="165" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="117.5" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="117.5" y="146" text-anchor="middle" font-size="14" fill="#1e40af">收入增长</text>
  <text x="117.5" y="166" text-anchor="middle" font-size="13" fill="#1e40af">说明需求存在</text>

  <rect x="250" y="85" width="165" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="332.5" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">前提B</text>
  <text x="332.5" y="146" text-anchor="middle" font-size="14" fill="#166534">毛利率稳定</text>
  <text x="332.5" y="166" text-anchor="middle" font-size="13" fill="#166534">说明定价有力</text>

  <rect x="485" y="85" width="165" height="90" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="567.5" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">前提C</text>
  <text x="567.5" y="146" text-anchor="middle" font-size="14" fill="#92400e">营业利润为正</text>
  <text x="567.5" y="166" text-anchor="middle" font-size="13" fill="#92400e">说明主业能赚钱</text>

  <rect x="700" y="85" width="165" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="782.5" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">前提D</text>
  <text x="782.5" y="146" text-anchor="middle" font-size="14" fill="#991b1b">自由现金流为正</text>
  <text x="782.5" y="166" text-anchor="middle" font-size="13" fill="#991b1b">说明利润能变现金</text>

  <line x1="200" y1="130" x2="250" y2="130" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="415" y1="130" x2="485" y2="130" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="130" x2="700" y2="130" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="115" y="235" width="670" height="82" rx="12" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">推导</text>
  <text x="450" y="296" text-anchor="middle" font-size="15" fill="#374151">因为客户买单 + 单位经济账好 + 主业能赚钱 + 现金能落袋</text>
  <text x="450" y="316" text-anchor="middle" font-size="15" fill="#374151">所以公司才具备进入个股观察池的基础资格</text>

  <line x1="450" y1="175" x2="450" y2="235" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="95" y="370" width="220" height="65" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="205" y="398" text-anchor="middle" font-size="17" font-weight="700" fill="#164e63">四项都合格</text>
  <text x="205" y="421" text-anchor="middle" font-size="14" fill="#155e75">进入观察池，等待估值</text>

  <rect x="340" y="370" width="220" height="65" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="450" y="398" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">利润好但现金差</text>
  <text x="450" y="421" text-anchor="middle" font-size="14" fill="#9a3412">降级观察，不加仓</text>

  <rect x="585" y="370" width="220" height="65" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="695" y="398" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">收入高但亏损大</text>
  <text x="695" y="421" text-anchor="middle" font-size="14" fill="#991b1b">先不买，等模型验证</text>

  <line x1="450" y1="317" x2="205" y2="370" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="317" x2="450" y2="370" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="317" x2="695" y2="370" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
