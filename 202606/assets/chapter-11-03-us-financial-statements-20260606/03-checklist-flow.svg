<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" role="img" aria-labelledby="title desc">
  <title id="title">财报四问实操检查表</title>
  <desc id="desc">展示阅读一家公司财报时，按收入、毛利率、营业利润和自由现金流逐步判断的流程。</desc>
  <rect width="860" height="460" fill="#f8fafc"/>
  <text x="430" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">财报四问: 从故事回到数字</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="50" y="90" width="170" height="95" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="123" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">1. 收入</text>
  <text x="135" y="151" text-anchor="middle" font-size="14" fill="#1e40af">增长来自销量</text>
  <text x="135" y="170" text-anchor="middle" font-size="14" fill="#1e40af">还是涨价和并购?</text>

  <rect x="260" y="90" width="170" height="95" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="345" y="123" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">2. 毛利率</text>
  <text x="345" y="151" text-anchor="middle" font-size="14" fill="#166534">卖一单之后</text>
  <text x="345" y="170" text-anchor="middle" font-size="14" fill="#166534">还剩多少空间?</text>

  <rect x="470" y="90" width="170" height="95" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="555" y="123" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">3. 营业利润</text>
  <text x="555" y="151" text-anchor="middle" font-size="14" fill="#92400e">扣掉研发销售</text>
  <text x="555" y="170" text-anchor="middle" font-size="14" fill="#92400e">主业还赚钱吗?</text>

  <rect x="680" y="90" width="130" height="95" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="745" y="123" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">4. FCF</text>
  <text x="745" y="151" text-anchor="middle" font-size="14" fill="#991b1b">现金有没有</text>
  <text x="745" y="170" text-anchor="middle" font-size="14" fill="#991b1b">真正留下?</text>

  <line x1="220" y1="137" x2="260" y2="137" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="137" x2="470" y2="137" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="137" x2="680" y2="137" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="245" width="210" height="135" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="175" y="278" text-anchor="middle" font-size="19" font-weight="700" fill="#164e63">A档: 四项通过</text>
  <text x="175" y="310" text-anchor="middle" font-size="14" fill="#155e75">可进观察池</text>
  <text x="175" y="332" text-anchor="middle" font-size="14" fill="#155e75">再看估值和仓位</text>
  <text x="175" y="354" text-anchor="middle" font-size="14" fill="#155e75">不因好公司而高价重仓</text>

  <rect x="325" y="245" width="210" height="135" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="430" y="278" text-anchor="middle" font-size="19" font-weight="700" fill="#7c2d12">B档: 一项掉链</text>
  <text x="430" y="310" text-anchor="middle" font-size="14" fill="#9a3412">降级观察</text>
  <text x="430" y="332" text-anchor="middle" font-size="14" fill="#9a3412">查清原因再行动</text>
  <text x="430" y="354" text-anchor="middle" font-size="14" fill="#9a3412">不轻易补仓摊低成本</text>

  <rect x="580" y="245" width="210" height="135" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="278" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">C档: 多项失效</text>
  <text x="685" y="310" text-anchor="middle" font-size="14" fill="#991b1b">先排除</text>
  <text x="685" y="332" text-anchor="middle" font-size="14" fill="#991b1b">等商业模式被验证</text>
  <text x="685" y="354" text-anchor="middle" font-size="14" fill="#991b1b">不拿故事替代现金流</text>

  <line x1="745" y1="185" x2="685" y2="245" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="185" x2="430" y2="245" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="135" y1="185" x2="175" y2="245" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="430" y="425" text-anchor="middle" font-size="15" fill="#374151">顺序不能反过来: 先证实生意质量，再讨论估值和买入</text>
</svg>
