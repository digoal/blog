<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">GAAP 与 Non-GAAP：两把利润尺</text>
  <rect x="70" y="85" width="280" height="220" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="122" text-anchor="middle" font-size="22" font-weight="700" fill="#2563eb">GAAP</text>
  <text x="210" y="155" text-anchor="middle" font-size="16" fill="#374151">统一会计规则</text>
  <text x="210" y="188" text-anchor="middle" font-size="16" fill="#374151">收入、费用、利润按同一套口径确认</text>
  <text x="210" y="221" text-anchor="middle" font-size="16" fill="#374151">适合做公司之间和年份之间对比</text>
  <text x="210" y="254" text-anchor="middle" font-size="16" fill="#374151">缺点：会把一次性或非现金项目放进利润</text>
  <rect x="450" y="85" width="280" height="220" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="122" text-anchor="middle" font-size="22" font-weight="700" fill="#d97706">Non-GAAP</text>
  <text x="590" y="155" text-anchor="middle" font-size="16" fill="#374151">公司自定义的调整口径</text>
  <text x="590" y="188" text-anchor="middle" font-size="16" fill="#374151">常剔除股权激励、重组、并购摊销等</text>
  <text x="590" y="221" text-anchor="middle" font-size="16" fill="#374151">适合观察管理层认为的核心经营</text>
  <text x="590" y="254" text-anchor="middle" font-size="16" fill="#374151">缺点：可比性弱，容易被包装</text>
  <path d="M360 195 H440" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="180" text-anchor="middle" font-size="14" fill="#475569">必须看调节表</text>
  <rect x="140" y="335" width="520" height="38" rx="8" fill="#ecfeff" stroke="#0891b2"/>
  <text x="400" y="359" text-anchor="middle" font-size="17" font-weight="700" fill="#155e75">小白结论：先用 GAAP 定底线，再用 Non-GAAP 看调整是否合理</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
