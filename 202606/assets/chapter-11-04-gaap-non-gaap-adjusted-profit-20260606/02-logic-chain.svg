<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">从“公司调整利润”推出小白操作规则</text>
  <rect x="35" y="82" width="150" height="86" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="110" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="110" y="139" text-anchor="middle" font-size="14" fill="#374151">GAAP 是统一尺</text>
  <rect x="225" y="82" width="150" height="86" rx="10" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="300" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">前提B</text>
  <text x="300" y="139" text-anchor="middle" font-size="14" fill="#374151">Non-GAAP 可调整</text>
  <rect x="415" y="82" width="150" height="86" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="490" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">前提C</text>
  <text x="490" y="139" text-anchor="middle" font-size="14" fill="#374151">调整有好坏之分</text>
  <rect x="605" y="82" width="150" height="86" rx="10" fill="#fef2f2" stroke="#dc2626"/>
  <text x="680" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="680" y="139" text-anchor="middle" font-size="14" fill="#374151">错误调整会误导</text>
  <path d="M110 170 V215 H680 V170" fill="none" stroke="#64748b" stroke-width="2"/>
  <rect x="175" y="215" width="450" height="66" rx="10" fill="#f8fafc" stroke="#475569"/>
  <text x="400" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="266" text-anchor="middle" font-size="14" fill="#374151">因为调整口径会改变利润，所以估值不能只看 adjusted EPS</text>
  <path d="M400 282 V316" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="130" y="318" width="540" height="52" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="400" y="340" text-anchor="middle" font-size="17" font-weight="700" fill="#155e75">结论：先看 GAAP，再拆调整，最后给估值和仓位打折</text>
  <text x="400" y="362" text-anchor="middle" font-size="14" fill="#155e75">调节表不清楚、调整反复发生、现金流不支持：不重仓</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
