<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="35" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">Non-GAAP 调整检查树</text>
  <rect x="285" y="70" width="230" height="54" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="103" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">公司公布 adjusted profit</text>
  <path d="M400 124 V158" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="160" width="300" height="48" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="400" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">是否列出 GAAP 对照和逐项调节？</text>
  <path d="M250 184 H105 V254" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M550 184 H695 V254" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="174" text-anchor="middle" font-size="14" fill="#dc2626">否</text>
  <text x="630" y="174" text-anchor="middle" font-size="14" fill="#16a34a">是</text>
  <rect x="35" y="255" width="140" height="72" rx="10" fill="#fef2f2" stroke="#dc2626"/>
  <text x="105" y="283" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">红灯</text>
  <text x="105" y="309" text-anchor="middle" font-size="13" fill="#374151">不按调整利润估值</text>
  <rect x="625" y="255" width="140" height="72" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="695" y="283" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">继续检查</text>
  <text x="695" y="309" text-anchor="middle" font-size="13" fill="#374151">看调整性质</text>
  <path d="M695 327 V350 H520" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="318" width="220" height="58" rx="10" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="410" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">经常性成本被剔除？</text>
  <text x="410" y="365" text-anchor="middle" font-size="13" fill="#374151">股权激励、营销、重组反复出现</text>
  <path d="M300 347 H190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="337" text-anchor="middle" font-size="14" fill="#dc2626">是</text>
  <text x="548" y="337" text-anchor="middle" font-size="14" fill="#16a34a">否</text>
  <rect x="35" y="338" width="155" height="42" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="112" y="364" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">估值打折 / 降仓</text>
  <rect x="560" y="338" width="170" height="42" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="645" y="364" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">可辅助看核心经营</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
