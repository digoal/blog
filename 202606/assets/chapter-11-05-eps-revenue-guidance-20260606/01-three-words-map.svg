<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">财报季三词地图</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#4b5563">Revenue 看需求，EPS 看利润，Guidance 看未来预期</text>

  <rect x="60" y="115" width="185" height="155" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="152" y="148" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">Revenue</text>
  <text x="152" y="178" text-anchor="middle" font-size="16" fill="#111827">收入</text>
  <text x="152" y="210" text-anchor="middle" font-size="14" fill="#374151">公司卖出去多少</text>
  <text x="152" y="235" text-anchor="middle" font-size="14" fill="#374151">需求有没有增长</text>

  <rect x="307" y="115" width="185" height="155" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" font-size="24" font-weight="700" fill="#047857">EPS</text>
  <text x="400" y="178" text-anchor="middle" font-size="16" fill="#111827">每股收益</text>
  <text x="400" y="210" text-anchor="middle" font-size="14" fill="#374151">收入扣成本后</text>
  <text x="400" y="235" text-anchor="middle" font-size="14" fill="#374151">每股赚到多少</text>

  <rect x="555" y="115" width="185" height="155" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="647" y="148" text-anchor="middle" font-size="24" font-weight="700" fill="#c2410c">Guidance</text>
  <text x="647" y="178" text-anchor="middle" font-size="16" fill="#111827">业绩指引</text>
  <text x="647" y="210" text-anchor="middle" font-size="14" fill="#374151">管理层对下季</text>
  <text x="647" y="235" text-anchor="middle" font-size="14" fill="#374151">或全年的预告</text>

  <path d="M245 192 H307" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M492 192 H555" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="145" y="315" width="510" height="42" rx="8" fill="#111827"/>
  <text x="400" y="342" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">三者同向改善，才叫财报质量过关；只好一个词，不能直接追涨。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
