<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">从三个词推出财报季操作</text>

  <rect x="40" y="88" width="150" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="115" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="115" y="145" text-anchor="middle" font-size="14" fill="#374151">财报是预期考试</text>

  <rect x="225" y="88" width="150" height="80" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="300" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">前提B</text>
  <text x="300" y="145" text-anchor="middle" font-size="14" fill="#374151">收入和利润要同看</text>

  <rect x="410" y="88" width="150" height="80" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="485" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">前提C</text>
  <text x="485" y="145" text-anchor="middle" font-size="14" fill="#374151">指引会改写估值</text>

  <rect x="595" y="88" width="150" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="670" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="670" y="145" text-anchor="middle" font-size="14" fill="#374151">市场惩罚坏消息</text>

  <path d="M115 168 C115 214 205 214 205 245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M300 168 C300 214 300 214 300 245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M485 168 C485 214 395 214 395 245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M670 168 C670 214 485 214 485 245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="170" y="245" width="460" height="72" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="275" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">推导：三词同向 = 质量过关；三词分裂 = 先防风险</text>
  <text x="400" y="299" text-anchor="middle" font-size="14" fill="#374151">不能只因 EPS 超预期买入，也不能只因股价下跌补仓</text>

  <path d="M400 317 V348" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="210" y="348" width="380" height="36" rx="8" fill="#111827"/>
  <text x="400" y="372" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">操作：先填三词表，再决定买入、观察、减仓或退出</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
