<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">财报后三种情景分支</text>

  <rect x="300" y="78" width="200" height="52" rx="8" fill="#111827"/>
  <text x="400" y="111" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">财报发布后先问三件事</text>

  <path d="M400 130 V165" stroke="#64748b" stroke-width="3"/>
  <path d="M160 165 H640" stroke="#64748b" stroke-width="3"/>
  <path d="M160 165 V195" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 165 V195" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M640 165 V195" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="55" y="195" width="210" height="145" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="160" y="226" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">三词同绿</text>
  <text x="160" y="254" text-anchor="middle" font-size="14" fill="#374151">收入超预期</text>
  <text x="160" y="278" text-anchor="middle" font-size="14" fill="#374151">EPS 超预期</text>
  <text x="160" y="302" text-anchor="middle" font-size="14" fill="#374151">指引上调或强于预期</text>
  <text x="160" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">看估值和仓位后再买</text>

  <rect x="295" y="195" width="210" height="145" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="226" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">一绿一红</text>
  <text x="400" y="254" text-anchor="middle" font-size="14" fill="#374151">收入强但利润弱</text>
  <text x="400" y="278" text-anchor="middle" font-size="14" fill="#374151">或利润强但收入弱</text>
  <text x="400" y="302" text-anchor="middle" font-size="14" fill="#374151">或指引没有跟上</text>
  <text x="400" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">先观察，不追涨加仓</text>

  <rect x="535" y="195" width="210" height="145" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="226" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">指引转红</text>
  <text x="640" y="254" text-anchor="middle" font-size="14" fill="#374151">下季或全年预期下修</text>
  <text x="640" y="278" text-anchor="middle" font-size="14" fill="#374151">业务成本失控</text>
  <text x="640" y="302" text-anchor="middle" font-size="14" fill="#374151">核心逻辑被证伪</text>
  <text x="640" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">减仓或退出，不补跌</text>

  <text x="400" y="375" text-anchor="middle" font-size="14" fill="#4b5563">重点：三词表只决定是否进入下一步，不能替代估值、仓位和风险承受能力。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
