<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="美股个股估值指标地图">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">五个估值指标各看一面</text>
  <text x="400" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">不要问“哪个指标最好”，先问“这家公司现在该用哪把尺”</text>

  <rect x="330" y="150" width="140" height="82" rx="8" fill="#111827"/>
  <text x="400" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">股价 / 市值</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">只是入口，不是结论</text>

  <g font-family="Arial, sans-serif">
    <rect x="36" y="100" width="180" height="82" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="126" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="#075985">PE</text>
    <text x="126" y="153" text-anchor="middle" font-size="13" fill="#0f172a">买 1 美元当前利润</text>
    <text x="126" y="171" text-anchor="middle" font-size="13" fill="#0f172a">要付多少钱</text>

    <rect x="36" y="226" width="180" height="82" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="126" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Forward PE</text>
    <text x="126" y="279" text-anchor="middle" font-size="13" fill="#0f172a">市场相信明年利润</text>
    <text x="126" y="297" text-anchor="middle" font-size="13" fill="#0f172a">会是多少</text>

    <rect x="310" y="288" width="180" height="82" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="400" y="316" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">PS</text>
    <text x="400" y="341" text-anchor="middle" font-size="13" fill="#0f172a">利润暂时失真时</text>
    <text x="400" y="359" text-anchor="middle" font-size="13" fill="#0f172a">先看收入价格</text>

    <rect x="584" y="100" width="180" height="82" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="674" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6">EV/EBITDA</text>
    <text x="674" y="153" text-anchor="middle" font-size="13" fill="#0f172a">把债务和现金放进来</text>
    <text x="674" y="171" text-anchor="middle" font-size="13" fill="#0f172a">看整家公司价格</text>

    <rect x="584" y="226" width="180" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="674" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">FCF Yield</text>
    <text x="674" y="279" text-anchor="middle" font-size="13" fill="#0f172a">扣掉必要投入后</text>
    <text x="674" y="297" text-anchor="middle" font-size="13" fill="#0f172a">留下多少现金回报</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M216 141 L330 176"/>
    <path d="M216 267 L330 207"/>
    <path d="M400 288 L400 232"/>
    <path d="M584 141 L470 176"/>
    <path d="M584 267 L470 207"/>
  </g>
</svg>
