<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="估值指标论证链">
  <rect width="800" height="400" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">从“便宜幻觉”到“估值漏斗”</text>

  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="28" y="74" width="156" height="74" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="106" y="101" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">前提 A</text>
    <text x="106" y="124" text-anchor="middle" fill="#334155">股价买的是</text>
    <text x="106" y="142" text-anchor="middle" fill="#334155">未来现金流预期</text>

    <rect x="226" y="74" width="156" height="74" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="304" y="101" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">前提 B</text>
    <text x="304" y="124" text-anchor="middle" fill="#334155">每个倍数的分母</text>
    <text x="304" y="142" text-anchor="middle" fill="#334155">回答不同问题</text>

    <rect x="424" y="74" width="156" height="74" rx="8" fill="#fefce8" stroke="#eab308"/>
    <text x="502" y="101" text-anchor="middle" font-size="15" font-weight="700" fill="#854d0e">前提 C</text>
    <text x="502" y="124" text-anchor="middle" fill="#334155">利润、预测、现金流</text>
    <text x="502" y="142" text-anchor="middle" fill="#334155">都可能被扭曲</text>

    <rect x="622" y="74" width="156" height="74" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="700" y="101" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">前提 D</text>
    <text x="700" y="124" text-anchor="middle" fill="#334155">行业、资本开支、债务</text>
    <text x="700" y="142" text-anchor="middle" fill="#334155">决定可比性</text>

    <rect x="82" y="212" width="190" height="82" rx="8" fill="#fee2e2" stroke="#f87171"/>
    <text x="177" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">错误推导</text>
    <text x="177" y="265" text-anchor="middle" fill="#334155">倍数低 = 便宜</text>
    <text x="177" y="283" text-anchor="middle" fill="#334155">倍数高 = 泡沫</text>

    <rect x="314" y="206" width="172" height="94" rx="8" fill="#f8fafc" stroke="#64748b"/>
    <text x="400" y="234" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">正确推导</text>
    <text x="400" y="258" text-anchor="middle" fill="#334155">先选匹配指标</text>
    <text x="400" y="276" text-anchor="middle" fill="#334155">再查分母质量</text>
    <text x="400" y="294" text-anchor="middle" fill="#334155">最后同行比较</text>

    <rect x="528" y="212" width="190" height="82" rx="8" fill="#dcfce7" stroke="#22c55e"/>
    <text x="623" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">行动结论</text>
    <text x="623" y="265" text-anchor="middle" fill="#334155">用估值漏斗决定</text>
    <text x="623" y="283" text-anchor="middle" fill="#334155">买入、观察或放弃</text>
  </g>

  <g stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M184 111 L226 111"/>
    <path d="M382 111 L424 111"/>
    <path d="M580 111 L622 111"/>
    <path d="M304 148 C290 174 235 188 196 212"/>
    <path d="M502 148 C484 176 438 185 415 206"/>
    <path d="M700 148 C686 178 645 190 631 212"/>
    <path d="M272 253 L314 253"/>
    <path d="M486 253 L528 253"/>
  </g>

  <text x="400" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">核心规则：估值指标不是答案，是检查公司质量、预期和价格是否匹配的入口</text>
</svg>
