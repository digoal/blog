<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="估值指标情景分支图">
  <rect width="800" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">前提一变，估值尺也要换</text>

  <rect x="304" y="70" width="192" height="68" rx="10" fill="#111827"/>
  <text x="400" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">先判断公司状态</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">盈利、增长、债务、现金流</text>

  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="44" y="190" width="160" height="86" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="124" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">稳定盈利</text>
    <text x="124" y="242" text-anchor="middle" fill="#334155">PE + Forward PE</text>
    <text x="124" y="261" text-anchor="middle" fill="#334155">检查利润质量</text>

    <rect x="232" y="190" width="160" height="86" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="312" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">暂时亏损</text>
    <text x="312" y="242" text-anchor="middle" fill="#334155">PS 只能做过渡</text>
    <text x="312" y="261" text-anchor="middle" fill="#334155">必须要利润路径</text>

    <rect x="420" y="190" width="160" height="86" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="500" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">债务/现金差异大</text>
    <text x="500" y="242" text-anchor="middle" fill="#334155">看 EV/EBITDA</text>
    <text x="500" y="261" text-anchor="middle" fill="#334155">排除金融公司</text>

    <rect x="608" y="190" width="160" height="86" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="688" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">重资本开支</text>
    <text x="688" y="242" text-anchor="middle" fill="#334155">看 FCF Yield</text>
    <text x="688" y="261" text-anchor="middle" fill="#334155">别只信 EBITDA</text>

    <rect x="78" y="336" width="644" height="50" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">统一动作：同业比较 + 自身历史区间 + 预期变化 + 仓位上限</text>
    <text x="400" y="378" text-anchor="middle" fill="#334155">任何一项解释不了高估值，就从“买入”降级为“观察”</text>
  </g>

  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M400 138 C350 166 190 160 124 190"/>
    <path d="M400 138 C370 166 330 164 312 190"/>
    <path d="M400 138 C430 166 470 164 500 190"/>
    <path d="M400 138 C462 166 626 160 688 190"/>
    <path d="M124 276 L186 336"/>
    <path d="M312 276 L342 336"/>
    <path d="M500 276 L464 336"/>
    <path d="M688 276 L608 336"/>
  </g>
</svg>
