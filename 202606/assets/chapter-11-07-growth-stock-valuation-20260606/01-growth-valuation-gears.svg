<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f7f8fa"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">成长股估值的三只齿轮</text>
  <text x="400" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">高估值能不能被消化，取决于未来现金流是否真的变大</text>

  <circle cx="170" cy="175" r="78" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <circle cx="170" cy="175" r="43" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="170" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">收入增速</text>
  <text x="170" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">需求是否持续放大</text>

  <circle cx="400" cy="175" r="78" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <circle cx="400" cy="175" r="43" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">利润率改善</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">收入能否变成利润</text>

  <circle cx="630" cy="175" r="78" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <circle cx="630" cy="175" r="43" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="630" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">市场空间</text>
  <text x="630" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">增长还能跑多远</text>

  <path d="M250 175 H320" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M480 175 H550" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 265 C285 335 515 335 590 265" fill="none" stroke="#475569" stroke-width="3"/>
  <polygon points="590,265 576,267 586,277" fill="#475569"/>

  <rect x="215" y="300" width="370" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">未来现金流变大</text>
  <text x="400" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">估值被业绩消化，而不是只靠情绪支撑</text>
</svg>
