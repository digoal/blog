<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f7f8fa"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">前提变化后的操作分支</text>

  <rect x="305" y="72" width="190" height="58" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">先问三件事</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">增速、利润率、市场空间</text>

  <rect x="40" y="198" width="160" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="120" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">三项都成立</text>
  <text x="120" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">小仓位分批</text>
  <text x="120" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">写失效条件</text>

  <rect x="224" y="198" width="160" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="304" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">收入变慢</text>
  <text x="304" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">停止加仓</text>
  <text x="304" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">等新增长曲线</text>

  <rect x="408" y="198" width="160" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="488" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">利润率下滑</text>
  <text x="488" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">重算估值</text>
  <text x="488" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">降低仓位上限</text>

  <rect x="592" y="198" width="160" height="92" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="672" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">价格已透支</text>
  <text x="672" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">只观察或轻仓</text>
  <text x="672" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">等待业绩验证</text>

  <path d="M400 130 L120 198" stroke="#64748b" stroke-width="2"/>
  <path d="M400 130 L304 198" stroke="#64748b" stroke-width="2"/>
  <path d="M400 130 L488 198" stroke="#64748b" stroke-width="2"/>
  <path d="M400 130 L672 198" stroke="#64748b" stroke-width="2"/>
  <polygon points="120,198 126,187 130,201" fill="#64748b"/>
  <polygon points="304,198 304,186 314,195" fill="#64748b"/>
  <polygon points="488,198 476,195 486,186" fill="#64748b"/>
  <polygon points="672,198 660,201 666,187" fill="#64748b"/>

  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">成长股不是不能贵，而是不能在前提变坏时还假装便宜</text>
</svg>
