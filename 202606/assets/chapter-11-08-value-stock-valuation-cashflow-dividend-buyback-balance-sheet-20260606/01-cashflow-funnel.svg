<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">价值股现金流漏斗</title>
  <desc id="desc">展示从收入到自由现金流，再到分红、回购和留存现金的路径。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">价值股估值先看现金流漏斗</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">利润是账面结果，自由现金流才是能分红、回购、还债的钱</text>

  <g font-family="Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="70" y="105" width="150" height="58" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="145" y="139" text-anchor="middle" fill="#1e3a8a">收入</text>
    <text x="145" y="158" text-anchor="middle" font-size="12" font-weight="400" fill="#1e40af">卖出产品和服务</text>

    <path d="M220 134 L268 134" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="270" y="105" width="150" height="58" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="345" y="139" text-anchor="middle" fill="#14532d">经营现金流</text>
    <text x="345" y="158" text-anchor="middle" font-size="12" font-weight="400" fill="#166534">实际流入口袋</text>

    <path d="M420 134 L468 134" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="470" y="105" width="150" height="58" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="545" y="139" text-anchor="middle" fill="#78350f">必要开支</text>
    <text x="545" y="158" text-anchor="middle" font-size="12" font-weight="400" fill="#92400e">设备、门店、系统</text>

    <path d="M620 134 L668 134" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="670" y="105" width="90" height="58" rx="8" fill="#fce7f3" stroke="#db2777"/>
    <text x="715" y="139" text-anchor="middle" fill="#831843">自由</text>
    <text x="715" y="158" text-anchor="middle" font-size="12" font-weight="400" fill="#9d174d">现金流</text>
  </g>

  <path d="M715 164 L715 210" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="225" width="170" height="72" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <rect x="315" y="225" width="170" height="72" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <rect x="520" y="225" width="170" height="72" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <path d="M715 210 C630 210 610 225 605 225" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M715 210 C520 205 430 225 400 225" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M715 210 C390 200 220 225 195 225" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif">
    <text x="195" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">分红</text>
    <text x="195" y="279" text-anchor="middle" font-size="13" fill="#475569">持续派钱给股东</text>
    <text x="400" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">回购</text>
    <text x="400" y="279" text-anchor="middle" font-size="13" fill="#475569">减少股份才有效</text>
    <text x="605" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">留存和还债</text>
    <text x="605" y="279" text-anchor="middle" font-size="13" fill="#475569">提高抗周期能力</text>
  </g>

  <rect x="88" y="330" width="624" height="38" rx="8" fill="#e2e8f0"/>
  <text x="400" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">小白结论：分红率和回购金额都要回到自由现金流和资产负债表里验证</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
