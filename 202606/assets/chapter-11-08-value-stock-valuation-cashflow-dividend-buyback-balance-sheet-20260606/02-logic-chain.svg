<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">价值股估值论证链</title>
  <desc id="desc">展示价值股估值从现金流、分红、回购、资产负债表到价格边界的推导路径。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从低估值到可买入，要过四道门</text>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="78" width="160" height="74" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="125" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
    <text x="125" y="132" text-anchor="middle" font-size="13" fill="#1e40af">价值股主要靠存量</text>
    <text x="125" y="148" text-anchor="middle" font-size="13" fill="#1e40af">现金流回报股东</text>

    <rect x="225" y="78" width="160" height="74" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="305" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提B</text>
    <text x="305" y="132" text-anchor="middle" font-size="13" fill="#166534">分红和回购必须</text>
    <text x="305" y="148" text-anchor="middle" font-size="13" fill="#166534">由自由现金流支撑</text>

    <rect x="415" y="78" width="160" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="495" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">前提C</text>
    <text x="495" y="132" text-anchor="middle" font-size="13" fill="#9a3412">资产负债表决定</text>
    <text x="495" y="148" text-anchor="middle" font-size="13" fill="#9a3412">能否扛住周期</text>

    <rect x="595" y="78" width="160" height="74" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
    <text x="675" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#831843">前提D</text>
    <text x="675" y="132" text-anchor="middle" font-size="13" fill="#9d174d">价格决定</text>
    <text x="675" y="148" text-anchor="middle" font-size="13" fill="#9d174d">安全边际</text>
  </g>

  <path d="M125 152 L125 193 L305 193" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M305 152 L305 193" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M495 152 L495 193" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M675 152 L675 193 L495 193" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="160" y="200" width="480" height="74" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">推导</text>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">因为现金流能覆盖回报，且负债不会反噬，所以低估值才可能是机会</text>

  <path d="M400 274 L400 315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="150" y="318" width="500" height="58" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">行动结论</text>
  <text x="400" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">不因低PE或高股息直接买，先用现金流、分红、回购、负债四项打分</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
