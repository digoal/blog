<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">价值股估值情景分支</title>
  <desc id="desc">展示现金流、分红、回购和负债前提变化后，对应不同操作。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提一变，价值股结论就要切换</text>

  <rect x="270" y="70" width="260" height="58" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">候选价值股</text>
  <text x="400" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">低PE、高股息或大回购只是入口</text>

  <path d="M400 128 L400 158" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="245" y="160" width="310" height="54" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#075985">四项验证</text>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0369a1">自由现金流 / 分红 / 回购 / 资产负债表</text>

  <path d="M400 214 C190 225 120 245 110 270" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 214 C325 235 285 248 280 270" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 214 C475 235 515 248 520 270" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 214 C610 225 680 245 690 270" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif">
    <rect x="35" y="272" width="170" height="102" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="120" y="299" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">全部通过</text>
    <text x="120" y="322" text-anchor="middle" font-size="13" fill="#166534">现金流覆盖回报</text>
    <text x="120" y="340" text-anchor="middle" font-size="13" fill="#166534">负债压力可控</text>
    <text x="120" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">小仓观察或买入</text>

    <rect x="225" y="272" width="170" height="102" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="310" y="299" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">分红吃老本</text>
    <text x="310" y="322" text-anchor="middle" font-size="13" fill="#92400e">派息高于现金流</text>
    <text x="310" y="340" text-anchor="middle" font-size="13" fill="#92400e">还靠举债维持</text>
    <text x="310" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">先不买</text>

    <rect x="415" y="272" width="170" height="102" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="500" y="299" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">回购无效</text>
    <text x="500" y="322" text-anchor="middle" font-size="13" fill="#991b1b">高价回购</text>
    <text x="500" y="340" text-anchor="middle" font-size="13" fill="#991b1b">股数没有下降</text>
    <text x="500" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">降低估值分</text>

    <rect x="605" y="272" width="170" height="102" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="690" y="299" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">负债压顶</text>
    <text x="690" y="322" text-anchor="middle" font-size="13" fill="#5b21b6">利息和到期债</text>
    <text x="690" y="340" text-anchor="middle" font-size="13" fill="#5b21b6">吞掉现金流</text>
    <text x="690" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">避开或减仓</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
