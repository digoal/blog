<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#17202a">科技股六格研究框架</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#566573">先看技术如何变成客户使用，再看使用如何变成现金流</text>

  <rect x="60" y="105" width="200" height="90" rx="8" fill="#e8f3ff" stroke="#2e86c1" stroke-width="2"/>
  <text x="160" y="136" text-anchor="middle" font-size="20" font-weight="700" fill="#1b4f72">产品</text>
  <text x="160" y="165" text-anchor="middle" font-size="14" fill="#1b4f72">解决真实痛点</text>

  <rect x="300" y="105" width="200" height="90" rx="8" fill="#eafaf1" stroke="#239b56" stroke-width="2"/>
  <text x="400" y="136" text-anchor="middle" font-size="20" font-weight="700" fill="#145a32">生态</text>
  <text x="400" y="165" text-anchor="middle" font-size="14" fill="#145a32">用户、开发者、伙伴留在里面</text>

  <rect x="540" y="105" width="200" height="90" rx="8" fill="#fff4e6" stroke="#d68910" stroke-width="2"/>
  <text x="640" y="136" text-anchor="middle" font-size="20" font-weight="700" fill="#7d5109">云</text>
  <text x="640" y="165" text-anchor="middle" font-size="14" fill="#7d5109">按使用量或席位收钱</text>

  <rect x="60" y="235" width="200" height="90" rx="8" fill="#f4ecf7" stroke="#884ea0" stroke-width="2"/>
  <text x="160" y="266" text-anchor="middle" font-size="20" font-weight="700" fill="#512e5f">AI</text>
  <text x="160" y="295" text-anchor="middle" font-size="14" fill="#512e5f">提高收入或降低成本</text>

  <rect x="300" y="235" width="200" height="90" rx="8" fill="#fdebd0" stroke="#ca6f1e" stroke-width="2"/>
  <text x="400" y="266" text-anchor="middle" font-size="20" font-weight="700" fill="#784212">算力</text>
  <text x="400" y="295" text-anchor="middle" font-size="14" fill="#784212">供给、成本、毛利率</text>

  <rect x="540" y="235" width="200" height="90" rx="8" fill="#eaecee" stroke="#566573" stroke-width="2"/>
  <text x="640" y="266" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">订阅收入</text>
  <text x="640" y="295" text-anchor="middle" font-size="14" fill="#2c3e50">续费、提价、留存</text>

  <path d="M260 150 H300" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 150 H540" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M260 280 H300" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 280 H540" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="348" width="340" height="36" rx="8" fill="#17202a"/>
  <text x="400" y="371" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">六格全过关，才进入个股候选池</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5d6d7e"/>
    </marker>
  </defs>
</svg>
