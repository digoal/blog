<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#17202a">论证链：从技术叙事到现金流验证</text>

  <rect x="35" y="90" width="145" height="100" rx="8" fill="#e8f3ff" stroke="#2e86c1" stroke-width="2"/>
  <text x="107" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#1b4f72">前提A</text>
  <text x="107" y="155" text-anchor="middle" font-size="13" fill="#1b4f72">技术趋势真实</text>
  <text x="107" y="175" text-anchor="middle" font-size="13" fill="#1b4f72">但赢家不确定</text>

  <rect x="215" y="90" width="145" height="100" rx="8" fill="#eafaf1" stroke="#239b56" stroke-width="2"/>
  <text x="287" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#145a32">前提B</text>
  <text x="287" y="155" text-anchor="middle" font-size="13" fill="#145a32">产品和生态</text>
  <text x="287" y="175" text-anchor="middle" font-size="13" fill="#145a32">决定商业化</text>

  <rect x="395" y="90" width="145" height="100" rx="8" fill="#fff4e6" stroke="#d68910" stroke-width="2"/>
  <text x="467" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#7d5109">前提C</text>
  <text x="467" y="155" text-anchor="middle" font-size="13" fill="#7d5109">云和算力</text>
  <text x="467" y="175" text-anchor="middle" font-size="13" fill="#7d5109">既增收也耗钱</text>

  <rect x="575" y="90" width="145" height="100" rx="8" fill="#f4ecf7" stroke="#884ea0" stroke-width="2"/>
  <text x="647" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#512e5f">前提D</text>
  <text x="647" y="155" text-anchor="middle" font-size="13" fill="#512e5f">估值先定价</text>
  <text x="647" y="175" text-anchor="middle" font-size="13" fill="#512e5f">未来兑现风险</text>

  <path d="M180 140 H215" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M360 140 H395" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540 140 H575" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="150" y="250" width="500" height="72" rx="10" fill="#17202a"/>
  <text x="400" y="282" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">结论</text>
  <text x="400" y="309" text-anchor="middle" font-size="15" fill="#ffffff">科技股只在六格验证通过、估值合理、仓位受控时进入组合</text>

  <path d="M647 190 C647 232 600 250 540 250" fill="none" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M107 190 C107 232 160 250 220 250" fill="none" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5d6d7e"/>
    </marker>
  </defs>
</svg>
