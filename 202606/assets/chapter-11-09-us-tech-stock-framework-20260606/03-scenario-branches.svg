<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f7f9fb"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#17202a">前提变化后的操作分支</text>

  <rect x="300" y="70" width="200" height="58" rx="8" fill="#17202a"/>
  <text x="400" y="105" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">科技股候选公司</text>

  <path d="M400 128 V158" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="240" y="158" width="320" height="58" rx="8" fill="#e8f3ff" stroke="#2e86c1" stroke-width="2"/>
  <text x="400" y="194" text-anchor="middle" font-size="16" font-weight="700" fill="#1b4f72">六格验证：产品、生态、云、AI、算力、订阅</text>

  <path d="M240 187 C150 190 105 225 105 260" fill="none" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="260" width="210" height="90" rx="8" fill="#eafaf1" stroke="#239b56" stroke-width="2"/>
  <text x="145" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#145a32">全部通过</text>
  <text x="145" y="319" text-anchor="middle" font-size="13" fill="#145a32">小仓位试错</text>
  <text x="145" y="338" text-anchor="middle" font-size="13" fill="#145a32">写清失效条件</text>

  <path d="M400 216 V260" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="260" width="220" height="90" rx="8" fill="#fff4e6" stroke="#d68910" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#7d5109">三格不清楚</text>
  <text x="400" y="319" text-anchor="middle" font-size="13" fill="#7d5109">放进观察名单</text>
  <text x="400" y="338" text-anchor="middle" font-size="13" fill="#7d5109">等财报验证</text>

  <path d="M560 187 C650 190 695 225 695 260" fill="none" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="260" width="210" height="90" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="665" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#922b21">概念热、现金流弱</text>
  <text x="665" y="319" text-anchor="middle" font-size="13" fill="#922b21">不追高</text>
  <text x="665" y="338" text-anchor="middle" font-size="13" fill="#922b21">用ETF替代或放弃</text>

  <text x="400" y="390" text-anchor="middle" font-size="14" fill="#566573">核心规则：没有现金流验证的技术叙事，不配拿重仓待遇</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5d6d7e"/>
    </marker>
  </defs>
</svg>
