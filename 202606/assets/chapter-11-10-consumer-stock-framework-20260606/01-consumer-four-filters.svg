<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">消费股研究的四个过滤器</text>
  <text x="400" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">不是“我喜欢这个品牌”，而是“它能不能把消费者习惯转成现金流”</text>

  <rect x="58" y="116" width="160" height="104" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="138" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">品牌</text>
  <text x="138" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">消费者愿意先想到你</text>
  <text x="138" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">也愿意为你多付一点</text>

  <rect x="58" y="268" width="160" height="104" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="138" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0e7490">渠道</text>
  <text x="138" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">货能稳定到达用户</text>
  <text x="138" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">线上线下成本可控</text>

  <rect x="582" y="116" width="160" height="104" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="662" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">复购</text>
  <text x="662" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">用户反复买、主动回头</text>
  <text x="662" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">收入更可预测</text>

  <rect x="582" y="268" width="160" height="104" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="662" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c2410c">提价能力</text>
  <text x="662" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">涨价后销量不明显崩</text>
  <text x="662" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">毛利率能守住</text>

  <rect x="306" y="173" width="188" height="120" rx="10" fill="#ffffff" stroke="#111827" stroke-width="2.5"/>
  <text x="400" y="209" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">现金流结果</text>
  <text x="400" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">收入能增长</text>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">利润率能稳定</text>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">库存和营销不过度透支</text>

  <path d="M226 168 H296" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M226 320 C260 320 268 270 296 253" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M574 168 H504" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M574 320 C540 320 532 270 504 253" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">四个过滤器同时过关，消费股才值得进入估值和仓位讨论</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
