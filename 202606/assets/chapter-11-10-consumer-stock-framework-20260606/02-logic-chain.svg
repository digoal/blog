<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从消费事实推出研究结论</text>

  <rect x="36" y="88" width="176" height="96" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="124" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="124" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">消费需求反复发生</text>
  <text x="124" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">但品牌选择会变化</text>

  <rect x="36" y="242" width="176" height="96" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="124" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">前提B</text>
  <text x="124" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">好生意必须抵抗成本</text>
  <text x="124" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">和渠道变化</text>

  <path d="M224 136 H300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M224 290 H300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="310" y="127" width="180" height="176" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">逻辑推导</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为用户会重复消费</text>
  <text x="400" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以复购决定收入稳定性</text>
  <text x="400" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为成本和渠道会波动</text>
  <text x="400" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以品牌和提价决定利润韧性</text>

  <path d="M500 215 H578" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="590" y="86" width="174" height="256" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="677" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">结论</text>
  <text x="677" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">消费股先看四件事</text>
  <text x="677" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">品牌、渠道、复购</text>
  <text x="677" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">提价能力</text>
  <line x1="626" y1="232" x2="728" y2="232" stroke="#e2e8f0" stroke-width="2"/>
  <text x="677" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">四项能落到现金流</text>
  <text x="677" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">才进入估值讨论</text>
  <text x="677" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">否则只是故事</text>

  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">研究顺序 = 先验证消费飞轮，再看估值，再定仓位</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
