<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">消费股情景分支: 四项指标如何改变操作</text>

  <rect x="286" y="80" width="228" height="70" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">研究一只消费股</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">先验证四个前提是否成立</text>

  <path d="M400 150 V186" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="286" y="192" width="228" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">四项同时过关</text>
  <text x="400" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">品牌强、渠道稳、复购高、能提价</text>

  <path d="M286 227 H118 V286" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 262 V306" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M514 227 H682 V286" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="48" y="292" width="190" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="143" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">正常情景</text>
  <text x="143" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">估值合理、仓位不超标</text>
  <text x="143" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">进入观察或小仓位</text>

  <rect x="305" y="312" width="190" height="92" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">估值太贵</text>
  <text x="400" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">好公司不等于好价格</text>
  <text x="400" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">等待或只做观察仓</text>

  <rect x="562" y="292" width="190" height="92" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">前提破坏</text>
  <text x="657" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">渠道断、复购降、提价失效</text>
  <text x="657" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">减仓或退出</text>

  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">核心纪律: 消费股可以长期跟踪，但不能用“品牌熟悉”替代证据</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
