<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">医药股研究的四道门</text>
  <text x="400" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">药能不能上市、能卖多久、卖多少、失去保护后会怎样</text>

  <rect x="52" y="118" width="154" height="170" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="129" cy="150" r="22" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="129" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">1</text>
  <text x="129" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">管线</text>
  <text x="129" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">候选药像种子</text>
  <text x="129" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">早期多不等于收成多</text>

  <rect x="232" y="118" width="154" height="170" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <circle cx="309" cy="150" r="22" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="309" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0e7490">2</text>
  <text x="309" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0e7490">FDA审批</text>
  <text x="309" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">临床数据进考场</text>
  <text x="309" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">没过关就不能卖</text>

  <rect x="412" y="118" width="154" height="170" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <circle cx="489" cy="150" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="489" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">3</text>
  <text x="489" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">专利</text>
  <text x="489" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">保护期像收费站</text>
  <text x="489" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">到期后仿制药进场</text>

  <rect x="592" y="118" width="154" height="170" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="669" cy="150" r="22" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="669" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">4</text>
  <text x="669" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#b91c1c">单品依赖</text>
  <text x="669" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">一棵树撑起收入</text>
  <text x="669" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">风一来组合就晃</text>

  <path d="M206 203 H226" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M386 203 H406" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M566 203 H586" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="332" width="560" height="46" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">四道门都说得清，再看估值和仓位；说不清，就先不买</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
