<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从医药股事实推出操作结论</text>

  <rect x="36" y="82" width="180" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="126" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="126" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">药品需要审批</text>
  <text x="126" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">临床失败率高</text>

  <rect x="36" y="214" width="180" height="92" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="126" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">前提B</text>
  <text x="126" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">上市后受专利保护</text>
  <text x="126" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">保护会到期</text>

  <rect x="36" y="346" width="180" height="72" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="126" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">前提C</text>
  <text x="126" y="399" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">收入可能集中在单品</text>

  <path d="M226 128 H292" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M226 260 H292" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M226 382 H292" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="306" y="136" width="202" height="190" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="407" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">逻辑推导</text>
  <text x="407" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为审批前不确定</text>
  <text x="407" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以管线不能按全成功估值</text>
  <text x="407" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为专利保护会结束</text>
  <text x="407" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以要看替代产品接不接得上</text>
  <text x="407" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为单品依赖放大波动</text>

  <path d="M518 232 H584" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="598" y="112" width="166" height="256" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="681" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">结论</text>
  <text x="681" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">医药股先看四件事</text>
  <text x="681" y="209" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">管线阶段</text>
  <text x="681" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">FDA节点</text>
  <text x="681" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">专利期限</text>
  <text x="681" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">单品占比</text>
  <line x1="630" y1="305" x2="732" y2="305" stroke="#e2e8f0" stroke-width="2"/>
  <text x="681" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">再决定估值和仓位</text>

  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">研究顺序 = 不把临床故事、专利窗口和收入集中风险混在一起</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
