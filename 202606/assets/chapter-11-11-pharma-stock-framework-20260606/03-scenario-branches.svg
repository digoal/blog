<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">医药股情景分支: 前提变了，操作也要变</text>

  <rect x="284" y="78" width="232" height="74" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">研究一只医药股</text>
  <text x="400" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">四道门决定它属于哪类风险</text>

  <path d="M400 152 V188" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="258" y="194" width="284" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">管线、审批、专利、收入结构都可验证</text>
  <text x="400" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">再进入估值和仓位讨论</text>

  <path d="M258 229 H110 V296" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 264 V306" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M542 229 H690 V296" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="42" y="302" width="216" height="96" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">正常情景</text>
  <text x="150" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">已上市产品有现金流</text>
  <text x="150" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">后续管线能接力</text>

  <rect x="292" y="312" width="216" height="96" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">审批或临床失败</text>
  <text x="400" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不把候选药当确定收入</text>
  <text x="400" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">停止加仓或降级观察</text>

  <rect x="542" y="302" width="216" height="96" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="650" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">专利悬崖或单品过重</text>
  <text x="650" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">增长产品接不上</text>
  <text x="650" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">控制仓位，重新估值</text>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">核心纪律: 医药股不是消息博弈，审批、专利和收入结构必须逐项复核</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
