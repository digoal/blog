<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">金融股四个仪表盘</title>
  <desc id="desc">展示利率、净息差、坏账和资本充足率如何共同影响银行股研究。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">银行股先看四个仪表盘</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#4b5563">不是普通消费股或科技股，而是“资金成本 + 信用风险 + 资本约束”的生意</text>

  <g transform="translate(52 118)">
    <rect x="0" y="0" width="152" height="186" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="76" cy="64" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <path d="M76 64 L104 44" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    <text x="76" y="136" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a8a">利率</text>
    <text x="76" y="162" text-anchor="middle" font-size="13" fill="#475569">资产收益</text>
    <text x="76" y="181" text-anchor="middle" font-size="13" fill="#475569">负债成本</text>
  </g>

  <g transform="translate(240 118)">
    <rect x="0" y="0" width="152" height="186" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="76" cy="64" r="42" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <path d="M76 64 L107 73" stroke="#15803d" stroke-width="5" stroke-linecap="round"/>
    <text x="76" y="136" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">净息差</text>
    <text x="76" y="162" text-anchor="middle" font-size="13" fill="#475569">贷款赚多少</text>
    <text x="76" y="181" text-anchor="middle" font-size="13" fill="#475569">存款花多少</text>
  </g>

  <g transform="translate(428 118)">
    <rect x="0" y="0" width="152" height="186" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <circle cx="76" cy="64" r="42" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
    <path d="M76 64 L48 82" stroke="#ea580c" stroke-width="5" stroke-linecap="round"/>
    <text x="76" y="136" text-anchor="middle" font-size="19" font-weight="700" fill="#9a3412">坏账</text>
    <text x="76" y="162" text-anchor="middle" font-size="13" fill="#475569">拨备</text>
    <text x="76" y="181" text-anchor="middle" font-size="13" fill="#475569">核销</text>
  </g>

  <g transform="translate(616 118)">
    <rect x="0" y="0" width="152" height="186" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
    <circle cx="76" cy="64" r="42" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <path d="M76 64 L68 30" stroke="#6d28d9" stroke-width="5" stroke-linecap="round"/>
    <text x="76" y="136" text-anchor="middle" font-size="19" font-weight="700" fill="#4c1d95">资本</text>
    <text x="76" y="162" text-anchor="middle" font-size="13" fill="#475569">CET1</text>
    <text x="76" y="181" text-anchor="middle" font-size="13" fill="#475569">杠杆率</text>
  </g>

  <path d="M206 211 H235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M394 211 H423" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M582 211 H611" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="94" y="338" width="612" height="34" rx="6" fill="#111827"/>
  <text x="400" y="361" text-anchor="middle" font-size="15" fill="#ffffff">行动顺序：先看利率和净息差，再看坏账是否吞利润，最后看资本能不能扛压力</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
