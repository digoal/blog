<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">金融股论证链</title>
  <desc id="desc">从利率重定价到净息差、坏账、资本和操作结论的因果路径。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">金融股的核心论证链</text>

  <g fill="#ffffff" stroke-width="2">
    <rect x="42" y="82" width="150" height="78" rx="8" stroke="#2563eb"/>
    <rect x="236" y="82" width="150" height="78" rx="8" stroke="#16a34a"/>
    <rect x="430" y="82" width="150" height="78" rx="8" stroke="#f97316"/>
    <rect x="624" y="82" width="134" height="78" rx="8" stroke="#7c3aed"/>
  </g>

  <text x="117" y="113" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A/B</text>
  <text x="117" y="139" text-anchor="middle" font-size="13" fill="#475569">利率重定价</text>
  <text x="311" y="113" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">推导1</text>
  <text x="311" y="139" text-anchor="middle" font-size="13" fill="#475569">净息差变化</text>
  <text x="505" y="113" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">推导2</text>
  <text x="505" y="139" text-anchor="middle" font-size="13" fill="#475569">坏账吞利润</text>
  <text x="691" y="113" text-anchor="middle" font-size="17" font-weight="700" fill="#4c1d95">推导3</text>
  <text x="691" y="139" text-anchor="middle" font-size="13" fill="#475569">资本定生死</text>

  <path d="M193 121 H232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M387 121 H426" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M581 121 H620" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g fill="#f1f5f9" stroke="#cbd5e1">
    <rect x="76" y="218" width="648" height="42" rx="8"/>
    <rect x="76" y="284" width="648" height="42" rx="8"/>
    <rect x="76" y="350" width="648" height="42" rx="8"/>
  </g>

  <text x="400" y="245" text-anchor="middle" font-size="15" fill="#111827">因为银行靠资产收益减负债成本赚钱，所以利率变化要拆成“贷款收益”和“存款成本”两边看</text>
  <text x="400" y="311" text-anchor="middle" font-size="15" fill="#111827">因为贷款会出坏账，所以净息差扩大不等于股东利润一定增加，必须扣掉拨备和核销</text>
  <text x="400" y="377" text-anchor="middle" font-size="15" fill="#111827">因为资本是最后缓冲，所以资本不足时，分红、回购和估值都要让位于生存</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
