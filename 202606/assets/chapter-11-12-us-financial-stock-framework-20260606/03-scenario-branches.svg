<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">金融股情景分支</title>
  <desc id="desc">展示利率、坏账和资本前提变化后的操作分支。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">前提变化后，操作结论要切换</text>

  <rect x="300" y="72" width="200" height="58" rx="8" fill="#111827"/>
  <text x="400" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">同一只银行股</text>

  <path d="M400 130 V168" stroke="#64748b" stroke-width="2"/>
  <path d="M150 168 H650" stroke="#64748b" stroke-width="2"/>
  <path d="M150 168 V205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 168 V205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M650 168 V205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="44" y="206" width="212" height="78" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">利率有利</text>
    <text x="150" y="262" text-anchor="middle" font-size="13" fill="#334155">资产收益快于资金成本</text>
    <rect x="44" y="310" width="212" height="62" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
    <text x="150" y="336" text-anchor="middle" font-size="14" fill="#111827">继续观察或小仓试错</text>
    <text x="150" y="357" text-anchor="middle" font-size="13" fill="#475569">仍要查坏账和资本</text>
  </g>

  <g>
    <rect x="294" y="206" width="212" height="78" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <text x="400" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">坏账恶化</text>
    <text x="400" y="262" text-anchor="middle" font-size="13" fill="#334155">拨备和核销吃掉利差</text>
    <rect x="294" y="310" width="212" height="62" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
    <text x="400" y="336" text-anchor="middle" font-size="14" fill="#111827">停止加仓</text>
    <text x="400" y="357" text-anchor="middle" font-size="13" fill="#475569">等信用数据转稳</text>
  </g>

  <g>
    <rect x="544" y="206" width="212" height="78" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="650" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">资本承压</text>
    <text x="650" y="262" text-anchor="middle" font-size="13" fill="#334155">接近监管要求或缓冲下降</text>
    <rect x="544" y="310" width="212" height="62" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="650" y="336" text-anchor="middle" font-size="14" fill="#111827">降级为风险股</text>
    <text x="650" y="357" text-anchor="middle" font-size="13" fill="#475569">分红回购不能当护城河</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
