<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827" font-weight="700">回购影响 EPS 的机械路径</text>
  <rect x="55" y="82" width="165" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="137.5" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">公司拿现金</text>
  <text x="137.5" y="146" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#1f2937">在市场买回股票</text>
  <path d="M225 128 L295 128" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="305" y="82" width="165" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="387.5" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#166534" font-weight="700">流通股数下降</text>
  <text x="387.5" y="146" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#1f2937">分母变小</text>
  <path d="M475 128 L545 128" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="555" y="82" width="165" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="637.5" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#92400e" font-weight="700">每股指标抬升</text>
  <text x="637.5" y="146" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#1f2937">EPS、每股现金流</text>
  <rect x="95" y="230" width="610" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="262" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#111827" font-weight="700">EPS = 净利润 ÷ 加权平均股数</text>
  <text x="400" y="292" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">净利润不变时，股数下降，EPS 会上升；但这只是“分母变化”，不是业务自动变好。</text>
  <text x="400" y="352" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">关键追问：钱够不够？买得贵不贵？股数真的降了吗？</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
