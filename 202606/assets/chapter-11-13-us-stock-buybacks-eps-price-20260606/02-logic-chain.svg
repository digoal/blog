<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#111827" font-weight="700">回购质量论证链</text>
  <rect x="40" y="70" width="155" height="96" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="117.5" y="99" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#0c4a6e" font-weight="700">前提A</text>
  <text x="117.5" y="126" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">EPS有分母</text>
  <text x="117.5" y="150" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">股数会影响每股结果</text>
  <rect x="225" y="70" width="155" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="302.5" y="99" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#166534" font-weight="700">前提B</text>
  <text x="302.5" y="126" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">回购消耗现金</text>
  <text x="302.5" y="150" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">现金来自自由现金流</text>
  <rect x="410" y="70" width="155" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="487.5" y="99" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#92400e" font-weight="700">前提C</text>
  <text x="487.5" y="126" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">价格决定效果</text>
  <text x="487.5" y="150" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">买贵会毁价值</text>
  <rect x="595" y="70" width="155" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="672.5" y="99" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">前提D</text>
  <text x="672.5" y="126" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">股权激励会稀释</text>
  <text x="672.5" y="150" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">公告额不等于股数降</text>
  <path d="M117 180 L117 220 L400 220" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M302 180 L302 220" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M488 180 L488 220" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M673 180 L673 220 L400 220" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M400 220 L400 252" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="145" y="260" width="510" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#111827" font-weight="700">因为回购会改变分母，也会消耗现金和资本配置机会</text>
  <text x="400" y="318" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">所以必须同时验证：股数下降、现金流覆盖、价格合理、稀释可控</text>
  <path d="M400 340 L400 366" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="180" y="372" width="440" height="44" rx="8" fill="#0f172a"/>
  <text x="400" y="400" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" font-weight="700">结论：回购是资本配置题，不是自动利好题</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
