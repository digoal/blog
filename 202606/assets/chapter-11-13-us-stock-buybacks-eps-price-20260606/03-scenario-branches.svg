<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#111827" font-weight="700">回购前提变化后的操作分支</text>
  <rect x="275" y="68" width="250" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="94" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#111827" font-weight="700">看到公司宣布回购</text>
  <text x="400" y="116" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#475569">先问三个问题，而不是先下单</text>
  <path d="M400 132 L400 165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="80" y="176" width="180" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="170" y="203" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#166534" font-weight="700">现金流充足</text>
  <text x="170" y="228" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">自由现金流覆盖</text>
  <text x="170" y="248" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">分红、回购和债务</text>
  <rect x="310" y="176" width="180" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="203" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#92400e" font-weight="700">价格合理</text>
  <text x="400" y="228" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">估值低于内在价值</text>
  <text x="400" y="248" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">不是追高托价</text>
  <rect x="540" y="176" width="180" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="630" y="203" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">股数真降</text>
  <text x="630" y="228" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">回购没有被期权</text>
  <text x="630" y="248" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">和增发抵消</text>
  <path d="M170 264 L170 318" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <path d="M400 264 L400 318" stroke="#d97706" stroke-width="3" marker-end="url(#arrowAmber)"/>
  <path d="M630 264 L630 318" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <rect x="55" y="326" width="210" height="58" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="351" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#14532d" font-weight="700">三项都成立</text>
  <text x="160" y="372" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">可进入观察或小仓</text>
  <rect x="295" y="326" width="210" height="58" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="351" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">任一项不成立</text>
  <text x="400" y="372" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">不把回购当买入理由</text>
  <rect x="535" y="326" width="210" height="58" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="351" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">现金流恶化或加债回购</text>
  <text x="640" y="372" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1f2937">已有持仓也要降风险</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
