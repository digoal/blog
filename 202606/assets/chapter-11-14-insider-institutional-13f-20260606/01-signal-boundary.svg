<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">三类披露信号的边界</text>
  <rect x="42" y="70" width="218" height="260" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="290" y="70" width="218" height="260" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="538" y="70" width="218" height="260" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="151" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2563eb">Form 4</text>
  <text x="399" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#059669">13F</text>
  <text x="647" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#d97706">13D / 13G</text>
  <text x="151" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">内部人持股变化</text>
  <text x="399" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">大机构季度持仓快照</text>
  <text x="647" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">超过5%的受益所有权</text>
  <line x1="62" y1="160" x2="240" y2="160" stroke="#e5e7eb"/>
  <line x1="310" y1="160" x2="488" y2="160" stroke="#e5e7eb"/>
  <line x1="558" y1="160" x2="736" y2="160" stroke="#e5e7eb"/>
  <text x="62" y="188" font-family="Arial, sans-serif" font-size="14" fill="#111827">能看:</text>
  <text x="310" y="188" font-family="Arial, sans-serif" font-size="14" fill="#111827">能看:</text>
  <text x="558" y="188" font-family="Arial, sans-serif" font-size="14" fill="#111827">能看:</text>
  <text x="62" y="212" font-family="Arial, sans-serif" font-size="13" fill="#374151">谁买卖、金额、交易码</text>
  <text x="310" y="212" font-family="Arial, sans-serif" font-size="13" fill="#374151">季度末持有哪些多头</text>
  <text x="558" y="212" font-family="Arial, sans-serif" font-size="13" fill="#374151">大股东是否被动或主动</text>
  <text x="62" y="242" font-family="Arial, sans-serif" font-size="14" fill="#111827">不能看:</text>
  <text x="310" y="242" font-family="Arial, sans-serif" font-size="14" fill="#111827">不能看:</text>
  <text x="558" y="242" font-family="Arial, sans-serif" font-size="14" fill="#111827">不能看:</text>
  <text x="62" y="266" font-family="Arial, sans-serif" font-size="13" fill="#374151">真实动机、完整薪酬安排</text>
  <text x="310" y="266" font-family="Arial, sans-serif" font-size="13" fill="#374151">空头、现金、盘中调仓</text>
  <text x="558" y="266" font-family="Arial, sans-serif" font-size="13" fill="#374151">买入价格与未来收益</text>
  <text x="151" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">快，但噪音多</text>
  <text x="399" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">标准，但滞后</text>
  <text x="647" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">重要，但样本少</text>
  <rect x="112" y="350" width="576" height="32" rx="6" fill="#111827"/>
  <text x="400" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">结论: 信号只负责提醒你复核，不负责替你下单</text>
</svg>
