<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">论证链: 信号到决策必须过三道门</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="36" y="84" width="158" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="36" y="206" width="158" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <rect x="36" y="328" width="158" height="42" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="115" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937">前提A</text>
  <text x="115" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">披露不是内幕消息</text>
  <text x="115" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">只是公开线索</text>
  <text x="115" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937">前提B</text>
  <text x="115" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">披露有延迟和盲区</text>
  <text x="115" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">看不到全貌</text>
  <text x="115" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937">前提C: 股价只认基本面</text>
  <line x1="210" y1="126" x2="310" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="210" y1="250" x2="310" y2="184" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="210" y1="350" x2="310" y2="207" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="130" width="180" height="96" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="400" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">逻辑推导</text>
  <text x="400" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">因为信号有价值但不完整</text>
  <text x="400" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">所以必须先过滤再验证</text>
  <line x1="505" y1="178" x2="592" y2="178" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="592" y="102" width="170" height="154" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="677" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">操作结论</text>
  <text x="677" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">信号=复核入口</text>
  <text x="677" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">财报=核心证据</text>
  <text x="677" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">估值=价格约束</text>
  <text x="677" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">仓位=风险上限</text>
  <rect x="310" y="292" width="452" height="54" rx="8" fill="#111827"/>
  <text x="536" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">一句话</text>
  <text x="536" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">看到聪明钱，不等于你也能用同样价格和同样期限赚钱</text>
</svg>
