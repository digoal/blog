<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f9fafb"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">看到披露信号后的实操决策树</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="326" y="66" width="148" height="42" rx="8" fill="#111827"/>
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">发现信号</text>
  <line x1="400" y1="108" x2="400" y2="142" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="282" y="142" width="236" height="54" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">第一问: 信号质量够不够?</text>
  <text x="400" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">金额、身份、代码、时间、是否10b5-1</text>
  <line x1="282" y1="170" x2="152" y2="170" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="518" y1="170" x2="648" y2="170" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="38" y="142" width="150" height="54" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="113" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b">低质量</text>
  <text x="113" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">只记录，不交易</text>
  <rect x="612" y="142" width="150" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="687" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">高质量</text>
  <text x="687" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">进入复核</text>
  <line x1="687" y1="196" x2="687" y2="238" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="572" y="238" width="230" height="62" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="687" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">第二问: 基本面是否同向?</text>
  <text x="687" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">财报、现金流、估值、竞争格局</text>
  <line x1="572" y1="269" x2="424" y2="269" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="687" y1="300" x2="687" y2="338" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="250" y="238" width="170" height="62" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="335" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#92400e">不同向</text>
  <text x="335" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">保留观察，等下一季</text>
  <rect x="572" y="338" width="230" height="44" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="687" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#065f46">同向: 小仓位试错，并写失效条件</text>
  <rect x="38" y="238" width="170" height="94" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="123" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">红线</text>
  <text x="123" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">不因单条信号满仓</text>
  <text x="123" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">不复制机构组合</text>
</svg>
