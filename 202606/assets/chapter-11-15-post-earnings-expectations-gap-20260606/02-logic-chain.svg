<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链：财报后大涨大跌为什么由预期差驱动</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="45" y="84" width="160" height="82" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="125" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">前提A</text>
  <text x="125" y="137" text-anchor="middle" font-size="14" fill="#0f172a">财报前已有</text>
  <text x="125" y="157" text-anchor="middle" font-size="14" fill="#0f172a">市场预期</text>
  <rect x="235" y="84" width="160" height="82" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="315" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">前提B</text>
  <text x="315" y="137" text-anchor="middle" font-size="14" fill="#0f172a">股价反映未来</text>
  <text x="315" y="157" text-anchor="middle" font-size="14" fill="#0f172a">不是只反映当季</text>
  <rect x="425" y="84" width="160" height="82" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="505" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">前提C</text>
  <text x="505" y="137" text-anchor="middle" font-size="14" fill="#0f172a">Guidance会改变</text>
  <text x="505" y="157" text-anchor="middle" font-size="14" fill="#0f172a">未来剧本</text>
  <rect x="615" y="84" width="140" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">前提D</text>
  <text x="685" y="137" text-anchor="middle" font-size="14" fill="#0f172a">小白不能稳定</text>
  <text x="685" y="157" text-anchor="middle" font-size="14" fill="#0f172a">押财报</text>
  <line x1="205" y1="125" x2="235" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="395" y1="125" x2="425" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="585" y1="125" x2="615" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="130" y="220" width="540" height="72" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="248" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="274" text-anchor="middle" font-size="15" fill="#334155">因为市场先定价，所以财报后的涨跌取决于结果与预期的差距</text>
  <line x1="400" y1="292" x2="400" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="130" y="330" width="540" height="64" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="356" text-anchor="middle" font-size="18" font-weight="700" fill="#065f46">结论</text>
  <text x="400" y="380" text-anchor="middle" font-size="15" fill="#0f172a">财报后先做三问：差在哪、影响多久、估值是否已反映</text>
</svg>
