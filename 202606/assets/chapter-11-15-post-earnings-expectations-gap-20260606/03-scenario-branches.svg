<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">财报后四种情景与操作</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="285" y="76" width="230" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">财报公布后</text>
  <text x="400" y="122" text-anchor="middle" font-size="14" fill="#475569">先比较实际结果与市场剧本</text>
  <line x1="400" y1="134" x2="400" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="270" y="168" width="260" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="201" text-anchor="middle" font-size="16" font-weight="700" fill="#312e81">EPS + Revenue + Guidance 三问</text>
  <line x1="400" y1="222" x2="145" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="222" x2="315" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="222" x2="485" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="222" x2="655" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="45" y="260" width="190" height="134" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">全面超预期</text>
  <text x="140" y="318" text-anchor="middle" font-size="13" fill="#0f172a">业绩好</text>
  <text x="140" y="338" text-anchor="middle" font-size="13" fill="#0f172a">未来指引也上调</text>
  <text x="140" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">操作：小仓验证加仓</text>
  <rect x="250" y="260" width="190" height="134" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="345" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#854d0e">当季好但指引弱</text>
  <text x="345" y="318" text-anchor="middle" font-size="13" fill="#0f172a">过去交卷不错</text>
  <text x="345" y="338" text-anchor="middle" font-size="13" fill="#0f172a">未来剧本下修</text>
  <text x="345" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">操作：暂停加仓</text>
  <rect x="455" y="260" width="190" height="134" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">全面低于预期</text>
  <text x="550" y="318" text-anchor="middle" font-size="13" fill="#0f172a">业绩差</text>
  <text x="550" y="338" text-anchor="middle" font-size="13" fill="#0f172a">指引也差</text>
  <text x="550" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">操作：降级或退出</text>
  <rect x="660" y="260" width="100" height="134" rx="8" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <text x="710" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">符合预期</text>
  <text x="710" y="318" text-anchor="middle" font-size="12" fill="#0f172a">反应小</text>
  <text x="710" y="338" text-anchor="middle" font-size="12" fill="#0f172a">看估值</text>
  <text x="710" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">操作：复盘</text>
  <rect x="170" y="414" width="460" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="436" text-anchor="middle" font-size="14" fill="#334155">关键纪律：先解释差距，再做动作；不在盘后波动里情绪下单</text>
</svg>
