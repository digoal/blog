<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f7fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">个股买入前的四道门</text>
  <line x1="90" y1="205" x2="710" y2="205" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="710,205 690,193 690,217" fill="#94a3b8"/>

  <g>
    <rect x="55" y="95" width="140" height="120" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="125" cy="95" r="22" fill="#2563eb"/>
    <text x="125" y="103" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="125" y="135" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2937">好公司</text>
    <text x="125" y="165" text-anchor="middle" font-size="14" fill="#475569">财报能证明</text>
    <text x="125" y="188" text-anchor="middle" font-size="14" fill="#475569">竞争力仍在</text>
  </g>

  <g>
    <rect x="235" y="95" width="140" height="120" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <circle cx="305" cy="95" r="22" fill="#059669"/>
    <text x="305" y="103" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="305" y="135" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2937">合理价格</text>
    <text x="305" y="165" text-anchor="middle" font-size="14" fill="#475569">预期收益</text>
    <text x="305" y="188" text-anchor="middle" font-size="14" fill="#475569">覆盖风险</text>
  </g>

  <g>
    <rect x="415" y="95" width="140" height="120" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <circle cx="485" cy="95" r="22" fill="#d97706"/>
    <text x="485" y="103" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="485" y="135" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2937">明确仓位</text>
    <text x="485" y="165" text-anchor="middle" font-size="14" fill="#475569">亏错一笔</text>
    <text x="485" y="188" text-anchor="middle" font-size="14" fill="#475569">不伤组合</text>
  </g>

  <g>
    <rect x="595" y="95" width="140" height="120" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <circle cx="665" cy="95" r="22" fill="#dc2626"/>
    <text x="665" y="103" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="665" y="135" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2937">失效条件</text>
    <text x="665" y="165" text-anchor="middle" font-size="14" fill="#475569">错了知道</text>
    <text x="665" y="188" text-anchor="middle" font-size="14" fill="#475569">何时退出</text>
  </g>

  <rect x="210" y="285" width="380" height="58" rx="8" fill="#111827"/>
  <text x="400" y="320" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">四道门全过，才允许小仓试买</text>
</svg>
