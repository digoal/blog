<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">买入框架的因果链</text>

  <g fill="#eef2ff" stroke="#4f46e5" stroke-width="2">
    <rect x="40" y="80" width="155" height="86" rx="8"/>
    <rect x="220" y="80" width="155" height="86" rx="8"/>
    <rect x="400" y="80" width="155" height="86" rx="8"/>
    <rect x="580" y="80" width="155" height="86" rx="8"/>
  </g>
  <g font-size="15" fill="#1f2937">
    <text x="117" y="114" text-anchor="middle" font-weight="700">个股收益偏态</text>
    <text x="117" y="141" text-anchor="middle">少数股票创造大部分财富</text>
    <text x="297" y="114" text-anchor="middle" font-weight="700">好公司会变</text>
    <text x="297" y="141" text-anchor="middle">财报和竞争格局要复核</text>
    <text x="477" y="114" text-anchor="middle" font-weight="700">好公司也怕贵</text>
    <text x="477" y="141" text-anchor="middle">价格提前透支收益</text>
    <text x="657" y="114" text-anchor="middle" font-weight="700">仓位放大错误</text>
    <text x="657" y="141" text-anchor="middle">研究错不能伤组合</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none">
    <path d="M118 166 L118 215 L295 215"/>
    <path d="M298 166 L298 215"/>
    <path d="M478 166 L478 215 L305 215"/>
    <path d="M658 166 L658 215 L305 215"/>
  </g>
  <polygon points="305,215 290,206 290,224" fill="#64748b"/>

  <rect x="245" y="190" width="310" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">所以买入不是看一个优点</text>
  <text x="400" y="246" text-anchor="middle" font-size="15" fill="#475569">而是四个前提同时成立</text>

  <line x1="400" y1="260" x2="400" y2="315" stroke="#64748b" stroke-width="2"/>
  <polygon points="400,318 390,302 410,302" fill="#64748b"/>

  <rect x="145" y="315" width="510" height="58" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="350" text-anchor="middle" font-size="20" font-weight="700" fill="#064e3b">好公司 + 合理价格 + 明确仓位 + 失效条件 = 可执行买入</text>
</svg>
