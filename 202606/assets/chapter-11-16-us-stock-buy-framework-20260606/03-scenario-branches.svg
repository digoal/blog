<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">前提变化后的操作切换</text>

  <rect x="285" y="70" width="230" height="64" rx="8" fill="#111827"/>
  <text x="400" y="108" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">买入计划正在执行</text>

  <line x1="400" y1="134" x2="400" y2="175" stroke="#64748b" stroke-width="2"/>
  <line x1="130" y1="175" x2="670" y2="175" stroke="#64748b" stroke-width="2"/>
  <line x1="130" y1="175" x2="130" y2="210" stroke="#64748b" stroke-width="2"/>
  <line x1="310" y1="175" x2="310" y2="210" stroke="#64748b" stroke-width="2"/>
  <line x1="490" y1="175" x2="490" y2="210" stroke="#64748b" stroke-width="2"/>
  <line x1="670" y1="175" x2="670" y2="210" stroke="#64748b" stroke-width="2"/>

  <g>
    <rect x="45" y="210" width="170" height="125" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="130" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">公司前提变坏</text>
    <text x="130" y="270" text-anchor="middle" font-size="14" fill="#475569">收入、利润、现金流</text>
    <text x="130" y="292" text-anchor="middle" font-size="14" fill="#475569">连续低于计划</text>
    <text x="130" y="321" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">停止加仓或退出</text>
  </g>

  <g>
    <rect x="225" y="210" width="170" height="125" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <text x="310" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">价格前提变贵</text>
    <text x="310" y="270" text-anchor="middle" font-size="14" fill="#475569">预期收益无法</text>
    <text x="310" y="292" text-anchor="middle" font-size="14" fill="#475569">覆盖业务风险</text>
    <text x="310" y="321" text-anchor="middle" font-size="15" font-weight="700" fill="#059669">等待或只留观察</text>
  </g>

  <g>
    <rect x="405" y="210" width="170" height="125" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="490" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">仓位前提失控</text>
    <text x="490" y="270" text-anchor="middle" font-size="14" fill="#475569">单股超过上限</text>
    <text x="490" y="292" text-anchor="middle" font-size="14" fill="#475569">影响组合安全</text>
    <text x="490" y="321" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706">减回规则仓位</text>
  </g>

  <g>
    <rect x="585" y="210" width="170" height="125" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="670" y="240" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">失效条件触发</text>
    <text x="670" y="270" text-anchor="middle" font-size="14" fill="#475569">买入理由已经</text>
    <text x="670" y="292" text-anchor="middle" font-size="14" fill="#475569">被事实证伪</text>
    <text x="670" y="321" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">先执行再复盘</text>
  </g>

  <rect x="145" y="370" width="510" height="42" rx="8" fill="#e2e8f0"/>
  <text x="400" y="397" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">买入计划的价值，不是保证赚钱，而是让错误有边界</text>
</svg>
