<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">个股卖出的四个触发器</text>

  <rect x="54" y="88" width="300" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="204" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">基本面变坏</text>
  <text x="204" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">买入理由对应的数据失效</text>
  <text x="204" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">收入、利润、现金流、指引转弱</text>

  <rect x="446" y="88" width="300" height="110" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="596" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">估值透支</text>
  <text x="596" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">好公司价格提前吃掉收益</text>
  <text x="596" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">PE、PS、FCF收益率不再补偿风险</text>

  <rect x="54" y="246" width="300" height="110" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="204" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0e7490">竞争格局变化</text>
  <text x="204" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">护城河被新对手或新规则削弱</text>
  <text x="204" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">份额、价格权、用户留存下降</text>

  <rect x="446" y="246" width="300" height="110" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="596" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">仓位过重</text>
  <text x="596" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">单票涨成组合主导风险</text>
  <text x="596" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">卖出是再平衡，不是看空公司</text>

  <line x1="400" y1="72" x2="400" y2="376" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="32" y1="222" x2="768" y2="222" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">先判断触发器，再决定清仓、减仓、停止加仓或再平衡</text>
</svg>
