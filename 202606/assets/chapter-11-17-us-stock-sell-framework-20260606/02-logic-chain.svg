<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从买入理由推出卖出动作</text>

  <rect x="34" y="84" width="180" height="94" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="124" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="124" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">买入理由包含</text>
  <text x="124" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">事实、价格、仓位</text>

  <rect x="34" y="216" width="180" height="94" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="124" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">前提B</text>
  <text x="124" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">事实和价格</text>
  <text x="124" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">会随时间改变</text>

  <path d="M224 131 H300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M224 263 H300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="312" y="104" width="190" height="206" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="407" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">逻辑推导</text>
  <text x="407" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为买入理由失效</text>
  <text x="407" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以持有理由同步失效</text>
  <text x="407" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为价格透支回报</text>
  <text x="407" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以要把预期收益落袋</text>
  <text x="407" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为仓位改变风险</text>

  <path d="M512 207 H586" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="596" y="82" width="168" height="270" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="680" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">卖出结论</text>
  <text x="680" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">基本面破坏</text>
  <text x="680" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">清仓或降为观察仓</text>
  <line x1="628" y1="202" x2="732" y2="202" stroke="#e2e8f0" stroke-width="2"/>
  <text x="680" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">估值透支</text>
  <text x="680" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">分批减仓</text>
  <line x1="628" y1="276" x2="732" y2="276" stroke="#e2e8f0" stroke-width="2"/>
  <text x="680" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">仓位过重</text>
  <text x="680" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">再平衡到上限内</text>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">卖出不是预测顶部，而是把变化后的事实重新映射成动作</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
