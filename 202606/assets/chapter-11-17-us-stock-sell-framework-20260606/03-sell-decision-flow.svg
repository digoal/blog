<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">卖出决策流程</text>

  <rect x="330" y="72" width="140" height="54" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">持仓复核</text>

  <path d="M400 126 V164" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="166" width="260" height="58" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0e7490">买入理由是否失效</text>
  <text x="400" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">基本面或竞争格局破坏</text>

  <path d="M270 195 H130 V270" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="180" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#b91c1c">是</text>
  <rect x="60" y="272" width="200" height="76" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">退出或降为观察仓</text>
  <text x="160" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不要用亏损幅度替代理由</text>

  <path d="M530 195 H660 V270" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="575" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#15803d">否</text>
  <rect x="560" y="272" width="200" height="76" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">看估值和仓位</text>
  <text x="660" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">透支则减仓，超限则再平衡</text>

  <path d="M260 310 H560" stroke="#64748b" stroke-width="2"/>
  <path d="M400 310 V374" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="376" width="280" height="54" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">写入复盘表，下次财报再验证</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
