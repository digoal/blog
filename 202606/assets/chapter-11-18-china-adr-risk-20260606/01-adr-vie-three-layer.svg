<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">中概ADR不是“美股公司”，而是三层连接</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">美元交易只解决买卖入口，不能消除经营地、结构和监管风险</text>

  <rect x="50" y="112" width="180" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">美国账户</text>
  <text x="140" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">买到ADR / ADS</text>
  <text x="140" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">美元报价、美国交易所交易</text>

  <path d="M230 158 H302" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="315" y="96" width="180" height="124" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="405" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0e7490">境外控股公司</text>
  <text x="405" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">常见为开曼等地公司</text>
  <text x="405" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">发行股票或存托凭证</text>
  <text x="405" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">承担SEC披露义务</text>

  <path d="M495 158 H568" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="580" y="112" width="170" height="92" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="665" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">中国经营实体</text>
  <text x="665" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">用户、牌照、数据、员工</text>
  <text x="665" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">受中国法律和监管约束</text>

  <path d="M405 220 V262" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="250" y="270" width="310" height="88" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="405" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#c2410c">VIE合同安排</text>
  <text x="405" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">用合同获得经济利益和会计并表</text>
  <text x="405" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不等同于直接持有中国经营实体股权</text>

  <rect x="72" y="300" width="138" height="48" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="141" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">结构风险</text>
  <rect x="590" y="300" width="138" height="48" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="659" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">监管风险</text>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">小白先问: 我买的是哪一层？风险会在哪一层爆出来？</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
