<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从ADR事实推出操作结论</text>

  <rect x="36" y="86" width="176" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="124" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="124" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">ADR只是交易载体</text>
  <text x="124" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不改变经营所在地</text>

  <rect x="36" y="206" width="176" height="86" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="124" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0e7490">前提B</text>
  <text x="124" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">VIE是合同暴露</text>
  <text x="124" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不是经营实体股权</text>

  <rect x="36" y="326" width="176" height="86" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="124" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="124" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">中美监管闸门</text>
  <text x="124" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">都可能影响流动性</text>

  <path d="M224 129 H288" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M224 249 H288" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M224 369 H288" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="302" y="128" width="196" height="194" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">逻辑推导</text>
  <text x="400" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">因为报价在美国</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以交易方便</text>
  <text x="400" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">但经营、牌照、数据在中国</text>
  <text x="400" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">所以中国规则仍会定价</text>
  <text x="400" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">再叠加审计和上市规则</text>

  <path d="M508 225 H578" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="590" y="92" width="174" height="270" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="677" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">结论</text>
  <text x="677" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">买前先做三层穿透</text>
  <text x="677" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">结构层: VIE / 持股</text>
  <text x="677" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">监管层: 数据 / 行业</text>
  <text x="677" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">流动性层: 审计 / 退市</text>
  <line x1="626" y1="269" x2="728" y2="269" stroke="#e2e8f0" stroke-width="2"/>
  <text x="677" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">三层不过关</text>
  <text x="677" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不按普通美股重仓</text>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">美元交易是入口，不是风险免疫证</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
