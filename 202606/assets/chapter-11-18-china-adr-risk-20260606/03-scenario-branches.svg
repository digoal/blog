<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">中概ADR情景分支: 前提变了，操作就要变</text>

  <rect x="284" y="78" width="232" height="72" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">准备买一只中概ADR</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">先确认三层前提是否成立</text>

  <path d="M400 150 V184" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="284" y="190" width="232" height="72" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">三层都过关</text>
  <text x="400" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">结构清楚、监管可跟踪、流动性有备份</text>

  <path d="M284 226 H124 V302" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 262 V302" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M516 226 H676 V302" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="42" y="310" width="190" height="96" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="137" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">正常情景</text>
  <text x="137" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">只做卫星仓</text>
  <text x="137" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">写清退出条件</text>

  <rect x="305" y="310" width="190" height="96" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">监管闸门变紧</text>
  <text x="400" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">暂停加仓</text>
  <text x="400" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">复核备案、审查、罚单</text>

  <rect x="568" y="310" width="190" height="96" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="663" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">退市或审计风险</text>
  <text x="663" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">先降流动性假设</text>
  <text x="663" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">考虑港股转换或退出</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">纪律: 中概ADR不能只看PE和增长率，必须把结构、监管、退市路径一起估价</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
