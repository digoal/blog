<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">四类高风险股票过滤器</title>
  <desc id="desc">展示小盘股、仙股、SPAC和Meme股的主要风险检查点。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">四类高风险股票：先排雷，再谈机会</text>
  <g transform="translate(54 86)">
    <rect x="0" y="0" width="155" height="245" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="78" cy="48" r="28" fill="#dbeafe"/>
    <text x="78" y="55" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">小</text>
    <text x="78" y="96" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">小盘股</text>
    <text x="24" y="135" font-size="15" fill="#334155">信息少</text>
    <text x="24" y="165" font-size="15" fill="#334155">波动大</text>
    <text x="24" y="195" font-size="15" fill="#334155">商业模式未验证</text>
    <text x="78" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">先看收入和现金流</text>
  </g>
  <g transform="translate(235 86)">
    <rect x="0" y="0" width="155" height="245" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="78" cy="48" r="28" fill="#fee2e2"/>
    <text x="78" y="55" text-anchor="middle" font-size="22" font-weight="700" fill="#b91c1c">仙</text>
    <text x="78" y="96" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">仙股</text>
    <text x="24" y="135" font-size="15" fill="#334155">低价错觉</text>
    <text x="24" y="165" font-size="15" fill="#334155">成交稀薄</text>
    <text x="24" y="195" font-size="15" fill="#334155">退市压力</text>
    <text x="78" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">先看上市合规</text>
  </g>
  <g transform="translate(416 86)">
    <rect x="0" y="0" width="155" height="245" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="78" cy="48" r="28" fill="#dcfce7"/>
    <text x="78" y="55" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">壳</text>
    <text x="78" y="96" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">SPAC</text>
    <text x="24" y="135" font-size="15" fill="#334155">先募资后找标的</text>
    <text x="24" y="165" font-size="15" fill="#334155">稀释和冲突</text>
    <text x="24" y="195" font-size="15" fill="#334155">预测容易乐观</text>
    <text x="78" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">先看并购文件</text>
  </g>
  <g transform="translate(597 86)">
    <rect x="0" y="0" width="155" height="245" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="78" cy="48" r="28" fill="#ede9fe"/>
    <text x="78" y="55" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">热</text>
    <text x="78" y="96" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Meme股</text>
    <text x="24" y="135" font-size="15" fill="#334155">情绪驱动</text>
    <text x="24" y="165" font-size="15" fill="#334155">交易限制</text>
    <text x="24" y="195" font-size="15" fill="#334155">涨跌速度极快</text>
    <text x="78" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">先看退出能力</text>
  </g>
  <text x="400" y="368" text-anchor="middle" font-size="17" fill="#334155">便宜、故事大、讨论热，都不是买入理由；能验证、能退出、仓位小，才是研究前提。</text>
</svg>
