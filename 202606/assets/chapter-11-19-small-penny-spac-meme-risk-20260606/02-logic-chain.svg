<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">排雷论证链</title>
  <desc id="desc">展示从低信息、低流动性、高情绪到风险结论的因果链。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">论证链：为什么先排雷，再研究</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-size="16">
    <rect x="48" y="85" width="170" height="86" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="133" y="118" text-anchor="middle" font-weight="700" fill="#111827">前提A</text>
    <text x="133" y="146" text-anchor="middle" fill="#334155">信息披露不足</text>
    <rect x="48" y="220" width="170" height="86" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="133" y="253" text-anchor="middle" font-weight="700" fill="#111827">前提B</text>
    <text x="133" y="281" text-anchor="middle" fill="#334155">成交量和买卖价差差</text>
    <rect x="292" y="85" width="170" height="86" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="377" y="118" text-anchor="middle" font-weight="700" fill="#111827">前提C</text>
    <text x="377" y="146" text-anchor="middle" fill="#334155">壳结构和稀释复杂</text>
    <rect x="292" y="220" width="170" height="86" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="377" y="253" text-anchor="middle" font-weight="700" fill="#111827">前提D</text>
    <text x="377" y="281" text-anchor="middle" fill="#334155">社交情绪放大价格</text>
    <rect x="552" y="145" width="190" height="112" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="647" y="181" text-anchor="middle" font-weight="700" fill="#111827">推导</text>
    <text x="647" y="211" text-anchor="middle" fill="#334155">因为验证难、退出难</text>
    <text x="647" y="237" text-anchor="middle" fill="#334155">所以涨得快不等于能赚钱</text>
    <rect x="226" y="348" width="348" height="60" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="400" y="373" text-anchor="middle" font-weight="700" fill="#111827">结论</text>
    <text x="400" y="397" text-anchor="middle" fill="#334155">小白默认不碰；要碰也只能极小研究仓，先写退出条件</text>
  </g>
  <line x1="218" y1="128" x2="292" y2="128" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="218" y1="263" x2="292" y2="263" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="462" y1="128" x2="552" y2="181" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="462" y1="263" x2="552" y2="221" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="647" y1="257" x2="435" y2="348" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
