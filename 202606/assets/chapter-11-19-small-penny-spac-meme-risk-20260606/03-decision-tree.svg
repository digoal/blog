<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title desc">
  <title id="title">高风险股票操作决策树</title>
  <desc id="desc">展示小白遇到小盘股、仙股、SPAC和Meme股时的操作路径。</desc>
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">操作决策树：先问四个问题</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-size="16" fill="#111827">
    <rect x="265" y="70" width="270" height="54" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="400" y="104" text-anchor="middle" font-weight="700">这个股票为什么吸引你？</text>
    <rect x="70" y="165" width="205" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="172" y="190" text-anchor="middle">只因为低价、暴涨、</text>
    <text x="172" y="212" text-anchor="middle">群聊推荐或名人喊单</text>
    <rect x="530" y="165" width="205" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="632" y="190" text-anchor="middle">能读到10-K/10-Q、</text>
    <text x="632" y="212" text-anchor="middle">并购文件和真实成交</text>
    <rect x="70" y="285" width="205" height="68" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="172" y="313" text-anchor="middle" font-weight="700">直接不碰</text>
    <text x="172" y="338" text-anchor="middle" fill="#334155">这不是研究，是下注</text>
    <rect x="530" y="270" width="205" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="632" y="294" text-anchor="middle">流动性、合规、稀释、</text>
    <text x="632" y="316" text-anchor="middle">退出条件都过关？</text>
    <rect x="404" y="365" width="165" height="54" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="486" y="398" text-anchor="middle" font-weight="700">任一不过：不买</text>
    <rect x="625" y="365" width="165" height="54" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="707" y="388" text-anchor="middle" font-weight="700">全部过：研究仓</text>
    <text x="707" y="409" text-anchor="middle" font-size="14" fill="#334155">0.5%-1%，先写止损</text>
  </g>
  <line x1="360" y1="124" x2="194" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="124" x2="610" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="172" y1="225" x2="172" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="632" y1="225" x2="632" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="595" y1="330" x2="505" y2="365" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="665" y1="330" x2="707" y2="365" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="535" y="354" font-size="14" fill="#b91c1c">否</text>
  <text x="696" y="354" font-size="14" fill="#15803d">是</text>
</svg>
