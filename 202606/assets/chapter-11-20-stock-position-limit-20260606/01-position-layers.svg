<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">小白美股仓位层级</title>
  <desc id="desc">展示核心资产、防守资产、个股卫星仓和试错仓的层级关系</desc>
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">个股只能做卫星，不能替代核心配置</text>
  <rect x="90" y="285" width="620" height="58" rx="8" fill="#2563eb"/>
  <text x="400" y="320" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">核心资产：宽基ETF / 指数基金 / 长期配置  50%-70%</text>
  <rect x="140" y="220" width="520" height="50" rx="8" fill="#16a34a"/>
  <text x="400" y="251" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">防守资产：现金、短债、黄金等  10%-30%</text>
  <rect x="195" y="155" width="410" height="50" rx="8" fill="#f59e0b"/>
  <text x="400" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">个股卫星仓：研究过的龙头股  合计10%-20%</text>
  <rect x="270" y="90" width="260" height="50" rx="8" fill="#ef4444"/>
  <text x="400" y="121" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">试错仓：单只1%-3%，熟悉后不超5%</text>
  <line x1="400" y1="140" x2="400" y2="155" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="205" x2="400" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="270" x2="400" y2="285" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="374" text-anchor="middle" font-size="15" fill="#475569">顺序：先有底座，再做卫星；先定上限，再谈买入</text>
</svg>
