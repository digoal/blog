<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">仓位上限论证链</title>
  <desc id="desc">展示从个股风险、选股难度、核心配置到仓位上限的因果路径</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">为什么小白必须给单只个股设上限</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="38" y="92" width="160" height="88" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="118" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="118" y="150" text-anchor="middle" font-size="14" fill="#1f2937">单一个股有</text>
  <text x="118" y="170" text-anchor="middle" font-size="14" fill="#1f2937">公司特定风险</text>
  <rect x="238" y="92" width="160" height="88" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="318" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">前提B</text>
  <text x="318" y="150" text-anchor="middle" font-size="14" fill="#1f2937">长期选股胜率</text>
  <text x="318" y="170" text-anchor="middle" font-size="14" fill="#1f2937">很难稳定验证</text>
  <rect x="438" y="92" width="160" height="88" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="518" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">前提C</text>
  <text x="518" y="150" text-anchor="middle" font-size="14" fill="#1f2937">家庭资产目标</text>
  <text x="518" y="170" text-anchor="middle" font-size="14" fill="#1f2937">需要稳定底座</text>
  <rect x="638" y="92" width="124" height="88" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="700" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">结论</text>
  <text x="700" y="150" text-anchor="middle" font-size="14" fill="#1f2937">先设仓位上限</text>
  <text x="700" y="170" text-anchor="middle" font-size="14" fill="#1f2937">再讨论买入</text>
  <line x1="198" y1="136" x2="230" y2="136" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="398" y1="136" x2="430" y2="136" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="598" y1="136" x2="630" y2="136" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="250" width="560" height="74" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="280" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">操作翻译</text>
  <text x="400" y="307" text-anchor="middle" font-size="15" fill="#334155">单只默认1%-3%，研究成熟不超过5%；个股合计控制在10%-20%</text>
  <line x1="700" y1="180" x2="700" y2="210" stroke="#475569" stroke-width="2"/>
  <path d="M700 210 Q700 236 680 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
