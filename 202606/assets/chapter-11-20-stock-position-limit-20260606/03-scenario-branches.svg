<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">仓位前提变化分支</title>
  <desc id="desc">展示不同前提变化下的仓位调整动作</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提一变，仓位动作也要变</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="310" y="78" width="180" height="70" rx="8" fill="#2563eb"/>
  <text x="400" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">当前持有个股</text>
  <text x="400" y="130" text-anchor="middle" font-size="14" fill="#dbeafe">先检查前提，再决定动作</text>
  <rect x="40" y="235" width="190" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="135" y="263" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">前提仍成立</text>
  <text x="135" y="288" text-anchor="middle" font-size="14" fill="#1f2937">基本面、估值、仓位</text>
  <text x="135" y="309" text-anchor="middle" font-size="14" fill="#1f2937">都在计划内：持有/小加</text>
  <rect x="270" y="235" width="190" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="365" y="263" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">股价涨超上限</text>
  <text x="365" y="288" text-anchor="middle" font-size="14" fill="#1f2937">不是继续追买</text>
  <text x="365" y="309" text-anchor="middle" font-size="14" fill="#1f2937">而是再平衡回上限</text>
  <rect x="500" y="235" width="190" height="92" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="595" y="263" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">买入逻辑失效</text>
  <text x="595" y="288" text-anchor="middle" font-size="14" fill="#1f2937">收入、现金流、竞争</text>
  <text x="595" y="309" text-anchor="middle" font-size="14" fill="#1f2937">恶化：减仓或退出</text>
  <path d="M400 148 Q235 180 145 235" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 148 Q384 190 365 235" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 148 Q535 180 595 235" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="365" text-anchor="middle" font-size="15" fill="#475569">仓位纪律的目的不是少赚钱，而是防止一次错误毁掉整个组合</text>
</svg>
