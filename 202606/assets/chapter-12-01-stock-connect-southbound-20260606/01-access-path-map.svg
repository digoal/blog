<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">港股通不是香港账户，是规则化通道</text>
  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2">
    <rect x="40" y="90" width="135" height="72" rx="8"/>
    <rect x="220" y="90" width="135" height="72" rx="8"/>
    <rect x="400" y="90" width="135" height="72" rx="8"/>
    <rect x="580" y="90" width="135" height="72" rx="8"/>
  </g>
  <g font-size="17" fill="#111827" font-weight="700" text-anchor="middle">
    <text x="107" y="120">内地投资者</text>
    <text x="107" y="145" font-size="13" font-weight="400">A股人民币账户</text>
    <text x="287" y="120">内地券商</text>
    <text x="287" y="145" font-size="13" font-weight="400">委托与风控</text>
    <text x="467" y="120">交易所通道</text>
    <text x="467" y="145" font-size="13" font-weight="400">沪/深港股通</text>
    <text x="647" y="120">联交所市场</text>
    <text x="647" y="145" font-size="13" font-weight="400">指定股票/ETF</text>
  </g>
  <g stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M175 126 H220"/>
    <path d="M355 126 H400"/>
    <path d="M535 126 H580"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <g>
    <rect x="72" y="230" width="150" height="56" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="242" y="230" width="150" height="56" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <rect x="412" y="230" width="150" height="56" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="582" y="230" width="150" height="56" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  </g>
  <g font-size="15" fill="#111827" text-anchor="middle">
    <text x="147" y="254" font-weight="700">开通门槛</text>
    <text x="147" y="276" font-size="12">20日日均资产 >= 50万元</text>
    <text x="317" y="254" font-weight="700">标的范围</text>
    <text x="317" y="276" font-size="12">只能买名单内股票/ETF</text>
    <text x="487" y="254" font-weight="700">额度与日历</text>
    <text x="487" y="276" font-size="12">买入受日额度和交易日限制</text>
    <text x="657" y="254" font-weight="700">成本与汇率</text>
    <text x="657" y="276" font-size="12">港币报价，人民币交收</text>
  </g>
  <path d="M147 230 C147 190 107 178 107 162" stroke="#93c5fd" stroke-width="2" fill="none"/>
  <path d="M317 230 C317 190 467 178 467 162" stroke="#86efac" stroke-width="2" fill="none"/>
  <path d="M487 230 C487 190 467 178 467 162" stroke="#fdba74" stroke-width="2" fill="none"/>
  <path d="M657 230 C657 190 647 178 647 162" stroke="#fca5a5" stroke-width="2" fill="none"/>
  <rect x="130" y="325" width="540" height="44" rx="8" fill="#111827"/>
  <text x="400" y="353" text-anchor="middle" font-size="17" fill="#ffffff" font-weight="700">结论：先确认通道规则，再决定买什么港股资产</text>
</svg>
