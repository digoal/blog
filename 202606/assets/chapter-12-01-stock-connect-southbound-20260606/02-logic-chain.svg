<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">港股通操作论证链</text>
  <g font-size="14" fill="#111827">
    <rect x="45" y="72" width="190" height="88" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="140" y="101" text-anchor="middle" font-size="17" font-weight="700">前提A：正规通道</text>
    <text x="62" y="126">用内地A股账户委托</text>
    <text x="62" y="148">只买规定范围标的</text>
    <rect x="285" y="72" width="230" height="88" rx="8" fill="#ecfdf5" stroke="#34d399"/>
    <text x="400" y="101" text-anchor="middle" font-size="17" font-weight="700">前提B：规则边界</text>
    <text x="305" y="126">50万门槛、额度、日历</text>
    <text x="305" y="148">港币报价，人民币交收</text>
    <rect x="565" y="72" width="190" height="88" rx="8" fill="#fff7ed" stroke="#fb923c"/>
    <text x="660" y="101" text-anchor="middle" font-size="17" font-weight="700">前提C：市场风险</text>
    <text x="585" y="126">高波动、费用、汇率</text>
    <text x="585" y="148">低估值不等于低风险</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M235 116 H285"/>
    <path d="M515 116 H565"/>
    <path d="M400 160 V205"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="130" y="205" width="540" height="70" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="400" y="233" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="258" text-anchor="middle" font-size="15" fill="#111827">因为港股通解决的是合规入口，不消除标的、成本和波动风险</text>
  <path d="M400 275 V320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="120" y="320" width="560" height="66" rx="10" fill="#111827"/>
  <text x="400" y="348" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">核心结论</text>
  <text x="400" y="372" text-anchor="middle" font-size="15" fill="#e5e7eb">小白先用小仓位学习规则，优先选择流动性强、逻辑能解释的标的</text>
</svg>
