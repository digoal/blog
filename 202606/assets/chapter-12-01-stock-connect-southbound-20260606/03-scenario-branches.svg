<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化时，操作必须切换</text>
  <rect x="275" y="70" width="250" height="62" rx="8" fill="#111827"/>
  <text x="400" y="96" text-anchor="middle" font-size="17" fill="#ffffff" font-weight="700">准备通过港股通买入</text>
  <text x="400" y="119" text-anchor="middle" font-size="13" fill="#d1d5db">先检查资格、标的、成本、仓位</text>
  <g stroke="#64748b" stroke-width="2.5" fill="none">
    <path d="M400 132 V170"/>
    <path d="M400 170 H145 V205"/>
    <path d="M400 170 H325 V205"/>
    <path d="M400 170 H505 V205"/>
    <path d="M400 170 H685 V205"/>
  </g>
  <g font-size="13" fill="#111827">
    <rect x="55" y="205" width="180" height="96" rx="8" fill="#ecfdf5" stroke="#34d399"/>
    <text x="145" y="230" text-anchor="middle" font-size="16" font-weight="700">正常情景</text>
    <text x="72" y="254">资格达标，标的在名单内</text>
    <text x="72" y="275">费用可接受，仓位很小</text>
    <text x="72" y="294" font-weight="700">操作：分批买入</text>
    <rect x="235" y="205" width="180" height="96" rx="8" fill="#fef2f2" stroke="#f87171"/>
    <text x="325" y="230" text-anchor="middle" font-size="16" font-weight="700">资格不达标</text>
    <text x="252" y="254">资产门槛或测评不满足</text>
    <text x="252" y="275">借钱凑门槛会放大风险</text>
    <text x="252" y="294" font-weight="700">操作：不开户</text>
    <rect x="415" y="205" width="180" height="96" rx="8" fill="#fff7ed" stroke="#fb923c"/>
    <text x="505" y="230" text-anchor="middle" font-size="16" font-weight="700">标的不合格</text>
    <text x="432" y="254">不在港股通名单内</text>
    <text x="432" y="275">或仅能卖出不能买入</text>
    <text x="432" y="294" font-weight="700">操作：换标的</text>
    <rect x="595" y="205" width="180" height="96" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="685" y="230" text-anchor="middle" font-size="16" font-weight="700">波动/成本过高</text>
    <text x="612" y="254">短线频繁交易吞费用</text>
    <text x="612" y="275">汇率和回撤超出承受</text>
    <text x="612" y="294" font-weight="700">操作：降仓等待</text>
  </g>
  <rect x="120" y="345" width="560" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="375" text-anchor="middle" font-size="16" fill="#111827" font-weight="700">原则：规则前提失效，买入结论立即失效；先纠偏，再交易</text>
</svg>
