<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">港股市场的三个标签</title>
  <desc id="desc">用低估值、高波动、流动性分层解释港股市场特点</desc>
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">港股不是一个“便宜市场”，而是三层筛选题</text>
  <line x1="120" y1="92" x2="680" y2="92" stroke="#d0d7de" stroke-width="2"/>

  <rect x="72" y="130" width="190" height="150" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="167" cy="165" r="28" fill="#dbeafe"/>
  <text x="167" y="173" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">1</text>
  <text x="167" y="213" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">低估值</text>
  <text x="167" y="244" text-anchor="middle" font-size="15" fill="#4b5563">便宜只是起点</text>
  <text x="167" y="266" text-anchor="middle" font-size="15" fill="#4b5563">不是买入理由</text>

  <rect x="305" y="130" width="190" height="150" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="400" cy="165" r="28" fill="#fee2e2"/>
  <text x="400" y="173" text-anchor="middle" font-size="24" font-weight="700" fill="#b91c1c">2</text>
  <text x="400" y="213" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">高波动</text>
  <text x="400" y="244" text-anchor="middle" font-size="15" fill="#4b5563">涨跌都更快</text>
  <text x="400" y="266" text-anchor="middle" font-size="15" fill="#4b5563">仓位要先打折</text>

  <rect x="538" y="130" width="190" height="150" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="633" cy="165" r="28" fill="#d1fae5"/>
  <text x="633" y="173" text-anchor="middle" font-size="24" font-weight="700" fill="#047857">3</text>
  <text x="633" y="213" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">流动性分层</text>
  <text x="633" y="244" text-anchor="middle" font-size="15" fill="#4b5563">龙头好成交</text>
  <text x="633" y="266" text-anchor="middle" font-size="15" fill="#4b5563">冷门票难退出</text>

  <path d="M167 300 C250 350, 550 350, 633 300" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="400" y="354" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">操作结论：先选工具，再控仓位，最后才谈买点</text>
</svg>
