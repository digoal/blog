<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">港股市场特点论证链</title>
  <desc id="desc">低估值、高波动、流动性分层推导出港股配置规则</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">论证链：便宜不能直接买，必须叠加波动和流动性</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="40" y="86" width="170" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="121" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="125" y="149" text-anchor="middle" font-size="15" fill="#1f2937">估值常有折扣</text>

  <rect x="315" y="86" width="170" height="90" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="121" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">前提B</text>
  <text x="400" y="149" text-anchor="middle" font-size="15" fill="#1f2937">价格波动更剧烈</text>

  <rect x="590" y="86" width="170" height="90" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="675" y="121" text-anchor="middle" font-size="18" font-weight="700" fill="#064e3b">前提C</text>
  <text x="675" y="149" text-anchor="middle" font-size="15" fill="#1f2937">成交深度分层</text>

  <line x1="210" y1="131" x2="315" y2="131" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="485" y1="131" x2="590" y2="131" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="170" y="225" width="460" height="78" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="255" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="282" text-anchor="middle" font-size="16" fill="#374151">因为折扣来自风险，所以先判断能不能承受风险和退出成本</text>

  <line x1="400" y1="176" x2="400" y2="225" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="170" y="342" width="460" height="52" rx="8" fill="#111827"/>
  <text x="400" y="375" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">结论：优先ETF和龙头，个股先过成交量过滤，港股仓位打折</text>
  <line x1="400" y1="303" x2="400" y2="342" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
