<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title desc">
  <title id="title">港股前提变化情景分支</title>
  <desc id="desc">展示低估值、高波动、流动性分层变化后的操作分支</desc>
  <rect width="800" height="440" fill="#f7f9fb"/>
  <text x="400" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">同样是港股，前提不同，动作完全不同</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="276" y="78" width="248" height="62" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">准备配置港股</text>
  <text x="400" y="128" text-anchor="middle" font-size="14" fill="#4b5563">先问三个前提是否成立</text>

  <line x1="400" y1="140" x2="400" y2="178" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="55" y="180" width="200" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="211" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">估值低 + 流动性好</text>
  <text x="155" y="238" text-anchor="middle" font-size="14" fill="#374151">宽基ETF、龙头股</text>
  <text x="155" y="260" text-anchor="middle" font-size="14" fill="#374151">可做组合补充</text>

  <rect x="300" y="180" width="200" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="211" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">估值低 + 波动高</text>
  <text x="400" y="238" text-anchor="middle" font-size="14" fill="#374151">只能分批买入</text>
  <text x="400" y="260" text-anchor="middle" font-size="14" fill="#374151">仓位先打折</text>

  <rect x="545" y="180" width="200" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="211" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">估值低 + 成交差</text>
  <text x="645" y="238" text-anchor="middle" font-size="14" fill="#374151">不做重仓</text>
  <text x="645" y="260" text-anchor="middle" font-size="14" fill="#374151">小白直接跳过</text>

  <line x1="400" y1="178" x2="155" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="178" x2="400" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="178" x2="645" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="84" y="330" width="150" height="56" rx="8" fill="#dbeafe"/>
  <text x="159" y="363" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">正常配置</text>

  <rect x="325" y="330" width="150" height="56" rx="8" fill="#fed7aa"/>
  <text x="400" y="363" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">降低仓位</text>

  <rect x="570" y="330" width="150" height="56" rx="8" fill="#fecaca"/>
  <text x="645" y="363" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">放弃交易</text>

  <line x1="155" y1="272" x2="159" y2="330" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="272" x2="400" y2="330" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="645" y1="272" x2="645" y2="330" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
