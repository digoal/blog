<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#f7faf8"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#243b3d">港股三种工具：先看外壳，再看底层</text>

  <rect x="42" y="72" width="220" height="250" rx="8" fill="#ffffff" stroke="#8ab6a7" stroke-width="2"/>
  <rect x="290" y="72" width="220" height="250" rx="8" fill="#ffffff" stroke="#7fa4cf" stroke-width="2"/>
  <rect x="538" y="72" width="220" height="250" rx="8" fill="#ffffff" stroke="#d3a45b" stroke-width="2"/>

  <text x="152" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2f5d62">港股个股</text>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2f5d62">港股ETF</text>
  <text x="648" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2f5d62">港股通ETF</text>

  <text x="70" y="150" font-family="Arial, sans-serif" font-size="15" fill="#354f52">买的是一家上市公司</text>
  <text x="70" y="180" font-family="Arial, sans-serif" font-size="15" fill="#354f52">优点：逻辑清楚时弹性大</text>
  <text x="70" y="210" font-family="Arial, sans-serif" font-size="15" fill="#354f52">风险：公司、流动性、汇率</text>
  <text x="70" y="240" font-family="Arial, sans-serif" font-size="15" fill="#354f52">小白动作：只做卫星仓</text>

  <text x="318" y="150" font-family="Arial, sans-serif" font-size="15" fill="#354f52">买的是香港上市基金</text>
  <text x="318" y="180" font-family="Arial, sans-serif" font-size="15" fill="#354f52">优点：一篮子分散风险</text>
  <text x="318" y="210" font-family="Arial, sans-serif" font-size="15" fill="#354f52">风险：溢价、价差、主题波动</text>
  <text x="318" y="240" font-family="Arial, sans-serif" font-size="15" fill="#354f52">小白动作：先宽基后主题</text>

  <text x="566" y="150" font-family="Arial, sans-serif" font-size="15" fill="#354f52">常见为A股场内人民币ETF</text>
  <text x="566" y="180" font-family="Arial, sans-serif" font-size="15" fill="#354f52">底层通过港股通买港股</text>
  <text x="566" y="210" font-family="Arial, sans-serif" font-size="15" fill="#354f52">风险：跟踪、假期、范围限制</text>
  <text x="566" y="240" font-family="Arial, sans-serif" font-size="15" fill="#354f52">小白动作：默认入口之一</text>

  <line x1="262" y1="342" x2="290" y2="342" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="510" y1="342" x2="538" y2="342" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="110" y="330" width="580" height="48" rx="8" fill="#e8f1ed" stroke="#8ab6a7"/>
  <text x="400" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243b3d">小白顺序：先用篮子解决配置，再用小仓位研究个股</text>
</svg>
