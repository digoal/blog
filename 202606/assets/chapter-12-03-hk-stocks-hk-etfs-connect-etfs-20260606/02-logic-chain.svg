<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#365c7d"/>
    </marker>
  </defs>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#25313b">港股工具选择的论证链</text>

  <rect x="34" y="62" width="220" height="68" rx="8" fill="#ffffff" stroke="#86b7a9" stroke-width="2"/>
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#24433f">前提A：市场大但结构集中</text>
  <text x="50" y="113" font-family="Arial, sans-serif" font-size="14" fill="#43515c">港股常带中国资产暴露</text>

  <rect x="34" y="150" width="220" height="68" rx="8" fill="#ffffff" stroke="#86b7a9" stroke-width="2"/>
  <text x="50" y="176" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#24433f">前提B：流动性分层</text>
  <text x="50" y="201" font-family="Arial, sans-serif" font-size="14" fill="#43515c">大票活跃，小票可能难成交</text>

  <rect x="34" y="238" width="220" height="68" rx="8" fill="#ffffff" stroke="#86b7a9" stroke-width="2"/>
  <text x="50" y="264" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#24433f">前提C：ETF分散但不保本</text>
  <text x="50" y="289" font-family="Arial, sans-serif" font-size="14" fill="#43515c">仍有主题回撤和成交成本</text>

  <rect x="34" y="326" width="220" height="68" rx="8" fill="#ffffff" stroke="#86b7a9" stroke-width="2"/>
  <text x="50" y="352" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#24433f">前提D：入口规则不同</text>
  <text x="50" y="377" font-family="Arial, sans-serif" font-size="14" fill="#43515c">港股通、港股账户、A股ETF不同</text>

  <line x1="254" y1="96" x2="326" y2="184" stroke="#365c7d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="254" y1="184" x2="326" y2="200" stroke="#365c7d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="254" y1="272" x2="326" y2="216" stroke="#365c7d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="254" y1="360" x2="326" y2="232" stroke="#365c7d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="326" y="156" width="210" height="92" rx="10" fill="#e7eef5" stroke="#6b91b8" stroke-width="2"/>
  <text x="431" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#263f59">因为风险来自底层</text>
  <text x="431" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#344b60">所以先选外壳和仓位</text>
  <text x="431" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#344b60">再谈代码和故事</text>

  <line x1="536" y1="202" x2="604" y2="202" stroke="#365c7d" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="604" y="112" width="170" height="180" rx="10" fill="#fff7e8" stroke="#d0a050" stroke-width="2"/>
  <text x="689" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#5a3b10">操作结论</text>
  <text x="626" y="184" font-family="Arial, sans-serif" font-size="15" fill="#51483d">1. 配置先用ETF</text>
  <text x="626" y="216" font-family="Arial, sans-serif" font-size="15" fill="#51483d">2. 主题仓小比例</text>
  <text x="626" y="248" font-family="Arial, sans-serif" font-size="15" fill="#51483d">3. 个股只做卫星</text>
</svg>
