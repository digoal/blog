<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4d6570"/>
    </marker>
  </defs>
  <rect width="800" height="430" fill="#fbfbf8"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#29363a">前提变化后的工具切换</text>

  <rect x="300" y="78" width="200" height="70" rx="10" fill="#e6f0ed" stroke="#7da99d" stroke-width="2"/>
  <text x="400" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2c4a45">买港股前先问</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2c4a45">我是配置、表达主题，还是选公司？</text>

  <rect x="38" y="238" width="180" height="108" rx="8" fill="#ffffff" stroke="#7da99d" stroke-width="2"/>
  <text x="128" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#30423f">全球配置</text>
  <text x="60" y="297" font-family="Arial, sans-serif" font-size="14" fill="#44545a">用宽基港股ETF</text>
  <text x="60" y="322" font-family="Arial, sans-serif" font-size="14" fill="#44545a">或港股通ETF打底</text>

  <rect x="262" y="238" width="180" height="108" rx="8" fill="#ffffff" stroke="#7fa4cf" stroke-width="2"/>
  <text x="352" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#30423f">行业主题</text>
  <text x="284" y="297" font-family="Arial, sans-serif" font-size="14" fill="#44545a">只放卫星仓</text>
  <text x="284" y="322" font-family="Arial, sans-serif" font-size="14" fill="#44545a">先看估值和回撤</text>

  <rect x="486" y="238" width="180" height="108" rx="8" fill="#ffffff" stroke="#d3a45b" stroke-width="2"/>
  <text x="576" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#30423f">个股研究</text>
  <text x="508" y="297" font-family="Arial, sans-serif" font-size="14" fill="#44545a">读财报和公告</text>
  <text x="508" y="322" font-family="Arial, sans-serif" font-size="14" fill="#44545a">单票初始1%到2%</text>

  <rect x="610" y="70" width="158" height="118" rx="8" fill="#fff3f0" stroke="#d47a64" stroke-width="2"/>
  <text x="689" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#6a3327">前提失效</text>
  <text x="628" y="130" font-family="Arial, sans-serif" font-size="14" fill="#5a4440">溢价高、价差宽</text>
  <text x="628" y="154" font-family="Arial, sans-serif" font-size="14" fill="#5a4440">资金短期要用</text>
  <text x="628" y="178" font-family="Arial, sans-serif" font-size="14" fill="#5a4440">规则看不懂：停手</text>

  <line x1="342" y1="148" x2="150" y2="238" stroke="#4d6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="148" x2="352" y2="238" stroke="#4d6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="458" y1="148" x2="556" y2="238" stroke="#4d6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="112" x2="610" y2="112" stroke="#d47a64" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#29363a">工具不是标签，工具是“目的 + 入口 + 成本 + 仓位”的组合</text>
</svg>
