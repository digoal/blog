<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">港股下单前的四个规则闸门</title>
  <desc id="desc">每手股数、交易时间、费用和汇率共同决定港股下单是否合格。</desc>
  <rect width="800" height="400" fill="#f7fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">港股下单前，先过四个规则闸门</text>
  <g font-size="17" fill="#172033">
    <rect x="44" y="88" width="160" height="116" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="124" y="123" text-anchor="middle" font-weight="700">每手股数</text>
    <text x="124" y="155" text-anchor="middle">不是固定100股</text>
    <text x="124" y="181" text-anchor="middle">先查一手多少钱</text>
    <rect x="230" y="88" width="160" height="116" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="310" y="123" text-anchor="middle" font-weight="700">交易时间</text>
    <text x="310" y="155" text-anchor="middle">集合竞价有规则</text>
    <text x="310" y="181" text-anchor="middle">连续时段更适合小白</text>
    <rect x="416" y="88" width="160" height="116" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
    <text x="496" y="123" text-anchor="middle" font-weight="700">交易费用</text>
    <text x="496" y="155" text-anchor="middle">印花税和征费</text>
    <text x="496" y="181" text-anchor="middle">往返都要算</text>
    <rect x="602" y="88" width="154" height="116" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <text x="679" y="123" text-anchor="middle" font-weight="700">汇率</text>
    <text x="679" y="155" text-anchor="middle">港币报价</text>
    <text x="679" y="181" text-anchor="middle">人民币结果另算</text>
  </g>
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M124 204 L124 254"/>
    <path d="M310 204 L310 254"/>
    <path d="M496 204 L496 254"/>
    <path d="M679 204 L679 254"/>
  </g>
  <rect x="92" y="254" width="616" height="86" rx="10" fill="#172033"/>
  <text x="400" y="292" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">合格下单 = 整手可承受 + 连续时段限价 + 费用覆盖 + 汇率可解释</text>
  <text x="400" y="322" text-anchor="middle" font-size="16" fill="#cbd5e1">任一项说不清，就先观察，不用真实资金试规则</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
