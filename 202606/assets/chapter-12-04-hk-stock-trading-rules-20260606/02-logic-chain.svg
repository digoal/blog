<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">港股规则成本的论证链</title>
  <desc id="desc">从交易单位、时间、费用和汇率推导出小白的港股下单纪律。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#172033">论证链：规则成本会改变真实盈亏</text>
  <g font-size="15" fill="#172033">
    <rect x="38" y="82" width="150" height="84" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="113" y="113" text-anchor="middle" font-weight="700">前提A</text>
    <text x="113" y="140" text-anchor="middle">一手由发行人定</text>
    <rect x="228" y="82" width="150" height="84" rx="8" fill="#ecfdf5" stroke="#0f766e"/>
    <text x="303" y="113" text-anchor="middle" font-weight="700">前提B</text>
    <text x="303" y="140" text-anchor="middle">时段分集合与连续</text>
    <rect x="418" y="82" width="150" height="84" rx="8" fill="#fff7ed" stroke="#b45309"/>
    <text x="493" y="113" text-anchor="middle" font-weight="700">前提C</text>
    <text x="493" y="140" text-anchor="middle">每边都有显性成本</text>
    <rect x="608" y="82" width="150" height="84" rx="8" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="683" y="113" text-anchor="middle" font-weight="700">前提D</text>
    <text x="683" y="140" text-anchor="middle">港币报价叠加汇率</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M113 166 C113 208 188 215 230 235"/>
    <path d="M303 166 C303 205 305 214 330 235"/>
    <path d="M493 166 C493 205 488 214 470 235"/>
    <path d="M683 166 C683 208 610 215 570 235"/>
  </g>
  <rect x="205" y="235" width="390" height="58" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="400" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">中间命题：买入理由必须覆盖规则成本</text>
  <text x="400" y="282" text-anchor="middle" font-size="14" fill="#475569">否则看对方向，也会输给单位、价差、费用和汇率</text>
  <path d="M400 293 L400 325" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="150" y="325" width="500" height="48" rx="8" fill="#172033"/>
  <text x="400" y="355" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论：先算规则账，再决定买不买、买多少、何时买</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
