<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">港股规则变化时的操作分支</title>
  <desc id="desc">展示每手股数、费用、汇率和流动性前提变化后的替代操作。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#172033">前提变化时，不硬套原计划</text>
  <rect x="302" y="78" width="196" height="54" rx="8" fill="#172033"/>
  <text x="400" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">准备买一只港股</text>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M400 132 L178 176"/>
    <path d="M400 132 L400 176"/>
    <path d="M400 132 L622 176"/>
  </g>
  <g font-size="15" fill="#172033">
    <rect x="44" y="176" width="220" height="74" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="154" y="202" text-anchor="middle" font-weight="700">一手金额超预算</text>
    <text x="154" y="228" text-anchor="middle">不拆规则，不重仓</text>
    <rect x="290" y="176" width="220" height="74" rx="8" fill="#ffffff" stroke="#b45309"/>
    <text x="400" y="202" text-anchor="middle" font-weight="700">往返成本吃掉空间</text>
    <text x="400" y="228" text-anchor="middle">降低频率，改长期仓</text>
    <rect x="536" y="176" width="220" height="74" rx="8" fill="#ffffff" stroke="#7c3aed"/>
    <text x="646" y="202" text-anchor="middle" font-weight="700">汇率说不清</text>
    <text x="646" y="228" text-anchor="middle">先记港币和人民币账</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M154 250 L154 304"/>
    <path d="M400 250 L400 304"/>
    <path d="M646 250 L646 304"/>
  </g>
  <g font-size="15" fill="#172033">
    <rect x="52" y="304" width="204" height="56" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="154" y="329" text-anchor="middle" font-weight="700">改买ETF或等资金够</text>
    <text x="154" y="349" text-anchor="middle">不为凑一手借钱</text>
    <rect x="298" y="304" width="204" height="56" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="400" y="329" text-anchor="middle" font-weight="700">预期收益低于成本</text>
    <text x="400" y="349" text-anchor="middle">不做短线来回</text>
    <rect x="544" y="304" width="204" height="56" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="646" y="329" text-anchor="middle" font-weight="700">汇率波动大</text>
    <text x="646" y="349" text-anchor="middle">分批换汇或降仓</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
