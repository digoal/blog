<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">QDII 是普通散户的海外配置“正规代买通道”</text>

  <rect x="48" y="96" width="150" height="78" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="123" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">投资者</text>
  <text x="123" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">人民币申购</text>

  <rect x="288" y="92" width="176" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="376" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#065f46">境内QDII基金</text>
  <text x="376" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">基金公司管理</text>

  <rect x="578" y="96" width="154" height="78" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="655" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">海外资产</text>
  <text x="655" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">股票/债券/ETF</text>

  <path d="M202 135 H282" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M470 135 H572" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M655 180 C655 252 376 252 376 184" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="517" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">净值回到投资者账户</text>

  <rect x="70" y="286" width="160" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="150" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">好处</text>
  <text x="150" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不必自己开境外账户</text>

  <rect x="310" y="286" width="170" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="395" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">代价</text>
  <text x="395" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">申赎慢、费用和额度约束</text>

  <rect x="560" y="286" width="170" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="645" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">风险</text>
  <text x="645" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">海外市场 + 汇率波动</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
