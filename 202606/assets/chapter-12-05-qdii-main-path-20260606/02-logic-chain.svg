<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">QDII 买入前的因果链</text>

  <rect x="40" y="82" width="150" height="88" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="115" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0c4a6e">前提A</text>
  <text x="115" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">正规跨境入口</text>
  <text x="115" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">机构代你出海</text>

  <rect x="226" y="82" width="150" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="301" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">前提B</text>
  <text x="301" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">底层资产会波动</text>
  <text x="301" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">不是保本产品</text>

  <rect x="412" y="82" width="150" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="487" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e">前提C</text>
  <text x="487" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">汇率改变成本</text>
  <text x="487" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">人民币体验不同</text>

  <rect x="598" y="82" width="150" height="88" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="673" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9d174d">前提D</text>
  <text x="673" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">额度和申赎约束</text>
  <text x="673" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">热门时会限购</text>

  <path d="M190 126 H220" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M376 126 H406" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M562 126 H592" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <rect x="110" y="230" width="260" height="76" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="240" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">先解决入口，再判断资产和价格</text>

  <rect x="450" y="230" width="260" height="76" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="580" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#312e81">结论</text>
  <text x="580" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">小比例、长期钱、看公告后买入</text>

  <path d="M310 174 C310 205 240 205 240 224" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M584 174 C584 205 580 205 580 224" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M372 268 H444" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">因为 QDII 只解决“合规出海”，所以买入规则必须覆盖资产、汇率、额度、费用和期限。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
