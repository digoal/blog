<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f9fafb"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">QDII 情景分支：前提变了，动作就要变</text>

  <rect x="300" y="78" width="200" height="64" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0c4a6e">正常情景</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">长期钱 + 低费率 + 可申购</text>

  <rect x="42" y="230" width="178" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="131" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">底层资产过热</text>
  <text x="131" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不追主题</text>
  <text x="131" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">降到观察或半速</text>

  <rect x="254" y="230" width="178" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="343" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">美元成本偏高</text>
  <text x="343" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不一次性打满</text>
  <text x="343" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">分批进入</text>

  <rect x="466" y="230" width="178" height="88" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="555" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">暂停申购限购</text>
  <text x="555" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不抢替代高价产品</text>
  <text x="555" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">等额度或换低拥挤入口</text>

  <rect x="662" y="230" width="96" height="88" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="710" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5b21b6">短期钱</text>
  <text x="710" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">不买</text>
  <text x="710" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">转现金</text>

  <path d="M400 145 C400 178 131 178 131 224" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 145 C400 180 343 180 343 224" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 145 C400 180 555 180 555 224" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 145 C400 178 710 178 710 224" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="400" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">QDII 的纪律不是“海外资产一定好”，而是每次买入都要重新检查前提。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
