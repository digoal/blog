<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="跨境ETF溢价论证链">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">跨境ETF: 方便来自交易, 风险来自价格脱节</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="40" y="82" width="170" height="92" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="125" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="125" y="143" text-anchor="middle" font-size="15" fill="#1e3a8a">场内可买卖</text>
  <text x="125" y="164" text-anchor="middle" font-size="15" fill="#1e3a8a">像股票一样方便</text>

  <rect x="315" y="82" width="170" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">前提B</text>
  <text x="400" y="143" text-anchor="middle" font-size="15" fill="#166534">净值跟着海外资产</text>
  <text x="400" y="164" text-anchor="middle" font-size="15" fill="#166534">市价由买卖双方决定</text>

  <rect x="590" y="82" width="170" height="92" rx="8" fill="#ffedd5" stroke="#ea580c"/>
  <text x="675" y="114" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">前提C</text>
  <text x="675" y="143" text-anchor="middle" font-size="15" fill="#9a3412">QDII额度和申购</text>
  <text x="675" y="164" text-anchor="middle" font-size="15" fill="#9a3412">会限制供给</text>

  <path d="M210 128 H315" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M485 128 H590" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="172" y="222" width="456" height="80" rx="8" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="400" y="255" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">推导</text>
  <text x="400" y="282" text-anchor="middle" font-size="16" fill="#312e81">当买盘快于套利供给, 市价会高于参考净值</text>

  <path d="M400 174 V222" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="185" y="334" width="430" height="58" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="400" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">操作结论</text>
  <text x="400" y="382" text-anchor="middle" font-size="16" fill="#991b1b">先看溢价率, 再下单; 高溢价时宁可错过, 不追买</text>

  <path d="M400 302 V334" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
