<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="高溢价买入后的情景分支">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">同样买海外指数, 成本不同, 结局不同</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="285" y="70" width="230" height="70" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="400" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">买入前先算溢价</text>
  <text x="400" y="124" text-anchor="middle" font-size="15" fill="#334155">溢价率 = 市价 / 参考净值 - 1</text>

  <path d="M400 140 V176" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="70" y="176" width="280" height="82" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="210" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">溢价很低</text>
  <text x="210" y="232" text-anchor="middle" font-size="15" fill="#166534">例如 0%-1% 附近</text>
  <text x="210" y="252" text-anchor="middle" font-size="15" fill="#166534">主要承担海外资产本身波动</text>

  <rect x="450" y="176" width="280" height="82" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="590" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">溢价很高</text>
  <text x="590" y="232" text-anchor="middle" font-size="15" fill="#991b1b">例如 5%-10% 以上</text>
  <text x="590" y="252" text-anchor="middle" font-size="15" fill="#991b1b">先亏在买贵的那一层</text>

  <path d="M350 217 H450" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="70" y="306" width="280" height="76" rx="8" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="210" y="335" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">正常结论</text>
  <text x="210" y="360" text-anchor="middle" font-size="15" fill="#14532d">按全球配置计划买入或定投</text>

  <rect x="450" y="306" width="280" height="76" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="590" y="335" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">替代结论</text>
  <text x="590" y="360" text-anchor="middle" font-size="15" fill="#9a3412">暂停追买, 等溢价回落或换低溢价工具</text>

  <path d="M210 258 V306" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M590 258 V306" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
</svg>
