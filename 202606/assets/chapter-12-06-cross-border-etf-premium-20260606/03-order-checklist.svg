<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="跨境ETF下单前检查流程">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">跨境ETF下单前四步检查</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect x="70" y="82" width="660" height="58" rx="8" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="110" y="118" font-size="18" font-weight="700" fill="#134e4a">1</text>
  <text x="150" y="118" font-size="17" fill="#134e4a">确认标的: 跟踪什么市场、什么指数、什么货币</text>

  <path d="M400 140 V168" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="70" y="168" width="660" height="58" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="110" y="204" font-size="18" font-weight="700" fill="#1e3a8a">2</text>
  <text x="150" y="204" font-size="17" fill="#1e3a8a">看参考净值或IOPV: 市价有没有明显买贵</text>

  <path d="M400 226 V254" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="70" y="254" width="660" height="58" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="110" y="290" font-size="18" font-weight="700" fill="#854d0e">3</text>
  <text x="150" y="290" font-size="17" fill="#854d0e">看公告: 是否限购、暂停申购、风险提示或临时停牌</text>

  <path d="M400 312 V340" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="70" y="340" width="660" height="58" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="110" y="376" font-size="18" font-weight="700" fill="#991b1b">4</text>
  <text x="150" y="376" font-size="17" fill="#991b1b">定动作: 溢价低且仓位合适才买; 高溢价则等待或换工具</text>

  <text x="400" y="432" text-anchor="middle" font-size="16" fill="#475569">这四步的目的不是预测涨跌, 而是避免先把自己买贵</text>
</svg>
