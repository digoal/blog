<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">A股、港股、美股：不是三个代码池，而是三种风险暴露</text>

  <rect x="42" y="80" width="220" height="225" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="152" y="113" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">A股</text>
  <text x="70" y="150" font-size="16" fill="#111827">人民币在岸市场</text>
  <text x="70" y="180" font-size="16" fill="#111827">产业政策和流动性敏感</text>
  <text x="70" y="210" font-size="16" fill="#111827">中小盘和主题轮动更活跃</text>
  <text x="70" y="240" font-size="16" fill="#111827">适合表达国内产业周期</text>

  <rect x="290" y="80" width="220" height="225" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="113" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">港股</text>
  <text x="318" y="150" font-size="16" fill="#111827">离岸中国资产</text>
  <text x="318" y="180" font-size="16" fill="#111827">全球资金定价中国公司</text>
  <text x="318" y="210" font-size="16" fill="#111827">估值低但流动性分层</text>
  <text x="318" y="240" font-size="16" fill="#111827">适合补充估值修复暴露</text>

  <rect x="538" y="80" width="220" height="225" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="648" y="113" text-anchor="middle" font-size="22" font-weight="700" fill="#c2410c">美股</text>
  <text x="566" y="150" font-size="16" fill="#111827">美元全球核心资产</text>
  <text x="566" y="180" font-size="16" fill="#111827">龙头公司和盈利质量突出</text>
  <text x="566" y="210" font-size="16" fill="#111827">科技权重和估值敏感度高</text>
  <text x="566" y="240" font-size="16" fill="#111827">适合长期全球核心仓</text>

  <rect x="92" y="330" width="616" height="42" rx="8" fill="#111827"/>
  <text x="400" y="357" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">操作顺序：先问资金目标 -> 再选市场角色 -> 最后选ETF或个股</text>
</svg>
