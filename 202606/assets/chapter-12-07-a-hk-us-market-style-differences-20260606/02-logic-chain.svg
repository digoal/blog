<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">市场风格论证链</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="38" y="70" width="170" height="96" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="123" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提A：A股</text>
  <text x="61" y="128" font-size="14" fill="#111827">在岸人民币资产</text>
  <text x="61" y="150" font-size="14" fill="#111827">更敏感于国内周期</text>

  <rect x="230" y="70" width="170" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="315" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">前提B：港股</text>
  <text x="253" y="128" font-size="14" fill="#111827">离岸中国资产</text>
  <text x="253" y="150" font-size="14" fill="#111827">被全球资金重估</text>

  <rect x="422" y="70" width="170" height="96" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="507" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">前提C：美股</text>
  <text x="445" y="128" font-size="14" fill="#111827">美元核心资产</text>
  <text x="445" y="150" font-size="14" fill="#111827">龙头盈利驱动</text>

  <rect x="614" y="70" width="148" height="96" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="688" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#334155">前提D：小白</text>
  <text x="636" y="128" font-size="14" fill="#111827">不能混用规则</text>
  <text x="636" y="150" font-size="14" fill="#111827">必须先定角色</text>

  <line x1="123" y1="166" x2="250" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="315" y1="166" x2="340" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="507" y1="166" x2="460" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="688" y1="166" x2="550" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="188" y="220" width="424" height="72" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="#854d0e">推导：同一家公司，在不同市场会被不同资金和规则定价</text>
  <text x="400" y="275" text-anchor="middle" font-size="15" fill="#111827">所以先比较风险来源，再比较估值和涨跌</text>

  <line x1="400" y1="292" x2="400" y2="327" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="327" width="560" height="48" rx="8" fill="#111827"/>
  <text x="400" y="357" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论：A股看国内周期，港股看离岸重估，美股看全球核心仓</text>
</svg>
