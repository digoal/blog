<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">情景分支：先看目的，再选市场</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="302" y="72" width="196" height="52" rx="8" fill="#111827"/>
  <text x="400" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">这笔钱要买什么风险？</text>

  <line x1="400" y1="124" x2="145" y2="174" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="124" x2="400" y2="174" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="124" x2="655" y2="174" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="42" y="174" width="206" height="96" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="145" y="204" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">国内政策和产业周期</text>
  <text x="66" y="232" font-size="14" fill="#111827">优先：A股宽基/行业ETF</text>
  <text x="66" y="254" font-size="14" fill="#111827">失效：主题太拥挤就降仓</text>

  <rect x="297" y="174" width="206" height="96" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">中国资产估值修复</text>
  <text x="321" y="232" font-size="14" fill="#111827">优先：港股ETF/港股通ETF</text>
  <text x="321" y="254" font-size="14" fill="#111827">失效：流动性转弱就收缩</text>

  <rect x="552" y="174" width="206" height="96" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="655" y="204" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">全球核心权益暴露</text>
  <text x="576" y="232" font-size="14" fill="#111827">优先：美股宽基/QDII</text>
  <text x="576" y="254" font-size="14" fill="#111827">失效：美元和估值风险升高</text>

  <line x1="145" y1="270" x2="400" y2="318" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="270" x2="400" y2="318" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="655" y1="270" x2="400" y2="318" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="135" y="318" width="530" height="48" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="348" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">短期要用的钱：不做全球配置试验，先保流动性</text>
