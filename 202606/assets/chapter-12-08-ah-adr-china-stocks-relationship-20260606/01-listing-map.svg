<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">同一家公司，可以有多条交易通道</text>
  <rect x="300" y="72" width="200" height="70" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">中国公司经营实体</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">业务、利润、监管、治理的源头</text>

  <line x1="400" y1="142" x2="150" y2="190" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="142" x2="400" y2="190" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="142" x2="650" y2="190" stroke="#64748b" stroke-width="2"/>

  <rect x="58" y="190" width="210" height="126" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="163" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">A股</text>
  <text x="163" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">上海/深圳上市</text>
  <text x="163" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">人民币报价</text>
  <text x="163" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">内地投资者主导</text>

  <rect x="295" y="190" width="210" height="126" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">H股 / 港股普通股</text>
  <text x="400" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">香港上市</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">港元或人民币柜台</text>
  <text x="400" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">国际资金与南向资金参与</text>

  <rect x="532" y="190" width="210" height="126" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="637" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c2410c">ADR / ADS</text>
  <text x="637" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">美国市场交易</text>
  <text x="637" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">美元报价</text>
  <text x="637" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">按存托比例代表境外股份</text>

  <rect x="126" y="350" width="552" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">小白先问: 同一公司? 同一股份类别? 能否转换? 币种和费用是什么?</text>
</svg>
