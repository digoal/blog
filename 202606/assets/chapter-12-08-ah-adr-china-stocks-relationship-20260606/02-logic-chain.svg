<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从代码识别，推到操作选择</text>

  <rect x="42" y="86" width="150" height="76" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="117" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="117" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">交易代码不同</text>
  <text x="117" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">不等于公司不同</text>

  <rect x="222" y="86" width="150" height="76" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="297" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#047857">前提B</text>
  <text x="297" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">A/H不自由转换</text>
  <text x="297" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">价差会长期存在</text>

  <rect x="402" y="86" width="150" height="76" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="477" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#c2410c">前提C</text>
  <text x="477" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">ADR有比例</text>
  <text x="477" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">汇率和费用要折算</text>

  <rect x="582" y="86" width="150" height="76" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="657" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">中概是风险标签</text>
  <text x="657" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">不是股份类别</text>

  <line x1="117" y1="162" x2="117" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="297" y1="162" x2="297" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="477" y1="162" x2="477" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="657" y1="162" x2="657" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="117" y1="220" x2="657" y2="220" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="220" x2="400" y2="252" stroke="#64748b" stroke-width="2"/>

  <rect x="226" y="252" width="348" height="58" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">先画映射表，再比较价格</text>
  <text x="400" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">实体 - 股份类别 - 交易地 - 币种 - 转换路径</text>

  <line x1="400" y1="310" x2="400" y2="334" stroke="#64748b" stroke-width="2"/>
  <rect x="176" y="334" width="448" height="42" rx="8" fill="#0f172a"/>
  <text x="400" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">结论: 不做盲目套利，不把重复持仓当分散配置</text>
</svg>
