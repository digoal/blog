<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提不同，操作路径不同</text>

  <rect x="283" y="72" width="234" height="58" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">发现同名中国公司有多地代码</text>

  <line x1="400" y1="130" x2="155" y2="176" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="130" x2="400" y2="176" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="130" x2="645" y2="176" stroke="#64748b" stroke-width="2"/>

  <rect x="50" y="176" width="210" height="118" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">A/H同公司</text>
  <text x="155" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">不能自由搬砖</text>
  <text x="155" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">先算汇率后溢价</text>
  <text x="155" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">选更便宜入口，小仓观察</text>

  <rect x="295" y="176" width="210" height="118" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#047857">ADR/HK同股</text>
  <text x="400" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">按ADS比例折算</text>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">再看换汇、税费、转换</text>
  <text x="400" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">只买一个入口即可</text>

  <rect x="540" y="176" width="210" height="118" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">中概但无备份</text>
  <text x="645" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">交易地和经营地分离</text>
  <text x="645" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">退市/监管冲击更敏感</text>
  <text x="645" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">降仓位或不买</text>

  <rect x="120" y="344" width="560" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">纪律线</text>
  <text x="400" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">价差不是免费钱；多地上市不是自动分散；看不懂映射关系就不下单</text>
</svg>
