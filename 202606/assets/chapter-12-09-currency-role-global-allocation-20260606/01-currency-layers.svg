<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">全球配置里的三层汇率账</title>
  <desc id="desc">展示资产本身、计价货币、最终用钱币种三层如何共同决定全球配置的人民币结果。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">全球配置不是一笔账，而是三层账</text>
  <rect x="70" y="84" width="190" height="230" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="165" y="122" text-anchor="middle" font-size="20" font-weight="700" fill="#155e75">第一层</text>
  <text x="165" y="154" text-anchor="middle" font-size="18" fill="#155e75">资产本身</text>
  <text x="165" y="194" text-anchor="middle" font-size="14" fill="#334155">股票涨跌</text>
  <text x="165" y="222" text-anchor="middle" font-size="14" fill="#334155">债券利息</text>
  <text x="165" y="250" text-anchor="middle" font-size="14" fill="#334155">黄金价格</text>
  <text x="165" y="278" text-anchor="middle" font-size="14" fill="#334155">REITs现金流</text>
  <path d="M260 199 L330 199" stroke="#64748b" stroke-width="3"/>
  <polygon points="346,199 326,189 326,209" fill="#64748b"/>
  <rect x="350" y="84" width="190" height="230" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="445" y="122" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">第二层</text>
  <text x="445" y="154" text-anchor="middle" font-size="18" fill="#92400e">计价货币</text>
  <text x="445" y="194" text-anchor="middle" font-size="14" fill="#334155">港股多用港币</text>
  <text x="445" y="222" text-anchor="middle" font-size="14" fill="#334155">美股多用美元</text>
  <text x="445" y="250" text-anchor="middle" font-size="14" fill="#334155">QDII看底层币种</text>
  <text x="445" y="278" text-anchor="middle" font-size="14" fill="#334155">黄金常受美元影响</text>
  <path d="M540 199 L610 199" stroke="#64748b" stroke-width="3"/>
  <polygon points="626,199 606,189 606,209" fill="#64748b"/>
  <rect x="630" y="84" width="100" height="230" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="680" y="122" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">第三层</text>
  <text x="680" y="154" text-anchor="middle" font-size="18" fill="#166534">用钱币种</text>
  <text x="680" y="198" text-anchor="middle" font-size="14" fill="#334155">人民币</text>
  <text x="680" y="228" text-anchor="middle" font-size="14" fill="#334155">美元</text>
  <text x="680" y="258" text-anchor="middle" font-size="14" fill="#334155">港币</text>
  <rect x="120" y="340" width="560" height="38" rx="8" fill="#0f172a"/>
  <text x="400" y="364" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">最终结果 = 资产收益 × 汇率变化；操作先看未来用什么钱</text>
</svg>
