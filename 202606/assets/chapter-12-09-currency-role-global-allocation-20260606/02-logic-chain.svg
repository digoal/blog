<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">汇率在全球配置中的论证链</title>
  <desc id="desc">从跨境资产计价、家庭用钱币种、汇率波动和港币联系汇率推出年度再平衡结论。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">从事实到动作：汇率是风险层，不是预测题</text>
  <rect x="42" y="76" width="150" height="86" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="117" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#155e75">前提A</text>
  <text x="117" y="132" text-anchor="middle" font-size="13" fill="#155e75">海外资产有计价币种</text>
  <rect x="222" y="76" width="150" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="297" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">前提B</text>
  <text x="297" y="132" text-anchor="middle" font-size="13" fill="#92400e">多数家庭用人民币</text>
  <rect x="402" y="76" width="150" height="86" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="477" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">前提C</text>
  <text x="477" y="132" text-anchor="middle" font-size="13" fill="#3730a3">汇率会改写收益</text>
  <rect x="582" y="76" width="150" height="86" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">前提D</text>
  <text x="657" y="132" text-anchor="middle" font-size="13" fill="#166534">期限越短越怕错配</text>
  <path d="M117 162 L117 205 L297 205" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M297 162 L297 205" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M477 162 L477 205" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M657 162 L657 205 L477 205" stroke="#64748b" stroke-width="2" fill="none"/>
  <rect x="130" y="205" width="540" height="82" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">逻辑推导</text>
  <text x="400" y="262" text-anchor="middle" font-size="14" fill="#334155">因为收益最终要换回用钱币种，所以汇率必须进入仓位、期限和再平衡规则</text>
  <path d="M400 287 L400 326" stroke="#334155" stroke-width="3"/>
  <polygon points="400,344 391,326 409,326" fill="#334155"/>
  <rect x="110" y="344" width="580" height="38" rx="8" fill="#0f172a"/>
  <text x="400" y="369" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">结论：不猜汇率；做币种匹配、压力测试和年度再平衡</text>
</svg>
