<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">全球组合年度汇率复盘流程</title>
  <desc id="desc">展示从用钱币种到汇率压力测试，再到新增资金纠偏和再平衡的操作流程。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">年度复盘：先问用钱，再调仓位</text>
  <rect x="48" y="82" width="145" height="72" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="120" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">1. 写用途</text>
  <text x="120" y="136" text-anchor="middle" font-size="13" fill="#334155">未来花人民币还是外币</text>
  <path d="M193 118 L238 118" stroke="#64748b" stroke-width="3"/>
  <polygon points="254,118 234,108 234,128" fill="#64748b"/>
  <rect x="258" y="82" width="145" height="72" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="330" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">2. 拆币种</text>
  <text x="330" y="136" text-anchor="middle" font-size="13" fill="#334155">A股 港股 美股 QDII</text>
  <path d="M403 118 L448 118" stroke="#64748b" stroke-width="3"/>
  <polygon points="464,118 444,108 444,128" fill="#64748b"/>
  <rect x="468" y="82" width="145" height="72" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="540" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">3. 压力测试</text>
  <text x="540" y="136" text-anchor="middle" font-size="13" fill="#334155">反向波动5%-10%</text>
  <path d="M613 118 L658 118" stroke="#64748b" stroke-width="3"/>
  <polygon points="674,118 654,108 654,128" fill="#64748b"/>
  <rect x="678" y="82" width="105" height="72" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="730" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">4. 判偏离</text>
  <text x="730" y="136" text-anchor="middle" font-size="13" fill="#334155">是否超上限</text>
  <path d="M730 154 L730 210 L586 210" stroke="#64748b" stroke-width="3" fill="none"/>
  <polygon points="570,210 590,200 590,220" fill="#64748b"/>
  <rect x="422" y="178" width="148" height="82" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="496" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#9f1239">超配</text>
  <text x="496" y="238" text-anchor="middle" font-size="13" fill="#334155">暂停加钱或减回目标</text>
  <path d="M422 219 L356 219" stroke="#64748b" stroke-width="3"/>
  <polygon points="340,219 360,209 360,229" fill="#64748b"/>
  <rect x="190" y="178" width="150" height="82" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="265" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">低配</text>
  <text x="265" y="238" text-anchor="middle" font-size="13" fill="#334155">优先用新钱补足</text>
  <path d="M265 260 L265 306 L400 306" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M496 260 L496 306 L400 306" stroke="#64748b" stroke-width="3" fill="none"/>
  <rect x="210" y="306" width="380" height="46" rx="8" fill="#0f172a"/>
  <text x="400" y="335" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">回到目标比例，而不是追逐汇率高低点</text>
</svg>
