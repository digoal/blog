<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="全球组合四层结构">
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">全球组合不是凑热点，而是分任务</text>
  <rect x="56" y="92" width="155" height="210" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="134" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">A股核心</text>
  <text x="134" y="164" text-anchor="middle" font-size="15" fill="#374151">人民币资产底盘</text>
  <text x="134" y="194" text-anchor="middle" font-size="15" fill="#374151">内需与政策周期</text>
  <text x="134" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">30%-40%</text>
  <text x="134" y="264" text-anchor="middle" font-size="13" fill="#6b7280">宽基ETF / 指数基金</text>
  <rect x="235" y="92" width="155" height="210" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="313" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#16a34a">美股核心</text>
  <text x="313" y="164" text-anchor="middle" font-size="15" fill="#374151">全球龙头暴露</text>
  <text x="313" y="194" text-anchor="middle" font-size="15" fill="#374151">美元资产与科技</text>
  <text x="313" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">30%-40%</text>
  <text x="313" y="264" text-anchor="middle" font-size="13" fill="#6b7280">QDII / 跨境ETF</text>
  <rect x="414" y="92" width="155" height="210" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="492" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#d97706">港股补充</text>
  <text x="492" y="164" text-anchor="middle" font-size="15" fill="#374151">中国资产离岸定价</text>
  <text x="492" y="194" text-anchor="middle" font-size="15" fill="#374151">估值与流动性弹性</text>
  <text x="492" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">10%-20%</text>
  <text x="492" y="264" text-anchor="middle" font-size="13" fill="#6b7280">港股通 / 港股ETF</text>
  <rect x="593" y="92" width="155" height="210" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="671" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">防守资产</text>
  <text x="671" y="164" text-anchor="middle" font-size="15" fill="#374151">降低组合脆弱性</text>
  <text x="671" y="194" text-anchor="middle" font-size="15" fill="#374151">黄金 / 债券 / 现金</text>
  <text x="671" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">10%-30%</text>
  <text x="671" y="264" text-anchor="middle" font-size="13" fill="#6b7280">不等于保本</text>
  <line x1="134" y1="320" x2="671" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="354" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">先定比例，再选工具，最后按年度再平衡执行</text>
</svg>
