<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="全球组合论证链">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">全球组合论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="38" y="78" width="165" height="92" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="121" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="121" y="138" text-anchor="middle" font-size="14" fill="#1f2937">市场风险来源不同</text>
  <rect x="38" y="224" width="165" height="92" rx="8" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="121" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">前提B</text>
  <text x="121" y="284" text-anchor="middle" font-size="14" fill="#1f2937">普通人能走合规通道</text>
  <rect x="246" y="78" width="165" height="92" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="329" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">前提C</text>
  <text x="329" y="138" text-anchor="middle" font-size="14" fill="#1f2937">赢家会轮换</text>
  <rect x="246" y="224" width="165" height="92" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="329" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">前提D</text>
  <text x="329" y="284" text-anchor="middle" font-size="14" fill="#1f2937">小白优势是纪律</text>
  <line x1="203" y1="124" x2="246" y2="124" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="203" y1="270" x2="246" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="411" y1="124" x2="472" y2="197" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="411" y1="270" x2="472" y2="203" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="472" y="128" width="126" height="144" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="535" y="170" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">推导</text>
  <text x="535" y="202" text-anchor="middle" font-size="14" fill="#1f2937">不猜冠军市场</text>
  <text x="535" y="230" text-anchor="middle" font-size="14" fill="#1f2937">用比例管理风险</text>
  <line x1="598" y1="200" x2="650" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="650" y="118" width="112" height="164" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="706" y="154" text-anchor="middle" font-size="17" font-weight="700" fill="#be123c">结论</text>
  <text x="706" y="188" text-anchor="middle" font-size="13" fill="#1f2937">A股核心</text>
  <text x="706" y="214" text-anchor="middle" font-size="13" fill="#1f2937">美股核心</text>
  <text x="706" y="240" text-anchor="middle" font-size="13" fill="#1f2937">港股补充</text>
  <text x="706" y="266" text-anchor="middle" font-size="13" fill="#1f2937">防守资产</text>
  <text x="400" y="362" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">目标比例 + 偏离阈值 = 把追涨杀跌改成年度维护</text>
</svg>
