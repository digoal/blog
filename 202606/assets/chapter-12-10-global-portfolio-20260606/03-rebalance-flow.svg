<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="全球组合年度再平衡流程">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">年度再平衡流程</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="44" y="88" width="145" height="76" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="117" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">1. 写目标比例</text>
  <text x="117" y="144" text-anchor="middle" font-size="13" fill="#374151">四类资产各占多少</text>
  <line x1="189" y1="126" x2="238" y2="126" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="238" y="88" width="145" height="76" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="311" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">2. 每年检查</text>
  <text x="311" y="144" text-anchor="middle" font-size="13" fill="#374151">用市值算实际比例</text>
  <line x1="383" y1="126" x2="432" y2="126" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="432" y="88" width="145" height="76" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="505" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">3. 看偏离</text>
  <text x="505" y="144" text-anchor="middle" font-size="13" fill="#374151">超过5个百分点触发</text>
  <line x1="577" y1="126" x2="626" y2="126" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="626" y="88" width="130" height="76" rx="8" fill="#ffffff" stroke="#e11d48" stroke-width="2"/>
  <text x="691" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#be123c">4. 拉回目标</text>
  <text x="691" y="144" text-anchor="middle" font-size="13" fill="#374151">卖高补低或用新增资金</text>
  <rect x="88" y="226" width="180" height="92" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="178" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">情景A</text>
  <text x="178" y="286" text-anchor="middle" font-size="13" fill="#1f2937">美股从35%涨到45%</text>
  <text x="178" y="310" text-anchor="middle" font-size="13" fill="#1f2937">减回目标或上限</text>
  <rect x="310" y="226" width="180" height="92" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="400" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">情景B</text>
  <text x="400" y="286" text-anchor="middle" font-size="13" fill="#1f2937">港股从15%跌到9%</text>
  <text x="400" y="310" text-anchor="middle" font-size="13" fill="#1f2937">先查前提，再补到目标</text>
  <rect x="532" y="226" width="180" height="92" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="622" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">情景C</text>
  <text x="622" y="286" text-anchor="middle" font-size="13" fill="#1f2937">防守资产同步失效</text>
  <text x="622" y="310" text-anchor="middle" font-size="13" fill="#1f2937">降低久期和单一工具</text>
  <text x="400" y="362" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">再平衡不是预测下一年，而是修正已经偏离的风险</text>
</svg>
