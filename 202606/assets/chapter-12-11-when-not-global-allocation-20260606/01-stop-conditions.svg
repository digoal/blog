<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">全球配置的三个停止条件</title>
  <desc id="desc">展示不懂规则、短期要用钱、只为追热点这三个条件如何触发暂停全球配置。</desc>
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">全球配置不是越早越好，先看三个停止条件</text>

  <rect x="55" y="95" width="210" height="195" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" font-size="21" font-weight="700" fill="#1d4ed8">不懂规则</text>
  <text x="82" y="168" font-size="16" fill="#374151">不知道:</text>
  <text x="82" y="197" font-size="16" fill="#374151">交易、汇率、税费</text>
  <text x="82" y="226" font-size="16" fill="#374151">申赎、溢价、合规</text>
  <line x1="82" y1="248" x2="238" y2="248" stroke="#d1d5db"/>
  <text x="160" y="273" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">先学规则，不下单</text>

  <rect x="295" y="95" width="210" height="195" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-size="21" font-weight="700" fill="#b91c1c">短期要用钱</text>
  <text x="322" y="168" font-size="16" fill="#374151">3年内可能用于:</text>
  <text x="322" y="197" font-size="16" fill="#374151">买房、学费、还债</text>
  <text x="322" y="226" font-size="16" fill="#374151">生活备用、经营周转</text>
  <line x1="322" y1="248" x2="478" y2="248" stroke="#d1d5db"/>
  <text x="400" y="273" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">留现金和低波动资产</text>

  <rect x="535" y="95" width="210" height="195" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" font-size="21" font-weight="700" fill="#b45309">只为追热点</text>
  <text x="562" y="168" font-size="16" fill="#374151">买入理由只有:</text>
  <text x="562" y="197" font-size="16" fill="#374151">新闻很热、别人赚钱</text>
  <text x="562" y="226" font-size="16" fill="#374151">短线涨幅、社群情绪</text>
  <line x1="562" y1="248" x2="718" y2="248" stroke="#d1d5db"/>
  <text x="640" y="273" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">等计划，不追价</text>

  <path d="M160 300 L160 330 L400 330" fill="none" stroke="#6b7280" stroke-width="2"/>
  <path d="M400 300 L400 330" fill="none" stroke="#6b7280" stroke-width="2"/>
  <path d="M640 300 L640 330 L400 330" fill="none" stroke="#6b7280" stroke-width="2"/>
  <rect x="245" y="330" width="310" height="45" rx="8" fill="#111827"/>
  <text x="400" y="358" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">任意一个成立：暂停全球配置</text>
</svg>
