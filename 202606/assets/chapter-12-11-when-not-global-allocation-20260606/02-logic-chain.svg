<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">什么时候不要做全球配置的论证链</title>
  <desc id="desc">从前提到推导再到操作结论的因果路径。</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">论证链：先保资金用途，再谈全球配置</text>

  <rect x="35" y="78" width="170" height="95" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="120" y="108" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="120" y="137" text-anchor="middle" font-size="15" fill="#374151">全球资产有</text>
  <text x="120" y="160" text-anchor="middle" font-size="15" fill="#374151">规则差异</text>

  <rect x="35" y="205" width="170" height="95" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="120" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">前提B</text>
  <text x="120" y="264" text-anchor="middle" font-size="15" fill="#374151">全球市场也会</text>
  <text x="120" y="287" text-anchor="middle" font-size="15" fill="#374151">同步大跌</text>

  <rect x="35" y="332" width="170" height="65" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="120" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">前提C</text>
  <text x="120" y="382" text-anchor="middle" font-size="15" fill="#374151">热点会放大溢价</text>

  <path d="M205 125 H280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M205 253 H280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M205 365 H280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="280" y="92" width="240" height="245" rx="8" fill="#f9fafb" stroke="#9ca3af"/>
  <text x="400" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">逻辑推导</text>
  <text x="305" y="166" font-size="16" fill="#374151">因为规则不同，</text>
  <text x="305" y="191" font-size="16" fill="#374151">所以先要知道买的是什么。</text>
  <text x="305" y="231" font-size="16" fill="#374151">因为全球资产也会回撤，</text>
  <text x="305" y="256" font-size="16" fill="#374151">所以短期钱不能承受波动。</text>
  <text x="305" y="296" font-size="16" fill="#374151">因为热点常带来高溢价，</text>
  <text x="305" y="321" font-size="16" fill="#374151">所以追热度不是配置。</text>

  <path d="M520 214 H590" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="590" y="145" width="170" height="135" rx="8" fill="#111827"/>
  <text x="675" y="178" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">结论</text>
  <text x="675" y="210" text-anchor="middle" font-size="16" fill="#ffffff">先暂停</text>
  <text x="675" y="235" text-anchor="middle" font-size="16" fill="#ffffff">补规则、保现金</text>
  <text x="675" y="260" text-anchor="middle" font-size="16" fill="#ffffff">再小仓位验证</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
