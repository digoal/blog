<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">全球配置前提变化的情景分支</title>
  <desc id="desc">展示不同前提下全球配置应该暂停、学习、等待或小仓位执行。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">前提一变，操作也要变</text>

  <rect x="310" y="75" width="180" height="56" rx="8" fill="#111827"/>
  <text x="400" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">想做全球配置</text>

  <path d="M400 131 V165" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="165" width="280" height="60" rx="8" fill="#ffffff" stroke="#6b7280"/>
  <text x="400" y="190" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">先问：规则、钱的期限、买入理由</text>
  <text x="400" y="213" text-anchor="middle" font-size="14" fill="#4b5563">三问都合格，才进入下一步</text>

  <path d="M260 195 H120 V255" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="255" width="200" height="82" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="140" y="283" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">任意一问不合格</text>
  <text x="140" y="309" text-anchor="middle" font-size="15" fill="#374151">不下单</text>
  <text x="140" y="331" text-anchor="middle" font-size="15" fill="#374151">补规则或保留现金</text>

  <path d="M400 225 V255" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="285" y="255" width="230" height="82" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="400" y="283" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">三问合格</text>
  <text x="400" y="309" text-anchor="middle" font-size="15" fill="#374151">用核心+补充+防守</text>
  <text x="400" y="331" text-anchor="middle" font-size="15" fill="#374151">小仓位、分批、再平衡</text>

  <path d="M540 195 H670 V255" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="255" width="200" height="82" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="660" y="283" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">后来前提恶化</text>
  <text x="660" y="309" text-anchor="middle" font-size="15" fill="#374151">溢价升高或要用钱</text>
  <text x="660" y="331" text-anchor="middle" font-size="15" fill="#374151">停止加仓，转防守</text>

  <rect x="222" y="365" width="356" height="42" rx="8" fill="#ffffff" stroke="#9ca3af"/>
  <text x="400" y="391" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">全球配置的纪律：先通过三问，再给仓位</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
