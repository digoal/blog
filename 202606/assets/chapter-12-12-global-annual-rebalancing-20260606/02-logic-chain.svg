<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">全球资产年度再平衡的论证链</text>
  <text x="40" y="72" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">再平衡不是预测涨跌，而是让风险回到自己能承受的范围</text>

  <rect x="40" y="105" width="160" height="88" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="64" y="132" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="64" y="158" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a">全球资产涨跌不同</text>
  <text x="64" y="180" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">比例会自然漂移</text>

  <rect x="225" y="105" width="160" height="88" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="249" y="132" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">前提B</text>
  <text x="249" y="158" font-family="Arial, sans-serif" font-size="14" fill="#14532d">目标比例是风险预算</text>
  <text x="249" y="180" font-family="Arial, sans-serif" font-size="13" fill="#166534">不是收益排行榜</text>

  <rect x="410" y="105" width="160" height="88" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="434" y="132" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#78350f">前提C</text>
  <text x="434" y="158" font-family="Arial, sans-serif" font-size="14" fill="#78350f">交易有费用和税务</text>
  <text x="434" y="180" font-family="Arial, sans-serif" font-size="13" fill="#92400e">太频繁会损耗收益</text>

  <rect x="595" y="105" width="160" height="88" rx="10" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="619" y="132" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#581c87">前提D</text>
  <text x="619" y="158" font-family="Arial, sans-serif" font-size="14" fill="#581c87">人容易追涨杀跌</text>
  <text x="619" y="180" font-family="Arial, sans-serif" font-size="13" fill="#6b21a8">需要机械规则</text>

  <path d="M200 149 H225" stroke="#9ca3af" stroke-width="2"/>
  <path d="M385 149 H410" stroke="#9ca3af" stroke-width="2"/>
  <path d="M570 149 H595" stroke="#9ca3af" stroke-width="2"/>

  <rect x="92" y="245" width="250" height="78" rx="12" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="116" y="274" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">推导</text>
  <text x="116" y="299" font-family="Arial, sans-serif" font-size="14" fill="#374151">因为会漂移，所以要检查；</text>
  <text x="116" y="320" font-family="Arial, sans-serif" font-size="14" fill="#374151">因为有成本，所以只在偏离够大时动。</text>

  <path d="M342 284 H402" stroke="#64748b" stroke-width="2"/>
  <path d="M392 276 L404 284 L392 292" fill="none" stroke="#64748b" stroke-width="2"/>

  <rect x="404" y="235" width="304" height="98" rx="12" fill="#ecfdf5" stroke="#10b981"/>
  <text x="430" y="266" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#064e3b">结论</text>
  <text x="430" y="292" font-family="Arial, sans-serif" font-size="14" fill="#065f46">每年固定一次体检</text>
  <text x="430" y="314" font-family="Arial, sans-serif" font-size="14" fill="#065f46">超过阈值才再平衡，优先用现金和新增资金</text>
</svg>
