<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">年度再平衡操作流程</text>
  <text x="40" y="72" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">先看目标，再看偏离，最后决定是否交易</text>

  <rect x="54" y="116" width="150" height="62" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="88" y="143" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">1. 年度体检</text>
  <text x="78" y="164" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">汇总所有账户市值</text>

  <path d="M204 147 H249" stroke="#64748b" stroke-width="2"/>
  <path d="M239 139 L251 147 L239 155" fill="none" stroke="#64748b" stroke-width="2"/>

  <rect x="251" y="116" width="150" height="62" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="278" y="143" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">2. 计算偏离</text>
  <text x="278" y="164" font-family="Arial, sans-serif" font-size="13" fill="#166534">实际比例 - 目标比例</text>

  <path d="M401 147 H446" stroke="#64748b" stroke-width="2"/>
  <path d="M436 139 L448 147 L436 155" fill="none" stroke="#64748b" stroke-width="2"/>

  <rect x="448" y="105" width="150" height="84" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="476" y="133" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#78350f">3. 触发阈值?</text>
  <text x="470" y="157" font-family="Arial, sans-serif" font-size="13" fill="#92400e">超过5个百分点</text>
  <text x="470" y="176" font-family="Arial, sans-serif" font-size="13" fill="#92400e">或小仓位偏离25%</text>

  <path d="M598 147 H645" stroke="#64748b" stroke-width="2"/>
  <path d="M635 139 L647 147 L635 155" fill="none" stroke="#64748b" stroke-width="2"/>

  <rect x="647" y="116" width="110" height="62" rx="10" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="676" y="143" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">否</text>
  <text x="672" y="164" font-family="Arial, sans-serif" font-size="13" fill="#374151">记录，不交易</text>

  <path d="M523 189 V236" stroke="#64748b" stroke-width="2"/>
  <path d="M515 226 L523 238 L531 226" fill="none" stroke="#64748b" stroke-width="2"/>
  <text x="537" y="218" font-family="Arial, sans-serif" font-size="14" fill="#374151">是</text>

  <rect x="296" y="238" width="190" height="62" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <text x="325" y="264" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#064e3b">4. 先用现金和新增资金</text>
  <text x="328" y="285" font-family="Arial, sans-serif" font-size="13" fill="#065f46">补低配资产，少卖出</text>

  <path d="M486 269 H531" stroke="#64748b" stroke-width="2"/>
  <path d="M521 261 L533 269 L521 277" fill="none" stroke="#64748b" stroke-width="2"/>

  <rect x="533" y="238" width="190" height="62" rx="10" fill="#fee2e2" stroke="#ef4444"/>
  <text x="562" y="264" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">5. 不够再卖超配资产</text>
  <text x="560" y="285" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">检查税费、溢价、流动性</text>

  <rect x="74" y="325" width="650" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="104" y="349" font-family="Arial, sans-serif" font-size="14" fill="#111827">执行后写复盘：目标比例、实际比例、交易原因、费用、下一次检查日期</text>
</svg>
