<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">商品资产地图：买的是现实世界的原材料价格</text>
  <rect x="55" y="95" width="205" height="210" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <rect x="298" y="95" width="205" height="210" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <rect x="540" y="95" width="205" height="210" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="158" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">能源</text>
  <text x="158" y="172" text-anchor="middle" font-size="17" fill="#1f2937">原油</text>
  <text x="158" y="207" text-anchor="middle" font-size="17" fill="#1f2937">天然气</text>
  <text x="158" y="242" text-anchor="middle" font-size="17" fill="#1f2937">汽油/燃料油</text>
  <text x="158" y="278" text-anchor="middle" font-size="15" fill="#7c2d12">像经济的燃料箱</text>
  <text x="400" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">金属</text>
  <text x="400" y="172" text-anchor="middle" font-size="17" fill="#1f2937">黄金/白银</text>
  <text x="400" y="207" text-anchor="middle" font-size="17" fill="#1f2937">铜/铝/锌</text>
  <text x="400" y="242" text-anchor="middle" font-size="17" fill="#1f2937">镍/铅/锡</text>
  <text x="400" y="278" text-anchor="middle" font-size="15" fill="#14532d">像工业和避险的温度计</text>
  <text x="642" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">农产品</text>
  <text x="642" y="172" text-anchor="middle" font-size="17" fill="#1f2937">玉米/小麦</text>
  <text x="642" y="207" text-anchor="middle" font-size="17" fill="#1f2937">大豆/豆油</text>
  <text x="642" y="242" text-anchor="middle" font-size="17" fill="#1f2937">糖/棉花/咖啡</text>
  <text x="642" y="278" text-anchor="middle" font-size="15" fill="#1e3a8a">像粮食和天气的报价单</text>
  <rect x="132" y="335" width="536" height="36" rx="18" fill="#111827"/>
  <text x="400" y="358" text-anchor="middle" font-size="16" fill="#ffffff">共同点：没有现金流，核心看供需、库存、美元、地缘和天气</text>
</svg>
