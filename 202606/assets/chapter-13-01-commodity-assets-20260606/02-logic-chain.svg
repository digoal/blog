<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">商品资产论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="35" y="88" width="155" height="92" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="112" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提A</text>
  <text x="112" y="146" text-anchor="middle" font-size="15" fill="#334155">商品是实物原料</text>
  <text x="112" y="168" text-anchor="middle" font-size="14" fill="#64748b">无股息和利润表</text>
  <rect x="225" y="88" width="155" height="92" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="302" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">前提B</text>
  <text x="302" y="146" text-anchor="middle" font-size="15" fill="#334155">价格由供需库存决定</text>
  <text x="302" y="168" text-anchor="middle" font-size="14" fill="#64748b">缺口会放大波动</text>
  <rect x="415" y="88" width="155" height="92" rx="10" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="492" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提C</text>
  <text x="492" y="146" text-anchor="middle" font-size="15" fill="#334155">散户多买金融工具</text>
  <text x="492" y="168" text-anchor="middle" font-size="14" fill="#64748b">ETF/基金/行业资产</text>
  <rect x="605" y="88" width="155" height="92" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="682" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">前提D</text>
  <text x="682" y="146" text-anchor="middle" font-size="15" fill="#334155">期货自带杠杆</text>
  <text x="682" y="168" text-anchor="middle" font-size="14" fill="#64748b">保证金会放大损益</text>
  <line x1="190" y1="134" x2="225" y2="134" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="134" x2="415" y2="134" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="134" x2="605" y2="134" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="95" y="232" width="610" height="70" rx="12" fill="#111827"/>
  <text x="400" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">推导：先识别品类和驱动，再选择低杠杆工具</text>
  <text x="400" y="286" text-anchor="middle" font-size="16" fill="#cbd5e1">不懂供需和工具结构时，价格上涨也不能构成重仓理由</text>
  <line x1="400" y1="180" x2="400" y2="232" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="335" width="440" height="42" rx="21" fill="#fef2f2" stroke="#ef4444"/>
  <text x="400" y="362" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">结论：小白只用小仓位学习商品，不把期货当默认入口</text>
</svg>
