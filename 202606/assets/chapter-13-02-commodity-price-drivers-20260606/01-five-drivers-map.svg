<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#111827" font-weight="700">商品价格的五个变量</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">不是猜新闻，而是看每个变量在推高还是压低价格</text>

  <rect x="320" y="160" width="160" height="78" rx="8" fill="#111827"/>
  <text x="400" y="191" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#ffffff" font-weight="700">商品价格</text>
  <text x="400" y="218" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#d1d5db">最终成交结果</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="116" width="150" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="135" y="146" text-anchor="middle" font-size="18" fill="#1e3a8a" font-weight="700">供需</text>
    <text x="135" y="171" text-anchor="middle" font-size="13" fill="#1e40af">买的人和卖的货</text>

    <rect x="60" y="232" width="150" height="72" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="135" y="262" text-anchor="middle" font-size="18" fill="#14532d" font-weight="700">库存</text>
    <text x="135" y="287" text-anchor="middle" font-size="13" fill="#166534">仓库里的缓冲垫</text>

    <rect x="590" y="84" width="150" height="72" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="665" y="114" text-anchor="middle" font-size="18" fill="#78350f" font-weight="700">美元</text>
    <text x="665" y="139" text-anchor="middle" font-size="13" fill="#92400e">全球报价的尺子</text>

    <rect x="590" y="190" width="150" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="665" y="220" text-anchor="middle" font-size="18" fill="#7f1d1d" font-weight="700">地缘</text>
    <text x="665" y="245" text-anchor="middle" font-size="13" fill="#991b1b">运输和供应风险</text>

    <rect x="590" y="296" width="150" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="665" y="326" text-anchor="middle" font-size="18" fill="#4c1d95" font-weight="700">天气</text>
    <text x="665" y="351" text-anchor="middle" font-size="13" fill="#5b21b6">收成和运输扰动</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M210 152 C260 152, 282 178, 320 188"/>
    <path d="M210 268 C260 268, 282 224, 320 214"/>
    <path d="M590 120 C540 120, 515 164, 480 180"/>
    <path d="M590 226 C540 226, 515 216, 480 208"/>
    <path d="M590 332 C535 316, 510 252, 470 226"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
