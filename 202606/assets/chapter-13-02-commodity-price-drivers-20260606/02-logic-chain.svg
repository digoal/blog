<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#111827" font-weight="700">商品价格判断论证链</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">从物理缺口出发，再看金融变量和突发扰动</text>

  <g font-family="Arial, sans-serif">
    <rect x="35" y="105" width="160" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="115" y="134" text-anchor="middle" font-size="17" fill="#1e3a8a" font-weight="700">前提A</text>
    <text x="115" y="160" text-anchor="middle" font-size="13" fill="#1e40af">商品有真实用途</text>
    <text x="115" y="181" text-anchor="middle" font-size="13" fill="#1e40af">不能只看情绪</text>

    <rect x="225" y="105" width="160" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="305" y="134" text-anchor="middle" font-size="17" fill="#14532d" font-weight="700">前提B</text>
    <text x="305" y="160" text-anchor="middle" font-size="13" fill="#166534">库存是缓冲垫</text>
    <text x="305" y="181" text-anchor="middle" font-size="13" fill="#166534">低库存放大波动</text>

    <rect x="415" y="105" width="160" height="92" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="495" y="134" text-anchor="middle" font-size="17" fill="#78350f" font-weight="700">前提C</text>
    <text x="495" y="160" text-anchor="middle" font-size="13" fill="#92400e">美元影响全球报价</text>
    <text x="495" y="181" text-anchor="middle" font-size="13" fill="#92400e">汇率改变购买力</text>

    <rect x="605" y="105" width="160" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="685" y="134" text-anchor="middle" font-size="17" fill="#7f1d1d" font-weight="700">前提D</text>
    <text x="685" y="160" text-anchor="middle" font-size="13" fill="#991b1b">地缘和天气</text>
    <text x="685" y="181" text-anchor="middle" font-size="13" fill="#991b1b">制造突发缺口</text>

    <rect x="120" y="250" width="230" height="84" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="235" y="281" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">推导</text>
    <text x="235" y="306" text-anchor="middle" font-size="13" fill="#475569">缺口 + 低库存 = 价格弹性变大</text>

    <rect x="450" y="250" width="230" height="84" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="565" y="281" text-anchor="middle" font-size="17" fill="#111827" font-weight="700">结论</text>
    <text x="565" y="306" text-anchor="middle" font-size="13" fill="#475569">只在多变量同向时参与</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M195 151 H225"/>
    <path d="M385 151 H415"/>
    <path d="M575 151 H605"/>
    <path d="M305 197 C305 222, 255 224, 245 250"/>
    <path d="M685 197 C685 232, 600 225, 575 250"/>
    <path d="M350 292 H450"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
