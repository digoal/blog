<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#111827" font-weight="700">变量变化后的操作分支</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">同一条新闻，只有放进变量组合里才有意义</text>

  <rect x="310" y="92" width="180" height="70" rx="8" fill="#111827"/>
  <text x="400" y="122" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" font-weight="700">先看供需和库存</text>
  <text x="400" y="146" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#d1d5db">有没有真实缺口</text>

  <g font-family="Arial, sans-serif">
    <rect x="48" y="235" width="190" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="143" y="263" text-anchor="middle" font-size="16" fill="#14532d" font-weight="700">缺口扩大 + 库存低</text>
    <text x="143" y="289" text-anchor="middle" font-size="13" fill="#166534">价格上涨弹性增强</text>
    <text x="143" y="310" text-anchor="middle" font-size="13" fill="#166534">低风险工具小仓参与</text>

    <rect x="286" y="235" width="190" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="381" y="263" text-anchor="middle" font-size="16" fill="#78350f" font-weight="700">缺口存在 + 美元走强</text>
    <text x="381" y="289" text-anchor="middle" font-size="13" fill="#92400e">上涨可能被压制</text>
    <text x="381" y="310" text-anchor="middle" font-size="13" fill="#92400e">只观察或降低仓位</text>

    <rect x="524" y="235" width="190" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="619" y="263" text-anchor="middle" font-size="16" fill="#7f1d1d" font-weight="700">新闻很热 + 库存高</text>
    <text x="619" y="289" text-anchor="middle" font-size="13" fill="#991b1b">价格容易冲高回落</text>
    <text x="619" y="310" text-anchor="middle" font-size="13" fill="#991b1b">不追涨，不加杠杆</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M350 162 C275 190, 200 208, 143 235"/>
    <path d="M400 162 C395 190, 386 210, 381 235"/>
    <path d="M450 162 C520 190, 580 208, 619 235"/>
  </g>

  <rect x="118" y="360" width="564" height="38" rx="6" fill="#e5e7eb"/>
  <text x="400" y="384" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#374151">小白默认规则：变量不同向，不重仓；工具不清楚，不参与；有杠杆，先退出。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
