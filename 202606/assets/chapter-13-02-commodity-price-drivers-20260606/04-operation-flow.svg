<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#111827" font-weight="700">小白商品参与流程</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">先判断变量，再选低风险路径，最后写退出条件</text>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="135" width="135" height="82" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="112" y="166" text-anchor="middle" font-size="16" fill="#1e3a8a" font-weight="700">1 看用途</text>
    <text x="112" y="190" text-anchor="middle" font-size="12" fill="#1e40af">能源 金属 农产品</text>

    <rect x="215" y="135" width="135" height="82" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="282" y="166" text-anchor="middle" font-size="16" fill="#14532d" font-weight="700">2 查库存</text>
    <text x="282" y="190" text-anchor="middle" font-size="12" fill="#166534">缓冲垫厚不厚</text>

    <rect x="385" y="135" width="135" height="82" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="452" y="166" text-anchor="middle" font-size="16" fill="#78350f" font-weight="700">3 看美元</text>
    <text x="452" y="190" text-anchor="middle" font-size="12" fill="#92400e">顺风还是逆风</text>

    <rect x="555" y="135" width="135" height="82" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="622" y="166" text-anchor="middle" font-size="16" fill="#7f1d1d" font-weight="700">4 看扰动</text>
    <text x="622" y="190" text-anchor="middle" font-size="12" fill="#991b1b">地缘 天气 运输</text>

    <rect x="215" y="285" width="350" height="56" rx="8" fill="#111827"/>
    <text x="390" y="319" text-anchor="middle" font-size="17" fill="#ffffff" font-weight="700">5 只用ETF/基金/资源ETF小仓位表达观点</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M180 176 H215"/>
    <path d="M350 176 H385"/>
    <path d="M520 176 H555"/>
    <path d="M622 217 C622 260, 515 278, 455 285"/>
    <path d="M112 217 C112 260, 220 278, 315 285"/>
  </g>

  <text x="400" y="370" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">退出条件：库存回升、美元逆风、扰动解除、仓位超过上限，满足任一项就复盘。</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
