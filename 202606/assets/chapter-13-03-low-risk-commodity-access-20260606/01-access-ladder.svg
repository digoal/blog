<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">小白参与商品的工具阶梯</title>
  <desc id="desc">从商品ETF、商品基金、资源行业ETF到直接期货，展示风险边界逐级升高。</desc>
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">商品参与工具阶梯: 先隔离杠杆, 再谈收益</text>
  <line x1="90" y1="315" x2="710" y2="315" stroke="#cbd5e1" stroke-width="3"/>
  <g>
    <rect x="90" y="230" width="140" height="85" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="160" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">商品ETF</text>
    <text x="160" y="286" text-anchor="middle" font-size="14" fill="#1e3a8a">如黄金ETF</text>
    <text x="160" y="306" text-anchor="middle" font-size="13" fill="#1e3a8a">无个人追加保证金</text>
  </g>
  <g>
    <rect x="250" y="185" width="140" height="130" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="320" y="218" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">商品基金</text>
    <text x="320" y="245" text-anchor="middle" font-size="14" fill="#14532d">基金经理处理</text>
    <text x="320" y="267" text-anchor="middle" font-size="14" fill="#14532d">合约与展期</text>
    <text x="320" y="292" text-anchor="middle" font-size="13" fill="#14532d">风险看净值回撤</text>
  </g>
  <g>
    <rect x="410" y="140" width="140" height="175" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="480" y="176" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">资源行业ETF</text>
    <text x="480" y="205" text-anchor="middle" font-size="14" fill="#78350f">买的是股票</text>
    <text x="480" y="228" text-anchor="middle" font-size="14" fill="#78350f">不是商品本身</text>
    <text x="480" y="253" text-anchor="middle" font-size="13" fill="#78350f">叠加股市与公司风险</text>
  </g>
  <g>
    <rect x="570" y="85" width="140" height="230" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="640" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">直接期货</text>
    <text x="640" y="154" text-anchor="middle" font-size="14" fill="#7f1d1d">保证金</text>
    <text x="640" y="176" text-anchor="middle" font-size="14" fill="#7f1d1d">每日结算</text>
    <text x="640" y="198" text-anchor="middle" font-size="14" fill="#7f1d1d">合约到期</text>
    <text x="640" y="222" text-anchor="middle" font-size="13" fill="#7f1d1d">不作为小白默认路径</text>
  </g>
  <path d="M115 342 L685 342" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="370" text-anchor="middle" font-size="16" fill="#334155">越往右, 离商品更近, 但离追加保证金和强制平仓也更近</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
