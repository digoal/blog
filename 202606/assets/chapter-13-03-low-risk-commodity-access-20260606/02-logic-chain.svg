<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-labelledby="title desc">
  <title id="title">低风险参与商品的论证链</title>
  <desc id="desc">商品波动、期货机制、基金包装和操作结论之间的因果路径。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 低风险不是离商品最近, 而是离强平最远</text>
  <g font-size="15" fill="#111827">
    <rect x="45" y="78" width="160" height="95" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="125" y="108" text-anchor="middle" font-weight="700">前提A</text>
    <text x="125" y="134" text-anchor="middle">商品价格由供需</text>
    <text x="125" y="156" text-anchor="middle">库存和天气驱动</text>
    <rect x="235" y="78" width="160" height="95" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="315" y="108" text-anchor="middle" font-weight="700">前提B</text>
    <text x="315" y="134" text-anchor="middle">期货有保证金</text>
    <text x="315" y="156" text-anchor="middle">每日结算和到期</text>
    <rect x="425" y="78" width="160" height="95" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="505" y="108" text-anchor="middle" font-weight="700">前提C</text>
    <text x="505" y="134" text-anchor="middle">ETF和基金</text>
    <text x="505" y="156" text-anchor="middle">隔离个人杠杆</text>
    <rect x="615" y="78" width="140" height="95" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="685" y="108" text-anchor="middle" font-weight="700">前提D</text>
    <text x="685" y="134" text-anchor="middle">资源ETF是股票</text>
    <text x="685" y="156" text-anchor="middle">不是商品本身</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M205 126 H235"/>
    <path d="M395 126 H425"/>
    <path d="M585 126 H615"/>
    <path d="M315 173 C315 210, 250 214, 250 244"/>
    <path d="M505 173 C505 210, 550 214, 550 244"/>
  </g>
  <g>
    <rect x="160" y="244" width="220" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="270" y="276" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">推导1</text>
    <text x="270" y="302" text-anchor="middle" font-size="14" fill="#0f172a">直接期货把商品波动放大成账户生存问题</text>
    <rect x="420" y="244" width="220" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="530" y="276" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">推导2</text>
    <text x="530" y="302" text-anchor="middle" font-size="14" fill="#0f172a">公募产品把风险变成净值波动和仓位问题</text>
  </g>
  <path d="M270 324 C270 354, 400 350, 400 365" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M530 324 C530 354, 400 350, 400 365" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="185" y="365" width="430" height="42" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#065f46">结论: 商品ETF优先, 商品基金其次, 资源行业ETF只做股票替代</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
