<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">商品工具选择情景分支</title>
  <desc id="desc">根据目标、产品透明度、溢价和期货风险决定是否买入商品相关工具。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">情景分支: 买商品前先问四个问题</text>
  <rect x="280" y="68" width="240" height="54" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">我买的是哪一层风险?</text>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M400 122 V155"/>
    <path d="M400 155 H150 V190"/>
    <path d="M400 155 H400 V190"/>
    <path d="M400 155 H650 V190"/>
  </g>
  <g font-size="15">
    <rect x="50" y="190" width="200" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="150" y="220" text-anchor="middle" font-weight="700" fill="#14532d">商品ETF清楚</text>
    <text x="150" y="244" text-anchor="middle" fill="#14532d">净值、价差、仓位都能看</text>
    <rect x="300" y="190" width="200" height="76" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="400" y="220" text-anchor="middle" font-weight="700" fill="#713f12">基金持有期货</text>
    <text x="400" y="244" text-anchor="middle" fill="#713f12">要看展期和跟踪误差</text>
    <rect x="550" y="190" width="200" height="76" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="650" y="220" text-anchor="middle" font-weight="700" fill="#7c2d12">资源行业ETF</text>
    <text x="650" y="244" text-anchor="middle" fill="#7c2d12">按股票仓位管理</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M150 266 V318"/>
    <path d="M400 266 V318"/>
    <path d="M650 266 V318"/>
  </g>
  <g font-size="15">
    <rect x="50" y="318" width="200" height="78" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="150" y="349" text-anchor="middle" font-weight="700" fill="#065f46">动作</text>
    <text x="150" y="373" text-anchor="middle" fill="#065f46">低溢价、小仓位、分批买</text>
    <rect x="300" y="318" width="200" height="78" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="400" y="349" text-anchor="middle" font-weight="700" fill="#7c2d12">动作</text>
    <text x="400" y="373" text-anchor="middle" fill="#7c2d12">读合同, 看最大回撤再买</text>
    <rect x="550" y="318" width="200" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="650" y="349" text-anchor="middle" font-weight="700" fill="#7f1d1d">动作</text>
    <text x="650" y="373" text-anchor="middle" fill="#7f1d1d">当行业股票, 不当商品替身</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
