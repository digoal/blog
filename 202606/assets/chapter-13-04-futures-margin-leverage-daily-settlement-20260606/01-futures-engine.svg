<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="期货保证金、杠杆和每日结算机制">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">期货不是买现货，而是用保证金控制合约名义价值</text>
  <rect x="50" y="88" width="190" height="112" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="145" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">保证金</text>
  <text x="145" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">少量履约资金</text>
  <text x="145" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">不是买下现货</text>
  <path d="M245 144 H325" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="330" y="88" width="190" height="112" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="425" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#115e59">合约名义价值</text>
  <text x="425" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">价格盈亏按整张合约算</text>
  <text x="425" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">波动被放大到账户</text>
  <path d="M525 144 H605" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="610" y="88" width="140" height="112" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="680" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">杠杆结果</text>
  <text x="680" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">赚亏都加速</text>
  <text x="680" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">方向错会很快</text>
  <rect x="90" y="252" width="620" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#334155">每日结算</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">每天按结算价划转盈亏；保证金不够时，要追加资金、减仓或被强平</text>
  <path d="M400 205 V245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
