<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="期货风险边界论证链">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从机制推出操作边界</text>
  <rect x="40" y="78" width="160" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="120" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">盈亏按合约</text>
  <text x="120" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">名义价值计算</text>
  <rect x="230" y="78" width="160" height="92" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="310" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#115e59">前提B</text>
  <text x="310" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">保证金只是</text>
  <text x="310" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">履约押金</text>
  <rect x="420" y="78" width="160" height="92" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="500" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#5b21b6">前提C</text>
  <text x="500" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">每天结算</text>
  <text x="500" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">现金压力真实</text>
  <rect x="610" y="78" width="150" height="92" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">前提D</text>
  <text x="685" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">商品波动和</text>
  <text x="685" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">交割因素会变</text>
  <path d="M120 178 C120 220, 310 220, 310 252" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M310 178 V252" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M500 178 C500 220, 310 220, 310 252" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M685 178 C685 232, 490 232, 490 252" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="180" y="254" width="440" height="72" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">推导</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">小价格波动会变成大账户波动，且每天兑现为资金压力</text>
  <path d="M400 330 V356" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="150" y="360" width="500" height="44" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">结论：小白默认不重仓实盘，先模拟、极小仓、先学风控</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
