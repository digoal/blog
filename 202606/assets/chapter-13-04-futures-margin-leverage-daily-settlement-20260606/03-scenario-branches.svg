<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="期货学习情景分支">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提变化时，操作也要切换</text>
  <rect x="270" y="72" width="260" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">想学习期货？先问三件事</text>
  <path d="M400 138 V170" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="250" y="172" width="300" height="56" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e3a8a">懂合约名义价值、保证金和每日结算吗？</text>
  <path d="M250 202 H120 V260" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 202 H680 V260" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="40" y="264" width="170" height="76" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="125" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">不懂</text>
  <text x="125" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">只做学习和模拟</text>
  <rect x="590" y="264" width="170" height="76" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="675" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">懂</text>
  <text x="675" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">继续检查仓位</text>
  <path d="M675 344 V370" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="520" y="374" width="280" height="44" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">有额外现金和止损计划：极小学习仓</text>
  <path d="M125 344 V370" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="10" y="374" width="230" height="44" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="125" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">没有计划或借钱：停止实盘</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
