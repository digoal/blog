<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">期货重仓的危险来自三层放大</text>
  <rect x="55" y="95" width="190" height="205" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">保证金</text>
  <text x="150" y="165" text-anchor="middle" font-size="15" fill="#111827">少量本金</text>
  <text x="150" y="193" text-anchor="middle" font-size="15" fill="#111827">控制大额合约</text>
  <text x="150" y="229" text-anchor="middle" font-size="14" fill="#475569">像只付押金</text>
  <text x="150" y="253" text-anchor="middle" font-size="14" fill="#475569">就开走整辆车</text>
  <rect x="325" y="95" width="190" height="205" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">每日结算</text>
  <text x="420" y="165" text-anchor="middle" font-size="15" fill="#111827">每天按收盘盈亏</text>
  <text x="420" y="193" text-anchor="middle" font-size="15" fill="#111827">直接加减账户资金</text>
  <text x="420" y="229" text-anchor="middle" font-size="14" fill="#475569">亏损不会等你</text>
  <text x="420" y="253" text-anchor="middle" font-size="14" fill="#475569">慢慢想清楚</text>
  <rect x="595" y="95" width="150" height="205" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="670" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">强平/追保</text>
  <text x="670" y="165" text-anchor="middle" font-size="15" fill="#111827">资金不够</text>
  <text x="670" y="193" text-anchor="middle" font-size="15" fill="#111827">被迫补钱或平仓</text>
  <text x="670" y="229" text-anchor="middle" font-size="14" fill="#475569">行情最差时</text>
  <text x="670" y="253" text-anchor="middle" font-size="14" fill="#475569">最容易被动出局</text>
  <path d="M250 198 H315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M520 198 H585" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="180" y="330" width="440" height="42" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="400" y="357" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">重仓 = 把价格波动、时间压力、情绪压力一起放大</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
