<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">从机制推出操作边界</text>
  <rect x="40" y="80" width="165" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="122" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="122" y="138" text-anchor="middle" font-size="14" fill="#111827">保证金带杠杆</text>
  <rect x="235" y="80" width="165" height="86" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="318" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">前提B</text>
  <text x="318" y="138" text-anchor="middle" font-size="14" fill="#111827">每日结算和追保</text>
  <rect x="430" y="80" width="165" height="86" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="512" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">前提C</text>
  <text x="512" y="138" text-anchor="middle" font-size="14" fill="#111827">商品波动有跳变</text>
  <rect x="625" y="80" width="135" height="86" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="692" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="692" y="138" text-anchor="middle" font-size="14" fill="#111827">小白纪律弱</text>
  <path d="M122 178 V218 H398" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M318 178 V218 H398" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M512 178 V218 H402" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M692 178 V218 H402" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="215" y="218" width="370" height="70" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="245" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">中间命题</text>
  <text x="400" y="270" text-anchor="middle" font-size="15" fill="#111827">方向小错也会快速变成资金压力</text>
  <path d="M400 292 V328" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="150" y="328" width="500" height="62" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="353" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">结论: 期货不能重仓，只能先模拟、极小仓位、先学风控</text>
  <text x="400" y="377" text-anchor="middle" font-size="14" fill="#7f1d1d">小白默认选择商品ETF/基金/资源ETF，不把期货当翻本工具</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
