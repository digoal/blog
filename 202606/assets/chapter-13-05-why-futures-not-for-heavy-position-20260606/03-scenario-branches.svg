<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化时，操作必须切换</text>
  <rect x="295" y="75" width="210" height="58" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">想接触期货</text>
  <path d="M400 137 V168" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="250" y="168" width="300" height="58" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="203" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">先问: 这四个前提是否成立?</text>
  <path d="M250 225 C120 250 95 270 95 303" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M340 228 C285 255 255 275 255 303" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M460 228 C515 255 545 275 545 303" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 225 C680 250 705 270 705 303" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="35" y="303" width="180" height="82" rx="9" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="125" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">不知道何时退出</text>
  <text x="125" y="356" text-anchor="middle" font-size="14" fill="#111827">结论: 不做实盘</text>
  <rect x="230" y="303" width="180" height="82" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">不能盯盘追保</text>
  <text x="320" y="356" text-anchor="middle" font-size="14" fill="#111827">结论: 只做模拟</text>
  <rect x="425" y="303" width="180" height="82" rx="9" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="515" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">只想学习机制</text>
  <text x="515" y="356" text-anchor="middle" font-size="14" fill="#111827">结论: 极小观察仓</text>
  <rect x="620" y="303" width="160" height="82" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="700" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">先有风控清单</text>
  <text x="700" y="356" text-anchor="middle" font-size="14" fill="#111827">结论: 按计划退出</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
