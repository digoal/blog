<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">趋势、基差、期限结构三镜片</title>
  <desc id="desc">展示商品期货判断中趋势、基差和期限结构分别回答的问题。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #111827; }
    .muted { fill: #64748b; font-size: 16px; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .axis { stroke: #94a3b8; stroke-width: 2; }
    .blue { stroke: #2563eb; fill: none; stroke-width: 4; }
    .green { stroke: #059669; fill: none; stroke-width: 4; }
    .red { stroke: #dc2626; fill: none; stroke-width: 4; }
    .orange { stroke: #ea580c; fill: none; stroke-width: 4; }
  </style>
  <text x="40" y="42" class="title">不要只看涨跌，要同时看三副镜片</text>
  <text x="40" y="70" class="muted">趋势看方向，基差看现货压力，期限结构看持有成本和库存状态。</text>

  <rect x="40" y="105" width="220" height="240" class="card"/>
  <text x="62" y="138" class="label">1. 趋势</text>
  <text x="62" y="164" class="muted">价格正在往哪走？</text>
  <line x1="75" y1="305" x2="230" y2="305" class="axis"/>
  <line x1="75" y1="305" x2="75" y2="190" class="axis"/>
  <path d="M80 285 C105 270, 120 278, 145 245 S195 200, 230 178" class="blue"/>
  <polygon points="230,178 217,180 224,190" fill="#2563eb"/>
  <text x="82" y="325" class="small">方向、斜率、是否破位</text>

  <rect x="290" y="105" width="220" height="240" class="card"/>
  <text x="312" y="138" class="label">2. 基差</text>
  <text x="312" y="164" class="muted">现货和期货差多远？</text>
  <line x1="330" y1="230" x2="470" y2="230" class="axis"/>
  <line x1="330" y1="275" x2="470" y2="275" class="axis"/>
  <circle cx="360" cy="230" r="7" fill="#059669"/>
  <circle cx="440" cy="275" r="7" fill="#dc2626"/>
  <text x="342" y="216" class="small">现货价</text>
  <text x="425" y="299" class="small">期货价</text>
  <line x1="485" y1="230" x2="485" y2="275" stroke="#ea580c" stroke-width="3" stroke-dasharray="6 5"/>
  <text x="342" y="325" class="small">现金价 - 期货价 = 基差</text>

  <rect x="540" y="105" width="220" height="240" class="card"/>
  <text x="562" y="138" class="label">3. 期限结构</text>
  <text x="562" y="164" class="muted">远月比近月贵还是便宜？</text>
  <line x1="575" y1="305" x2="725" y2="305" class="axis"/>
  <line x1="575" y1="305" x2="575" y2="190" class="axis"/>
  <path d="M585 280 C620 255, 665 230, 720 205" class="orange"/>
  <path d="M585 210 C630 230, 675 252, 720 285" class="green"/>
  <text x="590" y="203" class="small" fill="#ea580c">contango</text>
  <text x="612" y="286" class="small" fill="#059669">backwardation</text>
  <text x="585" y="325" class="small">滚动成本或滚动收益</text>
</svg>
