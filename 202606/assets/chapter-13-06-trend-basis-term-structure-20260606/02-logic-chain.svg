<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">趋势、基差、期限结构论证链</title>
  <desc id="desc">从三个前提出发推导出小白不应只按趋势重仓商品或期货。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .muted { fill: #64748b; font-size: 15px; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .strong { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="38" y="42" class="title">主论证链：方向正确，不等于交易可以重仓</text>
  <text x="38" y="68" class="muted">商品期货收益由价格方向、现货压力、合约滚动共同决定。</text>

  <rect x="42" y="105" width="190" height="90" class="box"/>
  <text x="62" y="135" class="strong">前提A：趋势</text>
  <text x="62" y="162" class="small">只回答价格方向</text>
  <text x="62" y="184" class="small">不回答到期与换月</text>

  <rect x="305" y="105" width="190" height="90" class="box"/>
  <text x="325" y="135" class="strong">前提B：基差</text>
  <text x="325" y="162" class="small">现货与期货会收敛</text>
  <text x="325" y="184" class="small">但压力会改变差距</text>

  <rect x="568" y="105" width="190" height="90" class="box"/>
  <text x="588" y="135" class="strong">前提C：期限结构</text>
  <text x="588" y="162" class="small">远近月价格不同</text>
  <text x="588" y="184" class="small">滚动会带来成本</text>

  <path d="M232 150 L304 150" class="arrow"/>
  <path d="M495 150 L567 150" class="arrow"/>

  <rect x="120" y="245" width="245" height="95" class="box"/>
  <text x="142" y="277" class="strong">推导</text>
  <text x="142" y="304" class="small">因为价格、现货和合约月份</text>
  <text x="142" y="326" class="small">可能给出不同信号</text>

  <rect x="435" y="245" width="245" height="95" class="box"/>
  <text x="457" y="277" class="strong">结论</text>
  <text x="457" y="304" class="small">小白先做观察和模拟</text>
  <text x="457" y="326" class="small">三项同向才允许极小仓位</text>

  <path d="M400 196 C395 225, 340 230, 290 245" class="arrow"/>
  <path d="M365 293 L434 293" class="arrow"/>
</svg>
