<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">商品期货三信号情景分支</title>
  <desc id="desc">展示趋势、基差和期限结构不同组合下的小白操作分支。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .stop { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 8; }
    .strong { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; }
    .arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="38" y="42" class="title">三信号分支：先问能不能做，再问做多少</text>

  <rect x="295" y="80" width="210" height="62" class="box"/>
  <text x="322" y="107" class="strong">准备看商品或期货</text>
  <text x="328" y="128" class="small">先不直接下单</text>

  <rect x="70" y="185" width="190" height="75" class="warn"/>
  <text x="92" y="215" class="strong">趋势向上</text>
  <text x="92" y="238" class="small">但基差走弱</text>
  <text x="92" y="256" class="small">动作：不追涨</text>

  <rect x="305" y="185" width="190" height="75" class="warn"/>
  <text x="327" y="215" class="strong">趋势向上</text>
  <text x="327" y="238" class="small">但深度 contango</text>
  <text x="327" y="256" class="small">动作：只观察/模拟</text>

  <rect x="540" y="185" width="190" height="75" class="ok"/>
  <text x="562" y="215" class="strong">三项同向</text>
  <text x="562" y="238" class="small">趋势、基差、曲线都支持</text>
  <text x="562" y="256" class="small">动作：极小仓位学习</text>

  <rect x="190" y="315" width="190" height="58" class="stop"/>
  <text x="212" y="341" class="strong">临近到期不懂交割</text>
  <text x="212" y="361" class="small">动作：退出，不扛单</text>

  <rect x="430" y="315" width="190" height="58" class="stop"/>
  <text x="452" y="341" class="strong">保证金压力上升</text>
  <text x="452" y="361" class="small">动作：减仓，不补赌注</text>

  <path d="M355 142 C285 160, 220 170, 165 185" class="arrow"/>
  <path d="M400 142 L400 184" class="arrow"/>
  <path d="M445 142 C510 160, 575 170, 635 185" class="arrow"/>
  <path d="M305 260 C295 280, 292 298, 288 314" class="arrow"/>
  <path d="M505 260 C515 280, 520 298, 522 314" class="arrow"/>
</svg>
