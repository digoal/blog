<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">通胀上行时商品表现好的因果链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect x="42" y="90" width="150" height="86" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="117" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提A</text>
  <text x="117" y="148" text-anchor="middle" font-size="15" fill="#0f172a">商品是生产</text>
  <text x="117" y="169" text-anchor="middle" font-size="15" fill="#0f172a">和生活原料</text>
  <rect x="228" y="90" width="150" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="303" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提B</text>
  <text x="303" y="148" text-anchor="middle" font-size="15" fill="#0f172a">供给受限</text>
  <text x="303" y="169" text-anchor="middle" font-size="15" fill="#0f172a">不能马上扩产</text>
  <rect x="414" y="90" width="150" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="489" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提C</text>
  <text x="489" y="148" text-anchor="middle" font-size="15" fill="#0f172a">通胀来自能源</text>
  <text x="489" y="169" text-anchor="middle" font-size="15" fill="#0f172a">粮食或金属</text>
  <rect x="600" y="90" width="150" height="86" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="675" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">前提D</text>
  <text x="675" y="148" text-anchor="middle" font-size="15" fill="#0f172a">需求没有</text>
  <text x="675" y="169" text-anchor="middle" font-size="15" fill="#0f172a">快速塌陷</text>
  <line x1="192" y1="133" x2="226" y2="133" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="378" y1="133" x2="412" y2="133" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="564" y1="133" x2="598" y2="133" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="238" width="640" height="86" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">推导结果</text>
  <text x="400" y="298" text-anchor="middle" font-size="16" fill="#111827">因为原料涨价先打到商品价格, 所以商品资产可能先于股票利润表反应通胀压力</text>
  <text x="400" y="322" text-anchor="middle" font-size="16" fill="#111827">但只能小比例做通胀对冲, 不能把商品当成稳赚主仓</text>
  <line x1="400" y1="177" x2="400" y2="236" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
