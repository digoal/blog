<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">前提变化后的商品操作分支</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="285" y="70" width="230" height="66" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">先问通胀来源</text>
  <text x="400" y="119" text-anchor="middle" font-size="15" fill="#0f172a">是真缺货, 还是服务和工资粘性?</text>
  <line x1="400" y1="136" x2="400" y2="168" stroke="#334155" stroke-width="2"/>
  <line x1="160" y1="168" x2="640" y2="168" stroke="#334155" stroke-width="2"/>
  <line x1="160" y1="168" x2="160" y2="202" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="168" x2="400" y2="202" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="168" x2="640" y2="202" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="204" width="200" height="138" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">商品短缺型通胀</text>
  <text x="160" y="260" text-anchor="middle" font-size="15" fill="#0f172a">能源/粮食/金属涨价</text>
  <text x="160" y="283" text-anchor="middle" font-size="15" fill="#0f172a">库存低, 供给修复慢</text>
  <text x="160" y="313" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">小比例配置商品工具</text>
  <rect x="300" y="204" width="200" height="138" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">服务粘性型通胀</text>
  <text x="400" y="260" text-anchor="middle" font-size="15" fill="#0f172a">房租/工资/医疗更强</text>
  <text x="400" y="283" text-anchor="middle" font-size="15" fill="#0f172a">原料不是主要矛盾</text>
  <text x="400" y="313" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">不追商品, 先观察</text>
  <rect x="540" y="204" width="200" height="138" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">紧缩衰退型通胀</text>
  <text x="640" y="260" text-anchor="middle" font-size="15" fill="#0f172a">加息压需求</text>
  <text x="640" y="283" text-anchor="middle" font-size="15" fill="#0f172a">库存累积, 美元走强</text>
  <text x="640" y="313" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">降仓位, 防追高</text>
  <text x="400" y="382" text-anchor="middle" font-size="15" fill="#475569">同样叫通胀, 背后的驱动不同, 商品仓位结论也不同</text>
</svg>
