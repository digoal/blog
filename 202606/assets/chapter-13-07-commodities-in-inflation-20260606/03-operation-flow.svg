<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">小白参与商品的四步流程</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="70" y="86" width="160" height="88" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="150" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">第一步</text>
  <text x="150" y="144" text-anchor="middle" font-size="15" fill="#0f172a">判断通胀来源</text>
  <text x="150" y="165" text-anchor="middle" font-size="15" fill="#0f172a">能源/粮食/金属?</text>
  <rect x="290" y="86" width="160" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="370" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">第二步</text>
  <text x="370" y="144" text-anchor="middle" font-size="15" fill="#0f172a">选择低杠杆工具</text>
  <text x="370" y="165" text-anchor="middle" font-size="15" fill="#0f172a">基金/ETF优先</text>
  <rect x="510" y="86" width="160" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="590" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">第三步</text>
  <text x="590" y="144" text-anchor="middle" font-size="15" fill="#0f172a">设置仓位上限</text>
  <text x="590" y="165" text-anchor="middle" font-size="15" fill="#0f172a">5%-10%学习仓</text>
  <line x1="230" y1="130" x2="288" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="130" x2="508" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="250" width="460" height="94" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="410" y="284" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">第四步: 写清退出条件</text>
  <text x="410" y="312" text-anchor="middle" font-size="15" fill="#111827">供给恢复 / 需求塌陷 / 央行强紧缩 / 商品仓位超上限</text>
  <text x="410" y="335" text-anchor="middle" font-size="15" fill="#111827">任一出现, 商品仓从对冲仓回到观察仓</text>
  <line x1="590" y1="175" x2="590" y2="214" stroke="#334155" stroke-width="2"/>
  <line x1="590" y1="214" x2="410" y2="214" stroke="#334155" stroke-width="2"/>
  <line x1="410" y1="214" x2="410" y2="248" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="390" text-anchor="middle" font-size="15" fill="#475569">商品仓的任务是对冲通胀压力, 不是替代核心资产配置</text>
</svg>
