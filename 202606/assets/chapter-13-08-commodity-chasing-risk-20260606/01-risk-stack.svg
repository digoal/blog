<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">商品追涨风险叠加图</title>
  <desc id="desc">展示商品追涨从价格波动到回撤再到杠杆强平的三层风险</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">商品追涨不是只多一层风险</text>
  <text x="400" y="70" text-anchor="middle" font-size="14" fill="#4b5563">价格、回撤、杠杆会在错误时点叠加</text>

  <rect x="90" y="105" width="620" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="140" font-size="20" font-weight="700" fill="#1e3a8a">第一层: 高波动</text>
  <text x="330" y="140" font-size="16" fill="#1f2937">供需、库存、天气、地缘消息会让价格快速跳动</text>

  <rect x="130" y="177" width="540" height="62" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="160" y="212" font-size="20" font-weight="700" fill="#92400e">第二层: 高回撤</text>
  <text x="370" y="212" font-size="16" fill="#1f2937">涨得快的商品，前提变坏时也会跌得快</text>

  <rect x="170" y="249" width="460" height="62" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="200" y="284" font-size="20" font-weight="700" fill="#991b1b">第三层: 高杠杆</text>
  <text x="410" y="284" font-size="16" fill="#1f2937">保证金放大盈亏，亏损会变成补钱和被动出局</text>

  <path d="M400 318 L400 350" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="245" y="345" width="310" height="42" rx="8" fill="#111827"/>
  <text x="400" y="372" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">行动: 先控仓位，再谈观点</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
