<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">商品追涨风险论证链</title>
  <desc id="desc">展示从商品价格前提到追涨结论和操作动作的因果链</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 为什么商品不能追涨重仓</text>

  <rect x="35" y="82" width="165" height="86" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="117" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#312e81">前提A</text>
  <text x="117" y="138" text-anchor="middle" font-size="14" fill="#111827">商品价格由供需</text>
  <text x="117" y="158" text-anchor="middle" font-size="14" fill="#111827">库存和交割约束驱动</text>

  <rect x="225" y="82" width="165" height="86" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="307" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">前提B</text>
  <text x="307" y="138" text-anchor="middle" font-size="14" fill="#111827">消息冲击会制造</text>
  <text x="307" y="158" text-anchor="middle" font-size="14" fill="#111827">大幅波动和回撤</text>

  <rect x="415" y="82" width="165" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="497" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">前提C</text>
  <text x="497" y="138" text-anchor="middle" font-size="14" fill="#111827">期货保证金会</text>
  <text x="497" y="158" text-anchor="middle" font-size="14" fill="#111827">放大方向错误</text>

  <rect x="605" y="82" width="160" height="86" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">前提D</text>
  <text x="685" y="138" text-anchor="middle" font-size="14" fill="#111827">小白难以稳定判断</text>
  <text x="685" y="158" text-anchor="middle" font-size="14" fill="#111827">驱动何时失效</text>

  <path d="M200 125 H225" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M390 125 H415" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M580 125 H605" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="220" width="600" height="72" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="275" text-anchor="middle" font-size="15" fill="#374151">因为价格驱动会变化，且杠杆把错误方向放大，所以追涨不是加收益，而是加失控概率</text>

  <path d="M400 292 V325" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="125" y="330" width="550" height="60" rx="8" fill="#111827"/>
  <text x="400" y="356" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论</text>
  <text x="400" y="380" text-anchor="middle" font-size="15" fill="#ffffff">商品仓位只做卫星，不用期货重仓，不用借钱和保证金追涨</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
