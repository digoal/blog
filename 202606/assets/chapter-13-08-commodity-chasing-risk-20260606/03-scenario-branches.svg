<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">商品追涨情景分支</title>
  <desc id="desc">展示商品追涨前提变化后的操作分支</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提一变，操作就要切换</text>

  <rect x="280" y="72" width="240" height="54" rx="8" fill="#111827"/>
  <text x="400" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">看到商品大涨</text>

  <path d="M400 126 V158" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="238" y="160" width="324" height="58" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="184" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">先问: 上涨前提还成立吗?</text>
  <text x="400" y="205" text-anchor="middle" font-size="13" fill="#4b5563">供需、库存、期限结构、工具杠杆、仓位上限</text>

  <path d="M270 218 L145 270" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 218 V270" stroke="#d97706" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M530 218 L655 270" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="35" y="272" width="220" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="145" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提仍成立</text>
  <text x="145" y="323" text-anchor="middle" font-size="14" fill="#111827">只用卫星仓小额分批</text>
  <text x="145" y="343" text-anchor="middle" font-size="14" fill="#111827">最大亏损先写死</text>

  <rect x="290" y="272" width="220" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">前提看不清</text>
  <text x="400" y="323" text-anchor="middle" font-size="14" fill="#111827">不买，建立观察表</text>
  <text x="400" y="343" text-anchor="middle" font-size="14" fill="#111827">等驱动和风险重新清楚</text>

  <rect x="545" y="272" width="220" height="86" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="655" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">前提已失效</text>
  <text x="655" y="323" text-anchor="middle" font-size="14" fill="#111827">已有仓位减风险</text>
  <text x="655" y="343" text-anchor="middle" font-size="14" fill="#111827">杠杆仓先退出</text>

  <text x="400" y="394" text-anchor="middle" font-size="15" fill="#374151">小白的优势不是抢得快，而是能在看不懂时停手</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
