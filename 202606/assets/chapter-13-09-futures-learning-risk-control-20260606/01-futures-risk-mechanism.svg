<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">期货风险机制: 小钱控制大合约</text>
  <rect x="50" y="85" width="160" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">合约名义价值</text>
  <text x="130" y="148" text-anchor="middle" font-size="15" fill="#1f2937">例如 100,000 元</text>
  <path d="M215 130 H285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="290" y="85" width="160" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">保证金</text>
  <text x="370" y="148" text-anchor="middle" font-size="15" fill="#1f2937">例如 10,000 元</text>
  <path d="M455 130 H525" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="530" y="85" width="220" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">价格波动放大</text>
  <text x="640" y="148" text-anchor="middle" font-size="15" fill="#1f2937">标的跌 2% = 亏 2,000 元</text>
  <path d="M640 178 V238" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="500" y="245" width="280" height="95" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="278" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">账户压力</text>
  <text x="640" y="307" text-anchor="middle" font-size="15" fill="#1f2937">亏损占保证金 20%</text>
  <text x="640" y="330" text-anchor="middle" font-size="15" fill="#1f2937">可能触发追加保证金或平仓</text>
  <path d="M500 292 H305" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="55" y="245" width="250" height="95" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="180" y="278" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">学习重点</text>
  <text x="180" y="307" text-anchor="middle" font-size="15" fill="#1f2937">不是先猜方向</text>
  <text x="180" y="330" text-anchor="middle" font-size="15" fill="#1f2937">而是先限制亏损半径</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
