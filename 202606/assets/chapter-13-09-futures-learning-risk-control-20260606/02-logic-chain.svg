<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">从机制推出操作边界</text>
  <rect x="40" y="82" width="170" height="95" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="125" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">前提A</text>
  <text x="125" y="140" text-anchor="middle" font-size="14" fill="#111827">保证金带杠杆</text>
  <text x="125" y="162" text-anchor="middle" font-size="14" fill="#111827">盈亏按合约放大</text>
  <rect x="315" y="82" width="170" height="95" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">前提B</text>
  <text x="400" y="140" text-anchor="middle" font-size="14" fill="#111827">每日结算</text>
  <text x="400" y="162" text-anchor="middle" font-size="14" fill="#111827">亏损不能拖延</text>
  <rect x="590" y="82" width="170" height="95" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="675" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">前提C</text>
  <text x="675" y="140" text-anchor="middle" font-size="14" fill="#111827">小白纪律弱</text>
  <text x="675" y="162" text-anchor="middle" font-size="14" fill="#111827">易扛单和加仓</text>
  <path d="M125 180 V228" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 180 V228" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M675 180 V228" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="115" y="235" width="570" height="72" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="264" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">因为亏损会被放大且每天结算</text>
  <text x="400" y="291" text-anchor="middle" font-size="15" fill="#334155">所以学习期货的第一目标不是赚钱, 而是不让错误扩大</text>
  <path d="M400 310 V345" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="175" y="350" width="450" height="38" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="375" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">结论: 模拟通过 + 极小仓位 + 风控先行, 否则不实盘</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
