<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">期货学习决策树</text>
  <rect x="300" y="62" width="200" height="54" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">想学习期货</text>
  <path d="M400 118 V145" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="235" y="150" width="330" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">能说清合约、保证金、止损、交割月吗?</text>
  <text x="400" y="197" text-anchor="middle" font-size="13" fill="#475569">说不清 = 不开实盘</text>
  <path d="M235 180 H105 V250" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="160" y="171" text-anchor="middle" font-size="13" fill="#991b1b">否</text>
  <rect x="35" y="255" width="150" height="66" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="110" y="282" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">只做模拟</text>
  <text x="110" y="307" text-anchor="middle" font-size="13" fill="#111827">补规则和记录</text>
  <path d="M400 210 V238" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="420" y="228" font-size="13" fill="#166534">是</text>
  <rect x="235" y="245" width="330" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="269" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">模拟60个交易日且无扛单吗?</text>
  <text x="400" y="292" text-anchor="middle" font-size="13" fill="#475569">执行率不够 = 继续模拟</text>
  <path d="M235 275 H110 V325" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="170" y="267" text-anchor="middle" font-size="13" fill="#991b1b">否</text>
  <path d="M400 305 V333" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="420" y="323" font-size="13" fill="#166534">是</text>
  <rect x="235" y="340" width="330" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="364" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">一手合约的计划亏损小于预算吗?</text>
  <text x="400" y="387" text-anchor="middle" font-size="13" fill="#475569">超过预算 = 不实盘</text>
  <path d="M565 369 H690 V255" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="625" y="360" text-anchor="middle" font-size="13" fill="#991b1b">否</text>
  <rect x="615" y="185" width="150" height="66" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="690" y="212" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">缩小或放弃</text>
  <text x="690" y="237" text-anchor="middle" font-size="13" fill="#111827">不用硬上</text>
  <path d="M400 400 V420" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="420" y="416" font-size="13" fill="#166534">是</text>
  <rect x="240" y="420" width="320" height="1" fill="#f8fafc"/>
  <rect x="250" y="404" width="300" height="28" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="424" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">极小仓位试运行, 触线立刻退回模拟</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
