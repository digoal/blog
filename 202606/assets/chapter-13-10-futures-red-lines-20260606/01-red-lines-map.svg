<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">期货四条红线</title>
  <desc id="desc">展示小白学习期货时必须避开的四类行为</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">期货排雷：先看红线，再看收益</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="300" y="92" width="200" height="84" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">保证金 + 杠杆</text>
  <text x="400" y="150" text-anchor="middle" font-size="14" fill="#1f2937">小波动也能打穿账户</text>
  <rect x="52" y="248" width="160" height="82" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="132" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">不满仓</text>
  <text x="132" y="304" text-anchor="middle" font-size="13" fill="#475569">留保证金缓冲</text>
  <rect x="232" y="248" width="160" height="82" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="312" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">不借钱</text>
  <text x="312" y="304" text-anchor="middle" font-size="13" fill="#475569">亏损不伤生活</text>
  <rect x="412" y="248" width="160" height="82" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="492" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">不扛单</text>
  <text x="492" y="304" text-anchor="middle" font-size="13" fill="#475569">失效先离场</text>
  <rect x="592" y="248" width="160" height="82" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="672" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">不反复补钱</text>
  <text x="672" y="304" text-anchor="middle" font-size="13" fill="#475569">追加前先减仓</text>
  <path d="M400 176 Q215 205 132 248" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 176 Q338 205 312 248" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 176 Q462 205 492 248" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 176 Q602 205 672 248" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="368" text-anchor="middle" font-size="15" fill="#475569">小白学习期货的第一目标不是抓行情，而是让一次错误不会扩大成债务和强平</text>
</svg>
