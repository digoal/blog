<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">期货红线论证链</title>
  <desc id="desc">展示保证金杠杆、每日结算、极端行情和心理错误如何推出期货红线</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">为什么期货红线必须写在收益目标前面</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="38" y="86" width="158" height="90" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="117" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="117" y="143" text-anchor="middle" font-size="14" fill="#1f2937">保证金控制</text>
  <text x="117" y="163" text-anchor="middle" font-size="14" fill="#1f2937">大额合约</text>
  <rect x="226" y="86" width="158" height="90" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="305" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">前提B</text>
  <text x="305" y="143" text-anchor="middle" font-size="14" fill="#1f2937">每日结算</text>
  <text x="305" y="163" text-anchor="middle" font-size="14" fill="#1f2937">触发补保证金</text>
  <rect x="414" y="86" width="158" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="493" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">前提C</text>
  <text x="493" y="143" text-anchor="middle" font-size="14" fill="#1f2937">极端行情</text>
  <text x="493" y="163" text-anchor="middle" font-size="14" fill="#1f2937">流动性会消失</text>
  <rect x="602" y="86" width="158" height="90" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="681" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">前提D</text>
  <text x="681" y="143" text-anchor="middle" font-size="14" fill="#1f2937">亏损后容易</text>
  <text x="681" y="163" text-anchor="middle" font-size="14" fill="#1f2937">加码和硬扛</text>
  <line x1="196" y1="131" x2="218" y2="131" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="384" y1="131" x2="406" y2="131" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="572" y1="131" x2="594" y2="131" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="118" y="238" width="250" height="82" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="243" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">推导</text>
  <text x="243" y="294" text-anchor="middle" font-size="14" fill="#334155">方向错 + 杠杆 + 补钱 = 错误被放大</text>
  <rect x="430" y="238" width="250" height="82" rx="8" fill="#fef2f2" stroke="#ef4444"/>
  <text x="555" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">结论</text>
  <text x="555" y="294" text-anchor="middle" font-size="14" fill="#334155">四条红线比入场信号更重要</text>
  <path d="M681 176 Q640 218 555 238" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="368" y1="279" x2="422" y2="279" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="372" text-anchor="middle" font-size="15" fill="#475569">正常动作：模拟盘或极小仓位学习；保证金不足时先减仓，不用新钱保护旧错误</text>
</svg>
