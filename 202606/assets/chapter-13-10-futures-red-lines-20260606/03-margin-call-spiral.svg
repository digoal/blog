<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">保证金不足时的两条路</title>
  <desc id="desc">展示计划内止损和扛单加保证金之间的不同结果</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">保证金不足时，不同动作会把结果带向两条路</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="300" y="82" width="200" height="72" rx="8" fill="#2563eb"/>
  <text x="400" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">持仓方向走错</text>
  <text x="400" y="136" text-anchor="middle" font-size="14" fill="#dbeafe">账户风险度升高</text>
  <rect x="70" y="230" width="250" height="96" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="195" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">计划内处理</text>
  <text x="195" y="286" text-anchor="middle" font-size="14" fill="#1f2937">减仓或平仓</text>
  <text x="195" y="309" text-anchor="middle" font-size="14" fill="#1f2937">亏损停止扩大，保留学习资金</text>
  <rect x="480" y="230" width="250" height="96" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="605" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">错误扩大</text>
  <text x="605" y="286" text-anchor="middle" font-size="14" fill="#1f2937">借钱、扛单、继续补保证金</text>
  <text x="605" y="309" text-anchor="middle" font-size="14" fill="#1f2937">可能强平、穿仓、影响生活</text>
  <path d="M400 154 Q250 184 195 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 154 Q560 184 605 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="165" y="365" width="470" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="395" text-anchor="middle" font-size="15" fill="#334155">红线规则：保证金不足不是加钱信号，而是风险已经超预算的信号</text>
</svg>
