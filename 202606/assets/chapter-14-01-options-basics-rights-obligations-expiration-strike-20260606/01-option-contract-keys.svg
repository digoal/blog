<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="期权合约四个关键部件">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">期权不是股票, 是一份带期限的合同</text>
  <rect x="70" y="85" width="660" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="116" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">完整读法: 标的 + 类型 + 到期日 + 行权价 + 权利金</text>
  <text x="400" y="142" text-anchor="middle" font-size="16" fill="#475569">例如: 50ETF 认购 6月 3.00元, 权利金0.08元</text>
  <g>
    <rect x="60" y="205" width="160" height="105" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="140" y="236" text-anchor="middle" font-size="19" font-weight="700" fill="#075985">权利</text>
    <text x="140" y="263" text-anchor="middle" font-size="15" fill="#0f172a">买方花钱买选择权</text>
    <text x="140" y="288" text-anchor="middle" font-size="15" fill="#0f172a">可以行权, 也可放弃</text>
  </g>
  <g>
    <rect x="240" y="205" width="160" height="105" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="320" y="236" text-anchor="middle" font-size="19" font-weight="700" fill="#991b1b">义务</text>
    <text x="320" y="263" text-anchor="middle" font-size="15" fill="#0f172a">卖方收权利金</text>
    <text x="320" y="288" text-anchor="middle" font-size="15" fill="#0f172a">被指派时必须履约</text>
  </g>
  <g>
    <rect x="420" y="205" width="160" height="105" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="500" y="236" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">到期日</text>
    <text x="500" y="263" text-anchor="middle" font-size="15" fill="#0f172a">合同失效的日期</text>
    <text x="500" y="288" text-anchor="middle" font-size="15" fill="#0f172a">时间会影响价格</text>
  </g>
  <g>
    <rect x="600" y="205" width="160" height="105" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="680" y="236" text-anchor="middle" font-size="19" font-weight="700" fill="#854d0e">行权价</text>
    <text x="680" y="263" text-anchor="middle" font-size="15" fill="#0f172a">合同约定的买卖价</text>
    <text x="680" y="288" text-anchor="middle" font-size="15" fill="#0f172a">决定实值或虚值</text>
  </g>
  <line x1="140" y1="180" x2="140" y2="205" stroke="#64748b" stroke-width="2"/>
  <line x1="320" y1="180" x2="320" y2="205" stroke="#64748b" stroke-width="2"/>
  <line x1="500" y1="180" x2="500" y2="205" stroke="#64748b" stroke-width="2"/>
  <line x1="680" y1="180" x2="680" y2="205" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="358" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">看不懂这四件事, 就不是在交易期权, 而是在猜涨跌</text>
</svg>
