<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="期权基础论证链">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">论证链: 先把期权翻译成合同, 再决定能不能碰</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="40" y="78" width="170" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="125" y="107" text-anchor="middle" font-weight="700" font-size="18">前提A</text>
    <text x="125" y="132" text-anchor="middle">买方只有权利</text>
    <text x="125" y="154" text-anchor="middle">卖方承担义务</text>
    <rect x="290" y="78" width="170" height="92" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="375" y="107" text-anchor="middle" font-weight="700" font-size="18">前提B</text>
    <text x="375" y="132" text-anchor="middle">到期日会让合同</text>
    <text x="375" y="154" text-anchor="middle">自动失去生命</text>
    <rect x="540" y="78" width="170" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="625" y="107" text-anchor="middle" font-weight="700" font-size="18">前提C</text>
    <text x="625" y="132" text-anchor="middle">行权价和权利金</text>
    <text x="625" y="154" text-anchor="middle">决定盈亏边界</text>
    <line x1="210" y1="124" x2="290" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="460" y1="124" x2="540" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="160" y="220" width="230" height="92" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="275" y="250" text-anchor="middle" font-weight="700" font-size="18">推导1</text>
    <text x="275" y="275" text-anchor="middle">方向判断只是第一步</text>
    <text x="275" y="297" text-anchor="middle">还要越过时间和价格门槛</text>
    <rect x="450" y="220" width="230" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="565" y="250" text-anchor="middle" font-weight="700" font-size="18">推导2</text>
    <text x="565" y="275" text-anchor="middle">买方亏损限于权利金</text>
    <text x="565" y="297" text-anchor="middle">卖方义务可能更重</text>
    <line x1="375" y1="170" x2="275" y2="220" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="625" y1="170" x2="565" y2="220" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="210" y="350" width="380" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="400" y="382" text-anchor="middle" font-weight="700" font-size="18">结论: 小白先买方小仓学习, 不把卖方义务当默认操作</text>
    <line x1="275" y1="312" x2="360" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="565" y1="312" x2="440" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
