<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="期权下单前翻译清单">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">下单前先翻译: 这张期权到底承诺了什么?</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="55" y="84" width="150" height="74" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="130" y="113" text-anchor="middle" font-weight="700">1. 标的</text>
    <text x="130" y="139" text-anchor="middle">买卖哪只资产?</text>
    <line x1="205" y1="121" x2="255" y2="121" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="255" y="84" width="150" height="74" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="330" y="113" text-anchor="middle" font-weight="700">2. 类型</text>
    <text x="330" y="139" text-anchor="middle">认购还是认沽?</text>
    <line x1="405" y1="121" x2="455" y2="121" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="455" y="84" width="150" height="74" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="530" y="113" text-anchor="middle" font-weight="700">3. 到期日</text>
    <text x="530" y="139" text-anchor="middle">还有多少时间?</text>
    <line x1="605" y1="121" x2="655" y2="121" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="655" y="84" width="90" height="74" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="700" y="113" text-anchor="middle" font-weight="700">4. 行权价</text>
    <text x="700" y="139" text-anchor="middle">门槛价?</text>
    <rect x="110" y="222" width="220" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="220" y="253" text-anchor="middle" font-weight="700" font-size="18">5. 权利金</text>
    <text x="220" y="279" text-anchor="middle">买方最多亏多少?</text>
    <text x="220" y="302" text-anchor="middle">盈亏平衡点是多少?</text>
    <rect x="470" y="222" width="220" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="580" y="253" text-anchor="middle" font-weight="700" font-size="18">6. 身份</text>
    <text x="580" y="279" text-anchor="middle">我是买方还是卖方?</text>
    <text x="580" y="302" text-anchor="middle">有无履约义务?</text>
    <line x1="700" y1="158" x2="220" y2="222" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="700" y1="158" x2="580" y2="222" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="170" y="360" width="460" height="48" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="400" y="390" text-anchor="middle" font-size="18" font-weight="700">六项说不清, 不下单; 只想押涨跌, 退回ETF或模拟盘</text>
  </g>
</svg>
