<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">期权四个角色：先分方向，再分身份</text>
  <rect x="80" y="78" width="300" height="120" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <rect x="420" y="78" width="300" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="80" y="230" width="300" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="420" y="230" width="300" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#065f46">买入看涨</text>
  <text x="230" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#065f46">希望标的上涨</text>
  <text x="230" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#065f46">最大损失：权利金</text>
  <text x="570" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">买入看跌</text>
  <text x="570" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1d4ed8">希望标的下跌或保护持仓</text>
  <text x="570" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1d4ed8">最大损失：权利金</text>
  <text x="230" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">卖出看涨</text>
  <text x="230" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9a3412">认为上涨空间有限</text>
  <text x="230" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9a3412">无备兑时风险很高</text>
  <text x="570" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">卖出看跌</text>
  <text x="570" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">愿意按行权价买入标的</text>
  <text x="570" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">需准备现金和指派风险</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">方向只决定“看涨/看跌”，身份决定“权利/义务”和最坏结果。</text>
</svg>
