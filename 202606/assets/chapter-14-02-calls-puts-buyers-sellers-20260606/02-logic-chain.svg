<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">论证链：期权下单前必须先锁定四件事</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="50" y="80" width="150" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="125" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提A</text>
  <text x="125" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">看涨/看跌</text>
  <text x="125" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">决定方向</text>
  <rect x="240" y="80" width="150" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="315" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提B</text>
  <text x="315" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">买方/卖方</text>
  <text x="315" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">决定权利义务</text>
  <rect x="430" y="80" width="150" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="505" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提C</text>
  <text x="505" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">权利金</text>
  <text x="505" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">决定成本门槛</text>
  <rect x="620" y="80" width="130" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="685" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提D</text>
  <text x="685" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">到期日</text>
  <text x="685" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">决定时间压力</text>
  <line x1="200" y1="123" x2="240" y2="123" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="123" x2="430" y2="123" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="123" x2="620" y2="123" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="220" width="560" height="78" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#155e75">推导</text>
  <text x="400" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#155e75">同样看涨，买方和卖方不是同一种风险；同样买方，看涨和看跌也不是同一种用途。</text>
  <line x1="400" y1="166" x2="400" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="330" width="460" height="46" rx="10" fill="#111827"/>
  <text x="400" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">结论：小白先买方模拟，卖方只在备兑或现金准备充分时学习。</text>
  <line x1="400" y1="298" x2="400" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
