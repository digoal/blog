<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f9fafb"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">前提变化后的操作分支</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="270" y="70" width="260" height="58" rx="12" fill="#111827"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">准备做一笔期权交易</text>
  <line x1="400" y1="128" x2="400" y2="165" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="245" y="165" width="310" height="54" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="400" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#312e81">能否说清方向、身份、成本、到期？</text>
  <line x1="245" y1="192" x2="100" y2="258" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="219" x2="400" y2="258" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="555" y1="192" x2="700" y2="258" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="30" y="258" width="200" height="82" rx="10" fill="#fef2f2" stroke="#ef4444"/>
  <text x="130" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">说不清</text>
  <text x="130" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">不下单</text>
  <text x="130" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">回到合约翻译</text>
  <rect x="300" y="258" width="200" height="82" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#065f46">买方小仓</text>
  <text x="400" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#065f46">先模拟或极小金额</text>
  <text x="400" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#065f46">最大亏损写清</text>
  <rect x="570" y="258" width="200" height="82" rx="10" fill="#fff7ed" stroke="#f97316"/>
  <text x="670" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">想做卖方</text>
  <text x="670" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9a3412">先问是否备兑</text>
  <text x="670" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9a3412">现金和指派能否承受</text>
  <text x="400" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">情景切换时，先调整身份和仓位，再讨论方向判断。</text>
</svg>
