<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">期权门槛不是刁难，而是三道风险闸门</text>
  <rect x="55" y="92" width="205" height="190" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="297" y="92" width="205" height="190" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <rect x="540" y="92" width="205" height="190" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="157" cy="126" r="24" fill="#dbeafe"/>
  <circle cx="400" cy="126" r="24" fill="#fef3c7"/>
  <circle cx="642" cy="126" r="24" fill="#fee2e2"/>
  <text x="157" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">1</text>
  <text x="400" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#b45309">2</text>
  <text x="642" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">3</text>
  <text x="157" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#111827">复杂</text>
  <text x="400" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#111827">杠杆</text>
  <text x="642" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#111827">到期归零</text>
  <text x="157" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">方向、时间、波动率</text>
  <text x="157" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">行权价、身份都要算</text>
  <text x="400" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">权利金小</text>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">控制的风险不一定小</text>
  <text x="642" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">时间不是朋友</text>
  <text x="642" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">虚值到期可能清零</text>
  <path d="M260 187 H297" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M502 187 H540" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="135" y="322" width="530" height="48" rx="8" fill="#111827"/>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">结论：先通过知识、经验、资金和权限检查，再谈策略</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
