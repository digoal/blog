<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">期权门槛的论证链</text>
  <rect x="42" y="76" width="165" height="78" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <rect x="228" y="76" width="165" height="78" rx="8" fill="#fefce8" stroke="#ca8a04"/>
  <rect x="414" y="76" width="165" height="78" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <rect x="600" y="76" width="158" height="78" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="124" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">前提A：合同复杂</text>
  <text x="124" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">不只判断涨跌</text>
  <text x="310" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">前提B：隐含杠杆</text>
  <text x="310" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">小权利金放大波动</text>
  <text x="496" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">前提C：时间衰减</text>
  <text x="496" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">到期虚值归零</text>
  <text x="679" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">前提D：卖方义务</text>
  <text x="679" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">保证金和履约压力</text>
  <path d="M124 154 V205 H400" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M310 154 V190 H400" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M496 154 V190 H400" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M679 154 V205 H400" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="205" y="206" width="390" height="72" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="400" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">推导：小白容易把“便宜合约”误解成“低风险合约”</text>
  <text x="400" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">方向对也可能亏；卖方看似收钱，实则承担义务</text>
  <path d="M400 278 V316" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="175" y="318" width="450" height="74" rx="8" fill="#111827"/>
  <text x="400" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">结论：门槛是保护机制，不是收益门票</text>
  <text x="400" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#e5e7eb">没有知识、权限、仓位和失效条件，就不该下单</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
