<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提变化后的操作分支</text>
  <rect x="280" y="70" width="240" height="58" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">想交易期权前，先问门槛</text>
  <path d="M400 128 V164" stroke="#64748b" stroke-width="2"/>
  <path d="M130 164 H670" stroke="#64748b" stroke-width="2"/>
  <path d="M130 164 V196" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M310 164 V196" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M490 164 V196" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M670 164 V196" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="45" y="198" width="170" height="90" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <rect x="225" y="198" width="170" height="90" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <rect x="405" y="198" width="170" height="90" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <rect x="585" y="198" width="170" height="90" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="130" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">合约说不清</text>
  <text x="130" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">标的、到期、行权价</text>
  <text x="130" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">权利金、身份不清</text>
  <text x="310" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">权限不匹配</text>
  <text x="310" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">未通过适当性</text>
  <text x="310" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">或权限级别不够</text>
  <text x="490" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">只想短线翻倍</text>
  <text x="490" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">把期权当彩票</text>
  <text x="490" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">忽视归零概率</text>
  <text x="670" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">小额买保险</text>
  <text x="670" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">有现货、有目的</text>
  <text x="670" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">最大亏损可承受</text>
  <rect x="45" y="330" width="170" height="48" rx="8" fill="#991b1b"/>
  <rect x="225" y="330" width="170" height="48" rx="8" fill="#92400e"/>
  <rect x="405" y="330" width="170" height="48" rx="8" fill="#1d4ed8"/>
  <rect x="585" y="330" width="170" height="48" rx="8" fill="#166534"/>
  <text x="130" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">退回学习</text>
  <text x="310" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">不越级交易</text>
  <text x="490" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">只做模拟</text>
  <text x="670" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">极小仓试算</text>
  <path d="M130 288 V330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M310 288 V330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M490 288 V330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M670 288 V330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
