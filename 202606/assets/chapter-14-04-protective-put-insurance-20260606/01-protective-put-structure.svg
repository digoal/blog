<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">保护性看跌期权 = 持仓 + 保险</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" fill="#4b5563">先有需要保护的资产，再买认沽锁住最坏情形</text>

  <rect x="70" y="110" width="190" height="170" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">现货持仓</text>
  <text x="165" y="180" text-anchor="middle" font-size="15" fill="#374151">ETF / 股票 / 指数资产</text>
  <text x="165" y="210" text-anchor="middle" font-size="15" fill="#374151">上涨仍然参与</text>
  <text x="165" y="240" text-anchor="middle" font-size="15" fill="#374151">下跌会承受浮亏</text>

  <rect x="540" y="110" width="190" height="170" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="635" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#b91c1c">买入认沽</text>
  <text x="635" y="180" text-anchor="middle" font-size="15" fill="#374151">付出权利金</text>
  <text x="635" y="210" text-anchor="middle" font-size="15" fill="#374151">获得按行权价卖出权利</text>
  <text x="635" y="240" text-anchor="middle" font-size="15" fill="#374151">最坏亏损变成可计算</text>

  <line x1="270" y1="190" x2="530" y2="190" stroke="#64748b" stroke-width="3"/>
  <polygon points="530,190 512,180 512,200" fill="#64748b"/>
  <text x="400" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">组合后</text>
  <text x="400" y="218" text-anchor="middle" font-size="15" fill="#374151">最大亏损约 = 买入价 - 行权价 + 权利金</text>

  <rect x="145" y="320" width="510" height="42" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="400" y="346" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">保护的是“已有仓位的尾部风险”，不是低成本暴富机会</text>
</svg>
