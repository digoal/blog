<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">买入看跌期权的论证链</text>

  <rect x="36" y="88" width="150" height="88" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="111" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="111" y="148" text-anchor="middle" font-size="14" fill="#374151">你已有持仓</text>

  <rect x="218" y="88" width="150" height="88" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="293" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">前提B</text>
  <text x="293" y="148" text-anchor="middle" font-size="14" fill="#374151">短期不能轻易卖</text>

  <rect x="400" y="88" width="150" height="88" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="475" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">前提C</text>
  <text x="475" y="148" text-anchor="middle" font-size="14" fill="#374151">下跌风险明确</text>

  <rect x="582" y="88" width="150" height="88" rx="8" fill="#fffbeb" stroke="#d97706"/>
  <text x="657" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">前提D</text>
  <text x="657" y="148" text-anchor="middle" font-size="14" fill="#374151">保险费可承受</text>

  <line x1="111" y1="190" x2="400" y2="242" stroke="#64748b" stroke-width="2"/>
  <line x1="293" y1="190" x2="400" y2="242" stroke="#64748b" stroke-width="2"/>
  <line x1="475" y1="190" x2="400" y2="242" stroke="#64748b" stroke-width="2"/>
  <line x1="657" y1="190" x2="400" y2="242" stroke="#64748b" stroke-width="2"/>

  <rect x="250" y="230" width="300" height="80" rx="8" fill="#f8fafc" stroke="#111827" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="286" text-anchor="middle" font-size="14" fill="#374151">因为不能卖出但要控制尾部风险</text>
  <text x="400" y="306" text-anchor="middle" font-size="14" fill="#374151">所以花小额确定成本换取下跌保护</text>

  <line x1="400" y1="310" x2="400" y2="338" stroke="#64748b" stroke-width="3"/>
  <polygon points="400,354 390,336 410,336" fill="#64748b"/>

  <rect x="170" y="348" width="460" height="38" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="400" y="373" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">结论：买保护性认沽，不买“彩票式认沽”</text>
</svg>
