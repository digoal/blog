<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变化后的操作分支</text>

  <rect x="270" y="72" width="260" height="58" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">想买认沽保护持仓？</text>

  <line x1="400" y1="130" x2="400" y2="165" stroke="#64748b" stroke-width="2"/>
  <polygon points="400,176 391,160 409,160" fill="#64748b"/>

  <rect x="255" y="176" width="290" height="54" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="400" y="209" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">四个前提是否同时成立？</text>

  <line x1="255" y1="203" x2="105" y2="265" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="230" x2="400" y2="265" stroke="#64748b" stroke-width="2"/>
  <line x1="545" y1="203" x2="695" y2="265" stroke="#64748b" stroke-width="2"/>

  <rect x="40" y="265" width="210" height="92" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="145" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">没有持仓</text>
  <text x="145" y="318" text-anchor="middle" font-size="14" fill="#374151">这是做空押注</text>
  <text x="145" y="342" text-anchor="middle" font-size="14" fill="#374151">不按保险策略处理</text>

  <rect x="295" y="265" width="210" height="92" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="400" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">全部成立</text>
  <text x="400" y="318" text-anchor="middle" font-size="14" fill="#374151">按保护性认沽执行</text>
  <text x="400" y="342" text-anchor="middle" font-size="14" fill="#374151">先算最大亏损和成本</text>

  <rect x="550" y="265" width="210" height="92" rx="8" fill="#fffbeb" stroke="#d97706"/>
  <text x="655" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">保险费太贵</text>
  <text x="655" y="318" text-anchor="middle" font-size="14" fill="#374151">保护成本吞掉收益</text>
  <text x="655" y="342" text-anchor="middle" font-size="14" fill="#374151">减仓优先于买保险</text>

  <text x="400" y="392" text-anchor="middle" font-size="15" fill="#374151">判断顺序：先问“要保护什么”，再问“用多少钱保护”，最后才问“买哪张合约”</text>
</svg>
