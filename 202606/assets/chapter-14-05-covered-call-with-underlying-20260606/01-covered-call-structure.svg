<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">备兑开仓的真实结构</text>
  <text x="400" y="72" text-anchor="middle" font-size="15" fill="#4b5563">不是空手收钱，而是用现货覆盖卖出认购期权的义务</text>

  <rect x="54" y="122" width="190" height="104" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="149" y="158" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">持有现货</text>
  <text x="149" y="188" text-anchor="middle" font-size="15" fill="#334155">股票或ETF份额</text>
  <text x="149" y="211" text-anchor="middle" font-size="14" fill="#334155">仍承担下跌风险</text>

  <rect x="305" y="122" width="190" height="104" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="158" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">卖出认购</text>
  <text x="400" y="188" text-anchor="middle" font-size="15" fill="#334155">先收权利金</text>
  <text x="400" y="211" text-anchor="middle" font-size="14" fill="#334155">承担按行权价卖出的义务</text>

  <rect x="556" y="122" width="190" height="104" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="651" y="158" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">组合结果</text>
  <text x="651" y="188" text-anchor="middle" font-size="15" fill="#334155">收益被封顶</text>
  <text x="651" y="211" text-anchor="middle" font-size="14" fill="#334155">下跌只多一层小垫子</text>

  <path d="M244 174 H305" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M495 174 H556" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="100" y1="330" x2="710" y2="330" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="360" x2="190" y2="264" stroke="#94a3b8" stroke-width="2"/>
  <text x="710" y="356" text-anchor="end" font-size="13" fill="#64748b">到期标的价格</text>
  <text x="154" y="268" font-size="13" fill="#64748b">组合盈亏</text>
  <path d="M105 360 L330 330 L540 264 L700 264" fill="none" stroke="#2563eb" stroke-width="4"/>
  <circle cx="540" cy="264" r="5" fill="#2563eb"/>
  <text x="540" y="246" text-anchor="middle" font-size="14" fill="#1e40af">行权价后收益封顶</text>
  <text x="246" y="348" font-size="14" fill="#166534">权利金降低成本</text>
  <text x="612" y="287" font-size="14" fill="#9a3412">继续大涨也要交出上方收益</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
