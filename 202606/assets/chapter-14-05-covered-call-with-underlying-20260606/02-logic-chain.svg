<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">备兑开仓论证链</text>
  <text x="400" y="72" text-anchor="middle" font-size="15" fill="#4b5563">前提成立时，它是计划卖出现货的收益增强；前提失效时，它会变成错配交易</text>

  <rect x="36" y="112" width="160" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="116" y="142" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="116" y="169" text-anchor="middle" font-size="14" fill="#334155">已经持有现货</text>
  <text x="116" y="190" text-anchor="middle" font-size="13" fill="#334155">且愿意卖出</text>

  <rect x="36" y="238" width="160" height="86" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="116" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">前提B</text>
  <text x="116" y="295" text-anchor="middle" font-size="14" fill="#334155">卖出认购会收权利金</text>
  <text x="116" y="316" text-anchor="middle" font-size="13" fill="#334155">但承担交割义务</text>

  <rect x="250" y="175" width="184" height="94" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="342" y="207" text-anchor="middle" font-size="17" font-weight="700" fill="#713f12">推导</text>
  <text x="342" y="235" text-anchor="middle" font-size="14" fill="#334155">因为收了权利金</text>
  <text x="342" y="256" text-anchor="middle" font-size="14" fill="#334155">所以必须接受收益封顶</text>

  <rect x="488" y="112" width="276" height="86" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="626" y="142" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">正常结论</text>
  <text x="626" y="169" text-anchor="middle" font-size="14" fill="#334155">只在目标价愿意卖出现货时使用</text>
  <text x="626" y="190" text-anchor="middle" font-size="13" fill="#334155">行权价 + 权利金 = 可接受卖出价</text>

  <rect x="488" y="238" width="276" height="86" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="626" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">失效结论</text>
  <text x="626" y="295" text-anchor="middle" font-size="14" fill="#334155">不愿卖、看大涨、怕下跌</text>
  <text x="626" y="316" text-anchor="middle" font-size="13" fill="#334155">就不该卖认购</text>

  <path d="M196 155 C225 155 226 190 250 207" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M196 281 C225 281 226 248 250 236" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M434 222 H488" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M434 242 C468 264 468 281 488 281" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="400" y="372" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">行动句</text>
  <text x="400" y="399" text-anchor="middle" font-size="16" fill="#334155">先问“这个价格我愿不愿卖”，再问“这笔权利金值不值得收”。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
