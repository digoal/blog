<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">到期三种情景</text>
  <text x="400" y="72" text-anchor="middle" font-size="15" fill="#4b5563">卖出备兑认购前，先把三条路都算清楚</text>

  <rect x="70" y="110" width="200" height="92" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="170" y="141" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">情景一：明显下跌</text>
  <text x="170" y="169" text-anchor="middle" font-size="14" fill="#334155">认购到期归零</text>
  <text x="170" y="190" text-anchor="middle" font-size="14" fill="#334155">权利金只抵掉一小部分亏损</text>

  <rect x="300" y="110" width="200" height="92" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="141" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">情景二：横盘小涨</text>
  <text x="400" y="169" text-anchor="middle" font-size="14" fill="#334155">保留现货</text>
  <text x="400" y="190" text-anchor="middle" font-size="14" fill="#334155">权利金改善持有收益</text>

  <rect x="530" y="110" width="200" height="92" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="630" y="141" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">情景三：大幅上涨</text>
  <text x="630" y="169" text-anchor="middle" font-size="14" fill="#334155">被行权卖出现货</text>
  <text x="630" y="190" text-anchor="middle" font-size="14" fill="#334155">上方收益被放弃</text>

  <rect x="78" y="278" width="184" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="170" y="309" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">操作调整</text>
  <text x="170" y="335" text-anchor="middle" font-size="14" fill="#334155">承认股票风险仍在</text>

  <rect x="308" y="278" width="184" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="309" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">操作调整</text>
  <text x="400" y="335" text-anchor="middle" font-size="14" fill="#334155">可复盘是否继续备兑</text>

  <rect x="538" y="278" width="184" height="76" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="630" y="309" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">操作调整</text>
  <text x="630" y="335" text-anchor="middle" font-size="14" fill="#334155">接受按目标价卖出</text>

  <path d="M170 202 V278" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 202 V278" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M630 202 V278" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="88" y1="386" x2="712" y2="386" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="411" text-anchor="middle" font-size="15" fill="#475569">关键问题：三种结果里，有没有一种是你不能接受的？有，就不做。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
