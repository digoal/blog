<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="领口策略收益边界图">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">领口策略: 给下跌装地板, 给上涨装天花板</text>
  <line x1="90" y1="330" x2="730" y2="330" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="365" x2="120" y2="75" stroke="#334155" stroke-width="2"/>
  <text x="735" y="354" font-size="14" fill="#334155">到期价格</text>
  <text x="40" y="82" font-size="14" fill="#334155">盈亏</text>
  <line x1="120" y1="240" x2="730" y2="240" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="82" y="245" font-size="13" fill="#64748b">0</text>
  <line x1="290" y1="90" x2="290" y2="355" stroke="#64748b" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="570" y1="90" x2="570" y2="355" stroke="#64748b" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="290" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">认沽行权价</text>
  <text x="570" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">认购行权价</text>
  <polyline points="130,300 290,300 570,155 710,155" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="290" cy="300" r="6" fill="#0f766e"/>
  <circle cx="570" cy="155" r="6" fill="#0f766e"/>
  <rect x="135" y="105" width="190" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">下跌保护</text>
  <text x="230" y="153" text-anchor="middle" font-size="14" fill="#1e3a8a">认沽把最大亏损压住</text>
  <rect x="470" y="260" width="220" height="62" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="580" y="285" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">上涨封顶</text>
  <text x="580" y="308" text-anchor="middle" font-size="14" fill="#9a3412">认购收入补贴保险成本</text>
  <path d="M225 168 C220 205, 245 255, 286 292" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M580 260 C585 230, 590 190, 574 160" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
  </defs>
  <text x="400" y="405" text-anchor="middle" font-size="14" fill="#475569">核心代价: 少付保险费, 但放弃认购行权价以上的收益</text>
</svg>
