<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="领口策略论证链">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">论证链: 用卖出上方收益, 换取下方保护</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="35" y="78" width="165" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="117" y="106" text-anchor="middle" font-weight="700" font-size="18">前提A</text>
    <text x="117" y="132" text-anchor="middle">持有现货</text>
    <text x="117" y="154" text-anchor="middle">怕短期下跌</text>
    <rect x="230" y="78" width="165" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="312" y="106" text-anchor="middle" font-weight="700" font-size="18">前提B</text>
    <text x="312" y="132" text-anchor="middle">买认沽</text>
    <text x="312" y="154" text-anchor="middle">获得卖出权</text>
    <rect x="425" y="78" width="165" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="507" y="106" text-anchor="middle" font-weight="700" font-size="18">前提C</text>
    <text x="507" y="132" text-anchor="middle">卖备兑认购</text>
    <text x="507" y="154" text-anchor="middle">收权利金</text>
    <rect x="620" y="78" width="145" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="692" y="106" text-anchor="middle" font-weight="700" font-size="18">前提D</text>
    <text x="692" y="132" text-anchor="middle">愿意封顶</text>
    <text x="692" y="154" text-anchor="middle">不是追暴涨</text>
    <line x1="200" y1="124" x2="230" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="395" y1="124" x2="425" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="590" y1="124" x2="620" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="92" y="222" width="250" height="88" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="217" y="250" text-anchor="middle" font-weight="700" font-size="18">推导1</text>
    <text x="217" y="275" text-anchor="middle">因为认沽可按行权价卖出</text>
    <text x="217" y="297" text-anchor="middle">所以下跌损失有边界</text>
    <rect x="458" y="222" width="250" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="583" y="250" text-anchor="middle" font-weight="700" font-size="18">推导2</text>
    <text x="583" y="275" text-anchor="middle">因为卖认购收钱补贴保险</text>
    <text x="583" y="297" text-anchor="middle">所以上涨超过行权价被封顶</text>
    <line x1="312" y1="170" x2="217" y2="222" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="507" y1="170" x2="583" y2="222" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="210" y="358" width="380" height="54" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
    <text x="400" y="380" text-anchor="middle" font-weight="700" font-size="17">结论</text>
    <text x="400" y="402" text-anchor="middle" font-size="15">只在“要保护、愿封顶、能处理到期”时使用</text>
    <line x1="217" y1="310" x2="350" y2="358" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="583" y1="310" x2="450" y2="358" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
