<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" role="img" aria-label="领口策略情景分支图">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">领口策略到期三种情景</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="285" y="72" width="230" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-size="18" font-weight="700" fill="#0c4a6e">已有持仓 + 买认沽 + 卖备兑认购</text>
  <text x="400" y="126" text-anchor="middle" font-size="14" fill="#0c4a6e">先写好: 保护价、卖出价、到期动作</text>
  <line x1="400" y1="144" x2="400" y2="183" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="285" y="185" width="230" height="56" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="219" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">到期价格落在哪里?</text>
  <line x1="285" y1="218" x2="130" y2="277" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="241" x2="400" y2="277" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="515" y1="218" x2="670" y2="277" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="280" width="230" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="310" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">低于认沽行权价</text>
  <text x="155" y="337" text-anchor="middle" font-size="14" fill="#1e3a8a">认沽发挥保护</text>
  <text x="155" y="360" text-anchor="middle" font-size="14" fill="#1e3a8a">动作: 行权/平仓认沽</text>
  <text x="155" y="383" text-anchor="middle" font-size="14" fill="#1e3a8a">亏损被控制, 但不是零亏</text>
  <rect x="285" y="280" width="230" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">两个行权价之间</text>
  <text x="400" y="337" text-anchor="middle" font-size="14" fill="#14532d">两边期权多半不行权</text>
  <text x="400" y="360" text-anchor="middle" font-size="14" fill="#14532d">动作: 保留持仓或续做</text>
  <text x="400" y="383" text-anchor="middle" font-size="14" fill="#14532d">净成本影响真实收益</text>
  <rect x="530" y="280" width="230" height="110" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="645" y="310" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">高于认购行权价</text>
  <text x="645" y="337" text-anchor="middle" font-size="14" fill="#9a3412">上涨收益被封顶</text>
  <text x="645" y="360" text-anchor="middle" font-size="14" fill="#9a3412">动作: 接受卖出或买回认购</text>
  <text x="645" y="383" text-anchor="middle" font-size="14" fill="#9a3412">不愿卖出就不要开领口</text>
  <text x="400" y="420" text-anchor="middle" font-size="14" fill="#475569">关键: 建仓前先决定到期处理, 不在临近到期时临时赌方向</text>
</svg>
