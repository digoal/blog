<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="期权时间价值衰减示意图">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">期权买方买的是“方向 + 时间”</text>
  <text x="400" y="68" text-anchor="middle" font-size="15" fill="#475569">方向慢一点、幅度小一点，时间价值都会把权利金磨掉</text>
  <line x1="105" y1="318" x2="720" y2="318" stroke="#334155" stroke-width="2"/>
  <line x1="105" y1="105" x2="105" y2="318" stroke="#334155" stroke-width="2"/>
  <text x="92" y="108" text-anchor="end" font-size="13" fill="#475569">权利金</text>
  <text x="724" y="342" text-anchor="end" font-size="13" fill="#475569">距离到期日</text>
  <path d="M125 145 C250 155 350 188 450 230 S610 292 690 313" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <path d="M125 170 L690 170" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="705" y="174" font-size="13" fill="#16a34a">内在价值</text>
  <g font-size="14" fill="#0f172a">
    <circle cx="145" cy="148" r="6" fill="#2563eb"/>
    <text x="145" y="354" text-anchor="middle">60天</text>
    <text x="145" y="128" text-anchor="middle">时间还多</text>
    <circle cx="330" cy="188" r="6" fill="#2563eb"/>
    <text x="330" y="354" text-anchor="middle">30天</text>
    <text x="330" y="168" text-anchor="middle">开始变薄</text>
    <circle cx="515" cy="266" r="6" fill="#2563eb"/>
    <text x="515" y="354" text-anchor="middle">10天</text>
    <text x="515" y="246" text-anchor="middle">衰减加快</text>
    <circle cx="690" cy="313" r="6" fill="#dc2626"/>
    <text x="690" y="354" text-anchor="middle">到期</text>
    <text x="660" y="296" text-anchor="middle" fill="#dc2626">时间价值归零</text>
  </g>
  <rect x="170" y="238" width="190" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="265" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">期权价格</text>
  <text x="265" y="284" text-anchor="middle" font-size="14" fill="#475569">内在价值 + 时间价值</text>
</svg>
