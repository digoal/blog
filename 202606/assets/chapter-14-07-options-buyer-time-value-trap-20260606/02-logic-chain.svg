<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="期权买方时间价值陷阱论证链">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 看对方向不够，还要跑赢时间和成本</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="35" y="80" width="165" height="92" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="118" y="108" text-anchor="middle" font-size="18" font-weight="700">前提A</text>
    <text x="118" y="133" text-anchor="middle">买方先付权利金</text>
    <text x="118" y="155" text-anchor="middle">最大损失看得见</text>
    <rect x="225" y="80" width="165" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="308" y="108" text-anchor="middle" font-size="18" font-weight="700">前提B</text>
    <text x="308" y="133" text-anchor="middle">时间价值随到期</text>
    <text x="308" y="155" text-anchor="middle">持续变薄</text>
    <rect x="415" y="80" width="165" height="92" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="498" y="108" text-anchor="middle" font-size="18" font-weight="700">前提C</text>
    <text x="498" y="133" text-anchor="middle">盈亏平衡点</text>
    <text x="498" y="155" text-anchor="middle">高于行权价</text>
    <rect x="605" y="80" width="165" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="688" y="108" text-anchor="middle" font-size="18" font-weight="700">前提D</text>
    <text x="688" y="133" text-anchor="middle">权利金会被情绪</text>
    <text x="688" y="155" text-anchor="middle">和波动率抬高</text>
    <line x1="200" y1="126" x2="225" y2="126" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="390" y1="126" x2="415" y2="126" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="580" y1="126" x2="605" y2="126" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="105" y="225" width="250" height="88" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="230" y="255" text-anchor="middle" font-size="18" font-weight="700">推导1</text>
    <text x="230" y="280" text-anchor="middle">标的涨了但涨得不够</text>
    <text x="230" y="302" text-anchor="middle">买方仍会亏权利金</text>
    <rect x="445" y="225" width="250" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="570" y="255" text-anchor="middle" font-size="18" font-weight="700">推导2</text>
    <text x="570" y="280" text-anchor="middle">买得越贵、时间越短</text>
    <text x="570" y="302" text-anchor="middle">需要的行情越剧烈</text>
    <line x1="308" y1="172" x2="230" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="594" y1="172" x2="570" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="175" y="360" width="450" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="400" y="392" text-anchor="middle" font-size="18" font-weight="700">结论: 只在“幅度、速度、成本、仓位”四项都过关时买</text>
    <line x1="230" y1="313" x2="345" y2="360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="570" y1="313" x2="455" y2="360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
