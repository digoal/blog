<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="期权买方四门检查决策图">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">买入期权前的四门检查</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="70" y="88" width="150" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="145" y="118" text-anchor="middle" font-size="17" font-weight="700">第一门</text>
    <text x="145" y="143" text-anchor="middle">方向有依据吗</text>
    <rect x="250" y="88" width="150" height="72" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="325" y="118" text-anchor="middle" font-size="17" font-weight="700">第二门</text>
    <text x="325" y="143" text-anchor="middle">幅度够过成本吗</text>
    <rect x="430" y="88" width="150" height="72" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="505" y="118" text-anchor="middle" font-size="17" font-weight="700">第三门</text>
    <text x="505" y="143" text-anchor="middle">时间够兑现吗</text>
    <rect x="610" y="88" width="150" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="685" y="118" text-anchor="middle" font-size="17" font-weight="700">第四门</text>
    <text x="685" y="143" text-anchor="middle">仓位亏得起吗</text>
    <line x1="220" y1="124" x2="250" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="124" x2="430" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="580" y1="124" x2="610" y2="124" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="120" y="230" width="230" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="235" y="264" text-anchor="middle" font-size="18" font-weight="700">四门都通过</text>
    <text x="235" y="291" text-anchor="middle">最多小仓买一张学习</text>
    <rect x="450" y="230" width="230" height="86" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="565" y="264" text-anchor="middle" font-size="18" font-weight="700">任一门不过</text>
    <text x="565" y="291" text-anchor="middle">不买、换远期、或退回ETF</text>
    <line x1="400" y1="160" x2="235" y2="230" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="505" y1="160" x2="565" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="165" y="360" width="470" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="400" y="387" text-anchor="middle" font-size="16" font-weight="700">核心: 先问“错了亏多少”，再问“对了能赚多少”</text>
  </g>
</svg>
