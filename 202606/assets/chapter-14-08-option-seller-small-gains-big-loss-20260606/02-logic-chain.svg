<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">期权卖方风险论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="40" y="70" width="165" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="122" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#0f766e">前提A</text>
  <text x="122" y="127" text-anchor="middle" font-size="14" fill="#334155">最大收益</text>
  <text x="122" y="148" text-anchor="middle" font-size="14" fill="#334155">只是权利金</text>
  <rect x="230" y="70" width="165" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="312" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">前提B</text>
  <text x="312" y="127" text-anchor="middle" font-size="14" fill="#334155">卖方承担</text>
  <text x="312" y="148" text-anchor="middle" font-size="14" fill="#334155">履约义务</text>
  <rect x="420" y="70" width="165" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="502" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#7c3aed">前提C</text>
  <text x="502" y="127" text-anchor="middle" font-size="14" fill="#334155">波动率和保证金</text>
  <text x="502" y="148" text-anchor="middle" font-size="14" fill="#334155">会突然变化</text>
  <rect x="610" y="70" width="150" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="685" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#be123c">前提D</text>
  <text x="685" y="127" text-anchor="middle" font-size="14" fill="#334155">小白迷信</text>
  <text x="685" y="148" text-anchor="middle" font-size="14" fill="#334155">高胜率</text>
  <line x1="205" y1="115" x2="230" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="395" y1="115" x2="420" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="585" y1="115" x2="610" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="95" y="205" width="610" height="82" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="400" y="234" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">推导</text>
  <text x="400" y="260" text-anchor="middle" font-size="15" fill="#334155">因为收入封顶, 义务不封顶或很大, 且保证金随风险重估</text>
  <text x="400" y="281" text-anchor="middle" font-size="15" fill="#334155">所以“多次小赚”不能抵消“尾部一次大亏”的结构风险</text>
  <line x1="400" y1="160" x2="400" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="160" y="330" width="480" height="62" rx="14" fill="#fee2e2" stroke="#fecaca"/>
  <text x="400" y="356" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">结论</text>
  <text x="400" y="380" text-anchor="middle" font-size="15" fill="#334155">小白默认不裸卖; 只有覆盖、现金担保、限亏和极小仓位同时成立才讨论卖方</text>
  <line x1="400" y1="287" x2="400" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
