<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f7f9fb"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">期权卖方下单前决策树</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="270" y="65" width="260" height="52" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">想卖出期权收权利金?</text>
  <line x1="400" y1="117" x2="400" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="150" width="300" height="52" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="400" y="182" text-anchor="middle" font-size="15" fill="#7c2d12">能说清被行权后的义务吗?</text>
  <line x1="250" y1="176" x2="120" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="35" y="146" width="85" height="60" rx="10" fill="#fee2e2" stroke="#fecaca"/>
  <text x="78" y="171" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">不能</text>
  <text x="78" y="193" text-anchor="middle" font-size="13" fill="#991b1b">不下单</text>
  <line x1="400" y1="202" x2="400" y2="235" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="230" y="235" width="340" height="52" rx="12" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="400" y="267" text-anchor="middle" font-size="15" fill="#155e75">有现货覆盖或现金足额担保吗?</text>
  <line x1="230" y1="261" x2="120" y2="261" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="35" y="231" width="85" height="60" rx="10" fill="#fee2e2" stroke="#fecaca"/>
  <text x="78" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">没有</text>
  <text x="78" y="278" text-anchor="middle" font-size="13" fill="#991b1b">不裸卖</text>
  <line x1="400" y1="287" x2="400" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="225" y="320" width="350" height="52" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="400" y="352" text-anchor="middle" font-size="15" fill="#166534">已写最大亏损、止损线和减仓规则?</text>
  <line x1="575" y1="346" x2="685" y2="346" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="685" y="316" width="85" height="60" rx="10" fill="#fee2e2" stroke="#fecaca"/>
  <text x="728" y="341" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">没有</text>
  <text x="728" y="363" text-anchor="middle" font-size="13" fill="#991b1b">先补计划</text>
  <line x1="400" y1="372" x2="400" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="396" width="220" height="28" rx="14" fill="#dcfce7" stroke="#86efac"/>
  <text x="400" y="416" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">只用极小仓位学习</text>
</svg>
