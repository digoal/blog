<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">期权三块仪表盘</text>
  <text x="400" y="72" text-anchor="middle" font-size="15" fill="#475569">方向、时间、波动率，三项缺一项都不能只看“涨跌”</text>

  <rect x="55" y="110" width="210" height="220" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="160" cy="185" r="58" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  <path d="M112 185 A48 48 0 0 1 208 185" fill="none" stroke="#bfdbfe" stroke-width="10"/>
  <path d="M160 185 L197 153" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <circle cx="160" cy="185" r="6" fill="#2563eb"/>
  <text x="160" y="270" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">Delta</text>
  <text x="160" y="298" text-anchor="middle" font-size="15" fill="#334155">标的涨跌 1 元</text>
  <text x="160" y="320" text-anchor="middle" font-size="15" fill="#334155">期权大约动多少</text>

  <rect x="295" y="110" width="210" height="220" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="400" cy="185" r="58" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <path d="M400 141 V185 L431 210" stroke="#f97316" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="400" cy="185" r="6" fill="#f97316"/>
  <text x="400" y="270" text-anchor="middle" font-size="24" font-weight="700" fill="#c2410c">Theta</text>
  <text x="400" y="298" text-anchor="middle" font-size="15" fill="#334155">每天过去</text>
  <text x="400" y="320" text-anchor="middle" font-size="15" fill="#334155">时间价值漏掉多少</text>

  <rect x="535" y="110" width="210" height="220" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M595 220 C615 140 675 140 695 220" fill="none" stroke="#16a34a" stroke-width="6"/>
  <path d="M604 215 C620 170 670 170 686 215" fill="none" stroke="#bbf7d0" stroke-width="10"/>
  <circle cx="645" cy="184" r="11" fill="#16a34a"/>
  <text x="645" y="270" text-anchor="middle" font-size="24" font-weight="700" fill="#15803d">Vega</text>
  <text x="645" y="298" text-anchor="middle" font-size="15" fill="#334155">隐含波动率变 1 个点</text>
  <text x="645" y="320" text-anchor="middle" font-size="15" fill="#334155">权利金大约动多少</text>

  <text x="400" y="365" text-anchor="middle" font-size="14" fill="#64748b">小白口诀：Delta 看方向，Theta 看倒计时，Vega 看买贵没有</text>
</svg>
