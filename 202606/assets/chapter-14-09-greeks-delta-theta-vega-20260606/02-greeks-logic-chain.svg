<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">希腊字母论证链</text>
  <text x="400" y="66" text-anchor="middle" font-size="15" fill="#475569">期权盈亏 = 方向暴露 + 时间消耗 + 波动率价格</text>

  <rect x="42" y="112" width="160" height="86" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="122" y="145" text-anchor="middle" font-size="19" font-weight="700" fill="#1d4ed8">前提 A</text>
  <text x="122" y="173" text-anchor="middle" font-size="15" fill="#1f2937">Delta 决定</text>
  <text x="122" y="193" text-anchor="middle" font-size="15" fill="#1f2937">方向敏感度</text>

  <rect x="42" y="224" width="160" height="86" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="122" y="257" text-anchor="middle" font-size="19" font-weight="700" fill="#c2410c">前提 B</text>
  <text x="122" y="285" text-anchor="middle" font-size="15" fill="#1f2937">Theta 决定</text>
  <text x="122" y="305" text-anchor="middle" font-size="15" fill="#1f2937">时间流失速度</text>

  <rect x="42" y="336" width="160" height="54" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="122" y="360" text-anchor="middle" font-size="19" font-weight="700" fill="#15803d">前提 C</text>
  <text x="122" y="383" text-anchor="middle" font-size="15" fill="#1f2937">Vega 决定波动率敏感度</text>

  <path d="M210 155 H300" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M210 267 H300" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M210 363 H300" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="305" y="150" width="210" height="165" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="184" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">因为</text>
  <text x="410" y="215" text-anchor="middle" font-size="16" fill="#334155">方向对了不等于赚钱</text>
  <text x="410" y="243" text-anchor="middle" font-size="16" fill="#334155">时间会扣分</text>
  <text x="410" y="271" text-anchor="middle" font-size="16" fill="#334155">权利金贵会抬高门槛</text>
  <text x="410" y="299" text-anchor="middle" font-size="16" fill="#334155">所以不能只看涨跌</text>

  <path d="M522 232 H605" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="610" y="136" width="150" height="194" rx="12" fill="#111827"/>
  <text x="685" y="174" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">结论</text>
  <text x="685" y="209" text-anchor="middle" font-size="15" fill="#e5e7eb">下单前先问</text>
  <text x="685" y="237" text-anchor="middle" font-size="15" fill="#e5e7eb">Delta 够不够</text>
  <text x="685" y="265" text-anchor="middle" font-size="15" fill="#e5e7eb">Theta 扛不扛</text>
  <text x="685" y="293" text-anchor="middle" font-size="15" fill="#e5e7eb">Vega 贵不贵</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
