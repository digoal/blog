<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">下单前三问决策树</text>
  <text x="400" y="68" text-anchor="middle" font-size="15" fill="#475569">任意一问不合格，都先停下来重新算</text>

  <rect x="300" y="96" width="200" height="58" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">想买一张期权</text>

  <path d="M400 154 V190" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="280" y="190" width="240" height="58" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="215" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">1. Delta 够不够？</text>
  <text x="400" y="238" text-anchor="middle" font-size="14" fill="#334155">标的小涨，期权是否跟得动</text>

  <path d="M280 219 H130" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="45" y="188" width="84" height="64" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="87" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">不够</text>
  <text x="87" y="238" text-anchor="middle" font-size="13" fill="#991b1b">不买虚值</text>

  <path d="M400 248 V284" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="280" y="284" width="240" height="58" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="309" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">2. Theta 扛不扛？</text>
  <text x="400" y="332" text-anchor="middle" font-size="14" fill="#334155">每天损耗是否在预算内</text>

  <path d="M520 313 H672" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="672" y="282" width="84" height="64" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="714" y="309" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">扛不住</text>
  <text x="714" y="332" text-anchor="middle" font-size="13" fill="#991b1b">缩短计划</text>

  <path d="M400 342 V374" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="280" y="374" width="240" height="44" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="402" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">3. Vega 贵不贵？贵就等、减仓或不用买方</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
