<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">A股期权与美股期权规则地图</title>
  <desc id="desc">对比A股ETF期权和美股股票ETF期权的账户、标的、合约、行权、交易时间和风险边界。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">先看规则，再谈策略</text>
  <text x="400" y="61" text-anchor="middle" font-size="14" fill="#475569">同样叫期权，账户门槛、合约单位、行权方式和交易节奏不同</text>

  <rect x="54" y="92" width="300" height="256" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="446" y="92" width="300" height="256" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="204" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="#0f766e">A股ETF期权</text>
  <text x="596" y="124" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">美股股票/ETF期权</text>

  <g font-size="14" fill="#111827">
    <text x="84" y="162">账户: 证券账户 + 期权权限</text>
    <text x="84" y="194">标的: 交易所指定ETF为主</text>
    <text x="84" y="226">合约: ETF期权常见10000份/张</text>
    <text x="84" y="258">行权: 多数ETF期权为到期日行权</text>
    <text x="84" y="290">节奏: 跟随A股日盘交易</text>
    <text x="84" y="322">重点: 先满足适当性和规则学习</text>

    <text x="476" y="162">账户: 券商按期权等级审批</text>
    <text x="476" y="194">标的: 股票、ETF和指数品种多</text>
    <text x="476" y="226">合约: 股票期权通常100股/张</text>
    <text x="476" y="258">行权: 股票/ETF期权多为美式</text>
    <text x="476" y="290">节奏: 美东时间，周权更常见</text>
    <text x="476" y="322">重点: 不把选择多当成胜率高</text>
  </g>

  <line x1="368" y1="214" x2="432" y2="214" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="400" cy="214" r="34" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="400" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">规则差异</text>
  <text x="400" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">= 风险差异</text>
</svg>
