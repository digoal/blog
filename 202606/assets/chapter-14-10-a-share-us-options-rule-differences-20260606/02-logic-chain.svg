<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">规则差异论证链</title>
  <desc id="desc">展示从账户规则、合约规格、交易时间和行权制度推导出小白操作结论的因果链。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 规则不同，所以同一策略不能直接搬家</text>

  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5">
    <rect x="44" y="82" width="152" height="86" rx="8"/>
    <rect x="224" y="82" width="152" height="86" rx="8"/>
    <rect x="404" y="82" width="152" height="86" rx="8"/>
    <rect x="584" y="82" width="152" height="86" rx="8"/>
  </g>
  <g font-size="14" fill="#111827" text-anchor="middle">
    <text x="120" y="112" font-weight="700">前提A</text>
    <text x="120" y="137">账户审批</text>
    <text x="120" y="156">不是同一套门槛</text>
    <text x="300" y="112" font-weight="700">前提B</text>
    <text x="300" y="137">合约单位</text>
    <text x="300" y="156">决定真实金额</text>
    <text x="480" y="112" font-weight="700">前提C</text>
    <text x="480" y="137">到期与行权</text>
    <text x="480" y="156">改变时间风险</text>
    <text x="660" y="112" font-weight="700">前提D</text>
    <text x="660" y="137">品种和交易时段</text>
    <text x="660" y="156">改变执行风险</text>
  </g>

  <g stroke="#64748b" stroke-width="2" marker-end="url(#arrow)">
    <line x1="120" y1="178" x2="220" y2="232"/>
    <line x1="300" y1="178" x2="330" y2="232"/>
    <line x1="480" y1="178" x2="450" y2="232"/>
    <line x1="660" y1="178" x2="560" y2="232"/>
  </g>

  <rect x="204" y="232" width="392" height="84" rx="8" fill="#ecfeff" stroke="#0891b2"/>
  <text x="400" y="262" text-anchor="middle" font-size="18" font-weight="700" fill="#0e7490">推导</text>
  <text x="400" y="288" text-anchor="middle" font-size="15" fill="#164e63">因为规则改变的是资金占用、到期压力和履约方式</text>
  <text x="400" y="310" text-anchor="middle" font-size="15" fill="#164e63">所以策略名称相同，真实风险也可能完全不同</text>

  <line x1="400" y1="316" x2="400" y2="348" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="182" y="348" width="436" height="48" rx="8" fill="#fff7ed" stroke="#f97316"/>
  <text x="400" y="378" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">结论: 每次跨市场交易前，先重做“规则翻译表”</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
