<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="title desc">
  <title id="title">跨市场期权下单检查流程</title>
  <desc id="desc">展示从确认市场到计算金额、确认行权、确认时间、选择行动的检查流程。</desc>
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">跨市场期权下单前的五步检查</text>

  <g font-size="14" text-anchor="middle" fill="#111827">
    <rect x="80" y="74" width="160" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="98" font-weight="700">1. 市场</text>
    <text x="160" y="119">A股还是美股</text>

    <rect x="320" y="74" width="160" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="400" y="98" font-weight="700">2. 账户</text>
    <text x="400" y="119">权限和等级</text>

    <rect x="560" y="74" width="160" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="98" font-weight="700">3. 金额</text>
    <text x="640" y="119">合约单位 x 权利金</text>

    <rect x="200" y="200" width="160" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="280" y="224" font-weight="700">4. 行权</text>
    <text x="280" y="245">欧式还是美式</text>

    <rect x="440" y="200" width="160" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="520" y="224" font-weight="700">5. 时间</text>
    <text x="520" y="245">到期日和交易时段</text>
  </g>

  <g stroke="#64748b" stroke-width="2" marker-end="url(#arrow)">
    <line x1="240" y1="103" x2="320" y2="103"/>
    <line x1="480" y1="103" x2="560" y2="103"/>
    <line x1="640" y1="132" x2="546" y2="196"/>
    <line x1="440" y1="229" x2="360" y2="229"/>
    <line x1="280" y1="258" x2="280" y2="308"/>
    <line x1="520" y1="258" x2="520" y2="308"/>
  </g>

  <rect x="178" y="308" width="202" height="80" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="279" y="337" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">全部说清</text>
  <text x="279" y="362" text-anchor="middle" font-size="14" fill="#166534">只用小仓或模拟</text>

  <rect x="420" y="308" width="202" height="80" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="521" y="337" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">任一步说不清</text>
  <text x="521" y="362" text-anchor="middle" font-size="14" fill="#991b1b">停止下单，回到规则学习</text>

  <text x="400" y="426" text-anchor="middle" font-size="14" fill="#475569">目标不是证明自己会预测，而是先确认自己知道正在承担哪一种规则风险</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
