<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="三类不适合散户的期权策略风险结构">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">三类策略的共同问题: 收益小而确定, 亏损大而突然</text>
  <g font-size="14" fill="#0f172a" stroke-linecap="round" stroke-linejoin="round">
    <rect x="38" y="78" width="220" height="286" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="148" y="110" text-anchor="middle" font-size="19" font-weight="700" fill="#b91c1c">裸卖认购</text>
    <line x1="72" y1="275" x2="224" y2="275" stroke="#64748b" stroke-width="2"/>
    <line x1="115" y1="318" x2="115" y2="160" stroke="#64748b" stroke-width="2"/>
    <path d="M78 235 L115 235 L220 332" fill="none" stroke="#ef4444" stroke-width="4"/>
    <text x="74" y="158" fill="#334155">盈利上限</text>
    <text x="150" y="250" fill="#334155">权利金</text>
    <text x="151" y="343" fill="#b91c1c" font-weight="700">标的大涨, 亏损放大</text>
    <text x="148" y="386" text-anchor="middle" fill="#475569">没有现货兜底, 义务暴露</text>

    <rect x="290" y="78" width="220" height="286" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="400" y="110" text-anchor="middle" font-size="19" font-weight="700" fill="#b91c1c">跨式裸卖</text>
    <line x1="324" y1="275" x2="476" y2="275" stroke="#64748b" stroke-width="2"/>
    <line x1="400" y1="318" x2="400" y2="160" stroke="#64748b" stroke-width="2"/>
    <path d="M328 330 L382 232 L418 232 L472 330" fill="none" stroke="#ef4444" stroke-width="4"/>
    <rect x="375" y="202" width="50" height="22" rx="4" fill="#dcfce7" stroke="#16a34a"/>
    <text x="400" y="219" text-anchor="middle" font-size="12" fill="#166534">窄盈利区</text>
    <text x="342" y="348" fill="#b91c1c" font-weight="700">大跌亏</text>
    <text x="424" y="348" fill="#b91c1c" font-weight="700">大涨亏</text>
    <text x="400" y="386" text-anchor="middle" fill="#475569">赌标的不动, 但市场会动</text>

    <rect x="542" y="78" width="220" height="286" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="652" y="110" text-anchor="middle" font-size="19" font-weight="700" fill="#b91c1c">重仓末日期权</text>
    <circle cx="652" cy="206" r="58" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <line x1="652" y1="206" x2="652" y2="166" stroke="#92400e" stroke-width="4"/>
    <line x1="652" y1="206" x2="687" y2="226" stroke="#92400e" stroke-width="4"/>
    <text x="652" y="290" text-anchor="middle" font-weight="700" fill="#b91c1c">时间价值快速归零</text>
    <text x="652" y="318" text-anchor="middle" fill="#334155">方向、幅度、时间</text>
    <text x="652" y="340" text-anchor="middle" fill="#334155">三项必须同时对</text>
    <text x="652" y="386" text-anchor="middle" fill="#475569">便宜不是安全, 是寿命短</text>
  </g>
</svg>
