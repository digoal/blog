<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-label="不适合散户策略的论证链">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">论证链: 不能量化最大亏损, 就不能下单</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="36" y="78" width="170" height="96" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="121" y="108" text-anchor="middle" font-size="18" font-weight="700">前提A</text>
    <text x="121" y="133" text-anchor="middle">期权卖方</text>
    <text x="121" y="155" text-anchor="middle">承担履约义务</text>

    <rect x="232" y="78" width="170" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="317" y="108" text-anchor="middle" font-size="18" font-weight="700">前提B</text>
    <text x="317" y="133" text-anchor="middle">保证金和指派</text>
    <text x="317" y="155" text-anchor="middle">会强制你行动</text>

    <rect x="428" y="78" width="170" height="96" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="513" y="108" text-anchor="middle" font-size="18" font-weight="700">前提C</text>
    <text x="513" y="133" text-anchor="middle">末日期权</text>
    <text x="513" y="155" text-anchor="middle">容错时间极短</text>

    <rect x="624" y="78" width="140" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="694" y="108" text-anchor="middle" font-size="18" font-weight="700">前提D</text>
    <text x="694" y="133" text-anchor="middle">散户资金</text>
    <text x="694" y="155" text-anchor="middle">抗冲击弱</text>

    <line x1="206" y1="126" x2="232" y2="126" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="402" y1="126" x2="428" y2="126" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="598" y1="126" x2="624" y2="126" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="120" y="224" width="250" height="90" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="245" y="253" text-anchor="middle" font-size="18" font-weight="700">推导1</text>
    <text x="245" y="278" text-anchor="middle">小权利金不能覆盖</text>
    <text x="245" y="300" text-anchor="middle">跳空、波动和强平风险</text>

    <rect x="430" y="224" width="250" height="90" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="555" y="253" text-anchor="middle" font-size="18" font-weight="700">推导2</text>
    <text x="555" y="278" text-anchor="middle">重仓会把单次错误</text>
    <text x="555" y="300" text-anchor="middle">变成账户级事故</text>

    <line x1="317" y1="174" x2="245" y2="224" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="594" y1="174" x2="555" y2="224" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="176" y="354" width="448" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="400" y="387" text-anchor="middle" font-size="18" font-weight="700">结论: 裸卖、跨式裸卖、重仓末日期权列入小白禁用区</text>
    <line x1="245" y1="314" x2="370" y2="354" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="555" y1="314" x2="430" y2="354" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
