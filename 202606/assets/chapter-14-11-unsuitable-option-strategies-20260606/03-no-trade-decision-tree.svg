<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" role="img" aria-label="期权高危策略禁用决策树">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">下单前禁用决策树</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="260" y="72" width="280" height="58" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="400" y="107" text-anchor="middle" font-size="18" font-weight="700">准备做一笔期权交易?</text>

    <rect x="80" y="180" width="190" height="74" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="175" y="210" text-anchor="middle" font-weight="700">卖方有没有覆盖?</text>
    <text x="175" y="234" text-anchor="middle">现货或足额现金</text>

    <rect x="305" y="180" width="190" height="74" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="210" text-anchor="middle" font-weight="700">是否双边裸卖?</text>
    <text x="400" y="234" text-anchor="middle">认购和认沽都裸卖</text>

    <rect x="530" y="180" width="190" height="74" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="625" y="210" text-anchor="middle" font-weight="700">是否末日重仓?</text>
    <text x="625" y="234" text-anchor="middle">0DTE或临到期大仓</text>

    <line x1="400" y1="130" x2="175" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="130" x2="400" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="130" x2="625" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="72" y="312" width="196" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="170" y="341" text-anchor="middle" font-weight="700" fill="#991b1b">没有覆盖: 禁止</text>
    <text x="170" y="366" text-anchor="middle">裸卖不是小白工具</text>

    <rect x="302" y="312" width="196" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="400" y="341" text-anchor="middle" font-weight="700" fill="#991b1b">双边裸卖: 禁止</text>
    <text x="400" y="366" text-anchor="middle">两边尾部都暴露</text>

    <rect x="532" y="312" width="196" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="630" y="341" text-anchor="middle" font-weight="700" fill="#991b1b">末日重仓: 禁止</text>
    <text x="630" y="366" text-anchor="middle">时间不够纠错</text>

    <line x1="175" y1="254" x2="170" y2="312" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="254" x2="400" y2="312" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="625" y1="254" x2="630" y2="312" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <text x="400" y="426" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">只有最大亏损、履约资金、退出规则都写清楚, 才进入模拟或极小仓学习</text>
  </g>
</svg>
