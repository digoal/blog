<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">期权复盘的三种真实目的</title>
  <desc id="desc">把期权交易分成保险、增强收益和赌博三类，并列出复盘标准</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">期权复盘先问目的：保险、增强收益，还是赌博</text>
  <g font-size="15" fill="#111827">
    <rect x="45" y="80" width="220" height="230" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="155" y="116" text-anchor="middle" font-size="21" font-weight="700" fill="#075985">保险</text>
    <text x="155" y="150" text-anchor="middle">已有持仓需要保护</text>
    <text x="155" y="178" text-anchor="middle">成本是权利金预算</text>
    <text x="155" y="206" text-anchor="middle">成功标准：回撤变小</text>
    <text x="155" y="234" text-anchor="middle">亏权利金也可能合格</text>
    <line x1="75" y1="258" x2="235" y2="258" stroke="#7dd3fc"/>
    <text x="155" y="287" text-anchor="middle" font-weight="700">复盘口径</text>
    <text x="155" y="312" text-anchor="middle">保护对象是否清楚</text>
    <text x="155" y="336" text-anchor="middle">保险费是否超预算</text>

    <rect x="290" y="80" width="220" height="230" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="400" y="116" text-anchor="middle" font-size="21" font-weight="700" fill="#166534">增强收益</text>
    <text x="400" y="150" text-anchor="middle">已有资产或现金准备</text>
    <text x="400" y="178" text-anchor="middle">愿意被行权交割</text>
    <text x="400" y="206" text-anchor="middle">成功标准：按计划履约</text>
    <text x="400" y="234" text-anchor="middle">不是只看权利金收入</text>
    <line x1="320" y1="258" x2="480" y2="258" stroke="#86efac"/>
    <text x="400" y="287" text-anchor="middle" font-weight="700">复盘口径</text>
    <text x="400" y="312" text-anchor="middle">义务是否被覆盖</text>
    <text x="400" y="336" text-anchor="middle">机会成本是否接受</text>

    <rect x="535" y="80" width="220" height="230" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="645" y="116" text-anchor="middle" font-size="21" font-weight="700" fill="#991b1b">赌博</text>
    <text x="645" y="150" text-anchor="middle">没有保护对象</text>
    <text x="645" y="178" text-anchor="middle">没有履约准备</text>
    <text x="645" y="206" text-anchor="middle">只想小钱搏大钱</text>
    <text x="645" y="234" text-anchor="middle">成功也不能复制</text>
    <line x1="565" y1="258" x2="725" y2="258" stroke="#fca5a5"/>
    <text x="645" y="287" text-anchor="middle" font-weight="700">复盘口径</text>
    <text x="645" y="312" text-anchor="middle">列为红线样本</text>
    <text x="645" y="336" text-anchor="middle">减少或停止实盘</text>
  </g>
  <rect x="105" y="352" width="590" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="374" text-anchor="middle" font-size="15" fill="#334155">同一笔盈亏，目的不同，复盘结论完全不同</text>
</svg>
