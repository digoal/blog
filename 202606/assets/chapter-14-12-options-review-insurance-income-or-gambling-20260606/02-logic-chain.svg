<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">期权复盘论证链</title>
  <desc id="desc">从期权的时间、杠杆和义务特征推导出三标签复盘法</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链：不先分类，期权复盘会变成盈亏情绪记录</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="35" y="78" width="170" height="94" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="120" y="108" text-anchor="middle" font-size="18" font-weight="700">前提A</text>
    <text x="120" y="134" text-anchor="middle">期权有到期日</text>
    <text x="120" y="156" text-anchor="middle">时间会改变结果</text>

    <rect x="230" y="78" width="170" height="94" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="315" y="108" text-anchor="middle" font-size="18" font-weight="700">前提B</text>
    <text x="315" y="134" text-anchor="middle">权利金和波动率</text>
    <text x="315" y="156" text-anchor="middle">决定成本边界</text>

    <rect x="425" y="78" width="170" height="94" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="510" y="108" text-anchor="middle" font-size="18" font-weight="700">前提C</text>
    <text x="510" y="134" text-anchor="middle">卖方有履约义务</text>
    <text x="510" y="156" text-anchor="middle">不能只看收入</text>

    <rect x="620" y="78" width="145" height="94" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="692" y="108" text-anchor="middle" font-size="18" font-weight="700">前提D</text>
    <text x="692" y="134" text-anchor="middle">小白容易追求</text>
    <text x="692" y="156" text-anchor="middle">高倍短线刺激</text>

    <line x1="205" y1="125" x2="230" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="125" x2="425" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="595" y1="125" x2="620" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="95" y="230" width="275" height="88" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="232" y="260" text-anchor="middle" font-size="18" font-weight="700">推导1</text>
    <text x="232" y="286" text-anchor="middle">只复盘盈亏，会漏掉时间、</text>
    <text x="232" y="308" text-anchor="middle">权利金、波动和义务变化</text>

    <rect x="430" y="230" width="275" height="88" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="568" y="260" text-anchor="middle" font-size="18" font-weight="700">推导2</text>
    <text x="568" y="286" text-anchor="middle">先看目的和边界，才能判断</text>
    <text x="568" y="308" text-anchor="middle">这一笔是否值得复制</text>

    <line x1="315" y1="172" x2="232" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="510" y1="172" x2="568" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="170" y="362" width="460" height="48" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="400" y="392" text-anchor="middle" font-size="18" font-weight="700">结论：每笔期权先贴三标签，再复盘盈亏</text>
    <line x1="232" y1="318" x2="355" y2="362" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="568" y1="318" x2="445" y2="362" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
