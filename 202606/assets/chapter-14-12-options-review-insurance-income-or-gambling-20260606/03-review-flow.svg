<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">期权复盘流程</title>
  <desc id="desc">展示期权交易结束后如何按目的、边界、结果和动作复盘</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">一笔期权交易结束后，用四步复盘</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="65" y="86" width="180" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="155" y="116" text-anchor="middle" font-weight="700" font-size="18">第一步</text>
    <text x="155" y="142" text-anchor="middle">贴目的标签</text>

    <rect x="310" y="86" width="180" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="400" y="116" text-anchor="middle" font-weight="700" font-size="18">第二步</text>
    <text x="400" y="142" text-anchor="middle">检查风险边界</text>

    <rect x="555" y="86" width="180" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="645" y="116" text-anchor="middle" font-weight="700" font-size="18">第三步</text>
    <text x="645" y="142" text-anchor="middle">归因到四个错因</text>

    <line x1="245" y1="125" x2="310" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="490" y1="125" x2="555" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="180" y="230" width="440" height="72" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="260" text-anchor="middle" font-weight="700" font-size="18">第四步：只写下一次动作</text>
    <text x="400" y="285" text-anchor="middle">保留、缩小、暂停，或退回模拟盘</text>
    <path d="M645 164 Q645 205 560 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="78" y="348" width="185" height="46" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="170" y="377" text-anchor="middle">计划一致：可复制</text>
    <rect x="308" y="348" width="185" height="46" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="400" y="377" text-anchor="middle">边界变差：缩小</text>
    <rect x="538" y="348" width="185" height="46" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="630" y="377" text-anchor="middle">目的不清：停止</text>

    <path d="M300 302 Q220 325 170 348" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M400 302 L400 348" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M500 302 Q580 325 630 348" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
