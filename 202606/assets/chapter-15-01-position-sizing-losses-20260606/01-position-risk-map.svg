<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">同样看错一次，仓位决定账户伤口</text>
  <text x="40" y="80" font-size="15" fill="#475569">假设某资产下跌 40%，账户损失 = 资产仓位 × 40%</text>

  <line x1="80" y1="320" x2="720" y2="320" stroke="#cbd5e1" stroke-width="2"/>

  <g>
    <rect x="105" y="260" width="110" height="60" fill="#60a5fa" rx="6"/>
    <text x="160" y="245" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">5% 仓位</text>
    <text x="160" y="292" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">-2%</text>
    <text x="160" y="348" text-anchor="middle" font-size="15" fill="#475569">可复盘</text>
  </g>

  <g>
    <rect x="345" y="200" width="110" height="120" fill="#f59e0b" rx="6"/>
    <text x="400" y="185" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">20% 仓位</text>
    <text x="400" y="265" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">-8%</text>
    <text x="400" y="348" text-anchor="middle" font-size="15" fill="#475569">需要纠偏</text>
  </g>

  <g>
    <rect x="585" y="80" width="110" height="240" fill="#ef4444" rx="6"/>
    <text x="640" y="65" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">50% 仓位</text>
    <text x="640" y="205" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">-20%</text>
    <text x="640" y="348" text-anchor="middle" font-size="15" fill="#475569">心态变形</text>
  </g>

  <path d="M218 244 C265 230, 292 218, 338 203" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M458 184 C500 145, 540 112, 580 86" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="400" y="382" text-anchor="middle" font-size="16" fill="#334155">判断错误不可避免，账户损失必须提前封顶</text>
</svg>
