<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#111827">仓位管理论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g fill="#eff6ff" stroke="#3b82f6" stroke-width="2">
    <rect x="45" y="90" width="170" height="86" rx="8"/>
    <rect x="315" y="90" width="170" height="86" rx="8"/>
    <rect x="585" y="90" width="170" height="86" rx="8"/>
  </g>
  <text x="130" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 A</text>
  <text x="130" y="150" text-anchor="middle" font-size="15" fill="#1f2937">判断一定会错</text>
  <text x="400" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 B</text>
  <text x="400" y="150" text-anchor="middle" font-size="15" fill="#1f2937">仓位决定伤口大小</text>
  <text x="670" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 C</text>
  <text x="670" y="150" text-anchor="middle" font-size="15" fill="#1f2937">集中资产有永久损失</text>

  <line x1="218" y1="133" x2="309" y2="133" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="488" y1="133" x2="579" y2="133" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="165" y="235" width="470" height="74" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="264" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">推导</text>
    <text x="400" y="292" text-anchor="middle" font-size="15" fill="#1f2937">因为会看错，所以先定最大可承受亏损，再反推仓位上限</text>
  </g>

  <line x1="400" y1="179" x2="400" y2="228" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="165" y="342" width="470" height="52" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="375" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">结论：买入前先写仓位，不用信心大小决定下注大小</text>
  </g>
  <line x1="400" y1="312" x2="400" y2="336" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
