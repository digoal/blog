<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#111827">前提变化时，仓位动作要切换</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="285" y="82" width="230" height="62" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#075985">下单前问题</text>
  <text x="400" y="132" text-anchor="middle" font-size="15" fill="#1f2937">这笔错了，账户亏多少？</text>

  <g>
    <rect x="45" y="220" width="205" height="118" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="147" y="250" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">亏损在预算内</text>
    <text x="147" y="278" text-anchor="middle" font-size="14" fill="#1f2937">执行计划</text>
    <text x="147" y="302" text-anchor="middle" font-size="14" fill="#1f2937">错了按规则止损</text>
    <text x="147" y="326" text-anchor="middle" font-size="14" fill="#1f2937">对了不随意加码</text>
  </g>

  <g>
    <rect x="300" y="220" width="205" height="118" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="402" y="250" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">亏损超过预算</text>
    <text x="402" y="278" text-anchor="middle" font-size="14" fill="#1f2937">先缩仓位</text>
    <text x="402" y="302" text-anchor="middle" font-size="14" fill="#1f2937">再谈买入理由</text>
    <text x="402" y="326" text-anchor="middle" font-size="14" fill="#1f2937">不靠信心硬扛</text>
  </g>

  <g>
    <rect x="555" y="220" width="205" height="118" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="657" y="250" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">无法计算亏损</text>
    <text x="657" y="278" text-anchor="middle" font-size="14" fill="#1f2937">不下单</text>
    <text x="657" y="302" text-anchor="middle" font-size="14" fill="#1f2937">先查规则和流动性</text>
    <text x="657" y="326" text-anchor="middle" font-size="14" fill="#1f2937">必要时只用模拟</text>
  </g>

  <line x1="376" y1="146" x2="153" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="146" x2="402" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="424" y1="146" x2="648" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <text x="400" y="390" text-anchor="middle" font-size="16" fill="#334155">仓位管理的核心不是预测涨跌，而是让错误不会失控</text>
</svg>
