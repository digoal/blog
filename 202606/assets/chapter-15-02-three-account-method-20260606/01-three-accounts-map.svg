<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">三层账户法结构图</title>
  <desc id="desc">把家庭可投资资金分成生活资金、防守资金和进攻资金三层。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">三层账户法：先隔离用途，再追求收益</text>
  <rect x="70" y="92" width="200" height="230" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <rect x="300" y="92" width="200" height="230" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <rect x="530" y="92" width="200" height="230" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <circle cx="170" cy="137" r="30" fill="#ccfbf1"/>
  <circle cx="400" cy="137" r="30" fill="#dbeafe"/>
  <circle cx="630" cy="137" r="30" fill="#fee2e2"/>
  <text x="170" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f766e">1</text>
  <text x="400" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#2563eb">2</text>
  <text x="630" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#dc2626">3</text>
  <text x="170" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">生活资金</text>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">防守资金</text>
  <text x="630" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">进攻资金</text>
  <text x="170" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">3-12个月开支</text>
  <text x="170" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">货币基金 / 存款</text>
  <text x="170" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">目标：不断粮</text>
  <text x="400" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">低波动资产</text>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">短债 / 现金管理</text>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">目标：抗回撤</text>
  <text x="630" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">权益 / 转债 / 黄金</text>
  <text x="630" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">ETF / 个股 / 海外</text>
  <text x="630" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">目标：赚波动</text>
  <path d="M270 207H300" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 207H530" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="400" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">顺序不能反：先保生活，再建防守，最后才用剩余资金进攻</text>
</svg>
