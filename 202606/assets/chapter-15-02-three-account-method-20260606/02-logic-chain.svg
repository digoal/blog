<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">三层账户法论证链</title>
  <desc id="desc">从生活支出刚性、市场回撤和心理压力推导出三层账户法。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">论证链：为什么仓位要先按用途分层</text>
  <rect x="50" y="78" width="205" height="92" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <rect x="298" y="78" width="205" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="545" y="78" width="205" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="152" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提A：支出刚性</text>
  <text x="152" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">房租、房贷、医疗、教育</text>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提B：市场会跌</text>
  <text x="400" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">风险资产阶段性回撤</text>
  <text x="648" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">前提C：人会慌</text>
  <text x="648" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">急用钱时被迫卖出</text>
  <path d="M152 170V213" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 170V213" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M648 170V213" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="120" y="218" width="560" height="80" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="400" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">因为三件事会同时发生，所以不能把所有钱放进同一篮子</text>
  <text x="400" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">账户混在一起，生活风险会逼你在市场低点卖出进攻资产</text>
  <path d="M400 298V337" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="150" y="342" width="500" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">结论：生活、防守、进攻三账户隔离，且按顺序补齐</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
