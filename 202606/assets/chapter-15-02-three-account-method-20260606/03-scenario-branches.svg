<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">三层账户法情景分支</title>
  <desc id="desc">不同前提变化下，生活资金、防守资金、进攻资金的调整路径。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提变化后，账户怎么切换</text>
  <rect x="290" y="75" width="220" height="58" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">先检查生活账户</text>
  <path d="M400 133V164" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="70" y="170" width="200" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <rect x="300" y="170" width="200" height="100" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <rect x="530" y="170" width="200" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <path d="M400 150C330 150 230 150 170 170" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 150C400 150 400 150 400 170" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 150C470 150 570 150 630 170" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="170" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7f1d1d">生活钱不足</text>
  <text x="170" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">暂停加仓</text>
  <text x="170" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">补足现金缓冲</text>
  <text x="400" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#713f12">收入不稳定</text>
  <text x="400" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">提高防守层</text>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">降低进攻层</text>
  <text x="630" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#14532d">生活防守充足</text>
  <text x="630" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">按规则进攻</text>
  <text x="630" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">不动救命钱</text>
  <path d="M170 270V316" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <path d="M400 270V316" stroke="#ca8a04" stroke-width="3" marker-end="url(#arrowYellow)"/>
  <path d="M630 270V316" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <rect x="70" y="322" width="200" height="62" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <rect x="300" y="322" width="200" height="62" rx="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <rect x="530" y="322" width="200" height="62" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="170" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">先活下来</text>
  <text x="400" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">先降低波动</text>
  <text x="630" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">再追求收益</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ca8a04"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
