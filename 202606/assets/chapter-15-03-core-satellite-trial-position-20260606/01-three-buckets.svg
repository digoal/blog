<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">核心仓卫星仓试错仓三层结构</title>
  <desc id="desc">展示核心仓、卫星仓、试错仓在组合中的职责和仓位上限</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">三层仓位不是三类产品，而是三种任务</text>

  <rect x="58" y="92" width="212" height="222" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="164" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">核心仓</text>
  <text x="164" y="166" text-anchor="middle" font-size="16" fill="#1f2937">负责长期目标</text>
  <text x="164" y="192" text-anchor="middle" font-size="16" fill="#1f2937">宽基ETF / 债券 / 现金</text>
  <text x="164" y="226" text-anchor="middle" font-size="28" font-weight="700" fill="#2563eb">60%-80%</text>
  <text x="164" y="268" text-anchor="middle" font-size="14" fill="#475569">原则：少折腾、可长期持有</text>

  <rect x="294" y="92" width="212" height="222" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">卫星仓</text>
  <text x="400" y="166" text-anchor="middle" font-size="16" fill="#1f2937">负责表达判断</text>
  <text x="400" y="192" text-anchor="middle" font-size="16" fill="#1f2937">行业ETF / 个股 / 主题</text>
  <text x="400" y="226" text-anchor="middle" font-size="28" font-weight="700" fill="#16a34a">10%-30%</text>
  <text x="400" y="268" text-anchor="middle" font-size="14" fill="#475569">原则：有理由、有上限、有复盘</text>

  <rect x="530" y="92" width="212" height="222" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="636" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">试错仓</text>
  <text x="636" y="166" text-anchor="middle" font-size="16" fill="#1f2937">负责购买经验</text>
  <text x="636" y="192" text-anchor="middle" font-size="16" fill="#1f2937">新策略 / 新品种 / 小实验</text>
  <text x="636" y="226" text-anchor="middle" font-size="28" font-weight="700" fill="#d97706">0%-5%</text>
  <text x="636" y="268" text-anchor="middle" font-size="14" fill="#475569">原则：先小额验证，错了能停</text>

  <rect x="104" y="350" width="592" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">顺序：先核心仓达标，再开卫星仓；试错仓永远不能升级成核心仓</text>
</svg>
