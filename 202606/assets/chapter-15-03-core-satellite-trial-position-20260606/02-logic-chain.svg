<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">三层仓位论证链</title>
  <desc id="desc">展示从资产配置、集中风险、能力未验证到三层仓位规则的推导路径</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">为什么先分三层，再选择产品</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="42" y="88" width="158" height="92" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="121" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="121" y="146" text-anchor="middle" font-size="14" fill="#1f2937">长期结果主要受</text>
  <text x="121" y="166" text-anchor="middle" font-size="14" fill="#1f2937">资产配置影响</text>

  <rect x="232" y="88" width="158" height="92" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="311" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">前提B</text>
  <text x="311" y="146" text-anchor="middle" font-size="14" fill="#1f2937">集中押注会放大</text>
  <text x="311" y="166" text-anchor="middle" font-size="14" fill="#1f2937">不可控亏损</text>

  <rect x="422" y="88" width="158" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="501" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">前提C</text>
  <text x="501" y="146" text-anchor="middle" font-size="14" fill="#1f2937">小白能力和纪律</text>
  <text x="501" y="166" text-anchor="middle" font-size="14" fill="#1f2937">尚未验证</text>

  <rect x="612" y="88" width="146" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="685" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">结论</text>
  <text x="685" y="146" text-anchor="middle" font-size="14" fill="#1f2937">按任务分层</text>
  <text x="685" y="166" text-anchor="middle" font-size="14" fill="#1f2937">按上限执行</text>

  <line x1="200" y1="134" x2="224" y2="134" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="134" x2="414" y2="134" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="134" x2="604" y2="134" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="108" y="256" width="584" height="92" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="286" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">操作翻译</text>
  <text x="400" y="314" text-anchor="middle" font-size="15" fill="#334155">核心仓 60%-80% 承担长期目标；卫星仓 10%-30% 表达判断；</text>
  <text x="400" y="338" text-anchor="middle" font-size="15" fill="#334155">试错仓 0%-5% 只买经验，连续亏损或说不清逻辑就清零</text>
  <path d="M685 180 Q685 230 662 256" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
