<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">三层仓位前提变化分支</title>
  <desc id="desc">展示核心仓不足、卫星仓跑偏、试错仓亏损时的操作切换</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">前提变了，仓位动作也要变</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="300" y="82" width="200" height="64" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">先问一个问题</text>
  <text x="400" y="133" text-anchor="middle" font-size="14" fill="#334155">这笔钱承担什么任务？</text>

  <rect x="52" y="230" width="208" height="112" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="156" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">核心仓不足</text>
  <text x="156" y="288" text-anchor="middle" font-size="14" fill="#1f2937">核心低于60%</text>
  <text x="156" y="312" text-anchor="middle" font-size="14" fill="#1f2937">或三年内要用钱</text>
  <text x="156" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">暂停卫星和试错</text>

  <rect x="296" y="230" width="208" height="112" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">卫星仓超限</text>
  <text x="400" y="288" text-anchor="middle" font-size="14" fill="#1f2937">涨到超过上限</text>
  <text x="400" y="312" text-anchor="middle" font-size="14" fill="#1f2937">或主题重叠太多</text>
  <text x="400" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">再平衡回核心</text>

  <rect x="540" y="230" width="208" height="112" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="644" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">试错仓失效</text>
  <text x="644" y="288" text-anchor="middle" font-size="14" fill="#1f2937">连续3次亏损</text>
  <text x="644" y="312" text-anchor="middle" font-size="14" fill="#1f2937">或复盘说不清</text>
  <text x="644" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">清零并退回学习</text>

  <path d="M370 146 Q260 184 156 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 146 L400 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M430 146 Q540 184 644 230" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="390" text-anchor="middle" font-size="15" fill="#475569">核心是地基，卫星是观点，试错是学费；三者不能互相冒充</text>
</svg>
