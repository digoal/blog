<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">单品种仓位上限: 不是看好多少, 而是错了亏多少</text>
  <rect x="45" y="78" width="165" height="88" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="128" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">账户承受力</text>
  <text x="128" y="140" text-anchor="middle" font-size="14" fill="#1e3a8a">最大回撤预算</text>
  <path d="M210 122 L258 122" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="265" y="78" width="185" height="88" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="358" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#065f46">单品种压力亏损</text>
  <text x="358" y="140" text-anchor="middle" font-size="14" fill="#065f46">下跌30%-50%会怎样</text>
  <path d="M450 122 L498 122" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="505" y="78" width="250" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="630" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">仓位上限</text>
  <text x="630" y="140" text-anchor="middle" font-size="14" fill="#9a3412">单项亏损不拖垮组合</text>

  <text x="55" y="220" font-size="16" font-weight="700" fill="#111827">新手默认上限表</text>
  <rect x="45" y="240" width="710" height="140" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="45" y1="275" x2="755" y2="275" stroke="#cbd5e1"/>
  <line x1="163" y1="240" x2="163" y2="380" stroke="#cbd5e1"/>
  <line x1="281" y1="240" x2="281" y2="380" stroke="#cbd5e1"/>
  <line x1="399" y1="240" x2="399" y2="380" stroke="#cbd5e1"/>
  <line x1="517" y1="240" x2="517" y2="380" stroke="#cbd5e1"/>
  <line x1="635" y1="240" x2="635" y2="380" stroke="#cbd5e1"/>
  <text x="104" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">宽基ETF</text>
  <text x="222" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">行业ETF</text>
  <text x="340" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">单只个股</text>
  <text x="458" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">可转债</text>
  <text x="576" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">黄金/REITs</text>
  <text x="695" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">美股风险</text>
  <text x="104" y="308" text-anchor="middle" font-size="21" font-weight="700" fill="#2563eb">25%-40%</text>
  <text x="222" y="308" text-anchor="middle" font-size="21" font-weight="700" fill="#2563eb">10%-15%</text>
  <text x="340" y="308" text-anchor="middle" font-size="21" font-weight="700" fill="#dc2626">5%</text>
  <text x="458" y="308" text-anchor="middle" font-size="21" font-weight="700" fill="#dc2626">2%-3%</text>
  <text x="576" y="308" text-anchor="middle" font-size="21" font-weight="700" fill="#059669">5%-15%</text>
  <text x="695" y="308" text-anchor="middle" font-size="21" font-weight="700" fill="#7c3aed">20%-40%</text>
  <text x="104" y="342" text-anchor="middle" font-size="12" fill="#475569">同一指数合并</text>
  <text x="222" y="342" text-anchor="middle" font-size="12" fill="#475569">主题越窄越低</text>
  <text x="340" y="342" text-anchor="middle" font-size="12" fill="#475569">高信念也先封顶</text>
  <text x="458" y="342" text-anchor="middle" font-size="12" fill="#475569">按发行人分散</text>
  <text x="576" y="342" text-anchor="middle" font-size="12" fill="#475569">防守不等于保本</text>
  <text x="695" y="342" text-anchor="middle" font-size="12" fill="#475569">叠加汇率风险</text>
  <text x="400" y="405" text-anchor="middle" font-size="14" fill="#334155">上限是刹车线, 不是必须买满的目标比例</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
