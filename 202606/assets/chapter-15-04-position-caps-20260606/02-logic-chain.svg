<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 从最大可亏金额反推仓位上限</text>
  <rect x="40" y="76" width="150" height="86" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="115" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">前提A</text>
  <text x="115" y="132" text-anchor="middle" font-size="13" fill="#075985">账户能承受的</text>
  <text x="115" y="151" text-anchor="middle" font-size="13" fill="#075985">亏损有限</text>
  <rect x="230" y="76" width="150" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="305" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">前提B</text>
  <text x="305" y="132" text-anchor="middle" font-size="13" fill="#065f46">单品种会有</text>
  <text x="305" y="151" text-anchor="middle" font-size="13" fill="#065f46">独立风险</text>
  <rect x="420" y="76" width="150" height="86" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="495" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">前提C</text>
  <text x="495" y="132" text-anchor="middle" font-size="13" fill="#92400e">压力时相关性</text>
  <text x="495" y="151" text-anchor="middle" font-size="13" fill="#92400e">会上升</text>
  <rect x="610" y="76" width="150" height="86" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">前提D</text>
  <text x="685" y="132" text-anchor="middle" font-size="13" fill="#991b1b">小白难以提前</text>
  <text x="685" y="151" text-anchor="middle" font-size="13" fill="#991b1b">选中赢家</text>
  <path d="M115 162 C115 198, 400 198, 400 224" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M305 162 C305 196, 400 198, 400 224" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M495 162 C495 196, 400 198, 400 224" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M685 162 C685 198, 400 198, 400 224" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="210" y="226" width="380" height="92" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">因为错误会集中伤害组合</text>
  <text x="400" y="285" text-anchor="middle" font-size="14" fill="#334155">所以仓位上限不能凭喜欢程度决定</text>
  <text x="400" y="307" text-anchor="middle" font-size="14" fill="#334155">必须用最坏情景亏损反推</text>
  <path d="M400 318 L400 354" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="170" y="356" width="460" height="48" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="386" text-anchor="middle" font-size="18" font-weight="700" fill="#3730a3">单品种上限 = 允许单项亏损 / 压力情景跌幅</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
