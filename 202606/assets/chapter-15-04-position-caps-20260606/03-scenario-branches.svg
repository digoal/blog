<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">情景分支: 前提变化时, 上限跟着变</text>
  <rect x="285" y="70" width="230" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">先识别风险来源</text>
  <text x="400" y="119" text-anchor="middle" font-size="13" fill="#334155">宽基、行业、个股、转债、黄金、REITs、美股</text>
  <path d="M400 132 L400 164" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="270" y="166" width="260" height="52" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="198" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">它是宽还是窄?</text>
  <path d="M300 218 C220 245, 155 258, 120 292" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M400 218 L400 288" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M500 218 C580 245, 645 258, 680 292" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="35" y="294" width="220" height="90" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="145" y="322" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">宽基、低杠杆、流动好</text>
  <text x="145" y="348" text-anchor="middle" font-size="13" fill="#065f46">可以做核心仓</text>
  <text x="145" y="369" text-anchor="middle" font-size="13" fill="#065f46">但同类指数要合并</text>
  <rect x="290" y="294" width="220" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="322" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">主题窄、溢价高、波动大</text>
  <text x="400" y="348" text-anchor="middle" font-size="13" fill="#92400e">上限减半</text>
  <text x="400" y="369" text-anchor="middle" font-size="13" fill="#92400e">看不懂就不买</text>
  <rect x="545" y="294" width="220" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="655" y="322" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">危机、停牌、强相关</text>
  <text x="655" y="348" text-anchor="middle" font-size="13" fill="#991b1b">停止加仓摊平</text>
  <text x="655" y="369" text-anchor="middle" font-size="13" fill="#991b1b">先降到上限以内</text>
  <text x="400" y="414" text-anchor="middle" font-size="14" fill="#334155">原则: 前提越不稳定, 仓位越要小; 风险同源, 必须合并计算</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
