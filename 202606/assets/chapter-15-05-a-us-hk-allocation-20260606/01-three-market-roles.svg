<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">A股、美股、港股在股票仓里的角色</title>
  <desc id="desc">展示A股、美股、港股分别承担本币核心、全球增长和港股补充三种角色。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">三地股票不是选冠军，而是分装三种风险</text>
  <text x="400" y="76" text-anchor="middle" font-size="15" fill="#4b5563">示例股票仓：A股 50% / 美股 35% / 港股 15%</text>

  <rect x="54" y="118" width="210" height="190" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="159" cy="118" r="35" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="159" y="126" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">A股</text>
  <text x="159" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">本币核心</text>
  <text x="159" y="205" text-anchor="middle" font-size="14" fill="#374151">人民币收入与支出</text>
  <text x="159" y="230" text-anchor="middle" font-size="14" fill="#374151">政策与内需周期</text>
  <text x="159" y="255" text-anchor="middle" font-size="14" fill="#374151">适合做基础仓</text>
  <text x="159" y="288" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">40%-60%</text>

  <rect x="295" y="118" width="210" height="190" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="400" cy="118" r="35" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="126" text-anchor="middle" font-size="22" font-weight="700" fill="#047857">美股</text>
  <text x="400" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">全球增长</text>
  <text x="400" y="205" text-anchor="middle" font-size="14" fill="#374151">美元资产与全球龙头</text>
  <text x="400" y="230" text-anchor="middle" font-size="14" fill="#374151">科技权重和估值波动</text>
  <text x="400" y="255" text-anchor="middle" font-size="14" fill="#374151">适合做第二核心</text>
  <text x="400" y="288" text-anchor="middle" font-size="20" font-weight="700" fill="#047857">30%-50%</text>

  <rect x="536" y="118" width="210" height="190" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <circle cx="641" cy="118" r="35" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="641" y="126" text-anchor="middle" font-size="22" font-weight="700" fill="#b45309">港股</text>
  <text x="641" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">补充卫星</text>
  <text x="641" y="205" text-anchor="middle" font-size="14" fill="#374151">离岸中国资产</text>
  <text x="641" y="230" text-anchor="middle" font-size="14" fill="#374151">港币美元链条</text>
  <text x="641" y="255" text-anchor="middle" font-size="14" fill="#374151">低估值也有高波动</text>
  <text x="641" y="288" text-anchor="middle" font-size="20" font-weight="700" fill="#b45309">5%-15%</text>

  <line x1="264" y1="214" x2="295" y2="214" stroke="#94a3b8" stroke-width="3"/>
  <line x1="505" y1="214" x2="536" y2="214" stroke="#94a3b8" stroke-width="3"/>
  <text x="400" y="350" text-anchor="middle" font-size="15" fill="#111827">先定股票仓上限，再在股票仓内部做三地分配；短期要用的钱不进入这里。</text>
</svg>
