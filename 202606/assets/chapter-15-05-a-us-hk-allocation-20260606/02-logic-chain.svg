<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">A股美股港股分配论证链</title>
  <desc id="desc">从三地风险不同、家庭用钱币种、表现轮动和交易成本推导出比例上限和年度再平衡。</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">论证链：用风险预算分配，而不是用涨跌排名分配</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="45" y="82" width="155" height="96" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="122" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="122" y="140" text-anchor="middle" font-size="14" fill="#1f2937">三地风险源不同</text>
  <text x="122" y="162" text-anchor="middle" font-size="13" fill="#4b5563">常量</text>

  <rect x="235" y="82" width="155" height="96" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="312" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提B</text>
  <text x="312" y="140" text-anchor="middle" font-size="14" fill="#1f2937">家庭最终用钱币种</text>
  <text x="312" y="162" text-anchor="middle" font-size="13" fill="#4b5563">常量/可变</text>

  <rect x="425" y="82" width="155" height="96" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="502" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="502" y="140" text-anchor="middle" font-size="14" fill="#1f2937">强弱会轮动</text>
  <text x="502" y="162" text-anchor="middle" font-size="13" fill="#4b5563">变量</text>

  <rect x="615" y="82" width="140" height="96" rx="8" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="685" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">前提D</text>
  <text x="685" y="140" text-anchor="middle" font-size="14" fill="#1f2937">交易成本与限制</text>
  <text x="685" y="162" text-anchor="middle" font-size="13" fill="#4b5563">变量</text>

  <line x1="200" y1="130" x2="235" y2="130" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="130" x2="425" y2="130" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="130" x2="615" y2="130" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <path d="M122 178 C122 230, 235 236, 307 246" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M312 178 C330 220, 360 235, 382 246" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M502 178 C485 220, 450 235, 425 246" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M685 178 C675 235, 540 246, 494 254" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="245" y="248" width="310" height="94" rx="10" fill="#f8fafc" stroke="#111827" stroke-width="1.5"/>
  <text x="400" y="279" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">结论：三地设比例区间</text>
  <text x="400" y="306" text-anchor="middle" font-size="14" fill="#374151">A股 40%-60% / 美股 30%-50% / 港股 5%-15%</text>
  <text x="400" y="328" text-anchor="middle" font-size="14" fill="#374151">年度检查，超出区间才再平衡</text>

  <text x="400" y="374" text-anchor="middle" font-size="14" fill="#4b5563">核心动作：先保护生活币种，再用海外资产分散单一市场风险。</text>
</svg>
