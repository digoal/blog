<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">三地股票分配情景分支</title>
  <desc id="desc">展示正常、短期人民币支出、未来美元支出、港股前提失效四种情景下的比例调整。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">前提一变，比例也要变</text>

  <rect x="300" y="78" width="200" height="72" rx="8" fill="#ffffff" stroke="#111827" stroke-width="1.5"/>
  <text x="400" y="107" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">先问两个问题</text>
  <text x="400" y="132" text-anchor="middle" font-size="14" fill="#374151">钱何时用？用什么币种？</text>

  <line x1="400" y1="150" x2="400" y2="184" stroke="#64748b" stroke-width="2"/>
  <line x1="170" y1="184" x2="630" y2="184" stroke="#64748b" stroke-width="2"/>
  <line x1="170" y1="184" x2="170" y2="215" stroke="#64748b" stroke-width="2"/>
  <line x1="325" y1="184" x2="325" y2="215" stroke="#64748b" stroke-width="2"/>
  <line x1="475" y1="184" x2="475" y2="215" stroke="#64748b" stroke-width="2"/>
  <line x1="630" y1="184" x2="630" y2="215" stroke="#64748b" stroke-width="2"/>

  <rect x="65" y="215" width="210" height="115" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="170" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">正常长期资金</text>
  <text x="170" y="272" text-anchor="middle" font-size="14" fill="#1f2937">股票仓示例</text>
  <text x="170" y="296" text-anchor="middle" font-size="14" fill="#374151">A股50 / 美股35 / 港股15</text>
  <text x="170" y="318" text-anchor="middle" font-size="13" fill="#4b5563">每年再平衡</text>

  <rect x="290" y="215" width="210" height="115" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="395" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">两年内人民币支出</text>
  <text x="395" y="272" text-anchor="middle" font-size="14" fill="#1f2937">先降股票仓</text>
  <text x="395" y="296" text-anchor="middle" font-size="14" fill="#374151">A股60 / 美股30 / 港股10</text>
  <text x="395" y="318" text-anchor="middle" font-size="13" fill="#4b5563">现金与短债优先</text>

  <rect x="515" y="215" width="210" height="115" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="620" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">未来有美元支出</text>
  <text x="620" y="272" text-anchor="middle" font-size="14" fill="#1f2937">币种匹配提高</text>
  <text x="620" y="296" text-anchor="middle" font-size="14" fill="#374151">A股40 / 美股50 / 港股10</text>
  <text x="620" y="318" text-anchor="middle" font-size="13" fill="#4b5563">仍控制估值风险</text>

  <rect x="205" y="350" width="390" height="34" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="400" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">港股流动性或逻辑失效：港股降到5%-10%，不因“便宜”自动补仓</text>
</svg>
