<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">金字塔加仓: 越往上, 单次仓位越小</text>

  <polygon points="230,350 570,350 510,270 290,270" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <polygon points="290,255 510,255 460,185 340,185" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <polygon points="340,170 460,170 420,110 380,110" fill="#60a5fa" stroke="#2563eb" stroke-width="2"/>

  <text x="400" y="317" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">初始仓: 10%</text>
  <text x="400" y="340" text-anchor="middle" font-size="15" fill="#1e3a8a">买入理由成立, 但只先放基础仓</text>

  <text x="400" y="222" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">第一次加仓: 5%</text>
  <text x="400" y="245" text-anchor="middle" font-size="15" fill="#1e3a8a">已有盈利 + 逻辑增强</text>

  <text x="400" y="138" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">第二次加仓: 3%</text>
  <text x="400" y="160" text-anchor="middle" font-size="14" fill="#1e3a8a">总仓不破上限</text>

  <rect x="56" y="90" width="165" height="92" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="138" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">正金字塔</text>
  <text x="138" y="148" text-anchor="middle" font-size="14" fill="#374151">越涨越谨慎</text>
  <text x="138" y="170" text-anchor="middle" font-size="14" fill="#374151">每次加得更少</text>

  <rect x="579" y="90" width="165" height="92" rx="8" fill="#fff7ed" stroke="#fb923c"/>
  <text x="662" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">倒金字塔</text>
  <text x="662" y="148" text-anchor="middle" font-size="14" fill="#9a3412">越亏越加</text>
  <text x="662" y="170" text-anchor="middle" font-size="14" fill="#9a3412">风险越堆越大</text>

  <line x1="221" y1="136" x2="277" y2="300" stroke="#64748b" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="579" y1="136" x2="523" y2="300" stroke="#fb923c" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="400" y="392" text-anchor="middle" font-size="15" fill="#475569">行动原则: 加仓是对已被验证判断的追加, 不是对亏损判断的补救</text>
</svg>
