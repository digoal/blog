<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">金字塔加仓的论证链</text>

  <rect x="45" y="80" width="150" height="78" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="120" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="120" y="135" text-anchor="middle" font-size="14" fill="#1e3a8a">仓位决定亏损</text>

  <rect x="235" y="80" width="150" height="78" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="310" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">前提B</text>
  <text x="310" y="135" text-anchor="middle" font-size="14" fill="#166534">已有盈利缓冲</text>

  <rect x="425" y="80" width="150" height="78" rx="8" fill="#fefce8" stroke="#ca8a04"/>
  <text x="500" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#854d0e">前提C</text>
  <text x="500" y="135" text-anchor="middle" font-size="14" fill="#854d0e">逻辑继续增强</text>

  <rect x="615" y="80" width="140" height="78" rx="8" fill="#fff1f2" stroke="#e11d48"/>
  <text x="685" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#9f1239">前提D</text>
  <text x="685" y="135" text-anchor="middle" font-size="14" fill="#9f1239">人性会追错</text>

  <line x1="195" y1="119" x2="235" y2="119" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="385" y1="119" x2="425" y2="119" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="575" y1="119" x2="615" y2="119" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="145" y="215" width="220" height="76" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="255" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">推导1</text>
  <text x="255" y="268" text-anchor="middle" font-size="14" fill="#334155">盈利先出现, 才允许增加风险</text>

  <rect x="435" y="215" width="220" height="76" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="545" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">推导2</text>
  <text x="545" y="268" text-anchor="middle" font-size="14" fill="#334155">逻辑增强, 才不是情绪加码</text>

  <line x1="310" y1="158" x2="255" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="158" x2="545" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="685" y1="158" x2="610" y2="215" stroke="#e11d48" stroke-width="2" marker-end="url(#arrowRed)"/>

  <rect x="220" y="340" width="360" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="364" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">结论: 只在盈利和逻辑增强时加</text>
  <text x="400" y="388" text-anchor="middle" font-size="14" fill="#166534">每次加仓更小, 总仓位不突破上限, 失效立即撤回新增风险</text>

  <line x1="255" y1="291" x2="350" y2="340" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="545" y1="291" x2="450" y2="340" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e11d48"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
