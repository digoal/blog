<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f9fafb"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">加仓前的三道门</text>

  <rect x="325" y="72" width="150" height="54" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="400" y="105" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">准备加仓</text>

  <rect x="74" y="178" width="170" height="74" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="159" y="207" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">门1: 是否盈利</text>
  <text x="159" y="232" text-anchor="middle" font-size="14" fill="#065f46">未盈利: 不加</text>

  <rect x="315" y="178" width="170" height="74" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="400" y="207" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">门2: 逻辑是否增强</text>
  <text x="400" y="232" text-anchor="middle" font-size="14" fill="#92400e">没增强: 不加</text>

  <rect x="556" y="178" width="170" height="74" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="641" y="207" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">门3: 是否破上限</text>
  <text x="641" y="232" text-anchor="middle" font-size="14" fill="#1e3a8a">破上限: 不加</text>

  <line x1="400" y1="126" x2="159" y2="178" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="126" x2="400" y2="178" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="126" x2="641" y2="178" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="235" y="330" width="330" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="355" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">三门全过: 加更小一笔</text>
  <text x="400" y="378" text-anchor="middle" font-size="14" fill="#166534">加完立刻写新成本、新止损、新仓位占比</text>

  <line x1="159" y1="252" x2="335" y2="330" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="252" x2="400" y2="330" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="641" y1="252" x2="465" y2="330" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <text x="159" y="286" text-anchor="middle" font-size="13" fill="#475569">盈利缓冲覆盖新增风险</text>
  <text x="400" y="286" text-anchor="middle" font-size="13" fill="#475569">新证据支持原判断</text>
  <text x="641" y="286" text-anchor="middle" font-size="13" fill="#475569">组合仍能承受回撤</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
