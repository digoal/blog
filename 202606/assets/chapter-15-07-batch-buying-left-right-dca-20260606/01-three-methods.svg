<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">左侧、右侧、定投三种分批买入方式</title>
  <desc id="desc">用价格路径和买入位置对比左侧买入、右侧买入和定投</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">分批买入不是一种动作，而是三种前提</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <g fill="none" stroke="#cbd5e1" stroke-width="1">
    <line x1="65" y1="320" x2="735" y2="320"/>
    <line x1="65" y1="80" x2="65" y2="320"/>
  </g>
  <polyline points="90,130 155,175 220,240 285,282 350,250 415,200 480,170 545,150 610,120 690,92" fill="none" stroke="#334155" stroke-width="4"/>
  <g font-size="14" fill="#0f172a">
    <circle cx="155" cy="175" r="8" fill="#f97316"/>
    <circle cx="220" cy="240" r="8" fill="#f97316"/>
    <circle cx="285" cy="282" r="8" fill="#f97316"/>
    <text x="190" y="305" text-anchor="middle" font-weight="700" fill="#c2410c">左侧</text>
    <text x="190" y="328" text-anchor="middle">越跌越按计划买</text>

    <circle cx="350" cy="250" r="8" fill="#2563eb"/>
    <circle cx="415" cy="200" r="8" fill="#2563eb"/>
    <circle cx="480" cy="170" r="8" fill="#2563eb"/>
    <text x="415" y="232" text-anchor="middle" font-weight="700" fill="#1d4ed8">右侧</text>
    <text x="415" y="255" text-anchor="middle">止跌转强后买</text>

    <circle cx="120" cy="154" r="7" fill="#16a34a"/>
    <circle cx="250" cy="263" r="7" fill="#16a34a"/>
    <circle cx="380" cy="227" r="7" fill="#16a34a"/>
    <circle cx="510" cy="160" r="7" fill="#16a34a"/>
    <circle cx="640" cy="110" r="7" fill="#16a34a"/>
    <text x="585" y="260" text-anchor="middle" font-weight="700" fill="#15803d">定投</text>
    <text x="585" y="283" text-anchor="middle">固定时间固定金额</text>
  </g>
  <g font-size="13" fill="#475569">
    <text x="70" y="350">时间</text>
    <text x="25" y="86">价格</text>
    <line x1="105" y1="355" x2="715" y2="355" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
