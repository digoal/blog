<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430" role="img" aria-labelledby="title desc">
  <title id="title">分批买入论证链</title>
  <desc id="desc">从市场不可精确择时、资产质量和执行纪律推导出三种分批买入方式的选择</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链：先选前提，再选分批方式</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="35" y="78" width="170" height="96" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="120" y="108" text-anchor="middle" font-size="18" font-weight="700">前提A</text>
    <text x="120" y="134" text-anchor="middle">最低点不可稳定</text>
    <text x="120" y="156" text-anchor="middle">预测</text>

    <rect x="230" y="78" width="170" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="315" y="108" text-anchor="middle" font-size="18" font-weight="700">前提B</text>
    <text x="315" y="134" text-anchor="middle">资产长期逻辑</text>
    <text x="315" y="156" text-anchor="middle">必须仍成立</text>

    <rect x="425" y="78" width="170" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="510" y="108" text-anchor="middle" font-size="18" font-weight="700">前提C</text>
    <text x="510" y="134" text-anchor="middle">现金会带来</text>
    <text x="510" y="156" text-anchor="middle">机会成本</text>

    <rect x="620" y="78" width="145" height="96" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="692" y="108" text-anchor="middle" font-size="18" font-weight="700">前提D</text>
    <text x="692" y="134" text-anchor="middle">情绪会破坏</text>
    <text x="692" y="156" text-anchor="middle">执行</text>

    <line x1="205" y1="126" x2="230" y2="126" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="126" x2="425" y2="126" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="595" y1="126" x2="620" y2="126" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="70" y="225" width="205" height="86" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="172" y="254" text-anchor="middle" font-size="18" font-weight="700">推导1</text>
    <text x="172" y="280" text-anchor="middle">能忍受回撤且逻辑未坏</text>
    <text x="172" y="302" text-anchor="middle">才允许左侧</text>

    <rect x="300" y="225" width="205" height="86" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="402" y="254" text-anchor="middle" font-size="18" font-weight="700">推导2</text>
    <text x="402" y="280" text-anchor="middle">想降低误判和情绪</text>
    <text x="402" y="302" text-anchor="middle">就等右侧确认</text>

    <rect x="530" y="225" width="205" height="86" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="632" y="254" text-anchor="middle" font-size="18" font-weight="700">推导3</text>
    <text x="632" y="280" text-anchor="middle">没有判断优势但有现金流</text>
    <text x="632" y="302" text-anchor="middle">用定投执行</text>

    <line x1="205" y1="174" x2="172" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="410" y1="174" x2="402" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="620" y1="174" x2="632" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="155" y="360" width="490" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="400" y="390" text-anchor="middle" font-size="18" font-weight="700">结论：左侧买逻辑，右侧买确认，定投买纪律</text>
    <line x1="172" y1="311" x2="330" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="402" y1="311" x2="402" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="632" y1="311" x2="470" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
