<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" role="img" aria-labelledby="title desc">
  <title id="title">分批买入决策树</title>
  <desc id="desc">根据资产质量、资金来源、市场信号和情绪承受力选择左侧、右侧、定投或不买</desc>
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">下单前：先走这棵树</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <g font-size="15" fill="#0f172a">
    <rect x="260" y="72" width="280" height="58" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="400" y="106" text-anchor="middle" font-weight="700">资产逻辑还成立吗？</text>

    <rect x="70" y="170" width="210" height="58" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="175" y="204" text-anchor="middle" font-weight="700">不成立：停止补仓</text>

    <rect x="330" y="170" width="210" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="435" y="204" text-anchor="middle" font-weight="700">成立：看资金性质</text>

    <line x1="330" y1="130" x2="205" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="248" y="150" font-size="13" fill="#64748b">否</text>
    <line x1="435" y1="130" x2="435" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="448" y="150" font-size="13" fill="#64748b">是</text>

    <rect x="185" y="270" width="175" height="64" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
    <text x="272" y="296" text-anchor="middle" font-weight="700" fill="#c2410c">已有一笔钱</text>
    <text x="272" y="318" text-anchor="middle">能承受回撤</text>

    <rect x="405" y="270" width="175" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="492" y="296" text-anchor="middle" font-weight="700" fill="#1d4ed8">等市场确认</text>
    <text x="492" y="318" text-anchor="middle">再提高仓位</text>

    <rect x="625" y="270" width="135" height="64" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="692" y="296" text-anchor="middle" font-weight="700" fill="#15803d">每月现金流</text>
    <text x="692" y="318" text-anchor="middle">长期投入</text>

    <line x1="435" y1="228" x2="272" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="435" y1="228" x2="492" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="540" y1="200" x2="692" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="130" y="370" width="210" height="44" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <text x="235" y="398" text-anchor="middle" font-weight="700">左侧：每跌一档买一份</text>

    <rect x="360" y="370" width="210" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="465" y="398" text-anchor="middle" font-weight="700">右侧：突破或回踩后买</text>

    <rect x="590" y="370" width="170" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="675" y="398" text-anchor="middle" font-weight="700">定投：按表执行</text>

    <line x1="272" y1="334" x2="235" y2="370" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="492" y1="334" x2="465" y2="370" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="692" y1="334" x2="675" y2="370" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
