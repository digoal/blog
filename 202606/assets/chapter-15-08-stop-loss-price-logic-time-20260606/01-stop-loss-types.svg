<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">止损不是一个按钮，而是三种失效检查</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#475569">先问“我错在哪里”，再选对应的退出方式</text>

  <rect x="54" y="116" width="210" height="198" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="159" cy="153" r="28" fill="#dbeafe"/>
  <text x="159" y="162" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">价</text>
  <text x="159" y="204" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">价格止损</text>
  <text x="159" y="237" text-anchor="middle" font-size="15" fill="#334155">适合短线交易</text>
  <text x="159" y="263" text-anchor="middle" font-size="15" fill="#334155">趋势破位、亏损到线</text>
  <text x="159" y="289" text-anchor="middle" font-size="15" fill="#334155">执行动作：先退出</text>

  <rect x="295" y="116" width="210" height="198" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <circle cx="400" cy="153" r="28" fill="#dcfce7"/>
  <text x="400" y="162" text-anchor="middle" font-size="24" font-weight="700" fill="#15803d">理</text>
  <text x="400" y="204" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">逻辑止损</text>
  <text x="400" y="237" text-anchor="middle" font-size="15" fill="#334155">适合个股、行业、主题</text>
  <text x="400" y="263" text-anchor="middle" font-size="15" fill="#334155">买入理由被证伪</text>
  <text x="400" y="289" text-anchor="middle" font-size="15" fill="#334155">执行动作：减仓或退出</text>

  <rect x="536" y="116" width="210" height="198" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="641" cy="153" r="28" fill="#fef3c7"/>
  <text x="641" y="162" text-anchor="middle" font-size="24" font-weight="700" fill="#b45309">时</text>
  <text x="641" y="204" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">时间止损</text>
  <text x="641" y="237" text-anchor="middle" font-size="15" fill="#334155">适合验证期计划</text>
  <text x="641" y="263" text-anchor="middle" font-size="15" fill="#334155">到期仍未验证</text>
  <text x="641" y="289" text-anchor="middle" font-size="15" fill="#334155">执行动作：停止等待</text>

  <path d="M159 328 L159 352 L641 352 L641 328" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="378" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">共同前提：买入前写清“错到哪里就不继续证明自己”</text>
</svg>
