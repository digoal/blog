<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">从亏损事实到止损规则的推导链</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="42" y="82" width="156" height="78" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提A</text>
  <text x="120" y="139" text-anchor="middle" font-size="14" fill="#334155">亏损有两种</text>
  <text x="120" y="158" text-anchor="middle" font-size="14" fill="#334155">波动或错误</text>

  <rect x="234" y="82" width="156" height="78" rx="9" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="312" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提B</text>
  <text x="312" y="139" text-anchor="middle" font-size="14" fill="#334155">散户天然</text>
  <text x="312" y="158" text-anchor="middle" font-size="14" fill="#334155">不愿认亏</text>

  <rect x="426" y="82" width="156" height="78" rx="9" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="504" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提C</text>
  <text x="504" y="139" text-anchor="middle" font-size="14" fill="#334155">工具角色不同</text>
  <text x="504" y="158" text-anchor="middle" font-size="14" fill="#334155">规则不能通用</text>

  <rect x="618" y="82" width="140" height="78" rx="9" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="688" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提D</text>
  <text x="688" y="139" text-anchor="middle" font-size="14" fill="#334155">订单只是工具</text>
  <text x="688" y="158" text-anchor="middle" font-size="14" fill="#334155">不保证好价</text>

  <path d="M120 174 L120 220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M312 174 L312 220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M504 174 L504 220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M688 174 L688 220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="76" y="224" width="648" height="74" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="256" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">因为亏损不等于错误，所以不能只用跌幅决定卖出</text>
  <text x="400" y="282" text-anchor="middle" font-size="15" fill="#334155">先识别失效来源：价格结构、买入逻辑、验证时间、资金用途</text>

  <path d="M400 302 L400 336" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="96" y="340" width="608" height="54" rx="10" fill="#0f172a"/>
  <text x="400" y="364" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论：止损是“前提失效后的退出制度”</text>
  <text x="400" y="386" text-anchor="middle" font-size="14" fill="#cbd5e1">交易仓用价格线，研究仓用逻辑线，验证仓用时间线，核心仓先看资金期限和仓位</text>
</svg>
