<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">触发亏损后，先分叉判断再行动</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="292" y="72" width="216" height="58" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">持仓出现亏损</text>

  <path d="M400 132 L400 162" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="244" y="166" width="312" height="58" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="191" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">第一问：这是正常波动还是买入前提失效？</text>
  <text x="400" y="211" text-anchor="middle" font-size="13" fill="#334155">不能回答，就先降仓到能冷静复盘</text>

  <path d="M303 225 L152 268" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 225 L400 268" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M497 225 L648 268" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="44" y="272" width="216" height="108" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="152" y="302" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">价格线触发</text>
  <text x="152" y="330" text-anchor="middle" font-size="14" fill="#334155">短线交易破位</text>
  <text x="152" y="352" text-anchor="middle" font-size="14" fill="#334155">计划亏损到线</text>
  <text x="152" y="374" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">动作：先卖，再复盘</text>

  <rect x="292" y="272" width="216" height="108" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="302" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">逻辑线触发</text>
  <text x="400" y="330" text-anchor="middle" font-size="14" fill="#334155">财报、行业、估值</text>
  <text x="400" y="352" text-anchor="middle" font-size="14" fill="#334155">破坏买入理由</text>
  <text x="400" y="374" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">动作：减仓或退出</text>

  <rect x="540" y="272" width="216" height="108" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="648" y="302" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">时间线触发</text>
  <text x="648" y="330" text-anchor="middle" font-size="14" fill="#334155">验证期到期</text>
  <text x="648" y="352" text-anchor="middle" font-size="14" fill="#334155">仍无证据支持</text>
  <text x="648" y="374" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">动作：停止等待</text>

  <text x="400" y="410" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">例外：核心长期仓若资金期限、仓位和逻辑都没变，普通回撤不自动止损</text>
</svg>
