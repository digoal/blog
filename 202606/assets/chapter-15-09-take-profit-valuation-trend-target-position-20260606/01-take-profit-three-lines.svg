<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">止盈三条线</title>
  <desc id="desc">用估值线、趋势线和目标仓位线把止盈动作从情绪决策变成规则决策。</desc>
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">止盈不是猜顶部，而是三条线触发减仓</text>
  <line x1="400" y1="74" x2="400" y2="112" stroke="#94a3b8" stroke-width="3"/>
  <rect x="275" y="112" width="250" height="58" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">浮盈出现后先复核</text>
  <line x1="400" y1="170" x2="400" y2="205" stroke="#94a3b8" stroke-width="3"/>
  <line x1="155" y1="205" x2="645" y2="205" stroke="#94a3b8" stroke-width="3"/>
  <line x1="155" y1="205" x2="155" y2="230" stroke="#94a3b8" stroke-width="3"/>
  <line x1="400" y1="205" x2="400" y2="230" stroke="#94a3b8" stroke-width="3"/>
  <line x1="645" y1="205" x2="645" y2="230" stroke="#94a3b8" stroke-width="3"/>
  <rect x="60" y="230" width="250" height="108" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="185" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">估值线</text>
  <text x="185" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">价格已透支未来收益</text>
  <text x="185" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">分批止盈</text>
  <rect x="275" y="230" width="250" height="108" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#155e75">趋势线</text>
  <text x="400" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">上涨结构转弱或破位</text>
  <text x="400" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">减仓保护利润</text>
  <rect x="490" y="230" width="250" height="108" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="615" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">目标仓位线</text>
  <text x="615" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">资产占比超过计划上限</text>
  <text x="615" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">再平衡回目标</text>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">先判断触发哪条线，再决定清仓、减仓或继续持有</text>
</svg>
