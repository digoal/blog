<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">止盈论证链</title>
  <desc id="desc">从浮盈、估值、趋势、仓位漂移推导出止盈规则。</desc>
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">从浮盈到止盈的因果链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="44" y="86" width="160" height="96" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="124" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="124" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">浮盈只说明</text>
  <text x="124" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">价格已经上涨</text>
  <rect x="224" y="86" width="160" height="96" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="304" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">前提B</text>
  <text x="304" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">高估值会压低</text>
  <text x="304" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">未来收益空间</text>
  <rect x="404" y="86" width="160" height="96" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="484" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#155e75">前提C</text>
  <text x="484" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">趋势能延续</text>
  <text x="484" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">也会失速</text>
  <rect x="584" y="86" width="160" height="96" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="664" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">前提D</text>
  <text x="664" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">赚钱后仓位</text>
  <text x="664" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">会自动变大</text>
  <line x1="124" y1="182" x2="124" y2="224" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="304" y1="182" x2="304" y2="224" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="484" y1="182" x2="484" y2="224" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="664" y1="182" x2="664" y2="224" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="68" y="224" width="665" height="76" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="400" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">因为上涨后的风险来源不同，所以止盈不能只看赚了多少</text>
  <text x="400" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">要把盈利对应到估值过热、趋势转弱、仓位超标三种触发器</text>
  <line x1="400" y1="300" x2="400" y2="340" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="160" y="340" width="480" height="64" rx="8" fill="#111827"/>
  <text x="400" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">结论: 止盈是降低过量风险</text>
  <text x="400" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#d1d5db">不是预测最高点，也不是见好就跑</text>
</svg>
