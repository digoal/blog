<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="title desc">
  <title id="title">止盈情景分支</title>
  <desc id="desc">不同前提变化时，止盈动作从继续持有、分批减仓、再平衡到退出观察。</desc>
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">盈利后先判断前提，再选择动作</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="280" y="72" width="240" height="56" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">持仓已有明显浮盈</text>
  <line x1="400" y1="128" x2="400" y2="165" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="275" y="166" width="250" height="54" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#312e81">三问: 贵了吗？弱了吗？超配了吗？</text>
  <line x1="400" y1="220" x2="400" y2="250" stroke="#64748b" stroke-width="2.5"/>
  <line x1="124" y1="250" x2="676" y2="250" stroke="#64748b" stroke-width="2.5"/>
  <line x1="124" y1="250" x2="124" y2="280" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="308" y1="250" x2="308" y2="280" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="492" y1="250" x2="492" y2="280" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="676" y1="250" x2="676" y2="280" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="36" y="280" width="176" height="112" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="124" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">都没有触发</text>
  <text x="124" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">估值合理</text>
  <text x="124" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">趋势未破</text>
  <text x="124" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">继续持有</text>
  <rect x="220" y="280" width="176" height="112" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="308" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9a3412">估值过热</text>
  <text x="308" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">预期收益变薄</text>
  <text x="308" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">但逻辑未坏</text>
  <text x="308" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">分批减仓</text>
  <rect x="404" y="280" width="176" height="112" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="492" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#155e75">趋势转弱</text>
  <text x="492" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">跌破计划线</text>
  <text x="492" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">反弹无力</text>
  <text x="492" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">保护利润</text>
  <rect x="588" y="280" width="176" height="112" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="676" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">仓位超标</text>
  <text x="676" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">单品种或单票</text>
  <text x="676" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">超过上限</text>
  <text x="676" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">再平衡</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">如果买入逻辑也被证伪，动作从止盈升级为退出或观察仓</text>
</svg>
