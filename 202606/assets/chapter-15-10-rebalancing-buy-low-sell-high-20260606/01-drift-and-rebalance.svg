  <rect x="55" y="78" width="270" height="255" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="190" y="112" text-anchor="middle" font-size="18" fill="#0f172a" font-family="Arial, sans-serif">年初目标比例</text>
  <rect x="95" y="145" width="170" height="34" fill="#2563eb"/>
  <text x="278" y="168" font-size="15" fill="#111827" font-family="Arial, sans-serif">核心 60%</text>
  <rect x="95" y="192" width="85" height="34" fill="#f59e0b"/>
  <text x="193" y="215" font-size="15" fill="#111827" font-family="Arial, sans-serif">卫星 20%</text>
  <rect x="95" y="239" width="85" height="34" fill="#10b981"/>
  <text x="193" y="262" font-size="15" fill="#111827" font-family="Arial, sans-serif">防守 20%</text>
