  <text x="610" y="112" text-anchor="middle" font-size="18" fill="#0f172a" font-family="Arial, sans-serif">上涨后实际比例</text>
  <rect x="515" y="145" width="148" height="34" fill="#2563eb"/>
  <text x="676" y="168" font-size="15" fill="#111827" font-family="Arial, sans-serif">核心 52%</text>
  <rect x="515" y="192" width="121" height="34" fill="#f59e0b"/>
  <text x="649" y="215" font-size="15" fill="#111827" font-family="Arial, sans-serif">卫星 34%</text>
  <rect x="515" y="239" width="49" height="34" fill="#10b981"/>
  <text x="577" y="262" font-size="15" fill="#111827" font-family="Arial, sans-serif">防守 14%</text>
  <path d="M345 196 H430" stroke="#64748b" stroke-width="3"/>
  <path d="M430 196 l-13 -9 v18 z" fill="#64748b"/>
