<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">再平衡执行流程</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="300" y="62" width="200" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="94" text-anchor="middle">汇总总市值和实际比例</text>
    <path d="M400 114 V142" stroke="#64748b" stroke-width="3"/>
    <path d="M400 142 l-9 -12 h18 z" fill="#64748b"/>
    <rect x="300" y="142" width="200" height="52" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="400" y="174" text-anchor="middle">目标比例仍有效吗?</text>
    <path d="M300 168 H185 V238" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M185 238 l-9 -12 h18 z" fill="#64748b"/>
    <text x="235" y="158" font-size="14" fill="#dc2626">否</text>
    <rect x="75" y="238" width="220" height="52" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="185" y="269" text-anchor="middle">先重设目标, 不机械调仓</text>
    <path d="M400 194 V224" stroke="#64748b" stroke-width="3"/>
    <path d="M400 224 l-9 -12 h18 z" fill="#64748b"/>
    <text x="414" y="214" font-size="14" fill="#16a34a">是</text>
    <rect x="300" y="224" width="200" height="52" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="400" y="255" text-anchor="middle">偏离超过阈值吗?</text>
    <path d="M500 250 H620 V318" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M620 318 l-9 -12 h18 z" fill="#64748b"/>
    <text x="550" y="240" font-size="14" fill="#64748b">否</text>
    <rect x="520" y="318" width="200" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="620" y="349" text-anchor="middle">只记录, 不交易</text>
    <path d="M400 276 V306" stroke="#64748b" stroke-width="3"/>
    <path d="M400 306 l-9 -12 h18 z" fill="#64748b"/>
    <text x="414" y="296" font-size="14" fill="#16a34a">是</text>
    <rect x="300" y="306" width="200" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="400" y="337" text-anchor="middle">先用现金、分红、新钱</text>
    <path d="M300 332 H185 V338" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M185 338 l-9 -12 h18 z" fill="#64748b"/>
    <rect x="75" y="338" width="220" height="52" rx="8" fill="#fff7ed" stroke="#f97316"/>
    <text x="185" y="369" text-anchor="middle">仍超配: 卖出超限部分</text>
  </g>
</svg>
