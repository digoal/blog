<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">最大回撤水位线</title>
  <desc id="desc">用账户净值从高点跌到低点的路径解释最大回撤</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">最大回撤: 从最高水位掉到最低水位</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <line x1="85" y1="315" x2="720" y2="315" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="95" y1="80" x2="95" y2="318" stroke="#cbd5e1" stroke-width="2"/>
  <text x="70" y="92" text-anchor="end" font-size="13" fill="#64748b">130</text>
  <text x="70" y="161" text-anchor="end" font-size="13" fill="#64748b">100</text>
  <text x="70" y="246" text-anchor="end" font-size="13" fill="#64748b">70</text>
  <text x="70" y="319" text-anchor="end" font-size="13" fill="#64748b">0</text>
  <polyline points="110,245 225,160 340,92 460,138 565,245 690,185" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="340" cy="92" r="7" fill="#16a34a"/>
  <circle cx="565" cy="245" r="7" fill="#dc2626"/>
  <line x1="340" y1="92" x2="565" y2="92" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="565" y1="92" x2="565" y2="245" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="340" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">账户高点 130</text>
  <text x="565" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">之后低点 70</text>
  <rect x="170" y="325" width="460" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="355" text-anchor="middle" font-size="16" fill="#111827">最大回撤 = (70 - 130) / 130 = -46.2%</text>
</svg>
