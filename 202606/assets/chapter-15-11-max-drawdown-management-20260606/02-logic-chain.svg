<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">最大回撤管理论证链</title>
  <desc id="desc">展示从市场波动、恢复难度、个人承受力到仓位上限的因果路径</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">先定能亏多少，再决定能买多少</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="42" y="88" width="158" height="88" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="121" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="121" y="146" text-anchor="middle" font-size="14" fill="#1f2937">资产会出现</text>
  <text x="121" y="166" text-anchor="middle" font-size="14" fill="#1f2937">峰谷回撤</text>
  <rect x="242" y="88" width="158" height="88" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="321" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">前提B</text>
  <text x="321" y="146" text-anchor="middle" font-size="14" fill="#1f2937">亏得越深</text>
  <text x="321" y="166" text-anchor="middle" font-size="14" fill="#1f2937">回本越难</text>
  <rect x="442" y="88" width="158" height="88" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="521" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">前提C</text>
  <text x="521" y="146" text-anchor="middle" font-size="14" fill="#1f2937">每个人的痛感</text>
  <text x="521" y="166" text-anchor="middle" font-size="14" fill="#1f2937">上限不同</text>
  <rect x="642" y="88" width="118" height="88" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="701" y="119" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">结论</text>
  <text x="701" y="146" text-anchor="middle" font-size="14" fill="#1f2937">用回撤预算</text>
  <text x="701" y="166" text-anchor="middle" font-size="14" fill="#1f2937">反推仓位</text>
  <line x1="200" y1="132" x2="234" y2="132" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="132" x2="434" y2="132" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="132" x2="634" y2="132" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="90" y="250" width="620" height="82" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="281" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">操作公式</text>
  <text x="400" y="310" text-anchor="middle" font-size="15" fill="#334155">高波动资产仓位上限 = 组合可承受回撤 / 该资产压力回撤</text>
  <path d="M701 176 Q701 223 670 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
