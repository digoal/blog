<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">最大回撤情景分支</title>
  <desc id="desc">展示回撤预算内、接近预算和突破预算时的不同操作</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">回撤到了不同位置，动作必须不同</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="296" y="78" width="208" height="72" rx="8" fill="#2563eb"/>
  <text x="400" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">组合最大回撤预算</text>
  <text x="400" y="130" text-anchor="middle" font-size="14" fill="#dbeafe">例如: 最多承受 -20%</text>
  <rect x="42" y="238" width="202" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="143" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">回撤小于一半</text>
  <text x="143" y="291" text-anchor="middle" font-size="14" fill="#1f2937">不乱动</text>
  <text x="143" y="312" text-anchor="middle" font-size="14" fill="#1f2937">只检查前提</text>
  <rect x="299" y="238" width="202" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="400" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">接近预算八成</text>
  <text x="400" y="291" text-anchor="middle" font-size="14" fill="#1f2937">停止加风险</text>
  <text x="400" y="312" text-anchor="middle" font-size="14" fill="#1f2937">降到目标仓位</text>
  <rect x="556" y="238" width="202" height="92" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="657" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">突破回撤预算</text>
  <text x="657" y="291" text-anchor="middle" font-size="14" fill="#1f2937">先减风险</text>
  <text x="657" y="312" text-anchor="middle" font-size="14" fill="#1f2937">复盘前不加仓</text>
  <path d="M400 150 Q232 180 143 238" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 150 Q400 190 400 238" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 150 Q568 180 657 238" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="366" text-anchor="middle" font-size="15" fill="#475569">回撤管理不是预测底部，而是防止自己在承受力之外被迫卖出</text>
</svg>
