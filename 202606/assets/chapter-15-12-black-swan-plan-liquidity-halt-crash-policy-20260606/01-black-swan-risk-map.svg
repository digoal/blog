<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">黑天鹅不是一个风险, 是四条通道同时堵住</text>
  <rect x="50" y="72" width="150" height="190" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="125" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">流动性</text>
  <text x="125" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7f1d1d">想卖时没人接</text>
  <text x="125" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7f1d1d">买卖价差变宽</text>
  <text x="125" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7f1d1d">基金申赎拥挤</text>
  <line x1="125" y1="212" x2="125" y2="242" stroke="#ef4444" stroke-width="3"/>
  <text x="125" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">先保现金</text>

  <rect x="235" y="72" width="150" height="190" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">交易暂停</text>
  <text x="310" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#78350f">停牌</text>
  <text x="310" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#78350f">熔断</text>
  <text x="310" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#78350f">额度或申赎限制</text>
  <line x1="310" y1="212" x2="310" y2="242" stroke="#f59e0b" stroke-width="3"/>
  <text x="310" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e">别等门关</text>

  <rect x="420" y="72" width="150" height="190" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="495" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">价格跳空</text>
  <text x="495" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1e40af">暴跌</text>
  <text x="495" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1e40af">跌停</text>
  <text x="495" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1e40af">止损滑点</text>
  <line x1="495" y1="212" x2="495" y2="242" stroke="#3b82f6" stroke-width="3"/>
  <text x="495" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">按压力测算</text>

  <rect x="605" y="72" width="150" height="190" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">规则变化</text>
  <text x="680" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">政策调整</text>
  <text x="680" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">交易规则变化</text>
  <text x="680" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">估值口径变化</text>
  <line x1="680" y1="212" x2="680" y2="242" stroke="#22c55e" stroke-width="3"/>
  <text x="680" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#14532d">等规则落地</text>

  <rect x="100" y="306" width="600" height="58" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">黑天鹅预案的目标</text>
  <text x="400" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">不是猜中事件, 而是在交易入口关闭前保住现金、流动性和仓位弹性</text>
</svg>
