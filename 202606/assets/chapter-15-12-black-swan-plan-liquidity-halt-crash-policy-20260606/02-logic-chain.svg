<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">黑天鹅预案论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="42" y="82" width="160" height="82" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="122" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#312e81">前提A</text>
  <text x="122" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3730a3">黑天鹅无法预测</text>
  <text x="122" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3730a3">但冲击路径可预案</text>

  <rect x="234" y="82" width="160" height="82" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="314" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">前提B</text>
  <text x="314" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">危机先伤流动性</text>
  <text x="314" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">再伤价格</text>

  <rect x="426" y="82" width="160" height="82" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="506" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">前提C</text>
  <text x="506" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">重仓和杠杆</text>
  <text x="506" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">会放大被动卖出</text>

  <rect x="618" y="82" width="140" height="82" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="688" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">前提D</text>
  <text x="688" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">政策和规则</text>
  <text x="688" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">会临场变化</text>

  <line x1="202" y1="123" x2="228" y2="123" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="394" y1="123" x2="420" y2="123" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="586" y1="123" x2="612" y2="123" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="214" width="620" height="68" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">推导</text>
  <text x="400" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">因为退出能力会先消失, 所以预案必须写在买入前, 不能等新闻出来再临场发挥</text>

  <line x1="400" y1="282" x2="400" y2="315" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="318" width="560" height="48" rx="8" fill="#111827"/>
  <text x="400" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">结论: 保现金、降杠杆、砍低流动性、等规则清楚后再恢复交易</text>
</svg>
