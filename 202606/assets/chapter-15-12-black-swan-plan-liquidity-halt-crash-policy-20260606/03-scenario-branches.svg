<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">黑天鹅发生后的三问分支</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="300" y="64" width="200" height="48" rx="8" fill="#111827"/>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">突发事件出现</text>
  <line x1="400" y1="112" x2="400" y2="146" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="260" y="150" width="280" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#075985">第一问: 还能不能正常交易?</text>

  <line x1="260" y1="175" x2="150" y2="238" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="175" x2="650" y2="238" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="42" y="240" width="220" height="58" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="152" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">不能交易或价差异常</text>
  <text x="152" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">停止加仓, 先排队降风险</text>

  <rect x="538" y="240" width="220" height="58" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="648" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">还能交易</text>
  <text x="648" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">执行预案, 不临时放大仓位</text>

  <line x1="152" y1="298" x2="152" y2="333" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="648" y1="298" x2="648" y2="333" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="42" y="336" width="220" height="58" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="152" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">第二问: 需不需要用钱?</text>
  <text x="152" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">需要: 卖流动性最好资产补现金</text>

  <rect x="538" y="336" width="220" height="58" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="648" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">第三问: 逻辑是否破坏?</text>
  <text x="648" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">破坏: 降仓; 未破坏: 等复盘</text>
</svg>
