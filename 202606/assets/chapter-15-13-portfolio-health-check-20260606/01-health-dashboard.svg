<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">组合体检表：五个指标一起看</text>
  <text x="40" y="78" font-size="15" fill="#475569">收益只是体检单上的一项，真正要看账户能不能长期活下去</text>

  <g>
    <rect x="40" y="112" width="142" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="111" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">收益</text>
    <text x="111" y="178" text-anchor="middle" font-size="14" fill="#1f2937">赚了多少</text>
    <text x="111" y="202" text-anchor="middle" font-size="14" fill="#1f2937">谁贡献的</text>
    <text x="111" y="232" text-anchor="middle" font-size="13" fill="#166534">看来源</text>
  </g>

  <g>
    <rect x="202" y="112" width="142" height="150" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="273" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">回撤</text>
    <text x="273" y="178" text-anchor="middle" font-size="14" fill="#1f2937">从高点</text>
    <text x="273" y="202" text-anchor="middle" font-size="14" fill="#1f2937">掉了多深</text>
    <text x="273" y="232" text-anchor="middle" font-size="13" fill="#991b1b">守预算</text>
  </g>

  <g>
    <rect x="364" y="112" width="142" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="435" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">波动</text>
    <text x="435" y="178" text-anchor="middle" font-size="14" fill="#1f2937">每天摆动</text>
    <text x="435" y="202" text-anchor="middle" font-size="14" fill="#1f2937">是否能拿住</text>
    <text x="435" y="232" text-anchor="middle" font-size="13" fill="#92400e">看痛感</text>
  </g>

  <g>
    <rect x="526" y="112" width="142" height="150" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="597" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#075985">集中度</text>
    <text x="597" y="178" text-anchor="middle" font-size="14" fill="#1f2937">是否押在</text>
    <text x="597" y="202" text-anchor="middle" font-size="14" fill="#1f2937">少数方向</text>
    <text x="597" y="232" text-anchor="middle" font-size="13" fill="#075985">查重叠</text>
  </g>

  <g>
    <rect x="40" y="292" width="142" height="92" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="111" y="326" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">相关性</text>
    <text x="111" y="354" text-anchor="middle" font-size="14" fill="#1f2937">压力时会不会同跌</text>
  </g>

  <g>
    <rect x="226" y="292" width="530" height="92" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="491" y="326" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">体检结论不是“今年赚没赚”</text>
    <text x="491" y="354" text-anchor="middle" font-size="15" fill="#334155">而是：收益来源清楚、回撤在预算内、波动能承受、集中不过线、压力时不一起倒</text>
  </g>
</svg>
