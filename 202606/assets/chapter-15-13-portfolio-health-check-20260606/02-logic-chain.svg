<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">组合体检论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g fill="#eff6ff" stroke="#3b82f6" stroke-width="2">
    <rect x="35" y="92" width="165" height="92" rx="8"/>
    <rect x="220" y="92" width="165" height="92" rx="8"/>
    <rect x="405" y="92" width="165" height="92" rx="8"/>
    <rect x="590" y="92" width="165" height="92" rx="8"/>
  </g>
  <text x="117" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 A</text>
  <text x="117" y="154" text-anchor="middle" font-size="14" fill="#1f2937">收益不等于健康</text>
  <text x="302" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 B</text>
  <text x="302" y="154" text-anchor="middle" font-size="14" fill="#1f2937">回撤决定能否拿住</text>
  <text x="487" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 C</text>
  <text x="487" y="154" text-anchor="middle" font-size="14" fill="#1f2937">集中会放大错误</text>
  <text x="672" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 D</text>
  <text x="672" y="154" text-anchor="middle" font-size="14" fill="#1f2937">压力下相关性会上升</text>

  <line x1="202" y1="138" x2="214" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="387" y1="138" x2="399" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="572" y1="138" x2="584" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="240" width="560" height="78" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">推导</text>
  <text x="400" y="297" text-anchor="middle" font-size="15" fill="#1f2937">因为单项指标会骗人，所以必须把收益、回撤、波动、集中度、相关性放在同一张表里</text>
  <line x1="400" y1="188" x2="400" y2="234" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="358" width="560" height="54" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">结论：任何红灯先处理风险，再讨论加仓和收益</text>
  <line x1="400" y1="322" x2="400" y2="352" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
