<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">体检结果不同，动作不同</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="285" y="86" width="230" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#075985">月度组合体检</text>
  <text x="400" y="140" text-anchor="middle" font-size="14" fill="#1f2937">五个指标逐项打灯</text>

  <g>
    <rect x="40" y="238" width="210" height="112" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="145" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">全部绿灯</text>
    <text x="145" y="294" text-anchor="middle" font-size="14" fill="#1f2937">记录，不交易</text>
    <text x="145" y="318" text-anchor="middle" font-size="14" fill="#1f2937">按原计划定投</text>
  </g>

  <g>
    <rect x="295" y="238" width="210" height="112" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">出现黄灯</text>
    <text x="400" y="294" text-anchor="middle" font-size="14" fill="#1f2937">暂停加仓风险资产</text>
    <text x="400" y="318" text-anchor="middle" font-size="14" fill="#1f2937">用现金流修正偏离</text>
  </g>

  <g>
    <rect x="550" y="238" width="210" height="112" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="655" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">出现红灯</text>
    <text x="655" y="294" text-anchor="middle" font-size="14" fill="#1f2937">先降风险</text>
    <text x="655" y="318" text-anchor="middle" font-size="14" fill="#1f2937">复盘前不新增仓位</text>
  </g>

  <line x1="370" y1="160" x2="150" y2="232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="160" x2="400" y2="232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="430" y1="160" x2="650" y2="232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <text x="400" y="404" text-anchor="middle" font-size="16" fill="#334155">组合体检不是为了更频繁交易，而是为了在风险变大前看见它</text>
</svg>
