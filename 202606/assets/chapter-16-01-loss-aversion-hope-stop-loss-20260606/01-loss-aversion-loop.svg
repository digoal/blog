<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">止损执行不了的心理循环</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="16" fill="#111827">
    <rect x="48" y="92" width="170" height="72" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="133" y="122" text-anchor="middle" font-weight="700">价格跌破计划线</text>
    <text x="133" y="146" text-anchor="middle">账面亏损出现</text>

    <rect x="315" y="92" width="170" height="72" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="400" y="122" text-anchor="middle" font-weight="700">痛感被放大</text>
    <text x="400" y="146" text-anchor="middle">卖出像承认失败</text>

    <rect x="582" y="92" width="170" height="72" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="667" y="122" text-anchor="middle" font-weight="700">开始找理由</text>
    <text x="667" y="146" text-anchor="middle">再等等、会回本</text>

    <rect x="582" y="240" width="170" height="72" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="667" y="270" text-anchor="middle" font-weight="700">取消或移动止损</text>
    <text x="667" y="294" text-anchor="middle">规则被情绪改写</text>

    <rect x="315" y="240" width="170" height="72" rx="10" fill="#ffedd5" stroke="#ea580c"/>
    <text x="400" y="270" text-anchor="middle" font-weight="700">亏损变大</text>
    <text x="400" y="294" text-anchor="middle">更不愿卖出</text>

    <rect x="48" y="240" width="170" height="72" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="133" y="270" text-anchor="middle" font-weight="700">唯一出口</text>
    <text x="133" y="294" text-anchor="middle">买入前预承诺</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)">
    <path d="M218 128 H315"/>
    <path d="M485 128 H582"/>
    <path d="M667 164 V240"/>
    <path d="M582 276 H485"/>
    <path d="M315 276 H218"/>
    <path d="M133 240 V168"/>
  </g>
  <text x="400" y="362" text-anchor="middle" font-size="15" fill="#475569">核心: 不要在亏损后临场决定止损, 要在买入前把动作写死</text>
</svg>
