<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链: 为什么止损不能靠意志力</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#111827">
    <rect x="40" y="78" width="155" height="72" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="118" y="106" text-anchor="middle" font-weight="700">前提A</text>
    <text x="118" y="130" text-anchor="middle">亏损痛感更强</text>

    <rect x="230" y="78" width="155" height="72" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="308" y="106" text-anchor="middle" font-weight="700">前提B</text>
    <text x="308" y="130" text-anchor="middle">卖出会锁定亏损</text>

    <rect x="420" y="78" width="155" height="72" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="498" y="106" text-anchor="middle" font-weight="700">前提C</text>
    <text x="498" y="130" text-anchor="middle">人倾向卖赢留亏</text>

    <rect x="610" y="78" width="155" height="72" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="688" y="106" text-anchor="middle" font-weight="700">前提D</text>
    <text x="688" y="130" text-anchor="middle">仓位越大越侥幸</text>

    <rect x="102" y="214" width="210" height="80" rx="10" fill="#f1f5f9" stroke="#64748b"/>
    <text x="207" y="246" text-anchor="middle" font-weight="700">推导1</text>
    <text x="207" y="270" text-anchor="middle">临场卖出 = 对抗痛感</text>

    <rect x="490" y="214" width="210" height="80" rx="10" fill="#f1f5f9" stroke="#64748b"/>
    <text x="595" y="246" text-anchor="middle" font-weight="700">推导2</text>
    <text x="595" y="270" text-anchor="middle">亏损后规则会被改写</text>

    <rect x="248" y="326" width="305" height="52" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="400" y="358" text-anchor="middle" font-size="17" font-weight="700">结论: 买入前写预案, 触发后只执行</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)">
    <path d="M118 150 C118 182, 172 190, 207 214"/>
    <path d="M308 150 C308 182, 250 190, 207 214"/>
    <path d="M498 150 C498 182, 552 190, 595 214"/>
    <path d="M688 150 C688 182, 632 190, 595 214"/>
    <path d="M207 294 C245 322, 310 326, 350 326"/>
    <path d="M595 294 C555 322, 490 326, 450 326"/>
  </g>
</svg>
