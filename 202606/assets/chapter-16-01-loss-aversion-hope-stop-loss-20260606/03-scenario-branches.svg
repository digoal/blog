<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">触发止损后的两条路</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <g font-size="15" fill="#111827">
    <rect x="300" y="70" width="200" height="62" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="400" y="96" text-anchor="middle" font-weight="700">止损条件被触发</text>
    <text x="400" y="118" text-anchor="middle">价格、逻辑或时间失效</text>

    <rect x="76" y="178" width="230" height="72" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="191" y="207" text-anchor="middle" font-weight="700">买入前写了预案</text>
    <text x="191" y="231" text-anchor="middle">按计划卖出或降仓</text>

    <rect x="494" y="178" width="230" height="72" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="609" y="207" text-anchor="middle" font-weight="700">亏损后才想规则</text>
    <text x="609" y="231" text-anchor="middle">先找理由, 再改标准</text>

    <rect x="76" y="304" width="230" height="72" rx="10" fill="#ecfdf5" stroke="#059669"/>
    <text x="191" y="333" text-anchor="middle" font-weight="700">结果</text>
    <text x="191" y="357" text-anchor="middle">小亏损换回决策权</text>

    <rect x="494" y="304" width="230" height="72" rx="10" fill="#ffedd5" stroke="#ea580c"/>
    <text x="609" y="333" text-anchor="middle" font-weight="700">结果</text>
    <text x="609" y="357" text-anchor="middle">小错误拖成大风险</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)">
    <path d="M350 132 C292 154, 250 168, 206 178"/>
    <path d="M450 132 C508 154, 550 168, 594 178"/>
    <path d="M191 250 V304"/>
    <path d="M609 250 V304"/>
  </g>
  <text x="400" y="403" text-anchor="middle" font-size="15" fill="#475569">分叉点不是行情, 而是止损前有没有预承诺和仓位约束</text>
</svg>
