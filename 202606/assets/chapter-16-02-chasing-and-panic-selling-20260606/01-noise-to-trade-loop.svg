<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">信息过载到追涨杀跌的路径</title>
  <desc id="desc">展示散户从信息过载、注意力被热点吸走、羊群确认，到追涨杀跌的行为循环，以及三个截断点。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .hot{fill:#fff7ed;stroke:#fb923c}
      .risk{fill:#fef2f2;stroke:#ef4444}
      .safe{fill:#ecfdf5;stroke:#10b981}
      .title{font-size:22px;font-weight:700;fill:#0f172a}
      .text{font-size:17px;fill:#1e293b}
      .small{font-size:14px;fill:#475569}
      .label{font-size:15px;font-weight:700;fill:#065f46}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <text x="40" y="38" class="title">从信息过载到追涨杀跌：问题不是知道太少，而是没有过滤器</text>

  <rect x="38" y="78" width="150" height="84" class="box"/>
  <text x="113" y="112" text-anchor="middle" class="text">信息过载</text>
  <text x="113" y="138" text-anchor="middle" class="small">消息、热榜、群聊</text>

  <rect x="226" y="78" width="150" height="84" class="box hot"/>
  <text x="301" y="112" text-anchor="middle" class="text">注意力被吸走</text>
  <text x="301" y="138" text-anchor="middle" class="small">只看最热标的</text>

  <rect x="414" y="78" width="150" height="84" class="box hot"/>
  <text x="489" y="112" text-anchor="middle" class="text">羊群确认</text>
  <text x="489" y="138" text-anchor="middle" class="small">大家都在买/卖</text>

  <rect x="602" y="78" width="150" height="84" class="box risk"/>
  <text x="677" y="112" text-anchor="middle" class="text">情绪下单</text>
  <text x="677" y="138" text-anchor="middle" class="small">追涨或恐慌卖出</text>

  <path d="M188 120 H218" class="line"/>
  <path d="M376 120 H406" class="line"/>
  <path d="M564 120 H594" class="line"/>

  <path d="M677 164 C675 248, 120 248, 113 168" stroke="#ef4444" stroke-width="2.2" fill="none" marker-end="url(#arrow)" stroke-dasharray="7 6"/>
  <text x="374" y="238" text-anchor="middle" class="small" fill="#b91c1c">交易后悔、补仓证明自己、继续刷消息，循环加深</text>

  <rect x="70" y="290" width="188" height="66" class="box safe"/>
  <text x="164" y="318" text-anchor="middle" class="label">截断点 1：冷却</text>
  <text x="164" y="342" text-anchor="middle" class="small">热点出现后先等一晚</text>

  <rect x="306" y="290" width="188" height="66" class="box safe"/>
  <text x="400" y="318" text-anchor="middle" class="label">截断点 2：证据</text>
  <text x="400" y="342" text-anchor="middle" class="small">只看可验证事实</text>

  <rect x="542" y="290" width="188" height="66" class="box safe"/>
  <text x="636" y="318" text-anchor="middle" class="label">截断点 3：仓位</text>
  <text x="636" y="342" text-anchor="middle" class="small">无上限和失效条件不下单</text>
</svg>
