<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">追涨杀跌论证链</title>
  <desc id="desc">展示注意力有限、群体安全感、价格不等于价值、一键交易四个前提如何推导出交易前检查清单。</desc>
  <rect width="800" height="420" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .premise{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:8}
      .derive{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;rx:8}
      .action{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:8}
      .fail{fill:#fef2f2;stroke:#f87171;stroke-width:2;rx:8}
      .title{font-size:22px;font-weight:700;fill:#0f172a}
      .text{font-size:16px;fill:#1e293b}
      .small{font-size:13px;fill:#475569}
      .line{stroke:#1f2937;stroke-width:2.1;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <text x="40" y="36" class="title">核心论证链：先截断情绪，再允许交易</text>

  <rect x="40" y="68" width="160" height="74" class="premise"/>
  <text x="120" y="98" text-anchor="middle" class="text">前提 A</text>
  <text x="120" y="124" text-anchor="middle" class="small">注意力有限，信息无限</text>

  <rect x="230" y="68" width="160" height="74" class="premise"/>
  <text x="310" y="98" text-anchor="middle" class="text">前提 B</text>
  <text x="310" y="124" text-anchor="middle" class="small">群体行为带来安全感</text>

  <rect x="420" y="68" width="160" height="74" class="premise"/>
  <text x="500" y="98" text-anchor="middle" class="text">前提 C</text>
  <text x="500" y="124" text-anchor="middle" class="small">价格波动不等于价值变化</text>

  <rect x="610" y="68" width="150" height="74" class="premise"/>
  <text x="685" y="98" text-anchor="middle" class="text">前提 D</text>
  <text x="685" y="124" text-anchor="middle" class="small">一键交易放大冲动</text>

  <rect x="82" y="190" width="252" height="78" class="derive"/>
  <text x="208" y="220" text-anchor="middle" class="text">A + B</text>
  <text x="208" y="246" text-anchor="middle" class="small">热点先进入备选池，分析被推迟</text>

  <rect x="466" y="190" width="252" height="78" class="derive"/>
  <text x="592" y="220" text-anchor="middle" class="text">A + B + C + D</text>
  <text x="592" y="246" text-anchor="middle" class="small">涨时怕踏空，跌时怕归零，情绪变订单</text>

  <rect x="106" y="318" width="250" height="70" class="fail"/>
  <text x="231" y="348" text-anchor="middle" class="text">错误结论</text>
  <text x="231" y="373" text-anchor="middle" class="small">大家都动，所以我也立刻动</text>

  <rect x="444" y="318" width="250" height="70" class="action"/>
  <text x="569" y="348" text-anchor="middle" class="text">正确动作</text>
  <text x="569" y="373" text-anchor="middle" class="small">冷却、验事实、算仓位、写失效条件</text>

  <path d="M120 143 C125 164, 155 170, 190 188" class="line"/>
  <path d="M310 143 C300 164, 260 170, 226 188" class="line"/>
  <path d="M500 143 C506 164, 540 170, 570 188" class="line"/>
  <path d="M685 143 C676 164, 630 170, 600 188" class="line"/>
  <path d="M208 270 C214 294, 225 302, 231 316" class="line"/>
  <path d="M592 270 C588 294, 575 302, 569 316" class="line"/>
  <path d="M334 229 H456" class="line"/>
</svg>
