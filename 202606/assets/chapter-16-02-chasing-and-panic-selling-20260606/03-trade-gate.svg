<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">交易前闸门</title>
  <desc id="desc">展示追涨和恐慌卖出之前必须通过的三个交易闸门：计划、证据和仓位。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .start{fill:#ffffff;stroke:#64748b;stroke-width:2;rx:10}
      .gate{fill:#eff6ff;stroke:#3b82f6;stroke-width:2;rx:10}
      .stop{fill:#fff1f2;stroke:#f43f5e;stroke-width:2;rx:10}
      .go{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:10}
      .title{font-size:22px;font-weight:700;fill:#0f172a}
      .text{font-size:16px;fill:#1e293b}
      .small{font-size:13px;fill:#475569}
      .yes{font-size:13px;font-weight:700;fill:#047857}
      .no{font-size:13px;font-weight:700;fill:#be123c}
      .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <text x="40" y="36" class="title">交易前闸门：不是禁止行动，而是禁止情绪直接下单</text>

  <rect x="302" y="64" width="196" height="62" class="start"/>
  <text x="400" y="91" text-anchor="middle" class="text">想立刻买入或卖出</text>
  <text x="400" y="113" text-anchor="middle" class="small">热点、暴涨、暴跌、群消息</text>

  <rect x="302" y="164" width="196" height="62" class="gate"/>
  <text x="400" y="190" text-anchor="middle" class="text">闸门 1：是否在原计划内？</text>
  <text x="400" y="212" text-anchor="middle" class="small">买什么、为何买、错了怎么办</text>

  <rect x="302" y="264" width="196" height="62" class="gate"/>
  <text x="400" y="290" text-anchor="middle" class="text">闸门 2：是否有新证据？</text>
  <text x="400" y="312" text-anchor="middle" class="small">公告、财报、估值、政策、成交结构</text>

  <rect x="302" y="364" width="196" height="48" class="gate"/>
  <text x="400" y="393" text-anchor="middle" class="text">闸门 3：仓位与失效条件写清了吗？</text>

  <rect x="46" y="252" width="194" height="80" class="stop"/>
  <text x="143" y="282" text-anchor="middle" class="text">任何一关不通过</text>
  <text x="143" y="307" text-anchor="middle" class="small">冷却一晚；不加仓；不清仓</text>

  <rect x="560" y="252" width="194" height="80" class="go"/>
  <text x="657" y="282" text-anchor="middle" class="text">三关全部通过</text>
  <text x="657" y="307" text-anchor="middle" class="small">按计划小步执行并记录复盘</text>

  <path d="M400 126 V156" class="line"/>
  <path d="M400 226 V256" class="line"/>
  <path d="M400 326 V356" class="line"/>
  <path d="M302 195 C230 195, 190 225, 153 250" class="line"/>
  <path d="M302 295 C250 295, 218 296, 243 296" class="line"/>
  <path d="M302 388 C220 388, 167 364, 145 336" class="line"/>
  <path d="M498 388 C560 388, 620 360, 650 336" class="line"/>
  <text x="266" y="187" class="no">否</text>
  <text x="266" y="285" class="no">否</text>
  <text x="250" y="373" class="no">否</text>
  <text x="512" y="373" class="yes">是</text>
</svg>
