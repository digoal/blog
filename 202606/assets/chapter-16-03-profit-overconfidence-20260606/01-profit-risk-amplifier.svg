<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">赚钱后的风险放大器</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="40" y="78" width="145" height="68" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="112" y="106" text-anchor="middle">能力</text>
    <text x="112" y="128" text-anchor="middle" font-size="13" fill="#334155">研究、规则、执行</text>

    <rect x="40" y="166" width="145" height="68" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="112" y="194" text-anchor="middle">行情</text>
    <text x="112" y="216" text-anchor="middle" font-size="13" fill="#334155">流动性、风格、趋势</text>

    <rect x="40" y="254" width="145" height="68" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="112" y="282" text-anchor="middle">运气</text>
    <text x="112" y="304" text-anchor="middle" font-size="13" fill="#334155">样本小、偶然踩中</text>

    <path d="M185 112 H238" stroke="#64748b" stroke-width="3"/>
    <path d="M185 200 H238" stroke="#64748b" stroke-width="3"/>
    <path d="M185 288 H238" stroke="#64748b" stroke-width="3"/>
    <path d="M238 112 V288" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M238 200 H276" stroke="#64748b" stroke-width="3"/>
    <path d="M276 200 l-11 -8 v16 z" fill="#64748b"/>

    <rect x="276" y="156" width="150" height="88" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="351" y="190" text-anchor="middle">一笔盈利</text>
    <text x="351" y="216" text-anchor="middle" font-size="13" fill="#334155">结果真实, 原因未明</text>

    <path d="M426 200 H484" stroke="#64748b" stroke-width="3"/>
    <path d="M484 200 l-11 -8 v16 z" fill="#64748b"/>
    <rect x="484" y="156" width="150" height="88" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="559" y="188" text-anchor="middle">自我归因</text>
    <text x="559" y="214" text-anchor="middle" font-size="13" fill="#7f1d1d">把行情和运气当能力</text>

    <path d="M559 244 V292" stroke="#64748b" stroke-width="3"/>
    <path d="M559 292 l-9 -12 h18 z" fill="#64748b"/>
    <rect x="459" y="292" width="200" height="54" rx="8" fill="#fff7ed" stroke="#f97316"/>
    <text x="559" y="325" text-anchor="middle">加仓、频繁交易、放松止损</text>

    <path d="M659 319 H716" stroke="#64748b" stroke-width="3"/>
    <path d="M716 319 l-11 -8 v16 z" fill="#64748b"/>
    <rect x="632" y="78" width="128" height="64" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="696" y="104" text-anchor="middle">成本上升</text>
    <text x="696" y="124" text-anchor="middle" font-size="12" fill="#7f1d1d">佣金、价差、税</text>
    <rect x="632" y="166" width="128" height="64" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="696" y="192" text-anchor="middle">回撤放大</text>
    <text x="696" y="212" text-anchor="middle" font-size="12" fill="#7f1d1d">同一错误伤更深</text>
    <rect x="632" y="254" width="128" height="64" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="696" y="280" text-anchor="middle">规则失效</text>
    <text x="696" y="300" text-anchor="middle" font-size="12" fill="#7f1d1d">先下单再找理由</text>
  </g>

  <rect x="150" y="364" width="500" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="389" text-anchor="middle" font-size="16" fill="#0f172a" font-family="Arial, sans-serif">关键: 盈利是结果, 不是能力证明；先归因, 再决定是否扩大风险</text>
</svg>
