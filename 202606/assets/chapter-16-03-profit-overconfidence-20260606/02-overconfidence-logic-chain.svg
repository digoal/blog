<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">过度自信论证链</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="34" y="76" width="150" height="88" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="109" y="106" text-anchor="middle">前提A</text>
    <text x="109" y="130" text-anchor="middle">盈利由能力、行情</text>
    <text x="109" y="150" text-anchor="middle">和运气共同决定</text>

    <rect x="218" y="76" width="150" height="88" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="293" y="106" text-anchor="middle">前提B</text>
    <text x="293" y="130" text-anchor="middle">人会把成功</text>
    <text x="293" y="150" text-anchor="middle">更多归给自己</text>

    <rect x="402" y="76" width="150" height="88" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="477" y="106" text-anchor="middle">前提C</text>
    <text x="477" y="130" text-anchor="middle">自信膨胀会推高</text>
    <text x="477" y="150" text-anchor="middle">仓位和交易频率</text>

    <rect x="586" y="76" width="150" height="88" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="661" y="106" text-anchor="middle">前提D</text>
    <text x="661" y="130" text-anchor="middle">交易越多, 成本</text>
    <text x="661" y="150" text-anchor="middle">和错误越多</text>
  </g>

  <path d="M109 174 V214 H400" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M293 174 V214" stroke="#64748b" stroke-width="3"/>
  <path d="M477 174 V214" stroke="#64748b" stroke-width="3"/>
  <path d="M661 174 V214 H400" stroke="#64748b" stroke-width="3" fill="none"/>

  <rect x="170" y="214" width="460" height="86" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="400" y="246" text-anchor="middle" font-size="17" fill="#0f172a" font-family="Arial, sans-serif">推导</text>
  <text x="400" y="272" text-anchor="middle" font-size="15" fill="#334155" font-family="Arial, sans-serif">盈利未拆因, 就会被误读为能力；能力被高估, 风险就被放大</text>

  <path d="M400 300 V334" stroke="#64748b" stroke-width="3"/>
  <path d="M400 334 l-9 -12 h18 z" fill="#64748b"/>
  <rect x="126" y="334" width="548" height="46" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="363" text-anchor="middle" font-size="17" fill="#14532d" font-family="Arial, sans-serif">结论: 赚钱后先冷却、复盘归因、仓位回表, 不直接加速</text>
</svg>
