<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">盈利后冷却流程</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="310" y="58" width="180" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="400" y="90" text-anchor="middle">账户出现明显盈利</text>

    <path d="M400 110 V136" stroke="#64748b" stroke-width="3"/>
    <path d="M400 136 l-9 -12 h18 z" fill="#64748b"/>
    <rect x="290" y="136" width="220" height="52" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="400" y="168" text-anchor="middle">买入计划是否事先写好?</text>

    <path d="M290 162 H160 V242" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M160 242 l-9 -12 h18 z" fill="#64748b"/>
    <text x="218" y="152" font-size="14" fill="#dc2626">否</text>
    <rect x="58" y="242" width="204" height="58" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="160" y="267" text-anchor="middle">默认是运气和行情</text>
    <text x="160" y="288" text-anchor="middle">48小时内不加仓</text>

    <path d="M400 188 V218" stroke="#64748b" stroke-width="3"/>
    <path d="M400 218 l-9 -12 h18 z" fill="#64748b"/>
    <text x="414" y="208" font-size="14" fill="#16a34a">是</text>
    <rect x="290" y="218" width="220" height="52" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="400" y="250" text-anchor="middle">是否有足够样本验证?</text>

    <path d="M510 244 H636 V314" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M636 314 l-9 -12 h18 z" fill="#64748b"/>
    <text x="558" y="234" font-size="14" fill="#dc2626">否</text>
    <rect x="536" y="314" width="200" height="58" rx="8" fill="#fff7ed" stroke="#f97316"/>
    <text x="636" y="339" text-anchor="middle">样本不足20笔</text>
    <text x="636" y="360" text-anchor="middle">只记录, 不放大仓位</text>

    <path d="M400 270 V302" stroke="#64748b" stroke-width="3"/>
    <path d="M400 302 l-9 -12 h18 z" fill="#64748b"/>
    <text x="414" y="292" font-size="14" fill="#16a34a">是</text>
    <rect x="290" y="302" width="220" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="400" y="334" text-anchor="middle">仓位仍在风险预算内?</text>

    <path d="M290 328 H160 V332" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M160 332 l-9 -12 h18 z" fill="#64748b"/>
    <text x="222" y="318" font-size="14" fill="#dc2626">否</text>
    <rect x="58" y="332" width="204" height="58" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="160" y="357" text-anchor="middle">先减回计划上限</text>
    <text x="160" y="378" text-anchor="middle">再讨论下一笔</text>

    <path d="M400 354 V382" stroke="#64748b" stroke-width="3"/>
    <path d="M400 382 l-9 -12 h18 z" fill="#64748b"/>
    <text x="414" y="374" font-size="14" fill="#16a34a">是</text>
    <rect x="290" y="382" width="220" height="34" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="400" y="405" text-anchor="middle">只允许小幅提高, 不翻倍</text>
  </g>
</svg>
