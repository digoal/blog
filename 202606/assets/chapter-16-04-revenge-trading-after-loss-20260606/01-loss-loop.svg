<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">亏损后的翻本循环</title>
  <desc id="desc">展示亏损后从痛感、翻本目标、加大仓位到更大回撤的循环。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:14}
      .danger{fill:#fff1f2;stroke:#fb7185;stroke-width:2;rx:14}
      .safe{fill:#ecfdf5;stroke:#34d399;stroke-width:2;rx:14}
      .title{font-family:Arial, sans-serif;font-size:24px;font-weight:700;fill:#0f172a}
      .text{font-family:Arial, sans-serif;font-size:18px;fill:#1e293b}
      .small{font-family:Arial, sans-serif;font-size:14px;fill:#475569}
      .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="400" y="40" text-anchor="middle" class="title">亏损后最危险的不是亏钱, 是目标被偷偷改掉</text>

  <rect x="60" y="90" width="170" height="82" class="box"/>
  <text x="145" y="122" text-anchor="middle" class="text">第一笔亏损</text>
  <text x="145" y="150" text-anchor="middle" class="small">计划内亏损本可承受</text>

  <rect x="315" y="78" width="170" height="106" class="danger"/>
  <text x="400" y="113" text-anchor="middle" class="text">痛感放大</text>
  <text x="400" y="141" text-anchor="middle" class="small">目标从执行计划</text>
  <text x="400" y="163" text-anchor="middle" class="small">变成马上回本</text>

  <rect x="570" y="90" width="170" height="82" class="danger"/>
  <text x="655" y="122" text-anchor="middle" class="text">加大风险</text>
  <text x="655" y="150" text-anchor="middle" class="small">补仓、加杠杆、乱追</text>

  <rect x="455" y="250" width="170" height="82" class="danger"/>
  <text x="540" y="282" text-anchor="middle" class="text">更大回撤</text>
  <text x="540" y="310" text-anchor="middle" class="small">亏损预算被突破</text>

  <rect x="175" y="250" width="190" height="82" class="safe"/>
  <text x="270" y="282" text-anchor="middle" class="text">正确断点</text>
  <text x="270" y="310" text-anchor="middle" class="small">停手、降仓、复盘</text>

  <path d="M230 131 H305" class="arrow"/>
  <path d="M485 131 H560" class="arrow"/>
  <path d="M650 172 C650 230 610 248 625 285" class="arrow"/>
  <path d="M455 291 H375" class="arrow"/>
  <path d="M270 250 C250 210 220 190 170 174" class="arrow"/>
  <path d="M455 332 C360 375 185 365 125 175" stroke="#fb7185" stroke-width="2.2" fill="none" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="400" y="375" text-anchor="middle" class="small">翻本循环: 越想快速抹平亏损, 越容易把小亏做成大亏</text>
</svg>
