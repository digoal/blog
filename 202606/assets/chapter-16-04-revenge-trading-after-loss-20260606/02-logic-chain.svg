<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">急于翻本的论证链</title>
  <desc id="desc">展示亏损痛感、回本参照点、交易优势和过度交易成本如何推出停手规则。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .node{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:12}
      .mid{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:12}
      .out{fill:#ecfdf5;stroke:#34d399;stroke-width:2;rx:12}
      .bad{fill:#fff1f2;stroke:#fb7185;stroke-width:2;rx:12}
      .title{font-family:Arial, sans-serif;font-size:23px;font-weight:700;fill:#0f172a}
      .text{font-family:Arial, sans-serif;font-size:16px;fill:#1e293b}
      .small{font-family:Arial, sans-serif;font-size:13px;fill:#475569}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="400" y="38" text-anchor="middle" class="title">从亏损到纪律: 一条完整推导链</text>

  <rect x="35" y="78" width="160" height="90" class="node"/>
  <text x="115" y="109" text-anchor="middle" class="text">前提A</text>
  <text x="115" y="134" text-anchor="middle" class="small">亏损痛感大于</text>
  <text x="115" y="154" text-anchor="middle" class="small">同等盈利快感</text>

  <rect x="225" y="78" width="160" height="90" class="node"/>
  <text x="305" y="109" text-anchor="middle" class="text">前提B</text>
  <text x="305" y="134" text-anchor="middle" class="small">回本价变成</text>
  <text x="305" y="154" text-anchor="middle" class="small">新的心理目标</text>

  <rect x="415" y="78" width="160" height="90" class="node"/>
  <text x="495" y="109" text-anchor="middle" class="text">前提C</text>
  <text x="495" y="134" text-anchor="middle" class="small">优势来自计划</text>
  <text x="495" y="154" text-anchor="middle" class="small">不是来自情绪</text>

  <rect x="605" y="78" width="160" height="90" class="node"/>
  <text x="685" y="109" text-anchor="middle" class="text">前提D</text>
  <text x="685" y="134" text-anchor="middle" class="small">交易越急越密</text>
  <text x="685" y="154" text-anchor="middle" class="small">成本和错误越多</text>

  <path d="M195 123 H215" class="arrow"/>
  <path d="M385 123 H405" class="arrow"/>
  <path d="M575 123 H595" class="arrow"/>

  <rect x="130" y="230" width="220" height="92" class="bad"/>
  <text x="240" y="260" text-anchor="middle" class="text">错误推导</text>
  <text x="240" y="285" text-anchor="middle" class="small">因为亏了, 所以必须今天赢回来</text>
  <text x="240" y="305" text-anchor="middle" class="small">动作: 加仓、补仓、追单</text>

  <rect x="450" y="230" width="220" height="92" class="out"/>
  <text x="560" y="260" text-anchor="middle" class="text">正确结论</text>
  <text x="560" y="285" text-anchor="middle" class="small">因为情绪已接管, 所以先断开交易</text>
  <text x="560" y="305" text-anchor="middle" class="small">动作: 停手、降仓、复盘</text>

  <path d="M305 168 C260 190 238 205 240 224" class="arrow"/>
  <path d="M495 168 C535 190 560 205 560 224" class="arrow"/>
  <path d="M350 276 H440" class="arrow"/>

  <text x="400" y="362" text-anchor="middle" class="small">同一笔亏损有两条路: 用情绪扩大风险, 或用规则切断风险</text>
</svg>
