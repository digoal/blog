<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title desc">
  <title id="title">亏损后的停手决策树</title>
  <desc id="desc">亏损后根据是否触发日内亏损线、买入逻辑和情绪状态决定停手、降仓或恢复正常仓位。</desc>
  <rect width="800" height="440" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .q{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:12}
      .stop{fill:#fff1f2;stroke:#fb7185;stroke-width:2;rx:12}
      .go{fill:#ecfdf5;stroke:#34d399;stroke-width:2;rx:12}
      .wait{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:12}
      .title{font-family:Arial, sans-serif;font-size:23px;font-weight:700;fill:#0f172a}
      .text{font-family:Arial, sans-serif;font-size:16px;fill:#1e293b}
      .small{font-family:Arial, sans-serif;font-size:13px;fill:#475569}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .label{font-family:Arial, sans-serif;font-size:13px;fill:#334155;font-weight:700}
    </style>
  </defs>
  <text x="400" y="36" text-anchor="middle" class="title">亏损后不要问怎么翻本, 先走停手决策树</text>

  <rect x="310" y="62" width="180" height="68" class="q"/>
  <text x="400" y="92" text-anchor="middle" class="text">刚发生亏损</text>
  <text x="400" y="114" text-anchor="middle" class="small">先暂停, 不立刻下单</text>

  <rect x="70" y="170" width="190" height="78" class="q"/>
  <text x="165" y="201" text-anchor="middle" class="text">触发日亏损线?</text>
  <text x="165" y="225" text-anchor="middle" class="small">例如账户1%-2%</text>

  <rect x="305" y="170" width="190" height="78" class="q"/>
  <text x="400" y="201" text-anchor="middle" class="text">买入逻辑坏了?</text>
  <text x="400" y="225" text-anchor="middle" class="small">财报、趋势、流动性</text>

  <rect x="540" y="170" width="190" height="78" class="q"/>
  <text x="635" y="201" text-anchor="middle" class="text">情绪分过高?</text>
  <text x="635" y="225" text-anchor="middle" class="small">愤怒、急躁、想加倍</text>

  <rect x="70" y="310" width="190" height="74" class="stop"/>
  <text x="165" y="339" text-anchor="middle" class="text">停止当天交易</text>
  <text x="165" y="362" text-anchor="middle" class="small">只复盘, 不补仓</text>

  <rect x="305" y="310" width="190" height="74" class="stop"/>
  <text x="400" y="339" text-anchor="middle" class="text">减仓或退出</text>
  <text x="400" y="362" text-anchor="middle" class="small">不把错误变成长线</text>

  <rect x="540" y="310" width="190" height="74" class="wait"/>
  <text x="635" y="339" text-anchor="middle" class="text">冷却24小时</text>
  <text x="635" y="362" text-anchor="middle" class="small">下次只用半仓试单</text>

  <rect x="310" y="382" width="180" height="42" class="go"/>
  <text x="400" y="408" text-anchor="middle" class="text">全部为否: 按原计划交易</text>

  <path d="M400 130 V156" class="arrow"/>
  <path d="M400 156 H165 V166" class="arrow"/>
  <path d="M400 156 V166" class="arrow"/>
  <path d="M400 156 H635 V166" class="arrow"/>
  <path d="M165 248 V302" class="arrow"/>
  <path d="M400 248 V302" class="arrow"/>
  <path d="M635 248 V302" class="arrow"/>
  <path d="M260 209 H295" class="arrow"/>
  <path d="M495 209 H530" class="arrow"/>
  <path d="M165 248 C210 405 285 405 305 405" class="arrow"/>
  <path d="M400 248 V376" class="arrow"/>
  <path d="M635 248 C590 405 515 405 495 405" class="arrow"/>
  <text x="180" y="276" class="label">是</text>
  <text x="415" y="276" class="label">是</text>
  <text x="650" y="276" class="label">是</text>
  <text x="400" y="150" text-anchor="middle" class="label">先问三个问题</text>
</svg>
