<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="交易前六道检查门">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">交易前检查清单：不是预测器，而是刹车系统</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">六道门全部通过，才允许把想法变成订单</text>

  <g font-family="Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="42" y="112" width="108" height="66" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="96" y="141" text-anchor="middle" fill="#1e3a8a">交易理由</text>
    <text x="96" y="163" text-anchor="middle" font-size="12" font-weight="400" fill="#1e3a8a">不是消息冲动</text>

    <rect x="172" y="112" width="108" height="66" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="226" y="141" text-anchor="middle" fill="#166534">品种角色</text>
    <text x="226" y="163" text-anchor="middle" font-size="12" font-weight="400" fill="#166534">核心/卫星/试错</text>

    <rect x="302" y="112" width="108" height="66" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="356" y="141" text-anchor="middle" fill="#92400e">仓位风险</text>
    <text x="356" y="163" text-anchor="middle" font-size="12" font-weight="400" fill="#92400e">亏错不伤身</text>

    <rect x="432" y="112" width="108" height="66" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="486" y="141" text-anchor="middle" fill="#991b1b">失效条件</text>
    <text x="486" y="163" text-anchor="middle" font-size="12" font-weight="400" fill="#991b1b">错了怎么办</text>

    <rect x="562" y="112" width="108" height="66" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="616" y="141" text-anchor="middle" fill="#5b21b6">卖出计划</text>
    <text x="616" y="163" text-anchor="middle" font-size="12" font-weight="400" fill="#5b21b6">止损/止盈/复盘</text>

    <rect x="332" y="236" width="136" height="66" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="400" y="265" text-anchor="middle" fill="#0c4a6e">下单执行</text>
    <text x="400" y="287" text-anchor="middle" font-size="12" font-weight="400" fill="#0c4a6e">限价/市价/流动性</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M150 145 H172"/>
    <path d="M280 145 H302"/>
    <path d="M410 145 H432"/>
    <path d="M540 145 H562"/>
    <path d="M616 178 C616 218 470 206 438 236"/>
  </g>

  <rect x="86" y="236" width="170" height="66" rx="10" fill="#fff1f2" stroke="#e11d48"/>
  <text x="171" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9f1239">任一红灯</text>
  <text x="171" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9f1239">不下单，先改计划</text>

  <rect x="544" y="236" width="170" height="66" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <text x="629" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#047857">全部绿灯</text>
  <text x="629" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#047857">按计划小步执行</text>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M302 269 H256"/>
    <path d="M468 269 H544"/>
  </g>

  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">清单的价值：把“我感觉可以买”改成“条件满足才买”</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
