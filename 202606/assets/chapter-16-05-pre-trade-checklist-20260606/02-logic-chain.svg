<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="交易前检查清单论证链">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">论证链：为什么下单前必须过清单</text>

  <g font-family="Arial, sans-serif">
    <rect x="38" y="82" width="170" height="84" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="123" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
    <text x="123" y="134" text-anchor="middle" font-size="13" fill="#1e3a8a">人会受情绪和偏差影响</text>
    <text x="123" y="153" text-anchor="middle" font-size="12" fill="#1e3a8a">过度自信、追涨、扛亏</text>

    <rect x="230" y="82" width="170" height="84" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="315" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">前提B</text>
    <text x="315" y="134" text-anchor="middle" font-size="13" fill="#92400e">频繁交易会吞掉收益</text>
    <text x="315" y="153" text-anchor="middle" font-size="12" fill="#92400e">成本、滑点、错买错卖</text>

    <rect x="422" y="82" width="170" height="84" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="507" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">前提C</text>
    <text x="507" y="134" text-anchor="middle" font-size="13" fill="#166534">订单也有执行风险</text>
    <text x="507" y="153" text-anchor="middle" font-size="12" fill="#166534">市价、限价、流动性</text>

    <rect x="614" y="82" width="148" height="84" rx="8" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="688" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">前提D</text>
    <text x="688" y="134" text-anchor="middle" font-size="13" fill="#5b21b6">清单能减少遗漏</text>
    <text x="688" y="153" text-anchor="middle" font-size="12" fill="#5b21b6">靠流程约束动作</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M123 166 C138 214 204 214 225 246"/>
    <path d="M315 166 C326 214 294 214 289 246"/>
    <path d="M507 166 C496 214 506 214 510 246"/>
    <path d="M688 166 C668 214 598 214 575 246"/>
  </g>

  <rect x="206" y="246" width="388" height="72" rx="10" fill="#f8fafc" stroke="#334155"/>
  <text x="400" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">因为判断会被情绪污染，所以先把交易条件写成可检查项目</text>

  <path d="M400 318 V350" stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <rect x="230" y="350" width="340" height="36" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="400" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#047857">结论：没过清单不下单；黄灯缩仓；红灯停止交易</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
