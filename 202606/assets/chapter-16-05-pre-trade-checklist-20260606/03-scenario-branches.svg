<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="交易前检查情景分支">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">情景分支：清单结果决定动作，不由情绪决定动作</text>

  <rect x="285" y="72" width="230" height="54" rx="9" fill="#ffffff" stroke="#334155"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">下单前完成六项检查</text>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M400 126 V160"/>
    <path d="M400 160 H150 V196"/>
    <path d="M400 160 V196"/>
    <path d="M400 160 H650 V196"/>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="46" y="196" width="208" height="78" rx="10" fill="#ecfdf5" stroke="#059669"/>
    <text x="150" y="224" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">全部绿灯</text>
    <text x="150" y="249" text-anchor="middle" font-size="13" fill="#047857">理由、仓位、失效、卖出、订单都清楚</text>
    <text x="150" y="267" text-anchor="middle" font-size="12" fill="#047857">动作：按计划执行</text>

    <rect x="296" y="196" width="208" height="78" rx="10" fill="#fffbeb" stroke="#d97706"/>
    <text x="400" y="224" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">出现黄灯</text>
    <text x="400" y="249" text-anchor="middle" font-size="13" fill="#92400e">条件部分成立，但风险预算偏紧</text>
    <text x="400" y="267" text-anchor="middle" font-size="12" fill="#92400e">动作：缩小仓位或延后</text>

    <rect x="546" y="196" width="208" height="78" rx="10" fill="#fff1f2" stroke="#e11d48"/>
    <text x="650" y="224" text-anchor="middle" font-size="17" font-weight="700" fill="#9f1239">出现红灯</text>
    <text x="650" y="249" text-anchor="middle" font-size="13" fill="#9f1239">理由模糊、情绪失控、没有退出条件</text>
    <text x="650" y="267" text-anchor="middle" font-size="12" fill="#9f1239">动作：不下单</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M150 274 V320"/>
    <path d="M400 274 V320"/>
    <path d="M650 274 V320"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="64" y="320" width="172" height="50" rx="8" fill="#ffffff" stroke="#10b981"/>
    <text x="150" y="341" text-anchor="middle" font-weight="700" fill="#047857">小步下单</text>
    <text x="150" y="360" text-anchor="middle" fill="#047857">执行后记录结果</text>

    <rect x="314" y="320" width="172" height="50" rx="8" fill="#ffffff" stroke="#f59e0b"/>
    <text x="400" y="341" text-anchor="middle" font-weight="700" fill="#92400e">降级处理</text>
    <text x="400" y="360" text-anchor="middle" fill="#92400e">半仓、观察仓、等待</text>

    <rect x="564" y="320" width="172" height="50" rx="8" fill="#ffffff" stroke="#e11d48"/>
    <text x="650" y="341" text-anchor="middle" font-weight="700" fill="#9f1239">停止交易</text>
    <text x="650" y="360" text-anchor="middle" fill="#9f1239">离开屏幕，明天复查</text>
  </g>

  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">纪律不是忍住手痒，而是让手痒没有通过流程的机会</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
