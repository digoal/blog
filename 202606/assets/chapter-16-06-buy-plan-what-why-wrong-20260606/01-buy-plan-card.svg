<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">买入计划四问卡</title>
  <desc id="desc">展示买入计划需要回答的买什么、为什么买、买多少和错了怎么办。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">买入前先写四张票</text>
  <g font-family="Arial, sans-serif">
    <rect x="55" y="84" width="155" height="220" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="132" cy="124" r="28" fill="#dbeafe"/>
    <text x="132" y="132" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">1</text>
    <text x="132" y="176" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">买什么</text>
    <text x="132" y="214" text-anchor="middle" font-size="16" fill="#374151">品种</text>
    <text x="132" y="240" text-anchor="middle" font-size="16" fill="#374151">账户位置</text>
    <text x="132" y="266" text-anchor="middle" font-size="16" fill="#374151">持有期限</text>

    <rect x="230" y="84" width="155" height="220" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <circle cx="307" cy="124" r="28" fill="#d1fae5"/>
    <text x="307" y="132" text-anchor="middle" font-size="24" font-weight="700" fill="#047857">2</text>
    <text x="307" y="176" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">为什么买</text>
    <text x="307" y="214" text-anchor="middle" font-size="16" fill="#374151">市场环境</text>
    <text x="307" y="240" text-anchor="middle" font-size="16" fill="#374151">品种逻辑</text>
    <text x="307" y="266" text-anchor="middle" font-size="16" fill="#374151">证据来源</text>

    <rect x="405" y="84" width="155" height="220" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="482" cy="124" r="28" fill="#fef3c7"/>
    <text x="482" y="132" text-anchor="middle" font-size="24" font-weight="700" fill="#b45309">3</text>
    <text x="482" y="176" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">买多少</text>
    <text x="482" y="214" text-anchor="middle" font-size="16" fill="#374151">仓位上限</text>
    <text x="482" y="240" text-anchor="middle" font-size="16" fill="#374151">分批规则</text>
    <text x="482" y="266" text-anchor="middle" font-size="16" fill="#374151">亏损预算</text>

    <rect x="580" y="84" width="155" height="220" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <circle cx="657" cy="124" r="28" fill="#fee2e2"/>
    <text x="657" y="132" text-anchor="middle" font-size="24" font-weight="700" fill="#b91c1c">4</text>
    <text x="657" y="176" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">错了怎么办</text>
    <text x="657" y="214" text-anchor="middle" font-size="16" fill="#374151">失效条件</text>
    <text x="657" y="240" text-anchor="middle" font-size="16" fill="#374151">减仓动作</text>
    <text x="657" y="266" text-anchor="middle" font-size="16" fill="#374151">复盘时间</text>
  </g>
  <rect x="178" y="332" width="444" height="42" rx="8" fill="#111827"/>
  <text x="400" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">四项没有写全，下单键先别按</text>
</svg>
