<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">买入计划论证链</title>
  <desc id="desc">展示从人性偏差和市场变化推导出买入计划必须提前写好的逻辑链。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">从冲动下单到计划买入</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="38" y="92" width="145" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="110" y="124" text-anchor="middle" font-size="19" font-weight="700">前提A</text>
    <text x="110" y="154" text-anchor="middle">人会受情绪</text>
    <text x="110" y="178" text-anchor="middle">和消息驱动</text>

    <rect x="218" y="92" width="145" height="110" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <text x="290" y="124" text-anchor="middle" font-size="19" font-weight="700">前提B</text>
    <text x="290" y="154" text-anchor="middle">买入最容易</text>
    <text x="290" y="178" text-anchor="middle">承担后果最难</text>

    <rect x="398" y="92" width="145" height="110" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="470" y="124" text-anchor="middle" font-size="19" font-weight="700">前提C</text>
    <text x="470" y="154" text-anchor="middle">没有失效条件</text>
    <text x="470" y="178" text-anchor="middle">亏损会被拖长</text>

    <rect x="578" y="92" width="145" height="110" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="650" y="124" text-anchor="middle" font-size="19" font-weight="700">前提D</text>
    <text x="650" y="154" text-anchor="middle">市场前提</text>
    <text x="650" y="178" text-anchor="middle">会改变</text>

    <line x1="184" y1="147" x2="214" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="364" y1="147" x2="394" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="544" y1="147" x2="574" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="135" y="258" width="530" height="78" rx="8" fill="#111827"/>
    <text x="400" y="292" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">所以：买入计划必须写在下单前</text>
    <text x="400" y="320" text-anchor="middle" font-size="16" fill="#e5e7eb">品种 + 理由 + 仓位 + 失效条件 + 退出动作</text>
    <line x1="400" y1="204" x2="400" y2="252" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
