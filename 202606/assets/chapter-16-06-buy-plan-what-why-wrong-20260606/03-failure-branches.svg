<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">前提变化后的买入分支</title>
  <desc id="desc">展示买入理由、仓位和失效条件不同状态下的动作分支。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">计划不合格时，动作要切换</text>
  <g font-family="Arial, sans-serif" fill="#111827">
    <rect x="310" y="76" width="180" height="58" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
    <text x="400" y="111" text-anchor="middle" font-size="19" font-weight="700">准备买入</text>

    <rect x="60" y="198" width="170" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="145" y="228" text-anchor="middle" font-size="18" font-weight="700">理由写不清</text>
    <text x="145" y="256" text-anchor="middle" font-size="15">转入观察清单</text>

    <rect x="290" y="198" width="180" height="82" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="380" y="228" text-anchor="middle" font-size="18" font-weight="700">仓位超上限</text>
    <text x="380" y="256" text-anchor="middle" font-size="15">先降金额或不买</text>

    <rect x="535" y="198" width="170" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="620" y="228" text-anchor="middle" font-size="18" font-weight="700">错了没方案</text>
    <text x="620" y="256" text-anchor="middle" font-size="15">禁止下单</text>

    <rect x="290" y="326" width="180" height="48" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="380" y="357" text-anchor="middle" font-size="18" font-weight="700">四项合格才买</text>

    <line x1="352" y1="136" x2="165" y2="194" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="136" x2="382" y2="194" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="448" y1="136" x2="600" y2="194" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="380" y1="282" x2="380" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
