<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">卖出计划的三件事</text>
  <text x="400" y="66" text-anchor="middle" font-size="15" fill="#475569">先写触发器，再写动作幅度，最后写复核时间</text>

  <rect x="60" y="112" width="190" height="170" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="95" cy="148" r="18" fill="#dbeafe"/>
  <text x="95" y="154" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">1</text>
  <text x="155" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">触发器</text>
  <text x="155" y="183" text-anchor="middle" font-size="14" fill="#475569">什么变化才卖</text>
  <text x="155" y="209" text-anchor="middle" font-size="14" fill="#475569">估值 / 趋势 / 仓位</text>
  <text x="155" y="235" text-anchor="middle" font-size="14" fill="#475569">逻辑 / 资金用途</text>

  <rect x="305" y="112" width="190" height="170" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="340" cy="148" r="18" fill="#dcfce7"/>
  <text x="340" y="154" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">2</text>
  <text x="400" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">动作幅度</text>
  <text x="400" y="183" text-anchor="middle" font-size="14" fill="#475569">卖多少才合适</text>
  <text x="400" y="209" text-anchor="middle" font-size="14" fill="#475569">减仓 / 清仓 / 观察仓</text>
  <text x="400" y="235" text-anchor="middle" font-size="14" fill="#475569">禁止临场加戏</text>

  <rect x="550" y="112" width="190" height="170" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="585" cy="148" r="18" fill="#fee2e2"/>
  <text x="585" y="154" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">3</text>
  <text x="645" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">复核时间</text>
  <text x="645" y="183" text-anchor="middle" font-size="14" fill="#475569">什么时候再判断</text>
  <text x="645" y="209" text-anchor="middle" font-size="14" fill="#475569">财报后 / 周复盘</text>
  <text x="645" y="235" text-anchor="middle" font-size="14" fill="#475569">不无限拖延</text>

  <path d="M250 197 H305" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M495 197 H550" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="170" y="320" width="460" height="42" rx="8" fill="#0f172a"/>
  <text x="400" y="347" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">没有这三项，卖出会变成情绪题</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
