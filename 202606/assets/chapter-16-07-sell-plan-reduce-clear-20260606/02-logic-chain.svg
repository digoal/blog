<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">卖出计划论证链</text>

  <rect x="42" y="82" width="158" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="121" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">前提A</text>
  <text x="121" y="139" text-anchor="middle" font-size="13" fill="#475569">卖出比买入更受情绪影响</text>

  <rect x="42" y="198" width="158" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="121" y="228" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">前提B</text>
  <text x="121" y="255" text-anchor="middle" font-size="13" fill="#475569">持仓风险来自计划失效</text>

  <rect x="42" y="314" width="158" height="54" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="121" y="347" text-anchor="middle" font-size="13" fill="#475569">前提C: 仓位会漂移</text>

  <path d="M200 125 H266" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M200 241 H266" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M200 341 C230 341 236 298 266 298" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="266" y="116" width="220" height="170" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="376" y="151" text-anchor="middle" font-size="18" font-weight="700" fill="#164e63">推导</text>
  <text x="376" y="184" text-anchor="middle" font-size="14" fill="#334155">因为情绪会拖延卖出</text>
  <text x="376" y="211" text-anchor="middle" font-size="14" fill="#334155">所以规则要写在下单前</text>
  <text x="376" y="238" text-anchor="middle" font-size="14" fill="#334155">因为风险类型不同</text>
  <text x="376" y="265" text-anchor="middle" font-size="14" fill="#334155">所以动作不能只有清仓</text>

  <path d="M486 201 H552" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="552" y="82" width="192" height="86" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="648" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">正常结论</text>
  <text x="648" y="139" text-anchor="middle" font-size="13" fill="#475569">触发器 + 幅度 + 时间</text>

  <rect x="552" y="198" width="192" height="86" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="648" y="228" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">对应操作</text>
  <text x="648" y="255" text-anchor="middle" font-size="13" fill="#475569">减仓、清仓、观察仓</text>

  <rect x="552" y="314" width="192" height="54" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="648" y="347" text-anchor="middle" font-size="13" fill="#475569">前提失效: 先降风险</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
