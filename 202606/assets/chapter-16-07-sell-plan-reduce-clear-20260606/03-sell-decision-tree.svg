<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">什么时候减仓，什么时候清仓</text>

  <rect x="280" y="70" width="240" height="58" rx="8" fill="#0f172a"/>
  <text x="400" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">卖出触发器出现了吗？</text>

  <path d="M400 128 V164" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="260" y="164" width="280" height="58" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="199" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">买入逻辑是否被证伪？</text>

  <path d="M260 193 H108 V258" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M540 193 H690 V258" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="177" y="184" text-anchor="middle" font-size="13" fill="#475569">没有</text>
  <text x="626" y="184" text-anchor="middle" font-size="13" fill="#475569">已经证伪</text>

  <rect x="42" y="258" width="216" height="88" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="150" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">检查估值 / 趋势 / 仓位</text>
  <text x="150" y="316" text-anchor="middle" font-size="13" fill="#475569">只是一条线超标</text>
  <text x="150" y="337" text-anchor="middle" font-size="13" fill="#475569">先分批减仓</text>

  <rect x="582" y="258" width="216" height="88" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="690" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">退出或降到观察仓</text>
  <text x="690" y="316" text-anchor="middle" font-size="13" fill="#475569">财报、规则、资金用途变了</text>
  <text x="690" y="337" text-anchor="middle" font-size="13" fill="#475569">不再用原理由持有</text>

  <path d="M150 346 V382" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="42" y="382" width="216" height="46" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="150" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">卖到计划仓位以内</text>

  <path d="M690 346 V382" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="582" y="382" width="216" height="46" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="690" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">卖到风险不影响账户</text>

  <rect x="308" y="272" width="184" height="94" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="303" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">三条线都没触发</text>
  <text x="400" y="331" text-anchor="middle" font-size="13" fill="#475569">不因为赚钱就乱卖</text>
  <text x="400" y="352" text-anchor="middle" font-size="13" fill="#475569">按复核日期继续观察</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
