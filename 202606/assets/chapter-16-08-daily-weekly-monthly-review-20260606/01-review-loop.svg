<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">复盘的三层循环</text>
  <g font-family="Arial, sans-serif" fill="#111827">
    <rect x="70" y="98" width="180" height="190" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="160" y="132" text-anchor="middle" font-size="20" font-weight="700">日复盘</text>
    <text x="160" y="166" text-anchor="middle" font-size="15">检查单笔动作</text>
    <text x="160" y="195" text-anchor="middle" font-size="15">计划是否清楚</text>
    <text x="160" y="224" text-anchor="middle" font-size="15">执行是否变形</text>
    <text x="160" y="253" text-anchor="middle" font-size="15">错因当日归位</text>

    <rect x="310" y="98" width="180" height="190" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="132" text-anchor="middle" font-size="20" font-weight="700">周复盘</text>
    <text x="400" y="166" text-anchor="middle" font-size="15">检查重复模式</text>
    <text x="400" y="195" text-anchor="middle" font-size="15">哪类交易有效</text>
    <text x="400" y="224" text-anchor="middle" font-size="15">哪类错误反复</text>
    <text x="400" y="253" text-anchor="middle" font-size="15">调整下周规则</text>

    <rect x="550" y="98" width="180" height="190" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="640" y="132" text-anchor="middle" font-size="20" font-weight="700">月复盘</text>
    <text x="640" y="166" text-anchor="middle" font-size="15">检查组合方向</text>
    <text x="640" y="195" text-anchor="middle" font-size="15">仓位是否漂移</text>
    <text x="640" y="224" text-anchor="middle" font-size="15">策略是否保留</text>
    <text x="640" y="253" text-anchor="middle" font-size="15">资金是否再分配</text>
  </g>
  <path d="M250 193 H300" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M300 193 l-12 -8 v16 z" fill="#64748b"/>
  <path d="M490 193 H540" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M540 193 l-12 -8 v16 z" fill="#64748b"/>
  <path d="M640 288 C640 350 160 350 160 288" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M160 288 l-8 12 h16 z" fill="#64748b"/>
  <text x="400" y="344" text-anchor="middle" font-size="16" fill="#334155" font-family="Arial, sans-serif">目标: 把交易样本变成下一次的规则, 而不是把盈亏写成流水账</text>
</svg>
