<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">复盘后的动作分支</text>
  <g font-family="Arial, sans-serif" fill="#111827" font-size="15">
    <rect x="290" y="70" width="220" height="58" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="105" text-anchor="middle" font-size="17">这笔交易是否有计划?</text>

    <path d="M330 128 V168 H170" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M170 168 l12 -8 v16 z" fill="#64748b"/>
    <path d="M470 128 V168 H630" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M630 168 l-12 -8 v16 z" fill="#64748b"/>

    <rect x="65" y="150" width="210" height="64" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="170" y="176" text-anchor="middle" font-size="17">没有计划</text>
    <text x="170" y="200" text-anchor="middle">归入冲动样本</text>

    <rect x="525" y="150" width="210" height="64" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="630" y="176" text-anchor="middle" font-size="17">有计划</text>
    <text x="630" y="200" text-anchor="middle">继续检查执行</text>

    <path d="M630 214 V252" stroke="#64748b" stroke-width="3"/>
    <path d="M630 252 l-9 -12 h18 z" fill="#64748b"/>
    <rect x="525" y="252" width="210" height="64" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="630" y="278" text-anchor="middle" font-size="17">是否按规则执行?</text>
    <text x="630" y="302" text-anchor="middle">买卖点与仓位对照</text>

    <path d="M525 284 H430 V352" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M430 352 l-9 -12 h18 z" fill="#64748b"/>
    <rect x="315" y="352" width="230" height="54" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="430" y="385" text-anchor="middle">执行变形: 下周改红线</text>

    <path d="M735 284 H760 V352 H625" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M625 352 l12 -8 v16 z" fill="#64748b"/>
    <rect x="590" y="352" width="205" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="692" y="385" text-anchor="middle">执行合格: 进入策略库</text>

    <path d="M170 214 V352 H260" stroke="#64748b" stroke-width="3" fill="none"/>
    <path d="M260 352 l-12 -8 v16 z" fill="#64748b"/>
    <rect x="45" y="352" width="215" height="54" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="152" y="385" text-anchor="middle">冲动样本: 禁止复制</text>
  </g>
