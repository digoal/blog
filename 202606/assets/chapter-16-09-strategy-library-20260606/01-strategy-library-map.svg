<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">策略库不是收藏夹，而是决策档案</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#475569">每个策略先写成卡片，再按证据分层管理</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="48" y="96" width="176" height="214" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="136" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">待验证</text>
  <text x="136" y="158" text-anchor="middle" font-size="14" fill="#334155">逻辑看得懂</text>
  <text x="136" y="182" text-anchor="middle" font-size="14" fill="#334155">样本还不够</text>
  <text x="136" y="206" text-anchor="middle" font-size="14" fill="#334155">只能小仓位试跑</text>
  <line x1="78" y1="232" x2="194" y2="232" stroke="#cbd5e1"/>
  <text x="136" y="260" text-anchor="middle" font-size="13" fill="#64748b">记录前提</text>
  <text x="136" y="282" text-anchor="middle" font-size="13" fill="#64748b">记录成本</text>

  <rect x="312" y="96" width="176" height="214" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">有效</text>
  <text x="400" y="158" text-anchor="middle" font-size="14" fill="#334155">前提稳定</text>
  <text x="400" y="182" text-anchor="middle" font-size="14" fill="#334155">执行可重复</text>
  <text x="400" y="206" text-anchor="middle" font-size="14" fill="#334155">扣成本后仍合格</text>
  <line x1="342" y1="232" x2="458" y2="232" stroke="#cbd5e1"/>
  <text x="400" y="260" text-anchor="middle" font-size="13" fill="#64748b">允许纳入常规</text>
  <text x="400" y="282" text-anchor="middle" font-size="13" fill="#64748b">但仍有仓位上限</text>

  <rect x="576" y="96" width="176" height="214" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="664" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">失效</text>
  <text x="664" y="158" text-anchor="middle" font-size="14" fill="#334155">前提被破坏</text>
  <text x="664" y="182" text-anchor="middle" font-size="14" fill="#334155">成本吃掉优势</text>
  <text x="664" y="206" text-anchor="middle" font-size="14" fill="#334155">情绪无法执行</text>
  <line x1="606" y1="232" x2="722" y2="232" stroke="#cbd5e1"/>
  <text x="664" y="260" text-anchor="middle" font-size="13" fill="#64748b">进入红线样本</text>
  <text x="664" y="282" text-anchor="middle" font-size="13" fill="#64748b">重写后才可再测</text>

  <path d="M224 200 L304 200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M488 200 L568 200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 312 C400 352 136 352 136 314" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <text x="400" y="356" text-anchor="middle" font-size="13" fill="#475569">前提变化时，有效策略要降回待验证</text>
</svg>
