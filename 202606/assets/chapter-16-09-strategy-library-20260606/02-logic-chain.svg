<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">从一次盈亏到策略分级的论证链</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="38" y="78" width="164" height="86" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提A</text>
  <text x="120" y="134" text-anchor="middle" font-size="14" fill="#334155">一次赚钱</text>
  <text x="120" y="154" text-anchor="middle" font-size="14" fill="#334155">不能证明有效</text>

  <rect x="222" y="78" width="164" height="86" rx="9" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="304" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提B</text>
  <text x="304" y="134" text-anchor="middle" font-size="14" fill="#334155">策略依赖前提</text>
  <text x="304" y="154" text-anchor="middle" font-size="14" fill="#334155">环境会改变</text>

  <rect x="406" y="78" width="164" height="86" rx="9" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="488" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提C</text>
  <text x="488" y="134" text-anchor="middle" font-size="14" fill="#334155">成本和执行</text>
  <text x="488" y="154" text-anchor="middle" font-size="14" fill="#334155">会吃掉优势</text>

  <rect x="590" y="78" width="164" height="86" rx="9" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="672" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">前提D</text>
  <text x="672" y="134" text-anchor="middle" font-size="14" fill="#334155">人会记住胜利</text>
  <text x="672" y="154" text-anchor="middle" font-size="14" fill="#334155">忘掉错误</text>

  <path d="M120 174 L120 222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M304 174 L304 222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M488 174 L488 222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M672 174 L672 222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="74" y="226" width="652" height="76" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">因为记忆会美化策略，所以必须用记录替代感觉</text>
  <text x="400" y="284" text-anchor="middle" font-size="15" fill="#334155">前提、样本、收益、回撤、费用、执行偏差，都要写进同一张策略卡</text>

  <path d="M400 306 L400 340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="344" width="620" height="58" rx="10" fill="#0f172a"/>
  <text x="400" y="368" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">结论：策略只分三层，有效、待验证、失效</text>
  <text x="400" y="391" text-anchor="middle" font-size="14" fill="#cbd5e1">有效才能常规使用，待验证只能小仓位试跑，失效进入红线样本</text>
</svg>
