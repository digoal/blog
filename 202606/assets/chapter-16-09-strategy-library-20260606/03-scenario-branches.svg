<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">策略库的升级、降级与淘汰</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="310" y="72" width="180" height="64" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">新策略卡</text>
  <text x="400" y="120" text-anchor="middle" font-size="13" fill="#475569">先默认待验证</text>

  <path d="M400 138 L400 174" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="278" y="178" width="244" height="62" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">验证期结束</text>
  <text x="400" y="224" text-anchor="middle" font-size="13" fill="#475569">看前提、结果、成本、执行</text>

  <path d="M278 210 L154 270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 242 L400 274" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M522 210 L646 270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="54" y="274" width="200" height="82" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="154" y="304" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">证据过关</text>
  <text x="154" y="328" text-anchor="middle" font-size="13" fill="#334155">升级为有效</text>
  <text x="154" y="348" text-anchor="middle" font-size="13" fill="#334155">但保留仓位上限</text>

  <rect x="300" y="274" width="200" height="82" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="304" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">证据不足</text>
  <text x="400" y="328" text-anchor="middle" font-size="13" fill="#334155">继续待验证</text>
  <text x="400" y="348" text-anchor="middle" font-size="13" fill="#334155">不加仓，不扩大</text>

  <rect x="546" y="274" width="200" height="82" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="646" y="304" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">前提破坏</text>
  <text x="646" y="328" text-anchor="middle" font-size="13" fill="#334155">降级为失效</text>
  <text x="646" y="348" text-anchor="middle" font-size="13" fill="#334155">停止复制交易</text>

  <path d="M154 358 C154 394 400 396 400 358" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <text x="400" y="400" text-anchor="middle" font-size="13" fill="#475569">有效策略遇到新环境，也要重新验证</text>
</svg>
