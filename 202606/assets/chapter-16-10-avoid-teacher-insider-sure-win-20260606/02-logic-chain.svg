<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">远离带单与稳赚的论证链</text>
  <rect x="35" y="92" width="145" height="82" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="108" y="122" text-anchor="middle" font-size="18" fill="#1e3a8a" font-family="Arial, sans-serif">前提A</text>
  <text x="108" y="148" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">投资咨询</text>
  <text x="108" y="168" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">需要资质</text>
  <rect x="235" y="92" width="145" height="82" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="308" y="122" text-anchor="middle" font-size="18" fill="#1e3a8a" font-family="Arial, sans-serif">前提B</text>
  <text x="308" y="148" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">市场没有</text>
  <text x="308" y="168" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">稳定稳赚</text>
  <rect x="435" y="92" width="145" height="82" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="508" y="122" text-anchor="middle" font-size="18" fill="#1e3a8a" font-family="Arial, sans-serif">前提C</text>
  <text x="508" y="148" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">骗子制造</text>
  <text x="508" y="168" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">紧迫和贪念</text>
  <rect x="635" y="92" width="130" height="82" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="700" y="122" text-anchor="middle" font-size="18" fill="#1e3a8a" font-family="Arial, sans-serif">前提D</text>
  <text x="700" y="148" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">离开监管</text>
  <text x="700" y="168" text-anchor="middle" font-size="14" fill="#334155" font-family="Arial, sans-serif">追偿变难</text>
  <path d="M180 133 L227 133" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M380 133 L427 133" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M580 133 L627 133" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="130" y="235" width="250" height="76" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="255" y="265" text-anchor="middle" font-size="18" fill="#9a3412" font-family="Arial, sans-serif">推导</text>
  <text x="255" y="291" text-anchor="middle" font-size="15" fill="#7c2d12" font-family="Arial, sans-serif">承诺越确定，越该先验真假</text>
  <rect x="430" y="235" width="240" height="76" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="550" y="265" text-anchor="middle" font-size="18" fill="#047857" font-family="Arial, sans-serif">结论</text>
  <text x="550" y="291" text-anchor="middle" font-size="15" fill="#065f46" font-family="Arial, sans-serif">三不原则：不入群、不转账、不跟单</text>
  <path d="M400 185 C360 205 310 220 255 232" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M382 273 L422 273" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="218" y="346" width="364" height="44" rx="8" fill="#111827"/>
  <text x="400" y="374" text-anchor="middle" font-size="17" fill="#ffffff" font-family="Arial, sans-serif">先验资质、再验账户、最后才看观点</text>
  <path d="M550 312 C520 334 468 344 400 346" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
