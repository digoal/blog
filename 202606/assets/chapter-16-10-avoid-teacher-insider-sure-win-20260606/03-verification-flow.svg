<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" fill="#111827" font-family="Arial, sans-serif">遇到荐股和带单时的三步核验</text>
  <rect x="80" y="85" width="640" height="64" rx="9" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="124" text-anchor="middle" font-size="18" fill="#111827" font-family="Arial, sans-serif">有人说：进群、付费、下载APP、跟老师买、保证收益</text>
  <path d="M400 150 L400 185" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="120" y="190" width="180" height="72" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="210" y="219" text-anchor="middle" font-size="18" fill="#1d4ed8" font-family="Arial, sans-serif">1. 验资质</text>
  <text x="210" y="246" text-anchor="middle" font-size="14" fill="#1e3a8a" font-family="Arial, sans-serif">机构和人员能否查到</text>
  <rect x="310" y="190" width="180" height="72" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="400" y="219" text-anchor="middle" font-size="18" fill="#047857" font-family="Arial, sans-serif">2. 验账户</text>
  <text x="400" y="246" text-anchor="middle" font-size="14" fill="#065f46" font-family="Arial, sans-serif">是否正规平台开户</text>
  <rect x="500" y="190" width="180" height="72" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="590" y="219" text-anchor="middle" font-size="18" fill="#9a3412" font-family="Arial, sans-serif">3. 验承诺</text>
  <text x="590" y="246" text-anchor="middle" font-size="14" fill="#7c2d12" font-family="Arial, sans-serif">是否承诺稳赚保本</text>
  <path d="M210 264 L310 315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 264 L400 306" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M590 264 L490 315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="120" y="325" width="250" height="62" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="245" y="351" text-anchor="middle" font-size="18" fill="#b91c1c" font-family="Arial, sans-serif">任一项不通过</text>
  <text x="245" y="375" text-anchor="middle" font-size="15" fill="#7f1d1d" font-family="Arial, sans-serif">停止沟通，保留证据，不转钱</text>
  <rect x="430" y="325" width="250" height="62" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="555" y="351" text-anchor="middle" font-size="18" fill="#15803d" font-family="Arial, sans-serif">三项都通过</text>
  <text x="555" y="375" text-anchor="middle" font-size="15" fill="#166534" font-family="Arial, sans-serif">仍按自己的买入计划小仓位验证</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
