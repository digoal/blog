<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">停止交易论证链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g fill="#eff6ff" stroke="#3b82f6" stroke-width="2">
    <rect x="35" y="92" width="170" height="92" rx="8"/>
    <rect x="225" y="92" width="170" height="92" rx="8"/>
    <rect x="415" y="92" width="170" height="92" rx="8"/>
    <rect x="605" y="92" width="160" height="92" rx="8"/>
  </g>

  <text x="120" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 A</text>
  <text x="120" y="152" text-anchor="middle" font-size="14" fill="#1f2937">情绪会降低判断质量</text>
  <text x="310" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 B</text>
  <text x="310" y="152" text-anchor="middle" font-size="14" fill="#1f2937">连续亏损说明边界失效</text>
  <text x="500" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 C</text>
  <text x="500" y="152" text-anchor="middle" font-size="14" fill="#1f2937">看不懂就无法定价风险</text>
  <text x="685" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 D</text>
  <text x="685" y="152" text-anchor="middle" font-size="14" fill="#1f2937">频繁交易有成本劣势</text>

  <line x1="207" y1="138" x2="219" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="397" y1="138" x2="409" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="587" y1="138" x2="599" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="105" y="238" width="590" height="82" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">推导</text>
  <text x="400" y="296" text-anchor="middle" font-size="15" fill="#1f2937">因为判断质量下降且成本劣势上升，所以继续下单会把一次亏损放大成系统亏损</text>
  <line x1="400" y1="188" x2="400" y2="232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="105" y="360" width="590" height="54" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="394" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">结论：触发红灯时先停手，复盘通过后才恢复交易</text>
  <line x1="400" y1="324" x2="400" y2="354" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
