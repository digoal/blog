<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">三种停手信号</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="285" y="82" width="230" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="111" text-anchor="middle" font-size="18" font-weight="700" fill="#075985">准备下单前</text>
  <text x="400" y="136" text-anchor="middle" font-size="14" fill="#1f2937">先问是否触发红灯</text>

  <rect x="40" y="230" width="210" height="120" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="145" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">情绪失控</text>
  <text x="145" y="288" text-anchor="middle" font-size="14" fill="#1f2937">想翻本、想证明自己</text>
  <text x="145" y="312" text-anchor="middle" font-size="14" fill="#1f2937">当天停止新增交易</text>

  <rect x="295" y="230" width="210" height="120" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">连续亏损</text>
  <text x="400" y="288" text-anchor="middle" font-size="14" fill="#1f2937">3笔错或回撤达预算80%</text>
  <text x="400" y="312" text-anchor="middle" font-size="14" fill="#1f2937">暂停进攻仓，写复盘</text>

  <rect x="550" y="230" width="210" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="655" y="260" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">看不懂市场</text>
  <text x="655" y="288" text-anchor="middle" font-size="14" fill="#1f2937">解释不了上涨或下跌</text>
  <text x="655" y="312" text-anchor="middle" font-size="14" fill="#1f2937">只保留计划内动作</text>

  <line x1="370" y1="156" x2="150" y2="224" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="156" x2="400" y2="224" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="430" y1="156" x2="650" y2="224" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="190" y="382" width="420" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="406" text-anchor="middle" font-size="15" fill="#334155">停手不是放弃机会，而是暂停在低质量状态下承担新风险</text>
</svg>
