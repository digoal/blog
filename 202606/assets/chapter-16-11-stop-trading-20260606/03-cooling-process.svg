<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">48小时冷却流程</text>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g>
    <rect x="38" y="98" width="155" height="96" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="116" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">0小时</text>
    <text x="116" y="156" text-anchor="middle" font-size="14" fill="#1f2937">撤销新单</text>
    <text x="116" y="178" text-anchor="middle" font-size="14" fill="#1f2937">不补仓不加码</text>
  </g>
  <g>
    <rect x="227" y="98" width="155" height="96" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="305" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">24小时</text>
    <text x="305" y="156" text-anchor="middle" font-size="14" fill="#1f2937">写亏损来源</text>
    <text x="305" y="178" text-anchor="middle" font-size="14" fill="#1f2937">分市场错和自己错</text>
  </g>
  <g>
    <rect x="416" y="98" width="155" height="96" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="494" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">48小时</text>
    <text x="494" y="156" text-anchor="middle" font-size="14" fill="#1f2937">重做计划</text>
    <text x="494" y="178" text-anchor="middle" font-size="14" fill="#1f2937">写失效条件</text>
  </g>
  <g>
    <rect x="605" y="98" width="155" height="96" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="683" y="128" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">恢复</text>
    <text x="683" y="156" text-anchor="middle" font-size="14" fill="#1f2937">只用半仓试错</text>
    <text x="683" y="178" text-anchor="middle" font-size="14" fill="#1f2937">连续两次复盘通过</text>
  </g>

  <line x1="195" y1="146" x2="221" y2="146" stroke="#64748b" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="384" y1="146" x2="410" y2="146" stroke="#64748b" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="573" y1="146" x2="599" y2="146" stroke="#64748b" stroke-width="2" marker-end="url(#arrow3)"/>

  <rect x="90" y="260" width="620" height="104" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="292" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">恢复交易的三个条件</text>
  <text x="400" y="322" text-anchor="middle" font-size="15" fill="#1f2937">1. 能用一句话解释风险来源  2. 仓位回到上限内  3. 错了怎么办已经写清</text>
  <text x="400" y="346" text-anchor="middle" font-size="15" fill="#1f2937">任一条件不满足，继续观察，不新增风险仓</text>
</svg>
