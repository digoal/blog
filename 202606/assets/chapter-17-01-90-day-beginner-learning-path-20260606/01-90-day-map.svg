<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">刚入门的90天学习路径</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" fill="#475569">目标不是90天赚大钱，而是90天后能用规则保护本金</text>

  <line x1="105" y1="155" x2="695" y2="155" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <circle cx="125" cy="155" r="18" fill="#2563eb"/>
  <circle cx="335" cy="155" r="18" fill="#0f766e"/>
  <circle cx="545" cy="155" r="18" fill="#ca8a04"/>
  <circle cx="675" cy="155" r="18" fill="#dc2626"/>
  <text x="125" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">0</text>
  <text x="335" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">30</text>
  <text x="545" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">60</text>
  <text x="675" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">90</text>

  <rect x="60" y="205" width="190" height="145" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="155" y="232" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">第1关: 认知关</text>
  <text x="85" y="265" font-size="14" fill="#1e293b">学什么风险</text>
  <text x="85" y="292" font-size="14" fill="#1e293b">看懂产品规则</text>
  <text x="85" y="319" font-size="14" fill="#1e293b">不急着下重仓</text>
  <text x="85" y="345" font-size="12" fill="#64748b">输出: 风险地图 + 禁买清单</text>

  <rect x="305" y="205" width="190" height="145" rx="8" fill="#ecfdf5" stroke="#99f6e4"/>
  <text x="400" y="232" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">第2关: 规则关</text>
  <text x="330" y="265" font-size="14" fill="#1e293b">账户分三层</text>
  <text x="330" y="292" font-size="14" fill="#1e293b">写仓位上限</text>
  <text x="330" y="319" font-size="14" fill="#1e293b">写买卖条件</text>
  <text x="330" y="345" font-size="12" fill="#64748b">输出: 组合模板 + 交易计划</text>

  <rect x="550" y="205" width="190" height="145" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="645" y="232" text-anchor="middle" font-size="18" font-weight="700" fill="#a16207">第3关: 试运行</text>
  <text x="575" y="265" font-size="14" fill="#1e293b">小仓真实执行</text>
  <text x="575" y="292" font-size="14" fill="#1e293b">记录每次错误</text>
  <text x="575" y="319" font-size="14" fill="#1e293b">通过后再扩仓</text>
  <text x="575" y="345" font-size="12" fill="#64748b">输出: 复盘表 + 下季计划</text>

  <text x="125" y="117" text-anchor="middle" font-size="13" fill="#334155">开户</text>
  <text x="335" y="117" text-anchor="middle" font-size="13" fill="#334155">能解释风险</text>
  <text x="545" y="117" text-anchor="middle" font-size="13" fill="#334155">能写计划</text>
  <text x="675" y="117" text-anchor="middle" font-size="13" fill="#334155">能复盘执行</text>
</svg>
