<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">90天路径的论证链</text>
  <text x="400" y="60" text-anchor="middle" font-size="14" fill="#64748b">入口低 + 知识缺口 + 主动交易难 = 先训练系统，再扩大仓位</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="55" y="92" width="170" height="92" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="140" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="75" y="148" font-size="13" fill="#1f2937">开户很容易</text>
  <text x="75" y="170" font-size="13" fill="#1f2937">产品却很复杂</text>

  <rect x="315" y="92" width="170" height="92" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="400" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提B</text>
  <text x="335" y="148" font-size="13" fill="#1f2937">知识和防骗能力</text>
  <text x="335" y="170" font-size="13" fill="#1f2937">常常跟不上交易冲动</text>

  <rect x="575" y="92" width="170" height="92" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="660" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#a16207">前提C</text>
  <text x="595" y="148" font-size="13" fill="#1f2937">频繁交易和主动选股</text>
  <text x="595" y="170" font-size="13" fill="#1f2937">长期胜率并不友好</text>

  <line x1="225" y1="138" x2="315" y2="138" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="485" y1="138" x2="575" y2="138" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="170" y="235" width="460" height="84" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="400" y="264" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">推导</text>
  <text x="195" y="292" font-size="14" fill="#334155">因为还没看懂风险，所以先不追收益。</text>
  <text x="195" y="314" font-size="14" fill="#334155">因为主动交易难，所以先用规则和小仓位验证自己。</text>

  <line x1="400" y1="184" x2="400" y2="235" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="185" y="355" width="430" height="48" rx="24" fill="#0f766e"/>
  <text x="400" y="384" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">结论: 90天先过认知关、规则关、试运行关</text>
  <line x1="400" y1="319" x2="400" y2="355" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
