<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">前提变化后的路径分支</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="285" y="76" width="230" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="111" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">第30天检查: 能否解释风险?</text>

  <line x1="400" y1="134" x2="190" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="134" x2="400" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="400" y1="134" x2="610" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="55" y="190" width="230" height="92" rx="8" fill="#fee2e2" stroke="#fecaca"/>
  <text x="170" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">说不清</text>
  <text x="78" y="248" font-size="13" fill="#1f2937">继续学习30天</text>
  <text x="78" y="270" font-size="13" fill="#1f2937">只做模拟和观察清单</text>

  <rect x="285" y="190" width="230" height="92" rx="8" fill="#ecfdf5" stroke="#99f6e4"/>
  <text x="400" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">说得清</text>
  <text x="308" y="248" font-size="13" fill="#1f2937">进入规则关</text>
  <text x="308" y="270" font-size="13" fill="#1f2937">写仓位、买入、卖出条件</text>

  <rect x="515" y="190" width="230" height="92" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="630" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#a16207">市场很热</text>
  <text x="538" y="248" font-size="13" fill="#1f2937">不加速路径</text>
  <text x="538" y="270" font-size="13" fill="#1f2937">先防追涨和重仓冲动</text>

  <line x1="400" y1="282" x2="400" y2="328" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="250" y="328" width="300" height="72" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="357" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">第90天检查</text>
  <text x="285" y="384" font-size="13" fill="#334155">有复盘、无红线、能按计划亏小钱，才扩大仓位</text>
</svg>
