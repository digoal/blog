<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">少量资金先买ETF的核心原因</title>
  <desc id="desc">展示少量资金买个股和买ETF的差异。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">少量资金的第一课：先买一篮子，再研究一家公司</text>
  <rect x="52" y="88" width="300" height="248" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <rect x="448" y="88" width="300" height="248" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="202" y="126" text-anchor="middle" font-size="21" font-weight="700" fill="#991b1b">少量资金直接买个股</text>
  <text x="598" y="126" text-anchor="middle" font-size="21" font-weight="700" fill="#1d4ed8">少量资金先买ETF</text>
  <circle cx="202" cy="184" r="42" fill="#fee2e2" stroke="#ef4444"/>
  <text x="202" y="178" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">一家</text>
  <text x="202" y="204" text-anchor="middle" font-size="15" fill="#7f1d1d">公司风险</text>
  <g fill="#dbeafe" stroke="#2563eb">
    <circle cx="545" cy="166" r="22"/>
    <circle cx="598" cy="166" r="22"/>
    <circle cx="651" cy="166" r="22"/>
    <circle cx="572" cy="213" r="22"/>
    <circle cx="625" cy="213" r="22"/>
  </g>
  <text x="598" y="193" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">一篮子</text>
  <text x="202" y="268" text-anchor="middle" font-size="16" fill="#374151">判断链长：财报、估值、行业、管理层</text>
  <text x="202" y="300" text-anchor="middle" font-size="16" fill="#374151">仓位容易集中：错一家公司就伤账户</text>
  <text x="598" y="268" text-anchor="middle" font-size="16" fill="#374151">判断链短：先看指数和交易外壳</text>
  <text x="598" y="300" text-anchor="middle" font-size="16" fill="#374151">风险分散：仍会跌，但不押一家</text>
  <path d="M368 208 H432" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
