<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">少量资金ETF优先论证链</title>
  <desc id="desc">展示前提、推导、结论的因果路径。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">论证链：钱越少，越要先降低犯错成本</text>
  <g font-size="15" fill="#111827">
    <rect x="34" y="78" width="168" height="96" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="118" y="108" text-anchor="middle" font-weight="700">前提A</text>
    <text x="118" y="136" text-anchor="middle">少量资金容错率低</text>
    <text x="118" y="160" text-anchor="middle">一次重仓错配很痛</text>
    <rect x="226" y="78" width="168" height="96" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="310" y="108" text-anchor="middle" font-weight="700">前提B</text>
    <text x="310" y="136" text-anchor="middle">个股风险集中</text>
    <text x="310" y="160" text-anchor="middle">赢家分布很偏</text>
    <rect x="418" y="78" width="168" height="96" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="502" y="108" text-anchor="middle" font-weight="700">前提C</text>
    <text x="502" y="136" text-anchor="middle">ETF提供一篮子</text>
    <text x="502" y="160" text-anchor="middle">但仍有市场风险</text>
    <rect x="610" y="78" width="156" height="96" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="688" y="108" text-anchor="middle" font-weight="700">前提D</text>
    <text x="688" y="136" text-anchor="middle">主动跑赢很难</text>
    <text x="688" y="160" text-anchor="middle">专业者也常输</text>
  </g>
  <path d="M118 190 V232 H310" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M310 190 V232" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M502 190 V232 H310" fill="none" stroke="#64748b" stroke-width="3"/>
  <path d="M688 190 V232 H502" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="166" y="232" width="468" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">因为容错低 + 个股集中 + ETF可分散</text>
  <text x="400" y="287" text-anchor="middle" font-size="16" fill="#374151">所以少量资金先用宽基ETF做核心学习仓</text>
  <path d="M400 302 V332" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="208" y="332" width="384" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="360" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">结论：ETF优先，个股后置，小仓位验证</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
