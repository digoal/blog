<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">少量资金场景切换</title>
  <desc id="desc">展示不同前提下ETF和个股的操作切换。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">前提一变，动作就要切换</text>
  <rect x="270" y="72" width="260" height="58" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">这笔钱是什么钱？</text>
  <path d="M400 130 V160" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="74" y="166" width="190" height="76" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="169" y="195" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">短期要用</text>
  <text x="169" y="222" text-anchor="middle" font-size="15" fill="#374151">不进股票ETF和个股</text>
  <rect x="305" y="166" width="190" height="76" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="195" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">长期学习仓</text>
  <text x="400" y="222" text-anchor="middle" font-size="15" fill="#374151">宽基ETF优先</text>
  <rect x="536" y="166" width="190" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="631" y="195" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">研究能力达标</text>
  <text x="631" y="222" text-anchor="middle" font-size="15" fill="#374151">个股小比例验证</text>
  <path d="M400 130 C330 155,240 158,169 166" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 130 C470 155,560 158,631 166" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="74" y="286" width="190" height="72" rx="8" fill="#fff" stroke="#ef4444"/>
  <text x="169" y="315" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">动作</text>
  <text x="169" y="340" text-anchor="middle" font-size="15" fill="#374151">现金管理、短债优先</text>
  <rect x="305" y="286" width="190" height="72" rx="8" fill="#fff" stroke="#2563eb"/>
  <text x="400" y="315" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">动作</text>
  <text x="400" y="340" text-anchor="middle" font-size="15" fill="#374151">分批买，先做组合底座</text>
  <rect x="536" y="286" width="190" height="72" rx="8" fill="#fff" stroke="#16a34a"/>
  <text x="631" y="315" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">动作</text>
  <text x="631" y="340" text-anchor="middle" font-size="15" fill="#374151">单票有上限和失效条件</text>
  <path d="M169 242 V286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 242 V286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M631 242 V286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
