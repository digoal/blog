<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; fill: #475569; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .warn { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; }
      .ok { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 10; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="40" y="45" class="title">踏空焦虑的交易回路</text>
  <text x="40" y="75" class="small">牛市真正危险的不是少赚一点，而是让情绪替你一次性改仓位。</text>

  <rect x="45" y="120" width="150" height="78" class="box"/>
  <text x="120" y="152" text-anchor="middle" class="label">指数连续上涨</text>
  <text x="120" y="177" text-anchor="middle" class="small">价格先刺激注意力</text>

  <rect x="245" y="120" width="150" height="78" class="box"/>
  <text x="320" y="152" text-anchor="middle" class="label">社群开始刷屏</text>
  <text x="320" y="177" text-anchor="middle" class="small">别人赚钱变成压力</text>

  <rect x="445" y="120" width="150" height="78" class="warn"/>
  <text x="520" y="152" text-anchor="middle" class="label">害怕买晚</text>
  <text x="520" y="177" text-anchor="middle" class="small">把机会误读成倒计时</text>

  <rect x="605" y="245" width="150" height="78" class="warn"/>
  <text x="680" y="277" text-anchor="middle" class="label">追高重仓</text>
  <text x="680" y="302" text-anchor="middle" class="small">仓位超过承受力</text>

  <rect x="365" y="245" width="150" height="78" class="warn"/>
  <text x="440" y="277" text-anchor="middle" class="label">回撤后后悔</text>
  <text x="440" y="302" text-anchor="middle" class="small">不敢补也不敢止损</text>

  <rect x="85" y="245" width="180" height="78" class="ok"/>
  <text x="175" y="277" text-anchor="middle" class="label">用规则断开</text>
  <text x="175" y="302" text-anchor="middle" class="small">底仓、阶梯、上限</text>

  <path d="M195 159 H235" class="line"/>
  <path d="M395 159 H435" class="line"/>
  <path d="M595 159 C660 165 690 190 690 235" class="line"/>
  <path d="M605 284 H525" class="line"/>
  <path d="M365 284 H275" class="line"/>
  <path d="M175 245 C175 220 155 205 125 198" class="line"/>
</svg>
