<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111827; }
      .title { font-size: 25px; font-weight: 700; }
      .head { font-size: 17px; font-weight: 700; }
      .small { font-size: 13px; fill: #475569; }
      .premise { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 10; }
      .logic { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .result { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 10; }
      .risk { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="40" y="42" class="title">牛市踏空焦虑的论证链</text>

  <rect x="42" y="85" width="160" height="82" class="premise"/>
  <text x="122" y="113" text-anchor="middle" class="head">前提A</text>
  <text x="122" y="139" text-anchor="middle" class="small">牛市只能事后确认</text>
  <text x="122" y="158" text-anchor="middle" class="small">早期像反弹</text>

  <rect x="232" y="85" width="160" height="82" class="premise"/>
  <text x="312" y="113" text-anchor="middle" class="head">前提B</text>
  <text x="312" y="139" text-anchor="middle" class="small">完全空仓会错过</text>
  <text x="312" y="158" text-anchor="middle" class="small">核心上涨日</text>

  <rect x="422" y="85" width="160" height="82" class="premise"/>
  <text x="502" y="113" text-anchor="middle" class="head">前提C</text>
  <text x="502" y="139" text-anchor="middle" class="small">追涨满仓会放大</text>
  <text x="502" y="158" text-anchor="middle" class="small">回撤和后悔</text>

  <rect x="612" y="85" width="146" height="82" class="premise"/>
  <text x="685" y="113" text-anchor="middle" class="head">前提D</text>
  <text x="685" y="139" text-anchor="middle" class="small">ETF和分批能降低</text>
  <text x="685" y="158" text-anchor="middle" class="small">选错和时点风险</text>

  <path d="M122 167 V205" class="line"/>
  <path d="M312 167 V205" class="line"/>
  <path d="M502 167 V205" class="line"/>
  <path d="M685 167 V205" class="line"/>

  <rect x="80" y="210" width="290" height="72" class="logic"/>
  <text x="225" y="239" text-anchor="middle" class="head">推导1：不能等到所有人都承认牛市</text>
  <text x="225" y="263" text-anchor="middle" class="small">确认太晚，往往已经付出更高价格</text>

  <rect x="430" y="210" width="290" height="72" class="risk"/>
  <text x="575" y="239" text-anchor="middle" class="head">推导2：也不能用焦虑一次买满</text>
  <text x="575" y="263" text-anchor="middle" class="small">仓位先失控，后面再谈判断已经晚了</text>

  <path d="M370 246 H420" class="line"/>
  <path d="M400 282 V316" class="line"/>

  <rect x="155" y="318" width="490" height="58" class="result"/>
  <text x="400" y="345" text-anchor="middle" class="head">结论：用底仓参与，用信号加仓，用上限防追高</text>
  <text x="400" y="367" text-anchor="middle" class="small">先解决能不能在场，再解决能加多少，最后解决错了怎么退</text>
</svg>
