<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111827; }
      .title { font-size: 25px; font-weight: 700; }
      .head { font-size: 18px; font-weight: 700; }
      .small { font-size: 13px; fill: #475569; }
      .step { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .buy { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 10; }
      .stop { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 10; }
      .watch { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 10; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="40" y="42" class="title">牛市来了的三段式动作图</text>
  <text x="40" y="70" class="small">每一步只回答一个问题：在不在场、加不加仓、要不要停手。</text>

  <rect x="50" y="105" width="170" height="82" class="step"/>
  <text x="135" y="134" text-anchor="middle" class="head">第一段：定上限</text>
  <text x="135" y="158" text-anchor="middle" class="small">权益仓最高多少</text>
  <text x="135" y="176" text-anchor="middle" class="small">跌多少还能睡着</text>

  <rect x="315" y="105" width="170" height="82" class="buy"/>
  <text x="400" y="134" text-anchor="middle" class="head">第二段：建底仓</text>
  <text x="400" y="158" text-anchor="middle" class="small">宽基ETF优先</text>
  <text x="400" y="176" text-anchor="middle" class="small">用计划而非盘感</text>

  <rect x="580" y="105" width="170" height="82" class="buy"/>
  <text x="665" y="134" text-anchor="middle" class="head">第三段：阶梯加</text>
  <text x="665" y="158" text-anchor="middle" class="small">信号确认一次</text>
  <text x="665" y="176" text-anchor="middle" class="small">只加一格仓位</text>

  <path d="M220 146 H305" class="line"/>
  <path d="M485 146 H570" class="line"/>

  <rect x="110" y="250" width="170" height="82" class="watch"/>
  <text x="195" y="279" text-anchor="middle" class="head">溢价过高</text>
  <text x="195" y="303" text-anchor="middle" class="small">跨境ETF和主题ETF</text>
  <text x="195" y="321" text-anchor="middle" class="small">先等不追</text>

  <rect x="315" y="250" width="170" height="82" class="stop"/>
  <text x="400" y="279" text-anchor="middle" class="head">仓位超线</text>
  <text x="400" y="303" text-anchor="middle" class="small">停止加仓</text>
  <text x="400" y="321" text-anchor="middle" class="small">必要时减回计划</text>

  <rect x="520" y="250" width="170" height="82" class="stop"/>
  <text x="605" y="279" text-anchor="middle" class="head">前提失效</text>
  <text x="605" y="303" text-anchor="middle" class="small">趋势跌破或逻辑证伪</text>
  <text x="605" y="321" text-anchor="middle" class="small">暂停并复盘</text>

  <path d="M665 187 C660 225 640 235 605 250" class="line"/>
  <path d="M400 187 V240" class="line"/>
  <path d="M315 291 H290" class="line"/>
</svg>
