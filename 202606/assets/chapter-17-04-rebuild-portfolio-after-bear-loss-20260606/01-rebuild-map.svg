<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">熊市亏损后的组合重建地图</title>
  <desc id="desc">展示熊市亏损后从止血、分类、降风险到恢复进攻的顺序</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">熊市亏损后，不是先回本，而是先重建系统</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="46" y="96" width="154" height="92" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="123" y="125" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">第一步</text>
  <text x="123" y="153" text-anchor="middle" font-size="14" fill="#1f2937">止血</text>
  <text x="123" y="174" text-anchor="middle" font-size="14" fill="#1f2937">停补仓和杠杆</text>
  <rect x="237" y="96" width="154" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="314" y="125" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">第二步</text>
  <text x="314" y="153" text-anchor="middle" font-size="14" fill="#1f2937">分类</text>
  <text x="314" y="174" text-anchor="middle" font-size="14" fill="#1f2937">核心/卫星/问题仓</text>
  <rect x="428" y="96" width="154" height="92" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="505" y="125" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">第三步</text>
  <text x="505" y="153" text-anchor="middle" font-size="14" fill="#1f2937">降风险</text>
  <text x="505" y="174" text-anchor="middle" font-size="14" fill="#1f2937">回到目标仓位</text>
  <rect x="619" y="96" width="135" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="686" y="125" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">第四步</text>
  <text x="686" y="153" text-anchor="middle" font-size="14" fill="#1f2937">恢复进攻</text>
  <text x="686" y="174" text-anchor="middle" font-size="14" fill="#1f2937">小额分批</text>
  <line x1="200" y1="142" x2="229" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="391" y1="142" x2="420" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="582" y1="142" x2="611" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="72" y="246" width="656" height="84" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="276" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">重建顺序不能倒过来</text>
  <text x="400" y="304" text-anchor="middle" font-size="15" fill="#334155">如果没有先止血和分类，所谓抄底往往只是把问题仓变得更大</text>
  <text x="400" y="362" text-anchor="middle" font-size="14" fill="#64748b">目标: 让账户重新可控，而不是用下一笔交易证明上一笔没有错</text>
</svg>
