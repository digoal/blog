<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">熊市亏损后重建组合的论证链</title>
  <desc id="desc">展示从亏损、承受力、资产质量到组合重建动作的因果路径</desc>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">先把账户救回可控区，再谈下一轮机会</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="38" y="84" width="156" height="92" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="116" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">前提A</text>
  <text x="116" y="141" text-anchor="middle" font-size="14" fill="#1f2937">熊市会放大</text>
  <text x="116" y="162" text-anchor="middle" font-size="14" fill="#1f2937">回撤和情绪压力</text>
  <rect x="232" y="84" width="156" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="310" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">前提B</text>
  <text x="310" y="141" text-anchor="middle" font-size="14" fill="#1f2937">超过承受力后</text>
  <text x="310" y="162" text-anchor="middle" font-size="14" fill="#1f2937">规则会失效</text>
  <rect x="426" y="84" width="156" height="92" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="504" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提C</text>
  <text x="504" y="141" text-anchor="middle" font-size="14" fill="#1f2937">持仓质量</text>
  <text x="504" y="162" text-anchor="middle" font-size="14" fill="#1f2937">分成三类</text>
  <rect x="620" y="84" width="142" height="92" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="691" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">结论</text>
  <text x="691" y="141" text-anchor="middle" font-size="14" fill="#1f2937">先止血分类</text>
  <text x="691" y="162" text-anchor="middle" font-size="14" fill="#1f2937">再小额重建</text>
  <line x1="194" y1="130" x2="224" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="388" y1="130" x2="418" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="582" y1="130" x2="612" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="246" width="660" height="86" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="276" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">操作公式</text>
  <text x="400" y="304" text-anchor="middle" font-size="15" fill="#334155">组合重建 = 止血 + 持仓分类 + 仓位复位 + 分批恢复</text>
  <path d="M691 176 Q691 220 654 246" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
