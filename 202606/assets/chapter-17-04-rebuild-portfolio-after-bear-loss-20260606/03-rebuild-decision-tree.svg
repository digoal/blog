<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">熊市亏损后的重建决策树</title>
  <desc id="desc">展示不同前提下保留、减仓、退出和恢复买入的操作分支</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">亏损后每一笔动作，都先问前提是否还成立</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="284" y="78" width="232" height="70" rx="8" fill="#2563eb"/>
  <text x="400" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">熊市亏损后的持仓</text>
  <text x="400" y="129" text-anchor="middle" font-size="14" fill="#dbeafe">先分类，再决定动作</text>
  <rect x="44" y="222" width="190" height="104" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="139" y="251" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">核心资产</text>
  <text x="139" y="276" text-anchor="middle" font-size="14" fill="#1f2937">宽基/低成本/逻辑未坏</text>
  <text x="139" y="299" text-anchor="middle" font-size="14" fill="#1f2937">动作: 保留或定投</text>
  <rect x="305" y="222" width="190" height="104" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="400" y="251" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">卫星资产</text>
  <text x="400" y="276" text-anchor="middle" font-size="14" fill="#1f2937">行业/主题/估值和趋势弱</text>
  <text x="400" y="299" text-anchor="middle" font-size="14" fill="#1f2937">动作: 降到上限内</text>
  <rect x="566" y="222" width="190" height="104" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="661" y="251" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">问题资产</text>
  <text x="661" y="276" text-anchor="middle" font-size="14" fill="#1f2937">逻辑坏/杠杆/流动性差</text>
  <text x="661" y="299" text-anchor="middle" font-size="14" fill="#1f2937">动作: 退出或止损</text>
  <path d="M400 148 Q250 172 139 222" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 148 Q400 184 400 222" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 148 Q550 172 661 222" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="162" y="354" width="476" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="400" y="381" text-anchor="middle" font-size="15" fill="#334155">只有组合回到目标仓位后，新增资金才允许小额、分批、按清单恢复买入</text>
</svg>
