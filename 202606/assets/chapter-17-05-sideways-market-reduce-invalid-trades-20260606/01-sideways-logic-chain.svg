<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#111827">震荡市减少无效交易的论证链</text>

  <g fill="#eff6ff" stroke="#2563eb" stroke-width="2">
    <rect x="32" y="88" width="170" height="92" rx="8"/>
    <rect x="222" y="88" width="170" height="92" rx="8"/>
    <rect x="412" y="88" width="170" height="92" rx="8"/>
    <rect x="602" y="88" width="166" height="92" rx="8"/>
  </g>

  <text x="117" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 A</text>
  <text x="117" y="148" text-anchor="middle" font-size="14" fill="#1f2937">价格在区间内来回摆动</text>
  <text x="307" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 B</text>
  <text x="307" y="148" text-anchor="middle" font-size="14" fill="#1f2937">频繁进出会累积成本</text>
  <text x="497" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 C</text>
  <text x="497" y="148" text-anchor="middle" font-size="14" fill="#1f2937">小白容易把噪音当信号</text>
  <text x="685" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">前提 D</text>
  <text x="685" y="148" text-anchor="middle" font-size="14" fill="#1f2937">仓位越大越想证明自己</text>

  <line x1="204" y1="134" x2="216" y2="134" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="394" y1="134" x2="406" y2="134" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="584" y1="134" x2="596" y2="134" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="228" width="620" height="86" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">推导</text>
  <text x="400" y="286" text-anchor="middle" font-size="15" fill="#1f2937">因为方向优势弱而成本和误判确定存在，所以无触发下单会把震荡做成消耗战</text>
  <line x1="400" y1="184" x2="400" y2="222" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="352" width="620" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="386" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">结论：缩小主动仓，只在区间边界和规则触发时交易</text>
  <line x1="400" y1="318" x2="400" y2="346" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
