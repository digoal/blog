<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">震荡市情景分支</text>

  <rect x="285" y="66" width="230" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">先判断：是否仍在区间内？</text>

  <path d="M400 124 V158" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="255" y="160" width="290" height="58" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="194" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">区间未破：只做边界触发</text>

  <path d="M255 190 H115 V255" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 218 V255" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M545 190 H685 V255" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="35" y="258" width="160" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="115" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">靠近下沿</text>
  <text x="115" y="316" text-anchor="middle" font-size="13" fill="#1f2937">小仓试错</text>
  <text x="115" y="338" text-anchor="middle" font-size="13" fill="#1f2937">破位即停</text>

  <rect x="320" y="258" width="160" height="86" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">中间位置</text>
  <text x="400" y="316" text-anchor="middle" font-size="13" fill="#1f2937">不追不猜</text>
  <text x="400" y="338" text-anchor="middle" font-size="13" fill="#1f2937">只复盘观察</text>

  <rect x="605" y="258" width="160" height="86" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">靠近上沿</text>
  <text x="685" y="316" text-anchor="middle" font-size="13" fill="#1f2937">减卫星仓</text>
  <text x="685" y="338" text-anchor="middle" font-size="13" fill="#1f2937">不追突破</text>

  <path d="M545 95 H690 V125" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="590" y="128" width="200" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="690" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">放量突破并站稳</text>
  <text x="690" y="184" text-anchor="middle" font-size="13" fill="#1f2937">从震荡规则切到趋势规则</text>

  <path d="M255 95 H110 V125" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="10" y="128" width="200" height="72" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">跌破下沿并确认</text>
  <text x="110" y="184" text-anchor="middle" font-size="13" fill="#1f2937">从低吸规则切到止损规则</text>

  <text x="400" y="392" text-anchor="middle" font-size="14" fill="#475569">关键：区间内减少动作，区间外先确认前提已经变了</text>
</svg>
