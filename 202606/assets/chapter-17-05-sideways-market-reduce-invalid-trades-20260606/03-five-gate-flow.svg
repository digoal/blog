<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">下单前五道门</text>

  <g font-size="15" fill="#111827">
    <rect x="70" y="78" width="150" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="145" y="108" text-anchor="middle" font-weight="700">1. 环境门</text>
    <text x="145" y="132" text-anchor="middle" font-size="13">仍是震荡吗</text>

    <rect x="250" y="78" width="150" height="72" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="325" y="108" text-anchor="middle" font-weight="700">2. 位置门</text>
    <text x="325" y="132" text-anchor="middle" font-size="13">接近边界吗</text>

    <rect x="430" y="78" width="150" height="72" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="505" y="108" text-anchor="middle" font-weight="700">3. 触发门</text>
    <text x="505" y="132" text-anchor="middle" font-size="13">有确认信号吗</text>

    <rect x="610" y="78" width="150" height="72" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="685" y="108" text-anchor="middle" font-weight="700">4. 仓位门</text>
    <text x="685" y="132" text-anchor="middle" font-size="13">小于上限吗</text>
  </g>

  <line x1="222" y1="114" x2="246" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="402" y1="114" x2="426" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="582" y1="114" x2="606" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M685 150 V210 H400 V242" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="290" y="244" width="220" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="276" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">5. 退出门</text>
  <text x="400" y="302" text-anchor="middle" font-size="13" fill="#1f2937">错了怎么卖，赚了怎么减</text>

  <path d="M290 282 H135 V350" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M510 282 H665 V350" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="45" y="352" width="180" height="54" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="135" y="384" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">任一门不合格：不交易</text>

  <rect x="575" y="352" width="180" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="665" y="384" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">五门通过：小仓执行</text>

  <text x="400" y="384" text-anchor="middle" font-size="14" fill="#475569">震荡市不是天天找机会，而是让大多数冲动过不了门</text>
</svg>
