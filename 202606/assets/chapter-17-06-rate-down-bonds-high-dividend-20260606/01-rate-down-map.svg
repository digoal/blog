<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#111827">利率下行不是一个买入按钮，而是一张分工表</text>
  <rect x="46" y="92" width="190" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="141" y="128" text-anchor="middle" font-size="18" fill="#1e3a8a">债券 / 债券ETF</text>
  <text x="141" y="158" text-anchor="middle" font-size="14" fill="#1e3a8a">直接看利率与久期</text>
  <rect x="306" y="92" width="190" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="401" y="128" text-anchor="middle" font-size="18" fill="#14532d">高股息 / 红利ETF</text>
  <text x="401" y="158" text-anchor="middle" font-size="14" fill="#14532d">看现金流与估值</text>
  <rect x="566" y="92" width="190" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="661" y="128" text-anchor="middle" font-size="18" fill="#78350f">REITs / 收益资产</text>
  <text x="661" y="158" text-anchor="middle" font-size="14" fill="#78350f">看分派与经营</text>
  <line x1="141" y1="188" x2="141" y2="252" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="401" y1="188" x2="401" y2="252" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="661" y1="188" x2="661" y2="252" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="46" y="254" width="190" height="88" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="141" y="288" text-anchor="middle" font-size="16" fill="#111827">中短久期做底座</text>
  <text x="141" y="316" text-anchor="middle" font-size="14" fill="#4b5563">长久期只做小比例弹性</text>
  <rect x="306" y="254" width="190" height="88" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="401" y="288" text-anchor="middle" font-size="16" fill="#111827">先验分红质量</text>
  <text x="401" y="316" text-anchor="middle" font-size="14" fill="#4b5563">不把股息当存款利息</text>
  <rect x="566" y="254" width="190" height="88" rx="8" fill="#ffffff" stroke="#fcd34d"/>
  <text x="661" y="288" text-anchor="middle" font-size="16" fill="#111827">先验底层资产</text>
  <text x="661" y="316" text-anchor="middle" font-size="14" fill="#4b5563">分派率不等于保本收益</text>
  <rect x="140" y="370" width="520" height="38" rx="8" fill="#111827"/>
  <text x="400" y="395" text-anchor="middle" font-size="16" fill="#ffffff">动作顺序：先分资金期限，再分资产角色，最后设仓位上限</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
