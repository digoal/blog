<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <rect width="800" height="440" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" fill="#111827">论证链：利率下行如何变成组合动作</text>
  <rect x="34" y="88" width="150" height="110" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="109" y="124" text-anchor="middle" font-size="16" fill="#0c4a6e">前提A</text>
  <text x="109" y="152" text-anchor="middle" font-size="14" fill="#0c4a6e">债券价格与</text>
  <text x="109" y="174" text-anchor="middle" font-size="14" fill="#0c4a6e">利率反向</text>
  <rect x="218" y="88" width="150" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="293" y="124" text-anchor="middle" font-size="16" fill="#1e3a8a">前提B</text>
  <text x="293" y="152" text-anchor="middle" font-size="14" fill="#1e3a8a">久期越长</text>
  <text x="293" y="174" text-anchor="middle" font-size="14" fill="#1e3a8a">波动越大</text>
  <rect x="402" y="88" width="150" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="477" y="124" text-anchor="middle" font-size="16" fill="#14532d">前提C</text>
  <text x="477" y="152" text-anchor="middle" font-size="14" fill="#14532d">低利率会推高</text>
  <text x="477" y="174" text-anchor="middle" font-size="14" fill="#14532d">现金流资产估值</text>
  <rect x="586" y="88" width="150" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="661" y="124" text-anchor="middle" font-size="16" fill="#7f1d1d">前提D</text>
  <text x="661" y="152" text-anchor="middle" font-size="14" fill="#7f1d1d">现金流质量</text>
  <text x="661" y="174" text-anchor="middle" font-size="14" fill="#7f1d1d">仍会变差</text>
  <line x1="184" y1="143" x2="218" y2="143" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="368" y1="143" x2="402" y2="143" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="552" y1="143" x2="586" y2="143" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="78" y="252" width="260" height="88" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="208" y="286" text-anchor="middle" font-size="17" fill="#111827">推导1：债券仓按久期分层</text>
  <text x="208" y="314" text-anchor="middle" font-size="14" fill="#4b5563">短债防守，中债平衡，长债弹性</text>
  <rect x="462" y="252" width="260" height="88" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="592" y="286" text-anchor="middle" font-size="17" fill="#111827">推导2：高股息按质量过滤</text>
  <text x="592" y="314" text-anchor="middle" font-size="14" fill="#4b5563">现金流覆盖、负债可控、估值不过热</text>
  <line x1="208" y1="198" x2="208" y2="252" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="592" y1="198" x2="592" y2="252" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="168" y="372" width="464" height="42" rx="8" fill="#111827"/>
  <text x="400" y="399" text-anchor="middle" font-size="17" fill="#ffffff">结论：利率下行加久期，但高股息只做合格现金流卫星仓</text>
  <line x1="208" y1="340" x2="352" y2="372" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="592" y1="340" x2="448" y2="372" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
