<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect width="800" height="430" fill="#f9fafb"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" fill="#111827">情景分支：前提变了，动作必须变</text>
  <rect x="270" y="74" width="260" height="56" rx="8" fill="#111827"/>
  <text x="400" y="109" text-anchor="middle" font-size="17" fill="#ffffff">观察：利率是否继续下行？</text>
  <line x1="400" y1="130" x2="400" y2="168" stroke="#374151" stroke-width="2"/>
  <circle cx="400" cy="186" r="18" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="400" y="192" text-anchor="middle" font-size="15" fill="#111827">分</text>
  <line x1="382" y1="186" x2="140" y2="238" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="204" x2="400" y2="238" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="418" y1="186" x2="660" y2="238" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="36" y="242" width="230" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="151" y="276" text-anchor="middle" font-size="17" fill="#14532d">继续下行</text>
  <text x="151" y="304" text-anchor="middle" font-size="14" fill="#14532d">中短债做底座</text>
  <text x="151" y="326" text-anchor="middle" font-size="14" fill="#14532d">长债小比例加弹性</text>
  <rect x="285" y="242" width="230" height="104" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="276" text-anchor="middle" font-size="17" fill="#78350f">低位震荡</text>
  <text x="400" y="304" text-anchor="middle" font-size="14" fill="#78350f">不追长久期</text>
  <text x="400" y="326" text-anchor="middle" font-size="14" fill="#78350f">用再平衡慢慢调</text>
  <rect x="534" y="242" width="230" height="104" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="649" y="276" text-anchor="middle" font-size="17" fill="#7f1d1d">重新上行</text>
  <text x="649" y="304" text-anchor="middle" font-size="14" fill="#7f1d1d">先砍长久期</text>
  <text x="649" y="326" text-anchor="middle" font-size="14" fill="#7f1d1d">高股息回到质量检查</text>
  <rect x="138" y="374" width="524" height="34" rx="8" fill="#ffffff" stroke="#9ca3af"/>
  <text x="400" y="397" text-anchor="middle" font-size="15" fill="#374151">只要资金期限缩短，所有路径都先降风险，不追收益</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
