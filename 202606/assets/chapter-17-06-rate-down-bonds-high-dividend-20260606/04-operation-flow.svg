<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" fill="#111827">实操流程：10万元怎么从利率判断走到下单</text>
  <rect x="70" y="78" width="660" height="52" rx="8" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="400" y="111" text-anchor="middle" font-size="17" fill="#111827">第一步：6个月生活费和一年内要用的钱先排除</text>
  <line x1="400" y1="130" x2="400" y2="156" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="158" width="660" height="52" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="400" y="191" text-anchor="middle" font-size="17" fill="#1e3a8a">第二步：防守仓以短债和中短债为主，不把长债当现金</text>
  <line x1="400" y1="210" x2="400" y2="236" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="238" width="660" height="52" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="271" text-anchor="middle" font-size="17" fill="#14532d">第三步：利率下行证据成立时，长债只用观察仓分批买</text>
  <line x1="400" y1="290" x2="400" y2="316" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="318" width="660" height="52" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="400" y="351" text-anchor="middle" font-size="17" fill="#78350f">第四步：高股息只选红利ETF或现金流合格资产，设上限</text>
  <line x1="400" y1="370" x2="400" y2="396" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="398" width="660" height="36" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="400" y="422" text-anchor="middle" font-size="16" fill="#7f1d1d">退出线：利率上行、现金流变坏、资金期限缩短，先降仓位</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
