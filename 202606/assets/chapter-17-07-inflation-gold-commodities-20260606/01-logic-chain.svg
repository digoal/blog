<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">通胀周期黄金与商品论证链</title>
  <desc id="desc">展示从通胀来源、政策反应、资产属性到操作结论的因果路径</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .body { font-size: 13px; }
    .small { font-size: 12px; fill: #475569; }
    .box { rx: 10; ry: 10; stroke-width: 2; }
    .arrow { stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">通胀周期不是一句“买黄金商品”</text>
  <text x="40" y="67" class="small">先判断通胀来源和政策反应，再决定黄金、商品和仓位</text>

  <rect x="40" y="100" width="170" height="96" fill="#e0f2fe" stroke="#0284c7" class="box"/>
  <text x="60" y="130" class="label">前提A: 通胀来源</text>
  <text x="60" y="154" class="body">能源、粮食、金属</text>
  <text x="60" y="176" class="body">还是服务、工资、房租</text>

  <rect x="250" y="100" width="170" height="96" fill="#fef3c7" stroke="#d97706" class="box"/>
  <text x="270" y="130" class="label">前提B: 政策反应</text>
  <text x="270" y="154" class="body">实际利率和美元</text>
  <text x="270" y="176" class="body">决定估值压力</text>

  <rect x="460" y="100" width="170" height="96" fill="#dcfce7" stroke="#16a34a" class="box"/>
  <text x="480" y="130" class="label">前提C: 资产属性</text>
  <text x="480" y="154" class="body">黄金偏货币信用</text>
  <text x="480" y="176" class="body">商品偏供需缺口</text>

  <rect x="610" y="252" width="130" height="82" fill="#fee2e2" stroke="#dc2626" class="box"/>
  <text x="628" y="282" class="label">前提D</text>
  <text x="628" y="305" class="body">波动和仓位</text>
  <text x="628" y="326" class="body">不能放大</text>

  <rect x="112" y="252" width="430" height="82" fill="#ffffff" stroke="#64748b" class="box"/>
  <text x="132" y="282" class="label">核心结论</text>
  <text x="132" y="307" class="body">商品短缺型通胀: 商品仓小比例对冲</text>
  <text x="132" y="329" class="body">货币信用受疑或实际利率转弱: 黄金做防守仓</text>

  <path d="M210 148 H250" class="arrow"/>
  <path d="M420 148 H460" class="arrow"/>
  <path d="M545 196 C520 228, 492 246, 455 252" class="arrow"/>
  <path d="M610 293 H542" class="arrow"/>
  <path d="M125 196 C145 225, 178 242, 225 252" class="arrow"/>
</svg>
