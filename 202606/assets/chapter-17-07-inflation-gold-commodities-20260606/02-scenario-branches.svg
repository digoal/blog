<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">通胀周期情景分支</title>
  <desc id="desc">展示商品短缺、服务通胀、强紧缩和需求塌陷四种情景下的操作切换</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .body { font-size: 13px; }
    .small { font-size: 12px; fill: #475569; }
    .node { rx: 10; ry: 10; stroke-width: 2; }
    .line { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">四种通胀情景，对应四种动作</text>
  <text x="40" y="67" class="small">不要把所有通胀都翻译成同一个买入按钮</text>

  <rect x="315" y="92" width="170" height="70" fill="#ffffff" stroke="#64748b" class="node"/>
  <text x="340" y="122" class="label">通胀上行</text>
  <text x="340" y="145" class="body">先分清来源和反应</text>

  <rect x="45" y="230" width="165" height="102" fill="#dcfce7" stroke="#16a34a" class="node"/>
  <text x="65" y="260" class="label">商品短缺型</text>
  <text x="65" y="284" class="body">能源、粮食、金属</text>
  <text x="65" y="306" class="body">商品仓5%-10%</text>

  <rect x="235" y="230" width="165" height="102" fill="#e0f2fe" stroke="#0284c7" class="node"/>
  <text x="255" y="260" class="label">货币信用受疑</text>
  <text x="255" y="284" class="body">实际利率走弱</text>
  <text x="255" y="306" class="body">黄金防守仓</text>

  <rect x="425" y="230" width="165" height="102" fill="#fef3c7" stroke="#d97706" class="node"/>
  <text x="445" y="260" class="label">服务粘性通胀</text>
  <text x="445" y="284" class="body">商品不是源头</text>
  <text x="445" y="306" class="body">少交易多观察</text>

  <rect x="615" y="230" width="165" height="102" fill="#fee2e2" stroke="#dc2626" class="node"/>
  <text x="635" y="260" class="label">强紧缩衰退</text>
  <text x="635" y="284" class="body">需求塌陷</text>
  <text x="635" y="306" class="body">降商品保现金</text>

  <path d="M400 162 C360 190, 230 196, 128 230" class="line"/>
  <path d="M400 162 C390 190, 345 202, 318 230" class="line"/>
  <path d="M400 162 C430 190, 480 202, 508 230" class="line"/>
  <path d="M400 162 C470 190, 620 196, 698 230" class="line"/>

  <text x="58" y="365" class="small">正常结论: 对冲，不重仓</text>
  <text x="250" y="365" class="small">正常结论: 防守，不追涨</text>
  <text x="442" y="365" class="small">替代结论: 不把通胀当商品信号</text>
  <text x="626" y="365" class="small">替代结论: 先保护流动性</text>
</svg>
