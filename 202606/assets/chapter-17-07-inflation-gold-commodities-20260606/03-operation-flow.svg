<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">通胀周期操作流程</title>
  <desc id="desc">展示通胀周期下从数据检查到仓位执行的五步流程</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 24px; font-weight: 700; }
    .step { font-size: 16px; font-weight: 700; }
    .body { font-size: 13px; }
    .small { font-size: 12px; fill: #475569; }
    .box { rx: 10; ry: 10; stroke-width: 2; }
    .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="44" class="title">10万元账户的通胀周期操作流程</text>
  <text x="40" y="70" class="small">先确认前提，再分配仓位，最后用再平衡纠偏</text>

  <rect x="40" y="105" width="140" height="88" fill="#e0f2fe" stroke="#0284c7" class="box"/>
  <text x="62" y="134" class="step">1 看来源</text>
  <text x="62" y="158" class="body">CPI/PPI分项</text>
  <text x="62" y="179" class="body">能源食品金属</text>

  <rect x="220" y="105" width="140" height="88" fill="#fef3c7" stroke="#d97706" class="box"/>
  <text x="242" y="134" class="step">2 看利率</text>
  <text x="242" y="158" class="body">实际利率</text>
  <text x="242" y="179" class="body">美元强弱</text>

  <rect x="400" y="105" width="140" height="88" fill="#dcfce7" stroke="#16a34a" class="box"/>
  <text x="422" y="134" class="step">3 选工具</text>
  <text x="422" y="158" class="body">黄金ETF</text>
  <text x="422" y="179" class="body">商品基金/ETF</text>

  <rect x="580" y="105" width="140" height="88" fill="#fee2e2" stroke="#dc2626" class="box"/>
  <text x="602" y="134" class="step">4 设上限</text>
  <text x="602" y="158" class="body">黄金5%-10%</text>
  <text x="602" y="179" class="body">商品3%-8%</text>

  <path d="M180 149 H220" class="arrow"/>
  <path d="M360 149 H400" class="arrow"/>
  <path d="M540 149 H580" class="arrow"/>

  <rect x="145" y="265" width="510" height="92" fill="#ffffff" stroke="#64748b" class="box"/>
  <text x="168" y="297" class="step">5 每月复查三条失效信号</text>
  <text x="168" y="322" class="body">供给恢复或库存回升: 商品仓减回计划</text>
  <text x="168" y="344" class="body">实际利率走强且美元强: 黄金不追涨</text>

  <path d="M650 193 C650 235, 560 252, 505 265" class="arrow"/>
  <path d="M400 357 C350 386, 250 386, 195 357" class="arrow"/>
  <text x="300" y="398" class="small">任何单项超上限，用再平衡拉回组合计划</text>
</svg>
