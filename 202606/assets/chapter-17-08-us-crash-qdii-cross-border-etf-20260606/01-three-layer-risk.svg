<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f7f9fb"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">美股大跌时，QDII和跨境ETF不是只看指数</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#6b7280">人民币账户看到的是三层风险叠加后的结果</text>

  <rect x="60" y="110" width="190" height="150" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="155" cy="150" r="28" fill="#dbeafe"/>
  <text x="155" y="157" text-anchor="middle" font-size="22" font-weight="700" fill="#2563eb">1</text>
  <text x="155" y="202" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">底层资产</text>
  <text x="155" y="230" text-anchor="middle" font-size="14" fill="#4b5563">标普500 / 纳指100</text>
  <text x="155" y="252" text-anchor="middle" font-size="14" fill="#4b5563">行业主题 / 海外债券</text>

  <path d="M260 185 H330" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="340" y="110" width="190" height="150" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="435" cy="150" r="28" fill="#d1fae5"/>
  <text x="435" y="157" text-anchor="middle" font-size="22" font-weight="700" fill="#059669">2</text>
  <text x="435" y="202" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">汇率</text>
  <text x="435" y="230" text-anchor="middle" font-size="14" fill="#4b5563">美元兑人民币</text>
  <text x="435" y="252" text-anchor="middle" font-size="14" fill="#4b5563">会放大或缓冲净值</text>

  <path d="M540 185 H610" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="620" y="110" width="130" height="150" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <circle cx="685" cy="150" r="28" fill="#fee2e2"/>
  <text x="685" y="157" text-anchor="middle" font-size="22" font-weight="700" fill="#dc2626">3</text>
  <text x="685" y="202" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">溢价</text>
  <text x="685" y="230" text-anchor="middle" font-size="14" fill="#4b5563">场内价</text>
  <text x="685" y="252" text-anchor="middle" font-size="14" fill="#4b5563">偏离净值</text>

  <rect x="170" y="305" width="460" height="54" rx="8" fill="#111827"/>
  <text x="400" y="328" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">行动结论</text>
  <text x="400" y="350" text-anchor="middle" font-size="14" fill="#e5e7eb">先拆三层，再决定加仓、持有、减仓或暂停交易</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
