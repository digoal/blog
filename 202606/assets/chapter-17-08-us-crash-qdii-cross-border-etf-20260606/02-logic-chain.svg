<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <rect width="800" height="430" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">论证链：大跌时先判断“便宜”是真是假</text>

  <rect x="42" y="80" width="160" height="88" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="122" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">前提A</text>
  <text x="122" y="133" text-anchor="middle" font-size="13" fill="#1f2937">美股回撤</text>
  <text x="122" y="153" text-anchor="middle" font-size="13" fill="#1f2937">本来就常见</text>

  <rect x="242" y="80" width="160" height="88" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="322" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提B</text>
  <text x="322" y="133" text-anchor="middle" font-size="13" fill="#1f2937">人民币净值</text>
  <text x="322" y="153" text-anchor="middle" font-size="13" fill="#1f2937">受汇率影响</text>

  <rect x="442" y="80" width="160" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="522" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">前提C</text>
  <text x="522" y="133" text-anchor="middle" font-size="13" fill="#1f2937">跨境ETF市价</text>
  <text x="522" y="153" text-anchor="middle" font-size="13" fill="#1f2937">可能高溢价</text>

  <rect x="642" y="80" width="116" height="88" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="700" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提D</text>
  <text x="700" y="133" text-anchor="middle" font-size="13" fill="#1f2937">资金期限</text>
  <text x="700" y="153" text-anchor="middle" font-size="13" fill="#1f2937">决定承受力</text>

  <path d="M122 180 V218 H400" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <path d="M322 180 V218 H400" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <path d="M522 180 V218 H400" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <path d="M700 180 V218 H400" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <path d="M400 218 V244" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="145" y="244" width="510" height="82" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="273" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">推导</text>
  <text x="400" y="299" text-anchor="middle" font-size="14" fill="#374151">指数跌不等于买点；汇率和溢价会改变实际买入成本</text>
  <text x="400" y="318" text-anchor="middle" font-size="14" fill="#374151">资金期限不够时，便宜也不能买成高波动仓位</text>

  <path d="M400 326 V352" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="170" y="352" width="460" height="54" rx="8" fill="#111827"/>
  <text x="400" y="375" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">结论：用四问决定动作</text>
  <text x="400" y="397" text-anchor="middle" font-size="14" fill="#e5e7eb">跌什么？贵不贵？汇率怎样？这笔钱能等多久？</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
