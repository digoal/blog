<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">美股大跌后的四种动作</text>
  <text x="400" y="64" text-anchor="middle" font-size="14" fill="#64748b">先判断前提，再选择动作，不用一个“跌了”替代所有问题</text>

  <rect x="300" y="92" width="200" height="58" rx="8" fill="#111827"/>
  <text x="400" y="117" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">美股大跌</text>
  <text x="400" y="138" text-anchor="middle" font-size="13" fill="#e5e7eb">QDII / 跨境ETF持有人</text>

  <path d="M400 150 V178" stroke="#94a3b8" stroke-width="3"/>
  <path d="M185 178 H615" stroke="#94a3b8" stroke-width="3"/>
  <path d="M185 178 V208" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M330 178 V208" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M470 178 V208" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M615 178 V208" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="208" width="230" height="86" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="185" y="235" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">前提正常</text>
  <text x="185" y="258" text-anchor="middle" font-size="13" fill="#1f2937">长期资金 + 宽基</text>
  <text x="185" y="278" text-anchor="middle" font-size="13" fill="#1f2937">低溢价 + 汇率不极端</text>

  <rect x="323" y="208" width="154" height="86" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="235" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">只是回撤</text>
  <text x="400" y="258" text-anchor="middle" font-size="13" fill="#1f2937">仓位仍在上限内</text>
  <text x="400" y="278" text-anchor="middle" font-size="13" fill="#1f2937">买入逻辑未坏</text>

  <rect x="500" y="208" width="230" height="86" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="615" y="235" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">交易条件差</text>
  <text x="615" y="258" text-anchor="middle" font-size="13" fill="#1f2937">高溢价 / 宽价差</text>
  <text x="615" y="278" text-anchor="middle" font-size="13" fill="#1f2937">限购 / 风险提示</text>

  <rect x="250" y="324" width="300" height="66" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">前提失效</text>
  <text x="400" y="374" text-anchor="middle" font-size="13" fill="#1f2937">短期要用钱 / 主题逻辑坏 / 仓位超标</text>

  <path d="M185 294 V414" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M400 294 V324" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M615 294 V414" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <path d="M400 390 V414" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>

  <text x="185" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">分批加仓</text>
  <text x="400" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">减仓或退出</text>
  <text x="615" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">暂停下单</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
