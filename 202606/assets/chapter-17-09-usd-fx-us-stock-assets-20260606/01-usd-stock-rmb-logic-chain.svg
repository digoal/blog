<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-labelledby="title desc">
  <title id="title">美元变化与美股资产的人民币收益论证链</title>
  <desc id="desc">展示美股美元收益、美元兑人民币变化、人民币结果和仓位动作之间的因果关系。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#111827">美股资产不是单层收益</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">美元账 × 汇率账 × 自己的用钱币种，才是最终人民币体验</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="44" y="112" width="170" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="129" y="142" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="129" y="168" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#1e40af">美股先按美元涨跌</text>
  <text x="129" y="190" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">资产本身是第一本账</text>
  <rect x="282" y="112" width="170" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="367" y="142" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#14532d">前提B</text>
  <text x="367" y="168" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#166534">USD/CNY会变化</text>
  <text x="367" y="190" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#166534">汇率是第二本账</text>
  <rect x="520" y="112" width="190" height="96" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="615" y="142" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#78350f">前提C</text>
  <text x="615" y="168" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#92400e">多数支出仍是人民币</text>
  <text x="615" y="190" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#92400e">最终要看人民币结果</text>
  <line x1="214" y1="160" x2="274" y2="160" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="452" y1="160" x2="512" y2="160" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="134" y="264" width="532" height="72" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#111827">推导结论</text>
  <text x="400" y="318" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">人民币收益 = (1 + 美股美元收益) × (1 + USD/CNY变化) - 1</text>
  <text x="400" y="342" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#475569">动作不是猜美元，而是拆收益、看期限、控仓位、做再平衡</text>
  <line x1="129" y1="208" x2="280" y2="264" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="367" y1="208" x2="400" y2="264" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="208" x2="520" y2="264" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
