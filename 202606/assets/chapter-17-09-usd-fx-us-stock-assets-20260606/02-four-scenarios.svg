<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" role="img" aria-labelledby="title desc">
  <title id="title">美元变化与美股资产四象限</title>
  <desc id="desc">按美股涨跌和美元兑人民币升贬值划分四种情景，并给出对应动作。</desc>
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#111827">美元升贬值时，美股资产四象限</text>
  <text x="400" y="58" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#4b5563">先判断资产，再判断汇率，最后决定仓位动作</text>
  <line x1="400" y1="88" x2="400" y2="386" stroke="#334155" stroke-width="2"/>
  <line x1="96" y1="230" x2="704" y2="230" stroke="#334155" stroke-width="2"/>
  <polygon points="400,78 394,91 406,91" fill="#334155"/>
  <polygon points="714,230 701,224 701,236" fill="#334155"/>
  <text x="400" y="410" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155">美股美元账：左跌  /  右涨</text>
  <text x="48" y="234" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#334155" transform="rotate(-90 48 234)">USD/CNY：上升=美元升值，下跌=美元贬值</text>
  <rect x="112" y="92" width="258" height="116" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="241" y="124" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" font-weight="700" fill="#78350f">美股跌 + 美元升</text>
  <text x="241" y="151" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#92400e">汇率缓冲亏损</text>
  <text x="241" y="176" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#92400e">动作：不把缓冲当安全</text>
  <text x="241" y="197" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#92400e">先查资产逻辑是否破坏</text>
  <rect x="430" y="92" width="258" height="116" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="559" y="124" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" font-weight="700" fill="#14532d">美股涨 + 美元升</text>
  <text x="559" y="151" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">人民币收益放大</text>
  <text x="559" y="176" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">动作：检查是否超仓</text>
  <text x="559" y="197" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#166534">超过上限就再平衡</text>
  <rect x="112" y="258" width="258" height="116" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="241" y="290" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" font-weight="700" fill="#7f1d1d">美股跌 + 美元跌</text>
  <text x="241" y="317" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#991b1b">人民币结果双重受压</text>
  <text x="241" y="342" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#991b1b">动作：短钱退出讨论</text>
  <text x="241" y="363" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#991b1b">超仓先降风险</text>
  <rect x="430" y="258" width="258" height="116" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="559" y="290" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">美股涨 + 美元跌</text>
  <text x="559" y="317" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1e40af">资产赚钱但人民币收益被压缩</text>
  <text x="559" y="342" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#1e40af">动作：拆清贡献</text>
  <text x="559" y="363" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">不因汇率逆风否定资产</text>
</svg>
