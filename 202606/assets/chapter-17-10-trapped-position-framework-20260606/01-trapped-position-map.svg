<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">被套后先诊断，不先补仓</text>
  <rect x="42" y="92" width="170" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="127" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">前提A</text>
  <text x="127" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">买入逻辑还在吗</text>
  <text x="127" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">质量 / 估值 / 趋势</text>
  <rect x="290" y="92" width="170" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="375" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">前提B</text>
  <text x="375" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">仓位预算够吗</text>
  <text x="375" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">上限 / 现金 / 单笔亏损</text>
  <rect x="538" y="92" width="170" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="623" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">前提C</text>
  <text x="623" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">资金期限够吗</text>
  <text x="623" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">不用钱 / 睡得着 / 能复盘</text>
  <path d="M214 138 H286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M462 138 H534" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M127 184 C127 230 300 232 360 250" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M375 184 C375 230 388 232 400 250" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M623 184 C623 230 500 232 440 250" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="285" y="250" width="230" height="92" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">三选一动作</text>
  <text x="400" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">补仓 / 止损 / 等待</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">只由前提决定，不由亏损比例决定</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
