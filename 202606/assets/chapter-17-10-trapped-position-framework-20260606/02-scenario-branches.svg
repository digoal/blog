<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">前提变化后的三条路</text>
  <rect x="310" y="72" width="180" height="62" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">持仓被套</text>
  <path d="M400 134 V166" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="250" y="166" width="300" height="62" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">先问：买入前提是否还成立</text>
  <path d="M250 197 H90 V260" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 228 V260" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M550 197 H710 V260" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="40" y="260" width="190" height="104" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="135" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">前提失效</text>
  <text x="135" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">财报、行业、规则</text>
  <text x="135" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">或资金用途已变</text>
  <text x="135" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#dc2626">止损 / 降观察仓</text>
  <rect x="305" y="260" width="190" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">前提成立</text>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">仓位没超上限</text>
  <text x="400" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">现金原本就预留</text>
  <text x="400" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#16a34a">分档补仓</text>
  <rect x="570" y="260" width="190" height="104" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e">前提未破</text>
  <text x="665" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">但仓位太重</text>
  <text x="665" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">或短期要用钱</text>
  <text x="665" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#d97706">等待 / 减风险</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
