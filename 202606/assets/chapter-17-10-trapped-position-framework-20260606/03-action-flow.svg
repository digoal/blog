<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">10万元账户的被套处理流程</text>
  <rect x="60" y="76" width="680" height="54" rx="8" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">第一步：确认这笔持仓原来属于核心仓、卫星仓、试错仓还是交易仓</text>
  <path d="M400 130 V158" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="60" y="158" width="210" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">核心ETF被套</text>
  <text x="165" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">前提没坏 + 长期不用钱</text>
  <text x="165" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb">按计划定投或等待</text>
  <rect x="295" y="158" width="210" height="96" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">卫星仓被套</text>
  <text x="400" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">前提没坏 + 仓位未超</text>
  <text x="400" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#d97706">最多两档补仓</text>
  <rect x="530" y="158" width="210" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="635" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">交易仓被套</text>
  <text x="635" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">价格线或时间线触发</text>
  <text x="635" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#dc2626">执行止损</text>
  <path d="M165 254 V286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 254 V286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M635 254 V286" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="60" y="286" width="210" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="165" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">复核周期</text>
  <text x="165" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">每月看估值和仓位</text>
  <rect x="295" y="286" width="210" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">补仓纪律</text>
  <text x="400" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">每档不超过原仓30%</text>
  <rect x="530" y="286" width="210" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="635" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">退出纪律</text>
  <text x="635" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">不把短线改长线</text>
  <rect x="190" y="398" width="420" height="38" rx="8" fill="#111827"/>
  <text x="400" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">每次只记录：前提、动作、下一次复核日</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
