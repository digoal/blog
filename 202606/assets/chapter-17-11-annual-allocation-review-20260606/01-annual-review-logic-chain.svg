<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">年度资产配置复盘论证链</title>
  <desc id="desc">展示资金期限、风险预算、仓位漂移和年度执行单之间的因果关系。</desc>
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">年度复盘不是预测明年，而是校准账户</text>

  <g font-size="16" fill="#111827">
    <rect x="40" y="92" width="155" height="90" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="117.5" y="126" text-anchor="middle" font-weight="700">前提A</text>
    <text x="117.5" y="154" text-anchor="middle">资金用途会变</text>

    <rect x="225" y="92" width="155" height="90" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="302.5" y="126" text-anchor="middle" font-weight="700">前提B</text>
    <text x="302.5" y="154" text-anchor="middle">承受力会变</text>

    <rect x="410" y="92" width="155" height="90" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="487.5" y="126" text-anchor="middle" font-weight="700">前提C</text>
    <text x="487.5" y="154" text-anchor="middle">市场会改仓位</text>

    <rect x="595" y="92" width="155" height="90" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="672.5" y="126" text-anchor="middle" font-weight="700">前提D</text>
    <text x="672.5" y="154" text-anchor="middle">预测胜率不稳</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M118 182 C118 220 205 220 260 244"/>
    <path d="M303 182 C303 220 330 220 355 244"/>
    <path d="M488 182 C488 220 455 220 430 244"/>
    <path d="M673 182 C673 220 548 220 455 244"/>
  </g>

  <rect x="210" y="244" width="380" height="66" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="272" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">推导：先检查前提，再决定是否调仓</text>
  <text x="400" y="296" text-anchor="middle" font-size="15" fill="#374151">不是因为去年涨跌，而是因为账户边界变化</text>

  <path d="M400 310 L400 338" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="338" width="440" height="42" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">结论：形成下一年目标仓位、再平衡阈值和行动清单</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
