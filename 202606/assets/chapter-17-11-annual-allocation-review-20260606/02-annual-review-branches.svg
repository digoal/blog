<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">年度资产配置复盘情景分支</title>
  <desc id="desc">展示年度复盘后根据前提变化采取不同调仓动作。</desc>
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">下一年怎么调：看前提，不看情绪</text>

  <rect x="280" y="68" width="240" height="58" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
  <text x="400" y="93" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">年度复盘结论</text>
  <text x="400" y="116" text-anchor="middle" font-size="14" fill="#374151">资金、风险、仓位、环境</text>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M400 126 L170 178"/>
    <path d="M400 126 L400 178"/>
    <path d="M400 126 L630 178"/>
  </g>

  <g font-size="15" fill="#111827">
    <rect x="55" y="178" width="230" height="118" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="170" y="207" text-anchor="middle" font-weight="700">前提没变</text>
    <text x="170" y="235" text-anchor="middle">目标仓位仍合适</text>
    <text x="170" y="261" text-anchor="middle">只做再平衡</text>
    <text x="170" y="286" text-anchor="middle" fill="#0e7490">动作：少动，按表执行</text>

    <rect x="285" y="178" width="230" height="118" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="400" y="207" text-anchor="middle" font-weight="700">资金期限变短</text>
    <text x="400" y="235" text-anchor="middle">买房、教育、养老临近</text>
    <text x="400" y="261" text-anchor="middle">风险资产下调</text>
    <text x="400" y="286" text-anchor="middle" fill="#c2410c">动作：先保现金和短债</text>

    <rect x="515" y="178" width="230" height="118" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="630" y="207" text-anchor="middle" font-weight="700">风险预算被打穿</text>
    <text x="630" y="235" text-anchor="middle">回撤、波动、集中超限</text>
    <text x="630" y="261" text-anchor="middle">组合承受力不匹配</text>
    <text x="630" y="286" text-anchor="middle" fill="#b91c1c">动作：降主动仓和重复风险</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M170 296 L280 348"/>
    <path d="M400 296 L400 348"/>
    <path d="M630 296 L520 348"/>
  </g>

  <rect x="235" y="348" width="330" height="52" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="371" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">输出下一年执行单</text>
  <text x="400" y="394" text-anchor="middle" font-size="14" fill="#374151">目标比例、阈值、现金垫、禁止动作</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
