<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">年度资产配置复盘流程</title>
  <desc id="desc">展示年度资产配置复盘的五步操作流程。</desc>
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">年度复盘五步法</text>

  <g font-size="15" fill="#111827">
    <rect x="54" y="85" width="132" height="95" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="120" y="118" text-anchor="middle" font-size="28" font-weight="700" fill="#2563eb">1</text>
    <text x="120" y="146" text-anchor="middle" font-weight="700">分资金桶</text>
    <text x="120" y="168" text-anchor="middle" fill="#475569">生活/防守/进攻</text>

    <rect x="206" y="85" width="132" height="95" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="272" y="118" text-anchor="middle" font-size="28" font-weight="700" fill="#2563eb">2</text>
    <text x="272" y="146" text-anchor="middle" font-weight="700">算回撤</text>
    <text x="272" y="168" text-anchor="middle" fill="#475569">能亏多少</text>

    <rect x="358" y="85" width="132" height="95" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="424" y="118" text-anchor="middle" font-size="28" font-weight="700" fill="#2563eb">3</text>
    <text x="424" y="146" text-anchor="middle" font-weight="700">看漂移</text>
    <text x="424" y="168" text-anchor="middle" fill="#475569">目标 vs 当前</text>

    <rect x="510" y="85" width="132" height="95" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="576" y="118" text-anchor="middle" font-size="28" font-weight="700" fill="#2563eb">4</text>
    <text x="576" y="146" text-anchor="middle" font-weight="700">定动作</text>
    <text x="576" y="168" text-anchor="middle" fill="#475569">加/减/不动</text>

    <rect x="662" y="85" width="84" height="95" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="704" y="118" text-anchor="middle" font-size="28" font-weight="700" fill="#2563eb">5</text>
    <text x="704" y="146" text-anchor="middle" font-weight="700">写单</text>
    <text x="704" y="168" text-anchor="middle" fill="#475569">执行</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M186 132 L206 132"/>
    <path d="M338 132 L358 132"/>
    <path d="M490 132 L510 132"/>
    <path d="M642 132 L662 132"/>
  </g>

  <rect x="70" y="228" width="660" height="82" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">每一步都要留下数字，不写感觉</text>
  <text x="400" y="286" text-anchor="middle" font-size="15" fill="#374151">目标仓位、当前仓位、偏离比例、调仓金额、下一次检查日期</text>

  <g font-size="14" fill="#111827">
    <rect x="92" y="342" width="170" height="42" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="177" y="368" text-anchor="middle">偏离小：记录不交易</text>
    <rect x="312" y="342" width="170" height="42" rx="7" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="397" y="368" text-anchor="middle">偏离中：用新增资金调</text>
    <rect x="532" y="342" width="170" height="42" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="617" y="368" text-anchor="middle">偏离大：卖高补低</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
