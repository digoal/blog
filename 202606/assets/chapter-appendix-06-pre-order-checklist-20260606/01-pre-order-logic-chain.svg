<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="下单前检查清单论证链">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">下单前检查清单：把想法变成订单前先过三道关</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">资金期限、仓位亏损、执行价格，任一失控都可能让好想法变成坏交易</text>

  <g font-family="Arial, sans-serif">
    <rect x="42" y="105" width="170" height="74" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="127" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">前提A：钱有期限</text>
    <text x="127" y="156" text-anchor="middle" font-size="12" fill="#1e3a8a">短期钱不能承受长期波动</text>

    <rect x="42" y="211" width="170" height="74" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="127" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">前提B：人会冲动</text>
    <text x="127" y="262" text-anchor="middle" font-size="12" fill="#991b1b">追涨、翻本、频繁交易</text>

    <rect x="42" y="317" width="170" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="127" y="340" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">前提C：订单有滑点</text>
    <text x="127" y="362" text-anchor="middle" font-size="12" fill="#92400e">价格、溢价、流动性会变</text>

    <rect x="310" y="118" width="180" height="86" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="400" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">先填检查清单</text>
    <text x="400" y="171" text-anchor="middle" font-size="12" fill="#155e75">理由、角色、仓位、失效</text>
    <text x="400" y="190" text-anchor="middle" font-size="12" fill="#155e75">卖出、订单、留痕</text>

    <rect x="310" y="260" width="180" height="86" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="400" y="289" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">红黄绿判定</text>
    <text x="400" y="313" text-anchor="middle" font-size="12" fill="#5b21b6">红灯不做，黄灯降级</text>
    <text x="400" y="332" text-anchor="middle" font-size="12" fill="#5b21b6">绿灯才允许执行</text>

    <rect x="588" y="122" width="170" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="673" y="151" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">正常结论</text>
    <text x="673" y="175" text-anchor="middle" font-size="12" fill="#166534">按计划、按限价、按仓位</text>

    <rect x="588" y="260" width="170" height="80" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="673" y="289" text-anchor="middle" font-size="16" font-weight="700" fill="#9f1239">替代结论</text>
    <text x="673" y="313" text-anchor="middle" font-size="12" fill="#9f1239">延后、减仓、放弃下单</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M212 142 C250 142 268 142 310 156"/>
    <path d="M212 248 C252 248 274 228 310 188"/>
    <path d="M212 346 C256 346 274 322 310 318"/>
    <path d="M400 204 V260"/>
    <path d="M490 293 C540 276 548 226 588 190"/>
    <path d="M490 310 C540 314 548 304 588 304"/>
  </g>

  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">核心因果：因为订单会立刻改变账户风险，所以清单必须在点击确认前完成</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
