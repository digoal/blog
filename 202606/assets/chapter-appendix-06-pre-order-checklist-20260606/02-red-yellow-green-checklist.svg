<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" role="img" aria-label="红黄绿下单检查表">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">一页纸下单检查表</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">每项只允许写红、黄、绿；红灯一票否决，两个黄灯自动降仓或延后</text>

  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="42" y="88" width="714" height="44" rx="8" fill="#111827"/>
    <text x="88" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">模块</text>
    <text x="228" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">检查问题</text>
    <text x="438" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">绿灯标准</text>
    <text x="650" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">红灯动作</text>

    <g fill="#ffffff" stroke="#cbd5e1">
      <rect x="42" y="132" width="714" height="52"/>
      <rect x="42" y="184" width="714" height="52"/>
      <rect x="42" y="236" width="714" height="52"/>
      <rect x="42" y="288" width="714" height="52"/>
      <rect x="42" y="340" width="714" height="52"/>
    </g>

    <g fill="#0f172a">
      <text x="88" y="163" text-anchor="middle" font-weight="700">资金</text>
      <text x="228" y="163" text-anchor="middle">这笔钱多久不用？</text>
      <text x="438" y="163" text-anchor="middle">期限匹配波动</text>
      <text x="650" y="163" text-anchor="middle">短期钱退出</text>

      <text x="88" y="215" text-anchor="middle" font-weight="700">理由</text>
      <text x="228" y="215" text-anchor="middle">买入逻辑能否一句话写清？</text>
      <text x="438" y="215" text-anchor="middle">有数据、有条件</text>
      <text x="650" y="215" text-anchor="middle">只因消息不买</text>

      <text x="88" y="267" text-anchor="middle" font-weight="700">仓位</text>
      <text x="228" y="267" text-anchor="middle">买错最多亏账户多少？</text>
      <text x="438" y="267" text-anchor="middle">亏损在预算内</text>
      <text x="650" y="267" text-anchor="middle">按公式减仓</text>

      <text x="88" y="319" text-anchor="middle" font-weight="700">退出</text>
      <text x="228" y="319" text-anchor="middle">错了、赚了、拖久了怎么办？</text>
      <text x="438" y="319" text-anchor="middle">失效和卖出已写</text>
      <text x="650" y="319" text-anchor="middle">先补计划</text>

      <text x="88" y="371" text-anchor="middle" font-weight="700">执行</text>
      <text x="228" y="371" text-anchor="middle">价格、溢价、价差是否合格？</text>
      <text x="438" y="371" text-anchor="middle">限价和分批明确</text>
      <text x="650" y="371" text-anchor="middle">等待流动性</text>
    </g>
  </g>

  <g font-family="Arial, sans-serif">
    <circle cx="210" cy="424" r="13" fill="#16a34a"/>
    <text x="232" y="429" font-size="13" fill="#166534">绿灯：按计划执行</text>
    <circle cx="394" cy="424" r="13" fill="#f59e0b"/>
    <text x="416" y="429" font-size="13" fill="#92400e">黄灯：减半或延后</text>
    <circle cx="590" cy="424" r="13" fill="#dc2626"/>
    <text x="612" y="429" font-size="13" fill="#991b1b">红灯：不下单</text>
  </g>
</svg>
