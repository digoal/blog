<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="下单前操作流程">
  <rect width="800" height="420" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">从想买到下单：五步流程</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">把按钮动作拆成可检查、可留痕、可复盘的流程</text>

  <g font-family="Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="42" y="122" width="124" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="104" y="151" text-anchor="middle" fill="#1e3a8a">1 想法</text>
    <text x="104" y="174" text-anchor="middle" font-size="12" font-weight="400" fill="#1e3a8a">先写一句话理由</text>

    <rect x="204" y="122" width="124" height="70" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="266" y="151" text-anchor="middle" fill="#155e75">2 填表</text>
    <text x="266" y="174" text-anchor="middle" font-size="12" font-weight="400" fill="#155e75">资金/仓位/退出</text>

    <rect x="366" y="122" width="124" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="428" y="151" text-anchor="middle" fill="#92400e">3 判灯</text>
    <text x="428" y="174" text-anchor="middle" font-size="12" font-weight="400" fill="#92400e">红黄绿定动作</text>

    <rect x="528" y="122" width="124" height="70" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="590" y="151" text-anchor="middle" fill="#166534">4 下单</text>
    <text x="590" y="174" text-anchor="middle" font-size="12" font-weight="400" fill="#166534">限价/分批/金额</text>

    <rect x="366" y="278" width="124" height="70" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="428" y="307" text-anchor="middle" fill="#5b21b6">5 留痕</text>
    <text x="428" y="330" text-anchor="middle" font-size="12" font-weight="400" fill="#5b21b6">记录截图和复查日</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M166 157 H204"/>
    <path d="M328 157 H366"/>
    <path d="M490 157 H528"/>
    <path d="M590 192 C590 248 504 262 474 278"/>
  </g>

  <rect x="92" y="262" width="216" height="92" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="200" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9f1239">红灯回路</text>
  <text x="200" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9f1239">回到计划，不进入交易软件</text>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9f1239">情绪红灯当天停止新增交易</text>

  <g stroke="#e11d48" stroke-width="2" fill="none" marker-end="url(#redArrow)">
    <path d="M374 192 C332 236 278 252 254 262"/>
  </g>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">可复盘的订单，才是计划内交易；不能复盘的订单，通常只是一次冲动</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e11d48"/>
    </marker>
  </defs>
</svg>
