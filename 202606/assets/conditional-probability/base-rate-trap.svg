<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500">
  <rect width="920" height="500" fill="#fbfaf7"/>
  <text x="40" y="48" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#202124">基率陷阱: 条件反过来，答案会变</text>
  <rect x="70" y="96" width="340" height="300" rx="16" fill="#e8f0fe" stroke="#1a73e8" stroke-width="3"/>
  <text x="100" y="142" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#174ea6">你想知道</text>
  <text x="100" y="184" font-size="25" font-family="Arial, sans-serif" fill="#202124">P(有问题 | 测试阳性)</text>
  <text x="100" y="230" font-size="19" font-family="Arial, sans-serif" fill="#3c4043">看到阳性以后</text>
  <text x="100" y="260" font-size="19" font-family="Arial, sans-serif" fill="#3c4043">这个人真的有问题的概率</text>
  <path d="M135 320 L345 320" stroke="#1a73e8" stroke-width="5" stroke-linecap="round"/>
  <path d="M345 320 L318 302 M345 320 L318 338" stroke="#1a73e8" stroke-width="5" stroke-linecap="round"/>
  <text x="122" y="365" font-size="18" font-family="Arial, sans-serif" fill="#174ea6">必须乘上基率</text>
  <rect x="510" y="96" width="340" height="300" rx="16" fill="#fce8e6" stroke="#d93025" stroke-width="3"/>
  <text x="540" y="142" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#a50e0e">常见误读</text>
  <text x="540" y="184" font-size="25" font-family="Arial, sans-serif" fill="#202124">P(测试阳性 | 有问题)</text>
  <text x="540" y="230" font-size="19" font-family="Arial, sans-serif" fill="#3c4043">有问题的人被测出来的概率</text>
  <text x="540" y="260" font-size="19" font-family="Arial, sans-serif" fill="#3c4043">这是检测灵敏度，不是诊断结论</text>
  <path d="M575 320 L785 320" stroke="#d93025" stroke-width="5" stroke-linecap="round"/>
  <path d="M575 320 L602 302 M575 320 L602 338" stroke="#d93025" stroke-width="5" stroke-linecap="round"/>
  <text x="572" y="365" font-size="18" font-family="Arial, sans-serif" fill="#a50e0e">不能直接倒过来用</text>
  <text x="100" y="455" font-size="23" font-family="Arial, sans-serif" fill="#202124">条件概率的第一课: 先问条件是谁，再问目标是谁。</text>
</svg>
