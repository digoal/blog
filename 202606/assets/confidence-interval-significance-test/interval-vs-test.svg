<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">置信区间与显著性检验的关系</title>
  <desc id="desc">图示样本估计值、置信区间、零假设值以及显著性判断之间的关系。</desc>
  <rect width="920" height="420" fill="#fbfaf7"/>
  <text x="40" y="48" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#1f2933">同一件事的两种问法</text>
  <text x="40" y="82" font-size="16" font-family="Arial, sans-serif" fill="#52606d">置信区间问: 真值可能落在哪个范围？显著性检验问: 默认假设还撑得住吗？</text>

  <line x1="90" y1="225" x2="830" y2="225" stroke="#9aa5b1" stroke-width="3"/>
  <line x1="170" y1="214" x2="170" y2="236" stroke="#52606d" stroke-width="3"/>
  <line x1="750" y1="214" x2="750" y2="236" stroke="#52606d" stroke-width="3"/>
  <text x="150" y="266" font-size="15" font-family="Arial, sans-serif" fill="#52606d">较小效应</text>
  <text x="728" y="266" font-size="15" font-family="Arial, sans-serif" fill="#52606d">较大效应</text>

  <line x1="355" y1="225" x2="655" y2="225" stroke="#2563eb" stroke-width="14" stroke-linecap="round"/>
  <circle cx="505" cy="225" r="13" fill="#1d4ed8"/>
  <text x="440" y="190" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">样本估计值</text>
  <text x="368" y="307" font-size="17" font-family="Arial, sans-serif" fill="#1d4ed8">95% 置信区间: 估计值 ± 误差范围</text>

  <line x1="300" y1="150" x2="300" y2="310" stroke="#dc2626" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="242" y="132" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#dc2626">零假设值</text>
  <text x="185" y="334" font-size="15" font-family="Arial, sans-serif" fill="#dc2626">若区间不包含它，通常对应显著结果</text>

  <rect x="46" y="352" width="828" height="42" rx="8" fill="#eef2ff"/>
  <text x="66" y="379" font-size="17" font-family="Arial, sans-serif" fill="#1f2933">关键边界: 这个关系依赖同一模型、同一双侧检验、同一显著性水平和合格抽样。</text>
</svg>
