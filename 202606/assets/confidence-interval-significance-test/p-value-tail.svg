<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-labelledby="title desc">
  <title id="title">p 值的尾部概率含义</title>
  <desc id="desc">图示在零假设成立时，观察到当前或更极端结果的尾部概率。</desc>
  <rect width="920" height="460" fill="#fffdf8"/>
  <text x="40" y="50" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#1f2933">p 值不是“假设为真的概率”</text>
  <text x="40" y="84" font-size="16" font-family="Arial, sans-serif" fill="#52606d">它是在零假设成立时，看到当前这么极端或更极端数据的概率。</text>

  <line x1="80" y1="350" x2="840" y2="350" stroke="#9aa5b1" stroke-width="3"/>
  <path d="M100 350 C170 345, 205 315, 245 260 C300 180, 365 120, 460 120 C555 120, 620 180, 675 260 C715 315, 750 345, 820 350"
        fill="none" stroke="#334e68" stroke-width="5"/>
  <path d="M675 260 C715 315, 750 345, 820 350 L675 350 Z" fill="#f97316" opacity="0.75"/>
  <path d="M245 260 C205 315, 170 345, 100 350 L245 350 Z" fill="#f97316" opacity="0.35"/>

  <line x1="460" y1="118" x2="460" y2="366" stroke="#64748b" stroke-width="3" stroke-dasharray="7 7"/>
  <text x="400" y="394" font-size="16" font-family="Arial, sans-serif" fill="#52606d">零假设中心</text>

  <line x1="675" y1="252" x2="675" y2="366" stroke="#dc2626" stroke-width="4"/>
  <text x="640" y="232" font-size="17" font-family="Arial, sans-serif" font-weight="700" fill="#dc2626">观察值</text>
  <text x="682" y="310" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">尾部面积 = p 值</text>

  <rect x="70" y="20" width="0" height="0" fill="none"/>
  <rect x="84" y="404" width="752" height="34" rx="7" fill="#fff7ed"/>
  <text x="102" y="427" font-size="16" font-family="Arial, sans-serif" fill="#7c2d12">p 很小只说明“若零假设为真，这组数据少见”；不自动说明效应大、因果真、研究可靠。</text>
</svg>
