<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">相关关系背后的三种因果结构</title>
  <desc id="desc">展示 A 导致 B、B 导致 A、共同原因 C 同时导致 A 和 B 三种结构。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .cause { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; fill: #0f172a; font-size: 22px; font-weight: 700; }
      .small { font-family: Arial, sans-serif; fill: #475569; font-size: 17px; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="28" y="34" width="280" height="430" class="panel"/>
  <rect x="340" y="34" width="280" height="430" class="panel"/>
  <rect x="652" y="34" width="280" height="430" class="panel"/>

  <text x="168" y="78" text-anchor="middle" class="text">直接因果</text>
  <circle cx="105" cy="220" r="46" class="cause"/>
  <circle cx="230" cy="220" r="46" class="node"/>
  <path d="M151 220 H184" class="arrow"/>
  <text x="105" y="228" text-anchor="middle" class="text">A</text>
  <text x="230" y="228" text-anchor="middle" class="text">B</text>
  <text x="168" y="325" text-anchor="middle" class="small">A 改变了 B 的分布</text>
  <text x="168" y="355" text-anchor="middle" class="small">例如随机试验中的处理</text>

  <text x="480" y="78" text-anchor="middle" class="text">反向因果</text>
  <circle cx="417" cy="220" r="46" class="node"/>
  <circle cx="542" cy="220" r="46" class="cause"/>
  <path d="M496 220 H463" class="arrow"/>
  <text x="417" y="228" text-anchor="middle" class="text">A</text>
  <text x="542" y="228" text-anchor="middle" class="text">B</text>
  <text x="480" y="325" text-anchor="middle" class="small">看似 A 解释 B</text>
  <text x="480" y="355" text-anchor="middle" class="small">实际可能是 B 先发生</text>

  <text x="792" y="78" text-anchor="middle" class="text">共同原因</text>
  <circle cx="792" cy="150" r="46" class="cause"/>
  <circle cx="730" cy="300" r="46" class="node"/>
  <circle cx="854" cy="300" r="46" class="node"/>
  <path d="M775 193 L746 257" class="arrow"/>
  <path d="M809 193 L838 257" class="arrow"/>
  <text x="792" y="158" text-anchor="middle" class="text">C</text>
  <text x="730" y="308" text-anchor="middle" class="text">A</text>
  <text x="854" y="308" text-anchor="middle" class="text">B</text>
  <text x="792" y="405" text-anchor="middle" class="small">C 同时推高 A 和 B</text>
  <text x="792" y="435" text-anchor="middle" class="small">A 与 B 相关但未必互相导致</text>
</svg>
