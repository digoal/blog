<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">从相关判断走向因果判断的证据阶梯</title>
  <desc id="desc">展示从观察相关到控制混杂、时间顺序、自然实验、随机试验的证据强度递进。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <style>
      .step { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 16; }
      .weak { fill: #fef2f2; stroke: #dc2626; }
      .strong { fill: #f0fdf4; stroke: #16a34a; }
      .text { font-family: Arial, sans-serif; fill: #0f172a; font-size: 21px; font-weight: 700; }
      .small { font-family: Arial, sans-serif; fill: #475569; font-size: 16px; }
      .arrow { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="480" y="48" text-anchor="middle" class="text">因果判断不是一句话，是证据逐级加固</text>

  <rect x="60" y="105" width="170" height="120" class="step weak"/>
  <text x="145" y="150" text-anchor="middle" class="text">看到相关</text>
  <text x="145" y="185" text-anchor="middle" class="small">A 和 B 一起变</text>

  <rect x="280" y="105" width="170" height="120" class="step"/>
  <text x="365" y="150" text-anchor="middle" class="text">检查时间</text>
  <text x="365" y="185" text-anchor="middle" class="small">原因必须先于结果</text>

  <rect x="500" y="105" width="170" height="120" class="step"/>
  <text x="585" y="150" text-anchor="middle" class="text">控制混杂</text>
  <text x="585" y="185" text-anchor="middle" class="small">排查共同原因 C</text>

  <rect x="720" y="105" width="170" height="120" class="step strong"/>
  <text x="805" y="150" text-anchor="middle" class="text">干预验证</text>
  <text x="805" y="185" text-anchor="middle" class="small">改变 A 后观察 B</text>

  <path d="M230 165 H270" class="arrow"/>
  <path d="M450 165 H490" class="arrow"/>
  <path d="M670 165 H710" class="arrow"/>

  <rect x="130" y="310" width="700" height="95" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="18"/>
  <text x="480" y="350" text-anchor="middle" class="text">关键问题</text>
  <text x="480" y="385" text-anchor="middle" class="small">如果我们只改变 A，其他条件尽量不变，B 会不会系统性改变？</text>
  <text x="480" y="455" text-anchor="middle" class="small">答案越接近“会”，因果主张越强；答案越依赖观察相关，主张越弱。</text>
</svg>
