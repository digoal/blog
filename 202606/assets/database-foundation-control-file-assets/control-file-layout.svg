<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">pg_control 文件结构</title>
  <desc id="desc">展示 PostgreSQL global/pg_control 的物理文件大小、有效结构体区域、字段分组和 CRC 校验位置。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .section { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 6; }
    .section2 { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 6; }
    .section3 { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 6; }
    .section4 { fill: #f1f5f9; stroke: #475569; stroke-width: 1.5; rx: 6; }
    .crc { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 6; }
    .zero { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 6; rx: 6; }
    .title { font: 700 26px sans-serif; fill: #0f172a; }
    .h { font: 700 17px sans-serif; fill: #0f172a; }
    .t { font: 14px sans-serif; fill: #1e293b; }
    .small { font: 12px sans-serif; fill: #475569; }
    .mono { font: 13px monospace; fill: #0f172a; }
  </style>
  <rect class="bg" x="0" y="0" width="1100" height="720"/>
  <text class="title" x="48" y="52">global/pg_control：一个小文件，保存实例恢复所需的最小事实</text>
  <text class="t" x="48" y="82">路径来自 XLOG_CONTROL_FILE；它不是表，也不走 MVCC，而是由 WAL/检查点代码直接读写。</text>

  <rect class="panel" x="48" y="120" width="1004" height="520"/>
  <text class="h" x="76" y="154">物理文件：PG_CONTROL_FILE_SIZE = 8192 字节</text>
  <text class="small" x="76" y="178">写入时按固定大小落盘，未使用部分补零，减少旧版本或短读时的误判。</text>

  <rect class="section" x="78" y="210" width="420" height="70"/>
  <text class="h" x="100" y="238">身份与版本</text>
  <text class="mono" x="100" y="262">system_identifier, pg_control_version, catalog_version_no</text>

  <rect class="section3" x="78" y="296" width="420" height="92"/>
  <text class="h" x="100" y="324">状态与检查点</text>
  <text class="mono" x="100" y="348">state, time, checkPoint</text>
  <text class="mono" x="100" y="370">checkPointCopy.redo, nextXid, timeline, fullPageWrites</text>

  <rect class="section2" x="78" y="404" width="420" height="100"/>
  <text class="h" x="100" y="432">恢复护栏</text>
  <text class="mono" x="100" y="456">minRecoveryPoint, minRecoveryPointTLI</text>
  <text class="mono" x="100" y="478">backupStartPoint, backupEndPoint, backupEndRequired</text>

  <rect class="section4" x="78" y="520" width="420" height="78"/>
  <text class="h" x="100" y="548">WAL 与运行参数</text>
  <text class="mono" x="100" y="572">wal_level, wal_log_hints, max_connections...</text>

  <rect class="section" x="546" y="210" width="370" height="112"/>
  <text class="h" x="568" y="238">存储格式兼容性</text>
  <text class="mono" x="568" y="262">BLCKSZ, XLOG_BLCKSZ, xlog_seg_size</text>
  <text class="mono" x="568" y="284">MAXALIGN, NAMEDATALEN, INDEX_MAX_KEYS</text>
  <text class="small" x="568" y="306">启动时先验证，避免错误二进制写坏数据目录。</text>

  <rect class="section3" x="546" y="338" width="370" height="80"/>
  <text class="h" x="568" y="366">校验与平台信息</text>
  <text class="mono" x="568" y="390">data_checksum_version, default_char_signedness</text>

  <rect class="section2" x="546" y="434" width="370" height="72"/>
  <text class="h" x="568" y="462">集群级随机量</text>
  <text class="mono" x="568" y="486">mock_authentication_nonce</text>

  <rect class="crc" x="546" y="522" width="370" height="76"/>
  <text class="h" x="568" y="550">CRC32C</text>
  <text class="mono" x="568" y="574">crc 必须放在 ControlFileData 最后</text>

  <rect class="zero" x="940" y="210" width="72" height="388"/>
  <text class="h" transform="translate(984 400) rotate(-90)">补零区域</text>

  <line x1="78" y1="650" x2="498" y2="650" stroke="#0f172a" stroke-width="3"/>
  <line x1="546" y1="650" x2="916" y2="650" stroke="#0f172a" stroke-width="3"/>
  <line x1="940" y1="650" x2="1012" y2="650" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 6"/>
  <text class="small" x="78" y="675">有效结构体：sizeof(ControlFileData) 必须小于等于 512 字节，便于原子扇区写</text>
  <text class="small" x="650" y="675">物理文件固定 8192 字节</text>
</svg>
