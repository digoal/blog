<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">pg_control 更新生命周期</title>
  <desc id="desc">展示 initdb、普通检查点、恢复重启点、参数变化和 checksum 状态变化如何更新 pg_control。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .wal { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .disk { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .title { font: 700 26px sans-serif; fill: #0f172a; }
    .h { font: 700 17px sans-serif; fill: #0f172a; }
    .t { font: 14px sans-serif; fill: #1e293b; }
    .small { font: 12px sans-serif; fill: #475569; }
    .mono { font: 13px monospace; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1120" height="760"/>
  <text class="title" x="48" y="52">什么时候写 pg_control：只在“实例级事实”变化时写</text>
  <text class="t" x="48" y="82">写入路径会重新计算 CRC，并可 fsync；后台代码要求持有 ControlFileLock 后再改共享镜像。</text>

  <rect class="box" x="58" y="130" width="220" height="112"/>
  <text class="h" x="82" y="162">initdb / BootstrapXLOG</text>
  <text class="small" x="82" y="188">创建第一个 WAL 段</text>
  <text class="small" x="82" y="210">写初始 shutdown checkpoint</text>
  <text class="mono" x="82" y="232">state = DB_SHUTDOWNED</text>

  <rect class="wal" x="430" y="130" width="230" height="112"/>
  <text class="h" x="454" y="162">WriteControlFile()</text>
  <text class="small" x="454" y="188">填版本、存储兼容字段</text>
  <text class="small" x="454" y="210">写 8192 字节并 fsync</text>
  <text class="mono" x="454" y="232">crc = CRC32C(fields)</text>

  <rect class="disk" x="822" y="130" width="220" height="112"/>
  <text class="h" x="846" y="162">global/pg_control</text>
  <text class="small" x="846" y="188">持久化最新控制信息</text>
  <text class="small" x="846" y="210">供下次启动读取</text>

  <path class="arrow" d="M 278 186 L 430 186"/>
  <path class="arrow" d="M 660 186 L 822 186"/>

  <rect class="box" x="58" y="326" width="220" height="132"/>
  <text class="h" x="82" y="358">普通 checkpoint</text>
  <text class="small" x="82" y="384">确定 redo LSN</text>
  <text class="small" x="82" y="406">刷脏页与事务状态</text>
  <text class="small" x="82" y="428">插入 checkpoint WAL 记录</text>
  <text class="mono" x="82" y="450">XLogFlush(recptr)</text>

  <rect class="wal" x="430" y="326" width="230" height="132"/>
  <text class="h" x="454" y="358">UpdateControlFile()</text>
  <text class="small" x="454" y="384">更新 checkPoint</text>
  <text class="small" x="454" y="406">复制 CheckPoint 结构</text>
  <text class="small" x="454" y="428">清 crash recovery 的 minRecoveryPoint</text>
  <text class="mono" x="454" y="450">ControlFileLock(EXCLUSIVE)</text>

  <path class="arrow" d="M 278 392 L 430 392"/>
  <path class="arrow" d="M 660 392 L 822 392"/>

  <rect class="warn" x="58" y="542" width="220" height="132"/>
  <text class="h" x="82" y="574">恢复 / restartpoint</text>
  <text class="small" x="82" y="600">已重放安全 checkpoint</text>
  <text class="small" x="82" y="622">刷恢复期间状态</text>
  <text class="small" x="82" y="644">推进 minRecoveryPoint</text>
  <text class="mono" x="82" y="666">state = DB_IN_ARCHIVE_RECOVERY</text>

  <rect class="wal" x="430" y="542" width="230" height="132"/>
  <text class="h" x="454" y="574">重写控制文件</text>
  <text class="small" x="454" y="600">记录 restartpoint</text>
  <text class="small" x="454" y="622">记录恢复必须到达的 LSN</text>
  <text class="small" x="454" y="644">记录 checksum 状态</text>
  <text class="mono" x="454" y="666">fsync(pg_control)</text>

  <path class="arrow" d="M 278 608 L 430 608"/>
  <path class="arrow" d="M 660 608 L 822 608"/>

  <rect class="disk" x="822" y="326" width="220" height="348"/>
  <text class="h" x="846" y="358">下次启动看到的事实</text>
  <text class="small" x="846" y="390">最新 checkpoint 位置</text>
  <text class="small" x="846" y="416">REDO 起点与 timeline</text>
  <text class="small" x="846" y="442">数据库状态</text>
  <text class="small" x="846" y="468">恢复下限</text>
  <text class="small" x="846" y="494">在线备份边界</text>
  <text class="small" x="846" y="520">WAL 相关参数</text>
  <text class="small" x="846" y="546">数据校验状态</text>
  <line x1="846" y1="578" x2="1018" y2="578" stroke="#94a3b8"/>
  <text class="small" x="846" y="608">参数变化、pg_checksums 也会更新</text>
  <text class="small" x="846" y="632">但业务 DML 不直接改 pg_control</text>
</svg>
