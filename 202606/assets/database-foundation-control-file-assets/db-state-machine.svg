<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" role="img" aria-labelledby="title desc">
  <title id="title">pg_control 中的数据库状态机</title>
  <desc id="desc">展示 DBState 枚举在正常启动、关闭、崩溃恢复、归档恢复中的主要转换关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .state { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .good { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .recover { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .title { font: 700 26px sans-serif; fill: #0f172a; }
    .h { font: 700 16px sans-serif; fill: #0f172a; }
    .t { font: 13px sans-serif; fill: #1e293b; }
    .small { font: 12px sans-serif; fill: #475569; }
    .mono { font: 13px monospace; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1080" height="700"/>
  <text class="title" x="48" y="52">DBState：启动时判断“上次发生了什么”的第一信号</text>
  <text class="t" x="48" y="82">状态不是锁，也不是事务日志；它是控制文件中的实例级状态提示，必须结合 checkpoint 和 WAL 验证。</text>

  <rect class="good" x="420" y="120" width="240" height="82"/>
  <text class="h" x="452" y="152">DB_SHUTDOWNED</text>
  <text class="small" x="452" y="176">干净关闭后的状态</text>

  <rect class="good" x="420" y="292" width="240" height="82"/>
  <text class="h" x="452" y="324">DB_IN_PRODUCTION</text>
  <text class="small" x="452" y="348">正常对外服务</text>

  <rect class="warn" x="752" y="292" width="240" height="82"/>
  <text class="h" x="784" y="324">DB_SHUTDOWNING</text>
  <text class="small" x="784" y="348">shutdown checkpoint 进行中</text>

  <rect class="bad" x="86" y="292" width="240" height="82"/>
  <text class="h" x="118" y="324">DB_IN_CRASH_RECOVERY</text>
  <text class="small" x="118" y="348">未干净关闭后自动恢复</text>

  <rect class="recover" x="86" y="500" width="240" height="82"/>
  <text class="h" x="118" y="532">DB_IN_ARCHIVE_RECOVERY</text>
  <text class="small" x="118" y="556">PITR / standby / backup recovery</text>

  <rect class="recover" x="420" y="500" width="260" height="82"/>
  <text class="h" x="452" y="532">DB_SHUTDOWNED_IN_RECOVERY</text>
  <text class="small" x="452" y="556">恢复中干净关闭</text>

  <rect class="state" x="752" y="500" width="240" height="82"/>
  <text class="h" x="784" y="532">DB_STARTUP</text>
  <text class="small" x="784" y="556">枚举保留，启动路径会识别</text>

  <path class="arrow" d="M 540 202 L 540 292"/>
  <text class="small" x="556" y="254">启动完成</text>
  <path class="arrow" d="M 660 333 L 752 333"/>
  <text class="small" x="680" y="318">开始关闭</text>
  <path class="arrow" d="M 872 292 C 850 166 700 160 660 160"/>
  <text class="small" x="760" y="176">shutdown checkpoint 成功</text>
  <path class="arrow" d="M 420 333 L 326 333"/>
  <text class="small" x="340" y="318">崩溃/中断后重启</text>
  <path class="arrow" d="M 326 333 C 380 270 470 250 540 292"/>
  <text class="small" x="330" y="266">REDO 完成</text>
  <path class="arrow" d="M 206 374 L 206 500"/>
  <text class="small" x="222" y="444">进入归档恢复</text>
  <path class="arrow" d="M 326 541 L 420 541"/>
  <text class="small" x="342" y="526">恢复中干净停机</text>
  <path class="arrow" d="M 550 500 C 520 440 500 396 520 374"/>
  <text class="small" x="536" y="446">继续恢复或完成恢复</text>
  <path class="arrow" d="M 206 500 C 270 410 350 370 420 350"/>
  <text class="small" x="260" y="418">到达一致点并结束恢复</text>
</svg>
