<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">pg_control 运维边界</title>
  <desc id="desc">展示 pg_controldata、SQL 函数、base backup 和 pg_resetwal 围绕 pg_control 的使用边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .safe { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .read { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .danger { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .neutral { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .title { font: 700 26px sans-serif; fill: #0f172a; }
    .h { font: 700 16px sans-serif; fill: #0f172a; }
    .t { font: 13px sans-serif; fill: #1e293b; }
    .small { font: 12px sans-serif; fill: #475569; }
    .mono { font: 13px monospace; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1120" height="760"/>
  <text class="title" x="48" y="52">运维边界：多数时候只读，只有极少数工具能改</text>
  <text class="t" x="48" y="82">pg_control 是恢复锚点，不是人工配置文件。误改后的问题通常不是“启动不了”，而是“启动后不再可信”。</text>

  <rect class="neutral" x="430" y="128" width="270" height="116"/>
  <text class="h" x="462" y="160">global/pg_control</text>
  <text class="small" x="462" y="186">最新 checkpoint 与恢复下限</text>
  <text class="small" x="462" y="208">集群身份与存储兼容字段</text>
  <text class="mono" x="462" y="230">CRC32C protected</text>

  <rect class="read" x="68" y="128" width="250" height="116"/>
  <text class="h" x="100" y="160">pg_controldata</text>
  <text class="small" x="100" y="186">离线或在线读文件</text>
  <text class="small" x="100" y="208">CRC 不匹配时给警告</text>
  <text class="small" x="100" y="230">不修改数据目录</text>

  <rect class="read" x="802" y="128" width="250" height="116"/>
  <text class="h" x="834" y="160">SQL 函数</text>
  <text class="mono" x="834" y="186">pg_control_system()</text>
  <text class="mono" x="834" y="208">pg_control_checkpoint()</text>
  <text class="mono" x="834" y="230">pg_control_recovery()</text>

  <rect class="safe" x="68" y="342" width="250" height="130"/>
  <text class="h" x="100" y="374">pg_basebackup</text>
  <text class="small" x="100" y="400">先发送 backup_label</text>
  <text class="small" x="100" y="422">复制主体文件</text>
  <text class="small" x="100" y="444">最后复制 pg_control</text>

  <rect class="warn" x="430" y="342" width="270" height="130"/>
  <text class="h" x="462" y="374">备份恢复</text>
  <text class="small" x="462" y="400">有 backup_label 时</text>
  <text class="small" x="462" y="422">恢复从 label 指向的 checkpoint 开始</text>
  <text class="small" x="462" y="444">不能盲信备份中的 pg_control</text>

  <rect class="danger" x="802" y="342" width="250" height="130"/>
  <text class="h" x="834" y="374">pg_resetwal</text>
  <text class="small" x="834" y="400">最后手段</text>
  <text class="small" x="834" y="422">只在停库且常规启动失败时考虑</text>
  <text class="small" x="834" y="444">启动后立即 dump/initdb/restore</text>

  <rect class="neutral" x="68" y="580" width="984" height="92"/>
  <text class="h" x="100" y="612">判断原则</text>
  <text class="small" x="100" y="638">能从备份和 WAL 正常恢复，就不要重置 WAL；能读 pg_control，就不要手工猜字段；能只读诊断，就不要让工具改数据目录。</text>
  <text class="small" x="100" y="660">如果被迫使用 pg_resetwal，数据库后续应被当作“临时取数容器”，而不是继续承载生产写入。</text>

  <path class="arrow" d="M 318 186 L 430 186"/>
  <path class="arrow" d="M 802 186 L 700 186"/>
  <path class="arrow" d="M 318 407 L 430 407"/>
  <path class="arrow" d="M 700 407 L 802 407"/>
  <path class="arrow" d="M 565 244 L 565 342"/>
</svg>
