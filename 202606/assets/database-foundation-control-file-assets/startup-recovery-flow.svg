<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="780" viewBox="0 0 1160 780" role="img" aria-labelledby="title desc">
  <title id="title">启动恢复如何使用 pg_control</title>
  <desc id="desc">展示 PostgreSQL 启动时读取 pg_control、校验兼容性、选择 checkpoint、判断是否执行 WAL REDO 的流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .check { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .decision { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
    .redo { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .stop { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
    .title { font: 700 26px sans-serif; fill: #0f172a; }
    .h { font: 700 16px sans-serif; fill: #0f172a; }
    .t { font: 13px sans-serif; fill: #1e293b; }
    .small { font: 12px sans-serif; fill: #475569; }
    .mono { font: 13px monospace; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1160" height="780"/>
  <text class="title" x="48" y="52">启动恢复路径：pg_control 先定方向，WAL checkpoint 再给细节</text>
  <text class="t" x="48" y="82">如果有 backup_label，恢复起点以 backup_label 指向的 checkpoint 为准；否则使用 pg_control 中的最新 checkpoint。</text>

  <rect class="step" x="60" y="126" width="230" height="92"/>
  <text class="h" x="84" y="158">postmaster 基本检查</text>
  <text class="small" x="84" y="184">确认 PGDATA/global/pg_control 存在</text>
  <text class="small" x="84" y="204">此处不验证内容</text>

  <rect class="check" x="410" y="126" width="250" height="92"/>
  <text class="h" x="434" y="158">ReadControlFile()</text>
  <text class="small" x="434" y="184">读取 ControlFileData</text>
  <text class="small" x="434" y="204">校验版本、CRC、存储兼容性</text>

  <polygon class="decision" points="835,120 965,172 835,224 705,172"/>
  <text class="h" x="779" y="164">有 backup_label?</text>
  <text class="small" x="790" y="188">在线备份/PITR</text>

  <rect class="check" x="500" y="316" width="250" height="100"/>
  <text class="h" x="524" y="348">读取指定 checkpoint</text>
  <text class="small" x="524" y="374">有 backup_label：读 label 指向位置</text>
  <text class="small" x="524" y="394">无 backup_label：读 pg_control.checkPoint</text>

  <polygon class="decision" points="875,310 1015,366 875,422 735,366"/>
  <text class="h" x="808" y="358">是否需要 REDO?</text>
  <text class="small" x="795" y="382">状态非 clean / 有恢复信号</text>

  <rect class="redo" x="500" y="520" width="270" height="116"/>
  <text class="h" x="524" y="552">PerformWalRecovery()</text>
  <text class="small" x="524" y="578">从 CheckPoint.redo 向前扫描 WAL</text>
  <text class="small" x="524" y="600">直到一致点、恢复目标或 WAL 尾部</text>
  <text class="mono" x="524" y="622">minRecoveryPoint 防止回退启动</text>

  <rect class="step" x="875" y="520" width="220" height="116"/>
  <text class="h" x="899" y="552">进入生产状态</text>
  <text class="small" x="899" y="578">恢复结束或无需恢复</text>
  <text class="mono" x="899" y="600">state = DB_IN_PRODUCTION</text>
  <text class="small" x="899" y="622">后续 checkpoint 再刷新 pg_control</text>

  <rect class="stop" x="60" y="520" width="260" height="116"/>
  <text class="h" x="84" y="552">启动失败</text>
  <text class="small" x="84" y="578">版本/CRC/兼容性错误</text>
  <text class="small" x="84" y="600">找不到 checkpoint 或 REDO 位置</text>
  <text class="small" x="84" y="622">不能继续写入数据目录</text>

  <path class="arrow" d="M 290 172 L 410 172"/>
  <path class="arrow" d="M 660 172 L 705 172"/>
  <path class="arrow" d="M 835 224 C 830 270 760 294 690 316"/>
  <text class="small" x="775" y="268">是</text>
  <path class="arrow" d="M 705 172 C 600 205 550 254 545 316"/>
  <text class="small" x="608" y="238">否</text>
  <path class="arrow" d="M 750 366 L 735 366"/>
  <path class="arrow" d="M 875 422 L 680 520"/>
  <text class="small" x="762" y="480">是</text>
  <path class="arrow" d="M 1015 366 C 1084 402 1060 480 1010 520"/>
  <text class="small" x="1034" y="432">否</text>
  <path class="arrow" d="M 770 578 L 875 578"/>
  <path class="arrow" d="M 410 204 C 280 280 190 396 190 520"/>
  <text class="small" x="248" y="380">校验失败</text>
</svg>
