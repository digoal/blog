<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img">
  <title>auto_explain 的生产观测路径</title>
  <desc>展示 auto_explain 通过 ExecutorStart、ExecutorRun、ExecutorFinish、ExecutorEnd 钩子采样慢查询并输出执行计划。</desc>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b556e"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .hook { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .gate { fill: #fff7ed; stroke: #d97706; stroke-width: 2; rx: 8; }
      .log { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 8; }
      .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #172033; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #34495e; }
      .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
      .line { stroke: #3b556e; stroke-width: 2; fill: none; marker-end: url(#arrow5); }
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="580" fill="#ffffff" stroke="#d6dee8" stroke-width="1"/>
  <text x="560" y="55" text-anchor="middle" class="text" font-size="24">auto_explain：把慢查询计划记录搬到生产执行路径上</text>

  <rect x="70" y="110" width="180" height="80" class="box"/>
  <text x="160" y="140" text-anchor="middle" class="text">生产 SQL</text>
  <text x="160" y="164" text-anchor="middle" class="small">普通业务执行</text>

  <rect x="320" y="110" width="190" height="80" class="hook"/>
  <text x="415" y="140" text-anchor="middle" class="text">ExecutorStart hook</text>
  <text x="415" y="164" text-anchor="middle" class="small">按 sample_rate 抽样</text>

  <rect x="580" y="110" width="210" height="80" class="gate"/>
  <text x="685" y="140" text-anchor="middle" class="text">打开 instrumentation</text>
  <text x="685" y="164" text-anchor="middle" class="small">log_analyze 时收集节点数据</text>

  <rect x="850" y="110" width="180" height="80" class="box"/>
  <text x="940" y="140" text-anchor="middle" class="text">ExecutorRun</text>
  <text x="940" y="164" text-anchor="middle" class="small">照常执行 SQL</text>

  <path class="line" d="M250 150 H320"/>
  <path class="line" d="M510 150 H580"/>
  <path class="line" d="M790 150 H850"/>

  <rect x="150" y="305" width="210" height="90" class="hook"/>
  <text x="255" y="336" text-anchor="middle" class="text">ExecutorEnd hook</text>
  <text x="255" y="360" text-anchor="middle" class="small">读取 query_instr 总耗时</text>
  <text x="255" y="380" text-anchor="middle" class="tiny">msec &gt;= log_min_duration</text>

  <rect x="450" y="305" width="220" height="90" class="gate"/>
  <text x="560" y="336" text-anchor="middle" class="text">构造 ExplainState</text>
  <text x="560" y="360" text-anchor="middle" class="small">verbose / buffers / wal / format</text>
  <text x="560" y="380" text-anchor="middle" class="tiny">可应用扩展 EXPLAIN 选项</text>

  <rect x="760" y="305" width="210" height="90" class="log"/>
  <text x="865" y="336" text-anchor="middle" class="text">写日志</text>
  <text x="865" y="360" text-anchor="middle" class="small">duration + plan</text>
  <text x="865" y="380" text-anchor="middle" class="tiny">LOG / DEBUG / WARNING 等级</text>

  <path class="line" d="M940 190 C940 245 255 245 255 305"/>
  <path class="line" d="M360 350 H450"/>
  <path class="line" d="M670 350 H760"/>

  <rect x="110" y="475" width="890" height="76" class="box"/>
  <text x="140" y="505" class="text" font-size="19">工程要点</text>
  <text x="140" y="530" class="small">1. 默认不输出任何结果，必须设置 log_min_duration；2. log_analyze 才有实际节点指标；3. timing、buffers、WAL、I/O 会增加观测开销；4. 参数记录要控制长度。</text>
</svg>
