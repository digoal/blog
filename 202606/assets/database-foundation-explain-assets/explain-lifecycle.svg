<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img">
  <title>EXPLAIN 从 SQL 到输出的生命周期</title>
  <desc>展示 PostgreSQL EXPLAIN 命令从解析、重写、规划到可选执行和输出计划的主路径，并区分普通 EXPLAIN 与 EXPLAIN ANALYZE。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b556e"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #35506b; stroke-width: 2; rx: 8; }
      .box2 { fill: #eef6ff; stroke: #1d5f99; stroke-width: 2; rx: 8; }
      .box3 { fill: #fff7ed; stroke: #b45309; stroke-width: 2; rx: 8; }
      .safe { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 8; }
      .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #172033; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #34495e; }
      .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
      .line { stroke: #3b556e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="600" fill="#ffffff" stroke="#d6dee8" stroke-width="1"/>
  <text x="560" y="55" text-anchor="middle" class="text" font-size="24">EXPLAIN 的生命周期：先规划，ANALYZE 才执行</text>

  <rect x="60" y="105" width="150" height="70" class="box"/>
  <text x="135" y="132" text-anchor="middle" class="text">SQL 文本</text>
  <text x="135" y="155" text-anchor="middle" class="small">EXPLAIN ...</text>

  <rect x="270" y="105" width="170" height="70" class="box"/>
  <text x="355" y="132" text-anchor="middle" class="text">解析</text>
  <text x="355" y="155" text-anchor="middle" class="small">ExplainStmt + 选项</text>

  <rect x="500" y="105" width="170" height="70" class="box2"/>
  <text x="585" y="132" text-anchor="middle" class="text">ExplainQuery</text>
  <text x="585" y="155" text-anchor="middle" class="small">utility 命令入口</text>

  <rect x="730" y="105" width="170" height="70" class="box2"/>
  <text x="815" y="132" text-anchor="middle" class="text">QueryRewrite</text>
  <text x="815" y="155" text-anchor="middle" class="small">规则重写</text>

  <rect x="500" y="245" width="170" height="78" class="box2"/>
  <text x="585" y="273" text-anchor="middle" class="text">pg_plan_query</text>
  <text x="585" y="296" text-anchor="middle" class="small">生成 PlannedStmt</text>

  <rect x="730" y="245" width="180" height="78" class="box"/>
  <text x="820" y="273" text-anchor="middle" class="text">估算字段</text>
  <text x="820" y="296" text-anchor="middle" class="small">cost / rows / width</text>

  <rect x="265" y="380" width="190" height="88" class="safe"/>
  <text x="360" y="410" text-anchor="middle" class="text">普通 EXPLAIN</text>
  <text x="360" y="434" text-anchor="middle" class="small">EXEC_FLAG_EXPLAIN_ONLY</text>
  <text x="360" y="454" text-anchor="middle" class="tiny">初始化执行树，不跑查询</text>

  <rect x="520" y="380" width="210" height="88" class="box3"/>
  <text x="625" y="410" text-anchor="middle" class="text">EXPLAIN ANALYZE</text>
  <text x="625" y="434" text-anchor="middle" class="small">ExecutorRun + Finish</text>
  <text x="625" y="454" text-anchor="middle" class="tiny">真实执行，收集 runtime stats</text>

  <rect x="790" y="380" width="190" height="88" class="box3"/>
  <text x="885" y="410" text-anchor="middle" class="text">Instrumentation</text>
  <text x="885" y="434" text-anchor="middle" class="small">time / rows / loops</text>
  <text x="885" y="454" text-anchor="middle" class="tiny">buffers / WAL / I/O</text>

  <rect x="415" y="535" width="240" height="70" class="box2"/>
  <text x="535" y="563" text-anchor="middle" class="text">ExplainPrintPlan</text>
  <text x="535" y="586" text-anchor="middle" class="small">TEXT / JSON / XML / YAML</text>

  <rect x="735" y="535" width="205" height="70" class="box"/>
  <text x="837" y="563" text-anchor="middle" class="text">QUERY PLAN</text>
  <text x="837" y="586" text-anchor="middle" class="small">计划 + 可选执行指标</text>

  <path class="line" d="M210 140 H270"/>
  <path class="line" d="M440 140 H500"/>
  <path class="line" d="M670 140 H730"/>
  <path class="line" d="M815 175 V215 H585 V245"/>
  <path class="line" d="M670 284 H730"/>
  <path class="line" d="M585 323 V350 H360 V380"/>
  <path class="line" d="M585 323 V380"/>
  <path class="line" d="M730 424 H790"/>
  <path class="line" d="M360 468 V500 H535 V535"/>
  <path class="line" d="M885 468 V500 H535 V535"/>
  <path class="line" d="M655 570 H735"/>
  <path class="dash" d="M820 323 V350 H625 V380"/>

  <text x="124" y="220" class="small">关键边界</text>
  <text x="124" y="246" class="tiny">Planning Time 不含解析/重写</text>
  <text x="124" y="266" class="tiny">Execution Time 只在 ANALYZE 后报告</text>
  <text x="124" y="286" class="tiny">普通 EXPLAIN 看估算，不验证真实行数</text>
</svg>
