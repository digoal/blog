<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img">
  <title>EXPLAIN 输出行的字段来源</title>
  <desc>解释 EXPLAIN 节点行中 cost、rows、width、actual time、actual rows、loops、Buffers、WAL 等字段分别来自优化器估算和执行器 instrumentation。</desc>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .code { font-family: Menlo, Consolas, monospace; fill: #111827; }
      .est { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .act { fill: #fff7ed; stroke: #d97706; stroke-width: 2; rx: 8; }
      .obs { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
      .dline { stroke: #64748b; stroke-width: 2; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow2); }
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="580" fill="#ffffff" stroke="#d6dee8" stroke-width="1"/>
  <text x="560" y="54" text-anchor="middle" class="text" font-size="24">一行 EXPLAIN 输出 = 估算字段 + 真实执行字段 + 资源字段</text>

  <rect x="70" y="95" width="980" height="92" class="note"/>
  <text x="100" y="130" class="code" font-size="21">Index Scan using orders_tenant_created_idx on orders</text>
  <text x="100" y="160" class="code" font-size="19">(cost=0.42..187.11 rows=120 width=96) (actual time=0.031..3.850 rows=118 loops=1)</text>

  <rect x="95" y="245" width="260" height="112" class="est"/>
  <text x="225" y="274" text-anchor="middle" class="text" font-size="20">优化器估算</text>
  <text x="120" y="306" class="text" font-size="16">startup_cost / total_cost</text>
  <text x="120" y="330" class="text" font-size="16">plan_rows / plan_width</text>
  <text x="120" y="352" class="text" font-size="14">来自 Path 与 Plan 的代价字段</text>

  <rect x="430" y="245" width="260" height="112" class="act"/>
  <text x="560" y="274" text-anchor="middle" class="text" font-size="20">执行器实测</text>
  <text x="455" y="306" class="text" font-size="16">actual time / rows / loops</text>
  <text x="455" y="330" class="text" font-size="16">startup / total / ntuples</text>
  <text x="455" y="352" class="text" font-size="14">来自 NodeInstrumentation</text>

  <rect x="765" y="245" width="260" height="112" class="obs"/>
  <text x="895" y="274" text-anchor="middle" class="text" font-size="20">资源观测</text>
  <text x="790" y="306" class="text" font-size="16">Buffers / WAL / I/O</text>
  <text x="790" y="330" class="text" font-size="16">Sort / Hash / Memoize 细节</text>
  <text x="790" y="352" class="text" font-size="14">来自节点与全局计数器差值</text>

  <path class="line" d="M250 187 C250 214 225 214 225 245"/>
  <path class="line" d="M650 187 C650 214 560 214 560 245"/>
  <path class="line" d="M880 187 C880 214 895 214 895 245"/>

  <rect x="80" y="420" width="320" height="118" class="note"/>
  <text x="240" y="450" text-anchor="middle" class="text" font-size="19">读法 1：先看 rows 偏差</text>
  <text x="110" y="480" class="text" font-size="16">actual rows × loops 才是总处理量</text>
  <text x="110" y="504" class="text" font-size="16">估算行数偏差常指向统计信息、</text>
  <text x="110" y="526" class="text" font-size="16">相关性、表达式或参数化问题</text>

  <rect x="440" y="420" width="320" height="118" class="note"/>
  <text x="600" y="450" text-anchor="middle" class="text" font-size="19">读法 2：再看资源瓶颈</text>
  <text x="470" y="480" class="text" font-size="16">shared read 多：存储或缓存压力</text>
  <text x="470" y="504" class="text" font-size="16">temp 多：排序/哈希溢出</text>
  <text x="470" y="526" class="text" font-size="16">WAL 多：写放大或更新路径问题</text>

  <rect x="800" y="420" width="260" height="118" class="note"/>
  <text x="930" y="450" text-anchor="middle" class="text" font-size="19">读法 3：确认边界</text>
  <text x="830" y="480" class="text" font-size="16">cost 不是毫秒</text>
  <text x="830" y="504" class="text" font-size="16">ANALYZE 有观测开销</text>
  <text x="830" y="526" class="text" font-size="16">网络发送成本默认不计入</text>

  <path class="dline" d="M225 357 V420"/>
  <path class="dline" d="M560 357 V420"/>
  <path class="dline" d="M895 357 V420"/>
</svg>
