<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img">
  <title>EXPLAIN 选项的安全边界与观测代价</title>
  <desc>把 EXPLAIN 常见选项按是否执行、是否有副作用、是否增加观测开销分层，帮助选择诊断方式。</desc>
  <defs>
    <style>
      .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .layer { stroke: #334155; stroke-width: 2; rx: 10; }
      .cold { fill: #ecfdf5; }
      .warm { fill: #eef6ff; }
      .hot { fill: #fff7ed; }
      .risk { fill: #fef2f2; }
      .pill { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 14; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; fill: #475569; }
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="600" fill="#ffffff" stroke="#d6dee8" stroke-width="1"/>
  <text x="560" y="55" text-anchor="middle" class="text" font-size="24">选择 EXPLAIN 选项：观测越接近真实执行，代价和边界越要明确</text>

  <rect x="70" y="105" width="960" height="100" class="layer cold"/>
  <text x="105" y="140" class="text" font-size="21">第 1 层：只看计划，不执行查询</text>
  <rect x="105" y="160" width="130" height="30" class="pill"/><text x="170" y="181" text-anchor="middle" class="text small">EXPLAIN</text>
  <rect x="250" y="160" width="170" height="30" class="pill"/><text x="335" y="181" text-anchor="middle" class="text small">FORMAT JSON</text>
  <rect x="435" y="160" width="170" height="30" class="pill"/><text x="520" y="181" text-anchor="middle" class="text small">GENERIC_PLAN</text>
  <text x="650" y="166" class="text tiny">适合先看扫描方式、连接算法、估算行数、参数化 SQL 的通用计划。</text>
  <text x="650" y="187" class="text tiny">不能证明真实耗时，也不能验证估算是否准确。</text>

  <rect x="70" y="235" width="960" height="100" class="layer warm"/>
  <text x="105" y="270" class="text" font-size="21">第 2 层：执行查询，减少节点级计时开销</text>
  <rect x="105" y="290" width="235" height="30" class="pill"/><text x="222" y="311" text-anchor="middle" class="text small">ANALYZE, TIMING OFF</text>
  <rect x="355" y="290" width="150" height="30" class="pill"/><text x="430" y="311" text-anchor="middle" class="text small">BUFFERS</text>
  <text x="650" y="296" class="text tiny">适合定位 rows 偏差、buffer 访问、排序/哈希溢出。</text>
  <text x="650" y="317" class="text tiny">仍会真实执行；写语句需要事务回滚保护。</text>

  <rect x="70" y="365" width="960" height="100" class="layer hot"/>
  <text x="105" y="400" class="text" font-size="21">第 3 层：更完整的执行期资源观测</text>
  <rect x="105" y="420" width="100" height="30" class="pill"/><text x="155" y="441" text-anchor="middle" class="text small">TIMING</text>
  <rect x="220" y="420" width="90" height="30" class="pill"/><text x="265" y="441" text-anchor="middle" class="text small">WAL</text>
  <rect x="325" y="420" width="80" height="30" class="pill"/><text x="365" y="441" text-anchor="middle" class="text small">IO</text>
  <rect x="420" y="420" width="150" height="30" class="pill"/><text x="495" y="441" text-anchor="middle" class="text small">SERIALIZE</text>
  <text x="650" y="426" class="text tiny">适合解释写放大、输出转换成本、扫描 I/O 细节。</text>
  <text x="650" y="447" class="text tiny">WAL / IO / SERIALIZE 需要 ANALYZE；TIMING 可能带来明显开销。</text>

  <rect x="70" y="495" width="960" height="80" class="layer risk"/>
  <text x="105" y="530" class="text" font-size="21">生产边界：用 auto_explain 抽样记录慢 SQL</text>
  <rect x="105" y="548" width="190" height="30" class="pill"/><text x="200" y="569" text-anchor="middle" class="text small">log_min_duration</text>
  <rect x="310" y="548" width="150" height="30" class="pill"/><text x="385" y="569" text-anchor="middle" class="text small">sample_rate</text>
  <rect x="475" y="548" width="150" height="30" class="pill"/><text x="550" y="569" text-anchor="middle" class="text small">log_analyze</text>
  <text x="650" y="556" class="text tiny">适合无法复现的慢查询；要控制采样、参数长度、日志量和隐私风险。</text>
</svg>
