<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img">
  <title>EXPLAIN ANALYZE 的 instrumentation 计数路径</title>
  <desc>展示 EXPLAIN ANALYZE 如何在执行节点上分配 NodeInstrumentation，并通过 InstrStartNode、ExecProcNode、InstrStopNode 记录时间、行数、buffer 与 WAL 差值。</desc>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b556e"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .run { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .cnt { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .sum { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 8; }
      .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #172033; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #34495e; }
      .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
      .line { stroke: #3b556e; stroke-width: 2; fill: none; marker-end: url(#arrow3); }
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="620" fill="#ffffff" stroke="#d6dee8" stroke-width="1"/>
  <text x="560" y="55" text-anchor="middle" class="text" font-size="24">EXPLAIN ANALYZE 的计数不是猜测，而是执行器路径上的差值累积</text>

  <rect x="65" y="100" width="210" height="86" class="box"/>
  <text x="170" y="130" text-anchor="middle" class="text">ExplainOnePlan</text>
  <text x="170" y="154" text-anchor="middle" class="small">根据选项设置</text>
  <text x="170" y="174" text-anchor="middle" class="tiny">INSTRUMENT_TIMER / ROWS / BUFFERS / WAL / IO</text>

  <rect x="345" y="100" width="210" height="86" class="box"/>
  <text x="450" y="130" text-anchor="middle" class="text">ExecutorStart</text>
  <text x="450" y="154" text-anchor="middle" class="small">ExecInitNode 建执行树</text>
  <text x="450" y="174" text-anchor="middle" class="tiny">每个 PlanState 分配 instrument</text>

  <rect x="625" y="100" width="210" height="86" class="run"/>
  <text x="730" y="130" text-anchor="middle" class="text">ExecutorRun</text>
  <text x="730" y="154" text-anchor="middle" class="small">节点迭代拉取元组</text>
  <text x="730" y="174" text-anchor="middle" class="tiny">ExecProcNodeInstr 包装真实节点函数</text>

  <rect x="905" y="100" width="80" height="86" class="run"/>
  <text x="945" y="142" text-anchor="middle" class="text">结果</text>
  <text x="945" y="164" text-anchor="middle" class="small">丢弃</text>

  <path class="line" d="M275 143 H345"/>
  <path class="line" d="M555 143 H625"/>
  <path class="line" d="M835 143 H905"/>

  <rect x="130" y="270" width="210" height="92" class="cnt"/>
  <text x="235" y="300" text-anchor="middle" class="text">InstrStartNode</text>
  <text x="235" y="324" text-anchor="middle" class="small">保存开始时间</text>
  <text x="235" y="344" text-anchor="middle" class="tiny">保存 pgBufferUsage / pgWalUsage 快照</text>

  <rect x="430" y="270" width="210" height="92" class="run"/>
  <text x="535" y="300" text-anchor="middle" class="text">真实节点执行</text>
  <text x="535" y="324" text-anchor="middle" class="small">扫描、连接、排序、聚合</text>
  <text x="535" y="344" text-anchor="middle" class="tiny">可能修改 buffer / WAL / I/O 计数器</text>

  <rect x="730" y="270" width="210" height="92" class="cnt"/>
  <text x="835" y="300" text-anchor="middle" class="text">InstrStopNode</text>
  <text x="835" y="324" text-anchor="middle" class="small">累积耗时与元组数</text>
  <text x="835" y="344" text-anchor="middle" class="tiny">计算 buffer / WAL 差值</text>

  <path class="line" d="M730 186 C730 230 235 230 235 270"/>
  <path class="line" d="M340 316 H430"/>
  <path class="line" d="M640 316 H730"/>

  <rect x="110" y="450" width="240" height="110" class="sum"/>
  <text x="230" y="482" text-anchor="middle" class="text">NodeInstrumentation</text>
  <text x="135" y="512" class="small">startup / total / nloops</text>
  <text x="135" y="535" class="small">ntuples / nfiltered</text>

  <rect x="430" y="450" width="240" height="110" class="sum"/>
  <text x="550" y="482" text-anchor="middle" class="text">BufferUsage / WalUsage</text>
  <text x="455" y="512" class="small">hit / read / dirtied / written</text>
  <text x="455" y="535" class="small">WAL records / bytes / fpi</text>

  <rect x="750" y="450" width="240" height="110" class="sum"/>
  <text x="870" y="482" text-anchor="middle" class="text">ExplainNode 输出</text>
  <text x="775" y="512" class="small">actual time / rows / loops</text>
  <text x="775" y="535" class="small">Buffers / WAL / node extra</text>

  <path class="line" d="M835 362 C835 410 230 410 230 450"/>
  <path class="line" d="M835 362 C835 410 550 410 550 450"/>
  <path class="line" d="M670 505 H750"/>

  <text x="70" y="612" class="small">注意：普通 EXPLAIN 不会运行节点，因而没有 actual time、真实 rows、Buffers/WAL 执行期明细。</text>
</svg>
