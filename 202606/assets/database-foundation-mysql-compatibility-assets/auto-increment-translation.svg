<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">AUTO_INCREMENT 在 openHalo 中的翻译路径</title>
  <desc id="desc">展示 MySQL AUTO_INCREMENT 列如何被解析、校验、转为 PostgreSQL sequence 和 nextval 默认值，并在 SHOW CREATE TABLE 中恢复成 MySQL 外观。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .mysql { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; rx: 10; }
    .pg { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 10; }
    .warn { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 10; }
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #1e293b; }
    .small { font: 12.5px sans-serif; fill: #475569; }
    .code { font: 12.5px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="620"/>
  <text class="title" x="44" y="50">兼容是语义翻译：AUTO_INCREMENT 的例子</text>
  <text class="small" x="46" y="80">openHalo 接受 MySQL DDL 外观，但内部用 PostgreSQL sequence 与 default nextval 承载自增。</text>

  <rect class="mysql" x="54" y="132" width="238" height="108"/>
  <text class="text" x="78" y="162">MySQL DDL 输入</text>
  <text class="code" x="78" y="188">id int auto_increment</text>
  <text class="code" x="78" y="210">primary key(id)</text>

  <rect class="box" x="374" y="132" width="238" height="108"/>
  <text class="text" x="398" y="162">解析与类型检查</text>
  <text class="code" x="398" y="188">mys_parse_utilcmd.c</text>
  <text class="small" x="398" y="212">只允许整数族自增，处理起始值</text>

  <rect class="pg" x="692" y="132" width="238" height="108"/>
  <text class="text" x="716" y="162">内部对象</text>
  <text class="code" x="716" y="188">CREATE SEQUENCE</text>
  <text class="code" x="716" y="210">DEFAULT nextval(...)</text>

  <rect class="warn" x="374" y="300" width="238" height="90"/>
  <text class="text" x="398" y="330">DDL 约束边界</text>
  <text class="code" x="398" y="354">auto_increment 列必须是 key</text>
  <text class="small" x="398" y="374">ALTER TABLE phase 4 再检查</text>

  <rect class="box" x="54" y="468" width="238" height="92"/>
  <text class="text" x="78" y="498">写入路径</text>
  <text class="code" x="78" y="522">INSERT omits id</text>
  <text class="small" x="78" y="542">PostgreSQL 默认值触发 nextval</text>

  <rect class="box" x="374" y="468" width="238" height="92"/>
  <text class="text" x="398" y="498">元数据恢复</text>
  <text class="code" x="398" y="522">SHOW CREATE TABLE</text>
  <text class="small" x="398" y="542">检测 nextval，拼回 AUTO_INCREMENT</text>

  <rect class="mysql" x="692" y="468" width="238" height="92"/>
  <text class="text" x="716" y="498">MySQL 外观输出</text>
  <text class="code" x="716" y="522">ENGINE=InnoDB</text>
  <text class="code" x="716" y="542">AUTO_INCREMENT=N</text>

  <path class="arrow" d="M292 186 L372 186"/>
  <path class="arrow" d="M612 186 L690 186"/>
  <path class="arrow" d="M493 240 L493 298"/>
  <path class="arrow" d="M811 240 C850 328 880 430 820 466"/>
  <path class="arrow" d="M173 240 C96 330 92 404 156 466"/>
  <path class="arrow" d="M292 514 L372 514"/>
  <path class="arrow" d="M612 514 L690 514"/>
</svg>
