<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">openHalo MySQL 兼容性分层能力栈</title>
  <desc id="desc">展示 openHalo 将 MySQL 客户端入口、协议、解析、语义补齐、执行器和系统视图分成多个兼容层。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .layer { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 10; }
    .client { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.6; rx: 10; }
    .pg { fill: #ecfdf5; stroke: #047857; stroke-width: 1.6; rx: 10; }
    .aux { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 10; }
    .warn { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.6; rx: 10; }
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #1e293b; }
    .small { font: 13px sans-serif; fill: #475569; }
    .code { font: 13px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="620"/>
  <text class="title" x="44" y="52">MySQL 兼容不是一个开关，而是分层翻译栈</text>
  <text class="small" x="46" y="82">openHalo 的核心取舍：上层尽量贴近 MySQL 客户端和 SQL 习惯，下层复用 PostgreSQL 存储、事务、优化与执行体系。</text>

  <rect class="client" x="70" y="120" width="820" height="62"/>
  <text class="text" x="95" y="148">客户端与工具层</text>
  <text class="code" x="260" y="148">mysql CLI / MySQL driver / ORM / migration tool</text>
  <text class="small" x="260" y="169">目标是减少应用连接串、驱动和日常工具改造。</text>

  <rect class="layer" x="70" y="210" width="820" height="62"/>
  <text class="text" x="95" y="238">协议与会话层</text>
  <text class="code" x="260" y="238">mysql.listener_on, mysql.port, ProtocolInterface, mysql_native_password</text>
  <text class="small" x="260" y="259">负责握手、认证、命令包、OK/ERR/EOF/result-set 包。</text>

  <rect class="layer" x="70" y="300" width="820" height="62"/>
  <text class="text" x="95" y="328">SQL 方言层</text>
  <text class="code" x="260" y="328">mys_gram.y / mys_scan.l / mys_parser.c / mys_analyze.c</text>
  <text class="small" x="260" y="349">把 MySQL 语法解析为 PostgreSQL 可分析、可规划的树。</text>

  <rect class="aux" x="70" y="390" width="820" height="62"/>
  <text class="text" x="95" y="418">语义补齐层</text>
  <text class="code" x="260" y="418">aux_mysql, mysql schema, types, casts, functions, views, system variables</text>
  <text class="small" x="260" y="439">补类型、隐式转换、系统变量、SHOW/元数据外观和常用函数。</text>

  <rect class="pg" x="70" y="480" width="820" height="62"/>
  <text class="text" x="95" y="508">PostgreSQL 内核层</text>
  <text class="code" x="260" y="508">standard planner / PostgreSQL executor / heap / btree / WAL / MVCC</text>
  <text class="small" x="260" y="529">openHalo 没有在 storage、optimizer 主体下复刻 MySQL/InnoDB 子目录。</text>

  <rect class="warn" x="70" y="562" width="820" height="34"/>
  <text class="small" x="92" y="584">工程边界：兼容层能降低迁移改写量，但不能承诺所有 MySQL 语义、InnoDB 运维指标和复制生态完全等价。</text>

  <path class="arrow" d="M480 184 L480 208"/>
  <path class="arrow" d="M480 274 L480 298"/>
  <path class="arrow" d="M480 364 L480 388"/>
  <path class="arrow" d="M480 454 L480 478"/>
</svg>
