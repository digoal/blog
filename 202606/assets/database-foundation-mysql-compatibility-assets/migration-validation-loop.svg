<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">MySQL 迁移到 openHalo 的验证闭环</title>
  <desc id="desc">展示从资产盘点、兼容性分层、样本测试、执行计划验证、应用回归和上线护栏的闭环流程。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .focus { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 10; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 10; }
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #1e293b; }
    .small { font: 12.5px sans-serif; fill: #475569; }
    .code { font: 12.5px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="620"/>
  <text class="title" x="44" y="50">不要问“兼容不兼容”，要跑迁移验证闭环</text>
  <text class="small" x="46" y="80">成功标准不是连接成功，而是业务 SQL、结果语义、错误行为、性能和运维外观都被样本验证。</text>

  <rect class="focus" x="90" y="128" width="220" height="86"/>
  <text class="text" x="120" y="158">1. 资产盘点</text>
  <text class="small" x="120" y="182">SQL、DDL、函数、触发器、工具、变量</text>

  <rect class="box" x="380" y="128" width="220" height="86"/>
  <text class="text" x="410" y="158">2. 分层分类</text>
  <text class="small" x="410" y="182">协议、语法、类型、元数据、事务、性能</text>

  <rect class="box" x="670" y="128" width="220" height="86"/>
  <text class="text" x="700" y="158">3. 最小样本库</text>
  <text class="small" x="700" y="182">高频 SQL 与边界 SQL 各取样</text>

  <rect class="box" x="670" y="296" width="220" height="86"/>
  <text class="text" x="700" y="326">4. 结果与错误比对</text>
  <text class="small" x="700" y="350">空值、日期、隐式转换、错误码</text>

  <rect class="risk" x="380" y="296" width="220" height="86"/>
  <text class="text" x="410" y="326">5. 计划与性能验证</text>
  <text class="small" x="410" y="350">EXPLAIN、索引、锁等待、吞吐</text>

  <rect class="box" x="90" y="296" width="220" height="86"/>
  <text class="text" x="120" y="326">6. 应用回归</text>
  <text class="small" x="120" y="350">驱动、ORM、连接池、事务边界</text>

  <rect class="focus" x="240" y="462" width="500" height="86"/>
  <text class="text" x="274" y="492">7. 上线护栏与回滚预案</text>
  <text class="code" x="274" y="516">sql_mode / search_path / aux_mysql version / slow query / diff tests</text>

  <path class="arrow" d="M310 171 L378 171"/>
  <path class="arrow" d="M600 171 L668 171"/>
  <path class="arrow" d="M780 214 L780 294"/>
  <path class="arrow" d="M670 339 L602 339"/>
  <path class="arrow" d="M380 339 L312 339"/>
  <path class="arrow" d="M200 382 C205 430 250 460 306 462"/>
  <path class="arrow" d="M740 506 C878 502 910 182 892 160"/>
  <text class="small" x="760" y="496">失败样本回到分类与改写清单</text>
</svg>
