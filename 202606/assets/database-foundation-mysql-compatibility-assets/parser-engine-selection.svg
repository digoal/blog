<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">openHalo parser 与执行器选择逻辑</title>
  <desc id="desc">展示 database_compat_mode、连接协议和 standard_parserengine_auxiliary 如何影响 MySQL parser、标准 parser 和执行器 hook。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .decision { fill: #fef9c3; stroke: #a16207; stroke-width: 1.5; }
    .mysql { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; rx: 10; }
    .pg { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 10; }
    .hook { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.5; rx: 10; }
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #1e293b; }
    .small { font: 12.5px sans-serif; fill: #475569; }
    .code { font: 12.5px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="640"/>
  <text class="title" x="44" y="48">兼容模式如何真正生效</text>
  <text class="small" x="46" y="78">同样设置 database_compat_mode=mysql，MySQL 协议连接和 PostgreSQL 协议连接走的 parser 入口并不相同。</text>

  <rect class="box" x="390" y="112" width="220" height="64"/>
  <text class="text" x="418" y="140">后端初始化</text>
  <text class="code" x="418" y="162">InitParserEngine()</text>

  <polygon class="decision" points="500,220 650,300 500,380 350,300"/>
  <text class="text" x="416" y="292">database_compat_mode</text>
  <text class="code" x="455" y="316">mysql ?</text>

  <polygon class="decision" points="760,220 922,300 760,380 598,300"/>
  <text class="text" x="685" y="292">当前连接协议</text>
  <text class="code" x="692" y="316">T_MySQLProtocol ?</text>

  <rect class="pg" x="80" y="264" width="206" height="72"/>
  <text class="text" x="112" y="294">标准 parser</text>
  <text class="code" x="112" y="316">GetStandardParserEngine()</text>

  <rect class="mysql" x="656" y="440" width="246" height="80"/>
  <text class="text" x="692" y="470">MySQL parser</text>
  <text class="code" x="692" y="492">GetMysParserEngine()</text>
  <text class="small" x="692" y="512">MySQL 通道认证后关闭标准 parser 兜底</text>

  <rect class="hook" x="382" y="440" width="220" height="80"/>
  <text class="text" x="410" y="470">MySQL 执行 hook</text>
  <text class="code" x="410" y="492">GetMysExecutorEngine()</text>
  <text class="code" x="410" y="512">ProcessUtility_hook</text>

  <rect class="pg" x="80" y="440" width="230" height="80"/>
  <text class="text" x="112" y="470">标准 planner</text>
  <text class="code" x="112" y="492">GetStandardPlannerEngine()</text>
  <text class="small" x="112" y="512">MySQL 模式下仍复用标准规划器</text>

  <rect class="box" x="350" y="560" width="330" height="48"/>
  <text class="small" x="374" y="590">含义：MySQL 兼容集中在 parser、utility、executor hook 与协议编码；不是完整 MySQL 内核。</text>

  <path class="arrow" d="M500 176 L500 219"/>
  <path class="arrow" d="M350 300 L288 300"/>
  <path class="arrow" d="M650 300 L596 300"/>
  <path class="arrow" d="M760 380 L760 438"/>
  <path class="arrow" d="M760 380 C710 424 580 418 520 438"/>
  <path class="arrow" d="M760 380 C646 526 306 406 206 438"/>
  <path class="arrow" d="M598 300 C496 402 318 384 220 438"/>
</svg>
