<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">MySQL 协议查询在 openHalo 中的端到端链路</title>
  <desc id="desc">展示 MySQL 客户端连接 openHalo 后，从监听 socket 到认证、命令包、解析分析、执行和结果包返回的流程。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 9; }
    .blue { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 9; }
    .green { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 9; }
    .orange { fill: #ffedd5; stroke: #c2410c; stroke-width: 1.5; rx: 9; }
    .title { font: 700 22px sans-serif; fill: #0f172a; }
    .text { font: 15px sans-serif; fill: #1e293b; }
    .small { font: 12.5px sans-serif; fill: #475569; }
    .code { font: 12.5px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #94a3b8; stroke-width: 1.8; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1040" height="620"/>
  <text class="title" x="42" y="48">一条 MySQL 查询如何穿过 PostgreSQL 内核</text>
  <text class="small" x="44" y="78">关键是把 MySQL 网络包和语法转换成 PostgreSQL 后端可以继续处理的请求，再把结果按 MySQL 协议编码回去。</text>

  <rect class="blue" x="54" y="130" width="170" height="76"/>
  <text class="text" x="78" y="160">MySQL 客户端</text>
  <text class="code" x="78" y="184">COM_QUERY</text>

  <rect class="box" x="280" y="120" width="200" height="96"/>
  <text class="text" x="306" y="150">第二监听器</text>
  <text class="code" x="306" y="174">postmaster.c</text>
  <text class="code" x="306" y="194">postmaster2.c</text>

  <rect class="box" x="550" y="120" width="200" height="96"/>
  <text class="text" x="574" y="150">MySQL 协议 handler</text>
  <text class="code" x="574" y="174">adapter.c</text>
  <text class="code" x="574" y="194">ProtocolInterface</text>

  <rect class="orange" x="816" y="120" width="170" height="96"/>
  <text class="text" x="842" y="150">认证与会话</text>
  <text class="code" x="842" y="174">mysql_native_password</text>
  <text class="small" x="842" y="196">search_path / sys vars</text>

  <rect class="box" x="54" y="300" width="204" height="96"/>
  <text class="text" x="82" y="330">命令包处理</text>
  <text class="code" x="82" y="354">netTransceiver.c</text>
  <text class="small" x="82" y="376">读包、改写、补充 SQL</text>

  <rect class="box" x="312" y="300" width="204" height="96"/>
  <text class="text" x="340" y="330">MySQL parser</text>
  <text class="code" x="340" y="354">mys_gram.y</text>
  <text class="code" x="340" y="374">mys_analyze.c</text>

  <rect class="green" x="570" y="300" width="204" height="96"/>
  <text class="text" x="596" y="330">标准规划与执行</text>
  <text class="code" x="596" y="354">standard planner</text>
  <text class="code" x="596" y="374">PG executor</text>

  <rect class="box" x="824" y="300" width="164" height="96"/>
  <text class="text" x="846" y="330">结果包编码</text>
  <text class="code" x="846" y="354">printTup</text>
  <text class="code" x="846" y="374">OK / ERR / EOF</text>

  <rect class="orange" x="286" y="470" width="468" height="74"/>
  <text class="text" x="314" y="500">错误与元数据外观</text>
  <text class="code" x="314" y="523">errorConvertor.c, aux_mysql, information_schema, performance_schema, sys</text>

  <path class="arrow" d="M224 168 L278 168"/>
  <path class="arrow" d="M480 168 L548 168"/>
  <path class="arrow" d="M750 168 L814 168"/>
  <path class="arrow" d="M902 216 C902 258 156 254 156 298"/>
  <path class="arrow" d="M258 348 L310 348"/>
  <path class="arrow" d="M516 348 L568 348"/>
  <path class="arrow" d="M774 348 L822 348"/>
  <path class="arrow" d="M906 396 C906 452 122 444 122 206"/>
  <path class="dash" d="M672 396 C672 438 652 452 624 470"/>
  <path class="dash" d="M414 396 C414 438 438 452 474 470"/>
</svg>
