<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Oracle 兼容性的两条工程路线</title>
  <desc id="desc">展示 IvorySQL 分叉路线与 orafce 扩展路线在语法、过程语言、类型、函数包和内核执行层的覆盖深度差异。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 26px sans-serif; fill: #1f2937; }
    .subtitle { font: 16px sans-serif; fill: #4b5563; }
    .lane-title { font: 700 20px sans-serif; fill: #111827; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .oracle { fill: #fff7ed; stroke: #f97316; }
    .ivory { fill: #eef6ff; stroke: #2563eb; }
    .orafce { fill: #f0fdf4; stroke: #16a34a; }
    .pg { fill: #f8fafc; stroke: #64748b; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .deep { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
    .surface { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
    .note { fill: #fffbeb; stroke: #f59e0b; rx: 8; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="650"/>
  <text class="title" x="40" y="48">Oracle 兼容不是一个开关，而是一组层次化工程能力</text>
  <text class="subtitle" x="40" y="78">同一套 Oracle 应用迁移到 PostgreSQL 生态时，常见路径是“内核分叉加深语义”或“扩展补齐常用 API”。</text>

  <rect class="box oracle" x="440" y="115" width="240" height="78"/>
  <text class="lane-title" x="505" y="148">Oracle 应用</text>
  <text class="small" x="472" y="172">SQL + PL/SQL + 包 + 类型语义</text>

  <path class="deep" d="M515 193 C430 240, 260 245, 200 295"/>
  <path class="surface" d="M625 193 C710 240, 880 245, 940 295"/>

  <rect class="box ivory" x="80" y="290" width="360" height="258"/>
  <text class="lane-title" x="184" y="324">IvorySQL 路线</text>
  <text class="small" x="123" y="350">PostgreSQL 分叉，兼容性进入 parser、PL、catalog、hook</text>
  <rect class="box" x="110" y="378" width="300" height="34"/>
  <text class="label" x="130" y="401">compatible_mode 切换解析器</text>
  <rect class="box" x="110" y="425" width="300" height="34"/>
  <text class="label" x="130" y="448">Oracle parser 与关键字/标识符规则</text>
  <rect class="box" x="110" y="472" width="300" height="34"/>
  <text class="label" x="130" y="495">PL/iSQL、Package、pg_package 目录</text>
  <rect class="box" x="110" y="519" width="300" height="34"/>
  <text class="label" x="130" y="542">Oracle 类型、隐式转换、MERGE hook</text>

  <rect class="box orafce" x="680" y="290" width="360" height="258"/>
  <text class="lane-title" x="790" y="324">orafce 路线</text>
  <text class="small" x="721" y="350">PostgreSQL 扩展，优先补齐函数、类型和常用包</text>
  <rect class="box" x="710" y="378" width="300" height="34"/>
  <text class="label" x="730" y="401">CREATE EXTENSION orafce</text>
  <rect class="box" x="710" y="425" width="300" height="34"/>
  <text class="label" x="730" y="448">oracle / dbms_* schema 下的 SQL wrapper</text>
  <rect class="box" x="710" y="472" width="300" height="34"/>
  <text class="label" x="730" y="495">C 函数实现 to_date、sysdate、varchar2 等</text>
  <rect class="box" x="710" y="519" width="300" height="34"/>
  <text class="label" x="730" y="542">GUC、共享内存、事务回调支持包语义</text>

  <rect class="box pg" x="380" y="590" width="360" height="42"/>
  <text class="label" x="441" y="616">共同底座：PostgreSQL 存储、事务、执行器、运维生态</text>
  <path class="arrow" d="M260 548 C325 590, 360 610, 380 610"/>
  <path class="arrow" d="M860 548 C795 590, 760 610, 740 610"/>

  <rect class="note" x="360" y="230" width="400" height="44"/>
  <text class="small" x="388" y="257">选择路线先看“需要兼容到哪一层”，再看迁移成本与长期维护成本。</text>
</svg>
