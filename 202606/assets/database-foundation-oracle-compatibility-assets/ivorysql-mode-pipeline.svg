<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">IvorySQL Oracle 兼容模式的执行链路</title>
  <desc id="desc">展示 IvorySQL 从 compatible_mode 到 parser hook、Oracle raw parser、PL/iSQL、Package catalog、ivorysql_ora 类型函数和执行器 hook 的链路。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 26px sans-serif; fill: #111827; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .code { font: 13px monospace; fill: #334155; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .guc { fill: #eff6ff; stroke: #2563eb; }
    .parser { fill: #eef2ff; stroke: #4f46e5; }
    .pl { fill: #f0fdf4; stroke: #16a34a; }
    .ora { fill: #fff7ed; stroke: #f97316; }
    .exec { fill: #f8fafc; stroke: #64748b; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="720"/>
  <text class="title" x="42" y="48">IvorySQL：把 Oracle 兼容下沉到解析器、过程语言和目录层</text>

  <rect class="box guc" x="60" y="96" width="245" height="112"/>
  <text class="label" x="88" y="130">会话/集群模式</text>
  <text class="code" x="88" y="158">ivorysql.compatible_mode</text>
  <text class="small" x="88" y="184">check_compatible_mode 校验依赖</text>

  <rect class="box parser" x="370" y="96" width="245" height="112"/>
  <text class="label" x="402" y="130">raw_parser 入口</text>
  <text class="code" x="402" y="158">sql_raw_parser hook</text>
  <text class="small" x="402" y="184">PG parser 或 Oracle parser</text>

  <rect class="box parser" x="680" y="96" width="245" height="112"/>
  <text class="label" x="716" y="130">liboracle_parser</text>
  <text class="code" x="716" y="158">oracle_raw_parser</text>
  <text class="small" x="716" y="184">Oracle 关键字、body、标识符规则</text>

  <rect class="box exec" x="990" y="96" width="125" height="112"/>
  <text class="label" x="1016" y="143">Raw</text>
  <text class="label" x="1008" y="167">ParseTree</text>

  <path class="arrow" d="M305 152 H370"/>
  <path class="arrow" d="M615 152 H680"/>
  <path class="arrow" d="M925 152 H990"/>

  <rect class="box pl" x="170" y="310" width="300" height="156"/>
  <text class="label" x="204" y="344">PL/iSQL 过程语言</text>
  <text class="small" x="204" y="372">plisql_call_handler 负责执行</text>
  <text class="small" x="204" y="398">函数、过程、触发器、自治事务</text>
  <text class="code" x="204" y="428">src/pl/plisql/src/</text>

  <rect class="box pl" x="530" y="310" width="300" height="156"/>
  <text class="label" x="564" y="344">Oracle Package</text>
  <text class="small" x="564" y="372">CREATE PACKAGE / BODY</text>
  <text class="small" x="564" y="398">pg_package、pg_package_body、PackageCache</text>
  <text class="code" x="564" y="428">packagecmds.c + pl_package.c</text>

  <rect class="box ora" x="890" y="310" width="300" height="156"/>
  <text class="label" x="924" y="344">ivorysql_ora 扩展层</text>
  <text class="small" x="924" y="372">Oracle 类型、函数、包、系统视图</text>
  <text class="small" x="924" y="398">datatype precedence、MERGE、DBMS_OUTPUT</text>
  <text class="code" x="924" y="428">contrib/ivorysql_ora/</text>

  <path class="dash" d="M802 208 C760 258, 690 286, 680 310"/>
  <path class="dash" d="M802 208 C900 252, 1025 280, 1040 310"/>
  <path class="dash" d="M802 208 C540 240, 360 280, 320 310"/>

  <rect class="box exec" x="310" y="560" width="560" height="92"/>
  <text class="label" x="398" y="596">PostgreSQL 执行、存储、事务、WAL 仍是底座</text>
  <text class="small" x="398" y="626">兼容层改变的是解析、名字解析、类型选择、包执行和部分 executor hook，不是另起一个数据库内核。</text>

  <path class="arrow" d="M320 466 C365 520, 445 545, 500 560"/>
  <path class="arrow" d="M680 466 C670 515, 650 540, 625 560"/>
  <path class="arrow" d="M1040 466 C955 520, 820 545, 735 560"/>
</svg>
