<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
  <title id="title">Oracle 兼容性迁移验证闭环</title>
  <desc id="desc">展示从资产盘点、语义分类、路线选择、最小验证、边界回归到生产护栏的迁移闭环。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 26px sans-serif; fill: #111827; }
    .label { font: 16px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .step { fill: #eff6ff; stroke: #2563eb; }
    .choice { fill: #f0fdf4; stroke: #16a34a; }
    .risk { fill: #fff7ed; stroke: #f97316; }
    .guard { fill: #f8fafc; stroke: #64748b; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #dc2626; stroke-width: 2; stroke-dasharray: 7 5; fill: none; marker-end: url(#redArrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1160" height="720"/>
  <text class="title" x="42" y="50">把“能不能兼容”落到可执行的迁移验证闭环</text>

  <rect class="box step" x="80" y="112" width="270" height="110"/>
  <text class="label" x="116" y="146">1. 资产盘点</text>
  <text class="small" x="116" y="174">SQL、PL/SQL、包、触发器</text>
  <text class="small" x="116" y="198">类型、函数、系统视图、客户端</text>

  <rect class="box step" x="460" y="112" width="270" height="110"/>
  <text class="label" x="496" y="146">2. 语义分类</text>
  <text class="small" x="496" y="174">语法层 / API 层 / 类型层</text>
  <text class="small" x="496" y="198">事务行为 / 运维行为 / 性能路径</text>

  <rect class="box choice" x="840" y="112" width="270" height="110"/>
  <text class="label" x="876" y="146">3. 选择路线</text>
  <text class="small" x="876" y="174">深语义：IvorySQL 优先验证</text>
  <text class="small" x="876" y="198">API 补齐：PostgreSQL + orafce</text>

  <path class="arrow" d="M350 167 H460"/>
  <path class="arrow" d="M730 167 H840"/>

  <rect class="box step" x="840" y="320" width="270" height="116"/>
  <text class="label" x="876" y="354">4. 最小验证</text>
  <text class="small" x="876" y="382">安装扩展或启动 Oracle mode</text>
  <text class="small" x="876" y="406">跑业务 SQL 子集，不伪造输出</text>

  <rect class="box risk" x="460" y="320" width="270" height="116"/>
  <text class="label" x="496" y="354">5. 边界回归</text>
  <text class="small" x="496" y="382">空串 NULL、日期格式、隐式转换</text>
  <text class="small" x="496" y="406">Package 状态、异常、ROWNUM/ROWID</text>

  <rect class="box guard" x="80" y="320" width="270" height="116"/>
  <text class="label" x="116" y="354">6. 生产护栏</text>
  <text class="small" x="116" y="382">search_path、GUC、权限、升级脚本</text>
  <text class="small" x="116" y="406">兼容性测试纳入发布流水线</text>

  <path class="arrow" d="M975 222 V320"/>
  <path class="arrow" d="M840 378 H730"/>
  <path class="arrow" d="M460 378 H350"/>

  <rect class="box risk" x="320" y="540" width="520" height="76"/>
  <text class="label" x="388" y="575">失败不是结论，而是分类信号</text>
  <text class="small" x="388" y="602">回到第 2 步判断：缺的是 API、语法、类型转换，还是事务/执行语义。</text>

  <path class="loop" d="M215 436 C245 522, 300 560, 320 578"/>
  <path class="loop" d="M840 578 C975 560, 1045 505, 975 436"/>
  <path class="loop" d="M580 540 C560 485, 570 450, 595 436"/>
</svg>
