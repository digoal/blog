<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">orafce 的 SQL wrapper 到 C 实现模型</title>
  <desc id="desc">展示 orafce 通过 CREATE EXTENSION 安装 SQL wrapper，将 oracle 和 dbms schema 下的函数绑定到 C 实现，并利用 GUC、共享内存和事务回调补齐部分 Oracle 包语义。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 26px sans-serif; fill: #111827; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .code { font: 13px monospace; fill: #334155; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .sql { fill: #ecfdf5; stroke: #16a34a; }
    .c { fill: #eff6ff; stroke: #2563eb; }
    .engine { fill: #f8fafc; stroke: #64748b; }
    .warn { fill: #fffbeb; stroke: #f59e0b; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #94a3b8; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="700"/>
  <text class="title" x="42" y="50">orafce：不改 SQL 方言入口，主要补齐 Oracle 常用 API 面</text>

  <rect class="box sql" x="62" y="96" width="270" height="106"/>
  <text class="label" x="96" y="130">安装脚本</text>
  <text class="code" x="96" y="158">orafce--4.16.sql</text>
  <text class="small" x="96" y="184">CREATE SCHEMA / FUNCTION / TYPE</text>

  <rect class="box sql" x="422" y="70" width="270" height="84"/>
  <text class="label" x="456" y="104">oracle schema</text>
  <text class="small" x="456" y="130">to_date、sysdate、varchar2、listagg</text>

  <rect class="box sql" x="422" y="180" width="270" height="84"/>
  <text class="label" x="456" y="214">dbms_* schema</text>
  <text class="small" x="456" y="240">dbms_pipe、dbms_alert、dbms_sql 等</text>

  <rect class="box c" x="782" y="96" width="270" height="106"/>
  <text class="label" x="818" y="130">C 函数实现</text>
  <text class="code" x="818" y="158">datefce.c / varchar2.c</text>
  <text class="code" x="818" y="180">pipe.c / alert.c / dbms_sql.c</text>

  <path class="arrow" d="M332 145 C365 115, 390 110, 422 112"/>
  <path class="arrow" d="M332 155 C365 205, 390 220, 422 222"/>
  <path class="arrow" d="M692 112 C728 118, 752 133, 782 146"/>
  <path class="arrow" d="M692 222 C728 212, 752 178, 782 166"/>

  <rect class="box c" x="148" y="345" width="260" height="122"/>
  <text class="label" x="178" y="380">GUC 参数</text>
  <text class="small" x="178" y="408">nls_date_format、timezone</text>
  <text class="small" x="178" y="432">varchar2_null_safe_concat</text>

  <rect class="box c" x="460" y="345" width="260" height="122"/>
  <text class="label" x="490" y="380">共享内存与事务回调</text>
  <text class="small" x="490" y="408">dbms_pipe / dbms_alert 消息</text>
  <text class="small" x="490" y="432">RegisterXactCallback</text>

  <rect class="box c" x="772" y="345" width="260" height="122"/>
  <text class="label" x="802" y="380">测试与升级脚本</text>
  <text class="small" x="802" y="408">sql/、expected/、upgrade SQL</text>
  <text class="small" x="802" y="432">PG 13 到 devel 的兼容条件</text>

  <path class="thin" d="M890 202 C810 270, 700 320, 590 345"/>
  <path class="thin" d="M900 202 C850 270, 790 320, 902 345"/>
  <path class="thin" d="M840 202 C670 260, 430 315, 278 345"/>

  <rect class="box engine" x="260" y="550" width="600" height="70"/>
  <text class="label" x="370" y="590">PostgreSQL 原生 parser、planner、executor、catalog 仍是主体</text>

  <path class="arrow" d="M278 467 C320 520, 410 540, 480 550"/>
  <path class="arrow" d="M590 467 V550"/>
  <path class="arrow" d="M902 467 C830 520, 735 540, 650 550"/>

  <rect class="box warn" x="170" y="635" width="780" height="40"/>
  <text class="small" x="210" y="660">因此 orafce 很适合低成本补齐函数/包调用，但不能自动接受 Oracle 专用语法、PL/SQL 包体或系统目录语义。</text>
</svg>
