<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Oracle 兼容性的语义深度矩阵</title>
  <desc id="desc">将 Oracle 兼容拆成语法、过程语言、类型转换、函数包、系统视图、客户端和运维行为等层次，并对 IvorySQL 与 orafce 的覆盖深度进行工程化比较。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 26px sans-serif; fill: #111827; }
    .axis { font: 700 15px sans-serif; fill: #1f2937; }
    .label { font: 14px sans-serif; fill: #1f2937; }
    .small { font: 12px sans-serif; fill: #475569; }
    .grid { stroke: #cbd5e1; stroke-width: 1; }
    .box { fill: #ffffff; stroke: #94a3b8; rx: 8; }
    .ivory { fill: #2563eb; opacity: 0.84; }
    .orafce { fill: #16a34a; opacity: 0.84; }
    .none { fill: #e5e7eb; }
    .note { fill: #fffbeb; stroke: #f59e0b; rx: 8; }
  </style>
  <rect class="bg" x="0" y="0" width="1120" height="700"/>
  <text class="title" x="42" y="50">用“语义深度”而不是“兼容/不兼容”评价迁移风险</text>

  <text class="axis" x="70" y="110">兼容层次</text>
  <text class="axis" x="500" y="110">IvorySQL</text>
  <text class="axis" x="780" y="110">orafce</text>
  <line class="grid" x1="60" y1="130" x2="1050" y2="130"/>

  <g transform="translate(0,0)">
    <text class="label" x="80" y="170">Oracle SQL 方言与关键字</text>
    <rect class="none" x="450" y="150" width="300" height="22" rx="5"/>
    <rect class="ivory" x="450" y="150" width="255" height="22" rx="5"/>
    <rect class="none" x="760" y="150" width="300" height="22" rx="5"/>
    <rect class="orafce" x="760" y="150" width="45" height="22" rx="5"/>
    <text class="small" x="450" y="194">Oracle parser hook</text>
    <text class="small" x="760" y="194">主要不改 parser</text>
  </g>

  <g transform="translate(0,74)">
    <text class="label" x="80" y="170">PL/SQL、Package、过程体</text>
    <rect class="none" x="450" y="150" width="300" height="22" rx="5"/>
    <rect class="ivory" x="450" y="150" width="270" height="22" rx="5"/>
    <rect class="none" x="760" y="150" width="300" height="22" rx="5"/>
    <rect class="orafce" x="760" y="150" width="60" height="22" rx="5"/>
    <text class="small" x="450" y="194">PL/iSQL + pg_package</text>
    <text class="small" x="760" y="194">包 API 子集</text>
  </g>

  <g transform="translate(0,148)">
    <text class="label" x="80" y="170">Oracle 类型与隐式转换</text>
    <rect class="none" x="450" y="150" width="300" height="22" rx="5"/>
    <rect class="ivory" x="450" y="150" width="245" height="22" rx="5"/>
    <rect class="none" x="760" y="150" width="300" height="22" rx="5"/>
    <rect class="orafce" x="760" y="150" width="175" height="22" rx="5"/>
    <text class="small" x="450" y="194">类型定义 + precedence hook</text>
    <text class="small" x="760" y="194">oracle.date、varchar2 等</text>
  </g>

  <g transform="translate(0,222)">
    <text class="label" x="80" y="170">函数、聚合、常用 DBMS 包</text>
    <rect class="none" x="450" y="150" width="300" height="22" rx="5"/>
    <rect class="ivory" x="450" y="150" width="220" height="22" rx="5"/>
    <rect class="none" x="760" y="150" width="300" height="22" rx="5"/>
    <rect class="orafce" x="760" y="150" width="250" height="22" rx="5"/>
    <text class="small" x="450" y="194">ivorysql_ora 内置函数/包</text>
    <text class="small" x="760" y="194">强项：SQL wrapper + C 实现</text>
  </g>

  <g transform="translate(0,296)">
    <text class="label" x="80" y="170">系统视图、ROWID、迁移工具观察面</text>
    <rect class="none" x="450" y="150" width="300" height="22" rx="5"/>
    <rect class="ivory" x="450" y="150" width="215" height="22" rx="5"/>
    <rect class="none" x="760" y="150" width="300" height="22" rx="5"/>
    <rect class="orafce" x="760" y="150" width="105" height="22" rx="5"/>
    <text class="small" x="450" y="194">sysview、rowid/urowid</text>
    <text class="small" x="760" y="194">oracle schema/views 子集</text>
  </g>

  <g transform="translate(0,370)">
    <text class="label" x="80" y="170">存储、事务、优化器成本模型</text>
    <rect class="none" x="450" y="150" width="300" height="22" rx="5"/>
    <rect class="ivory" x="450" y="150" width="110" height="22" rx="5"/>
    <rect class="none" x="760" y="150" width="300" height="22" rx="5"/>
    <rect class="orafce" x="760" y="150" width="35" height="22" rx="5"/>
    <text class="small" x="450" y="194">仍是 PG 底座，局部 hook</text>
    <text class="small" x="760" y="194">基本不触碰</text>
  </g>

  <rect class="note" x="90" y="626" width="950" height="44"/>
  <text class="small" x="124" y="653">条形只表达工程覆盖深度的相对判断，不代表完整兼容率；真实迁移必须用业务 SQL、PL/SQL、边界值和执行计划回归验证。</text>
</svg>
