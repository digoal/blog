<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Citus 的 PostgreSQL 扩展式分布式架构</title>
  <desc id="desc">展示客户端、任意查询节点、Citus 元数据、worker 节点、普通 PostgreSQL shard 和引用表副本之间的关系。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 27px sans-serif; fill: #111827; }
    .subtitle { font: 16px sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .node { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.8; rx: 8; }
    .worker { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .meta { fill: #fff7ed; stroke: #f97316; stroke-width: 1.6; rx: 8; }
    .ref { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.4; rx: 7; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .bold { font: 700 16px sans-serif; fill: #111827; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .sync { stroke: #f97316; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowOrange); }
    .query { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="720"/>
  <text class="title" x="40" y="48">Citus：把 PostgreSQL 的表、计划器、执行器和事务扩展成分布式系统</text>
  <text class="subtitle" x="40" y="78">核心不是换掉 PostgreSQL 存储引擎，而是用 extension hook、元数据和远程 SQL，把一个逻辑表映射到多个普通 PostgreSQL shard。</text>

  <rect class="box" x="60" y="130" width="230" height="82"/>
  <text class="bold" x="122" y="163">应用客户端</text>
  <text class="small" x="92" y="188">psql / JDBC / ORM / 服务端连接池</text>

  <rect class="node" x="420" y="120" width="340" height="120"/>
  <text class="bold" x="520" y="154">查询节点 / 协调者</text>
  <text class="small" x="452" y="181">加载 shared_preload_libraries = 'citus'</text>
  <text class="small" x="452" y="204">planner hook + utility hook + CustomScan</text>
  <text class="small" x="452" y="227">可从任意已同步元数据的节点发起查询</text>

  <path class="query" d="M290 171 L420 171"/>
  <text class="small" x="320" y="154">SQL</text>

  <rect class="meta" x="430" y="285" width="320" height="112"/>
  <text class="bold" x="528" y="318">Citus 元数据</text>
  <text class="small" x="460" y="345">pg_dist_partition：逻辑表和分布列</text>
  <text class="small" x="460" y="368">pg_dist_shard：hash range 到 shard</text>
  <text class="small" x="460" y="391">pg_dist_placement / pg_dist_node：shard 在哪里</text>

  <path class="arrow" d="M590 240 L590 285"/>
  <text class="small" x="608" y="270">查路由</text>

  <rect class="worker" x="80" y="480" width="280" height="160"/>
  <text class="bold" x="162" y="512">Worker 1</text>
  <rect class="box" x="105" y="535" width="105" height="36"/>
  <text class="small" x="120" y="558">events_102008</text>
  <rect class="box" x="230" y="535" width="105" height="36"/>
  <text class="small" x="245" y="558">orders_102008</text>
  <rect class="ref" x="105" y="588" width="230" height="36"/>
  <text class="small" x="142" y="611">device_types_102100 副本</text>

  <rect class="worker" x="450" y="480" width="280" height="160"/>
  <text class="bold" x="532" y="512">Worker 2</text>
  <rect class="box" x="475" y="535" width="105" height="36"/>
  <text class="small" x="490" y="558">events_102009</text>
  <rect class="box" x="600" y="535" width="105" height="36"/>
  <text class="small" x="615" y="558">orders_102009</text>
  <rect class="ref" x="475" y="588" width="230" height="36"/>
  <text class="small" x="512" y="611">device_types_102100 副本</text>

  <rect class="worker" x="820" y="480" width="280" height="160"/>
  <text class="bold" x="902" y="512">Worker 3</text>
  <rect class="box" x="845" y="535" width="105" height="36"/>
  <text class="small" x="860" y="558">events_102010</text>
  <rect class="box" x="970" y="535" width="105" height="36"/>
  <text class="small" x="985" y="558">orders_102010</text>
  <rect class="ref" x="845" y="588" width="230" height="36"/>
  <text class="small" x="882" y="611">device_types_102100 副本</text>

  <path class="query" d="M500 397 C385 430, 300 448, 220 480"/>
  <path class="query" d="M590 397 L590 480"/>
  <path class="query" d="M680 397 C795 430, 880 448, 960 480"/>
  <text class="small" x="268" y="448">Task：普通 SQL 发到 shard</text>
  <text class="small" x="758" y="448">跨 shard 查询并行</text>

  <path class="sync" d="M750 330 C870 320, 965 355, 980 480"/>
  <path class="sync" d="M430 330 C300 320, 200 355, 195 480"/>
  <text class="small" x="785" y="312">metadata sync / shell table</text>

  <rect class="box" x="780" y="130" width="310" height="82"/>
  <text class="bold" x="875" y="163">普通 PostgreSQL 能力</text>
  <text class="small" x="813" y="188">索引、MVCC、WAL、扩展、分区、JSONB、PostGIS 等</text>
  <path class="arrow" d="M780 175 L760 175"/>

  <text class="small" x="64" y="690">读图要点：Citus 的数据面仍是 PostgreSQL 表；分布式能力来自元数据、规划、远程执行和事务协调。</text>
</svg>
