<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">Citus 元数据如何把逻辑表路由到物理 shard</title>
  <desc id="desc">展示 pg_dist_partition、pg_dist_colocation、pg_dist_shard、pg_dist_placement、pg_dist_node 的关系，以及 distribution key 到 hash range 的路由过程。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 27px sans-serif; fill: #111827; }
    .subtitle { font: 16px sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .catalog { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .range { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.6; rx: 8; }
    .place { fill: #fff7ed; stroke: #f97316; stroke-width: 1.6; rx: 8; }
    .node { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.5; rx: 8; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .bold { font: 700 16px sans-serif; fill: #111827; }
    .mono { font: 13px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .hash { stroke: #16a34a; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
    .join { stroke: #f97316; stroke-width: 2; fill: none; marker-end: url(#arrowOrange); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="700"/>
  <text class="title" x="40" y="48">元数据链路：逻辑表不是被拆掉，而是被映射</text>
  <text class="subtitle" x="40" y="78">Citus 查询路由的第一性问题是：给定一行或一个谓词，应该访问哪个 shard，在哪个节点上访问。</text>

  <rect class="box" x="55" y="135" width="255" height="100"/>
  <text class="bold" x="118" y="168">用户 SQL / DML</text>
  <text class="mono" x="78" y="195">WHERE tenant_id = 42</text>
  <text class="small" x="78" y="218">分布列值进入 hash / pruning</text>

  <rect class="range" x="380" y="125" width="250" height="120"/>
  <text class="bold" x="437" y="158">分布键 hash 值</text>
  <text class="small" x="407" y="185">hash(tenant_id) 落入某个范围</text>
  <text class="mono" x="410" y="213">shardminvalue &lt;= h &lt;= shardmaxvalue</text>

  <path class="hash" d="M310 185 L380 185"/>

  <rect class="catalog" x="60" y="310" width="245" height="145"/>
  <text class="bold" x="114" y="342">pg_dist_partition</text>
  <text class="small" x="86" y="369">logicalrelid：逻辑表 OID</text>
  <text class="small" x="86" y="392">partmethod：hash 等分布方式</text>
  <text class="small" x="86" y="415">partkey：分布列表达式</text>
  <text class="small" x="86" y="438">colocationid：共置组</text>

  <rect class="catalog" x="350" y="310" width="245" height="145"/>
  <text class="bold" x="408" y="342">pg_dist_shard</text>
  <text class="small" x="376" y="369">logicalrelid：所属逻辑表</text>
  <text class="small" x="376" y="392">shardid：物理表后缀</text>
  <text class="small" x="376" y="415">shardminvalue / shardmaxvalue</text>
  <text class="small" x="376" y="438">定义 hash range</text>

  <rect class="place" x="640" y="310" width="245" height="145"/>
  <text class="bold" x="696" y="342">pg_dist_placement</text>
  <text class="small" x="666" y="369">placementid：放置记录</text>
  <text class="small" x="666" y="392">shardid：哪个 shard</text>
  <text class="small" x="666" y="415">groupid：哪个节点组</text>
  <text class="small" x="666" y="438">shardstate / shardlength</text>

  <rect class="node" x="930" y="310" width="210" height="145"/>
  <text class="bold" x="984" y="342">pg_dist_node</text>
  <text class="small" x="955" y="369">groupid / nodeid</text>
  <text class="small" x="955" y="392">nodename / nodeport</text>
  <text class="small" x="955" y="415">isactive / hasmetadata</text>
  <text class="small" x="955" y="438">worker 或 coordinator</text>

  <path class="arrow" d="M305 382 L350 382"/>
  <path class="join" d="M595 382 L640 382"/>
  <path class="join" d="M885 382 L930 382"/>

  <rect class="catalog" x="70" y="515" width="355" height="88"/>
  <text class="bold" x="162" y="548">pg_dist_colocation</text>
  <text class="small" x="102" y="575">相同分布列类型、shard 数、replication factor 的表可共置</text>
  <text class="small" x="102" y="596">同一 hash range 的 shard group 会被放到同一 node group</text>

  <path class="arrow" d="M185 455 L225 515"/>
  <path class="arrow" d="M470 455 C420 505, 335 520, 300 515"/>

  <rect class="box" x="600" y="525" width="460" height="78"/>
  <text class="bold" x="700" y="558">路由结论</text>
  <text class="small" x="630" y="585">单租户谓词：常被剪枝到一个 shard group；跨租户聚合：生成多个 task 并行执行。</text>

  <path class="hash" d="M630 185 C740 220, 760 270, 760 310"/>
  <text class="small" x="680" y="245">命中 range 后得到 shardid</text>

  <text class="small" x="64" y="660">读图要点：分布列选择决定 hash range；共置组决定 join 是否能本地化；placement 决定 executor 连接哪个节点。</text>
</svg>
