<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Citus planner 与 adaptive executor 的执行流水线</title>
  <desc id="desc">展示 SQL 从 PostgreSQL parser 进入 Citus distributed_planner，再经过 fast-path、router、recursive、logical planner，最终由 CustomScan 和 adaptive executor 执行 task。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 27px sans-serif; fill: #111827; }
    .subtitle { font: 16px sans-serif; fill: #4b5563; }
    .stage { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .fast { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.7; rx: 8; }
    .plan { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .exec { fill: #fff7ed; stroke: #f97316; stroke-width: 1.7; rx: 8; }
    .result { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.6; rx: 8; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .bold { font: 700 16px sans-serif; fill: #111827; }
    .mono { font: 13px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .blue { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
    .orange { stroke: #f97316; stroke-width: 2.4; fill: none; marker-end: url(#arrowOrange); }
    .dash { stroke: #64748b; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="760"/>
  <text class="title" x="40" y="48">从一条 SQL 到多个 shard task：Citus 的分层规划和自适应执行</text>
  <text class="subtitle" x="40" y="78">它先尽量把问题降级为单 shard 路由；降不下去时，再生成多 task、子计划、中间结果和合并步骤。</text>

  <rect class="stage" x="55" y="130" width="220" height="76"/>
  <text class="bold" x="108" y="163">PostgreSQL parse</text>
  <text class="small" x="82" y="188">Query tree / RangeTblEntry</text>

  <rect class="plan" x="340" y="120" width="260" height="96"/>
  <text class="bold" x="418" y="153">distributed_planner</text>
  <text class="small" x="368" y="180">planner_hook 入口</text>
  <text class="small" x="368" y="203">判断是否包含 Citus table</text>

  <path class="blue" d="M275 168 L340 168"/>

  <rect class="fast" x="80" y="295" width="220" height="88"/>
  <text class="bold" x="112" y="328">Fast-path router</text>
  <text class="small" x="105" y="354">单表 + 分布列等值</text>
  <text class="small" x="105" y="376">可跳过 standard_planner</text>

  <rect class="fast" x="345" y="295" width="220" height="88"/>
  <text class="bold" x="395" y="328">Router planner</text>
  <text class="small" x="370" y="354">一个共置 shard group</text>
  <text class="small" x="370" y="376">整条查询发到一个 worker</text>

  <rect class="plan" x="610" y="295" width="220" height="88"/>
  <text class="bold" x="664" y="328">Recursive</text>
  <text class="small" x="635" y="354">不可下推子查询先执行</text>
  <text class="small" x="635" y="376">输出 intermediate result</text>

  <rect class="plan" x="875" y="295" width="220" height="88"/>
  <text class="bold" x="930" y="328">Logical planner</text>
  <text class="small" x="900" y="354">MultiTable / MultiJoin</text>
  <text class="small" x="900" y="376">下推过滤、投影、聚合</text>

  <path class="arrow" d="M470 216 C410 250, 265 260, 190 295"/>
  <path class="arrow" d="M470 216 C470 250, 455 260, 455 295"/>
  <path class="arrow" d="M500 216 C560 250, 680 260, 720 295"/>
  <path class="arrow" d="M525 216 C650 250, 875 260, 985 295"/>

  <rect class="stage" x="340" y="450" width="500" height="92"/>
  <text class="bold" x="520" y="483">DistributedPlan</text>
  <text class="small" x="370" y="510">workerJob + taskList + subPlanList + modLevel + fastPathRouterPlan</text>
  <text class="mono" x="370" y="532">Task: SELECT ... FROM events_102008 WHERE ...</text>

  <path class="blue" d="M190 383 C220 430, 310 455, 340 482"/>
  <path class="blue" d="M455 383 L455 450"/>
  <path class="blue" d="M720 383 C705 425, 650 450, 620 450"/>
  <path class="blue" d="M985 383 C900 425, 780 445, 740 450"/>

  <rect class="exec" x="105" y="610" width="245" height="92"/>
  <text class="bold" x="158" y="643">Custom Scan</text>
  <text class="small" x="132" y="670">Citus Adaptive / Sorted Merge</text>
  <text class="small" x="132" y="692">PostgreSQL executor 拉 tuple</text>

  <rect class="exec" x="465" y="610" width="260" height="92"/>
  <text class="bold" x="525" y="643">Adaptive executor</text>
  <text class="small" x="492" y="670">按 worker 管理连接池和队列</text>
  <text class="small" x="492" y="692">poll socket，收结果，失败重试 placement</text>

  <rect class="result" x="845" y="610" width="245" height="92"/>
  <text class="bold" x="900" y="643">结果返回</text>
  <text class="small" x="872" y="670">tuplestore / sorted merge / coordinator aggregate</text>
  <text class="small" x="872" y="692">继续交给 PostgreSQL executor</text>

  <path class="orange" d="M520 542 C425 575, 320 590, 260 610"/>
  <path class="orange" d="M590 542 L590 610"/>
  <path class="orange" d="M725 656 L845 656"/>
  <path class="dash" d="M350 656 L465 656"/>

  <text class="small" x="64" y="735">读图要点：Citus 的执行计划在 PostgreSQL 看来是 CustomScan；真正的分布式工作发生在 task 队列、连接池和 worker SQL 中。</text>
</svg>
