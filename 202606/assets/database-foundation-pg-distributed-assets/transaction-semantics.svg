<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Citus 分布式事务的收益与边界</title>
  <desc id="desc">对比单 shard 事务委托与多节点 2PC，并强调多节点提交不提供分布式快照隔离。</desc>
  <style>
    .bg { fill: #fbfcfd; }
    .title { font: 700 27px sans-serif; fill: #111827; }
    .subtitle { font: 16px sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .ok { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.7; rx: 8; }
    .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 1.7; rx: 8; }
    .risk { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 8; }
    .meta { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .label { font: 15px sans-serif; fill: #1f2937; }
    .small { font: 13px sans-serif; fill: #4b5563; }
    .bold { font: 700 16px sans-serif; fill: #111827; }
    .mono { font: 13px monospace; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .green { stroke: #16a34a; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
    .orange { stroke: #f97316; stroke-width: 2.4; fill: none; marker-end: url(#arrowOrange); }
    .red { stroke: #dc2626; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowRed); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="720"/>
  <text class="title" x="40" y="48">事务语义：单 shard 像 PostgreSQL，多节点靠 2PC，但不是全局快照隔离</text>
  <text class="subtitle" x="40" y="78">Citus 最适合把事务约束在 tenant / distribution key 内；跨节点写入能原子提交，但可见性仍有边界。</text>

  <rect class="ok" x="70" y="130" width="470" height="210"/>
  <text class="bold" x="232" y="164">路径 A：单 shard / 单 worker</text>
  <rect class="box" x="105" y="195" width="155" height="50"/>
  <text class="small" x="130" y="225">BEGIN / DML</text>
  <rect class="box" x="320" y="195" width="185" height="50"/>
  <text class="small" x="346" y="225">Worker 本地事务</text>
  <path class="green" d="M260 220 L320 220"/>
  <text class="small" x="108" y="282">同一租户、同一 shard group 内的事务被委托给 worker。</text>
  <text class="small" x="108" y="306">隔离、锁、MVCC、WAL 语义等同单机 PostgreSQL。</text>

  <rect class="warn" x="640" y="130" width="470" height="250"/>
  <text class="bold" x="805" y="164">路径 B：多 worker 写入</text>
  <rect class="box" x="675" y="205" width="140" height="48"/>
  <text class="small" x="708" y="234">PRE_COMMIT</text>
  <rect class="box" x="850" y="185" width="210" height="48"/>
  <text class="small" x="885" y="214">PREPARE TRANSACTION</text>
  <rect class="box" x="850" y="255" width="210" height="48"/>
  <text class="small" x="900" y="284">COMMIT PREPARED</text>
  <path class="orange" d="M815 229 L850 209"/>
  <path class="orange" d="M815 229 L850 279"/>
  <text class="small" x="676" y="334">协调者在提交前 prepare；提交记录用于故障恢复。</text>
  <text class="small" x="676" y="358">maintenance daemon 对比提交记录和 worker prepared xact 推进恢复。</text>

  <rect class="meta" x="90" y="430" width="425" height="145"/>
  <text class="bold" x="210" y="464">能保证什么</text>
  <text class="small" x="122" y="492">原子性：跨节点写入要么提交，要么恢复为中止。</text>
  <text class="small" x="122" y="518">持久性：使用 PostgreSQL prepared transaction。</text>
  <text class="small" x="122" y="544">读己之写：Citus 事务管理会复用相关连接和状态。</text>

  <rect class="risk" x="665" y="430" width="425" height="145"/>
  <text class="bold" x="785" y="464">不能自动保证什么</text>
  <text class="small" x="697" y="492">多节点 prepared transaction 的可见时间不完全一致。</text>
  <text class="small" x="697" y="518">因此不提供完整分布式 snapshot isolation。</text>
  <text class="small" x="697" y="544">跨 shard 更新可能看到并发 2PC 的部分可见状态。</text>

  <path class="red" d="M875 380 L875 430"/>
  <path class="arrow" d="M305 340 L305 430"/>

  <rect class="box" x="265" y="615" width="650" height="52"/>
  <text class="bold" x="390" y="648">实践准则：把 OLTP 事务设计成 distribution key scoped，跨租户操作尽量异步化或幂等化。</text>

  <text class="small" x="64" y="700">读图要点：2PC 解决提交原子性，不等于解决所有隔离级别问题；建模时要先问“这笔交易会不会跨 shard”。</text>
</svg>
