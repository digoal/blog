<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Patroni 自动故障切换时序</title>
  <desc id="desc">展示主库失联后，leader lock 过期、候选副本竞争、提升新主、旧主 rewind 或重建的流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .lane { stroke: #cbd5e1; stroke-width: 2; }
      .event { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .good { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
      .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="28" y="25" width="1064" height="610" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="55" y="62" class="label">自动 failover 的核心：谁能证明自己最健康，谁才能拿到新 leader lock 并 promote</text>

  <line x1="115" y1="125" x2="1010" y2="125" class="lane"/>
  <line x1="115" y1="290" x2="1010" y2="290" class="lane"/>
  <line x1="115" y1="455" x2="1010" y2="455" class="lane"/>
  <text x="50" y="132" class="small">旧主 A</text>
  <text x="50" y="297" class="small">副本 B</text>
  <text x="50" y="462" class="small">DCS</text>

  <rect x="130" y="92" width="160" height="66" class="good"/>
  <text x="164" y="121" class="small">A 更新 /leader</text>
  <text x="160" y="143" class="small">正常提供写入</text>

  <rect x="340" y="92" width="170" height="66" class="bad"/>
  <text x="370" y="121" class="small">A 故障或隔离</text>
  <text x="365" y="143" class="small">无法续约 /leader</text>

  <rect x="555" y="422" width="170" height="66" class="warn"/>
  <text x="588" y="451" class="small">/leader 过期</text>
  <text x="580" y="473" class="small">进入 leader race</text>

  <rect x="555" y="257" width="170" height="66" class="event"/>
  <text x="586" y="286" class="small">B 评估资格</text>
  <text x="575" y="308" class="small">LSN、timeline、tags</text>

  <rect x="780" y="257" width="170" height="66" class="good"/>
  <text x="812" y="286" class="small">B acquire 成功</text>
  <text x="815" y="308" class="small">promote 新主</text>

  <rect x="780" y="422" width="170" height="66" class="good"/>
  <text x="812" y="451" class="small">写入新 /leader</text>
  <text x="805" y="473" class="small">更新 /status /history</text>

  <rect x="825" y="92" width="190" height="66" class="warn"/>
  <text x="855" y="121" class="small">A 恢复后降级</text>
  <text x="846" y="143" class="small">pg_rewind 或重建</text>

  <path d="M290 125 H340" class="line"/>
  <path d="M510 125 C560 170 605 345 640 422" class="dash"/>
  <path d="M640 422 V323" class="line"/>
  <path d="M725 290 H780" class="line"/>
  <path d="M865 323 V422" class="line"/>
  <path d="M780 455 C715 410 690 335 725 290" class="dash"/>
  <path d="M950 290 C1020 230 1020 150 1015 125" class="dash"/>

  <text x="570" y="215" class="small">候选节点不是“谁先醒来谁当主”</text>
  <text x="570" y="238" class="small">还要通过健康、复制落后、同步状态和 nofailover 等检查</text>

  <rect x="120" y="542" width="880" height="52" fill="#f1f5f9" stroke="#cbd5e1" rx="6"/>
  <text x="145" y="574" class="small">异步复制下可能丢失未复制 WAL；同步模式降低丢数风险，但会把不可证明安全的场景转化为写不可用。</text>
</svg>
