<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">DCS 失联时 failsafe 与 watchdog 的边界</title>
  <desc id="desc">展示 Patroni 在 DCS 失联、网络分区和本机卡死时如何用 failsafe REST 确认和 watchdog 重置降低脑裂风险。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .ok { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
      .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
      .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .dcs { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="28" y="25" width="1064" height="650" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="55" y="62" class="label">DCS 失联时，Patroni 先保守降级；只有能证明所有成员仍可达时，failsafe 才允许旧主继续写</text>

  <rect x="70" y="115" width="210" height="82" class="ok"/>
  <text x="126" y="148" class="label">旧主 A</text>
  <text x="95" y="174" class="small">PostgreSQL primary</text>

  <rect x="440" y="115" width="240" height="82" class="dcs"/>
  <text x="518" y="148" class="label">DCS</text>
  <text x="465" y="174" class="small">/leader 更新失败</text>

  <rect x="825" y="95" width="230" height="120" class="box"/>
  <text x="870" y="128" class="label">副本集合</text>
  <text x="850" y="156" class="small">B、C、所有 /failsafe 成员</text>
  <text x="850" y="181" class="small">通过 REST API 响应</text>

  <rect x="105" y="300" width="260" height="92" class="warn"/>
  <text x="145" y="333" class="label">failsafe 检查</text>
  <text x="130" y="360" class="small">POST /failsafe 到所有成员</text>

  <rect x="445" y="285" width="250" height="122" class="ok"/>
  <text x="492" y="320" class="label">全部确认</text>
  <text x="470" y="347" class="small">继续作为 primary</text>
  <text x="470" y="372" class="small">缓存状态 ttl 秒</text>
  <text x="470" y="397" class="small">同步复制槽进度</text>

  <rect x="780" y="285" width="250" height="122" class="bad"/>
  <text x="832" y="320" class="label">任一不可达</text>
  <text x="805" y="347" class="small">认为可能是网络分区</text>
  <text x="805" y="372" class="small">旧主主动 demote</text>
  <text x="805" y="397" class="small">避免双主写入</text>

  <rect x="145" y="500" width="350" height="92" class="box"/>
  <text x="225" y="533" class="label">watchdog</text>
  <text x="170" y="560" class="small">Patroni 卡死、OOM、无法及时停 PG 时</text>
  <text x="170" y="585" class="small">由 OS/硬件重置整机作为最后保险</text>

  <rect x="630" y="500" width="350" height="92" class="box"/>
  <text x="725" y="533" class="label">时间边界</text>
  <text x="655" y="560" class="small">ttl、loop_wait、retry_timeout、safety_margin</text>
  <text x="655" y="585" class="small">共同决定误切、停写和重置窗口</text>

  <path d="M280 156 H440" class="line"/>
  <path d="M560 197 C510 255 405 320 365 346" class="line"/>
  <path d="M365 346 H445" class="line"/>
  <path d="M365 346 H780" class="line"/>
  <path d="M235 300 C345 190 665 125 825 155" class="dash"/>
  <path d="M570 407 C520 465 455 500 385 500" class="dash"/>
  <path d="M570 407 C625 460 705 490 805 500" class="dash"/>
  <path d="M940 215 C855 260 765 305 695 346" class="dash"/>

  <rect x="83" y="624" width="955" height="36" fill="#f1f5f9" stroke="#cbd5e1" rx="6"/>
  <text x="105" y="647" class="small">边界：failsafe 处理“DCS 不可达但成员互通”，watchdog 处理“本机不再可信”，二者不能替代 DCS 共识。</text>
</svg>
