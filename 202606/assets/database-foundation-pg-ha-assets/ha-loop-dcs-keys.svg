<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Patroni HA loop 与 DCS 键</title>
  <desc id="desc">展示每个 HA loop 周期如何读取 DCS、检查 PostgreSQL、更新 leader lock 与成员状态，并根据集群状态采取动作。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .step { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .decision { fill: #fefce8; stroke: #a16207; stroke-width: 2; }
      .action { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .danger { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .dcs { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="28" y="25" width="1064" height="650" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="55" y="62" class="label">每个 loop_wait 周期：把 DCS 状态和本机 PostgreSQL 状态收敛到一个动作</text>

  <rect x="70" y="108" width="190" height="64" class="step"/>
  <text x="95" y="137" class="label">1. load_cluster</text>
  <text x="92" y="158" class="small">读取 DCS 快照</text>

  <rect x="330" y="95" width="210" height="90" class="dcs"/>
  <text x="390" y="126" class="label">DCS 关键键</text>
  <text x="352" y="151" class="small">/leader /members /config</text>
  <text x="352" y="172" class="small">/status /sync /failsafe</text>

  <rect x="610" y="108" width="210" height="64" class="step"/>
  <text x="646" y="137" class="label">2. 检查本机 PG</text>
  <text x="633" y="158" class="small">role、state、sysid、LSN</text>

  <polygon points="710,245 830,310 710,375 590,310" class="decision"/>
  <text x="658" y="306" class="label">集群有 leader?</text>
  <text x="673" y="329" class="small">leader key 是否存在</text>

  <polygon points="360,245 480,310 360,375 240,310" class="decision"/>
  <text x="305" y="306" class="label">我持有 lock?</text>
  <text x="306" y="329" class="small">/leader == name</text>

  <rect x="120" y="455" width="220" height="74" class="action"/>
  <text x="166" y="486" class="label">更新租约</text>
  <text x="145" y="510" class="small">update_leader + /status</text>

  <rect x="445" y="455" width="220" height="74" class="action"/>
  <text x="500" y="486" class="label">跟随主库</text>
  <text x="470" y="510" class="small">写 recovery 参数并 follow</text>

  <rect x="765" y="455" width="220" height="74" class="danger"/>
  <text x="820" y="486" class="label">leader race</text>
  <text x="795" y="510" class="small">健康节点尝试 acquire</text>

  <rect x="420" y="590" width="270" height="54" class="step"/>
  <text x="470" y="622" class="label">touch_member + 下次调度</text>

  <path d="M260 140 H330" class="dash"/>
  <path d="M540 140 H610" class="dash"/>
  <path d="M715 172 V245" class="line"/>
  <path d="M590 310 H480" class="line"/>
  <path d="M360 375 C330 420 275 430 230 455" class="line"/>
  <text x="251" y="425" class="small">是</text>
  <path d="M360 375 C415 420 500 425 555 455" class="line"/>
  <text x="438" y="425" class="small">否且有 leader</text>
  <path d="M830 310 C905 340 930 390 875 455" class="line"/>
  <text x="885" y="382" class="small">否</text>

  <path d="M230 529 C260 575 380 597 420 617" class="line"/>
  <path d="M555 529 V590" class="line"/>
  <path d="M875 529 C820 590 720 612 690 617" class="line"/>

  <path d="M230 455 C210 355 232 230 330 172" class="dash"/>
  <text x="165" y="310" class="small">CAS 更新 leader TTL</text>
  <path d="M875 455 C820 360 720 225 540 172" class="dash"/>
  <text x="812" y="292" class="small">Compare-And-Create</text>

  <rect x="78" y="608" width="260" height="36" fill="#f1f5f9" stroke="#cbd5e1" rx="6"/>
  <text x="96" y="631" class="small">规则：loop_wait + 2 * retry_timeout &lt;= ttl</text>
</svg>
