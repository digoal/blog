<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Patroni 控制面与数据面的关系</title>
  <desc id="desc">展示应用、HAProxy、Patroni 节点、PostgreSQL 实例、DCS 和 REST API 之间的高可用控制关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .primary { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
      .replica { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .dcs { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
      .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="30" y="25" width="1060" height="610" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="55" y="62" class="label">Patroni 把 PostgreSQL 高可用拆成“数据复制”和“控制裁判”两层</text>

  <rect x="70" y="105" width="170" height="72" class="box"/>
  <text x="100" y="137" class="label">业务应用</text>
  <text x="92" y="161" class="small">只连稳定入口</text>

  <rect x="310" y="105" width="190" height="72" class="box"/>
  <text x="366" y="137" class="label">HAProxy</text>
  <text x="335" y="161" class="small">HTTP 健康检查选主</text>

  <rect x="610" y="95" width="410" height="118" class="dcs"/>
  <text x="765" y="128" class="label">DCS</text>
  <text x="640" y="158" class="small">/leader：带 TTL 的主节点租约</text>
  <text x="640" y="183" class="small">/members、/config、/status、/sync、/failsafe</text>

  <rect x="75" y="285" width="260" height="210" class="primary"/>
  <text x="132" y="320" class="label">节点 A：Leader</text>
  <rect x="105" y="345" width="200" height="54" fill="#ffffff" stroke="#0369a1" stroke-width="1.5" rx="6"/>
  <text x="135" y="378" class="small">Patroni HA loop</text>
  <rect x="105" y="420" width="200" height="54" fill="#ffffff" stroke="#0369a1" stroke-width="1.5" rx="6"/>
  <text x="130" y="453" class="small">PostgreSQL primary</text>

  <rect x="430" y="285" width="260" height="210" class="replica"/>
  <text x="492" y="320" class="label">节点 B：Replica</text>
  <rect x="460" y="345" width="200" height="54" fill="#ffffff" stroke="#047857" stroke-width="1.5" rx="6"/>
  <text x="490" y="378" class="small">Patroni HA loop</text>
  <rect x="460" y="420" width="200" height="54" fill="#ffffff" stroke="#047857" stroke-width="1.5" rx="6"/>
  <text x="492" y="453" class="small">PostgreSQL replica</text>

  <rect x="785" y="285" width="260" height="210" class="replica"/>
  <text x="847" y="320" class="label">节点 C：Replica</text>
  <rect x="815" y="345" width="200" height="54" fill="#ffffff" stroke="#047857" stroke-width="1.5" rx="6"/>
  <text x="845" y="378" class="small">Patroni HA loop</text>
  <rect x="815" y="420" width="200" height="54" fill="#ffffff" stroke="#047857" stroke-width="1.5" rx="6"/>
  <text x="847" y="453" class="small">PostgreSQL replica</text>

  <path d="M240 141 H310" class="line"/>
  <path d="M500 141 C545 141 550 141 610 141" class="dash"/>
  <text x="515" y="128" class="tiny">健康检查</text>
  <path d="M405 177 C372 240 285 251 220 285" class="line"/>
  <text x="300" y="238" class="tiny">写流量到当前 primary</text>

  <path d="M205 345 C300 230 485 205 650 183" class="dash"/>
  <path d="M560 345 C605 270 690 225 755 213" class="dash"/>
  <path d="M915 345 C890 275 850 236 815 213" class="dash"/>
  <text x="485" y="250" class="tiny">读写 DCS 状态</text>

  <path d="M305 447 H460" class="line"/>
  <path d="M305 447 C480 545 650 545 815 447" class="line"/>
  <text x="480" y="524" class="tiny">PostgreSQL streaming replication</text>

  <path d="M305 372 H460" class="dash"/>
  <path d="M660 372 H815" class="dash"/>
  <text x="525" y="360" class="tiny">REST API 互探</text>

  <rect x="92" y="552" width="940" height="46" fill="#f1f5f9" stroke="#cbd5e1" rx="6"/>
  <text x="114" y="581" class="small">要点：DCS 决定“谁能写”，PostgreSQL 流复制搬运 WAL，REST API 与负载均衡把节点状态暴露给集群和应用入口。</text>
</svg>
