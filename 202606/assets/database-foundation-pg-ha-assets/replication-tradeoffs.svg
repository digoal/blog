<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Patroni 复制模式的可用性与一致性权衡</title>
  <desc id="desc">对比异步复制、Patroni 同步模式、严格同步模式和 quorum 同步模式在写延迟、丢数风险与可用性上的差异。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .async { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
      .sync { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
      .strict { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
      .quorum { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
      .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
      .axis { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="28" y="25" width="1064" height="650" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="55" y="62" class="label">复制模式不是“越同步越好”，而是在 RPO、写延迟和可用性之间选边界</text>

  <line x1="120" y1="560" x2="1010" y2="560" class="axis"/>
  <line x1="120" y1="560" x2="120" y2="120" class="axis"/>
  <text x="470" y="610" class="small">写入可用性更高</text>
  <text x="48" y="320" class="small" transform="rotate(-90 48 320)">提交确认更强</text>

  <rect x="185" y="390" width="205" height="120" class="async"/>
  <text x="245" y="425" class="label">异步模式</text>
  <text x="210" y="455" class="small">默认，写延迟低</text>
  <text x="210" y="480" class="small">failover RPO 由复制落后控制</text>

  <rect x="430" y="280" width="220" height="132" class="sync"/>
  <text x="488" y="316" class="label">同步模式</text>
  <text x="455" y="346" class="small">只提升已知安全节点</text>
  <text x="455" y="371" class="small">无合格副本时可能降级写保障</text>
  <text x="455" y="396" class="small">故障时更可能牺牲写可用</text>

  <rect x="690" y="185" width="240" height="132" class="strict"/>
  <text x="752" y="221" class="label">严格同步</text>
  <text x="715" y="251" class="small">没有同步副本就阻塞写</text>
  <text x="715" y="276" class="small">保障更强，运维窗口更窄</text>
  <text x="715" y="301" class="small">仍需理解 PG 同步复制边界</text>

  <rect x="670" y="390" width="260" height="120" class="quorum"/>
  <text x="735" y="425" class="label">quorum 同步</text>
  <text x="700" y="455" class="small">ANY N(voters) 降低慢副本影响</text>
  <text x="700" y="480" class="small">选主需证明 quorum 交集安全</text>

  <rect x="145" y="105" width="325" height="88" class="panel"/>
  <text x="170" y="137" class="small">异步最适合：读多写多、跨机房延迟高、</text>
  <text x="170" y="162" class="small">业务可接受小窗口丢失并有 WAL 归档。</text>

  <rect x="590" y="95" width="390" height="72" class="panel"/>
  <text x="615" y="127" class="small">同步最适合：订单、账务、元数据等需要把</text>
  <text x="615" y="152" class="small">“不确定是否丢数”显式变成“暂停写入”。</text>

  <text x="200" y="548" class="tiny">低延迟</text>
  <text x="874" y="548" class="tiny">高可用</text>
  <text x="132" y="138" class="tiny">强提交确认</text>
  <text x="132" y="540" class="tiny">弱提交确认</text>
</svg>
