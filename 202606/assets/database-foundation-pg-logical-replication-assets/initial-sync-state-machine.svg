<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">逻辑复制初始化同步状态机</title>
  <desc id="desc">展示表同步 worker 和 apply worker 协作完成 INIT 到 READY 状态转换。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#553c9a"/>
    </marker>
    <style>
      .state { fill: #faf5ff; stroke: #553c9a; stroke-width: 2; rx: 8; }
      .memory { fill: #fffaf0; stroke: #b7791f; stroke-width: 2; rx: 8; }
      .ready { fill: #f0fff4; stroke: #2f855a; stroke-width: 2; rx: 8; }
      .line { stroke: #553c9a; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #718096; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .title { font: 700 22px sans-serif; fill: #1a202c; }
      .text { font: 16px sans-serif; fill: #2d3748; }
      .small { font: 14px sans-serif; fill: #4a5568; }
      .code { font: 13px monospace; fill: #2d3748; }
    </style>
  </defs>

  <text x="44" y="48" class="title">Initial table sync：COPY 不是终点，追平 apply 才是 READY</text>

  <rect x="55" y="105" width="120" height="70" class="state"/>
  <text x="88" y="136" class="text">INIT</text>
  <text x="80" y="158" class="code">catalog</text>
  <rect x="215" y="105" width="140" height="70" class="state"/>
  <text x="245" y="136" class="text">DATASYNC</text>
  <text x="245" y="158" class="small">开始 COPY</text>
  <rect x="395" y="105" width="155" height="70" class="state"/>
  <text x="421" y="136" class="text">FINISHEDCOPY</text>
  <text x="432" y="158" class="code">catalog</text>
  <rect x="590" y="105" width="135" height="70" class="memory"/>
  <text x="625" y="136" class="text">SYNCWAIT</text>
  <text x="622" y="158" class="code">shared memory</text>
  <rect x="765" y="105" width="120" height="70" class="memory"/>
  <text x="794" y="136" class="text">CATCHUP</text>
  <text x="792" y="158" class="code">shared memory</text>

  <path d="M175 140 L215 140" class="line"/>
  <path d="M355 140 L395 140" class="line"/>
  <path d="M550 140 L590 140" class="line"/>
  <path d="M725 140 L765 140" class="line"/>

  <rect x="300" y="275" width="155" height="70" class="state"/>
  <text x="335" y="306" class="text">SYNCDONE</text>
  <text x="335" y="328" class="code">catalog + LSN</text>
  <rect x="560" y="275" width="130" height="70" class="ready"/>
  <text x="597" y="306" class="text">READY</text>
  <text x="588" y="328" class="code">catalog + LSN</text>

  <path d="M825 175 C825 250, 540 250, 455 310" class="line"/>
  <path d="M455 310 L560 310" class="line"/>

  <rect x="85" y="410" width="365" height="85" class="state"/>
  <text x="115" y="443" class="text">Table Sync Worker</text>
  <text x="115" y="467" class="small">创建临时 sync slot，COPY 初始数据，再读取变化追到指定 LSN。</text>
  <rect x="590" y="410" width="365" height="85" class="state"/>
  <text x="620" y="443" class="text">Apply Worker</text>
  <text x="620" y="467" class="small">发现 SYNCWAIT 后给出 CATCHUP 位置，随后在 LSN 到达时标记 READY。</text>
  <path d="M590 452 L450 452" class="dash"/>
  <path d="M450 452 C420 390, 430 345, 455 310" class="dash"/>

  <text x="70" y="225" class="small">COPY 完成只说明“表快照搬完了”。真正可交回主 apply worker，要保证 COPY 期间产生的变更也已按顺序应用。</text>
</svg>
