<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="570" viewBox="0 0 1040 570" role="img" aria-labelledby="title desc">
  <title id="title">逻辑复制的运维风险闭环</title>
  <desc id="desc">展示延迟、复制槽、WAL 保留、catalog_xmin、冲突和监控之间的反馈关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#744210"/>
    </marker>
    <style>
      .box { fill: #fffaf0; stroke: #744210; stroke-width: 2; rx: 8; }
      .good { fill: #f0fff4; stroke: #2f855a; stroke-width: 2; rx: 8; }
      .bad { fill: #fff5f5; stroke: #c53030; stroke-width: 2; rx: 8; }
      .line { stroke: #744210; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .redline { stroke: #c53030; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .title { font: 700 22px sans-serif; fill: #1a202c; }
      .text { font: 16px sans-serif; fill: #2d3748; }
      .small { font: 14px sans-serif; fill: #4a5568; }
      .code { font: 13px monospace; fill: #2d3748; }
    </style>
  </defs>

  <text x="44" y="48" class="title">逻辑复制运维：slot 是保险，也可能变成 WAL 与膨胀压力源</text>

  <rect x="80" y="100" width="180" height="82" class="box"/>
  <text x="112" y="132" class="text">订阅端延迟</text>
  <text x="102" y="156" class="code">received_lsn 落后</text>

  <rect x="420" y="80" width="200" height="96" class="bad"/>
  <text x="454" y="116" class="text">slot 进度不前</text>
  <text x="443" y="140" class="code">confirmed_flush_lsn</text>
  <text x="443" y="160" class="code">restart_lsn</text>

  <rect x="775" y="100" width="190" height="82" class="bad"/>
  <text x="805" y="132" class="text">WAL 保留增加</text>
  <text x="798" y="156" class="code">safe_wal_size 变小</text>

  <rect x="80" y="305" width="210" height="92" class="bad"/>
  <text x="112" y="338" class="text">catalog/heap 保留</text>
  <text x="104" y="362" class="code">xmin / catalog_xmin</text>
  <text x="104" y="382" class="small">VACUUM 无法清理部分元组</text>

  <rect x="430" y="320" width="190" height="82" class="bad"/>
  <text x="462" y="352" class="text">冲突或错误停止</text>
  <text x="455" y="376" class="code">insert_exists 等</text>

  <rect x="765" y="305" width="210" height="92" class="good"/>
  <text x="797" y="338" class="text">监控与护栏</text>
  <text x="790" y="362" class="code">pg_replication_slots</text>
  <text x="790" y="382" class="code">pg_stat_subscription</text>

  <path d="M260 141 C320 118, 360 108, 420 118" class="line"/>
  <path d="M620 128 C680 116, 720 118, 775 135" class="redline"/>
  <path d="M870 182 C880 235, 870 265, 870 305" class="redline"/>
  <path d="M765 352 C705 368, 675 368, 620 362" class="line"/>
  <path d="M430 362 C375 358, 340 354, 290 351" class="redline"/>
  <path d="M185 305 C175 260, 170 222, 170 182" class="redline"/>
  <path d="M965 142 C1000 220, 1000 415, 884 438 C700 506, 320 495, 170 397" class="line"/>

  <rect x="355" y="465" width="330" height="58" class="good"/>
  <text x="382" y="492" class="text">处理原则：先判断“落后、卡住、冲突、WAL 风险”是哪一种</text>
  <text x="382" y="514" class="small">不要直接 drop slot 或 SKIP 事务，先确认一致性影响。</text>
</svg>
