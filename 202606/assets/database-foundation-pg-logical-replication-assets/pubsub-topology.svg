<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">逻辑复制的发布订阅拓扑</title>
  <desc id="desc">展示 publisher、publication、logical slot、walsender、subscriber、subscription、apply worker 与本地表之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
    <style>
      .box { fill: #f8fbff; stroke: #2f5d8c; stroke-width: 2; rx: 8; }
      .soft { fill: #fffaf0; stroke: #b7791f; stroke-width: 2; rx: 8; }
      .green { fill: #f0fff4; stroke: #2f855a; stroke-width: 2; rx: 8; }
      .line { stroke: #2f5d8c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #718096; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .title { font: 700 22px sans-serif; fill: #1a202c; }
      .text { font: 16px sans-serif; fill: #2d3748; }
      .small { font: 14px sans-serif; fill: #4a5568; }
      .mono { font: 14px monospace; fill: #2d3748; }
    </style>
  </defs>

  <rect x="35" y="38" width="405" height="430" class="box"/>
  <text x="62" y="78" class="title">Publisher 数据库</text>
  <rect x="72" y="112" width="145" height="70" class="green"/>
  <text x="94" y="144" class="text">业务表</text>
  <text x="93" y="166" class="mono">orders, users</text>
  <rect x="72" y="220" width="145" height="80" class="soft"/>
  <text x="91" y="252" class="text">Publication</text>
  <text x="90" y="276" class="small">表、列、行过滤</text>
  <rect x="260" y="112" width="135" height="70" class="box"/>
  <text x="287" y="144" class="text">WAL</text>
  <text x="283" y="166" class="small">物理日志源</text>
  <rect x="260" y="220" width="135" height="80" class="box"/>
  <text x="281" y="252" class="text">Logical Slot</text>
  <text x="282" y="276" class="small">保留 WAL/进度</text>
  <rect x="170" y="345" width="160" height="75" class="box"/>
  <text x="195" y="377" class="text">walsender</text>
  <text x="189" y="401" class="small">logical decoding + pgoutput</text>

  <rect x="540" y="38" width="405" height="430" class="box"/>
  <text x="567" y="78" class="title">Subscriber 数据库</text>
  <rect x="575" y="112" width="155" height="80" class="soft"/>
  <text x="599" y="144" class="text">Subscription</text>
  <text x="594" y="168" class="small">连接串 + publication</text>
  <rect x="765" y="112" width="135" height="80" class="box"/>
  <text x="790" y="144" class="text">Launcher</text>
  <text x="787" y="168" class="small">启动 worker</text>
  <rect x="575" y="240" width="155" height="82" class="box"/>
  <text x="602" y="272" class="text">Apply Worker</text>
  <text x="598" y="296" class="small">按事务顺序应用</text>
  <rect x="765" y="240" width="135" height="82" class="green"/>
  <text x="794" y="272" class="text">本地表</text>
  <text x="784" y="296" class="small">同名关系映射</text>
  <rect x="575" y="365" width="325" height="65" class="soft"/>
  <text x="597" y="394" class="text">Table/Sequence Sync Worker</text>
  <text x="597" y="416" class="small">初始化 COPY、序列同步、并行 catch up</text>

  <path d="M217 147 L260 147" class="line"/>
  <path d="M145 182 L145 220" class="line"/>
  <path d="M328 182 L328 220" class="line"/>
  <path d="M260 260 L217 260" class="line"/>
  <path d="M217 300 L217 345" class="line"/>
  <path d="M330 382 C430 382, 460 282, 575 282" class="line"/>
  <path d="M730 152 L765 152" class="line"/>
  <path d="M833 192 L833 240" class="line"/>
  <path d="M730 282 L765 282" class="line"/>
  <path d="M650 322 L650 365" class="dash"/>
  <path d="M735 365 L735 322" class="dash"/>

  <text x="378" y="325" class="small">流复制协议传输逻辑消息</text>
  <text x="72" y="454" class="small">publication 定义“发什么”，slot 定义“从哪里继续”。</text>
  <text x="575" y="454" class="small">subscription 定义“拉哪些 publication”，worker 负责复制和应用。</text>
</svg>
