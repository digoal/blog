<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">WAL 到 pgoutput 逻辑消息的转换链路</title>
  <desc id="desc">展示 WAL record 经过 decode、snapbuild、reorder buffer、publication 过滤和 pgoutput 编码后发送给订阅端。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#285e61"/>
    </marker>
    <style>
      .stage { fill: #f7fafc; stroke: #285e61; stroke-width: 2; rx: 8; }
      .warn { fill: #fffaf0; stroke: #b7791f; stroke-width: 2; rx: 8; }
      .out { fill: #f0fff4; stroke: #2f855a; stroke-width: 2; rx: 8; }
      .line { stroke: #285e61; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #718096; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .title { font: 700 22px sans-serif; fill: #1a202c; }
      .text { font: 16px sans-serif; fill: #2d3748; }
      .small { font: 14px sans-serif; fill: #4a5568; }
      .code { font: 13px monospace; fill: #2d3748; }
    </style>
  </defs>

  <text x="42" y="48" class="title">Publisher 端：从物理 WAL 到逻辑复制协议</text>

  <rect x="50" y="90" width="140" height="86" class="stage"/>
  <text x="82" y="124" class="text">WAL record</text>
  <text x="70" y="148" class="small">heap/xact/standby</text>
  <text x="70" y="168" class="code">INSERT UPDATE COMMIT</text>

  <rect x="235" y="90" width="155" height="86" class="stage"/>
  <text x="260" y="124" class="text">decode.c</text>
  <text x="252" y="148" class="small">识别 rmgr 记录</text>
  <text x="252" y="168" class="small">转成变更事件</text>

  <rect x="435" y="70" width="170" height="126" class="stage"/>
  <text x="470" y="106" class="text">SnapBuild</text>
  <text x="460" y="130" class="small">构建 catalog snapshot</text>
  <text x="460" y="154" class="small">决定何时可解码</text>
  <text x="460" y="178" class="code">SNAPBUILD_FULL</text>

  <rect x="655" y="70" width="180" height="126" class="warn"/>
  <text x="695" y="106" class="text">ReorderBuffer</text>
  <text x="680" y="130" class="small">按事务重组变更</text>
  <text x="680" y="154" class="small">大事务可 spill/stream</text>
  <text x="680" y="178" class="code">commit order</text>

  <rect x="875" y="90" width="120" height="86" class="out"/>
  <text x="902" y="124" class="text">pgoutput</text>
  <text x="895" y="148" class="small">标准输出插件</text>
  <text x="895" y="168" class="small">编码协议消息</text>

  <path d="M190 133 L235 133" class="line"/>
  <path d="M390 133 L435 133" class="line"/>
  <path d="M605 133 L655 133" class="line"/>
  <path d="M835 133 L875 133" class="line"/>

  <rect x="120" y="265" width="190" height="92" class="warn"/>
  <text x="150" y="298" class="text">复制身份</text>
  <text x="142" y="322" class="small">UPDATE/DELETE 需要</text>
  <text x="142" y="344" class="code">PRIMARY KEY / RI / FULL</text>

  <rect x="375" y="265" width="210" height="92" class="warn"/>
  <text x="405" y="298" class="text">Publication 规则</text>
  <text x="398" y="322" class="small">publish 动作、列列表、行过滤</text>
  <text x="398" y="344" class="code">INSERT UPDATE DELETE TRUNCATE</text>

  <rect x="650" y="265" width="210" height="92" class="warn"/>
  <text x="678" y="298" class="text">协议选项</text>
  <text x="674" y="322" class="small">binary / streaming / 2PC</text>
  <text x="674" y="344" class="code">proto_version 1..4</text>

  <path d="M215 265 C260 222, 330 204, 520 196" class="dash"/>
  <path d="M480 265 C520 226, 650 210, 745 196" class="dash"/>
  <path d="M755 265 C815 220, 884 205, 935 176" class="dash"/>

  <rect x="305" y="420" width="430" height="80" class="out"/>
  <text x="355" y="452" class="text">逻辑复制协议消息：BEGIN / RELATION / INSERT / UPDATE / DELETE / COMMIT</text>
  <text x="355" y="478" class="small">subscriber 端按事务边界和 relation mapping 应用，不重放物理 block。</text>
  <path d="M935 176 C930 300, 760 386, 735 450" class="line"/>
</svg>
