<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 物理流复制整体架构</title>
  <desc id="desc">主库产生 WAL，由 walsender 发送给备库 walreceiver，备库写入 pg_wal 后由 startup 进程重放；归档和复制槽提供追赶保护。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d8c"/>
    </marker>
  </defs>
  <rect x="30" y="40" width="390" height="390" rx="8" fill="#eef6f2" stroke="#497b5a" stroke-width="2"/>
  <text x="225" y="78" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#173b2a">主库 Primary</text>
  <rect x="70" y="115" width="145" height="58" rx="6" fill="#ffffff" stroke="#497b5a"/>
  <text x="142" y="148" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">业务事务</text>
  <rect x="265" y="115" width="115" height="58" rx="6" fill="#ffffff" stroke="#497b5a"/>
  <text x="322" y="139" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">WAL</text>
  <text x="322" y="160" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">pg_wal</text>
  <rect x="70" y="230" width="145" height="70" rx="6" fill="#ffffff" stroke="#497b5a"/>
  <text x="142" y="257" text-anchor="middle" font-size="17" font-family="Arial, sans-serif">walsender</text>
  <text x="142" y="281" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">每条复制连接一个</text>
  <rect x="265" y="230" width="115" height="70" rx="6" fill="#fff7e8" stroke="#b2772a"/>
  <text x="322" y="257" text-anchor="middle" font-size="17" font-family="Arial, sans-serif">物理槽</text>
  <text x="322" y="281" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">restart_lsn</text>
  <rect x="130" y="345" width="190" height="48" rx="6" fill="#ffffff" stroke="#497b5a"/>
  <text x="225" y="376" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">WAL 归档 archive</text>
  <line x1="215" y1="144" x2="265" y2="144" stroke="#2f5d8c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="322" y1="173" x2="166" y2="230" stroke="#2f5d8c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="322" y1="173" x2="322" y2="230" stroke="#b2772a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="322" y1="173" x2="240" y2="345" stroke="#2f5d8c" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="560" y="40" width="390" height="390" rx="8" fill="#f2f4fb" stroke="#5168a8" stroke-width="2"/>
  <text x="755" y="78" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#26345f">备库 Standby</text>
  <rect x="600" y="115" width="145" height="58" rx="6" fill="#ffffff" stroke="#5168a8"/>
  <text x="672" y="139" text-anchor="middle" font-size="17" font-family="Arial, sans-serif">walreceiver</text>
  <text x="672" y="160" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">接收 WAL</text>
  <rect x="795" y="115" width="115" height="58" rx="6" fill="#ffffff" stroke="#5168a8"/>
  <text x="852" y="139" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">WAL</text>
  <text x="852" y="160" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">pg_wal</text>
  <rect x="600" y="230" width="145" height="70" rx="6" fill="#ffffff" stroke="#5168a8"/>
  <text x="672" y="257" text-anchor="middle" font-size="17" font-family="Arial, sans-serif">startup</text>
  <text x="672" y="281" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">恢复重放 WAL</text>
  <rect x="795" y="230" width="115" height="70" rx="6" fill="#ffffff" stroke="#5168a8"/>
  <text x="852" y="257" text-anchor="middle" font-size="17" font-family="Arial, sans-serif">只读查询</text>
  <text x="852" y="281" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Hot Standby</text>
  <rect x="660" y="345" width="190" height="48" rx="6" fill="#ffffff" stroke="#5168a8"/>
  <text x="755" y="376" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">standby.signal</text>
  <line x1="745" y1="144" x2="795" y2="144" stroke="#2f5d8c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="852" y1="173" x2="700" y2="230" stroke="#2f5d8c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="745" y1="265" x2="795" y2="265" stroke="#2f5d8c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="755" y1="345" x2="690" y2="300" stroke="#5168a8" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M 215 265 C 330 205, 520 205, 600 144" fill="none" stroke="#2f5d8c" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="490" y="210" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#1f4d78">START_REPLICATION / CopyBoth WALData</text>
  <path d="M 600 175 C 500 250, 345 260, 265 267" fill="none" stroke="#8c5a1d" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <text x="488" y="287" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#744812">write_lsn / flush_lsn / replay_lsn 反馈</text>
  <path d="M 320 369 C 430 425, 565 425, 660 369" fill="none" stroke="#777777" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <text x="492" y="447" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#555555">网络中断或落后时，可从归档补 WAL</text>
</svg>
