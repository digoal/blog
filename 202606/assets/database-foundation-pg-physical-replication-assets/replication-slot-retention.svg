<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">物理复制槽与 WAL 保留边界</title>
  <desc id="desc">复制槽通过 restart_lsn 固定最旧需要保留的 WAL；如果落后超过 max_slot_wal_keep_size，槽可能进入 lost 状态。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345d8f"/>
    </marker>
  </defs>
  <text x="490" y="40" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2d3d">复制槽：把“不能删的 WAL”变成可观测边界</text>
  <rect x="80" y="110" width="820" height="72" rx="8" fill="#f6f8fa" stroke="#c9d1d9"/>
  <g font-family="Arial, sans-serif" font-size="14" fill="#24292f">
    <rect x="100" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="195" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="290" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="385" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="480" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="575" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="670" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <rect x="765" y="130" width="95" height="32" fill="#dbeafe" stroke="#5168a8"/>
    <text x="147" y="151" text-anchor="middle">WAL 1</text>
    <text x="242" y="151" text-anchor="middle">WAL 2</text>
    <text x="337" y="151" text-anchor="middle">WAL 3</text>
    <text x="432" y="151" text-anchor="middle">WAL 4</text>
    <text x="527" y="151" text-anchor="middle">WAL 5</text>
    <text x="622" y="151" text-anchor="middle">WAL 6</text>
    <text x="717" y="151" text-anchor="middle">WAL 7</text>
    <text x="812" y="151" text-anchor="middle">WAL 8</text>
  </g>
  <line x1="290" y1="190" x2="290" y2="112" stroke="#b2772a" stroke-width="3"/>
  <text x="290" y="214" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#7a4a0f">restart_lsn</text>
  <text x="290" y="238" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#7a4a0f">最旧可能需要的 WAL</text>
  <line x1="860" y1="190" x2="860" y2="112" stroke="#497b5a" stroke-width="3"/>
  <text x="860" y="214" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#28613d">current_lsn</text>
  <path d="M 290 270 L 860 270" stroke="#345d8f" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="575" y="258" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#345d8f">槽落后距离 = current_lsn - restart_lsn</text>
  <rect x="95" y="320" width="170" height="74" rx="8" fill="#eef6f2" stroke="#497b5a"/>
  <text x="180" y="348" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">reserved</text>
  <text x="180" y="374" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">在 max_wal_size 内</text>
  <rect x="305" y="320" width="170" height="74" rx="8" fill="#fff7e8" stroke="#b2772a"/>
  <text x="390" y="348" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">extended</text>
  <text x="390" y="374" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">超出但仍保留</text>
  <rect x="515" y="320" width="170" height="74" rx="8" fill="#fff1f1" stroke="#c2410c"/>
  <text x="600" y="348" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">unreserved</text>
  <text x="600" y="374" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">下次 checkpoint 可能删</text>
  <rect x="725" y="320" width="170" height="74" rx="8" fill="#f6f8fa" stroke="#57606a"/>
  <text x="810" y="348" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">lost</text>
  <text x="810" y="374" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">槽不可再用</text>
  <line x1="265" y1="357" x2="305" y2="357" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="357" x2="515" y2="357" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="357" x2="725" y2="357" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="452" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57606a">槽能防止 WAL 提前回收，但也会把备库故障转化为主库 pg_wal 空间压力。</text>
</svg>
