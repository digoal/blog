<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">备库恢复循环</title>
  <desc id="desc">备库启动后按归档、pg_wal、本地流复制的顺序寻找 WAL，失败后回到循环，直到停止或提升。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345d8f"/>
    </marker>
  </defs>
  <text x="460" y="42" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2d3d">standby.signal 触发的恢复循环</text>
  <rect x="370" y="80" width="180" height="58" rx="8" fill="#eef6f2" stroke="#497b5a" stroke-width="2"/>
  <text x="460" y="115" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">启动发现 standby.signal</text>
  <rect x="80" y="190" width="190" height="72" rx="8" fill="#ffffff" stroke="#5168a8" stroke-width="2"/>
  <text x="175" y="218" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">1. restore_command</text>
  <text x="175" y="243" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">从归档取 WAL</text>
  <rect x="365" y="190" width="190" height="72" rx="8" fill="#ffffff" stroke="#5168a8" stroke-width="2"/>
  <text x="460" y="218" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">2. 本地 pg_wal</text>
  <text x="460" y="243" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">重放已接收片段</text>
  <rect x="650" y="190" width="190" height="72" rx="8" fill="#ffffff" stroke="#5168a8" stroke-width="2"/>
  <text x="745" y="218" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">3. 连接上游</text>
  <text x="745" y="243" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">primary_conninfo</text>
  <rect x="365" y="330" width="190" height="72" rx="8" fill="#fff7e8" stroke="#b2772a" stroke-width="2"/>
  <text x="460" y="358" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">startup 重放 WAL</text>
  <text x="460" y="383" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">推进 replay_lsn</text>
  <rect x="80" y="330" width="190" height="72" rx="8" fill="#f6f8fa" stroke="#8c959f" stroke-width="2"/>
  <text x="175" y="358" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">找不到下一段</text>
  <text x="175" y="383" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">回到循环重试</text>
  <rect x="650" y="330" width="190" height="72" rx="8" fill="#eef2fb" stroke="#5168a8" stroke-width="2"/>
  <text x="745" y="358" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">promote</text>
  <text x="745" y="383" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">退出恢复成为主库</text>
  <line x1="460" y1="138" x2="175" y2="190" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="226" x2="365" y2="226" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="555" y1="226" x2="650" y2="226" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="745" y1="262" x2="555" y2="345" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="262" x2="460" y2="330" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="175" y1="262" x2="365" y2="345" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 365 370 C 270 430, 135 430, 130 402" fill="none" stroke="#8c959f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 175 330 C 120 285, 120 265, 150 262" fill="none" stroke="#8c959f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="555" y1="366" x2="650" y2="366" stroke="#5168a8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="460" y="460" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57606a">关键边界：提升前会尽量应用已有归档和 pg_wal，但不再连接原主库。</text>
</svg>
