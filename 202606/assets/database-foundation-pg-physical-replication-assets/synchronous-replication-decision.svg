<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">同步复制选择与提交释放</title>
  <desc id="desc">展示 synchronous_standby_names 的 FIRST 和 ANY 两种选择方式，以及提交进程等待备库反馈后释放。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345d8f"/>
    </marker>
  </defs>
  <text x="490" y="40" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2d3d">同步复制：主库决定等谁，备库只回报进度</text>
  <rect x="70" y="85" width="250" height="120" rx="8" fill="#eef6f2" stroke="#497b5a" stroke-width="2"/>
  <text x="195" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">业务 backend</text>
  <text x="195" y="148" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">COMMIT 生成 commit LSN</text>
  <text x="195" y="176" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">进入 SyncRep 等待队列</text>
  <rect x="365" y="85" width="250" height="120" rx="8" fill="#fff7e8" stroke="#b2772a" stroke-width="2"/>
  <text x="490" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">主库 SyncRep</text>
  <text x="490" y="148" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">读取 synchronous_standby_names</text>
  <text x="490" y="176" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">按 write / flush / apply 判断释放</text>
  <rect x="660" y="85" width="250" height="120" rx="8" fill="#eef2fb" stroke="#5168a8" stroke-width="2"/>
  <text x="785" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">walsender</text>
  <text x="785" y="148" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">接收备库状态消息</text>
  <text x="785" y="176" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">更新 write/flush/apply LSN</text>
  <line x1="320" y1="145" x2="365" y2="145" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="145" x2="660" y2="145" stroke="#345d8f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 660 188 C 560 250, 420 250, 320 188" fill="none" stroke="#497b5a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="490" y="250" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#28613d">达到目标 LSN 后释放等待 backend</text>

  <rect x="90" y="300" width="370" height="150" rx="8" fill="#ffffff" stroke="#c9d1d9" stroke-width="2"/>
  <text x="275" y="330" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">FIRST 2 (s1, s2, s3)</text>
  <rect x="125" y="365" width="80" height="42" rx="6" fill="#e7f5e7" stroke="#497b5a"/>
  <text x="165" y="391" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">s1 sync</text>
  <rect x="225" y="365" width="80" height="42" rx="6" fill="#e7f5e7" stroke="#497b5a"/>
  <text x="265" y="391" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">s2 sync</text>
  <rect x="325" y="365" width="95" height="42" rx="6" fill="#fff7e8" stroke="#b2772a"/>
  <text x="372" y="391" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">s3 potential</text>
  <text x="275" y="432" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#57606a">按名字顺序定优先级；前面的断开，后面的顶上。</text>

  <rect x="520" y="300" width="370" height="150" rx="8" fill="#ffffff" stroke="#c9d1d9" stroke-width="2"/>
  <text x="705" y="330" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">ANY 2 (s1, s2, s3)</text>
  <rect x="555" y="365" width="88" height="42" rx="6" fill="#eef2fb" stroke="#5168a8"/>
  <text x="599" y="391" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">s1 quorum</text>
  <rect x="662" y="365" width="88" height="42" rx="6" fill="#eef2fb" stroke="#5168a8"/>
  <text x="706" y="391" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">s2 quorum</text>
  <rect x="769" y="365" width="88" height="42" rx="6" fill="#eef2fb" stroke="#5168a8"/>
  <text x="813" y="391" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">s3 quorum</text>
  <text x="705" y="432" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#57606a">不固定等哪两台；任意两台满足目标 LSN 即可释放。</text>
</svg>
