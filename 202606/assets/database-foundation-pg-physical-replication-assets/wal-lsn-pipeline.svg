<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">WAL LSN 管线与同步提交等待点</title>
  <desc id="desc">展示主库 WAL 生成到备库 write、flush、replay 的 LSN 进度，以及 remote_write、on、remote_apply 对应等待点。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345d8f"/>
    </marker>
  </defs>
  <text x="490" y="40" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2d3d">一次提交在物理复制中的 LSN 管线</text>
  <line x1="90" y1="165" x2="890" y2="165" stroke="#d0d7de" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif" font-size="15" fill="#222">
    <circle cx="120" cy="165" r="18" fill="#ffffff" stroke="#345d8f" stroke-width="3"/>
    <text x="120" y="210" text-anchor="middle">事务生成 WAL</text>
    <text x="120" y="235" text-anchor="middle" font-size="13">commit record</text>
    <circle cx="285" cy="165" r="18" fill="#ffffff" stroke="#345d8f" stroke-width="3"/>
    <text x="285" y="210" text-anchor="middle">主库本地 flush</text>
    <text x="285" y="235" text-anchor="middle" font-size="13">pg_current_wal_lsn</text>
    <circle cx="450" cy="165" r="18" fill="#ffffff" stroke="#345d8f" stroke-width="3"/>
    <text x="450" y="210" text-anchor="middle">walsender 发出</text>
    <text x="450" y="235" text-anchor="middle" font-size="13">sent_lsn</text>
    <circle cx="615" cy="165" r="18" fill="#ffffff" stroke="#345d8f" stroke-width="3"/>
    <text x="615" y="210" text-anchor="middle">备库写入 OS</text>
    <text x="615" y="235" text-anchor="middle" font-size="13">write_lsn</text>
    <circle cx="760" cy="165" r="18" fill="#ffffff" stroke="#345d8f" stroke-width="3"/>
    <text x="760" y="210" text-anchor="middle">备库 fsync</text>
    <text x="760" y="235" text-anchor="middle" font-size="13">flush_lsn</text>
    <circle cx="890" cy="165" r="18" fill="#ffffff" stroke="#345d8f" stroke-width="3"/>
    <text x="890" y="210" text-anchor="middle">备库重放</text>
    <text x="890" y="235" text-anchor="middle" font-size="13">replay_lsn</text>
  </g>
  <path d="M 285 105 C 380 65, 540 65, 615 105" fill="none" stroke="#5a7d2a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="450" y="82" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#38551a">异步复制：主库提交后不等备库</text>
  <rect x="555" y="285" width="125" height="52" rx="6" fill="#f2f7e9" stroke="#5a7d2a"/>
  <text x="618" y="307" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">remote_write</text>
  <text x="618" y="328" text-anchor="middle" font-size="13" font-family="Arial, sans-serif">等 write_lsn</text>
  <line x1="615" y1="285" x2="615" y2="184" stroke="#5a7d2a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="700" y="285" width="125" height="52" rx="6" fill="#fff7e8" stroke="#b2772a"/>
  <text x="763" y="307" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">on</text>
  <text x="763" y="328" text-anchor="middle" font-size="13" font-family="Arial, sans-serif">等 flush_lsn</text>
  <line x1="760" y1="285" x2="760" y2="184" stroke="#b2772a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="835" y="285" width="125" height="52" rx="6" fill="#eef2fb" stroke="#5168a8"/>
  <text x="898" y="307" text-anchor="middle" font-size="15" font-family="Arial, sans-serif">remote_apply</text>
  <text x="898" y="328" text-anchor="middle" font-size="13" font-family="Arial, sans-serif">等 replay_lsn</text>
  <line x1="890" y1="285" x2="890" y2="184" stroke="#5168a8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="85" y="355" width="810" height="60" rx="8" fill="#f6f8fa" stroke="#c9d1d9"/>
  <text x="490" y="380" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#24292f">监控切分：current_lsn - sent_lsn 看主库发送压力；sent_lsn - write_lsn 看网络和接收；flush_lsn - replay_lsn 看备库重放能力。</text>
  <text x="490" y="404" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#57606a">同步提交等待的是反馈消息，不是备库自己“知道”哪些事务必须同步。</text>
</svg>
