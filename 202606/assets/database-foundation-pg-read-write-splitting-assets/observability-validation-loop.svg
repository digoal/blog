<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">读写分离验证闭环</title>
  <desc id="desc">展示从配置、观测、SQL 样本、日志和业务一致性测试形成读写分离上线闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; fill: #0f172a; font-weight: 800; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #334155; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .config { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 12; }
      .observe { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 12; }
      .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; }
      .test { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 12; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="24" y="22" width="1052" height="576" fill="#ffffff" stroke="#cbd5e1" rx="14"/>
  <text class="title" x="58" y="65">读写分离上线不是改几个参数，而是建立验证闭环</text>

  <rect class="config" x="85" y="135" width="230" height="120"/>
  <text class="label" x="142" y="176">配置基线</text>
  <text class="small" x="118" y="206">backend_weight</text>
  <text class="small" x="118" y="230">函数列表 / pattern</text>

  <rect class="test" x="435" y="95" width="230" height="120"/>
  <text class="label" x="492" y="136">SQL 样本</text>
  <text class="small" x="470" y="166">读、写、写后读</text>
  <text class="small" x="470" y="190">事务 / extended protocol</text>

  <rect class="observe" x="785" y="135" width="230" height="120"/>
  <text class="label" x="845" y="176">观测路由</text>
  <text class="small" x="818" y="206">SHOW POOL_NODES</text>
  <text class="small" x="818" y="230">log_per_node_statement</text>

  <rect class="risk" x="785" y="380" width="230" height="120"/>
  <text class="label" x="840" y="421">一致性风险</text>
  <text class="small" x="820" y="451">复制延迟 / 旧读</text>
  <text class="small" x="820" y="475">临时表 / unlogged / 函数</text>

  <rect class="node" x="435" y="420" width="230" height="120"/>
  <text class="label" x="492" y="461">回归测试</text>
  <text class="small" x="470" y="491">001 / 032 / 033 / 041</text>
  <text class="small" x="470" y="515">持续覆盖边界场景</text>

  <rect class="risk" x="85" y="380" width="230" height="120"/>
  <text class="label" x="138" y="421">调整策略</text>
  <text class="small" x="118" y="451">transaction / dml_adaptive</text>
  <text class="small" x="118" y="475">delay_threshold</text>

  <path class="arrow" d="M315 175 C360 130 390 122 432 140"/>
  <path class="arrow" d="M665 150 C710 128 748 143 782 174"/>
  <path class="arrow" d="M900 255 L900 377"/>
  <path class="arrow" d="M785 462 C733 507 710 520 668 505"/>
  <path class="arrow" d="M435 504 C374 519 342 501 315 463"/>
  <path class="arrow" d="M200 380 L200 258"/>

  <text class="small" x="398" y="300">闭环目标：不是让所有 SELECT 都去备库，而是让“该去备库的去备库，该回主库的可解释、可观测、可回归”。</text>
</svg>
