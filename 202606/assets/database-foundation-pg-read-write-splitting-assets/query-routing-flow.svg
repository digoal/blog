<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
  <title id="title">读写分离 SQL 路由决策流程</title>
  <desc id="desc">展示 Pgpool-II 从 SQL 解析、语义分类、例外检查到 where_to_send 位图的路由决策流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; fill: #0f172a; font-weight: 800; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #334155; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .parse { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .decision { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 10; }
      .primary { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .both { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
      .lb { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect x="24" y="22" width="1112" height="676" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4" rx="14"/>
  <text class="title" x="60" y="64">Pgpool-II: 从 SQL 到 where_to_send</text>

  <rect class="box" x="70" y="108" width="170" height="82"/>
  <text class="label" x="112" y="143">客户端 SQL</text>
  <text class="small" x="94" y="169">simple / extended</text>

  <rect class="parse" x="315" y="96" width="220" height="110"/>
  <text class="label" x="373" y="132">parser</text>
  <text class="small" x="345" y="160">生成 parse_tree</text>
  <text class="small" x="345" y="184">识别多语句 / PREPARE</text>

  <rect class="decision" x="610" y="80" width="230" height="140"/>
  <text class="label" x="652" y="116">send_to_where()</text>
  <text class="small" x="640" y="146">POOL_PRIMARY</text>
  <text class="small" x="640" y="170">POOL_BOTH</text>
  <text class="small" x="640" y="194">POOL_EITHER</text>

  <rect class="primary" x="905" y="78" width="180" height="110"/>
  <text class="label" x="942" y="116">Primary only</text>
  <text class="small" x="933" y="148">写入 / DDL / 锁</text>
  <text class="small" x="933" y="171">SERIALIZABLE</text>

  <rect class="both" x="905" y="245" width="180" height="110"/>
  <text class="label" x="958" y="284">Both</text>
  <text class="small" x="934" y="316">SET / DISCARD</text>
  <text class="small" x="934" y="339">事务控制命令</text>

  <rect class="decision" x="610" y="302" width="230" height="190"/>
  <text class="label" x="651" y="338">可负载均衡?</text>
  <text class="small" x="636" y="368">SELECT / COPY TO</text>
  <text class="small" x="636" y="392">非写函数</text>
  <text class="small" x="636" y="416">非临时/非 unlogged</text>
  <text class="small" x="636" y="440">非系统目录</text>
  <text class="small" x="636" y="464">事务未写入且非串行化</text>

  <rect class="primary" x="905" y="432" width="180" height="120"/>
  <text class="label" x="942" y="470">Primary fallback</text>
  <text class="small" x="936" y="502">函数 / pattern</text>
  <text class="small" x="936" y="525">复制延迟过大</text>

  <rect class="lb" x="610" y="575" width="230" height="78"/>
  <text class="label" x="648" y="610">load_balance_node</text>
  <text class="small" x="648" y="635">按会话或按语句选择</text>

  <rect class="box" x="905" y="590" width="180" height="62"/>
  <text class="label" x="934" y="626">where_to_send[]</text>

  <path class="arrow" d="M240 149 L313 149"/>
  <path class="arrow" d="M535 149 L608 149"/>
  <path class="arrow" d="M840 126 L902 126"/>
  <path class="arrow" d="M840 177 C875 202 890 243 904 286"/>
  <path class="arrow" d="M724 220 L724 300"/>
  <path class="arrow" d="M840 395 C870 414 884 453 904 486"/>
  <path class="arrow" d="M724 492 L724 572"/>
  <path class="arrow" d="M840 614 L902 621"/>
  <path class="muted" d="M905 132 C842 245 858 366 905 486"/>

  <text class="small" x="78" y="260">典型强制主库条件</text>
  <text class="small" x="78" y="287">INSERT / UPDATE / DELETE / CREATE / ALTER / DROP</text>
  <text class="small" x="78" y="313">SELECT FOR UPDATE / FOR SHARE / SELECT INTO</text>
  <text class="small" x="78" y="339">写函数、volatile 函数、nextval/setval</text>
  <text class="small" x="78" y="365">多语句在 streaming replication 中按主库处理</text>

  <text class="small" x="78" y="430">输出不是一个节点名，而是目标位图：</text>
  <text class="small" x="78" y="458">where_to_send[primary] = true</text>
  <text class="small" x="78" y="484">where_to_send[standby] = true</text>
  <text class="small" x="78" y="510">后续 Parse / Bind / Execute 继承该目标</text>
</svg>
