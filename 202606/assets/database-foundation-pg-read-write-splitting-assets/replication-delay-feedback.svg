<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">复制延迟反馈闭环</title>
  <desc id="desc">展示 Pgpool-II 如何采集 standby 延迟并在路由时避开延迟过大的只读节点。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; fill: #0f172a; font-weight: 800; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #334155; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .primary { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .standby { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 10; }
      .worker { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
      .decision { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .bad { stroke: #c2410c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .good { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="24" y="22" width="1072" height="606" fill="#ffffff" stroke="#cbd5e1" rx="14"/>
  <text class="title" x="58" y="64">复制延迟不是监控指标而已，它会反向影响 SELECT 路由</text>

  <rect class="primary" x="80" y="115" width="210" height="125"/>
  <text class="label" x="142" y="154">Primary</text>
  <text class="small" x="116" y="184">pg_current_wal_lsn()</text>
  <text class="small" x="116" y="211">pg_stat_replication</text>

  <rect class="standby" x="80" y="330" width="210" height="125"/>
  <text class="label" x="140" y="370">Standby</text>
  <text class="small" x="118" y="400">pg_last_wal_replay_lsn()</text>
  <text class="small" x="118" y="427">或外部延迟源</text>

  <rect class="worker" x="395" y="160" width="270" height="220"/>
  <text class="label" x="455" y="204">SR Check Worker</text>
  <text class="small" x="430" y="238">sr_check_period 周期运行</text>
  <text class="small" x="430" y="267">计算 WAL 字节差</text>
  <text class="small" x="430" y="296">或 replay_lag 微秒值</text>
  <text class="small" x="430" y="325">也可执行外部命令</text>

  <rect class="box" x="735" y="135" width="250" height="130"/>
  <text class="label" x="780" y="176">BackendInfo</text>
  <text class="small" x="770" y="209">standby_delay</text>
  <text class="small" x="770" y="236">standby_delay_by_time</text>

  <rect class="decision" x="735" y="360" width="250" height="170"/>
  <text class="label" x="772" y="401">check_replication_delay()</text>
  <text class="small" x="768" y="434">0: 可继续分流</text>
  <text class="small" x="768" y="461">-1: 超过时间阈值</text>
  <text class="small" x="768" y="488">-2: 超过 WAL 字节阈值</text>

  <path class="arrow" d="M290 176 L392 224"/>
  <path class="arrow" d="M290 393 L392 314"/>
  <path class="arrow" d="M665 245 L732 202"/>
  <path class="dash" d="M860 265 L860 356"/>

  <path class="good" d="M735 482 C660 525 570 536 490 522"/>
  <text class="small" x="410" y="546">延迟未超过阈值: 继续走 load_balance_node</text>

  <path class="bad" d="M985 443 C1032 392 1028 298 985 218"/>
  <text class="small" x="806" y="576">延迟超过阈值: 默认回 primary；开启 prefer_lower_delay_standby 时尝试低延迟 standby。</text>

  <rect x="70" y="525" width="230" height="58" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text class="small" x="91" y="559">阈值为 0 表示不启用延迟避让</text>
</svg>
