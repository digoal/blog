<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Pgpool-II 读写分离拓扑</title>
  <desc id="desc">客户端经过 Pgpool-II 代理层，写入路由到 primary，符合条件的只读查询路由到 standby，流复制从 primary 向 standby 传播 WAL。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="walArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c2d12"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .proxy { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 10; }
      .primary { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .standby { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 10; }
      .worker { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; fill: #0f172a; font-weight: 700; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #334155; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .wal { stroke: #7c2d12; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#walArrow); }
      .delay { stroke: #4338ca; stroke-width: 2.5; fill: none; stroke-dasharray: 4 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="28" y="24" width="1044" height="572" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="14"/>

  <rect class="box" x="70" y="110" width="190" height="120"/>
  <text class="label" x="116" y="155">应用连接</text>
  <text class="small" x="98" y="188">JDBC / psql / API</text>
  <text class="tiny" x="92" y="214">只连接 Pgpool-II</text>

  <rect class="proxy" x="360" y="70" width="270" height="210"/>
  <text class="label" x="430" y="112">Pgpool-II</text>
  <text class="small" x="394" y="148">child: 每个客户端会话</text>
  <text class="small" x="394" y="178">parser: SQL 语法树</text>
  <text class="small" x="394" y="208">router: where_to_send</text>
  <text class="small" x="394" y="238">pool: 后端连接缓存</text>

  <rect class="primary" x="785" y="72" width="230" height="130"/>
  <text class="label" x="848" y="114">Primary</text>
  <text class="small" x="824" y="148">写入目标</text>
  <text class="tiny" x="814" y="174">INSERT / UPDATE / DDL</text>

  <rect class="standby" x="735" y="318" width="145" height="120"/>
  <text class="label" x="768" y="358">Standby 1</text>
  <text class="small" x="762" y="391">只读候选</text>
  <text class="tiny" x="758" y="416">weight &gt; 0</text>

  <rect class="standby" x="915" y="318" width="145" height="120"/>
  <text class="label" x="948" y="358">Standby 2</text>
  <text class="small" x="942" y="391">只读候选</text>
  <text class="tiny" x="938" y="416">delay 可观测</text>

  <rect class="worker" x="365" y="365" width="260" height="120"/>
  <text class="label" x="418" y="406">SR Check Worker</text>
  <text class="small" x="397" y="438">采集 LSN / replay_lag</text>
  <text class="tiny" x="400" y="464">写入 shared BackendInfo</text>

  <path class="arrow" d="M260 170 C300 170 320 170 358 170"/>
  <text class="tiny" x="276" y="153">SQL 请求</text>

  <path class="arrow" d="M630 126 C690 112 728 109 782 122"/>
  <text class="tiny" x="665" y="96">写 SQL 或强制主库</text>

  <path class="arrow" d="M630 218 C694 270 718 320 758 348"/>
  <text class="tiny" x="640" y="282">可负载均衡 SELECT</text>

  <path class="arrow" d="M630 238 C748 290 846 310 938 348"/>
  <text class="tiny" x="735" y="286">按权重 / 偏好选择</text>

  <path class="wal" d="M900 202 C878 246 835 282 808 318"/>
  <path class="wal" d="M928 202 C949 246 972 283 985 318"/>
  <text class="tiny" x="872" y="258">WAL 流复制</text>

  <path class="delay" d="M625 422 C678 410 704 395 735 383"/>
  <path class="delay" d="M625 444 C740 462 858 451 915 410"/>
  <text class="tiny" x="642" y="478">复制延迟反馈到路由判断</text>

  <rect x="72" y="510" width="950" height="52" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text class="small" x="100" y="543">核心：Pgpool-II 不改变 PostgreSQL 的复制机制，它在代理层根据 SQL、事务状态、节点角色和复制延迟决定目标后端。</text>
</svg>
