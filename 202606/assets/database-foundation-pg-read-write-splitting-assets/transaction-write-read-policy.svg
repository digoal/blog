<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">写后读策略对比</title>
  <desc id="desc">比较 disable_load_balance_on_write 的 transaction、trans_transaction、always、off 和 dml_adaptive 策略。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; fill: #0f172a; font-weight: 800; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #334155; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #475569; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .write { fill: #fed7aa; stroke: #c2410c; stroke-width: 1.4; rx: 6; }
      .primary { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 6; }
      .standby { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 6; }
      .mixed { fill: #e0e7ff; stroke: #4338ca; stroke-width: 1.4; rx: 6; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="24" y="22" width="1072" height="616" fill="#ffffff" stroke="#cbd5e1" rx="14"/>
  <text class="title" x="55" y="63">disable_load_balance_on_write: 写后读的兼容性和性能取舍</text>

  <text class="small" x="320" y="102">BEGIN</text>
  <text class="small" x="470" y="102">INSERT t1</text>
  <text class="small" x="630" y="102">SELECT t1</text>
  <text class="small" x="790" y="102">SELECT t2</text>
  <text class="small" x="945" y="102">COMMIT 后</text>

  <path class="line" d="M315 118 L1015 118"/>

  <rect class="row" x="55" y="145" width="1010" height="80"/>
  <text class="label" x="85" y="184">transaction</text>
  <text class="tiny" x="84" y="207">默认，当前事务内写后读回主库</text>
  <rect class="write" x="452" y="164" width="110" height="42"/>
  <text class="tiny" x="476" y="190">写 primary</text>
  <rect class="primary" x="620" y="164" width="110" height="42"/>
  <text class="tiny" x="642" y="190">读 primary</text>
  <rect class="primary" x="780" y="164" width="110" height="42"/>
  <text class="tiny" x="802" y="190">读 primary</text>
  <rect class="standby" x="940" y="164" width="100" height="42"/>
  <text class="tiny" x="958" y="190">可分流</text>

  <rect class="row" x="55" y="245" width="1010" height="80"/>
  <text class="label" x="85" y="284">trans_transaction</text>
  <text class="tiny" x="84" y="307">一次写入影响后续显式事务</text>
  <rect class="write" x="452" y="264" width="110" height="42"/>
  <text class="tiny" x="476" y="290">写 primary</text>
  <rect class="primary" x="620" y="264" width="110" height="42"/>
  <text class="tiny" x="642" y="290">读 primary</text>
  <rect class="primary" x="780" y="264" width="110" height="42"/>
  <text class="tiny" x="802" y="290">读 primary</text>
  <rect class="primary" x="940" y="264" width="100" height="42"/>
  <text class="tiny" x="957" y="290">仍主库</text>

  <rect class="row" x="55" y="345" width="1010" height="80"/>
  <text class="label" x="85" y="384">always</text>
  <text class="tiny" x="84" y="407">会话级保守策略，兼容性最高</text>
  <rect class="write" x="452" y="364" width="110" height="42"/>
  <text class="tiny" x="476" y="390">写 primary</text>
  <rect class="primary" x="620" y="364" width="110" height="42"/>
  <text class="tiny" x="642" y="390">读 primary</text>
  <rect class="primary" x="780" y="364" width="110" height="42"/>
  <text class="tiny" x="802" y="390">读 primary</text>
  <rect class="primary" x="940" y="364" width="100" height="42"/>
  <text class="tiny" x="955" y="390">会话主库</text>

  <rect class="row" x="55" y="445" width="1010" height="80"/>
  <text class="label" x="85" y="484">off</text>
  <text class="tiny" x="84" y="507">吞吐优先，可能读到旧值</text>
  <rect class="write" x="452" y="464" width="110" height="42"/>
  <text class="tiny" x="476" y="490">写 primary</text>
  <rect class="standby" x="620" y="464" width="110" height="42"/>
  <text class="tiny" x="642" y="490">可分流</text>
  <rect class="standby" x="780" y="464" width="110" height="42"/>
  <text class="tiny" x="802" y="490">可分流</text>
  <rect class="standby" x="940" y="464" width="100" height="42"/>
  <text class="tiny" x="958" y="490">可分流</text>

  <rect class="row" x="55" y="545" width="1010" height="70"/>
  <text class="label" x="85" y="583">dml_adaptive</text>
  <text class="tiny" x="84" y="606">只追踪本事务写过的表及依赖对象</text>
  <rect class="write" x="452" y="560" width="110" height="42"/>
  <text class="tiny" x="476" y="586">写 t1</text>
  <rect class="primary" x="620" y="560" width="110" height="42"/>
  <text class="tiny" x="642" y="586">读 t1 主库</text>
  <rect class="standby" x="780" y="560" width="110" height="42"/>
  <text class="tiny" x="799" y="586">读 t2 分流</text>
  <rect class="mixed" x="940" y="560" width="100" height="42"/>
  <text class="tiny" x="950" y="586">事务结束清理</text>
</svg>
