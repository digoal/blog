<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">PLAN HINT 决策边界</title>
  <desc id="desc">展示什么时候应该用 PLAN HINT，什么时候应该回到统计信息、索引、SQL 和参数治理。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <style>
    .start { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.7; rx: 10; }
    .yes { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .no { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .neutral { fill: #f8fafc; stroke: #334155; stroke-width: 1.3; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .line { stroke: #7c3aed; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="386" y="32" width="268" height="82" class="start"/>
  <text x="520" y="66" text-anchor="middle" class="text">发现计划异常</text>
  <text x="520" y="92" text-anchor="middle" class="small">慢 SQL / 计划突变 / 估算偏差</text>

  <rect x="386" y="158" width="268" height="86" class="neutral"/>
  <text x="520" y="193" text-anchor="middle" class="text">能否用根因治理解决？</text>
  <text x="520" y="220" text-anchor="middle" class="small">ANALYZE / extended stats / 索引 / SQL</text>

  <rect x="70" y="318" width="300" height="104" class="yes"/>
  <text x="220" y="354" text-anchor="middle" class="text">优先根因治理</text>
  <text x="220" y="382" text-anchor="middle" class="small">让优化器自然选对计划</text>
  <text x="220" y="404" text-anchor="middle" class="small">适合长期稳定生产系统</text>

  <rect x="424" y="318" width="250" height="104" class="neutral"/>
  <text x="549" y="354" text-anchor="middle" class="text">使用 PLAN HINT</text>
  <text x="549" y="382" text-anchor="middle" class="small">诊断、止血、灰度验证</text>
  <text x="549" y="404" text-anchor="middle" class="small">必须绑定版本和回滚条件</text>

  <rect x="726" y="318" width="250" height="104" class="no"/>
  <text x="851" y="354" text-anchor="middle" class="text">不要强求不可执行计划</text>
  <text x="851" y="382" text-anchor="middle" class="small">FULL OUTER JOIN + NestLoop</text>
  <text x="851" y="404" text-anchor="middle" class="small">无 ctid 条件的 TidScan 等</text>

  <path d="M520 114 L520 158" class="line"/>
  <path d="M386 214 C250 236 218 280 220 318" class="line"/>
  <path d="M520 244 C520 274 540 290 549 318" class="line"/>
  <path d="M654 214 C780 238 850 276 851 318" class="line"/>
  <text x="257" y="264" class="small">可以</text>
  <text x="538" y="286" class="small">短期需要控制计划</text>
  <text x="790" y="264" class="small">物理上不可行</text>
</svg>
