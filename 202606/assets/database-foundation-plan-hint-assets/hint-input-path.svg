<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">PLAN HINT 输入路径</title>
  <desc id="desc">展示 pg_hint_plan 从 SQL 注释或 hint_plan.hints 表取得 hint，再进入解析和规划阶段的流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2364aa"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .accent { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .line { stroke: #2364aa; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="40" y="44" width="230" height="86" class="accent"/>
  <text x="155" y="82" text-anchor="middle" class="text">SQL 注释 Hint</text>
  <text x="155" y="110" text-anchor="middle" class="small">/*+ SeqScan(a) */</text>

  <rect x="40" y="250" width="230" height="100" class="accent"/>
  <text x="155" y="288" text-anchor="middle" class="text">Hint Table</text>
  <text x="155" y="316" text-anchor="middle" class="small">hint_plan.hints</text>
  <text x="155" y="338" text-anchor="middle" class="small">query_id + application_name</text>

  <rect x="360" y="78" width="240" height="96" class="box"/>
  <text x="480" y="116" text-anchor="middle" class="text">提取 Hint 字符串</text>
  <text x="480" y="144" text-anchor="middle" class="small">query_scan.l 识别首个 /*+ */</text>

  <rect x="360" y="236" width="240" height="96" class="box"/>
  <text x="480" y="274" text-anchor="middle" class="text">表查询优先</text>
  <text x="480" y="302" text-anchor="middle" class="small">enable_hint_table=on</text>
  <text x="480" y="324" text-anchor="middle" class="small">要求 compute_query_id</text>

  <rect x="690" y="124" width="230" height="112" class="warn"/>
  <text x="805" y="164" text-anchor="middle" class="text">parse_hints</text>
  <text x="805" y="192" text-anchor="middle" class="small">生成 HintState</text>
  <text x="805" y="214" text-anchor="middle" class="small">按类型归档并检查冲突</text>

  <rect x="690" y="292" width="230" height="72" class="box"/>
  <text x="805" y="322" text-anchor="middle" class="text">Planner Hook</text>
  <text x="805" y="348" text-anchor="middle" class="small">只影响本次规划过程</text>

  <path d="M270 88 L360 120" class="line"/>
  <path d="M270 300 L360 286" class="line"/>
  <path d="M600 284 C650 270 660 230 690 200" class="line"/>
  <path d="M600 126 L690 170" class="line"/>
  <path d="M805 236 L805 292" class="line"/>
  <path d="M155 130 C155 200 230 220 360 246" class="dash"/>
  <text x="136" y="194" class="small">无表 hint 时回退到注释</text>
</svg>
