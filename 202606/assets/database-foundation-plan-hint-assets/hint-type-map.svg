<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Hint 类型与优化器控制点映射</title>
  <desc id="desc">将 pg_hint_plan 的主要 hint 类型映射到扫描路径、连接搜索、估算修正、并行配置和参数设置。</desc>
  <style>
    .root { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.8; rx: 10; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.3; rx: 8; }
    .scan { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .join { fill: #fefce8; stroke: #a16207; stroke-width: 1.5; rx: 8; }
    .rows { fill: #fff1f2; stroke: #be123c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13.5px; fill: #334155; }
    .line { stroke: #64748b; stroke-width: 1.5; fill: none; }
  </style>
  <rect x="406" y="34" width="228" height="74" class="root"/>
  <text x="520" y="65" text-anchor="middle" class="text">HintState</text>
  <text x="520" y="91" text-anchor="middle" class="small">解析后的统一上下文</text>

  <rect x="58" y="170" width="250" height="122" class="scan"/>
  <text x="183" y="202" text-anchor="middle" class="text">Scan Method</text>
  <text x="183" y="228" text-anchor="middle" class="small">SeqScan / IndexScan / BitmapScan</text>
  <text x="183" y="250" text-anchor="middle" class="small">NoSeqScan / NoIndexScan 等</text>
  <text x="183" y="272" text-anchor="middle" class="small">通过 enable_* 限制路径枚举</text>

  <rect x="395" y="170" width="250" height="122" class="join"/>
  <text x="520" y="202" text-anchor="middle" class="text">Join Method / Leading</text>
  <text x="520" y="228" text-anchor="middle" class="small">NestLoop / HashJoin / MergeJoin</text>
  <text x="520" y="250" text-anchor="middle" class="small">Leading 控制连接组合顺序</text>
  <text x="520" y="272" text-anchor="middle" class="small">在 join search 阶段生效</text>

  <rect x="732" y="170" width="250" height="122" class="rows"/>
  <text x="857" y="202" text-anchor="middle" class="text">Rows</text>
  <text x="857" y="228" text-anchor="middle" class="small"># / + / - / * 修正行数估计</text>
  <text x="857" y="250" text-anchor="middle" class="small">在 make_join_rel 中改 joinrel-&gt;rows</text>
  <text x="857" y="272" text-anchor="middle" class="small">影响后续成本比较</text>

  <rect x="58" y="372" width="250" height="122" class="box"/>
  <text x="183" y="404" text-anchor="middle" class="text">Parallel</text>
  <text x="183" y="430" text-anchor="middle" class="small">worker 数量 soft / hard</text>
  <text x="183" y="452" text-anchor="middle" class="small">hard 降低并行启动和元组成本</text>
  <text x="183" y="474" text-anchor="middle" class="small">0 表示抑制并行</text>

  <rect x="395" y="372" width="250" height="122" class="box"/>
  <text x="520" y="404" text-anchor="middle" class="text">Set</text>
  <text x="520" y="430" text-anchor="middle" class="small">规划期间临时设置 GUC</text>
  <text x="520" y="452" text-anchor="middle" class="small">例如 random_page_cost</text>
  <text x="520" y="474" text-anchor="middle" class="small">规划后回滚</text>

  <rect x="732" y="372" width="250" height="122" class="box"/>
  <text x="857" y="404" text-anchor="middle" class="text">DisableIndex / Memoize</text>
  <text x="857" y="430" text-anchor="middle" class="small">DisableIndex 从候选索引表删除</text>
  <text x="857" y="452" text-anchor="middle" class="small">Memoize / NoMemoize 控制缓存路径</text>
  <text x="857" y="474" text-anchor="middle" class="small">仍服从可执行计划约束</text>

  <path d="M520 108 L183 170" class="line"/>
  <path d="M520 108 L520 170" class="line"/>
  <path d="M520 108 L857 170" class="line"/>
  <path d="M520 108 C315 230 215 285 183 372" class="line"/>
  <path d="M520 108 L520 372" class="line"/>
  <path d="M520 108 C730 230 830 285 857 372" class="line"/>
</svg>
