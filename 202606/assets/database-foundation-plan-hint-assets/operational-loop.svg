<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="510" viewBox="0 0 1040 510" role="img" aria-labelledby="title desc">
  <title id="title">PLAN HINT 运维闭环</title>
  <desc id="desc">展示从慢 SQL 发现、计划对比、hint 验证、灰度、上线到回收的治理闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.3; rx: 8; }
    .focus { fill: #ecfdf5; stroke: #0f766e; stroke-width: 1.6; rx: 8; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .line { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="60" y="70" width="210" height="88" class="box"/>
  <text x="165" y="104" text-anchor="middle" class="text">1. 定位慢 SQL</text>
  <text x="165" y="132" text-anchor="middle" class="small">pg_stat_statements / 日志</text>

  <rect x="330" y="70" width="210" height="88" class="box"/>
  <text x="435" y="104" text-anchor="middle" class="text">2. 对比计划</text>
  <text x="435" y="132" text-anchor="middle" class="small">EXPLAIN ANALYZE / BUFFERS</text>

  <rect x="600" y="70" width="210" height="88" class="focus"/>
  <text x="705" y="104" text-anchor="middle" class="text">3. 设计 Hint</text>
  <text x="705" y="132" text-anchor="middle" class="small">最小干预，单点验证</text>

  <rect x="770" y="246" width="210" height="88" class="focus"/>
  <text x="875" y="280" text-anchor="middle" class="text">4. 灰度发布</text>
  <text x="875" y="308" text-anchor="middle" class="small">应用名 / query_id 精确绑定</text>

  <rect x="500" y="246" width="210" height="88" class="risk"/>
  <text x="605" y="280" text-anchor="middle" class="text">5. 监控退化</text>
  <text x="605" y="308" text-anchor="middle" class="small">数据分布、版本、索引变化</text>

  <rect x="230" y="246" width="210" height="88" class="box"/>
  <text x="335" y="280" text-anchor="middle" class="text">6. 根因修复</text>
  <text x="335" y="308" text-anchor="middle" class="small">统计信息 / SQL / 索引</text>

  <rect x="60" y="400" width="250" height="74" class="box"/>
  <text x="185" y="430" text-anchor="middle" class="text">7. 回收 Hint</text>
  <text x="185" y="456" text-anchor="middle" class="small">保留复盘，避免永久拐杖</text>

  <path d="M270 114 L330 114" class="line"/>
  <path d="M540 114 L600 114" class="line"/>
  <path d="M810 114 C870 140 894 188 875 246" class="line"/>
  <path d="M770 290 L710 290" class="line"/>
  <path d="M500 290 L440 290" class="line"/>
  <path d="M335 334 C320 380 270 400 310 437" class="line"/>
  <path d="M185 400 C88 345 72 220 145 158" class="line"/>
</svg>
