<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">pg_hint_plan Planner Hook 生效点</title>
  <desc id="desc">展示 pg_hint_plan 在 PostgreSQL 规划阶段的主要 hook 和它们影响的计划搜索部分。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    .stage { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .hook { fill: #ecfdf5; stroke: #0f766e; stroke-width: 1.6; rx: 8; }
    .copy { fill: #fefce8; stroke: #a16207; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .line { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="42" y="50" width="170" height="84" class="stage"/>
  <text x="127" y="86" text-anchor="middle" class="text">Parse Analyze</text>
  <text x="127" y="112" text-anchor="middle" class="small">Query + queryId</text>

  <rect x="280" y="50" width="180" height="84" class="hook"/>
  <text x="370" y="84" text-anchor="middle" class="text">post_parse_analyze</text>
  <text x="370" y="111" text-anchor="middle" class="small">提前取 hint 字符串</text>

  <rect x="528" y="50" width="180" height="84" class="hook"/>
  <text x="618" y="84" text-anchor="middle" class="text">planner_hook</text>
  <text x="618" y="111" text-anchor="middle" class="small">建立 HintState / Set GUC</text>

  <rect x="786" y="50" width="210" height="84" class="stage"/>
  <text x="891" y="84" text-anchor="middle" class="text">standard_planner</text>
  <text x="891" y="111" text-anchor="middle" class="small">继续走 PostgreSQL 优化器</text>

  <rect x="70" y="220" width="220" height="92" class="hook"/>
  <text x="180" y="256" text-anchor="middle" class="text">set_rel_pathlist_hook</text>
  <text x="180" y="284" text-anchor="middle" class="small">扫描方式 / 并行 worker</text>

  <rect x="410" y="220" width="220" height="92" class="hook"/>
  <text x="520" y="256" text-anchor="middle" class="text">join_search_hook</text>
  <text x="520" y="284" text-anchor="middle" class="small">连接顺序 / 连接算法</text>

  <rect x="750" y="220" width="220" height="92" class="hook"/>
  <text x="860" y="256" text-anchor="middle" class="text">build_simple_rel_hook</text>
  <text x="860" y="284" text-anchor="middle" class="small">DisableIndex 删除候选索引</text>

  <rect x="70" y="384" width="260" height="82" class="copy"/>
  <text x="200" y="416" text-anchor="middle" class="text">core.c</text>
  <text x="200" y="442" text-anchor="middle" class="small">复制上游静态优化器函数</text>

  <rect x="410" y="384" width="260" height="82" class="copy"/>
  <text x="540" y="416" text-anchor="middle" class="text">make_join_rel.c</text>
  <text x="540" y="442" text-anchor="middle" class="small">Rows hint 修正 joinrel rows</text>

  <rect x="750" y="384" width="220" height="82" class="stage"/>
  <text x="860" y="416" text-anchor="middle" class="text">Plan Tree</text>
  <text x="860" y="442" text-anchor="middle" class="small">选择最低代价的可执行路径</text>

  <path d="M212 92 L280 92" class="line"/>
  <path d="M460 92 L528 92" class="line"/>
  <path d="M708 92 L786 92" class="line"/>
  <path d="M891 134 C840 178 730 205 630 238" class="line"/>
  <path d="M618 134 C500 176 316 198 205 220" class="line"/>
  <path d="M891 134 C912 168 900 198 870 220" class="line"/>
  <path d="M520 312 L540 384" class="line"/>
  <path d="M520 312 C430 358 320 374 200 384" class="line"/>
  <path d="M670 424 L750 424" class="line"/>
</svg>
