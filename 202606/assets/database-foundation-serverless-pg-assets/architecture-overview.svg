<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Neon serverless PostgreSQL 架构总览</title>
  <desc id="desc">展示客户端、Proxy、无状态 Compute、Pageserver、Safekeeper、Storage Controller、Storage Broker 和对象存储之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .label { font: 600 20px sans-serif; fill: #0f172a; }
      .small { font: 16px sans-serif; fill: #334155; }
      .tiny { font: 14px sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#f8fafc"/>
  <text x="48" y="54" class="title">Serverless PG：把 PostgreSQL 前台计算与后端存储拆开</text>

  <rect x="40" y="100" width="180" height="170" fill="#e0f2fe" class="box"/>
  <text x="75" y="140" class="label">客户端</text>
  <text x="62" y="176" class="small">psql / 应用</text>
  <text x="62" y="204" class="small">SQL-over-HTTP</text>
  <text x="62" y="232" class="small">WebSocket</text>

  <rect x="290" y="100" width="210" height="170" fill="#dbeafe" class="box"/>
  <text x="355" y="140" class="label">Proxy</text>
  <text x="315" y="176" class="small">协议路由</text>
  <text x="315" y="204" class="small">认证与唤醒</text>
  <text x="315" y="232" class="small">连接到 endpoint</text>

  <rect x="580" y="82" width="270" height="225" fill="#dcfce7" class="box"/>
  <text x="638" y="122" class="label">Compute node</text>
  <text x="605" y="158" class="small">无状态 PostgreSQL 进程</text>
  <rect x="610" y="181" width="210" height="38" fill="#bbf7d0" class="box"/>
  <text x="629" y="205" class="small">pgxn/neon: smgr</text>
  <rect x="610" y="229" width="210" height="38" fill="#bbf7d0" class="box"/>
  <text x="629" y="253" class="small">WAL proposer</text>
  <text x="605" y="292" class="tiny">本地临时表/缓存可以有盘，永久数据靠存储层</text>

  <rect x="930" y="82" width="210" height="225" fill="#ffedd5" class="box"/>
  <text x="968" y="122" class="label">Safekeepers</text>
  <text x="955" y="158" class="small">冗余 WAL 服务</text>
  <rect x="960" y="181" width="55" height="45" fill="#fed7aa" class="box"/>
  <text x="976" y="209" class="small">S1</text>
  <rect x="1025" y="181" width="55" height="45" fill="#fed7aa" class="box"/>
  <text x="1041" y="209" class="small">S2</text>
  <rect x="992" y="236" width="55" height="45" fill="#fed7aa" class="box"/>
  <text x="1008" y="264" class="small">S3</text>

  <rect x="560" y="390" width="300" height="210" fill="#ede9fe" class="box"/>
  <text x="625" y="430" class="label">Pageserver</text>
  <text x="590" y="466" class="small">GetPage@LSN / basebackup</text>
  <text x="590" y="494" class="small">WAL ingest / walredo</text>
  <text x="590" y="522" class="small">不可变 layer 文件</text>
  <text x="590" y="550" class="small">compaction / GC / upload</text>

  <rect x="930" y="420" width="210" height="150" fill="#fef9c3" class="box"/>
  <text x="970" y="460" class="label">对象存储</text>
  <text x="960" y="496" class="small">S3 / Azure / GCS</text>
  <text x="960" y="524" class="small">远端 layer 持久化</text>

  <rect x="260" y="410" width="250" height="125" fill="#f1f5f9" class="box"/>
  <text x="300" y="450" class="label">Storage Controller</text>
  <text x="285" y="486" class="small">tenant/shard 放置</text>
  <text x="285" y="514" class="small">generation / 迁移 / HA</text>

  <rect x="260" y="560" width="250" height="90" fill="#f1f5f9" class="box"/>
  <text x="315" y="596" class="label">Storage Broker</text>
  <text x="285" y="628" class="small">Safekeeper 信息 pub-sub</text>

  <path d="M 220 185 L 290 185" class="line"/>
  <path d="M 500 185 L 580 185" class="line"/>
  <path d="M 850 185 L 930 185" class="line"/>
  <text x="866" y="170" class="tiny">WAL</text>

  <path d="M 710 307 L 710 390" class="line"/>
  <text x="724" y="350" class="tiny">GetPage / Nblocks</text>
  <path d="M 1035 307 C 1035 365 895 370 800 390" class="line"/>
  <text x="925" y="354" class="tiny">WAL stream</text>
  <path d="M 860 500 L 930 500" class="line"/>
  <text x="878" y="486" class="tiny">upload</text>

  <path d="M 510 456 L 560 456" class="dash"/>
  <path d="M 510 605 C 600 630 835 625 940 570" class="dash"/>
  <path d="M 385 410 C 430 320 570 285 610 260" class="dash"/>
  <text x="390" y="365" class="tiny">通知 compute 连接哪个 pageserver</text>

  <text x="52" y="676" class="small">关键边界：SQL 执行在 compute；永久页版本由 pageserver 按 LSN 重构；提交耐久先落在 safekeeper quorum，之后进入 pageserver 和对象存储。</text>
</svg>
