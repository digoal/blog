<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Timeline 分支、PITR 与 copy-on-write</title>
  <desc id="desc">展示 Neon 如何在指定 LSN 创建子 timeline，子分支如何复用父分支历史，并在写入后产生自己的 layer。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .label { font: 600 20px sans-serif; fill: #0f172a; }
      .small { font: 16px sans-serif; fill: #334155; }
      .tiny { font: 14px sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .plain { stroke: #334155; stroke-width: 4; fill: none; }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#f8fafc"/>
  <text x="48" y="54" class="title">分支：新 timeline 记录 ancestor_lsn，数据按需继承</text>

  <path d="M 100 170 L 1020 170" class="plain"/>
  <text x="1050" y="176" class="small">main</text>
  <circle cx="430" cy="170" r="10" fill="#dc2626"/>
  <text x="385" y="140" class="label">@LSN 250</text>
  <path d="M 430 170 C 505 240 620 285 1020 330" class="plain"/>
  <text x="1050" y="337" class="small">child</text>
  <text x="455" y="220" class="tiny">branch / PITR point</text>

  <rect x="95" y="405" width="305" height="155" fill="#fff" class="box"/>
  <text x="135" y="442" class="label">父 timeline layer</text>
  <rect x="125" y="470" width="245" height="36" fill="#bfdbfe" class="box"/>
  <text x="145" y="494" class="small">orders image@200</text>
  <rect x="125" y="516" width="245" height="36" fill="#e9d5ff" class="box"/>
  <text x="145" y="540" class="small">orders delta 200-300</text>

  <rect x="460" y="405" width="305" height="155" fill="#fff" class="box"/>
  <text x="500" y="442" class="label">子 timeline layer</text>
  <rect x="490" y="470" width="245" height="36" fill="#fef9c3" class="box"/>
  <text x="510" y="494" class="small">orders delta 250-300</text>
  <rect x="490" y="516" width="245" height="36" fill="#fef9c3" class="box"/>
  <text x="510" y="540" class="small">child 自己的新写入</text>

  <rect x="830" y="405" width="305" height="155" fill="#fff" class="box"/>
  <text x="880" y="442" class="label">读取规则</text>
  <text x="860" y="480" class="small">当前分支先找自己的 layer</text>
  <text x="860" y="508" class="small">缺失 key 时回到父分支</text>
  <text x="860" y="536" class="small">父分支只看到 ancestor_lsn 以前</text>

  <path d="M 612 405 C 545 355 480 285 430 180" class="dash"/>
  <path d="M 830 505 L 765 505" class="dash"/>
  <path d="M 460 505 L 400 505" class="dash"/>

  <rect x="90" y="610" width="1035" height="50" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="8" ry="8"/>
  <text x="112" y="641" class="small">GC 边界：只按“主分支最新 LSN”删旧层不够，还要保留子分支 ancestor_lsn 和 PITR 窗口需要的历史。</text>
</svg>
