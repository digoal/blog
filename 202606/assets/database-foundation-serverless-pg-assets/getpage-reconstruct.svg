<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">GetPage@LSN 页重构路径</title>
  <desc id="desc">展示 compute 缓冲区缺页时，pageserver 如何等待 LSN、搜索当前 timeline 与父 timeline 的 layer，并通过 WAL redo 重构页面。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .label { font: 600 20px sans-serif; fill: #0f172a; }
      .small { font: 16px sans-serif; fill: #334155; }
      .tiny { font: 14px sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <text x="48" y="54" class="title">读路径：按 request_lsn 找 image + delta，再做 WAL redo</text>

  <rect x="55" y="105" width="230" height="120" fill="#dcfce7" class="box"/>
  <text x="92" y="143" class="label">Compute 缓冲区</text>
  <text x="82" y="177" class="small">buffer miss</text>
  <text x="82" y="205" class="small">发起 GetPage@LSN</text>

  <rect x="355" y="105" width="270" height="120" fill="#dbeafe" class="box"/>
  <text x="420" y="143" class="label">Page Service</text>
  <text x="385" y="177" class="small">tenant / shard / timeline</text>
  <text x="385" y="205" class="small">request_lsn + not_modified_since</text>

  <rect x="715" y="90" width="260" height="90" fill="#fee2e2" class="box"/>
  <text x="766" y="126" class="label">wait_lsn</text>
  <text x="742" y="154" class="small">等待 WAL 到达请求 LSN</text>

  <rect x="95" y="330" width="420" height="330" fill="#fff" stroke="#334155" stroke-width="2" rx="8" ry="8"/>
  <text x="190" y="365" class="label">当前 timeline 的 layer 搜索</text>
  <rect x="135" y="400" width="340" height="42" fill="#bbf7d0" class="box"/>
  <text x="155" y="427" class="small">Open / Frozen InMemory layer</text>
  <rect x="135" y="455" width="340" height="42" fill="#fde68a" class="box"/>
  <text x="155" y="482" class="small">L0 delta：全 key 范围，LSN 0300-0400</text>
  <rect x="135" y="510" width="155" height="42" fill="#e9d5ff" class="box"/>
  <text x="148" y="537" class="tiny">L1 delta A</text>
  <rect x="320" y="510" width="155" height="42" fill="#e9d5ff" class="box"/>
  <text x="333" y="537" class="tiny">L1 delta B</text>
  <rect x="135" y="565" width="155" height="42" fill="#bfdbfe" class="box"/>
  <text x="148" y="592" class="tiny">Image@LSN 0200</text>
  <rect x="320" y="565" width="155" height="42" fill="#bfdbfe" class="box"/>
  <text x="333" y="592" class="tiny">Image@LSN 0200</text>
  <text x="145" y="637" class="small">命中 image 后停止向下找，再叠加后续 delta</text>

  <rect x="585" y="350" width="230" height="180" fill="#f1f5f9" class="box"/>
  <text x="628" y="388" class="label">父 timeline</text>
  <text x="615" y="424" class="small">当前分支缺少 key 时</text>
  <text x="615" y="452" class="small">把 LSN 降到 ancestor_lsn</text>
  <text x="615" y="480" class="small">继续搜索父 layer</text>

  <rect x="890" y="360" width="260" height="130" fill="#ede9fe" class="box"/>
  <text x="968" y="398" class="label">WAL redo</text>
  <text x="922" y="434" class="small">base image + WAL records</text>
  <text x="922" y="462" class="small">重构 8KB page image</text>

  <rect x="890" y="585" width="260" height="80" fill="#dcfce7" class="box"/>
  <text x="955" y="620" class="label">返回页面</text>
  <text x="922" y="648" class="small">PostgreSQL 继续执行 SQL</text>

  <path d="M 285 165 L 355 165" class="line"/>
  <path d="M 625 165 L 715 142" class="line"/>
  <path d="M 835 180 C 760 255 520 285 330 330" class="line"/>
  <path d="M 515 500 L 585 445" class="dash"/>
  <path d="M 515 555 C 650 560 785 512 890 435" class="line"/>
  <path d="M 1020 490 L 1020 585" class="line"/>
  <path d="M 890 625 C 700 700 250 700 170 225" class="dash"/>
  <text x="625" y="687" class="tiny">响应给 compute</text>

  <text x="62" y="720" class="small">读放大来源：需要访问的 layer 数量、远端 layer 下载、WAL redo 记录数、祖先 timeline 追溯深度，以及冷 compute 缓存命中率。</text>
</svg>
