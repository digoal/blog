<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title desc">
  <title id="title">Pageserver layer 与 compaction</title>
  <desc id="desc">展示 WAL 如何从内存层刷成 L0 delta，L0 如何合并为 L1 delta，L1 image compaction 如何生成新的 image layer 并降低读放大。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .axis { font: 600 18px sans-serif; fill: #334155; }
      .label { font: 600 20px sans-serif; fill: #0f172a; }
      .small { font: 16px sans-serif; fill: #334155; }
      .tiny { font: 14px sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 7; ry: 7; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="740" fill="#f8fafc"/>
  <text x="48" y="54" class="title">Layer 存储：key × LSN 空间里的不可变文件</text>

  <line x1="110" y1="620" x2="110" y2="135" stroke="#334155" stroke-width="2"/>
  <line x1="110" y1="620" x2="760" y2="620" stroke="#334155" stroke-width="2"/>
  <text x="88" y="120" class="axis">LSN</text>
  <text x="730" y="650" class="axis">Key range</text>

  <rect x="145" y="505" width="180" height="55" fill="#bfdbfe" class="box"/>
  <text x="160" y="538" class="small">Image@0100</text>
  <rect x="335" y="505" width="180" height="55" fill="#bfdbfe" class="box"/>
  <text x="350" y="538" class="small">Image@0100</text>
  <rect x="525" y="505" width="180" height="55" fill="#bfdbfe" class="box"/>
  <text x="540" y="538" class="small">Image@0100</text>

  <rect x="145" y="420" width="650" height="45" fill="#fde68a" class="box"/>
  <text x="165" y="448" class="small">L0 delta 0200-02ff：覆盖全 key range，读放大高</text>
  <rect x="145" y="365" width="650" height="45" fill="#fde68a" class="box"/>
  <text x="165" y="393" class="small">L0 delta 0300-03ff</text>
  <rect x="145" y="310" width="650" height="45" fill="#fde68a" class="box"/>
  <text x="165" y="338" class="small">L0 delta 0400-04ff</text>

  <rect x="180" y="230" width="220" height="50" fill="#e9d5ff" class="box"/>
  <text x="198" y="261" class="small">L1 delta 10-42 @0200-04ff</text>
  <rect x="455" y="210" width="260" height="50" fill="#e9d5ff" class="box"/>
  <text x="474" y="241" class="small">L1 delta 55-92 @0300-04ff</text>

  <rect x="820" y="115" width="315" height="500" fill="#fff" stroke="#334155" stroke-width="2" rx="8" ry="8"/>
  <text x="890" y="153" class="label">后台维护路径</text>
  <rect x="855" y="190" width="250" height="54" fill="#bbf7d0" class="box"/>
  <text x="880" y="224" class="small">内存层累计 WAL</text>
  <rect x="855" y="275" width="250" height="54" fill="#fde68a" class="box"/>
  <text x="880" y="309" class="small">超过 checkpoint_distance</text>
  <rect x="855" y="360" width="250" height="54" fill="#e9d5ff" class="box"/>
  <text x="880" y="394" class="small">L0 → L1 merge-sort</text>
  <rect x="855" y="445" width="250" height="54" fill="#bfdbfe" class="box"/>
  <text x="880" y="479" class="small">image compaction</text>
  <rect x="855" y="530" width="250" height="54" fill="#f1f5f9" class="box"/>
  <text x="880" y="564" class="small">GC 删除不再需要的旧层</text>
  <path d="M 980 244 L 980 275" class="line"/>
  <path d="M 980 329 L 980 360" class="line"/>
  <path d="M 980 414 L 980 445" class="line"/>
  <path d="M 980 499 L 980 530" class="line"/>

  <path d="M 795 333 C 835 315 845 305 855 305" class="line"/>
  <path d="M 705 530 C 780 505 815 475 855 472" class="dash"/>
  <text x="230" y="690" class="small">核心权衡：写入先顺序追加，读路径承担重构；compaction 用后台 IO/CPU 换更低的 layer 访问数和 WAL redo 成本。</text>
</svg>
