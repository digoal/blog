<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Neon 写入与 WAL 耐久路径</title>
  <desc id="desc">说明事务提交、WAL proposer、safekeeper quorum、pageserver WAL ingest、layer flush 和对象存储上传之间的先后关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .label { font: 600 20px sans-serif; fill: #0f172a; }
      .small { font: 16px sans-serif; fill: #334155; }
      .tiny { font: 14px sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .wait { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 8; ry: 8; }
      .done { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; ry: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#f8fafc"/>
  <text x="48" y="54" class="title">写入路径：提交等 WAL quorum，不等对象存储完成</text>

  <rect x="55" y="120" width="160" height="90" fill="#e0f2fe" class="box"/>
  <text x="83" y="155" class="label">业务事务</text>
  <text x="78" y="185" class="small">INSERT / UPDATE</text>

  <rect x="280" y="95" width="230" height="140" fill="#dcfce7" class="box"/>
  <text x="327" y="133" class="label">Compute</text>
  <text x="310" y="165" class="small">生成 PostgreSQL WAL</text>
  <text x="310" y="193" class="small">WAL proposer 推送</text>
  <text x="310" y="221" class="tiny">永久页写入不落本地数据文件</text>

  <rect x="620" y="82" width="330" height="185" fill="#ffedd5" class="box"/>
  <text x="720" y="120" class="label">Safekeeper quorum</text>
  <rect x="650" y="150" width="80" height="55" fill="#fed7aa" class="box"/>
  <text x="672" y="184" class="small">S1</text>
  <rect x="765" y="150" width="80" height="55" fill="#fed7aa" class="box"/>
  <text x="787" y="184" class="small">S2</text>
  <rect x="850" y="210" width="80" height="45" fill="#fff7ed" class="box"/>
  <text x="872" y="238" class="small">S3</text>
  <text x="650" y="242" class="tiny">flush_lsn 回报后计算 commit_lsn</text>

  <rect x="490" y="310" width="300" height="72" class="wait"/>
  <text x="520" y="344" class="label">事务提交等待点</text>
  <text x="520" y="370" class="small">多数 safekeeper 已持久化 WAL</text>

  <rect x="890" y="335" width="250" height="150" fill="#ede9fe" class="box"/>
  <text x="955" y="372" class="label">Pageserver</text>
  <text x="922" y="405" class="small">从 safekeeper 拉 WAL</text>
  <text x="922" y="433" class="small">写入内存层 / L0 layer</text>
  <text x="922" y="461" class="small">反馈 disk/remote LSN</text>

  <rect x="550" y="515" width="235" height="90" fill="#fef9c3" class="box"/>
  <text x="603" y="552" class="label">对象存储</text>
  <text x="575" y="582" class="small">上传 immutable layer</text>

  <rect x="85" y="485" width="320" height="95" class="done"/>
  <text x="112" y="522" class="label">客户端看到 COMMIT</text>
  <text x="112" y="552" class="small">此时 WAL 已由 quorum 保护</text>

  <path d="M 215 165 L 280 165" class="line"/>
  <path d="M 510 165 L 620 165" class="line"/>
  <path d="M 785 267 L 690 310" class="line"/>
  <path d="M 490 347 C 330 345 250 410 245 485" class="line"/>
  <path d="M 950 230 C 1050 250 1080 300 1030 335" class="line"/>
  <path d="M 890 450 C 800 495 720 520 705 515" class="line"/>
  <path d="M 920 457 C 715 430 585 410 545 382" class="dash"/>
  <text x="585" y="420" class="tiny">pageserver feedback / backpressure</text>

  <rect x="65" y="620" width="1070" height="40" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="8" ry="8"/>
  <text x="85" y="646" class="small">误区纠正：Neon 提交路径不要求每个事务同步上传 S3；对象存储承担长期持久化，safekeeper quorum 承担低延迟 WAL 耐久。</text>
</svg>
