<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420">
  <rect width="920" height="420" fill="#fbfaf7"/>
  <text x="460" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">期望值 = 结果 × 概率 的加权平均</text>
  <g font-size="16" fill="#263238">
    <rect x="70" y="95" width="170" height="70" rx="10" fill="#e8f3ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="155" y="123" text-anchor="middle" font-weight="700">结果 A</text>
    <text x="155" y="148" text-anchor="middle">收益 100, 概率 0.2</text>

    <rect x="70" y="200" width="170" height="70" rx="10" fill="#edf7ed" stroke="#22c55e" stroke-width="2"/>
    <text x="155" y="228" text-anchor="middle" font-weight="700">结果 B</text>
    <text x="155" y="253" text-anchor="middle">收益 20, 概率 0.5</text>

    <rect x="70" y="305" width="170" height="70" rx="10" fill="#fff0e6" stroke="#f97316" stroke-width="2"/>
    <text x="155" y="333" text-anchor="middle" font-weight="700">结果 C</text>
    <text x="155" y="358" text-anchor="middle">亏损 -30, 概率 0.3</text>
  </g>

  <g stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M250 130 C330 130 340 170 410 180"/>
    <path d="M250 235 C330 235 340 210 410 200"/>
    <path d="M250 340 C330 340 340 250 410 220"/>
  </g>

  <rect x="420" y="150" width="245" height="90" rx="12" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="542" y="184" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">加权求和</text>
  <text x="542" y="214" text-anchor="middle" font-size="17" fill="#111827">100×0.2 + 20×0.5 - 30×0.3</text>

  <path d="M675 195 L760 195" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="770" y="145" width="130" height="100" rx="14" fill="#111827"/>
  <text x="835" y="185" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">期望值</text>
  <text x="835" y="222" text-anchor="middle" font-size="30" font-weight="800" fill="#facc15">21</text>

  <text x="460" y="392" text-anchor="middle" font-size="15" fill="#4b5563">它不是保证每次得到 21, 而是大量重复同类决策后的长期中心。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
