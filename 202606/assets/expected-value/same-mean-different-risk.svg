<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460">
  <rect width="920" height="460" fill="#fbfaf7"/>
  <text x="460" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">同样的期望值, 可以有完全不同的风险形状</text>

  <line x1="90" y1="220" x2="850" y2="220" stroke="#9ca3af" stroke-width="2"/>
  <line x1="460" y1="95" x2="460" y2="350" stroke="#111827" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="460" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">共同期望值: 50</text>

  <g>
    <circle cx="430" cy="170" r="18" fill="#3b82f6"/>
    <circle cx="455" cy="170" r="22" fill="#3b82f6" opacity="0.85"/>
    <circle cx="480" cy="170" r="18" fill="#3b82f6"/>
    <text x="190" y="176" font-size="17" font-weight="700" fill="#1f2933">方案 A: 稳定</text>
    <text x="590" y="176" font-size="15" fill="#4b5563">多数结果靠近期望, 波动小</text>
  </g>

  <g>
    <circle cx="170" cy="290" r="26" fill="#f97316"/>
    <circle cx="460" cy="290" r="14" fill="#f97316" opacity="0.65"/>
    <circle cx="820" cy="290" r="26" fill="#f97316"/>
    <text x="190" y="332" font-size="17" font-weight="700" fill="#1f2933">方案 B: 两头大</text>
    <text x="590" y="332" font-size="15" fill="#4b5563">平均值一样, 但极端亏损和极端收益更多</text>
  </g>

  <g font-size="14" fill="#374151">
    <text x="90" y="222" dy="28" text-anchor="middle">低结果</text>
    <text x="850" y="222" dy="28" text-anchor="middle">高结果</text>
  </g>

  <rect x="150" y="370" width="620" height="46" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="460" y="399" text-anchor="middle" font-size="16" fill="#7c2d12">只看期望值会漏掉方差、最大亏损、破产风险和心理承受能力。</text>
</svg>
