  <text x="24" y="90" font-size="18" font-family="Arial, sans-serif" fill="#475569">样本均值</text>
  <line x1="90" y1="205" x2="820" y2="205" stroke="#dc2626" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="645" y="194" font-size="18" font-family="Arial, sans-serif" fill="#dc2626">总体期望 E[X]</text>
  <polyline points="100,110 135,270 170,150 205,245 240,178 275,226 310,188 345,216 380,194 415,211 450,198 485,208 520,201 555,206 590,202 625,205 660,203 695,205 730,204 765,205 810,204" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
