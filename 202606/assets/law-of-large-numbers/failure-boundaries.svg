<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460">
  <rect width="920" height="460" fill="#fbfaf7"/>
  <text x="40" y="46" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#1f2933">大数定律的边界：不是“样本大就一定对”</text>
  <rect x="55" y="95" width="250" height="270" rx="16" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
  <text x="98" y="135" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#166534">前提成立</text>
  <text x="85" y="180" font-size="18" font-family="Arial, sans-serif" fill="#064e3b">独立或弱相关</text>
  <text x="85" y="220" font-size="18" font-family="Arial, sans-serif" fill="#064e3b">同一分布或稳定机制</text>
  <text x="85" y="260" font-size="18" font-family="Arial, sans-serif" fill="#064e3b">期望存在</text>
  <text x="85" y="300" font-size="18" font-family="Arial, sans-serif" fill="#064e3b">抽样没有系统偏差</text>
  <path d="M 305 230 C 365 230, 385 230, 445 230" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="445" y="140" width="170" height="120" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="475" y="190" font-size="21" font-family="Arial, sans-serif" font-weight="700" fill="#312e81">样本均值</text>
  <text x="465" y="225" font-size="18" font-family="Arial, sans-serif" fill="#312e81">收敛到期望</text>
  <path d="M 615 230 C 675 230, 690 230, 750 230" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="750" y="95" width="160" height="270" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="782" y="135" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">可用场景</text>
  <text x="778" y="182" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">保险定价</text>
  <text x="778" y="222" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">A/B 测试</text>
  <text x="778" y="262" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">质量抽检</text>
  <text x="778" y="302" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">长期决策</text>
  <line x1="55" y1="405" x2="910" y2="405" stroke="#dc2626" stroke-width="3" stroke-dasharray="9 7"/>
  <text x="70" y="432" font-size="18" font-family="Arial, sans-serif" fill="#991b1b">失效边界：样本有偏、机制变化、强相关、重尾且期望不稳定时，大样本也可能稳定地错。</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
