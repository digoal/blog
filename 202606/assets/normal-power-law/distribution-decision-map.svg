<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">分布判断决策图</title>
  <desc id="desc">根据变量是否有自然上限、是否相互独立、是否存在乘法反馈和赢家通吃，判断更接近正态分布还是幂律分布。</desc>
  <rect width="980" height="560" fill="#fbfaf7"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="330" y="35" width="320" height="74" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="490" y="65" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">先问变量生成机制</text>
  <text x="490" y="92" text-anchor="middle" font-size="17" fill="#475569">不要先套公式，先看世界怎么产生数据</text>

  <line x1="490" y1="109" x2="490" y2="150" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="300" y="150" width="380" height="72" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="490" y="180" text-anchor="middle" font-size="21" font-weight="700" fill="#7c2d12">是否由许多小而独立的因素相加？</text>
  <text x="490" y="204" text-anchor="middle" font-size="16" fill="#9a3412">例如测量误差、身高、考试波动</text>

  <line x1="300" y1="186" x2="155" y2="186" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="45" y="138" width="200" height="96" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="145" y="174" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">更像正态</text>
  <text x="145" y="203" text-anchor="middle" font-size="16" fill="#1d4ed8">用均值、标准差、置信区间</text>

  <line x1="680" y1="186" x2="825" y2="186" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="755" y="138" width="220" height="96" rx="14" fill="#fff1f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="865" y="174" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">继续检查厚尾</text>
  <text x="865" y="203" text-anchor="middle" font-size="16" fill="#991b1b">不要急着用平均值代表整体</text>

  <line x1="865" y1="234" x2="865" y2="282" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="690" y="282" width="350" height="78" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="865" y="314" text-anchor="middle" font-size="21" font-weight="700" fill="#7f1d1d">是否存在乘法反馈或赢家通吃？</text>
  <text x="865" y="338" text-anchor="middle" font-size="16" fill="#991b1b">例如财富、流量、城市规模、引用次数</text>

  <line x1="865" y1="360" x2="865" y2="420" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="690" y="420" width="350" height="92" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="865" y="454" text-anchor="middle" font-size="23" font-weight="700" fill="#7f1d1d">更像幂律或厚尾</text>
  <text x="865" y="483" text-anchor="middle" font-size="16" fill="#991b1b">看分位数、最大值、尾部风险、集中度</text>

  <line x1="145" y1="234" x2="145" y2="420" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="45" y="420" width="260" height="92" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="175" y="454" text-anchor="middle" font-size="23" font-weight="700" fill="#1e3a8a">薄尾决策</text>
  <text x="175" y="483" text-anchor="middle" font-size="16" fill="#1d4ed8">优化平均表现，控制常规波动</text>

  <text x="380" y="515" font-size="18" fill="#475569">关键边界：如果极端值能改写总量，就不要把世界当作正态分布。</text>
</svg>
