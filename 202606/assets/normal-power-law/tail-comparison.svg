<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">正态分布与幂律分布的尾部差异</title>
  <desc id="desc">正态分布的极端值快速衰减，幂律分布的尾部更厚，极端值仍有显著影响。</desc>
  <rect width="960" height="520" fill="#fbfaf7"/>
  <line x1="90" y1="420" x2="880" y2="420" stroke="#2f3437" stroke-width="3"/>
  <line x1="90" y1="420" x2="90" y2="70" stroke="#2f3437" stroke-width="3"/>
  <text x="890" y="426" font-size="22" fill="#2f3437">数值大小</text>
  <text x="34" y="60" font-size="22" fill="#2f3437">概率密度</text>

  <path d="M110 416 C180 410, 245 355, 330 185 C390 65, 475 65, 535 185 C620 355, 685 410, 755 416"
        fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <path d="M110 416 C180 410, 245 355, 330 185 C390 65, 475 65, 535 185 C620 355, 685 410, 755 416 L755 420 L110 420 Z"
        fill="#2563eb" opacity="0.08"/>

  <path d="M110 350 C170 245, 240 190, 320 192 C430 196, 535 250, 650 315 C735 363, 805 395, 875 410"
        fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
  <path d="M110 350 C170 245, 240 190, 320 192 C430 196, 535 250, 650 315 C735 363, 805 395, 875 410 L875 420 L110 420 Z"
        fill="#dc2626" opacity="0.08"/>

  <line x1="755" y1="95" x2="755" y2="420" stroke="#9ca3af" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="688" y="82" font-size="21" fill="#374151">尾部区域</text>
  <text x="684" y="112" font-size="18" fill="#6b7280">看极端值是否仍能改写结论</text>

  <rect x="145" y="42" width="265" height="82" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <circle cx="172" cy="75" r="9" fill="#2563eb"/>
  <text x="190" y="82" font-size="24" font-weight="700" fill="#1e3a8a">正态分布</text>
  <text x="170" y="110" font-size="18" fill="#1e40af">多数值围绕均值，极端值快速变少</text>

  <rect x="510" y="42" width="305" height="82" rx="12" fill="#fff1f2" stroke="#fca5a5"/>
  <circle cx="538" cy="75" r="9" fill="#dc2626"/>
  <text x="556" y="82" font-size="24" font-weight="700" fill="#7f1d1d">幂律分布</text>
  <text x="536" y="110" font-size="18" fill="#991b1b">少数极端值仍保留巨大解释力</text>

  <text x="160" y="470" font-size="20" fill="#374151">薄尾世界：平均值比较可靠</text>
  <text x="550" y="470" font-size="20" fill="#374151">厚尾世界：最大值可能支配总量</text>
</svg>
