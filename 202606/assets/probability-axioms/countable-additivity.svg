<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#fbfaf7"/>
  <text x="48" y="54" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#202124">可加性的前提: 先互斥，再相加</text>
  <text x="48" y="88" font-size="16" font-family="Arial, sans-serif" fill="#5f6368">如果事件互不重叠，总概率才等于各部分概率之和；重叠事件直接相加会重复计算。</text>

  <rect x="80" y="145" width="800" height="120" rx="16" fill="#eef4ff" stroke="#2f6fed" stroke-width="3"/>
  <rect x="95" y="165" width="210" height="80" rx="10" fill="#f7c948" stroke="#a66f00" stroke-width="2"/>
  <rect x="315" y="165" width="250" height="80" rx="10" fill="#58c4dd" stroke="#006b7d" stroke-width="2"/>
  <rect x="575" y="165" width="280" height="80" rx="10" fill="#81c995" stroke="#137333" stroke-width="2"/>
  <text x="177" y="212" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#4f3300">A₁</text>
  <text x="427" y="212" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#004d5c">A₂</text>
  <text x="704" y="212" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#0b5721">A₃</text>
  <text x="105" y="292" font-size="18" font-family="Arial, sans-serif" fill="#303134">互不相交: Aᵢ ∩ Aⱼ = ∅</text>

  <text x="130" y="365" font-size="25" font-family="Arial, sans-serif" font-weight="700" fill="#202124">P(A₁ ∪ A₂ ∪ A₃) = P(A₁) + P(A₂) + P(A₃)</text>
  <text x="130" y="404" font-size="18" font-family="Arial, sans-serif" fill="#5f6368">三公理使用的是可数可加性: 对可数多个互斥事件也成立。</text>

  <circle cx="720" cy="365" r="42" fill="#fff1f1" stroke="#c5221f" stroke-width="3"/>
  <text x="696" y="373" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#c5221f">!</text>
  <text x="770" y="358" font-size="17" font-family="Arial, sans-serif" fill="#c5221f">重叠事件</text>
  <text x="770" y="383" font-size="17" font-family="Arial, sans-serif" fill="#c5221f">不能这样加</text>
</svg>
