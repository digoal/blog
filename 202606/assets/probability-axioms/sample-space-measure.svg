<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="#fbfaf7"/>
  <text x="48" y="54" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#202124">样本空间到概率数值的映射</text>
  <text x="48" y="88" font-size="16" font-family="Arial, sans-serif" fill="#5f6368">概率不是情绪强弱，而是把事件集合映射到 0 到 1 之间的数</text>

  <rect x="70" y="135" width="370" height="295" rx="18" fill="#eef4ff" stroke="#2f6fed" stroke-width="3"/>
  <text x="94" y="170" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#1a3f8b">样本空间 Ω</text>
  <text x="94" y="197" font-size="15" font-family="Arial, sans-serif" fill="#315789">所有可能结果的全集</text>

  <ellipse cx="205" cy="300" rx="105" ry="72" fill="#f7c948" fill-opacity="0.78" stroke="#a66f00" stroke-width="2"/>
  <ellipse cx="302" cy="300" rx="105" ry="72" fill="#58c4dd" fill-opacity="0.72" stroke="#006b7d" stroke-width="2"/>
  <text x="164" y="304" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#4f3300">事件 A</text>
  <text x="282" y="304" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#004d5c">事件 B</text>
  <text x="146" y="394" font-size="15" font-family="Arial, sans-serif" fill="#5f6368">A 与 B 可以重叠，因此不能直接相加</text>

  <path d="M470 280 C535 280 550 280 615 280" fill="none" stroke="#303134" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="506" y="255" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#303134">P(事件)</text>

  <rect x="655" y="156" width="255" height="255" rx="18" fill="#f1f8ed" stroke="#188038" stroke-width="3"/>
  <text x="690" y="198" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#0b6623">概率值</text>
  <line x1="705" y1="330" x2="860" y2="330" stroke="#188038" stroke-width="8" stroke-linecap="round"/>
  <circle cx="705" cy="330" r="12" fill="#188038"/>
  <circle cx="860" cy="330" r="12" fill="#188038"/>
  <text x="696" y="360" font-size="18" font-family="Arial, sans-serif" fill="#303134">0</text>
  <text x="854" y="360" font-size="18" font-family="Arial, sans-serif" fill="#303134">1</text>
  <text x="688" y="285" font-size="18" font-family="Arial, sans-serif" fill="#303134">非负性: P(A) ≥ 0</text>
  <text x="688" y="390" font-size="18" font-family="Arial, sans-serif" fill="#303134">归一性: P(Ω) = 1</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#303134"/>
    </marker>
  </defs>
</svg>
