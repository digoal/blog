<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">抽样偏差让估计值偏离真实值</title>
  <desc id="desc">样本量变大可以降低随机误差，但如果抽样机制有偏，估计值会稳定地偏离总体真实值。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#ffffff"/>
  <text x="42" y="52" font-size="24" font-weight="700" fill="#0f172a">大样本只能压低随机误差，不能自动消除系统性偏差</text>
  <line x1="90" y1="330" x2="820" y2="330" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="110" y1="350" x2="110" y2="90" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="805" y="365" font-size="14" fill="#475569">样本量 n</text>
  <text x="40" y="105" font-size="14" fill="#475569">估计值</text>

  <line x1="120" y1="210" x2="790" y2="210" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="650" y="198" font-size="15" font-weight="700" fill="#16a34a">总体真实值</text>

  <path d="M130 145 C210 238, 300 178, 390 225 C480 188, 570 216, 690 205 C735 202, 765 210, 790 209" fill="none" stroke="#2563eb" stroke-width="4"/>
  <text x="170" y="125" font-size="15" font-weight="700" fill="#2563eb">随机抽样：围绕真实值收敛</text>

  <path d="M130 105 C220 118, 320 105, 430 114 C540 108, 650 112, 790 110" fill="none" stroke="#f97316" stroke-width="4"/>
  <line x1="785" y1="110" x2="785" y2="210" stroke="#f97316" stroke-width="3" stroke-dasharray="5 5"/>
  <text x="570" y="96" font-size="15" font-weight="700" fill="#f97316">有偏抽样：稳定地错</text>
  <text x="598" y="160" font-size="14" fill="#9a3412">偏差不是波动</text>
  <text x="598" y="184" font-size="14" fill="#9a3412">而是方向性偏离</text>

  <rect x="126" y="266" width="250" height="58" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="146" y="292" font-size="14" fill="#1e3a8a">随机误差：多抽几次会互相抵消</text>
  <text x="146" y="314" font-size="14" fill="#1e3a8a">解决：增加样本量</text>

  <rect x="430" y="266" width="292" height="58" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="450" y="292" font-size="14" fill="#7c2d12">系统偏差：抽样规则持续选错人</text>
  <text x="450" y="314" font-size="14" fill="#7c2d12">解决：修正抽样框、分层、加权、复核</text>
</svg>
