<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">抽样偏差的选择机制</title>
  <desc id="desc">总体中的不同人群经过覆盖、回应和选择三道门槛后，进入样本的比例发生扭曲。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#f8fafc"/>
  <text x="42" y="50" font-size="24" font-weight="700" fill="#0f172a">抽样偏差不是样本小，而是进入样本的机制歪了</text>

  <rect x="44" y="88" width="230" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="72" y="125" font-size="18" font-weight="700" fill="#0f172a">总体 Population</text>
  <circle cx="92" cy="170" r="13" fill="#2563eb"/>
  <circle cx="138" cy="166" r="13" fill="#2563eb"/>
  <circle cx="184" cy="174" r="13" fill="#2563eb"/>
  <circle cx="230" cy="165" r="13" fill="#2563eb"/>
  <circle cx="92" cy="222" r="13" fill="#16a34a"/>
  <circle cx="138" cy="232" r="13" fill="#16a34a"/>
  <circle cx="184" cy="224" r="13" fill="#16a34a"/>
  <circle cx="230" cy="234" r="13" fill="#16a34a"/>
  <circle cx="92" cy="282" r="13" fill="#f97316"/>
  <circle cx="138" cy="276" r="13" fill="#f97316"/>
  <circle cx="184" cy="286" r="13" fill="#f97316"/>
  <circle cx="230" cy="278" r="13" fill="#f97316"/>
  <text x="72" y="324" font-size="14" fill="#475569">三类人群比例接近均衡</text>

  <line x1="292" y1="218" x2="395" y2="218" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="340" y="88" width="210" height="260" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="370" y="125" font-size="18" font-weight="700" fill="#9a3412">选择机制</text>
  <text x="365" y="170" font-size="15" fill="#7c2d12">1. 谁被覆盖？</text>
  <text x="365" y="205" font-size="15" fill="#7c2d12">2. 谁愿回应？</text>
  <text x="365" y="240" font-size="15" fill="#7c2d12">3. 谁被留下？</text>
  <text x="365" y="292" font-size="14" fill="#9a3412">门槛与目标变量相关时</text>
  <text x="365" y="317" font-size="14" fill="#9a3412">样本就会系统性偏离总体</text>

  <line x1="570" y1="218" x2="673" y2="218" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="690" y="88" width="230" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="720" y="125" font-size="18" font-weight="700" fill="#0f172a">样本 Sample</text>
  <circle cx="742" cy="170" r="13" fill="#2563eb"/>
  <circle cx="788" cy="166" r="13" fill="#2563eb"/>
  <circle cx="834" cy="174" r="13" fill="#2563eb"/>
  <circle cx="880" cy="165" r="13" fill="#2563eb"/>
  <circle cx="742" cy="222" r="13" fill="#2563eb"/>
  <circle cx="788" cy="232" r="13" fill="#2563eb"/>
  <circle cx="834" cy="224" r="13" fill="#16a34a"/>
  <circle cx="880" cy="234" r="13" fill="#16a34a"/>
  <circle cx="742" cy="282" r="13" fill="#f97316" opacity="0.3"/>
  <circle cx="788" cy="276" r="13" fill="#f97316" opacity="0.3"/>
  <text x="720" y="324" font-size="14" fill="#475569">某类人群被过度代表</text>
</svg>
