<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">从现实问题到概率模型</title>
  <desc id="desc">展示把现实不确定性转化为样本空间、事件和概率判断的步骤。</desc>
  <rect width="980" height="420" fill="#fbfbf7"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="45" y="120" width="170" height="120" rx="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
    <text x="82" y="165" font-size="24" font-weight="700" fill="#075985">现实问题</text>
    <text x="65" y="198" font-size="17" fill="#075985">未来会发生什么？</text>

    <line x1="230" y1="180" x2="305" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="320" y="95" width="190" height="170" rx="16" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
    <text x="358" y="135" font-size="24" font-weight="700" fill="#92400e">定义 Ω</text>
    <text x="345" y="168" font-size="17" fill="#92400e">列出所有可能结果</text>
    <text x="345" y="198" font-size="17" fill="#92400e">明确边界与粒度</text>
    <text x="345" y="228" font-size="17" fill="#92400e">排除不可能项</text>

    <line x1="525" y1="180" x2="600" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="615" y="95" width="190" height="170" rx="16" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
    <text x="660" y="135" font-size="24" font-weight="700" fill="#166534">定义事件</text>
    <text x="640" y="168" font-size="17" fill="#166534">把关心的问题</text>
    <text x="640" y="198" font-size="17" fill="#166534">转成 Ω 的子集</text>
    <text x="640" y="228" font-size="17" fill="#166534">例如 A、B、A∩B</text>

    <line x1="820" y1="180" x2="895" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="805" y="295" width="130" height="55" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="827" y="330" font-size="18" fill="#334155">检查假设</text>

    <rect x="835" y="95" width="115" height="170" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="858" y="135" font-size="24" font-weight="700" fill="#5b21b6">赋概率</text>
    <text x="855" y="168" font-size="17" fill="#5b21b6">对事件</text>
    <text x="855" y="198" font-size="17" fill="#5b21b6">计算或</text>
    <text x="855" y="228" font-size="17" fill="#5b21b6">更新权重</text>

    <path d="M870 295 C760 345, 470 345, 410 268" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <text x="385" y="335" font-size="18" fill="#475569">发现样本空间漏项、粒度错误或事件定义含混，就回到前面重建模型。</text>
  </g>
</svg>
