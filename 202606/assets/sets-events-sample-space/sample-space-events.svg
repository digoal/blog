<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">样本空间与事件关系图</title>
  <desc id="desc">用全集、子集和样本点说明样本空间、事件和具体结果的关系。</desc>
  <rect width="920" height="520" fill="#fafafa"/>
  <rect x="70" y="70" width="780" height="360" rx="22" fill="#f4f7fb" stroke="#243b53" stroke-width="3"/>
  <text x="95" y="115" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#243b53">样本空间 Ω：所有可能结果的集合</text>

  <ellipse cx="360" cy="270" rx="190" ry="115" fill="#d9ecff" stroke="#1f78b4" stroke-width="3"/>
  <text x="250" y="205" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f4e79">事件 A</text>
  <text x="225" y="235" font-family="Arial, sans-serif" font-size="18" fill="#1f4e79">例如：掷骰子结果为偶数</text>

  <ellipse cx="555" cy="290" rx="185" ry="110" fill="#ffe7c7" stroke="#d9822b" stroke-width="3" opacity="0.9"/>
  <text x="590" y="245" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#8a4b08">事件 B</text>
  <text x="565" y="275" font-family="Arial, sans-serif" font-size="18" fill="#8a4b08">例如：结果大于 3</text>

  <circle cx="270" cy="280" r="11" fill="#0b5cad"/>
  <text x="252" y="315" font-family="Arial, sans-serif" font-size="20" fill="#243b53">2</text>
  <circle cx="355" cy="305" r="11" fill="#0b5cad"/>
  <text x="337" y="340" font-family="Arial, sans-serif" font-size="20" fill="#243b53">4</text>
  <circle cx="455" cy="280" r="11" fill="#7c3aed"/>
  <text x="437" y="315" font-family="Arial, sans-serif" font-size="20" fill="#243b53">6</text>
  <circle cx="610" cy="320" r="11" fill="#b45309"/>
  <text x="592" y="355" font-family="Arial, sans-serif" font-size="20" fill="#243b53">5</text>
  <circle cx="720" cy="145" r="11" fill="#475569"/>
  <text x="703" y="180" font-family="Arial, sans-serif" font-size="20" fill="#243b53">1</text>
  <circle cx="760" cy="360" r="11" fill="#475569"/>
  <text x="743" y="395" font-family="Arial, sans-serif" font-size="20" fill="#243b53">3</text>

  <rect x="165" y="455" width="590" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="185" y="480" font-family="Arial, sans-serif" font-size="19" fill="#334155">样本点是单个结果；事件是样本点组成的子集；概率是给这些子集分配权重。</text>
</svg>
