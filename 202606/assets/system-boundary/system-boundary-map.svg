<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .muted { font: 13px Arial, sans-serif; fill: #64748b; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
      .system { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 22; }
      .env { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; }
      .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; }
    </style>
  </defs>

  <rect x="20" y="18" width="880" height="484" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="58" class="title">系统与边界: 先决定看什么, 才能分析为什么</text>
  <text x="48" y="86" class="muted">边界不是现实里的墙, 而是分析时暂时画出的责任线、变量线和因果线。</text>

  <rect x="340" y="142" width="330" height="245" class="system"/>
  <text x="470" y="176" text-anchor="middle" class="label">系统内部</text>
  <text x="370" y="214" class="small">状态变量: 现金、库存、士气、速度</text>
  <text x="370" y="246" class="small">内部结构: 流程、激励、约束、反馈</text>
  <text x="370" y="278" class="small">可控动作: 投入、取舍、调整、治理</text>
  <path d="M430 326 C470 292, 545 292, 585 326" class="dash"/>
  <path d="M585 326 C545 360, 470 360, 430 326" class="dash"/>
  <text x="506" y="331" text-anchor="middle" class="small">内部反馈回路</text>

  <rect x="52" y="148" width="220" height="78" class="env"/>
  <text x="162" y="180" text-anchor="middle" class="label">输入</text>
  <text x="162" y="205" text-anchor="middle" class="small">资本、信息、人才、能量</text>

  <rect x="52" y="310" width="220" height="78" class="warn"/>
  <text x="162" y="342" text-anchor="middle" class="label">外部扰动</text>
  <text x="162" y="367" text-anchor="middle" class="small">竞争、政策、需求变化</text>

  <rect x="728" y="148" width="220" height="78" class="env"/>
  <text x="838" y="180" text-anchor="middle" class="label">输出</text>
  <text x="838" y="205" text-anchor="middle" class="small">产品、利润、污染、口碑</text>

  <rect x="728" y="310" width="220" height="78" class="box"/>
  <text x="838" y="342" text-anchor="middle" class="label">外部反馈</text>
  <text x="838" y="367" text-anchor="middle" class="small">客户复购、监管、市场价格</text>

  <path d="M272 187 L336 187" class="arrow"/>
  <path d="M272 349 L336 314" class="arrow"/>
  <path d="M670 187 L724 187" class="arrow"/>
  <path d="M838 310 C805 270, 742 250, 672 256" class="arrow"/>

  <line x1="318" y1="114" x2="318" y2="424" class="dash"/>
  <line x1="692" y1="114" x2="692" y2="424" class="dash"/>
  <text x="318" y="446" text-anchor="middle" class="muted">边界: 什么算内部?</text>
  <text x="692" y="446" text-anchor="middle" class="muted">边界: 什么算外部?</text>

  <text x="48" y="476" class="muted">检查顺序: 目标 -> 边界 -> 状态变量 -> 输入输出 -> 反馈 -> 失效边界</text>
</svg>
