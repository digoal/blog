<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520">
  <rect width="940" height="520" fill="#fbfaf7"/>
  <text x="470" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">方差: 把每个结果离均值的距离平方后再平均</text>

  <line x1="90" y1="250" x2="850" y2="250" stroke="#9ca3af" stroke-width="2"/>
  <line x1="470" y1="110" x2="470" y2="390" stroke="#111827" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="470" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">均值 μ</text>

  <g>
    <circle cx="170" cy="250" r="18" fill="#ef4444"/>
    <circle cx="330" cy="250" r="18" fill="#f97316"/>
    <circle cx="520" cy="250" r="18" fill="#3b82f6"/>
    <circle cx="760" cy="250" r="18" fill="#ef4444"/>
  </g>

  <g stroke-width="3" fill="none">
    <line x1="170" y1="205" x2="470" y2="205" stroke="#ef4444" marker-end="url(#arrow)"/>
    <line x1="330" y1="175" x2="470" y2="175" stroke="#f97316" marker-end="url(#arrow)"/>
    <line x1="520" y1="320" x2="470" y2="320" stroke="#3b82f6" marker-end="url(#arrow)"/>
    <line x1="760" y1="350" x2="470" y2="350" stroke="#ef4444" marker-end="url(#arrow)"/>
  </g>

  <g font-size="15" fill="#374151">
    <text x="320" y="194" text-anchor="middle">x - μ</text>
    <text x="400" y="164" text-anchor="middle">x - μ</text>
    <text x="495" y="310" text-anchor="middle">x - μ</text>
    <text x="615" y="338" text-anchor="middle">x - μ</text>
  </g>

  <rect x="115" y="415" width="710" height="58" rx="12" fill="#fff7ed" stroke="#fb923c"/>
  <text x="470" y="440" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">平方的作用: 负偏差不会抵消正偏差, 大偏差会被更重地惩罚</text>
  <text x="470" y="464" text-anchor="middle" font-size="15" fill="#7c2d12">Var(X) = E[(X - μ)²], 标准差 σ = √Var(X), 单位回到原变量尺度</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
