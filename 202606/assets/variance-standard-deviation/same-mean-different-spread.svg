<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560">
  <rect width="940" height="560" fill="#fbfaf7"/>
  <text x="470" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">均值相同, 标准差不同: 决策感受完全不同</text>

  <line x1="100" y1="235" x2="840" y2="235" stroke="#9ca3af" stroke-width="2"/>
  <line x1="470" y1="105" x2="470" y2="430" stroke="#111827" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="470" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">共同均值: 50</text>

  <g>
    <text x="130" y="150" font-size="18" font-weight="700" fill="#1f2937">A: 稳定工资型</text>
    <circle cx="430" cy="190" r="16" fill="#2563eb"/>
    <circle cx="455" cy="190" r="18" fill="#2563eb" opacity="0.9"/>
    <circle cx="480" cy="190" r="20" fill="#2563eb" opacity="0.85"/>
    <circle cx="505" cy="190" r="18" fill="#2563eb" opacity="0.9"/>
    <circle cx="530" cy="190" r="16" fill="#2563eb"/>
    <path d="M410 145 C440 120, 500 120, 540 145" stroke="#2563eb" stroke-width="4" fill="none"/>
    <text x="650" y="196" font-size="15" fill="#374151">结果集中, 标准差小</text>
  </g>

  <g>
    <text x="130" y="335" font-size="18" font-weight="700" fill="#1f2937">B: 高波动奖金型</text>
    <circle cx="180" cy="385" r="26" fill="#f97316"/>
    <circle cx="470" cy="385" r="12" fill="#f97316" opacity="0.55"/>
    <circle cx="820" cy="385" r="26" fill="#f97316"/>
    <path d="M150 330 C230 285, 365 410, 470 360 C575 310, 735 285, 850 330" stroke="#f97316" stroke-width="4" fill="none"/>
    <text x="650" y="391" font-size="15" fill="#374151">两头更重, 标准差大</text>
  </g>

  <g font-size="14" fill="#374151">
    <text x="100" y="262" text-anchor="middle">低结果</text>
    <text x="840" y="262" text-anchor="middle">高结果</text>
  </g>

  <rect x="120" y="470" width="700" height="56" rx="12" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="470" y="493" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">均值告诉你中心在哪里; 标准差告诉你通常会偏离中心多远</text>
  <text x="470" y="517" text-anchor="middle" font-size="15" fill="#1e3a8a">同样平均收益, 对现金流、心理承受、仓位管理的要求可能完全不同</text>
</svg>
