<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">2PC 解决跨资源原子提交问题</title>
  <desc id="desc">协调者先询问多个参与者是否可提交，再统一发送提交或回滚决定，避免部分资源提交、部分资源回滚。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .danger { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 8; }
    .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .note { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 20px; }
    .small { font-size: 16px; fill: #334155; }
    .label { font-size: 18px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .red { stroke: #dc2626; }
    .green { stroke: #16a34a; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="520"/>

  <text class="text label" x="40" y="42">没有 2PC：每个资源各自提交，失败窗口不可消除</text>
  <rect class="panel" x="40" y="66" width="430" height="170"/>
  <rect class="danger" x="70" y="102" width="120" height="54"/>
  <text class="text small" x="95" y="136">订单库提交</text>
  <rect class="danger" x="290" y="102" width="130" height="54"/>
  <text class="text small" x="315" y="136">库存库失败</text>
  <path class="arrow red" d="M195 129 H285"/>
  <text class="text small" x="78" y="190">结果：业务状态分裂，需要人工修复或补偿</text>

  <text class="text label" x="540" y="42">有 2PC：先准备，后统一决定</text>
  <rect class="panel" x="540" y="66" width="460" height="410"/>
  <rect class="note" x="700" y="92" width="150" height="58"/>
  <text class="text small" x="735" y="127">协调者 TM</text>
  <rect class="ok" x="580" y="222" width="140" height="60"/>
  <text class="text small" x="612" y="257">参与者 A</text>
  <rect class="ok" x="820" y="222" width="140" height="60"/>
  <text class="text small" x="852" y="257">参与者 B</text>
  <path class="arrow" d="M735 151 L665 217"/>
  <path class="arrow" d="M812 151 L875 217"/>
  <text class="text small" x="612" y="198">prepare?</text>
  <text class="text small" x="850" y="198">prepare?</text>
  <path class="arrow green" d="M720 238 L770 154"/>
  <path class="arrow green" d="M820 238 L790 154"/>
  <text class="text small" x="718" y="205">yes</text>
  <text class="text small" x="800" y="205">yes</text>
  <path class="arrow" d="M775 154 V338"/>
  <text class="text small" x="794" y="315">commit / rollback</text>
  <rect class="panel" x="600" y="360" width="340" height="54"/>
  <text class="text small" x="632" y="394">只有协调者决定后，所有参与者才结束</text>

  <rect class="panel" x="40" y="300" width="430" height="120"/>
  <text class="text small" x="70" y="335">2PC 不是让资源永远等待。</text>
  <text class="text small" x="70" y="365">它把问题变成：prepared 状态必须可恢复，</text>
  <text class="text small" x="70" y="395">且必须尽快收到最终 commit / rollback。</text>
</svg>
