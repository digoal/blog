<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="670" viewBox="0 0 1180 670" role="img" aria-labelledby="title desc">
  <title id="title">COMMIT PREPARED、ROLLBACK PREPARED 与恢复路径</title>
  <desc id="desc">FinishPreparedTransaction 锁定 GID，读取 WAL 或 pg_twophase，写 commit/abort prepared WAL，更新 pg_xact，移出 ProcArray，再调用资源管理器回调释放锁和清理状态；恢复时通过 WAL redo 和 pg_twophase 重建 prepared transaction。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .wal { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .state { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .clean { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .recovery { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 20px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="670"/>
  <text class="text label" x="42" y="45">二阶段结束：先写最终决定，再改变可见性和释放资源</text>

  <rect class="box" x="50" y="85" width="230" height="100"/>
  <text class="text" x="80" y="124">LockGXact</text>
  <text class="small" x="76" y="154">按 GID 找 prepared xact</text>
  <text class="small" x="76" y="178">校验 owner / superuser / database</text>

  <rect class="state" x="340" y="85" width="240" height="100"/>
  <text class="text" x="375" y="124">读取 2PC 状态</text>
  <text class="small" x="368" y="154">ondisk=false：读 WAL</text>
  <text class="small" x="368" y="178">ondisk=true：读 pg_twophase</text>

  <rect class="wal" x="640" y="85" width="255" height="100"/>
  <text class="text" x="675" y="124">写最终 WAL</text>
  <text class="mono" x="675" y="154">COMMIT_PREPARED</text>
  <text class="mono" x="675" y="178">或 ABORT_PREPARED</text>

  <rect class="state" x="950" y="85" width="160" height="100"/>
  <text class="text" x="985" y="124">pg_xact</text>
  <text class="small" x="980" y="154">标记提交</text>
  <text class="small" x="980" y="178">或中止</text>

  <rect class="clean" x="220" y="290" width="245" height="120"/>
  <text class="text" x="256" y="328">ProcArrayRemove</text>
  <text class="small" x="250" y="358">prepared XID 不再 in-progress</text>
  <text class="small" x="250" y="382">其他事务可按最终状态判断</text>

  <rect class="clean" x="530" y="290" width="280" height="120"/>
  <text class="text" x="562" y="328">ProcessRecords 回调</text>
  <text class="small" x="560" y="358">释放 lock / predicate lock</text>
  <text class="small" x="560" y="382">清理 pgstat / multixact 等状态</text>

  <rect class="clean" x="875" y="290" width="245" height="120"/>
  <text class="text" x="910" y="328">RemoveGXact</text>
  <text class="small" x="905" y="358">从 TwoPhaseState 删除</text>
  <text class="small" x="905" y="382">如有文件则删除 pg_twophase</text>

  <rect class="recovery" x="95" y="505" width="310" height="110"/>
  <text class="text" x="132" y="542">WAL redo</text>
  <text class="small" x="130" y="570">PREPARE：PrepareRedoAdd</text>
  <text class="small" x="130" y="594">COMMIT/ABORT PREPARED：PrepareRedoRemove</text>

  <rect class="recovery" x="520" y="505" width="310" height="110"/>
  <text class="text" x="555" y="542">启动恢复</text>
  <text class="small" x="555" y="570">restoreTwoPhaseData 扫 pg_twophase</text>
  <text class="small" x="555" y="594">RecoverPreparedTransactions 重建锁和子事务</text>

  <path class="arrow" d="M280 135 H335"/>
  <path class="arrow" d="M580 135 H635"/>
  <path class="arrow" d="M895 135 H945"/>
  <path class="arrow" d="M1030 185 C1030 245 360 235 345 285"/>
  <path class="arrow" d="M465 350 H525"/>
  <path class="arrow" d="M810 350 H870"/>
  <path class="arrow" d="M997 410 C980 480 395 465 265 500"/>
  <path class="arrow" d="M405 560 H515"/>
</svg>
