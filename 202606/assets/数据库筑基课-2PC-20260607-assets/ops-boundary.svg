<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">2PC 运维边界与观测路径</title>
  <desc id="desc">prepared transaction 长时间停留会继续持有锁和 XID 边界，影响 VACUUM、DDL、复制和故障恢复；DBA 应监控 pg_prepared_xacts、pg_locks 和事务年龄。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .center { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 8; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .metric { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .action { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 20px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="650"/>
  <text class="text label" x="40" y="45">2PC 的生产边界：prepared 状态要短，且必须被事务管理器兜底关闭</text>

  <rect class="center" x="420" y="245" width="280" height="120"/>
  <text class="text" x="465" y="292">长时间 prepared</text>
  <text class="small" x="455" y="322">仍持有 XID、锁和部分资源状态</text>
  <text class="small" x="455" y="346">原会话退出也不会自动结束</text>

  <rect class="box" x="70" y="110" width="270" height="105"/>
  <text class="text" x="115" y="148">锁等待与 DDL 阻塞</text>
  <text class="small" x="105" y="178">pg_locks.pid 可能为空</text>
  <text class="small" x="105" y="202">需要关联 pg_prepared_xacts</text>

  <rect class="box" x="745" y="110" width="270" height="105"/>
  <text class="text" x="795" y="148">VACUUM 边界后退</text>
  <text class="small" x="780" y="178">旧版本不能清理</text>
  <text class="small" x="780" y="202">极端情况下触发 wraparound 风险</text>

  <rect class="box" x="70" y="435" width="270" height="105"/>
  <text class="text" x="120" y="473">复制与恢复复杂度</text>
  <text class="small" x="105" y="503">standby 参数需足够</text>
  <text class="small" x="105" y="527">逻辑复制 two_phase 需专门启用</text>

  <rect class="box" x="745" y="435" width="270" height="105"/>
  <text class="text" x="790" y="473">忘记最终决定</text>
  <text class="small" x="780" y="503">业务进入不确定窗口</text>
  <text class="small" x="780" y="527">必须依靠 TM 日志和清理流程</text>

  <rect class="metric" x="390" y="70" width="340" height="95"/>
  <text class="text" x="438" y="108">监控入口</text>
  <text class="mono" x="430" y="136">pg_prepared_xacts / pg_locks</text>
  <text class="small" x="430" y="158">prepared 时间、GID、owner、database、锁对象</text>

  <rect class="action" x="390" y="485" width="340" height="105"/>
  <text class="text" x="448" y="525">处置原则</text>
  <text class="small" x="430" y="555">先找协调者最终决定，再执行 COMMIT/ROLLBACK PREPARED</text>
  <text class="small" x="430" y="579">不能凭“看起来没用”随便结束</text>

  <path class="arrow" d="M420 285 C340 250 285 218 240 215"/>
  <path class="arrow" d="M700 285 C765 245 820 218 855 215"/>
  <path class="arrow" d="M425 345 C340 395 275 425 235 435"/>
  <path class="arrow" d="M695 345 C760 395 825 425 865 435"/>
  <path class="arrow" d="M560 165 V240"/>
  <path class="arrow" d="M560 365 V480"/>
</svg>
