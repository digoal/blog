<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL prepared transaction 的内存结构</title>
  <desc id="desc">TwoPhaseState 保存 GlobalTransactionData 数组，每个 prepared transaction 关联 dummy PGPROC，ProcArray 和锁表通过 dummy PGPROC 继续感知该事务。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .head { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .proc { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .lock { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .wal { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 19px; }
    .small { font-size: 15px; fill: #334155; }
    .label { font-size: 20px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="620"/>
  <text class="text label" x="40" y="44">prepared transaction 不挂在原会话上，而挂在全局 2PC 状态和 dummy PGPROC 上</text>

  <rect class="head" x="50" y="85" width="330" height="470"/>
  <text class="text label" x="80" y="124">TwoPhaseState</text>
  <text class="small" x="80" y="154">受 TwoPhaseStateLock 保护</text>
  <rect class="box" x="85" y="185" width="260" height="70"/>
  <text class="mono" x="110" y="215">freeGXacts</text>
  <text class="small" x="110" y="240">未使用 GlobalTransaction 链表</text>
  <rect class="box" x="85" y="280" width="260" height="175"/>
  <text class="mono" x="110" y="312">prepXacts[]</text>
  <text class="small" x="110" y="340">已准备或正在准备的 GXACT</text>
  <text class="small" x="110" y="370">numPrepXacts 记录数量</text>
  <text class="small" x="110" y="400">由 max_prepared_transactions 限制</text>

  <rect class="box" x="470" y="80" width="320" height="235"/>
  <text class="text label" x="500" y="120">GlobalTransactionData</text>
  <text class="mono" x="500" y="152">gid</text>
  <text class="mono" x="500" y="180">fxid / owner / prepared_at</text>
  <text class="mono" x="500" y="208">prepare_start_lsn</text>
  <text class="mono" x="500" y="236">prepare_end_lsn</text>
  <text class="mono" x="500" y="264">valid / ondisk / inredo</text>
  <text class="mono" x="500" y="292">pgprocno / locking_backend</text>

  <rect class="proc" x="470" y="390" width="320" height="145"/>
  <text class="text label" x="500" y="430">dummy PGPROC</text>
  <text class="small" x="500" y="462">让 TransactionIdIsInProgress 仍认为 XID 运行中</text>
  <text class="small" x="500" y="492">承接事务锁、子事务缓存、databaseId、roleId</text>
  <text class="small" x="500" y="522">原会话执行 PREPARE 后可以退出</text>

  <rect class="proc" x="870" y="115" width="210" height="90"/>
  <text class="text label" x="910" y="152">ProcArray</text>
  <text class="small" x="900" y="180">快照与 in-progress 判断</text>

  <rect class="lock" x="860" y="265" width="230" height="105"/>
  <text class="text label" x="908" y="306">Lock Table</text>
  <text class="small" x="890" y="336">表锁、行锁相关锁对象</text>
  <text class="small" x="890" y="360">直到二阶段结束才释放</text>

  <rect class="wal" x="835" y="430" width="250" height="105"/>
  <text class="text label" x="885" y="470">WAL / pg_twophase</text>
  <text class="small" x="870" y="500">保存可恢复的 prepare 状态</text>
  <text class="small" x="870" y="524">checkpoint 后可能落到文件</text>

  <path class="arrow" d="M345 365 H465"/>
  <path class="arrow" d="M630 315 V385"/>
  <path class="arrow" d="M790 450 H855"/>
  <path class="arrow" d="M790 457 C835 440 858 390 885 360"/>
  <path class="arrow" d="M790 432 C850 390 875 215 908 180"/>
  <text class="small" x="392" y="350">数组指向</text>
  <text class="small" x="650" y="360">pgprocno</text>
  <text class="small" x="812" y="414">状态可恢复</text>
</svg>
