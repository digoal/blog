<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">PREPARE TRANSACTION 内核路径</title>
  <desc id="desc">PrepareTransaction 先完成用户代码相关预处理和限制检查，再收集 2PC 状态，写 XLOG_XACT_PREPARE 并刷 WAL，最后把锁和事务可见状态转给 prepared transaction。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .check { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .wal { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .risk { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 8; }
    .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 20px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="660"/>
  <text class="text label" x="40" y="45">PREPARE TRANSACTION：把当前事务变成“可恢复、可由任意会话结束”的 prepared transaction</text>

  <rect class="step" x="45" y="90" width="190" height="90"/>
  <text class="text" x="78" y="125">事务运行中</text>
  <text class="mono" x="70" y="154">BEGIN ... DML</text>

  <rect class="check" x="285" y="78" width="260" height="115"/>
  <text class="text" x="317" y="115">预处理与限制检查</text>
  <text class="small" x="312" y="145">触发器、holdable cursor、ON COMMIT</text>
  <text class="small" x="312" y="170">拒绝临时对象、导出快照等场景</text>

  <rect class="step" x="595" y="78" width="250" height="115"/>
  <text class="text" x="628" y="115">MarkAsPreparing</text>
  <text class="small" x="625" y="145">检查 GID 重复和长度</text>
  <text class="small" x="625" y="170">分配 GlobalTransactionData</text>

  <rect class="step" x="895" y="78" width="250" height="115"/>
  <text class="text" x="930" y="115">StartPrepare</text>
  <text class="small" x="925" y="145">写入 2PC header</text>
  <text class="small" x="925" y="170">收集子事务、待删文件、失效消息</text>

  <rect class="step" x="80" y="280" width="260" height="130"/>
  <text class="text" x="115" y="315">AtPrepare 回调</text>
  <text class="small" x="112" y="345">Lock / PredicateLock</text>
  <text class="small" x="112" y="370">PgStat / MultiXact / RelationMap</text>
  <text class="small" x="112" y="395">通过 RegisterTwoPhaseRecord 记录资源</text>

  <rect class="wal" x="410" y="280" width="260" height="130"/>
  <text class="text" x="455" y="315">EndPrepare</text>
  <text class="mono" x="438" y="345">XLOG_XACT_PREPARE</text>
  <text class="small" x="438" y="370">XLogInsert + XLogFlush</text>
  <text class="small" x="438" y="395">保存 prepare_start/end_lsn</text>

  <rect class="ok" x="740" y="280" width="260" height="130"/>
  <text class="text" x="785" y="315">MarkAsPrepared</text>
  <text class="small" x="772" y="345">valid = true</text>
  <text class="small" x="772" y="370">dummy PGPROC 加入 ProcArray</text>
  <text class="small" x="772" y="395">XID 仍被视为运行中</text>

  <rect class="ok" x="250" y="500" width="310" height="110"/>
  <text class="text" x="290" y="535">PostPrepare 清理</text>
  <text class="small" x="285" y="565">锁迁移到 dummy PGPROC</text>
  <text class="small" x="285" y="590">原 backend 清除事务和本地资源</text>

  <rect class="risk" x="670" y="500" width="310" height="110"/>
  <text class="text" x="715" y="535">prepared 状态</text>
  <text class="small" x="705" y="565">只允许 COMMIT PREPARED</text>
  <text class="small" x="705" y="590">或 ROLLBACK PREPARED</text>

  <path class="arrow" d="M235 135 H280"/>
  <path class="arrow" d="M545 135 H590"/>
  <path class="arrow" d="M845 135 H890"/>
  <path class="arrow" d="M1020 193 C1020 245 210 230 210 275"/>
  <path class="arrow" d="M340 345 H405"/>
  <path class="arrow" d="M670 345 H735"/>
  <path class="arrow" d="M870 410 C850 460 500 455 430 495"/>
  <path class="arrow" d="M560 555 H665"/>
</svg>
