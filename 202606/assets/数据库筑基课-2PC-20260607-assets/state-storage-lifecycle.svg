<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">2PC 状态在 WAL 与 pg_twophase 之间的生命周期</title>
  <desc id="desc">短生命周期的 prepared transaction 通常只需要共享内存和 WAL；跨越 checkpoint 后，checkpoint 会把 prepare 记录复制为 pg_twophase 文件并 fsync。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .wal { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .disk { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .mem { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .finish { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #0f172a; font-size: 18px; }
    .small { font-size: 14px; fill: #334155; }
    .label { font-size: 20px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .dash { stroke-dasharray: 8 6; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="text label" x="42" y="45">短事务走 WAL，长 prepared transaction 跨 checkpoint 后落 pg_twophase</text>

  <rect class="mem" x="60" y="95" width="250" height="105"/>
  <text class="text" x="92" y="132">TwoPhaseState</text>
  <text class="small" x="90" y="160">保存 GID、FXID、LSN</text>
  <text class="small" x="90" y="184">valid / ondisk 状态</text>

  <rect class="wal" x="410" y="95" width="310" height="105"/>
  <text class="text" x="448" y="132">WAL prepare record</text>
  <text class="mono" x="448" y="160">XLOG_XACT_PREPARE</text>
  <text class="small" x="448" y="184">WAL CRC 保护，prepare 时刷盘</text>

  <rect class="finish" x="830" y="95" width="300" height="105"/>
  <text class="text" x="872" y="132">短生命周期结束</text>
  <text class="small" x="865" y="160">COMMIT / ROLLBACK PREPARED</text>
  <text class="small" x="865" y="184">从 WAL 读取 2PC 状态</text>

  <rect class="box" x="240" y="300" width="290" height="110"/>
  <text class="text" x="285" y="335">checkpoint</text>
  <text class="small" x="275" y="365">prepare_end_lsn &lt;= redo_horizon</text>
  <text class="small" x="275" y="390">调用 CheckPointTwoPhase</text>

  <rect class="disk" x="640" y="295" width="320" height="120"/>
  <text class="text" x="696" y="332">pg_twophase 文件</text>
  <text class="small" x="680" y="362">RecreateTwoPhaseFile 写文件</text>
  <text class="small" x="680" y="386">追加 CRC-32C，fsync 文件和目录</text>

  <rect class="finish" x="640" y="500" width="320" height="95"/>
  <text class="text" x="688" y="535">长生命周期结束</text>
  <text class="small" x="680" y="565">FinishPreparedTransaction 从文件读取</text>
  <text class="small" x="680" y="588">结束后 RemoveTwoPhaseFile</text>

  <path class="arrow" d="M310 148 H405"/>
  <path class="arrow" d="M720 148 H825"/>
  <path class="arrow dash" d="M565 205 C560 250 455 270 405 295"/>
  <path class="arrow" d="M530 355 H635"/>
  <path class="arrow" d="M800 415 V495"/>
  <path class="arrow dash" d="M800 295 C820 245 905 225 950 205"/>
  <text class="small" x="748" y="235">未跨 checkpoint：不用写文件</text>
  <text class="small" x="835" y="450">跨 checkpoint：从文件结束</text>
</svg>
