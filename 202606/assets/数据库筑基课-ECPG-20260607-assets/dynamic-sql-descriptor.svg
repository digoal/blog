<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">动态 SQL 与 Descriptor 决策路径</title>
  <desc id="desc">展示 ECPG 中固定 SQL、动态无结果 SQL、动态有参数 SQL、游标和 Descriptor 的选择关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#263241"/>
    </marker>
  </defs>
  <style>
    .start { fill: #f7f8fb; stroke: #263241; stroke-width: 2; rx: 8; }
    .q { fill: #fff6e8; stroke: #b36b00; stroke-width: 2; rx: 8; }
    .path { fill: #e8f0ff; stroke: #315f9f; stroke-width: 2; rx: 8; }
    .meta { fill: #edf8ef; stroke: #2a7b4f; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #182230; font-size: 17px; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #334155; font-size: 14px; }
    .arrow { stroke: #263241; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="60" y="65" width="185" height="90" class="start"/>
  <text x="152" y="100" text-anchor="middle" class="text">SQL 来源</text>
  <text x="152" y="126" text-anchor="middle" class="small">编译期固定 / 运行期字符串</text>

  <rect x="330" y="50" width="210" height="80" class="q"/>
  <text x="435" y="83" text-anchor="middle" class="text">编译期已知?</text>
  <text x="435" y="107" text-anchor="middle" class="small">直接 EXEC SQL</text>

  <rect x="330" y="170" width="210" height="80" class="q"/>
  <text x="435" y="203" text-anchor="middle" class="text">运行期拼装?</text>
  <text x="435" y="227" text-anchor="middle" class="small">动态 SQL</text>

  <rect x="625" y="50" width="210" height="80" class="path"/>
  <text x="730" y="83" text-anchor="middle" class="text">固定 EXEC SQL</text>
  <text x="730" y="107" text-anchor="middle" class="small">宿主变量 + INTO</text>

  <rect x="625" y="170" width="210" height="80" class="path"/>
  <text x="730" y="203" text-anchor="middle" class="text">EXECUTE IMMEDIATE</text>
  <text x="730" y="227" text-anchor="middle" class="small">DDL / INSERT / UPDATE / DELETE</text>

  <rect x="625" y="290" width="210" height="80" class="path"/>
  <text x="730" y="323" text-anchor="middle" class="text">PREPARE + EXECUTE</text>
  <text x="730" y="347" text-anchor="middle" class="small">参数、单行结果</text>

  <rect x="625" y="410" width="210" height="80" class="path"/>
  <text x="730" y="443" text-anchor="middle" class="text">PREPARE + CURSOR</text>
  <text x="730" y="467" text-anchor="middle" class="small">多行结果集</text>

  <rect x="900" y="170" width="185" height="80" class="meta"/>
  <text x="992" y="203" text-anchor="middle" class="text">SQL Descriptor</text>
  <text x="992" y="227" text-anchor="middle" class="small">列数、列名、类型、DATA</text>

  <rect x="900" y="330" width="185" height="80" class="meta"/>
  <text x="992" y="363" text-anchor="middle" class="text">SQLDA</text>
  <text x="992" y="387" text-anchor="middle" class="small">C 结构描述区域</text>

  <path d="M245 110 H330" class="arrow"/>
  <path d="M540 90 H625" class="arrow"/>
  <path d="M435 130 V170" class="arrow"/>
  <path d="M540 210 H625" class="arrow"/>
  <path d="M540 235 C575 270 585 330 625 330" class="arrow"/>
  <path d="M540 245 C580 330 585 450 625 450" class="arrow"/>
  <path d="M835 330 C870 315 875 230 900 210" class="arrow"/>
  <path d="M835 450 C880 450 875 370 900 370" class="arrow"/>
  <path d="M835 90 C890 90 890 180 900 190" class="arrow"/>
</svg>
