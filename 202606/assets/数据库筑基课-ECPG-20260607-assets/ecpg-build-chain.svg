<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">ECPG 编译与运行链路</title>
  <desc id="desc">展示 .pgc 源码经过 ecpg 预处理、C 编译和链接后，运行时通过 libecpg 与 libpq 访问 PostgreSQL 后端。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2f3a4a"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f7f8fb; stroke: #2f3a4a; stroke-width: 2; rx: 8; }
    .stage { fill: #e8f0ff; stroke: #335c9c; stroke-width: 2; rx: 8; }
    .runtime { fill: #eef8f2; stroke: #2c7a4b; stroke-width: 2; rx: 8; }
    .warn { fill: #fff5e6; stroke: #b36b00; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #182230; font-size: 18px; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #334155; font-size: 15px; }
    .arrow { stroke: #2f3a4a; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="35" y="70" width="180" height="120" class="box"/>
  <text x="125" y="115" text-anchor="middle" class="text">应用源码</text>
  <text x="125" y="145" text-anchor="middle" class="small">.pgc</text>
  <text x="125" y="170" text-anchor="middle" class="small">C + EXEC SQL</text>

  <rect x="270" y="70" width="190" height="120" class="stage"/>
  <text x="365" y="112" text-anchor="middle" class="text">ecpg 预处理器</text>
  <text x="365" y="142" text-anchor="middle" class="small">解析 EXEC SQL</text>
  <text x="365" y="168" text-anchor="middle" class="small">生成 ECPG* 调用</text>

  <rect x="515" y="70" width="170" height="120" class="box"/>
  <text x="600" y="112" text-anchor="middle" class="text">普通 C 源码</text>
  <text x="600" y="142" text-anchor="middle" class="small">.c</text>
  <text x="600" y="168" text-anchor="middle" class="small">include ecpglib</text>

  <rect x="740" y="70" width="175" height="120" class="box"/>
  <text x="827" y="112" text-anchor="middle" class="text">C 编译器</text>
  <text x="827" y="142" text-anchor="middle" class="small">cc / make / meson</text>
  <text x="827" y="168" text-anchor="middle" class="small">生成目标文件</text>

  <rect x="955" y="70" width="90" height="120" class="warn"/>
  <text x="1000" y="115" text-anchor="middle" class="text">链接</text>
  <text x="1000" y="145" text-anchor="middle" class="small">-lecpg</text>
  <text x="1000" y="170" text-anchor="middle" class="small">-lpgtypes</text>

  <path d="M215 130 H270" class="arrow"/>
  <path d="M460 130 H515" class="arrow"/>
  <path d="M685 130 H740" class="arrow"/>
  <path d="M915 130 H955" class="arrow"/>

  <rect x="90" y="305" width="190" height="110" class="runtime"/>
  <text x="185" y="346" text-anchor="middle" class="text">可执行程序</text>
  <text x="185" y="376" text-anchor="middle" class="small">调用 ECPGconnect</text>
  <text x="185" y="400" text-anchor="middle" class="small">ECPGdo / ECPGtrans</text>

  <rect x="365" y="305" width="190" height="110" class="runtime"/>
  <text x="460" y="346" text-anchor="middle" class="text">libecpg</text>
  <text x="460" y="376" text-anchor="middle" class="small">连接、参数、结果</text>
  <text x="460" y="400" text-anchor="middle" class="small">sqlca / descriptor</text>

  <rect x="640" y="305" width="170" height="110" class="runtime"/>
  <text x="725" y="346" text-anchor="middle" class="text">libpq</text>
  <text x="725" y="376" text-anchor="middle" class="small">前后端协议</text>
  <text x="725" y="400" text-anchor="middle" class="small">PQexecParams 等</text>

  <rect x="895" y="305" width="170" height="110" class="runtime"/>
  <text x="980" y="346" text-anchor="middle" class="text">PostgreSQL</text>
  <text x="980" y="376" text-anchor="middle" class="small">解析 / 规划 / 执行</text>
  <text x="980" y="400" text-anchor="middle" class="small">返回 PGresult</text>

  <path d="M1045 190 C1045 245 185 235 185 305" class="arrow"/>
  <path d="M280 360 H365" class="arrow"/>
  <path d="M555 360 H640" class="arrow"/>
  <path d="M810 360 H895" class="arrow"/>
</svg>
