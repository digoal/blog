<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">宿主变量绑定与结果回填</title>
  <desc id="desc">展示 ECPG 如何把冒号宿主变量转成参数占位，把输入变量、indicator、输出变量编码进 ECPGdo 调用。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#263241"/>
    </marker>
  </defs>
  <style>
    .panel { fill: #ffffff; stroke: #263241; stroke-width: 2; rx: 8; }
    .code { fill: #f3f6fa; stroke: #64748b; stroke-width: 1.5; rx: 6; }
    .in { fill: #e8f0ff; stroke: #315f9f; stroke-width: 2; rx: 6; }
    .out { fill: #edf8ef; stroke: #2a7b4f; stroke-width: 2; rx: 6; }
    .ind { fill: #fff6e8; stroke: #b36b00; stroke-width: 2; rx: 6; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #182230; font-size: 18px; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #334155; font-size: 15px; }
    .mono { font-family: Menlo, Consolas, monospace; fill: #182230; font-size: 15px; }
    .arrow { stroke: #263241; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="35" y="45" width="465" height="215" class="panel"/>
  <text x="58" y="80" class="text">.pgc 中的写法</text>
  <rect x="60" y="105" width="415" height="130" class="code"/>
  <text x="78" y="137" class="mono">EXEC SQL BEGIN DECLARE SECTION;</text>
  <text x="78" y="162" class="mono">int id;</text>
  <text x="78" y="187" class="mono">char name[64]; int name_ind;</text>
  <text x="78" y="212" class="mono">EXEC SQL END DECLARE SECTION;</text>
  <text x="78" y="237" class="mono">EXEC SQL SELECT name INTO :name:name_ind WHERE id = :id;</text>

  <rect x="565" y="45" width="500" height="215" class="panel"/>
  <text x="588" y="80" class="text">预处理后传给 ECPGdo 的信息</text>
  <rect x="590" y="105" width="450" height="130" class="code"/>
  <text x="608" y="137" class="mono">"SELECT name WHERE id = ?"</text>
  <text x="608" y="162" class="mono">ECPGt_int, &amp;id, ...</text>
  <text x="608" y="187" class="mono">ECPGt_EOIT</text>
  <text x="608" y="212" class="mono">ECPGt_char, name, ...</text>
  <text x="608" y="237" class="mono">ECPGt_int, &amp;name_ind, ... ECPGt_EORT</text>

  <path d="M500 152 H565" class="arrow"/>

  <rect x="90" y="335" width="205" height="110" class="in"/>
  <text x="192" y="375" text-anchor="middle" class="text">输入变量</text>
  <text x="192" y="405" text-anchor="middle" class="small">:id</text>
  <text x="192" y="429" text-anchor="middle" class="small">类型、地址、数组大小</text>

  <rect x="370" y="335" width="205" height="110" class="ind"/>
  <text x="472" y="375" text-anchor="middle" class="text">Indicator</text>
  <text x="472" y="405" text-anchor="middle" class="small">NULL: 负数</text>
  <text x="472" y="429" text-anchor="middle" class="small">截断: 正数</text>

  <rect x="650" y="335" width="205" height="110" class="out"/>
  <text x="752" y="375" text-anchor="middle" class="text">输出变量</text>
  <text x="752" y="405" text-anchor="middle" class="small">:name</text>
  <text x="752" y="429" text-anchor="middle" class="small">结果转 C 类型</text>

  <rect x="900" y="335" width="85" height="110" class="panel"/>
  <text x="942" y="375" text-anchor="middle" class="text">sqlca</text>
  <text x="942" y="405" text-anchor="middle" class="small">行数</text>
  <text x="942" y="429" text-anchor="middle" class="small">错误码</text>

  <path d="M690 235 C620 285 220 285 192 335" class="arrow"/>
  <path d="M802 235 C790 290 505 295 472 335" class="arrow"/>
  <path d="M900 235 C878 292 785 298 752 335" class="arrow"/>
  <path d="M1000 235 C990 285 955 305 942 335" class="arrow"/>
</svg>
