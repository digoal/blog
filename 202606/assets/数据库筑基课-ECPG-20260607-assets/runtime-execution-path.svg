<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">libecpg 运行时执行路径</title>
  <desc id="desc">展示 ECPGconnect、ECPGdo、参数构造、PQexec/PQexecParams/PQexecPrepared 选择、结果处理和事务自动启动。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#263241"/>
    </marker>
  </defs>
  <style>
    .step { fill: #f7f8fb; stroke: #263241; stroke-width: 2; rx: 8; }
    .choice { fill: #fff6e8; stroke: #b36b00; stroke-width: 2; rx: 8; }
    .libpq { fill: #e8f0ff; stroke: #315f9f; stroke-width: 2; rx: 8; }
    .result { fill: #edf8ef; stroke: #2a7b4f; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #182230; font-size: 17px; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #334155; font-size: 14px; }
    .arrow { stroke: #263241; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="45" y="60" width="175" height="100" class="step"/>
  <text x="132" y="100" text-anchor="middle" class="text">ECPGconnect</text>
  <text x="132" y="128" text-anchor="middle" class="small">解析目标、用户、选项</text>

  <rect x="300" y="60" width="180" height="100" class="libpq"/>
  <text x="390" y="100" text-anchor="middle" class="text">PQconnectdbParams</text>
  <text x="390" y="128" text-anchor="middle" class="small">建立 libpq 连接</text>

  <rect x="45" y="250" width="175" height="100" class="step"/>
  <text x="132" y="290" text-anchor="middle" class="text">ECPGdo</text>
  <text x="132" y="318" text-anchor="middle" class="small">SQL 字符串 + 变量表</text>

  <rect x="300" y="250" width="180" height="100" class="step"/>
  <text x="390" y="290" text-anchor="middle" class="text">ecpg_build_params</text>
  <text x="390" y="318" text-anchor="middle" class="small">构造参数数组</text>

  <rect x="565" y="220" width="180" height="80" class="choice"/>
  <text x="655" y="252" text-anchor="middle" class="text">有 prepared 名称?</text>
  <text x="655" y="276" text-anchor="middle" class="small">EXECUTE prepared</text>

  <rect x="565" y="350" width="180" height="80" class="choice"/>
  <text x="655" y="382" text-anchor="middle" class="text">有参数?</text>
  <text x="655" y="406" text-anchor="middle" class="small">nparams &gt; 0</text>

  <rect x="830" y="170" width="185" height="80" class="libpq"/>
  <text x="922" y="202" text-anchor="middle" class="text">PQexecPrepared</text>
  <text x="922" y="226" text-anchor="middle" class="small">执行已 prepare 语句</text>

  <rect x="830" y="300" width="185" height="80" class="libpq"/>
  <text x="922" y="332" text-anchor="middle" class="text">PQexecParams</text>
  <text x="922" y="356" text-anchor="middle" class="small">参数化普通语句</text>

  <rect x="830" y="430" width="185" height="80" class="libpq"/>
  <text x="922" y="462" text-anchor="middle" class="text">PQexec</text>
  <text x="922" y="486" text-anchor="middle" class="small">无参数 SQL</text>

  <rect x="300" y="455" width="180" height="80" class="choice"/>
  <text x="390" y="487" text-anchor="middle" class="text">非 autocommit?</text>
  <text x="390" y="511" text-anchor="middle" class="small">空闲时 begin</text>

  <rect x="565" y="500" width="180" height="70" class="result"/>
  <text x="655" y="528" text-anchor="middle" class="text">ecpg_process_output</text>
  <text x="655" y="552" text-anchor="middle" class="small">PGresult 转宿主变量</text>

  <path d="M220 110 H300" class="arrow"/>
  <path d="M132 160 V250" class="arrow"/>
  <path d="M220 300 H300" class="arrow"/>
  <path d="M480 300 C520 300 525 260 565 260" class="arrow"/>
  <path d="M480 320 C525 330 525 390 565 390" class="arrow"/>
  <path d="M745 260 C785 250 790 210 830 210" class="arrow"/>
  <path d="M745 390 C790 390 790 340 830 340" class="arrow"/>
  <path d="M655 430 C655 470 790 470 830 470" class="arrow"/>
  <path d="M390 350 V455" class="arrow"/>
  <path d="M1015 210 C1065 210 1065 535 745 535" class="arrow"/>
  <path d="M1015 340 C1065 340 1050 535 745 535" class="arrow"/>
  <path d="M1015 470 C1065 470 1030 535 745 535" class="arrow"/>
</svg>
