<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">事务、sqlca 与 WHENEVER 边界</title>
  <desc id="desc">展示 ECPG 默认非 autocommit、显式事务、sqlca、SQLSTATE 和 WHENEVER 预处理指令的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#263241"/>
    </marker>
  </defs>
  <style>
    .tx { fill: #e8f0ff; stroke: #315f9f; stroke-width: 2; rx: 8; }
    .err { fill: #fff6e8; stroke: #b36b00; stroke-width: 2; rx: 8; }
    .ok { fill: #edf8ef; stroke: #2a7b4f; stroke-width: 2; rx: 8; }
    .bad { fill: #fff0f0; stroke: #b42318; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #182230; font-size: 17px; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #334155; font-size: 14px; }
    .arrow { stroke: #263241; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect x="55" y="75" width="190" height="90" class="tx"/>
  <text x="150" y="110" text-anchor="middle" class="text">默认模式</text>
  <text x="150" y="136" text-anchor="middle" class="small">非 autocommit</text>

  <rect x="335" y="75" width="210" height="90" class="tx"/>
  <text x="440" y="110" text-anchor="middle" class="text">第一条 SQL</text>
  <text x="440" y="136" text-anchor="middle" class="small">空闲连接自动 BEGIN</text>

  <rect x="635" y="75" width="190" height="90" class="ok"/>
  <text x="730" y="110" text-anchor="middle" class="text">COMMIT / ROLLBACK</text>
  <text x="730" y="136" text-anchor="middle" class="small">显式结束事务</text>

  <rect x="920" y="75" width="140" height="90" class="tx"/>
  <text x="990" y="110" text-anchor="middle" class="text">-t 或 SET</text>
  <text x="990" y="136" text-anchor="middle" class="small">autocommit on</text>

  <path d="M245 120 H335" class="arrow"/>
  <path d="M545 120 H635" class="arrow"/>
  <path d="M825 120 H920" class="arrow"/>

  <rect x="95" y="300" width="210" height="110" class="err"/>
  <text x="200" y="338" text-anchor="middle" class="text">sqlca</text>
  <text x="200" y="366" text-anchor="middle" class="small">sqlcode / sqlstate</text>
  <text x="200" y="390" text-anchor="middle" class="small">sqlerrd[2] 行数</text>

  <rect x="395" y="300" width="235" height="110" class="err"/>
  <text x="512" y="338" text-anchor="middle" class="text">WHENEVER</text>
  <text x="512" y="366" text-anchor="middle" class="small">预处理指令</text>
  <text x="512" y="390" text-anchor="middle" class="small">按源码位置生效</text>

  <rect x="720" y="300" width="240" height="110" class="bad"/>
  <text x="840" y="338" text-anchor="middle" class="text">常见误解</text>
  <text x="840" y="366" text-anchor="middle" class="small">不是运行时 if 作用域</text>
  <text x="840" y="390" text-anchor="middle" class="small">不要依赖 C 控制流设置</text>

  <path d="M440 165 C430 230 250 250 200 300" class="arrow"/>
  <path d="M730 165 C700 230 560 250 512 300" class="arrow"/>
  <path d="M630 355 H720" class="arrow"/>
</svg>
