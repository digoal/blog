<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">FDW 元数据链路</title>
  <desc id="desc">展示 PostgreSQL FDW 从扩展、外部服务器、用户映射到外部表的 catalog 关系，以及查询时如何找到 handler。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .catalog { fill: #ecfeff; stroke: #0e7490; }
    .object { fill: #fef3c7; stroke: #b45309; }
    .runtime { fill: #eef2ff; stroke: #4f46e5; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-size: 16px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .label { font-size: 15px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="box object" x="42" y="52" width="210" height="96"/>
  <text class="text" x="72" y="90">CREATE EXTENSION</text>
  <text class="small" x="72" y="120">安装 postgres_fdw / file_fdw</text>

  <rect class="box catalog" x="332" y="38" width="250" height="124"/>
  <text class="text" x="362" y="78">pg_foreign_data_wrapper</text>
  <text class="small" x="362" y="108">fdwname</text>
  <text class="small" x="362" y="132">fdwhandler / fdwvalidator</text>

  <rect class="box catalog" x="660" y="38" width="210" height="124"/>
  <text class="text" x="692" y="78">pg_foreign_server</text>
  <text class="small" x="692" y="108">srvfdw</text>
  <text class="small" x="692" y="132">host/dbname/options</text>

  <rect class="box catalog" x="660" y="218" width="210" height="124"/>
  <text class="text" x="696" y="258">pg_user_mapping</text>
  <text class="small" x="696" y="288">umuser</text>
  <text class="small" x="696" y="312">umserver + 认证选项</text>

  <rect class="box catalog" x="332" y="218" width="250" height="124"/>
  <text class="text" x="368" y="258">pg_foreign_table</text>
  <text class="small" x="368" y="288">ftrelid -&gt; pg_class</text>
  <text class="small" x="368" y="312">ftserver + 表级 options</text>

  <rect class="box runtime" x="42" y="360" width="300" height="104"/>
  <text class="text" x="72" y="400">查询 foreign table</text>
  <text class="small" x="72" y="430">relcache / syscache 查找 FDW routine</text>

  <rect class="box runtime" x="440" y="360" width="250" height="104"/>
  <text class="text" x="484" y="400">GetFdwRoutine()</text>
  <text class="small" x="484" y="430">调用 handler 返回 FdwRoutine</text>

  <rect class="box runtime" x="790" y="360" width="250" height="104"/>
  <text class="text" x="832" y="400">FdwRoutine 回调表</text>
  <text class="small" x="832" y="430">planner / executor / DDL 调用</text>

  <path class="arrow" d="M252 100 H322"/>
  <text class="label" x="268" y="88">注册 FDW</text>
  <path class="arrow" d="M582 100 H650"/>
  <text class="label" x="598" y="88">CREATE SERVER</text>
  <path class="arrow" d="M765 162 V208"/>
  <text class="label" x="782" y="190">CREATE USER MAPPING</text>
  <path class="arrow" d="M660 280 H592"/>
  <text class="label" x="600" y="268">CREATE FOREIGN TABLE</text>
  <path class="arrow" d="M457 342 V352"/>
  <path class="arrow" d="M342 412 H430"/>
  <path class="arrow" d="M690 412 H780"/>

  <path class="arrow" d="M192 360 C210 250 292 280 322 280"/>
  <text class="label" x="144" y="304">ftrelid 找 server</text>
  <path class="arrow" d="M582 280 C640 280 640 128 650 106"/>
  <text class="label" x="596" y="206">server 找 FDW</text>
</svg>
