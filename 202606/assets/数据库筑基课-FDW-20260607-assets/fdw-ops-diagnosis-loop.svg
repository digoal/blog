<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">FDW 观测与诊断闭环</title>
  <desc id="desc">展示 DBA 诊断 FDW 性能与正确性问题时，从计划、等待、连接、统计信息和远端 SQL 入手的闭环。</desc>
  <style>
    .node { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .start { fill: #eff6ff; stroke: #1d4ed8; }
    .check { fill: #fefce8; stroke: #a16207; }
    .action { fill: #ecfdf5; stroke: #047857; }
    .risk { fill: #fff1f2; stroke: #be123c; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="node start" x="78" y="80" width="280" height="90"/>
  <text class="text" x="112" y="118">问题入口</text>
  <text class="small" x="112" y="146">慢查询 / 连接膨胀 / 结果异常</text>

  <rect class="node check" x="450" y="54" width="300" height="108"/>
  <text class="text" x="486" y="92">看计划</text>
  <text class="small" x="486" y="122">EXPLAIN VERBOSE</text>
  <text class="small" x="486" y="146">Remote SQL 是否按预期下推</text>

  <rect class="node check" x="830" y="80" width="280" height="90"/>
  <text class="text" x="864" y="118">看等待</text>
  <text class="small" x="864" y="146">pg_stat_activity wait_event</text>

  <rect class="node action" x="830" y="244" width="280" height="110"/>
  <text class="text" x="864" y="282">看连接</text>
  <text class="small" x="864" y="312">postgres_fdw_get_connections()</text>
  <text class="small" x="864" y="336">按 user mapping 估算远端压力</text>

  <rect class="node action" x="450" y="430" width="300" height="110"/>
  <text class="text" x="486" y="468">修统计和代价</text>
  <text class="small" x="486" y="498">ANALYZE foreign table</text>
  <text class="small" x="486" y="522">use_remote_estimate / fdw_tuple_cost</text>

  <rect class="node risk" x="78" y="404" width="280" height="120"/>
  <text class="text" x="112" y="442">查语义边界</text>
  <text class="small" x="112" y="472">类型/排序规则/函数版本</text>
  <text class="small" x="112" y="496">权限/密码/远端事务隔离</text>

  <rect class="node action" x="450" y="244" width="300" height="110"/>
  <text class="text" x="486" y="282">调下推策略</text>
  <text class="small" x="486" y="312">extensions / fetch_size / async_capable</text>
  <text class="small" x="486" y="336">避免不安全函数或 collation</text>

  <path class="arrow" d="M358 125 H440"/>
  <path class="arrow" d="M750 108 H820"/>
  <path class="arrow" d="M970 170 V234"/>
  <path class="arrow" d="M830 300 H760"/>
  <path class="arrow" d="M600 354 V420"/>
  <path class="arrow" d="M450 485 H368"/>
  <path class="arrow" d="M218 404 V180"/>
  <path class="arrow" d="M600 162 V234"/>
  <path class="arrow" d="M450 300 H358"/>

  <text class="small" x="410" y="586">诊断顺序建议：先确认远端 SQL 和下推边界，再看连接/等待，最后调整统计、成本、批量和远端 schema 设计。</text>
</svg>
