<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">FDW 优化器与执行器回调链路</title>
  <desc id="desc">展示 PostgreSQL 查询 foreign table 时，优化器和执行器分别调用 FDW 回调函数的顺序。</desc>
  <style>
    .phase { fill: #f1f5f9; stroke: #334155; stroke-width: 2; rx: 10; }
    .cb { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .core { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .state { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .title { font-size: 23px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="phase" x="42" y="42" width="510" height="500"/>
  <text class="text title" x="70" y="82">优化器阶段</text>

  <rect class="core" x="92" y="116" width="370" height="64"/>
  <text class="text" x="126" y="154">RelOptInfo 识别为 foreign table</text>

  <rect class="cb" x="92" y="214" width="370" height="70"/>
  <text class="text" x="126" y="244">GetForeignRelSize</text>
  <text class="small" x="126" y="268">估算 rows / width / tuples，保存 fdw_private</text>

  <rect class="cb" x="92" y="318" width="370" height="70"/>
  <text class="text" x="126" y="348">GetForeignPaths</text>
  <text class="small" x="126" y="372">生成 ForeignPath，成本和 pathkeys 进入路径竞争</text>

  <rect class="cb" x="92" y="422" width="370" height="70"/>
  <text class="text" x="126" y="452">GetForeignPlan</text>
  <text class="small" x="126" y="476">生成 ForeignScan，携带远端 SQL 与本地 qual</text>

  <rect class="phase" x="628" y="42" width="510" height="500"/>
  <text class="text title" x="656" y="82">执行器阶段</text>

  <rect class="core" x="682" y="116" width="370" height="64"/>
  <text class="text" x="716" y="154">ExecInitForeignScan</text>

  <rect class="cb" x="682" y="214" width="370" height="70"/>
  <text class="text" x="716" y="244">BeginForeignScan</text>
  <text class="small" x="716" y="268">建立连接/打开文件/准备游标，写 fdw_state</text>

  <rect class="cb" x="682" y="318" width="370" height="70"/>
  <text class="text" x="716" y="348">IterateForeignScan</text>
  <text class="small" x="716" y="372">每次返回一个 TupleTableSlot，空 slot 表示结束</text>

  <rect class="cb" x="682" y="422" width="370" height="70"/>
  <text class="text" x="716" y="452">ReScan / EndForeignScan</text>
  <text class="small" x="716" y="476">参数变化重扫，结束时释放外部资源</text>

  <rect class="state" x="388" y="556" width="405" height="48"/>
  <text class="small" x="416" y="586">可选扩展：JOIN/AGG/SORT/LIMIT 下推、写入、ANALYZE、IMPORT、异步与并行扫描</text>

  <path class="arrow" d="M277 180 V204"/>
  <path class="arrow" d="M277 284 V308"/>
  <path class="arrow" d="M277 388 V412"/>
  <path class="arrow" d="M462 457 C560 457 590 154 672 154"/>
  <path class="arrow" d="M867 180 V204"/>
  <path class="arrow" d="M867 284 V308"/>
  <path class="arrow" d="M867 388 V412"/>
  <path class="arrow dash" d="M277 492 C322 560 368 580 388 580"/>
  <path class="arrow dash" d="M867 492 C846 548 822 574 793 580"/>
</svg>
