<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">postgres_fdw 连接与事务生命周期</title>
  <desc id="desc">展示 postgres_fdw 在本地会话中按 user mapping 缓存连接，并让远端事务和保存点跟随本地事务层级。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .local { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .cache { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 8; }
    .remote { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="local" x="48" y="58" width="270" height="92"/>
  <text class="text" x="78" y="96">本地会话</text>
  <text class="small" x="78" y="124">BEGIN / SELECT foreign table</text>

  <rect class="cache" x="430" y="44" width="320" height="120"/>
  <text class="text" x="466" y="82">ConnectionHash</text>
  <text class="small" x="466" y="112">key = user mapping OID</text>
  <text class="small" x="466" y="138">默认 keep_connections = on</text>

  <rect class="remote" x="858" y="58" width="270" height="92"/>
  <text class="text" x="888" y="96">远端 PostgreSQL</text>
  <text class="small" x="888" y="124">PGconn + 远端 backend</text>

  <rect class="local" x="48" y="220" width="270" height="92"/>
  <text class="text" x="78" y="258">本地事务层级</text>
  <text class="small" x="78" y="286">事务 / 子事务 / 回滚路径</text>

  <rect class="remote" x="858" y="220" width="270" height="92"/>
  <text class="text" x="888" y="258">远端事务层级</text>
  <text class="small" x="888" y="286">BEGIN / SAVEPOINT / COMMIT/ABORT</text>

  <rect class="warn" x="430" y="224" width="320" height="116"/>
  <text class="text" x="466" y="260">隔离级别转换</text>
  <text class="small" x="466" y="290">本地 SERIALIZABLE -&gt; 远端 SERIALIZABLE</text>
  <text class="small" x="466" y="314">其他本地级别 -&gt; 远端 REPEATABLE READ</text>

  <rect class="warn" x="48" y="398" width="500" height="110"/>
  <text class="text" x="82" y="436">边界</text>
  <text class="small" x="82" y="466">一个本地事务内的多次远端扫描保持快照一致</text>
  <text class="small" x="82" y="490">READ COMMITTED 本地事务也可能看不到远端并发新提交</text>

  <rect class="warn" x="630" y="398" width="500" height="110"/>
  <text class="text" x="664" y="436">运维动作</text>
  <text class="small" x="664" y="466">postgres_fdw_get_connections()</text>
  <text class="small" x="664" y="490">postgres_fdw_disconnect() / disconnect_all()</text>

  <rect class="box" x="240" y="558" width="700" height="54"/>
  <text class="small" x="278" y="592">postgres_fdw 不是连接池：它在每个本地 backend 内缓存连接，远端连接数会随本地会话和 user mapping 放大。</text>

  <path class="arrow" d="M318 104 H420"/>
  <path class="arrow" d="M750 104 H848"/>
  <path class="arrow dash" d="M590 164 V214"/>
  <path class="arrow" d="M318 266 H420"/>
  <path class="arrow" d="M750 282 H848"/>
  <path class="arrow dash" d="M183 312 V388"/>
  <path class="arrow dash" d="M993 312 V388"/>
</svg>
