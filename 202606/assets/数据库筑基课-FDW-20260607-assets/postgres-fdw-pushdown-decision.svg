<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">postgres_fdw 下推决策路径</title>
  <desc id="desc">展示 postgres_fdw 如何把条件、列、连接和上层计算划分为远端执行或本地执行。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .decision { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 8; }
    .remote { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .local { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 8; }
    .sql { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    .red { stroke: #be123c; }
    .green { stroke: #047857; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="box" x="50" y="56" width="260" height="86"/>
  <text class="text" x="82" y="92">本地 SQL 查询</text>
  <text class="small" x="82" y="120">WHERE / JOIN / ORDER / AGG / LIMIT</text>

  <rect class="decision" x="402" y="44" width="330" height="112"/>
  <text class="text" x="438" y="82">is_foreign_expr()</text>
  <text class="small" x="438" y="112">节点可 deparse、对象 shippable、</text>
  <text class="small" x="438" y="136">collation 安全、无 mutable function</text>

  <rect class="remote" x="842" y="46" width="270" height="112"/>
  <text class="text" x="876" y="86">remote_conds</text>
  <text class="small" x="876" y="116">发送到远端 WHERE/JOIN</text>
  <text class="small" x="876" y="140">减少传输行数</text>

  <rect class="local" x="842" y="204" width="270" height="112"/>
  <text class="text" x="876" y="244">local_conds</text>
  <text class="small" x="876" y="274">远端取回后本地过滤</text>
  <text class="small" x="876" y="298">语义更安全，但传输更多</text>

  <rect class="decision" x="402" y="216" width="330" height="112"/>
  <text class="text" x="438" y="254">列裁剪</text>
  <text class="small" x="438" y="284">目标列 + 本地 qual 用到的列</text>
  <text class="small" x="438" y="308">组成 retrieved_attrs</text>

  <rect class="decision" x="402" y="388" width="330" height="112"/>
  <text class="text" x="438" y="426">关系级下推</text>
  <text class="small" x="438" y="456">同一 server + user mapping</text>
  <text class="small" x="438" y="480">JOIN / GROUP / SORT / LIMIT 才有机会下推</text>

  <rect class="sql" x="842" y="392" width="270" height="112"/>
  <text class="text" x="876" y="430">deparseSelectStmtForRel</text>
  <text class="small" x="876" y="460">生成远端 SQL</text>
  <text class="small" x="876" y="484">EXPLAIN VERBOSE 可查看</text>

  <rect class="box" x="188" y="548" width="760" height="54"/>
  <text class="small" x="224" y="582">核心原则：postgres_fdw 优先保证远端语义一致，只有确认安全时才把计算推给远端服务器。</text>

  <path class="arrow" d="M310 99 H392"/>
  <path class="arrow green" d="M732 100 H832"/>
  <path class="arrow red" d="M567 156 C594 210 760 252 832 260"/>
  <path class="arrow" d="M310 99 C350 182 372 244 392 272"/>
  <path class="arrow" d="M732 272 C784 284 806 382 832 428"/>
  <path class="arrow" d="M310 99 C340 320 370 414 392 444"/>
  <path class="arrow green" d="M732 444 H832"/>
  <path class="arrow" d="M977 504 C940 546 908 572 872 575"/>
</svg>
