<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Hook 链式注册与转发模型</title>
  <desc id="desc">展示多个扩展如何保存前一个 Hook 指针、安装自己的 Hook，并在回调中转发到前一个实现或标准实现。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .ext { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; rx: 8; }
    .core { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 13px; fill: #334155; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.8; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="560"/>
  <text class="text" x="40" y="44">多个扩展共享同一个 Hook 插槽时，链式转发是基本纪律</text>
  <text class="small" x="40" y="72">源码中的 pg_stat_statements、auto_explain、passwordcheck、auth_delay 都采用保存前值再安装自己的模式。</text>

  <rect class="box" x="70" y="125" width="220" height="92"/>
  <text class="text" x="92" y="158">全局 Hook 变量</text>
  <text class="mono" x="92" y="185">ExecutorStart_hook</text>

  <rect class="ext" x="380" y="88" width="250" height="110"/>
  <text class="text" x="404" y="122">扩展 B 后加载</text>
  <text class="mono" x="404" y="150">prev = Hook</text>
  <text class="mono" x="404" y="174">Hook = B_callback</text>

  <rect class="ext" x="380" y="245" width="250" height="110"/>
  <text class="text" x="404" y="279">扩展 A 先加载</text>
  <text class="mono" x="404" y="307">prev = NULL</text>
  <text class="mono" x="404" y="331">Hook = A_callback</text>

  <rect class="core" x="725" y="245" width="230" height="110"/>
  <text class="text" x="748" y="279">核心标准实现</text>
  <text class="mono" x="748" y="307">standard_ExecutorStart()</text>

  <path class="arrow" d="M290 171 H380"/>
  <path class="arrow" d="M505 198 V245"/>
  <path class="arrow" d="M630 300 H725"/>

  <rect class="box" x="70" y="320" width="220" height="92"/>
  <text class="text" x="92" y="353">运行时调用</text>
  <text class="mono" x="92" y="380">if (Hook) Hook(...)</text>

  <path class="arrow" d="M180 217 V320"/>
  <path class="arrow" d="M290 366 C350 366 338 143 380 143"/>
  <path class="dash" d="M630 143 C680 143 680 300 725 300"/>

  <rect class="risk" x="70" y="465" width="885" height="64"/>
  <text class="text" x="92" y="495">风险边界</text>
  <text class="small" x="184" y="495">不转发会截断其他扩展；重复安装会重复计数；错误路径必须用 PG_TRY/PG_FINALLY 恢复嵌套状态。</text>
</svg>
