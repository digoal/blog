<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="700" viewBox="0 0 1060 700" role="img" aria-labelledby="title desc">
  <title id="title">是否应该使用 Hook 的决策流程</title>
  <desc id="desc">展示在 PostgreSQL 扩展开发中，选择 SQL 函数、事件触发器、FDW、自定义扫描或 Hook 的判断路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .node { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .hook { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; rx: 8; }
    .alt { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1060" height="700"/>
  <text class="text" x="42" y="46">Hook 是最后一公里扩展手段，不是默认选择</text>

  <rect class="node" x="360" y="90" width="310" height="72"/>
  <text class="small" x="392" y="123">需求是否能用 SQL 函数、视图、触发器完成？</text>
  <text class="tiny" x="392" y="145">只读计算、简单校验、局部业务逻辑</text>

  <rect class="alt" x="70" y="210" width="250" height="72"/>
  <text class="small" x="96" y="243">优先普通扩展对象</text>
  <text class="tiny" x="96" y="265">SQL / PL / trigger / view</text>

  <rect class="node" x="390" y="210" width="310" height="72"/>
  <text class="small" x="422" y="243">是否只处理 DDL 事件？</text>
  <text class="tiny" x="422" y="265">审计 CREATE/ALTER/DROP</text>

  <rect class="alt" x="760" y="210" width="220" height="72"/>
  <text class="small" x="790" y="243">考虑事件触发器</text>
  <text class="tiny" x="790" y="265">不需 C Hook 时更稳</text>

  <rect class="node" x="390" y="335" width="310" height="72"/>
  <text class="small" x="422" y="368">是否要新增扫描/路径候选？</text>
  <text class="tiny" x="422" y="390">硬件加速、缓存、特殊扫描</text>

  <rect class="hook" x="760" y="335" width="240" height="72"/>
  <text class="small" x="790" y="368">Custom Scan + path Hook</text>
  <text class="tiny" x="790" y="390">set_rel_pathlist_hook</text>

  <rect class="node" x="390" y="460" width="310" height="72"/>
  <text class="small" x="422" y="493">是否必须进入内核生命周期？</text>
  <text class="tiny" x="422" y="515">认证、执行统计、共享内存、权限</text>

  <rect class="hook" x="760" y="460" width="240" height="72"/>
  <text class="small" x="790" y="493">使用对应 Hook</text>
  <text class="tiny" x="790" y="515">链式转发 + 最小副作用</text>

  <rect class="warn" x="255" y="590" width="550" height="74"/>
  <text class="small" x="286" y="623">上线前检查：加载时机、并发状态、错误路径、链式转发、版本差异、回归测试</text>
  <text class="tiny" x="286" y="647">Hook 越靠近核心流程，越需要把失败模式当成产品功能的一部分设计。</text>

  <path class="arrow" d="M360 126 H195 V210"/>
  <path class="arrow" d="M515 162 V210"/>
  <path class="arrow" d="M700 246 H760"/>
  <path class="arrow" d="M545 282 V335"/>
  <path class="arrow" d="M700 371 H760"/>
  <path class="arrow" d="M545 407 V460"/>
  <path class="arrow" d="M700 496 H760"/>
  <path class="arrow" d="M880 532 C870 570 760 590 690 590"/>
</svg>
