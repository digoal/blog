<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL Hook 在请求处理管线中的位置</title>
  <desc id="desc">展示 SQL 请求从认证、解析、重写、规划、执行到日志输出时，常见 Hook 所处的位置和作用边界。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .stage { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .hook { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="text" x="40" y="44">Hook 不是 SQL 语法扩展，而是后端流程中的函数指针插槽</text>
  <text class="small" x="40" y="72">扩展在 _PG_init() 注册，核心代码在固定时机检查并调用；没有注册时走标准路径。</text>

  <rect class="stage" x="40" y="120" width="155" height="82"/>
  <text class="text" x="72" y="153">认证</text>
  <text class="tiny" x="58" y="180">ClientAuthentication</text>

  <rect class="stage" x="245" y="120" width="155" height="82"/>
  <text class="text" x="278" y="153">解析分析</text>
  <text class="tiny" x="264" y="180">parse_analyze</text>

  <rect class="stage" x="450" y="120" width="155" height="82"/>
  <text class="text" x="492" y="153">重写</text>
  <text class="tiny" x="485" y="180">RLS / rules</text>

  <rect class="stage" x="655" y="120" width="155" height="82"/>
  <text class="text" x="698" y="153">规划</text>
  <text class="tiny" x="690" y="180">Path / Plan</text>

  <rect class="stage" x="860" y="120" width="155" height="82"/>
  <text class="text" x="902" y="153">执行</text>
  <text class="tiny" x="900" y="180">Executor</text>

  <path class="arrow" d="M195 161 H245"/>
  <path class="arrow" d="M400 161 H450"/>
  <path class="arrow" d="M605 161 H655"/>
  <path class="arrow" d="M810 161 H860"/>

  <rect class="hook" x="48" y="260" width="180" height="82"/>
  <text class="text" x="66" y="292">认证 Hook</text>
  <text class="tiny" x="66" y="318">ClientAuthentication_hook</text>

  <rect class="hook" x="250" y="260" width="185" height="82"/>
  <text class="text" x="268" y="292">解析后 Hook</text>
  <text class="tiny" x="268" y="318">post_parse_analyze_hook</text>

  <rect class="hook" x="458" y="260" width="185" height="82"/>
  <text class="text" x="476" y="292">策略 Hook</text>
  <text class="tiny" x="476" y="318">row_security_policy_hook</text>

  <rect class="hook" x="660" y="260" width="210" height="112"/>
  <text class="text" x="678" y="292">优化器 Hook</text>
  <text class="tiny" x="678" y="318">planner_hook</text>
  <text class="tiny" x="678" y="338">set_rel_pathlist_hook</text>
  <text class="tiny" x="678" y="358">set_join_pathlist_hook</text>

  <rect class="hook" x="900" y="260" width="200" height="112"/>
  <text class="text" x="918" y="292">执行器 Hook</text>
  <text class="tiny" x="918" y="318">ExecutorStart/Run</text>
  <text class="tiny" x="918" y="338">ExecutorFinish/End</text>
  <text class="tiny" x="918" y="358">ExecutorCheckPerms</text>

  <path class="arrow" d="M118 202 V260"/>
  <path class="arrow" d="M322 202 V260"/>
  <path class="arrow" d="M528 202 V260"/>
  <path class="arrow" d="M733 202 V260"/>
  <path class="arrow" d="M938 202 V260"/>

  <rect class="warn" x="142" y="430" width="250" height="90"/>
  <text class="text" x="164" y="462">Utility 命令路径</text>
  <text class="small" x="164" y="490">DDL / VACUUM / EXPLAIN</text>
  <text class="tiny" x="164" y="512">ProcessUtility_hook</text>

  <rect class="warn" x="442" y="430" width="250" height="90"/>
  <text class="text" x="464" y="462">对象访问事件</text>
  <text class="small" x="464" y="490">CREATE / ALTER / DROP</text>
  <text class="tiny" x="464" y="512">object_access_hook</text>

  <rect class="warn" x="742" y="430" width="250" height="90"/>
  <text class="text" x="764" y="462">运行外基础设施</text>
  <text class="small" x="764" y="490">GUC / shared memory / log</text>
  <text class="tiny" x="764" y="512">check_hook / shmem_request_hook / emit_log_hook</text>

  <path class="arrow" d="M527 202 C520 280 360 350 267 430"/>
  <path class="arrow" d="M527 202 C560 288 570 350 567 430"/>
  <path class="arrow" d="M765 372 C792 392 838 410 867 430"/>
</svg>
