<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="660" viewBox="0 0 1160 660" role="img" aria-labelledby="title desc">
  <title id="title">优化器与执行器 Hook 的核心位置</title>
  <desc id="desc">展示 planner_hook、pathlist Hook、create_upper_paths_hook 以及 ExecutorStart/Run/Finish/End 的位置和可做事项。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; rx: 8; }
    .step { fill: #f1f5f9; stroke: #334155; stroke-width: 1.3; rx: 8; }
    .hook { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; rx: 8; }
    .choose { fill: #fef9c3; stroke: #a16207; stroke-width: 1.3; rx: 8; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1160" height="660"/>
  <text class="text" x="40" y="44">优化器 Hook 能影响“候选路径”，执行器 Hook 更适合观测和统计</text>

  <rect class="lane" x="40" y="86" width="1080" height="270"/>
  <text class="text" x="64" y="122">规划阶段</text>

  <rect class="step" x="70" y="160" width="170" height="72"/>
  <text class="small" x="92" y="192">Query 输入</text>
  <text class="tiny" x="92" y="214">parse tree</text>

  <rect class="hook" x="285" y="145" width="185" height="102"/>
  <text class="small" x="306" y="176">planner_hook</text>
  <text class="tiny" x="306" y="201">替换或包裹</text>
  <text class="tiny" x="306" y="221">standard_planner()</text>

  <rect class="hook" x="520" y="145" width="190" height="102"/>
  <text class="small" x="540" y="176">pathlist Hooks</text>
  <text class="tiny" x="540" y="201">base rel / join rel</text>
  <text class="tiny" x="540" y="221">添加 CustomPath</text>

  <rect class="hook" x="760" y="145" width="190" height="102"/>
  <text class="small" x="780" y="176">upper paths Hook</text>
  <text class="tiny" x="780" y="201">GROUP / WINDOW</text>
  <text class="tiny" x="780" y="221">DISTINCT / FINAL</text>

  <rect class="choose" x="990" y="160" width="85" height="72"/>
  <text class="small" x="1007" y="192">Plan</text>
  <text class="tiny" x="1007" y="214">best path</text>

  <path class="arrow" d="M240 196 H285"/>
  <path class="arrow" d="M470 196 H520"/>
  <path class="arrow" d="M710 196 H760"/>
  <path class="arrow" d="M950 196 H990"/>

  <text class="tiny" x="300" y="282">适合：计量规划耗时、改写规划入口、接入 advisor</text>
  <text class="tiny" x="530" y="282">适合：加 scan/join 备选路径、约束路径生成</text>
  <text class="tiny" x="770" y="282">适合：上层关系阶段增加路径</text>

  <rect class="lane" x="40" y="390" width="1080" height="220"/>
  <text class="text" x="64" y="426">执行阶段</text>

  <rect class="hook" x="86" y="470" width="190" height="82"/>
  <text class="small" x="108" y="501">ExecutorStart</text>
  <text class="tiny" x="108" y="526">初始化 EState / instrumentation</text>

  <rect class="hook" x="326" y="470" width="190" height="82"/>
  <text class="small" x="348" y="501">ExecutorRun</text>
  <text class="tiny" x="348" y="526">拉取元组 / 执行计划树</text>

  <rect class="hook" x="566" y="470" width="190" height="82"/>
  <text class="small" x="588" y="501">ExecutorFinish</text>
  <text class="tiny" x="588" y="526">AFTER triggers / 收尾</text>

  <rect class="hook" x="806" y="470" width="190" height="82"/>
  <text class="small" x="828" y="501">ExecutorEnd</text>
  <text class="tiny" x="828" y="526">统计落库 / 释放资源</text>

  <path class="arrow" d="M276 511 H326"/>
  <path class="arrow" d="M516 511 H566"/>
  <path class="arrow" d="M756 511 H806"/>
</svg>
