<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">LOAD、session preload 与 shared preload 的边界</title>
  <desc id="desc">比较 PostgreSQL 扩展通过 LOAD、session_preload_libraries、local_preload_libraries、shared_preload_libraries 加载时能做的事情。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .col { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .yes { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; rx: 6; }
    .no { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.2; rx: 6; }
    .maybe { fill: #fef9c3; stroke: #a16207; stroke-width: 1.2; rx: 6; }
    .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; fill: #475569; }
  </style>
  <rect class="bg" x="0" y="0" width="1120" height="650"/>
  <text class="text" x="42" y="46">加载时机决定 Hook 能否覆盖全局状态</text>
  <text class="small" x="42" y="74">只有需要 postmaster 启动期资源的扩展，才应要求 shared_preload_libraries。</text>

  <rect class="col" x="50" y="120" width="250" height="440"/>
  <text class="text" x="82" y="156">LOAD</text>
  <text class="small" x="82" y="184">当前会话显式加载</text>
  <rect class="yes" x="80" y="225" width="190" height="52"/>
  <text class="tiny" x="96" y="256">注册会话内 Hook</text>
  <rect class="maybe" x="80" y="305" width="190" height="52"/>
  <text class="tiny" x="96" y="336">适合调试/局部启用</text>
  <rect class="no" x="80" y="385" width="190" height="52"/>
  <text class="tiny" x="96" y="416">不能申请启动期共享内存</text>
  <rect class="no" x="80" y="465" width="190" height="52"/>
  <text class="tiny" x="96" y="496">不能影响已启动后端</text>

  <rect class="col" x="360" y="120" width="250" height="440"/>
  <text class="text" x="392" y="156">session/local preload</text>
  <text class="small" x="392" y="184">会话启动时加载</text>
  <rect class="yes" x="390" y="225" width="190" height="52"/>
  <text class="tiny" x="406" y="256">覆盖整个会话</text>
  <rect class="maybe" x="390" y="305" width="190" height="52"/>
  <text class="tiny" x="406" y="336">适合会话级观测</text>
  <rect class="no" x="390" y="385" width="190" height="52"/>
  <text class="tiny" x="406" y="416">不适合共享状态初始化</text>
  <rect class="maybe" x="390" y="465" width="190" height="52"/>
  <text class="tiny" x="406" y="496">local 受 $libdir/plugins 限制</text>

  <rect class="col" x="670" y="120" width="300" height="440"/>
  <text class="text" x="702" y="156">shared_preload_libraries</text>
  <text class="small" x="702" y="184">postmaster 启动时加载</text>
  <rect class="yes" x="700" y="225" width="230" height="52"/>
  <text class="tiny" x="716" y="256">可注册 shmem_request_hook</text>
  <rect class="yes" x="700" y="305" width="230" height="52"/>
  <text class="tiny" x="716" y="336">可申请共享内存/LWLock</text>
  <rect class="yes" x="700" y="385" width="230" height="52"/>
  <text class="tiny" x="716" y="416">适合全局统计/后台状态</text>
  <rect class="maybe" x="700" y="465" width="230" height="52"/>
  <text class="tiny" x="716" y="496">修改通常需要重启实例</text>
</svg>
