<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 内置 Index AM 能力对比</title>
  <desc id="desc">以查询形态、返回方式、排序、唯一、覆盖列和维护代价对比 B-tree、Hash、GiST、SP-GiST、GIN、BRIN。</desc>
  <style>
    .title { font: 700 26px sans-serif; fill: #0f172a; }
    .head { fill: #1f2937; }
    .headtext { font: 700 15px sans-serif; fill: #ffffff; }
    .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .alt { fill: #f8fafc; }
    .am { font: 700 16px sans-serif; fill: #0f172a; }
    .text { font: 14px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .good { fill: #dcfce7; stroke: #16a34a; }
    .warn { fill: #fef3c7; stroke: #d97706; }
    .bad { fill: #fee2e2; stroke: #dc2626; }
  </style>
  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="48" class="title">内置 AM 不是快慢榜，而是不同 workload 的物理合同</text>

  <rect x="40" y="82" width="1100" height="44" class="head"/>
  <text x="58" y="110" class="headtext">AM</text>
  <text x="178" y="110" class="headtext">核心结构</text>
  <text x="360" y="110" class="headtext">适合查询</text>
  <text x="570" y="110" class="headtext">扫描返回</text>
  <text x="735" y="110" class="headtext">排序/唯一/覆盖</text>
  <text x="940" y="110" class="headtext">典型代价</text>

  <g transform="translate(40,126)">
    <rect width="1100" height="92" class="cell alt"/>
    <text x="18" y="34" class="am">B-tree</text>
    <text x="138" y="30" class="text">多层有序页</text>
    <text x="138" y="55" class="small">leaf 指向 heap TID</text>
    <text x="320" y="30" class="text">等值、范围、排序</text>
    <text x="320" y="55" class="small">默认 CREATE INDEX</text>
    <text x="530" y="30" class="text">amgettuple + bitmap</text>
    <text x="530" y="55" class="small">支持 backward/parallel</text>
    <text x="695" y="30" class="text">排序：是，唯一：是</text>
    <text x="695" y="55" class="small">index-only 与 INCLUDE 支持强</text>
    <text x="900" y="30" class="text">更新多索引放大</text>
    <text x="900" y="55" class="small">页分裂、膨胀、VACUUM</text>
  </g>

  <g transform="translate(40,218)">
    <rect width="1100" height="92" class="cell"/>
    <text x="18" y="34" class="am">Hash</text>
    <text x="138" y="30" class="text">32 位 hash code</text>
    <text x="138" y="55" class="small">bucket / overflow page</text>
    <text x="320" y="30" class="text">简单等值</text>
    <text x="320" y="55" class="small">不能范围和排序</text>
    <text x="530" y="30" class="text">amgettuple + bitmap</text>
    <text x="530" y="55" class="small">单列，非并行</text>
    <text x="695" y="30" class="text">排序：否，唯一：否</text>
    <text x="695" y="55" class="small">无 index-only / INCLUDE</text>
    <text x="900" y="30" class="text">适用面窄</text>
    <text x="900" y="55" class="small">等值也常被 B-tree 覆盖</text>
  </g>

  <g transform="translate(40,310)">
    <rect width="1100" height="92" class="cell alt"/>
    <text x="18" y="34" class="am">GiST</text>
    <text x="138" y="30" class="text">平衡搜索框架</text>
    <text x="138" y="55" class="small">由 opclass 定义语义</text>
    <text x="320" y="30" class="text">空间、范围、相似</text>
    <text x="320" y="55" class="small">可做 nearest-neighbor</text>
    <text x="530" y="30" class="text">amgettuple + bitmap</text>
    <text x="530" y="55" class="small">可能 lossy，需要 recheck</text>
    <text x="695" y="30" class="text">orderbyop：是</text>
    <text x="695" y="55" class="small">部分 opclass 支持 index-only</text>
    <text x="900" y="30" class="text">效果依赖 opclass</text>
    <text x="900" y="55" class="small">split/picksplit 质量关键</text>
  </g>

  <g transform="translate(40,402)">
    <rect width="1100" height="92" class="cell"/>
    <text x="18" y="34" class="am">SP-GiST</text>
    <text x="138" y="30" class="text">空间分区树</text>
    <text x="138" y="55" class="small">trie/k-d/quadtree 等</text>
    <text x="320" y="30" class="text">非均匀空间分布</text>
    <text x="320" y="55" class="small">点、前缀、分区搜索</text>
    <text x="530" y="30" class="text">amgettuple + bitmap</text>
    <text x="530" y="55" class="small">可能 lossy，需要 recheck</text>
    <text x="695" y="30" class="text">orderbyop：是</text>
    <text x="695" y="55" class="small">部分 opclass 支持 index-only</text>
    <text x="900" y="30" class="text">不平衡数据需验证</text>
    <text x="900" y="55" class="small">predicate lock 边界更粗</text>
  </g>

  <g transform="translate(40,494)">
    <rect width="1100" height="92" class="cell alt"/>
    <text x="18" y="34" class="am">GIN</text>
    <text x="138" y="30" class="text">倒排：key -> TID 集</text>
    <text x="138" y="55" class="small">posting list/tree</text>
    <text x="320" y="30" class="text">数组、jsonb、全文</text>
    <text x="320" y="55" class="small">包含、重叠、词项检索</text>
    <text x="530" y="30" class="text">bitmap only</text>
    <text x="530" y="55" class="small">无普通 amgettuple</text>
    <text x="695" y="30" class="text">排序：否，唯一：否</text>
    <text x="695" y="55" class="small">不能 index-only</text>
    <text x="900" y="30" class="text">写入和清理较重</text>
    <text x="900" y="55" class="small">fastupdate/pending list 要治理</text>
  </g>

  <g transform="translate(40,586)">
    <rect width="1100" height="92" class="cell"/>
    <text x="18" y="34" class="am">BRIN</text>
    <text x="138" y="30" class="text">block range summary</text>
    <text x="138" y="55" class="small">minmax / bloom 等 opclass</text>
    <text x="320" y="30" class="text">超大表且物理相关</text>
    <text x="320" y="55" class="small">时间序列、追加写</text>
    <text x="530" y="30" class="text">bitmap only</text>
    <text x="530" y="55" class="small">天然 lossy，必须 recheck</text>
    <text x="695" y="30" class="text">排序：否，唯一：否</text>
    <text x="695" y="55" class="small">体积小，不能 index-only</text>
    <text x="900" y="30" class="text">依赖相关性和 summarization</text>
    <text x="900" y="55" class="small">随机分布时过滤差</text>
  </g>

  <text x="40" y="722" class="small">读图要点：选择 AM 先看查询谓词和数据形态，再看写入、排序、唯一、index-only 和维护边界。</text>
</svg>
