<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">Index Access Method 的目录与 API 映射</title>
  <desc id="desc">展示 CREATE INDEX、pg_am、operator class、relcache 和 IndexAmRoutine 之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .catalog { fill: #ecfeff; stroke: #0e7490; }
      .api { fill: #fef3c7; stroke: #b45309; }
      .runtime { fill: #eef2ff; stroke: #4338ca; }
      .text { font: 17px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .code { font: 14px monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="700" fill="#ffffff"/>
  <text x="40" y="48" class="title">Index Access Method：SQL 目录对象到 C 回调表</text>

  <rect x="40" y="95" width="220" height="118" class="box"/>
  <text x="64" y="130" class="text">SQL 层</text>
  <text x="64" y="158" class="code">CREATE INDEX ...</text>
  <text x="64" y="182" class="code">USING btree|gin|...</text>

  <rect x="330" y="80" width="240" height="160" class="box catalog"/>
  <text x="354" y="115" class="text">系统目录</text>
  <text x="354" y="145" class="code">pg_class: index relation</text>
  <text x="354" y="170" class="code">pg_index: key/opclass</text>
  <text x="354" y="195" class="code">pg_am: amname, handler</text>
  <text x="354" y="220" class="code">pg_amop / pg_amproc</text>

  <rect x="650" y="80" width="220" height="160" class="box api"/>
  <text x="674" y="115" class="text">handler 函数</text>
  <text x="674" y="146" class="code">bthandler()</text>
  <text x="674" y="171" class="code">ginhandler()</text>
  <text x="674" y="196" class="code">brinhandler()</text>
  <text x="674" y="220" class="small">返回静态 IndexAmRoutine</text>

  <rect x="940" y="80" width="200" height="160" class="box runtime"/>
  <text x="964" y="115" class="text">relcache</text>
  <text x="964" y="146" class="code">rd_amhandler</text>
  <text x="964" y="171" class="code">rd_indam</text>
  <text x="964" y="196" class="small">运行期缓存 AM 能力</text>

  <path d="M260 154 L330 154" class="arrow"/>
  <path d="M570 154 L650 154" class="arrow"/>
  <path d="M870 154 L940 154" class="arrow"/>

  <rect x="40" y="310" width="500" height="300" class="box api"/>
  <text x="64" y="348" class="text">IndexAmRoutine 固定能力</text>
  <text x="64" y="382" class="code">amcanorder, amcanorderbyop</text>
  <text x="64" y="407" class="code">amcanunique, amcanmulticol</text>
  <text x="64" y="432" class="code">amoptionalkey, amsearcharray</text>
  <text x="64" y="457" class="code">amsearchnulls, amcaninclude</text>
  <text x="64" y="482" class="code">amcanparallel, amsummarizing</text>
  <text x="64" y="522" class="small">这些标志告诉优化器和执行器：</text>
  <text x="64" y="546" class="small">能否排序、唯一、bitmap、index-only、并行、覆盖列等。</text>

  <rect x="630" y="310" width="510" height="300" class="box runtime"/>
  <text x="654" y="348" class="text">IndexAmRoutine 回调函数</text>
  <text x="654" y="382" class="code">ambuild / ambuildempty</text>
  <text x="654" y="407" class="code">aminsert / ambulkdelete / amvacuumcleanup</text>
  <text x="654" y="432" class="code">ambeginscan / amrescan / amendscan</text>
  <text x="654" y="457" class="code">amgettuple / amgetbitmap</text>
  <text x="654" y="482" class="code">amcanreturn / amcostestimate / amvalidate</text>
  <text x="654" y="522" class="small">核心代码不理解 B-tree 或 GIN 的内部页结构；</text>
  <text x="654" y="546" class="small">它只按这张回调表调用 AM 自己的实现。</text>

  <path d="M1040 240 C1010 300 810 288 780 310" class="dash"/>
  <path d="M1040 240 C1020 355 545 278 300 310" class="dash"/>

  <text x="40" y="660" class="small">读图要点：Index AM 是 PostgreSQL 内核和索引实现之间的合约，不是某一种索引算法。</text>
</svg>
