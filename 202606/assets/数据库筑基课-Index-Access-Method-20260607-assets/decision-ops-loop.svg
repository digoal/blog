<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Index AM 选择与运维闭环</title>
  <desc id="desc">展示从 workload 识别、AM 选择、验证、上线观测到维护调整的闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #0f172a; }
      .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .accent1 { fill: #e0f2fe; stroke: #0369a1; }
      .accent2 { fill: #ecfdf5; stroke: #047857; }
      .accent3 { fill: #fff7ed; stroke: #c2410c; }
      .accent4 { fill: #fef3c7; stroke: #b45309; }
      .text { font: 17px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .code { font: 14px monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect width="1180" height="720" fill="#ffffff"/>
  <text x="40" y="48" class="title">选 AM 不靠口诀，靠 workload、验证和维护闭环</text>

  <rect x="70" y="105" width="260" height="135" class="node accent1"/>
  <text x="94" y="140" class="text">1. 识别查询</text>
  <text x="94" y="172" class="small">等值 / 范围 / 排序</text>
  <text x="94" y="196" class="small">包含 / 相似 / KNN</text>
  <text x="94" y="220" class="small">低选择性 / 高选择性</text>

  <rect x="460" y="105" width="260" height="135" class="node accent2"/>
  <text x="484" y="140" class="text">2. 识别数据</text>
  <text x="484" y="172" class="small">是否可排序</text>
  <text x="484" y="196" class="small">是否多值或文档</text>
  <text x="484" y="220" class="small">是否与物理顺序相关</text>

  <rect x="850" y="105" width="260" height="135" class="node accent3"/>
  <text x="874" y="140" class="text">3. 识别写入</text>
  <text x="874" y="172" class="small">UPDATE 频率</text>
  <text x="874" y="196" class="small">索引数量与 HOT 影响</text>
  <text x="874" y="220" class="small">批量装载与维护窗口</text>

  <path d="M330 172 L460 172" class="arrow"/>
  <path d="M720 172 L850 172" class="arrow"/>

  <rect x="70" y="330" width="260" height="165" class="node accent4"/>
  <text x="94" y="365" class="text">4. 初选 AM</text>
  <text x="94" y="398" class="small">B-tree: 通用等值/范围/排序</text>
  <text x="94" y="422" class="small">GIN: 多值倒排</text>
  <text x="94" y="446" class="small">BRIN: 超大相关追加表</text>
  <text x="94" y="470" class="small">GiST/SP-GiST: 空间与扩展语义</text>

  <rect x="460" y="330" width="260" height="165" class="node accent1"/>
  <text x="484" y="365" class="text">5. 验证计划</text>
  <text x="484" y="398" class="code">EXPLAIN (ANALYZE, BUFFERS)</text>
  <text x="484" y="423" class="code">pg_stat_user_indexes</text>
  <text x="484" y="448" class="small">确认 rows、recheck、heap fetch</text>
  <text x="484" y="472" class="small">不要发明性能数字</text>

  <rect x="850" y="330" width="260" height="165" class="node accent2"/>
  <text x="874" y="365" class="text">6. 上线维护</text>
  <text x="874" y="398" class="small">ANALYZE 保持统计新鲜</text>
  <text x="874" y="422" class="small">VACUUM 清理死索引项</text>
  <text x="874" y="446" class="small">REINDEX / pending list / summarize</text>
  <text x="874" y="470" class="small">按读写放大调整</text>

  <path d="M980 240 C980 288 250 282 200 330" class="arrow"/>
  <path d="M330 412 L460 412" class="arrow"/>
  <path d="M720 412 L850 412" class="arrow"/>
  <path d="M980 495 C960 610 200 610 200 495" class="arrow"/>

  <rect x="180" y="575" width="820" height="92" class="node"/>
  <text x="204" y="607" class="text">失败信号：计划不用索引、Rows 估算偏离、Bitmap recheck 过多、写入延迟上升。</text>
  <text x="204" y="632" class="text">继续观察：索引膨胀、autovacuum 追不上、GIN pending list 或 BRIN summary 滞后。</text>
  <text x="204" y="656" class="small">闭环动作：改 opclass、改列顺序、拆索引、换 AM、重建统计、重建索引或改变数据组织。</text>

  <text x="40" y="700" class="small">读图要点：Index AM 的选择不是建索引那一刻结束，而是贯穿统计、执行计划、写入放大和维护窗口。</text>
</svg>
