<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">优化器与执行器使用 Index AM 的路径</title>
  <desc id="desc">展示查询条件如何通过 opclass 匹配生成 index path，再在执行器中调用 amgettuple 或 amgetbitmap。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .planner { fill: #e0f2fe; stroke: #0369a1; }
      .exec { fill: #ecfdf5; stroke: #047857; }
      .heap { fill: #fff7ed; stroke: #c2410c; }
      .text { font: 17px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .code { font: 14px monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="720" fill="#ffffff"/>
  <text x="40" y="48" class="title">从 WHERE 子句到 heap tuple：AM 决定可走哪条路</text>

  <rect x="40" y="95" width="220" height="120" class="box"/>
  <text x="64" y="130" class="text">查询语义</text>
  <text x="64" y="160" class="code">WHERE a = 42</text>
  <text x="64" y="184" class="code">ORDER BY p &lt;-&gt; q</text>

  <rect x="320" y="78" width="260" height="155" class="box planner"/>
  <text x="344" y="112" class="text">子句匹配</text>
  <text x="344" y="143" class="small">opfamily / opclass</text>
  <text x="344" y="167" class="small">pg_amop: operator strategy</text>
  <text x="344" y="191" class="small">pg_amproc: support functions</text>
  <text x="344" y="215" class="small">volatile / commutator / NullTest</text>

  <rect x="640" y="78" width="240" height="155" class="box planner"/>
  <text x="664" y="112" class="text">路径生成</text>
  <text x="664" y="143" class="code">IndexPath</text>
  <text x="664" y="167" class="code">BitmapIndexPath</text>
  <text x="664" y="191" class="small">amoptionalkey / amsearcharray</text>
  <text x="664" y="215" class="small">amcanorderbyop / amhasgetbitmap</text>

  <rect x="940" y="78" width="200" height="155" class="box planner"/>
  <text x="964" y="112" class="text">成本估算</text>
  <text x="964" y="143" class="code">amcostestimate()</text>
  <text x="964" y="171" class="small">返回 selectivity</text>
  <text x="964" y="195" class="small">index cost / pages</text>

  <path d="M260 155 L320 155" class="arrow"/>
  <path d="M580 155 L640 155" class="arrow"/>
  <path d="M880 155 L940 155" class="arrow"/>

  <rect x="125" y="320" width="320" height="170" class="box exec"/>
  <text x="149" y="355" class="text">普通 Index Scan</text>
  <text x="149" y="386" class="code">ambeginscan()</text>
  <text x="149" y="411" class="code">amrescan(scan keys)</text>
  <text x="149" y="436" class="code">amgettuple(direction)</text>
  <text x="149" y="464" class="small">逐个 TID 返回，可保持顺序</text>

  <rect x="735" y="320" width="320" height="170" class="box exec"/>
  <text x="759" y="355" class="text">Bitmap Index Scan</text>
  <text x="759" y="386" class="code">ambeginscan()</text>
  <text x="759" y="411" class="code">amrescan(scan keys)</text>
  <text x="759" y="436" class="code">amgetbitmap(tbm)</text>
  <text x="759" y="464" class="small">一次收集 TID，无顺序和 index-only</text>

  <rect x="420" y="575" width="340" height="100" class="box heap"/>
  <text x="444" y="610" class="text">table access method</text>
  <text x="444" y="640" class="code">table_index_fetch_tuple()</text>
  <text x="444" y="662" class="small">MVCC 可见性检查与必要 recheck</text>

  <path d="M760 233 C720 280 500 270 355 320" class="arrow"/>
  <path d="M760 233 C830 275 895 285 895 320" class="arrow"/>
  <path d="M285 490 C350 545 450 555 520 575" class="arrow"/>
  <path d="M895 490 C840 545 725 555 660 575" class="arrow"/>

  <text x="40" y="695" class="small">读图要点：优化器只会考虑 AM 声称支持的扫描形态；执行器只从 AM 拿 TID 或 bitmap，真正的可见性仍回到表访问方法。</text>
</svg>
