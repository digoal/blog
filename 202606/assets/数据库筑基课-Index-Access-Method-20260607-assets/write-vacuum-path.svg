<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">索引写入、唯一性检查与 VACUUM 维护路径</title>
  <desc id="desc">展示 heap 写入后如何形成索引键、调用 aminsert、做唯一性检查，以及 VACUUM 如何通过 ambulkdelete 清理索引条目。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .write { fill: #ecfeff; stroke: #0e7490; }
      .am { fill: #fef3c7; stroke: #b45309; }
      .vacuum { fill: #f1f5f9; stroke: #475569; }
      .warn { fill: #fee2e2; stroke: #b91c1c; }
      .text { font: 17px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .code { font: 14px monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect width="1180" height="720" fill="#ffffff"/>
  <text x="40" y="48" class="title">写路径：heap 版本先产生，索引条目随后维护</text>

  <rect x="45" y="95" width="220" height="128" class="box write"/>
  <text x="68" y="130" class="text">DML 执行器</text>
  <text x="68" y="160" class="code">INSERT / UPDATE</text>
  <text x="68" y="184" class="small">heap tuple 已有 TID</text>
  <text x="68" y="206" class="small">UPDATE 可能产生新版本</text>

  <rect x="330" y="95" width="240" height="128" class="box write"/>
  <text x="354" y="130" class="text">索引键生成</text>
  <text x="354" y="160" class="code">ExecInsertIndexTuples()</text>
  <text x="354" y="184" class="code">FormIndexDatum()</text>
  <text x="354" y="206" class="small">表达式索引与部分索引谓词</text>

  <rect x="635" y="95" width="250" height="128" class="box am"/>
  <text x="659" y="130" class="text">通用 index API</text>
  <text x="659" y="160" class="code">index_insert()</text>
  <text x="659" y="184" class="code">checkUnique</text>
  <text x="659" y="206" class="small">NO / YES / PARTIAL / EXISTING</text>

  <rect x="950" y="95" width="185" height="128" class="box am"/>
  <text x="974" y="130" class="text">AM 内部</text>
  <text x="974" y="160" class="code">aminsert()</text>
  <text x="974" y="184" class="small">页分裂、posting list</text>
  <text x="974" y="206" class="small">pending list、summary 等</text>

  <path d="M265 159 L330 159" class="arrow"/>
  <path d="M570 159 L635 159" class="arrow"/>
  <path d="M885 159 L950 159" class="arrow"/>

  <rect x="215" y="330" width="330" height="145" class="box warn"/>
  <text x="239" y="365" class="text">唯一性不是纯索引键比较</text>
  <text x="239" y="396" class="small">B-tree 支持 amcanunique</text>
  <text x="239" y="420" class="small">MVCC 下重复物理条目可能合法</text>
  <text x="239" y="444" class="small">冲突检查必须等待或重查 heap 可见性</text>

  <rect x="635" y="330" width="330" height="145" class="box warn"/>
  <text x="659" y="365" class="text">HOT 与 summarizing 边界</text>
  <text x="659" y="396" class="small">非 HOT 更新通常给每个索引写新条目</text>
  <text x="659" y="420" class="small">BRIN 等 summarizing index 可减少写放大</text>
  <text x="659" y="444" class="small">amsummarizing 会影响更新索引集合</text>

  <rect x="215" y="555" width="750" height="105" class="box vacuum"/>
  <text x="239" y="590" class="text">VACUUM 维护</text>
  <text x="239" y="620" class="code">ambulkdelete(callback TID is dead)  ->  amvacuumcleanup(stats)</text>
  <text x="239" y="644" class="small">索引条目必须在 heap 旧版本可回收前先清理；AM 决定页级清理、统计和后处理方式。</text>

  <path d="M760 223 C710 265 508 292 435 330" class="dash"/>
  <path d="M760 223 C790 270 810 295 810 330" class="dash"/>
  <path d="M380 475 C410 520 470 535 520 555" class="arrow"/>
  <path d="M800 475 C780 520 710 535 660 555" class="arrow"/>

  <text x="40" y="700" class="small">读图要点：Index AM 插件边界不取消 MVCC 规则。写入、唯一性和 VACUUM 都要在 heap 可见性与 AM 内部结构之间协作。</text>
</svg>
