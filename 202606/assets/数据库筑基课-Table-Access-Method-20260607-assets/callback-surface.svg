<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">TableAmRoutine 回调面</title>
  <desc id="desc">按功能域展示 PostgreSQL 表访问方法需要提供的主要回调。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <style>
    .center { fill: #e7f0ff; stroke: #1d4ed8; stroke-width: 1.8; rx: 10; }
    .group { fill: #f8fafc; stroke: #344054; stroke-width: 1.3; rx: 8; }
    .storage { fill: #ecfdf3; stroke: #047857; stroke-width: 1.3; rx: 8; }
    .ddl { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.3; rx: 8; }
    .planner { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 1.3; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #344054; }
    .arrow { stroke: #344054; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="390" y="250" width="260" height="105" class="center"/>
  <text x="424" y="294" class="text">TableAmRoutine</text>
  <text x="424" y="326" class="small">核心代码只通过 wrapper 调用</text>

  <rect x="40" y="45" width="285" height="115" class="group"/>
  <text x="65" y="78" class="text">扫描</text>
  <text x="65" y="106" class="small">scan_begin / getnextslot / rescan</text>
  <text x="65" y="130" class="small">parallelscan / tidrange / sample</text>

  <rect x="370" y="45" width="285" height="115" class="group"/>
  <text x="395" y="78" class="text">索引回表</text>
  <text x="395" y="106" class="small">index_fetch_begin / tuple</text>
  <text x="395" y="130" class="small">all_dead / HOT 链可见版本</text>

  <rect x="700" y="45" width="285" height="115" class="storage"/>
  <text x="725" y="78" class="text">物理元组修改</text>
  <text x="725" y="106" class="small">insert / multi_insert / speculative</text>
  <text x="725" y="130" class="small">update / delete / lock</text>

  <rect x="40" y="435" width="285" height="120" class="ddl"/>
  <text x="65" y="468" class="text">DDL 与维护</text>
  <text x="65" y="496" class="small">new filelocator / truncate / copy</text>
  <text x="65" y="520" class="small">VACUUM / CLUSTER / VACUUM FULL</text>

  <rect x="370" y="435" width="285" height="120" class="planner"/>
  <text x="395" y="468" class="text">统计与优化器</text>
  <text x="395" y="496" class="small">estimate_size</text>
  <text x="395" y="520" class="small">analyze_next_block / tuple</text>

  <rect x="700" y="435" width="285" height="120" class="storage"/>
  <text x="725" y="468" class="text">大小、TOAST 与位图扫描</text>
  <text x="725" y="496" class="small">relation_size / needs_toast</text>
  <text x="725" y="520" class="small">fetch_toast_slice / bitmap_next_tuple</text>

  <path d="M 325 115 C 405 165 450 205 485 250" class="arrow"/>
  <path d="M 515 160 C 520 198 520 220 520 250" class="arrow"/>
  <path d="M 800 160 C 720 190 650 220 607 250" class="arrow"/>
  <path d="M 325 485 C 410 430 455 395 490 355" class="arrow"/>
  <path d="M 520 435 C 520 395 520 380 520 355" class="arrow"/>
  <path d="M 700 485 C 655 430 610 392 565 355" class="arrow"/>
</svg>
