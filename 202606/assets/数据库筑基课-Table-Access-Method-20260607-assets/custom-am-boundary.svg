<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc">
  <title id="title">自定义 Table AM 的收益与硬边界</title>
  <desc id="desc">用决策图展示什么时候考虑自定义 Table AM，以及必须处理的 TID、事务、WAL、索引、VACUUM 和统计边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <style>
    .start { fill: #e7f0ff; stroke: #1d4ed8; stroke-width: 1.6; rx: 8; }
    .ok { fill: #ecfdf3; stroke: #047857; stroke-width: 1.4; rx: 8; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
    .hard { fill: #fef2f2; stroke: #b42318; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #344054; }
    .line { stroke: #344054; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="55" y="65" width="300" height="92" class="start"/>
  <text x="80" y="98" class="text">业务想换表存储</text>
  <text x="80" y="126" class="small">列式、压缩、冷热分层、外部存储</text>

  <rect x="455" y="65" width="300" height="92" class="risk"/>
  <text x="480" y="98" class="text">先问：扩展/FDW/分区够不够？</text>
  <text x="480" y="126" class="small">如果只是访问外部数据，FDW 通常更合适</text>

  <rect x="55" y="245" width="270" height="100" class="hard"/>
  <text x="80" y="278" class="text">必须支持 TID 语义</text>
  <text x="80" y="306" class="small">更新/索引需要 block + item 形式</text>
  <text x="80" y="328" class="small">bitmap scan 需要 block locality</text>

  <rect x="365" y="245" width="270" height="100" class="hard"/>
  <text x="390" y="278" class="text">必须处理事务与可见性</text>
  <text x="390" y="306" class="small">snapshot、update chain、tuple lock</text>
  <text x="390" y="328" class="small">多 AM 同一事务内可协作</text>

  <rect x="675" y="245" width="270" height="100" class="hard"/>
  <text x="700" y="278" class="text">必须处理恢复与维护</text>
  <text x="700" y="306" class="small">WAL 或自定义恢复机制</text>
  <text x="700" y="328" class="small">VACUUM、ANALYZE、CLUSTER、TOAST</text>

  <rect x="175" y="430" width="310" height="95" class="ok"/>
  <text x="200" y="462" class="text">收益</text>
  <text x="200" y="490" class="small">突破 heap 行存布局，改变 IO/压缩/冷热代价</text>

  <rect x="565" y="430" width="310" height="95" class="risk"/>
  <text x="590" y="462" class="text">代价</text>
  <text x="590" y="490" class="small">实现面接近存储内核，升级和验证成本高</text>

  <path d="M 355 111 L 455 111" class="line"/>
  <path d="M 600 157 C 520 210 350 220 190 245" class="line"/>
  <path d="M 610 157 C 570 205 520 225 500 245" class="line"/>
  <path d="M 700 157 C 760 205 810 225 810 245" class="line"/>
  <path d="M 190 345 C 210 385 260 405 325 430" class="line"/>
  <path d="M 500 345 C 500 385 470 405 390 430" class="line"/>
  <path d="M 810 345 C 800 385 750 405 680 430" class="line"/>
  <text x="405" y="565" class="small">结论：Table AM 是“换表存储内核”的接口，不是给普通 SQL 调优准备的开关。</text>
</svg>
