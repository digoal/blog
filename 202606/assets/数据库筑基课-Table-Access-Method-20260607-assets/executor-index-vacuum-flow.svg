<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">执行器、索引和 VACUUM 如何通过 Table AM 协作</title>
  <desc id="desc">展示顺序扫描、索引回表、DML、索引构建、ANALYZE 与 VACUUM 对 TableAmRoutine 的调用。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <style>
    .caller { fill: #f8fafc; stroke: #344054; stroke-width: 1.3; rx: 8; }
    .am { fill: #e7f0ff; stroke: #1d4ed8; stroke-width: 1.7; rx: 10; }
    .out { fill: #ecfdf3; stroke: #047857; stroke-width: 1.3; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #344054; }
    .line { stroke: #344054; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .dashed { stroke: #64748b; stroke-width: 1.3; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>

  <rect x="60" y="60" width="260" height="82" class="caller"/>
  <text x="82" y="92" class="text">SeqScan / COPY TO</text>
  <text x="82" y="118" class="small">table_beginscan + getnextslot</text>

  <rect x="60" y="185" width="260" height="82" class="caller"/>
  <text x="82" y="217" class="text">IndexScan / 唯一检查</text>
  <text x="82" y="243" class="small">index_fetch_tuple / all_dead</text>

  <rect x="60" y="310" width="260" height="82" class="caller"/>
  <text x="82" y="342" class="text">INSERT / UPDATE / DELETE</text>
  <text x="82" y="368" class="small">tuple_insert / update / delete</text>

  <rect x="60" y="435" width="260" height="82" class="caller"/>
  <text x="82" y="467" class="text">CREATE INDEX / REINDEX</text>
  <text x="82" y="493" class="small">index_build_range_scan</text>

  <rect x="410" y="145" width="270" height="240" class="am"/>
  <text x="445" y="185" class="text">table_* wrapper</text>
  <text x="445" y="218" class="small">统一校验 flag、snapshot、scan type</text>
  <text x="445" y="252" class="small">再调用 rel-&gt;rd_tableam 回调</text>
  <text x="445" y="296" class="text">Table AM</text>
  <text x="445" y="326" class="small">决定物理读取、可见性、写入和清理</text>
  <text x="445" y="350" class="small">heap 只是其中一种实现</text>

  <rect x="765" y="60" width="250" height="82" class="out"/>
  <text x="787" y="92" class="text">TupleTableSlot</text>
  <text x="787" y="118" class="small">对上层隐藏物理 tuple 格式</text>

  <rect x="765" y="185" width="250" height="82" class="out"/>
  <text x="787" y="217" class="text">TID 与可见版本</text>
  <text x="787" y="243" class="small">索引条目定位表 tuple</text>

  <rect x="765" y="310" width="250" height="82" class="out"/>
  <text x="787" y="342" class="text">WAL / FSM / VM / TOAST</text>
  <text x="787" y="368" class="small">具体实现由 AM 决定</text>

  <rect x="765" y="435" width="250" height="82" class="out"/>
  <text x="787" y="467" class="text">统计与膨胀边界</text>
  <text x="787" y="493" class="small">ANALYZE、VACUUM、规划估算</text>

  <path d="M 320 101 C 355 120 380 140 410 170" class="line"/>
  <path d="M 320 226 L 410 235" class="line"/>
  <path d="M 320 351 L 410 310" class="line"/>
  <path d="M 320 476 C 360 430 385 390 410 350" class="line"/>

  <path d="M 680 190 C 715 155 738 125 765 101" class="line"/>
  <path d="M 680 240 L 765 226" class="line"/>
  <path d="M 680 315 L 765 351" class="line"/>
  <path d="M 680 355 C 718 400 742 435 765 476" class="line"/>

  <path d="M 190 517 C 315 575 685 575 890 517" class="dashed"/>
  <text x="365" y="586" class="small">维护动作会反过来影响优化器统计、可见性图、索引垃圾和后续扫描成本</text>
</svg>
