<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">heap 表访问方法的挂接方式</title>
  <desc id="desc">展示 heap_tableam_handler 返回 heapam_methods，回调进一步连接到 heapam.c、visibility、vacuum、toast 和 block storage。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <style>
    .entry { fill: #e7f0ff; stroke: #1d4ed8; stroke-width: 1.6; rx: 8; }
    .table { fill: #f8fafc; stroke: #344054; stroke-width: 1.3; rx: 8; }
    .impl { fill: #ecfdf3; stroke: #047857; stroke-width: 1.3; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.3; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #344054; }
    .arrow { stroke: #344054; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="45" y="60" width="260" height="85" class="entry"/>
  <text x="70" y="94" class="text">pg_am: heap</text>
  <text x="70" y="122" class="small">amhandler = heap_tableam_handler</text>

  <rect x="380" y="60" width="270" height="85" class="entry"/>
  <text x="405" y="94" class="text">heap_tableam_handler()</text>
  <text x="405" y="122" class="small">返回 static const heapam_methods</text>

  <rect x="725" y="45" width="270" height="115" class="table"/>
  <text x="750" y="80" class="text">heapam_methods</text>
  <text x="750" y="108" class="small">TableAmRoutine 函数指针表</text>
  <text x="750" y="132" class="small">slot 使用 BufferHeapTuple slot</text>

  <path d="M 305 103 L 380 103" class="arrow"/>
  <path d="M 650 103 L 725 103" class="arrow"/>

  <rect x="65" y="250" width="210" height="105" class="impl"/>
  <text x="88" y="284" class="text">扫描路径</text>
  <text x="88" y="312" class="small">heap_beginscan</text>
  <text x="88" y="336" class="small">heap_getnextslot</text>

  <rect x="305" y="250" width="210" height="105" class="impl"/>
  <text x="328" y="284" class="text">写入路径</text>
  <text x="328" y="312" class="small">heap_insert</text>
  <text x="328" y="336" class="small">heap_multi_insert</text>

  <rect x="545" y="250" width="210" height="105" class="impl"/>
  <text x="568" y="284" class="text">MVCC 路径</text>
  <text x="568" y="312" class="small">heap_update / delete / lock</text>
  <text x="568" y="336" class="small">visibility + HOT 链</text>

  <rect x="785" y="250" width="210" height="105" class="impl"/>
  <text x="808" y="284" class="text">维护路径</text>
  <text x="808" y="312" class="small">heap_vacuum_rel</text>
  <text x="808" y="336" class="small">CLUSTER / index build</text>

  <path d="M 785 160 C 670 210 310 205 170 250" class="arrow"/>
  <path d="M 830 160 C 700 210 490 210 410 250" class="arrow"/>
  <path d="M 875 160 C 790 205 700 215 650 250" class="arrow"/>
  <path d="M 905 160 C 905 205 895 225 890 250" class="arrow"/>

  <rect x="145" y="430" width="730" height="65" class="warn"/>
  <text x="170" y="456" class="text">heap 是默认实现，不是接口本身</text>
  <text x="170" y="482" class="small">标准 page layout、共享 buffer、visibility map、FSM、TOAST 和 WAL 细节属于 heap 选择；Table AM API 允许别的实现采用不同物理组织。</text>
</svg>
