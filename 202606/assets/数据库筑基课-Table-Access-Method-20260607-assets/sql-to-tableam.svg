<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">从 SQL 选择表访问方法到 relcache 挂接回调</title>
  <desc id="desc">展示 CREATE TABLE USING、default_table_access_method、pg_am、pg_class.relam、relcache 和 TableAmRoutine 之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #344054; stroke-width: 1.4; rx: 8; }
    .strong { fill: #e7f0ff; stroke: #1d4ed8; stroke-width: 1.6; rx: 8; }
    .catalog { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
    .cache { fill: #ecfdf3; stroke: #047857; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-size: 14px; fill: #344054; }
    .label { font-size: 13px; fill: #475467; }
    .arrow { stroke: #344054; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="45" width="250" height="88" class="strong"/>
  <text x="52" y="78" class="text">CREATE TABLE ... USING method</text>
  <text x="52" y="108" class="small">显式指定表访问方法</text>

  <rect x="30" y="190" width="250" height="88" class="box"/>
  <text x="52" y="224" class="text">default_table_access_method</text>
  <text x="52" y="254" class="small">未指定 USING 时使用，默认 heap</text>

  <rect x="355" y="55" width="235" height="95" class="catalog"/>
  <text x="377" y="88" class="text">pg_am</text>
  <text x="377" y="116" class="small">amname = method</text>
  <text x="377" y="138" class="small">amtype = 't', amhandler</text>

  <rect x="355" y="220" width="235" height="95" class="catalog"/>
  <text x="377" y="253" class="text">pg_class.relam</text>
  <text x="377" y="281" class="small">保存表或物化视图的 AM OID</text>
  <text x="377" y="303" class="small">非表对象通常为 0</text>

  <rect x="675" y="105" width="255" height="95" class="cache"/>
  <text x="697" y="138" class="text">relcache</text>
  <text x="697" y="166" class="small">rd_amhandler</text>
  <text x="697" y="188" class="small">rd_tableam = GetTableAmRoutine()</text>

  <rect x="675" y="280" width="255" height="95" class="strong"/>
  <text x="697" y="313" class="text">TableAmRoutine</text>
  <text x="697" y="341" class="small">scan / insert / update / vacuum</text>
  <text x="697" y="363" class="small">planner / analyze / index fetch</text>

  <path d="M 280 89 L 355 96" class="arrow"/>
  <path d="M 280 234 L 355 252" class="arrow"/>
  <path d="M 472 150 L 472 220" class="arrow"/>
  <path d="M 590 267 L 675 153" class="arrow"/>
  <path d="M 802 200 L 802 280" class="arrow"/>
  <text x="300" y="76" class="label">get_table_am_oid()</text>
  <text x="604" y="223" class="label">打开关系时装载</text>
  <text x="812" y="243" class="label">函数指针表</text>

  <rect x="30" y="350" width="590" height="55" fill="#ffffff" stroke="#d0d5dd" stroke-width="1.2" rx="8"/>
  <text x="50" y="383" class="small">分区根表可以记录 relam 供分区继承，但根表本身没有 rd_tableam；真正存储数据的是叶子分区。</text>
</svg>
