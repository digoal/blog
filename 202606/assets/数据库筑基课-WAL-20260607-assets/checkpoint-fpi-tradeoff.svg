<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint 与 full-page image 权衡</title>
  <desc id="desc">展示 checkpoint 如何决定 redo 起点，较短 checkpoint 间隔如何减少恢复时间但增加脏页写入和 full-page image WAL 流量。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .axis { stroke: #334155; stroke-width: 2; }
    .tick { stroke: #64748b; stroke-width: 2; }
    .ckpt { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .page { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 6; }
    .redo { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .cost { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #334155; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .green { stroke: #15803d; stroke-width: 2.6; fill: none; marker-end: url(#arrow-green); }
    .orange { stroke: #c2410c; stroke-width: 2.2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow-orange); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="text" x="42" y="48">Checkpoint 的两面：缩短恢复窗口，也制造写入和 FPI 成本</text>

  <line class="axis" x1="80" y1="180" x2="1030" y2="180"/>
  <line class="tick" x1="170" y1="160" x2="170" y2="205"/>
  <line class="tick" x1="520" y1="160" x2="520" y2="205"/>
  <line class="tick" x1="870" y1="160" x2="870" y2="205"/>
  <text class="small" x="142" y="235">CKPT 1</text>
  <text class="small" x="492" y="235">CKPT 2</text>
  <text class="small" x="842" y="235">CKPT 3</text>
  <text class="label" x="965" y="155">WAL LSN 增长方向</text>

  <rect class="ckpt" x="90" y="70" width="260" height="90"/>
  <text class="text" x="120" y="107">写 checkpoint record</text>
  <text class="small" x="120" y="136">记录 redo 起点到 pg_control</text>
  <path class="arrow" d="M220 160 V180"/>

  <rect class="page" x="380" y="80" width="205" height="80"/>
  <text class="text" x="410" y="112">首改页面 A</text>
  <text class="small" x="410" y="139">写 full-page image</text>
  <path class="orange" d="M482 160 V180"/>

  <rect class="page" x="620" y="80" width="205" height="80"/>
  <text class="text" x="650" y="112">首改页面 B</text>
  <text class="small" x="650" y="139">写 full-page image</text>
  <path class="orange" d="M722 160 V180"/>

  <rect class="redo" x="510" y="285" width="300" height="98"/>
  <text class="text" x="545" y="325">崩溃恢复扫描窗口</text>
  <text class="small" x="545" y="356">从最近 checkpoint 的 redo 开始</text>
  <path class="green" d="M520 205 C540 245 580 270 630 285"/>
  <path class="green" d="M870 205 C850 245 800 270 740 285"/>

  <rect class="cost" x="85" y="440" width="300" height="105"/>
  <text class="text" x="120" y="478">checkpoint 更频繁</text>
  <text class="small" x="120" y="509">恢复 WAL 更少</text>
  <text class="small" x="120" y="534">脏页写出和 FPI 更多</text>

  <rect class="cost" x="420" y="440" width="300" height="105"/>
  <text class="text" x="455" y="478">checkpoint 更稀疏</text>
  <text class="small" x="455" y="509">WAL 与恢复窗口更长</text>
  <text class="small" x="455" y="534">FPI 尖峰相对减少</text>

  <rect class="cost" x="755" y="440" width="300" height="105"/>
  <text class="text" x="790" y="478">completion target</text>
  <text class="small" x="790" y="509">把脏页写出摊开</text>
  <text class="small" x="790" y="534">避免 checkpoint I/O 突刺</text>
</svg>
