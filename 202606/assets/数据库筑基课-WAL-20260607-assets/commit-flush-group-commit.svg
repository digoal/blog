<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">提交刷 WAL 与 group commit</title>
  <desc id="desc">展示同步提交、异步提交、WAL writer、group commit 和 synchronous_commit 的持久性边界。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .wal { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .sync { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .async { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #334155; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .green { stroke: #15803d; stroke-width: 2.8; fill: none; marker-end: url(#arrow-green); }
    .orange { stroke: #b45309; stroke-width: 2.8; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow-orange); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="600"/>
  <text class="text" x="42" y="48">提交路径：同步提交等待 flush，异步提交等待后台 WAL writer 补刷</text>

  <rect class="box" x="60" y="95" width="170" height="85"/>
  <text class="text" x="96" y="131">事务 A</text>
  <text class="small" x="96" y="158">commit record</text>

  <rect class="box" x="60" y="215" width="170" height="85"/>
  <text class="text" x="96" y="251">事务 B</text>
  <text class="small" x="96" y="278">commit record</text>

  <rect class="box" x="60" y="335" width="170" height="85"/>
  <text class="text" x="96" y="371">事务 C</text>
  <text class="small" x="96" y="398">commit record</text>

  <rect class="wal" x="330" y="170" width="250" height="160"/>
  <text class="text" x="375" y="214">WAL buffer</text>
  <text class="small" x="375" y="247">多个后端追加 LSN</text>
  <text class="small" x="375" y="276">等待插入完成</text>
  <text class="small" x="375" y="304">合并一次写出请求</text>

  <rect class="sync" x="700" y="90" width="265" height="120"/>
  <text class="text" x="743" y="130">同步提交路径</text>
  <text class="small" x="743" y="163">XLogFlush(commit LSN)</text>
  <text class="small" x="743" y="190">返回前已本地持久</text>

  <rect class="async" x="700" y="280" width="265" height="135"/>
  <text class="text" x="743" y="322">异步提交路径</text>
  <text class="small" x="743" y="355">记录 async commit LSN</text>
  <text class="small" x="743" y="382">先返回客户端</text>
  <text class="small" x="743" y="407">WAL writer 周期刷盘</text>

  <rect class="wal" x="700" y="470" width="265" height="70"/>
  <text class="text" x="753" y="513">WAL segment 持久存储</text>

  <path class="arrow" d="M230 138 C270 138 288 198 330 218"/>
  <path class="arrow" d="M230 258 H330"/>
  <path class="arrow" d="M230 378 C270 378 288 310 330 292"/>
  <path class="green" d="M580 215 C620 180 654 150 700 150"/>
  <path class="green" d="M832 210 V470"/>
  <path class="orange" d="M580 285 C630 315 650 348 700 348"/>
  <path class="orange" d="M832 415 V470"/>

  <text class="label" x="255" y="120">多个事务靠近提交点</text>
  <text class="label" x="595" y="166">group commit piggyback</text>
  <text class="label" x="594" y="330">synchronous_commit=off</text>

  <text class="small" x="60" y="520">同步提交：客户端收到成功前，commit record 已刷到 durable storage。异步提交：数据库仍能恢复一致状态，但崩溃时最近成功返回的事务可能丢失。</text>
  <text class="small" x="60" y="552">`commit_delay` 只是在同步 flush 前短暂等待更多事务加入同一次 flush；它不是异步提交。</text>
</svg>
