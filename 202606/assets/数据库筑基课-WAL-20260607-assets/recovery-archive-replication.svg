<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">WAL 恢复、归档和复制保留边界</title>
  <desc id="desc">展示 PostgreSQL 启动恢复从 pg_control 和 checkpoint 开始，向前扫描 WAL；归档、流复制和复制槽会影响 WAL 保留。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .wal { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .rec { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .keep { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #334155; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .green { stroke: #15803d; stroke-width: 2.6; fill: none; marker-end: url(#arrow-green); }
    .orange { stroke: #b45309; stroke-width: 2.4; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow-orange); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="640"/>
  <text class="text" x="42" y="48">恢复和保留：WAL 不只是本机崩溃恢复，也是归档、PITR 和复制链路</text>

  <rect class="box" x="60" y="100" width="210" height="100"/>
  <text class="text" x="102" y="138">pg_control</text>
  <text class="small" x="102" y="170">最近 checkpoint</text>

  <rect class="wal" x="350" y="85" width="260" height="130"/>
  <text class="text" x="398" y="126">checkpoint record</text>
  <text class="small" x="398" y="158">redo LSN</text>
  <text class="small" x="398" y="186">full_page_writes / wal_level</text>

  <rect class="rec" x="710" y="85" width="270" height="130"/>
  <text class="text" x="765" y="126">StartupXLOG</text>
  <text class="small" x="765" y="158">读取 checkpoint</text>
  <text class="small" x="765" y="186">调用 rmgr redo</text>

  <path class="arrow" d="M270 150 H350"/>
  <path class="arrow" d="M610 150 H710"/>

  <line x1="100" y1="300" x2="1040" y2="300" stroke="#334155" stroke-width="2"/>
  <rect class="wal" x="125" y="265" width="135" height="70"/>
  <text class="small" x="155" y="304">seg N</text>
  <rect class="wal" x="270" y="265" width="135" height="70"/>
  <text class="small" x="300" y="304">seg N+1</text>
  <rect class="wal" x="415" y="265" width="135" height="70"/>
  <text class="small" x="445" y="304">seg N+2</text>
  <rect class="wal" x="560" y="265" width="135" height="70"/>
  <text class="small" x="590" y="304">seg N+3</text>
  <rect class="wal" x="705" y="265" width="135" height="70"/>
  <text class="small" x="735" y="304">seg N+4</text>
  <rect class="wal" x="850" y="265" width="135" height="70"/>
  <text class="small" x="880" y="304">seg N+5</text>

  <path class="green" d="M480 215 V265"/>
  <path class="green" d="M480 335 C520 390 655 390 775 335"/>
  <text class="label" x="508" y="250">从 redo LSN 向前扫描</text>

  <rect class="keep" x="95" y="440" width="275" height="115"/>
  <text class="text" x="132" y="478">归档保留</text>
  <text class="small" x="132" y="510">archive_command 成功前</text>
  <text class="small" x="132" y="535">旧 segment 不能回收</text>

  <rect class="keep" x="415" y="440" width="275" height="115"/>
  <text class="text" x="452" y="478">物理复制保留</text>
  <text class="small" x="452" y="510">wal_keep_size / standby lag</text>
  <text class="small" x="452" y="535">落后太多可能断流</text>

  <rect class="keep" x="735" y="440" width="275" height="115"/>
  <text class="text" x="772" y="478">复制槽保留</text>
  <text class="small" x="772" y="510">restart_lsn 固定 WAL</text>
  <text class="small" x="772" y="535">可用 max_slot_wal_keep_size 限制</text>

  <path class="orange" d="M232 440 C200 395 160 375 145 335"/>
  <path class="orange" d="M552 440 C560 392 615 365 628 335"/>
  <path class="orange" d="M872 440 C840 392 795 365 775 335"/>
  <text class="small" x="74" y="605">运维含义：`pg_wal` 空间不是只由 `max_wal_size` 决定；归档失败、standby 落后、复制槽无人消费都能让 WAL 保留超过预期。</text>
</svg>
