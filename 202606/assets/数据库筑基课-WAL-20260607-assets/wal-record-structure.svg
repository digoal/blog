<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">WAL record 结构</title>
  <desc id="desc">展示 PostgreSQL WAL record 的固定头、block reference、full-page image、main data 和资源管理器 redo 之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .seg { stroke: #1e293b; stroke-width: 2; rx: 7; }
    .header { fill: #dbeafe; }
    .block { fill: #e0f2fe; }
    .fpi { fill: #fef3c7; }
    .main { fill: #dcfce7; }
    .rmgr { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #334155; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #1e293b; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="text" x="42" y="48">WAL record：统一头 + 多个块引用 + rmgr 私有数据</text>

  <rect class="seg header" x="55" y="110" width="230" height="120"/>
  <text class="text" x="82" y="145">XLogRecord</text>
  <text class="mono" x="82" y="174">xl_tot_len</text>
  <text class="mono" x="82" y="197">xl_xid / xl_prev</text>
  <text class="mono" x="82" y="220">xl_rmid / xl_crc</text>

  <rect class="seg block" x="285" y="110" width="205" height="120"/>
  <text class="text" x="314" y="145">Block ref #0</text>
  <text class="small" x="314" y="176">relfilenode / fork</text>
  <text class="small" x="314" y="203">block number</text>

  <rect class="seg fpi" x="490" y="110" width="205" height="120"/>
  <text class="text" x="526" y="145">Page image</text>
  <text class="small" x="526" y="176">首改页 FPI</text>
  <text class="small" x="526" y="203">可压缩、可去 hole</text>

  <rect class="seg block" x="695" y="110" width="205" height="120"/>
  <text class="text" x="724" y="145">Block ref #1</text>
  <text class="small" x="724" y="176">块级 payload</text>
  <text class="small" x="724" y="203">redo 定位页面</text>

  <rect class="seg main" x="900" y="110" width="65" height="120"/>
  <text class="text" transform="translate(936 204) rotate(-90)">Main data</text>

  <rect class="rmgr" x="120" y="340" width="260" height="125"/>
  <text class="text" x="153" y="382">资源管理器 rmgr</text>
  <text class="small" x="153" y="414">Heap / Btree / Xact / CLOG</text>
  <text class="small" x="153" y="441">对应 redo/desc/identify</text>

  <rect class="rmgr" x="465" y="340" width="245" height="125"/>
  <text class="text" x="504" y="382">XLogReader</text>
  <text class="small" x="504" y="414">校验 CRC</text>
  <text class="small" x="504" y="441">解析 block ref 和 data</text>

  <rect class="rmgr" x="795" y="340" width="245" height="125"/>
  <text class="text" x="841" y="382">REDO routine</text>
  <text class="small" x="841" y="414">按 rmgr 类型重放</text>
  <text class="small" x="841" y="441">恢复页面或事务状态</text>

  <path class="arrow" d="M495 230 C500 285 525 318 568 340"/>
  <path class="arrow" d="M795 230 C785 286 740 318 650 340"/>
  <path class="arrow" d="M380 402 H465"/>
  <path class="arrow" d="M710 402 H795"/>

  <text class="small" x="64" y="524">关键点 1：`xl_rmid` 指向资源管理器，redo 逻辑由 Heap、Btree、Transaction 等模块解释。</text>
  <text class="small" x="64" y="553">关键点 2：注册过的 block ref 让恢复过程能定位页面；首改页可能携带 full-page image 防 torn page。</text>
  <text class="small" x="64" y="582">关键点 3：WAL record 有 CRC-32C，恢复、复制和归档读取时会校验记录内容。</text>
</svg>
