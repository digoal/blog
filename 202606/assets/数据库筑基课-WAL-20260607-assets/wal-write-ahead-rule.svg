<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">WAL 先写日志规则</title>
  <desc id="desc">展示 PostgreSQL 修改数据页时，必须先把描述修改的 WAL 刷到持久存储，再允许脏数据页落盘。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .accent { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
    .warn { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .ok { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 21px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #334155; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #475569; }
    .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .safe { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
    .bad { stroke: #b45309; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow-orange); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f172a"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="560"/>
  <text class="text" x="42" y="48">WAL 的核心规则：描述修改的日志必须先于数据页持久化</text>

  <rect class="box" x="45" y="105" width="205" height="92"/>
  <text class="text" x="78" y="145">后台进程</text>
  <text class="small" x="78" y="174">修改共享缓冲区页面</text>

  <rect class="accent" x="330" y="82" width="255" height="138"/>
  <text class="text" x="365" y="126">构造 WAL record</text>
  <text class="small" x="365" y="158">rmgr + block ref + data</text>
  <text class="small" x="365" y="187">可包含 full-page image</text>

  <rect class="accent" x="665" y="82" width="255" height="138"/>
  <text class="text" x="706" y="126">WAL 缓冲区</text>
  <text class="small" x="706" y="158">按 LSN 追加</text>
  <text class="small" x="706" y="187">XLogInsertRecord()</text>

  <rect class="ok" x="665" y="310" width="255" height="125"/>
  <text class="text" x="704" y="354">WAL 持久化</text>
  <text class="small" x="704" y="386">XLogFlush()</text>
  <text class="small" x="704" y="414">write + fsync / O_DSYNC</text>

  <rect class="warn" x="330" y="320" width="255" height="110"/>
  <text class="text" x="362" y="361">脏数据页落盘</text>
  <text class="small" x="362" y="392">允许条件：page LSN</text>
  <text class="small" x="362" y="418">不超过已刷 WAL LSN</text>

  <rect class="box" x="70" y="330" width="205" height="94"/>
  <text class="text" x="108" y="371">崩溃恢复</text>
  <text class="small" x="108" y="401">从 checkpoint REDO</text>

  <path class="arrow" d="M250 151 H330"/>
  <path class="arrow" d="M585 151 H665"/>
  <path class="safe" d="M792 220 V310"/>
  <path class="safe" d="M665 373 H585"/>
  <path class="safe" d="M330 376 H275"/>
  <path class="bad" d="M458 320 C458 268 545 260 665 260"/>

  <text class="label" x="286" y="137">1. 修改先在内存发生</text>
  <text class="label" x="606" y="137">2. 记录获得 LSN</text>
  <text class="label" x="808" y="275">3. 提交或写出前刷 WAL</text>
  <text class="label" x="545" y="358">4. 数据页随后可落盘</text>
  <text class="label" x="448" y="278">禁止：数据页先持久、WAL 未持久</text>

  <line x1="52" y1="492" x2="1065" y2="492" stroke="#cbd5e1" stroke-width="2"/>
  <text class="small" x="62" y="525">工程含义：提交可以只等待顺序写 WAL，不必立即把每个被修改的数据页随机刷盘；崩溃后用 WAL REDO 补齐数据页。</text>
</svg>
