<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">advisory 锁是应用协议，不是数据约束</title>
  <desc id="desc">展示两个会话围绕同一个业务资源使用 advisory 锁，数据库只管理数字锁键，不理解业务含义，也不会自动阻止普通 DML。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d5a80"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #1f2933; }
      .label { font: 600 17px sans-serif; fill: #1f2933; }
      .small { font: 14px sans-serif; fill: #334155; }
      .muted { font: 13px sans-serif; fill: #64748b; }
      .box { fill: #f8fafc; stroke: #8aa1b4; stroke-width: 1.5; rx: 8; }
      .app { fill: #eef6ff; stroke: #3d5a80; stroke-width: 1.5; rx: 8; }
      .db { fill: #f7f1e8; stroke: #936639; stroke-width: 1.5; rx: 8; }
      .warn { fill: #fff4df; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .ok { fill: #eaf7ef; stroke: #2f855a; stroke-width: 1.5; rx: 8; }
      .line { stroke: #3d5a80; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #b45309; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="26" y="24" width="868" height="472" fill="#ffffff" stroke="#d7dee8" rx="10"/>
  <text x="54" y="64" class="title">advisory 锁：数据库保存“锁键”，业务负责遵守协议</text>

  <rect x="62" y="108" width="215" height="110" class="app"/>
  <text x="86" y="144" class="label">会话 A</text>
  <text x="86" y="173" class="small">pg_advisory_xact_lock(42)</text>
  <text x="86" y="197" class="muted">表示“我正在处理资源 42”</text>

  <rect x="62" y="298" width="215" height="110" class="app"/>
  <text x="86" y="334" class="label">会话 B</text>
  <text x="86" y="363" class="small">pg_try_advisory_xact_lock(42)</text>
  <text x="86" y="387" class="muted">成功或失败，由锁管理器判断</text>

  <rect x="352" y="126" width="234" height="250" class="db"/>
  <text x="386" y="164" class="label">PostgreSQL 锁管理器</text>
  <text x="386" y="199" class="small">LOCKTAG_ADVISORY</text>
  <text x="386" y="226" class="small">key = 42</text>
  <text x="386" y="253" class="small">mode = ExclusiveLock</text>
  <text x="386" y="280" class="small">method = USER_LOCKMETHOD</text>
  <text x="386" y="316" class="muted">只判断锁键和锁模式冲突</text>
  <text x="386" y="340" class="muted">不理解“订单、租户、任务”等语义</text>

  <rect x="662" y="100" width="196" height="118" class="ok"/>
  <text x="684" y="136" class="label">遵守协议</text>
  <text x="684" y="166" class="small">先拿锁，再读写资源</text>
  <text x="684" y="191" class="small">冲突时等待、跳过或重试</text>

  <rect x="662" y="300" width="196" height="118" class="warn"/>
  <text x="684" y="336" class="label">绕过协议</text>
  <text x="684" y="366" class="small">直接 UPDATE 业务表</text>
  <text x="684" y="391" class="small">advisory 锁不会自动拦截</text>

  <path d="M 278 162 L 350 205" class="line"/>
  <path d="M 278 353 L 350 296" class="line"/>
  <path d="M 586 206 L 660 159" class="line"/>
  <path d="M 586 298 L 660 359" class="dash"/>

  <text x="86" y="462" class="small">工程含义：advisory 锁适合表达“应用自定义资源”的互斥，但不是约束、触发器或行锁的替代品。</text>
</svg>
