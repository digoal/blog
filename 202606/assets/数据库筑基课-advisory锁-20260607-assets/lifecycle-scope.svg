<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" role="img" aria-labelledby="title desc">
  <title id="title">会话级与事务级 advisory 锁生命周期</title>
  <desc id="desc">对比会话级 advisory 锁和事务级 advisory 锁在提交、回滚、显式 unlock、断开连接和 DISCARD ALL 下的释放行为。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #1f2933; }
      .head { font: 700 17px sans-serif; fill: #1f2933; }
      .text { font: 14px sans-serif; fill: #334155; }
      .mono { font: 14px monospace; fill: #1e293b; }
      .session { fill: #eef6ff; stroke: #3d5a80; stroke-width: 1.5; rx: 8; }
      .xact { fill: #eaf7ef; stroke: #2f855a; stroke-width: 1.5; rx: 8; }
      .event { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.2; rx: 7; }
      .warn { fill: #fff4df; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .keep { stroke: #3d5a80; stroke-width: 4; }
      .drop { stroke: #2f855a; stroke-width: 4; }
    </style>
  </defs>
  <rect x="26" y="24" width="888" height="510" fill="#ffffff" stroke="#d7dee8" rx="10"/>
  <text x="54" y="64" class="title">同一个 key，两种生命周期：最容易出事故的是会话级</text>

  <rect x="66" y="108" width="230" height="92" class="session"/>
  <text x="88" y="140" class="head">会话级</text>
  <text x="88" y="170" class="mono">pg_advisory_lock(key)</text>
  <text x="88" y="192" class="text">owner = session</text>

  <rect x="66" y="332" width="230" height="92" class="xact"/>
  <text x="88" y="364" class="head">事务级</text>
  <text x="88" y="394" class="mono">pg_advisory_xact_lock(key)</text>
  <text x="88" y="416" class="text">owner = ResourceOwner</text>

  <rect x="360" y="98" width="132" height="58" class="event"/>
  <text x="385" y="132" class="text">COMMIT</text>
  <rect x="530" y="98" width="132" height="58" class="event"/>
  <text x="558" y="132" class="text">ROLLBACK</text>
  <rect x="700" y="98" width="132" height="58" class="event"/>
  <text x="732" y="132" class="text">断开连接</text>

  <rect x="360" y="200" width="132" height="58" class="event"/>
  <text x="378" y="234" class="text">显式 unlock</text>
  <rect x="530" y="200" width="132" height="58" class="event"/>
  <text x="556" y="234" class="text">DISCARD ALL</text>
  <rect x="700" y="200" width="132" height="58" class="warn"/>
  <text x="719" y="226" class="text">连接池复用</text>
  <text x="722" y="248" class="text">可能残留</text>

  <rect x="360" y="322" width="132" height="58" class="event"/>
  <text x="385" y="356" class="text">COMMIT</text>
  <rect x="530" y="322" width="132" height="58" class="event"/>
  <text x="558" y="356" class="text">ROLLBACK</text>
  <rect x="700" y="322" width="132" height="58" class="event"/>
  <text x="728" y="356" class="text">无手动释放</text>

  <path d="M 296 154 L 358 127" class="line"/>
  <path d="M 296 154 L 528 127" class="line"/>
  <path d="M 296 154 L 698 127" class="line"/>
  <path d="M 296 154 L 358 229" class="line"/>
  <path d="M 296 154 L 528 229" class="line"/>
  <path d="M 296 154 L 698 229" class="line"/>

  <path d="M 296 378 L 358 351" class="line"/>
  <path d="M 296 378 L 528 351" class="line"/>
  <path d="M 296 378 L 698 351" class="line"/>

  <line x1="384" y1="166" x2="468" y2="166" class="keep"/>
  <text x="385" y="188" class="text">继续持有</text>
  <line x1="554" y1="166" x2="638" y2="166" class="keep"/>
  <text x="552" y="188" class="text">继续持有</text>
  <line x1="724" y1="166" x2="808" y2="166" class="drop"/>
  <text x="724" y="188" class="text">释放</text>
  <line x1="384" y1="268" x2="468" y2="268" class="drop"/>
  <text x="384" y="290" class="text">释放一层</text>
  <line x1="554" y1="268" x2="638" y2="268" class="drop"/>
  <text x="546" y="290" class="text">释放全部会话锁</text>

  <line x1="384" y1="390" x2="468" y2="390" class="drop"/>
  <text x="384" y="412" class="text">自动释放</text>
  <line x1="554" y1="390" x2="638" y2="390" class="drop"/>
  <text x="554" y="412" class="text">自动释放</text>
  <line x1="724" y1="390" x2="808" y2="390" class="drop"/>
  <text x="704" y="412" class="text">函数族没有 unlock</text>

  <text x="74" y="500" class="text">结论：短事务内互斥优先选事务级；会话级必须用 finally/ensure 或连接池 reset 保证释放。</text>
</svg>
