<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">advisory 锁进入普通锁管理器的路径</title>
  <desc id="desc">展示 advisory SQL 函数构造 LOCKTAG 后调用 LockAcquire，进入 LOCALLOCK、LOCK、PROCLOCK 和等待队列，由普通死锁检测处理等待。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d5a80"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #1f2933; }
      .head { font: 700 16px sans-serif; fill: #1f2933; }
      .text { font: 14px sans-serif; fill: #334155; }
      .mono { font: 14px monospace; fill: #1e293b; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; rx: 8; }
      .call { fill: #eef6ff; stroke: #3d5a80; stroke-width: 1.5; rx: 8; }
      .mem { fill: #eaf7ef; stroke: #2f855a; stroke-width: 1.5; rx: 8; }
      .wait { fill: #fff4df; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .line { stroke: #3d5a80; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #64748b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="26" y="24" width="928" height="562" fill="#ffffff" stroke="#d7dee8" rx="10"/>
  <text x="54" y="64" class="title">从 SQL 函数到 LOCK / PROCLOCK：没有单独的 advisory 锁引擎</text>

  <rect x="58" y="110" width="210" height="96" class="call"/>
  <text x="78" y="143" class="head">SQL 函数</text>
  <text x="78" y="172" class="mono">pg_advisory_lock(...)</text>
  <text x="78" y="194" class="mono">pg_try_advisory_xact_lock(...)</text>

  <rect x="332" y="98" width="264" height="120" class="call"/>
  <text x="354" y="132" class="head">构造 LOCKTAG</text>
  <text x="354" y="162" class="mono">LOCKTAG_ADVISORY</text>
  <text x="354" y="186" class="mono">USER_LOCKMETHOD</text>
  <text x="354" y="208" class="text">scope 和 wait 由函数族决定</text>

  <rect x="662" y="98" width="236" height="120" class="call"/>
  <text x="684" y="132" class="head">LockAcquire</text>
  <text x="684" y="162" class="mono">mode = ShareLock | ExclusiveLock</text>
  <text x="684" y="186" class="mono">sessionLock = true | false</text>
  <text x="684" y="208" class="mono">dontWait = true | false</text>

  <rect x="58" y="288" width="210" height="116" class="mem"/>
  <text x="78" y="322" class="head">LOCALLOCK</text>
  <text x="78" y="352" class="text">每个后端本地计数</text>
  <text x="78" y="376" class="text">同一锁重复获取会叠加</text>
  <text x="78" y="398" class="text">区分 owner：会话或事务</text>

  <rect x="332" y="288" width="264" height="116" class="mem"/>
  <text x="354" y="322" class="head">共享 LOCK 对象</text>
  <text x="354" y="352" class="text">由 LOCKTAG 哈希定位</text>
  <text x="354" y="376" class="text">grantMask / waitMask 记录模式</text>
  <text x="354" y="398" class="text">不同 key 是不同锁对象</text>

  <rect x="662" y="288" width="236" height="116" class="mem"/>
  <text x="684" y="322" class="head">PROCLOCK</text>
  <text x="684" y="352" class="text">后端与 LOCK 的关系</text>
  <text x="684" y="376" class="text">holdMask 表示已授予模式</text>
  <text x="684" y="398" class="text">releaseMask 用于批量释放</text>

  <rect x="210" y="472" width="236" height="72" class="wait"/>
  <text x="232" y="504" class="head">冲突则进入 waitProcs</text>
  <text x="232" y="530" class="text">等待持有者释放或死锁检测触发</text>

  <rect x="530" y="472" width="238" height="72" class="wait"/>
  <text x="552" y="504" class="head">deadlock_timeout 后检查</text>
  <text x="552" y="530" class="text">普通死锁检测可报告 advisory 锁</text>

  <path d="M 268 158 L 330 158" class="line"/>
  <path d="M 596 158 L 660 158" class="line"/>
  <path d="M 780 220 L 780 286" class="line"/>
  <path d="M 662 346 L 598 346" class="thin"/>
  <path d="M 332 346 L 270 346" class="thin"/>
  <path d="M 464 220 L 464 286" class="line"/>
  <path d="M 463 405 C 444 444, 404 461, 344 471" class="line"/>
  <path d="M 446 508 L 528 508" class="line"/>

  <text x="76" y="574" class="text">结果：advisory 锁复用 heavyweight lock 的共享内存、等待队列和死锁检测；它的特殊性主要在锁对象含义和生命周期。</text>
</svg>
