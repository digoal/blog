<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" role="img" aria-labelledby="title desc">
  <title id="title">advisory 锁的 LOCKTAG 编码</title>
  <desc id="desc">展示 PostgreSQL 将 bigint 键或两个 int4 键编码进 LOCKTAG 的四个字段，并在 pg_locks 中显示为 database、classid、objid、objsubid。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #1f2933; }
      .head { font: 700 16px sans-serif; fill: #1f2933; }
      .text { font: 14px sans-serif; fill: #334155; }
      .mono { font: 14px monospace; fill: #1e293b; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; rx: 8; }
      .field { fill: #eef6ff; stroke: #3d5a80; stroke-width: 1.3; rx: 6; }
      .field2 { fill: #eaf7ef; stroke: #2f855a; stroke-width: 1.3; rx: 6; }
      .field3 { fill: #fff4df; stroke: #b45309; stroke-width: 1.3; rx: 6; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="26" y="24" width="888" height="510" fill="#ffffff" stroke="#d7dee8" rx="10"/>
  <text x="54" y="64" class="title">LOCKTAG_ADVISORY：同一个数字键如何进入锁表</text>

  <rect x="60" y="104" width="250" height="144" class="box"/>
  <text x="84" y="138" class="head">输入形式 A</text>
  <text x="84" y="172" class="mono">pg_advisory_lock(key bigint)</text>
  <text x="84" y="204" class="text">64 位 key 被拆成高 32 位和低 32 位</text>
  <text x="84" y="228" class="text">key space 标记为 1</text>

  <rect x="60" y="314" width="250" height="144" class="box"/>
  <text x="84" y="348" class="head">输入形式 B</text>
  <text x="84" y="382" class="mono">pg_advisory_lock(key1 int, key2 int)</text>
  <text x="84" y="414" class="text">两个 32 位 key 原样进入字段</text>
  <text x="84" y="438" class="text">key space 标记为 2</text>

  <rect x="378" y="96" width="486" height="170" class="box"/>
  <text x="402" y="128" class="head">LOCKTAG 字段，bigint key</text>
  <rect x="402" y="154" width="98" height="70" class="field"/>
  <text x="420" y="184" class="mono">field1</text>
  <text x="416" y="209" class="text">MyDatabaseId</text>
  <rect x="512" y="154" width="98" height="70" class="field2"/>
  <text x="530" y="184" class="mono">field2</text>
  <text x="527" y="209" class="text">key 高位</text>
  <rect x="622" y="154" width="98" height="70" class="field2"/>
  <text x="640" y="184" class="mono">field3</text>
  <text x="637" y="209" class="text">key 低位</text>
  <rect x="732" y="154" width="98" height="70" class="field3"/>
  <text x="750" y="184" class="mono">field4</text>
  <text x="768" y="209" class="text">1</text>
  <text x="402" y="249" class="mono">type = LOCKTAG_ADVISORY, lockmethodid = USER_LOCKMETHOD</text>

  <rect x="378" y="306" width="486" height="170" class="box"/>
  <text x="402" y="338" class="head">LOCKTAG 字段，两个 int4 key</text>
  <rect x="402" y="364" width="98" height="70" class="field"/>
  <text x="420" y="394" class="mono">field1</text>
  <text x="416" y="419" class="text">MyDatabaseId</text>
  <rect x="512" y="364" width="98" height="70" class="field2"/>
  <text x="530" y="394" class="mono">field2</text>
  <text x="539" y="419" class="text">key1</text>
  <rect x="622" y="364" width="98" height="70" class="field2"/>
  <text x="640" y="394" class="mono">field3</text>
  <text x="649" y="419" class="text">key2</text>
  <rect x="732" y="364" width="98" height="70" class="field3"/>
  <text x="750" y="394" class="mono">field4</text>
  <text x="768" y="419" class="text">2</text>
  <text x="402" y="459" class="mono">type = LOCKTAG_ADVISORY, lockmethodid = USER_LOCKMETHOD</text>

  <path d="M 312 176 L 376 176" class="line"/>
  <path d="M 312 386 L 376 386" class="line"/>

  <text x="72" y="504" class="text">pg_locks 显示：database = field1，classid = field2，objid = field3，objsubid = field4。</text>
  <text x="72" y="526" class="text">因此 bigint key 与两个 int4 key 的 key space 不重叠；同一数字组合只有编码相同才会互相冲突。</text>
</svg>
