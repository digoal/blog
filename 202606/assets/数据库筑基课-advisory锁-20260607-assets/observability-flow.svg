<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">advisory 锁观测与排障路径</title>
  <desc id="desc">展示如何从 pg_stat_activity 和 pg_locks 识别 advisory 锁等待、还原 key、查 blocker，并区分等待、死锁和泄漏三类问题。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d5a80"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #1f2933; }
      .head { font: 700 16px sans-serif; fill: #1f2933; }
      .text { font: 14px sans-serif; fill: #334155; }
      .mono { font: 13px monospace; fill: #1e293b; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; rx: 8; }
      .metric { fill: #eef6ff; stroke: #3d5a80; stroke-width: 1.5; rx: 8; }
      .action { fill: #eaf7ef; stroke: #2f855a; stroke-width: 1.5; rx: 8; }
      .warn { fill: #fff4df; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .line { stroke: #3d5a80; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="26" y="24" width="908" height="536" fill="#ffffff" stroke="#d7dee8" rx="10"/>
  <text x="54" y="64" class="title">排障闭环：先找等待，再还原 key，最后定位协议问题</text>

  <rect x="60" y="112" width="230" height="98" class="metric"/>
  <text x="84" y="146" class="head">1. 找等待会话</text>
  <text x="84" y="176" class="mono">pg_stat_activity</text>
  <text x="84" y="198" class="mono">wait_event_type = 'Lock'</text>

  <rect x="366" y="112" width="230" height="98" class="metric"/>
  <text x="390" y="146" class="head">2. 查 advisory 锁行</text>
  <text x="390" y="176" class="mono">pg_locks</text>
  <text x="390" y="198" class="mono">locktype = 'advisory'</text>

  <rect x="672" y="112" width="210" height="98" class="metric"/>
  <text x="696" y="146" class="head">3. 找 blocker</text>
  <text x="696" y="176" class="mono">pg_blocking_pids(pid)</text>
  <text x="696" y="198" class="mono">granted / waitstart</text>

  <rect x="110" y="284" width="260" height="120" class="action"/>
  <text x="134" y="318" class="head">还原业务 key</text>
  <text x="134" y="350" class="mono">objsubid = 1: bigint</text>
  <text x="134" y="374" class="mono">(classid::bigint &lt;&lt; 32) | objid</text>
  <text x="134" y="398" class="mono">objsubid = 2: (classid, objid)</text>

  <rect x="456" y="284" width="320" height="120" class="action"/>
  <text x="480" y="318" class="head">判断处置路径</text>
  <text x="480" y="350" class="text">等待：优化持锁时间或改 try-lock</text>
  <text x="480" y="374" class="text">死锁：统一 key 顺序并重试事务</text>
  <text x="480" y="398" class="text">泄漏：修复会话级释放和连接池 reset</text>

  <rect x="110" y="462" width="260" height="58" class="warn"/>
  <text x="134" y="496" class="text">pg_locks 快照很重，避免高频全量轮询</text>

  <rect x="456" y="462" width="320" height="58" class="warn"/>
  <text x="480" y="496" class="text">主备 advisory 锁不传播；跨节点互斥要另设协议</text>

  <path d="M 290 161 L 364 161" class="line"/>
  <path d="M 596 161 L 670 161" class="line"/>
  <path d="M 481 212 C 425 246, 338 256, 264 282" class="line"/>
  <path d="M 696 212 C 666 250, 620 266, 574 282" class="line"/>
  <path d="M 240 405 L 240 460" class="line"/>
  <path d="M 616 405 L 616 460" class="line"/>

  <text x="74" y="552" class="text">观测目标不是只看到“谁锁了谁”，而是把数字 key 映射回业务资源和调用栈。</text>
</svg>
