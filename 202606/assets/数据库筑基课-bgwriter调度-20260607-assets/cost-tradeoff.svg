<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">bgwriter 调度的收益与代价</title>
  <desc id="desc">展示 bgwriter 参数从保守到激进时，后端写等待、后台 I/O、重复写脏页和 checkpoint 尾部压力之间的取舍关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .axis { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .curve1 { stroke: #2563eb; stroke-width: 4; fill: none; }
      .curve2 { stroke: #c2410c; stroke-width: 4; fill: none; }
      .curve3 { stroke: #047857; stroke-width: 4; fill: none; }
      .band { fill: #ecfdf5; stroke: #047857; stroke-width: 2; opacity: 0.85; rx: 8; }
      .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="title" x="40" y="44">bgwriter 调度的目标不是“写得越多越好”，而是把用户路径写等待换成可控后台 I/O</text>

  <path class="axis" d="M 120 500 L 1000 500"/>
  <path class="axis" d="M 120 500 L 120 105"/>
  <text class="small" x="935" y="535">bgwriter 更激进</text>
  <text class="small" x="40" y="120">压力/代价</text>

  <path class="curve1" d="M 150 170 C 300 210 420 310 560 380 C 700 450 845 472 970 482"/>
  <text class="label" x="720" y="455" fill="#2563eb">后端被迫写等待下降</text>

  <path class="curve2" d="M 150 470 C 310 440 435 375 560 300 C 710 210 850 160 970 135"/>
  <text class="label" x="650" y="170" fill="#c2410c">后台 I/O 与重复写风险上升</text>

  <path class="curve3" d="M 150 420 C 330 370 460 280 585 250 C 725 218 850 230 970 270"/>
  <text class="label" x="695" y="275" fill="#047857">checkpoint 尾部压力可能改善但不保证</text>

  <rect class="band" x="425" y="360" width="225" height="75"/>
  <text class="label" x="475" y="392">常见甜点区</text>
  <text class="tiny" x="455" y="418">延迟改善大于额外 I/O 成本</text>

  <rect class="warn" x="745" y="340" width="260" height="96"/>
  <text class="label" x="782" y="372">过度激进的风险</text>
  <text class="small" x="775" y="402">热页被反复写</text>
  <text class="small" x="775" y="426">OS page cache 中间层抖动</text>

  <text class="tiny" x="145" y="530">保守：更多写留给后端</text>
  <text class="tiny" x="790" y="530">激进：更多写提前发生</text>
</svg>
