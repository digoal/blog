<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="680" viewBox="0 0 1160 680" role="img" aria-labelledby="title desc">
  <title id="title">BgBufferSync 反馈控制模型</title>
  <desc id="desc">展示 BgBufferSync 如何根据 clock-sweep 位置、recent_alloc、密度估计、lru multiplier、最小扫描量和 maxpages 上限决定本轮扫描与写出。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .metric { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .calc { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .limit { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .done { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="680"/>
  <text class="title" x="40" y="44">BgBufferSync 不是“每 200ms 写 100 页”，而是一个受上限约束的反馈控制</text>

  <rect class="metric" x="65" y="105" width="250" height="110"/>
  <text class="label" x="100" y="138">StrategySyncStart</text>
  <text class="small" x="95" y="169">读取 clock-sweep 当前位置</text>
  <text class="small" x="95" y="194">取出并清零 recent_alloc</text>

  <rect class="box" x="455" y="88" width="270" height="145"/>
  <text class="label" x="515" y="122">扫描边界</text>
  <text class="small" x="485" y="153">如果 bgwriter 落后</text>
  <text class="small" x="485" y="178">跳到 strategy point</text>
  <text class="small" x="485" y="203">最多扫描到追上为止</text>

  <rect class="calc" x="835" y="85" width="260" height="150"/>
  <text class="label" x="895" y="119">需求预测</text>
  <text class="small" x="860" y="151">smoothed_alloc 快升慢降</text>
  <text class="small" x="860" y="176">乘 bgwriter_lru_multiplier</text>
  <text class="small" x="860" y="201">得到 upcoming_alloc_est</text>

  <rect class="calc" x="245" y="315" width="275" height="130"/>
  <text class="label" x="308" y="348">可复用密度</text>
  <text class="small" x="275" y="379">strategy_delta / recent_alloc</text>
  <text class="small" x="275" y="404">估计扫描多少页可得到</text>
  <text class="small" x="275" y="429">一个 clean reusable buffer</text>

  <rect class="box" x="620" y="315" width="275" height="130"/>
  <text class="label" x="682" y="348">最低巡检</text>
  <text class="small" x="650" y="379">即使无分配，也推进扫描</text>
  <text class="small" x="650" y="404">目标约 120 秒扫完整池</text>
  <text class="small" x="650" y="429">避免空闲后全是脏候选</text>

  <rect class="done" x="275" y="525" width="330" height="95"/>
  <text class="label" x="315" y="558">执行 LRU 清理扫描</text>
  <text class="small" x="310" y="589">从 next_to_clean 向前检查候选 buffer</text>

  <rect class="limit" x="720" y="520" width="330" height="105"/>
  <text class="label" x="770" y="553">三个停止条件</text>
  <text class="small" x="755" y="584">追上 clock-sweep / clean 够用 / 达到 maxpages</text>
  <text class="small" x="755" y="609">命中 maxpages 会增加 maxwritten_clean</text>

  <path class="arrow" d="M 315 160 L 455 160"/>
  <path class="arrow" d="M 725 160 L 835 160"/>
  <path class="arrow" d="M 585 233 C 530 270 468 290 410 315"/>
  <path class="arrow" d="M 965 235 C 915 280 840 300 765 315"/>
  <path class="dash" d="M 382 445 C 390 475 408 500 430 525"/>
  <path class="dash" d="M 755 445 C 730 480 630 508 525 525"/>
  <path class="arrow" d="M 605 572 L 720 572"/>
  <path class="arrow" d="M 885 520 C 925 440 930 330 895 235"/>
  <text class="tiny" x="920" y="410">下一轮继续用平滑状态</text>

  <text class="tiny" x="70" y="260">recent_alloc 只统计普通替换路径的 buffer 分配；使用 ring strategy 的复用不会计入这里。</text>
  <text class="tiny" x="70" y="282">因此大批量扫描、VACUUM、COPY 等路径不能只靠 pg_stat_bgwriter 判断全部写入压力。</text>
</svg>
