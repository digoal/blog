<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">BackgroundWriterMain 主循环与休眠唤醒</title>
  <desc id="desc">展示 PostgreSQL bgwriter 每轮调用 BgBufferSync、等待 bgwriter_delay、空闲时进入 hibernate 并由 buffer allocation 唤醒的调度流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .decision { fill: #fffbeb; stroke: #b45309; stroke-width: 2; }
      .hibernate { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
      .wake { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #047857; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="title" x="40" y="42">BackgroundWriterMain：固定节拍 + 空闲休眠 + 分配唤醒</text>

  <rect class="step" x="75" y="100" width="190" height="88"/>
  <text class="label" x="110" y="132">ResetLatch</text>
  <text class="small" x="100" y="160">清掉旧唤醒信号</text>

  <rect class="step" x="330" y="100" width="210" height="88"/>
  <text class="label" x="370" y="132">BgBufferSync</text>
  <text class="small" x="360" y="160">执行一轮清脏页</text>

  <rect class="step" x="600" y="100" width="210" height="88"/>
  <text class="label" x="642" y="132">报告统计</text>
  <text class="small" x="630" y="160">pg_stat_bgwriter</text>

  <rect class="step" x="865" y="100" width="205" height="88"/>
  <text class="label" x="905" y="132">WaitLatch</text>
  <text class="small" x="895" y="160">等待 bgwriter_delay</text>

  <polygon class="decision" points="535,285 660,220 785,285 660,350"/>
  <text class="label" x="596" y="277">可休眠？</text>
  <text class="tiny" x="574" y="302">连续两轮 timeout</text>
  <text class="tiny" x="570" y="323">且没有新分配</text>

  <rect class="hibernate" x="470" y="430" width="380" height="100"/>
  <text class="label" x="535" y="466">hibernate</text>
  <text class="small" x="515" y="494">注册 StrategyNotifyBgWriter(MyProcNumber)</text>
  <text class="small" x="515" y="518">最长等待 bgwriter_delay × 50</text>

  <rect class="wake" x="70" y="400" width="270" height="125"/>
  <text class="label" x="110" y="435">backend 分配 buffer</text>
  <text class="small" x="100" y="467">StrategyGetBuffer 发现通知请求</text>
  <text class="small" x="100" y="492">SetLatch 唤醒 bgwriter</text>

  <path class="arrow" d="M 265 144 L 330 144"/>
  <path class="arrow" d="M 540 144 L 600 144"/>
  <path class="arrow" d="M 810 144 L 865 144"/>
  <path class="arrow" d="M 968 188 C 965 250 855 285 785 285"/>
  <path class="arrow" d="M 660 350 L 660 430"/>
  <text class="tiny" x="675" y="392">是</text>
  <path class="arrow" d="M 535 285 C 380 285 170 250 170 188"/>
  <text class="tiny" x="332" y="264">否，进入下一轮</text>
  <path class="dash" d="M 470 480 C 410 470 385 462 340 462"/>
  <path class="dash" d="M 205 400 C 180 330 155 260 165 188"/>
  <text class="tiny" x="352" y="450">分配事件唤醒</text>

  <path class="arrow" d="M 850 480 C 1015 460 1028 235 1000 188"/>
  <text class="tiny" x="915" y="380">超时也会醒，避免永久睡眠</text>
</svg>
