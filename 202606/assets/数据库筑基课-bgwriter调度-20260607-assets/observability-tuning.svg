<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="690" viewBox="0 0 1160 690" role="img" aria-labelledby="title desc">
  <title id="title">bgwriter 观测与调参闭环</title>
  <desc id="desc">展示从 pg_stat_bgwriter、pg_stat_io 和等待事件观察 bgwriter，再根据现象调整 maxpages、multiplier、shared_buffers 和 checkpointer 设置的闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .observe { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .symptom { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .action { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .guard { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="690"/>
  <text class="title" x="40" y="44">观测 bgwriter 要看“谁在写、为什么写、有没有打到上限”</text>

  <rect class="observe" x="70" y="95" width="285" height="145"/>
  <text class="label" x="115" y="130">pg_stat_bgwriter</text>
  <text class="small" x="100" y="162">buffers_clean</text>
  <text class="small" x="100" y="188">maxwritten_clean</text>
  <text class="small" x="100" y="214">buffers_alloc</text>

  <rect class="observe" x="440" y="95" width="285" height="145"/>
  <text class="label" x="500" y="130">pg_stat_io</text>
  <text class="small" x="470" y="162">background writer writes</text>
  <text class="small" x="470" y="188">client backend writes</text>
  <text class="small" x="470" y="214">checkpointer writes/writebacks</text>

  <rect class="observe" x="805" y="95" width="285" height="145"/>
  <text class="label" x="875" y="130">等待事件</text>
  <text class="small" x="835" y="162">BgWriterMain</text>
  <text class="small" x="835" y="188">BgWriterHibernate</text>
  <text class="small" x="835" y="214">CheckpointWriteDelay</text>

  <rect class="symptom" x="70" y="335" width="285" height="130"/>
  <text class="label" x="115" y="368">症状 A</text>
  <text class="small" x="100" y="400">maxwritten_clean 持续增长</text>
  <text class="small" x="100" y="426">说明常被 maxpages 截断</text>

  <rect class="symptom" x="440" y="335" width="285" height="130"/>
  <text class="label" x="485" y="368">症状 B</text>
  <text class="small" x="470" y="400">client backend writes 高</text>
  <text class="small" x="470" y="426">用户请求路径在承担写出</text>

  <rect class="symptom" x="805" y="335" width="285" height="130"/>
  <text class="label" x="850" y="368">症状 C</text>
  <text class="small" x="835" y="400">checkpoint/fsync 抖动明显</text>
  <text class="small" x="835" y="426">问题可能不在 bgwriter</text>

  <rect class="action" x="70" y="545" width="285" height="105"/>
  <text class="label" x="105" y="578">调整 bgwriter</text>
  <text class="small" x="100" y="610">谨慎提高 maxpages 或 multiplier</text>
  <text class="small" x="100" y="634">观察写放大和延迟变化</text>

  <rect class="action" x="440" y="545" width="285" height="105"/>
  <text class="label" x="485" y="578">调整 buffer / workload</text>
  <text class="small" x="470" y="610">检查 shared_buffers、热集、批量路径</text>
  <text class="small" x="470" y="634">确认是否被 buffer ring 绕开</text>

  <rect class="guard" x="805" y="545" width="285" height="105"/>
  <text class="label" x="850" y="578">调整 checkpointer</text>
  <text class="small" x="835" y="610">看 max_wal_size、timeout、completion</text>
  <text class="small" x="835" y="634">不要让 bgwriter 背锅</text>

  <path class="arrow" d="M 212 240 L 212 335"/>
  <path class="arrow" d="M 582 240 L 582 335"/>
  <path class="arrow" d="M 947 240 L 947 335"/>
  <path class="arrow" d="M 212 465 L 212 545"/>
  <path class="arrow" d="M 582 465 L 582 545"/>
  <path class="arrow" d="M 947 465 L 947 545"/>
  <path class="dash" d="M 355 598 L 440 598"/>
  <path class="dash" d="M 725 598 L 805 598"/>
  <text class="tiny" x="382" y="584">复测</text>
  <text class="tiny" x="752" y="584">分流</text>
</svg>
