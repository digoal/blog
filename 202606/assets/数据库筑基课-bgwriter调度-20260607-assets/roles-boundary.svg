<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">bgwriter、backend、checkpointer 的职责边界</title>
  <desc id="desc">展示 PostgreSQL 中客户端后端、后台写进程、检查点进程、WAL 和存储之间的写入职责边界。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .pool { fill: #eef6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
      .wal { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .store { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #0f172a; }
      .label { font: 600 17px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .green { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .red { stroke: #b91c1c; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .gray { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow-gray); stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="660"/>
  <text class="title" x="40" y="44">bgwriter 调度先要分清职责：谁负责“提前清脏页”，谁负责“必须持久化”</text>

  <rect class="box" x="55" y="105" width="220" height="150"/>
  <text class="label" x="85" y="140">client backend</text>
  <text class="small" x="85" y="174">执行 SQL、读写页面</text>
  <text class="small" x="85" y="199">找不到 clean buffer 时</text>
  <text class="small" x="85" y="224">可能自己写脏页</text>

  <rect class="pool" x="405" y="95" width="310" height="210"/>
  <text class="label" x="500" y="130">shared buffers</text>
  <rect x="430" y="158" width="76" height="54" fill="#fee2e2" stroke="#b91c1c" rx="5"/>
  <text class="tiny" x="444" y="190">dirty</text>
  <rect x="520" y="158" width="76" height="54" fill="#dcfce7" stroke="#15803d" rx="5"/>
  <text class="tiny" x="535" y="190">clean</text>
  <rect x="610" y="158" width="76" height="54" fill="#e0e7ff" stroke="#4338ca" rx="5"/>
  <text class="tiny" x="628" y="190">pinned</text>
  <path d="M 440 250 A 135 82 0 0 1 680 250" stroke="#2563eb" stroke-width="3" fill="none"/>
  <text class="small" x="470" y="270">clock-sweep 替换指针</text>

  <rect class="box" x="70" y="385" width="235" height="155"/>
  <text class="label" x="110" y="420">background writer</text>
  <text class="small" x="100" y="454">扫描可复用脏页</text>
  <text class="small" x="100" y="479">提前 write 到文件系统</text>
  <text class="small" x="100" y="504">减少后端同步写等待</text>

  <rect class="box" x="450" y="410" width="235" height="130"/>
  <text class="label" x="505" y="445">checkpointer</text>
  <text class="small" x="485" y="479">按 checkpoint 目标写页</text>
  <text class="small" x="485" y="504">吸收 fsync 请求并收口</text>

  <rect class="wal" x="805" y="110" width="230" height="120"/>
  <text class="label" x="882" y="145">WAL</text>
  <text class="small" x="840" y="179">数据页写出前</text>
  <text class="small" x="840" y="204">必须先刷对应 WAL</text>

  <rect class="store" x="805" y="405" width="230" height="135"/>
  <text class="label" x="870" y="440">存储系统</text>
  <text class="small" x="842" y="474">write / writeback / fsync</text>
  <text class="small" x="842" y="499">分别处在不同边界</text>

  <path class="blue" d="M 275 175 C 330 175 350 175 405 175"/>
  <text class="tiny" x="295" y="162">读写、分配 buffer</text>

  <path class="red" d="M 420 255 C 335 285 265 330 220 385"/>
  <text class="tiny" x="275" y="315">脏 victim 由后端写出</text>

  <path class="green" d="M 305 440 C 360 405 395 342 445 292"/>
  <text class="tiny" x="300" y="390">提前清理 LRU 候选页</text>

  <path class="gray" d="M 685 475 C 735 475 760 475 805 475"/>
  <text class="tiny" x="705" y="461">checkpoint 收口</text>

  <path class="gray" d="M 715 190 C 760 180 775 170 805 165"/>
  <text class="tiny" x="724" y="151">遵守 WAL 先写规则</text>

  <path class="green" d="M 715 258 C 760 310 800 355 850 405"/>
  <text class="tiny" x="760" y="336">数据页写入 OS</text>

  <path class="red" d="M 275 225 C 360 335 705 350 805 430"/>
  <text class="tiny" x="415" y="360">bgwriter 跟不上时，用户请求路径承担写 I/O</text>
</svg>
