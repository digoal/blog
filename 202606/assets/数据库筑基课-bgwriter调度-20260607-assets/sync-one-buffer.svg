<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">SyncOneBuffer 单页处理路径</title>
  <desc id="desc">展示 bgwriter 对单个候选 buffer 的判断：跳过 pinned 或 recently used，写出 valid dirty buffer，并触发 writeback hint。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .skip { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 8; }
      .write { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .ok { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="680"/>
  <text class="title" x="40" y="44">SyncOneBuffer：bgwriter 只碰“可复用候选页”，不是把所有脏页都写掉</text>

  <rect class="box" x="80" y="95" width="220" height="88"/>
  <text class="label" x="120" y="128">锁 buffer header</text>
  <text class="small" x="110" y="158">检查 refcount、usage、flags</text>

  <rect class="skip" x="420" y="70" width="260" height="120"/>
  <text class="label" x="465" y="105">pinned 或 usage &gt; 0</text>
  <text class="small" x="450" y="136">skip_recently_used = true</text>
  <text class="small" x="450" y="162">bgwriter 直接跳过</text>

  <rect class="ok" x="790" y="70" width="250" height="120"/>
  <text class="label" x="850" y="105">clean reusable</text>
  <text class="small" x="820" y="136">refcount = 0 且 usage = 0</text>
  <text class="small" x="820" y="162">可计入可复用供给</text>

  <rect class="box" x="420" y="275" width="260" height="110"/>
  <text class="label" x="470" y="310">valid 且 dirty？</text>
  <text class="small" x="450" y="342">否：无需 I/O</text>
  <text class="small" x="450" y="365">是：进入写出路径</text>

  <rect class="write" x="120" y="505" width="245" height="110"/>
  <text class="label" x="165" y="540">Pin + 内容锁</text>
  <text class="small" x="150" y="572">share-exclusive lock</text>
  <text class="small" x="150" y="596">防止写出时页面被改坏</text>

  <rect class="write" x="440" y="505" width="245" height="110"/>
  <text class="label" x="485" y="540">FlushBuffer</text>
  <text class="small" x="470" y="572">永久关系先 XLogFlush</text>
  <text class="small" x="470" y="596">再 smgrwrite 数据页</text>

  <rect class="ok" x="765" y="505" width="260" height="110"/>
  <text class="label" x="805" y="540">writeback hint</text>
  <text class="small" x="795" y="572">达到 bgwriter_flush_after</text>
  <text class="small" x="795" y="596">请求内核后台回写</text>

  <path class="arrow" d="M 300 138 L 420 130"/>
  <path class="arrow" d="M 680 130 L 790 130"/>
  <path class="arrow" d="M 550 190 L 550 275"/>
  <path class="dash" d="M 680 330 C 765 330 820 270 875 190"/>
  <text class="tiny" x="710" y="310">clean 情况直接返回</text>
  <path class="arrow" d="M 550 385 C 490 455 370 505 365 560"/>
  <path class="arrow" d="M 365 560 L 440 560"/>
  <path class="arrow" d="M 685 560 L 765 560"/>

  <text class="tiny" x="90" y="238">bgwriter 调用 SyncOneBuffer(skip_recently_used = true)。</text>
  <text class="tiny" x="90" y="262">checkpointer 调用同一个函数时 skip_recently_used = false，所以职责不同。</text>
</svg>
