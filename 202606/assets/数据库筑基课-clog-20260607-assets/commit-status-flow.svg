<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc">
  <title id="title">提交和回滚时 pg_xact 状态写入路径</title>
  <desc id="desc">展示 PostgreSQL 事务提交和回滚时 WAL、pg_xact、同步提交、异步提交和 group update 的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .wal { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; rx: 8; }
    .xact { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.8; rx: 8; }
    .async { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.8; rx: 8; }
    .abort { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .opt { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.6; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16.5px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13.5px; fill: #334155; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #c2410c; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="552" class="box"/>
  <text x="52" y="62" class="text">事务结束时：WAL 负责恢复事实，pg_xact 负责快速回答“这个 XID 提交了吗？”</text>

  <rect x="70" y="116" width="175" height="78" class="box"/>
  <text x="157" y="148" text-anchor="middle" class="text">RecordTransactionCommit</text>
  <text x="157" y="172" text-anchor="middle" class="small">收集 child XID 与提交信息</text>

  <rect x="325" y="116" width="170" height="78" class="wal"/>
  <text x="410" y="148" text-anchor="middle" class="text">写 COMMIT WAL</text>
  <text x="410" y="172" text-anchor="middle" class="small">XactLogCommitRecord</text>

  <rect x="575" y="82" width="178" height="78" class="wal"/>
  <text x="664" y="114" text-anchor="middle" class="text">同步提交路径</text>
  <text x="664" y="138" text-anchor="middle" class="small">XLogFlush 后再标记</text>

  <rect x="575" y="202" width="178" height="88" class="async"/>
  <text x="664" y="234" text-anchor="middle" class="text">异步提交路径</text>
  <text x="664" y="258" text-anchor="middle" class="small">记录 async LSN</text>
  <text x="664" y="278" text-anchor="middle" class="small">pg_xact page 不能先落盘</text>

  <rect x="835" y="116" width="145" height="78" class="xact"/>
  <text x="907" y="148" text-anchor="middle" class="text">更新 pg_xact</text>
  <text x="907" y="172" text-anchor="middle" class="small">COMMITTED bit</text>

  <path d="M 245 155 L 315 155" class="line"/>
  <path d="M 495 155 C 530 155 535 121 565 121" class="line"/>
  <path d="M 753 121 C 790 121 795 155 825 155" class="line"/>
  <path d="M 495 155 C 530 155 535 246 565 246" class="dash"/>
  <path d="M 753 246 C 792 246 795 174 825 174" class="dash"/>

  <rect x="80" y="372" width="188" height="84" class="abort"/>
  <text x="174" y="404" text-anchor="middle" class="text">Abort 路径</text>
  <text x="174" y="428" text-anchor="middle" class="small">写 ABORT WAL</text>
  <text x="174" y="448" text-anchor="middle" class="small">不必先 flush WAL</text>

  <rect x="356" y="372" width="194" height="84" class="xact"/>
  <text x="453" y="404" text-anchor="middle" class="text">标记 aborted</text>
  <text x="453" y="428" text-anchor="middle" class="small">崩溃后默认也可视作 abort</text>
  <text x="453" y="448" text-anchor="middle" class="small">所以持久性要求不同</text>

  <rect x="638" y="354" width="256" height="118" class="opt"/>
  <text x="766" y="388" text-anchor="middle" class="text">高并发 group update</text>
  <text x="766" y="414" text-anchor="middle" class="small">多个 backend 排队</text>
  <text x="766" y="437" text-anchor="middle" class="small">leader 一次拿 SLRU bank lock</text>
  <text x="766" y="460" text-anchor="middle" class="small">批量更新同一 pg_xact page</text>

  <path d="M 268 414 L 346 414" class="line"/>
  <path d="M 550 414 L 628 414" class="line"/>
  <path d="M 907 194 C 910 320 866 340 815 354" class="line"/>

  <text x="520" y="526" text-anchor="middle" class="small">提交的顺序约束：commit WAL 先成为可恢复事实，再让 pg_xact 快速回答可见性问题；异步提交用 LSN 防止 pg_xact 早于 WAL 落盘。</text>
</svg>
