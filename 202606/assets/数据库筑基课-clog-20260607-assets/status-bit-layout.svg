<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">pg_xact 的两位事务状态布局</title>
  <desc id="desc">展示 PostgreSQL CLOG/pg_xact 如何用两位表示一个事务状态，四个事务放入一个字节，页面和段如何继续组织。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .dir { fill: #ecfeff; stroke: #0e7490; stroke-width: 1.8; rx: 8; }
    .page { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.8; rx: 8; }
    .byte { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 6; }
    .bit { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.2; rx: 4; }
    .state0 { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; rx: 4; }
    .state1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.2; rx: 4; }
    .state2 { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; rx: 4; }
    .state3 { fill: #fef3c7; stroke: #d97706; stroke-width: 1.2; rx: 4; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13.5px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #334155; }
    .line { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
  </style>

  <rect x="24" y="24" width="992" height="512" class="box"/>
  <text x="52" y="62" class="text">CLOG / pg_xact：事务 XID 到提交状态的紧凑映射</text>
  <text x="52" y="88" class="small">源码常用 CLOG 命名；数据目录从 PostgreSQL 10 起叫 pg_xact。</text>

  <rect x="60" y="128" width="190" height="82" class="dir"/>
  <text x="155" y="161" text-anchor="middle" class="text">pg_xact/</text>
  <text x="155" y="188" text-anchor="middle" class="small">SLRU 文件目录</text>

  <rect x="332" y="112" width="230" height="112" class="page"/>
  <text x="447" y="147" text-anchor="middle" class="text">一个 CLOG 段</text>
  <text x="447" y="174" text-anchor="middle" class="small">默认 32 个 SLRU page</text>
  <text x="447" y="199" text-anchor="middle" class="small">默认约 256KB</text>

  <rect x="650" y="112" width="230" height="112" class="page"/>
  <text x="765" y="147" text-anchor="middle" class="text">一个 CLOG page</text>
  <text x="765" y="174" text-anchor="middle" class="small">大小为 BLCKSZ</text>
  <text x="765" y="199" text-anchor="middle" class="small">典型 8KB，覆盖 32K XID</text>

  <path d="M 250 169 L 322 169" class="line"/>
  <path d="M 562 169 L 640 169" class="line"/>

  <rect x="96" y="292" width="92" height="68" class="byte"/>
  <text x="142" y="321" text-anchor="middle" class="text">1 byte</text>
  <text x="142" y="346" text-anchor="middle" class="small">4 个 XID</text>

  <path d="M 765 224 C 765 270 188 248 150 292" class="line"/>

  <g transform="translate(260 280)">
    <rect x="0" y="0" width="130" height="78" class="bit"/>
    <rect x="12" y="22" width="44" height="32" class="state0"/>
    <rect x="64" y="22" width="44" height="32" class="state0"/>
    <text x="65" y="70" text-anchor="middle" class="tiny">XID n: 00</text>
    <text x="65" y="15" text-anchor="middle" class="small">两位状态</text>
  </g>
  <g transform="translate(410 280)">
    <rect x="0" y="0" width="130" height="78" class="bit"/>
    <rect x="12" y="22" width="44" height="32" class="state1"/>
    <rect x="64" y="22" width="44" height="32" class="state0"/>
    <text x="65" y="70" text-anchor="middle" class="tiny">XID n+1: 01</text>
    <text x="65" y="15" text-anchor="middle" class="small">两位状态</text>
  </g>
  <g transform="translate(560 280)">
    <rect x="0" y="0" width="130" height="78" class="bit"/>
    <rect x="12" y="22" width="44" height="32" class="state0"/>
    <rect x="64" y="22" width="44" height="32" class="state2"/>
    <text x="65" y="70" text-anchor="middle" class="tiny">XID n+2: 10</text>
    <text x="65" y="15" text-anchor="middle" class="small">两位状态</text>
  </g>
  <g transform="translate(710 280)">
    <rect x="0" y="0" width="130" height="78" class="bit"/>
    <rect x="12" y="22" width="44" height="32" class="state1"/>
    <rect x="64" y="22" width="44" height="32" class="state1"/>
    <text x="65" y="70" text-anchor="middle" class="tiny">XID n+3: 11</text>
    <text x="65" y="15" text-anchor="middle" class="small">两位状态</text>
  </g>
  <path d="M 188 326 L 250 326" class="line"/>

  <rect x="120" y="420" width="190" height="52" class="state0"/>
  <text x="215" y="451" text-anchor="middle" class="small">00 in progress</text>
  <rect x="330" y="420" width="190" height="52" class="state1"/>
  <text x="425" y="451" text-anchor="middle" class="small">01 committed</text>
  <rect x="540" y="420" width="190" height="52" class="state2"/>
  <text x="635" y="451" text-anchor="middle" class="small">10 aborted</text>
  <rect x="750" y="420" width="190" height="52" class="state3"/>
  <text x="845" y="451" text-anchor="middle" class="small">11 sub-committed</text>

  <line x1="100" y1="392" x2="942" y2="392" class="dash"/>
  <text x="520" y="510" text-anchor="middle" class="small">核心代价：每事务 2 bit，空间极省；核心风险：读到旧 XID 前必须保证对应 pg_xact 段没有被 VACUUM 截断。</text>
</svg>
