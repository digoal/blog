<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc">
  <title id="title">VACUUM 冻结与 pg_xact 截断边界</title>
  <desc id="desc">展示 VACUUM 通过 datfrozenxid 计算全局最老需要保留的 XID，并据此截断 pg_xact、commit timestamp 和 multixact。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .db { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .vac { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.7; rx: 8; }
    .cut { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.7; rx: 8; }
    .danger { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.7; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16.5px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13.5px; fill: #334155; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="552" class="box"/>
  <text x="52" y="62" class="text">pg_xact 能被删掉，不是因为“旧事务不重要”，而是因为相关 tuple 已被冻结或不再引用这些 XID。</text>

  <rect x="70" y="116" width="210" height="98" class="db"/>
  <text x="175" y="149" text-anchor="middle" class="text">每个数据库</text>
  <text x="175" y="174" text-anchor="middle" class="small">pg_database.datfrozenxid</text>
  <text x="175" y="196" text-anchor="middle" class="small">表示该库仍可能引用的老 XID 边界</text>

  <rect x="374" y="116" width="230" height="98" class="vac"/>
  <text x="489" y="149" text-anchor="middle" class="text">vac_truncate_clog</text>
  <text x="489" y="174" text-anchor="middle" class="small">扫描 pg_database</text>
  <text x="489" y="196" text-anchor="middle" class="small">取全局最小 datfrozenxid</text>

  <rect x="706" y="116" width="214" height="98" class="cut"/>
  <text x="813" y="149" text-anchor="middle" class="text">TruncateCLOG</text>
  <text x="813" y="174" text-anchor="middle" class="small">推进 oldestClogXid</text>
  <text x="813" y="196" text-anchor="middle" class="small">写 TRUNCATE WAL 并删除旧段</text>

  <path d="M 280 165 L 364 165" class="line"/>
  <path d="M 604 165 L 696 165" class="line"/>

  <rect x="90" y="324" width="190" height="82" class="danger"/>
  <text x="185" y="354" text-anchor="middle" class="text">长事务</text>
  <text x="185" y="379" text-anchor="middle" class="small">固定 OldestXmin</text>
  <text x="185" y="399" text-anchor="middle" class="small">拖慢冻结与清理</text>

  <rect x="360" y="324" width="212" height="82" class="danger"/>
  <text x="466" y="354" text-anchor="middle" class="text">prepared xact / slot</text>
  <text x="466" y="379" text-anchor="middle" class="small">可能保留旧边界</text>
  <text x="466" y="399" text-anchor="middle" class="small">需要治理而不是手删文件</text>

  <rect x="656" y="324" width="252" height="82" class="vac"/>
  <text x="782" y="354" text-anchor="middle" class="text">冻结成功后</text>
  <text x="782" y="379" text-anchor="middle" class="small">旧 tuple 不再需要老 XID 状态</text>
  <text x="782" y="399" text-anchor="middle" class="small">pg_xact 才能安全收缩</text>

  <path d="M 185 324 C 260 260 368 226 456 214" class="dash"/>
  <path d="M 466 324 C 520 260 590 222 706 192" class="dash"/>
  <path d="M 782 324 C 796 280 808 245 813 214" class="line"/>

  <rect x="158" y="470" width="724" height="56" class="box"/>
  <text x="520" y="493" text-anchor="middle" class="small">边界公式的直觉：保留从全局最老 datfrozenxid 到当前 nextXid 的状态；更老的状态只有在所有相关行都被冻结后才可删除。</text>
  <text x="520" y="516" text-anchor="middle" class="small">运维结论：pg_xact 膨胀通常是冻结边界或事务年龄问题，不是可以通过手工删除目录解决的问题。</text>
</svg>
