<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="580" viewBox="0 0 1040 580" role="img" aria-labelledby="title desc">
  <title id="title">可见性判断中的 pg_xact 查询路径</title>
  <desc id="desc">展示 PostgreSQL 读取 heap tuple 时先看 hint bit 和 ProcArray，再查询 pg_xact，最后设置 hint bit 的路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .tuple { fill: #ecfeff; stroke: #0e7490; stroke-width: 1.8; rx: 8; }
    .proc { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; rx: 8; }
    .clog { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.8; rx: 8; }
    .hint { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.8; rx: 8; }
    .risk { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16.5px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13.5px; fill: #334155; }
    .line { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="532" class="box"/>
  <text x="52" y="62" class="text">读取 tuple 时，pg_xact 不是第一站；能用 hint bit 和快照判定时就避免 SLRU 查询。</text>

  <rect x="70" y="118" width="192" height="94" class="tuple"/>
  <text x="166" y="151" text-anchor="middle" class="text">heap tuple header</text>
  <text x="166" y="175" text-anchor="middle" class="small">xmin / xmax</text>
  <text x="166" y="197" text-anchor="middle" class="small">HEAP_XMIN_COMMITTED 等 hint bit</text>

  <rect x="356" y="86" width="204" height="82" class="hint"/>
  <text x="458" y="119" text-anchor="middle" class="text">先看 hint bit</text>
  <text x="458" y="145" text-anchor="middle" class="small">已知提交/中止则快速返回</text>

  <rect x="356" y="224" width="204" height="82" class="proc"/>
  <text x="458" y="257" text-anchor="middle" class="text">再看运行中集合</text>
  <text x="458" y="283" text-anchor="middle" class="small">ProcArray 或 MVCC snapshot</text>

  <rect x="668" y="118" width="214" height="94" class="clog"/>
  <text x="775" y="151" text-anchor="middle" class="text">TransactionIdDidCommit</text>
  <text x="775" y="176" text-anchor="middle" class="small">TransactionLogFetch</text>
  <text x="775" y="198" text-anchor="middle" class="small">TransactionIdGetStatus</text>

  <rect x="668" y="286" width="214" height="92" class="hint"/>
  <text x="775" y="320" text-anchor="middle" class="text">回写 hint bit</text>
  <text x="775" y="345" text-anchor="middle" class="small">减少后续 pg_xact 查询</text>
  <text x="775" y="366" text-anchor="middle" class="small">可能产生 hint dirty</text>

  <rect x="142" y="372" width="300" height="96" class="risk"/>
  <text x="292" y="405" text-anchor="middle" class="text">顺序约束</text>
  <text x="292" y="431" text-anchor="middle" class="small">先判断不在运行中，再查 pg_xact</text>
  <text x="292" y="454" text-anchor="middle" class="small">否则会把正在提交的事务提前看成已提交</text>

  <path d="M 262 152 L 346 127" class="line"/>
  <path d="M 262 188 L 346 253" class="line"/>
  <path d="M 560 265 C 605 265 613 166 658 166" class="line"/>
  <path d="M 775 212 L 775 276" class="line"/>
  <path d="M 668 344 C 560 376 520 420 452 426" class="dash"/>
  <path d="M 356 265 C 286 290 260 335 292 372" class="dash"/>

  <text x="520" y="515" text-anchor="middle" class="small">工程含义：pg_xact 是 MVCC 可见性的兜底真相表，但高频路径依赖 hint bit 和快照来降低 SLRU 读放大。</text>
</svg>
