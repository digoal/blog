<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">freeze 运维阈值与观测闭环</title>
  <desc id="desc">展示 relfrozenxid 年龄从日常状态、普通冻结、aggressive vacuum、anti-wraparound autovacuum 到 failsafe 的阈值关系，以及应观测的系统视图。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .title { font-size: 19px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #4b5563; }
    .panel { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .lane { stroke: #334155; stroke-width: 5; stroke-linecap: round; }
    .tick { stroke: #334155; stroke-width: 2; }
    .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 7; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 7; }
    .orange { fill: #ffedd5; stroke: #f97316; stroke-width: 2; rx: 7; }
    .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 7; }
    .purple { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 2; rx: 7; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="26" y="24" width="1028" height="512" class="panel"/>
  <text x="56" y="64" class="title">freeze 运维要看“年龄、速度、阻塞源、扫描效果”四件事</text>

  <line x1="95" y1="160" x2="970" y2="160" class="lane"/>
  <text x="92" y="128" class="small">age(relfrozenxid) / mxid_age(relminmxid)</text>

  <line x1="180" y1="145" x2="180" y2="180" class="tick"/>
  <line x1="390" y1="145" x2="390" y2="180" class="tick"/>
  <line x1="620" y1="145" x2="620" y2="180" class="tick"/>
  <line x1="800" y1="145" x2="800" y2="180" class="tick"/>
  <line x1="930" y1="145" x2="930" y2="180" class="tick"/>

  <rect x="100" y="215" width="155" height="84" class="green"/>
  <text x="120" y="246" class="small">日常区间</text>
  <text x="120" y="272" class="tiny">普通 vacuum 回收空间</text>
  <text x="120" y="292" class="tiny">顺带冻结一部分旧页</text>

  <rect x="315" y="215" width="170" height="84" class="blue"/>
  <text x="335" y="246" class="small">min_age 附近</text>
  <text x="335" y="272" class="tiny">tuple 开始满足冻结条件</text>
  <text x="335" y="292" class="tiny">但未必每页都被扫描</text>

  <rect x="548" y="215" width="178" height="84" class="orange"/>
  <text x="568" y="246" class="small">table_age 附近</text>
  <text x="568" y="272" class="tiny">触发 aggressive scan</text>
  <text x="568" y="292" class="tiny">扫可能含未冻结值的页</text>

  <rect x="760" y="215" width="178" height="84" class="red"/>
  <text x="780" y="246" class="small">max_age / wraparound</text>
  <text x="780" y="272" class="tiny">autovacuum 强制介入</text>
  <text x="780" y="292" class="tiny">即使 autovacuum 被关闭</text>

  <rect x="760" y="345" width="178" height="84" class="purple"/>
  <text x="780" y="376" class="small">failsafe</text>
  <text x="780" y="402" class="tiny">跳过非必要维护</text>
  <text x="780" y="422" class="tiny">目标是推进冻结边界</text>

  <rect x="95" y="355" width="515" height="108" fill="#f1f5f9" stroke="#cbd5e1" rx="8"/>
  <text x="120" y="386" class="small">建议观测 SQL / 视图</text>
  <text x="120" y="414" class="tiny">pg_class：relfrozenxid、relminmxid、relallfrozen、relallvisible</text>
  <text x="120" y="436" class="tiny">pg_database：datfrozenxid、datminmxid</text>
  <text x="120" y="458" class="tiny">pg_stat_progress_vacuum：phase、mode、for_wraparound、eager frozen pages</text>

  <path d="M 390 180 C 390 195 390 204 390 212" class="arrow"/>
  <path d="M 620 180 C 620 195 620 204 620 212" class="arrow"/>
  <path d="M 800 180 C 800 195 800 204 800 212" class="arrow"/>
  <path d="M 850 300 C 850 318 850 330 850 342" class="arrow"/>
</svg>
