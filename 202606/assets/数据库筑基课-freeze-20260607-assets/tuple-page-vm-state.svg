<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">heap tuple、页面和 visibility map 的冻结状态</title>
  <desc id="desc">展示 tuple 中 xmin/xmax 与 infomask 冻结标志、heap page、visibility map 的 all-visible 和 all-frozen 两个 bit 之间的关系。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .title { font-size: 19px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #4b5563; }
    .page { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .tuple { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; rx: 6; }
    .frozen { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.5; rx: 6; }
    .dead { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.5; rx: 6; }
    .vm { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 8; }
    .biton { fill: #22c55e; stroke: #15803d; stroke-width: 1.5; }
    .bitoff { fill: #e5e7eb; stroke: #9ca3af; stroke-width: 1.5; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="28" y="30" width="984" height="436" class="page"/>
  <text x="54" y="66" class="title">一页 heap block 内，freeze 处理的是 tuple 头部的事务字段</text>
  <text x="54" y="92" class="small">PostgreSQL 9.4 以后通常保留原始 xmin，同时通过 tuple infomask 中的 HEAP_XMIN_FROZEN 表示插入事务已冻结。</text>

  <rect x="70" y="135" width="560" height="240" class="page"/>
  <text x="92" y="164" class="title">heap page N</text>
  <text x="92" y="188" class="tiny">line pointer + tuple header + tuple data</text>

  <rect x="100" y="220" width="154" height="104" class="frozen"/>
  <text x="116" y="248" class="small">tuple A</text>
  <text x="116" y="274" class="tiny">xmin=100</text>
  <text x="116" y="296" class="tiny">HEAP_XMIN_FROZEN</text>

  <rect x="285" y="220" width="154" height="104" class="tuple"/>
  <text x="301" y="248" class="small">tuple B</text>
  <text x="301" y="274" class="tiny">xmin=210</text>
  <text x="301" y="296" class="tiny">xmax=Invalid</text>

  <rect x="470" y="220" width="126" height="104" class="dead"/>
  <text x="486" y="248" class="small">tuple C</text>
  <text x="486" y="274" class="tiny">xmax 已提交</text>
  <text x="486" y="296" class="tiny">可被 prune/remove</text>

  <rect x="710" y="145" width="235" height="188" class="vm"/>
  <text x="734" y="176" class="title">visibility map</text>
  <text x="734" y="202" class="tiny">每个 heap page 两个 bit</text>
  <circle cx="758" cy="242" r="16" class="biton"/>
  <text x="787" y="247" class="small">all-visible</text>
  <circle cx="758" cy="291" r="16" class="bitoff"/>
  <text x="787" y="296" class="small">all-frozen</text>

  <path d="M 632 260 C 665 250 682 244 704 242" class="arrow"/>
  <path d="M 632 300 C 666 300 682 296 704 292" class="arrow"/>
  <text x="650" y="226" class="tiny">页面所有 tuple 对所有事务可见</text>
  <text x="650" y="324" class="tiny">页面所有 tuple 都已 frozen 才能置位</text>

  <rect x="70" y="402" width="875" height="38" fill="#f1f5f9" stroke="#cbd5e1" rx="6"/>
  <text x="92" y="426" class="small">关键约束：all-frozen 只能在 all-visible 已成立时设置；任何 INSERT/UPDATE/DELETE 修改该页都必须清除相关 VM bit。</text>
</svg>
