<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">VACUUM freeze 决策流程</title>
  <desc id="desc">展示 VACUUM 从计算 cutoffs 到普通、eager、aggressive、failsafe 路径的分支关系，以及 relfrozenxid 和 relminmxid 的推进条件。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #111827; }
    .title { font-size: 19px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #4b5563; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 8; }
    .calc { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .normal { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .eager { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 8; }
    .aggr { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 8; }
    .final { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="25" y="24" width="1050" height="570" class="box"/>
  <text x="55" y="62" class="title">VACUUM freeze 的核心不是“全表重写”，而是根据 cutoff 扫描、冻结和推进边界</text>

  <rect x="70" y="110" width="260" height="120" class="calc"/>
  <text x="94" y="140" class="title">1. vacuum_get_cutoffs()</text>
  <text x="94" y="166" class="small">OldestXmin / OldestMxact</text>
  <text x="94" y="190" class="small">FreezeLimit / MultiXactCutoff</text>
  <text x="94" y="214" class="tiny">来源：当前 nextXID、GUC、pg_class 边界</text>

  <rect x="420" y="95" width="270" height="150" class="normal"/>
  <text x="444" y="126" class="title">2A. 普通 VACUUM</text>
  <text x="444" y="154" class="small">跳过 VM all-visible 页</text>
  <text x="444" y="178" class="small">扫描有死元组或需要处理的页</text>
  <text x="444" y="202" class="tiny">若跳过 all-visible 页，不能盲目推进 relfrozenxid</text>

  <rect x="420" y="285" width="270" height="150" class="eager"/>
  <text x="444" y="316" class="title">2B. eager freeze</text>
  <text x="444" y="344" class="small">普通 VACUUM 额外扫描</text>
  <text x="444" y="368" class="small">all-visible 但未 all-frozen 的页</text>
  <text x="444" y="392" class="tiny">成功数有 20% 内部上限，失败率由 GUC/表参数控制</text>

  <rect x="765" y="95" width="250" height="150" class="aggr"/>
  <text x="789" y="126" class="title">3. aggressive VACUUM</text>
  <text x="789" y="154" class="small">表年龄达到 freeze_table_age</text>
  <text x="789" y="178" class="small">扫描可能含 unfrozen XID/MXID 的页</text>
  <text x="789" y="202" class="tiny">目标：relfrozenxid &gt;= FreezeLimit</text>

  <rect x="765" y="285" width="250" height="150" class="aggr"/>
  <text x="789" y="316" class="title">4. failsafe</text>
  <text x="789" y="344" class="small">relfrozenxid/relminmxid 太旧</text>
  <text x="789" y="368" class="small">绕过非必要维护</text>
  <text x="789" y="392" class="tiny">停用 cost delay、跳过索引清理和截断，优先保命</text>

  <rect x="230" y="485" width="640" height="62" class="final"/>
  <text x="254" y="512" class="title">5. 更新 pg_class / pg_database 边界，允许 pg_xact / pg_multixact 截断</text>
  <text x="254" y="536" class="small">NewRelfrozenXid、NewRelminMxid 必须不越过仍留在 tuple 中的 XID/MXID。</text>

  <path d="M 330 170 C 360 170 382 170 413 170" class="arrow"/>
  <path d="M 330 190 C 365 248 383 300 413 340" class="arrow"/>
  <path d="M 690 170 C 718 170 735 170 758 170" class="arrow"/>
  <path d="M 690 360 C 716 360 738 360 758 360" class="arrow"/>
  <path d="M 888 245 C 874 334 794 428 706 478" class="arrow"/>
  <path d="M 552 436 C 552 455 552 466 552 478" class="arrow"/>
  <path d="M 890 436 C 843 474 798 487 760 489" class="arrow"/>
</svg>
