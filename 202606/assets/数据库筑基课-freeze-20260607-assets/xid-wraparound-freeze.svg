<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">XID 环形空间与 freeze 的意义</title>
  <desc id="desc">展示普通 32 位 XID 在环形空间中比较新旧，超过约 20 亿事务后旧行版本会被误判为未来事务；冻结把 tuple 标记成永远早于普通 XID。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .small { font-size: 15px; }
    .label { font-size: 18px; font-weight: 700; }
    .note { font-size: 14px; fill: #4b5563; }
    .ring { fill: none; stroke: #2563eb; stroke-width: 18; stroke-linecap: round; }
    .risk { fill: none; stroke: #dc2626; stroke-width: 18; stroke-linecap: round; }
    .safe { fill: none; stroke: #16a34a; stroke-width: 18; stroke-linecap: round; }
    .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #22c55e; stroke-width: 2; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="22" y="22" width="936" height="376" class="box"/>
  <text x="48" y="60" class="label">普通 XID 是 32 位环形空间</text>
  <text x="48" y="88" class="small">每个普通 XID 约有 20 亿个“过去”和 20 亿个“未来”；跨过边界后，旧 tuple 可能突然像未来版本。</text>

  <circle cx="300" cy="235" r="118" class="ring"/>
  <path d="M 300 117 A 118 118 0 0 1 418 235" class="safe"/>
  <path d="M 300 353 A 118 118 0 0 1 182 235" class="risk"/>
  <circle cx="300" cy="117" r="9" fill="#2563eb"/>
  <circle cx="418" cy="235" r="9" fill="#16a34a"/>
  <circle cx="182" cy="235" r="9" fill="#dc2626"/>
  <text x="266" y="111" class="note">当前 XID</text>
  <text x="432" y="240" class="note">仍在过去</text>
  <text x="70" y="240" class="note">超过边界后像未来</text>
  <text x="240" y="239" class="label">2^32</text>
  <text x="236" y="266" class="small">循环比较</text>

  <rect x="565" y="120" width="320" height="78" class="warn"/>
  <text x="590" y="150" class="label">不 freeze 的风险</text>
  <text x="590" y="178" class="small">旧 tuple 的 xmin 仍是普通 XID，</text>
  <text x="590" y="202" class="small">wraparound 后可见性判断会失真。</text>

  <rect x="565" y="260" width="320" height="78" class="ok"/>
  <text x="590" y="290" class="label">freeze 后的效果</text>
  <text x="590" y="318" class="small">tuple 被标记为 frozen，逻辑上</text>
  <text x="590" y="342" class="small">永远早于任何普通 XID。</text>

  <path d="M 430 204 C 480 176 510 166 555 164" class="arrow"/>
  <path d="M 430 278 C 484 292 512 302 555 304" class="arrow"/>
  <text x="450" y="133" class="note">VACUUM 未及时处理</text>
  <text x="454" y="331" class="note">VACUUM 冻结旧版本</text>
</svg>
