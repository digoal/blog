<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img">
  <title>表膨胀、VACUUM 与 REPACK 的空间模型</title>
  <desc>展示 PostgreSQL MVCC 死元组如何造成表膨胀，普通 VACUUM 主要把空间留给表内复用，而 REPACK 通过重写新文件把空间归还给操作系统。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #22313f; }
    .h1 { font-size: 25px; font-weight: 700; }
    .h2 { font-size: 18px; font-weight: 700; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #4a5d70; }
    .page { fill: #f8fafc; stroke: #65758b; stroke-width: 1.5; rx: 10; }
    .live { fill: #6bbf8f; stroke: #327850; stroke-width: 1; }
    .dead { fill: #e86f61; stroke: #a83b31; stroke-width: 1; }
    .free { fill: #e7edf3; stroke: #9aa9b8; stroke-width: 1; stroke-dasharray: 4 3; }
    .os { fill: #d7f0ff; stroke: #3b82a5; stroke-width: 1.5; }
    .arrow { stroke: #2f4f6f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .note { fill: #fff7e6; stroke: #c58b24; stroke-width: 1.2; rx: 8; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f6f"/>
    </marker>
  </defs>

  <rect x="20" y="18" width="1080" height="584" fill="#ffffff" stroke="#d6dee8" rx="14"/>
  <text x="48" y="58" class="h1">为什么普通 VACUUM 不能等价于 REPACK？</text>
  <text x="48" y="86" class="small">MVCC 让 UPDATE / DELETE 留下旧行版本。普通 VACUUM 清理死元组，但多数页面仍属于同一个关系文件；REPACK 重写新文件，文件尾部膨胀才真正消失。</text>

  <g transform="translate(54 132)">
    <text x="0" y="0" class="h2">1. 高更新表：文件里混有活元组和死元组</text>
    <g transform="translate(0 28)">
      <rect class="page" x="0" y="0" width="76" height="130"/>
      <rect class="live" x="10" y="12" width="56" height="22" rx="4"/><rect class="dead" x="10" y="43" width="56" height="22" rx="4"/><rect class="live" x="10" y="74" width="56" height="22" rx="4"/><rect class="dead" x="10" y="105" width="56" height="14" rx="4"/>
      <rect class="page" x="92" y="0" width="76" height="130"/>
      <rect class="dead" x="102" y="12" width="56" height="22" rx="4"/><rect class="live" x="102" y="43" width="56" height="22" rx="4"/><rect class="dead" x="102" y="74" width="56" height="22" rx="4"/><rect class="live" x="102" y="105" width="56" height="14" rx="4"/>
      <rect class="page" x="184" y="0" width="76" height="130"/>
      <rect class="live" x="194" y="12" width="56" height="22" rx="4"/><rect class="dead" x="194" y="43" width="56" height="22" rx="4"/><rect class="dead" x="194" y="74" width="56" height="22" rx="4"/><rect class="live" x="194" y="105" width="56" height="14" rx="4"/>
      <text x="0" y="164" class="small">绿色：仍可见行版本</text>
      <text x="0" y="186" class="small">红色：已无事务需要的死行版本</text>
    </g>
  </g>

  <path class="arrow" d="M 354 230 C 405 230, 420 230, 468 230"/>
  <text x="385" y="212" class="label">VACUUM</text>

  <g transform="translate(492 132)">
    <text x="0" y="0" class="h2">2. 普通 VACUUM：表内可复用，不一定归还 OS</text>
    <g transform="translate(0 28)">
      <rect class="page" x="0" y="0" width="76" height="130"/>
      <rect class="live" x="10" y="12" width="56" height="22" rx="4"/><rect class="free" x="10" y="43" width="56" height="22" rx="4"/><rect class="live" x="10" y="74" width="56" height="22" rx="4"/><rect class="free" x="10" y="105" width="56" height="14" rx="4"/>
      <rect class="page" x="92" y="0" width="76" height="130"/>
      <rect class="free" x="102" y="12" width="56" height="22" rx="4"/><rect class="live" x="102" y="43" width="56" height="22" rx="4"/><rect class="free" x="102" y="74" width="56" height="22" rx="4"/><rect class="live" x="102" y="105" width="56" height="14" rx="4"/>
      <rect class="page" x="184" y="0" width="76" height="130"/>
      <rect class="live" x="194" y="12" width="56" height="22" rx="4"/><rect class="free" x="194" y="43" width="56" height="22" rx="4"/><rect class="free" x="194" y="74" width="56" height="22" rx="4"/><rect class="live" x="194" y="105" width="56" height="14" rx="4"/>
      <text x="0" y="164" class="small">空洞留在文件内部，后续 INSERT / UPDATE 可复用</text>
      <text x="0" y="186" class="small">除非文件尾部整页空闲且能截断，否则 OS 看到的文件仍大</text>
    </g>
  </g>

  <path class="arrow" d="M 781 230 C 829 230, 844 230, 892 230"/>
  <text x="806" y="212" class="label">REPACK</text>

  <g transform="translate(900 132)">
    <text x="0" y="0" class="h2">3. REPACK：只把需要保留的行写入新文件</text>
    <g transform="translate(0 28)">
      <rect class="page" x="0" y="0" width="76" height="130"/>
      <rect class="live" x="10" y="12" width="56" height="22" rx="4"/><rect class="live" x="10" y="43" width="56" height="22" rx="4"/><rect class="live" x="10" y="74" width="56" height="22" rx="4"/>
      <rect class="page" x="92" y="0" width="76" height="130"/>
      <rect class="live" x="102" y="12" width="56" height="22" rx="4"/><rect class="live" x="102" y="43" width="56" height="22" rx="4"/><rect class="free" x="102" y="74" width="56" height="22" rx="4"/><rect class="free" x="102" y="105" width="56" height="14" rx="4"/>
      <rect class="os" x="192" y="0" width="112" height="130" rx="10"/>
      <text x="207" y="48" class="label">旧文件</text>
      <text x="207" y="72" class="label">交换后</text>
      <text x="207" y="96" class="label">可删除</text>
      <text x="0" y="164" class="small">新 relfilenode 更紧凑；旧文件在事务完成后释放</text>
      <text x="0" y="186" class="small">fillfactor 仍会保留约定的页内空闲空间</text>
    </g>
  </g>

  <g transform="translate(88 460)">
    <rect class="note" x="0" y="0" width="942" height="82"/>
    <text x="24" y="30" class="label">运维判断：日常目标是让 autovacuum 维持稳定空间，而不是频繁 REPACK。</text>
    <text x="24" y="58" class="label">只有当死元组造成大量磁盘不可回收、缓存命中下降、顺序扫描/索引膨胀成本明显上升，才值得用重写换空间。</text>
  </g>
</svg>
