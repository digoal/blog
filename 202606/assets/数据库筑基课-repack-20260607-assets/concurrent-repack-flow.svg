<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img">
  <title>REPACK CONCURRENTLY 的逻辑解码补偿流程</title>
  <desc>展示并发 REPACK 如何用较弱锁复制快照数据，用逻辑解码捕获期间 DML，catch-up 后短暂获取 AccessExclusiveLock 交换文件。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1e2b36; }
    .h1 { font-size: 24px; font-weight: 700; }
    .h2 { font-size: 17px; font-weight: 700; }
    .label { font-size: 14px; }
    .small { font-size: 12.5px; fill: #536476; }
    .lane { fill: #f8fafc; stroke: #d4dde6; stroke-width: 1.2; rx: 12; }
    .main { fill: #e9f7ef; stroke: #3b8b5e; stroke-width: 1.5; rx: 9; }
    .worker { fill: #eef2ff; stroke: #5268b8; stroke-width: 1.5; rx: 9; }
    .wal { fill: #fff2df; stroke: #c47b26; stroke-width: 1.5; rx: 9; }
    .lock { fill: #ffe8e4; stroke: #bd4b3f; stroke-width: 1.5; rx: 9; }
    .file { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; rx: 9; }
    .arrow { stroke: #294969; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #5268b8; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowBlue); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294969"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5268b8"/>
    </marker>
  </defs>

  <rect x="20" y="18" width="1080" height="660" fill="#ffffff" stroke="#d8e0e8" rx="14"/>
  <text x="48" y="58" class="h1">REPACK (CONCURRENTLY)：在线不是无锁，而是把长锁拆成“复制 + 补偿 + 短交换”</text>
  <text x="48" y="86" class="small">并发路径要求永久表、有主键或索引型 replica identity、可用 max_repack_replication_slots，且不支持分区表、系统目录、TOAST 表。</text>

  <rect class="lane" x="54" y="128" width="1012" height="150"/>
  <text x="74" y="158" class="h2">用户后端：REPACK 主流程</text>
  <g transform="translate(74 185)">
    <rect class="main" x="0" y="0" width="170" height="62"/>
    <text x="16" y="27" class="label">ShareUpdateExclusive</text>
    <text x="16" y="48" class="small">允许普通 DML 继续</text>
    <path class="arrow" d="M 174 31 L 224 31"/>
    <rect class="main" x="230" y="0" width="160" height="62"/>
    <text x="246" y="27" class="label">等待初始快照</text>
    <text x="246" y="48" class="small">historic snapshot</text>
    <path class="arrow" d="M 394 31 L 444 31"/>
    <rect class="main" x="450" y="0" width="154" height="62"/>
    <text x="466" y="27" class="label">复制旧表可见行</text>
    <text x="466" y="48" class="small">写入新 heap</text>
    <path class="arrow" d="M 608 31 L 646 31"/>
    <rect class="main" x="652" y="0" width="130" height="62"/>
    <text x="668" y="27" class="label">建新索引</text>
    <text x="668" y="48" class="small">强锁前完成</text>
    <path class="arrow" d="M 786 31 L 824 31"/>
    <rect class="lock" x="830" y="0" width="142" height="62"/>
    <text x="846" y="27" class="label">短暂强锁</text>
    <text x="846" y="48" class="small">补偿并交换</text>
  </g>

  <rect class="lane" x="54" y="312" width="1012" height="170"/>
  <text x="74" y="342" class="h2">后台 worker：ad-hoc logical decoding</text>
  <g transform="translate(74 370)">
    <rect class="worker" x="0" y="0" width="175" height="70"/>
    <text x="16" y="28" class="label">临时 repack slot</text>
    <text x="16" y="50" class="small">slot 名含 PID</text>
    <path class="dash" d="M 179 35 L 236 35"/>
    <rect class="wal" x="242" y="0" width="178" height="70"/>
    <text x="258" y="28" class="label">读取 WAL</text>
    <text x="258" y="50" class="small">只保留目标表与 TOAST</text>
    <path class="dash" d="M 424 35 L 480 35"/>
    <rect class="worker" x="486" y="0" width="178" height="70"/>
    <text x="502" y="28" class="label">pgrepack 插件</text>
    <text x="502" y="50" class="small">解析 INSERT/UPDATE/DELETE</text>
    <path class="dash" d="M 668 35 L 724 35"/>
    <rect class="file" x="730" y="0" width="180" height="70"/>
    <text x="746" y="28" class="label">spill 文件</text>
    <text x="746" y="50" class="small">保存足够重放的 tuple</text>
  </g>

  <rect class="lane" x="54" y="516" width="1012" height="104"/>
  <text x="74" y="546" class="h2">catch-up：把并发 DML 重放到新 heap</text>
  <g transform="translate(76 566)">
    <rect class="file" x="0" y="0" width="172" height="42"/>
    <text x="16" y="27" class="label">读取 spill</text>
    <path class="arrow" d="M 176 21 L 244 21"/>
    <rect class="main" x="252" y="0" width="196" height="42"/>
    <text x="268" y="27" class="label">用 identity index 定位旧行</text>
    <path class="arrow" d="M 452 21 L 520 21"/>
    <rect class="main" x="528" y="0" width="186" height="42"/>
    <text x="544" y="27" class="label">应用 insert/update/delete</text>
    <path class="arrow" d="M 718 21 L 786 21"/>
    <rect class="lock" x="794" y="0" width="192" height="42"/>
    <text x="810" y="27" class="label">交换 relfilenode 并清理</text>
  </g>
</svg>
