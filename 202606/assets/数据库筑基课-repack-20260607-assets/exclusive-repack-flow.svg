<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img">
  <title>普通 REPACK 的独占重写流程</title>
  <desc>展示非并发 REPACK 如何持有 AccessExclusiveLock，创建 transient heap，复制可保留元组，交换 relfilenode，重建索引并清理旧文件。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2d3d; }
    .h1 { font-size: 25px; font-weight: 700; }
    .h2 { font-size: 17px; font-weight: 700; }
    .label { font-size: 14px; }
    .small { font-size: 12.5px; fill: #4b5f73; }
    .box { fill: #f7fafc; stroke: #60758b; stroke-width: 1.5; rx: 9; }
    .lock { fill: #fff0df; stroke: #c7792c; stroke-width: 1.5; rx: 9; }
    .heap { fill: #e9f7ef; stroke: #3d8b61; stroke-width: 1.5; rx: 9; }
    .index { fill: #eef2ff; stroke: #5367b0; stroke-width: 1.5; rx: 9; }
    .catalog { fill: #f5edff; stroke: #8259b8; stroke-width: 1.5; rx: 9; }
    .warn { fill: #fff9e8; stroke: #bc8d20; stroke-width: 1.5; rx: 9; }
    .arrow { stroke: #294969; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294969"/>
    </marker>
  </defs>

  <rect x="20" y="18" width="1080" height="612" fill="#ffffff" stroke="#d8e0e8" rx="14"/>
  <text x="48" y="58" class="h1">普通 REPACK：用独占锁换确定、简单、彻底的文件重写</text>
  <text x="48" y="86" class="small">对应源码主线：ExecRepack → cluster_rel → rebuild_relation → make_new_heap → copy_table_data → finish_heap_swap。</text>

  <g transform="translate(58 136)">
    <rect class="lock" x="0" y="0" width="185" height="80"/>
    <text x="18" y="30" class="h2">1. 锁定目标表</text>
    <text x="18" y="56" class="label">AccessExclusiveLock</text>
  </g>
  <path class="arrow" d="M 246 176 L 306 176"/>

  <g transform="translate(312 136)">
    <rect class="heap" x="0" y="0" width="190" height="80"/>
    <text x="18" y="30" class="h2">2. 创建新 heap</text>
    <text x="18" y="56" class="label">pg_temp_旧表 OID</text>
  </g>
  <path class="arrow" d="M 505 176 L 565 176"/>

  <g transform="translate(572 136)">
    <rect class="box" x="0" y="0" width="220" height="80"/>
    <text x="18" y="30" class="h2">3. 扫描旧 heap</text>
    <text x="18" y="56" class="label">物理顺序或 USING INDEX</text>
  </g>
  <path class="arrow" d="M 795 176 L 855 176"/>

  <g transform="translate(862 136)">
    <rect class="heap" x="0" y="0" width="200" height="80"/>
    <text x="18" y="30" class="h2">4. 写入新 heap</text>
    <text x="18" y="56" class="label">跳过可删除死元组</text>
  </g>

  <path class="arrow" d="M 962 218 C 962 272, 175 272, 175 326"/>

  <g transform="translate(58 326)">
    <rect class="catalog" x="0" y="0" width="228" height="90"/>
    <text x="18" y="31" class="h2">5. 交换物理身份</text>
    <text x="18" y="58" class="label">swap_relation_files()</text>
    <text x="18" y="78" class="small">relfilenode / tablespace / toast 链接</text>
  </g>
  <path class="arrow" d="M 289 371 L 356 371"/>

  <g transform="translate(366 326)">
    <rect class="index" x="0" y="0" width="220" height="90"/>
    <text x="18" y="31" class="h2">6. 重建索引</text>
    <text x="18" y="58" class="label">reindex_relation()</text>
    <text x="18" y="78" class="small">bulk load 后建索引更合算</text>
  </g>
  <path class="arrow" d="M 590 371 L 660 371"/>

  <g transform="translate(670 326)">
    <rect class="box" x="0" y="0" width="220" height="90"/>
    <text x="18" y="31" class="h2">7. 删除 transient 表</text>
    <text x="18" y="58" class="label">旧文件随临时表释放</text>
    <text x="18" y="78" class="small">事务完成后空间可归还 OS</text>
  </g>
  <path class="arrow" d="M 894 371 L 960 371"/>

  <g transform="translate(970 326)">
    <rect class="box" x="0" y="0" width="92" height="90"/>
    <text x="16" y="39" class="h2">结束</text>
    <text x="16" y="64" class="small">解锁</text>
  </g>

  <g transform="translate(76 485)">
    <rect class="warn" x="0" y="0" width="968" height="92"/>
    <text x="24" y="30" class="label">关键代价：整个过程阻塞读写；需要额外磁盘保存新 heap 和新索引；重写会产生大量 I/O 和 WAL；完成后建议 ANALYZE。</text>
    <text x="24" y="60" class="label">关键收益：逻辑 OID、权限、依赖关系保持不变，物理文件变紧凑，索引也随重建清掉历史膨胀。</text>
  </g>
</svg>
