<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img">
  <title>生产是否执行 REPACK 的决策流程</title>
  <desc>展示 DBA 从膨胀确认、替代方案、并发条件、资源预算、执行监控到复盘的生产决策闭环。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2d3d; }
    .h1 { font-size: 24px; font-weight: 700; }
    .h2 { font-size: 16px; font-weight: 700; }
    .label { font-size: 14px; }
    .small { font-size: 12.5px; fill: #536476; }
    .step { fill: #f8fafc; stroke: #64748b; stroke-width: 1.4; rx: 10; }
    .yes { fill: #e9f7ef; stroke: #3d8b61; stroke-width: 1.4; rx: 10; }
    .warn { fill: #fff2df; stroke: #c47b26; stroke-width: 1.4; rx: 10; }
    .stop { fill: #ffe8e4; stroke: #bd4b3f; stroke-width: 1.4; rx: 10; }
    .arrow { stroke: #294969; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #69798a; stroke-width: 2; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrowGray); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294969"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#69798a"/>
    </marker>
  </defs>

  <rect x="20" y="18" width="1080" height="642" fill="#ffffff" stroke="#d8e0e8" rx="14"/>
  <text x="48" y="58" class="h1">生产 REPACK 决策：先证明问题，再选择重写方式，最后验证收益</text>
  <text x="48" y="86" class="small">REPACK 是重型维护操作。把它当作日常清扫，会把本该由 autovacuum 和数据模型解决的问题转嫁成周期性大 I/O。</text>

  <g transform="translate(70 128)">
    <rect class="step" x="0" y="0" width="230" height="82"/>
    <text x="18" y="30" class="h2">1. 确认膨胀是否真实</text>
    <text x="18" y="55" class="small">pg_relation_size / pg_stat_all_tables</text>
    <text x="18" y="73" class="small">必要时用 pgstattuple 精确测量</text>
    <path class="arrow" d="M 234 41 L 304 41"/>

    <rect class="step" x="312" y="0" width="230" height="82"/>
    <text x="330" y="30" class="h2">2. 优先找低成本方案</text>
    <text x="330" y="55" class="small">autovacuum / 分区 drop</text>
    <text x="330" y="73" class="small">批量 DELETE 改造为分批</text>
    <path class="arrow" d="M 546 41 L 616 41"/>

    <rect class="warn" x="624" y="0" width="250" height="82"/>
    <text x="642" y="30" class="h2">3. 需要归还 OS 空间？</text>
    <text x="642" y="55" class="small">如果只是表内复用，普通 VACUUM</text>
    <text x="642" y="73" class="small">通常更合适</text>
  </g>

  <path class="arrow" d="M 820 212 C 820 252, 230 252, 230 292"/>
  <g transform="translate(70 292)">
    <rect class="yes" x="0" y="0" width="270" height="90"/>
    <text x="18" y="30" class="h2">4A. 可停写/停读窗口明确</text>
    <text x="18" y="58" class="small">普通 REPACK：简单、彻底、强锁时间长</text>
    <text x="18" y="76" class="small">适合维护窗口和离线表</text>
    <path class="arrow" d="M 274 45 L 360 45"/>

    <rect class="warn" x="370" y="0" width="270" height="90"/>
    <text x="388" y="30" class="h2">4B. 需要在线</text>
    <text x="388" y="58" class="small">检查永久表、身份索引、slot 配额</text>
    <text x="388" y="76" class="small">评估 DDL 冲突和 catch-up 压力</text>
    <path class="arrow" d="M 644 45 L 730 45"/>

    <rect class="step" x="740" y="0" width="250" height="90"/>
    <text x="758" y="30" class="h2">5. 资源预算</text>
    <text x="758" y="58" class="small">磁盘、WAL、归档、复制延迟</text>
    <text x="758" y="76" class="small">maintenance_work_mem 和业务低峰</text>
  </g>

  <path class="arrow" d="M 935 382 C 935 432, 230 432, 230 472"/>
  <g transform="translate(70 472)">
    <rect class="step" x="0" y="0" width="250" height="88"/>
    <text x="18" y="30" class="h2">6. 执行与观察</text>
    <text x="18" y="58" class="small">pg_stat_progress_repack</text>
    <text x="18" y="76" class="small">pg_locks / WAL / replica lag</text>
    <path class="arrow" d="M 254 44 L 344 44"/>

    <rect class="yes" x="354" y="0" width="250" height="88"/>
    <text x="372" y="30" class="h2">7. ANALYZE 与验证</text>
    <text x="372" y="58" class="small">统计信息、表大小、索引大小</text>
    <text x="372" y="76" class="small">关键 SQL 计划是否改善</text>
    <path class="arrow" d="M 608 44 L 698 44"/>

    <rect class="stop" x="708" y="0" width="282" height="88"/>
    <text x="726" y="30" class="h2">8. 复盘根因</text>
    <text x="726" y="58" class="small">长事务、批量更新、热点页、fillfactor</text>
    <text x="726" y="76" class="small">否则下次还会重写同一张表</text>
  </g>

  <path class="dash" d="M 190 560 C 190 620, 898 620, 898 560"/>
</svg>
