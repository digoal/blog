<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img">
  <title>REPACK 的排序路径和资源成本</title>
  <desc>比较 REPACK USING INDEX 时的索引扫描路径和顺序扫描加排序路径，并标出临时空间、索引重建、maintenance_work_mem 与 fillfactor 等成本边界。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2d3d; }
    .h1 { font-size: 24px; font-weight: 700; }
    .h2 { font-size: 17px; font-weight: 700; }
    .label { font-size: 14px; }
    .small { font-size: 12.5px; fill: #536476; }
    .panel { fill: #f8fafc; stroke: #d4dde6; stroke-width: 1.3; rx: 12; }
    .idx { fill: #eef2ff; stroke: #5367b0; stroke-width: 1.5; rx: 9; }
    .seq { fill: #e9f7ef; stroke: #3d8b61; stroke-width: 1.5; rx: 9; }
    .sort { fill: #fff2df; stroke: #bf7a2d; stroke-width: 1.5; rx: 9; }
    .cost { fill: #fff9e8; stroke: #b88924; stroke-width: 1.5; rx: 9; }
    .arrow { stroke: #294969; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .barBase { fill: #d9e2ec; }
    .bar1 { fill: #5367b0; }
    .bar2 { fill: #3d8b61; }
    .bar3 { fill: #bf7a2d; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294969"/>
    </marker>
  </defs>

  <rect x="20" y="18" width="1080" height="612" fill="#ffffff" stroke="#d8e0e8" rx="14"/>
  <text x="48" y="58" class="h1">USING INDEX 不等于一定走索引扫描：优化器会在两条重写路径之间取舍</text>
  <text x="48" y="86" class="small">当指定 B-tree 索引时，源码会调用 planner 成本判断：直接按索引顺序读旧表，或顺序扫描旧表后排序再写新 heap。</text>

  <rect class="panel" x="58" y="126" width="480" height="230"/>
  <text x="84" y="160" class="h2">路径 A：index scan → new heap</text>
  <rect class="idx" x="88" y="192" width="118" height="62"/>
  <text x="107" y="229" class="label">B-tree 索引</text>
  <path class="arrow" d="M 210 223 L 270 223"/>
  <rect class="seq" x="278" y="192" width="118" height="62"/>
  <text x="297" y="219" class="label">旧 heap</text>
  <text x="297" y="240" class="small">随机读更多</text>
  <path class="arrow" d="M 400 223 L 460 223"/>
  <rect class="seq" x="468" y="192" width="44" height="62"/>
  <text x="478" y="229" class="label">新</text>
  <text x="84" y="292" class="small">优点：不需要大型排序文件。</text>
  <text x="84" y="318" class="small">代价：如果索引顺序和物理顺序偏离大，随机 I/O 可能很高。</text>

  <rect class="panel" x="582" y="126" width="480" height="230"/>
  <text x="608" y="160" class="h2">路径 B：seq scan → sort → new heap</text>
  <rect class="seq" x="612" y="192" width="118" height="62"/>
  <text x="633" y="219" class="label">旧 heap</text>
  <text x="633" y="240" class="small">顺序读</text>
  <path class="arrow" d="M 734 223 L 794 223"/>
  <rect class="sort" x="802" y="192" width="118" height="62"/>
  <text x="834" y="219" class="label">排序</text>
  <text x="824" y="240" class="small">可能落盘</text>
  <path class="arrow" d="M 924 223 L 984 223"/>
  <rect class="seq" x="992" y="192" width="44" height="62"/>
  <text x="1002" y="229" class="label">新</text>
  <text x="608" y="292" class="small">优点：顺序扫描通常更友好，排序后批量写入。</text>
  <text x="608" y="318" class="small">代价：峰值临时空间可接近两倍表大小加索引。</text>

  <rect class="panel" x="58" y="396" width="1004" height="174"/>
  <text x="84" y="430" class="h2">资源预算模型</text>
  <text x="84" y="464" class="label">索引扫描或无需排序：临时空间至少约等于 表 + 所有索引</text>
  <rect class="barBase" x="430" y="446" width="480" height="18" rx="9"/>
  <rect class="bar1" x="430" y="446" width="300" height="18" rx="9"/>
  <text x="928" y="462" class="small">table + indexes</text>

  <text x="84" y="504" class="label">顺序扫描加排序：峰值可到 约 2 × 表 + 所有索引</text>
  <rect class="barBase" x="430" y="486" width="480" height="18" rx="9"/>
  <rect class="bar2" x="430" y="486" width="300" height="18" rx="9"/>
  <rect class="bar3" x="730" y="486" width="150" height="18" rx="9"/>
  <text x="928" y="502" class="small">table + sort + indexes</text>

  <text x="84" y="544" class="small">调优点：提高 maintenance_work_mem 可以减少排序和索引构建压力；fillfactor 会决定重写后仍保留多少页内空闲空间。</text>
</svg>
