<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img">
  <title>pg_stat_progress_repack 的阶段和计数器</title>
  <desc>展示 REPACK 的进度阶段、主要计数器以及 DBA 如何通过 pg_stat_progress_repack 判断当前卡在哪里。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2d3d; }
    .h1 { font-size: 24px; font-weight: 700; }
    .h2 { font-size: 17px; font-weight: 700; }
    .label { font-size: 14px; }
    .small { font-size: 12.5px; fill: #536476; }
    .phase { fill: #f8fafc; stroke: #64748b; stroke-width: 1.4; rx: 9; }
    .catch { fill: #fff2df; stroke: #c47b26; stroke-width: 1.4; rx: 9; }
    .swap { fill: #ffe8e4; stroke: #bd4b3f; stroke-width: 1.4; rx: 9; }
    .metric { fill: #e9f7ef; stroke: #3d8b61; stroke-width: 1.4; rx: 9; }
    .arrow { stroke: #294969; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294969"/>
    </marker>
  </defs>

  <rect x="20" y="18" width="1080" height="584" fill="#ffffff" stroke="#d8e0e8" rx="14"/>
  <text x="48" y="58" class="h1">进度视图不是装饰：它告诉你 REPACK 正在花时间读、排、写、补偿还是交换</text>
  <text x="48" y="86" class="small">pg_stat_progress_repack 将 REPACK、VACUUM FULL、CLUSTER 汇入同一套进度语义，并保留 command 字段区分来源。</text>

  <g transform="translate(56 132)">
    <rect class="phase" x="0" y="0" width="138" height="62"/><text x="18" y="36" class="label">initializing</text>
    <path class="arrow" d="M 142 31 L 190 31"/>
    <rect class="phase" x="198" y="0" width="150" height="62"/><text x="214" y="28" class="label">seq scanning</text><text x="214" y="48" class="small">heap blocks</text>
    <path class="arrow" d="M 352 31 L 400 31"/>
    <rect class="phase" x="408" y="0" width="150" height="62"/><text x="424" y="28" class="label">index scanning</text><text x="424" y="48" class="small">或跳过此步</text>
    <path class="arrow" d="M 562 31 L 610 31"/>
    <rect class="phase" x="618" y="0" width="130" height="62"/><text x="637" y="36" class="label">sorting</text>
    <path class="arrow" d="M 752 31 L 800 31"/>
    <rect class="phase" x="808" y="0" width="150" height="62"/><text x="824" y="28" class="label">writing new</text><text x="824" y="48" class="small">heap</text>
  </g>

  <g transform="translate(156 260)">
    <rect class="catch" x="0" y="0" width="190" height="70"/><text x="18" y="30" class="label">catch-up</text><text x="18" y="52" class="small">仅并发路径处理 DML</text>
    <path class="arrow" d="M 194 35 L 264 35"/>
    <rect class="swap" x="272" y="0" width="208" height="70"/><text x="18" y="30" class="label">swapping relation files</text><text x="18" y="52" class="small">短暂强锁但可能可感知</text>
    <path class="arrow" d="M 484 35 L 554 35"/>
    <rect class="phase" x="562" y="0" width="170" height="70"/><text x="18" y="30" class="label">rebuilding index</text><text x="18" y="52" class="small">索引重建计数增加</text>
    <path class="arrow" d="M 736 35 L 806 35"/>
    <rect class="phase" x="814" y="0" width="150" height="70"/><text x="18" y="30" class="label">final cleanup</text><text x="18" y="52" class="small">删除临时文件</text>
  </g>

  <g transform="translate(86 424)">
    <rect class="metric" x="0" y="0" width="242" height="84"/>
    <text x="18" y="28" class="label">heap_blks_total / scanned</text>
    <text x="18" y="52" class="small">看顺序扫描进度</text>
    <text x="18" y="72" class="small">只在 seq scanning 阶段推进</text>
    <rect class="metric" x="262" y="0" width="242" height="84"/>
    <text x="280" y="28" class="label">heap_tuples_inserted</text>
    <text x="280" y="52" class="small">看新 heap 写入量</text>
    <text x="280" y="72" class="small">catch-up 中也会增加</text>
    <rect class="metric" x="524" y="0" width="242" height="84"/>
    <text x="542" y="28" class="label">heap_tuples_updated/deleted</text>
    <text x="542" y="52" class="small">看并发 DML 补偿压力</text>
    <text x="542" y="72" class="small">只在 catch-up 阶段推进</text>
    <rect class="metric" x="786" y="0" width="242" height="84"/>
    <text x="804" y="28" class="label">index_rebuild_count</text>
    <text x="804" y="52" class="small">看索引重建已完成数量</text>
    <text x="804" y="72" class="small">只在 rebuilding index 阶段推进</text>
  </g>
</svg>
