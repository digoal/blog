<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">Clock sweep 和 buffer ring 替换策略</title>
  <desc id="desc">展示默认 clock sweep 替换算法如何跳过 pinned 或 usage_count 非零的 buffer，以及批量扫描如何使用小 ring 限制污染。</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#334155;stroke-width:2}.cold{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5}.hot{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.pinned{fill:#fee2e2;stroke:#dc2626;stroke-width:1.5}.ring{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:19px;fill:#0f172a}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}.tiny{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#475569}.arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1100" height="680"/>
  <text class="text" x="42" y="48">替换策略：默认保护热页，批量访问限制缓存污染</text>
  <rect class="panel" x="50" y="88" width="610" height="520" rx="10"/>
  <text class="text" x="80" y="126">默认 clock-sweep</text>
  <circle cx="352" cy="350" r="185" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <circle class="hot" cx="352" cy="165" r="38"/><text class="tiny" x="337" y="170">u=3</text>
  <circle class="pinned" cx="483" cy="219" r="38"/><text class="tiny" x="456" y="224">pinned</text>
  <circle class="hot" cx="537" cy="350" r="38"/><text class="tiny" x="522" y="355">u=1</text>
  <circle class="cold" cx="483" cy="481" r="38"/><text class="tiny" x="468" y="486">u=0</text>
  <circle class="hot" cx="352" cy="535" r="38"/><text class="tiny" x="337" y="540">u=2</text>
  <circle class="cold" cx="221" cy="481" r="38"/><text class="tiny" x="206" y="486">u=0</text>
  <circle class="pinned" cx="167" cy="350" r="38"/><text class="tiny" x="140" y="355">pinned</text>
  <circle class="hot" cx="221" cy="219" r="38"/><text class="tiny" x="206" y="224">u=5</text>
  <path class="arrow" d="M352 350 L510 270"/>
  <text class="small" x="382" y="315">nextVictimBuffer</text>
  <rect class="cold" x="84" y="554" width="24" height="18"/><text class="small" x="116" y="569">可回收候选：refcount=0 且 usage_count=0</text>
  <rect class="hot" x="84" y="582" width="24" height="18"/><text class="small" x="116" y="597">热页：usage_count 递减，暂不回收</text>
  <rect class="panel" x="710" y="88" width="340" height="520" rx="10"/>
  <text class="text" x="738" y="126">Buffer access strategy ring</text>
  <rect class="ring" x="750" y="175" width="260" height="260" rx="10"/>
  <text class="small" x="780" y="210">Bulk read / VACUUM / Bulk write</text>
  <rect class="cold" x="786" y="248" width="78" height="55" rx="8"/><text class="tiny" x="802" y="280">slot 1</text>
  <rect class="cold" x="896" y="248" width="78" height="55" rx="8"/><text class="tiny" x="912" y="280">slot 2</text>
  <rect class="cold" x="786" y="338" width="78" height="55" rx="8"/><text class="tiny" x="802" y="370">slot 3</text>
  <rect class="pinned" x="896" y="338" width="78" height="55" rx="8"/><text class="tiny" x="912" y="370">dirty</text>
  <path class="arrow" d="M825 248 C870 210 935 214 935 248"/><path class="arrow" d="M935 303 C972 340 972 362 974 365"/><path class="arrow" d="M896 365 C860 410 825 402 825 393"/>
  <text class="small" x="748" y="482">大扫描只在 ring 中循环，避免把整个 shared buffer 冲掉。</text>
  <text class="small" x="748" y="512">脏 ring 页可能触发 WAL flush 或退回默认策略。</text>
  <text class="small" x="748" y="542">默认大小：bulk read 以 256KB 起步，bulk write 16MB，VACUUM 受参数控制。</text>
</svg>
