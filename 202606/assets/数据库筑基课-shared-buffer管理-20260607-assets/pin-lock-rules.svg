<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">Pin 与 content lock 的访问规则</title>
  <desc id="desc">展示 shared buffer 访问时 pin、shared lock、share-exclusive lock、exclusive lock 和 cleanup lock 的用途。</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#334155;stroke-width:2}.pin{fill:#eef6ff;stroke:#2563eb;stroke-width:2}.read{fill:#ecfdf5;stroke:#059669;stroke-width:2}.write{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.danger{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:19px;fill:#0f172a}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}.arrow{stroke:#334155;stroke-width:2.1;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1100" height="650"/>
  <text class="text" x="42" y="48">Pin 管“页面不会被换走”，content lock 管“页面内容怎么并发访问”</text>
  <rect class="panel" x="60" y="95" width="980" height="470" rx="10"/>
  <rect class="pin" x="105" y="150" width="210" height="92" rx="9"/>
  <text class="text" x="130" y="184">1. Pin</text><text class="small" x="130" y="210">增加 refcount</text><text class="small" x="130" y="231">禁止被替换为别的页</text>
  <rect class="read" x="425" y="115" width="245" height="88" rx="9"/>
  <text class="text" x="450" y="149">读页面 / 可见性判断</text><text class="small" x="450" y="175">至少 shared content lock</text>
  <rect class="write" x="425" y="238" width="245" height="96" rx="9"/>
  <text class="text" x="450" y="272">改 xmin/xmax 或插入</text><text class="small" x="450" y="298">exclusive content lock</text><text class="small" x="450" y="318">避免半更新状态被看见</text>
  <rect class="write" x="425" y="370" width="245" height="96" rx="9"/>
  <text class="text" x="450" y="404">设置 hint bits</text><text class="small" x="450" y="430">share-exclusive lock</text><text class="small" x="450" y="450">非关键缓存信息</text>
  <rect class="danger" x="760" y="188" width="235" height="112" rx="9"/>
  <text class="text" x="785" y="222">物理删除 / 页面压缩</text><text class="small" x="785" y="248">exclusive lock</text><text class="small" x="785" y="270">并确认 shared refcount=1</text><text class="small" x="785" y="290">即 cleanup lock</text>
  <rect class="read" x="760" y="350" width="235" height="92" rx="9"/>
  <text class="text" x="785" y="384">写回磁盘</text><text class="small" x="785" y="410">share-exclusive lock</text><text class="small" x="785" y="430">防止写出破碎页面</text>
  <path class="arrow" d="M315 196 L425 159"/><path class="arrow" d="M315 196 L425 286"/><path class="arrow" d="M315 196 C360 360 383 410 425 418"/>
  <path class="arrow" d="M670 286 L760 244"/><path class="arrow" d="M670 418 L760 397"/>
  <text class="small" x="98" y="517">常见误区：拿到 pin 不等于可以随便读写内容；没有 pin 的指针即使刚刚有效，也可能下一瞬间指向另一个磁盘页面。</text>
  <text class="small" x="98" y="542">工程边界：content lock 应短持有；pin 可以跨较长页面处理过程，但不能跨事务边界。</text>
</svg>
