<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">ReadBuffer 的命中与未命中路径</title>
  <desc id="desc">展示 ReadBuffer_common 进入 PinBufferForBlock 和 BufferAlloc 后，命中直接 pin，未命中选择 victim 并发起 I/O。</desc>
  <style>
    .bg{fill:#f8fafc}.node{fill:#fff;stroke:#334155;stroke-width:2}.hit{fill:#ecfdf5;stroke:#059669;stroke-width:2}.miss{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.io{fill:#eef6ff;stroke:#2563eb;stroke-width:2}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:19px;fill:#0f172a}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}.arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1100" height="660"/>
  <text class="text" x="42" y="48">一次页面读取，不只是“读磁盘”：先查共享缓存，再决定是否 I/O</text>
  <rect class="node" x="64" y="95" width="230" height="76" rx="10"/>
  <text class="text" x="88" y="127">ReadBuffer_common</text><text class="small" x="88" y="151">构造读取操作</text>
  <rect class="node" x="390" y="95" width="242" height="76" rx="10"/>
  <text class="text" x="414" y="127">PinBufferForBlock</text><text class="small" x="414" y="151">临时表走 local buffer</text>
  <rect class="node" x="728" y="95" width="252" height="76" rx="10"/>
  <text class="text" x="752" y="127">BufferAlloc</text><text class="small" x="752" y="151">共享表走 shared buffer</text>
  <rect class="node" x="85" y="265" width="245" height="92" rx="10"/>
  <text class="text" x="109" y="298">BufTableLookup</text><text class="small" x="109" y="323">持有映射分区共享锁</text><text class="small" x="109" y="344">查 BufferTag</text>
  <rect class="hit" x="420" y="245" width="260" height="92" rx="10"/>
  <text class="text" x="446" y="278">命中</text><text class="small" x="446" y="303">PinBuffer 增加 refcount</text><text class="small" x="446" y="324">释放映射锁后返回</text>
  <rect class="miss" x="420" y="405" width="260" height="102" rx="10"/>
  <text class="text" x="446" y="438">未命中</text><text class="small" x="446" y="463">释放映射锁</text><text class="small" x="446" y="484">GetVictimBuffer 找 slot</text>
  <rect class="io" x="762" y="370" width="258" height="112" rx="10"/>
  <text class="text" x="788" y="403">改绑并读入页面</text><text class="small" x="788" y="428">排他映射锁插入 hash</text><text class="small" x="788" y="449">设置 BM_TAG_VALID</text><text class="small" x="788" y="470">StartBufferIO / WaitReadBuffers</text>
  <rect class="hit" x="762" y="535" width="258" height="72" rx="10"/>
  <text class="text" x="788" y="566">返回已 pin 的 Buffer</text><text class="small" x="788" y="589">调用者再按访问规则加锁</text>
  <path class="arrow" d="M294 133 L390 133"/><path class="arrow" d="M632 133 L728 133"/>
  <path class="arrow" d="M854 171 C854 235 336 204 214 265"/>
  <path class="arrow" d="M330 298 L420 291"/><path class="arrow" d="M330 334 C382 390 392 430 420 456"/>
  <path class="arrow" d="M680 456 L762 426"/><path class="arrow" d="M680 291 C760 310 842 308 891 370"/><path class="arrow" d="M891 482 L891 535"/>
  <text class="small" x="366" y="268">found</text><text class="small" x="356" y="415">not found</text>
  <text class="small" x="42" y="630">关键边界：缓存命中只保证页面在 shared buffer 中并被 pin；是否可以读写页面内容，还要遵守 content lock 规则。</text>
</svg>
