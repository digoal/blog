<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">Shared buffer 的逻辑到物理结构</title>
  <desc id="desc">展示磁盘页面通过 BufferTag 映射到共享内存中的 BufferDesc 和 8KB BufferBlock。</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#334155;stroke-width:2}.slot{fill:#eef6ff;stroke:#2563eb;stroke-width:1.5}.block{fill:#ecfdf5;stroke:#059669;stroke-width:1.5}.hash{fill:#fff7ed;stroke:#ea580c;stroke-width:1.5}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:20px;fill:#0f172a}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:16px;fill:#334155}.tiny{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#475569}.arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1100" height="640"/>
  <text class="text" x="42" y="48">Shared buffer 是“固定数量 slot + 页面身份映射 + 并发状态”的组合</text>
  <rect class="panel" x="42" y="90" width="270" height="470" rx="10"/>
  <text class="text" x="70" y="130">磁盘页面身份</text>
  <rect class="slot" x="70" y="165" width="214" height="82" rx="7"/>
  <text class="small" x="92" y="198">BufferTag</text><text class="tiny" x="92" y="224">spcOid / dbOid / rel</text><text class="tiny" x="92" y="244">forkNum / blockNum</text>
  <rect class="block" x="70" y="305" width="214" height="82" rx="7"/>
  <text class="small" x="92" y="338">关系文件</text><text class="tiny" x="92" y="364">main / fsm / vm / init</text>
  <rect class="block" x="70" y="420" width="214" height="82" rx="7"/>
  <text class="small" x="92" y="453">8KB Page</text><text class="tiny" x="92" y="479">通常 BLCKSZ = 8kB</text>
  <rect class="panel" x="410" y="90" width="300" height="470" rx="10"/>
  <text class="text" x="436" y="130">共享映射表</text>
  <rect class="hash" x="442" y="168" width="236" height="76" rx="7"/>
  <text class="small" x="465" y="200">SharedBufHash</text><text class="tiny" x="465" y="224">BufferTag -&gt; buf_id</text>
  <rect class="hash" x="442" y="292" width="236" height="82" rx="7"/>
  <text class="small" x="465" y="324">分区锁</text><text class="tiny" x="465" y="350">NUM_BUFFER_PARTITIONS</text>
  <rect class="hash" x="442" y="425" width="236" height="76" rx="7"/>
  <text class="small" x="465" y="457">查找与改绑</text><text class="tiny" x="465" y="481">共享锁查找，排他锁插入/删除</text>
  <rect class="panel" x="795" y="90" width="260" height="470" rx="10"/>
  <text class="text" x="820" y="130">共享内存 slot</text>
  <rect class="slot" x="825" y="166" width="200" height="70" rx="7"/>
  <text class="small" x="845" y="196">BufferDesc[buf_id]</text><text class="tiny" x="845" y="218">tag / state / locks</text>
  <rect class="block" x="825" y="273" width="200" height="70" rx="7"/>
  <text class="small" x="845" y="303">BufferBlocks[buf_id]</text><text class="tiny" x="845" y="325">页面内容</text>
  <rect class="slot" x="825" y="380" width="200" height="86" rx="7"/>
  <text class="small" x="845" y="411">state 64-bit</text><text class="tiny" x="845" y="435">refcount / usage</text><text class="tiny" x="845" y="455">dirty / valid / locks</text>
  <path class="arrow" d="M284 206 C345 206 365 206 442 206"/>
  <path class="arrow" d="M678 206 C735 206 760 201 825 201"/>
  <path class="arrow" d="M925 236 L925 273"/>
  <path class="arrow" d="M177 387 C240 520 700 520 825 421"/>
  <text class="small" x="330" y="190">hash(BufferTag)</text><text class="small" x="710" y="188">buf_id</text>
  <text class="tiny" x="322" y="590">要点：BufferTag 决定“这是谁”，BufferDesc 决定“能不能用、脏不脏、热不热”。</text>
</svg>
