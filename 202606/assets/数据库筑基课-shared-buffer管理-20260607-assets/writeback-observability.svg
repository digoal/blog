<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="670" viewBox="0 0 1100 670" role="img" aria-labelledby="title desc">
  <title id="title">Dirty buffer 写回与观测闭环</title>
  <desc id="desc">展示 dirty buffer 从 backend 修改到 bgwriter、checkpointer 或 backend 自己写回的路径，以及 DBA 可观测指标。</desc>
  <style>
    .bg{fill:#f8fafc}.node{fill:#fff;stroke:#334155;stroke-width:2}.dirty{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.wal{fill:#eef6ff;stroke:#2563eb;stroke-width:2}.obs{fill:#ecfdf5;stroke:#059669;stroke-width:2}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:19px;fill:#0f172a}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}.arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1100" height="670"/>
  <text class="text" x="42" y="48">脏页不是提交时立刻刷数据文件：WAL 先保证可恢复，数据页后续写回</text>
  <rect class="node" x="60" y="110" width="230" height="82" rx="10"/>
  <text class="text" x="84" y="143">Backend 修改页面</text><text class="small" x="84" y="168">持有合适 content lock</text>
  <rect class="dirty" x="390" y="110" width="240" height="82" rx="10"/>
  <text class="text" x="414" y="143">MarkBufferDirty</text><text class="small" x="414" y="168">设置 BM_DIRTY</text>
  <rect class="wal" x="760" y="95" width="250" height="112" rx="10"/>
  <text class="text" x="784" y="129">WAL 持久化边界</text><text class="small" x="784" y="154">写脏页前必须满足</text><text class="small" x="784" y="176">page LSN 对应 WAL 已 flush</text>
  <rect class="dirty" x="95" y="310" width="245" height="95" rx="10"/>
  <text class="text" x="121" y="344">Backend 自己写</text><text class="small" x="121" y="370">victim 是 dirty 时</text><text class="small" x="121" y="390">可能拖慢前台查询</text>
  <rect class="dirty" x="430" y="300" width="245" height="105" rx="10"/>
  <text class="text" x="456" y="334">Background writer</text><text class="small" x="456" y="360">预写将要复用的脏页</text><text class="small" x="456" y="382">按 recent alloc 估算需求</text>
  <rect class="dirty" x="765" y="300" width="245" height="105" rx="10"/>
  <text class="text" x="791" y="334">Checkpointer</text><text class="small" x="791" y="360">checkpoint 写出所有脏页</text><text class="small" x="791" y="382">完成后缩短恢复起点</text>
  <rect class="obs" x="90" y="510" width="920" height="82" rx="10"/>
  <text class="text" x="118" y="543">观测闭环</text><text class="small" x="118" y="570">pg_stat_bgwriter / pg_stat_checkpointer / pg_stat_io / pg_buffercache / wait_event / checkpoint 日志</text>
  <path class="arrow" d="M290 151 L390 151"/><path class="arrow" d="M630 151 L760 151"/>
  <path class="arrow" d="M510 192 C420 250 288 250 218 310"/><path class="arrow" d="M510 192 C535 240 548 268 552 300"/><path class="arrow" d="M630 151 C760 220 860 232 887 300"/>
  <path class="dash" d="M218 405 C250 470 360 486 430 510"/><path class="dash" d="M552 405 L552 510"/><path class="dash" d="M887 405 C850 470 730 486 670 510"/>
  <text class="small" x="64" y="635">判断方向：前台 backend 写多，优先看 bgwriter 是否跟不上、checkpoint 是否过密、shared_buffers 与 OS cache 分工是否合理。</text>
</svg>
