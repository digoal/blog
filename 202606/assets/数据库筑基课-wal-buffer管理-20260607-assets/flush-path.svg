<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">WAL 写出、刷盘和组提交路径</title>
  <desc id="desc">展示前台提交、WAL writer 和 WAL buffer 满三类路径如何调用 XLogWrite 和 fsync。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .client { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .writer { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .alert { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .disk { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #1d4ed8; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
  </style>

  <text x="490" y="44" text-anchor="middle" class="text">WAL buffer 之后还有两步：write 和 flush</text>

  <rect x="52" y="86" width="220" height="102" class="client"/>
  <text x="162" y="120" text-anchor="middle" class="text">同步提交</text>
  <text x="162" y="148" text-anchor="middle" class="small">事务提交调用 XLogFlush</text>
  <text x="162" y="170" text-anchor="middle" class="tiny">可能形成组提交</text>

  <rect x="52" y="238" width="220" height="102" class="writer"/>
  <text x="162" y="272" text-anchor="middle" class="text">WAL writer</text>
  <text x="162" y="300" text-anchor="middle" class="small">XLogBackgroundFlush</text>
  <text x="162" y="322" text-anchor="middle" class="tiny">按 wal_writer_delay 周期工作</text>

  <rect x="52" y="390" width="220" height="102" class="alert"/>
  <text x="162" y="424" text-anchor="middle" class="text">buffer 满</text>
  <text x="162" y="452" text-anchor="middle" class="small">AdvanceXLInsertBuffer</text>
  <text x="162" y="474" text-anchor="middle" class="tiny">前台插入被迫写出</text>

  <rect x="356" y="160" width="248" height="100" class="box"/>
  <text x="480" y="194" text-anchor="middle" class="text">WaitXLogInsertionsToFinish</text>
  <text x="480" y="222" text-anchor="middle" class="small">确保目标 LSN 之前已复制完成</text>
  <text x="480" y="244" text-anchor="middle" class="tiny">避免写出半条 WAL 记录</text>

  <rect x="356" y="316" width="248" height="100" class="box"/>
  <text x="480" y="350" text-anchor="middle" class="text">WALWriteLock</text>
  <text x="480" y="378" text-anchor="middle" class="small">一次只有一个写出者</text>
  <text x="480" y="400" text-anchor="middle" class="tiny">减少重复 write/fsync</text>

  <rect x="704" y="116" width="220" height="94" class="disk"/>
  <text x="814" y="150" text-anchor="middle" class="text">XLogWrite</text>
  <text x="814" y="178" text-anchor="middle" class="small">WAL buffer 到 pg_wal 文件</text>

  <rect x="704" y="262" width="220" height="94" class="disk"/>
  <text x="814" y="296" text-anchor="middle" class="text">issue_xlog_fsync</text>
  <text x="814" y="324" text-anchor="middle" class="small">按 wal_sync_method 刷盘</text>

  <rect x="704" y="408" width="220" height="74" class="writer"/>
  <text x="814" y="438" text-anchor="middle" class="text">唤醒后续消费者</text>
  <text x="814" y="462" text-anchor="middle" class="small">walsender / 等待 LSN 进程</text>

  <path d="M272 137 C320 140 330 172 356 190" class="line"/>
  <path d="M272 289 C318 286 330 226 356 220" class="dash"/>
  <path d="M272 441 C326 434 330 380 356 366" class="line"/>
  <path d="M480 260 L480 316" class="line"/>
  <path d="M604 366 C650 350 676 214 704 176" class="line"/>
  <path d="M814 210 L814 262" class="line"/>
  <path d="M814 356 L814 408" class="dash"/>

  <text x="490" y="516" text-anchor="middle" class="small">调大 wal_buffers 主要减少第三条路径，不会取消同步提交对 flush 的持久性要求。</text>
</svg>
