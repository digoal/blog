<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">WAL 记录插入路径</title>
  <desc id="desc">展示一次 WAL 记录从私有内存构造、预留 LSN、复制到 WAL buffer、更新插入进度的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .private { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .critical { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .done { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .lock { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #2563eb; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .thin { stroke: #64748b; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
  </style>

  <text x="490" y="44" text-anchor="middle" class="text">XLogInsert：把一次修改变成可恢复的 WAL 记录</text>

  <rect x="46" y="92" width="180" height="110" class="private"/>
  <text x="136" y="126" text-anchor="middle" class="text">私有构造区</text>
  <text x="136" y="154" text-anchor="middle" class="small">XLogBeginInsert</text>
  <text x="136" y="176" text-anchor="middle" class="small">XLogRegister*</text>

  <rect x="286" y="92" width="180" height="110" class="private"/>
  <text x="376" y="126" text-anchor="middle" class="text">组装记录</text>
  <text x="376" y="154" text-anchor="middle" class="small">XLogRecordAssemble</text>
  <text x="376" y="176" text-anchor="middle" class="small">FPW 判断可重试</text>

  <rect x="526" y="92" width="180" height="110" class="lock"/>
  <text x="616" y="126" text-anchor="middle" class="text">插入锁</text>
  <text x="616" y="154" text-anchor="middle" class="small">拿一把 WALInsertLock</text>
  <text x="616" y="176" text-anchor="middle" class="small">保护并发复制</text>

  <rect x="766" y="92" width="180" height="110" class="critical"/>
  <text x="856" y="126" text-anchor="middle" class="text">预留位置</text>
  <text x="856" y="154" text-anchor="middle" class="small">insertpos_lck</text>
  <text x="856" y="176" text-anchor="middle" class="small">CurrBytePos += size</text>

  <rect x="166" y="288" width="210" height="118" class="critical"/>
  <text x="271" y="322" text-anchor="middle" class="text">复制到 WAL buffer</text>
  <text x="271" y="350" text-anchor="middle" class="small">CopyXLogRecordToWAL</text>
  <text x="271" y="374" text-anchor="middle" class="small">跨页时写 continuation 头</text>

  <rect x="442" y="288" width="210" height="118" class="box"/>
  <text x="547" y="322" text-anchor="middle" class="text">需要新页？</text>
  <text x="547" y="350" text-anchor="middle" class="small">GetXLogBuffer</text>
  <text x="547" y="374" text-anchor="middle" class="small">可能调用 AdvanceXLInsertBuffer</text>

  <rect x="718" y="288" width="210" height="118" class="done"/>
  <text x="823" y="322" text-anchor="middle" class="text">完成插入</text>
  <text x="823" y="350" text-anchor="middle" class="small">释放 WALInsertLock</text>
  <text x="823" y="374" text-anchor="middle" class="small">更新 wal_records / wal_bytes</text>

  <path d="M226 147 L286 147" class="line"/>
  <path d="M466 147 L526 147" class="line"/>
  <path d="M706 147 L766 147" class="line"/>
  <path d="M856 202 C856 246 372 246 294 288" class="line"/>
  <path d="M376 350 L442 350" class="line"/>
  <path d="M652 350 L718 350" class="line"/>
  <path d="M547 288 C545 250 770 240 856 202" class="thin"/>

  <text x="490" y="448" text-anchor="middle" class="small">串行化最短路径只有“预留字节位置”；记录复制通常可由多个后端并行完成。</text>
</svg>
