<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">WAL buffer 观测与调参闭环</title>
  <desc id="desc">展示从 pg_stat_wal、EXPLAIN WAL、pg_stat_io 和日志指标判断 WAL buffer 是否成为问题，并选择相应治理手段。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .metric { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .decision { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 8; }
    .action { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <text x="490" y="44" text-anchor="middle" class="text">不要只改 wal_buffers：先用指标判断瓶颈类型</text>

  <rect x="48" y="94" width="230" height="110" class="metric"/>
  <text x="163" y="128" text-anchor="middle" class="text">WAL 生成量</text>
  <text x="163" y="156" text-anchor="middle" class="small">pg_stat_wal.wal_bytes</text>
  <text x="163" y="180" text-anchor="middle" class="small">wal_records / wal_fpi_bytes</text>

  <rect x="48" y="252" width="230" height="110" class="metric"/>
  <text x="163" y="286" text-anchor="middle" class="text">buffer 压力</text>
  <text x="163" y="314" text-anchor="middle" class="small">wal_buffers_full</text>
  <text x="163" y="338" text-anchor="middle" class="small">EXPLAIN (ANALYZE, WAL)</text>

  <rect x="48" y="410" width="230" height="70" class="metric"/>
  <text x="163" y="440" text-anchor="middle" class="text">I/O 等待</text>
  <text x="163" y="464" text-anchor="middle" class="small">pg_stat_io object=wal</text>

  <rect x="366" y="132" width="250" height="98" class="decision"/>
  <text x="491" y="166" text-anchor="middle" class="text">WAL 量太大？</text>
  <text x="491" y="194" text-anchor="middle" class="small">先看 FPW、索引、批量写入模式</text>

  <rect x="366" y="286" width="250" height="98" class="decision"/>
  <text x="491" y="320" text-anchor="middle" class="text">wal_buffers_full 增长快？</text>
  <text x="491" y="348" text-anchor="middle" class="small">插入路径可能被迫写 WAL</text>

  <rect x="704" y="72" width="228" height="88" class="action"/>
  <text x="818" y="106" text-anchor="middle" class="text">降低 WAL 生成</text>
  <text x="818" y="132" text-anchor="middle" class="small">缩短 checkpoint 峰值、压缩 FPW</text>

  <rect x="704" y="188" width="228" height="88" class="action"/>
  <text x="818" y="222" text-anchor="middle" class="text">调整 wal_buffers</text>
  <text x="818" y="248" text-anchor="middle" class="small">重启生效，通常不超一段 WAL</text>

  <rect x="704" y="304" width="228" height="88" class="action"/>
  <text x="818" y="338" text-anchor="middle" class="text">优化刷盘路径</text>
  <text x="818" y="364" text-anchor="middle" class="small">wal_writer_* / 存储 / wal_sync_method</text>

  <rect x="704" y="420" width="228" height="70" class="risk"/>
  <text x="818" y="450" text-anchor="middle" class="text">不要误治</text>
  <text x="818" y="474" text-anchor="middle" class="small">提交延迟高不一定是 buffer 小</text>

  <path d="M278 149 L366 176" class="line"/>
  <path d="M278 307 L366 327" class="line"/>
  <path d="M278 445 C330 440 346 374 366 354" class="line"/>
  <path d="M616 181 C660 172 676 126 704 116" class="line"/>
  <path d="M616 335 C662 322 674 254 704 232" class="line"/>
  <path d="M616 335 L704 348" class="line"/>
  <path d="M818 392 L818 420" class="line"/>

  <text x="492" y="258" text-anchor="middle" class="tiny">判断顺序：先分清“生成太多”“buffer 周转不够”“fsync 慢”。</text>
</svg>
