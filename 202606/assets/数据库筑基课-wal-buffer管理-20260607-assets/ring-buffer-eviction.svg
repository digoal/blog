<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">WAL buffer 环形映射与满 buffer 写出</title>
  <desc id="desc">展示 WAL LSN 页通过取模映射到有限的 WAL buffer 槽位，旧页未写出时需要先写 WAL 文件再复用槽位。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    .slot { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .hot { fill: #dcfce7; stroke: #15803d; stroke-width: 1.6; rx: 8; }
    .dirty { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.6; rx: 8; }
    .file { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 8; }
    .lock { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .warnline { stroke: #b91c1c; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <text x="490" y="44" text-anchor="middle" class="text">有限 WAL buffer 槽位复用：页身份由 LSN 决定</text>

  <rect x="70" y="96" width="120" height="82" class="slot"/>
  <text x="130" y="126" text-anchor="middle" class="text">槽 0</text>
  <text x="130" y="154" text-anchor="middle" class="small">页 P0</text>

  <rect x="210" y="96" width="120" height="82" class="hot"/>
  <text x="270" y="126" text-anchor="middle" class="text">槽 1</text>
  <text x="270" y="154" text-anchor="middle" class="small">页 P1</text>

  <rect x="350" y="96" width="120" height="82" class="slot"/>
  <text x="410" y="126" text-anchor="middle" class="text">槽 2</text>
  <text x="410" y="154" text-anchor="middle" class="small">页 P2</text>

  <rect x="490" y="96" width="120" height="82" class="dirty"/>
  <text x="550" y="126" text-anchor="middle" class="text">槽 3</text>
  <text x="550" y="154" text-anchor="middle" class="small">旧页 P3</text>

  <rect x="630" y="96" width="120" height="82" class="slot"/>
  <text x="690" y="126" text-anchor="middle" class="text">槽 4</text>
  <text x="690" y="154" text-anchor="middle" class="small">页 P4</text>

  <rect x="770" y="96" width="120" height="82" class="slot"/>
  <text x="830" y="126" text-anchor="middle" class="text">槽 5</text>
  <text x="830" y="154" text-anchor="middle" class="small">页 P5</text>

  <text x="490" y="226" text-anchor="middle" class="small">新 WAL 页 P9 也映射到槽 3：idx = pageNo % XLOGbuffers</text>

  <rect x="148" y="270" width="210" height="92" class="lock"/>
  <text x="253" y="304" text-anchor="middle" class="text">1. 检查槽位身份</text>
  <text x="253" y="332" text-anchor="middle" class="small">xlblocks[3] 不是 P9</text>

  <rect x="404" y="270" width="210" height="92" class="lock"/>
  <text x="509" y="304" text-anchor="middle" class="text">2. 旧页未写出</text>
  <text x="509" y="332" text-anchor="middle" class="small">先等插入完成再写 WAL</text>

  <rect x="660" y="270" width="210" height="92" class="file"/>
  <text x="765" y="304" text-anchor="middle" class="text">3. 复用槽 3</text>
  <text x="765" y="332" text-anchor="middle" class="small">清零并初始化 P9 页头</text>

  <rect x="238" y="410" width="220" height="78" class="file"/>
  <text x="348" y="442" text-anchor="middle" class="text">XLogWrite</text>
  <text x="348" y="468" text-anchor="middle" class="small">写到 pg_wal 段文件</text>

  <rect x="522" y="410" width="220" height="78" class="dirty"/>
  <text x="632" y="442" text-anchor="middle" class="text">wal_buffers_full++</text>
  <text x="632" y="468" text-anchor="middle" class="small">前台插入被迫写出</text>

  <path d="M550 178 C550 228 308 232 253 270" class="line"/>
  <path d="M358 316 L404 316" class="line"/>
  <path d="M614 316 L660 316" class="line"/>
  <path d="M509 362 C502 400 420 410 348 410" class="warnline"/>
  <path d="M458 449 L522 449" class="warnline"/>
  <path d="M765 270 C748 214 610 190 550 178" class="line"/>

  <text x="490" y="518" text-anchor="middle" class="small">指标含义：wal_buffers_full 不是 WAL 量，而是“插入路径因为 WAL buffer 满而触发写出”的次数。</text>
</svg>
