<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">WAL buffer 共享内存结构</title>
  <desc id="desc">展示 PostgreSQL XLogCtlData 中和 WAL buffer 管理相关的共享内存字段、锁和页数组。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5f8b"/>
    </marker>
  </defs>
  <style>
    .outer { fill: #f8fafc; stroke: #1e293b; stroke-width: 1.6; rx: 8; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.3; rx: 8; }
    .blue { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.4; rx: 8; }
    .green { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; }
    .amber { fill: #fef3c7; stroke: #b45309; stroke-width: 1.4; rx: 8; }
    .rose { fill: #ffe4e6; stroke: #be123c; stroke-width: 1.4; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #1f5f8b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
  </style>

  <rect x="30" y="28" width="920" height="464" class="outer"/>
  <text x="490" y="66" text-anchor="middle" class="text">XLogCtlData：WAL buffer 的共享控制区</text>

  <rect x="64" y="96" width="248" height="148" class="blue"/>
  <text x="188" y="126" text-anchor="middle" class="text">Insert 子结构</text>
  <text x="188" y="154" text-anchor="middle" class="small">CurrBytePos / PrevBytePos</text>
  <text x="188" y="178" text-anchor="middle" class="small">RedoRecPtr / fullPageWrites</text>
  <text x="188" y="202" text-anchor="middle" class="small">WALInsertLocks 指针</text>
  <text x="188" y="224" text-anchor="middle" class="tiny">预留位置、保护 FPW 判断、跟踪并发插入</text>

  <rect x="64" y="282" width="248" height="124" class="box"/>
  <text x="188" y="314" text-anchor="middle" class="text">原子进度</text>
  <text x="188" y="342" text-anchor="middle" class="small">logInsertResult</text>
  <text x="188" y="366" text-anchor="middle" class="small">logWriteResult</text>
  <text x="188" y="390" text-anchor="middle" class="small">logFlushResult</text>

  <rect x="374" y="96" width="232" height="148" class="green"/>
  <text x="490" y="126" text-anchor="middle" class="text">WAL buffer 页数组</text>
  <text x="490" y="154" text-anchor="middle" class="small">pages</text>
  <text x="490" y="178" text-anchor="middle" class="small">XLOG_BLCKSZ 页</text>
  <text x="490" y="202" text-anchor="middle" class="small">数量由 wal_buffers 决定</text>
  <text x="490" y="224" text-anchor="middle" class="tiny">存放尚未写入 WAL 文件的页内容</text>

  <rect x="374" y="282" width="232" height="124" class="amber"/>
  <text x="490" y="314" text-anchor="middle" class="text">页身份映射</text>
  <text x="490" y="342" text-anchor="middle" class="small">xlblocks[]</text>
  <text x="490" y="366" text-anchor="middle" class="small">每槽保存该页结束 LSN</text>
  <text x="490" y="390" text-anchor="middle" class="tiny">LSN 通过取模映射到固定槽位</text>

  <rect x="682" y="96" width="220" height="96" class="rose"/>
  <text x="792" y="128" text-anchor="middle" class="text">WALInsertLock</text>
  <text x="792" y="156" text-anchor="middle" class="small">固定 8 把</text>
  <text x="792" y="176" text-anchor="middle" class="tiny">插入者持有一把即可复制记录</text>

  <rect x="682" y="218" width="220" height="84" class="rose"/>
  <text x="792" y="250" text-anchor="middle" class="text">WALBufMappingLock</text>
  <text x="792" y="278" text-anchor="middle" class="small">替换或初始化页映射</text>

  <rect x="682" y="328" width="220" height="84" class="rose"/>
  <text x="792" y="360" text-anchor="middle" class="text">WALWriteLock</text>
  <text x="792" y="388" text-anchor="middle" class="small">写 WAL buffer 到文件</text>

  <path d="M312 170 L374 170" class="line"/>
  <path d="M606 170 L682 144" class="line"/>
  <path d="M606 344 L682 260" class="line"/>
  <path d="M606 344 L682 370" class="line"/>
  <path d="M490 244 L490 282" class="line"/>
  <path d="M312 344 L374 344" class="line"/>
  <path d="M188 244 L188 282" class="dash"/>

  <text x="490" y="454" text-anchor="middle" class="small">关键区别：WAL buffer 缓冲的是 WAL 页，不是表数据页；shared_buffers 缓冲的是数据页。</text>
</svg>
