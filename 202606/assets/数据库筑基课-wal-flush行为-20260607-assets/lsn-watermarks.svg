<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">WAL 三个 LSN 水位</title>
  <desc id="desc">展示 insert LSN、write LSN、flush LSN 在 WAL buffer、操作系统缓存和稳定存储之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 28px sans-serif; fill: #17202a; }
    .label { font: 600 18px sans-serif; fill: #1f2d3d; }
    .small { font: 15px sans-serif; fill: #34495e; }
    .tiny { font: 13px sans-serif; fill: #566573; }
    .axis { stroke: #2f4f4f; stroke-width: 4; }
    .tick { stroke: #1f618d; stroke-width: 4; }
    .box { fill: #f8fbfb; stroke: #7f8c8d; stroke-width: 2; rx: 8; }
    .durable { fill: #e8f6f3; stroke: #117864; stroke-width: 2; rx: 8; }
    .write { fill: #eef5ff; stroke: #2874a6; stroke-width: 2; rx: 8; }
    .insert { fill: #fff8e8; stroke: #b9770e; stroke-width: 2; rx: 8; }
    .gap1 { fill: #fdebd0; }
    .gap2 { fill: #d6eaf8; }
    .gap3 { fill: #d5f5e3; }
  </style>
  <rect x="36" y="30" width="1128" height="560" fill="#ffffff" stroke="#d5dbdb" stroke-width="2" rx="10"/>
  <text x="60" y="74" class="title">WAL flush 行为先看三个水位</text>
  <text x="60" y="110" class="small">LSN 是 WAL 字节流的位置。提交、复制、归档和数据页写出都在比较不同水位。</text>

  <line x1="110" y1="250" x2="1060" y2="250" class="axis" marker-end="url(#arrow)"/>
  <text x="1080" y="257" class="label">WAL 字节流向前增长</text>

  <rect x="110" y="232" width="300" height="36" class="gap3"/>
  <rect x="410" y="232" width="275" height="36" class="gap2"/>
  <rect x="685" y="232" width="265" height="36" class="gap1"/>

  <line x1="410" y1="205" x2="410" y2="300" class="tick"/>
  <line x1="685" y1="205" x2="685" y2="300" class="tick"/>
  <line x1="950" y1="205" x2="950" y2="300" class="tick"/>

  <text x="330" y="190" class="label">flush LSN</text>
  <text x="590" y="190" class="label">write LSN</text>
  <text x="860" y="190" class="label">insert LSN</text>

  <rect x="115" y="330" width="285" height="110" class="durable"/>
  <text x="138" y="365" class="label">已 flush 到稳定存储</text>
  <text x="138" y="395" class="small">通常可抗 PostgreSQL 崩溃、操作系统崩溃</text>
  <text x="138" y="425" class="tiny">synchronous_commit 非 off 的本地提交等待这里</text>

  <rect x="432" y="330" width="285" height="110" class="write"/>
  <text x="455" y="365" class="label">已 write 到 WAL 文件</text>
  <text x="455" y="395" class="small">可能只是进入内核页缓存</text>
  <text x="455" y="425" class="tiny">remote_write 等待 standby 到这一层</text>

  <rect x="748" y="330" width="285" height="110" class="insert"/>
  <text x="771" y="365" class="label">已 insert 到 WAL buffer</text>
  <text x="771" y="395" class="small">逻辑尾部已经预留并复制完成</text>
  <text x="771" y="425" class="tiny">尚未保证外部可读，更未保证持久</text>

  <path d="M950 305 C950 520 300 510 300 450" fill="none" stroke="#b9770e" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <text x="620" y="520" class="small">XLogFlush(target) 的目标：把 flush LSN 推到 target 或更远</text>

  <text x="100" y="505" class="small">常用观测函数：</text>
  <text x="100" y="535" class="tiny">pg_current_wal_insert_lsn()：WAL 逻辑插入尾部</text>
  <text x="430" y="535" class="tiny">pg_current_wal_lsn()：已写出位置</text>
  <text x="700" y="535" class="tiny">pg_current_wal_flush_lsn()：已持久位置</text>
</svg>
