<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title desc">
  <title id="title">同步复制下的提交等待层次</title>
  <desc id="desc">展示 primary 本地 WAL flush 后，remote_write、on 和 remote_apply 对 standby 的不同等待层次。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 28px sans-serif; fill: #17202a; }
    .server { fill: #f8fbfb; stroke: #7f8c8d; stroke-width: 2; rx: 10; }
    .node { fill: #ffffff; stroke: #5d6d7e; stroke-width: 2; rx: 8; }
    .local { fill: #e8f6f3; stroke: #117864; stroke-width: 2; rx: 8; }
    .remote { fill: #eef5ff; stroke: #2874a6; stroke-width: 2; rx: 8; }
    .apply { fill: #fff8e8; stroke: #b9770e; stroke-width: 2; rx: 8; }
    .label { font: 600 17px sans-serif; fill: #1f2d3d; }
    .small { font: 14px sans-serif; fill: #34495e; }
    .path { stroke: #34495e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #884ea0; stroke-width: 3; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
  </style>
  <rect x="34" y="30" width="1132" height="680" fill="#ffffff" stroke="#d5dbdb" stroke-width="2" rx="10"/>
  <text x="60" y="76" class="title">同步复制把 WAL flush 等待扩展到 standby</text>
  <text x="60" y="108" class="small">没有 synchronous_standby_names 时，非 off 模式主要是本地 flush；有同步 standby 后，提交还要等待远端反馈。</text>

  <rect x="75" y="150" width="420" height="470" class="server"/>
  <rect x="690" y="150" width="420" height="470" class="server"/>
  <text x="105" y="190" class="label">Primary</text>
  <text x="720" y="190" class="label">Synchronous Standby</text>

  <rect x="120" y="235" width="300" height="90" class="node"/>
  <text x="148" y="268" class="label">commit record</text>
  <text x="148" y="294" class="small">进入 primary WAL buffer</text>

  <path d="M270 325 L270 385" class="path"/>
  <rect x="120" y="385" width="300" height="90" class="local"/>
  <text x="148" y="418" class="label">primary 本地 flush</text>
  <text x="148" y="444" class="small">XLogFlush(XactLastRecEnd)</text>

  <path d="M420 430 C540 430 570 265 720 265" class="path"/>
  <rect x="720" y="235" width="300" height="78" class="remote"/>
  <text x="748" y="266" class="label">接收 WAL</text>
  <text x="748" y="291" class="small">WAL receiver 收到 commit record</text>

  <path d="M870 313 L870 360" class="path"/>
  <rect x="720" y="360" width="300" height="78" class="remote"/>
  <text x="748" y="391" class="label">remote_write</text>
  <text x="748" y="416" class="small">写到 standby 文件系统</text>

  <path d="M870 438 L870 485" class="path"/>
  <rect x="720" y="485" width="300" height="78" class="local"/>
  <text x="748" y="516" class="label">on</text>
  <text x="748" y="541" class="small">flush 到 standby 稳定存储</text>

  <path d="M870 563 L870 610" class="path"/>
  <rect x="720" y="610" width="300" height="60" class="apply"/>
  <text x="748" y="636" class="label">remote_apply：replay 后可见</text>
  <text x="748" y="659" class="small">延迟最大，读 standby 因果最强</text>

  <path d="M720 399 C580 420 540 520 420 520" class="dash"/>
  <path d="M720 524 C580 545 540 560 420 560" class="dash"/>
  <path d="M720 640 C580 650 540 590 420 590" class="dash"/>
  <rect x="120" y="510" width="300" height="90" class="node"/>
  <text x="148" y="543" class="label">SyncRepWaitForLSN()</text>
  <text x="148" y="569" class="small">按 synchronous_commit 模式放行</text>

  <text x="75" y="676" class="small">提交顺序：primary 先本地持久化，再根据同步复制配置等待 standby 的 write、flush 或 apply 确认。</text>
</svg>
