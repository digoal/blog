<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">WAL writer 与异步提交</title>
  <desc id="desc">展示 synchronous_commit=off 时后端登记异步提交 LSN，WAL writer 周期性写出和刷盘 WAL 的行为。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 28px sans-serif; fill: #17202a; }
    .lane { fill: #f8fbfb; stroke: #d5dbdb; stroke-width: 2; rx: 8; }
    .node { fill: #ffffff; stroke: #5d6d7e; stroke-width: 2; rx: 8; }
    .async { fill: #fff8e8; stroke: #b9770e; stroke-width: 2; rx: 8; }
    .writer { fill: #eef5ff; stroke: #2874a6; stroke-width: 2; rx: 8; }
    .durable { fill: #e8f6f3; stroke: #117864; stroke-width: 2; rx: 8; }
    .label { font: 600 17px sans-serif; fill: #1f2d3d; }
    .small { font: 14px sans-serif; fill: #34495e; }
    .path { stroke: #34495e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #b9770e; stroke-width: 3; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
  </style>
  <rect x="34" y="30" width="1132" height="660" fill="#ffffff" stroke="#d5dbdb" stroke-width="2" rx="10"/>
  <text x="60" y="76" class="title">异步提交不等本地 flush，WAL writer 负责收敛风险窗口</text>

  <rect x="70" y="120" width="300" height="530" class="lane"/>
  <rect x="420" y="120" width="300" height="530" class="lane"/>
  <rect x="770" y="120" width="300" height="530" class="lane"/>
  <text x="96" y="158" class="label">前台后端</text>
  <text x="446" y="158" class="label">共享状态</text>
  <text x="796" y="158" class="label">WAL writer</text>

  <rect x="100" y="205" width="240" height="84" class="node"/>
  <text x="124" y="238" class="label">写 commit record</text>
  <text x="124" y="264" class="small">记录 XactLastRecEnd</text>

  <path d="M220 289 L220 346" class="path"/>
  <rect x="100" y="346" width="240" height="90" class="async"/>
  <text x="124" y="379" class="label">synchronous_commit=off</text>
  <text x="124" y="405" class="small">不调用 XLogFlush()</text>

  <path d="M340 391 L455 391" class="dash"/>
  <rect x="455" y="346" width="230" height="90" class="async"/>
  <text x="480" y="379" class="label">登记 asyncXactLSN</text>
  <text x="480" y="405" class="small">必要时唤醒 WAL writer</text>

  <path d="M220 436 L220 515" class="path"/>
  <rect x="100" y="515" width="240" height="84" class="node"/>
  <text x="124" y="548" class="label">向客户端返回成功</text>
  <text x="124" y="574" class="small">存在短暂丢失窗口</text>

  <path d="M685 391 L810 248" class="dash"/>
  <rect x="810" y="205" width="230" height="90" class="writer"/>
  <text x="835" y="238" class="label">周期或 latch 唤醒</text>
  <text x="835" y="264" class="small">wal_writer_delay 默认 200ms</text>

  <path d="M925 295 L925 346" class="path"/>
  <rect x="810" y="346" width="230" height="90" class="writer"/>
  <text x="835" y="379" class="label">XLogBackgroundFlush()</text>
  <text x="835" y="405" class="small">完整 WAL 页或 async LSN</text>

  <path d="M925 436 L925 512" class="path"/>
  <rect x="810" y="512" width="230" height="90" class="durable"/>
  <text x="835" y="545" class="label">写出并按规则 flush</text>
  <text x="835" y="571" class="small">最多约 3 个周期收敛</text>

  <rect x="455" y="512" width="230" height="90" class="node"/>
  <text x="480" y="545" class="label">风险性质</text>
  <text x="480" y="571" class="small">可能丢事务，不应损坏库</text>

  <path d="M810 557 L685 557" class="path"/>
  <text x="74" y="675" class="small">注意：WAL writer 不是唯一写出者。同步提交、WAL buffer 满、segment 切换等路径仍可由前台触发 WAL write/flush。</text>
</svg>
