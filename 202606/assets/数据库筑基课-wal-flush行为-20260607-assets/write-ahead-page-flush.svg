<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">数据页写出前的 WAL flush 规则</title>
  <desc id="desc">展示 FlushBuffer 在写永久关系脏页前如何根据页面 LSN 调用 XLogFlush。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 28px sans-serif; fill: #17202a; }
    .page { fill: #fff8e8; stroke: #b9770e; stroke-width: 2; rx: 8; }
    .wal { fill: #e8f6f3; stroke: #117864; stroke-width: 2; rx: 8; }
    .buf { fill: #eef5ff; stroke: #2874a6; stroke-width: 2; rx: 8; }
    .node { fill: #ffffff; stroke: #5d6d7e; stroke-width: 2; rx: 8; }
    .label { font: 600 17px sans-serif; fill: #1f2d3d; }
    .small { font: 14px sans-serif; fill: #34495e; }
    .path { stroke: #34495e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #884ea0; stroke-width: 3; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
  </style>
  <rect x="34" y="30" width="1132" height="660" fill="#ffffff" stroke="#d5dbdb" stroke-width="2" rx="10"/>
  <text x="60" y="76" class="title">WAL flush 还保护数据页写出顺序</text>
  <text x="60" y="108" class="small">提交 flush 保护事务持久性；FlushBuffer 前的 WAL flush 保护 write-ahead rule。</text>

  <rect x="90" y="175" width="245" height="125" class="page"/>
  <text x="118" y="212" class="label">共享缓冲区脏页</text>
  <text x="118" y="242" class="small">Page LSN = 0/7001200</text>
  <text x="118" y="272" class="small">BM_PERMANENT = true</text>

  <path d="M335 238 L435 238" class="path"/>
  <rect x="435" y="175" width="245" height="125" class="node"/>
  <text x="463" y="212" class="label">FlushBuffer()</text>
  <text x="463" y="242" class="small">取 BufferGetLSN()</text>
  <text x="463" y="272" class="small">准备写 heap/index 文件</text>

  <path d="M557 300 L557 380" class="path"/>
  <rect x="435" y="380" width="245" height="125" class="wal"/>
  <text x="463" y="417" class="label">XLogFlush(page LSN)</text>
  <text x="463" y="447" class="small">若 flush LSN 已足够则快速返回</text>
  <text x="463" y="477" class="small">否则先刷 WAL 到页面 LSN</text>

  <path d="M680 442 L785 442" class="path"/>
  <rect x="785" y="380" width="245" height="125" class="buf"/>
  <text x="813" y="417" class="label">smgrwrite()</text>
  <text x="813" y="447" class="small">把数据页写到内核/文件</text>
  <text x="813" y="477" class="small">checkpoint 后再 fsync 数据文件</text>

  <rect x="785" y="175" width="245" height="125" class="wal"/>
  <text x="813" y="212" class="label">WAL 已持久化</text>
  <text x="813" y="242" class="small">崩溃后可 REDO 此页变化</text>
  <text x="813" y="272" class="small">即使数据页写坏也能恢复</text>

  <path d="M555 380 C590 235 710 235 785 235" class="dash"/>

  <rect x="90" y="545" width="310" height="88" class="node"/>
  <text x="118" y="579" class="label">不适用：unlogged / temporary</text>
  <text x="118" y="606" class="small">崩溃后本来就丢失或重建，不能用假 LSN 强刷 WAL</text>

  <rect x="455" y="545" width="310" height="88" class="node"/>
  <text x="483" y="579" class="label">CLOG / SLRU 也有类似保护</text>
  <text x="483" y="606" class="small">异步提交状态页写出前需确认相关 commit WAL 已刷盘</text>

  <rect x="820" y="545" width="260" height="88" class="node"/>
  <text x="848" y="579" class="label">核心不变量</text>
  <text x="848" y="606" class="small">WAL 先到稳定存储，数据页再写出</text>
</svg>
