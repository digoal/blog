<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">XLogFlush 同步提交路径</title>
  <desc id="desc">展示同步提交时事务提交记录如何通过 XLogFlush、WALWriteLock、XLogWrite 和 issue_xlog_fsync 到达稳定存储。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 28px sans-serif; fill: #17202a; }
    .node { fill: #ffffff; stroke: #5d6d7e; stroke-width: 2; rx: 8; }
    .decision { fill: #fff8e8; stroke: #b9770e; stroke-width: 2; }
    .io { fill: #e8f6f3; stroke: #117864; stroke-width: 2; rx: 8; }
    .lock { fill: #eef5ff; stroke: #2874a6; stroke-width: 2; rx: 8; }
    .label { font: 600 17px sans-serif; fill: #1f2d3d; }
    .small { font: 14px sans-serif; fill: #34495e; }
    .path { stroke: #34495e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #884ea0; stroke-width: 3; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
  </style>
  <rect x="34" y="30" width="1132" height="700" fill="#ffffff" stroke="#d5dbdb" stroke-width="2" rx="10"/>
  <text x="60" y="76" class="title">同步提交的 WAL flush 路径</text>
  <text x="60" y="108" class="small">提交返回前等的是 commit record 对应 LSN 的 WAL 持久化，不是所有 heap/index 脏页持久化。</text>

  <rect x="70" y="150" width="210" height="84" class="node"/>
  <text x="95" y="184" class="label">写 commit WAL record</text>
  <text x="95" y="212" class="small">xact.c 记录 XactLastRecEnd</text>

  <path d="M280 192 L350 192" class="path"/>
  <polygon points="350,150 505,192 350,234 195,192" class="decision" transform="translate(155,0)"/>
  <text x="382" y="184" class="label">需要同步提交？</text>
  <text x="385" y="211" class="small">synchronous_commit &gt; off</text>

  <path d="M660 192 L735 192" class="path"/>
  <rect x="735" y="150" width="210" height="84" class="node"/>
  <text x="762" y="184" class="label">XLogFlush(target)</text>
  <text x="762" y="212" class="small">target = commit record end LSN</text>

  <path d="M840 234 L840 292" class="path"/>
  <rect x="720" y="292" width="240" height="78" class="node"/>
  <text x="744" y="324" class="label">快速检查 flush LSN</text>
  <text x="744" y="350" class="small">已满足则直接返回</text>

  <path d="M840 370 L840 426" class="path"/>
  <rect x="720" y="426" width="240" height="86" class="node"/>
  <text x="742" y="458" class="label">等待插入完成</text>
  <text x="742" y="484" class="small">WaitXLogInsertionsToFinish()</text>

  <path d="M720 469 L610 469" class="path"/>
  <rect x="392" y="426" width="218" height="86" class="lock"/>
  <text x="418" y="458" class="label">争用 WALWriteLock</text>
  <text x="418" y="484" class="small">别人刷到目标则跟随返回</text>

  <path d="M501 512 L501 570" class="path"/>
  <rect x="392" y="570" width="218" height="82" class="decision"/>
  <text x="421" y="602" class="label">可选 commit_delay</text>
  <text x="421" y="628" class="small">让更多提交加入本次 flush</text>

  <path d="M610 611 L720 611" class="path"/>
  <rect x="720" y="570" width="240" height="82" class="io"/>
  <text x="744" y="602" class="label">XLogWrite()</text>
  <text x="744" y="628" class="small">write WAL buffer 到文件</text>

  <path d="M960 611 L1040 611" class="path"/>
  <rect x="1040" y="570" width="110" height="82" class="io"/>
  <text x="1055" y="602" class="label">fsync</text>
  <text x="1055" y="628" class="small">按 sync 方法</text>

  <path d="M1040 570 C1020 485 990 400 945 342" class="dash"/>
  <text x="985" y="445" class="small">更新 LogwrtResult.Write / Flush</text>

  <path d="M455 234 C370 300 230 332 230 430" class="dash"/>
  <rect x="70" y="426" width="250" height="86" class="node"/>
  <text x="94" y="458" class="label">异步提交分支</text>
  <text x="94" y="484" class="small">XLogSetAsyncXactLSN()，先返回</text>

  <text x="70" y="690" class="small">关键点：一次 XLogFlush 可能把 target 之后已经插入完成的 WAL 也一起写出和刷盘，从而形成 group commit。</text>
</svg>
