<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">异步提交唤醒和风险窗口</title>
  <desc id="desc">展示异步提交如何记录 LSN、判断是否唤醒 walwriter，并说明最坏三倍 wal_writer_delay 的风险窗口来源。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .backend { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .shared { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .writer { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    .axis { stroke: #334155; stroke-width: 2; }
    .tick { stroke: #334155; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="44" y="44" class="title">异步提交：提交先返回，walwriter 后台补刷</text>
  <text x="44" y="74" class="small">源码依据：xact.c、xlog.c、walwriter.c、access/transam/README、wal.sgml</text>

  <rect x="62" y="118" width="252" height="116" class="backend"/>
  <text x="96" y="152" class="label">backend 提交</text>
  <text x="92" y="182" class="small">synchronous_commit = off</text>
  <text x="92" y="208" class="tiny">XLogSetAsyncXactLSN(commit LSN)</text>

  <rect x="404" y="118" width="252" height="116" class="shared"/>
  <text x="434" y="152" class="label">共享 WAL 状态</text>
  <text x="434" y="182" class="small">更新 asyncXactLSN</text>
  <text x="434" y="208" class="tiny">读取 WalWriterSleeping</text>

  <rect x="746" y="118" width="252" height="116" class="writer"/>
  <text x="792" y="152" class="label">walwriter latch</text>
  <text x="774" y="182" class="small">sleeping：直接 SetLatch</text>
  <text x="774" y="208" class="tiny">否则 flushblocks 达阈值才唤醒</text>

  <path d="M314 176 H404" class="line"/>
  <path d="M656 176 H746" class="line"/>

  <rect x="62" y="302" width="300" height="112" class="writer"/>
  <text x="104" y="336" class="label">周期唤醒</text>
  <text x="92" y="366" class="small">WaitLatch 超时：wal_writer_delay</text>
  <text x="92" y="392" class="tiny">空闲 50 轮后进入更长 hibernate 等待</text>

  <rect x="410" y="302" width="300" height="112" class="writer"/>
  <text x="466" y="336" class="label">被动唤醒</text>
  <text x="440" y="366" class="small">async commit 设置 procLatch</text>
  <text x="440" y="392" class="tiny">避免 low-power mode 拉长风险窗口</text>

  <rect x="758" y="302" width="240" height="112" class="risk"/>
  <text x="790" y="336" class="label">风险窗口</text>
  <text x="788" y="366" class="small">崩溃时最近异步提交可丢</text>
  <text x="788" y="392" class="tiny">数据库一致性仍由 WAL 顺序保护</text>

  <path d="M872 234 V302" class="line"/>
  <path d="M530 234 V302" class="dash"/>

  <line x1="92" y1="502" x2="958" y2="502" class="axis"/>
  <line x1="136" y1="492" x2="136" y2="512" class="tick"/>
  <line x1="390" y1="492" x2="390" y2="512" class="tick"/>
  <line x1="644" y1="492" x2="644" y2="512" class="tick"/>
  <line x1="898" y1="492" x2="898" y2="512" class="tick"/>
  <text x="104" y="536" class="small">t0 提交返回</text>
  <text x="338" y="536" class="small">1 个 delay</text>
  <text x="592" y="536" class="small">2 个 delay</text>
  <text x="846" y="536" class="small">3 个 delay</text>
  <path d="M136 470 C310 430 520 430 644 470" class="dash"/>
  <path d="M644 470 C736 442 830 442 898 470" class="dash"/>
  <text x="268" y="454" class="tiny">写整页优先 + flexible 写出</text>
  <text x="702" y="454" class="tiny">最坏情况再多一个周期</text>
  <text x="92" y="586" class="small">结论：默认 200ms 不等于任何异步提交都 200ms 内落盘；源码和文档给出的最坏边界是三倍 wal_writer_delay。</text>
</svg>
