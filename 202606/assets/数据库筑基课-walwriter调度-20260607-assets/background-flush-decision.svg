<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">XLogBackgroundFlush 决策路径</title>
  <desc id="desc">展示 XLogBackgroundFlush 如何选择写完整页、处理异步提交 LSN，并根据 wal_writer_delay 和 wal_writer_flush_after 决定是否刷盘。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .input { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .decision { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .flush { fill: #e7f8ef; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .write { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="44" y="44" class="title">XLogBackgroundFlush：先决定写到哪里，再决定是否 fsync</text>
  <text x="44" y="74" class="small">源码依据：src/backend/access/transam/xlog.c</text>

  <rect x="64" y="118" width="238" height="90" class="input"/>
  <text x="96" y="151" class="label">读取 LogwrtRqst</text>
  <text x="92" y="179" class="small">共享写请求 Write</text>
  <text x="92" y="198" class="tiny">通常来自 WAL 插入路径</text>

  <rect x="410" y="118" width="260" height="90" class="box"/>
  <text x="445" y="151" class="label">退到完整 WAL 页</text>
  <text x="438" y="179" class="small">Write -= Write % XLOG_BLCKSZ</text>
  <text x="438" y="198" class="tiny">高负载优先写整页</text>

  <rect x="778" y="118" width="238" height="90" class="decision"/>
  <text x="812" y="151" class="label">已覆盖完整页？</text>
  <text x="808" y="179" class="small">Write &lt;= Flush</text>
  <text x="808" y="198" class="tiny">再看 asyncXactLSN</text>

  <rect x="778" y="286" width="238" height="90" class="input"/>
  <text x="810" y="319" class="label">异步提交 LSN</text>
  <text x="806" y="347" class="small">Write = asyncXactLSN</text>
  <text x="806" y="366" class="tiny">flexible = false</text>

  <rect x="410" y="286" width="260" height="90" class="decision"/>
  <text x="448" y="319" class="label">有未刷 WAL？</text>
  <text x="438" y="347" class="small">Write &gt; LogwrtResult.Flush</text>
  <text x="438" y="366" class="tiny">否则返回 false，可能关闭旧文件句柄</text>

  <rect x="64" y="286" width="238" height="90" class="decision"/>
  <text x="96" y="319" class="label">是否需要 Flush？</text>
  <text x="92" y="347" class="small">flush_after=0 或首次调用</text>
  <text x="92" y="366" class="tiny">或 elapsed &gt; delay / blocks 达阈值</text>

  <rect x="64" y="468" width="238" height="94" class="flush"/>
  <text x="108" y="502" class="label">write + flush</text>
  <text x="92" y="530" class="small">WriteRqst.Flush = Write</text>
  <text x="92" y="550" class="tiny">更新时间 lastflush</text>

  <rect x="410" y="468" width="260" height="94" class="write"/>
  <text x="472" y="502" class="label">只 write</text>
  <text x="438" y="530" class="small">WriteRqst.Flush = Invalid</text>
  <text x="438" y="550" class="tiny">降低 fsync 频率</text>

  <rect x="778" y="468" width="238" height="94" class="box"/>
  <text x="812" y="502" class="label">执行 XLogWrite</text>
  <text x="806" y="530" class="small">WALWriteLock + critical section</text>
  <text x="806" y="550" class="tiny">完成后唤醒 walsender / LSN 等待者</text>

  <path d="M302 163 H410" class="line"/>
  <path d="M670 163 H778" class="line"/>
  <path d="M897 208 V286" class="line"/>
  <path d="M778 331 H670" class="line"/>
  <path d="M410 331 H302" class="line"/>
  <path d="M183 376 V468" class="line"/>
  <path d="M302 515 H410" class="dash"/>
  <path d="M670 515 H778" class="line"/>
  <path d="M302 331 C352 331 356 515 410 515" class="dash"/>

  <text x="118" y="640" class="small">flush 触发条件</text>
  <text x="118" y="665" class="tiny">1. wal_writer_flush_after = 0：每轮有工作都刷盘</text>
  <text x="420" y="665" class="tiny">2. 距上次 flush 超过 wal_writer_delay：限制异步提交风险窗口</text>
  <text x="780" y="665" class="tiny">3. 未刷 WAL 块数达到 wal_writer_flush_after：限制脏 WAL 积压</text>
</svg>
