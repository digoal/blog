<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">WalWriterMain 主循环调度</title>
  <desc id="desc">展示 walwriter 主循环如何设置睡眠标志、处理 latch、执行后台刷写、统计上报，并按活跃或休眠状态选择等待时间。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .step { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .state { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .choice { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .wait { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="44" y="44" class="title">WalWriterMain：一个由 latch 和超时共同驱动的循环</text>
  <text x="44" y="74" class="small">源码依据：src/backend/postmaster/walwriter.c</text>

  <rect x="56" y="124" width="214" height="86" class="state"/>
  <text x="82" y="157" class="label">初始化</text>
  <text x="82" y="184" class="small">left_till_hibernate = 50</text>
  <text x="82" y="204" class="tiny">ProcGlobal-&gt;walwriterProc = MyProcNumber</text>

  <rect x="350" y="120" width="240" height="94" class="step"/>
  <text x="386" y="153" class="label">设置睡眠标志</text>
  <text x="374" y="181" class="small">left_till_hibernate &lt;= 1</text>
  <text x="374" y="202" class="tiny">SetWalWriterSleeping(hibernating)</text>

  <rect x="676" y="120" width="230" height="94" class="step"/>
  <text x="718" y="153" class="label">清 latch / 处理信号</text>
  <text x="704" y="181" class="small">ResetLatch(MyLatch)</text>
  <text x="704" y="202" class="tiny">ProcessMainLoopInterrupts()</text>

  <rect x="676" y="276" width="230" height="96" class="choice"/>
  <text x="715" y="310" class="label">后台刷写</text>
  <text x="704" y="338" class="small">XLogBackgroundFlush()</text>
  <text x="704" y="360" class="tiny">有工作：计数重置为 50</text>

  <rect x="350" y="278" width="240" height="94" class="step"/>
  <text x="392" y="312" class="label">上报 WAL 统计</text>
  <text x="386" y="340" class="small">pgstat_report_wal(false)</text>
  <text x="386" y="360" class="tiny">非阻塞刷新统计和 IO 计数</text>

  <rect x="56" y="278" width="214" height="94" class="choice"/>
  <text x="88" y="312" class="label">选择等待时间</text>
  <text x="82" y="340" class="small">活跃：WalWriterDelay</text>
  <text x="82" y="360" class="small">休眠：Delay * 25</text>

  <rect x="350" y="456" width="294" height="96" class="wait"/>
  <text x="404" y="490" class="label">WaitLatch</text>
  <text x="380" y="518" class="small">WL_LATCH_SET | WL_TIMEOUT</text>
  <text x="380" y="540" class="tiny">等待事件：WAL_WRITER_MAIN</text>

  <rect x="718" y="456" width="236" height="96" class="state"/>
  <text x="746" y="490" class="label">唤醒来源</text>
  <text x="746" y="518" class="small">异步提交 SetLatch</text>
  <text x="746" y="540" class="small">超时 / postmaster 退出</text>

  <path d="M270 167 H350" class="line"/>
  <path d="M590 167 H676" class="line"/>
  <path d="M791 214 V276" class="line"/>
  <path d="M676 324 H590" class="line"/>
  <path d="M350 325 H270" class="line"/>
  <path d="M163 372 C163 456 350 456 464 456" class="line"/>
  <path d="M644 504 H718" class="line"/>
  <path d="M497 552 C497 590 944 590 944 167 C944 90 602 92 470 120" class="loop"/>

  <text x="44" y="596" class="small">休眠不是停止工作：一旦异步提交发现 WAL writer 处于 low-power mode 或未刷 WAL 足够多，就会设置 walwriter 的 latch。</text>
</svg>
