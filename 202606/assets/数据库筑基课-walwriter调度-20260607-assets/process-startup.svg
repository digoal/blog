<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">walwriter 进程启动边界</title>
  <desc id="desc">展示 postmaster 在 PM_RUN 状态启动 walwriter，以及 walwriter 与 checkpointer、bgwriter 的职责边界。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #4b5563; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .run { fill: #e7f8ef; stroke: #15803d; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">walwriter 是正常运行期的 WAL 后台调度进程</text>
  <text x="40" y="72" class="small">源码依据：postmaster.c、proctypelist.h、walwriter.c 文件头注释</text>

  <rect x="60" y="118" width="210" height="92" class="box"/>
  <text x="88" y="154" class="label">postmaster</text>
  <text x="88" y="181" class="small">检查 pmState</text>

  <rect x="354" y="108" width="220" height="112" class="run"/>
  <text x="389" y="146" class="label">pmState = PM_RUN</text>
  <text x="389" y="174" class="small">可产生新 WAL</text>
  <text x="389" y="198" class="tiny">非恢复 / 非启动 / 非热备只读路径</text>

  <rect x="686" y="118" width="210" height="92" class="box"/>
  <text x="720" y="154" class="label">StartChildProcess</text>
  <text x="720" y="181" class="small">B_WAL_WRITER</text>

  <path d="M270 164 H354" class="line"/>
  <path d="M574 164 H686" class="line"/>

  <rect x="68" y="292" width="220" height="118" class="box"/>
  <text x="104" y="326" class="label">checkpointer</text>
  <text x="94" y="356" class="small">推进 checkpoint</text>
  <text x="94" y="382" class="small">管理脏页与 WAL 保留边界</text>

  <rect x="370" y="292" width="220" height="118" class="box"/>
  <text x="421" y="326" class="label">bgwriter</text>
  <text x="396" y="356" class="small">后台写 shared buffer</text>
  <text x="396" y="382" class="small">降低前台脏页写出压力</text>

  <rect x="672" y="276" width="230" height="150" class="warn"/>
  <text x="718" y="310" class="label">walwriter</text>
  <text x="698" y="342" class="small">周期或被唤醒执行</text>
  <text x="698" y="368" class="small">XLogBackgroundFlush()</text>
  <text x="698" y="394" class="tiny">目标：减少前台 WAL 写/刷压力</text>
  <text x="698" y="414" class="tiny">约束：异步提交风险窗口可知</text>

  <path d="M178 210 V292" class="dash"/>
  <path d="M480 220 V292" class="dash"/>
  <path d="M790 210 V276" class="line"/>

  <text x="60" y="468" class="small">边界：walwriter 不是唯一 WAL 写出者；前台 backend 在同步提交、WAL buffer 满、数据页写前也可能调用 WAL 写/刷路径。</text>
</svg>
