<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680" role="img" aria-labelledby="title desc">
  <title id="title">walwriter 调参与观测闭环</title>
  <desc id="desc">展示 walwriter 参数、现象、观测指标和调优动作之间的闭环。</desc>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .tiny { font-size: 12px; fill: #475569; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .param { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .metric { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
    .bad { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <text x="44" y="44" class="title">调 walwriter 前先判断：要降延迟、降 fsync 频率，还是缩短异步风险窗口？</text>
  <text x="44" y="74" class="small">源码与文档依据：guc_parameters.dat、config.sgml、monitoring.sgml、pg_stat_wal、wait_event_names.txt</text>

  <rect x="62" y="122" width="266" height="118" class="param"/>
  <text x="104" y="156" class="label">wal_writer_delay</text>
  <text x="92" y="186" class="small">默认 200ms，范围 1-10000ms</text>
  <text x="92" y="212" class="tiny">越小：异步窗口更短，fsync 可能更频繁</text>

  <rect x="408" y="122" width="266" height="118" class="param"/>
  <text x="438" y="156" class="label">wal_writer_flush_after</text>
  <text x="438" y="186" class="small">默认 1MB，以 WAL block 计</text>
  <text x="438" y="212" class="tiny">0 表示 walwriter 有工作就 flush</text>

  <rect x="754" y="122" width="266" height="118" class="param"/>
  <text x="814" y="156" class="label">wal_buffers</text>
  <text x="784" y="186" class="small">不是 walwriter 参数</text>
  <text x="784" y="212" class="tiny">但 buffer 满会让前台写 WAL</text>

  <rect x="62" y="316" width="266" height="118" class="metric"/>
  <text x="104" y="350" class="label">观察 WAL 生成</text>
  <text x="92" y="380" class="small">pg_stat_wal.wal_bytes</text>
  <text x="92" y="406" class="tiny">wal_buffers_full 判断 buffer 压力</text>

  <rect x="408" y="316" width="266" height="118" class="metric"/>
  <text x="450" y="350" class="label">观察 WAL I/O</text>
  <text x="438" y="380" class="small">pg_stat_io object='wal'</text>
  <text x="438" y="406" class="tiny">writes / fsyncs / 时间</text>

  <rect x="754" y="316" width="266" height="118" class="metric"/>
  <text x="790" y="350" class="label">观察等待事件</text>
  <text x="784" y="380" class="small">WAL_WRITER_MAIN</text>
  <text x="784" y="406" class="tiny">WALWrite / WALBufMapping / WALSync</text>

  <rect x="62" y="510" width="266" height="104" class="risk"/>
  <text x="92" y="544" class="label">吞吐优先</text>
  <text x="92" y="574" class="small">减少过度 fsync</text>
  <text x="92" y="596" class="tiny">谨慎放大 delay / flush_after</text>

  <rect x="408" y="510" width="266" height="104" class="risk"/>
  <text x="438" y="544" class="label">风险窗口优先</text>
  <text x="438" y="574" class="small">缩短异步提交最长窗口</text>
  <text x="438" y="596" class="tiny">减小 delay，必要时 flush_after=0</text>

  <rect x="754" y="510" width="266" height="104" class="bad"/>
  <text x="784" y="544" class="label">不要误调</text>
  <text x="784" y="574" class="small">fsync 慢不是 walwriter 独有问题</text>
  <text x="784" y="596" class="tiny">同步提交仍由前台 XLogFlush 决定</text>

  <path d="M195 240 V316" class="line"/>
  <path d="M541 240 V316" class="line"/>
  <path d="M887 240 V316" class="line"/>
  <path d="M328 375 H408" class="line"/>
  <path d="M674 375 H754" class="line"/>
  <path d="M195 434 V510" class="line"/>
  <path d="M541 434 V510" class="line"/>
  <path d="M887 434 V510" class="line"/>
  <path d="M887 510 C887 476 236 474 195 510" class="dash"/>

  <text x="62" y="654" class="small">实践顺序：先测 WAL 生成速率和 fsync 时间，再调参数；不要用 walwriter 参数掩盖存储、同步复制或提交路径的根因。</text>
</svg>
