<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">事件触发器的系统表、缓存与过滤链路</title>
  <desc id="desc">展示 CREATE EVENT TRIGGER 写入 pg_event_trigger 后，事件缓存如何按事件、启用状态、复制角色和命令标签过滤。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .cat { fill: #f0f9ff; stroke: #0284c7; stroke-width: 1.5; rx: 8; }
      .cache { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
      .filter { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .thin { stroke: #94a3b8; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect width="1120" height="560" fill="#ffffff"/>
  <text x="40" y="48" class="title">pg_event_trigger 到运行列表的过滤路径</text>

  <rect x="60" y="95" width="250" height="330" class="cat"/>
  <text x="88" y="130" class="label">pg_event_trigger</text>
  <text x="88" y="165" class="small">evtname：数据库内唯一</text>
  <text x="88" y="195" class="small">evtevent：事件名</text>
  <text x="88" y="225" class="small">evtowner：owner</text>
  <text x="88" y="255" class="small">evtfoid：触发函数 OID</text>
  <text x="88" y="285" class="small">evtenabled：O/D/R/A</text>
  <text x="88" y="315" class="small">evttags：命令标签数组</text>
  <text x="88" y="365" class="tiny">CREATE 时校验 superuser、事件名、</text>
  <text x="88" y="388" class="tiny">函数返回 event_trigger 和 tag 合法性</text>

  <rect x="410" y="120" width="230" height="110" class="cache"/>
  <text x="442" y="154" class="label">EventCacheLookup(event)</text>
  <text x="442" y="184" class="small">按事件分组缓存</text>
  <text x="442" y="208" class="tiny">按触发器名有序扫描系统表</text>

  <rect x="410" y="300" width="230" height="110" class="cache"/>
  <text x="442" y="334" class="label">EventTriggerCacheItem</text>
  <text x="442" y="364" class="small">fnoid + enabled + tagset</text>
  <text x="442" y="388" class="tiny">系统表失效后整缓存重建</text>

  <path d="M310 185 H410" class="line"/>
  <path d="M525 230 V300" class="thin"/>

  <rect x="735" y="85" width="300" height="82" class="filter"/>
  <text x="768" y="118" class="label">过滤 1：全局开关</text>
  <text x="768" y="145" class="small">event_triggers = false 时全部跳过</text>

  <rect x="735" y="202" width="300" height="82" class="filter"/>
  <text x="768" y="235" class="label">过滤 2：session_replication_role</text>
  <text x="768" y="262" class="small">origin / replica / always 控制是否执行</text>

  <rect x="735" y="319" width="300" height="82" class="filter"/>
  <text x="768" y="352" class="label">过滤 3：WHEN TAG IN (...)</text>
  <text x="768" y="379" class="small">命令标签转 CommandTag bitmap 比较</text>

  <rect x="735" y="436" width="300" height="82" class="box"/>
  <text x="768" y="469" class="label">输出：runlist</text>
  <text x="768" y="496" class="small">按触发器名顺序调用函数 OID 列表</text>

  <path d="M640 355 C690 355 690 126 735 126" class="line"/>
  <path d="M885 167 V202" class="line"/>
  <path d="M885 284 V319" class="line"/>
  <path d="M885 401 V436" class="line"/>
</svg>
