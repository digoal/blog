<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">事件触发器上下文函数的可用范围</title>
  <desc id="desc">对比 tg_event、tg_tag、pg_event_trigger_ddl_commands、pg_event_trigger_dropped_objects、pg_event_trigger_table_rewrite_oid/reason 的事件上下文。</desc>
  <defs>
    <style>
      .title { font: 700 24px sans-serif; fill: #0f172a; }
      .head { font: 700 15px sans-serif; fill: #0f172a; }
      .cell { font: 14px sans-serif; fill: #334155; }
      .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 1; rx: 5; }
      .no { fill: #fee2e2; stroke: #dc2626; stroke-width: 1; rx: 5; }
      .maybe { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 5; }
      .grid { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .header { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>
  <rect width="1120" height="600" fill="#ffffff"/>
  <text x="40" y="48" class="title">哪些事件里能调用哪些上下文函数</text>

  <rect x="40" y="85" width="1040" height="430" class="grid"/>
  <rect x="40" y="85" width="1040" height="54" class="header"/>
  <line x1="250" y1="85" x2="250" y2="515" stroke="#cbd5e1"/>
  <line x1="410" y1="85" x2="410" y2="515" stroke="#cbd5e1"/>
  <line x1="570" y1="85" x2="570" y2="515" stroke="#cbd5e1"/>
  <line x1="730" y1="85" x2="730" y2="515" stroke="#cbd5e1"/>
  <line x1="890" y1="85" x2="890" y2="515" stroke="#cbd5e1"/>
  <line x1="40" y1="139" x2="1080" y2="139" stroke="#cbd5e1"/>
  <line x1="40" y1="214" x2="1080" y2="214" stroke="#cbd5e1"/>
  <line x1="40" y1="289" x2="1080" y2="289" stroke="#cbd5e1"/>
  <line x1="40" y1="364" x2="1080" y2="364" stroke="#cbd5e1"/>
  <line x1="40" y1="439" x2="1080" y2="439" stroke="#cbd5e1"/>

  <text x="70" y="118" class="head">函数 / 变量</text>
  <text x="287" y="118" class="head">start</text>
  <text x="444" y="118" class="head">end</text>
  <text x="600" y="118" class="head">sql_drop</text>
  <text x="748" y="118" class="head">table_rewrite</text>
  <text x="930" y="118" class="head">login</text>

  <text x="70" y="174" class="cell">tg_event / tg_tag</text>
  <rect x="288" y="154" width="72" height="30" class="ok"/><text x="309" y="175" class="cell">可用</text>
  <rect x="448" y="154" width="72" height="30" class="ok"/><text x="469" y="175" class="cell">可用</text>
  <rect x="608" y="154" width="72" height="30" class="ok"/><text x="629" y="175" class="cell">可用</text>
  <rect x="768" y="154" width="72" height="30" class="ok"/><text x="789" y="175" class="cell">可用</text>
  <rect x="928" y="154" width="72" height="30" class="ok"/><text x="949" y="175" class="cell">可用</text>

  <text x="70" y="249" class="cell">pg_event_trigger_ddl_commands()</text>
  <rect x="288" y="229" width="72" height="30" class="no"/><text x="302" y="250" class="cell">报错</text>
  <rect x="448" y="229" width="72" height="30" class="ok"/><text x="469" y="250" class="cell">可用</text>
  <rect x="608" y="229" width="72" height="30" class="maybe"/><text x="624" y="250" class="cell">不用于</text>
  <rect x="768" y="229" width="72" height="30" class="maybe"/><text x="784" y="250" class="cell">不用于</text>
  <rect x="928" y="229" width="72" height="30" class="no"/><text x="942" y="250" class="cell">报错</text>

  <text x="70" y="324" class="cell">pg_event_trigger_dropped_objects()</text>
  <rect x="288" y="304" width="72" height="30" class="no"/><text x="302" y="325" class="cell">报错</text>
  <rect x="448" y="304" width="72" height="30" class="no"/><text x="462" y="325" class="cell">报错</text>
  <rect x="608" y="304" width="72" height="30" class="ok"/><text x="629" y="325" class="cell">可用</text>
  <rect x="768" y="304" width="72" height="30" class="no"/><text x="782" y="325" class="cell">报错</text>
  <rect x="928" y="304" width="72" height="30" class="no"/><text x="942" y="325" class="cell">报错</text>

  <text x="70" y="399" class="cell">table_rewrite_oid/reason()</text>
  <rect x="288" y="379" width="72" height="30" class="no"/><text x="302" y="400" class="cell">报错</text>
  <rect x="448" y="379" width="72" height="30" class="no"/><text x="462" y="400" class="cell">报错</text>
  <rect x="608" y="379" width="72" height="30" class="no"/><text x="622" y="400" class="cell">报错</text>
  <rect x="768" y="379" width="72" height="30" class="ok"/><text x="789" y="400" class="cell">可用</text>
  <rect x="928" y="379" width="72" height="30" class="no"/><text x="942" y="400" class="cell">报错</text>

  <text x="70" y="474" class="cell">读取已变化的系统目录</text>
  <rect x="288" y="454" width="72" height="30" class="maybe"/><text x="299" y="475" class="cell">执行前</text>
  <rect x="448" y="454" width="72" height="30" class="ok"/><text x="469" y="475" class="cell">可读</text>
  <rect x="608" y="454" width="72" height="30" class="maybe"/><text x="620" y="475" class="cell">已删除</text>
  <rect x="768" y="454" width="72" height="30" class="maybe"/><text x="784" y="475" class="cell">改写前</text>
  <rect x="928" y="454" width="72" height="30" class="maybe"/><text x="944" y="475" class="cell">慎用</text>

  <text x="55" y="550" class="cell">注：源码中这些函数通过 currentEventTriggerState 和 in_sql_drop / table_rewrite_oid 等标志保护上下文，离开对应事件后调用会抛错。</text>
</svg>
