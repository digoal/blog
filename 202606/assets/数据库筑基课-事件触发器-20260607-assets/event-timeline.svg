<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">事件触发器在 DDL 执行路径中的时序</title>
  <desc id="desc">展示 ddl_command_start、table_rewrite、sql_drop、ddl_command_end 和 login 事件的触发位置。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .event { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .state { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
    </style>
  </defs>
  <rect width="1100" height="520" fill="#ffffff"/>
  <text x="40" y="46" class="title">DDL 完整查询中的事件触发器时序</text>

  <rect x="50" y="105" width="180" height="84" class="state"/>
  <text x="74" y="136" class="label">进入 ProcessUtilitySlow</text>
  <text x="74" y="164" class="small">完整查询才安装状态</text>

  <rect x="280" y="105" width="160" height="84" class="event"/>
  <text x="311" y="136" class="label">start</text>
  <text x="302" y="164" class="small">ddl_command_start</text>

  <rect x="490" y="105" width="170" height="84" class="box"/>
  <text x="523" y="136" class="label">执行 DDL</text>
  <text x="512" y="164" class="small">改 catalog / 对象</text>

  <rect x="710" y="105" width="150" height="84" class="event"/>
  <text x="746" y="136" class="label">drop</text>
  <text x="744" y="164" class="small">sql_drop</text>

  <rect x="910" y="105" width="150" height="84" class="event"/>
  <text x="948" y="136" class="label">end</text>
  <text x="923" y="164" class="small">ddl_command_end</text>

  <path d="M230 147 H280" class="line"/>
  <path d="M440 147 H490" class="line"/>
  <path d="M660 147 H710" class="line"/>
  <path d="M860 147 H910" class="line"/>

  <rect x="488" y="250" width="176" height="88" class="warn"/>
  <text x="523" y="282" class="label">可选中途事件</text>
  <text x="514" y="309" class="small">table_rewrite</text>
  <text x="514" y="331" class="tiny">ALTER TABLE/TYPE 改写前</text>
  <path d="M575 190 V250" class="dash"/>

  <rect x="70" y="372" width="320" height="86" class="box"/>
  <text x="100" y="405" class="label">login 不在 DDL 路径中</text>
  <text x="100" y="432" class="small">认证完成后进入事务执行 EventTriggerOnLogin()</text>

  <rect x="480" y="372" width="520" height="86" class="box"/>
  <text x="510" y="405" class="label">失败语义</text>
  <text x="510" y="432" class="small">start 报错则主命令不执行；end/drop/rewrite 报错则事务回滚；命令失败后不会执行 end。</text>
</svg>
