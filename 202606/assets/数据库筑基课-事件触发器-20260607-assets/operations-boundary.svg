<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">事件触发器的生产治理边界</title>
  <desc id="desc">展示适合由事件触发器处理的 DDL 审计和策略场景，以及不适合放在事件触发器里的高风险逻辑。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .good { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
      .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect width="1120" height="560" fill="#ffffff"/>
  <text x="40" y="48" class="title">事件触发器：适合做边界治理，不适合做重业务流程</text>

  <rect x="70" y="105" width="420" height="300" class="good"/>
  <text x="105" y="142" class="label">适合放进事件触发器</text>
  <text x="105" y="182" class="small">DDL 审计：记录谁改了什么对象</text>
  <text x="105" y="222" class="small">DDL 白名单：禁止危险命令或非窗口期改写</text>
  <text x="105" y="262" class="small">对象命名规范：拦截不合规 CREATE/ALTER</text>
  <text x="105" y="302" class="small">drop 保护：检查被删除对象身份</text>
  <text x="105" y="342" class="small">login 轻量初始化：只做短、可失败可回滚动作</text>

  <rect x="630" y="105" width="420" height="300" class="bad"/>
  <text x="665" y="142" class="label">不适合放进事件触发器</text>
  <text x="665" y="182" class="small">长查询、远程 HTTP 调用、大批量扫描</text>
  <text x="665" y="222" class="small">复杂业务审批流或跨库强一致流程</text>
  <text x="665" y="262" class="small">login 触发器里对 standby 写入</text>
  <text x="665" y="302" class="small">依赖事件触发器拦截数据库/角色/表空间 DDL</text>
  <text x="665" y="342" class="small">把它当成普通 DML 行级触发器使用</text>

  <rect x="315" y="445" width="500" height="70" class="box"/>
  <text x="350" y="475" class="label">故障逃生口</text>
  <text x="350" y="500" class="tiny">superuser 可临时 SET event_triggers = false；严重时用单用户模式，因为单用户模式禁用事件触发器。</text>
  <path d="M490 255 C555 255 565 255 630 255" class="line"/>
</svg>
