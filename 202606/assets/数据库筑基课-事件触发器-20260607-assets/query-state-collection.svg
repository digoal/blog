<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="590" viewBox="0 0 1120 590" role="img" aria-labelledby="title desc">
  <title id="title">完整查询状态与命令、删除对象收集</title>
  <desc id="desc">展示 EventTriggerQueryState 在完整查询中保存 commandList、SQLDropList、table_rewrite_oid 和嵌套状态。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px sans-serif; fill: #0f172a; }
      .label { font: 600 16px sans-serif; fill: #0f172a; }
      .small { font: 14px sans-serif; fill: #334155; }
      .tiny { font: 13px sans-serif; fill: #475569; }
      .state { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; rx: 8; }
      .orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect width="1120" height="590" fill="#ffffff"/>
  <text x="40" y="48" class="title">EventTriggerQueryState：把一次用户动作变成可查询事件上下文</text>

  <rect x="70" y="105" width="260" height="120" class="state"/>
  <text x="102" y="140" class="label">BeginCompleteQuery</text>
  <text x="102" y="170" class="small">仅在需要 end/drop/rewrite</text>
  <text x="102" y="195" class="small">收集时创建状态</text>

  <rect x="430" y="80" width="300" height="210" class="box"/>
  <text x="462" y="116" class="label">EventTriggerQueryState</text>
  <text x="462" y="150" class="small">cxt：状态内存上下文</text>
  <text x="462" y="176" class="small">commandList：已执行 DDL 列表</text>
  <text x="462" y="202" class="small">SQLDropList：被删除对象列表</text>
  <text x="462" y="228" class="small">table_rewrite_oid/reason</text>
  <text x="462" y="254" class="small">previous：支持事件内递归 DDL</text>

  <path d="M330 165 H430" class="line"/>

  <rect x="815" y="70" width="245" height="90" class="green"/>
  <text x="846" y="103" class="label">命令收集</text>
  <text x="846" y="130" class="small">EventTriggerCollect*()</text>

  <rect x="815" y="200" width="245" height="90" class="orange"/>
  <text x="846" y="233" class="label">删除对象收集</text>
  <text x="846" y="260" class="small">dependency.c 调用 SQLDropAddObject</text>

  <rect x="815" y="330" width="245" height="90" class="green"/>
  <text x="846" y="363" class="label">表改写上下文</text>
  <text x="846" y="390" class="small">OID + reason bitmap</text>

  <path d="M730 176 H815" class="line"/>
  <path d="M730 206 C770 206 770 245 815 245" class="line"/>
  <path d="M730 236 C770 236 770 375 815 375" class="line"/>

  <rect x="125" y="345" width="280" height="96" class="box"/>
  <text x="156" y="378" class="label">事件触发器内再次执行 DDL</text>
  <text x="156" y="405" class="small">新状态 previous 指向外层状态</text>
  <text x="156" y="428" class="tiny">结束时删除当前内存上下文并恢复 previous</text>

  <path d="M430 258 C350 305 310 315 265 345" class="dash"/>

  <rect x="490" y="455" width="470" height="82" class="box"/>
  <text x="520" y="488" class="label">EndCompleteQuery</text>
  <text x="520" y="515" class="small">无论成功还是报错都清理状态，避免把上下文泄漏到下一条命令。</text>
  <path d="M580 290 V455" class="line"/>
</svg>
