<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">事务提交与持久化路径</title>
  <desc id="desc">展示 PostgreSQL 在提交时写入 WAL、刷新 WAL、更新 pg_xact、等待同步复制和释放 ProcArray 的顺序。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; stroke: #cbd5e1; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .wal { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; rx: 8; }
    .clog { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .async { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .label { font: 16px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="992" height="512" class="bg"/>
  <text x="52" y="58" class="label">提交不是只把内存状态改成 committed；它要保证崩溃恢复能重放出同一个结果</text>

  <rect x="74" y="104" width="170" height="88" class="box"/>
  <text x="96" y="134" class="label">事务结束</text>
  <text x="96" y="159" class="small">COMMIT 命令</text>
  <text x="96" y="178" class="tiny">触发 deferred actions</text>

  <rect x="304" y="104" width="178" height="88" class="wal"/>
  <text x="326" y="134" class="label">写 COMMIT WAL</text>
  <text x="326" y="159" class="small">XactLogCommitRecord</text>
  <text x="326" y="178" class="tiny">含子事务、失效消息、时间</text>

  <rect x="542" y="104" width="178" height="88" class="wal"/>
  <text x="564" y="134" class="label">刷新 WAL</text>
  <text x="564" y="159" class="small">XLogFlush</text>
  <text x="564" y="178" class="tiny">synchronous_commit 非 off</text>

  <rect x="780" y="104" width="178" height="88" class="clog"/>
  <text x="802" y="134" class="label">标记 pg_xact</text>
  <text x="802" y="159" class="small">TransactionIdCommitTree</text>
  <text x="802" y="178" class="tiny">主事务和 subxids committed</text>

  <path d="M 244 148 L 304 148" class="arrow"/>
  <path d="M 482 148 L 542 148" class="arrow"/>
  <path d="M 720 148 L 780 148" class="arrow"/>

  <rect x="542" y="270" width="178" height="88" class="async"/>
  <text x="564" y="300" class="label">异步提交</text>
  <text x="564" y="325" class="small">synchronous_commit=off</text>
  <text x="564" y="344" class="tiny">先报告成功，WAL 稍后刷盘</text>

  <rect x="780" y="270" width="178" height="88" class="risk"/>
  <text x="802" y="300" class="label">同步复制等待</text>
  <text x="802" y="325" class="small">SyncRepWaitForLSN</text>
  <text x="802" y="344" class="tiny">remote_write/apply 影响延迟</text>

  <path d="M 482 178 C 560 226 604 238 630 270" class="dash"/>
  <path d="M 720 314 L 780 314" class="dash"/>

  <rect x="304" y="386" width="178" height="78" class="clog"/>
  <text x="326" y="416" class="label">退出 ProcArray</text>
  <text x="326" y="441" class="small">ProcArrayEndTransaction</text>
  <text x="326" y="459" class="tiny">其他快照不再视它为运行中</text>

  <rect x="542" y="386" width="178" height="78" class="box"/>
  <text x="564" y="416" class="label">释放锁与资源</text>
  <text x="564" y="441" class="small">ResourceOwnerRelease</text>
  <text x="564" y="459" class="tiny">等待者随后继续</text>

  <path d="M 870 192 C 860 260 520 315 393 386" class="arrow"/>
  <path d="M 482 425 L 542 425" class="arrow"/>

  <text x="78" y="496" class="small">顺序边界：WAL 可恢复性先于 pg_xact committed；ProcArray 退出发生在提交记录完成之后、释放锁之前。</text>
</svg>
