<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc">
  <title id="title">隔离级别与 SSI 危险结构</title>
  <desc id="desc">展示 Read Committed、Repeatable Read、Serializable 的快照边界，以及 SSI 检测两个相邻 rw-conflict 的危险结构。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; stroke: #cbd5e1; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .rc { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .rr { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.7; rx: 8; }
    .sz { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.7; rx: 8; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.7; rx: 8; }
    .label { font: 16px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .rw { stroke: #dc2626; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .axis { stroke: #64748b; stroke-width: 1.4; }
  </style>
  <rect x="24" y="24" width="992" height="552" class="bg"/>
  <text x="52" y="58" class="label">隔离级别的核心差异，是快照什么时候固定，以及是否额外检测跨事务读写依赖</text>

  <rect x="64" y="96" width="260" height="122" class="rc"/>
  <text x="88" y="128" class="label">Read Committed</text>
  <text x="88" y="154" class="small">每条语句取新快照</text>
  <line x1="96" y1="182" x2="284" y2="182" class="axis"/>
  <circle cx="124" cy="182" r="6" fill="#2563eb"/>
  <circle cx="188" cy="182" r="6" fill="#2563eb"/>
  <circle cx="252" cy="182" r="6" fill="#2563eb"/>
  <text x="88" y="204" class="tiny">同一事务内两次 SELECT 可看到不同提交</text>

  <rect x="370" y="96" width="260" height="122" class="rr"/>
  <text x="394" y="128" class="label">Repeatable Read</text>
  <text x="394" y="154" class="small">第一条非事务控制语句固定快照</text>
  <line x1="402" y1="182" x2="590" y2="182" class="axis"/>
  <circle cx="428" cy="182" r="6" fill="#16a34a"/>
  <circle cx="494" cy="182" r="4" fill="#94a3b8"/>
  <circle cx="558" cy="182" r="4" fill="#94a3b8"/>
  <text x="394" y="204" class="tiny">防不可重复读和 PG 中的幻读，但仍可能写偏斜</text>

  <rect x="676" y="96" width="260" height="122" class="sz"/>
  <text x="700" y="128" class="label">Serializable</text>
  <text x="700" y="154" class="small">Snapshot Isolation + SSI 检测</text>
  <line x1="708" y1="182" x2="896" y2="182" class="axis"/>
  <circle cx="734" cy="182" r="6" fill="#ea580c"/>
  <path d="M 760 174 L 872 174" class="rw"/>
  <text x="700" y="204" class="tiny">发现可能无串行顺序时，以 40001 回滚重试</text>

  <rect x="118" y="320" width="150" height="78" class="box"/>
  <text x="150" y="352" class="label">Tin</text>
  <text x="136" y="376" class="small">读到旧状态</text>

  <rect x="432" y="320" width="150" height="78" class="bad"/>
  <text x="470" y="352" class="label">Tpivot</text>
  <text x="452" y="376" class="small">危险结构中心</text>

  <rect x="746" y="320" width="150" height="78" class="box"/>
  <text x="782" y="352" class="label">Tout</text>
  <text x="766" y="376" class="small">先提交触发判定</text>

  <path d="M 268 359 L 432 359" class="rw"/>
  <path d="M 582 359 L 746 359" class="rw"/>
  <text x="318" y="337" class="small">rw-conflict</text>
  <text x="638" y="337" class="small">rw-conflict</text>

  <rect x="122" y="460" width="794" height="68" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text x="144" y="488" class="small">SSI 不需要把所有读都变成阻塞锁；它记录谓词读锁和 rw-conflict，发现危险结构时选择事务回滚。</text>
  <text x="144" y="510" class="small">代价是额外内存、冲突检测和重试；收益是避免大量显式锁和表级锁带来的阻塞。</text>
</svg>
