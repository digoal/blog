<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">MVCC 快照与元组可见性</title>
  <desc id="desc">展示 snapshot 的 xmin、xmax、运行中 XID 数组，以及 heap tuple 的 xmin/xmax 如何决定可见性。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; stroke: #cbd5e1; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .snap { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 8; }
    .tuple { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.7; rx: 8; }
    .dead { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.7; rx: 8; }
    .maybe { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.7; rx: 8; }
    .label { font: 16px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .axis { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .tick { stroke: #64748b; stroke-width: 1.2; }
    .dash { stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 5 5; }
  </style>
  <rect x="24" y="24" width="992" height="512" class="bg"/>
  <text x="52" y="58" class="label">一个 MVCC 快照不是“复制数据”，而是记录哪些 XID 在快照时仍然运行</text>

  <line x1="88" y1="170" x2="940" y2="170" class="axis"/>
  <text x="904" y="154" class="small">XID 时间线</text>
  <line x1="210" y1="152" x2="210" y2="188" class="tick"/>
  <line x1="730" y1="152" x2="730" y2="188" class="tick"/>
  <text x="188" y="218" class="label">xmin = 100</text>
  <text x="700" y="218" class="label">xmax = 180</text>
  <path d="M 210 128 L 210 404" class="dash"/>
  <path d="M 730 128 L 730 404" class="dash"/>

  <rect x="124" y="92" width="246" height="72" class="snap"/>
  <text x="144" y="122" class="label">XID &lt; xmin</text>
  <text x="144" y="148" class="small">一定已经结束，可直接视作不在运行中</text>

  <rect x="404" y="92" width="292" height="72" class="snap"/>
  <text x="424" y="122" class="label">xmin 到 xmax 之间</text>
  <text x="424" y="148" class="small">查 xip/subxip，命中表示快照时仍在运行</text>

  <rect x="760" y="92" width="188" height="72" class="snap"/>
  <text x="780" y="122" class="label">XID &gt;= xmax</text>
  <text x="780" y="148" class="small">对该快照不可见</text>

  <rect x="120" y="278" width="210" height="86" class="tuple"/>
  <text x="144" y="310" class="label">版本 A</text>
  <text x="144" y="334" class="small">xmin=80, xmax=0</text>
  <text x="144" y="354" class="small">插入者已提交，未删除：可见</text>

  <rect x="402" y="278" width="240" height="86" class="maybe"/>
  <text x="426" y="310" class="label">版本 B</text>
  <text x="426" y="334" class="small">xmin=130 命中 xip</text>
  <text x="426" y="354" class="small">插入者快照时运行中：不可见</text>

  <rect x="712" y="278" width="220" height="86" class="dead"/>
  <text x="736" y="310" class="label">版本 C</text>
  <text x="736" y="334" class="small">xmin=90, xmax=150</text>
  <text x="736" y="354" class="small">删除者未命中 xip 且已提交：不可见</text>

  <rect x="106" y="432" width="838" height="54" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text x="128" y="458" class="small">HeapTupleSatisfiesMVCC 的判断顺序：先看 xmin 是否提交并对当前快照可见，再看 xmax 是否有效、是否只锁行、是否已提交且对快照可见。</text>
  <text x="128" y="478" class="small">子事务缓存溢出时，需通过 pg_subtrans 把 subxid 追溯到顶层 XID，检查成本会上升。</text>
</svg>
