<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 事务生命周期</title>
  <desc id="desc">展示 BEGIN、读写、COMMIT、ROLLBACK、SAVEPOINT 与内部状态、XID 分配和资源释放的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .hot { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .commit { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .abort { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .label { font: 16px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="928" height="464" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="48" y="58" class="label">用户看到的是 SQL 事务块；内核维护的是事务状态栈、资源 owner、快照、锁和可选的 XID</text>

  <rect x="58" y="96" width="150" height="78" class="box"/>
  <text x="82" y="126" class="label">BEGIN</text>
  <text x="82" y="151" class="small">StartTransaction</text>
  <text x="82" y="169" class="tiny">分配 VXID，不一定分配 XID</text>

  <rect x="268" y="96" width="170" height="78" class="hot"/>
  <text x="294" y="126" class="label">读语句</text>
  <text x="294" y="151" class="small">GetSnapshotData</text>
  <text x="294" y="169" class="tiny">Read Committed 每语句快照</text>

  <rect x="498" y="96" width="170" height="78" class="warn"/>
  <text x="524" y="126" class="label">首次写入</text>
  <text x="524" y="151" class="small">AssignTransactionId</text>
  <text x="524" y="169" class="tiny">分配全局 XID，登记 PGPROC</text>

  <rect x="718" y="96" width="170" height="78" class="commit"/>
  <text x="744" y="126" class="label">COMMIT</text>
  <text x="744" y="151" class="small">RecordTransactionCommit</text>
  <text x="744" y="169" class="tiny">WAL、pg_xact、释放锁</text>

  <path d="M 208 135 L 268 135" class="arrow"/>
  <path d="M 438 135 L 498 135" class="arrow"/>
  <path d="M 668 135 L 718 135" class="arrow"/>

  <rect x="268" y="248" width="170" height="82" class="hot"/>
  <text x="292" y="279" class="label">SAVEPOINT</text>
  <text x="292" y="304" class="small">StartSubTransaction</text>
  <text x="292" y="322" class="tiny">子事务栈；写入后有 subxid</text>

  <rect x="498" y="248" width="170" height="82" class="abort"/>
  <text x="520" y="279" class="label">ROLLBACK TO</text>
  <text x="520" y="304" class="small">AbortSubTransaction</text>
  <text x="520" y="322" class="tiny">回滚局部修改，父事务继续</text>

  <rect x="718" y="248" width="170" height="82" class="abort"/>
  <text x="744" y="279" class="label">ROLLBACK</text>
  <text x="744" y="304" class="small">AbortTransaction</text>
  <text x="744" y="322" class="tiny">标记 abort，释放共享资源</text>

  <path d="M 353 174 L 353 248" class="dash"/>
  <path d="M 438 289 L 498 289" class="arrow"/>
  <path d="M 668 289 L 718 289" class="dash"/>

  <rect x="82" y="398" width="806" height="54" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text x="108" y="425" class="small">核心边界：只读事务可能只有 VXID；写事务提交的“成功”取决于 WAL flush、pg_xact 状态、synchronous_commit 和同步复制等待。</text>
  <text x="108" y="445" class="small">异常路径分两段：先 AbortTransaction 释放共享资源，随后 CleanupTransaction 清理本地事务上下文。</text>
</svg>
