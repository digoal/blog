<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">长事务、冻结与 XID 边界</title>
  <desc id="desc">展示长事务或复制槽如何固定 xmin，使 VACUUM 不能清理近期死亡版本，并解释冻结与 wraparound 风险。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; stroke: #cbd5e1; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .dead { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .ok { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .label { font: 16px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .axis { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 6 5; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="992" height="512" class="bg"/>
  <text x="52" y="58" class="label">事务不结束，xmin 边界不前进；xmin 不前进，旧版本就不能被安全清理</text>

  <line x1="86" y1="170" x2="936" y2="170" class="axis"/>
  <text x="906" y="154" class="small">XID 增长</text>

  <line x1="210" y1="132" x2="210" y2="388" class="dash"/>
  <text x="158" y="122" class="label">backend_xmin</text>
  <text x="172" y="410" class="small">长事务固定</text>

  <line x1="520" y1="132" x2="520" y2="388" class="dash"/>
  <text x="472" y="122" class="label">OldestXmin</text>
  <text x="452" y="410" class="small">VACUUM 判断边界</text>

  <line x1="790" y1="132" x2="790" y2="388" class="dash"/>
  <text x="724" y="122" class="label">freeze horizon</text>
  <text x="706" y="410" class="small">需要冻结的旧 XID 区间</text>

  <rect x="114" y="222" width="210" height="82" class="risk"/>
  <text x="138" y="252" class="label">长事务 / idle in transaction</text>
  <text x="138" y="277" class="small">持有快照，阻止 xmin 前进</text>
  <text x="138" y="296" class="tiny">也可能来自 prepared xact 或复制槽</text>

  <rect x="410" y="222" width="232" height="82" class="dead"/>
  <text x="434" y="252" class="label">recently dead 元组</text>
  <text x="434" y="277" class="small">删除者已提交，但仍可能被旧快照看到</text>
  <text x="434" y="296" class="tiny">VACUUM 不能立刻移除</text>

  <rect x="706" y="222" width="210" height="82" class="ok"/>
  <text x="730" y="252" class="label">冻结 / aggressive VACUUM</text>
  <text x="730" y="277" class="small">把足够老的插入 XID 标记为冻结</text>
  <text x="730" y="296" class="tiny">避免 32 位 XID wraparound</text>

  <path d="M 324 262 L 410 262" class="arrow"/>
  <path d="M 642 262 L 706 262" class="arrow"/>

  <rect x="96" y="452" width="846" height="52" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text x="120" y="478" class="small">观测路径：pg_stat_activity.backend_xid/backend_xmin、pg_prepared_xacts、pg_replication_slots.xmin/catalog_xmin、pg_class.relfrozenxid。</text>
  <text x="120" y="498" class="small">调优不是简单调大 autovacuum_freeze_max_age；还要处理阻塞 xmin 前进的会话、复制槽和长报表。</text>
</svg>
