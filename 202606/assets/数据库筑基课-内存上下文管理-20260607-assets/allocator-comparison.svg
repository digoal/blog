<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 四类 MemoryContext 分配器对比</title>
  <desc id="desc">对比 AllocSet、Generation、Slab、Bump 四类分配器的块、chunk、释放和适用场景。</desc>
  <style>
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .head { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .alloc { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.2; rx: 5; }
    .free { fill: #dcfce7; stroke: #15803d; stroke-width: 1.2; rx: 5; }
    .large { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; rx: 5; }
    .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; rx: 5; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
  </style>

  <rect x="24" y="24" width="992" height="568" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="44" y="56" class="label">选择分配器，本质是选择“单个对象释放、块复用、碎片、CPU 和可观测性”的取舍。</text>

  <g transform="translate(48 92)">
    <rect width="456" height="232" class="panel"/>
    <rect x="18" y="18" width="180" height="44" class="head"/>
    <text x="108" y="46" text-anchor="middle" class="label">AllocSet</text>
    <text x="224" y="40" class="small">默认通用分配器；小 chunk 走 freelist，大对象独立 block</text>
    <rect x="34" y="92" width="70" height="34" class="alloc"/>
    <rect x="112" y="92" width="70" height="34" class="free"/>
    <rect x="190" y="92" width="70" height="34" class="alloc"/>
    <rect x="268" y="92" width="132" height="34" class="large"/>
    <text x="69" y="114" text-anchor="middle" class="tiny">8B</text>
    <text x="147" y="114" text-anchor="middle" class="tiny">free</text>
    <text x="225" y="114" text-anchor="middle" class="tiny">chunk</text>
    <text x="334" y="114" text-anchor="middle" class="tiny">large block</text>
    <text x="34" y="164" class="small">适合：普通 backend 对象、per-query、per-tuple。</text>
    <text x="34" y="188" class="small">代价：power-of-2 freelist 会有内部碎片。</text>
  </g>

  <g transform="translate(536 92)">
    <rect width="456" height="232" class="panel"/>
    <rect x="18" y="18" width="180" height="44" class="head"/>
    <text x="108" y="46" text-anchor="middle" class="label">Generation</text>
    <text x="224" y="40" class="small">适合 FIFO 或一批对象生命周期相近的队列式对象</text>
    <rect x="34" y="92" width="78" height="34" class="alloc"/>
    <rect x="120" y="92" width="78" height="34" class="alloc"/>
    <rect x="206" y="92" width="78" height="34" class="free"/>
    <rect x="292" y="92" width="78" height="34" class="free"/>
    <text x="73" y="114" text-anchor="middle" class="tiny">早分配</text>
    <text x="159" y="114" text-anchor="middle" class="tiny">后分配</text>
    <text x="245" y="114" text-anchor="middle" class="tiny">早释放</text>
    <text x="331" y="114" text-anchor="middle" class="tiny">块回收</text>
    <text x="34" y="164" class="small">适合：tuplestore、逻辑解码 tuple 队列。</text>
    <text x="34" y="188" class="small">代价：不复用单个 freed chunk；等整块空后回收。</text>
  </g>

  <g transform="translate(48 348)">
    <rect width="456" height="232" class="panel"/>
    <rect x="18" y="18" width="180" height="44" class="head"/>
    <text x="108" y="46" text-anchor="middle" class="label">Slab</text>
    <text x="224" y="40" class="small">固定大小对象；优先填最满 block，降低碎片</text>
    <rect x="34" y="92" width="54" height="34" class="alloc"/>
    <rect x="94" y="92" width="54" height="34" class="alloc"/>
    <rect x="154" y="92" width="54" height="34" class="free"/>
    <rect x="214" y="92" width="54" height="34" class="alloc"/>
    <rect x="274" y="92" width="54" height="34" class="free"/>
    <rect x="334" y="92" width="54" height="34" class="alloc"/>
    <text x="61" y="114" text-anchor="middle" class="tiny">N</text>
    <text x="121" y="114" text-anchor="middle" class="tiny">N</text>
    <text x="181" y="114" text-anchor="middle" class="tiny">free</text>
    <text x="241" y="114" text-anchor="middle" class="tiny">N</text>
    <text x="301" y="114" text-anchor="middle" class="tiny">free</text>
    <text x="361" y="114" text-anchor="middle" class="tiny">N</text>
    <text x="34" y="164" class="small">适合：大量同尺寸结构体，如 reorder buffer 条目。</text>
    <text x="34" y="188" class="small">代价：请求大小必须等于创建时 chunkSize。</text>
  </g>

  <g transform="translate(536 348)">
    <rect width="456" height="232" class="panel"/>
    <rect x="18" y="18" width="180" height="44" class="head"/>
    <text x="108" y="46" text-anchor="middle" class="label">Bump</text>
    <text x="224" y="40" class="small">顺序推进 freeptr；无普通 chunk header；只 reset/delete</text>
    <rect x="34" y="92" width="70" height="34" class="alloc"/>
    <rect x="104" y="92" width="70" height="34" class="alloc"/>
    <rect x="174" y="92" width="70" height="34" class="alloc"/>
    <rect x="244" y="92" width="112" height="34" class="bad"/>
    <text x="69" y="114" text-anchor="middle" class="tiny">a</text>
    <text x="139" y="114" text-anchor="middle" class="tiny">b</text>
    <text x="209" y="114" text-anchor="middle" class="tiny">c</text>
    <text x="300" y="114" text-anchor="middle" class="tiny">不能单独 pfree</text>
    <text x="34" y="164" class="small">适合：大量短寿命小对象，如排序临时 tuple。</text>
    <text x="34" y="188" class="small">代价：指针不能暴露给会 pfree/repalloc 的通用代码。</text>
  </g>
</svg>
