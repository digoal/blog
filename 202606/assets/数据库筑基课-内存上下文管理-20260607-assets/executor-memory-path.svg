<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">执行器中的内存上下文路径</title>
  <desc id="desc">展示 ExecutorState、PlanState、ExprContext、HashTableContext、tuplesort 和 tuplestore 的内存生命周期。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .query { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.6; rx: 8; }
    .tuple { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.6; rx: 8; }
    .work { fill: #fef3c7; stroke: #b45309; stroke-width: 1.6; rx: 8; }
    .spill { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.6; rx: 8; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #4f46e5; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="504" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="44" y="56" class="label">执行器用“每查询 + 每节点 + 每行 + 工作算子子上下文”把临时对象分层，防止逐行泄漏累积到查询结束。</text>

  <rect x="68" y="102" width="182" height="76" class="query"/>
  <text x="159" y="133" text-anchor="middle" class="label">ExecutorState</text>
  <text x="159" y="157" text-anchor="middle" class="small">es_query_cxt</text>

  <rect x="336" y="102" width="182" height="76" class="query"/>
  <text x="427" y="133" text-anchor="middle" class="label">PlanState 树</text>
  <text x="427" y="157" text-anchor="middle" class="small">InitNode 时分配</text>

  <rect x="604" y="102" width="182" height="76" class="tuple"/>
  <text x="695" y="133" text-anchor="middle" class="label">ExprContext</text>
  <text x="695" y="157" text-anchor="middle" class="small">每个节点常有一个</text>

  <rect x="834" y="102" width="126" height="76" class="tuple"/>
  <text x="897" y="133" text-anchor="middle" class="label">Reset</text>
  <text x="897" y="157" text-anchor="middle" class="small">每行循环</text>

  <path d="M250 140 L336 140" class="line"/>
  <path d="M518 140 L604 140" class="line"/>
  <path d="M786 140 L834 140" class="line"/>

  <rect x="112" y="282" width="190" height="94" class="work"/>
  <text x="207" y="316" text-anchor="middle" class="label">HashTableContext</text>
  <text x="207" y="341" text-anchor="middle" class="small">hashCxt / batchCxt / spillCxt</text>
  <text x="207" y="363" text-anchor="middle" class="tiny">hash join 工作存储</text>

  <rect x="390" y="282" width="190" height="94" class="work"/>
  <text x="485" y="316" text-anchor="middle" class="label">tuplesort</text>
  <text x="485" y="341" text-anchor="middle" class="small">sortcontext + tuplecontext</text>
  <text x="485" y="363" text-anchor="middle" class="tiny">可用 BumpContext 保存 caller tuple</text>

  <rect x="668" y="282" width="190" height="94" class="spill"/>
  <text x="763" y="316" text-anchor="middle" class="label">tuplestore</text>
  <text x="763" y="341" text-anchor="middle" class="small">GenerationContext</text>
  <text x="763" y="363" text-anchor="middle" class="tiny">FIFO tuple 存取模式</text>

  <path d="M159 178 C165 226 192 250 207 282" class="dash"/>
  <path d="M427 178 C448 226 474 250 485 282" class="dash"/>
  <path d="M695 178 C710 226 745 250 763 282" class="dash"/>

  <rect x="88" y="436" width="848" height="58" class="box"/>
  <text x="112" y="462" class="small">实践判断：如果一个表达式函数在 per-tuple context 里泄漏，成本通常是“一行一清”；如果误放进 per-query 或 TopMemoryContext，成本会累积。</text>
  <text x="112" y="482" class="small">工作内存并不只由 work_mem 解释，还要看算子上下文树、batch/spill 行为和每个 backend 的并发数。</text>
</svg>
