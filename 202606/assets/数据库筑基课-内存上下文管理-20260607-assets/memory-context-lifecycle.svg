<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 内存上下文生命周期</title>
  <desc id="desc">展示 TopMemoryContext、MessageContext、PortalContext、ExecutorState、ExprContext、事务上下文和 ErrorContext 的父子关系与重置边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .root { fill: #f8fafc; stroke: #334155; stroke-width: 1.7; rx: 8; }
    .long { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.6; rx: 8; }
    .txn { fill: #fef3c7; stroke: #b45309; stroke-width: 1.6; rx: 8; }
    .query { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.6; rx: 8; }
    .tuple { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.6; rx: 8; }
    .error { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 8; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="504" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="44" y="56" class="label">核心原则：把内存按生命周期放进上下文树；结束一个生命周期时 reset/delete 整棵子树，而不是逐个 pfree。</text>

  <rect x="410" y="86" width="220" height="64" class="root"/>
  <text x="520" y="113" text-anchor="middle" class="label">TopMemoryContext</text>
  <text x="520" y="137" text-anchor="middle" class="small">进程级根；通常不重置</text>

  <rect x="76" y="208" width="188" height="72" class="long"/>
  <text x="170" y="237" text-anchor="middle" class="label">CacheMemoryContext</text>
  <text x="170" y="261" text-anchor="middle" class="small">relcache / catcache 等长寿命缓存</text>

  <rect x="304" y="208" width="188" height="72" class="query"/>
  <text x="398" y="237" text-anchor="middle" class="label">MessageContext</text>
  <text x="398" y="261" text-anchor="middle" class="small">每个前端消息循环重置</text>

  <rect x="532" y="208" width="188" height="72" class="txn"/>
  <text x="626" y="237" text-anchor="middle" class="label">TopTransactionContext</text>
  <text x="626" y="261" text-anchor="middle" class="small">顶层事务结束时重置</text>

  <rect x="760" y="208" width="188" height="72" class="error"/>
  <text x="854" y="237" text-anchor="middle" class="label">ErrorContext</text>
  <text x="854" y="261" text-anchor="middle" class="small">错误恢复保留少量内存</text>

  <rect x="304" y="348" width="188" height="72" class="query"/>
  <text x="398" y="377" text-anchor="middle" class="label">PortalContext</text>
  <text x="398" y="401" text-anchor="middle" class="small">一次 portal / cursor 执行</text>

  <rect x="532" y="348" width="188" height="72" class="query"/>
  <text x="626" y="377" text-anchor="middle" class="label">ExecutorState</text>
  <text x="626" y="401" text-anchor="middle" class="small">ExecutorStart 到 ExecutorEnd</text>

  <rect x="760" y="348" width="188" height="72" class="tuple"/>
  <text x="854" y="377" text-anchor="middle" class="label">ExprContext</text>
  <text x="854" y="401" text-anchor="middle" class="small">常按每行循环 reset</text>

  <rect x="532" y="456" width="188" height="48" class="txn"/>
  <text x="626" y="486" text-anchor="middle" class="small">CurTransactionContext：子事务中指向子上下文</text>

  <path d="M 450 150 C 310 172 206 190 170 208" class="line"/>
  <path d="M 500 150 C 452 176 414 190 398 208" class="line"/>
  <path d="M 540 150 C 585 176 616 190 626 208" class="line"/>
  <path d="M 596 150 C 730 172 824 190 854 208" class="line"/>
  <path d="M 398 280 L 398 348" class="line"/>
  <path d="M 492 384 L 532 384" class="line"/>
  <path d="M 720 384 L 760 384" class="line"/>
  <path d="M 626 280 L 626 456" class="dash"/>

  <text x="80" y="322" class="tiny">风险：把短期对象放进长寿命上下文，泄漏会表现为 backend 常驻内存上升。</text>
  <text x="80" y="346" class="tiny">收益：错误、事务结束、查询结束、每行循环都能用统一边界释放内存和 reset callback。</text>
</svg>
