<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">内存上下文观测与排障闭环</title>
  <desc id="desc">展示从 RSS 异常、pg_backend_memory_contexts、pg_log_backend_memory_contexts、源码定位到修复生命周期边界的排障流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .detect { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.6; rx: 8; }
    .sql { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.6; rx: 8; }
    .log { fill: #fef3c7; stroke: #b45309; stroke-width: 1.6; rx: 8; }
    .fix { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.6; rx: 8; }
    .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 8; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #0f766e; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="504" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="44" y="56" class="label">内存上下文排障不要只看 OS RSS，要把 backend、SQL、上下文树和源码生命周期边界连起来。</text>

  <rect x="78" y="108" width="180" height="88" class="detect"/>
  <text x="168" y="139" text-anchor="middle" class="label">发现异常</text>
  <text x="168" y="164" text-anchor="middle" class="small">RSS 上升 / OOM / 慢查询</text>
  <text x="168" y="184" text-anchor="middle" class="tiny">先定位 pid 和 SQL</text>

  <rect x="348" y="108" width="220" height="88" class="sql"/>
  <text x="458" y="139" text-anchor="middle" class="label">查当前 backend</text>
  <text x="458" y="164" text-anchor="middle" class="small">pg_backend_memory_contexts</text>
  <text x="458" y="184" text-anchor="middle" class="tiny">name/type/path/used_bytes</text>

  <rect x="658" y="108" width="220" height="88" class="log"/>
  <text x="768" y="139" text-anchor="middle" class="label">远程打日志</text>
  <text x="768" y="164" text-anchor="middle" class="small">pg_log_backend_memory_contexts(pid)</text>
  <text x="768" y="184" text-anchor="middle" class="tiny">目标进程下次中断点输出</text>

  <path d="M258 152 L348 152" class="line"/>
  <path d="M568 152 L658 152" class="line"/>

  <rect x="78" y="302" width="206" height="92" class="box"/>
  <text x="181" y="333" text-anchor="middle" class="label">识别上下文类型</text>
  <text x="181" y="358" text-anchor="middle" class="small">Cache / Message / Executor / Expr</text>
  <text x="181" y="378" text-anchor="middle" class="tiny">先看 name 和 path，不只看总量</text>

  <rect x="374" y="302" width="206" height="92" class="warn"/>
  <text x="477" y="333" text-anchor="middle" class="label">判断泄漏边界</text>
  <text x="477" y="358" text-anchor="middle" class="small">生命周期是否放错</text>
  <text x="477" y="378" text-anchor="middle" class="tiny">是否缺 reset / delete / callback</text>

  <rect x="670" y="302" width="206" height="92" class="fix"/>
  <text x="773" y="333" text-anchor="middle" class="label">修正并验证</text>
  <text x="773" y="358" text-anchor="middle" class="small">切换上下文 / reset 子树</text>
  <text x="773" y="378" text-anchor="middle" class="tiny">重复执行后 used_bytes 不再线性增长</text>

  <path d="M768 196 C760 252 260 248 181 302" class="line"/>
  <path d="M284 348 L374 348" class="line"/>
  <path d="M580 348 L670 348" class="line"/>
  <path d="M773 394 C776 470 160 470 168 196" class="line"/>

  <text x="84" y="472" class="small">注意：`pg_backend_memory_contexts.path` 是临时编号；同一查询里比较父子关系时用 CTE 固定一次视图结果。</text>
  <text x="84" y="494" class="small">注意：`pg_log_backend_memory_contexts` 默认权限受限，且最多按深度和每个父节点 100 个子节点打印明细。</text>
</svg>
