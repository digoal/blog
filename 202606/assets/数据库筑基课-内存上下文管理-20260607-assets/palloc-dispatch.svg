<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">palloc 与 pfree 的上下文调度路径</title>
  <desc id="desc">展示 palloc 通过 CurrentMemoryContext 分配，pfree 和 repalloc 通过 chunk header 找回 MemoryContextMethods 的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2364aa"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .api { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.6; rx: 8; }
    .chunk { fill: #fef3c7; stroke: #b45309; stroke-width: 1.6; rx: 8; }
    .method { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.6; rx: 8; }
    .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 8; }
    .label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #0f172a; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #334155; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 12px; fill: #475569; }
    .line { stroke: #2364aa; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>

  <rect x="24" y="24" width="992" height="504" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="44" y="56" class="label">分配依赖当前上下文；释放不依赖当前上下文，而是从指针前面的 header 找回所属分配器。</text>

  <rect x="72" y="96" width="170" height="76" class="api"/>
  <text x="157" y="128" text-anchor="middle" class="label">palloc(size)</text>
  <text x="157" y="152" text-anchor="middle" class="small">使用 CurrentMemoryContext</text>

  <rect x="312" y="96" width="210" height="76" class="box"/>
  <text x="417" y="128" text-anchor="middle" class="label">MemoryContextData</text>
  <text x="417" y="152" text-anchor="middle" class="small">methods 指向具体实现</text>

  <rect x="592" y="96" width="190" height="76" class="method"/>
  <text x="687" y="128" text-anchor="middle" class="label">methods-&gt;alloc</text>
  <text x="687" y="152" text-anchor="middle" class="small">AllocSet / Slab / Generation / Bump</text>

  <rect x="842" y="96" width="120" height="76" class="chunk"/>
  <text x="902" y="128" text-anchor="middle" class="label">用户指针</text>
  <text x="902" y="152" text-anchor="middle" class="small">返回给调用者</text>

  <path d="M242 134 L312 134" class="line"/>
  <path d="M522 134 L592 134" class="line"/>
  <path d="M782 134 L842 134" class="line"/>

  <rect x="72" y="302" width="170" height="76" class="api"/>
  <text x="157" y="334" text-anchor="middle" class="label">pfree(ptr)</text>
  <text x="157" y="358" text-anchor="middle" class="small">不看 CurrentMemoryContext</text>

  <rect x="312" y="278" width="210" height="124" class="chunk"/>
  <text x="417" y="310" text-anchor="middle" class="label">ptr 前的 uint64 header</text>
  <text x="417" y="336" text-anchor="middle" class="small">低 4 bit = MethodID</text>
  <text x="417" y="360" text-anchor="middle" class="small">其余位编码大小/块偏移等</text>
  <text x="417" y="384" text-anchor="middle" class="tiny">Bump 正常构建不保留 chunk header</text>

  <rect x="592" y="302" width="190" height="76" class="method"/>
  <text x="687" y="334" text-anchor="middle" class="label">mcxt_methods[]</text>
  <text x="687" y="358" text-anchor="middle" class="small">选择 free_p / realloc</text>

  <rect x="842" y="302" width="120" height="76" class="box"/>
  <text x="902" y="334" text-anchor="middle" class="label">所属上下文</text>
  <text x="902" y="358" text-anchor="middle" class="small">释放或复用</text>

  <path d="M242 340 L312 340" class="line"/>
  <path d="M522 340 L592 340" class="line"/>
  <path d="M782 340 L842 340" class="line"/>

  <rect x="72" y="442" width="890" height="58" class="warn"/>
  <text x="96" y="466" class="small">边界：palloc 默认 OOM 走 ERROR，不返回 NULL；只有 MCXT_ALLOC_NO_OOM 才可能返回 NULL。</text>
  <text x="96" y="486" class="small">边界：不要把 malloc/free 与 palloc/pfree 混用；BumpContext 分配出的指针不能普通 pfree 或 repalloc。</text>
</svg>
