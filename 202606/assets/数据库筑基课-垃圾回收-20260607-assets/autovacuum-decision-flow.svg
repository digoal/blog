<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">autovacuum 触发与优先级决策</title>
  <desc id="desc">展示 autovacuum launcher 和 worker 如何根据 wraparound 风险、更新删除阈值、插入阈值和 analyze 阈值选择表。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fbff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
    .risk { fill: #fff0f0; stroke: #a63737; stroke-width: 2; rx: 8; }
    .formula { fill: #fff8db; stroke: #8a6d00; stroke-width: 2; rx: 8; }
    .good { fill: #eef8f1; stroke: #2b7a3d; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #1f2933; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #394b59; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #243b53; }
    .line { stroke: #2f4f4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="25" y="25" width="1070" height="600" fill="#ffffff" stroke="#d7dde3" stroke-width="2" rx="10"/>
  <text class="text" x="55" y="65">autovacuum 是调度系统：先保命，再按表级统计触发清理和分析</text>

  <rect class="box" x="70" y="115" width="235" height="110"/>
  <text class="text" x="105" y="155">Launcher</text>
  <text class="small" x="95" y="188">按 naptime 分配数据库</text>
  <text class="small" x="95" y="212">最多 max_workers 并发</text>

  <path class="line" d="M305 170 L390 170"/>

  <rect class="risk" x="395" y="95" width="290" height="150"/>
  <text class="text" x="425" y="135">优先级 1：wraparound</text>
  <text class="small" x="425" y="168">relfrozenxid / relminmxid 接近上限</text>
  <text class="small" x="425" y="196">即使 autovacuum=off 也会触发</text>
  <text class="small" x="425" y="222">wraparound worker 不自动让路</text>

  <path class="line" d="M685 170 L775 170"/>

  <rect class="good" x="780" y="115" width="270" height="110"/>
  <text class="text" x="830" y="155">Worker 执行</text>
  <text class="small" x="812" y="188">VACUUM / ANALYZE</text>
  <text class="small" x="812" y="212">可受 cost delay 限流</text>

  <rect class="formula" x="95" y="315" width="430" height="115"/>
  <text class="text" x="125" y="350">普通 vacuum 阈值</text>
  <text class="mono" x="125" y="383">min(max, base + scale * reltuples)</text>
  <text class="small" x="125" y="410">与 update/delete 后的 obsolete tuples 比较</text>

  <rect class="formula" x="595" y="315" width="430" height="115"/>
  <text class="text" x="625" y="350">insert vacuum 阈值</text>
  <text class="mono" x="625" y="383">base + scale * reltuples * not_frozen%</text>
  <text class="small" x="625" y="410">让 append-mostly 表也能推进 VM 和 freezing</text>

  <rect class="formula" x="345" y="495" width="430" height="90"/>
  <text class="text" x="375" y="530">ANALYZE 阈值</text>
  <text class="mono" x="375" y="563">base + scale * reltuples</text>

  <path class="line" d="M335 315 C380 270 460 245 520 245"/>
  <path class="line" d="M810 315 C760 270 665 245 575 245"/>
  <path class="line" d="M560 495 C560 450 560 410 560 245"/>
</svg>
