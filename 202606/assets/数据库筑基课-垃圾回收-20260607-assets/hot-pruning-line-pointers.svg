<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="580" viewBox="0 0 1120 580" role="img" aria-labelledby="title desc">
  <title id="title">HOT pruning 与 line pointer 状态变化</title>
  <desc id="desc">展示 HOT 更新链如何通过 LP_REDIRECT、LP_DEAD、LP_UNUSED 逐步减少索引清理压力并复用页内空间。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .page { fill: #f8fbff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
    .tuple { fill: #dff3ff; stroke: #246b8f; stroke-width: 2; rx: 6; }
    .old { fill: #fff0f0; stroke: #a63737; stroke-width: 2; rx: 6; }
    .live { fill: #eef8f1; stroke: #2b7a3d; stroke-width: 2; rx: 6; }
    .lp { fill: #fff8db; stroke: #8a6d00; stroke-width: 2; rx: 4; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #1f2933; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #394b59; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #243b53; }
    .line { stroke: #2f4f4f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7b8794; stroke-width: 2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="25" y="25" width="1070" height="530" fill="#ffffff" stroke="#d7dde3" stroke-width="2" rx="10"/>
  <text class="text" x="55" y="65">HOT 把“同页、索引列不变”的更新链限制在 heap 页内，减少索引垃圾</text>

  <rect class="page" x="70" y="110" width="430" height="160"/>
  <text class="text" x="95" y="145">阶段 A：HOT 更新后</text>
  <rect class="lp" x="105" y="178" width="80" height="45"/>
  <text class="mono" x="118" y="206">lp[1]</text>
  <rect class="old" x="205" y="178" width="120" height="45"/>
  <text class="mono" x="222" y="206">tuple v1</text>
  <rect class="live" x="350" y="178" width="120" height="45"/>
  <text class="mono" x="367" y="206">tuple v2</text>
  <path class="line" d="M185 200 L202 200"/>
  <path class="line" d="M325 200 L347 200"/>
  <text class="small" x="105" y="250">索引仍指向 root lp[1]；v2 是 HEAP_ONLY_TUPLE</text>

  <rect class="page" x="610" y="110" width="430" height="160"/>
  <text class="text" x="635" y="145">阶段 B：pruning 后</text>
  <rect class="lp" x="645" y="178" width="110" height="45"/>
  <text class="mono" x="658" y="206">LP_REDIRECT</text>
  <rect class="live" x="815" y="178" width="120" height="45"/>
  <text class="mono" x="832" y="206">tuple v2</text>
  <path class="line" d="M755 200 L812 200"/>
  <text class="small" x="645" y="250">root line pointer 保留，旧 tuple 空间已可整理</text>

  <path class="line" d="M500 190 L610 190"/>

  <rect class="page" x="70" y="335" width="430" height="150"/>
  <text class="text" x="95" y="370">阶段 C：整条链死亡</text>
  <rect class="lp" x="110" y="405" width="95" height="45"/>
  <text class="mono" x="123" y="433">LP_DEAD</text>
  <text class="small" x="225" y="433">仍不能马上复用 root，因为索引项还指向它</text>

  <rect class="page" x="610" y="335" width="430" height="150"/>
  <text class="text" x="635" y="370">阶段 D：VACUUM 清索引后</text>
  <rect class="lp" x="650" y="405" width="110" height="45"/>
  <text class="mono" x="663" y="433">LP_UNUSED</text>
  <text class="small" x="780" y="433">line pointer 和 tuple 空间可重新分配</text>

  <path class="dash" d="M500 415 L610 415"/>
  <text class="small" x="415" y="315">标准 VACUUM 删除索引项后，heap 才能把 LP_DEAD 变成 LP_UNUSED</text>
</svg>
