<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL lazy VACUUM 的三阶段状态机</title>
  <desc id="desc">展示标准 VACUUM 扫描 heap、清理索引、回收 heap line pointer，并在 dead TID 存储满时循环执行。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fbff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
    .store { fill: #fff8db; stroke: #8a6d00; stroke-width: 2; rx: 8; }
    .final { fill: #eef8f1; stroke: #2b7a3d; stroke-width: 2; rx: 8; }
    .skip { fill: #f4f4f5; stroke: #6b7280; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 23px; fill: #1f2933; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #394b59; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 16px; fill: #243b53; }
    .line { stroke: #2f4f4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7b8794; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="25" y="25" width="1070" height="510" fill="#ffffff" stroke="#d7dde3" stroke-width="2" rx="10"/>
  <text class="text" x="55" y="65">标准 VACUUM 不是一次“删除文件”，而是有限内存下的分批清理状态机</text>

  <rect class="box" x="60" y="125" width="245" height="130"/>
  <text class="text" x="88" y="165">Phase I：扫描 heap</text>
  <text class="small" x="88" y="198">prune / freeze / defrag</text>
  <text class="small" x="88" y="226">记录可删索引项的 TID</text>

  <path class="line" d="M305 190 L380 190"/>

  <rect class="store" x="385" y="125" width="195" height="130"/>
  <text class="text" x="420" y="165">TidStore</text>
  <text class="small" x="410" y="198">受 maintenance_work_mem</text>
  <text class="small" x="410" y="226">或 autovacuum_work_mem 限制</text>

  <path class="line" d="M580 190 L650 190"/>

  <rect class="box" x="655" y="125" width="200" height="130"/>
  <text class="text" x="684" y="165">Phase II：索引</text>
  <text class="small" x="684" y="198">ambulkdelete</text>
  <text class="small" x="684" y="226">删除 dead index tuple</text>

  <path class="line" d="M855 190 L925 190"/>

  <rect class="box" x="930" y="125" width="145" height="130"/>
  <text class="text" x="958" y="165">Phase III</text>
  <text class="small" x="952" y="198">heap 二次处理</text>
  <text class="small" x="952" y="226">LP_DEAD -> LP_UNUSED</text>

  <path class="dash" d="M480 255 C480 340 170 340 170 260"/>
  <text class="small" x="210" y="325">TidStore 满：先清一批，再回到 heap 扫描</text>

  <rect class="skip" x="135" y="385" width="220" height="90"/>
  <text class="text" x="165" y="420">可跳过页面</text>
  <text class="small" x="165" y="450">VM all-visible / all-frozen</text>

  <rect class="skip" x="450" y="385" width="220" height="90"/>
  <text class="text" x="480" y="420">可能跳过索引</text>
  <text class="small" x="480" y="450">dead 很少或 failsafe</text>

  <rect class="final" x="765" y="385" width="240" height="90"/>
  <text class="text" x="795" y="420">最终收尾</text>
  <text class="small" x="795" y="450">FSM / VM / pg_class / stats / 截尾</text>

  <path class="line" d="M245 385 C230 330 205 290 185 255"/>
  <path class="line" d="M560 385 C600 330 670 285 732 255"/>
  <path class="line" d="M885 385 C935 335 985 300 1000 255"/>
</svg>
