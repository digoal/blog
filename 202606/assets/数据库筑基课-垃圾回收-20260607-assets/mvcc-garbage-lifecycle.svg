<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">MVCC 行版本从业务修改到可回收垃圾的生命周期</title>
  <desc id="desc">展示 PostgreSQL 中 UPDATE 和 DELETE 产生旧行版本，长事务快照阻止回收，超过全局可见性边界后才可由 VACUUM 回收。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f7fbff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
    .warn { fill: #fff4e6; stroke: #a65f00; stroke-width: 2; rx: 8; }
    .good { fill: #eef8f1; stroke: #2b7a3d; stroke-width: 2; rx: 8; }
    .bad { fill: #fff0f0; stroke: #a63737; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; fill: #1f2933; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #394b59; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 17px; fill: #243b53; }
    .line { stroke: #2f4f4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7b8794; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
  </style>
  <rect x="25" y="25" width="1050" height="470" fill="#ffffff" stroke="#d7dde3" stroke-width="2" rx="10"/>
  <text class="text" x="55" y="65">从“旧版本”到“垃圾”：核心判定不是删除语句本身，而是是否仍可能被某个快照看到</text>

  <rect class="box" x="70" y="115" width="190" height="115"/>
  <text class="text" x="95" y="155">T1 插入</text>
  <text class="mono" x="95" y="188">xmin = T1</text>
  <text class="mono" x="95" y="212">xmax = 0</text>

  <path class="line" d="M265 172 L350 172"/>

  <rect class="warn" x="355" y="115" width="215" height="115"/>
  <text class="text" x="382" y="155">T2 更新/删除</text>
  <text class="mono" x="382" y="188">旧版本 xmax = T2</text>
  <text class="small" x="382" y="214">新版本另写一份</text>

  <path class="line" d="M575 172 L660 172"/>

  <rect class="bad" x="665" y="115" width="220" height="115"/>
  <text class="text" x="690" y="155">recently dead</text>
  <text class="small" x="690" y="188">T2 已提交</text>
  <text class="small" x="690" y="214">但旧快照仍可能可见</text>

  <path class="line" d="M885 172 L955 172"/>

  <rect class="good" x="960" y="115" width="90" height="115"/>
  <text class="text" x="980" y="155">dead</text>
  <text class="small" x="975" y="188">可回收</text>
  <text class="small" x="975" y="214">可复用</text>

  <line class="dash" x1="120" y1="305" x2="975" y2="305"/>
  <text class="small" x="70" y="297">时间 / XID 推进</text>

  <rect class="warn" x="240" y="340" width="355" height="105"/>
  <text class="text" x="265" y="380">长事务、复制槽、prepared xact</text>
  <text class="small" x="265" y="414">可能固定 xmin/catalog_xmin，使旧版本停留在 recently dead</text>

  <rect class="good" x="690" y="340" width="280" height="105"/>
  <text class="text" x="720" y="380">OldestXmin / GlobalVis</text>
  <text class="small" x="720" y="414">确认没有活跃快照需要它时，VACUUM 才能处理</text>

  <path class="line" d="M595 392 L685 392"/>
  <path class="line" d="M870 340 C915 285 935 245 970 225"/>
</svg>
