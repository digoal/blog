<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">垃圾回收问题的运维排查闭环</title>
  <desc id="desc">展示从发现膨胀或 wraparound 风险，到定位阻塞源、调整策略、验证结果的闭环。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f8fbff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
    .risk { fill: #fff0f0; stroke: #a63737; stroke-width: 2; rx: 8; }
    .action { fill: #fff8db; stroke: #8a6d00; stroke-width: 2; rx: 8; }
    .good { fill: #eef8f1; stroke: #2b7a3d; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #1f2933; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #394b59; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #243b53; }
    .line { stroke: #2f4f4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="25" y="25" width="1070" height="570" fill="#ffffff" stroke="#d7dde3" stroke-width="2" rx="10"/>
  <text class="text" x="55" y="65">垃圾回收排障的目标不是“立刻 VACUUM FULL”，而是找到垃圾为什么不能变成可复用空间</text>

  <rect class="risk" x="90" y="130" width="250" height="115"/>
  <text class="text" x="120" y="168">发现症状</text>
  <text class="small" x="120" y="198">n_dead_tup 上升、表/索引膨胀</text>
  <text class="small" x="120" y="224">relfrozenxid age 接近上限</text>

  <rect class="box" x="435" y="130" width="250" height="115"/>
  <text class="text" x="465" y="168">看进度</text>
  <text class="mono" x="465" y="198">pg_stat_progress_vacuum</text>
  <text class="small" x="465" y="224">phase / mode / started_by</text>

  <rect class="risk" x="780" y="130" width="250" height="115"/>
  <text class="text" x="810" y="168">找阻塞源</text>
  <text class="small" x="810" y="198">long xact / prepared xact</text>
  <text class="small" x="810" y="224">replication slot / 锁冲突</text>

  <rect class="action" x="780" y="370" width="250" height="115"/>
  <text class="text" x="810" y="408">调整策略</text>
  <text class="small" x="810" y="438">表级 autovacuum 参数</text>
  <text class="small" x="810" y="464">分批 DML / 索引治理</text>

  <rect class="good" x="435" y="370" width="250" height="115"/>
  <text class="text" x="465" y="408">验证结果</text>
  <text class="small" x="465" y="438">VM/FSM、dead tuple、age</text>
  <text class="small" x="465" y="464">EXPLAIN heap fetch 变化</text>

  <rect class="action" x="90" y="370" width="250" height="115"/>
  <text class="text" x="120" y="408">必要时重写</text>
  <text class="small" x="120" y="438">VACUUM FULL / CLUSTER</text>
  <text class="small" x="120" y="464">pg_repack / 重建索引窗口</text>

  <path class="line" d="M340 188 L430 188"/>
  <path class="line" d="M685 188 L775 188"/>
  <path class="line" d="M905 245 L905 365"/>
  <path class="line" d="M780 428 L690 428"/>
  <path class="line" d="M435 428 L345 428"/>
  <path class="line" d="M215 370 L215 250"/>
  <text class="small" x="425" y="555">常规路径：先解除“不能回收”的原因，再调度清理；只有空间必须还给 OS 或膨胀过大时才考虑重写。</text>
</svg>
