<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">main fork、visibility map 与 free space map 的关系</title>
  <desc id="desc">展示 PostgreSQL 每个关系的 main、_vm、_fsm fork 如何被 VACUUM、INSERT 和 index-only scan 使用。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <style>
    .main { fill: #f8fbff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
    .vm { fill: #eef8f1; stroke: #2b7a3d; stroke-width: 2; rx: 8; }
    .fsm { fill: #fff8db; stroke: #8a6d00; stroke-width: 2; rx: 8; }
    .actor { fill: #f4f4f5; stroke: #6b7280; stroke-width: 2; rx: 8; }
    .page { fill: #ffffff; stroke: #708090; stroke-width: 1.5; rx: 4; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #1f2933; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #394b59; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 15px; fill: #243b53; }
    .line { stroke: #2f4f4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7b8794; stroke-width: 2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="25" y="25" width="1070" height="550" fill="#ffffff" stroke="#d7dde3" stroke-width="2" rx="10"/>
  <text class="text" x="55" y="65">垃圾回收不只改 heap 页，还维护两个旁路地图：VM 决定能不能跳，FSM 决定空间怎么复用</text>

  <rect class="main" x="70" y="125" width="320" height="220"/>
  <text class="text" x="95" y="160">main fork：heap 页面</text>
  <rect class="page" x="100" y="190" width="55" height="95"/>
  <rect class="page" x="165" y="190" width="55" height="95"/>
  <rect class="page" x="230" y="190" width="55" height="95"/>
  <rect class="page" x="295" y="190" width="55" height="95"/>
  <text class="mono" x="108" y="310">blk0</text>
  <text class="mono" x="173" y="310">blk1</text>
  <text class="mono" x="238" y="310">blk2</text>
  <text class="mono" x="303" y="310">blk3</text>

  <rect class="vm" x="485" y="110" width="260" height="145"/>
  <text class="text" x="512" y="145">_vm：visibility map</text>
  <text class="small" x="512" y="180">每个 heap page 两个 bit</text>
  <text class="mono" x="512" y="210">all-visible / all-frozen</text>

  <rect class="fsm" x="485" y="315" width="260" height="150"/>
  <text class="text" x="512" y="350">_fsm：free space map</text>
  <text class="small" x="512" y="385">记录近似可用空间</text>
  <text class="mono" x="512" y="415">1/256 page 粒度</text>

  <rect class="actor" x="835" y="105" width="210" height="95"/>
  <text class="text" x="870" y="143">Index-only scan</text>
  <text class="small" x="870" y="172">先查 VM 决定是否读 heap</text>

  <rect class="actor" x="835" y="255" width="210" height="95"/>
  <text class="text" x="890" y="293">VACUUM</text>
  <text class="small" x="872" y="322">设置 VM，更新 FSM</text>

  <rect class="actor" x="835" y="405" width="210" height="95"/>
  <text class="text" x="902" y="443">INSERT</text>
  <text class="small" x="872" y="472">从 FSM 找可容纳页面</text>

  <path class="line" d="M390 210 L480 180"/>
  <path class="line" d="M390 275 L480 390"/>
  <path class="line" d="M745 170 L830 150"/>
  <path class="line" d="M835 290 L750 230"/>
  <path class="line" d="M835 320 L750 390"/>
  <path class="line" d="M835 450 L750 415"/>
  <path class="dash" d="M575 255 L575 315"/>
  <text class="small" x="590" y="287">heap 修改会清 VM；VACUUM 再谨慎设置</text>
</svg>
