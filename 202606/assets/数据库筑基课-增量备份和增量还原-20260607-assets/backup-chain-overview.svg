<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img">
  <title>全量备份、增量备份与合成全量备份链路</title>
  <desc>展示 PostgreSQL 增量物理备份从全量备份、WAL summary、增量备份到 pg_combinebackup 合成全量备份的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#365a7c"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #18324a; }
      .label { font: 700 18px sans-serif; fill: #1d2b36; }
      .small { font: 15px sans-serif; fill: #314250; }
      .tiny { font: 13px sans-serif; fill: #4a5b66; }
      .box { fill: #f8fbff; stroke: #365a7c; stroke-width: 2; rx: 8; }
      .wal { fill: #fff6de; stroke: #b77b12; stroke-width: 2; rx: 8; }
      .inc { fill: #eef8f0; stroke: #2d7a46; stroke-width: 2; rx: 8; }
      .restore { fill: #f7eefb; stroke: #7b4aa4; stroke-width: 2; rx: 8; }
      .arrow { stroke: #365a7c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #698499; stroke-width: 2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="640" fill="#ffffff"/>
  <text x="40" y="48" class="title">PostgreSQL 增量物理备份链路</text>
  <text x="40" y="78" class="small">增量备份保存“自参考备份以来变化过的关系块”，还原前必须先合成为可启动的完整备份。</text>

  <rect x="50" y="125" width="210" height="135" class="box"/>
  <text x="75" y="160" class="label">B0 全量备份</text>
  <text x="75" y="192" class="small">pg_basebackup</text>
  <text x="75" y="220" class="small">完整数据文件</text>
  <text x="75" y="246" class="tiny">生成 backup_manifest</text>

  <rect x="50" y="340" width="210" height="135" class="wal"/>
  <text x="75" y="375" class="label">WAL 与 summary</text>
  <text x="75" y="407" class="small">pg_wal/summaries</text>
  <text x="75" y="435" class="small">记录变化块范围</text>
  <text x="75" y="461" class="tiny">必须覆盖 B0.start 到 B1.start</text>

  <rect x="345" y="125" width="235" height="135" class="inc"/>
  <text x="370" y="160" class="label">B1 增量备份</text>
  <text x="370" y="192" class="small">pg_basebackup --incremental</text>
  <text x="370" y="220" class="small">上传 B0 manifest</text>
  <text x="370" y="246" class="tiny">部分关系文件变成 INCREMENTAL.*</text>

  <rect x="345" y="340" width="235" height="135" class="wal"/>
  <text x="370" y="375" class="label">继续生成 summary</text>
  <text x="370" y="407" class="small">覆盖 B1.start 到 B2.start</text>
  <text x="370" y="435" class="small">保留窗口决定链路寿命</text>
  <text x="370" y="461" class="tiny">wal_summary_keep_time 太短会失败</text>

  <rect x="660" y="125" width="235" height="135" class="inc"/>
  <text x="685" y="160" class="label">B2 增量备份</text>
  <text x="685" y="192" class="small">上传 B1 manifest</text>
  <text x="685" y="220" class="small">只保存必要关系块</text>
  <text x="685" y="246" class="tiny">非关系文件仍完整保存</text>

  <rect x="660" y="340" width="235" height="135" class="restore"/>
  <text x="685" y="375" class="label">pg_combinebackup</text>
  <text x="685" y="407" class="small">输入：B0 B1 B2</text>
  <text x="685" y="435" class="small">按块选择来源</text>
  <text x="685" y="461" class="tiny">输出合成全量备份</text>

  <rect x="970" y="238" width="165" height="135" class="restore"/>
  <text x="995" y="273" class="label">可还原目录</text>
  <text x="995" y="305" class="small">synthetic full</text>
  <text x="995" y="333" class="small">再做 PITR/启动</text>
  <text x="995" y="359" class="tiny">仍需要所需 WAL</text>

  <path d="M260 192 H345" class="arrow"/>
  <path d="M580 192 H660" class="arrow"/>
  <path d="M895 407 C925 407 940 335 970 305" class="arrow"/>
  <path d="M260 408 H345" class="dash"/>
  <path d="M580 408 H660" class="dash"/>
  <path d="M155 340 V260" class="dash"/>
  <path d="M462 340 V260" class="dash"/>
  <path d="M777 260 V340" class="dash"/>

  <rect x="50" y="535" width="1085" height="62" fill="#f4f7f9" stroke="#c9d3dc" rx="8"/>
  <text x="75" y="562" class="small">关键边界：增量备份依赖历史备份链；合成后才是普通物理备份；合成后的目录仍要按 PostgreSQL 物理恢复规则处理 WAL、recovery.signal 和权限。</text>
  <text x="75" y="585" class="tiny">这不是 pg_dump 逻辑增量，也不是只比较文件 checksum。</text>
</svg>
