<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img">
  <title>INCREMENTAL 文件格式与备份块选择</title>
  <desc>展示 PostgreSQL 增量关系文件的头部字段、块号列表和块内容，以及哪些关系文件会退回全量备份。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334d66"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #18324a; }
      .label { font: 700 17px sans-serif; fill: #1f2f3b; }
      .small { font: 15px sans-serif; fill: #314250; }
      .tiny { font: 13px sans-serif; fill: #526470; }
      .head { fill: #edf4fb; stroke: #36658b; stroke-width: 2; rx: 8; }
      .block { fill: #eaf7ee; stroke: #2f7b43; stroke-width: 2; rx: 6; }
      .full { fill: #fff3df; stroke: #b87916; stroke-width: 2; rx: 8; }
      .bad { fill: #fff0ef; stroke: #ad4b3f; stroke-width: 2; rx: 8; }
      .arrow { stroke: #334d66; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="640" fill="#ffffff"/>
  <text x="42" y="48" class="title">关系文件被替换为 INCREMENTAL.* 时保存什么？</text>
  <text x="42" y="78" class="small">增量文件不是 diff 文本，而是一个小头部加若干 BLCKSZ 数据块。块号是相对当前 segment 的块号。</text>

  <rect x="70" y="130" width="1040" height="132" fill="#f7f9fb" stroke="#c9d3dc" stroke-width="2" rx="8"/>
  <rect x="95" y="164" width="180" height="64" class="head"/>
  <text x="122" y="194" class="label">magic</text>
  <text x="122" y="217" class="tiny">INCREMENTAL_MAGIC</text>

  <rect x="285" y="164" width="190" height="64" class="head"/>
  <text x="312" y="194" class="label">num_blocks</text>
  <text x="312" y="217" class="tiny">包含多少变化块</text>

  <rect x="485" y="164" width="235" height="64" class="head"/>
  <text x="512" y="194" class="label">truncation_block_length</text>
  <text x="512" y="217" class="tiny">重建文件的下限长度</text>

  <rect x="730" y="164" width="170" height="64" class="head"/>
  <text x="757" y="194" class="label">block numbers</text>
  <text x="757" y="217" class="tiny">排序后的相对块号</text>

  <rect x="910" y="164" width="170" height="64" class="block"/>
  <text x="937" y="194" class="label">block data</text>
  <text x="937" y="217" class="tiny">每块 BLCKSZ 字节</text>

  <path d="M185 262 V322 H205" class="arrow"/>
  <path d="M987 262 V322 H965" class="arrow"/>

  <rect x="70" y="340" width="320" height="180" class="full"/>
  <text x="95" y="374" class="label">退回全量备份的情况</text>
  <text x="95" y="407" class="small">文件大小不是 BLCKSZ 整数倍</text>
  <text x="95" y="435" class="small">FSM fork</text>
  <text x="95" y="463" class="small">前序 manifest 中没有该文件</text>
  <text x="95" y="491" class="small">变化块超过约 90% 文件大小</text>

  <rect x="430" y="340" width="320" height="180" class="block"/>
  <text x="455" y="374" class="label">适合增量保存的情况</text>
  <text x="455" y="407" class="small">关系文件存在于前序备份链</text>
  <text x="455" y="435" class="small">WAL summary 只标出少量变化块</text>
  <text x="455" y="463" class="small">truncate/create 信息可由 limit block 表示</text>
  <text x="455" y="491" class="small">增量文件小于完整关系文件</text>

  <rect x="790" y="340" width="320" height="180" class="bad"/>
  <text x="815" y="374" class="label">不能误解为</text>
  <text x="815" y="407" class="small">按 SQL 行做增量</text>
  <text x="815" y="435" class="small">按文件 checksum 对比</text>
  <text x="815" y="463" class="small">只保存最后一次修改</text>
  <text x="815" y="491" class="small">备份自身可直接启动</text>

  <text x="70" y="585" class="small">源码依据：GetFileBackupMethod 选择全量或增量；sendFile 写入 magic、块数、截断长度、块号数组和块内容。</text>
</svg>
