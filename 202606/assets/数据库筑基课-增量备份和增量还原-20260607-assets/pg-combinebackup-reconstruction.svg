<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="690" viewBox="0 0 1180 690" role="img">
  <title>pg_combinebackup 块级重建算法</title>
  <desc>展示 pg_combinebackup 从最新增量文件向前查找每个块来源，最终生成合成全量文件。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#314f69"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #18324a; }
      .label { font: 700 17px sans-serif; fill: #1f2f3b; }
      .small { font: 15px sans-serif; fill: #314250; }
      .tiny { font: 13px sans-serif; fill: #526470; }
      .b0 { fill: #f8fbff; stroke: #365a7c; stroke-width: 2; rx: 8; }
      .b1 { fill: #eaf7ee; stroke: #2f7b43; stroke-width: 2; rx: 8; }
      .b2 { fill: #fff6de; stroke: #b77b12; stroke-width: 2; rx: 8; }
      .out { fill: #f6eefb; stroke: #7b4aa4; stroke-width: 2; rx: 8; }
      .cell0 { fill: #dfeaf5; stroke: #365a7c; }
      .cell1 { fill: #dff3e4; stroke: #2f7b43; }
      .cell2 { fill: #ffe9bd; stroke: #b77b12; }
      .zero { fill: #eeeeee; stroke: #999999; }
      .arrow { stroke: #314f69; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="690" fill="#ffffff"/>
  <text x="42" y="48" class="title">pg_combinebackup 如何把增量链合成为全量文件？</text>
  <text x="42" y="78" class="small">从最新增量开始建 sourcemap：最新增量中有的块优先使用；缺失块向前找增量或全量文件；仍缺失且应存在的块补零。</text>

  <rect x="70" y="125" width="230" height="98" class="b0"/>
  <text x="95" y="158" class="label">B0 全量文件</text>
  <text x="95" y="186" class="small">blocks: 0 1 2 3 4 5</text>
  <text x="95" y="209" class="tiny">最老来源，必须是全量</text>

  <rect x="70" y="265" width="230" height="98" class="b1"/>
  <text x="95" y="298" class="label">B1 增量文件</text>
  <text x="95" y="326" class="small">changed: 2 4</text>
  <text x="95" y="349" class="tiny">包含头部和两个块</text>

  <rect x="70" y="405" width="230" height="98" class="b2"/>
  <text x="95" y="438" class="label">B2 增量文件</text>
  <text x="95" y="466" class="small">changed: 1 5</text>
  <text x="95" y="489" class="tiny">最新输入目录</text>

  <rect x="385" y="145" width="310" height="340" class="out"/>
  <text x="410" y="180" class="label">为每个输出块选择来源</text>
  <text x="410" y="212" class="small">1. 先放入 B2 已有块</text>
  <text x="410" y="240" class="small">2. 缺失块向前找 B1</text>
  <text x="410" y="268" class="small">3. 再缺失则找 B0 全量</text>
  <text x="410" y="296" class="small">4. 没有来源且应存在则补零</text>
  <text x="410" y="336" class="tiny">reconstruct_from_incremental_file</text>
  <text x="410" y="360" class="tiny">make_incremental_rfile</text>
  <text x="410" y="384" class="tiny">write_reconstructed_file</text>

  <rect x="790" y="145" width="320" height="340" class="out"/>
  <text x="815" y="180" class="label">合成全量输出文件</text>

  <g transform="translate(820,230)">
    <rect x="0" y="0" width="56" height="56" class="cell0"/>
    <rect x="56" y="0" width="56" height="56" class="cell2"/>
    <rect x="112" y="0" width="56" height="56" class="cell1"/>
    <rect x="168" y="0" width="56" height="56" class="cell0"/>
    <rect x="224" y="0" width="56" height="56" class="cell1"/>
    <rect x="280" y="0" width="56" height="56" class="cell2"/>
    <text x="22" y="35" class="label">0</text>
    <text x="78" y="35" class="label">1</text>
    <text x="134" y="35" class="label">2</text>
    <text x="190" y="35" class="label">3</text>
    <text x="246" y="35" class="label">4</text>
    <text x="302" y="35" class="label">5</text>
    <text x="0" y="92" class="tiny">0,3 来自 B0；2,4 来自 B1；1,5 来自 B2</text>
  </g>

  <rect x="820" y="375" width="95" height="40" class="cell0"/>
  <text x="930" y="401" class="small">来自 B0 全量</text>
  <rect x="820" y="425" width="95" height="40" class="cell1"/>
  <text x="930" y="451" class="small">来自 B1 增量</text>
  <rect x="820" y="475" width="95" height="40" class="cell2"/>
  <text x="930" y="501" class="small">来自 B2 增量</text>
  <rect x="820" y="525" width="95" height="40" class="zero"/>
  <text x="930" y="551" class="small">必要时补零</text>

  <path d="M300 454 C345 454 350 315 385 315" class="arrow"/>
  <path d="M300 314 C345 314 350 315 385 315" class="arrow"/>
  <path d="M300 174 C345 174 350 315 385 315" class="arrow"/>
  <path d="M695 315 H790" class="arrow"/>

  <rect x="70" y="575" width="1040" height="62" fill="#f4f7f9" stroke="#c9d3dc" rx="8"/>
  <text x="95" y="602" class="small">链路校验：backup_label 的 START LSN/TLI 与 INCREMENTAL FROM LSN/TLI 必须前后接上；control file 的 system identifier 必须一致。</text>
  <text x="95" y="625" class="tiny">如果中间备份丢失，最新增量可能无法还原。</text>
</svg>
