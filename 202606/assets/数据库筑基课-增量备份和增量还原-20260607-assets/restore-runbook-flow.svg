<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="690" viewBox="0 0 1180 690" role="img">
  <title>生产恢复与校验流程</title>
  <desc>展示使用 PostgreSQL 增量备份恢复时，从停库保护、合成全量、验证、配置 WAL 恢复到开放业务的步骤。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#31536c"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #18324a; }
      .label { font: 700 17px sans-serif; fill: #1f2f3b; }
      .small { font: 15px sans-serif; fill: #314250; }
      .tiny { font: 13px sans-serif; fill: #526470; }
      .step { fill: #f8fbff; stroke: #365a7c; stroke-width: 2; rx: 8; }
      .check { fill: #eaf7ee; stroke: #2f7b43; stroke-width: 2; rx: 8; }
      .risk { fill: #fff0ef; stroke: #ad4b3f; stroke-width: 2; rx: 8; }
      .arrow { stroke: #31536c; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="690" fill="#ffffff"/>
  <text x="42" y="48" class="title">增量备份恢复不是只解压目录</text>
  <text x="42" y="78" class="small">pg_combinebackup 只负责把备份链合成为物理全量目录；随后仍按连续归档/PITR 的恢复流程推进到一致状态。</text>

  <rect x="70" y="125" width="210" height="105" class="step"/>
  <text x="95" y="158" class="label">1. 保护现场</text>
  <text x="95" y="187" class="small">停库或隔离目标目录</text>
  <text x="95" y="211" class="tiny">保存未归档 pg_wal</text>

  <rect x="340" y="125" width="210" height="105" class="step"/>
  <text x="365" y="158" class="label">2. 准备备份链</text>
  <text x="365" y="187" class="small">B0 B1 B2 分目录</text>
  <text x="365" y="211" class="tiny">从老到新排列</text>

  <rect x="610" y="125" width="210" height="105" class="check"/>
  <text x="635" y="158" class="label">3. 合成全量</text>
  <text x="635" y="187" class="small">pg_combinebackup -o</text>
  <text x="635" y="211" class="tiny">可先 --dry-run --debug</text>

  <rect x="880" y="125" width="210" height="105" class="check"/>
  <text x="905" y="158" class="label">4. 验证备份</text>
  <text x="905" y="187" class="small">pg_verifybackup</text>
  <text x="905" y="211" class="tiny">确认 manifest 与 WAL</text>

  <path d="M280 177 H340" class="arrow"/>
  <path d="M550 177 H610" class="arrow"/>
  <path d="M820 177 H880" class="arrow"/>

  <rect x="70" y="330" width="210" height="105" class="step"/>
  <text x="95" y="363" class="label">5. 放入目标 PGDATA</text>
  <text x="95" y="392" class="small">权限、表空间链接</text>
  <text x="95" y="416" class="tiny">清理旧 pg_wal 内容</text>

  <rect x="340" y="330" width="210" height="105" class="step"/>
  <text x="365" y="363" class="label">6. 配置恢复</text>
  <text x="365" y="392" class="small">restore_command</text>
  <text x="365" y="416" class="tiny">创建 recovery.signal</text>

  <rect x="610" y="330" width="210" height="105" class="step"/>
  <text x="635" y="363" class="label">7. 启动恢复</text>
  <text x="635" y="392" class="small">重放归档 WAL</text>
  <text x="635" y="416" class="tiny">可设置恢复目标</text>

  <rect x="880" y="330" width="210" height="105" class="check"/>
  <text x="905" y="363" class="label">8. 验收开放</text>
  <text x="905" y="392" class="small">检查数据和时间点</text>
  <text x="905" y="416" class="tiny">再恢复 pg_hba</text>

  <path d="M985 230 C985 285 175 285 175 330" class="arrow"/>
  <path d="M280 382 H340" class="arrow"/>
  <path d="M550 382 H610" class="arrow"/>
  <path d="M820 382 H880" class="arrow"/>

  <rect x="70" y="540" width="1020" height="80" class="risk"/>
  <text x="95" y="572" class="label">高风险动作</text>
  <text x="95" y="600" class="small">不要在输入备份目录上启动数据库；谨慎使用 pg_combinebackup --link，因为修改输出目录可能影响输入目录。</text>
  <text x="95" y="624" class="tiny">不要删除仍可能被后续增量依赖的旧全量或旧增量备份；PostgreSQL 不替你维护备份链清单。</text>
</svg>
