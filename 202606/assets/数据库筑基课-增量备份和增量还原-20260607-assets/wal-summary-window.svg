<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img">
  <title>WAL summary 覆盖窗口</title>
  <desc>展示增量备份需要 WAL summary 覆盖从前序备份 start LSN 到当前备份 start LSN 的全部区间。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d78"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #1a3040; }
      .label { font: 700 17px sans-serif; fill: #1c2f3b; }
      .small { font: 15px sans-serif; fill: #2d4050; }
      .tiny { font: 13px sans-serif; fill: #526470; }
      .axis { stroke: #253b4a; stroke-width: 3; marker-end: url(#arrow); }
      .range { fill: #e8f2fa; stroke: #2f5d78; stroke-width: 2; rx: 8; }
      .ok { fill: #eaf7ee; stroke: #2f7b43; stroke-width: 2; rx: 8; }
      .bad { fill: #fff0ed; stroke: #b14c3d; stroke-width: 2; rx: 8; }
      .warn { fill: #fff8e5; stroke: #b8881a; stroke-width: 2; rx: 8; }
      .tick { stroke: #253b4a; stroke-width: 2; }
      .dash { stroke: #8ba1ad; stroke-width: 2; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="650" fill="#ffffff"/>
  <text x="42" y="48" class="title">增量备份要求 WAL summary 覆盖完整 LSN 窗口</text>
  <text x="42" y="78" class="small">服务器在当前备份 start LSN 建立后，等待 summarizer 追到该点，然后检查 summary 文件是否无缺口覆盖历史区间。</text>

  <line x1="105" y1="190" x2="1045" y2="190" class="axis"/>
  <line x1="190" y1="170" x2="190" y2="210" class="tick"/>
  <line x1="525" y1="170" x2="525" y2="210" class="tick"/>
  <line x1="860" y1="170" x2="860" y2="210" class="tick"/>
  <text x="138" y="150" class="label">B0 start LSN</text>
  <text x="468" y="150" class="label">B0 end LSN</text>
  <text x="790" y="150" class="label">B1 start LSN</text>

  <rect x="190" y="238" width="670" height="58" class="range"/>
  <text x="220" y="274" class="label">增量 B1 需要的 summary 覆盖范围：B0 start LSN 到 B1 start LSN</text>

  <rect x="185" y="345" width="215" height="68" class="ok"/>
  <text x="205" y="374" class="label">summary A</text>
  <text x="205" y="398" class="small">覆盖早期 WAL</text>

  <rect x="400" y="345" width="230" height="68" class="ok"/>
  <text x="420" y="374" class="label">summary B</text>
  <text x="420" y="398" class="small">覆盖备份期间 WAL</text>

  <rect x="630" y="345" width="230" height="68" class="ok"/>
  <text x="650" y="374" class="label">summary C</text>
  <text x="650" y="398" class="small">覆盖 B0 后到 B1 前</text>

  <line x1="190" y1="210" x2="190" y2="510" class="dash"/>
  <line x1="860" y1="210" x2="860" y2="510" class="dash"/>

  <rect x="185" y="470" width="275" height="78" class="bad"/>
  <text x="205" y="500" class="label">缺口：没有 summary</text>
  <text x="205" y="525" class="small">WalSummariesAreComplete 返回失败</text>

  <rect x="515" y="470" width="345" height="78" class="warn"/>
  <text x="535" y="500" class="label">summarizer 落后：可等待</text>
  <text x="535" y="525" class="small">无进展约一分钟会报错</text>

  <rect x="925" y="345" width="190" height="203" fill="#f6f7f9" stroke="#c6d0d8" stroke-width="2" rx="8"/>
  <text x="945" y="378" class="label">相关配置</text>
  <text x="945" y="410" class="small">summarize_wal = on</text>
  <text x="945" y="438" class="small">wal_level != minimal</text>
  <text x="945" y="466" class="small">wal_summary_keep_time</text>
  <text x="945" y="494" class="tiny">默认 10 天</text>
  <text x="945" y="520" class="tiny">0 表示不自动删除</text>

  <text x="105" y="602" class="small">如果旧 summary 已被清理，增量备份不能靠 manifest 或 WAL 文件临时推断回来；应重新做全量备份或保留更长 summary 窗口。</text>
</svg>
