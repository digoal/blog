<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">CALL 参数分析与 OUT 参数拆分</title>
  <desc id="desc">展示 PostgreSQL 分析 CALL 时如何解析过程、展开默认参数，并把 IN、OUT、INOUT 参数分别放入执行参数和输出参数列表。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .in { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 8; }
    .out { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .both { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .label { font: 17px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="928" height="488" class="frame"/>
  <text x="48" y="58" class="label">CALL 不是把所有实参直接交给过程：OUT 参数会被拆出来，INOUT 同时参与输入和输出</text>

  <rect x="60" y="100" width="250" height="76" class="box"/>
  <text x="84" y="130" class="label">CALL p(a, b, NULL)</text>
  <text x="84" y="154" class="small">原始 FuncCall 参数列表</text>

  <rect x="380" y="92" width="230" height="92" class="box"/>
  <text x="406" y="124" class="label">ParseFuncOrColumn</text>
  <text x="406" y="150" class="small">proc_call = true</text>
  <text x="406" y="170" class="tiny">不是 procedure 则报错</text>

  <rect x="690" y="92" width="230" height="92" class="box"/>
  <text x="716" y="124" class="label">expand arguments</text>
  <text x="716" y="150" class="small">命名参数、默认值展开</text>
  <text x="716" y="170" class="tiny">读取 pg_proc.proargmodes</text>

  <path d="M 310 138 L 380 138" class="arrow"/>
  <path d="M 610 138 L 690 138" class="arrow"/>

  <rect x="94" y="280" width="180" height="82" class="in"/>
  <text x="124" y="312" class="label">IN</text>
  <text x="124" y="337" class="small">进入 fexpr.args</text>
  <text x="124" y="357" class="tiny">实参会求值</text>

  <rect x="350" y="280" width="180" height="82" class="both"/>
  <text x="380" y="312" class="label">INOUT</text>
  <text x="380" y="337" class="small">进入 fexpr.args</text>
  <text x="380" y="357" class="tiny">副本进入 outargs</text>

  <rect x="606" y="280" width="180" height="82" class="out"/>
  <text x="636" y="312" class="label">OUT</text>
  <text x="636" y="337" class="small">只进入 outargs</text>
  <text x="636" y="357" class="tiny">普通 SQL CALL 中不求值</text>

  <path d="M 792 184 L 184 280" class="dash"/>
  <path d="M 792 184 L 440 280" class="dash"/>
  <path d="M 792 184 L 696 280" class="dash"/>

  <rect x="140" y="420" width="310" height="58" class="bad"/>
  <text x="164" y="449" class="small">SELECT p(...)：如果 p 是 procedure，解析器提示“use CALL”</text>
  <text x="164" y="469" class="tiny">parse_func.c 会拒绝非 CALL 场景中的 procedure</text>

  <rect x="516" y="420" width="330" height="58" class="bad"/>
  <text x="540" y="449" class="small">CALL f(...)：如果 f 是普通函数，解析器提示“use SELECT”</text>
  <text x="540" y="469" class="tiny">CALL 只能解析到 prokind = p 的对象</text>
</svg>
