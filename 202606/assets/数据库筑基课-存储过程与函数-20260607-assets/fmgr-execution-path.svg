<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">fmgr 与语言处理器执行路径</title>
  <desc id="desc">展示函数和过程被调用时如何通过 FmgrInfo、FunctionCallInfo、语言处理器、SPI 和返回数据路径执行。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .exec { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 8; }
    .pl { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .label { font: 17px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="928" height="508" class="frame"/>
  <text x="48" y="58" class="label">fmgr 把“查目录”和“每次调用”分开：一次查出 FmgrInfo，多次用 FunctionCallInfo 调用</text>

  <rect x="60" y="96" width="190" height="86" class="box"/>
  <text x="84" y="126" class="label">表达式或 CALL</text>
  <text x="84" y="151" class="small">FuncExpr / CallStmt</text>
  <text x="84" y="170" class="tiny">参数表达式已完成类型解析</text>

  <rect x="310" y="88" width="220" height="104" class="exec"/>
  <text x="334" y="118" class="label">FmgrInfo</text>
  <text x="334" y="144" class="small">fn_addr / fn_oid / fn_nargs</text>
  <text x="334" y="164" class="small">fn_strict / fn_retset</text>
  <text x="334" y="184" class="tiny">fn_extra 可缓存语言层计划</text>

  <rect x="600" y="88" width="260" height="104" class="exec"/>
  <text x="624" y="118" class="label">FunctionCallInfo</text>
  <text x="624" y="144" class="small">flinfo / context / resultinfo</text>
  <text x="624" y="164" class="small">fncollation / args[] / isnull</text>
  <text x="624" y="184" class="tiny">过程的 context 是 CallContext</text>

  <path d="M 250 139 L 310 139" class="arrow"/>
  <path d="M 530 139 L 600 139" class="arrow"/>

  <rect x="104" y="292" width="200" height="92" class="box"/>
  <text x="128" y="322" class="label">C/internal 函数</text>
  <text x="128" y="348" class="small">直接调用 fn_addr</text>
  <text x="128" y="368" class="tiny">PG_FUNCTION_ARGS</text>

  <rect x="390" y="292" width="200" height="92" class="pl"/>
  <text x="414" y="322" class="label">SQL / PL 语言</text>
  <text x="414" y="348" class="small">调用语言 handler</text>
  <text x="414" y="368" class="tiny">读取 prosrc 或 prosqlbody</text>

  <rect x="676" y="292" width="200" height="92" class="warn"/>
  <text x="700" y="322" class="label">PL/pgSQL + SPI</text>
  <text x="700" y="348" class="small">编译执行树、缓存计划</text>
  <text x="700" y="368" class="tiny">CALL/DO 可请求非原子执行</text>

  <path d="M 730 192 L 204 292" class="dash"/>
  <path d="M 730 192 L 490 292" class="dash"/>
  <path d="M 730 192 L 776 292" class="dash"/>

  <rect x="164" y="448" width="290" height="58" class="box"/>
  <text x="188" y="477" class="small">普通函数：返回 Datum 或通过 resultinfo 返回集合/复合结果</text>
  <text x="188" y="497" class="tiny">STRICT 时调用方可在 NULL 输入下跳过实际执行</text>

  <rect x="530" y="448" width="330" height="58" class="box"/>
  <text x="554" y="477" class="small">过程：ExecuteCallStmt 负责发送 OUT/INOUT 结果行</text>
  <text x="554" y="497" class="tiny">有 RECORD 结果时通过 DestReceiver 返回给客户端</text>
</svg>
