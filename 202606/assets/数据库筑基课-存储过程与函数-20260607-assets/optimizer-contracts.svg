<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">函数声明属性对优化器和安全边界的影响</title>
  <desc id="desc">展示 volatility、strict、parallel、cost、rows、leakproof、security definer 等函数属性如何影响执行计划和安全边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .opt { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 8; }
    .safe { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .label { font: 17px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="928" height="508" class="frame"/>
  <text x="48" y="58" class="label">函数属性是给优化器、执行器和安全系统的契约；标错会带来错误结果或泄露风险</text>

  <rect x="70" y="100" width="250" height="98" class="opt"/>
  <text x="94" y="130" class="label">VOLATILE / STABLE / IMMUTABLE</text>
  <text x="94" y="156" class="small">决定能否常量折叠、索引条件复用</text>
  <text x="94" y="176" class="tiny">也影响函数内部 SELECT 的快照</text>

  <rect x="370" y="100" width="220" height="98" class="safe"/>
  <text x="394" y="130" class="label">STRICT</text>
  <text x="394" y="156" class="small">NULL 输入直接返回 NULL</text>
  <text x="394" y="176" class="tiny">调用方可跳过实际执行</text>

  <rect x="640" y="100" width="250" height="98" class="opt"/>
  <text x="664" y="130" class="label">PARALLEL SAFE / RESTRICTED</text>
  <text x="664" y="156" class="small">决定并行计划能否包含函数</text>
  <text x="664" y="176" class="tiny">状态修改函数应为 UNSAFE</text>

  <rect x="70" y="286" width="250" height="98" class="risk"/>
  <text x="94" y="316" class="label">COST / ROWS</text>
  <text x="94" y="342" class="small">影响函数调用次数和连接顺序</text>
  <text x="94" y="362" class="tiny">集合返回函数默认估算可能偏差大</text>

  <rect x="370" y="286" width="220" height="98" class="bad"/>
  <text x="394" y="316" class="label">LEAKPROOF</text>
  <text x="394" y="342" class="small">影响 RLS 与 security barrier 顺序</text>
  <text x="394" y="362" class="tiny">只有超级用户可设置</text>

  <rect x="640" y="286" width="250" height="98" class="bad"/>
  <text x="664" y="316" class="label">SECURITY DEFINER</text>
  <text x="664" y="342" class="small">用 owner 权限执行</text>
  <text x="664" y="362" class="tiny">必须固定安全 search_path</text>

  <rect x="240" y="448" width="500" height="54" class="box"/>
  <text x="264" y="477" class="small">实际计划与安全顺序 = SQL 语义 + pg_proc 属性 + 语言处理器 + 当前权限和 GUC</text>
  <text x="264" y="497" class="tiny">不要把属性当注释，它们会改变优化器和执行器行为</text>
</svg>
