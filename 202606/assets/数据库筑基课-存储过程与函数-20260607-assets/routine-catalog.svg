<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL routine 从 SQL 定义到 pg_proc</title>
  <desc id="desc">展示 CREATE FUNCTION、CREATE PROCEDURE 如何进入 pg_proc，并由 prokind 区分函数、过程、聚合和窗口函数。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .sql { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 8; }
    .cat { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .label { font: 17px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="928" height="488" class="frame"/>
  <text x="48" y="58" class="label">函数和过程在 PostgreSQL 内部同属 routine，核心元数据都落在 pg_proc</text>

  <rect x="58" y="94" width="205" height="86" class="sql"/>
  <text x="82" y="124" class="label">CREATE FUNCTION</text>
  <text x="82" y="149" class="small">有 RETURNS 或 OUT 参数</text>
  <text x="82" y="168" class="tiny">可出现在 SELECT、WHERE、DML 表达式</text>

  <rect x="58" y="216" width="205" height="86" class="sql"/>
  <text x="82" y="246" class="label">CREATE PROCEDURE</text>
  <text x="82" y="271" class="small">无 RETURNS，可有 OUT/INOUT</text>
  <text x="82" y="290" class="tiny">只能用 CALL 独立调用</text>

  <rect x="328" y="136" width="210" height="126" class="box"/>
  <text x="352" y="166" class="label">CreateFunctionStmt</text>
  <text x="352" y="193" class="small">is_procedure = false/true</text>
  <text x="352" y="214" class="small">parameters / options</text>
  <text x="352" y="235" class="small">returnType / sql_body</text>

  <rect x="612" y="84" width="250" height="226" class="cat"/>
  <text x="636" y="114" class="label">pg_proc</text>
  <text x="636" y="145" class="small">proname / pronamespace / proowner</text>
  <text x="636" y="166" class="small">prolang / prosrc / prosqlbody</text>
  <text x="636" y="187" class="small">proargtypes / proallargtypes</text>
  <text x="636" y="208" class="small">proargmodes / proargnames</text>
  <text x="636" y="229" class="small">provolatile / proparallel</text>
  <text x="636" y="250" class="small">procost / prorows / prosupport</text>
  <text x="636" y="271" class="small">prosecdef / proleakproof / proisstrict</text>
  <text x="636" y="292" class="small">prokind: f / p / a / w</text>

  <path d="M 263 137 L 328 181" class="arrow"/>
  <path d="M 263 259 L 328 219" class="arrow"/>
  <path d="M 538 199 L 612 199" class="arrow"/>

  <rect x="94" y="380" width="168" height="58" class="box"/>
  <text x="122" y="410" class="label">f</text>
  <text x="150" y="410" class="small">普通函数</text>
  <text x="122" y="430" class="tiny">表达式求值，可被优化器考虑</text>

  <rect x="302" y="380" width="168" height="58" class="warn"/>
  <text x="330" y="410" class="label">p</text>
  <text x="358" y="410" class="small">过程</text>
  <text x="330" y="430" class="tiny">CALL，可能是非原子上下文</text>

  <rect x="510" y="380" width="168" height="58" class="box"/>
  <text x="538" y="410" class="label">a</text>
  <text x="566" y="410" class="small">聚合函数</text>
  <text x="538" y="430" class="tiny">配套 pg_aggregate 行</text>

  <rect x="718" y="380" width="168" height="58" class="box"/>
  <text x="746" y="410" class="label">w</text>
  <text x="774" y="410" class="small">窗口函数</text>
  <text x="746" y="430" class="tiny">窗口上下文调用</text>

  <path d="M 737 310 L 178 380" class="dash"/>
  <path d="M 737 310 L 386 380" class="dash"/>
  <path d="M 737 310 L 594 380" class="dash"/>
  <path d="M 737 310 L 802 380" class="dash"/>
</svg>
