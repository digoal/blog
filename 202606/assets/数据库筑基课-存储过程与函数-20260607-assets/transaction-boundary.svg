<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">过程事务控制边界</title>
  <desc id="desc">展示 PostgreSQL 中 procedure 何时能执行 COMMIT 或 ROLLBACK，以及哪些调用路径会把上下文变成 atomic。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .ok { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; rx: 8; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
    .label { font: 17px sans-serif; fill: #0f172a; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="24" width="928" height="508" class="frame"/>
  <text x="48" y="58" class="label">Procedure 能不能 COMMIT，不看名字，看 CALL 所在执行上下文是不是 non-atomic</text>

  <rect x="62" y="100" width="214" height="78" class="ok"/>
  <text x="86" y="130" class="label">顶层 CALL p()</text>
  <text x="86" y="154" class="small">atomic = false</text>
  <text x="86" y="172" class="tiny">可允许事务结束命令</text>

  <rect x="348" y="100" width="214" height="78" class="ok"/>
  <text x="372" y="130" class="label">CALL p1 -> CALL p2</text>
  <text x="372" y="154" class="small">传递 non-atomic</text>
  <text x="372" y="172" class="tiny">嵌套过程仍可控制事务</text>

  <rect x="634" y="100" width="214" height="78" class="bad"/>
  <text x="658" y="130" class="label">CALL -> SELECT -> CALL</text>
  <text x="658" y="154" class="small">SELECT 建立 atomic</text>
  <text x="658" y="172" class="tiny">内层过程不能 COMMIT</text>

  <path d="M 276 139 L 348 139" class="arrow"/>
  <path d="M 562 139 L 634 139" class="arrow"/>

  <rect x="70" y="274" width="200" height="82" class="bad"/>
  <text x="94" y="304" class="label">显式事务块</text>
  <text x="94" y="329" class="small">BEGIN; CALL p();</text>
  <text x="94" y="348" class="tiny">CALL 不能结束外层事务</text>

  <rect x="350" y="274" width="200" height="82" class="bad"/>
  <text x="374" y="304" class="label">SECURITY DEFINER</text>
  <text x="374" y="329" class="small">prosecdef = true</text>
  <text x="374" y="348" class="tiny">安全上下文不允许跨事务</text>

  <rect x="630" y="274" width="200" height="82" class="bad"/>
  <text x="654" y="304" class="label">过程级 SET</text>
  <text x="654" y="329" class="small">pg_proc.proconfig 非空</text>
  <text x="654" y="348" class="tiny">GUC 栈无法跨事务保留</text>

  <rect x="174" y="432" width="320" height="62" class="warn"/>
  <text x="198" y="461" class="small">PL/pgSQL 执行 COMMIT/ROLLBACK 后会重建 simple-expression 运行环境</text>
  <text x="198" y="481" class="tiny">pl_exec.c 的 exec_stmt_commit / exec_stmt_rollback</text>

  <rect x="562" y="432" width="320" height="62" class="warn"/>
  <text x="586" y="461" class="small">SPI 的非原子上下文使用 PortalContext，使过程内数据可跨事务边界存活</text>
  <text x="586" y="481" class="tiny">SPI_connect_ext(SPI_OPT_NONATOMIC)</text>

  <path d="M 169 178 L 170 274" class="dash"/>
  <path d="M 455 178 L 450 274" class="dash"/>
  <path d="M 741 178 L 730 274" class="dash"/>
</svg>
