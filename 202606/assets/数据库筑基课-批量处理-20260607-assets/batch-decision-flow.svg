<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">批量处理方案选择流程</title>
  <desc id="desc">从业务目标出发选择 COPY、staging upsert、分批 UPDATE/DELETE、TRUNCATE 或分区替换，并加入验证和回滚边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .start { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
    .decision { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    .action { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .danger { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 16px sans-serif; fill: #111827; }
    .small { font: 13px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1120" height="760"/>
  <text x="40" y="48" class="title">批量处理方案选择：先选正确原语，再调批量大小</text>

  <rect x="430" y="82" width="260" height="64" rx="8" class="start"/>
  <text x="474" y="119" class="label">要处理大量行</text>

  <rect x="405" y="190" width="310" height="80" rx="8" class="decision"/>
  <text x="444" y="222" class="label">目标是新增装载吗？</text>
  <text x="444" y="248" class="small">初始导入、ETL 落地、重建表</text>
  <path class="line" d="M560 146 L560 188"/>

  <rect x="80" y="320" width="280" height="96" rx="8" class="action"/>
  <text x="112" y="354" class="label">是：优先 COPY 到 staging</text>
  <text x="112" y="380" class="small">新表可先 COPY 后建索引/外键</text>
  <text x="112" y="404" class="small">必要时 COPY FREEZE，随后 ANALYZE</text>

  <rect x="420" y="320" width="280" height="96" rx="8" class="action"/>
  <text x="452" y="354" class="label">不是新增：是否要合并？</text>
  <text x="452" y="380" class="small">去重、校验、再 INSERT ... SELECT</text>
  <text x="452" y="404" class="small">ON CONFLICT 处理幂等写入</text>

  <rect x="760" y="320" width="280" height="96" rx="8" class="warn"/>
  <text x="792" y="354" class="label">是否能按分区替换？</text>
  <text x="792" y="380" class="small">整天/整月数据重算</text>
  <text x="792" y="404" class="small">优先分区 detach/drop/truncate</text>

  <path class="line" d="M405 230 C250 230 220 270 220 318"/>
  <path class="line" d="M560 270 L560 318"/>
  <path class="line" d="M715 230 C870 230 900 270 900 318"/>

  <rect x="80" y="485" width="280" height="104" rx="8" class="warn"/>
  <text x="112" y="520" class="label">约束/触发器很重？</text>
  <text x="112" y="548" class="small">能接受窗口：加载后建索引/外键</text>
  <text x="112" y="572" class="small">不能接受：拆小事务，监控队列和内存</text>

  <rect x="420" y="485" width="280" height="104" rx="8" class="warn"/>
  <text x="452" y="520" class="label">需要 UPDATE / DELETE？</text>
  <text x="452" y="548" class="small">按主键/时间/ctid 当前语句分批</text>
  <text x="452" y="572" class="small">每批提交后观察 dead tuples 和 WAL</text>

  <rect x="760" y="485" width="280" height="104" rx="8" class="danger"/>
  <text x="792" y="520" class="label">别忽略运维边界</text>
  <text x="792" y="548" class="small">锁、复制延迟、autovacuum、回滚耗时</text>
  <text x="792" y="572" class="small">失败 COPY 后 VACUUM，完成后 ANALYZE</text>

  <path class="line" d="M220 416 L220 483"/>
  <path class="line" d="M560 416 L560 483"/>
  <path class="line" d="M900 416 L900 483"/>

  <rect x="245" y="650" width="630" height="64" rx="8" class="start"/>
  <text x="296" y="676" class="label">验证闭环：EXPLAIN、pg_stat_progress_copy、WAL 差值、锁等待、复制延迟、n_dead_tup</text>
  <text x="296" y="700" class="small">批量大小由观测结果决定，而不是固定经验值</text>
  <path class="line" d="M220 589 C220 625 300 650 360 650"/>
  <path class="line" d="M560 589 L560 648"/>
  <path class="line" d="M900 589 C900 625 820 650 760 650"/>
</svg>
