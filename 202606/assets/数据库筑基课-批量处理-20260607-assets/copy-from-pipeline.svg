<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">COPY FROM 到 heap 多行插入的执行管线</title>
  <desc id="desc">展示 COPY FROM 解析输入、过滤、分区路由、缓冲、table_multi_insert、索引维护和触发器的主要路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
    .exec { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
    .side { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 16px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1120" height="680"/>
  <text x="40" y="46" class="title">COPY FROM：快在专用管线，但不会绕过正确性检查</text>

  <rect x="40" y="86" width="170" height="82" rx="8" class="input"/>
  <text x="68" y="121" class="label">文件 / STDIN</text>
  <text x="68" y="148" class="small">text / csv / binary</text>

  <rect x="260" y="86" width="180" height="82" rx="8" class="exec"/>
  <text x="292" y="116" class="label">NextCopyFrom</text>
  <text x="286" y="142" class="small">解析、类型输入函数</text>
  <text x="286" y="162" class="tiny">DEFAULT / ON_ERROR / ENCODING</text>

  <rect x="490" y="86" width="180" height="82" rx="8" class="exec"/>
  <text x="520" y="116" class="label">过滤与路由</text>
  <text x="516" y="142" class="small">WHERE、分区定位</text>
  <text x="516" y="162" class="tiny">生成列、CHECK、NOT NULL</text>

  <rect x="720" y="86" width="190" height="82" rx="8" class="exec"/>
  <text x="750" y="116" class="label">CopyMultiInsert</text>
  <text x="744" y="142" class="small">每表缓冲 slots</text>
  <text x="744" y="162" class="tiny">1000 行或 65535 字节触发 flush</text>

  <rect x="950" y="86" width="130" height="82" rx="8" class="exec"/>
  <text x="974" y="116" class="label">进度统计</text>
  <text x="972" y="142" class="small">processed</text>
  <text x="972" y="162" class="tiny">skipped / excluded</text>

  <path class="line" d="M210 127 L258 127"/>
  <path class="line" d="M440 127 L488 127"/>
  <path class="line" d="M670 127 L718 127"/>
  <path class="line" d="M910 127 L948 127"/>

  <rect x="155" y="250" width="210" height="86" rx="8" class="exec"/>
  <text x="190" y="282" class="label">table_multi_insert</text>
  <text x="183" y="308" class="small">Table AM 批量插入入口</text>
  <text x="183" y="328" class="tiny">降低 WAL 和页锁成本</text>

  <rect x="455" y="250" width="210" height="86" rx="8" class="exec"/>
  <text x="496" y="282" class="label">heap_multi_insert</text>
  <text x="484" y="308" class="small">一页放多行，少锁页</text>
  <text x="484" y="328" class="tiny">同页多 tuple 可共享 WAL 记录</text>

  <rect x="755" y="250" width="210" height="86" rx="8" class="warn"/>
  <text x="796" y="282" class="label">索引与触发器</text>
  <text x="784" y="308" class="small">ExecInsertIndexTuples</text>
  <text x="784" y="328" class="tiny">AFTER ROW / transition table</text>

  <path class="line" d="M815 168 C815 205 260 205 260 248"/>
  <path class="line" d="M365 293 L453 293"/>
  <path class="line" d="M665 293 L753 293"/>

  <rect x="75" y="430" width="970" height="158" rx="8" class="side"/>
  <text x="108" y="465" class="label">会退回单行路径或限制优化的常见条件</text>
  <text x="108" y="498" class="small">BEFORE / INSTEAD OF INSERT 行级触发器：触发器可能查询目标表，必须保证已处理行可见。</text>
  <text x="108" y="526" class="small">volatile 默认值或 volatile COPY WHERE：表达式可能依赖目标表状态，不能延迟批量写入。</text>
  <text x="108" y="554" class="small">FDW 不支持批量插入、某些分区触发器、COPY FREEZE 的分区表/外部表限制。</text>
  <text x="108" y="582" class="small">COPY FROM 会触发目标表触发器和 CHECK 约束；失败到中途的不可见行仍占空间，需要 VACUUM。</text>

  <path class="line" d="M560 336 L560 428"/>
</svg>
