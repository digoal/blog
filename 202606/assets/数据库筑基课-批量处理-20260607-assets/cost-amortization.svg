<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">批量处理的成本摊薄模型</title>
  <desc id="desc">展示逐行处理和批量处理在解析规划、网络往返、事务提交、页锁、WAL、索引和触发器成本上的差异。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .header { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 18px sans-serif; fill: #111827; }
    .small { font: 15px sans-serif; fill: #374151; }
    .tiny { font: 13px sans-serif; fill: #475569; }
    .fixed { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .rowcost { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .risk { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .note { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .line { stroke: #374151; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" width="1040" height="620"/>
  <text x="40" y="48" class="header">批量处理不是“少写几条 SQL”，而是摊薄固定成本、控制逐行成本</text>

  <rect x="40" y="86" width="450" height="430" rx="8" class="panel"/>
  <text x="70" y="126" class="label">逐行处理：每行都付一遍固定成本</text>
  <g transform="translate(70,156)">
    <rect x="0" y="0" width="360" height="54" rx="6" class="fixed"/>
    <text x="16" y="33" class="small">解析/规划 + 网络往返 + 提交刷 WAL</text>
    <rect x="0" y="76" width="360" height="54" rx="6" class="rowcost"/>
    <text x="16" y="109" class="small">页查找/页锁 + heap 写入 + 索引维护</text>
    <rect x="0" y="152" width="360" height="54" rx="6" class="risk"/>
    <text x="16" y="185" class="small">触发器/约束/错误处理逐行放大</text>
    <path class="line" d="M180 224 L180 270"/>
    <rect x="35" y="286" width="290" height="82" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="62" y="318" class="small">吞吐被固定成本压住</text>
    <text x="62" y="344" class="small">失败点多，事务边界碎片化</text>
  </g>

  <rect x="550" y="86" width="450" height="430" rx="8" class="panel"/>
  <text x="580" y="126" class="label">批量处理：固定成本一次付，逐行成本仍要算</text>
  <g transform="translate(580,156)">
    <rect x="0" y="0" width="360" height="54" rx="6" class="fixed"/>
    <text x="16" y="33" class="small">一次解析/规划、一次 COPY/INSERT、少量提交</text>
    <path class="line" d="M180 62 L180 94"/>
    <rect x="0" y="104" width="360" height="72" rx="6" class="rowcost"/>
    <text x="16" y="134" class="small">多行共享缓冲、页锁、WAL 记录</text>
    <text x="16" y="158" class="tiny">但索引、唯一检查、触发器仍可能逐行发生</text>
    <path class="line" d="M180 188 L180 226"/>
    <rect x="0" y="240" width="360" height="104" rx="6" class="note"/>
    <text x="16" y="272" class="small">最佳批量大小 = 吞吐、锁时间、WAL 峰值、</text>
    <text x="16" y="298" class="small">复制延迟、失败回滚和 VACUUM 边界的折中</text>
    <text x="16" y="324" class="tiny">不是越大越好，也不是越小越安全</text>
  </g>

  <path class="line" d="M490 300 L548 300"/>
  <text x="472" y="286" class="small">改造目标</text>
  <rect x="180" y="548" width="680" height="46" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="205" y="578" class="small">把“单行正确”升级为“多行正确 + 可恢复 + 可观测 + 不拖垮实例”</text>
</svg>
