<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">heap_multi_insert 的页面、锁与 WAL 成本</title>
  <desc id="desc">对比单行 heap_insert 循环与 heap_multi_insert 在页面锁、WAL 记录和 BulkInsertState 上的成本差异。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 17px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .page { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
    .tuple { fill: #bfdbfe; stroke: #1d4ed8; stroke-width: 1.5; }
    .wal { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .lock { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .bad { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1120" height="640"/>
  <text x="40" y="48" class="title">heap_multi_insert：把同一页上的多行尽量合并成更少的页锁和 WAL 记录</text>

  <rect x="40" y="90" width="500" height="455" rx="8" class="panel"/>
  <text x="74" y="130" class="label">逐行 heap_insert 循环</text>
  <g transform="translate(85,165)">
    <rect x="0" y="0" width="150" height="190" rx="6" class="page"/>
    <text x="38" y="28" class="small">Heap Page</text>
    <rect x="25" y="52" width="100" height="26" rx="4" class="tuple"/>
    <rect x="25" y="88" width="100" height="26" rx="4" class="tuple"/>
    <rect x="25" y="124" width="100" height="26" rx="4" class="tuple"/>
    <rect x="25" y="160" width="100" height="18" rx="4" fill="#e5e7eb" stroke="#94a3b8"/>
    <rect x="210" y="4" width="190" height="42" rx="6" class="lock"/>
    <text x="230" y="31" class="small">锁页 / 解锁页</text>
    <rect x="210" y="64" width="190" height="42" rx="6" class="wal"/>
    <text x="226" y="91" class="small">XLOG_HEAP_INSERT</text>
    <rect x="210" y="124" width="190" height="42" rx="6" class="lock"/>
    <text x="230" y="151" class="small">再次锁页 / 解锁页</text>
    <rect x="210" y="184" width="190" height="42" rx="6" class="wal"/>
    <text x="226" y="211" class="small">再次写 WAL</text>
    <path class="line" d="M155 72 L208 25"/>
    <path class="line" d="M155 104 L208 85"/>
    <path class="line" d="M155 138 L208 145"/>
  </g>
  <rect x="82" y="410" width="410" height="74" rx="6" class="bad"/>
  <text x="104" y="440" class="small">每行都要重复页定位、页锁和 WAL 组织。</text>
  <text x="104" y="466" class="small">索引和触发器成本不会因为写法“看起来批量”自动消失。</text>

  <rect x="580" y="90" width="500" height="455" rx="8" class="panel"/>
  <text x="614" y="130" class="label">COPY / table_multi_insert / heap_multi_insert</text>
  <g transform="translate(625,165)">
    <rect x="0" y="0" width="170" height="210" rx="6" class="page"/>
    <text x="47" y="28" class="small">Heap Page</text>
    <rect x="25" y="54" width="120" height="24" rx="4" class="tuple"/>
    <text x="60" y="71" class="tiny">tuple 1</text>
    <rect x="25" y="86" width="120" height="24" rx="4" class="tuple"/>
    <text x="60" y="103" class="tiny">tuple 2</text>
    <rect x="25" y="118" width="120" height="24" rx="4" class="tuple"/>
    <text x="60" y="135" class="tiny">tuple 3</text>
    <rect x="25" y="150" width="120" height="24" rx="4" class="tuple"/>
    <text x="60" y="167" class="tiny">tuple 4</text>
    <rect x="220" y="16" width="190" height="52" rx="6" class="lock"/>
    <text x="252" y="39" class="small">一次锁页</text>
    <text x="244" y="58" class="tiny">放入本页能容纳的多行</text>
    <rect x="220" y="96" width="190" height="52" rx="6" class="wal"/>
    <text x="238" y="119" class="small">XLOG_HEAP2_MULTI_INSERT</text>
    <text x="246" y="138" class="tiny">同页多行共享记录</text>
    <rect x="220" y="176" width="190" height="52" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="245" y="199" class="small">BulkInsertState</text>
    <text x="244" y="218" class="tiny">BAS_BULKWRITE + current_buf</text>
    <path class="line" d="M174 98 L218 42"/>
    <path class="line" d="M174 120 L218 122"/>
    <path class="line" d="M174 150 L218 202"/>
  </g>
  <rect x="622" y="410" width="410" height="74" rx="6" class="wal"/>
  <text x="644" y="440" class="small">节省的是 heap 页写入的固定开销。</text>
  <text x="644" y="466" class="small">如果有多个索引、唯一冲突或复杂触发器，整体瓶颈可能转移。</text>
</svg>
