<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">批量 UPDATE 和 DELETE 的 MVCC 后果</title>
  <desc id="desc">展示批量更新和删除如何产生旧行版本、索引维护、WAL、VACUUM 压力以及长事务带来的清理边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .old { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .new { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .idx { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
    .vac { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .title { font: 700 24px sans-serif; fill: #0f172a; }
    .label { font: 600 17px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #334155; }
    .tiny { font: 12px sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1120" height="680"/>
  <text x="40" y="48" class="title">批量 UPDATE / DELETE：真正的成本常在“旧版本清理”和“索引维护”</text>

  <rect x="60" y="100" width="270" height="125" rx="8" class="box"/>
  <text x="92" y="136" class="label">旧行版本</text>
  <rect x="92" y="158" width="190" height="36" rx="5" class="old"/>
  <text x="116" y="182" class="small">xmin = A, xmax = B</text>

  <rect x="425" y="100" width="270" height="125" rx="8" class="box"/>
  <text x="456" y="136" class="label">UPDATE 生成新版本</text>
  <rect x="456" y="158" width="190" height="36" rx="5" class="new"/>
  <text x="480" y="182" class="small">xmin = B, xmax = 空</text>

  <rect x="790" y="100" width="270" height="125" rx="8" class="box"/>
  <text x="822" y="136" class="label">DELETE 标记死亡</text>
  <rect x="822" y="158" width="190" height="36" rx="5" class="old"/>
  <text x="848" y="182" class="small">只写 xmax，不立即释放</text>

  <path class="line" d="M330 162 L423 162"/>
  <path class="line" d="M695 162 L788 162"/>

  <rect x="110" y="300" width="230" height="92" rx="8" class="idx"/>
  <text x="140" y="334" class="label">索引维护</text>
  <text x="136" y="360" class="small">非 HOT 更新要写索引</text>
  <text x="136" y="382" class="tiny">唯一/排他约束同时检查</text>

  <rect x="445" y="300" width="230" height="92" rx="8" class="vac"/>
  <text x="476" y="334" class="label">VACUUM 回收</text>
  <text x="470" y="360" class="small">清理死元组和索引垃圾</text>
  <text x="470" y="382" class="tiny">更新 visibility map 和统计</text>

  <rect x="780" y="300" width="250" height="92" rx="8" class="old"/>
  <text x="810" y="334" class="label">长事务固定边界</text>
  <text x="806" y="360" class="small">旧快照仍可能看到旧版本</text>
  <text x="806" y="382" class="tiny">清理被推迟，膨胀累积</text>

  <path class="line" d="M560 226 L560 298"/>
  <path class="line" d="M925 226 L925 298"/>
  <path class="dash" d="M340 346 L443 346"/>
  <path class="dash" d="M675 346 L778 346"/>

  <rect x="105" y="485" width="910" height="108" rx="8" class="box"/>
  <text x="136" y="520" class="label">批量修改的工程结论</text>
  <text x="136" y="550" class="small">1. 大事务减少提交开销，但会放大锁时间、WAL 峰值、失败回滚、复制延迟和 VACUUM 滞后。</text>
  <text x="136" y="578" class="small">2. 触碰索引列会增加索引写放大；更新分区键可能变成 DELETE + INSERT。</text>
  <text x="136" y="606" class="small">3. 可按主键/时间/分区切小批提交，或用分区替换、CTAS、TRUNCATE 代替逐行删除。</text>
</svg>
