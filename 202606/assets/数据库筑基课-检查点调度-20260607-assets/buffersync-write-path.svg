<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">BufferSync 写脏页路径</title>
  <desc id="desc">展示 checkpoint 开始时标记需要写出的脏 buffer、按表空间排序和平衡写入，并在每个页面写出后调用节流函数。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .stage { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 9; }
    .pool { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; rx: 8; }
    .dirty { fill: #fee2e2; stroke: #dc2626; }
    .clean { fill: #dcfce7; stroke: #16a34a; }
    .needed { fill: #fef3c7; stroke: #d97706; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="20" y="20" width="1000" height="580" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="48" y="62" class="title">BufferSync：只写 checkpoint 开始时已脏的共享缓冲页</text>

  <rect x="56" y="110" width="228" height="170" class="pool"/>
  <text x="78" y="142" class="txt">shared_buffers 扫描</text>
  <rect x="82" y="164" width="38" height="34" class="clean"/>
  <rect x="130" y="164" width="38" height="34" class="dirty"/>
  <rect x="178" y="164" width="38" height="34" class="dirty"/>
  <rect x="226" y="164" width="38" height="34" class="clean"/>
  <rect x="82" y="210" width="38" height="34" class="dirty"/>
  <rect x="130" y="210" width="38" height="34" class="clean"/>
  <rect x="178" y="210" width="38" height="34" class="dirty"/>
  <rect x="226" y="210" width="38" height="34" class="dirty"/>
  <text x="78" y="266" class="small">BM_DIRTY 且 permanent</text>

  <rect x="378" y="110" width="250" height="170" class="stage"/>
  <text x="400" y="142" class="txt">打标并收集</text>
  <text x="400" y="172" class="small">设置 BM_CHECKPOINT_NEEDED</text>
  <text x="400" y="196" class="small">记录 tablespace、rel、fork、block</text>
  <text x="400" y="220" class="small">之后新变脏的页不属于本轮</text>

  <rect x="732" y="110" width="250" height="170" class="stage"/>
  <text x="754" y="142" class="txt">排序和平衡</text>
  <text x="754" y="172" class="small">sort_checkpoint_bufferids()</text>
  <text x="754" y="196" class="small">按 tablespace 建进度堆</text>
  <text x="754" y="220" class="small">避免一个表空间被连续打满</text>

  <rect x="130" y="370" width="250" height="134" class="stage"/>
  <text x="152" y="402" class="txt">SyncOneBuffer()</text>
  <text x="152" y="432" class="small">仍有 BM_CHECKPOINT_NEEDED 才写</text>
  <text x="152" y="456" class="small">写出数据页前遵守 WAL 先行</text>
  <text x="152" y="480" class="small">写后清理 dirty/checkpoint 标志</text>

  <rect x="482" y="370" width="250" height="134" class="stage"/>
  <text x="504" y="402" class="txt">CheckpointWriteDelay()</text>
  <text x="504" y="432" class="small">按进度判断睡眠或追赶</text>
  <text x="504" y="456" class="small">期间吸收 fsync 请求</text>
  <text x="504" y="480" class="small">处理配置 reload 和归档超时</text>

  <rect x="802" y="370" width="164" height="134" class="stage"/>
  <text x="824" y="402" class="txt">writeback</text>
  <text x="824" y="432" class="small">checkpoint_flush_after</text>
  <text x="824" y="456" class="small">减少末尾 fsync 抖动</text>

  <path d="M 284 195 L 378 195" class="line"/>
  <path d="M 628 195 L 732 195" class="line"/>
  <path d="M 857 280 C 820 330 715 358 607 370" class="line"/>
  <path d="M 482 437 L 380 437" class="line"/>
  <path d="M 732 437 L 802 437" class="line"/>

  <rect x="420" y="528" width="420" height="42" class="needed"/>
  <text x="442" y="554" class="small">核心边界：checkpoint 不追逐本轮开始后新产生的所有脏页，否则可能永远结束不了。</text>
</svg>
