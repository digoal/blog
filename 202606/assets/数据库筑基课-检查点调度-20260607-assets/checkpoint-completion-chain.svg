<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" role="img" aria-labelledby="title desc">
  <title id="title">检查点完成链路</title>
  <desc id="desc">展示 PostgreSQL 在线检查点从 redo 记录、刷脏页、fsync、checkpoint 记录、control file 更新到 WAL 回收的顺序。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .step { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .wal { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
    .disk { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
    .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 15.5px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="20" y="20" width="1020" height="560" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="48" y="62" class="title">在线检查点完成顺序：先确定 redo，再完成持久化闭环</text>

  <rect x="54" y="118" width="172" height="96" class="wal"/>
  <text x="76" y="150" class="txt">写 REDO 记录</text>
  <text x="76" y="176" class="small">XLOG_CHECKPOINT_REDO</text>
  <text x="76" y="196" class="small">redo 指针前移</text>

  <rect x="276" y="118" width="172" height="96" class="step"/>
  <text x="298" y="150" class="txt">等待关键区间</text>
  <text x="298" y="176" class="small">commit critical section</text>
  <text x="298" y="196" class="small">避免跨 checkpoint 撕裂</text>

  <rect x="498" y="118" width="172" height="96" class="disk"/>
  <text x="520" y="150" class="txt">CheckPointGuts</text>
  <text x="520" y="176" class="small">CLOG / SLRU / buffers</text>
  <text x="520" y="196" class="small">ProcessSyncRequests</text>

  <rect x="720" y="118" width="172" height="96" class="wal"/>
  <text x="742" y="150" class="txt">写完成记录</text>
  <text x="742" y="176" class="small">XLOG_CHECKPOINT_ONLINE</text>
  <text x="742" y="196" class="small">XLogFlush(recptr)</text>

  <rect x="276" y="322" width="172" height="96" class="disk"/>
  <text x="298" y="354" class="txt">更新 control file</text>
  <text x="298" y="380" class="small">checkPoint</text>
  <text x="298" y="400" class="small">checkPointCopy.redo</text>

  <rect x="498" y="322" width="172" height="96" class="step"/>
  <text x="520" y="354" class="txt">后处理</text>
  <text x="520" y="380" class="small">SyncPostCheckpoint</text>
  <text x="520" y="400" class="small">更新 WAL 距离估计</text>

  <rect x="720" y="322" width="172" height="96" class="risk"/>
  <text x="742" y="354" class="txt">WAL 回收/预分配</text>
  <text x="742" y="380" class="small">RemoveOldXlogFiles</text>
  <text x="742" y="400" class="small">PreallocXlogFiles</text>

  <path d="M 226 166 L 276 166" class="line"/>
  <path d="M 448 166 L 498 166" class="line"/>
  <path d="M 670 166 L 720 166" class="line"/>
  <path d="M 806 214 C 806 270 422 270 362 322" class="line"/>
  <path d="M 448 370 L 498 370" class="line"/>
  <path d="M 670 370 L 720 370" class="line"/>

  <rect x="90" y="478" width="842" height="52" class="step"/>
  <text x="112" y="508" class="small">恢复含义：崩溃后从 control file 指向的 checkpoint 记录找到 redo LSN，redo 之前的数据修改应已在数据文件中。</text>
</svg>
