<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">检查点观测和调参闭环</title>
  <desc id="desc">展示 DBA 如何从日志、统计视图、等待事件和 pg_wal 空间判断检查点是否过密、过急或末尾 fsync 抖动，并选择相应参数。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .metric { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
    .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .action { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 13px; fill: #475569; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="20" y="20" width="1020" height="580" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="48" y="62" class="title">检查点调度问题不要猜：从观测到参数的闭环</text>

  <rect x="70" y="112" width="250" height="118" class="metric"/>
  <text x="94" y="146" class="txt">统计视图</text>
  <text x="94" y="174" class="small">pg_stat_checkpointer</text>
  <text x="94" y="196" class="small">num_timed / num_requested</text>
  <text x="94" y="218" class="small">write_time / sync_time / buffers</text>

  <rect x="405" y="112" width="250" height="118" class="metric"/>
  <text x="429" y="146" class="txt">日志</text>
  <text x="429" y="174" class="small">log_checkpoints</text>
  <text x="429" y="196" class="small">distance / estimate</text>
  <text x="429" y="218" class="small">sync files / longest / average</text>

  <rect x="740" y="112" width="250" height="118" class="metric"/>
  <text x="764" y="146" class="txt">空间和等待</text>
  <text x="764" y="174" class="small">pg_wal 增长、归档滞后</text>
  <text x="764" y="196" class="small">replication slot 保留</text>
  <text x="764" y="218" class="small">checkpoint wait events</text>

  <rect x="214" y="318" width="250" height="128" class="decision"/>
  <text x="238" y="352" class="txt">判断问题类型</text>
  <text x="238" y="380" class="small">过密：WAL 触发太频繁</text>
  <text x="238" y="402" class="small">过急：写入集中、抖动大</text>
  <text x="238" y="424" class="small">过长：恢复窗口或 pg_wal 过大</text>

  <rect x="596" y="318" width="250" height="128" class="action"/>
  <text x="620" y="352" class="txt">选择调参方向</text>
  <text x="620" y="380" class="small">max_wal_size / timeout</text>
  <text x="620" y="402" class="small">completion_target / flush_after</text>
  <text x="620" y="424" class="small">批量写入节奏和复制保留</text>

  <rect x="370" y="500" width="320" height="56" class="box"/>
  <text x="394" y="534" class="small">改参数后再次观察至少一个完整 checkpoint 周期</text>

  <path d="M 320 171 L 405 171" class="line"/>
  <path d="M 655 171 L 740 171" class="line"/>
  <path d="M 195 230 C 220 270 255 298 307 318" class="line"/>
  <path d="M 530 230 C 505 270 437 298 382 318" class="line"/>
  <path d="M 865 230 C 840 275 788 300 746 318" class="line"/>
  <path d="M 464 382 L 596 382" class="line"/>
  <path d="M 721 446 C 705 480 656 500 600 514" class="line"/>
  <path d="M 370 528 C 235 518 172 420 214 382" class="line"/>
</svg>
