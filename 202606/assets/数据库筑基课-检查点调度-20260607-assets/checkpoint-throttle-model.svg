<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">检查点节流模型</title>
  <desc id="desc">展示 checkpoint_completion_target 如何把进度和时间、WAL 消耗两个水位比较，决定是否睡眠或追赶。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; }
    .axis { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    .grid { stroke: #d1d5db; stroke-width: 1; stroke-dasharray: 5 5; }
    .target { stroke: #0f766e; stroke-width: 4; fill: none; }
    .actual { stroke: #dc2626; stroke-width: 3; fill: none; stroke-dasharray: 8 6; }
    .box { fill: #ffffff; stroke: #475569; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #475569; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
  </style>
  <rect x="20" y="20" width="960" height="520" class="frame"/>
  <text x="48" y="62" class="title">节流不是固定睡眠：进度同时追时间和 WAL 消耗</text>

  <line x1="100" y1="450" x2="620" y2="450" class="axis"/>
  <line x1="100" y1="450" x2="100" y2="112" class="axis"/>
  <text x="570" y="484" class="small">时间 / WAL 消耗</text>
  <text x="45" y="123" class="small">写脏页进度</text>
  <line x1="100" y1="145" x2="620" y2="145" class="grid"/>
  <line x1="568" y1="450" x2="568" y2="145" class="grid"/>
  <text x="542" y="474" class="small">target</text>
  <text x="72" y="151" class="small">100%</text>

  <path d="M 100 450 C 220 370 330 280 568 145" class="target"/>
  <path d="M 100 450 C 225 435 300 385 382 325 C 446 280 505 245 568 145" class="actual"/>

  <circle cx="300" cy="385" r="6" fill="#dc2626"/>
  <text x="316" y="390" class="small">落后：不睡，追赶</text>
  <circle cx="430" cy="255" r="6" fill="#0f766e"/>
  <text x="445" y="260" class="small">领先：可睡 100ms</text>

  <rect x="674" y="118" width="270" height="102" class="box"/>
  <text x="696" y="150" class="txt">progress *= completion_target</text>
  <text x="696" y="176" class="small">默认 0.9：尽量铺满间隔</text>
  <text x="696" y="198" class="small">但给收尾、fsync、清理留余量</text>

  <rect x="674" y="250" width="270" height="112" class="box"/>
  <text x="696" y="282" class="txt">两个约束</text>
  <text x="696" y="309" class="small">elapsed_time / checkpoint_timeout</text>
  <text x="696" y="331" class="small">elapsed_xlogs / CheckPointSegments</text>

  <rect x="674" y="392" width="270" height="84" class="warn"/>
  <text x="696" y="424" class="txt">FAST 请求会跳过延迟</text>
  <text x="696" y="451" class="small">手工 fast、关闭、强制路径</text>

  <text x="100" y="515" class="small">源码锚点：CheckpointWriteDelay()、IsCheckpointOnSchedule()、CalculateCheckpointSegments()</text>
</svg>
