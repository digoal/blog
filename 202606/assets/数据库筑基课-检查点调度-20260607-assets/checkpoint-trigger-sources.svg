<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">检查点触发源与请求合并</title>
  <desc id="desc">展示 PostgreSQL 检查点由时间、WAL 消耗、手工命令、关闭和恢复结束等来源触发，并在 checkpointer 进程中合并请求标志。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .box { fill: #ffffff; stroke: #374151; stroke-width: 1.6; rx: 8; }
    .source { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; rx: 8; }
    .core { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
    .state { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; rx: 8; }
    .out { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.6; rx: 8; }
    .txt { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 17px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #374151; }
    .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
    .line { stroke: #374151; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="24" y="22" width="932" height="516" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="48" y="62" class="title">PostgreSQL 检查点调度：多个触发源，合并成一次后台任务</text>

  <rect x="58" y="100" width="245" height="78" class="source"/>
  <text x="80" y="133" class="txt">时间触发</text>
  <text x="80" y="158" class="small">elapsed_secs &gt;= checkpoint_timeout</text>

  <rect x="58" y="210" width="245" height="86" class="source"/>
  <text x="80" y="243" class="txt">WAL 消耗触发</text>
  <text x="80" y="268" class="small">WAL segment 填充后检查</text>
  <text x="80" y="289" class="small">RequestCheckpoint(CAUSE_XLOG)</text>

  <rect x="58" y="330" width="245" height="78" class="source"/>
  <text x="80" y="363" class="txt">手工或 DDL 请求</text>
  <text x="80" y="388" class="small">CHECKPOINT / DROP DB / tablespace</text>

  <rect x="58" y="440" width="245" height="70" class="source"/>
  <text x="80" y="473" class="txt">关闭与恢复边界</text>
  <text x="80" y="498" class="small">shutdown / end-of-recovery</text>

  <rect x="386" y="120" width="230" height="112" class="state"/>
  <text x="410" y="154" class="txt">共享请求状态</text>
  <text x="410" y="181" class="small">ckpt_flags 按位 OR 合并</text>
  <text x="410" y="203" class="small">ckpt_started / ckpt_done</text>

  <rect x="386" y="292" width="230" height="112" class="core"/>
  <text x="410" y="326" class="txt">checkpointer 主循环</text>
  <text x="410" y="353" class="small">AbsorbSyncRequests()</text>
  <text x="410" y="375" class="small">检查请求、时间、恢复状态</text>

  <rect x="704" y="122" width="210" height="86" class="out"/>
  <text x="730" y="156" class="txt">CreateCheckPoint()</text>
  <text x="730" y="181" class="small">主库正常检查点</text>

  <rect x="704" y="254" width="210" height="86" class="out"/>
  <text x="730" y="288" class="txt">CreateRestartPoint()</text>
  <text x="730" y="313" class="small">恢复期间 restartpoint</text>

  <rect x="704" y="386" width="210" height="86" class="out"/>
  <text x="730" y="420" class="txt">跳过空闲检查点</text>
  <text x="730" y="445" class="small">无重要 WAL 时可跳过</text>

  <path d="M 303 139 C 330 139 346 154 386 165" class="line"/>
  <path d="M 303 253 C 330 253 348 213 386 196" class="line"/>
  <path d="M 303 369 C 340 369 356 356 386 350" class="line"/>
  <path d="M 303 475 C 344 475 359 392 386 374" class="line"/>
  <path d="M 501 232 L 501 292" class="line"/>
  <path d="M 616 330 C 655 288 667 190 704 165" class="line"/>
  <path d="M 616 348 C 655 340 669 312 704 297" class="line"/>
  <path d="M 616 369 C 655 390 669 424 704 429" class="line"/>

  <text x="386" y="456" class="small">源码锚点：src/backend/postmaster/checkpointer.c</text>
  <text x="386" y="480" class="small">请求者不直接刷所有页，而是唤醒 checkpointer 或在单用户模式同步执行。</text>
</svg>
