<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">CREATE OPERATOR 创建路径</title>
  <desc id="desc">展示 PostgreSQL 从 SQL 语句到 pg_operator 目录写入的自定义操作符创建流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f7fafc; }
    .box { fill: #ffffff; stroke: #355c7d; stroke-width: 2; rx: 8; }
    .check { fill: #eef7f2; stroke: #2f7d5c; stroke-width: 2; rx: 8; }
    .cat { fill: #fff7ed; stroke: #b8661b; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #1f2937; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #355c7d; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" x="0" y="0" width="960" height="520"/>
  <text class="text" x="48" y="48">自定义操作符创建路径：先验证对象，再写目录，再建立依赖</text>

  <rect class="box" x="54" y="92" width="196" height="96"/>
  <text class="text" x="82" y="130">SQL</text>
  <text class="small" x="82" y="160">CREATE OPERATOR</text>

  <rect class="box" x="304" y="92" width="196" height="96"/>
  <text class="text" x="330" y="130">命令分发</text>
  <text class="small" x="330" y="160">utility.c</text>

  <rect class="check" x="554" y="92" width="312" height="126"/>
  <text class="text" x="582" y="130">DefineOperator</text>
  <text class="small" x="582" y="160">解析参数、权限、函数签名</text>
  <text class="tiny" x="582" y="188">类型 USAGE，函数 EXECUTE，返回类型 USAGE</text>

  <rect class="check" x="54" y="282" width="250" height="128"/>
  <text class="text" x="84" y="320">OperatorValidateParams</text>
  <text class="small" x="84" y="350">二元 / boolean 边界</text>
  <text class="tiny" x="84" y="378">RESTRICT、JOIN、HASHES、MERGES 需满足条件</text>

  <rect class="cat" x="354" y="282" width="250" height="128"/>
  <text class="text" x="384" y="320">OperatorCreate</text>
  <text class="small" x="384" y="350">写 pg_operator</text>
  <text class="tiny" x="384" y="378">必要时创建 shell operator</text>

  <rect class="cat" x="654" y="282" width="250" height="128"/>
  <text class="text" x="684" y="320">依赖与反向链接</text>
  <text class="small" x="684" y="350">pg_depend + owner</text>
  <text class="tiny" x="684" y="378">commutator / negator 手工维护</text>

  <path class="arrow" d="M250 140 H304"/>
  <path class="arrow" d="M500 140 H554"/>
  <path class="arrow" d="M710 218 V258 H179 V282"/>
  <path class="arrow" d="M304 346 H354"/>
  <path class="arrow" d="M604 346 H654"/>

  <text class="tiny" x="58" y="462">源码主线：src/backend/tcop/utility.c -> src/backend/commands/operatorcmds.c -> src/backend/catalog/pg_operator.c</text>
</svg>
