<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">索引和连接能力边界</title>
  <desc id="desc">展示自定义操作符从能执行到能用索引、hash join 和 merge join 的条件递进。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f9fafb; }
    .stage { fill: #ffffff; stroke: #1f4e79; stroke-width: 2; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #2f7d5c; stroke-width: 2; rx: 8; }
    .risk { fill: #fff7ed; stroke: #b8661b; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #1f4e79; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="960" height="560"/>
  <text class="text" x="48" y="48">能力递进：能执行、能估算、能索引、能 Join 是四个不同层次</text>

  <rect class="stage" x="52" y="112" width="184" height="126"/>
  <text class="small" x="82" y="148">1. 函数</text>
  <text class="tiny" x="82" y="178">IMMUTABLE / STABLE</text>
  <text class="tiny" x="82" y="204">STRICT 等语义</text>

  <rect class="stage" x="282" y="112" width="184" height="126"/>
  <text class="small" x="312" y="148">2. 操作符</text>
  <text class="tiny" x="312" y="178">pg_operator</text>
  <text class="tiny" x="312" y="204">oprcode 可执行</text>

  <rect class="risk" x="512" y="112" width="184" height="126"/>
  <text class="small" x="542" y="148">3. 估算</text>
  <text class="tiny" x="542" y="178">oprrest / oprjoin</text>
  <text class="tiny" x="542" y="204">ANALYZE 统计配合</text>

  <rect class="ok" x="742" y="112" width="184" height="126"/>
  <text class="small" x="772" y="148">4. 索引</text>
  <text class="tiny" x="772" y="178">operator class</text>
  <text class="tiny" x="772" y="204">strategy + support</text>

  <path class="arrow" d="M236 175 H282"/>
  <path class="arrow" d="M466 175 H512"/>
  <path class="arrow" d="M696 175 H742"/>

  <rect class="stage" x="158" y="334" width="268" height="126"/>
  <text class="small" x="188" y="370">Hash Join</text>
  <text class="tiny" x="188" y="400">HASHES + hash operator family</text>
  <text class="tiny" x="188" y="426">相等值必须得到相同 hash</text>

  <rect class="stage" x="534" y="334" width="268" height="126"/>
  <text class="small" x="564" y="370">Merge Join</text>
  <text class="tiny" x="564" y="400">MERGES + btree equality member</text>
  <text class="tiny" x="564" y="426">排序语义必须一致</text>

  <path class="arrow" d="M834 238 C816 292 710 304 668 334"/>
  <path class="arrow" d="M834 238 C790 302 364 300 292 334"/>

  <text class="tiny" x="52" y="512">结论：只写 CREATE OPERATOR 通常只能让 SQL 可读；要让计划变好，还要补齐 operator class/family 和真实统计验证。</text>
</svg>
