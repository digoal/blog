<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">操作符解析与 OpExpr 构造</title>
  <desc id="desc">展示 SQL 操作符表达式如何经过候选查找、类型解析、隐式转换并形成 OpExpr。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#25636f"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f9fafb; }
    .box { fill: #ffffff; stroke: #25636f; stroke-width: 2; rx: 8; }
    .warn { fill: #fff1f2; stroke: #be3a4a; stroke-width: 2; rx: 8; }
    .out { fill: #ecfdf5; stroke: #2f7d5c; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #25636f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="960" height="560"/>
  <text class="text" x="48" y="46">解析器做的事：从“符号”变成确定的 OpExpr</text>

  <rect class="box" x="52" y="96" width="226" height="108"/>
  <text class="small" x="82" y="132">输入表达式</text>
  <text class="tiny" x="82" y="162">a OP b 或 OP b</text>
  <text class="tiny" x="82" y="186">后缀操作符不支持</text>

  <rect class="box" x="366" y="96" width="226" height="108"/>
  <text class="small" x="396" y="132">候选查找</text>
  <text class="tiny" x="396" y="162">pg_operator + search_path</text>
  <text class="tiny" x="396" y="186">先找精确匹配</text>

  <rect class="box" x="680" y="96" width="226" height="108"/>
  <text class="small" x="710" y="132">类型解析</text>
  <text class="tiny" x="710" y="162">unknown 字面量</text>
  <text class="tiny" x="710" y="186">domain 倾向 base type</text>

  <rect class="box" x="52" y="296" width="226" height="108"/>
  <text class="small" x="82" y="332">函数参数转换</text>
  <text class="tiny" x="82" y="362">make_fn_arguments</text>
  <text class="tiny" x="82" y="386">按声明类型插入 coercion</text>

  <rect class="out" x="366" y="296" width="226" height="108"/>
  <text class="small" x="396" y="332">OpExpr</text>
  <text class="tiny" x="396" y="362">opno = pg_operator.oid</text>
  <text class="tiny" x="396" y="386">opfuncid = pg_proc.oid</text>

  <rect class="warn" x="680" y="296" width="226" height="108"/>
  <text class="small" x="710" y="332">失败边界</text>
  <text class="tiny" x="710" y="362">候选不唯一</text>
  <text class="tiny" x="710" y="386">shell operator 未定义</text>

  <path class="arrow" d="M278 150 H366"/>
  <path class="arrow" d="M592 150 H680"/>
  <path class="arrow" d="M793 204 V250 H165 V296"/>
  <path class="arrow" d="M278 350 H366"/>
  <path class="arrow" d="M592 350 H680"/>

  <text class="tiny" x="52" y="486">源码主线：src/backend/parser/parse_oper.c 的 oper()、left_oper()、make_op()、make_scalar_array_op()</text>
</svg>
