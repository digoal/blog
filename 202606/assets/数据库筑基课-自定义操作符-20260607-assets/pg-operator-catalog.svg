<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">pg_operator 目录字段语义</title>
  <desc id="desc">展示 pg_operator 如何把操作符名称、参数类型、底层函数、优化器提示和选择性函数连接起来。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .main { fill: #ffffff; stroke: #1f4e79; stroke-width: 2.5; rx: 8; }
    .group1 { fill: #e8f2ff; stroke: #1f4e79; stroke-width: 1.5; rx: 8; }
    .group2 { fill: #ecfdf5; stroke: #2f7d5c; stroke-width: 1.5; rx: 8; }
    .group3 { fill: #fff7ed; stroke: #b8661b; stroke-width: 1.5; rx: 8; }
    .group4 { fill: #f5f3ff; stroke: #6d5bd0; stroke-width: 1.5; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #4b5563; }
    .line { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="960" height="540"/>
  <text class="text" x="48" y="46">pg_operator：操作符不是一个名字，而是一组可被解析器和优化器消费的契约</text>

  <rect class="main" x="354" y="108" width="252" height="300"/>
  <text class="text" x="398" y="146">pg_operator</text>
  <text class="small" x="386" y="184">oprname / namespace</text>
  <text class="small" x="386" y="216">oprleft / oprright</text>
  <text class="small" x="386" y="248">oprresult / oprcode</text>
  <text class="small" x="386" y="280">oprcom / oprnegate</text>
  <text class="small" x="386" y="312">oprrest / oprjoin</text>
  <text class="small" x="386" y="344">oprcanmerge / oprcanhash</text>
  <text class="small" x="386" y="376">oprowner / oprkind</text>

  <rect class="group1" x="58" y="104" width="226" height="118"/>
  <text class="small" x="88" y="140">身份与解析</text>
  <text class="tiny" x="88" y="170">名称、schema、参数类型</text>
  <text class="tiny" x="88" y="196">支持重载与 search_path</text>

  <rect class="group2" x="676" y="104" width="226" height="118"/>
  <text class="small" x="706" y="140">执行语义</text>
  <text class="tiny" x="706" y="170">oprcode 指向 pg_proc</text>
  <text class="tiny" x="706" y="196">函数完成真实计算</text>

  <rect class="group3" x="58" y="308" width="226" height="118"/>
  <text class="small" x="88" y="344">布尔代数关系</text>
  <text class="tiny" x="88" y="374">commutator 支持翻转</text>
  <text class="tiny" x="88" y="400">negator 支持 NOT 改写</text>

  <rect class="group4" x="676" y="308" width="226" height="118"/>
  <text class="small" x="706" y="344">代价与路径</text>
  <text class="tiny" x="706" y="374">选择性估算函数</text>
  <text class="tiny" x="706" y="400">Hash / Merge join 入口标记</text>

  <path class="line" d="M284 162 H354"/>
  <path class="line" d="M606 162 H676"/>
  <path class="line" d="M284 366 H354"/>
  <path class="line" d="M606 366 H676"/>
  <text class="tiny" x="58" y="488">重点：HASHES / MERGES 标记不等于一定能走 hash/merge join；还需要匹配的 hash 或 btree operator family。</text>
</svg>
