<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">操作符优化器契约</title>
  <desc id="desc">展示自定义操作符的 commutator、negator、选择性估算、HASHES 和 MERGES 如何影响优化器。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f5068"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .center { fill: #ffffff; stroke: #3f5068; stroke-width: 2.5; rx: 8; }
    .box { fill: #eef2ff; stroke: #5661a9; stroke-width: 1.8; rx: 8; }
    .green { fill: #ecfdf5; stroke: #2f7d5c; stroke-width: 1.8; rx: 8; }
    .orange { fill: #fff7ed; stroke: #b8661b; stroke-width: 1.8; rx: 8; }
    .red { fill: #fff1f2; stroke: #be3a4a; stroke-width: 1.8; rx: 8; }
    .text { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; fill: #111827; }
    .small { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 16px; fill: #374151; }
    .tiny { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 14px; fill: #4b5563; }
    .arrow { stroke: #3f5068; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="960" height="560"/>
  <text class="text" x="48" y="48">优化器不会猜你的语义：它只相信目录里可验证的契约</text>

  <rect class="center" x="352" y="214" width="256" height="126"/>
  <text class="text" x="394" y="252">OpExpr(opno)</text>
  <text class="small" x="386" y="286">WHERE / JOIN clause</text>
  <text class="tiny" x="386" y="314">通过 opno 查 pg_operator</text>

  <rect class="box" x="54" y="92" width="254" height="118"/>
  <text class="small" x="84" y="128">COMMUTATOR</text>
  <text class="tiny" x="84" y="158">把 常量 OP 列 翻转</text>
  <text class="tiny" x="84" y="184">让索引列回到左侧</text>

  <rect class="box" x="654" y="92" width="254" height="118"/>
  <text class="small" x="684" y="128">NEGATOR</text>
  <text class="tiny" x="684" y="158">NOT (a OP b)</text>
  <text class="tiny" x="684" y="184">改写为 a NEG b</text>

  <rect class="green" x="54" y="372" width="254" height="118"/>
  <text class="small" x="84" y="408">RESTRICT / JOIN</text>
  <text class="tiny" x="84" y="438">估计过滤率和连接率</text>
  <text class="tiny" x="84" y="464">缺省可能回落到 0.5</text>

  <rect class="orange" x="654" y="372" width="254" height="118"/>
  <text class="small" x="684" y="408">HASHES / MERGES</text>
  <text class="tiny" x="684" y="438">允许考虑 hash / merge join</text>
  <text class="tiny" x="684" y="464">还要匹配 operator family</text>

  <rect class="red" x="352" y="72" width="256" height="94"/>
  <text class="small" x="382" y="110">错误标注的风险</text>
  <text class="tiny" x="382" y="140">慢计划、漏用索引、甚至错误结果</text>

  <path class="arrow" d="M308 151 C350 170 366 206 395 218"/>
  <path class="arrow" d="M654 151 C610 170 594 206 565 218"/>
  <path class="arrow" d="M308 431 C350 410 366 354 402 338"/>
  <path class="arrow" d="M654 431 C610 410 594 354 558 338"/>
  <path class="arrow" d="M480 166 V214"/>

  <text class="tiny" x="54" y="526">经验边界：不确定时宁可不标优化属性，先得到正确语义，再补 operator class、统计与验证。</text>
</svg>
