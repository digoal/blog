<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="660" viewBox="0 0 1160 660" role="img" aria-labelledby="title desc">
  <title id="title">是否适合使用 Custom Scan Provider 的判断流程</title>
  <desc id="desc">展示何时应该使用自定义扫描，何时应选择 FDW、table access method、索引、SQL 改写或普通 planner hook。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1120" height="620" rx="8" fill="#fbfcf8" stroke="#d8dfd3"/>
  <text x="580" y="58" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#1f2933">Custom Scan 的价值在“替换执行路径”，不是替代所有扩展接口</text>

  <rect x="390" y="90" width="380" height="70" rx="8" fill="#ffffff" stroke="#9aa6b2" stroke-width="2"/>
  <text x="580" y="132" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">你要解决的是扫描或连接执行方式吗？</text>

  <rect x="95" y="230" width="280" height="100" rx="8" fill="#eef0fb" stroke="#7b83c9" stroke-width="2"/>
  <text x="235" y="262" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#30336b">不是</text>
  <text x="120" y="294" font-size="16" font-family="Arial, sans-serif" fill="#263238">优先考虑 SQL 改写</text>
  <text x="120" y="320" font-size="16" font-family="Arial, sans-serif" fill="#263238">索引、统计信息、GUC、hint</text>

  <rect x="390" y="230" width="380" height="100" rx="8" fill="#e8f3f1" stroke="#7aa6a1" stroke-width="2"/>
  <text x="580" y="262" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#173f43">是，但只扫描外部数据？</text>
  <text x="415" y="294" font-size="16" font-family="Arial, sans-serif" fill="#263238">优先考虑 Foreign Data Wrapper</text>
  <text x="415" y="320" font-size="16" font-family="Arial, sans-serif" fill="#263238">让 FDW 负责远端访问和下推</text>

  <rect x="835" y="230" width="280" height="100" rx="8" fill="#fff4df" stroke="#d49a3a" stroke-width="2"/>
  <text x="975" y="262" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#5c3b05">扫描任意关系或替换连接</text>
  <text x="860" y="294" font-size="16" font-family="Arial, sans-serif" fill="#263238">Custom Scan 值得评估</text>
  <text x="860" y="320" font-size="16" font-family="Arial, sans-serif" fill="#263238">缓存、GPU、列存、SkipScan</text>

  <rect x="185" y="440" width="330" height="110" rx="8" fill="#ffffff" stroke="#9aa6b2" stroke-width="2"/>
  <text x="350" y="474" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">能证明语义等价吗？</text>
  <text x="210" y="506" font-size="16" font-family="Arial, sans-serif" fill="#263238">MVCC、锁、权限、快照、投影</text>
  <text x="210" y="532" font-size="16" font-family="Arial, sans-serif" fill="#263238">连接输出、rescan、异常清理</text>

  <rect x="660" y="440" width="330" height="110" rx="8" fill="#ffffff" stroke="#9aa6b2" stroke-width="2"/>
  <text x="825" y="474" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">能给出可信成本吗？</text>
  <text x="685" y="506" font-size="16" font-family="Arial, sans-serif" fill="#263238">rows、startup_cost、total_cost</text>
  <text x="685" y="532" font-size="16" font-family="Arial, sans-serif" fill="#263238">pathkeys、parallel、参数化路径</text>

  <line x1="510" y1="160" x2="235" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="580" y1="160" x2="580" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="670" y1="160" x2="975" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="975" y1="330" x2="350" y2="440" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="975" y1="330" x2="825" y2="440" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="260" y="590" width="640" height="40" rx="6" fill="#e8f3f1" stroke="#7aa6a1"/>
  <text x="580" y="616" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#173f43">只有“语义等价 + 成本可信 + 生命周期可控”同时成立，才适合进入生产</text>
</svg>
