<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="650" viewBox="0 0 1160 650" role="img" aria-labelledby="title desc">
  <title id="title">CustomScan 执行器回调路径</title>
  <desc id="desc">展示 ExecInitCustomScan 如何创建状态、初始化槽和表达式，并把取下一行交给 ExecCustomScan 回调。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1120" height="610" rx="8" fill="#fbfcff" stroke="#d7dde8"/>
  <text x="580" y="58" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#1f2933">执行器只提供框架，扫描逻辑由 provider 回调实现</text>

  <rect x="70" y="100" width="250" height="92" rx="8" fill="#e8f3f1" stroke="#7aa6a1" stroke-width="2"/>
  <text x="195" y="136" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#173f43">ExecInitNode</text>
  <text x="195" y="164" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">遇到 T_CustomScan</text>

  <rect x="420" y="100" width="300" height="120" rx="8" fill="#fff4df" stroke="#d49a3a" stroke-width="2"/>
  <text x="570" y="136" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#5c3b05">ExecInitCustomScan</text>
  <text x="445" y="166" font-size="16" font-family="Arial, sans-serif" fill="#263238">调用 CreateCustomScanState</text>
  <text x="445" y="194" font-size="16" font-family="Arial, sans-serif" fill="#263238">设置 ExecProcNode = ExecCustomScan</text>

  <rect x="810" y="100" width="260" height="120" rx="8" fill="#eef0fb" stroke="#7b83c9" stroke-width="2"/>
  <text x="940" y="136" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#30336b">标准初始化</text>
  <text x="835" y="166" font-size="16" font-family="Arial, sans-serif" fill="#263238">打开 scan relation</text>
  <text x="835" y="194" font-size="16" font-family="Arial, sans-serif" fill="#263238">建立 tuple slot / qual</text>

  <rect x="420" y="300" width="300" height="120" rx="8" fill="#ffffff" stroke="#9aa6b2" stroke-width="2"/>
  <text x="570" y="336" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">BeginCustomScan</text>
  <text x="445" y="366" font-size="16" font-family="Arial, sans-serif" fill="#263238">初始化私有状态</text>
  <text x="445" y="394" font-size="16" font-family="Arial, sans-serif" fill="#263238">打开缓存、设备、子计划等</text>

  <rect x="70" y="490" width="250" height="92" rx="8" fill="#eef0fb" stroke="#7b83c9" stroke-width="2"/>
  <text x="195" y="526" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#30336b">ExecCustomScan</text>
  <text x="195" y="554" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">返回下一行 TupleTableSlot</text>

  <rect x="420" y="490" width="300" height="92" rx="8" fill="#e8f3f1" stroke="#7aa6a1" stroke-width="2"/>
  <text x="570" y="526" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#173f43">ReScan / End / Shutdown</text>
  <text x="570" y="554" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">处理重复扫描和资源释放</text>

  <rect x="810" y="490" width="260" height="92" rx="8" fill="#fff4df" stroke="#d49a3a" stroke-width="2"/>
  <text x="940" y="526" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#5c3b05">并行与 EXPLAIN</text>
  <text x="940" y="554" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">DSM / Worker / Explain 回调</text>

  <line x1="320" y1="146" x2="420" y2="160" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="720" y1="160" x2="810" y2="160" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="220" x2="570" y2="300" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="420" x2="195" y2="490" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="420" x2="570" y2="490" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="420" x2="940" y2="490" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="580" y="260" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#475569">CustomScanState 必须设置 node tag 和 methods；其他标准字段由核心填充</text>
</svg>
