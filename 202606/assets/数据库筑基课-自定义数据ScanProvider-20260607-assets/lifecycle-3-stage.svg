<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Custom Scan Provider 三阶段生命周期</title>
  <desc id="desc">展示扩展在规划期注入 CustomPath、被选中后转成 CustomScan、执行期通过 CustomScanState 回调产出元组的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1080" height="480" rx="8" fill="#fbfcf8" stroke="#d8dfd3"/>
  <text x="560" y="58" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#1f2933">Custom Scan Provider = 路径注入 + 计划转换 + 执行回调</text>

  <rect x="70" y="105" width="260" height="260" rx="8" fill="#e8f3f1" stroke="#7aa6a1" stroke-width="2"/>
  <text x="200" y="140" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#173f43">1. 规划期</text>
  <text x="95" y="180" font-size="18" font-family="Arial, sans-serif" fill="#263238">set_rel_pathlist_hook</text>
  <text x="95" y="212" font-size="18" font-family="Arial, sans-serif" fill="#263238">set_join_pathlist_hook</text>
  <text x="95" y="252" font-size="18" font-family="Arial, sans-serif" fill="#263238">创建 CustomPath</text>
  <text x="95" y="284" font-size="18" font-family="Arial, sans-serif" fill="#263238">设置 rows / cost / pathkeys</text>
  <text x="95" y="324" font-size="18" font-family="Arial, sans-serif" fill="#263238">add_path 或 add_partial_path</text>

  <rect x="420" y="105" width="260" height="260" rx="8" fill="#fff4df" stroke="#d49a3a" stroke-width="2"/>
  <text x="550" y="140" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#5c3b05">2. 计划生成</text>
  <text x="445" y="180" font-size="18" font-family="Arial, sans-serif" fill="#263238">优化器比较所有 Path</text>
  <text x="445" y="212" font-size="18" font-family="Arial, sans-serif" fill="#263238">若 CustomPath 胜出</text>
  <text x="445" y="252" font-size="18" font-family="Arial, sans-serif" fill="#263238">PlanCustomPath()</text>
  <text x="445" y="284" font-size="18" font-family="Arial, sans-serif" fill="#263238">返回 CustomScan</text>
  <text x="445" y="324" font-size="18" font-family="Arial, sans-serif" fill="#263238">setrefs 修正表达式引用</text>

  <rect x="770" y="105" width="260" height="260" rx="8" fill="#eef0fb" stroke="#7b83c9" stroke-width="2"/>
  <text x="900" y="140" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#30336b">3. 执行期</text>
  <text x="795" y="180" font-size="18" font-family="Arial, sans-serif" fill="#263238">ExecInitCustomScan()</text>
  <text x="795" y="212" font-size="18" font-family="Arial, sans-serif" fill="#263238">CreateCustomScanState()</text>
  <text x="795" y="252" font-size="18" font-family="Arial, sans-serif" fill="#263238">BeginCustomScan()</text>
  <text x="795" y="284" font-size="18" font-family="Arial, sans-serif" fill="#263238">ExecCustomScan()</text>
  <text x="795" y="324" font-size="18" font-family="Arial, sans-serif" fill="#263238">End / ReScan / Explain</text>

  <line x1="330" y1="235" x2="420" y2="235" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="375" y="215" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2f5d62">被选中</text>
  <line x1="680" y1="235" x2="770" y2="235" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="725" y="215" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2f5d62">进入执行器</text>

  <rect x="130" y="405" width="860" height="54" rx="6" fill="#ffffff" stroke="#c7d2c2"/>
  <text x="560" y="438" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">核心约束：替代扫描或连接时，必须产生与原关系或原连接等价的结果语义</text>
</svg>
