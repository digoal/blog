<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">优化器如何选择 CustomPath</title>
  <desc id="desc">展示核心路径、扩展自定义路径、路径裁剪、最便宜路径选择以及 Gather 路径生成之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#365b6d"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1120" height="580" rx="8" fill="#fbfcf8" stroke="#d8dfd3"/>
  <text x="580" y="58" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#1f2933">CustomPath 不是强制执行，而是加入候选路径竞争</text>

  <rect x="70" y="105" width="210" height="92" rx="8" fill="#ffffff" stroke="#9aa6b2" stroke-width="2"/>
  <text x="175" y="140" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">RelOptInfo</text>
  <text x="175" y="170" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#56616f">一个 base/join 关系</text>

  <rect x="370" y="80" width="250" height="145" rx="8" fill="#e8f3f1" stroke="#7aa6a1" stroke-width="2"/>
  <text x="495" y="114" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#173f43">核心系统生成路径</text>
  <text x="395" y="150" font-size="16" font-family="Arial, sans-serif" fill="#263238">SeqScan / IndexScan</text>
  <text x="395" y="178" font-size="16" font-family="Arial, sans-serif" fill="#263238">Bitmap / Tid / Foreign</text>
  <text x="395" y="206" font-size="16" font-family="Arial, sans-serif" fill="#263238">Join path 候选</text>

  <rect x="370" y="290" width="250" height="145" rx="8" fill="#fff4df" stroke="#d49a3a" stroke-width="2"/>
  <text x="495" y="324" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#5c3b05">扩展 Hook 追加路径</text>
  <text x="395" y="360" font-size="16" font-family="Arial, sans-serif" fill="#263238">set_rel_pathlist_hook</text>
  <text x="395" y="388" font-size="16" font-family="Arial, sans-serif" fill="#263238">set_join_pathlist_hook</text>
  <text x="395" y="416" font-size="16" font-family="Arial, sans-serif" fill="#263238">add_path / add_partial_path</text>

  <rect x="735" y="135" width="270" height="210" rx="8" fill="#eef0fb" stroke="#7b83c9" stroke-width="2"/>
  <text x="870" y="170" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#30336b">路径竞争</text>
  <text x="760" y="212" font-size="16" font-family="Arial, sans-serif" fill="#263238">add_path 裁剪明显劣势路径</text>
  <text x="760" y="244" font-size="16" font-family="Arial, sans-serif" fill="#263238">比较 startup_cost / total_cost</text>
  <text x="760" y="276" font-size="16" font-family="Arial, sans-serif" fill="#263238">考虑 required_outer / pathkeys</text>
  <text x="760" y="308" font-size="16" font-family="Arial, sans-serif" fill="#263238">set_cheapest 选最终候选</text>

  <rect x="735" y="410" width="270" height="84" rx="8" fill="#ffffff" stroke="#9aa6b2" stroke-width="2"/>
  <text x="870" y="444" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">partial path 可再生成 Gather</text>
  <text x="870" y="472" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#56616f">Hook 之后才考虑并行收集路径</text>

  <line x1="280" y1="151" x2="370" y2="151" stroke="#365b6d" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="280" y1="151" x2="370" y2="360" stroke="#365b6d" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="620" y1="151" x2="735" y2="215" stroke="#365b6d" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="620" y1="360" x2="735" y2="285" stroke="#365b6d" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="870" y1="345" x2="870" y2="410" stroke="#365b6d" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="125" y="500" width="910" height="48" rx="6" fill="#ffffff" stroke="#c7d2c2"/>
  <text x="580" y="530" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">成本估计错误会直接决定 CustomPath 是被采用、被忽略，还是错误地压过核心路径</text>
</svg>
