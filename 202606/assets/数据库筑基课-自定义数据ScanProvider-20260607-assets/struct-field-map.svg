<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">CustomPath、CustomScan、CustomScanState 结构关系</title>
  <desc id="desc">展示自定义扫描从优化器路径结构、计划节点结构到执行状态结构的字段迁移和边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4f5f"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1140" height="580" rx="8" fill="#fbfcff" stroke="#d7dde8"/>
  <text x="590" y="58" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#1f2933">三个对象分别服务于三个阶段</text>

  <rect x="55" y="105" width="320" height="410" rx="8" fill="#e8f3f1" stroke="#7aa6a1" stroke-width="2"/>
  <text x="215" y="140" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#173f43">CustomPath</text>
  <text x="80" y="180" font-size="17" font-family="Arial, sans-serif" fill="#263238">Path path</text>
  <text x="80" y="212" font-size="17" font-family="Arial, sans-serif" fill="#263238">uint32 flags</text>
  <text x="80" y="244" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_paths</text>
  <text x="80" y="276" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_restrictinfo</text>
  <text x="80" y="308" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_private</text>
  <text x="80" y="340" font-size="17" font-family="Arial, sans-serif" fill="#263238">CustomPathMethods *methods</text>
  <rect x="80" y="380" width="250" height="70" rx="6" fill="#ffffff" stroke="#aec7c2"/>
  <text x="205" y="408" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">可以嵌入更大的私有结构</text>
  <text x="205" y="434" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">因为 Path 不被普通复制</text>

  <rect x="430" y="105" width="320" height="410" rx="8" fill="#fff4df" stroke="#d49a3a" stroke-width="2"/>
  <text x="590" y="140" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#5c3b05">CustomScan</text>
  <text x="455" y="180" font-size="17" font-family="Arial, sans-serif" fill="#263238">Scan scan</text>
  <text x="455" y="212" font-size="17" font-family="Arial, sans-serif" fill="#263238">uint32 flags</text>
  <text x="455" y="244" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_plans</text>
  <text x="455" y="276" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_exprs</text>
  <text x="455" y="308" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_private</text>
  <text x="455" y="340" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_scan_tlist</text>
  <text x="455" y="372" font-size="17" font-family="Arial, sans-serif" fill="#263238">Bitmapset *custom_relids</text>
  <text x="455" y="404" font-size="17" font-family="Arial, sans-serif" fill="#263238">CustomScanMethods *methods</text>
  <rect x="455" y="430" width="250" height="48" rx="6" fill="#ffffff" stroke="#dfc28c"/>
  <text x="580" y="460" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">不能嵌入更大结构</text>

  <rect x="805" y="105" width="320" height="410" rx="8" fill="#eef0fb" stroke="#7b83c9" stroke-width="2"/>
  <text x="965" y="140" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#30336b">CustomScanState</text>
  <text x="830" y="180" font-size="17" font-family="Arial, sans-serif" fill="#263238">ScanState ss</text>
  <text x="830" y="212" font-size="17" font-family="Arial, sans-serif" fill="#263238">uint32 flags</text>
  <text x="830" y="244" font-size="17" font-family="Arial, sans-serif" fill="#263238">List *custom_ps</text>
  <text x="830" y="276" font-size="17" font-family="Arial, sans-serif" fill="#263238">Size pscan_len</text>
  <text x="830" y="308" font-size="17" font-family="Arial, sans-serif" fill="#263238">CustomExecMethods *methods</text>
  <text x="830" y="340" font-size="17" font-family="Arial, sans-serif" fill="#263238">TupleTableSlotOps *slotOps</text>
  <rect x="830" y="380" width="250" height="70" rx="6" fill="#ffffff" stroke="#b7bcea"/>
  <text x="955" y="408" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">可以嵌入更大运行时结构</text>
  <text x="955" y="434" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#263238">保存句柄、缓存、DSM 指针</text>

  <line x1="375" y1="275" x2="430" y2="275" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="402" y="258" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#3f4f5f">PlanCustomPath</text>
  <line x1="750" y1="275" x2="805" y2="275" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="777" y="258" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#3f4f5f">CreateState</text>

  <text x="590" y="555" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">方法表用 CustomName 注册和反查；计划私有数据必须能被 copyObject / nodeToString 处理</text>
</svg>
