<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">base type 的 I/O、Datum 与存储契约</title>
  <desc id="desc">展示用户定义 base type 时，文本和二进制输入经 I/O 函数转换为内部 Datum，并受 typlen、typbyval、typalign、typstorage 和 TOAST 规则约束。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .io { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
      .mem { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.7; rx: 8; }
      .store { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
      .risk { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 16px; }
      .small { font-size: 13px; fill: #334155; }
      .tiny { font-size: 12px; fill: #475569; }
      .head { font-weight: 700; font-size: 18px; }
      .link { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="620"/>

  <rect x="50" y="70" width="190" height="115" class="box"/>
  <text x="145" y="103" text-anchor="middle" class="text head">外部表示</text>
  <text x="70" y="135" class="small">文本：cstring</text>
  <text x="70" y="158" class="small">二进制：StringInfo</text>
  <text x="70" y="181" class="small">COPY / SQL literal / protocol</text>

  <rect x="310" y="52" width="250" height="150" class="io"/>
  <text x="435" y="84" text-anchor="middle" class="text head">I/O 函数契约</text>
  <text x="330" y="116" class="small">typinput：text -&gt; internal</text>
  <text x="330" y="139" class="small">typoutput：internal -&gt; text</text>
  <text x="330" y="162" class="small">typreceive / typsend：可选二进制 I/O</text>
  <text x="330" y="185" class="small">typmodin / typmodout：可选 typmod</text>

  <rect x="630" y="70" width="280" height="115" class="mem"/>
  <text x="770" y="103" text-anchor="middle" class="text head">内部 Datum</text>
  <text x="650" y="135" class="small">by value：1/2/4/8 字节固定长</text>
  <text x="650" y="158" class="small">by reference：指针指向内存表示</text>
  <text x="650" y="181" class="small">C 代码必须理解自己的布局</text>

  <rect x="70" y="285" width="260" height="160" class="store"/>
  <text x="200" y="318" text-anchor="middle" class="text head">pg_type 存储字段</text>
  <text x="95" y="350" class="small">typlen：固定长 / varlena / cstring</text>
  <text x="95" y="373" class="small">typbyval：值传递或引用传递</text>
  <text x="95" y="396" class="small">typalign：c / s / i / d 对齐</text>
  <text x="95" y="419" class="small">typstorage：plain / external / extended / main</text>

  <rect x="395" y="285" width="230" height="160" class="store"/>
  <text x="510" y="318" text-anchor="middle" class="text head">heap tuple / TOAST</text>
  <text x="420" y="350" class="small">固定长：按对齐填充</text>
  <text x="420" y="373" class="small">varlena：4 字节长度头</text>
  <text x="420" y="396" class="small">toastable：可能压缩或外置</text>
  <text x="420" y="419" class="small">函数读取前要 detoast</text>

  <rect x="690" y="285" width="230" height="160" class="risk"/>
  <text x="805" y="318" text-anchor="middle" class="text head">工程风险</text>
  <text x="715" y="350" class="small">I/O 不是互逆：dump/restore 风险</text>
  <text x="715" y="373" class="small">长度/对齐写错：可能崩溃</text>
  <text x="715" y="396" class="small">二进制格式不稳：跨平台风险</text>
  <text x="715" y="419" class="small">函数不 detoast：读错或崩溃</text>

  <rect x="295" y="505" width="390" height="62" class="box"/>
  <text x="490" y="532" text-anchor="middle" class="text">CREATE TYPE base 不是声明注释</text>
  <text x="490" y="555" text-anchor="middle" class="small">它把 SQL 层类型名绑定到 C 函数、Datum 布局和磁盘存储规则</text>

  <path d="M240 128 L310 128" class="link"/>
  <path d="M560 128 L630 128" class="link"/>
  <path d="M770 185 C745 235, 660 250, 585 285" class="link"/>
  <path d="M435 202 C385 238, 280 250, 240 285" class="dash"/>
  <path d="M330 365 L395 365" class="link"/>
  <path d="M625 365 L690 365" class="link"/>
  <path d="M510 445 L510 505" class="dash"/>
  <text x="322" y="252" class="tiny">TypeCreate() 校验组合合法性</text>
  <text x="648" y="252" class="tiny">运行期按 fmgr 调用函数</text>
</svg>
