<svg xmlns="http://www.w3.org/2000/svg" width="980" height="660" viewBox="0 0 980 660" role="img" aria-labelledby="title desc">
  <title id="title">CREATE TYPE 不同形式进入 catalog 的路径</title>
  <desc id="desc">展示 composite、domain、enum、range、base type 五种 CREATE TYPE 形式分别经过 typecmds.c 中的函数进入 pg_type 和相关 catalog 的路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.2; rx: 8; }
      .cmd { fill: #ffffff; stroke: #475569; stroke-width: 1.4; rx: 8; }
      .fn { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; rx: 8; }
      .cat { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
      .note { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 15px; }
      .small { font-size: 12.5px; fill: #334155; }
      .head { font-weight: 700; font-size: 18px; }
      .link { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="660"/>

  <rect x="30" y="30" width="920" height="70" class="lane"/>
  <text x="60" y="58" class="text head">SQL DDL</text>
  <text x="60" y="83" class="text small">用户表达的是“我要一种类型”；内核落地的是 catalog 行、依赖和可执行函数契约。</text>

  <rect x="60" y="130" width="180" height="70" class="cmd"/>
  <text x="150" y="160" text-anchor="middle" class="text">CREATE TYPE AS (...)</text>
  <text x="150" y="184" text-anchor="middle" class="small">stand-alone composite</text>

  <rect x="60" y="240" width="180" height="70" class="cmd"/>
  <text x="150" y="270" text-anchor="middle" class="text">CREATE DOMAIN</text>
  <text x="150" y="294" text-anchor="middle" class="small">基类型 + 约束</text>

  <rect x="60" y="350" width="180" height="70" class="cmd"/>
  <text x="150" y="380" text-anchor="middle" class="text">CREATE TYPE AS ENUM</text>
  <text x="150" y="404" text-anchor="middle" class="small">标签集合 + 排序</text>

  <rect x="60" y="460" width="180" height="70" class="cmd"/>
  <text x="150" y="490" text-anchor="middle" class="text">CREATE TYPE AS RANGE</text>
  <text x="150" y="514" text-anchor="middle" class="small">subtype + opclass</text>

  <rect x="60" y="570" width="180" height="58" class="cmd"/>
  <text x="150" y="596" text-anchor="middle" class="text">CREATE TYPE base</text>
  <text x="150" y="619" text-anchor="middle" class="small">shell + C I/O 函数</text>

  <rect x="340" y="130" width="230" height="70" class="fn"/>
  <text x="455" y="160" text-anchor="middle" class="text">DefineCompositeType()</text>
  <text x="455" y="184" text-anchor="middle" class="small">包装成 DefineRelation()</text>

  <rect x="340" y="240" width="230" height="70" class="fn"/>
  <text x="455" y="270" text-anchor="middle" class="text">DefineDomain()</text>
  <text x="455" y="294" text-anchor="middle" class="small">继承基类型存储属性</text>

  <rect x="340" y="350" width="230" height="70" class="fn"/>
  <text x="455" y="380" text-anchor="middle" class="text">DefineEnum()</text>
  <text x="455" y="404" text-anchor="middle" class="small">TypeCreate + EnumValuesCreate</text>

  <rect x="340" y="460" width="230" height="70" class="fn"/>
  <text x="455" y="490" text-anchor="middle" class="text">DefineRange()</text>
  <text x="455" y="514" text-anchor="middle" class="small">TypeCreate + RangeCreate</text>

  <rect x="340" y="570" width="230" height="58" class="fn"/>
  <text x="455" y="596" text-anchor="middle" class="text">DefineType()</text>
  <text x="455" y="619" text-anchor="middle" class="small">替换 shell type</text>

  <rect x="690" y="120" width="230" height="92" class="cat"/>
  <text x="805" y="150" text-anchor="middle" class="text head">pg_class + pg_attribute</text>
  <text x="710" y="181" class="small">relkind = composite type</text>
  <text x="710" y="202" class="small">同时产生 pg_type rowtype</text>

  <rect x="690" y="230" width="230" height="92" class="cat"/>
  <text x="805" y="260" text-anchor="middle" class="text head">pg_type + pg_constraint</text>
  <text x="710" y="291" class="small">typtype = d, typbasetype 指向基类型</text>
  <text x="710" y="312" class="small">CHECK / NOT NULL 约束另存</text>

  <rect x="690" y="340" width="230" height="92" class="cat"/>
  <text x="805" y="370" text-anchor="middle" class="text head">pg_type + pg_enum</text>
  <text x="710" y="401" class="small">typtype = e, 内部值是 OID</text>
  <text x="710" y="422" class="small">标签和排序写入 pg_enum</text>

  <rect x="690" y="450" width="230" height="92" class="cat"/>
  <text x="805" y="480" text-anchor="middle" class="text head">pg_type + pg_range</text>
  <text x="710" y="511" class="small">typtype = r / m</text>
  <text x="710" y="532" class="small">自动生成 multirange 和数组类型</text>

  <rect x="690" y="560" width="230" height="76" class="cat"/>
  <text x="805" y="590" text-anchor="middle" class="text head">pg_type + array type</text>
  <text x="710" y="621" class="small">typtype = b, 记录 I/O 和存储契约</text>

  <path d="M240 165 L340 165" class="link"/>
  <path d="M240 275 L340 275" class="link"/>
  <path d="M240 385 L340 385" class="link"/>
  <path d="M240 495 L340 495" class="link"/>
  <path d="M240 599 L340 599" class="link"/>

  <path d="M570 165 L690 166" class="link"/>
  <path d="M570 275 L690 276" class="link"/>
  <path d="M570 385 L690 386" class="link"/>
  <path d="M570 495 L690 496" class="link"/>
  <path d="M570 599 L690 599" class="link"/>

  <path d="M580 274 C620 250, 640 160, 690 166" class="dash"/>
  <path d="M580 384 C625 365, 645 305, 690 292" class="dash"/>
  <path d="M580 494 C630 470, 650 410, 690 386" class="dash"/>

  <rect x="300" y="35" width="350" height="48" class="note"/>
  <text x="475" y="65" text-anchor="middle" class="text">多数用户类型还会自动创建对应数组类型</text>
</svg>
