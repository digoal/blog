<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">domain、enum、range 的收益与代价</title>
  <desc id="desc">对比三类常用 SQL 层自定义类型的收益、代价和运维边界，帮助选择合适的建模方式。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .good { fill: #ecfdf5; stroke: #047857; stroke-width: 1.3; rx: 8; }
      .cost { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.3; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 15px; }
      .small { font-size: 12.5px; fill: #334155; }
      .head { font-weight: 700; font-size: 18px; }
      .link { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="620"/>

  <rect x="45" y="55" width="270" height="430" class="card"/>
  <text x="180" y="88" text-anchor="middle" class="text head">DOMAIN</text>
  <rect x="70" y="115" width="220" height="120" class="good"/>
  <text x="90" y="145" class="text">收益</text>
  <text x="90" y="174" class="small">一处定义，多表复用</text>
  <text x="90" y="197" class="small">不改变底层存储表示</text>
  <text x="90" y="220" class="small">适合稳定、局部的值约束</text>
  <rect x="70" y="270" width="220" height="150" class="cost"/>
  <text x="90" y="300" class="text">代价</text>
  <text x="90" y="329" class="small">CHECK 假定不可变</text>
  <text x="90" y="352" class="small">NOT NULL 有 SQL null 边界</text>
  <text x="90" y="375" class="small">改变约束要重扫历史数据</text>
  <text x="90" y="398" class="small">不适合复杂跨行规则</text>

  <rect x="355" y="55" width="270" height="430" class="card"/>
  <text x="490" y="88" text-anchor="middle" class="text head">ENUM</text>
  <rect x="380" y="115" width="220" height="120" class="good"/>
  <text x="400" y="145" class="text">收益</text>
  <text x="400" y="174" class="small">类型安全，不同 enum 不混用</text>
  <text x="400" y="197" class="small">内部 4 字节 OID</text>
  <text x="400" y="220" class="small">排序语义由定义顺序给出</text>
  <rect x="380" y="270" width="220" height="150" class="cost"/>
  <text x="400" y="300" class="text">代价</text>
  <text x="400" y="329" class="small">不适合高频变化字典</text>
  <text x="400" y="352" class="small">重命名/新增容易，删除/重排困难</text>
  <text x="400" y="375" class="small">跨 enum 比较需要显式转换</text>
  <text x="400" y="398" class="small">业务状态流转仍需额外约束</text>

  <rect x="665" y="55" width="270" height="430" class="card"/>
  <text x="800" y="88" text-anchor="middle" class="text head">RANGE</text>
  <rect x="690" y="115" width="220" height="120" class="good"/>
  <text x="710" y="145" class="text">收益</text>
  <text x="710" y="174" class="small">把边界、空区间、无限边界制度化</text>
  <text x="710" y="197" class="small">内建包含、相交、合并语义</text>
  <text x="710" y="220" class="small">天然适合排他约束和 GiST</text>
  <rect x="690" y="270" width="220" height="150" class="cost"/>
  <text x="710" y="300" class="text">代价</text>
  <text x="710" y="329" class="small">subtype 必须有排序语义</text>
  <text x="710" y="352" class="small">离散 subtype 要 canonical</text>
  <text x="710" y="375" class="small">缺 subtype_diff 会降低空间索引效率</text>
  <text x="710" y="398" class="small">语义过度抽象会增加开发理解成本</text>

  <rect x="180" y="525" width="620" height="55" class="card"/>
  <text x="490" y="548" text-anchor="middle" class="text">建模原则</text>
  <text x="490" y="571" text-anchor="middle" class="small">先用最窄的类型表达最稳定的事实；变化快、规则跨行、需要运营维护的内容优先普通表。</text>

  <path d="M180 485 C200 515, 260 525, 330 525" class="link"/>
  <path d="M490 485 L490 525" class="link"/>
  <path d="M800 485 C780 515, 720 525, 650 525" class="link"/>
</svg>
