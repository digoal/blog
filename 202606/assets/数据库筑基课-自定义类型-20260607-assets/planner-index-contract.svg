<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">自定义类型从能存到能优化的语义契约</title>
  <desc id="desc">展示自定义类型只有 pg_type 仍然只是能存取；要让解析器、优化器和索引用好，还需要 cast、operator、operator class 和统计信息契约。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .type { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.8; rx: 8; }
      .sem { fill: #fef9c3; stroke: #a16207; stroke-width: 1.5; rx: 8; }
      .engine { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.5; rx: 8; }
      .warn { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 15px; }
      .small { font-size: 12.5px; fill: #334155; }
      .head { font-weight: 700; font-size: 18px; }
      .link { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="620"/>

  <rect x="55" y="82" width="220" height="145" class="type"/>
  <text x="165" y="115" text-anchor="middle" class="text head">pg_type 让它能存取</text>
  <text x="75" y="148" class="small">I/O 函数</text>
  <text x="75" y="171" class="small">内部长度、传值、对齐、TOAST</text>
  <text x="75" y="194" class="small">数组类型和依赖</text>
  <text x="75" y="217" class="small">这一步只保证“值能进出”</text>

  <rect x="370" y="45" width="230" height="85" class="sem"/>
  <text x="485" y="77" text-anchor="middle" class="text head">pg_cast</text>
  <text x="390" y="108" class="small">显式 / assignment / implicit</text>

  <rect x="370" y="160" width="230" height="95" class="sem"/>
  <text x="485" y="193" text-anchor="middle" class="text head">pg_operator</text>
  <text x="390" y="224" class="small">=, &lt;, &gt;, &amp;&amp;, @&gt; 等语义</text>
  <text x="390" y="247" class="small">选择率函数可影响估算</text>

  <rect x="370" y="285" width="230" height="105" class="sem"/>
  <text x="485" y="318" text-anchor="middle" class="text head">pg_opclass / opfamily</text>
  <text x="390" y="349" class="small">某索引方法需要哪些策略号</text>
  <text x="390" y="372" class="small">btree 定义排序；GiST 定义一致性</text>

  <rect x="370" y="420" width="230" height="95" class="sem"/>
  <text x="485" y="453" text-anchor="middle" class="text head">typanalyze / 统计信息</text>
  <text x="390" y="484" class="small">ANALYZE 如何收集分布</text>
  <text x="390" y="507" class="small">缺失时只能使用默认策略</text>

  <rect x="710" y="72" width="220" height="90" class="engine"/>
  <text x="820" y="105" text-anchor="middle" class="text head">解析器</text>
  <text x="730" y="136" class="small">字面量、函数重载、隐式转换</text>

  <rect x="710" y="205" width="220" height="110" class="engine"/>
  <text x="820" y="238" text-anchor="middle" class="text head">优化器</text>
  <text x="730" y="269" class="small">等值、排序、范围、选择率</text>
  <text x="730" y="292" class="small">决定 Seq Scan / Index Scan</text>

  <rect x="710" y="360" width="220" height="110" class="engine"/>
  <text x="820" y="393" text-anchor="middle" class="text head">执行器 / 索引 AM</text>
  <text x="730" y="424" class="small">按 operator class 调 support 函数</text>
  <text x="730" y="447" class="small">B-tree / Hash / GiST / GIN / BRIN</text>

  <rect x="75" y="350" width="210" height="112" class="warn"/>
  <text x="180" y="383" text-anchor="middle" class="text head">常见断点</text>
  <text x="95" y="414" class="small">没有默认 btree opclass</text>
  <text x="95" y="437" class="small">排序、分区键、某些约束会失败</text>
  <text x="95" y="460" class="small">隐式 cast 过多会污染解析</text>

  <rect x="260" y="555" width="460" height="42" class="box"/>
  <text x="490" y="582" text-anchor="middle" class="text">类型设计 = 存储表示 + 运算语义 + 优化器契约</text>

  <path d="M275 150 C320 115, 340 90, 370 88" class="link"/>
  <path d="M275 158 C322 178, 340 205, 370 208" class="link"/>
  <path d="M275 180 C323 250, 340 330, 370 338" class="link"/>
  <path d="M275 208 C315 315, 340 455, 370 468" class="dash"/>

  <path d="M600 88 L710 116" class="link"/>
  <path d="M600 208 L710 250" class="link"/>
  <path d="M600 338 L710 405" class="link"/>
  <path d="M600 468 C655 455, 680 290, 710 260" class="dash"/>
  <path d="M285 406 C325 392, 345 360, 370 338" class="dash"/>
</svg>
