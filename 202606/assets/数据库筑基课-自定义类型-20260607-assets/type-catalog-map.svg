<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 自定义类型的 catalog 地图</title>
  <desc id="desc">以 pg_type 为中心，展示自定义类型与 pg_enum、pg_range、pg_constraint、pg_proc、pg_class、pg_depend、pg_cast 和 operator class 相关 catalog 的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 8; }
      .core { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
      .aux { fill: #ecfdf5; stroke: #047857; stroke-width: 1.6; rx: 8; }
      .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 16px; }
      .small { font-size: 13px; fill: #334155; }
      .tiny { font-size: 12px; fill: #475569; }
      .head { font-weight: 700; font-size: 18px; }
      .link { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #94a3b8; stroke-width: 1.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="620"/>

  <rect x="335" y="120" width="310" height="270" class="core"/>
  <text x="490" y="150" text-anchor="middle" class="text head">pg_type：类型总账</text>
  <text x="360" y="185" class="text small">typname / typnamespace / typowner</text>
  <text x="360" y="210" class="text small">typtype：b,c,d,e,m,p,r</text>
  <text x="360" y="235" class="text small">typlen / typbyval / typalign / typstorage</text>
  <text x="360" y="260" class="text small">typinput / typoutput / typreceive / typsend</text>
  <text x="360" y="285" class="text small">typbasetype / typtypmod / typnotnull</text>
  <text x="360" y="310" class="text small">typelem / typarray / typsubscript</text>
  <text x="360" y="335" class="text small">typcategory / typispreferred / typcollation</text>
  <text x="360" y="360" class="text small">typdefaultbin / typacl / typrelid</text>

  <rect x="35" y="42" width="230" height="128" class="aux"/>
  <text x="150" y="72" text-anchor="middle" class="text head">pg_proc</text>
  <text x="55" y="103" class="text small">I/O 函数</text>
  <text x="55" y="126" class="text small">typmod / analyze / subscript</text>
  <text x="55" y="149" class="text small">操作符背后的函数</text>

  <rect x="705" y="42" width="230" height="128" class="aux"/>
  <text x="820" y="72" text-anchor="middle" class="text head">pg_class / pg_attribute</text>
  <text x="725" y="103" class="text small">表 rowtype</text>
  <text x="725" y="126" class="text small">stand-alone composite</text>
  <text x="725" y="149" class="text small">typrelid 指向复合类型关系</text>

  <rect x="35" y="235" width="230" height="128" class="aux"/>
  <text x="150" y="265" text-anchor="middle" class="text head">pg_enum</text>
  <text x="55" y="296" class="text small">enumtypid -&gt; pg_type.oid</text>
  <text x="55" y="319" class="text small">enumlabel：显示文本</text>
  <text x="55" y="342" class="text small">enumsortorder：排序语义</text>

  <rect x="705" y="235" width="230" height="128" class="aux"/>
  <text x="820" y="265" text-anchor="middle" class="text head">pg_range</text>
  <text x="725" y="296" class="text small">rngtypid / rngsubtype</text>
  <text x="725" y="319" class="text small">rngsubopc：subtype btree opclass</text>
  <text x="725" y="342" class="text small">canonical / subtype_diff</text>

  <rect x="35" y="430" width="230" height="128" class="warn"/>
  <text x="150" y="460" text-anchor="middle" class="text head">pg_constraint</text>
  <text x="55" y="491" class="text small">domain CHECK / NOT NULL</text>
  <text x="55" y="514" class="text small">contypid -&gt; domain type</text>
  <text x="55" y="537" class="text small">约束在转换到 domain 时检查</text>

  <rect x="705" y="430" width="230" height="128" class="warn"/>
  <text x="820" y="460" text-anchor="middle" class="text head">语义扩展 catalog</text>
  <text x="725" y="491" class="text small">pg_cast：类型转换</text>
  <text x="725" y="514" class="text small">pg_operator：比较/业务操作</text>
  <text x="725" y="537" class="text small">pg_opclass：索引方法契约</text>

  <rect x="372" y="450" width="236" height="92" class="panel"/>
  <text x="490" y="480" text-anchor="middle" class="text head">pg_depend</text>
  <text x="392" y="511" class="text small">数组类型、I/O 函数、基类型、</text>
  <text x="392" y="534" class="text small">复合类型关系、extension 成员关系</text>

  <path d="M265 108 C295 118, 310 135, 335 165" class="link"/>
  <path d="M705 108 C675 118, 660 135, 645 165" class="link"/>
  <path d="M265 300 C292 300, 315 290, 335 278" class="link"/>
  <path d="M705 300 C680 300, 665 290, 645 278" class="link"/>
  <path d="M265 492 C300 470, 322 395, 360 360" class="link"/>
  <path d="M705 492 C668 470, 653 400, 620 360" class="link"/>
  <path d="M490 390 L490 450" class="muted"/>

  <rect x="356" y="38" width="268" height="48" class="panel"/>
  <text x="490" y="68" text-anchor="middle" class="text">一个类型不是名字，是一组 catalog 契约</text>

  <text x="310" y="580" class="text tiny">读图方式：先看 pg_type 的 typtype 和存储字段，再沿箭头找到该类型额外语义所在的 catalog。</text>
</svg>
