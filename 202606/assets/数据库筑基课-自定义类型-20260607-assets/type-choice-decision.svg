<svg xmlns="http://www.w3.org/2000/svg" width="980" height="680" viewBox="0 0 980 680" role="img" aria-labelledby="title desc">
  <title id="title">自定义类型方案选择流程</title>
  <desc id="desc">从工程问题出发，选择 domain、enum、composite、range 或 base type 的决策流程，并标出不适合自定义类型的情况。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .q { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.6; rx: 8; }
      .ans { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.6; rx: 8; }
      .caution { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .no { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.5; rx: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 15px; }
      .small { font-size: 12.5px; fill: #334155; }
      .head { font-weight: 700; font-size: 18px; }
      .link { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="680"/>

  <rect x="350" y="35" width="280" height="66" class="q"/>
  <text x="490" y="64" text-anchor="middle" class="text head">问题是什么？</text>
  <text x="490" y="88" text-anchor="middle" class="small">约束、枚举、结构、区间、还是新内部表示</text>

  <rect x="60" y="145" width="230" height="86" class="q"/>
  <text x="175" y="176" text-anchor="middle" class="text">同一规则反复出现？</text>
  <text x="175" y="201" text-anchor="middle" class="small">例如邮箱、金额、业务编码</text>

  <rect x="375" y="145" width="230" height="86" class="q"/>
  <text x="490" y="176" text-anchor="middle" class="text">取值集合小且稳定？</text>
  <text x="490" y="201" text-anchor="middle" class="small">例如订单状态、审批状态</text>

  <rect x="690" y="145" width="230" height="86" class="q"/>
  <text x="805" y="176" text-anchor="middle" class="text">多个字段总是一起传？</text>
  <text x="805" y="201" text-anchor="middle" class="small">函数入参、返回值、嵌套结构</text>

  <rect x="60" y="295" width="230" height="86" class="q"/>
  <text x="175" y="326" text-anchor="middle" class="text">核心语义是连续/离散区间？</text>
  <text x="175" y="351" text-anchor="middle" class="small">包含、相交、排他约束</text>

  <rect x="375" y="295" width="230" height="86" class="q"/>
  <text x="490" y="326" text-anchor="middle" class="text">需要新的内部表示？</text>
  <text x="490" y="351" text-anchor="middle" class="small">需要 C 函数、TOAST、索引语义</text>

  <rect x="690" y="295" width="230" height="86" class="q"/>
  <text x="805" y="326" text-anchor="middle" class="text">值集合高频变化？</text>
  <text x="805" y="351" text-anchor="middle" class="small">业务配置、运营字典、权限项</text>

  <rect x="60" y="445" width="230" height="80" class="ans"/>
  <text x="175" y="475" text-anchor="middle" class="text head">CREATE DOMAIN</text>
  <text x="175" y="501" text-anchor="middle" class="small">集中表达 CHECK / DEFAULT / collation</text>

  <rect x="375" y="445" width="230" height="80" class="ans"/>
  <text x="490" y="475" text-anchor="middle" class="text head">CREATE TYPE AS ENUM</text>
  <text x="490" y="501" text-anchor="middle" class="small">类型安全，排序由标签顺序决定</text>

  <rect x="690" y="445" width="230" height="80" class="ans"/>
  <text x="805" y="475" text-anchor="middle" class="text head">CREATE TYPE AS (...)</text>
  <text x="805" y="501" text-anchor="middle" class="small">复合类型，适合函数边界</text>

  <rect x="60" y="570" width="230" height="80" class="ans"/>
  <text x="175" y="600" text-anchor="middle" class="text head">CREATE TYPE AS RANGE</text>
  <text x="175" y="626" text-anchor="middle" class="small">配 canonical / subtype_diff</text>

  <rect x="375" y="570" width="230" height="80" class="caution"/>
  <text x="490" y="600" text-anchor="middle" class="text head">base type / extension</text>
  <text x="490" y="626" text-anchor="middle" class="small">先写 C I/O，再补 operator / opclass</text>

  <rect x="690" y="570" width="230" height="80" class="no"/>
  <text x="805" y="600" text-anchor="middle" class="text head">优先普通表建模</text>
  <text x="805" y="626" text-anchor="middle" class="small">查找表、外键、配置表更好迁移</text>

  <path d="M490 101 L175 145" class="link"/>
  <path d="M490 101 L490 145" class="link"/>
  <path d="M490 101 L805 145" class="link"/>
  <path d="M175 231 L175 295" class="dash"/>
  <path d="M490 231 L490 295" class="dash"/>
  <path d="M805 231 L805 295" class="dash"/>
  <path d="M175 231 L175 445" class="link"/>
  <path d="M490 231 L490 445" class="link"/>
  <path d="M805 231 L805 445" class="link"/>
  <path d="M175 381 L175 570" class="link"/>
  <path d="M490 381 L490 570" class="link"/>
  <path d="M805 381 L805 570" class="link"/>

  <text x="304" y="486" class="small">是</text>
  <text x="616" y="486" class="small">是</text>
  <text x="932" y="486" class="small">是</text>
  <text x="302" y="612" class="small">是</text>
  <text x="617" y="612" class="small">是</text>
  <text x="932" y="612" class="small">是</text>
</svg>
