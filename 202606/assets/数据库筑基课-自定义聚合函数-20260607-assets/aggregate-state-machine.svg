<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">自定义聚合函数的状态机</title>
  <desc id="desc">展示 PostgreSQL 普通聚合从初始状态、逐行状态转移到最终函数输出的执行路径。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .state { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .fn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .note { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #0f172a; }
    .small { font-size: 16px; fill: #334155; }
    .tiny { font-size: 14px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 7 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>

  <rect x="30" y="30" width="920" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <text class="text" x="50" y="70">普通聚合：状态值驱动的 set-to-scalar 计算</text>

  <rect class="state" x="70" y="135" width="190" height="90"/>
  <text class="text" x="100" y="170">初始状态</text>
  <text class="small" x="94" y="200">INITCOND 或 NULL</text>

  <rect class="box" x="330" y="95" width="185" height="70"/>
  <text class="text" x="376" y="137">输入行 1</text>

  <rect class="fn" x="330" y="210" width="185" height="90"/>
  <text class="text" x="368" y="245">SFUNC</text>
  <text class="small" x="347" y="273">state + row -&gt; state</text>

  <rect class="box" x="585" y="95" width="185" height="70"/>
  <text class="text" x="631" y="137">输入行 N</text>

  <rect class="fn" x="585" y="210" width="185" height="90"/>
  <text class="text" x="623" y="245">SFUNC</text>
  <text class="small" x="602" y="273">state + row -&gt; state</text>

  <rect class="state" x="330" y="365" width="185" height="80"/>
  <text class="text" x="367" y="398">中间状态</text>
  <text class="small" x="364" y="426">保存在 aggcontext</text>

  <rect class="state" x="585" y="365" width="185" height="80"/>
  <text class="text" x="622" y="398">最终状态</text>
  <text class="small" x="624" y="426">所有行处理后</text>

  <rect class="fn" x="820" y="335" width="130" height="95"/>
  <text class="text" x="842" y="372">FINALFUNC</text>
  <text class="small" x="843" y="402">可选</text>

  <rect class="state" x="820" y="155" width="130" height="75"/>
  <text class="text" x="856" y="187">结果</text>
  <text class="small" x="842" y="213">聚合返回值</text>

  <path class="arrow" d="M260 180 C300 180 304 255 330 255"/>
  <path class="arrow" d="M422 165 L422 210"/>
  <path class="arrow" d="M422 300 L422 365"/>
  <path class="arrow" d="M515 405 C548 405 552 255 585 255"/>
  <path class="arrow" d="M677 165 L677 210"/>
  <path class="arrow" d="M677 300 L677 365"/>
  <path class="arrow" d="M770 405 L820 405"/>
  <path class="arrow" d="M885 335 L885 230"/>
  <path class="arrow dashed" d="M770 386 C795 365 805 240 820 205"/>

  <rect class="note" x="70" y="450" width="715" height="70"/>
  <text class="small" x="90" y="478">严格 SFUNC：NULL 输入可跳过；无 INITCOND 且状态类型等于首个输入类型时，首个非 NULL 输入可直接成为状态。</text>
  <text class="small" x="90" y="505">非严格 SFUNC：每行都会调用，函数自己决定 NULL 状态和 NULL 输入的语义。</text>
</svg>
