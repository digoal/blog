<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">CREATE AGGREGATE 到系统目录的映射</title>
  <desc id="desc">展示 CREATE AGGREGATE 解析后经过 DefineAggregate 和 AggregateCreate 写入 pg_proc 与 pg_aggregate 的路径。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .cmd { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .code { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .cat { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>

  <rect x="30" y="30" width="920" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <text class="text" x="50" y="70">DDL 定义不是运行时代码本身，而是把支持函数和状态规则登记进系统目录</text>

  <rect class="cmd" x="70" y="120" width="210" height="115"/>
  <text class="text" x="100" y="153">CREATE AGGREGATE</text>
  <text class="small" x="92" y="184">SFUNC / STYPE</text>
  <text class="small" x="92" y="207">FINALFUNC / INITCOND</text>
  <text class="small" x="92" y="230">COMBINE / SERIAL</text>

  <rect class="code" x="360" y="95" width="225" height="145"/>
  <text class="text" x="395" y="130">DefineAggregate</text>
  <text class="small" x="382" y="162">解析参数与权限</text>
  <text class="small" x="382" y="187">检查 STYPE / SFUNC</text>
  <text class="small" x="382" y="212">检查 moving / parallel 选项</text>

  <rect class="code" x="670" y="95" width="225" height="145"/>
  <text class="text" x="708" y="130">AggregateCreate</text>
  <text class="small" x="692" y="162">查找支持函数签名</text>
  <text class="small" x="692" y="187">验证返回类型</text>
  <text class="small" x="692" y="212">创建目录元组</text>

  <rect class="cat" x="210" y="325" width="255" height="135"/>
  <text class="text" x="277" y="360">pg_proc</text>
  <text class="small" x="232" y="392">聚合本身也是一个函数入口</text>
  <text class="small" x="232" y="417">记录名称、参数、返回类型</text>
  <text class="small" x="232" y="442">记录 parallel 标记</text>

  <rect class="cat" x="565" y="300" width="300" height="185"/>
  <text class="text" x="660" y="335">pg_aggregate</text>
  <text class="small" x="590" y="366">aggtransfn / aggtranstype / agginitval</text>
  <text class="small" x="590" y="391">aggfinalfn / aggfinalmodify</text>
  <text class="small" x="590" y="416">aggcombinefn / aggserialfn / aggdeserialfn</text>
  <text class="small" x="590" y="441">aggmtransfn / aggminvtransfn</text>
  <text class="small" x="590" y="466">aggsortop / aggtransspace</text>

  <rect class="warn" x="70" y="475" width="815" height="45"/>
  <text class="small" x="90" y="503">关键约束：serial/deserial 只允许 internal 状态；internal 状态通常需要超级用户和正确内存上下文。</text>

  <path class="arrow" d="M280 177 L360 170"/>
  <path class="arrow" d="M585 170 L670 170"/>
  <path class="arrow" d="M760 240 C700 275 620 295 465 360"/>
  <path class="arrow" d="M790 240 C770 270 748 285 730 300"/>
  <path class="arrow" d="M465 392 L565 392"/>
</svg>
