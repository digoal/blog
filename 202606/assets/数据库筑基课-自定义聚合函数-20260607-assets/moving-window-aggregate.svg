<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">moving aggregate 窗口滑动</title>
  <desc id="desc">展示移动窗口聚合使用正向状态函数添加新行、逆向状态函数移除旧行，避免每次窗口移动都全量重算。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .row { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.8; rx: 6; }
    .old { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 6; }
    .new { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
    .state { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .fn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .redarrow { stroke: #dc2626; stroke-width: 2.2; fill: none; marker-end: url(#redarrow); }
    .greenarrow { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#greenarrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626" />
    </marker>
    <marker id="greenarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a" />
    </marker>
  </defs>

  <rect x="30" y="30" width="920" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <text class="text" x="50" y="70">移动窗口：旧行离开时用 MINVFUNC 撤销，新行进入时用 MSFUNC 添加</text>

  <rect class="box" x="70" y="120" width="860" height="115"/>
  <text class="small" x="90" y="150">当前窗口</text>
  <rect class="old" x="110" y="170" width="80" height="48"/>
  <text class="small" x="132" y="199">r1</text>
  <rect class="row" x="210" y="170" width="80" height="48"/>
  <text class="small" x="232" y="199">r2</text>
  <rect class="row" x="310" y="170" width="80" height="48"/>
  <text class="small" x="332" y="199">r3</text>
  <rect class="row" x="410" y="170" width="80" height="48"/>
  <text class="small" x="432" y="199">r4</text>
  <rect class="new" x="510" y="170" width="80" height="48"/>
  <text class="small" x="532" y="199">r5</text>
  <text class="tiny" x="630" y="197">窗口向右移动一行</text>

  <rect class="fn" x="130" y="310" width="210" height="90"/>
  <text class="text" x="174" y="345">MINVFUNC</text>
  <text class="small" x="156" y="375">state - 离开行 -&gt; state</text>

  <rect class="state" x="410" y="310" width="190" height="90"/>
  <text class="text" x="452" y="345">移动状态</text>
  <text class="small" x="438" y="375">MSTYPE / MINITCOND</text>

  <rect class="fn" x="670" y="310" width="210" height="90"/>
  <text class="text" x="721" y="345">MSFUNC</text>
  <text class="small" x="699" y="375">state + 新行 -&gt; state</text>

  <rect class="box" x="150" y="445" width="730" height="55"/>
  <text class="small" x="175" y="478">如果 MINVFUNC 不能精确撤销，可返回 NULL，执行器会对当前 frame 重新计算；浮点数尤其要谨慎。</text>

  <path class="redarrow" d="M150 218 C150 260 190 285 220 310"/>
  <path class="arrow" d="M340 355 L410 355"/>
  <path class="arrow" d="M600 355 L670 355"/>
  <path class="greenarrow" d="M550 218 C610 250 700 285 760 310"/>
  <path class="arrow" d="M775 400 C775 430 650 435 580 400"/>
</svg>
