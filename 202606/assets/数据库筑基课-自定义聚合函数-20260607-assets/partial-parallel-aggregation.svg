<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">partial aggregation 与并行聚合</title>
  <desc id="desc">展示多个 worker 先做局部状态转移，再由 leader 使用 combine 函数合并状态并最终输出结果。</desc>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .worker { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .state { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .fn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .leader { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; fill: #0f172a; }
    .small { font-size: 15px; fill: #334155; }
    .tiny { font-size: 13px; fill: #475569; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 7 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>

  <rect x="30" y="30" width="920" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <text class="text" x="50" y="70">可并行聚合的前提：状态可以分片计算，再无损合并</text>

  <rect class="box" x="70" y="120" width="170" height="290"/>
  <text class="text" x="105" y="155">输入数据</text>
  <rect class="worker" x="95" y="185" width="120" height="45"/>
  <text class="small" x="125" y="213">分片 A</text>
  <rect class="worker" x="95" y="255" width="120" height="45"/>
  <text class="small" x="125" y="283">分片 B</text>
  <rect class="worker" x="95" y="325" width="120" height="45"/>
  <text class="small" x="125" y="353">分片 C</text>

  <rect class="worker" x="320" y="105" width="190" height="105"/>
  <text class="text" x="355" y="140">Worker 1</text>
  <text class="small" x="346" y="168">SFUNC 扫描分片</text>
  <text class="small" x="346" y="193">输出 partial state</text>

  <rect class="worker" x="320" y="245" width="190" height="105"/>
  <text class="text" x="355" y="280">Worker 2</text>
  <text class="small" x="346" y="308">SFUNC 扫描分片</text>
  <text class="small" x="346" y="333">输出 partial state</text>

  <rect class="worker" x="320" y="385" width="190" height="105"/>
  <text class="text" x="355" y="420">Worker 3</text>
  <text class="small" x="346" y="448">SFUNC 扫描分片</text>
  <text class="small" x="346" y="473">输出 partial state</text>

  <rect class="state" x="590" y="132" width="140" height="55"/>
  <text class="small" x="620" y="165">state A</text>
  <rect class="state" x="590" y="272" width="140" height="55"/>
  <text class="small" x="620" y="305">state B</text>
  <rect class="state" x="590" y="412" width="140" height="55"/>
  <text class="small" x="620" y="445">state C</text>

  <rect class="leader" x="790" y="210" width="160" height="125"/>
  <text class="text" x="825" y="245">Leader</text>
  <text class="small" x="815" y="273">COMBINEFUNC</text>
  <text class="small" x="815" y="298">FINALFUNC</text>

  <rect class="fn" x="790" y="395" width="160" height="80"/>
  <text class="text" x="826" y="430">必要条件</text>
  <text class="tiny" x="810" y="455">COMBINE + PARALLEL SAFE</text>

  <path class="arrow" d="M215 208 L320 157"/>
  <path class="arrow" d="M215 278 L320 298"/>
  <path class="arrow" d="M215 348 L320 438"/>
  <path class="arrow" d="M510 157 L590 160"/>
  <path class="arrow" d="M510 298 L590 300"/>
  <path class="arrow" d="M510 438 L590 440"/>
  <path class="arrow" d="M730 160 C770 180 775 225 790 250"/>
  <path class="arrow" d="M730 300 L790 276"/>
  <path class="arrow" d="M730 440 C770 410 775 325 790 300"/>
  <path class="arrow dash" d="M870 335 L870 395"/>

  <text class="small" x="575" y="88">internal 状态跨进程传递时还需要 SERIALFUNC / DESERIALFUNC</text>
</svg>
