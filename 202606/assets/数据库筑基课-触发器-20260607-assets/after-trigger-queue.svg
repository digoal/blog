<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">AFTER 触发器队列和 transition table</title>
  <desc id="desc">展示 AFTER 触发器事件在 query stack、deferred event list、transition table tuplestore 之间的生命周期。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .sub { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
    .blue { fill: #eff6ff; stroke: #3b82f6; }
    .green { fill: #ecfdf5; stroke: #10b981; }
    .amber { fill: #fffbeb; stroke: #f59e0b; }
    .red { fill: #fef2f2; stroke: #ef4444; }
    .h { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .t { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
    .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1040" height="620"/>
  <text class="title" x="36" y="44">AFTER 触发器的核心是事件队列，不是立刻同步调用</text>
  <text class="sub" x="36" y="70">普通 AFTER 在语句末触发；可递延约束触发器进入事务级队列，提交前再触发。</text>

  <rect class="blue" x="56" y="126" width="200" height="118" rx="8"/>
  <text class="h" x="76" y="156">AfterTriggerSaveEvent</text>
  <text class="t" x="76" y="186">保存触发器 OID</text>
  <text class="t" x="76" y="210">保存 CTID / 分区 OID</text>
  <text class="small" x="76" y="232">必要时保存 FDW 元组</text>

  <rect class="green" x="328" y="126" width="230" height="118" rx="8"/>
  <text class="h" x="348" y="156">query_stack[depth].events</text>
  <text class="t" x="348" y="186">当前语句的事件块</text>
  <text class="t" x="348" y="210">共享 AfterTriggerSharedData</text>
  <text class="small" x="348" y="232">按 chunk 降低 per-event 成本</text>

  <rect class="amber" x="632" y="126" width="236" height="118" rx="8"/>
  <text class="h" x="652" y="156">transition table</text>
  <text class="t" x="652" y="186">OLD TABLE / NEW TABLE</text>
  <text class="t" x="652" y="210">tuplestore 保存行集合</text>
  <text class="small" x="652" y="232">AfterTriggerEndQuery 后释放</text>

  <rect class="blue" x="328" y="350" width="230" height="118" rx="8"/>
  <text class="h" x="348" y="380">AfterTriggerEndQuery</text>
  <text class="t" x="348" y="410">标记立即事件</text>
  <text class="t" x="348" y="434">执行普通 AFTER</text>
  <text class="small" x="348" y="456">递延事件转全局队列</text>

  <rect class="red" x="632" y="350" width="236" height="118" rx="8"/>
  <text class="h" x="652" y="380">afterTriggers.events</text>
  <text class="t" x="652" y="410">事务级 deferred list</text>
  <text class="t" x="652" y="434">SET CONSTRAINTS 可触发</text>
  <text class="small" x="652" y="456">提交前 AfterTriggerFireDeferred</text>

  <path class="line" d="M256 185 H328"/>
  <path class="line" d="M558 185 H632"/>
  <path class="line" d="M443 244 V350"/>
  <path class="dash" d="M558 410 H632"/>
  <path class="dash" d="M750 244 V350"/>

  <rect class="box" x="110" y="364" width="180" height="118"/>
  <text class="h" x="130" y="394">执行触发器函数</text>
  <text class="t" x="130" y="424">AfterTriggerExecute</text>
  <text class="small" x="130" y="448">重取 OLD/NEW 行</text>
  <text class="small" x="130" y="468">传入 TriggerData</text>
  <path class="line" d="M328 410 H290"/>
</svg>
