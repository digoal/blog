<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">触发器从 DDL 到 relcache 的路径</title>
  <desc id="desc">展示 CREATE TRIGGER 经过校验、写 pg_trigger、更新 relhastriggers、构造 TriggerDesc 并进入执行器缓存的路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .sub { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
    .blue { fill: #eff6ff; stroke: #3b82f6; }
    .green { fill: #ecfdf5; stroke: #10b981; }
    .amber { fill: #fffbeb; stroke: #f59e0b; }
    .red { fill: #fef2f2; stroke: #ef4444; }
    .h { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .t { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
    .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1000" height="560"/>
  <text class="title" x="36" y="44">CREATE TRIGGER 的事实最后落在 pg_trigger，并被 relcache 转成 TriggerDesc</text>
  <text class="sub" x="36" y="70">执行时不重新解析 DDL，而是读关系缓存里的 TriggerDesc 和布尔提示位。</text>

  <rect class="blue" x="46" y="128" width="170" height="96" rx="8"/>
  <text class="h" x="66" y="158">SQL DDL</text>
  <text class="t" x="66" y="186">CREATE TRIGGER</text>
  <text class="small" x="66" y="208">CreateTrigStmt</text>

  <rect class="box" x="274" y="108" width="210" height="138"/>
  <text class="h" x="294" y="138">CreateTriggerFiringOn</text>
  <text class="t" x="294" y="166">校验对象类型</text>
  <text class="t" x="294" y="190">校验时机/事件/粒度</text>
  <text class="t" x="294" y="214">函数必须返回 trigger</text>
  <text class="small" x="294" y="236">构造 tgtype / tgqual / tgargs</text>

  <rect class="green" x="552" y="108" width="190" height="138" rx="8"/>
  <text class="h" x="572" y="138">pg_trigger</text>
  <text class="t" x="572" y="166">tgrelid / tgname</text>
  <text class="t" x="572" y="190">tgfoid / tgtype</text>
  <text class="t" x="572" y="214">tgenabled / tgqual</text>
  <text class="small" x="572" y="236">tgoldtable / tgnewtable</text>

  <rect class="amber" x="806" y="128" width="150" height="96" rx="8"/>
  <text class="h" x="826" y="158">pg_class</text>
  <text class="t" x="826" y="186">relhastriggers</text>
  <text class="small" x="826" y="208">触发 relcache 重建</text>

  <path class="line" d="M216 176 H274"/>
  <path class="line" d="M484 176 H552"/>
  <path class="line" d="M742 176 H806"/>

  <rect class="box" x="134" y="346" width="220" height="126"/>
  <text class="h" x="154" y="376">RelationBuildTriggers</text>
  <text class="t" x="154" y="404">按 tgrelid 扫 pg_trigger</text>
  <text class="t" x="154" y="428">使用 tgrelid,tgname 索引</text>
  <text class="small" x="154" y="452">结果天然按名称顺序</text>

  <rect class="green" x="430" y="346" width="220" height="126" rx="8"/>
  <text class="h" x="450" y="376">TriggerDesc</text>
  <text class="t" x="450" y="404">Trigger 数组</text>
  <text class="t" x="450" y="428">trig_insert_before_row</text>
  <text class="small" x="450" y="452">各类快速布尔提示位</text>

  <rect class="red" x="724" y="346" width="206" height="126" rx="8"/>
  <text class="h" x="744" y="376">执行器 ResultRelInfo</text>
  <text class="t" x="744" y="404">ri_TrigDesc</text>
  <text class="t" x="744" y="428">ri_TrigFunctions</text>
  <text class="small" x="744" y="452">函数调用信息可缓存</text>

  <path class="line" d="M647 246 C647 300 244 298 244 346"/>
  <path class="line" d="M354 409 H430"/>
  <path class="line" d="M650 409 H724"/>
</svg>
