<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">DML 执行时的触发器路径</title>
  <desc id="desc">展示 INSERT/UPDATE/DELETE 在 ModifyTable 中依次经过 BEFORE STATEMENT、BEFORE ROW、实际写入、AFTER ROW 排队和 AFTER STATEMENT 排队的路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .sub { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
    .blue { fill: #eff6ff; stroke: #3b82f6; }
    .green { fill: #ecfdf5; stroke: #10b981; }
    .amber { fill: #fffbeb; stroke: #f59e0b; }
    .red { fill: #fef2f2; stroke: #ef4444; }
    .h { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .t { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
    .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1040" height="620"/>
  <text class="title" x="36" y="44">触发器嵌在 ModifyTable 的写入路径里</text>
  <text class="sub" x="36" y="70">BEFORE 可改变或取消当前行；AFTER 先记录事件，语句结束时再触发立即事件。</text>

  <rect class="blue" x="50" y="126" width="164" height="84" rx="8"/>
  <text class="h" x="76" y="156">ModifyTable</text>
  <text class="t" x="76" y="184">INSERT / UPDATE / DELETE</text>

  <rect class="box" x="276" y="104" width="190" height="106"/>
  <text class="h" x="296" y="134">BEFORE STATEMENT</text>
  <text class="t" x="296" y="164">ExecBS*Triggers</text>
  <text class="small" x="296" y="188">一条语句一次</text>

  <rect class="green" x="538" y="104" width="190" height="106" rx="8"/>
  <text class="h" x="558" y="134">逐行处理</text>
  <text class="t" x="558" y="164">取 OLD / 形成 NEW</text>
  <text class="small" x="558" y="188">UPDATE/DELETE 会锁定行</text>

  <rect class="amber" x="800" y="104" width="190" height="106" rx="8"/>
  <text class="h" x="820" y="134">BEFORE ROW</text>
  <text class="t" x="820" y="164">ExecBR*Triggers</text>
  <text class="small" x="820" y="188">返回 NULL 可跳过本行</text>

  <rect class="box" x="538" y="286" width="190" height="112"/>
  <text class="h" x="558" y="316">实际写入</text>
  <text class="t" x="558" y="346">约束 / 生成列</text>
  <text class="t" x="558" y="370">heap / index / FDW</text>

  <rect class="red" x="800" y="286" width="190" height="112" rx="8"/>
  <text class="h" x="820" y="316">AFTER ROW</text>
  <text class="t" x="820" y="346">ExecAR*Triggers</text>
  <text class="small" x="820" y="370">AfterTriggerSaveEvent</text>

  <rect class="red" x="538" y="468" width="190" height="96" rx="8"/>
  <text class="h" x="558" y="498">AFTER STATEMENT</text>
  <text class="t" x="558" y="528">ExecAS*Triggers</text>
  <text class="small" x="558" y="550">语句末一次</text>

  <rect class="blue" x="276" y="468" width="190" height="96" rx="8"/>
  <text class="h" x="296" y="498">AfterTriggerEndQuery</text>
  <text class="t" x="296" y="528">触发立即 AFTER</text>
  <text class="small" x="296" y="550">递延事件转事务队列</text>

  <path class="line" d="M214 168 H276"/>
  <path class="line" d="M466 157 H538"/>
  <path class="line" d="M728 157 H800"/>
  <path class="line" d="M895 210 V286"/>
  <path class="line" d="M800 342 H728"/>
  <path class="line" d="M633 398 V468"/>
  <path class="line" d="M538 516 H466"/>
  <path class="dash" d="M895 398 C895 490 750 516 728 516"/>
  <path class="dash" d="M633 210 V286"/>

  <text class="small" x="760" y="242">BEFORE 后才进入写入</text>
  <text class="small" x="742" y="426">AFTER ROW 先排队</text>
  <text class="small" x="214" y="444">ExecutorFinish 中收尾</text>
</svg>
