<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">触发器实践决策边界</title>
  <desc id="desc">展示工程中决定是否使用触发器时需要考虑的业务约束、数据规模、可观测性、递归和替代方案。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .sub { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
    .good { fill: #ecfdf5; stroke: #10b981; }
    .check { fill: #eff6ff; stroke: #3b82f6; }
    .warn { fill: #fffbeb; stroke: #f59e0b; }
    .bad { fill: #fef2f2; stroke: #ef4444; }
    .h { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .t { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
    .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1040" height="620"/>
  <text class="title" x="36" y="44">什么时候把逻辑放进触发器？先问四个问题</text>
  <text class="sub" x="36" y="70">触发器适合靠近数据事实的约束和审计，不适合把复杂业务流程藏在数据库里。</text>

  <rect class="check" x="70" y="126" width="220" height="120" rx="8"/>
  <text class="h" x="94" y="156">1. 是否必须贴近数据？</text>
  <text class="t" x="94" y="186">跨入口一致性</text>
  <text class="t" x="94" y="210">审计和派生事实</text>
  <text class="small" x="94" y="232">多个应用都会写同一表</text>

  <rect class="check" x="380" y="126" width="220" height="120" rx="8"/>
  <text class="h" x="404" y="156">2. 行数是否可控？</text>
  <text class="t" x="404" y="186">行级触发器按行调用</text>
  <text class="t" x="404" y="210">批量更新会放大成本</text>
  <text class="small" x="404" y="232">可用 WHEN 降低入队</text>

  <rect class="check" x="690" y="126" width="220" height="120" rx="8"/>
  <text class="h" x="714" y="156">3. 是否可观测？</text>
  <text class="t" x="714" y="186">pg_trigger / pg_get_triggerdef</text>
  <text class="t" x="714" y="210">EXPLAIN ANALYZE</text>
  <text class="small" x="714" y="232">必要时 track_functions</text>

  <rect class="good" x="120" y="376" width="240" height="120" rx="8"/>
  <text class="h" x="144" y="406">适合</text>
  <text class="t" x="144" y="436">不可绕过的本地规则</text>
  <text class="t" x="144" y="460">轻量审计 / 统计增量</text>
  <text class="small" x="144" y="482">用 AFTER 做跨表副作用</text>

  <rect class="warn" x="430" y="376" width="240" height="120" rx="8"/>
  <text class="h" x="454" y="406">谨慎</text>
  <text class="t" x="454" y="436">递延约束和提交尖峰</text>
  <text class="t" x="454" y="460">transition table 内存</text>
  <text class="small" x="454" y="482">分区行迁移语义复杂</text>

  <rect class="bad" x="740" y="376" width="240" height="120" rx="8"/>
  <text class="h" x="764" y="406">不适合</text>
  <text class="t" x="764" y="436">远程 RPC / 长事务流程</text>
  <text class="t" x="764" y="460">不可解释的隐藏写入</text>
  <text class="small" x="764" y="482">无限递归或链式副作用</text>

  <path class="line" d="M180 246 V376"/>
  <path class="line" d="M490 246 V376"/>
  <path class="line" d="M800 246 V376"/>
  <path class="line" d="M290 186 H380"/>
  <path class="line" d="M600 186 H690"/>
</svg>
