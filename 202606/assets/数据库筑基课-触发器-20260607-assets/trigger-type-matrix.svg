<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">触发器选择空间</title>
  <desc id="desc">展示 PostgreSQL 普通触发器按对象、事件、时机、粒度和附加能力组合后的选择边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .sub { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .h { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .t { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e293b; }
    .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
    .ok { fill: #ecfdf5; stroke: #10b981; }
    .warn { fill: #fffbeb; stroke: #f59e0b; }
    .no { fill: #fef2f2; stroke: #ef4444; }
    .chip { fill: #eef2ff; stroke: #6366f1; }
    .line { stroke: #475569; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="36" y="42">PostgreSQL 触发器不是一个开关，而是一组维度的组合</text>
  <text class="sub" x="36" y="68">先确定对象和事件，再选择时机、粒度，最后叠加 WHEN、transition table、约束触发器和复制角色策略。</text>

  <rect class="box" x="36" y="104" width="190" height="180"/>
  <text class="h" x="56" y="132">对象</text>
  <rect class="ok" x="56" y="150" width="150" height="30" rx="6"/>
  <text class="t" x="75" y="170">普通表/分区表</text>
  <rect class="ok" x="56" y="190" width="150" height="30" rx="6"/>
  <text class="t" x="86" y="210">外部表</text>
  <rect class="warn" x="56" y="230" width="150" height="30" rx="6"/>
  <text class="t" x="91" y="250">视图</text>

  <rect class="box" x="276" y="104" width="210" height="180"/>
  <text class="h" x="296" y="132">事件</text>
  <rect class="chip" x="296" y="150" width="78" height="30" rx="6"/>
  <text class="t" x="313" y="170">INSERT</text>
  <rect class="chip" x="386" y="150" width="78" height="30" rx="6"/>
  <text class="t" x="403" y="170">UPDATE</text>
  <rect class="chip" x="296" y="190" width="78" height="30" rx="6"/>
  <text class="t" x="314" y="210">DELETE</text>
  <rect class="warn" x="386" y="190" width="78" height="30" rx="6"/>
  <text class="t" x="400" y="210">TRUNCATE</text>
  <rect class="no" x="296" y="236" width="168" height="32" rx="6"/>
  <text class="t" x="328" y="257">没有 SELECT 触发器</text>

  <rect class="box" x="536" y="104" width="190" height="180"/>
  <text class="h" x="556" y="132">触发时机</text>
  <rect class="ok" x="556" y="150" width="150" height="30" rx="6"/>
  <text class="t" x="602" y="170">BEFORE</text>
  <rect class="ok" x="556" y="190" width="150" height="30" rx="6"/>
  <text class="t" x="612" y="210">AFTER</text>
  <rect class="warn" x="556" y="230" width="150" height="30" rx="6"/>
  <text class="t" x="584" y="250">INSTEAD OF</text>
  <text class="small" x="556" y="276">只用于视图行级 DML</text>

  <rect class="box" x="776" y="104" width="190" height="180"/>
  <text class="h" x="796" y="132">触发粒度</text>
  <rect class="ok" x="796" y="150" width="150" height="30" rx="6"/>
  <text class="t" x="827" y="170">FOR EACH ROW</text>
  <rect class="ok" x="796" y="190" width="150" height="30" rx="6"/>
  <text class="t" x="806" y="210">FOR EACH STATEMENT</text>
  <rect class="warn" x="796" y="230" width="150" height="30" rx="6"/>
  <text class="t" x="812" y="250">TRUNCATE 仅语句级</text>

  <path class="line" d="M226 194 H276"/>
  <path class="line" d="M486 194 H536"/>
  <path class="line" d="M726 194 H776"/>

  <rect class="box" x="84" y="344" width="184" height="116"/>
  <text class="h" x="104" y="374">WHEN 条件</text>
  <text class="t" x="104" y="404">过滤是否执行</text>
  <text class="small" x="104" y="428">AFTER 时先判断</text>
  <text class="small" x="104" y="448">不满足则不入队</text>

  <rect class="box" x="328" y="344" width="206" height="116"/>
  <text class="h" x="348" y="374">transition table</text>
  <text class="t" x="348" y="404">OLD TABLE / NEW TABLE</text>
  <text class="small" x="348" y="428">语句级集合视图</text>
  <text class="small" x="348" y="448">仅 AFTER 普通表</text>

  <rect class="box" x="594" y="344" width="188" height="116"/>
  <text class="h" x="614" y="374">约束触发器</text>
  <text class="t" x="614" y="404">AFTER ROW</text>
  <text class="small" x="614" y="428">可 DEFERRABLE</text>
  <text class="small" x="614" y="448">由 SET CONSTRAINTS 调整</text>

  <rect class="box" x="820" y="344" width="130" height="116"/>
  <text class="h" x="838" y="374">启用状态</text>
  <text class="t" x="842" y="404">O / D / R / A</text>
  <text class="small" x="838" y="428">配合复制角色</text>
  <text class="small" x="838" y="448">决定是否触发</text>

  <path class="line" d="M170 284 V344"/>
  <path class="line" d="M426 284 V344"/>
  <path class="line" d="M666 284 V344"/>
  <path class="line" d="M884 284 V344"/>
</svg>
