<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" role="img" aria-labelledby="title desc">
  <title id="title">LWLock 获取与等待流程</title>
  <desc id="desc">展示 PostgreSQL LWLockAcquire 的两阶段获取协议：先原子尝试，失败后入队，再尝试，仍失败才睡眠，释放者唤醒等待者后等待者重新竞争。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px sans-serif; fill: #111827; }
    .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.7; rx: 8; }
    .fast { fill: #e8f7f1; stroke: #2a9d8f; stroke-width: 1.7; rx: 8; }
    .wait { fill: #fff3e8; stroke: #e76f51; stroke-width: 1.7; rx: 8; }
    .sleep { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.7; rx: 8; }
    .label { font: 700 16px sans-serif; fill: #111827; }
    .text { font: 13px sans-serif; fill: #374151; }
    .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    .dash { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" x="0" y="0" width="1060" height="600"/>
  <text class="title" x="42" y="48">LWLockAcquire：避免“入队前锁已释放”的两阶段协议</text>

  <rect class="box" x="60" y="115" width="170" height="72"/>
  <text class="label" x="88" y="146">申请 LWLock</text>
  <text class="text" x="88" y="170">共享或排他模式</text>

  <rect class="fast" x="280" y="105" width="210" height="92"/>
  <text class="label" x="310" y="138">Phase 1：CAS 尝试</text>
  <text class="text" x="310" y="162">直接修改 state</text>
  <text class="text" x="310" y="182">成功则进入临界区</text>

  <rect class="wait" x="545" y="105" width="210" height="92"/>
  <text class="label" x="575" y="138">Phase 2：加入队列</text>
  <text class="text" x="575" y="162">设置 HAS_WAITERS</text>
  <text class="text" x="575" y="182">把 PGPROC 放入 waiters</text>

  <rect class="fast" x="805" y="105" width="200" height="92"/>
  <text class="label" x="835" y="138">Phase 3：再尝试</text>
  <text class="text" x="835" y="162">若刚好已释放</text>
  <text class="text" x="835" y="182">撤销入队并成功</text>

  <rect class="sleep" x="545" y="285" width="210" height="92"/>
  <text class="label" x="575" y="318">Phase 4：睡眠</text>
  <text class="text" x="575" y="342">PGSemaphoreLock</text>
  <text class="text" x="575" y="362">等待释放者唤醒</text>

  <rect class="box" x="805" y="285" width="200" height="92"/>
  <text class="label" x="835" y="318">释放者释放锁</text>
  <text class="text" x="835" y="342">state 计数减少</text>
  <text class="text" x="835" y="362">必要时 LWLockWakeup</text>

  <rect class="box" x="280" y="435" width="210" height="82"/>
  <text class="label" x="310" y="468">被唤醒后重试</text>
  <text class="text" x="310" y="492">唤醒不等于已授予锁</text>

  <rect class="fast" x="60" y="435" width="170" height="82"/>
  <text class="label" x="88" y="468">进入临界区</text>
  <text class="text" x="88" y="492">记录 held_lwlocks</text>

  <path class="line" d="M230 151 H280"/>
  <path class="line" d="M490 151 H545"/>
  <path class="line" d="M755 151 H805"/>
  <path class="line" d="M905 197 V285"/>
  <path class="line" d="M805 331 H755"/>
  <path class="line" d="M650 285 V197"/>
  <path class="dash" d="M545 331 C430 331 405 395 385 435"/>
  <path class="line" d="M280 476 H230"/>
  <path class="dash" d="M385 435 C375 350 375 245 385 197"/>

  <text class="text" x="310" y="225">成功路径：无竞争时只有少量原子操作。</text>
  <text class="text" x="575" y="405">等待路径：入队后再检查，避免错过释放信号。</text>
  <text class="text" x="740" y="507">释放者唤醒“有机会获得锁”的等待者；等待者醒来后仍需重新竞争。</text>
</svg>
