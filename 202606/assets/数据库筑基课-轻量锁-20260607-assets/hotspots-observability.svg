<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">LWLock 典型热点与观测路径</title>
  <desc id="desc">展示 pg_stat_activity 和 pg_wait_events 如何观察 LWLock 等待，并把 ProcArray、BufferMapping、WALInsert、WALWrite、LockManager 等等待事件映射到常见工程原因。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 700 16px sans-serif; fill: #111827; }
    .text { font: 13px sans-serif; fill: #374151; }
    .small { font: 12px sans-serif; fill: #4b5563; }
    .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .obs { fill: #e8f1ff; stroke: #3a6ea5; stroke-width: 1.5; rx: 8; }
    .event { fill: #e8f7f1; stroke: #2a9d8f; stroke-width: 1.5; rx: 8; }
    .cause { fill: #fff3e8; stroke: #e76f51; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 1.8; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" x="0" y="0" width="1060" height="620"/>
  <text class="title" x="42" y="48">观测 LWLock：先看事件名，再回到共享资源路径</text>

  <rect class="obs" x="60" y="92" width="300" height="135"/>
  <text class="label" x="88" y="126">pg_stat_activity</text>
  <text class="text" x="88" y="154">wait_event_type = 'LWLock'</text>
  <text class="text" x="88" y="180">wait_event = tranche 名称</text>
  <text class="small" x="88" y="207">只表示当前正在等，不等于根因已确定。</text>

  <rect class="obs" x="410" y="92" width="300" height="135"/>
  <text class="label" x="438" y="126">pg_wait_events</text>
  <text class="text" x="438" y="154">按 type/name 查事件说明</text>
  <text class="text" x="438" y="180">确认它保护什么共享资源</text>

  <rect class="obs" x="760" y="92" width="240" height="135"/>
  <text class="label" x="788" y="126">时间序列与采样</text>
  <text class="text" x="788" y="154">持续占比、峰值时段</text>
  <text class="text" x="788" y="180">和 SQL、I/O、checkpoint 关联</text>

  <path class="line" d="M360 160 H410"/>
  <path class="line" d="M710 160 H760"/>

  <rect class="event" x="65" y="305" width="180" height="86"/>
  <text class="label" x="92" y="338">ProcArray</text>
  <text class="text" x="92" y="364">快照、提交退出</text>

  <rect class="event" x="265" y="305" width="180" height="86"/>
  <text class="label" x="292" y="338">BufferMapping</text>
  <text class="text" x="292" y="364">块到 buffer 的映射</text>

  <rect class="event" x="465" y="305" width="180" height="86"/>
  <text class="label" x="492" y="338">WALInsert</text>
  <text class="text" x="492" y="364">WAL 记录写入内存</text>

  <rect class="event" x="665" y="305" width="160" height="86"/>
  <text class="label" x="692" y="338">WALWrite</text>
  <text class="text" x="692" y="364">WAL 写盘或刷盘</text>

  <rect class="event" x="845" y="305" width="150" height="86"/>
  <text class="label" x="872" y="338">LockManager</text>
  <text class="text" x="872" y="364">重锁表内部状态</text>

  <rect class="cause" x="65" y="465" width="180" height="92"/>
  <text class="text" x="92" y="493">高并发取快照、</text>
  <text class="text" x="92" y="518">事务集中提交、</text>
  <text class="text" x="92" y="543">长事务影响清理边界</text>

  <rect class="cause" x="265" y="465" width="180" height="92"/>
  <text class="text" x="292" y="493">随机读写热点页、</text>
  <text class="text" x="292" y="518">共享缓冲区频繁替换、</text>
  <text class="text" x="292" y="543">buffer hash 分区热点</text>

  <rect class="cause" x="465" y="465" width="180" height="92"/>
  <text class="text" x="492" y="493">大量小事务、</text>
  <text class="text" x="492" y="518">WAL 插入锁竞争、</text>
  <text class="text" x="492" y="543">提交路径过密</text>

  <rect class="cause" x="665" y="465" width="160" height="92"/>
  <text class="text" x="692" y="493">WAL I/O 慢、</text>
  <text class="text" x="692" y="518">同步提交刷盘压力、</text>
  <text class="text" x="692" y="543">检查点或存储抖动</text>

  <rect class="cause" x="845" y="465" width="150" height="92"/>
  <text class="text" x="872" y="493">大量对象锁、</text>
  <text class="text" x="872" y="518">DDL/DML 混跑、</text>
  <text class="text" x="872" y="543">锁表分区竞争</text>

  <path class="line" d="M155 391 V465"/>
  <path class="line" d="M355 391 V465"/>
  <path class="line" d="M555 391 V465"/>
  <path class="line" d="M745 391 V465"/>
  <path class="line" d="M920 391 V465"/>
</svg>
