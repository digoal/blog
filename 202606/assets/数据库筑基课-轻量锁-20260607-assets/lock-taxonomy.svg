<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL 锁层次：Spinlock、LWLock、Heavyweight Lock 与 Predicate Lock</title>
  <desc id="desc">展示 PostgreSQL 不同锁机制的保护对象、等待方式、死锁检测和典型用途，突出 LWLock 位于共享内存内部并发控制层。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#355070"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f7f9fb; }
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 18px sans-serif; fill: #111827; }
    .small { font: 14px sans-serif; fill: #374151; }
    .tiny { font: 12px sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke-width: 2; rx: 8; }
    .spin { stroke: #d95d39; }
    .lw { stroke: #2a9d8f; }
    .heavy { stroke: #3a6ea5; }
    .pred { stroke: #7c3aed; }
    .band { fill: #edf2f7; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .arrow { stroke: #355070; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="title" x="40" y="48">PostgreSQL 锁层次：LWLock 是内部共享内存锁，不是业务 SQL 锁</text>

  <rect class="band" x="50" y="82" width="880" height="70"/>
  <text class="label" x="80" y="113">保护层次从 CPU 临界区到 SQL 对象</text>
  <text class="small" x="80" y="137">越靠左越短、越底层；越靠右越接近用户可见事务语义，功能更完整但代价更高。</text>

  <rect class="box spin" x="55" y="195" width="205" height="230"/>
  <text class="label" x="82" y="230">Spinlock</text>
  <text class="small" x="82" y="265">保护极短临界区</text>
  <text class="small" x="82" y="294">等待：忙等</text>
  <text class="small" x="82" y="323">无死锁检测</text>
  <text class="small" x="82" y="352">典型：LWLock 内部队列锁</text>
  <text class="tiny" x="82" y="392">只能持有几十条指令级别</text>

  <rect class="box lw" x="285" y="195" width="205" height="230"/>
  <text class="label" x="312" y="230">LWLock</text>
  <text class="small" x="312" y="265">保护共享内存结构</text>
  <text class="small" x="312" y="294">等待：信号量睡眠</text>
  <text class="small" x="312" y="323">无死锁检测、无超时</text>
  <text class="small" x="312" y="352">模式：共享 / 排他</text>
  <text class="tiny" x="312" y="392">典型：ProcArray、BufferMapping</text>

  <rect class="box heavy" x="515" y="195" width="205" height="230"/>
  <text class="label" x="542" y="230">Heavyweight Lock</text>
  <text class="small" x="542" y="265">保护 SQL 可见对象</text>
  <text class="small" x="542" y="294">等待：锁管理器队列</text>
  <text class="small" x="542" y="323">有死锁检测</text>
  <text class="small" x="542" y="352">事务结束自动释放</text>
  <text class="tiny" x="542" y="392">典型：relation、transactionid</text>

  <rect class="box pred" x="745" y="195" width="180" height="230"/>
  <text class="label" x="772" y="230">Predicate Lock</text>
  <text class="small" x="772" y="265">Serializable 冲突检测</text>
  <text class="small" x="772" y="294">记录读依赖</text>
  <text class="small" x="772" y="323">防止写偏斜</text>
  <text class="small" x="772" y="352">基于 SSI</text>
  <text class="tiny" x="772" y="392">不是普通阻塞锁</text>

  <path class="arrow" d="M260 310 H280"/>
  <path class="arrow" d="M490 310 H510"/>
  <path class="arrow" d="M720 310 H740"/>

  <text class="small" x="120" y="470">工程判断：需要跨 I/O、长等待、用户可控或需要死锁检测时，不应使用 LWLock。</text>
</svg>
