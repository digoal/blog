<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">LWLock 内部状态：tranche、state 与等待队列</title>
  <desc id="desc">展示 LWLock 结构由 tranche 标识、原子 state 和 waiters 等字段组成，state 高位是标志位，低位表达共享计数或排他哨兵值。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px sans-serif; fill: #1f2937; }
    .label { font: 700 17px sans-serif; fill: #111827; }
    .text { font: 14px sans-serif; fill: #374151; }
    .tiny { font: 12px sans-serif; fill: #4b5563; }
    .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.8; rx: 8; }
    .field { fill: #eef6f6; stroke: #2a9d8f; stroke-width: 1.4; rx: 6; }
    .flag { fill: #fff3e8; stroke: #e76f51; stroke-width: 1.3; }
    .count { fill: #e8f1ff; stroke: #3a6ea5; stroke-width: 1.3; }
    .queue { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.3; rx: 6; }
    .line { stroke: #64748b; stroke-width: 1.5; fill: none; }
  </style>
  <rect class="bg" x="0" y="0" width="980" height="560"/>
  <text class="title" x="42" y="48">LWLock 的结构：一个原子状态字 + 一个等待队列</text>

  <rect class="card" x="55" y="88" width="350" height="390"/>
  <text class="label" x="85" y="126">typedef struct LWLock</text>
  <rect class="field" x="85" y="155" width="280" height="52"/>
  <text class="label" x="110" y="187">uint16 tranche</text>
  <text class="text" x="110" y="228">等待事件名和锁用途分类，例如 ProcArray、BufferMapping。</text>

  <rect class="field" x="85" y="255" width="280" height="52"/>
  <text class="label" x="110" y="287">pg_atomic_uint32 state</text>
  <text class="text" x="110" y="328">用 CAS 表达排他占用、共享持有者数量和等待标志。</text>

  <rect class="field" x="85" y="355" width="280" height="52"/>
  <text class="label" x="110" y="387">proclist_head waiters</text>
  <text class="text" x="110" y="428">等待中的 PGPROC 链表，释放时按可获得锁的机会唤醒。</text>

  <rect class="card" x="455" y="88" width="470" height="190"/>
  <text class="label" x="485" y="126">state 的 32 位布局</text>
  <rect class="flag" x="485" y="155" width="92" height="54"/>
  <rect class="flag" x="577" y="155" width="92" height="54"/>
  <rect class="flag" x="669" y="155" width="92" height="54"/>
  <rect class="count" x="761" y="155" width="130" height="54"/>
  <text class="tiny" x="494" y="178">HAS_WAITERS</text>
  <text class="tiny" x="590" y="178">WAKE_IN</text>
  <text class="tiny" x="592" y="196">PROGRESS</text>
  <text class="tiny" x="690" y="187">LOCKED</text>
  <text class="tiny" x="781" y="187">lock mask</text>
  <text class="text" x="485" y="238">高 3 位是内部协调标志；低位用共享计数或排他哨兵值表达锁占用。</text>

  <rect class="card" x="455" y="310" width="470" height="168"/>
  <text class="label" x="485" y="348">两种持有语义</text>
  <rect class="count" x="485" y="372" width="180" height="58"/>
  <text class="label" x="510" y="405">LW_SHARED</text>
  <text class="text" x="510" y="454">没有排他持有者时，共享持有者数量递增。</text>
  <rect class="flag" x="700" y="372" width="190" height="58"/>
  <text class="label" x="725" y="405">LW_EXCLUSIVE</text>
  <text class="text" x="725" y="454">空闲时写入排他哨兵值，阻塞共享和排他申请。</text>

  <path class="line" d="M365 281 C415 281 420 182 485 182"/>
  <path class="line" d="M365 381 C420 381 430 405 485 405"/>
</svg>
