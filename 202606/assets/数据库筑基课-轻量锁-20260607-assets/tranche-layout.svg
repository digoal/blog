<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" role="img" aria-labelledby="title desc">
  <title id="title">LWLock tranche 与 MainLWLockArray 布局</title>
  <desc id="desc">展示 PostgreSQL 在共享内存中初始化 MainLWLockArray，包含预定义单个锁、BufferMapping 分区锁、LockManager 分区锁、PredicateLockManager 分区锁，以及扩展申请的命名 tranche。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px sans-serif; fill: #111827; }
    .label { font: 700 16px sans-serif; fill: #111827; }
    .text { font: 13px sans-serif; fill: #374151; }
    .seg1 { fill: #e8f7f1; stroke: #2a9d8f; stroke-width: 1.5; rx: 6; }
    .seg2 { fill: #e8f1ff; stroke: #3a6ea5; stroke-width: 1.5; rx: 6; }
    .seg3 { fill: #fff3e8; stroke: #e76f51; stroke-width: 1.5; rx: 6; }
    .seg4 { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.5; rx: 6; }
    .seg5 { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; rx: 6; }
    .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .line { stroke: #334155; stroke-width: 1.8; marker-end: url(#arrow); fill: none; }
  </style>
  <rect class="bg" x="0" y="0" width="1060" height="560"/>
  <text class="title" x="42" y="48">Tranche：把锁实例映射成可观测的用途名称</text>

  <rect class="card" x="60" y="90" width="940" height="130"/>
  <text class="label" x="90" y="126">MainLWLockArray 共享内存数组</text>
  <rect class="seg1" x="90" y="150" width="220" height="44"/>
  <text class="text" x="108" y="177">预定义单个锁：ProcArray、WALWrite...</text>
  <rect class="seg2" x="310" y="150" width="225" height="44"/>
  <text class="text" x="328" y="177">BufferMapping 分区锁：128 个</text>
  <rect class="seg3" x="535" y="150" width="170" height="44"/>
  <text class="text" x="553" y="177">LockManager：16 个</text>
  <rect class="seg4" x="705" y="150" width="195" height="44"/>
  <text class="text" x="723" y="177">PredicateLockManager：16 个</text>
  <rect class="seg5" x="900" y="150" width="70" height="44"/>
  <text class="text" x="913" y="177">扩展</text>

  <rect class="card" x="70" y="285" width="290" height="170"/>
  <text class="label" x="98" y="321">预定义单个锁</text>
  <text class="text" x="98" y="350">每个锁有固定 ID 和名称。</text>
  <text class="text" x="98" y="377">wait_event 可显示为 ProcArray、</text>
  <text class="text" x="98" y="400">XidGen、WALWrite 等。</text>

  <rect class="card" x="395" y="285" width="290" height="170"/>
  <text class="label" x="423" y="321">内置 tranche</text>
  <text class="text" x="423" y="350">多个锁共享同一用途名。</text>
  <text class="text" x="423" y="377">BufferMapping 用 128 个分区</text>
  <text class="text" x="423" y="400">降低共享哈希表热点。</text>

  <rect class="card" x="720" y="285" width="280" height="170"/>
  <text class="label" x="748" y="321">用户定义 tranche</text>
  <text class="text" x="748" y="350">扩展可在启动时申请命名锁。</text>
  <text class="text" x="748" y="377">也可用 LWLockNewTrancheId</text>
  <text class="text" x="748" y="400">为自有共享内存结构命名。</text>

  <path class="line" d="M200 194 C190 240 170 260 165 285"/>
  <path class="line" d="M425 194 C445 240 505 260 540 285"/>
  <path class="line" d="M935 194 C935 240 880 260 860 285"/>

  <text class="text" x="92" y="505">读法：tranche 不是锁模式，而是“这把锁属于哪类共享资源”的名字，最终进入 wait_event。</text>
</svg>
