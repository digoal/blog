<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760" role="img" aria-labelledby="title desc">
  <title id="title">重量锁获取路径</title>
  <desc id="desc">展示 LockAcquireExtended 从本地命中、fast-path、共享锁表冲突检查到等待队列的主要路径。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.3; }
    .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.3; }
    .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 1.3; }
    .wait { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.3; }
    .fast { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.3; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 21px; fill: #0f172a; }
    .small { font-size: 17px; fill: #334155; }
    .tiny { font-size: 14px; fill: #475569; }
    .title { font-size: 28px; font-weight: 700; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1240" height="760" />
  <text class="text title" x="50" y="48">LockAcquireExtended：先省成本，再进共享表，冲突才睡眠</text>

  <rect class="box" x="70" y="90" width="230" height="78" rx="8" />
  <text class="text" x="95" y="123">请求锁</text>
  <text class="small" x="95" y="150">LOCKTAG + LOCKMODE</text>

  <rect class="decision" x="400" y="82" width="250" height="94" rx="8" />
  <text class="text" x="426" y="119">本地已持有？</text>
  <text class="small" x="426" y="148">LOCALLOCK.nLocks &gt; 0</text>

  <rect class="ok" x="760" y="90" width="230" height="78" rx="8" />
  <text class="text" x="792" y="123">本地计数 +1</text>
  <text class="small" x="792" y="150">无需访问共享内存</text>

  <rect class="decision" x="400" y="240" width="250" height="96" rx="8" />
  <text class="text" x="426" y="276">可走 fast-path？</text>
  <text class="small" x="426" y="306">弱 relation 锁且无强锁</text>

  <rect class="fast" x="760" y="244" width="230" height="88" rx="8" />
  <text class="text" x="792" y="279">写 PGPROC 槽位</text>
  <text class="small" x="792" y="307">pg_locks.fastpath=true</text>

  <rect class="box" x="400" y="410" width="250" height="106" rx="8" />
  <text class="text" x="426" y="448">进入共享锁表</text>
  <text class="small" x="426" y="477">SetupLockInTable()</text>
  <text class="small" x="426" y="502">创建/找到 LOCK + PROCLOCK</text>

  <rect class="decision" x="760" y="406" width="250" height="116" rx="8" />
  <text class="text" x="792" y="444">冲突检查</text>
  <text class="small" x="792" y="473">waitMask 先挡队列插队</text>
  <text class="small" x="792" y="498">grantMask 对 conflictTab</text>

  <rect class="ok" x="100" y="610" width="230" height="84" rx="8" />
  <text class="text" x="130" y="646">GrantLock()</text>
  <text class="small" x="130" y="674">更新 grantMask / granted[]</text>

  <rect class="wait" x="520" y="610" width="230" height="84" rx="8" />
  <text class="text" x="550" y="646">JoinWaitQueue()</text>
  <text class="small" x="550" y="674">进入 waitProcs 队列</text>

  <rect class="wait" x="910" y="610" width="230" height="84" rx="8" />
  <text class="text" x="940" y="646">ProcSleep()</text>
  <text class="small" x="940" y="674">等待唤醒 / 超时检查</text>

  <path class="arrow" d="M300 129 H400" />
  <path class="arrow" d="M650 129 H760" />
  <text class="tiny" x="676" y="114">是</text>
  <path class="arrow" d="M525 176 V240" />
  <text class="tiny" x="535" y="210">否</text>
  <path class="arrow" d="M650 288 H760" />
  <text class="tiny" x="676" y="274">是</text>
  <path class="arrow" d="M525 336 V410" />
  <text class="tiny" x="535" y="374">否</text>
  <path class="arrow" d="M650 463 H760" />
  <path class="arrow" d="M835 522 C790 594 430 592 330 640" />
  <text class="tiny" x="610" y="594">无冲突</text>
  <path class="arrow" d="M900 522 C908 570 660 568 635 610" />
  <text class="tiny" x="815" y="580">有冲突</text>
  <path class="arrow" d="M750 652 H910" />
  <path class="dash" d="M1010 610 C1030 520 950 492 1010 452" />
  <text class="tiny" x="1032" y="548">释放或队列重排后唤醒</text>

  <rect class="fast" x="64" y="218" width="258" height="128" rx="8" />
  <text class="small" x="88" y="254">强锁请求会先：</text>
  <text class="tiny" x="88" y="282">1. 增加 strong-lock 计数</text>
  <text class="tiny" x="88" y="308">2. 把相关 fast-path 锁迁移进主表</text>
  <text class="tiny" x="88" y="334">3. 再做统一冲突/死锁判断</text>
</svg>
