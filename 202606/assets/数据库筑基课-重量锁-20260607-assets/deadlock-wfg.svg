<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="720" viewBox="0 0 1240 720" role="img" aria-labelledby="title desc">
  <title id="title">等待队列与死锁检测</title>
  <desc id="desc">展示重量锁等待队列、hard block、soft block 和 waits-for graph 死锁检测之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.3; }
    .proc { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.2; }
    .hold { fill: #ecfdf5; stroke: #059669; stroke-width: 1.2; }
    .wait { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; }
    .soft { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.2; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 21px; fill: #0f172a; }
    .small { font-size: 17px; fill: #334155; }
    .tiny { font-size: 14px; fill: #475569; }
    .title { font-size: 28px; font-weight: 700; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .redarrow { stroke: #dc2626; stroke-width: 2.4; fill: none; marker-end: url(#redarrow); }
    .orangearrow { stroke: #ea580c; stroke-width: 2.2; stroke-dasharray: 7 5; fill: none; marker-end: url(#orangearrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626" />
    </marker>
    <marker id="orangearrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c" />
    </marker>
  </defs>
  <rect class="bg" width="1240" height="720" />
  <text class="text title" x="50" y="48">重量锁死锁检测：先乐观等待，超时后构造 waits-for graph</text>

  <rect class="panel" x="60" y="90" width="500" height="520" rx="8" />
  <text class="text" x="92" y="130">同一个 LOCK 的状态</text>
  <rect class="hold" x="92" y="170" width="180" height="82" rx="8" />
  <text class="small" x="120" y="204">Backend A</text>
  <text class="tiny" x="120" y="230">已持有 ShareLock</text>
  <rect class="wait" x="330" y="170" width="180" height="82" rx="8" />
  <text class="small" x="358" y="204">Backend B</text>
  <text class="tiny" x="358" y="230">等待 ExclusiveLock</text>
  <text class="small" x="92" y="304">waitProcs 队列</text>
  <rect class="soft" x="92" y="334" width="112" height="58" rx="8" />
  <text class="tiny" x="122" y="368">B: EXCL</text>
  <rect class="soft" x="236" y="334" width="112" height="58" rx="8" />
  <text class="tiny" x="266" y="368">C: SHARE</text>
  <rect class="soft" x="380" y="334" width="112" height="58" rx="8" />
  <text class="tiny" x="410" y="368">D: EXCL</text>
  <path class="arrow" d="M204 363 H236" />
  <path class="arrow" d="M348 363 H380" />
  <text class="tiny" x="92" y="432">hard block：等待者被已持有冲突锁的人挡住。</text>
  <text class="tiny" x="92" y="460">soft block：等待者被队列前方、请求模式冲突的人挡住。</text>
  <text class="tiny" x="92" y="488">释放锁时 ProcLockWakeup 按 grantMask 与前序等待者判断谁能醒。</text>

  <rect class="panel" x="640" y="90" width="500" height="520" rx="8" />
  <text class="text" x="672" y="130">waits-for graph</text>
  <circle class="proc" cx="790" cy="240" r="58" />
  <text class="small" x="760" y="247">A</text>
  <circle class="proc" cx="990" cy="240" r="58" />
  <text class="small" x="960" y="247">B</text>
  <circle class="proc" cx="990" cy="440" r="58" />
  <text class="small" x="960" y="447">C</text>
  <circle class="proc" cx="790" cy="440" r="58" />
  <text class="small" x="760" y="447">D</text>
  <path class="redarrow" d="M845 240 H932" />
  <path class="redarrow" d="M990 298 V382" />
  <path class="orangearrow" d="M935 440 H848" />
  <path class="redarrow" d="M790 382 V298" />
  <text class="tiny" x="874" y="224">hard</text>
  <text class="tiny" x="1010" y="346">hard</text>
  <text class="tiny" x="880" y="424">soft</text>
  <text class="tiny" x="742" y="346">hard</text>
  <rect class="soft" x="700" y="540" width="380" height="70" rx="8" />
  <text class="small" x="724" y="572">有 soft edge：尝试拓扑排序重排队列</text>
  <text class="tiny" x="724" y="598">无可行重排或全是 hard edge：报死锁并中止一个事务</text>

  <rect class="wait" x="180" y="638" width="880" height="42" rx="8" />
  <text class="small" x="210" y="665">deadlock_timeout 触发后才检查，常规等待不会每次都跑昂贵的全局死锁检测。</text>
</svg>
