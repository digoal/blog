<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">重量锁对象如何映射为 LOCKTAG</title>
  <desc id="desc">展示 SQL 可见对象、内部等待对象如何映射为 16 字节 LOCKTAG，并最终出现在 pg_locks 视图中。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.4; }
    .soft { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.2; }
    .warm { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.2; }
    .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.2; }
    .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.1; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-size: 18px; fill: #334155; }
    .tiny { font-size: 15px; fill: #475569; }
    .title { font-size: 28px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 17px; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620" />
  <text class="text title" x="50" y="48">从业务对象到锁对象：重量锁先回答“锁谁”</text>

  <rect class="panel" x="50" y="82" width="280" height="430" rx="8" />
  <text class="text" x="78" y="122">SQL / 内部动作</text>
  <rect class="soft" x="78" y="152" width="224" height="58" rx="6" />
  <text class="small" x="98" y="187">SELECT / DML 表锁</text>
  <rect class="soft" x="78" y="228" width="224" height="58" rx="6" />
  <text class="small" x="98" y="263">ALTER / DROP / DDL</text>
  <rect class="warm" x="78" y="304" width="224" height="58" rx="6" />
  <text class="small" x="98" y="339">等待事务结束</text>
  <rect class="green" x="78" y="380" width="224" height="58" rx="6" />
  <text class="small" x="98" y="415">咨询锁 / 扩展关系</text>

  <rect class="panel" x="430" y="82" width="360" height="430" rx="8" />
  <text class="text" x="462" y="122">LOCKTAG 16 字节键</text>
  <rect class="gray" x="462" y="152" width="286" height="56" rx="6" />
  <text class="mono" x="485" y="186">field1: dbOid / xid / id1</text>
  <rect class="gray" x="462" y="218" width="286" height="56" rx="6" />
  <text class="mono" x="485" y="252">field2: relOid / classOid</text>
  <rect class="gray" x="462" y="284" width="286" height="56" rx="6" />
  <text class="mono" x="485" y="318">field3: block / objOid</text>
  <rect class="gray" x="462" y="350" width="286" height="56" rx="6" />
  <text class="mono" x="485" y="384">field4: offnum / subid</text>
  <rect class="gray" x="462" y="416" width="286" height="56" rx="6" />
  <text class="mono" x="485" y="450">type + lockmethodid</text>

  <rect class="panel" x="890" y="82" width="260" height="430" rx="8" />
  <text class="text" x="922" y="122">pg_locks 观察</text>
  <rect class="soft" x="922" y="152" width="194" height="50" rx="6" />
  <text class="small" x="944" y="184">relation / object</text>
  <rect class="soft" x="922" y="216" width="194" height="50" rx="6" />
  <text class="small" x="944" y="248">transactionid</text>
  <rect class="soft" x="922" y="280" width="194" height="50" rx="6" />
  <text class="small" x="944" y="312">virtualxid</text>
  <rect class="soft" x="922" y="344" width="194" height="50" rx="6" />
  <text class="small" x="944" y="376">extend / tuple</text>
  <rect class="soft" x="922" y="408" width="194" height="50" rx="6" />
  <text class="small" x="944" y="440">advisory</text>

  <path class="arrow" d="M330 292 H430" />
  <path class="arrow" d="M790 292 H890" />
  <text class="tiny" x="360" y="276">SET_LOCKTAG_*</text>
  <text class="tiny" x="810" y="276">lockfuncs.c</text>

  <rect class="warm" x="90" y="540" width="1020" height="54" rx="8" />
  <text class="small" x="116" y="574">重点：重量锁不是只锁表。表、页、元组、事务 ID、虚拟事务 ID、对象、咨询锁、关系扩展权都可以成为 lockable object。</text>
</svg>
