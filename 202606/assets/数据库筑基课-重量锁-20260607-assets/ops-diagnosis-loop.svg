<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="700" viewBox="0 0 1240 700" role="img" aria-labelledby="title desc">
  <title id="title">重量锁问题排查闭环</title>
  <desc id="desc">展示从线上阻塞现象到 pg_stat_activity、pg_locks、pg_blocking_pids、SQL/DDL 根因定位和处置的闭环。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.3; }
    .obs { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.2; }
    .diag { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.2; }
    .act { fill: #ecfdf5; stroke: #059669; stroke-width: 1.2; }
    .risk { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 21px; fill: #0f172a; }
    .small { font-size: 17px; fill: #334155; }
    .tiny { font-size: 14px; fill: #475569; }
    .title { font-size: 28px; font-weight: 700; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1240" height="700" />
  <text class="text title" x="50" y="48">重量锁运维闭环：不要只看“谁 blocked 谁”，还要看“为什么持有这么久”</text>

  <rect class="obs" x="80" y="110" width="240" height="110" rx="8" />
  <text class="text" x="108" y="148">现象</text>
  <text class="tiny" x="108" y="178">SQL 堆积 / DDL 卡住</text>
  <text class="tiny" x="108" y="204">wait_event_type = Lock</text>

  <rect class="diag" x="450" y="100" width="280" height="130" rx="8" />
  <text class="text" x="478" y="138">定位等待对象</text>
  <text class="tiny" x="478" y="168">pg_stat_activity</text>
  <text class="tiny" x="478" y="194">pg_locks.locktype / mode</text>
  <text class="tiny" x="478" y="220">granted=false / waitstart</text>

  <rect class="diag" x="860" y="110" width="260" height="110" rx="8" />
  <text class="text" x="888" y="148">找到阻塞链</text>
  <text class="tiny" x="888" y="178">pg_blocking_pids(pid)</text>
  <text class="tiny" x="888" y="204">区分 hard / soft block</text>

  <rect class="box" x="860" y="330" width="260" height="128" rx="8" />
  <text class="text" x="888" y="368">判断根因</text>
  <text class="tiny" x="888" y="398">长事务？空闲事务？</text>
  <text class="tiny" x="888" y="424">DDL 锁等级过强？</text>
  <text class="tiny" x="888" y="450">批量作业/分区过多？</text>

  <rect class="act" x="450" y="322" width="280" height="146" rx="8" />
  <text class="text" x="478" y="360">处置</text>
  <text class="tiny" x="478" y="390">缩短事务 / 分批提交</text>
  <text class="tiny" x="478" y="416">把 DDL 放维护窗口</text>
  <text class="tiny" x="478" y="442">NOWAIT / lock_timeout 防雪崩</text>

  <rect class="risk" x="80" y="330" width="240" height="128" rx="8" />
  <text class="text" x="108" y="368">复盘边界</text>
  <text class="tiny" x="108" y="398">deadlock_timeout</text>
  <text class="tiny" x="108" y="424">log_lock_waits</text>
  <text class="tiny" x="108" y="450">max_locks_per_transaction</text>

  <rect class="box" x="260" y="560" width="720" height="64" rx="8" />
  <text class="small" x="292" y="586">生产原则：锁等待是结果，不是根因。</text>
  <text class="tiny" x="292" y="612">先保服务，再定位锁对象和阻塞链，最后修事务边界、DDL 策略、批处理粒度和观测配置。</text>

  <path class="arrow" d="M320 165 H450" />
  <path class="arrow" d="M730 165 H860" />
  <path class="arrow" d="M990 220 V330" />
  <path class="arrow" d="M860 394 H730" />
  <path class="arrow" d="M450 394 H320" />
  <path class="arrow" d="M200 458 C230 535 350 560 420 560" />
  <path class="arrow" d="M980 560 C1100 520 1120 250 1120 220" />
</svg>
