<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">重量锁共享表的三层结构</title>
  <desc id="desc">展示本地 LOCALLOCK、共享 LOCK、PROCLOCK 和 PGPROC 等结构之间的关系。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.4; }
    .local { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.2; }
    .shared { fill: #ecfdf5; stroke: #059669; stroke-width: 1.2; }
    .proc { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.2; }
    .muted { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.1; }
    .text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 22px; fill: #0f172a; }
    .small { font-size: 18px; fill: #334155; }
    .tiny { font-size: 15px; fill: #475569; }
    .title { font-size: 28px; font-weight: 700; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 16px; fill: #0f172a; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="700" />
  <text class="text title" x="50" y="48">重量锁状态：本地计数 + 共享锁对象 + 后端等待队列</text>

  <rect class="panel" x="50" y="86" width="270" height="520" rx="8" />
  <text class="text" x="80" y="126">单个 backend 本地</text>
  <rect class="local" x="82" y="162" width="206" height="126" rx="8" />
  <text class="small" x="108" y="198">LOCALLOCK</text>
  <text class="tiny" x="108" y="230">locktag + mode</text>
  <text class="tiny" x="108" y="256">nLocks / owner 计数</text>
  <rect class="local" x="82" y="330" width="206" height="110" rx="8" />
  <text class="small" x="108" y="366">ResourceOwner</text>
  <text class="tiny" x="108" y="396">事务 / 子事务</text>
  <text class="tiny" x="108" y="422">错误时自动释放</text>
  <rect class="muted" x="82" y="476" width="206" height="62" rx="8" />
  <text class="small" x="108" y="514">重复获取只加本地计数</text>

  <rect class="panel" x="420" y="86" width="360" height="520" rx="8" />
  <text class="text" x="455" y="126">共享内存锁表分区</text>
  <rect class="shared" x="462" y="160" width="276" height="148" rx="8" />
  <text class="small" x="492" y="196">LOCK</text>
  <text class="tiny" x="492" y="226">tag: lockable object</text>
  <text class="tiny" x="492" y="252">grantMask / waitMask</text>
  <text class="tiny" x="492" y="278">requested[] / granted[]</text>
  <rect class="shared" x="462" y="350" width="276" height="128" rx="8" />
  <text class="small" x="492" y="386">waitProcs 队列</text>
  <text class="tiny" x="492" y="416">等待同一个 LOCK 的 PGPROC</text>
  <text class="tiny" x="492" y="442">释放锁时按冲突规则唤醒</text>

  <rect class="panel" x="870" y="86" width="270" height="520" rx="8" />
  <text class="text" x="905" y="126">每个后端在共享表中</text>
  <rect class="proc" x="902" y="160" width="206" height="126" rx="8" />
  <text class="small" x="928" y="196">PROCLOCK</text>
  <text class="tiny" x="928" y="226">LOCK + PGPROC</text>
  <text class="tiny" x="928" y="252">holdMask / releaseMask</text>
  <rect class="proc" x="902" y="334" width="206" height="126" rx="8" />
  <text class="small" x="928" y="370">PGPROC</text>
  <text class="tiny" x="928" y="400">waitLock / waitLockMode</text>
  <text class="tiny" x="928" y="426">pid / latch / waitStart</text>
  <rect class="muted" x="902" y="506" width="206" height="62" rx="8" />
  <text class="small" x="928" y="544">fast-path 槽在 PGPROC</text>

  <path class="arrow" d="M288 224 C350 224 378 224 462 224" />
  <path class="arrow" d="M738 224 C800 224 820 224 902 224" />
  <path class="arrow" d="M1005 334 V286" />
  <path class="dash" d="M1005 460 C1005 502 800 526 738 432" />
  <path class="dash" d="M185 288 V330" />
  <text class="tiny" x="332" y="207">hash(LOCKTAG)</text>
  <text class="tiny" x="790" y="207">每个 holder/waiter 一条</text>

  <rect class="muted" x="102" y="630" width="996" height="44" rx="8" />
  <text class="small" x="128" y="658">共享表只记录“这个 backend 是否持有/等待某模式”；同一事务内重复获取同一锁的次数由 LOCALLOCK 维护。</text>
</svg>
