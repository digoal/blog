<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="s3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="820" height="400" fill="#f7f8fc" rx="12"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="#2c3e50" font-size="18" font-weight="bold">BRD 四象限质量模型</text>
  <text x="410" y="56" text-anchor="middle" fill="#888" font-size="12">横轴：用户视角完整性  ·  纵轴：商业可行性清晰度</text>

  <!-- Axes -->
  <line x1="410" y1="70" x2="410" y2="370" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="60" y1="220" x2="770" y2="220" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Axis labels -->
  <text x="410" y="68" text-anchor="middle" fill="#5c6bc0" font-size="11" font-weight="bold">商业可行性 ↑ 高</text>
  <text x="410" y="382" text-anchor="middle" fill="#ef9a9a" font-size="11">商业可行性 ↓ 低</text>
  <text x="64" y="218" fill="#ef9a9a" font-size="11">用户视角 ← 弱</text>
  <text x="670" y="218" fill="#5c6bc0" font-size="11">用户视角 强 →</text>

  <!-- Q2: Top Left - 战略清晰但用户模糊 -->
  <rect x="70" y="78" width="324" height="132" fill="#fff3e0" rx="10" filter="url(#s3)"/>
  <text x="232" y="100" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">⚠️ 战略驱动型（危险区）</text>
  <text x="90" y="122" fill="#666" font-size="11">商业目标清晰，但缺乏用户洞察</text>
  <text x="90" y="140" fill="#666" font-size="11">典型问题：</text>
  <text x="90" y="158" fill="#e65100" font-size="11">• "我们需要做 AI 功能"（无用户验证）</text>
  <text x="90" y="175" fill="#e65100" font-size="11">• 功能是内部决策，不是用户需求</text>
  <text x="90" y="192" fill="#388e3c" font-size="11">✅ 解法：补充用户访谈 + JTBD 分析</text>

  <!-- Q1: Top Right - 双优 -->
  <rect x="420" y="78" width="330" height="132" fill="#e8f5e9" rx="10" filter="url(#s3)"/>
  <text x="585" y="100" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">✅ 黄金 BRD（目标区）</text>
  <text x="440" y="122" fill="#666" font-size="11">用户需求与商业目标双重清晰</text>
  <text x="440" y="140" fill="#666" font-size="11">特征：</text>
  <text x="440" y="158" fill="#2e7d32" font-size="11">• 有真实用户数据支撑的需求定义</text>
  <text x="440" y="175" fill="#2e7d32" font-size="11">• 清晰的 KPI 和验证方式</text>
  <text x="440" y="192" fill="#2e7d32" font-size="11">• 技术可行性已预验证</text>

  <!-- Q3: Bottom Left - 双弱 -->
  <rect x="70" y="230" width="324" height="132" fill="#fce4ec" rx="10" filter="url(#s3)"/>
  <text x="232" y="252" text-anchor="middle" fill="#c62828" font-size="13" font-weight="bold">❌ 概念文档（高风险区）</text>
  <text x="90" y="274" fill="#666" font-size="11">方向模糊，缺乏用户和商业双重论证</text>
  <text x="90" y="292" fill="#c62828" font-size="11">• 大量"可能"、"也许"、"将来"</text>
  <text x="90" y="310" fill="#c62828" font-size="11">• 没有指标，无法判断成功</text>
  <text x="90" y="328" fill="#388e3c" font-size="11">✅ 解法：先做 Discovery，再写 BRD</text>
  <text x="90" y="346" fill="#666" font-size="11">（这种情况不应该直接写 BRD）</text>

  <!-- Q4: Bottom Right - 用户清楚但商业模糊 -->
  <rect x="420" y="230" width="330" height="132" fill="#e3f2fd" rx="10" filter="url(#s3)"/>
  <text x="585" y="252" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">💡 用户洞察型（待提升）</text>
  <text x="440" y="274" fill="#666" font-size="11">用户需求清晰，但商业目标模糊</text>
  <text x="440" y="292" fill="#1565c0" font-size="11">• 有大量用研报告，缺少业务论证</text>
  <text x="440" y="310" fill="#1565c0" font-size="11">• 说了"做什么"，没说"为什么值得做"</text>
  <text x="440" y="328" fill="#388e3c" font-size="11">✅ 解法：补充机会画布 + ROI 分析</text>
  <text x="440" y="346" fill="#666" font-size="11">（拿用研报告去找业务对齐）</text>

  <!-- Center origin point -->
  <circle cx="410" cy="220" r="6" fill="#7986cb"/>
  <text x="420" y="218" fill="#7986cb" font-size="11">评估原点</text>
</svg>
