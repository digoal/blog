<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eeff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="#f7f8fc" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="820" height="64" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="52" width="820" height="12" fill="url(#headerGrad)"/>
  <text x="410" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="bold">BRD 文档结构全景图</text>
  <text x="410" y="56" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="12">Business Requirements Document · 商业需求文档</text>

  <!-- Section 1: 背景与目标 -->
  <rect x="30" y="85" width="230" height="420" fill="url(#boxGrad1)" rx="10" filter="url(#shadow)" stroke="#c5cae9" stroke-width="1"/>
  <rect x="30" y="85" width="230" height="36" fill="#5c6bc0" rx="10"/>
  <rect x="30" y="107" width="230" height="14" fill="#5c6bc0"/>
  <text x="145" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">① 背景与目标</text>
  <text x="50" y="142" fill="#3d3d5c" font-size="12">📌 问题定义</text>
  <text x="65" y="160" fill="#666" font-size="11">• 用户在痛什么？</text>
  <text x="65" y="178" fill="#666" font-size="11">• 市场在发生什么变化？</text>
  <text x="65" y="196" fill="#666" font-size="11">• 现有方案为何不够？</text>
  <text x="50" y="220" fill="#3d3d5c" font-size="12">🎯 业务目标</text>
  <text x="65" y="238" fill="#666" font-size="11">• 核心 KPI 是什么？</text>
  <text x="65" y="256" fill="#666" font-size="11">• 成功如何定义和度量？</text>
  <text x="50" y="280" fill="#3d3d5c" font-size="12">🏢 战略对齐</text>
  <text x="65" y="298" fill="#666" font-size="11">• 与公司战略的关系</text>
  <text x="65" y="316" fill="#666" font-size="11">• 优先级依据</text>
  <text x="50" y="340" fill="#3d3d5c" font-size="12">📊 市场机会</text>
  <text x="65" y="358" fill="#666" font-size="11">• TAM / SAM / SOM</text>
  <text x="65" y="376" fill="#666" font-size="11">• 竞品对比分析</text>
  <text x="50" y="400" fill="#3d3d5c" font-size="12">👥 目标用户</text>
  <text x="65" y="418" fill="#666" font-size="11">• 用户画像</text>
  <text x="65" y="436" fill="#666" font-size="11">• 核心使用场景</text>
  <text x="65" y="454" fill="#666" font-size="11">• 用户旅程地图</text>
  <text x="50" y="478" fill="#3d3d5c" font-size="12">⚠️ 假设与风险</text>

  <!-- Section 2: 需求规格 -->
  <rect x="295" y="85" width="230" height="420" fill="url(#boxGrad1)" rx="10" filter="url(#shadow)" stroke="#c5cae9" stroke-width="1"/>
  <rect x="295" y="85" width="230" height="36" fill="#43a047" rx="10"/>
  <rect x="295" y="107" width="230" height="14" fill="#43a047"/>
  <text x="410" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">② 需求规格</text>
  <text x="315" y="142" fill="#3d3d5c" font-size="12">📝 功能需求</text>
  <text x="330" y="160" fill="#666" font-size="11">• 核心功能列表</text>
  <text x="330" y="178" fill="#666" font-size="11">• 用户故事 (User Stories)</text>
  <text x="330" y="196" fill="#666" font-size="11">• 验收标准 (AC)</text>
  <text x="315" y="220" fill="#3d3d5c" font-size="12">⚡ 非功能需求</text>
  <text x="330" y="238" fill="#666" font-size="11">• 性能 / 安全 / 扩展性</text>
  <text x="330" y="256" fill="#666" font-size="11">• 可用性 / 合规性</text>
  <text x="315" y="280" fill="#3d3d5c" font-size="12">🔗 系统边界</text>
  <text x="330" y="298" fill="#666" font-size="11">• In Scope / Out of Scope</text>
  <text x="330" y="316" fill="#666" font-size="11">• 依赖项与集成点</text>
  <text x="315" y="340" fill="#3d3d5c" font-size="12">🎛️ 优先级排序</text>
  <text x="330" y="358" fill="#666" font-size="11">• MoSCoW 方法</text>
  <text x="330" y="376" fill="#666" font-size="11">• Must / Should / Could</text>
  <text x="315" y="400" fill="#3d3d5c" font-size="12">🔄 业务规则</text>
  <text x="330" y="418" fill="#666" font-size="11">• 数据处理逻辑</text>
  <text x="330" y="436" fill="#666" font-size="11">• 异常流程定义</text>
  <text x="315" y="460" fill="#3d3d5c" font-size="12">📐 原型 / 示意图</text>
  <text x="330" y="478" fill="#666" font-size="11">• 低保真线框 / 流程图</text>

  <!-- Section 3: 执行计划 -->
  <rect x="560" y="85" width="230" height="420" fill="url(#boxGrad1)" rx="10" filter="url(#shadow)" stroke="#c5cae9" stroke-width="1"/>
  <rect x="560" y="85" width="230" height="36" fill="#e65100" rx="10"/>
  <rect x="560" y="107" width="230" height="14" fill="#e65100"/>
  <text x="675" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">③ 执行与验证</text>
  <text x="580" y="142" fill="#3d3d5c" font-size="12">📅 交付计划</text>
  <text x="595" y="160" fill="#666" font-size="11">• MVP 范围定义</text>
  <text x="595" y="178" fill="#666" font-size="11">• 里程碑与时间节点</text>
  <text x="595" y="196" fill="#666" font-size="11">• 迭代规划</text>
  <text x="580" y="220" fill="#3d3d5c" font-size="12">💰 资源与预算</text>
  <text x="595" y="238" fill="#666" font-size="11">• 人力资源需求</text>
  <text x="595" y="256" fill="#666" font-size="11">• 成本估算 / ROI</text>
  <text x="580" y="280" fill="#3d3d5c" font-size="12">📈 成功指标</text>
  <text x="595" y="298" fill="#666" font-size="11">• 北极星指标</text>
  <text x="595" y="316" fill="#666" font-size="11">• 指标追踪方案</text>
  <text x="580" y="340" fill="#3d3d5c" font-size="12">🔬 上线策略</text>
  <text x="595" y="358" fill="#666" font-size="11">• A/B 测试计划</text>
  <text x="595" y="376" fill="#666" font-size="11">• 灰度发布策略</text>
  <text x="580" y="400" fill="#3d3d5c" font-size="12">🚨 风险应对</text>
  <text x="595" y="418" fill="#666" font-size="11">• 风险矩阵</text>
  <text x="595" y="436" fill="#666" font-size="11">• 降级与回滚方案</text>
  <text x="580" y="460" fill="#3d3d5c" font-size="12">👥 干系人管理</text>
  <text x="595" y="478" fill="#666" font-size="11">• RACI 矩阵</text>

  <!-- Arrows between sections -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7986cb"/>
    </marker>
  </defs>
  <line x1="260" y1="295" x2="292" y2="295" stroke="#7986cb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="525" y1="295" x2="557" y2="295" stroke="#7986cb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Bottom note -->
  <rect x="30" y="518" width="760" height="28" fill="#ede7f6" rx="6"/>
  <text x="410" y="536" text-anchor="middle" fill="#5e35b1" font-size="12">💡 一份好的 BRD 核心是"说服力"：让读者相信——这个问题值得解决、这个方案是最优解、这个团队能交付</text>
</svg>
