<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <rect width="820" height="480" fill="#fafbff" rx="12"/>
  <text x="410" y="38" text-anchor="middle" fill="#2c3e50" font-size="20" font-weight="bold">BRD 写作的五步工作流</text>
  <text x="410" y="58" text-anchor="middle" fill="#888" font-size="13">从 Idea 到 Sign-off 的完整路径</text>

  <!-- Step 1 -->
  <rect x="30" y="82" width="140" height="340" fill="white" rx="12" filter="url(#shadow2)"/>
  <rect x="30" y="82" width="140" height="52" fill="url(#stepGrad1)" rx="12"/>
  <rect x="30" y="118" width="140" height="16" fill="url(#stepGrad1)"/>
  <text x="100" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Step 1</text>
  <text x="100" y="124" text-anchor="middle" fill="white" font-size="12">问题发现</text>
  <text x="50" y="156" fill="#444" font-size="11">🔍 用户访谈</text>
  <text x="50" y="174" fill="#666" font-size="10">  N≥5 深度访谈</text>
  <text x="50" y="194" fill="#444" font-size="11">📊 数据分析</text>
  <text x="50" y="212" fill="#666" font-size="10">  漏斗/留存/投诉</text>
  <text x="50" y="232" fill="#444" font-size="11">🏪 竞品调研</text>
  <text x="50" y="250" fill="#666" font-size="10">  功能对比矩阵</text>
  <text x="50" y="270" fill="#444" font-size="11">💡 战略对话</text>
  <text x="50" y="288" fill="#666" font-size="10">  与 CEO/GM 对齐</text>
  <rect x="42" y="308" width="116" height="36" fill="#f3e5f5" rx="6"/>
  <text x="100" y="326" text-anchor="middle" fill="#7b1fa2" font-size="10" font-weight="bold">输出：问题陈述</text>
  <text x="100" y="340" text-anchor="middle" fill="#7b1fa2" font-size="10">一句话定义问题</text>
  <text x="100" y="400" text-anchor="middle" fill="#999" font-size="10">耗时：1-2周</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="255" x2="195" y2="255" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="197" y="82" width="140" height="340" fill="white" rx="12" filter="url(#shadow2)"/>
  <rect x="197" y="82" width="140" height="52" fill="url(#stepGrad2)" rx="12"/>
  <rect x="197" y="118" width="140" height="16" fill="url(#stepGrad2)"/>
  <text x="267" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Step 2</text>
  <text x="267" y="124" text-anchor="middle" fill="white" font-size="12">机会论证</text>
  <text x="217" y="156" fill="#444" font-size="11">📐 框架选择</text>
  <text x="217" y="174" fill="#666" font-size="10">  Jobs-to-be-Done</text>
  <text x="217" y="192" fill="#666" font-size="10">  JTBD / 5W1H</text>
  <text x="217" y="212" fill="#444" font-size="11">💰 市场规模</text>
  <text x="217" y="230" fill="#666" font-size="10">  TAM/SAM/SOM</text>
  <text x="217" y="250" fill="#444" font-size="11">📈 商业模型</text>
  <text x="217" y="268" fill="#666" font-size="10">  ROI / 变现路径</text>
  <text x="217" y="288" fill="#444" font-size="11">⚖️ 优先级依据</text>
  <text x="217" y="306" fill="#666" font-size="10">  ICE / RICE 评分</text>
  <rect x="209" y="318" width="116" height="36" fill="#fce4ec" rx="6"/>
  <text x="267" y="336" text-anchor="middle" fill="#c62828" font-size="10" font-weight="bold">输出：机会画布</text>
  <text x="267" y="350" text-anchor="middle" fill="#c62828" font-size="10">Why Now &amp; Why Us</text>
  <text x="267" y="400" text-anchor="middle" fill="#999" font-size="10">耗时：3-5天</text>

  <!-- Arrow 2 -->
  <line x1="339" y1="255" x2="362" y2="255" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="364" y="82" width="140" height="340" fill="white" rx="12" filter="url(#shadow2)"/>
  <rect x="364" y="82" width="140" height="52" fill="url(#stepGrad3)" rx="12"/>
  <rect x="364" y="118" width="140" height="16" fill="url(#stepGrad3)"/>
  <text x="434" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Step 3</text>
  <text x="434" y="124" text-anchor="middle" fill="white" font-size="12">需求规格化</text>
  <text x="384" y="156" fill="#444" font-size="11">📝 用户故事</text>
  <text x="384" y="174" fill="#666" font-size="10">  As a / I want / So</text>
  <text x="384" y="192" fill="#444" font-size="11">✅ 验收标准</text>
  <text x="384" y="210" fill="#666" font-size="10">  Given / When / Then</text>
  <text x="384" y="230" fill="#444" font-size="11">🔲 原型设计</text>
  <text x="384" y="248" fill="#666" font-size="10">  低保真线框图</text>
  <text x="384" y="268" fill="#444" font-size="11">🗂️ MoSCoW 排序</text>
  <text x="384" y="286" fill="#666" font-size="10">  Must/Should/Could</text>
  <text x="384" y="306" fill="#444" font-size="11">📋 边界声明</text>
  <rect x="376" y="318" width="116" height="36" fill="#e3f2fd" rx="6"/>
  <text x="434" y="336" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="bold">输出：需求规格</text>
  <text x="434" y="350" text-anchor="middle" fill="#1565c0" font-size="10">可评审的需求文档</text>
  <text x="434" y="400" text-anchor="middle" fill="#999" font-size="10">耗时：1-2周</text>

  <!-- Arrow 3 -->
  <line x1="506" y1="255" x2="529" y2="255" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="531" y="82" width="140" height="340" fill="white" rx="12" filter="url(#shadow2)"/>
  <rect x="531" y="82" width="140" height="52" fill="url(#stepGrad4)" rx="12"/>
  <rect x="531" y="118" width="140" height="16" fill="url(#stepGrad4)"/>
  <text x="601" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Step 4</text>
  <text x="601" y="124" text-anchor="middle" fill="white" font-size="12">对齐与评审</text>
  <text x="551" y="156" fill="#444" font-size="11">🔄 技术可行性</text>
  <text x="551" y="174" fill="#666" font-size="10">  工程团队评估</text>
  <text x="551" y="192" fill="#444" font-size="11">💼 业务审核</text>
  <text x="551" y="210" fill="#666" font-size="10">  法务/运营/财务</text>
  <text x="551" y="230" fill="#444" font-size="11">🔁 迭代修订</text>
  <text x="551" y="248" fill="#666" font-size="10">  收集反馈更新</text>
  <text x="551" y="268" fill="#444" font-size="11">📮 干系人确认</text>
  <text x="551" y="286" fill="#666" font-size="10">  RACI 矩阵</text>
  <text x="551" y="306" fill="#444" font-size="11">✍️ 签字 Sign-off</text>
  <rect x="543" y="318" width="116" height="36" fill="#e8f5e9" rx="6"/>
  <text x="601" y="336" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="bold">输出：已批准 BRD</text>
  <text x="601" y="350" text-anchor="middle" fill="#2e7d32" font-size="10">获得授权开始研发</text>
  <text x="601" y="400" text-anchor="middle" fill="#999" font-size="10">耗时：3-7天</text>

  <!-- Arrow 4 -->
  <line x1="673" y1="255" x2="696" y2="255" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="698" y="82" width="112" height="340" fill="white" rx="12" filter="url(#shadow2)"/>
  <rect x="698" y="82" width="112" height="52" fill="url(#stepGrad5)" rx="12"/>
  <rect x="698" y="118" width="112" height="16" fill="url(#stepGrad5)"/>
  <text x="754" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Step 5</text>
  <text x="754" y="124" text-anchor="middle" fill="white" font-size="12">验证追踪</text>
  <text x="712" y="156" fill="#444" font-size="11">📊 指标监控</text>
  <text x="712" y="174" fill="#666" font-size="10">  OKR 对齐</text>
  <text x="712" y="194" fill="#444" font-size="11">🧪 A/B 测试</text>
  <text x="712" y="212" fill="#666" font-size="10">  实验设计</text>
  <text x="712" y="232" fill="#444" font-size="11">📝 复盘迭代</text>
  <text x="712" y="250" fill="#666" font-size="10">  经验沉淀</text>
  <rect x="710" y="270" width="90" height="48" fill="#fff8e1" rx="6"/>
  <text x="755" y="289" text-anchor="middle" fill="#f57f17" font-size="10" font-weight="bold">输出：</text>
  <text x="755" y="304" text-anchor="middle" fill="#f57f17" font-size="10">迭代计划</text>
  <text x="754" y="400" text-anchor="middle" fill="#999" font-size="10">持续进行</text>

  <!-- Bottom legend -->
  <rect x="30" y="435" width="760" height="32" fill="#f1f3f9" rx="8"/>
  <text x="410" y="455" text-anchor="middle" fill="#555" font-size="12">⏱ 完整 BRD 周期参考：小型项目 1-2 周 · 中型项目 3-4 周 · 大型项目 4-8 周</text>
</svg>
