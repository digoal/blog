<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="cardBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF9C3"/>
      <stop offset="100%" style="stop-color:#FEF08A"/>
    </linearGradient>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DCFCE7"/>
      <stop offset="100%" style="stop-color:#BBF7D0"/>
    </linearGradient>
    <linearGradient id="cardBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
    <linearGradient id="cardBg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE7F3"/>
      <stop offset="100%" style="stop-color:#FBCFE8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000015"/>
    </filter>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#111827" font-size="17" font-weight="700">JTBD × 用户研究 · 需求转化框架</text>
  <text x="400" y="56" text-anchor="middle" fill="#6B7280" font-size="11">Jobs-to-be-Done 方法论 | 从用户任务到产品需求的完整路径</text>

  <!-- Center circle -->
  <circle cx="400" cy="245" r="62" fill="white" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="400" cy="245" r="50" fill="#6366F1" opacity="0.08"/>
  <text x="400" y="237" text-anchor="middle" fill="#4F46E5" font-size="13" font-weight="700">用户</text>
  <text x="400" y="253" text-anchor="middle" fill="#4F46E5" font-size="13" font-weight="700">任务</text>
  <text x="400" y="269" text-anchor="middle" fill="#6B7280" font-size="10">Job Statement</text>

  <!-- Card 1: Functional Job (Top Left) -->
  <rect x="30" y="75" width="175" height="120" rx="10" fill="url(#cardBg1)" stroke="#FDE047" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="117" y="100" text-anchor="middle" fill="#713F12" font-size="12" font-weight="700">功能性任务</text>
  <text x="117" y="114" text-anchor="middle" fill="#92400E" font-size="10">Functional Job</text>
  <line x1="50" y1="122" x2="185" y2="122" stroke="#FDE047" stroke-width="1"/>
  <text x="50" y="137" fill="#78350F" font-size="10">用户实际要完成的行动</text>
  <text x="50" y="151" fill="#78350F" font-size="10">例："我要发一封正式邮件"</text>
  <text x="50" y="165" fill="#78350F" font-size="10">→ 功能需求的来源</text>
  <text x="50" y="180" fill="#78350F" font-size="10">→ 最容易被量化</text>

  <!-- Card 2: Emotional Job (Top Right) -->
  <rect x="595" y="75" width="175" height="120" rx="10" fill="url(#cardBg4)" stroke="#F9A8D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="682" y="100" text-anchor="middle" fill="#831843" font-size="12" font-weight="700">情感性任务</text>
  <text x="682" y="114" text-anchor="middle" fill="#9D174D" font-size="10">Emotional Job</text>
  <line x1="615" y1="122" x2="750" y2="122" stroke="#F9A8D4" stroke-width="1"/>
  <text x="615" y="137" fill="#831843" font-size="10">用户希望感受到什么</text>
  <text x="615" y="151" fill="#831843" font-size="10">例："我想显得更专业"</text>
  <text x="615" y="165" fill="#831843" font-size="10">→ UX 体验设计来源</text>
  <text x="615" y="180" fill="#831843" font-size="10">→ 影响留存与满意度</text>

  <!-- Card 3: Social Job (Bottom Left) -->
  <rect x="30" y="280" width="175" height="120" rx="10" fill="url(#cardBg2)" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="117" y="305" text-anchor="middle" fill="#14532D" font-size="12" font-weight="700">社会性任务</text>
  <text x="117" y="319" text-anchor="middle" fill="#166534" font-size="10">Social Job</text>
  <line x1="50" y1="327" x2="185" y2="327" stroke="#86EFAC" stroke-width="1"/>
  <text x="50" y="342" fill="#14532D" font-size="10">用户希望别人如何看他</text>
  <text x="50" y="356" fill="#14532D" font-size="10">例："让老板觉得我靠谱"</text>
  <text x="50" y="370" fill="#14532D" font-size="10">→ 协作/分享功能来源</text>
  <text x="50" y="384" fill="#14532D" font-size="10">→ 网络效应设计依据</text>

  <!-- Card 4: Outcomes (Bottom Right) -->
  <rect x="595" y="280" width="175" height="120" rx="10" fill="url(#cardBg3)" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="682" y="305" text-anchor="middle" fill="#1E3A8A" font-size="12" font-weight="700">期望结果</text>
  <text x="682" y="319" text-anchor="middle" fill="#1D4ED8" font-size="10">Desired Outcomes</text>
  <line x1="615" y1="327" x2="750" y2="327" stroke="#93C5FD" stroke-width="1"/>
  <text x="615" y="342" fill="#1E3A8A" font-size="10">用户判断成功的标准</text>
  <text x="615" y="356" fill="#1E3A8A" font-size="10">例："5分钟内写完"</text>
  <text x="615" y="370" fill="#1E3A8A" font-size="10">→ 验收标准 AC 来源</text>
  <text x="615" y="384" fill="#1E3A8A" font-size="10">→ 成功指标设定依据</text>

  <!-- Connecting lines -->
  <line x1="205" y1="135" x2="338" y2="205" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <line x1="595" y1="135" x2="462" y2="205" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <line x1="205" y1="340" x2="338" y2="283" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <line x1="595" y1="340" x2="462" y2="283" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>

  <!-- Bottom insight bar -->
  <rect x="30" y="420" width="740" height="28" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="400" y="439" text-anchor="middle" fill="#4338CA" font-size="11" font-weight="600">💡 MRD 核心原则：先理解用户的全部三类任务，再定义产品功能——而非反向推导</text>
</svg>
