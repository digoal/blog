<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DCFCE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFEDD5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCE7F3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#F8FAFC" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="60" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="48" width="900" height="12" fill="url(#headerGrad)"/>
  <text x="450" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="700" letter-spacing="1">MRD 写作方法论 · 全流程图</text>

  <!-- Phase 1: Problem Discovery -->
  <rect x="30" y="80" width="190" height="460" rx="12" fill="url(#phaseGrad1)" stroke="#C7D2FE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="80" width="190" height="36" rx="12" fill="#4F46E5"/>
  <rect x="30" y="104" width="190" height="12" fill="#4F46E5"/>
  <text x="125" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="700">① 问题发现</text>
  <text x="55" y="136" fill="#3730A3" font-size="11" font-weight="600">核心问题</text>
  <text x="55" y="153" fill="#4338CA" font-size="10.5">• 用户在什么场景下受阻？</text>
  <text x="55" y="168" fill="#4338CA" font-size="10.5">• 现有方案的核心缺陷？</text>
  <text x="55" y="183" fill="#4338CA" font-size="10.5">• 我们为什么做这个？</text>
  <line x1="45" y1="196" x2="205" y2="196" stroke="#C7D2FE" stroke-width="1"/>
  <text x="55" y="212" fill="#3730A3" font-size="11" font-weight="600">研究方法</text>
  <text x="55" y="229" fill="#4338CA" font-size="10.5">• 用户深度访谈（5-8人）</text>
  <text x="55" y="244" fill="#4338CA" font-size="10.5">• 竞品拆解分析</text>
  <text x="55" y="259" fill="#4338CA" font-size="10.5">• 数据漏斗分析</text>
  <text x="55" y="274" fill="#4338CA" font-size="10.5">• 客服工单挖掘</text>
  <line x1="45" y1="287" x2="205" y2="287" stroke="#C7D2FE" stroke-width="1"/>
  <text x="55" y="303" fill="#3730A3" font-size="11" font-weight="600">输出物</text>
  <text x="55" y="320" fill="#4338CA" font-size="10.5">• 用户旅程地图</text>
  <text x="55" y="335" fill="#4338CA" font-size="10.5">• 痛点优先级矩阵</text>
  <text x="55" y="350" fill="#4338CA" font-size="10.5">• Problem Statement</text>
  <rect x="55" y="490" width="140" height="32" rx="8" fill="#4F46E5"/>
  <text x="125" y="511" text-anchor="middle" fill="white" font-size="11" font-weight="600">Problem → Insight</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="300" x2="245" y2="300" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Phase 2: Market Analysis -->
  <rect x="245" y="80" width="190" height="460" rx="12" fill="url(#phaseGrad2)" stroke="#BBF7D0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="245" y="80" width="190" height="36" rx="12" fill="#16A34A"/>
  <rect x="245" y="104" width="190" height="12" fill="#16A34A"/>
  <text x="340" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="700">② 市场验证</text>
  <text x="270" y="136" fill="#14532D" font-size="11" font-weight="600">市场规模</text>
  <text x="270" y="153" fill="#166534" font-size="10.5">• TAM / SAM / SOM 拆解</text>
  <text x="270" y="168" fill="#166534" font-size="10.5">• 目标用户画像精确化</text>
  <text x="270" y="183" fill="#166534" font-size="10.5">• 市场增长趋势判断</text>
  <line x1="260" y1="196" x2="420" y2="196" stroke="#BBF7D0" stroke-width="1"/>
  <text x="270" y="212" fill="#14532D" font-size="11" font-weight="600">竞争格局</text>
  <text x="270" y="229" fill="#166534" font-size="10.5">• 直接/间接竞品地图</text>
  <text x="270" y="244" fill="#166534" font-size="10.5">• 差异化定位分析</text>
  <text x="270" y="259" fill="#166534" font-size="10.5">• 竞争壁垒识别</text>
  <text x="270" y="274" fill="#166534" font-size="10.5">• Win/Loss 分析</text>
  <line x1="260" y1="287" x2="420" y2="287" stroke="#BBF7D0" stroke-width="1"/>
  <text x="270" y="303" fill="#14532D" font-size="11" font-weight="600">输出物</text>
  <text x="270" y="320" fill="#166534" font-size="10.5">• 市场规模量化报告</text>
  <text x="270" y="335" fill="#166534" font-size="10.5">• 竞品对比矩阵</text>
  <text x="270" y="350" fill="#166534" font-size="10.5">• 差异化定位图</text>
  <rect x="270" y="490" width="140" height="32" rx="8" fill="#16A34A"/>
  <text x="340" y="511" text-anchor="middle" fill="white" font-size="11" font-weight="600">Insight → Strategy</text>

  <!-- Arrow 2→3 -->
  <line x1="435" y1="300" x2="460" y2="300" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Phase 3: Requirements Definition -->
  <rect x="460" y="80" width="190" height="460" rx="12" fill="url(#phaseGrad3)" stroke="#FED7AA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="80" width="190" height="36" rx="12" fill="#EA580C"/>
  <rect x="460" y="104" width="190" height="12" fill="#EA580C"/>
  <text x="555" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="700">③ 需求定义</text>
  <text x="485" y="136" fill="#7C2D12" font-size="11" font-weight="600">功能需求</text>
  <text x="485" y="153" fill="#9A3412" font-size="10.5">• User Story 格式撰写</text>
  <text x="485" y="168" fill="#9A3412" font-size="10.5">• 验收标准 AC 定义</text>
  <text x="485" y="183" fill="#9A3412" font-size="10.5">• 边界条件与异常流程</text>
  <line x1="475" y1="196" x2="635" y2="196" stroke="#FED7AA" stroke-width="1"/>
  <text x="485" y="212" fill="#7C2D12" font-size="11" font-weight="600">非功能需求</text>
  <text x="485" y="229" fill="#9A3412" font-size="10.5">• 性能 / 可用性指标</text>
  <text x="485" y="244" fill="#9A3412" font-size="10.5">• 安全与合规要求</text>
  <text x="485" y="259" fill="#9A3412" font-size="10.5">• 扩展性与维护性</text>
  <text x="485" y="274" fill="#9A3412" font-size="10.5">• 国际化与无障碍</text>
  <line x1="475" y1="287" x2="635" y2="287" stroke="#FED7AA" stroke-width="1"/>
  <text x="485" y="303" fill="#7C2D12" font-size="11" font-weight="600">优先级排序</text>
  <text x="485" y="320" fill="#9A3412" font-size="10.5">• RICE 评分模型</text>
  <text x="485" y="335" fill="#9A3412" font-size="10.5">• MoSCoW 分类</text>
  <text x="485" y="350" fill="#9A3412" font-size="10.5">• 里程碑规划</text>
  <rect x="485" y="490" width="140" height="32" rx="8" fill="#EA580C"/>
  <text x="555" y="511" text-anchor="middle" fill="white" font-size="11" font-weight="600">Strategy → Spec</text>

  <!-- Arrow 3→4 -->
  <line x1="650" y1="300" x2="675" y2="300" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Phase 4: Validation & Delivery -->
  <rect x="675" y="80" width="190" height="460" rx="12" fill="url(#phaseGrad4)" stroke="#FBCFE8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="675" y="80" width="190" height="36" rx="12" fill="#BE185D"/>
  <rect x="675" y="104" width="190" height="12" fill="#BE185D"/>
  <text x="770" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="700">④ 验证与交付</text>
  <text x="700" y="136" fill="#831843" font-size="11" font-weight="600">假设验证</text>
  <text x="700" y="153" fill="#9D174D" font-size="10.5">• 核心假设列表整理</text>
  <text x="700" y="168" fill="#9D174D" font-size="10.5">• MVP 范围确认</text>
  <text x="700" y="183" fill="#9D174D" font-size="10.5">• 成功指标 OKR 设定</text>
  <line x1="690" y1="196" x2="850" y2="196" stroke="#FBCFE8" stroke-width="1"/>
  <text x="700" y="212" fill="#831843" font-size="11" font-weight="600">评审流程</text>
  <text x="700" y="229" fill="#9D174D" font-size="10.5">• 设计评审（UX）</text>
  <text x="700" y="244" fill="#9D174D" font-size="10.5">• 技术评审（Engineering）</text>
  <text x="700" y="259" fill="#9D174D" font-size="10.5">• 业务评审（Stakeholder）</text>
  <text x="700" y="274" fill="#9D174D" font-size="10.5">• 法务 / 安全评审</text>
  <line x1="690" y1="287" x2="850" y2="287" stroke="#FBCFE8" stroke-width="1"/>
  <text x="700" y="303" fill="#831843" font-size="11" font-weight="600">交付标准</text>
  <text x="700" y="320" fill="#9D174D" font-size="10.5">• MRD 最终版归档</text>
  <text x="700" y="335" fill="#9D174D" font-size="10.5">• Sprint Planning 就绪</text>
  <text x="700" y="350" fill="#9D174D" font-size="10.5">• 上线指标监控配置</text>
  <rect x="700" y="490" width="140" height="32" rx="8" fill="#BE185D"/>
  <text x="770" y="511" text-anchor="middle" fill="white" font-size="11" font-weight="600">Spec → Delivery</text>

  <!-- Bottom feedback arrow -->
  <path d="M 870 545 Q 870 570 450 570 Q 30 570 30 545" stroke="#6366F1" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="450" y="566" text-anchor="middle" fill="#6366F1" font-size="10">持续迭代反馈环</text>
</svg>
