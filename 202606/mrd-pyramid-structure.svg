<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#818CF8"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="14"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#E0E7FF" font-size="18" font-weight="700" letter-spacing="1">MRD 文档结构 · 金字塔模型</text>
  <line x1="200" y1="52" x2="600" y2="52" stroke="#4338CA" stroke-width="1"/>

  <!-- Layer 1: Why (Top) -->
  <polygon points="400,72  560,130  240,130" fill="#4F46E5" opacity="0.9" filter="url(#glow)"/>
  <text x="400" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="700">Why 为什么做</text>
  <text x="400" y="122" text-anchor="middle" fill="#C7D2FE" font-size="10">战略背景 · 核心问题 · 成功标准</text>

  <!-- Layer 2: Who/What -->
  <polygon points="240,135  560,135  600,205  200,205" fill="#6366F1" opacity="0.85"/>
  <text x="400" y="164" text-anchor="middle" fill="white" font-size="13" font-weight="700">Who &amp; What 为谁做什么</text>
  <text x="400" y="179" text-anchor="middle" fill="#E0E7FF" font-size="10">用户画像 · 市场规模 · 核心需求场景</text>
  <text x="400" y="194" text-anchor="middle" fill="#C7D2FE" font-size="10">竞品分析 · 差异化定位</text>

  <!-- Layer 3: How -->
  <polygon points="200,210  600,210  650,295  150,295" fill="#7C3AED" opacity="0.8"/>
  <text x="400" y="243" text-anchor="middle" fill="white" font-size="13" font-weight="700">How 怎么做</text>
  <text x="400" y="258" text-anchor="middle" fill="#E0E7FF" font-size="10.5">功能需求清单 · 非功能需求 · 系统边界</text>
  <text x="400" y="273" text-anchor="middle" fill="#C7D2FE" font-size="10">User Story · 验收标准 · 优先级矩阵</text>
  <text x="400" y="287" text-anchor="middle" fill="#DDD6FE" font-size="10">数据需求 · 接口规范</text>

  <!-- Layer 4: When/Constraints (Bottom) -->
  <polygon points="150,300  650,300  700,400  100,400" fill="#8B5CF6" opacity="0.75"/>
  <text x="400" y="340" text-anchor="middle" fill="white" font-size="13" font-weight="700">When &amp; Constraints 何时 · 约束</text>
  <text x="400" y="356" text-anchor="middle" fill="#E0E7FF" font-size="10.5">里程碑规划 · MVP 边界 · 依赖关系</text>
  <text x="400" y="371" text-anchor="middle" fill="#DDD6FE" font-size="10">技术约束 · 合规要求 · 资源限制</text>
  <text x="400" y="386" text-anchor="middle" fill="#C4B5FD" font-size="10">上线标准 · 回滚方案 · 监控指标</text>

  <!-- Layer 5: Appendix (Widest) -->
  <rect x="80" y="408" width="640" height="70" rx="6" fill="#A78BFA" opacity="0.5"/>
  <text x="400" y="437" text-anchor="middle" fill="white" font-size="12" font-weight="700">附录 Appendix</text>
  <text x="400" y="452" text-anchor="middle" fill="#EDE9FE" font-size="10">用研报告 · 数据分析 · 访谈记录 · 竞品截图 · 设计稿链接 · 技术方案草稿</text>
  <text x="400" y="467" text-anchor="middle" fill="#DDD6FE" font-size="10">修改历史 · 待决事项（Open Questions）· 词汇表</text>

  <!-- Right annotations -->
  <text x="730" y="105" fill="#818CF8" font-size="10" text-anchor="middle">高层次</text>
  <text x="730" y="170" fill="#818CF8" font-size="10" text-anchor="middle">决策层</text>
  <text x="730" y="255" fill="#818CF8" font-size="10" text-anchor="middle">执行层</text>
  <text x="730" y="350" fill="#818CF8" font-size="10" text-anchor="middle">约束层</text>
  <text x="730" y="445" fill="#818CF8" font-size="10" text-anchor="middle">支撑层</text>
  <line x1="715" y1="85" x2="715" y2="480" stroke="#4338CA" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Priority arrow on left -->
  <line x1="60" y1="480" x2="60" y2="80" stroke="#818CF8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="55" y="300" fill="#818CF8" font-size="11" text-anchor="middle" transform="rotate(-90,55,290)">重要性 &amp; 稳定性</text>

  <!-- Bottom note -->
  <text x="400" y="506" text-anchor="middle" fill="#6366F1" font-size="10">越靠近顶部 = 越稳定、越不应频繁修改 · 越靠近底部 = 越细化、越易变更</text>
</svg>
