<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="q1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="q2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="q3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="q4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="720" height="600" fill="#fafbfd"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2a4a">机会矩阵·政策红利 × 用户能力</text>
  <text x="360" y="58" text-anchor="middle" font-size="12" fill="#5a6b85">西邮CS大一/大二·2026 时点 8 大方向落位</text>

  <!-- 2x2 矩阵: 中心 360,330, 边长 280 -->
  <g transform="translate(360,330)">
    <!-- 背景象限 -->
    <rect x="-280" y="-200" width="280" height="200" fill="url(#q1)"/>
    <rect x="0" y="-200" width="280" height="200" fill="url(#q2)"/>
    <rect x="0" y="0" width="280" height="200" fill="url(#q4)"/>
    <rect x="-280" y="0" width="280" height="200" fill="url(#q3)"/>

    <!-- 坐标轴 -->
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#1a2a4a" stroke-width="1.5"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#1a2a4a" stroke-width="1.5"/>
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#5a6b85" stroke-dasharray="3,3" transform="translate(0,80)"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#5a6b85" stroke-dasharray="3,3" transform="translate(120,0)"/>

    <!-- 坐标箭头 -->
    <polygon points="280,0 270,-6 270,6" fill="#1a2a4a"/>
    <polygon points="0,-200 -6,-190 6,-190" fill="#1a2a4a"/>

    <!-- 标签 -->
    <text x="-140" y="-180" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Q1·黄金区</text>
    <text x="-140" y="-165" text-anchor="middle" font-size="11" fill="#047857">高政策+高能力=立即入局</text>

    <text x="140" y="-180" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Q2·观望区</text>
    <text x="140" y="-165" text-anchor="middle" font-size="11" fill="#b45309">高政策+低能力=先学再入</text>

    <text x="140" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Q3·冷门区</text>
    <text x="140" y="35" text-anchor="middle" font-size="11" fill="#1d4ed8">低政策+高能力=备选</text>

    <text x="-140" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Q4·陷阱区</text>
    <text x="-140" y="35" text-anchor="middle" font-size="11" fill="#b91c1c">低政策+低能力=回避</text>

    <!-- 8 个机会散点 -->
    <!-- Q1 黄金区 (左上): 鸿蒙开发 -220,-130 | 央国企信通岗 -100,-160 | AI/大模型 -180,-60 -->
    <g>
      <circle cx="-220" cy="-130" r="12" fill="#10b981"/>
      <text x="-220" y="-126" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
      <text x="-220" y="-150" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">鸿蒙开发</text>
    </g>
    <g>
      <circle cx="-100" cy="-160" r="12" fill="#10b981"/>
      <text x="-100" y="-156" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
      <text x="-100" y="-180" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">国央企信通</text>
    </g>
    <g>
      <circle cx="-180" cy="-60" r="12" fill="#10b981"/>
      <text x="-180" y="-56" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
      <text x="-180" y="-78" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">AI/大模型</text>
    </g>

    <!-- Q2 观望区 (右上): 工业互联网 60,-50 | 算力运维 200,-100 | 鸿蒙生态岗 100,-160 -->
    <g>
      <circle cx="60" cy="-50" r="12" fill="#f59e0b"/>
      <text x="60" y="-46" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
      <text x="60" y="-70" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">工业互联网</text>
    </g>
    <g>
      <circle cx="200" cy="-100" r="12" fill="#f59e0b"/>
      <text x="200" y="-96" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
      <text x="200" y="-120" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">东数西算运维</text>
    </g>
    <g>
      <circle cx="100" cy="-160" r="12" fill="#f59e0b"/>
      <text x="100" y="-156" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">6</text>
      <text x="100" y="-180" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">具身智能</text>
    </g>

    <!-- Q3 冷门区 (右下): 传统前端 180,80 | 互联网运营 100,140 -->
    <g>
      <circle cx="180" cy="80" r="12" fill="#3b82f6"/>
      <text x="180" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">7</text>
      <text x="180" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">传统前端/测试</text>
    </g>
    <g>
      <circle cx="100" cy="140" r="12" fill="#3b82f6"/>
      <text x="100" y="144" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">8</text>
      <text x="100" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2a4a">纯互联网产品</text>
    </g>
  </g>

  <!-- 轴标签 -->
  <text x="360" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2a4a">政策红利 →</text>
  <text x="360" y="572" text-anchor="middle" font-size="10" fill="#5a6b85">(十五五/信创/人工智能+)</text>

  <g transform="translate(28,330) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2a4a">用户能力匹配度 →</text>
    <text x="0" y="16" text-anchor="middle" font-size="10" fill="#5a6b85">(技术栈+院校背景)</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(50,580)">
    <text x="0" y="0" font-size="10" fill="#5a6b85">散点编号对照见正文"机会矩阵表"</text>
  </g>
</svg>
