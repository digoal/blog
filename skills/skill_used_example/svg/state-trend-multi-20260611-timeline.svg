<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eef4fc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#tbg)"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2a4a">政策与产业时间线·2020-2030</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#5a6b85">从"数字中国"到"智能经济新形态"的 10 年演化</text>

  <!-- 主轴 -->
  <line x1="60" y1="240" x2="840" y2="240" stroke="#5a6b85" stroke-width="2"/>

  <!-- 时间节点(5个) -->
  <g>
    <!-- 2020 数字经济起步 -->
    <circle cx="120" cy="240" r="9" fill="#3b82f6"/>
    <line x1="120" y1="240" x2="120" y2="170" stroke="#3b82f6" stroke-dasharray="3,2"/>
    <text x="120" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2a4a">2020</text>
    <text x="120" y="135" text-anchor="middle" font-size="11" fill="#3b82f6">十四五开局</text>
    <text x="120" y="118" text-anchor="middle" font-size="10" fill="#5a6b85">"数字中国"启动</text>
    <text x="120" y="103" text-anchor="middle" font-size="10" fill="#5a6b85">新基建铺开</text>

    <!-- 2022 信创全面化 -->
    <circle cx="285" cy="240" r="9" fill="#6366f1"/>
    <line x1="285" y1="240" x2="285" y2="310" stroke="#6366f1" stroke-dasharray="3,2"/>
    <text x="285" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2a4a">2022</text>
    <text x="285" y="350" text-anchor="middle" font-size="11" fill="#6366f1">国资委79号文</text>
    <text x="285" y="368" text-anchor="middle" font-size="10" fill="#5a6b85">信创全面提速</text>
    <text x="285" y="383" text-anchor="middle" font-size="10" fill="#5a6b85">东数西算启动</text>

    <!-- 2024 AI 大模型爆发 -->
    <circle cx="450" cy="240" r="9" fill="#8b5cf6"/>
    <line x1="450" y1="240" x2="450" y2="170" stroke="#8b5cf6" stroke-dasharray="3,2"/>
    <text x="450" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2a4a">2024</text>
    <text x="450" y="135" text-anchor="middle" font-size="11" fill="#8b5cf6">国产大模型井喷</text>
    <text x="450" y="118" text-anchor="middle" font-size="10" fill="#5a6b85">Qwen/DeepSeek 崛起</text>
    <text x="450" y="103" text-anchor="middle" font-size="10" fill="#5a6b85">具身智能元年</text>

    <!-- 2026 十五五开局, 鸿蒙商用, 算法岗暴增 -->
    <circle cx="615" cy="240" r="14" fill="#ef4444" stroke="#fff" stroke-width="3"/>
    <line x1="615" y1="240" x2="615" y2="310" stroke="#ef4444" stroke-dasharray="3,2"/>
    <text x="615" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#1a2a4a">2026 (现在)</text>
    <text x="615" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">十五五开局 + 鸿蒙</text>
    <text x="615" y="368" text-anchor="middle" font-size="10" fill="#5a6b85">智能经济新形态</text>
    <text x="615" y="383" text-anchor="middle" font-size="10" fill="#5a6b85">国产替代 85% 党政</text>

    <!-- 2027 央国企信创 100% 替代 -->
    <circle cx="780" cy="240" r="9" fill="#f97316"/>
    <line x1="780" y1="240" x2="780" y2="170" stroke="#f97316" stroke-dasharray="3,2"/>
    <text x="780" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2a4a">2027</text>
    <text x="780" y="135" text-anchor="middle" font-size="11" fill="#f97316">信创 100% 替代</text>
    <text x="780" y="118" text-anchor="middle" font-size="10" fill="#5a6b85">央国企核心系统</text>
    <text x="780" y="103" text-anchor="middle" font-size="10" fill="#5a6b85">AI 人才缺口 500万</text>
  </g>

  <!-- 2030 远景: 链条上延伸 -->
  <line x1="840" y1="240" x2="870" y2="240" stroke="#5a6b85" stroke-dasharray="5,3"/>
  <text x="875" y="244" text-anchor="start" font-size="10" fill="#5a6b85">2030</text>
  <text x="875" y="258" text-anchor="start" font-size="10" fill="#5a6b85">AI 产业 10 万亿</text>

  <!-- 周期色带 -->
  <g>
    <rect x="60" y="420" width="120" height="20" fill="#3b82f6" opacity="0.7"/>
    <text x="120" y="435" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">导入期</text>

    <rect x="185" y="420" width="200" height="20" fill="#6366f1" opacity="0.7"/>
    <text x="285" y="435" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">基础设施期</text>

    <rect x="390" y="420" width="160" height="20" fill="#8b5cf6" opacity="0.7"/>
    <text x="470" y="435" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">技术爆发期</text>

    <rect x="555" y="420" width="160" height="20" fill="#ef4444" opacity="0.7"/>
    <text x="635" y="435" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">应用落地期(现在)</text>

    <rect x="720" y="420" width="120" height="20" fill="#f97316" opacity="0.7"/>
    <text x="780" y="435" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">成熟期</text>
  </g>
</svg>
