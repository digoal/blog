<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e8eef7"/>
    </radialGradient>
  </defs>
  <rect width="720" height="600" fill="url(#bg)"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2a4a">六大场景趋势雷达·西邮CS本科·2026</text>
  <text x="360" y="60" text-anchor="middle" font-size="12" fill="#5a6b85">基于"十五五"规划+人社部+脉脉/猎聘数据,分值0-10</text>

  <!-- 雷达网格:六边形,4层 -->
  <g transform="translate(360,320)">
    <polygon points="0,-220 190.5,-110 190.5,110 0,220 -190.5,110 -190.5,-110"
             fill="none" stroke="#b8c6da" stroke-width="1"/>
    <polygon points="0,-165 142.9,-82.5 142.9,82.5 0,165 -142.9,82.5 -142.9,-82.5"
             fill="none" stroke="#c8d4e5" stroke-width="0.8"/>
    <polygon points="0,-110 95.3,-55 95.3,55 0,110 -95.3,55 -95.3,-55"
             fill="none" stroke="#d8e0eb" stroke-width="0.8"/>
    <polygon points="0,-55 47.6,-27.5 47.6,27.5 0,55 -47.6,27.5 -47.6,-27.5"
             fill="none" stroke="#e6ecf3" stroke-width="0.8"/>

    <!-- 轴线 -->
    <line x1="0" y1="0" x2="0" y2="-220" stroke="#b8c6da"/>
    <line x1="0" y1="0" x2="190.5" y2="-110" stroke="#b8c6da"/>
    <line x1="0" y1="0" x2="190.5" y2="110" stroke="#b8c6da"/>
    <line x1="0" y1="0" x2="0" y2="220" stroke="#b8c6da"/>
    <line x1="0" y1="0" x2="-190.5" y2="110" stroke="#b8c6da"/>
    <line x1="0" y1="0" x2="-190.5" y2="-110" stroke="#b8c6da"/>

    <!-- 分值圈标尺 -->
    <text x="3" y="-217" font-size="10" fill="#5a6b85">10</text>
    <text x="3" y="-162" font-size="10" fill="#5a6b85">7.5</text>
    <text x="3" y="-107" font-size="10" fill="#5a6b85">5</text>
    <text x="3" y="-52" font-size="10" fill="#5a6b85">2.5</text>

    <!-- 数值多边形:就业7 学习8 创业4 商业5 产品6 投资5 -->
    <!-- 就业 7 -> 顶点1 (0,-220) 距离 = 7/10 * 220 = 154 -->
    <!-- 学习 8 -> 顶点2 (190.5,-110) 距离 = 8/10 * 220 = 176 -->
    <!-- 创业 4 -> 顶点3 (190.5,110) 距离 = 4/10 * 220 = 88 -->
    <!-- 商业 5 -> 顶点4 (0,220) 距离 = 5/10 * 220 = 110 -->
    <!-- 产品 6 -> 顶点5 (-190.5,110) 距离 = 6/10 * 220 = 132 -->
    <!-- 投资 5 -> 顶点6 (-190.5,-110) 距离 = 5/10 * 220 = 110 -->
    <polygon points="0,-154 152.4,-88 76.4,44 0,110 -114.3,66 -95.25,-55"
             fill="rgba(59,130,246,0.25)" stroke="#3b82f6" stroke-width="2.5"/>

    <!-- 数据点 -->
    <circle cx="0" cy="-154" r="5" fill="#3b82f6"/>
    <circle cx="152.4" cy="-88" r="5" fill="#3b82f6"/>
    <circle cx="76.4" cy="44" r="5" fill="#3b82f6"/>
    <circle cx="0" cy="110" r="5" fill="#3b82f6"/>
    <circle cx="-114.3" cy="66" r="5" fill="#3b82f6"/>
    <circle cx="-95.25" cy="-55" r="5" fill="#3b82f6"/>

    <!-- 顶点标签 -->
    <text x="0" y="-240" text-anchor="middle" font-size="14" font-weight="700" fill="#1a2a4a">就业择业</text>
    <text x="0" y="-222" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">7.0</text>

    <text x="208" y="-110" text-anchor="start" font-size="14" font-weight="700" fill="#1a2a4a">学习规划</text>
    <text x="208" y="-92" text-anchor="start" font-size="12" font-weight="600" fill="#3b82f6">8.0</text>

    <text x="208" y="115" text-anchor="start" font-size="14" font-weight="700" fill="#1a2a4a">创业方向</text>
    <text x="208" y="133" text-anchor="start" font-size="12" font-weight="600" fill="#3b82f6">4.0</text>

    <text x="0" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#1a2a4a">商业思路</text>
    <text x="0" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">5.0</text>

    <text x="-208" y="115" text-anchor="end" font-size="14" font-weight="700" fill="#1a2a4a">产品思路</text>
    <text x="-208" y="133" text-anchor="end" font-size="12" font-weight="600" fill="#3b82f6">6.0</text>

    <text x="-208" y="-110" text-anchor="end" font-size="14" font-weight="700" fill="#1a2a4a">投资方向</text>
    <text x="-208" y="-92" text-anchor="end" font-size="12" font-weight="600" fill="#3b82f6">5.0</text>
  </g>

  <!-- 底部图例 -->
  <g transform="translate(40,560)">
    <rect x="0" y="0" width="14" height="14" fill="rgba(59,130,246,0.25)" stroke="#3b82f6"/>
    <text x="22" y="12" font-size="12" fill="#1a2a4a">当前画像机会分值</text>
    <text x="220" y="12" font-size="11" fill="#5a6b85">打分依据:政策方向+岗位缺口+用户能力匹配度</text>
  </g>
</svg>
