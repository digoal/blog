<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="vbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="580" fill="url(#vbg)"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2a4a">"十五五"智能经济产业链·西邮CS卡位图</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#5a6b85">算力→算法→应用→终端,4 层 8 节点</text>

  <!-- 4 列 -->
  <g>
    <!-- L1 算力基础设施 -->
    <rect x="40" y="100" width="180" height="380" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <text x="130" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">L1·算力底座</text>
    <text x="130" y="142" text-anchor="middle" font-size="10" fill="#3b82f6">10万亿 AI 产业的根</text>

    <rect x="55" y="160" width="150" height="50" fill="#fff" stroke="#3b82f6" rx="5"/>
    <text x="130" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">昇腾/鲲鹏/海光</text>
    <text x="130" y="196" text-anchor="middle" font-size="10" fill="#5a6b85">国产 AI 芯片(突破期)</text>

    <rect x="55" y="220" width="150" height="50" fill="#fff" stroke="#3b82f6" rx="5"/>
    <text x="130" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">庆阳东数西算</text>
    <text x="130" y="256" text-anchor="middle" font-size="10" fill="#5a6b85">11.4万P 智算规模</text>

    <rect x="55" y="280" width="150" height="50" fill="#fff" stroke="#3b82f6" rx="5"/>
    <text x="130" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">国家算力网</text>
    <text x="130" y="316" text-anchor="middle" font-size="10" fill="#5a6b85">算电协同·一体化</text>

    <rect x="55" y="340" width="150" height="50" fill="#fff" stroke="#3b82f6" rx="5"/>
    <text x="130" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">数据要素</text>
    <text x="130" y="376" text-anchor="middle" font-size="10" fill="#5a6b85">可信数据空间·语料库</text>

    <text x="130" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">西邮卡位:运维/测试/集成</text>
    <text x="130" y="445" text-anchor="middle" font-size="10" fill="#5a6b85">门槛:本科+实习可入</text>
    <text x="130" y="465" text-anchor="middle" font-size="10" fill="#5a6b85">薪资:8-15K·稳定性高</text>
  </g>

  <g>
    <!-- L2 算法层 -->
    <rect x="240" y="100" width="180" height="380" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1.5" rx="8"/>
    <text x="330" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">L2·算法模型</text>
    <text x="330" y="142" text-anchor="middle" font-size="10" fill="#8b5cf6">大模型·智能体·具身</text>

    <rect x="255" y="160" width="150" height="50" fill="#fff" stroke="#8b5cf6" rx="5"/>
    <text x="330" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">Qwen/DeepSeek</text>
    <text x="330" y="196" text-anchor="middle" font-size="10" fill="#5a6b85">国产开源大模型</text>

    <rect x="255" y="220" width="150" height="50" fill="#fff" stroke="#8b5cf6" rx="5"/>
    <text x="330" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">多模态/智能体</text>
    <text x="330" y="256" text-anchor="middle" font-size="10" fill="#5a6b85">VLA·具身智能·SLAM</text>

    <rect x="255" y="280" width="150" height="50" fill="#fff" stroke="#8b5cf6" rx="5"/>
    <text x="330" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">AI Agent 框架</text>
    <text x="330" y="316" text-anchor="middle" font-size="10" fill="#5a6b85">智能原生新业态</text>

    <rect x="255" y="340" width="150" height="50" fill="#fff" stroke="#8b5cf6" rx="5"/>
    <text x="330" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">FPGA/高性能计算</text>
    <text x="330" y="376" text-anchor="middle" font-size="10" fill="#5a6b85">供需比 0.15·7岗争1人</text>

    <text x="330" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">西邮卡位:读研转算法/打比赛</text>
    <text x="330" y="445" text-anchor="middle" font-size="10" fill="#5a6b85">门槛:硕士+顶会·门槛高</text>
    <text x="330" y="465" text-anchor="middle" font-size="10" fill="#5a6b85">薪资:30-47K·双非难入</text>
  </g>

  <g>
    <!-- L3 应用层 -->
    <rect x="440" y="100" width="180" height="380" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
    <text x="530" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">L3·应用赋能</text>
    <text x="530" y="142" text-anchor="middle" font-size="10" fill="#f59e0b">AI+千行百业</text>

    <rect x="455" y="160" width="150" height="50" fill="#fff" stroke="#f59e0b" rx="5"/>
    <text x="530" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">金融/电信信创</text>
    <text x="530" y="196" text-anchor="middle" font-size="10" fill="#5a6b85">2027 央国企 100% 替代</text>

    <rect x="455" y="220" width="150" height="50" fill="#fff" stroke="#f59e0b" rx="5"/>
    <text x="530" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">工业互联网</text>
    <text x="530" y="256" text-anchor="middle" font-size="10" fill="#5a6b85">陕西秦创原·装备制造</text>

    <rect x="455" y="280" width="150" height="50" fill="#fff" stroke="#f59e0b" rx="5"/>
    <text x="530" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">智慧城市/政务</text>
    <text x="530" y="316" text-anchor="middle" font-size="10" fill="#5a6b85">数字政府·一网通办</text>

    <rect x="455" y="340" width="150" height="50" fill="#fff" stroke="#f59e0b" rx="5"/>
    <text x="530" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">数字能源</text>
    <text x="530" y="376" text-anchor="middle" font-size="10" fill="#5a6b85">电网/储能/碳中和</text>

    <text x="530" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">西邮卡位:Java/Go 后端+业务</text>
    <text x="530" y="445" text-anchor="middle" font-size="10" fill="#5a6b85">门槛:本科+实习·主流通道</text>
    <text x="530" y="465" text-anchor="middle" font-size="10" fill="#5a6b85">薪资:8-15K·岗位最多</text>
  </g>

  <g>
    <!-- L4 终端层 -->
    <rect x="640" y="100" width="220" height="380" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <text x="750" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">L4·终端生态</text>
    <text x="750" y="142" text-anchor="middle" font-size="10" fill="#ef4444">鸿蒙·人形机器人·车机</text>

    <rect x="655" y="160" width="190" height="50" fill="#fff" stroke="#ef4444" rx="5"/>
    <text x="750" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">HarmonyOS NEXT</text>
    <text x="750" y="196" text-anchor="middle" font-size="10" fill="#5a6b85">百万缺口·300万岗位</text>

    <rect x="655" y="220" width="190" height="50" fill="#fff" stroke="#ef4444" rx="5"/>
    <text x="750" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">人形机器人/具身</text>
    <text x="750" y="256" text-anchor="middle" font-size="10" fill="#5a6b85">岗位+215%·年薪40万</text>

    <rect x="655" y="280" width="190" height="50" fill="#fff" stroke="#ef4444" rx="5"/>
    <text x="750" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">智能汽车/车机</text>
    <text x="750" y="316" text-anchor="middle" font-size="10" fill="#5a6b85">西安比亚迪/陕汽聚集</text>

    <rect x="655" y="340" width="190" height="50" fill="#fff" stroke="#ef4444" rx="5"/>
    <text x="750" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">工业 APP/嵌入式</text>
    <text x="750" y="376" text-anchor="middle" font-size="10" fill="#5a6b85">西安制造业大需求</text>

    <text x="750" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">西邮卡位:鸿蒙/嵌入式/IoT</text>
    <text x="750" y="445" text-anchor="middle" font-size="10" fill="#5a6b85">门槛:本科+鸿蒙认证</text>
    <text x="750" y="465" text-anchor="middle" font-size="10" fill="#5a6b85">薪资:10-18K·蓝海期</text>
  </g>

  <!-- 流向箭头 -->
  <g fill="#5a6b85">
    <polygon points="222,290 240,283 240,297"/>
    <polygon points="422,290 440,283 440,297"/>
    <polygon points="622,290 640,283 640,297"/>
  </g>

  <!-- 底部说明 -->
  <text x="450" y="520" text-anchor="middle" font-size="12" fill="#5a6b85">从左到右:政策-算力→算法→应用→终端,4 层协同;箭头代表"政策-资本-人才"主流向</text>
  <text x="450" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2a4a">西邮CS本科最优卡位:L4 鸿蒙/L3 工业互联网/L1 算力运维(避开 L2 算法头部内卷)</text>
  <text x="450" y="560" text-anchor="middle" font-size="10" fill="#5a6b85">数据来源:十五五规划/国务院政府工作报告/脉脉/猎聘/智联/《鸿蒙人才白皮书2025》</text>
</svg>
