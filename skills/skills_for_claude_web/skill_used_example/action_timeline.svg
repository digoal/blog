<svg viewBox="0 0 820 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', sans-serif">
  <rect width="820" height="280" fill="#0f172a" rx="10"/>
  <text x="410" y="28" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold">软件工程师 — 十五五趋势行动路径时间轴（2026-2030）</text>

  <!-- 主轴线 -->
  <line x1="60" y1="130" x2="780" y2="130" stroke="#334155" stroke-width="3"/>
  
  <!-- 时间节点 -->
  <!-- 2026 Q3 -->
  <circle cx="110" cy="130" r="10" fill="#3b82f6"/>
  <text x="110" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">2026 Q3</text>
  <line x1="110" y1="120" x2="110" y2="75" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="50" y="48" width="120" height="30" rx="4" fill="#1e3a5f"/>
  <text x="110" y="60" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">入门AI工具链</text>
  <text x="110" y="72" text-anchor="middle" fill="#7dd3fc" font-size="9">LangChain/Agent框架</text>

  <!-- 2027 Q1 -->
  <circle cx="240" cy="130" r="10" fill="#22c55e"/>
  <text x="240" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">2027 Q1</text>
  <line x1="240" y1="140" x2="240" y2="185" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="180" y="185" width="120" height="30" rx="4" fill="#14532d"/>
  <text x="240" y="197" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">首个AI应用上线</text>
  <text x="240" y="209" text-anchor="middle" fill="#4ade80" font-size="9">垂直行业切入</text>

  <!-- 2027 Q4 -->
  <circle cx="390" cy="130" r="10" fill="#f59e0b"/>
  <text x="390" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">2027 Q4</text>
  <line x1="390" y1="120" x2="390" y2="75" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="330" y="48" width="120" height="30" rx="4" fill="#451a03"/>
  <text x="390" y="60" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">切入国产替代</text>
  <text x="390" y="72" text-anchor="middle" fill="#fbbf24" font-size="9">工业软件/政务系统</text>

  <!-- 2028 Q2 -->
  <circle cx="530" cy="130" r="10" fill="#8b5cf6"/>
  <text x="530" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">2028 Q2</text>
  <line x1="530" y1="140" x2="530" y2="185" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="470" y="185" width="120" height="30" rx="4" fill="#2e1065"/>
  <text x="530" y="197" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">具身智能布局</text>
  <text x="530" y="209" text-anchor="middle" fill="#a78bfa" font-size="9">机器人软件栈/SDK</text>

  <!-- 2029 Q1 -->
  <circle cx="670" cy="130" r="10" fill="#ef4444"/>
  <text x="670" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">2029 Q1</text>
  <line x1="670" y1="120" x2="670" y2="75" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="610" y="48" width="120" height="30" rx="4" fill="#450a0a"/>
  <text x="670" y="60" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">创业/投资决策</text>
  <text x="670" y="72" text-anchor="middle" fill="#f87171" font-size="9">基于3年积累择机</text>

  <!-- 连接箭头 -->
  <polygon points="120,130 135,124 135,136" fill="#334155"/>
  <polygon points="250,130 265,124 265,136" fill="#334155"/>
  <polygon points="400,130 415,124 415,136" fill="#334155"/>
  <polygon points="540,130 555,124 555,136" fill="#334155"/>

  <!-- 底部说明 -->
  <rect x="30" y="232" width="760" height="36" fill="#1e293b" rx="6"/>
  <text x="410" y="247" text-anchor="middle" fill="#64748b" font-size="10">⚡ 核心逻辑：学习→验证→切换→布局→收获，每步建立下一步的基础</text>
  <text x="410" y="261" text-anchor="middle" fill="#475569" font-size="9">参考依据：十五五规划（2026-2030）未来产业部署 + 2025年政府工作报告 AI/机器人政策表述</text>
</svg>