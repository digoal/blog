<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', sans-serif">
  <!-- 背景 -->
  <rect width="820" height="520" fill="#0f172a" rx="12"/>
  
  <!-- 标题 -->
  <text x="410" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="bold">🇨🇳 十五五（2026-2030）政策风口热力图</text>
  <text x="410" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">气泡大小 = 市场规模预测 | 横轴 = 政策强度 | 纵轴 = 时间窗口紧迫度</text>

  <!-- 坐标系背景格线 -->
  <line x1="80" y1="80" x2="80" y2="440" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="80" y1="440" x2="760" y2="440" stroke="#1e293b" stroke-width="1.5"/>
  <!-- 横格线 -->
  <line x1="80" y1="160" x2="760" y2="160" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="80" y1="240" x2="760" y2="240" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="80" y1="320" x2="760" y2="320" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="80" y1="400" x2="760" y2="400" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <!-- 纵格线 -->
  <line x1="220" y1="80" x2="220" y2="440" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="360" y1="80" x2="360" y2="440" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="500" y1="80" x2="500" y2="440" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="640" y1="80" x2="640" y2="440" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="4,4"/>

  <!-- Y轴标签 -->
  <text x="72" y="165" text-anchor="end" fill="#64748b" font-size="10">低</text>
  <text x="72" y="245" text-anchor="end" fill="#64748b" font-size="10">中</text>
  <text x="72" y="325" text-anchor="end" fill="#64748b" font-size="10">中高</text>
  <text x="72" y="405" text-anchor="end" fill="#64748b" font-size="10">高</text>
  <text x="30" y="265" text-anchor="middle" fill="#94a3b8" font-size="11" transform="rotate(-90,30,265)">时间窗口紧迫度</text>

  <!-- X轴标签 -->
  <text x="220" y="460" text-anchor="middle" fill="#64748b" font-size="10">低</text>
  <text x="360" y="460" text-anchor="middle" fill="#64748b" font-size="10">中</text>
  <text x="500" y="460" text-anchor="middle" fill="#64748b" font-size="10">高</text>
  <text x="640" y="460" text-anchor="middle" fill="#64748b" font-size="10">极高</text>
  <text x="420" y="480" text-anchor="middle" fill="#94a3b8" font-size="11">政策支撑强度</text>

  <!-- 气泡1: AI大模型应用 -->
  <circle cx="680" cy="110" r="46" fill="#3b82f6" opacity="0.85"/>
  <text x="680" y="106" text-anchor="middle" fill="white" font-size="11" font-weight="bold">AI大模型</text>
  <text x="680" y="120" text-anchor="middle" fill="#dbeafe" font-size="10">应用层</text>
  <text x="680" y="133" text-anchor="middle" fill="#bfdbfe" font-size="9">~万亿级</text>

  <!-- 气泡2: 新能源汽车产业链 -->
  <circle cx="600" cy="410" r="42" fill="#22c55e" opacity="0.85"/>
  <text x="600" y="406" text-anchor="middle" fill="white" font-size="11" font-weight="bold">新能源</text>
  <text x="600" y="419" text-anchor="middle" fill="#dcfce7" font-size="10">汽车产业链</text>

  <!-- 气泡3: 国产替代 -->
  <circle cx="640" cy="290" r="38" fill="#ef4444" opacity="0.80"/>
  <text x="640" y="285" text-anchor="middle" fill="white" font-size="11" font-weight="bold">国产替代</text>
  <text x="640" y="299" text-anchor="middle" fill="#fee2e2" font-size="9">芯片/软件/装备</text>

  <!-- 气泡4: 银发经济 -->
  <circle cx="430" cy="380" r="35" fill="#f59e0b" opacity="0.85"/>
  <text x="430" y="376" text-anchor="middle" fill="white" font-size="11" font-weight="bold">银发经济</text>
  <text x="430" y="390" text-anchor="middle" fill="#fef3c7" font-size="9">老龄化红利</text>

  <!-- 气泡5: 低空经济 -->
  <circle cx="520" cy="190" r="30" fill="#8b5cf6" opacity="0.80"/>
  <text x="520" y="186" text-anchor="middle" fill="white" font-size="11" font-weight="bold">低空经济</text>
  <text x="520" y="200" text-anchor="middle" fill="#ede9fe" font-size="9">无人机/eVTOL</text>

  <!-- 气泡6: 具身智能/机器人 -->
  <circle cx="700" cy="230" r="34" fill="#06b6d4" opacity="0.80"/>
  <text x="700" y="226" text-anchor="middle" fill="white" font-size="11" font-weight="bold">具身智能</text>
  <text x="700" y="240" text-anchor="middle" fill="#cffafe" font-size="9">机器人</text>

  <!-- 气泡7: 生物制造 -->
  <circle cx="360" cy="200" r="27" fill="#ec4899" opacity="0.75"/>
  <text x="360" y="196" text-anchor="middle" fill="white" font-size="11">生物制造</text>
  <text x="360" y="209" text-anchor="middle" fill="#fce7f3" font-size="9">合成生物</text>

  <!-- 气泡8: 量子科技 -->
  <circle cx="230" cy="140" r="22" fill="#6366f1" opacity="0.75"/>
  <text x="230" y="136" text-anchor="middle" fill="white" font-size="10">量子科技</text>
  <text x="230" y="149" text-anchor="middle" fill="#e0e7ff" font-size="9">通信/计算</text>

  <!-- 气泡9: 乡村振兴 -->
  <circle cx="460" cy="420" r="28" fill="#84cc16" opacity="0.80"/>
  <text x="460" y="416" text-anchor="middle" fill="white" font-size="10">乡村振兴</text>
  <text x="460" y="428" text-anchor="middle" fill="#ecfccb" font-size="9">农业现代化</text>

  <!-- 图例 -->
  <rect x="82" y="480" width="660" height="32" fill="#1e293b" rx="6"/>
  <circle cx="110" cy="496" r="7" fill="#3b82f6" opacity="0.85"/>
  <text x="122" y="500" fill="#cbd5e1" font-size="10">蓝=AI/数字</text>
  <circle cx="200" cy="496" r="7" fill="#22c55e" opacity="0.85"/>
  <text x="212" y="500" fill="#cbd5e1" font-size="10">绿=绿色能源</text>
  <circle cx="300" cy="496" r="7" fill="#ef4444" opacity="0.80"/>
  <text x="312" y="500" fill="#cbd5e1" font-size="10">红=国产替代</text>
  <circle cx="400" cy="496" r="7" fill="#f59e0b" opacity="0.85"/>
  <text x="412" y="500" fill="#cbd5e1" font-size="10">金=民生经济</text>
  <circle cx="510" cy="496" r="7" fill="#8b5cf6" opacity="0.80"/>
  <text x="522" y="500" fill="#cbd5e1" font-size="10">紫=前沿科技</text>
  <text x="640" y="500" fill="#64748b" font-size="9">数据来源：十五五规划纲要 2026.03</text>
</svg>