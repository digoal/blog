<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', sans-serif">
  <rect width="800" height="380" fill="#0f172a" rx="12"/>
  
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#f1f5f9">行动路径时间轴（3年规划）</text>
  <text x="400" y="52" text-anchor="middle" font-size="11" fill="#64748b">西安邮电大学计算机本科生 | 顺势跟着国家走</text>

  <!-- Timeline axis -->
  <line x1="60" y1="210" x2="750" y2="210" stroke="#334155" stroke-width="2"/>
  
  <!-- Arrow -->
  <polygon points="750,205 765,210 750,215" fill="#334155"/>

  <!-- Phase 1: 当下 -->
  <circle cx="100" cy="210" r="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="100" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">现在</text>
  <text x="100" y="182" text-anchor="middle" font-size="10" fill="#64748b">2026年</text>
  <!-- Actions below -->
  <rect x="30" y="230" width="140" height="110" fill="#1e293b" rx="8"/>
  <text x="100" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">立刻行动</text>
  <text x="100" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">确定主赛道</text>
  <text x="100" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">安全/云计算选一</text>
  <text x="100" y="292" text-anchor="middle" font-size="10" fill="#94a3b8">开始刷LeetCode</text>
  <text x="100" y="306" text-anchor="middle" font-size="10" fill="#94a3b8">学会用AI工具</text>
  <text x="100" y="320" text-anchor="middle" font-size="10" fill="#94a3b8">注册GitHub</text>

  <!-- Phase 2: 大一到大二 -->
  <circle cx="270" cy="210" r="10" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="270" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">+6个月</text>
  <text x="270" y="182" text-anchor="middle" font-size="10" fill="#64748b">筑基期</text>
  <!-- Actions above -->
  <rect x="200" y="90" width="140" height="100" fill="#1e293b" rx="8"/>
  <text x="270" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">技能筑基</text>
  <text x="270" y="124" text-anchor="middle" font-size="10" fill="#94a3b8">考证：软考/HCIA</text>
  <text x="270" y="138" text-anchor="middle" font-size="10" fill="#94a3b8">打好Linux基础</text>
  <text x="270" y="152" text-anchor="middle" font-size="10" fill="#94a3b8">参加CTF竞赛</text>
  <text x="270" y="166" text-anchor="middle" font-size="10" fill="#94a3b8">找导师进实验室</text>
  <!-- connector -->
  <line x1="270" y1="190" x2="270" y2="190" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="270" y1="200" x2="270" y2="190" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Phase 3: 大三关键期 -->
  <circle cx="450" cy="210" r="10" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="450" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">+1.5年</text>
  <text x="450" y="182" text-anchor="middle" font-size="10" fill="#64748b">关键决策</text>
  <!-- Actions below -->
  <rect x="380" y="230" width="140" height="110" fill="#1e293b" rx="8"/>
  <text x="450" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#f59e0b">考研or就业</text>
  <text x="450" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">考研：冲211/985</text>
  <text x="450" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">就业：找大厂实习</text>
  <text x="450" y="292" text-anchor="middle" font-size="10" fill="#94a3b8">项目落地展示</text>
  <text x="450" y="306" text-anchor="middle" font-size="10" fill="#94a3b8">争取实习offer</text>
  <text x="450" y="320" text-anchor="middle" font-size="10" fill="#94a3b8">建立人脉圈子</text>

  <!-- Phase 4: 大四/毕业 -->
  <circle cx="630" cy="210" r="10" fill="#a855f7" stroke="#7e22ce" stroke-width="2"/>
  <text x="630" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#d8b4fe">+3年</text>
  <text x="630" y="182" text-anchor="middle" font-size="10" fill="#64748b">收获期</text>
  <!-- Actions above -->
  <rect x="560" y="90" width="140" height="100" fill="#1e293b" rx="8"/>
  <text x="630" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#a855f7">目标成果</text>
  <text x="630" y="124" text-anchor="middle" font-size="10" fill="#94a3b8">月薪15k-25k+</text>
  <text x="630" y="138" text-anchor="middle" font-size="10" fill="#94a3b8">研究生录取</text>
  <text x="630" y="152" text-anchor="middle" font-size="10" fill="#94a3b8">体制内安全岗</text>
  <text x="630" y="166" text-anchor="middle" font-size="10" fill="#94a3b8">或大厂正式员工</text>
  <!-- connector -->
  <line x1="630" y1="200" x2="630" y2="190" stroke="#a855f7" stroke-width="1.5"/>

  <!-- Time markers on axis -->
  <text x="100" y="225" text-anchor="middle" font-size="9" fill="#475569">|</text>
  <text x="270" y="225" text-anchor="middle" font-size="9" fill="#475569">|</text>
  <text x="450" y="225" text-anchor="middle" font-size="9" fill="#475569">|</text>
  <text x="630" y="225" text-anchor="middle" font-size="9" fill="#475569">|</text>

  <!-- Footer note -->
  <rect x="60" y="348" width="680" height="22" fill="#1e293b" rx="6"/>
  <text x="400" y="363" text-anchor="middle" font-size="11" fill="#fbbf24">核心原则：学历是敲门砖，证书是加速器，项目是筛选器，人脉是乘数器</text>
</svg>
