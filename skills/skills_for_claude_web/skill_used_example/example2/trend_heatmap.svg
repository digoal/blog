<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'PingFang SC', sans-serif">
  <!-- Background -->
  <rect width="800" height="520" fill="#0f172a" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#f1f5f9">政策风口热力气泡图</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">气泡大小 = 市场空间 | X轴 = 政策支持强度 | Y轴 = 时间紧迫性</text>

  <!-- Axes -->
  <!-- X axis -->
  <line x1="80" y1="420" x2="740" y2="420" stroke="#334155" stroke-width="1.5"/>
  <text x="410" y="460" text-anchor="middle" font-size="12" fill="#64748b">政策支持强度 →</text>
  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="420" stroke="#334155" stroke-width="1.5"/>
  <text x="28" y="255" text-anchor="middle" font-size="12" fill="#64748b" transform="rotate(-90,28,255)">时间紧迫性 →</text>

  <!-- Grid lines -->
  <line x1="80" y1="300" x2="740" y2="300" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="190" x2="740" y2="190" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="245" y1="80" x2="245" y2="420" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="410" y1="80" x2="410" y2="420" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="575" y1="80" x2="575" y2="420" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- X axis labels -->
  <text x="245" y="440" text-anchor="middle" font-size="11" fill="#64748b">★★★</text>
  <text x="410" y="440" text-anchor="middle" font-size="11" fill="#64748b">★★★★</text>
  <text x="575" y="440" text-anchor="middle" font-size="11" fill="#64748b">★★★★★</text>

  <!-- Y axis labels -->
  <text x="70" y="424" text-anchor="end" font-size="11" fill="#64748b">低</text>
  <text x="70" y="250" text-anchor="end" font-size="11" fill="#64748b">中</text>
  <text x="70" y="100" text-anchor="end" font-size="11" fill="#64748b">高</text>

  <!-- Bubble 1: AI大模型应用 -->
  <circle cx="620" cy="120" r="60" fill="#3b82f6" fill-opacity="0.25" stroke="#3b82f6" stroke-width="2"/>
  <text x="620" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#93c5fd">AI大模型</text>
  <text x="620" y="128" text-anchor="middle" font-size="11" fill="#93c5fd">应用开发</text>
  <text x="620" y="144" text-anchor="middle" font-size="11" fill="#60a5fa">市场4.8万亿$</text>

  <!-- Bubble 2: 网络安全 -->
  <circle cx="500" cy="185" r="47" fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="179" text-anchor="middle" font-size="13" font-weight="bold" fill="#86efac">网络安全</text>
  <text x="500" y="195" text-anchor="middle" font-size="11" fill="#86efac">缺口327万</text>

  <!-- Bubble 3: 信创/国产替代 -->
  <circle cx="640" cy="255" r="42" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="249" text-anchor="middle" font-size="13" font-weight="bold" fill="#fcd34d">信创/国产</text>
  <text x="640" y="265" text-anchor="middle" font-size="11" fill="#fcd34d">替代</text>

  <!-- Bubble 4: 数字中国/云计算 -->
  <circle cx="370" cy="290" r="38" fill="#a855f7" fill-opacity="0.25" stroke="#a855f7" stroke-width="2"/>
  <text x="370" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8b4fe">数字中国</text>
  <text x="370" y="300" text-anchor="middle" font-size="11" fill="#d8b4fe">云计算</text>

  <!-- Bubble 5: 嵌入式/IoT/汽车电子 -->
  <circle cx="450" cy="340" r="32" fill="#ef4444" fill-opacity="0.25" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#fca5a5">嵌入式</text>
  <text x="450" y="350" text-anchor="middle" font-size="11" fill="#fca5a5">车载/IoT</text>

  <!-- Legend -->
  <rect x="80" y="470" width="640" height="38" fill="#1e293b" rx="8"/>
  <circle cx="130" cy="489" r="8" fill="#3b82f6" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="144" y="493" font-size="11" fill="#94a3b8">AI大模型（最热）</text>
  <circle cx="270" cy="489" r="7" fill="#22c55e" fill-opacity="0.5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="283" y="493" font-size="11" fill="#94a3b8">网络安全（最稳）</text>
  <circle cx="410" cy="489" r="6" fill="#f59e0b" fill-opacity="0.5" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="423" y="493" font-size="11" fill="#94a3b8">信创（长期红利）</text>
  <circle cx="545" cy="489" r="5.5" fill="#a855f7" fill-opacity="0.5" stroke="#a855f7" stroke-width="1.5"/>
  <text x="556" y="493" font-size="11" fill="#94a3b8">数字中国</text>
  <circle cx="650" cy="489" r="5" fill="#ef4444" fill-opacity="0.5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="661" y="493" font-size="11" fill="#94a3b8">嵌入式</text>
</svg>
