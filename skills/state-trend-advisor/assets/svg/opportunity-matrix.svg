<?xml version="1.0" encoding="UTF-8"?>
<!--
  Opportunity Matrix Template
  用途：政策红利 × 用户能力 2x2 矩阵
  使用方法：
  1. 复制本文件，重命名
  2. 修改 quadrant labels 和每个点的 (x, y, name) 坐标
  3. 中心点 = (500, 400), X 轴 0-1000, Y 轴 0-800
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 2; }
      .quadrant { fill-opacity: 0.08; }
      .q1 { fill: #2e7d32; }   /* 右上：双赢 */
      .q2 { fill: #1976d2; }   /* 左上：政策强但能力弱 */
      .q3 { fill: #d32f2f; }   /* 右下：能力匹配但政策弱 */
      .q4 { fill: #616161; }   /* 左下：观望 */
      .quadrant-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .axis-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: 600; text-anchor: middle; fill: #333; }
      .point { fill: #ff6f00; stroke: #e65100; stroke-width: 2; }
      .point-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; fill: #333; font-weight: 600; }
      .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #111; text-anchor: middle; font-weight: 700; }
      .subtitle { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="40" class="title">机会矩阵：政策红利 × 用户能力</text>
  <text x="500" y="65" class="subtitle">右上象限=重点投入 · 左上=借势 · 右下=储备 · 左下=规避</text>

  <!-- Quadrant backgrounds (center 500,400, half-width 400, half-height 350) -->
  <rect x="100" y="50" width="400" height="350" class="quadrant q2"/>  <!-- top-left -->
  <rect x="500" y="50" width="400" height="350" class="quadrant q1"/>  <!-- top-right -->
  <rect x="100" y="400" width="400" height="350" class="quadrant q4"/>  <!-- bottom-left -->
  <rect x="500" y="400" width="400" height="350" class="quadrant q3"/>  <!-- bottom-right -->

  <!-- Axes (cross at center 500,400) -->
  <line x1="500" y1="50" x2="500" y2="750" class="axis"/>
  <line x1="100" y1="400" x2="900" y2="400" class="axis"/>

  <!-- Axis labels -->
  <text x="750" y="775" class="axis-label">→ 用户能力（高）</text>
  <text x="250" y="775" class="axis-label">用户能力（低）→</text>
  <text x="500" y="40" class="axis-label">政策红利（高）</text>
  <text x="500" y="780" class="axis-label" transform="rotate(-90 500 770)">↑ 政策红利</text>

  <!-- Quadrant labels -->
  <text x="700" y="220" class="quadrant-label" fill="#1b5e20">🌟 重点投入</text>
  <text x="700" y="245" class="subtitle">政策强 + 能力高</text>

  <text x="300" y="220" class="quadrant-label" fill="#0d47a1">🔗 借势</text>
  <text x="300" y="245" class="subtitle">政策强 + 能力弱</text>

  <text x="700" y="580" class="quadrant-label" fill="#b71c1c">📚 储备</text>
  <text x="700" y="605" class="subtitle">政策弱 + 能力高</text>

  <text x="300" y="580" class="quadrant-label" fill="#424242">⏸ 规避</text>
  <text x="300" y="605" class="subtitle">政策弱 + 能力弱</text>

  <!-- Sample points (modify these for actual opportunities) -->
  <!-- 中心 = (500, 400), X: 100=能力0, 900=能力10, Y: 50=红利10, 750=红利0 -->
  <!-- Example: AI 大模型开发 政策=9, 能力=8 → (820, 140) -->
  <circle cx="820" cy="140" r="14" class="point"/>
  <text x="845" y="135" class="point-label">AI 大模型开发</text>
  <text x="845" y="152" class="point-label" font-size="11" fill="#666">政策 +9 / 能力 +8</text>

  <!-- 半导体设备 政策=8, 能力=4 → (660, 180) -->
  <circle cx="660" cy="180" r="12" class="point"/>
  <text x="685" y="175" class="point-label">半导体设备</text>
  <text x="685" y="190" class="point-label" font-size="11" fill="#666">+8 / +4</text>

  <!-- 新能源车出海 政策=7, 能力=5 → (700, 220) -->
  <circle cx="700" cy="220" r="11" class="point"/>
  <text x="720" y="215" class="point-label">新能源车出海</text>

  <!-- 银发经济服务 政策=6, 能力=7 → (780, 260) -->
  <circle cx="780" cy="260" r="11" class="point"/>
  <text x="800" y="255" class="point-label">银发经济</text>

  <!-- 跨境电商 政策=6, 能力=8 → (820, 260) -->
  <circle cx="820" cy="280" r="13" class="point"/>
  <text x="845" y="275" class="point-label">跨境电商</text>

  <!-- 生物医药 政策=7, 能力=3 → (620, 220) -->
  <circle cx="620" cy="220" r="10" class="point"/>
  <text x="640" y="215" class="point-label">生物医药</text>

  <!-- 数据要素 政策=8, 能力=2 → (580, 180) -->
  <circle cx="580" cy="180" r="10" class="point"/>
  <text x="600" y="175" class="point-label">数据要素</text>

  <!-- 传统制造 政策=2, 能力=8 → (820, 680) -->
  <circle cx="820" cy="680" r="9" class="point"/>
  <text x="800" y="700" class="point-label">传统制造</text>

  <!-- 教培 政策=1, 能力=5 → (700, 740) -->
  <circle cx="700" cy="740" r="8" class="point"/>
  <text x="720" y="760" class="point-label">K12 教培</text>

  <!-- Footnote -->
  <text x="500" y="790" class="subtitle">数据来源：[来源名] [日期]   推演逻辑：见报告 §术</text>
</svg>
