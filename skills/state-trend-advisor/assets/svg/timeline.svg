<?xml version="1.0" encoding="UTF-8"?>
<!--
  Policy Timeline Template
  用途：5-10 年政策演化时间线
  使用方法：
  1. 复制本文件，重命名
  2. 修改 events 数组中的 year, title, type, description
  3. type 可选: key (红)、policy (蓝)、event (灰)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 2; }
      .tick { stroke: #666; stroke-width: 1; }
      .year { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #333; text-anchor: middle; font-weight: 600; }
      .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #111; text-anchor: middle; font-weight: 700; }
      .subtitle { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
      .event-key { fill: #d32f2f; }
      .event-policy { fill: #1976d2; }
      .event-normal { fill: #616161; }
      .event-title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: 600; }
      .event-desc { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #555; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="40" class="title">国家政策时间线（2021-2030）</text>
  <text x="600" y="62" class="subtitle">红色=顶层战略 · 蓝色=重大政策 · 灰色=重大事件</text>

  <!-- Main axis (horizontal) -->
  <line x1="100" y1="280" x2="1100" y2="280" class="axis"/>

  <!-- Year ticks -->
  <line x1="100" y1="275" x2="100" y2="285" class="tick"/>
  <line x1="220" y1="275" x2="220" y2="285" class="tick"/>
  <line x1="340" y1="275" x2="340" y2="285" class="tick"/>
  <line x1="460" y1="275" x2="460" y2="285" class="tick"/>
  <line x1="580" y1="275" x2="580" y2="285" class="tick"/>
  <line x1="700" y1="275" x2="700" y2="285" class="tick"/>
  <line x1="820" y1="275" x2="820" y2="285" class="tick"/>
  <line x1="940" y1="275" x2="940" y2="285" class="tick"/>
  <line x1="1060" y1="275" x2="1060" y2="285" class="tick"/>

  <text x="100" y="305" class="year">2021</text>
  <text x="220" y="305" class="year">2022</text>
  <text x="340" y="305" class="year">2023</text>
  <text x="460" y="305" class="year">2024</text>
  <text x="580" y="305" class="year">2025</text>
  <text x="700" y="305" class="year">2026</text>
  <text x="820" y="305" class="year">2027</text>
  <text x="940" y="305" class="year">2028</text>
  <text x="1060" y="305" class="year">2029/30</text>

  <!-- Sample event markers (modify these for actual events) -->
  <!-- Event 1: 2021 顶层战略 -->
  <circle cx="100" cy="280" r="8" class="event-key"/>
  <line x1="100" y1="280" x2="100" y2="180" stroke="#d32f2f" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="100" y="170" class="event-title event-key" text-anchor="middle">十四五规划</text>
  <text x="100" y="155" class="event-desc" text-anchor="middle">双循环 + 新质生产力</text>

  <!-- Event 2: 2022 重大政策 -->
  <circle cx="220" cy="280" r="7" class="event-policy"/>
  <line x1="220" y1="280" x2="220" y2="180" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="220" y="170" class="event-title event-policy" text-anchor="middle">大基金二期</text>
  <text x="220" y="155" class="event-desc" text-anchor="middle">半导体国产替代加码</text>

  <!-- Event 3: 2023 重大事件 -->
  <circle cx="340" cy="280" r="6" class="event-normal"/>
  <line x1="340" y1="280" x2="340" y2="380" stroke="#616161" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="340" y="395" class="event-title event-normal" text-anchor="middle">ChatGPT 触发</text>
  <text x="340" y="410" class="event-desc" text-anchor="middle">全球 AI 军备竞赛</text>

  <!-- Event 4: 2024 重大政策 -->
  <circle cx="460" cy="280" r="7" class="event-policy"/>
  <line x1="460" y1="280" x2="460" y2="180" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="460" y="170" class="event-title event-policy" text-anchor="middle">新质生产力</text>
  <text x="460" y="155" class="event-desc" text-anchor="middle">写入中央经济工作会议</text>

  <!-- Event 5: 2025 重大事件 -->
  <circle cx="580" cy="280" r="6" class="event-normal"/>
  <line x1="580" y1="280" x2="580" y2="380" stroke="#616161" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="580" y="395" class="event-title event-normal" text-anchor="middle">大模型应用落地</text>
  <text x="580" y="410" class="event-desc" text-anchor="middle">百模大战转向行业应用</text>

  <!-- Event 6: 2026 顶层战略 -->
  <circle cx="700" cy="280" r="8" class="event-key"/>
  <line x1="700" y1="280" x2="700" y2="180" stroke="#d32f2f" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="700" y="170" class="event-title event-key" text-anchor="middle">十五五规划开局</text>
  <text x="700" y="155" class="event-desc" text-anchor="middle">科技自立 + 高端制造</text>

  <!-- Event 7: 2027 政策评估 -->
  <circle cx="820" cy="280" r="7" class="event-policy"/>
  <line x1="820" y1="280" x2="820" y2="380" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="820" y="395" class="event-title event-policy" text-anchor="middle">中期评估</text>
  <text x="820" y="410" class="event-desc" text-anchor="middle">十五五规划中期调整</text>

  <!-- Event 8: 2028-29 关键攻坚 -->
  <circle cx="940" cy="280" r="6" class="event-normal"/>
  <line x1="940" y1="280" x2="940" y2="180" stroke="#616161" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="940" y="170" class="event-title event-normal" text-anchor="middle">关键攻坚期</text>
  <text x="940" y="155" class="event-desc" text-anchor="middle">卡脖子技术突破</text>

  <!-- Event 9: 2030 收官 -->
  <circle cx="1060" cy="280" r="8" class="event-key"/>
  <line x1="1060" y1="280" x2="1060" y2="380" stroke="#d32f2f" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="1060" y="395" class="event-title event-key" text-anchor="middle">十五五收官</text>
  <text x="1060" y="410" class="event-desc" text-anchor="middle">十六五规划制定</text>

  <!-- Footnote -->
  <text x="600" y="470" class="subtitle">数据来源：[来源名] [日期]   推演逻辑：见报告 §势</text>
</svg>
