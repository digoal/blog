<?xml version="1.0" encoding="UTF-8"?>
<!--
  Trend Radar Chart Template
  用途：六大场景的机会分值（-3 到 +3）
  使用方法：
  1. 复制本文件，重命名
  2. 修改 axis 的 label 和每条 axis 上的 value (0-100)
  3. 调整 polygon 的 points (cx + r*cos(θ), cy + r*sin(θ))
  4. SVG 中心 cx=400, cy=400
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      .axis { stroke: #999; stroke-width: 1; }
      .grid { fill: none; stroke: #ddd; stroke-width: 0.5; }
      .label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; fill: #333; text-anchor: middle; font-weight: 600; }
      .value { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
      .polygon { fill: rgba(33, 150, 243, 0.25); stroke: #2196f3; stroke-width: 2; }
      .dot { fill: #2196f3; }
      .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #111; text-anchor: middle; font-weight: 700; }
      .subtitle { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="40" class="title">国家趋势 × 六大场景机会雷达</text>
  <text x="400" y="65" class="subtitle">分值范围：-3（退坡）到 +3（强红利）</text>

  <!-- 6 axis (60° apart) -->
  <!-- axis 1: 投资  (top) -->
  <line x1="400" y1="400" x2="400" y2="100" class="axis"/>
  <text x="400" y="85" class="label">投资</text>

  <!-- axis 2: 创业  (60° / upper right) -->
  <line x1="400" y1="400" x2="746" y2="250" class="axis"/>
  <text x="657" y="225" class="label">创业方向</text>

  <!-- axis 3: 商业  (120° / lower right) -->
  <line x1="400" y1="400" x2="746" y2="550" class="axis"/>
  <text x="657" y="595" class="label">商业思路</text>

  <!-- axis 4: 产品  (bottom) -->
  <line x1="400" y1="400" x2="400" y2="700" class="axis"/>
  <text x="400" y="730" class="label">产品思路</text>

  <!-- axis 5: 就业  (240° / lower left) -->
  <line x1="400" y1="400" x2="54" y2="550" class="axis"/>
  <text x="143" y="595" class="label">就业择业</text>

  <!-- axis 6: 学习  (300° / upper left) -->
  <line x1="400" y1="400" x2="54" y2="250" class="axis"/>
  <text x="143" y="225" class="label">学习规划</text>

  <!-- Grid circles (concentric) -->
  <circle cx="400" cy="400" r="60" class="grid"/>
  <circle cx="400" cy="400" r="120" class="grid"/>
  <circle cx="400" cy="400" r="180" class="grid"/>
  <circle cx="400" cy="400" r="240" class="grid"/>
  <circle cx="400" cy="400" r="300" class="grid"/>

  <!-- Grid labels -->
  <text x="465" y="402" class="value">+3 强</text>
  <text x="525" y="402" class="value">+2</text>
  <text x="585" y="402" class="value">+1</text>
  <text x="402" y="402" class="value">0</text>
  <text x="345" y="402" class="value">-1</text>
  <text x="285" y="402" class="value">-2</text>
  <text x="220" y="402" class="value">-3 退</text>

  <!-- Sample data polygon (modify these points for actual values) -->
  <!-- Example: 投资+2.5, 创业+2, 商业+1, 产品+2.5, 就业+1.5, 学习+2 -->
  <!-- scale: r = 100 * value/3, so +3 = 300, +2 = 200, +1 = 100, 0 = 0 -->
  <polygon class="polygon"
    points="400,150 546,233 480,517 400,550 287,517 254,233"/>
  <circle cx="400" cy="150" r="5" class="dot"/>
  <circle cx="546" cy="233" r="5" class="dot"/>
  <circle cx="480" cy="517" r="5" class="dot"/>
  <circle cx="400" cy="550" r="5" class="dot"/>
  <circle cx="287" cy="517" r="5" class="dot"/>
  <circle cx="254" cy="233" r="5" class="dot"/>

  <!-- Value labels next to dots -->
  <text x="400" y="140" class="value" fill="#2196f3" font-weight="700">+2.5</text>
  <text x="555" y="225" class="value" fill="#2196f3" font-weight="700">+2.0</text>
  <text x="490" y="540" class="value" fill="#2196f3" font-weight="700">+1.0</text>
  <text x="400" y="568" class="value" fill="#2196f3" font-weight="700">+2.5</text>
  <text x="245" y="540" class="value" fill="#2196f3" font-weight="700">+1.5</text>
  <text x="215" y="225" class="value" fill="#2196f3" font-weight="700">+2.0</text>

  <!-- Footnote -->
  <text x="400" y="775" class="subtitle">数据来源：[来源名] [日期]   推演逻辑：见报告 §势—道—术</text>
</svg>
