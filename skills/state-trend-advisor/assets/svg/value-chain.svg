<?xml version="1.0" encoding="UTF-8"?>
<!--
  Value Chain Map Template
  用途：钱/政策/人/技术在产业链上的流向
  使用方法：
  1. 复制本文件，重命名
  2. 修改 nodes (环节名称 + 受益度颜色) 和 edges (流向 + 流量标签)
  3. 颜色映射：+3=深绿，+2=中绿，+1=浅绿，0=灰，-1=浅红，-2=中红，-3=深红
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <style>
      .node-3 { fill: #1b5e20; stroke: #2e7d32; stroke-width: 2; }
      .node-2 { fill: #388e3c; stroke: #66bb6a; stroke-width: 2; }
      .node-1 { fill: #81c784; stroke: #a5d6a7; stroke-width: 1; }
      .node-0 { fill: #e0e0e0; stroke: #9e9e9e; stroke-width: 1; }
      .node-n1 { fill: #ef9a9a; stroke: #ef5350; stroke-width: 1; }
      .node-n2 { fill: #e57373; stroke: #f44336; stroke-width: 2; }
      .node-n3 { fill: #c62828; stroke: #b71c1c; stroke-width: 2; }
      .node-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: white; text-anchor: middle; font-weight: 600; }
      .node-label-dark { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #333; text-anchor: middle; font-weight: 600; }
      .flow { stroke: #1565c0; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .flow-money { stroke: #f57c00; stroke-width: 3; stroke-dasharray: 5,3; fill: none; marker-end: url(#arrow-orange); }
      .flow-policy { stroke: #6a1b9a; stroke-width: 3; stroke-dasharray: 8,3; fill: none; marker-end: url(#arrow-purple); }
      .flow-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #333; font-weight: 600; }
      .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #111; text-anchor: middle; font-weight: 700; }
      .subtitle { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
      .layer-label { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #333; font-weight: 700; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f57c00"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6a1b9a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" class="title">产业链图谱：钱/政策/技术流向</text>
  <text x="600" y="62" class="subtitle">节点颜色=受益度（深绿=强红利 / 灰=中性 / 红=退坡）</text>

  <!-- Layer labels -->
  <text x="50" y="200" class="layer-label">上游</text>
  <text x="50" y="380" class="layer-label">中游</text>
  <text x="50" y="560" class="layer-label">下游</text>
  <text x="50" y="220" class="subtitle">原料/设备</text>
  <text x="50" y="400" class="subtitle">生产/集成</text>
  <text x="50" y="580" class="subtitle">应用/服务</text>

  <!-- Upstream nodes (y=200) -->
  <!-- 设备/材料 受益度 +3 -->
  <rect x="200" y="170" width="180" height="60" rx="8" class="node-3"/>
  <text x="290" y="195" class="node-label">设备/材料</text>
  <text x="290" y="215" class="node-label" font-size="11" opacity="0.9">国产替代 +3</text>

  <!-- 设计/IP 受益度 +2 -->
  <rect x="450" y="170" width="180" height="60" rx="8" class="node-2"/>
  <text x="540" y="195" class="node-label">设计/IP</text>
  <text x="540" y="215" class="node-label" font-size="11" opacity="0.9">政策红利 +2</text>

  <!-- 原料 受益度 +1 -->
  <rect x="700" y="170" width="180" height="60" rx="8" class="node-1"/>
  <text x="790" y="195" class="node-label-dark">原料/耗材</text>
  <text x="790" y="215" class="node-label-dark" font-size="11">温和增长 +1</text>

  <!-- 服务/咨询 受益度 0 -->
  <rect x="950" y="170" width="180" height="60" rx="8" class="node-0"/>
  <text x="1040" y="195" class="node-label-dark">服务/咨询</text>
  <text x="1040" y="215" class="node-label-dark" font-size="11">中性 0</text>

  <!-- Midstream nodes (y=350) -->
  <!-- 制造/封测 受益度 +2 -->
  <rect x="200" y="320" width="180" height="60" rx="8" class="node-2"/>
  <text x="290" y="345" class="node-label">制造/封测</text>
  <text x="290" y="365" class="node-label" font-size="11" opacity="0.9">稳步增长 +2</text>

  <!-- 模组/系统 受益度 +2 -->
  <rect x="450" y="320" width="180" height="60" rx="8" class="node-2"/>
  <text x="540" y="345" class="node-label">模组/系统</text>
  <text x="540" y="365" class="node-label" font-size="11" opacity="0.9">应用驱动 +2</text>

  <!-- 低端制造 受益度 -2 -->
  <rect x="700" y="320" width="180" height="60" rx="8" class="node-n2"/>
  <text x="790" y="345" class="node-label">低端制造</text>
  <text x="790" y="365" class="node-label" font-size="11" opacity="0.9">产能过剩 -2</text>

  <!-- 传统组装 受益度 -1 -->
  <rect x="950" y="320" width="180" height="60" rx="8" class="node-n1"/>
  <text x="1040" y="345" class="node-label-dark">传统组装</text>
  <text x="1040" y="365" class="node-label-dark" font-size="11">退坡 -1</text>

  <!-- Downstream nodes (y=500) -->
  <!-- AI 应用 受益度 +3 -->
  <rect x="200" y="470" width="180" height="60" rx="8" class="node-3"/>
  <text x="290" y="495" class="node-label">AI 应用</text>
  <text x="290" y="515" class="node-label" font-size="11" opacity="0.9">爆发期 +3</text>

  <!-- 高端消费 受益度 +1 -->
  <rect x="450" y="470" width="180" height="60" rx="8" class="node-1"/>
  <text x="540" y="495" class="node-label-dark">高端消费</text>
  <text x="540" y="515" class="node-label-dark" font-size="11">消费升级 +1</text>

  <!-- 银发服务 受益度 +2 -->
  <rect x="700" y="470" width="180" height="60" rx="8" class="node-2"/>
  <text x="790" y="495" class="node-label">银发服务</text>
  <text x="790" y="515" class="node-label" font-size="11" opacity="0.9">人口结构 +2</text>

  <!-- 出海应用 受益度 +2 -->
  <rect x="950" y="470" width="180" height="60" rx="8" class="node-2"/>
  <text x="1040" y="495" class="node-label">出海应用</text>
  <text x="1040" y="515" class="node-label" font-size="11" opacity="0.9">双循环 +2</text>

  <!-- Flow arrows (蓝色=技术流向, 橙色=资金流向, 紫色=政策流向) -->
  <!-- 技术流：上游 → 中游 -->
  <path d="M 290 230 L 290 320" class="flow"/>
  <text x="295" y="280" class="flow-label" fill="#1565c0">技术</text>

  <path d="M 540 230 L 540 320" class="flow"/>
  <text x="545" y="280" class="flow-label" fill="#1565c0">IP</text>

  <path d="M 790 230 L 790 320" class="flow"/>
  <text x="795" y="280" class="flow-label" fill="#1565c0">原料</text>

  <!-- 资金流：政策 → 上游设备 -->
  <path d="M 200 600 L 290 230" class="flow-money"/>
  <text x="120" y="500" class="flow-label" fill="#f57c00" transform="rotate(-60 120 500)">大基金</text>

  <!-- 政策流：政府 → AI 应用 -->
  <path d="M 200 600 L 290 500" class="flow-policy"/>
  <text x="120" y="650" class="flow-label" fill="#6a1b9a">政策</text>

  <!-- Legend -->
  <rect x="200" y="610" width="14" height="14" class="node-3"/>
  <text x="220" y="622" class="subtitle">+3 强红利</text>
  <rect x="320" y="610" width="14" height="14" class="node-1"/>
  <text x="340" y="622" class="subtitle">+1 温和</text>
  <rect x="440" y="610" width="14" height="14" class="node-0"/>
  <text x="460" y="622" class="subtitle">0 中性</text>
  <rect x="540" y="610" width="14" height="14" class="node-n1"/>
  <text x="560" y="622" class="subtitle">-1 退坡</text>
  <rect x="660" y="610" width="14" height="14" class="node-n3"/>
  <text x="680" y="622" class="subtitle">-3 强退</text>

  <line x1="800" y1="617" x2="830" y2="617" class="flow"/>
  <text x="838" y="622" class="subtitle">技术</text>
  <line x1="900" y1="617" x2="930" y2="617" class="flow-money"/>
  <text x="938" y="622" class="subtitle">资金</text>
  <line x1="1000" y1="617" x2="1030" y2="617" class="flow-policy"/>
  <text x="1038" y="622" class="subtitle">政策</text>

  <!-- Footnote -->
  <text x="600" y="670" class="subtitle">数据来源：[来源名] [日期]   推演逻辑：见报告 §道</text>
</svg>
